<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">attach 안전 분리 방법</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">Detach sequence와 --detach-keys 설정</text>

  <!-- Detach key sequence -->
  <rect x="60" y="104" width="760" height="80" rx="8" fill="#0d1a22" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">기본 분리 키 시퀀스</text>
  <text x="80" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">Ctrl + P  →  Ctrl + Q</text>
  <text x="400" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  컨테이너를 종료하지 않고 분리(detach)</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">※ Ctrl+C는 SIGINT를 전송 → PID 1이 종료 처리 → 컨테이너 종료 가능</text>

  <!-- –detach-keys option -->
  <rect x="60" y="204" width="760" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 커스텀 분리 키 설정 (글로벌)</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker attach</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">--detach-keys</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">"ctrl-d"</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">web</tspan>
  </text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># ~/.docker/config.json 에서 기본값 변경</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ce9178">{</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">"detachKeys"</tspan>
    <tspan fill="#e8e8e8">: </tspan>
    <tspan fill="#ce9178">"ctrl-e,e"</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">}</tspan>
  </text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># -it 없이 attach: stdout만 스트리밍 (로그 감시용)</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker attach</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">--no-stdin</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">web</tspan>
    <tspan fill="#6a8aa0">    # 입력 없이 출력만 관찰</tspan>
  </text>
</svg>
