<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Seq2Seq: 인코더-디코더 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">기계 번역 "안녕하세요" → "Hello"</text>

  <!-- ENCODER section -->
  <rect x="60" y="88" width="340" height="36" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">ENCODER  (입력 처리)</text>

  <!-- Encoder cells -->
  <rect x="76" y="148" width="90" height="56" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="121" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">E-Cell 1</text>
  <text x="121" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"안녕"</text>

  <rect x="196" y="148" width="90" height="56" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="241" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">E-Cell 2</text>
  <text x="241" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"하세요"</text>

  <rect x="316" y="148" width="72" height="56" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="352" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">E-Cell 3</text>
  <text x="352" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">&lt;EOS&gt;</text>

  <!-- Encoder arrows -->
  <line x1="60" y1="176" x2="74" y2="176" stroke="#e05555" stroke-width="2"/>
  <polygon points="74,170 86,176 74,182" fill="#e05555"/>
  <line x1="166" y1="176" x2="194" y2="176" stroke="#e05555" stroke-width="2"/>
  <polygon points="194,170 206,176 194,182" fill="#e05555"/>
  <line x1="286" y1="176" x2="314" y2="176" stroke="#e05555" stroke-width="2"/>
  <polygon points="314,170 326,176 314,182" fill="#e05555"/>

  <!-- Context vector -->
  <rect x="150" y="240" width="180" height="50" rx="8" fill="#111" stroke="#7777cc" stroke-width="2.5"/>
  <text x="240" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Context Vector</text>
  <text x="240" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">h_encoder (고정 크기)</text>

  <!-- Arrow from encoder to context -->
  <line x1="352" y1="204" x2="280" y2="240" stroke="#7777cc" stroke-width="2"/>
  <polygon points="274,234 280,246 286,234" fill="#7777cc"/>

  <!-- Arrow context to decoder -->
  <line x1="330" y1="265" x2="468" y2="265" stroke="#7777cc" stroke-width="2.5"/>
  <polygon points="468,259 480,265 468,271" fill="#7777cc"/>

  <!-- DECODER section -->
  <rect x="480" y="88" width="340" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">DECODER  (출력 생성)</text>

  <!-- Decoder cells -->
  <rect x="496" y="148" width="90" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="541" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">D-Cell 1</text>
  <text x="541" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">&lt;SOS&gt;</text>

  <rect x="616" y="148" width="90" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="661" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">D-Cell 2</text>
  <text x="661" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"Hello"</text>

  <rect x="736" y="148" width="84" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="778" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">D-Cell 3</text>
  <text x="778" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">&lt;EOS&gt;</text>

  <!-- Decoder arrows -->
  <line x1="586" y1="176" x2="614" y2="176" stroke="#55c555" stroke-width="2"/>
  <polygon points="614,170 626,176 614,182" fill="#55c555"/>
  <line x1="706" y1="176" x2="734" y2="176" stroke="#55c555" stroke-width="2"/>
  <polygon points="734,170 746,176 734,182" fill="#55c555"/>
  <line x1="820" y1="176" x2="855" y2="176" stroke="#55c555" stroke-width="2"/>

  <!-- Outputs upward -->
  <line x1="541" y1="148" x2="541" y2="120" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="535,120 541,108 547,120" fill="#7ec8e3"/>
  <text x="541" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">P("H")</text>
  <line x1="661" y1="148" x2="661" y2="120" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="655,120 661,108 667,120" fill="#7ec8e3"/>
  <text x="661" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">P(".")</text>
  <line x1="778" y1="148" x2="778" y2="120" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="772,120 778,108 784,120" fill="#7ec8e3"/>
  <text x="778" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">EOS</text>

  <!-- Limitation note -->
  <rect x="60" y="320" width="760" height="56" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">병목(Bottleneck) 문제</text>
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">전체 입력 시퀀스를 하나의 고정 크기 Context Vector에 압축 → 긴 문장에서 정보 손실</text>

  <!-- Code block short -->
  <rect x="60" y="394" width="760" height="58" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 인코더 마지막 hidden을 디코더 초기 hidden으로</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">enc_out, (h_n, c_n) = encoder(src)</text>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">dec_out, _ = decoder(tgt, (h_n, c_n))</text>
</svg>
