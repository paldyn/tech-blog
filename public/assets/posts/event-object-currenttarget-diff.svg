<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">target · currentTarget · relatedTarget</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">이벤트 객체의 세 가지 요소 참조</text>

  <!-- DOM structure -->
  <!-- outer div -->
  <rect x="200" y="96" width="480" height="200" rx="8" fill="#0a0d1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">&lt;div id="outer"&gt;  ← onclick 리스너</text>

  <!-- inner button -->
  <rect x="280" y="140" width="320" height="100" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">&lt;button id="inner"&gt;</text>

  <!-- span inside button -->
  <rect x="340" y="186" width="200" height="36" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">🖱 &lt;span&gt; 여기 클릭</text>

  <!-- currentTarget label -->
  <text x="80" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">currentTarget</text>
  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리스너가 달린 요소</text>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">#outer</text>
  <line x1="198" y1="170" x2="140" y2="200" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="198,170 186,166 188,178" fill="#7ec8e3"/>

  <!-- target label -->
  <text x="680" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">target</text>
  <text x="680" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클릭된 실제 요소</text>
  <text x="680" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">span</text>
  <line x1="540" y1="204" x2="678" y2="218" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="678,218 665,216 670,228" fill="#55c555"/>

  <!-- relatedTarget explanation -->
  <rect x="60" y="324" width="760" height="76" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">relatedTarget — mouseover / mouseout / focusin / focusout</text>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">이전에 있던 요소(mouseout: 마우스가 나온 곳, mouseover: 마우스가 오기 전 있던 곳)</text>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">null = 브라우저 밖에서 들어왔거나 Shadow DOM 경계를 넘은 경우</text>

  <!-- Summary table headers -->
  <rect x="60" y="420" width="760" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="200" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">currentTarget</text>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">target</text>
  <text x="680" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">relatedTarget</text>
  <text x="200" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">리스너 등록 요소 (버블 중 변경)</text>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실제 발생 요소 (고정)</text>
  <text x="680" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이전/다음 관련 요소</text>
</svg>
