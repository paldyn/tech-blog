<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GitHub Container Registry (ghcr.io) 흐름</text>

  <!-- GitHub Actions -->
  <rect x="40" y="76" width="180" height="64" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="130" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">GitHub Actions</text>
  <text x="130" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GITHUB_TOKEN 자동 발급</text>
  <text x="130" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">워크플로우 권한 상속</text>

  <!-- Arrow -->
  <line x1="220" y1="108" x2="280" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="250" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">login</text>

  <!-- GHCR -->
  <rect x="280" y="68" width="200" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="380" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">ghcr.io</text>
  <text x="380" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ghcr.io/{owner}/{image}</text>
  <text x="380" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">퍼블릭/프라이빗 지원</text>

  <!-- Arrow to deploy -->
  <line x1="480" y1="108" x2="540" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="510" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">pull</text>

  <!-- Deploy targets -->
  <rect x="540" y="68" width="160" height="36" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="620" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Kubernetes / k3s</text>

  <rect x="540" y="116" width="160" height="36" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="620" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Docker Compose</text>

  <!-- Visibility section -->
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">패키지 가시성 모델</text>

  <rect x="40" y="208" width="240" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Public</text>
  <text x="160" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인증 없이 pull 가능</text>
  <text x="160" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GitHub 리포지토리 공개 여부 연동</text>

  <rect x="320" y="208" width="240" height="80" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Internal</text>
  <text x="440" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">조직 멤버만 접근</text>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GitHub Organization 전용</text>

  <rect x="600" y="208" width="240" height="80" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Private</text>
  <text x="720" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">명시적 권한 부여 필요</text>
  <text x="720" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PAT 또는 GITHUB_TOKEN</text>

  <!-- Code block: workflow snippet -->
  <rect x="40" y="312" width="800" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># .github/workflows/docker-publish.yml (핵심 부분)</text>
  <text x="56" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">      - <tspan fill="#7ec8e3" font-weight="600">uses</tspan>: docker/login-action@v3</text>
  <text x="56" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        <tspan fill="#7ec8e3" font-weight="600">with</tspan>: { registry: ghcr.io, username: <tspan fill="#ce9178">${{ github.actor }}</tspan>,</text>
  <text x="56" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">               password: <tspan fill="#ce9178">${{ secrets.GITHUB_TOKEN }}</tspan> }</text>
  <text x="56" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">      - <tspan fill="#7ec8e3" font-weight="600">uses</tspan>: docker/build-push-action@v5</text>
  <text x="56" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        <tspan fill="#7ec8e3" font-weight="600">with</tspan>: { push: <tspan fill="#b5cea8">true</tspan>, tags: ghcr.io/<tspan fill="#ce9178">${{ github.repository }}</tspan>:latest }</text>
</svg>
