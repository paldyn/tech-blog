<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dependency Confusion 방어: .npmrc / pip.conf 설정</text>

  <!-- Left: npm scope + registry -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">npm 내부 레지스트리 고정</text>
  <rect x="40" y="92" width="380" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># .npmrc</text>
  <text x="56" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 스코프 패키지는 내부만</text>
  <text x="56" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">@company</text>
  <text x="56" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        :registry=</text>
  <text x="56" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">                   https://art.corp/npm/</text>
  <text x="56" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 공개 레지스트리 병행 허용</text>
  <text x="56" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">registry=https://registry.npmjs.org</text>
  <text x="56" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># lockfileVersion 2 이상: 무결성 해시</text>
  <text x="56" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">npm ci</text>
  <text x="56" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">       # lock 파일 엄격 적용</text>

  <!-- Right: pip -->
  <text x="470" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Python pip 내부 레지스트리 고정</text>
  <rect x="450" y="92" width="390" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># pip.conf (또는 pip.ini)</text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">[global]</text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">index-url</text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">          = https://art.corp/pypi/</text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">extra-index-url</text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">                 =</text>
  <text x="466" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  https://pypi.org/simple/</text>
  <text x="466" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># --no-index 로 공개 레지스트리 차단</text>
  <text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># requirements.txt 에 해시 고정</text>

  <!-- Bottom: scan tools -->
  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">의존성 스캔 도구</text>
  <rect x="40" y="314" width="260" height="72" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">npm audit / yarn audit</text>
  <text x="170" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">알려진 CVE 스캔</text>
  <text x="170" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">lock 파일 기반 분석</text>

  <rect x="320" y="314" width="240" height="72" rx="8" fill="#0f200f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Snyk / OWASP Dep-Check</text>
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">CI/CD 통합 자동화</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">SBOM 생성 지원</text>

  <rect x="580" y="314" width="260" height="72" rx="8" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Socket.dev / Sigstore</text>
  <text x="710" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">패키지 서명 검증</text>
  <text x="710" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">공급망 공격 탐지</text>
</svg>
