<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">주요 Plumbing 명령 대응표</text>

  <!-- Porcelain header -->
  <rect x="60" y="68" width="350" height="36" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">Porcelain (고수준)</text>

  <!-- Plumbing header -->
  <rect x="470" y="68" width="350" height="36" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="645" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Plumbing (저수준)</text>

  <!-- Row 1 -->
  <rect x="60" y="116" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="235" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">git add</text>

  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">→</text>

  <rect x="470" y="116" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="645" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">hash-object -w + update-index</text>

  <!-- Row 2 -->
  <rect x="60" y="162" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="235" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">git commit</text>

  <text x="440" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">→</text>

  <rect x="470" y="162" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="645" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">write-tree + commit-tree</text>

  <!-- Row 3 -->
  <rect x="60" y="208" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="235" y="232" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">git show</text>

  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">→</text>

  <rect x="470" y="208" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="645" y="232" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">cat-file -p</text>

  <!-- Row 4 -->
  <rect x="60" y="254" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="235" y="278" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">git branch new &lt;sha&gt;</text>

  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">→</text>

  <rect x="470" y="254" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="645" y="278" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">update-ref refs/heads/new</text>

  <!-- Row 5 -->
  <rect x="60" y="300" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="235" y="324" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">git ls-files</text>

  <text x="440" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">→</text>

  <rect x="470" y="300" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="645" y="324" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ls-files --stage</text>

  <!-- Row 6 -->
  <rect x="60" y="346" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="235" y="370" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">git log --oneline</text>

  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">→</text>

  <rect x="470" y="346" width="350" height="38" rx="4" fill="#111111" stroke="#555" stroke-width="1"/>
  <text x="645" y="370" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">rev-list + cat-file</text>

  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">Porcelain 출력은 Git 버전에 따라 바뀔 수 있음 | Plumbing은 하위 호환성 보장</text>
</svg>
