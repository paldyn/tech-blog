<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">API 보안 계층 구조</text>

  <!-- Left: Request path -->
  <text x="200" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">요청 흐름 (클라이언트 → 서버)</text>

  <!-- Client -->
  <rect x="60" y="92" width="110" height="44" rx="6" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="115" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">클라이언트</text>

  <line x1="170" y1="114" x2="200" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Layer 1: TLS -->
  <rect x="200" y="92" width="140" height="44" rx="6" fill="#0d1a1a" stroke="#2a5a5a" stroke-width="1"/>
  <text x="270" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">1. 전송 보안</text>
  <text x="270" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TLS 1.3, HSTS</text>

  <line x1="340" y1="114" x2="370" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Layer 2: Auth -->
  <rect x="370" y="92" width="140" height="44" rx="6" fill="#1a0d0d" stroke="#5a2a2a" stroke-width="1"/>
  <text x="440" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">2. 인증/인가</text>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JWT, OAuth2, API Key</text>

  <line x1="510" y1="114" x2="540" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Layer 3: Rate Limit -->
  <rect x="540" y="92" width="140" height="44" rx="6" fill="#1a1a0d" stroke="#5a5a2a" stroke-width="1"/>
  <text x="610" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">3. 속도 제한</text>
  <text x="610" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Rate Limiting, Throttle</text>

  <line x1="680" y1="114" x2="710" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Layer 4: API -->
  <rect x="710" y="92" width="110" height="44" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="765" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">4. API 서버</text>
  <text x="765" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비즈니스 로직</text>

  <!-- Security principles grid -->
  <text x="60" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">API 보안 핵심 원칙</text>

  <!-- Row 1 -->
  <rect x="60" y="180" width="180" height="68" rx="6" fill="#0d1a2e" stroke="#1a3a5e" stroke-width="1"/>
  <text x="150" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">입력 검증</text>
  <text x="150" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모든 파라미터 유형/</text>
  <text x="150" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">범위/길이 검사</text>

  <rect x="260" y="180" width="180" height="68" rx="6" fill="#1a0d2e" stroke="#3a1a5e" stroke-width="1"/>
  <text x="350" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">최소 노출</text>
  <text x="350" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">필요한 데이터만</text>
  <text x="350" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답에 포함</text>

  <rect x="460" y="180" width="180" height="68" rx="6" fill="#0d2e1a" stroke="#1a5e3a" stroke-width="1"/>
  <text x="550" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">권한 검사</text>
  <text x="550" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">객체 수준(BOLA)/</text>
  <text x="550" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">기능 수준 모두</text>

  <rect x="660" y="180" width="160" height="68" rx="6" fill="#2e1a0d" stroke="#5e3a1a" stroke-width="1"/>
  <text x="740" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">에러 처리</text>
  <text x="740" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스택트레이스·</text>
  <text x="740" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">내부 경로 노출 금지</text>

  <!-- Row 2 -->
  <rect x="60" y="264" width="180" height="68" rx="6" fill="#2e1a0d" stroke="#5e3a1a" stroke-width="1"/>
  <text x="150" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">속도 제한</text>
  <text x="150" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DDoS, 브루트포스</text>
  <text x="150" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">크리덴셜 스터핑 방어</text>

  <rect x="260" y="264" width="180" height="68" rx="6" fill="#0d2e1a" stroke="#1a5e3a" stroke-width="1"/>
  <text x="350" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">보안 헤더</text>
  <text x="350" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Content-Type 강제</text>
  <text x="350" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CORS 명확한 설정</text>

  <rect x="460" y="264" width="180" height="68" rx="6" fill="#0d1a2e" stroke="#1a3a5e" stroke-width="1"/>
  <text x="550" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">감사 로그</text>
  <text x="550" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">요청/응답 로깅</text>
  <text x="550" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이상 탐지 연동</text>

  <rect x="660" y="264" width="160" height="68" rx="6" fill="#1a0d2e" stroke="#3a1a5e" stroke-width="1"/>
  <text x="740" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">버전 관리</text>
  <text x="740" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구버전 API</text>
  <text x="740" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">빠른 Deprecation</text>

  <!-- OWASP API Top 10 preview -->
  <rect x="60" y="350" width="760" height="120" rx="8" fill="#111111" stroke="#222222" stroke-width="1"/>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">OWASP API Security Top 10 (2023) 요약</text>

  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">API1</text>
  <text x="110" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BOLA(Broken Object Level Auth)</text>
  <text x="310" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">API2</text>
  <text x="340" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인증 실패</text>
  <text x="490" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">API3</text>
  <text x="520" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">객체 속성 권한 실패</text>
  <text x="700" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">API4</text>
  <text x="730" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자원 과소비</text>

  <text x="80" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">API5</text>
  <text x="110" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BFLA(기능 수준 권한 실패)</text>
  <text x="310" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">API6</text>
  <text x="340" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">민감 비즈니스 흐름 노출</text>
  <text x="490" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">API7</text>
  <text x="520" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버 사이드 요청 위조</text>
  <text x="700" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">API8</text>
  <text x="730" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">보안 설정 오류</text>

  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">API9</text>
  <text x="110" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">부적절한 인벤토리 관리</text>
  <text x="310" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">API10</text>
  <text x="356" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">안전하지 않은 API 사용</text>
  <text x="490" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 항목은 이후 글에서 상세히 다룹니다</text>
  <text x="490" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">&#x2192;</text>
</svg>
