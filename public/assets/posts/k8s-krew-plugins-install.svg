<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">krew 설치 및 플러그인 관리</text>

  <!-- krew architecture box at top -->
  <rect x="300" y="68" width="280" height="56" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">krew (kubectl 플러그인 매니저)</text>

  <!-- Arrow -->
  <line x1="440" y1="124" x2="440" y2="144" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Plugin index -->
  <rect x="200" y="144" width="480" height="44" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="170" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Plugin Index: github.com/kubernetes-sigs/krew-index</text>

  <!-- Code block: installation + usage -->
  <rect x="60" y="212" width="760" height="196" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Install krew -->
  <text x="76" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 1. krew 설치 (공식 스크립트)</text>
  <text x="76" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">(set -x; cd </text>
  <text x="168" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"$(mktemp -d)"</text>
  <text x="286" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> &amp;&amp; \</text>

  <text x="76" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># PATH 추가: export PATH="$PATH:$HOME/.krew/bin"</text>

  <text x="76" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 2. 플러그인 검색 / 설치 / 제거</text>
  <text x="76" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">kubectl</text>
  <text x="132" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> krew search ctx</text>

  <text x="76" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">kubectl</text>
  <text x="132" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> krew install ctx ns neat stern</text>

  <text x="76" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">kubectl</text>
  <text x="132" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> krew upgrade     </text>
  <text x="310" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 전체 업그레이드</text>

  <text x="76" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 설치된 플러그인 목록</text>
  <text x="76" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">kubectl</text>
  <text x="132" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> plugin list</text>

  <!-- Label -->
  <text x="440" y="430" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">~/.krew/bin 경로를 PATH에 추가해야 플러그인이 인식됨</text>
</svg>
