<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">perf 서브명령 구조</text>

  <!-- Defs -->
  <defs>
    <marker id="parr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- perf command center -->
  <rect x="360" y="80" width="160" height="52" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="102" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#7ec8e3">perf</text>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Linux 성능 분석 도구</text>

  <!-- stat branch -->
  <line x1="360" y1="106" x2="200" y2="175" stroke="#55c555" stroke-width="1.5" marker-end="url(#parr)"/>
  <rect x="60" y="175" width="140" height="52" rx="8" fill="#071407" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="197" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">perf stat</text>
  <text x="130" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이벤트 카운트 요약</text>

  <!-- record branch -->
  <line x1="390" y1="132" x2="240" y2="190" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#parr)"/>
  <rect x="210" y="175" width="150" height="52" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="285" y="197" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">perf record</text>
  <text x="285" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">샘플 수집 → perf.data</text>

  <!-- report branch -->
  <line x1="440" y1="132" x2="440" y2="175" stroke="#e0a055" stroke-width="1.5" marker-end="url(#parr)"/>
  <rect x="370" y="175" width="140" height="52" rx="8" fill="#120c00" stroke="#e0a055" stroke-width="1.5"/>
  <text x="440" y="197" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#e0a055">perf report</text>
  <text x="440" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">perf.data 분석·출력</text>

  <!-- top branch -->
  <line x1="490" y1="132" x2="600" y2="190" stroke="#7777cc" stroke-width="1.5" marker-end="url(#parr)"/>
  <rect x="520" y="175" width="140" height="52" rx="8" fill="#0a0a20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="590" y="197" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7777cc">perf top</text>
  <text x="590" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실시간 핫스팟 표시</text>

  <!-- script branch -->
  <line x1="520" y1="106" x2="710" y2="175" stroke="#e05555" stroke-width="1.5" marker-end="url(#parr)"/>
  <rect x="680" y="175" width="140" height="52" rx="8" fill="#150808" stroke="#e05555" stroke-width="1.5"/>
  <text x="750" y="197" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#e05555">perf script</text>
  <text x="750" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원시 이벤트 스트림</text>

  <!-- Code examples for each -->
  <!-- stat -->
  <rect x="60" y="250" width="245" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># IPC, cache-miss 요약</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">perf stat -d ./mybinary</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">perf stat -p 1234 sleep 5</text>

  <!-- record + report -->
  <rect x="315" y="250" width="245" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="331" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 샘플 수집 후 보고</text>
  <text x="331" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">perf record -g ./mybinary</text>
  <text x="331" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">perf report --stdio</text>

  <!-- top + script -->
  <rect x="570" y="250" width="250" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="586" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 실시간 / 스택 트레이스</text>
  <text x="586" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">perf top -g          <tspan fill="#9aa4b8"># 실시간</tspan></text>
  <text x="586" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">perf script | head   <tspan fill="#9aa4b8"># 원시</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">perf stat 출력 예</text>
  <rect x="60" y="380" width="760" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> 1,234,567      cache-misses          <tspan fill="#9aa4b8">#    2.34% of all cache refs</tspan></text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">       0.85      insns per cycle       <tspan fill="#9aa4b8">#  IPC (낮으면 메모리 바운드)</tspan></text>
</svg>
