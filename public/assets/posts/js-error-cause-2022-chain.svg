<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Error cause — 에러 원인 체인 (ES2022)</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">레이어마다 래핑하면서도 근본 원인이 보존됨</text>

  <!-- API layer error (root cause) -->
  <rect x="50" y="90" width="780" height="70" rx="8" fill="#0a0a14" stroke="#555"/>
  <text x="70" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">FetchError: HTTP 500 Internal Server Error</text>
  <text x="70" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">.cause: undefined   ←   근본 원인 (API 계층)</text>

  <!-- Arrow -->
  <line x1="440" y1="160" x2="440" y2="186" stroke="#7777cc" stroke-width="2"/>
  <polygon points="433,179 440,188 447,179" fill="#7777cc"/>
  <text x="460" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">.cause =</text>

  <!-- Service layer error -->
  <rect x="50" y="188" width="780" height="70" rx="8" fill="#0d1020" stroke="#7777cc"/>
  <text x="70" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">UserServiceError: 사용자 ID=42 로드 실패</text>
  <text x="70" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.cause: FetchError   ←   서비스 계층</text>

  <!-- Arrow -->
  <line x1="440" y1="258" x2="440" y2="284" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="433,277 440,286 447,277" fill="#7ec8e3"/>
  <text x="460" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">.cause =</text>

  <!-- UI layer error -->
  <rect x="50" y="286" width="780" height="70" rx="8" fill="#071520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="70" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">DashboardError: 대시보드 초기화 실패</text>
  <text x="70" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.cause: UserServiceError → .cause: FetchError   ←   UI 계층</text>

  <!-- Bottom: code -->
  <rect x="50" y="374" width="780" height="78" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="66" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 근본 원인까지 순회</text>
  <text x="66" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">function</tspan><tspan fill="#e8e8e8"> getRootCause(e) {</tspan></text>
  
  <text x="66" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  while</tspan><tspan fill="#e8e8e8"> (e.cause </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#e8e8e8"> Error) e = e.cause;</tspan></text>

  <text x="66" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  return</tspan><tspan fill="#e8e8e8"> e;</tspan><tspan fill="#6a8aa0">// DashboardError → UserServiceError → FetchError</tspan></text>

</svg>
