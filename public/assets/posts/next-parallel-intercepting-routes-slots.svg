<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 0 L 7 13 L 13 0 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">병렬 라우트 — @slot 파일 구조</text>

  <!-- Left: File structure -->
  <rect x="50" y="68" width="360" height="380" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="230" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">파일 구조</text>

  <rect x="68" y="108" width="324" height="324" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">app/dashboard/</text>
  <text x="84" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">├── layout.tsx</text>
  <text x="84" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">├── page.tsx</text>
  <text x="84" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">├── @analytics/</text>
  <text x="84" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">│   ├── page.tsx</text>
  <text x="84" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">│   └── revenue/</text>
  <text x="84" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">│       └── page.tsx</text>
  <text x="84" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">└── @users/</text>
  <text x="84" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">    ├── page.tsx</text>
  <text x="84" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">    └── default.tsx</text>
  <text x="84" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// @ 로 시작하는 폴더 = 슬롯</text>
  <text x="84" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// URL에 포함되지 않음</text>
  <text x="84" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// layout.tsx에서 props로 수신</text>
  <text x="84" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// /dashboard/analytics/revenue</text>
  <text x="84" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// → @analytics/revenue/page.tsx</text>

  <!-- Right: Layout props usage -->
  <rect x="470" y="68" width="360" height="380" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="650" y="96" text-anchor="middle"
