  <rect x="488" y="108" width="324" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="504" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// app/dashboard/layout.tsx</text>
  <text x="504" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export default function</text>
  <text x="504" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  DashLayout({</text>
  <text x="504" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  children,</text>
  <text x="504" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">  analytics,</text>
  <text x="504" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">  users,</text>
  <text x="504" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}) {</text>
  <text x="504" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  return (</text>
  <text x="504" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    &lt;div&gt;{analytics}{users}&lt;/div&gt;</text>
  <text x="504" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  )}</text>

  <!-- Visual slots diagram -->
  <rect x="488" y="344" width="324" height="90" rx="6" fill="#1a1a2e" stroke="#5a5a8e" stroke-width="1"/>
  <text x="650" y="366" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">렌더링 결과 (/dashboard)</text>
  <rect x="504" y="376" width="130" height="44" rx="4" fill="#1a2a3a" stroke="#3a5a7e" stroke-width="1"/>
  <text x="569" y="402" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">@analytics</text>
  <rect x="650" y="376" width="130" height="44" rx="4" fill="#1a3a2a" stroke="#3a7a5e" stroke-width="1"/>
  <text x="715" y="402" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">@users</text>
</svg>
