<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring Boot 4가지 핵심 특징</text>
  <text x="440" y="65"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">복잡한 Spring 설정 없이 바로 실행 가능한 애플리케이션을 만드는 네 가지 핵심 축</text>

  <!-- Center: Spring Boot logo area -->
  <rect x="330" y="90" width="220" height="60" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="120"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">Spring Boot</text>
  <text x="440" y="140"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Convention over Configuration</text>

  <!-- Arrow top-left: Auto-Configuration -->
  <line x1="330" y1="110" x2="240" y2="190" stroke="#444" stroke-width="2"/>
  <polygon points="234,194 236,181 247,188" fill="#444"/>

  <!-- Box 1: Auto-Configuration (top-left) -->
  <rect x="60" y="195" width="280" height="90" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">① Auto-Configuration</text>
  <text x="200" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">클래스패스 기반 자동 설정</text>
  <text x="200" y="258"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">spring.factories / AutoConfiguration</text>
  <text x="200" y="276"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Conditional로 조건부 Bean 등록</text>

  <!-- Arrow top-right: Embedded Server -->
  <line x1="550" y1="110" x2="640" y2="190" stroke="#444" stroke-width="2"/>
  <polygon points="646,194 643,181 632,188" fill="#444"/>

  <!-- Box 2: Embedded Server (top-right) -->
  <rect x="540" y="195" width="280" height="90" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② Embedded Server</text>
  <text x="680" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tomcat / Jetty / Undertow 내장</text>
  <text x="680" y="258"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">외부 WAS 없이 단독 실행 가능</text>
  <text x="680" y="276"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">java -jar app.jar 로 즉시 기동</text>

  <!-- Arrow bottom-left: Opinionated Starter -->
  <line x1="330" y1="140" x2="240" y2="325" stroke="#444" stroke-width="2"/>
  <polygon points="234,329 238,316 249,322" fill="#444"/>

  <!-- Box 3: Opinionated Starter (bottom-left) -->
  <rect x="60" y="335" width="280" height="90" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="360"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">③ Starter Dependencies</text>
  <text x="200" y="380"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">spring-boot-starter-* 의존성 묶음</text>
  <text x="200" y="398"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">버전 충돌 없는 검증된 조합 제공</text>
  <text x="200" y="416"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">개발자는 버전 명시 불필요</text>

  <!-- Arrow bottom-right: Production Ready -->
  <line x1="550" y1="140" x2="640" y2="325" stroke="#444" stroke-width="2"/>
  <polygon points="646,329 643,316 632,322" fill="#444"/>

  <!-- Box 4: Production Ready (bottom-right) -->
  <rect x="540" y="335" width="280" height="90" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="360"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">④ Production-Ready</text>
  <text x="680" y="380"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Actuator: 상태·메트릭·헬스 엔드포인트</text>
  <text x="680" y="398"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Micrometer 메트릭 수집</text>
  <text x="680" y="416"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">외부화 설정 · 프로파일 관리</text>

  <!-- Bottom label -->
  <text x="440" y="468"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">네 가지 특징이 결합해 "코드 작성에만 집중"하는 개발 경험을 제공</text>
</svg>
