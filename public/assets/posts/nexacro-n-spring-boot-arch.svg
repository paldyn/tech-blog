<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N + Spring Boot 통합 구조</text>

  <!-- Nexacro N side -->
  <rect x="40" y="80" width="240" height="380" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Nexacro N</text>
  <text x="160" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HTML5 클라이언트</text>

  <rect x="64" y="150" width="192" height="44" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Form / Script</text>
  <text x="160" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">UI 로직</text>

  <rect x="64" y="206" width="192" height="44" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Dataset / Variable</text>
  <text x="160" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 모델</text>

  <rect x="64" y="262" width="192" height="44" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">transaction()</text>
  <text x="160" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서버 통신 API</text>

  <!-- Arrow -->
  <line x1="280" y1="270" x2="350" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="315" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">PL</text>

  <line x1="350" y1="300" x2="280" y2="300" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="315" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">PL</text>

  <!-- Spring Boot side -->
  <rect x="360" y="80" width="480" height="380" rx="10" fill="#14200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="600" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Spring Boot</text>

  <!-- Adapter layer -->
  <rect x="384" y="130" width="200" height="80" rx="6" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="484" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">NexacroController</text>
  <text x="484" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">어댑터 진입점</text>
  <text x="484" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@RequestMapping("/svc")</text>

  <!-- Service layer -->
  <rect x="384" y="230" width="200" height="80" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="484" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">@NexaService</text>
  <text x="484" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서비스 클래스</text>
  <text x="484" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">search / save / delete</text>

  <!-- Repository layer -->
  <rect x="384" y="330" width="200" height="80" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="484" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Repository / Mapper</text>
  <text x="484" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JPA / MyBatis</text>
  <text x="484" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL 실행</text>

  <!-- Spring internal arrows -->
  <line x1="484" y1="210" x2="484" y2="230" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="484" y1="310" x2="484" y2="330" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DB box -->
  <rect x="620" y="230" width="180" height="180" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="710" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Database</text>
  <text x="710" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PostgreSQL</text>
  <text x="710" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MySQL</text>
  <text x="710" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Oracle</text>
  <text x="710" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MSSQL</text>

  <line x1="584" y1="370" x2="620" y2="370" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
