<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">잔차 연결이 기울기 흐름을 개선하는 이유</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">역전파 시 기울기 경로 비교</text>

  <!-- Without skip (left) -->
  <text x="190" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">일반 네트워크 (기울기 소실)</text>

  <!-- Blocks without skip -->
  <rect x="140" y="120" width="100" height="36" fill="#1a0d0d" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="190" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Layer N</text>

  <polygon points="190,165 184,156 196,156" fill="#e05555" stroke="#8a1515" stroke-width="1"/>
  <line x1="190" y1="156" x2="190" y2="170" stroke="#e05555" stroke-width="2"/>
  <text x="215" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">×0.5</text>

  <rect x="140" y="170" width="100" height="36" fill="#1a0d0d" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="190" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Layer N-1</text>

  <polygon points="190,215 184,206 196,206" fill="#e05555" stroke="#8a1515" stroke-width="1"/>
  <line x1="190" y1="206" x2="190" y2="220" stroke="#e05555" stroke-width="2"/>
  <text x="215" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">×0.5</text>

  <rect x="140" y="220" width="100" height="36" fill="#1a0d0d" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="190" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Layer N-2</text>

  <polygon points="190,265 184,256 196,256" fill="#e05555" stroke="#8a1515" stroke-width="1"/>
  <line x1="190" y1="256" x2="190" y2="270" stroke="#e05555" stroke-width="2"/>
  <text x="215" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">×0.5</text>

  <rect x="140" y="270" width="100" height="36" fill="#1a0d0d" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="190" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Layer 1</text>

  <text x="190" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">기울기: 0.5⁴ = 0.0625</text>
  <text x="190" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">100층: 0.5¹⁰⁰ ≈ 0</text>
  <text x="190" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">초기 레이어 학습 불가</text>

  <!-- With skip (right) -->
  <text x="640" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">ResNet (잔차 연결)</text>

  <rect x="590" y="120" width="100" height="36" fill="#0d1a0d" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Block N</text>

  <!-- Skip connections for right -->
  <line x1="690" y1="138" x2="750" y2="138" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="750" y1="138" x2="750" y2="194" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="750" y1="194" x2="698" y2="194" stroke="#55c555" stroke-width="2"/>

  <line x1="690" y1="194" x2="760" y2="194" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="760" y1="194" x2="760" y2="250" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="760" y1="250" x2="698" y2="250" stroke="#55c555" stroke-width="2"/>

  <line x1="690" y1="250" x2="770" y2="250" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="770" y1="250" x2="770" y2="306" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="770" y1="306" x2="698" y2="306" stroke="#55c555" stroke-width="2"/>

  <polygon points="640,165 634,156 646,156" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>
  <line x1="640" y1="156" x2="640" y2="170" stroke="#55c555" stroke-width="2"/>

  <rect x="590" y="170" width="100" height="36" fill="#0d1a0d" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Block N-1</text>

  <polygon points="640,215 634,206 646,206" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>
  <line x1="640" y1="206" x2="640" y2="220" stroke="#55c555" stroke-width="2"/>

  <rect x="590" y="220" width="100" height="36" fill="#0d1a0d" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Block N-2</text>

  <polygon points="640,265 634,256 646,256" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>
  <line x1="640" y1="256" x2="640" y2="270" stroke="#55c555" stroke-width="2"/>

  <rect x="590" y="270" width="100" height="36" fill="#0d1a0d" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Block 1</text>

  <text x="640" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">기울기: 최소 1.0 (스킵 경로)</text>
  <text x="640" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">100층도: 안정적 전달</text>
  <text x="640" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">고속도로(gradient highway)</text>

  <!-- Math center box -->
  <rect x="310" y="130" width="260" height="210" fill="#070b14" rx="8" stroke="#1e2433"/>
  <text x="440" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">역전파 수식</text>
  <line x1="325" y1="164" x2="555" y2="164" stroke="#1e2433" stroke-width="1"/>

  <text x="325" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">순전파:</text>
  <text x="325" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">H(x) = F(x) + x</text>

  <text x="325" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">역전파:</text>
  <text x="325" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">∂L/∂x = ∂L/∂H · (∂F/∂x + 1)</text>

  <line x1="325" y1="265" x2="555" y2="265" stroke="#1e2433" stroke-width="1"/>

  <text x="325" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">'+1' 항이 기울기 고속도로</text>
  <text x="325" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">∂F/∂x ≈ 0이어도 기울기 전달</text>
  <text x="325" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">→ 기울기 소실 방지</text>
</svg>
