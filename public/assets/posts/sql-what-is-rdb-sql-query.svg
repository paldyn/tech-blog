<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SQL로 데이터 조회하기</text>

  <!-- SQL Query box -->
  <rect x="60" y="66" width="380" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">SELECT</text>
  <text x="90" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  c.이름,</text>
  <text x="90" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  o.제품명,</text>
  <text x="90" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  o.금액</text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">FROM</text>
  <text x="90" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  고객 c</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">JOIN</text>
  <text x="90" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  주문 o</text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ON</text>
  <text x="90" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  c.고객ID = o.고객ID;</text>

  <!-- Arrow -->
  <line x1="452" y1="165" x2="488" y2="165" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="466" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">결과</text>

  <!-- Result table -->
  <rect x="490" y="66" width="330" height="200" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="490" y="66" width="330" height="24" rx="6" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="655" y="83" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">결과 (Result Set)</text>
  <line x1="490" y1="90" x2="820" y2="90" stroke="#2a3a5a" stroke-width="1"/>
  <text x="510" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이름</text>
  <text x="580" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">제품명</text>
  <text x="700" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">금액</text>
  <line x1="490" y1="110" x2="820" y2="110" stroke="#1e1e3e" stroke-width="1"/>
  <text x="510" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">홍길동</text>
  <text x="580" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">노트북</text>
  <text x="700" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#b5cea8">1,200,000</text>
  <line x1="490" y1="130" x2="820" y2="130" stroke="#1e1e3e" stroke-width="1"/>
  <text x="510" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">홍길동</text>
  <text x="580" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">마우스</text>
  <text x="700" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#b5cea8">35,000</text>
  <line x1="490" y1="150" x2="820" y2="150" stroke="#1e1e3e" stroke-width="1"/>
  <text x="510" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">이순신</text>
  <text x="580" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">키보드</text>
  <text x="700" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#b5cea8">85,000</text>
  <text x="655" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JOIN으로 두 테이블이 연결됨</text>
  <text x="655" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ 선언형: "어떤 데이터"만 기술</text>
  <text x="655" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">처리 방법은 DBMS가 최적화</text>

  <!-- Bottom features -->
  <rect x="60" y="290" width="760" height="108" rx="8" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="440" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">RDB를 선택하는 이유</text>

  <text x="160" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">데이터 무결성</text>
  <text x="160" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">제약 조건으로 잘못된</text>
  <text x="160" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">데이터 저장 차단</text>

  <text x="440" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">트랜잭션(ACID)</text>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">원자성, 일관성, 격리성,</text>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">지속성 보장</text>

  <text x="720" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" font-weight="600">표준 SQL</text>
  <text x="720" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이식성 높고 생태계 풍부</text>
  <text x="720" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인재 Pool도 가장 광범위</text>
</svg>
