<svg width="880" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">커스텀 Starter 만들기</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Auto-Configuration 클래스 + imports 파일 + starter 모듈 — 세 파일로 완성</text>

  <!-- Left: AutoConfiguration class -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">1. AutoConfiguration 클래스</text>
  <rect x="60" y="114" width="370" height="198" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">@AutoConfiguration</tspan></text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">@ConditionalOnClass</tspan><tspan fill="#e8e8e8">(SlackClient.class)</tspan></text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">public class </tspan><tspan fill="#e8e8e8">SlackAutoConfiguration {</tspan></text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> </text>
  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">@Bean</tspan></text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">@ConditionalOnMissingBean</tspan></text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">public </tspan><tspan fill="#e8e8e8">SlackClient slackClient(</tspan></text>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      <tspan fill="#e8e8e8">SlackProperties props) {</tspan></text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">return new </tspan><tspan fill="#e8e8e8">SlackClient(props.getToken());</tspan></text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#e8e8e8">}</tspan></text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">}</tspan></text>

  <!-- Right top: imports file -->
  <text x="450" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">2. AutoConfiguration.imports 파일</text>
  <rect x="450" y="114" width="370" height="90" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="466" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve"># META-INF/spring/</text>
  <text x="466" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve"># org.springframework.boot.autoconfigure</text>
  <text x="466" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve"># .AutoConfiguration.imports</text>
  <text x="466" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">io.paldyn.slack.SlackAutoConfiguration</text>

  <!-- Right bottom: starter build.gradle -->
  <text x="450" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">3. starter 모듈 build.gradle</text>
  <rect x="450" y="236" width="370" height="180" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="466" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">dependencies </tspan><tspan fill="#e8e8e8">{</tspan></text>
  <text x="466" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#6a8aa0">// autoconfigure 모듈을 포함</tspan></text>
  <text x="466" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">api</tspan><tspan fill="#e8e8e8">(project(</tspan><tspan fill="#ce9178">':slack-autoconfigure'</tspan><tspan fill="#e8e8e8">))</tspan></text>
  <text x="466" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> </text>
  <text x="466" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#6a8aa0">// Boot starter 기본 포함</tspan></text>
  <text x="466" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">api</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'org.springframework.boot:</tspan></text>
  <text x="466" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">       <tspan fill="#ce9178">spring-boot-starter'</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="466" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">}</tspan></text>

  <!-- Bottom note -->
  <text x="60" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">모듈 구조 (권장)</text>
  <rect x="60" y="352" width="370" height="78" fill="#111" rx="4" stroke="#555" stroke-width="1"/>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">paldyn-slack/</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">├── slack-autoconfigure/     <tspan fill="#6a8aa0">← 로직</tspan></text>
  <text x="76" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">└── paldyn-slack-spring-boot-starter/  <tspan fill="#6a8aa0">← 묶음</tspan></text>
</svg>
