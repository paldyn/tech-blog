<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="68" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="56" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="36" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">DBSCAN: 세 가지 포인트 유형</text>
  <text x="60" y="58" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">핵심(Core) · 경계(Border) · 잡음(Noise) 포인트와 ε 반경</text>
  <line x1="60" y1="78" x2="820" y2="78" stroke="#1e2433" stroke-width="1"/>

  <!-- Main visualization area -->
  <rect x="60" y="88" width="480" height="272" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="80" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">ε=50, MinPts=4 기준 분류</text>

  <!-- ===== CORE POINT (green, center-left cluster) ===== -->
  <!-- Dense cluster: points around (220, 200) -->
  <!-- Surrounding points in epsilon radius -->
  <circle cx="205" cy="175" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="240" cy="168" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="255" cy="195" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="248" cy="220" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="215" cy="228" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="185" cy="210" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="190" cy="190" r="5" fill="#55c555" opacity="0.85"/>

  <!-- Core point (larger, bright) -->
  <circle cx="220" cy="200" r="50" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <circle cx="220" cy="200" r="8" fill="#55c555"/>
  <text x="224" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0a0a0a">C</text>
  <text x="222" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">핵심 포인트</text>
  <!-- Epsilon label -->
  <text x="262" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">ε</text>

  <!-- ===== BORDER POINT (info blue, on the edge) ===== -->
  <!-- Border point: within epsilon of core but doesn't have enough neighbors itself -->
  <circle cx="270" cy="202" r="5" fill="#7ec8e3" opacity="0.9"/>
  <!-- Show it's within epsilon of the core point -->
  <line x1="220" y1="200" x2="270" y2="202" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Another border point cluster -->
  <circle cx="105" cy="195" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="115" cy="215" r="5" fill="#7ec8e3" opacity="0.9"/>
  <!-- Their own epsilon circles (smaller, dashed) -->
  <circle cx="105" cy="195" r="50" fill="none" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,5" opacity="0.3"/>

  <!-- Border label -->
  <text x="76" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">경계 포인트</text>
  <text x="76" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(ε 내 이웃 &lt; MinPts)</text>

  <!-- ===== SECOND DENSE CLUSTER (right side) ===== -->
  <circle cx="395" cy="175" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="415" cy="160" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="435" cy="178" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="425" cy="200" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="405" cy="210" r="5" fill="#55c555" opacity="0.85"/>
  <circle cx="385" cy="195" r="5" fill="#55c555" opacity="0.85"/>
  <!-- Core in second cluster -->
  <circle cx="415" cy="188" r="50" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <circle cx="415" cy="188" r="8" fill="#55c555"/>
  <text x="419" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0a0a0a">C</text>

  <!-- ===== NOISE POINTS (red X) ===== -->
  <!-- Isolated points far from any cluster -->
  <circle cx="130" cy="130" r="6" fill="#e05555" opacity="0.9"/>
  <line x1="124" y1="124" x2="136" y2="136" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="136" y1="124" x2="124" y2="136" stroke="#0a0a0a" stroke-width="2"/>

  <circle cx="465" cy="245" r="6" fill="#e05555" opacity="0.9"/>
  <line x1="459" y1="239" x2="471" y2="251" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="471" y1="239" x2="459" y2="251" stroke="#0a0a0a" stroke-width="2"/>

  <circle cx="155" cy="285" r="6" fill="#e05555" opacity="0.9"/>
  <line x1="149" y1="279" x2="161" y2="291" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="161" y1="279" x2="149" y2="291" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Noise labels -->
  <text x="140" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">잡음</text>
  <text x="476" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">잡음</text>

  <!-- Cluster 1 and 2 boundary -->
  <text x="170" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">군집 1</text>
  <text x="390" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">군집 2</text>

  <!-- ===== RIGHT: Legend and explanation ===== -->
  <rect x="564" y="88" width="256" height="272" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="584" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">포인트 유형 정의</text>

  <!-- Core -->
  <circle cx="594" cy="140" r="8" fill="#55c555"/>
  <text x="594" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0a0a0a">C</text>
  <text x="610" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">핵심 포인트</text>
  <text x="610" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ε 반경 내 이웃 ≥ MinPts</text>
  <text x="610" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">군집의 "씨앗" 역할</text>

  <!-- Border -->
  <circle cx="594" cy="198" r="6" fill="#7ec8e3" opacity="0.9"/>
  <text x="610" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">경계 포인트</text>
  <text x="610" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">핵심 포인트의 ε 내에 있음</text>
  <text x="610" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자신은 핵심 조건 불만족</text>

  <!-- Noise -->
  <circle cx="594" cy="255" r="6" fill="#e05555" opacity="0.9"/>
  <line x1="588" y1="249" x2="600" y2="261" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="600" y1="249" x2="588" y2="261" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="610" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">잡음 포인트</text>
  <text x="610" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">어느 군집에도 속하지 않음</text>
  <text x="610" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">→ 이상치(Outlier) 탐지</text>

  <!-- Parameters box -->
  <rect x="584" y="305" width="218" height="42" rx="6" fill="#111825" stroke="#7777cc" stroke-width="1"/>
  <text x="598" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" font-weight="600">파라미터: ε, MinPts</text>
  <text x="598" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DBSCAN(eps=0.5, min_samples=4)</text>

  <!-- Footer -->
  <text x="440" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
