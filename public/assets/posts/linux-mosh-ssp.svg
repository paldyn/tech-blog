<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">mosh SSP — 로컬 에코 예측 동작 원리</text>

  <!-- Client state -->
  <rect x="60" y="72" width="220" height="180" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트</text>
  <rect x="80" y="108" width="180" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="170" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">mosh-client</text>
  <text x="170" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로컬 상태 복사본 보유</text>
  <rect x="80" y="152" width="180" height="36" rx="4" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="170" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">입력 즉시 로컬 에코</text>
  <text x="170" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(예측값 — 밑줄 표시)</text>
  <rect x="80" y="196" width="180" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="170" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서버 확인 후 확정</text>
  <text x="170" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예측 틀리면 화면 수정</text>

  <!-- Network -->
  <rect x="340" y="100" width="200" height="120" rx="8" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">UDP 네트워크</text>
  <text x="440" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">비신뢰적 / 고지연</text>
  <text x="440" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle">패킷 유실 OK</text>
  <text x="440" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle">순서 바뀜 OK</text>
  <text x="440" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle">중복 OK</text>

  <!-- Server -->
  <rect x="600" y="72" width="220" height="180" rx="8" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="710" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">서버</text>
  <rect x="620" y="108" width="180" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="710" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">mosh-server</text>
  <text x="710" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 터미널 상태 관리</text>
  <rect x="620" y="152" width="180" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="710" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">화면 diff 전송</text>
  <text x="710" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">변경된 화면 부분만</text>
  <rect x="620" y="196" width="180" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="710" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">IP 변경 감지·수용</text>
  <text x="710" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">새 IP에서 패킷 수신</text>

  <!-- Arrows -->
  <line x1="280" y1="148" x2="340" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="310" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">keystroke</text>

  <line x1="540" y1="160" x2="600" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="148" x2="540" y2="148" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <text x="570" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">→ 입력</text>
  <text x="570" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">← 화면 diff</text>

  <!-- IP change scenario -->
  <rect x="60" y="276" width="760" height="86" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 서버에 mosh-server 설치 필요 (클라이언트·서버 모두)</text>
  <text x="80" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Debian/Ubuntu:</text>
  <text x="80" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">apt</text>
  <text x="106" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> install mosh</text>
  <text x="80" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 방화벽에서 UDP 60001-60010 허용 필요</text>
</svg>
