<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GET vs POST — 실무 사용 기준</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">언제 어떤 메서드를 써야 할까?</text>

  <!-- GET use cases -->
  <rect x="60" y="90" width="360" height="290" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">GET 사용 상황</text>

  <rect x="80" y="128" width="320" height="36" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">페이지 조회 · 검색 결과</text>

  <rect x="80" y="172" width="320" height="36" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">API 데이터 조회 (GET /users)</text>

  <rect x="80" y="216" width="320" height="36" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">이미지·CSS·JS 파일 요청</text>

  <rect x="80" y="260" width="320" height="36" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">필터·정렬 쿼리스트링</text>

  <rect x="80" y="304" width="320" height="56" rx="5" fill="#111" stroke="#2a3a2a" stroke-width="1"/>
  <text x="100" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GET /products?category=phone</text>
  <text x="100" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">   &amp;sort=price&amp;page=2</text>

  <!-- POST use cases -->
  <rect x="460" y="90" width="360" height="290" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555" text-anchor="middle">POST 사용 상황</text>

  <rect x="480" y="128" width="320" height="36" rx="5" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">로그인 · 회원가입 폼 제출</text>

  <rect x="480" y="172" width="320" height="36" rx="5" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">리소스 생성 (POST /orders)</text>

  <rect x="480" y="216" width="320" height="36" rx="5" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">파일 업로드 (multipart)</text>

  <rect x="480" y="260" width="320" height="36" rx="5" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">JSON 바디로 복잡한 쿼리 전달</text>

  <rect x="480" y="304" width="320" height="56" rx="5" fill="#111" stroke="#2a1a1a" stroke-width="1"/>
  <text x="500" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">POST /search/complex</text>
  <text x="500" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">   {"filters":[...], "geo": {...}}</text>

  <!-- Bottom guideline -->
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">원칙: 조회는 GET, 생성·변경은 POST/PUT/PATCH/DELETE — 서버 상태를 바꾸는 작업엔 GET 쓰지 않기</text>
</svg>
