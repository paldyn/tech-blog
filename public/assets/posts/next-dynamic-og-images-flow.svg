<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">동적 OG 이미지 생성 흐름</text>

  <!-- SNS Bot -->
  <rect x="60" y="80" width="130" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">SNS / 메신저</text>
  <text x="125" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Slack, KakaoTalk...</text>

  <line x1="190" y1="107" x2="248" y2="107" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="219" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">OG 이미지 요청</text>

  <!-- Route Handler -->
  <rect x="250" y="80" width="200" height="54" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="350" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">app/og/route.tsx</text>
  <text x="350" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">GET /og?title=...&amp;slug=...</text>

  <line x1="350" y1="134" x2="350" y2="162" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ImageResponse -->
  <rect x="200" y="164" width="300" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="350" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">ImageResponse</text>
  <text x="350" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">JSX → Satori(SVG) → resvg → PNG</text>

  <line x1="350" y1="224" x2="350" y2="252" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- PNG result -->
  <rect x="250" y="254" width="200" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">PNG 이미지 (1200×630)</text>
  <text x="350" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Content-Type: image/png</text>

  <line x1="250" y1="279" x2="192" y2="279" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="254" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">SNS 미리보기</text>
  <text x="125" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">og:image 렌더링</text>

  <!-- Right: File-based OG -->
  <rect x="580" y="80" width="260" height="224" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일 기반 OG (opengraph-image)</text>

  <rect x="596" y="118" width="228" height="42" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">app/opengraph-image.tsx</text>
  <text x="710" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">루트 OG 이미지</text>

  <rect x="596" y="168" width="228" height="42" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" text-anchor="middle">app/posts/[slug]/opengraph-image.tsx</text>
  <text x="710" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">포스트별 OG 이미지</text>

  <rect x="596" y="218" width="228" height="42" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">app/opengraph-image.png</text>
  <text x="710" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">정적 이미지 파일도 가능</text>

  <text x="710" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파일 이름이 규약 → 자동으로</text>
  <text x="710" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">og:image 메타태그 생성</text>

  <!-- Constraints box -->
  <rect x="60" y="330" width="760" height="100" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">ImageResponse 제약사항</text>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CSS 서브셋만 지원 (flexbox 가능, grid 불가) · Tailwind 클래스 직접 사용 불가 (tw 객체로 변환 필요)</text>
  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">외부 이미지는 fetch로 받아 ArrayBuffer로 변환 후 사용 · 한글 폰트는 별도 로드 필수</text>
  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Edge Runtime에서 실행 · 번들 크기 제한 1MB · 폰트 파일은 public/ 또는 Google Fonts CDN에서 로드</text>
</svg>
