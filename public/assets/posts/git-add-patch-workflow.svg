<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git add -p: 하나의 파일에서 두 커밋</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="70" width="170" height="80" rx="8" fill="#111827" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="145" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">1. 하나의 파일에</text>
  <text x="145" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">feat + chore 변경</text>
  <text x="145" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">혼합</text>

  <line x1="230" y1="110" x2="270" y2="110" stroke="#888" stroke-width="1.5"/>
  <polygon points="270,104 280,110 270,116" fill="#888"/>

  <!-- Step 2 -->
  <rect x="280" y="70" width="170" height="80" rx="8" fill="#111827" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="365" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">2. git add -p</text>
  <text x="365" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">헝크1: y (feat)</text>
  <text x="365" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">헝크2: n (건너뜀)</text>

  <line x1="450" y1="110" x2="490" y2="110" stroke="#888" stroke-width="1.5"/>
  <polygon points="490,104 500,110 490,116" fill="#888"/>

  <!-- Step 3 -->
  <rect x="500" y="70" width="170" height="80" rx="8" fill="#0a1a0a" stroke="#205a20" stroke-width="1.5"/>
  <text x="585" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">3. 첫 커밋</text>
  <text x="585" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">feat: add validation</text>
  <text x="585" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(헝크1만 포함)</text>

  <line x1="670" y1="110" x2="710" y2="110" stroke="#888" stroke-width="1.5"/>
  <polygon points="710,104 720,110 710,116" fill="#888"/>

  <!-- Step 4 -->
  <rect x="720" y="70" width="100" height="80" rx="8" fill="#0a1a0a" stroke="#205a20" stroke-width="1.5"/>
  <text x="770" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">4. git add</text>
  <text x="770" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">남은 헝크</text>
  <text x="770" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">두 번째 커밋</text>

  <!-- Bottom: actual commands -->
  <rect x="60" y="190" width="760" height="106" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">실제 명령 순서</text>
  <text x="80" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git add -p src/auth.js  </text>
  <text x="284" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># y / n 으로 헝크 선택</text>
  <text x="80" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git commit -m </text>
  <text x="188" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"feat(auth): add input validation"</text>
  <text x="80" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git add src/auth.js     </text>
  <text x="284" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 나머지 변경 스테이징</text>
  <text x="80" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git commit -m </text>
  <text x="188" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"chore: remove debug log"</text>
</svg>
