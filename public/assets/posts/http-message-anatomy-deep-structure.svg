<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 메시지 바이트 레벨 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">와이어 위를 흐르는 실제 데이터 — RFC 7230 정의</text>

  <!-- Left: Request example -->
  <text x="200" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">요청 메시지</text>

  <rect x="60" y="110" width="280" height="278" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">GET</text>
  <text x="114" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> /index.html HTTP/1.1</text>

  <line x1="68" y1="140" x2="332" y2="140" stroke="#2a3a2a" stroke-width="1"/>

  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Host:</text>
  <text x="124" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> www.example.com</text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">User-Agent:</text>
  <text x="172" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> Mozilla/5.0</text>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Accept:</text>
  <text x="142" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> text/html</text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Accept-Encoding:</text>
  <text x="236" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> gzip</text>

  <line x1="68" y1="220" x2="332" y2="220" stroke="#2a3a2a" stroke-width="1"/>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#9aa4b8">\r\n</text>
  <text x="112" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#555">  (empty line)</text>

  <line x1="68" y1="246" x2="332" y2="246" stroke="#2a3a2a" stroke-width="1"/>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#555">(본문 없음 — GET)</text>

  <!-- Right: Response example -->
  <text x="660" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178" text-anchor="middle">응답 메시지</text>

  <rect x="540" y="110" width="280" height="278" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="556" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178">HTTP/1.1</text>
  <text x="628" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#55c555" font-weight="600"> 200 OK</text>

  <line x1="548" y1="140" x2="812" y2="140" stroke="#2a3a2a" stroke-width="1"/>

  <text x="556" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Date:</text>
  <text x="600" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> Mon, 09 Jun 2026...</text>
  <text x="556" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Content-Type:</text>
  <text x="680" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> text/html</text>
  <text x="556" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Content-Length:</text>
  <text x="700" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#b5cea8"> 138</text>

  <line x1="548" y1="202" x2="812" y2="202" stroke="#2a3a2a" stroke-width="1"/>
  <text x="556" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#9aa4b8">\r\n</text>

  <line x1="548" y1="228" x2="812" y2="228" stroke="#2a3a2a" stroke-width="1"/>
  <text x="556" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff">&lt;!DOCTYPE html&gt;</text>
  <text x="556" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff">&lt;html&gt;...&lt;/html&gt;</text>

  <!-- Legend at bottom -->
  <rect x="60" y="420" width="760" height="80" rx="8" fill="#0d1117" stroke="#2a3a4a" stroke-width="1"/>

  <rect x="80" y="440" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="100" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">시작 줄 (Start Line)</text>
  <text x="100" y="467" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">요청 줄 or 상태 줄</text>

  <rect x="260" y="440" width="12" height="12" rx="2" fill="#7777cc"/>
  <text x="280" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">헤더 필드 (Header Fields)</text>
  <text x="280" y="467" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이름: 값\r\n 반복</text>

  <rect x="460" y="440" width="12" height="12" rx="2" fill="#444"/>
  <text x="480" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">빈 줄 (Empty Line)</text>
  <text x="480" y="467" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">\r\n — 구조상 필수</text>

  <rect x="640" y="440" width="12" height="12" rx="2" fill="#ce9178"/>
  <text x="660" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">메시지 본문 (Body)</text>
  <text x="660" y="467" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">선택 — GET엔 없음</text>
</svg>
