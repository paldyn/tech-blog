<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrO" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ControlNet 아키텍처: SD U-Net에 제어 신호 주입</text>

  <!-- Left: Control input -->
  <rect x="40" y="90" width="160" height="60" rx="8" fill="#1a0a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">제어 이미지</text>
  <text x="120" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">포즈/깊이/엣지/법선</text>

  <line x1="200" y1="120" x2="228" y2="120" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ControlNet encoder (frozen copy) -->
  <rect x="230" y="70" width="200" height="280" rx="10" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="330" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">ControlNet 인코더</text>
  <text x="330" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(SD U-Net 인코더의 학습 가능한 사본)</text>

  <rect x="250" y="130" width="160" height="34" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="330" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">Zero Conv (입력)</text>

  <rect x="250" y="172" width="160" height="34" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="330" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">ResNet Block ×2</text>

  <rect x="250" y="214" width="160" height="34" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="330" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">Attention Block</text>

  <rect x="250" y="256" width="160" height="34" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="330" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">ResNet Block ×2</text>

  <rect x="250" y="298" width="160" height="34" rx="6" fill="#2a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="330" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">Zero Conv (출력)</text>

  <!-- Arrow from ControlNet outputs to SD UNet -->
  <line x1="430" y1="215" x2="468" y2="215" stroke="#ce9178" stroke-width="2" marker-end="url(#arrO)"/>
  <line x1="430" y1="250" x2="468" y2="250" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrO)"/>
  <line x1="430" y1="315" x2="468" y2="315" stroke="#ce9178" stroke-width="2" marker-end="url(#arrO)"/>

  <text x="449" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">+</text>
  <text x="449" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">+</text>
  <text x="449" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">+</text>

  <!-- Right: SD UNet (locked) -->
  <rect x="470" y="70" width="200" height="320" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="570" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">SD U-Net (동결 🔒)</text>
  <text x="570" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원본 SD 가중치 변경 없음</text>

  <rect x="490" y="130" width="160" height="34" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="570" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">인코더 블록 1</text>

  <rect x="490" y="172" width="160" height="34" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="570" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">인코더 블록 2</text>

  <rect x="490" y="214" width="160" height="34" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="570" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">Middle Block</text>

  <rect x="490" y="256" width="160" height="34" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="570" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">디코더 블록 1</text>

  <rect x="490" y="298" width="160" height="34" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="570" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">디코더 블록 2</text>

  <rect x="490" y="340" width="160" height="34" rx="6" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="570" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">출력 레이어</text>

  <line x1="570" y1="390" x2="570" y2="408" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>

  <rect x="490" y="410" width="160" height="40" rx="6" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">제어된 이미지 생성</text>

  <!-- Zero Conv explanation -->
  <rect x="700" y="90" width="160" height="240" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="780" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Zero Conv 핵심</text>
  <text x="780" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1×1 Conv</text>
  <text x="780" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">초기 가중치=0</text>
  <text x="780" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">초기 바이어스=0</text>
  <text x="780" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">학습 초기에는</text>
  <text x="780" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">제어 신호 = 0</text>
  <text x="780" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">→ SD 원본 동작</text>
  <text x="780" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">학습 진행 →</text>
  <text x="780" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">점진적 제어 강도</text>
  <text x="780" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">증가 (안정적 학습)</text>

  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">SD U-Net은 완전 동결, ControlNet 인코더만 학습 → 원본 생성 능력 보존</text>
</svg>
