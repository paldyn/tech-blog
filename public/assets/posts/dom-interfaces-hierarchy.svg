<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">Document · Element · Node · Text 관계</text>

  <!-- EventTarget -->
  <rect x="330" y="72" width="220" height="40" fill="#1a2235" rx="6" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="97" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">EventTarget</text>

  <line x1="440" y1="112" x2="440" y2="132" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,138 434,128 446,128" fill="#555"/>

  <!-- Node -->
  <rect x="330" y="142" width="220" height="40" fill="#111827" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="167" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Node</text>

  <!-- Node → Element (오른쪽) -->
  <line x1="550" y1="162" x2="640" y2="222" stroke="#555" stroke-width="1.5"/>
  <polygon points="644,224 632,218 640,208" fill="#555"/>

  <!-- Node → Document (왼쪽) -->
  <line x1="330" y1="162" x2="240" y2="222" stroke="#555" stroke-width="1.5"/>
  <polygon points="236,224 238,212 248,220" fill="#555"/>

  <!-- Node → CharacterData (아래) -->
  <line x1="440" y1="182" x2="440" y2="222" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,228 434,218 446,218" fill="#555"/>

  <!-- Document -->
  <rect x="60" y="232" width="220" height="40" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="257" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Document</text>

  <!-- CharacterData (Text · Comment) -->
  <rect x="320" y="232" width="240" height="40" fill="#111827" rx="6" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="253" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">CharacterData</text>
  <text x="440" y="268" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">(Text · Comment)</text>

  <!-- Element -->
  <rect x="600" y="232" width="220" height="40" fill="#111827" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="257" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Element</text>

  <!-- Element → HTMLElement -->
  <line x1="710" y1="272" x2="710" y2="312" stroke="#555" stroke-width="1.5"/>
  <polygon points="710,318 704,308 716,308" fill="#555"/>

  <!-- HTMLElement -->
  <rect x="600" y="322" width="220" height="40" fill="#0d1117" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="347" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">HTMLElement</text>

  <!-- HTMLElement → 구체 요소들 -->
  <line x1="710" y1="362" x2="710" y2="392" stroke="#555" stroke-width="1.5"/>
  <polygon points="710,398 704,388 716,388" fill="#555"/>
  <rect x="570" y="402" width="280" height="36" fill="#0a0a10" rx="6" stroke="#888" stroke-width="1"/>
  <text x="710" y="425" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">HTMLDivElement · HTMLInputElement · ...</text>

  <!-- 주요 프로퍼티 설명 -->
  <rect x="60" y="316" width="220" height="122" fill="#111827" rx="6" stroke="#1e2433"/>
  <text x="170" y="338" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Document 주요 API</text>
  <text x="78" y="358" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">.documentElement</text>
  <text x="78" y="376" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">.head / .body</text>
  <text x="78" y="394" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">.createElement()</text>
  <text x="78" y="412" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">.createTextNode()</text>
  <text x="78" y="430" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">.querySelector()</text>

  <!-- CharacterData 설명 -->
  <rect x="320" y="294" width="240" height="82" fill="#111827" rx="6" stroke="#1e2433"/>
  <text x="440" y="316" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">Text .data / .nodeValue</text>
  <text x="440" y="334" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">.appendData() / .deleteData()</text>
  <text x="440" y="352" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">.length (문자 수)</text>
  <text x="440" y="370" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">Comment: 같은 API, 화면엔 미표시</text>
</svg>
