<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RNN 셀 구조와 시간 전개</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">h_t = tanh(W_h · h_{t-1} + W_x · x_t + b)</text>

  <!-- ===== Single Cell Diagram (left side) ===== -->
  <!-- RNN Cell box -->
  <rect x="60" y="160" width="200" height="120" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#7ec8e3">RNN Cell</text>
  <text x="160" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">tanh( · )</text>

  <!-- h_{t-1} input arrow from left -->
  <line x1="20" y1="220" x2="58" y2="220" stroke="#55c555" stroke-width="2"/>
  <polygon points="58,214 70,220 58,226" fill="#55c555"/>
  <text x="14" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">h</text>
  <text x="22" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">t-1</text>

  <!-- x_t input arrow from bottom -->
  <line x1="160" y1="330" x2="160" y2="282" stroke="#e05555" stroke-width="2"/>
  <polygon points="154,282 160,270 166,282" fill="#e05555"/>
  <text x="160" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">x_t</text>

  <!-- h_t output arrow to right -->
  <line x1="260" y1="220" x2="298" y2="220" stroke="#55c555" stroke-width="2"/>
  <polygon points="298,214 310,220 298,226" fill="#55c555"/>
  <text x="326" y="225" text-anchor="start" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">h_t</text>

  <!-- y_t output arrow upward -->
  <line x1="160" y1="160" x2="160" y2="122" stroke="#7777cc" stroke-width="2"/>
  <polygon points="154,122 160,110 166,122" fill="#7777cc"/>
  <text x="160" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc">y_t</text>

  <!-- Labels for single cell -->
  <text x="160" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단일 RNN 셀</text>

  <!-- ===== Unrolled RNN (right side) ===== -->
  <text x="590" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">시간 전개 (Unrolled)</text>

  <!-- Cell t-1 -->
  <rect x="420" y="175" width="110" height="80" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="475" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Cell</text>
  <text x="475" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">t-1</text>

  <!-- Cell t -->
  <rect x="570" y="175" width="110" height="80" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="625" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Cell</text>
  <text x="625" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">t</text>

  <!-- Cell t+1 -->
  <rect x="720" y="175" width="110" height="80" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="775" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Cell</text>
  <text x="775" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">t+1</text>

  <!-- h connections between cells -->
  <line x1="390" y1="215" x2="418" y2="215" stroke="#55c555" stroke-width="2"/>
  <polygon points="418,209 430,215 418,221" fill="#55c555"/>
  <text x="378" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">h</text>
  <text x="384" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">t-2</text>

  <line x1="530" y1="215" x2="568" y2="215" stroke="#55c555" stroke-width="2"/>
  <polygon points="568,209 580,215 568,221" fill="#55c555"/>

  <line x1="680" y1="215" x2="718" y2="215" stroke="#55c555" stroke-width="2"/>
  <polygon points="718,209 730,215 718,221" fill="#55c555"/>

  <!-- x inputs -->
  <line x1="475" y1="295" x2="475" y2="257" stroke="#e05555" stroke-width="2"/>
  <polygon points="469,257 475,245 481,257" fill="#e05555"/>
  <text x="475" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">x_{t-1}</text>

  <line x1="625" y1="295" x2="625" y2="257" stroke="#e05555" stroke-width="2"/>
  <polygon points="619,257 625,245 631,257" fill="#e05555"/>
  <text x="625" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">x_t</text>

  <line x1="775" y1="295" x2="775" y2="257" stroke="#e05555" stroke-width="2"/>
  <polygon points="769,257 775,245 781,257" fill="#e05555"/>
  <text x="775" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">x_{t+1}</text>

  <!-- y outputs -->
  <line x1="475" y1="175" x2="475" y2="143" stroke="#7777cc" stroke-width="2"/>
  <polygon points="469,143 475,131 481,143" fill="#7777cc"/>
  <text x="475" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">y_{t-1}</text>

  <line x1="625" y1="175" x2="625" y2="143" stroke="#7777cc" stroke-width="2"/>
  <polygon points="619,143 625,131 631,143" fill="#7777cc"/>
  <text x="625" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">y_t</text>

  <line x1="775" y1="175" x2="775" y2="143" stroke="#7777cc" stroke-width="2"/>
  <polygon points="769,143 775,131 781,143" fill="#7777cc"/>
  <text x="775" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">y_{t+1}</text>

  <!-- Legend -->
  <rect x="420" y="380" width="460" height="68" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">범례</text>
  <line x1="460" y1="422" x2="490" y2="422" stroke="#55c555" stroke-width="2"/>
  <text x="496" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">은닉 상태 h_t</text>
  <line x1="600" y1="422" x2="630" y2="422" stroke="#e05555" stroke-width="2"/>
  <text x="636" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">입력 x_t</text>
  <line x1="720" y1="422" x2="750" y2="422" stroke="#7777cc" stroke-width="2"/>
  <text x="756" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">출력 y_t</text>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공유 가중치 W_h, W_x, b — 모든 시간 스텝에서 동일</text>
</svg>
