<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CJS ↔ ESM 상호운용(Interop)</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Node.js에서 두 시스템을 함께 사용하는 방법</text>

  <!-- Left: ESM importing CJS -->
  <text x="230" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">ESM에서 CJS 가져오기</text>
  <rect x="60" y="108" width="340" height="180" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// CJS 모듈: lib.cjs</text>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">module.exports = { foo: </text>
  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">  42 </tspan><tspan fill="#ffffff">};</tspan></text>
  
  <line x1="76" y1="180" x2="384" y2="180" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ESM에서 default로 가져옴</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ffffff">lib </tspan><tspan fill="#7ec8e3">from </tspan><tspan fill="#ce9178">'./lib.cjs'</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">lib.foo; </text>
  <text x="132" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 42 ✓</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// named import 가능 여부: 환경 따라 다름</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Node 22+: static named import 지원</text>

  <!-- Right: CJS importing ESM -->
  <text x="650" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">CJS에서 ESM 가져오기</text>
  <rect x="480" y="108" width="340" height="180" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="496" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// require()로 ESM 불가!</text>
  <text x="496" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">const lib = require('./esm.mjs');</text>
  <text x="496" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">// ERR_REQUIRE_ESM!</text>
  <line x1="496" y1="180" x2="804" y2="180" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 해결책: dynamic import()</text>
  <text x="496" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">async function </tspan><tspan fill="#ffffff">load() {</tspan></text>
  
  <text x="496" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  const </tspan><tspan fill="#ffffff">{ fn } = </tspan><tspan fill="#7ec8e3">await </tspan><tspan fill="#ffffff">import(</tspan></text>

  <text x="496" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    './esm.mjs'</text>
  <text x="496" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  );</tspan><tspan fill="#ffffff">  }</tspan></text>

  <!-- Node.js config -->
  <rect x="60" y="310" width="760" height="130" rx="8" fill="#0f1117" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Node.js 모듈 활성화 방법</text>
  <line x1="80" y1="344" x2="800" y2="344" stroke="#374151" stroke-width="1"/>

  <rect x="80" y="352" width="340" height="70" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="250" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c842">ESM 활성화</text>
  <text x="96" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// package.json</text>
  <text x="96" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{ </text>
  <text x="112" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"type"</text>
  <text x="160" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">: </text>
  <text x="172" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"module" </text>
  <text x="230" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <rect x="460" y="352" width="340" height="70" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="630" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">확장자로 구분</text>
  <text x="476" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">.mjs → ESM</text>
  <text x="476" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">.cjs → CommonJS</text>

  <!-- Footer -->
</svg>
