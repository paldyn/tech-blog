<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ss -tunap 출력 구조 해부</text>

  <!-- Command box -->
  <rect x="50" y="68" width="780" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="93" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">$ <tspan fill="#7ec8e3" font-weight="600">ss</tspan> -tunap</text>

  <!-- Column header labels -->
  <rect x="50" y="122" width="780" height="28" rx="4" fill="#0f1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="68" y="141" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">Netid  State       Recv-Q  Send-Q  Local Address:Port    Peer Address:Port   Process</text>

  <!-- Row 1: LISTEN -->
  <rect x="50" y="155" width="780" height="44" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">tcp    <tspan fill="#7ec8e3" font-weight="600">LISTEN</tspan>     0       128     0.0.0.0:80           0.0.0.0:*</text>
  <text x="68" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">  users:(("nginx",pid=1234,fd=6))</text>

  <!-- Row 2: ESTABLISHED -->
  <rect x="50" y="203" width="780" height="44" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">tcp    <tspan fill="#55c555" font-weight="600">ESTAB</tspan>      0       0       10.0.0.1:34522       1.2.3.4:443</text>
  <text x="68" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">  users:(("curl",pid=5678,fd=3))</text>

  <!-- Row 3: TIME_WAIT -->
  <rect x="50" y="251" width="780" height="44" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">tcp    <tspan fill="#e05555" font-weight="600">TIME-WAIT</tspan>  0       0       10.0.0.1:52001       9.9.9.9:80</text>
  <text x="68" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">  timer:(timewait,55sec,0)</text>

  <!-- Row 4: UDP -->
  <rect x="50" y="299" width="780" height="44" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="319" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">udp    <tspan fill="#e0a055" font-weight="600">UNCONN</tspan>     0       0       0.0.0.0:53           0.0.0.0:*</text>
  <text x="68" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">  users:(("systemd-resolved",pid=342,fd=17))</text>

  <!-- Annotations -->
  <text x="50" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-t: TCP  -u: UDP  -n: 숫자(이름 미변환)  -a: 모든 상태  -p: 프로세스명</text>
  <text x="50" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Recv-Q: 읽지 않은 수신 바이트  |  Send-Q: 전송 미완료 바이트  |  0이어야 정상</text>
  <text x="50" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">ss는 netstat보다 빠르고 커널 TCP 정보를 더 많이 노출 (RTT, 윈도우 크기 등)</text>
</svg>
