<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Debounce vs Throttle</text>

  <!-- Input row -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">입력</text>
  <line x1="130" y1="78" x2="820" y2="78" stroke="#333" stroke-width="1"/>
  <circle cx="160" cy="78" r="4" fill="#7777cc"/>
  <circle cx="220" cy="78" r="4" fill="#7777cc"/>
  <circle cx="270" cy="78" r="4" fill="#7777cc"/>
  <circle cx="330" cy="78" r="4" fill="#7777cc"/>
  <circle cx="410" cy="78" r="4" fill="#7777cc"/>
  <circle cx="490" cy="78" r="4" fill="#7777cc"/>
  <circle cx="560" cy="78" r="4" fill="#7777cc"/>
  <circle cx="650" cy="78" r="4" fill="#7777cc"/>
  <circle cx="740" cy="78" r="4" fill="#7777cc"/>
  <circle cx="800" cy="78" r="4" fill="#7777cc"/>

  <!-- Debounce row -->
  <text x="60" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">Debounce</text>
  <line x1="130" y1="148" x2="820" y2="148" stroke="#333" stroke-width="1"/>
  <!-- Only last call fires -->
  <circle cx="800" cy="148" r="7" fill="#55c555"/>
  <rect x="700" y="130" width="160" height="14" rx="2" fill="none" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="780" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">delay 경과 후</text>
  <text x="490" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">입력이 멈춘 뒤 한 번만 실행</text>

  <!-- Throttle row -->
  <text x="60" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">Throttle</text>
  <line x1="130" y1="238" x2="820" y2="238" stroke="#333" stroke-width="1"/>
  <!-- Fixed interval calls -->
  <circle cx="160" cy="238" r="7" fill="#7ec8e3"/>
  <circle cx="360" cy="238" r="7" fill="#7ec8e3"/>
  <circle cx="560" cy="238" r="7" fill="#7ec8e3"/>
  <circle cx="760" cy="238" r="7" fill="#7ec8e3"/>
  <text x="490" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">일정 간격마다 실행 (최대 호출 빈도 제한)</text>

  <!-- Use case guide -->
  <rect x="60" y="280" width="360" height="76" rx="8" fill="#0a200a" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Debounce 적합</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 검색창 자동완성 API 호출</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 폼 유효성 검사 (입력 완료 후)</text>

  <rect x="460" y="280" width="360" height="76" rx="8" fill="#0a1a20" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Throttle 적합</text>
  <text x="480" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 스크롤 / 마우스 이동 핸들러</text>
  <text x="480" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 버튼 연속 클릭 방지</text>
</svg>
