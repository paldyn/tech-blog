<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">savedOrg 활용 패턴 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">원본 조회·복원·변경 감지 세 가지 시나리오</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="256" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="76" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 1. 원본 값 읽기</text>
  <text xml:space="preserve" x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">var</tspan> org = ds.getOrgColumn(i, <tspan fill="#ce9178">"DEPT_NM"</tspan>);</text>
  <text xml:space="preserve" x="76" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">var</tspan> cur = ds.getColumn(i, <tspan fill="#ce9178">"DEPT_NM"</tspan>);</text>
  <text xml:space="preserve" x="76" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// org = "개발팀", cur = "개발1팀"</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 2. 특정 셀 원본 복원</text>
  <text xml:space="preserve" x="76" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ds.restoreColumn(i, <tspan fill="#ce9178">"DEPT_NM"</tspan>);</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 3. 변경 감지 (원본과 현재 비교)</text>
  <text xml:space="preserve" x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">var</tspan> changed = (org !== cur);</text>
  <text xml:space="preserve" x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">if</tspan> (changed) alert(<tspan fill="#ce9178">"변경 감지!"</tspan>);</text>
  <text xml:space="preserve" x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ds.resetData() → 전체 행 원본 복원</text>

  <!-- Note -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">restoreColumn()은 셀 단위, resetData()는 Dataset 전체를 원본으로 되돌립니다</text>
</svg>
