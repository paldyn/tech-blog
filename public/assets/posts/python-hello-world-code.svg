<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">print()의 다양한 활용</text>

  <rect x="60" y="66" width="760" height="276" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본 출력</text>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"Hello, World!"</tspan><tspan fill="#ffffff">)        </tspan><tspan fill="#9aa4b8"># Hello, World!</tspan></text>

  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 여러 값 출력, sep으로 구분자 지정</text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">, sep=</tspan><tspan fill="#ce9178">", "</tspan><tspan fill="#ffffff">)       </tspan><tspan fill="#9aa4b8"># 1, 2, 3</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"b"</tspan><tspan fill="#ffffff">, sep=</tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">)          </tspan><tspan fill="#9aa4b8"># ab</tspan></text>

  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># end 변경 (기본은 "\n")</text>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"로딩 중"</tspan><tspan fill="#ffffff">, end=</tspan><tspan fill="#ce9178">"..."</tspan><tspan fill="#ffffff">)     </tspan><tspan fill="#9aa4b8"># 줄바꿈 없이 이어짐</tspan></text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"완료"</tspan><tspan fill="#ffffff">)                 </tspan><tspan fill="#9aa4b8"># 로딩 중...완료</tspan></text>

  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 표준 오류(stderr)로 출력</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> sys</tspan></text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"오류 발생!"</tspan><tspan fill="#ffffff">, file=sys.stderr)</tspan></text>
</svg>
