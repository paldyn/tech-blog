<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일의 세 가지 타임스탬프</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">atime · mtime · ctime 의 차이와 갱신 조건</text>

  <!-- atime -->
  <rect x="60" y="88" width="240" height="140" fill="#070b14" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">atime</text>
  <text x="180" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Access Time</text>
  <text x="180" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">마지막 접근 시각</text>
  <text x="180" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0" text-anchor="middle">cat, less, cp 원본 읽기</text>
  <text x="180" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0" text-anchor="middle">→ atime 갱신</text>
  <text x="180" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">* noatime 마운트 시 갱신 안 됨</text>

  <!-- mtime -->
  <rect x="320" y="88" width="240" height="140" fill="#070b14" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">mtime</text>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Modify Time</text>
  <text x="440" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">마지막 수정 시각</text>
  <text x="440" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0" text-anchor="middle">파일 내용(데이터) 변경</text>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0" text-anchor="middle">→ mtime 갱신</text>
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">ls -l 이 보여주는 시간</text>

  <!-- ctime -->
  <rect x="580" y="88" width="240" height="140" fill="#070b14" rx="8" stroke="#e8c55a" stroke-width="2"/>
  <text x="700" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8c55a" text-anchor="middle">ctime</text>
  <text x="700" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Change Time</text>
  <text x="700" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">마지막 변경 시각</text>
  <text x="700" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0" text-anchor="middle">inode 변경 (권한·소유자</text>
  <text x="700" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0" text-anchor="middle">링크수·내용 변경)</text>
  <text x="700" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">* 생성 시각이 아님</text>

  <!-- touch effect -->
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">touch 명령의 효과</text>
  <rect x="60" y="276" width="760" height="56" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">touch file.txt   <tspan fill="#6a8aa0"># 파일이 없으면 0바이트 생성, 있으면 atime·mtime 현재 시각으로 갱신</tspan></text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">touch -a file    <tspan fill="#6a8aa0"># atime 만 갱신</tspan>   touch -m file  <tspan fill="#6a8aa0"># mtime 만 갱신</tspan></text>

  <!-- stat summary -->
  <rect x="60" y="350" width="760" height="52" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ stat file.txt  <tspan fill="#6a8aa0"># atime, mtime, ctime 모두 확인</tspan></text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -l   <tspan fill="#6a8aa0"># mtime   </tspan>  $ ls -lu  <tspan fill="#6a8aa0"># atime   </tspan>  $ ls -lc  <tspan fill="#6a8aa0"># ctime</tspan></text>
</svg>
