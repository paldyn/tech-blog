<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <!-- Background -->
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">PCA vs t-SNE vs UMAP 비교</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">속도 · 구조 보존 · 해석성 · 활용 목적 기준</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Column headers -->
  <rect x="60" y="100" width="200" height="36" rx="6" fill="#111"/>
  <text x="160" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">항목</text>

  <rect x="272" y="100" width="175" height="36" rx="6" fill="#0d1a2a"/>
  <text x="359" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">PCA</text>

  <rect x="459" y="100" width="175" height="36" rx="6" fill="#0d1520"/>
  <text x="546" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">t-SNE</text>

  <rect x="646" y="100" width="174" height="36" rx="6" fill="#0a1a0a"/>
  <text x="733" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">UMAP</text>

  <!-- Row separator helper: rows at y=148,196,244,292,340,383 (height 48 each) -->

  <!-- Row 1: 알고리즘 기반 -->
  <rect x="60" y="148" width="200" height="48" rx="0" fill="#0d1520" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">알고리즘 기반</text>
  <text x="160" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">수학적 원리</text>

  <rect x="272" y="148" width="175" height="48" rx="0" fill="#070e1a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="359" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">선형 고유값 분해</text>
  <text x="359" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">공분산 행렬</text>

  <rect x="459" y="148" width="175" height="48" rx="0" fill="#0d0b10" stroke="#1e2433" stroke-width="0.5"/>
  <text x="546" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">확률 분포 기반</text>
  <text x="546" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">가우시안 → t-분포</text>

  <rect x="646" y="148" width="174" height="48" rx="0" fill="#090d09" stroke="#1e2433" stroke-width="0.5"/>
  <text x="733" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">위상 수학 기반</text>
  <text x="733" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">다양체 근사</text>

  <!-- Row 2: 속도 -->
  <rect x="60" y="196" width="200" height="48" rx="0" fill="#0d1520" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">속도</text>

  <rect x="272" y="196" width="175" height="48" rx="0" fill="#070e1a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="359" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555">●●●●●</text>
  <text x="359" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">매우 빠름 (O(nd))</text>

  <rect x="459" y="196" width="175" height="48" rx="0" fill="#0d0b10" stroke="#1e2433" stroke-width="0.5"/>
  <text x="546" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555">●●○○○</text>
  <text x="546" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">느림 (O(n²)~O(n log n))</text>

  <rect x="646" y="196" width="174" height="48" rx="0" fill="#090d09" stroke="#1e2433" stroke-width="0.5"/>
  <text x="733" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555">●●●●○</text>
  <text x="733" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">빠름 (t-SNE의 ~5-10×)</text>

  <!-- Row 3: 지역 구조 보존 -->
  <rect x="60" y="244" width="200" height="48" rx="0" fill="#0d1520" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">지역 구조 보존</text>
  <text x="160" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">(클러스터 형태)</text>

  <rect x="272" y="244" width="175" height="48" rx="0" fill="#070e1a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="359" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">△ 보통</text>

  <rect x="459" y="244" width="175" height="48" rx="0" fill="#0d0b10" stroke="#1e2433" stroke-width="0.5"/>
  <text x="546" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">◎ 매우 우수</text>

  <rect x="646" y="244" width="174" height="48" rx="0" fill="#090d09" stroke="#1e2433" stroke-width="0.5"/>
  <text x="733" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">◎ 매우 우수</text>

  <!-- Row 4: 전역 구조 보존 -->
  <rect x="60" y="292" width="200" height="48" rx="0" fill="#0d1520" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">전역 구조 보존</text>
  <text x="160" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">(군집 간 거리)</text>

  <rect x="272" y="292" width="175" height="48" rx="0" fill="#070e1a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="359" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">○ 우수</text>

  <rect x="459" y="292" width="175" height="48" rx="0" fill="#0d0b10" stroke="#1e2433" stroke-width="0.5"/>
  <text x="546" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✕ 손실 큼</text>

  <rect x="646" y="292" width="174" height="48" rx="0" fill="#090d09" stroke="#1e2433" stroke-width="0.5"/>
  <text x="733" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3">△ 부분 보존</text>

  <!-- Row 5: 새 데이터 적용 -->
  <rect x="60" y="340" width="200" height="48" rx="0" fill="#0d1520" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">새 데이터 transform</text>

  <rect x="272" y="340" width="175" height="48" rx="0" fill="#070e1a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="359" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 가능</text>

  <rect x="459" y="340" width="175" height="48" rx="0" fill="#0d0b10" stroke="#1e2433" stroke-width="0.5"/>
  <text x="546" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✕ 불가</text>

  <rect x="646" y="340" width="174" height="48" rx="0" fill="#090d09" stroke="#1e2433" stroke-width="0.5"/>
  <text x="733" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 가능</text>

  <!-- Footer hint -->
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">실전 권장 워크플로: PCA(50차원) → t-SNE 또는 UMAP(2D 시각화)  |  군집 간 거리는 해석 금지</text>
</svg>
