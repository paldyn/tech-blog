<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <!-- Background -->
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Route Segment Config — 주요 옵션</text>

  <!-- Column headers -->
  <rect x="50" y="68" width="200" height="34" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">변수명</text>
  <rect x="262" y="68" width="220" height="34" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="372" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">값</text>
  <rect x="494" y="68" width="336" height="34" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="662" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">설명</text>

  <!-- Row 1: dynamic -->
  <rect x="50" y="114" width="780" height="50" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="134" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">dynamic</text>
  <text x="372" y="127" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">'auto' | 'force-dynamic'</text>
  <text x="372" y="148" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">'force-static' | 'error'</text>
  <text x="662" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">렌더링 방식 강제 설정</text>
  <text x="662" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기본값: 'auto' (자동 결정)</text>

  <!-- Row 2: revalidate -->
  <rect x="50" y="176" width="780" height="50" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="196" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">revalidate</text>
  <text x="372" y="190" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">false | 0 | number</text>
  <text x="372" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">  (초 단위)</text>
  <text x="662" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">ISR 재검증 주기 설정</text>
  <text x="662" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">false=무기한 캐시, 0=항상 새로고침</text>

  <!-- Row 3: fetchCache -->
  <rect x="50" y="238" width="780" height="50" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="258" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">fetchCache</text>
  <text x="372" y="252" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">'auto' | 'force-cache'</text>
  <text x="372" y="272" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">'force-no-store' | ...</text>
  <text x="662" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">세그먼트 내 fetch 캐시 정책 일괄 설정</text>
  <text x="662" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">개별 fetch 옵션보다 세그먼트가 우선</text>

  <!-- Row 4: runtime -->
  <rect x="50" y="300" width="780" height="50" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="320" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">runtime</text>
  <text x="372" y="320" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">'nodejs' | 'edge'</text>
  <text x="662" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">실행 런타임 선택</text>
  <text x="662" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">edge: 빠른 콜드스타트, Node API 미지원</text>

  <!-- Row 5: maxDuration -->
  <rect x="50" y="362" width="780" height="50" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="382" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">maxDuration</text>
  <text x="372" y="382" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">number (초)</text>
  <text x="662" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">서버 함수 최대 실행 시간</text>
  <text x="662" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">플랫폼 최대값 초과 시 무시</text>

  <!-- Code block -->
  <rect x="50" y="430" width="780" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// page.tsx 또는 layout.tsx 최상단에 export</text>
  <text x="66" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export const</text>
  <text x="142" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> dynamic = 'force-dynamic'</text>
</svg>
