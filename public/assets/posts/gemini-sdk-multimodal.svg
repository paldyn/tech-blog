<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
    <marker id="arr-v" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Gemini SDK: 멀티모달 입력 구조</text>

  <!-- ── 입력 소스 (왼쪽 컬럼) ── -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">입력 소스</text>

  <!-- 텍스트 -->
  <rect x="30" y="90" width="160" height="54" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="110" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">텍스트</text>
  <text x="110" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">str 프롬프트</text>

  <!-- 이미지 (PIL) -->
  <rect x="30" y="158" width="160" height="54" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="110" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">이미지 (PIL)</text>
  <text x="110" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Image.open(...)</text>

  <!-- 이미지 (bytes) -->
  <rect x="30" y="226" width="160" height="54" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="110" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">이미지 (bytes)</text>
  <text x="110" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">{"mime_type":..., "data":...}</text>

  <!-- 동영상/대용량 -->
  <rect x="30" y="294" width="160" height="54" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="110" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">동영상 / PDF</text>
  <text x="110" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">genai.upload_file(...)</text>

  <!-- 화살표들 → generate_content -->
  <line x1="190" y1="117" x2="310" y2="200" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="190" y1="185" x2="310" y2="210" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="190" y1="253" x2="310" y2="220" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="190" y1="321" x2="310" y2="235" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-v)"/>

  <!-- ── 중앙: generate_content 박스 ── -->
  <rect x="310" y="152" width="200" height="100" rx="10" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="2"/>
  <text x="410" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">generate_content()</text>
  <text x="410" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리스트 형식으로 혼합 입력</text>
  <text x="410" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[이미지, 텍스트, ...]</text>
  <text x="410" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">순서 자유, 여러 개 가능</text>

  <!-- → Gemini 모델 -->
  <line x1="510" y1="202" x2="560" y2="202" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ── 오른쪽: Gemini 모델 박스 ── -->
  <rect x="560" y="152" width="160" height="100" rx="10" fill="#1a0a1a" stroke="#6e3a6e" stroke-width="2"/>
  <text x="640" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Gemini 모델</text>
  <text x="640" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">멀티모달 네이티브</text>
  <text x="640" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">텍스트·이미지·영상</text>
  <text x="640" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">통합 이해</text>

  <!-- → 응답 -->
  <line x1="720" y1="202" x2="770" y2="202" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-v)"/>

  <!-- ── 응답 박스 ── -->
  <rect x="770" y="152" width="80" height="100" rx="8" fill="#1a0f0a" stroke="#6e5a3a" stroke-width="1.5"/>
  <text x="810" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">응답</text>
  <text x="810" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.text</text>
  <text x="810" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.parts</text>
  <text x="810" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.candidates</text>

  <!-- ── 코드 블록 ── -->
  <rect x="30" y="370" width="820" height="170" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="50" y="391" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"
        ># 멀티모달: 이미지 + 텍스트 동시 입력</text>

  <text x="50" y="411" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> PIL </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Image</tspan>
  </text>

  <text x="50" y="431" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">model = genai.GenerativeModel(</tspan><tspan fill="#ce9178">"gemini-2.0-flash"</tspan><tspan fill="#ffffff">)</tspan>
  </text>

  <text x="50" y="451" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">image = Image.open(</tspan><tspan fill="#ce9178">"diagram.png"</tspan><tspan fill="#ffffff">)</tspan>
  </text>

  <text x="50" y="471" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">response = model.generate_content([</tspan>
  </text>

  <text x="50" y="491" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    image, </tspan><tspan fill="#ce9178">"이 다이어그램의 SPOF를 찾아주세요."</tspan>
  </text>

  <text x="50" y="511" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">])</tspan>
  </text>

  <text x="50" y="531" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(response.text)</tspan>
  </text>

</svg>
