  <!-- Bottom tip -->
  <rect x="30" y="422" width="820" height="38" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">권장: 신뢰할 수 없는 데이터 → textContent  |  마크업 삽입 → innerHTML + DOMPurify  |  화면 텍스트 복사 → innerText</text>
  <text x="440" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">innerText는 읽기 시 항상 리플로우를 강제하므로 루프 내 반복 호출 금지</text>
