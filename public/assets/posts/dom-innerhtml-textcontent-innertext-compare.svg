  <rect x="688" y="270" width="84" height="22" rx="4" fill="#0a2a0a"/>
  <text x="730" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 없음</text>
