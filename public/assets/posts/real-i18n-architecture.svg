<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">react-i18next 아키텍처</text>

  <!-- Translation files -->
  <rect x="60" y="70" width="220" height="220" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">번역 파일</text>

  <rect x="76" y="108" width="188" height="60" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">locales/ko/common.json</text>
  <text x="170" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">{ "greeting": "안녕하세요" }</text>

  <rect x="76" y="178" width="188" height="60" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">locales/en/common.json</text>
  <text x="170" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">{ "greeting": "Hello" }</text>

  <rect x="76" y="248" width="188" height="34" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">locales/ja/common.json ...</text>

  <!-- Arrow -->
  <line x1="280" y1="180" x2="335" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- i18next config -->
  <rect x="335" y="70" width="210" height="220" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">i18next 초기화</text>

  <rect x="351" y="108" width="178" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="367" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">i18n</text>
  <text x="367" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  .use(Backend)</text>
  <text x="367" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  .use(Detector)</text>
  <text x="367" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  .init({</text>
  <text x="367" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    fallbackLng: <tspan fill="#ce9178">'ko'</tspan>,</text>
  <text x="367" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    ns: [<tspan fill="#ce9178">'common'</tspan>],</text>
  <text x="367" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    interpolation: {</text>
  <text x="367" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      escapeValue: <tspan fill="#b5cea8">false</tspan></text>
  <text x="367" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  });</text>

  <!-- Arrow -->
  <line x1="545" y1="180" x2="600" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- React Usage -->
  <rect x="600" y="70" width="220" height="220" rx="8" fill="#1a1a0f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">React 컴포넌트 사용</text>

  <rect x="616" y="108" width="188" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="632" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> { t } = <tspan fill="#7ec8e3" font-weight="600">useTranslation</tspan>();</text>
  <text x="632" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"></text>
  <text x="632" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8">// 기본 번역</tspan></text>
  <text x="632" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">t(<tspan fill="#ce9178">'greeting'</tspan>)</text>
  <text x="632" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8">// 변수 삽입</tspan></text>
  <text x="632" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">t(<tspan fill="#ce9178">'welcome'</tspan>, { name })</text>
  <text x="632" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8">// 복수형</tspan></text>
  <text x="632" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">t(<tspan fill="#ce9178">'item'</tspan>, { count })</text>

  <!-- Plugins row -->
  <text x="60" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">플러그인 생태계</text>

  <rect x="60" y="346" width="186" height="56" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="153" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">i18next-http-backend</text>
  <text x="153" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JSON 파일 지연 로드</text>

  <rect x="258" y="346" width="186" height="56" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="351" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">browser-languagedetector</text>
  <text x="351" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">언어 자동 감지</text>

  <rect x="456" y="346" width="186" height="56" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="549" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">i18next-resources-to-backend</text>
  <text x="549" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">번들 내 리소스 로드</text>

  <rect x="654" y="346" width="166" height="56" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="737" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">react-i18next Trans</text>
  <text x="737" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JSX 요소 포함 번역</text>

  <!-- Language change code -->
  <rect x="60" y="420" width="760" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> { i18n } = <tspan fill="#7ec8e3" font-weight="600">useTranslation</tspan>();</text>
  <text x="76" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">i18n.changeLanguage(<tspan fill="#ce9178">'en'</tspan>);  <tspan fill="#9aa4b8">// 언어 전환 — localStorage 저장 + 리렌더링 트리거</tspan></text>
</svg>
