<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">__repr__과 __str__ 구현 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Money 클래스 예제</text>

  <!-- Code -->
  <rect x="60" y="88" width="430" height="282" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="114" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">class </text>
  <text x="120" y="114" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Money:</text>
  <text x="80" y="132" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="132" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__init__(self, amount, currency):</text>
  <text x="80" y="150" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        self.amount   = amount</text>
  <text x="80" y="168" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        self.currency = currency</text>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="80" y="204" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="204" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__repr__(self):</text>
  <text x="80" y="222" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">        # eval(repr(obj)) == obj 재현 가능</text>
  <text x="80" y="240" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="144" y="240" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">f"Money({self.amount!r}, {self.currency!r})"</text>
  <text x="80" y="258" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="80" y="276" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="276" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__str__(self):</text>
  <text x="80" y="294" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">        # 사용자 친화적 형태</text>
  <text x="80" y="312" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="144" y="312" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">f"{self.currency} {self.amount:,.2f}"</text>
  <text x="80" y="330" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">m = Money(</text>
  <text x="144" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1234567.89</text>
  <text x="218" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, </text>
  <text x="230" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"KRW"</text>
  <text x="266" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>

  <!-- Right: output -->
  <rect x="520" y="88" width="300" height="282" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="540" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">출력</text>
  <rect x="540" y="122" width="260" height="130" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="556" y="142" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">repr(m)</text>
  <text x="556" y="160" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" xml:space="preserve"># Money(1234567.89, 'KRW')</text>
  <text x="556" y="178" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">str(m)</text>
  <text x="556" y="196" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" xml:space="preserve"># KRW 1,234,567.89</text>
  <text x="556" y="214" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">print(m)</text>
  <text x="556" y="232" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" xml:space="preserve"># KRW 1,234,567.89</text>
  <text x="556" y="250" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">f"{m}"</text>
  <text x="556" y="268" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" xml:space="preserve"># KRW 1,234,567.89</text>

  <text x="540" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">f-string 포맷 지정자</text>
  <rect x="540" y="286" width="260" height="70" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="556" y="304" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">f"{m!s}"</text>
  <text x="556" y="304" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">          # str(m)</text>
  <text x="556" y="322" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">f"{m!r}"</text>
  <text x="556" y="322" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">          # repr(m)</text>
  <text x="556" y="340" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">f"{m!a}"</text>
  <text x="556" y="340" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">          # ascii(m)</text>
  <text x="556" y="358" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">f"{m.amount:.2f}"</text>
  <text x="556" y="358" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">  # __format__</text>
</svg>
