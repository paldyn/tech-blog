<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">마커 인터페이스 — 빈 몸체의 타입 태그 패턴</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">메서드 없이 implements만으로 JVM과 라이브러리에 특별 처리를 지시한다</text>

  <!-- ── 좌측: JDK 내장 마커 인터페이스 ── -->
  <text x="50" y="87"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">JDK 내장 예시</text>

  <!-- Serializable -->
  <rect x="50" y="95" width="360" height="52" rx="6" fill="#0d1a0d" stroke="#2d5a2d" stroke-width="1"/>
  <text x="66" y="117"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Serializable</text>
  <text x="66" y="135"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">java.io &#8212; 객체를 바이트 스트림으로 직렬화 허용</text>

  <!-- Cloneable -->
  <rect x="50" y="155" width="360" height="52" rx="6" fill="#0d1a1a" stroke="#2d5a5a" stroke-width="1"/>
  <text x="66" y="177"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Cloneable</text>
  <text x="66" y="195"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">java.lang &#8212; Object.clone() 호출 허용 마킹</text>

  <!-- RandomAccess -->
  <rect x="50" y="215" width="360" height="52" rx="6" fill="#1a1a0d" stroke="#5a5a2d" stroke-width="1"/>
  <text x="66" y="237"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c838">RandomAccess</text>
  <text x="66" y="255"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">java.util &#8212; O(1) 임의 접근 최적화 힌트</text>

  <!-- Remote -->
  <rect x="50" y="275" width="360" height="52" rx="6" fill="#1a0d1a" stroke="#5a2d5a" stroke-width="1"/>
  <text x="66" y="297"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#cc77cc">Remote</text>
  <text x="66" y="315"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">java.rmi &#8212; RMI 원격 호출 허용 표시</text>

  <!-- EventListener -->
  <rect x="50" y="335" width="360" height="52" rx="6" fill="#1a0d0d" stroke="#5a2d2d" stroke-width="1"/>
  <text x="66" y="357"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">EventListener</text>
  <text x="66" y="375"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">java.util &#8212; 이벤트 리스너 마킹</text>

  <!-- ── 우측: 코드 패턴 ── -->
  <text x="470" y="87"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">패턴 정의</text>

  <!-- Code block 1: 3줄, h=70 -->
  <rect x="470" y="95" width="360" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="117" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 빈 몸체 = 메서드 없음</text>
  <text x="486" y="135" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">public interface</tspan><tspan fill="#ffffff"> Serializable { }</tspan></text>
  <text x="486" y="153" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">public interface</tspan><tspan fill="#ffffff"> Cloneable    { }</tspan></text>

  <!-- Label 2 -->
  <text x="470" y="183"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">런타임 타입 확인</text>

  <!-- Code block 2: 4줄, h=88 -->
  <rect x="470" y="191" width="360" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="213" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (obj </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> Serializable s) {</tspan></text>
  <text x="486" y="231" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    // JVM이 직렬화 처리</text>
  <text x="486" y="249" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    serialize(s);</text>
  <text x="486" y="267" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- Label 3 -->
  <text x="470" y="299"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">커스텀 마커 인터페이스</text>

  <!-- Code block 3: 3줄, h=70 -->
  <rect x="470" y="307" width="360" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="329" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">public interface</tspan><tspan fill="#ffffff"> Auditable { }</tspan></text>
  <text x="486" y="347" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> Order </tspan><tspan fill="#7ec8e3" font-weight="600">implements</tspan><tspan fill="#ffffff"> Auditable { }</tspan></text>
  <text x="486" y="365" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// implements만으로 마킹 완료</text>

</svg>
