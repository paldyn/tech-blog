<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">lockfile 변경 감지 패턴</text>

  <!-- Code block -->
  <rect x="60" y="68" width="760" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">#!/bin/sh  # .git/hooks/post-merge</text>
  <text xml:space="preserve" x="80" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">SQUASH_MERGE=$1</text>
  <text xml:space="preserve" x="80" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> </text>
  <text xml:space="preserve" x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 변경된 파일 목록에서 lockfile 확인</text>
  <text xml:space="preserve" x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">if</text><text xml:space="preserve" x="107" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> git diff-tree -r --name-only --no-commit-id ORIG_HEAD HEAD \</text>
  <text xml:space="preserve" x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      | grep -q </text><text xml:space="preserve" x="218" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"package-lock.json\|yarn.lock\|pnpm-lock"</text><text xml:space="preserve" x="622" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">; then</text>
  <text xml:space="preserve" x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  npm install</text>
  <text xml:space="preserve" x="80" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">fi</text>

  <!-- ORIG_HEAD box -->
  <rect x="60" y="294" width="230" height="64" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="175" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">ORIG_HEAD</text>
  <text x="175" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">머지 전 HEAD 위치</text>

  <line x1="290" y1="326" x2="360" y2="326" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- diff-tree box -->
  <rect x="362" y="294" width="240" height="64" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="482" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">git diff-tree</text>
  <text x="482" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경 파일 목록 추출</text>

  <!-- grep match / no-match -->
  <line x1="602" y1="326" x2="640" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="602" y1="326" x2="640" y2="352" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <rect x="642" y="278" width="180" height="42" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="732" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">lockfile 변경 있음</text>

  <rect x="642" y="334" width="180" height="42" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1.2"/>
  <text x="732" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666">변경 없음 → 스킵</text>
</svg>
