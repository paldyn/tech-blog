<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git grep 고급 옵션</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">컨텍스트 출력·정규식·논리 조합</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="252" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#9aa4b8"># 매칭 줄 ±3줄 컨텍스트 출력</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git grep</tspan> -C 3 "useEffect"</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 대소문자 무시</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git grep</tspan> -i "todo"</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 정규식 사용</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git grep</tspan> -E "console\.(log|warn|error)"</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># AND 조건 (두 패턴 모두 포함한 파일)</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git grep</tspan> -l --all-match \</tspan>
    <tspan x="76" dy="18">  -e "useState" -e "useEffect"</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 파일명만 출력 (어떤 파일에 있는지)</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git grep</tspan> -l "TODO"</tspan>
  </text>

  <!-- Option cards -->
  <rect x="60" y="370" width="162" height="70" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="141" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">-C n</text>
  <text x="141" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">앞뒤 n줄 표시</text>
  <text x="141" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">-A(아래) -B(위)</text>

  <rect x="236" y="370" width="162" height="70" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="317" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">-i</text>
  <text x="317" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">대소문자 무시</text>
  <text x="317" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">--ignore-case</text>

  <rect x="412" y="370" width="162" height="70" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.2"/>
  <text x="493" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">-E</text>
  <text x="493" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">확장 정규식</text>
  <text x="493" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">POSIX ERE</text>

  <rect x="588" y="370" width="232" height="70" rx="8" fill="#0d1117" stroke="#e8a838" stroke-width="1.2"/>
  <text x="704" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a838" text-anchor="middle">-l --all-match</text>
  <text x="704" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">파일명만 + AND 조건</text>
  <text x="704" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">-e로 복수 패턴 결합</text>
</svg>
