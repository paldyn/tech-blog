<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이미지 최적화 — 포맷 · 크기 · loading 속성</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">지연 로딩과 함께 적용하는 핵심 최적화 기법</text>

  <!-- Format comparison -->
  <rect x="60" y="96" width="200" height="100" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">포맷 선택</text>
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">WebP: JPEG 대비 ~30% 경량</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">AVIF: WebP 대비 ~20% 추가 절감</text>
  <text x="80" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JPEG: 구형 브라우저 폴백</text>

  <!-- srcset -->
  <rect x="280" y="96" width="280" height="100" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="420" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">반응형 srcset</text>
  <text x="296" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">뷰포트 크기에 맞는 이미지 자동 선택</text>
  <text x="296" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">480w, 800w, 1200w 버전 제공</text>
  <text x="296" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">sizes 속성으로 레이아웃 힌트 제공</text>

  <!-- loading=lazy -->
  <rect x="580" y="96" width="240" height="100" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">loading="lazy"</text>
  <text x="596" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">브라우저 네이티브 지연 로딩</text>
  <text x="596" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">JS 없이 동작 (Chrome 77+)</text>
  <text x="596" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">LCP 이미지에는 사용 금지!</text>

  <!-- Code block -->
  <rect x="60" y="220" width="760" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">&lt;!-- 최적화된 이미지 마크업 --&gt;</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&lt;<tspan fill="#7ec8e3" font-weight="600">picture</tspan>&gt;</text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  &lt;<tspan fill="#7ec8e3" font-weight="600">source</tspan> type=<tspan fill="#ce9178">"image/avif"</tspan> srcset=<tspan fill="#ce9178">"img.avif 1x, img@2x.avif 2x"</tspan>/&gt;</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  &lt;<tspan fill="#7ec8e3" font-weight="600">source</tspan> type=<tspan fill="#ce9178">"image/webp"</tspan> srcset=<tspan fill="#ce9178">"img.webp 480w, img-800.webp 800w"</tspan></text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         sizes=<tspan fill="#ce9178">"(max-width: 600px) 480px, 800px"</tspan>/&gt;</text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  &lt;<tspan fill="#7ec8e3" font-weight="600">img</tspan> src=<tspan fill="#ce9178">"img.jpg"</tspan> alt=<tspan fill="#ce9178">"설명"</tspan> loading=<tspan fill="#ce9178">"lazy"</tspan> width=<tspan fill="#ce9178">"800"</tspan> height=<tspan fill="#ce9178">"600"</tspan>/&gt;</text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&lt;/<tspan fill="#7ec8e3" font-weight="600">picture</tspan>&gt;</text>
</svg>
