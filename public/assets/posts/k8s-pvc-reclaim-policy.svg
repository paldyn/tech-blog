<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">PV Reclaim Policy — PVC 삭제 후 PV 처리</text>

  <!-- PVC Deleted state -->
  <rect x="340" y="72" width="200" height="54" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">PVC 삭제됨</text>
  <text x="440" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PV는 Released 상태</text>

  <!-- Arrow to Delete -->
  <line x1="300" y1="126" x2="218" y2="172" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="238" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Delete</text>

  <!-- Arrow to Retain -->
  <line x1="440" y1="126" x2="440" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="450" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Retain</text>

  <!-- Arrow to Recycle (deprecated) -->
  <line x1="580" y1="126" x2="662" y2="172" stroke="#888" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="622" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Recycle</text>

  <!-- Delete box -->
  <rect x="60" y="180" width="220" height="90" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Delete</text>
  <text x="170" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PV + 실제 스토리지</text>
  <text x="170" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모두 자동 삭제</text>
  <text x="170" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">StorageClass 기본값</text>

  <!-- Retain box -->
  <rect x="330" y="180" width="220" height="90" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Retain</text>
  <text x="440" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PV Released 유지</text>
  <text x="440" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">데이터 보존, 수동 정리</text>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">재사용 전 PV 수동 삭제 필요</text>

  <!-- Recycle box (deprecated) -->
  <rect x="600" y="180" width="220" height="90" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="710" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#666">Recycle (deprecated)</text>
  <text x="710" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">rm -rf 후 Available</text>
  <text x="710" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">더 이상 사용 권장 X</text>
  <text x="710" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">v1.15 이후 deprecated</text>

  <!-- PVC lifecycle code block -->
  <rect x="60" y="298" width="760" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#9aa4b8"># PVC 정의 예시</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">apiVersion</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">        : v1</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">kind</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">               : PersistentVolumeClaim</text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">spec.accessModes</text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff"> : [ReadWriteOnce]</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">spec.storageClassName</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff"> : gp3</text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">spec.resources.requests.storage</text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#b5cea8"> : 20Gi</text>
</svg>
