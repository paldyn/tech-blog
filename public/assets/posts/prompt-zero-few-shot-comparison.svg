<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Zero-shot vs Few-shot vs One-shot</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">예시 수에 따른 프롬프트 유형과 성능 트레이드오프</text>

  <!-- Zero-shot -->
  <rect x="60" y="90" width="240" height="320" rx="8" fill="#111827" stroke="#888" stroke-width="1.5"/>
  <text x="180" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#888">Zero-shot</text>
  <text x="180" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">예시 없음</text>
  <line x1="76" y1="146" x2="284" y2="146" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프롬프트 예시:</text>
  <rect x="76" y="176" width="208" height="56" rx="4" fill="#0d1117" stroke="#333"/>
  <text x="86" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"이 문장의 감정을</text>
  <text x="86" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">긍정/부정/중립으로</text>
  <text x="86" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">분류해줘: {text}"</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">장점:</text>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 프롬프트 짧음</text>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 토큰 비용 최소</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점:</text>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 형식 불일치 가능</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 복잡한 태스크 오류</text>
  <text x="180" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">성능: ★★★☆☆</text>

  <!-- One-shot -->
  <rect x="320" y="90" width="240" height="320" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">One-shot</text>
  <text x="440" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">예시 1개</text>
  <line x1="336" y1="146" x2="544" y2="146" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프롬프트 예시:</text>
  <rect x="336" y="176" width="208" height="72" rx="4" fill="#0d1117" stroke="#333"/>
  <text x="346" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve"># 예시</text>
  <text x="346" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">입력: "오늘 최악"</text>
  <text x="346" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">출력: 부정</text>
  <text x="346" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">입력: "{text}"</text>
  <text x="340" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">장점:</text>
  <text x="340" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 형식 힌트 제공</text>
  <text x="340" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 단순 태스크 충분</text>
  <text x="340" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점:</text>
  <text x="340" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 단일 예시 편향 가능</text>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">성능: ★★★★☆</text>

  <!-- Few-shot -->
  <rect x="580" y="90" width="240" height="320" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="700" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">Few-shot</text>
  <text x="700" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">예시 2~8개</text>
  <line x1="596" y1="146" x2="804" y2="146" stroke="#3a4a6e" stroke-width="1"/>
  <text x="600" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프롬프트 예시:</text>
  <rect x="596" y="176" width="208" height="88" rx="4" fill="#0d1117" stroke="#333"/>
  <text x="606" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve"># 예시 3개</text>
  <text x="606" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">입력: "최악" → 부정</text>
  <text x="606" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">입력: "그냥저냥" → 중립</text>
  <text x="606" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">입력: "대박" → 긍정</text>
  <text x="606" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">입력: "{text}"</text>
  <text x="600" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">장점:</text>
  <text x="600" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 형식 일관성 높음</text>
  <text x="600" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 에지 케이스 커버</text>
  <text x="600" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점:</text>
  <text x="600" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 토큰 비용 증가</text>
  <text x="700" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">성능: ★★★★★</text>

  <!-- Bottom -->
  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Few-shot 예시 품질 > 예시 수량 — 나쁜 예시 3개보다 좋은 예시 1개가 낫다</text>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">GPT-3 논문에서 증명: 예시가 많을수록 성능 향상, 단 수확체감 존재</text>
</svg>
