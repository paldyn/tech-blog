<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">Nexacro N 메뉴 구성 구조</text>

  <!-- Menu bar -->
  <rect x="60" y="74" width="760" height="42" rx="6" fill="#1e293b" stroke="#374151"/>
  <text x="100" y="100" fill="#7ec8e3" font-size="13" font-weight="600">메뉴바 (Menu Component)</text>
  <rect x="260" y="82" width="80" height="26" rx="4" fill="#0f172a" stroke="#7ec8e3"/>
  <text x="300" y="99" fill="#e8e8e8" font-size="12" text-anchor="middle">시스템관리</text>
  <rect x="352" y="82" width="80" height="26" rx="4" fill="#0f172a" stroke="#374151"/>
  <text x="392" y="99" fill="#888" font-size="12" text-anchor="middle">영업관리</text>
  <rect x="444" y="82" width="80" height="26" rx="4" fill="#0f172a" stroke="#374151"/>
  <text x="484" y="99" fill="#888" font-size="12" text-anchor="middle">구매관리</text>
  <rect x="536" y="82" width="80" height="26" rx="4" fill="#0f172a" stroke="#374151"/>
  <text x="576" y="99" fill="#888" font-size="12" text-anchor="middle">재무관리</text>

  <!-- Dropdown -->
  <rect x="260" y="116" width="140" height="130" rx="4" fill="#1e293b" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="261" y="117" width="138" height="28" rx="3" fill="#2d4a7a"/>
  <text x="330" y="136" fill="#7ec8e3" font-size="12" text-anchor="middle">사용자관리</text>
  <text x="330" y="162" fill="#e8e8e8" font-size="12" text-anchor="middle">코드관리</text>
  <text x="330" y="188" fill="#e8e8e8" font-size="12" text-anchor="middle">권한관리</text>
  <text x="330" y="214" fill="#e8e8e8" font-size="12" text-anchor="middle">로그조회</text>

  <!-- Sub-menu indicator -->
  <text x="392" y="188" fill="#7777cc" font-size="12">▶</text>
  <rect x="400" y="176" width="120" height="54" rx="4" fill="#1e293b" stroke="#7777cc" stroke-width="1.5"/>
  <text x="460" y="197" fill="#e8e8e8" font-size="12" text-anchor="middle">역할관리</text>
  <text x="460" y="218" fill="#e8e8e8" font-size="12" text-anchor="middle">메뉴권한</text>

  <!-- Dataset structure -->
  <rect x="60" y="270" width="760" height="166" rx="8" fill="#111827" stroke="#374151"/>
  <text x="80" y="296" fill="#e8e8e8" font-size="15" font-weight="600">메뉴 Dataset 구조 (ds_menu)</text>

  <!-- Table header -->
  <rect x="80" y="308" width="720" height="26" rx="3" fill="#1e293b"/>
  <text x="130" y="325" fill="#7ec8e3" font-size="12" text-anchor="middle">menuId</text>
  <line x1="180" y1="308" x2="180" y2="420" stroke="#374151" stroke-width="1"/>
  <text x="255" y="325" fill="#7ec8e3" font-size="12" text-anchor="middle">menuNm</text>
  <line x1="330" y1="308" x2="330" y2="420" stroke="#374151" stroke-width="1"/>
  <text x="395" y="325" fill="#7ec8e3" font-size="12" text-anchor="middle">parentId</text>
  <line x1="460" y1="308" x2="460" y2="420" stroke="#374151" stroke-width="1"/>
  <text x="535" y="325" fill="#7ec8e3" font-size="12" text-anchor="middle">menuUrl</text>
  <line x1="610" y1="308" x2="610" y2="420" stroke="#374151" stroke-width="1"/>
  <text x="680" y="325" fill="#7ec8e3" font-size="12" text-anchor="middle">menuLevel</text>
  <line x1="750" y1="308" x2="750" y2="420" stroke="#374151" stroke-width="1"/>

  <!-- Data rows -->
  <text x="130" y="348" fill="#e8e8e8" font-size="12" text-anchor="middle">SYS</text>
  <text x="255" y="348" fill="#e8e8e8" font-size="12" text-anchor="middle">시스템관리</text>
  <text x="395" y="348" fill="#888" font-size="12" text-anchor="middle">(root)</text>
  <text x="535" y="348" fill="#888" font-size="12" text-anchor="middle">-</text>
  <text x="680" y="348" fill="#b5cea8" font-size="12" text-anchor="middle">1</text>

  <text x="130" y="372" fill="#e8e8e8" font-size="12" text-anchor="middle">SYS01</text>
  <text x="255" y="372" fill="#e8e8e8" font-size="12" text-anchor="middle">사용자관리</text>
  <text x="395" y="372" fill="#7ec8e3" font-size="12" text-anchor="middle">SYS</text>
  <text x="535" y="372" fill="#ce9178" font-size="12" text-anchor="middle">system/UserList</text>
  <text x="680" y="372" fill="#b5cea8" font-size="12" text-anchor="middle">2</text>

  <text x="130" y="396" fill="#e8e8e8" font-size="12" text-anchor="middle">SYS02</text>
  <text x="255" y="396" fill="#e8e8e8" font-size="12" text-anchor="middle">코드관리</text>
  <text x="395" y="396" fill="#7ec8e3" font-size="12" text-anchor="middle">SYS</text>
  <text x="535" y="396" fill="#ce9178" font-size="12" text-anchor="middle">system/CodeList</text>
  <text x="680" y="396" fill="#b5cea8" font-size="12" text-anchor="middle">2</text>

  <text x="130" y="420" fill="#888" font-size="12" text-anchor="middle">...</text>
</svg>
