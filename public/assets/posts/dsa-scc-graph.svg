<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="scc-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">강한 연결 요소 (SCC)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">서로 도달 가능한 노드 집합 — 같은 색 = 같은 SCC</text>

  <!-- SCC 1: nodes 1,2,3 (blue) -->
  <ellipse cx="200" cy="180" rx="110" ry="80" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="200" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">SCC 1</text>

  <!-- SCC 2: nodes 4,5 (green) -->
  <ellipse cx="440" cy="220" rx="90" ry="70" fill="#1a3a1a" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">SCC 2</text>

  <!-- SCC 3: nodes 6,7 (purple) -->
  <ellipse cx="670" cy="200" rx="80" ry="60" fill="#2a1a3a" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="670" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">SCC 3</text>

  <!-- SCC 4: node 8 (red) -->
  <ellipse cx="440" cy="390" rx="50" ry="40" fill="#2a1a1a" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">SCC 4</text>

  <!-- Edges within SCC 1 -->
  <path d="M 155 168 A 30 20 0 1 1 155 192" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#scc-arr)"/>
  <path d="M 200 148 L 220 158" fill="none" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#scc-arr)"/>
  <path d="M 240 172 L 220 182" fill="none" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#scc-arr)"/>
  <path d="M 175 190 L 195 202" fill="none" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#scc-arr)"/>

  <!-- Edges within SCC 2 -->
  <path d="M 405 218 A 25 15 0 1 1 405 242" fill="none" stroke="#55c555" stroke-width="2" marker-end="url(#scc-arr)"/>
  <path d="M 440 192 L 460 202" fill="none" stroke="#55c555" stroke-width="1.5" marker-end="url(#scc-arr)"/>

  <!-- Edges within SCC 3 -->
  <path d="M 640 195 A 25 15 0 1 1 640 215" fill="none" stroke="#7777cc" stroke-width="2" marker-end="url(#scc-arr)"/>

  <!-- Inter-SCC edges (one-way) -->
  <line x1="308" y1="180" x2="352" y2="214" stroke="#555" stroke-width="2" marker-end="url(#scc-arr)"/>
  <text x="325" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">SCC1→SCC2</text>

  <line x1="528" y1="200" x2="588" y2="200" stroke="#555" stroke-width="2" marker-end="url(#scc-arr)"/>
  <text x="558" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">SCC2→SCC3</text>

  <line x1="440" y1="288" x2="440" y2="352" stroke="#555" stroke-width="2" marker-end="url(#scc-arr)"/>
  <text x="464" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">SCC2→SCC4</text>

  <!-- Nodes -->
  <circle cx="155" cy="170" r="22" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="155" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">1</text>

  <circle cx="220" cy="155" r="22" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="220" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">2</text>

  <circle cx="245" cy="195" r="22" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="245" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">3</text>

  <circle cx="415" cy="205" r="22" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="415" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">4</text>

  <circle cx="465" cy="235" r="22" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="465" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">5</text>

  <circle cx="640" cy="195" r="22" fill="#2a1a3a" stroke="#7777cc" stroke-width="2"/>
  <text x="640" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">6</text>

  <circle cx="700" cy="215" r="22" fill="#2a1a3a" stroke="#7777cc" stroke-width="2"/>
  <text x="700" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">7</text>

  <circle cx="440" cy="390" r="22" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">8</text>

  <!-- Algorithm comparison box -->
  <rect x="40" y="390" width="360" height="90" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="220" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">SCC 탐색 알고리즘</text>
  <text x="60" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">코사라주: DFS 2회 | O(V+E)</text>
  <text x="60" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">타잔: DFS 1회 | O(V+E)</text>
  <text x="60" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">둘 다 O(V+E) — 타잔이 상수 작음</text>

  <!-- Condensation DAG box -->
  <rect x="520" y="390" width="320" height="90" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="680" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">압축 그래프 (Condensation DAG)</text>
  <text x="540" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SCC1 → SCC2 → SCC3</text>
  <text x="700" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">↓</text>
  <text x="540" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SCC2 → SCC4</text>
  <text x="540" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">항상 DAG (사이클 없음)</text>
</svg>
