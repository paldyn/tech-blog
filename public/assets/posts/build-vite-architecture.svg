<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="va" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#55c555"/>
    </marker>
    <marker id="vb" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">Vite 이중 아키텍처</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">개발 서버 (ESM Native) vs 프로덕션 빌드 (Rollup)</text>

  <!-- Dev Server side -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" xml:space="preserve">개발 환경</text>

  <!-- esbuild deps -->
  <rect x="60" y="116" width="180" height="56" rx="8" fill="#0d2b1a" stroke="#1e7040"/>
  <text x="76" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">esbuild</text>
  <text x="76" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">node_modules 사전 번들링</text>

  <!-- Arrow down to Dev server -->
  <line x1="150" y1="174" x2="150" y2="198" stroke="#55c555" stroke-width="2" marker-end="url(#va)"/>

  <!-- Dev HTTP Server -->
  <rect x="60" y="200" width="180" height="56" rx="8" fill="#0d2b1a" stroke="#1e7040"/>
  <text x="76" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">Native ESM 서버</text>
  <text x="76" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">브라우저가 직접 import</text>

  <!-- HMR box -->
  <rect x="60" y="268" width="180" height="40" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="76" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" xml:space="preserve">HMR (변경된 모듈만 갱신)</text>

  <!-- Label: 빠른 이유 -->
  <rect x="60" y="322" width="180" height="72" rx="6" fill="#0a1a0a" stroke="#1e4020"/>
  <text x="76" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">왜 빠른가?</text>
  <text x="76" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">번들링 없음 — 브라우저가</text>
  <text x="76" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">필요한 모듈만 요청</text>

  <!-- Divider line -->
  <line x1="300" y1="100" x2="300" y2="410" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="6"/>

  <!-- Production side -->
  <text x="340" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" xml:space="preserve">프로덕션 빌드</text>

  <!-- Source -->
  <rect x="340" y="116" width="160" height="56" rx="8" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="356" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">소스 코드</text>
  <text x="356" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">src/*.ts, *.vue</text>

  <!-- Arrow to Rollup -->
  <line x1="420" y1="174" x2="420" y2="198" stroke="#7ec8e3" stroke-width="2" marker-end="url(#vb)"/>

  <!-- Rollup -->
  <rect x="340" y="200" width="160" height="56" rx="8" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="356" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">Rollup 번들</text>
  <text x="356" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">코드 스플리팅 + 최적화</text>

  <!-- Arrow to Output -->
  <line x1="420" y1="258" x2="420" y2="282" stroke="#7ec8e3" stroke-width="2" marker-end="url(#vb)"/>

  <!-- Output -->
  <rect x="340" y="284" width="160" height="56" rx="8" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="356" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" xml:space="preserve">dist/</text>
  <text x="356" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">[hash].js, index.html</text>

  <!-- Right: config code -->
  <rect x="560" y="116" width="280" height="290" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="576" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// vite.config.ts</text>
  <text x="576" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ffffff">{defineConfig} </tspan><tspan fill="#7ec8e3">from</tspan><tspan fill="#ce9178"> 'vite'</tspan></text>

  <text x="576" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">export default </tspan><tspan fill="#ffffff">defineConfig({</tspan></text>
  
  <text x="576" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  plugins: [vue()],</text>
  <text x="576" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  resolve: {</text>
  <text x="576" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    alias: { </tspan><tspan fill="#ce9178">'@'</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">'/src'</tspan><tspan fill="#ffffff">},</tspan></text>

  <text x="576" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  },</text>
  <text x="576" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  build: {</text>
  <text x="576" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    target: </tspan><tspan fill="#ce9178">'esnext'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="576" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    rollupOptions: {</text>
  <text x="576" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      output: {</text>
  <text x="576" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        manualChunks:</text>
  <text x="576" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">          { vendor: [</tspan><tspan fill="#ce9178">'react'</tspan><tspan fill="#ffffff">]}</tspan></text>

  <text x="576" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  }}});</text>

  <text x="60" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">개발 중에는 소스맵이 1:1 매핑 — 번들 없이 원본 파일 그대로 디버깅 가능</text>
</svg>
