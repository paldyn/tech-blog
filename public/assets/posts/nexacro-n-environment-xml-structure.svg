  <text x="370" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">utf-8</text>
  <text x="370" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">+ compress</text>

