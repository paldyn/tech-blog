  <text x="370" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">HTTPProtocol</text>
  <text x="440" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">encoding</text>
