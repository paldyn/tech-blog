  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ecfa2" text-anchor="middle">dev / stage / prod 환경마다 별도 Environment.xml을 준비하고 빌드 시 교체하는 방식이 일반적</text>

