  <text x="440" y="34" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Environment.xml 구조와 주요 설정 블록</text>

