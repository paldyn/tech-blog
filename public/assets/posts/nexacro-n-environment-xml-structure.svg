  <text x="520" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">msgbox</text>
  <text x="520" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">+ keepalive</text>

