<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arry" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#e8c84a" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JIT 컴파일 파이프라인</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Interpreter Profiling → C1 → C2 → Deoptimization</text>

  <!-- ── Phase 1: Bytecode → Interpreter ── -->
  <rect x="60" y="96" width="160" height="80" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.3"/>
  <text x="140" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">바이트코드</text>
  <text x="140" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">클래스 로드 완료</text>
  <text x="140" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">실행 준비</text>

  <line x1="220" y1="136" x2="256" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Phase 2: Interpreter ── -->
  <rect x="256" y="96" width="160" height="80" rx="8" fill="#0b1a0b" stroke="#55c555" stroke-width="1.3"/>
  <text x="336" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Interpreter</text>
  <text x="336" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">한 줄씩 번역 실행</text>
  <text x="336" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">호출 횟수 카운트</text>

  <!-- Profiling label -->
  <text x="336" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Profiling 수집 중</text>

  <!-- Threshold check -->
  <line x1="416" y1="136" x2="452" y2="136" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="434" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c84a" text-anchor="middle">≥ 2000</text>
  <text x="434" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">호출</text>

  <!-- ── Phase 3: C1 ── -->
  <rect x="452" y="96" width="160" height="80" rx="8" fill="#101828" stroke="#7ec8e3" stroke-width="1.3"/>
  <text x="532" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">C1 컴파일러</text>
  <text x="532" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(Client Compiler)</text>
  <text x="532" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">빠른 컴파일, 기본 최적화</text>
  <text x="532" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">인라이닝·상수 폴딩</text>

  <line x1="612" y1="136" x2="648" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="630" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c84a" text-anchor="middle">≥ 15000</text>
  <text x="630" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">호출</text>

  <!-- ── Phase 4: C2 ── -->
  <rect x="648" y="96" width="172" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.3"/>
  <text x="734" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">C2 컴파일러</text>
  <text x="734" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(Server Compiler)</text>
  <text x="734" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">공격적 최적화</text>
  <text x="734" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">탈출 분석·루프 언롤링</text>

  <!-- ── Deoptimization arrow (C2 → Interpreter) ── -->
  <path d="M 734 176 Q 734 230 336 230 Q 336 210 336 196" stroke="#e05555" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="540" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">Deoptimization (가정이 깨지면 롤백)</text>

  <!-- ── Code Cache output ── -->
  <line x1="734" y1="176" x2="734" y2="278" stroke="#e8c84a" stroke-width="1.5" marker-end="url(#arry)"/>
  <rect x="648" y="278" width="172" height="60" rx="6" fill="#000000" stroke="#e8c84a" stroke-width="1.2"/>
  <text x="734" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c84a" text-anchor="middle">Code Cache</text>
  <text x="734" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">컴파일 결과 캐싱</text>

  <!-- ── Optimization techniques box ── -->
  <rect x="60" y="290" width="540" height="180" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="84" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">주요 JIT 최적화 기법</text>

  <!-- Code block -->
  <rect x="80" y="328" width="500" height="126" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 1. 메서드 인라이닝 — 호출 오버헤드 제거</text>
  <text x="96" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">int add(int a, int b) { </text>
  <text x="96" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    return a + b; </text>
  <text x="96" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">}  </text>
  <text x="96" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// C2가 호출 지점에 직접 삽입 → 메서드 호출 없음</text>
  <text x="96" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// int result = a + b;  ← 인라인 결과</text>

  <!-- Right column: optimization list -->
  <rect x="648" y="360" width="172" height="110" rx="6" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="672" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8">C2 최적화 목록</text>
  <rect x="668" y="394" width="6" height="6" rx="1" fill="#7ec8e3"/>
  <text x="682" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">메서드 인라이닝</text>
  <rect x="668" y="414" width="6" height="6" rx="1" fill="#7ec8e3"/>
  <text x="682" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">탈출 분석 (스택 할당)</text>
  <rect x="668" y="434" width="6" height="6" rx="1" fill="#7ec8e3"/>
  <text x="682" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">루프 언롤링</text>
  <rect x="668" y="454" width="6" height="6" rx="1" fill="#7ec8e3"/>
  <text x="682" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">상수 폴딩·전파</text>
</svg>
