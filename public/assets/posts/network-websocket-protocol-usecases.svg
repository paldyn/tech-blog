<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-back" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP Polling vs WebSocket vs SSE</text>

  <!-- HTTP Polling -->
  <text x="145" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">HTTP Short Polling</text>

  <rect x="60" y="88" width="170" height="240" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>

  <rect x="76" y="100" width="60" height="26" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="106" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Client</text>

  <rect x="154" y="100" width="60" height="26" rx="4" fill="#2a1a1a" stroke="#555" stroke-width="1"/>
  <text x="184" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Server</text>

  <line x1="136" y1="132" x2="152" y2="132" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="152" y1="148" x2="138" y2="148" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="136" y1="168" x2="152" y2="168" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="152" y1="184" x2="138" y2="184" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="136" y1="204" x2="152" y2="204" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="152" y1="220" x2="138" y2="220" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="136" y1="240" x2="152" y2="240" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="152" y1="256" x2="138" y2="256" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="136" y1="276" x2="152" y2="276" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="152" y1="292" x2="138" y2="292" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="145" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">무의미한 요청 반복</text>

  <!-- WebSocket -->
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">WebSocket</text>

  <rect x="340" y="88" width="200" height="240" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>

  <rect x="356" y="100" width="60" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="386" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Client</text>

  <rect x="464" y="100" width="60" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="494" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Server</text>

  <!-- Handshake -->
  <line x1="416" y1="132" x2="462" y2="132" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="439" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Upgrade</text>
  <line x1="462" y1="148" x2="418" y2="148" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="439" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">101 OK</text>

  <!-- Persistent messages -->
  <line x1="416" y1="180" x2="462" y2="195" stroke="#e09050" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="462" y1="215" x2="416" y2="230" stroke="#e09050" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="416" y1="248" x2="462" y2="263" stroke="#e09050" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="462" y1="276" x2="416" y2="291" stroke="#e09050" stroke-width="2" marker-end="url(#arr)"/>

  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">단일 TCP, 양방향 실시간</text>

  <!-- SSE -->
  <text x="730" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">SSE (Server-Sent Events)</text>

  <rect x="630" y="88" width="190" height="240" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1"/>

  <rect x="646" y="100" width="60" height="26" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="676" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Client</text>

  <rect x="744" y="100" width="60" height="26" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="774" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Server</text>

  <!-- SSE one-way stream -->
  <line x1="676" y1="132" x2="742" y2="132" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="709" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">구독</text>
  <line x1="742" y1="155" x2="676" y2="175" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-back)"/>
  <line x1="742" y1="195" x2="676" y2="215" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-back)"/>
  <line x1="742" y1="235" x2="676" y2="255" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-back)"/>
  <line x1="742" y1="270" x2="676" y2="290" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-back)"/>

  <text x="720" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">서버→클라이언트 단방향</text>

  <!-- Use cases -->
  <text x="60" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">WebSocket 주요 사용처</text>

  <rect x="60" y="366" width="168" height="70" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="144" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">채팅 / 메신저</text>
  <text x="144" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Slack, Discord</text>
  <text x="144" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실시간 협업 에디터</text>

  <rect x="252" y="366" width="168" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="336" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">온라인 게임</text>
  <text x="336" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">플레이어 위치 동기화</text>
  <text x="336" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">저지연 게임 이벤트</text>

  <rect x="444" y="366" width="168" height="70" rx="8" fill="#2a1a1a" stroke="#e09050" stroke-width="1"/>
  <text x="528" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09050" text-anchor="middle">금융 / 주식</text>
  <text x="528" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실시간 시세 스트림</text>
  <text x="528" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">호가창 업데이트</text>

  <rect x="636" y="366" width="184" height="70" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="728" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">IoT / 대시보드</text>
  <text x="728" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">센서 데이터 스트림</text>
  <text x="728" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모니터링 대시보드</text>
</svg>
