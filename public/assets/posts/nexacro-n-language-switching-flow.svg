<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">언어 전환 흐름</text>

  <!-- Step boxes -->
  <!-- 1: 사용자 언어 선택 -->
  <rect x="60" y="80" width="200" height="70" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 사용자 언어 선택</text>
  <text x="160" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Combo/버튼으로 언어 선택</text>
  <text x="160" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">cmb_lang.value = "en"</text>

  <line x1="260" y1="115" x2="354" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 2: 언어 전환 함수 호출 -->
  <rect x="360" y="80" width="200" height="70" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">② gfn_setLanguage()</text>
  <text x="460" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">공통 언어 전환 함수</text>
  <text x="460" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쿠키/세션에 선택 저장</text>

  <line x1="560" y1="115" x2="654" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 3: nexacro.setLanguage() -->
  <rect x="660" y="80" width="180" height="70" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="750" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">③ nexacro API</text>
  <text x="750" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">nexacro.setLanguage()</text>
  <text x="750" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리소스 파일 교체</text>

  <!-- Arrow down from 3 -->
  <line x1="750" y1="150" x2="750" y2="194" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- 4: 컴포넌트 갱신 -->
  <rect x="660" y="200" width="180" height="70" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="750" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">④ 화면 자동 갱신</text>
  <text x="750" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">$ID 컴포넌트 재렌더</text>
  <text x="750" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">버튼·레이블 즉시 변경</text>

  <!-- Arrow down from 2 -->
  <line x1="460" y1="150" x2="460" y2="194" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 5: DB 코드·메시지 재로드 -->
  <rect x="360" y="200" width="200" height="70" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="460" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">⑤ DB 데이터 재조회</text>
  <text x="460" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">코드값·메뉴 재로드</text>
  <text x="460" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">lang 파라미터 변경</text>

  <!-- Arrow down from 1 -->
  <line x1="160" y1="150" x2="160" y2="194" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 6: 그리드 헤더 재설정 -->
  <rect x="60" y="200" width="200" height="70" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">⑥ 그리드 헤더 갱신</text>
  <text x="160" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">fn_setGridHeader() 호출</text>
  <text x="160" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">setColProperty 재적용</text>

  <!-- Code box -->
  <rect x="60" y="300" width="760" height="158" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 공통 언어 전환 함수 (BaseForm 또는 공통 라이브러리)</text>
  <text x="80" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> gfn_setLanguage(sLang) {</tspan>
  </text>
  <text x="80" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  nexacro.setLanguage(sLang);   </tspan>
    <tspan fill="#9aa4b8">// ③ 리소스 교체</tspan>
  </text>
  <text x="80" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  gv_lang = sLang;              </tspan>
    <tspan fill="#9aa4b8">// 전역 언어 저장</tspan>
  </text>
  <text x="80" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  fn_reloadCodeDatasets(sLang); </tspan>
    <tspan fill="#9aa4b8">// ⑤ 코드 재조회</tspan>
  </text>
  <text x="80" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  fn_refreshGridHeaders();      </tspan>
    <tspan fill="#9aa4b8">// ⑥ 헤더 갱신</tspan>
  </text>
  <text x="80" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
</svg>
