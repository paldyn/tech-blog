<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">UI = f(state) 멘탈 모델</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">State가 바뀌면 React가 새 UI를 계산해 반영한다</text>

  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arr-c" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Step 1: State -->
  <rect x="60" y="110" width="160" height="80" rx="8" fill="#1a1a30" stroke="#7777cc" stroke-width="2"/>
  <text x="140" y="142" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">State</text>
  <text x="140" y="162" font-size="12" fill="#888" text-anchor="middle">count: 0</text>
  <text x="140" y="179" font-size="12" fill="#888" text-anchor="middle">name: 'React'</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="150" x2="280" y2="150" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w)"/>
  <text x="250" y="142" font-size="11" fill="#888" text-anchor="middle">전달</text>

  <!-- Step 2: f(state) = Component -->
  <rect x="280" y="95" width="200" height="110" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="380" y="121" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">f(state)</text>
  <text x="380" y="141" font-size="12" fill="#888" text-anchor="middle">컴포넌트 함수 실행</text>

  <!-- Code box inside -->
  <rect x="295" y="150" width="170" height="42" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="305" y="168" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="377" y="168" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Counter()</text>
  <text x="305" y="185" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return &lt;div&gt;...&lt;/div&gt;</text>

  <!-- Arrow 2 -->
  <line x1="480" y1="150" x2="540" y2="150" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w)"/>
  <text x="510" y="142" font-size="11" fill="#888" text-anchor="middle">반환</text>

  <!-- Step 3: Virtual DOM -->
  <rect x="540" y="110" width="160" height="80" rx="8" fill="#12201a" stroke="#55c555" stroke-width="2"/>
  <text x="620" y="142" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Virtual DOM</text>
  <text x="620" y="162" font-size="12" fill="#888" text-anchor="middle">{ type: 'div',</text>
  <text x="620" y="179" font-size="12" fill="#888" text-anchor="middle">  children: ... }</text>

  <!-- Arrow 3 -->
  <line x1="700" y1="150" x2="760" y2="150" stroke="#55c555" stroke-width="2" marker-end="url(#arr-c)"/>
  <text x="730" y="142" font-size="11" fill="#888" text-anchor="middle">commit</text>

  <!-- Step 4: Real DOM -->
  <rect x="760" y="110" width="80" height="80" rx="8" fill="#1a1200" stroke="#ce9178" stroke-width="2"/>
  <text x="800" y="147" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Real</text>
  <text x="800" y="165" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">DOM</text>

  <!-- State update cycle (bottom) -->
  <rect x="60" y="250" width="770" height="170" rx="10" fill="#111118" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="276" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">State 업데이트 사이클</text>

  <!-- Cycle boxes -->
  <rect x="80" y="294" width="140" height="50" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="316" font-size="13" fill="#e8e8e8" text-anchor="middle">① 이벤트 발생</text>
  <text x="150" y="334" font-size="11" fill="#888" text-anchor="middle">onClick, onChange...</text>

  <rect x="270" y="294" width="140" height="50" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="340" y="316" font-size="13" fill="#e8e8e8" text-anchor="middle">② setState 호출</text>
  <text x="340" y="334" font-size="11" fill="#888" text-anchor="middle">새 state 예약</text>

  <rect x="460" y="294" width="140" height="50" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="530" y="316" font-size="13" fill="#e8e8e8" text-anchor="middle">③ 리렌더링</text>
  <text x="530" y="334" font-size="11" fill="#888" text-anchor="middle">컴포넌트 재실행</text>

  <rect x="650" y="294" width="140" height="50" rx="6" fill="#12201a" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="316" font-size="13" fill="#e8e8e8" text-anchor="middle">④ DOM 업데이트</text>
  <text x="720" y="334" font-size="11" fill="#888" text-anchor="middle">변경 부분만 반영</text>

  <line x1="220" y1="319" x2="270" y2="319" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-c)"/>
  <line x1="410" y1="319" x2="460" y2="319" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-c)"/>
  <line x1="600" y1="319" x2="650" y2="319" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-c)"/>

  <text x="440" y="395" font-size="12" fill="#555" text-anchor="middle">State가 같으면 UI도 같다 — 예측 가능하고 디버깅이 쉽다</text>
</svg>
