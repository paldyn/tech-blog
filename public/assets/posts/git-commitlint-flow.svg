<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">commitlint 검증 흐름</text>

  <!-- git commit -->
  <rect x="310" y="68" width="260" height="52" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">git commit -m "..."</text>
  <text x="440" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">메시지가 .git/COMMIT_EDITMSG에 기록</text>

  <line x1="440" y1="120" x2="440" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- commit-msg hook -->
  <rect x="250" y="150" width="380" height="52" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">commit-msg 훅 (Husky)</text>
  <text x="440" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">npx --no -- commitlint --edit $1</text>

  <line x1="440" y1="202" x2="440" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- commitlint -->
  <rect x="250" y="232" width="380" height="52" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">commitlint</text>
  <text x="440" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">commitlint.config.js 룰 적용</text>

  <!-- pass / fail branches -->
  <line x1="250" y1="258" x2="140" y2="316" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="630" y1="258" x2="740" y2="316" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- pass -->
  <rect x="60" y="318" width="160" height="72" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">통과</text>
  <text x="140" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커밋 생성 완료</text>
  <text x="140" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">exit 0</text>

  <!-- fail -->
  <rect x="660" y="318" width="160" height="72" rx="8" fill="#1f1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">실패</text>
  <text x="740" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커밋 중단</text>
  <text x="740" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">exit 1</text>

  <!-- error message -->
  <rect x="220" y="318" width="440" height="72" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="240" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">✖ type must be one of</text>
  <text xml:space="preserve" x="240" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  [feat, fix, docs, ...]</text>
  <text xml:space="preserve" x="240" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">  subject may not be empty</text>
</svg>
