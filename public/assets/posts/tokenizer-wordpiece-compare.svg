<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">WordPiece vs BPE: 병합 기준의 차이</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">BPE는 빈도 최대화, WordPiece는 언어 모델 우도 최대화를 기준으로 삼는다</text>

  <!-- Left: BPE -->
  <rect x="60" y="92" width="360" height="380" rx="10" fill="#111" stroke="#222"/>
  <text x="240" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">BPE 병합 기준</text>

  <rect x="80" y="130" width="320" height="60" rx="6" fill="#0a0a1a" stroke="#1e1e40"/>
  <text x="240" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc" text-anchor="middle">score(a,b) = count(ab)</text>
  <text x="240" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">단순히 인접 쌍 빈도가 가장 높은 것을 병합</text>

  <text x="80" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">특성</text>
  <rect x="80" y="222" width="320" height="34" rx="5" fill="#0a0a0a" stroke="#1e1e28"/>
  <text x="96" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빈도 기반 탐욕적 알고리즘</text>

  <rect x="80" y="262" width="320" height="34" rx="5" fill="#0a0a0a" stroke="#1e1e28"/>
  <text x="96" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단어 경계 마커 </text>
  <text x="230" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">&lt;/w&gt;</text>
  <text x="276" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> 접미사 사용</text>

  <rect x="80" y="302" width="320" height="34" rx="5" fill="#0a0a0a" stroke="#1e1e28"/>
  <text x="96" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Byte-Level BPE로 OOV 완전 제거 가능</text>

  <rect x="80" y="342" width="320" height="34" rx="5" fill="#0a0a0a" stroke="#1e1e28"/>
  <text x="96" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GPT 시리즈, LLaMA, Mistral 등</text>

  <!-- WordPiece -->
  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">인코딩 방향</text>
  <rect x="80" y="410" width="320" height="44" rx="6" fill="#111820" stroke="#3a4a6e"/>
  <text x="240" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">low → l + o + w → lo + w → low</text>
  <text x="240" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(규칙 적용 순서대로)</text>

  <!-- Right: WordPiece -->
  <rect x="460" y="92" width="360" height="380" rx="10" fill="#111" stroke="#222"/>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">WordPiece 병합 기준</text>

  <rect x="480" y="130" width="320" height="78" rx="6" fill="#0a1a0a" stroke="#1e3a1e"/>
  <text x="640" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle">score(a,b) = P(ab) / (P(a)·P(b))</text>
  <text x="640" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">개별 등장 확률 대비 결합 확률이</text>
  <text x="640" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">가장 높은 쌍을 병합 (상호 정보량)</text>

  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">특성</text>
  <rect x="480" y="240" width="320" height="34" rx="5" fill="#0a0a0a" stroke="#1e1e28"/>
  <text x="496" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">언어 모델 우도 기반 병합 선택</text>

  <rect x="480" y="280" width="320" height="34" rx="5" fill="#0a0a0a" stroke="#1e1e28"/>
  <text x="496" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서브워드 접두사 </text>
  <text x="628" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">##</text>
  <text x="652" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> 사용</text>

  <rect x="480" y="320" width="320" height="34" rx="5" fill="#0a0a0a" stroke="#1e1e28"/>
  <text x="496" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최장 일치(Longest Match) 인코딩</text>

  <rect x="480" y="360" width="320" height="34" rx="5" fill="#0a0a0a" stroke="#1e1e28"/>
  <text x="496" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BERT, DistilBERT, mBERT 등</text>

  <text x="480" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">인코딩 방향</text>
  <rect x="480" y="424" width="320" height="30" rx="6" fill="#111820" stroke="#3a4a6e"/>
  <text x="640" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">unaffable → un + ##aff + ##able</text>
</svg>
