<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">intern() 동작 흐름과 주의사항</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Pool에 있으면 Pool 참조 반환, 없으면 Pool에 등록 후 반환</text>

  <!-- Flow diagram -->
  <!-- Start: new String(...) -->
  <rect x="50" y="100" width="200" height="48" rx="8" fill="#1a2233" stroke="#7777cc"/>
  <text x="150" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">new String("text")</text>
  <text x="150" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">힙에 새 객체 생성</text>

  <!-- Arrow: → intern() call -->
  <line x1="250" y1="124" x2="296" y2="124" stroke="#888" stroke-width="1.5"/>
  <polygon points="296,124 284,118 284,130" fill="#888"/>
  <text x="273" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">.intern()</text>

  <!-- Decision diamond -->
  <polygon points="380,90 460,124 380,158 300,124" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="380" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Pool에</text>
  <text x="380" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">존재?</text>

  <!-- Yes branch: arrow down -->
  <line x1="380" y1="158" x2="380" y2="208" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="380,208 374,196 386,196" fill="#55c555"/>
  <text x="395" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Yes</text>

  <!-- Return Pool ref -->
  <rect x="290" y="208" width="180" height="48" rx="8" fill="#0f2010" stroke="#55c555"/>
  <text x="380" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Pool 참조 반환</text>
  <text x="380" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기존 Pool 객체 재사용</text>

  <!-- No branch: arrow right -->
  <line x1="460" y1="124" x2="556" y2="124" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="556,124 544,118 544,130" fill="#e05555"/>
  <text x="508" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">No</text>

  <!-- Add to Pool -->
  <rect x="556" y="100" width="200" height="48" rx="8" fill="#201010" stroke="#e05555"/>
  <text x="656" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Pool에 등록</text>
  <text x="656" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">해당 String을 Pool에 추가</text>

  <!-- Arrow down from Add to Pool -->
  <line x1="656" y1="148" x2="656" y2="208" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="656,208 650,196 662,196" fill="#e05555"/>

  <!-- Return new Pool ref -->
  <rect x="566" y="208" width="180" height="48" rx="8" fill="#201010" stroke="#e05555"/>
  <text x="656" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">새 Pool 참조 반환</text>
  <text x="656" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">등록된 Pool 객체 반환</text>

  <!-- Code block: intern best practices -->
  <rect x="50" y="296" width="780" height="148" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="66" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// intern() 활용 예시</text>
  <text x="66" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">String</tspan><tspan fill="#ffffff"> a = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> String(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">).intern();  </tspan><tspan fill="#9aa4b8">// Pool 참조</tspan></text>
  <text x="66" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">String</tspan><tspan fill="#ffffff"> b = </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">;              </tspan><tspan fill="#9aa4b8">// Pool 참조 (리터럴)</tspan></text>
  <text x="66" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">a == b;  </tspan><tspan fill="#9aa4b8">// </tspan><tspan fill="#55c555">true</tspan><tspan fill="#9aa4b8">  (같은 Pool 객체)</tspan></text>
  <text x="66" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 주의: 동적 생성 문자열을 대량 intern하면 Pool 부담 증가</text>
  <text x="66" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 유한한 종류의 문자열(상태값, 코드명)에만 intern 적용 권장</text>
  <text x="66" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// -XX:StringTableSize=</tspan><tspan fill="#b5cea8">131072</tspan><tspan fill="#9aa4b8">  Pool 해시테이블 버킷 수 조정</tspan></text>
</svg>
