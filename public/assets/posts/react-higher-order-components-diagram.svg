<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">고차 컴포넌트 (HOC) 구조</text>

  <defs>
    <marker id="arrh" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Input component -->
  <rect x="60" y="90" width="180" height="70" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="150" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">WrappedComponent</text>
  <text x="150" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원본 컴포넌트</text>

  <!-- Arrow into HOC -->
  <line x1="240" y1="125" x2="295" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrh)"/>

  <!-- HOC box -->
  <rect x="295" y="72" width="300" height="220" rx="10" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="445" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">HOC 함수</text>
  <text x="445" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">withFeature(WrappedComponent)</text>

  <!-- Inner enhanced component -->
  <rect x="315" y="130" width="260" height="140" rx="8" fill="#0f1629" stroke="#3a4a6e" stroke-width="1"/>
  <text x="445" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Enhanced (반환값)</text>
  <text x="445" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추가 로직 처리</text>
  <text x="445" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(인증 확인, 로딩, 로깅...)</text>
  <text x="445" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&lt;WrappedComponent {...props} /&gt;</text>
  <text x="445" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">원본 props를 그대로 전달</text>

  <!-- Arrow out from HOC -->
  <line x1="595" y1="125" x2="645" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrh)"/>

  <!-- Enhanced component output -->
  <rect x="645" y="90" width="175" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="732" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">EnhancedComponent</text>
  <text x="732" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기능이 추가된 버전</text>

  <!-- Usage example -->
  <rect x="60" y="316" width="760" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> withAuth = (WrappedComponent) =&gt; (props) =&gt;</tspan></tspan>
    <tspan x="76" dy="22"><tspan fill="#ffffff">  isLoggedIn ? &lt;WrappedComponent {...props} /&gt; : &lt;Login /&gt;;</tspan></tspan>
    <tspan x="76" dy="22"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> ProtectedDashboard = withAuth(Dashboard);</tspan></tspan>
  </text>
</svg>