<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">전이 의존성(Transitive Dependency)과 충돌 해결</text>

  <!-- My App -->
  <rect x="340" y="68" width="200" height="52" fill="#131a2a" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="94" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">my-app</text>
  <text x="440" y="112" font-size="11" fill="#888" text-anchor="middle">내 프로젝트</text>

  <!-- Direct deps -->
  <rect x="100" y="168" width="180" height="52" fill="#0e1420" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="190" y="194" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">starter-web</text>
  <text x="190" y="212" font-size="11" fill="#888" text-anchor="middle">직접 의존성</text>

  <rect x="600" y="168" width="180" height="52" fill="#0e1420" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="194" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">starter-data-jpa</text>
  <text x="690" y="212" font-size="11" fill="#888" text-anchor="middle">직접 의존성</text>

  <!-- Transitive deps -->
  <rect x="60" y="278" width="140" height="48" fill="#0e0e0e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="130" y="300" font-size="12" fill="#888" text-anchor="middle">spring-webmvc</text>
  <text x="130" y="316" font-size="11" fill="#555" text-anchor="middle">전이 의존성</text>

  <rect x="220" y="278" width="140" height="48" fill="#0e0e0e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="290" y="300" font-size="12" fill="#888" text-anchor="middle">tomcat-embed</text>
  <text x="290" y="316" font-size="11" fill="#555" text-anchor="middle">전이 의존성</text>

  <!-- jackson shared -->
  <rect x="380" y="278" width="120" height="48" fill="#1a1a0a" rx="6" stroke="#e0c555" stroke-width="2"/>
  <text x="440" y="298" font-size="12" font-weight="600" fill="#e0c555" text-anchor="middle">jackson</text>
  <text x="440" y="314" font-size="11" fill="#888" text-anchor="middle">버전 충돌 가능!</text>

  <rect x="560" y="278" width="140" height="48" fill="#0e0e0e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="630" y="300" font-size="12" fill="#888" text-anchor="middle">hibernate-core</text>
  <text x="630" y="316" font-size="11" fill="#555" text-anchor="middle">전이 의존성</text>

  <rect x="720" y="278" width="100" height="48" fill="#0e0e0e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="770" y="300" font-size="12" fill="#888" text-anchor="middle">HikariCP</text>
  <text x="770" y="316" font-size="11" fill="#555" text-anchor="middle">전이 의존성</text>

  <!-- Lines -->
  <line x1="380" y1="120" x2="190" y2="168" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="500" y1="120" x2="690" y2="168" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="190" y1="220" x2="130" y2="278" stroke="#555" stroke-width="1"/>
  <line x1="190" y1="220" x2="290" y2="278" stroke="#555" stroke-width="1"/>
  <line x1="190" y1="220" x2="440" y2="278" stroke="#e0c555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="690" y1="220" x2="440" y2="278" stroke="#e0c555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="690" y1="220" x2="630" y2="278" stroke="#555" stroke-width="1"/>
  <line x1="690" y1="220" x2="770" y2="278" stroke="#555" stroke-width="1"/>

  <!-- Conflict resolution box -->
  <rect x="60" y="354" width="760" height="68" fill="#070b14" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 충돌 분석: ./gradlew dependencies --configuration compileClasspath</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 버전 강제 지정 (Gradle): constraints { implementation("com.fasterxml.jackson.core:jackson-core:2.17.1") }</text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"># BOM 사용 시: 위 충돌 자동 해결 (검증된 버전 조합 제공)</text>

  <!-- Footer -->
  <text x="440" y="444" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #8</text>
</svg>
