<svg xmlns="http://www.w3.org/2000/svg" width="880" height="600" viewBox="0 0 880 600">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    .mono { font-family: 'JetBrains Mono','Menlo',monospace; }</style>
  </defs>
  <rect width="880" height="600" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">관측성 스택 — opt-in 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">평소엔 안 뜨고, 필요할 때만 +5 컨테이너 / +700MB RAM</text>

  <!-- Application layer (always running) -->
  <rect x="40" y="100" width="800" height="120" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">애플리케이션 (항상 동작)</text>
  <text x="440" y="148" text-anchor="middle" font-size="11" fill="#888">관측성 스택이 꺼져있어도 앱은 정상 작동</text>

  <g>
    <rect x="60" y="170" width="140" height="36" rx="4" fill="#000" stroke="#444"/>
    <text x="130" y="192" text-anchor="middle" class="mono" font-size="10" fill="#aaa">mb-auth-api</text>

    <rect x="220" y="170" width="140" height="36" rx="4" fill="#000" stroke="#444"/>
    <text x="290" y="192" text-anchor="middle" class="mono" font-size="10" fill="#aaa">mb-dict-api</text>

    <rect x="380" y="170" width="140" height="36" rx="4" fill="#000" stroke="#444"/>
    <text x="450" y="192" text-anchor="middle" class="mono" font-size="10" fill="#aaa">mb-erd-api</text>

    <rect x="540" y="170" width="140" height="36" rx="4" fill="#000" stroke="#444"/>
    <text x="610" y="192" text-anchor="middle" class="mono" font-size="10" fill="#aaa">mb-dbwb-api</text>

    <rect x="700" y="170" width="120" height="36" rx="4" fill="#000" stroke="#444"/>
    <text x="760" y="192" text-anchor="middle" class="mono" font-size="10" fill="#aaa">mb-client</text>
  </g>

  <!-- Arrows down -->
  <line x1="440" y1="226" x2="440" y2="256" stroke="#444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="440" y="248" text-anchor="middle" font-size="10" fill="#666">stdout / metrics / spans</text>

  <!-- Observability stack (opt-in) -->
  <rect x="40" y="266" width="800" height="240" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="440" y="294" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">관측성 스택 — opt-in (COMPOSE_PROFILES=observability)</text>
  <text x="440" y="314" text-anchor="middle" font-size="11" fill="#888">5개 컨테이너 / RAM ~700MB / 평소엔 안 뜸</text>

  <!-- Promtail -->
  <rect x="60" y="332" width="135" height="60" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="127" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">Promtail</text>
  <text x="127" y="370" text-anchor="middle" font-size="10" fill="#aaa">label 기반</text>
  <text x="127" y="384" text-anchor="middle" font-size="10" fill="#aaa">로그 수집</text>

  <!-- Loki -->
  <rect x="215" y="332" width="135" height="60" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="282" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">Loki</text>
  <text x="282" y="370" text-anchor="middle" font-size="10" fill="#aaa">로그 저장소</text>
  <text x="282" y="384" text-anchor="middle" font-size="10" fill="#aaa">label 인덱스</text>

  <!-- Prometheus -->
  <rect x="370" y="332" width="135" height="60" rx="4" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="437" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">Prometheus</text>
  <text x="437" y="370" text-anchor="middle" font-size="10" fill="#aaa">/actuator</text>
  <text x="437" y="384" text-anchor="middle" font-size="10" fill="#aaa">scrape</text>

  <!-- Tempo (트레이싱은 별도 override) -->
  <rect x="525" y="332" width="135" height="60" rx="4" fill="#1a0f1a" stroke="#cc77cc" stroke-width="1"/>
  <text x="592" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#cc77cc">Tempo</text>
  <text x="592" y="370" text-anchor="middle" font-size="10" fill="#aaa">trace 저장소</text>
  <text x="592" y="384" text-anchor="middle" font-size="10" fill="#888">+override 필요</text>

  <!-- Grafana -->
  <rect x="680" y="332" width="135" height="60" rx="4" fill="#1a1a0f" stroke="#e8c855" stroke-width="1"/>
  <text x="747" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#e8c855">Grafana</text>
  <text x="747" y="370" text-anchor="middle" font-size="10" fill="#aaa">UI / 대시보드</text>
  <text x="747" y="384" text-anchor="middle" font-size="10" fill="#aaa">자동 프로비저닝</text>

  <!-- Connections within observability stack -->
  <line x1="195" y1="362" x2="215" y2="362" stroke="#444" stroke-width="1"/>
  <line x1="350" y1="362" x2="370" y2="362" stroke="#444" stroke-width="1"/>
  <line x1="282" y1="392" x2="282" y2="430" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="437" y1="392" x2="437" y2="430" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="592" y1="392" x2="592" y2="430" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="282" y1="430" x2="747" y2="430" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="747" y1="430" x2="747" y2="392" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="440" y="450" text-anchor="middle" font-size="11" fill="#666">Loki / Prometheus / Tempo → Grafana 데이터소스로 통합</text>

  <!-- Trace ID 자동 연결 -->
  <rect x="60" y="464" width="755" height="32" rx="4" fill="#1a1a2e"/>
  <text x="440" y="484" text-anchor="middle" font-size="11" fill="#aaa">로그의 trace_id=abc... 클릭 → Loki 의 derivedFields → Tempo trace 워터폴 자동 점프</text>

  <!-- 토글 가이드 -->
  <rect x="40" y="520" width="800" height="60" rx="8" fill="#0f0f0f" stroke="#444" stroke-width="1"/>
  <text x="60" y="544" font-size="12" font-weight="600" fill="#7ec8e3">on:</text>
  <text x="100" y="544" class="mono" font-size="11" fill="#aaa">COMPOSE_PROFILES=observability docker compose up -d</text>
  <text x="60" y="566" font-size="12" font-weight="600" fill="#666">off:</text>
  <text x="100" y="566" class="mono" font-size="11" fill="#aaa">docker compose up -d  (이때 5개 obs 컨테이너 미기동)</text>

  <text x="440" y="595" text-anchor="middle" font-size="11" fill="#444"></text>
</svg>
