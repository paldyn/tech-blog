<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">불변(Immutable) vs 가변(Mutable)</text>

  <!-- Immutable side -->
  <rect x="60" y="76" width="360" height="40" rx="8" fill="#0f2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">불변 (Immutable)</text>

  <rect x="60" y="130" width="360" height="56" rx="6" fill="#0a1a0f" stroke="#2a5a2f" stroke-width="1"/>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">int, float, str, bytes</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">tuple, frozenset</text>

  <rect x="60" y="202" width="360" height="56" rx="6" fill="#0a1a0f" stroke="#2a5a2f" stroke-width="1"/>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">생성 후 값 변경 불가</text>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">수정 시 새 객체 생성</text>

  <rect x="60" y="274" width="360" height="56" rx="6" fill="#0a1a0f" stroke="#2a5a2f" stroke-width="1"/>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">dict 키로 사용 가능</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">스레드 안전 (공유 안전)</text>

  <!-- Mutable side -->
  <rect x="460" y="76" width="360" height="40" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555" text-anchor="middle">가변 (Mutable)</text>

  <rect x="460" y="130" width="360" height="56" rx="6" fill="#1a0a0a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="480" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">list, dict, set</text>
  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">bytearray, 사용자 정의 클래스</text>

  <rect x="460" y="202" width="360" height="56" rx="6" fill="#1a0a0a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="480" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">생성 후 내용 변경 가능</text>
  <text x="480" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">같은 객체를 in-place 수정</text>

  <rect x="460" y="274" width="360" height="56" rx="6" fill="#1a0a0a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="480" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">dict 키 사용 불가</text>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">공유 시 부작용 주의</text>

  <!-- Code example -->
  <rect x="60" y="350" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 문자열은 불변 — 새 객체 생성</text>
  <text x="76" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">s = </tspan><tspan fill="#ce9178">"hello"</tspan>
  </text>
  <text x="76" y="412" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">s2 = s + </tspan><tspan fill="#ce9178">" world"</tspan>
    <tspan fill="#9aa4b8">   # s는 그대로, s2가 새 객체</tspan>
  </text>
  <text x="76" y="432" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">print</tspan>
    <tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">id</tspan>
    <tspan fill="#ffffff">(s) == </tspan><tspan fill="#7ec8e3" font-weight="600">id</tspan>
    <tspan fill="#ffffff">(s2))  </tspan>
    <tspan fill="#9aa4b8"># False — 다른 객체</tspan>
  </text>
  <text x="76" y="452" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># s[0] = "H"  → TypeError: 'str' does not support item assignment</tspan>
  </text>
</svg>
