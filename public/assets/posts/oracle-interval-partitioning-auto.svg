<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrd" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Interval 파티셔닝 — 자동 파티션 생성</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">INSERT 시점에 범위를 벗어나면 Oracle이 자동으로 새 파티션을 생성한다</text>

  <!-- Timeline -->
  <line x1="60" y1="130" x2="820" y2="130" stroke="#333" stroke-width="2"/>

  <!-- Defined partitions -->
  <rect x="60" y="100" width="160" height="52" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">p_start (기준)</text>
  <text x="140" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">~2024-01-01</text>

  <rect x="230" y="100" width="160" height="52" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="310" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">SYS_P001 (자동)</text>
  <text x="310" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">2024-01 ~ 2024-02</text>

  <rect x="400" y="100" width="160" height="52" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="480" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">SYS_P002 (자동)</text>
  <text x="480" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">2024-02 ~ 2024-03</text>

  <rect x="570" y="100" width="160" height="52" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">SYS_P003 (자동)</text>
  <text x="650" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">2024-03 ~ 2024-04</text>

  <!-- Future partition (dotted) -->
  <rect x="740" y="100" width="110" height="52" rx="6" fill="#111" stroke="#555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="795" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">미래 (자동)</text>
  <text x="795" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">필요 시 생성</text>

  <!-- Interval label -->
  <line x1="230" y1="170" x2="390" y2="170" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="400" y1="170" x2="560" y2="170" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="310" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">INTERVAL (NUMTOYMINTERVAL(1,'MONTH'))</text>

  <!-- INSERT flow -->
  <rect x="60" y="220" width="300" height="60" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">INSERT INTO</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  log_tbl (log_dt, msg)</text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">VALUES</text>

  <line x1="362" y1="252" x2="430" y2="252" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Oracle decision -->
  <rect x="434" y="232" width="220" height="44" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="544" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">log_dt = 2024-05-15</text>
  <text x="544" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">기존 파티션 없음 → 자동 생성</text>

  <line x1="656" y1="252" x2="718" y2="252" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <rect x="722" y="232" width="130" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="787" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">SYS_P005</text>
  <text x="787" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">2024-05 자동 생성</text>

  <!-- Benefits box -->
  <rect x="60" y="314" width="760" height="120" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">Interval vs Range 비교</text>

  <!-- Table -->
  <rect x="76" y="348" width="230" height="26" rx="4" fill="#1a1a1a"/>
  <rect x="316" y="348" width="230" height="26" rx="4" fill="#1a1a1a"/>
  <rect x="556" y="348" width="250" height="26" rx="4" fill="#1a1a1a"/>
  <text x="191" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">항목</text>
  <text x="431" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Range</text>
  <text x="681" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Interval</text>

  <text x="191" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">새 파티션 추가</text>
  <text x="431" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">수동 DDL 필요</text>
  <text x="681" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">INSERT 시 자동 생성</text>

  <text x="191" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">MAXVALUE 파티션</text>
  <text x="431" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">필수</text>
  <text x="681" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">불필요</text>
</svg>
