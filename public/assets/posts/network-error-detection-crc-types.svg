<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">오류 감지 기법 비교</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">패리티 · 체크섬 · CRC — 네트워크에서 비트 오류를 감지하는 방법</text>

  <!-- Parity Check -->
  <rect x="60" y="88" width="240" height="130" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">패리티 비트</text>
  <text x="180" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1의 개수를 짝수/홀수로</text>
  <text x="180" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">맞추는 1비트 추가</text>
  <text x="180" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1010101 + [1]</text>
  <text x="180" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">단일 비트 오류만 감지</text>
  <text x="180" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">2비트 오류는 감지 불가</text>

  <!-- Checksum -->
  <rect x="320" y="88" width="240" height="130" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">체크섬 (Checksum)</text>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터를 16비트 단위로 합산</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1의 보수로 표현</text>
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">IP 헤더, UDP, TCP에 사용</text>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">계산 빠름, 구현 단순</text>
  <text x="440" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">버스트 오류 감지력 약함</text>

  <!-- CRC -->
  <rect x="580" y="88" width="240" height="130" rx="8" fill="#2a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">CRC (순환중복검사)</text>
  <text x="700" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">다항식 나눗셈 나머지를</text>
  <text x="700" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">FCS로 전송</text>
  <text x="700" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Ethernet(CRC-32), Wi-Fi</text>
  <text x="700" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">버스트 오류 감지 탁월</text>
  <text x="700" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">이더넷 표준 (4바이트 FCS)</text>

  <!-- CRC detail -->
  <rect x="60" y="238" width="760" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">CRC 동작 원리 (CRC-8 예시)</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">데이터: 11010011101100</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">생성 다항식: 100000111 (x^8+x^2+x+1)</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">나머지 = CRC 값 → 프레임 뒤에 FCS로 추가</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">수신측: 동일 연산 → 나머지=0이면 정상</text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">CRC-32: 이더넷 표준. 32비트 폴리노미얼 사용. 1~2비트 오류 100% 감지.</text>
</svg>
