  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">fn_applyLang · Dataset 루프 갱신 패턴</text>

  <!-- Code block -->
