<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">멱등성(Idempotency) 개념</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">동일한 요청을 여러 번 보내도 결과가 같은 성질</text>

  <!-- Left: Idempotent (PUT) -->
  <rect x="60" y="90" width="360" height="310" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">멱등 O — PUT /users/42</text>

  <!-- Request 1 -->
  <rect x="80" y="130" width="320" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="100" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#7ec8e3" font-weight="600">PUT /users/42</text>
  <text x="100" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#ffffff">{"name":"Bob"}</text>

  <text x="240" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">첫 번째 요청 → 200 OK</text>

  <rect x="80" y="212" width="320" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="100" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#7ec8e3" font-weight="600">PUT /users/42</text>
  <text x="100" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#ffffff">{"name":"Bob"}</text>

  <text x="240" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두 번째 요청 → 200 OK</text>

  <rect x="80" y="294" width="320" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">결과: 항상 동일</text>
  <text x="240" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">users/42 의 name = "Bob"</text>

  <!-- Right: Non-idempotent (POST) -->
  <rect x="460" y="90" width="360" height="310" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">멱등 X — POST /users</text>

  <rect x="480" y="130" width="320" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="500" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#7ec8e3" font-weight="600">POST /users</text>
  <text x="500" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#ffffff">{"name":"Bob"}</text>

  <text x="640" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">첫 번째 요청 → 201 id=100</text>

  <rect x="480" y="212" width="320" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="500" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#7ec8e3" font-weight="600">POST /users</text>
  <text x="500" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#ffffff">{"name":"Bob"}</text>

  <text x="640" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두 번째 요청 → 201 id=101</text>

  <rect x="480" y="294" width="320" height="60" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">결과: 매번 다름</text>
  <text x="640" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Bob이 두 번 생성됨 (중복!)</text>

  <!-- Bottom note -->
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">실무 의미: 네트워크 재시도 시 PUT·DELETE는 안전 — POST는 중복 방지 로직 필요</text>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">멱등성은 서버 구현이 보장해야 함 — HTTP 사양은 클라이언트에게 그렇게 동작한다고 약속</text>
</svg>
