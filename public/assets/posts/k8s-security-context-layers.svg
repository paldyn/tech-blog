<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Security Context — Pod vs Container 레벨</text>

  <!-- Pod level security context (left) -->
  <rect x="50" y="64" width="380" height="350" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="2"/>
  <rect x="50" y="64" width="380" height="40" rx="8" fill="#1a1235"/>
  <rect x="50" y="96" width="380" height="8" rx="0" fill="#1a1235"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Pod Level (spec.securityContext)</text>
  <text x="240" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">모든 컨테이너에 공통 적용</text>

  <text x="66" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">runAsUser: 1000</text>
  <text x="66" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  파드 내 모든 프로세스 UID</text>

  <text x="66" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">runAsGroup: 3000</text>
  <text x="66" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  파드 내 모든 프로세스 GID</text>

  <text x="66" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">fsGroup: 2000</text>
  <text x="66" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  볼륨 마운트 GID (파일 소유권)</text>

  <text x="66" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">runAsNonRoot: true</text>
  <text x="66" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  root 실행 방지 (UID=0 거부)</text>

  <text x="66" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">seccompProfile:</text>
  <text x="66" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">  type: RuntimeDefault</text>
  <text x="66" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  컨테이너 런타임 기본 seccomp</text>

  <text x="66" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">sysctls:</text>
  <text x="66" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  커널 파라미터 설정 (주의)</text>

  <!-- Container level security context (right) -->
  <rect x="450" y="64" width="380" height="350" rx="8" fill="#0f1520" stroke="#55c555" stroke-width="2"/>
  <rect x="450" y="64" width="380" height="40" rx="8" fill="#0d1a0d"/>
  <rect x="450" y="96" width="380" height="8" rx="0" fill="#0d1a0d"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Container Level (containers[].securityContext)</text>
  <text x="640" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">컨테이너 개별 적용 (Pod 설정 오버라이드)</text>

  <text x="466" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">allowPrivilegeEscalation: false</text>
  <text x="466" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  sudo/setuid 비트 실행 방지</text>

  <text x="466" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">readOnlyRootFilesystem: true</text>
  <text x="466" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  루트 파일시스템 읽기 전용</text>

  <text x="466" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">privileged: false</text>
  <text x="466" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  호스트 커널 직접 접근 방지</text>

  <text x="466" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">capabilities:</text>
  <text x="466" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">  drop: [ALL]</text>
  <text x="466" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">  add: [NET_BIND_SERVICE]</text>
  <text x="466" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  Linux Capabilities 세밀 제어</text>

  <text x="466" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">runAsUser: 1001</text>
  <text x="466" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  Pod runAsUser를 컨테이너별 오버라이드</text>

  <text x="466" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">seccompProfile: (컨테이너별)</text>

  <!-- Bottom note -->
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Container 레벨 설정이 Pod 레벨 설정을 오버라이드 (같은 필드의 경우)</text>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">fsGroup, supplementalGroups는 Pod 레벨에만 존재 / capabilities는 Container 레벨에만 존재</text>
</svg>
