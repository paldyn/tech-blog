<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">퍼셉트론 (Perceptron) 구조</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">1957년 Rosenblatt가 고안한 최초의 학습 가능한 인공 뉴런 모델</text>

  <!-- Section labels -->
  <text x="100" y="108" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">입력층</text>
  <text x="100" y="448" text-anchor="middle" fill="#7777cc" font-size="12" xml:space="preserve">편향(bias)</text>
  <text x="430" y="108" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">가중합 노드</text>
  <text x="625" y="108" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">활성화 함수</text>
  <text x="800" y="108" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">출력</text>

  <!-- Input nodes -->
  <circle cx="100" cy="165" r="28" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="171" text-anchor="middle" fill="#7ec8e3" font-size="16" font-weight="600" xml:space="preserve">x₁</text>

  <circle cx="100" cy="255" r="28" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="261" text-anchor="middle" fill="#7ec8e3" font-size="16" font-weight="600" xml:space="preserve">x₂</text>

  <circle cx="100" cy="345" r="28" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="351" text-anchor="middle" fill="#7ec8e3" font-size="16" font-weight="600" xml:space="preserve">x₃</text>

  <!-- Bias node -->
  <circle cx="100" cy="430" r="22" fill="#0d0a1a" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="100" y="436" text-anchor="middle" fill="#7777cc" font-size="14" xml:space="preserve">b</text>

  <!-- Connection lines: inputs → Σ -->
  <line x1="128" y1="165" x2="388" y2="237" stroke="#2a2a4a" stroke-width="1.8"/>
  <line x1="128" y1="255" x2="388" y2="252" stroke="#2a2a4a" stroke-width="1.8"/>
  <line x1="128" y1="345" x2="388" y2="268" stroke="#2a2a4a" stroke-width="1.8"/>
  <!-- Bias line (dashed) -->
  <line x1="120" y1="415" x2="393" y2="280" stroke="#2a1a3a" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- Weight labels -->
  <rect x="210" y="183" width="36" height="19" rx="4" fill="#0a0a0a"/>
  <text x="228" y="196" text-anchor="middle" fill="#ce9178" font-size="13" font-weight="600" xml:space="preserve">w₁</text>

  <rect x="224" y="240" width="36" height="19" rx="4" fill="#0a0a0a"/>
  <text x="242" y="253" text-anchor="middle" fill="#ce9178" font-size="13" font-weight="600" xml:space="preserve">w₂</text>

  <rect x="210" y="295" width="36" height="19" rx="4" fill="#0a0a0a"/>
  <text x="228" y="308" text-anchor="middle" fill="#ce9178" font-size="13" font-weight="600" xml:space="preserve">w₃</text>

  <rect x="230" y="365" width="36" height="19" rx="4" fill="#0a0a0a"/>
  <text x="248" y="378" text-anchor="middle" fill="#7777cc" font-size="13" xml:space="preserve">+b</text>

  <!-- Summation node -->
  <circle cx="430" cy="255" r="40" fill="#0d1025" stroke="#7777cc" stroke-width="2.5"/>
  <text x="430" y="251" text-anchor="middle" fill="#e8e8e8" font-size="22" xml:space="preserve">Σ</text>
  <text x="430" y="270" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">wᵢxᵢ + b</text>

  <!-- Arrow: Σ → f(z) (solid polygon) -->
  <polygon points="472,251 530,251 530,239 554,255 530,271 530,259 472,259" fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>
  <text x="513" y="234" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">z</text>

  <!-- Activation function box -->
  <rect x="554" y="222" width="142" height="66" rx="10" fill="#0c1a0c" stroke="#55c555" stroke-width="2"/>
  <text x="625" y="250" text-anchor="middle" fill="#55c555" font-size="18" font-weight="700" xml:space="preserve">f (z)</text>
  <text x="625" y="272" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">활성화 함수 (step / sigmoid)</text>

  <!-- Arrow: f(z) → output (solid polygon) -->
  <polygon points="698,251 740,251 740,239 764,255 740,271 740,259 698,259" fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Output node -->
  <circle cx="800" cy="255" r="34" fill="#0c1a0c" stroke="#55c555" stroke-width="2.5"/>
  <text x="800" y="250" text-anchor="middle" fill="#55c555" font-size="17" font-weight="700" xml:space="preserve">ŷ</text>
  <text x="800" y="270" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">예측값</text>

  <!-- Formula bar -->
  <rect x="60" y="420" width="760" height="26" rx="6" fill="#111" stroke="#1e1e1e"/>
  <text x="440" y="437" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">ŷ = f(w₁x₁ + w₂x₂ + w₃x₃ + b)     학습 규칙: Δwᵢ = η(y − ŷ)xᵢ</text>

  <!-- Footer -->
  <text x="440" y="486" text-anchor="middle" fill="#444" font-size="11" xml:space="preserve">PALDYN · AI 완전 정복 시리즈</text>
</svg>
