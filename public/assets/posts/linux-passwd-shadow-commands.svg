<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">passwd · chpasswd · chage 명령어</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">비밀번호 변경 및 만료 정책 관리</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#1e2433" stroke-width="1"/>

  <rect x="60" y="98" width="760" height="258" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">password-management.sh</text>
  <line x1="76" y1="128" x2="804" y2="128" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 현재 사용자 비밀번호 변경</text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">passwd</tspan></text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># root가 특정 사용자 비밀번호 변경</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">passwd</tspan> alice</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 일괄 비밀번호 설정 (스크립트용)</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">echo</tspan> <tspan fill="#ce9178">'alice:P@ssw0rd'</tspan> | <tspan fill="#7ec8e3">chpasswd</tspan></text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 비밀번호 만료 정책 조회</text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">chage</tspan> -l alice</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 만료일 설정 + 90일마다 변경 강제</text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">chage</tspan> -M <tspan fill="#b5cea8">90</tspan> -W <tspan fill="#b5cea8">7</tspan> alice</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 다음 로그인 시 비밀번호 변경 강제</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">chage</tspan> -d <tspan fill="#b5cea8">0</tspan> alice</text>
</svg>
