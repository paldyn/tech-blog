<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrkmp" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">KMP 탐색 과정 — 슬라이딩 없이 건너뛰기</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">텍스트 "ABABDABABC", 패턴 "ABABC"</text>

  <!-- Text row -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">텍스트:</text>

  <rect x="134" y="88" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="156" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">A</text>
  <rect x="180" y="88" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="202" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">B</text>
  <rect x="226" y="88" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="248" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">A</text>
  <rect x="272" y="88" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="294" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">B</text>
  <rect x="318" y="88" width="44" height="36" fill="#2a1a1a" stroke="#e05555" stroke-width="2" rx="3"/>
  <text x="340" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e05555">D</text>
  <rect x="364" y="88" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="386" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">A</text>
  <rect x="410" y="88" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="432" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">B</text>
  <rect x="456" y="88" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="478" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">A</text>
  <rect x="502" y="88" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="524" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">B</text>
  <rect x="548" y="88" width="44" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="570" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#55c555">C</text>

  <!-- Phase 1: match ABAB then D fails -->
  <text x="60" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">1단계</text>
  <text x="60" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패턴:</text>
  <rect x="134" y="148" width="44" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="1" rx="3"/>
  <text x="156" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">A</text>
  <rect x="180" y="148" width="44" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="1" rx="3"/>
  <text x="202" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">B</text>
  <rect x="226" y="148" width="44" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="1" rx="3"/>
  <text x="248" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">A</text>
  <rect x="272" y="148" width="44" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="1" rx="3"/>
  <text x="294" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">B</text>
  <rect x="318" y="148" width="44" height="36" fill="#2a1a1a" stroke="#e05555" stroke-width="2" rx="3"/>
  <text x="340" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">C</text>
  <text x="390" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">불일치 (D≠C)</text>
  <text x="390" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">fail[3]=2 → j=2로 점프</text>

  <!-- Phase 2: restart from fail position -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2단계</text>
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패턴:</text>

  <!-- Pattern shifted to position 2 (overlap with AB already matched) -->
  <rect x="226" y="218" width="44" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  <text x="248" y="241" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">A</text>
  <rect x="272" y="218" width="44" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  <text x="294" y="241" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">B</text>
  <rect x="318" y="218" width="44" height="36" fill="#2a1a1a" stroke="#e05555" stroke-width="2" rx="3"/>
  <text x="340" y="241" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">A</text>
  <text x="390" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">불일치 (D≠A)</text>
  <text x="390" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">fail[1]=0 → j=0으로</text>

  <!-- Phase 3: match at position 5 -->
  <text x="60" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">3단계</text>
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패턴:</text>

  <rect x="364" y="290" width="44" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="386" y="313" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">A</text>
  <rect x="410" y="290" width="44" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="432" y="313" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">B</text>
  <rect x="456" y="290" width="44" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="478" y="313" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">A</text>
  <rect x="502" y="290" width="44" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="524" y="313" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">B</text>
  <rect x="548" y="290" width="44" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="570" y="313" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">C</text>

  <text x="620" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">매칭 성공!</text>
  <text x="620" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">위치 5에서 발견</text>

  <!-- Complexity box -->
  <rect x="60" y="358" width="760" height="44" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="440" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">전처리: O(m) — 실패 함수 구축</text>
  <text x="440" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">탐색: O(n) — 텍스트 포인터는 절대 뒤로 가지 않음 | 전체: O(n+m)</text>
</svg>
