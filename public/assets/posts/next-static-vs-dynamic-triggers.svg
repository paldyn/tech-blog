<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">동적 렌더링으로 전환하는 요인</text>

  <!-- Code block showing dynamic triggers -->
  <rect x="60" y="72" width="760" height="316" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="94" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// ✅ 정적 — 아무것도 없으면 기본 Static</text>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> data = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> fetch(url); </tspan>
    <tspan fill="#9aa4b8">// force-cache</tspan>
  </text>

  <text x="76" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// ❌ 동적 전환 트리거 1: cookies()</text>
  <text x="76" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> cookieStore = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> cookies();</tspan>
  </text>

  <text x="76" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// ❌ 동적 전환 트리거 2: headers()</text>
  <text x="76" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> headersList = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> headers();</tspan>
  </text>

  <text x="76" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// ❌ 동적 전환 트리거 3: searchParams</text>
  <text x="76" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export default async function</tspan>
    <tspan fill="#ffffff"> Page({ searchParams }) {</tspan>
  </text>
  <text x="76" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> { q } = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> searchParams; </tspan>
    <tspan fill="#9aa4b8">// 동적</tspan>
  </text>

  <text x="76" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// ❌ 동적 전환 트리거 4: no-store fetch</text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> r = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> fetch(url, { cache: </tspan>
    <tspan fill="#ce9178">'no-store'</tspan>
    <tspan fill="#ffffff"> });</tspan>
  </text>

  <text x="76" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// ✅ 강제 정적: 동적 함수 있어도 무시</text>
  <text x="76" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export const</tspan>
    <tspan fill="#ffffff"> dynamic = </tspan>
    <tspan fill="#ce9178">'force-static'</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
</svg>
