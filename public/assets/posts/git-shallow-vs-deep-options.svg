<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Shallow Clone 옵션과 활용 패턴</text>

  <!-- depth=1 -->
  <rect x="60" y="68" width="230" height="160" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">--depth=1</text>
  <rect x="78" y="104" width="194" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git clone \</text>
  <text x="94" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  --depth=1 &lt;url&gt;</text>
  <text x="175" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">최신 커밋 1개만</text>
  <text x="175" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">CI/CD 빌드용</text>
  <text x="175" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">가장 빠름</text>

  <!-- single branch -->
  <rect x="310" y="68" width="260" height="160" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">--single-branch</text>
  <rect x="328" y="104" width="224" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="344" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git clone \</text>
  <text x="344" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">  --single-branch \</text>
  <text x="344" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">  -b main &lt;url&gt;</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">특정 브랜치만 클론</text>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">다른 원격 브랜치 fetch 안됨</text>

  <!-- shallow-since -->
  <rect x="590" y="68" width="230" height="160" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">--shallow-since</text>
  <rect x="608" y="104" width="194" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="624" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">git clone \</text>
  <text x="624" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">  --shallow-since=</text>
  <text x="624" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  "1 year ago" &lt;url&gt;</text>
  <text x="705" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">날짜 이후 커밋만</text>
  <text x="705" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">--shallow-exclude도 가능</text>

  <!-- Unshallow -->
  <rect x="60" y="252" width="760" height="80" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">Shallow → Full 전환</text>
  <rect x="80" y="288" width="720" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fetch --unshallow</text>
  <text x="310" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # 전체 히스토리 다운로드</text>
  <text x="580" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # git pull --unshallow 도 가능</text>

  <!-- Recommendation table -->
  <rect x="60" y="352" width="760" height="84" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">상황별 권장 조합</text>
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">CI/CD 빌드 → --depth=1 --single-branch</text>
  <text x="80" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">개발 환경 → --filter=blob:none (blobless)</text>
  <text x="450" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">모노레포 → --filter=blob:none --sparse</text>
  <text x="450" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">오프라인 개발 → full clone (필터 없음)</text>
</svg>
