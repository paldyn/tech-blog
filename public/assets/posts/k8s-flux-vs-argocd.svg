<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Flux vs Argo CD</text>

  <!-- Flux column -->
  <rect x="60" y="80" width="360" height="350" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Flux</text>

  <rect x="80" y="130" width="320" height="62" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인터페이스</text>
  <text x="94" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">CLI + CRD 중심 (UI 없음, 별도 도구로 보완)</text>

  <rect x="80" y="202" width="320" height="62" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">구조</text>
  <text x="94" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">독립 컨트롤러 툴킷 — 조합형</text>

  <rect x="80" y="274" width="320" height="62" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Helm 처리</text>
  <text x="94" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">진짜 helm 릴리스 (hooks 등 완전 호환)</text>

  <rect x="80" y="346" width="320" height="62" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">권한 모델</text>
  <text x="94" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">Kubernetes RBAC 그대로 사용</text>

  <!-- ArgoCD column -->
  <rect x="460" y="80" width="360" height="350" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Argo CD</text>

  <rect x="480" y="130" width="320" height="62" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="494" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인터페이스</text>
  <text x="494" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">웹 UI가 일급 시민 — 시각화 강력</text>

  <rect x="480" y="202" width="320" height="62" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="494" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">구조</text>
  <text x="494" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">통합형 플랫폼 (Application 중심)</text>

  <rect x="480" y="274" width="320" height="62" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="494" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Helm 처리</text>
  <text x="494" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">template 렌더링 후 apply (릴리스 아님)</text>

  <rect x="480" y="346" width="320" height="62" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="494" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">권한 모델</text>
  <text x="494" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">자체 RBAC + AppProject + SSO</text>

  <!-- bottom -->
  <rect x="60" y="456" width="760" height="56" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">팀이 UI로 배포 상태를 봐야 한다면 Argo CD, 플랫폼을 CRD로 조립한다면 Flux</text>
  <text x="440" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">둘 다 CNCF 졸업 프로젝트 — GitOps 원칙(pull · 조정 루프)은 동일하다</text>
</svg>
