<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">LTS 버전별 핵심 기능 비교</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">Java 8 / 11 / 17 / 21 LTS</text>

  <!-- Java 8 -->
  <rect x="60" y="90" width="172" height="300" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1.5"/>
  <rect x="60" y="90" width="172" height="36" fill="#1a3a1a" rx="8"/>
  <rect x="60" y="110" width="172" height="16" fill="#1a3a1a"/>
  <text x="146" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Java 8 LTS</text>
  <text x="146" y="130" text-anchor="middle" font-size="11" fill="#888">2014년 출시</text>
  <text x="76" y="158" font-size="12" fill="#55c555">▸</text><text x="90" y="158" font-size="12" fill="#e8e8e8">Lambda 표현식</text>
  <text x="76" y="178" font-size="12" fill="#55c555">▸</text><text x="90" y="178" font-size="12" fill="#e8e8e8">Stream API</text>
  <text x="76" y="198" font-size="12" fill="#55c555">▸</text><text x="90" y="198" font-size="12" fill="#e8e8e8">Optional</text>
  <text x="76" y="218" font-size="12" fill="#55c555">▸</text><text x="90" y="218" font-size="12" fill="#e8e8e8">java.time API</text>
  <text x="76" y="238" font-size="12" fill="#55c555">▸</text><text x="90" y="238" font-size="12" fill="#e8e8e8">default 메서드</text>
  <text x="76" y="258" font-size="12" fill="#55c555">▸</text><text x="90" y="258" font-size="12" fill="#e8e8e8">CompletableFuture</text>
  <text x="76" y="278" font-size="12" fill="#55c555">▸</text><text x="90" y="278" font-size="12" fill="#e8e8e8">메서드 참조</text>
  <text x="146" y="372" text-anchor="middle" font-size="11" fill="#555">EOL: 2030</text>

  <!-- Java 11 -->
  <rect x="252" y="90" width="172" height="300" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1.5"/>
  <rect x="252" y="90" width="172" height="36" fill="#1a3a1a" rx="8"/>
  <rect x="252" y="110" width="172" height="16" fill="#1a3a1a"/>
  <text x="338" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Java 11 LTS</text>
  <text x="338" y="130" text-anchor="middle" font-size="11" fill="#888">2018년 출시</text>
  <text x="268" y="158" font-size="12" fill="#55c555">▸</text><text x="282" y="158" font-size="12" fill="#e8e8e8">HttpClient 정식</text>
  <text x="268" y="178" font-size="12" fill="#55c555">▸</text><text x="282" y="178" font-size="12" fill="#e8e8e8">var in lambda</text>
  <text x="268" y="198" font-size="12" fill="#55c555">▸</text><text x="282" y="198" font-size="12" fill="#e8e8e8">String 신규 메서드</text>
  <text x="268" y="218" font-size="12" fill="#55c555">▸</text><text x="282" y="218" font-size="12" fill="#e8e8e8">Files 유틸리티</text>
  <text x="268" y="238" font-size="12" fill="#55c555">▸</text><text x="282" y="238" font-size="12" fill="#e8e8e8">Epsilon GC</text>
  <text x="268" y="258" font-size="12" fill="#55c555">▸</text><text x="282" y="258" font-size="12" fill="#e8e8e8">ZGC 실험적</text>
  <text x="268" y="278" font-size="12" fill="#e05555">✕</text><text x="282" y="278" font-size="12" fill="#888">Applet 제거</text>
  <text x="338" y="372" text-anchor="middle" font-size="11" fill="#555">EOL: 2026</text>

  <!-- Java 17 -->
  <rect x="444" y="90" width="172" height="300" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1.5"/>
  <rect x="444" y="90" width="172" height="36" fill="#1a3a1a" rx="8"/>
  <rect x="444" y="110" width="172" height="16" fill="#1a3a1a"/>
  <text x="530" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Java 17 LTS</text>
  <text x="530" y="130" text-anchor="middle" font-size="11" fill="#888">2021년 출시</text>
  <text x="460" y="158" font-size="12" fill="#55c555">▸</text><text x="474" y="158" font-size="12" fill="#e8e8e8">sealed 클래스 정식</text>
  <text x="460" y="178" font-size="12" fill="#55c555">▸</text><text x="474" y="178" font-size="12" fill="#e8e8e8">Records 정식</text>
  <text x="460" y="198" font-size="12" fill="#55c555">▸</text><text x="474" y="198" font-size="12" fill="#e8e8e8">instanceof 패턴매칭</text>
  <text x="460" y="218" font-size="12" fill="#55c555">▸</text><text x="474" y="218" font-size="12" fill="#e8e8e8">Text Block 정식</text>
  <text x="460" y="238" font-size="12" fill="#55c555">▸</text><text x="474" y="238" font-size="12" fill="#e8e8e8">강력한 캡슐화</text>
  <text x="460" y="258" font-size="12" fill="#55c555">▸</text><text x="474" y="258" font-size="12" fill="#e8e8e8">RandomGenerator</text>
  <text x="460" y="278" font-size="12" fill="#e05555">✕</text><text x="474" y="278" font-size="12" fill="#888">RMI Activation 제거</text>
  <text x="530" y="372" text-anchor="middle" font-size="11" fill="#555">EOL: 2029</text>

  <!-- Java 21 -->
  <rect x="636" y="90" width="184" height="300" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1.5"/>
  <rect x="636" y="90" width="184" height="36" fill="#1a3a1a" rx="8"/>
  <rect x="636" y="110" width="184" height="16" fill="#1a3a1a"/>
  <text x="728" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Java 21 LTS</text>
  <text x="728" y="130" text-anchor="middle" font-size="11" fill="#888">2023년 출시</text>
  <text x="652" y="158" font-size="12" fill="#55c555">▸</text><text x="666" y="158" font-size="12" fill="#e8e8e8">Virtual Threads 정식</text>
  <text x="652" y="178" font-size="12" fill="#55c555">▸</text><text x="666" y="178" font-size="12" fill="#e8e8e8">Sequenced Collections</text>
  <text x="652" y="198" font-size="12" fill="#55c555">▸</text><text x="666" y="198" font-size="12" fill="#e8e8e8">switch 패턴매칭 정식</text>
  <text x="652" y="218" font-size="12" fill="#55c555">▸</text><text x="666" y="218" font-size="12" fill="#e8e8e8">Record Patterns 정식</text>
  <text x="652" y="238" font-size="12" fill="#55c555">▸</text><text x="666" y="238" font-size="12" fill="#e8e8e8">Scoped Values</text>
  <text x="652" y="258" font-size="12" fill="#55c555">▸</text><text x="666" y="258" font-size="12" fill="#e8e8e8">Structured Concurrency</text>
  <text x="652" y="278" font-size="12" fill="#55c555">▸</text><text x="666" y="278" font-size="12" fill="#e8e8e8">String Templates (prev)</text>
  <text x="728" y="372" text-anchor="middle" font-size="11" fill="#555">EOL: 2031</text>

  <text x="440" y="418" text-anchor="middle" font-size="13" fill="#7777cc">Java 9 이후 6개월마다 새 버전 — LTS는 약 3년 주기 출시</text>
  <text x="440" y="438" text-anchor="middle" font-size="11" fill="#444">Java 완전 정복 시리즈 — Part I. 언어의 본질과 역사 | PALDYN</text>
</svg>
