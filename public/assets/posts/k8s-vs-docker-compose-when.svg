<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580">
  <defs>
    <marker id="arr-yes" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-no" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="880" height="580" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Docker Compose vs Kubernetes 선택 가이드</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">프로젝트 상황에 맞는 도구를 고르는 결정 트리</text>

  <!-- Start node -->
  <rect x="310" y="95" width="260" height="44" rx="22" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="123" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">새 프로젝트 or 환경 선택</text>

  <!-- Arrow down from start -->
  <line x1="440" y1="139" x2="440" y2="164" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- Q1: Production? -->
  <rect x="270" y="166" width="340" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">프로덕션 환경인가?</text>

  <!-- No branch — goes left to Compose -->
  <line x1="270" y1="188" x2="190" y2="188" stroke="#55c555" stroke-width="2" marker-end="url(#arr-yes)"/>
  <text x="226" y="181"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">아니오</text>

  <!-- Yes branch — goes down -->
  <line x1="440" y1="210" x2="440" y2="240" stroke="#e05555" stroke-width="2" marker-end="url(#arr-no)"/>
  <text x="447" y="229"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">예</text>

  <!-- Compose leaf (left) -->
  <rect x="60" y="166" width="190" height="72" rx="8" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="155" y="193" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Docker Compose</text>
  <text x="155" y="213" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로컬 개발 · CI 테스트</text>
  <text x="155" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단일 서버 스테이징</text>

  <!-- Q2: HA needed? -->
  <rect x="260" y="242" width="360" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">고가용성(HA) / 자동복구가 필요한가?</text>

  <!-- No branch — goes left -->
  <line x1="260" y1="264" x2="190" y2="264" stroke="#55c555" stroke-width="2" marker-end="url(#arr-yes)"/>
  <text x="218" y="257"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">아니오</text>

  <!-- Yes branch — goes down -->
  <line x1="440" y1="286" x2="440" y2="316" stroke="#e05555" stroke-width="2" marker-end="url(#arr-no)"/>
  <text x="447" y="305"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">예</text>

  <!-- Compose + single server leaf -->
  <rect x="60" y="242" width="190" height="72" rx="8" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="155" y="269" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Docker Compose</text>
  <text x="155" y="289" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단일 서버 프로덕션</text>
  <text x="155" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">소규모 팀 · 5개 미만</text>

  <!-- Q3: Auto-scaling? -->
  <rect x="260" y="318" width="360" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">자동 스케일링이 필요한가?</text>

  <!-- No branch — right side -->
  <line x1="620" y1="340" x2="690" y2="340" stroke="#55c555" stroke-width="2" marker-end="url(#arr-yes)"/>
  <text x="648" y="333"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">아니오</text>

  <!-- Yes branch — goes down -->
  <line x1="440" y1="362" x2="440" y2="392" stroke="#e05555" stroke-width="2" marker-end="url(#arr-no)"/>
  <text x="447" y="381"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">예</text>

  <!-- K8s recommended (right side of Q3) -->
  <rect x="690" y="318" width="130" height="44" rx="8" fill="#0f1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="755" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">K8s 고려</text>

  <!-- K8s strong recommended leaf -->
  <rect x="290" y="394" width="300" height="76" rx="8" fill="#0f0f2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="421" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">Kubernetes 권장</text>
  <text x="440" y="443" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HPA · Self-healing · 멀티 노드</text>
  <text x="440" y="461" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">롤링 업데이트 · 선언적 운영</text>

  <!-- Bottom summary -->
  <rect x="60" y="498" width="760" height="58" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="522" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">현실적 전략: 로컬 개발은 Compose, 프로덕션 배포는 Kubernetes</text>
  <text x="440" y="543" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">두 도구는 배타적이지 않다 — CI/CD 파이프라인에서 함께 사용하는 것이 표준</text>
</svg>
