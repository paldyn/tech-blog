<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">RAID 레벨 비교</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">소프트웨어 RAID — 최소 디스크 · 가용 용량 · 장애 허용 · 성능</text>

  <!-- Table header bg -->
  <rect x="50" y="88" width="780" height="36" rx="6" fill="#141622"/>

  <!-- Header labels -->
  <text x="90" y="111" font-size="13" font-weight="600" fill="#7ec8e3">레벨</text>
  <text x="200" y="111" font-size="13" font-weight="600" fill="#7ec8e3">최소 디스크</text>
  <text x="330" y="111" font-size="13" font-weight="600" fill="#7ec8e3">가용 용량</text>
  <text x="490" y="111" font-size="13" font-weight="600" fill="#7ec8e3">장애 허용</text>
  <text x="620" y="111" font-size="13" font-weight="600" fill="#7ec8e3">읽기 속도</text>
  <text x="750" y="111" font-size="13" font-weight="600" fill="#7ec8e3">쓰기 속도</text>

  <!-- Row separators -->
  <line x1="50" y1="124" x2="830" y2="124" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="50" y1="164" x2="830" y2="164" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="50" y1="204" x2="830" y2="204" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="50" y1="244" x2="830" y2="244" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="50" y1="284" x2="830" y2="284" stroke="#3a4a6e" stroke-width="1"/>

  <!-- RAID 0 -->
  <rect x="50" y="124" width="780" height="40" fill="#0e1018"/>
  <text x="90" y="149" font-size="14" font-weight="700" fill="#e05555">RAID 0</text>
  <text x="72" y="163" font-size="11" fill="#888">스트라이핑</text>
  <text x="220" y="149" font-size="14" fill="#e8e8e8">2개</text>
  <text x="335" y="149" font-size="13" fill="#55c555">N × 100%</text>
  <text x="490" y="149" font-size="13" fill="#e05555">없음</text>
  <text x="625" y="149" font-size="13" fill="#55c555">N배 향상</text>
  <text x="755" y="149" font-size="13" fill="#55c555">N배 향상</text>

  <!-- RAID 1 -->
  <rect x="50" y="164" width="780" height="40" fill="#0a0a0a"/>
  <text x="90" y="189" font-size="14" font-weight="700" fill="#7ec8e3">RAID 1</text>
  <text x="72" y="203" font-size="11" fill="#888">미러링</text>
  <text x="220" y="189" font-size="14" fill="#e8e8e8">2개</text>
  <text x="335" y="189" font-size="13" fill="#e05555">N × 50%</text>
  <text x="490" y="189" font-size="13" fill="#55c555">1개 디스크</text>
  <text x="625" y="189" font-size="13" fill="#55c555">향상</text>
  <text x="755" y="189" font-size="13" fill="#888">동일</text>

  <!-- RAID 5 -->
  <rect x="50" y="204" width="780" height="40" fill="#0e1018"/>
  <text x="90" y="229" font-size="14" font-weight="700" fill="#7777cc">RAID 5</text>
  <text x="66" y="243" font-size="11" fill="#888">분산 패리티</text>
  <text x="220" y="229" font-size="14" fill="#e8e8e8">3개</text>
  <text x="335" y="229" font-size="13" fill="#55c555">(N-1) × 100%</text>
  <text x="490" y="229" font-size="13" fill="#55c555">1개 디스크</text>
  <text x="625" y="229" font-size="13" fill="#55c555">향상</text>
  <text x="755" y="229" font-size="13" fill="#888">약간 저하</text>

  <!-- RAID 6 -->
  <rect x="50" y="244" width="780" height="40" fill="#0a0a0a"/>
  <text x="90" y="269" font-size="14" font-weight="700" fill="#7777cc">RAID 6</text>
  <text x="60" y="283" font-size="11" fill="#888">이중 패리티</text>
  <text x="220" y="269" font-size="14" fill="#e8e8e8">4개</text>
  <text x="335" y="269" font-size="13" fill="#55c555">(N-2) × 100%</text>
  <text x="490" y="269" font-size="13" fill="#55c555">2개 디스크</text>
  <text x="625" y="269" font-size="13" fill="#55c555">향상</text>
  <text x="755" y="269" font-size="13" fill="#e05555">저하</text>

  <!-- RAID 10 -->
  <rect x="50" y="284" width="780" height="40" fill="#0e1018"/>
  <text x="90" y="309" font-size="14" font-weight="700" fill="#55c555">RAID 10</text>
  <text x="60" y="323" font-size="11" fill="#888">스트라이프+미러</text>
  <text x="220" y="309" font-size="14" fill="#e8e8e8">4개</text>
  <text x="335" y="309" font-size="13" fill="#e05555">N × 50%</text>
  <text x="490" y="309" font-size="13" fill="#55c555">미러당 1개</text>
  <text x="625" y="309" font-size="13" fill="#55c555">N배 향상</text>
  <text x="755" y="309" font-size="13" fill="#55c555">향상</text>

  <!-- Table border -->
  <rect x="50" y="88" width="780" height="236" rx="6" fill="none" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Legend -->
  <rect x="50" y="344" width="14" height="14" rx="3" fill="#55c555"/>
  <text x="70" y="356" font-size="12" fill="#888">좋음</text>
  <rect x="120" y="344" width="14" height="14" rx="3" fill="#e05555"/>
  <text x="140" y="356" font-size="12" fill="#888">나쁨/없음</text>
  <rect x="210" y="344" width="14" height="14" rx="3" fill="#888"/>
  <text x="230" y="356" font-size="12" fill="#888">보통</text>

  <!-- Note -->
  <text x="440" y="386" text-anchor="middle" font-size="12" fill="#555">N = 디스크 수 기준 계산 (실제 가용 용량은 구성에 따라 다름)</text>
</svg>
