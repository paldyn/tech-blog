<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Portal: 컴포넌트 트리 vs DOM 트리</text>

  <defs>
    <marker id="arrC" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arrD" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Left: React Component Tree -->
  <text x="220" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">React 컴포넌트 트리</text>

  <rect x="160" y="96" width="120" height="36" rx="6" fill="#0d1212" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">App</text>

  <line x1="220" y1="132" x2="220" y2="152" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="120" y="152" width="200" height="36" rx="6" fill="#0d1212" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">Dashboard</text>

  <line x1="160" y1="188" x2="140" y2="208" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="280" y1="188" x2="300" y2="208" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="80" y="208" width="120" height="36" rx="6" fill="#0d1212" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8" text-anchor="middle">Sidebar</text>

  <rect x="240" y="208" width="120" height="36" rx="6" fill="#1a0d1a" stroke="#7777cc" stroke-width="2"/>
  <text x="300" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc" text-anchor="middle">Modal ← Portal</text>

  <!-- Portal arrow to DOM tree -->
  <path d="M 360 226 C 460 226 460 226 520 226" stroke="#7777cc" stroke-width="2"
    stroke-dasharray="5,3" marker-end="url(#arrC)" fill="none"/>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc" text-anchor="middle">createPortal</text>

  <!-- Right: DOM Tree -->
  <text x="660" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">실제 DOM 트리</text>

  <rect x="600" y="96" width="120" height="36" rx="6" fill="#12100d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="660" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">&lt;html&gt;</text>

  <line x1="660" y1="132" x2="660" y2="152" stroke="#ce9178" stroke-width="1.5"/>

  <rect x="590" y="152" width="140" height="36" rx="6" fill="#12100d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="660" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">&lt;body&gt;</text>

  <line x1="620" y1="188" x2="600" y2="208" stroke="#ce9178" stroke-width="1.5"/>
  <line x1="700" y1="188" x2="720" y2="208" stroke="#ce9178" stroke-width="1.5"/>

  <rect x="540" y="208" width="120" height="36" rx="6" fill="#12100d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="600" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8" text-anchor="middle">#root</text>

  <rect x="680" y="208" width="140" height="36" rx="6" fill="#1a0d1a" stroke="#7777cc" stroke-width="2"/>
  <text x="750" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc" text-anchor="middle">#modal-root</text>

  <!-- Note about event bubbling -->
  <rect x="60" y="286" width="760" height="96" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Portal의 핵심 특성</text>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">DOM은 #modal-root에 마운트되지만 — React 이벤트 버블링은 컴포넌트 트리 기준</text>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">Portal 내부 onClick이 Dashboard까지 버블링됨 (DOM 위치와 무관)</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc" text-anchor="middle">Context도 공유됨: Portal 안에서 부모 Context 접근 가능</text>
</svg>
