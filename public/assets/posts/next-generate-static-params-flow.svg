<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">generateStaticParams 빌드 프로세스</text>

  <!-- Step 1: generateStaticParams 호출 -->
  <rect x="60" y="80" width="760" height="68" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="108"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">① generateStaticParams() 실행 (빌드 타임)</text>
  <text x="440" y="132"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DB 또는 API에서 경로 목록 조회 → { slug: 'hello' }, { slug: 'world' }, ... 반환</text>

  <!-- Arrow -->
  <line x1="440" y1="148" x2="440" y2="178" stroke="#7777cc" stroke-width="2" marker-end="url(#arb)"/>

  <!-- Step 2: 각 경로 렌더링 -->
  <rect x="60" y="182" width="760" height="68" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="210"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">② 각 { slug } 에 대해 Page 컴포넌트 렌더링</text>
  <text x="440" y="234"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">params.slug 사용 fetch는 자동 메모이제이션 → 동일 URL 중복 요청 없음</text>

  <!-- Arrow -->
  <line x1="440" y1="250" x2="440" y2="280" stroke="#55c555" stroke-width="2" marker-end="url(#arg)"/>

  <!-- Step 3: HTML 생성 -->
  <rect x="60" y="284" width="760" height="68" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="312"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">③ HTML + RSC Payload 파일 생성</text>
  <text x="440" y="334"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">/posts/hello.html, /posts/world.html ... Full Route Cache에 저장</text>

  <!-- Generated paths example -->
  <text x="440" y="382"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">생성되는 정적 경로 예시</text>

  <!-- Path boxes -->
  <rect x="60" y="394" width="170" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="145" y="420"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">/posts/hello</text>

  <rect x="250" y="394" width="170" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="335" y="420"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">/posts/world</text>

  <rect x="440" y="394" width="170" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="525" y="420"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">/posts/nextjs-guide</text>

  <rect x="630" y="394" width="190" height="44" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="725" y="412"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">목록에 없는 경로:</text>
  <text x="725" y="430"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dynamicParams 설정 따름</text>

  <!-- Bottom note -->
  <text x="440" y="476"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">dynamicParams=true(기본): 미리 생성 안 된 경로는 요청 시 동적으로 렌더링 후 캐시</text>
  <text x="440" y="494"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">dynamicParams=false: 목록에 없는 경로는 404</text>
</svg>
