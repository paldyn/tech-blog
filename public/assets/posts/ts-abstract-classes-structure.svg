<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arrUp" viewBox="0 0 14 14" refX="7" refY="2"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 14 L 7 0 L 14 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">추상 클래스 계층 구조</text>

  <!-- Abstract class box -->
  <rect x="290" y="66" width="300" height="90" rx="10" fill="#0d0d1a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">&#171;abstract&#187;</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">Shape</text>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">abstract area(): number</text>

  <!-- Arrow from Circle to Shape -->
  <line x1="220" y1="240" x2="355" y2="156" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrUp)"/>

  <!-- Arrow from Rectangle to Shape -->
  <line x1="440" y1="230" x2="440" y2="156" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrUp)"/>

  <!-- Arrow from Triangle to Shape -->
  <line x1="660" y1="240" x2="525" y2="156" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrUp)"/>

  <!-- Extends label -->
  <text x="276" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">extends</text>
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">extends</text>
  <text x="604" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">extends</text>

  <!-- Circle box -->
  <rect x="80" y="240" width="280" height="80" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">Circle</text>
  <text x="220" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">area() { return PI * r² }</text>
  <text x="220" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">구현 완료</text>

  <!-- Rectangle box -->
  <rect x="300" y="240" width="280" height="80" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">Rectangle</text>
  <text x="440" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">area() { return w * h }</text>
  <text x="440" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">구현 완료</text>

  <!-- Triangle box -->
  <rect x="520" y="240" width="280" height="80" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">Triangle</text>
  <text x="660" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">area() { return b*h/2 }</text>
  <text x="660" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">구현 완료</text>

  <!-- Bottom note -->
  <rect x="80" y="354" width="720" height="96" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">추상 클래스 규칙</text>
  <text x="100" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· abstract 메서드는 body 없음 — 서브클래스가 반드시 구현해야 함</text>
  <text x="100" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· new Shape()는 불가 — abstract 클래스는 직접 인스턴스화 금지</text>
  <text x="100" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· 일반 메서드와 abstract 메서드를 함께 가질 수 있음</text>
</svg>
