<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 490"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="490" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">문자열 · 불리언 데이터 타입</text>

  <!-- ── Left: Character types ── -->
  <rect x="60" y="68" width="350" height="370" rx="8" fill="#0d0d0d" stroke="#1a1a3a"/>
  <text x="235" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">문자열 타입 (Character)</text>
  <line x1="60" y1="108" x2="410" y2="108" stroke="#1a1a2a"/>

  <!-- CHAR(n) -->
  <rect x="78" y="118" width="314" height="56" rx="4" fill="#0a0a1a" stroke="#2a2a4a"/>
  <text x="90" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7777cc">CHAR(n)</text>
  <text x="170" y="137" font-size="11" fill="#888">  고정 길이</text>
  <text x="90" y="155" font-size="11" fill="#888">항상 n바이트 사용 — 짧으면 공백 패딩</text>
  <text x="90" y="168" font-size="11" fill="#55c555">용도: 국가 코드 (2), 성별 코드 (1)</text>

  <!-- VARCHAR(n) -->
  <rect x="78" y="180" width="314" height="56" rx="4" fill="#0a0a1a" stroke="#2a2a4a"/>
  <text x="90" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7777cc">VARCHAR(n)</text>
  <text x="184" y="199" font-size="11" fill="#e8e8e8">  가변 길이</text>
  <rect x="284" y="184" width="100" height="20" rx="3" fill="#1a1a3a"/>
  <text x="334" y="198" text-anchor="middle" font-size="10" fill="#7777cc">가장 일반적</text>
  <text x="90" y="217" font-size="11" fill="#888">실제 길이만큼만 저장 · n 초과 시 오류</text>
  <text x="90" y="230" font-size="11" fill="#55c555">용도: 이름 (100), 이메일 (254)</text>

  <!-- TEXT -->
  <rect x="78" y="242" width="314" height="56" rx="4" fill="#0a0a1a" stroke="#2a2a4a"/>
  <text x="90" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7777cc">TEXT</text>
  <text x="122" y="261" font-size="11" fill="#888">  길이 제한 없음 (비표준)</text>
  <text x="90" y="279" font-size="11" fill="#888">PG: 무제한  /  MySQL: 65,535바이트</text>
  <text x="90" y="292" font-size="11" fill="#e8c555">주의: 인덱싱 길이 제한 발생 가능</text>

  <!-- Code block -->
  <rect x="78" y="308" width="314" height="80" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="90" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 문자열 컬럼 설계 예시</text>
  <text x="90" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">country_code </text>
  <text x="178" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">CHAR</text>
  <text x="202" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">(2)</text>
  <text x="90" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">email        </text>
  <text x="166" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">VARCHAR</text>
  <text x="214" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">(254)</text>
  <text x="90" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">body         </text>
  <text x="166" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">TEXT</text>

  <!-- ── Right: Boolean ── -->
  <rect x="470" y="68" width="350" height="370" rx="8" fill="#0d0d0d" stroke="#1a3a1a"/>
  <text x="645" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">불리언 타입 (Boolean)</text>
  <line x1="470" y1="108" x2="820" y2="108" stroke="#1a2a1a"/>

  <!-- BOOLEAN block -->
  <rect x="488" y="118" width="314" height="58" rx="4" fill="#0a1a0a" stroke="#1a3a1a"/>
  <text x="500" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#55c555">BOOLEAN</text>
  <text x="580" y="137" font-size="11" fill="#888">  SQL 표준 타입</text>
  <text x="500" y="155" font-size="11" fill="#888">값: TRUE · FALSE · NULL (UNKNOWN)</text>
  <text x="500" y="169" font-size="11" fill="#e8c555">NULL은 참도 거짓도 아님 (3값 논리)</text>

  <!-- DBMS differences -->
  <text x="488" y="198" font-size="12" font-weight="600" fill="#e8e8e8">DBMS별 구현 방식</text>

  <rect x="488" y="206" width="314" height="28" rx="3" fill="#0a1520" stroke="#1e3045"/>
  <text x="500" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">PostgreSQL</text>
  <text x="590" y="224" font-size="11" fill="#888">  네이티브 BOOLEAN 지원</text>

  <rect x="488" y="238" width="314" height="28" rx="3" fill="#0a1520" stroke="#1e3045"/>
  <text x="500" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">MySQL</text>
  <text x="548" y="256" font-size="11" fill="#888">       TINYINT(1) 별칭 (0/1)</text>

  <rect x="488" y="270" width="314" height="28" rx="3" fill="#0a1520" stroke="#1e3045"/>
  <text x="500" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">Oracle</text>
  <text x="548" y="288" font-size="11" fill="#888">       NUMBER(1) 관례 · 23c+ BOOLEAN</text>

  <!-- Code block -->
  <rect x="488" y="310" width="314" height="116" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="500" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 불리언 컬럼 활용 예시</text>
  <text x="500" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">is_active  </text>
  <text x="566" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">BOOLEAN</text>
  <text x="622" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> DEFAULT </text>
  <text x="680" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">TRUE</text>
  <text x="500" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">is_deleted </text>
  <text x="566" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">BOOLEAN</text>
  <text x="622" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> DEFAULT </text>
  <text x="680" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">FALSE</text>
  <text x="500" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- NULL 조건은 IS NULL로</text>
  <text x="500" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">WHERE</text>
  <text x="540" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> is_active</text>
  <text x="614" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">         -- TRUE만</text>
  <text x="500" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">WHERE</text>
  <text x="540" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> is_active </text>
  <text x="600" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">IS NULL</text>

  <!-- Footer -->
  <text x="440" y="464" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 2</text>
</svg>
