<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">문자열 &amp; 불리언 타입</text>

  <!-- String types comparison header -->
  <rect x="30" y="68" width="820" height="32" fill="#192040" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="155" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#9aa4b8">타입</text>
  <text x="330" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#9aa4b8">저장 방식</text>
  <text x="540" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#9aa4b8">용도</text>
  <text x="750" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#9aa4b8">주의</text>

  <line x1="240" y1="68" x2="240" y2="266" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="420" y1="68" x2="420" y2="266" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="640" y1="68" x2="640" y2="266" stroke="#3a4a6e" stroke-width="1"/>

  <!-- CHAR -->
  <rect x="30" y="100" width="820" height="40" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="155" y="125" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">CHAR(n)</text>
  <text x="330" y="118" text-anchor="middle" font-size="11" fill="#888">고정 길이, 부족하면</text>
  <text x="330" y="132" text-anchor="middle" font-size="11" fill="#888">공백으로 채움</text>
  <text x="540" y="118" text-anchor="middle" font-size="11" fill="#888">국가코드, 성별코드처럼</text>
  <text x="540" y="132" text-anchor="middle" font-size="11" fill="#888">항상 고정 길이인 값</text>
  <text x="750" y="125" text-anchor="middle" font-size="11" fill="#ce9178">비교 시 trailing space</text>

  <!-- VARCHAR -->
  <rect x="30" y="140" width="820" height="40" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="155" y="165" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">VARCHAR(n)</text>
  <text x="330" y="158" text-anchor="middle" font-size="11" fill="#888">가변 길이, 실제 크기만</text>
  <text x="330" y="172" text-anchor="middle" font-size="11" fill="#888">저장 (+ 길이 헤더)</text>
  <text x="540" y="158" text-anchor="middle" font-size="11" fill="#888">이름, 이메일, URL 등</text>
  <text x="540" y="172" text-anchor="middle" font-size="11" fill="#888">일반적인 문자열</text>
  <text x="750" y="165" text-anchor="middle" font-size="11" fill="#888">n 초과 시 에러</text>

  <!-- TEXT -->
  <rect x="30" y="180" width="820" height="40" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="155" y="205" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">TEXT</text>
  <text x="330" y="198" text-anchor="middle" font-size="11" fill="#888">무제한 길이 (PG는</text>
  <text x="330" y="212" text-anchor="middle" font-size="11" fill="#888">VARCHAR와 성능 동일)</text>
  <text x="540" y="198" text-anchor="middle" font-size="11" fill="#888">본문, 로그, JSON 문자열</text>
  <text x="540" y="212" text-anchor="middle" font-size="11" fill="#888">긴 내용 저장</text>
  <text x="750" y="198" text-anchor="middle" font-size="11" fill="#888">MySQL: LONGTEXT 별도</text>
  <text x="750" y="212" text-anchor="middle" font-size="11" fill="#888">Oracle: CLOB</text>

  <!-- CHAR behavior code -->
  <rect x="30" y="234" width="380" height="90" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="50" y="254" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace">-- CHAR vs VARCHAR 비교 함정</text>
  <text x="50" y="274" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">CHAR(10) = 'abc'</text>
  <text x="50" y="292" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">-- 실제 저장: 'abc       ' (7공백 패딩)</text>
  <text x="50" y="312" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">-- 비교: 'abc' = 'abc   ' → TRUE</text>

  <!-- Boolean -->
  <rect x="450" y="234" width="400" height="90" fill="#0f1320" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="650" y="256" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">BOOLEAN</text>
  <text x="650" y="278" text-anchor="middle" font-size="12" fill="#888">TRUE / FALSE / NULL (3-valued logic)</text>
  <text x="530" y="298" font-size="11" fill="#888">PostgreSQL: BOOLEAN 직접 지원</text>
  <text x="530" y="314" font-size="11" fill="#888">MySQL: TINYINT(1) 사용 (0=false, 1=true)</text>
  <text x="530" y="330" font-size="11" fill="#888">Oracle: NUMBER(1) 또는 CHAR(1) 관례</text>

  <!-- Bottom: 3-valued logic -->
  <rect x="30" y="344" width="820" height="94" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="8"/>
  <text x="440" y="366" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">3값 논리(3-Valued Logic)와 NULL</text>
  <text x="440" y="388" text-anchor="middle" font-size="12" fill="#888">SQL에서 NULL은 "값 없음"이 아니라 "알 수 없음(UNKNOWN)"이다</text>

  <!-- Truth table -->
  <text x="130" y="412" text-anchor="middle" font-size="11" fill="#7ec8e3">TRUE AND NULL = NULL</text>
  <text x="130" y="428" text-anchor="middle" font-size="11" fill="#888">(알 수 없음)</text>

  <text x="330" y="412" text-anchor="middle" font-size="11" fill="#e05555">FALSE AND NULL = FALSE</text>
  <text x="330" y="428" text-anchor="middle" font-size="11" fill="#888">(확실히 거짓)</text>

  <text x="560" y="412" text-anchor="middle" font-size="11" fill="#7ec8e3">TRUE OR NULL = TRUE</text>
  <text x="560" y="428" text-anchor="middle" font-size="11" fill="#888">(확실히 참)</text>

  <text x="750" y="412" text-anchor="middle" font-size="11" fill="#e05555">NULL = NULL → NULL</text>
  <text x="750" y="428" text-anchor="middle" font-size="11" fill="#888">(IS NULL로 비교)</text>
</svg>
