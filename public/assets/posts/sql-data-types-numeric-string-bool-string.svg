<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">문자열 · 불리언 타입</text>

  <!-- String section -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc">문자열 타입</text>

  <rect x="60" y="88" width="760" height="32" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600" text-anchor="middle">타입</text>
  <text x="360" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600" text-anchor="middle">특징</text>
  <text x="660" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600" text-anchor="middle">사용 예</text>

  <rect x="60" y="120" width="760" height="26" fill="#1a1a2e" stroke="#2a2a3a" stroke-width="1"/>
  <text x="150" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">CHAR(n)</text>
  <text x="360" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">고정 길이, 짧으면 공백 패딩</text>
  <text x="660" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">국가코드 CHAR(2), 고정코드</text>

  <rect x="60" y="146" width="760" height="26" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="150" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600" text-anchor="middle">VARCHAR(n)</text>
  <text x="360" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">가변 길이, n이 최대 바이트수</text>
  <text x="660" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이름, 이메일, URL (가장 일반적)</text>

  <rect x="60" y="172" width="760" height="26" fill="#1a1a2e" stroke="#2a2a3a" stroke-width="1"/>
  <text x="150" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">TEXT</text>
  <text x="360" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">제한 없는 가변 텍스트 (PG)</text>
  <text x="660" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">본문, 설명, 로그 (n 제약 불필요)</text>

  <rect x="60" y="198" width="760" height="26" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="150" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CLOB / LONGTEXT</text>
  <text x="360" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">초대형 텍스트 (Oracle / MySQL)</text>
  <text x="660" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HTML 전문, 대용량 텍스트</text>

  <!-- Boolean section -->
  <text x="60" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">불리언 타입</text>

  <rect x="60" y="268" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- ANSI SQL (PostgreSQL, SQLite)</text>
  <text x="76" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">is_active  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">BOOLEAN</tspan>
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#9aa4b8">-- TRUE / FALSE / NULL (3값)</tspan>
  </text>
  <text x="76" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- MySQL: BOOLEAN = TINYINT(1)  Oracle: NUMBER(1) 또는 CHAR(1)</text>
  <text x="76" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- CHECK 제약으로 보완: CHECK (flag IN (0, 1))</text>

  <!-- CHAR vs VARCHAR note -->
  <rect x="60" y="382" width="760" height="28" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CHAR vs VARCHAR: CHAR(10)에 'abc' 저장 → 'abc       ' (공백 패딩) — 비교 시 주의</text>
</svg>
