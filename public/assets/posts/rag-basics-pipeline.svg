<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Section labels -->
  <text x="40" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">오프라인 인덱싱</text>
  <rect x="30" y="48" width="820" height="148" rx="8" fill="#111520" stroke="#3a4a6e" stroke-width="1"/>

  <text x="40" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">온라인 쿼리</text>
  <rect x="30" y="238" width="820" height="148" rx="8" fill="#111520" stroke="#3a4a6e" stroke-width="1"/>

  <!-- === INDEXING PIPELINE === -->
  <!-- 문서 -->
  <rect x="60" y="80" width="120" height="52" rx="8" fill="#1a1f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">문서</text>
  <text x="120" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PDF / HTML / TXT</text>

  <!-- Arrow 1 -->
  <line x1="182" y1="106" x2="218" y2="106" stroke="#555" stroke-width="2"/>
  <polygon points="218,100 232,106 218,112" fill="#555"/>

  <!-- 청킹 -->
  <rect x="234" y="80" width="120" height="52" rx="8" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="294" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">청킹</text>
  <text x="294" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">텍스트 분할</text>

  <!-- Arrow 2 -->
  <line x1="356" y1="106" x2="392" y2="106" stroke="#555" stroke-width="2"/>
  <polygon points="392,100 406,106 392,112" fill="#555"/>

  <!-- 임베딩 -->
  <rect x="408" y="80" width="120" height="52" rx="8" fill="#1a1f2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="468" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">임베딩</text>
  <text x="468" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">벡터 변환</text>

  <!-- Arrow 3 -->
  <line x1="530" y1="106" x2="566" y2="106" stroke="#555" stroke-width="2"/>
  <polygon points="566,100 580,106 566,112" fill="#555"/>

  <!-- 벡터DB -->
  <rect x="582" y="80" width="120" height="52" rx="8" fill="#1a1f2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="642" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">벡터DB</text>
  <text x="642" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">저장 &amp; 인덱싱</text>

  <!-- Step labels indexing -->
  <text x="120" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Step 1</text>
  <text x="294" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Step 2</text>
  <text x="468" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Step 3</text>
  <text x="642" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Step 4</text>

  <!-- === QUERY PIPELINE === -->
  <!-- 질문 -->
  <rect x="60" y="268" width="120" height="52" rx="8" fill="#1a1f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">질문</text>
  <text x="120" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">사용자 쿼리</text>

  <!-- Arrow -->
  <line x1="182" y1="294" x2="218" y2="294" stroke="#555" stroke-width="2"/>
  <polygon points="218,288 232,294 218,300" fill="#555"/>

  <!-- 임베딩 -->
  <rect x="234" y="268" width="120" height="52" rx="8" fill="#1a1f2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="294" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">임베딩</text>
  <text x="294" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">쿼리 벡터화</text>

  <!-- Arrow -->
  <line x1="356" y1="294" x2="392" y2="294" stroke="#555" stroke-width="2"/>
  <polygon points="392,288 406,294 392,300" fill="#555"/>

  <!-- 벡터DB 검색 -->
  <rect x="408" y="268" width="120" height="52" rx="8" fill="#1a1f2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="468" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">벡터 검색</text>
  <text x="468" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유사 청크 검색</text>

  <!-- Arrow -->
  <line x1="530" y1="294" x2="566" y2="294" stroke="#555" stroke-width="2"/>
  <polygon points="566,288 580,294 566,300" fill="#555"/>

  <!-- LLM -->
  <rect x="582" y="268" width="120" height="52" rx="8" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="642" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">LLM</text>
  <text x="642" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨텍스트 + 질문</text>

  <!-- Arrow -->
  <line x1="704" y1="294" x2="740" y2="294" stroke="#555" stroke-width="2"/>
  <polygon points="740,288 754,294 740,300" fill="#555"/>

  <!-- 답변 -->
  <rect x="756" y="268" width="80" height="52" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="796" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">답변</text>
  <text x="796" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">생성 완료</text>

  <!-- Title -->
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RAG 전체 파이프라인</text>
</svg>
