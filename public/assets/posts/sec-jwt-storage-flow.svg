<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Silent Refresh 패턴</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Access Token(메모리) + Refresh Token(HttpOnly 쿠키)</text>

  <!-- 로그인 -->
  <rect x="60" y="90" width="160" height="52" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">① 로그인</text>
  <text x="140" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">POST /auth/login</text>

  <line x1="220" y1="116" x2="298" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 서버 -->
  <rect x="300" y="90" width="220" height="52" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="410" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">② 서버 응답</text>
  <text x="410" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">Access(15m, body) + Refresh(7d, cookie)</text>

  <line x1="520" y1="116" x2="598" y2="116" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- 클라이언트 저장 -->
  <rect x="600" y="90" width="220" height="52" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="710" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">③ 클라이언트 저장</text>
  <text x="710" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">let accessToken = res.accessToken;</text>

  <!-- API 요청 -->
  <rect x="60" y="180" width="160" height="52" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="140" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">④ API 요청</text>
  <text x="140" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">Authorization: Bearer {at}</text>

  <line x1="220" y1="206" x2="298" y2="206" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="300" y="180" width="220" height="52" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="410" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">⑤ 200 OK</text>
  <text x="410" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정상 처리</text>

  <!-- 토큰 만료 -->
  <rect x="60" y="270" width="160" height="52" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">⑥ 401 만료</text>
  <text x="140" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Access Token 만료</text>

  <line x1="220" y1="296" x2="298" y2="296" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="300" y="270" width="220" height="52" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="410" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">⑦ Silent Refresh</text>
  <text x="410" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">POST /auth/refresh (쿠키 자동 포함)</text>

  <line x1="520" y1="296" x2="598" y2="296" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="600" y="270" width="220" height="52" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">⑧ 새 Access Token</text>
  <text x="710" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">accessToken = newToken; 재요청</text>

  <!-- 구분선 -->
  <line x1="60" y1="155" x2="820" y2="155" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="245" x2="820" y2="245" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 레이블 -->
  <text x="30" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로그인</text>
  <text x="30" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">API</text>
  <text x="30" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">갱신</text>
</svg>
