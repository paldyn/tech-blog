  <!-- Row 5: Snowflake -->
  <rect x="60" y="430" width="760" height="68" rx="6" fill="#0f1520"/>
  <text x="130" y="457" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
