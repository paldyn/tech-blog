  <!-- divider lines -->
  <line x1="200" y1="90" x2="200" y2="498" stroke="#1e2433" stroke-width="1"/>
  <line x1="360" y1="90" x2="360" y2="498" stroke="#1e2433" stroke-width="1"/>
  <line x1="510" y1="90" x2="510" y2="498" stroke="#1e2433" stroke-width="1"/>
  <line x1="620" y1="90" x2="620" y2="498" stroke="#1e2433" stroke-width="1"/>
  <line x1="740" y1="90" x2="740" y2="498" stroke="#1e2433" stroke-width="1"/>
