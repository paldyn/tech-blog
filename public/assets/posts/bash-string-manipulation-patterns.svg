<svg width="880" height="360" viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">문자열 조작 실전 패턴</text>

  <!-- ext / basename patterns -->
  <rect x="60" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">파일 경로 조작</text>
  <rect x="60" y="106" width="370" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">F=</tspan><tspan fill="#ce9178">"/home/user/report.tar.gz"</tspan></text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#9aa4b8"># 확장자 제거</tspan></text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">base=${F%.*}    </tspan><tspan fill="#9aa4b8"># .../report.tar</tspan></text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">stem=${F%%.*}   </tspan><tspan fill="#9aa4b8"># .../report</tspan></text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#9aa4b8"># 파일명만 / 확장자만</tspan></text>
  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">name=${F##*/}   </tspan><tspan fill="#9aa4b8"># report.tar.gz</tspan></text>
  <text x="76" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">ext=${F##*.}    </tspan><tspan fill="#9aa4b8"># gz</tspan></text>
  <text x="76" y="252" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">dir=${F%/*}     </tspan><tspan fill="#9aa4b8"># /home/user</tspan></text>

  <!-- String trim / join -->
  <rect x="450" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">trim · 분리 · 결합</text>
  <rect x="450" y="106" width="370" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 앞뒤 공백 제거</text>
  <text x="466" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">trimmed="${str#"${str%%[![:space:]]*}"}"</tspan></text>
  <text x="466" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">read -r trimmed &lt;&lt;&lt; "$str"</tspan><tspan fill="#9aa4b8"> # 간단</tspan></text>
  <text x="466" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="466" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 구분자로 분리</text>
  <text x="466" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">IFS=</tspan><tspan fill="#ce9178">':'</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">read</tspan><tspan fill="#ffffff"> -ra parts &lt;&lt;&lt; </tspan><tspan fill="#ce9178">"a:b:c"</tspan></text>
  <text x="466" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="466" y="252" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 배열을 문자열로 결합</text>
  <text x="466" y="270" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">joined=$(IFS=</tspan><tspan fill="#ce9178">','</tspan><tspan fill="#ffffff">; echo </tspan><tspan fill="#ce9178">"${arr[*]}"</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- Multiline tip -->
  <rect x="60" y="270" width="760" height="68" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="440" y="294" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">핵심 요약</text>
  <text x="440" y="314" text-anchor="middle" font-size="13" fill="#e8e8e8">#/* → 앞에서 제거 | %/%%  → 뒤에서 제거 | /  → 한 번 치환 | // → 전체 치환</text>
  <text x="440" y="332" text-anchor="middle" font-size="13" fill="#e8e8e8">^^ → 대문자 | ,, → 소문자 | : offset:len → 슬라이스 | #var → 길이</text>
</svg>
