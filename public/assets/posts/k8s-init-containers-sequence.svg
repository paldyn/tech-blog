<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Init Container 실행 순서</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">모든 Init Container가 완료된 후에만 메인 컨테이너가 시작됩니다</text>

  <!-- Timeline header -->
  <text x="80" y="100"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">시간 →</text>

  <!-- init-1 -->
  <rect x="60" y="114" width="200" height="68" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="160" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">init-1</text>
  <text x="160" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">DB 스키마 마이그레이션</text>
  <text x="160" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">완료(0) 후 다음 진행</text>

  <!-- Arrow -->
  <line x1="262" y1="148" x2="298" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- init-2 -->
  <rect x="300" y="114" width="200" height="68" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="400" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">init-2</text>
  <text x="400" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">설정 파일 복사</text>
  <text x="400" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">완료(0) 후 다음 진행</text>

  <!-- Arrow -->
  <line x1="502" y1="148" x2="538" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- init-3 -->
  <rect x="540" y="114" width="200" height="68" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="640" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">init-3</text>
  <text x="640" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">외부 서비스 대기</text>
  <text x="640" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">완료(0) 후 다음 진행</text>

  <!-- Main containers start -->
  <line x1="440" y1="182" x2="440" y2="212" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="460" y="202"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">All Done!</text>

  <!-- Main containers row -->
  <rect x="160" y="216" width="200" height="68" rx="8" fill="#0d1e0d" stroke="#55c555" stroke-width="2"/>
  <text x="260" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">main-app</text>
  <text x="260" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">메인 애플리케이션</text>
  <text x="260" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Running (계속 실행)</text>

  <rect x="390" y="216" width="200" height="68" rx="8" fill="#0d1e0d" stroke="#55c555" stroke-width="2"/>
  <text x="490" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">sidecar</text>
  <text x="490" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">사이드카 컨테이너</text>
  <text x="490" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Running (계속 실행)</text>

  <!-- Shared volumes -->
  <rect x="620" y="216" width="200" height="68" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="720" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">공유 볼륨</text>
  <text x="720" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">emptyDir</text>
  <text x="720" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">Init↔메인 간 파일 공유</text>

  <!-- Bottom key points -->
  <rect x="60" y="310" width="760" height="146" rx="8" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Init Container 핵심 규칙</text>

  <text x="80" y="354"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="100" y="354"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">순서 보장: initContainers 배열 순서대로 하나씩 실행됩니다</text>

  <text x="80" y="374"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="100" y="374"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">exitCode 0이어야 다음 Init Container로 진행</text>

  <text x="80" y="394"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="100" y="394"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">실패 시 backoffLimit에 따라 재시도 (기본: 계속 재시도)</text>

  <text x="80" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="100" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">emptyDir 볼륨으로 Init Container → 메인 컨테이너 파일 전달 가능</text>

  <text x="80" y="434"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="100" y="434"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">메인 컨테이너와 다른 이미지 사용 가능 (보안 도구, 마이그레이션 도구 분리)</text>
</svg>
