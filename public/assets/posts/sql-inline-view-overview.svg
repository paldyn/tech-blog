<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">인라인 뷰 — FROM 절 서브쿼리</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">가상 테이블로 복잡한 집계를 단계적으로 분해</text>

  <!-- Structure diagram -->
  <!-- Outer query -->
  <rect x="50" y="96" width="780" height="244" fill="#0d1520" rx="8" stroke="#7ec8e3"/>
  <text x="70" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="70" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">       dept, avg_sal, rank_in_company</text>
  <text x="70" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>

  <!-- Inline view box -->
  <rect x="90" y="144" width="720" height="140" fill="#131820" rx="6" stroke="#7777cc" stroke-dasharray="5,3"/>
  <text x="440" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">← 인라인 뷰 (FROM 절 서브쿼리)</text>

  <text x="110" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  (</text>
  <text x="110" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    SELECT</text>
  <text x="110" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">           dept,</text>
  <text x="110" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">           <tspan fill="#7ec8e3">AVG</tspan>(salary) AS avg_sal,</text>
  <text x="110" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">           <tspan fill="#7ec8e3">RANK</tspan>() <tspan fill="#7ec8e3">OVER</tspan> (<tspan fill="#7ec8e3">ORDER BY AVG</tspan>(salary) <tspan fill="#7ec8e3">DESC</tspan>) AS rank_in_company</text>
  <text x="110" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    FROM</text>
  <text x="110" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">         employees <tspan fill="#7ec8e3">GROUP BY</tspan> dept</text>
  <text x="110" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  ) dept_stats</text>

  <text x="70" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">WHERE</text>
  <text x="70" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      rank_in_company &lt;= 3;   <tspan fill="#9aa4b8">-- 집계 결과에 WHERE 사용 가능!</tspan></text>

  <!-- Key point boxes -->
  <rect x="50" y="364" width="240" height="72" fill="#131820" rx="8" stroke="#55c555"/>
  <text x="170" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">장점</text>
  <text x="170" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">집계 결과에 WHERE 적용 가능</text>
  <text x="170" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">논리를 단계적으로 분리</text>

  <rect x="320" y="364" width="240" height="72" fill="#131820" rx="8" stroke="#7ec8e3"/>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">동작</text>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">FROM 절에서 가상 테이블 생성</text>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">외부 쿼리에서 일반 테이블처럼 사용</text>

  <rect x="590" y="364" width="240" height="72" fill="#131820" rx="8" stroke="#7777cc"/>
  <text x="710" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">주의</text>
  <text x="710" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">반드시 별칭(alias) 지정</text>
  <text x="710" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">외부 쿼리 컬럼 참조 불가 (비상관)</text>
</svg>
