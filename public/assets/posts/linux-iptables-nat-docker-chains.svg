<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e08020"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">iptables 체인과 Docker 커스텀 체인</text>

  <!-- Netfilter packet journey -->
  <!-- PREROUTING -->
  <rect x="60" y="80" width="140" height="60" rx="8" fill="#1a0a00" stroke="#e08020" stroke-width="1.5"/>
  <text x="130" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e08020">PREROUTING</text>
  <text x="130" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DNAT</text>

  <line x1="200" y1="110" x2="250" y2="110"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Routing decision -->
  <rect x="250" y="80" width="120" height="60" rx="8" fill="#1a1a1a" stroke="#666" stroke-width="1"/>
  <text x="310" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">라우팅 결정</text>
  <text x="310" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">로컬? 포워드?</text>

  <!-- FORWARD -->
  <line x1="370" y1="110" x2="420" y2="110"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="420" y="80" width="160" height="60" rx="8" fill="#001a00" stroke="#55c555" stroke-width="1.5"/>
  <text x="500" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">FORWARD</text>
  <text x="500" y="121" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DOCKER-USER</text>
  <text x="500" y="133" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DOCKER-ISOLATION-STAGE-*</text>

  <!-- POSTROUTING -->
  <line x1="580" y1="110" x2="640" y2="110"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="640" y="80" width="180" height="60" rx="8" fill="#1a0a00" stroke="#e08020" stroke-width="1.5"/>
  <text x="730" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e08020">POSTROUTING</text>
  <text x="730" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">MASQUERADE</text>

  <!-- Docker custom chains -->
  <rect x="60" y="186" width="760" height="240" rx="8" fill="#0a0a14" stroke="#444" stroke-width="1"/>
  <text x="440" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">Docker 커스텀 체인 구조</text>

  <rect x="80" y="226" width="200" height="100" rx="6" fill="#001020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">DOCKER</text>
  <text x="180" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">포트 포워딩 규칙</text>
  <text x="180" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DNAT to container</text>
  <text x="180" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">nat 테이블</text>

  <rect x="300" y="226" width="200" height="100" rx="6" fill="#001020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="400" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">DOCKER-USER</text>
  <text x="400" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자 커스텀 규칙</text>
  <text x="400" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">여기에 추가 권장</text>
  <text x="400" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">filter 테이블</text>

  <rect x="520" y="226" width="280" height="100" rx="6" fill="#001020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="660" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">DOCKER-ISOLATION-STAGE-*</text>
  <text x="660" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">네트워크 간 격리</text>
  <text x="660" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">다른 Docker 네트워크 간 차단</text>
  <text x="660" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">filter 테이블</text>

  <!-- ip_forward note -->
  <rect x="80" y="346" width="720" height="60" rx="6" fill="#1a1a00" stroke="#e8c040" stroke-width="1"/>
  <text x="440" y="370" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c040">⚠ 컨테이너 네트워킹에 필요한 커널 설정</text>
  <text x="440" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">sysctl net.ipv4.ip_forward=1  (Docker 시작 시 자동 설정)</text>
</svg>
