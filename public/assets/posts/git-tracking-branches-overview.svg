<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">원격 추적 브랜치 동작 원리</text>

  <!-- Local Repo Section -->
  <rect x="60" y="70" width="340" height="280" rx="10" fill="#0e1420" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">로컬 저장소</text>

  <!-- Local branch: main -->
  <rect x="80" y="108" width="140" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">main</text>
  <text x="150" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로컬 브랜치</text>

  <!-- Remote tracking: origin/main -->
  <rect x="80" y="168" width="170" height="40" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="165" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">origin/main</text>
  <text x="165" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격 추적 브랜치</text>

  <!-- Local branch: feature/x -->
  <rect x="80" y="228" width="160" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">feature/x</text>
  <text x="160" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로컬 브랜치</text>

  <!-- Remote tracking: origin/feature/x -->
  <rect x="80" y="288" width="190" height="40" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="175" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">origin/feature/x</text>
  <text x="175" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격 추적 브랜치</text>

  <!-- Legend note -->
  <text x="230" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">추적 브랜치는 git fetch 시 자동 업데이트</text>
  <text x="230" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">직접 편집 불가 — 읽기 전용 스냅샷</text>

  <!-- Middle arrows -->
  <line x1="400" y1="192" x2="478" y2="192" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-b)"/>
  <text x="438" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">fetch</text>

  <line x1="480" y1="220" x2="402" y2="220" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-p)"/>
  <text x="440" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">push</text>

  <!-- Remote Repo Section -->
  <rect x="480" y="70" width="340" height="280" rx="10" fill="#0e1420" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="650" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">원격 저장소 (origin)</text>

  <!-- Remote branch: main -->
  <rect x="500" y="108" width="140" height="40" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="570" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">main</text>
  <text x="570" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격 브랜치</text>

  <!-- Remote branch: feature/x -->
  <rect x="500" y="228" width="160" height="40" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">feature/x</text>
  <text x="580" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격 브랜치</text>

  <!-- Bottom: ahead/behind concept -->
  <rect x="60" y="388" width="760" height="70" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">ahead / behind 개념</text>
  <text x="220" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">ahead N: 로컬이 N개 앞섬 → push 필요</text>
  <text x="660" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">behind N: 원격이 N개 앞섬 → pull 필요</text>
</svg>
