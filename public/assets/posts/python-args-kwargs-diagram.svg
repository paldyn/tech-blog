<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">*args와 **kwargs 동작 원리</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">위치 초과 인수 → tuple  /  키워드 초과 인수 → dict</text>

  <!-- *args side -->
  <rect x="60" y="90" width="360" height="330" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <rect x="60" y="90" width="360" height="5" fill="#7ec8e3" rx="8"/>
  <rect x="60" y="93" width="360" height="3" fill="#7ec8e3"/>
  <text x="240" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">*args</text>
  <text x="240" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">남은 위치 인수를 튜플로 묶음</text>

  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> add(*args):</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ffffff"> sum(args)</tspan></text>

  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">add(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)       </tspan><tspan fill="#9aa4b8"># 3</tspan></text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">add(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">)    </tspan><tspan fill="#9aa4b8"># 6</tspan></text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">add(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#9aa4b8"># 10</tspan></text>

  <line x1="76" y1="272" x2="400" y2="272" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">내부에서 args는 tuple</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> show(*args):</tspan></text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    print(type(args))</tspan></text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">show(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#9aa4b8"># &lt;class 'tuple'&gt;</tspan></text>
  <text x="76" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">add(1, 2) → args = (1, 2)</text>

  <!-- **kwargs side -->
  <rect x="460" y="90" width="360" height="330" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <rect x="460" y="90" width="360" height="5" fill="#55c555" rx="8"/>
  <rect x="460" y="93" width="360" height="3" fill="#55c555"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">**kwargs</text>
  <text x="640" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">남은 키워드 인수를 dict로 묶음</text>

  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> info(**kwargs):</tspan></text>
  <text x="476" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    for</tspan><tspan fill="#ffffff"> k, v </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#ffffff"> kwargs.items():</tspan></text>
  <text x="476" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        print(k, </tspan><tspan fill="#ce9178">"="</tspan><tspan fill="#ffffff">, v)</tspan></text>

  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">info(name=</tspan><tspan fill="#ce9178">"철수"</tspan><tspan fill="#ffffff">, age=</tspan><tspan fill="#b5cea8">25</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># name = 철수</text>
  <text x="476" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># age = 25</text>

  <line x1="476" y1="290" x2="800" y2="290" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">내부에서 kwargs는 dict</text>
  <text x="476" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> show(**kwargs):</tspan></text>
  <text x="476" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    print(type(kwargs))</tspan></text>
  <text x="476" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># &lt;class 'dict'&gt;</tspan></text>
  <text x="476" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">info(a=1, b=2) → kwargs = {'a':1,'b':2}</text>
</svg>
