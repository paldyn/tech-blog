  <text x="220" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ "강아지 음식 추천"</text>

  <rect x="80" y="262" width="280" height="38" rx="6" fill="#1a0808" stroke="#444" stroke-width="1"/>
  <text x="220" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">✗ "반려견 사료 선택법"</text>

  <rect x="80" y="308" width="280" height="38" rx="6" fill="#1a0808" stroke="#444" stroke-width="1"/>
