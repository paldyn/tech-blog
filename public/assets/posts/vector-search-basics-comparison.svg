  <text x="660" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">의미(시맨틱) 기반 검색</text>

  <rect x="520" y="138" width="280" height="40" rx="6" fill="#1a1040" stroke="#7777cc" stroke-width="1.5"/>
