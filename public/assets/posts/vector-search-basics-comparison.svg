<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">키워드 검색 vs 벡터 검색</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">쿼리: "강아지 음식"</text>

  <!-- Divider -->
  <line x1="440" y1="85" x2="440" y2="340" stroke="#333" stroke-width="1.5"/>

  <!-- Left: Keyword Search -->
  <text x="220" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">키워드 검색</text>
  <text x="220" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">정확한 단어 일치만 검색</text>

  <rect x="80" y="138" width="280" height="40" rx="6" fill="#1e0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">"강아지 음식"</text>

  <line x1="220" y1="180" x2="220" y2="200" stroke="#555" stroke-width="2"/>
  <polygon points="213,200 220,214 227,200" fill="#555"/>

