<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">지연 평가(Lazy Evaluation)의 이점</text>

  <!-- Left: 일반 함수 (즉시 평가) -->
  <text x="230" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">일반 함수 — 즉시 평가</text>
  <rect x="50" y="80" width="370" height="194" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 10억 개를 전부 메모리에 올림</tspan></text>
  <text x="66" y="121" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">def </tspan><tspan>big_list(n):</tspan>
  </text>
  <text x="66" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    result = []</tspan>
  <text x="66" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">for </tspan><tspan>i </tspan><tspan font-weight="600" fill="#7ec8e3">in </tspan><tspan>range(n):</tspan>
  </text>
  <text x="66" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        result.append(i * i)</tspan>
  <text x="66" y="193" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">return </tspan><tspan>result</tspan>
  </text>
  <text x="66" y="219" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 8 GB RAM → 메모리 부족</tspan></text>
  <text x="66" y="237" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">big_list(1_000_000_000)</tspan></text>

  <!-- Right: 제너레이터 (지연 평가) -->
  <text x="650" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">제너레이터 — 지연 평가</text>
  <rect x="460" y="80" width="370" height="194" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 값을 하나씩 생성, 상수 메모리</tspan></text>
  <text x="476" y="121" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">def </tspan><tspan>big_squares(n):</tspan>
  </text>
  <text x="476" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">for </tspan><tspan>i </tspan><tspan font-weight="600" fill="#7ec8e3">in </tspan><tspan>range(n):</tspan>
  </text>
  <text x="476" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">        </tspan><tspan font-weight="600" fill="#7ec8e3">yield </tspan><tspan>i * i</tspan>
  </text>
  <text x="476" y="193" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># OK — 메모리 몇 KB</tspan></text>
  <text x="476" y="211" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">gen = big_squares(<tspan fill="#b5cea8">1_000_000_000</tspan>)</text>
  <text x="476" y="237" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 첫 5개만 꺼내기</tspan></text>
  <text x="476" y="255" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">import </tspan><tspan>itertools</tspan>
  </text>

  <!-- Bottom comparison -->
  <rect x="50" y="292" width="780" height="70" rx="8"
        fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">제너레이터의 핵심 이점</text>
  <text x="240" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">메모리 효율: O(1) 상수 공간</text>
  <text x="640" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">파이프라인: 단계별 처리 가능</text>
</svg>
