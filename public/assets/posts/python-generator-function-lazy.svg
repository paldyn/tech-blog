<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">리스트 vs 제너레이터: 메모리 사용</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">1억 개 제곱의 합 — 한꺼번에 적재 vs 하나씩 생성</text>

  <!-- LEFT panel: list comprehension (eager) -->
  <rect x="60" y="92" width="360" height="300" rx="10" fill="#140d0d" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">리스트 컴프리헨션 (즉시 평가)</text>

  <rect x="76" y="136" width="328" height="42" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">sum([x*x </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> x </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> range(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">**</tspan><tspan fill="#b5cea8">8</tspan><tspan fill="#ffffff">)])</tspan></text>

  <text x="240" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777" text-anchor="middle">RAM 점유 상태</text>
  <rect x="84"  y="216" width="46" height="44" rx="5" fill="#3a1515" stroke="#e05555" stroke-width="1"/>
  <rect x="136" y="216" width="46" height="44" rx="5" fill="#3a1515" stroke="#e05555" stroke-width="1"/>
  <rect x="188" y="216" width="46" height="44" rx="5" fill="#3a1515" stroke="#e05555" stroke-width="1"/>
  <rect x="240" y="216" width="46" height="44" rx="5" fill="#3a1515" stroke="#e05555" stroke-width="1"/>
  <rect x="292" y="216" width="46" height="44" rx="5" fill="#3a1515" stroke="#e05555" stroke-width="1"/>
  <rect x="344" y="216" width="46" height="44" rx="5" fill="#3a1515" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1억 개 객체가 동시에 메모리에 상주</text>

  <text x="240" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="17" font-weight="700" fill="#e05555" text-anchor="middle">O(n)</text>
  <text x="240" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전체 적재 — 약 수 GB</text>

  <!-- RIGHT panel: generator expression (lazy) -->
  <rect x="460" y="92" width="360" height="300" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">제너레이터 표현식 (지연 평가)</text>

  <rect x="476" y="136" width="328" height="42" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">sum(x*x </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> x </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> range(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">**</tspan><tspan fill="#b5cea8">8</tspan><tspan fill="#ffffff">))</tspan></text>

  <text x="640" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777" text-anchor="middle">RAM 점유 상태</text>
  <rect x="484" y="216" width="46" height="44" rx="5" fill="#153a15" stroke="#55c555" stroke-width="1"/>
  <rect x="536" y="216" width="46" height="44" rx="5" fill="none" stroke="#444444" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="588" y="216" width="46" height="44" rx="5" fill="none" stroke="#444444" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="640" y="216" width="46" height="44" rx="5" fill="none" stroke="#444444" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="692" y="216" width="46" height="44" rx="5" fill="none" stroke="#444444" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="744" y="216" width="46" height="44" rx="5" fill="none" stroke="#444444" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="640" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">현재 값 1개만 상주, 나머지는 미생성</text>

  <text x="640" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="17" font-weight="700" fill="#55c555" text-anchor="middle">O(1)</text>
  <text x="640" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">상수 메모리 — 입력 크기 무관</text>

  <!-- Bottom note -->
  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">제너레이터는 소비 즉시 값을 버려 메모리를 일정하게 유지한다</text>
</svg>
