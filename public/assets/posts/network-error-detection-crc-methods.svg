<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">오류 검출 방법 비교</text>

  <!-- 3 methods: Parity, Checksum, CRC -->
  <!-- Parity -->
  <rect x="40" y="68" width="260" height="200" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">패리티 비트</text>
  <text x="170" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Parity Check</text>
  <rect x="60" y="130" width="220" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">1010110 + P=1</text>
  <text x="170" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">1비트 오류 검출 가능</text>
  <text x="170" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">짝수/홀수 패리티 선택</text>
  <rect x="60" y="224" width="220" height="30" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="170" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">2비트 오류는 검출 불가</text>
  <text x="170" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사용: 메모리(ECC)</text>

  <!-- Checksum -->
  <rect x="320" y="68" width="260" height="200" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="450" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">체크섬</text>
  <text x="450" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Checksum</text>
  <rect x="340" y="130" width="220" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="450" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">sum(bytes) % 256</text>
  <text x="450" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">바이트 합산 후 취소</text>
  <text x="450" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">복수 오류도 일부 검출</text>
  <rect x="340" y="224" width="220" height="30" rx="6" fill="#0a1a00" stroke="#55c555" stroke-width="1"/>
  <text x="450" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">구현 단순, 검출력 낮음</text>
  <text x="450" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사용: IP, TCP, UDP</text>

  <!-- CRC -->
  <rect x="600" y="68" width="240" height="200" rx="8" fill="#1a120a" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="720" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8a55c" text-anchor="middle">CRC</text>
  <text x="720" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Cyclic Redundancy Check</text>
  <rect x="618" y="130" width="204" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a55c" text-anchor="middle">M(x) mod G(x)</text>
  <text x="720" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">다항식 나눗셈 기반</text>
  <text x="720" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">버스트 오류 검출 우수</text>
  <rect x="618" y="224" width="204" height="30" rx="6" fill="#0a1a00" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">검출력 최강</text>
  <text x="720" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사용: 이더넷, 파일시스템</text>

  <!-- Comparison bar -->
  <rect x="40" y="290" width="800" height="150" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">검출 능력 비교 (오류 유형별)</text>
  <!-- Simple bar chart -->
  <text x="130" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">단일 비트 오류</text>
  <rect x="80" y="348" width="100" height="14" rx="3" fill="#55c555"/>
  <rect x="330" y="348" width="100" height="14" rx="3" fill="#7ec8e3"/>
  <rect x="580" y="348" width="100" height="14" rx="3" fill="#e8a55c"/>
  <text x="240" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">버스트 오류</text>
  <rect x="80" y="368" width="30" height="14" rx="3" fill="#55c555"/>
  <rect x="330" y="368" width="60" height="14" rx="3" fill="#7ec8e3"/>
  <rect x="580" y="368" width="100" height="14" rx="3" fill="#e8a55c"/>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">오버헤드</text>
  <rect x="80" y="388" width="20" height="14" rx="3" fill="#55c555"/>
  <rect x="330" y="388" width="50" height="14" rx="3" fill="#7ec8e3"/>
  <rect x="580" y="388" width="80" height="14" rx="3" fill="#e8a55c"/>
  <text x="130" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">패리티</text>
  <text x="380" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">체크섬</text>
  <text x="630" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a55c" text-anchor="middle">CRC</text>
</svg>
