<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">오류 감지 방법 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">패리티 · 체크섬 · CRC — 신뢰성 vs 계산 복잡도 트레이드오프</text>

  <!-- Parity -->
  <rect x="60" y="90" width="230" height="200" rx="10" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">패리티 비트</text>
  <text x="175" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Parity Check</text>
  <rect x="76" y="150" width="198" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="86" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">1010101 → P=1</text>
  <text x="86" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">1 개수 홀수 → P=1</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1비트 오류 감지 가능</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">짝수 비트 오류 감지 불가</text>
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ASCII 통신에 사용됨</text>

  <!-- Checksum -->
  <rect x="325" y="90" width="230" height="200" rx="10" fill="#0f0f1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">체크섬</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Checksum (IP/TCP/UDP)</text>
  <rect x="341" y="150" width="198" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="351" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">데이터 합산 → 1의 보수</text>
  <text x="351" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">16비트 단위 합산</text>
  <text x="341" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">단순, 소프트웨어 처리 용이</text>
  <text x="341" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">위치 오류 감지 불가</text>
  <text x="341" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IP·TCP·UDP 헤더 검증</text>

  <!-- CRC -->
  <rect x="590" y="90" width="230" height="200" rx="10" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="705" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">CRC</text>
  <text x="705" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Cyclic Redundancy Check</text>
  <rect x="606" y="150" width="198" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="616" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">다항식 나눗셈 나머지</text>
  <text x="616" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">CRC-32 (이더넷)</text>
  <text x="606" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">연속 오류 감지 강력</text>
  <text x="606" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">이더넷·USB·저장장치 표준</text>
  <text x="606" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">하드웨어로 고속 처리</text>

  <!-- Bottom comparison -->
  <rect x="60" y="310" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" font-weight="600">오류 감지 vs 오류 정정 (FEC)</text>
  <text x="80" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">감지(Detection) </text>
  <text x="246" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">→ 오류 있음만 알림, 재전송 요청 (ARQ)</text>
  <text x="80" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">정정(Correction) </text>
  <text x="260" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">→ 오류 위치 추정 후 자동 복원 (Hamming, Reed-Solomon)</text>
  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">유선: 재전송 비용 낮아 감지 선호   무선: 재전송 비용 높아 FEC 선호</text>
  <text x="80" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">이더넷 FCS = CRC-32 (4바이트, 프레임 끝에 첨부)</text>
</svg>
