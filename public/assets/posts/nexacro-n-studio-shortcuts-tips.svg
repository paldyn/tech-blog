<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">단축키 활용 패턴 — 조회/저장/디버그</text>
  <text x="440" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#888">실무에서 가장 많이 쓰는 3가지 시나리오</text>

  <!-- Scenario 1: Search -->
  <rect x="60" y="92" width="230" height="340" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <rect x="60" y="92" width="230" height="38" rx="8" fill="#12233a"/>
  <rect x="60" y="118" width="230" height="12" fill="#12233a"/>
  <text x="175" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">시나리오 1: 조회 개발</text>

  <!-- step list -->
  <circle cx="86" cy="150" r="10" fill="#12233a" stroke="#1e3a5a"/>
  <text x="86" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">1</text>
  <text x="104" y="155" font-size="12" fill="#e8e8e8">Design 탭 열기</text>

  <line x1="86" y1="160" x2="86" y2="176" stroke="#1e3a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="86" cy="184" r="10" fill="#12233a" stroke="#1e3a5a"/>
  <text x="86" y="189" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">2</text>
  <text x="104" y="189" font-size="12" fill="#e8e8e8">Grid 드래그 배치</text>

  <line x1="86" y1="194" x2="86" y2="210" stroke="#1e3a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="86" cy="218" r="10" fill="#12233a" stroke="#1e3a5a"/>
  <text x="86" y="223" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">3</text>
  <text x="104" y="223" font-size="12" fill="#e8e8e8">Properties → name 설정</text>

  <line x1="86" y1="228" x2="86" y2="244" stroke="#1e3a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="86" cy="252" r="10" fill="#12233a" stroke="#1e3a5a"/>
  <text x="86" y="257" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">4</text>
  <text x="104" y="257" font-size="12" fill="#e8e8e8">더블클릭 → Script</text>

  <line x1="86" y1="262" x2="86" y2="278" stroke="#1e3a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="86" cy="286" r="10" fill="#12233a" stroke="#1e3a5a"/>
  <text x="86" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">5</text>
  <text x="104" y="291" font-size="12" fill="#e8e8e8">transaction() 작성</text>

  <line x1="86" y1="296" x2="86" y2="312" stroke="#1e3a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="86" cy="320" r="10" fill="#55c555" stroke="#338833"/>
  <text x="86" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">6</text>
  <text x="104" y="325" font-size="12" fill="#55c555">Ctrl+S → F5</text>

  <!-- key hint box -->
  <rect x="76" y="344" width="194" height="70" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="90" y="364" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0">// 핵심 단축키</text>
  <text x="90" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">Ctrl+S</text>
  <text x="148" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8"> + </text>
  <text x="167" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">F5</text>
  <text x="90" y="400" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0">// 저장 후 즉시 실행</text>

  <!-- Scenario 2: Debug -->
  <rect x="324" y="92" width="230" height="340" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <rect x="324" y="92" width="230" height="38" rx="8" fill="#1f2b1a"/>
  <rect x="324" y="118" width="230" height="12" fill="#1f2b1a"/>
  <text x="439" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">시나리오 2: 오류 디버그</text>

  <circle cx="350" cy="150" r="10" fill="#1f2b1a" stroke="#2a4a2a"/>
  <text x="350" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">1</text>
  <text x="368" y="155" font-size="12" fill="#e8e8e8">F5 → 오류 확인</text>

  <line x1="350" y1="160" x2="350" y2="176" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="350" cy="184" r="10" fill="#1f2b1a" stroke="#2a4a2a"/>
  <text x="350" y="189" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">2</text>
  <text x="368" y="189" font-size="12" fill="#e8e8e8">출력창 오류 줄 클릭</text>

  <line x1="350" y1="194" x2="350" y2="210" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="350" cy="218" r="10" fill="#1f2b1a" stroke="#2a4a2a"/>
  <text x="350" y="223" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">3</text>
  <text x="368" y="223" font-size="12" fill="#e8e8e8">Ctrl+F8 중단점 설정</text>

  <line x1="350" y1="228" x2="350" y2="244" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="350" cy="252" r="10" fill="#1f2b1a" stroke="#2a4a2a"/>
  <text x="350" y="257" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">4</text>
  <text x="368" y="257" font-size="12" fill="#e8e8e8">F9 디버그 실행</text>

  <line x1="350" y1="262" x2="350" y2="278" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="350" cy="286" r="10" fill="#1f2b1a" stroke="#2a4a2a"/>
  <text x="350" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">5</text>
  <text x="368" y="291" font-size="12" fill="#e8e8e8">F10/F11 스텝 실행</text>

  <line x1="350" y1="296" x2="350" y2="312" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="350" cy="320" r="10" fill="#55c555" stroke="#338833"/>
  <text x="350" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">6</text>
  <text x="368" y="325" font-size="12" fill="#55c555">변수 확인 → 수정</text>

  <rect x="340" y="344" width="194" height="70" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="354" y="364" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0">// 디버그 단축키</text>
  <text x="354" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">F9</text>
  <text x="372" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8"> → </text>
  <text x="397" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">F10</text>
  <text x="425" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">/</text>
  <text x="433" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">F11</text>
  <text x="354" y="400" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0">// 중단 후 단계 실행</text>

  <!-- Scenario 3: Refactor -->
  <rect x="588" y="92" width="232" height="340" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <rect x="588" y="92" width="232" height="38" rx="8" fill="#1a1530"/>
  <rect x="588" y="118" width="232" height="12" fill="#1a1530"/>
  <text x="704" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">시나리오 3: 코드 정리</text>

  <circle cx="614" cy="150" r="10" fill="#1a1530" stroke="#3a2a5a"/>
  <text x="614" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">1</text>
  <text x="632" y="155" font-size="12" fill="#e8e8e8">Script 탭으로 이동</text>

  <line x1="614" y1="160" x2="614" y2="176" stroke="#3a2a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="614" cy="184" r="10" fill="#1a1530" stroke="#3a2a5a"/>
  <text x="614" y="189" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">2</text>
  <text x="632" y="189" font-size="12" fill="#e8e8e8">Ctrl+F 함수 검색</text>

  <line x1="614" y1="194" x2="614" y2="210" stroke="#3a2a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="614" cy="218" r="10" fill="#1a1530" stroke="#3a2a5a"/>
  <text x="614" y="223" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">3</text>
  <text x="632" y="223" font-size="12" fill="#e8e8e8">Ctrl+H 이름 변경</text>

  <line x1="614" y1="228" x2="614" y2="244" stroke="#3a2a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="614" cy="252" r="10" fill="#1a1530" stroke="#3a2a5a"/>
  <text x="614" y="257" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">4</text>
  <text x="632" y="257" font-size="12" fill="#e8e8e8">블록 선택 후 Tab</text>

  <line x1="614" y1="262" x2="614" y2="278" stroke="#3a2a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="614" cy="286" r="10" fill="#1a1530" stroke="#3a2a5a"/>
  <text x="614" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">5</text>
  <text x="632" y="291" font-size="12" fill="#e8e8e8">Ctrl+/ 주석 토글</text>

  <line x1="614" y1="296" x2="614" y2="312" stroke="#3a2a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="614" cy="320" r="10" fill="#7777cc" stroke="#4455aa"/>
  <text x="614" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">6</text>
  <text x="632" y="325" font-size="12" fill="#7777cc">Ctrl+S 저장</text>

  <rect x="604" y="344" width="196" height="70" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="618" y="364" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0">// 코드 편집 단축키</text>
  <text x="618" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">Ctrl+H</text>
  <text x="670" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8"> / </text>
  <text x="685" y="382" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">Ctrl+/</text>
  <text x="618" y="400" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0">// 치환·주석 핵심</text>

  <!-- footer -->
  <text x="440" y="498" text-anchor="middle" font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복</text>
</svg>
