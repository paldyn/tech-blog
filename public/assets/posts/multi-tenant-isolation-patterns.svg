<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    .mono { font-family: 'JetBrains Mono','Menlo',monospace; }</style>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">같은 격리 문제, 4가지 답</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">원래 시스템의 모양이 답을 정한다</text>

  <!-- auth-api: JWT claim -->
  <rect x="25" y="100" width="195" height="400" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="122" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">auth-api</text>
  <text x="122" y="148" text-anchor="middle" font-size="11" fill="#888">JWT claim 자체</text>
  <line x1="40" y1="160" x2="205" y2="160" stroke="#222"/>

  <text x="40" y="184" font-size="11" fill="#aaa">access token 발급 시</text>
  <text x="40" y="200" font-size="11" fill="#aaa">사용자의 grants 를</text>
  <text x="40" y="216" font-size="11" fill="#aaa">JWT 에 박는다</text>

  <rect x="40" y="232" width="165" height="100" rx="4" fill="#000" stroke="#222"/>
  <text x="48" y="250" class="mono" font-size="10" fill="#7ec8e3">"projects": [</text>
  <text x="48" y="264" class="mono" font-size="10" fill="#aaa">  "mebrix",</text>
  <text x="48" y="278" class="mono" font-size="10" fill="#aaa">  "alpha"</text>
  <text x="48" y="292" class="mono" font-size="10" fill="#7ec8e3">],</text>
  <text x="48" y="306" class="mono" font-size="10" fill="#7ec8e3">"project_access": {</text>
  <text x="48" y="320" class="mono" font-size="10" fill="#aaa">  "mebrix": "WRITE"</text>

  <text x="40" y="356" font-size="10" fill="#888" font-weight="600">trade-off</text>
  <text x="40" y="372" font-size="10" fill="#aaa">grant 변경이 access</text>
  <text x="40" y="386" font-size="10" fill="#aaa">token TTL (15분) 만큼</text>
  <text x="40" y="400" font-size="10" fill="#aaa">지연 반영</text>

  <text x="40" y="430" font-size="10" fill="#888" font-weight="600">코드 변경</text>
  <text x="40" y="446" font-size="10" fill="#55c555">최소 (claim 추가만)</text>

  <text x="40" y="475" font-size="10" fill="#888" font-weight="600">검증</text>
  <text x="40" y="491" font-size="10" fill="#aaa">기존 25 회귀 통과</text>

  <!-- dict-api: MyBatis -->
  <rect x="235" y="100" width="195" height="400" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="332" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">dict-api</text>
  <text x="332" y="148" text-anchor="middle" font-size="11" fill="#888">MyBatis 명시적</text>
  <line x1="250" y1="160" x2="415" y2="160" stroke="#222"/>

  <text x="250" y="184" font-size="11" fill="#aaa">38개 SQL 쿼리에 직접</text>
  <text x="250" y="200" font-size="11" fill="#aaa">WHERE / INSERT / JOIN</text>
  <text x="250" y="216" font-size="11" fill="#aaa">PROJECT_CODE 추가</text>

  <rect x="250" y="232" width="165" height="100" rx="4" fill="#000" stroke="#222"/>
  <text x="258" y="250" class="mono" font-size="9" fill="#7ec8e3">SELECT ... FROM STD_DOM A</text>
  <text x="258" y="264" class="mono" font-size="9" fill="#aaa">LEFT JOIN DA_CODE B</text>
  <text x="258" y="278" class="mono" font-size="9" fill="#aaa">  ON B.PROJECT_CODE</text>
  <text x="258" y="292" class="mono" font-size="9" fill="#aaa">     = A.PROJECT_CODE</text>
  <text x="258" y="306" class="mono" font-size="9" fill="#7ec8e3">WHERE A.PROJECT_CODE</text>
  <text x="258" y="320" class="mono" font-size="9" fill="#aaa">     = #{PROJECT_CODE}</text>

  <text x="250" y="356" font-size="10" fill="#888" font-weight="600">trade-off</text>
  <text x="250" y="372" font-size="10" fill="#aaa">새 쿼리 추가 시</text>
  <text x="250" y="386" font-size="10" fill="#aaa">깜빡 잊으면 즉시</text>
  <text x="250" y="400" font-size="10" fill="#aaa">데이터 누수</text>

  <text x="250" y="430" font-size="10" fill="#888" font-weight="600">코드 변경</text>
  <text x="250" y="446" font-size="10" fill="#e05555">대 (38 쿼리 손작업)</text>

  <text x="250" y="475" font-size="10" fill="#888" font-weight="600">검증</text>
  <text x="250" y="491" font-size="10" fill="#aaa">5개 격리 시나리오</text>

  <!-- erd-api: Hibernate Filter -->
  <rect x="445" y="100" width="195" height="400" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="542" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">erd-api</text>
  <text x="542" y="148" text-anchor="middle" font-size="11" fill="#888">Hibernate @Filter</text>
  <line x1="460" y1="160" x2="625" y2="160" stroke="#222"/>

  <text x="460" y="184" font-size="11" fill="#aaa">Entity 어노테이션 한 줄.</text>
  <text x="460" y="200" font-size="11" fill="#aaa">AOP 가 service 진입</text>
  <text x="460" y="216" font-size="11" fill="#aaa">시점 자동 활성화</text>

  <rect x="460" y="232" width="165" height="100" rx="4" fill="#000" stroke="#222"/>
  <text x="468" y="250" class="mono" font-size="10" fill="#7ec8e3">@Entity</text>
  <text x="468" y="264" class="mono" font-size="10" fill="#7ec8e3">@Filter(</text>
  <text x="468" y="278" class="mono" font-size="10" fill="#aaa">  name="projectFilter",</text>
  <text x="468" y="292" class="mono" font-size="10" fill="#aaa">  condition=</text>
  <text x="468" y="306" class="mono" font-size="10" fill="#aaa">    "project_code = </text>
  <text x="468" y="320" class="mono" font-size="10" fill="#aaa">     :projectCode")</text>

  <text x="460" y="356" font-size="10" fill="#888" font-weight="600">trade-off</text>
  <text x="460" y="372" font-size="10" fill="#aaa">native query / 일부</text>
  <text x="460" y="386" font-size="10" fill="#aaa">fetch join 우회 가능.</text>
  <text x="460" y="400" font-size="10" fill="#aaa">Hibernate 종속</text>

  <text x="460" y="430" font-size="10" fill="#888" font-weight="600">코드 변경</text>
  <text x="460" y="446" font-size="10" fill="#55c555">소 (entity + AOP)</text>

  <text x="460" y="475" font-size="10" fill="#888" font-weight="600">검증</text>
  <text x="460" y="491" font-size="10" fill="#aaa">4개 격리 시나리오</text>

  <!-- dbwb-api: composite PK -->
  <rect x="655" y="100" width="195" height="400" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="752" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">dbwb-api</text>
  <text x="752" y="148" text-anchor="middle" font-size="11" fill="#888">composite PK</text>
  <line x1="670" y1="160" x2="835" y2="160" stroke="#222"/>

  <text x="670" y="184" font-size="11" fill="#aaa">PK 자체를 (project_</text>
  <text x="670" y="200" font-size="11" fill="#aaa">code, user_id) 로 변경.</text>
  <text x="670" y="216" font-size="11" fill="#aaa">@IdClass 로 표현</text>

  <rect x="670" y="232" width="165" height="100" rx="4" fill="#000" stroke="#222"/>
  <text x="678" y="250" class="mono" font-size="10" fill="#7ec8e3">@Entity</text>
  <text x="678" y="264" class="mono" font-size="10" fill="#7ec8e3">@IdClass(</text>
  <text x="678" y="278" class="mono" font-size="10" fill="#aaa">  UserProjectKey)</text>
  <text x="678" y="292" class="mono" font-size="10" fill="#aaa">class ... {</text>
  <text x="678" y="306" class="mono" font-size="10" fill="#7ec8e3">  @Id String</text>
  <text x="678" y="320" class="mono" font-size="10" fill="#aaa">    projectCode;</text>

  <text x="670" y="356" font-size="10" fill="#888" font-weight="600">trade-off</text>
  <text x="670" y="372" font-size="10" fill="#aaa">repository ID 타입</text>
  <text x="670" y="386" font-size="10" fill="#aaa">변경. 호출처 모두</text>
  <text x="670" y="400" font-size="10" fill="#aaa">손봐야 함</text>

  <text x="670" y="430" font-size="10" fill="#888" font-weight="600">코드 변경</text>
  <text x="670" y="446" font-size="10" fill="#55c555">중 (2 entity / repo)</text>

  <text x="670" y="475" font-size="10" fill="#888" font-weight="600">검증</text>
  <text x="670" y="491" font-size="10" fill="#aaa">3개 격리 시나리오</text>

  <text x="440" y="528" text-anchor="middle" font-size="11" fill="#444">PALDYN · Mebrix 멀티테넌시 도입기</text>
</svg>
