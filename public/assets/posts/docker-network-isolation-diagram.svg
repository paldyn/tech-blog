<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker 네트워크 격리 구조</text>

  <!-- Network A -->
  <rect x="60" y="72" width="360" height="220" rx="10" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">network-a (172.20.0.0/16)</text>

  <!-- Container A1 -->
  <rect x="80" y="112" width="140" height="60" rx="8" fill="#132030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">web</text>
  <text x="150" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">172.20.0.2</text>
  <text x="150" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">nginx:80</text>

  <!-- Container A2 -->
  <rect x="240" y="112" width="160" height="60" rx="8" fill="#132030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="320" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">api</text>
  <text x="320" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">172.20.0.3</text>
  <text x="320" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">express:3000</text>

  <!-- Arrow within A -->
  <line x1="220" y1="142" x2="238" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="228" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">✓</text>

  <!-- DB in network A -->
  <rect x="80" y="196" width="320" height="60" rx="8" fill="#132030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">db</text>
  <text x="240" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">172.20.0.4 — postgres:5432</text>
  <text x="240" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">network-a 내부에서만 접근</text>

  <!-- Arrow api -> db -->
  <line x1="320" y1="172" x2="320" y2="194" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Network B -->
  <rect x="460" y="72" width="360" height="220" rx="10" fill="#1a100f" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">network-b (172.21.0.0/16)</text>

  <!-- Container B1 -->
  <rect x="480" y="112" width="140" height="60" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="550" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">monitor</text>
  <text x="550" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">172.21.0.2</text>
  <text x="550" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">grafana:3000</text>

  <!-- Container B2 -->
  <rect x="640" y="112" width="160" height="60" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="720" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">metrics</text>
  <text x="720" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">172.21.0.3</text>
  <text x="720" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">prometheus:9090</text>

  <!-- Arrow within B -->
  <line x1="620" y1="142" x2="638" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- network-b internal container -->
  <rect x="480" y="196" width="320" height="60" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">cache</text>
  <text x="640" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">172.21.0.4 — redis:6379</text>
  <text x="640" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">network-b 내부에서만 접근</text>

  <!-- Cross-network blocked -->
  <line x1="420" y1="180" x2="460" y2="180" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4"/>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" font-weight="700" text-anchor="middle">✕</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">네트워크 간</text>
  <text x="440" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">통신 차단</text>

  <!-- Multi-network container (bridge) -->
  <rect x="280" y="330" width="320" height="72" rx="10" fill="#181820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">gateway (멀티 네트워크 컨테이너)</text>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">network-a: 172.20.0.5</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">network-b: 172.21.0.5</text>
  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">두 네트워크 모두 속해 양쪽 통신 가능</text>

  <!-- Arrows to gateway -->
  <line x1="240" y1="292" x2="360" y2="330" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>
  <line x1="640" y1="292" x2="520" y2="330" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>

  <!-- Bottom note -->
  <rect x="60" y="432" width="760" height="60" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">격리 원리</text>
  <text x="440" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">다른 네트워크 컨테이너는 IP·이름 모두 도달 불가 — 브리지 iptables FORWARD 체인이 차단</text>
  <text x="440" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">두 네트워크에 동시 연결된 컨테이너만 라우터 역할 가능</text>
</svg>
