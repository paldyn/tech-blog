<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Transformer Decoder 블록 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">세 개의 서브레이어 — Masked MHA, Cross-Attention, FFN</text>

  <!-- Left: decoder block diagram -->
  <!-- Input (from target embedding) -->
  <rect x="60" y="96" width="280" height="36" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="200" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Target 입력 (이미 생성된 토큰 + PE)</text>

  <!-- Arrow -->
  <line x1="200" y1="132" x2="200" y2="150" stroke="#444" stroke-width="2"/>
  <polygon points="193,150 200,162 207,150" fill="#444"/>

  <!-- Sub-layer 1: Masked MHA -->
  <rect x="80" y="162" width="240" height="54" fill="#1a0d1a" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">① Masked Multi-Head</text>
  <text x="200" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Self-Attention</text>

  <line x1="200" y1="216" x2="200" y2="238" stroke="#444" stroke-width="2"/>
  <polygon points="193,238 200,250 207,238" fill="#444"/>

  <!-- Add &amp; Norm -->
  <rect x="140" y="250" width="120" height="26" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Add &amp; Norm</text>
  <line x1="200" y1="276" x2="200" y2="294" stroke="#444" stroke-width="2"/>
  <polygon points="193,294 200,306 207,294" fill="#444"/>

  <!-- Sub-layer 2: Cross-Attention -->
  <rect x="80" y="306" width="240" height="54" fill="#0a1520" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">② Cross-Attention</text>
  <text x="200" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(Encoder-Decoder Attention)</text>

  <!-- Encoder output arrow into Cross-Attention -->
  <line x1="60" y1="333" x2="80" y2="333" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="40" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">K, V</text>
  <text x="40" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">encoder</text>

  <line x1="200" y1="360" x2="200" y2="378" stroke="#444" stroke-width="2"/>
  <polygon points="193,378 200,390 207,378" fill="#444"/>

  <!-- Add &amp; Norm -->
  <rect x="140" y="390" width="120" height="26" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Add &amp; Norm</text>
  <line x1="200" y1="416" x2="200" y2="434" stroke="#444" stroke-width="2"/>
  <polygon points="193,434 200,446 207,434" fill="#444"/>

  <!-- Sub-layer 3: FFN -->
  <rect x="80" y="446" width="240" height="40" fill="#1a150a" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="200" y="471" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">③ Feed-Forward Network</text>

  <!-- Final Add &amp; Norm -->
  <line x1="200" y1="486" x2="200" y2="504" stroke="#444" stroke-width="2"/>
  <polygon points="193,504 200,516 207,504" fill="#444"/>
  <rect x="140" y="516" width="120" height="16" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Add &amp; Norm</text>

  <!-- Right panel: Cross-Attention detail -->
  <rect x="400" y="96" width="430" height="430" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="615" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Decoder 서브레이어 상세</text>

  <!-- Masked MHA -->
  <text x="416" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">① Masked Self-Attention (인과 마스크)</text>
  <text x="416" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 이미 생성된 토큰만 참조 (미래 차단)</text>
  <text x="416" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 하삼각 마스크로 pos i+1 이후 점수 -∞</text>
  <text x="416" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 학습 시 Teacher Forcing으로 병렬 처리</text>

  <line x1="416" y1="216" x2="818" y2="216" stroke="#1e2433" stroke-width="1"/>

  <!-- Cross-Attention -->
  <text x="416" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">② Cross-Attention (인코더-디코더 연결)</text>
  <text x="416" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· Q  ← Decoder 현재 상태</text>
  <text x="416" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· K, V ← Encoder 최종 출력 (고정)</text>
  <text x="416" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 소스 문장의 어느 단어를 볼지 결정</text>
  <text x="416" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 기계 번역에서 정렬(alignment) 역할</text>

  <line x1="416" y1="320" x2="818" y2="320" stroke="#1e2433" stroke-width="1"/>

  <!-- Auto-regressive generation -->
  <text x="416" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b5cea8">자기 회귀 생성 (Autoregressive)</text>
  <text x="416" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추론 시: 한 번에 한 토큰씩 생성</text>
  <text x="416" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">1. &lt;BOS&gt; → "나"</text>
  <text x="416" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2. &lt;BOS&gt; "나" → "는"</text>
  <text x="416" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">3. &lt;BOS&gt; "나" "는" → "AI"  ···</text>
  <text x="416" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">4. &lt;EOS&gt; 토큰 출력 시 종료</text>

  <line x1="416" y1="442" x2="818" y2="442" stroke="#1e2433" stroke-width="1"/>

  <!-- Teacher forcing note -->
  <text x="416" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Teacher Forcing (학습 시)</text>
  <text x="416" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정답 시퀀스를 디코더에 한 번에 입력해 병렬 학습</text>
  <text x="416" y="498" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Masked Self-Attention이 미래 토큰 누설을 방지</text>
</svg>
