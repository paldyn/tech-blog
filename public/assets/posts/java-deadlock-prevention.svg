<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">교착 상태 예방 전략</text>

  <!-- Strategy 1: Lock Ordering -->
  <rect x="60" y="60" width="370" height="160" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="245" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">전략 1: 락 획득 순서 고정</text>
  <rect x="76" y="94" width="338" height="114" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 항상 Lock A 먼저, Lock B 나중</text>
  <text x="90" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">void</text>
  <text x="120" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> transfer(Account from, Account to) {</text>
  <text x="90" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">    // ID 순서로 락 획득 (순환 방지)</text>
  <text x="90" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">    Account</text>
  <text x="162" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> first = from.id &lt; to.id ? from : to;</text>
  <text x="90" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    synchronized(first) { synchronized(other) {...} }</text>
  <text x="90" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>

  <!-- Strategy 2: tryLock -->
  <rect x="460" y="60" width="370" height="160" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="645" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">전략 2: tryLock 타임아웃</text>
  <rect x="476" y="94" width="338" height="114" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 타임아웃으로 교착 탈출</text>
  <text x="490" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">boolean</text>
  <text x="546" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> a = lockA.tryLock(1, SECONDS);</text>
  <text x="490" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">boolean</text>
  <text x="546" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> b = lockB.tryLock(1, SECONDS);</text>
  <text x="490" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">if</text>
  <text x="510" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> (!a || !b) { </text>
  <text x="490" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    </text>
  <text x="506" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 획득한 락 해제 후 재시도</text>
  <text x="490" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>

  <!-- Strategy 3: Single lock / reduce locking -->
  <rect x="60" y="242" width="370" height="130" rx="8" fill="#1a1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="245" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c44a">전략 3: 락 범위 최소화</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 락 보유 시간을 최대한 짧게</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 락 보유 중 외부 메서드(alien method) 호출 금지</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 중첩 락(nested lock) 사용 최소화</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• 가능하면 스레드 안전 컬렉션으로 대체</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• 불변 객체 활용으로 락 필요성 제거</text>

  <!-- Detection -->
  <rect x="460" y="242" width="370" height="130" rx="8" fill="#111111" stroke="#7777cc" stroke-width="2"/>
  <text x="645" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">교착 상태 감지</text>
  <text x="480" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• jstack: 스레드 덤프로 BLOCKED 순환 확인</text>
  <text x="480" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• ThreadMXBean.findDeadlockedThreads()</text>
  <text x="480" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Java Flight Recorder (JFR)</text>
  <text x="480" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">• VisualVM, Mission Control</text>
  <text x="480" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">교착 자동 해제 없음 — 프로세스 재시작 필요</text>

  <!-- Footer -->
  <rect x="60" y="390" width="760" height="22" rx="4" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">최우선 전략: 락 획득 순서 고정 → tryLock 타임아웃 → 락 범위 최소화</text>
</svg>
