  <text x="137" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">장점</text>
  <text x="137" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">서버 메모리 불필요</text>
  <text x="137" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">수평 확장 용이</text>
  <text x="137" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Edge Runtime 호환</text>
  <text x="137" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">마이크로서비스 친화적</text>

  <rect x="225" y="344" width="155" height="100" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="302" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">단점</text>
  <text x="302" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">강제 로그아웃 어려움</text>
  <text x="302" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">토큰 만료 전 취소 불가</text>
  <text x="302" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">페이로드 크기 제한</text>
  <text x="302" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">탈취 시 만료까지 유효</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="460" stroke="#222" stroke-width="1.5"/>

  <!-- Session flow -->
  <rect x="460" y="100" width="130" height="48" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="525" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">클라이언트</text>
  <text x="525" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">ID/PW 전송</text>

  <line x1="590" y1="124" x2="648" y2="124" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="650" y="100" width="170" height="48" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="735" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">서버 (Auth)</text>
  <text x="735" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">세션 생성 → DB/Redis 저장</text>
  <text x="735" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">세션 ID 쿠키 반환</text>

  <line x1="735" y1="148" x2="735" y2="190" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="650" y="192" width="170" height="48" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="735" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">세션 ID 쿠키 저장</text>
  <text x="735" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">httpOnly + Secure</text>

  <line x1="650" y1="216" x2="592" y2="216" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="460" y="192" width="130" height="48" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="525" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">이후 요청</text>
  <text x="525" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">세션 ID 자동 포함</text>

  <line x1="525" y1="240" x2="525" y2="278" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="460" y="280" width="360" height="48" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">서버에서 DB/Redis 조회로 세션 검증</text>
  <text x="640" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Middleware에서는 세션 ID 존재 여부만 확인</text>

  <!-- Session pros/cons -->
  <rect x="460" y="344" width="165" height="100" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="542" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">장점</text>
  <text x="542" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">즉시 세션 무효화 가능</text>
  <text x="542" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">세밀한 권한 관리</text>
  <text x="542" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">토큰보다 안전</text>
  <text x="542" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">서버 측 완전 제어</text>

  <rect x="635" y="344" width="185" height="100" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="727" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">단점</text>
  <text x="727" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">서버 메모리/Redis 필요</text>
  <text x="727" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">요청마다 DB 조회</text>
  <text x="727" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">수평 확장 시 공유 필요</text>
  <text x="727" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Edge Runtime 미호환</text>

  <text x="440" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Next.js 앱에서는 둘을 혼합하기도 함 — 세션 ID를 암호화 JWT로 저장해 Edge에서 검증</text>
</svg>
