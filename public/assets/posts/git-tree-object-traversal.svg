<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Tree 오브젝트 순회 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">commit → tree → blob 연결 관계</text>

  <!-- Commit box -->
  <rect x="360" y="92" width="160" height="64" fill="#1a0d0d" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">commit</text>
  <text x="440" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">tree: abc123</text>
  <text x="440" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">parent: ...</text>

  <!-- Arrow: commit -> root tree -->
  <line x1="440" y1="156" x2="440" y2="186" stroke="#7777cc" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Root tree box -->
  <rect x="300" y="188" width="280" height="76" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">tree abc123  /</text>
  <text x="316" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  blob 8ab686e  README.md</text>
  <text x="316" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  tree d7c3a9b  src/</text>

  <!-- Arrow: root tree -> blob README -->
  <line x1="360" y1="264" x2="230" y2="310" stroke="#7777cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Blob README -->
  <rect x="60" y="312" width="200" height="54" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">blob 8ab686e</text>
  <text x="160" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">README.md 내용</text>

  <!-- Arrow: root tree -> sub-tree src -->
  <line x1="520" y1="264" x2="620" y2="310" stroke="#7777cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Sub-tree src/ -->
  <rect x="540" y="312" width="280" height="70" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="680" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">tree d7c3a9b  src/</text>
  <text x="556" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  blob f3a2b1c  index.js</text>
  <text x="556" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  blob 9d1e4f2  app.js</text>

  <!-- Arrow: sub-tree -> blob index.js -->
  <line x1="620" y1="382" x2="620" y2="406" stroke="#7777cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="740" y1="382" x2="740" y2="406" stroke="#7777cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Blob index.js, app.js -->
  <rect x="540" y="408" width="160" height="40" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">blob  index.js 내용</text>

  <rect x="720" y="408" width="140" height="40" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="790" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">blob  app.js 내용</text>

  <!-- Note -->
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 tree는 자식을 SHA로만 참조 → 내용이 바뀌면 SHA가 바뀌어 상위 tree도 새 SHA</text>
</svg>
