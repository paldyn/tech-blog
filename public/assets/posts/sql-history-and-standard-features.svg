<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SQL 표준별 주요 기능</text>

  <!-- ── Column 1: 기초 시대 (SQL-86 ~ SQL-92) ── -->
  <rect x="60" y="72" width="213" height="366" rx="8" fill="#0d0d0d" stroke="#333"/>
  <rect x="60" y="72" width="213" height="46" rx="8" fill="#0d1a0d"/>
  <rect x="60" y="100" width="213" height="18" fill="#0d1a0d"/>
  <text x="167" y="99" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">기초 시대</text>
  <text x="167" y="114" text-anchor="middle" font-size="10" fill="#888">SQL-86 · SQL-89 · SQL-92</text>
  <line x1="60" y1="120" x2="273" y2="120" stroke="#1a2a1a" stroke-width="1"/>

  <text x="78" y="142" font-size="12" fill="#55c555">●</text>
  <text x="94" y="142" font-size="12" fill="#e8e8e8">SELECT / FROM / WHERE</text>
  <text x="78" y="162" font-size="12" fill="#55c555">●</text>
  <text x="94" y="162" font-size="12" fill="#e8e8e8">INSERT / UPDATE / DELETE</text>
  <text x="78" y="182" font-size="12" fill="#55c555">●</text>
  <text x="94" y="182" font-size="12" fill="#e8e8e8">CREATE / DROP TABLE</text>
  <text x="78" y="202" font-size="12" fill="#55c555">●</text>
  <text x="94" y="202" font-size="12" fill="#e8e8e8">기본 집계 (COUNT/SUM)</text>
  <text x="78" y="222" font-size="12" fill="#55c555">●</text>
  <text x="94" y="222" font-size="12" fill="#e8e8e8">GROUP BY / ORDER BY</text>
  <text x="78" y="242" font-size="12" fill="#55c555">●</text>
  <text x="94" y="242" font-size="12" fill="#e8e8e8">OUTER JOIN (SQL-92)</text>
  <text x="78" y="262" font-size="12" fill="#55c555">●</text>
  <text x="94" y="262" font-size="12" fill="#e8e8e8">CASE 표현식 (SQL-92)</text>
  <text x="78" y="282" font-size="12" fill="#55c555">●</text>
  <text x="94" y="282" font-size="12" fill="#e8e8e8">UNION / INTERSECT</text>
  <text x="78" y="302" font-size="12" fill="#55c555">●</text>
  <text x="94" y="302" font-size="12" fill="#e8e8e8">서브쿼리 (IN, EXISTS)</text>
  <text x="78" y="326" font-size="11" fill="#555">현재 SQL의 기본 문법은</text>
  <text x="78" y="342" font-size="11" fill="#555">대부분 SQL-92에서 확정</text>
  <text x="78" y="358" font-size="11" fill="#555">"SQL92 호환" = 표준 기본기</text>
  <text x="78" y="376" font-size="11" fill="#555">JIS X 3005로 일본 JIS 채택</text>
  <text x="78" y="410" font-size="10" fill="#444">표준 수준: Entry · Intermediate · Full</text>
  <text x="78" y="426" font-size="10" fill="#444">실제 구현: 대부분 Entry 수준만</text>

  <!-- ── Column 2: 확장 시대 (SQL:1999 ~ SQL:2008) ── -->
  <rect x="333" y="72" width="213" height="366" rx="8" fill="#0d0d0d" stroke="#333"/>
  <rect x="333" y="72" width="213" height="46" rx="8" fill="#0a0a1a"/>
  <rect x="333" y="100" width="213" height="18" fill="#0a0a1a"/>
  <text x="440" y="99" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">확장 시대</text>
  <text x="440" y="114" text-anchor="middle" font-size="10" fill="#888">SQL:1999 · SQL:2003 · SQL:2008</text>
  <line x1="333" y1="120" x2="546" y2="120" stroke="#1a1a2a" stroke-width="1"/>

  <text x="351" y="142" font-size="12" fill="#7ec8e3">●</text>
  <text x="367" y="142" font-size="12" fill="#e8e8e8">재귀 CTE (WITH RECURSIVE)</text>
  <text x="351" y="162" font-size="12" fill="#7ec8e3">●</text>
  <text x="367" y="162" font-size="12" fill="#e8e8e8">트리거 (TRIGGER)</text>
  <text x="351" y="182" font-size="12" fill="#7ec8e3">●</text>
  <text x="367" y="182" font-size="12" fill="#e8e8e8">ROLLUP / CUBE</text>
  <text x="351" y="202" font-size="12" fill="#7ec8e3">●</text>
  <text x="367" y="202" font-size="12" fill="#e8e8e8">ROW_NUMBER / RANK</text>
  <text x="351" y="222" font-size="12" fill="#7ec8e3">●</text>
  <text x="367" y="222" font-size="12" fill="#e8e8e8">OVER (PARTITION BY …)</text>
  <text x="351" y="242" font-size="12" fill="#7ec8e3">●</text>
  <text x="367" y="242" font-size="12" fill="#e8e8e8">MERGE (UPSERT)</text>
  <text x="351" y="262" font-size="12" fill="#7ec8e3">●</text>
  <text x="367" y="262" font-size="12" fill="#e8e8e8">생성 컬럼 (GENERATED)</text>
  <text x="351" y="282" font-size="12" fill="#7ec8e3">●</text>
  <text x="367" y="282" font-size="12" fill="#e8e8e8">TRUNCATE TABLE</text>
  <text x="351" y="302" font-size="12" fill="#7ec8e3">●</text>
  <text x="367" y="302" font-size="12" fill="#e8e8e8">FETCH FIRST n ROWS</text>
  <text x="351" y="326" font-size="11" fill="#555">SQL:2003이 가장 많이</text>
  <text x="351" y="342" font-size="11" fill="#555">인용되는 실무 기준 표준</text>
  <text x="351" y="358" font-size="11" fill="#555">윈도우 함수 = 분석 쿼리의</text>
  <text x="351" y="374" font-size="11" fill="#555">핵심으로 자리잡음</text>
  <text x="351" y="410" font-size="10" fill="#444">ISO/IEC 9075 (총 14개 파트)</text>
  <text x="351" y="426" font-size="10" fill="#444">기술 보고서(TR) 포함</text>

  <!-- ── Column 3: 현대 (SQL:2011 ~ SQL:2023) ── -->
  <rect x="606" y="72" width="213" height="366" rx="8" fill="#0d0d0d" stroke="#333"/>
  <rect x="606" y="72" width="213" height="46" rx="8" fill="#1a1a0a"/>
  <rect x="606" y="100" width="213" height="18" fill="#1a1a0a"/>
  <text x="713" y="99" text-anchor="middle" font-size="13" font-weight="600" fill="#e8c555">현대 표준</text>
  <text x="713" y="114" text-anchor="middle" font-size="10" fill="#888">SQL:2011 · SQL:2016 · SQL:2023</text>
  <line x1="606" y1="120" x2="819" y2="120" stroke="#2a2a1a" stroke-width="1"/>

  <text x="624" y="142" font-size="12" fill="#e8c555">●</text>
  <text x="640" y="142" font-size="12" fill="#e8e8e8">임시 테이블 (Temporal)</text>
  <text x="624" y="162" font-size="12" fill="#e8c555">●</text>
  <text x="640" y="162" font-size="12" fill="#e8e8e8">PERIOD FOR 시스템 버저닝</text>
  <text x="624" y="182" font-size="12" fill="#e8c555">●</text>
  <text x="640" y="182" font-size="12" fill="#e8e8e8">JSON_VALUE / JSON_QUERY</text>
  <text x="624" y="202" font-size="12" fill="#e8c555">●</text>
  <text x="640" y="202" font-size="12" fill="#e8e8e8">JSON_TABLE 함수</text>
  <text x="624" y="222" font-size="12" fill="#e8c555">●</text>
  <text x="640" y="222" font-size="12" fill="#e8e8e8">속성 그래프 쿼리 (GQL)</text>
  <text x="624" y="242" font-size="12" fill="#e8c555">●</text>
  <text x="640" y="242" font-size="12" fill="#e8e8e8">UUID 생성 함수</text>
  <text x="624" y="262" font-size="12" fill="#e8c555">●</text>
  <text x="640" y="262" font-size="12" fill="#e8e8e8">LOG(base, x) 표준화</text>
  <text x="624" y="282" font-size="12" fill="#e8c555">●</text>
  <text x="640" y="282" font-size="12" fill="#e8e8e8">LISTAGG (문자열 집계)</text>
  <text x="624" y="302" font-size="12" fill="#e8c555">●</text>
  <text x="640" y="302" font-size="12" fill="#e8e8e8">TRIM_ARRAY</text>
  <text x="624" y="326" font-size="11" fill="#555">DBMS 지원이 빠르지 않음</text>
  <text x="624" y="342" font-size="11" fill="#555">SQL:2023 = 최신 표준</text>
  <text x="624" y="358" font-size="11" fill="#555">PostgreSQL 16+, MySQL 8.0+</text>
  <text x="624" y="374" font-size="11" fill="#555">점진적으로 지원 중</text>
  <text x="624" y="410" font-size="10" fill="#444">참고: ISO/IEC 9075-1:2023</text>
  <text x="624" y="426" font-size="10" fill="#444">공개 문서는 무료 없음 (유료)</text>

  <!-- Footer -->
  <text x="440" y="458" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 1</text>
</svg>
