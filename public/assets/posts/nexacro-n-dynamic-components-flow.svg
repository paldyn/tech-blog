<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">동적 컴포넌트 생성 흐름</text>

  <!-- Step 1 -->
  <rect x="60" y="76" width="220" height="76" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="103" fill="#7ec8e3" font-size="14" font-weight="600" text-anchor="middle">① 컴포넌트 생성</text>
  <text x="170" y="123" fill="#e8e8e8" font-size="12" text-anchor="middle">createComponent(sType)</text>
  <text x="170" y="141" fill="#888" font-size="12" text-anchor="middle">반환: 미부착 컴포넌트</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="114" x2="314" y2="114" stroke="#374151" stroke-width="2"/>
  <polygon points="320,114 308,108 308,120" fill="#374151"/>

  <!-- Step 2 -->
  <rect x="320" y="76" width="220" height="76" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="430" y="103" fill="#55c555" font-size="14" font-weight="600" text-anchor="middle">② 속성 설정</text>
  <text x="430" y="123" fill="#e8e8e8" font-size="12" text-anchor="middle">obj.set_left / top / width</text>
  <text x="430" y="141" fill="#888" font-size="12" text-anchor="middle">value, style, bindcolumn</text>

  <!-- Arrow 2→3 -->
  <line x1="540" y1="114" x2="574" y2="114" stroke="#374151" stroke-width="2"/>
  <polygon points="580,114 568,108 568,120" fill="#374151"/>

  <!-- Step 3 -->
  <rect x="580" y="76" width="240" height="76" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="103" fill="#7777cc" font-size="14" font-weight="600" text-anchor="middle">③ 컨테이너에 부착</text>
  <text x="700" y="123" fill="#e8e8e8" font-size="12" text-anchor="middle">div.addChild(sID, obj)</text>
  <text x="700" y="141" fill="#888" font-size="12" text-anchor="middle">화면에 즉시 표시</text>

  <!-- Separator -->
  <line x1="60" y1="175" x2="820" y2="175" stroke="#1e2433" stroke-width="1"/>

  <!-- createComponent types -->
  <text x="440" y="204" fill="#e8e8e8" font-size="16" font-weight="600" text-anchor="middle">생성 가능한 컴포넌트 유형</text>

  <rect x="60" y="220" width="230" height="76" rx="6" fill="#111827" stroke="#374151"/>
  <text x="175" y="244" fill="#7ec8e3" font-size="13" font-weight="600" text-anchor="middle">입력 컴포넌트</text>
  <text x="175" y="264" fill="#e8e8e8" font-size="12" text-anchor="middle">Edit, MaskEdit</text>
  <text x="175" y="282" fill="#888" font-size="12" text-anchor="middle">Combo, Radio</text>

  <rect x="325" y="220" width="230" height="76" rx="6" fill="#111827" stroke="#374151"/>
  <text x="440" y="244" fill="#55c555" font-size="13" font-weight="600" text-anchor="middle">표시 컴포넌트</text>
  <text x="440" y="264" fill="#e8e8e8" font-size="12" text-anchor="middle">Static, Button</text>
  <text x="440" y="282" fill="#888" font-size="12" text-anchor="middle">ImageViewer, Chart</text>

  <rect x="590" y="220" width="230" height="76" rx="6" fill="#111827" stroke="#374151"/>
  <text x="705" y="244" fill="#7777cc" font-size="13" font-weight="600" text-anchor="middle">컨테이너</text>
  <text x="705" y="264" fill="#e8e8e8" font-size="12" text-anchor="middle">Div, Tab</text>
  <text x="705" y="282" fill="#888" font-size="12" text-anchor="middle">Grid (일부 제한)</text>

  <!-- Use cases -->
  <rect x="60" y="320" width="760" height="116" rx="8" fill="#111827" stroke="#374151"/>
  <text x="80" y="346" fill="#e8e8e8" font-size="14" font-weight="600">동적 생성이 필요한 전형적 패턴</text>
  <text x="80" y="368" fill="#7ec8e3" font-size="12">• 서버 메타데이터 기반 입력 폼 — 필드 개수·유형이 런타임에 결정</text>
  <text x="80" y="388" fill="#55c555" font-size="12">• 조건부 컴포넌트 — 권한·설정에 따라 버튼·탭 표시/숨김</text>
  <text x="80" y="408" fill="#7777cc" font-size="12">• 대시보드 위젯 — 사용자 맞춤 레이아웃 구성</text>
</svg>
