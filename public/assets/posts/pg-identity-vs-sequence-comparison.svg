<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">IDENTITY vs SEQUENCE vs serial 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">자동 증가 키 생성의 세 가지 방법</text>

  <!-- Header row -->
  <rect x="60" y="100" width="200" height="36" rx="4" fill="#1a1a1a" stroke="#444"/>
  <text x="160" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">항목</text>

  <rect x="270" y="100" width="180" height="36" rx="4" fill="#0d1520" stroke="#7ec8e3"/>
  <text x="360" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">GENERATED ALWAYS</text>

  <rect x="460" y="100" width="180" height="36" rx="4" fill="#0d1520" stroke="#55c555"/>
  <text x="550" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">GENERATED BY DEFAULT</text>

  <rect x="650" y="100" width="170" height="36" rx="4" fill="#1a1a0d" stroke="#e8c84a"/>
  <text x="735" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a" text-anchor="middle">serial (구형)</text>

  <!-- Rows -->
  <!-- Row 1: SQL 표준 -->
  <rect x="60" y="146" width="200" height="34" rx="0" fill="#111" stroke="#222"/>
  <text x="160" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SQL 표준</text>
  <rect x="270" y="146" width="180" height="34" rx="0" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="360" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">✓ ISO SQL:2003</text>
  <rect x="460" y="146" width="180" height="34" rx="0" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="550" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">✓ ISO SQL:2003</text>
  <rect x="650" y="146" width="170" height="34" rx="0" fill="#1a1a0d" stroke="#2a2a1a"/>
  <text x="735" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">✗ PG 고유</text>

  <!-- Row 2: 직접 INSERT 허용 -->
  <rect x="60" y="180" width="200" height="34" rx="0" fill="#0e0e0e" stroke="#222"/>
  <text x="160" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">직접 값 INSERT</text>
  <rect x="270" y="180" width="180" height="34" rx="0" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="360" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">✗ 오류 발생</text>
  <rect x="460" y="180" width="180" height="34" rx="0" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="550" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">✓ 허용</text>
  <rect x="650" y="180" width="170" height="34" rx="0" fill="#1a1a0d" stroke="#2a2a1a"/>
  <text x="735" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">✓ 허용</text>

  <!-- Row 3: OVERRIDING -->
  <rect x="60" y="214" width="200" height="34" rx="0" fill="#111" stroke="#222"/>
  <text x="160" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">강제 override</text>
  <rect x="270" y="214" width="180" height="34" rx="0" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="360" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">OVERRIDING SYSTEM</text>
  <rect x="460" y="214" width="180" height="34" rx="0" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="550" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">OVERRIDING USER</text>
  <rect x="650" y="214" width="170" height="34" rx="0" fill="#1a1a0d" stroke="#2a2a1a"/>
  <text x="735" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">없음</text>

  <!-- Row 4: DROP TABLE -->
  <rect x="60" y="248" width="200" height="34" rx="0" fill="#0e0e0e" stroke="#222"/>
  <text x="160" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">테이블 DROP 시</text>
  <rect x="270" y="248" width="180" height="34" rx="0" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="360" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">시퀀스 함께 삭제</text>
  <rect x="460" y="248" width="180" height="34" rx="0" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="550" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">시퀀스 함께 삭제</text>
  <rect x="650" y="248" width="170" height="34" rx="0" fill="#1a1a0d" stroke="#2a2a1a"/>
  <text x="735" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c84a" text-anchor="middle">시퀀스 남음</text>

  <!-- Row 5: 권장 -->
  <rect x="60" y="282" width="200" height="34" rx="0" fill="#111" stroke="#222"/>
  <text x="160" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">권장 여부</text>
  <rect x="270" y="282" width="180" height="34" rx="0" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="360" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">✓ 권장 (엄격)</text>
  <rect x="460" y="282" width="180" height="34" rx="0" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="550" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">✓ 권장 (유연)</text>
  <rect x="650" y="282" width="170" height="34" rx="0" fill="#1a1a0d" stroke="#2a2a1a"/>
  <text x="735" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">비권장 (레거시)</text>

  <!-- Sequence note -->
  <rect x="60" y="338" width="760" height="120" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">독립 SEQUENCE 사용 사례</text>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 여러 테이블이 같은 시퀀스를 공유 (예: 이벤트 ID 통합 채번)</text>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 채번 후 다른 로직(파티션 결정 등)에 활용</text>
  <text x="80" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• setval()로 특정 값부터 시작 (마이그레이션 시)</text>
  <text x="80" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 채번 간격 조절 (INCREMENT BY, CACHE)</text>
</svg>
