<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">3-Way Merge 원리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">공통 조상(Base)을 기준으로 두 브랜치를 합친다</text>

  <!-- Base commit -->
  <circle cx="160" cy="180" r="30" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3">C2</text>
  <text x="160" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공통 조상</text>

  <!-- main branch commits -->
  <circle cx="380" cy="110" r="30" fill="#1a2233" stroke="#7777cc" stroke-width="2"/>
  <text x="380" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc">C3</text>

  <circle cx="560" cy="110" r="30" fill="#1a2233" stroke="#7777cc" stroke-width="2"/>
  <text x="560" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc">C4</text>

  <!-- feature branch commits -->
  <circle cx="380" cy="260" r="30" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="380" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">C5</text>

  <circle cx="560" cy="260" r="30" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="560" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">C6</text>

  <!-- Merge commit -->
  <circle cx="750" cy="180" r="34" fill="#1a1a2a" stroke="#e8e8e8" stroke-width="2.5"/>
  <text x="750" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">M7</text>
  <text x="750" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">merge</text>

  <!-- Arrows from base to branches -->
  <line x1="188" y1="160" x2="348" y2="120" stroke="#555" stroke-width="2"/>
  <polygon points="346,113 356,118 348,128" fill="#555"/>

  <line x1="188" y1="200" x2="348" y2="250" stroke="#555" stroke-width="2"/>
  <polygon points="346,259 356,254 348,244" fill="#555"/>

  <!-- Arrows within branches -->
  <line x1="410" y1="110" x2="528" y2="110" stroke="#7777cc" stroke-width="2"/>
  <polygon points="528,105 538,110 528,115" fill="#7777cc"/>

  <line x1="410" y1="260" x2="528" y2="260" stroke="#55c555" stroke-width="2"/>
  <polygon points="528,255 538,260 528,265" fill="#55c555"/>

  <!-- Arrows from branch tips to merge -->
  <line x1="590" y1="120" x2="716" y2="165" stroke="#7777cc" stroke-width="2"/>
  <polygon points="710,161 720,164 714,174" fill="#7777cc"/>

  <line x1="590" y1="250" x2="716" y2="196" stroke="#55c555" stroke-width="2"/>
  <polygon points="710,199 720,196 714,206" fill="#55c555"/>

  <!-- Branch labels -->
  <rect x="328" y="60" width="104" height="26" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="380" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">main</text>

  <rect x="318" y="294" width="124" height="26" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">feature</text>

  <!-- Three pointer labels -->
  <text x="160" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">① Base (공통 조상)</text>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">② Ours (HEAD)</text>
  <text x="720" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">③ Theirs</text>

  <!-- Divider line -->
  <line x1="60" y1="345" x2="820" y2="345" stroke="#222" stroke-width="1"/>

  <text x="440" y="415" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Git은 세 스냅샷을 비교하여 자동으로 변경사항을 합친다</text>
</svg>
