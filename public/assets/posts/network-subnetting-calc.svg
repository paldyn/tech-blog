<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">서브네팅 계산 과정</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">192.168.1.0/24 를 4개 서브넷으로 분할 (/26)</text>

  <!-- original block -->
  <rect x="60" y="90" width="760" height="44" rx="6" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">원본 네트워크: 192.168.1.0/24 (256개 주소, 호스트 254개)</text>
  <text x="440" y="126" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">/24 → /26 (2비트 추가) = 4개 서브넷, 각 64개 주소 (호스트 62개)</text>

  <!-- 4 subnets -->
  <rect x="60" y="150" width="175" height="80" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="147" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">서브넷 1</text>
  <text x="147" y="192" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">192.168.1.0/26</text>
  <text x="147" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">.0 ~ .63</text>
  <text x="147" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">호스트 .1~.62</text>

  <rect x="255" y="150" width="175" height="80" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="342" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">서브넷 2</text>
  <text x="342" y="192" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">192.168.1.64/26</text>
  <text x="342" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">.64 ~ .127</text>
  <text x="342" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">호스트 .65~.126</text>

  <rect x="450" y="150" width="175" height="80" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="537" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">서브넷 3</text>
  <text x="537" y="192" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">192.168.1.128/26</text>
  <text x="537" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">.128 ~ .191</text>
  <text x="537" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">호스트 .129~.190</text>

  <rect x="645" y="150" width="175" height="80" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="732" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">서브넷 4</text>
  <text x="732" y="192" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">192.168.1.192/26</text>
  <text x="732" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">.192 ~ .255</text>
  <text x="732" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">호스트 .193~.254</text>

  <!-- formula box -->
  <rect x="60" y="252" width="760" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">서브네팅 핵심 공식</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">서브넷 수          </text>
  <text x="290" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">= 2^(빌린 비트 수)</text>
  <text x="80" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">호스트 수/서브넷    </text>
  <text x="290" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">= 2^(호스트 비트) - 2</text>
  <text x="80" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">블록 크기            </text>
  <text x="290" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">= 256 - 마스크 옥텟값</text>
  <text x="80" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">/26 예시            </text>
  <text x="290" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">: 블록=64, 서브넷=4, 호스트=62</text>
  <text x="80" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">마스크 255.255.255.192</text>
  <text x="370" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">= /26</text>
</svg>
