<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" marketHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Credential Helper 동작 흐름</text>

  <!-- git push -->
  <rect x="60" y="80" width="160" height="56" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">git push</text>
  <text x="140" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인증 필요</text>

  <line x1="220" y1="108" x2="278" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Credential Helper -->
  <rect x="280" y="80" width="200" height="56" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="380" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Credential Helper</text>
  <text x="380" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">get 명령 호출</text>

  <!-- Cache hit -->
  <rect x="540" y="54" width="280" height="56" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="81" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">캐시 HIT</text>
  <text x="680" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">저장된 credential 반환</text>

  <!-- Cache miss -->
  <rect x="540" y="126" width="280" height="56" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="680" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">캐시 MISS</text>
  <text x="680" y="171" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자에게 입력 요청</text>

  <line x1="480" y1="95" x2="538" y2="82" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="121" x2="538" y2="149" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- store arrow -->
  <line x1="680" y1="182" x2="680" y2="222" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="700" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">store</text>

  <rect x="540" y="224" width="280" height="56" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">credential 저장</text>
  <text x="680" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Keychain / cache / file</text>

  <!-- erase note -->
  <rect x="60" y="300" width="760" height="56" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">credential 삭제 (erase)</text>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">git credential reject  →  helper가 저장된 항목 제거 (PAT 만료·변경 시 사용)</text>
</svg>
