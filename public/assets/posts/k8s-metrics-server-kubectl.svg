<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">kubectl top — 리소스 사용량 조회</text>

  <!-- kubectl top nodes -->
  <rect x="60" y="70" width="360" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">$ kubectl top nodes</text>
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">NAME          CPU(cores)  CPU%  MEMORY  MEM%</text>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">node-1        523m        13%   3.2Gi   42%</text>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">node-2        198m        5%    1.8Gi   23%</text>
  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600" xml:space="preserve">node-3        3412m       88%   6.9Gi   90%</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">                                           </text>
  <text x="76" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" xml:space="preserve">  node-3 CPU 88%, Memory 90% — 과부하 확인!</text>
  <text x="76" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" xml:space="preserve">  cordon 또는 Pod 재배치 검토 필요</text>

  <!-- kubectl top pods -->
  <rect x="460" y="70" width="380" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">$ kubectl top pods -n production --sort-by=memory</text>
  <text x="476" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">NAME                   CPU   MEMORY</text>
  <text x="476" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" font-weight="600" xml:space="preserve">elasticsearch-0        200m  4.2Gi</text>
  <text x="476" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">myapp-5d4f6b-xxxx      45m   312Mi</text>
  <text x="476" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">myapp-5d4f6b-yyyy      38m   298Mi</text>
  <text x="476" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">redis-master-0         12m   128Mi</text>
  <text x="476" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">...</text>
  <text x="476" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" xml:space="preserve">  --sort-by=cpu 또는 --sort-by=memory</text>
  <text x="476" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" xml:space="preserve">  --containers: 컨테이너별 상세 조회</text>

  <!-- commands reference -->
  <rect x="60" y="258" width="760" height="120" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 kubectl top 옵션</text>
  <rect x="76" y="294" width="710" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl top pods --all-namespaces          </text>
  <text x="92" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">                        # 전체 네임스페이스</text>
  <text x="92" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl top pods --containers              </text>
  <text x="92" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">                        # 컨테이너별 분리</text>
  <text x="92" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl top pod myapp-xxx --containers     </text>
  <text x="92" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">                        # 단일 Pod</text>
  <text x="92" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"> </text>
  <text x="92" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" xml:space="preserve">  ⚠ Metrics Server가 없으면 "error: Metrics API not available" 오류 발생</text>
</svg>
