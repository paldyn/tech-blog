<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컨트롤러 조정 루프 (Reconcile Loop)</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Observe → Analyze → Act — 끊임없이 반복</text>

  <!-- Observe -->
  <rect x="60" y="110" width="200" height="90" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">① Observe</text>
  <text x="160" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">API Server Watch</text>
  <text x="160" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">현재 상태 읽기</text>
  <text x="160" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Actual State</text>

  <line x1="262" y1="155" x2="300" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Analyze -->
  <rect x="302" y="110" width="200" height="90" rx="10" fill="#1a1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="402" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">② Analyze</text>
  <text x="402" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Desired vs Actual</text>
  <text x="402" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">차이(diff) 계산</text>
  <text x="402" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">Desired State</text>

  <line x1="504" y1="155" x2="542" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Act -->
  <rect x="544" y="110" width="200" height="90" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="644" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">③ Act</text>
  <text x="644" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">차이 해소 작업</text>
  <text x="644" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">API Server에 요청</text>
  <text x="644" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Create / Update / Delete</text>

  <!-- Back arrow -->
  <path d="M 746 155 C 820 155 820 380 440 380 C 60 380 60 280 60 200" stroke="#7ec8e3" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="760" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">다시 Watch</text>

  <!-- Example: ReplicaSet Controller -->
  <rect x="60" y="240" width="760" height="190" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">실전 예시: ReplicaSet Controller</text>

  <rect x="80" y="280" width="200" height="130" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Desired State</text>
  <text x="180" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">replicas: 3</text>
  <text x="180" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">selector: app=myapp</text>
  <text x="180" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">항상 3개 파드 유지</text>
  <text x="180" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">etcd에 선언된 상태</text>
  <text x="180" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">spec.replicas</text>

  <rect x="300" y="280" width="200" height="130" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="400" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Actual State</text>
  <text x="400" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">현재 실행 중: 2개</text>
  <text x="400" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">myapp-abc: Running</text>
  <text x="400" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">myapp-def: Running</text>
  <text x="400" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">1개 부족!</text>
  <text x="400" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">실제 파드 수</text>

  <rect x="520" y="280" width="280" height="130" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Act: 파드 1개 생성</text>
  <text x="660" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">API Server에 Pod 생성 요청</text>
  <text x="660" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ Scheduler가 노드 배치</text>
  <text x="660" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ kubelet이 컨테이너 시작</text>
  <text x="660" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ 다시 3개로 복구 완료</text>
  <text x="660" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">Self-healing 핵심 메커니즘</text>
</svg>
