<svg width="880" height="460" viewBox="0 0 880 460"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">LLM의 본질: 규모가 만든 창발적 능력</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">파라미터 수 × 데이터 × 컴퓨팅 → 질적 전환</text>

  <!-- Scale axis -->
  <line x1="60" y1="140" x2="820" y2="140" stroke="#333" stroke-width="1.5"/>
  <!-- Arrow at end -->
  <polygon points="820,140 806,134 806,146" fill="#333"/>
  <text x="830" y="144" fill="#888" font-size="12">규모</text>

  <!-- Size markers on axis -->
  <line x1="100" y1="136" x2="100" y2="144" stroke="#555" stroke-width="1"/>
  <text x="100" y="160" text-anchor="middle" fill="#888" font-size="11">100M</text>

  <line x1="280" y1="136" x2="280" y2="144" stroke="#555" stroke-width="1"/>
  <text x="280" y="160" text-anchor="middle" fill="#888" font-size="11">1B</text>

  <line x1="460" y1="136" x2="460" y2="144" stroke="#555" stroke-width="1"/>
  <text x="460" y="160" text-anchor="middle" fill="#888" font-size="11">10B</text>

  <line x1="640" y1="136" x2="640" y2="144" stroke="#555" stroke-width="1"/>
  <text x="640" y="160" text-anchor="middle" fill="#888" font-size="11">100B</text>

  <line x1="780" y1="136" x2="780" y2="144" stroke="#555" stroke-width="1"/>
  <text x="780" y="160" text-anchor="middle" fill="#888" font-size="11">1T+</text>

  <!-- Model capabilities bubbles -->
  <!-- Small models -->
  <circle cx="100" cy="140" r="18" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="100" y="110" text-anchor="middle" fill="#7777cc" font-size="11" font-weight="600">GPT-2</text>
  <text x="100" y="122" text-anchor="middle" fill="#888" font-size="10">텍스트 완성</text>

  <!-- Medium models -->
  <circle cx="280" cy="140" r="26" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="280" y="105" text-anchor="middle" fill="#55c555" font-size="11" font-weight="600">GPT-3 (175B)</text>
  <text x="280" y="117" text-anchor="middle" fill="#888" font-size="10">Few-shot 학습</text>
  <text x="280" y="129" text-anchor="middle" fill="#888" font-size="10">번역·요약</text>

  <!-- Large models -->
  <circle cx="460" cy="140" r="36" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="460" y="92" text-anchor="middle" fill="#7ec8e3" font-size="11" font-weight="600">GPT-4 계열</text>
  <text x="460" y="106" text-anchor="middle" fill="#888" font-size="10">추론·코딩</text>
  <text x="460" y="118" text-anchor="middle" fill="#888" font-size="10">수학 문제</text>
  <text x="460" y="130" text-anchor="middle" fill="#888" font-size="10">전문가 수준</text>

  <!-- Frontier models -->
  <circle cx="640" cy="140" r="44" fill="#2e1a0a" stroke="#e8a030" stroke-width="2"/>
  <text x="640" y="82" text-anchor="middle" fill="#e8a030" font-size="11" font-weight="600">Claude / Gemini</text>
  <text x="640" y="96" text-anchor="middle" fill="#888" font-size="10">멀티모달</text>
  <text x="640" y="108" text-anchor="middle" fill="#888" font-size="10">장문 이해</text>
  <text x="640" y="120" text-anchor="middle" fill="#888" font-size="10">에이전트</text>
  <text x="640" y="132" text-anchor="middle" fill="#888" font-size="10">도구 사용</text>

  <!-- Emergent abilities section -->
  <text x="440" y="210" text-anchor="middle" fill="#e8e8e8" font-size="16" font-weight="600">창발적 능력 (Emergent Abilities)</text>
  <text x="440" y="228" text-anchor="middle" fill="#888" font-size="12">특정 규모를 넘어서면 갑자기 나타나는 능력들</text>

  <!-- Emergent ability boxes -->
  <rect x="40" y="244" width="180" height="80" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="266" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">Chain-of-Thought</text>
  <text x="130" y="284" text-anchor="middle" fill="#888" font-size="11">단계별 추론</text>
  <text x="130" y="300" text-anchor="middle" fill="#888" font-size="11">~100B 이상</text>
  <text x="130" y="316" text-anchor="middle" fill="#888" font-size="11">에서 급격히 향상</text>

  <rect x="240" y="244" width="180" height="80" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="330" y="266" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">In-Context 학습</text>
  <text x="330" y="284" text-anchor="middle" fill="#888" font-size="11">몇 개 예제만으로</text>
  <text x="330" y="300" text-anchor="middle" fill="#888" font-size="11">새 태스크 적응</text>
  <text x="330" y="316" text-anchor="middle" fill="#888" font-size="11">파인튜닝 불필요</text>

  <rect x="440" y="244" width="180" height="80" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="530" y="266" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">코드 생성</text>
  <text x="530" y="284" text-anchor="middle" fill="#888" font-size="11">자연어 → 실행 코드</text>
  <text x="530" y="300" text-anchor="middle" fill="#888" font-size="11">디버깅·리팩터링</text>
  <text x="530" y="316" text-anchor="middle" fill="#888" font-size="11">테스트 작성</text>

  <rect x="640" y="244" width="200" height="80" rx="8" fill="#2a1a0a" stroke="#e8a030" stroke-width="1"/>
  <text x="740" y="266" text-anchor="middle" fill="#e8a030" font-size="13" font-weight="600">지식 활용·통합</text>
  <text x="740" y="284" text-anchor="middle" fill="#888" font-size="11">여러 도메인 지식 결합</text>
  <text x="740" y="300" text-anchor="middle" fill="#888" font-size="11">유추·일반화</text>
  <text x="740" y="316" text-anchor="middle" fill="#888" font-size="11">전문가 수준 질의응답</text>

  <!-- LLM definition box -->
  <rect x="60" y="348" width="760" height="84" rx="8" fill="#0a0f14" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="370" text-anchor="middle" fill="#7ec8e3" font-size="15" font-weight="700">LLM이란?</text>
  <text x="440" y="392" text-anchor="middle" fill="#e8e8e8" font-size="13">수백억~수조 개의 파라미터를 가진 Transformer 기반 언어 모델</text>
  <text x="440" y="410" text-anchor="middle" fill="#888" font-size="12">방대한 텍스트 코퍼스의 사전학습 + 인간 피드백 기반 미세조정 → 범용 언어 이해·생성 능력</text>
  <text x="440" y="428" text-anchor="middle" fill="#888" font-size="12">GPT-4 / Claude / Gemini / LLaMA / Qwen / Mistral / HyperCLOVA X ...</text>
</svg>
