<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">불변 객체의 연산 — 매번 새 객체</text>

  <!-- Original object -->
  <rect x="60" y="92" width="200" height="64" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">today</text>
  <text x="160" y="140" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">2026-06-12</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="124" x2="336" y2="124" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="300" y="80" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">plusMonths(2)</text>

  <!-- New object 1 -->
  <rect x="340" y="92" width="200" height="64" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">새 객체 ①</text>
  <text x="440" y="140" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">2026-08-12</text>

  <!-- Arrow 2 -->
  <line x1="540" y1="124" x2="616" y2="124" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="580" y="80" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">withDayOfMonth(1)</text>

  <!-- New object 2 -->
  <rect x="620" y="92" width="200" height="64" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">새 객체 ②</text>
  <text x="720" y="140" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">2026-08-01</text>

  <!-- Note under original -->
  <text x="160" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">원본은 그대로 2026-06-12</text>

  <!-- Common mistake -->
  <rect x="60" y="222" width="360" height="170" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">흔한 실수 — 반환값 버리기</text>
  <rect x="80" y="266" width="320" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">date.plusDays(<tspan fill="#b5cea8">1</tspan>);</text>
  <text x="94" y="311" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 반환값 무시 — date는</text>
  <text x="94" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 그대로! 아무 일도 없음</text>
  <text x="240" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">연산 결과는 반드시 변수에 다시 받아야 한다</text>

  <!-- Correct usage -->
  <rect x="460" y="222" width="360" height="170" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">올바른 사용 — 결과를 받기</text>
  <rect x="480" y="266" width="320" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="494" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">LocalDate next =</text>
  <text x="494" y="311" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    date.plusDays(<tspan fill="#b5cea8">1</tspan>);</text>
  <text x="494" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 새 객체를 변수에 할당</text>
  <text x="640" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">불변이라 스레드 안전 + 방어적 복사 불필요</text>
</svg>
