<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">href prop 형식</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">문자열과 객체 형식 모두 지원</text>

  <!-- String href -->
  <rect x="60" y="90" width="360" height="260" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">문자열 형식</text>
  <rect x="76" y="122" width="328" height="212" rx="4" fill="#000000" stroke="#2a3a5e" stroke-width="1"/>
  <text x="92" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 정적 경로</text>
  <text x="92" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">&lt;Link href=<tspan fill="#ce9178">"/about"</tspan>&gt;</text>
  <text x="92" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 동적 경로</text>
  <text x="92" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">&lt;Link href=<tspan fill="#ce9178">{`/blog/${slug}`}</tspan>&gt;</text>
  <text x="92" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 쿼리 포함</text>
  <text x="92" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">&lt;Link href=<tspan fill="#ce9178">"/search?q=next"</tspan>&gt;</text>
  <text x="92" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 해시 포함</text>
  <text x="92" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">&lt;Link href=<tspan fill="#ce9178">"/docs#install"</tspan>&gt;</text>
  <text x="92" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 외부 링크</text>
  <text x="92" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">&lt;Link href=<tspan fill="#ce9178">"https://..."</tspan>&gt;</text>

  <!-- Object href -->
  <rect x="460" y="90" width="360" height="260" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">객체 형식</text>
  <rect x="476" y="122" width="328" height="212" rx="4" fill="#000000" stroke="#2a3a5e" stroke-width="1"/>
  <text x="492" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// pathname + query 분리</text>
  <text x="492" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">&lt;Link href={{</text>
  <text x="492" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  pathname: <tspan fill="#ce9178">'/search'</tspan>,</text>
  <text x="492" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  query: {</text>
  <text x="492" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    q: <tspan fill="#ce9178">'next'</tspan>,</text>
  <text x="492" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    page: <tspan fill="#b5cea8">1</tspan></text>
  <text x="492" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="492" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">}}&gt;</text>
  <text x="492" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// → /search?q=next&amp;page=1</text>
  <text x="492" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">타입 안전성 ↑</text>
</svg>
