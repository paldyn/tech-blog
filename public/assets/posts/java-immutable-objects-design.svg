<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">불변 클래스 설계 — 5가지 규칙</text>

  <!-- Rule boxes -->
  <rect x="60" y="68" width="370" height="90" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="2"/>
  <text x="245" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">① 클래스를 final로 선언</text>
  <text x="245" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서브클래스가 가변성을 추가하는 것을 방지</text>
  <rect x="76" y="124" width="338" height="26" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="141" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">public final class</text>
  <text x="210" y="141" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> Money { ... }</text>

  <rect x="450" y="68" width="370" height="90" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="2"/>
  <text x="635" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">② 모든 필드를 final + private</text>
  <text x="635" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">생성 후 값 변경 불가 + 직접 접근 불가</text>
  <rect x="466" y="124" width="338" height="26" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="141" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">private final</text>
  <text x="572" y="141" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> long amount;</text>

  <rect x="60" y="176" width="370" height="90" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="2"/>
  <text x="245" y="202" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">③ setter 금지</text>
  <text x="245" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">값 변경 메서드를 제공하지 않음</text>
  <text x="245" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">값이 다른 새 객체를 반환하는 메서드만 허용</text>

  <rect x="450" y="176" width="370" height="90" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="2"/>
  <text x="635" y="202" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">④ 가변 필드 방어적 복사</text>
  <text x="635" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">생성자에서 가변 객체 복사</text>
  <rect x="466" y="232" width="338" height="26" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="249" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">this.list = </text>
  <text x="550" y="249" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">new</text>
  <text x="570" y="249" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> ArrayList&lt;&gt;(list);</text>

  <rect x="205" y="284" width="470" height="90" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">⑤ 가변 필드 접근자도 방어적 복사</text>
  <text x="440" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">getter에서 원본을 반환하지 않고 복사본을 반환</text>
  <rect x="221" y="342" width="438" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="237" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">public</text>
  <text x="277" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> List&lt;String&gt; getTags() { </text>
  <text x="408" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">return</text>
  <text x="446" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> List.copyOf(tags); }</text>

  <!-- Benefits -->
  <rect x="60" y="400" width="760" height="44" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">불변 객체의 장점</text>
  <text x="440" y="436" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스레드 안전 | HashMap 키 안전 | 방어적 복사 불필요 | 추론 쉬움 | 공유 가능</text>
</svg>
