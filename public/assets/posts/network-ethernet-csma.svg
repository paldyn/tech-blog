<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arre" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arre2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CSMA/CD: 이더넷 충돌 감지</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">반이중(Half-Duplex) 이더넷의 매체 접근 제어</text>

  <!-- Flowchart -->
  <rect x="330" y="88" width="220" height="44" rx="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">전송 데이터 있음</text>

  <line x1="440" y1="132" x2="440" y2="152" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arre)"/>

  <rect x="290" y="152" width="300" height="44" rx="6" fill="#1a2535" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">매체 감지 (CS: Carrier Sense)</text>

  <line x1="440" y1="196" x2="440" y2="216" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arre)"/>

  <!-- Decision diamond -->
  <polygon points="440,216 540,240 440,264 340,240" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">사용 중?</text>
  <text x="440" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(Busy?)</text>

  <!-- Yes: wait -->
  <line x1="540" y1="240" x2="640" y2="240" stroke="#e05555" stroke-width="1.5" marker-end="url(#arre2)"/>
  <text x="580" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Yes</text>
  <rect x="640" y="220" width="160" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">대기 (Wait)</text>
  <!-- loop back -->
  <line x1="720" y1="264" x2="720" y2="300" stroke="#e05555" stroke-width="1.5"/>
  <line x1="720" y1="300" x2="440" y2="300" stroke="#e05555" stroke-width="1.5"/>
  <line x1="440" y1="300" x2="440" y2="196" stroke="#e05555" stroke-width="1.5" marker-end="url(#arre2)"/>

  <!-- No: transmit -->
  <line x1="440" y1="264" x2="440" y2="284" stroke="#55c555" stroke-width="1.5" marker-end="url(#arre)"/>
  <text x="452" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">No</text>

  <rect x="290" y="284" width="300" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">전송 시작 + 충돌 감지 (CD)</text>

  <!-- Collision detection path -->
  <line x1="290" y1="306" x2="200" y2="306" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="60" y="284" width="140" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">충돌 감지!</text>
  <text x="130" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Jam 신호 전송</text>
  <text x="130" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Binary Exponential</text>
  <text x="130" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Backoff 후 재시도</text>
  <line x1="200" y1="284" x2="200" y2="200" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="200" y1="200" x2="290" y2="200" stroke="#e05555" stroke-width="1.5" marker-end="url(#arre2)"/>

  <!-- Success path -->
  <line x1="440" y1="328" x2="440" y2="360" stroke="#55c555" stroke-width="1.5" marker-end="url(#arre)"/>

  <rect x="290" y="360" width="300" height="44" rx="22" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">전송 완료</text>

  <!-- Note: CSMA/CD vs CA -->
  <rect x="590" y="300" width="260" height="80" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">CSMA/CA (Wi-Fi)</text>
  <text x="720" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">충돌 감지 불가 (무선)</text>
  <text x="720" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전송 전 랜덤 대기</text>
  <text x="720" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(충돌 회피: CA)</text>
</svg>
