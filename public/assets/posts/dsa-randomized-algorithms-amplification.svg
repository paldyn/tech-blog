<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ar3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="430" rx="12" fill="#0a0a0a"/>
  <text x="60" y="56" font-size="22" font-weight="700" fill="#e8e8e8">오류 증폭: 반복할수록 틀릴 확률이 지수적으로 감소</text>

  <text x="60" y="92" font-size="14" fill="#888">한 번 실행 시 오답 확률 1/2 인 몬테카를로를 k번 독립 반복</text>

  <!-- bars -->
  <text x="120" y="150" font-size="13" fill="#e8e8e8" text-anchor="end">k = 1</text>
  <rect x="140" y="138" width="320" height="20" rx="4" fill="#e05555"/>
  <text x="476" y="153" font-size="13" fill="#e05555">1/2 = 50%</text>

  <text x="120" y="194" font-size="13" fill="#e8e8e8" text-anchor="end">k = 5</text>
  <rect x="140" y="182" width="40" height="20" rx="4" fill="#e0a055"/>
  <text x="196" y="197" font-size="13" fill="#e0a055">1/32 ≈ 3.1%</text>

  <text x="120" y="238" font-size="13" fill="#e8e8e8" text-anchor="end">k = 10</text>
  <rect x="140" y="226" width="14" height="20" rx="4" fill="#b5cea8"/>
  <text x="170" y="241" font-size="13" fill="#b5cea8">1/1024 ≈ 0.1%</text>

  <text x="120" y="282" font-size="13" fill="#e8e8e8" text-anchor="end">k = 20</text>
  <rect x="140" y="270" width="6" height="20" rx="4" fill="#55c555"/>
  <text x="162" y="285" font-size="13" fill="#55c555">≈ 0.0001%</text>

  <!-- formula box -->
  <rect x="60" y="320" width="760" height="86" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="350" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">k번 모두 틀릴 확률 = (1/2)^k     # 독립 시행이므로 곱셈</text>
  <text x="82" y="378" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">다수결로 답을 정하면 오류는 더 빠르게 사라진다 (체르노프 한계)</text>
</svg>
