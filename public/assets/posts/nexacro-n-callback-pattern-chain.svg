<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">저장 후 재조회 — 콜백 체이닝 패턴</text>

  <!-- Flow boxes -->
  <!-- Step 1 -->
  <rect x="60" y="72" width="160" height="70" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① fn_save()</text>
  <text x="140" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">transaction 호출</text>
  <text x="140" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SVC_SAVE</text>

  <!-- Arrow 1→2 -->
  <polygon points="228,108 258,98 258,118" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="220" y1="108" x2="258" y2="108" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="238" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">콜백</text>

  <!-- Step 2 -->
  <rect x="258" y="72" width="180" height="70" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="348" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">② fn_saveCb()</text>
  <text x="348" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">errCode 확인</text>
  <text x="348" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">성공 시 fn_search()</text>

  <!-- Arrow 2→3 -->
  <polygon points="446,108 476,98 476,118" fill="#55c555" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="438" y1="108" x2="476" y2="108" stroke="#55c555" stroke-width="2.5"/>
  <text x="456" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">호출</text>

  <!-- Step 3 -->
  <rect x="476" y="72" width="160" height="70" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="556" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">③ fn_search()</text>
  <text x="556" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">transaction 호출</text>
  <text x="556" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SVC_SEARCH</text>

  <!-- Arrow 3→4 -->
  <polygon points="644,108 674,98 674,118" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="636" y1="108" x2="674" y2="108" stroke="#7777cc" stroke-width="2.5"/>
  <text x="654" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">콜백</text>

  <!-- Step 4 -->
  <rect x="674" y="72" width="146" height="70" fill="#111827" rx="8" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="747" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">④ fn_searchCb()</text>
  <text x="747" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">화면 갱신</text>
  <text x="747" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Grid 표시</text>

  <!-- Code block -->
  <rect x="60" y="168" width="760" height="196" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="133" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> fn_saveCb(svcId, errCode, errMsg) {</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    if</text>
  <text x="99" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> (errCode !== </text>
  <text x="183" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="190" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">) {</text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">        alert(</text>
  <text x="136" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"[저장 실패] "</text>
  <text x="224" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> + errMsg);</text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">        return</text>
  <text x="134" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">; </text>
  <text x="150" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// 실패 시 재조회 불필요</text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    }</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">    // 저장 성공 → 재조회</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    alert(</text>
  <text x="118" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"저장되었습니다."</text>
  <text x="218" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">    this.fn_search();</text>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">    // ↑ 콜백 체이닝 — 성공 메시지 후 목록 갱신</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Bottom note -->
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">콜백 내에서 새 transaction() 호출은 완전히 유효 — 순차 비동기 처리의 핵심 패턴</text>
</svg>
