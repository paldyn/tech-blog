<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Application · Frame · Form 계층 관계</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">런타임 객체 트리 구조</text>

  <!-- Application outer box -->
  <rect x="60" y="90" width="760" height="400" rx="10" fill="#0e0e1c" stroke="#7777cc" stroke-width="2"/>
  <text x="100" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">Application  (nexacro.getApplication())</text>

  <!-- MainFrame inner box -->
  <rect x="80" y="126" width="720" height="344" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="2"/>
  <text x="118" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">MainFrame  (.mainframe)</text>

  <!-- Header div -->
  <rect x="100" y="162" width="680" height="48" rx="6" fill="#111820" stroke="#3a5a3a" stroke-width="1.5"/>
  <text x="440" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Div — divHeader  (헤더 영역)</text>

  <!-- Nav + ChildFrame row -->
  <rect x="100" y="220" width="160" height="230" rx="6" fill="#111820" stroke="#3a5a3a" stroke-width="1.5"/>
  <text x="180" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" transform="rotate(-90 180 340)">Div — divNav</text>

  <!-- ChildFrame box -->
  <rect x="270" y="220" width="510" height="230" rx="6" fill="#121818" stroke="#4a7a7a" stroke-width="2"/>
  <text x="525" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">ChildFrame — cfContent  (.mainframe.cfContent)</text>

  <!-- Form inside ChildFrame -->
  <rect x="290" y="256" width="470" height="176" rx="6" fill="#0e1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="525" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#a8e0a8" text-anchor="middle">Form — OrderList.xfdl  (현재 로드된 화면)</text>

  <!-- Components inside Form -->
  <rect x="310" y="290" width="200" height="36" rx="4" fill="#1a2010" stroke="#7a9a5a" stroke-width="1"/>
  <text x="410" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#a8e0a8" text-anchor="middle">Grid — grdOrder</text>

  <rect x="524" y="290" width="216" height="36" rx="4" fill="#1a2010" stroke="#7a9a5a" stroke-width="1"/>
  <text x="632" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#a8e0a8" text-anchor="middle">Button — btnSearch</text>

  <rect x="310" y="338" width="430" height="36" rx="4" fill="#1a2010" stroke="#7a9a5a" stroke-width="1"/>
  <text x="525" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#a8e0a8" text-anchor="middle">Dataset — dsCustList  (Form 스코프 데이터)</text>

  <!-- Access path annotations -->
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">nexacro.getApplication().mainframe.cfContent.form.grdOrder</text>

  <!-- Footer -->
  <text x="440" y="524" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
