<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Form Action 제출 라이프사이클</text>

  <!-- Steps in a horizontal flow -->
  <!-- Step 1 -->
  <rect x="40" y="80" width="140" height="70" rx="8" fill="#1a2a44" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="110" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① 사용자 입력</text>
  <text x="110" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">폼 필드 작성</text>
  <text x="110" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Submit 버튼 클릭</text>

  <line x1="180" y1="115" x2="210" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="210" y="80" width="140" height="70" rx="8" fill="#1a2a44" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="280" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② pending 상태</text>
  <text x="280" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">isPending = true</text>
  <text x="280" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버튼 비활성화</text>

  <line x1="350" y1="115" x2="380" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="380" y="80" width="140" height="70" rx="8" fill="#1a2a44" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="450" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">③ 서버 실행</text>
  <text x="450" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Server Action</text>
  <text x="450" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DB / 외부 API</text>

  <line x1="520" y1="115" x2="550" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="550" y="80" width="140" height="70" rx="8" fill="#1a2a44" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="620" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">④ 결과 처리</text>
  <text x="620" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">state 업데이트</text>
  <text x="620" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">성공 / 오류 표시</text>

  <line x1="690" y1="115" x2="720" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="720" y="80" width="140" height="70" rx="8" fill="#1a2a44" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="790" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">⑤ UI 갱신</text>
  <text x="790" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">revalidate 또는</text>
  <text x="790" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">redirect</text>

  <!-- Code section: Form with action -->
  <text x="60" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">기본 Form Action 패턴</text>
  <rect x="60" y="204" width="360" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ce9178">'use client'</tspan>
  </text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { useTransition } </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ce9178"> 'react'</tspan>
  </text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { createPost } </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ce9178"> '@/actions/posts'</tspan>
  </text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> </text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export function</tspan><tspan fill="#ffffff"> PostForm() {</tspan>
  </text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [isPending, startTransition] =</tspan>
  </text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    useTransition()</text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  ...</text>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  return &lt;form action={createPost}&gt;...</text>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- Right: Next.js Form component -->
  <text x="460" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">next/form — 고급 폼 컴포넌트</text>
  <rect x="460" y="204" width="360" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Form </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ce9178"> 'next/form'</tspan>
  </text>
  <text x="476" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 소프트 네비게이션 지원</text>
  <text x="476" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// URL 쿼리 파라미터 자동 처리</text>
  <text x="476" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> </text>
  <text x="476" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export function</tspan><tspan fill="#ffffff"> SearchForm() {</tspan>
  </text>
  <text x="476" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
  </text>
  <text x="476" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    &lt;Form action="/search"&gt;</text>
  <text x="476" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      &lt;input name="q" /&gt;</text>
  <text x="476" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      &lt;button&gt;검색&lt;/button&gt;</text>
  <text x="476" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    &lt;/Form&gt;</text>
</svg>
