<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="a2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Git Commit 오브젝트 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">스냅샷 + 메타데이터 + 부모 참조를 담는 오브젝트</text>

  <!-- Commit raw content -->
  <rect x="60" y="94" width="400" height="240" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="260" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">commit 오브젝트 원문</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">tree</tspan><tspan fill="#ffffff">   abc123def…</tspan></text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">parent</tspan><tspan fill="#ffffff"> fff000aaa…</tspan></text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">author</tspan><tspan fill="#ffffff"> Alice &lt;a@ex.com&gt; 1716681600 +0900</tspan></text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">committer</tspan><tspan fill="#ffffff"> Bob &lt;b@ex.com&gt; 1716681700 +0000</tspan></text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  (빈 줄)</text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">  feat: add login feature</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  </text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  Implements OAuth2 login flow.</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  Closes #42</text>

  <!-- Arrows from fields -->
  <!-- tree field -> tree box -->
  <line x1="460" y1="138" x2="520" y2="138" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- parent field -> parent commit box -->
  <line x1="460" y1="158" x2="520" y2="220" stroke="#7777cc" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Tree box -->
  <rect x="520" y="114" width="200" height="52" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="620" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">tree abc123def</text>
  <text x="620" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">루트 디렉터리 스냅샷</text>

  <!-- Parent commit box -->
  <rect x="520" y="196" width="200" height="52" fill="#111" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="620" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">commit fff000aaa</text>
  <text x="620" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이전 커밋 (부모)</text>

  <!-- Author / committer note -->
  <rect x="520" y="264" width="300" height="76" fill="#0d0d1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="670" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">author vs committer</text>
  <text x="670" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">author: 코드를 작성한 사람·시각</text>
  <text x="670" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">committer: 커밋을 적용한 사람·시각</text>
  <text x="670" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">(rebase·amend 시 committer 갱신)</text>

  <!-- Chain: commit -> parent -> grandparent -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">커밋 체인 (방향성 비순환 그래프)</text>

  <rect x="60" y="396" width="180" height="52" fill="#111" rx="8" stroke="#555" stroke-width="1"/>
  <text x="150" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">commit aaa (초기)</text>
  <text x="150" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">parent: none</text>

  <defs>
    <marker id="a3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>
  <line x1="240" y1="422" x2="298" y2="422" stroke="#555" stroke-width="1.5" marker-end="url(#a3)"/>

  <rect x="300" y="396" width="180" height="52" fill="#111" rx="8" stroke="#555" stroke-width="1"/>
  <text x="390" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">commit bbb</text>
  <text x="390" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">parent: aaa</text>

  <line x1="480" y1="422" x2="538" y2="422" stroke="#555" stroke-width="1.5" marker-end="url(#a3)"/>

  <rect x="540" y="396" width="180" height="52" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">commit ccc (HEAD)</text>
  <text x="630" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">parent: bbb</text>

  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">머지 커밋은 parent가 2개(또는 그 이상)</text>
</svg>
