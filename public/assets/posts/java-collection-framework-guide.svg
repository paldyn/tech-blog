<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컬렉션 선택 가이드</text>

  <!-- Header row -->
  <rect x="40" y="64" width="800" height="32" fill="#1e1b4b" rx="6"/>
  <text x="180" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#a5b4fc" text-anchor="middle">구현체</text>
  <text x="380" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#a5b4fc" text-anchor="middle">순서</text>
  <text x="530" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#a5b4fc" text-anchor="middle">중복</text>
  <text x="680" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#a5b4fc" text-anchor="middle">추천 상황</text>

  <!-- Row 1 -->
  <rect x="40" y="100" width="800" height="36" fill="#0d1a2a" rx="4"/>
  <text x="180" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">ArrayList</text>
  <text x="380" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">삽입 순서</text>
  <text x="530" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">허용</text>
  <text x="680" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">인덱스 접근, 일반 목록</text>

  <!-- Row 2 -->
  <rect x="40" y="140" width="800" height="36" fill="#0a0a0a" rx="4"/>
  <text x="180" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">LinkedList</text>
  <text x="380" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">삽입 순서</text>
  <text x="530" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">허용</text>
  <text x="680" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">빈번한 삽입/삭제, Deque</text>

  <!-- Row 3 -->
  <rect x="40" y="180" width="800" height="36" fill="#0d1a2a" rx="4"/>
  <text x="180" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">HashSet</text>
  <text x="380" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">없음</text>
  <text x="530" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">불가</text>
  <text x="680" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">빠른 contains, 중복 제거</text>

  <!-- Row 4 -->
  <rect x="40" y="220" width="800" height="36" fill="#0a0a0a" rx="4"/>
  <text x="180" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">TreeSet</text>
  <text x="380" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">정렬 순서</text>
  <text x="530" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">불가</text>
  <text x="680" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">정렬된 고유 요소 집합</text>

  <!-- Row 5 -->
  <rect x="40" y="260" width="800" height="36" fill="#0d1a2a" rx="4"/>
  <text x="180" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">HashMap</text>
  <text x="380" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">없음</text>
  <text x="530" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">키 불가</text>
  <text x="680" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">키-값 매핑, 가장 빠른 조회</text>

  <!-- Row 6 -->
  <rect x="40" y="300" width="800" height="36" fill="#0a0a0a" rx="4"/>
  <text x="180" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">LinkedHashMap</text>
  <text x="380" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">삽입 순서</text>
  <text x="530" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">키 불가</text>
  <text x="680" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">LRU 캐시, 삽입 순서 유지</text>

  <!-- Row 7 -->
  <rect x="40" y="340" width="800" height="36" fill="#0d1a2a" rx="4"/>
  <text x="180" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">TreeMap</text>
  <text x="380" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">키 정렬 순서</text>
  <text x="530" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">키 불가</text>
  <text x="680" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">범위 검색, 정렬된 맵</text>

  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">기본 선택: ArrayList, HashMap — 특수 요건에서만 다른 구현체 고려</text>
</svg>
