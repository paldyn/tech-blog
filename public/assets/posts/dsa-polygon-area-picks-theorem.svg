<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">픽의 정리: 격자점으로 넓이를 센다</text>

  <!-- grid -->
  <g stroke="#262626" stroke-width="1">
    <line x1="90" y1="110" x2="90" y2="350"/><line x1="130" y1="110" x2="130" y2="350"/>
    <line x1="170" y1="110" x2="170" y2="350"/><line x1="210" y1="110" x2="210" y2="350"/>
    <line x1="250" y1="110" x2="250" y2="350"/><line x1="290" y1="110" x2="290" y2="350"/>
    <line x1="330" y1="110" x2="330" y2="350"/><line x1="370" y1="110" x2="370" y2="350"/>
    <line x1="90" y1="110" x2="370" y2="110"/><line x1="90" y1="150" x2="370" y2="150"/>
    <line x1="90" y1="190" x2="370" y2="190"/><line x1="90" y1="230" x2="370" y2="230"/>
    <line x1="90" y1="270" x2="370" y2="270"/><line x1="90" y1="310" x2="370" y2="310"/>
    <line x1="90" y1="350" x2="370" y2="350"/>
  </g>

  <!-- polygon -->
  <polygon points="130,310 330,310 290,150 170,190"
           fill="#7ec8e322" stroke="#7ec8e3" stroke-width="2.5"/>

  <!-- boundary points (red) on edges/vertices -->
  <g fill="#e05555">
    <circle cx="130" cy="310" r="5"/><circle cx="170" cy="310" r="5"/><circle cx="210" cy="310" r="5"/>
    <circle cx="250" cy="310" r="5"/><circle cx="290" cy="310" r="5"/><circle cx="330" cy="310" r="5"/>
    <circle cx="290" cy="150" r="5"/><circle cx="170" cy="190" r="5"/>
  </g>
  <!-- interior points (green) -->
  <g fill="#55c555">
    <circle cx="210" cy="270" r="5"/><circle cx="250" cy="270" r="5"/><circle cx="290" cy="270" r="5"/>
    <circle cx="250" cy="230" r="5"/><circle cx="290" cy="230" r="5"/><circle cx="250" cy="190" r="5"/>
  </g>

  <!-- formula box -->
  <rect x="450" y="120" width="370" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" xml:space="preserve"><tspan fill="#ffffff">A = I + B/2 − 1</tspan></text>
  <text x="466" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555" font-weight="600">I</tspan><tspan fill="#ffffff"> = 내부 격자점 수</tspan></text>
  <text x="466" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e05555" font-weight="600">B</tspan><tspan fill="#ffffff"> = 경계 격자점 수</tspan></text>
  <text x="466" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># 모든 정점이 격자점일 때 성립</tspan></text>

  <!-- legend -->
  <circle cx="466" cy="268" r="5" fill="#55c555"/><text x="480" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">내부점 I = 6</text>
  <circle cx="466" cy="296" r="5" fill="#e05555"/><text x="480" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">경계점 B = 8</text>
  <text x="450" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">A = 6 + 8/2 − 1 = 9</text>

  <text x="60" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">경계 격자점 B는 각 변에서 gcd(|Δx|,|Δy|) 로 합산해 구한다</text>
</svg>
