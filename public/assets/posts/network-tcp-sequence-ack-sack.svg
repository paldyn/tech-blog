<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Cumulative ACK vs SACK (선택적 확인)</text>

  <!-- Cumulative ACK section -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Cumulative ACK (기본)</text>

  <!-- Byte stream visualization -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수신 버퍼:</text>

  <!-- Blocks -->
  <rect x="60" y="112" width="60" height="36" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="90" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">1-100</text>

  <rect x="122" y="112" width="60" height="36" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="152" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">101-200</text>

  <rect x="184" y="112" width="60" height="36" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="214" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">201-300</text>
  <text x="214" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e05555">유실</text>

  <rect x="246" y="112" width="60" height="36" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="276" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">301-400</text>

  <rect x="308" y="112" width="60" height="36" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="338" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">401-500</text>

  <text x="375" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">...</text>

  <text x="60" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">ACK=201 전송 (201 이후는 모두 무시)</text>
  <text x="60" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">301-500은 수신했지만 Cumulative ACK으로는 알릴 수 없음 → 재전송 낭비</text>

  <!-- Divider -->
  <line x1="60" y1="200" x2="820" y2="200" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- SACK section -->
  <text x="60" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">SACK (Selective ACK, RFC 2018)</text>

  <!-- Same scenario with SACK -->
  <text x="60" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수신 버퍼 (동일):</text>

  <rect x="60" y="254" width="60" height="36" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="90" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">1-100</text>

  <rect x="122" y="254" width="60" height="36" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="152" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">101-200</text>

  <rect x="184" y="254" width="60" height="36" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="214" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">201-300</text>

  <rect x="246" y="254" width="60" height="36" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="276" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">301-400</text>

  <rect x="308" y="254" width="60" height="36" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="338" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">401-500</text>

  <text x="60" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">ACK=201, SACK={301-500} 전송</text>
  <text x="60" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">송신자는 201-300만 재전송 → 301-500 재전송 불필요</text>

  <!-- Code block -->
  <rect x="60" y="348" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># SACK 활성화 확인 (Linux 기본 활성화)</text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sysctl net.ipv4.tcp_sack   <text fill="#9aa4b8"># → 1</text></text>
</svg>
