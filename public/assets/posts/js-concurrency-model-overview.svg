<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript 동시성 모델 — 런타임 구조</text>

  <!-- JS Engine box -->
  <rect x="50" y="68" width="360" height="300" rx="8" fill="#111520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">JS 엔진 (단일 스레드)</text>

  <!-- Heap -->
  <rect x="66" y="106" width="150" height="100" rx="6" fill="#1a2540" stroke="#7777cc"/>
  <text x="141" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Heap</text>
  <text x="141" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">객체·클로저</text>
  <text x="141" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동적 메모리</text>
  <text x="141" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GC 대상</text>

  <!-- Call Stack -->
  <rect x="234" y="106" width="160" height="100" rx="6" fill="#1a2540" stroke="#55c555"/>
  <text x="314" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Call Stack</text>
  <text x="314" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">main()</text>
  <text x="314" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">foo()</text>
  <text x="314" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">bar()</text>

  <!-- Engine note -->
  <text x="230" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">JS 코드 실행은 항상 이 스레드만</text>
  <text x="230" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">블로킹하면 UI·I/O 모두 멈춤</text>

  <!-- Right: Runtime APIs -->
  <rect x="450" y="68" width="380" height="300" rx="8" fill="#111520" stroke="#e8e8e8" stroke-width="1"/>
  <text x="640" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">런타임 (브라우저 / Node.js)</text>

  <!-- Web APIs box -->
  <rect x="466" y="106" width="160" height="90" rx="6" fill="#1a2540" stroke="#7ec8e3"/>
  <text x="546" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Web APIs</text>
  <text x="546" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">setTimeout · fetch</text>
  <text x="546" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DOM · XHR</text>
  <text x="546" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">별도 스레드에서 처리</text>

  <!-- Callback Queue / Task Queue -->
  <rect x="646" y="106" width="170" height="90" rx="6" fill="#1a2540" stroke="#e05555"/>
  <text x="731" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Task Queue</text>
  <text x="731" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Macrotask</text>
  <text x="731" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">setTimeout 콜백</text>
  <text x="731" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">I/O 이벤트</text>

  <!-- Microtask Queue -->
  <rect x="466" y="218" width="350" height="66" rx="6" fill="#1a2540" stroke="#55c555"/>
  <text x="641" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Microtask Queue</text>
  <text x="641" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Promise .then · queueMicrotask · MutationObserver</text>

  <!-- Event Loop label (center arrow area) -->
  <rect x="50" y="394" width="780" height="60" rx="6" fill="#111520" stroke="#3a4a6e"/>
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">이벤트 루프 (Event Loop)</text>
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Call Stack 비어있음 → Microtask Queue 전체 → Task Queue 하나 → 렌더링 → 반복</text>

  <!-- Arrows: Web APIs → Task Queue -->
  <line x1="626" y1="150" x2="644" y2="150" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="644,144 656,150 644,156" fill="#e05555"/>

  <!-- JS Engine → Web APIs -->
  <line x1="410" y1="155" x2="464" y2="155" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="464,149 476,155 464,161" fill="#7ec8e3"/>

  <!-- Task/Microtask → Call Stack (event loop) -->
  <line x1="640" y1="290" x2="640" y2="394" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="230" y1="370" x2="230" y2="394" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
