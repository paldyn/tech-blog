<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">rsync 핵심 옵션 레퍼런스</text>

  <!-- Column headers -->
  <rect x="60" y="60" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">옵션</text>
  <rect x="272" y="60" width="240" height="36" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="392" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">의미</text>
  <rect x="524" y="60" width="296" height="36" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="672" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">주의/활용</text>

  <!-- Row 1 -->
  <rect x="60" y="104" width="200" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">-a</text>
  <text x="160" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">--archive</text>
  <rect x="272" y="104" width="240" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="392" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">아카이브 모드</text>
  <text x="392" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">-rlptgoD 묶음</text>
  <rect x="524" y="104" width="296" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="672" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">대부분의 백업에 필수</text>
  <text x="672" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">권한·타임스탬프·심볼릭링크 보존</text>

  <!-- Row 2 -->
  <rect x="60" y="152" width="200" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">-v / --verbose</text>
  <text x="160" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">-vv/-vvv 더 자세히</text>
  <rect x="272" y="152" width="240" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="392" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">전송 파일 목록 출력</text>
  <text x="392" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전송 내역 확인용</text>
  <rect x="524" y="152" width="296" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="672" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">--progress와 병용 권장</text>
  <text x="672" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대용량 전송 진행률 확인</text>

  <!-- Row 3 -->
  <rect x="60" y="200" width="200" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">-z / --compress</text>
  <text x="160" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">zlib 압축</text>
  <rect x="272" y="200" width="240" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="392" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">전송 중 데이터 압축</text>
  <text x="392" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">느린 네트워크에 유리</text>
  <rect x="524" y="200" width="296" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="672" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">LAN 환경엔 오히려 느림</text>
  <text x="672" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CPU 부하 vs 네트워크 트레이드오프</text>

  <!-- Row 4 -->
  <rect x="60" y="248" width="200" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">--delete</text>
  <text x="160" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">삭제 동기화</text>
  <rect x="272" y="248" width="240" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="392" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">원본에 없는 파일 삭제</text>
  <text x="392" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">목적지 = 원본 미러링</text>
  <rect x="524" y="248" width="296" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="672" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">⚠ 파괴적 — 먼저 --dry-run</text>
  <text x="672" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실수 삭제 주의</text>

  <!-- Row 5 -->
  <rect x="60" y="296" width="200" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">--exclude</text>
  <text x="160" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">패턴 제외</text>
  <rect x="272" y="296" width="240" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="392" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">패턴 일치 파일 제외</text>
  <text x="392" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">복수 지정 가능</text>
  <rect x="524" y="296" width="296" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="672" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">--exclude-from=파일 활용</text>
  <text x="672" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.gitignore 스타일 패턴 파일</text>

  <!-- Row 6 -->
  <rect x="60" y="344" width="200" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">--dry-run / -n</text>
  <text x="160" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시뮬레이션</text>
  <rect x="272" y="344" width="240" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="392" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">실제 전송 없이 미리보기</text>
  <text x="392" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">무엇이 바뀌는지 확인</text>
  <rect x="524" y="344" width="296" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="672" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">--delete 전 반드시 실행</text>
  <text x="672" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">-v 없이는 출력 없음</text>

  <!-- Row 7 -->
  <rect x="60" y="392" width="200" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">--bwlimit=KB</text>
  <text x="160" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대역폭 제한</text>
  <rect x="272" y="392" width="240" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="392" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">초당 KB 단위로 제한</text>
  <text x="392" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">--bwlimit=1024 = 1MB/s</text>
  <rect x="524" y="392" width="296" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="672" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">운영 중 서버 백업 시 유용</text>
  <text x="672" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네트워크 포화 방지</text>

  <!-- Code row at bottom -->
  <rect x="60" y="448" width="760" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="468" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 전형적인 원격 백업 명령</text>
  <text x="80" y="486" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">rsync</text>
  <text x="116" y="486" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -avz --delete --exclude='*.log'</text>
  <text x="80" y="504" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">       --bwlimit=2048 /local/data/</text>
  <text x="80" y="522" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">       user@remote:/backup/data/</text>
</svg>
