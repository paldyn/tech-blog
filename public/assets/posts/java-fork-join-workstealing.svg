<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr-s" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Work-Stealing 알고리즘</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">유휴 스레드가 바쁜 스레드의 큐 끝에서 작업을 훔쳐와 CPU를 낭비하지 않음</text>

  <!-- Thread 1 (busy) -->
  <rect x="80" y="90" width="220" height="200" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="190" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Thread 1 (바쁨)</text>
  <text x="190" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Deque (앞에서 꺼냄)</text>

  <rect x="96" y="144" width="188" height="28" rx="4" fill="#1a2a44" stroke="#7ec8e3" stroke-width="1"/>
  <text x="190" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">Task A ← 실행 중</text>
  <rect x="96" y="178" width="188" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="190" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Task B</text>
  <rect x="96" y="212" width="188" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="190" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Task C</text>
  <rect x="96" y="246" width="188" height="28" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="190" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">Task D ← steal 대상</text>

  <!-- Thread 2 (idle) -->
  <rect x="580" y="90" width="220" height="200" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="690" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Thread 2 (유휴)</text>
  <text x="690" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Deque (비어 있음)</text>

  <rect x="596" y="144" width="188" height="112" rx="4" fill="#0a0a12" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="690" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">empty</text>

  <!-- Steal arrow -->
  <path d="M 580 260 Q 440 320 304 260" stroke="#e05555" stroke-width="2.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-s)"/>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">유휴 스레드가 Task D를 steal(뒤에서 꺼냄)</text>

  <!-- Note -->
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">Thread 1: 앞(LIFO) · Thread 2: 뒤(FIFO) — 경합 최소화</text>
</svg>
