<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker 런타임 스택 — 계층 구조</text>

  <!-- docker CLI -->
  <rect x="300" y="68" width="280" height="56" rx="6" fill="#0a1628" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">docker CLI</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용자 명령 인터페이스 (docker run, build, ...)</text>

  <!-- Arrow -->
  <line x1="440" y1="124" x2="440" y2="154" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">REST API (Unix socket)</text>

  <!-- dockerd -->
  <rect x="260" y="154" width="360" height="60" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">dockerd (Docker Daemon)</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이미지 빌드·레지스트리·볼륨·네트워크 관리</text>

  <!-- Arrow -->
  <line x1="440" y1="214" x2="440" y2="244" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">gRPC</text>

  <!-- containerd -->
  <rect x="220" y="244" width="440" height="60" rx="6" fill="#0d1117" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#ce9178" text-anchor="middle">containerd</text>
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컨테이너 생명주기 · 이미지 스냅샷 · 스토리지 관리</text>

  <!-- Arrow to shim -->
  <line x1="440" y1="304" x2="440" y2="334" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">OCI 번들 생성</text>

  <!-- containerd-shim -->
  <rect x="260" y="334" width="360" height="56" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">containerd-shim-runc-v2</text>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">containerd 재시작 시에도 컨테이너 유지</text>

  <!-- Arrow to runc -->
  <line x1="440" y1="390" x2="440" y2="420" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- runc -->
  <rect x="300" y="420" width="280" height="56" rx="6" fill="#0a1628" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">runc</text>
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OCI 런타임 — clone/pivot_root/cgroup 시스템 콜</text>

  <!-- Right side labels -->
  <text x="660" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">사용자 영역</text>
  <text x="660" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">고수준 런타임</text>
  <text x="660" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">컨테이너 런타임</text>
  <text x="660" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Shim 계층</text>
  <text x="660" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">저수준 런타임</text>

  <!-- Linux Kernel label -->
  <text x="440" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">runc → Linux Kernel (Namespaces + cgroups + OverlayFS)</text>
</svg>
