<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="rs-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">canary steps — 선언한 순서대로 진행</text>

  <!-- spec code -->
  <rect x="50" y="80" width="380" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">strategy:</text>
  <text x="70" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  canary:</text>
  <text x="70" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    steps:</text>
  <text x="70" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    - <tspan fill="#7ec8e3" font-weight="600">setWeight</tspan>: <tspan fill="#b5cea8">10</tspan></text>
  <text x="70" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    - <tspan fill="#7ec8e3" font-weight="600">pause</tspan>: {duration: <tspan fill="#ce9178">5m</tspan>}</text>
  <text x="70" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    - <tspan fill="#7ec8e3" font-weight="600">analysis</tspan>:</text>
  <text x="70" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        templates:</text>
  <text x="70" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        - templateName: <tspan fill="#ce9178">err</tspan></text>
  <text x="70" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    - <tspan fill="#7ec8e3" font-weight="600">setWeight</tspan>: <tspan fill="#b5cea8">50</tspan></text>
  <text x="70" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    - <tspan fill="#7ec8e3" font-weight="600">pause</tspan>: {}  <tspan fill="#9aa4b8"># 무기한</tspan></text>
  <text x="70" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    - <tspan fill="#7ec8e3" font-weight="600">setWeight</tspan>: <tspan fill="#b5cea8">100</tspan></text>
  <text x="70" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># pause:{} 는 수동 promote 대기</text>

  <!-- step ladder -->
  <rect x="500" y="86" width="330" height="44" rx="6" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="665" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">setWeight 10 — 10% 노출</text>

  <rect x="500" y="146" width="330" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="665" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">pause 5m — 자동 대기</text>

  <rect x="500" y="206" width="330" height="44" rx="6" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="665" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178" text-anchor="middle">analysis — 메트릭 자동 검증</text>

  <rect x="500" y="266" width="330" height="44" rx="6" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="665" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">setWeight 50 → pause{} 수동</text>

  <rect x="500" y="326" width="330" height="44" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="665" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">setWeight 100 — 전면 승급</text>

  <line x1="665" y1="130" x2="665" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rs-arr)"/>
  <line x1="665" y1="190" x2="665" y2="206" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rs-arr)"/>
  <line x1="665" y1="250" x2="665" y2="266" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rs-arr)"/>
  <line x1="665" y1="310" x2="665" y2="326" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rs-arr)"/>
</svg>
