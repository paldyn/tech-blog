<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Self-Consistency: 다수결 앙상블</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">여러 CoT 경로 샘플링 → 다수결 집계</text>

  <!-- Input -->
  <rect x="310" y="88" width="260" height="44" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">질문 (동일)</text>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Temperature 0.7~1.0으로 반복 샘플링</text>

  <!-- Branch arrows -->
  <line x1="360" y1="132" x2="175" y2="184" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="132" x2="440" y2="184" stroke="#555" stroke-width="1.5"/>
  <line x1="520" y1="132" x2="705" y2="184" stroke="#555" stroke-width="1.5"/>

  <!-- Path 1 -->
  <rect x="60" y="184" width="230" height="100" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="175" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">경로 1 (temp=0.8)</text>
  <text x="80" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단계 A → 단계 B →</text>
  <text x="80" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단계 C → 단계 D</text>
  <rect x="80" y="258" width="170" height="20" rx="4" fill="#1a1a1a" stroke="#55c555"/>
  <text x="165" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">답: 42</text>

  <!-- Path 2 -->
  <rect x="325" y="184" width="230" height="100" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">경로 2 (temp=0.8)</text>
  <text x="345" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">다른 추론 방법으로</text>
  <text x="345" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">접근 → 다른 단계들</text>
  <rect x="345" y="258" width="170" height="20" rx="4" fill="#1a1a1a" stroke="#55c555"/>
  <text x="430" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">답: 42</text>

  <!-- Path 3 -->
  <rect x="590" y="184" width="230" height="100" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="705" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">경로 3 (temp=0.8)</text>
  <text x="610" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">또 다른 추론 방식으로</text>
  <text x="610" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">접근 → 다른 경로</text>
  <rect x="610" y="258" width="170" height="20" rx="4" fill="#1a1a1a" stroke="#e05555"/>
  <text x="695" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">답: 37</text>

  <!-- Arrows to aggregator -->
  <line x1="175" y1="284" x2="340" y2="334" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="284" x2="440" y2="334" stroke="#555" stroke-width="1.5"/>
  <line x1="705" y1="284" x2="570" y2="334" stroke="#555" stroke-width="1.5"/>

  <!-- Aggregator -->
  <rect x="250" y="334" width="380" height="60" rx="8" fill="#111111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">다수결 집계 (Majority Vote)</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">42 (2표) vs 37 (1표) → 42 선택</text>

  <!-- Arrow to final -->
  <line x1="440" y1="394" x2="440" y2="420" stroke="#555" stroke-width="2"/>
  <polygon points="440,428 434,416 446,416" fill="#555"/>

  <!-- Final Answer -->
  <rect x="310" y="428" width="260" height="36" rx="8" fill="#0d2d0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">최종 답: 42 ✓</text>
</svg>
