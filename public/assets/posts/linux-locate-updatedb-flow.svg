<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">locate &amp; updatedb 동작 원리</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">파일시스템을 직접 탐색하지 않고 사전 구축 DB로 검색</text>

  <!-- Filesystem box -->
  <rect x="60" y="100" width="180" height="120" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="150" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">파일시스템</text>
  <text x="150" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">/home/alice/</text>
  <text x="150" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">/var/log/</text>
  <text x="150" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">/etc/nginx/</text>
  <text x="150" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">수십만 파일...</text>

  <!-- Arrow: updatedb scans fs -->
  <polygon points="278,160 298,152 298,168" fill="#e8c55a"/>
  <line x1="240" y1="160" x2="297" y2="160" stroke="#e8c55a" stroke-width="2"/>
  <text x="268" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c55a" text-anchor="middle">updatedb</text>
  <text x="268" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">(야간 cron)</text>

  <!-- DB box -->
  <rect x="300" y="100" width="180" height="120" fill="#0f2a0f" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="390" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">mlocate.db</text>
  <text x="390" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">압축된 경로 목록</text>
  <text x="390" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">/var/lib/mlocate/</text>
  <text x="390" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">mlocate.db</text>

  <!-- Arrow: locate queries DB -->
  <polygon points="518,160 538,152 538,168" fill="#7ec8e3"/>
  <line x1="480" y1="160" x2="537" y2="160" stroke="#7ec8e3" stroke-width="2"/>
  <text x="508" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">locate</text>

  <!-- Result box -->
  <rect x="540" y="100" width="280" height="120" fill="#070b14" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="680" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">검색 결과 (즉시)</text>
  <text x="556" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">/etc/nginx/nginx.conf</text>
  <text x="556" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">/etc/nginx/conf.d/default</text>
  <text x="556" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">/home/alice/.config/...</text>
  <text x="556" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">밀리초 이내</text>

  <!-- locate commands -->
  <rect x="60" y="250" width="760" height="104" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">locate 주요 옵션</text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">locate nginx.conf       <tspan fill="#6a8aa0"># 경로 내 문자열 검색</tspan></text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">locate -i README        <tspan fill="#6a8aa0"># 대소문자 무시</tspan></text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">locate -c '*.conf'      <tspan fill="#6a8aa0"># 결과 개수만 출력</tspan></text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">locate -e '*.conf'      <tspan fill="#6a8aa0"># 현재 존재하는 파일만 출력</tspan></text>
</svg>
