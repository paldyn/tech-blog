<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">JavaScript 표준화 연표 — ES5부터 ES2024까지</text>

  <!-- Timeline line -->
  <line x1="60" y1="130" x2="820" y2="130" stroke="#333" stroke-width="2"/>

  <!-- ES5 -->
  <circle cx="100" cy="130" r="8" fill="#444" stroke="#666" stroke-width="1.5"/>
  <text x="100" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#888" text-anchor="middle">ES5</text>
  <text x="100" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444" text-anchor="middle">2009</text>
  <text x="100" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555" text-anchor="middle">strict mode</text>
  <text x="100" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555" text-anchor="middle">Array 메서드</text>

  <!-- ES6/2015 — highlighted -->
  <circle cx="260" cy="130" r="14" fill="#1a1a40" stroke="#6666ff" stroke-width="2"/>
  <text x="260" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#8888ff" text-anchor="middle">ES6</text>
  <text x="260" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#8888ff" text-anchor="middle">ES2015</text>
  <text x="260" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#4444aa" text-anchor="middle">★ 대혁신</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="260" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#6666cc" text-anchor="middle">let/const, 화살표함수</text>
  <text x="260" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#6666cc" text-anchor="middle">클래스, 모듈, Promise...</text>

  <!-- ES2016 -->
  <circle cx="360" cy="130" r="6" fill="#1a1818" stroke="#555" stroke-width="1.5"/>
  <text x="360" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666" text-anchor="middle">2016</text>
  <text x="360" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#444" text-anchor="middle">**,includes</text>

  <!-- ES2017 -->
  <circle cx="430" cy="130" r="8" fill="#1a1a10" stroke="#7a6a10" stroke-width="1.5"/>
  <text x="430" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">2017</text>
  <text x="430" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#8a7a20" text-anchor="middle">async/await</text>
  <text x="430" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555" text-anchor="middle">Object.entries</text>

  <!-- ES2018 -->
  <circle cx="510" cy="130" r="6" fill="#1a1818" stroke="#555" stroke-width="1.5"/>
  <text x="510" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666" text-anchor="middle">2018</text>
  <text x="510" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#444" text-anchor="middle">스프레드,</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="510" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#444" text-anchor="middle">for-await-of</text>

  <!-- ES2019 -->
  <circle cx="580" cy="130" r="6" fill="#1a1818" stroke="#555" stroke-width="1.5"/>
  <text x="580" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666" text-anchor="middle">2019</text>
  <text x="580" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#444" text-anchor="middle">flat,flatMap</text>
  <text x="580" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#444" text-anchor="middle">Optional catch</text>

  <!-- ES2020 -->
  <circle cx="650" cy="130" r="8" fill="#0d1a10" stroke="#3a6a3a" stroke-width="1.5"/>
  <text x="650" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">2020</text>
  <text x="650" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#4a8a4a" text-anchor="middle">??,?.,BigInt</text>
  <text x="650" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555" text-anchor="middle">allSettled</text>

  <!-- ES2021-2024 -->
  <circle cx="730" cy="130" r="6" fill="#1a1818" stroke="#555" stroke-width="1.5"/>
  <text x="730" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666" text-anchor="middle">2021+</text>
  <text x="730" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#444" text-anchor="middle">논리할당,</text>
  <text x="730" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#444" text-anchor="middle">Promise.any...</text>

  <!-- "매년 6월" label -->
  <rect x="300" y="220" width="280" height="44" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#aaa" text-anchor="middle">TC39 프로세스</text>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">Stage 0 → 1 → 2 → 3 → 4 → 매년 6월 확정</text>

  <!-- ES6 annotation box -->
  <rect x="150" y="284" width="220" height="100" rx="8" fill="#0d0d1e" stroke="#4444aa" stroke-width="1"/>
  <text x="260" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#8888ff" text-anchor="middle">ES6가 혁명인 이유</text>
  <text x="166" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">• 6년만의 대규모 업데이트</text>
  <text x="166" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">• 이후 매년 작은 업데이트로 전환</text>
  <text x="166" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">• 언어 패러다임 자체가 변화</text>

  <!-- Bottom note -->
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">ES5(2009) → ES6(2015): 6년 공백 → 이후 매년 ES20XX로 버전명 변경</text>
</svg>
