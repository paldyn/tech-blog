<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">중간에서 만나기 (Meet in the Middle)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">O(2ᴺ) → O(2^(N/2) · log N) 으로 지수 절반 감소</text>

  <!-- Full set -->
  <rect x="60" y="90" width="760" height="50" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">전체 집합 A = {a₁, a₂, ..., a_N}</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">N=40 → 2⁴⁰ ≈ 1조 (완전 탐색 불가)</text>

  <!-- Arrow down split -->
  <line x1="230" y1="140" x2="230" y2="168" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-p)"/>
  <line x1="650" y1="140" x2="650" y2="168" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-p)"/>
  <text x="440" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">반으로 분할</text>

  <!-- Left half -->
  <rect x="60" y="172" width="340" height="50" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle">왼쪽 절반 L</text>
  <text x="230" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">{a₁..a_{N/2}}: 2^(N/2) ≈ 2²⁰ ≈ 100만</text>

  <!-- Right half -->
  <rect x="480" y="172" width="340" height="50" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" text-anchor="middle">오른쪽 절반 R</text>
  <text x="650" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">{a_{N/2+1}..a_N}: 2^(N/2) ≈ 2²⁰ ≈ 100만</text>

  <!-- Arrow down -->
  <line x1="230" y1="222" x2="230" y2="258" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="650" y1="222" x2="650" y2="258" stroke="#e05555" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- Results -->
  <rect x="60" y="262" width="340" height="50" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle">L의 모든 부분합 열거</text>
  <text x="230" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">sums_L = [0, a₁, a₂, a₁+a₂, ...]</text>

  <rect x="480" y="262" width="340" height="50" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="650" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" text-anchor="middle">R의 모든 부분합 열거</text>
  <text x="650" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">sums_R = [0, a_{N/2+1}, ...]</text>

  <!-- Arrow to combine -->
  <line x1="230" y1="312" x2="230" y2="340" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="650" y1="312" x2="650" y2="340" stroke="#e05555" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- Combine box -->
  <rect x="150" y="344" width="580" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">sums_R 정렬 후 이진 탐색</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">각 l ∈ sums_L에 대해 target - l 이 sums_R에 있는지 O(log N) 탐색</text>

  <!-- Final -->
  <rect x="60" y="424" width="760" height="40" rx="8" fill="#0d0d1f" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="449" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">최종 복잡도: O(2^(N/2) · N/2) — N=40 기준 약 2000만 연산</text>
</svg>
