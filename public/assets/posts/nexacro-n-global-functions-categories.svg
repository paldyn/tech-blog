<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">gfn_ 전역 함수 분류 체계</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">도메인별 접두사 + 함수명 → gfn_domain_action 패턴</text>

  <!-- Center: gfn_ prefix -->
  <rect x="350" y="100" width="180" height="52" rx="26" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">gfn_*</text>

  <!-- 6 category boxes arranged in 2x3 grid -->
  <!-- Row 1 -->
  <rect x="60" y="180" width="200" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">문자열 처리</text>
  <text x="160" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_trim()</text>
  <text x="160" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_lpad() gfn_replace()</text>

  <rect x="340" y="180" width="200" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">날짜·시간</text>
  <text x="440" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_today()</text>
  <text x="440" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_formatDate() gfn_addDays()</text>

  <rect x="620" y="180" width="200" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">숫자·금액</text>
  <text x="720" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_comma()</text>
  <text x="720" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_toNum() gfn_round()</text>

  <!-- Row 2 -->
  <rect x="60" y="290" width="200" height="80" rx="8" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">null·공통 체크</text>
  <text x="160" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_isNull()</text>
  <text x="160" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_nvl() gfn_isEmpty()</text>

  <rect x="340" y="290" width="200" height="80" rx="8" fill="#2a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">유효성 검사</text>
  <text x="440" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_validate()</text>
  <text x="440" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_checkEmail() gfn_checkPhone()</text>

  <rect x="620" y="290" width="200" height="80" rx="8" fill="#2a1a1a" stroke="#e8a840" stroke-width="1.5"/>
  <text x="720" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a840" text-anchor="middle">트랜잭션 헬퍼</text>
  <text x="720" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_transaction()</text>
  <text x="720" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">gfn_callbackOk() gfn_callbackErr()</text>

  <!-- Lines from center to boxes -->
  <line x1="350" y1="130" x2="160" y2="180" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="440" y1="152" x2="440" y2="180" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="530" y1="130" x2="720" y2="180" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="350" y1="140" x2="160" y2="290" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="440" y1="152" x2="440" y2="290" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="530" y1="140" x2="720" y2="290" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>

  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">각 카테고리는 별도 .xjs 파일로 분리해 TypeDefinition에 등록</text>
</svg>
