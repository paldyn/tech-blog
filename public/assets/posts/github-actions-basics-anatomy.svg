<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Workflow의 구조</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">이벤트가 워크플로우를 깨우고, 잡 안의 스텝이 순서대로 실행된다</text>

  <!-- Event -->
  <rect x="60" y="110" width="160" height="60" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="140" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9988dd">Event</text>
  <text x="140" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">push / pull_request</text>

  <line x1="140" y1="170" x2="140" y2="204" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Workflow box -->
  <rect x="60" y="206" width="760" height="200" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="232"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Workflow (ci.yml)</text>

  <!-- Job 1 -->
  <rect x="84" y="248" width="340" height="140" rx="8" fill="#101010" stroke="#e0955e" stroke-width="1.3"/>
  <text x="104" y="272"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0955e">Job: build</text>
  <rect x="104" y="284" width="300" height="28" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="118" y="303"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">Step ① checkout</text>
  <rect x="104" y="318" width="300" height="28" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="118" y="337"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">Step ② setup-node</text>
  <rect x="104" y="352" width="300" height="28" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="118" y="371"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">Step ③ npm run build</text>

  <!-- Job 2 -->
  <rect x="456" y="248" width="340" height="140" rx="8" fill="#101010" stroke="#55c555" stroke-width="1.3"/>
  <text x="476" y="272"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Job: test</text>
  <rect x="476" y="284" width="300" height="28" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="490" y="303"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">Step ① checkout</text>
  <rect x="476" y="318" width="300" height="28" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="490" y="337"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">Step ② npm ci</text>
  <rect x="476" y="352" width="300" height="28" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="490" y="371"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">Step ③ npm test</text>
</svg>
