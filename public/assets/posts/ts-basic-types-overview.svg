<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 기본 타입 전체 지도</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">원시 타입 · 특수 타입 · 객체 타입 · 유틸리티 타입</text>

  <!-- Category: Primitive Types -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">원시 타입</text>
  <rect x="60" y="114" width="90" height="44" rx="6" fill="#111520" stroke="#7ec8e3"/>
  <text x="105" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">string</text>
  <text x="105" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">문자열</text>

  <rect x="162" y="114" width="90" height="44" rx="6" fill="#111520" stroke="#7ec8e3"/>
  <text x="207" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">number</text>
  <text x="207" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정수·소수</text>

  <rect x="264" y="114" width="90" height="44" rx="6" fill="#111520" stroke="#7ec8e3"/>
  <text x="309" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">boolean</text>
  <text x="309" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">참·거짓</text>

  <rect x="366" y="114" width="90" height="44" rx="6" fill="#111520" stroke="#7ec8e3"/>
  <text x="411" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">bigint</text>
  <text x="411" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">큰 정수</text>

  <rect x="468" y="114" width="90" height="44" rx="6" fill="#111520" stroke="#7ec8e3"/>
  <text x="513" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">symbol</text>
  <text x="513" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">고유 심볼</text>

  <!-- Category: Special Types -->
  <text x="60" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">특수 타입</text>
  <rect x="60" y="194" width="90" height="44" rx="6" fill="#111520" stroke="#e05555"/>
  <text x="105" y="215" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">null</text>
  <text x="105" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">명시적 없음</text>

  <rect x="162" y="194" width="90" height="44" rx="6" fill="#111520" stroke="#e05555"/>
  <text x="207" y="215" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">undefined</text>
  <text x="207" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">미할당</text>

  <rect x="264" y="194" width="90" height="44" rx="6" fill="#111520" stroke="#888"/>
  <text x="309" y="215" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">void</text>
  <text x="309" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">반환값 없음</text>

  <rect x="366" y="194" width="90" height="44" rx="6" fill="#111520" stroke="#e05555"/>
  <text x="411" y="215" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">never</text>
  <text x="411" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">도달 불가</text>

  <rect x="468" y="194" width="90" height="44" rx="6" fill="#111520" stroke="#888"/>
  <text x="513" y="215" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">unknown</text>
  <text x="513" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">안전한 any</text>

  <rect x="570" y="194" width="90" height="44" rx="6" fill="#111520" stroke="#888"/>
  <text x="615" y="215" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">any</text>
  <text x="615" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타입 검사 off</text>

  <!-- Category: Object Types -->
  <text x="60" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">객체 타입</text>
  <rect x="60" y="274" width="120" height="44" rx="6" fill="#111520" stroke="#7777cc"/>
  <text x="120" y="295" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">object</text>
  <text x="120" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비원시 타입</text>

  <rect x="192" y="274" width="120" height="44" rx="6" fill="#111520" stroke="#7777cc"/>
  <text x="252" y="295" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">Array&lt;T&gt;</text>
  <text x="252" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">배열</text>

  <rect x="324" y="274" width="120" height="44" rx="6" fill="#111520" stroke="#7777cc"/>
  <text x="384" y="295" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">[T, U]</text>
  <text x="384" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">튜플</text>

  <rect x="456" y="274" width="120" height="44" rx="6" fill="#111520" stroke="#7777cc"/>
  <text x="516" y="295" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">enum</text>
  <text x="516" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">열거형</text>

  <rect x="588" y="274" width="120" height="44" rx="6" fill="#111520" stroke="#7777cc"/>
  <text x="648" y="295" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">interface</text>
  <text x="648" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">형태 선언</text>

  <!-- Bottom summary table -->
  <rect x="60" y="338" width="760" height="116" rx="8" fill="#111520" stroke="#1e2433"/>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">unknown vs any vs never</text>
  <line x1="60" y1="372" x2="820" y2="372" stroke="#1e2433" stroke-width="1"/>

  <text x="200" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">any</text>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">unknown</text>
  <text x="680" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">never</text>

  <text x="200" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 검사 비활성화</text>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">좁히기 후 사용 가능</text>
  <text x="680" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">도달 불가 코드</text>

  <text x="200" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">지양</text>
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">any 대신 권장</text>
  <text x="680" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 타입의 서브타입</text>
</svg>
