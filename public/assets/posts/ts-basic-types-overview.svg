<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 기본 타입 분류</text>
  <!-- Category: Primitive -->
  <rect x="60" y="68" width="360" height="180" rx="10" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="240" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">원시 타입 (Primitive)</text>
  <text x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">number</text><text x="180" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  1, 3.14, Infinity, NaN</text>
  <text x="80" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">string</text><text x="175" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">   "hello", 'world', `tmpl`</text>
  <text x="80" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">boolean</text><text x="185" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> true, false</text>
  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">bigint</text><text x="165" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">   9007199254740993n</text>
  <text x="80" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">symbol</text><text x="175" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  Symbol("desc")</text>
  <!-- Category: Special -->
  <rect x="460" y="68" width="360" height="180" rx="10" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="640" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">특수 타입</text>
  <text x="480" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">null</text><text x="532" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">      의도적 빈 값</text>
  <text x="480" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">undefined</text><text x="582" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> 초기화 안 된 값</text>
  <text x="480" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" font-weight="600">any</text><text x="522" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">       타입 검사 비활성화 (자제)</text>
  <text x="480" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">unknown</text><text x="572" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">   any의 안전한 대안</text>
  <text x="480" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" font-weight="600">never</text><text x="545" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">     도달 불가 코드</text>
  <!-- Category: Object-like -->
  <rect x="60" y="268" width="360" height="170" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">객체 타입</text>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">object</text><text x="173" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">   비원시값 모두</text>
  <text x="80" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">Array&lt;T&gt;</text><text x="188" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> 또는 T[]</text>
  <text x="80" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">tuple</text><text x="156" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">    [string, number]</text>
  <text x="80" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">Function</text><text x="188" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> (a: T) =&gt; R</text>
  <!-- Category: Special TS -->
  <rect x="460" y="268" width="360" height="170" rx="10" fill="#1a1a0a" stroke="#f0db4f" stroke-width="2"/>
  <text x="640" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#f0db4f">TypeScript 전용</text>
  <text x="480" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#f0db4f" font-weight="600">void</text><text x="534" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">     반환값 없는 함수</text>
  <text x="480" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#f0db4f" font-weight="600">enum</text><text x="534" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">     열거형</text>
  <text x="480" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#f0db4f" font-weight="600">literal</text><text x="552" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  "left" | "right"</text>
  <text x="480" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#f0db4f" font-weight="600">interface</text><text x="590" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> 객체 구조 정의</text>
  <!-- Footer -->
  <text x="440" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">strictNullChecks: true 시 null/undefined는 독립된 타입으로 취급</text>
</svg>
