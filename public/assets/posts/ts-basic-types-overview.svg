<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 기본 타입 분류</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">원시 타입, 객체 타입, 특수 타입으로 나뉜다</text>
  <!-- Primitive types group -->
  <rect x="60" y="90" width="360" height="200" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">원시 타입 (Primitive)</text>
  <!-- Type items -->
  <rect x="80" y="124" width="140" height="50" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="150" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" font-weight="600" xml:space="preserve">string</text>
  <text x="150" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">"hello", 'world'</text>
  <rect x="240" y="124" width="140" height="50" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="310" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" font-weight="600" xml:space="preserve">number</text>
  <text x="310" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">42, 3.14, NaN</text>
  <rect x="80" y="184" width="140" height="50" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="150" y="204" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" font-weight="600" xml:space="preserve">boolean</text>
  <text x="150" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">true, false</text>
  <rect x="240" y="184" width="140" height="50" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="310" y="204" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" font-weight="600" xml:space="preserve">bigint</text>
  <text x="310" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">100n, BigInt(9)</text>
  <rect x="80" y="244" width="140" height="34" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="150" y="266" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" font-weight="600" xml:space="preserve">symbol</text>
  <rect x="240" y="244" width="140" height="34" rx="6" fill="#1a1010" stroke="#6a3a3a" stroke-width="1"/>
  <text x="310" y="266" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#ce9178" font-weight="600" xml:space="preserve">undefined</text>
  <!-- Special types -->
  <rect x="460" y="90" width="360" height="200" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">특수 타입 (Special)</text>
  <rect x="480" y="124" width="140" height="50" rx="6" fill="#2a1010" stroke="#6a2a2a" stroke-width="1"/>
  <text x="550" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#e05555" font-weight="600" xml:space="preserve">any</text>
  <text x="550" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">타입 검사 포기</text>
  <rect x="640" y="124" width="140" height="50" rx="6" fill="#2a1010" stroke="#6a2a2a" stroke-width="1"/>
  <text x="710" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#e05555" font-weight="600" xml:space="preserve">unknown</text>
  <text x="710" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">안전한 any 대안</text>
  <rect x="480" y="184" width="140" height="50" rx="6" fill="#1a1a2e" stroke="#4a4a8e" stroke-width="1"/>
  <text x="550" y="204" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7777cc" font-weight="600" xml:space="preserve">void</text>
  <text x="550" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">반환값 없음</text>
  <rect x="640" y="184" width="140" height="50" rx="6" fill="#1a1a2e" stroke="#4a4a8e" stroke-width="1"/>
  <text x="710" y="204" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7777cc" font-weight="600" xml:space="preserve">never</text>
  <text x="710" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">도달 불가 타입</text>
  <rect x="480" y="244" width="300" height="34" rx="6" fill="#1a1010" stroke="#6a3a3a" stroke-width="1"/>
  <text x="630" y="266" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#ce9178" font-weight="600" xml:space="preserve">null</text>
  <text x="700" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">명시적 없음</text>
  <!-- Object-like types -->
  <rect x="60" y="308" width="760" height="90" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">객체 타입 (Object)</text>
  <rect x="80" y="342" width="130" height="44" rx="6" fill="#0a1a10" stroke="#2a6a2a" stroke-width="1"/>
  <text x="145" y="366" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">object</text>
  <rect x="228" y="342" width="130" height="44" rx="6" fill="#0a1a10" stroke="#2a6a2a" stroke-width="1"/>
  <text x="293" y="358" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">Array&lt;T&gt;</text>
  <text x="293" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">T[]</text>
  <rect x="376" y="342" width="130" height="44" rx="6" fill="#0a1a10" stroke="#2a6a2a" stroke-width="1"/>
  <text x="441" y="366" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">tuple</text>
  <rect x="524" y="342" width="130" height="44" rx="6" fill="#0a1a10" stroke="#2a6a2a" stroke-width="1"/>
  <text x="589" y="366" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">interface</text>
  <rect x="672" y="342" width="130" height="44" rx="6" fill="#0a1a10" stroke="#2a6a2a" stroke-width="1"/>
  <text x="737" y="366" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">class</text>
  <!-- Bottom note -->
  <rect x="60" y="416" width="760" height="64" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">타입 주석 없이도 TypeScript는 타입을 추론한다</text>
  <text x="440" y="458" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">let x = 42</text>
  <text x="550" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"> // 추론: x: number</text>
  <text x="440" y="473" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">초기값이 있으면 타입 주석 생략 가능. 단, 나중에 다른 타입 할당은 불가.</text>
</svg>
