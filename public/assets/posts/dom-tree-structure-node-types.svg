<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">노드 타입 (nodeType) 상수</text>

  <!-- 테이블 헤더 -->
  <rect x="60" y="72" width="760" height="34" fill="#1a2235" rx="6"/>
  <text x="140" y="94" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">상수</text>
  <text x="300" y="94" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">값</text>
  <text x="520" y="94" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">설명</text>

  <!-- 행 1 -->
  <rect x="60" y="106" width="760" height="32" fill="#111827" rx="0"/>
  <text x="140" y="127" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">ELEMENT_NODE</text>
  <text x="300" y="127" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">1</text>
  <text x="520" y="127" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">&lt;div&gt;, &lt;p&gt; 등 HTML 요소</text>

  <!-- 행 2 -->
  <rect x="60" y="138" width="760" height="32" fill="#0d1117" rx="0"/>
  <text x="140" y="159" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">TEXT_NODE</text>
  <text x="300" y="159" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">3</text>
  <text x="520" y="159" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">태그 사이의 텍스트 (공백 포함)</text>

  <!-- 행 3 -->
  <rect x="60" y="170" width="760" height="32" fill="#111827" rx="0"/>
  <text x="140" y="191" fill="#7777cc" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">COMMENT_NODE</text>
  <text x="300" y="191" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">8</text>
  <text x="520" y="191" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">&lt;!-- 주석 --&gt;</text>

  <!-- 행 4 -->
  <rect x="60" y="202" width="760" height="32" fill="#0d1117" rx="0"/>
  <text x="140" y="223" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">DOCUMENT_NODE</text>
  <text x="300" y="223" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">9</text>
  <text x="520" y="223" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">document 객체 자체</text>

  <!-- 행 5 -->
  <rect x="60" y="234" width="760" height="32" fill="#111827" rx="0"/>
  <text x="140" y="255" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">DOCUMENT_TYPE_NODE</text>
  <text x="300" y="255" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">10</text>
  <text x="520" y="255" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">&lt;!DOCTYPE html&gt;</text>

  <!-- 행 6 -->
  <rect x="60" y="266" width="760" height="32" fill="#0d1117" rx="0"/>
  <text x="140" y="287" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">DOCUMENT_FRAGMENT</text>
  <text x="300" y="287" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">11</text>
  <text x="520" y="287" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">DocumentFragment 노드</text>

  <!-- 코드 블록 -->
  <rect x="60" y="320" width="760" height="100" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="346" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 노드 타입 확인</text>
  <text x="80" y="364" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">document.nodeType;          </text>
  <text x="340" y="364" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 9 (DOCUMENT_NODE)</text>
  <text x="80" y="382" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">document.body.nodeType;     </text>
  <text x="340" y="382" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 1 (ELEMENT_NODE)</text>
  <text x="80" y="400" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">node.nodeType === Node.TEXT_NODE;  </text>
  <text x="400" y="400" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 텍스트 노드 판별</text>
  <text x="80" y="418" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">node instanceof Element;    </text>
  <text x="340" y="418" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// Element 인스턴스 확인</text>
</svg>
