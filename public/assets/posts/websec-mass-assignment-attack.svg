<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <defs>
    <marker id="arrow-red" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">&#xB9E4;&#xC2A4; &#xC5B4;&#xC0AC;&#xC778;&#xBA3C;&#xD2B8;: &#xACF5;&#xACA9; &#xD750;&#xB984;</text>

  <!-- Step labels -->
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">&#x2460; &#xACF5;&#xACA9;&#xC790;</text>
  <text x="440" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">&#x2461; API &#xC11C;&#xBC84;</text>
  <text x="780" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">&#x2462; &#xB370;&#xC774;&#xD130;&#xBCA0;&#xC774;&#xC2A4;</text>

  <!-- Attacker box -->
  <rect x="20" y="98" width="120" height="50" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">Attacker</text>

  <!-- API Server box -->
  <rect x="330" y="98" width="220" height="50" rx="8" fill="#0a1020" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">POST /api/user</text>

  <!-- Database box -->
  <rect x="710" y="98" width="140" height="50" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="780" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Database</text>
  <text x="780" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">admin: true !</text>

  <!-- Arrow 1: Attacker to API -->
  <line x1="142" y1="123" x2="328" y2="123" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-red)"/>
  <text x="235" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">&#xC545;&#xC131; &#xC694;&#xCCAD; &#xC804;&#xC1A1;</text>

  <!-- Arrow 2: API to DB -->
  <line x1="552" y1="123" x2="708" y2="123" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-red)"/>
  <text x="630" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">&#xC804;&#xCCB4; &#xD544;&#xB4DC; &#xC800;&#xC7A5;</text>

  <!-- Request JSON code box -->
  <rect x="20" y="172" width="390" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="36" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">&#xC694;&#xCCAD; &#xBCF8;&#xBB38; (&#xACF5;&#xACA9;&#xC790;&#xAC00; &#xC804;&#xC1A1;)</text>
  <text x="36" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// POST /api/user</text>
  <text x="36" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="36" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  "name": <tspan fill="#ce9178">"alice"</tspan>,</text>
  <text x="36" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">  "isAdmin": true,</text>
  <text x="36" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">  "role": <tspan fill="#ce9178">"admin"</tspan></text>
  <text x="36" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- User model code box -->
  <rect x="430" y="172" width="430" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">User &#xBAA8;&#xB378; (&#xCDE8;&#xC57D;&#xD55C; &#xBC14;&#xC778;&#xB529;)</text>
  <text x="446" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// &#x274C; &#xBAA8;&#xB4E0; req.body &#xD544;&#xB4DC; &#xD5C8;&#xC6A9;</text>
  <text x="446" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const </text><text x="508" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">user =</text>
  <text x="446" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  User.create(req.body)</text>
  <text x="446" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// isAdmin, role &#xB3C4; &#xD568;&#xAED8; &#xC800;&#xC7A5;&#xB428;!</text>
  <text x="446" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// &#x2192; &#xAD8C;&#xD55C; &#xC0C1;&#xC2B9; &#xACF5;&#xACA9; &#xC131;&#xACF5;</text>

  <!-- Result box -->
  <rect x="20" y="344" width="840" height="96" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">&#xACF5;&#xACA9; &#xACB0;&#xACFC;</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">&#xC77C;&#xBC18; &#xC0AC;&#xC6A9;&#xC790; alice&#xAC00; isAdmin: true, role: "admin" &#xC73C;&#xB85C; DB&#xC5D0; &#xC800;&#xC7A5;&#xB428;</text>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">&#xC11C;&#xBC84;&#xAC00; req.body &#xB97C; &#xD544;&#xD130;&#xB9C1; &#xC5C6;&#xC774; &#xBAA8;&#xB378;&#xC5D0; &#xC9C1;&#xC811; &#xBC14;&#xC778;&#xB529;&#xD558;&#xAE30; &#xB54C;&#xBB38;&#xC5D0; &#xBC1C;&#xC0DD;</text>
</svg>
