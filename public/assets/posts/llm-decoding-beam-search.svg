<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Beam Search 트리 (beam_width = 3)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">각 스텝에서 상위 3개 빔(후보 시퀀스)을 유지하며 탐색</text>

  <!-- Step labels at top -->
  <text x="110" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Start</text>
  <text x="280" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Step 1</text>
  <text x="490" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Step 2</text>
  <text x="700" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Step 3 (최종)</text>

  <!-- START NODE -->
  <rect x="60" y="218" width="100" height="36" fill="#1a1f2e" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="110" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">&lt;start&gt;</text>

  <!-- Lines from start to step1 beams -->
  <!-- Line to "The" (top beam) -->
  <line x1="160" y1="236" x2="208" y2="168" stroke="#7777cc" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Line to "A" (middle beam) -->
  <line x1="160" y1="236" x2="208" y2="236" stroke="#7777cc" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Line to "In" (bottom beam) -->
  <line x1="160" y1="236" x2="208" y2="304" stroke="#7777cc" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- STEP 1 BEAMS -->
  <!-- Beam 1: "The" log_prob=-0.4 -->
  <rect x="208" y="150" width="100" height="36" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="258" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">The</text>
  <text x="258" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">−0.40</text>

  <!-- Beam 2: "A" log_prob=-0.7 -->
  <rect x="208" y="218" width="100" height="36" fill="#1a2a1a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="258" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">A</text>
  <text x="258" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">−0.70</text>

  <!-- Beam 3: "In" log_prob=-1.1 -->
  <rect x="208" y="286" width="100" height="36" fill="#1a2a1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="258" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">In</text>
  <text x="258" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">−1.10</text>

  <!-- Lines from step1 to step2 - showing expansions and pruning -->
  <!-- From "The" to top 2 expansions -->
  <line x1="308" y1="168" x2="418" y2="134" stroke="#55c555" stroke-width="2"/>
  <line x1="308" y1="168" x2="418" y2="202" stroke="#55c555" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- from "The" to pruned (shown lighter) -->
  <line x1="308" y1="168" x2="418" y2="270" stroke="#333" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- From "A" expanding -->
  <line x1="308" y1="236" x2="418" y2="338" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="308" y1="236" x2="418" y2="270" stroke="#333" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- From "In" pruned mostly -->
  <line x1="308" y1="304" x2="418" y2="406" stroke="#333" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- STEP 2 BEAMS (top 3 from all expansions) -->
  <!-- "The future" -0.85 (best) -->
  <rect x="418" y="116" width="130" height="36" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="483" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">The future</text>
  <text x="483" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">−0.85</text>

  <!-- "The world" -1.10 -->
  <rect x="418" y="184" width="130" height="36" fill="#1a2a1a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="483" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">The world</text>
  <text x="483" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">−1.10</text>

  <!-- Pruned node (faded) -->
  <rect x="418" y="252" width="130" height="36" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="483" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">The great</text>
  <text x="483" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">−1.50 (pruned)</text>

  <!-- "A new" -1.35 -->
  <rect x="418" y="320" width="130" height="36" fill="#1a2a1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="483" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">A new</text>
  <text x="483" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">−1.35</text>

  <!-- Pruned -->
  <rect x="418" y="388" width="130" height="36" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="483" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">In the</text>
  <text x="483" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">−1.80 (pruned)</text>

  <!-- Lines to step 3 -->
  <line x1="548" y1="134" x2="628" y2="134" stroke="#55c555" stroke-width="2"/>
  <line x1="548" y1="202" x2="628" y2="236" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="548" y1="338" x2="628" y2="338" stroke="#7777cc" stroke-width="1.5"/>

  <!-- STEP 3: Final beams -->
  <!-- Best: "The future of" -1.30 -->
  <rect x="628" y="116" width="192" height="36" fill="#0d2010" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="724" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">The future of AI</text>
  <text x="724" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">−1.30 ★ 최고 점수</text>

  <!-- 2nd: "The world is" -1.65 -->
  <rect x="628" y="218" width="192" height="36" fill="#1a2a1a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="724" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">The world is</text>
  <text x="724" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">−1.65</text>

  <!-- 3rd: "A new era" -1.90 -->
  <rect x="628" y="320" width="192" height="36" fill="#1a2a1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="724" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">A new era</text>
  <text x="724" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">−1.90</text>

  <!-- Bottom note -->
  <rect x="60" y="444" width="760" height="40" fill="#111827" rx="6"/>
  <text x="440" y="461" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">누적 로그 확률이 가장 높은 시퀀스가 최종 출력.</text>
  <text x="440" y="477" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">각 스텝에서 beam_width 개의 후보만 유지 → 완전 탐색보다 훨씬 효율적</text>
</svg>
