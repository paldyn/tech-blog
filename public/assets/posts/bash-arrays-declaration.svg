<svg width="880" height="520" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Bash 배열 선언과 접근</text>

  <!-- Indexed Array Section -->
  <rect x="60" y="70" width="370" height="190" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="245" y="96" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">인덱스 배열</text>

  <rect x="76" y="106" width="338" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 선언 방법</text>
  <text x="92" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">fruits</tspan><tspan fill="#ffffff">=("apple" "banana" "cherry")</tspan></text>
  <text x="92" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">nums</tspan><tspan fill="#ffffff">=(1 2 3 4 5)</tspan></text>
  <text x="92" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 접근</text>
  <text x="92" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${fruits[0]}   </tspan><tspan fill="#9aa4b8"># apple</tspan></text>
  <text x="92" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${fruits[@]}   </tspan><tspan fill="#9aa4b8"># 전체</tspan></text>
  <text x="92" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${#fruits[@]}  </tspan><tspan fill="#9aa4b8"># 길이=3</tspan></text>

  <!-- Associative Array Section -->
  <rect x="450" y="70" width="370" height="190" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="635" y="96" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">연관 배열</text>

  <rect x="466" y="106" width="338" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 선언 (-A 필수)</text>
  <text x="482" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">declare</tspan><tspan fill="#ffffff"> -A user</tspan></text>
  <text x="482" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">user[</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff">]=</tspan><tspan fill="#ce9178">"Alice"</tspan></text>
  <text x="482" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">user[</tspan><tspan fill="#ce9178">"age"</tspan><tspan fill="#ffffff">]=</tspan><tspan fill="#b5cea8">30</tspan></text>
  <text x="482" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 접근</text>
  <text x="482" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${user[</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff">]}</tspan></text>
  <text x="482" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${!user[@]}</tspan><tspan fill="#9aa4b8"> # 키 목록</tspan></text>

  <!-- Bottom: Array Operations -->
  <rect x="60" y="276" width="760" height="200" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="302" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">배열 조작 패턴</text>

  <rect x="76" y="312" width="340" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="332" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 요소 추가·삭제</text>
  <text x="92" y="350" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">fruits</tspan><tspan fill="#ffffff">+=("date")</tspan><tspan fill="#9aa4b8">  # 추가</tspan></text>
  <text x="92" y="368" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">unset</tspan><tspan fill="#ffffff"> fruits[1]</tspan><tspan fill="#9aa4b8">  # 삭제</tspan></text>
  <text x="92" y="386" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 슬라이스</text>
  <text x="92" y="404" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> "${fruits[@]:1:2}"</tspan></text>
  <text x="92" y="422" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 배열 병합</text>
  <text x="92" y="440" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">all</tspan><tspan fill="#ffffff">=("${a[@]}" "${b[@]}")</tspan></text>

  <rect x="430" y="312" width="374" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="332" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 반복 (원소 보존)</text>
  <text x="446" y="350" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> item </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> "${fruits[@]}"; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="446" y="368" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> "$item"</tspan></text>
  <text x="446" y="386" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="446" y="404" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 인덱스와 함께</text>
  <text x="446" y="422" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> "${!fruits[@]}"; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="446" y="440" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> "$i: ${fruits[$i]}"</tspan></text>
  <text x="446" y="458" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
</svg>
