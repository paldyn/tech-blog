<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">ping 출력 분석</text>

  <!-- Code block -->
  <rect x="60" y="58" width="760" height="190" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="82" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">$ ping -c 5 google.com</text>
  <text x="76" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># ICMP seq=1 ttl=118 time=31.2 ms</text>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># ICMP seq=2 ttl=118 time=29.8 ms</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># ICMP seq=3 ttl=118 time=33.1 ms</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># ICMP seq=4 ttl=118 time=30.5 ms</text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># ICMP seq=5 ttl=118 time=31.0 ms</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">rtt min/avg/max/mdev = 29.8/31.1/33.1/1.1 ms</text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">#  min=29.8ms  avg=31.1ms  max=33.1ms  mdev=1.1ms</text>
  <text x="600" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve">← 지터(mdev)</text>

  <!-- Annotation boxes -->
  <rect x="60" y="267" width="360" height="38" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">mdev (mean deviation) = 지터</text>
  <text x="240" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">낮을수록 안정적인 네트워크</text>

  <rect x="460" y="267" width="360" height="38" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">음성 통화 권장: 지터 &lt; 30ms</text>
  <text x="640" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">게임: RTT &lt; 50ms, 지터 &lt; 10ms</text>
</svg>
