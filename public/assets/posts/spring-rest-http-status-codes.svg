<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">HTTP 상태 코드 분류</text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">응답 코드가 의미를 가져야 API가 신뢰를 얻는다</text>

  <!-- ── Left column: 2xx and 3xx ── -->

  <!-- 2xx header -->
  <rect x="60" y="94" width="370" height="30" rx="6" fill="#0a2e0a"/>
  <text x="76" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">2xx — Success</text>

  <!-- 2xx rows -->
  <rect x="60" y="130" width="370" height="26" rx="4" fill="#0c1a0c"/>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">200 OK</text>
  <text x="190" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">요청 성공 — 조회(GET), 수정(PUT/PATCH)</text>

  <rect x="60" y="160" width="370" height="26" rx="4" fill="#0a0a0a"/>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">201 Created</text>
  <text x="190" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">생성 성공 — POST 후 Location 헤더 포함</text>

  <rect x="60" y="190" width="370" height="26" rx="4" fill="#0c1a0c"/>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">204 No Content</text>
  <text x="190" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">성공이나 응답 본문 없음 — DELETE</text>

  <rect x="60" y="220" width="370" height="26" rx="4" fill="#0a0a0a"/>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">206 Partial Content</text>
  <text x="190" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Range 요청 부분 응답 (파일 다운로드)</text>

  <!-- 3xx header -->
  <rect x="60" y="268" width="370" height="30" rx="6" fill="#0a1a2e"/>
  <text x="76" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">3xx — Redirection</text>

  <rect x="60" y="304" width="370" height="26" rx="4" fill="#0c1520"/>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">301 Moved Permanently</text>
  <text x="76" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">영구 이동 — Location에 새 URI, 검색엔진 반영</text>

  <rect x="60" y="354" width="370" height="26" rx="4" fill="#0a0a0a"/>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">304 Not Modified</text>
  <text x="76" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">조건부 GET — ETag 일치 시 본문 없이 캐시 사용</text>

  <!-- ── Right column: 4xx and 5xx ── -->

  <!-- 4xx header -->
  <rect x="450" y="94" width="370" height="30" rx="6" fill="#2e1a0a"/>
  <text x="466" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e08844">4xx — Client Error</text>

  <rect x="450" y="130" width="370" height="26" rx="4" fill="#201008"/>
  <text x="466" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e08844" font-weight="600">400 Bad Request</text>
  <text x="600" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">요청 형식·파라미터 오류</text>

  <rect x="450" y="160" width="370" height="26" rx="4" fill="#0a0a0a"/>
  <text x="466" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e08844" font-weight="600">401 Unauthorized</text>
  <text x="600" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">인증 없음 또는 토큰 만료</text>

  <rect x="450" y="190" width="370" height="26" rx="4" fill="#201008"/>
  <text x="466" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e08844" font-weight="600">403 Forbidden</text>
  <text x="600" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">인증됨 but 권한 없음</text>

  <rect x="450" y="220" width="370" height="26" rx="4" fill="#0a0a0a"/>
  <text x="466" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e08844" font-weight="600">404 Not Found</text>
  <text x="600" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">리소스 없음</text>

  <rect x="450" y="250" width="370" height="26" rx="4" fill="#201008"/>
  <text x="466" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e08844" font-weight="600">405 Method Not Allowed</text>
  <text x="600" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">허용되지 않은 HTTP 메서드</text>

  <rect x="450" y="280" width="370" height="26" rx="4" fill="#0a0a0a"/>
  <text x="466" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e08844" font-weight="600">409 Conflict</text>
  <text x="600" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">충돌 (중복 이메일 등)</text>

  <rect x="450" y="310" width="370" height="26" rx="4" fill="#201008"/>
  <text x="466" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e08844" font-weight="600">422 Unprocessable Entity</text>
  <text x="600" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">형식 OK, 비즈니스 검증 실패</text>

  <rect x="450" y="340" width="370" height="26" rx="4" fill="#0a0a0a"/>
  <text x="466" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e08844" font-weight="600">429 Too Many Requests</text>
  <text x="600" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">요청 빈도 초과 (Rate Limiting)</text>

  <!-- 5xx header -->
  <rect x="450" y="386" width="370" height="30" rx="6" fill="#2e0a0a"/>
  <text x="466" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">5xx — Server Error</text>

  <rect x="450" y="422" width="370" height="26" rx="4" fill="#200808"/>
  <text x="466" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">500 Internal Server Error</text>
  <text x="466" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버 내부 오류 (예외 미처리)</text>

  <rect x="450" y="468" width="370" height="26" rx="4" fill="#0a0a0a"/>
  <text x="466" y="486" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">503 Service Unavailable</text>
</svg>
