<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-q" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">개방 주소법 — Linear vs Quadratic Probing</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">충돌 시 배열 내 다른 슬롯을 탐색 — 링크드 리스트 없이 처리</text>

    <!-- Section titles -->
    <text x="220" y="100" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">선형 탐사 (Linear Probing)</text>
    <text x="660" y="100" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">이차 탐사 (Quadratic Probing)</text>
    <line x1="440" y1="82" x2="440" y2="460" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- ===== Linear Probing side ===== -->
    <!-- Scenario: insert key K with h(K)=3, slots 3,4 occupied -->
    <text x="220" y="122" font-size="12" fill="#888" text-anchor="middle">h(K) = 3, 슬롯 3·4 점유 → 슬롯 5에 삽입</text>

    <!-- Hash table slots 0-7 horizontal bar -->
    <!-- Slot labels -->
    <text x="72" y="160" font-size="11" fill="#888" text-anchor="middle">idx</text>
    <text x="72" y="200" font-size="11" fill="#888" text-anchor="middle">값</text>

    <!-- Slot boxes for linear side (indices 0-7) -->
    <!-- Slot 0 -->
    <rect x="88" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="106" y="158" font-size="10" fill="#555" text-anchor="middle">0</text>
    <text x="106" y="172" font-size="11" fill="#555" text-anchor="middle">—</text>
    <!-- Slot 1 -->
    <rect x="126" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="144" y="158" font-size="10" fill="#555" text-anchor="middle">1</text>
    <text x="144" y="172" font-size="11" fill="#e8e8e8" text-anchor="middle">A</text>
    <!-- Slot 2 -->
    <rect x="164" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="182" y="158" font-size="10" fill="#555" text-anchor="middle">2</text>
    <text x="182" y="172" font-size="11" fill="#555" text-anchor="middle">—</text>
    <!-- Slot 3: OCCUPIED -->
    <rect x="202" y="142" width="36" height="36" fill="#2a1010" stroke="#e05555" stroke-width="1.5" rx="3"/>
    <text x="220" y="158" font-size="10" fill="#888" text-anchor="middle">3</text>
    <text x="220" y="172" font-size="11" fill="#e05555" text-anchor="middle">B</text>
    <!-- Slot 4: OCCUPIED -->
    <rect x="240" y="142" width="36" height="36" fill="#2a1010" stroke="#e05555" stroke-width="1.5" rx="3"/>
    <text x="258" y="158" font-size="10" fill="#888" text-anchor="middle">4</text>
    <text x="258" y="172" font-size="11" fill="#e05555" text-anchor="middle">C</text>
    <!-- Slot 5: TARGET -->
    <rect x="278" y="142" width="36" height="36" fill="#0d2a12" stroke="#55c555" stroke-width="2" rx="3"/>
    <text x="296" y="158" font-size="10" fill="#888" text-anchor="middle">5</text>
    <text x="296" y="172" font-size="11" fill="#55c555" text-anchor="middle">K</text>
    <!-- Slot 6 -->
    <rect x="316" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="334" y="158" font-size="10" fill="#555" text-anchor="middle">6</text>
    <text x="334" y="172" font-size="11" fill="#555" text-anchor="middle">—</text>
    <!-- Slot 7 -->
    <rect x="354" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="372" y="158" font-size="10" fill="#555" text-anchor="middle">7</text>
    <text x="372" y="172" font-size="11" fill="#555" text-anchor="middle">—</text>

    <!-- Probe arrows (linear: 3→4→5) -->
    <path d="M 220 178 Q 220 210 239 218 Q 258 226 258 210 Q 258 198 258 178" fill="none" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="240" y="232" font-size="10" fill="#e05555" text-anchor="middle">충돌!</text>
    <path d="M 258 178 Q 258 250 277 258 Q 296 266 296 250 Q 296 220 296 178" fill="none" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="278" y="272" font-size="10" fill="#e05555" text-anchor="middle">충돌!</text>
    <!-- Marker for last probe -->
    <defs>
      <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
              markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto">
        <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
      </marker>
    </defs>
    <path d="M 296 275 L 296 180" fill="none" stroke="#55c555" stroke-width="2" marker-end="url(#arr-r)"/>
    <text x="314" y="282" font-size="10" fill="#55c555">삽입!</text>

    <!-- Formula -->
    <rect x="68" y="300" width="350" height="56" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="88" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 선형 탐사 공식</text>
    <text x="88" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">h(k,i) = (h(k) + i) % m</text>
    <text x="88" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">i = 0,1,2,3 ...</text>

    <text x="220" y="386" font-size="12" fill="#e05555" text-anchor="middle">단점: 클러스터링(연속 점유) 발생</text>

    <!-- ===== Quadratic Probing side ===== -->
    <text x="660" y="122" font-size="12" fill="#888" text-anchor="middle">h(K) = 3, 슬롯 3 점유 → 3+1², 3+2² 순으로 탐사</text>

    <!-- Slot boxes for quadratic side (indices 0-7) -->
    <text x="512" y="160" font-size="11" fill="#888" text-anchor="middle">idx</text>
    <text x="512" y="200" font-size="11" fill="#888" text-anchor="middle">값</text>
    <!-- Slot 0 -->
    <rect x="528" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="546" y="158" font-size="10" fill="#555" text-anchor="middle">0</text>
    <text x="546" y="172" font-size="11" fill="#555" text-anchor="middle">—</text>
    <!-- Slot 1 -->
    <rect x="566" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="584" y="158" font-size="10" fill="#555" text-anchor="middle">1</text>
    <text x="584" y="172" font-size="11" fill="#555" text-anchor="middle">—</text>
    <!-- Slot 2 -->
    <rect x="604" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="622" y="158" font-size="10" fill="#555" text-anchor="middle">2</text>
    <text x="622" y="172" font-size="11" fill="#555" text-anchor="middle">—</text>
    <!-- Slot 3: OCCUPIED -->
    <rect x="642" y="142" width="36" height="36" fill="#2a1010" stroke="#e05555" stroke-width="1.5" rx="3"/>
    <text x="660" y="158" font-size="10" fill="#888" text-anchor="middle">3</text>
    <text x="660" y="172" font-size="11" fill="#e05555" text-anchor="middle">B</text>
    <!-- Slot 4: TARGET (3+1²=4) -->
    <rect x="680" y="142" width="36" height="36" fill="#0d2a1e" stroke="#55c555" stroke-width="2" rx="3"/>
    <text x="698" y="158" font-size="10" fill="#888" text-anchor="middle">4</text>
    <text x="698" y="172" font-size="11" fill="#55c555" text-anchor="middle">K</text>
    <!-- Slot 5 -->
    <rect x="718" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="736" y="158" font-size="10" fill="#555" text-anchor="middle">5</text>
    <text x="736" y="172" font-size="11" fill="#555" text-anchor="middle">—</text>
    <!-- Slot 6 -->
    <rect x="756" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="774" y="158" font-size="10" fill="#555" text-anchor="middle">6</text>
    <text x="774" y="172" font-size="11" fill="#555" text-anchor="middle">—</text>
    <!-- Slot 7 -->
    <rect x="794" y="142" width="36" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="812" y="158" font-size="10" fill="#555" text-anchor="middle">7</text>
    <text x="812" y="172" font-size="11" fill="#555" text-anchor="middle">—</text>

    <!-- Probe arrow: 3→4 (jump 1) -->
    <path d="M 660 178 Q 660 225 679 233 Q 698 241 698 225 Q 698 198 698 178" fill="none" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="680" y="248" font-size="10" fill="#e05555" text-anchor="middle">충돌!</text>
    <path d="M 698 250 L 698 181" fill="none" stroke="#55c555" stroke-width="2" marker-end="url(#arr-q)"/>
    <text x="716" y="255" font-size="10" fill="#55c555">삽입!</text>

    <!-- Formula -->
    <rect x="508" y="300" width="352" height="56" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="528" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 이차 탐사 공식</text>
    <text x="528" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">h(k,i) = (h(k) + i²) % m</text>
    <text x="528" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">i = 0,1,2,3 ...</text>

    <text x="660" y="386" font-size="12" fill="#55c555" text-anchor="middle">클러스터링 감소 — 2차 클러스터만 존재</text>

    <!-- Bottom note -->
    <text x="440" y="440" font-size="12" fill="#888" text-anchor="middle">삭제 시 실제 제거 대신 DELETED 마커(Tombstone) 사용 — 검색 체인 보존</text>
    <text x="440" y="458" font-size="12" fill="#888" text-anchor="middle">모든 개방 주소법: 부하율 α &lt; 0.7 유지 필수</text>
  </g>
</svg>
