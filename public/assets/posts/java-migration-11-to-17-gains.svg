<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">11 → 17로 얻는 언어 기능</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">12~17에 걸쳐 정식화된 기능들이 한꺼번에 활성화된다</text>

  <!-- 6 feature cards, 3x2 -->
  <rect x="60" y="100" width="240" height="90" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">Records</text>
  <text x="180" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">불변 데이터 클래스를</text>
  <text x="180" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">한 줄로 (JDK 16)</text>

  <rect x="320" y="100" width="240" height="90" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">Sealed Classes</text>
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">상속 계층을 봉인</text>
  <text x="440" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">(JDK 17)</text>

  <rect x="580" y="100" width="240" height="90" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">Switch 표현식</text>
  <text x="700" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">값을 반환하는 switch</text>
  <text x="700" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">(JDK 14)</text>

  <rect x="60" y="210" width="240" height="90" rx="8" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Text Blocks</text>
  <text x="180" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">여러 줄 문자열 리터럴</text>
  <text x="180" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">(JDK 15)</text>

  <rect x="320" y="210" width="240" height="90" rx="8" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">패턴 매칭</text>
  <text x="440" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">instanceof 후 자동 캐스팅</text>
  <text x="440" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">(JDK 16)</text>

  <rect x="580" y="210" width="240" height="90" rx="8" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="700" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">향상된 NPE 메시지</text>
  <text x="700" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">어떤 변수가 null인지</text>
  <text x="700" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">명시 (JDK 14)</text>

  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">모두 하위 호환 — 기존 코드는 그대로 컴파일되고, 새 기능은 선택적으로 도입</text>
  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">최신 ZGC·Shenandoah 저지연 GC도 정식 사용 가능</text>
</svg>
