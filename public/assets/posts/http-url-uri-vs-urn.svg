<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">URI · URL · URN 관계</text>

  <!-- URI outer box -->
  <rect x="50" y="68" width="780" height="270" rx="12" fill="#0d1219" stroke="#2a3a6a" stroke-width="2"/>
  <text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">URI (Uniform Resource Identifier)</text>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리소스를 고유하게 식별하는 문자열</text>

  <!-- URL inner box -->
  <rect x="80" y="140" width="330" height="170" rx="8" fill="#0b1a0b" stroke="#2a6a2a" stroke-width="1.5"/>
  <text x="245" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">URL</text>
  <text x="245" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Uniform Resource Locator</text>
  <text x="245" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리소스의 위치(Where)로 식별</text>
  <line x1="100" y1="218" x2="390" y2="218" stroke="#1a3a1a" stroke-width="1"/>
  <text x="245" y="238" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">https://example.com/page</text>
  <text x="245" y="260" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">ftp://files.example.com/doc</text>
  <text x="245" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">위치가 바뀌면 링크가 깨짐</text>

  <!-- URN inner box -->
  <rect x="470" y="140" width="330" height="170" rx="8" fill="#1a0f0b" stroke="#6a4a1a" stroke-width="1.5"/>
  <text x="635" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e0a055">URN</text>
  <text x="635" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Uniform Resource Name</text>
  <text x="635" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리소스의 이름(What)으로 식별</text>
  <line x1="490" y1="218" x2="780" y2="218" stroke="#3a2a1a" stroke-width="1"/>
  <text x="635" y="238" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a055" xml:space="preserve">urn:isbn:978-0-13-110362-7</text>
  <text x="635" y="260" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a055" xml:space="preserve">urn:uuid:550e8400-e29b-41d4</text>
  <text x="635" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">위치와 무관한 영구 식별자</text>

  <!-- Bottom note -->
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">웹에서 URI라고 하면 실제로는 URL인 경우가 대부분. URL은 URI의 부분집합.</text>
</svg>
