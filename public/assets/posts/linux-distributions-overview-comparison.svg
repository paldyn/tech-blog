<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">배포판 선택 가이드</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">용도별 추천 배포판</text>

  <!-- Header row -->
  <rect x="60" y="90" width="760" height="36" fill="#161616" rx="4"/>
  <text x="200" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">용도</text>
  <text x="420" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">추천 배포판</text>
  <text x="680" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">이유</text>

  <!-- Rows -->
  <rect x="60" y="130" width="760" height="36" fill="#0d1a0d" rx="0"/>
  <text x="200" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Linux 입문·데스크톱</text>
  <text x="420" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Ubuntu / Linux Mint</text>
  <text x="680" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">넓은 커뮤니티, 하드웨어 지원 우수</text>

  <rect x="60" y="170" width="760" height="36" fill="#0a0a0a" rx="0"/>
  <text x="200" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">프로덕션 서버</text>
  <text x="420" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">RHEL / Ubuntu Server</text>
  <text x="680" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">장기 지원, 기업 보안 패치</text>

  <rect x="60" y="210" width="760" height="36" fill="#0d1a0d" rx="0"/>
  <text x="200" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">최신 패키지·개발</text>
  <text x="420" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Fedora / Arch Linux</text>
  <text x="680" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">최신 커널·소프트웨어 선행 배포</text>

  <rect x="60" y="250" width="760" height="36" fill="#0a0a0a" rx="0"/>
  <text x="200" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">보안 테스트·침투</text>
  <text x="420" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Kali Linux / Parrot OS</text>
  <text x="680" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">보안 도구 번들, CTF 최적화</text>

  <rect x="60" y="290" width="760" height="36" fill="#0d1a0d" rx="0"/>
  <text x="200" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">컨테이너·임베디드</text>
  <text x="420" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Alpine Linux</text>
  <text x="680" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">5MB 이하 초소형 이미지</text>

  <rect x="60" y="330" width="760" height="36" fill="#0a0a0a" rx="0"/>
  <text x="200" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c55a" text-anchor="middle">재현 가능한 인프라</text>
  <text x="420" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">NixOS</text>
  <text x="680" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">선언형 설정, 롤백 보장</text>

  <!-- Column dividers -->
  <line x1="310" y1="90" x2="310" y2="366" stroke="#222" stroke-width="1"/>
  <line x1="530" y1="90" x2="530" y2="366" stroke="#222" stroke-width="1"/>
</svg>
