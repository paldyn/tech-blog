<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">드롭아웃 (Dropout) 메커니즘</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">훈련 시 p 확률로 뉴런을 랜덤하게 비활성화 — 앙상블 효과와 과적합 방지</text>

  <!-- Label: Before dropout -->
  <text x="200" y="104" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600" xml:space="preserve">전체 네트워크</text>
  <text x="200" y="122" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">(드롭아웃 없음)</text>

  <!-- Label: After dropout -->
  <text x="660" y="104" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600" xml:space="preserve">드롭아웃 적용 후</text>
  <text x="660" y="122" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">(p=0.5, 훈련 스텝 1)</text>

  <!-- ===== LEFT: Full network ===== -->
  <!-- Layer 1 nodes -->
  <circle cx="100" cy="185" r="20" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="100" cy="235" r="20" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="100" cy="285" r="20" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="100" cy="335" r="20" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Layer 2 nodes (all active) -->
  <circle cx="220" cy="175" r="20" fill="#0d0a20" stroke="#7777cc" stroke-width="2"/>
  <circle cx="220" cy="225" r="20" fill="#0d0a20" stroke="#7777cc" stroke-width="2"/>
  <circle cx="220" cy="275" r="20" fill="#0d0a20" stroke="#7777cc" stroke-width="2"/>
  <circle cx="220" cy="325" r="20" fill="#0d0a20" stroke="#7777cc" stroke-width="2"/>
  <circle cx="220" cy="375" r="20" fill="#0d0a20" stroke="#7777cc" stroke-width="2"/>

  <!-- Connections L1→L2 (subset) -->
  <line x1="120" y1="185" x2="200" y2="175" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="120" y1="185" x2="200" y2="225" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="120" y1="235" x2="200" y2="225" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="120" y1="235" x2="200" y2="275" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="120" y1="285" x2="200" y2="275" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="120" y1="285" x2="200" y2="325" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="120" y1="335" x2="200" y2="325" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="120" y1="335" x2="200" y2="375" stroke="#1a1a2a" stroke-width="1"/>

  <!-- Layer 3 output -->
  <circle cx="320" cy="260" r="24" fill="#0c1a0c" stroke="#55c555" stroke-width="2"/>
  <text x="320" y="265" text-anchor="middle" fill="#55c555" font-size="13" xml:space="preserve">ŷ</text>
  <line x1="240" y1="175" x2="296" y2="248" stroke="#1a2a1a" stroke-width="1"/>
  <line x1="240" y1="225" x2="296" y2="252" stroke="#1a2a1a" stroke-width="1"/>
  <line x1="240" y1="275" x2="296" y2="260" stroke="#1a2a1a" stroke-width="1"/>
  <line x1="240" y1="325" x2="296" y2="268" stroke="#1a2a1a" stroke-width="1"/>
  <line x1="240" y1="375" x2="296" y2="272" stroke="#1a2a1a" stroke-width="1"/>

  <!-- Arrow between networks -->
  <polygon points="365,256 400,256 400,248 420,260 400,272 400,264 365,264" fill="#555" stroke="#0a0a0a" stroke-width="0.5"/>
  <text x="392" y="240" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">p=0.5</text>
  <text x="392" y="287" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">마스킹</text>

  <!-- ===== RIGHT: Dropout applied ===== -->
  <!-- Layer 1 nodes (all active — dropout not applied to input) -->
  <circle cx="480" cy="185" r="20" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="480" cy="235" r="20" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="480" cy="285" r="20" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="480" cy="335" r="20" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Layer 2 nodes: some dropped (greyed out with X) -->
  <!-- Active -->
  <circle cx="600" cy="175" r="20" fill="#0d0a20" stroke="#7777cc" stroke-width="2"/>
  <!-- Dropped -->
  <circle cx="600" cy="225" r="20" fill="#1a1a1a" stroke="#333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="600" y="230" text-anchor="middle" fill="#333" font-size="16" xml:space="preserve">×</text>
  <!-- Active -->
  <circle cx="600" cy="275" r="20" fill="#0d0a20" stroke="#7777cc" stroke-width="2"/>
  <!-- Dropped -->
  <circle cx="600" cy="325" r="20" fill="#1a1a1a" stroke="#333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="600" y="330" text-anchor="middle" fill="#333" font-size="16" xml:space="preserve">×</text>
  <!-- Active -->
  <circle cx="600" cy="375" r="20" fill="#0d0a20" stroke="#7777cc" stroke-width="2"/>

  <!-- Connections (only active) -->
  <line x1="500" y1="185" x2="580" y2="175" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="500" y1="185" x2="580" y2="275" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="500" y1="235" x2="580" y2="175" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="500" y1="235" x2="580" y2="375" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="500" y1="285" x2="580" y2="275" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="500" y1="285" x2="580" y2="375" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="500" y1="335" x2="580" y2="275" stroke="#1a1a2a" stroke-width="1"/>
  <line x1="500" y1="335" x2="580" y2="175" stroke="#1a1a2a" stroke-width="1"/>

  <!-- Layer 3 output -->
  <circle cx="720" cy="260" r="24" fill="#0c1a0c" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="265" text-anchor="middle" fill="#55c555" font-size="13" xml:space="preserve">ŷ'</text>
  <line x1="620" y1="175" x2="696" y2="254" stroke="#1a2a1a" stroke-width="1"/>
  <line x1="620" y1="275" x2="696" y2="260" stroke="#1a2a1a" stroke-width="1"/>
  <line x1="620" y1="375" x2="696" y2="268" stroke="#1a2a1a" stroke-width="1"/>

  <!-- Scale note (inverted dropout) -->
  <rect x="60" y="418" width="760" height="44" rx="8" fill="#0d0d0d" stroke="#1e1e1e"/>
  <text x="440" y="436" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">스케일 조정 (Inverted Dropout): 훈련 시 출력에 1/(1-p) 곱해 추론 시와 기대값 일치</text>
  <text x="440" y="454" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">mask = Bernoulli(1-p)   →   output = x * mask / (1-p)</text>

  <!-- Footer -->
</svg>
