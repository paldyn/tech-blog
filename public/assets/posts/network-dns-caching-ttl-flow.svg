<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09050"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DNS 캐싱과 TTL 동작 흐름</text>

  <!-- Section A: Cache HIT -->
  <text x="60" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">Cache HIT (TTL 유효)</text>

  <!-- Client -->
  <rect x="60" y="100" width="120" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="120" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Client</text>
  <text x="120" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">example.com?</text>

  <!-- Resolver Cache -->
  <rect x="260" y="100" width="150" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="335" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Resolver Cache</text>
  <text x="335" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">TTL: 2847s 남음</text>

  <!-- Arrow: client to cache -->
  <line x1="180" y1="128" x2="258" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="219" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">질의</text>

  <!-- Arrow: cache to client (green = hit) -->
  <line x1="260" y1="145" x2="182" y2="145" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="219" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">즉시 응답</text>

  <!-- HIT badge -->
  <rect x="460" y="104" width="80" height="28" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">CACHE HIT</text>
  <text x="500" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네트워크 왕복 없음</text>

  <!-- Section B: Cache MISS -->
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">Cache MISS (TTL 만료 / 미존재)</text>

  <!-- Client B -->
  <rect x="60" y="225" width="120" height="56" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="120" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Client</text>
  <text x="120" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">example.com?</text>

  <!-- Resolver Cache B -->
  <rect x="260" y="225" width="150" height="56" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="335" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Resolver Cache</text>
  <text x="335" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">TTL: 만료됨</text>

  <!-- Auth NS -->
  <rect x="480" y="225" width="150" height="56" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="555" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Authoritative NS</text>
  <text x="555" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">권한 있는 서버</text>

  <!-- Arrows B -->
  <line x1="180" y1="253" x2="258" y2="253" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="219" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">질의</text>

  <line x1="410" y1="253" x2="478" y2="253" stroke="#e09050" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="444" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e09050" text-anchor="middle">재귀 질의</text>

  <line x1="480" y1="270" x2="412" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="444" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">응답+새 TTL</text>

  <line x1="260" y1="270" x2="182" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- MISS badge -->
  <rect x="680" y="229" width="80" height="28" rx="6" fill="#3a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="720" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">CACHE MISS</text>
  <text x="720" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">NS까지 왕복</text>

  <!-- TTL Countdown diagram -->
  <text x="60" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">TTL 카운트다운</text>

  <!-- Timeline bar -->
  <rect x="60" y="360" width="760" height="20" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <!-- TTL segments -->
  <rect x="60" y="360" width="380" height="20" rx="4" fill="#1a3a1a" stroke="none"/>
  <rect x="440" y="360" width="190" height="20" rx="4" fill="#2a2a1a" stroke="none"/>
  <rect x="630" y="360" width="95" height="20" rx="4" fill="#3a2a1a" stroke="none"/>
  <rect x="725" y="360" width="95" height="20" rx="4" fill="#3a1a1a" stroke="none"/>

  <text x="250" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">신선 (TTL &gt; 50%)</text>
  <text x="535" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0c050" text-anchor="middle">주의 (25~50%)</text>
  <text x="677" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09050" text-anchor="middle">임박</text>
  <text x="772" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">만료</text>

  <text x="60" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">t=0 (캐시 저장)</text>
  <text x="820" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">t=TTL (만료)</text>

  <!-- Code block: dig output -->
  <rect x="60" y="420" width="760" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="440" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">; dig example.com A</text>
  <text x="76" y="458" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">example.com.  <tspan fill="#b5cea8">3600</tspan>  IN  <tspan fill="#7ec8e3" font-weight="600">A</tspan>  <tspan fill="#ce9178">93.184.216.34</tspan></text>
  <text x="76" y="476" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">;; Query time: 1 msec  (캐시 히트)</text>
  <text x="76" y="494" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">;; Query time: 48 msec (캐시 미스)</text>
</svg>
