<svg xmlns="http://www.w3.org/2000/svg" width="880" height="378" viewBox="0 0 880 378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="378" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">ImagePullBackOff 단골 원인</text>
  <text x="50" y="80" font-size="14" fill="#888">Events 메시지가 어느 갈래인지 거의 정확히 알려준다</text>

  <rect x="50" y="105" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="130" font-size="13" font-weight="600" fill="#ffffff">오타·없는 태그 — manifest unknown / not found</text>
  <text x="66" y="151" font-size="12" fill="#9aa4b8">이미지 이름·태그 확인. :latest 대신 명시적 태그를 권장</text>

  <rect x="50" y="173" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="198" font-size="13" font-weight="600" fill="#ffffff">프라이빗 레지스트리 인증 실패 — unauthorized / denied</text>
  <text x="66" y="219" font-size="12" fill="#9aa4b8">imagePullSecrets 누락. docker-registry 시크릿 생성·연결</text>

  <rect x="50" y="241" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="266" font-size="13" font-weight="600" fill="#ffffff">Docker Hub 레이트 리밋 — toomanyrequests</text>
  <text x="66" y="287" font-size="12" fill="#9aa4b8">인증된 풀 사용 또는 미러·캐시 레지스트리 도입</text>

  <rect x="50" y="309" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="334" font-size="13" font-weight="600" fill="#ffffff">아키텍처 불일치·네트워크 차단 — no match for platform / timeout</text>
  <text x="66" y="355" font-size="12" fill="#9aa4b8">arm64/amd64 멀티아치 확인, 노드의 레지스트리 도달성 점검</text>
</svg>
