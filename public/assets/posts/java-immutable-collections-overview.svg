<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Java 불변 컬렉션 — 진화 역사</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Java 5 → 8 → 9 → 10 단계별 개선</text>

  <!-- Java 5-8 era -->
  <rect x="60" y="88" width="340" height="180" fill="#1a1a0a" rx="8" stroke="#888" stroke-width="1.5"/>
  <text x="230" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Java 5~8 — 번거로운 방식</text>
  <text x="80" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Arrays.asList("a","b") — 고정 크기, null 허용</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Collections.unmodifiableList(...)  — 얕은 방어</text>
  <text x="80" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">원본 변경 시 뷰에 반영됨</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">2단계 작성 불편: 생성 + 래핑 + 할당</text>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Guava ImmutableList 많이 사용</text>
  <text x="80" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">null 원소 허용 가능 → 방어 실패 위험</text>

  <!-- Java 9+ era -->
  <rect x="470" y="88" width="350" height="180" fill="#0f2010" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="645" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Java 9+ — List/Set/Map.of()</text>
  <text x="490" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">진짜 불변: add/set/remove 모두 UnsupportedOp</text>
  <text x="490" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">null 원소 · null 키 즉시 NullPointerException</text>
  <text x="490" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Set/Map: 중복 키 즉시 IllegalArgumentException</text>
  <text x="490" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">반복 순서: List 보장, Set/Map 미보장</text>
  <text x="490" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">내부 최적화: 소규모는 배열 기반 구현</text>
  <text x="490" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">직렬화 가능 (Serializable 구현)</text>

  <!-- Java 10 copyOf -->
  <rect x="60" y="294" width="340" height="128" fill="#0f1f30" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">Java 10 — copyOf()</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">List.copyOf(src) — 독립 불변 복사본</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">원본 변경이 복사본에 영향 없음</text>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">null 원소 포함 시 NullPointerException</text>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이미 불변이면 같은 인스턴스 반환(최적화)</text>

  <!-- Collectors.toUnmodifiableList -->
  <rect x="470" y="294" width="350" height="128" fill="#201020" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="645" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">Stream 종료 — 불변 수집</text>
  <text x="490" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.collect(toUnmodifiableList())   Java 10</text>
  <text x="490" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.toList()                        Java 16</text>
  <text x="490" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">둘 다 null 원소 허용 여부 상이함</text>
  <text x="490" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">toList()는 null 허용, toUnmodifiable은 불허</text>

  <!-- Bottom -->
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Map.entry(k, v) · Map.ofEntries(entries...) — Map.of 10개 한도 우회</text>
  <text x="440" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Map.of는 키-값 쌍을 가변 인수(varargs)로 10쌍까지 직접 오버로드 제공</text>
</svg>
