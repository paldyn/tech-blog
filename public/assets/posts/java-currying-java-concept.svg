<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커링(Currying) — 다중 인자 함수를 단계적 함수로</text>

  <!-- Section: Before (normal function) -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">일반 함수 (f(a, b))</text>

  <!-- Normal function box -->
  <rect x="60" y="106" width="280" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">add(int a, int b)</text>
  <text x="200" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">두 인자를 동시에 받음</text>

  <!-- Arrow -->
  <line x1="370" y1="136" x2="440" y2="136" stroke="#888" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="405" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">결과</text>

  <!-- Result box -->
  <rect x="450" y="106" width="120" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="510" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" text-anchor="middle">a + b</text>
  <text x="510" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">int 반환</text>

  <!-- Section: After (curried) -->
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">커링 (f(a)(b))</text>

  <!-- Step 1 -->
  <rect x="60" y="226" width="200" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">curried(int a)</text>
  <text x="160" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">첫 번째 인자 캡처</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="256" x2="320" y2="256" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="295" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">a=3</text>

  <!-- Step 2 -->
  <rect x="330" y="226" width="200" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="430" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Function&lt;Integer,Integer&gt;</text>
  <text x="430" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">두 번째 인자 대기</text>

  <!-- Arrow 2 -->
  <line x1="540" y1="256" x2="590" y2="256" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="565" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">b=4</text>

  <!-- Result -->
  <rect x="600" y="226" width="100" height="60" rx="8" fill="#0d1f0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" text-anchor="middle">7</text>
  <text x="650" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">결과</text>

  <!-- Code block -->
  <rect x="60" y="320" width="760" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 커링 구현</text>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Function</tspan><tspan fill="#ffffff">&lt;Integer, </tspan><tspan fill="#7ec8e3" font-weight="600">Function</tspan><tspan fill="#ffffff">&lt;Integer, Integer&gt;&gt; curried =</tspan></text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    a -&gt; b -&gt; a + b;</tspan></text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 사용: 부분 적용(Partial Application)</text>
  <text x="76" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Function</tspan><tspan fill="#ffffff">&lt;Integer, Integer&gt; addThree = curried.apply(3);</tspan></text>
  <text x="76" y="448" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">addThree.apply(4);  </tspan><tspan fill="#9aa4b8">// 7</tspan></text>
</svg>
