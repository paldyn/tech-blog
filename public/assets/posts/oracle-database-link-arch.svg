<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrd" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrb" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle Database Link 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">로컬 DB에서 원격 DB 객체를 투명하게 접근</text>

  <!-- Local DB -->
  <rect x="50" y="92" width="320" height="320" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">Local Database (HQ_DB)</text>

  <!-- User session -->
  <rect x="70" y="132" width="140" height="44" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">User Session</text>
  <text x="140" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SELECT ... @branch_db</text>

  <!-- DB Link object -->
  <rect x="70" y="196" width="280" height="44" rx="6" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="210" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Database Link: branch_db</text>
  <text x="210" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CONNECT TO app_user USING '...'</text>

  <!-- Local tables -->
  <rect x="70" y="260" width="130" height="40" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="135" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">HQ_EMPLOYEES</text>

  <rect x="210" y="260" width="130" height="40" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="275" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">HQ_ORDERS</text>

  <!-- Network -->
  <rect x="50" y="330" width="320" height="64" rx="6" fill="#0a0f18"/>
  <text x="210" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SQL*Net / Oracle Net Protocol</text>
  <text x="210" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TCP/IP 기반 원격 접속 (tnsnames.ora 또는 EZConnect)</text>
  <text x="210" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">암호화: native encryption 또는 SSL/TLS</text>

  <!-- Arrow from local to remote -->
  <line x1="372" y1="218" x2="508" y2="218" stroke="#7777cc" stroke-width="2" marker-end="url(#arrb)"/>
  <line x1="508" y1="230" x2="372" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="440" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">쿼리 전달</text>
  <text x="440" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">결과 반환</text>

  <!-- Remote DB -->
  <rect x="510" y="92" width="320" height="320" rx="10" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Remote Database (BRANCH_DB)</text>

  <!-- Remote session -->
  <rect x="530" y="132" width="140" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="600" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">DB Link Session</text>
  <text x="600" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">app_user로 자동 연결</text>

  <!-- Remote tables -->
  <rect x="530" y="196" width="130" height="40" rx="5" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="595" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">BRANCH_SALES</text>

  <rect x="670" y="196" width="140" height="40" rx="5" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">BRANCH_INVENTORY</text>

  <!-- Remote network info -->
  <rect x="530" y="256" width="280" height="136" rx="6" fill="#0a1208"/>
  <text x="670" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">원격 실행 특성</text>
  <text x="670" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">쿼리는 원격 DB에서 실행됨</text>
  <text x="670" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">결과 집합만 로컬로 전송</text>
  <text x="670" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">원격 트랜잭션 지원 (2PC)</text>
  <text x="670" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DML도 가능 (INSERT/UPDATE/DELETE)</text>
  <text x="670" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DDL은 EXECUTE IMMEDIATE 필요</text>

  <!-- Bottom note -->
  <rect x="50" y="428" width="780" height="24" rx="4" fill="none"/>
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">참조 문법: SELECT * FROM branch_sales@branch_db; — @뒤가 DB Link 이름</text>
</svg>
