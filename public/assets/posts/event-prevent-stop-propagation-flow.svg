<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이벤트 전파 제어 메서드 비교</text>

  <!-- Column headers -->
  <!-- Col 1: preventDefault -->
  <text x="155" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">preventDefault()</text>

  <!-- Col 2: stopPropagation -->
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">stopPropagation()</text>

  <!-- Col 3: stopImmediatePropagation -->
  <text x="725" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8a84c" text-anchor="middle">stopImmediatePropagation()</text>

  <!-- Dividers -->
  <line x1="295" y1="70" x2="295" y2="480" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="587" y1="70" x2="587" y2="480" stroke="#2a2a2a" stroke-width="1"/>

  <!-- === Column 1: preventDefault === -->
  <!-- DOM hierarchy boxes -->
  <rect x="80" y="110" width="150" height="44" rx="6" fill="#131a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="155" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">document</text>

  <!-- arrow down -->
  <line x1="155" y1="154" x2="155" y2="174" stroke="#555" stroke-width="1.5"/>
  <polygon points="155,178 150,170 160,170" fill="#555"/>

  <rect x="80" y="178" width="150" height="44" rx="6" fill="#131a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="155" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">div#parent</text>

  <!-- arrow down -->
  <line x1="155" y1="222" x2="155" y2="242" stroke="#555" stroke-width="1.5"/>
  <polygon points="155,246 150,238 160,238" fill="#555"/>

  <rect x="80" y="246" width="150" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="155" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">a#link</text>
  <text x="155" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">← 클릭 이벤트 발생</text>

  <!-- X mark: browser default blocked -->
  <rect x="80" y="320" width="150" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="155" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">페이지 이동 취소</text>
  <text x="155" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(브라우저 기본 동작)</text>

  <line x1="155" y1="290" x2="155" y2="316" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="155,320 150,312 160,312" fill="#e05555"/>

  <!-- Bubbling continues -->
  <text x="155" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">버블링은 계속됨</text>
  <line x1="155" y1="368" x2="155" y2="388" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="155,392 150,384 160,384" fill="#55c555"/>

  <!-- === Column 2: stopPropagation === -->
  <rect x="365" y="110" width="150" height="44" rx="6" fill="#131a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">document</text>

  <line x1="440" y1="154" x2="440" y2="174" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,178 435,170 445,170" fill="#555"/>

  <rect x="365" y="178" width="150" height="44" rx="6" fill="#131a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">div#parent</text>

  <line x1="440" y1="222" x2="440" y2="242" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,246 435,238 445,238" fill="#555"/>

  <rect x="365" y="246" width="150" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">button</text>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">← stopPropagation()</text>

  <!-- Block bubble -->
  <rect x="365" y="318" width="150" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">버블링 차단 ✕</text>

  <!-- X line through bubbling -->
  <line x1="440" y1="290" x2="440" y2="314" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="440,318 435,310 445,310" fill="#e05555"/>

  <!-- Default action continues -->
  <text x="440" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">기본 동작은 유지</text>

  <!-- === Column 3: stopImmediatePropagation === -->
  <rect x="650" y="110" width="170" height="44" rx="6" fill="#131a2e" stroke="#e8a84c" stroke-width="1.5"/>
  <text x="735" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a84c" text-anchor="middle">document</text>

  <line x1="735" y1="154" x2="735" y2="174" stroke="#555" stroke-width="1.5"/>
  <polygon points="735,178 730,170 740,170" fill="#555"/>

  <rect x="650" y="178" width="170" height="44" rx="6" fill="#131a2e" stroke="#e8a84c" stroke-width="1.5"/>
  <text x="735" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a84c" text-anchor="middle">div#parent</text>

  <line x1="735" y1="222" x2="735" y2="242" stroke="#555" stroke-width="1.5"/>
  <polygon points="735,246 730,238 740,238" fill="#555"/>

  <rect x="650" y="246" width="170" height="44" rx="6" fill="#1a2a1a" stroke="#e8a84c" stroke-width="2"/>
  <text x="735" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a84c" text-anchor="middle">button</text>
  <text x="735" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">← stopImmediatePropagation()</text>

  <!-- Block bubble AND other listeners -->
  <rect x="650" y="318" width="170" height="55" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="735" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">버블링 차단 ✕</text>
  <text x="735" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">나머지 리스너 차단 ✕</text>

  <line x1="735" y1="290" x2="735" y2="314" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="735,318 730,310 740,310" fill="#e05555"/>

  <!-- Summary labels -->
  <text x="440" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">모두 조합 가능: e.preventDefault() + e.stopPropagation()</text>
</svg>
