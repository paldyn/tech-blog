<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">노드 컨디션 — kubelet이 보고하는 건강 신호</text>

  <!-- conditions list left -->
  <rect x="50" y="90" width="370" height="280" rx="10" fill="#13151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">주요 컨디션</text>

  <text x="74" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">Ready</text>
  <text x="74" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정상 동작 — Pod 수용 가능</text>

  <text x="74" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">MemoryPressure</text>
  <text x="74" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메모리 부족 → eviction 유발</text>

  <text x="74" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">DiskPressure</text>
  <text x="74" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">디스크 부족 → 이미지 GC·eviction</text>

  <text x="74" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">PIDPressure</text>
  <text x="74" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로세스 수 한계 임박</text>

  <!-- right: NotReady handling -->
  <rect x="460" y="90" width="370" height="130" rx="10" fill="#2a1416" stroke="#e05555" stroke-width="1.5"/>
  <text x="645" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">NotReady가 되면</text>
  <text x="484" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· node-controller가 taint 부착</text>
  <text x="484" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 유예 후 Pod 자동 재배치</text>
  <text x="484" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· kubelet·네트워크·런타임 점검</text>

  <rect x="460" y="240" width="370" height="130" rx="10" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">교체 vs 복구</text>
  <text x="484" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 클라우드: 죽으면 교체(불변 인프라)</text>
  <text x="484" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 온프렘: drain 후 점검·수리</text>
  <text x="484" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">애완동물 아닌 가축으로 다루기</text>
</svg>
