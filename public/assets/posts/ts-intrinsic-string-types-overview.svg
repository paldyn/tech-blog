<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">인트린직 문자열 조작 타입</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">TypeScript 4.1 내장 — 타입 레벨 문자열 변환 유틸리티</text>

  <!-- 4 boxes -->
  <rect x="60" y="96" width="170" height="90" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="145" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Uppercase&lt;S&gt;</text>
  <text x="145" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">"hello"</text>
  <text x="145" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">↓</text>
  <text x="145" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">"HELLO"</text>

  <rect x="250" y="96" width="170" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="335" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">Lowercase&lt;S&gt;</text>
  <text x="335" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">"HELLO"</text>
  <text x="335" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">↓</text>
  <text x="335" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">"hello"</text>

  <rect x="440" y="96" width="170" height="90" rx="8" fill="#1a1a0a" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="525" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c84a" text-anchor="middle">Capitalize&lt;S&gt;</text>
  <text x="525" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">"hello world"</text>
  <text x="525" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">↓</text>
  <text x="525" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c84a" text-anchor="middle">"Hello world"</text>

  <rect x="630" y="96" width="190" height="90" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="725" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Uncapitalize&lt;S&gt;</text>
  <text x="725" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">"GetValue"</text>
  <text x="725" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">↓</text>
  <text x="725" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">"getValue"</text>

  <!-- Code block: applications -->
  <text x="60" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실전 활용: 이벤트 핸들러 타입 자동 생성</text>
  <rect x="60" y="224" width="760" height="198" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> EventName = <tspan fill="#ce9178">"click"</tspan> | <tspan fill="#ce9178">"focus"</tspan> | <tspan fill="#ce9178">"blur"</tspan>;</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// "click" → "onClick", "focus" → "onFocus"</text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Handler&lt;<tspan fill="#7ec8e3" font-weight="600">E</tspan> <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#ce9178">string</tspan>&gt; =</text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#ce9178">`on${Capitalize&lt;E&gt;}`</tspan>;</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Handlers = {</text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  [<tspan fill="#7ec8e3" font-weight="600">E</tspan> <tspan fill="#7ec8e3" font-weight="600">in</tspan> EventName <tspan fill="#7ec8e3" font-weight="600">as</tspan> Handler&lt;<tspan fill="#7ec8e3" font-weight="600">E</tspan>&gt;]: () =&gt; <tspan fill="#7ec8e3" font-weight="600">void</tspan>;</text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}; <tspan fill="#9aa4b8">// { onClick: ()=&gt;void; onFocus: ()=&gt;void; onBlur: ()=&gt;void }</tspan></text>

  <!-- Note -->
  <rect x="60" y="444" width="760" height="18" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="457" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">intrinsic 타입 — 컴파일러 내부 구현, 사용자 코드로는 동등하게 구현 불가</text>
</svg>
