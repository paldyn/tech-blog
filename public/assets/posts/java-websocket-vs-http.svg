<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ws1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ws2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">요청-응답 HTTP vs 상시 연결 WebSocket</text>

  <!-- HTTP side -->
  <text x="60" y="92" font-size="16" font-weight="600" fill="#888">HTTP — 매번 요청해야 응답</text>
  <text x="90" y="128" font-size="13" fill="#7ec8e3">클라이언트</text>
  <text x="330" y="128" font-size="13" fill="#888">서버</text>
  <line x1="100" y1="150" x2="350" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ws1)"/>
  <text x="225" y="143" font-size="11" fill="#888" text-anchor="middle">요청 1</text>
  <line x1="350" y1="178" x2="100" y2="178" stroke="#7777cc" stroke-width="2" marker-end="url(#ws1)"/>
  <text x="225" y="171" font-size="11" fill="#888" text-anchor="middle">응답 1 (연결 종료)</text>
  <line x1="100" y1="206" x2="350" y2="206" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ws1)"/>
  <text x="225" y="199" font-size="11" fill="#888" text-anchor="middle">요청 2 (새 연결)</text>
  <text x="225" y="240" font-size="12" fill="#e05555" text-anchor="middle">서버가 먼저 보낼 수 없다</text>

  <!-- WS side -->
  <text x="490" y="92" font-size="16" font-weight="600" fill="#55c555">WebSocket — 한 번 열면 양방향</text>
  <text x="520" y="128" font-size="13" fill="#7ec8e3">클라이언트</text>
  <text x="770" y="128" font-size="13" fill="#888">서버</text>
  <line x1="530" y1="150" x2="790" y2="150" stroke="#55c555" stroke-width="2.5" marker-end="url(#ws2)"/>
  <text x="660" y="143" font-size="11" fill="#888" text-anchor="middle">Upgrade 핸드셰이크 (1회)</text>
  <line x1="530" y1="180" x2="790" y2="180" stroke="#55c555" stroke-width="2.5" marker-end="url(#ws2)"/>
  <line x1="790" y1="206" x2="530" y2="206" stroke="#55c555" stroke-width="2.5" marker-end="url(#ws2)"/>
  <line x1="530" y1="232" x2="790" y2="232" stroke="#55c555" stroke-width="2.5" marker-end="url(#ws2)"/>
  <text x="660" y="262" font-size="12" fill="#55c555" text-anchor="middle">서버도 언제든 먼저 보낼 수 있다</text>

  <text x="440" y="312" font-size="13" fill="#888" text-anchor="middle">실시간 채팅·알림·시세처럼 서버가 능동적으로 밀어줘야 할 때 WebSocket을 쓴다</text>
</svg>
