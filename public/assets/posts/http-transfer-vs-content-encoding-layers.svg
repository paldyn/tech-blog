<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410">
  <rect width="880" height="410" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">포장 순서 — 표현을 만들고, 전송으로 싼다</text>
    <!-- Outer: Transfer-Encoding -->
    <rect x="60" y="80" width="480" height="250" rx="10" fill="none" stroke="#aa7a3a" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="300" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#dd9955">Transfer-Encoding: chunked</text>
    <text x="300" y="126" text-anchor="middle" font-size="11" fill="#888">전송 포장 — 홉 단위, 수신 즉시 해제</text>
    <!-- Middle: Content-Encoding -->
    <rect x="100" y="142" width="400" height="150" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="300" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Content-Encoding: gzip</text>
    <text x="300" y="186" text-anchor="middle" font-size="11" fill="#888">표현의 일부 — 종단 간 유지</text>
    <!-- Inner: original content -->
    <rect x="140" y="202" width="320" height="70" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="300" y="230" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">원본 콘텐츠</text>
    <text x="300" y="250" text-anchor="middle" font-size="11" fill="#888">HTML 100KB → gzip 후 28KB</text>
    <!-- Right notes -->
    <rect x="580" y="80" width="240" height="250" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="700" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">함께 기억할 것</text>
    <text x="596" y="136" font-size="11" fill="#cccccc" xml:space="preserve">· Content-Length는 gzip이</text>
    <text x="596" y="154" font-size="11" fill="#cccccc" xml:space="preserve">  적용된 표현의 크기 (28416)</text>
    <text x="596" y="180" font-size="11" fill="#cccccc" xml:space="preserve">· ETag도 표현 기준 —</text>
    <text x="596" y="198" font-size="11" fill="#cccccc" xml:space="preserve">  인코딩이 다르면 ETag도 달라야</text>
    <text x="596" y="224" font-size="11" fill="#cccccc" xml:space="preserve">· chunked 크기는 어디에도</text>
    <text x="596" y="242" font-size="11" fill="#cccccc" xml:space="preserve">  기록되지 않는다 (벗기면 끝)</text>
    <text x="596" y="268" font-size="11" fill="#cccccc" xml:space="preserve">· HTTP/2·3에서는 전송 포장을</text>
    <text x="596" y="286" font-size="11" fill="#cccccc" xml:space="preserve">  DATA 프레임 계층이 대신한다</text>
    <text x="596" y="312" font-size="11" fill="#cccccc" xml:space="preserve">· 해제 순서는 포장의 역순</text>
    <!-- Summary -->
    <text x="440" y="366" text-anchor="middle" font-size="12" fill="#888">gzip(표현)을 먼저 만들고 chunked(전송)로 자른다 — 받는 쪽은 chunked를 풀고 gzip을 푼다</text>
    <text x="440" y="384" text-anchor="middle" font-size="11" fill="#555">Transfer-Encoding: gzip, chunked 같은 조합도 명세에는 있지만 실무 지원은 chunked뿐</text>
  </g>
</svg>
