<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="ar-req" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ar-ok" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="ar-blk" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">파이프라이닝 — 요청은 연속, 응답은 순서대로</text>

  <text x="120" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">클라이언트</text>
  <text x="700" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">서버</text>

  <!-- vertical lifelines -->
  <line x1="150" y1="104" x2="150" y2="420" stroke="#3a4a6e" stroke-width="2"/>
  <line x1="730" y1="104" x2="730" y2="420" stroke="#3a4a6e" stroke-width="2"/>

  <!-- requests sent back to back -->
  <line x1="152" y1="130" x2="728" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ar-req)"/>
  <text x="300" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">GET /a.css  (요청 1)</text>
  <line x1="152" y1="158" x2="728" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ar-req)"/>
  <text x="300" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">GET /b.js   (요청 2)</text>
  <line x1="152" y1="186" x2="728" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ar-req)"/>
  <text x="300" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">GET /c.png  (요청 3)</text>

  <text x="160" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">응답 기다리지 않고 3개를 연달아 전송 (RTT 1회)</text>

  <!-- slow first response box on server side -->
  <rect x="556" y="234" width="174" height="40" fill="#000000" stroke="#3a4a6e" rx="6"/>
  <text x="572" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">응답 1 생성: 느림 (DB)</text>

  <!-- response 1 slow -->
  <line x1="728" y1="294" x2="152" y2="294" stroke="#55c555" stroke-width="2" marker-end="url(#ar-ok)"/>
  <text x="320" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">200 /a.css  (응답 1, 늦게 도착)</text>

  <!-- responses 2,3 must wait — blocked -->
  <rect x="556" y="312" width="174" height="40" fill="#000000" stroke="#3a4a6e" rx="6"/>
  <text x="572" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">응답 2·3: 준비 완료</text>

  <line x1="728" y1="372" x2="430" y2="372" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#ar-blk)"/>
  <text x="160" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">응답 1이 끝날 때까지 응답 2·3은 보낼 수 없다</text>

  <text x="160" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">순서 보장 요구 → 앞이 막히면 뒤가 막힘 = HOL 블로킹</text>
</svg>
