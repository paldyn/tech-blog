<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">바인딩 표현식 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">value 속성에 수식·연결·조건 사용</text>

  <!-- Pattern 1: 문자열 연결 -->
  <rect x="60" y="92" width="360" height="100" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">① 문자열 연결</text>
  <rect x="80" y="122" width="320" height="28" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="90" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">value="name+' ('+dept+')'"</text>
  <text x="240" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">홍길동 (개발팀)</text>

  <!-- Pattern 2: 산술 -->
  <rect x="460" y="92" width="360" height="100" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">② 산술 계산</text>
  <rect x="480" y="122" width="320" height="28" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="490" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">value="price * qty"</text>
  <text x="640" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">50000 × 3 = 150000</text>

  <!-- Pattern 3: 조건 -->
  <rect x="60" y="212" width="360" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">③ 조건 표현식</text>
  <rect x="80" y="242" width="320" height="46" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="90" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">value="status=='A'?'승인':'미승인'"</text>
  <text x="90" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// 삼항 연산자 사용 가능</text>
  <text x="240" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">승인 / 미승인</text>

  <!-- Pattern 4: dataset 함수 -->
  <rect x="460" y="212" width="360" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">④ 날짜 포맷</text>
  <rect x="480" y="242" width="320" height="46" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="490" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">value="formatDate(regdate,'YYYY-MM-DD')"</text>
  <text x="490" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// 내장 함수 활용</text>
  <text x="640" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">2026-05-09</text>

  <!-- Warning box -->
  <rect x="60" y="342" width="760" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">주의: 표현식 사용 시 쓰기 바인딩 불가</text>
  <text x="80" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">표현식이 있는 컴포넌트는 자동으로 읽기 전용이 됩니다.</text>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">편집 가능해야 하는 Edit에는 단순 컬럼명만 지정하세요.</text>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">계산 결과를 편집하려면 ConstColumn이나 별도 서버 컬럼을 사용하세요.</text>
</svg>
