<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제로 트러스트(Zero Trust) 아키텍처</text>

  <!-- Requestor -->
  <rect x="50" y="90" width="140" height="70" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">요청자</text>
  <text x="120" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사용자 / 디바이스</text>
  <text x="120" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서비스 계정</text>

  <!-- Arrow to Policy Engine -->
  <line x1="190" y1="125" x2="268" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="229" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">인증 요청</text>

  <!-- Policy Engine (center) -->
  <rect x="270" y="70" width="200" height="310" rx="8" fill="#0f1528" stroke="#7777cc" stroke-width="2"/>
  <text x="370" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">정책 엔진</text>
  <text x="370" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(Policy Engine)</text>

  <rect x="286" y="130" width="168" height="44" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="370" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">신원 확인</text>
  <text x="370" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">MFA / 인증서</text>

  <rect x="286" y="184" width="168" height="44" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="370" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">디바이스 상태</text>
  <text x="370" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">패치 · 보안 설정</text>

  <rect x="286" y="238" width="168" height="44" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="370" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">컨텍스트 분석</text>
  <text x="370" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">위치 · 시간 · 행동</text>

  <rect x="286" y="292" width="168" height="44" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="370" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">최소 권한 결정</text>
  <text x="370" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">허용 / 거부 / 제한</text>

  <!-- Arrow to Resources: Allow -->
  <line x1="470" y1="200" x2="538" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="504" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">허용</text>

  <!-- Arrow to Resources: Deny -->
  <line x1="470" y1="260" x2="538" y2="260" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <text x="504" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">거부</text>

  <!-- Resources -->
  <rect x="540" y="90" width="160" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">리소스</text>
  <text x="620" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">API / DB / 파일</text>
  <text x="620" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">마이크로서비스</text>

  <rect x="540" y="230" width="160" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="620" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">차단됨</text>
  <text x="620" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이상 행동 감지</text>
  <text x="620" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정책 미충족</text>

  <!-- Threat intel / data sources -->
  <rect x="730" y="90" width="110" height="310" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="785" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">데이터 소스</text>
  <text x="785" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">위협 인텔리전스</text>
  <text x="785" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">IAM / IdP</text>
  <text x="785" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">SIEM / 로그</text>
  <text x="785" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">EDR / MDM</text>
  <text x="785" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">취약점 DB</text>

  <!-- Dashed line from data sources to policy engine -->
  <line x1="730" y1="245" x2="472" y2="245" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Continuous monitoring note -->
  <rect x="50" y="400" width="760" height="60" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">핵심: 지속적 검증 (Never Trust, Always Verify)</text>
  <text x="440" y="447" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">신뢰는 최초 인증으로 끝나지 않는다 — 매 요청마다, 세션 중에도 지속적으로 검증</text>
</svg>
