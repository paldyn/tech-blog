<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">git bundle — 저장소를 단일 파일로 패키징</text>

  <!-- left: online repo -->
  <rect x="60" y="110" width="200" height="150" rx="10" fill="#10151f" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="150" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">온라인 저장소</text>
  <text x="160" y="180" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">.git</text>
  <text x="160" y="206" font-size="12" fill="#888" text-anchor="middle">커밋 · 브랜치 · 태그</text>
  <text x="160" y="232" font-size="12" fill="#888" text-anchor="middle">전체 히스토리</text>

  <!-- middle: bundle file -->
  <rect x="340" y="110" width="200" height="150" rx="10" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="150" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">repo.bundle</text>
  <text x="440" y="180" font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">단일 파일</text>
  <text x="440" y="206" font-size="12" fill="#888" text-anchor="middle">USB · 이메일 첨부</text>
  <text x="440" y="232" font-size="12" fill="#888" text-anchor="middle">네트워크 없이 전송</text>

  <!-- right: offline clone -->
  <rect x="620" y="110" width="200" height="150" rx="10" fill="#10151f" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="720" y="150" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">오프라인 머신</text>
  <text x="720" y="180" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">git clone</text>
  <text x="720" y="206" font-size="12" fill="#888" text-anchor="middle">번들에서 복제</text>
  <text x="720" y="232" font-size="12" fill="#888" text-anchor="middle">동일 히스토리 복원</text>

  <!-- arrows -->
  <line x1="260" y1="185" x2="338" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="299" y="168" font-size="11" fill="#9aa4b8" text-anchor="middle">bundle</text>
  <text x="299" y="210" font-size="11" fill="#9aa4b8" text-anchor="middle">create</text>

  <line x1="540" y1="185" x2="618" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="579" y="168" font-size="11" fill="#9aa4b8" text-anchor="middle">clone</text>
  <text x="579" y="210" font-size="11" fill="#9aa4b8" text-anchor="middle">/ pull</text>

  <text x="60" y="300" font-size="13" fill="#888">한 개의 파일로 묶이므로 인터넷이 없는 환경에서도 저장소 전체를 그대로 옮길 수 있습니다.</text>
</svg>
