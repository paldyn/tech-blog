  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#9aa4b8" text-anchor="middle">Security Logging Best Practices</text>

  <!-- Code box -->
  <rect x="60" y="96" width="760" height="252" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Header bar -->
