  <circle cx="102" cy="112" r="5" fill="#d4c027"/>
  <circle cx="120" cy="112" r="5" fill="#4ec94e"/>
  <text x="440" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">security-logger.js</text>

  <!-- Code lines -->
  <text x="88" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// &#xBCF4;&#xC548; &#xC774;&#xBCA4;&#xD2B8; &#xAD6C;&#xC870;&#xD654; &#xB85C;&#xAE45;</text>
  <text x="88" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">logger.</tspan><tspan fill="#7ec8e3" font-weight="600">warn</tspan><tspan fill="#ffffff">({</tspan></text>
  <text x="88" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  event: </tspan><tspan fill="#ce9178">'login_failed'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="88" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  userId: userId,  ip: req.ip,</tspan></text>
  <text x="88" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  userAgent: req.headers[</tspan><tspan fill="#ce9178">'user-agent'</tspan><tspan fill="#ffffff">],</tspan></text>
  <text x="88" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  timestamp: </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> Date().toISOString(),</tspan></text>
  <text x="88" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  attempts: failedAttempts</tspan></text>
  <text x="88" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">})</tspan></text>

  <!-- 3 key principles -->
  <rect x="60" y="368" width="232" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="368" width="5" height="60" rx="3" fill="#4ec94e"/>
  <text x="82" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ec94e">&#x2705;</text>
  <text x="104" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">&#xBAA8;&#xB4E0; &#xC778;&#xC99D; &#xC774;&#xBCA4;&#xD2B8; &#xAE30;&#xB85D;</text>
  <text x="82" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">&#xC131;&#xACF5;&#xB7E8;&#xC2E4;&#xD328; &#xBAA8;&#xB450; &#xD3EC;&#xD568;</text>

  <rect x="324" y="368" width="232" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="324" y="368" width="5" height="60" rx="3" fill="#7ec8e3"/>
  <text x="346" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">&#x2705;</text>
  <text x="368" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">&#xC2E4;&#xC2DC;&#xAC04; &#xC54C;&#xB9BC; &#xC124;&#xC815;</text>
  <text x="346" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">&#xC784;&#xACC4;&#xAC12; &#xAE30;&#xBC18; &#xC989;&#xAC01; &#xB300;&#xC751;</text>

  <rect x="588" y="368" width="232" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="588" y="368" width="5" height="60" rx="3" fill="#a78bfa"/>
  <text x="610" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa">&#x2705;</text>
  <text x="632" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">&#xB85C;&#xADF8; &#xBB34;&#xACB0;&#xC131; &#xBCF4;&#xD638;</text>
  <text x="610" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">&#xBCC0;&#xC870; &#xBC29;&#xC9C0;&#xB7E8;WORM &#xC800;&#xC7A5;</text>

  <!-- Footer -->
  <line x1="60" y1="450" x2="820" y2="450" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555e77" text-anchor="middle">OWASP A09:2021 – Security Logging and Monitoring Failures</text>
