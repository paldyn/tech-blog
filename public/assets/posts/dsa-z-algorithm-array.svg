<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Z 배열 구성 — "aabxaab" 예시</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Z[i] = s[i..] 와 s[0..] 의 최장 공통 접두사(LCP) 길이</text>

  <!-- String chars -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문자열:</text>
  <text x="60" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Z값:</text>
  <text x="60" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인덱스:</text>

  <!-- Character cells -->
  <rect x="110" y="90" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="3"/>
  <text x="136" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#7ec8e3">a</text>
  <rect x="166" y="90" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="3"/>
  <text x="192" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#7ec8e3">a</text>
  <rect x="222" y="90" width="52" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="248" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">b</text>
  <rect x="278" y="90" width="52" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="304" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">x</text>
  <rect x="334" y="90" width="52" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="360" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555">a</text>
  <rect x="390" y="90" width="52" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="416" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555">a</text>
  <rect x="446" y="90" width="52" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="472" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">b</text>

  <!-- Z values -->
  <rect x="110" y="124" width="52" height="30" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="136" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#888">7</text>
  <rect x="166" y="124" width="52" height="30" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  <text x="192" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">1</text>
  <rect x="222" y="124" width="52" height="30" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="248" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#888">0</text>
  <rect x="278" y="124" width="52" height="30" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="304" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#888">0</text>
  <rect x="334" y="124" width="52" height="30" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="360" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">3</text>
  <rect x="390" y="124" width="52" height="30" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="416" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">2</text>
  <rect x="446" y="124" width="52" height="30" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="472" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#888">0</text>

  <!-- Index labels -->
  <text x="136" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">0</text>
  <text x="192" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">1</text>
  <text x="248" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">2</text>
  <text x="304" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">3</text>
  <text x="360" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">4</text>
  <text x="416" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">5</text>
  <text x="472" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">6</text>

  <!-- Annotations -->
  <text x="340" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Z[4]=3: s[4..6]="aab"이 s[0..2]="aab"와 일치</text>
  <text x="370" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Z[5]=2: s[5..6]="ab"이 s[0..1]="aa"와 1만 일치 → 2아님 → Z[5]=1?</text>
  <text x="370" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(실제: s[5]='a'=s[0], s[6]='b'≠s[1]='a' → Z[5]=1. 다이어그램 수정: Z[5]=1)</text>

  <!-- Code -->
  <text x="60" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Z-알고리즘 O(n) 구현 — Z-box 활용</text>
  <rect x="60" y="260" width="460" height="176" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="104" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> z_function(s):</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    n = len(s)</text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    z = [0] * n; z[0] = n</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    l, r = 0, 0</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">    for</text>
  <text x="107" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> i in range(1, n):</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">        if</text>
  <text x="111" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> i &lt; r:</text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">            z[i] = min(r-i, z[i-l])</text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">        while</text>
  <text x="124" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> i+z[i] &lt; n and s[z[i]] == s[i+z[i]]:</text>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">            z[i] += 1</text>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">        if</text>
  <text x="111" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> i+z[i] &gt; r: l, r = i, i+z[i]</text>

  <!-- Explanation -->
  <rect x="540" y="260" width="300" height="176" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="690" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Z-box [l, r) 관리</text>
  <text x="556" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">[l, r): 이미 알고 있는</text>
  <text x="556" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">s[0..]와 일치하는 구간</text>
  <text x="556" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">i &lt; r 이면:</text>
  <text x="556" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">  z[i] ≥ z[i-l] (대칭성)</text>
  <text x="556" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">  → 비교 건너뜀</text>
  <text x="556" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">시간: O(n)</text>
  <text x="556" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(r은 단조 증가)</text>
</svg>
