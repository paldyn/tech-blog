<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컨테이너 기반 CI 파이프라인</text>

  <!-- Step boxes: 5 stages in a row -->
  <!-- Stage 1: Code Push -->
  <rect x="40" y="100" width="140" height="72" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="110" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Code Push</text>
  <text x="110" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">git push</text>
  <text x="110" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">PR 생성</text>

  <line x1="180" y1="136" x2="204" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 2: Build Image -->
  <rect x="208" y="100" width="140" height="72" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="278" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">docker build</text>
  <text x="278" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Dockerfile 실행</text>
  <text x="278" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이미지 생성</text>

  <line x1="348" y1="136" x2="372" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 3: Run Tests -->
  <rect x="376" y="100" width="140" height="72" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="446" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">docker run</text>
  <text x="446" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">테스트 실행</text>
  <text x="446" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">격리된 환경</text>

  <line x1="516" y1="136" x2="540" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 4: Push Image -->
  <rect x="544" y="100" width="140" height="72" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="614" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">docker push</text>
  <text x="614" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Registry 업로드</text>
  <text x="614" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">태그 기록</text>

  <line x1="684" y1="136" x2="708" y2="136" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Stage 5: Deploy -->
  <rect x="712" y="100" width="128" height="72" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="776" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">배포</text>
  <text x="776" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">K8s / ECS</text>
  <text x="776" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Compose</text>

  <!-- Benefits row -->
  <rect x="40" y="230" width="370" height="110" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="60" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">컨테이너 CI의 장점</text>
  <text x="60" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&#x2713; 환경 일관성 — 로컬과 동일한 이미지로 빌드·테스트</text>
  <text x="60" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&#x2713; 캐시 활용 — 레이어 캐시로 빌드 속도 향상</text>
  <text x="60" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&#x2713; 격리 — 종속성 충돌 없는 독립 실행</text>
  <text x="60" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&#x2713; 재현성 — 동일 이미지로 어디서나 동일 결과</text>

  <!-- CI Platforms -->
  <rect x="430" y="230" width="410" height="110" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="450" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">주요 CI 플랫폼</text>
  <text x="450" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GitHub Actions — .github/workflows/*.yml</text>
  <text x="450" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GitLab CI — .gitlab-ci.yml</text>
  <text x="450" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Jenkins — Jenkinsfile (Declarative Pipeline)</text>
  <text x="450" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CircleCI, Drone CI, Tekton 등</text>
</svg>
