<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">cookies() &amp; headers() — 사용 가능 위치</text>

  <!-- Table header -->
  <rect x="60" y="68" width="760" height="36" rx="4" fill="#1a2a44" stroke="#3a5a8e" stroke-width="1"/>
  <text x="200" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
