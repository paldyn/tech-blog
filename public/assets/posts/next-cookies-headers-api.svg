  <text x="560" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">headers()</text>
  <text x="730" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">비고</text>

  <!-- Row 1 -->
  <rect x="60" y="104" width="760" height="44" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="0.5"/>
  <text x="200" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Server Component</text>
  <text x="400" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 읽기</text>
  <text x="560" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 읽기</text>
  <text x="730" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">쓰기 불가 (응답 전)</text>

  <!-- Row 2 -->
  <rect x="60" y="148" width="760" height="44" rx="0" fill="#0d1218" stroke="#2a3a5e" stroke-width="0.5"/>
  <text x="200" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Server Action</text>
  <text x="400" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 읽기/쓰기</text>
  <text x="560" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 읽기/쓰기</text>
  <text x="730" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">응답 가능 시점</text>

  <!-- Row 3 -->
  <rect x="60" y="192" width="760" height="44" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="0.5"/>
  <text x="200" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Route Handler</text>
  <text x="400" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 읽기/쓰기</text>
  <text x="560" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
