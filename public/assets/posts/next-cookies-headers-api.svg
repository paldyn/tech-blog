  <!-- Row 4 -->
  <rect x="60" y="236" width="760" height="44" rx="0" fill="#0d1218" stroke="#2a3a5e" stroke-width="0.5"/>
  <text x="200" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
