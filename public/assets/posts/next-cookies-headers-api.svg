  <!-- Row 5 -->
  <rect x="60" y="280" width="760" height="44" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="0.5"/>
  <text x="200" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Client Component</text>
  <text x="400" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">✗ 사용 불가</text>
  <text x="560" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">✗ 사용 불가</text>
  <text x="730" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">document.cookie 사용</text>

  <!-- Code: async/await note -->
  <rect x="60" y="344" width="760" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// Next.js 15부터 cookies() / headers()는 비동기 함수 — await 필요</text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> cookieStore = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> cookies()   </tspan><tspan fill="#9aa4b8">// ReadonlyRequestCookies</tspan>
  </text>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> headerStore = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> headers()  </tspan><tspan fill="#9aa4b8">// ReadonlyHeaders</tspan>
  </text>

  <!-- Bottom note -->
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">cookies() / headers() 호출 → 해당 라우트는 동적 렌더링으로 전환됨</text>
</svg>
