<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="700">콜백 헬 (Callback Hell)</text>
  <text x="440" y="66" text-anchor="middle" fill="#555" font-size="13">중첩이 깊어질수록 읽기 어려워진다</text>

  <!-- Left: Callback Hell code -->
  <rect x="40" y="88" width="380" height="354" rx="10" fill="#111" stroke="#3a1a1a" stroke-width="1.5"/>
  <rect x="40" y="88" width="380" height="38" rx="10" fill="#2a1010"/>
  <text x="230" y="113" text-anchor="middle" fill="#ee8888" font-size="13" font-weight="700">콜백 헬</text>

  <!-- pyramid of doom lines -->
  <text x="60" y="148" fill="#888" font-size="11" font-family="monospace">login(user, (err, session) =&gt; {</text>
  <text x="72" y="168" fill="#888" font-size="11" font-family="monospace">  if (err) return handle(err);</text>
  <text x="72" y="188" fill="#cc6666" font-size="11" font-family="monospace">  getProfile(session, (err, profile) =&gt; {</text>
  <text x="84" y="208" fill="#888" font-size="11" font-family="monospace">    if (err) return handle(err);</text>
  <text x="84" y="228" fill="#cc8866" font-size="11" font-family="monospace">    getOrders(profile, (err, orders) =&gt; {</text>
  <text x="96" y="248" fill="#888" font-size="11" font-family="monospace">      if (err) return handle(err);</text>
  <text x="96" y="268" fill="#ccaa66" font-size="11" font-family="monospace">        filterPaid(orders, (err, paid) =&gt; {</text>
  <text x="108" y="288" fill="#888" font-size="11" font-family="monospace">          if (err) return handle(err);</text>
  <text x="108" y="308" fill="#cccc66" font-size="11" font-family="monospace">          render(paid, (err) =&gt; {</text>
  <text x="120" y="328" fill="#888" font-size="11" font-family="monospace">            if (err) return handle(err);</text>
  <text x="120" y="348" fill="#88cc88" font-size="11" font-family="monospace">            console.log("완료!");</text>
  <text x="108" y="368" fill="#666" font-size="11" font-family="monospace">          });</text>
  <text x="96" y="385" fill="#666" font-size="11" font-family="monospace">        });</text>
  <text x="84" y="402" fill="#666" font-size="11" font-family="monospace">    });</text>
  <text x="72" y="419" fill="#666" font-size="11" font-family="monospace">  });</text>
  <text x="60" y="432" fill="#666" font-size="11" font-family="monospace">});</text>

  <!-- Indentation depth indicator -->
  <rect x="56" y="135" width="2" height="296" fill="#3a1a1a"/>
  <rect x="68" y="160" width="2" height="264" fill="#4a2a2a" opacity="0.7"/>
  <rect x="80" y="180" width="2" height="230" fill="#5a3a2a" opacity="0.6"/>
  <rect x="92" y="200" width="2" height="196" fill="#6a4a2a" opacity="0.5"/>
  <rect x="104" y="218" width="2" height="160" fill="#7a5a2a" opacity="0.4"/>

  <!-- Right: Problems + Better way -->
  <rect x="460" y="88" width="380" height="170" rx="10" fill="#111" stroke="#3a2a1a" stroke-width="1.5"/>
  <rect x="460" y="88" width="380" height="38" rx="10" fill="#2a1a0a"/>
  <text x="650" y="113" text-anchor="middle" fill="#ddaa55" font-size="13" font-weight="700">콜백 패턴의 문제점</text>

  <text x="478" y="148" fill="#888" font-size="12">▸  가독성 저하 — 피라미드 구조</text>
  <text x="478" y="170" fill="#888" font-size="12">▸  오류 처리 반복 — 매 콜백마다 if(err)</text>
  <text x="478" y="192" fill="#888" font-size="12">▸  흐름 제어 어려움 — 순서, 병렬, 취소</text>
  <text x="478" y="214" fill="#888" font-size="12">▸  재사용 어려움 — 콜백 안에 로직 묶임</text>
  <text x="478" y="236" fill="#888" font-size="12">▸  디버깅 어려움 — 스택 추적이 단절됨</text>

  <!-- Better approach -->
  <rect x="460" y="270" width="380" height="172" rx="10" fill="#111" stroke="#1a3a1a" stroke-width="1.5"/>
  <rect x="460" y="270" width="380" height="38" rx="10" fill="#0a2a0a"/>
  <text x="650" y="295" text-anchor="middle" fill="#88cc88" font-size="13" font-weight="700">콜백 헬 개선 방법</text>

  <text x="478" y="328" fill="#77aa77" font-size="12">① 함수 분리  — 인라인 중첩 대신 명명 함수</text>
  <text x="478" y="350" fill="#77aa77" font-size="12">② async.js   — 흐름 제어 라이브러리 활용</text>
  <text x="478" y="372" fill="#77aa77" font-size="12">③ Promise    — .then() 체이닝으로 평탄화</text>
  <text x="478" y="394" fill="#77aa77" font-size="12">④ async/await — 동기적 스타일로 작성</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="478" y="416" fill="#555" font-size="11">    (다음 글에서 Promise와 async/await 상세 다룸)</text>
</svg>
