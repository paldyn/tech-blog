<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">자주 쓰는 kubectl 동사(verb)</text>

  <!-- Category: 조회 -->
  <rect x="60" y="68" width="360" height="170" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">조회</text>

  <text x="80" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">get</text>
  <text x="130" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리소스 목록/상세</text>
  <text x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">describe</text>
  <text x="165" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이벤트 포함 상세 출력</text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">logs</text>
  <text x="130" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨테이너 로그 출력</text>
  <text x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">top</text>
  <text x="130" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CPU/메모리 사용량</text>
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">api-resources</text>
  <text x="218" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리소스 타입 목록</text>

  <!-- Category: 생성/수정 -->
  <rect x="460" y="68" width="360" height="170" rx="8" fill="#0d2d0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">생성 / 수정</text>

  <text x="480" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">apply</text>
  <text x="540" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">YAML 선언 적용 (추천)</text>
  <text x="480" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">create</text>
  <text x="548" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">명령형 생성</text>
  <text x="480" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">edit</text>
  <text x="530" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리소스 인라인 편집</text>
  <text x="480" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">patch</text>
  <text x="540" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JSON 패치 적용</text>
  <text x="480" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">scale</text>
  <text x="540" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">레플리카 수 조정</text>

  <!-- Category: 삭제/실행 -->
  <rect x="60" y="264" width="360" height="150" rx="8" fill="#2d0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">삭제</text>

  <text x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">delete</text>
  <text x="148" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리소스 삭제</text>
  <text x="80" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">delete -f</text>
  <text x="185" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">YAML 파일 기준 삭제</text>
  <text x="80" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">drain</text>
  <text x="138" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">노드 파드 이동 후 격리</text>
  <text x="80" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">cordon</text>
  <text x="157" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">노드 스케줄링 차단</text>

  <!-- Category: 디버깅 -->
  <rect x="460" y="264" width="360" height="150" rx="8" fill="#1e1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">디버깅 / 접근</text>

  <text x="480" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" font-weight="600">exec</text>
  <text x="530" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨테이너 내 명령 실행</text>
  <text x="480" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" font-weight="600">port-forward</text>
  <text x="610" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">로컬 포트 포워딩</text>
  <text x="480" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" font-weight="600">cp</text>
  <text x="510" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일 복사</text>
  <text x="480" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" font-weight="600">rollout</text>
  <text x="558" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">배포 이력 관리</text>

  <!-- Tip -->
  <text x="440" y="442" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">kubectl &lt;verb&gt; --help 로 각 동사의 플래그를 확인할 수 있다</text>
</svg>
