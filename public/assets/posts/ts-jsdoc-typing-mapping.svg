<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="jd_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">JSDoc과 TypeScript 대응</text>
  <text x="60" y="76" font-size="14" fill="#888">JS 파일의 JSDoc 태그는 .ts 타입 문법으로 일대일 대응된다</text>

  <!-- JSDoc col -->
  <rect x="60" y="100" width="340" height="270" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="128" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">JSDoc (.js)</text>
  <text xml:space="preserve" x="84" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">@param {string} name</text>
  <text xml:space="preserve" x="84" y="202" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">@returns {number}</text>
  <text xml:space="preserve" x="84" y="242" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">@type {User}</text>
  <text xml:space="preserve" x="84" y="282" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">@typedef {{id:number}} User</text>
  <text xml:space="preserve" x="84" y="322" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">@template T</text>
  <text xml:space="preserve" x="84" y="356" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">@param {string} [tag]</text>

  <!-- arrows -->
  <line x1="400" y1="157" x2="500" y2="157" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jd_arr)"/>
  <line x1="400" y1="197" x2="500" y2="197" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jd_arr)"/>
  <line x1="400" y1="237" x2="500" y2="237" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jd_arr)"/>
  <line x1="400" y1="277" x2="500" y2="277" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jd_arr)"/>
  <line x1="400" y1="317" x2="500" y2="317" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jd_arr)"/>
  <line x1="400" y1="351" x2="500" y2="351" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jd_arr)"/>

  <!-- TS col -->
  <rect x="510" y="100" width="310" height="270" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="534" y="128" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">TypeScript (.ts)</text>
  <text xml:space="preserve" x="534" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">name: string</text>
  <text xml:space="preserve" x="534" y="202" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">(): number</text>
  <text xml:space="preserve" x="534" y="242" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">const x: User</text>
  <text xml:space="preserve" x="534" y="282" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">type User = {id:number}</text>
  <text xml:space="preserve" x="534" y="322" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">&lt;T&gt;</text>
  <text xml:space="preserve" x="534" y="356" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">tag?: string</text>
</svg>
