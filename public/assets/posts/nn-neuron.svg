<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }
      .label { font-size: 12px; fill: #888; }
      .label-sm { font-size: 10px; fill: #555; letter-spacing: 0.08em; }
      .value { font-size: 13px; font-weight: 600; fill: #e8e8e8; }
      .weight { font-size: 11px; fill: #666; font-style: italic; }
      .note { font-size: 10px; fill: #444; }
    </style>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#333"/>
    </marker>
  </defs>

  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <!-- Input nodes -->
  <circle cx="100" cy="100" r="22" fill="#111" stroke="#2e2e2e" stroke-width="1.5"/>
  <text x="100" y="105" class="value" text-anchor="middle">x₁</text>

  <circle cx="100" cy="170" r="22" fill="#111" stroke="#2e2e2e" stroke-width="1.5"/>
  <text x="100" y="175" class="value" text-anchor="middle">x₂</text>

  <circle cx="100" cy="240" r="22" fill="#111" stroke="#2e2e2e" stroke-width="1.5"/>
  <text x="100" y="245" class="value" text-anchor="middle">x₃</text>

  <text x="100" y="52" class="label-sm" text-anchor="middle">입력값</text>
  <text x="100" y="64" class="label-sm" text-anchor="middle">INPUTS</text>

  <!-- Arrows to neuron with weights -->
  <line x1="124" y1="108" x2="290" y2="155" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="124" y1="170" x2="290" y2="170" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="124" y1="232" x2="290" y2="186" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Weight labels -->
  <text x="190" y="122" class="weight" text-anchor="middle">w₁</text>
  <text x="205" y="163" class="weight" text-anchor="middle">w₂</text>
  <text x="190" y="222" class="weight" text-anchor="middle">w₃</text>

  <!-- Neuron body -->
  <circle cx="340" cy="170" r="46" fill="#141414" stroke="#3d3d3d" stroke-width="2"/>
  <text x="340" y="162" class="label" text-anchor="middle">Σ</text>
  <text x="340" y="178" font-size="10" fill="#555" text-anchor="middle">가중합 계산</text>

  <text x="340" y="52" class="label-sm" text-anchor="middle">뉴런</text>
  <text x="340" y="64" class="label-sm" text-anchor="middle">NEURON</text>

  <!-- Arrow to activation -->
  <line x1="388" y1="170" x2="448" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Activation function box -->
  <rect x="456" y="136" width="120" height="68" rx="8" fill="#111" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="516" y="162" class="label" text-anchor="middle">f(x)</text>
  <text x="516" y="178" font-size="10" fill="#555" text-anchor="middle">활성화 함수</text>
  <text x="516" y="194" font-size="9" fill="#3a3a3a" text-anchor="middle">ReLU / Sigmoid</text>

  <text x="516" y="52" class="label-sm" text-anchor="middle">활성화 함수</text>
  <text x="516" y="64" class="label-sm" text-anchor="middle">ACTIVATION</text>

  <!-- Arrow to output -->
  <line x1="578" y1="170" x2="638" y2="170" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output node -->
  <circle cx="684" cy="170" r="36" fill="#181818" stroke="#4a4a4a" stroke-width="2"/>
  <rect x="648" y="166" width="72" height="4" rx="2" fill="#333"/>
  <text x="684" y="164" class="value" text-anchor="middle" font-size="15">y</text>
  <text x="684" y="182" font-size="10" fill="#666" text-anchor="middle">출력값</text>

  <text x="684" y="52" class="label-sm" text-anchor="middle">출력값</text>
  <text x="684" y="64" class="label-sm" text-anchor="middle">OUTPUT</text>

  <!-- Bottom formula -->
  <text x="440" y="256" font-size="11" fill="#444" text-anchor="middle">y  =  f( w₁x₁ + w₂x₂ + w₃x₃ + b )</text>
  <text x="440" y="274" font-size="10" fill="#2e2e2e" text-anchor="middle">b = 편향(bias) — 뉴런이 활성화될 기준을 조정하는 값</text>
</svg>
