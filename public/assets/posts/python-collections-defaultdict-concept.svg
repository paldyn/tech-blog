<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">defaultdict — 없는 키에 기본값 자동 생성</text>

  <!-- dict: KeyError -->
  <rect x="60" y="72" width="360" height="128" rx="10" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">일반 dict</text>
  <rect x="76" y="104" width="328" height="84" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">d = {}</text>
  <text x="92" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">d[<tspan fill="#ce9178">'a'</tspan>].append(<tspan fill="#b5cea8">1</tspan>)</text>
  <text x="92" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">  → KeyError: 'a'</text>
  <text x="92" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # 먼저 키 확인·초기화 필요</text>

  <!-- defaultdict: no error -->
  <rect x="460" y="72" width="360" height="128" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">defaultdict(list)</text>
  <rect x="476" y="104" width="328" height="84" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="492" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from collections <tspan fill="#7ec8e3">import</tspan> defaultdict</text>
  <text x="492" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">d = defaultdict(<tspan fill="#7ec8e3">list</tspan>)</text>
  <text x="492" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">d[<tspan fill="#ce9178">'a'</tspan>].append(<tspan fill="#b5cea8">1</tspan>)  <tspan fill="#9aa4b8"># OK!</tspan></text>
  <text x="492" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  → {'a': [1]}</text>

  <!-- Factory types -->
  <rect x="60" y="224" width="760" height="152" rx="8" fill="#0d0d0d" stroke="#3a4a6e"/>
  <text x="440" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">default_factory 종류</text>

  <text x="120" y="278" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">list</text>
  <text x="260" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">→ 기본값 []</text>
  <text x="460" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">그룹화·멀티맵 패턴에 활용</text>

  <text x="120" y="302" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">int</text>
  <text x="260" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">→ 기본값 0</text>
  <text x="460" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빈도 집계 (Counter 대안)</text>

  <text x="120" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">set</text>
  <text x="260" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">→ 기본값 set()</text>
  <text x="460" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중복 없는 멀티맵</text>

  <text x="120" y="350" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">lambda</text>
  <text x="260" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">→ 임의 기본값</text>
  <text x="460" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">defaultdict(lambda: "unknown")</text>
</svg>
