<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SSH vs HTTPS 비교</text>

  <!-- SSH column -->
  <rect x="60" y="72" width="360" height="52" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">SSH</text>
  <text x="240" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">git@github.com:user/repo.git</text>

  <!-- HTTPS column -->
  <rect x="460" y="72" width="360" height="52" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="640" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">HTTPS</text>
  <text x="640" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">https://github.com/user/repo.git</text>

  <!-- Row 1: 인증 방식 -->
  <rect x="60" y="142" width="360" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">인증 방식</text>
  <text x="240" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">공개 키 암호화 (비밀번호 없음)</text>

  <rect x="460" y="142" width="360" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">인증 방식</text>
  <text x="640" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">username + PAT (Personal Access Token)</text>

  <!-- Row 2: 초기 설정 -->
  <rect x="60" y="208" width="360" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">초기 설정</text>
  <text x="240" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">키 생성·등록 필요 (1회)</text>

  <rect x="460" y="208" width="360" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">초기 설정</text>
  <text x="640" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">즉시 사용 가능 (credential 저장 권장)</text>

  <!-- Row 3: 방화벽 -->
  <rect x="60" y="274" width="360" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">방화벽/포트</text>
  <text x="240" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">포트 22 (일부 기업 방화벽 차단)</text>

  <rect x="460" y="274" width="360" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">방화벽/포트</text>
  <text x="640" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">포트 443 (방화벽 거의 허용)</text>

  <!-- Row 4: 추천 -->
  <rect x="60" y="340" width="360" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">추천 상황</text>
  <text x="240" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">개인 PC·서버, 자동화, 빈번한 push</text>

  <rect x="460" y="340" width="360" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">추천 상황</text>
  <text x="640" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기업 네트워크, 일회성 clone</text>

  <!-- Bottom note -->
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GitHub는 2021년부터 HTTPS 패스워드 인증 중단 → PAT 필수</text>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SSH over HTTPS (포트 443): ssh -p 443 git@ssh.github.com 으로 방화벽 우회 가능</text>
</svg>
