<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">AggregateError — 구조와 Promise.any</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">여러 에러를 .errors 배열로 묶어 하나의 에러로 전달</text>

  <!-- AggregateError box -->
  <rect x="280" y="90" width="320" height="100" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">AggregateError</text>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">.message: "All promises were rejected"</text>
  <text x="440" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">.errors: [ Error, Error, Error, ... ]</text>

  <!-- Arrows to individual errors -->
  <line x1="330" y1="190" x2="200" y2="238" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="193,232 198,242 206,234" fill="#7ec8e3"/>
  <line x1="420" y1="190" x2="380" y2="238" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="373,232 378,242 386,234" fill="#7ec8e3"/>
  <line x1="460" y1="190" x2="500" y2="238" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="493,232 498,242 506,234" fill="#7ec8e3"/>
  <line x1="550" y1="190" x2="680" y2="238" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="673,232 678,242 686,234" fill="#7ec8e3"/>

  <!-- Individual errors -->
  <rect x="110" y="240" width="160" height="50" rx="6" fill="#0a1020" stroke="#7777cc"/>
  <text x="190" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">NetworkError</text>
  <text x="190" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">"서버 A 응답 없음"</text>

  <rect x="290" y="240" width="140" height="50" rx="6" fill="#0a1020" stroke="#7777cc"/>
  <text x="360" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">TimeoutError</text>
  <text x="360" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">"서버 B 타임아웃"</text>

  <rect x="450" y="240" width="130" height="50" rx="6" fill="#0a1020" stroke="#7777cc"/>
  <text x="515" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">AuthError</text>
  <text x="515" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">"서버 C 인증 실패"</text>

  <rect x="600" y="240" width="130" height="50" rx="6" fill="#0a1020" stroke="#7777cc"/>
  <text x="665" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">RangeError</text>
  <text x="665" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">"서버 D 초과"</text>

  <!-- Promise.any context -->
  <rect x="50" y="316" width="780" height="116" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="235" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Promise.any — 하나라도 성공하면 OK</text>

  <text x="66" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">try</text>
  <text x="90" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> {</text>
  <text x="66" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  const</text>
  <text x="102" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> data = </text>
  <text x="148" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">await</text>
  <text x="182" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Promise.any([fetchA(), fetchB(), fetchC()]);</text>
  <text x="66" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">} </text>
  <text x="78" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">catch</text>
  <text x="108" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (e) {  </text>
  <text x="162" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 모두 실패 → AggregateError</text>
  <text x="66" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  if</text>
  <text x="84" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (e </text>
  <text x="100" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">instanceof</text>
  <text x="168" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> AggregateError) {</text>
  <text x="66" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    e.errors.forEach(err =&gt; logger.warn(err.message));</text>
</svg>
