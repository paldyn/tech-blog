<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일 상태와 git status 출력</text>

  <!-- States flow -->
  <!-- Untracked -->
  <rect x="60" y="80" width="160" height="70" rx="8" fill="#1a1a0a" stroke="#5a5a20" stroke-width="1.5"/>
  <text x="140" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Untracked</text>
  <text x="140" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Git이 모르는 파일</text>
  <text x="140" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">새로 생성됨</text>

  <!-- Arrow: Untracked -> Staged -->
  <line x1="220" y1="115" x2="280" y2="115" stroke="#55c555" stroke-width="2"/>
  <polygon points="280,109 292,115 280,121" fill="#55c555"/>
  <text x="256" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">git add</text>

  <!-- Staged -->
  <rect x="292" y="80" width="160" height="70" rx="8" fill="#0a1a0a" stroke="#205a20" stroke-width="1.5"/>
  <text x="372" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Staged</text>
  <text x="372" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">인덱스에 등록됨</text>
  <text x="372" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">커밋 대기 중</text>

  <!-- Arrow: Staged -> Committed -->
  <line x1="452" y1="115" x2="512" y2="115" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="512,109 524,115 512,121" fill="#7ec8e3"/>
  <text x="488" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">git commit</text>

  <!-- Committed / Unmodified -->
  <rect x="524" y="80" width="160" height="70" rx="8" fill="#0a0a1a" stroke="#20205a" stroke-width="1.5"/>
  <text x="604" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Committed</text>
  <text x="604" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(Unmodified)</text>
  <text x="604" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">저장소와 동일</text>
  <text x="604" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">status에 안 보임</text>

  <!-- Modified box -->
  <rect x="292" y="210" width="160" height="70" rx="8" fill="#1a0a0a" stroke="#5a2020" stroke-width="1.5"/>
  <text x="372" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Modified</text>
  <text x="372" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">커밋 후 수정됨</text>
  <text x="372" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">인덱스와 불일치</text>

  <!-- Arrow: Committed -> Modified (edit file) -->
  <line x1="604" y1="150" x2="604" y2="198" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="604" y1="198" x2="452" y2="245" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="452,239 440,245 452,251" fill="#888"/>
  <text x="560" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">파일 수정</text>

  <!-- Arrow: Modified -> Staged -->
  <line x1="372" y1="210" x2="372" y2="150" stroke="#55c555" stroke-width="2"/>
  <polygon points="366,150 372,138 378,150" fill="#55c555"/>
  <text x="384" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">git add</text>

  <!-- Arrow: Modified -> Working (restore) -->
  <line x1="292" y1="245" x2="220" y2="200" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="226,196 214,194 218,206" fill="#e05555"/>
  <text x="220" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">git restore</text>

  <!-- Status output sample -->
  <rect x="60" y="310" width="760" height="110" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">git status 출력 예시</text>
  <text x="80" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">Changes to be committed:</text>
  <text x="80" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  new file:   src/auth.js</text>
  <text x="380" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">Changes not staged for commit:</text>
  <text x="380" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">  modified:   README.md</text>
  <text x="80" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Untracked files:</text>
  <text x="80" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  .env.local</text>
</svg>
