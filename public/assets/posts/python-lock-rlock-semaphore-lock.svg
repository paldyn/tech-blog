  <text x="150" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">락 풀릴 때까지 대기</text>

  <rect x="500" y="140" width="320" height="120" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
