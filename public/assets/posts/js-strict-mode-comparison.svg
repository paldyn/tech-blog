<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Sloppy Mode vs Strict Mode 비교</text>

  <!-- Left: Sloppy Mode -->
  <rect x="60" y="68" width="360" height="380" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="68" width="360" height="40" rx="8" fill="#e05555" fill-opacity="0.18"/>
  <text x="240" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#e05555">Sloppy Mode (기본)</text>

  <!-- Sloppy items -->
  <text x="80" y="130" font-size="13" font-weight="600" fill="#888">미선언 변수 사용</text>
  <rect x="80" y="138" width="320" height="52" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">x = 10; // 전역 변수로 자동 생성</text>
  <text x="92" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 에러 없음 ← 조용히 전역 오염</text>

  <text x="80" y="212" font-size="13" font-weight="600" fill="#888">this = 전역 객체</text>
  <rect x="80" y="220" width="320" height="52" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">function f() {</text>
  <text x="92" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  return this; // window (브라우저)</text>

  <text x="80" y="296" font-size="13" font-weight="600" fill="#888">중복 매개변수</text>
  <rect x="80" y="304" width="320" height="52" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">function f(a, a) {</text>
  <text x="92" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">  return a; // 마지막 a 반환, 경고 없음</text>

  <text x="80" y="380" font-size="13" font-weight="600" fill="#888">with 문 허용</text>
  <rect x="80" y="388" width="320" height="38" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="411" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">with(obj) { x = 1; } // 허용</text>

  <!-- Center arrow -->
  <polygon points="426,228 426,252 454,240" fill="#7777cc"/>

  <!-- Right: Strict Mode -->
  <rect x="460" y="68" width="360" height="380" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <rect x="460" y="68" width="360" height="40" rx="8" fill="#55c555" fill-opacity="0.18"/>
  <text x="640" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">Strict Mode ('use strict')</text>

  <!-- Strict items -->
  <text x="480" y="130" font-size="13" font-weight="600" fill="#888">미선언 변수 사용</text>
  <rect x="480" y="138" width="320" height="52" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">'use strict';</text>
  <text x="492" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">x = 10; // ReferenceError!</text>

  <text x="480" y="212" font-size="13" font-weight="600" fill="#888">this = undefined</text>
  <rect x="480" y="220" width="320" height="52" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">function f() {</text>
  <text x="492" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">  return this; // undefined</text>

  <text x="480" y="296" font-size="13" font-weight="600" fill="#888">중복 매개변수</text>
  <rect x="480" y="304" width="320" height="52" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">function f(a, a) {</text>
  <text x="492" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">  // SyntaxError!</text>

  <text x="480" y="380" font-size="13" font-weight="600" fill="#888">with 문 금지</text>
  <rect x="480" y="388" width="320" height="38" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="411" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">with(obj) {} // SyntaxError!</text>

  <!-- Footer -->
  <text x="440" y="488" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
