<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px">
  <!-- Background -->
  <rect x="0" y="0" width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Header band -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">베이즈 정리: 스팸 탐지로 이해하기</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">사전 확률 × 우도 → 사후 확률로 분류하는 나이브 베이즈의 핵심</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Section label -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">베이즈 정리 공식 흐름도</text>

  <!-- ===== FORMULA ROW ===== -->
  <!-- Box 1: P(Class|Features) -->
  <rect x="60" y="118" width="170" height="64" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="2"/>
  <text x="145" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사후 확률 (Posterior)</text>
  <text x="145" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">P(Class|X)</text>
  <text x="145" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">우리가 구하려는 것</text>

  <!-- = sign -->
  <text x="244" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">=</text>

  <!-- Box 2: P(X|Class) -->
  <rect x="264" y="118" width="152" height="64" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="340" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">우도 (Likelihood)</text>
  <text x="340" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">P(X|Class)</text>
  <text x="340" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">해당 클래스에서 X 관찰 확률</text>

  <!-- × sign -->
  <text x="430" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">×</text>

  <!-- Box 3: P(Class) -->
  <rect x="450" y="118" width="136" height="64" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="2"/>
  <text x="518" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사전 확률 (Prior)</text>
  <text x="518" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">P(Class)</text>
  <text x="518" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">클래스 자체 발생 확률</text>

  <!-- ÷ sign -->
  <text x="601" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">÷</text>

  <!-- Box 4: P(X) -->
  <rect x="621" y="118" width="198" height="64" rx="8" fill="#0d1520" stroke="#e05555" stroke-width="2"/>
  <text x="720" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">증거 (Evidence)</text>
  <text x="720" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">P(X)</text>
  <text x="720" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">상수 — 분류 시 무시 가능</text>

  <!-- ===== SPAM EXAMPLE ===== -->
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스팸 탐지 예제: 이메일에 "무료"라는 단어가 있을 때</text>

  <!-- Step 1 -->
  <rect x="60" y="220" width="222" height="68" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="171" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">① 사전 확률</text>
  <text x="171" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">P(Spam) = 0.40</text>
  <text x="171" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체 메일 중 40%가 스팸</text>

  <!-- Arrow 1→2 -->
  <line x1="282" y1="254" x2="318" y2="254" stroke="#7777cc" stroke-width="2"/>
  <polygon points="318,248 330,254 318,260" fill="#7777cc"/>

  <!-- Step 2 -->
  <rect x="330" y="220" width="222" height="68" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="441" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">② 우도 계산</text>
  <text x="441" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">P("무료"|Spam) = 0.80</text>
  <text x="441" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스팸 중 80%에 "무료" 포함</text>

  <!-- Arrow 2→3 -->
  <line x1="552" y1="254" x2="588" y2="254" stroke="#7777cc" stroke-width="2"/>
  <polygon points="588,248 600,254 588,260" fill="#7777cc"/>

  <!-- Step 3 -->
  <rect x="600" y="220" width="220" height="68" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="2"/>
  <text x="710" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">③ 사후 확률</text>
  <text x="710" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">P(Spam|"무료") ≈ 0.84</text>
  <text x="710" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">"스팸" 판정!</text>

  <!-- ===== NAIVE ASSUMPTION BOX ===== -->
  <rect x="60" y="308" width="760" height="68" rx="8" fill="#0d1520" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">나이브(Naive) 가정: 조건부 독립</text>
  <text x="440" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">P(x₁,x₂,...,xₙ|Class) = P(x₁|Class) × P(x₂|Class) × ... × P(xₙ|Class)</text>
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 특성이 서로 독립이라고 가정 — 현실에선 틀리지만 실제로 잘 작동함</text>

  <!-- Footer -->
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
