<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">양방향 RNN 활용 예시</text>

  <!-- NER example -->
  <rect x="60" y="76" width="360" height="140" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">개체명 인식 (NER)</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">"Apple은 팀 쿡이 이끄는 회사다"</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• "Apple": 앞뒤 문맥 없으면 과일/회사 모호</text>
  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 뒤의 "회사다"를 보면 ORG임을 확정</text>
  <text x="80" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ Backward 방향이 결정적</text>

  <!-- POS example -->
  <rect x="460" y="76" width="360" height="140" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="640" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">감정 분석 / 분류</text>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">"맛은 좋지만 서비스가 별로"</text>
  <text x="480" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 전체 문장의 맥락이 감정 결정</text>
  <text x="480" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• [CLS] 토큰에 양방향 정보 집약</text>
  <text x="480" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">→ BERT = 양방향 Transformer</text>

  <!-- Code block -->
  <rect x="60" y="240" width="760" height="96" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># PyTorch 양방향 LSTM</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">bilstm = nn.LSTM(input_size=</tspan><tspan fill="#b5cea8">128</tspan><tspan fill="#e8e8e8">, hidden_size=</tspan><tspan fill="#b5cea8">128</tspan><tspan fill="#e8e8e8">, bidirectional=</tspan><tspan fill="#b5cea8">True</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">out, (h_n, c_n) = bilstm(x)</text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># out: (B, T, 256)  ← hidden*2. 양방향 concat</text>

  <!-- Note -->
  <rect x="60" y="354" width="760" height="32" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">주의: 양방향 RNN은 학습 전용 — 미래 토큰을 보므로 자기회귀 생성(GPT)에는 사용 불가</text>
</svg>
