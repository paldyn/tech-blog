<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Form 상속 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">BaseForm → 업무 Form 상속 관계</text>

  <!-- BaseForm at top -->
  <rect x="290" y="90" width="300" height="72" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="2.5"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">BaseForm.xfdl (추상)</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">공통 함수 · 공통 Dataset · 공통 UI</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">직접 표시 안 됨 — extends 대상</text>

  <!-- Arrow down -->
  <line x1="280" y1="162" x2="160" y2="198" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="156,204 154,192 166,196" fill="#555"/>
  <line x1="440" y1="162" x2="440" y2="198" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="440,204 435,194 445,194" fill="#555"/>
  <line x1="600" y1="162" x2="720" y2="198" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="724,204 714,196 726,192" fill="#555"/>

  <!-- Extends label -->
  <text x="290" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">extends</text>
  <text x="440" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">extends</text>
  <text x="590" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">extends</text>

  <!-- Child forms -->
  <rect x="60" y="206" width="200" height="68" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">OrderList.xfdl</text>
  <text x="160" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">주문 목록 화면</text>
  <text x="160" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">+ fn_search(), grdOrder</text>

  <rect x="340" y="206" width="200" height="68" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">CustMgmt.xfdl</text>
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">고객 관리 화면</text>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">+ fn_search(), grdCust</text>

  <rect x="620" y="206" width="200" height="68" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">ProdDetail.xfdl</text>
  <text x="720" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">상품 상세 화면</text>
  <text x="720" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">+ fn_save(), edtProdNm</text>

  <!-- BaseForm contents box -->
  <rect x="60" y="304" width="760" height="152" rx="8" fill="#0e0e1c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">BaseForm이 제공하는 것 (모든 자식 Form에 상속)</text>

  <!-- Column 1: 공통 함수 -->
  <text x="120" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">공통 함수</text>
  <text x="120" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">gfn_init()</text>
  <text x="120" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">gfn_openPopup()</text>
  <text x="120" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">gfn_alert()</text>
  <text x="120" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">gfn_confirm()</text>

  <!-- Column 2: 공통 Dataset -->
  <text x="320" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a" text-anchor="middle">공통 Dataset</text>
  <text x="320" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">dsCommonCode</text>
  <text x="320" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">dsUserInfo</text>
  <text x="320" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">dsSearchParam</text>

  <!-- Column 3: 공통 UI -->
  <text x="540" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">공통 UI</text>
  <text x="540" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">divSearchBar (검색 바)</text>
  <text x="540" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">divButtonBar (버튼 바)</text>
  <text x="540" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">divStatusBar (상태 바)</text>

  <!-- Column 4: 생명주기 기본 구현 -->
  <text x="750" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">생명주기</text>
  <text x="750" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Form_onload</text>
  <text x="750" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Form_onunload</text>
  <text x="750" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Form_onactivate</text>

  <!-- Footer -->
  <text x="440" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
