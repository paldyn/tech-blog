<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N Dataset 타입 한눈에</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">4가지 Dataset 타입과 각각의 특징</text>

  <!-- ===== TYPE 1: Dataset ===== -->
  <rect x="60" y="92" width="360" height="130" fill="#0f0f1a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="92" width="360" height="36" fill="#1a1a2e" rx="8"/>
  <rect x="60" y="116" width="360" height="12" fill="#1a1a2e"/>
  <text x="240" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Dataset</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 가장 기본적인 타입</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 서버 트랜잭션으로 데이터 교환</text>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 행 추가·수정·삭제 추적</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일반 CRUD 화면의 표준 선택</text>

  <!-- ===== TYPE 2: ConstDataset ===== -->
  <rect x="460" y="92" width="360" height="130" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <rect x="460" y="92" width="360" height="36" fill="#1a2e1a" rx="8"/>
  <rect x="460" y="116" width="360" height="12" fill="#1a2e1a"/>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">ConstDataset</text>
  <text x="480" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 디자인 타임에 값을 고정 입력</text>
  <text x="480" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 공통 코드·Combo 항목 등에 활용</text>
  <text x="480" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 런타임에 추가·수정 불가</text>
  <text x="480" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정적 코드 목록 바인딩에 최적</text>

  <!-- ===== TYPE 3: NativeDataset ===== -->
  <rect x="60" y="252" width="360" height="130" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="252" width="360" height="36" fill="#2e1a1a" rx="8"/>
  <rect x="60" y="276" width="360" height="12" fill="#2e1a1a"/>
  <text x="240" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">NativeDataset (참조)</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 다른 Dataset을 참조(포인터)</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 별도 메모리 없이 원본과 동기화</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 팝업·서브폼에 Dataset 전달 시 활용</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메모리 절약, 양방향 즉시 반영</text>

  <!-- ===== TYPE 4: PlatformObject Dataset ===== -->
  <rect x="460" y="252" width="360" height="130" fill="#0f0f1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="460" y="252" width="360" height="36" fill="#1a1a2e" rx="8"/>
  <rect x="460" y="276" width="360" height="12" fill="#1a1a2e"/>
  <text x="640" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Script Dataset (동적)</text>
  <text x="480" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 스크립트로 런타임에 생성</text>
  <text x="480" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• new Dataset() 으로 직접 생성</text>
  <text x="480" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 임시 계산·병합·변환 작업에 사용</text>
  <text x="480" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">재사용 로직의 중간 버퍼 역할</text>

  <!-- Connecting arrows (middle) -->
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#555" text-anchor="middle">↔</text>
  <text x="440" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#555" text-anchor="middle">↔</text>
  <line x1="440" y1="222" x2="440" y2="252" stroke="#333" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">가장 자주 쓰이는 것은 Dataset과 ConstDataset입니다</text>
</svg>
