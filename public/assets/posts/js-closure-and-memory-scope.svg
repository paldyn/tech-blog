<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">클로저가 외부 변수를 붙잡는 구조</text>

  <!-- Code block: outer function -->
  <rect x="60" y="62" width="400" height="240" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="84" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">function</tspan><tspan fill="#e8e8e8"> outer() {</tspan>
  </text>
  <text x="76" y="102" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#6a8aa0">  // 이 변수들이 클로저에 캡처됨</tspan>
  </text>
  <text x="76" y="120" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">  let</tspan><tspan fill="#e8e8e8"> count </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">;</tspan>
  </text>
  <text x="76" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">  const</tspan><tspan fill="#e8e8e8"> data </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Array(</tspan><tspan fill="#b5cea8">50000</tspan><tspan fill="#e8e8e8">);</tspan>
  </text>
  <text x="76" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">  function</tspan><tspan fill="#e8e8e8"> inner() {</tspan>
  </text>
  <text x="76" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">    count</tspan><tspan fill="#7ec8e3">++</tspan><tspan fill="#e8e8e8">;</tspan><tspan fill="#6a8aa0"> // count 캡처</tspan>
  </text>
  <text x="76" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#6a8aa0">    // data는 참조만 해도 캡처됨</tspan>
  </text>
  <text x="76" y="210" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    return</tspan><tspan fill="#e8e8e8"> data[count];</tspan>
  </text>
  <text x="76" y="228" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }
  </text>
  <text x="76" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">  return</tspan><tspan fill="#e8e8e8"> inner;</tspan>
  </text>
  <text x="76" y="264" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}
  </text>
  <text x="76" y="282" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> fn </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> outer();</tspan>
  </text>
  <text x="76" y="300" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// outer() 반환 후에도 count·data 살아있음!
  </text>

  <!-- Memory diagram (right side) -->
  <!-- fn variable in stack -->
  <rect x="500" y="80" width="140" height="44" fill="#141f2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="570" y="98" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">변수 fn (스택)</text>
  <text x="570" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">ref → inner 함수</text>

  <!-- Arrow to inner function in heap -->
  <line x1="642" y1="102" x2="668" y2="102" stroke="#7777cc" stroke-width="2"/>
  <polygon points="666,96 682,102 666,108" fill="#7777cc"/>

  <!-- inner function box in heap -->
  <rect x="684" y="68" width="156" height="68" fill="#0d1f2d" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="762" y="92" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc">inner 함수 객체</text>
  <text x="762" y="110" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">[[Environment]] →</text>
  <text x="762" y="126" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc">outer 스코프</text>

  <!-- Arrow to closure environment -->
  <line x1="762" y1="138" x2="762" y2="172" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="758,169 762,182 766,169" fill="#55c555"/>

  <!-- outer scope environment -->
  <rect x="684" y="184" width="156" height="80" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="762" y="206" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">outer 환경 레코드</text>
  <text x="762" y="226" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">count: 0</text>
  <text x="762" y="246" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">data: → [50000]</text>

  <!-- GC cannot collect -->
  <text x="762" y="290" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">fn이 살아있는 한</text>
  <text x="762" y="308" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">outer 환경도 수거 불가</text>

  <!-- Scope chain arrow -->
  <text x="640" y="214" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">[[Environment]]</text>

  <!-- outer() 호출 스택 설명 -->
  <rect x="460" y="340" width="380" height="100" fill="#0f0f1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="362" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">클로저 메모리 수명</text>
  <text x="650" y="384" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">1. outer() 반환 → outer 스택 프레임 제거</text>
  <text x="650" y="402" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">2. 하지만 inner의 [[Environment]]가 outer 환경 참조</text>
  <text x="650" y="420" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">3. fn = null 전까지 count·data는 힙에서 살아있음</text>

  <!-- Bottom note -->
  <text x="240" y="394" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">클로저 = 함수 + [[Environment]] (렉시컬 환경)</text>
  <text x="240" y="414" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">함수가 살아있는 한 캡처된 변수도 GC 불가</text>
  <text x="240" y="434" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">이것이 클로저의 힘이자 메모리 누수의 원천</text>
</svg>
