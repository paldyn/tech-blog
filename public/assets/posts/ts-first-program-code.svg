<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">첫 TypeScript 프로그램</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">타입 어노테이션으로 함수 시그니처를 명확하게</text>
  <!-- Main code box -->
  <rect x="60" y="96" width="500" height="330" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// hello.ts</tspan></text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff"> </tspan></text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">interface</tspan><tspan fill="#ffffff"> Greeting {</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  message: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  language: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff"> </tspan></text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> greet(name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">): Greeting {</tspan></text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    message: </tspan><tspan fill="#ce9178">"Hello, "</tspan><tspan fill="#ffffff"> + name + </tspan><tspan fill="#ce9178">"!"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    language: </tspan><tspan fill="#ce9178">"TypeScript"</tspan></text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  };</tspan></text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff"> </tspan></text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">console.log(greet(</tspan><tspan fill="#ce9178">"World"</tspan><tspan fill="#ffffff">));</tspan></text>
  <!-- Annotations panel -->
  <rect x="580" y="96" width="240" height="330" rx="6" fill="#111122" stroke="#2a2a4e" stroke-width="1"/>
  <text x="700" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">코드 설명</text>
  <line x1="596" y1="132" x2="804" y2="132" stroke="#2a2a4e" stroke-width="1"/>
  <text x="596" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">interface Greeting</text>
  <text x="596" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">반환값의 모양을 미리 정의</text>
  <text x="596" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컴파일 후 사라지는 타입 정보</text>
  <line x1="596" y1="210" x2="804" y2="210" stroke="#1a1a3a" stroke-width="1"/>
  <text x="596" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">name: string</text>
  <text x="596" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">매개변수 타입 어노테이션</text>
  <text x="596" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">string 외 타입 전달 시 오류</text>
  <line x1="596" y1="284" x2="804" y2="284" stroke="#1a1a3a" stroke-width="1"/>
  <text x="596" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">): Greeting</text>
  <text x="596" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">반환 타입 어노테이션</text>
  <text x="596" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">반환값이 Greeting과 다르면 오류</text>
  <line x1="596" y1="358" x2="804" y2="358" stroke="#1a1a3a" stroke-width="1"/>
  <text x="596" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">실행 방법</text>
  <text x="596" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">npx tsc hello.ts</text>
  <text x="596" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">node hello.js</text>
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">타입 어노테이션은 선택 사항이지만, 명시할수록 더 강력한 검사를 받습니다</text>
</svg>
