<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">첫 TypeScript 프로그램</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">JavaScript에서 TypeScript로: 타입 추가가 전부다</text>
  <!-- JS version -->
  <text x="215" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">JavaScript (greet.js)</text>
  <rect x="60" y="110" width="310" height="250" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text>
  <text x="165" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> greet(name) {</text>
  <text x="76" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text>
  <text x="149" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve"> `Hello, ${name}!`</text>
  <text x="76" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="127" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> msg = greet(</text>
  <text x="248" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"Alice"</text>
  <text x="305" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">console.log(msg);</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// name이 뭐든 들어온다</text>
  <text x="76" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 에러가 없어도 버그 가능</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">greet(42);</text>
  <text x="76" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// "Hello, 42!" — 에러 없음(문제)</text>
  <!-- Arrow in middle -->
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="24" fill="#7ec8e3">+타입</text>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">⟶</text>
  <!-- TS version -->
  <text x="665" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">TypeScript (greet.ts)</text>
  <rect x="510" y="110" width="310" height="250" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="526" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text>
  <text x="615" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> greet(</text>
  <text x="526" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  name</text>
  <text x="572" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="587" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">string</text>
  <text x="526" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="536" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="551" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">string</text>
  <text x="605" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> {</text>
  <text x="526" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text>
  <text x="599" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve"> `Hello, ${name}!`</text>
  <text x="526" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="526" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="577" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> msg = greet(</text>
  <text x="698" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"Alice"</text>
  <text x="755" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="526" y="265" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">console.log(msg);</text>
  <text x="526" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 에러: number는 string이 아님</text>
  <text x="526" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">greet(42);</text>
  <text x="526" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">// 컴파일 에러 발생!</text>
  <!-- Bottom -->
  <rect x="60" y="378" width="760" height="90" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">컴파일 &amp; 실행 명령</text>
  <rect x="80" y="412" width="700" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="431" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 1단계: 컴파일</text>
  <text x="316" y="431" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">npx tsc greet.ts</text>
  <text x="96" y="449" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 2단계: 실행</text>
  <text x="316" y="449" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">node greet.js</text>
</svg>
