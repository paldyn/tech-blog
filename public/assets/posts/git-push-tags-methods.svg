<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">태그 push — 3가지 방법 비교</text>
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#888">로컬 태그는 자동으로 push 되지 않는다</text>

  <!-- Method 1 -->
  <rect x="60" y="105" width="230" height="230" rx="8" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="175" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">단일 태그</text>
  <rect x="76" y="144" width="198" height="58" rx="5" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">git push </text>
  <text x="157" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">origin</text>
  <text x="92" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  v1.0.0</text>
  <text x="175" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">특정 태그 하나만</text>
  <text x="175" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원격으로 전송</text>
  <text x="175" y="272" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">정밀 제어 가능</text>
  <text x="175" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">주석 태그·경량 태그 모두</text>

  <!-- Method 2 -->
  <rect x="325" y="105" width="230" height="230" rx="8" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="440" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">전체 태그</text>
  <rect x="341" y="144" width="198" height="58" rx="5" fill="#000000" stroke="#3a4a6e"/>
  <text x="357" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">git push </text>
  <text x="422" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">origin</text>
  <text x="357" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">  --tags</text>
  <text x="440" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로컬의 모든 태그를</text>
  <text x="440" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">한 번에 전송</text>
  <text x="440" y="272" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">주석·경량 모두 포함</text>
  <text x="440" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">삭제된 태그는 미반영</text>

  <!-- Method 3 -->
  <rect x="590" y="105" width="230" height="230" rx="8" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="705" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">커밋 연관 태그</text>
  <rect x="606" y="144" width="198" height="58" rx="5" fill="#000000" stroke="#3a4a6e"/>
  <text x="622" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">git push </text>
  <text x="687" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">origin</text>
  <text x="622" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">  --follow-tags</text>
  <text x="705" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">push 하는 커밋에</text>
  <text x="705" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">연결된 태그만 전송</text>
  <text x="705" y="272" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">주석 태그만 대상</text>
  <text x="705" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">릴리스 워크플로 적합</text>

  <!-- Bottom note -->
  <rect x="60" y="355" width="760" height="46" rx="6" fill="#0d1117" stroke="#2a3a52"/>
  <text x="440" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">주의: push.followTags = true 로 설정하면 항상 --follow-tags 적용</text>
</svg>
