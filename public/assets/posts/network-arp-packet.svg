<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ARP 패킷 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Request / Reply 모두 동일 포맷</text>

  <!-- ARP fields row 1 -->
  <rect x="60" y="90" width="180" height="52" rx="5" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="150" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">Hardware Type</text>
  <text x="150" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555">1 = Ethernet</text>

  <rect x="250" y="90" width="180" height="52" rx="5" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="340" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">Protocol Type</text>
  <text x="340" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555">0x0800 = IPv4</text>

  <rect x="440" y="90" width="120" height="52" rx="5" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="500" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">HW Size</text>
  <text x="500" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555">6 (MAC)</text>

  <rect x="570" y="90" width="120" height="52" rx="5" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="630" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">Proto Size</text>
  <text x="630" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555">4 (IPv4)</text>

  <rect x="700" y="90" width="120" height="52" rx="5" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="760" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Opcode</text>
  <text x="760" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">1=Req 2=Rep</text>

  <!-- ARP fields row 2 -->
  <rect x="60" y="155" width="240" height="52" rx="5" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="180" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">Sender MAC Address (6B)</text>
  <text x="180" y="198" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">AA:AA:AA:AA:AA:AA</text>

  <rect x="310" y="155" width="180" height="52" rx="5" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="400" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Sender IP (4B)</text>
  <text x="400" y="198" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">192.168.1.10</text>

  <rect x="500" y="155" width="240" height="52" rx="5" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="620" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">Target MAC Address (6B)</text>
  <text x="620" y="198" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">00:00:00:00:00:00 (Req)</text>

  <rect x="750" y="155" width="70" height="52" rx="5" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="785" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">Target</text>
  <text x="785" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#55c555">IP (4B)</text>
  <text x="785" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="9" fill="#888">.1.20</text>

  <!-- code box -->
  <rect x="60" y="230" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">ARP 캐시 확인 명령어</text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">arp -n               </text>
  <text x="260" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"># Linux: ARP 테이블 출력</text>
  <text x="80" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ip neigh show        </text>
  <text x="260" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"># 최신 Linux 방식</text>
  <text x="80" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">arp -a               </text>
  <text x="260" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"># macOS / Windows</text>
</svg>
