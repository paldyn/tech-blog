<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">자동 형 확장 변환 (Widening Conversion)</text>

  <!-- Subtitle -->
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">작은 타입 → 큰 타입으로 명시적 캐스팅 없이 자동 변환</text>

  <!-- ─── Integer chain: byte → short → int → long → float → double ─── -->

  <!-- byte -->
  <rect x="60" y="106" width="80" height="46" rx="8" fill="#131b2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">byte</text>
  <text x="100" y="141" text-anchor="middle" font-size="11" fill="#555">8 bit</text>

  <!-- Arrow byte → short -->
  <polygon points="148,129 174,122 174,136" fill="#55c555"/>
  <line x1="140" y1="129" x2="172" y2="129" stroke="#55c555" stroke-width="2"/>

  <!-- short -->
  <rect x="174" y="106" width="80" height="46" rx="8" fill="#131b2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="214" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">short</text>
  <text x="214" y="141" text-anchor="middle" font-size="11" fill="#555">16 bit</text>

  <!-- Arrow short → int -->
  <polygon points="262,129 288,122 288,136" fill="#55c555"/>
  <line x1="254" y1="129" x2="286" y2="129" stroke="#55c555" stroke-width="2"/>

  <!-- int -->
  <rect x="288" y="106" width="80" height="46" rx="8" fill="#131b2e" stroke="#55c555" stroke-width="2"/>
  <text x="328" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">int</text>
  <text x="328" y="141" text-anchor="middle" font-size="11" fill="#555">32 bit</text>

  <!-- Arrow int → long -->
  <polygon points="376,129 402,122 402,136" fill="#55c555"/>
  <line x1="368" y1="129" x2="400" y2="129" stroke="#55c555" stroke-width="2"/>

  <!-- long -->
  <rect x="402" y="106" width="80" height="46" rx="8" fill="#131b2e" stroke="#55c555" stroke-width="2"/>
  <text x="442" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">long</text>
  <text x="442" y="141" text-anchor="middle" font-size="11" fill="#555">64 bit</text>

  <!-- Arrow long → float -->
  <polygon points="490,129 516,122 516,136" fill="#e05555"/>
  <line x1="482" y1="129" x2="514" y2="129" stroke="#e05555" stroke-width="2"/>

  <!-- float -->
  <rect x="516" y="106" width="80" height="46" rx="8" fill="#131b2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="556" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#e05555">float</text>
  <text x="556" y="141" text-anchor="middle" font-size="11" fill="#555">32 bit</text>

  <!-- Arrow float → double -->
  <polygon points="604,129 630,122 630,136" fill="#e05555"/>
  <line x1="596" y1="129" x2="628" y2="129" stroke="#e05555" stroke-width="2"/>

  <!-- double -->
  <rect x="630" y="106" width="90" height="46" rx="8" fill="#131b2e" stroke="#e05555" stroke-width="2"/>
  <text x="675" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#e05555">double</text>
  <text x="675" y="141" text-anchor="middle" font-size="11" fill="#555">64 bit</text>

  <!-- ─── char chain: char → int (joins main chain) ─── -->

  <!-- char box -->
  <rect x="288" y="196" width="80" height="46" rx="8" fill="#131b2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="328" y="214" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7777cc">char</text>
  <text x="328" y="231" text-anchor="middle" font-size="11" fill="#555">16 bit</text>

  <!-- Arrow char → int (upward) -->
  <polygon points="322,190 328,166 334,190" fill="#7777cc"/>
  <line x1="328" y1="196" x2="328" y2="168" stroke="#7777cc" stroke-width="2"/>

  <!-- Label on char arrow -->
  <text x="348" y="186" font-size="11" fill="#7777cc">→ int</text>

  <!-- ─── Narrowing warning box ─── -->
  <rect x="60" y="196" width="210" height="60" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="76" y="218" font-size="13" font-weight="600" fill="#e05555">축소 변환 (Narrowing)</text>
  <text x="76" y="236" font-size="12" fill="#c8c8c8">큰 타입 → 작은 타입</text>
  <text x="76" y="250" font-size="12" fill="#888">명시적 캐스팅 필수 · 데이터 손실 주의</text>

  <!-- ─── Code example box ─── -->
  <rect x="460" y="190" width="360" height="88" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text xml:space="preserve" x="476" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 자동 확장 변환</tspan></text>
  <text xml:space="preserve" x="476" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">int</tspan><tspan fill="#ffffff"> i = </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">;   </tspan><tspan fill="#7ec8e3">long</tspan><tspan fill="#ffffff"> l = i;</tspan></text>
  <text xml:space="preserve" x="476" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 축소 변환 — 캐스팅 필수</tspan></text>
  <text xml:space="preserve" x="476" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">long</tspan><tspan fill="#ffffff"> x = </tspan><tspan fill="#b5cea8">1000L</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3">byte</tspan><tspan fill="#ffffff"> b = (</tspan><tspan fill="#7ec8e3">byte</tspan><tspan fill="#ffffff">) x;</tspan></text>
</svg>
