<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tmpfs: 메모리 기반 파일시스템</text>

  <!-- Memory icon (top) -->
  <rect x="320" y="68" width="240" height="56" fill="#1a1f0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">호스트 RAM (메모리)</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">디스크 I/O 없음 · 매우 빠름</text>

  <!-- Down arrow to container -->
  <line x1="440" y1="124" x2="440" y2="158" stroke="#55c555" stroke-width="2"/>
  <polygon points="440,166 433,152 447,152" fill="#55c555"/>

  <!-- Container -->
  <rect x="200" y="166" width="480" height="110" fill="#111318" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">컨테이너</text>

  <rect x="280" y="202" width="320" height="36" fill="#070b14" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">/run   (tmpfs 마운트)</text>

  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">컨테이너 내부에서는 일반 파일처럼 보임</text>

  <!-- Down: container stop -->
  <line x1="440" y1="276" x2="440" y2="310" stroke="#e05555" stroke-width="2"/>
  <polygon points="440,318 433,304 447,304" fill="#e05555"/>

  <!-- Result -->
  <rect x="240" y="318" width="400" height="44" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">컨테이너 종료 → 데이터 완전 소멸</text>
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">디스크에 흔적 없음 — 보안 민감 데이터에 적합</text>

  <!-- Disk cross out on right -->
  <rect x="698" y="168" width="120" height="88" fill="#1a0a0a" rx="8" stroke="#e05555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="758" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">디스크</text>
  <text x="758" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#e05555" text-anchor="middle">✗</text>
  <text x="758" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기록 안 함</text>
</svg>
