<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">while 루프 실행 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa" text-anchor="middle">조건 반복 vs 무한 루프 + break 패턴</text>

  <!-- Flow diagram -->
  <!-- Start -->
  <rect x="340" y="90" width="200" height="40" rx="20" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">실행 시작</text>

  <line x1="440" y1="130" x2="440" y2="152" stroke="#555" stroke-width="2"/>
  <polygon points="440,156 435,146 445,146" fill="#555"/>

  <!-- Condition diamond -->
  <polygon points="440,156 550,196 440,236 330,196" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">while 조건</text>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">참?</text>

  <!-- True: down to body -->
  <line x1="440" y1="236" x2="440" y2="260" stroke="#55c555" stroke-width="2"/>
  <polygon points="440,264 435,254 445,254" fill="#55c555"/>
  <text x="456" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">True</text>

  <!-- Loop body -->
  <rect x="340" y="264" width="200" height="56" rx="8" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">루프 바디 실행</text>
  <text x="440" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">조건 변수 반드시 갱신!</text>

  <!-- Back to condition -->
  <line x1="340" y1="292" x2="260" y2="292" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="260" y1="292" x2="260" y2="196" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="260" y1="196" x2="330" y2="196" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="334,196 322,191 322,201" fill="#7ec8e3"/>
  <text x="222" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">다시 평가</text>

  <!-- False: exit -->
  <line x1="550" y1="196" x2="640" y2="196" stroke="#e05555" stroke-width="2"/>
  <polygon points="644,196 634,191 634,201" fill="#e05555"/>
  <text x="597" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">False</text>

  <rect x="644" y="174" width="176" height="44" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
  <text x="732" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">루프 종료</text>

  <!-- Infinite loop pattern -->
  <text x="60" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">무한 루프 + break 패턴</text>
  <rect x="60" y="370" width="360" height="90" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">while</text>
  <text x="118" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc"> True</text>
  <text x="154" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="76" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    cmd = </text>
  <text x="148" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">input</text>
  <text x="194" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="201" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"> "</text>
  <text x="233" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="76" y="429" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    if</text>
  <text x="110" y="429" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> cmd == </text>
  <text x="166" y="429" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"quit"</text>
  <text x="210" y="429" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="222" y="429" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">break</text>
  <text x="76" y="447" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    </text>
  <text x="100" y="447" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 명령 처리...</text>

  <!-- Counter pattern -->
  <text x="460" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">카운터 패턴</text>
  <rect x="460" y="370" width="360" height="90" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">count = </text>
  <text x="538" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="476" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">while</text>
  <text x="518" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> count </text>
  <text x="572" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">&lt; </text>
  <text x="586" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">5</text>
  <text x="594" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="476" y="429" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    print</text>
  <text x="536" y="429" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(count)</text>
  <text x="476" y="447" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    count += </text>
  <text x="570" y="447" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text>
  <text x="582" y="447" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # 필수!</text>
</svg>
