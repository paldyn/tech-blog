<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Tag 오브젝트 조작 명령</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">annotated tag 생성·조회·검증</text>

  <!-- Create -->
  <rect x="60" y="92" width="360" height="130" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">생성</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # annotated tag</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git tag</tspan><tspan fill="#ffffff"> -a v1.0.0 -m "Release v1.0.0"</tspan></text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # GPG 서명 포함</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git tag</tspan><tspan fill="#ffffff"> -s v1.0.0 -m "Signed release"</tspan></text>

  <!-- Inspect -->
  <rect x="460" y="92" width="360" height="130" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">조회</text>
  <text x="476" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # tag 오브젝트 원문</text>
  <text x="476" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git cat-file</tspan><tspan fill="#ffffff"> -p v1.0.0</tspan></text>
  <text x="476" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # tag가 가리키는 commit SHA</text>
  <text x="476" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git rev-parse</tspan><tspan fill="#ffffff"> v1.0.0^{}</tspan></text>

  <!-- Verify -->
  <rect x="60" y="240" width="360" height="140" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">GPG 서명 검증</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git tag</tspan><tspan fill="#ffffff"> -v v1.0.0</tspan></text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  object abc123def...</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  type commit</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  tag v1.0.0</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  gpg: Good signature from "Alice"</text>

  <!-- deref note -->
  <rect x="460" y="240" width="360" height="140" fill="#0d0d1a" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">^{} 역참조</text>
  <text x="476" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  v1.0.0        </tspan><tspan fill="#888">  # tag 오브젝트 SHA</tspan></text>
  <text x="476" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  v1.0.0^{}     </tspan><tspan fill="#888">  # commit SHA</tspan></text>
  <text x="476" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  v1.0.0^{tree} </tspan><tspan fill="#888">  # tree SHA</tspan></text>
  <text x="640" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">lightweight는 ^{} 없어도 commit 직접</text>
  <text x="640" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">annotated는 ^{}로 껍질 벗겨야 commit</text>
</svg>
