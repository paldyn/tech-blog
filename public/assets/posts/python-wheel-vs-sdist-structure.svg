<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">sdist vs wheel</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e0a555">sdist (.tar.gz)</text>
  <rect x="60" y="108" width="360" height="170" rx="8" fill="#11151f" stroke="#e0a555" stroke-width="1.5"/>
  <text x="84" y="142" font-size="13" fill="#ffffff">• 소스 코드 + 빌드 설정</text>
  <text x="84" y="174" font-size="13" fill="#ffffff">• pyproject.toml / setup.py 포함</text>
  <text x="84" y="206" font-size="13" fill="#ffffff">• 설치 시 빌드가 필요</text>
  <text x="84" y="238" font-size="13" fill="#888">→ "조리법과 재료"</text>

  <text x="480" y="92" font-size="16" font-weight="600" fill="#55c555">wheel (.whl)</text>
  <rect x="480" y="108" width="340" height="170" rx="8" fill="#11151f" stroke="#55c555" stroke-width="1.5"/>
  <text x="504" y="142" font-size="13" fill="#ffffff">• 빌드 완료된 결과물</text>
  <text x="504" y="174" font-size="13" fill="#ffffff">• 압축 풀어 바로 배치</text>
  <text x="504" y="206" font-size="13" fill="#ffffff">• 플랫폼 태그로 호환성 표시</text>
  <text x="504" y="238" font-size="13" fill="#888">→ "데워서 바로 먹는 완제품"</text>
</svg>
