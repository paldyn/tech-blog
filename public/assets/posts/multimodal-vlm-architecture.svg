<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 450" style="display:block">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09050"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">비전-언어 모델(VLM) 아키텍처 진화</text>
  <text x="440" y="65" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">CLIP → BLIP2 → LLaVA: 이미지·텍스트 정렬 방식의 발전</text>

  <!-- ===== ROW 1: CLIP ===== -->
  <!-- Row label -->
  <rect x="30" y="90" width="60" height="60" rx="6" fill="#111a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="60" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">CLIP</text>
  <text x="60" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">2021</text>

  <!-- Image box -->
  <rect x="120" y="90" width="110" height="60" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">이미지</text>
  <text x="175" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PNG / JPEG</text>

  <!-- ViT Encoder box -->
  <rect x="270" y="90" width="130" height="60" rx="8" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="335" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">ViT 이미지 인코더</text>
  <text x="335" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">패치 임베딩</text>

  <!-- Text box -->
  <rect x="120" y="156" width="110" height="50" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">텍스트</text>
  <text x="175" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">캡션 문장</text>

  <!-- BERT Encoder box -->
  <rect x="270" y="156" width="130" height="50" rx="8" fill="#0e0e1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="335" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">BERT 텍스트 인코더</text>
  <text x="335" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">토큰 임베딩</text>

  <!-- Contrastive Learning box -->
  <rect x="455" y="108" width="160" height="80" rx="8" fill="#1a1a0e" stroke="#e09050" stroke-width="1.5"/>
  <text x="535" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09050">대조 학습</text>
  <text x="535" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">코사인 유사도 최대화</text>
  <text x="535" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">4억 쌍 이미지-텍스트</text>
  <text x="535" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Zero-shot 분류 가능</text>

  <!-- CLIP arrows -->
  <line x1="230" y1="120" x2="270" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="230" y1="181" x2="270" y2="181" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <path d="M 400 120 L 430 120 L 430 148 L 455 148" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>
  <path d="M 400 181 L 430 181 L 430 164 L 455 164" stroke="#7ec8e3" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>

  <!-- ===== ROW 2: BLIP2 ===== -->
  <rect x="30" y="230" width="60" height="70" rx="6" fill="#1a1511" stroke="#e09050" stroke-width="1.5"/>
  <text x="60" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e09050">BLIP2</text>
  <text x="60" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">2023</text>
  <text x="60" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">Frozen</text>

  <!-- Image/ViT box -->
  <rect x="120" y="230" width="110" height="70" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">이미지 ViT</text>
  <text x="175" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Frozen 인코더</text>
  <text x="175" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Eva-CLIP</text>

  <!-- Q-Former box -->
  <rect x="280" y="225" width="150" height="80" rx="8" fill="#1a150e" stroke="#e09050" stroke-width="2"/>
  <text x="355" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e09050">Q-Former</text>
  <text x="355" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">학습 가능한 쿼리</text>
  <text x="355" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">32개 쿼리 토큰</text>
  <text x="355" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">Querying Transformer</text>

  <!-- Language Model box -->
  <rect x="485" y="230" width="130" height="70" rx="8" fill="#12101e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="550" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">언어 모델</text>
  <text x="550" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Frozen LLM</text>
  <text x="550" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">OPT / FlanT5</text>

  <!-- BLIP2 arrows -->
  <line x1="230" y1="265" x2="280" y2="265" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="430" y1="265" x2="485" y2="265" stroke="#e09050" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- ===== ROW 3: LLaVA ===== -->
  <rect x="30" y="345" width="60" height="70" rx="6" fill="#12101e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="60" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">LLaVA</text>
  <text x="60" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">2023</text>
  <text x="60" y="405" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">Instruct</text>

  <!-- CLIP ViT box -->
  <rect x="120" y="345" width="120" height="70" rx="8" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">CLIP ViT</text>
  <text x="180" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이미지 특징 추출</text>
  <text x="180" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">ViT-L/14</text>

  <!-- Linear Projection box -->
  <rect x="290" y="345" width="140" height="70" rx="8" fill="#1a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="360" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">선형 프로젝션</text>
  <text x="360" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">W 행렬 (학습)</text>
  <text x="360" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Visual Token 변환</text>

  <!-- LLaMA LLM box -->
  <rect x="485" y="345" width="140" height="70" rx="8" fill="#12101e" stroke="#7777cc" stroke-width="2"/>
  <text x="555" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">LLaMA / Mistral</text>
  <text x="555" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Instruction Tuning</text>
  <text x="555" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">GPT-4 생성 데이터</text>

  <!-- LLaVA arrows -->
  <line x1="240" y1="380" x2="290" y2="380" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="430" y1="380" x2="485" y2="380" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Output box (right side) -->
  <rect x="690" y="320" width="130" height="90" rx="8" fill="#111" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="755" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">출력</text>
  <text x="755" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이미지 캡셔닝</text>
  <text x="755" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시각 질의응답</text>
  <text x="755" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">문서 이해</text>

  <!-- LLaVA → Output arrow -->
  <line x1="625" y1="380" x2="690" y2="380" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- BLIP2 → Output arrow -->
  <line x1="615" y1="265" x2="755" y2="265 " stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="755" y1="265" x2="755" y2="320" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>

</svg>
