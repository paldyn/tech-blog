<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JUnit 5 아키텍처</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Platform · Jupiter · Vintage 세 모듈</text>

  <!-- Jupiter and Vintage on top -->
  <rect x="60" y="96" width="360" height="92" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">JUnit Jupiter</text>
  <text x="240" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">JUnit 5의 새 프로그래밍 모델</text>
  <text x="240" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">@Test · Assertions · 확장 모델</text>

  <rect x="460" y="96" width="360" height="92" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">JUnit Vintage</text>
  <text x="640" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">JUnit 3 / 4 테스트 실행 지원</text>
  <text x="640" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">기존 테스트와의 호환성</text>

  <!-- Platform at bottom -->
  <rect x="60" y="232" width="760" height="92" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">JUnit Platform</text>
  <text x="440" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">테스트를 발견하고 실행하는 공통 기반 (TestEngine API)</text>
  <text x="440" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">IDE · Gradle · Maven이 이 위에서 테스트를 구동</text>

  <!-- note -->
  <rect x="60" y="344" width="760" height="44" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">JUnit 5 = Platform + Jupiter + Vintage. 새 테스트는 Jupiter, 구버전 호환은 Vintage</text>
</svg>
