<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 응답 메시지 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">서버가 클라이언트로 반환하는 메시지</text>

  <!-- Status Line -->
  <rect x="60" y="90" width="490" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">① 상태 줄 (Status Line)</text>
  <text x="80" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ce9178">HTTP/1.1</text>
  <text x="174" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#55c555" font-weight="600"> 201</text>
  <text x="216" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> Created</text>

  <!-- Labels -->
  <text x="584" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">상태 코드</text>
  <text x="584" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">100~599 범위 3자리 숫자</text>
  <line x1="572" y1="112" x2="540" y2="130" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <text x="700" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">이유 구문</text>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사람이 읽는 설명</text>
  <line x1="710" y1="122" x2="690" y2="133" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Response Headers -->
  <rect x="60" y="182" width="490" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">② 응답 헤더 (Response Headers)</text>
  <text x="80" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Content-Type:</text>
  <text x="214" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ce9178"> application/json</text>
  <text x="80" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Content-Length:</text>
  <text x="238" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#b5cea8"> 45</text>
  <text x="80" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Location:</text>
  <text x="168" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ce9178"> /api/users/123</text>
  <text x="80" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Date:</text>
  <text x="126" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> Mon, 09 Jun 2026 12:00:00 GMT</text>

  <!-- Header labels right -->
  <text x="584" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">응답 전용 헤더</text>
  <text x="584" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Location, Set-Cookie 등</text>
  <text x="584" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">공통 헤더</text>
  <text x="584" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Date, Cache-Control 등</text>

  <!-- CRLF -->
  <rect x="60" y="316" width="490" height="30" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="80" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#9aa4b8">\r\n  (헤더/본문 경계)</text>

  <!-- Response Body -->
  <rect x="60" y="362" width="490" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">③ 응답 본문 (Response Body)</text>
  <text x="80" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">{"id":123,"name":"Alice","age":30}</text>
  <text x="584" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">본문 크기</text>
  <text x="584" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Content-Length 또는</text>
  <text x="584" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Transfer-Encoding으로 결정</text>

  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">요청과 동일한 텍스트 형식 — HTTP/2·3에서는 바이너리 프레임으로 인코딩</text>
</svg>
