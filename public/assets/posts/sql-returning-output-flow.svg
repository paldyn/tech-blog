<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">RETURNING — DML 실행 결과를 즉시 돌려받기</text>

  <!-- Without RETURNING flow -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" xml:space="preserve">기존 방식 (RETURNING 미사용)</text>

  <!-- Step boxes - row 1 -->
  <rect x="60" y="108" width="160" height="48" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="140" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle" xml:space="preserve">① INSERT / UPDATE</text>
  <text x="140" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">DML 실행 (왕복 1)</text>

  <!-- Arrow -->
  <line x1="220" y1="132" x2="270" y2="132" stroke="#444" stroke-width="2"/>
  <polygon points="270,127 282,132 270,137" fill="#444"/>

  <rect x="282" y="108" width="160" height="48" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="362" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">② SELECT로 재조회</text>
  <text x="362" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">ID/값 취득 (왕복 2)</text>

  <!-- Arrow -->
  <line x1="442" y1="132" x2="492" y2="132" stroke="#444" stroke-width="2"/>
  <polygon points="492,127 504,132 492,137" fill="#444"/>

  <rect x="504" y="108" width="160" height="48" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="584" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">③ 애플리케이션 처리</text>
  <text x="584" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">왕복 2회, 경쟁 조건 위험</text>

  <!-- Divider -->
  <line x1="60" y1="185" x2="820" y2="185" stroke="#1e2433" stroke-width="1"/>

  <!-- With RETURNING flow -->
  <text x="60" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" xml:space="preserve">RETURNING 사용</text>

  <rect x="60" y="230" width="200" height="48" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">① INSERT ... RETURNING</text>
  <text x="160" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">DML + 결과 동시 반환</text>

  <!-- Arrow -->
  <line x1="260" y1="254" x2="330" y2="254" stroke="#55c555" stroke-width="2"/>
  <polygon points="330,249 342,254 330,259" fill="#55c555"/>

  <rect x="342" y="230" width="200" height="48" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="442" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">② 결과 즉시 사용</text>
  <text x="442" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">왕복 1회, 원자적 처리</text>

  <!-- Benefit badge -->
  <rect x="600" y="230" width="220" height="48" rx="8" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">DB 왕복 50% 절감</text>
  <text x="710" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">경쟁 조건 원천 차단</text>

  <!-- Code block -->
  <rect x="60" y="310" width="760" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- PostgreSQL / SQL:2003 RETURNING</text>
  <text x="76" y="351" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">INSERT INTO</text>
  <text x="170" y="351" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> orders (user_id, amount)</text>
  <text x="76" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">VALUES</text>
  <text x="130" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (</text>
  <text x="148" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">42</text>
  <text x="172" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, </text>
  <text x="188" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">9900</text>
  <text x="224" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="76" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">RETURNING</text>
  <text x="160" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> id, created_at;</text>
  <text x="76" y="405" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- → id=1001, created_at=2026-04-30 즉시 반환</text>
  <text x="76" y="423" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">--   SELECT 없이 단 한 번의 왕복으로 완료</text>

  <!-- Footer -->
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle" xml:space="preserve">PALDYN — SQL 완전 정복</text>
</svg>
