<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker rename — 컨테이너 이름 변경</text>

  <!-- Before -->
  <text x="220" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">변경 전</text>
  <rect x="60" y="96" width="320" height="160" rx="10" fill="#0d0d1a" stroke="#7777cc" stroke-width="2"/>

  <rect x="80" y="116" width="280" height="50" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">컨테이너 이름</text>
  <text x="220" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8" text-anchor="middle">old-name</text>

  <text x="220" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">ID: abc123def456</text>
  <text x="220" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">STATUS: Up 2 hours</text>
  <text x="220" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">이미지·데이터·설정 모두 동일</text>

  <!-- Arrow + command -->
  <line x1="380" y1="176" x2="440" y2="176" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="428,169 442,176 428,183" fill="#55c555"/>
  <text x="440" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">docker rename</text>
  <text x="440" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">old-name new-name</text>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">재시작 없이 즉시 적용</text>

  <!-- After -->
  <text x="660" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">변경 후</text>
  <rect x="500" y="96" width="320" height="160" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>

  <rect x="520" y="116" width="280" height="50" rx="6" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">컨테이너 이름</text>
  <text x="660" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555" text-anchor="middle">new-name</text>

  <text x="660" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">ID: abc123def456 (동일)</text>
  <text x="660" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">STATUS: Up 2 hours (지속)</text>
  <text x="660" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">이름만 변경, 모든 상태 보존</text>

  <!-- What changes / what doesn't -->
  <rect x="60" y="290" width="360" height="70" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">변경되는 것</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 컨테이너 이름 (docker ps에서 NAME 컬럼)</text>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• Docker 내부 DNS 레코드 (같은 네트워크 내)</text>

  <rect x="460" y="290" width="360" height="70" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">변경되지 않는 것</text>
  <text x="480" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 컨테이너 ID / 이미지 / 볼륨 / 네트워크</text>
  <text x="480" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 실행 상태 / 포트 매핑 / 환경 변수</text>
</svg>
