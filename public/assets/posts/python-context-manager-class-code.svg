<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Timer 컨텍스트 매니저 구현</text>

  <!-- Code box -->
  <rect x="60" y="62" width="760" height="370" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text xml:space="preserve" x="84" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 클래스로 컨텍스트 매니저 구현하기</text>
  <text xml:space="preserve" x="84" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="140" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> time</text>

  <text xml:space="preserve" x="84" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">class</text>
  <text xml:space="preserve" x="127" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Timer:</text>

  <text xml:space="preserve" x="84" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    def</text>
  <text xml:space="preserve" x="133" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> __enter__(self):</text>

  <text xml:space="preserve" x="84" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        self.start = time.perf_counter()</text>
  <text xml:space="preserve" x="84" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">        return</text>
  <text xml:space="preserve" x="172" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> self  </text>
  <text xml:space="preserve" x="370" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; as 절에 self 바인딩</text>

  <text xml:space="preserve" x="84" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    def</text>
  <text xml:space="preserve" x="133" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> __exit__(self, exc_type, exc_val, exc_tb):</text>

  <text xml:space="preserve" x="84" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        self.elapsed = time.perf_counter() - self.start</text>
  <text xml:space="preserve" x="84" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">        return</text>
  <text xml:space="preserve" x="172" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> False  </text>
  <text xml:space="preserve" x="370" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 예외 전파 (억제 안 함)</text>

  <text xml:space="preserve" x="84" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 사용</text>
  <text xml:space="preserve" x="84" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">with</text>
  <text xml:space="preserve" x="117" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Timer() </text>
  <text xml:space="preserve" x="202" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text>
  <text xml:space="preserve" x="222" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> t:</text>

  <text xml:space="preserve" x="84" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    result = sum(range(10_000_000))</text>

  <text xml:space="preserve" x="84" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">print(</text>
  <text xml:space="preserve" x="126" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">f"걸린 시간: {t.elapsed:.3f}s"</text>
  <text xml:space="preserve" x="432" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text xml:space="preserve" x="84" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 걸린 시간: 0.412s</text>
  <text xml:space="preserve" x="84" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; __exit__ 반환값이 True 면 예외 억제, False/None 이면 예외 전파</text>
</svg>
