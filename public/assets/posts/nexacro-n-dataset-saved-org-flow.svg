<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset savedOrg 동작 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">원본(savedOrg)과 현재 값(current)의 관계</text>

  <!-- ===== Step 1: transaction() → data loaded ===== -->
  <rect x="60" y="96" width="200" height="64" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">① 서버 조회</text>
  <text x="160" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">transaction() 완료</text>

  <!-- Arrow ① → ② -->
  <polygon points="264,128 290,122 290,125 330,125 330,122 356,128 330,134 330,131 290,131 290,134" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>

  <!-- ===== Step 2: Dataset (current + savedOrg) ===== -->
  <rect x="360" y="88" width="250" height="172" fill="#111" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <rect x="360" y="88" width="250" height="36" fill="#0d2e0d" rx="8"/>
  <rect x="360" y="112" width="250" height="12" fill="#0d2e0d"/>
  <text x="485" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">② Dataset (메모리)</text>

  <!-- Current value section -->
  <rect x="376" y="132" width="218" height="52" fill="#0a1a0a" rx="4"/>
  <text x="485" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">현재 값 (current)</text>
  <text x="376" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">  DEPT_NM = "개발1팀" ← 수정됨</text>

  <!-- Divider -->
  <line x1="376" y1="192" x2="594" y2="192" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- savedOrg section -->
  <rect x="376" y="198" width="218" height="50" fill="#0a0a1a" rx="4"/>
  <text x="485" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">savedOrg (원본)</text>
  <text x="376" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">  DEPT_NM = "개발팀" ← 원래 값</text>

  <!-- ===== Step 3: getOrgColumn ===== -->
  <rect x="660" y="88" width="160" height="64" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="740" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">③ 원본 조회</text>
  <text x="740" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">getOrgColumn()</text>

  <!-- Arrow ② → ③ -->
  <polygon points="614,120 640,114 640,117 658,117 658,114 684,120 658,126 658,123 640,123 640,126" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>
  <text x="648" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">savedOrg</text>

  <!-- ===== Step 4: restoreColumn / resetData ===== -->
  <rect x="660" y="188" width="160" height="72" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">④ 원본 복원</text>
  <text x="740" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">restoreColumn()</text>
  <text x="740" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">resetData()</text>

  <!-- Arrow ② → ④ (down from dataset) -->
  <line x1="485" y1="260" x2="485" y2="300" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="481,300 489,300 485,316" fill="#555"/>
  <text x="485" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">setColumn() 호출 → rowType UPDATE</text>

  <!-- ===== savedOrg 저장 시점 note ===== -->
  <rect x="60" y="310" width="760" height="120" fill="#0f0f1a" rx="8" stroke="#444" stroke-width="1"/>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">savedOrg 저장 시점</text>

  <!-- Three columns in note box -->
  <line x1="314" y1="346" x2="314" y2="420" stroke="#333" stroke-width="1"/>
  <line x1="566" y1="346" x2="566" y2="420" stroke="#333" stroke-width="1"/>

  <text x="186" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">transaction() 완료</text>
  <text x="186" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">서버 응답 후 자동 저장</text>
  <text x="186" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">모든 행에 적용</text>

  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">saveXML() / loadXML()</text>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">명시적 로드 시 저장</text>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">로컬 캐시 시나리오</text>

  <text x="714" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">acceptRow()</text>
  <text x="714" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">특정 행만 수동 커밋</text>
  <text x="714" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">rowType → NORMAL</text>
</svg>
