<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">제어 흐름 분석(Control Flow Analysis)</text>

  <!-- Left: Code example -->
  <text x="220" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9aa4b8">코드 예시</text>

  <rect x="40" y="86" width="380" height="252" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> greet(name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> | </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="56" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  // ① name: string | null</tspan></text>
  <text x="56" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (name === </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="56" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// ② name: null 분기</tspan></text>
  <text x="56" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"Hello, stranger!"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="56" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  }</tspan></text>
  <text x="56" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  // ③ name: string (null 제거됨)</tspan></text>
  <text x="56" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">`Hello, </tspan><tspan fill="#ffffff">${name}</tspan><tspan fill="#ce9178">!`</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="56" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">// name.toUpperCase() 안전</tspan></text>
  <text x="56" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>

  <!-- Right: Flow diagram -->
  <text x="660" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9aa4b8">타입 흐름 추적</text>

  <!-- Step 1: string | null -->
  <rect x="490" y="86" width="350" height="52" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="665" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9aa4b8">① 함수 진입 시점</text>
  <text x="665" y="127" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="700" fill="#ffffff">name: <tspan fill="#7ec8e3">string</tspan> | <tspan fill="#7ec8e3">null</tspan></text>

  <!-- Arrow down -->
  <line x1="665" y1="138" x2="665" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: null check -->
  <rect x="490" y="164" width="350" height="44" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="665" y="191" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (name === </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- Fork: left = null branch, right = string branch -->
  <line x1="490" y1="186" x2="530" y2="242" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <line x1="840" y1="186" x2="800" y2="242" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <text x="498" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">true</text>
  <text x="802" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">false</text>

  <!-- null branch box -->
  <rect x="490" y="244" width="148" height="52" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1.5"/>
  <text x="564" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">② null 분기</text>
  <text x="564" y="284" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">name: <tspan fill="#e05555">null</tspan></text>

  <!-- string branch box -->
  <rect x="702" y="244" width="148" height="52" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="776" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">③ 이후 코드</text>
  <text x="776" y="284" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">name: <tspan fill="#55c555">string</tspan></text>

  <!-- Arrow: null branch -> return -->
  <line x1="564" y1="296" x2="564" y2="326" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <!-- Arrow: string branch -> safe use -->
  <line x1="776" y1="296" x2="776" y2="326" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- return boxes -->
  <rect x="490" y="328" width="148" height="40" rx="6" fill="#100505" stroke="#e05555" stroke-width="1"/>
  <text x="564" y="354" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">return (early)</text>

  <rect x="702" y="328" width="148" height="40" rx="6" fill="#051005" stroke="#55c555" stroke-width="1"/>
  <text x="776" y="354" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">안전하게 사용</text>

  <!-- Key concept box -->
  <rect x="40" y="358" width="380" height="100" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="230" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">제어 흐름 분석 핵심</text>
  <text x="58" y="402"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2022; TypeScript는 각 지점의 타입을 추적합니다</text>
  <text x="58" y="422"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2022; 조건 분기 후 타입이 자동으로 좁혀집니다</text>
  <text x="58" y="442"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">&#x2022; return/throw 이후는 해당 타입이 제거됩니다</text>

  <!-- CFA explanation box -->
  <rect x="490" y="390" width="350" height="68" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="665" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">CFA(Control Flow Analysis)</text>
  <text x="508" y="434"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">TypeScript 컴파일러가 코드 실행 경로를</text>
  <text x="508" y="452"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">분석하여 각 지점의 타입을 결정합니다.</text>
</svg>
