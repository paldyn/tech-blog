<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Labels &amp; Selectors — 매칭 메커니즘</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Service · Deployment가 Pod를 선택하는 원리</text>

  <!-- Pod A: 매칭 -->
  <rect x="50" y="90" width="220" height="140" rx="8" fill="#0d1828" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">Pod A</text>
  <rect x="66" y="124" width="188" height="28" rx="5" fill="#001a00" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">app: web</text>
  <rect x="66" y="160" width="188" height="28" rx="5" fill="#001a00" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="178" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">env: production</text>
  <rect x="66" y="196" width="188" height="24" rx="5" fill="#0a1120" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">tier: frontend</text>

  <!-- Pod B: 매칭 -->
  <rect x="50" y="250" width="220" height="110" rx="8" fill="#0d1828" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">Pod B</text>
  <rect x="66" y="284" width="188" height="28" rx="5" fill="#001a00" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">app: web</text>
  <rect x="66" y="320" width="188" height="28" rx="5" fill="#001a00" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">env: production</text>

  <!-- Pod C: 비매칭 -->
  <rect x="50" y="378" width="220" height="110" rx="8" fill="#0d1828" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="160" y="402" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#888">Pod C (미매칭)</text>
  <rect x="66" y="412" width="188" height="28" rx="5" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="430" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">app: web</text>
  <rect x="66" y="448" width="188" height="28" rx="5" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="466" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">env: staging  ← 불일치</text>

  <!-- Service selector box -->
  <rect x="460" y="90" width="370" height="160" rx="8" fill="#121e38" stroke="#7ec8e3" stroke-width="2"/>
  <text x="645" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Service: web-svc</text>

  <!-- Selector code -->
  <rect x="476" y="126" width="338" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="146"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">spec:</text>
  <text x="492" y="164"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  selector:</text>
  <text x="492" y="182"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    app</text>
  <text x="548" y="182"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">: </text>
  <text x="562" y="182"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">web</text>
  <text x="492" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    env</text>
  <text x="556" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">: </text>
  <text x="570" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">production</text>
  <text x="492" y="226"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # AND 조건: 모두 일치해야 선택</text>

  <!-- Deployment selector box -->
  <rect x="460" y="270" width="370" height="140" rx="8" fill="#121e38" stroke="#7777cc" stroke-width="2"/>
  <text x="645" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">Deployment matchExpressions</text>

  <rect x="476" y="306" width="338" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="326"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">matchExpressions:</text>
  <text x="492" y="344"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">- key: </text>
  <text x="552" y="344"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">env</text>
  <text x="492" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  operator: </text>
  <text x="582" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">In</text>
  <text x="492" y="380"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  values: </text>
  <text x="562" y="380"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">[production, staging]</text>

  <!-- Match result box -->
  <rect x="460" y="428" width="370" height="60" rx="8" fill="#001a00" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="452" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">매칭 결과: Pod A, Pod B → Endpoints</text>
  <text x="645" y="474" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Pod C (env:staging) 은 Service에서 제외됨</text>

  <!-- Arrows: Pod A → Service -->
  <line x1="272" y1="160" x2="457" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- Arrows: Pod B → Service -->
  <line x1="272" y1="305" x2="457" y2="230" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- Arrow: Pod C → X (no match) -->
  <line x1="272" y1="433" x2="430" y2="433" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="350" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">미선택</text>
</svg>
