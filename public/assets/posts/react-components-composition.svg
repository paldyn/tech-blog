<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컴포넌트 합성 트리</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">작은 컴포넌트를 조합해 화면 전체를 구성한다</text>

  <!-- App (root) -->
  <rect x="340" y="96" width="200" height="52" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">App</text>

  <!-- Header, Main, Footer -->
  <line x1="330" y1="148" x2="200" y2="196" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="148" x2="440" y2="196" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="148" x2="680" y2="196" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="100" y="196" width="200" height="48" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Header</text>

  <rect x="340" y="196" width="200" height="48" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Main</text>

  <rect x="580" y="196" width="200" height="48" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Footer</text>

  <!-- Main sub-components -->
  <line x1="410" y1="244" x2="310" y2="298" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)">
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </line>
  <line x1="470" y1="244" x2="570" y2="298" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="298" width="180" height="48" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="310" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">PostList</text>

  <rect x="480" y="298" width="180" height="48" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Sidebar</text>

  <!-- PostCard leaf -->
  <line x1="310" y1="346" x2="310" y2="368" stroke="#888" stroke-width="1.5" marker-end="url(#arr)">
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </line>
  <rect x="220" y="368" width="180" height="36" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="310" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">PostCard (× N)</text>
</svg>
