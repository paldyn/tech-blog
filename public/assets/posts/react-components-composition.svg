<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컴포넌트 합성 — 트리 구조</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">작은 컴포넌트를 조합해 복잡한 UI를 만든다</text>

  <defs>
    <marker id="arr-tree" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- App (root) -->
  <rect x="360" y="95" width="160" height="52" rx="8" fill="#1a1a30" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="118" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">App</text>
  <text x="440" y="137" font-size="11" fill="#888" text-anchor="middle">루트 컴포넌트</text>

  <!-- App → Header, Main, Footer -->
  <line x1="380" y1="147" x2="200" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arr-tree)"/>
  <line x1="440" y1="147" x2="440" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arr-tree)"/>
  <line x1="500" y1="147" x2="680" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arr-tree)"/>

  <!-- Header -->
  <rect x="100" y="195" width="200" height="52" rx="8" fill="#12201a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="218" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Header</text>
  <text x="200" y="237" font-size="11" fill="#888" text-anchor="middle">네비게이션 바</text>

  <!-- Main -->
  <rect x="340" y="195" width="200" height="52" rx="8" fill="#1a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="218" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Main</text>
  <text x="440" y="237" font-size="11" fill="#888" text-anchor="middle">주 콘텐츠 영역</text>

  <!-- Footer -->
  <rect x="580" y="195" width="200" height="52" rx="8" fill="#1e1a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="680" y="218" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">Footer</text>
  <text x="680" y="237" font-size="11" fill="#888" text-anchor="middle">하단 정보</text>

  <!-- Header → Logo, Nav -->
  <line x1="170" y1="247" x2="130" y2="295" stroke="#888" stroke-width="1.5" marker-end="url(#arr-tree)"/>
  <line x1="230" y1="247" x2="270" y2="295" stroke="#888" stroke-width="1.5" marker-end="url(#arr-tree)"/>

  <rect x="65" y="295" width="130" height="46" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="316" font-size="13" fill="#55c555" text-anchor="middle">Logo</text>
  <text x="130" y="332" font-size="11" fill="#888" text-anchor="middle">브랜드 로고</text>

  <rect x="210" y="295" width="130" height="46" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="275" y="316" font-size="13" fill="#55c555" text-anchor="middle">NavMenu</text>
  <text x="275" y="332" font-size="11" fill="#888" text-anchor="middle">링크 목록</text>

  <!-- Main → ArticleList, Sidebar -->
  <line x1="400" y1="247" x2="380" y2="295" stroke="#888" stroke-width="1.5" marker-end="url(#arr-tree)"/>
  <line x1="480" y1="247" x2="500" y2="295" stroke="#888" stroke-width="1.5" marker-end="url(#arr-tree)"/>

  <rect x="325" y="295" width="130" height="46" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="390" y="316" font-size="13" fill="#7ec8e3" text-anchor="middle">ArticleList</text>
  <text x="390" y="332" font-size="11" fill="#888" text-anchor="middle">글 목록</text>

  <rect x="465" y="295" width="130" height="46" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="530" y="316" font-size="13" fill="#7ec8e3" text-anchor="middle">Sidebar</text>
  <text x="530" y="332" font-size="11" fill="#888" text-anchor="middle">사이드바</text>

  <!-- ArticleList → Article (multiple) -->
  <line x1="390" y1="341" x2="390" y2="385" stroke="#888" stroke-width="1.5" marker-end="url(#arr-tree)"/>

  <rect x="325" y="385" width="130" height="46" rx="6" fill="#0a1420" stroke="#7ec8e3" stroke-width="1"/>
  <text x="390" y="406" font-size="13" fill="#7ec8e3" text-anchor="middle">Article</text>
  <text x="390" y="422" font-size="11" fill="#888" text-anchor="middle">글 카드 × N</text>

  <!-- Right side: reuse note -->
  <rect x="640" y="300" width="200" height="95" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="740" y="323" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">재사용의 힘</text>
  <text x="740" y="343" font-size="12" fill="#888" text-anchor="middle">Article 컴포넌트를</text>
  <text x="740" y="360" font-size="12" fill="#888" text-anchor="middle">한 번 만들면</text>
  <text x="740" y="377" font-size="12" fill="#888" text-anchor="middle">N번 사용 가능</text>
</svg>
