<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">uptime 출력 구조</text>

  <!-- Code box -->
  <rect x="60" y="76" width="760" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="100" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">$ uptime</text>
  <text x="76" y="119" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> 10:32:45 up 5 days, 3:14,  2 users,  load average: 0.52, 0.48, 0.31</text>

  <!-- Defs for marker -->
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 2 0 L 7 12 L 12 0 z" fill="#888"/>
    </marker>
  </defs>

  <!-- 4 info cards, evenly spaced -->
  <!-- Card 1: 현재 시각 (x=60, w=180) -->
  <rect x="60" y="185" width="180" height="130" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">현재 시각</text>
  <text x="150" y="245" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#ffffff">10:32:45</text>
  <text x="150" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시스템 현재 시각</text>
  <text x="150" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">date 명령과 동일</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="138" x2="150" y2="183" stroke="#888" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- Card 2: 가동 시간 (x=260, w=180) -->
  <rect x="260" y="185" width="180" height="130" rx="8" fill="#0d130d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">가동 시간</text>
  <text x="350" y="245" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#ffffff">5 days, 3:14</text>
  <text x="350" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">마지막 부팅 이후</text>
  <text x="350" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">경과 시간</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="138" x2="350" y2="183" stroke="#888" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- Card 3: 사용자 수 (x=460, w=160) -->
  <rect x="460" y="185" width="160" height="130" rx="8" fill="#130d0d" stroke="#e0a055" stroke-width="1.5"/>
  <text x="540" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a055">사용자 수</text>
  <text x="540" y="245" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#ffffff">2 users</text>
  <text x="540" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현재 로그인한</text>
  <text x="540" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자 세션 수</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="138" x2="540" y2="183" stroke="#888" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- Card 4: Load Average (x=640, w=180) -->
  <rect x="640" y="185" width="180" height="130" rx="8" fill="#13100d" stroke="#e05555" stroke-width="1.5"/>
  <text x="730" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Load Average</text>
  <text x="730" y="245" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#ffffff">0.52  0.48  0.31</text>
  <text x="730" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">1분 / 5분 / 15분</text>
  <text x="730" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">평균 실행 대기열</text>

  <!-- Arrow 4 -->
  <line x1="730" y1="138" x2="730" y2="183" stroke="#888" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- Bottom explanation box -->
  <rect x="60" y="345" width="760" height="110" rx="8" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">추가 옵션</text>
  <text x="76" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">•  <tspan fill="#7ec8e3" font-weight="600">uptime -p</tspan>  →  "up 5 weeks, 3 days" 형식으로 출력</text>
  <text x="76" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">•  <tspan fill="#7ec8e3" font-weight="600">uptime -s</tspan>  →  "2026-05-13 07:18:31" 부팅 시각 표시</text>
  <text x="76" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">•  /proc/uptime, /proc/loadavg 파일에서도 같은 정보 확인 가능</text>
</svg>
