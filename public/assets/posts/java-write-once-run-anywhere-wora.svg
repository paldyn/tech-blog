<svg xmlns="http://www.w3.org/2000/svg" width="880" height="530" viewBox="0 0 880 530">
  <!-- Background -->
  <rect width="880" height="530" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Write Once, Run Anywhere — 동작 원리</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">동일한 .class 바이트코드가 각 플랫폼의 JVM 위에서 실행된다</text>

  <!-- ── Source file box ── -->
  <rect x="290" y="90" width="300" height="72" fill="#0f1a2e" rx="8" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">HelloWorld.java</text>
  <text x="440" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">Java 소스 코드 (플랫폼 무관)</text>

  <!-- javac label (right of arrow) -->
  <text x="476" y="182"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">javac</text>

  <!-- Down arrow: shaft y=162→204, arrowhead polygon -->
  <line x1="440" y1="162" x2="440" y2="204" stroke="#55c555" stroke-width="2"/>
  <polygon points="431,204 449,204 440,218" fill="#55c555"/>

  <!-- ── Bytecode box ── -->
  <rect x="290" y="220" width="300" height="68" fill="#0a1a10" rx="8" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="440" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">HelloWorld.class</text>
  <text x="440" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">플랫폼 독립 바이트코드 (JVM 명령어셋)</text>

  <!-- ── Fan-out bus system ── -->
  <!-- Trunk: bottom of bytecode box (440,288) → horizontal bus (y=318) -->
  <line x1="440" y1="288" x2="440" y2="318" stroke="#3a3a6a" stroke-width="1.5"/>
  <!-- Horizontal bus: x=175 to x=705, y=318 -->
  <line x1="175" y1="318" x2="705" y2="318" stroke="#3a3a6a" stroke-width="1.5"/>
  <!-- Vertical drops to arrowheads -->
  <line x1="175" y1="318" x2="175" y2="342" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="167,342 183,342 175,354" fill="#7777cc"/>
  <line x1="440" y1="318" x2="440" y2="342" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="432,342 448,342 440,354" fill="#7777cc"/>
  <line x1="705" y1="318" x2="705" y2="342" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="697,342 713,342 705,354" fill="#7777cc"/>

  <!-- ── JVM Platform boxes (y=356, h=108, w=210) ── -->
  <!-- Windows JVM: x=70, center=175 -->
  <rect x="70" y="356" width="210" height="108" fill="#1a1030" rx="8" stroke="#3a2a5f" stroke-width="1.5"/>
  <text x="175" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">JVM for Windows</text>
  <text x="175" y="400" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">x86-64 · Windows NT</text>
  <rect x="86" y="410" width="178" height="38" fill="#0f0c1e" rx="4" stroke="#2a1f4a" stroke-width="1"/>
  <text x="175" y="425" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#b5cea8">JIT → .exe 네이티브</text>
  <text x="175" y="442" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">Hello, World!</text>

  <!-- Linux JVM: x=335, center=440 -->
  <rect x="335" y="356" width="210" height="108" fill="#1a1030" rx="8" stroke="#3a2a5f" stroke-width="1.5"/>
  <text x="440" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">JVM for Linux</text>
  <text x="440" y="400" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">x86-64 · ARM · Linux</text>
  <rect x="351" y="410" width="178" height="38" fill="#0f0c1e" rx="4" stroke="#2a1f4a" stroke-width="1"/>
  <text x="440" y="425" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#b5cea8">JIT → ELF 네이티브</text>
  <text x="440" y="442" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">Hello, World!</text>

  <!-- macOS JVM: x=600, center=705 -->
  <rect x="600" y="356" width="210" height="108" fill="#1a1030" rx="8" stroke="#3a2a5f" stroke-width="1.5"/>
  <text x="705" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">JVM for macOS</text>
  <text x="705" y="400" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">x86-64 · Apple Silicon</text>
  <rect x="616" y="410" width="178" height="38" fill="#0f0c1e" rx="4" stroke="#2a1f4a" stroke-width="1"/>
  <text x="705" y="425" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#b5cea8">JIT → Mach-O 네이티브</text>
  <text x="705" y="442" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">Hello, World!</text>

  <!-- Footer -->
  <text x="440" y="492" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">PALDYN · Java 완전 정복</text>
</svg>
