<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="bmA" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BOM — 버전을 한 곳에서</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Bill of Materials로 버전 정렬</text>

  <!-- BOM box -->
  <rect x="310" y="92" width="260" height="84" rx="8" fill="#0a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">BOM (자재 명세서)</text>
  <text x="440" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">호환되는 버전 묶음을</text>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">한 번에 선언</text>

  <!-- managed deps -->
  <rect x="60" y="232" width="220" height="80" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">jackson-databind</text>
  <text x="170" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">버전 생략</text>
  <text x="170" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b5cea8" text-anchor="middle">→ 2.17.0 (BOM이 결정)</text>

  <rect x="330" y="232" width="220" height="80" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">jackson-core</text>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">버전 생략</text>
  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b5cea8" text-anchor="middle">→ 2.17.0 (BOM이 결정)</text>

  <rect x="600" y="232" width="220" height="80" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">jackson-annotations</text>
  <text x="710" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">버전 생략</text>
  <text x="710" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b5cea8" text-anchor="middle">→ 2.17.0 (BOM이 결정)</text>

  <line x1="380" y1="176" x2="200" y2="232" stroke="#55c555" stroke-width="2" marker-end="url(#bmA)"/>
  <line x1="440" y1="176" x2="440" y2="232" stroke="#55c555" stroke-width="2" marker-end="url(#bmA)"/>
  <line x1="500" y1="176" x2="680" y2="232" stroke="#55c555" stroke-width="2" marker-end="url(#bmA)"/>

  <!-- note -->
  <rect x="60" y="338" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">개별 의존성의 version을 생략 → BOM이 일괄적으로 호환 버전을 채워 줌</text>
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">버전 충돌과 비호환 조합을 방지하고, 업그레이드는 BOM 버전 한 줄만 변경</text>
</svg>
