  <rect x="44" y="72" width="792" height="248" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <!-- Line 1: comment -->
  <text x="60" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 인덱스 시그니처</text>
  <!-- Line 2 -->
  <text x="60" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> StringMap = {</tspan></text>
  <!-- Line 3 -->
  <text x="60" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  [key: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">]: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan></text>
  <!-- Line 4 -->
  <text x="60" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">};</text>
  <!-- blank -->
  <!-- Line 6 -->
  <text x="60" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> NumberRecord = {</tspan></text>
  <!-- Line 7 -->
  <text x="60" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  [key: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">]: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">;</tspan></text>
  <!-- Line 8 -->
  <text x="60" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  length: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">;  </tspan><tspan fill="#9aa4b8">// 특정 키 추가 가능</tspan></text>
  <!-- Line 9 -->
  <text x="60" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">};</text>
  <!-- blank -->
