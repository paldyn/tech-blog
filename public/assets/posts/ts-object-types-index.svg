  <text x="60" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 사용 예</text>
  <!-- Line 12 -->
  <text x="60" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> env: StringMap = {};</tspan></text>
  <!-- Line 13 -->
  <text x="60" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">env[</tspan><tspan fill="#ce9178">"NODE_ENV"</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#ce9178">"production"</tspan><tspan fill="#ffffff">;</tspan></text>
  <!-- Line 14 -->
  <text x="60" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">env[</tspan><tspan fill="#ce9178">"PORT"</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#ce9178">"3000"</tspan><tspan fill="#ffffff">;</tspan></text>

  <!-- Note box -->
  <rect x="44" y="336" width="792" height="48" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="60" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" xml:space="preserve">인덱스 시그니처는 동적 키를 허용하지만 타입 안전성이 낮아짐</text>
  <text x="60" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" xml:space="preserve">— Record&lt;K,V&gt; 유틸리티 타입을 검토할 것</text>
