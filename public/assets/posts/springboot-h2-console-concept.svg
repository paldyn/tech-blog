<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">H2 인메모리 DB — 동작 구조</text>

  <!-- 왼쪽: 앱 레이어 -->
  <rect x="60" y="80" width="240" height="340" rx="10" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Spring Boot App</text>

  <!-- JPA / Repository -->
  <rect x="80" y="118" width="200" height="44" rx="6" fill="#1a2030" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">JPA / Repository</text>
  <text x="180" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Entity, findAll() 등</text>

  <!-- JDBC -->
  <rect x="80" y="174" width="200" height="44" rx="6" fill="#1a2030" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">HikariCP</text>
  <text x="180" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커넥션 풀 (in-process)</text>

  <!-- Flyway (optional) -->
  <rect x="80" y="230" width="200" height="44" rx="6" fill="#1a2030" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Flyway / Liquibase</text>
  <text x="180" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기동 시 스키마 초기화</text>

  <!-- H2 Web Console -->
  <rect x="80" y="286" width="200" height="44" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">H2 Web Console</text>
  <text x="180" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/h2-console (Servlet)</text>

  <!-- 가운데 화살표 →H2 -->
  <line x1="300" y1="250" x2="358" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-w)"/>
  <text x="329" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">JDBC</text>

  <!-- 중앙: H2 DB -->
  <rect x="360" y="150" width="200" height="200" rx="10" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="460" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">H2 Database</text>
  <text x="460" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">In-Memory (JVM 내부)</text>

  <rect x="380" y="216" width="160" height="28" rx="4" fill="#1a2030" stroke="#3a4a6e" stroke-width="1"/>
  <text x="460" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle" xml:space="preserve">jdbc:h2:mem:testdb</text>

  <text x="460" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">앱 종료 시 데이터 소멸</text>
  <text x="460" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MySQL 호환 모드 지원</text>
  <text x="460" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">외부 의존성 0</text>
  <text x="460" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">테스트 속도 매우 빠름</text>

  <!-- 오른쪽: 브라우저 접속 -->
  <line x1="560" y1="250" x2="618" y2="250" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="589" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">HTTP</text>

  <rect x="620" y="170" width="200" height="160" rx="10" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Browser</text>
  <text x="720" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">localhost:8080/h2-console</text>

  <rect x="640" y="230" width="160" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">SELECT * FROM users;</text>

  <text x="720" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실시간 SQL 실행</text>
  <text x="720" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">테이블 구조 확인</text>
  <text x="720" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 직접 수정</text>

  <!-- 하단 주의사항 -->
  <rect x="60" y="440" width="760" height="44" rx="8" fill="#200a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">⚠ 프로덕션 금지 — spring.h2.console.enabled는 dev 프로파일에서만 활성화</text>
  <text x="440" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인증 없이 DB 전체를 노출하므로 반드시 Spring Security 설정 또는 프로파일 분리 필요</text>
</svg>
