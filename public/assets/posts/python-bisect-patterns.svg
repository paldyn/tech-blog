<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">bisect 실전 패턴</text>

  <!-- Left: insort + search -->
  <text x="70" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">정렬 삽입 · 이진 탐색</text>
  <rect x="60" y="88" width="370" height="264" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</tspan> bisect</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a = [<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">3</tspan>, <tspan fill="#b5cea8">5</tspan>, <tspan fill="#b5cea8">7</tspan>]</text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 정렬 유지하며 삽입 O(n)</text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">bisect.insort(a, <tspan fill="#b5cea8">4</tspan>)</text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># [1, 3, 4, 5, 7]</text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 값 존재 여부 확인</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def</tspan> exists(a, x):</text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    i = bisect.bisect_left(a, x)</text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    return</tspan> i &lt; <tspan fill="#7ec8e3">len</tspan>(a) <tspan fill="#7ec8e3">and</tspan> a[i] == x</text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 범위 내 개수 세기</text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">count = bisect.bisect_right(a, hi) - bisect.bisect_left(a, lo)</text>

  <!-- Right: grade lookup -->
  <text x="460" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#b5cea8">등급 조회 · 범위 탐색</text>
  <rect x="450" y="88" width="370" height="264" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 점수 → 등급 (정렬 리스트 활용)</text>
  <text x="466" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def</tspan> grade(score):</text>
  <text x="466" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    breakpoints = [<tspan fill="#b5cea8">60</tspan>, <tspan fill="#b5cea8">70</tspan>, <tspan fill="#b5cea8">80</tspan>, <tspan fill="#b5cea8">90</tspan>]</text>
  <text x="466" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    grades = [<tspan fill="#ce9178">'F'</tspan>,<tspan fill="#ce9178">'D'</tspan>,<tspan fill="#ce9178">'C'</tspan>,<tspan fill="#ce9178">'B'</tspan>,<tspan fill="#ce9178">'A'</tspan>]</text>
  <text x="466" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    i = bisect.bisect_right(breakpoints, score)</text>
  <text x="466" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    return</tspan> grades[i]</text>
  <text x="466" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="466" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">grade(<tspan fill="#b5cea8">85</tspan>)  <tspan fill="#6a8aa0"># 'B'</tspan></text>
  <text x="466" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">grade(<tspan fill="#b5cea8">59</tspan>)  <tspan fill="#6a8aa0"># 'F'</tspan></text>
  <text x="466" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">grade(<tspan fill="#b5cea8">90</tspan>)  <tspan fill="#6a8aa0"># 'A'</tspan></text>
  <text x="466" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="466" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># Python 3.10+: key 인수 지원</text>
  <text x="466" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">bisect.bisect_left(data, target,</text>
  <text x="466" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">                   key=<tspan fill="#7ec8e3">lambda</tspan> x: x[<tspan fill="#b5cea8">1</tspan>])</text>

  <!-- Bottom -->
  <rect x="60" y="372" width="760" height="36" rx="6" fill="#0d1926" stroke="#7ec8e3"/>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">탐색: O(log n) · insort: O(n) (삽입 시 이동 비용) · 대용량이면 sortedcontainers 고려</text>
</svg>
