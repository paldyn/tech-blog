<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">raise vs raise … from …</text>

  <!-- Left column: raise ExcB -->
  <rect x="55" y="65" width="370" height="44" rx="8" fill="#0c1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">raise ExcB()  — 단순 재발생</text>

  <!-- Left code block -->
  <rect x="55" y="120" width="370" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="75" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">try</text><text x="99" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="75" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    connect()</text>
  <text x="75" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">except</text><text x="135" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> OSError:</text>
  <text x="75" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">    raise</text><text x="131" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ValueError(</text><text x="258" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"실패"</text><text x="302" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="75" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># __context__ = OSError (암묵적)</text>

  <!-- Left result -->
  <rect x="55" y="265" width="370" height="56" rx="6" fill="#0c1628" stroke="#2a3d5e" stroke-width="1"/>
  <text x="75" y="287" font-size="12" fill="#888">• 원본 OSError는 __context__에 저장</text>
  <text x="75" y="305" font-size="12" fill="#888">• 트레이스백에 "During handling of ... another exception" 출력</text>

  <!-- Right column: raise ExcB from ExcA -->
  <rect x="455" y="65" width="370" height="44" rx="8" fill="#0c1628" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">raise ExcB() from ExcA  — 명시적 연결</text>

  <!-- Right code block -->
  <rect x="455" y="120" width="370" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="475" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">try</text><text x="499" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="475" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    connect()</text>
  <text x="475" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">except</text><text x="535" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> OSError </text><text x="601" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text><text x="621" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> e:</text>
  <text x="475" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">    raise</text><text x="531" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ValueError(</text><text x="658" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"실패"</text><text x="702" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">) </text><text x="720" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text><text x="756" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> e</text>
  <text x="475" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># __cause__ = OSError (명시적)</text>

  <!-- Right result -->
  <rect x="455" y="265" width="370" height="56" rx="6" fill="#0c1c0a" stroke="#55c555" stroke-width="1"/>
  <text x="475" y="287" font-size="12" fill="#888">• 원본 OSError는 __cause__에 저장</text>
  <text x="475" y="305" font-size="12" fill="#55c555">• 트레이스백에 "The above exception was the direct cause"</text>

  <!-- Bottom note -->
  <text x="440" y="356" text-anchor="middle" font-size="11" fill="#888">raise ValueError() from None  →  원인 숨김 (__suppress_context__ = True)</text>

  <!-- VS divider -->
  <line x1="440" y1="65" x2="440" y2="335" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="421" y="185" width="38" height="26" rx="4" fill="#0a0a0a"/>
  <text x="440" y="203" text-anchor="middle" font-size="13" font-weight="700" fill="#3a4a6e">VS</text>
</svg>
