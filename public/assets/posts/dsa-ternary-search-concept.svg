<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">삼분 탐색 (Ternary Search)</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">단봉 함수(Unimodal Function)의 최댓값·최솟값을 O(log N)에 탐색</text>

  <!-- Unimodal curve (parabola approximation using path) -->
  <path d="M 80 360 Q 200 100 440 80 Q 660 100 790 360" fill="none" stroke="#7777cc" stroke-width="3"/>

  <!-- X axis -->
  <line x1="70" y1="370" x2="800" y2="370" stroke="#444" stroke-width="1.5"/>
  <!-- Arrow on x axis -->
  <line x1="795" y1="365" x2="800" y2="370" stroke="#444" stroke-width="1.5"/>
  <line x1="795" y1="375" x2="800" y2="370" stroke="#444" stroke-width="1.5"/>
  <text x="810" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">x</text>

  <!-- Y axis -->
  <line x1="70" y1="380" x2="70" y2="70" stroke="#444" stroke-width="1.5"/>
  <line x1="65" y1="75" x2="70" y2="70" stroke="#444" stroke-width="1.5"/>
  <line x1="75" y1="75" x2="70" y2="70" stroke="#444" stroke-width="1.5"/>
  <text x="58" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">f(x)</text>

  <!-- lo marker -->
  <line x1="120" y1="370" x2="120" y2="380" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">lo</text>

  <!-- hi marker -->
  <line x1="760" y1="370" x2="760" y2="380" stroke="#7ec8e3" stroke-width="2"/>
  <text x="760" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">hi</text>

  <!-- m1 = lo + (hi-lo)/3 -->
  <!-- m1 at ~1/3 = 120 + (760-120)/3 = 120+213 = 333 -->
  <line x1="333" y1="370" x2="333" y2="380" stroke="#e05555" stroke-width="2"/>
  <line x1="333" y1="110" x2="333" y2="370" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="333" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">m1</text>

  <!-- m2 = lo + 2*(hi-lo)/3 -->
  <!-- m2 at ~2/3 = 120 + 2*213 = 546 -->
  <line x1="546" y1="370" x2="546" y2="380" stroke="#55c555" stroke-width="2"/>
  <line x1="546" y1="110" x2="546" y2="370" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="546" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">m2</text>

  <!-- f(m1) dot -->
  <!-- m1=333, on curve: x=333 is 1/3 from 80 to 790; t=0.333, Q(t)=(1-t)^2*80 + 2t(1-t)*440 + t^2*790 -->
  <!-- approximately y=152 -->
  <circle cx="333" cy="152" r="5" fill="#e05555"/>
  <text x="300" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">f(m1)</text>

  <!-- f(m2) dot -->
  <!-- m2=546, t=0.667; y approx 130 -->
  <circle cx="546" cy="130" r="5" fill="#55c555"/>
  <text x="556" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">f(m2)</text>

  <!-- Peak -->
  <circle cx="440" cy="80" r="6" fill="#e8e8e8"/>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">최댓값 (peak)</text>

  <!-- Legend box -->
  <rect x="60" y="415" width="760" height="50" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">f(m1) &lt; f(m2)</text>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 최댓값은 m1 오른쪽: lo = m1 + 1 (구간 2/3로 축소)</text>

  <text x="420" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">f(m1) &gt; f(m2)</text>
  <text x="420" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 최댓값은 m2 왼쪽: hi = m2 - 1 (구간 2/3로 축소)</text>
</svg>
