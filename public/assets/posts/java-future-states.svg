<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Future 상태와 get() 동작</text>

  <!-- PENDING state -->
  <rect x="340" y="62" width="200" height="60" rx="10" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="2"/>
  <text x="440" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">PENDING</text>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">작업 실행 전 또는 실행 중</text>

  <!-- Arrow to DONE -->
  <path d="M 380 122 L 260 170" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arr-g)"/>
  <text x="280" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">완료</text>

  <!-- Arrow to CANCELLED -->
  <path d="M 440 122 L 440 170" stroke="#e05555" stroke-width="2" fill="none" marker-end="url(#arr-r)"/>
  <text x="448" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">cancel()</text>

  <!-- Arrow to FAILED -->
  <path d="M 500 122 L 620 170" stroke="#e09055" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="566" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e09055">예외 발생</text>

  <!-- DONE -->
  <rect x="140" y="170" width="200" height="60" rx="10" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="2"/>
  <text x="240" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">DONE</text>
  <text x="240" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">get() → 결과값 즉시 반환</text>

  <!-- CANCELLED -->
  <rect x="340" y="170" width="200" height="60" rx="10" fill="#1a0a0a" stroke="#5a1a1a" stroke-width="2"/>
  <text x="440" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">CANCELLED</text>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">get() → CancellationException</text>

  <!-- FAILED -->
  <rect x="540" y="170" width="200" height="60" rx="10" fill="#1a0a00" stroke="#5a2a0a" stroke-width="2"/>
  <text x="640" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e09055">FAILED</text>
  <text x="640" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">get() → ExecutionException</text>

  <!-- get() behavior when PENDING -->
  <rect x="60" y="260" width="760" height="148" rx="10" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">PENDING 상태에서 get() 호출 시</text>

  <!-- get() blocks -->
  <rect x="80" y="296" width="200" height="96" rx="8" fill="#0a0a2a" stroke="#2a2a6a" stroke-width="1"/>
  <text x="180" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">get()</text>
  <text x="180" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">완료까지 무한 블로킹</text>
  <text x="180" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09055">⚠ 데드락 위험</text>
  <text x="180" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">InterruptedException 처리 필요</text>

  <!-- get(timeout) -->
  <rect x="330" y="296" width="200" height="96" rx="8" fill="#0a0a2a" stroke="#2a2a6a" stroke-width="1"/>
  <text x="430" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">get(5, SECONDS)</text>
  <text x="430" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">5초 대기 후 타임아웃</text>
  <text x="430" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">TimeoutException 발생</text>
  <text x="430" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">권장 패턴</text>

  <!-- isDone() polling -->
  <rect x="580" y="296" width="200" height="96" rx="8" fill="#0a0a2a" stroke="#2a2a6a" stroke-width="1"/>
  <text x="680" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">isDone()</text>
  <text x="680" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">완료 여부만 확인</text>
  <text x="680" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">블로킹 없음</text>
  <text x="680" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">폴링에 사용 가능</text>
</svg>
