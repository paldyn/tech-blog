<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">에이전트 메모리 유형</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">인지과학의 메모리 체계를 AI 에이전트에 적용한 4가지 메모리 유형</text>

  <!-- In-Context Memory -->
  <rect x="40" y="90" width="380" height="160" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">① In-Context Memory (작업 기억)</text>
  <text x="230" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">현재 컨텍스트 창 내 대화 히스토리</text>
  <rect x="56" y="150" width="348" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># System+User+Assistant 메시지 목록</text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">messages = [system, user_1, ai_1, user_2...]</text>
  <text x="56" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">특징: 빠름, 즉각 접근 / 한계: 컨텍스트 창 초과 시 소실</text>
  <text x="56" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">관리: 슬라이딩 윈도우, 요약 압축, ConversationSummaryMemory</text>

  <!-- External Memory -->
  <rect x="460" y="90" width="380" height="160" rx="8" fill="#1a0f0a" stroke="#e0a855" stroke-width="1.5"/>
  <text x="650" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e0a855">② External Memory (외부 기억)</text>
  <text x="650" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">벡터 DB / 키-값 스토어에 영속화된 메모리</text>
  <rect x="476" y="150" width="348" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 벡터 유사도로 관련 기억 검색</text>
  <text x="496" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">memories = vector_db.search(query, k=5)</text>
  <text x="476" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">특징: 영속성, 무한 용량 / 한계: 검색 지연, 관련성 한계</text>
  <text x="476" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">도구: Chroma, Pinecone, Weaviate, mem0</text>

  <!-- Episodic Memory -->
  <rect x="40" y="270" width="380" height="160" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">③ Episodic Memory (일화 기억)</text>
  <text x="230" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">과거 에피소드(대화·태스크 결과)를 저장·검색</text>
  <rect x="56" y="330" width="348" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 과거 성공 사례를 Few-shot 예제로 활용</text>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">examples = episodic_db.get_similar(task)</text>
  <text x="56" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">특징: 유사 상황에서 경험 재활용, 성능 향상</text>
  <text x="56" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">활용: Reflexion, MIPRO, 자동 Few-shot 생성</text>

  <!-- Semantic / Procedural Memory -->
  <rect x="460" y="270" width="380" height="160" rx="8" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">④ Semantic/Procedural Memory</text>
  <text x="650" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사실 지식(Semantic) + 행동 규칙(Procedural)</text>
  <rect x="476" y="330" width="348" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># LLM 파라미터 = 절차적 지식</text>
  <text x="496" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">facts = knowledge_graph.query(entity)</text>
  <text x="476" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">Semantic: 지식 그래프, 팩트 DB (외부)</text>
  <text x="476" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">Procedural: LLM 가중치 자체 (파인튜닝으로 갱신)</text>

  <!-- Bottom note -->
  <rect x="40" y="450" width="800" height="18" rx="4" fill="#0f0f0f" stroke="#222" stroke-width="1"/>
  <text x="440" y="463" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">실전: ① In-Context + ② External 조합이 핵심 — 컨텍스트에 없는 과거 정보를 벡터 검색으로 보완</text>
</svg>
