<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0955e"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">포크를 원본과 동기화하기</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">upstream remote를 추가해 원본의 최신 변경을 받아온다</text>

  <!-- upstream -->
  <rect x="56" y="130" width="200" height="70" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="156" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">upstream</text>
  <text x="156" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">org/project</text>

  <line x1="256" y1="165" x2="334" y2="165" stroke="#e0955e" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="295" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0955e">fetch / rebase</text>

  <!-- local -->
  <rect x="336" y="130" width="200" height="70" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="436" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9988dd">로컬 main</text>
  <text x="436" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최신으로 갱신</text>

  <line x1="536" y1="165" x2="614" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="575" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">push</text>

  <!-- origin -->
  <rect x="616" y="130" width="200" height="70" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="716" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">origin (내 포크)</text>
  <text x="716" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">me/project</text>

  <text x="440" y="262" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git remote add upstream URL</text>
  <text x="440" y="290" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git fetch upstream &amp;&amp; git rebase upstream/main</text>
</svg>
