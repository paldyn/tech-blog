<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">조인 알고리즘 비용 비교</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">데이터 크기와 인덱스 유무에 따른 선택 기준</text>

  <!-- Table headers -->
  <rect x="60" y="95" width="760" height="36" fill="#0d1520" rx="6"/>
  <text x="150" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">조건</text>
  <text x="320" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Nested Loop</text>
  <text x="490" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Hash Join</text>
  <text x="660" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Sort-Merge</text>

  <!-- Row 1 -->
  <rect x="60" y="135" width="760" height="40" fill="#111" rx="4"/>
  <text x="150" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">소량 + Inner 인덱스</text>
  <text x="320" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">★★★ 최적</text>
  <text x="490" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">과도한 메모리</text>
  <text x="660" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">정렬 비용 불필요</text>

  <!-- Row 2 -->
  <rect x="60" y="179" width="760" height="40" fill="#1a1a1a" rx="4"/>
  <text x="150" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대용량 등치 조인</text>
  <text x="320" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">O(N×M) 느림</text>
  <text x="490" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">★★★ 최적</text>
  <text x="660" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가능, 정렬 비용↑</text>

  <!-- Row 3 -->
  <rect x="60" y="223" width="760" height="40" fill="#111" rx="4"/>
  <text x="150" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">범위/부등호 조인</text>
  <text x="320" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인덱스 있으면 가능</text>
  <text x="490" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">등치만 지원</text>
  <text x="660" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">★★★ 최적</text>

  <!-- Row 4 -->
  <rect x="60" y="267" width="760" height="40" fill="#1a1a1a" rx="4"/>
  <text x="150" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이미 정렬된 데이터</text>
  <text x="320" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인덱스 있으면 빠름</text>
  <text x="490" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메모리 필요</text>
  <text x="660" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">★★★ O(N+M)</text>

  <!-- Row 5 -->
  <rect x="60" y="311" width="760" height="40" fill="#111" rx="4"/>
  <text x="150" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메모리 제한 환경</text>
  <text x="320" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">★★★ 메모리 최소</text>
  <text x="490" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Spill 위험</text>
  <text x="660" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정렬 버퍼 필요</text>

  <!-- Bottom note -->
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">옵티마이저는 통계 기반으로 자동 선택 — EXPLAIN으로 선택된 알고리즘 확인 권장</text>
</svg>
