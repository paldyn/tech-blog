<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pyenv Python 버전 관리 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">설치부터 프로젝트별 버전 설정까지</text>

  <!-- Step 1 -->
  <rect x="60" y="95" width="160" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">① pyenv 설치</text>
  <text x="140" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">curl | bash</text>

  <line x1="220" y1="125" x2="270" y2="125" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="270" y="95" width="160" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="350" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② Python 설치</text>
  <text x="350" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">pyenv install 3.13</text>

  <line x1="430" y1="125" x2="480" y2="125" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="480" y="95" width="160" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="560" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">③ 전역 버전 설정</text>
  <text x="560" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">pyenv global 3.13</text>

  <line x1="640" y1="125" x2="690" y2="125" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="690" y="95" width="130" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">④ 프로젝트 설정</text>
  <text x="755" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">pyenv local 3.11</text>

  <!-- Code block: install commands -->
  <rect x="60" y="185" width="380" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">설치 명령 (macOS/Linux)</text>
  <text x="76" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 1. pyenv 설치</text>
  <text x="76" y="249" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ curl https://pyenv.run | bash</tspan></text>
  <text x="76" y="277" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 2. Python 설치</text>
  <text x="76" y="297" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ pyenv install </tspan><tspan fill="#b5cea8">3.13.0</tspan></text>
  <text x="76" y="317" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ pyenv global </tspan><tspan fill="#b5cea8">3.13.0</tspan></text>
  <text x="76" y="337" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ python --version  </tspan><tspan fill="#9aa4b8"># Python 3.13.0</tspan></text>

  <!-- Code block: project usage -->
  <rect x="470" y="185" width="350" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로젝트별 버전 설정</text>
  <text x="486" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 프로젝트 디렉터리에서</text>
  <text x="486" y="249" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ cd myproject</tspan></text>
  <text x="486" y="269" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ pyenv local </tspan><tspan fill="#b5cea8">3.11.9</tspan></text>
  <text x="486" y="297" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># .python-version 파일 생성</text>
  <text x="486" y="317" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ cat .python-version</tspan></text>
  <text x="486" y="337" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#b5cea8">3.11.9</tspan></text>

  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">pyenv 우선순위: .python-version &gt; PYENV_VERSION 환경 변수 &gt; global</text>
</svg>
