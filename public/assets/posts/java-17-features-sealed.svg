<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Sealed Classes + Pattern Matching</text>

  <!-- Sealed Classes code -->
  <text x="220" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Sealed Classes 선언</text>

  <rect x="60" y="88" width="340" height="176" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="110"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// sealed — 상속 계층 봉인</text>
  <text xml:space="preserve" x="76" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">public sealed interface</text>
  <text xml:space="preserve" x="76" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  Shape</text>
  <text xml:space="preserve" x="76" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  permits</text>
  <text xml:space="preserve" x="76" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">          Circle, Rect, Tri &#123;&#125;</text>
  <text xml:space="preserve" x="76" y="192"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 허용된 하위 타입들</text>
  <text xml:space="preserve" x="76" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">record</text>
  <text xml:space="preserve" x="76" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">       Circle(</text>
  <text xml:space="preserve" x="76" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">              double</text>
  <text xml:space="preserve" x="76" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">                     r)</text>
  <text xml:space="preserve" x="76" y="232"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    </text>
  <text xml:space="preserve" x="76" y="232"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    implements</text>
  <text xml:space="preserve" x="76" y="232"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">               Shape &#123;&#125;</text>
  <text xml:space="preserve" x="76" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">record</text>
  <text xml:space="preserve" x="76" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">       Rect(</text>
  <text xml:space="preserve" x="76" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">            double</text>
  <text xml:space="preserve" x="76" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">                   w, </text>
  <text xml:space="preserve" x="76" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">                      double</text>
  <text xml:space="preserve" x="76" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">                             h)</text>

  <!-- Pattern Matching Switch code -->
  <text x="660" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Pattern Matching Switch (Preview 17)</text>

  <rect x="460" y="88" width="360" height="176" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="110"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Sealed + Pattern Match → 완전성 보장</text>
  <text xml:space="preserve" x="476" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">double</text>
  <text xml:space="preserve" x="476" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">       area(Shape s) &#123;</text>
  <text xml:space="preserve" x="476" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  return switch</text>
  <text xml:space="preserve" x="476" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">               (s) &#123;</text>
  <text xml:space="preserve" x="476" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    case</text>
  <text xml:space="preserve" x="476" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         Circle c -&gt;</text>
  <text xml:space="preserve" x="476" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      Math.PI * c.r() * c.r();</text>
  <text xml:space="preserve" x="476" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    case</text>
  <text xml:space="preserve" x="476" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         Rect r -&gt; r.w() * r.h();</text>
  <text xml:space="preserve" x="476" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    // Tri 빠뜨리면 컴파일 오류!</text>
  <text xml:space="preserve" x="476" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  &#125;;</text>
  <text xml:space="preserve" x="476" y="268"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&#125;</text>

  <!-- Guarded pattern -->
  <text x="440" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Guarded Pattern</text>
  <rect x="60" y="320" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="342"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// when 절로 조건 추가 (Java 21에서 when 키워드 확정)</text>
  <text xml:space="preserve" x="76" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">case</text>
  <text xml:space="preserve" x="76" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">     Circle c </text>
  <text xml:space="preserve" x="76" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">               when</text>
  <text xml:space="preserve" x="76" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">                    c.r() &gt; 100 -&gt; </text>
  <text xml:space="preserve" x="76" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">                                   "Large circle"</text>
  <text xml:space="preserve" x="76" y="382"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">case</text>
  <text xml:space="preserve" x="76" y="382"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">     Circle c -&gt; </text>
  <text xml:space="preserve" x="76" y="382"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">                 "Small circle"</text>
</svg>
