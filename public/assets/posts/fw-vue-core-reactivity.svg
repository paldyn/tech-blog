<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Vue 3 반응성 시스템 — Proxy 기반</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">reactive() → Proxy → track / trigger → 렌더 함수 재실행</text>

  <!-- reactive() -->
  <rect x="60" y="100" width="180" height="56" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3">reactive(obj)</text>
  <text x="150" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Proxy 객체 생성</text>

  <line x1="240" y1="128" x2="290" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Proxy get -->
  <rect x="295" y="100" width="200" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="395" y="122" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">get trap</text>
  <text x="395" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">track(target, key)</text>
  <text x="395" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">현재 Effect를 의존성에 등록</text>

  <!-- Proxy set -->
  <rect x="295" y="180" width="200" height="56" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="395" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">set trap</text>
  <text x="395" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">trigger(target, key)</text>
  <text x="395" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">의존성 Effect 모두 재실행</text>

  <line x1="495" y1="128" x2="545" y2="128" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="495" y1="208" x2="545" y2="208" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Effect / watchEffect -->
  <rect x="550" y="100" width="270" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="685" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">watchEffect / computed</text>
  <text x="685" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">의존성 자동 추적 → 재실행</text>

  <rect x="550" y="180" width="270" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="685" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">렌더 함수(Effect) 재실행</text>
  <text x="685" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Virtual DOM patch → 화면 업데이트</text>

  <!-- ref vs reactive -->
  <text x="60" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">ref vs reactive</text>

  <rect x="60" y="308" width="370" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// ref: 단일 값 (원시값 포함)</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> count = ref(0)    <tspan fill="#9aa4b8">// .value로 접근</tspan></text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">count.value++</text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// reactive: 객체 전체</text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> state = reactive({ count: 0 })</text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">state.count++    <tspan fill="#9aa4b8">// .value 불필요</tspan></text>
  <text x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// ⚠ reactive 변수 교체 시 반응성 끊김</text>

  <rect x="450" y="308" width="370" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// computed: 캐시되는 파생 상태</text>
  <text x="466" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> doubled = computed(() =&gt; count.value * 2)</text>
  <text x="466" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// watch: 명시적 소스 지정</text>
  <text x="466" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">watch(count, (newVal, oldVal) =&gt; {</text>
  <text x="466" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  console.log(newVal, oldVal)</text>
  <text x="466" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">})</text>
</svg>
