<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <!-- Background -->
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">청킹 전략 비교</text>
  <text x="440" y="66" font-size="13" fill="#888" text-anchor="middle">청크 크기와 전략이 검색 품질에 미치는 영향</text>

  <!-- ═══ Card 1: Fixed-size ═══ -->
  <rect x="60" y="86" width="178" height="300" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="60" y="86" width="178" height="4" rx="2" fill="#7777cc"/>

  <text x="149" y="114" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Fixed-size</text>
  <text x="149" y="132" font-size="11" fill="#888" text-anchor="middle">512 tokens 고정</text>

  <!-- Visual: 3 equal blocks -->
  <rect x="76" y="148" width="146" height="32" rx="4" fill="#7777cc" opacity="0.6"/>
  <text x="149" y="169" font-size="11" fill="#fff" text-anchor="middle">Chunk 1 (512 tok)</text>

  <rect x="76" y="188" width="146" height="32" rx="4" fill="#7777cc" opacity="0.6"/>
  <text x="149" y="209" font-size="11" fill="#fff" text-anchor="middle">Chunk 2 (512 tok)</text>

  <rect x="76" y="228" width="146" height="32" rx="4" fill="#7777cc" opacity="0.6"/>
  <text x="149" y="249" font-size="11" fill="#fff" text-anchor="middle">Chunk 3 (512 tok)</text>

  <!-- Pros/Cons -->
  <text x="76" y="284" font-size="11" fill="#55c555">✓ 구현 단순</text>
  <text x="76" y="300" font-size="11" fill="#55c555">✓ 예측 가능</text>
  <text x="76" y="320" font-size="11" fill="#e05555">✗ 문장 중간 절단</text>
  <text x="76" y="336" font-size="11" fill="#e05555">✗ 문맥 손실 위험</text>

  <text x="149" y="370" font-size="11" fill="#888" text-anchor="middle">검색 품질: 보통</text>

  <!-- ═══ Card 2: Overlap ═══ -->
  <rect x="254" y="86" width="178" height="300" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="254" y="86" width="178" height="4" rx="2" fill="#7ec8e3"/>

  <text x="343" y="114" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Overlap</text>
  <text x="343" y="132" font-size="11" fill="#888" text-anchor="middle">512 tok + 128 overlap</text>

  <!-- Visual: overlapping blocks -->
  <rect x="270" y="148" width="146" height="32" rx="4" fill="#7ec8e3" opacity="0.5"/>
  <text x="343" y="169" font-size="11" fill="#fff" text-anchor="middle">Chunk 1 [0–512]</text>

  <!-- overlap indicator -->
  <rect x="270" y="188" width="36" height="32" rx="4" fill="#7ec8e3" opacity="0.8"/>
  <rect x="306" y="188" width="110" height="32" rx="4" fill="#7ec8e3" opacity="0.5"/>
  <text x="288" y="209" font-size="9" fill="#0a0a0a" text-anchor="middle">오버</text>
  <text x="361" y="209" font-size="11" fill="#fff" text-anchor="middle">Chunk 2 [384–896]</text>

  <rect x="270" y="228" width="36" height="32" rx="4" fill="#7ec8e3" opacity="0.8"/>
  <rect x="306" y="228" width="110" height="32" rx="4" fill="#7ec8e3" opacity="0.5"/>
  <text x="288" y="249" font-size="9" fill="#0a0a0a" text-anchor="middle">오버</text>
  <text x="361" y="249" font-size="11" fill="#fff" text-anchor="middle">Chunk 3 [768–...]</text>

  <text x="270" y="284" font-size="11" fill="#55c555">✓ 경계 문맥 보존</text>
  <text x="270" y="300" font-size="11" fill="#55c555">✓ 구현 쉬움</text>
  <text x="270" y="320" font-size="11" fill="#e05555">✗ 중복 저장 증가</text>
  <text x="270" y="336" font-size="11" fill="#e05555">✗ 인덱스 크기↑</text>

  <text x="343" y="370" font-size="11" fill="#7ec8e3" text-anchor="middle">검색 품질: 양호</text>

  <!-- ═══ Card 3: Recursive ═══ -->
  <rect x="448" y="86" width="178" height="300" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <rect x="448" y="86" width="178" height="4" rx="2" fill="#55c555"/>

  <text x="537" y="114" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Recursive</text>
  <text x="537" y="132" font-size="11" fill="#888" text-anchor="middle">단락 → 문장 → 단어</text>

  <!-- Visual: hierarchical -->
  <rect x="464" y="148" width="146" height="20" rx="4" fill="#55c555" opacity="0.7"/>
  <text x="537" y="163" font-size="10" fill="#fff" text-anchor="middle">Paragraph split (\n\n)</text>

  <rect x="464" y="176" width="68" height="18" rx="3" fill="#55c555" opacity="0.55"/>
  <text x="498" y="189" font-size="10" fill="#fff" text-anchor="middle">Sent 1</text>

  <rect x="538" y="176" width="72" height="18" rx="3" fill="#55c555" opacity="0.55"/>
  <text x="574" y="189" font-size="10" fill="#fff" text-anchor="middle">Sent 2</text>

  <rect x="464" y="202" width="30" height="16" rx="3" fill="#55c555" opacity="0.4"/>
  <rect x="500" y="202" width="30" height="16" rx="3" fill="#55c555" opacity="0.4"/>
  <rect x="538" y="202" width="30" height="16" rx="3" fill="#55c555" opacity="0.4"/>
  <rect x="574" y="202" width="30" height="16" rx="3" fill="#55c555" opacity="0.4"/>
  <text x="479" y="214" font-size="9" fill="#fff" text-anchor="middle">tok</text>
  <text x="515" y="214" font-size="9" fill="#fff" text-anchor="middle">tok</text>
  <text x="553" y="214" font-size="9" fill="#fff" text-anchor="middle">tok</text>
  <text x="589" y="214" font-size="9" fill="#fff" text-anchor="middle">tok</text>

  <text x="537" y="248" font-size="10" fill="#888" text-anchor="middle">max_size 초과 시 재귀 분할</text>

  <text x="464" y="284" font-size="11" fill="#55c555">✓ 자연스러운 분할</text>
  <text x="464" y="300" font-size="11" fill="#55c555">✓ 구조 보존</text>
  <text x="464" y="320" font-size="11" fill="#e05555">✗ 구현 복잡도↑</text>
  <text x="464" y="336" font-size="11" fill="#888">  (LangChain 지원)</text>

  <text x="537" y="370" font-size="11" fill="#55c555" text-anchor="middle">검색 품질: 우수</text>

  <!-- ═══ Card 4: Semantic ═══ -->
  <rect x="642" y="86" width="178" height="300" rx="8" fill="#111" stroke="#e08040" stroke-width="1.5"/>
  <rect x="642" y="86" width="178" height="4" rx="2" fill="#e08040"/>

  <text x="731" y="114" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Semantic</text>
  <text x="731" y="132" font-size="11" fill="#888" text-anchor="middle">의미 유사도 기반 분할</text>

  <!-- Visual: cosine similarity clustering -->
  <rect x="658" y="148" width="146" height="20" rx="4" fill="#e08040" opacity="0.7"/>
  <text x="731" y="163" font-size="10" fill="#fff" text-anchor="middle">Sentence Embedding</text>

  <!-- similarity scores -->
  <text x="658" y="190" font-size="10" fill="#888">cos sim:</text>
  <rect x="658" y="196" width="50" height="14" rx="3" fill="#55c555" opacity="0.6"/>
  <text x="683" y="207" font-size="9" fill="#fff" text-anchor="middle">0.92 ✓</text>
  <rect x="714" y="196" width="50" height="14" rx="3" fill="#55c555" opacity="0.6"/>
  <text x="739" y="207" font-size="9" fill="#fff" text-anchor="middle">0.88 ✓</text>

  <text x="658" y="224" font-size="10" fill="#888">경계 감지:</text>
  <rect x="658" y="230" width="50" height="14" rx="3" fill="#e05555" opacity="0.6"/>
  <text x="683" y="241" font-size="9" fill="#fff" text-anchor="middle">0.34 ✗</text>
  <text x="714" y="241" font-size="10" fill="#e08040">← 분할 지점</text>

  <text x="658" y="284" font-size="11" fill="#55c555">✓ 의미 단위 보존</text>
  <text x="658" y="300" font-size="11" fill="#55c555">✓ 검색 품질 최고</text>
  <text x="658" y="320" font-size="11" fill="#e05555">✗ 느림 (임베딩 필요)</text>
  <text x="658" y="336" font-size="11" fill="#e05555">✗ 비용↑</text>

  <text x="731" y="370" font-size="11" fill="#e08040" text-anchor="middle">검색 품질: 최우수</text>

  <!-- ════ Bottom: Chunk size guide ════ -->
  <line x1="60" y1="406" x2="820" y2="406" stroke="#2a2a2a" stroke-width="1"/>

  <text x="60" y="430" font-size="13" font-weight="600" fill="#e8e8e8">청크 크기 선택 가이드</text>

  <!-- size scale -->
  <text x="60" y="454" font-size="12" fill="#888">작은 청크 (128–256 tok)</text>
  <text x="270" y="454" font-size="12" fill="#7ec8e3">←</text>
  <text x="290" y="454" font-size="12" fill="#7ec8e3">정밀 검색 (Fact QA)</text>

  <text x="490" y="454" font-size="12" fill="#888">큰 청크 (512–1024 tok)</text>
  <text x="700" y="454" font-size="12" fill="#e08040">←</text>
  <text x="720" y="454" font-size="12" fill="#e08040">문맥 이해 (Summarization)</text>

  <text x="60" y="478" font-size="11" fill="#555">실무 권장: 512 tok chunk + 64 tok overlap → 재귀 분할 전략 (Recursive Character Text Splitter)</text>
</svg>
