<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ar1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="430" rx="12" fill="#0a0a0a"/>
  <text x="60" y="56" font-size="22" font-weight="700" fill="#e8e8e8">근사 비율: 최적해에 얼마나 가까운가 (최소화 문제)</text>

  <!-- axis -->
  <line x1="90" y1="190" x2="800" y2="190" stroke="#555" stroke-width="2" marker-end="url(#ar1)"/>
  <text x="730" y="218" font-size="13" fill="#888">비용 증가 →</text>

  <!-- OPT tick -->
  <line x1="240" y1="170" x2="240" y2="210" stroke="#55c555" stroke-width="3"/>
  <text x="240" y="156" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">OPT</text>
  <text x="240" y="238" font-size="13" fill="#888" text-anchor="middle">최적 비용</text>

  <!-- rho*OPT tick -->
  <line x1="620" y1="170" x2="620" y2="210" stroke="#e05555" stroke-width="3"/>
  <text x="620" y="156" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">ρ · OPT</text>
  <text x="620" y="238" font-size="13" fill="#888" text-anchor="middle">보장 상한</text>

  <!-- guaranteed region -->
  <rect x="240" y="178" width="380" height="24" fill="#7ec8e3" opacity="0.18"/>
  <text x="430" y="118" font-size="14" fill="#7ec8e3" text-anchor="middle">근사 알고리즘의 해는 이 구간 안에 반드시 들어온다</text>

  <!-- ALG marker -->
  <circle cx="430" cy="190" r="7" fill="#7777cc"/>
  <text x="430" y="282" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">ALG (근사해)</text>
  <line x1="430" y1="258" x2="430" y2="204" stroke="#7777cc" stroke-width="2"/>

  <!-- formula box -->
  <rect x="90" y="320" width="700" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="112" y="350" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">근사 비율  ρ = ALG / OPT  ≥ 1   (ρ 가 1 에 가까울수록 우수)</text>
  <text x="112" y="378" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">보장:  모든 입력에서  ALG(I) ≤ ρ · OPT(I)  를 항상 만족</text>
</svg>
