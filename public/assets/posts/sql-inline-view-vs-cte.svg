<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">인라인 뷰 vs CTE — 가독성과 재사용성</text>

  <!-- Left: inline view -->
  <rect x="50" y="70" width="360" height="300" fill="#0d0d0d" rx="8" stroke="#7777cc"/>
  <text x="230" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">인라인 뷰 (FROM 절 서브쿼리)</text>

  <rect x="66" y="106" width="328" height="200" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="82" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="82" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  a.dept, a.avg_sal, b.max_sal</text>
  <text x="82" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="82" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  (<tspan fill="#7ec8e3">SELECT</tspan> dept,</text>
  <text x="82" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">         <tspan fill="#7ec8e3">AVG</tspan>(salary) avg_sal</text>
  <text x="82" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">   <tspan fill="#7ec8e3">FROM</tspan> emp <tspan fill="#7ec8e3">GROUP BY</tspan> dept) a</text>
  <text x="82" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">JOIN</text>
  <text x="82" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  (<tspan fill="#7ec8e3">SELECT</tspan> dept,</text>
  <text x="82" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">         <tspan fill="#7ec8e3">MAX</tspan>(salary) max_sal</text>
  <text x="82" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">   <tspan fill="#7ec8e3">FROM</tspan> emp <tspan fill="#7ec8e3">GROUP BY</tspan> dept) b</text>
  <text x="82" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">USING</text>
  <text x="82" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      (dept);</text>

  <text x="230" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">중첩될수록 가독성 저하</text>
  <text x="230" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">동일 서브쿼리 재사용 불가</text>

  <!-- Right: CTE -->
  <rect x="470" y="70" width="360" height="300" fill="#0d0d0d" rx="8" stroke="#55c555"/>
  <text x="650" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">CTE (WITH 절)</text>

  <rect x="486" y="106" width="328" height="200" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="502" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">WITH</text>
  <text x="502" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dept_avg <tspan fill="#7ec8e3">AS</tspan> (</text>
  <text x="502" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">SELECT</tspan> dept, <tspan fill="#7ec8e3">AVG</tspan>(salary) avg_sal</text>
  <text x="502" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">FROM</tspan> emp <tspan fill="#7ec8e3">GROUP BY</tspan> dept</text>
  <text x="502" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">),</text>
  <text x="502" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dept_max <tspan fill="#7ec8e3">AS</tspan> (</text>
  <text x="502" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">SELECT</tspan> dept, <tspan fill="#7ec8e3">MAX</tspan>(salary) max_sal</text>
  <text x="502" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">FROM</tspan> emp <tspan fill="#7ec8e3">GROUP BY</tspan> dept</text>
  <text x="502" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="502" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="502" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  a.dept, a.avg_sal, b.max_sal</text>

  <text x="650" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">이름 부여 → 명확한 의미 전달</text>
  <text x="650" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">같은 CTE를 여러 번 참조 가능</text>
</svg>
