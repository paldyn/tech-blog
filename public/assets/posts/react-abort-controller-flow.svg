<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr-ab1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-ab2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-ab3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AbortController 동작 원리</text>

  <!-- Normal flow (left) -->
  <text x="220" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">정상 완료 흐름</text>

  <rect x="80" y="108" width="280" height="48" rx="6" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">new AbortController()</text>
  <text x="220" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">controller.signal 생성</text>

  <line x1="220" y1="158" x2="220" y2="190" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-ab1)"/>

  <rect x="80" y="194" width="280" height="48" rx="6" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">fetch(url, { signal })</text>
  <text x="220" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">signal을 fetch에 연결</text>

  <line x1="220" y1="244" x2="220" y2="276" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-ab3)"/>

  <rect x="80" y="280" width="280" height="48" rx="6" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">응답 도착 → .json() → setData</text>
  <text x="220" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정상 처리 완료</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="360" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Abort flow (right) -->
  <text x="660" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">취소(Abort) 흐름</text>

  <rect x="520" y="108" width="280" height="48" rx="6" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">new AbortController()</text>
  <text x="660" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">controller.signal 생성</text>

  <line x1="660" y1="158" x2="660" y2="190" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-ab1)"/>

  <rect x="520" y="194" width="280" height="48" rx="6" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">fetch(url, { signal })</text>
  <text x="660" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">요청 진행 중...</text>

  <!-- Abort signal -->
  <line x1="660" y1="244" x2="660" y2="276" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-ab2)"/>
  <text x="700" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">controller.abort()</text>

  <rect x="520" y="280" width="280" height="48" rx="6" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="660" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">AbortError 발생</text>
  <text x="660" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">catch에서 AbortError 무시</text>

  <!-- Bottom note -->
  <rect x="60" y="354" width="760" height="30" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">signal.aborted 프로퍼티로 현재 상태 확인 가능 / 하나의 controller로 여러 fetch 동시 취소 가능</text>
</svg>
