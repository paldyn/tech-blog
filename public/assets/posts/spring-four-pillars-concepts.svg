<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring 4대 특성</text>

  <!-- Box 1: IoC (top-left) x=60 y=66 w=370 h=132 -->
  <rect x="60" y="66" width="370" height="132" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="106"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">IoC — 제어 역전</text>
  <text x="245" y="130"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Inversion of Control</text>
  <text x="245" y="150"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">객체 생성·생명주기의 제어권을 개발자에서</text>
  <text x="245" y="168"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Spring 컨테이너로 이전 → BeanFactory / ApplicationContext</text>

  <!-- Box 2: DI (top-right) x=450 y=66 w=370 h=132 -->
  <rect x="450" y="66" width="370" height="132" rx="8" fill="#0a100f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="635" y="106"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">DI — 의존성 주입</text>
  <text x="635" y="130"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Dependency Injection</text>
  <text x="635" y="150"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">의존 객체를 외부(컨테이너)에서 주입받음</text>
  <text x="635" y="168"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">생성자 주입 / 세터 주입 / 필드 주입</text>

  <!-- Box 3: AOP (bottom-left) x=60 y=222 w=370 h=132 -->
  <rect x="60" y="222" width="370" height="132" rx="8" fill="#141020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">AOP — 관점 지향 프로그래밍</text>
  <text x="245" y="286"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Aspect-Oriented Programming</text>
  <text x="245" y="306"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">핵심 로직과 횡단 관심사(로깅·보안·트랜잭션) 분리</text>
  <text x="245" y="324"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">@Aspect / @Around / Pointcut Expression</text>

  <!-- Box 4: PSA (bottom-right) x=450 y=222 w=370 h=132 -->
  <rect x="450" y="222" width="370" height="132" rx="8" fill="#1a120a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="635" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#ce9178" text-anchor="middle">PSA — 일관된 서비스 추상화</text>
  <text x="635" y="286"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Portable Service Abstraction</text>
  <text x="635" y="306"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">구현체가 바뀌어도 코드는 그대로 유지</text>
  <text x="635" y="324"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">@Transactional / JdbcTemplate / Cache Abstraction</text>
</svg>
