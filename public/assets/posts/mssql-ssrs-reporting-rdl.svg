<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RDL 보고서 구성 요소와 구독 유형</text>

  <!-- RDL Components -->
  <rect x="60" y="70" width="380" height="260" fill="#0f1a2e" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="250" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">RDL 파일 구성</text>

  <rect x="76" y="108" width="160" height="60" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="156" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">DataSource</text>
  <text x="156" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">연결 문자열 정의</text>
  <text x="156" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">공유 / 내장</text>

  <rect x="256" y="108" width="168" height="60" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="340" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">DataSet</text>
  <text x="340" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">T-SQL / MDX 쿼리</text>
  <text x="340" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파라미터 바인딩</text>

  <rect x="76" y="188" width="160" height="60" fill="#1a1a2e" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="156" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Report Items</text>
  <text x="156" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">Table · Matrix</text>
  <text x="156" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Chart · Gauge</text>

  <rect x="256" y="188" width="168" height="60" fill="#1a1a2e" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="340" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Parameters</text>
  <text x="340" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">입력 / 캐스케이딩</text>
  <text x="340" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기본값 · 다중값</text>

  <rect x="76" y="268" width="348" height="46" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="250" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Expressions — 동적 제어</text>
  <text x="250" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">=IIF(Fields!Sales.Value &gt; 1000000, "Red", "Green")</text>

  <!-- Subscription types -->
  <rect x="470" y="70" width="350" height="260" fill="#0f1a2e" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="645" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">구독 유형</text>

  <rect x="486" y="110" width="318" height="64" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="645" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">표준 구독</text>
  <text x="645" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">고정 수신자 목록, 스케줄 기반 전송</text>
  <text x="645" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이메일(PDF/Excel 첨부) · 파일 공유</text>

  <rect x="486" y="186" width="318" height="64" fill="#1a1a2e" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="645" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">데이터 기반 구독</text>
  <text x="645" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">수신자·파라미터를 DB 쿼리로 동적 결정</text>
  <text x="645" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">개인화 보고서 대량 발송에 적합</text>

  <rect x="486" y="262" width="318" height="52" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="645" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">캐시 새로 고침 계획</text>
  <text x="645" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">선제적 캐시 준비 — 첫 조회 지연 제거</text>

  <!-- Code block -->
  <rect x="60" y="356" width="760" height="84" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- SSRS 구독 상태 조회 (ReportServer DB)</text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan><tspan fill="#ffffff"> s.Description, s.LastStatus, s.LastRunTime,</tspan></text>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">       c.Name <tspan font-weight="600" fill="#7ec8e3">AS</tspan><tspan fill="#ffffff"> ReportName</tspan></text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">FROM</tspan><tspan fill="#ffffff"> ReportServer.dbo.Subscriptions s</tspan></text>
</svg>
