<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ImageViewer vs Picture — 컴포넌트 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">이미지 표시 목적에 따른 컴포넌트 선택 가이드</text>

  <!-- ImageViewer Box -->
  <rect x="60" y="100" width="360" height="340" fill="#111827" rx="10" stroke="#1e2433" stroke-width="1.5"/>
  <text x="240" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">ImageViewer</text>
  <text x="240" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">런타임 URL 로딩 · 스크롤 지원</text>

  <!-- ImageViewer Props -->
  <rect x="84" y="166" width="312" height="36" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="104" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">url</text>
  <text x="340" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="end">"http://.../img.png"</text>

  <rect x="84" y="210" width="312" height="36" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="104" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">stretch</text>
  <text x="340" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="end">fit | fill | none | auto</text>

  <rect x="84" y="254" width="312" height="36" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="104" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">scrollbars</text>
  <text x="340" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="end">autoboth | none | auto</text>

  <rect x="84" y="298" width="312" height="36" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="104" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">set_url()</text>
  <text x="340" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="end">런타임 동적 교체</text>

  <!-- Use cases -->
  <rect x="84" y="346" width="312" height="80" fill="#071a0f" rx="6" stroke="#1a3a1a"/>
  <text x="104" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 직원 프로필 사진</text>
  <text x="104" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 상품 이미지 뷰어</text>
  <text x="104" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 첨부파일 이미지 미리보기</text>

  <!-- Picture Box -->
  <rect x="460" y="100" width="360" height="340" fill="#111827" rx="10" stroke="#1e2433" stroke-width="1.5"/>
  <text x="640" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc" text-anchor="middle">Picture</text>
  <text x="640" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">디자인 리소스 · 상태 이미지</text>

  <!-- Picture Props -->
  <rect x="484" y="166" width="312" height="36" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="504" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">src</text>
  <text x="740" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="end">"images/logo.png"</text>

  <rect x="484" y="210" width="312" height="36" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="504" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">imageInfo</text>
  <text x="740" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="end">상태별 이미지 매핑</text>

  <rect x="484" y="254" width="312" height="36" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="504" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">index</text>
  <text x="740" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="end">0, 1, 2 … (상태 인덱스)</text>

  <rect x="484" y="298" width="312" height="36" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="504" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">set_index()</text>
  <text x="740" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="end">상태 전환</text>

  <!-- Use cases -->
  <rect x="484" y="346" width="312" height="80" fill="#0f0f1a" rx="6" stroke="#1a1a3a"/>
  <text x="504" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">✓ 버튼 아이콘 이미지</text>
  <text x="504" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">✓ 상태 표시 아이콘 (정상/경고)</text>
  <text x="504" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">✓ 로고·정적 디자인 요소</text>
</svg>
