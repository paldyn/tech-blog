<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">partial 활용 패턴</text>

  <!-- Pattern 1: sorted key -->
  <rect x="60" y="68" width="360" height="130" rx="8" fill="#0f1a2e" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">sorted key 고정</text>
  <rect x="76" y="100" width="328" height="84" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> functools </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> partial</tspan>
  </text>
  <text x="90" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">sort_by = partial(sorted, key=</tspan>
    <tspan fill="#7ec8e3" font-weight="600">lambda</tspan>
    <tspan fill="#ffffff"> x: x[</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">])</tspan>
  </text>
  <text x="90" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">data = [(</tspan>
    <tspan fill="#ce9178">"b"</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">),(</tspan>
    <tspan fill="#ce9178">"a"</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">),(</tspan>
    <tspan fill="#ce9178">"c"</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">)]</tspan>
  </text>
  <text x="90" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># [("a",1),("b",2),("c",3)]</tspan>
  </text>

  <!-- Pattern 2: print with sep/end fixed -->
  <rect x="460" y="68" width="360" height="130" rx="8" fill="#0f2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">print 스타일 고정</text>
  <rect x="476" y="100" width="328" height="84" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">debug = partial(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">print</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">"[DEBUG]"</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="490" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">               end=</tspan>
    <tspan fill="#ce9178">"\n"</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="490" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">debug(</tspan>
    <tspan fill="#ce9178">"연결 시도중"</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="490" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># [DEBUG] 연결 시도중</tspan>
  </text>

  <!-- Pattern 3: map with partial -->
  <rect x="60" y="218" width="360" height="130" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">map + partial 조합</text>
  <rect x="76" y="250" width="328" height="84" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> multiply(a, b): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> a * b</tspan>
  </text>
  <text x="90" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">triple = partial(multiply, b=</tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="90" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">result = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">list</tspan>
    <tspan fill="#ffffff">(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">map</tspan>
    <tspan fill="#ffffff">(triple, [</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">4</tspan>
    <tspan fill="#ffffff">]))</tspan>
  </text>
  <text x="90" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># [3, 6, 9, 12]</tspan>
  </text>

  <!-- Pattern 4: URL builder -->
  <rect x="460" y="218" width="360" height="130" rx="8" fill="#2a1a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">URL 빌더 패턴</text>
  <rect x="476" y="250" width="328" height="84" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> build_url(base, path, fmt=</tspan>
    <tspan fill="#ce9178">"json"</tspan>
    <tspan fill="#ffffff">):</tspan>
  </text>
  <text x="490" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">f"{base}/{path}.{fmt}"</tspan>
  </text>
  <text x="490" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">api = partial(build_url, </tspan>
    <tspan fill="#ce9178">"https://api.x.com"</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="490" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># api("users") → ".../users.json"</tspan>
  </text>
</svg>
