<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">2025~2026 AI 핵심 트렌드</text>

  <!-- 6 trend cards, 2 rows x 3 -->
  <!-- Row 1 -->
  <rect x="60" y="64" width="234" height="140" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="177" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">① 추론 모델의 부상</text>
  <text x="177" y="110" text-anchor="middle" font-size="12" fill="#aaa">OpenAI o1·o3, Claude 3.7</text>
  <text x="177" y="128" text-anchor="middle" font-size="12" fill="#aaa">응답 전 "생각하는 시간"</text>
  <text x="177" y="146" text-anchor="middle" font-size="12" fill="#aaa">을 부여해 복잡한 수학·</text>
  <text x="177" y="164" text-anchor="middle" font-size="12" fill="#aaa">코딩·과학 문제 해결력 향상</text>
  <text x="177" y="192" text-anchor="middle" font-size="11" fill="#555">키워드: CoT, MCTS</text>

  <rect x="323" y="64" width="234" height="140" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">② AI 에이전트 확산</text>
  <text x="440" y="110" text-anchor="middle" font-size="12" fill="#aaa">단순 Q&amp;A → 자율적 행동</text>
  <text x="440" y="128" text-anchor="middle" font-size="12" fill="#aaa">도구 사용, 웹 브라우징,</text>
  <text x="440" y="146" text-anchor="middle" font-size="12" fill="#aaa">코드 실행, 멀티에이전트</text>
  <text x="440" y="164" text-anchor="middle" font-size="12" fill="#aaa">협업 시스템 구축</text>
  <text x="440" y="192" text-anchor="middle" font-size="11" fill="#555">키워드: MCP, LangGraph</text>

  <rect x="586" y="64" width="234" height="140" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="703" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">③ 멀티모달 통합</text>
  <text x="703" y="110" text-anchor="middle" font-size="12" fill="#aaa">텍스트·이미지·오디오·</text>
  <text x="703" y="128" text-anchor="middle" font-size="12" fill="#aaa">비디오·3D를 하나의</text>
  <text x="703" y="146" text-anchor="middle" font-size="12" fill="#aaa">모델로 이해·생성</text>
  <text x="703" y="164" text-anchor="middle" font-size="12" fill="#aaa">GPT-4o, Gemini 1.5 Pro</text>
  <text x="703" y="192" text-anchor="middle" font-size="11" fill="#555">키워드: Any-to-Any</text>

  <!-- Row 2 -->
  <rect x="60" y="222" width="234" height="140" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="177" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">④ 오픈소스 경쟁력</text>
  <text x="177" y="268" text-anchor="middle" font-size="12" fill="#aaa">Llama 3, Mistral, Qwen</text>
  <text x="177" y="286" text-anchor="middle" font-size="12" fill="#aaa">GPT-4급 성능을</text>
  <text x="177" y="304" text-anchor="middle" font-size="12" fill="#aaa">온프레미스에서 실행</text>
  <text x="177" y="322" text-anchor="middle" font-size="12" fill="#aaa">DeepSeek R1 (저비용)</text>
  <text x="177" y="350" text-anchor="middle" font-size="11" fill="#555">키워드: GGUF, Ollama</text>

  <rect x="323" y="222" width="234" height="140" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">⑤ 소형·경량 모델</text>
  <text x="440" y="268" text-anchor="middle" font-size="12" fill="#aaa">Phi-3, Gemma, Llama 3.1 8B</text>
  <text x="440" y="286" text-anchor="middle" font-size="12" fill="#aaa">스마트폰·엣지 디바이스</text>
  <text x="440" y="304" text-anchor="middle" font-size="12" fill="#aaa">에서 실행 가능한 수준의</text>
  <text x="440" y="322" text-anchor="middle" font-size="12" fill="#aaa">성능 달성</text>
  <text x="440" y="350" text-anchor="middle" font-size="11" fill="#555">키워드: Distillation, SLM</text>

  <rect x="586" y="222" width="234" height="140" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="703" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">⑥ 엔터프라이즈 AI</text>
  <text x="703" y="268" text-anchor="middle" font-size="12" fill="#aaa">RAG + 파인튜닝의 실무</text>
  <text x="703" y="286" text-anchor="middle" font-size="12" fill="#aaa">확산, AI 거버넌스,</text>
  <text x="703" y="304" text-anchor="middle" font-size="12" fill="#aaa">보안·규제 대응,</text>
  <text x="703" y="322" text-anchor="middle" font-size="12" fill="#aaa">ROI 검증 단계 진입</text>
  <text x="703" y="350" text-anchor="middle" font-size="11" fill="#555">키워드: LLMOps, 거버넌스</text>

  <!-- Footer -->
  <text x="440" y="424" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
