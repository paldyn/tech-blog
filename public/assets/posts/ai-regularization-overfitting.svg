<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">과적합 vs 과소적합 vs 적절한 적합</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">편향-분산 트레이드오프와 정규화의 목적</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Three model fitting diagrams -->
  <!-- Underfitting -->
  <rect x="60" y="100" width="230" height="200" rx="8" fill="#0d1520" stroke="#e05555"/>
  <text x="175" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">과소적합 (Underfitting)</text>
  <!-- Simple line through scattered points -->
  <circle cx="90" cy="180" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="110" cy="150" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="130" cy="165" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="150" cy="145" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="170" cy="158" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="190" cy="140" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="210" cy="155" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="230" cy="138" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="250" cy="148" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="270" cy="132" r="4" fill="#7ec8e3" opacity="0.8"/>
  <!-- Flat line (underfitting) -->
  <line x1="80" y1="162" x2="278" y2="158" stroke="#e05555" stroke-width="2"/>
  <text x="175" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">높은 편향(Bias)</text>
  <text x="175" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">낮은 분산(Variance)</text>
  <text x="175" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">훈련/검증 모두 성능 낮음</text>
  <text x="175" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 모델 복잡도 ↑ 필요</text>

  <!-- Good fit -->
  <rect x="325" y="100" width="230" height="200" rx="8" fill="#0d1520" stroke="#55c555"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">적절한 적합 (Good Fit)</text>
  <!-- Points and smooth curve -->
  <circle cx="355" cy="182" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="375" cy="155" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="395" cy="167" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="415" cy="148" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="435" cy="158" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="455" cy="142" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="475" cy="153" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="495" cy="138" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="515" cy="147" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="535" cy="134" r="4" fill="#7ec8e3" opacity="0.8"/>
  <!-- Smooth curve -->
  <path d="M 345 180 Q 390 160 435 155 Q 480 148 545 132" stroke="#55c555" stroke-width="2" fill="none"/>
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">균형 잡힌 편향/분산</text>
  <text x="440" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">훈련 ≈ 검증 성능</text>
  <text x="440" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">새 데이터에 잘 일반화</text>
  <text x="440" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 목표 상태</text>

  <!-- Overfitting -->
  <rect x="590" y="100" width="230" height="200" rx="8" fill="#0d1520" stroke="#e8e8e8" stroke-dasharray="4,2"/>
  <text x="705" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">과적합 (Overfitting)</text>
  <!-- Points and wiggly curve -->
  <circle cx="620" cy="182" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="640" cy="155" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="660" cy="167" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="680" cy="148" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="700" cy="158" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="720" cy="142" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="740" cy="153" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="760" cy="138" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="780" cy="147" r="4" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="800" cy="134" r="4" fill="#7ec8e3" opacity="0.8"/>
  <!-- Wiggly curve through all points -->
  <path d="M 615 182 C 628 170 635 145 650 168 C 665 175 670 142 685 148 C 700 158 705 135 722 142 C 738 148 745 158 760 138 C 775 128 790 152 805 134" stroke="#e8e8e8" stroke-width="2" fill="none"/>
  <text x="705" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">낮은 편향</text>
  <text x="705" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">높은 분산 (Variance)</text>
  <text x="705" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">훈련 ↑ 검증 ↓ (차이 큼)</text>
  <text x="705" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 정규화 필요</text>

  <!-- Solutions -->
  <rect x="60" y="318" width="760" height="152" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">과적합 해결책: 정규화 기법 모음</text>
  <line x1="80" y1="348" x2="800" y2="348" stroke="#333" stroke-width="1"/>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">데이터 수준</text>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">데이터 증강 (Augmentation) · 더 많은 훈련 데이터 확보 · 데이터 정제</text>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">모델 수준</text>
  <text x="80" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">L1/L2 정규화 (가중치 패널티) · 드롭아웃 · 배치/레이어 정규화 · 조기 종료</text>
  <text x="80" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">학습 수준</text>
  <text x="80" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">학습률 스케줄 · 가중치 감쇠(AdamW) · 앙상블 · 교차 검증</text>

  <!-- Footer -->
  <text x="440" y="508" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
