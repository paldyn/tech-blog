<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">OVER 절 완전 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">PARTITION BY · ORDER BY · FRAME 조합 방식</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="210" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- OVER 절 기본 구조</tspan></text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">func() <tspan fill="#7ec8e3">OVER</tspan> (</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  [<tspan fill="#7ec8e3">PARTITION BY</tspan> col1, col2]</text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  [<tspan fill="#7ec8e3">ORDER BY</tspan> col3 [<tspan fill="#7ec8e3">ASC</tspan>|<tspan fill="#7ec8e3">DESC</tspan>]]</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  [<tspan fill="#7ec8e3">ROWS</tspan>|<tspan fill="#7ec8e3">RANGE BETWEEN</tspan> start <tspan fill="#7ec8e3">AND</tspan> end]</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 실용 예: 부서별 급여 비율</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">SUM</tspan>(salary) <tspan fill="#7ec8e3">OVER</tspan> (<tspan fill="#7ec8e3">PARTITION BY</tspan> dept)</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 전체 합계 (파티션 없음)</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">SUM</tspan>(salary) <tspan fill="#7ec8e3">OVER</tspan> ()</text>

  <!-- Note -->
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">세 절 모두 선택 사항 — 비어있는 OVER ()는 전체 결과셋 하나의 윈도우</text>
</svg>
