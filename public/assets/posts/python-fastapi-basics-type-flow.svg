<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">타입 힌트 하나가 세 가지 일을 한다</text>

  <defs>
    <marker id="faar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="92" width="280" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="122" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">def</tspan> read(item_id: <tspan fill="#7ec8e3" font-weight="600">int</tspan>):</text>
  <text x="76" y="150" font-size="12" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 타입 힌트 : int</text>

  <line x1="340" y1="132" x2="406" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#faar)"/>

  <rect x="410" y="72" width="410" height="56" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="615" y="98" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">① 자동 검증</text>
  <text x="615" y="118" font-size="12" fill="#9aa4b8" text-anchor="middle">"abc" 들어오면 422 오류로 거른다</text>

  <rect x="410" y="136" width="410" height="56" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="615" y="162" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">② 자동 형변환</text>
  <text x="615" y="182" font-size="12" fill="#9aa4b8" text-anchor="middle">"3" → 3 (int)으로 바꿔서 전달</text>

  <rect x="410" y="200" width="410" height="56" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="615" y="226" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 자동 문서</text>
  <text x="615" y="246" font-size="12" fill="#9aa4b8" text-anchor="middle">/docs 에 타입까지 표시</text>

  <rect x="60" y="200" width="280" height="56" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="224" font-size="13" fill="#55c555" text-anchor="middle">표준 타입 힌트를</text>
  <text x="200" y="244" font-size="13" fill="#55c555" text-anchor="middle">그대로 활용한다</text>
</svg>
