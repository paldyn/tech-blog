<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript vs Java — 이름만 닮은 두 언어</text>

  <!-- Left box: JavaScript -->
  <rect x="60" y="72" width="360" height="330" rx="10" fill="#0d1117" stroke="#f7df1e" stroke-width="2"/>
  <text x="240" y="106" text-anchor="middle" font-size="18" font-weight="700" fill="#f7df1e">JavaScript</text>

  <text x="84" y="136" font-size="13" fill="#888">탄생</text>
  <text x="200" y="136" font-size="13" fill="#e8e8e8">1995, Brendan Eich (10일)</text>

  <text x="84" y="162" font-size="13" fill="#888">타입 시스템</text>
  <text x="200" y="162" font-size="13" fill="#55c555">동적 타입 (Dynamic)</text>

  <text x="84" y="188" font-size="13" fill="#888">실행 방식</text>
  <text x="200" y="188" font-size="13" fill="#7ec8e3">인터프리터 + JIT</text>

  <text x="84" y="214" font-size="13" fill="#888">패러다임</text>
  <text x="200" y="214" font-size="13" fill="#e8e8e8">멀티 (FP·OOP·프로시저)</text>

  <text x="84" y="240" font-size="13" fill="#888">상속 방식</text>
  <text x="200" y="240" font-size="13" fill="#7777cc">프로토타입 기반</text>

  <text x="84" y="266" font-size="13" fill="#888">주 실행 환경</text>
  <text x="200" y="266" font-size="13" fill="#e8e8e8">브라우저 · Node · Deno</text>

  <text x="84" y="292" font-size="13" fill="#888">표준 기관</text>
  <text x="200" y="292" font-size="13" fill="#e8e8e8">TC39 (ECMA)</text>

  <!-- Code sample JS -->
  <rect x="84" y="308" width="312" height="76" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="100" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">let</text>
  <text x="124" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> x = </text>
  <text x="164" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">42</text>
  <text x="182" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="100" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">x = </text>
  <text x="128" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"hello"</text>
  <text x="196" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="100" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 타입 변경 가능 — 동적 타입</text>

  <!-- Center arrow -->
  <polygon points="430,225 460,210 460,220 450,220 450,230 460,230 460,240" fill="#444" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="445" y="262" text-anchor="middle" font-size="11" fill="#888">vs</text>

  <!-- Right box: Java -->
  <rect x="460" y="72" width="360" height="330" rx="10" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="640" y="106" text-anchor="middle" font-size="18" font-weight="700" fill="#e05555">Java</text>

  <text x="484" y="136" font-size="13" fill="#888">탄생</text>
  <text x="600" y="136" font-size="13" fill="#e8e8e8">1995, Sun Microsystems</text>

  <text x="484" y="162" font-size="13" fill="#888">타입 시스템</text>
  <text x="600" y="162" font-size="13" fill="#e05555">정적 타입 (Static)</text>

  <text x="484" y="188" font-size="13" fill="#888">실행 방식</text>
  <text x="600" y="188" font-size="13" fill="#7ec8e3">컴파일 → JVM 바이트코드</text>

  <text x="484" y="214" font-size="13" fill="#888">패러다임</text>
  <text x="600" y="214" font-size="13" fill="#e8e8e8">OOP 중심</text>

  <text x="484" y="240" font-size="13" fill="#888">상속 방식</text>
  <text x="600" y="240" font-size="13" fill="#7777cc">클래스 기반</text>

  <text x="484" y="266" font-size="13" fill="#888">주 실행 환경</text>
  <text x="600" y="266" font-size="13" fill="#e8e8e8">JVM (서버 · Android)</text>

  <text x="484" y="292" font-size="13" fill="#888">표준 기관</text>
  <text x="600" y="292" font-size="13" fill="#e8e8e8">Oracle / JCP</text>

  <!-- Code sample Java -->
  <rect x="484" y="308" width="312" height="76" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="500" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">int</text>
  <text x="524" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> x = </text>
  <text x="564" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">42</text>
  <text x="582" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="500" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// x = "hello"; → 컴파일 오류!</text>
  <text x="500" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 선언 시 타입 고정 — 정적 타입</text>

  <!-- Footer -->
  <text x="440" y="438" text-anchor="middle" font-size="11" fill="#444">이름은 비슷하지만 설계 철학과 쓰임새가 전혀 다른 언어입니다</text>
  <text x="440" y="458" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #1</text>
</svg>
