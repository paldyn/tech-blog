<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Duration vs Period — 시간의 양, 두 가지 단위</text>

  <!-- Duration box -->
  <rect x="60" y="80" width="360" height="152" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Duration — 시간 기반</text>
  <text x="240" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">초 + 나노초로 저장 (물리적 길이)</text>
  <text x="240" y="156" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">PT2H30M = 2시간 30분</text>
  <text x="240" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Instant·LocalTime 등 시간 계열과 사용</text>
  <text x="240" y="204" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">Duration.between(start, end)</text>

  <!-- Period box -->
  <rect x="460" y="80" width="360" height="152" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Period — 날짜 기반</text>
  <text x="640" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">년 + 월 + 일로 저장 (달력 개념)</text>
  <text x="640" y="156" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">P1Y2M3D = 1년 2개월 3일</text>
  <text x="640" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">LocalDate 등 날짜 계열과 사용</text>
  <text x="640" y="204" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">Period.between(date1, date2)</text>

  <!-- DST warning -->
  <rect x="60" y="264" width="760" height="74" rx="8" fill="#1a140a" stroke="#e0a040" stroke-width="1.5"/>
  <text x="440" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a040">같은 "하루"라도 의미가 다르다</text>
  <text x="440" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Duration.ofDays(1) = 정확히 24시간 — Period.ofDays(1) = 벽시계 하루 (DST 경계에선 23·25시간)</text>

  <!-- Code example -->
  <rect x="60" y="362" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">zdt.plus(Duration.ofDays(<tspan fill="#b5cea8">1</tspan>)); <tspan fill="#9aa4b8">// 물리적 24시간 뒤</tspan></text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">zdt.plus(Period.ofDays(<tspan fill="#b5cea8">1</tspan>));   <tspan fill="#9aa4b8">// 다음 날 같은 시각</tspan></text>
</svg>
