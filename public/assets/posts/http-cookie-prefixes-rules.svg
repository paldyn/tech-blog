<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">쿠키 보안 프리픽스</text>
    <!-- __Secure- prefix -->
    <rect x="60" y="65" width="375" height="235" rx="8" fill="#2a0f0f" stroke="#aa3a3a" stroke-width="1.5"/>
    <line x1="60" y1="112" x2="435" y2="112" stroke="#aa3a3a" stroke-width="1"/>
    <text x="247" y="87" text-anchor="middle" font-size="17" font-weight="700" fill="#e05555">__Secure- 프리픽스</text>
    <text x="247" y="106" text-anchor="middle" font-size="11" fill="#888">__Secure-Name=Value</text>
    <text x="80" y="135" font-size="12" font-weight="600" fill="#e8e8e8">필수 조건</text>
    <text x="80" y="158" font-size="12" fill="#e8e8e8">✓ Secure 속성 필수</text>
    <text x="80" y="178" font-size="11" fill="#888">  HTTPS 연결에서만 전송</text>
    <text x="80" y="205" font-size="12" font-weight="600" fill="#e8e8e8">예시</text>
    <text x="80" y="225" font-size="11" fill="#888">Set-Cookie: __Secure-sid=abc;</text>
    <text x="80" y="243" font-size="11" fill="#888">  Secure; HttpOnly; Path=/</text>
    <text x="80" y="270" font-size="12" font-weight="600" fill="#e8e8e8">효과</text>
    <text x="80" y="290" font-size="11" fill="#888">HTTP에서 설정 시도 → 브라우저 거부</text>
    <!-- __Host- prefix -->
    <rect x="445" y="65" width="375" height="235" rx="8" fill="#0a1a2a" stroke="#2a6a9a" stroke-width="1.5"/>
    <line x1="445" y1="112" x2="820" y2="112" stroke="#2a6a9a" stroke-width="1"/>
    <text x="632" y="87" text-anchor="middle" font-size="17" font-weight="700" fill="#5aacdd">__Host- 프리픽스</text>
    <text x="632" y="106" text-anchor="middle" font-size="11" fill="#888">__Host-Name=Value</text>
    <text x="465" y="135" font-size="12" font-weight="600" fill="#e8e8e8">필수 조건</text>
    <text x="465" y="158" font-size="12" fill="#e8e8e8">✓ Secure 속성 필수</text>
    <text x="465" y="178" font-size="12" fill="#e8e8e8">✓ Domain 속성 금지</text>
    <text x="465" y="198" font-size="12" fill="#e8e8e8">✓ Path=/ 필수</text>
    <text x="465" y="225" font-size="12" font-weight="600" fill="#e8e8e8">예시</text>
    <text x="465" y="245" font-size="11" fill="#888">Set-Cookie: __Host-token=xyz;</text>
    <text x="465" y="263" font-size="11" fill="#888">  Secure; HttpOnly; Path=/</text>
    <text x="465" y="282" font-size="11" fill="#555">Domain 있으면 브라우저 거부</text>
    <!-- Security comparison -->
    <rect x="60" y="318" width="760" height="80" rx="8" fill="#0f1f0f" stroke="#3a6a3a" stroke-width="1.5"/>
    <text x="440" y="340" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">보안 강도 비교</text>
    <text x="200" y="363" text-anchor="middle" font-size="12" fill="#e8e8e8">일반 쿠키</text>
    <text x="200" y="383" text-anchor="middle" font-size="11" fill="#888">보안 속성 선택적</text>
    <text x="440" y="363" text-anchor="middle" font-size="12" fill="#e05555">__Secure-</text>
    <text x="440" y="383" text-anchor="middle" font-size="11" fill="#888">Secure 속성 강제</text>
    <text x="680" y="363" text-anchor="middle" font-size="12" fill="#5aacdd">__Host-</text>
    <text x="680" y="383" text-anchor="middle" font-size="11" fill="#888">Secure + 도메인 고정 + Path=/</text>
    <!-- arrows showing increasing security -->
    <line x1="290" y1="373" x2="360" y2="373" stroke="#888" stroke-width="1.5"/>
    <line x1="520" y1="373" x2="590" y2="373" stroke="#888" stroke-width="1.5"/>
    <text x="440" y="416" text-anchor="middle" font-size="11" fill="#555">프리픽스는 서버 코드가 아닌 브라우저 수준에서 강제 — 공격자가 쿠키 이름을 위장 불가</text>
  </g>
</svg>
