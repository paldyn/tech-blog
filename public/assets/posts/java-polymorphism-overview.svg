<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8a040"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">다형성 — 하나의 타입, 다양한 동작</text>

  <!-- ===== 참조 타입 (Animal) ===== -->
  <rect x="330" y="68" width="220" height="48" rx="8" fill="#2a1a3e" stroke="#9966cc" stroke-width="2"/>
  <text x="440" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#9966cc" text-anchor="middle">Animal (참조 타입)</text>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">sound(), move()</text>

  <!-- 업캐스팅 arrows -->
  <line x1="290" y1="116" x2="176" y2="160" stroke="#7777cc" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <line x1="440" y1="116" x2="440" y2="160" stroke="#7777cc" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <line x1="590" y1="116" x2="704" y2="160" stroke="#7777cc" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>

  <!-- ===== Dog 실제 객체 ===== -->
  <rect x="60" y="164" width="200" height="48" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Dog</text>
  <text x="160" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">sound() → "멍멍!"</text>

  <!-- ===== Cat 실제 객체 ===== -->
  <rect x="330" y="164" width="200" height="48" rx="8" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="430" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">Cat</text>
  <text x="430" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">sound() → "야옹!"</text>

  <!-- ===== Bird 실제 객체 ===== -->
  <rect x="600" y="164" width="200" height="48" rx="8" fill="#1a2a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="700" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Bird</text>
  <text x="700" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">sound() → "짹짹!"</text>

  <!-- ===== Code box ===== -->
  <rect x="60" y="240" width="370" height="186" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 업캐스팅 — 자동 변환</text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Animal a1 = <tspan fill="#7ec8e3" font-weight="600">new</tspan> Dog(<tspan fill="#ce9178">"Rex"</tspan>);</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Animal a2 = <tspan fill="#7ec8e3" font-weight="600">new</tspan> Cat(<tspan fill="#ce9178">"Nabi"</tspan>);</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Animal a3 = <tspan fill="#7ec8e3" font-weight="600">new</tspan> Bird(<tspan fill="#ce9178">"Tweety"</tspan>);</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 동적 디스패치 — 런타임 결정</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">a1.sound(); <tspan fill="#9aa4b8">// → 멍멍!</tspan></text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">a2.sound(); <tspan fill="#9aa4b8">// → 야옹!</tspan></text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">a3.sound(); <tspan fill="#9aa4b8">// → 짹짹!</tspan></text>
  <text x="76" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 컴파일 타임: Animal.sound()</text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"></text>

  <!-- ===== Right explanation panel ===== -->
  <rect x="460" y="240" width="360" height="186" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="640" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">다형성의 두 축</text>

  <rect x="476" y="278" width="148" height="62" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">업캐스팅</text>
  <text x="550" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자식 → 부모 타입</text>
  <text x="550" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자동 (묵시적) 변환</text>

  <rect x="636" y="278" width="168" height="62" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">동적 디스패치</text>
  <text x="720" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">런타임 실제 타입 확인</text>
  <text x="720" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">오버라이딩 메서드 실행</text>

  <text x="476" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" font-weight="600">다운캐스팅 (명시적)</text>
  <text x="476" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Dog dog = (Dog) a1;  // ClassCastException 위험</text>
  <text x="476" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a040">if (a1 instanceof Dog d) {</text>
  <text x="476" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a040">    d.fetch();  // 패턴 매칭 instanceof</text>

  <!-- ===== Benefits ===== -->
  <rect x="60" y="448" width="760" height="50" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="469" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">다형성의 이점</text>
  <text x="440" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">코드 재사용성 향상 · 새 타입 추가 시 기존 코드 수정 최소화 · 인터페이스 기반 프로그래밍 가능</text>
</svg>
