<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">두 점(..) vs 세 점(...) 비교 범위</text>

  <!-- Branch diagram -->
  <!-- Common base commit -->
  <circle cx="160" cy="200" r="14" fill="#555" stroke="#888" stroke-width="2"/>
  <text x="160" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" text-anchor="middle">A</text>
  <text x="160" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">공통 조상</text>

  <!-- main branch commits -->
  <circle cx="320" cy="140" r="14" fill="#55c555" stroke="#55c555" stroke-width="2"/>
  <text x="320" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#0a0a0a" text-anchor="middle">M1</text>

  <circle cx="460" cy="140" r="14" fill="#55c555" stroke="#55c555" stroke-width="2"/>
  <text x="460" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#0a0a0a" text-anchor="middle">M2</text>

  <text x="350" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">main</text>

  <!-- feature branch commits -->
  <circle cx="320" cy="260" r="14" fill="#7ec8e3" stroke="#7ec8e3" stroke-width="2"/>
  <text x="320" y="265" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#0a0a0a" text-anchor="middle">F1</text>

  <circle cx="460" cy="260" r="14" fill="#7ec8e3" stroke="#7ec8e3" stroke-width="2"/>
  <text x="460" y="265" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#0a0a0a" text-anchor="middle">F2</text>

  <text x="350" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">feature</text>

  <!-- Lines -->
  <line x1="174" y1="192" x2="306" y2="148" stroke="#555" stroke-width="1.5"/>
  <line x1="174" y1="208" x2="306" y2="252" stroke="#555" stroke-width="1.5"/>
  <line x1="334" y1="140" x2="446" y2="140" stroke="#55c555" stroke-width="1.5"/>
  <line x1="334" y1="260" x2="446" y2="260" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Two dot range (main..feature) -->
  <rect x="540" y="80" width="300" height="150" rx="10" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="690" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">main..feature</text>
  <text x="690" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(두 점)</text>
  <text x="690" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">feature tip vs main tip</text>
  <text x="690" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">M2 ↔ F2 직접 비교</text>
  <text x="690" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">git diff main..feature</text>
  <text x="690" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">= git diff main feature</text>

  <!-- Three dot range -->
  <rect x="540" y="250" width="300" height="150" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="690" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">main...feature</text>
  <text x="690" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(세 점)</text>
  <text x="690" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">공통 조상 A vs feature tip F2</text>
  <text x="690" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">feature에서만 변경된 것</text>
  <text x="690" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">git diff main...feature</text>

  <!-- Arrows from diagram to boxes -->
  <line x1="474" y1="140" x2="536" y2="158" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="474" y1="260" x2="536" y2="260" stroke="#55c555" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Key summary -->
  <rect x="60" y="380" width="760" height="96" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">핵심 정리</text>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">두 점(..)</text>
  <text x="160" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 양 끝 커밋을 직접 비교. main이 앞서간 변경도 포함됨</text>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">세 점(...)</text>
  <text x="175" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 분기점 이후 feature에서만 생긴 변경을 봄 (PR 리뷰에 적합)</text>
</svg>
