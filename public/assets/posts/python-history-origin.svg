<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python의 탄생 배경</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">ABC 언어에서 Python으로</text>

  <!-- ABC Box -->
  <rect x="60" y="90" width="220" height="160" rx="8" fill="#0f1820" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">ABC 언어 (1980s)</text>
  <text x="80" y="140" font-size="12" fill="#55c555">+ 뛰어난 가독성</text>
  <text x="80" y="158" font-size="12" fill="#55c555">+ 초보자 친화적</text>
  <text x="80" y="176" font-size="12" fill="#e05555">- 확장성 부족</text>
  <text x="80" y="194" font-size="12" fill="#e05555">- OS 접근 불가</text>
  <text x="80" y="212" font-size="12" fill="#e05555">- 인터프리터 내장</text>
  <text x="80" y="232" font-size="11" fill="#666">CWI 연구소 프로젝트</text>

  <!-- Arrow -->
  <line x1="282" y1="170" x2="336" y2="170" stroke="#7777cc" stroke-width="2"/>
  <polygon points="336,164 348,170 336,176" fill="#7777cc"/>

  <!-- Guido's Idea Box -->
  <rect x="350" y="90" width="180" height="160" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">Guido의 아이디어</text>
  <text x="360" y="138" font-size="11" fill="#aaa">ABC 장점은 유지</text>
  <text x="360" y="156" font-size="11" fill="#aaa">+ OS 접근 허용</text>
  <text x="360" y="174" font-size="11" fill="#aaa">+ C 확장 가능</text>
  <text x="360" y="192" font-size="11" fill="#aaa">+ 예외 처리</text>
  <text x="360" y="210" font-size="11" fill="#aaa">+ 모듈 시스템</text>
  <text x="440" y="234" text-anchor="middle" font-size="10" fill="#666">1989년 크리스마스 연휴</text>

  <!-- Arrow -->
  <line x1="532" y1="170" x2="586" y2="170" stroke="#55c555" stroke-width="2"/>
  <polygon points="586,164 598,170 586,176" fill="#55c555"/>

  <!-- Python Box -->
  <rect x="600" y="90" width="220" height="160" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Python (1991~)</text>
  <text x="620" y="140" font-size="12" fill="#55c555">+ ABC의 가독성 계승</text>
  <text x="620" y="158" font-size="12" fill="#55c555">+ OS 완전 접근</text>
  <text x="620" y="176" font-size="12" fill="#55c555">+ C 확장 모듈</text>
  <text x="620" y="194" font-size="12" fill="#55c555">+ 동적 타이핑</text>
  <text x="620" y="212" font-size="12" fill="#55c555">+ 예외 처리</text>
  <text x="710" y="232" text-anchor="middle" font-size="11" fill="#666">Monty Python 팬</text>

  <!-- Name origin -->
  <rect x="60" y="276" width="760" height="124" rx="8" fill="#0f1418" stroke="#333"/>
  <text x="440" y="302" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">이름의 유래: Python</text>
  <text x="440" y="326" text-anchor="middle" font-size="12" fill="#aaa">Guido는 Monty Python's Flying Circus 팬이었다</text>
  <text x="440" y="348" text-anchor="middle" font-size="12" fill="#aaa">뱀(python)과는 관계 없지만, 로고는 뱀 두 마리를 쓴다</text>
  <text x="440" y="370" text-anchor="middle" font-size="12" fill="#aaa">짧고 기억하기 쉬우며, 코드도 그만큼 간결하게 짓는다는 의미</text>
  <text x="440" y="390" text-anchor="middle" font-size="11" fill="#555">— Guido van Rossum, Python 창시자</text>
</svg>
