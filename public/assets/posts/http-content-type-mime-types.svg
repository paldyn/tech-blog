<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">MIME 타입 구조와 분류</text>
    <!-- Type/Subtype structure -->
    <rect x="60" y="65" width="760" height="60" rx="8" fill="#0f1f35" stroke="#4a6a9a" stroke-width="1.5"/>
    <text x="440" y="88" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">type / subtype [ ; parameter=value ]</text>
    <text x="260" y="114" text-anchor="middle" font-size="11" fill="#888">최상위 타입</text>
    <text x="500" y="114" text-anchor="middle" font-size="11" fill="#888">하위 타입</text>
    <text x="690" y="114" text-anchor="middle" font-size="11" fill="#888">옵션 파라미터</text>
    <!-- 6 type boxes in 3x2 grid -->
    <!-- text: x=120,y=148 -->
    <rect x="60" y="130" width="240" height="100" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="180" y="154" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">text</text>
    <text x="180" y="172" text-anchor="middle" font-size="11" fill="#888">텍스트 콘텐츠</text>
    <text x="180" y="190" text-anchor="middle" font-size="12" fill="#e8e8e8">text/html, text/css</text>
    <text x="180" y="208" text-anchor="middle" font-size="12" fill="#e8e8e8">text/plain, text/csv</text>
    <!-- image -->
    <rect x="320" y="130" width="240" height="100" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1"/>
    <text x="440" y="154" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">image</text>
    <text x="440" y="172" text-anchor="middle" font-size="11" fill="#888">이미지</text>
    <text x="440" y="190" text-anchor="middle" font-size="12" fill="#e8e8e8">image/jpeg, image/png</text>
    <text x="440" y="208" text-anchor="middle" font-size="12" fill="#e8e8e8">image/gif, image/webp</text>
    <!-- application -->
    <rect x="580" y="130" width="240" height="100" rx="8" fill="#2a1a0f" stroke="#aa7a3a" stroke-width="1"/>
    <text x="700" y="154" text-anchor="middle" font-size="14" font-weight="700" fill="#dd9955">application</text>
    <text x="700" y="172" text-anchor="middle" font-size="11" fill="#888">바이너리/구조화 데이터</text>
    <text x="700" y="190" text-anchor="middle" font-size="12" fill="#e8e8e8">application/json</text>
    <text x="700" y="208" text-anchor="middle" font-size="12" fill="#e8e8e8">application/pdf, .zip</text>
    <!-- audio -->
    <rect x="60" y="250" width="240" height="100" rx="8" fill="#2a0f2a" stroke="#aa3aaa" stroke-width="1"/>
    <text x="180" y="274" text-anchor="middle" font-size="14" font-weight="700" fill="#cc77cc">audio</text>
    <text x="180" y="292" text-anchor="middle" font-size="11" fill="#888">오디오</text>
    <text x="180" y="310" text-anchor="middle" font-size="12" fill="#e8e8e8">audio/mpeg, audio/ogg</text>
    <text x="180" y="328" text-anchor="middle" font-size="12" fill="#e8e8e8">audio/wav, audio/aac</text>
    <!-- video -->
    <rect x="320" y="250" width="240" height="100" rx="8" fill="#2a2a0f" stroke="#aaaa3a" stroke-width="1"/>
    <text x="440" y="274" text-anchor="middle" font-size="14" font-weight="700" fill="#dddd55">video</text>
    <text x="440" y="292" text-anchor="middle" font-size="11" fill="#888">비디오</text>
    <text x="440" y="310" text-anchor="middle" font-size="12" fill="#e8e8e8">video/mp4, video/webm</text>
    <text x="440" y="328" text-anchor="middle" font-size="12" fill="#e8e8e8">video/ogg, video/avi</text>
    <!-- multipart -->
    <rect x="580" y="250" width="240" height="100" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
    <text x="700" y="274" text-anchor="middle" font-size="14" font-weight="700" fill="#9999ee">multipart</text>
    <text x="700" y="292" text-anchor="middle" font-size="11" fill="#888">복합 본문</text>
    <text x="700" y="310" text-anchor="middle" font-size="12" fill="#e8e8e8">multipart/form-data</text>
    <text x="700" y="328" text-anchor="middle" font-size="12" fill="#e8e8e8">multipart/mixed, .byteranges</text>
    <text x="440" y="415" text-anchor="middle" font-size="11" fill="#555">IANA에 등록된 타입 · vendor prefix: application/vnd.XXX · 실험적: application/x-XXX</text>
  </g>
</svg>
