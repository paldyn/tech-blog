<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a855"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LangGraph StateGraph 구조</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">상태(State)를 공유하며 노드(Node)가 순환 실행되는 그래프 워크플로우</text>

  <!-- State box (left) -->
  <rect x="60" y="100" width="200" height="300" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">TypedDict State</text>

  <rect x="76" y="138" width="168" height="36" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">messages:</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">         list</text>

  <rect x="76" y="182" width="168" height="36" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">tool_calls:</text>
  <text x="92" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          list</text>

  <rect x="76" y="226" width="168" height="36" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">next_action:</text>
  <text x="92" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">           str</text>

  <rect x="76" y="270" width="168" height="36" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">context:</text>
  <text x="92" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">         dict</text>

  <text x="160" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 노드가 읽고 쓰는</text>
  <text x="160" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공유 상태 스토어</text>

  <!-- Arrow State → Agent Node -->
  <line x1="260" y1="250" x2="318" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Agent Node -->
  <rect x="320" y="160" width="160" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="400" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">agent</text>
  <text x="400" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">LLM 호출, 다음 액션 결정</text>
  <text x="400" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Node 함수</text>

  <!-- Arrow State → Tools Node -->
  <line x1="260" y1="290" x2="318" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Tools Node -->
  <rect x="320" y="290" width="160" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="400" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">tools</text>
  <text x="400" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">도구 실행, 결과 반환</text>
  <text x="400" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Node 함수</text>

  <!-- Agent → Conditional Edge -->
  <line x1="480" y1="200" x2="558" y2="200" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="519" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a855">조건부</text>

  <!-- Conditional router box -->
  <rect x="560" y="166" width="130" height="68" rx="8" fill="#2a1a0a" stroke="#e0a855" stroke-width="2"/>
  <text x="625" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">should_continue</text>
  <text x="625" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">conditional_edge</text>
  <text x="625" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">라우팅 함수</text>

  <!-- Conditional → tools -->
  <line x1="690" y1="215" x2="730" y2="330" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-dash)"/>
  <text x="726" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">tools</text>

  <!-- Conditional → END -->
  <line x1="690" y1="190" x2="760" y2="140" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="732" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">END</text>

  <!-- END node -->
  <rect x="762" y="110" width="80" height="40" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="2"/>
  <text x="802" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">END</text>

  <!-- tools → back to agent -->
  <path d="M 480 330 Q 510 420 400 420 Q 290 420 320 270" stroke="#7777cc" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arr-dash)"/>
  <text x="400" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">결과 → 상태 업데이트 → agent 재실행</text>

  <!-- tools → update state -->
  <line x1="320" y1="330" x2="262" y2="300" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-dash)"/>

  <!-- START -->
  <rect x="60" y="430" width="80" height="40" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="2"/>
  <text x="100" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">START</text>
  <line x1="140" y1="450" x2="318" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Legend -->
  <rect x="560" y="360" width="260" height="120" rx="6" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="576" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">Legend</text>
  <line x1="576" y1="400" x2="606" y2="400" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="616" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">일반 Edge (고정 전이)</text>
  <line x1="576" y1="424" x2="606" y2="424" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="616" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Conditional Edge (분기)</text>
  <line x1="576" y1="448" x2="606" y2="448" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-dash)"/>
  <text x="616" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">순환 경로 (루프)</text>
  <line x1="576" y1="464" x2="606" y2="464" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="616" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">State 읽기/쓰기</text>
</svg>
