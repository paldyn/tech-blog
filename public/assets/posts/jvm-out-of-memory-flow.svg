<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="470" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">할당이 OOM으로 가는 길</text>

  <defs>
    <marker id="oomArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="oomArrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- center column boxes -->
  <rect x="210" y="70" width="210" height="48" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="315" y="100" font-size="14" fill="#e8e8e8" text-anchor="middle">객체 할당 요청</text>

  <rect x="210" y="160" width="210" height="48" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="315" y="190" font-size="14" fill="#e8e8e8" text-anchor="middle">힙에 여유 공간?</text>

  <rect x="210" y="250" width="210" height="48" rx="8" fill="#0f1626" stroke="#e0a055" stroke-width="1"/>
  <text x="315" y="280" font-size="14" fill="#e8e8e8" text-anchor="middle">GC 실행 (STW)</text>

  <rect x="210" y="340" width="210" height="48" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="315" y="370" font-size="14" fill="#e8e8e8" text-anchor="middle">회수 후 여유 확보?</text>

  <rect x="210" y="408" width="210" height="48" rx="8" fill="#2a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="315" y="438" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">OutOfMemoryError</text>

  <!-- success boxes -->
  <rect x="560" y="160" width="210" height="48" rx="8" fill="#14241a" stroke="#55c555" stroke-width="1.5"/>
  <text x="665" y="190" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">할당 성공</text>

  <rect x="560" y="340" width="210" height="48" rx="8" fill="#14241a" stroke="#55c555" stroke-width="1.5"/>
  <text x="665" y="370" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">할당 성공</text>

  <!-- down arrows -->
  <line x1="315" y1="118" x2="315" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#oomArr)"/>
  <line x1="315" y1="208" x2="315" y2="248" stroke="#7ec8e3" stroke-width="2" marker-end="url(#oomArr)"/>
  <text x="333" y="234" font-size="12" fill="#888">아니오</text>
  <line x1="315" y1="298" x2="315" y2="338" stroke="#7ec8e3" stroke-width="2" marker-end="url(#oomArr)"/>
  <line x1="315" y1="388" x2="315" y2="406" stroke="#7ec8e3" stroke-width="2" marker-end="url(#oomArr)"/>
  <text x="333" y="402" font-size="12" fill="#888">아니오</text>

  <!-- yes arrows -->
  <line x1="420" y1="184" x2="558" y2="184" stroke="#55c555" stroke-width="2" marker-end="url(#oomArrG)"/>
  <text x="489" y="172" font-size="12" fill="#55c555" text-anchor="middle">예</text>
  <line x1="420" y1="364" x2="558" y2="364" stroke="#55c555" stroke-width="2" marker-end="url(#oomArrG)"/>
  <text x="489" y="352" font-size="12" fill="#55c555" text-anchor="middle">예</text>
</svg>
