<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">기본 키 유형 비교</text>

  <!-- Natural Key -->
  <rect x="30" y="68" width="390" height="190" fill="#0f1320" stroke="#7ec8e3" stroke-width="2" rx="8"/>
  <text x="225" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#7ec8e3">자연 키 (Natural Key)</text>
  <text x="225" y="112" text-anchor="middle" font-size="12" fill="#888">비즈니스 속성을 PK로 직접 사용</text>

  <rect x="50" y="124" width="350" height="116" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="144" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace">-- 사업자등록번호를 PK로</text>
  <text x="70" y="162" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">CREATE TABLE companies (</text>
  <text x="70" y="180" font-size="12" fill="#7777cc" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  reg_no  CHAR(10) PRIMARY KEY,</text>
  <text x="70" y="198" font-size="12" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  name    VARCHAR(200) NOT NULL</text>
  <text x="70" y="216" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">);</text>

  <!-- Natural key pros/cons -->
  <text x="50" y="270" font-size="12" fill="#55c555">&#10003; 의미가 명확, JOIN 없이 식별 가능</text>
  <text x="50" y="286" font-size="12" fill="#55c555">&#10003; 중복 데이터 방지 내재</text>
  <text x="50" y="306" font-size="12" fill="#e05555">&#10007; 변경 불가 (번호 정정 시 CASCADE)</text>
  <text x="50" y="322" font-size="12" fill="#e05555">&#10007; 외부 시스템 규칙에 종속</text>
  <text x="50" y="338" font-size="12" fill="#e05555">&#10007; FK 컬럼이 길어짐 (10자 문자열)</text>

  <!-- Surrogate Key -->
  <rect x="460" y="68" width="390" height="190" fill="#0f1320" stroke="#55c555" stroke-width="2" rx="8"/>
  <text x="655" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#55c555">대리 키 (Surrogate Key)</text>
  <text x="655" y="112" text-anchor="middle" font-size="12" fill="#888">의미 없는 값을 자동 생성해 PK로 사용</text>

  <rect x="480" y="124" width="350" height="116" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="500" y="144" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace">-- 자동 증가 정수 PK</text>
  <text x="500" y="162" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">CREATE TABLE companies (</text>
  <text x="500" y="180" font-size="12" fill="#55c555" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  id     BIGINT IDENTITY PK,</text>
  <text x="500" y="198" font-size="12" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  reg_no CHAR(10) UNIQUE,</text>
  <text x="500" y="216" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">);</text>

  <!-- Surrogate pros/cons -->
  <text x="480" y="270" font-size="12" fill="#55c555">&#10003; 비즈니스 규칙 변경에 독립적</text>
  <text x="480" y="286" font-size="12" fill="#55c555">&#10003; 항상 작은 정수 (인덱스 효율적)</text>
  <text x="480" y="306" font-size="12" fill="#e05555">&#10007; 의미 없음 — 실수 삽입 감지 어려움</text>
  <text x="480" y="322" font-size="12" fill="#ce9178">&#9888; SEQUENCE 경쟁 (고트래픽 시)</text>

  <!-- Types of surrogate -->
  <rect x="30" y="364" width="820" height="88" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="8"/>
  <text x="440" y="384" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">대리 키 세 가지 방식</text>

  <rect x="50" y="394" width="220" height="46" fill="#0f1320" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="160" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">BIGINT IDENTITY</text>
  <text x="160" y="428" text-anchor="middle" font-size="11" fill="#888">1,2,3... 순차 정수 — 빠름</text>

  <rect x="310" y="394" width="220" height="46" fill="#0f1320" stroke="#7777cc" stroke-width="1" rx="4"/>
  <text x="420" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">UUID (128-bit)</text>
  <text x="420" y="428" text-anchor="middle" font-size="11" fill="#888">전역 고유 — 분산 환경 적합</text>

  <rect x="570" y="394" width="240" height="46" fill="#0f1320" stroke="#ce9178" stroke-width="1" rx="4"/>
  <text x="690" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="#ce9178">ULID / Snowflake ID</text>
  <text x="690" y="428" text-anchor="middle" font-size="11" fill="#888">시간 정렬 가능 UUID 변형</text>
</svg>
