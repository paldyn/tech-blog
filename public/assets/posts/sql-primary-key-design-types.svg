<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">기본 키 전략 비교</text>

  <!-- Natural Key -->
  <rect x="60" y="66" width="370" height="160" rx="10" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">자연 키 (Natural Key)</text>
  <text x="245" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">비즈니스 의미를 가진 속성을 PK로</text>

  <rect x="80" y="130" width="330" height="28" rx="4" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">주민등록번호를 users PK로</text>

  <rect x="80" y="164" width="330" height="28" rx="4" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">이메일을 users PK로</text>

  <text x="245" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">위험: 변경 가능, 개인정보, FK 연쇄 업데이트</text>

  <!-- Surrogate Key -->
  <rect x="450" y="66" width="370" height="160" rx="10" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">대리 키 (Surrogate Key)</text>
  <text x="635" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">비즈니스와 무관한 기술적 식별자</text>

  <rect x="470" y="130" width="330" height="28" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">BIGINT 자동 증가 (IDENTITY / AUTO_INCREMENT)</text>

  <rect x="470" y="164" width="330" height="28" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">UUID v4 / UUIDv7 / ULID</text>

  <text x="635" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">안전: 불변, 비즈니스 독립, FK 단순</text>

  <!-- Comparison table -->
  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">대리 키 옵션 비교</text>

  <rect x="60" y="274" width="760" height="32" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">전략</text>
  <text x="340" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">크기</text>
  <text x="540" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">정렬 가능</text>
  <text x="720" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">분산 시스템</text>

  <rect x="60" y="306" width="760" height="28" fill="#0f1a0f" stroke="#2a3a2a" stroke-width="1"/>
  <text x="160" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">BIGINT IDENTITY</text>
  <text x="340" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">8 bytes</text>
  <text x="540" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">O (삽입 순)</text>
  <text x="720" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">충돌 가능</text>

  <rect x="60" y="334" width="760" height="28" fill="#111827" stroke="#2a3a2a" stroke-width="1"/>
  <text x="160" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">UUID v4</text>
  <text x="340" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">16 bytes</text>
  <text x="540" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">X (랜덤)</text>
  <text x="720" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">전역 충돌 없음</text>

  <rect x="60" y="362" width="760" height="28" fill="#0f1a0f" stroke="#2a3a2a" stroke-width="1"/>
  <text x="160" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">UUID v7 / ULID</text>
  <text x="340" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">16 bytes</text>
  <text x="540" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">O (시간 순)</text>
  <text x="720" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">전역 충돌 없음</text>

  <!-- Recommendation -->
  <rect x="60" y="410" width="760" height="52" rx="8" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">권장: 단일 서비스 → BIGINT IDENTITY / 분산 · 마이크로서비스 → UUIDv7 또는 ULID</text>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">UUIDv7은 시간 순서 보장으로 B-Tree 인덱스 단편화 최소화</text>
</svg>
