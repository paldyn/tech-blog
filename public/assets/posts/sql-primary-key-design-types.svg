<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460" style="background:#0a0a0a;border-radius:12px">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">대리 키 타입 비교 — SERIAL · UUID · ULID</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">각 타입의 장단점과 선택 기준</text>

  <!-- SERIAL/BIGSERIAL -->
  <rect x="60" y="96" width="230" height="160" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="175" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">SERIAL / BIGSERIAL</text>
  <text x="175" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">1, 2, 3, 4, ...</text>
  <line x1="80" y1="148" x2="270" y2="148" stroke="#1e2433"/>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 작고 빠름 (8바이트)</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 인덱스 효율 최고</text>
  <text x="80" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">− 순서 노출</text>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">− 분산 환경 충돌</text>
  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">→ 단일 DB 내부용</text>

  <!-- UUID v4 -->
  <rect x="325" y="96" width="230" height="160" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">UUID v4</text>
  <text x="440" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">550e8400-e29b-41d4</text>
  <line x1="345" y1="148" x2="535" y2="148" stroke="#1e2433"/>
  <text x="345" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 전역 유일성</text>
  <text x="345" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 분산 환경 안전</text>
  <text x="345" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">− 16바이트, 랜덤 순서</text>
  <text x="345" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">− 인덱스 단편화</text>
  <text x="345" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">→ MSA/분산 DB</text>

  <!-- ULID / UUID v7 -->
  <rect x="590" y="96" width="230" height="160" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="705" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">ULID / UUID v7</text>
  <text x="705" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">01ARZ3NDEKTSV4RRFFQ</text>
  <line x1="610" y1="148" x2="800" y2="148" stroke="#1e2433"/>
  <text x="610" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 시간 순서 정렬</text>
  <text x="610" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 전역 유일성</text>
  <text x="610" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">− DBMS 기본 미지원</text>
  <text x="610" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 인덱스 효율 양호</text>
  <text x="610" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">→ 분산+정렬 필요 시</text>

  <!-- Code block: PK syntax -->
  <rect x="60" y="280" width="760" height="140" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- PostgreSQL: GENERATED ALWAYS AS IDENTITY (권장)</text>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    id </text>
  <text x="118" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY</text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- MySQL: AUTO_INCREMENT</text>
  <text x="80" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    id </text>
  <text x="118" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY</text>
  <text x="80" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- UUID (PostgreSQL)</text>
  <text x="80" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    id </text>
  <text x="118" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">UUID DEFAULT gen_random_uuid() PRIMARY KEY</text>

  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
