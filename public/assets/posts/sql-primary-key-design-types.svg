<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">기본 키 설계 — 자연 키 vs 대리 키</text>

  <!-- Natural Key -->
  <rect x="60" y="66" width="360" height="260" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="60" y="66" width="360" height="28" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">자연 키 (Natural Key)</text>
  <text x="240" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비즈니스 도메인에서 유일한 값</text>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예시:</text>
  <text x="80" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">주민등록번호, 사업자번호</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">ISBN, 이메일 주소, 도메인</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">국가코드(KR, US), 화폐코드(KRW)</text>

  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">장점:</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">의미 있는 값 — 별도 조인 불필요</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">외부 시스템과 동기화 쉬움</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">단점:</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">변경 가능 (이메일 변경 시 FK 연쇄 변경)</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">길이가 길어 인덱스 비용 증가</text>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">개인정보(주민번호) 노출 위험</text>

  <!-- Surrogate Key -->
  <rect x="460" y="66" width="360" height="260" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <rect x="460" y="66" width="360" height="28" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">대리 키 (Surrogate Key)</text>
  <text x="640" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">시스템이 자동 생성하는 식별자</text>
  <text x="480" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예시:</text>
  <text x="480" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">자동 증가 정수 (SERIAL, IDENTITY)</text>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">UUID / ULID / Snowflake ID</text>

  <text x="480" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">장점:</text>
  <text x="480" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">불변 — 비즈니스 변화 영향 없음</text>
  <text x="480" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">짧고 빠름 (INTEGER 4바이트)</text>
  <text x="480" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">단점:</text>
  <text x="480" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">의미 없음 — 비즈니스 속성과 분리</text>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">추가 UNIQUE 제약 필요한 경우 많음</text>
  <text x="480" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">순차 정수: 예측 가능 → URL 노출 주의</text>

  <!-- Recommendation -->
  <rect x="60" y="348" width="760" height="96" rx="8" fill="#1a2e1a" stroke="#3a5e3a" stroke-width="1"/>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">실전 권장: 대리 키 + UNIQUE 조합</text>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대리 키(INT/BIGINT)를 PK로, 비즈니스 식별자(이메일, 코드)는 UNIQUE 제약으로 보호</text>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">코드 테이블(국가코드, 화폐코드)처럼 변경 없고 짧은 자연 키는 PK로 써도 무방</text>
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">API 노출 ID: 정수 PK 내부, UUID는 외부 노출용으로 분리하는 패턴도 유효</text>
</svg>
