<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker 개발 환경 구성 요소</text>

  <!-- Host machine -->
  <rect x="60" y="68" width="760" height="320" rx="10" fill="#0d0d14" stroke="#444" stroke-width="1.5"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#555" text-anchor="middle">Host Machine</text>

  <!-- Source code (host) -->
  <rect x="80" y="106" width="200" height="64" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">소스 코드</text>
  <text x="180" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">./src (호스트)</text>

  <!-- Arrow: bind mount -->
  <line x1="280" y1="138" x2="354" y2="138" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="317" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">bind mount</text>

  <!-- Dev container -->
  <rect x="358" y="106" width="382" height="260" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="549" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">개발 컨테이너</text>

  <!-- Inside dev container -->
  <rect x="374" y="144" width="350" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="549" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">개발 서버 (hot reload)</text>
  <text x="549" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">소스 변경 → 즉시 반영</text>

  <rect x="374" y="206" width="350" height="52" rx="6" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="549" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">런타임 (Node / Python / Go 등)</text>
  <text x="549" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">호스트와 버전 독립</text>

  <rect x="374" y="268" width="350" height="52" rx="6" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="549" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">개발 도구 (linter, formatter, debugger)</text>
  <text x="549" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">컨테이너 안에만 설치</text>

  <rect x="374" y="330" width="350" height="26" rx="6" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="549" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ce9178" text-anchor="middle">포트 노출: 3000, 5000, 8080 ...</text>

  <!-- DB services -->
  <rect x="80" y="200" width="200" height="140" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">부속 서비스</text>
  <text x="180" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">PostgreSQL</text>
  <text x="180" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Redis</text>
  <text x="180" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Kafka / RabbitMQ</text>
  <text x="180" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">LocalStack (AWS 모의)</text>
  <text x="180" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Elasticsearch</text>

  <!-- Network connecting db and app -->
  <line x1="280" y1="270" x2="354" y2="270" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="317" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">내부 네트워크</text>
</svg>
