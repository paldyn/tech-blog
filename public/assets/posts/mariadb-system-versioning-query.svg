<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">시간 여행 쿼리 — FOR SYSTEM_TIME</text>

  <!-- Time axis -->
  <text x="60" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">시간 축 →</text>
  <line x1="60" y1="96" x2="820" y2="96" stroke="#3a4a6e" stroke-width="2"/>
  <!-- Time markers -->
  <line x1="150" y1="90" x2="150" y2="102" stroke="#888" stroke-width="1.5"/>
  <text x="150" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">2024-01-01</text>
  <line x1="350" y1="90" x2="350" y2="102" stroke="#888" stroke-width="1.5"/>
  <text x="350" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">2025-06-01</text>
  <line x1="560" y1="90" x2="560" y2="102" stroke="#888" stroke-width="1.5"/>
  <text x="560" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">2026-01-10</text>
  <line x1="780" y1="90" x2="780" y2="102" stroke="#55c555" stroke-width="2"/>
  <text x="780" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">NOW</text>

  <!-- Row versions -->
  <text x="60" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Alice 급여 이력</text>
  <!-- v1: 60,000 -->
  <rect x="150" y="162" width="196" height="38" rx="6" fill="#1a1a0a" stroke="#e0a040" stroke-width="1.5"/>
  <text x="248" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a040" text-anchor="middle">salary=60,000</text>
  <text x="248" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">2024-01-01 ~ 2025-06-01</text>
  <!-- v2: 75,000 -->
  <rect x="350" y="162" width="206" height="38" rx="6" fill="#1a1a0a" stroke="#e0a040" stroke-width="1.5"/>
  <text x="453" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a040" text-anchor="middle">salary=75,000</text>
  <text x="453" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">2025-06-01 ~ 2026-01-10</text>
  <!-- v3: 85,000 -->
  <rect x="560" y="162" width="218" height="38" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="669" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">salary=85,000</text>
  <text x="669" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">2026-01-10 ~ MAXVALUE (현재)</text>

  <!-- Query examples -->
  <text x="60" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">시간 여행 쿼리 유형</text>

  <!-- AS OF -->
  <rect x="60" y="250" width="370" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 특정 시점 데이터 조회</text>
  <text xml:space="preserve" x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> employees</tspan></text>
  <text xml:space="preserve" x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">FOR SYSTEM_TIME AS OF</tspan></text>
  <text xml:space="preserve" x="80" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ce9178">'2025-09-01 12:00:00'</tspan><tspan fill="#ffffff">;</tspan></text>

  <!-- BETWEEN -->
  <rect x="450" y="250" width="370" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="470" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 기간 내 모든 버전 조회</text>
  <text xml:space="preserve" x="470" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> employees</tspan></text>
  <text xml:space="preserve" x="470" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">FOR SYSTEM_TIME BETWEEN</tspan></text>
  <text xml:space="preserve" x="470" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ce9178">'2024-01-01'</tspan><tspan fill="#7ec8e3" font-weight="600"> AND </tspan><tspan fill="#ce9178">'2026-01-01'</tspan><tspan fill="#ffffff">;</tspan></text>

  <!-- ALL + DELETE history -->
  <rect x="60" y="350" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 현재 + 이력 전체 조회</text>
  <text xml:space="preserve" x="80" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> *, row_start, row_end </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> employees </tspan><tspan fill="#7ec8e3" font-weight="600">FOR SYSTEM_TIME ALL</tspan><tspan fill="#ffffff">;</tspan></text>
  <text xml:space="preserve" x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 오래된 이력 정리 (6개월 이전)</text>
  <text xml:space="preserve" x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">DELETE HISTORY FROM</tspan><tspan fill="#ffffff"> employees</tspan></text>
  <text xml:space="preserve" x="80" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">  BEFORE SYSTEM_TIME</tspan><tspan fill="#ffffff"> (NOW() - </tspan><tspan fill="#7ec8e3" font-weight="600">INTERVAL</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">6</tspan><tspan fill="#ffffff"> MONTH);</tspan></text>
</svg>
