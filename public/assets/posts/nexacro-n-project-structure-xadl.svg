<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111318"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="880" height="540" rx="12" fill="url(#bg2)"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="880" height="56" rx="12" fill="#13151c"/>
  <rect x="0" y="44" width="880" height="12" fill="#13151c"/>
  <text x="440" y="34" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Application.xadl — 프로젝트 진입점 구조</text>

  <!-- Left code block: Application.xadl -->
  <rect x="50" y="76" width="370" height="414" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="235" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Application.xadl</text>
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <text x="70" y="126" fill="#6a8aa0">&lt;!-- 앱 루트 설정 --&gt;</text>
    <text x="70" y="144" fill="#7ec8e3">&lt;Application</text>
    <text x="70" y="162" fill="#e8e8e8">  id=<tspan fill="#ce9178">"MyApplication"</tspan></text>
    <text x="70" y="180" fill="#e8e8e8">  startupform=<tspan fill="#ce9178">"Forms::Main"</tspan></text>
    <text x="70" y="198" fill="#e8e8e8">  enableskin=<tspan fill="#ce9178">"true"</tspan></text>
    <text x="70" y="216" fill="#7ec8e3">&gt;</text>
    <text x="70" y="234" fill="#6a8aa0">  &lt;!-- 전역 Dataset --&gt;</text>
    <text x="70" y="252" fill="#7ec8e3">  &lt;Dataset</text>
    <text x="70" y="270" fill="#e8e8e8">    id=<tspan fill="#ce9178">"ds_userInfo"</tspan></text>
    <text x="70" y="288" fill="#7ec8e3">  &gt;</text>
    <text x="70" y="306" fill="#7ec8e3">    &lt;ColumnInfo&gt;</text>
    <text x="70" y="324" fill="#e8e8e8">      &lt;Column id=<tspan fill="#ce9178">"userNm"</tspan></text>
    <text x="70" y="342" fill="#e8e8e8">        type=<tspan fill="#ce9178">"STRING"</tspan>/&gt;</text>
    <text x="70" y="360" fill="#7ec8e3">    &lt;/ColumnInfo&gt;</text>
    <text x="70" y="378" fill="#7ec8e3">  &lt;/Dataset&gt;</text>
    <text x="70" y="396" fill="#7ec8e3">&lt;/Application&gt;</text>
  </g>

  <!-- Right panel: explanation boxes -->
  <rect x="460" y="76" width="370" height="414" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="645" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">주요 속성 해설</text>

  <!-- id -->
  <rect x="480" y="114" width="330" height="66" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
  <text x="496" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#7ec8e3" font-size="13">id</text>
  <text x="496" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">애플리케이션 식별자. script에서</text>
  <text x="496" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">nexacro.getApplication()로 접근 가능</text>

  <!-- startupform -->
  <rect x="480" y="190" width="330" height="66" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
  <text x="496" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#7ec8e3" font-size="13">startupform</text>
  <text x="496" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">앱 기동 시 가장 먼저 열리는 Form.</text>
  <text x="496" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">폴더::FormID 형식으로 지정</text>

  <!-- enableskin -->
  <rect x="480" y="266" width="330" height="66" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
  <text x="496" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#7ec8e3" font-size="13">enableskin</text>
  <text x="496" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">테마/스킨 적용 여부. true 시</text>
  <text x="496" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">StyleSheet 파일로 전역 스타일 제어</text>

  <!-- global Dataset -->
  <rect x="480" y="342" width="330" height="66" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
  <text x="496" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#55c555" font-size="13">전역 Dataset</text>
  <text x="496" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">어느 Form에서도 this.getOwnerFrame()</text>
  <text x="496" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">.getDataset()로 접근 가능</text>

  <!-- tip box -->
  <rect x="480" y="420" width="330" height="56" rx="6" fill="#0d1a10" stroke="#1a3d20" stroke-width="1"/>
  <text x="496" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#55c555" font-size="12">💡 Tip</text>
  <text x="496" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#9ecfa2" font-size="11">xadl 파일은 XML이므로 Studio N 속성창에서</text>
  <text x="496" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#9ecfa2" font-size="11">직접 편집하거나 텍스트 에디터로도 수정 가능</text>

  <!-- Footer -->
  <text x="440" y="518" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
