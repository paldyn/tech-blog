<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="arr-blue8" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red8" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SIEM 파이프라인: 로그에서 대응까지</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">흩어진 로그를 모아 정규화하고, 상관분석으로 공격 신호를 추출한다</text>

  <!-- sources column -->
  <rect x="40" y="110" width="170" height="40" rx="6" fill="#151515" stroke="#666" stroke-width="1.2"/>
  <text x="125" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ccc" text-anchor="middle">앱 · 액세스 로그</text>
  <rect x="40" y="160" width="170" height="40" rx="6" fill="#151515" stroke="#666" stroke-width="1.2"/>
  <text x="125" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ccc" text-anchor="middle">WAF · 방화벽</text>
  <rect x="40" y="210" width="170" height="40" rx="6" fill="#151515" stroke="#666" stroke-width="1.2"/>
  <text x="125" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ccc" text-anchor="middle">인증 · IAM 이벤트</text>
  <rect x="40" y="260" width="170" height="40" rx="6" fill="#151515" stroke="#666" stroke-width="1.2"/>
  <text x="125" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ccc" text-anchor="middle">OS · 컨테이너 · 클라우드</text>

  <!-- collect/normalize -->
  <rect x="270" y="140" width="180" height="130" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="360" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">수집 · 정규화</text>
  <text x="360" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">공통 스키마로 변환</text>
  <text x="360" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">타임스탬프 정렬</text>
  <text x="360" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">컨텍스트 보강(enrich)</text>
  <text x="360" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">위협 인텔 IP 태깅</text>

  <!-- correlate -->
  <rect x="510" y="140" width="180" height="130" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="600" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">상관분석 · 탐지</text>
  <text x="600" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">탐지 룰 (시그니처)</text>
  <text x="600" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">임계치 · 빈도 분석</text>
  <text x="600" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">행위 기반 이상탐지</text>
  <text x="600" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">UEBA · 머신러닝</text>

  <!-- alert/respond -->
  <rect x="730" y="140" width="120" height="130" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="790" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">알림 · 대응</text>
  <text x="790" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">알림 발송</text>
  <text x="790" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">SOAR 자동화</text>
  <text x="790" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">대시보드</text>
  <text x="790" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">SOC · 온콜</text>

  <!-- arrows from sources to collect -->
  <line x1="210" y1="130" x2="268" y2="175" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arr-blue8)"/>
  <line x1="210" y1="180" x2="268" y2="195" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arr-blue8)"/>
  <line x1="210" y1="230" x2="268" y2="215" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arr-blue8)"/>
  <line x1="210" y1="280" x2="268" y2="235" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arr-blue8)"/>

  <line x1="450" y1="205" x2="508" y2="205" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue8)"/>
  <line x1="690" y1="205" x2="728" y2="205" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red8)"/>

  <text x="125" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">로그 소스</text>

  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">한 소스만 보면 정상인 이벤트도, 합쳐 보면 공격 시퀀스가 드러난다</text>
</svg>
