<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">범위 타입 연산자 시각화</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">@>, &lt;@, &amp;&amp;, -, * 연산자와 경계 포함/제외</text>

  <!-- Timeline base -->
  <line x1="60" y1="130" x2="820" y2="130" stroke="#333" stroke-width="1"/>
  <text x="60" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">1</text>
  <text x="160" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">3</text>
  <text x="260" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">5</text>
  <text x="360" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">7</text>
  <text x="460" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">9</text>
  <text x="560" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">11</text>
  <text x="660" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">13</text>
  <text x="760" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">15</text>

  <!-- Range A: [3,9) -->
  <text x="60" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">A = [3, 9)</text>
  <rect x="160" y="168" width="300" height="24" rx="4" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="160" cy="180" r="5" fill="#7ec8e3"/>
  <circle cx="460" cy="180" r="5" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="310" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">포함: 3 ≤ x &lt; 9</text>

  <!-- Range B: [5,13) -->
  <text x="60" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c880e0" font-weight="600">B = [5, 13)</text>
  <rect x="260" y="234" width="400" height="24" rx="4" fill="#2a1a3a" stroke="#c880e0" stroke-width="1.5"/>
  <circle cx="260" cy="246" r="5" fill="#c880e0"/>
  <circle cx="660" cy="246" r="5" fill="#0a0a0a" stroke="#c880e0" stroke-width="2"/>
  <text x="460" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#c880e0" text-anchor="middle">포함: 5 ≤ x &lt; 13</text>

  <!-- Operations -->
  <!-- &amp;&amp; overlap -->
  <text x="60" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">A &amp;&amp; B  (겹침)</text>
  <rect x="260" y="304" width="200" height="18" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="360" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">[5, 9)  → true</text>

  <!-- @> contains point -->
  <text x="60" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c84a" font-weight="600">A @&gt; 6  (점 포함)</text>
  <circle cx="360" cy="354" r="7" fill="#e8c84a"/>
  <text x="380" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c84a">6 ∈ [3,9) → true</text>

  <text x="460" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">A @&gt; 9  (경계)</text>
  <circle cx="460" cy="354" r="7" fill="#0a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="480" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">9 ∉ [3,9) → false</text>

  <!-- Union -->
  <text x="60" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">A * B  (교집합)</text>
  <rect x="260" y="398" width="200" height="18" rx="3" fill="#1a2a3a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="360" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">[5, 9)</text>

  <text x="460" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">A + B  (합집합)</text>
  <rect x="160" y="398" width="500" height="18" rx="3" fill="#1a2020" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="500" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">[3, 13)</text>

  <!-- Note -->
  <rect x="60" y="432" width="760" height="46" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">경계 기호: [ ] 포함(닫힘), ( ) 제외(열림)</text>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">[3,9) = 3 이상 9 미만 | (3,9] = 3 초과 9 이하 | empty = 빈 범위</text>
</svg>
