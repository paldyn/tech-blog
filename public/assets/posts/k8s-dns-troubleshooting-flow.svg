<svg xmlns="http://www.w3.org/2000/svg" width="880" height="370" viewBox="0 0 880 370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrDN" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="370" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">클러스터 DNS 질의 흐름</text>
  <text x="50" y="80" font-size="14" fill="#888">Pod는 resolv.conf의 CoreDNS로 묻고, CoreDNS는 서비스 레코드나 외부로 나눠 응답한다</text>

  <rect x="50" y="120" width="220" height="100" rx="10" fill="#16181d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="150" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">앱 Pod</text>
  <text x="160" y="174" font-size="12" fill="#9aa4b8" text-anchor="middle">/etc/resolv.conf</text>
  <text x="160" y="196" font-size="12" fill="#9aa4b8" text-anchor="middle">nameserver = kube-dns</text>

  <rect x="350" y="120" width="220" height="100" rx="10" fill="#16181d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="460" y="150" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">CoreDNS</text>
  <text x="460" y="174" font-size="12" fill="#9aa4b8" text-anchor="middle">kube-system 네임스페이스</text>
  <text x="460" y="196" font-size="12" fill="#9aa4b8" text-anchor="middle">kube-dns Service 뒤</text>

  <rect x="650" y="95" width="180" height="55" rx="8" fill="#16181d" stroke="#55c555" stroke-width="1.3"/>
  <text x="740" y="128" font-size="13" fill="#ffffff" text-anchor="middle">.svc.cluster.local → ClusterIP</text>

  <rect x="650" y="190" width="180" height="55" rx="8" fill="#16181d" stroke="#55c555" stroke-width="1.3"/>
  <text x="740" y="223" font-size="13" fill="#ffffff" text-anchor="middle">외부 도메인 → 업스트림 forward</text>

  <line x1="270" y1="170" x2="348" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrDN)"/>
  <line x1="570" y1="155" x2="648" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrDN)"/>
  <line x1="570" y1="185" x2="648" y2="215" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrDN)"/>

  <rect x="50" y="270" width="780" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.3"/>
  <text x="66" y="296" xml:space="preserve" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># FQDN 규칙: &lt;service&gt;.&lt;namespace&gt;.svc.cluster.local</text>
  <text x="66" y="320" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">api.default.svc.cluster.local  →  같은 NS면 그냥 api 로도 해석</text>
</svg>
