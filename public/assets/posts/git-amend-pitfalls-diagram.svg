<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arrpit" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrpit2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">공유 브랜치 amend가 위험한 이유</text>

  <!-- You amend -->
  <text x="220" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">내 로컬 (amend 후)</text>
  <rect x="60" y="96" width="100" height="50" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="110" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">commit A</text>
  <text x="110" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">abc1234</text>

  <line x1="160" y1="121" x2="178" y2="121" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrpit)"/>

  <rect x="180" y="96" width="120" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">commit B'</text>
  <text x="240" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555" text-anchor="middle">ghi9012 (new)</text>

  <!-- Teammate -->
  <text x="640" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">팀원 로컬 (이전 버전 기반)</text>
  <rect x="480" y="96" width="100" height="50" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="530" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">commit A</text>
  <text x="530" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">abc1234</text>

  <line x1="580" y1="121" x2="598" y2="121" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrpit)"/>

  <rect x="600" y="96" width="120" height="50" rx="6" fill="#1a1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="660" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle">commit B (old)</text>
  <text x="660" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555" text-anchor="middle">def5678 ← 충돌!</text>

  <line x1="720" y1="121" x2="738" y2="121" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrpit)"/>

  <rect x="740" y="96" width="100" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">commit C</text>
  <text x="790" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">팀원 작업</text>

  <!-- Force push warning -->
  <rect x="60" y="175" width="760" height="80" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">force push로 팀원 커밋이 사라질 수 있음</text>
  <text x="440" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">내 로컬(A→B')을 force push하면 팀원의 커밋 C가 원격에서 사라짐</text>
  <text x="440" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">--force-with-lease는 이 경우를 감지해 거부함</text>

  <!-- Recovery -->
  <rect x="60" y="275" width="760" height="155" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="297" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># amend 실수 복구 — reflog 활용</text>
  <text x="76" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git reflog</text>
  <text x="76" y="337" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ghi9012 HEAD@{0}: commit (amend): feat: add login</text>
  <text x="76" y="357" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># def5678 HEAD@{1}: commit: feat: add loginn  ← 원본!</text>
  <text x="76" y="377" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git reset --hard HEAD@{1}</text>
  <text x="76" y="397" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># amend 이전 상태로 복구</text>
  <text x="76" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># reflog는 30일간 보존 (gc.reflogExpire 설정 기준)</text>
</svg>
