<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <!-- Background -->
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">소스 코드 → 바이트코드 변환</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">javac가 생성한 .class 파일은 어떤 JVM도 이해할 수 있는 공통 명령어셋</text>

  <!-- Left label -->
  <text x="225" y="100"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">HelloWorld.java</text>

  <!-- Left code block -->
  <rect x="60" y="110" width="330" height="190" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- Line 1: class HelloWorld { -->
  <text x="76" y="137" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">class</text>
  <text x="118" y="137" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8"> HelloWorld {</text>
  <!-- Line 2: public static void -->
  <text x="76" y="155" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">  public static void</text>
  <!-- Line 3: main(String[] args) { -->
  <text x="76" y="173" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">  main(</text>
  <text x="136" y="173" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">String</text>
  <text x="178" y="173" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">[] args) {</text>
  <!-- Line 4: System.out.println( -->
  <text x="76" y="191" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">    System.out.println(</text>
  <!-- Line 5: "Hello, World!"); -->
  <text x="76" y="209" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">        "Hello, World!");</text>
  <!-- Line 6: } -->
  <text x="76" y="227" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">  }</text>
  <!-- Line 7: } -->
  <text x="76" y="245" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">}</text>

  <!-- Center: javac arrow -->
  <text x="440" y="194"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">javac</text>
  <!-- Horizontal arrow shaft -->
  <line x1="400" y1="207" x2="472" y2="207" stroke="#55c555" stroke-width="2"/>
  <!-- Right-pointing arrowhead -->
  <polygon points="472,199 472,215 484,207" fill="#55c555"/>

  <!-- Right label -->
  <text x="655" y="100"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">바이트코드 (javap -c 출력)</text>

  <!-- Right code block -->
  <rect x="490" y="110" width="330" height="190" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- Line 1: // main(String[]) -->
  <text x="506" y="137" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">// main(String[])</text>
  <!-- Line 2:  0: getstatic #7 -->
  <text x="506" y="155" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8"> 0: </text>
  <text x="538" y="155" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">getstatic</text>
  <text x="608" y="155" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">   #7</text>
  <!-- Line 3: //   System.out -->
  <text x="506" y="173" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">    // System.out</text>
  <!-- Line 4:  3: ldc #13 -->
  <text x="506" y="191" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8"> 3: </text>
  <text x="538" y="191" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">ldc</text>
  <text x="570" y="191" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">          #13</text>
  <!-- Line 5: //   "Hello, World!" -->
  <text x="506" y="209" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">    // "Hello, World!"</text>
  <!-- Line 6:  5: invokevirtual #15 -->
  <text x="506" y="227" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8"> 5: </text>
  <text x="538" y="227" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">invokevirtual</text>
  <text x="650" y="227" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8"> #15</text>
  <!-- Line 7:  8: return -->
  <text x="506" y="245" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8"> 8: </text>
  <text x="538" y="245" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">return</text>

  <!-- Note bar -->
  <rect x="60" y="318" width="760" height="52" fill="#0f1a0f" rx="6" stroke="#1a3a1a" stroke-width="1"/>
  <text x="440" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">바이트코드는 CPU 아키텍처와 무관</text>
  <text x="440" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">Windows · Linux · macOS · ARM · RISC-V — 어느 JVM이든 동일하게 실행</text>

  <!-- Footer -->
  <text x="440" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">PALDYN · Java 완전 정복</text>
</svg>
