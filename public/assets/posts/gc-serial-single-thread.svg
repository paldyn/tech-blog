<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Serial GC — 단일 스레드로 직렬 수행</text>

  <!-- STW band -->
  <rect x="370" y="92" width="180" height="186" fill="#e05555" fill-opacity="0.12" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="460" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">STW pause</text>

  <!-- App thread bars -->
  <text x="140" y="124" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">App T1</text>
  <rect x="150" y="110" width="220" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="550" y="110" width="250" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>

  <text x="140" y="164" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">App T2</text>
  <rect x="150" y="150" width="220" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="550" y="150" width="250" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>

  <text x="140" y="204" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">App T3</text>
  <rect x="150" y="190" width="220" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="550" y="190" width="250" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>

  <!-- Single GC thread bar — fills entire STW span -->
  <text x="140" y="254" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">GC (1 thread)</text>
  <rect x="370" y="240" width="180" height="18" rx="4" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="460" y="253" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">mark → copy/compact</text>

  <!-- Phase labels -->
  <text x="260" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">애플리케이션 실행</text>
  <text x="460" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">전 스레드 정지, GC 스레드 1개가 직렬 작업</text>
  <text x="675" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">재개</text>

  <!-- Contrast: Serial vs Parallel GC lanes -->
  <rect x="60" y="334" width="360" height="130" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">Serial GC — GC 레인 1개</text>
  <rect x="84" y="378" width="312" height="16" rx="3" fill="#3a1414" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">코어가 여러 개여도 GC는 한 스레드만 사용</text>
  <text x="240" y="436" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스레드 동기화·조율 비용이 없어 단순·가볍다</text>

  <rect x="460" y="334" width="360" height="130" rx="8" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Parallel GC — GC 레인 여러 개</text>
  <rect x="484" y="372" width="312" height="11" rx="3" fill="#10303a" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="484" y="387" width="312" height="11" rx="3" fill="#10303a" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="484" y="402" width="312" height="11" rx="3" fill="#10303a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="436" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">여러 스레드로 STW를 짧게 — 다음 글 주제</text>
</svg>
