<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring Data JPA Auditing 아키텍처</text>
  <text x="440" y="65"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">엔티티 생성·수정 시각과 작성자를 자동으로 기록하는 구조</text>

  <!-- 설정 레이어 label -->
  <text x="74" y="94"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">설정 레이어</text>

  <!-- @EnableJpaAuditing box (left) -->
  <rect x="60" y="102" width="350" height="66" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="124"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Configuration</text>
  <text x="235" y="146"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">@EnableJpaAuditing</text>
  <text x="235" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">auditorAwareRef = "auditorProvider"</text>

  <!-- dashed connection between the two top boxes -->
  <line x1="412" y1="135" x2="468" y2="135" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- AuditorAware box (right) -->
  <rect x="470" y="102" width="350" height="66" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="124"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Bean / @Component</text>
  <text x="645" y="146"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">AuditorAware&lt;String&gt;</text>
  <text x="645" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">getCurrentAuditor() → 로그인 사용자명 반환</text>

  <!-- Arrows down from left and right boxes -->
  <line x1="235" y1="168" x2="235" y2="194" stroke="#444" stroke-width="2"/>
  <polygon points="235,200 229,188 241,188" fill="#444"/>

  <line x1="645" y1="168" x2="645" y2="194" stroke="#444" stroke-width="2"/>
  <polygon points="645,200 639,188 651,188" fill="#444"/>

  <!-- 엔티티 레이어 label -->
  <text x="74" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">엔티티 레이어</text>

  <!-- BaseEntity box (left) -->
  <rect x="60" y="228" width="350" height="158" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="235" y="252"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@MappedSuperclass</text>
  <text x="235" y="274"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">BaseEntity</text>
  <text x="235" y="292"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">@EntityListeners(AuditingEntityListener.class)</text>

  <!-- divider inside BaseEntity box -->
  <line x1="76" y1="300" x2="394" y2="300" stroke="#1e2433" stroke-width="1"/>

  <!-- 4 audit fields inside BaseEntity -->
  <text x="88" y="317"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">@CreatedDate</text>
  <text x="238" y="317"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">LocalDateTime createdAt</text>

  <text x="88" y="337"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">@LastModifiedDate</text>
  <text x="276" y="337"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">updatedAt</text>

  <text x="88" y="357"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">@CreatedBy</text>
  <text x="238" y="357"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">String createdBy</text>

  <text x="88" y="377"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">@LastModifiedBy</text>
  <text x="276" y="377"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">updatedBy</text>

  <!-- extends arrow: BaseEntity → Child Entity (horizontal) -->
  <line x1="412" y1="262" x2="468" y2="262" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="474,262 464,257 464,267" fill="#7777cc"/>
  <text x="440" y="254"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">extends</text>

  <!-- Child Entity box (right top) -->
  <rect x="470" y="228" width="350" height="68" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="645" y="252"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Entity (비즈니스 엔티티)</text>
  <text x="645" y="274"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">User / Post / Order …</text>
  <text x="645" y="290"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비즈니스 필드만 추가, Audit 필드 자동 상속</text>

  <!-- Arrow down: Child Entity → JPA Events -->
  <line x1="645" y1="296" x2="645" y2="320" stroke="#444" stroke-width="2"/>
  <polygon points="645,326 639,314 651,314" fill="#444"/>

  <!-- JPA Events box (right bottom) -->
  <rect x="470" y="326" width="350" height="72" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <text x="645" y="348"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">JPA 이벤트 자동 처리</text>
  <text x="488" y="368"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">@PrePersist  →  createdAt / createdBy 설정</text>
  <text x="488" y="388"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">@PreUpdate   →  updatedAt / updatedBy 갱신</text>
</svg>
