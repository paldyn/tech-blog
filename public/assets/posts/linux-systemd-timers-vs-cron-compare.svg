<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">systemd 타이머 vs cron</text>

  <!-- Column headers -->
  <rect x="60" y="70" width="350" height="44" rx="8" fill="#1a2340" stroke="#3a4a6e" stroke-width="1"/>
  <text x="235" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">systemd timer</text>

  <rect x="470" y="70" width="350" height="44" rx="8" fill="#1a2340" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#ce9178">cron</text>

  <!-- VS badge -->
  <circle cx="440" cy="92" r="20" fill="#2a1a3a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">VS</text>

  <!-- Row 1: 로깅 -->
  <rect x="60" y="130" width="350" height="52" rx="6" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로깅</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">journalctl 로 전체 출력 기록</text>

  <rect x="470" y="130" width="350" height="52" rx="6" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="490" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로깅</text>
  <text x="490" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">메일·리다이렉트 직접 설정 필요</text>

  <!-- Row 2: 의존성 -->
  <rect x="60" y="194" width="350" height="52" rx="6" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">의존성</text>
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">After= / Requires= 로 정밀 제어</text>

  <rect x="470" y="194" width="350" height="52" rx="6" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="490" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">의존성</text>
  <text x="490" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">없음 (순서 보장 불가)</text>

  <!-- Row 3: 실행 환경 -->
  <rect x="60" y="258" width="350" height="52" rx="6" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행 환경</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">격리된 cgroup, 리소스 제한 가능</text>

  <rect x="470" y="258" width="350" height="52" rx="6" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="490" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행 환경</text>
  <text x="490" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">단순 fork (제한 없음)</text>

  <!-- Row 4: 표현식 -->
  <rect x="60" y="322" width="350" height="52" rx="6" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스케줄 표현</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">OnCalendar= / OnBootSec= 등</text>

  <rect x="470" y="322" width="350" height="52" rx="6" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="490" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스케줄 표현</text>
  <text x="490" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">5-field cron 표현식 (친숙함)</text>

  <!-- Row 5: 복구 -->
  <rect x="60" y="386" width="350" height="52" rx="6" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">누락 실행 복구</text>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">Persistent=true 로 자동 복구</text>

  <rect x="470" y="386" width="350" height="52" rx="6" fill="#111820" stroke="#2a3a5a" stroke-width="1"/>
  <text x="490" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">누락 실행 복구</text>
  <text x="490" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">오프라인 중 실행 누락 복구 없음</text>

  <!-- Separator line -->
  <line x1="440" y1="120" x2="440" y2="448" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
