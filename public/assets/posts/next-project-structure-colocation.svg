<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">파일 콜로케이션 전략</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">관련 파일을 라우트 폴더 안에 함께 두는 패턴</text>

  <!-- Pattern A: Shared components outside -->
  <rect x="60" y="90" width="360" height="260" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">패턴 A — 공유 컴포넌트 분리</text>
  <rect x="76" y="124" width="328" height="210" rx="4" fill="#000000" stroke="#2a3a5e" stroke-width="1"/>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">src/</text>
  <text x="92" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">├── <tspan fill="#55c555">app/</tspan></text>
  <text x="92" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">│   ├── blog/page.tsx</text>
  <text x="92" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">│   └── shop/page.tsx</text>
  <text x="92" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">├── <tspan fill="#7ec8e3">components/</tspan></text>
  <text x="92" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">│   ├── Button.tsx</text>
  <text x="92" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">│   └── Header.tsx</text>
  <text x="92" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve"># 여러 라우트가 공유하는</text>
  <text x="92" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve"># 컴포넌트를 src/에 위치</text>
  <text x="92" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve"># app/ 밖에 둬도 무방</text>

  <!-- Pattern B: Colocation -->
  <rect x="460" y="90" width="360" height="260" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">패턴 B — 라우트별 콜로케이션</text>
  <rect x="476" y="124" width="328" height="210" rx="4" fill="#000000" stroke="#2a3a5e" stroke-width="1"/>
  <text x="492" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">src/app/</text>
  <text x="492" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">└── blog/</text>
  <text x="492" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    ├── page.tsx</text>
  <text x="492" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    ├── <tspan fill="#55c555">PostCard.tsx</tspan></text>
  <text x="492" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    ├── <tspan fill="#55c555">BlogHeader.tsx</tspan></text>
  <text x="492" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    └── _utils.ts</text>
  <text x="492" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve"># 해당 라우트 전용 파일을</text>
  <text x="492" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve"># 라우트 폴더에 같이 배치</text>
  <text x="492" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve"># page.tsx 제외 → URL 노출 X</text>

  <!-- Bottom note -->
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">app/ 폴더 안에 있어도 page.tsx·layout.tsx 등 특수 파일이 아니면 URL로 접근되지 않음</text>
</svg>
