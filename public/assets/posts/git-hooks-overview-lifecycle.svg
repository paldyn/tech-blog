<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Git Hook 실행 시점과 종류</text>

  <!-- Commit flow -->
  <text x="440" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">커밋 워크플로 훅</text>

  <rect x="60" y="96" width="140" height="52" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">pre-commit</text>
  <text x="130" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">lint / test</text>

  <line x1="200" y1="122" x2="232" y2="122" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="234" y="96" width="152" height="52" rx="6" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="310" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">prepare-commit-msg</text>
  <text x="310" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">메시지 템플릿 주입</text>

  <line x1="386" y1="122" x2="418" y2="122" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="420" y="96" width="152" height="52" rx="6" fill="#0f1a2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="496" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">commit-msg</text>
  <text x="496" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">메시지 형식 검증</text>

  <line x1="572" y1="122" x2="604" y2="122" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="606" y="96" width="140" height="52" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="676" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">post-commit</text>
  <text x="676" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">알림·로깅</text>

  <!-- exit 0 / exit 1 -->
  <text x="440" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pre-commit / commit-msg: exit 1 → 커밋 중단 | exit 0 → 계속</text>

  <!-- Push flow -->
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Push 워크플로 훅</text>

  <rect x="60" y="218" width="140" height="52" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">pre-push</text>
  <text x="130" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">테스트·검증</text>

  <line x1="200" y1="244" x2="254" y2="244" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="256" y="218" width="156" height="52" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="334" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">원격 전송</text>
  <text x="334" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">git push 실행</text>

  <!-- Merge flow -->
  <text x="440" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">기타 클라이언트 훅</text>

  <rect x="60" y="312" width="140" height="52" rx="6" fill="#111" stroke="#888" stroke-width="1"/>
  <text x="130" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">post-merge</text>
  <text x="130" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666">머지 후 작업</text>

  <rect x="220" y="312" width="140" height="52" rx="6" fill="#111" stroke="#888" stroke-width="1"/>
  <text x="290" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">post-checkout</text>
  <text x="290" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666">체크아웃 후 작업</text>

  <rect x="380" y="312" width="140" height="52" rx="6" fill="#111" stroke="#888" stroke-width="1"/>
  <text x="450" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">post-rewrite</text>
  <text x="450" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666">amend/rebase 후</text>

  <rect x="540" y="312" width="140" height="52" rx="6" fill="#111" stroke="#888" stroke-width="1"/>
  <text x="610" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">pre-rebase</text>
  <text x="610" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666">rebase 전 검증</text>

  <!-- Code block -->
  <rect x="60" y="384" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 훅 파일 위치</text>
  <text x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">.git/hooks/pre-commit       <tspan fill="#9aa4b8"># 단일 레포 (공유 안됨)</tspan></text>
  <text x="76" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">$(git config core.hooksPath) <tspan fill="#9aa4b8"># 전역 경로 설정 시 우선</tspan></text>
  <text x="76" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 실행 권한 부여 필수</text>
  <text x="76" y="488" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">chmod</tspan> +x .git/hooks/pre-commit</text>
</svg>
