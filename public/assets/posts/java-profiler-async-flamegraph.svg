<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">플레임그래프 읽는 법</text>

  <!-- flame graph stack -->
  <rect x="40" y="220" width="800" height="34" rx="3" fill="#3a2a1a" stroke="#e0a055" stroke-width="1"/>
  <text x="48" y="242" font-size="13" fill="#ffffff">main  (전체 100%)</text>

  <rect x="40" y="182" width="520" height="34" rx="3" fill="#3a2a1a" stroke="#e0a055" stroke-width="1"/>
  <text x="48" y="204" font-size="13" fill="#ffffff">handleRequest  (65%)</text>
  <rect x="566" y="182" width="274" height="34" rx="3" fill="#3a2a1a" stroke="#e0a055" stroke-width="1"/>
  <text x="574" y="204" font-size="13" fill="#ffffff">background  (35%)</text>

  <rect x="40" y="144" width="300" height="34" rx="3" fill="#3a2a1a" stroke="#e0a055" stroke-width="1"/>
  <text x="48" y="166" font-size="13" fill="#ffffff">parseJson  (38%)</text>
  <rect x="346" y="144" width="214" height="34" rx="3" fill="#3a2a1a" stroke="#e0a055" stroke-width="1"/>
  <text x="354" y="166" font-size="13" fill="#ffffff">query  (27%)</text>

  <rect x="40" y="106" width="300" height="34" rx="3" fill="#4a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="48" y="128" font-size="13" fill="#ffffff">decode  (38%) ← 넓은 꼭대기 = 핫스팟</text>

  <!-- annotations -->
  <text x="40" y="84" font-size="13" fill="#9aa4b8">x축 = 표본 비율(시간 점유), 호출 순서 아님 · y축 = 콜 스택 깊이 (아래가 호출자)</text>
  <text x="40" y="278" font-size="13" fill="#9aa4b8">넓고 평평한 꼭대기 프레임이 CPU를 가장 많이 쓰는 곳 — 최적화 1순위.</text>
</svg>
