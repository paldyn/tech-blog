<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ls -la 출력 해석</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">각 컬럼이 뜻하는 것</text>

  <!-- ls -la output -->
  <rect x="60" y="88" width="760" height="184" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># ls -la /etc/nginx/ 출력 예시</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">총계 40</text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e05555">drwxr-xr-x</tspan>
    <tspan fill="#888"> 4 </tspan>
    <tspan fill="#55c555">root root</tspan>
    <tspan fill="#b5cea8"> 4096</tspan>
    <tspan fill="#e8c55a"> May  8 09:00</tspan>
    <tspan fill="#7ec8e3"> .</tspan>
  </text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e05555">drwxr-xr-x</tspan>
    <tspan fill="#888"> 3 </tspan>
    <tspan fill="#55c555">root root</tspan>
    <tspan fill="#b5cea8"> 4096</tspan>
    <tspan fill="#e8c55a"> Apr 10 12:00</tspan>
    <tspan fill="#7ec8e3"> ..</tspan>
  </text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#aaa">-rw-r--r--</tspan>
    <tspan fill="#888"> 1 </tspan>
    <tspan fill="#55c555">root root</tspan>
    <tspan fill="#b5cea8"> 2479</tspan>
    <tspan fill="#e8c55a"> Mar 15 08:30</tspan>
    <tspan fill="#7ec8e3"> nginx.conf</tspan>
  </text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e05555">drwxr-xr-x</tspan>
    <tspan fill="#888"> 2 </tspan>
    <tspan fill="#55c555">root root</tspan>
    <tspan fill="#b5cea8"> 4096</tspan>
    <tspan fill="#e8c55a"> Mar 15 08:30</tspan>
    <tspan fill="#7ec8e3"> conf.d</tspan>
  </text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7777cc">lrwxrwxrwx</tspan>
    <tspan fill="#888"> 1 </tspan>
    <tspan fill="#55c555">root root</tspan>
    <tspan fill="#b5cea8">   14</tspan>
    <tspan fill="#e8c55a"> Jan  1 00:00</tspan>
    <tspan fill="#7ec8e3"> sites-enabled -> ../sites-available</tspan>
  </text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 심볼릭 링크는 -> 로 대상을 표시</text>

  <!-- Annotation boxes -->
  <rect x="60" y="292" width="170" height="52" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="145" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">파일 타입+권한</text>
  <text x="145" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">d/-/l + rwxrwxrwx</text>

  <rect x="250" y="292" width="120" height="52" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="310" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">링크 수</text>
  <text x="310" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">하드 링크 개수</text>

  <rect x="390" y="292" width="130" height="52" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="455" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">소유자·그룹</text>
  <text x="455" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">user group</text>

  <rect x="540" y="292" width="110" height="52" fill="#0d1a2a" rx="6" stroke="#b5cea8" stroke-width="1"/>
  <text x="595" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8" text-anchor="middle">파일 크기</text>
  <text x="595" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">bytes (-h 시 KB/MB)</text>

  <rect x="670" y="292" width="150" height="52" fill="#1c1a0d" rx="6" stroke="#e8c55a" stroke-width="1"/>
  <text x="745" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55a" text-anchor="middle">수정 시간·이름</text>
  <text x="745" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">mtime + 파일명</text>

  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">stat 파일명 으로 atime(접근)/mtime(수정)/ctime(변경) 시간을 모두 확인할 수 있다</text>
</svg>
