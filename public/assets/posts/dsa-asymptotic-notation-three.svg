<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">3가지 점근적 표기법 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">O(상한) · Ω(하한) · Θ(정확한 한계)</text>

  <!-- Big-O -->
  <rect x="60" y="90" width="240" height="200" rx="10" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="180" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" font-weight="700" fill="#e05555" text-anchor="middle">O(n)</text>
  <text x="180" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">빅오 — 상한</text>
  <line x1="80" y1="160" x2="280" y2="160" stroke="#333" stroke-width="1"/>
  <text x="180" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">T(n) ≤ c·f(n)</text>
  <text x="180" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">최악 경우 보장</text>
  <text x="180" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">"이보다 느리지 않다"</text>
  <text x="180" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">실무에서 가장 많이 사용</text>

  <!-- Big-Omega -->
  <rect x="320" y="90" width="240" height="200" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" font-weight="700" fill="#55c555" text-anchor="middle">Ω(n)</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">빅오메가 — 하한</text>
  <line x1="340" y1="160" x2="540" y2="160" stroke="#333" stroke-width="1"/>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">T(n) ≥ c·f(n)</text>
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">최선 경우 보장</text>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">"이보다 빠르지 않다"</text>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">정렬 하한 증명에 사용</text>

  <!-- Big-Theta -->
  <rect x="580" y="90" width="240" height="200" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" font-weight="700" fill="#7ec8e3" text-anchor="middle">Θ(n)</text>
  <text x="700" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">빅세타 — 정확한 한계</text>
  <line x1="600" y1="160" x2="800" y2="160" stroke="#333" stroke-width="1"/>
  <text x="700" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">c₁·f(n) ≤ T(n) ≤ c₂·f(n)</text>
  <text x="700" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">상한 = 하한</text>
  <text x="700" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">"정확히 이 속도"</text>
  <text x="700" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">이론 분석, 교재에서 자주</text>

  <!-- Example: Linear Search -->
  <rect x="60" y="310" width="760" height="100" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">선형 탐색 예시</text>
  <text x="160" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">O(n) — 최악: n번 비교</text>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">Ω(1) — 최선: 1번 비교</text>
  <text x="720" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Θ(n) — 평균: n/2번</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">※ 세 표기가 모두 다를 수 있다 — 분석 목적에 맞는 것을 선택</text>
</svg>
