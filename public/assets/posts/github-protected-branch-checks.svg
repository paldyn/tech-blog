  <line x1="280" y1="145" x2="316" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b2)"/>
  <line x1="280" y1="235" x2="316" y2="202" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b2)"/>
  <line x1="540" y1="190" x2="596" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b2)"/>

