<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker port — 포트 매핑 구조</text>

  <!-- Host box -->
  <rect x="60" y="70" width="760" height="340" rx="10" fill="#0d0d1a" stroke="#333" stroke-width="1.5"/>
  <text x="100" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">Host Machine</text>

  <!-- Host network interface -->
  <rect x="80" y="108" width="180" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="170" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Host Network</text>
  <text x="170" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">0.0.0.0 / 127.0.0.1</text>
  <text x="170" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">eth0: 192.168.1.10</text>

  <!-- Port labels on host -->
  <rect x="80" y="208" width="54" height="28" rx="5" fill="#1a1a0a" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="107" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">8080</text>

  <rect x="152" y="208" width="54" height="28" rx="5" fill="#1a1a0a" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="179" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">5432</text>

  <rect x="224" y="208" width="54" height="28" rx="5" fill="#1a1a0a" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="251" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">6379</text>

  <text x="107" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">호스트 포트</text>
  <text x="179" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">호스트 포트</text>
  <text x="251" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">호스트 포트</text>

  <!-- Arrow down: mapping -->
  <!-- web container arrow -->
  <line x1="107" y1="236" x2="450" y2="308" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="446,300 458,310 442,314" fill="#55c555"/>
  <text x="270" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">NAT 매핑</text>

  <!-- postgres arrow -->
  <line x1="179" y1="236" x2="630" y2="308" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="626,300 638,310 622,314" fill="#7777cc"/>

  <!-- redis arrow -->
  <line x1="251" y1="236" x2="760" y2="308" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="756,300 768,310 752,314" fill="#e05555"/>

  <!-- Container 1: web -->
  <rect x="390" y="290" width="160" height="90" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="470" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">web</text>
  <text x="470" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">nginx:alpine</text>
  <rect x="420" y="348" width="100" height="24" rx="4" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="470" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">:80 (컨테이너)</text>

  <!-- Container 2: postgres -->
  <rect x="570" y="290" width="160" height="90" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="650" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">postgres</text>
  <text x="650" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">postgres:16</text>
  <rect x="600" y="348" width="100" height="24" rx="4" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">:5432 (컨테이너)</text>

  <!-- Container 3: redis -->
  <rect x="750" y="290" width="50" height="90" rx="8" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="775" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e05555" text-anchor="middle" transform="rotate(-90,775,340)">:6379</text>

  <!-- docker port command result -->
  <rect x="80" y="290" width="280" height="90" rx="8" fill="#111320" stroke="#333" stroke-width="1"/>
  <text x="96" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">docker port web</text>
  <text x="96" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">80/tcp → 0.0.0.0:8080</text>
  <text x="96" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">80/tcp → [::]:8080</text>
  <text x="96" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IPv4 + IPv6 바인딩 표시</text>

  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">docker port는 NAT 테이블을 읽어 현재 매핑 상태를 출력 — docker inspect와 달리 간결하고 빠름</text>
</svg>
