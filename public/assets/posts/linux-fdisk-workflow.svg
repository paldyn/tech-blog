<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">fdisk 인터랙티브 세션 — 파티션 생성 흐름</text>

  <!-- Session code block -->
  <rect x="60" y="66" width="760" height="240" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">$ sudo fdisk /dev/sdb</text>
  <text x="76" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">Welcome to fdisk (util-linux 2.38).</text>
  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">Command (m for help): </text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">g</text>
  <text x="88" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">                   # GPT 파티션 테이블 생성</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">Command (m for help): </text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">n</text>
  <text x="88" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">                   # new partition</text>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">Partition number (1-128): </text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">1</text>
  <text x="88" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">                   # 파티션 번호</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">First sector (2048-…, default 2048): </text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">[Enter]</text>
  <text x="130" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">            # 기본값 사용 (시작 섹터)</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">Last sector, +/-sectors or +/-size{K,M,G}: </text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">+50G</text>
  <text x="114" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">               # 크기 지정</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">Command (m for help): </text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">w</text>
  <text x="88" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">                   # 저장 (디스크에 쓰기)</text>

  <!-- Bottom commands row -->
  <text x="60" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">내부 명령:</text>
  <text x="140" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">m</text>
  <text x="154" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=도움말</text>
  <text x="240" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">p</text>
  <text x="254" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=파티션 목록</text>
  <text x="370" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">d</text>
  <text x="384" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=삭제</text>
  <text x="450" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">t</text>
  <text x="464" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=타입 변경</text>
  <text x="580" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">w</text>
  <text x="594" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=저장·종료</text>
  <text x="700" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">q</text>
  <text x="714" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=저장 없이 종료</text>
</svg>
