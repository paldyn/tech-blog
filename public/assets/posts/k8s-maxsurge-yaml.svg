<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">maxSurge / maxUnavailable YAML 예시</text>

  <!-- Left: percentage -->
  <rect x="50" y="68" width="370" height="36" rx="6" fill="#121e38" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">퍼센트 방식 (권장)</text>

  <rect x="50" y="112" width="370" height="188" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="132"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">spec:</text>
  <text x="66" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  replicas: 10</text>
  <text x="66" y="168"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  strategy:</text>
  <text x="66" y="186"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    type: RollingUpdate</text>
  <text x="66" y="204"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    rollingUpdate:</text>
  <text x="66" y="222"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">      maxSurge:</text>
  <text x="178" y="222"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve"> "25%"</text>
  <text x="66" y="240"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">      maxUnavailable:</text>
  <text x="250" y="240"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve"> "25%"</text>
  <text x="66" y="262"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # → surge=ceil(10×0.25)=3</text>
  <text x="66" y="282"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # → unavail=floor(10×0.25)=2</text>
  <text x="66" y="296"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # 최대 13 Pod, 최소 8 Ready</text>

  <!-- Right: absolute -->
  <rect x="460" y="68" width="370" height="36" rx="6" fill="#121e38" stroke="#7777cc" stroke-width="1.5"/>
  <text x="645" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">절댓값 방식</text>

  <rect x="460" y="112" width="370" height="188" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="132"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 안전 우선 (maxUnavailable=0)</text>
  <text x="476" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">strategy:</text>
  <text x="476" y="168"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  rollingUpdate:</text>
  <text x="476" y="186"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    maxSurge:</text>
  <text x="576" y="186"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve"> 2</text>
  <text x="476" y="204"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    maxUnavailable:</text>
  <text x="626" y="204"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve"> 0</text>
  <text x="476" y="228"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 빠른 배포 (maxSurge=0)</text>
  <text x="476" y="246"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">strategy:</text>
  <text x="476" y="264"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  rollingUpdate:</text>
  <text x="476" y="282"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    maxSurge:</text>
  <text x="576" y="282"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve"> 0</text>
  <text x="476" y="300"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    maxUnavailable:</text>
  <text x="626" y="300"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve"> 2</text>

  <!-- Bottom note -->
  <rect x="50" y="316" width="780" height="80" rx="8" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">상황별 권장 설정</text>
  <text x="70" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">DB 커넥션 제한 / Singleton 서비스</text>
  <text x="280" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">→ maxSurge=1, maxUnavailable=0 (동시 1개 초과 금지)</text>
  <text x="70" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">리소스 제약 큰 배치 서비스</text>
  <text x="280" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">→ maxSurge=0, maxUnavailable=1 (추가 노드 없이 교체)</text>
</svg>
