<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 데이터 암호화 레이어</text>

  <!-- Layer 1: 전송 암호화 -->
  <rect x="60" y="70" width="760" height="70" rx="8" fill="#0d1523" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">전송 암호화 (TLS/HTTPS)</text>
  <text x="180" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">네트워크 구간 전체 암호화 — Nexacro ↔ 서버 간 모든 트래픽</text>
  <text x="760" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">Layer 1</text>

  <!-- Arrow down -->
  <line x1="440" y1="140" x2="440" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 2: 필드 레벨 암호화 -->
  <rect x="80" y="168" width="720" height="70" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="200" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">필드 레벨 암호화</text>
  <text x="200" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">민감 필드(주민번호, 카드번호) — 클라이언트 AES 암호화 후 전송</text>
  <text x="740" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Layer 2</text>

  <!-- Arrow down -->
  <line x1="440" y1="238" x2="440" y2="260" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 3: 저장 암호화 -->
  <rect x="100" y="266" width="680" height="70" rx="8" fill="#1a1a0d" stroke="#b5cea8" stroke-width="2"/>
  <text x="220" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#b5cea8">저장 데이터 암호화</text>
  <text x="220" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DB 컬럼 암호화 — 서버 측 처리 (클라이언트 관여 없음)</text>
  <text x="720" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">Layer 3</text>

  <!-- Arrows down -->
  <line x1="440" y1="336" x2="440" y2="358" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 4: 마스킹 표시 -->
  <rect x="120" y="364" width="640" height="70" rx="8" fill="#1a0d1a" stroke="#7777cc" stroke-width="2"/>
  <text x="240" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">UI 마스킹 표시</text>
  <text x="240" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">화면에서 민감 정보 일부 숨김 — MaskEdit, formatMask 활용</text>
  <text x="700" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Layer 4</text>

  <!-- Legend -->
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Layer 1·2 : 클라이언트 관여 | Layer 3·4 : 서버/UI 처리</text>
</svg>
