<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">YugabyteDB YSQL 주요 기능</text>

  <!-- Code: Tablespace geo-partitioning -->
  <rect x="60" y="68" width="760" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 지오-분산: Tablespace로 리전 핀닝</text>
  <text x="76" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">CREATE TABLESPACE</tspan><tspan fill="#ffffff"> asia_ts</tspan>
  </text>
  <text x="76" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  WITH</tspan><tspan fill="#ffffff"> (replica_placement = </tspan><tspan fill="#ce9178">'{"num_replicas":3,"placement_blocks":[</tspan>
  </text>
  <text x="76" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">    {"cloud":"aws","region":"ap-northeast-2","zone":"a","min_num_replicas":1}]}'</tspan>
  </text>
  <text x="76" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> kr_orders (...) </tspan><tspan fill="#7ec8e3" font-weight="600">TABLESPACE</tspan><tspan fill="#ffffff"> asia_ts;</tspan>
  </text>

  <!-- Code: Read from follower -->
  <rect x="60" y="228" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 팔로워 읽기: 지연 감소, 읽기 처리량 증가 (약간의 지연 허용)</text>
  <text x="76" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> yb_read_from_followers = </tspan><tspan fill="#7ec8e3" font-weight="600">TRUE</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> yb_follower_read_staleness_ms = </tspan><tspan fill="#b5cea8">2000</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">-- 2초 오래된 데이터 허용</tspan>
  </text>
  <text x="76" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 이후 SELECT는 가까운 팔로워 노드에서 읽기 (WAN 왕복 불필요)</text>
  <text x="76" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> products </tspan><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> category = </tspan><tspan fill="#ce9178">'electronics'</tspan><tspan fill="#ffffff">;</tspan>
  </text>

  <!-- Note -->
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">팔로워 읽기: 기본 Serializable보다 약한 일관성이지만 읽기 처리량 대폭 향상</text>
</svg>
