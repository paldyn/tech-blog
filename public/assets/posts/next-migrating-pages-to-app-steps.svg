<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrdown" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">점진적 마이그레이션 단계</text>

  <!-- Step 1 -->
  <rect x="60" y="74" width="760" height="62" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① app/ 디렉토리 활성화</text>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">next.config.ts는 수정 불필요. app/ 폴더 생성 + app/layout.tsx 추가만으로 App Router 활성화됨</text>
  <text x="780" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">STEP 1</text>

  <!-- Arrow down 1→2 -->
  <line x1="440" y1="136" x2="440" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrdown)"/>

  <!-- Step 2 -->
  <rect x="60" y="160" width="760" height="62" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">② _app.tsx / _document.tsx → app/layout.tsx 이전</text>
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Provider, 전역 CSS, html/body 태그를 Root Layout으로 이전. 이 단계 후 pages/_app.tsx 삭제</text>
  <text x="780" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">STEP 2</text>

  <!-- Arrow down 2→3 -->
  <line x1="440" y1="222" x2="440" y2="244" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrdown)"/>

  <!-- Step 3 -->
  <rect x="60" y="246" width="760" height="62" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">③ 페이지 단위로 app/ 이전 (pages/ 와 app/ 공존)</text>
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">한 번에 이전하지 말고 페이지 단위로 이전. 같은 경로에 pages/와 app/ 가 공존 시 app/이 우선</text>
  <text x="780" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">STEP 3</text>

  <!-- Arrow down 3→4 -->
  <line x1="440" y1="308" x2="440" y2="330" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrdown)"/>

  <!-- Step 4 -->
  <rect x="60" y="332" width="760" height="62" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">④ 데이터 페칭 패턴 변환</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">getServerSideProps → async Server Component + fetch(no-store) / getStaticProps → fetch(revalidate)</text>
  <text x="780" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">STEP 4</text>

  <!-- Arrow down 4→5 -->
  <line x1="440" y1="394" x2="440" y2="416" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrdown)"/>

  <!-- Step 5 -->
  <rect x="60" y="418" width="760" height="46" rx="8" fill="#111827" stroke="#e8e8e8" stroke-width="1"/>
  <text x="80" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">⑤ pages/ 완전 제거 — App Router 전환 완료</text>
  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pages/ 폴더 삭제. next/router → next/navigation 임포트 경로 일괄 변환</text>
</svg>
