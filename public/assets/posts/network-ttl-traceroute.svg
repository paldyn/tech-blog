<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Traceroute — TTL 조작으로 경로 탐색</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">TTL=1부터 시작해 1씩 증가 → ICMP Time Exceeded 응답으로 각 홉 주소 수집</text>

  <defs>
    <marker id="tr1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="tr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Source -->
  <rect x="60" y="140" width="80" height="40" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">내 PC</text>

  <!-- Hop 1 -->
  <circle cx="240" cy="160" r="24" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle" font-weight="600">홉1</text>
  <text x="240" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888" text-anchor="middle">게이트웨이</text>

  <!-- Hop 2 -->
  <circle cx="420" cy="160" r="24" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="420" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle" font-weight="600">홉2</text>
  <text x="420" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888" text-anchor="middle">ISP 라우터</text>

  <!-- Hop 3 / Dest -->
  <rect x="560" y="140" width="80" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="600" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle" font-weight="600">목적지</text>
  <text x="600" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">8.8.8.8</text>

  <!-- TTL=1 probe -->
  <line x1="140" y1="150" x2="216" y2="150" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#tr1)"/>
  <text x="178" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">TTL=1</text>
  <line x1="216" y1="168" x2="140" y2="175" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#tr2)"/>
  <text x="178" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">ICMP TE ← 홉1 IP</text>

  <!-- TTL=2 probe -->
  <line x1="140" y1="200" x2="396" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#tr1)"/>
  <text x="268" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">TTL=2</text>
  <line x1="396" y1="195" x2="140" y2="208" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#tr2)"/>
  <text x="268" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">ICMP TE ← 홉2 IP</text>

  <!-- TTL=3 probe (success) -->
  <line x1="140" y1="235" x2="560" y2="218" stroke="#55c555" stroke-width="1.5" marker-end="url(#tr1)"/>
  <text x="350" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">TTL=3 → 도달!</text>
  <line x1="560" y1="220" x2="140" y2="252" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#tr1)"/>
  <text x="350" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">Echo Reply</text>

  <!-- Traceroute output -->
  <rect x="60" y="290" width="760" height="126" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">traceroute 출력 예시</text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">$ traceroute 8.8.8.8</text>
  <text x="80" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> 1  192.168.1.1   1.2 ms   1.1 ms   1.3 ms</text>
  <text x="80" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> 2  10.0.0.1     15.4 ms  14.9 ms  15.1 ms</text>
  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve"> 3  8.8.8.8      24.3 ms  23.8 ms  24.1 ms  ← 도달</text>
</svg>
