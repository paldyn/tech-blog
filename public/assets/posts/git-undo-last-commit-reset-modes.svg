<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">reset 세 모드가 건드리는 범위</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">HEAD~1로 되돌릴 때 변경 내용이 어디까지 남는가</text>

  <!-- column headers -->
  <text x="300" y="118" font-size="14" font-weight="600" fill="#7ec8e3">HEAD 이동</text>
  <text x="470" y="118" font-size="14" font-weight="600" fill="#7ec8e3">스테이징</text>
  <text x="650" y="118" font-size="14" font-weight="600" fill="#7ec8e3">작업 트리</text>

  <!-- soft -->
  <rect x="60" y="135" width="170" height="56" rx="8" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="160" font-size="15" font-weight="600" fill="#55c555">--soft</text>
  <text x="80" y="180" font-size="12" fill="#9aa4b8">변경 그대로 보존</text>
  <text x="300" y="170" font-size="20" fill="#e05555">이동</text>
  <text x="470" y="170" font-size="20" fill="#55c555">유지</text>
  <text x="650" y="170" font-size="20" fill="#55c555">유지</text>

  <!-- mixed -->
  <rect x="60" y="205" width="170" height="56" rx="8" fill="#000000" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="230" font-size="15" font-weight="600" fill="#7ec8e3">--mixed</text>
  <text x="80" y="250" font-size="12" fill="#9aa4b8">기본값</text>
  <text x="300" y="240" font-size="20" fill="#e05555">이동</text>
  <text x="470" y="240" font-size="20" fill="#e05555">해제</text>
  <text x="650" y="240" font-size="20" fill="#55c555">유지</text>

  <!-- hard -->
  <rect x="60" y="275" width="170" height="56" rx="8" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="300" font-size="15" font-weight="600" fill="#e05555">--hard</text>
  <text x="80" y="320" font-size="12" fill="#9aa4b8">변경 사라짐 주의</text>
  <text x="300" y="310" font-size="20" fill="#e05555">이동</text>
  <text x="470" y="310" font-size="20" fill="#e05555">해제</text>
  <text x="650" y="310" font-size="20" fill="#e05555">삭제</text>
</svg>
