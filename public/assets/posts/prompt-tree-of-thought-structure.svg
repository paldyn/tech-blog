<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Tree-of-Thought 탐색 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">BFS / DFS로 여러 추론 경로를 탐색·평가·선택</text>

  <!-- Root -->
  <rect x="335" y="88" width="210" height="44" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">문제 입력</text>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">24점 게임: 4 8 8 2</text>

  <!-- Branch arrows from root -->
  <line x1="340" y1="132" x2="200" y2="188" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="132" x2="440" y2="188" stroke="#555" stroke-width="1.5"/>
  <line x1="540" y1="132" x2="680" y2="188" stroke="#555" stroke-width="1.5"/>

  <!-- Level 1: Thoughts -->
  <rect x="100" y="188" width="190" height="44" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="195" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">생각 A</text>
  <text x="195" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(8 / 8) * (2 + 4)</text>

  <rect x="335" y="188" width="210" height="44" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">생각 B</text>
  <text x="440" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(4 - 2) * (8 + 4)</text>

  <rect x="570" y="188" width="210" height="44" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="675" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">생각 C</text>
  <text x="675" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">8 * (2 + 4) / 2</text>

  <!-- Evaluation scores -->
  <rect x="100" y="244" width="190" height="28" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="195" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">평가: 유망 ★★★</text>

  <rect x="335" y="244" width="210" height="28" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">평가: 불가 ✗</text>

  <rect x="570" y="244" width="210" height="28" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="675" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">평가: 탐색중 ★★</text>

  <!-- Level 2 from A -->
  <line x1="130" y1="272" x2="120" y2="318" stroke="#555" stroke-width="1.5"/>
  <line x1="200" y1="272" x2="200" y2="318" stroke="#555" stroke-width="1.5"/>
  <line x1="270" y1="272" x2="280" y2="318" stroke="#555" stroke-width="1.5"/>

  <rect x="60" y="318" width="110" height="38" rx="6" fill="#0d1117" stroke="#55c555"/>
  <text x="115" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">1*6=6 ✗</text>
  <text x="115" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">가지치기</text>

  <rect x="140" y="318" width="110" height="38" rx="6" fill="#0d1117" stroke="#55c555"/>
  <text x="195" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">1*24=24 ✓</text>
  <text x="195" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">정답!</text>

  <rect x="220" y="318" width="110" height="38" rx="6" fill="#0d1117" stroke="#55c555"/>
  <text x="275" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">2*12=24 ✓</text>
  <text x="275" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">정답!</text>

  <!-- B pruned -->
  <line x1="440" y1="272" x2="440" y2="310" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="440" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">가지치기됨</text>

  <!-- C continues -->
  <line x1="640" y1="272" x2="620" y2="318" stroke="#555" stroke-width="1.5"/>
  <line x1="700" y1="272" x2="730" y2="318" stroke="#555" stroke-width="1.5"/>

  <rect x="560" y="318" width="110" height="38" rx="6" fill="#0d1117" stroke="#7ec8e3"/>
  <text x="615" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">계속 탐색...</text>

  <rect x="680" y="318" width="110" height="38" rx="6" fill="#0d1117" stroke="#7ec8e3"/>
  <text x="735" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">계속 탐색...</text>

  <!-- Final answer box -->
  <rect x="310" y="390" width="260" height="50" rx="8" fill="#0d2d0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">최종 답: (8/8+2)*4 = 24</text>
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가장 유망한 경로 선택</text>

  <line x1="195" y1="356" x2="350" y2="390" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Legend -->
  <rect x="60" y="460" width="760" height="40" rx="6" fill="#111111" stroke="#1e2433"/>
  <text x="440" y="477" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ToT = 생각 생성(Generate) + 상태 평가(Evaluate) + 탐색(Search: BFS/DFS/Beam) 세 모듈의 조합</text>
  <text x="440" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Yao et al. 2023 — Game of 24, Creative Writing, Mini Crosswords 벤치마크</text>
</svg>
