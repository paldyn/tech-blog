<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">옵션 3개의 혼란 → 옵션 1개로 통합</text>

  <!-- Left: legacy options -->
  <rect x="60" y="84" width="330" height="56" fill="#000000" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="225" y="109" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">importsNotUsedAsValues</text>
  <text x="225" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">제거 대신 에러·보존 선택 (deprecated)</text>

  <rect x="60" y="156" width="330" height="56" fill="#000000" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="225" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">preserveValueImports</text>
  <text x="225" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">미사용 값 import 보존 (deprecated)</text>

  <rect x="60" y="228" width="330" height="56" fill="#000000" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="225" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">둘의 복잡한 상호작용 규칙</text>
  <text x="225" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">조합에 따라 동작이 달라 예측 곤란</text>

  <!-- Arrows -->
  <line x1="394" y1="112" x2="486" y2="166" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="394" y1="184" x2="486" y2="184" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="394" y1="256" x2="486" y2="202" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Right: new option -->
  <rect x="490" y="120" width="330" height="128" fill="#111827" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="655" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">verbatimModuleSyntax</text>
  <text x="655" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">TypeScript 5.0에서 도입</text>
  <text x="655" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">규칙 하나 — 쓴 구문을 그대로 출력</text>

  <!-- Bottom note -->
  <rect x="60" y="312" width="760" height="62" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">보너스 — CJS 출력 시 ESM 구문 차단</text>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CommonJS로 컴파일되는 파일에서 import/export 구문을 쓰면 에러 — 형식 불일치를 조기에 차단</text>
</svg>
