<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">AMD · UMD · IIFE 코드 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">각 시스템의 코드 구조 비교</text>

  <!-- AMD -->
  <text x="230" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">AMD (RequireJS)</text>
  <rect x="60" y="106" width="340" height="162" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 브라우저 비동기 모듈 정의</text>
  <text x="76" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">define([</text>
  <text x="76" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ce9178">  'jquery'</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">'lodash'</tspan></text>

  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">], </tspan><tspan fill="#7ec8e3">function </tspan><tspan fill="#e8e8e8">($, _) {</tspan></text>

  <text x="76" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">  return </tspan><tspan fill="#e8e8e8">{</tspan></text>
  
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    greet: (name) =&gt; alert(name)</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  };</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">});</text>

  <!-- UMD -->
  <text x="650" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c842">UMD (Universal Module)</text>
  <rect x="480" y="106" width="340" height="162" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// AMD + CJS + Global 감지</text>
  <text x="496" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">(</tspan><tspan fill="#7ec8e3">function </tspan><tspan fill="#e8e8e8">(root, factory) {</tspan></text>

  <text x="496" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">  if </tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#7ec8e3">typeof </tspan><tspan fill="#e8e8e8">define === </tspan><tspan fill="#ce9178">'function'</tspan></text>

  <text x="496" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    &amp;&amp; define.amd) define(factory);</text>
  <text x="496" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">  else if </tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#7ec8e3">typeof </tspan><tspan fill="#e8e8e8">module !== </tspan></text>

  <text x="496" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">    'undefined'</text>
  <text x="496" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    ) module.exports = factory();</text>
  <text x="496" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">  else </tspan><tspan fill="#e8e8e8">root.MyLib = factory();</tspan></text>

  <!-- Bottom: IIFE pattern -->
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">IIFE 모듈 패턴 (오늘날도 사용)</text>
  <rect x="60" y="306" width="760" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const </tspan><tspan fill="#e8e8e8">CounterModule = (</tspan><tspan fill="#7ec8e3">function </tspan><tspan fill="#e8e8e8">() {</tspan></text>

  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">  let </tspan><tspan fill="#e8e8e8">count = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">; </tspan><tspan fill="#6a8aa0">// private 상태</tspan></text>

  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">  return </tspan><tspan fill="#e8e8e8">{ inc: () =&gt; ++count, get: () =&gt; count };</tspan></text>
  
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">})()</text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">CounterModule.inc(); CounterModule.get(); </text>
  <text x="400" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 1</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// count는 외부에서 직접 접근 불가 → 클로저로 캡슐화</text>

  <!-- Footer -->
</svg>
