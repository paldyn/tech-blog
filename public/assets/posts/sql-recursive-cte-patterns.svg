<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">재귀 CTE 활용 패턴</text>

  <!-- Pattern 1: date series -->
  <rect x="50" y="70" width="240" height="264" fill="#0d0d0d" rx="8" stroke="#55c555"/>
  <text x="170" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">날짜 시리즈 생성</text>
  <rect x="66" y="104" width="208" height="178" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="82" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">WITH RECURSIVE</text>
  <text x="82" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">dates <tspan fill="#7ec8e3">AS</tspan> (</text>
  <text x="82" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  <tspan fill="#7ec8e3">SELECT</tspan></text>
  <text x="82" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">    <tspan fill="#7ec8e3">DATE</tspan> <tspan fill="#ce9178">'2025-01-01'</tspan> d</text>
  <text x="82" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  <tspan fill="#7ec8e3">UNION ALL</tspan></text>
  <text x="82" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  <tspan fill="#7ec8e3">SELECT</tspan> d+<tspan fill="#b5cea8">1</tspan></text>
  <text x="82" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  <tspan fill="#7ec8e3">FROM</tspan> dates</text>
  <text x="82" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  <tspan fill="#7ec8e3">WHERE</tspan> d &lt; <tspan fill="#ce9178">'2025-12-31'</tspan></text>
  <text x="82" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">)</text>
  <text x="82" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">SELECT</text>
  <text x="82" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">       * <tspan fill="#7ec8e3">FROM</tspan> dates;</text>
  <text x="170" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">연속 날짜 목록 생성</text>
  <text x="170" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">generate_series() 대안</text>

  <!-- Pattern 2: path accumulation -->
  <rect x="320" y="70" width="240" height="264" fill="#0d0d0d" rx="8" stroke="#7777cc"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">경로 문자열 누적</text>
  <rect x="336" y="104" width="208" height="178" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="352" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">WITH RECURSIVE</text>
  <text x="352" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">tree <tspan fill="#7ec8e3">AS</tspan> (</text>
  <text x="352" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">  SELECT</text>
  <text x="352" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">    id, name,</text>
  <text x="352" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">    name::text path</text>
  <text x="352" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">  FROM</text>
  <text x="352" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">       cat <tspan fill="#7ec8e3">WHERE</tspan> pid <tspan fill="#7ec8e3">IS NULL</tspan></text>
  <text x="352" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  <tspan fill="#7ec8e3">UNION ALL</tspan></text>
  <text x="352" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">  SELECT</text>
  <text x="352" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">    c.id, c.name,</text>
  <text x="352" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">                t.path||<tspan fill="#ce9178">'/'</tspan>||c.name</text>
  <text x="352" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#7ec8e3">  FROM</tspan><tspan fill="#ffffff">  )</tspan></text>
  <text x="352" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">       cat c <tspan fill="#7ec8e3">JOIN</tspan> tree t <tspan fill="#7ec8e3">ON</tspan> c.pid=t.id</text>
  
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">카테고리 전체 경로 누적</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">전자 > 스마트폰 > 갤럭시</text>

  <!-- Pattern 3: cycle guard -->
  <rect x="590" y="70" width="240" height="264" fill="#0d0d0d" rx="8" stroke="#e05555"/>
  <text x="710" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">무한 루프 방지</text>
  <rect x="606" y="104" width="208" height="130" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="622" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">-- 순환 감지 컬럼 추가</text>
  <text x="622" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">WITH RECURSIVE</text>
  <text x="622" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">graph <tspan fill="#7ec8e3">AS</tspan> (</text>
  <text x="622" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  <tspan fill="#7ec8e3">SELECT</tspan> id, <tspan fill="#7ec8e3">ARRAY</tspan>[id] visited</text>
  <text x="622" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  ...</text>
  <text x="622" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  <tspan fill="#7ec8e3">WHERE NOT</tspan> (next_id = <tspan fill="#7ec8e3">ANY</tspan>(visited))</text>
  <text x="622" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">)</text>
  <text x="710" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">순환 그래프에서 필수</text>
  <text x="710" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">방문 배열로 사이클 감지</text>
  <text x="710" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">또는 MAXRECURSION 제한</text>
  <text x="710" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SQL:2023 CYCLE 절</text>
  <text x="710" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(PostgreSQL 14+ 지원)</text>
</svg>
