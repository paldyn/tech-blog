<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-impl" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">인터페이스 구조와 멤버 종류</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">Java 8+ — 추상·default·static·private 메서드 공존</text>

  <!-- Interface box: x=160, y=88, w=560, h=220, bottom=308 -->
  <rect x="160" y="88" width="560" height="220" rx="8"
        fill="#0a0a0a" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Header -->
  <text x="440" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">«interface»</text>
  <text x="440" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#e8e8e8">Printable</text>

  <!-- Divider -->
  <line x1="161" y1="146" x2="719" y2="146" stroke="#2a3a4e" stroke-width="1"/>

  <!-- Constants section -->
  <text x="184" y="167"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">String FORMAT = "A4";  // public static final</text>

  <!-- Divider -->
  <line x1="161" y1="180" x2="719" y2="180" stroke="#2a3a4e" stroke-width="1"/>

  <!-- Methods section -->
  <!-- Abstract method -->
  <text x="184" y="202"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" font-style="italic">void print();  // abstract — 구현 클래스가 반드시 구현</text>
  <!-- Default method -->
  <text x="184" y="224"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">default void preview() { ... }  // 기본 구현 제공</text>
  <!-- Static method -->
  <text x="184" y="246"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">static Printable of(String t) { ... }  // 팩토리</text>
  <!-- Private method -->
  <text x="184" y="268"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">private void setup() { ... }  // Java 9+ 내부 헬퍼</text>

  <!-- Right-side badges -->
  <rect x="728" y="192" width="96" height="24" rx="4" fill="#2a0808" stroke="#e05555" stroke-width="1"/>
  <text x="776" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">구현 강제</text>

  <rect x="728" y="214" width="96" height="24" rx="4" fill="#082a12" stroke="#55c555" stroke-width="1"/>
  <text x="776" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">선택적 재정의</text>

  <rect x="728" y="236" width="96" height="24" rx="4" fill="#071820" stroke="#7ec8e3" stroke-width="1"/>
  <text x="776" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">인터페이스 소유</text>

  <!-- Implementation arrow: dashed (implements uses dashed in UML) -->
  <line x1="440" y1="308" x2="440" y2="352" stroke="#7777cc" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-impl)"/>
  <text x="462" y="334"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">implements</text>

  <!-- Implementation class box: x=200, y=352, w=480, h=115, bottom=467 -->
  <rect x="200" y="352" width="480" height="115" rx="8"
        fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">DocumentPrinter</text>
  <line x1="201" y1="386" x2="679" y2="386" stroke="#2a3a4e" stroke-width="1"/>

  <text x="224" y="408"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">@Override</text>
  <text x="224" y="428"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">public void print() { System.out.println("문서 인쇄"); }</text>
  <text x="224" y="452"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">// preview(), setup() 상속 · FORMAT 상수 사용 가능</text>

  <!-- Bottom note -->
  <text x="440" y="490" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">추상 메서드만 필수 구현 — default/static/private 메서드는 인터페이스가 직접 소유</text>
</svg>
