<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SentencePiece: 언어 독립적 토크나이저</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">공백을 특수 기호로 처리해 사전 분리 없이 원시 유니코드를 직접 처리</text>

  <!-- Left: Traditional (with pre-tokenization) -->
  <rect x="60" y="92" width="350" height="350" rx="10" fill="#111" stroke="#222"/>
  <text x="235" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">기존 토크나이저 (언어 의존)</text>

  <rect x="80" y="130" width="310" height="44" rx="6" fill="#1a0a0a" stroke="#3a1a1a"/>
  <text x="235" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">"Hello world"</text>

  <line x1="235" y1="174" x2="235" y2="196" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="227,196 235,212 243,196" fill="#e05555"/>
  <text x="250" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">사전 분리</text>

  <rect x="80" y="212" width="310" height="34" rx="5" fill="#111820" stroke="#1e2433"/>
  <text x="235" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">["Hello", "world"]  ← 언어별 규칙 필요</text>

  <line x1="235" y1="246" x2="235" y2="266" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="227,266 235,282 243,266" fill="#e05555"/>

  <rect x="80" y="282" width="310" height="34" rx="5" fill="#111820" stroke="#1e2433"/>
  <text x="235" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">['Hel', '##lo', 'world']</text>

  <rect x="80" y="336" width="310" height="80" rx="6" fill="#1a0a0a" stroke="#3a1a1a"/>
  <text x="235" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">문제점</text>
  <text x="96" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 공백 기반 언어에만 적합</text>
  <text x="96" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 중국어/일본어에 별도 처리 필요</text>
  <text x="96" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 한국어 형태소 분석기 필요</text>

  <!-- Right: SentencePiece -->
  <rect x="460" y="92" width="360" height="350" rx="10" fill="#111" stroke="#222"/>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">SentencePiece (언어 독립)</text>

  <rect x="480" y="130" width="320" height="44" rx="6" fill="#0a1a0a" stroke="#1a3a1a"/>
  <text x="640" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">"Hello world"</text>

  <line x1="640" y1="174" x2="640" y2="196" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="632,196 640,212 648,196" fill="#55c555"/>
  <text x="656" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">직접 처리</text>

  <rect x="480" y="212" width="320" height="34" rx="5" fill="#111820" stroke="#1e2433"/>
  <text x="640" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">▁Hello ▁world</text>

  <text x="640" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">공백을 ▁ 기호로 치환 후 문자 시퀀스로 취급</text>

  <line x1="640" y1="278" x2="640" y2="298" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="632,298 640,314 648,298" fill="#55c555"/>

  <rect x="480" y="314" width="320" height="34" rx="5" fill="#111820" stroke="#1e2433"/>
  <text x="640" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">['▁Hel', 'lo', '▁world']</text>

  <rect x="480" y="366" width="320" height="60" rx="6" fill="#0a1a0a" stroke="#1a3a1a"/>
  <text x="640" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">장점</text>
  <text x="496" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 공백 없는 언어(중·일·한) 자연스럽게 처리</text>
  <text x="496" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 역변환(decode) 완벽 보장</text>

  <!-- ▁ explanation -->
  <rect x="60" y="460" width="760" height="10" rx="5" fill="none"/>
</svg>
