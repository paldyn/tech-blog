<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ESS 파일 구성 전략</text>

  <!-- Project structure left -->
  <rect x="60" y="70" width="260" height="360" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="190" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">프로젝트 styles/ 구조</text>

  <text x="80" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">styles/</text>
  <text x="92" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">├─ common/</text>
  <text x="104" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">│  ├─ reset.ess</text>
  <text x="104" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">│  ├─ button.ess</text>
  <text x="104" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">│  ├─ edit.ess</text>
  <text x="104" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">│  ├─ grid.ess</text>
  <text x="104" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">│  └─ layout.ess</text>
  <text x="92" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">├─ light/</text>
  <text x="104" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">│  ├─ colors.ess</text>
  <text x="104" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">│  └─ override.ess</text>
  <text x="92" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">├─ dark/</text>
  <text x="104" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">│  ├─ colors.ess</text>
  <text x="104" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">│  └─ override.ess</text>
  <text x="92" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">└─ modules/</text>
  <text x="104" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">   ├─ hr.ess</text>
  <text x="104" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">   └─ finance.ess</text>

  <!-- Middle: Rules -->
  <rect x="340" y="70" width="220" height="360" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="450" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">파일 분리 원칙</text>

  <text x="360" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">common/</text>
  <text x="360" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컴포넌트 기본 스타일</text>
  <text x="360" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">테마 독립적 정의</text>
  <text x="360" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">크기/여백/폰트 등</text>

  <line x1="360" y1="186" x2="540" y2="186" stroke="#222" stroke-width="1"/>

  <text x="360" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">light/ dark/</text>
  <text x="360" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">색상만 재정의</text>
  <text x="360" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">common를 상속받아</text>
  <text x="360" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">색상 토큰만 변경</text>

  <line x1="360" y1="268" x2="540" y2="268" stroke="#222" stroke-width="1"/>

  <text x="360" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#b5cea8">modules/</text>
  <text x="360" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">업무 모듈별 특수 스타일</text>
  <text x="360" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인사, 회계 등 도메인</text>
  <text x="360" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전용 컴포넌트 스타일</text>

  <!-- Right: TypeDefinition registration -->
  <rect x="580" y="70" width="260" height="360" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">TypeDefinition 등록</text>

  <text x="598" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">&lt;Theme</tspan>
    <tspan fill="#ffffff"> id=</tspan>
    <tspan fill="#ce9178">"light"</tspan>
    <tspan fill="#7ec8e3" font-weight="600">&gt;</tspan>
  </text>
  <text x="598" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">  &lt;!-- 공통 --&gt;</tspan>
  </text>
  <text x="598" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  &lt;StyleSheet</tspan>
    <tspan fill="#ffffff"> src=</tspan>
  </text>
  <text x="598" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ce9178">   "styles/common/button.ess"</tspan>
  </text>
  <text x="598" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  /&gt;</tspan>
  </text>
  <text x="598" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  &lt;StyleSheet</tspan>
    <tspan fill="#ffffff"> src=</tspan>
  </text>
  <text x="598" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ce9178">   "styles/common/grid.ess"</tspan>
  </text>
  <text x="598" y="244" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  /&gt;</tspan>
  </text>
  <text x="598" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">  &lt;!-- 라이트 색상 --&gt;</tspan>
  </text>
  <text x="598" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  &lt;StyleSheet</tspan>
    <tspan fill="#ffffff"> src=</tspan>
  </text>
  <text x="598" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ce9178">   "styles/light/colors.ess"</tspan>
  </text>
  <text x="598" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  /&gt;</tspan>
  </text>
  <text x="598" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">&lt;/Theme&gt;</tspan>
  </text>
</svg>
