<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Scaled Dot-Product Attention 흐름</text>

  <!-- Step boxes left to right -->
  <!-- Step 1: Q·K^T -->
  <rect x="60" y="80" width="140" height="120" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="130" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">① Q·Kᵀ</text>
  <text x="130" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">점수 행렬</text>
  <text x="130" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">n × n</text>
  <text x="130" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">행렬 곱</text>
  <text x="130" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">O(n²d_k)</text>

  <!-- Arrow -->
  <line x1="200" y1="140" x2="238" y2="140" stroke="#e8e8e8" stroke-width="2"/>
  <polygon points="238,134 250,140 238,146" fill="#e8e8e8"/>

  <!-- Step 2: /sqrt(d_k) -->
  <rect x="250" y="80" width="140" height="120" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="320" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">② / √d_k</text>
  <text x="320" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">스케일링</text>
  <text x="320" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">d_k=64이면</text>
  <text x="320" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">÷ 8</text>
  <text x="320" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">분산 정규화</text>

  <!-- Arrow -->
  <line x1="390" y1="140" x2="428" y2="140" stroke="#e8e8e8" stroke-width="2"/>
  <polygon points="428,134 440,140 428,146" fill="#e8e8e8"/>

  <!-- Step 3: Mask (optional) -->
  <rect x="440" y="80" width="130" height="120" rx="8" fill="#0d1117" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="505" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">③ Mask</text>
  <text x="505" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(선택적)</text>
  <text x="505" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">미래 위치에</text>
  <text x="505" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-∞ 추가</text>
  <text x="505" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">디코더용</text>

  <!-- Arrow -->
  <line x1="570" y1="140" x2="608" y2="140" stroke="#e8e8e8" stroke-width="2"/>
  <polygon points="608,134 620,140 608,146" fill="#e8e8e8"/>

  <!-- Step 4: Softmax -->
  <rect x="620" y="80" width="110" height="120" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="675" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">④ softmax</text>
  <text x="675" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">α 행렬</text>
  <text x="675" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 행 합 = 1</text>
  <text x="675" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">n × n</text>
  <text x="675" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">확률 분포</text>

  <!-- Arrow -->
  <line x1="730" y1="140" x2="768" y2="140" stroke="#e8e8e8" stroke-width="2"/>
  <polygon points="768,134 780,140 768,146" fill="#e8e8e8"/>

  <!-- Step 5: ·V -->
  <rect x="780" y="80" width="60" height="120" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="810" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">⑤·V</text>
  <text x="810" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">출력</text>
  <text x="810" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">n×d_k</text>

  <!-- Scaling explanation -->
  <rect x="60" y="224" width="760" height="80" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">왜 √d_k 로 나누는가?</text>
  <text x="80" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Q·Kᵀ의 기댓값 분산 = d_k  →  d_k가 크면 내적값이 커져 softmax가 포화 → 기울기 소실</text>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">√d_k 나누기로 분산 = 1 유지  →  softmax 출력이 고르게 분포  →  안정적 학습</text>

  <!-- Code block -->
  <rect x="60" y="318" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">import</text>
  <text x="130" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> math, torch, torch.nn.functional </text>
  <text x="404" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">as</text>
  <text x="420" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> F</text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> scaled_dot(Q, K, V, mask=</tspan><tspan fill="#b5cea8">None</tspan><tspan fill="#ffffff">):</tspan></text>

  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    d_k = Q.size(-</text>
  <text x="218" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="226" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    s = Q @ K.transpose(-</text>
  <text x="274" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="282" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">,-</text>
  <text x="298" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="306" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">) / math.sqrt(d_k)</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">    if</tspan><tspan fill="#ffffff"> mask </tspan><tspan fill="#7ec8e3">is not</tspan><tspan fill="#b5cea8"> None</tspan><tspan fill="#ffffff">: s = s.masked_fill(mask, float(</tspan><tspan fill="#ce9178">'-inf'</tspan><tspan fill="#ffffff">)</tspan></text>

</svg>
