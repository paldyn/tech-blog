<svg xmlns="http://www.w3.org/2000/svg" width="880" height="372" viewBox="0 0 880 372">
  <rect width="880" height="372" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">인메모리 대체 vs Testcontainers</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">테스트 환경과 운영 환경의 일치</text>

  <!-- left: H2 -->
  <text x="80" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">H2 / 인메모리 DB</text>
  <rect x="60" y="120" width="360" height="220" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">+ 빠른 기동, 의존성 불필요</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">+ CI에서 가볍게 실행</text>
  <text x="80" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">− SQL 방언이 운영 DB와 다름</text>
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">− 함수·인덱스 동작 불일치</text>
  <text x="80" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">− "내 PC에선 통과" 함정</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">→ 단위 테스트에 적합</text>

  <!-- right: Testcontainers -->
  <text x="480" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Testcontainers</text>
  <rect x="460" y="120" width="360" height="220" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">+ 운영과 동일한 DB 이미지</text>
  <text x="480" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">+ 방언·함수·트리거 그대로 검증</text>
  <text x="480" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">+ DB뿐 아니라 Kafka·Redis도</text>
  <text x="480" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">− Docker 데몬 필요</text>
  <text x="480" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">− 기동 시간이 더 걸림</text>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">→ 통합 테스트에 적합</text>
</svg>
