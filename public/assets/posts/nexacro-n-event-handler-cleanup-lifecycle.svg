<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이벤트 핸들러 등록 / 해제 사이클</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">폼 생명주기에 맞춰 이벤트를 등록하고 반드시 해제한다</text>

  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="a2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="a3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Form lifecycle boxes (left column) -->
  <rect x="60" y="100" width="220" height="48" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">form_onload</text>
  <text x="170" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">폼 초기화 단계</text>

  <line x1="170" y1="148" x2="170" y2="178" stroke="#55c555" stroke-width="2" marker-end="url(#a1)"/>

  <rect x="60" y="178" width="220" height="48" rx="8" fill="#0d0d1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">form_onshow (선택)</text>
  <text x="170" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">재사용 폼 재진입 시</text>

  <line x1="170" y1="226" x2="170" y2="256" stroke="#7ec8e3" stroke-width="2" marker-end="url(#a3)"/>

  <rect x="60" y="256" width="220" height="48" rx="8" fill="#101010" stroke="#555" stroke-width="1.5"/>
  <text x="170" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#c8c8c8" text-anchor="middle">form_onkeydown 등</text>
  <text x="170" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">화면 활성 중 동작</text>

  <line x1="170" y1="304" x2="170" y2="334" stroke="#555" stroke-width="2" marker-end="url(#a3)"/>

  <rect x="60" y="334" width="220" height="48" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">form_onunload</text>
  <text x="170" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">폼 소멸 단계 ← 핸들러 해제</text>

  <!-- Right: What to register/unregister -->
  <rect x="330" y="100" width="500" height="130" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="350" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">form_onload에서 등록할 것들</text>
  <text x="350" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• addEventHandler — 동적 이벤트 핸들러</text>
  <text x="350" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• application.addEventHandler — 전역 키 핸들러</text>
  <text x="350" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• setInterval / setTimeout 타이머</text>
  <text x="350" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• WebSocket / SSE 연결</text>
  <text x="350" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 이것들은 폼이 닫혀도 자동 정리되지 않는다</text>

  <rect x="330" y="244" width="500" height="130" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="350" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">form_onunload에서 반드시 해제할 것들</text>
  <text x="350" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• removeEventHandler — onload에서 등록한 핸들러</text>
  <text x="350" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• application.removeEventHandler — 전역 핸들러</text>
  <text x="350" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• clearInterval / clearTimeout — 타이머</text>
  <text x="350" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• WebSocket.close() / EventSource.close()</text>
  <text x="350" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 미해제 시 폼이 닫혀도 메모리·이벤트가 잔류</text>

  <!-- Arrow: lifecycle -> right -->
  <line x1="280" y1="124" x2="330" y2="124" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="280" y1="358" x2="330" y2="358" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Bottom warning -->
  <rect x="60" y="400" width="770" height="58" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">황금 법칙</text>
  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">onload에서 등록한 것은 onunload에서 해제한다. 등록과 해제는 항상 쌍으로 작성하는 습관이 메모리 누수를 원천 차단한다.</text>
</svg>
