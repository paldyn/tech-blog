<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Kustomize — 순수 YAML 기반 설정 오버레이</text>

  <!-- Left: Raw YAML -->
  <rect x="60" y="70" width="200" height="180" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">원본 YAML 리소스</text>
  <rect x="74" y="105" width="172" height="133" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">deployment.yaml</text>
  <text x="88" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">service.yaml</text>
  <text x="88" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">configmap.yaml</text>
  <text x="88" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">kustomization.yaml</text>
  <text x="88" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">(no templates)</text>
  <text x="88" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" xml:space="preserve">템플릿 없음, 순수 YAML</text>

  <!-- kustomize build -->
  <rect x="310" y="100" width="160" height="120" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="390" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">kustomize</text>
  <text x="390" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">build</text>
  <text x="390" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">또는</text>
  <text x="390" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" text-anchor="middle">kubectl apply</text>
  <text x="390" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" text-anchor="middle">-k ./</text>

  <!-- arrows: left to center -->
  <line x1="260" y1="160" x2="308" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="260" y1="160" x2="308" y2="160" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right: rendered output -->
  <rect x="520" y="70" width="300" height="240" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">렌더링된 최종 YAML</text>

  <rect x="534" y="107" width="272" height="188" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="548" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># 변환 적용됨</text>
  <text x="548" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">apiVersion: apps/v1</text>
  <text x="548" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">kind: Deployment</text>
  <text x="548" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">metadata:</text>
  <text x="548" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" xml:space="preserve">  name: prod-myapp</text>
  <text x="548" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  labels:</text>
  <text x="548" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" font-weight="600" xml:space="preserve">    env: production</text>
  <text x="548" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" font-weight="600" xml:space="preserve">    version: v2.0.0</text>
  <text x="548" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" xml:space="preserve">  namePrefix, labels, images 적용됨</text>

  <!-- arrow: build to output -->
  <line x1="470" y1="160" x2="518" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- bottom section: kustomization.yaml fields -->
  <rect x="60" y="330" width="760" height="140" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">kustomization.yaml 주요 필드</text>

  <rect x="76" y="366" width="710" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">resources:</text>
  <text x="92" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">                  [리소스 파일 목록]</text>
  <text x="92" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">namePrefix:</text>
  <text x="92" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">                  prod-   # 모든 리소스 이름 앞에 prefix 추가</text>
  <text x="92" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">commonLabels:</text>
  <text x="92" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">               env: production  # 모든 리소스 labels 추가</text>
  <text x="92" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">images:</text>
  <text x="92" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">                       - name: myapp  newTag: v2.0.0  # 이미지 태그 변환</text>
  <text x="92" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">patches:</text>
  <text x="92" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">                       [...] # 전략적 병합 또는 JSON6902 패치</text>
</svg>
