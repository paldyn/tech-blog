<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">다이아몬드 문제와 MRO</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">C3 선형화 알고리즘이 메서드 검색 순서를 결정합니다</text>

  <!-- A (top) -->
  <rect x="350" y="88" width="180" height="60" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#7ec8e3">A</text>
  <text x="440" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">def method(self)</text>

  <!-- Left arrow A→B -->
  <line x1="390" y1="148" x2="270" y2="218" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="264,222 258,207 278,212" fill="#888"/>

  <!-- Right arrow A→C -->
  <line x1="490" y1="148" x2="610" y2="218" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="616,222 612,207 622,215" fill="#888"/>

  <!-- B (middle left) -->
  <rect x="160" y="220" width="180" height="60" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="250" y="245" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#55c555">B</text>
  <text x="250" y="265" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">def method(self)</text>

  <!-- C (middle right) -->
  <rect x="540" y="220" width="180" height="60" rx="8" fill="#0d1117" stroke="#e8c040" stroke-width="2"/>
  <text x="630" y="245" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8c040">C</text>
  <text x="630" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(method 미정의)</text>

  <!-- B→D arrow -->
  <line x1="230" y1="280" x2="370" y2="350" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="375,354 365,340 380,346" fill="#888"/>

  <!-- C→D arrow -->
  <line x1="650" y1="280" x2="510" y2="350" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="504,354 508,339 518,348" fill="#888"/>

  <!-- D (bottom) -->
  <rect x="350" y="356" width="180" height="60" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="381" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e05555">D</text>
  <text x="440" y="401" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">class D(B, C)</text>

  <!-- MRO result box -->
  <rect x="60" y="432" width="760" height="52" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">D.__mro__ =</text>
  <text x="220" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">D</text>
  <text x="240" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"> →</text>
  <text x="265" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555"> B</text>
  <text x="285" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"> →</text>
  <text x="310" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c040"> C</text>
  <text x="330" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"> →</text>
  <text x="355" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> A</text>
  <text x="375" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"> → object</text>
  <text x="220" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">D.method() 호출 → B.method() 실행 (B가 C보다 먼저, C보다 먼저 B에서 발견)</text>
</svg>
