<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a050"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">eBPF 아키텍처 — 커널 안전 샌드박스</text>

  <!-- Userspace layer -->
  <rect x="60" y="68" width="760" height="130" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">유저스페이스 (User Space)</text>

  <rect x="90" y="100" width="170" height="82" rx="6" fill="#1a2e3e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="175" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">eBPF 프로그램 작성</text>
  <text x="175" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">C / Rust 등으로 작성</text>
  <text x="175" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">clang → eBPF bytecode</text>
  <text x="175" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">.o (ELF 형식)</text>

  <rect x="280" y="100" width="170" height="82" rx="6" fill="#1a3e2e" stroke="#55c555" stroke-width="1"/>
  <text x="365" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">로더 (Loader)</text>
  <text x="365" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">libbpf / bpftool</text>
  <text x="365" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">BCC / bpftrace</text>
  <text x="365" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">bpf() syscall 호출</text>

  <rect x="470" y="100" width="170" height="82" rx="6" fill="#2e2e1a" stroke="#e0a050" stroke-width="1"/>
  <text x="555" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Maps 읽기</text>
  <text x="555" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">수집된 데이터 조회</text>
  <text x="555" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">perf ring buffer</text>
  <text x="555" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a050">실시간 대시보드 출력</text>

  <rect x="660" y="100" width="140" height="82" rx="6" fill="#2e1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="730" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">도구들</text>
  <text x="730" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bpftrace, BCC</text>
  <text x="730" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Cilium, Falco</text>
  <text x="730" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">Tetragon 등</text>

  <!-- Kernel layer -->
  <rect x="60" y="218" width="760" height="230" rx="8" fill="#0d2214" stroke="#55c555" stroke-width="1.5"/>
  <text x="90" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">커널 공간 (Kernel Space)</text>

  <!-- Verifier -->
  <rect x="90" y="252" width="180" height="90" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Verifier (검증기)</text>
  <text x="180" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">무한 루프 없음 확인</text>
  <text x="180" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">메모리 범위 검사</text>
  <text x="180" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">안전 보장 후 JIT 컴파일</text>

  <!-- JIT Compiler -->
  <rect x="290" y="252" width="170" height="90" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="375" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">JIT 컴파일러</text>
  <text x="375" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">eBPF bytecode</text>
  <text x="375" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ 네이티브 머신 코드</text>
  <text x="375" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">x86-64 / ARM64 등</text>

  <!-- eBPF Maps -->
  <rect x="480" y="252" width="160" height="90" rx="6" fill="#2e2a1a" stroke="#e0a050" stroke-width="1.5"/>
  <text x="560" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a050">eBPF Maps</text>
  <text x="560" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Hash / Array</text>
  <text x="560" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Ring Buffer / LRU</text>
  <text x="560" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a050">커널↔유저 데이터 공유</text>

  <!-- Hook Points -->
  <rect x="660" y="252" width="140" height="90" rx="6" fill="#2e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="730" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Hook 포인트</text>
  <text x="730" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">kprobe / tracepoint</text>
  <text x="730" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">XDP / tc</text>
  <text x="730" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">LSM / uprobe</text>

  <!-- Kernel subsystem labels -->
  <text x="90" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커널 이벤트 소스:</text>
  <rect x="90" y="382" width="96" height="22" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="138" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">syscall 진입/종료</text>

  <rect x="196" y="382" width="96" height="22" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="244" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">네트워크 패킷</text>

  <rect x="302" y="382" width="96" height="22" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="350" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">스케줄러 이벤트</text>

  <rect x="408" y="382" width="96" height="22" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="456" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">블록 I/O</text>

  <rect x="514" y="382" width="96" height="22" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="562" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">보안 이벤트(LSM)</text>

  <rect x="620" y="382" width="96" height="22" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="668" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">uprobe(유저함수)</text>

  <rect x="726" y="382" width="74" height="22" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="763" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">perf event</text>

  <!-- Arrow: loader -> verifier -->
  <line x1="365" y1="182" x2="270" y2="250" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="290" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bpf()</text>

  <!-- Hardware layer -->
  <rect x="60" y="462" width="760" height="50" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="440" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">하드웨어 (CPU · Network · Storage)</text>
</svg>
