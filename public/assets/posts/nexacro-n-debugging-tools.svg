<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N 디버깅 도구 체계</text>

  <!-- Studio Debug Column -->
  <rect x="60" y="80" width="230" height="380" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">Studio 디버그 모드</text>

  <rect x="80" y="120" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">중단점 (Breakpoint)</text>
  <text x="175" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">F9 설정 / F10 한줄씩</text>

  <rect x="80" y="172" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">변수 감시 (Watch)</text>
  <text x="175" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실행 중 변수값 추적</text>

  <rect x="80" y="224" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Call Stack 패널</text>
  <text x="175" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">함수 호출 스택 확인</text>

  <rect x="80" y="276" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">즉시 실행 (Immediate)</text>
  <text x="175" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">콘솔 스크립트 실행</text>

  <rect x="80" y="328" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Output 창</text>
  <text x="175" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">trace() 출력 확인</text>

  <rect x="80" y="380" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">네트워크 트레이스</text>
  <text x="175" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트랜잭션 요청/응답 확인</text>

  <!-- Arrow Studio→Runtime -->
  <polygon points="300,270 330,260 330,280" fill="#7777cc"/>
  <line x1="290" y1="270" x2="330" y2="270" stroke="#7777cc" stroke-width="2"/>

  <!-- Runtime Debug Column -->
  <rect x="330" y="80" width="220" height="380" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">런타임 디버깅</text>

  <rect x="350" y="120" width="180" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">trace() 함수</text>
  <text x="440" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Output 창에 값 출력</text>

  <rect x="350" y="172" width="180" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">alert() / confirm()</text>
  <text x="440" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">중간 상태 팝업 확인</text>

  <rect x="350" y="224" width="180" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Dataset 값 덤프</text>
  <text x="440" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">row/col 값 trace 출력</text>

  <rect x="350" y="276" width="180" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">컴포넌트 상태 확인</text>
  <text x="440" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">visible/enable/value</text>

  <rect x="350" y="328" width="180" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Form 오픈 순서 추적</text>
  <text x="440" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">oncreate → onload 순서</text>

  <rect x="350" y="380" width="180" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">트랜잭션 콜백 로그</text>
  <text x="440" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">errCode / errMsg 출력</text>

  <!-- Arrow Runtime→Network -->
  <polygon points="560,270 590,260 590,280" fill="#7777cc"/>
  <line x1="550" y1="270" x2="590" y2="270" stroke="#7777cc" stroke-width="2"/>

  <!-- Network Trace Column -->
  <rect x="590" y="80" width="230" height="380" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">네트워크 / 서버</text>

  <rect x="610" y="120" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">NX 트레이스 뷰어</text>
  <text x="705" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PL 프로토콜 패킷 확인</text>

  <rect x="610" y="172" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">브라우저 개발자도구</text>
  <text x="705" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Network 탭 요청 확인</text>

  <rect x="610" y="224" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">서버 로그</text>
  <text x="705" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Adapter 수신 데이터 확인</text>

  <rect x="610" y="276" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">HTTP 상태 코드</text>
  <text x="705" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">200/401/500 원인 파악</text>

  <rect x="610" y="328" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">SSL/TLS 인증 오류</text>
  <text x="705" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Certificate 검증 설정</text>

  <rect x="610" y="380" width="190" height="40" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">CORS 오류 처리</text>
  <text x="705" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버 응답 헤더 확인</text>

  <!-- Bottom Label -->
  <text x="440" y="488" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Studio → 런타임 → 네트워크 순으로 문제를 좁혀가는 디버깅 접근법</text>
</svg>
