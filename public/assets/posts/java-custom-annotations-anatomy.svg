<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">@interface — 커스텀 애너테이션 선언 구조</text>

  <!-- code box -->
  <rect x="40" y="74" width="480" height="244" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="58" y="104" fill="#7ec8e3" font-weight="600">@Retention</tspan><tspan fill="#ffffff">(RUNTIME)</tspan>
    <tspan x="58" y="126" fill="#7ec8e3" font-weight="600">@Target</tspan><tspan fill="#ffffff">(METHOD)</tspan>
    <tspan x="58" y="148" fill="#7ec8e3" font-weight="600">public @interface</tspan><tspan fill="#ffffff"> Benchmark {</tspan>
    <tspan x="58" y="178" fill="#7ec8e3" font-weight="600">    String</tspan><tspan fill="#ffffff"> value() </tspan><tspan fill="#7ec8e3" font-weight="600">default</tspan><tspan fill="#ce9178"> ""</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="58" y="200" fill="#7ec8e3" font-weight="600">    int</tspan><tspan fill="#ffffff"> iterations() </tspan><tspan fill="#7ec8e3" font-weight="600">default</tspan><tspan fill="#b5cea8"> 10</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="58" y="222" fill="#7ec8e3" font-weight="600">    Class</tspan><tspan fill="#ffffff">&lt;?&gt;[] tags() </tspan><tspan fill="#7ec8e3" font-weight="600">default</tspan><tspan fill="#ffffff"> {};</tspan>
    <tspan x="58" y="244" fill="#ffffff">}</tspan>
  </text>

  <!-- right column explanation boxes -->
  <rect x="556" y="74" width="284" height="68" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="572" y="102" font-size="14" font-weight="600" fill="#e8e8e8">메타 애너테이션</text>
  <text x="572" y="124" font-size="13" fill="#9aa4b8">@Retention·@Target로 생존 기간·</text>
  <text x="572" y="142" font-size="13" fill="#9aa4b8">적용 위치를 먼저 지정</text>

  <rect x="556" y="156" width="284" height="68" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="572" y="184" font-size="14" font-weight="600" fill="#e8e8e8">요소(element)</text>
  <text x="572" y="206" font-size="13" fill="#9aa4b8">메서드처럼 선언하지만 본문 없음.</text>
  <text x="572" y="224" font-size="13" fill="#9aa4b8">반환형이 곧 속성 타입</text>

  <rect x="556" y="238" width="284" height="80" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="572" y="266" font-size="14" font-weight="600" fill="#e8e8e8">value()와 default</text>
  <text x="572" y="288" font-size="13" fill="#9aa4b8">value 단독이면 이름 생략 가능.</text>
  <text x="572" y="306" font-size="13" fill="#9aa4b8">default는 미지정 시 기본값</text>
</svg>
