<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">chattr 주요 파일 속성</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">inode에 저장되는 확장 속성 — 권한 시스템 위에 추가 보호층</text>

  <!-- Table header -->
  <rect x="60" y="84" width="760" height="34" rx="6" fill="#141622"/>
  <text x="120" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#888">속성</text>
  <text x="200" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">플래그</text>
  <text x="480" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#888">의미</text>
  <text x="760" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#888">위험도</text>

  <!-- i: immutable -->
  <rect x="60" y="118" width="760" height="36" fill="#0e1018"/>
  <text x="120" y="141" text-anchor="middle" font-size="15" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">i</text>
  <text x="200" y="141" text-anchor="middle" font-size="12" fill="#e8e8e8">immutable</text>
  <text x="480" y="141" text-anchor="middle" font-size="12" fill="#e8e8e8">수정·삭제·이름변경·하드링크 모두 차단 (root도 불가)</text>
  <text x="760" y="141" text-anchor="middle" font-size="12" fill="#e05555">잠금</text>

  <!-- a: append-only -->
  <rect x="60" y="154" width="760" height="36" fill="#0a0a0a"/>
  <text x="120" y="177" text-anchor="middle" font-size="15" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">a</text>
  <text x="200" y="177" text-anchor="middle" font-size="12" fill="#e8e8e8">append-only</text>
  <text x="480" y="177" text-anchor="middle" font-size="12" fill="#e8e8e8">추가(append)만 허용. 기존 내용 수정·삭제 불가</text>
  <text x="760" y="177" text-anchor="middle" font-size="12" fill="#7ec8e3">로그 보호</text>

  <!-- s: secure delete -->
  <rect x="60" y="190" width="760" height="36" fill="#0e1018"/>
  <text x="120" y="213" text-anchor="middle" font-size="15" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">s</text>
  <text x="200" y="213" text-anchor="middle" font-size="12" fill="#e8e8e8">secure delete</text>
  <text x="480" y="213" text-anchor="middle" font-size="12" fill="#e8e8e8">삭제 시 블록을 0으로 덮어씀 (복구 불가)</text>
  <text x="760" y="213" text-anchor="middle" font-size="12" fill="#55c555">안전 삭제</text>

  <!-- u: undelete -->
  <rect x="60" y="226" width="760" height="36" fill="#0a0a0a"/>
  <text x="120" y="249" text-anchor="middle" font-size="15" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">u</text>
  <text x="200" y="249" text-anchor="middle" font-size="12" fill="#e8e8e8">undelete</text>
  <text x="480" y="249" text-anchor="middle" font-size="12" fill="#e8e8e8">삭제 시 데이터를 보존 → 복구 가능 (구현 여부 fs 의존)</text>
  <text x="760" y="249" text-anchor="middle" font-size="12" fill="#7777cc">복구 용이</text>

  <!-- c: compress -->
  <rect x="60" y="262" width="760" height="36" fill="#0e1018"/>
  <text x="120" y="285" text-anchor="middle" font-size="15" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#888">c</text>
  <text x="200" y="285" text-anchor="middle" font-size="12" fill="#e8e8e8">compress</text>
  <text x="480" y="285" text-anchor="middle" font-size="12" fill="#e8e8e8">커널이 파일을 자동 압축 저장 (btrfs에서 활성화)</text>
  <text x="760" y="285" text-anchor="middle" font-size="12" fill="#888">공간 절약</text>

  <!-- A: no atime -->
  <rect x="60" y="298" width="760" height="36" fill="#0a0a0a"/>
  <text x="120" y="321" text-anchor="middle" font-size="15" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#888">A</text>
  <text x="200" y="321" text-anchor="middle" font-size="12" fill="#e8e8e8">no atime</text>
  <text x="480" y="321" text-anchor="middle" font-size="12" fill="#e8e8e8">접근 시간(atime) 업데이트 비활성화 → I/O 감소</text>
  <text x="760" y="321" text-anchor="middle" font-size="12" fill="#888">성능</text>

  <!-- d: no dump -->
  <rect x="60" y="334" width="760" height="36" fill="#0e1018"/>
  <text x="120" y="357" text-anchor="middle" font-size="15" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#888">d</text>
  <text x="200" y="357" text-anchor="middle" font-size="12" fill="#e8e8e8">no dump</text>
  <text x="480" y="357" text-anchor="middle" font-size="12" fill="#e8e8e8">dump(8) 백업에서 제외</text>
  <text x="760" y="357" text-anchor="middle" font-size="12" fill="#888">백업 제외</text>

  <!-- Border -->
  <rect x="60" y="84" width="760" height="286" rx="6" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Footer -->
  <rect x="60" y="385" width="760" height="24" rx="6" fill="#141622"/>
  <text x="440" y="401" text-anchor="middle" font-size="12" fill="#888">lsattr로 속성 확인 · chattr +i (추가) / chattr -i (제거) · ext2/ext4/xfs 지원</text>
</svg>
