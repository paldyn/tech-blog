  <text x="440" y="456" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">함수형 프로그래밍 패러다임 도입 · 현재도 엔터프라이즈 환경에서 가장 많이 사용</text>
