  <text x="440" y="272" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">불변 · 스레드 안전</text>

  <rect x="584" y="192" width="236" height="90" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="702" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
