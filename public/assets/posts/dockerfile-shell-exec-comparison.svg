<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">Shell 폼 vs Exec 폼 비교</text>

  <!-- Headers -->
  <rect x="60" y="68" width="360" height="40" fill="#1a1a2e" rx="6" stroke="#7777cc"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle" xml:space="preserve">Shell 폼</text>

  <rect x="460" y="68" width="360" height="40" fill="#0d2818" rx="6" stroke="#55c555"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle" xml:space="preserve">Exec 폼</text>

  <!-- Shell form code -->
  <rect x="60" y="118" width="360" height="106" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 문자열로 작성</text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="108" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> apt-get install -y vim</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">CMD</text>
  <text x="112" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> node server.js</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ENTRYPOINT</text>
  <text x="188" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> /entrypoint.sh</text>
  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># /bin/sh -c "..." 로 실행</text>

  <!-- Exec form code -->
  <rect x="460" y="118" width="360" height="106" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="476" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># JSON 배열로 작성</text>
  <text x="476" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="508" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> ["apt-get","install","-y","vim"]</text>
  <text x="476" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">CMD</text>
  <text x="512" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> ["node", "server.js"]</text>
  <text x="476" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ENTRYPOINT</text>
  <text x="584" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> ["/entrypoint.sh"]</text>
  <text x="476" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># exec() 직접 실행 (셸 없음)</text>

  <!-- Comparison rows -->
  <text x="440" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">특성 비교</text>

  <!-- Row: Process -->
  <rect x="60" y="264" width="760" height="40" fill="#111827" rx="4"/>
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">프로세스</text>
  <text x="240" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">/bin/sh -c "..." → PID 1은 sh</text>
  <text x="550" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">직접 exec → PID 1이 내 프로세스</text>

  <!-- Row: Signal -->
  <rect x="60" y="306" width="760" height="40" fill="#0a0a0a" rx="4"/>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">SIGTERM</text>
  <text x="240" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">sh가 수신 → 앱으로 전달 안 됨</text>
  <text x="550" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">앱이 직접 수신 → graceful 종료</text>

  <!-- Row: Env vars -->
  <rect x="60" y="348" width="760" height="40" fill="#111827" rx="4"/>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">환경변수</text>
  <text x="240" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">$HOME, ${VAR} 등 셸 확장 지원</text>
  <text x="550" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">셸 없음 → $VAR 그대로 전달됨</text>

  <!-- Row: Shell features -->
  <rect x="60" y="390" width="760" height="40" fill="#0a0a0a" rx="4"/>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">파이프/리다이렉션</text>
  <text x="240" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">| &amp;&amp; || &gt; 등 모두 가능</text>
  <text x="550" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">불가 (sh 거치지 않으므로)</text>

  <!-- Row: Recommendation -->
  <rect x="60" y="432" width="760" height="40" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">권장 인스트럭션</text>
  <text x="240" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" xml:space="preserve">RUN (파이프/환경변수 필요 시)</text>
  <text x="550" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" xml:space="preserve">CMD, ENTRYPOINT (시그널 수신 필수)</text>
</svg>
