<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a855"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">AutoGen GroupChat & 코드 실행 패턴</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">GroupChatManager가 발언자를 선택, 코드 블록을 추출해 CodeExecutor로 실행</text>

  <!-- GroupChatManager (center top) -->
  <rect x="320" y="90" width="240" height="60" rx="8" fill="#1a1a0a" stroke="#e0a855" stroke-width="2"/>
  <text x="440" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0a855">GroupChatManager</text>
  <text x="440" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">발언자 선택 · 대화 기록 유지</text>

  <!-- Agents -->
  <!-- Planner -->
  <rect x="60" y="210" width="160" height="80" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">🧠 Planner</text>
  <text x="140" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">태스크 분해</text>
  <text x="140" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">계획 수립</text>

  <!-- Coder -->
  <rect x="260" y="210" width="160" height="80" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">💻 Coder</text>
  <text x="340" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 작성</text>
  <text x="340" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버그 수정</text>

  <!-- Executor -->
  <rect x="460" y="210" width="160" height="80" rx="6" fill="#1a0f0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="540" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">⚙️ Executor</text>
  <text x="540" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 실행</text>
  <text x="540" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(Docker 샌드박스)</text>

  <!-- Reviewer -->
  <rect x="660" y="210" width="160" height="80" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">🔍 Reviewer</text>
  <text x="740" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">결과 검증</text>
  <text x="740" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TERMINATE 판단</text>

  <!-- Arrows from Manager to agents -->
  <line x1="380" y1="150" x2="178" y2="210" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-o)"/>
  <line x1="420" y1="150" x2="360" y2="210" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-o)"/>
  <line x1="460" y1="150" x2="510" y2="210" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-o)"/>
  <line x1="500" y1="150" x2="716" y2="210" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-o)"/>

  <!-- Execution flow labels -->
  <text x="140" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a855">① 선택</text>
  <text x="340" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a855">② 선택</text>
  <text x="540" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a855">③ 선택</text>
  <text x="740" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a855">④ 선택</text>

  <!-- Arrows agents → manager (reply) -->
  <path d="M 140 290 Q 140 340 260 360 Q 440 380 560 340 Q 660 310 660 160" stroke="#7ec8e3"
        stroke-width="1.5" stroke-dasharray="4,4" fill="none" marker-end="url(#arr)"/>
  <text x="440" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">발언 결과 → GroupChat 기록 → 다음 발언자 선택 반복</text>

  <!-- Code example box -->
  <rect x="60" y="398" width="760" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">groupchat = GroupChat(agents=[planner, coder, executor, reviewer], messages=[], max_round=</text>
  <text x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">                                                                                           20</text>
  <text x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                                                             )</text>
</svg>
