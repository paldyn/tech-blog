<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">점근적 표기법 — 알고리즘별 분석</text>

  <!-- Header -->
  <rect x="60" y="68" width="760" height="30" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="180" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">알고리즘</text>
  <text x="370" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">O (최악)</text>
  <text x="540" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Ω (최선)</text>
  <text x="710" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Θ (평균)</text>

  <!-- Row 1 -->
  <rect x="60" y="98" width="760" height="34" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>
  <text x="180" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">선형 탐색</text>
  <text x="370" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">O(n)</text>
  <text x="540" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">Ω(1)</text>
  <text x="710" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Θ(n)</text>

  <!-- Row 2 -->
  <rect x="60" y="132" width="760" height="34" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
  <text x="180" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">이진 탐색</text>
  <text x="370" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">O(log n)</text>
  <text x="540" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">Ω(1)</text>
  <text x="710" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Θ(log n)</text>

  <!-- Row 3 -->
  <rect x="60" y="166" width="760" height="34" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>
  <text x="180" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">버블 정렬</text>
  <text x="370" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">O(n²)</text>
  <text x="540" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">Ω(n)</text>
  <text x="710" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Θ(n²)</text>

  <!-- Row 4 -->
  <rect x="60" y="200" width="760" height="34" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
  <text x="180" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">퀵 정렬</text>
  <text x="370" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">O(n²)</text>
  <text x="540" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">Ω(n log n)</text>
  <text x="710" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Θ(n log n)</text>

  <!-- Row 5 -->
  <rect x="60" y="234" width="760" height="34" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>
  <text x="180" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">합병 정렬</text>
  <text x="370" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">O(n log n)</text>
  <text x="540" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">Ω(n log n)</text>
  <text x="710" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Θ(n log n)</text>

  <!-- Row 6 -->
  <rect x="60" y="268" width="760" height="34" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
  <text x="180" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">해시 탐색</text>
  <text x="370" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">O(n)</text>
  <text x="540" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">Ω(1)</text>
  <text x="710" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Θ(1)</text>

  <!-- Note box -->
  <rect x="60" y="322" width="760" height="60" rx="8" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">비교 기반 정렬의 하한 정리</text>
  <text x="440" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">어떤 비교 기반 정렬 알고리즘도 Ω(n log n)보다 빠를 수 없다</text>
  <text x="440" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">(결정 트리 모델로 증명)</text>
</svg>
