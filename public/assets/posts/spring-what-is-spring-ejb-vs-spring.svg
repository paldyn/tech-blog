<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">EJB의 한계 vs 스프링의 POJO 철학</text>

  <!-- Left column: EJB -->
  <rect x="60" y="70" width="360" height="380" fill="#120a0a" rx="10" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="240" y="100" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">EJB (Enterprise JavaBeans)</text>

  <!-- EJB code block -->
  <rect x="76" y="112" width="328" height="198" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// EJB 2.x - 복잡한 인터페이스 필수</text>
  <text x="92" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">public interface</text>
  <text x="200" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> OrderHome</text>
  <text x="92" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    extends EJBHome {</text>
  <text x="92" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  Order create()</text>
  <text x="92" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    throws CreateException,</text>
  <text x="92" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">           RemoteException;</text>
  <text x="92" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="92" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 컨테이너 종속·테스트 불가</text>
  <text x="92" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// DD XML 수백 줄 필요</text>

  <!-- EJB pain points -->
  <text x="92" y="328" font-size="13" fill="#e05555">✗  인터페이스 2개 필수 구현</text>
  <text x="92" y="350" font-size="13" fill="#e05555">✗  컨테이너 없이 테스트 불가</text>
  <text x="92" y="372" font-size="13" fill="#e05555">✗  XML 설정 수백 줄</text>
  <text x="92" y="394" font-size="13" fill="#e05555">✗  특정 WAS에 강한 종속</text>
  <text x="92" y="418" font-size="13" fill="#e05555">✗  학습 비용·개발 생산성 저하</text>

  <!-- Center arrow -->
  <polygon points="420,230 456,230 456,218 476,250 456,282 456,270 420,270"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="415" y="290" width="66" height="20" fill="#0a0a0a"/>
  <text x="448" y="304" font-size="11" fill="#7777cc" text-anchor="middle">POJO 전환</text>

  <!-- Right column: Spring -->
  <rect x="460" y="70" width="360" height="380" fill="#0a120a" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="640" y="100" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">스프링 (POJO 철학)</text>

  <!-- Spring code block -->
  <rect x="476" y="112" width="328" height="198" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Spring - 순수 자바 객체</text>
  <text x="492" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">@Service</text>
  <text x="492" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">public class</text>
  <text x="580" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> OrderService {</text>
  <text x="492" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  private final</text>
  <text x="590" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> OrderRepo repo;</text>
  <text x="492" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text>
  <text x="492" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  public</text>
  <text x="540" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Order place(Long id) {</text>
  <text x="492" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    return repo.findById(id);</text>
  <text x="492" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="492" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <!-- Spring benefits -->
  <text x="492" y="328" font-size="13" fill="#55c555">✓  특별한 상속·인터페이스 불필요</text>
  <text x="492" y="350" font-size="13" fill="#55c555">✓  단위 테스트 바로 가능</text>
  <text x="492" y="372" font-size="13" fill="#55c555">✓  어노테이션 기반 간결한 설정</text>
  <text x="492" y="394" font-size="13" fill="#55c555">✓  특정 WAS에 독립적</text>
  <text x="492" y="418" font-size="13" fill="#55c555">✓  비즈니스 로직에 집중</text>

  <!-- Footer -->
  <text x="440" y="478" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #1 · Chapter 1</text>
</svg>
