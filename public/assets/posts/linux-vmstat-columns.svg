<svg width="880" height="520" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">vmstat 출력 컬럼 설명</text>

  <!-- Code box: vmstat output -->
  <rect x="60" y="68" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">$ vmstat 1 3</text>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">procs ---memory--- ---swap-- -io-- -system-- ------cpu-----</text>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> r  b   swpd   free  buff cache  si  so    bi    bo   in   cs us sy id wa st</text>

  <!-- Section labels with colored backgrounds -->
  <!-- procs -->
  <rect x="60" y="170" width="130" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="125" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">procs</text>
  <text x="125" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">r: 실행 대기, b: 블로킹</text>

  <!-- memory -->
  <rect x="205" y="170" width="165" height="44" rx="6" fill="#0a100a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="287" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">memory (KB)</text>
  <text x="287" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">swpd, free, buff, cache</text>

  <!-- swap -->
  <rect x="385" y="170" width="120" height="44" rx="6" fill="#150a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="445" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">swap (KB/s)</text>
  <text x="445" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">si: swap in, so: out</text>

  <!-- io -->
  <rect x="520" y="170" width="115" height="44" rx="6" fill="#100a15" stroke="#7777cc" stroke-width="1.5"/>
  <text x="577" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">io (blocks/s)</text>
  <text x="577" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bi: 읽기, bo: 쓰기</text>

  <!-- system -->
  <rect x="648" y="170" width="85" height="44" rx="6" fill="#0a0a15" stroke="#e0a055" stroke-width="1.5"/>
  <text x="690" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">system</text>
  <text x="690" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">in, cs</text>

  <!-- cpu -->
  <rect x="748" y="170" width="72" height="44" rx="6" fill="#150a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="784" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">cpu %</text>
  <text x="784" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">us sy id wa</text>

  <!-- Detail section: key fields explanation -->
  <text x="440" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">주요 컬럼 상세</text>

  <!-- 2-column layout for field details -->
  <!-- Left column -->
  <rect x="60" y="268" width="370" height="208" rx="8" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">r</text>
  <text x="100" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — CPU에서 실행 대기 중인 프로세스 수</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">b</text>
  <text x="100" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — I/O 대기(D 상태) 프로세스 수</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">free</text>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">    — 미사용 메모리 (KB)</text>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">cache</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">      — 페이지 캐시 사용량 (해제 가능)</text>
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">si / so</text>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">        — 스왑 I/O (0이 정상, 높으면 메모리 부족)</text>
  <text x="80" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">        si≠0 이면 메모리 추가 검토 필요</text>

  <!-- Right column -->
  <rect x="450" y="268" width="370" height="208" rx="8" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="470" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a055" font-weight="600">in</text>
  <text x="490" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — 초당 인터럽트 수 (하드웨어 이벤트)</text>
  <text x="470" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a055" font-weight="600">cs</text>
  <text x="490" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — 초당 컨텍스트 스위치 수</text>
  <text x="470" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">us</text>
  <text x="490" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — 사용자 공간 CPU %</text>
  <text x="470" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">sy</text>
  <text x="490" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — 커널 공간 CPU %</text>
  <text x="470" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">id</text>
  <text x="490" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — idle CPU % (100-id가 총 사용률)</text>
  <text x="470" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">wa</text>
  <text x="490" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — I/O wait CPU % (높으면 디스크 병목)</text>
  <text x="470" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">st</text>
  <text x="490" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — VM steal time (가상화 환경)</text>
</svg>
