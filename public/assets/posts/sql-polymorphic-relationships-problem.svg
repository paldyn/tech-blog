<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">다형성 관계 문제와 해법</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">댓글(Comment)이 여러 엔티티에 속하는 경우</text>

  <!-- Problem side -->
  <rect x="60" y="86" width="360" height="310" rx="8" fill="#0d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">안티패턴: 다형성 FK</text>
  <text x="240" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">target_type + target_id</text>

  <rect x="76" y="140" width="328" height="160" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 하나의 FK가 여러 테이블 참조</text>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">CREATE TABLE</text><text x="181" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> comments (</text>
  <text x="92" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  id          BIGINT</text><text x="234" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3"> PRIMARY KEY</text><text x="329" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">,</text>
  <text x="92" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  target_type </text><text x="212" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">VARCHAR(20)</text><text x="307" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">,</text>
  <text x="92" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  target_id   </text><text x="202" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">BIGINT</text><text x="248" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">,</text>
  <text x="92" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  body        </text><text x="192" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">TEXT</text>
  <text x="92" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">);</text>
  <text x="92" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- target_id는 FOREIGN KEY가 아님!</text>
  <text x="92" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 참조 무결성 DB 레벨 보장 불가</text>

  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">문제점:</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 참조 무결성 없음</text>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 고아(Orphan) 레코드 발생</text>
  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• JOIN 쿼리 복잡</text>

  <!-- Solution side: exclusive arc -->
  <rect x="460" y="86" width="360" height="310" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">해법: Exclusive Arc (FK 분리)</text>
  <text x="640" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 FK 컬럼 + CHECK</text>

  <rect x="476" y="140" width="328" height="190" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- FK를 컬럼으로 분리</text>
  <text x="492" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">CREATE TABLE</text><text x="581" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> comments (</text>
  <text x="492" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">  id         BIGINT </tspan><tspan fill="#7ec8e3">PRIMARY KEY</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text x="492" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#7777cc">  post_id    BIGINT </tspan><tspan fill="#7ec8e3">REFERENCES</tspan><tspan fill="#e8e8e8"> posts,</tspan></text>
  <text x="492" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#7777cc">  product_id BIGINT </tspan><tspan fill="#7ec8e3">REFERENCES</tspan><tspan fill="#e8e8e8"> products,</tspan></text>
  <text x="492" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  body       TEXT,</text>
  <text x="492" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">  -- 정확히 하나만 NOT NULL</text>
  <text x="492" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">  CHECK</text><text x="532" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> ((post_id </text><text x="602" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">IS NOT NULL</text><text x="678" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">)::</text>
  <text x="492" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">    INT + (product_id </tspan><tspan fill="#7ec8e3">IS NOT NULL</tspan><tspan fill="#e8e8e8">)::INT = 1)</tspan></text>
  <text x="492" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">);</text>

  <text x="476" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점: 참조 무결성 보장</text>
  <text x="476" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점: 타입 추가 시 컬럼 추가</text>

  <!-- Bottom line -->
  <rect x="60" y="412" width="760" height="16" rx="4" fill="none"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">최선의 해법: 수퍼타입 테이블(댓글 대상 추상화) + CTI 패턴으로 다형성 제거</text>
</svg>
