<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">bpftrace 프로브 타입과 예제</text>

  <!-- 4 probe type cards in 2x2 grid -->
  <!-- kprobe -->
  <rect x="60" y="72" width="370" height="130" rx="10" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">kprobe / kretprobe</text>
  <text x="245" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커널 함수 진입 / 리턴 시점 훅</text>
  <rect x="76" y="124" width="338" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 파일 열기 추적</text>
  <text x="92" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">bpftrace -e 'kprobe:do_sys_openat2</text>
  <text x="92" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  { printf("%s %s\n", comm, str(arg1)); }'</text>

  <!-- tracepoint -->
  <rect x="450" y="72" width="370" height="130" rx="10" fill="#0a1020" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">tracepoint</text>
  <text x="635" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커널 정적 계측 포인트 (안정 API)</text>
  <rect x="466" y="124" width="338" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># syscall 입력 추적</text>
  <text x="482" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">bpftrace -e 'tracepoint:syscalls:</text>
  <text x="482" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  sys_enter_read { @[comm] = count(); }'</text>

  <!-- uprobe -->
  <rect x="60" y="222" width="370" height="130" rx="10" fill="#0a1020" stroke="#e0a055" stroke-width="1.5"/>
  <text x="245" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a055">uprobe / uretprobe</text>
  <text x="245" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자 공간 함수 계측</text>
  <rect x="76" y="274" width="338" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># libc malloc 지연 히스토그램</text>
  <text x="92" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">bpftrace -e 'uretprobe:/lib/libc.so:malloc</text>
  <text x="92" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  { @size = hist(retval); }'</text>

  <!-- profile (interval / profile) -->
  <rect x="450" y="222" width="370" height="130" rx="10" fill="#0a1020" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">profile / interval</text>
  <text x="635" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타이머 기반 샘플링 / 주기 출력</text>
  <rect x="466" y="274" width="338" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 1초 단위 프로세스 CPU 히트맵</text>
  <text x="482" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">bpftrace -e 'profile:hz:99</text>
  <text x="482" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  { @[comm] = count(); }'</text>

  <!-- Bottom note -->
  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로브 목록 확인: bpftrace -l 'kprobe:do_*'  |  tracepoint 목록: bpftrace -l 'tracepoint:syscalls:*'</text>
</svg>
