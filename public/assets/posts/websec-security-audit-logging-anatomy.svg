<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">좋은 감사 로그가 답해야 할 5가지</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">구조화된 한 줄의 이벤트가 누가·무엇을·언제·어디서·결과를 모두 담는다</text>

  <!-- Code box (left): structured JSON audit entry -->
  <rect x="60" y="100" width="380" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">"timestamp"</tspan>: <tspan fill="#ce9178">"2026-06-15T09:30Z"</tspan>,</text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">"actor"</tspan>:     <tspan fill="#ce9178">"user:1024"</tspan>,</text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">"action"</tspan>:    <tspan fill="#ce9178">"DELETE"</tspan>,</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">"resource"</tspan>:  <tspan fill="#ce9178">"/orders/8841"</tspan>,</text>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">"source_ip"</tspan>: <tspan fill="#ce9178">"203.0.113.7"</tspan>,</text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">"result"</tspan>:    <tspan fill="#ce9178">"success"</tspan>,</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">"trace_id"</tspan>:  <tspan fill="#ce9178">"a1b2c3"</tspan></text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"><tspan fill="#9aa4b8">// 사람이 아니라 기계가 파싱하도록</tspan></text>

  <!-- Right column: 5 dimensions -->
  <rect x="500" y="100" width="320" height="40" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="516" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">누가 (Who)</text>
  <text x="516" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">actor — 인증된 주체 식별자</text>

  <rect x="500" y="150" width="320" height="40" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="516" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">무엇을 (What)</text>
  <text x="516" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">action — 수행한 행위·동작</text>

  <rect x="500" y="200" width="320" height="40" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="516" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">언제 (When)</text>
  <text x="516" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">timestamp — UTC, 신뢰된 시계</text>

  <rect x="500" y="250" width="320" height="40" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="516" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">어디서 (Where)</text>
  <text x="516" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">resource · source_ip — 대상·출처</text>

  <rect x="500" y="300" width="320" height="40" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.2"/>
  <text x="516" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">결과 (Outcome)</text>
  <text x="516" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">result — 성공/실패, 실패도 반드시</text>

  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">민감정보(비밀번호·토큰·카드번호)는 절대 로그에 남기지 않는다</text>
</svg>
