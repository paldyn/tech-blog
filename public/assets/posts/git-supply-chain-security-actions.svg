<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GitHub Actions SHA 핀닝 &amp; Secret Scanning</text>

  <!-- Left: Actions pinning -->
  <rect x="60" y="76" width="360" height="248" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">GitHub Actions SHA 핀닝</text>

  <rect x="80" y="112" width="320" height="50" rx="6" fill="#1f1010" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">위험 (태그 참조)</text>
  <text x="240" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">uses: actions/checkout@v4 (태그 변경 가능)</text>

  <rect x="80" y="174" width="320" height="50" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">안전 (SHA 핀닝)</text>
  <text x="240" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683</text>

  <text x="240" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">태그는 누구든 다른 커밋으로 재지정 가능</text>
  <text x="240" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SHA는 불변 — 항상 같은 코드를 실행</text>
  <text x="240" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">Dependabot으로 SHA 자동 업데이트 설정 가능</text>
  <text x="240" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">주석에 태그명 병기 권장: @sha # v4</text>

  <!-- Right: Secret scanning -->
  <rect x="460" y="76" width="360" height="248" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">Secret Scanning</text>

  <rect x="480" y="112" width="320" height="50" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">GitHub Secret Scanning</text>
  <text x="640" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">push 시 자동 스캔 → 이메일 경고 + revoke</text>

  <rect x="480" y="174" width="320" height="50" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">pre-commit hook (로컬)</text>
  <text x="640" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">git-secrets / gitleaks로 push 전 차단</text>

  <text x="640" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">push 후 감지는 이미 공개된 것 — 로컬에서</text>
  <text x="640" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">먼저 막는 것이 중요</text>
  <text x="640" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">.env 파일은 .gitignore에 반드시 추가</text>
  <text x="640" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">환경변수는 CI Secrets으로 주입</text>
</svg>
