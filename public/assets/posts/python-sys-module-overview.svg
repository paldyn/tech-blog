<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">sys 모듈 — 인터프리터 인터페이스</text>

  <!-- Central box: Python Interpreter -->
  <rect x="330" y="76" width="220" height="56" rx="10" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">Python Interpreter</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-sys" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Left cluster: 입출력 -->
  <rect x="60" y="168" width="200" height="44" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">입출력 스트림</text>

  <rect x="60" y="228" width="200" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="251" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sys.stdin</text>
  <text x="76" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">표준 입력 파일 객체</text>

  <rect x="60" y="294" width="200" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sys.stdout</text>
  <text x="76" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">표준 출력 파일 객체</text>

  <rect x="60" y="360" width="200" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sys.stderr</text>
  <text x="76" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">표준 에러 파일 객체</text>

  <!-- Center-left cluster: 모듈/경로 -->
  <rect x="296" y="168" width="200" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="396" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">모듈 &amp; 경로</text>

  <rect x="296" y="228" width="200" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="312" y="251" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sys.path</text>
  <text x="312" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모듈 검색 경로 리스트</text>

  <rect x="296" y="294" width="200" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="312" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sys.modules</text>
  <text x="312" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">임포트된 모듈 캐시</text>

  <rect x="296" y="360" width="200" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="312" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sys.argv</text>
  <text x="312" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커맨드라인 인수 리스트</text>

  <!-- Right cluster: 인터프리터 정보 -->
  <rect x="530" y="168" width="200" height="44" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="630" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">인터프리터 정보</text>

  <rect x="530" y="228" width="200" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="546" y="251" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sys.version</text>
  <text x="546" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Python 버전 문자열</text>

  <rect x="530" y="294" width="200" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="546" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sys.version_info</text>
  <text x="546" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">버전 named tuple</text>

  <rect x="530" y="360" width="200" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="546" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sys.platform</text>
  <text x="546" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">'linux','darwin','win32'</text>

  <!-- Far-right cluster: 제어 -->
  <rect x="762" y="168" width="78" height="44" rx="8" fill="#2a2a1a" stroke="#f0a020" stroke-width="1.5"/>
  <text x="801" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#f0a020" text-anchor="middle">제어</text>

  <rect x="762" y="228" width="78" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="778" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">sys.exit()</text>
  <text x="778" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">종료</text>

  <rect x="762" y="294" width="78" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="778" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">sys.exc_info()</text>
  <text x="778" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">예외 정보</text>

  <rect x="762" y="360" width="78" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="778" y="381" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">sys.getsize()</text>
  <text x="778" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">객체 크기</text>
</svg>
