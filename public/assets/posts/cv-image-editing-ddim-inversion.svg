<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DDIM Inversion 기반 이미지 편집 흐름</text>

  <!-- Row 1: Inversion (forward through denoiser) -->
  <text x="60" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">① DDIM Inversion (이미지 → 노이즈 공간)</text>

  <!-- x0 original -->
  <rect x="40" y="102" width="100" height="70" rx="6" fill="#1a2a3e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">x₀</text>
  <text x="90" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원본 이미지</text>
  <text x="90" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">VAE 인코딩</text>

  <line x1="140" y1="137" x2="178" y2="137" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>

  <rect x="180" y="102" width="100" height="70" rx="6" fill="#1a1a2e" stroke="#e05555" stroke-width="1.2"/>
  <text x="230" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">x_t₁</text>
  <text x="230" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">역방향 DDIM</text>
  <text x="230" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">스텝 1</text>

  <line x1="280" y1="137" x2="310" y2="137" stroke="#e05555" stroke-width="2"/>
  <text x="330" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#666" text-anchor="middle">…</text>
  <line x1="350" y1="137" x2="378" y2="137" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>

  <rect x="380" y="102" width="100" height="70" rx="6" fill="#1a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="430" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">x_T*</text>
  <text x="430" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">잠재 노이즈</text>
  <text x="430" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">편집용 시작점</text>

  <!-- Row 2: Editing -->
  <text x="60" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">② 편집 프롬프트로 역방향 생성 (같은 x_T* 사용)</text>

  <rect x="380" y="230" width="100" height="70" rx="6" fill="#1a1414" stroke="#55c555" stroke-width="1.5"/>
  <text x="430" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">x_T*</text>
  <text x="430" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">동일 노이즈 재사용</text>

  <line x1="480" y1="265" x2="510" y2="265" stroke="#55c555" stroke-width="2"/>
  <text x="530" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#666" text-anchor="middle">…</text>
  <line x1="550" y1="265" x2="578" y2="265" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="580" y="230" width="110" height="70" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="635" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">x_t₂</text>
  <text x="635" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">편집 프롬프트</text>
  <text x="635" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">DDIM 생성</text>

  <line x1="690" y1="265" x2="718" y2="265" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="720" y="230" width="120" height="70" rx="6" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="780" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">x̂₀ 편집됨</text>
  <text x="780" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">구조 보존</text>
  <text x="780" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">+ 내용 변경</text>

  <!-- Key insight -->
  <rect x="40" y="325" width="800" height="40" rx="8" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">핵심: DDIM은 결정적(deterministic) 샘플링이므로 같은 x_T*에서 다른 프롬프트로 디노이징하면 구조는 유지하면서 내용만 바꿀 수 있음</text>
</svg>
