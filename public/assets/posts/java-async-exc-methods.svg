<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CompletableFuture 예외 처리 메서드 비교</text>

  <!-- Header row -->
  <rect x="60" y="64" width="180" height="32" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">메서드</text>
  <rect x="246" y="64" width="160" height="32" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="326" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">정상 완료 시</text>
  <rect x="412" y="64" width="160" height="32" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">예외 발생 시</text>
  <rect x="578" y="64" width="262" height="32" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="709" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">반환 타입</text>

  <!-- exceptionally -->
  <rect x="60" y="104" width="180" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">exceptionally</text>
  <rect x="246" y="104" width="160" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="326" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">원래 값 통과</text>
  <rect x="412" y="104" width="160" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">fn(ex) → 대체값</text>
  <rect x="578" y="104" width="262" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="709" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CF&lt;T&gt;</text>

  <!-- handle -->
  <rect x="60" y="156" width="180" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">handle</text>
  <rect x="246" y="156" width="160" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="326" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">fn(value, null)</text>
  <text x="326" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">항상 호출됨</text>
  <rect x="412" y="156" width="160" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">fn(null, ex)</text>
  <text x="492" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">항상 호출됨</text>
  <rect x="578" y="156" width="262" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="709" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CF&lt;U&gt; (변환 가능)</text>

  <!-- whenComplete -->
  <rect x="60" y="208" width="180" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">whenComplete</text>
  <rect x="246" y="208" width="160" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="326" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">fn(value, null)</text>
  <text x="326" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">값 그대로 전파</text>
  <rect x="412" y="208" width="160" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">fn(null, ex)</text>
  <text x="492" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">예외 그대로 전파</text>
  <rect x="578" y="208" width="262" height="44" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="709" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CF&lt;T&gt; (변환 불가)</text>

  <!-- Note boxes -->
  <rect x="60" y="282" width="370" height="56" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">handle vs whenComplete 차이</text>
  <text x="245" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">handle: 결과를 다른 타입 U로 변환 가능</text>
  <text x="245" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">whenComplete: 부수 효과 전용, T 그대로</text>

  <rect x="450" y="282" width="370" height="56" rx="6" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">exceptionally 사용 시기</text>
  <text x="635" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예외 시 기본값 반환이 필요할 때</text>
  <text x="635" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">정상 경로에서는 오버헤드 없음</text>

  <rect x="60" y="358" width="760" height="54" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Java 12+: exceptionallyAsync / handleAsync / whenCompleteAsync — 예외 핸들링도 비동기 스레드에서 실행</text>
  <text x="440" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">CompletionException은 cause를 getCause()로 꺼내서 타입 확인 후 처리</text>
</svg>
