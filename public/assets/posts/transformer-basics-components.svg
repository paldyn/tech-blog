<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Transformer 핵심 구성 요소</text>

  <!-- 4 component boxes -->
  <!-- Self-Attention -->
  <rect x="60" y="76" width="180" height="130" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Self-Attention</text>
  <text x="80" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 모든 토큰 쌍 관계</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• Q, K, V 행렬 학습</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• O(n²) 복잡도</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">병렬 계산 가능</text>

  <!-- Multi-Head -->
  <rect x="270" y="76" width="180" height="130" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="360" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Multi-Head</text>
  <text x="290" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• h개 어텐션 헤드</text>
  <text x="290" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 다양한 관계 포착</text>
  <text x="290" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 결과 concat + 선형</text>
  <text x="290" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">표현력 확장</text>

  <!-- FFN -->
  <rect x="480" y="76" width="180" height="130" rx="10" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="570" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">Feed-Forward</text>
  <text x="500" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 2층 MLP (per token)</text>
  <text x="500" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• d_ff = 4 × d_model</text>
  <text x="500" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• ReLU / GELU 활성</text>
  <text x="500" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">패턴·지식 저장</text>

  <!-- Pos Enc -->
  <rect x="690" y="76" width="130" height="130" rx="10" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="755" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">위치 인코딩</text>
  <text x="700" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• sin/cos 함수</text>
  <text x="700" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 또는 학습형</text>
  <text x="700" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• RoPE, ALiBi</text>
  <text x="700" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">순서 정보 주입</text>

  <!-- Add &amp; Norm explanation -->
  <rect x="60" y="232" width="760" height="68" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Add &amp; LayerNorm (잔차 연결)</text>
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">출력 = LayerNorm(x + SubLayer(x))  →  기울기 안정화 + 깊은 네트워크 학습 가능</text>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Pre-Norm (GPT 계열) vs Post-Norm (원본 Transformer) 위치에 따라 학습 안정성 차이</text>

  <!-- Code block -->
  <rect x="60" y="316" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 트랜스포머 인코더 레이어 (PyTorch 내장)</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">enc_layer = nn.TransformerEncoderLayer(</text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    d_model=</tspan><tspan fill="#b5cea8">512</tspan><tspan fill="#ffffff">, nhead=</tspan><tspan fill="#b5cea8">8</tspan><tspan fill="#ffffff">, dim_feedforward=</tspan><tspan fill="#b5cea8">2048</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">encoder = nn.TransformerEncoder(enc_layer, num_layers=</text>
  <text x="534" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">6</text>
  <text x="542" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>
</svg>
