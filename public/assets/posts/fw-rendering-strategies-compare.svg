<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">렌더링 전략 비교</text>

  <!-- ===== Box 1: CSR (top-left) ===== -->
  <rect x="80" y="75" width="340" height="158" fill="#0a1020" stroke="#7ec8e3" stroke-width="2" rx="8"/>
  <text x="100" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">CSR</text>
  <text x="100" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Client-Side Rendering</text>
  <text x="100" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">초기: 빈 HTML + JS 번들 전송</text>
  <text x="100" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">브라우저가 JS 실행 후 렌더링</text>
  <text x="100" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">장점: 서버 부하 낮음, 인터랙티브</text>
  <text x="100" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">단점: 초기 LCP 느림, SEO 불리</text>
  <!-- Badge SPA -->
  <rect x="100" y="210" width="52" height="20" fill="#7ec8e3" rx="4"/>
  <text x="126" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#000" text-anchor="middle">SPA</text>

  <!-- ===== Box 2: SSR (top-right) ===== -->
  <rect x="460" y="75" width="340" height="158" fill="#0a1a0a" stroke="#55c555" stroke-width="2" rx="8"/>
  <text x="480" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">SSR</text>
  <text x="480" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Server-Side Rendering</text>
  <text x="480" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">요청마다 서버가 HTML 생성</text>
  <text x="480" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">TTFB 짧음, SEO 우수</text>
  <text x="480" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">장점: 항상 최신 데이터</text>
  <text x="480" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">단점: 서버 부하, 하이드레이션 비용</text>
  <!-- Badge 동적 -->
  <rect x="480" y="210" width="52" height="20" fill="#55c555" rx="4"/>
  <text x="506" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#000" text-anchor="middle">동적</text>

  <!-- ===== Box 3: SSG (bottom-left) ===== -->
  <rect x="80" y="250" width="340" height="158" fill="#1a1000" stroke="#e8c55a" stroke-width="2" rx="8"/>
  <text x="100" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8c55a">SSG</text>
  <text x="100" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Static Site Generation</text>
  <text x="100" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">빌드 타임에 HTML 미리 생성</text>
  <text x="100" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">CDN 캐싱으로 빠른 응답</text>
  <text x="100" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">장점: 최고의 성능, 보안</text>
  <text x="100" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">단점: 빌드 재배포 필요</text>
  <!-- Badge 정적 -->
  <rect x="100" y="385" width="52" height="20" fill="#e8c55a" rx="4"/>
  <text x="126" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#000" text-anchor="middle">정적</text>

  <!-- ===== Box 4: ISR (bottom-right) ===== -->
  <rect x="460" y="250" width="340" height="158" fill="#1a0a1a" stroke="#b07ec8" stroke-width="2" rx="8"/>
  <text x="480" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#b07ec8">ISR</text>
  <text x="480" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Incremental Static Regeneration</text>
  <text x="480" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">SSG + 주기적 백그라운드 재생성</text>
  <text x="480" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">revalidate 옵션으로 TTL 설정</text>
  <text x="480" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">장점: 정적 속도 + 데이터 신선도</text>
  <text x="480" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">단점: 첫 요청 stale 가능성</text>
  <!-- Badge 하이브리드 -->
  <rect x="480" y="385" width="72" height="20" fill="#b07ec8" rx="4"/>
  <text x="516" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#000" text-anchor="middle">하이브리드</text>

  <!-- ===== Bottom Summary Row ===== -->
  <rect x="80" y="425" width="720" height="82" fill="#111111" stroke="#333333" stroke-width="1" rx="8"/>
  <text x="100" y="447" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">선택 기준</text>
  <!-- 4 items -->
  <text x="100" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c55a">블로그/마케팅 → SSG</text>
  <text x="290" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">대시보드/앱 → CSR</text>
  <text x="460" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">뉴스/이커머스 → SSR</text>
  <text x="640" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b07ec8">제품목록/문서 → ISR</text>
  <!-- Sub-labels -->
  <text x="100" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">정적 콘텐츠 중심</text>
  <text x="290" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">실시간 인터랙션</text>
  <text x="460" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">동적 + SEO 필요</text>
  <text x="640" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">대규모 동적 페이지</text>
</svg>
