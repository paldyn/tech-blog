<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arrc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrc2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrc3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c44a"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Condition 기반 생산자-소비자 흐름</text>

  <!-- Producer -->
  <rect x="60" y="70" width="150" height="60" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="135" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">생산자</text>
  <text x="135" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">put(item)</text>

  <!-- Buffer -->
  <rect x="310" y="60" width="260" height="80" rx="8" fill="#111111" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Bounded Buffer</text>
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">capacity = N</text>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">[ _ | _ | _ | _ | _ ]</text>

  <!-- Consumer -->
  <rect x="670" y="70" width="150" height="60" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="745" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">소비자</text>
  <text x="745" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">take()</text>

  <!-- Arrows: producer → buffer, buffer → consumer -->
  <line x1="210" y1="100" x2="308" y2="100" stroke="#55c555" stroke-width="2" marker-end="url(#arrc2)"/>
  <line x1="572" y1="100" x2="668" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrc)"/>

  <!-- notFull condition -->
  <rect x="60" y="190" width="200" height="70" rx="6" fill="#1a1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="160" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">notFull Condition</text>
  <text x="160" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">버퍼 가득 → 생산자 await()</text>
  <text x="160" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">소비 후 → signal()</text>

  <!-- notEmpty condition -->
  <rect x="620" y="190" width="200" height="70" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="720" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">notEmpty Condition</text>
  <text x="720" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">버퍼 비어 → 소비자 await()</text>
  <text x="720" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">생산 후 → signal()</text>

  <!-- Dashed signal lines -->
  <path d="M 160 260 Q 160 290 310 290 Q 440 290 440 142" stroke="#e8c44a" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arrc3)"/>
  <text x="270" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e8c44a">소비 후 notFull.signal()</text>
  <path d="M 720 260 Q 720 290 580 290 Q 440 290 440 142" stroke="#7ec8e3" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arrc)"/>
  <text x="620" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#7ec8e3">생산 후 notEmpty.signal()</text>

  <!-- Condition vs wait/notify comparison code -->
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">wait/notify vs Condition 비교</text>
  <rect x="60" y="352" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 구식: synchronized + wait/notify</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">synchronized</text>
  <text x="180" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> void put(T x) {</text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">    while</text>
  <text x="136" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> (isFull()) wait();</text>
  <text x="76" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    add(x); </text>
  <text x="76" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    notifyAll(); </text>
  <text x="200" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 소비자+생산자 모두 깨움</text>
  <text x="76" y="464" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>
  <text x="76" y="484" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 문제: 생산자도 notifyAll로 깨워 낭비</text>

  <rect x="460" y="352" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 권장: ReentrantLock + Condition</text>
  <text x="476" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">void</text>
  <text x="506" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> put(T x) </text>
  <text x="570" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">throws</text>
  <text x="620" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> IE {</text>
  <text x="476" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    lock.lock(); </text>
  <text x="476" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">    try</text>
  <text x="516" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> {</text>
  <text x="476" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">        while</text>
  <text x="558" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> (isFull()) notFull.await();</text>
  <text x="476" y="464" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">        add(x); notEmpty.signal();</text>
  <text x="476" y="482" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">    } finally</text>
  <text x="556" y="482" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> { lock.unlock(); }</text>
  <text x="476" y="500" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>
</svg>
