<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">파이썬다움을 이루는 습관들</text>

  <rect x="60" y="78" width="370" height="118" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="108" font-size="16" font-weight="600" fill="#e8e8e8">EAFP</text>
  <text x="84" y="134" font-size="13" fill="#cccccc">"먼저 해보고 예외를 받는다"</text>
  <text x="84" y="158" font-size="13" fill="#cccccc">검사(LBYL)보다 try/except 가</text>
  <text x="84" y="178" font-size="13" fill="#cccccc">파이썬에서는 더 자연스럽다</text>

  <rect x="450" y="78" width="370" height="118" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="474" y="108" font-size="16" font-weight="600" fill="#e8e8e8">반복은 직접 순회</text>
  <text x="474" y="134" font-size="13" fill="#cccccc">range(len(x)) 대신</text>
  <text x="474" y="158" font-size="13" fill="#cccccc">for item in x,</text>
  <text x="474" y="178" font-size="13" fill="#cccccc">enumerate, zip 을 쓴다</text>

  <rect x="60" y="216" width="370" height="118" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="246" font-size="16" font-weight="600" fill="#e8e8e8">컴프리헨션 / 언패킹</text>
  <text x="84" y="272" font-size="13" fill="#cccccc">반복+조립은 컴프리헨션으로,</text>
  <text x="84" y="296" font-size="13" fill="#cccccc">a, b = b, a 처럼</text>
  <text x="84" y="316" font-size="13" fill="#cccccc">언패킹으로 간결하게</text>

  <rect x="450" y="216" width="370" height="118" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="474" y="246" font-size="16" font-weight="600" fill="#e8e8e8">with / 표준 라이브러리</text>
  <text x="474" y="272" font-size="13" fill="#cccccc">자원 정리는 with 에 맡기고,</text>
  <text x="474" y="296" font-size="13" fill="#cccccc">바퀴를 새로 만들기 전에</text>
  <text x="474" y="316" font-size="13" fill="#cccccc">표준 라이브러리를 먼저 본다</text>
</svg>
