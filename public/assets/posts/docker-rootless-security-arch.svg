<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Rootful vs Rootless Docker 아키텍처</text>

  <!-- ── Left: Rootful ── -->
  <rect x="40" y="64" width="370" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="225" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">Rootful Docker (기존 방식)</text>

  <!-- Host process (root) -->
  <rect x="40" y="116" width="370" height="48" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="225" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">dockerd (UID 0, root)</text>
  <text x="225" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/var/run/docker.sock (root:root 660)</text>

  <line x1="225" y1="164" x2="225" y2="194" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="40" y="194" width="370" height="48" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="225" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">containerd (root) → runc (root)</text>
  <text x="225" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨테이너 프로세스 생성 (root 권한)</text>

  <line x1="225" y1="242" x2="225" y2="272" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="40" y="272" width="370" height="48" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="225" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">컨테이너 프로세스</text>
  <text x="225" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">탈출 시 호스트 root 접근 가능</text>

  <!-- ── Right: Rootless ── -->
  <rect x="470" y="64" width="370" height="36" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="655" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Rootless Docker</text>

  <!-- User namespace -->
  <rect x="470" y="116" width="370" height="48" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="655" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">dockerd (UID 1000, 일반 사용자)</text>
  <text x="655" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">~/.docker/run/docker.sock (user socket)</text>

  <line x1="655" y1="164" x2="655" y2="194" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="470" y="194" width="370" height="48" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="655" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">User Namespace 격리</text>
  <text x="655" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨테이너 내 UID 0 → 호스트 UID 100000+</text>

  <line x1="655" y1="242" x2="655" y2="272" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="470" y="272" width="370" height="48" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="655" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">컨테이너 프로세스</text>
  <text x="655" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">탈출해도 일반 사용자 권한만</text>

  <!-- Bottom comparison -->
  <rect x="40" y="348" width="800" height="116" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">주요 차이점</text>

  <text x="60" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Rootful: /var/run/docker.sock = 사실상 root 접근 권한</text>
  <text x="60" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Rootless: daemon이 일반 사용자 권한 → socket 탈취해도 해당 사용자 권한만</text>
  <text x="60" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Rootless 제약: 1024 미만 포트 바인딩 불가, 일부 스토리지 드라이버 제한</text>
  <text x="60" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">User Namespace: 컨테이너 내 UID 0이 호스트에서 비특권 UID로 매핑</text>
</svg>
