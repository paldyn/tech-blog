<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="50" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">Nexacro N 빌드 프로세스 — 소스에서 서버까지</text>
  <text x="50" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">Studio N의 빌드 기능이 소스 파일을 압축·번들링해 웹 서버에 올릴 수 있는 형태로 만드는 과정</text>
  <line x1="50" y1="90" x2="830" y2="90" stroke="#1e2433" stroke-width="1"/>

  <!-- Phase 1 Box: 소스 파일 (x=50 y=112 w=158 h=196) -->
  <rect x="50" y="112" width="158" height="196" fill="#0a0e14" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <!-- Phase 1 header -->
  <rect x="50" y="112" width="158" height="36" fill="#0d1a24" rx="8"/>
  <rect x="50" y="134" width="158" height="14" fill="#0d1a24"/>
  <text x="129" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">① 소스 파일</text>
  <!-- Phase 1 items -->
  <text x="66" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">• .xfdl  (폼 화면)</text>
  <text x="66" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">• .js    (스크립트)</text>
  <text x="66" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">• .xml   (환경설정)</text>
  <text x="66" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">• .css   (스타일시트)</text>
  <text x="66" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">• 이미지·리소스</text>
  <text x="66" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">• 공통 라이브러리</text>
  <text x="66" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">• 컴포넌트(.comp)</text>

  <!-- Arrow 1 -->
  <line x1="208" y1="210" x2="244" y2="210" stroke="#55c555" stroke-width="2"/>
  <polygon points="244,202 252,210 244,218" fill="#55c555" stroke="#030509" stroke-width="1.5"/>

  <!-- Phase 2 Box: Studio N 빌드 (x=252 y=112 w=158 h=196) -->
  <rect x="252" y="112" width="158" height="196" fill="#0a0e14" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <rect x="252" y="112" width="158" height="36" fill="#0d1e0f" rx="8"/>
  <rect x="252" y="134" width="158" height="14" fill="#0d1e0f"/>
  <text x="331" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle" xml:space="preserve">② Studio 빌드</text>
  <!-- Phase 2 items -->
  <text x="268" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">• JS 압축 (Minify)</text>
  <text x="268" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">• xfdl 컴파일·압축</text>
  <text x="268" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">• 리소스 복사</text>
  <text x="268" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">• 설정 파일 복사</text>
  <text x="268" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">• 빌드 옵션 적용</text>
  <text x="268" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">• 경로 재조정</text>
  <text x="268" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0" xml:space="preserve">• Build > Run Build</text>

  <!-- Arrow 2 -->
  <line x1="410" y1="210" x2="444" y2="210" stroke="#55c555" stroke-width="2"/>
  <polygon points="444,202 452,210 444,218" fill="#55c555" stroke="#030509" stroke-width="1.5"/>

  <!-- Phase 3 Box: 빌드 결과물 (x=452 y=112 w=158 h=196) -->
  <rect x="452" y="112" width="158" height="196" fill="#0a0e14" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <rect x="452" y="112" width="158" height="36" fill="#1e0d0d" rx="8"/>
  <rect x="452" y="134" width="158" height="14" fill="#1e0d0d"/>
  <text x="531" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle" xml:space="preserve">③ 빌드 결과물</text>
  <!-- Phase 3 items -->
  <text x="468" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">dist/</text>
  <text x="468" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">├── index.html</text>
  <text x="468" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">├── nexacro17/</text>
  <text x="468" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">├── form/</text>
  <text x="468" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">├── comp/</text>
  <text x="468" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">└── res/</text>
  <text x="468" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0" xml:space="preserve">→ 서버 업로드 준비 완료</text>

  <!-- Arrow 3 -->
  <line x1="610" y1="210" x2="644" y2="210" stroke="#55c555" stroke-width="2"/>
  <polygon points="644,202 652,210 644,218" fill="#55c555" stroke="#030509" stroke-width="1.5"/>

  <!-- Phase 4 Box: 웹 서버 배포 (x=652 y=112 w=178 h=196) -->
  <rect x="652" y="112" width="178" height="196" fill="#0a0e14" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="652" y="112" width="178" height="36" fill="#10101e" rx="8"/>
  <rect x="652" y="134" width="178" height="14" fill="#10101e"/>
  <text x="741" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle" xml:space="preserve">④ 웹 서버 배포</text>
  <!-- Phase 4 items -->
  <text x="668" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">• dist/ → 웹루트 복사</text>
  <text x="668" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">• Nginx / Apache</text>
  <text x="668" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">• CDN 원본 갱신</text>
  <text x="668" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">• 캐시 무효화</text>
  <text x="668" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">• .html .xml 재배포</text>
  <text x="668" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">• SSL·MIME 확인</text>
  <text x="668" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0" xml:space="preserve">• 브라우저 검증</text>

  <!-- Footer -->
  <text x="50" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" xml:space="preserve">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
