<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JavaScript vs TypeScript 비교</text>

  <!-- Column headers -->
  <rect x="60" y="65" width="360" height="36" rx="6" fill="#1a1a0a" stroke="#e8c840" stroke-width="1.5"/>
  <text x="240" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8c840" text-anchor="middle">JavaScript</text>

  <rect x="460" y="65" width="360" height="36" rx="6" fill="#0a1a2a" stroke="#3178c6" stroke-width="1.5"/>
  <text x="640" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">TypeScript</text>

  <!-- Row 1: 타입 시스템 -->
  <rect x="60" y="112" width="160" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="140" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">타입 시스템</text>
  <text x="140" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">동적 (런타임)</text>

  <rect x="240" y="112" width="180" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="330" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">var x = "hello"</text>
  <text x="330" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">x = 42 // 오류 없음</text>

  <rect x="460" y="112" width="160" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="540" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">타입 시스템</text>
  <text x="540" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">정적 (컴파일)</text>

  <rect x="640" y="112" width="180" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="730" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">let x: string = "hello"</text>
  <text x="730" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">x = 42 // 컴파일 오류</text>

  <!-- Row 2: 오류 감지 -->
  <rect x="60" y="174" width="160" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="140" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">오류 감지</text>
  <text x="140" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">런타임</text>

  <rect x="240" y="174" width="180" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="330" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">null.property</text>
  <text x="330" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ TypeError: 실행 중</text>

  <rect x="460" y="174" width="160" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="540" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">오류 감지</text>
  <text x="540" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">컴파일 타임</text>

  <rect x="640" y="174" width="180" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="730" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">obj?.property</text>
  <text x="730" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">→ 컴파일 전에 경고</text>

  <!-- Row 3: IDE 지원 -->
  <rect x="60" y="236" width="160" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="140" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">IDE 지원</text>
  <text x="140" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">제한적</text>

  <rect x="240" y="236" width="180" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="330" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">추론 기반 불완전</text>
  <text x="330" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자동완성 부정확</text>

  <rect x="460" y="236" width="160" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="540" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">IDE 지원</text>
  <text x="540" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">완전</text>

  <rect x="640" y="236" width="180" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="730" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">타입 기반 정확한 제안</text>
  <text x="730" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Go-to-definition 정확</text>

  <!-- Row 4: 실행 환경 -->
  <rect x="60" y="298" width="160" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="140" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">실행 환경</text>
  <text x="140" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">직접 실행</text>

  <rect x="240" y="298" width="180" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="330" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">브라우저 · Node.js</text>
  <text x="330" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빌드 불필요</text>

  <rect x="460" y="298" width="160" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="540" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">실행 환경</text>
  <text x="540" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c840" text-anchor="middle">컴파일 후 실행</text>

  <rect x="640" y="298" width="180" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="730" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">tsc → .js → 실행</text>
  <text x="730" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(ts-node 직접 실행 가능)</text>

  <!-- Summary -->
  <rect x="60" y="368" width="760" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 같은 코드, 타입만 추가 — TypeScript</text>
  <text x="76" y="412" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Status = <tspan fill="#ce9178">'active'</tspan> | <tspan fill="#ce9178">'inactive'</tspan> | <tspan fill="#ce9178">'pending'</tspan>;</text>
  <text x="76" y="432" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> setStatus(s: Status): <tspan fill="#ce9178">void</tspan> { ... }</text>
  <text x="76" y="452" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">setStatus(<tspan fill="#ce9178">'deleted'</tspan>); <tspan fill="#9aa4b8">// 오류: 'deleted'는 Status가 아님</tspan></text>
  <text x="76" y="468" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">setStatus(<tspan fill="#ce9178">'active'</tspan>);  <tspan fill="#9aa4b8">// OK</tspan></text>
</svg>
