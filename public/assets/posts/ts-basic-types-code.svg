<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 기본 타입 선언</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">각 타입의 선언 방법과 허용/불허 예시</text>

  <!-- Left: Declarations -->
  <rect x="60" y="96" width="380" height="340" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 원시 타입</tspan></text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> age: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">25</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> active: </tspan><tspan fill="#7ec8e3" font-weight="600">boolean</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="76" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 배열 타입 (2가지 표현)</tspan></text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> nums: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">[] = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">];</tspan></text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> strs: Array&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">&gt; = [</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#ffffff">];</tspan></text>

  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 객체 타입</tspan></text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> user: { name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">; age: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff"> } = {</tspan></text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  name: </tspan><tspan fill="#ce9178">"Bob"</tspan><tspan fill="#ffffff">, age: </tspan><tspan fill="#b5cea8">30</tspan></text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">};</text>

  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 튜플 타입</tspan></text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> pair: [</tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">] = [</tspan><tspan fill="#ce9178">"age"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">25</tspan><tspan fill="#ffffff">];</tspan></text>

  <!-- Right: type checking results -->
  <rect x="460" y="96" width="360" height="340" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">타입 안전성 예시</text>
  <line x1="460" y1="132" x2="820" y2="132" stroke="#222" stroke-width="1"/>

  <text x="480" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">허용되는 연산</text>
  <rect x="480" y="168" width="320" height="80" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">age + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#9aa4b8">         // 26 (OK)</tspan></text>
  <text x="496" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">name.toUpperCase()</tspan><tspan fill="#9aa4b8"> // OK</tspan></text>
  <text x="496" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">active ? </tspan><tspan fill="#ce9178">"yes"</tspan><tspan fill="#ffffff"> : </tspan><tspan fill="#ce9178">"no"</tspan><tspan fill="#9aa4b8"> // OK</tspan></text>
  <text x="496" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">nums.map(x =&gt; x * </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8"> // OK</tspan></text>

  <text x="480" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">거부되는 연산</text>
  <rect x="480" y="290" width="320" height="100" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e05555">age = </tspan><tspan fill="#ce9178">"twenty-five"</tspan><tspan fill="#9aa4b8"> // Error!</tspan></text>
  <text x="496" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e05555">nums.push(</tspan><tspan fill="#ce9178">"four"</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8">  // Error!</tspan></text>
  <text x="496" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e05555">user.email</tspan><tspan fill="#9aa4b8">           // Error!</tspan></text>
  <text x="496" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#9aa4b8">// 존재하지 않는 프로퍼티</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">모든 타입 오류는 IDE에서 실시간으로 표시되며 tsc 실행 시에도 보고됩니다</text>
</svg>
