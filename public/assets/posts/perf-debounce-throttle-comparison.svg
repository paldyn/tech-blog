<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">디바운스 vs 스로틀 — 호출 패턴 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">연속 이벤트 발생 시 실제 함수 실행 시점</text>

  <!-- Timeline axis -->
  <line x1="60" y1="120" x2="820" y2="120" stroke="#333" stroke-width="1"/>
  <text x="60" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">0ms</text>
  <text x="790" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">1000ms</text>

  <!-- Raw events (keystrokes) -->
  <text x="60" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">원본 이벤트</text>
  <!-- event dots -->
  <circle cx="120" cy="168" r="5" fill="#555"/>
  <circle cx="170" cy="168" r="5" fill="#555"/>
  <circle cx="210" cy="168" r="5" fill="#555"/>
  <circle cx="260" cy="168" r="5" fill="#555"/>
  <circle cx="310" cy="168" r="5" fill="#555"/>
  <circle cx="460" cy="168" r="5" fill="#555"/>
  <circle cx="510" cy="168" r="5" fill="#555"/>
  <circle cx="560" cy="168" r="5" fill="#555"/>
  <circle cx="680" cy="168" r="5" fill="#555"/>
  <circle cx="730" cy="168" r="5" fill="#555"/>
  <circle cx="780" cy="168" r="5" fill="#555"/>
  <line x1="60" y1="168" x2="820" y2="168" stroke="#222" stroke-width="1"/>

  <!-- Debounce row -->
  <text x="60" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">디바운스</text>
  <text x="60" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(300ms 대기)</text>
  <line x1="60" y1="258" x2="820" y2="258" stroke="#222" stroke-width="1"/>
  <!-- Debounce fires: after last of each burst + 300ms -->
  <!-- burst 1 ends at 310, fires at 610 -->
  <rect x="120" y="243" width="190" height="14" rx="3" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="215" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">대기 중</text>
  <circle cx="610" cy="258" r="7" fill="#7ec8e3"/>
  <text x="610" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">실행</text>
  <!-- burst 2: 460-560, fires at 860 -->
  <rect x="460" y="243" width="100" height="14" rx="3" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <circle cx="860" cy="258" r="7" fill="#7ec8e3"/>
  <text x="860" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">실행</text>
  <!-- burst 3: 680-780 -->
  <rect x="680" y="243" width="100" height="14" rx="3" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>

  <!-- Throttle row -->
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">스로틀</text>
  <text x="60" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(250ms 간격)</text>
  <line x1="60" y1="358" x2="820" y2="358" stroke="#222" stroke-width="1"/>
  <!-- Throttle fires every 250ms from first event -->
  <circle cx="120" cy="358" r="7" fill="#55c555"/>
  <text x="120" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">실행</text>
  <circle cx="370" cy="358" r="7" fill="#55c555"/>
  <text x="370" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">실행</text>
  <circle cx="510" cy="358" r="7" fill="#55c555"/>
  <text x="510" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">실행</text>
  <circle cx="730" cy="358" r="7" fill="#55c555"/>
  <text x="730" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">실행</text>

  <!-- Summary boxes -->
  <rect x="60" y="405" width="360" height="60" rx="8" fill="#0d1f2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">디바운스 — 마지막 호출 후 N ms</text>
  <text x="240" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">검색 입력, 자동저장, 윈도우 리사이즈</text>

  <rect x="460" y="405" width="360" height="60" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">스로틀 — 최대 N ms에 1회</text>
  <text x="640" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">스크롤 위치, 게임 입력, API 요청 제한</text>
</svg>
