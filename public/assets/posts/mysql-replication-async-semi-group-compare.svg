<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" marketHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MySQL 리플리케이션 방식 비교</text>

  <!-- === ASYNC === -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e0aa55">① 비동기 리플리케이션 (기본)</text>

  <rect x="40" y="90" width="100" height="52" fill="#1e1a0a" rx="6" stroke="#e0aa55" stroke-width="1.5"/>
  <text x="90" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0aa55" text-anchor="middle">Source</text>
  <text x="90" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">(Primary)</text>

  <line x1="140" y1="116" x2="200" y2="116" stroke="#e0aa55" stroke-width="2" marker-end="url(#arr)"/>
  <text x="170" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">binlog</text>

  <rect x="200" y="90" width="100" height="52" fill="#1e1a0a" rx="6" stroke="#e0aa55" stroke-width="1.5"/>
  <text x="250" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0aa55" text-anchor="middle">Replica</text>

  <rect x="320" y="90" width="140" height="52" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="390" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">ACK 없음</text>
  <text x="390" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0aa55" text-anchor="middle">Source가 즉시 COMMIT</text>

  <rect x="480" y="90" width="360" height="52" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="660" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">장점: 최저 지연·최고 쓰기 성능</text>
  <text x="660" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">단점: Source 장애 시 최신 데이터 손실 가능</text>

  <!-- === SEMI-SYNC === -->
  <text x="60" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">② 반동기 리플리케이션 (Semi-sync)</text>

  <rect x="40" y="184" width="100" height="52" fill="#0e1a2e" rx="6" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="90" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Source</text>

  <line x1="140" y1="210" x2="200" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="170" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">binlog</text>

  <rect x="200" y="184" width="100" height="52" fill="#0e1a2e" rx="6" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="250" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Replica</text>

  <!-- ACK back -->
  <line x1="200" y1="225" x2="140" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="170" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">ACK</text>

  <rect x="320" y="184" width="140" height="52" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="390" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">ACK 확인 후 COMMIT</text>
  <text x="390" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">rpl_semi_sync 플러그인</text>

  <rect x="480" y="184" width="360" height="52" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="660" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">장점: 최소 1개 레플리카에 전달 보장</text>
  <text x="660" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단점: ACK 지연만큼 쓰기 지연 / 타임아웃 시 비동기 전환</text>

  <!-- === GROUP REPLICATION === -->
  <text x="60" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">③ 그룹 리플리케이션 (MGR)</text>

  <!-- Members in circle-like layout -->
  <rect x="40" y="280" width="90" height="52" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="85" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Member 1</text>
  <text x="85" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Primary</text>

  <line x1="130" y1="306" x2="160" y2="306" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="160" y="280" width="90" height="52" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="205" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Member 2</text>
  <text x="205" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Secondary</text>

  <line x1="250" y1="306" x2="280" y2="306" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="280" y="280" width="90" height="52" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="325" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Member 3</text>
  <text x="325" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Secondary</text>

  <rect x="400" y="280" width="200" height="52" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="500" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Paxos 합의 프로토콜</text>
  <text x="500" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">과반수(N/2+1) 승인 후 COMMIT</text>

  <rect x="620" y="280" width="220" height="52" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="730" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Primary 장애 시 자동 선출</text>
  <text x="730" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">InnoDB Cluster 기반</text>

  <!-- Summary table -->
  <text x="60" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">리플리케이션 방식 비교</text>

  <rect x="40" y="380" width="240" height="108" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0aa55" text-anchor="middle">비동기</text>
  <text x="160" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">쓰기 성능 최고</text>
  <text x="160" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 손실 가능</text>
  <text x="160" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단순 읽기 확장용</text>
  <text x="160" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0aa55" text-anchor="middle">RPO > 0</text>

  <rect x="300" y="380" width="240" height="108" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="420" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">반동기</text>
  <text x="420" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">약간의 쓰기 지연</text>
  <text x="420" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 손실 최소화</text>
  <text x="420" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HA 전환은 수동</text>
  <text x="420" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">RPO ≈ 0 (ACK 있는 경우)</text>

  <rect x="560" y="380" width="280" height="108" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="700" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">그룹 리플리케이션</text>
  <text x="700" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">가장 강한 일관성</text>
  <text x="700" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자동 페일오버</text>
  <text x="700" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">멀티 프라이머리 가능</text>
  <text x="700" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">RPO = 0 (과반수 승인)</text>
</svg>
