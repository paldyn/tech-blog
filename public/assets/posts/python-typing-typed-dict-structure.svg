<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <defs>
    <marker id="td_arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypedDict — dict에 키 구조를 부여</text>

  <!-- left: plain dict -->
  <rect x="60" y="80" width="320" height="170" rx="8" fill="#111418" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="108" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">dict[str, Any]</text>
  <text x="220" y="140" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa" text-anchor="middle">어떤 키가 있는지,</text>
  <text x="220" y="162" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa" text-anchor="middle">각 값이 무슨 타입인지</text>
  <text x="220" y="184" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa" text-anchor="middle">검사기가 알 수 없다.</text>
  <text x="220" y="216" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#888888" text-anchor="middle">u["nmae"]  # 오타도 통과</text>

  <!-- right: TypedDict -->
  <rect x="500" y="80" width="320" height="170" rx="8" fill="#111418" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="108" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">class User(TypedDict)</text>
  <text x="660" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#ffffff" text-anchor="middle">name: str</text>
  <text x="660" y="162" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#ffffff" text-anchor="middle">age: int</text>
  <text x="660" y="190" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa" text-anchor="middle">키 이름·값 타입이 고정.</text>
  <text x="660" y="216" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#b5cea8" text-anchor="middle">u["nmae"]  # 오타 → 오류</text>

  <!-- arrow -->
  <line x1="380" y1="165" x2="500" y2="165" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#td_arr)"/>
  <text x="440" y="155" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">구조 부여</text>
</svg>
