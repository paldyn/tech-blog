<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Docker Content Trust (DCT) 서명 흐름</text>

  <!-- Publisher side -->
  <rect x="40" y="62" width="240" height="36" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">게시자 (Publisher)</text>

  <rect x="40" y="114" width="240" height="52" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="160" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">이미지 빌드</text>
  <text x="160" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">docker build -t myimage:1.0 .</text>

  <line x1="160" y1="166" x2="160" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="40" y="196" width="240" height="52" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="160" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">DCT 활성화 후 push</text>
  <text x="160" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DOCKER_CONTENT_TRUST=1</text>

  <line x1="160" y1="248" x2="160" y2="278" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="40" y="278" width="240" height="52" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Notary (TUF) 서명</text>
  <text x="160" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">루트 키 + 타겟 키로 서명 생성</text>

  <!-- Registry Center -->
  <rect x="340" y="180" width="200" height="168" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">레지스트리</text>
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이미지 레이어 저장</text>
  <line x1="400" y1="244" x2="480" y2="244" stroke="#333" stroke-width="1"/>
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Notary 서버</text>
  <text x="440" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서명 메타데이터 저장</text>
  <text x="440" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TUF 프레임워크 기반</text>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">digest ↔ 서명 매핑</text>

  <!-- Arrow: publisher → registry -->
  <line x1="280" y1="300" x2="340" y2="300" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Consumer side -->
  <rect x="600" y="62" width="240" height="36" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">소비자 (Consumer)</text>

  <rect x="600" y="114" width="240" height="52" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="720" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">DCT 활성화 후 pull</text>
  <text x="720" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DOCKER_CONTENT_TRUST=1</text>

  <line x1="720" y1="166" x2="720" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="600" y="196" width="240" height="52" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="720" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Notary에서 서명 검증</text>
  <text x="720" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">루트 신뢰 체인 검증</text>

  <line x1="720" y1="248" x2="720" y2="278" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Two outcomes -->
  <rect x="600" y="278" width="110" height="52" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="655" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">서명 유효</text>
  <text x="655" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pull 허용</text>

  <rect x="730" y="278" width="110" height="52" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="785" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">서명 없음/불일치</text>
  <text x="785" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pull 거부</text>

  <line x1="680" y1="248" x2="655" y2="278" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="760" y1="248" x2="785" y2="278" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Arrow: registry → consumer -->
  <line x1="540" y1="248" x2="600" y2="248" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Key types box -->
  <rect x="60" y="370" width="760" height="112" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">키 유형</text>

  <text x="100" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Root Key</text>
  <text x="100" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최상위 신뢰 앵커 — 오프라인 보관 권장</text>
  <text x="100" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">~/.docker/trust/private/</text>

  <text x="360" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Targets Key</text>
  <text x="360" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리포지터리별 서명 키</text>
  <text x="360" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">push할 때마다 사용</text>

  <text x="620" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Snapshot / Timestamp</text>
  <text x="620" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메타데이터 freshness 보장</text>
  <text x="620" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Notary 서버가 자동 관리</text>
</svg>
