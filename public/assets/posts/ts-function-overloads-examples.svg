<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">함수 오버로드 실전 예제</text>

  <!-- Left: createElement overload -->
  <text x="230" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">createElement 오버로드</text>

  <rect x="60" y="88" width="340" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 오버로드 시그니처들</text>
  <text x="75" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> createElement(</tspan>
  </text>
  <text x="75" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  tag: </tspan>
    <tspan fill="#ce9178">'div'</tspan>
    <tspan fill="#ffffff">): HTMLDivElement;</tspan>
  </text>
  <text x="75" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> createElement(</tspan>
  </text>
  <text x="75" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  tag: </tspan>
    <tspan fill="#ce9178">'span'</tspan>
    <tspan fill="#ffffff">): HTMLSpanElement;</tspan>
  </text>
  <text x="75" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 구현 시그니처</text>
  <text x="75" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> createElement(tag: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="75" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  : HTMLElement {</tspan>
  </text>
  <text x="75" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> document</tspan>
  </text>
  <text x="75" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">    .createElement(tag);</tspan>
  </text>
  <text x="75" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Right: format overload -->
  <text x="650" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">format 유틸리티 오버로드</text>

  <rect x="480" y="88" width="340" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="495" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> format(val: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">Date</tspan>
    <tspan fill="#ffffff">): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="495" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> format(val: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="495" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  digits: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="495" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 구현</text>
  <text x="495" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> format(val: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">any</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="495" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  d?: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="495" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">  if</tspan>
    <tspan fill="#ffffff"> (val </tspan>
    <tspan fill="#7ec8e3" font-weight="600">instanceof</tspan>
    <tspan fill="#ffffff"> Date)</tspan>
  </text>
  <text x="495" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ffffff"> val.toISOString();</tspan>
  </text>
  <text x="495" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> val.toFixed(d);</tspan>
  </text>
  <text x="495" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Bottom: Usage -->
  <rect x="60" y="348" width="760" height="90" rx="6" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">호출 예시 — 타입 자동 추론</text>
  <text x="100" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> div = createElement(</tspan>
    <tspan fill="#ce9178">'div'</tspan>
    <tspan fill="#ffffff">);    </tspan>
    <tspan fill="#9aa4b8">// 타입: HTMLDivElement</tspan>
  </text>
  <text x="100" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> d = format(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">new</tspan>
    <tspan fill="#ffffff"> Date());       </tspan>
    <tspan fill="#9aa4b8">// 타입: string</tspan>
  </text>
  <text x="100" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> n = format(</tspan>
    <tspan fill="#b5cea8">3.14159</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">);     </tspan>
    <tspan fill="#9aa4b8">// 타입: string ("3.14")</tspan>
  </text>
</svg>
