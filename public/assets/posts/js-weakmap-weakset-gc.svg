<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">WeakMap — 약한 참조와 GC</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">키 객체가 사라지면 항목도 자동 정리</text>

  <!-- 왼쪽: Map (강한 참조) -->
  <rect x="60" y="96" width="350" height="200" rx="8" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="235" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">Map — 강한 참조</text>

  <!-- DOM 노드 박스 -->
  <rect x="80" y="128" width="120" height="50" rx="6" fill="#1e2433" stroke="#7ec8e3"/>
  <text x="140" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">DOM 노드</text>
  <text x="140" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">el (객체)</text>

  <!-- 화살표 → Map -->
  <line x1="200" y1="153" x2="240" y2="153" stroke="#e05555" stroke-width="2"/>
  <polygon points="240,153 230,147 230,159" fill="#e05555"/>
  <text x="220" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">키</text>

  <!-- Map 박스 -->
  <rect x="240" y="128" width="140" height="50" rx="6" fill="#1e2433" stroke="#e05555"/>
  <text x="310" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Map</text>
  <text x="310" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">{ el → data }</text>

  <!-- 삭제 후 -->
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DOM에서 el 제거 후:</text>
  <rect x="80" y="220" width="120" height="40" rx="6" fill="#1e2433" stroke="#444" stroke-dasharray="4,3"/>
  <text x="140" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#444" text-anchor="middle">el 참조 없음</text>

  <!-- 화살표 → Map (여전히 존재) -->
  <line x1="200" y1="240" x2="240" y2="240" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="240,240 230,234 230,246" fill="#e05555"/>

  <rect x="240" y="220" width="140" height="40" rx="6" fill="#1e2433" stroke="#e05555"/>
  <text x="310" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">Map에 여전히 존재!</text>
  <text x="140" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">→ 메모리 누수!</text>

  <!-- 오른쪽: WeakMap (약한 참조) -->
  <rect x="460" y="96" width="360" height="200" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">WeakMap — 약한 참조</text>

  <!-- DOM 노드 박스 -->
  <rect x="480" y="128" width="120" height="50" rx="6" fill="#1e2433" stroke="#7ec8e3"/>
  <text x="540" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">DOM 노드</text>
  <text x="540" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">el (객체)</text>

  <!-- 화살표 → WeakMap -->
  <line x1="600" y1="153" x2="640" y2="153" stroke="#55c555" stroke-width="2" stroke-dasharray="3,2"/>
  <polygon points="640,153 630,147 630,159" fill="#55c555"/>
  <text x="620" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">약한 키</text>

  <!-- WeakMap 박스 -->
  <rect x="640" y="128" width="160" height="50" rx="6" fill="#1e2433" stroke="#55c555"/>
  <text x="720" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">WeakMap</text>
  <text x="720" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">{ el → data }</text>

  <!-- 삭제 후 -->
  <text x="480" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DOM에서 el 제거 후:</text>
  <rect x="480" y="220" width="120" height="40" rx="6" fill="#070b14" stroke="#444" stroke-dasharray="4,3"/>
  <text x="540" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">el GC 수거됨</text>

  <!-- WeakMap도 정리 -->
  <rect x="640" y="220" width="160" height="40" rx="6" fill="#070b14" stroke="#444" stroke-dasharray="4,3"/>
  <text x="720" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">항목 자동 제거 ✓</text>
  <text x="540" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">→ 메모리 누수 없음!</text>

  <!-- 코드 비교 -->
  <rect x="60" y="320" width="760" height="120" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// WeakMap: 키는 반드시 객체 (또는 등록된 Symbol)</text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text>
  <text x="112" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> wm = </text>
  <text x="152" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">new</text>
  <text x="176" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> WeakMap();</text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">let</text>
  <text x="104" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> obj = {};</text>
  <text x="76" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">wm.set(obj, </text>
  <text x="180" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'메타데이터'</text>
  <text x="276" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">);</text>
  <text x="76" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">obj = </text>
  <text x="124" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">null</text>
  <text x="152" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="200" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// GC가 수거하면 wm 항목도 사라짐 (비결정적 타이밍)</text>
  <text x="76" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// wm.size 없음 / wm.forEach 없음 / 순회 불가</text>

  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
