<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Optional 값 추출 메서드 비교</text>

  <!-- Table header -->
  <rect x="60" y="64" width="760" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">메서드</text>
  <text x="380" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">값 있을 때</text>
  <text x="600" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">값 없을 때</text>

  <!-- Rows -->
  <rect x="60" y="104" width="760" height="36" rx="0" fill="#0d0d14" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">get()</text>
  <text x="380" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">T 반환</text>
  <text x="600" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">NoSuchElementException</text>

  <rect x="60" y="140" width="760" height="36" rx="0" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">orElse(T)</text>
  <text x="380" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">T 반환</text>
  <text x="600" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">기본값 반환 (항상 평가)</text>

  <rect x="60" y="176" width="760" height="36" rx="0" fill="#0d0d14" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">orElseGet(Supplier)</text>
  <text x="380" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">T 반환</text>
  <text x="600" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Supplier 실행 후 반환 (지연)</text>

  <rect x="60" y="212" width="760" height="36" rx="0" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">orElseThrow()</text>
  <text x="380" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">T 반환</text>
  <text x="600" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">NoSuchElementException</text>

  <rect x="60" y="248" width="760" height="36" rx="0" fill="#0d0d14" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">orElseThrow(Supplier)</text>
  <text x="380" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">T 반환</text>
  <text x="600" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">커스텀 예외 던짐</text>

  <rect x="60" y="284" width="760" height="36" rx="0" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="307" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">ifPresent(Consumer)</text>
  <text x="380" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Consumer 실행</text>
  <text x="600" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">아무것도 안 함</text>

  <rect x="60" y="320" width="760" height="36" rx="0" fill="#0d0d14" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="343" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="middle">ifPresentOrElse</text>
  <text x="380" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">첫 번째 Consumer 실행</text>
  <text x="600" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">두 번째 Runnable 실행 (Java9)</text>

  <!-- orElse vs orElseGet note -->
  <rect x="60" y="374" width="760" height="36" rx="6" fill="#2a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" text-anchor="middle">⚠ orElse(expensive())는 항상 expensive()를 호출 — 비용이 크면 orElseGet(() -&gt; expensive()) 사용</text>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">orElseGet은 Optional이 비어 있을 때만 Supplier 실행</text>
</svg>
