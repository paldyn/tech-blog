<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메모이제이션 구현 방식 비교</text>

  <!-- lru_cache -->
  <rect x="60" y="68" width="360" height="150" rx="8" fill="#0f1a2e" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">functools.lru_cache</text>
  <rect x="76" y="100" width="328" height="104" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> functools </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> lru_cache</tspan>
  </text>
  <text x="90" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#55c555">@lru_cache(maxsize=</tspan>
    <tspan fill="#b5cea8">128</tspan>
    <tspan fill="#55c555">)</tspan>
  </text>
  <text x="90" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> expensive(n): ...</tspan>
  </text>
  <text x="90" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># LRU: Least Recently Used</tspan>
  </text>
  <text x="90" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"> </text>
  <text x="90" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># maxsize=None → 무제한 (cache)</tspan>
  </text>

  <!-- cache (3.9+) -->
  <rect x="460" y="68" width="360" height="150" rx="8" fill="#0f2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">functools.cache (3.9+)</text>
  <rect x="476" y="100" width="328" height="104" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> functools </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> cache</tspan>
  </text>
  <text x="490" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#55c555">@cache</tspan>
    <tspan fill="#9aa4b8">  # = @lru_cache(maxsize=None)</tspan>
  </text>
  <text x="490" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> expensive(n): ...</tspan>
  </text>
  <text x="490" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># Python 3.9+에서 권장</tspan>
  </text>
  <text x="490" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># 더 명시적, 크기 무제한</tspan>
  </text>

  <!-- Custom dict memo -->
  <rect x="60" y="238" width="360" height="140" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">딕셔너리 수동 메모이제이션</text>
  <rect x="76" y="270" width="328" height="94" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">_cache = {}</tspan>
  </text>
  <text x="90" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> expensive(n):</tspan>
  </text>
  <text x="90" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    if</tspan>
    <tspan fill="#ffffff"> n </tspan>
    <tspan fill="#7ec8e3" font-weight="600">not in</tspan>
    <tspan fill="#ffffff"> _cache:</tspan>
  </text>
  <text x="90" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        _cache[n] = slow_calc(n)</tspan>
  </text>
  <text x="90" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"> </text>

  <!-- class-based memo -->
  <rect x="460" y="238" width="360" height="140" rx="8" fill="#2a1a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">TTL 캐시 (시간 만료)</text>
  <rect x="476" y="270" width="328" height="94" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> time</tspan>
  </text>
  <text x="490" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">_cache = {}; _ts = {}</tspan>
  </text>
  <text x="490" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> with_ttl(key, ttl=</tspan>
    <tspan fill="#b5cea8">60</tspan>
    <tspan fill="#ffffff">):</tspan>
  </text>
  <text x="490" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    if</tspan>
    <tspan fill="#ffffff"> time.time()-_ts.get(key,</tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">) &lt; ttl:</tspan>
  </text>
  <text x="490" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">        return _cache.get(key)</tspan>
  </text>
</svg>
