<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 다중 컬럼 정렬 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">setSort와 그리드 헤더 클릭 정렬 연동 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="256" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text xml:space="preserve" x="76" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 단일 컬럼 정렬</text>
  <text xml:space="preserve" x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">ds.setSortByField(<tspan fill="#ce9178">"AMT"</tspan>, <tspan fill="#ce9178">"DESC"</tspan>);</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 다중 컬럼 정렬 (setSort 사용)</text>
  <text xml:space="preserve" x="76" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">// DEPT_CD ASC, 그 안에서 AMT DESC</tspan></text>
  <text xml:space="preserve" x="76" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">ds.setSort(<tspan fill="#ce9178">"DEPT_CD:A,AMT:D"</tspan>);</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 그리드 헤더 클릭 → 토글 정렬</text>
  <text xml:space="preserve" x="76" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text>
  <text xml:space="preserve" x="76" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">         grid_onheaderclick(o, e) {</text>
  <text xml:space="preserve" x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#7ec8e3">var</tspan> dir = e.sorttype; <tspan fill="#6a8aa0">// "asc"/"desc"</tspan></text>
  <text xml:space="preserve" x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  ds.setSortByField(e.colid, dir);</text>
  <text xml:space="preserve" x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">}</text>

  <!-- Note -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">setSort 문자열에서 :A=오름차순, :D=내림차순, 콤마로 다중 컬럼 구분</text>
</svg>
