<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">children prop과 중첩 구조</text>

  <!-- code example -->
  <rect x="60" y="76" width="760" height="230" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="100" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* 자식이 하나면 children은 단일 값, 여러 개면 배열 */}
  </text>
  <text x="80" y="122" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan> a = &lt;p&gt;Hello&lt;/p&gt;;</tspan>
  </text>
  <text x="80" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#9aa4b8">{/* a.props.children === "Hello" (문자열) */}</tspan>
  </text>
  <text x="80" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan> b = &lt;p&gt;&lt;span&gt;A&lt;/span&gt;&lt;span&gt;B&lt;/span&gt;&lt;/p&gt;;</tspan>
  </text>
  <text x="80" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#9aa4b8">{/* b.props.children === [element, element] (배열) */}</tspan>
  </text>
  <text x="80" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#9aa4b8">{/* 컴포넌트에서 children 받기 */}</tspan>
  </text>
  <text x="80" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Card({ children }) {</tspan>
  </text>
  <text x="80" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> &lt;div className=</tspan><tspan fill="#ce9178">"card"</tspan><tspan>&gt;{children}&lt;/div&gt;;</tspan>
  </text>
  <text x="80" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>}</tspan>
  </text>
  <text x="80" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>&lt;Card&gt;&lt;p&gt;내용&lt;/p&gt;&lt;/Card&gt;  </tspan>
    <tspan fill="#9aa4b8">{/* children = &lt;p&gt;내용&lt;/p&gt; */}</tspan>
  </text>

  <!-- key insight boxes -->
  <rect x="60" y="330" width="360" height="76" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">JSX Element는 불변(immutable)</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">생성 후 props/children 직접 수정 불가</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">새 상태 → 새 Element 객체 생성</text>

  <rect x="460" y="330" width="360" height="76" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">$$typeof: Symbol — XSS 방어</text>
  <text x="480" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">JSON.parse 결과엔 Symbol 없음</text>
  <text x="480" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">외부 JSON을 그대로 렌더할 수 없음</text>
</svg>
