<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">프로젝트 구조와 수집 시작점</text>

  <rect x="60" y="86" width="430" height="206" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">myproject/</text>
  <text xml:space="preserve" x="100" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pyproject.toml</text>
  <text xml:space="preserve" x="100" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">src/mypkg/...</text>
  <text xml:space="preserve" x="100" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">tests/</text>
  <text xml:space="preserve" x="124" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">conftest.py</text>
  <text xml:space="preserve" x="124" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_core.py</text>
  <text xml:space="preserve" x="124" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_api.py</text>

  <rect x="530" y="100" width="290" height="80" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="130" font-size="14" font-weight="600" fill="#7ec8e3">rootdir 자동 탐지</text>
  <text x="550" y="154" font-size="12" fill="#888">설정 파일 위치 기준으로</text>
  <text x="550" y="172" font-size="12" fill="#888">경로·import를 정한다</text>

  <rect x="530" y="196" width="290" height="80" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="550" y="226" font-size="14" font-weight="600" fill="#55c555">conftest.py</text>
  <text x="550" y="250" font-size="12" fill="#888">공유 fixture·설정을</text>
  <text x="550" y="268" font-size="12" fill="#888">하위 테스트가 자동 사용</text>

  <text x="60" y="308" font-size="13" fill="#888" xml:space="preserve">tests/ 폴더로 분리하고 conftest.py에 공통 fixture를 두면, 어느 디렉터리에서 실행해도 일관되게 수집된다.</text>
</svg>
