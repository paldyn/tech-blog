<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">셀: 코드와 설명을 한 문서에</text>

  <rect x="110" y="76" width="710" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="110" font-size="13" fill="#7777cc" text-anchor="middle">[1]</text>
  <text xml:space="preserve" x="128" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">import</tspan> pandas <tspan fill="#7ec8e3" font-weight="600">as</tspan> pd</text>
  <text xml:space="preserve" x="128" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 코드 셀: 실행하면 결과가 바로 아래 표시</text>

  <rect x="110" y="146" width="710" height="48" rx="6" fill="#0f1320" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="174" font-size="13" fill="#9aa4b8" text-anchor="middle">md</text>
  <text x="128" y="166" font-size="14" font-weight="600" fill="#e8e8e8"># 마크다운 셀</text>
  <text x="128" y="186" font-size="13" fill="#9aa4b8">설명·제목·수식을 서식 있는 텍스트로 작성</text>

  <text x="80" y="234" font-size="13" fill="#7777cc" text-anchor="middle">[2]</text>
  <rect x="110" y="206" width="710" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="128" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">df.head()</text>
  <text xml:space="preserve" x="128" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 마지막 표현식은 print 없이도 출력됨</text>
  <text xml:space="preserve" x="128" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">→ 표·그래프가 셀 아래에 인라인으로</text>
</svg>
