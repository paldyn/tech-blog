<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">가변 메서드 vs 불변 메서드</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">원본 배열 변경 여부 기준 분류</text>

  <!-- Left: Mutating Methods -->
  <rect x="60" y="88" width="340" height="380" rx="10" fill="#1a0808" stroke="#5c1a1a" stroke-width="1.5"/>
  <text x="230" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">⚠ 가변 (Mutating)</text>
  <text x="230" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원본 배열을 직접 변경</text>
  <line x1="80" y1="146" x2="380" y2="146" stroke="#5c1a1a" stroke-width="1"/>

  <!-- Mutating rows -->
  <rect x="78" y="154" width="304" height="26" rx="4" fill="#1f0f0f"/>
  <text x="150" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">push / pop</text>
  <text x="270" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">끝에 추가/제거</text>

  <rect x="78" y="186" width="304" height="26" rx="4" fill="#1a0808"/>
  <text x="150" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">shift / unshift</text>
  <text x="290" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">앞에 제거/추가</text>

  <rect x="78" y="218" width="304" height="26" rx="4" fill="#1f0f0f"/>
  <text x="150" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">splice</text>
  <text x="210" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">임의 위치 삽입/삭제</text>

  <rect x="78" y="250" width="304" height="26" rx="4" fill="#1a0808"/>
  <text x="150" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">sort</text>
  <text x="190" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">제자리 정렬</text>

  <rect x="78" y="282" width="304" height="26" rx="4" fill="#1f0f0f"/>
  <text x="150" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">reverse</text>
  <text x="222" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">제자리 역순</text>

  <rect x="78" y="314" width="304" height="26" rx="4" fill="#1a0808"/>
  <text x="150" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">fill</text>
  <text x="182" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">값으로 채우기</text>

  <rect x="78" y="346" width="304" height="26" rx="4" fill="#1f0f0f"/>
  <text x="150" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">copyWithin</text>
  <text x="246" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">내부 복사</text>

  <text x="230" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">원본 데이터가 손실될 수 있음</text>
  <text x="230" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">React 상태, 불변 데이터에 위험</text>

  <!-- Right: Immutable Methods -->
  <rect x="480" y="88" width="340" height="380" rx="10" fill="#0a1a0a" stroke="#1a5c1a" stroke-width="1.5"/>
  <text x="650" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">✓ 불변 (Non-mutating)</text>
  <text x="650" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 배열 또는 값 반환</text>
  <line x1="500" y1="146" x2="800" y2="146" stroke="#1a5c1a" stroke-width="1"/>

  <!-- Immutable rows -->
  <rect x="498" y="154" width="304" height="26" rx="4" fill="#0f1f0f"/>
  <text x="570" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">map / filter</text>
  <text x="680" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 배열 생성</text>

  <rect x="498" y="186" width="304" height="26" rx="4" fill="#0a1a0a"/>
  <text x="570" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">slice</text>
  <text x="608" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">부분 복사 반환</text>

  <rect x="498" y="218" width="304" height="26" rx="4" fill="#0f1f0f"/>
  <text x="570" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">concat / flat</text>
  <text x="678" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 배열 병합/평탄화</text>

  <rect x="498" y="250" width="304" height="26" rx="4" fill="#0a1a0a"/>
  <text x="570" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">toSorted</text>
  <text x="648" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">ES2023 ★ sort 불변판</text>

  <rect x="498" y="282" width="304" height="26" rx="4" fill="#0f1f0f"/>
  <text x="570" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">toReversed</text>
  <text x="660" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">ES2023 ★ reverse 불변판</text>

  <rect x="498" y="314" width="304" height="26" rx="4" fill="#0a1a0a"/>
  <text x="570" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">toSpliced</text>
  <text x="648" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">ES2023 ★ splice 불변판</text>

  <rect x="498" y="346" width="304" height="26" rx="4" fill="#0f1f0f"/>
  <text x="570" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">with</text>
  <text x="604" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">ES2023 ★ 단일 요소 교체</text>

  <text x="650" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">원본 보존 — 안전한 상태 관리</text>
  <text x="650" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">함수형 패턴 · 불변 상태 친화</text>

  <!-- Footer -->
  <text x="440" y="488" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — JavaScript 완전 정복</text>
</svg>
