<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">접근 제한자 비교</text>

  <!-- Header row -->
  <rect x="60" y="64" width="760" height="46" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="170" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">제한자</text>
  <text x="360" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">클래스 내부</text>
  <text x="550" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">서브클래스</text>
  <text x="740" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">외부</text>

  <!-- public row -->
  <rect x="60" y="118" width="760" height="58" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">public</text>
  <text x="170" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(기본값)</text>
  <text x="360" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555" text-anchor="middle">✓</text>
  <text x="550" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555" text-anchor="middle">✓</text>
  <text x="740" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555" text-anchor="middle">✓</text>

  <!-- protected row -->
  <rect x="60" y="184" width="760" height="58" rx="6" fill="#1a1200" stroke="#e0a020" stroke-width="1"/>
  <text x="170" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="600" fill="#e0a020" text-anchor="middle">protected</text>
  <text x="360" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555" text-anchor="middle">✓</text>
  <text x="550" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555" text-anchor="middle">✓</text>
  <text x="740" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#e05555" text-anchor="middle">✗</text>

  <!-- private row -->
  <rect x="60" y="250" width="760" height="58" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="170" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">private</text>
  <text x="360" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555" text-anchor="middle">✓</text>
  <text x="550" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#e05555" text-anchor="middle">✗</text>
  <text x="740" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#e05555" text-anchor="middle">✗</text>

  <!-- Dividers -->
  <line x1="270" y1="64" x2="270" y2="316" stroke="#333" stroke-width="1"/>
  <line x1="460" y1="64" x2="460" y2="316" stroke="#333" stroke-width="1"/>
  <line x1="650" y1="64" x2="650" y2="316" stroke="#333" stroke-width="1"/>

  <!-- Note box -->
  <rect x="60" y="334" width="760" height="96" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Note</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· TypeScript private은 컴파일 타임 전용 — JS 런타임에서는 일반 프로퍼티</text>
  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· 런타임 캡슐화가 필요하면 ECMAScript private field (#name) 사용</text>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· 제한자 생략 시 기본값은 public</text>
</svg>
