<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="wbArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">엉뚱한 브랜치에 커밋했을 때</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">feature에 할 작업을 main에 올렸다면, 커밋을 옮긴다</text>

  <!-- before -->
  <text x="60" y="120" font-size="15" font-weight="600" fill="#e05555">잘못된 상태</text>
  <text x="80" y="160" font-size="13" fill="#888">main</text>
  <circle cx="150" cy="185" r="9" fill="#7ec8e3"/>
  <circle cx="210" cy="185" r="9" fill="#7ec8e3"/>
  <circle cx="270" cy="185" r="9" fill="#e05555"/>
  <line x1="159" y1="185" x2="201" y2="185" stroke="#888" stroke-width="2"/>
  <line x1="219" y1="185" x2="261" y2="185" stroke="#888" stroke-width="2"/>
  <text x="248" y="170" font-size="12" fill="#e05555">X (여기 아님)</text>

  <!-- after -->
  <text x="500" y="120" font-size="15" font-weight="600" fill="#55c555">바로잡은 상태</text>
  <text x="520" y="160" font-size="13" fill="#888">main</text>
  <circle cx="590" cy="185" r="9" fill="#7ec8e3"/>
  <circle cx="650" cy="185" r="9" fill="#7ec8e3"/>
  <line x1="599" y1="185" x2="641" y2="185" stroke="#888" stroke-width="2"/>
  <text x="520" y="245" font-size="13" fill="#888">feature</text>
  <circle cx="590" cy="270" r="9" fill="#7ec8e3"/>
  <circle cx="650" cy="270" r="9" fill="#7ec8e3"/>
  <circle cx="710" cy="270" r="9" fill="#55c555"/>
  <line x1="599" y1="270" x2="641" y2="270" stroke="#888" stroke-width="2"/>
  <line x1="659" y1="270" x2="701" y2="270" stroke="#888" stroke-width="2"/>
  <line x1="590" y1="194" x2="590" y2="261" stroke="#888" stroke-width="2"/>
  <text x="690" y="255" font-size="12" fill="#55c555">X (이동됨)</text>

  <!-- transition arrow -->
  <line x1="330" y1="185" x2="480" y2="185" stroke="#55c555" stroke-width="2.5" marker-end="url(#wbArr)"/>
  <text x="350" y="175" font-size="13" fill="#9aa4b8">branch + reset</text>

  <rect x="60" y="305" width="760" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="336" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git branch feature   <tspan fill="#9aa4b8"># 현재 커밋으로 새 브랜치 표시</tspan>  →  git reset --hard HEAD~1</text>
</svg>
