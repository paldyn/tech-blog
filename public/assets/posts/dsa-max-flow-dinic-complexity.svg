<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Dinic 알고리즘 — 단계별 흐름과 복잡도</text>

  <!-- Phase boxes -->
  <!-- Phase 1: BFS -->
  <rect x="60" y="70" width="220" height="100" fill="#111" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">1단계: BFS</text>
  <text x="170" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">레벨 그래프 구성</text>
  <text x="170" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">O(E)</text>
  <text x="170" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">t 도달 불가시 종료</text>

  <!-- Arrow -->
  <line x1="280" y1="120" x2="320" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 2: DFS Blocking -->
  <rect x="320" y="70" width="240" height="100" fill="#111" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">2단계: DFS 블로킹 플로우</text>
  <text x="440" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">포화 간선 제거하며</text>
  <text x="440" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">s→t 경로 반복 탐색</text>
  <text x="440" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">O(VE) per phase</text>

  <!-- Arrow -->
  <line x1="560" y1="120" x2="600" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3: Repeat -->
  <rect x="600" y="70" width="220" height="100" fill="#111" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">3단계: 반복</text>
  <text x="710" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">레벨 +1 증가 보장</text>
  <text x="710" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">최대 V번 반복</text>
  <text x="710" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">O(V) phases</text>

  <!-- Total complexity -->
  <rect x="200" y="200" width="480" height="52" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">전체 시간 복잡도</text>
  <text x="440" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">O(V² · E)</text>

  <!-- Code block -->
  <rect x="60" y="275" width="760" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// Dinic BFS 레벨 구성</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">bool</text>
  <text x="120" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> bfs(int s, int t) &#123;</text>
  <text x="76" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">    fill(level, level+V, -1);</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">    queue&lt;int&gt; q; level[s] = 0; q.push(s);</text>
  <text x="76" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">    while</text>
  <text x="126" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (!q.empty()) &#123;</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        int v = q.front(); q.pop();</text>
  <text x="76" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">        for</text>
  <text x="111" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (auto [to,cap,...]: g[v])</text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">            if (cap &gt; 0 &amp;&amp; level[to] &lt; 0)</text>
  <text x="76" y="451" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">                level[to]=level[v]+1, q.push(to);</text>
</svg>
