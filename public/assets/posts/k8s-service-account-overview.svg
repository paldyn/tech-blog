<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ServiceAccount 토큰 인증 흐름</text>

  <!-- Pod -->
  <rect x="50" y="74" width="220" height="180" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Pod</text>
  <rect x="66" y="110" width="188" height="50" rx="4" fill="#111827" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">App Container</text>
  <text x="160" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">serviceAccountName: my-sa</text>
  <rect x="66" y="172" width="188" height="64" rx="4" fill="#0f1a10" stroke="#2a4a2a" stroke-width="1"/>
  <text x="160" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Projected Volume</text>
  <text x="160" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">/var/run/secrets/</text>
  <text x="160" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">kubernetes.io/serviceaccount/</text>
  <text x="160" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">자동 마운트</text>

  <!-- Arrow Pod → API Server -->
  <line x1="272" y1="164" x2="358" y2="164" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="315" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Bearer</text>
  <text x="315" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Token</text>

  <!-- API Server -->
  <rect x="360" y="100" width="220" height="130" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">kube-apiserver</text>
  <text x="470" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">① 토큰 검증 (OIDC)</text>
  <text x="470" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">② ServiceAccount 확인</text>
  <text x="470" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">③ RBAC 인가 처리</text>
  <text x="470" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">④ 요청 허용/거부</text>
  <text x="470" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">TokenReview API</text>

  <!-- Arrow API Server → RBAC -->
  <line x1="470" y1="230" x2="470" y2="296" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- RBAC block -->
  <rect x="360" y="298" width="220" height="80" rx="8" fill="#1a1235" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">RBAC</text>
  <text x="470" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Role + RoleBinding</text>
  <text x="470" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">SA에 부여된 권한 확인</text>

  <!-- ServiceAccount Object -->
  <rect x="640" y="100" width="200" height="80" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="740" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">ServiceAccount</text>
  <text x="740" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">name: my-sa</text>
  <text x="740" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">namespace: production</text>

  <!-- Arrow from API Server to SA -->
  <line x1="582" y1="150" x2="638" y2="150" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>

  <!-- Token Projection info -->
  <rect x="640" y="220" width="200" height="160" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="740" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Projected Token</text>
  <text x="740" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">만료 시간 (1시간)</text>
  <text x="740" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">대상 클러스터 제한</text>
  <text x="740" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">네임스페이스 범위</text>
  <text x="740" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Kubelet이 자동 갱신</text>
  <text x="740" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">K8s 1.20+ 기본 방식</text>

  <!-- Bottom note -->
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">automountServiceAccountToken: false 로 자동 마운트 비활성화 권장 (불필요한 파드)</text>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">구형 방식: Secret 기반 토큰 (만료 없음, 보안 취약) → K8s 1.24부터 기본 미생성</text>
</svg>
