<svg width="880" height="360" viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">wraps가 복사하는 속성들</text>
  <!-- Table header -->
  <rect x="60" y="66" width="760" height="40" fill="#0d0d20" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">속성</text>
  <text x="440" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">설명</text>
  <text x="720" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">없을 때 문제</text>
  <!-- Row 1 -->
  <rect x="60" y="106" width="760" height="36" fill="#070710" rx="0" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="129" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">__name__</text>
  <text x="440" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">함수 이름</text>
  <text x="720" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">로그/에러 추적 어려움</text>
  <!-- Row 2 -->
  <rect x="60" y="142" width="760" height="36" fill="#000000" rx="0" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">__doc__</text>
  <text x="440" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">독스트링</text>
  <text x="720" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">help() 내용 사라짐</text>
  <!-- Row 3 -->
  <rect x="60" y="178" width="760" height="36" fill="#070710" rx="0" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="201" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">__annotations__</text>
  <text x="440" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">타입 힌트</text>
  <text x="720" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">mypy/FastAPI 오동작</text>
  <!-- Row 4 -->
  <rect x="60" y="214" width="760" height="36" fill="#000000" rx="0" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="237" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">__qualname__</text>
  <text x="440" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">정규화된 이름</text>
  <text x="720" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">클래스 메서드 혼동</text>
  <!-- Row 5 -->
  <rect x="60" y="250" width="760" height="36" fill="#070710" rx="0" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="273" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">__wrapped__</text>
  <text x="440" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">원본 함수 참조</text>
  <text x="720" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">inspect 도구로 언래핑 가능</text>
  <!-- bottom note -->
  <text x="440" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">inspect.unwrap(func) 로 __wrapped__ 체인을 따라 원본까지 도달 가능</text>
</svg>
