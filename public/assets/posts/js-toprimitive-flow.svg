<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">ToPrimitive — 객체를 원시값으로 변환하는 흐름</text>

  <!-- Three hint paths -->
  <text x="180" y="80" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">hint: "number"</text>
  <text x="440" y="80" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">hint: "default"</text>
  <text x="700" y="80" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">hint: "string"</text>

  <!-- Trigger labels -->
  <text x="180" y="100" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">+obj, 산술연산, &gt;, &lt;</text>
  <text x="440" y="100" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">+, ==, template (일부)</text>
  <text x="700" y="100" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">String(), template, alert</text>

  <!-- Has Symbol.toPrimitive? -->
  <rect x="260" y="118" width="360" height="40" fill="#0f1a1a" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="143" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">Symbol.toPrimitive 있는가?</text>

  <!-- Lines to diamond -->
  <line x1="180" y1="112" x2="300" y2="130" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="440" y1="112" x2="440" y2="117" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="700" y1="112" x2="580" y2="130" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- YES: call Symbol.toPrimitive -->
  <line x1="440" y1="158" x2="440" y2="178" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="436,175 440,188 444,175" fill="#55c555"/>
  <text x="468" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">YES</text>

  <rect x="260" y="188" width="360" height="40" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="213" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">Symbol.toPrimitive(hint) 호출 → 결과 반환</text>

  <!-- NO branch -->
  <text x="236" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">NO →</text>
  <line x1="260" y1="138" x2="140" y2="248" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Fallback: valueOf / toString -->
  <rect x="60" y="252" width="760" height="40" fill="#0f0f1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="277" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">폴백: hint별 valueOf/toString 호출 순서 결정</text>

  <!-- Hint number path -->
  <rect x="60" y="322" width="220" height="60" fill="#0a141f" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="344" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">hint: "number"</text>
  <text x="170" y="362" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">1. valueOf()</text>
  <text x="170" y="378" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">2. toString() (폴백)</text>

  <!-- Hint default path -->
  <rect x="330" y="322" width="220" height="60" fill="#0f0f1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="344" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc">hint: "default"</text>
  <text x="440" y="362" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">1. valueOf() (number와 동일)</text>
  <text x="440" y="378" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">2. toString() (폴백)</text>

  <!-- Hint string path -->
  <rect x="600" y="322" width="220" height="60" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="344" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">hint: "string"</text>
  <text x="710" y="362" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">1. toString()</text>
  <text x="710" y="378" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">2. valueOf() (폴백)</text>

  <!-- Lines from fallback to three paths -->
  <line x1="170" y1="294" x2="170" y2="320" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="166,317 170,330 174,317" fill="#7ec8e3"/>
  <line x1="440" y1="294" x2="440" y2="320" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="436,317 440,330 444,317" fill="#7777cc"/>
  <line x1="710" y1="294" x2="710" y2="320" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="706,317 710,330 714,317" fill="#55c555"/>

  <!-- Result: must be primitive -->
  <rect x="60" y="404" width="760" height="40" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="429" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">반환값이 원시값이 아니면 TypeError! (객체를 반환하면 안 됨)</text>

  <!-- Lines from 3 paths to result -->
  <line x1="170" y1="383" x2="170" y2="404" stroke="#888" stroke-width="1.5"/>
  <line x1="440" y1="383" x2="440" y2="404" stroke="#888" stroke-width="1.5"/>
  <line x1="710" y1="383" x2="710" y2="404" stroke="#888" stroke-width="1.5"/>

  <!-- Bottom note -->
  <text x="440" y="456" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">Date 객체는 hint가 "default"일 때 toString()을 먼저 호출 (특별 규칙)</text>
</svg>
