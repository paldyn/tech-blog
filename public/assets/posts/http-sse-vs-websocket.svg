<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrSucc" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrInfo2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">실시간 통신 — SSE vs WebSocket vs 롱 폴링</text>
    <text x="440" y="74" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">방향성·프로토콜·재연결·용도 비교</text>

    <!-- Column 1: SSE -->
    <rect x="60" y="100" width="240" height="380" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="180" y="132" text-anchor="middle" font-size="16" font-weight="600" fill="#55c555">SSE</text>

    <text x="80" y="166" font-size="13" fill="#888">방향</text>
    <line x1="100" y1="186" x2="260" y2="186" stroke="#55c555" stroke-width="2" marker-end="url(#arrSucc)"/>
    <text x="180" y="208" text-anchor="middle" font-size="13" fill="#e8e8e8">서버 → 클라 (단방향)</text>

    <text x="80" y="244" font-size="13" fill="#888">프로토콜</text>
    <text x="80" y="264" font-size="13" fill="#e8e8e8">일반 HTTP 응답</text>
    <text x="80" y="282" font-size="13" fill="#e8e8e8">text/event-stream</text>

    <text x="80" y="318" font-size="13" fill="#888">재연결</text>
    <text x="80" y="338" font-size="13" fill="#55c555">자동 (Last-Event-ID)</text>

    <text x="80" y="374" font-size="13" fill="#888">데이터</text>
    <text x="80" y="394" font-size="13" fill="#e8e8e8">텍스트 (UTF-8)</text>

    <text x="80" y="430" font-size="13" fill="#888">용도</text>
    <text x="80" y="450" font-size="13" fill="#e8e8e8">알림·피드·시세</text>
    <text x="80" y="468" font-size="13" fill="#e8e8e8">LLM 토큰 스트림</text>

    <!-- Column 2: WebSocket -->
    <rect x="320" y="100" width="240" height="380" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="440" y="132" text-anchor="middle" font-size="16" font-weight="600" fill="#7ec8e3">WebSocket</text>

    <text x="340" y="166" font-size="13" fill="#888">방향</text>
    <line x1="360" y1="180" x2="520" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo2)"/>
    <line x1="520" y1="194" x2="360" y2="194" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo2)"/>
    <text x="440" y="216" text-anchor="middle" font-size="13" fill="#e8e8e8">양방향 (full-duplex)</text>

    <text x="340" y="244" font-size="13" fill="#888">프로토콜</text>
    <text x="340" y="264" font-size="13" fill="#e8e8e8">ws:// 업그레이드</text>
    <text x="340" y="282" font-size="13" fill="#e8e8e8">별도 핸드셰이크</text>

    <text x="340" y="318" font-size="13" fill="#888">재연결</text>
    <text x="340" y="338" font-size="13" fill="#e05555">수동 구현 필요</text>

    <text x="340" y="374" font-size="13" fill="#888">데이터</text>
    <text x="340" y="394" font-size="13" fill="#e8e8e8">텍스트 + 바이너리</text>

    <text x="340" y="430" font-size="13" fill="#888">용도</text>
    <text x="340" y="450" font-size="13" fill="#e8e8e8">채팅·게임·협업</text>
    <text x="340" y="468" font-size="13" fill="#e8e8e8">양방향 잦은 교신</text>

    <!-- Column 3: Long Polling -->
    <rect x="580" y="100" width="240" height="380" rx="8" fill="#1f173a" stroke="#7777cc" stroke-width="1.5"/>
    <text x="700" y="132" text-anchor="middle" font-size="16" font-weight="600" fill="#9b8fe8">롱 폴링</text>

    <text x="600" y="166" font-size="13" fill="#888">방향</text>
    <line x1="620" y1="186" x2="780" y2="186" stroke="#9b8fe8" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="700" y="208" text-anchor="middle" font-size="13" fill="#e8e8e8">요청마다 새 연결</text>

    <text x="600" y="244" font-size="13" fill="#888">프로토콜</text>
    <text x="600" y="264" font-size="13" fill="#e8e8e8">반복 HTTP 요청</text>
    <text x="600" y="282" font-size="13" fill="#e8e8e8">응답 올 때까지 대기</text>

    <text x="600" y="318" font-size="13" fill="#888">재연결</text>
    <text x="600" y="338" font-size="13" fill="#e8e8e8">매번 재요청</text>

    <text x="600" y="374" font-size="13" fill="#888">데이터</text>
    <text x="600" y="394" font-size="13" fill="#e8e8e8">텍스트</text>

    <text x="600" y="430" font-size="13" fill="#888">용도</text>
    <text x="600" y="450" font-size="13" fill="#e8e8e8">레거시 폴백</text>
    <text x="600" y="468" font-size="13" fill="#e8e8e8">오버헤드 큼</text>

    <!-- Bottom note -->
    <text x="440" y="514" text-anchor="middle" font-size="13" fill="#e8e8e8">서버→클라 단방향 푸시면 SSE가 HTTP 인프라(프록시·인증·HTTP/2 다중화)에 가장 잘 맞는다</text>
    <text x="440" y="538" text-anchor="middle" font-size="12" fill="#888">클라가 서버로 자주 보내야 하면 WebSocket을 택한다</text>
  </g>
</svg>
