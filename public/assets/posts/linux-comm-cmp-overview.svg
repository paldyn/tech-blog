<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">comm · cmp — 집합 연산과 바이너리 비교</text>

  <!-- comm 3-column explanation -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">comm 3컬럼 출력 구조</text>

  <!-- col1 header -->
  <rect x="60" y="94" width="180" height="38" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">col 1: file1에만 있음</text>

  <!-- col2 header -->
  <rect x="260" y="94" width="180" height="38" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="350" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">col 2: file2에만 있음</text>

  <!-- col3 header -->
  <rect x="460" y="94" width="180" height="38" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="550" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">col 3: 공통</text>

  <!-- set diagram -->
  <rect x="660" y="94" width="180" height="38" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="750" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-1 -2 -3</text>
  <text x="750" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해당 열 숨기기</text>

  <!-- example output box -->
  <rect x="60" y="144" width="380" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># comm file1.txt file2.txt</text>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">apple</text>
  <text x="80" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">       	banana         	banana</text>
  <text x="80" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" xml:space="preserve">	cherry</text>
  <text x="80" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">               	date</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">탭 들여쓰기로 컬럼 구분</text>

  <!-- set operations -->
  <text x="480" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">집합 연산 레시피</text>

  <rect x="480" y="172" width="360" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="500" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 교집합 (공통)</text>
  <text x="500" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">comm -12 f1 f2</text>
  <text x="500" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 차집합 (f1 - f2)</text>
  <text x="500" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">comm -23 f1 f2</text>

  <!-- cmp section -->
  <text x="60" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">cmp — 바이트 단위 파일 비교</text>

  <rect x="60" y="326" width="760" height="86" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 첫 번째 차이 위치 출력</text>
  <text x="80" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">cmp file1.bin file2.bin  →  file1.bin file2.bin differ: byte 42, line 3</text>
  <text x="80" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">-s (silent) : 종료코드만  /  -l : 모든 차이 바이트 나열</text>

  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">comm 입력 파일은 반드시 정렬 필요 — sort f1 | comm -12 - &lt;(sort f2)</text>
</svg>
