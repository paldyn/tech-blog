<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">with 문의 실행 흐름</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">컨텍스트 매니저가 __enter__와 __exit__으로 자원 관리를 보장하는 방식</text>

  <!-- Left: without with -->
  <rect x="60" y="100" width="340" height="30" rx="6" fill="#2a1a1a"/>
  <text x="230" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">❌ with 문 없이</text>

  <rect x="60" y="136" width="340" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">f = <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"data.txt"</tspan>)</text>
  <text xml:space="preserve" x="78" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">try</tspan>:</text>
  <text xml:space="preserve" x="78" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    data = f.read()</text>
  <text xml:space="preserve" x="78" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    process(data)</text>
  <text xml:space="preserve" x="78" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">except</tspan> <tspan fill="#ce9178">Exception</tspan> as e:</text>
  <text xml:space="preserve" x="78" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    log(e)</text>
  <text xml:space="preserve" x="78" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">finally</tspan>:  <tspan fill="#9aa4b8"># 잊으면 누수</tspan></text>
  <text xml:space="preserve" x="78" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.close()</text>

  <!-- Right: with with -->
  <rect x="480" y="100" width="340" height="30" rx="6" fill="#1a2a1a"/>
  <text x="650" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">✅ with 문 사용</text>

  <rect x="480" y="136" width="340" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="498" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"data.txt"</tspan>) as f:</text>
  <text xml:space="preserve" x="498" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    data = f.read()</text>
  <text xml:space="preserve" x="498" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    process(data)</text>
  <text xml:space="preserve" x="498" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># close() 자동 — 예외에도 안전</text>

  <!-- Flow diagram -->
  <rect x="60" y="340" width="760" height="30" rx="6" fill="#1a2a4a"/>
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">컨텍스트 매니저 실행 순서</text>

  <!-- Flow steps -->
  <rect x="60" y="382" width="140" height="52" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">① with 진입</text>
  <text x="130" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">__enter__() 호출</text>

  <line x1="200" y1="408" x2="230" y2="408" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="234" y="382" width="140" height="52" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="304" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">② as 변수 바인딩</text>
  <text x="304" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">반환값 → f</text>

  <line x1="374" y1="408" x2="404" y2="408" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="408" y="382" width="140" height="52" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="478" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">③ 블록 실행</text>
  <text x="478" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">f.read() 등</text>

  <line x1="548" y1="408" x2="578" y2="408" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="582" y="382" width="158" height="52" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="661" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">④ __exit__() 호출</text>
  <text x="661" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정상·예외 모두 실행</text>
</svg>
