<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">bcrypt 해시 문자열의 구조</text>
  <text x="60" y="80" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#888">$2b$12$R9h/cIPz0gi.URNNX3kh2O...PST9.PgBkqquzi.Ss7KI</text>

  <!-- row 1 -->
  <rect x="60" y="100" width="280" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="130" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">$2b$</text>
  <text x="370" y="130" font-size="14" fill="#cccccc">알고리즘 버전 — bcrypt(2b)</text>

  <!-- row 2 -->
  <rect x="60" y="160" width="280" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="190" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" font-weight="600">12</text>
  <text x="370" y="190" font-size="14" fill="#cccccc">cost factor — 2^12회 반복(느릴수록 안전)</text>

  <!-- row 3 -->
  <rect x="60" y="220" width="280" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="250" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">R9h/...kh2O</text>
  <text x="370" y="250" font-size="14" fill="#cccccc">salt — 22자, 매번 무작위 생성</text>

  <!-- row 4 -->
  <rect x="60" y="280" width="280" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="310" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">PST9...Ss7KI</text>
  <text x="370" y="310" font-size="14" fill="#cccccc">해시값 — 31자, 비밀번호+salt의 결과</text>
</svg>
