<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">관계형 테이블 구조</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">employees 테이블</text>

  <rect x="140" y="86" width="600" height="42" fill="#192040" rx="3" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="210" y1="86" x2="210" y2="128" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="365" y1="86" x2="365" y2="128" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="585" y1="86" x2="585" y2="128" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="145" y="92" width="27" height="16" fill="#7ec8e3" rx="3"/>
  <text x="158" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#0a0a0a">PK</text>
  <text x="175" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">id</text>
  <text x="287" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">name</text>
  <text x="475" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">email</text>
  <text x="662" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">dept_id</text>

  <rect x="140" y="128" width="600" height="38" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="210" y1="128" x2="210" y2="166" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="365" y1="128" x2="365" y2="166" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="585" y1="128" x2="585" y2="166" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="152" text-anchor="middle" font-size="13" fill="#b5cea8">1</text>
  <text x="287" y="152" text-anchor="middle" font-size="13" fill="#ffffff">김철수</text>
  <text x="475" y="152" text-anchor="middle" font-size="13" fill="#ce9178">chulsoo@corp.io</text>
  <text x="662" y="152" text-anchor="middle" font-size="13" fill="#b5cea8">10</text>

  <rect x="140" y="166" width="600" height="38" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="210" y1="166" x2="210" y2="204" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="365" y1="166" x2="365" y2="204" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="585" y1="166" x2="585" y2="204" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="190" text-anchor="middle" font-size="13" fill="#b5cea8">2</text>
  <text x="287" y="190" text-anchor="middle" font-size="13" fill="#ffffff">이영희</text>
  <text x="475" y="190" text-anchor="middle" font-size="13" fill="#ce9178">younghee@corp.io</text>
  <text x="662" y="190" text-anchor="middle" font-size="13" fill="#b5cea8">20</text>

  <rect x="140" y="204" width="600" height="38" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="210" y1="204" x2="210" y2="242" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="365" y1="204" x2="365" y2="242" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="585" y1="204" x2="585" y2="242" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="228" text-anchor="middle" font-size="13" fill="#b5cea8">3</text>
  <text x="287" y="228" text-anchor="middle" font-size="13" fill="#ffffff">박민준</text>
  <text x="475" y="228" text-anchor="middle" font-size="13" fill="#ce9178">minjun@corp.io</text>
  <text x="662" y="228" text-anchor="middle" font-size="13" fill="#b5cea8">10</text>

  <defs>
    <marker id="mPurple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="mGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="mBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="mRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect x="10" y="140" width="110" height="48" fill="#0f1320" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="65" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">테이블</text>
  <text x="65" y="179" text-anchor="middle" font-size="11" fill="#888">(릴레이션)</text>
  <line x1="120" y1="164" x2="138" y2="164" stroke="#7777cc" stroke-width="2" marker-end="url(#mPurple)"/>

  <rect x="10" y="298" width="110" height="48" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="65" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">행 (Row)</text>
  <text x="65" y="337" text-anchor="middle" font-size="11" fill="#888">(튜플)</text>
  <path d="M 65 298 L 65 270 L 138 185" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#mGreen)"/>

  <rect x="130" y="298" width="145" height="48" fill="#0f1320" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="202" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">기본 키 (PK)</text>
  <text x="202" y="337" text-anchor="middle" font-size="11" fill="#888">행을 유일하게 식별</text>
  <line x1="175" y1="298" x2="175" y2="244" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mBlue)"/>

  <rect x="760" y="88" width="108" height="48" fill="#0f1320" stroke="#e05555" stroke-width="1.5" rx="6"/>
  <text x="814" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">열 (Column)</text>
  <text x="814" y="127" text-anchor="middle" font-size="11" fill="#888">(속성)</text>
  <line x1="760" y1="112" x2="742" y2="112" stroke="#e05555" stroke-width="2" marker-end="url(#mRed)"/>

  <rect x="760" y="160" width="108" height="48" fill="#0f1320" stroke="#9aa4b8" stroke-width="1.5" rx="6"/>
  <text x="814" y="180" text-anchor="middle" font-size="13" font-weight="600" fill="#9aa4b8">셀 (Cell)</text>
  <text x="814" y="199" text-anchor="middle" font-size="11" fill="#888">(도메인 값)</text>

  <rect x="60" y="386" width="180" height="52" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="6"/>
  <text x="150" y="407" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">도메인(Domain)</text>
  <text x="150" y="425" text-anchor="middle" font-size="11" fill="#888">열이 가질 수 있는 값의 집합</text>

  <rect x="280" y="386" width="190" height="52" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="6"/>
  <text x="375" y="407" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">카디널리티(Cardinality)</text>
  <text x="375" y="425" text-anchor="middle" font-size="11" fill="#888">테이블의 행(튜플) 수</text>

  <rect x="510" y="386" width="150" height="52" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="6"/>
  <text x="585" y="407" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">차수(Degree)</text>
  <text x="585" y="425" text-anchor="middle" font-size="11" fill="#888">테이블의 열(속성) 수</text>
</svg>
