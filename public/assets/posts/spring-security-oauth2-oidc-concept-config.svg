<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- 배경 -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Spring Security OAuth2 클라이언트 설정</text>

  <!-- ===== 왼쪽: application.yml 설정 (x=50, y=68, w=378, h=362) ===== -->
  <rect x="50" y="68" width="378" height="362" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="239" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">application.yml</text>
  <line x1="50" y1="104" x2="428" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <text x="66" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">spring:</tspan></text>
  <text x="66" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">security:</tspan></text>
  <text x="66" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#7ec8e3" font-weight="600">oauth2:</tspan></text>
  <text x="66" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#7ec8e3" font-weight="600">client:</tspan></text>
  <text x="66" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="122" fill="#7ec8e3" font-weight="600">registration:</tspan></text>
  <text x="66" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="136" fill="#ffffff">google:</tspan></text>
  <text x="66" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="150" fill="#ffffff">client-id: </tspan><tspan fill="#ce9178">${GOOGLE_CLIENT_ID}</tspan></text>
  <text x="66" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="150" fill="#ffffff">client-secret: </tspan><tspan fill="#ce9178">${GOOGLE_SECRET}</tspan></text>
  <text x="66" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="150" fill="#ffffff">scope:</tspan></text>
  <text x="66" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="164" fill="#ffffff">- </tspan><tspan fill="#ce9178">openid</tspan></text>
  <text x="66" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="164" fill="#ffffff">- </tspan><tspan fill="#ce9178">profile</tspan></text>
  <text x="66" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="164" fill="#ffffff">- </tspan><tspan fill="#ce9178">email</tspan></text>
  <text x="66" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="150" fill="#ffffff">redirect-uri: </tspan><tspan fill="#ce9178">"{baseUrl}/login/oauth2/code/{registrationId}"</tspan></text>
  <text x="66" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # github, kakao 등 추가 가능</text>
  <text x="66" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="136" fill="#ffffff">kakao:</tspan></text>
  <text x="66" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="150" fill="#ffffff">client-id: </tspan><tspan fill="#ce9178">${KAKAO_CLIENT_ID}</tspan></text>
  <text x="66" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="150" fill="#ffffff">client-authentication-method: </tspan><tspan fill="#ce9178">client_secret_post</tspan></text>

  <!-- ===== ��른쪽: SecurityFilterChain + 커스텀 서비스 (x=452, y=68, w=378, h=362) ===== -->
  <rect x="452" y="68" width="378" height="362" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="641" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">SecurityFilterChain + OAuth2</text>
  <line x1="452" y1="104" x2="830" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <text x="468" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="468" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> SecurityFilterChain chain(</tspan></text>
  <text x="468" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#ffffff">HttpSecurity http) {</tspan></text>
  <text x="468" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> http</tspan></text>
  <text x="468" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="496" fill="#ffffff">.oauth2Login(oauth2 -&gt; oauth2</tspan></text>
  <text x="468" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="510" fill="#ffffff">.loginPage(</tspan><tspan fill="#ce9178">"/login"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="468" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="510" fill="#ffffff">.defaultSuccessUrl(</tspan><tspan fill="#ce9178">"/home"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="468" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="510" fill="#ffffff">.userInfoEndpoint(u -&gt; u</tspan></text>
  <text x="468" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="524" fill="#ffffff">.userService(customOAuth2UserService)))</tspan></text>
  <text x="468" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="496" fill="#ffffff">.authorizeHttpRequests(auth -&gt; auth</tspan></text>
  <text x="468" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="510" fill="#ffffff">.requestMatchers(</tspan><tspan fill="#ce9178">"/login"</tspan><tspan fill="#ffffff">).permitAll()</tspan></text>
  <text x="468" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="510" fill="#ffffff">.anyRequest().authenticated())</tspan></text>
  <text x="468" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="496" fill="#ffffff">.build();</tspan></text>
  <text x="468" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <text x="468" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// OAuth2UserService — 소셜 사용자 처리</text>
  <text x="468" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> OAuth2User loadUser(OAuth2UserRequest req) {</tspan></text>
</svg>
