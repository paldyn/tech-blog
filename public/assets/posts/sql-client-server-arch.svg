<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DB 클라이언트-서버 아키텍처</text>

  <defs>
    <marker id="cs-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="cs-arr-r" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Client box -->
  <rect x="60" y="80" width="240" height="300" fill="#111" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">클라이언트</text>
  <rect x="80" y="118" width="200" height="34" fill="#162030" rx="4"/>
  <text x="180" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">애플리케이션 코드</text>
  <rect x="80" y="160" width="200" height="34" fill="#162030" rx="4"/>
  <text x="180" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">드라이버 (JDBC/ODBC)</text>
  <rect x="80" y="202" width="200" height="34" fill="#162030" rx="4"/>
  <text x="180" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">커넥션 풀</text>
  <rect x="80" y="244" width="200" height="34" fill="#162030" rx="4"/>
  <text x="180" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">프로토콜 핸들러</text>
  <rect x="80" y="286" width="200" height="34" fill="#162030" rx="4"/>
  <text x="180" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">TLS/TCP 소켓</text>
  <rect x="80" y="328" width="200" height="34" fill="#162030" rx="4"/>
  <text x="180" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인증 (user/password)</text>

  <!-- Network -->
  <rect x="330" y="178" width="220" height="124" fill="#0d0d0d" rx="8" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">네트워크 / 유닉스 소켓</text>

  <!-- Request arrow -->
  <line x1="300" y1="220" x2="330" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cs-arr)"/>
  <text x="315" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">SQL 전송</text>

  <!-- Response arrow -->
  <line x1="330" y1="268" x2="300" y2="268" stroke="#55c555" stroke-width="2" marker-end="url(#cs-arr-r)"/>
  <text x="315" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">결과 반환</text>

  <!-- Protocol label -->
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Oracle: OCI/JDBC Thin</text>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">PostgreSQL: libpq/pgwire</text>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">MySQL: MySQL Protocol</text>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">MSSQL: TDS Protocol</text>

  <!-- Server box -->
  <rect x="580" y="80" width="240" height="300" fill="#111" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">DB 서버</text>
  <rect x="600" y="118" width="200" height="34" fill="#122016" rx="4"/>
  <text x="700" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">리스너 / 연결 수락</text>
  <rect x="600" y="160" width="200" height="34" fill="#122016" rx="4"/>
  <text x="700" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인증 검사</text>
  <rect x="600" y="202" width="200" height="34" fill="#122016" rx="4"/>
  <text x="700" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SQL 파서 / 옵티마이저</text>
  <rect x="600" y="244" width="200" height="34" fill="#122016" rx="4"/>
  <text x="700" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실행 엔진</text>
  <rect x="600" y="286" width="200" height="34" fill="#122016" rx="4"/>
  <text x="700" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">버퍼 캐시 / 스토리지</text>
  <rect x="600" y="328" width="200" height="34" fill="#122016" rx="4"/>
  <text x="700" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">결과 직렬화 / 전송</text>

  <!-- Bottom info -->
  <rect x="60" y="400" width="760" height="70" fill="#0d0d0d" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">연결 방식</text>
  <text x="220" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">TCP/IP</text>
  <text x="220" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">원격 서버, 기본 방식</text>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Unix Domain Socket</text>
  <text x="440" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">로컬호스트, 고성능</text>
  <text x="660" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020" text-anchor="middle">Shared Memory</text>
  <text x="660" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Oracle 로컬, 최고 성능</text>
</svg>