<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">실행 컨텍스트 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Execution Context — 세 가지 핵심 컴포넌트</text>

  <!-- Outer Scope box (top) -->
  <rect x="240" y="92" width="400" height="48" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">외부 스코프 (Outer Execution Context)</text>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Global / Parent Function EC</text>

  <!-- Arrow: outer scope down to main EC -->
  <line x1="440" y1="140" x2="440" y2="162" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="440,168 435,160 445,160" fill="#444"/>

  <!-- Main Execution Context box -->
  <rect x="100" y="168" width="680" height="240" rx="10" fill="#0f1117" stroke="#4b5563" stroke-width="1.5"/>
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">실행 컨텍스트 (Execution Context)</text>

  <!-- Component 1: Variable Environment -->
  <rect x="120" y="208" width="192" height="180" rx="8" fill="#0d1422" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="216" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Variable Environment</text>
  <text x="216" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">변수 환경</text>
  <line x1="140" y1="262" x2="292" y2="262" stroke="#1e3a5f" stroke-width="1"/>
  <text x="216" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">var 선언 수집</text>
  <text x="216" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">함수 선언 수집</text>
  <text x="216" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">초기값: undefined</text>
  <text x="216" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">호이스팅 원천</text>
  <text x="216" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#4a6a80">생성 단계에 확정</text>

  <!-- Component 2: Lexical Environment -->
  <rect x="344" y="208" width="192" height="180" rx="8" fill="#0d1a0d" stroke="#1e4a1e" stroke-width="1.5"/>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Lexical Environment</text>
  <text x="440" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">렉시컬 환경</text>
  <line x1="364" y1="262" x2="516" y2="262" stroke="#1e4a1e" stroke-width="1"/>
  <text x="440" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">let / const 수집</text>
  <text x="440" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">outer 참조 보유</text>
  <text x="440" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">스코프 체인 기반</text>
  <text x="440" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">TDZ 관리</text>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#4a7a4a">클로저의 핵심</text>

  <!-- Component 3: ThisBinding -->
  <rect x="568" y="208" width="192" height="180" rx="8" fill="#1a1206" stroke="#4a3a0e" stroke-width="1.5"/>
  <text x="664" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8c842">ThisBinding</text>
  <text x="664" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">this 바인딩</text>
  <line x1="588" y1="262" x2="740" y2="262" stroke="#4a3a0e" stroke-width="1"/>
  <text x="664" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">호출 방식에 따라</text>
  <text x="664" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">결정됨</text>
  <text x="664" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">전역: window / globalThis</text>
  <text x="664" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">메서드: 호출 객체</text>
  <text x="664" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7a6a2a">화살표함수 제외</text>

  <!-- outer reference arrow from Lexical Env upward -->
  <line x1="440" y1="208" x2="440" y2="172" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="440,166 435,174 445,174" fill="#55c555"/>
  <text x="452" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">outer ref</text>

  <!-- Footer -->
  <text x="440" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — JavaScript 완전 정복</text>
</svg>
