<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="11" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 1 L 12 7 L 1 13 z" fill="#8a93a8"/>
    </marker>
  </defs>
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">상관 ID 로 분산 추적</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">한 요청을 여러 서비스가 처리해도 traceId 로 묶어 추적한다</text>

  <!-- Service boxes -->
  <rect x="60" y="110" width="150" height="80" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="135" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Client</text>
  <text x="135" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">요청 시작</text>

  <rect x="270" y="110" width="160" height="80" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">API Gateway</text>
  <text x="350" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">traceId=T1 생성</text>

  <rect x="490" y="110" width="150" height="80" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="565" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Order SVC</text>
  <text x="565" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">x-trace-id: T1</text>

  <rect x="700" y="110" width="120" height="80" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="760" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Payment SVC</text>
  <text x="760" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">x-trace-id: T1</text>

  <!-- Arrows -->
  <line x1="210" y1="150" x2="270" y2="150" stroke="#8a93a8" stroke-width="2" marker-end="url(#ar)"/>
  <text x="240" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">T1</text>
  <line x1="430" y1="150" x2="490" y2="150" stroke="#8a93a8" stroke-width="2" marker-end="url(#ar)"/>
  <text x="460" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">T1</text>
  <line x1="640" y1="150" x2="700" y2="150" stroke="#8a93a8" stroke-width="2" marker-end="url(#ar)"/>
  <text x="670" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">T1</text>

  <!-- Log card -->
  <rect x="60" y="248" width="760" height="150" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">수집된 로그 — traceId 로 조인</text>
  <rect x="76" y="292" width="728" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">{</tspan><tspan fill="#7ec8e3">"traceId"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"T1"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#7ec8e3">"requestId"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"R1"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#7ec8e3">"svc"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"gateway"</tspan><tspan fill="#ffffff">}</tspan></text>
  <text x="92" y="337" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">{</tspan><tspan fill="#7ec8e3">"traceId"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"T1"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#7ec8e3">"requestId"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"R2"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#7ec8e3">"svc"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"order"</tspan><tspan fill="#ffffff">}</tspan></text>
  <text x="92" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">{</tspan><tspan fill="#7ec8e3">"traceId"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"T1"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#7ec8e3">"requestId"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"R3"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#7ec8e3">"svc"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"payment"</tspan><tspan fill="#ffffff">}</tspan></text>
  <text x="80" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">traceId 로 전체 요청을, requestId 로 서비스별 처리를 구분</text>

  <!-- Bottom note -->
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">x-trace-id 가 오면 계승, 없으면 생성 — 모든 하위 호출 헤더에 전파한다</text>
</svg>
