<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">상관 ID를 통한 분산 추적</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">traceId / spanId로 마이크로서비스 간 요청 흐름 연결</text>

  <!-- Client -->
  <rect x="50" y="96" width="100" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="100" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">클라이언트</text>
  <text x="100" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">브라우저</text>

  <!-- Arrow client → gateway -->
  <line x1="150" y1="121" x2="198" y2="121" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Gateway -->
  <rect x="200" y="96" width="130" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="265" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">API Gateway</text>
  <text x="265" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">traceId 생성</text>

  <!-- Arrow gateway → service A -->
  <line x1="330" y1="121" x2="418" y2="121" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Service A -->
  <rect x="420" y="96" width="130" height="50" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="485" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">User Service</text>
  <text x="485" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">spanId 생성, traceId 전파</text>

  <!-- Arrow service A → service B -->
  <line x1="550" y1="121" x2="618" y2="121" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Service B -->
  <rect x="620" y="96" width="130" height="50" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="685" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Auth Service</text>
  <text x="685" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">같은 traceId 사용</text>

  <!-- Service B → DB -->
  <rect x="750" y="96" width="80" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="790" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">Database</text>
  <line x1="750" y1="121" x2="752" y2="121" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- traceId label -->
  <rect x="50" y="170" width="780" height="30" rx="4" fill="#0d2020" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">traceId: "a1b2c3d4-..." — 모든 서비스 로그에 동일하게 포함</text>

  <!-- Log output boxes -->
  <text x="60" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">각 서비스의 로그 (같은 traceId로 묶임):</text>

  <rect x="50" y="238" width="780" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="66" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#55c555">[gateway]</tspan>
    <tspan fill="#ffffff"> traceId:</tspan>
    <tspan fill="#ce9178">a1b2c3</tspan>
    <tspan fill="#ffffff"> msg:</tspan>
    <tspan fill="#ce9178">"요청 수신"</tspan>
    <tspan fill="#ffffff"> path:/api/login duration:0ms</tspan>
  </text>
  <text xml:space="preserve" x="66" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3">[user-svc]</tspan>
    <tspan fill="#ffffff"> traceId:</tspan>
    <tspan fill="#ce9178">a1b2c3</tspan>
    <tspan fill="#ffffff"> spanId:</tspan>
    <tspan fill="#ce9178">span1</tspan>
    <tspan fill="#ffffff"> msg:</tspan>
    <tspan fill="#ce9178">"사용자 조회"</tspan>
    <tspan fill="#ffffff"> userId:42</tspan>
  </text>
  <text xml:space="preserve" x="66" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7777cc">[auth-svc]</tspan>
    <tspan fill="#ffffff"> traceId:</tspan>
    <tspan fill="#ce9178">a1b2c3</tspan>
    <tspan fill="#ffffff"> spanId:</tspan>
    <tspan fill="#ce9178">span2</tspan>
    <tspan fill="#ffffff"> msg:</tspan>
    <tspan fill="#ce9178">"토큰 발급"</tspan>
    <tspan fill="#ffffff"> userId:42</tspan>
  </text>
  <text xml:space="preserve" x="66" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#55c555">[gateway]</tspan>
    <tspan fill="#ffffff"> traceId:</tspan>
    <tspan fill="#ce9178">a1b2c3</tspan>
    <tspan fill="#ffffff"> msg:</tspan>
    <tspan fill="#ce9178">"응답 완료"</tspan>
    <tspan fill="#ffffff"> status:200 duration:82ms</tspan>
  </text>
  <text xml:space="preserve" x="66" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// CloudWatch Insights: filter traceId="a1b2c3" | 전체 요청 흐름 재구성</tspan>

  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">traceId만 알면 여러 서비스에 흩어진 로그를 하나의 흐름으로 조회 가능</text>
</svg>
