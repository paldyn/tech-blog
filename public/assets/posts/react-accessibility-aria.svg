<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">React 접근성(a11y) — ARIA 핵심 속성</text>

  <!-- aria-label -->
  <rect x="60" y="74" width="360" height="104" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">aria-label / aria-labelledby</text>
  <text x="84" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">요소에 텍스트 레이블이 없을 때 이름 부여</text>
  <text x="84" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">&lt;button aria-label="닫기"&gt;×&lt;/button&gt;</text>
  <text x="84" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">&lt;h2 id="title"&gt; + aria-labelledby="title"</text>

  <!-- aria-describedby -->
  <rect x="460" y="74" width="360" height="104" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">aria-describedby</text>
  <text x="484" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">요소에 대한 상세 설명 연결</text>
  <text x="484" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">&lt;input aria-describedby="hint" /&gt;</text>
  <text x="484" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">&lt;p id="hint"&gt;8자 이상 입력&lt;/p&gt;</text>

  <!-- aria-expanded / aria-haspopup -->
  <rect x="60" y="196" width="360" height="104" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="84" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">aria-expanded / aria-haspopup</text>
  <text x="84" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">드롭다운·아코디언 등 열림/닫힘 상태 전달</text>
  <text x="84" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">&lt;button aria-expanded={isOpen}&gt;메뉴&lt;/button&gt;</text>
  <text x="84" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">aria-haspopup="listbox" | "dialog"</text>

  <!-- aria-live -->
  <rect x="460" y="196" width="360" height="104" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="484" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#ce9178">aria-live</text>
  <text x="484" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">동적으로 바뀌는 영역 스크린 리더에 알림</text>
  <text x="484" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#ce9178">&lt;div aria-live="polite"&gt;{status}&lt;/div&gt;</text>
  <text x="484" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#ce9178">"assertive" = 즉시 / "polite" = 틈에</text>

  <!-- role -->
  <rect x="60" y="318" width="760" height="84" rx="8" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">role 속성 — 시맨틱 의미 부여</text>
  <text x="84" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">role="dialog" — 모달 · role="alert" — 에러 메시지 · role="navigation" — nav</text>
  <text x="84" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">기본 HTML 시맨틱 태그(&lt;button&gt;, &lt;nav&gt;, &lt;main&gt;)로 대체 가능할 땐 role 불필요</text>
</svg>
