<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Snap vs Flatpak 비교</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">배포판 독립 패키지 시스템</text>

  <!-- Header row -->
  <rect x="60" y="100" width="760" height="40" fill="#111827" rx="6"/>
  <text x="200" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">항목</text>
  <text x="480" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Snap</text>
  <text x="720" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">Flatpak</text>

  <!-- Row 1 -->
  <rect x="60" y="142" width="760" height="44" fill="#0f1117" rx="4"/>
  <text x="200" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">개발사</text>
  <text x="480" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Canonical (Ubuntu)</text>
  <text x="720" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Red Hat · GNOME 주도</text>

  <!-- Row 2 -->
  <rect x="60" y="188" width="760" height="44" fill="#13151f" rx="4"/>
  <text x="200" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">저장소</text>
  <text x="480" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Snapcraft Store (중앙)</text>
  <text x="720" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Flathub + 분산 가능</text>

  <!-- Row 3 -->
  <rect x="60" y="234" width="760" height="44" fill="#0f1117" rx="4"/>
  <text x="200" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">런타임 방식</text>
  <text x="480" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">자체 포함 (base snap)</text>
  <text x="720" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">공유 런타임 (org.gnome.*)</text>

  <!-- Row 4 -->
  <rect x="60" y="280" width="760" height="44" fill="#13151f" rx="4"/>
  <text x="200" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">마운트 방식</text>
  <text x="480" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">SquashFS 마운트</text>
  <text x="720" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">OSTree (중복 제거)</text>

  <!-- Row 5 -->
  <rect x="60" y="326" width="760" height="44" fill="#0f1117" rx="4"/>
  <text x="200" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">데몬 필요</text>
  <text x="480" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">snapd (항상 실행)</text>
  <text x="720" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">없음 (flatpak CLI만)</text>

  <!-- Row 6 -->
  <rect x="60" y="372" width="760" height="44" fill="#13151f" rx="4"/>
  <text x="200" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">보안 샌드박스</text>
  <text x="480" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">AppArmor + Seccomp</text>
  <text x="720" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Bubblewrap + Portals</text>

  <!-- Row 7 -->
  <rect x="60" y="418" width="760" height="44" fill="#0f1117" rx="4"/>
  <text x="200" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">CLI 도구</text>
  <text x="480" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">snap install / remove</text>
  <text x="720" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">flatpak install / run</text>

  <!-- vertical dividers -->
  <line x1="340" y1="100" x2="340" y2="462" stroke="#222" stroke-width="1"/>
  <line x1="620" y1="100" x2="620" y2="462" stroke="#222" stroke-width="1"/>

  <!-- bottom label -->
  <text x="440" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">두 시스템 모두 배포판에 무관한 앱 설치를 목표로 하지만 철학이 다름</text>
</svg>
