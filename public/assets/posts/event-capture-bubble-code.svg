<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">캡처·버블 실행 순서 확인</text>

  <rect x="60" y="64" width="760" height="292" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 같은 outer 요소에 캡처·버블 리스너 모두 등록</text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> outer = document.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'#outer'</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> inner = document.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'#inner'</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="84" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">outer.</tspan><tspan fill="#ffffff">addEventListener</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#ffffff">, () =&gt; console.</tspan><tspan fill="#ffffff">log</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'outer 캡처'</tspan><tspan fill="#ffffff">), </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">inner.</tspan><tspan fill="#ffffff">addEventListener</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#ffffff">, () =&gt; console.</tspan><tspan fill="#ffffff">log</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'inner 타깃'</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="84" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">outer.</tspan><tspan fill="#ffffff">addEventListener</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#ffffff">, () =&gt; console.</tspan><tspan fill="#ffffff">log</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'outer 버블'</tspan><tspan fill="#ffffff">));</tspan></text>

  <text x="84" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// inner 클릭 시 출력 순서:</text>
  <text x="84" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 1. "outer 캡처"  (캡처, 상→하)</text>
  <text x="84" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 2. "inner 타깃"  (타깃 단계)</text>
  <text x="84" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 3. "outer 버블"  (버블, 하→상)</text>

  <line x1="84" y1="294" x2="796" y2="294" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// e.eventPhase: 1=캡처, 2=타깃, 3=버블</text>
  <text x="84" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">document.</tspan><tspan fill="#ffffff">addEventListener</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#ffffff">, e =&gt; console.</tspan><tspan fill="#ffffff">log</tspan><tspan fill="#ffffff">(e.eventPhase));</tspan></text>
  <text x="84" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// once: true — 한 번 발화 후 자동 해제</text>
</svg>
