<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8">GHCR 인증 방법 비교</text>

  <!-- Header row -->
  <rect x="40" y="58" width="800" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="81" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">방법</text>
  <text x="420" y="81" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">사용 시점</text>
  <text x="660" y="81" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">토큰 유효기간</text>

  <line x1="40" y1="94" x2="840" y2="94" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="360" y1="58" x2="360" y2="350" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="580" y1="58" x2="580" y2="350" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Row 1: GITHUB_TOKEN -->
  <text x="200" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">GITHUB_TOKEN</text>
  <text x="200" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(자동 발급)</text>
  <text x="420" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GitHub Actions 워크플로우 내부</text>
  <text x="420" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리포지토리 연결된 경우</text>
  <text x="660" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">워크플로우 실행 동안만</text>
  <line x1="40" y1="154" x2="840" y2="154" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Row 2: PAT (classic) -->
  <text x="200" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">PAT (classic)</text>
  <text x="200" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">write:packages 범위</text>
  <text x="420" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">외부 CI, 로컬 스크립트</text>
  <text x="420" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GitHub 외부 서비스</text>
  <text x="660" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">설정 기간 / 무제한</text>
  <line x1="40" y1="214" x2="840" y2="214" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Row 3: Fine-grained PAT -->
  <text x="200" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Fine-grained PAT</text>
  <text x="200" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">packages:write</text>
  <text x="420" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최소 권한 원칙</text>
  <text x="420" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리포지토리 범위 지정 가능</text>
  <text x="660" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최대 1년</text>
  <line x1="40" y1="274" x2="840" y2="274" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Row 4: Deploy key -->
  <text x="200" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">서비스 계정 PAT</text>
  <text x="200" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">봇 계정 토큰</text>
  <text x="420" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">장기 실행 서비스</text>
  <text x="420" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Kubernetes imagePullSecret</text>
  <text x="660" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수동 갱신 필요</text>

  <!-- Border -->
  <rect x="40" y="58" width="800" height="292" rx="6" fill="none" stroke="#3a4a6e" stroke-width="1"/>
</svg>
