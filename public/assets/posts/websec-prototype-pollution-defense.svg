  <!-- Code lines -->
  <text x="58" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// &#x2705; Object.freeze&#xB85C; &#xD504;&#xB85C;&#xD1A0;&#xD0C0;&#xC785; &#xBCF4;&#xD638;</text>
  <text x="58" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Object.</tspan><tspan fill="#7ec8e3" font-weight="600">freeze</tspan><tspan fill="#ffffff">(Object.prototype)</tspan></text>

  <text x="58" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// &#x2705; null &#xD504;&#xB85C;&#xD1A0;&#xD0C0;&#xC785; &#xAC1D;&#xCCB4; &#xC0AC;&#xC6A9;</text>
  <text x="58" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> safe = Object.</tspan><tspan fill="#7ec8e3" font-weight="600">create</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="58" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// &#x2705; &#xC704;&#xD5D8; &#xD0A4; &#xD544;&#xD130;&#xB9C1;</text>
  <text x="58" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> safeMerge(target, source) {</tspan></text>
  <text x="58" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> FORBIDDEN = [</tspan><tspan fill="#ce9178">'__proto__'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="58" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">'constructor'</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ce9178">'prototype'</tspan><tspan fill="#ffffff">]</tspan></text>
  <text x="58" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> key </tspan><tspan fill="#7ec8e3" font-weight="600">of</tspan><tspan fill="#ffffff"> Object.keys(source)) {</tspan></text>
  <text x="58" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (FORBIDDEN.includes(key)) </tspan><tspan fill="#7ec8e3" font-weight="600">continue</tspan></text>
  <text x="58" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    target[key] = source[key]</tspan></text>
  <text x="58" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  }</tspan></text>
  <text x="58" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>

