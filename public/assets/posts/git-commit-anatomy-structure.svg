  <text x="490" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">tree</text>
  <text x="490" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일 스냅샷(트리 객체)의 해시.</text>
  <text x="490" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이 트리가 당시 디렉터리 전체.</text>

  <text x="490" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">parent</text>
  <text x="490" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이전 커밋 해시. 병합 커밋은</text>
  <text x="490" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">parent가 2개 이상.</text>

  <text x="490" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">author / committer</text>
  <text x="490" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이름, 이메일, Unix 타임스탬프,</text>
  <text x="490" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타임존 오프셋. rebase 시 분리.</text>

  <text x="490" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">SHA-1 해시</text>
  <text x="490" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">위 모든 내용을 합친 텍스트의</text>
  <text x="490" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SHA-1. 내용이 1바이트라도</text>
  <text x="490" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다르면 완전히 다른 해시.</text>

  <text x="490" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">불변성</text>
  <text x="490" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커밋 객체는 수정 불가.</text>
  <text x="490" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">amend는 새 객체를 만든다.</text>
