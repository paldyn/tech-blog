<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker Compose 아키텍처</text>

  <!-- compose.yaml center -->
  <rect x="320" y="72" width="240" height="64" rx="10" fill="#1a1a28" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">compose.yaml</text>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">단일 파일로 전체 스택 정의</text>

  <!-- Arrow down to Docker Engine -->
  <line x1="440" y1="136" x2="440" y2="168" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="458" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker compose up</text>

  <!-- Docker Engine -->
  <rect x="320" y="170" width="240" height="44" rx="8" fill="#132030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Docker Engine (API)</text>

  <!-- Arrow down to containers -->
  <line x1="440" y1="214" x2="440" y2="236" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- App Stack box -->
  <rect x="80" y="238" width="720" height="200" rx="10" fill="#101018" stroke="#555" stroke-width="1"/>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">앱 스택 (자동 생성)</text>

  <!-- web container -->
  <rect x="100" y="278" width="180" height="80" rx="8" fill="#132030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="190" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">web</text>
  <text x="190" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">nginx:1.25</text>
  <text x="190" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">ports: 80:80</text>
  <text x="190" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">myapp_default</text>

  <!-- api container -->
  <rect x="350" y="278" width="180" height="80" rx="8" fill="#1a2814" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">api</text>
  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">node:20-alpine</text>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">ports: 3000:3000</text>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">depends_on: db</text>

  <!-- db container -->
  <rect x="600" y="278" width="180" height="80" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="690" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">db</text>
  <text x="690" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">postgres:16</text>
  <text x="690" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">volumes: pgdata</text>
  <text x="690" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">myapp_default</text>

  <!-- Arrows between containers -->
  <line x1="280" y1="318" x2="348" y2="318" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="530" y1="318" x2="598" y2="318" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Network label -->
  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">myapp_default network (자동 생성)</text>

  <!-- Volume label -->
  <rect x="600" y="408" width="180" height="24" rx="6" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="690" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">named volume: pgdata (자동 생성)</text>

  <!-- Bottom benefits -->
  <rect x="60" y="454" width="760" height="52" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="160" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">단일 명령</text>
  <text x="160" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">up / down / ps / logs</text>
  <line x1="270" y1="460" x2="270" y2="500" stroke="#333" stroke-width="1"/>
  <text x="370" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">자동 네트워크</text>
  <text x="370" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컨테이너 이름 DNS 자동</text>
  <line x1="470" y1="460" x2="470" y2="500" stroke="#333" stroke-width="1"/>
  <text x="570" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">볼륨 영속</text>
  <text x="570" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">named volume 자동 관리</text>
  <line x1="670" y1="460" x2="670" y2="500" stroke="#333" stroke-width="1"/>
  <text x="770" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">재현 가능</text>
  <text x="770" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">팀 전체 동일 환경</text>
</svg>
