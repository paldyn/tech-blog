<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">transaction() args 파라미터 활용</text>

  <!-- Left: args format -->
  <rect x="60" y="72" width="360" height="320" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">args 포맷과 사용 시점</text>

  <rect x="80" y="116" width="320" height="56" fill="#0d1520" rx="5" stroke="#3a4a6e"/>
  <text x="240" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">형식: "key=value key2=value2 ..."</text>
  <text x="240" y="156" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"pageNo=1 pageSize=20 sortCol=NAME"</text>

  <rect x="80" y="186" width="320" height="44" fill="#0d1520" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">사용 시점: Dataset이 필요 없는 단순 값</text>
  <text x="240" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">페이지 번호, 정렬 컬럼, 삭제 키값 등</text>

  <rect x="80" y="244" width="320" height="44" fill="#0d1520" rx="5" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">주의: 값에 공백 포함 시 문제 발생</text>
  <text x="240" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">공백은 key=value 구분자이므로 URL 인코딩 필요</text>

  <rect x="80" y="302" width="320" height="68" fill="#0d1520" rx="5" stroke="#3a4a6e"/>
  <text x="240" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">서버 수신 방법</text>
  <text x="96" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">req.getParameter("pageNo")</text>
  <text x="96" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">req.getParameter("sortCol")</text>

  <!-- Right: code block -->
  <rect x="440" y="72" width="380" height="320" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="630" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">실전 예제</text>
  <line x1="440" y1="102" x2="820" y2="102" stroke="#3a4a6e" stroke-width="1"/>

  <text x="456" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">// 페이징 + 정렬 args 전달</text>
  <text x="456" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">var</text>
  <text x="477" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve"> sArgs =</text>
  <text x="456" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "pageNo="</text>
  <text x="519" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve"> + this.nPageNo</text>
  <text x="456" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  + " pageSize=20"</text>
  <text x="456" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  + " sortCol="</text>
  <text x="538" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve"> + this.sSortCol</text>
  <text x="456" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  + " sortDir="</text>
  <text x="535" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve"> + this.sSortDir;</text>

  <text x="456" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">this.transaction(</text>
  <text x="456" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "SVC_SRCH"</text>
  <text x="519" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">,</text>
  <text x="456" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "SVC_EMP::getList"</text>
  <text x="573" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">,</text>
  <text x="456" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "dsCond=dsSearch"</text>
  <text x="563" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">,</text>
  <text x="456" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "dsResult=dsMain"</text>
  <text x="558" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">,</text>
  <text x="456" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">  sArgs</text>
  <text x="492" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">,</text>
  <text x="510" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">// ← args 전달</text>
  <text x="456" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "fn_searchCb"</text>
  <text x="456" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">);</text>

  <!-- Bottom note -->
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">args는 Dataset 없이 단순 스칼라 값을 전달할 때 사용 — 복잡한 데이터는 inDatasets로</text>
</svg>
