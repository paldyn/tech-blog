<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Spring Cloud 서비스 디스커버리</text>
  <text x="440" y="74" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" fill="#888">Eureka 서버를 통한 서비스 자동 등록·탐색 흐름</text>

  <!-- Left box: Microservices -->
  <rect x="60" y="104" width="200" height="270" rx="8" fill="#111118" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="130" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">마이크로서비스</text>
  <text x="160" y="150" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">@EnableDiscoveryClient</text>

  <rect x="80" y="164" width="160" height="36" rx="5" fill="#1a1a2e" stroke="#4a5568" stroke-width="1"/>
  <text x="160" y="187" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">OrderService</text>

  <rect x="80" y="210" width="160" height="36" rx="5" fill="#1a1a2e" stroke="#4a5568" stroke-width="1"/>
  <text x="160" y="233" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">UserService</text>

  <rect x="80" y="256" width="160" height="36" rx="5" fill="#1a1a2e" stroke="#4a5568" stroke-width="1"/>
  <text x="160" y="279" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">ProductService</text>

  <rect x="80" y="306" width="160" height="52" rx="5" fill="#0e1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="326" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">시작 시 자동 등록</text>
  <text x="160" y="342" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">30초마다 하트비트 전송</text>
  <text x="160" y="358" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">종료 시 자동 해제</text>

  <!-- Register arrow -->
  <line x1="260" y1="220" x2="328" y2="220"
    stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="294" y="207" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">등록</text>

  <!-- Center box: Eureka Server -->
  <rect x="330" y="104" width="220" height="270" rx="10" fill="#0f1929" stroke="#2d5a8e" stroke-width="2"/>
  <text x="440" y="130" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="700" fill="#7ec8e3">Eureka Server</text>
  <text x="440" y="150" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">Service Registry</text>

  <line x1="350" y1="162" x2="530" y2="162" stroke="#2d5a8e" stroke-width="1"/>

  <rect x="350" y="172" width="180" height="38" rx="4" fill="#162030" stroke="#2d5a8e" stroke-width="1"/>
  <text x="440" y="190" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">order-service</text>
  <text x="440" y="205" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">instances: 2</text>

  <rect x="350" y="220" width="180" height="38" rx="4" fill="#162030" stroke="#2d5a8e" stroke-width="1"/>
  <text x="440" y="238" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">user-service</text>
  <text x="440" y="253" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">instances: 2</text>

  <rect x="350" y="268" width="180" height="38" rx="4" fill="#162030" stroke="#2d5a8e" stroke-width="1"/>
  <text x="440" y="286" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">product-service</text>
  <text x="440" y="301" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">instances: 1</text>

  <text x="440" y="330" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">하트비트 미수신 시 자동 제거</text>
  <text x="440" y="346" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">Self-Preservation Mode</text>

  <!-- Query arrow: client -> Eureka -->
  <line x1="620" y1="243" x2="552" y2="243"
    stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="586" y="229" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">서비스 조회</text>

  <!-- Return arrow: Eureka -> client -->
  <line x1="550" y1="272" x2="618" y2="272"
    stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="584" y="292" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">주소 목록 반환</text>

  <!-- Right box: Client -->
  <rect x="620" y="104" width="200" height="270" rx="8" fill="#0e1c0e" stroke="#1e5c1e" stroke-width="1.5"/>
  <text x="720" y="130" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">서비스 소비자</text>

  <rect x="640" y="148" width="160" height="52" rx="5" fill="#162016" stroke="#2d6e2d" stroke-width="1"/>
  <text x="720" y="170" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">@FeignClient</text>
  <text x="720" y="187" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">name = "order-service"</text>

  <rect x="640" y="212" width="160" height="52" rx="5" fill="#162016" stroke="#2d6e2d" stroke-width="1"/>
  <text x="720" y="234" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">@LoadBalanced</text>
  <text x="720" y="251" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">클라이언트 사이드 LB</text>

  <rect x="640" y="276" width="160" height="52" rx="5" fill="#162016" stroke="#2d6e2d" stroke-width="1"/>
  <text x="720" y="298" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">서비스명으로 호출</text>
  <text x="720" y="315" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">http://order-service/api</text>

  <!-- Bottom note -->
  <text x="440" y="428" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">IP 대신 서비스 이름으로 호출 — Eureka가 실제 인스턴스 주소를 대신 찾아준다</text>
</svg>
