<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle 스토리지 논리 계층 구조</text>

  <!-- Level 1: Database -->
  <rect x="60" y="70" width="760" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">DATABASE</text>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Oracle 인스턴스가 관리하는 전체 데이터의 집합 (Control File, Data File, Redo Log)</text>

  <!-- Arrow down -->
  <line x1="440" y1="130" x2="440" y2="155" stroke="#555" stroke-width="2"/>
  <polygon points="432,155 448,155 440,168" fill="#555"/>

  <!-- Level 2: Tablespace -->
  <rect x="100" y="170" width="680" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">TABLESPACE</text>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">논리적 저장 단위 — SYSTEM, SYSAUX, USERS, TEMP, UNDO 등</text>

  <!-- Arrow down -->
  <line x1="440" y1="230" x2="440" y2="255" stroke="#555" stroke-width="2"/>
  <polygon points="432,255 448,255 440,268" fill="#555"/>

  <!-- Level 3: Segment -->
  <rect x="140" y="270" width="600" height="60" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">SEGMENT</text>
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">테이블·인덱스·Undo·임시 세그먼트 — 객체마다 1개 이상</text>

  <!-- Arrow down -->
  <line x1="440" y1="330" x2="440" y2="355" stroke="#555" stroke-width="2"/>
  <polygon points="432,355 448,355 440,368" fill="#555"/>

  <!-- Level 4: Extent -->
  <rect x="180" y="370" width="520" height="60" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">EXTENT</text>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">연속된 데이터 블록의 묶음 — 공간 할당의 최소 단위</text>

  <!-- Arrow down -->
  <line x1="440" y1="430" x2="440" y2="455" stroke="#555" stroke-width="2"/>
  <polygon points="432,455 448,455 440,468" fill="#555"/>

  <!-- Level 5: Block -->
  <rect x="240" y="470" width="400" height="36" rx="8" fill="#14100a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b5cea8">DATA BLOCK</text>
  <text x="440" y="501" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">I/O 최소 단위 — DB_BLOCK_SIZE (2K~32K, 기본 8KB)</text>
</svg>
