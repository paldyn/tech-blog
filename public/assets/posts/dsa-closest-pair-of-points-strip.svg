<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Strip 탐색 - 각 점은 최대 7개만 비교</text>

  <!-- Left: Strip visualization -->
  <text x="80" y="80" font-size="16" font-weight="600" fill="#e8e8e8">Strip 영역 (너비 2&#948;)</text>

  <!-- Grid area -->
  <rect x="60" y="90" width="360" height="370" rx="6" fill="#080808" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Strip background -->
  <rect x="180" y="90" width="120" height="370" fill="#7777cc" fill-opacity="0.08"/>

  <!-- Dividing line -->
  <line x1="240" y1="90" x2="240" y2="460" stroke="#7777cc" stroke-width="2"/>

  <!-- Delta markers -->
  <line x1="180" y1="90" x2="180" y2="460" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="300" y1="90" x2="300" y2="460" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Delta labels -->
  <text x="240" y="114" font-size="12" fill="#e05555" text-anchor="middle">&#8592; &#948; &#8594; | &#8592; &#948; &#8594;</text>
  <text x="240" y="128" font-size="11" fill="#888" text-anchor="middle">총 너비 = 2&#948;</text>

  <!-- Points in strip (colored differently) -->
  <circle cx="200" cy="180" r="7" fill="#e05555" stroke="#c03333" stroke-width="2"/>
  <text x="210" y="176" font-size="11" fill="#e05555">S1</text>

  <circle cx="225" cy="240" r="7" fill="#e05555" stroke="#c03333" stroke-width="2"/>
  <text x="235" y="236" font-size="11" fill="#e05555">S2</text>

  <circle cx="260" cy="200" r="7" fill="#e05555" stroke="#c03333" stroke-width="2"/>
  <text x="270" y="196" font-size="11" fill="#e05555">S3</text>

  <circle cx="280" cy="310" r="7" fill="#e05555" stroke="#c03333" stroke-width="2"/>
  <text x="290" y="306" font-size="11" fill="#e05555">S4</text>

  <circle cx="195" cy="350" r="7" fill="#e05555" stroke="#c03333" stroke-width="2"/>
  <text x="205" y="346" font-size="11" fill="#e05555">S5</text>

  <!-- Points outside strip -->
  <circle cx="120" cy="160" r="5" fill="#555"/>
  <circle cx="90" cy="280" r="5" fill="#555"/>
  <circle cx="340" cy="220" r="5" fill="#555"/>
  <circle cx="380" cy="340" r="5" fill="#555"/>
  <circle cx="140" cy="400" r="5" fill="#555"/>

  <!-- 7-point box explanation -->
  <!-- delta x delta rectangle around S1 -->
  <rect x="180" y="166" width="120" height="96" rx="2" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="200" y="272" font-size="11" fill="#55c555">&#948; x 2&#948; 박스</text>

  <!-- Right: Code + explanation -->
  <text x="460" y="80" font-size="16" font-weight="600" fill="#e8e8e8">Strip 탐색 코드</text>

  <rect x="440" y="90" width="400" height="250" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="460" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">closest_pair(pts):</tspan></text>

  <text x="460" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">len</tspan><tspan fill="#ffffff">(pts) &lt;= </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="460" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> brute_force(pts)</tspan></text>

  <text x="460" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  mid = </tspan><tspan fill="#7ec8e3" font-weight="600">len</tspan><tspan fill="#ffffff">(pts) // </tspan><tspan fill="#b5cea8">2</tspan></text>

  <text x="460" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  mx = pts[mid][</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">]</tspan></text>

  <text x="460" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  dl = closest_pair(pts[:mid])</tspan></text>

  <text x="460" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  dr = closest_pair(pts[mid:])</tspan></text>

  <text x="460" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  d  = </tspan><tspan fill="#7ec8e3" font-weight="600">min</tspan><tspan fill="#ffffff">(dl, dr)</tspan></text>

  <text x="460" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  strip = [p </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> p </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> pts</tspan></text>

  <text x="460" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">           </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">abs</tspan><tspan fill="#ffffff">(p[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">]-mx) &lt; d]</tspan></text>

  <text x="460" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  return </tspan><tspan fill="#7ec8e3" font-weight="600">min</tspan><tspan fill="#ffffff">(d, strip_closest(strip, d))</tspan></text>

  <!-- 7-point proof box -->
  <rect x="440" y="356" width="400" height="130" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="378" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">각 점이 최대 7개만 비교하는 이유</text>
  <text x="460" y="400" font-size="13" fill="#888">strip 안에서 y값 기준 정렬 후 슬라이딩 윈도우</text>
  <text x="460" y="420" font-size="13" fill="#888">&#948; x 2&#948; 사각형 안에 최대 8개 점 (양쪽 4개씩)</text>
  <text x="460" y="440" font-size="13" fill="#888">현재 점 제외하면 최대 7개 비교 → O(1) per point</text>
  <text x="460" y="460" font-size="13" fill="#55c555">strip_closest: O(N) → 전체: T(N)=2T(N/2)+O(N)=O(N log N)</text>

  <!-- Strip explanation bottom -->
  <text x="240" y="494" font-size="13" fill="#7777cc" text-anchor="middle">strip = |x - mx| &lt; &#948;</text>
  <text x="240" y="510" font-size="12" fill="#888" text-anchor="middle">중앙선 양쪽 &#948; 이내 점만 cross-pair 후보</text>
</svg>
