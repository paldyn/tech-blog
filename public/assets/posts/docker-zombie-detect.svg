<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">좀비 프로세스 탐지 및 방지</text>

  <!-- Detection -->
  <rect x="60" y="68" width="360" height="200" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">탐지</text>

  <rect x="76" y="104" width="328" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> exec &lt;container&gt; \</text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  ps aux | grep Z</text>
  <text x="92" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Z 상태: 좀비</text>
  <text x="92" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># S 상태: sleep</text>
  <text x="92" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># R 상태: running</text>
  <text x="92" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">cat /proc/&lt;PID&gt;/status | grep State</text>

  <!-- Prevention -->
  <rect x="460" y="68" width="360" height="200" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">방지</text>

  <rect x="476" y="104" width="328" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">ENTRYPOINT</tspan> [<tspan fill="#ce9178">"/sbin/tini"</tspan>, <tspan fill="#ce9178">"--"</tspan>]</text>
  <text x="492" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 또는 런타임에</text>
  <text x="492" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> run --init ...</text>
  <text x="492" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 앱에서 직접</text>
  <text x="492" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">waitpid(-1, &amp;status, WNOHANG);</text>
  <text x="492" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># SIGCHLD 핸들러에서 반복</text>
</svg>
