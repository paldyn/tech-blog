<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">서버에서 커스텀 헤더 수신 및 검증</text>

  <!-- Left: Spring Filter Code -->
  <rect x="60" y="68" width="380" height="276" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Spring Filter — 헤더 검증</text>
  <line x1="60" y1="98" x2="440" y2="98" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">@Component</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">public class</text>
  <text x="142" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve"> CsrfFilter {</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">  public void</text>
  <text x="148" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve"> doFilter(</text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">      HttpServletRequest req, ...) {</text>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">    // 클라이언트가 보낸 CSRF 토큰</text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">    String csrfToken =</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">      req.getHeader(</text>
  <text x="175" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">"X-CSRF-Token"</text>
  <text x="280" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">    // 세션 토큰과 비교 검증</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">    if</text>
  <text x="96" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve"> (!validToken.equals(csrfToken)) {</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">      res.setStatus(</text>
  <text x="165" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#b5cea8" xml:space="preserve">403</text>
  <text x="184" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">      return</text>
  <text x="122" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">;</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">    }</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  }</text>

  <!-- Right: JWT code -->
  <rect x="460" y="68" width="360" height="276" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">서버 — JWT Authorization 검증</text>
  <line x1="460" y1="98" x2="820" y2="98" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">@Override</text>
  <text x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">protected void</text>
  <text x="561" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve"> doFilterInternal(</text>
  <text x="476" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">    HttpServletRequest req, ...) {</text>
  <text x="476" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">  // Authorization 헤더 추출</text>
  <text x="476" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  String auth = req.getHeader(</text>
  <text x="476" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">    "Authorization"</text>
  <text x="566" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">);</text>
  <text x="476" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">  // "Bearer {token}" 파싱</text>
  <text x="476" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">  if</text>
  <text x="496" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve"> (auth != null &amp;&amp;</text>
  <text x="476" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">      auth.startsWith(</text>
  <text x="566" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">"Bearer "</text>
  <text x="618" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">)) {</text>
  <text x="476" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">    String token = auth.substring(</text>
  <text x="476" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#b5cea8" xml:space="preserve">      7</text>
  <text x="490" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">); </text>
  <text x="510" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">// "Bearer " 제거</text>
  <text x="476" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">    jwtUtil.validate(token);</text>
  <text x="476" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  }</text>

  <!-- Bottom note -->
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">서버에서 req.getHeader("헤더명")으로 수신 — 일반 HTTP 헤더와 동일</text>
</svg>
