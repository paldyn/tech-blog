<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" markerWidth="21" markerHeight="14" refX="19.25" refY="7" orient="auto">
      <polygon points="0 0, 21 7, 0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arr-g" markerWidth="21" markerHeight="14" refX="19.25" refY="7" orient="auto">
      <polygon points="0 0, 21 7, 0 14" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arr-v" markerWidth="21" markerHeight="14" refX="19.25" refY="7" orient="auto">
      <polygon points="0 0, 21 7, 0 14" fill="#7777cc" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arr-o" markerWidth="21" markerHeight="14" refX="19.25" refY="7" orient="auto">
      <polygon points="0 0, 21 7, 0 14" fill="#ce9178" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">DispatcherServlet 요청 처리 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Spring MVC 프론트 컨트롤러 패턴</text>

  <!-- Client -->
  <rect x="32" y="106" width="96" height="58" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Client</text>
  <text x="80" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Browser</text>

  <!-- ① Client → DS -->
  <line x1="128" y1="135" x2="178" y2="135" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-v)"/>
  <text x="153" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">① HTTP</text>

  <!-- DispatcherServlet -->
  <rect x="179" y="88" width="140" height="94" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="249" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Dispatcher</text>
  <text x="249" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Servlet</text>
  <text x="249" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Front Controller</text>

  <!-- ② DS → HandlerMapping -->
  <line x1="319" y1="115" x2="385" y2="115" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="352" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">② 핸들러 조회</text>

  <!-- HandlerMapping -->
  <rect x="386" y="90" width="170" height="50" rx="6" fill="#091a09" stroke="#55c555" stroke-width="1.2"/>
  <text x="471" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">HandlerMapping</text>
  <text x="471" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">URL → Handler 탐색</text>

  <!-- ③ HandlerMapping → DS (return HandlerExecutionChain) -->
  <line x1="385" y1="128" x2="319" y2="143" stroke="#555" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="350" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">③ HandlerExecutionChain</text>

  <!-- ④ DS → HandlerAdapter -->
  <line x1="319" y1="155" x2="385" y2="185" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="352" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">④ 어댑터 위임</text>

  <!-- HandlerAdapter -->
  <rect x="386" y="172" width="170" height="50" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="471" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">HandlerAdapter</text>
  <text x="471" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Handler 실행 위임</text>

  <!-- ⑤ HandlerAdapter → Controller -->
  <line x1="556" y1="197" x2="616" y2="197" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="586" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">⑤ handle()</text>

  <!-- Controller -->
  <rect x="617" y="172" width="200" height="50" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="717" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">@Controller</text>
  <text x="717" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비즈니스 로직 실행</text>

  <!-- ⑥ Controller → HandlerAdapter (ModelAndView) -->
  <line x1="616" y1="210" x2="556" y2="216" stroke="#555" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="586" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">⑥ ModelAndView</text>

  <!-- ⑦ HandlerAdapter → DS -->
  <line x1="385" y1="215" x2="319" y2="228" stroke="#555" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="350" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">⑦ ModelAndView 반환</text>

  <!-- ⑧ DS → ViewResolver -->
  <line x1="319" y1="160" x2="385" y2="270" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="340" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">⑧ 뷰 해석</text>

  <!-- ViewResolver -->
  <rect x="386" y="256" width="170" height="50" rx="6" fill="#1a100a" stroke="#ce9178" stroke-width="1.2"/>
  <text x="471" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">ViewResolver</text>
  <text x="471" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">논리명 → 물리 뷰 변환</text>

  <!-- ⑨ ViewResolver → View -->
  <line x1="556" y1="281" x2="616" y2="281" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <text x="586" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">⑨ View 획득</text>

  <!-- View -->
  <rect x="617" y="256" width="200" height="50" rx="6" fill="#1a100a" stroke="#ce9178" stroke-width="1.2"/>
  <text x="717" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">View</text>
  <text x="717" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Thymeleaf / JSON 렌더링</text>

  <!-- ⑩ DS → Client (Response) -->
  <line x1="179" y1="162" x2="128" y2="162" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="153" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">⑩ Response</text>

  <!-- Interceptor row -->
  <rect x="60" y="350" width="760" height="160" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">HandlerInterceptor — Handler 실행 전후 끼어들기</text>

  <!-- Interceptor flow -->
  <rect x="76" y="386" width="160" height="50" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="156" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">preHandle()</text>
  <text x="156" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">false → 요청 차단</text>

  <line x1="236" y1="411" x2="296" y2="411" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="297" y="386" width="180" height="50" rx="6" fill="#091a09" stroke="#55c555" stroke-width="1"/>
  <text x="387" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Handler 실행</text>
  <text x="387" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Controller 메서드</text>

  <line x1="477" y1="411" x2="537" y2="411" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="538" y="386" width="160" height="50" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="618" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">postHandle()</text>
  <text x="618" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ModelAndView 수정 가능</text>

  <line x1="698" y1="411" x2="738" y2="411" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="739" y="386" width="65" height="50" rx="6" fill="#1a100a" stroke="#ce9178" stroke-width="1"/>
  <text x="771" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ce9178">after</text>
  <text x="771" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ce9178">Completion</text>

  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">afterCompletion() — 예외 여부와 무관하게 항상 실행 (자원 정리)</text>
  <text x="440" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">@RestController 사용 시 ViewResolver 단계 생략 — MessageConverter가 바로 직렬화</text>
  <text x="440" y="498" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">HandlerExceptionResolver — 예외 발생 시 DispatcherServlet에서 처리</text>
</svg>
