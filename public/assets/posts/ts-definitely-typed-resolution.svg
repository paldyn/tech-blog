<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410">
  <defs>
    <marker id="arrb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="410" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">패키지의 타입은 어디서 오는가 — 탐색 우선순위</text>

  <!-- Check 1 -->
  <rect x="60" y="84" width="360" height="64" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="240" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">① 패키지 자체에 타입이 있는가?</text>
  <text x="240" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">package.json의 types · exports.types 필드</text>

  <line x1="424" y1="116" x2="496" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrb)"/>
  <text x="460" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">있음</text>

  <rect x="500" y="84" width="320" height="64" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">내장 타입 사용</text>
  <text x="660" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예: zod, axios — 항상 최신·정확</text>

  <!-- Down arrow -->
  <line x1="240" y1="148" x2="240" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrb)"/>
  <text x="280" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">없음</text>

  <!-- Check 2 -->
  <rect x="60" y="188" width="360" height="64" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="240" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">② @types/패키지명이 설치돼 있는가?</text>
  <text x="240" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">node_modules/@types를 자동 탐색</text>

  <line x1="424" y1="220" x2="496" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrb)"/>
  <text x="460" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">있음</text>

  <rect x="500" y="188" width="320" height="64" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">DefinitelyTyped 타입 사용</text>
  <text x="660" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예: @types/express, @types/node</text>

  <!-- Down arrow to fail -->
  <line x1="240" y1="252" x2="240" y2="290" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>
  <text x="280" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">없음</text>

  <!-- Fail box -->
  <rect x="60" y="292" width="760" height="64" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">❌ TS7016 — 선언 파일을 찾을 수 없어 암묵적 any</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">해결: @types 검색 → 없으면 직접 .d.ts 작성 (다음 글의 앰비언트 선언)</text>

  <!-- Bottom note -->
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">내장 타입이 있는 패키지에 @types까지 설치하면 둘이 충돌할 수 있다 — 내장이 항상 우선</text>
</svg>
