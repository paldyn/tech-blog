<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">표준 입출력 흐름</text>

  <!-- User box -->
  <rect x="60" y="80" width="150" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="135" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">사용자</text>
  <text x="135" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">(키보드)</text>

  <!-- Arrow: user → input -->
  <line x1="210" y1="110" x2="280" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="245" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">입력</text>

  <!-- input() box -->
  <rect x="283" y="80" width="160" height="60" rx="8" fill="#0d2340" stroke="#3b82f6" stroke-width="2"/>
  <text x="363" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">input()</text>
  <text x="363" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">항상 str 반환</text>

  <!-- Arrow: input → program -->
  <line x1="443" y1="110" x2="513" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="478" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">str</text>

  <!-- Program box -->
  <rect x="516" y="68" width="200" height="84" rx="8" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="616" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 프로그램</text>
  <text x="616" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">int(x) / float(x)</text>
  <text x="616" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">타입 변환 필요</text>

  <!-- Arrow: program → print -->
  <line x1="716" y1="110" x2="786" y2="110" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="751" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">출력</text>

  <!-- print() box -->
  <!-- Removed since out of bounds, use terminal instead -->

  <!-- Terminal box -->
  <rect x="730" y="80" width="110" height="60" rx="8" fill="#0d2d1a" stroke="#166534" stroke-width="2"/>
  <text x="785" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">터미널</text>
  <text x="785" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">stdout</text>

  <!-- Code example -->
  <text x="440" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">코드 예시</text>
  <rect x="60" y="200" width="760" height="140" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># input()은 항상 문자열을 반환한다</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">raw = </tspan><tspan fill="#7ec8e3" font-weight="600">input</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"나이를 입력하세요: "</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff">(raw))   </tspan><tspan fill="#9aa4b8"># &lt;class 'str'&gt; — 항상 문자열</tspan></text>

  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 숫자로 쓰려면 명시적 변환 필요</text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">age = </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">input</tspan><ttml fill="#ffffff">(</ttml><tspan fill="#ce9178">"나이: "</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(f</tspan><tspan fill="#ce9178">"10년 후: {age + 10}세"</tspan><tspan fill="#ffffff">)</tspan></text>
</svg>
