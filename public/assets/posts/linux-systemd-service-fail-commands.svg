<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="44" font-size="22" font-weight="700" fill="#e8e8e8">상태와 원인 한눈에</text>

  <rect x="60" y="72" width="760" height="256" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <text x="76" y="100" xml:space="preserve" fill="#9aa4b8"># 상태와 종료 코드 확인</text>
    <text x="76" y="120" xml:space="preserve" fill="#ffffff">$ <tspan fill="#7ec8e3" font-weight="600">systemctl</tspan> status myapp.service</text>
    <text x="76" y="140" xml:space="preserve" fill="#ffffff">  Active: <tspan fill="#e05555">failed</tspan> (Result: exit-code)</text>
    <text x="76" y="160" xml:space="preserve" fill="#ffffff">  Main PID: code=exited status=<tspan fill="#b5cea8">1</tspan></text>
    <text x="76" y="200" xml:space="preserve" fill="#9aa4b8"># 실패 직전 로그만 빠르게</text>
    <text x="76" y="220" xml:space="preserve" fill="#ffffff">$ <tspan fill="#7ec8e3" font-weight="600">journalctl</tspan> -u myapp -e --no-pager</text>
    <text x="76" y="260" xml:space="preserve" fill="#9aa4b8"># 유닛 수정 후 반드시</text>
    <text x="76" y="280" xml:space="preserve" fill="#ffffff">$ sudo <tspan fill="#7ec8e3" font-weight="600">systemctl</tspan> daemon-reload</text>
    <text x="76" y="300" xml:space="preserve" fill="#ffffff">$ sudo <tspan fill="#7ec8e3" font-weight="600">systemctl</tspan> restart myapp</text>
  </g>
</svg>
