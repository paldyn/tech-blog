<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TIME_WAIT 튜닝 옵션 비교</text>

  <!-- Headers -->
  <rect x="60" y="62" width="220" height="34" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">옵션</text>

  <rect x="282" y="62" width="100" height="34" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="332" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">안전성</text>

  <rect x="384" y="62" width="436" height="34" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="602" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">설명</text>

  <!-- Row 1: SO_REUSEADDR -->
  <rect x="60" y="98" width="220" height="36" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="170" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SO_REUSEADDR</text>
  <rect x="282" y="98" width="100" height="36" rx="0" fill="#0a2a0a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="332" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">안전</text>
  <rect x="384" y="98" width="436" height="36" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="602" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">같은 포트로 서버 재시작 시 bind 허용 (서버 필수)</text>

  <!-- Row 2: tcp_tw_reuse -->
  <rect x="60" y="136" width="220" height="36" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="170" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">tcp_tw_reuse</text>
  <rect x="282" y="136" width="100" height="36" rx="0" fill="#1a1a0a" stroke="#3a3a2a" stroke-width="1"/>
  <text x="332" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">조건부</text>
  <rect x="384" y="136" width="436" height="36" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="602" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Outbound 연결 포트 재사용. NAT 없는 환경만 안전</text>

  <!-- Row 3: tcp_tw_recycle (removed) -->
  <rect x="60" y="174" width="220" height="36" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="170" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">tcp_tw_recycle ✗</text>
  <rect x="282" y="174" width="100" height="36" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="332" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">위험</text>
  <rect x="384" y="174" width="436" height="36" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="602" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Linux 4.12 삭제됨. NAT 환경 패킷 드롭 위험</text>

  <!-- Row 4: Keep-Alive -->
  <rect x="60" y="212" width="220" height="36" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="170" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Keep-Alive / HTTP/2</text>
  <rect x="282" y="212" width="100" height="36" rx="0" fill="#0a2a0a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="332" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">권장</text>
  <rect x="384" y="212" width="436" height="36" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="602" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">연결 재사용으로 연결 종료 자체를 줄임 (근본 해결)</text>

  <!-- Row 5: SO_LINGER -->
  <rect x="60" y="250" width="220" height="36" rx="0" fill="#1a0808" stroke="#3a2a2a" stroke-width="1"/>
  <text x="170" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">SO_LINGER(0)</text>
  <rect x="282" y="250" width="100" height="36" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="332" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">위험</text>
  <rect x="384" y="250" width="436" height="36" rx="0" fill="#1a0808" stroke="#3a2a2a" stroke-width="1"/>
  <text x="602" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RST로 강제 종료 → 데이터 유실, TIME_WAIT 건너뜀</text>

  <!-- Code block -->
  <rect x="60" y="304" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># TIME_WAIT 현황 및 포트 고갈 진단</text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ss -s | <text fill="#7ec8e3" font-weight="600">grep</text> TIME-WAIT</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><text fill="#7ec8e3" font-weight="600">cat</text> /proc/sys/net/ipv4/ip_local_port_range</text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 32768 60999 → 포트 28232개, TIME_WAIT이 이 이상이면 고갈</text>
</svg>
