  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">주요 모델 · 개발사 · 특징</text>

  <!-- HyperCLOVA X -->
  <rect x="60" y="96" width="240" height="140" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
