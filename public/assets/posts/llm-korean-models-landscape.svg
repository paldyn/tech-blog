  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">한국어 LLM 평가: KoMT-Bench, KMMLU, Ko-H4 등 한국어 특화 벤치마크 활용</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">2024년 이후: 글로벌 LLM(GPT-4o, Claude 3.5)이 한국어 성능에서도 경쟁력 보유</text>
