<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Micrometer — 메트릭 파사드 아키텍처</text>

  <!-- Spring Application (top) -->
  <rect x="260" y="68" width="360" height="60" rx="10" fill="#0d1b33" stroke="#4a9eff" stroke-width="2"/>
  <text x="440" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Spring Boot Application</text>
  <text x="440" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Counter · Gauge · Timer · DistributionSummary</text>

  <!-- Arrow down to Micrometer -->
  <line x1="440" y1="128" x2="440" y2="160" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Micrometer facade (center) -->
  <rect x="200" y="160" width="480" height="56" rx="10" fill="#331a0d" stroke="#e07a40" stroke-width="2"/>
  <text x="440" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e07a40">Micrometer (Vendor-Neutral Facade)</text>
  <text x="440" y="205" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MeterRegistry · Meter · Tag / dimension 통합</text>

  <!-- Fan out to backends -->
  <path d="M 310 216 Q 148 255 148 280" stroke="#e07a40" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 370 216 Q 310 255 300 280" stroke="#e07a40" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="440" y1="216" x2="440" y2="280" stroke="#e07a40" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 510 216 Q 570 255 580 280" stroke="#e07a40" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 570 216 Q 732 255 732 280" stroke="#e07a40" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Backend: Prometheus -->
  <rect x="60" y="280" width="178" height="64" rx="8" fill="#1a2e1a" stroke="#4aaf6b" stroke-width="1.5"/>
  <text x="149" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Prometheus</text>
  <text x="149" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Pull 방식 스크래핑</text>
  <text x="149" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">/actuator/prometheus</text>

  <!-- Backend: DataDog -->
  <rect x="256" y="280" width="150" height="64" rx="8" fill="#0d1b33" stroke="#3a6baf" stroke-width="1.5"/>
  <text x="331" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Datadog</text>
  <text x="331" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Push 방식</text>
  <text x="331" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">클라우드 모니터링</text>

  <!-- Backend: CloudWatch -->
  <rect x="421" y="280" width="150" height="64" rx="8" fill="#0d1b33" stroke="#3a6baf" stroke-width="1.5"/>
  <text x="496" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">CloudWatch</text>
  <text x="496" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AWS 통합</text>
  <text x="496" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">자동 알람 연동</text>

  <!-- Backend: InfluxDB -->
  <rect x="585" y="280" width="130" height="64" rx="8" fill="#1a1a0d" stroke="#5a5a00" stroke-width="1.5"/>
  <text x="650" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#c5c555">InfluxDB</text>
  <text x="650" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시계열 DB</text>

  <!-- Backend: Others -->
  <rect x="728" y="280" width="112" height="64" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <text x="784" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Graphite</text>
  <text x="784" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">New Relic ...</text>

  <!-- Prometheus -> Grafana -->
  <line x1="149" y1="344" x2="149" y2="394" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
  <rect x="60" y="394" width="178" height="48" rx="8" fill="#1a2e1a" stroke="#4aaf6b" stroke-width="1.5"/>
  <text x="149" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Grafana</text>
  <text x="149" y="433" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">대시보드 시각화</text>

  <!-- Key message -->
  <text x="440" y="452" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">코드는 Micrometer API 하나로 — 백엔드는 설정만 바꿔서 교체 가능</text>
</svg>
