<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#9988dd"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CODEOWNERS: 경로 → 소유자 매핑</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">패턴마다 담당 팀·사용자를 지정한다 (아래 규칙이 우선)</text>

  <!-- CODEOWNERS file -->
  <text x="60" y="116"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#aaaaaa">.github/CODEOWNERS</text>
  <rect x="60" y="130" width="400" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 기본 소유자</text>
  <text x="76" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">*            @org/core</text>
  <text x="76" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 프론트엔드</text>
  <text x="76" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">/web/        @org/frontend</text>
  <text x="76" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 인프라</text>
  <text x="76" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">*.tf         @org/infra</text>
  <text x="76" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 문서</text>
  <text x="76" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">/docs/       @alice</text>

  <!-- arrows to owners -->
  <line x1="464" y1="232" x2="600" y2="172" stroke="#9988dd" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <line x1="464" y1="284" x2="600" y2="252" stroke="#9988dd" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <line x1="464" y1="336" x2="600" y2="332" stroke="#9988dd" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>

  <!-- owners -->
  <rect x="604" y="150" width="216" height="44" rx="8" fill="#16122a" stroke="#9988dd" stroke-width="1.3"/>
  <text x="712" y="177" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">@org/frontend 팀</text>

  <rect x="604" y="230" width="216" height="44" rx="8" fill="#16122a" stroke="#9988dd" stroke-width="1.3"/>
  <text x="712" y="257" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">@org/infra 팀</text>

  <rect x="604" y="310" width="216" height="44" rx="8" fill="#16122a" stroke="#9988dd" stroke-width="1.3"/>
  <text x="712" y="337" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">@alice</text>

  <text x="440" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">한 파일이 여러 패턴에 맞으면 파일에서 가장 마지막에 일치한 규칙이 적용된다</text>
</svg>
