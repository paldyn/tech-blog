<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">페이징·필터·정렬 구현 코드</text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">@PageableDefault · Specification(필터) · Sort(정렬) 조합</text>

  <!-- Left code box: Controller -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Controller — Pageable 파라미터 바인딩</text>
  <rect x="60" y="108" width="380" height="316" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@GetMapping</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"/users"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public </tspan><tspan fill="#ffffff">Page&lt;UserDto&gt; list(</tspan></text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">@PageableDefault</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">        <tspan fill="#7ec8e3">size</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">        <tspan fill="#7ec8e3">sort</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#ce9178">"createdAt"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">        <tspan fill="#7ec8e3">direction</tspan><tspan fill="#ffffff"> = DESC)</tspan></text>
  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#ffffff">Pageable pageable,</tspan></text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">@RequestParam</tspan><tspan fill="#ffffff">(required = </tspan><tspan fill="#b5cea8">false</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#ffffff">String keyword,</tspan></text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">@RequestParam</tspan><tspan fill="#ffffff">(required = </tspan><tspan fill="#b5cea8">false</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#ffffff">String status) {</tspan></text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">userService</tspan></text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#ffffff">.search(keyword, status, pageable)</tspan></text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#ffffff">.map(UserDto::from);</tspan></text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>

  <!-- Right code box: Repository + custom response -->
  <text x="460" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Repository · 커스텀 페이징 응답 DTO</text>
  <rect x="460" y="108" width="360" height="316" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// Repository</tspan></text>
  <text x="476" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public interface </tspan><tspan fill="#ffffff">UserRepository</tspan></text>
  <text x="476" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">extends </tspan><tspan fill="#ffffff">JpaRepository&lt;User, Long&gt; {</tspan></text>
  <text x="476" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#ffffff">Page&lt;User&gt; findByStatus(</tspan></text>
  <text x="476" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">      <tspan fill="#ffffff">String status, Pageable p);</tspan></text>
  <text x="476" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>
  <text x="476" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> </text>
  <text x="476" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 커스텀 응답 래퍼 DTO</tspan></text>
  <text x="476" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">record </tspan><tspan fill="#ffffff">PageResponse&lt;T&gt;(</tspan></text>
  <text x="476" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#ffffff">List&lt;T&gt; content,</tspan></text>
  <text x="476" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#b5cea8">int</tspan><tspan fill="#ffffff"> page, </tspan><tspan fill="#b5cea8">int</tspan><tspan fill="#ffffff"> size,</tspan></text>
  <text x="476" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#b5cea8">long</tspan><tspan fill="#ffffff"> totalElements,</tspan></text>
  <text x="476" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#b5cea8">int</tspan><tspan fill="#ffffff"> totalPages</tspan></text>
  <text x="476" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">) {</tspan></text>
  <text x="476" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">static </tspan><tspan fill="#ffffff">&lt;T&gt; PageResponse&lt;T&gt; of(Page&lt;T&gt; p) {</tspan></text>
  <text x="476" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">return new </tspan><tspan fill="#ffffff">PageResponse&lt;&gt;(p.getContent(),</tspan></text>
  <text x="476" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">      <tspan fill="#ffffff">p.getNumber(), p.getSize(),</tspan></text>
</svg>
