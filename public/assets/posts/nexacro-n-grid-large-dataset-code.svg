<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">대용량 Grid 성능 최적화 설정</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">tracemode / suppressredraw / Dataset 관련 속성</text>

  <!-- Left: XML attributes -->
  <rect x="60" y="94" width="360" height="30" fill="#1a1a2e" rx="4"/>
  <text x="240" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Grid XML 성능 속성</text>

  <rect x="60" y="129" width="360" height="252" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Grid</text>
  <text x="76" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  id=<tspan fill="#ce9178">"grd"</tspan></text>
  <text x="76" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  <!-- 가상 스크롤 행 수 --></text>
  <text x="76" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  virtualrowcount=<tspan fill="#b5cea8">"50"</tspan></text>
  <text x="76" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  <!-- 행 높이 고정 (가상화 필수) --></text>
  <text x="76" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  rowheight=<tspan fill="#b5cea8">"24"</tspan></text>
  <text x="76" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  <!-- 이미지 지연 로드 --></text>
  <text x="76" y="279" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  useimagecache=<tspan fill="#ce9178">"true"</tspan></text>
  <text x="76" y="297" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  <!-- 셀 재사용 모드 --></text>
  <text x="76" y="315" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  cellrecycling=<tspan fill="#ce9178">"true"</tspan></text>
  <text x="76" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">/&gt;</text>

  <!-- Right: script optimization -->
  <rect x="460" y="94" width="360" height="30" fill="#1a1a2e" rx="4"/>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">스크립트 일괄 처리 패턴</text>

  <rect x="460" y="129" width="360" height="252" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="476" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 대량 데이터 설정 시</text>
  <text x="476" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 화면 갱신을 일시 중단</text>
  <text x="476" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">grd.set_suppressredraw(<tspan fill="#b5cea8">true</tspan>);</text>
  <text x="476" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 작업 수행 (컬럼 추가, 스타일 등)</text>
  <text x="476" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for</text>
  <text x="500" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (var r=<tspan fill="#b5cea8">0</tspan>; r&lt;ds.rowcount; r++) {</text>
  <text x="476" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  fn_setRowStyle(grd, r);</text>
  <text x="476" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="476" y="297" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 한 번에 화면 갱신</text>
  <text x="476" y="315" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">grd.set_suppressredraw(<tspan fill="#b5cea8">false</tspan>);</text>
  <text x="476" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">grd.redraw();</text>
  <text x="476" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 개별 갱신 대비 대폭 빨라짐</text>
</svg>
