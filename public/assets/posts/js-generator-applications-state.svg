<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제너레이터 상태 기계</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">yield로 상태 전환 관리</text>

  <!-- 상태 다이어그램 -->
  <!-- IDLE -->
  <rect x="60" y="110" width="120" height="50" rx="25" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">IDLE</text>
  <!-- 화살표 IDLE → RUNNING -->
  <line x1="180" y1="135" x2="260" y2="135" stroke="#55c555" stroke-width="2"/>
  <polygon points="260,135 250,129 250,141" fill="#55c555"/>
  <text x="220" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">next()</text>
  <!-- RUNNING -->
  <rect x="260" y="110" width="140" height="50" rx="25" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="330" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">RUNNING</text>
  <!-- 화살표 RUNNING → SUSPENDED -->
  <line x1="400" y1="135" x2="480" y2="135" stroke="#7777cc" stroke-width="2"/>
  <polygon points="480,135 470,129 470,141" fill="#7777cc"/>
  <text x="440" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">yield</text>
  <!-- SUSPENDED -->
  <rect x="480" y="110" width="140" height="50" rx="25" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="550" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">SUSPENDED</text>
  <!-- 화살표 SUSPENDED → RUNNING (아래 루프) -->
  <path d="M550,160 Q550,195 440,195 Q330,195 330,160" stroke="#55c555" stroke-width="2" fill="none"/>
  <polygon points="330,160 324,170 336,170" fill="#55c555"/>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">next() / throw()</text>
  <!-- 화살표 RUNNING → COMPLETED -->
  <line x1="660" y1="135" x2="740" y2="135" stroke="#e05555" stroke-width="2"/>
  <polygon points="740,135 730,129 730,141" fill="#e05555"/>
  <text x="700" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">return</text>
  <!-- COMPLETED -->
  <rect x="740" y="110" width="100" height="50" rx="25" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="790" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">DONE</text>
  <!-- SUSPENDED → DONE -->
  <path d="M620,135 Q680,80 740,135" stroke="#e05555" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="740,135 728,130 732,142" fill="#e05555"/>
  <text x="685" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">return()</text>

  <!-- 코드 예 -->
  <rect x="60" y="240" width="760" height="140" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 트래픽 신호 상태 기계</text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text>
  <text x="132" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">* trafficLight() {</text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  while</text>
  <text x="116" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (</text>
  <text x="128" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">true</text>
  <text x="160" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">) {</text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    yield</text>
  <text x="116" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> '🔴 빨강'</text>
  <text x="200" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    yield</text>
  <text x="116" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> '🟡 노랑'</text>
  <text x="200" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    yield</text>
  <text x="116" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> '🟢 초록'</text>
  <text x="200" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="250" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// const light = trafficLight();</text>
  <text x="250" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// light.next().value → '🔴 빨강'</text>
  <text x="250" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// light.next().value → '🟡 노랑'</text>
  <text x="250" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// light.next().value → '🟢 초록'</text>

  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
