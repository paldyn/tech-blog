<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">MLP 완전 구현: MNIST 분류기</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">PyTorch로 손글씨 숫자(MNIST) 분류 MLP 구현 — 전체 파이프라인</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="258" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">import</tspan> torch, torch.nn <tspan fill="#7ec8e3">as</tspan> nn</text>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">from</tspan> torchvision <tspan fill="#7ec8e3">import</tspan> datasets, transforms</text>

  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">class</tspan> <tspan fill="#ffffff">MLP</tspan>(nn.Module):</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">def</tspan> <tspan fill="#55c555">__init__</tspan>(self):</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    super().__init__()</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    self.net = nn.Sequential(</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        nn.Flatten(),</text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        nn.Linear(<tspan fill="#b5cea8">784</tspan>, <tspan fill="#b5cea8">512</tspan>), nn.ReLU(),</text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        nn.Linear(<tspan fill="#b5cea8">512</tspan>, <tspan fill="#b5cea8">256</tspan>), nn.ReLU(),</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        nn.Linear(<tspan fill="#b5cea8">256</tspan>, <tspan fill="#b5cea8">10</tspan>),</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    )</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">def</tspan> <tspan fill="#55c555">forward</tspan>(self, x):</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">return</tspan> self.net(x)</text>

  <!-- Param count and accuracy info boxes -->
  <rect x="60" y="358" width="350" height="46" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="376" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">파라미터 수</text>
  <text x="235" y="396" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="600" xml:space="preserve">784×512+512 + 512×256+256 + 256×10+10 = 535,818</text>

  <rect x="470" y="358" width="350" height="46" rx="8" fill="#0c1a0c" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="376" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">MNIST 달성 정확도</text>
  <text x="645" y="396" text-anchor="middle" fill="#55c555" font-size="14" font-weight="700" xml:space="preserve">~98.0% (5 epoch, Adam lr=1e-3)</text>

  <!-- Footer -->
</svg>
