  <text x="260" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">0,1</text>
  <rect x="290" y="158" width="60" height="40" fill="#1a2a4a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="320" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">1,2</text>
  <rect x="350" y="206" width="60" height="40" fill="#1a2a4a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="380" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">2,3</text>
  <rect x="410" y="254" width="60" height="40" fill="#1a2a4a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">3,4</text>

  <!-- Diagonal length 3 -->
  <rect x="290" y="110" width="60" height="40" fill="#2a2a1a" rx="4" stroke="#e0c555" stroke-width="1.5"/>
  <text x="320" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0c555">0,2</text>
  <rect x="350" y="158" width="60" height="40" fill="#2a2a1a" rx="4" stroke="#e0c555" stroke-width="1.5"/>
  <text x="380" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0c555">1,3</text>
  <rect x="410" y="206" width="60" height="40" fill="#2a2a1a" rx="4" stroke="#e0c555" stroke-width="1.5"/>
  <text x="440" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0c555">2,4</text>

  <!-- Diagonal length 4 -->
  <rect x="350" y="110" width="60" height="40" fill="#3a1a2a" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="380" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">0,3</text>
  <rect x="410" y="158" width="60" height="40" fill="#3a1a2a" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">1,4</text>

  <!-- Diagonal length 5 (full) -->
  <rect x="410" y="110" width="60" height="40" fill="#3a2a1a" rx="4" stroke="#e09055" stroke-width="2"/>
  <text x="440" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09055" font-weight="600">0,4</text>

  <!-- Lower triangle: unused -->
  <rect x="170" y="158" width="60" height="40" fill="#0d0d0d" rx="4" stroke="#222" stroke-width="1"/>
  <text x="200" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#333">✕</text>
  <rect x="170" y="206" width="60" height="40" fill="#0d0d0d" rx="4" stroke="#222" stroke-width="1"/>
  <text x="200" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#333">✕</text>
  <rect x="170" y="254" width="60" height="40" fill="#0d0d0d" rx="4" stroke="#222" stroke-width="1"/>
  <text x="200" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#333">✕</text>
  <rect x="170" y="302" width="60" height="40" fill="#0d0d0d" rx="4" stroke="#222" stroke-width="1"/>
  <text x="200" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#333">✕</text>
  <rect x="230" y="206" width="60" height="40" fill="#0d0d0d" rx="4" stroke="#222" stroke-width="1"/>
  <text x="260" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#333">✕</text>
  <rect x="230" y="254" width="60" height="40" fill="#0d0d0d" rx="4" stroke="#222" stroke-width="1"/>
  <text x="260" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#333">✕</text>
  <rect x="230" y="302" width="60" height="40" fill="#0d0d0d" rx="4" stroke="#222" stroke-width="1"/>
  <text x="260" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#333">✕</text>
  <rect x="290" y="254" width="60" height="40" fill="#0d0d0d" rx="4" stroke="#222" stroke-width="1"/>
  <text x="320" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#333">✕</text>
  <rect x="290" y="302" width="60" height="40" fill="#0d0d0d" rx="4" stroke="#222" stroke-width="1"/>
  <text x="320" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#333">✕</text>
  <rect x="350" y="302" width="60" height="40" fill="#0d0d0d" rx="4" stroke="#222" stroke-width="1"/>
  <text x="380" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#333">✕</text>

  <!-- Legend -->
  <rect x="540" y="110" width="14" height="14" fill="#1a3a2a" rx="2" stroke="#55c555" stroke-width="1.5"/>
  <text x="562" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">len=1 기저 (dp=0)</text>
  <rect x="540" y="134" width="14" height="14" fill="#1a2a4a" rx="2" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="562" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">len=2</text>
  <rect x="540" y="158" width="14" height="14" fill="#2a2a1a" rx="2" stroke="#e0c555" stroke-width="1.5"/>
  <text x="562" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0c555">len=3</text>
  <rect x="540" y="182" width="14" height="14" fill="#3a1a2a" rx="2" stroke="#e05555" stroke-width="1.5"/>
  <text x="562" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">len=4</text>
  <rect x="540" y="206" width="14" height="14" fill="#3a2a1a" rx="2" stroke="#e09055" stroke-width="2"/>
  <text x="562" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09055">len=5 최종 답 (dp[0][4])</text>

  <!-- Code box -->
  <rect x="540" y="240" width="300" height="168" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="556" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 구간 DP 뼈대</text>
  <text x="556" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">dp = [[0]*n for _ in range(n)]</text>
  <text x="556" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># base: dp[i][i] 초기화</text>
  <text x="556" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">for L in range(2, n+1):</text>
  <text x="556" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  for i in range(n-L+1):</text>
  <text x="556" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    j = i + L - 1</text>
  <text x="556" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for k in range(i, j):</text>
  <text x="556" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      dp[i][j] = f(dp[i][k],dp[k+1][j])</text>
  <text x="556" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 시간 O(n³), 공간 O(n²)</text>
</svg>
