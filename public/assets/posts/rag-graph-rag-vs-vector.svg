<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Vector RAG vs Graph RAG</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">청크 유사도 검색 vs 개체·관계 그래프 탐색</text>

  <!-- Left: Vector RAG -->
  <text x="200" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">Vector RAG</text>

  <!-- Document chunks -->
  <rect x="80" y="115" width="130" height="40" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="145" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">청크 A: "삼성은..."</text>

  <rect x="80" y="165" width="130" height="40" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="145" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">청크 B: "이재용은..."</text>

  <rect x="80" y="215" width="130" height="40" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="145" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">청크 C: "반도체..."</text>

  <rect x="230" y="140" width="120" height="40" rx="6" fill="#111" stroke="#333"/>
  <text x="290" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">코사인 유사도</text>

  <line x1="210" y1="155" x2="226" y2="160" stroke="#444" stroke-width="1.5"/>
  <line x1="210" y1="185" x2="226" y2="165" stroke="#444" stroke-width="1.5"/>
  <line x1="210" y1="235" x2="226" y2="170" stroke="#444" stroke-width="1.5"/>

  <rect x="80" y="280" width="270" height="50" rx="6" fill="#111" stroke="#333"/>
  <text x="215" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">청크 간 관계 정보 없음</text>
  <text x="215" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"삼성이 이재용 관련 기업"임을 모름</text>

  <!-- Right: Graph RAG -->
  <text x="660" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Graph RAG</text>

  <!-- Graph nodes -->
  <circle cx="620" cy="160" r="32" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">삼성</text>
  <text x="620" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">기업</text>

  <circle cx="730" cy="130" r="32" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">이재용</text>
  <text x="730" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">인물</text>

  <circle cx="800" cy="200" r="32" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="800" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">반도체</text>
  <text x="800" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">제품</text>

  <circle cx="690" cy="230" r="32" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">DS사업부</text>
  <text x="690" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">조직</text>

  <!-- Graph edges -->
  <line x1="650" y1="150" x2="700" y2="135" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">회장</text>
  <line x1="760" y1="165" x2="775" y2="182" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">생산</text>
  <line x1="645" y1="180" x2="668" y2="212" stroke="#55c555" stroke-width="1.5"/>
  <text x="643" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">포함</text>

  <rect x="560" y="280" width="270" height="50" rx="6" fill="#111" stroke="#333"/>
  <text x="695" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">개체·관계 명시적 표현</text>
  <text x="695" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"삼성 — 회장 → 이재용" 그래프 탐색</text>

  <!-- Divider -->
  <line x1="440" y1="90" x2="440" y2="350" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Code block -->
  <rect x="60" y="354" width="760" height="46" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># Graph RAG: 엔티티 → 서브그래프 추출 → 컨텍스트 생성</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">subgraph = graph.get_neighbors(entity=</text>
  <text x="352" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"삼성"</text>
  <text x="400" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, depth=</text>
  <text x="464" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="472" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
</svg>
