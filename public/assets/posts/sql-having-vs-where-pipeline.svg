<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">WHERE vs HAVING — 논리적 실행 순서</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">필터가 작동하는 시점이 다르다</text>

  <!-- Pipeline stages -->
  <!-- Stage 1: FROM -->
  <rect x="60" y="100" width="120" height="56" rx="8" fill="#1e2433" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">① FROM</text>
  <text x="120" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">테이블 읽기</text>
  <text x="120" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">JOIN 처리</text>

  <!-- Arrow -->
  <line x1="180" y1="128" x2="214" y2="128" stroke="#555" stroke-width="1.5"/>
  <polygon points="214,121 228,128 214,135" fill="#555"/>

  <!-- Stage 2: WHERE -->
  <rect x="228" y="100" width="120" height="56" rx="8" fill="#1e3a1e" stroke="#55c555" stroke-width="2"/>
  <text x="288" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">② WHERE</text>
  <text x="288" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#88cc88">행 단위 필터</text>
  <text x="288" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#88cc88">집계 전</text>

  <!-- Arrow -->
  <line x1="348" y1="128" x2="382" y2="128" stroke="#555" stroke-width="1.5"/>
  <polygon points="382,121 396,128 382,135" fill="#555"/>

  <!-- Stage 3: GROUP BY -->
  <rect x="396" y="100" width="120" height="56" rx="8" fill="#1e2433" stroke="#7777cc" stroke-width="1.5"/>
  <text x="456" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">③ GROUP BY</text>
  <text x="456" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">행 → 그룹</text>
  <text x="456" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">집계 계산</text>

  <!-- Arrow -->
  <line x1="516" y1="128" x2="550" y2="128" stroke="#555" stroke-width="1.5"/>
  <polygon points="550,121 564,128 550,135" fill="#555"/>

  <!-- Stage 4: HAVING -->
  <rect x="564" y="100" width="120" height="56" rx="8" fill="#3a1e1e" stroke="#e05555" stroke-width="2"/>
  <text x="624" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">④ HAVING</text>
  <text x="624" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cc8888">그룹 필터</text>
  <text x="624" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#cc8888">집계 후</text>

  <!-- Arrow -->
  <line x1="684" y1="128" x2="718" y2="128" stroke="#555" stroke-width="1.5"/>
  <polygon points="718,121 732,128 718,135" fill="#555"/>

  <!-- Stage 5: SELECT -->
  <rect x="732" y="100" width="88" height="56" rx="8" fill="#1e2433" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="776" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">⑤ SELECT</text>
  <text x="776" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">출력</text>

  <!-- WHERE description -->
  <rect x="60" y="186" width="370" height="240" rx="8" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">WHERE — 집계 전 필터</text>
  <rect x="72" y="220" width="346" height="126" rx="6" fill="#070b14" stroke="#1e3a1e"/>
  <text x="88" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 2024년 KR 주문만 집계</text>
  <text x="88" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT country, SUM(amount)</text>
  <text x="88" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM orders</text>
  <text x="88" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">WHERE country = </text>
  <text x="248" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'KR'</text>
  <text x="288" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">   -- 집계 전</text>
  <text x="88" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">GROUP BY country;</text>

  <text x="245" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">집계 대상 행을 미리 줄임</text>
  <text x="245" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">인덱스 활용 → 성능에 유리</text>
  <text x="245" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">집계 함수 조건은 사용 불가</text>

  <!-- HAVING description -->
  <rect x="450" y="186" width="370" height="240" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">HAVING — 집계 후 필터</text>
  <rect x="462" y="220" width="346" height="126" rx="6" fill="#070b14" stroke="#3a1e1e"/>
  <text x="478" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 합계 5000 이상 그룹만</text>
  <text x="478" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT country, SUM(amount)</text>
  <text x="478" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM orders</text>
  <text x="478" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">GROUP BY country</text>
  <text x="478" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">HAVING SUM(amount) >= </text>
  <text x="686" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">5000</text>
  <text x="478" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 집계 후 조건</text>

  <text x="635" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">그룹핑 완료 후 적용</text>
  <text x="635" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">집계 함수 조건 필수 사용 장소</text>
  <text x="635" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 그룹 생성 후 필터 → 상대적 비용</text>

  <!-- Footer -->
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
