<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">화면 Repaint 원인과 최적화 전략</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">불필요한 렌더링을 줄여 UI 반응성을 높인다</text>

  <!-- Left column: Causes -->
  <rect x="40" y="100" width="370" height="270" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="225" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">Repaint 주요 원인</text>
  <line x1="60" y1="136" x2="390" y2="136" stroke="#3a1e1e" stroke-width="1"/>

  <rect x="60" y="148" width="330" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="75" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">① 루프 내에서 개별 속성을 반복 변경</text>

  <rect x="60" y="194" width="330" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="75" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">② set_visible 호출 후 즉시 레이아웃 재계산</text>

  <rect x="60" y="240" width="330" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="75" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">③ 불필요한 폼 표시/숨기기 반복</text>

  <rect x="60" y="286" width="330" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="75" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">④ Dataset 변경 후 Grid 강제 갱신 중복</text>

  <rect x="60" y="332" width="330" height="22" rx="4" fill="#1a0808"/>
  <text x="75" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 변경마다 레이아웃 재계산 → 렌더링 누적</text>

  <!-- Right column: Solutions -->
  <rect x="430" y="100" width="410" height="270" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">최적화 전략</text>
  <line x1="450" y1="136" x2="820" y2="136" stroke="#1e3a1e" stroke-width="1"/>

  <rect x="450" y="148" width="370" height="36" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="465" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">① beginUpdate / endUpdate로 배치 처리</text>

  <rect x="450" y="194" width="370" height="36" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="465" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">② set_visible(false) → 처리 → set_visible(true)</text>

  <rect x="450" y="240" width="370" height="36" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="465" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">③ 상태 변경 후 단 한 번만 refresh 호출</text>

  <rect x="450" y="286" width="370" height="36" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="465" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">④ 숨기기 대신 enable 제어로 레이아웃 유지</text>

  <rect x="450" y="332" width="370" height="22" rx="4" fill="#081a08"/>
  <text x="465" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">렌더링 횟수를 줄이는 것이 핵심 — 한 번에 처리</text>

  <!-- Arrow between columns -->
  <defs>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <line x1="410" y1="235" x2="430" y2="235" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="420" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">개선</text>

  <!-- Bottom note -->
  <rect x="40" y="390" width="800" height="88" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="60" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">렌더링 비용 비교</text>
  <text x="60" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• set_visible 1회 호출 ≈ 레이아웃 재계산 1회  →  루프 100회 = 렌더링 100회 발생</text>
  <text x="60" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• beginUpdate() 후 루프 100회 처리 후 endUpdate() = 렌더링 단 1회</text>
  <text x="60" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">목표: 상태 변경 횟수가 아닌 렌더링 횟수를 최소화한다</text>
</svg>
