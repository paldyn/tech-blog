<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Docker Engine 내부 컴포넌트</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">dockerd가 컨테이너를 실행하기까지 — 플러그인 아키텍처</text>

  <!-- dockerd outer box -->
  <rect x="60" y="88" width="760" height="340" fill="#0c0f0c" stroke="#55c555" stroke-width="2" rx="12"/>
  <text x="84" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">dockerd (Docker Daemon)</text>

  <!-- API Server -->
  <rect x="80" y="122" width="180" height="54" fill="#0d1020" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="170" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">HTTP API Server</text>
  <text x="170" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">unix / tcp 리스닝</text>

  <!-- Image Management -->
  <rect x="80" y="190" width="180" height="54" fill="#0d1020" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="170" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Image Manager</text>
  <text x="170" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">pull / build / tag</text>

  <!-- Network -->
  <rect x="80" y="258" width="180" height="54" fill="#0d1020" stroke="#e0a030" stroke-width="1.5" rx="8"/>
  <text x="170" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a030">Network Manager</text>
  <text x="170" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bridge / overlay / custom</text>

  <!-- Volume -->
  <rect x="80" y="326" width="180" height="54" fill="#0d1020" stroke="#e05555" stroke-width="1.5" rx="8"/>
  <text x="170" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">Volume Manager</text>
  <text x="170" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">named / bind / tmpfs</text>

  <!-- Arrow dockerd → containerd -->
  <line x1="290" y1="236" x2="350" y2="236" stroke="#444" stroke-width="2"/>
  <polygon points="354,236 342,230 342,242" fill="#444"/>

  <!-- containerd box -->
  <rect x="354" y="100" width="200" height="272" fill="#0a1408" stroke="#88bb66" stroke-width="1.5" rx="10"/>
  <text x="454" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#88bb66">containerd</text>

  <rect x="372" y="140" width="164" height="40" fill="#0f1f0f" stroke="#336633" rx="6"/>
  <text x="454" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Snapshot Store</text>

  <rect x="372" y="188" width="164" height="40" fill="#0f1f0f" stroke="#336633" rx="6"/>
  <text x="454" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Content Store</text>

  <rect x="372" y="236" width="164" height="40" fill="#0f1f0f" stroke="#336633" rx="6"/>
  <text x="454" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Events</text>

  <rect x="372" y="284" width="164" height="40" fill="#0f1f0f" stroke="#336633" rx="6"/>
  <text x="454" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Task (shim)</text>

  <!-- Arrow containerd → runc/shim -->
  <line x1="562" y1="236" x2="610" y2="236" stroke="#444" stroke-width="2"/>
  <polygon points="614,236 602,230 602,242" fill="#444"/>

  <!-- runc / shim box -->
  <rect x="614" y="140" width="180" height="192" fill="#120f08" stroke="#e0a030" stroke-width="1.5" rx="10"/>
  <text x="704" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a030">OCI Runtime</text>

  <rect x="630" y="180" width="148" height="40" fill="#1a1408" stroke="#4a3a08" rx="6"/>
  <text x="704" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">runc</text>

  <rect x="630" y="228" width="148" height="40" fill="#1a1408" stroke="#4a3a08" rx="6"/>
  <text x="704" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">containerd-shim</text>

  <rect x="630" y="276" width="148" height="40" fill="#1a1408" stroke="#4a3a08" rx="6"/>
  <text x="704" y="301" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Container Process</text>

  <!-- Bottom: kernel -->
  <rect x="354" y="384" width="440" height="36" fill="#111" stroke="#333" rx="6"/>
  <text x="574" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">Linux Kernel (namespace + cgroup)</text>

  <!-- Arrow runc → kernel -->
  <line x1="704" y1="336" x2="704" y2="378" stroke="#444" stroke-width="1.5"/>
  <polygon points="704,382 698,372 710,372" fill="#444"/>

  <!-- Bottom note -->
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">containerd-shim이 runc 종료 후에도 컨테이너 프로세스의 부모 역할을 유지합니다</text>
  <text x="440" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">dockerd 재시작 시 실행 중인 컨테이너는 영향받지 않는 이유입니다</text>
</svg>
