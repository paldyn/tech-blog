<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8944a"/>
    </marker>
  </defs>
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">API Aggregation Layer 아키텍처</text>

  <!-- Client box -->
  <rect x="60" y="220" width="140" height="60" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="130" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">Client</text>
  <text x="130" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">kubectl / API</text>

  <!-- Arrow Client → kube-apiserver -->
  <line x1="202" y1="250" x2="258" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="230" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">HTTPS</text>

  <!-- kube-apiserver (center, tall) -->
  <rect x="260" y="160" width="200" height="180" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="2.5"/>
  <text x="360" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">kube-apiserver</text>
  <!-- internal labels -->
  <rect x="278" y="204" width="164" height="26" rx="4" fill="#100818" stroke="#7777cc" stroke-width="1"/>
  <text x="360" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Built-in API 그룹</text>
  <rect x="278" y="236" width="164" height="26" rx="4" fill="#100818" stroke="#7ec8e3" stroke-width="1"/>
  <text x="360" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">Aggregation Layer</text>
  <rect x="278" y="268" width="164" height="26" rx="4" fill="#100818" stroke="#55c555" stroke-width="1"/>
  <text x="360" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">APIService 레지스트리</text>
  <text x="360" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">경로 라우팅 결정</text>

  <!-- Arrows to right side services -->
  <!-- To Extension API Server -->
  <line x1="462" y1="220" x2="518" y2="200" stroke="#e8944a" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="490" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8944a" text-anchor="middle">프록시</text>

  <!-- To metrics-server -->
  <line x1="462" y1="250" x2="518" y2="290" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="490" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">프록시</text>

  <!-- Extension API Server -->
  <rect x="520" y="130" width="210" height="100" rx="8" fill="#1a1000" stroke="#e8944a" stroke-width="2"/>
  <text x="625" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8944a" text-anchor="middle">확장 API 서버</text>
  <text x="625" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">custom.example.com/v1</text>
  <text x="625" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자체 etcd / 백엔드 가능</text>
  <text x="625" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TLS 인증서 필수</text>

  <!-- metrics-server -->
  <rect x="520" y="260" width="210" height="100" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="2"/>
  <text x="625" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">metrics-server</text>
  <text x="625" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">metrics.k8s.io/v1beta1</text>
  <text x="625" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CPU/Memory 메트릭 제공</text>
  <text x="625" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HPA, kubectl top 에서 사용</text>

  <!-- APIService resource box -->
  <rect x="60" y="400" width="760" height="100" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">APIService 리소스 (kube-aggregator 관리)</text>
  <!-- three columns -->
  <text x="180" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8944a" text-anchor="middle">spec.group</text>
  <text x="180" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">custom.example.com</text>
  <text x="180" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">metrics.k8s.io</text>

  <line x1="340" y1="432" x2="340" y2="492" stroke="#222" stroke-width="1"/>

  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">spec.service</text>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">namespace / name</text>
  <text x="440" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">포트 443 (TLS)</text>

  <line x1="540" y1="432" x2="540" y2="492" stroke="#222" stroke-width="1"/>

  <text x="700" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">status.conditions</text>
  <text x="700" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Available: True/False</text>
  <text x="700" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">헬스 체크 자동 수행</text>
</svg>
