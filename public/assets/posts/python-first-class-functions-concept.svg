<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">일급 함수 (First-Class Functions)</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">함수는 값이다 — 변수에 담고, 인자로 넘기고, 반환할 수 있다</text>

  <!-- Box 1: 변수에 할당 -->
  <rect x="60" y="108" width="230" height="110" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="175" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">① 변수에 할당</text>
  <rect x="76" y="144" width="198" height="62" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">def greet(name):</text>
  <text x="92" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">return</tspan> f<tspan fill="#ce9178">"Hi {name}"</tspan></text>
  <text x="92" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">fn = greet</text>

  <!-- Box 2: 인자로 전달 -->
  <rect x="325" y="108" width="230" height="110" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">② 인자로 전달</text>
  <rect x="341" y="144" width="198" height="62" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="357" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">def</tspan> apply(func, val):</text>
  <text x="357" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">return</tspan> func(val)</text>
  <text x="357" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">apply(greet, <tspan fill="#ce9178">"Lee"</tspan>)</text>

  <!-- Box 3: 반환값으로 -->
  <rect x="590" y="108" width="230" height="110" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="705" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">③ 반환값으로</text>
  <rect x="606" y="144" width="198" height="62" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="622" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">def</tspan> make_adder(n):</text>
  <text x="622" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">return lambda</tspan> x: x+n</text>
  <text x="622" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">add5 = make_adder(<tspan fill="#b5cea8">5</tspan>)</text>

  <!-- Arrow down from boxes -->
  <line x1="175" y1="218" x2="175" y2="248" stroke="#444" stroke-width="1.5"/>
  <polygon points="175,258 170,248 180,248" fill="#444"/>
  <line x1="440" y1="218" x2="440" y2="248" stroke="#444" stroke-width="1.5"/>
  <polygon points="440,258 435,248 445,248" fill="#444"/>
  <line x1="705" y1="218" x2="705" y2="248" stroke="#444" stroke-width="1.5"/>
  <polygon points="705,258 700,248 710,248" fill="#444"/>

  <!-- Labels below arrows -->
  <text x="175" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">fn("Kim") → "Hi Kim"</text>
  <text x="440" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">"Hi Lee" 반환</text>
  <text x="705" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">add5(3) → 8</text>

  <!-- Bottom: 컬렉션에 담기 -->
  <rect x="60" y="308" width="760" height="130" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">④ 자료구조에 담기</text>
  <rect x="76" y="344" width="728" height="80" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 함수를 리스트에 담아 순회</text>
  <text x="92" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">ops = [str.upper, str.lower, str.title]</text>
  <text x="92" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">results = [f(<tspan fill="#ce9178">"hello"</tspan>) <tspan fill="#7ec8e3">for</tspan> f <tspan fill="#7ec8e3">in</tspan> ops]  <tspan fill="#6a8aa0"># ['HELLO', 'hello', 'Hello']</tspan></text>

  <!-- Key insight -->
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">함수 객체는 일반 값(int, str)과 동일하게 취급된다</text>
</svg>
