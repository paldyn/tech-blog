<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">useFormStatus 사용 위치 규칙</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">반드시 form의 자식 컴포넌트에서 호출</text>

  <!-- Form structure diagram -->
  <!-- Outer form box -->
  <rect x="100" y="94" width="680" height="280" rx="12" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">&lt;form action={myAction}&gt;</text>

  <!-- Children inside form -->
  <rect x="140" y="134" width="260" height="80" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="270" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">&lt;SubmitButton /&gt;</text>
  <text x="270" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useFormStatus() 호출 OK</text>
  <text x="270" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">form 안의 자식 ✓</text>

  <rect x="460" y="134" width="260" height="80" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="590" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">&lt;FormInput /&gt;</text>
  <text x="590" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useFormStatus() 호출 OK</text>
  <text x="590" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">form 안의 자식 ✓</text>

  <!-- Form component itself - cannot use -->
  <rect x="140" y="234" width="580" height="80" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">ParentForm (form을 포함하는 컴포넌트 자체)</text>
  <text x="440" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useFormStatus() 호출 불가 — form의 부모이므로 상태 없음</text>
  <text x="440" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">form 안이 아님 ✗</text>

  <!-- Return object -->
  <rect x="60" y="398" width="760" height="80" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">useFormStatus() 반환 객체</text>
  <text x="180" y="444" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">pending</text>
  <text x="180" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제출 중 여부</text>

  <text x="380" y="444" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">data</text>
  <text x="380" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">FormData 객체</text>

  <text x="570" y="444" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" font-weight="600">method</text>
  <text x="570" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">'get' | 'post'</text>

  <text x="750" y="444" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" font-weight="600">action</text>
  <text x="750" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">action 함수 참조</text>
</svg>
