<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">바인딩 방향 — 단방향 vs 양방향</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">displayonly · enable · readOnly 속성으로 제어</text>

  <!-- Bidirectional -->
  <rect x="60" y="96" width="340" height="140" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">양방향 바인딩 (기본)</text>
  <!-- Dataset box -->
  <rect x="80" y="136" width="90" height="36" rx="6" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="125" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Dataset</text>
  <text x="125" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">dsMain.NAME</text>
  <!-- arrows bidirectional -->
  <polygon points="190,147 214,141 214,153" fill="#55c555"/>
  <line x1="170" y1="147" x2="214" y2="147" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="172,157 192,151 192,163" fill="#7777cc"/>
  <line x1="192" y1="157" x2="222" y2="157" stroke="#7777cc" stroke-width="1.5"/>
  <!-- Component box -->
  <rect x="222" y="136" width="90" height="36" rx="6" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="267" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Edit</text>
  <text x="267" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">value="NAME"</text>
  <!-- labels -->
  <text x="192" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">읽기</text>
  <text x="192" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">쓰기</text>
  <text x="230" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자가 Edit를 수정 →</text>
  <text x="230" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dataset 자동 반영</text>

  <!-- Unidirectional (read-only) -->
  <rect x="480" y="96" width="340" height="140" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">단방향 바인딩 (읽기 전용)</text>
  <!-- Dataset box -->
  <rect x="500" y="136" width="90" height="36" rx="6" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="545" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Dataset</text>
  <text x="545" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">dsMain.NAME</text>
  <!-- arrow unidirectional only -->
  <polygon points="610,147 634,141 634,153" fill="#7ec8e3"/>
  <line x1="590" y1="147" x2="634" y2="147" stroke="#7ec8e3" stroke-width="2"/>
  <!-- blocked write arrow -->
  <line x1="612" y1="160" x2="640" y2="160" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="640" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">✕</text>
  <!-- Component box -->
  <rect x="642" y="136" width="90" height="36" rx="6" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="687" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Edit</text>
  <text x="687" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">displayonly=true</text>
  <text x="650" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dataset → 컴포넌트만</text>
  <text x="650" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자 입력 차단</text>

  <!-- Properties comparison -->
  <rect x="60" y="264" width="760" height="148" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">읽기 전용 제어 속성 비교</text>
  <!-- header -->
  <text x="160" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">속성</text>
  <text x="400" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">효과</text>
  <text x="660" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시각적 차이</text>
  <line x1="80" y1="314" x2="800" y2="314" stroke="#222" stroke-width="1"/>
  <text x="160" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">displayonly="true"</text>
  <text x="400" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">입력 불가 / 포커스 가능</text>
  <text x="660" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기본 스타일 유지</text>
  <text x="160" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">enable="false"</text>
  <text x="400" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">입력 불가 / 포커스 불가</text>
  <text x="660" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">흐리게 표시</text>
  <text x="160" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">readOnly="true"</text>
  <text x="400" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">입력 불가 / 복사 가능</text>
  <text x="660" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">커서 표시</text>
  <text x="160" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">visible="false"</text>
  <text x="400" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">숨김 (바인딩 유지)</text>
  <text x="660" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">화면에 미표시</text>
</svg>
