<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MoE 레이어 PyTorch 구현</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Router + Expert FFN + 보조 로드 밸런싱 손실</text>

  <!-- Code block -->
  <rect x="60" y="92" width="760" height="348" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">class</text>
  <text x="118" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> MoELayer(nn.Module):</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    def</tspan><tspan fill="#e8e8e8"> __init__(</tspan><tspan fill="#7777cc">self</tspan><tspan fill="#e8e8e8">, d_model, num_experts, top_k):</tspan></text>

  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7777cc">        self</tspan><tspan fill="#e8e8e8">.top_k = top_k</tspan></text>
  
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7777cc">        self</tspan><tspan fill="#e8e8e8">.router = nn.Linear(d_model, num_experts, bias=</tspan><tspan fill="#b5cea8">False</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7777cc">        self</tspan><tspan fill="#e8e8e8">.experts = nn.ModuleList([FFN(d_model)</tspan></text>
  
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">                                   for</tspan><tspan fill="#e8e8e8"> _ </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> range(num_experts)])</tspan></text>

  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    def</tspan><tspan fill="#e8e8e8"> forward(</tspan><tspan fill="#7777cc">self</tspan><tspan fill="#e8e8e8">, x):</tspan></text>

  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">        B, T, D = x.shape</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">        # 라우터: (B*T, num_experts) 점수</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">        logits = </tspan><tspan fill="#7777cc">self</tspan><tspan fill="#e8e8e8">.router(x.view(B*T, D))</tspan></text>

  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">        gates, idx = logits.topk(</tspan><tspan fill="#7777cc">self</tspan><tspan fill="#e8e8e8">.top_k, dim=-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">        gates = F.softmax(gates, dim=-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">        # 선택된 전문가만 실행, 가중 합산</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">        out = torch.zeros(B*T, D)</text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">        for</tspan><tspan fill="#e8e8e8"> k </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> range(</tspan><tspan fill="#7777cc">self</tspan><tspan fill="#e8e8e8">.top_k):</tspan></text>

  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">            expert_out = </tspan><tspan fill="#7777cc">self</tspan><tspan fill="#e8e8e8">.experts[idx[:, k]](x)</tspan></text>

  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">            out += gates[:, k:k+</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">] * expert_out</tspan></text>

  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">        return</tspan><tspan fill="#e8e8e8"> out.view(B, T, D)</tspan></text>
  
</svg>
