<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">대용량 저장소 최적화 전략</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">상황에 맞는 전략을 선택한다</text>

  <!-- Strategy 1: git gc -->
  <rect x="60" y="95" width="235" height="140" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="177" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">git gc</text>
  <text x="177" y="143" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">즉시 적용 가능</text>
  <line x1="80" y1="155" x2="275" y2="155" stroke="#1e2c4a" stroke-width="1"/>
  <text x="177" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">loose objects 압축</text>
  <text x="177" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">unreachable 오브젝트 제거</text>
  <text x="177" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">히스토리 보존 O</text>

  <!-- Strategy 2: Git LFS -->
  <rect x="323" y="95" width="235" height="140" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Git LFS</text>
  <text x="440" y="143" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대형 바이너리 파일용</text>
  <line x1="343" y1="155" x2="538" y2="155" stroke="#1e2c4a" stroke-width="1"/>
  <text x="440" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">이미지·동영상·패키지</text>
  <text x="440" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">포인터로 대체, 별도 저장</text>
  <text x="440" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">서버 지원 필요</text>

  <!-- Strategy 3: filter-repo -->
  <rect x="586" y="95" width="235" height="140" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="703" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">git filter-repo</text>
  <text x="703" y="143" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">히스토리 재작성</text>
  <line x1="606" y1="155" x2="801" y2="155" stroke="#1e2c4a" stroke-width="1"/>
  <text x="703" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">실수로 커밋된 대형 파일</text>
  <text x="703" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">히스토리에서 완전 삭제</text>
  <text x="703" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">force push 필요</text>

  <!-- Strategy 4: sparse/partial clone -->
  <rect x="60" y="260" width="370" height="130" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="245" y="287" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Sparse / Partial Clone</text>
  <text x="245" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">다운로드 자체를 줄인다</text>
  <line x1="80" y1="318" x2="410" y2="318" stroke="#1e2c4a" stroke-width="1"/>
  <text x="245" y="339" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">--filter=blob:none  →  blob 지연 다운로드</text>
  <text x="245" y="357" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">sparse-checkout  →  필요한 경로만 체크아웃</text>
  <text x="245" y="375" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">모노레포·대형 저장소에 효과적</text>

  <!-- Strategy 5: shallow clone -->
  <rect x="450" y="260" width="370" height="130" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="635" y="287" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Shallow Clone</text>
  <text x="635" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">히스토리 깊이를 제한한다</text>
  <line x1="470" y1="318" x2="800" y2="318" stroke="#1e2c4a" stroke-width="1"/>
  <text x="635" y="339" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">--depth=1  →  최신 커밋 하나만</text>
  <text x="635" y="357" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">CI/CD 파이프라인에 최적</text>
  <text x="635" y="375" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">bisect·blame 기능 제한됨</text>

  <!-- Bottom note -->
  <rect x="60" y="408" width="760" height="36" fill="#0a0f1a" rx="6" stroke="#1e2c4a" stroke-width="1"/>
  <text x="440" y="430" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전략은 배타적이지 않다 — LFS + shallow clone + sparse-checkout을 함께 조합할 수 있다</text>
</svg>
