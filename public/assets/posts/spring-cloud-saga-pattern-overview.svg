<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" marketHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Saga 패턴: 분산 트랜잭션 처리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Choreography vs Orchestration — 각 서비스는 로컬 트랜잭션만 수행</text>

  <!-- 섹션 라벨: Choreography -->
  <text x="220" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">Choreography (이벤트 기반)</text>

  <!-- Orchestration 섹션 라벨 -->
  <text x="660" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">Orchestration (중앙 조율)</text>

  <!-- 수직 구분선 -->
  <line x1="440" y1="90" x2="440" y2="460" stroke="#333" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- === Choreography 흐름 === -->
  <!-- Order Service -->
  <rect x="60" y="125" width="150" height="55" rx="8" fill="#0f1a2e" stroke="#3a5a9e" stroke-width="1.5"/>
  <text x="135" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Order Service</text>
  <text x="135" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">OrderCreated 발행</text>

  <!-- Payment Service -->
  <rect x="60" y="225" width="150" height="55" rx="8" fill="#0f1a2e" stroke="#3a5a9e" stroke-width="1.5"/>
  <text x="135" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Payment Service</text>
  <text x="135" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">PaymentCompleted 발행</text>

  <!-- Stock Service -->
  <rect x="60" y="325" width="150" height="55" rx="8" fill="#0f1a2e" stroke="#3a5a9e" stroke-width="1.5"/>
  <text x="135" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Stock Service</text>
  <text x="135" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">StockReserved 발행</text>

  <!-- Delivery Service -->
  <rect x="240" y="325" width="150" height="55" rx="8" fill="#0f1a2e" stroke="#3a5a9e" stroke-width="1.5"/>
  <text x="315" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Delivery Service</text>
  <text x="315" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">배송 시작</text>

  <!-- Event Bus -->
  <rect x="240" y="225" width="150" height="55" rx="8" fill="#1a1a0a" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="315" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c84a">Message Broker</text>
  <text x="315" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Kafka / RabbitMQ</text>

  <!-- Choreography 화살표 -->
  <line x1="135" y1="180" x2="135" y2="223" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="210" y1="252" x2="238" y2="252" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="315" y1="280" x2="315" y2="323" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="210" y1="350" x2="238" y2="350" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- 보상 트랜잭션 표시 -->
  <rect x="60" y="415" width="330" height="38" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="225" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">실패 시: 보상 트랜잭션(Compensating Tx)</text>
  <text x="225" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">OrderCancelled → PaymentRefunded → StockReleased</text>

  <!-- === Orchestration 흐름 === -->
  <!-- Saga Orchestrator -->
  <rect x="590" y="125" width="160" height="70" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="2"/>
  <text x="670" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Saga Orchestrator</text>
  <text x="670" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전체 흐름 제어</text>
  <text x="670" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">상태 관리</text>

  <!-- Orch: Payment -->
  <rect x="480" y="240" width="130" height="48" rx="8" fill="#0f1a2e" stroke="#3a5a9e" stroke-width="1.5"/>
  <text x="545" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Payment</text>
  <text x="545" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">명령 수신 → 실행</text>

  <!-- Orch: Stock -->
  <rect x="630" y="240" width="130" height="48" rx="8" fill="#0f1a2e" stroke="#3a5a9e" stroke-width="1.5"/>
  <text x="695" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Stock</text>
  <text x="695" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">명령 수신 → 실행</text>

  <!-- Orch: Delivery -->
  <rect x="555" y="330" width="130" height="48" rx="8" fill="#0f1a2e" stroke="#3a5a9e" stroke-width="1.5"/>
  <text x="620" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Delivery</text>
  <text x="620" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">명령 수신 → 실행</text>

  <!-- Orchestration 화살표 (Orchestrator → 각 서비스) -->
  <line x1="620" y1="195" x2="560" y2="238" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="720" y1="195" x2="715" y2="238" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="670" y1="288" x2="640" y2="328" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- 응답 화살표 (점선) -->
  <line x1="545" y1="288" x2="615" y2="193" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>
  <line x1="695" y1="288" x2="700" y2="197" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>

  <!-- Orchestration 보상 박스 -->
  <rect x="475" y="415" width="370" height="38" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="660" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">실패 시: Orchestrator가 역순 보상 명령 전송</text>
  <text x="660" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Delivery Cancel → Stock Release → Payment Refund</text>

  <!-- 하단 비교 표 헤더 -->
  <rect x="60" y="470" width="760" height="72" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="200" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">항목</text>
  <text x="420" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Choreography</text>
  <text x="680" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Orchestration</text>
  <line x1="68" y1="496" x2="812" y2="496" stroke="#333" stroke-width="1"/>
  <text x="200" y="514" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">결합도</text>
  <text x="420" y="514" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">낮음 (이벤트만 의존)</text>
  <text x="680" y="514" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">높음 (Orchestrator 의존)</text>
  <text x="200" y="532" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">디버깅</text>
  <text x="420" y="532" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">어려움 (흐름 추적 복잡)</text>
  <text x="680" y="532" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">쉬움 (Orchestrator 로그)</text>
</svg>
