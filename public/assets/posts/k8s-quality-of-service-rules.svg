<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">QoS 클래스별 YAML 예시</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">kubectl get pod {name} -o jsonpath으로 QoS 클래스를 직접 확인할 수 있습니다</text>

  <!-- Guaranteed YAML -->
  <text x="100" y="94"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Guaranteed</text>
  <rect x="60" y="100" width="240" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="122"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">resources:</text>
  <text x="80" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">  requests</text>
  <text x="80" y="158"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">    cpu: "500m"</text>
  <text x="80" y="176"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">    memory: "128Mi"</text>
  <text x="80" y="194"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">  limits</text>
  <text x="80" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">    cpu: "500m"</text>
  <text x="80" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">    memory: "128Mi"</text>
  <text x="80" y="248"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># req == lim</text>
  <text x="80" y="266"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 모든 컨테이너 동일</text>
  <text x="80" y="284"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve"># QoS: Guaranteed</text>
  <text x="80" y="302"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 핵심 서비스에 권장</text>

  <!-- Burstable YAML -->
  <text x="360" y="94"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a020">Burstable</text>
  <rect x="320" y="100" width="240" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="340" y="122"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">resources:</text>
  <text x="340" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">  requests</text>
  <text x="340" y="158"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e0a020" xml:space="preserve">    cpu: "250m"</text>
  <text x="340" y="176"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e0a020" xml:space="preserve">    memory: "64Mi"</text>
  <text x="340" y="194"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">  limits</text>
  <text x="340" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e0a020" xml:space="preserve">    cpu: "1000m"</text>
  <text x="340" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e0a020" xml:space="preserve">    memory: "256Mi"</text>
  <text x="340" y="248"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># req != lim</text>
  <text x="340" y="266"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e0a020" xml:space="preserve"># QoS: Burstable</text>
  <text x="340" y="284"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 버스트 가능</text>
  <text x="340" y="302"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 일반 서비스에 적합</text>

  <!-- BestEffort YAML -->
  <text x="620" y="94"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">BestEffort</text>
  <rect x="580" y="100" width="240" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="600" y="122"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># resources 없음</text>
  <text x="600" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">containers:</text>
  <text x="600" y="158"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">- name: app</text>
  <text x="600" y="176"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  image: myapp:1.0</text>
  <text x="600" y="194"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  # resources 미설정</text>
  <text x="600" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  # → BestEffort QoS</text>
  <text x="600" y="248"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve"># QoS: BestEffort</text>
  <text x="600" y="266"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 운영 환경 비권장</text>
  <text x="600" y="284"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 테스트/개발에서만</text>

  <!-- Check command -->
  <rect x="60" y="362" width="760" height="76" rx="6" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">QoS 클래스 확인</text>
  <text x="440" y="402" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">kubectl </text>
  <text x="490" y="402" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">get pod {name} -o jsonpath='{.status.qosClass}'</text>
  <text x="440" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">출력값: Guaranteed / Burstable / BestEffort</text>
</svg>
