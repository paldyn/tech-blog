<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PTQ vs QAT: 두 가지 양자화 전략</text>
  <text x="440" y="68" font-size="15" fill="#888" text-anchor="middle">Post-Training Quantization · Quantization-Aware Training</text>

  <!-- Center divider -->
  <line x1="440" y1="88" x2="440" y2="380" stroke="#1e2433" stroke-width="1.5"/>

  <!-- === PTQ (Left) === -->
  <text x="220" y="100" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">PTQ</text>
  <text x="220" y="116" font-size="11" fill="#888" text-anchor="middle">Post-Training Quantization</text>

  <!-- Step 1: 학습 완료 모델 -->
  <rect x="70" y="130" width="300" height="46" rx="8" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="220" y="150" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">학습 완료 FP32 모델</text>
  <text x="220" y="167" font-size="10" fill="#888" text-anchor="middle">기존 checkpoint 그대로 사용</text>

  <!-- Arrow -->
  <line x1="220" y1="176" x2="220" y2="200" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ptqarr)"/>

  <!-- Step 2: 보정 데이터셋 -->
  <rect x="70" y="202" width="300" height="46" rx="8" fill="#0d1d0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="220" y="222" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">보정 데이터셋 (Calibration)</text>
  <text x="220" y="239" font-size="10" fill="#888" text-anchor="middle">소량(~512개) 대표 샘플로 통계 추출</text>

  <!-- Arrow -->
  <line x1="220" y1="248" x2="220" y2="272" stroke="#55c555" stroke-width="1.5" marker-end="url(#ptqarr)"/>

  <!-- Step 3: scale/zero-point 계산 -->
  <rect x="70" y="274" width="300" height="46" rx="8" fill="#14100d" stroke="#ce9178" stroke-width="1.2"/>
  <text x="220" y="294" font-size="12" font-weight="700" fill="#ce9178" text-anchor="middle">scale · zero-point 계산</text>
  <text x="220" y="311" font-size="10" fill="#888" text-anchor="middle">absmax / zero-point 방식 선택</text>

  <!-- Arrow -->
  <line x1="220" y1="320" x2="220" y2="344" stroke="#ce9178" stroke-width="1.5" marker-end="url(#ptqarr)"/>

  <!-- Step 4: 양자화 완료 -->
  <rect x="70" y="346" width="300" height="34" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="367" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">INT8 / INT4 양자화 완료</text>

  <!-- PTQ pros/cons -->
  <rect x="70" y="392" width="300" height="62" rx="8" fill="#111" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="408" font-size="11" font-weight="700" fill="#55c555">장점</text>
  <text x="80" y="423" font-size="10" fill="#e8e8e8">· 추가 학습 불필요, 빠른 적용</text>
  <text x="80" y="437" font-size="10" fill="#e8e8e8">· 보정 데이터 소량으로 충분</text>
  <text x="180" y="408" font-size="11" font-weight="700" fill="#e05555">단점</text>
  <text x="180" y="423" font-size="10" fill="#888">· 정밀도 손실 가능</text>
  <text x="180" y="437" font-size="10" fill="#888">· outlier에 민감</text>

  <!-- === QAT (Right) === -->
  <text x="660" y="100" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">QAT</text>
  <text x="660" y="116" font-size="11" fill="#888" text-anchor="middle">Quantization-Aware Training</text>

  <!-- Step 1: 학습 시작 -->
  <rect x="510" y="130" width="300" height="46" rx="8" fill="#1a0d2a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="660" y="150" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">FP32 모델 + 가짜 양자화 삽입</text>
  <text x="660" y="167" font-size="10" fill="#888" text-anchor="middle">Fake Quantize 연산을 학습 그래프에 추가</text>

  <!-- Arrow -->
  <line x1="660" y1="176" x2="660" y2="200" stroke="#7777cc" stroke-width="1.5" marker-end="url(#qatarr)"/>

  <!-- Step 2: 학습 진행 -->
  <rect x="510" y="202" width="300" height="46" rx="8" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="660" y="222" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">학습 중 양자화 오차 반영</text>
  <text x="660" y="239" font-size="10" fill="#888" text-anchor="middle">STE(Straight-Through Estimator)로 역전파</text>

  <!-- Arrow -->
  <line x1="660" y1="248" x2="660" y2="272" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#qatarr)"/>

  <!-- Step 3: 수렴 -->
  <rect x="510" y="274" width="300" height="46" rx="8" fill="#0d1d0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="660" y="294" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">양자화 인식 상태로 수렴</text>
  <text x="660" y="311" font-size="10" fill="#888" text-anchor="middle">모델이 양자화 오차에 맞게 가중치 조정</text>

  <!-- Arrow -->
  <line x1="660" y1="320" x2="660" y2="344" stroke="#55c555" stroke-width="1.5" marker-end="url(#qatarr)"/>

  <!-- Step 4: 실제 양자화 -->
  <rect x="510" y="346" width="300" height="34" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="367" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">실제 INT8 변환 (정밀도 손실 최소화)</text>

  <!-- QAT pros/cons -->
  <rect x="510" y="392" width="300" height="62" rx="8" fill="#111" stroke="#1e2433" stroke-width="1"/>
  <text x="520" y="408" font-size="11" font-weight="700" fill="#55c555">장점</text>
  <text x="520" y="423" font-size="10" fill="#e8e8e8">· 정밀도 손실 매우 적음</text>
  <text x="520" y="437" font-size="10" fill="#e8e8e8">· 극단적 압축에 적합</text>
  <text x="640" y="408" font-size="11" font-weight="700" fill="#e05555">단점</text>
  <text x="640" y="423" font-size="10" fill="#888">· 재학습 비용 발생</text>
  <text x="640" y="437" font-size="10" fill="#888">· 설정이 복잡</text>

  <!-- Code block: bitsandbytes INT8 -->
  <rect x="60" y="458" width="760" height="0" rx="6" fill="#070b14" stroke="#1e2433"/>
  <!-- Inline code hint: shown as separate compact area -->

  <!-- defs -->
  <defs>
    <marker id="ptqarr" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="qatarr" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 Z" fill="#7777cc"/>
    </marker>
  </defs>
</svg>
