<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">람다 표현식 — 익명 클래스와 비교 &amp; 주요 활용</text>

  <!-- Left: Anonymous class vs Lambda -->
  <text x="210" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">익명 클래스 (Java 7 이전)</text>
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">람다 표현식 (Java 8+)</text>

  <rect x="60" y="90" width="360" height="136" rx="8" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">Runnable</tspan><tspan fill="#ffffff"> r = </tspan><tspan font-weight="600" fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> </tspan><tspan font-weight="600" fill="#7ec8e3">Runnable</tspan><tspan fill="#ffffff">() {</tspan></text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">    @Override</tspan></text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">    public void</tspan><tspan fill="#ffffff"> </tspan><tspan font-weight="600" fill="#7ec8e3">run</tspan><tspan fill="#ffffff">() {</tspan></text>
  <text x="76" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        </tspan><tspan font-weight="600" fill="#7ec8e3">System</tspan><tspan fill="#ffffff">.out.</tspan><tspan font-weight="600" fill="#7ec8e3">println</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"run"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    }</tspan></text>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">};</tspan></text>

  <rect x="460" y="90" width="360" height="136" rx="8" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="476" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 람다: 훨씬 간결</text>
  <text x="476" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">Runnable</tspan><tspan fill="#ffffff"> r = () -&gt;</tspan></text>
  <text x="476" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan font-weight="600" fill="#7ec8e3">System</tspan><tspan fill="#ffffff">.out.</tspan><tspan font-weight="600" fill="#7ec8e3">println</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"run"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="476" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 또는 한 줄로</text>
  <text x="476" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">Runnable</tspan><tspan fill="#ffffff"> r2 = () -&gt; </tspan><tspan font-weight="600" fill="#7ec8e3">System</tspan><tspan fill="#ffffff">.out.</tspan><tspan font-weight="600" fill="#7ec8e3">println</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"run"</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- Divider -->
  <line x1="60" y1="242" x2="820" y2="242" stroke="#222" stroke-width="1"/>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">람다의 특성</text>

  <!-- Property cards -->
  <rect x="60" y="274" width="360" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">함수형 인터페이스 타겟 타입</text>
  <text x="80" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">추상 메서드가 정확히 1개인 인터페이스에만 할당 가능</text>
  <text x="80" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컴파일러가 타입 추론으로 람다 시그니처 검증</text>

  <rect x="460" y="274" width="360" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">this 참조 차이</text>
  <text x="480" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">익명 클래스: this = 익명 클래스 인스턴스</text>
  <text x="480" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">람다: this = 둘러싼 클래스 인스턴스 (클로저)</text>

  <rect x="60" y="350" width="360" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">effectively final 캡처</text>
  <text x="80" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">외부 지역 변수를 캡처할 때 final이거나 사실상 final</text>
  <text x="80" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">람다 내부에서 수정 불가</text>

  <rect x="460" y="350" width="360" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">invokedynamic 구현</text>
  <text x="480" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JVM이 invokedynamic 바이트코드로 구현</text>
  <text x="480" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">익명 클래스보다 적은 클래스 파일 생성</text>

  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">람다는 코드를 데이터처럼 전달할 수 있게 해 함수형 프로그래밍 패러다임을 Java에 도입했다</text>
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Stream API, Comparator, 이벤트 핸들러 등 어디서나 활용</text>
</svg>
