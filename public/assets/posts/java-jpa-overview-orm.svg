<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="orArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="orArrL" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ORM — 객체와 테이블을 매핑한다</text>

  <!-- object side -->
  <text x="60" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">자바 객체 (Entity)</text>
  <rect x="60" y="104" width="330" height="150" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">@Entity</tspan></text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">class</tspan> Member {</text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">@Id</tspan> Long id;</text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  String name;</text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  int age;</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- arrows -->
  <line x1="400" y1="160" x2="490" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#orArr)"/>
  <text x="406" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">저장 (persist)</text>
  <line x1="490" y1="200" x2="400" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#orArrL)"/>
  <text x="406" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">조회 (find)</text>

  <!-- table side -->
  <text x="500" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e0a555">DB 테이블 (member)</text>
  <rect x="500" y="104" width="320" height="150" fill="#1a1206" stroke="#e0a555" stroke-width="1.5" rx="8"/>
  <line x1="500" y1="140" x2="820" y2="140" stroke="#e0a555" stroke-width="1"/>
  <line x1="607" y1="104" x2="607" y2="254" stroke="#5a4a2e" stroke-width="1"/>
  <line x1="714" y1="104" x2="714" y2="254" stroke="#5a4a2e" stroke-width="1"/>
  <text x="524" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">id</text>
  <text x="624" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">name</text>
  <text x="734" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">age</text>
  <text x="524" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">77</text>
  <text x="624" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">김자바</text>
  <text x="734" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">29</text>
  <text x="524" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">78</text>
  <text x="624" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">이코딩</text>
  <text x="734" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">34</text>

  <text x="60" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">개발자는 객체로 다루고, SQL 변환은 JPA가 대신한다 — 객체-관계 임피던스 불일치를 메운다.</text>
</svg>
