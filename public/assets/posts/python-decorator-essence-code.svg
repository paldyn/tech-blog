<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">데코레이터 구현 패턴</text>
  <!-- Code block -->
  <rect x="60" y="68" width="760" height="316" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Line 1: def log_call(func): -->
  <text x="76" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">log_call(func):</tspan></text>
  <!-- Line 2:     def wrapper(*args, **kwargs): -->
  <text x="76" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">wrapper(*args, **kwargs):</tspan></text>
  <!-- Line 3:         print(f"-> {func.__name__}") -->
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#ffffff">print(</tspan><tspan fill="#ce9178">f"</tspan><tspan fill="#7ec8e3" font-weight="600">-&gt;</tspan><tspan fill="#ce9178"> {func.__name__}"</tspan><tspan fill="#ffffff">)</tspan></text>
  <!-- Line 4:         result = func(*args, **kwargs) -->
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        result = func(*args, **kwargs)</tspan></text>
  <!-- Line 5:         print(f"<- {func.__name__}") -->
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#ffffff">print(</tspan><tspan fill="#ce9178">f"</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;-</tspan><tspan fill="#ce9178"> {func.__name__}"</tspan><tspan fill="#ffffff">)</tspan></text>
  <!-- Line 6:         return result -->
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">result</tspan></text>
  <!-- Line 7:     return wrapper -->
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">wrapper</tspan></text>
  <!-- blank line -->
  <!-- Line 9: @log_call -->
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7777cc">@log_call</tspan></text>
  <!-- Line 10: def greet(name): -->
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">greet(name):</tspan></text>
  <!-- Line 11:     print(f"Hello, {name}") -->
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#ffffff">print(</tspan><tspan fill="#ce9178">f"Hello, {name}"</tspan><tspan fill="#ffffff">)</tspan></text>
  <!-- blank -->
  <!-- Line 13: greet("Alice")  # -> greet  Hello, Alice  <- greet -->
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">greet(</tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8">  # -&gt; greet / Hello, Alice / &lt;- greet</tspan></text>
  <!-- bottom note -->
  <text x="76" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">greet = log_call(greet) 와 동일 — greet 이름이 wrapper 함수를 가리킴</text>
</svg>
