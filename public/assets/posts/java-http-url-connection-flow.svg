<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="hf1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">HttpURLConnection — 호출의 4단계</text>

  <rect x="50" y="110" width="180" height="100" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="150" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">openConnection</text>
  <text x="140" y="176" font-size="12" fill="#888" text-anchor="middle">연결 객체 생성</text>

  <rect x="262" y="110" width="180" height="100" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="352" y="150" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">설정</text>
  <text x="352" y="172" font-size="12" fill="#888" text-anchor="middle">메서드 · 헤더 ·</text>
  <text x="352" y="190" font-size="12" fill="#888" text-anchor="middle">타임아웃 지정</text>

  <rect x="474" y="110" width="180" height="100" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="564" y="150" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">연결 · 전송</text>
  <text x="564" y="172" font-size="12" fill="#888" text-anchor="middle">getResponseCode</text>
  <text x="564" y="190" font-size="12" fill="#888" text-anchor="middle">로 실제 요청</text>

  <rect x="686" y="110" width="180" height="100" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="776" y="150" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">응답 읽기</text>
  <text x="776" y="172" font-size="12" fill="#888" text-anchor="middle">getInputStream</text>
  <text x="776" y="190" font-size="12" fill="#888" text-anchor="middle">으로 본문 수신</text>

  <line x1="232" y1="160" x2="260" y2="160" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#hf1)"/>
  <line x1="444" y1="160" x2="472" y2="160" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#hf1)"/>
  <line x1="656" y1="160" x2="684" y2="160" stroke="#55c555" stroke-width="2.5" marker-end="url(#hf1)"/>

  <text x="440" y="270" font-size="13" fill="#888" text-anchor="middle">설정은 연결 전에 끝내야 한다 — getInputStream/getResponseCode 호출 순간 실제 통신이 일어난다</text>
</svg>
