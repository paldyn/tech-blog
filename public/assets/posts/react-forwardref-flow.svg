<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-grn" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">forwardRef — ref 전달 흐름</text>

  <!-- WITHOUT forwardRef section (left) -->
  <text x="220" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">forwardRef 없을 때</text>

  <rect x="70" y="104" width="300" height="52" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">부모: &lt;FancyInput ref={ref} /&gt;</text>
  <text x="220" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">ref prop 무시됨</text>

  <line x1="220" y1="158" x2="220" y2="192" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-red2)"/>

  <rect x="70" y="196" width="300" height="52" rx="8" fill="#1a0d0d" stroke="#333" stroke-width="1"/>
  <text x="220" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">자식 컴포넌트 (일반 함수)</text>
  <text x="220" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">ref 인수를 받을 방법 없음</text>

  <rect x="90" y="278" width="260" height="42" rx="6" fill="#200808" stroke="#e05555" stroke-width="1"/>
  <text x="220" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">ref.current = null (비어 있음)</text>
  <text x="220" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">부모에서 DOM 접근 불가</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="360" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- WITH forwardRef section (right) -->
  <text x="660" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">forwardRef 사용 시</text>

  <rect x="510" y="104" width="300" height="52" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">부모: &lt;FancyInput ref={ref} /&gt;</text>
  <text x="660" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ref prop 전달됨</text>

  <line x1="660" y1="158" x2="660" y2="192" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-grn)"/>

  <rect x="510" y="196" width="300" height="52" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">forwardRef((props, ref) =&gt; ...)</text>
  <text x="660" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">두 번째 인수로 ref 수신</text>

  <line x1="660" y1="250" x2="660" y2="282" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="510" y="286" width="300" height="52" rx="8" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">&lt;input ref={ref} ... /&gt;</text>
  <text x="660" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ref.current = 자식 DOM 요소</text>
</svg>
