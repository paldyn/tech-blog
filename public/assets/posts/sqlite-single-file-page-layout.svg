<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLite 단일 파일 레이아웃</text>

  <!-- File header -->
  <rect x="60" y="68" width="760" height="56" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">파일 헤더 (100 bytes) — offset 0</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">매직 문자열 "SQLite format 3\000" · 페이지 크기 · 인코딩 · 스키마 버전 · 파일 변경 카운터</text>

  <!-- Pages row -->
  <text x="60" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">페이지 배열 (기본 4096 bytes/page)</text>

  <!-- Page 1: root page -->
  <rect x="60" y="168" width="148" height="100" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="134" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Page 1</text>
  <text x="134" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">sqlite_master</text>
  <text x="134" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(스키마 루트)</text>
  <text x="134" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">파일 헤더 포함</text>

  <rect x="218" y="168" width="148" height="100" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="292" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Page 2</text>
  <text x="292" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">테이블 B-Tree</text>
  <text x="292" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인테리어 노드</text>
  <text x="292" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">자식 페이지 포인터</text>

  <rect x="376" y="168" width="148" height="100" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="450" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Page 3</text>
  <text x="450" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">리프 노드</text>
  <text x="450" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 행 데이터</text>
  <text x="450" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">셀 배열</text>

  <rect x="534" y="168" width="148" height="100" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="608" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Page N</text>
  <text x="608" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">오버플로 페이지</text>
  <text x="608" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">큰 값(BLOB/TEXT)</text>
  <text x="608" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">체인 연결</text>

  <rect x="692" y="168" width="148" height="100" fill="#2a1a1a" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="766" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">프리리스트</text>
  <text x="766" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">삭제된 페이지</text>
  <text x="766" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">재사용 대기</text>
  <text x="766" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">VACUUM으로 회수</text>

  <!-- Page internal structure -->
  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">리프 페이지 내부 구조 (4096 bytes)</text>

  <rect x="60" y="314" width="760" height="60" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>

  <rect x="76" y="322" width="80" height="44" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="116" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#55c555" text-anchor="middle">페이지 헤더</text>
  <text x="116" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">8 bytes</text>

  <rect x="166" y="322" width="120" height="44" fill="#1a1a2e" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="226" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#7ec8e3" text-anchor="middle">셀 포인터 배열</text>
  <text x="226" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">2 bytes × N</text>

  <rect x="296" y="322" width="100" height="44" fill="#1a1a2e" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="346" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#9aa4b8" text-anchor="middle">빈 공간</text>
  <text x="346" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">unallocated</text>

  <rect x="406" y="322" width="398" height="44" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="605" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#55c555" text-anchor="middle">셀 콘텐츠 영역 (오른쪽에서 왼쪽으로 성장)</text>
  <text x="605" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">rowid + 직렬화된 레코드 값</text>

  <!-- Code block -->
  <rect x="60" y="404" width="760" height="100" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- SQLite 파일 정보 조회</text>
  <text x="76" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">PRAGMA</tspan><tspan fill="#ffffff"> page_size;       </tspan><tspan fill="#9aa4b8">-- 기본 4096</tspan></text>
  <text x="76" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">PRAGMA</tspan><tspan fill="#ffffff"> page_count;      </tspan><tspan fill="#9aa4b8">-- 전체 페이지 수</tspan></text>
  <text x="76" y="486" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">PRAGMA</tspan><tspan fill="#ffffff"> freelist_count;  </tspan><tspan fill="#9aa4b8">-- 프리리스트 페이지 수</tspan></text>
</svg>
