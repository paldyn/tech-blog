<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">jlink — 필요한 모듈만 골라 런타임 이미지 생성</text>

  <defs>
    <marker id="jlArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- input: app modules -->
  <rect x="60" y="120" width="190" height="110" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="155" y="150" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">내 모듈 + JDK 모듈</text>
  <text x="155" y="174" font-size="12" fill="#888" text-anchor="middle">com.app</text>
  <text x="155" y="193" font-size="12" fill="#888" text-anchor="middle">java.base</text>
  <text x="155" y="212" font-size="12" fill="#888" text-anchor="middle">java.sql ...</text>

  <!-- jlink -->
  <rect x="350" y="135" width="180" height="80" rx="8" fill="#0d1322" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="170" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">jlink</text>
  <text x="440" y="194" font-size="12" fill="#888" text-anchor="middle">의존 모듈 분석 + 패키징</text>

  <!-- output: runtime image -->
  <rect x="630" y="120" width="190" height="110" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="150" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">맞춤형 런타임 이미지</text>
  <text x="725" y="174" font-size="12" fill="#888" text-anchor="middle">bin/  lib/</text>
  <text x="725" y="193" font-size="12" fill="#888" text-anchor="middle">자체 실행 가능</text>
  <text x="725" y="212" font-size="12" fill="#888" text-anchor="middle">JDK 불필요</text>

  <line x1="250" y1="175" x2="348" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jlArr)"/>
  <line x1="530" y1="175" x2="628" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jlArr)"/>

  <text x="440" y="270" font-size="13" fill="#9aa4b8" text-anchor="middle">앱이 실제로 쓰는 모듈만 포함 — 전체 JDK 대비 이미지 크기를 크게 줄인다</text>
</svg>
