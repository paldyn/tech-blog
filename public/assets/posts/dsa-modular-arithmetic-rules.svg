<svg width="880" height="430" viewBox="0 0 880 430" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">모듈러 연산 분배 법칙</text>

  <!-- add -->
  <rect x="60" y="92" width="360" height="86" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">덧셈 ✓</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">(a+b)%m = (a%m + b%m) % m</text>

  <!-- sub -->
  <rect x="460" y="92" width="360" height="86" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">뺄셈 ✓ (음수 보정 +m)</text>
  <text x="476" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">(a-b)%m = (a%m - b%m + m) % m</text>

  <!-- mul -->
  <rect x="60" y="206" width="360" height="86" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">곱셈 ✓</text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">(a·b)%m = (a%m · b%m) % m</text>

  <!-- div -->
  <rect x="460" y="206" width="360" height="86" rx="8" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="476" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">나눗셈 ✗ 분배 불가</text>
  <text x="476" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">a/b 대신 a · b<tspan baseline-shift="super" font-size="10">-1</tspan> (모듈러 역원)</text>

  <!-- caution -->
  <rect x="60" y="324" width="760" height="48" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">언어 주의: C++·Java의 <tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">%</tspan>는 음수를 반환할 수 있다 → <tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">((a % m) + m) % m</tspan> 으로 보정</text>

  <text x="60" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">중간 결과마다 mod를 취해도 답이 같다 — 오버플로 없이 거대한 수를 다루는 핵심 원리</text>
</svg>
