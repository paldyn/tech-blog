<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Spring Boot Actuator 엔드포인트 지도</text>

  <!-- Central: Actuator -->
  <rect x="340" y="72" width="200" height="56" rx="10" fill="#0d1b33" stroke="#4a9eff" stroke-width="2"/>
  <text x="440" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">/actuator</text>
  <text x="440" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">베이스 경로 (변경 가능)</text>

  <!-- LEFT GROUP: Health & Info -->
  <text x="148" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">상태 / 정보</text>

  <rect x="40" y="180" width="220" height="42" rx="6" fill="#1a2e1a" stroke="#4aaf6b" stroke-width="1.5"/>
  <text x="88" y="198" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/health</text>
  <text x="88" y="214" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서비스·DB·디스크 상태 확인</text>

  <rect x="40" y="234" width="220" height="42" rx="6" fill="#1a2e1a" stroke="#4aaf6b" stroke-width="1.5"/>
  <text x="88" y="252" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/info</text>
  <text x="88" y="268" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">빌드·Git·커스텀 정보 노출</text>

  <rect x="40" y="288" width="220" height="42" rx="6" fill="#1a2e1a" stroke="#4aaf6b" stroke-width="1.5"/>
  <text x="88" y="306" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/ping</text>
  <text x="88" y="322" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">단순 생존 확인 (HTTP 200)</text>

  <!-- Branch line from /actuator to left group -->
  <path d="M 340 100 Q 200 100 148 178" stroke="#7ec8e3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- CENTER GROUP: Metrics & Tracing -->
  <text x="440" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">메트릭 / 추적</text>

  <rect x="330" y="180" width="220" height="42" rx="6" fill="#0d1b33" stroke="#3a6baf" stroke-width="1.5"/>
  <text x="378" y="198" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">/metrics</text>
  <text x="378" y="214" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JVM·HTTP·Custom 메트릭</text>

  <rect x="330" y="234" width="220" height="42" rx="6" fill="#0d1b33" stroke="#3a6baf" stroke-width="1.5"/>
  <text x="378" y="252" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">/prometheus</text>
  <text x="378" y="268" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Prometheus 스크래핑 포맷</text>

  <rect x="330" y="288" width="220" height="42" rx="6" fill="#0d1b33" stroke="#3a6baf" stroke-width="1.5"/>
  <text x="378" y="306" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">/loggers</text>
  <text x="378" y="322" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">런타임 로그 레벨 조회/변경</text>

  <!-- Branch line down from /actuator to center -->
  <line x1="440" y1="128" x2="440" y2="178" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RIGHT GROUP: Debug / Admin -->
  <text x="728" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">운영 / 디버그</text>

  <rect x="618" y="180" width="224" height="42" rx="6" fill="#1a0d0d" stroke="#6e2a2a" stroke-width="1.5"/>
  <text x="666" y="198" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">/env</text>
  <text x="666" y="214" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">환경변수·설정 속성 조회</text>

  <rect x="618" y="234" width="224" height="42" rx="6" fill="#1a0d0d" stroke="#6e2a2a" stroke-width="1.5"/>
  <text x="666" y="252" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">/beans</text>
  <text x="666" y="268" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">등록된 모든 Bean 목록</text>

  <rect x="618" y="288" width="224" height="42" rx="6" fill="#1a0d0d" stroke="#6e2a2a" stroke-width="1.5"/>
  <text x="666" y="306" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">/threaddump</text>
  <text x="666" y="322" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스레드 스택 덤프</text>

  <!-- Branch line from /actuator to right group -->
  <path d="M 540 100 Q 680 100 728 178" stroke="#7ec8e3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Security warning box -->
  <rect x="40" y="360" width="800" height="50" rx="8" fill="#1a0d0d" stroke="#6e2a2a" stroke-width="1.5"/>
  <text x="60" y="381" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">보안 주의</text>
  <text x="160" y="381" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/env, /beans, /threaddump, /heapdump는 민감 정보 포함 — 프로덕션에서 반드시 인증/접근 제한 필요</text>
  <text x="60" y="399" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">management.endpoints.web.exposure.include=health,info,metrics,prometheus</text>

  <!-- Port note -->
  <text x="440" y="450" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">management.server.port=8081 로 별도 포트 분리 권장</text>
</svg>
