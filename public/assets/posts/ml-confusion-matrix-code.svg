<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">혼동 행렬 시각화 코드</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">ConfusionMatrixDisplay로 히트맵을 그리고 오류 패턴을 분석한다</text>

  <!-- Code block -->
  <rect x="60" y="86" width="760" height="328" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>

  <text x="76" y="108" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">from</text>
  <text x="110" y="108" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> sklearn.metrics </text>
  <text x="228" y="108" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">import</text>
  <text x="270" y="108" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> (confusion_matrix,</text>
  <text x="76" y="126" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    ConfusionMatrixDisplay)</text>

  <line x1="76" y1="140" x2="804" y2="140" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="158" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># 기본 혼동 행렬</text>
  <text x="76" y="176" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">cm = confusion_matrix(y_test, y_pred)</text>
  <text x="76" y="194" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># [[TN FP]</text>
  <text x="76" y="212" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">#  [FN TP]] ← 이진 분류 기준</text>

  <text x="76" y="230" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># TP, FP, TN, FN 추출</text>
  <text x="76" y="248" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">tn, fp, fn, tp = cm.ravel()</text>

  <line x1="76" y1="262" x2="804" y2="262" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="280" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># 정규화 버전 (비율로 표시)</text>
  <text x="76" y="298" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">cm_norm = confusion_matrix(</text>
  <text x="76" y="316" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    y_test, y_pred,</text>
  <text x="76" y="334" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    normalize=</text>
  <text x="175" y="334" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">'true'</text>
  <text x="211" y="334" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">)</text>
  <text x="76" y="352" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># 'true'=행합1, 'pred'=열합1</text>

  <line x1="76" y1="366" x2="804" y2="366" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="384" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># 시각화</text>
  <text x="76" y="402" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">disp = ConfusionMatrixDisplay(cm)</text>
  <text x="76" y="402" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">                               </text>

  <!-- Footer -->
  <text x="440" y="448" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
