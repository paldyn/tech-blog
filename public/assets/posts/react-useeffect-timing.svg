<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <defs>
    <marker id="arrW" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">useEffect 실행 타이밍</text>

  <!-- 타임라인 -->
  <rect x="60" y="68" width="130" height="52" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Render</text>
  <text x="125" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">함수 호출</text>

  <line x1="190" y1="94" x2="214" y2="94" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <rect x="218" y="68" width="130" height="52" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="283" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">DOM 반영</text>
  <text x="283" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Commit</text>

  <line x1="348" y1="94" x2="372" y2="94" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <rect x="376" y="68" width="148" height="52" rx="8" fill="#101820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="450" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">화면 페인트</text>
  <text x="450" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자 화면 업데이트</text>

  <line x1="524" y1="94" x2="548" y2="94" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>

  <rect x="552" y="68" width="268" height="52" rx="8" fill="#0d1828" stroke="#7ec8e3" stroke-width="2"/>
  <text x="686" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">useEffect 실행</text>
  <text x="686" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">페인트 이후 비동기 실행</text>

  <!-- 코드 박스 -->
  <rect x="60" y="144" width="380" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="166"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">function</text>
  <text x="150" y="166"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> UserProfile({ userId }) {</text>
  <text x="76" y="186"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">  const</text>
  <text x="122" y="186"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> [user, setUser] = useState(</text>
  <text x="314" y="186"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">null</text>
  <text x="346" y="186"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>
  <text x="76" y="216"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">  // 마운트 + userId 변경 시 실행</text>
  <text x="76" y="236"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">  useEffect</text>
  <text x="154" y="236"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">(() =&gt; {</text>
  <text x="76" y="256"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">    let</text>
  <text x="106" y="256"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> ignore = </text>
  <text x="187" y="256"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">false</text>
  <text x="229" y="256"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">;</text>
  <text x="76" y="276"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    fetchUser(userId).then(data =&gt; {</text>
  <text x="76" y="296"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">      if</text>
  <text x="108" y="296"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> (!ignore) setUser(data);</text>
  <text x="76" y="316"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    });</text>
  <text x="76" y="336"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">    return</text>
  <text x="140" y="336"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> () =&gt; { ignore = </text>
  <text x="262" y="336"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">true</text>
  <text x="300" y="336"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">; };</text>
  <text x="76" y="356"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }, [userId]);</text>
  <text x="76" y="386"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">  return</text>
  <text x="140" y="386"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> user ? &lt;Profile user={user} /&gt; : &lt;Spinner /&gt;;</text>
  <text x="76" y="406"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="76" y="430"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// ignore 플래그: 경쟁 조건 방지</text>

  <!-- 오른쪽 설명 -->
  <rect x="468" y="144" width="352" height="120" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="644" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">의존성 배열 3가지 형태</text>
  <text x="484" y="196"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">useEffect(fn)</text>
  <text x="612" y="196"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">매 렌더마다</text>
  <text x="484" y="218"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">useEffect(fn, [])</text>
  <text x="628" y="218"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">마운트 1회만</text>
  <text x="484" y="240"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">useEffect(fn, [a,b])</text>
  <text x="644" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">a or b 변경 시</text>
  <text x="484" y="254"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">의존성은 React가 아닌 eslint가 검사</text>

  <rect x="468" y="280" width="352" height="164" rx="8" fill="#101820" stroke="#55c555" stroke-width="1.5"/>
  <text x="644" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">useEffect 적합 사용처</text>
  <text x="484" y="330"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">데이터 페칭 (단, TanStack Query 권장)</text>
  <text x="484" y="352"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">외부 시스템 동기화 (이벤트 리스너 등)</text>
  <text x="484" y="374"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DOM 직접 조작 (서드파티 라이브러리)</text>
  <text x="484" y="396"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">타이머 / 인터벌 설정</text>
  <text x="484" y="420"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">부적합: props/state 동기화</text>
  <text x="484" y="436"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">그건 파생 state / 이벤트 핸들러로</text>
</svg>
