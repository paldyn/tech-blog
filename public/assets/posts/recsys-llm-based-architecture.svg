<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LLM 기반 추천 시스템 아키텍처</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">사용자 쿼리 이해 → 콘텐츠 표현 → 개인화 추천</text>

  <!-- Row 1: 입력 레이어 -->
  <!-- User Context 박스 -->
  <rect x="60" y="98" width="220" height="70" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">사용자 컨텍스트</text>
  <text x="170" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">행동 이력 · 선호 · 프로필</text>
  <text x="170" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자연어 쿼리</text>

  <!-- Item Corpus 박스 -->
  <rect x="600" y="98" width="220" height="70" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">아이템 코퍼스</text>
  <text x="710" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">제목 · 설명 · 태그</text>
  <text x="710" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메타데이터</text>

  <!-- 화살표: User → LLM Encoder -->
  <line x1="280" y1="133" x2="348" y2="133" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <!-- 화살표: Item → LLM Encoder -->
  <line x1="600" y1="133" x2="532" y2="133" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- LLM Encoder 중앙 박스 -->
  <rect x="350" y="90" width="180" height="86" fill="#1a1030" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">LLM Encoder</text>
  <text x="440" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">GPT / Claude</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Llama / Gemini</text>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">의미적 표현 생성</text>

  <!-- Row 2: 표현 벡터 레이어 -->
  <!-- User Embedding -->
  <rect x="100" y="220" width="160" height="60" fill="#0d1f1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">사용자 임베딩</text>
  <text x="180" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">d=1536 벡터</text>

  <!-- Item Embedding -->
  <rect x="620" y="220" width="160" height="60" fill="#0d1f1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">아이템 임베딩</text>
  <text x="700" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">d=1536 벡터</text>

  <!-- Explanation Generation 박스 -->
  <rect x="330" y="215" width="220" height="70" fill="#1a1030" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">설명 생성</text>
  <text x="440" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">"이 영화를 추천하는 이유:"</text>
  <text x="440" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자연어 추천 근거 생성</text>

  <!-- 화살표: LLM → User Emb / Item Emb / Explanation -->
  <line x1="370" y1="176" x2="220" y2="220" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="440" y1="176" x2="440" y2="215" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="510" y1="176" x2="660" y2="220" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- Row 3: ANN Retrieval -->
  <rect x="230" y="336" width="420" height="68" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">ANN 벡터 검색 (FAISS / pgvector)</text>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">코사인 유사도 기반 Top-K 후보 검색</text>
  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">LLM 재랭킹 → 최종 추천 리스트</text>

  <!-- 화살표: embeddings → ANN -->
  <line x1="180" y1="280" x2="310" y2="336" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="700" y1="280" x2="570" y2="336" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Row 4: Output -->
  <rect x="300" y="430" width="280" height="36" fill="#0d2010" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">개인화 추천 결과 + 자연어 설명</text>

  <!-- 화살표: ANN → Output -->
  <line x1="440" y1="404" x2="440" y2="430" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
</svg>
