<svg width="880" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr-d" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#7ec8e3" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">활동 선택 — 정렬 및 선택 과정</text>

  <!-- Left table: original -->
  <text x="80" y="85" font-size="16" font-weight="600" fill="#e8e8e8">원래 활동 목록</text>

  <!-- Table header -->
  <rect x="80" y="100" width="240" height="34" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">활동</text>
  <text x="195" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">시작</text>
  <text x="280" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">종료</text>

  <!-- Rows -->
  <rect x="80" y="134" width="240" height="30" rx="0" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="130" y="154" text-anchor="middle" font-size="13" fill="#e8e8e8">A</text>
  <text x="195" y="154" text-anchor="middle" font-size="13" fill="#888">1</text>
  <text x="280" y="154" text-anchor="middle" font-size="13" fill="#888">4</text>

  <rect x="80" y="164" width="240" height="30" rx="0" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>
  <text x="130" y="184" text-anchor="middle" font-size="13" fill="#e8e8e8">B</text>
  <text x="195" y="184" text-anchor="middle" font-size="13" fill="#888">3</text>
  <text x="280" y="184" text-anchor="middle" font-size="13" fill="#888">5</text>

  <rect x="80" y="194" width="240" height="30" rx="0" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="130" y="214" text-anchor="middle" font-size="13" fill="#e8e8e8">C</text>
  <text x="195" y="214" text-anchor="middle" font-size="13" fill="#888">0</text>
  <text x="280" y="214" text-anchor="middle" font-size="13" fill="#888">6</text>

  <rect x="80" y="224" width="240" height="30" rx="0" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>
  <text x="130" y="244" text-anchor="middle" font-size="13" fill="#e8e8e8">D</text>
  <text x="195" y="244" text-anchor="middle" font-size="13" fill="#888">5</text>
  <text x="280" y="244" text-anchor="middle" font-size="13" fill="#888">7</text>

  <rect x="80" y="254" width="240" height="30" rx="0" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="130" y="274" text-anchor="middle" font-size="13" fill="#e8e8e8">E</text>
  <text x="195" y="274" text-anchor="middle" font-size="13" fill="#888">3</text>
  <text x="280" y="274" text-anchor="middle" font-size="13" fill="#888">9</text>

  <rect x="80" y="284" width="240" height="30" rx="0" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>
  <text x="130" y="304" text-anchor="middle" font-size="13" fill="#e8e8e8">F</text>
  <text x="195" y="304" text-anchor="middle" font-size="13" fill="#888">5</text>
  <text x="280" y="304" text-anchor="middle" font-size="13" fill="#888">9</text>

  <rect x="80" y="314" width="240" height="30" rx="0" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="130" y="334" text-anchor="middle" font-size="13" fill="#e8e8e8">G</text>
  <text x="195" y="334" text-anchor="middle" font-size="13" fill="#888">6</text>
  <text x="280" y="334" text-anchor="middle" font-size="13" fill="#888">10</text>

  <rect x="80" y="344" width="240" height="30" rx="0" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>
  <text x="130" y="364" text-anchor="middle" font-size="13" fill="#e8e8e8">H</text>
  <text x="195" y="364" text-anchor="middle" font-size="13" fill="#888">8</text>
  <text x="280" y="364" text-anchor="middle" font-size="13" fill="#888">11</text>

  <!-- Arrow to sorted -->
  <line x1="350" y1="230" x2="420" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-d)"/>
  <text x="385" y="222" text-anchor="middle" font-size="11" fill="#7ec8e3">종료 시간</text>
  <text x="385" y="244" text-anchor="middle" font-size="11" fill="#7ec8e3">오름차순</text>

  <!-- Right table: sorted -->
  <text x="440" y="85" font-size="16" font-weight="600" fill="#e8e8e8">종료 시간 정렬 후 선택</text>

  <rect x="440" y="100" width="380" height="34" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="500" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">활동</text>
  <text x="570" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">시작</text>
  <text x="640" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">종료</text>
  <text x="760" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">선택?</text>

  <!-- Sorted rows: A(1,4), B(3,5), C(0,6), D(5,7), E(3,9), F(5,9), G(6,10), H(8,11) -->
  <!-- A: selected -->
  <rect x="440" y="134" width="380" height="30" rx="0" fill="#0d2b0d" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="154" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">A</text>
  <text x="570" y="154" text-anchor="middle" font-size="13" fill="#55c555">1</text>
  <text x="640" y="154" text-anchor="middle" font-size="13" fill="#55c555">4</text>
  <text x="760" y="154" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">✓ 선택</text>

  <!-- B: rejected -->
  <rect x="440" y="164" width="380" height="30" rx="0" fill="#1a0a0a" stroke="#333" stroke-width="0.5"/>
  <text x="500" y="184" text-anchor="middle" font-size="13" fill="#555">B</text>
  <text x="570" y="184" text-anchor="middle" font-size="13" fill="#555">3</text>
  <text x="640" y="184" text-anchor="middle" font-size="13" fill="#555">5</text>
  <text x="760" y="184" text-anchor="middle" font-size="13" fill="#e05555">✗ (3 &lt; 4)</text>

  <!-- C: rejected -->
  <rect x="440" y="194" width="380" height="30" rx="0" fill="#1a0a0a" stroke="#333" stroke-width="0.5"/>
  <text x="500" y="214" text-anchor="middle" font-size="13" fill="#555">C</text>
  <text x="570" y="214" text-anchor="middle" font-size="13" fill="#555">0</text>
  <text x="640" y="214" text-anchor="middle" font-size="13" fill="#555">6</text>
  <text x="760" y="214" text-anchor="middle" font-size="13" fill="#e05555">✗ (0 &lt; 4)</text>

  <!-- D: selected -->
  <rect x="440" y="224" width="380" height="30" rx="0" fill="#0d2b0d" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="244" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">D</text>
  <text x="570" y="244" text-anchor="middle" font-size="13" fill="#55c555">5</text>
  <text x="640" y="244" text-anchor="middle" font-size="13" fill="#55c555">7</text>
  <text x="760" y="244" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">✓ 선택</text>

  <!-- E: rejected -->
  <rect x="440" y="254" width="380" height="30" rx="0" fill="#1a0a0a" stroke="#333" stroke-width="0.5"/>
  <text x="500" y="274" text-anchor="middle" font-size="13" fill="#555">E</text>
  <text x="570" y="274" text-anchor="middle" font-size="13" fill="#555">3</text>
  <text x="640" y="274" text-anchor="middle" font-size="13" fill="#555">9</text>
  <text x="760" y="274" text-anchor="middle" font-size="13" fill="#e05555">✗ (3 &lt; 7)</text>

  <!-- F: rejected -->
  <rect x="440" y="284" width="380" height="30" rx="0" fill="#1a0a0a" stroke="#333" stroke-width="0.5"/>
  <text x="500" y="304" text-anchor="middle" font-size="13" fill="#555">F</text>
  <text x="570" y="304" text-anchor="middle" font-size="13" fill="#555">5</text>
  <text x="640" y="304" text-anchor="middle" font-size="13" fill="#555">9</text>
  <text x="760" y="304" text-anchor="middle" font-size="13" fill="#e05555">✗ (5 &lt; 7)</text>

  <!-- G: rejected -->
  <rect x="440" y="314" width="380" height="30" rx="0" fill="#1a0a0a" stroke="#333" stroke-width="0.5"/>
  <text x="500" y="334" text-anchor="middle" font-size="13" fill="#555">G</text>
  <text x="570" y="334" text-anchor="middle" font-size="13" fill="#555">6</text>
  <text x="640" y="334" text-anchor="middle" font-size="13" fill="#555">10</text>
  <text x="760" y="334" text-anchor="middle" font-size="13" fill="#e05555">✗ (6 &lt; 7)</text>

  <!-- H: selected -->
  <rect x="440" y="344" width="380" height="30" rx="0" fill="#0d2b0d" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="364" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">H</text>
  <text x="570" y="364" text-anchor="middle" font-size="13" fill="#55c555">8</text>
  <text x="640" y="364" text-anchor="middle" font-size="13" fill="#55c555">11</text>
  <text x="760" y="364" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">✓ 선택</text>

  <!-- Result row -->
  <rect x="440" y="394" width="380" height="40" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="2"/>
  <text x="630" y="419" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">결과: A, D, H — 최대 3개 활동</text>

  <!-- Bottom note -->
  <text x="80" y="460" font-size="13" fill="#888">조건: start &gt;= last_finish 이면 선택</text>
  <text x="80" y="480" font-size="13" fill="#7ec8e3">전체 복잡도: O(N log N) 정렬 + O(N) 탐색</text>
</svg>
