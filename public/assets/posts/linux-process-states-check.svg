<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">프로세스 상태 확인 방법</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">D 상태 프로세스 찾기, Zombie 처리, 상태별 진단</text>

  <!-- Left panel: state detection commands -->
  <rect x="50" y="86" width="380" height="310" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="66" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">상태 확인 명령어</text>
  <line x1="66" y1="118" x2="414" y2="118" stroke="#1e2433" stroke-width="1"/>

  <text x="66" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># STAT 컬럼으로 상태 확인</text>
  <text x="66" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">ps aux --sort=stat</text>

  <text x="66" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># D 상태(I/O 대기) 프로세스만</text>
  <text x="66" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">ps aux | awk '$8 ~ /^D/'</text>

  <text x="66" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># Zombie(Z) 프로세스 목록</text>
  <text x="66" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">ps aux | awk '$8 == "Z"'</text>
  <text x="66" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">ps -eo pid,ppid,stat,comm \</text>
  <text x="66" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  | awk '$3 ~ /Z/'</text>

  <text x="66" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># /proc/[pid]/status 확인</text>
  <text x="66" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">cat /proc/1234/status | grep State</text>
  <text x="66" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">State: S (sleeping)</text>

  <text x="66" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># top에서 D 상태 카운트</text>

  <!-- Right panel: zombie and D state handling -->
  <rect x="460" y="86" width="370" height="310" rx="8" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="645" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">문제 상황 대처</text>
  <line x1="476" y1="118" x2="814" y2="118" stroke="#1e2d45" stroke-width="1"/>

  <!-- D state handling -->
  <rect x="476" y="128" width="358" height="74" rx="6" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="492" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">D 상태 (Uninterruptible Sleep)</text>
  <text x="492" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• SIGKILL도 통하지 않음</text>
  <text x="492" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• I/O 완료되면 자동 해소</text>
  <text x="492" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• NFS 마운트 행 → umount -f</text>

  <!-- Zombie handling -->
  <rect x="476" y="214" width="358" height="86" rx="6" fill="#1a1500" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="492" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">Z 상태 (Zombie)</text>
  <text x="492" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 프로세스 자원은 이미 해제됨</text>
  <text x="492" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• PID 테이블 항목만 차지</text>
  <text x="492" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 부모에 SIGCHLD 보내거나 부모 종료</text>

  <!-- Code for zombie parent -->
  <rect x="476" y="312" width="358" height="76" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># zombie의 부모 PID 확인</text>
  <text x="492" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">ps -o ppid= -p &lt;zombie_pid&gt;</text>
  <text x="492" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">kill -CHLD &lt;parent_pid&gt;</text>
</svg>
