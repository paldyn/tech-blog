<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">카데인 알고리즘 (Kadane's Algorithm)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">최대 부분 배열 합을 O(N)에 — DP의 단순화</text>

  <!-- Array: -2 1 -3 4 -1 2 1 -5 4 -->
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">배열 A = [-2, 1, -3, 4, -1, 2, 1, -5, 4]</text>

  <!-- Cell width=72 from x=80 -->
  <rect x="80"  y="108" width="68" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="114" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" text-anchor="middle">-2</text>

  <rect x="152" y="108" width="68" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="186" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">1</text>

  <rect x="224" y="108" width="68" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="258" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" text-anchor="middle">-3</text>

  <rect x="296" y="108" width="68" height="44" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="2"/>
  <text x="330" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">4</text>

  <rect x="368" y="108" width="68" height="44" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="2"/>
  <text x="402" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" text-anchor="middle">-1</text>

  <rect x="440" y="108" width="68" height="44" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="2"/>
  <text x="474" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">2</text>

  <rect x="512" y="108" width="68" height="44" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="2"/>
  <text x="546" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">1</text>

  <rect x="584" y="108" width="68" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="618" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" text-anchor="middle">-5</text>

  <rect x="656" y="108" width="68" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="690" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">4</text>

  <!-- Max subarray bracket -->
  <line x1="296" y1="104" x2="580" y2="104" stroke="#55c555" stroke-width="2"/>
  <line x1="296" y1="104" x2="296" y2="96" stroke="#55c555" stroke-width="2"/>
  <line x1="580" y1="104" x2="580" y2="96" stroke="#55c555" stroke-width="2"/>
  <text x="438" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">최대 부분 배열 [3..6] 합 = 6</text>

  <!-- DP table -->
  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">current (현재까지 끝나는 최대 합)</text>

  <!-- current values -->
  <rect x="80"  y="186" width="68" height="40" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="114" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" text-anchor="middle">-2</text>

  <rect x="152" y="186" width="68" height="40" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="186" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">1</text>

  <rect x="224" y="186" width="68" height="40" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="258" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" text-anchor="middle">-2</text>

  <rect x="296" y="186" width="68" height="40" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="330" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle">4</text>

  <rect x="368" y="186" width="68" height="40" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="402" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle">3</text>

  <rect x="440" y="186" width="68" height="40" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="474" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle">5</text>

  <rect x="512" y="186" width="68" height="40" rx="4" fill="#0d2e0d" stroke="#7777cc" stroke-width="2.5"/>
  <text x="546" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">6</text>
  <text x="546" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">peak</text>

  <rect x="584" y="186" width="68" height="40" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="618" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">1</text>

  <rect x="656" y="186" width="68" height="40" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="690" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">5</text>

  <!-- Key decision annotation -->
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">인덱스 2: current = max(-3, -2+(-3)) = max(-3, -5) = -3  → 이전 보다 새로 시작이 유리</text>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">인덱스 3: current = max(4, -3+4) = max(4, 1) = 4  → 새로 시작 (리셋)</text>

  <!-- Decision formula -->
  <rect x="60" y="300" width="760" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">핵심 점화식</text>
  <text x="440" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7777cc" text-anchor="middle">current = max(A[i], current + A[i])</text>

  <!-- Bottom table -->
  <rect x="60" y="378" width="760" height="100" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">변형 문제</text>

  <text x="160" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">최소 부분 배열 합</text>
  <text x="160" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">min(A[i], current + A[i])</text>
  <text x="160" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 음수 배열 대응</text>

  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">원형 배열 최대 부분합</text>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">max(일반 최대, total - 최소 중간)</text>
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">경계 넘는 구간 처리</text>

  <text x="700" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">최대 곱 부분 배열</text>
  <text x="700" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">max_prod, min_prod 동시 추적</text>
  <text x="700" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">음수×음수=양수 처리</text>
</svg>
