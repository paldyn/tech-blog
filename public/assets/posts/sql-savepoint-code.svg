<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <text x="440" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">SAVEPOINT 구문 (표준 SQL)</text>

  <!-- Left: Basic usage -->
  <rect x="50" y="56" width="370" height="22" rx="4" fill="#111118"/>
  <text x="235" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">기본 사용법</text>

  <rect x="50" y="82" width="370" height="234" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="66" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">BEGIN</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="66" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">INSERT INTO</tspan><tspan fill="#e8e8e8"> orders(...);</tspan></text>
  <text x="66" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 복귀점 설정</text>
  <text x="66" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SAVEPOINT</tspan><tspan fill="#e8e8e8"> after_order;</tspan></text>
  <text x="66" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">UPDATE</tspan><tspan fill="#e8e8e8"> inventory...</tspan></text>
  <text x="66" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 오류 발생 → sp로 롤백</text>
  <text x="66" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ROLLBACK TO SAVEPOINT</tspan></text>
  <text x="66" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    after_order;</text>
  <text x="66" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 사용 완료 후 해제</text>
  <text x="66" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">RELEASE SAVEPOINT</tspan></text>
  <text x="66" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    after_order;</text>
  <text x="66" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">COMMIT</tspan><tspan fill="#e8e8e8">;</tspan></text>

  <!-- Right: DB-specific -->
  <rect x="460" y="56" width="370" height="22" rx="4" fill="#111118"/>
  <text x="645" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">배치 처리 패턴 (오류 행 스킵)</text>

  <rect x="460" y="82" width="370" height="234" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 1000건 배치 처리 중 오류 행 스킵</text>
  <text x="476" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">BEGIN</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="476" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FOR</tspan><tspan fill="#e8e8e8"> row </tspan><tspan fill="#7ec8e3">IN</tspan><tspan fill="#e8e8e8"> batch_data </tspan><tspan fill="#7ec8e3">LOOP</tspan></text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  SAVEPOINT</tspan><tspan fill="#e8e8e8"> row_sp;</tspan></text>
  <text x="476" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  BEGIN</tspan></text>
  <text x="476" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    INSERT ...;</text>
  <text x="476" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  EXCEPTION WHEN OTHERS THEN</tspan></text>
  <text x="476" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    ROLLBACK TO</tspan><tspan fill="#e8e8e8"> row_sp;</tspan></text>
  <text x="476" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    -- 오류 행 로깅 후 계속</text>
  <text x="476" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  END</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="476" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">END LOOP</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="476" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">COMMIT</tspan><tspan fill="#e8e8e8">;</tspan></text>

  <!-- Bottom note -->
  <rect x="50" y="326" width="780" height="24" rx="4" fill="#111118"/>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Oracle: SAVEPOINT sp1 | PostgreSQL: SAVEPOINT sp1 | MySQL: SAVEPOINT sp1 | SQLite: SAVEPOINT sp1</text>
</svg>
