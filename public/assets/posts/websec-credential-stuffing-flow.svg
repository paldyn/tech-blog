<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">크리덴셜 스터핑 공격 흐름</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Credential Stuffing — 유출된 계정 정보로 자동화 로그인 시도</text>

  <!-- Step 1: Data Breach -->
  <rect x="60" y="100" width="200" height="70" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">① 데이터 유출 발생</text>
  <text x="160" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타 서비스 DB 해킹</text>

  <!-- Arrow -->
  <line x1="260" y1="135" x2="316" y2="135" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: List -->
  <rect x="318" y="100" width="200" height="70" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="418" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">② 콤보 리스트 준비</text>
  <text x="418" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">user:pass 쌍 수백만 건</text>

  <!-- Arrow -->
  <line x1="518" y1="135" x2="574" y2="135" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Bot -->
  <rect x="576" y="100" width="200" height="70" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="676" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">③ 자동화 봇 공격</text>
  <text x="676" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프록시·분산 IP 사용</text>

  <!-- Arrow down -->
  <line x1="676" y1="170" x2="676" y2="220" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Target service -->
  <rect x="576" y="222" width="200" height="70" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="676" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">④ 대상 서비스 로그인</text>
  <text x="676" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비밀번호 재사용 계정 탈취</text>

  <!-- Arrow left -->
  <line x1="576" y1="257" x2="484" y2="257" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Account Takeover -->
  <rect x="318" y="222" width="164" height="70" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="400" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">⑤ 계정 탈취</text>
  <text x="400" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ATO (Account Takeover)</text>
  <text x="400" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">피해: 금융·개인정보 유출</text>

  <!-- Defense section -->
  <text x="180" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">방어 전략</text>

  <rect x="60" y="358" width="180" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">MFA 강제 적용</text>
  <text x="150" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2차 인증으로 탈취 차단</text>

  <rect x="260" y="358" width="180" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="350" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">속도 제한 + CAPTCHA</text>
  <text x="350" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">봇 자동화 탐지·차단</text>

  <rect x="460" y="358" width="180" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="550" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">유출 DB 모니터링</text>
  <text x="550" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HaveIBeenPwned API</text>

  <rect x="660" y="358" width="165" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="742" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">이상 로그인 탐지</text>
  <text x="742" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">IP·디바이스 핑거프린팅</text>

  <!-- Footer -->
  <rect x="60" y="440" width="760" height="38" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">크리덴셜 스터핑 성공률 0.1~2% — 수백만 시도 중 수천~수만 계정 탈취 가능</text>
</svg>
