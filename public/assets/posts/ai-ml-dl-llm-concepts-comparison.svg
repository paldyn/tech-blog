<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI / ML / DL / LLM 핵심 비교</text>
  <text x="440" y="74" text-anchor="middle" font-size="13" fill="#888">개념 · 입력 · 방법 · 대표 예시</text>

  <!-- Column headers -->
  <rect x="60" y="96" width="760" height="36" fill="#141414" rx="6"/>
  <text x="130" y="119" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">구분</text>
  <text x="295" y="119" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">학습 방식</text>
  <text x="490" y="119" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">주요 알고리즘</text>
  <text x="710" y="119" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">대표 제품·모델</text>

  <!-- Divider lines -->
  <line x1="200" y1="96" x2="200" y2="482" stroke="#222" stroke-width="1"/>
  <line x1="390" y1="96" x2="390" y2="482" stroke="#222" stroke-width="1"/>
  <line x1="600" y1="96" x2="600" y2="482" stroke="#222" stroke-width="1"/>

  <!-- Row 1: AI -->
  <rect x="60" y="132" width="760" height="80" fill="#111122" rx="4"/>
  <text x="130" y="158" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">AI</text>
  <text x="130" y="178" text-anchor="middle" font-size="12" fill="#888">인공지능</text>
  <text x="130" y="196" text-anchor="middle" font-size="11" fill="#555">1956년~</text>
  <text x="295" y="158" text-anchor="middle" font-size="12" fill="#e8e8e8">규칙 · 논리 · 데이터</text>
  <text x="295" y="178" text-anchor="middle" font-size="12" fill="#888">명시적 규칙 기술 포함</text>
  <text x="490" y="158" text-anchor="middle" font-size="12" fill="#e8e8e8">탐색 · 계획 · 추론</text>
  <text x="490" y="178" text-anchor="middle" font-size="12" fill="#888">전문가 시스템, 게임 AI</text>
  <text x="710" y="158" text-anchor="middle" font-size="12" fill="#e8e8e8">Deep Blue (체스)</text>
  <text x="710" y="178" text-anchor="middle" font-size="12" fill="#888">Watson (IBM)</text>

  <!-- Row 2: ML -->
  <rect x="60" y="216" width="760" height="80" fill="#0f1a1f" rx="4"/>
  <text x="130" y="242" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">ML</text>
  <text x="130" y="262" text-anchor="middle" font-size="12" fill="#888">머신러닝</text>
  <text x="130" y="280" text-anchor="middle" font-size="11" fill="#555">1980년대~</text>
  <text x="295" y="242" text-anchor="middle" font-size="12" fill="#e8e8e8">데이터 → 패턴 학습</text>
  <text x="295" y="262" text-anchor="middle" font-size="12" fill="#888">특징은 사람이 설계</text>
  <text x="490" y="242" text-anchor="middle" font-size="12" fill="#e8e8e8">SVM · 결정트리 · RF</text>
  <text x="490" y="262" text-anchor="middle" font-size="12" fill="#888">선형·로지스틱 회귀</text>
  <text x="710" y="242" text-anchor="middle" font-size="12" fill="#e8e8e8">Scikit-learn</text>
  <text x="710" y="262" text-anchor="middle" font-size="12" fill="#888">XGBoost · LightGBM</text>

  <!-- Row 3: DL -->
  <rect x="60" y="300" width="760" height="80" fill="#0f1f12" rx="4"/>
  <text x="130" y="326" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">DL</text>
  <text x="130" y="346" text-anchor="middle" font-size="12" fill="#888">딥러닝</text>
  <text x="130" y="364" text-anchor="middle" font-size="11" fill="#555">2012년~</text>
  <text x="295" y="326" text-anchor="middle" font-size="12" fill="#e8e8e8">다층 신경망 자동 학습</text>
  <text x="295" y="346" text-anchor="middle" font-size="12" fill="#888">특징까지 자동 추출</text>
  <text x="490" y="326" text-anchor="middle" font-size="12" fill="#e8e8e8">CNN · RNN · Transformer</text>
  <text x="490" y="346" text-anchor="middle" font-size="12" fill="#888">ResNet · BERT · GPT</text>
  <text x="710" y="326" text-anchor="middle" font-size="12" fill="#e8e8e8">PyTorch · TensorFlow</text>
  <text x="710" y="346" text-anchor="middle" font-size="12" fill="#888">AlexNet · AlphaGo</text>

  <!-- Row 4: LLM -->
  <rect x="60" y="384" width="760" height="80" fill="#1f0f0f" rx="4"/>
  <text x="130" y="410" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">LLM</text>
  <text x="130" y="430" text-anchor="middle" font-size="12" fill="#888">거대언어모델</text>
  <text x="130" y="448" text-anchor="middle" font-size="11" fill="#555">2020년~</text>
  <text x="295" y="410" text-anchor="middle" font-size="12" fill="#e8e8e8">대규모 텍스트 사전학습</text>
  <text x="295" y="430" text-anchor="middle" font-size="12" fill="#888">다음 토큰 예측 반복</text>
  <text x="490" y="410" text-anchor="middle" font-size="12" fill="#e8e8e8">Transformer (디코더)</text>
  <text x="490" y="430" text-anchor="middle" font-size="12" fill="#888">RLHF · Instruction Tuning</text>
  <text x="710" y="410" text-anchor="middle" font-size="12" fill="#e8e8e8">GPT-4o · Claude · Gemini</text>
  <text x="710" y="430" text-anchor="middle" font-size="12" fill="#888">Llama · Mistral · Qwen</text>

  <!-- Border around table -->
  <rect x="60" y="96" width="760" height="368" fill="none" stroke="#222" stroke-width="1" rx="4"/>

  <!-- Footer -->
  <text x="440" y="520" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈 #1</text>
</svg>
