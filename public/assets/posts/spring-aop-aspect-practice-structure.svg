<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arrG" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@Aspect 클래스 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Pointcut 재사용 + 다중 Advice 조합 패턴</text>

  <!-- Caller box -->
  <rect x="60" y="106" width="130" height="52" rx="8" fill="#0d1f35" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="125" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Caller</text>
  <text x="125" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Controller 등</text>

  <!-- Arrow Caller → Proxy -->
  <line x1="190" y1="132" x2="248" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Proxy / Aspect box (large) -->
  <rect x="250" y="90" width="370" height="340" rx="10" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="250" y="90" width="370" height="40" rx="10" fill="#1a1228"/>
  <rect x="250" y="116" width="370" height="14" fill="#1a1228"/>
  <text x="435" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Proxy (LoggingAspect 적용)</text>

  <!-- Advice labels inside proxy box -->
  <rect x="270" y="144" width="330" height="36" rx="6" fill="#101028" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">@Before</text>
  <text x="290" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">메서드 실행 전 — 인증, 파라미터 로깅</text>

  <rect x="270" y="192" width="330" height="36" rx="6" fill="#101028" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">@Around (start)</text>
  <text x="290" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">proceed() 이전 — 시간 측정 시작</text>

  <!-- Target box inside proxy -->
  <rect x="290" y="240" width="290" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="435" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Target 메서드 실행</text>
  <text x="435" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">jp.proceed() — 원본 비즈니스 로직</text>

  <rect x="270" y="304" width="330" height="36" rx="6" fill="#101028" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">@Around (end)</text>
  <text x="290" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">proceed() 이후 — 시간 측정 종료</text>

  <rect x="270" y="352" width="330" height="36" rx="6" fill="#101028" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">@AfterReturning</text>
  <text x="290" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정상 반환 — 결과 감사 로그</text>

  <rect x="270" y="400" width="330" height="36" rx="6" fill="#101028" stroke="#e05555" stroke-width="1"/>
  <text x="290" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">@AfterThrowing</text>
  <text x="290" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">예외 발생 — 알림 발송</text>

  <!-- Arrow Proxy → result back -->
  <line x1="620" y1="132" x2="678" y2="132" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Result box -->
  <rect x="680" y="106" width="140" height="52" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="750" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Result</text>
  <text x="750" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">반환값</text>

  <!-- CommonPointcuts box at bottom -->
  <rect x="60" y="298" width="160" height="132" rx="8" fill="#0f0a05" stroke="#ce9178" stroke-width="1.5"/>
  <text x="140" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">CommonPointcuts</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Pointcut</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">serviceLayer()</text>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Pointcut</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">webLayer()</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Pointcut</text>
  <text x="80" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">loggable()</text>

  <!-- Arrow CommonPointcuts → Proxy -->
  <line x1="220" y1="364" x2="248" y2="310" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="228" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">참조</text>

  <!-- @Order box -->
  <rect x="680" y="210" width="140" height="120" rx="8" fill="#0d0a00" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="750" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#b5cea8">@Order</text>
  <text x="700" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">낮을수록 먼저</text>
  <text x="700" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">@Order(1)</text>
  <text x="700" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SecurityAspect</text>
  <text x="700" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">@Order(2)</text>
  <text x="700" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">LoggingAspect</text>

  <!-- footer -->
  <text x="440" y="518" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · Spring 완전 정복 시리즈</text>
</svg>
