<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">사용자 정의 비동기 이터레이터</text>

  <!-- Left: class definition -->
  <text x="230" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">비동기 이터레이터 클래스</text>
  <rect x="50" y="80" width="370" height="284" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">class </tspan><tspan>AsyncRange:</tspan>
  </text>
  <text x="66" y="121" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">def </tspan><tspan>__init__(self, stop):</tspan>
  </text>
  <text x="66" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        self.current = <tspan fill="#b5cea8">0</tspan></text>
  <text x="66" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        self.stop = stop</text>
  <text x="66" y="183" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">def </tspan><tspan>__aiter__(self):</tspan>
  </text>
  <text x="66" y="201" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">        </tspan><tspan font-weight="600" fill="#7ec8e3">return </tspan><tspan>self</tspan>
  </text>
  <text x="66" y="227" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">async def </tspan><tspan>__anext__(self):</tspan>
  </text>
  <text x="66" y="245" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">        </tspan><tspan font-weight="600" fill="#7ec8e3">if </tspan><tspan>self.current &gt;= self.stop:</tspan>
  </text>
  <text x="66" y="263" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">            </tspan><tspan font-weight="600" fill="#7ec8e3">raise </tspan><tspan>StopAsyncIteration</tspan>
  </text>
  <text x="66" y="281" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        val = self.current</text>
  <text x="66" y="299" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        self.current += <tspan fill="#b5cea8">1</tspan></text>
  <text x="66" y="335" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">        # 비동기 작업 가능</text>
  <text x="66" y="353" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">        </tspan><tspan font-weight="600" fill="#7ec8e3">return </tspan><tspan>val</tspan>
  </text>

  <!-- Right: usage -->
  <text x="650" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">async for 사용</text>
  <rect x="460" y="80" width="370" height="284" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">import </tspan><tspan>asyncio</tspan>
  </text>
  <text x="476" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">async def </tspan><tspan>main():</tspan>
  </text>
  <text x="476" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">async for </tspan><tspan>n </tspan><tspan font-weight="600" fill="#7ec8e3">in </tspan><tspan>AsyncRange(</tspan><tspan fill="#b5cea8">4</tspan><tspan>):</tspan>
  </text>
  <text x="476" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        print(n, end=<tspan fill="#ce9178">" "</tspan>)</text>
  <text x="476" y="193" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # 출력: 0 1 2 3</text>
  <text x="476" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # anext() 직접 사용</text>
  <text x="476" y="247" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    it = AsyncRange(<tspan fill="#b5cea8">3</tspan>)</text>
  <text x="476" y="265" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">    print(</tspan><tspan font-weight="600" fill="#7ec8e3">await </tspan><tspan>anext(it))  </tspan><tspan fill="#9aa4b8"># 0</tspan>
  </text>
  <text x="476" y="283" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">    print(</tspan><tspan font-weight="600" fill="#7ec8e3">await </tspan><tspan>anext(it))  </tspan><tspan fill="#9aa4b8"># 1</tspan>
  </text>
  <text x="476" y="319" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">asyncio.run(main())</text>
</svg>
