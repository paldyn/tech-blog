  <text x="440" y="415" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">권장 기준: 라이브러리 API·클래스 구조 → interface · 그 외 → type</text>
  <text x="440" y="433" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">팀 내에서 하나로 통일하되 혼용을 피하는 것이 가장 중요</text>
