<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Local Persistent Volume 아키텍처</text>

  <!-- Node 1 -->
  <rect x="60" y="68" width="240" height="260" rx="10" fill="none" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Node 1 (worker-a)</text>

  <!-- NVMe disk on node1 -->
  <rect x="80" y="106" width="200" height="54" rx="6" fill="#1a1a0f" stroke="#e8a020" stroke-width="1.5"/>
  <text x="180" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020">NVMe SSD /dev/nvme0n1</text>
  <text x="180" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">마운트: /mnt/fast-disk</text>

  <!-- PV on node1 -->
  <rect x="80" y="178" width="200" height="60" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">PV (local-pv-worker-a)</text>
  <text x="180" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">nodeAffinity: worker-a</text>

  <line x1="180" y1="160" x2="180" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Pod on node1 -->
  <rect x="80" y="258" width="200" height="54" rx="6" fill="#0f1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="180" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Pod (DB)</text>
  <text x="180" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">local PV 마운트 중</text>

  <line x1="180" y1="238" x2="180" y2="258" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 2 -->
  <rect x="320" y="68" width="240" height="260" rx="10" fill="none" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Node 2 (worker-b)</text>

  <rect x="340" y="106" width="200" height="54" rx="6" fill="#1a1a0f" stroke="#e8a020" stroke-width="1.5"/>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020">NVMe SSD /dev/nvme0n1</text>
  <text x="440" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">마운트: /mnt/fast-disk</text>

  <rect x="340" y="178" width="200" height="60" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">PV (local-pv-worker-b)</text>
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">nodeAffinity: worker-b</text>

  <line x1="440" y1="160" x2="440" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="340" y="258" width="200" height="54" rx="6" fill="#0f1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Pod (DB replica)</text>
  <text x="440" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">local PV 마운트 중</text>

  <line x1="440" y1="238" x2="440" y2="258" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Warning box -->
  <rect x="580" y="68" width="260" height="260" rx="10" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">⚠ 주의사항</text>

  <text x="596" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">노드 장애 시 데이터 손실</text>
  <text x="596" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클라우드 볼륨과 달리 복구 불가</text>

  <line x1="594" y1="148" x2="830" y2="148" stroke="#2a1a1a" stroke-width="1"/>

  <text x="596" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Pod는 특정 노드에 고정</text>
  <text x="596" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">nodeAffinity로 스케줄링 제약</text>

  <line x1="594" y1="198" x2="830" y2="198" stroke="#2a1a1a" stroke-width="1"/>

  <text x="596" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">동적 프로비저닝 불가</text>
  <text x="596" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PV를 수동 또는 provisioner로</text>
  <text x="596" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사전에 생성해야 함</text>

  <line x1="594" y1="264" x2="830" y2="264" stroke="#2a1a1a" stroke-width="1"/>

  <text x="596" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">고성능 DB에 적합</text>
  <text x="596" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Cassandra, Elasticsearch</text>
  <text x="596" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">데이터 복제를 앱 레이어에서 처리</text>

  <!-- code block -->
  <rect x="60" y="352" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#9aa4b8"># Local PV nodeAffinity 필수 설정</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">spec.nodeAffinity.required</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">               :</text>
  <text x="76" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">  nodeSelectorTerms: matchExpressions:</text>
  <text x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">  - key: kubernetes.io/hostname  values: [</text>
  <text x="536" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ce9178">worker-a</text>
  <text x="613" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">]</text>
  <text x="76" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#9aa4b8">  # nodeAffinity 없으면 PV 바인딩이 안 됨</text>
</svg>
