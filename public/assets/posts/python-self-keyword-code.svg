<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">self를 이용한 메서드 체이닝</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">메서드에서 self 반환 → 연속 호출 가능</text>

  <!-- Left: code -->
  <rect x="60" y="90" width="400" height="282" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="116" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">class </text>
  <text x="124" y="116" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">Builder:</text>
  <text x="80" y="134" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="120" y="134" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">__init__(self):</text>
  <text x="80" y="152" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">        self.parts = []</text>
  <text x="80" y="170" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="80" y="188" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="120" y="188" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">add(self, part):</text>
  <text x="80" y="206" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">        self.parts.append(part)</text>
  <text x="80" y="224" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="152" y="224" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">self  </text>
  <text x="192" y="224" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># ← 핵심</text>
  <text x="80" y="242" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="120" y="260" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">build(self):</text>
  <text x="80" y="278" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="152" y="278" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">", "</text>
  <text x="184" y="278" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">.join(self.parts)</text>
  <text x="80" y="296" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="80" y="314" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">result = (Builder()</text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    .add(</text>
  <text x="120" y="332" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"A"</text>
  <text x="144" y="332" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">).add(</text>
  <text x="184" y="332" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"B"</text>
  <text x="208" y="332" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">).build())</text>

  <!-- Right: annotations -->
  <rect x="490" y="90" width="330" height="282" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="510" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">메서드 체이닝 원리</text>
  <text x="510" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">add()가 self를 반환하므로</text>
  <text x="510" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">반환값에 곧바로 .add() 호출</text>
  <text x="510" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">가능 → Fluent Interface 패턴</text>

  <rect x="510" y="194" width="290" height="40" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="526" y="212" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#55c555" xml:space="preserve">print(result)</text>
  <text x="526" y="228" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#55c555" xml:space="preserve"># "A, B"</text>

  <text x="510" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">주의: self 반환 타입 힌트</text>
  <rect x="510" y="266" width="290" height="58" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="526" y="284" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">from </text>
  <text x="556" y="284" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__future__ import annotations</text>
  <text x="526" y="302" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">def </text>
  <text x="550" y="302" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">add(self, p) -> </text>
  <text x="658" y="302" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"Builder"</text>
  <text x="526" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 또는 Python 3.11+ Self</text>
</svg>
