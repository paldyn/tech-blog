<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Harbor 엔터프라이즈 레지스트리 아키텍처</text>

  <!-- Client zone -->
  <rect x="60" y="70" width="160" height="60" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">개발자 / CI</text>
  <text x="140" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">docker push/pull</text>

  <!-- Arrow to Nginx -->
  <line x1="220" y1="100" x2="290" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="255" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HTTPS</text>

  <!-- Nginx proxy -->
  <rect x="290" y="70" width="130" height="60" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="355" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Nginx Proxy</text>
  <text x="355" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TLS 종료 · 라우팅</text>

  <!-- Arrow to Core -->
  <line x1="420" y1="100" x2="490" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Harbor Core -->
  <rect x="490" y="70" width="140" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="560" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Harbor Core</text>
  <text x="560" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">API · Auth · RBAC</text>

  <!-- Arrow Core to Registry -->
  <line x1="630" y1="100" x2="700" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Registry -->
  <rect x="700" y="70" width="120" height="60" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="760" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Registry v2</text>
  <text x="760" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이미지 저장</text>

  <!-- Supporting services row -->
  <text x="440" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">지원 서비스</text>

  <!-- PostgreSQL -->
  <rect x="60" y="190" width="140" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">PostgreSQL</text>
  <text x="130" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메타데이터 · 정책</text>

  <!-- Redis -->
  <rect x="230" y="190" width="140" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="300" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Redis</text>
  <text x="300" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">캐시 · 세션</text>

  <!-- Trivy -->
  <rect x="400" y="190" width="140" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Trivy</text>
  <text x="470" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">취약점 스캔</text>

  <!-- Notary -->
  <rect x="570" y="190" width="140" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Notary</text>
  <text x="640" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이미지 서명</text>

  <!-- JobService -->
  <rect x="720" y="190" width="140" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">JobService</text>
  <text x="790" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">복제 · GC</text>

  <!-- Connector lines Core → services -->
  <line x1="560" y1="130" x2="130" y2="190" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="560" y1="130" x2="300" y2="190" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="560" y1="130" x2="470" y2="190" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="560" y1="130" x2="640" y2="190" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="560" y1="130" x2="790" y2="190" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Storage section -->
  <text x="440" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">스토리지 백엔드</text>

  <rect x="200" y="308" width="140" height="50" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="270" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">로컬 파일시스템</text>
  <text x="270" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">/data/registry</text>

  <rect x="370" y="308" width="140" height="50" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">AWS S3</text>
  <text x="440" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">객체 스토리지</text>

  <rect x="540" y="308" width="140" height="50" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="610" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">GCS / Azure Blob</text>
  <text x="610" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클라우드 스토리지</text>

  <!-- Storage connector -->
  <line x1="760" y1="250" x2="760" y2="290" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="270" y1="290" x2="760" y2="290" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="270" y1="290" x2="270" y2="308" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="440" y1="290" x2="440" y2="308" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="610" y1="290" x2="610" y2="308" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Replication section -->
  <rect x="60" y="388" width="760" height="100" rx="8" fill="#101820" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">복제(Replication) 정책</text>

  <rect x="90" y="425" width="170" height="44" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Push-based</text>
  <text x="175" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Push 시 즉시 복제</text>

  <rect x="285" y="425" width="170" height="44" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Pull-based</text>
  <text x="370" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스케줄 기반 동기화</text>

  <rect x="480" y="425" width="170" height="44" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="565" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">필터 규칙</text>
  <text x="565" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">태그 · 라벨 · 리소스</text>

  <rect x="675" y="425" width="120" height="44" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="735" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">대상 레지스트리</text>
  <text x="735" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ECR · GCR · Hub</text>
</svg>
