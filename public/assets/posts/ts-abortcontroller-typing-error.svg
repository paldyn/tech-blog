<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">취소 에러는 catch에서 좁혀 구분한다</text>
  <text x="60" y="78" font-size="13" fill="#888">catch의 e는 unknown — e.name으로 AbortError를 가려낸다</text>

  <rect x="60" y="100" width="760" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="128" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text xml:space="preserve" x="76" y="150" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> fetch(url, { signal });</tspan></text>
  <text xml:space="preserve" x="76" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">} </tspan><tspan fill="#7ec8e3" font-weight="600">catch</tspan><tspan fill="#ffffff"> (e) {  </tspan><tspan fill="#9aa4b8">// e: unknown</tspan></text>
  <text xml:space="preserve" x="76" y="194" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (e </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> Error</tspan></text>
  <text xml:space="preserve" x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">      &amp;&amp; e.name === </tspan><tspan fill="#ce9178">"AbortError"</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text xml:space="preserve" x="76" y="238" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// 사용자가 취소함 — 조용히 무시</tspan></text>
  <text xml:space="preserve" x="76" y="260" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">  } </tspan><tspan fill="#7ec8e3" font-weight="600">else</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text xml:space="preserve" x="76" y="282" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// 진짜 네트워크 실패 — 처리</tspan></text>
  <text xml:space="preserve" x="76" y="304" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  }</text>
</svg>
