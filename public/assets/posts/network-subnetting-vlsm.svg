<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">VLSM — 가변 길이 서브넷 마스크</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">필요한 호스트 수에 맞게 서브넷 크기를 다르게 지정</text>

  <!-- parent block -->
  <rect x="280" y="88" width="320" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">10.0.0.0/24</text>
  <text x="440" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">254개 호스트 가능</text>

  <!-- split lines -->
  <line x1="250" y1="155" x2="250" y2="170" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="132" x2="440" y2="170" stroke="#555" stroke-width="1.5"/>
  <line x1="680" y1="155" x2="680" y2="170" stroke="#555" stroke-width="1.5"/>
  <line x1="250" y1="155" x2="680" y2="155" stroke="#555" stroke-width="1.5"/>

  <!-- subnet A: /25 (126 hosts) -->
  <rect x="60" y="170" width="220" height="70" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">서브넷 A: /25</text>
  <text x="170" y="210" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">10.0.0.0/25</text>
  <text x="170" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트 126개 (영업팀)</text>

  <!-- subnet B: /26 (62 hosts) -->
  <rect x="330" y="170" width="220" height="70" rx="6" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8c44a">서브넷 B: /26</text>
  <text x="440" y="210" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">10.0.0.128/26</text>
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트 62개 (개발팀)</text>

  <!-- subnet C: /27 (30 hosts) -->
  <rect x="600" y="170" width="220" height="70" rx="6" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">서브넷 C: /27</text>
  <text x="710" y="210" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">10.0.0.192/27</text>
  <text x="710" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트 30개 (관리팀)</text>

  <!-- comparison box -->
  <rect x="60" y="264" width="760" height="90" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Fixed-Length vs VLSM</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">고정 길이:</text>
  <text x="160" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">모든 서브넷 같은 크기 → 주소 낭비 발생</text>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">VLSM:</text>
  <text x="160" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">필요한 크기만큼 할당 → 주소 효율 극대화</text>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CIDR과 함께 사용 — 현대 IP 설계의 표준 방식</text>
</svg>
