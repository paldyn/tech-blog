<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">날짜를 인덱스로 — DatetimeIndex</text>

  <defs>
    <marker id="tsar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e8e8e8">문자열 컬럼</text>
  <rect x="60" y="108" width="320" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">date         value</text>
  <text xml:space="preserve" x="78" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"2026-01-01"  10</text>
  <text xml:space="preserve" x="78" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"2026-01-02"  12</text>
  <text xml:space="preserve" x="78" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 날짜 연산·슬라이싱 불가</text>

  <path d="M 388 166 C 440 166, 440 166, 496 166" fill="none" stroke="#7ec8e3" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#tsar)"/>
  <text x="442" y="146" font-size="12" fill="#9aa4b8" text-anchor="middle">to_datetime</text>
  <text x="442" y="196" font-size="12" fill="#9aa4b8" text-anchor="middle">set_index</text>

  <text x="500" y="92" font-size="16" font-weight="600" fill="#55c555">DatetimeIndex</text>
  <rect x="500" y="108" width="320" height="116" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text xml:space="preserve" x="518" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">2026-01-01    10</text>
  <text xml:space="preserve" x="518" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">2026-01-02    12</text>
  <text xml:space="preserve" x="518" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">df["2026-01"]  # 월 슬라이싱</text>
  <text xml:space="preserve" x="518" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">.resample("D")  # 리샘플</text>

  <rect x="60" y="252" width="760" height="34" rx="4" fill="#0f1320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="274" font-size="13" fill="#7ec8e3" text-anchor="middle">날짜를 인덱스로 올리면 날짜 기반 슬라이싱·리샘플링·이동평균이 열린다</text>
</svg>
