<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CROSS JOIN — 카테시안 곱</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">m행 × n행 = m×n행 결과</text>

  <!-- Table A -->
  <rect x="60" y="100" width="180" height="130" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="150" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">colors (3행)</text>
  <rect x="60" y="130" width="180" height="22" rx="4" fill="#0f1a2e"/>
  <text x="150" y="145" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">color</text>
  <line x1="60" y1="152" x2="240" y2="152" stroke="#1e2433" stroke-width="1"/>
  <text x="150" y="168" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Red</text>
  <line x1="60" y1="174" x2="240" y2="174" stroke="#1e2433" stroke-width="1"/>
  <text x="150" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Blue</text>
  <line x1="60" y1="196" x2="240" y2="196" stroke="#1e2433" stroke-width="1"/>
  <text x="150" y="212" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Green</text>

  <!-- Arrow -->
  <text x="266" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#7777cc">×</text>

  <!-- Table B -->
  <rect x="290" y="100" width="180" height="110" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="380" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">sizes (2행)</text>
  <rect x="290" y="130" width="180" height="22" rx="4" fill="#0f1a2e"/>
  <text x="380" y="145" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">size</text>
  <line x1="290" y1="152" x2="470" y2="152" stroke="#1e2433" stroke-width="1"/>
  <text x="380" y="168" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">S</text>
  <line x1="290" y1="174" x2="470" y2="174" stroke="#1e2433" stroke-width="1"/>
  <text x="380" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">M</text>

  <!-- Arrow to result -->
  <line x1="470" y1="165" x2="510" y2="165" stroke="#7777cc" stroke-width="2"/>
  <polygon points="510,158 524,165 510,172" fill="#7777cc"/>

  <!-- Result Table -->
  <rect x="524" y="90" width="296" height="280" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="672" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">결과 (3 × 2 = 6행)</text>
  <rect x="524" y="120" width="296" height="22" rx="4" fill="#0f1a2e"/>
  <text x="620" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">color</text>
  <text x="752" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">size</text>
  <line x1="524" y1="142" x2="820" y2="142" stroke="#1e2433" stroke-width="1"/>
  <text x="620" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Red</text>
  <text x="752" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">S</text>
  <line x1="524" y1="164" x2="820" y2="164" stroke="#1e2433" stroke-width="1"/>
  <text x="620" y="180" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Red</text>
  <text x="752" y="180" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">M</text>
  <line x1="524" y1="186" x2="820" y2="186" stroke="#1e2433" stroke-width="1"/>
  <text x="620" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Blue</text>
  <text x="752" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">S</text>
  <line x1="524" y1="208" x2="820" y2="208" stroke="#1e2433" stroke-width="1"/>
  <text x="620" y="224" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Blue</text>
  <text x="752" y="224" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">M</text>
  <line x1="524" y1="230" x2="820" y2="230" stroke="#1e2433" stroke-width="1"/>
  <text x="620" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Green</text>
  <text x="752" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">S</text>
  <line x1="524" y1="252" x2="820" y2="252" stroke="#1e2433" stroke-width="1"/>
  <text x="620" y="268" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Green</text>
  <text x="752" y="268" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">M</text>
  <text x="672" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">가능한 모든 조합 생성</text>

  <!-- Code example -->
  <rect x="60" y="260" width="410" height="160" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- CROSS JOIN 문법</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    c.color, s.size</text>
  <text x="80" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM colors c</text>
  <text x="80" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">CROSS JOIN sizes s;</text>
  <text x="80" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- ON 절 없음 — 모든 조합 반환</text>

  <!-- Warning box -->
  <rect x="60" y="436" width="760" height="36" rx="6" fill="#1e1a10" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="459" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c87a">⚠ 양 테이블이 크면 폭발적 행 증가 — 항상 결과 행 수를 계산하고 사용할 것</text>

  <!-- Footer -->
  <text x="440" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
