<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">docstring 안의 예시가 곧 테스트</text>

  <defs>
    <marker id="arr10" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect x="60" y="86" width="760" height="186" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="118" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">add(a, b):</text>
  <text xml:space="preserve" x="100" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"""두 수를 더한다.</text>
  <text xml:space="preserve" x="100" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">&gt;&gt;&gt; add(2, 3)</text>
  <text xml:space="preserve" x="100" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">5</text>
  <text xml:space="preserve" x="100" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"""</text>
  <text xml:space="preserve" x="100" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text xml:space="preserve" x="162" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">a + b</text>

  <text xml:space="preserve" x="430" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 실행할 코드</text>
  <text xml:space="preserve" x="430" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 기대 출력</text>

  <text x="60" y="306" font-size="13" fill="#888" xml:space="preserve">python -m doctest mod.py 를 실행하면 >>> 줄을 실제로 돌려 출력이 일치하는지 검사한다.</text>
</svg>
