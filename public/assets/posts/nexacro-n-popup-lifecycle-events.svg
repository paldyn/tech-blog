<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">팝업 Form 생명주기 이벤트</text>

  <!-- Timeline vertical line -->
  <line x1="440" y1="70" x2="440" y2="460" stroke="#374151" stroke-width="2"/>

  <!-- Event 1: onCreate -->
  <circle cx="440" cy="100" r="10" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="480" y="86" width="340" height="52" rx="6" fill="#111827" stroke="#1e40af" stroke-width="1.5"/>
  <text x="500" y="107" fill="#7ec8e3" font-size="14" font-weight="600">onCreate</text>
  <text x="500" y="127" fill="#888" font-size="12">Form 객체 생성 직후. 컴포넌트 미초기화 상태.</text>
  <!-- Left side timing -->
  <text x="420" y="105" fill="#888" font-size="12" text-anchor="end">1</text>

  <!-- Event 2: onInit -->
  <circle cx="440" cy="180" r="10" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="60" y="166" width="340" height="52" rx="6" fill="#111827" stroke="#166534" stroke-width="1.5"/>
  <text x="80" y="187" fill="#55c555" font-size="14" font-weight="600">onInit</text>
  <text x="80" y="207" fill="#e8e8e8" font-size="12">컴포넌트 초기화 완료. getArgs() 호출 가능.</text>
  <text x="420" y="185" fill="#888" font-size="12" text-anchor="end">2</text>
  <!-- Arrow to left -->
  <line x1="400" y1="192" x2="430" y2="192" stroke="#374151" stroke-width="1"/>

  <!-- Event 3: onOpen -->
  <circle cx="440" cy="260" r="10" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="480" y="246" width="340" height="52" rx="6" fill="#111827" stroke="#166534" stroke-width="1.5"/>
  <text x="500" y="267" fill="#55c555" font-size="14" font-weight="600">onOpen</text>
  <text x="500" y="287" fill="#e8e8e8" font-size="12">화면 렌더 완료·표시 직후. 포커스 설정 적합.</text>
  <text x="420" y="265" fill="#888" font-size="12" text-anchor="end">3</text>

  <!-- Event 4: onClose (user action) -->
  <circle cx="440" cy="340" r="10" fill="#e05555" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="60" y="326" width="340" height="52" rx="6" fill="#111827" stroke="#991b1b" stroke-width="1.5"/>
  <text x="80" y="347" fill="#e05555" font-size="14" font-weight="600">onClose</text>
  <text x="80" y="367" fill="#e8e8e8" font-size="12">closePopup 호출 시. return false로 취소 가능.</text>
  <text x="420" y="345" fill="#888" font-size="12" text-anchor="end">4</text>
  <line x1="400" y1="352" x2="430" y2="352" stroke="#374151" stroke-width="1"/>

  <!-- Event 5: onDestroy -->
  <circle cx="440" cy="420" r="10" fill="#7777cc" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="480" y="406" width="340" height="52" rx="6" fill="#111827" stroke="#4c1d95" stroke-width="1.5"/>
  <text x="500" y="427" fill="#7777cc" font-size="14" font-weight="600">onDestroy</text>
  <text x="500" y="447" fill="#888" font-size="12">Form 메모리 해제 직전. 리소스 정리.</text>
  <text x="420" y="425" fill="#888" font-size="12" text-anchor="end">5</text>

  <!-- Down arrows between circles -->
  <polygon points="440,116 436,110 444,110" fill="#374151"/>
  <polygon points="440,196 436,190 444,190" fill="#374151"/>
  <polygon points="440,276 436,270 444,270" fill="#374151"/>
  <polygon points="440,356 436,350 444,350" fill="#374151"/>
</svg>
