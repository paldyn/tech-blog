<svg xmlns="http://www.w3.org/2000/svg" width="880" height="404" viewBox="0 0 880 404">
  <rect width="880" height="404" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">생명주기 메서드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">준비와 정리로 테스트 격리</text>

  <rect x="60" y="90" width="760" height="294" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="78" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">class</tspan> OrderServiceTest {</text>
  <text x="78" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#7ec8e3" font-weight="600">static</tspan> Database db;</text>
  <text x="78" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#b5cea8">@BeforeAll</tspan> <tspan fill="#7ec8e3" font-weight="600">static void</tspan> initDb() {</text>
  <text x="78" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        db = Database.connect();   <tspan fill="#9aa4b8">// 한 번</tspan></text>
  <text x="78" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    }</text>
  <text x="78" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#b5cea8">@BeforeEach</tspan> <tspan fill="#7ec8e3" font-weight="600">void</tspan> clean() {</text>
  <text x="78" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        db.truncate();   <tspan fill="#9aa4b8">// 매 테스트 전</tspan></text>
  <text x="78" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    }</text>
  <text x="78" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#b5cea8">@Test</tspan> <tspan fill="#7ec8e3" font-weight="600">void</tspan> placesOrder() { ... }</text>
  <text x="78" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#b5cea8">@AfterAll</tspan> <tspan fill="#7ec8e3" font-weight="600">static void</tspan> close() {</text>
  <text x="78" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        db.disconnect();   <tspan fill="#9aa4b8">// 마지막 한 번</tspan></text>
  <text x="78" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    }</text>
  <text x="78" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
</svg>
