<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrok" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">stash drop vs clear</text>

  <!-- Before state -->
  <text x="160" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">Before</text>

  <rect x="60" y="96" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">stash@{0}: feature WIP</text>

  <rect x="60" y="138" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">stash@{1}: hotfix 시도</text>

  <rect x="60" y="180" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">stash@{2}: 실험</text>

  <!-- drop arrow -->
  <line x1="260" y1="156" x2="330" y2="156" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="295" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">drop {1}</text>

  <!-- After drop -->
  <text x="520" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">After drop stash@{1}</text>

  <rect x="340" y="96" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">stash@{0}: feature WIP</text>

  <rect x="340" y="138" width="200" height="36" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-decoration="line-through">stash@{1}: hotfix 시도</text>

  <rect x="340" y="180" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">stash@{1}: 실험 (↑재번호)</text>

  <!-- clear arrow -->
  <line x1="540" y1="156" x2="610" y2="156" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="575" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">clear</text>

  <!-- After clear -->
  <text x="730" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">After clear</text>

  <rect x="620" y="96" width="200" height="130" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="720" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">비어 있음</text>
  <text x="720" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">복구 불가</text>

  <!-- Code block -->
  <rect x="60" y="244" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 항목 삭제</text>
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#e05555" font-weight="600">drop</tspan>            <tspan fill="#9aa4b8"># 최근(stash@{0}) 삭제</tspan></text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#e05555" font-weight="600">drop</tspan> stash@{1}  <tspan fill="#9aa4b8"># 특정 항목 삭제</tspan></text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 전체 삭제 (복구 불가)</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#e05555" font-weight="600">clear</tspan>           <tspan fill="#9aa4b8"># 모든 stash 삭제</tspan></text>
</svg>
