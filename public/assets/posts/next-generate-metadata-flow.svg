<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">generateMetadata 실행 시점과 캐싱</text>

  <!-- Request flow -->
  <rect x="60" y="80" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">브라우저 요청</text>
  <text x="125" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">/posts/my-slug</text>

  <line x1="190" y1="105" x2="248" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="250" y="80" width="180" height="50" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="340" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Next.js 서버</text>
  <text x="340" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Request Dedup 캐시</text>

  <!-- Fork: two parallel calls -->
  <line x1="340" y1="130" x2="340" y2="158" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="340" y1="158" x2="200" y2="158" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="340" y1="158" x2="500" y2="158" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="200" y1="158" x2="200" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="158" x2="500" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="100" y="180" width="200" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">generateMetadata()</text>
  <text x="200" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">fetch('/api/post/my-slug')</text>

  <rect x="400" y="180" width="200" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="500" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Page Component</text>
  <text x="500" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">fetch('/api/post/my-slug')</text>

  <!-- Dedup merge -->
  <line x1="200" y1="230" x2="200" y2="258" stroke="#55c555" stroke-width="2"/>
  <line x1="500" y1="230" x2="500" y2="258" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="200" y1="258" x2="500" y2="258" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="350" y1="258" x2="350" y2="278" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="220" y="280" width="260" height="50" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="350" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">실제 fetch 1회 실행</text>
  <text x="350" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">React fetch dedup — 동일 요청 자동 중복 제거</text>

  <!-- Right side: parent metadata -->
  <rect x="640" y="80" width="200" height="160" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="740" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">parent 파라미터</text>
  <text x="740" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ResolvingMetadata</text>
  <text x="740" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">상위 레이아웃의</text>
  <text x="740" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">메타데이터를 await로</text>
  <text x="740" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">병합할 수 있음</text>
  <text x="740" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">await parent</text>
  <text x="740" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">  .openGraph?.images</text>
  <text x="740" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">필요할 때만 await — 항상 await 불필요</text>

  <!-- Static generation note -->
  <rect x="60" y="360" width="760" height="78" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">정적 생성(SSG)에서의 generateMetadata</text>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">generateStaticParams()와 함께 사용 → 빌드 타임에 모든 슬러그에 대한 메타데이터 생성</text>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">동적 페이지에서는 요청 시 실행 → 캐싱은 Route Segment Config로 제어 (force-static 등)</text>

  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">generateMetadata는 서버 전용 — 클라이언트 컴포넌트에서 사용 불가, page.tsx / layout.tsx 에서만 export 가능</text>
</svg>
