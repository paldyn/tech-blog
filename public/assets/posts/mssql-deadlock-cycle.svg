<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrd1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arrd2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">데드락 사이클 — 전형적인 발생 패턴</text>

  <!-- T1 box -->
  <rect x="80" y="160" width="180" height="100" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="170" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">트랜잭션 T1</text>
  <text x="170" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">① Lock A 보유</text>
  <text x="170" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">③ Lock B 대기 중</text>

  <!-- T2 box -->
  <rect x="620" y="160" width="180" height="100" rx="10" fill="#1a1a2e" stroke="#e05555" stroke-width="2"/>
  <text x="710" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">트랜잭션 T2</text>
  <text x="710" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">② Lock B 보유</text>
  <text x="710" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">④ Lock A 대기 중</text>

  <!-- Resource A -->
  <rect x="200" y="80" width="180" height="52" rx="8" fill="#111122" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="290" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">리소스 A</text>
  <text x="290" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">orders 테이블 행 id=1</text>

  <!-- Resource B -->
  <rect x="500" y="80" width="180" height="52" rx="8" fill="#111122" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="590" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">리소스 B</text>
  <text x="590" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">accounts 테이블 행 id=5</text>

  <!-- T1 holds A -->
  <line x1="230" y1="132" x2="180" y2="160" stroke="#7777cc" stroke-width="2.5"
        marker-end="url(#arrd1)"/>
  <text x="192" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">보유</text>

  <!-- T2 holds B -->
  <line x1="620" y1="132" x2="710" y2="160" stroke="#e05555" stroke-width="2.5"
        marker-end="url(#arrd2)"/>
  <text x="662" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">보유</text>

  <!-- T1 waits B (dashed) -->
  <path d="M 260 210 Q 440 150 560 130" stroke="#7777cc" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arrd1)"/>
  <text x="400" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">대기</text>

  <!-- T2 waits A (dashed) -->
  <path d="M 620 220 Q 440 280 320 132" stroke="#e05555" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arrd2)"/>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">대기</text>

  <!-- Deadlock detector -->
  <rect x="330" y="310" width="220" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">교착상태 감지!</text>
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Lock Monitor (5초 주기)</text>

  <!-- Victim -->
  <rect x="60" y="395" width="200" height="44" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">희생자(Victim) 선택</text>
  <text x="160" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">롤백 비용 낮은 트랜잭션</text>

  <!-- Winner -->
  <rect x="620" y="395" width="200" height="44" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">나머지 진행 계속</text>
  <text x="720" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">오류 1205 수신</text>
</svg>
