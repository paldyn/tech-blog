<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">강화학습 환경 기본 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Gymnasium 으로 보는 RL 루프 — reset · sample · step</text>

  <!-- LEFT: Gymnasium loop -->
  <rect x="60" y="100" width="400" height="300" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Gymnasium RL 루프</text>
  <rect x="76" y="146" width="368" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> gymnasium </tspan><tspan fill="#7ec8e3" font-weight="600">as</tspan><tspan fill="#ffffff"> gym</tspan></text>
  <text x="92" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">env = gym.make(</tspan><tspan fill="#ce9178">"CartPole-v1"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="92" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">state, _ = env.reset()</tspan></text>
  <text x="92" y="275" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">while not</tspan><tspan fill="#ffffff"> done:</tspan></text>
  <text x="92" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  action = \</tspan></text>
  <text x="92" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    env.action_space.sample()</tspan></text>
  <text x="92" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  state, r, done, trunc, info \</tspan></text>
  <text x="92" y="359" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    = env.step(action)</tspan></text>

  <!-- RIGHT: step() return tuple -->
  <rect x="480" y="100" width="340" height="300" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">env.step() 반환 5-tuple</text>
  <text x="500" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">행동 실행 → 5개 값 반환</text>

  <text x="500" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">next_state</text>
  <text x="640" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">행동 후 새 상태</text>
  <text x="500" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">reward</text>
  <text x="640" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">즉각 보상</text>
  <text x="500" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">done</text>
  <text x="640" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">목표 달성 · 실패</text>
  <text x="500" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">truncated</text>
  <text x="640" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">최대 스텝 초과</text>
  <text x="500" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">info</text>
  <text x="640" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">부가 디버그 정보</text>

  <!-- Bottom note -->
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">reset 으로 시작, step(action) 으로 진행 — done · truncated 면 에피소드 종료</text>
</svg>
