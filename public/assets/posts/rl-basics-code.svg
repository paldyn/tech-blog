<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <!-- 배경 -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">강화학습 환경 기본 구조 (Gymnasium)</text>

  <!-- 코드 박스 -->
  <rect x="60" y="62" width="760" height="310" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="80" y="88" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># OpenAI Gymnasium 기반 RL 루프</text>

  <text x="80" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> gymnasium </tspan>
    <tspan fill="#7ec8e3" font-weight="600">as</tspan>
    <tspan fill="#ffffff"> gym</tspan>
  </text>

  <text x="80" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> numpy </tspan>
    <tspan fill="#7ec8e3" font-weight="600">as</tspan>
    <tspan fill="#ffffff"> np</tspan>
  </text>

  <text x="80" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">env = gym.make(</tspan>
    <tspan fill="#ce9178">"CartPole-v1"</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>

  <text x="80" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">for</tspan>
    <tspan fill="#ffffff"> episode </tspan>
    <tspan fill="#7ec8e3" font-weight="600">in</tspan>
    <tspan fill="#ffffff"> range(</tspan>
    <tspan fill="#b5cea8">100</tspan>
    <tspan fill="#ffffff">):   </tspan>
    <tspan fill="#9aa4b8"># 에피소드 반복</tspan>
  </text>

  <text x="80" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    state, _ = env.reset()   </tspan>
    <tspan fill="#9aa4b8"># 환경 초기화</tspan>
  </text>

  <text x="80" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    total_reward = </tspan>
    <tspan fill="#b5cea8">0</tspan>
  </text>

  <text x="80" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    while</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> True</tspan>
    <tspan fill="#ffffff">:</tspan>
  </text>

  <text x="80" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        action = env.action_space.sample()  </tspan>
    <tspan fill="#9aa4b8"># 랜덤 정책</tspan>
  </text>

  <text x="80" y="276" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        next_s, reward, done, trunc, _ = env.step(action)</tspan>
  </text>

  <text x="80" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        total_reward += reward</tspan>
  </text>

  <text x="80" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        if</tspan>
    <tspan fill="#ffffff"> done </tspan>
    <tspan fill="#7ec8e3" font-weight="600">or</tspan>
    <tspan fill="#ffffff"> trunc: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">break</tspan>
  </text>

  <text x="80" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    print(</tspan>
    <tspan fill="#ce9178">f"에피소드 {episode}: 보상={total_reward}"</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>

  <text x="80" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># next_s → 에이전트 학습에 사용 (다음 글에서)</tspan>
</svg>
