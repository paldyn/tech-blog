<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GiST 인덱스 구조 — R-Tree 기반 공간 분할</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">각 Internal Node가 자식의 Bounding Box를 보수적으로 포함</text>

  <!-- Root -->
  <rect x="340" y="96" width="200" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Root</text>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">MBR: [0,100] × [0,100]</text>

  <!-- Lines root → internal -->
  <line x1="390" y1="140" x2="210" y2="188" stroke="#555" stroke-width="1.5"/>
  <line x1="490" y1="140" x2="670" y2="188" stroke="#555" stroke-width="1.5"/>

  <!-- Internal L -->
  <rect x="100" y="188" width="220" height="44" rx="6" fill="#111" stroke="#7ec8e3" stroke-opacity="0.7"/>
  <text x="210" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Internal A</text>
  <text x="210" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MBR: [0,50] × [0,60]</text>

  <!-- Internal R -->
  <rect x="560" y="188" width="220" height="44" rx="6" fill="#111" stroke="#7ec8e3" stroke-opacity="0.7"/>
  <text x="670" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Internal B</text>
  <text x="670" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MBR: [40,100] × [30,100]</text>

  <!-- Lines internal → leaves -->
  <line x1="160" y1="232" x2="120" y2="286" stroke="#555" stroke-width="1"/>
  <line x1="210" y1="232" x2="210" y2="286" stroke="#555" stroke-width="1"/>
  <line x1="260" y1="232" x2="300" y2="286" stroke="#555" stroke-width="1"/>
  <line x1="620" y1="232" x2="580" y2="286" stroke="#555" stroke-width="1"/>
  <line x1="670" y1="232" x2="670" y2="286" stroke="#555" stroke-width="1"/>
  <line x1="720" y1="232" x2="760" y2="286" stroke="#555" stroke-width="1"/>

  <!-- Leaf nodes -->
  <rect x="70" y="286" width="110" height="48" rx="6" fill="#0d1117" stroke="#55c555"/>
  <text x="125" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Leaf 1</text>
  <text x="125" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" text-anchor="middle">(10,20)→TID</text>

  <rect x="155" y="286" width="110" height="48" rx="6" fill="#0d1117" stroke="#55c555"/>
  <text x="210" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Leaf 2</text>
  <text x="210" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" text-anchor="middle">(30,50)→TID</text>

  <rect x="240" y="286" width="110" height="48" rx="6" fill="#0d1117" stroke="#55c555"/>
  <text x="295" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Leaf 3</text>
  <text x="295" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" text-anchor="middle">(5,55)→TID</text>

  <rect x="530" y="286" width="110" height="48" rx="6" fill="#0d1117" stroke="#55c555"/>
  <text x="585" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Leaf 4</text>
  <text x="585" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" text-anchor="middle">(60,40)→TID</text>

  <rect x="615" y="286" width="110" height="48" rx="6" fill="#0d1117" stroke="#55c555"/>
  <text x="670" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Leaf 5</text>
  <text x="670" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" text-anchor="middle">(80,70)→TID</text>

  <rect x="700" y="286" width="110" height="48" rx="6" fill="#0d1117" stroke="#55c555"/>
  <text x="755" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Leaf 6</text>
  <text x="755" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" text-anchor="middle">(45,90)→TID</text>

  <!-- Key properties -->
  <rect x="60" y="354" width="760" height="104" rx="8" fill="#111" stroke="#3a4a6e"/>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">GiST 핵심 특성</text>
  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• Internal Node의 키는 자식 키의 합집합(Union)을 보수적으로 포함 — 거짓 양성 가능</text>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• &lt;&lt;&amp;&gt;&gt; (Consistent), union(), penalty(), picksplit() 콜백으로 오퍼레이터 클래스 구현</text>
  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• PostGIS(기하), pg_trgm(유사도), 범위 타입, inet이 GiST 기반</text>
  <text x="80" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 거짓 양성 → 힙 재확인(Recheck) 필요 → 정확도 보장되나 약간의 오버헤드</text>
</svg>
