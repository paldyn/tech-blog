<svg width="880" height="450" viewBox="0 0 880 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrB2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">반복 제곱법: 3¹³ mod 7 을 4번의 제곱으로</text>

  <rect x="60" y="84" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">지수 13 = </tspan><tspan fill="#7ec8e3" font-weight="600">1101₂</tspan><tspan fill="#ffffff"> = 8 + 4 + 1  →  3¹³ = 3⁸ · 3⁴ · 3¹</tspan></text>

  <!-- squaring chain -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <rect x="60" y="190" width="150" height="70" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="84" y="218" xml:space="preserve" fill="#ffffff">3¹ mod 7</text>
    <text x="84" y="242" xml:space="preserve"><tspan fill="#ffffff">= </tspan><tspan fill="#55c555" font-weight="600">3</tspan></text>

    <rect x="250" y="190" width="150" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="274" y="218" xml:space="preserve" fill="#9aa4b8">3² mod 7</text>
    <text x="274" y="242" xml:space="preserve" fill="#9aa4b8">= 2</text>

    <rect x="440" y="190" width="150" height="70" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="464" y="218" xml:space="preserve" fill="#ffffff">3⁴ mod 7</text>
    <text x="464" y="242" xml:space="preserve"><tspan fill="#ffffff">= </tspan><tspan fill="#55c555" font-weight="600">4</tspan></text>

    <rect x="630" y="190" width="150" height="70" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="654" y="218" xml:space="preserve" fill="#ffffff">3⁸ mod 7</text>
    <text x="654" y="242" xml:space="preserve"><tspan fill="#ffffff">= </tspan><tspan fill="#55c555" font-weight="600">2</tspan></text>
  </g>

  <!-- arrows -->
  <line x1="212" y1="225" x2="248" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB2)"/>
  <line x1="402" y1="225" x2="438" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB2)"/>
  <line x1="592" y1="225" x2="628" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB2)"/>
  <text x="230" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제곱</text>
  <text x="420" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제곱</text>
  <text x="610" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제곱</text>

  <!-- bit labels -->
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">
    <text x="135" y="292" fill="#55c555" font-weight="600">bit0 = 1 → 곱함</text>
    <text x="325" y="292" fill="#888">bit1 = 0 → 건너뜀</text>
    <text x="515" y="292" fill="#55c555" font-weight="600">bit2 = 1 → 곱함</text>
    <text x="705" y="292" fill="#55c555" font-weight="600">bit3 = 1 → 곱함</text>
  </g>

  <!-- result -->
  <rect x="60" y="328" width="760" height="44" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">선택된 항만 곱한다: 3 · 4 · 2 = 24 ≡ </tspan><tspan fill="#55c555" font-weight="600">3</tspan><tspan fill="#ffffff"> (mod 7)</tspan></text>

  <text x="60" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">곱셈 13번 대신 제곱 3번 + 곱 2번 — 지수의 비트 수만큼만 연산하므로 O(log n)</text>
</svg>
