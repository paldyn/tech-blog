<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">addEventListener 옵션 한눈에 보기</text>

  <!-- Options table header -->
  <rect x="60" y="64" width="760" height="36" rx="6" fill="#131a2e"/>
  <text x="120" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">옵션</text>
  <text x="260" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">타입</text>
  <text x="370" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">기본값</text>
  <text x="480" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">역할</text>

  <!-- capture row -->
  <rect x="60" y="100" width="760" height="44" rx="4" fill="#111"/>
  <text x="120" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">capture</text>
  <text x="260" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">boolean</text>
  <text x="370" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">false</text>
  <text x="480" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">캡처 단계에서 리스너 실행</text>

  <!-- once row -->
  <rect x="60" y="144" width="760" height="44" rx="4" fill="#0f0f0f"/>
  <text x="120" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">once</text>
  <text x="260" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">boolean</text>
  <text x="370" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">false</text>
  <text x="480" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">한 번만 실행 후 자동 제거</text>

  <!-- passive row -->
  <rect x="60" y="188" width="760" height="44" rx="4" fill="#111"/>
  <text x="120" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">passive</text>
  <text x="260" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">boolean</text>
  <text x="370" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">false*</text>
  <text x="480" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">preventDefault() 비활성 → 스크롤 최적화</text>

  <!-- signal row -->
  <rect x="60" y="232" width="760" height="44" rx="4" fill="#0f0f0f"/>
  <text x="120" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">signal</text>
  <text x="260" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">AbortSignal</text>
  <text x="370" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">undefined</text>
  <text x="480" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">abort() 호출 시 자동 제거</text>

  <!-- note -->
  <text x="60" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">* touchstart/touchmove/wheel은 브라우저에 따라 기본값이 true일 수 있음</text>

  <!-- capture vs bubble diagram -->
  <text x="60" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">capture: false (기본)</text>
  <text x="460" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">capture: true</text>

  <!-- Bubble flow -->
  <rect x="60" y="354" width="120" height="36" rx="5" fill="#131a2e" stroke="#555"/>
  <text x="120" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">document</text>
  <line x1="180" y1="372" x2="210" y2="372" stroke="#555" stroke-width="1.5"/>

  <rect x="210" y="354" width="120" height="36" rx="5" fill="#131a2e" stroke="#555"/>
  <text x="270" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">div</text>
  <line x1="330" y1="372" x2="360" y2="372" stroke="#555" stroke-width="1.5"/>

  <rect x="360" y="354" width="120" height="36" rx="5" fill="#1a2a1a" stroke="#55c555"/>
  <text x="420" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">button ★</text>

  <!-- Bubble direction arrow (right to left) -->
  <line x1="60" y1="410" x2="420" y2="410" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="60,410 74,404 74,416" fill="#7ec8e3"/>
  <text x="240" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">버블링 (★ → document)</text>

  <!-- Capture flow -->
  <rect x="460" y="354" width="120" height="36" rx="5" fill="#131a2e" stroke="#7ec8e3"/>
  <text x="520" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">document ★</text>
  <line x1="580" y1="372" x2="610" y2="372" stroke="#555" stroke-width="1.5"/>

  <rect x="610" y="354" width="100" height="36" rx="5" fill="#131a2e" stroke="#555"/>
  <text x="660" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">div</text>
  <line x1="710" y1="372" x2="740" y2="372" stroke="#555" stroke-width="1.5"/>

  <rect x="740" y="354" width="100" height="36" rx="5" fill="#131a2e" stroke="#555"/>
  <text x="790" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">button</text>

  <!-- Capture direction arrow (left to right) -->
  <line x1="460" y1="410" x2="820" y2="410" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="820,410 806,404 806,416" fill="#7ec8e3"/>
  <text x="640" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">캡처링 (document ★ → button)</text>

  <!-- passive note -->
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">passive: true → 메인 스레드 블로킹 없이 스크롤 렌더링 선행</text>
</svg>
