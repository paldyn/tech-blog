<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컴포지션으로 Prop Drilling 회피</text>

  <rect x="60" y="72" width="370" height="272" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="245" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">drilling 방식</text>
  <rect x="76" y="108" width="338" height="224" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="92" dy="0"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> App() {</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> user = useUser();</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &lt;Layout user={user} /&gt;;</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="92" dy="18"> </tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Layout({ user }) {</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#9aa4b8">  // user 사용 안 함, 그냥 전달</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &lt;Sidebar user={user} /&gt;;</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="92" dy="18"> </tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Sidebar({ user }) {</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#9aa4b8">  // user 사용 안 함, 그냥 전달</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &lt;UserProfile user={user} /&gt;;</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
  </text>

  <rect x="450" y="72" width="370" height="272" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="635" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">컴포지션으로 회피</text>
  <rect x="466" y="108" width="338" height="224" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="482" dy="0"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> App() {</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> user = useUser();</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#9aa4b8">  // App이 직접 UserProfile을 만들어</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#9aa4b8">  // Layout에 children/slot으로 전달</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">    &lt;Layout</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">      sidebar={&lt;UserProfile user={user} /&gt;}</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">    /&gt;</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">  );</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="482" dy="18"> </tspan>
    <tspan x="482" dy="18"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Layout({ sidebar }) {</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#9aa4b8">  // user를 전혀 모름!</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &lt;div&gt;{sidebar}&lt;/div&gt;;</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
  </text>
</svg>