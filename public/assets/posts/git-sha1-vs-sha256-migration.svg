<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SHA-256 저장소 생성 및 명령</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Git 2.29 이상에서 사용 가능 (실험적)</text>

  <!-- Init with sha256 -->
  <rect x="60" y="92" width="760" height="100" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">SHA-256 저장소 초기화</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git init</tspan><tspan fill="#ffffff"> --object-format=sha256 my-repo</tspan></text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 확인</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git rev-parse</tspan><tspan fill="#ffffff"> --show-object-format</tspan><tspan fill="#888">  # → sha256</tspan></text>

  <!-- SHA difference -->
  <rect x="60" y="208" width="360" height="90" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">SHA-1 저장소</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  $ git rev-parse HEAD</text>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  8ab686e8a729f4b0ccd0</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  4e3176f26c78fbf00dcc (40자)</text>

  <line x1="420" y1="253" x2="458" y2="253" stroke="#55c555" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="460" y="208" width="360" height="90" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">SHA-256 저장소</text>
  <text x="476" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  $ git rev-parse HEAD</text>
  <text x="476" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  aec070645fe53ee3b376305</text>
  <text x="476" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  9376134f058cc337... (64자)</text>

  <!-- Compatibility warning -->
  <rect x="60" y="316" width="760" height="90" fill="#1a1400" rx="8" stroke="#e0a020" stroke-width="1.5"/>
  <text x="440" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0a020" text-anchor="middle">SHA-256 저장소 사용 시 주의사항</text>
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">GitHub, GitLab 등 호스팅 서비스: SHA-256 저장소 푸시 아직 미지원 (2026 기준)</text>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">일부 서드파티 도구·훅·CI에서 64자 SHA 파싱 오류 가능</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">SHA-1 ↔ SHA-256 저장소 간 직접 push/fetch 불가 — 상호 변환 지원 예정</text>
</svg>
