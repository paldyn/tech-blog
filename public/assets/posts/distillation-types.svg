<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">증류 유형과 실전 사례</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Response · Feature · Relation 증류의 비교</text>

  <!-- Response Distillation -->
  <rect x="60" y="96" width="234" height="180" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="177" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Response 증류</text>
  <text x="177" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">출력 Logit 매칭</text>
  <line x1="80" y1="152" x2="354" y2="152" stroke="#222" stroke-width="1"/>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• Soft Label로 KL Divergence</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 온도 파라미터 T로 분포 조정</text>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 구현 단순 · 범용</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">사례: DistilBERT, TinyLLaMA</text>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GPT-3 → GPT-2 스타일 경량화</text>

  <!-- Feature Distillation -->
  <rect x="323" y="96" width="234" height="180" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Feature 증류</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중간 표현 매칭</text>
  <line x1="343" y1="152" x2="537" y2="152" stroke="#222" stroke-width="1"/>
  <text x="343" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• Teacher 중간 레이어 출력 매칭</text>
  <text x="343" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• MSE로 표현 공간 정렬</text>
  <text x="343" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 레이어 매핑 설계 필요</text>
  <text x="343" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">사례: PKD, TinyBERT</text>
  <text x="343" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Attention 행렬 직접 이전</text>

  <!-- Relation Distillation -->
  <rect x="586" y="96" width="234" height="180" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="703" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Relation 증류</text>
  <text x="703" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">샘플 간 관계 매칭</text>
  <line x1="606" y1="152" x2="800" y2="152" stroke="#222" stroke-width="1"/>
  <text x="606" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 배치 내 샘플 간 거리 구조 학습</text>
  <text x="606" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 표현 공간의 기하 구조 이전</text>
  <text x="606" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 절대값보다 관계 보존</text>
  <text x="606" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">사례: RKD, CRD</text>
  <text x="606" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">임베딩 모델 압축에 효과적</text>

  <!-- LLM 특화 증류 -->
  <rect x="60" y="300" width="760" height="118" rx="6" fill="#111" stroke="#222"/>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">LLM 특화 증류 방법</text>
  <line x1="80" y1="334" x2="800" y2="334" stroke="#222" stroke-width="1"/>

  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">SFT 증류</text>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Teacher(예: GPT-4)가 생성한 텍스트로 Student를 SFT. 가장 단순하고 효과적. Alpaca, Vicuna 방식.</text>

  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">SeqKD (Sequence-Level KD)</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Teacher의 beam search 출력으로 Student 훈련. 긴 생성에서 누적 오차 방지.</text>

  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Token-Level KD</text>
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 토큰 위치에서 Teacher soft logit과 Student logit의 KL loss. 정보가 풍부하지만 메모리 사용 큼.</text>
</svg>
