<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">EntityManager &amp; 영속성 컨텍스트 구조</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13">Spring Container 안에서 EntityManagerFactory → EntityManager → 영속성 컨텍스트 관계</text>

  <!-- Spring Container border -->
  <rect x="60" y="90" width="760" height="430" rx="10" fill="none" stroke="#2a2a3a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="80" y="112" fill="#7777cc" font-size="13" font-weight="600">Spring Container</text>

  <!-- EntityManagerFactory box -->
  <rect x="270" y="125" width="340" height="70" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="153" text-anchor="middle" fill="#7ec8e3" font-size="16" font-weight="600">EntityManagerFactory</text>
  <text x="440" y="175" text-anchor="middle" fill="#888" font-size="12">애플리케이션 당 1개 · DataSource 1개와 대응</text>

  <!-- Arrow: EMF → EM (left) -->
  <line x1="350" y1="195" x2="220" y2="250" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="216,248 224,244 222,256" fill="#555"/>
  <text x="250" y="232" fill="#888" font-size="12" text-anchor="middle">createEntityManager()</text>

  <!-- Arrow: EMF → EM (right) -->
  <line x1="530" y1="195" x2="660" y2="250" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="656,248 664,244 662,256" fill="#555"/>

  <!-- EntityManager 1 (left) -->
  <rect x="80" y="250" width="240" height="160" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="274" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">EntityManager #1</text>
  <text x="200" y="293" text-anchor="middle" fill="#888" font-size="11">Request / Transaction A</text>

  <!-- Persistence Context 1 -->
  <rect x="96" y="302" width="208" height="94" rx="6" fill="#0a1520" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="320" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600">영속성 컨텍스트</text>
  <rect x="110" y="328" width="78" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="149" y="345" text-anchor="middle" fill="#55c555" font-size="11">Member[1]</text>
  <rect x="198" y="328" width="78" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="237" y="345" text-anchor="middle" fill="#55c555" font-size="11">Order[5]</text>
  <text x="200" y="386" text-anchor="middle" fill="#888" font-size="11">1차 캐시 · 변경 감지</text>

  <!-- EntityManager 2 (right) -->
  <rect x="560" y="250" width="240" height="160" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="274" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">EntityManager #2</text>
  <text x="680" y="293" text-anchor="middle" fill="#888" font-size="11">Request / Transaction B</text>

  <!-- Persistence Context 2 -->
  <rect x="576" y="302" width="208" height="94" rx="6" fill="#0a1520" stroke="#7777cc" stroke-width="1"/>
  <text x="680" y="320" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600">영속성 컨텍스트</text>
  <rect x="590" y="328" width="78" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="629" y="345" text-anchor="middle" fill="#55c555" font-size="11">Product[3]</text>
  <text x="680" y="386" text-anchor="middle" fill="#888" font-size="11">독립된 컨텍스트</text>

  <!-- Isolation label -->
  <text x="440" y="320" text-anchor="middle" fill="#e05555" font-size="12" font-weight="600">완전 격리</text>
  <text x="440" y="337" text-anchor="middle" fill="#888" font-size="11">서로 공유 안 함</text>

  <!-- Arrows to DB -->
  <line x1="200" y1="410" x2="200" y2="460" stroke="#555" stroke-width="1.5"/>
  <polygon points="196,458 200,468 204,458" fill="#555"/>
  <line x1="680" y1="410" x2="680" y2="460" stroke="#555" stroke-width="1.5"/>
  <polygon points="676,458 680,468 684,458" fill="#555"/>

  <!-- Convergence lines to DB -->
  <line x1="200" y1="468" x2="370" y2="490" stroke="#555" stroke-width="1.5"/>
  <line x1="680" y1="468" x2="510" y2="490" stroke="#555" stroke-width="1.5"/>

  <!-- Database box -->
  <rect x="300" y="482" width="280" height="48" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="507" text-anchor="middle" fill="#e05555" font-size="15" font-weight="600">Database</text>
  <text x="440" y="523" text-anchor="middle" fill="#888" font-size="11">SQL을 통해 공유 · JDBC 연결</text>
</svg>
