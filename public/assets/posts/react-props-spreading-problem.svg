<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Props Spreading: 편리함과 위험성</text>

  <rect x="60" y="68" width="370" height="180" rx="12" fill="#2a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">무분별한 스프레딩의 위험</text>
  <rect x="76" y="106" width="338" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Input(props) {</tspan></text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">input</tspan><tspan fill="#ffffff"> {...props} /&gt;;</tspan></text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">}</text>
  <text x="92" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#55c555">Input</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#e05555">labelText</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"이름"</tspan><tspan fill="#ffffff"> /&gt;</tspan></text>
  <text x="92" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// labelText가 DOM input에 그대로 전달!</text>
  <text x="92" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// Warning: Unknown prop on DOM element</text>

  <rect x="450" y="68" width="370" height="180" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">필요한 props만 분리 후 전달</text>
  <rect x="466" y="106" width="338" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Input({ label, error, ...rest }) {</tspan></text>
  <text x="482" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="482" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#55c555">label</tspan><tspan fill="#ffffff">&gt;{label}&lt;/</tspan><tspan fill="#55c555">label</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="482" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#55c555">input</tspan><tspan fill="#ffffff"> {...rest} /&gt;</tspan></text>
  <text x="482" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    {error </tspan><tspan fill="#e05555">&amp;&amp;</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;{error}&lt;/</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;}</tspan></text>
  <text x="482" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  &lt;/div&gt;</text>

  <text x="440" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">스프레딩 사용 적합/부적합 기준</text>

  <rect x="60" y="304" width="760" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">// ✅ 좋음: 커스텀 props 제거 후 HTML 속성만 전달</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> { variant, isLoading, ...htmlProps } = props;</tspan></text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">button</tspan><tspan fill="#ffffff"> className={variant} {...htmlProps} /&gt;;</tspan></text>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"> </text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">// ❌ 나쁨: 어떤 props가 전달되는지 파악 불가</text>
  <text x="76" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">ComplexWidget</tspan><tspan fill="#ffffff"> {...allProps} /&gt;;</tspan></text>
</svg>
