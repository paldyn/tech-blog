<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pyenv + venv 워크플로우</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">버전 관리와 가상환경의 조합</text>

  <rect x="60" y="90" width="760" height="220" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="114" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 새 프로젝트 셋업 전체 과정</text>
  <text x="76" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ mkdir myapp </tspan><tspan fill="#7ec8e3" font-weight="600">&amp;&amp;</tspan><tspan fill="#ffffff"> cd myapp</tspan></text>
  <text x="76" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ pyenv local </tspan><tspan fill="#b5cea8">3.13.0</tspan><tspan fill="#ffffff">              </tspan><tspan fill="#9aa4b8"># 버전 고정</tspan></text>
  <text x="76" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ python -m venv .venv          </tspan><tspan fill="#9aa4b8"># 가상환경 생성</tspan></text>
  <text x="76" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ source .venv/bin/activate      </tspan><tspan fill="#9aa4b8"># 활성화 (Windows: .venv\Scripts\activate)</tspan></text>
  <text x="76" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">(.venv) $ pip install requests    </tspan><tspan fill="#9aa4b8"># 패키지 설치</tspan></text>
  <text x="76" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">(.venv) $ pip freeze &gt; requirements.txt</tspan></text>
  <text x="76" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 다른 환경에서 재현</text>
  <text x="76" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ pip install -r requirements.txt</tspan></text>

  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">pyenv = Python 버전 관리 | venv = 패키지 격리 — 둘은 다른 역할을 한다</text>
</svg>
