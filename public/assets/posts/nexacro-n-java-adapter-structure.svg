<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Java 어댑터 내부 구조</text>

  <!-- Request flow boxes, top to bottom, centered -->
  <!-- 1. HTTP Request -->
  <rect x="320" y="80" width="240" height="56" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">HTTP POST 요청</text>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Content-Type: application/x-www-form-urlencoded</text>

  <line x1="440" y1="136" x2="440" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 2. NexacroServlet -->
  <rect x="280" y="158" width="320" height="56" rx="8" fill="#0a0a14" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">NexacroServlet</text>
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">요청 수신, PL 파서 호출</text>

  <line x1="440" y1="214" x2="440" y2="234" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 3. PLParser -->
  <rect x="280" y="236" width="320" height="56" rx="8" fill="#14200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">PL 파서</text>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">바이트 스트림 → DataSet / VariableList</text>

  <line x1="440" y1="292" x2="440" y2="312" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 4. ServiceDispatcher -->
  <rect x="240" y="314" width="400" height="56" rx="8" fill="#1a0a14" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">ServiceDispatcher</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서비스 ID 파싱 → Spring 빈 조회 → 메서드 호출</text>

  <!-- Branches to service classes -->
  <line x1="310" y1="370" x2="160" y2="400" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="440" y1="370" x2="440" y2="400" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="570" y1="370" x2="720" y2="400" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <rect x="60" y="400" width="200" height="56" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">UserService</text>
  <text x="160" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">search / save</text>

  <rect x="340" y="400" width="200" height="56" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">OrderService</text>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">search / save</text>

  <rect x="620" y="400" width="200" height="56" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">CodeService</text>
  <text x="720" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">getCodes / save</text>
</svg>
