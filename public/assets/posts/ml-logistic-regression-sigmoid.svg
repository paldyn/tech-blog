<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">로지스틱 회귀: 시그모이드와 결정 경계</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">선형 회귀를 분류 확률로 변환하는 원리</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- LEFT: Sigmoid curve -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">시그모이드 함수: σ(z) = 1 / (1 + e⁻ᶻ)</text>
  <rect x="60" y="115" width="370" height="230" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Axes -->
  <line x1="100" y1="320" x2="410" y2="320" stroke="#333" stroke-width="1.5"/>
  <line x1="235" y1="130" x2="235" y2="325" stroke="#333" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="410" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888"> z</text>
  <text x="236" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1.0</text>
  <text x="236" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0.5</text>
  <text x="236" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0.0</text>
  <text x="90" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">-6</text>
  <text x="380" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">+6</text>

  <!-- Sigmoid curve (approximate with path) -->
  <path d="M 100 318 C 130 317 150 315 165 312 C 175 308 185 298 195 283 C 205 267 215 248 225 234 C 228 230 232 228 235 228 C 238 228 242 226 245 222 C 255 208 265 192 275 175 C 285 160 295 150 305 144 C 320 140 340 135 380 133" stroke="#7ec8e3" stroke-width="2.5" fill="none"/>

  <!-- 0.5 horizontal line -->
  <line x1="100" y1="228" x2="235" y2="228" stroke="#55c555" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="235" cy="228" r="5" fill="#55c555"/>
  <text x="100" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">결정 경계 (0.5)</text>

  <!-- Annotations -->
  <text x="80" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">z→-∞: σ→0</text>
  <text x="290" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">z→+∞: σ→1</text>

  <!-- Key property box -->
  <rect x="78" y="335" width="340" height="36" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="98" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">σ(z) ∈ (0, 1)  |  σ(0) = 0.5  |  σ'(z) = σ(z)·(1−σ(z))</text>

  <!-- RIGHT: Model structure -->
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">로지스틱 회귀 모델 구조</text>
  <rect x="460" y="115" width="360" height="230" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Step 1: Linear -->
  <rect x="480" y="128" width="320" height="44" rx="6" fill="#0a0d18" stroke="#7777cc"/>
  <text x="640" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">① 선형 변환</text>
  <text x="640" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">z = w₁x₁ + w₂x₂ + b  (실수 전체)</text>

  <!-- Arrow -->
  <line x1="640" y1="174" x2="640" y2="192" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="635,192 640,202 645,192" fill="#7ec8e3"/>

  <!-- Step 2: Sigmoid -->
  <rect x="480" y="204" width="320" height="44" rx="6" fill="#0a0d18" stroke="#7ec8e3"/>
  <text x="640" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">② 시그모이드 활성화</text>
  <text x="640" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ŷ = σ(z) = 1/(1+e⁻ᶻ)  ∈ (0,1)</text>

  <!-- Arrow -->
  <line x1="640" y1="250" x2="640" y2="268" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="635,268 640,278 645,268" fill="#7ec8e3"/>

  <!-- Step 3: Decision -->
  <rect x="480" y="280" width="320" height="44" rx="6" fill="#0a0d18" stroke="#55c555"/>
  <text x="640" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">③ 결정 경계</text>
  <text x="640" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">class = 1 if ŷ ≥ 0.5, else 0</text>

  <!-- Key insight -->
  <rect x="480" y="335" width="320" height="22" rx="4" fill="#0a1520"/>
  <text x="640" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">ŷ = P(y=1|x) → 확률로 해석 가능!</text>

  <!-- Bottom: comparison -->
  <rect x="60" y="364" width="760" height="100" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">선형 회귀 vs 로지스틱 회귀 비교</text>

  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">항목</text>
  <text x="230" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">선형 회귀</text>
  <text x="560" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">로지스틱 회귀</text>
  <line x1="80" y1="410" x2="800" y2="410" stroke="#333" stroke-width="1"/>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">출력 범위</text>
  <text x="230" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">(-∞, +∞) 실수</text>
  <text x="560" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">(0, 1) 확률</text>
  <text x="80" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">손실 함수</text>
  <text x="230" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">MSE</text>
  <text x="560" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Binary Cross-Entropy</text>
  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">용도</text>
  <text x="230" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">연속값 예측</text>
  <text x="560" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이진/다중 분류</text>

  <!-- Footer -->
  <text x="440" y="508" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
