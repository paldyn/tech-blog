<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git add -u 실전 활용 시나리오</text>

  <!-- Left scenario -->
  <rect x="60" y="68" width="360" height="240" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">시나리오: 새 파일 포함 원치 않을 때</text>

  <text x="80" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 상태</text>
  <text x="80" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555"> M src/app.js</text>
  <text x="80" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">?? tmp/debug.log</text>

  <text x="80" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># -u로 수정만 스테이징</text>
  <text x="80" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git add -u</text>

  <text x="80" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 결과</text>
  <text x="80" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">M  src/app.js    ← 스테이징됨</text>
  <text x="80" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">?? tmp/debug.log ← 그대로</text>
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">debug.log는 .gitignore 추가 예정</text>

  <!-- Right scenario -->
  <rect x="450" y="68" width="370" height="240" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">시나리오: 추적 파일 이름 변경</text>

  <text x="470" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># OS mv로 파일 이름 변경</text>
  <text x="470" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">mv old-name.js new-name.js</text>
  <text x="470" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git add -u  </text>
  <text x="596" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 삭제 스테이징</text>
  <text x="470" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git add new-name.js</text>
  <text x="470" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 또는 git mv (원스텝)</text>
  <text x="470" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git mv old-name.js new-name.js</text>

  <rect x="470" y="234" width="330" height="54" rx="4" fill="#0a1a08"/>
  <text x="482" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">git add -u는 삭제(D)도 포함.</text>
  <text x="482" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">신규 new-name.js는 별도로 git add 필요.</text>
</svg>
