<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PostgreSQL 다형성 타입</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">ANYELEMENT · ANYARRAY · ANYNONARRAY · ANYENUM · ANYRANGE</text>

  <!-- Polymorphic type cards -->
  <!-- ANYELEMENT -->
  <rect x="60" y="90" width="230" height="120" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">ANYELEMENT</text>
  <text x="175" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">임의의 단일 타입</text>
  <text x="175" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">INT, TEXT, NUMERIC...</text>
  <text x="175" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">같은 이름이면 같은 타입</text>
  <text x="175" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">으로 바인딩</text>

  <!-- ANYARRAY -->
  <rect x="320" y="90" width="230" height="120" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="435" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">ANYARRAY</text>
  <text x="435" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">임의의 배열 타입</text>
  <text x="435" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">INT[], TEXT[], ...</text>
  <text x="435" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ANYELEMENT와 함께 쓰면</text>
  <text x="435" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">원소 타입 자동 일치</text>

  <!-- ANYRANGE -->
  <rect x="580" y="90" width="240" height="120" rx="8" fill="#2e1a00" stroke="#ce9178" stroke-width="1.5"/>
  <text x="700" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">ANYRANGE</text>
  <text x="700" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">임의의 범위 타입</text>
  <text x="700" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">int4range, tsrange...</text>
  <text x="700" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PG14+: ANYMULTIRANGE</text>
  <text x="700" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">도 추가됨</text>

  <!-- ANYNONARRAY -->
  <rect x="60" y="240" width="230" height="100" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="175" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">ANYNONARRAY</text>
  <text x="175" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">배열이 아닌 타입만</text>
  <text x="175" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">스칼라로 제한할 때 사용</text>
  <text x="175" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">INT, TEXT (INT[] 제외)</text>

  <!-- ANYENUM -->
  <rect x="320" y="240" width="230" height="100" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="435" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">ANYENUM</text>
  <text x="435" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">임의의 ENUM 타입만</text>
  <text x="435" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사용자 정의 ENUM에 적용</text>
  <text x="435" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">enum_first(), enum_last() 등</text>

  <!-- VARIADIC note -->
  <rect x="580" y="240" width="240" height="100" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="700" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">VARIADIC</text>
  <text x="700" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">가변 인자 (다형성 아님)</text>
  <text x="700" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">VARIADIC args ANYARRAY</text>
  <text x="700" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">배열로 수집 후 처리</text>

  <!-- Binding rule -->
  <rect x="60" y="364" width="760" height="88" rx="8" fill="#1a1a1a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">다형성 바인딩 규칙</text>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 같은 파라미터명의 다형성 타입은 호출 시 모두 같은 실제 타입으로 바인딩됨</text>
  <text x="80" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• f(ANYELEMENT, ANYELEMENT) → f(1, 2) OK,  f(1, 'a') ERROR (타입 불일치)</text>
  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• ANYELEMENT + ANYARRAY: 배열 원소 타입 == ANYELEMENT로 자동 검증</text>
</svg>
