<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="rnArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">이미 섞인 줄바꿈 한 번에 정규화</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">규칙을 정한 뒤 renormalize로 기존 파일을 통일한다</text>

  <rect x="60" y="105" width="200" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="130" font-size="14" fill="#ffffff">1. .gitattributes</text>
  <text x="80" y="150" font-size="12" fill="#9aa4b8">규칙 추가·커밋</text>

  <rect x="340" y="105" width="200" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="360" y="130" font-size="14" fill="#ffffff">2. renormalize</text>
  <text x="360" y="150" font-size="12" fill="#9aa4b8">인덱스 다시 작성</text>

  <rect x="620" y="105" width="200" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="130" font-size="14" fill="#ffffff">3. commit</text>
  <text x="640" y="150" font-size="12" fill="#9aa4b8">정규화 결과 저장</text>

  <line x1="260" y1="133" x2="340" y2="133" stroke="#55c555" stroke-width="2" marker-end="url(#rnArr)"/>
  <line x1="540" y1="133" x2="620" y2="133" stroke="#55c555" stroke-width="2" marker-end="url(#rnArr)"/>

  <rect x="60" y="195" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="225" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git add --renormalize .</text>
  <text xml:space="preserve" x="80" y="253" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git commit -m "chore: normalize line endings"</text>

  <text x="60" y="305" font-size="13" fill="#888">한 번 정규화 커밋을 남기면 이후 diff에서 줄바꿈 잡음이 사라진다</text>
</svg>
