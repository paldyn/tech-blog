<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Symbol.toPrimitive · toStringTag</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Well-Known Symbol 활용 예제</text>

  <!-- 코드 예시 -->
  <rect x="60" y="96" width="760" height="250" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Symbol.toPrimitive — 타입 변환 제어</text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">class</text>
  <text x="112" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Money {</text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  constructor(amount, currency) {</text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#7ec8e3">                           this</tspan><tspan fill="#e8e8e8">.amount = amount; </tspan><tspan fill="#e8e8e8">.currency = currency; }</tspan></text>

  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  [</tspan><tspan fill="#7ec8e3">Symbol</tspan><tspan fill="#e8e8e8">.toPrimitive](hint) {</tspan></text>

  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    if</tspan><tspan fill="#e8e8e8"> (hint === </tspan><tspan fill="#ce9178">'number'</tspan><tspan fill="#e8e8e8">) </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#7ec8e3"> this</tspan><tspan fill="#e8e8e8">.amount;</tspan></text>

  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ce9178"> `${this.amount} ${this.currency}`</tspan><tspan fill="#e8e8e8">; }</tspan></text>

  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  get [</tspan><tspan fill="#7ec8e3">Symbol</tspan><tspan fill="#e8e8e8">.toStringTag]() { </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ce9178"> 'Money'</tspan><tspan fill="#e8e8e8">; } }</tspan></text>

  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> price = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Money(</tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">'KRW'</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">price + </text>
  <text x="148" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">10</text>
  <text x="163" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="200" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// '100 KRW10' (hint: 'default')</text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">+price;</text>
  <text x="148" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">                    // 100 (hint: 'number')</text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.prototype.toString.call(price);</text>
  <text x="400" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// '[object Money]'</text>

</svg>
