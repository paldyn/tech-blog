<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">React Hooks 메커니즘</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Hook → Fiber 노드의 연결 리스트에 순서대로 저장</text>

  <!-- Hook list visualization -->
  <rect x="60" y="100" width="160" height="56" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">useState</text>
  <text x="140" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Hook[0]</text>

  <line x1="220" y1="128" x2="258" y2="128" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <rect x="263" y="100" width="160" height="56" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="343" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">useEffect</text>
  <text x="343" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Hook[1]</text>

  <line x1="423" y1="128" x2="461" y2="128" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <rect x="466" y="100" width="160" height="56" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="546" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">useMemo</text>
  <text x="546" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Hook[2]</text>

  <line x1="626" y1="128" x2="664" y2="128" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <rect x="669" y="100" width="151" height="56" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="744" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">useCallback</text>
  <text x="744" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Hook[3]</text>

  <!-- Warning -->
  <rect x="60" y="180" width="760" height="52" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">⚠ Hook은 항상 같은 순서로 호출해야 합니다</text>
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">조건문·루프 안에서 Hook 호출 금지 — 순서가 바뀌면 Hook[n]이 다른 상태와 연결됨</text>

  <!-- useEffect lifecycle -->
  <text x="60" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">useEffect 실행 타이밍</text>

  <rect x="60" y="284" width="760" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 1. 마운트 + 모든 업데이트 후</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">useEffect(() =&gt; { ... })</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 2. 마운트 1회만 (빈 의존성 배열)</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">useEffect(() =&gt; { ... }, [])</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 3. count 변경 시마다. cleanup 함수로 이전 효과 정리</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">useEffect(() =&gt; { <tspan fill="#7ec8e3" font-weight="600">return</tspan> () =&gt; cleanup() }, [count])</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 언마운트 시: cleanup 호출 → 구독 해제, 타이머 제거</text>
</svg>
