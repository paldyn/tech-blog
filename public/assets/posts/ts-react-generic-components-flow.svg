<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">제네릭 컴포넌트 — T가 props 사이를 흐른다</text>
  <text x="60" y="78" font-size="13" fill="#888">items의 요소 타입이 renderItem 인자까지 그대로 전달된다</text>

  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="120" width="230" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="150" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">items: T[]</text>
  <text x="175" y="184" font-size="13" fill="#ffffff" text-anchor="middle">User[]를 넘기면</text>
  <text x="175" y="212" font-size="13" fill="#9aa4b8" text-anchor="middle">T = User로 추론</text>

  <rect x="350" y="110" width="200" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="450" y="140" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">List&lt;T&gt;</text>
  <text x="450" y="172" font-size="13" fill="#ffffff" text-anchor="middle">props 사이를</text>
  <text x="450" y="194" font-size="13" fill="#ffffff" text-anchor="middle">T로 연결</text>
  <text x="450" y="222" font-size="13" fill="#9aa4b8" text-anchor="middle">호출 시점에 확정</text>

  <rect x="610" y="120" width="210" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="715" y="150" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">renderItem</text>
  <text x="715" y="182" font-size="13" fill="#ffffff" text-anchor="middle">(item: T) =&gt; Node</text>
  <text x="715" y="210" font-size="13" fill="#9aa4b8" text-anchor="middle">item: User로 좁혀짐</text>

  <line x1="290" y1="180" x2="348" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="550" y1="180" x2="608" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrG)"/>

  <text x="60" y="295" font-size="13" fill="#ffffff">한 컴포넌트로 User·Product·무엇이든 — 요소 타입 안전을 유지한 채 재사용한다.</text>
</svg>
