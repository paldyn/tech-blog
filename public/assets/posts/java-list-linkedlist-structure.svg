<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 450">
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="anxt" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="aprv" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
    <marker id="aptr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LinkedList 내부 구조 — 이중 연결 리스트</text>

  <!-- LinkedList object box -->
  <rect x="280" y="72" width="320" height="52" rx="6" fill="#0f1827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">LinkedList&lt;E&gt;</text>
  <text x="440" y="113" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">head · tail · size</text>

  <!-- head arrow to Node1 -->
  <text x="183" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">head</text>
  <line x1="334" y1="124" x2="225" y2="178" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aptr)"/>

  <!-- tail arrow to Node3 -->
  <text x="697" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">tail</text>
  <line x1="546" y1="124" x2="655" y2="178" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aptr)"/>

  <!-- Node 1 box -->
  <rect x="60" y="180" width="246" height="90" rx="6" fill="#0d1b2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="120" y1="180" x2="120" y2="270" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="246" y1="180" x2="246" y2="270" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">prev</text>
  <text x="183" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">item</text>
  <text x="273" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">next</text>
  <text x="90" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">null</text>
  <text x="183" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#7ec8e3">20</text>
  <text x="273" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">ref</text>
  <text x="183" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">Node</text>

  <!-- Node 2 box -->
  <rect x="317" y="180" width="246" height="90" rx="6" fill="#0d1b2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="377" y1="180" x2="377" y2="270" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="503" y1="180" x2="503" y2="270" stroke="#3a4a6e" stroke-width="1"/>
  <text x="347" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">prev</text>
  <text x="440" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">item</text>
  <text x="530" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">next</text>
  <text x="347" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">ref</text>
  <text x="440" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#7ec8e3">30</text>
  <text x="530" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">ref</text>
  <text x="440" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">Node</text>

  <!-- Node 3 box -->
  <rect x="574" y="180" width="246" height="90" rx="6" fill="#0d1b2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="634" y1="180" x2="634" y2="270" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="760" y1="180" x2="760" y2="270" stroke="#3a4a6e" stroke-width="1"/>
  <text x="604" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">prev</text>
  <text x="697" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">item</text>
  <text x="787" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">next</text>
  <text x="604" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">ref</text>
  <text x="697" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#7ec8e3">40</text>
  <text x="787" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">null</text>
  <text x="697" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">Node</text>

  <!-- Forward arrows next: Node1 -> Node2, Node2 -> Node3 -->
  <line x1="306" y1="213" x2="314" y2="213" stroke="#7ec8e3" stroke-width="2" marker-end="url(#anxt)"/>
  <line x1="563" y1="213" x2="571" y2="213" stroke="#7ec8e3" stroke-width="2" marker-end="url(#anxt)"/>

  <!-- Backward arrows prev: Node2 -> Node1, Node3 -> Node2 -->
  <line x1="314" y1="243" x2="306" y2="243" stroke="#ce9178" stroke-width="2" marker-end="url(#aprv)"/>
  <line x1="571" y1="243" x2="563" y2="243" stroke="#ce9178" stroke-width="2" marker-end="url(#aprv)"/>

  <!-- Explanation box -->
  <rect x="60" y="295" width="760" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="315" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">삽입/삭제: 포인터 교체만으로 O(1) (위치 참조를 보유할 때)</text>
  <text x="440" y="335" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">인덱스 접근: head 또는 tail에서 순차 탐색 → O(n)</text>

  <!-- Legend -->
  <line x1="190" y1="390" x2="230" y2="390" stroke="#7ec8e3" stroke-width="2" marker-end="url(#anxt)"/>
  <text x="240" y="394"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">next 포인터</text>
  <line x1="500" y1="390" x2="540" y2="390" stroke="#ce9178" stroke-width="2" marker-end="url(#aprv)"/>
  <text x="550" y="394"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">prev 포인터</text>
</svg>
