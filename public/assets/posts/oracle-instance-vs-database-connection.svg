<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">클라이언트 → 인스턴스 연결 경로</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">리스너 → 서버 프로세스 → SGA → 데이터 파일</text>

  <!-- Client -->
  <rect x="60" y="140" width="120" height="70" fill="#0d1520" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">클라이언트</text>
  <text x="120" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">SQL*Plus</text>
  <text x="120" y="204" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">JDBC/ODBC</text>

  <!-- Arrow → Listener -->
  <line x1="180" y1="175" x2="230" y2="175" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="242,175 228,168 228,182" fill="#7ec8e3"/>
  <text x="211" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TNS</text>

  <!-- Listener -->
  <rect x="242" y="140" width="120" height="70" fill="#111" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="302" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">리스너</text>
  <text x="302" y="188" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">port 1521</text>
  <text x="302" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">연결 수신</text>

  <!-- Arrow → Server Process -->
  <line x1="362" y1="175" x2="412" y2="175" stroke="#7777cc" stroke-width="2"/>
  <polygon points="424,175 410,168 410,182" fill="#7777cc"/>
  <text x="393" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Spawn</text>

  <!-- Server Process -->
  <rect x="424" y="130" width="130" height="90" fill="#111" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="489" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">서버 프로세스</text>
  <text x="489" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전용/공유 서버</text>
  <text x="489" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SQL 파싱·실행</text>
  <text x="489" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PGA 할당</text>

  <!-- Arrow → SGA -->
  <line x1="554" y1="175" x2="604" y2="175" stroke="#55c555" stroke-width="2"/>
  <polygon points="616,175 602,168 602,182" fill="#55c555"/>

  <!-- SGA -->
  <rect x="616" y="130" width="200" height="90" fill="#0d2040" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="716" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">SGA</text>
  <text x="716" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Buffer Cache 히트?</text>
  <text x="716" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 메모리 반환</text>
  <text x="716" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">→ 디스크 읽기(Miss)</text>

  <!-- Disk -->
  <rect x="616" y="250" width="200" height="60" fill="#0e1a0e" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="716" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">데이터 파일</text>
  <text x="716" y="296" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">*.dbf (디스크)</text>

  <line x1="716" y1="220" x2="716" y2="248" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="716,250 709,237 723,237" fill="#e05555"/>

  <!-- Connection info -->
  <rect x="60" y="320" width="760" height="60" fill="#0d0d18" rx="6" stroke="#1e2433"/>
  <text x="440" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">연결 식별자 예시</text>
  <text x="240" y="366" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ORACLE_SID=ORCL</text>
  <text x="240" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">로컬 연결 (Bequeath)</text>
  <text x="640" y="366" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">host/orcl  또는  host:1521/ORCL</text>
  <text x="640" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원격 TNS/Easy Connect</text>
</svg>
