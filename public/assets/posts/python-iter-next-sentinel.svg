<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">iter() 센티넬 패턴 vs next() 기본값</text>

  <!-- Left: iter sentinel -->
  <text x="230" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">iter(callable, sentinel)</text>
  <rect x="50" y="80" width="380" height="256" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 주사위를 굴려 6이 나올 때까지</tspan></text>
  <text x="66" y="121" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">import </tspan><tspan>random</tspan>
  </text>
  <text x="66" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">rolls = list(</text>
  <text x="66" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    iter(</text>
  <text x="66" y="193" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">        </tspan><tspan font-weight="600" fill="#7ec8e3">lambda</tspan><tspan>: random.randint(</tspan><tspan fill="#b5cea8">1</tspan><tspan>, </tspan><tspan fill="#b5cea8">6</tspan><tspan>),</tspan>
  </text>
  <text x="66" y="211" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">        6</text>
  <text x="66" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    )</text>
  <text x="66" y="247" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">)</text>
  <text x="66" y="273" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 예: [3, 1, 4, 2]  (6 미포함)</tspan></text>
  <text x="66" y="291" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># sentinel(6)이 반환되면 중단</tspan></text>

  <!-- Right: next with default -->
  <text x="650" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">next(iterator, default)</text>
  <rect x="450" y="80" width="380" height="256" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="466" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 소진된 이터레이터에서 안전하게 꺼내기</tspan></text>
  <text x="466" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">it = iter([<tspan fill="#b5cea8">10</tspan>, <tspan fill="#b5cea8">20</tspan>])</text>
  <text x="466" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">print(next(it, <tspan fill="#b5cea8">0</tspan>))  <tspan fill="#9aa4b8"># 10</tspan></text>
  <text x="466" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">print(next(it, <tspan fill="#b5cea8">0</tspan>))  <tspan fill="#9aa4b8"># 20</tspan></text>
  <text x="466" y="193" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">print(next(it, <tspan fill="#b5cea8">0</tspan>))  <tspan fill="#9aa4b8"># 0 (소진 → default)</tspan></text>
  <text x="466" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 첫 번째 값만 꺼내는 패턴</tspan></text>
  <text x="466" y="247" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">first = next(iter(some_list), <tspan fill="#ce9178">None</tspan>)</text>
  <text x="466" y="265" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 빈 리스트면 None, 안전</tspan></text>
  <text x="466" y="291" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># try/except 없이 깔끔</tspan></text>

  <!-- Bottom note -->
  <rect x="50" y="354" width="780" height="14" rx="4" fill="#111827" stroke="none"/>
  <text x="440" y="365" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">센티넬 패턴: 루프 없이 조건부 종료 스트림 생성 | next(it, default): 안전한 단일 값 획득</text>
</svg>
