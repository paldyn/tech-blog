<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">.deb 패키지 구조와 dpkg 데이터베이스</text>

  <!-- .deb structure -->
  <rect x="60" y="72" width="340" height="240" rx="8" fill="#0a1020" stroke="#7777cc" stroke-width="2"/>
  <text x="230" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">nginx.deb 구조</text>

  <rect x="80" y="112" width="300" height="36" rx="4" fill="#111" stroke="#7ec8e3"/>
  <text x="230" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">debian-binary  (버전 "2.0")</text>

  <rect x="80" y="156" width="300" height="60" rx="4" fill="#111" stroke="#55c555"/>
  <text x="100" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">control.tar.xz</text>
  <text x="100" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">control, md5sums, preinst</text>
  <text x="100" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">postinst, prerm, postrm</text>

  <rect x="80" y="224" width="300" height="60" rx="4" fill="#111" stroke="#e05555"/>
  <text x="100" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">data.tar.xz</text>
  <text x="100" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실제 파일들 (/usr, /etc, /var)</text>
  <text x="100" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일시스템 경로 그대로</text>

  <!-- dpkg DB -->
  <rect x="460" y="72" width="360" height="240" rx="8" fill="#0f150a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">dpkg 데이터베이스</text>
  <text x="480" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">/var/lib/dpkg/</text>

  <rect x="480" y="130" width="320" height="36" rx="4" fill="#111" stroke="#55c555"/>
  <text x="490" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">status</text>
  <text x="560" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  설치된 패키지 상태</text>

  <rect x="480" y="174" width="320" height="36" rx="4" fill="#111" stroke="#888"/>
  <text x="490" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">available</text>
  <text x="570" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  설치 가능 패키지 정보</text>

  <rect x="480" y="218" width="320" height="36" rx="4" fill="#111" stroke="#888"/>
  <text x="490" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">info/</text>
  <text x="530" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  패키지별 파일 목록, 스크립트</text>

  <rect x="480" y="262" width="320" height="36" rx="4" fill="#111" stroke="#888"/>
  <text x="490" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">lock</text>
  <text x="530" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  동시 실행 방지 락 파일</text>

  <!-- install lifecycle -->
  <rect x="60" y="336" width="760" height="100" rx="8" fill="#0d0d0d" stroke="#333"/>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">dpkg 설치 라이프사이클</text>

  <!-- Steps -->
  <rect x="80" y="370" width="100" height="36" rx="4" fill="#111" stroke="#7ec8e3"/>
  <text x="130" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">1. preinst</text>

  <line x1="180" y1="388" x2="210" y2="388" stroke="#555" stroke-width="1.5"/>
  <polygon points="208,383 220,388 208,393" fill="#555"/>

  <rect x="220" y="370" width="110" height="36" rx="4" fill="#111" stroke="#55c555"/>
  <text x="275" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">2. 파일 배치</text>

  <line x1="330" y1="388" x2="360" y2="388" stroke="#555" stroke-width="1.5"/>
  <polygon points="358,383 370,388 358,393" fill="#555"/>

  <rect x="370" y="370" width="100" height="36" rx="4" fill="#111" stroke="#55c555"/>
  <text x="420" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">3. postinst</text>

  <line x1="470" y1="388" x2="500" y2="388" stroke="#555" stroke-width="1.5"/>
  <polygon points="498,383 510,388 498,393" fill="#555"/>

  <rect x="510" y="370" width="110" height="36" rx="4" fill="#111" stroke="#888"/>
  <text x="565" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">4. DB 업데이트</text>

  <line x1="620" y1="388" x2="650" y2="388" stroke="#555" stroke-width="1.5"/>
  <polygon points="648,383 660,388 648,393" fill="#555"/>

  <rect x="660" y="370" width="120" height="36" rx="4" fill="#0f1a0f" stroke="#55c555"/>
  <text x="720" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">설치 완료</text>
</svg>
