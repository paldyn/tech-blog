<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="320" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="pk_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">pickle.loads는 데이터가 아니라 코드를 실행한다</text>

  <!-- box 1 -->
  <rect x="60" y="115" width="200" height="92" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="152" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">신뢰할 수 없는</text>
  <text x="160" y="178" font-size="14" fill="#888" text-anchor="middle">pickle 바이트</text>

  <!-- box 2 -->
  <rect x="340" y="115" width="200" height="92" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="152" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">pickle.loads()</text>
  <text x="440" y="178" font-size="13" fill="#888" text-anchor="middle">__reduce__ 자동 호출</text>

  <!-- box 3 -->
  <rect x="620" y="115" width="200" height="92" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="152" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">임의 코드 실행</text>
  <text x="720" y="178" font-size="13" fill="#888" text-anchor="middle">os.system(...) ⚠</text>

  <line x1="260" y1="161" x2="334" y2="161" stroke="#e05555" stroke-width="2" marker-end="url(#pk_arr)"/>
  <line x1="540" y1="161" x2="614" y2="161" stroke="#e05555" stroke-width="2" marker-end="url(#pk_arr)"/>

  <text x="440" y="262" font-size="13" fill="#9aa4b8" text-anchor="middle">역직렬화는 객체를 "복원"하기 위해 메서드를 호출한다 — 공격자가 그 메서드를 심을 수 있다</text>
</svg>
