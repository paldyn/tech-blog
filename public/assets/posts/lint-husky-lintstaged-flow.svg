<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Husky + lint-staged 커밋 흐름</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">git commit → pre-commit hook → 스테이징 파일만 린트/포맷</text>

  <!-- git add -->
  <rect x="60" y="100" width="140" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">git add</text>
  <text x="130" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스테이징 영역</text>

  <line x1="200" y1="128" x2="250" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- git commit -->
  <rect x="255" y="100" width="150" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="330" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">git commit</text>
  <text x="330" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커밋 요청</text>

  <line x1="405" y1="128" x2="455" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Husky pre-commit -->
  <rect x="460" y="100" width="170" height="56" rx="8" fill="#1f1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="545" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">Husky pre-commit</text>
  <text x="545" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">.husky/pre-commit 실행</text>

  <line x1="630" y1="128" x2="680" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- lint-staged -->
  <rect x="685" y="100" width="135" height="56" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="752" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">lint-staged</text>
  <text x="752" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스테이징 파일 처리</text>

  <!-- lint-staged branches -->
  <line x1="752" y1="156" x2="752" y2="210" stroke="#888" stroke-width="2"/>

  <!-- ESLint -->
  <rect x="580" y="215" width="170" height="60" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="665" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">ESLint --fix</text>
  <text x="665" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">*.{ts,tsx,js}</text>
  <line x1="752" y1="210" x2="750" y2="215" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Prettier -->
  <rect x="770" y="215" width="50" height="60" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="795" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8e8e8">Prettier</text>
  <text x="795" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">--write</text>

  <!-- Pass/Fail -->
  <line x1="665" y1="275" x2="665" y2="315" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="795" y1="275" x2="795" y2="315" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Fail -->
  <rect x="60" y="320" width="330" height="64" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="225" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">커밋 중단 (Exit 1)</text>
  <text x="225" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">린트 오류 → 개발자가 수동 수정 후 재시도</text>

  <!-- Pass -->
  <rect x="420" y="320" width="400" height="64" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">커밋 완료 (Exit 0)</text>
  <text x="620" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자동 수정된 파일 → git add → 커밋 성공</text>

  <!-- Code block -->
  <rect x="60" y="410" width="760" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// package.json — lint-staged 설정</text>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#ce9178">"lint-staged"</tspan>: { <tspan fill="#ce9178">"*.{ts,tsx}"</tspan>: [<tspan fill="#ce9178">"eslint --fix"</tspan>, <tspan fill="#ce9178">"prettier --write"</tspan>] }</text>
  <text x="76" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#ce9178">"lint-staged"</tspan>: { <tspan fill="#ce9178">"*.{md,json,css}"</tspan>: [<tspan fill="#ce9178">"prettier --write"</tspan>] }</text>
</svg>
