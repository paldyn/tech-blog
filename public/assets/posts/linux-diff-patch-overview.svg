<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">diff · patch — 파일 비교와 패치 적용</text>

  <!-- diff unified format anatomy -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">unified diff 출력 해부</text>

  <rect x="60" y="94" width="760" height="220" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Header lines -->
  <text x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">--- a/config.txt   2026-05-20</text>
  <text x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">+++ b/config.txt   2026-05-22</text>
  <text x="80" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">@@ -1,5 +1,6 @@</text>
  <text x="80" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" xml:space="preserve"> context line (공통)</text>
  <text x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">-removed line (삭제)</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">+added line (추가)</text>
  <text x="80" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">+another added line</text>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" xml:space="preserve"> context line (공통)</text>

  <!-- Annotations -->
  <text x="530" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">--- : 원본 파일</text>
  <text x="530" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">+++ : 새 파일</text>
  <text x="530" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">@@ -시작,줄수 +시작,줄수 @@</text>
  <text x="530" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">공백 : 컨텍스트 (기본 3줄)</text>
  <text x="530" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">- : 원본에서 삭제</text>
  <text x="530" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">+ : 새 파일에 추가</text>

  <!-- patch flow -->
  <text x="60" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">patch 적용 흐름</text>

  <rect x="60" y="368" width="160" height="52" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">원본 파일</text>
  <text x="140" y="410" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">old.txt</text>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <line x1="222" y1="394" x2="260" y2="394" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="262" y="368" width="160" height="52" rx="6" fill="#1a1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="342" y="390" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">diff -u</text>
  <text x="342" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ changes.patch</text>

  <line x1="424" y1="394" x2="462" y2="394" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="464" y="368" width="160" height="52" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="544" y="390" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">patch</text>
  <text x="544" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">패치 적용</text>

  <line x1="626" y1="394" x2="664" y2="394" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="666" y="368" width="154" height="52" rx="6" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="743" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">변경된 파일</text>
  <text x="743" y="410" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">new.txt</text>

  <!-- reverse -->
  <path d="M 743 422 Q 743 444 440 444 Q 137 444 137 422" fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr2)"/>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">patch -R (역방향 적용 — 롤백)</text>
</svg>
