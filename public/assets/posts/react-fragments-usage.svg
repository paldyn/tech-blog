<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a">
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Fragment가 필요한 4가지 상황</text>

  <!-- Case 1 -->
  <rect x="60" y="66" width="370" height="80" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① 테이블 구조 (tr 안에 td 묶기)</text>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">div가 tr과 td 사이에 들어가면 HTML 구조가 깨짐.</text>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Fragment로 td를 묶어 반환하면 DOM 오염 없음.</text>

  <!-- Case 2 -->
  <rect x="450" y="66" width="370" height="80" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">② 불필요한 래퍼 div 제거</text>
  <text x="470" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">CSS Flexbox/Grid 레이아웃에서 여분의 div가</text>
  <text x="470" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">레이아웃을 망가뜨리는 경우 Fragment로 대체.</text>

  <!-- Case 3 -->
  <rect x="60" y="162" width="370" height="80" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ 리스트 렌더링 + key 필요</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">map()에서 여러 형제 요소를 반환할 때</text>
  <text x="80" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">React.Fragment key={id}로 묶어 반환.</text>

  <!-- Case 4 -->
  <rect x="450" y="162" width="370" height="80" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">④ 조건부 렌더링으로 여러 요소 전환</text>
  <text x="470" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">isLoggedIn에 따라 여러 요소 블록을</text>
  <text x="470" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Fragment로 묶어 한꺼번에 교체.</text>

  <!-- Two syntax forms -->
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">두 가지 문법 형태 비교</text>

  <rect x="60" y="296" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ① 단축 문법: &lt;&gt;&lt;/&gt;  — key 속성 사용 불가</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;&gt;&lt;</tspan><tspan fill="#55c555">h1</tspan><tspan fill="#ffffff">&gt;제목&lt;/</tspan><tspan fill="#55c555">h1</tspan><tspan fill="#ffffff">&gt;&lt;</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;내용&lt;/</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;&lt;/&gt;;</tspan></text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"> </text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ② React.Fragment 명시  — key 속성 사용 가능</text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">React.Fragment</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">key</tspan><tspan fill="#ffffff">={id}&gt;&lt;</tspan><tspan fill="#55c555">h1</tspan><tspan fill="#ffffff">&gt;제목&lt;/</tspan><tspan fill="#55c555">h1</tspan><tspan fill="#ffffff">&gt;&lt;/</tspan><tspan fill="#55c555">React.Fragment</tspan><tspan fill="#ffffff">&gt;;</tspan></text>
</svg>
