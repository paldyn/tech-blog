<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">SBOM 생성 및 취약점 스캔 워크플로우</text>

  <!-- Pipeline boxes -->
  <rect x="40" y="90" width="140" height="70" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="110" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">소스 코드</text>
  <text x="110" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">Git Push</text>
  <text x="110" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Source Code</text>

  <line x1="180" y1="125" x2="228" y2="125" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="90" width="140" height="70" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="300" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">빌드</text>
  <text x="300" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">Docker build</text>
  <text x="300" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">CI/CD Build</text>

  <line x1="370" y1="125" x2="418" y2="125" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="420" y="90" width="140" height="70" rx="8" fill="#0f200f" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">SBOM 생성</text>
  <text x="490" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">syft / cdxgen</text>
  <text x="490" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Generate SBOM</text>

  <line x1="560" y1="125" x2="608" y2="125" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="610" y="90" width="140" height="70" rx="8" fill="#1a1020" stroke="#ce9178" stroke-width="1.5"/>
  <text x="680" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">취약점 스캔</text>
  <text x="680" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">grype / trivy</text>
  <text x="680" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Vulnerability Scan</text>

  <line x1="750" y1="125" x2="798" y2="125" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="800" y="90" width="60" height="70" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="830" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">차단</text>
  <text x="830" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#aaa" text-anchor="middle">HIGH+</text>
  <text x="830" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">Block</text>

  <!-- Code block -->
  <text x="60" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">GitHub Actions 예시</text>
  <rect x="40" y="230" width="800" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">- name: Generate SBOM</text>
  <text x="56" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  uses: </text>
  <text x="56" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">        anchore/sbom-action@v0</text>
  <text x="56" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  with: </text>
  <text x="56" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        { format: spdx-json, output-file: sbom.json }</text>
  <text x="56" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">- name: Scan SBOM for CVEs</text>
  <text x="56" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  run: </text>
  <text x="56" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">        grype sbom:sbom.json --fail-on high</text>
</svg>
