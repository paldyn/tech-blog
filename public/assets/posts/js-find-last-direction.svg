<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">findLast / findLastIndex</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">ES2023 — 배열 끝에서부터 탐색</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#1e2433" stroke-width="1"/>

  <!-- Array -->
  <text x="60" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">배열: [3, 1, 4, 1, 5, 9, 2, 6]</text>

  <!-- Cells -->
  <rect x="60"  y="128" width="80" height="48" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <rect x="150" y="128" width="80" height="48" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <rect x="240" y="128" width="80" height="48" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="2"/>
  <rect x="330" y="128" width="80" height="48" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <rect x="420" y="128" width="80" height="48" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <rect x="510" y="128" width="80" height="48" fill="#1a2a1a" rx="4" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="600" y="128" width="80" height="48" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <rect x="690" y="128" width="80" height="48" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>

  <text x="100" y="157" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8e8e8">3</text>
  <text x="190" y="157" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8e8e8">1</text>
  <text x="280" y="157" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#55c555">4</text>
  <text x="370" y="157" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8e8e8">1</text>
  <text x="460" y="157" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8e8e8">5</text>
  <text x="550" y="157" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#7ec8e3">9</text>
  <text x="640" y="157" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8e8e8">2</text>
  <text x="730" y="157" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8e8e8">6</text>

  <!-- find arrow (left to right) -->
  <line x1="60" y1="196" x2="286" y2="196" stroke="#55c555" stroke-width="2"/>
  <polygon points="288,196 278,190 278,202" fill="#55c555"/>
  <text x="174" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">find(n &gt; 3) → 4</text>
  <text x="174" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">앞에서부터 탐색</text>

  <!-- findLast arrow (right to left) -->
  <line x1="770" y1="238" x2="544" y2="238" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="542,238 552,232 552,244" fill="#7ec8e3"/>
  <text x="657" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">findLast(n &gt; 3) → 9</text>
  <text x="657" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">뒤에서부터 탐색</text>

  <!-- Code comparison -->
  <text x="60" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">findLastIndex 비교</text>
  <rect x="60" y="310" width="760" height="82" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> arr = [</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">9</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">6</tspan><tspan fill="#e8e8e8">];</tspan>
  </text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">arr.findIndex(n =&gt; n &gt; </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">);     </tspan><tspan fill="#6a8aa0">// 2  (값: 4)</tspan>
  </text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">arr.findLastIndex(n =&gt; n &gt; </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// 7  (값: 6)</tspan>
  </text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 못 찾으면 -1 / undefined</text>

  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
