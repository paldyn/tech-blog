<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">동적 그리드 컬럼 구성 흐름</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="76" width="170" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="145" y="103" fill="#7ec8e3" font-size="13" font-weight="600" text-anchor="middle">① 서버 메타 조회</text>
  <text x="145" y="122" fill="#e8e8e8" font-size="12" text-anchor="middle">ds_colMeta</text>
  <text x="145" y="140" fill="#888" font-size="12" text-anchor="middle">colNm, colLabel, width</text>

  <line x1="230" y1="116" x2="264" y2="116" stroke="#374151" stroke-width="2"/>
  <polygon points="270,116 258,110 258,122" fill="#374151"/>

  <!-- Step 2 -->
  <rect x="270" y="76" width="170" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="355" y="103" fill="#55c555" font-size="13" font-weight="600" text-anchor="middle">② 기존 컬럼 제거</text>
  <text x="355" y="122" fill="#e8e8e8" font-size="12" text-anchor="middle">removeAll()</text>
  <text x="355" y="140" fill="#888" font-size="12" text-anchor="middle">Grid 초기화</text>

  <line x1="440" y1="116" x2="474" y2="116" stroke="#374151" stroke-width="2"/>
  <polygon points="480,116 468,110 468,122" fill="#374151"/>

  <!-- Step 3 -->
  <rect x="480" y="76" width="170" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="565" y="103" fill="#7777cc" font-size="13" font-weight="600" text-anchor="middle">③ 컬럼 동적 추가</text>
  <text x="565" y="122" fill="#e8e8e8" font-size="12" text-anchor="middle">addCol(sNm, sType)</text>
  <text x="565" y="140" fill="#888" font-size="12" text-anchor="middle">헤더·너비 설정</text>

  <line x1="650" y1="116" x2="684" y2="116" stroke="#374151" stroke-width="2"/>
  <polygon points="690,116 678,110 678,122" fill="#374151"/>

  <!-- Step 4 -->
  <rect x="690" y="76" width="130" height="80" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="755" y="103" fill="#e05555" font-size="13" font-weight="600" text-anchor="middle">④ Dataset</text>
  <text x="755" y="120" fill="#e05555" font-size="13" font-weight="600" text-anchor="middle">바인딩</text>
  <text x="755" y="140" fill="#888" font-size="12" text-anchor="middle">bindDataset</text>

  <!-- Grid preview -->
  <rect x="60" y="186" width="760" height="56" rx="4" fill="#111827" stroke="#374151"/>
  <!-- Header row -->
  <rect x="60" y="186" width="760" height="28" rx="4" fill="#1e293b" stroke="#374151"/>
  <line x1="220" y1="186" x2="220" y2="242" stroke="#374151" stroke-width="1"/>
  <line x1="380" y1="186" x2="380" y2="242" stroke="#374151" stroke-width="1"/>
  <line x1="540" y1="186" x2="540" y2="242" stroke="#374151" stroke-width="1"/>
  <line x1="700" y1="186" x2="700" y2="242" stroke="#374151" stroke-width="1"/>
  <text x="140" y="206" fill="#7ec8e3" font-size="12" text-anchor="middle">품목코드</text>
  <text x="300" y="206" fill="#7ec8e3" font-size="12" text-anchor="middle">품목명</text>
  <text x="460" y="206" fill="#7ec8e3" font-size="12" text-anchor="middle">단가</text>
  <text x="620" y="206" fill="#7ec8e3" font-size="12" text-anchor="middle">수량</text>
  <text x="760" y="206" fill="#55c555" font-size="12" text-anchor="middle">합계 ← 동적 추가</text>
  <!-- Data row -->
  <text x="140" y="228" fill="#888" font-size="11" text-anchor="middle">A001</text>
  <text x="300" y="228" fill="#888" font-size="11" text-anchor="middle">노트북</text>
  <text x="460" y="228" fill="#888" font-size="11" text-anchor="middle">1,200,000</text>
  <text x="620" y="228" fill="#888" font-size="11" text-anchor="middle">5</text>
  <text x="760" y="228" fill="#55c555" font-size="11" text-anchor="middle">6,000,000</text>

  <!-- Column types section -->
  <text x="440" y="274" fill="#e8e8e8" font-size="15" font-weight="600" text-anchor="middle">Grid 컬럼 설정 주요 속성</text>

  <rect x="60" y="288" width="220" height="148" rx="6" fill="#111827" stroke="#374151"/>
  <text x="80" y="312" fill="#7ec8e3" font-size="13" font-weight="600">컬럼 식별</text>
  <text x="80" y="332" fill="#e8e8e8" font-size="12">colid: 내부 식별자</text>
  <text x="80" y="350" fill="#e8e8e8" font-size="12">header: 표시 라벨</text>
  <text x="80" y="368" fill="#e8e8e8" font-size="12">width: 픽셀 너비</text>
  <text x="80" y="386" fill="#e8e8e8" font-size="12">displaytype: 표시 유형</text>
  <text x="80" y="404" fill="#888" font-size="12">  text / number / date</text>
  <text x="80" y="422" fill="#888" font-size="12">  combo / checkbox</text>

  <rect x="310" y="288" width="220" height="148" rx="6" fill="#111827" stroke="#374151"/>
  <text x="330" y="312" fill="#55c555" font-size="13" font-weight="600">편집·표시</text>
  <text x="330" y="332" fill="#e8e8e8" font-size="12">edittype: 편집 유형</text>
  <text x="330" y="350" fill="#888" font-size="12">  none / text / combo</text>
  <text x="330" y="368" fill="#e8e8e8" font-size="12">align: left/center/right</text>
  <text x="330" y="386" fill="#e8e8e8" font-size="12">format: 표시 포맷</text>
  <text x="330" y="404" fill="#888" font-size="12">  #,##0 / YYYY-MM-DD</text>

  <rect x="560" y="288" width="260" height="148" rx="6" fill="#111827" stroke="#374151"/>
  <text x="580" y="312" fill="#7777cc" font-size="13" font-weight="600">바인딩·이벤트</text>
  <text x="580" y="332" fill="#e8e8e8" font-size="12">bindcolumn: Dataset 컬럼</text>
  <text x="580" y="350" fill="#e8e8e8" font-size="12">visible: 표시/숨김</text>
  <text x="580" y="368" fill="#e8e8e8" font-size="12">enable: 활성/비활성</text>
  <text x="580" y="386" fill="#e8e8e8" font-size="12">color: 셀 배경색</text>
  <text x="580" y="404" fill="#888" font-size="12">oncellclick 등 이벤트</text>
</svg>
