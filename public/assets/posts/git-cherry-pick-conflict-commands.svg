<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">충돌 해결 핵심 명령어</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">cherry-pick 충돌 시 필요한 세 가지 명령</text>

  <!-- Left panel: continue path -->
  <text x="220" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">해결 후 계속</text>

  <rect x="60" y="114" width="320" height="152" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="141" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 1. 충돌 파일 편집</text>
  <text x="76" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">vi src/main.py</text>
  <text x="76" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 2. 스테이지에 올리기</text>
  <text x="76" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">git add src/main.py</text>
  <text x="76" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 3. cherry-pick 재개</text>
  <text x="76" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">git cherry-pick --continue</text>
  <text x="76" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve"># 편집기 열림 → 저장 후 완료</text>

  <!-- Right panel: abort/skip -->
  <text x="660" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">중단 / 건너뜀</text>

  <rect x="500" y="114" width="320" height="152" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="516" y="141" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 작업 전체 취소</text>
  <text x="516" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">git cherry-pick --abort</text>
  <text x="516" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 이 커밋만 건너뜀 (범위 픽)</text>
  <text x="516" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git cherry-pick --skip</text>
  <text x="516" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 상태 확인</text>
  <text x="516" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">git status</text>
  <text x="516" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">git cherry-pick --show-current</text>

  <!-- Bottom tip box -->
  <rect x="60" y="292" width="760" height="90" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="88" y="316"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">범위 cherry-pick 충돌 시 진행 상태 확인</text>
  <text x="88" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">cat .git/CHERRY_PICK_HEAD</text>
  <text x="340" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">   # 현재 진행 중인 커밋 SHA</text>
  <text x="88" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git cherry-pick --quit</text>
  <text x="340" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # 상태만 초기화 (변경사항 유지)</text>
</svg>
