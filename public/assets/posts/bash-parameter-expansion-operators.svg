<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Bash 파라미터 확장 — 조건부 기본값 연산자</text>

  <!-- Row 1 Left: ${var:-default} -->
  <rect x="60" y="80" width="360" height="130" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">${var:-default}</text>
  <text x="80" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">var가 미설정이거나 빈값이면 default 반환</text>
  <text x="80" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ var는 변경되지 않음</text>
  <rect x="80" y="163" width="320" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">echo <tspan fill="#ce9178">"${NAME:-홍길동}"</tspan></text>

  <!-- Row 1 Right: ${var:=default} -->
  <rect x="460" y="80" width="360" height="130" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">${var:=default}</text>
  <text x="480" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">var가 미설정이거나 빈값이면 default로</text>
  <text x="480" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ 대입하고 반환 (var 값 변경됨)</text>
  <rect x="480" y="163" width="320" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">echo <tspan fill="#ce9178">"${LOG:=/var/log/app.log}"</tspan></text>

  <!-- Row 2 Left: ${var:?msg} -->
  <rect x="60" y="235" width="360" height="130" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">${var:?msg}</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">var가 미설정이거나 빈값이면 msg를 출력</text>
  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ stderr로 출력 후 스크립트 종료</text>
  <rect x="80" y="318" width="320" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">: <tspan fill="#ce9178">"${DB_HOST:?DB_HOST 필수}"</tspan></text>

  <!-- Row 2 Right: ${var:+alt} -->
  <rect x="460" y="235" width="360" height="130" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">${var:+alt}</text>
  <text x="480" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">var가 설정되어 있으면 alt 반환</text>
  <text x="480" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ 미설정이면 빈 문자열 반환 (역방향)</text>
  <rect x="480" y="318" width="320" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">echo <tspan fill="#ce9178">"${DEBUG:+--verbose}"</tspan></text>

  <!-- Footer note -->
  <text x="440" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">콜론(:) 없이 쓰면 null(설정됐지만 빈값)은 통과시킴 — 콜론 포함 버전 권장</text>
</svg>
