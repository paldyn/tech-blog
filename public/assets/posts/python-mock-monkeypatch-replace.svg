  <text xml:space="preserve" x="616" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  .setattr(...)</text>

  <text x="60" y="294" font-size="13" fill="#888" xml:space="preserve">외부 의존성을 가짜로 바꾸면, 네트워크 없이도 빠르고 결정적인 테스트가 된다.</text>
