<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-teal" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-grn" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tini가 해결하는 두 가지 문제</text>

  <!-- Problem 1: Signal -->
  <rect x="60" y="68" width="360" height="170" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 시그널 전파</text>

  <!-- Without tini -->
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">tini 없이</text>
  <rect x="76" y="124" width="80" height="36" rx="6" fill="#2a1515" stroke="#e05555" stroke-width="1"/>
  <text x="116" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">myapp</text>
  <text x="116" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">PID 1 — 무시</text>

  <text x="200" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555" text-anchor="middle">✕</text>
  <rect x="240" y="124" width="100" height="36" rx="6" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="290" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SIGTERM</text>
  <text x="290" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">→ 무시됨</text>

  <!-- With tini -->
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">tini 사용</text>
  <rect x="76" y="190" width="60" height="36" rx="6" fill="#0f2015" stroke="#55c555" stroke-width="1"/>
  <text x="106" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">tini</text>

  <line x1="136" y1="208" x2="178" y2="208" stroke="#55c555" stroke-width="2" marker-end="url(#arr-grn)"/>

  <rect x="178" y="190" width="70" height="36" rx="6" fill="#0f2015" stroke="#55c555" stroke-width="1"/>
  <text x="213" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">myapp</text>

  <text x="290" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">전파됨 ✓</text>

  <!-- Problem 2: Zombies -->
  <rect x="460" y="68" width="360" height="170" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">② 좀비 프로세스 수거</text>

  <text x="480" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">tini가 없을 때</text>
  <rect x="476" y="124" width="80" height="36" rx="6" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="516" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">myapp</text>
  <rect x="576" y="128" width="80" height="26" rx="4" fill="#2a1515" stroke="#e05555" stroke-width="1"/>
  <text x="616" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">zombie</text>
  <rect x="668" y="128" width="80" height="26" rx="4" fill="#2a1515" stroke="#e05555" stroke-width="1"/>
  <text x="708" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">zombie</text>
  <text x="640" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">wait() 안 하면 PID 테이블 누수</text>

  <text x="480" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">tini가 있을 때</text>
  <rect x="476" y="208" width="50" height="28" rx="4" fill="#0f2015" stroke="#55c555" stroke-width="1"/>
  <text x="501" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">tini</text>
  <text x="560" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 모든 고아 자식 wait() 처리</text>

  <!-- Usage section -->
  <rect x="60" y="258" width="760" height="160" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">tini 사용법</text>

  <rect x="76" y="292" width="728" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">FROM</tspan> node:20-alpine</text>
  <text x="92" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">RUN</tspan> apk add --no-cache tini</text>
  <text x="92" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">COPY</tspan> . .</text>
  <text x="92" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">ENTRYPOINT</tspan> [<tspan fill="#ce9178">"/sbin/tini"</tspan>, <tspan fill="#ce9178">"--"</tspan>]</text>
  <text x="92" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">CMD</tspan>        [<tspan fill="#ce9178">"node"</tspan>, <tspan fill="#ce9178">"server.js"</tspan>]</text>
</svg>
