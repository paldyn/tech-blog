<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">DNS 이름 해석 흐름</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">www.example.com 조회 시 재귀 해석기가 거치는 단계</text>

  <!-- Client -->
  <rect x="40" y="100" width="110" height="54" rx="6" fill="#1a2a3a" stroke="#3a5a7a" stroke-width="1.5"/>
  <text x="95" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">클라이언트</text>
  <text x="95" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">브라우저</text>

  <!-- Recursive Resolver -->
  <rect x="200" y="100" width="130" height="54" rx="6" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="265" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0c055">재귀 해석기</text>
  <text x="265" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ISP/8.8.8.8</text>
  <text x="265" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">캐시 보유</text>

  <!-- Root NS -->
  <rect x="420" y="90" width="130" height="54" rx="6" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="485" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">루트 네임서버</text>
  <text x="485" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">. (점)</text>
  <text x="485" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">13개 클러스터</text>

  <!-- TLD NS -->
  <rect x="420" y="190" width="130" height="54" rx="6" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="485" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0c055">TLD 네임서버</text>
  <text x="485" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.com NS</text>
  <text x="485" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Verisign 운영</text>

  <!-- Authoritative NS -->
  <rect x="420" y="290" width="130" height="54" rx="6" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1.5"/>
  <text x="485" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">권위 네임서버</text>
  <text x="485" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">example.com NS</text>
  <text x="485" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">최종 답변 보유</text>

  <!-- Step arrows -->
  <!-- 1: Client -> Resolver -->
  <line x1="150" y1="127" x2="198" y2="127" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="174" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">① 질의</text>

  <!-- 2: Resolver -> Root -->
  <line x1="330" y1="117" x2="418" y2="117" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="374" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">② Root 질의</text>

  <!-- 3: Root -> Resolver (referral) -->
  <line x1="418" y1="130" x2="330" y2="140" stroke="#e0c055" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="374" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e0c055">③ .com NS 주소</text>

  <!-- 4: Resolver -> TLD -->
  <line x1="330" y1="155" x2="418" y2="200" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="350" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">④ TLD 질의</text>

  <!-- 5: TLD -> Resolver (referral) -->
  <line x1="418" y1="220" x2="330" y2="220" stroke="#e0c055" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="374" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e0c055">⑤ example.com NS</text>

  <!-- 6: Resolver -> Auth -->
  <line x1="330" y1="235" x2="418" y2="300" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="350" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">⑥ Auth 질의</text>

  <!-- 7: Auth -> Resolver (answer) -->
  <line x1="418" y1="320" x2="330" y2="280" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="395" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">⑦ IP 주소 응답</text>

  <!-- 8: Resolver -> Client -->
  <line x1="200" y1="140" x2="150" y2="140" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="174" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">⑧ IP 응답 + 캐시</text>

  <!-- Right side: result box -->
  <rect x="630" y="90" width="220" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="740" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">dig 출력 분석</text>
  <text x="648" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve" font-weight="600">$ dig</text>
  <text x="648" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">     example.com</text>
  <text x="648" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">;; QUESTION SECTION:</text>
  <text x="648" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">;example.com. IN A</text>
  <text x="648" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">;; ANSWER SECTION:</text>
  <text x="648" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">example.com. 3600 IN</text>
  <text x="648" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e0c055" xml:space="preserve"> A 93.184.216.34</text>
  <text x="648" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">;; Query time:</text>
  <text x="648" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve"> 12 msec</text>
  <text x="648" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">;; SERVER:</text>
  <text x="648" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve"> 8.8.8.8#53</text>
  <text x="648" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">;; TTL: 3600초</text>

  <!-- Bottom note -->
  <text x="400" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">캐시가 있으면 ②~⑦ 생략 → 재귀 해석기의 캐시 TTL이 만료되면 다시 순환</text>
</svg>
