  <!-- Redis column header -->
  <rect x="480" y="95" width="340" height="44" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
