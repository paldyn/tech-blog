  <rect x="480" y="396" width="340" height="56" rx="6" fill="#111" stroke="#2a2a3a" stroke-width="1"/>
  <text x="650" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
