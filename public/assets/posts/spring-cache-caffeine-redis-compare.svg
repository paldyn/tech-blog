  <rect x="60" y="483" width="340" height="40" rx="6" fill="#111" stroke="#2a3a2a" stroke-width="1"/>
  <text x="230" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle">불필요 (객체 참조 직접 저장)</text>
  <rect x="480" y="483" width="340" height="40" rx="6" fill="#111" stroke="#2a2a3a" stroke-width="1"/>
  <text x="650" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7777cc" text-anchor="middle">필요 (JSON / 바이트 직렬화)</text>
</svg>
