  <rect x="60" y="174" width="340" height="44" rx="6" fill="#111" stroke="#2a3a2a" stroke-width="1"/>
  <text x="230" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">JVM 힙 메모리 (프로세스 내부)</text>
  <rect x="480" y="174" width="340" height="44" rx="6" fill="#111" stroke="#2a2a3a" stroke-width="1"/>
  <text x="650" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
