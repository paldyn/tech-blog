<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">함수 합성 — compose vs pipe</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Function Composition: Right-to-Left vs Left-to-Right</text>

  <!-- compose (right to left) -->
  <rect x="60" y="90" width="360" height="260" fill="#0d0d1a" rx="10" stroke="#1a1a3a" stroke-width="1.5"/>
  <text x="240" y="114" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">compose (오른쪽 → 왼쪽)</text>
  <text x="240" y="132" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">수학 표기법: (f∘g)(x) = f(g(x))</text>

  <rect x="76" y="142" width="328" height="186" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="162" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> compose = (...fns) =&gt;</text>
  <text x="92" y="180" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  x =&gt; fns.reduceRight((v, f) =&gt; f(v), x);</text>
  <text x="92" y="202" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 오른쪽부터 실행</text>
  <text x="92" y="220" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> process = compose(</text>
  <text x="92" y="238" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  toUpperCase,  <tspan fill="#6a8aa0">// 3번째</tspan></text>
  <text x="92" y="256" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  trim,         <tspan fill="#6a8aa0">// 2번째</tspan></text>
  <text x="92" y="274" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  toLowerCase   <tspan fill="#6a8aa0">// 1번째</tspan></text>
  <text x="92" y="292" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">);</text>
  <text x="92" y="314" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">process(<tspan fill="#ce9178">'  Hello  '</tspan>);</text>

  <!-- pipe (left to right) -->
  <rect x="460" y="90" width="360" height="260" fill="#0d1a0d" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="640" y="114" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">pipe (왼쪽 → 오른쪽)</text>
  <text x="640" y="132" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">읽기 순서와 실행 순서 일치</text>

  <rect x="476" y="142" width="328" height="186" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="162" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> pipe = (...fns) =&gt;</text>
  <text x="492" y="180" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  x =&gt; fns.reduce((v, f) =&gt; f(v), x);</text>
  <text x="492" y="202" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 왼쪽부터 실행</text>
  <text x="492" y="220" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> process = pipe(</text>
  <text x="492" y="238" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  toLowerCase,  <tspan fill="#6a8aa0">// 1번째</tspan></text>
  <text x="492" y="256" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  trim,         <tspan fill="#6a8aa0">// 2번째</tspan></text>
  <text x="492" y="274" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  toUpperCase   <tspan fill="#6a8aa0">// 3번째</tspan></text>
  <text x="492" y="292" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">);</text>
  <text x="492" y="314" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">process(<tspan fill="#ce9178">'  Hello  '</tspan>);</text>

  <!-- data flow arrows -->
  <rect x="60" y="370" width="760" height="68" fill="#0d0d0d" rx="8" stroke="#1e2433" stroke-width="1"/>
  <!-- pipe data flow -->
  <text x="440" y="390" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">pipe 데이터 흐름</text>
  <rect x="76" y="398" width="120" height="26" fill="#1a1a3a" rx="6"/>
  <text x="136" y="415" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" text-anchor="middle">'  Hello  '</text>
  <polygon points="200,411 212,405 212,417" fill="#7ec8e3"/>
  <rect x="214" y="398" width="110" height="26" fill="#1a1a3a" rx="6"/>
  <text x="269" y="415" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" text-anchor="middle">'  hello  '</text>
  <polygon points="328,411 340,405 340,417" fill="#7ec8e3"/>
  <rect x="342" y="398" width="110" height="26" fill="#1a1a3a" rx="6"/>
  <text x="397" y="415" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" text-anchor="middle">'hello'</text>
  <polygon points="456,411 468,405 468,417" fill="#55c555"/>
  <rect x="470" y="398" width="130" height="26" fill="#0a1a0a" rx="6"/>
  <text x="535" y="415" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" text-anchor="middle">'HELLO'</text>

  <!-- Footer -->
  <text x="440" y="458" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
