<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Cone 모드 vs Non-cone 모드</text>

  <!-- Cone mode -->
  <rect x="60" y="68" width="370" height="340" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Cone 모드 (권장)</text>
  <text x="245" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">--cone (Git 2.25+ 기본값)</text>

  <rect x="80" y="128" width="330" height="110" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git sparse-checkout init</text>
  <text x="96" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git sparse-checkout set \</text>
  <text x="96" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">  apps/backend \</text>
  <text x="96" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">  packages/shared</text>
  <text x="96" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 루트 파일은 항상 포함됨</text>

  <rect x="80" y="252" width="330" height="80" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 성능 최적화됨</text>
  <text x="245" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">디렉터리 단위로 패턴 처리</text>
  <text x="245" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">대용량 저장소에 적합</text>

  <text x="245" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">목록 확인: git sparse-checkout list</text>
  <text x="245" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">해제: git sparse-checkout disable</text>

  <!-- Non-cone mode -->
  <rect x="450" y="68" width="370" height="340" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="635" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Non-cone 모드</text>
  <text x="635" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">--no-cone (글로브 패턴 사용)</text>

  <rect x="470" y="128" width="330" height="110" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git sparse-checkout init</text>
  <text x="486" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># .git/info/sparse-checkout 편집</text>
  <text x="486" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">/*</text>
  <text x="486" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">!/docs/</text>
  <text x="486" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">apps/backend/**</text>

  <rect x="470" y="252" width="330" height="80" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="635" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">글로브 패턴으로 세밀한 제어</text>
  <text x="635" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">특정 파일 포함/제외 가능</text>
  <text x="635" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">성능이 cone 모드보다 낮음</text>

  <text x="635" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">!pattern: 해당 경로 제외</text>
  <text x="635" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">/path: 루트 기준 경로</text>

  <!-- Bottom note -->
  <rect x="60" y="424" width="760" height="24" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">대부분의 경우 cone 모드로 충분 — 단순하고 빠름</text>
</svg>
