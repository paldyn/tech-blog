<svg width="880" height="560" viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="garr" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#44aa66"/>
    </marker>
    <marker id="sarr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">클로저 — 함수가 스코프를 기억하는 원리</text>
  <text x="440" y="76" text-anchor="middle" font-size="13" fill="#666">outer 함수가 끝나도 inner 함수는 outer의 환경을 붙잡는다</text>

  <!-- outer function scope container -->
  <rect x="60" y="108" width="760" height="296" rx="10" fill="#0e1a0e" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="86" y="138" font-size="13" fill="#55aa77" font-weight="600" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">function makeCounter()</text>
  <text x="248" y="138" font-size="12" fill="#777">— outer 스코프</text>

  <!-- count variable box (left) -->
  <rect x="86" y="160" width="232" height="80" rx="8" fill="#0a120a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="202" y="184" text-anchor="middle" font-size="11" fill="#888">렉시컬 환경 (Lexical Environment)</text>
  <text x="202" y="216" text-anchor="middle" font-size="16" fill="#66cc88" font-weight="600" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">count = 0</text>

  <!-- inner function box (right) — IDE-like code block -->
  <rect x="350" y="160" width="448" height="220" rx="10" fill="#0a0f1a" stroke="#2a3f6e" stroke-width="1.5"/>
  <text x="574" y="184" text-anchor="middle" font-size="12" fill="#7799dd" font-weight="600">반환된 함수 (클로저)</text>

  <!-- code area inside the inner function box -->
  <rect x="370" y="198" width="408" height="118" rx="6" fill="#070a14" stroke="#1a2240" stroke-width="1"/>
  <text x="392" y="225" font-size="13" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">function () {</text>
  <text x="412" y="248" font-size="13" fill="#7799dd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">count += 1;</text>
  <text x="412" y="271" font-size="13" fill="#7799dd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">return count;</text>
  <text x="392" y="294" font-size="13" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- annotation under code, well-spaced from container border -->
  <text x="574" y="346" text-anchor="middle" font-size="12" fill="#667788">선언 시점의 렉시컬 환경을</text>
  <text x="574" y="364" text-anchor="middle" font-size="12" fill="#667788">[[Environment]] 슬롯에 저장</text>

  <!-- Reference arrow from inner function to count variable -->
  <path d="M 350 256 C 320 256, 320 220, 318 200" stroke="#55aa77" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#garr)"/>
  <text x="298" y="250" text-anchor="end" font-size="11" fill="#55aa77">count 참조</text>

  <!-- Timeline section -->
  <text x="86" y="446" font-size="12" fill="#777" font-weight="600">실행 흐름</text>
  <line x1="86" y1="466" x2="794" y2="466" stroke="#222" stroke-width="1"/>

  <circle cx="170" cy="466" r="6" fill="#55aa77"/>
  <text x="170" y="490" text-anchor="middle" font-size="11" fill="#55aa77" font-weight="600">① makeCounter() 호출</text>
  <text x="170" y="508" text-anchor="middle" font-size="11" fill="#666">count 생성</text>

  <circle cx="350" cy="466" r="6" fill="#7799dd"/>
  <text x="350" y="490" text-anchor="middle" font-size="11" fill="#7799dd" font-weight="600">② 내부 함수 반환</text>
  <text x="350" y="508" text-anchor="middle" font-size="11" fill="#666">outer 실행 종료</text>

  <circle cx="530" cy="466" r="6" fill="#cc8855"/>
  <text x="530" y="490" text-anchor="middle" font-size="11" fill="#cc8855" font-weight="600">③ counter() 호출</text>
  <text x="530" y="508" text-anchor="middle" font-size="11" fill="#666">count = 1</text>

  <circle cx="710" cy="466" r="6" fill="#cc8855"/>
  <text x="710" y="490" text-anchor="middle" font-size="11" fill="#cc8855" font-weight="600">④ counter() 재호출</text>
  <text x="710" y="508" text-anchor="middle" font-size="11" fill="#666">count = 2 (기억됨!)</text>

  <line x1="178" y1="466" x2="342" y2="466" stroke="#3a3a3a" stroke-width="1" marker-end="url(#sarr)"/>
  <line x1="358" y1="466" x2="522" y2="466" stroke="#3a3a3a" stroke-width="1" marker-end="url(#sarr)"/>
  <line x1="538" y1="466" x2="702" y2="466" stroke="#3a3a3a" stroke-width="1" marker-end="url(#sarr)"/>

  <text x="440" y="540" text-anchor="middle" font-size="11" fill="#555">outer 함수가 종료된 후에도 count는 GC(가비지 컬렉션)되지 않고 클로저가 붙잡고 있다</text>
</svg>
