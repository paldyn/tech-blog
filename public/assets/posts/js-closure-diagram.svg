<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">нҒҙлЎңм Җ вҖ” н•ЁмҲҳк°Җ мҠӨмҪ”н”„лҘј кё°м–өн•ҳлҠ” мӣҗлҰ¬</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#555">outer н•ЁмҲҳк°Җ лҒқлӮҳлҸ„ inner н•ЁмҲҳлҠ” outerмқҳ нҷҳкІҪмқ„ л¶ҷмһЎлҠ”лӢӨ</text>

  <!-- outer function scope -->
  <rect x="60" y="90" width="760" height="310" rx="10" fill="#0e1a0e" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="88" y="118" font-size="13" fill="#44aa66" font-weight="600">function makeCounter() вҖ” outer мҠӨмҪ”н”„</text>

  <!-- count variable box -->
  <rect x="88" y="130" width="220" height="52" rx="8" fill="#0a120a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="198" y="151" text-anchor="middle" font-size="12" fill="#888">л үмӢңм»¬ нҷҳкІҪ (Lexical Environment)</text>
  <text x="198" y="172" text-anchor="middle" font-size="14" fill="#55cc77" font-weight="700">count = 0</text>

  <!-- inner function box -->
  <rect x="340" y="120" width="420" height="200" rx="10" fill="#0a0f1a" stroke="#223355" stroke-width="1.5"/>
  <text x="550" y="148" text-anchor="middle" font-size="13" fill="#6688cc" font-weight="600">л°ҳнҷҳлҗң н•ЁмҲҳ (нҒҙлЎңм Җ)</text>

  <rect x="360" y="160" width="380" height="140" rx="6" fill="#080c14"/>
  <text x="550" y="185" text-anchor="middle" font-size="12" fill="#888">function() {</text>
  <text x="550" y="208" text-anchor="middle" font-size="12" fill="#6688cc">  count += 1;  вҶҗ outerмқҳ countлҘј м°ёмЎ°</text>
  <text x="550" y="228" text-anchor="middle" font-size="12" fill="#6688cc">  return count;</text>
  <text x="550" y="248" text-anchor="middle" font-size="12" fill="#888">}</text>
  <text x="550" y="276" text-anchor="middle" font-size="11" fill="#446">нҒҙлЎңм ҖлҠ” м„ м–ё мӢңм җмқҳ л үмӢңм»¬ нҷҳкІҪмқ„ [[Environment]]м—җ м ҖмһҘ</text>

  <!-- Reference arrow -->
  <path d="M 360 215 L 310 175" stroke="#44aa66" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#garr)"/>

  <!-- Timeline at bottom -->
  <text x="88" y="365" font-size="12" fill="#555" font-weight="600">мӢӨн–ү нқҗлҰ„</text>
  <line x1="88" y1="378" x2="792" y2="378" stroke="#222" stroke-width="1"/>

  <circle cx="160" cy="378" r="5" fill="#44aa66"/>
  <text x="160" y="398" text-anchor="middle" font-size="11" fill="#44aa66">в‘  makeCounter() нҳём¶ң</text>
  <text x="160" y="413" text-anchor="middle" font-size="11" fill="#666">count мғқм„ұ</text>

  <circle cx="340" cy="378" r="5" fill="#6688cc"/>
  <text x="340" y="398" text-anchor="middle" font-size="11" fill="#6688cc">в‘Ў лӮҙл¶Җ н•ЁмҲҳ л°ҳнҷҳ</text>
  <text x="340" y="413" text-anchor="middle" font-size="11" fill="#666">outer мӢӨн–ү мў…лЈҢ</text>

  <circle cx="520" cy="378" r="5" fill="#cc8844"/>
  <text x="520" y="398" text-anchor="middle" font-size="11" fill="#cc8844">в‘ў counter() нҳём¶ң</text>
  <text x="520" y="413" text-anchor="middle" font-size="11" fill="#666">count = 1</text>

  <circle cx="700" cy="378" r="5" fill="#cc8844"/>
  <text x="700" y="398" text-anchor="middle" font-size="11" fill="#cc8844">в‘Ј counter() мһ¬нҳём¶ң</text>
  <text x="700" y="413" text-anchor="middle" font-size="11" fill="#666">count = 2 (кё°м–өлҗЁ!)</text>

  <line x1="165" y1="378" x2="335" y2="378" stroke="#333" stroke-width="1" marker-end="url(#sarr)"/>
  <line x1="345" y1="378" x2="515" y2="378" stroke="#333" stroke-width="1" marker-end="url(#sarr)"/>
  <line x1="525" y1="378" x2="695" y2="378" stroke="#333" stroke-width="1" marker-end="url(#sarr)"/>

  <text x="440" y="448" text-anchor="middle" font-size="11" fill="#444">outer н•ЁмҲҳк°Җ мў…лЈҢлҗң нӣ„м—җлҸ„ countлҠ” GC(к°Җл№„м§Җ м»¬л үм…ҳ)лҗҳм§Җ м•Ҡкі  нҒҙлЎңм Җк°Җ л¶ҷмһЎкі  мһҲмқҢ</text>

  <defs>
    <marker id="garr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#44aa66"/>
    </marker>
    <marker id="sarr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
