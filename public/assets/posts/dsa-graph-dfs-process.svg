<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-dfs" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DFS — 재귀 탐색 &amp; 사이클 감지</text>

  <!-- Graph (left) -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">방향 그래프</text>

  <circle cx="130" cy="120" r="22" fill="#1a3a1a" stroke="#55c555" stroke-width="2.5"/>
  <text x="130" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">0</text>

  <circle cx="80" cy="230" r="22" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">1</text>

  <circle cx="180" cy="230" r="22" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">2</text>

  <circle cx="80" cy="340" r="22" fill="#2e2a1a" stroke="#e8c060" stroke-width="2"/>
  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c060" text-anchor="middle">3</text>

  <circle cx="180" cy="340" r="22" fill="#2e1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="180" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">4</text>

  <!-- Edges -->
  <line x1="114" y1="137" x2="92" y2="213" stroke="#888" stroke-width="1.5" marker-end="url(#arr-dfs)"/>
  <line x1="146" y1="137" x2="168" y2="213" stroke="#888" stroke-width="1.5" marker-end="url(#arr-dfs)"/>
  <line x1="80" y1="252" x2="80" y2="318" stroke="#888" stroke-width="1.5" marker-end="url(#arr-dfs)"/>
  <line x1="100" y1="247" x2="162" y2="325" stroke="#888" stroke-width="1.5" marker-end="url(#arr-dfs)"/>
  <!-- Back edge: 4→2 (cycle) -->
  <path d="M 197 328 Q 250 280 197 248" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-dfs)"/>
  <text x="248" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">back edge</text>
  <text x="248" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">(사이클!)</text>

  <!-- DFS traversal order -->
  <text x="310" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">DFS 순서 (방문 / 완료 시각)</text>

  <!-- Timeline of DFS calls -->
  <rect x="310" y="90" width="520" height="330" rx="6" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Step annotations -->
  <text x="326" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">visit(0)    in=1</text>
  <text x="340" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  visit(1)  in=2</text>
  <text x="354" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c060">    visit(3) in=3</text>
  <text x="354" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c060">    done(3) out=4</text>
  <text x="354" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">    visit(4) in=5</text>
  <text x="368" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">      back→2 (사이클)</text>
  <text x="354" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">    done(4) out=6</text>
  <text x="340" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  done(1)  out=7</text>
  <text x="340" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  visit(2)  in=8</text>
  <text x="340" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  done(2)  out=9</text>
  <text x="326" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">done(0)    out=10</text>
  <text x="326" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">방문 순서: 0,1,3,4,2</text>
  <text x="326" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">완료 순서 역순: 위상 정렬 기초</text>
  <text x="326" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">사이클 감지: 현재 경로 스택 재방문 = back edge</text>

  <!-- Legend -->
  <text x="60" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">노드 색:</text>
  <circle cx="120" cy="393" r="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="134" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">시작</text>
  <circle cx="175" cy="393" r="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="189" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">내부</text>
  <circle cx="230" cy="393" r="8" fill="#2e2a1a" stroke="#e8c060" stroke-width="1.5"/>
  <text x="244" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리프</text>
  <circle cx="285" cy="393" r="8" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="299" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">back edge 포함</text>

  <text x="60" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">DFS 시간: O(V+E)  |  스택 공간: O(V)  |  완료 역순 = 위상 정렬</text>
  <text x="60" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">in/out 타임스탬프: 조상-자손 관계 판별, 트리 간선/백/순방향/교차 간선 분류</text>
</svg>
