<svg xmlns="http://www.w3.org/2000/svg" width="880" height="318" viewBox="0 0 880 318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="318" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">같은 일을 하는 두 가지 코드</text>

  <text x="50" y="90" font-size="16" font-weight="600" fill="#e05555">Non-Pythonic</text>
  <rect x="50" y="104" width="360" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="68" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">result = []</tspan></text>
  <text xml:space="preserve" x="68" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">i = </tspan><tspan fill="#b5cea8">0</tspan></text>
  <text xml:space="preserve" x="68" y="178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> i &lt; len(items):</tspan></text>
  <text xml:space="preserve" x="68" y="200" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    result.append(items[i] * </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)</tspan></text>
  <text xml:space="preserve" x="68" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    i += </tspan><tspan fill="#b5cea8">1</tspan></text>
  <text xml:space="preserve" x="68" y="252" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># 인덱스를 직접 굴린다</tspan></text>

  <text x="470" y="90" font-size="16" font-weight="600" fill="#55c555">Pythonic</text>
  <rect x="470" y="104" width="360" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="488" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># 의도가 한 줄에 드러난다</tspan></text>
  <text xml:space="preserve" x="488" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">result = [x * </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> x </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> items]</tspan></text>
  <text xml:space="preserve" x="488" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># 무엇을 만드는지가 먼저,</tspan></text>
  <text xml:space="preserve" x="488" y="244" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># 어떻게는 언어에 맡긴다</tspan></text>

  <text x="60" y="304" font-size="13" fill="#888">결과는 같지만, 오른쪽은 "무엇을" 만드는지를 곧장 말한다 — 그것이 파이썬다움이다.</text>
</svg>
