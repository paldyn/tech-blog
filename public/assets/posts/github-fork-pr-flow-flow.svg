<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Fork &amp; Pull Request 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">push 권한 없이 내 포크에서 작업하고 PR로 제안한다</text>

  <!-- upstream -->
  <rect x="300" y="100" width="280" height="64" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">upstream (원본 저장소)</text>
  <text x="440" y="150" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">org/project — 읽기만 가능</text>

  <!-- fork arrow down -->
  <line x1="300" y1="140" x2="195" y2="216" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="200" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">① Fork</text>

  <!-- origin fork -->
  <rect x="60" y="218" width="280" height="64" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">origin (내 포크)</text>
  <text x="200" y="268" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">me/project — 읽기·쓰기</text>

  <!-- clone arrow -->
  <line x1="200" y1="282" x2="200" y2="338" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="248" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">② Clone</text>

  <!-- local -->
  <rect x="60" y="340" width="280" height="64" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="200" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9988dd">로컬 작업 복제본</text>
  <text x="200" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">③ 브랜치 만들고 커밋</text>

  <!-- push back to origin -->
  <line x1="340" y1="360" x2="404" y2="282" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="408" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">④ Push (origin)</text>

  <!-- PR from fork to upstream -->
  <line x1="560" y1="240" x2="560" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="650" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">⑤ PR → upstream</text>

  <text x="440" y="440" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#888">PR은 내 포크의 브랜치를 원본 저장소의 base 브랜치와 비교해 만들어진다</text>
</svg>
