<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-pu" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-gr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">함수형 라우팅 구조</text>

  <!-- Request -->
  <rect x="60" y="140" width="120" height="44" rx="8" fill="#1a2035" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">HTTP 요청</text>

  <!-- Arrow to RouterFunction -->
  <line x1="180" y1="162" x2="228" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- RouterFunction box -->
  <rect x="230" y="96" width="200" height="132" rx="10" fill="#0d1f3c" stroke="#4a7ab5" stroke-width="2"/>
  <text x="330" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">RouterFunction</text>
  <line x1="240" y1="134" x2="420" y2="134" stroke="#4a7ab5" stroke-width="1" stroke-opacity="0.5"/>

  <rect x="248" y="144" width="164" height="28" rx="5" fill="#0f2845" stroke="#4a7ab5" stroke-width="1"/>
  <text x="330" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">route(predicate, handler)</text>

  <rect x="248" y="180" width="164" height="28" rx="5" fill="#0f2845" stroke="#4a7ab5" stroke-width="1"/>
  <text x="330" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">GET("/path", handler)</text>

  <!-- Arrow RouterFunction → RequestPredicate -->
  <line x1="330" y1="228" x2="330" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="338" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">매칭</text>

  <!-- RequestPredicate box -->
  <rect x="230" y="260" width="200" height="80" rx="8" fill="#141c2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="330" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">RequestPredicate</text>
  <text x="330" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">method + path + content-type</text>
  <text x="330" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">+ accept + header + ...</text>

  <!-- Arrow Predicate matched → HandlerFunction -->
  <line x1="430" y1="300" x2="498" y2="240" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-gr)"/>
  <text x="468" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">매칭됨</text>

  <!-- HandlerFunction box -->
  <rect x="500" y="140" width="200" height="200" rx="10" fill="#0f2010" stroke="#55c555" stroke-width="2"/>
  <text x="600" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">HandlerFunction</text>
  <line x1="510" y1="178" x2="690" y2="178" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>

  <rect x="516" y="188" width="168" height="28" rx="5" fill="#082010" stroke="#55c555" stroke-width="1"/>
  <text x="600" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">handle(ServerRequest)</text>

  <rect x="516" y="224" width="168" height="28" rx="5" fill="#082010" stroke="#55c555" stroke-width="1"/>
  <text x="600" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">→ Mono&lt;ServerResponse&gt;</text>

  <!-- ServerRequest -->
  <rect x="516" y="260" width="80" height="28" rx="5" fill="#082010" stroke="#55c555" stroke-width="1"/>
  <text x="556" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">pathVariable</text>

  <rect x="604" y="260" width="80" height="28" rx="5" fill="#082010" stroke="#55c555" stroke-width="1"/>
  <text x="644" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">bodyToMono</text>

  <rect x="516" y="296" width="80" height="28" rx="5" fill="#082010" stroke="#55c555" stroke-width="1"/>
  <text x="556" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">queryParam</text>

  <rect x="604" y="296" width="80" height="28" rx="5" fill="#082010" stroke="#55c555" stroke-width="1"/>
  <text x="644" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">headers</text>

  <!-- Arrow HandlerFunction → ServerResponse -->
  <line x1="700" y1="240" x2="748" y2="240" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gr)"/>

  <!-- ServerResponse box -->
  <rect x="750" y="168" width="112" height="160" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="806" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">ServerResponse</text>
  <line x1="760" y1="204" x2="852" y2="204" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>

  <rect x="762" y="214" width="88" height="24" rx="4" fill="#082010" stroke="#55c555" stroke-width="1"/>
  <text x="806" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">ok().body()</text>

  <rect x="762" y="246" width="88" height="24" rx="4" fill="#082010" stroke="#55c555" stroke-width="1"/>
  <text x="806" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">created(uri)</text>

  <rect x="762" y="278" width="88" height="24" rx="4" fill="#082010" stroke="#55c555" stroke-width="1"/>
  <text x="806" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">notFound()</text>

  <rect x="762" y="310" width="88" height="24" rx="4" fill="#082010" stroke="#55c555" stroke-width="1"/>
  <text x="806" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">status(code)</text>

  <!-- Nesting note -->
  <rect x="60" y="380" width="700" height="80" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="410" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">중첩 라우팅 (nest)</text>
  <text x="410" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RouterFunctions.route().nest(path("/api/v1"), r -&gt; r</text>
  <text x="410" y="444" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  .nest(path("/users"), userRouter).nest(path("/orders"), orderRouter))</text>
</svg>
