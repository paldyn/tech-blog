<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">통계 정보 수집 &amp; SQL 튜닝 어드바이저 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">Optimizer Statistics → CBO → Tuning Advisor</text>

  <!-- Step 1: Data -->
  <rect x="60" y="100" width="160" height="80" rx="12" fill="#112236" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">테이블 / 인덱스</text>
  <text x="140" y="154" text-anchor="middle" font-size="12" fill="#aaaaaa">데이터 분포</text>
  <text x="140" y="170" text-anchor="middle" font-size="11" fill="#888">rows, distinct, histogram</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="140" x2="295" y2="140" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="295,135 310,140 295,145" fill="#7ec8e3"/>
  <text x="257" y="130" text-anchor="middle" font-size="11" fill="#888">DBMS_STATS</text>

  <!-- Step 2: Statistics -->
  <rect x="310" y="100" width="160" height="80" rx="12" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">옵티마이저 통계</text>
  <text x="390" y="154" text-anchor="middle" font-size="12" fill="#aaaaaa">DBA_TAB_STATISTICS</text>
  <text x="390" y="170" text-anchor="middle" font-size="11" fill="#888">DBA_HISTOGRAMS</text>

  <!-- Arrow 2 -->
  <line x1="470" y1="140" x2="545" y2="140" stroke="#55c555" stroke-width="2"/>
  <polygon points="545,135 560,140 545,145" fill="#55c555"/>
  <text x="507" y="130" text-anchor="middle" font-size="11" fill="#888">입력</text>

  <!-- Step 3: CBO -->
  <rect x="560" y="100" width="160" height="80" rx="12" fill="#1a1208" stroke="#e0a833" stroke-width="1.5"/>
  <text x="640" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#e0a833">CBO</text>
  <text x="640" y="154" text-anchor="middle" font-size="12" fill="#aaaaaa">실행 계획 생성</text>
  <text x="640" y="170" text-anchor="middle" font-size="11" fill="#888">Cost 기반 최적 경로</text>

  <!-- Arrow 3 down -->
  <line x1="640" y1="180" x2="640" y2="240" stroke="#e0a833" stroke-width="2"/>
  <polygon points="635,240 640,256 645,240" fill="#e0a833"/>
  <text x="660" y="220" font-size="11" fill="#888">나쁜 계획 발생</text>

  <!-- SQL Tuning Advisor box -->
  <rect x="460" y="256" width="360" height="100" rx="12" fill="#1a0e1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="284" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">SQL Tuning Advisor (STA)</text>
  <text x="640" y="306" text-anchor="middle" font-size="12" fill="#aaaaaa">DBMS_SQLTUNE으로 태스크 생성·실행</text>
  <text x="640" y="326" text-anchor="middle" font-size="12" fill="#aaaaaa">통계 수집·인덱스 생성·SQL Profile 권고</text>
  <text x="640" y="346" text-anchor="middle" font-size="11" fill="#888">Tuning Pack 라이선스 필요</text>

  <!-- Recommendations -->
  <rect x="60" y="256" width="370" height="100" rx="12" fill="#0e1623" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="284" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">STA 권고 유형</text>
  <text x="80" y="308" font-size="13" fill="#55c555">✓</text>
  <text x="98" y="308" font-size="12" fill="#e8e8e8">Statistics: 통계 정보 부실 → 재수집 권고</text>
  <text x="80" y="328" font-size="13" fill="#55c555">✓</text>
  <text x="98" y="328" font-size="12" fill="#e8e8e8">SQL Profile: 자동 힌트 세트 적용</text>
  <text x="80" y="348" font-size="13" fill="#55c555">✓</text>
  <text x="98" y="348" font-size="12" fill="#e8e8e8">Index: 신규 인덱스 생성 권고</text>

  <!-- Arrow STA -> Recommendations -->
  <line x1="460" y1="306" x2="430" y2="306" stroke="#7777cc" stroke-width="2"/>
  <polygon points="430,301 415,306 430,311" fill="#7777cc"/>

  <!-- SQL Access Advisor -->
  <rect x="60" y="390" width="760" height="80" rx="12" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="418" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">SQL Access Advisor (SAA)</text>
  <text x="440" y="442" text-anchor="middle" font-size="12" fill="#aaaaaa">워크로드 전체를 분석해 인덱스·MV 생성 권고 — DBMS_ADVISOR 패키지</text>
  <text x="440" y="462" text-anchor="middle" font-size="11" fill="#888">STA가 단일 SQL, SAA가 전체 워크로드 대상</text>
</svg>
