<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">정렬(Sort) 비용 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">O(N log N) 메모리 정렬 vs 디스크 External Sort</text>

  <!-- Memory sort -->
  <rect x="60" y="95" width="360" height="260" fill="#111" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">메모리 내 정렬 (In-memory Sort)</text>

  <!-- Data blocks -->
  <rect x="80" y="135" width="50" height="30" fill="#0d1520" rx="4" stroke="#7ec8e3"/>
  <text x="105" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">3</text>
  <rect x="138" y="135" width="50" height="30" fill="#0d1520" rx="4" stroke="#7ec8e3"/>
  <text x="163" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">1</text>
  <rect x="196" y="135" width="50" height="30" fill="#0d1520" rx="4" stroke="#7ec8e3"/>
  <text x="221" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">4</text>
  <rect x="254" y="135" width="50" height="30" fill="#0d1520" rx="4" stroke="#7ec8e3"/>
  <text x="279" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">2</text>
  <rect x="312" y="135" width="50" height="30" fill="#0d1520" rx="4" stroke="#7ec8e3"/>
  <text x="337" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">5</text>

  <!-- Arrow down -->
  <line x1="240" y1="167" x2="240" y2="195" stroke="#555" stroke-width="1.5"/>
  <polygon points="240,205 233,192 247,192" fill="#555"/>
  <text x="265" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Quick/Merge Sort</text>

  <!-- Sorted -->
  <rect x="80" y="207" width="50" height="30" fill="#0e1a0e" rx="4" stroke="#55c555"/>
  <text x="105" y="226" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">1</text>
  <rect x="138" y="207" width="50" height="30" fill="#0e1a0e" rx="4" stroke="#55c555"/>
  <text x="163" y="226" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">2</text>
  <rect x="196" y="207" width="50" height="30" fill="#0e1a0e" rx="4" stroke="#55c555"/>
  <text x="221" y="226" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">3</text>
  <rect x="254" y="207" width="50" height="30" fill="#0e1a0e" rx="4" stroke="#55c555"/>
  <text x="279" y="226" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">4</text>
  <rect x="312" y="207" width="50" height="30" fill="#0e1a0e" rx="4" stroke="#55c555"/>
  <text x="337" y="226" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">5</text>

  <text x="240" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">work_mem 안에 데이터가 들어오면</text>
  <text x="240" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(N log N) CPU만으로 처리</text>

  <rect x="80" y="310" width="320" height="32" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="96" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0">-- PostgreSQL</tspan><tspan fill="#888">            SET work_mem = '256MB';</tspan></text>

  <!-- External sort (right) -->
  <rect x="460" y="95" width="360" height="260" fill="#111" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">External Sort (디스크 Spill)</text>

  <text x="640" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">데이터 &gt; work_mem</text>

  <!-- Phase 1: Run creation -->
  <rect x="478" y="158" width="140" height="40" fill="#1a0e0e" rx="4" stroke="#e05555"/>
  <text x="548" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Phase 1: Run 생성</text>
  <text x="548" y="192" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">청크 정렬 → 디스크</text>

  <!-- Arrow -->
  <line x1="618" y1="178" x2="648" y2="178" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="662,178 648,171 648,185" fill="#e05555"/>

  <!-- Phase 2: Merge -->
  <rect x="662" y="158" width="140" height="40" fill="#1a0e0e" rx="4" stroke="#e05555"/>
  <text x="732" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Phase 2: Merge</text>
  <text x="732" y="192" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">Run들을 합병</text>

  <text x="640" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">디스크 I/O 다수 발생 → 느림</text>
  <text x="640" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">EXPLAIN에 "Sort Method: external merge"</text>
  <text x="640" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">표시 → work_mem 부족</text>

  <rect x="478" y="310" width="324" height="32" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="494" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0">-- 세션 단위로 증량</tspan><tspan fill="#888">               SET work_mem=…;</tspan></text>

  <!-- Tips -->
  <rect x="60" y="378" width="760" height="80" fill="#0d0d18" rx="6" stroke="#1e2433"/>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">정렬 비용 절감 전략</text>
  <text x="240" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">인덱스 정렬로 대체</text>
  <text x="240" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ORDER BY 컬럼 = 인덱스 순서</text>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">work_mem 증량</text>
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Spill 방지</text>
  <text x="660" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">불필요한 ORDER BY 제거</text>
  <text x="660" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">애플리케이션 정렬 고려</text>
</svg>
