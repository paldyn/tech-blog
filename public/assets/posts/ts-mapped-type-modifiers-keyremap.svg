<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">as 절 키 재매핑</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">매핑 도중 키 이름을 변환하거나 필터링</text>

  <!-- Left: key rename -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">키 이름 변환 (getter 패턴)</text>
  <rect x="60" y="116" width="360" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Getters&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt; = {</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  [<tspan fill="#7ec8e3" font-weight="600">K</tspan> <tspan fill="#7ec8e3" font-weight="600">in</tspan> <tspan fill="#7ec8e3" font-weight="600">keyof</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan> <tspan fill="#7ec8e3" font-weight="600">as</tspan></text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#ce9178">`get${Capitalize&lt;string &amp; K&gt;}`</tspan></text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  ]: () =&gt; <tspan fill="#7ec8e3" font-weight="600">T</tspan>[<tspan fill="#7ec8e3" font-weight="600">K</tspan>];</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">};</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Getters&lt;{name:string; age:number}&gt;</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// = { getName:()=&gt;string; getAge:()=&gt;number }</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 키: name-&gt;getName, age-&gt;getAge</text>

  <!-- Right: filter keys -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">특정 키 필터링 (never로 제거)</text>
  <rect x="460" y="116" width="360" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// as 절에서 never 반환 → 키 제거</text>
  <text x="476" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> OnlyFunctions&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt; = {</text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  [<tspan fill="#7ec8e3" font-weight="600">K</tspan> <tspan fill="#7ec8e3" font-weight="600">in</tspan> <tspan fill="#7ec8e3" font-weight="600">keyof</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan> <tspan fill="#7ec8e3" font-weight="600">as</tspan></text>
  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">T</tspan>[<tspan fill="#7ec8e3" font-weight="600">K</tspan>] <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#7ec8e3" font-weight="600">Function</tspan></text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      ? <tspan fill="#7ec8e3" font-weight="600">K</tspan> : <tspan fill="#7ec8e3" font-weight="600">never</tspan></text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  ]: <tspan fill="#7ec8e3" font-weight="600">T</tspan>[<tspan fill="#7ec8e3" font-weight="600">K</tspan>];</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">};</text>
  <text x="476" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 함수 타입 속성만 유지</text>

  <!-- Combined modifier + key remap -->
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">수정자 + 키 재매핑 동시 사용</text>
  <rect x="60" y="316" width="760" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// readonly 제거 + 키 이름 변환 동시에</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> MutableSetters&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt; = {</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  -<tspan fill="#7ec8e3" font-weight="600">readonly</tspan> [<tspan fill="#7ec8e3" font-weight="600">K</tspan> <tspan fill="#7ec8e3" font-weight="600">in</tspan> <tspan fill="#7ec8e3" font-weight="600">keyof</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan> <tspan fill="#7ec8e3" font-weight="600">as</tspan> <tspan fill="#ce9178">`set${Capitalize&lt;string &amp; K&gt;}`</tspan>]-?:</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    (value: <tspan fill="#7ec8e3" font-weight="600">T</tspan>[<tspan fill="#7ec8e3" font-weight="600">K</tspan>]) =&gt; <tspan fill="#7ec8e3" font-weight="600">void</tspan>;</text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">};</text>

  <!-- Summary -->
  <rect x="60" y="446" width="760" height="18" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">as 절은 키 재매핑 · 필터링 · 조건부 변환까지 가능 — 매핑된 타입의 표현력을 극대화</text>
</svg>
