<svg xmlns="http://www.w3.org/2000/svg" width="880" height="259" viewBox="0 0 880 259">
<rect width="880" height="259" fill="#0a0a0a" rx="12"/>
<text x="50" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">검증된 환경 변수</text>
<text x="50" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">직접 접근</text>
<text x="470" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">스키마 검증</text>
<rect x="50" y="96" width="360" height="116" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
<rect x="470" y="96" width="360" height="135" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> p = process.env.PORT</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// string | undefined</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> n = </tspan><tspan font-weight="600" fill="#7ec8e3">Number</tspan><tspan fill="#ffffff">(p)</tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// NaN 위험</tspan></text>
<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// 누락 감지 못함</tspan></text>
<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> Env = z.object({</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">  PORT: z.coerce.number(),</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">  NODE_ENV: z.enum([</tspan><tspan fill="#ce9178">"dev"</tspan><tspan fill="#ffffff">]),</tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">})</tspan></text>
<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" font-weight="600" fill="#7ec8e3">export const</tspan><tspan fill="#ffffff"> env =</tspan></text>
<text y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">  Env.parse(process.env)</tspan></text>
</svg>
