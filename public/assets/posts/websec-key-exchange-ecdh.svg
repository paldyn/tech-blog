<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" marketHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a055"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TLS 1.3 핸드셰이크: ECDHE 키 교환</text>

  <!-- Client -->
  <rect x="60" y="70" width="140" height="44" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Client</text>

  <!-- Server -->
  <rect x="680" y="70" width="140" height="44" rx="8" fill="#111a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="750" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Server</text>

  <!-- Vertical lines -->
  <line x1="130" y1="116" x2="130" y2="400" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="750" y1="116" x2="750" y2="400" stroke="#3a5e3a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: ClientHello -->
  <line x1="130" y1="145" x2="745" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">① ClientHello (지원 cipher suites, 클라이언트 랜덤, EC 공개키 공유)</text>

  <!-- Step 2: ServerHello -->
  <line x1="750" y1="183" x2="135" y2="183" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="440" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">② ServerHello (선택된 cipher suite, 서버 랜덤, 서버 EC 공개키)</text>

  <!-- Step 3: ECDHE compute -->
  <rect x="200" y="200" width="480" height="44" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">③ 양측 ECDH 공유 비밀 계산</text>
  <text x="440" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">shared_secret = ECDH(내 비밀키, 상대 공개키)</text>

  <!-- Step 4: Key derivation -->
  <rect x="200" y="258" width="480" height="54" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">④ HKDF로 세션 키 유도</text>
  <text x="440" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">master_secret = HKDF(shared_secret, client_random + server_random)</text>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">→ client_write_key, server_write_key, client_write_iv, server_write_iv</text>

  <!-- Step 5: Certificate -->
  <line x1="750" y1="338" x2="135" y2="338" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">⑤ Certificate + CertificateVerify (서버 신원 증명)</text>

  <!-- Step 6: Finished -->
  <line x1="130" y1="366" x2="745" y2="366" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">⑥ Finished (핸드셰이크 완료 — 이후 AES-GCM으로 암호화 통신)</text>

  <!-- PFS Note -->
  <rect x="60" y="390" width="760" height="36" rx="8" fill="#111a11" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">완전 순방향 비밀성 (PFS): 매 세션마다 임시 EC 키 쌍 생성 → 비밀키 노출돼도 과거 세션 복호 불가</text>
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DHE/ECDHE 는 PFS 제공. 정적 RSA 키 교환(TLS 1.2 이하)은 PFS 없음</text>
</svg>
