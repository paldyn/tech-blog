<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111318"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="880" height="580" rx="12" fill="url(#bg-grad)"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="880" height="56" rx="12" fill="#13151c"/>
  <rect x="0" y="44" width="880" height="12" fill="#13151c"/>
  <!-- Title -->
  <text x="440" y="34" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 프로젝트 디렉터리 구조</text>

  <!-- Left panel: Tree -->
  <rect x="50" y="76" width="370" height="464" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="235" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">프로젝트 폴더 트리</text>

  <!-- Tree lines and nodes -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">
    <!-- Root -->
    <text x="74" y="130">📁 MyProject/</text>
    <!-- Level 1 items -->
    <line x1="90" y1="138" x2="90" y2="468" stroke="#2a3040" stroke-width="1"/>
    <!-- Application.xadl -->
    <line x1="90" y1="152" x2="106" y2="152" stroke="#2a3040" stroke-width="1"/>
    <text x="110" y="156" fill="#7ec8e3">Application.xadl</text>
    <!-- TypeDef.xadl -->
    <line x1="90" y1="178" x2="106" y2="178" stroke="#2a3040" stroke-width="1"/>
    <text x="110" y="182" fill="#7ec8e3">TypeDef.xadl</text>
    <!-- Environment.xml -->
    <line x1="90" y1="204" x2="106" y2="204" stroke="#2a3040" stroke-width="1"/>
    <text x="110" y="208" fill="#55c555">Environment.xml</text>
    <!-- Service.xml -->
    <line x1="90" y1="230" x2="106" y2="230" stroke="#2a3040" stroke-width="1"/>
    <text x="110" y="234" fill="#55c555">Service.xml</text>
    <!-- Forms/ -->
    <line x1="90" y1="256" x2="106" y2="256" stroke="#2a3040" stroke-width="1"/>
    <text x="110" y="260" fill="#e05555">📁 Forms/</text>
    <!-- Forms sub -->
    <line x1="126" y1="264" x2="126" y2="318" stroke="#2a3040" stroke-width="1"/>
    <line x1="126" y1="282" x2="142" y2="282" stroke="#2a3040" stroke-width="1"/>
    <text x="146" y="286" fill="#e8e8e8">Main.xfdl</text>
    <line x1="126" y1="308" x2="142" y2="308" stroke="#2a3040" stroke-width="1"/>
    <text x="146" y="312" fill="#e8e8e8">📁 Sub/</text>
    <!-- Sub subfolder -->
    <line x1="162" y1="316" x2="162" y2="336" stroke="#2a3040" stroke-width="1"/>
    <line x1="162" y1="334" x2="178" y2="334" stroke="#2a3040" stroke-width="1"/>
    <text x="182" y="338" fill="#e8e8e8">Detail.xfdl</text>
    <!-- Variables/ -->
    <line x1="90" y1="356" x2="106" y2="356" stroke="#2a3040" stroke-width="1"/>
    <text x="110" y="360" fill="#e05555">📁 Variables/</text>
    <!-- Common/ -->
    <line x1="90" y1="382" x2="106" y2="382" stroke="#2a3040" stroke-width="1"/>
    <text x="110" y="386" fill="#e05555">📁 Common/</text>
    <line x1="126" y1="390" x2="126" y2="410" stroke="#2a3040" stroke-width="1"/>
    <line x1="126" y1="408" x2="142" y2="408" stroke="#2a3040" stroke-width="1"/>
    <text x="146" y="412" fill="#e8e8e8">CommonLib.xjs</text>
    <!-- Images/ -->
    <line x1="90" y1="430" x2="106" y2="430" stroke="#2a3040" stroke-width="1"/>
    <text x="110" y="434" fill="#e05555">📁 Images/</text>
    <!-- Output/ -->
    <line x1="90" y1="456" x2="106" y2="456" stroke="#2a3040" stroke-width="1"/>
    <text x="110" y="460" fill="#7777cc">📁 Output/</text>
  </g>

  <!-- Right panel: File descriptions -->
  <rect x="460" y="76" width="370" height="464" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="645" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">주요 파일 역할</text>

  <!-- File role items -->
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">
    <!-- Application.xadl -->
    <rect x="480" y="114" width="330" height="52" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
    <text x="496" y="133" font-weight="600" fill="#7ec8e3" font-size="12">Application.xadl</text>
    <text x="496" y="151" fill="#aaa" font-size="11">앱 진입점 · 시작 Form · 전역 Dataset 선언</text>
    <!-- TypeDef.xadl -->
    <rect x="480" y="174" width="330" height="52" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
    <text x="496" y="193" font-weight="600" fill="#7ec8e3" font-size="12">TypeDef.xadl</text>
    <text x="496" y="211" fill="#aaa" font-size="11">사용할 컴포넌트 타입 등록 · 네임스페이스 매핑</text>
    <!-- Environment.xml -->
    <rect x="480" y="234" width="330" height="52" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
    <text x="496" y="253" font-weight="600" fill="#55c555" font-size="12">Environment.xml</text>
    <text x="496" y="271" fill="#aaa" font-size="11">서버 URL · 인코딩 · 프로토콜 · 세션 옵션</text>
    <!-- Service.xml -->
    <rect x="480" y="294" width="330" height="52" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
    <text x="496" y="313" font-weight="600" fill="#55c555" font-size="12">Service.xml</text>
    <text x="496" y="331" fill="#aaa" font-size="11">트랜잭션 서비스 ID → 실제 URL 매핑</text>
    <!-- .xfdl -->
    <rect x="480" y="354" width="330" height="52" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
    <text x="496" y="373" font-weight="600" fill="#e8e8e8" font-size="12">.xfdl  (Form Definition)</text>
    <text x="496" y="391" fill="#aaa" font-size="11">화면 레이아웃 + 스크립트 일체형 파일</text>
    <!-- .xjs -->
    <rect x="480" y="414" width="330" height="52" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
    <text x="496" y="433" font-weight="600" fill="#e8e8e8" font-size="12">.xjs  (Script)</text>
    <text x="496" y="451" fill="#aaa" font-size="11">공통 함수 라이브러리 · 재사용 스크립트</text>
    <!-- Output -->
    <rect x="480" y="474" width="330" height="52" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
    <text x="496" y="493" font-weight="600" fill="#7777cc" font-size="12">Output/</text>
    <text x="496" y="511" fill="#aaa" font-size="11">빌드 후 배포 산출물 (HTML5 기준)</text>
  </g>

  <!-- Footer -->
  <text x="440" y="556" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
