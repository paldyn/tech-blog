<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일 vs 디렉터리: 내부 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">디렉터리는 특별한 파일 — inode와 데이터 블록</text>

  <!-- File side -->
  <rect x="60" y="96" width="360" height="300" fill="#0d1a2a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">일반 파일 (regular file)</text>

  <!-- inode -->
  <rect x="84" y="142" width="312" height="68" fill="#0a1520" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">inode</text>
  <text x="100" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">권한: -rw-r--r--</text>
  <text x="100" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">소유자/그룹: root/root</text>

  <!-- Arrow -->
  <line x1="240" y1="210" x2="240" y2="236" stroke="#555" stroke-width="1.5"/>
  <polygon points="240,240 236,232 244,232" fill="#555"/>

  <!-- Data blocks -->
  <rect x="84" y="240" width="312" height="60" fill="#0a1520" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">데이터 블록</text>
  <text x="240" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">실제 파일 내용 (bytes)</text>

  <text x="240" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">예: /etc/hostname</text>
  <text x="240" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="middle">"myserver\n"</text>
  <text x="240" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">내용이 직접 블록에 저장됨</text>

  <!-- Directory side -->
  <rect x="460" y="96" width="360" height="300" fill="#1c1a0d" rx="8" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="640" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8c55a" text-anchor="middle">디렉터리 (directory)</text>

  <!-- inode -->
  <rect x="484" y="142" width="312" height="68" fill="#1a1508" rx="6" stroke="#e8c55a" stroke-width="1"/>
  <text x="640" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c55a" text-anchor="middle">inode</text>
  <text x="500" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">권한: drwxr-xr-x</text>
  <text x="500" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">타입: directory</text>

  <!-- Arrow -->
  <line x1="640" y1="210" x2="640" y2="236" stroke="#555" stroke-width="1.5"/>
  <polygon points="640,240 636,232 644,232" fill="#555"/>

  <!-- Directory data blocks -->
  <rect x="484" y="240" width="312" height="80" fill="#1a1508" rx="6" stroke="#e8c55a" stroke-width="1"/>
  <text x="640" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c55a" text-anchor="middle">데이터 블록 (디렉터리 엔트리 목록)</text>
  <text x="500" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#aaa">inode# → 파일명</text>
  <text x="500" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#aaa">262146 → "nginx.conf"</text>
  <text x="500" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#aaa">262147 → "conf.d"</text>

  <text x="640" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">예: /etc/nginx/</text>
  <text x="640" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">파일명 → inode 번호 매핑표</text>

  <!-- vs arrow -->
  <text x="440" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="24" font-weight="700" fill="#333" text-anchor="middle">vs</text>

  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">디렉터리 = 파일명→inode 매핑 테이블을 담는 특수 파일</text>
</svg>
