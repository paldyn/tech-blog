<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">locate vs find 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">속도와 정확성의 트레이드오프</text>

  <!-- Headers -->
  <rect x="60" y="84" width="360" height="32" fill="#0f2a0f" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">locate</text>
  <rect x="460" y="84" width="360" height="32" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">find</text>

  <!-- Row 1 -->
  <rect x="60" y="116" width="360" height="28" fill="#070b14" rx="0" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">밀리초 이내 (DB 조회)</text>
  <rect x="460" y="116" width="360" height="28" fill="#070b14" rx="0" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">수초~수십초 (디스크 탐색)</text>

  <!-- Row 2 -->
  <rect x="60" y="144" width="360" height="28" fill="#070b14" rx="0" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">DB 갱신 전 파일 못 찾음</text>
  <rect x="460" y="144" width="360" height="28" fill="#070b14" rx="0" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">항상 최신 상태 반영</text>

  <!-- Row 3 -->
  <rect x="60" y="172" width="360" height="28" fill="#070b14" rx="0" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">삭제된 파일도 표시 가능</text>
  <rect x="460" y="172" width="360" height="28" fill="#070b14" rx="0" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">실재 파일만 반환</text>

  <!-- Row 4 -->
  <rect x="60" y="200" width="360" height="28" fill="#070b14" rx="0" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">크기·날짜·권한 조건 없음</text>
  <rect x="460" y="200" width="360" height="28" fill="#070b14" rx="0" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">다양한 메타데이터 조건</text>

  <!-- Row 5 -->
  <rect x="60" y="228" width="360" height="28" fill="#070b14" rx="0" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">파일명 검색에 특화</text>
  <rect x="460" y="228" width="360" height="28" fill="#070b14" rx="0" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">이름+크기+날짜+권한 조합</text>

  <!-- Recommendation -->
  <rect x="60" y="278" width="760" height="40" fill="#070b14" rx="6" stroke="#e8c55a" stroke-width="1"/>
  <text x="76" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8c55a">사용 시나리오:</text>
  <text x="196" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">locate — 파일 이름으로 빠르게 위치 파악할 때</text>
  <text x="76" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8c55a">                  </text>
  <text x="196" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">find — 정밀한 조건 + 명령 실행이 필요할 때</text>
</svg>
