<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Soft Delete의 UNIQUE 제약 문제 해결</text>

  <!-- Problem -->
  <rect x="60" y="66" width="370" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">-- ⚠ 문제: 재가입 시 email UNIQUE 충돌</text>
  <text x="80" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- deleted_at이 있어도 UNIQUE는 전체 적용</text>
  <text x="80" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> users (</tspan>
  </text>
  <text x="80" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  id         </tspan><tspan fill="#7ec8e3" font-weight="600">BIGSERIAL PRIMARY KEY</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="80" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  email      </tspan><tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan><tspan fill="#ffffff">(200) </tspan><tspan fill="#7ec8e3" font-weight="600">UNIQUE</tspan><tspan fill="#ffffff">,  </tspan><tspan fill="#e05555">-- 문제!</tspan>
  </text>
  <text x="80" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  deleted_at </tspan><tspan fill="#7ec8e3" font-weight="600">TIMESTAMPTZ</tspan>
  </text>
  <text x="80" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="80" y="246" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- kim@ex.com 삭제 후 재가입 시도</text>
  <text x="80" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">INSERT INTO</tspan><tspan fill="#ffffff"> users(email) </tspan><tspan fill="#7ec8e3" font-weight="600">VALUES</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'kim@ex.com'</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="80" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">-- ERROR: duplicate key value violates unique constraint</text>
  <text x="80" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 삭제된 행도 UNIQUE에 걸림</text>

  <!-- Solution -->
  <rect x="450" y="66" width="370" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-- ✓ 해결: 부분 인덱스 (Partial Index)</text>
  <text x="470" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- deleted_at IS NULL인 행만 UNIQUE 적용</text>
  <text x="470" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">CREATE UNIQUE INDEX</tspan><tspan fill="#ffffff"> idx_users_email_active</tspan>
  </text>
  <text x="470" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">ON</tspan><tspan fill="#ffffff"> users(email)</tspan>
  </text>
  <text x="470" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> deleted_at </tspan><tspan fill="#7ec8e3" font-weight="600">IS NULL</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="470" y="206" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 삭제된 행 제외하고 UNIQUE 적용</text>
  <text x="470" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- MySQL: 삭제 시 email을 uuid로 변경</text>
  <text x="470" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">UPDATE</tspan><tspan fill="#ffffff"> users</tspan>
  </text>
  <text x="470" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> deleted_at = NOW(),</tspan>
  </text>
  <text x="470" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    email = CONCAT(email, </tspan><tspan fill="#ce9178">'#'</tspan><tspan fill="#ffffff">, UUID())</tspan>
  </text>
  <text x="470" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> id = :id;  </tspan><tspan fill="#9aa4b8">-- MySQL 대안</tspan>
  </text>
</svg>
