<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="af" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TIME_WAIT: 마지막 ACK 유실 시나리오</text>

  <!-- Actors -->
  <rect x="80" y="68" width="160" height="40" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Active Close</text>

  <rect x="640" y="68" width="160" height="40" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">Passive Close</text>

  <!-- Timeline -->
  <line x1="160" y1="108" x2="160" y2="430" stroke="#2a3a4a" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="720" y1="108" x2="720" y2="430" stroke="#3a1a1a" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Normal scenario label -->
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">시나리오: 마지막 ACK이 유실됐을 때</text>

  <!-- FIN from passive -->
  <line x1="720" y1="150" x2="174" y2="180" stroke="#e05555" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="340" y="134" width="200" height="32" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">FIN (seq=v)</text>

  <!-- ACK from active (lost) -->
  <line x1="160" y1="210" x2="500" y2="230" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="370" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ACK 전송 (도중 유실)</text>
  <!-- X mark -->
  <text x="510" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#e05555">✗</text>

  <!-- TIME_WAIT box -->
  <rect x="60" y="248" width="160" height="36" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">TIME_WAIT</text>

  <!-- Passive retransmits FIN -->
  <text x="730" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">타임아웃</text>
  <text x="730" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">후 FIN 재전송</text>
  <line x1="720" y1="290" x2="174" y2="320" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <rect x="330" y="274" width="220" height="32" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">FIN 재전송 (seq=v)</text>

  <!-- ACK resent -->
  <line x1="160" y1="350" x2="706" y2="350" stroke="#7ec8e3" stroke-width="2" marker-end="url(#af)"/>
  <rect x="290" y="334" width="240" height="32" rx="4" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="410" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">ACK 재전송 (ack=v+1)</text>

  <!-- TIME_WAIT resets -->
  <text x="50" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">2MSL 타이머 리셋</text>

  <!-- Result -->
  <rect x="60" y="402" width="760" height="38" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">TIME_WAIT이 없었다면: 이미 CLOSED → 상대방 FIN 재전송에 RST 응답 → Passive Close 측 오류</text>

  <!-- 2MSL bar -->
  <line x1="224" y1="240" x2="224" y2="402" stroke="#e05555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="228" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">2MSL</text>
  <text x="228" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">대기</text>
</svg>
