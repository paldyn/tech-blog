<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <linearGradient id="hdrDb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dsBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111820;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c1118;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111108;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4488ff"/>
    </marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffcc44"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#44ff88"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="64" rx="12" fill="url(#hdrDb)"/>
  <rect x="0" y="52" width="880" height="12" fill="url(#hdrDb)"/>
  <text x="44" y="38" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">Nexacro N — 데이터 바인딩 구조</text>
  <text x="44" y="54" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" fill="#555">datasource / datacolumn 속성으로 컴포넌트와 Dataset을 연결 — 값이 바뀌면 양방향으로 자동 동기화</text>

  <!-- ── Dataset (center) ── -->
  <rect x="300" y="90" width="280" height="200" rx="10" fill="url(#dsBox)" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="440" y="113" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4488ff" text-anchor="middle">Dataset</text>
  <text x="440" y="129" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444" text-anchor="middle">dsEmployee</text>

  <!-- Dataset columns header -->
  <rect x="316" y="136" width="248" height="24" rx="4" fill="#0f1e30"/>
  <text x="380" y="152" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#4488ff" text-anchor="middle">empName</text>
  <line x1="420" y1="136" x2="420" y2="160" stroke="#1a3050" stroke-width="0.5"/>
  <text x="460" y="152" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#4488ff" text-anchor="middle">deptCd</text>
  <line x1="500" y1="136" x2="500" y2="160" stroke="#1a3050" stroke-width="0.5"/>
  <text x="540" y="152" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#4488ff" text-anchor="middle">salary</text>

  <!-- Dataset rows -->
  <rect x="316" y="160" width="248" height="22" fill="#0c1520"/>
  <text x="380" y="175" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888" text-anchor="middle">홍길동</text>
  <line x1="420" y1="160" x2="420" y2="182" stroke="#1a3050" stroke-width="0.5"/>
  <text x="460" y="175" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888" text-anchor="middle">D001</text>
  <line x1="500" y1="160" x2="500" y2="182" stroke="#1a3050" stroke-width="0.5"/>
  <text x="540" y="175" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888" text-anchor="middle">4,500,000</text>

  <rect x="316" y="182" width="248" height="22" fill="#0a1018"/>
  <text x="380" y="197" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">이순신</text>
  <line x1="420" y1="182" x2="420" y2="204" stroke="#1a3050" stroke-width="0.5"/>
  <text x="460" y="197" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">D002</text>
  <line x1="500" y1="182" x2="500" y2="204" stroke="#1a3050" stroke-width="0.5"/>
  <text x="540" y="197" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">5,200,000</text>

  <!-- rowposition indicator -->
  <rect x="316" y="160" width="10" height="22" fill="#4488ff" opacity="0.6"/>
  <text x="440" y="225" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444" text-anchor="middle">rowposition = 0</text>
  <text x="440" y="240" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#2a4a6a" text-anchor="middle">rowcount = 2</text>
  <text x="440" y="256" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#333" text-anchor="middle">id="dsEmployee"</text>
  <text x="440" y="272" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#2a4a6a" text-anchor="middle">datasource 속성으로 참조</text>

  <!-- ── Left Components ── -->
  <!-- Edit -->
  <rect x="44" y="96" width="200" height="64" rx="8" fill="url(#compBox)" stroke="#3a3a20" stroke-width="1.5"/>
  <text x="54" y="116" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffcc44">Edit</text>
  <text x="54" y="130" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">datasource = "dsEmployee"</text>
  <text x="54" y="144" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">datacolumn = "empName"</text>
  <text x="54" y="153" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#333">→ 홍길동 표시</text>

  <!-- Label -->
  <rect x="44" y="178" width="200" height="64" rx="8" fill="url(#compBox)" stroke="#3a3a20" stroke-width="1.5"/>
  <text x="54" y="198" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffcc44">Label</text>
  <text x="54" y="212" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">datasource = "dsEmployee"</text>
  <text x="54" y="226" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">datacolumn = "deptCd"</text>
  <text x="54" y="235" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#333">→ D001 표시</text>

  <!-- ComboBox -->
  <rect x="44" y="260" width="200" height="76" rx="8" fill="url(#compBox)" stroke="#3a3a20" stroke-width="1.5"/>
  <text x="54" y="280" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffcc44">ComboBox</text>
  <text x="54" y="294" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">datasource = "dsEmployee"</text>
  <text x="54" y="308" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">datacolumn = "deptCd"</text>
  <text x="54" y="322" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">codecolumn / displaycolumn</text>
  <text x="54" y="329" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#333">→ 코드/표시명 매핑</text>

  <!-- ── Right Components ── -->
  <!-- Grid -->
  <rect x="636" y="96" width="200" height="100" rx="8" fill="url(#compBox)" stroke="#3a3a20" stroke-width="1.5"/>
  <text x="646" y="116" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffcc44">Grid</text>
  <text x="646" y="130" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">datasource = "dsEmployee"</text>
  <text x="646" y="144" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">각 열: datacolumn 지정</text>
  <text x="646" y="158" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">→ 전체 행 목록 표시</text>
  <text x="646" y="172" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#333">rowposition 연동</text>
  <text x="646" y="186" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#333">→ 행 선택 자동 반영</text>

  <!-- Calendar -->
  <rect x="636" y="214" width="200" height="64" rx="8" fill="url(#compBox)" stroke="#3a3a20" stroke-width="1.5"/>
  <text x="646" y="234" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffcc44">Calendar</text>
  <text x="646" y="248" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">datasource = "dsEmployee"</text>
  <text x="646" y="262" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">datacolumn = "joinDate"</text>
  <text x="646" y="271" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#333">→ YYYYMMDD 날짜 표시</text>

  <!-- CheckBox -->
  <rect x="636" y="296" width="200" height="52" rx="8" fill="url(#compBox)" stroke="#3a3a20" stroke-width="1.5"/>
  <text x="646" y="316" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffcc44">CheckBox</text>
  <text x="646" y="330" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666">datasource / datacolumn</text>
  <text x="646" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#333">checkedvalue / uncheckedvalue</text>

  <!-- ── Arrows Left → Dataset ── -->
  <line x1="244" y1="128" x2="299" y2="160" stroke="#4488ff" stroke-width="1.5" marker-end="url(#arrowBlue)" stroke-dasharray="5,3"/>
  <line x1="244" y1="210" x2="299" y2="185" stroke="#4488ff" stroke-width="1.5" marker-end="url(#arrowBlue)" stroke-dasharray="5,3"/>
  <line x1="244" y1="298" x2="299" y2="220" stroke="#4488ff" stroke-width="1.5" marker-end="url(#arrowBlue)" stroke-dasharray="5,3"/>

  <!-- ── Arrows Dataset → Right ── -->
  <line x1="581" y1="160" x2="635" y2="146" stroke="#44ff88" stroke-width="1.5" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>
  <line x1="581" y1="185" x2="635" y2="246" stroke="#44ff88" stroke-width="1.5" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>
  <line x1="581" y1="200" x2="635" y2="322" stroke="#44ff88" stroke-width="1.5" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>

  <!-- ── Bidirectional label ── -->
  <text x="256" y="163" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#4488ff" text-anchor="middle">datasource</text>
  <text x="256" y="173" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#4488ff" text-anchor="middle">datacolumn</text>
  <text x="624" y="152" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#44ff88" text-anchor="middle">양방향</text>
  <text x="624" y="162" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#44ff88" text-anchor="middle">동기화</text>

  <!-- ── Bottom note ── -->
  <rect x="44" y="370" width="792" height="70" rx="8" fill="#0e0e0e" stroke="#1e1e1e" stroke-width="1"/>
  <text x="64" y="391" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#888">바인딩 동작 원리</text>
  <text x="64" y="409" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">① 컴포넌트의 datasource="dsEmployee", datacolumn="empName" 설정</text>
  <text x="64" y="425" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">② rowposition이 바뀌면 → 해당 행의 datacolumn 값이 컴포넌트에 자동 표시</text>
  <text x="64" y="432" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#333">③ 컴포넌트에서 값을 수정하면 → Dataset의 현재 행 값이 자동 갱신 (RowSaveType → U)</text>

  <!-- Footer -->
  <text x="836" y="470" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#333" text-anchor="end">PALDYN · Nexacro N 시리즈</text>
</svg>
