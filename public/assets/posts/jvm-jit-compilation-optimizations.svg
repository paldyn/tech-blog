<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JIT 주요 최적화 기법</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">C2 컴파일러가 적용하는 핵심 최적화</text>

  <!-- 3 column layout: Method Inlining | Escape Analysis | Loop Optimizations -->

  <!-- Col 1: Method Inlining -->
  <rect x="60" y="90" width="240" height="280" rx="8" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">메서드 인라이닝</text>
  <line x1="80" y1="126" x2="280" y2="126" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Before -->
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">호출 전:</text>
  <rect x="80" y="156" width="200" height="64" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="88" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">int</text>
  <text x="112" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> add(</text>
  <text x="146" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">int</text>
  <text x="169" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> a, </text>
  <text x="191" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">int</text>
  <text x="213" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> b)</text>
  <text x="88" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#ffffff">  { </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> a+b; }</tspan></text>

  <text x="88" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">result = add(x, y);</text>

  <!-- Arrow down -->
  <line x1="180" y1="224" x2="180" y2="250" stroke="#55c555" stroke-width="2"/>
  <polygon points="174,250 180,262 186,250" fill="#55c555"/>
  <text x="196" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">인라인</text>

  <!-- After -->
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최적화 후:</text>
  <rect x="80" y="284" width="200" height="36" rx="4" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="88" y="307" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">result = x + y;</text>
  <text x="88" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  // 호출 비용 제거</text>

  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">효과: 스택 프레임 생성 비용</text>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">및 컨텍스트 스위치 제거</text>

  <!-- Col 2: Escape Analysis -->
  <rect x="320" y="90" width="240" height="280" rx="8" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">탈출 분석</text>
  <line x1="340" y1="126" x2="540" y2="126" stroke="#3a4a6e" stroke-width="1"/>

  <text x="340" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Heap 할당 → 스택/레지스터</text>
  <rect x="340" y="156" width="200" height="80" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="348" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">void</text>
  <text x="372" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> process() {</text>
  <text x="348" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#ffffff">  Point p = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> Point();</tspan></text>

  <text x="348" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#ffffff">  p.x = </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">; </tspan></text>

  <text x="348" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">} </text>
  <text x="392" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// p가 외부 비노출</text>

  <!-- result tag -->
  <rect x="340" y="248" width="200" height="38" rx="4" fill="#1a1230" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">스칼라 치환(Scalar Replacement)</text>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레지스터에 직접 할당</text>

  <text x="340" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">효과: GC 압력 감소,</text>
  <text x="340" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Heap 할당 비용 제거</text>
  <text x="340" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동기화 제거(Lock Elision)</text>
  <text x="340" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">도 함께 적용</text>

  <!-- Col 3: Loop Optimizations -->
  <rect x="580" y="90" width="240" height="280" rx="8" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="700" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">루프 최적화</text>
  <line x1="600" y1="126" x2="800" y2="126" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Loop unrolling -->
  <text x="600" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">루프 언롤링 (Unrolling)</text>
  <rect x="600" y="156" width="200" height="64" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="608" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// 원본</text>
  <text x="608" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#7ec8e3">for</tspan><tspan fill="#ffffff">(i=</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">; i&lt;</tspan><tspan fill="#b5cea8">8</tspan><tspan fill="#ffffff">; i++) a[i]++;</tspan></text>

  <text x="608" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// 언롤: i=0,2,4,6 동시</text>

  <!-- Vectorization -->
  <text x="600" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자동 벡터화 (SIMD)</text>
  <rect x="600" y="244" width="200" height="52" rx="4" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">AVX2 / SSE 명령어로</text>
  <text x="700" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">배열 연산 병렬 처리</text>
  <text x="700" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">최대 8~16개 동시 연산</text>

  <text x="600" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">효과: 루프 오버헤드 최소화,</text>
  <text x="600" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CPU 파이프라인 활용 극대화</text>

  <!-- Bottom: Code cache full warning -->
  <rect x="60" y="392" width="760" height="80" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">Code Cache 포화 주의</text>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Code Cache가 가득 차면 JIT 컴파일이 중단되어 전체 성능이 인터프리터 수준으로 저하됩니다.</text>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">→  -XX:ReservedCodeCacheSize=256m  이상으로 설정, GC 로그와 함께 모니터링 권장</text>
</svg>
