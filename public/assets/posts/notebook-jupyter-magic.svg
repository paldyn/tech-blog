<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" style="background:#0a0a0a">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Jupyter 매직 커맨드 카테고리 &amp; 예시</text>

  <!-- ===== Category 1: Line Magic (%) ===== -->
  <!-- Header -->
  <rect x="60" y="68" width="232" height="42" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="176" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">라인 매직 %</text>
  <text x="176" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">한 줄에만 적용 — 줄 끝까지가 인수</text>

  <!-- %timeit -->
  <rect x="60" y="124" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555" font-weight="600">%timeit</tspan><tspan fill="#ffffff"> sum(range(</tspan><tspan fill="#b5cea8">1000</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 반복 실행 후 평균/최소 시간 측정</text>
  <text x="76" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># → </tspan><tspan fill="#b5cea8">16.3 µs ± 411 ns per loop</tspan></text>

  <!-- %matplotlib -->
  <rect x="60" y="206" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555" font-weight="600">%matplotlib</tspan><tspan fill="#ffffff"> inline</tspan></text>
  <text x="76" y="244" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 그래프를 셀 아래 인라인 출력</text>
  <text x="76" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># widget / notebook 모드도 있음</tspan></text>

  <!-- %env -->
  <rect x="60" y="288" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555" font-weight="600">%env</tspan><tspan fill="#ffffff"> API_KEY=</tspan><tspan fill="#ce9178">abc123</tspan></text>
  <text x="76" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 환경변수 설정 (커널 범위)</text>
  <text x="76" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555" font-weight="600">%env</tspan><tspan fill="#9aa4b8">  # 전체 목록 출력</tspan></text>

  <!-- %who / %whos -->
  <rect x="60" y="370" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555" font-weight="600">%who</tspan><tspan fill="#ffffff">   </tspan><tspan fill="#9aa4b8"># 변수 목록</tspan></text>
  <text x="76" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555" font-weight="600">%whos</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8"># 타입·값 포함</tspan></text>
  <text x="76" y="426" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555" font-weight="600">%reset</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#9aa4b8"># 네임스페이스 초기화</tspan></text>

  <!-- ===== Category 2: Cell Magic (%%) ===== -->
  <rect x="324" y="68" width="232" height="42" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">셀 매직 %%</text>
  <text x="440" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">셀 전체에 적용 — 첫 줄에 위치해야 함</text>

  <!-- %%time -->
  <rect x="324" y="124" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7777cc" font-weight="600">%%time</tspan></text>
  <text x="340" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> numpy </tspan><tspan fill="#7ec8e3" font-weight="600">as</tspan><tspan fill="#ffffff"> np</tspan></text>
  <text x="340" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">np.random.randn(</tspan><tspan fill="#b5cea8">1000</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">1000</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- %%capture -->
  <rect x="324" y="206" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7777cc" font-weight="600">%%capture</tspan><tspan fill="#ffffff"> out</tspan></text>
  <text x="340" y="244" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"captured output"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="340" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># out.stdout 로 재사용 가능</text>

  <!-- %%writefile -->
  <rect x="324" y="288" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7777cc" font-weight="600">%%writefile</tspan><tspan fill="#ffffff"> model.py</tspan></text>
  <text x="340" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> torch</tspan></text>
  <text x="340" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 셀 내용을 파일로 저장</text>

  <!-- %%sql / %%bash -->
  <rect x="324" y="370" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7777cc" font-weight="600">%%bash</tspan><tspan fill="#9aa4b8">    # 셀을 bash로 실행</tspan></text>
  <text x="340" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7777cc" font-weight="600">%%html</tspan><tspan fill="#9aa4b8">    # HTML 렌더링</tspan></text>
  <text x="340" y="426" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7777cc" font-weight="600">%%sql</tspan><tspan fill="#9aa4b8">     # ipython-sql 확장</tspan></text>

  <!-- ===== Category 3: Shell Commands (!) ===== -->
  <rect x="588" y="68" width="232" height="42" rx="8" fill="#1a1610" stroke="#e05555" stroke-width="1.5"/>
  <text x="704" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">셸 커맨드 !</text>
  <text x="704" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OS 셸(bash)로 명령 전달</text>

  <!-- !pip install -->
  <rect x="588" y="124" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="604" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#e05555" font-weight="600">!</tspan><tspan fill="#ffffff">pip install torch</tspan></text>
  <text x="604" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#e05555" font-weight="600">!</tspan><tspan fill="#ffffff">pip install -r requirements.txt</tspan></text>
  <text x="604" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 패키지 설치</text>

  <!-- !ls / !pwd -->
  <rect x="588" y="206" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="604" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#e05555" font-weight="600">!</tspan><tspan fill="#ffffff">ls -la data/</tspan></text>
  <text x="604" y="244" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#e05555" font-weight="600">!</tspan><tspan fill="#ffffff">pwd</tspan></text>
  <text x="604" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 파일 시스템 탐색</text>

  <!-- variable capture from shell -->
  <rect x="588" y="288" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="604" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">files = !</tspan><tspan fill="#ffffff">ls *.csv</tspan></text>
  <text x="604" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 결과를 Python 변수에 저장</text>
  <text x="604" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(files[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">])</tspan></text>

  <!-- !nvidia-smi -->
  <rect x="588" y="370" width="232" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="604" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#e05555" font-weight="600">!</tspan><tspan fill="#ffffff">nvidia-smi</tspan><tspan fill="#9aa4b8"> # GPU 상태</tspan></text>
  <text x="604" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#e05555" font-weight="600">!</tspan><tspan fill="#ffffff">git status</tspan></text>
  <text x="604" y="426" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#e05555" font-weight="600">!</tspan><tspan fill="#ffffff">cat train.log | tail -</tspan><tspan fill="#b5cea8">20</tspan></text>

  <!-- Bottom legend -->
  <text x="440" y="502" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">커스텀 매직은 IPython.core.magic으로 등록 가능 — @register_line_magic / @register_cell_magic 데코레이터 사용</text>

  <!-- separator lines between categories -->
  <line x1="312" y1="68" x2="312" y2="450" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="576" y1="68" x2="576" y2="450" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
