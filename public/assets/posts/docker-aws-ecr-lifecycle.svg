<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8">ECR 수명 주기 정책 예시</text>

  <!-- code box -->
  <rect x="40" y="58" width="400" height="300" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="82" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// lifecycle-policy.json</text>
  <text x="56" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">{</text>
  <text x="56" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">"rules"</tspan>: [</text>
  <text x="56" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">    {</text>
  <text x="56" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">      <tspan fill="#ce9178">"rulePriority"</tspan>: <tspan fill="#b5cea8">1</tspan>,</text>
  <text x="56" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">      <tspan fill="#ce9178">"selection"</tspan>: {</text>
  <text x="56" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        <tspan fill="#ce9178">"tagStatus"</tspan>: <tspan fill="#ce9178">"untagged"</tspan>,</text>
  <text x="56" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        <tspan fill="#ce9178">"countType"</tspan>: <tspan fill="#ce9178">"sinceImagePushed"</tspan>,</text>
  <text x="56" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        <tspan fill="#ce9178">"countUnit"</tspan>: <tspan fill="#ce9178">"days"</tspan>,</text>
  <text x="56" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        <tspan fill="#ce9178">"countNumber"</tspan>: <tspan fill="#b5cea8">1</tspan></text>
  <text x="56" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">      },</text>
  <text x="56" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">      <tspan fill="#ce9178">"action"</tspan>: {<tspan fill="#ce9178">"type"</tspan>: <tspan fill="#ce9178">"expire"</tspan>}</text>
  <text x="56" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">    }</text>
  <text x="56" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  ]</text>
  <text x="56" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">}</text>

  <!-- Explanation boxes -->
  <rect x="470" y="58" width="370" height="80" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="655" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">규칙 1 — Untagged 이미지 정리</text>
  <text x="655" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">태그 없는 이미지: push 후 1일 경과 시 삭제</text>
  <text x="655" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 캐시 레이어 자동 정리 효과</text>

  <rect x="470" y="158" width="370" height="80" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="655" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">규칙 2 — 최근 N개만 유지</text>
  <text x="655" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">tagStatus: "tagged", countType: "imageCountMoreThan"</text>
  <text x="655" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">countNumber: 10 → 최근 10개 태그만 보존</text>

  <rect x="470" y="258" width="370" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="655" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">적용 CLI</text>
  <text x="655" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">aws ecr put-lifecycle-policy \</text>
  <text x="655" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  --repository-name myapp \</text>
  <text x="655" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  --lifecycle-policy-text file://policy.json</text>
</svg>
