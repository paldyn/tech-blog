<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">systemd 부팅 시퀀스</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">타겟 체인과 의존성 해결</text>

  <!-- Boot stages - horizontal flow -->
  <!-- Stage 1 -->
  <rect x="60" y="100" width="128" height="60" fill="#1a0d0d" rx="6" stroke="#5f1e1e" stroke-width="1.5"/>
  <text x="124" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">커널 + initrd</text>
  <text x="124" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">초기 부팅</text>

  <!-- Arrow -->
  <polygon points="188,125 202,130 188,135" fill="#555"/>
  <line x1="188" y1="130" x2="202" y2="130" stroke="#555" stroke-width="2"/>

  <!-- Stage 2 -->
  <rect x="202" y="100" width="128" height="60" fill="#0d200d" rx="6" stroke="#2d4a1e" stroke-width="1.5"/>
  <text x="266" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">sysinit.target</text>
  <text x="266" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본 초기화</text>

  <!-- Arrow -->
  <polygon points="330,125 344,130 330,135" fill="#555"/>
  <line x1="330" y1="130" x2="344" y2="130" stroke="#555" stroke-width="2"/>

  <!-- Stage 3 -->
  <rect x="344" y="100" width="128" height="60" fill="#0d200d" rx="6" stroke="#2d4a1e" stroke-width="1.5"/>
  <text x="408" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">basic.target</text>
  <text x="408" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">소켓/타이머 준비</text>

  <!-- Arrow -->
  <polygon points="472,125 486,130 472,135" fill="#555"/>
  <line x1="472" y1="130" x2="486" y2="130" stroke="#555" stroke-width="2"/>

  <!-- Stage 4 -->
  <rect x="486" y="100" width="128" height="60" fill="#0d1929" rx="6" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="550" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">multi-user</text>
  <text x="550" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">.target</text>

  <!-- Arrow -->
  <polygon points="614,125 628,130 614,135" fill="#555"/>
  <line x1="614" y1="130" x2="628" y2="130" stroke="#555" stroke-width="2"/>

  <!-- Stage 5 -->
  <rect x="628" y="100" width="192" height="60" fill="#0d1929" rx="6" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="724" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">graphical.target</text>
  <text x="724" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(데스크탑 환경)</text>

  <!-- Parallel note -->
  <rect x="60" y="188" width="760" height="80" fill="#0a1520" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">병렬 시작의 이점</text>
  <text x="76" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">SysV init: 스크립트를 순차 실행 → 이전 서비스가 끝나야 다음 시작</text>
  <text x="76" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">systemd: 의존성 그래프 분석 → 독립 유닛은 동시에 시작 → 부팅 수십 초 단축</text>

  <!-- systemd-analyze -->
  <rect x="60" y="286" width="760" height="100" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">부팅 성능 분석</text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ systemd-analyze</text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Startup finished in 1.523s (kernel) + 3.214s (userspace) = 4.737s</text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ systemd-analyze blame</text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">2.403s NetworkManager-wait-online.service</text>

  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">systemd-analyze critical-chain 으로 병목 유닛 시각화 가능</text>
</svg>
