<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">COALESCE · NULLIF · NVL · IFNULL</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">NULL 처리 함수 비교</text>

  <!-- COALESCE box -->
  <rect x="60" y="90" width="360" height="240" rx="6" fill="#0e1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">COALESCE(v1, v2, ..., vN)</text>
  <line x1="60" y1="122" x2="420" y2="122" stroke="#3a4a6e"/>
  <text x="240" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">첫 번째 non-NULL 값 반환 (SQL 표준)</text>

  <!-- COALESCE flow: v1 → is NULL? → yes → v2 → ... → vN → NULL -->
  <!-- Box v1 -->
  <rect x="80" y="158" width="60" height="30" rx="4" fill="#1a2a1a" stroke="#55c555"/>
  <text x="110" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">v1</text>
  <!-- Diamond: NULL? -->
  <polygon points="180,158 210,173 180,188 150,173" fill="#111520" stroke="#7ec8e3"/>
  <text x="180" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">NULL?</text>
  <!-- Arrow no -> return v1 -->
  <line x1="210" y1="173" x2="250" y2="173" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="246,169 254,173 246,177" fill="#55c555"/>
  <text x="280" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">NO</text>
  <rect x="260" y="162" width="60" height="22" rx="3" fill="#0a1a0a"/>
  <text x="290" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">v1 반환</text>

  <!-- Arrow yes -> v2 -->
  <line x1="180" y1="188" x2="180" y2="210" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="176,206 184,206 180,213" fill="#e05555"/>
  <text x="195" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">YES</text>

  <rect x="80" y="210" width="60" height="30" rx="4" fill="#1a2a1a" stroke="#55c555"/>
  <text x="110" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">v2</text>
  <polygon points="180,210 210,225 180,240 150,225" fill="#111520" stroke="#7ec8e3"/>
  <text x="180" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">NULL?</text>
  <line x1="210" y1="225" x2="250" y2="225" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="246,221 254,225 246,229" fill="#55c555"/>
  <rect x="260" y="214" width="60" height="22" rx="3" fill="#0a1a0a"/>
  <text x="290" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">v2 반환</text>
  <line x1="180" y1="240" x2="180" y2="260" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="176,256 184,256 180,263" fill="#e05555"/>

  <text x="110" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">... 계속 평가 ...</text>

  <text x="240" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모두 NULL → NULL 반환</text>
  <text x="240" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">COALESCE(a,b) = CASE WHEN a IS NOT NULL THEN a ELSE b END</text>

  <!-- NULLIF box -->
  <rect x="460" y="90" width="360" height="240" rx="6" fill="#0e1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">NULLIF(v1, v2)</text>
  <line x1="460" y1="122" x2="820" y2="122" stroke="#3a4a6e"/>
  <text x="640" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1 = v2 이면 NULL 반환, 아니면 v1 반환</text>

  <!-- NULLIF flow -->
  <rect x="520" y="160" width="70" height="30" rx="4" fill="#18102a" stroke="#7777cc"/>
  <text x="555" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">v1, v2</text>
  <line x1="590" y1="175" x2="620" y2="175" stroke="#888" stroke-width="1.5"/>
  <polygon points="620,170 640,175 620,180" fill="#7777cc"/>
  <polygon points="620,165 640,175 620,185 600,175" fill="#111520" stroke="#7777cc"/>
  <text x="640" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">v1=v2?</text>
  <line x1="660" y1="175" x2="720" y2="175" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="716,171 724,175 716,179" fill="#55c555"/>
  <rect x="724" y="163" width="60" height="24" rx="3" fill="#0a1a0a"/>
  <text x="754" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">v1 반환</text>
  <text x="672" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">NO</text>

  <line x1="640" y1="185" x2="640" y2="215" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="636,211 644,211 640,218" fill="#e05555"/>
  <text x="655" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">YES</text>
  <rect x="600" y="218" width="80" height="26" rx="3" fill="#1a0a0a"/>
  <text x="640" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">NULL 반환</text>

  <!-- Use case examples -->
  <text x="640" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">활용: 0 나누기 방지</text>
  <text x="640" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">v1 / NULLIF(v2, 0)</text>
  <text x="640" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">→ v2=0 이면 NULL, 계산 오류 방지</text>
  <text x="640" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">= CASE WHEN v1=v2 THEN NULL ELSE v1 END</text>

  <!-- Bottom function comparison -->
  <rect x="60" y="348" width="760" height="52" rx="6" fill="#0e1117" stroke="#3a4a6e"/>
  <text x="170" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NVL(a,b) — Oracle 전용</text>
  <text x="170" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">= COALESCE(a,b) 동일</text>
  <line x1="290" y1="348" x2="290" y2="400" stroke="#3a4a6e"/>
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IFNULL(a,b) — MySQL 전용</text>
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">= COALESCE(a,b) 동일</text>
  <line x1="590" y1="348" x2="590" y2="400" stroke="#3a4a6e"/>
  <text x="710" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">COALESCE — SQL 표준</text>
  <text x="710" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">모든 주요 DB 지원</text>
</svg>
