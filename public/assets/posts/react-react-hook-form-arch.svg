<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">React Hook Form 아키텍처</text>

  <defs>
    <marker id="arra" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- useForm -->
  <rect x="330" y="72" width="220" height="60" rx="10" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">useForm()</text>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비제어 방식으로 값 추적</text>

  <!-- Arrows down from useForm -->
  <line x1="380" y1="132" x2="220" y2="172" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arra)"/>
  <line x1="440" y1="132" x2="440" y2="172" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arra)"/>
  <line x1="500" y1="132" x2="660" y2="172" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arra)"/>

  <!-- register -->
  <rect x="100" y="176" width="240" height="66" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="220" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">register</text>
  <text x="220" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">입력 필드를 폼에 등록</text>
  <text x="220" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">ref + onChange + onBlur + name</text>

  <!-- formState -->
  <rect x="330" y="176" width="220" height="66" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">formState</text>
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">errors · isSubmitting</text>
  <text x="440" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">isDirty · isValid · touchedFields</text>

  <!-- handleSubmit -->
  <rect x="540" y="176" width="240" height="66" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="660" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">handleSubmit</text>
  <text x="660" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">검사 후 콜백 실행</text>
  <text x="660" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">handleSubmit(onValid, onInvalid)</text>

  <!-- Code example -->
  <rect x="60" y="266" width="760" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> { register, handleSubmit, formState: { errors } } = useForm();</tspan></tspan>
    <tspan x="76" dy="20"> </tspan>
    <tspan x="76" dy="20"><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">form</tspan><tspan fill="#ffffff"> onSubmit={handleSubmit(data =&gt; console.log(data))}&gt;</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">input</tspan><tspan fill="#ffffff"> {...register(</tspan><tspan fill="#ce9178">'email'</tspan><tspan fill="#ffffff">, { required: </tspan><tspan fill="#ce9178">'필수'</tspan><tspan fill="#ffffff">, pattern: { value: /\S+@\S+/, message: </tspan><tspan fill="#ce9178">'형식 오류'</tspan><tspan fill="#ffffff"> } })} /&gt;</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">    {errors.email &amp;&amp; &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">p</tspan><tspan fill="#ffffff">&gt;{errors.email.message}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">p</tspan><tspan fill="#ffffff">&gt;}</tspan></tspan>
  </text>
</svg>
