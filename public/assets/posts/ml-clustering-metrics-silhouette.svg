<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">실루엣 계수 (Silhouette Coefficient)</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">클러스터 내 응집도와 클러스터 간 분리도를 동시에 측정한다</text>

  <!-- LEFT: Geometric diagram -->
  <!-- Cluster A: blue, centered around (190, 230) -->
  <circle cx="155" cy="200" r="4" fill="#7ec8e3"/>
  <circle cx="170" cy="215" r="4" fill="#7ec8e3"/>
  <circle cx="160" cy="235" r="4" fill="#7ec8e3"/>
  <circle cx="175" cy="250" r="4" fill="#7ec8e3"/>
  <circle cx="190" cy="220" r="4" fill="#7ec8e3"/>
  <circle cx="205" cy="240" r="4" fill="#7ec8e3"/>
  <circle cx="195" cy="260" r="4" fill="#7ec8e3"/>
  <!-- Centroid A -->
  <circle cx="179" cy="232" r="7" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="145" y="185" fill="#7ec8e3" font-size="12" font-weight="600">군집 A</text>

  <!-- Point of interest: highlighted -->
  <circle cx="220" cy="200" r="6" fill="#e0a020" stroke="#fff" stroke-width="1.5"/>
  <text x="225" y="192" fill="#e0a020" font-size="11" font-weight="600">샘플 x</text>

  <!-- Cluster B: green, centered around (340, 220) -->
  <circle cx="310" cy="195" r="4" fill="#55c555"/>
  <circle cx="325" cy="210" r="4" fill="#55c555"/>
  <circle cx="340" cy="200" r="4" fill="#55c555"/>
  <circle cx="355" cy="215" r="4" fill="#55c555"/>
  <circle cx="330" cy="230" r="4" fill="#55c555"/>
  <circle cx="345" cy="245" r="4" fill="#55c555"/>
  <circle cx="360" cy="230" r="4" fill="#55c555"/>
  <text x="310" y="185" fill="#55c555" font-size="12" font-weight="600">군집 B</text>

  <!-- a(x): distance within cluster A -->
  <line x1="220" y1="200" x2="179" y2="232" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="185" y="210" fill="#7ec8e3" font-size="11" font-weight="600">a(x)</text>
  <text x="130" y="290" fill="#7ec8e3" font-size="11">a(x) = 같은 군집 내</text>
  <text x="130" y="306" fill="#7ec8e3" font-size="11">평균 거리 (응집도)</text>

  <!-- b(x): distance to nearest cluster B -->
  <line x1="220" y1="200" x2="335" y2="218" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="272" y="198" fill="#55c555" font-size="11" font-weight="600">b(x)</text>
  <text x="280" y="290" fill="#55c555" font-size="11">b(x) = 가장 가까운</text>
  <text x="280" y="306" fill="#55c555" font-size="11">타 군집까지 평균 거리</text>

  <!-- Formula box -->
  <rect x="60" y="340" width="360" height="68" rx="8" fill="#111827" stroke="#333" stroke-width="1.5"/>
  <text x="240" y="362" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="600">s(x) = (b(x) - a(x)) / max(a(x), b(x))</text>
  <line x1="76" y1="372" x2="404" y2="372" stroke="#333" stroke-width="1"/>
  <text x="240" y="390" text-anchor="middle" fill="#888" font-size="11">a(x) &lt;&lt; b(x) → s(x) → +1  (완벽한 클러스터)</text>
  <text x="240" y="406" text-anchor="middle" fill="#888" font-size="11">a(x) ≈ b(x) → s(x) ≈ 0  (경계선)</text>

  <!-- RIGHT: Score interpretation -->
  <rect x="460" y="88" width="360" height="320" rx="8" fill="#111827" stroke="#333" stroke-width="1.5"/>
  <text x="640" y="112" text-anchor="middle" fill="#e8e8e8" font-size="14" font-weight="600">실루엣 점수 해석</text>
  <line x1="476" y1="122" x2="804" y2="122" stroke="#333" stroke-width="1"/>

  <!-- Score bars -->
  <rect x="476" y="134" width="260" height="22" rx="3" fill="#0a2a15"/>
  <rect x="476" y="134" width="260" height="22" rx="3" fill="#55c555"/>
  <text x="490" y="150" fill="#0a0a0a" font-size="11" font-weight="600">0.71 ~ 1.00: 매우 좋은 구조</text>

  <rect x="476" y="162" width="195" height="22" rx="3" fill="#0e2a14"/>
  <rect x="476" y="162" width="195" height="22" rx="3" fill="#7ec8e3" opacity="0.8"/>
  <text x="490" y="178" fill="#0a0a0a" font-size="11" font-weight="600">0.51 ~ 0.70: 합리적 구조</text>

  <rect x="476" y="190" width="130" height="22" rx="3" fill="#3a2905"/>
  <rect x="476" y="190" width="130" height="22" rx="3" fill="#e0a020" opacity="0.7"/>
  <text x="490" y="206" fill="#0a0a0a" font-size="11" font-weight="600">0.26 ~ 0.50: 약한 구조</text>

  <rect x="476" y="218" width="65" height="22" rx="3" fill="#3a1010"/>
  <rect x="476" y="218" width="65" height="22" rx="3" fill="#e05555" opacity="0.7"/>
  <text x="490" y="234" fill="#fff" font-size="11" font-weight="600">≤ 0.25: 잘못된 군집화</text>

  <line x1="476" y1="250" x2="804" y2="250" stroke="#333" stroke-width="1"/>

  <text x="476" y="270" fill="#888" font-size="12" font-weight="600">최적 K 찾기</text>
  <text x="476" y="290" fill="#ccc" font-size="11">K=2~10 범위에서 평균 실루엣</text>
  <text x="476" y="308" fill="#ccc" font-size="11">점수가 최대인 K 선택</text>
  <text x="476" y="328" fill="#55c555" font-size="11">엘보우 방법보다 객관적 기준</text>

  <line x1="476" y1="340" x2="804" y2="340" stroke="#333" stroke-width="1"/>
  <text x="476" y="360" fill="#888" font-size="11">레이블 불필요 (비지도 평가)</text>
  <text x="476" y="378" fill="#888" font-size="11">O(n²) 계산 → 대용량 샘플링 필요</text>
  <text x="476" y="396" fill="#888" font-size="11">샘플별 시각화 → 이상치 탐지 가능</text>

  <!-- Footer -->
  <text x="440" y="428" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
