<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <defs>
    <marker id="vs-h1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
    <marker id="vs-h2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="470" fill="#0a0a0a" rx="12"/>

  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HTTP/1.1 연결 6개 vs HTTP/2 연결 1개</text>

  <!-- LEFT: HTTP/1.1 -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">HTTP/1.1 — 연결 6개 병렬</text>

  <rect x="60" y="112" width="360" height="246" fill="#000000" stroke="#3a4a6e" rx="6"/>

  <!-- 6 separate connections, each serial -->
  <text x="78" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">호스트당 최대 6개, 각 연결은 직렬</text>

  <!-- conn rows -->
  <text x="78" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">연결1</text>
  <rect x="128" y="158" width="48" height="18" fill="#7777cc" rx="3"/>
  <rect x="180" y="158" width="48" height="18" fill="#3a4a6e" rx="3"/>
  <text x="234" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">대기...</text>

  <text x="78" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">연결2</text>
  <rect x="128" y="188" width="48" height="18" fill="#7777cc" rx="3"/>
  <rect x="180" y="188" width="48" height="18" fill="#3a4a6e" rx="3"/>
  <text x="234" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">대기...</text>

  <text x="78" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">...</text>
  <text x="78" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">연결6</text>
  <rect x="128" y="248" width="48" height="18" fill="#7777cc" rx="3"/>
  <rect x="180" y="248" width="48" height="18" fill="#3a4a6e" rx="3"/>
  <text x="234" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">대기...</text>

  <text x="78" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">7번째 리소스부터 큐에서 대기</text>
  <text x="78" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">핸드셰이크·혼잡제어 6배 중복</text>
  <text x="78" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">→ 도메인 샤딩으로 더 늘려 우회</text>

  <!-- RIGHT: HTTP/2 -->
  <text x="480" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">HTTP/2 — 연결 1개 멀티플렉싱</text>

  <rect x="480" y="112" width="340" height="246" fill="#000000" stroke="#3a4a6e" rx="6"/>
  <text x="498" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단일 연결 위 다수 스트림 동시 처리</text>

  <text x="498" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">연결1</text>
  <!-- interleaved frames -->
  <rect x="548" y="158" width="40" height="18" fill="#7ec8e3" rx="3"/>
  <rect x="592" y="158" width="40" height="18" fill="#55c555" rx="3"/>
  <rect x="636" y="158" width="40" height="18" fill="#7777cc" rx="3"/>
  <rect x="680" y="158" width="40" height="18" fill="#55c555" rx="3"/>
  <rect x="724" y="158" width="40" height="18" fill="#7ec8e3" rx="3"/>
  <rect x="768" y="158" width="34" height="18" fill="#7777cc" rx="3"/>

  <rect x="548" y="182" width="40" height="18" fill="#55c555" rx="3"/>
  <rect x="592" y="182" width="40" height="18" fill="#7777cc" rx="3"/>
  <rect x="636" y="182" width="40" height="18" fill="#7ec8e3" rx="3"/>
  <rect x="680" y="182" width="40" height="18" fill="#7777cc" rx="3"/>
  <rect x="724" y="182" width="40" height="18" fill="#55c555" rx="3"/>
  <rect x="768" y="182" width="34" height="18" fill="#7ec8e3" rx="3"/>

  <text x="498" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">스트림 수십~수백 개 동시</text>
  <text x="498" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">핸드셰이크 1회, 혼잡제어 집중</text>
  <text x="498" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">애플리케이션 레벨 HOL 블로킹 해소</text>
  <text x="498" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">→ 도메인 샤딩·스프라이트 불필요</text>
  <text x="498" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">단, TCP 레벨 HOL은 남음 (→HTTP/3)</text>

  <!-- bottom summary -->
  <rect x="60" y="386" width="760" height="56" fill="#000000" stroke="#3a4a6e" rx="6"/>
  <text x="78" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">"연결당 직렬, 호스트당 6개"의 사슬을 단일 연결 멀티플렉싱으로 끊는다</text>
</svg>
