<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">소스맵 옵션 비교</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">devtool / sourcemap 설정값별 특성</text>

  <!-- Table header -->
  <rect x="60" y="90" width="760" height="32" rx="4" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="76" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">옵션값</text>
  <text x="290" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">번들 포함</text>
  <text x="420" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">빌드 속도</text>
  <text x="540" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">디버그 품질</text>
  <text x="680" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">권장 환경</text>

  <!-- Row 1: false -->
  <rect x="60" y="122" width="760" height="32" rx="0" fill="#0a0a0a" stroke="#1e2433"/>
  <text x="76" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">false</text>
  <text x="290" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">생성 안 함</text>
  <text x="420" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">가장 빠름</text>
  <text x="540" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" xml:space="preserve">불가</text>
  <text x="680" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">프로덕션 (소스 숨김)</text>

  <!-- Row 2: eval -->
  <rect x="60" y="154" width="760" height="32" rx="0" fill="#0a0a0a" stroke="#1e2433"/>
  <text x="76" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">eval</text>
  <text x="290" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">번들 내 인라인</text>
  <text x="420" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">빠름</text>
  <text x="540" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">파일명·줄만</text>
  <text x="680" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">개발 (빠른 HMR)</text>

  <!-- Row 3: cheap-source-map -->
  <rect x="60" y="186" width="760" height="32" rx="0" fill="#0a0a0a" stroke="#1e2433"/>
  <text x="76" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">cheap-source-map</text>
  <text x="290" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">별도 .map 파일</text>
  <text x="420" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">빠름</text>
  <text x="540" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">행만 (열 없음)</text>
  <text x="680" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">개발</text>

  <!-- Row 4: source-map (recommended prod) -->
  <rect x="60" y="218" width="760" height="32" rx="0" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="76" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">source-map</text>
  <text x="290" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">별도 .map 파일</text>
  <text x="420" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">느림</text>
  <text x="540" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">행+열 완전 매핑</text>
  <text x="680" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">프로덕션 (에러 추적)</text>

  <!-- Row 5: hidden-source-map -->
  <rect x="60" y="250" width="760" height="32" rx="0" fill="#0a0a0a" stroke="#1e2433"/>
  <text x="76" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">hidden-source-map</text>
  <text x="290" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">별도 파일 (URL 없음)</text>
  <text x="420" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">느림</text>
  <text x="540" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">완전</text>
  <text x="680" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">Sentry 에러 추적 전용</text>

  <!-- Row 6: inline-source-map -->
  <rect x="60" y="282" width="760" height="32" rx="0" fill="#0a0a0a" stroke="#1e2433"/>
  <text x="76" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">inline-source-map</text>
  <text x="290" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">Base64 인라인</text>
  <text x="420" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">느림</text>
  <text x="540" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">완전</text>
  <text x="680" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">단일 파일 필요 시</text>

  <!-- Bottom note -->
  <text x="60" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">프로덕션: source-map + Nginx에서 .map 파일 접근 차단 권장 (내부 에러 추적 서버만 접근)</text>
  <text x="60" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">webpack: devtool 옵션 / Vite·Rollup: sourcemap 옵션 / esbuild: sourcemap: true|'inline'|'external'</text>
</svg>
