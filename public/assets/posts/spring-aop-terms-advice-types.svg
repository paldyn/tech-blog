<svg width="880" height="540" viewBox="0 0 880 540" xmlns="http://www.w3.org/2000/svg">
<rect width="880" height="540" rx="12" fill="#0a0a0a"/>

<!-- Title -->
<text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Advice 타입 5가지</text>
<text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">메서드 실행 주기별 실행 시점과 사용 목적</text>

<!-- Timeline: method execution box -->
<text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">대상 메서드 실행</text>
<rect x="320" y="108" width="240" height="38" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
<text x="440" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">targetMethod()</text>

<!-- Code block: @Before -->
<rect x="60" y="168" width="370" height="96" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
<text x="76" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">@Before — 메서드 실행 전</text>
<line x1="60" y1="192" x2="430" y2="192" stroke="#1e2433" stroke-width="1"/>
<text xml:space="preserve" x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">@Before</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"execution(* place*(..))"</tspan><tspan fill="#e8e8e8">)</tspan></text>
<text xml:space="preserve" x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">public void logBefore(JoinPoint jp) {</text>
<text xml:space="preserve" x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    log.info(</tspan><tspan fill="#ce9178">"call: {}"</tspan><tspan fill="#e8e8e8">, jp.getSignature());</tspan></text>
<text xml:space="preserve" x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
<!-- Marker line to timeline -->
<line x1="245" y1="146" x2="245" y2="168" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="3,2"/>
<polygon points="239,166 251,166 245,146" fill="#7ec8e3" opacity="0.7"/>

<!-- Code block: @AfterReturning -->
<rect x="450" y="168" width="370" height="96" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
<text x="466" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">@AfterReturning — 정상 반환 후</text>
<line x1="450" y1="192" x2="820" y2="192" stroke="#1e2433" stroke-width="1"/>
<text xml:space="preserve" x="466" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">@AfterReturning</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">returning=</tspan><tspan fill="#ce9178">"result"</tspan><tspan fill="#e8e8e8">)</tspan></text>
<text xml:space="preserve" x="466" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">public void audit(Object result) {</text>
<text xml:space="preserve" x="466" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    log.info(</tspan><tspan fill="#ce9178">"result: {}"</tspan><tspan fill="#e8e8e8">, result);</tspan></text>
<text xml:space="preserve" x="466" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
<!-- Marker -->
<line x1="635" y1="146" x2="635" y2="168" stroke="#55c555" stroke-width="1.5" stroke-dasharray="3,2"/>
<polygon points="629,148 641,148 635,168" fill="#55c555" opacity="0.7"/>

<!-- Code block: @AfterThrowing -->
<rect x="60" y="284" width="370" height="96" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
<text x="76" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">@AfterThrowing — 예외 발생 후</text>
<line x1="60" y1="308" x2="430" y2="308" stroke="#1e2433" stroke-width="1"/>
<text xml:space="preserve" x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">@AfterThrowing</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">throwing=</tspan><tspan fill="#ce9178">"ex"</tspan><tspan fill="#e8e8e8">)</tspan></text>
<text xml:space="preserve" x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">public void onError(Exception ex) {</text>
<text xml:space="preserve" x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    alert.send(</tspan><tspan fill="#ce9178">"ERROR: "</tspan><tspan fill="#e8e8e8"> + ex);</tspan></text>
<text xml:space="preserve" x="76" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

<!-- Code block: @After -->
<rect x="450" y="284" width="370" height="96" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
<text x="466" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8b04a">@After — 항상 실행 (finally)</text>
<line x1="450" y1="308" x2="820" y2="308" stroke="#1e2433" stroke-width="1"/>
<text xml:space="preserve" x="466" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">@After</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"servicePointcut()"</tspan><tspan fill="#e8e8e8">)</tspan></text>
<text xml:space="preserve" x="466" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">public void cleanup(JoinPoint jp) {</text>
<text xml:space="preserve" x="466" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#6a8aa0">// 리소스 정리 — 항상 호출</tspan></text>
<text xml:space="preserve" x="466" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

<!-- Code block: @Around (full width) -->
<rect x="60" y="400" width="760" height="104" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
<text x="76" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#b5cea8">@Around — 실행 전후 모두 제어 (가장 강력)</text>
<line x1="60" y1="424" x2="820" y2="424" stroke="#1e2433" stroke-width="1"/>
<text xml:space="preserve" x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">@Around</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"servicePointcut()"</tspan><tspan fill="#e8e8e8">)</tspan></text>
<text xml:space="preserve" x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">public</tspan><tspan fill="#e8e8e8"> Object timing(ProceedingJoinPoint pjp) </tspan><tspan fill="#7ec8e3">throws</tspan><tspan fill="#e8e8e8"> Throwable {</tspan></text>
<text xml:space="preserve" x="76" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">long</tspan><tspan fill="#e8e8e8"> start = System.nanoTime();</tspan></text>
<text xml:space="preserve" x="76" y="496" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    try</tspan><tspan fill="#e8e8e8"> { </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#e8e8e8"> pjp.proceed(); }</tspan><tspan fill="#7ec8e3"> finally</tspan><tspan fill="#e8e8e8"> { log.info(</tspan><tspan fill="#ce9178">"{}ms"</tspan><tspan fill="#e8e8e8">,(nanoTime()-start)/1e6); }</tspan></text>
<text xml:space="preserve" x="76" y="496" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

<!-- Footer -->
<text x="440" y="522" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — Spring 완전 정복</text>
</svg>
