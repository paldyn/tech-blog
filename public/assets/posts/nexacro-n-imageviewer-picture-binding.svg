<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ImageViewer 동적 URL 교체 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Dataset 바인딩 + set_url() 런타임 교체</text>

  <!-- Code block left -->
  <rect x="60" y="92" width="380" height="360" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">// Dataset 컬럼 구조</text>
  <!-- DS columns -->
  <text x="80" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">var</text>
  <text x="121" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> ds = this.ds_empPhoto;</text>
  <text x="80" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// emp_id, photo_url 컬럼</text>

  <text x="80" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 그리드 행 클릭 → 이미지 교체</text>
  <text x="80" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text>
  <text x="151" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> grd_emp_oncellclick(obj,e)</text>
  <text x="80" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">{</text>
  <text x="94" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  var</tspan><tspan fill="#e8e8e8"> row = e.row;</tspan></text>
  
  <text x="94" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  var</tspan><tspan fill="#e8e8e8"> url = ds.getColumn(</tspan></text>
  
  <text x="94" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">         row, </tspan><tspan fill="#ce9178">"photo_url"</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="94" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  this.imgv_photo.set_url(url);</text>
  <text x="80" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <text x="80" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// stretch 옵션</text>
  <text x="80" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">imgv_photo.set_stretch(</text>
  <text x="80" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ce9178">  "fit"</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#888">// 비율 유지</tspan></text>

  <!-- Right panel: stretch options -->
  <rect x="460" y="92" width="360" height="360" fill="#111827" rx="10" stroke="#1e2433" stroke-width="1.5"/>
  <text x="640" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">stretch 옵션 비교</text>

  <rect x="484" y="138" width="312" height="50" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="504" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">fit</text>
  <text x="504" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가로·세로 비율 유지, 영역에 맞춤</text>

  <rect x="484" y="198" width="312" height="50" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="504" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">fill</text>
  <text x="504" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">영역을 꽉 채움 (비율 무시)</text>

  <rect x="484" y="258" width="312" height="50" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="504" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">none</text>
  <text x="504" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원본 크기 그대로 표시</text>

  <rect x="484" y="318" width="312" height="50" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="504" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">auto</text>
  <text x="504" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이미지가 영역보다 크면 fit 적용</text>

  <!-- Tip box -->
  <rect x="484" y="380" width="312" height="56" fill="#071a0f" rx="6" stroke="#1a3a1a"/>
  <text x="504" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">실무 팁</text>
  <text x="504" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로필 사진 → fit, 배경 이미지 → fill</text>
  <text x="504" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">썸네일 목록 → auto 권장</text>
</svg>
