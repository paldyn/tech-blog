<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">/proc/[PID]/ — 프로세스 가상 파일시스템</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">실행 중인 프로세스 정보를 파일로 노출하는 커널 인터페이스</text>

  <!-- Left: Directory tree -->
  <rect x="50" y="88" width="360" height="360" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="66" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">/proc/1234/</text>
  <text x="66" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── cmdline</text>
  <text x="66" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── comm</text>
  <text x="66" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── cwd  →  (심볼릭 링크)</text>
  <text x="66" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── environ</text>
  <text x="66" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">├── fd/</text>
  <text x="66" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">│   ├── 0  →  /dev/pts/0</text>
  <text x="66" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">│   └── 1  →  /dev/pts/0</text>
  <text x="66" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── maps</text>
  <text x="66" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── mem</text>
  <text x="66" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">├── net/</text>
  <text x="66" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── root  →  (심볼릭 링크)</text>
  <text x="66" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">├── stat</text>
  <text x="66" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">├── status</text>
  <text x="66" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── wchan</text>
  <text x="66" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">└── exe  →  /usr/bin/bash</text>

  <!-- Right: File descriptions -->
  <rect x="440" y="88" width="390" height="360" rx="8" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="635" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">주요 항목 설명</text>
  <line x1="456" y1="122" x2="814" y2="122" stroke="#1e2d45" stroke-width="1"/>

  <!-- Entries -->
  <rect x="456" y="130" width="358" height="32" rx="4" fill="#0d1929"/>
  <text x="468" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">cmdline</text>
  <text x="560" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">프로세스 실행 시 전달된 인수</text>

  <rect x="456" y="168" width="358" height="32" rx="4" fill="#0a0a0a"/>
  <text x="468" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">comm</text>
  <text x="556" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실행 파일 이름(최대 15자)</text>

  <rect x="456" y="206" width="358" height="32" rx="4" fill="#0d1929"/>
  <text x="468" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">environ</text>
  <text x="563" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">환경 변수 (NULL 구분)</text>

  <rect x="456" y="244" width="358" height="32" rx="4" fill="#0a0a0a"/>
  <text x="468" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">fd/</text>
  <text x="503" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">열린 파일 디스크립터 심볼릭 링크</text>

  <rect x="456" y="282" width="358" height="32" rx="4" fill="#0d1929"/>
  <text x="468" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">maps</text>
  <text x="527" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">가상 메모리 맵(주소 범위 + 권한)</text>

  <rect x="456" y="320" width="358" height="32" rx="4" fill="#0a0a0a"/>
  <text x="468" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">status</text>
  <text x="534" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">사람이 읽기 좋은 상태 요약</text>

  <rect x="456" y="358" width="358" height="32" rx="4" fill="#0d1929"/>
  <text x="468" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">stat</text>
  <text x="516" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">기계 파싱용 상태(PID, state…)</text>

  <rect x="456" y="396" width="358" height="32" rx="4" fill="#0a0a0a"/>
  <text x="468" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">exe</text>
  <text x="507" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실행 중인 바이너리의 실제 경로</text>
</svg>
