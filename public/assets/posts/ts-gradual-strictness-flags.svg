<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">strict가 켜는 플래그들</text>
  <text x="60" y="76" font-size="14" fill="#888">strict: true는 여러 플래그의 묶음 — 하나씩 켜며 정리한다</text>

  <!-- order column -->
  <rect x="60" y="100" width="380" height="290" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="84" y="134" font-size="16" font-weight="600" fill="#e8e8e8">권장 활성화 순서</text>
  <text x="84" y="168" font-size="13" fill="#7ec8e3" font-weight="600">1. noImplicitAny</text>
  <text x="84" y="188" font-size="13" fill="#888">암묵적 any 금지 — 영향 가장 큼</text>
  <text x="84" y="220" font-size="13" fill="#7ec8e3" font-weight="600">2. strictNullChecks</text>
  <text x="84" y="240" font-size="13" fill="#888">null·undefined를 타입에 반영</text>
  <text x="84" y="272" font-size="13" fill="#7ec8e3" font-weight="600">3. strictFunctionTypes</text>
  <text x="84" y="292" font-size="13" fill="#888">함수 매개변수 반변성 검사</text>
  <text x="84" y="324" font-size="13" fill="#7ec8e3" font-weight="600">4. strictPropertyInitialization</text>
  <text x="84" y="344" font-size="13" fill="#888">클래스 필드 초기화 강제</text>
  <text x="84" y="376" font-size="13" fill="#9aa4b8">+ noImplicitThis, alwaysStrict …</text>

  <!-- effect column -->
  <rect x="460" y="100" width="360" height="290" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="134" font-size="16" font-weight="600" fill="#55c555">왜 이 순서인가</text>
  <text x="484" y="170" font-size="13" fill="#888">• noImplicitAny가 가장 많은</text>
  <text x="484" y="190" font-size="13" fill="#888">  any를 드러냄 → 먼저 닫는다</text>
  <text x="484" y="222" font-size="13" fill="#888">• strictNullChecks가 가장</text>
  <text x="484" y="242" font-size="13" fill="#888">  많은 실제 버그를 잡는다</text>
  <text x="484" y="274" font-size="13" fill="#888">• 나머지는 에러 수가 적어</text>
  <text x="484" y="294" font-size="13" fill="#888">  마지막에 한꺼번에 켜기 쉽다</text>
  <text x="484" y="332" font-size="13" fill="#9aa4b8">한 플래그 → 에러 정리 → 커밋</text>
  <text x="484" y="362" font-size="13" fill="#9aa4b8">→ 반복하면 결국 strict: true</text>
</svg>
