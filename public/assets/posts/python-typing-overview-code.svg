<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">변수·함수에 타입 힌트 달기</text>

  <rect x="60" y="64" width="760" height="216" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="80" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> typing </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Optional</tspan></text>

  <text x="80" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> greet(name: </tspan><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">, times: </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="80" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ce9178">"Hi "</tspan><tspan fill="#ffffff"> + name) * times</tspan></text>

  <text x="80" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">age: </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#9aa4b8">              # 변수 어노테이션</tspan></text>

  <text x="80" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">nick: Optional[</tspan><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#7ec8e3" font-weight="600">None</tspan></text>

  <text x="80" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 검사기가 잡아내는 오류:</tspan></text>

  <text x="80" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">greet(</tspan><tspan fill="#ce9178">"Sam"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"twice"</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#e05555">  # int 자리에 str</tspan></text>
</svg>
