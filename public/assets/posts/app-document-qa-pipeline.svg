<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="ap" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">RAG 기반 문서 Q&amp;A 파이프라인</text>

  <!-- Phase 1: Indexing -->
  <text x="22" y="106" font-size="12" fill="#888" transform="rotate(-90,22,106)" text-anchor="middle">인덱싱</text>
  <rect x="60" y="80" width="230" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="104" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">문서 로드 · 파싱</text>
  <text x="175" y="125" text-anchor="middle" font-size="12" fill="#888">PDF · DOCX · HTML</text>

  <line x1="290" y1="110" x2="350" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <rect x="350" y="80" width="230" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="465" y="104" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">청킹 + 임베딩 생성</text>
  <text x="465" y="125" text-anchor="middle" font-size="12" fill="#888">512 토큰 · text-embedding-3</text>

  <line x1="465" y1="140" x2="465" y2="202" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
  <text x="476" y="175" font-size="11" fill="#888">저장</text>

  <!-- Vector DB shared -->
  <rect x="290" y="202" width="300" height="60" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="226" text-anchor="middle" font-size="16" font-weight="700" fill="#55c555">Vector DB</text>
  <text x="440" y="247" text-anchor="middle" font-size="12" fill="#888">pgvector · Pinecone · Weaviate</text>

  <line x1="440" y1="262" x2="440" y2="318" stroke="#7777cc" stroke-width="2" marker-end="url(#ap)"/>
  <text x="452" y="293" font-size="11" fill="#888">검색</text>

  <!-- Phase 2: Querying -->
  <text x="22" y="360" font-size="12" fill="#888" transform="rotate(-90,22,360)" text-anchor="middle">검색</text>
  <rect x="60" y="318" width="200" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="342" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">사용자 질문</text>
  <text x="160" y="363" text-anchor="middle" font-size="12" fill="#888">자연어 쿼리 입력</text>

  <line x1="260" y1="348" x2="290" y2="348" stroke="#7777cc" stroke-width="2" marker-end="url(#ap)"/>

  <rect x="590" y="318" width="230" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="342" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">LLM 답변 생성</text>
  <text x="705" y="363" text-anchor="middle" font-size="12" fill="#888">컨텍스트 기반 응답</text>

  <line x1="590" y1="348" x2="550" y2="348" stroke="#7777cc" stroke-width="2" marker-end="url(#ap)"/>

  <!-- Vector DB → retrieved chunks → LLM -->
  <rect x="290" y="318" width="260" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1"/>
  <text x="420" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">유사 청크 K개 검색</text>
  <text x="420" y="363" text-anchor="middle" font-size="12" fill="#888">코사인 유사도 · Top-K</text>

  <line x1="550" y1="348" x2="590" y2="348" stroke="#7777cc" stroke-width="2" marker-end="url(#ap)"/>
</svg>
