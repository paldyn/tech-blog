<svg width="880" height="460" viewBox="0 0 880 460"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">LLM 사전학습 파이프라인</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">데이터 수집 → 정제 → 토큰화 → 분산 학습 → 평가</text>

  <!-- Step 1: Data collection -->
  <rect x="40" y="90" width="148" height="120" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="114" y="114" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">① 데이터 수집</text>
  <text x="114" y="134" text-anchor="middle" fill="#888" font-size="11">Common Crawl</text>
  <text x="114" y="150" text-anchor="middle" fill="#888" font-size="11">웹 텍스트 (60%)</text>
  <text x="114" y="168" text-anchor="middle" fill="#888" font-size="11">Books (15%)</text>
  <text x="114" y="184" text-anchor="middle" fill="#888" font-size="11">코드 (10%)</text>
  <text x="114" y="200" text-anchor="middle" fill="#888" font-size="11">학술·위키 (15%)</text>

  <!-- Arrow 1 -->
  <polygon points="196,148 224,148 224,142 240,150 224,158 224,152 196,152" fill="#555"/>

  <!-- Step 2: Filtering -->
  <rect x="240" y="90" width="148" height="120" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="314" y="114" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">② 품질 필터링</text>
  <text x="314" y="134" text-anchor="middle" fill="#888" font-size="11">언어 감지</text>
  <text x="314" y="150" text-anchor="middle" fill="#888" font-size="11">중복 제거</text>
  <text x="314" y="168" text-anchor="middle" fill="#888" font-size="11">독성 콘텐츠</text>
  <text x="314" y="184" text-anchor="middle" fill="#888" font-size="11">낮은 품질 필터</text>
  <text x="314" y="200" text-anchor="middle" fill="#888" font-size="11">→ 10% 남기도</text>

  <!-- Arrow 2 -->
  <polygon points="396,148 424,148 424,142 440,150 424,158 424,152 396,152" fill="#555"/>

  <!-- Step 3: Tokenization -->
  <rect x="440" y="90" width="148" height="120" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="514" y="114" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">③ 토큰화</text>
  <text x="514" y="134" text-anchor="middle" fill="#888" font-size="11">BPE / SentPiece</text>
  <text x="514" y="150" text-anchor="middle" fill="#888" font-size="11">어휘 크기 32K~</text>
  <text x="514" y="168" text-anchor="middle" fill="#888" font-size="11">128K 토큰</text>
  <text x="514" y="184" text-anchor="middle" fill="#888" font-size="11">→ 정수 ID 시퀀스</text>
  <text x="514" y="200" text-anchor="middle" fill="#888" font-size="11">로 변환</text>

  <!-- Arrow 3 -->
  <polygon points="596,148 624,148 624,142 640,150 624,158 624,152 596,152" fill="#555"/>

  <!-- Step 4: Training -->
  <rect x="640" y="90" width="200" height="120" rx="8" fill="#2e1a0a" stroke="#e8a030" stroke-width="2"/>
  <text x="740" y="114" text-anchor="middle" fill="#e8a030" font-size="13" font-weight="600">④ 분산 학습</text>
  <text x="740" y="134" text-anchor="middle" fill="#888" font-size="11">수천 GPU/TPU 병렬</text>
  <text x="740" y="150" text-anchor="middle" fill="#888" font-size="11">Data Parallelism</text>
  <text x="740" y="166" text-anchor="middle" fill="#888" font-size="11">Tensor Parallelism</text>
  <text x="740" y="182" text-anchor="middle" fill="#888" font-size="11">Pipeline Parallelism</text>
  <text x="740" y="198" text-anchor="middle" fill="#888" font-size="11">수주~수개월 소요</text>

  <!-- Data composition pie -->
  <text x="440" y="248" text-anchor="middle" fill="#e8e8e8" font-size="16" font-weight="600">학습 데이터 구성 (LLaMA-3 기준, 15T 토큰)</text>

  <!-- Bar chart for data composition -->
  <rect x="60" y="264" width="280" height="18" rx="3" fill="#7777cc"/>
  <text x="350" y="277" fill="#e8e8e8" font-size="12">웹 텍스트 (Common Crawl) 50%+</text>

  <rect x="60" y="290" width="168" height="18" rx="3" fill="#55c555"/>
  <text x="238" y="303" fill="#e8e8e8" font-size="12">코드 (GitHub) 30%</text>

  <rect x="60" y="316" width="84" height="18" rx="3" fill="#7ec8e3"/>
  <text x="154" y="329" fill="#e8e8e8" font-size="12">책 (Books) 15%</text>

  <rect x="60" y="342" width="28" height="18" rx="3" fill="#e8a030"/>
  <text x="98" y="355" fill="#e8e8e8" font-size="12">위키피디아 5%</text>

  <!-- Training loss curve (right side) -->
  <text x="680" y="252" text-anchor="middle" fill="#e8e8e8" font-size="14" font-weight="600">학습 손실 곡선</text>
  <rect x="480" y="264" width="360" height="110" rx="6" fill="#080810" stroke="#333"/>

  <!-- Axes -->
  <line x1="500" y1="360" x2="820" y2="360" stroke="#555" stroke-width="1"/>
  <line x1="500" y1="276" x2="500" y2="360" stroke="#555" stroke-width="1"/>
  <text x="660" y="374" text-anchor="middle" fill="#888" font-size="10">학습 토큰 수 (수조 →)</text>
  <text x="488" y="320" text-anchor="middle" fill="#888" font-size="10" transform="rotate(-90 488 320)">Loss</text>

  <!-- Loss curve (smoothly decreasing) -->
  <polyline points="500,276 540,280 580,290 620,300 660,310 700,320 740,328 780,334 820,340"
    stroke="#e8a030" stroke-width="2.5" fill="none"/>

  <!-- Annotations -->
  <circle cx="540" cy="280" r="3" fill="#55c555"/>
  <text x="542" y="272" fill="#55c555" font-size="9">초기 빠른 하강</text>
  <circle cx="780" cy="334" r="3" fill="#7ec8e3"/>
  <text x="742" y="328" fill="#7ec8e3" font-size="9">수렴 구간</text>

  <!-- Bottom: scale reference -->
  <text x="440" y="400" text-anchor="middle" fill="#e8e8e8" font-size="14" font-weight="600">주요 모델 학습 규모</text>
  <text x="160" y="420" text-anchor="middle" fill="#888" font-size="11">GPT-3: 570GB / 300B tok</text>
  <text x="370" y="420" text-anchor="middle" fill="#888" font-size="11">LLaMA-3: 15T tokens</text>
  <text x="570" y="420" text-anchor="middle" fill="#888" font-size="11">Gemini Ultra: ~10T+</text>
  <text x="760" y="420" text-anchor="middle" fill="#888" font-size="11">비용: 수십~수백억 원</text>

  <text x="440" y="446" text-anchor="middle" fill="#888" font-size="12">Chinchilla 법칙: 최적 토큰 수 ≈ 파라미터 수 × 20</text>
</svg>
