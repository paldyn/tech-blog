<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">class extends 상속 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">두 개의 prototype 체인 — 인스턴스 체인 + 생성자 체인</text>

  <!-- Animal class box -->
  <rect x="60" y="100" width="200" height="100" fill="#101412" rx="8" stroke="#1e3a20"/>
  <text x="160" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Animal</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">breathe: ƒ</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">prototype: →</text>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]: Function.prototype</text>

  <!-- Animal.prototype box -->
  <rect x="300" y="100" width="220" height="100" fill="#101412" rx="8" stroke="#1e3a20"/>
  <text x="410" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Animal.prototype</text>
  <text x="318" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">breathe: ƒ</text>
  <text x="318" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">constructor: Animal</text>
  <text x="318" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]: Object.prototype</text>

  <!-- Arrow Animal.prototype property -->
  <line x1="260" y1="160" x2="296" y2="160" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="294,154 306,160 294,166" fill="#55c555"/>
  <text x="270" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555">.prototype</text>

  <!-- Dog class box -->
  <rect x="60" y="280" width="200" height="100" fill="#0d1520" rx="8" stroke="#1e3a5f"/>
  <text x="160" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Dog</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bark: ƒ</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">prototype: →</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]: Animal ←</text>

  <!-- Arrow Dog [[Prototype]] → Animal (constructor chain) -->
  <line x1="160" y1="280" x2="160" y2="204" stroke="#7777cc" stroke-width="2"/>
  <polygon points="154,206 160,194 166,206" fill="#7777cc"/>
  <text x="170" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7777cc">[[Proto]]</text>
  <text x="170" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555">(생성자 체인)</text>

  <!-- Dog.prototype box -->
  <rect x="300" y="280" width="220" height="100" fill="#0d1520" rx="8" stroke="#1e3a5f"/>
  <text x="410" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Dog.prototype</text>
  <text x="318" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bark: ƒ</text>
  <text x="318" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">constructor: Dog</text>
  <text x="318" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]: Animal.prototype ←</text>

  <!-- Arrow Dog.prototype [[Proto]] → Animal.prototype (instance chain) -->
  <line x1="410" y1="280" x2="410" y2="204" stroke="#55c555" stroke-width="2"/>
  <polygon points="404,206 410,194 416,206" fill="#55c555"/>
  <text x="420" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555">[[Proto]]</text>
  <text x="420" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555">(인스턴스 체인)</text>

  <!-- Arrow Dog.prototype property -->
  <line x1="260" y1="340" x2="296" y2="340" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="294,334 306,340 294,346" fill="#7ec8e3"/>

  <!-- dog instance box -->
  <rect x="560" y="280" width="220" height="100" fill="#0a1410" rx="8" stroke="#1a3a20"/>
  <text x="670" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">dog (인스턴스)</text>
  <text x="578" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">name: 'Rex'</text>
  <text x="578" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]: Dog.prototype</text>

  <!-- Arrow dog [[Proto]] → Dog.prototype -->
  <line x1="560" y1="340" x2="524" y2="340" stroke="#55c555" stroke-width="2"/>
  <polygon points="526,334 514,340 526,346" fill="#55c555"/>
  <text x="526" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555">[[Proto]]</text>

  <!-- Legend -->
  <rect x="60" y="420" width="760" height="72" fill="#111" rx="8" stroke="#222"/>
  <line x1="100" y1="448" x2="130" y2="448" stroke="#55c555" stroke-width="2"/>
  <text x="140" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">인스턴스 체인</text>
  <text x="260" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">dog → Dog.prototype → Animal.prototype → Object.prototype → null</text>
  <line x1="100" y1="474" x2="130" y2="474" stroke="#7777cc" stroke-width="2"/>
  <text x="140" y="479" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">생성자 체인</text>
  <text x="260" y="479" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Dog → Animal → Function.prototype → Object.prototype → null (정적 메서드 상속)</text>

  <text x="440" y="504" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
