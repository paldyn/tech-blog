<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tmux 세션·윈도우·팬 구조</text>

  <!-- Session box -->
  <rect x="60" y="64" width="760" height="300" rx="10" fill="#0d0d20" stroke="#3a4a6e" stroke-width="2"/>
  <text x="90" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Session: dev</text>

  <!-- Window 1 -->
  <rect x="80" y="100" width="340" height="240" rx="8" fill="#0f0f1a" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="100" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Window 0: editor</text>

  <!-- Pane 1-1 -->
  <rect x="96" y="130" width="300" height="90" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="116" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Pane 0-0</text>
  <text x="116" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">$ vim src/main.py</text>
  <text x="116" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">-- INSERT --</text>
  <text x="116" y="206" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#555">...</text>

  <!-- Pane 1-2 -->
  <rect x="96" y="228" width="300" height="96" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="116" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Pane 0-1</text>
  <text x="116" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">$ python</text>
  <text x="116" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> -m pytest tests/</text>
  <text x="116" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">5 passed in 0.3s</text>

  <!-- Window 2 -->
  <rect x="440" y="100" width="360" height="240" rx="8" fill="#0f1a0f" stroke="#3a8e3a" stroke-width="1.5"/>
  <text x="460" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Window 1: server</text>

  <!-- Pane 2-1 -->
  <rect x="456" y="130" width="326" height="90" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="476" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Pane 1-0</text>
  <text x="476" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">$ uvicorn</text>
  <text x="476" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> app:main --reload</text>
  <text x="476" y="206" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">INFO: Running on :8000</text>

  <!-- Pane 2-2 -->
  <rect x="456" y="228" width="326" height="96" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="476" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Pane 1-1</text>
  <text x="476" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">$ watch</text>
  <text x="476" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> -n1 curl -s :8000/health</text>
  <text x="476" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">{"status":"ok"}</text>

  <!-- Status bar -->
  <rect x="60" y="380" width="760" height="24" rx="0" fill="#1a3060" stroke="none"/>
  <text x="80" y="397" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">[dev] 0:editor* 1:server-</text>
  <text x="680" y="397" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">hostname 14:22</text>

  <!-- Detach info -->
  <rect x="60" y="420" width="760" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="440" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 세션 분리 (SSH 끊겨도 프로세스 유지)</text>
  <text x="80" y="458" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">Ctrl+b</text>
  <text x="150" y="458" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> d        </text>
  <text x="230" y="458" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># detach</text>
  <text x="80" y="476" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">tmux</text>
  <text x="116" y="476" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> attach -t dev    </text>
  <text x="290" y="476" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 재접속 (언제든)</text>
  <text x="80" y="494" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">tmux</text>
  <text x="116" y="494" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> ls              </text>
  <text x="246" y="494" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 세션 목록</text>
</svg>
