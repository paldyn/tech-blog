<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">MessageConverter 실전 설정 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">WebMvcConfigurer / @Configuration 커스터마이징</text>

  <!-- Left: extendMessageConverters -->
  <text x="60" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">커스텀 컨버터 추가</text>
  <rect x="60" y="112" width="360" height="176" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">@Configuration</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">public class</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">                  WebConfig</text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">    // extends WebMvcConfigurer</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    @Override</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    void extendMessageConverters(</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">        List&lt;HttpMessageConverter&lt;?&gt;&gt; c)</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">      // 기존 컨버터 유지 + 추가</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      c.add(0, myConverter());</text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    }</text>

  <!-- Right: produces/consumes -->
  <text x="460" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">produces / consumes 명시</text>
  <rect x="460" y="112" width="360" height="176" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">@GetMapping</text>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  (value = </tspan><tspan fill="#ce9178">          "/user/{id}"</tspan><tspan fill="#e8e8e8">                    ,</tspan></text>

  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">   produces = </tspan><tspan fill="#ce9178">             "application/json"</tspan><tspan fill="#e8e8e8">                              )</tspan></text>

  <text x="476" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">public</text>
  <text x="476" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">       ResponseEntity&lt;UserDto&gt;</text>
  <text x="476" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    getUser(</text>
  <text x="476" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">      @PathVariable </tspan><tspan fill="#e8e8e8">                  Long id) {</tspan></text>
  
  <text x="476" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">      // ...</text>
  <text x="476" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    }</text>

  <!-- Bottom: canRead/canWrite flow boxes -->
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Converter 선택 알고리즘</text>

  <rect x="60" y="334" width="160" height="52" rx="6" fill="#111827" stroke="#1e2433"/>
  <text x="140" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">요청 Content-Type</text>
  <text x="140" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">canRead() 순회</text>

  <line x1="220" y1="360" x2="280" y2="360" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#55c555"/>
    </marker>
  </defs>

  <rect x="280" y="334" width="160" height="52" rx="6" fill="#111827" stroke="#1e2433"/>
  <text x="360" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">첫 번째 매칭</text>
  <text x="360" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Converter 사용</text>

  <line x1="440" y1="360" x2="500" y2="360" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="500" y="334" width="160" height="52" rx="6" fill="#111827" stroke="#1e2433"/>
  <text x="580" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">응답 Accept</text>
  <text x="580" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">canWrite() 순회</text>

  <line x1="660" y1="360" x2="720" y2="360" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="720" y="334" width="100" height="52" rx="6" fill="#0d1d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">write()</text>
  <text x="770" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답 직렬화</text>

  <!-- Tip box -->
  <rect x="60" y="420" width="760" height="52" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="443" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">핵심 포인트</text>
  <text x="440" y="461" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Boot가 Jackson을 classpath에서 감지하면 MappingJackson2HttpMessageConverter를 자동 등록 — 별도 설정 불필요</text>
</svg>
