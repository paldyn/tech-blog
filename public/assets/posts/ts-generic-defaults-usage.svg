<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">T 결정 우선순위</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">명시 &gt; 추론 &gt; 기본값 순으로 T가 결정된다</text>

  <!-- Left: usage examples -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단일 기본값 활용</text>
  <rect x="60" y="116" width="360" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 명시적 타입 인수</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> a = wrap&lt;<tspan fill="#b5cea8">boolean</tspan>&gt;(<tspan fill="#7ec8e3" font-weight="600">true</tspan>);</text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// T = boolean (명시)</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> b = wrap(<tspan fill="#ce9178">"hello"</tspan>);</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// T = string (인수에서 추론)</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> c = wrap();</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// T = string (기본값 적용)</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 호출자는 T를 신경 쓸 필요 없음</text>

  <!-- Right: multiple defaults -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">다중 기본값 — 앞 파라미터 참조 가능</text>
  <rect x="460" y="116" width="360" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Pair&lt;</text>
  <text x="476" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  A = <tspan fill="#ce9178">string</tspan>,</text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  B = A</text>
  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">&gt; = { first: A; second: B };</text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Pair&lt;string, string&gt;</text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> P2 = Pair&lt;<tspan fill="#b5cea8">number</tspan>&gt;;</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Pair&lt;number, number&gt; — B=A=number</text>
  <text x="476" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> P3 = Pair&lt;<tspan fill="#b5cea8">number</tspan>, <tspan fill="#b5cea8">boolean</tspan>&gt;;</text>

  <!-- Priority flow boxes -->
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Flow: 3 boxes -->
  <rect x="60" y="314" width="200" height="54" rx="6" fill="#0f2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">① 명시적 T 전달</text>
  <text x="160" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">wrap&lt;boolean&gt;(…)</text>

  <line x1="262" y1="341" x2="318" y2="341" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="320" y="314" width="200" height="54" rx="6" fill="#1a1a0a" stroke="#e8c84a" stroke-width="1"/>
  <text x="420" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a" text-anchor="middle">② 인수에서 추론</text>
  <text x="420" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">wrap("hello") → string</text>

  <line x1="522" y1="341" x2="578" y2="341" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="580" y="314" width="200" height="54" rx="6" fill="#1a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="680" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">③ 기본값 적용</text>
  <text x="680" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">wrap() → default T</text>

  <!-- Note -->
  <rect x="60" y="400" width="760" height="54" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">실전 패턴</text>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">라이브러리 타입 선언 시 사용자가 T를 생략해도 안전하게 동작하도록 기본값을 제공한다</text>
</svg>
