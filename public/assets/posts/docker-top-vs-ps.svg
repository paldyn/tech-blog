<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker top vs exec ps</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">두 방법의 PID 네임스페이스 차이</text>

  <!-- Left: docker top -->
  <rect x="60" y="104" width="360" height="180" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">docker top web</text>
  <text x="80" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 호스트 PID 네임스페이스 기준</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· ps, proctools 없어도 동작</text>
  <text x="80" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· nsenter에 사용할 PID 확인 가능</text>
  <text x="80" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· Distroless 컨테이너에서도 작동</text>
  <text x="80" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">PID 12345  →  컨테이너 내 PID 1</text>
  <text x="80" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">PID 12360  →  컨테이너 내 PID 8</text>

  <!-- Right: docker exec ps -->
  <rect x="460" y="104" width="360" height="180" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">docker exec web ps aux</text>
  <text x="480" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 컨테이너 PID 네임스페이스 기준</text>
  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· procps 패키지 필요</text>
  <text x="480" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 컨테이너 내부 시각으로 조회</text>
  <text x="480" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· /proc 파일시스템 직접 접근</text>
  <text x="480" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">PID 1  →  nginx: master</text>
  <text x="480" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">PID 8  →  nginx: worker</text>

  <!-- Code block: nsenter usage -->
  <rect x="60" y="304" width="760" height="60" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># docker top으로 얻은 호스트 PID로 nsenter 진입</text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">nsenter</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">-t</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#b5cea8">12345</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">--net --pid --mount</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">bash</tspan>
    <tspan fill="#6a8aa0">  # 컨테이너 ns 진입</tspan>
  </text>
</svg>
