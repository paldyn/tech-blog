<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">BuildKit 시크릿 마운트</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle" xml:space="preserve">빌드 중 민감 정보를 레이어에 남기지 않는 안전한 방법</text>

  <!-- Problem: ENV way -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" xml:space="preserve">잘못된 방법 — 레이어에 토큰 노출</text>
  <rect x="60" y="116" width="360" height="88" fill="#070b14" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># docker history로 노출됨!</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ARG</text>
  <text x="108" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> NPM_TOKEN</text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="108" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> echo "//registry/:_auth=$NPM_TOKEN" \</text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    &gt; .npmrc &amp;&amp; npm ci</text>

  <!-- Solution: secret mount -->
  <text x="460" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" xml:space="preserve">올바른 방법 — 시크릿 마운트</text>
  <rect x="460" y="116" width="360" height="88" fill="#070b14" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="476" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># syntax=docker/dockerfile:1</text>
  <text x="476" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="508" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> --mount=type=secret,id=npm \</text>
  <text x="476" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    NPM_TOKEN=$(cat /run/secrets/npm) \</text>
  <text x="476" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    npm ci</text>

  <!-- Build command -->
  <text x="60" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" xml:space="preserve">빌드 명령</text>
  <rect x="60" y="248" width="760" height="38" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">docker build --secret id=npm,src=$HOME/.npmrc .</text>

  <!-- SSH mount -->
  <text x="60" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" xml:space="preserve">SSH 에이전트 마운트 — private repo 접근</text>
  <rect x="60" y="330" width="760" height="88" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># Dockerfile</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="108" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> --mount=type=ssh \</text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    git clone git@github.com:company/repo.git</text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 빌드: docker build --ssh default .</text>
</svg>
