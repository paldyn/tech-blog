<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">날짜·시간 타입 — 무엇을 저장하는가</text>

  <!-- ── Left: Type anatomy ── -->
  <rect x="60" y="68" width="760" height="192" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="94" font-size="13" font-weight="600" fill="#e8e8e8">타입별 저장 범위</text>

  <!-- DATE row -->
  <text x="80" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">DATE          </text>
  <rect x="182" y="108" width="68" height="24" rx="3" fill="#0d2a0d" stroke="#1a4a1a"/>
  <text x="216" y="124" text-anchor="middle" font-size="10" fill="#55c555">YYYY</text>
  <rect x="254" y="108" width="44" height="24" rx="3" fill="#0d2a0d" stroke="#1a4a1a"/>
  <text x="276" y="124" text-anchor="middle" font-size="10" fill="#55c555">MM</text>
  <rect x="302" y="108" width="44" height="24" rx="3" fill="#0d2a0d" stroke="#1a4a1a"/>
  <text x="324" y="124" text-anchor="middle" font-size="10" fill="#55c555">DD</text>
  <text x="358" y="122" font-size="11" fill="#555">  날짜만 · 시간 없음 · 타임존 없음</text>

  <!-- TIME row -->
  <text x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">TIME          </text>
  <rect x="182" y="138" width="44" height="24" rx="3" fill="#0a1a2a" stroke="#1a2a4a"/>
  <text x="204" y="154" text-anchor="middle" font-size="10" fill="#7ec8e3">HH</text>
  <rect x="230" y="138" width="44" height="24" rx="3" fill="#0a1a2a" stroke="#1a2a4a"/>
  <text x="252" y="154" text-anchor="middle" font-size="10" fill="#7ec8e3">MI</text>
  <rect x="278" y="138" width="44" height="24" rx="3" fill="#0a1a2a" stroke="#1a2a4a"/>
  <text x="300" y="154" text-anchor="middle" font-size="10" fill="#7ec8e3">SS</text>
  <rect x="326" y="138" width="64" height="24" rx="3" fill="#0a1a2a" stroke="#1a2a4a"/>
  <text x="358" y="154" text-anchor="middle" font-size="10" fill="#7ec8e3">ffffff</text>
  <text x="402" y="152" font-size="11" fill="#555">  시간만 · 날짜 없음</text>

  <!-- TIMESTAMP row -->
  <text x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">TIMESTAMP     </text>
  <rect x="182" y="168" width="52" height="24" rx="3" fill="#0d2a0d" stroke="#1a4a1a"/>
  <text x="208" y="184" text-anchor="middle" font-size="10" fill="#55c555">YYYY</text>
  <rect x="238" y="168" width="36" height="24" rx="3" fill="#0d2a0d" stroke="#1a4a1a"/>
  <text x="256" y="184" text-anchor="middle" font-size="10" fill="#55c555">MM</text>
  <rect x="278" y="168" width="36" height="24" rx="3" fill="#0d2a0d" stroke="#1a4a1a"/>
  <text x="296" y="184" text-anchor="middle" font-size="10" fill="#55c555">DD</text>
  <rect x="318" y="168" width="36" height="24" rx="3" fill="#0a1a2a" stroke="#1a2a4a"/>
  <text x="336" y="184" text-anchor="middle" font-size="10" fill="#7ec8e3">HH</text>
  <rect x="358" y="168" width="36" height="24" rx="3" fill="#0a1a2a" stroke="#1a2a4a"/>
  <text x="376" y="184" text-anchor="middle" font-size="10" fill="#7ec8e3">MI</text>
  <rect x="398" y="168" width="36" height="24" rx="3" fill="#0a1a2a" stroke="#1a2a4a"/>
  <text x="416" y="184" text-anchor="middle" font-size="10" fill="#7ec8e3">SS</text>
  <text x="446" y="182" font-size="11" fill="#555">  날짜+시간 · 타임존 없음</text>

  <!-- TIMESTAMP WITH TIME ZONE row -->
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">TIMESTAMPTZ   </text>
  <rect x="182" y="198" width="52" height="24" rx="3" fill="#0d2a0d" stroke="#1a4a1a"/>
  <text x="208" y="214" text-anchor="middle" font-size="10" fill="#55c555">YYYY</text>
  <rect x="238" y="198" width="36" height="24" rx="3" fill="#0d2a0d" stroke="#1a4a1a"/>
  <text x="256" y="214" text-anchor="middle" font-size="10" fill="#55c555">MM</text>
  <rect x="278" y="198" width="36" height="24" rx="3" fill="#0d2a0d" stroke="#1a4a1a"/>
  <text x="296" y="214" text-anchor="middle" font-size="10" fill="#55c555">DD</text>
  <rect x="318" y="198" width="36" height="24" rx="3" fill="#0a1a2a" stroke="#1a2a4a"/>
  <text x="336" y="214" text-anchor="middle" font-size="10" fill="#7ec8e3">HH</text>
  <rect x="358" y="198" width="36" height="24" rx="3" fill="#0a1a2a" stroke="#1a2a4a"/>
  <text x="376" y="214" text-anchor="middle" font-size="10" fill="#7ec8e3">MI</text>
  <rect x="398" y="198" width="36" height="24" rx="3" fill="#0a1a2a" stroke="#1a2a4a"/>
  <text x="416" y="214" text-anchor="middle" font-size="10" fill="#7ec8e3">SS</text>
  <rect x="438" y="198" width="68" height="24" rx="3" fill="#2a1a08" stroke="#4a3010"/>
  <text x="472" y="214" text-anchor="middle" font-size="10" fill="#ce9178">+HH:MI</text>
  <text x="518" y="212" font-size="11" fill="#ce9178">  UTC 오프셋 포함</text>
  <text x="518" y="228" font-size="11" fill="#555">  (= TIMESTAMP WITH TIME ZONE)</text>

  <!-- ── Bottom panels ── -->
  <!-- Left: SQL examples -->
  <rect x="60" y="278" width="350" height="182" rx="8" fill="#0d0d0d" stroke="#1a1a3a"/>
  <text x="235" y="306" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">SQL 예시</text>
  <line x1="60" y1="318" x2="410" y2="318" stroke="#1a1a2a"/>

  <rect x="78" y="328" width="314" height="118" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="90" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 타입별 리터럴</text>
  <text x="90" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">DATE      </text>
  <text x="150" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">'2026-04-26'</text>
  <text x="90" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">TIME      </text>
  <text x="150" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">'14:30:00'</text>
  <text x="90" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">TIMESTAMP </text>
  <text x="162" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">'2026-04-26 14:30:00'</text>
  <text x="90" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">TIMESTAMPTZ</text>
  <text x="192" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178"> '2026-04-26 14:30:00+09'</text>
  <text x="90" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 현재 시각</text>
  <text x="90" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 현재 시각</text>
  <text x="176" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555"> CURRENT_TIMESTAMP</text>

  <!-- Right: DBMS gotchas -->
  <rect x="470" y="278" width="350" height="182" rx="8" fill="#0d0d0d" stroke="#3a1a1a"/>
  <text x="645" y="306" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">DBMS별 주의사항</text>
  <line x1="470" y1="318" x2="820" y2="318" stroke="#2a1a1a"/>

  <rect x="488" y="328" width="314" height="34" rx="4" fill="#1a0606" stroke="#3a1010"/>
  <text x="500" y="347" font-size="11" font-weight="600" fill="#e05555">⚠ MySQL TIMESTAMP: 2038년 문제</text>
  <text x="500" y="359" font-size="10" fill="#888">저장 범위: 1970-01-01 ~ 2038-01-19</text>

  <rect x="488" y="368" width="314" height="34" rx="4" fill="#1a1006" stroke="#3a2a10"/>
  <text x="500" y="387" font-size="11" font-weight="600" fill="#e8c555">⚠ Oracle DATE: 시간 포함!</text>
  <text x="500" y="399" font-size="10" fill="#888">날짜+시간 저장 · 시간 부분 주의</text>

  <rect x="488" y="408" width="314" height="42" rx="4" fill="#060e06" stroke="#1a2a1a"/>
  <text x="500" y="426" font-size="11" font-weight="600" fill="#55c555">✓ 권장: TIMESTAMP WITH TIME ZONE</text>
  <text x="500" y="440" font-size="10" fill="#888">글로벌 서비스는 UTC로 저장하고</text>
  <text x="500" y="452" font-size="10" fill="#888">표시 시 클라이언트 타임존으로 변환</text>

  <!-- Footer -->
  <text x="440" y="494" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 2</text>
</svg>
