<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">멀티 아키텍처 — Manifest List 구조</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">하나의 태그가 여러 플랫폼 이미지를 가리키는 방법</text>

  <!-- Manifest List box -->
  <rect x="300" y="104" width="280" height="80" fill="#0d1117" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Manifest List</text>
  <text x="440" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">nginx:latest</text>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(OCI Image Index)</text>

  <!-- Arrows to platforms -->
  <!-- Left arrow to linux/amd64 -->
  <line x1="340" y1="184" x2="200" y2="260" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="196,264 194,248 208,254" fill="#7ec8e3"/>

  <!-- Center arrow to linux/arm64 -->
  <line x1="440" y1="184" x2="440" y2="258" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="440,264 434,250 446,250" fill="#7ec8e3"/>

  <!-- Right arrow to linux/arm/v7 -->
  <line x1="540" y1="184" x2="680" y2="260" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="684,264 672,254 686,248" fill="#7ec8e3"/>

  <!-- Platform boxes -->
  <rect x="80" y="264" width="220" height="80" fill="#0d1117" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="190" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">linux/amd64</text>
  <text x="190" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">sha256:aaa111...</text>
  <text x="190" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">x86_64 서버</text>

  <rect x="330" y="264" width="220" height="80" fill="#0d1117" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">linux/arm64</text>
  <text x="440" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">sha256:bbb222...</text>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Apple M1/M2 · AWS Graviton</text>

  <rect x="580" y="264" width="220" height="80" fill="#0d1117" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">linux/arm/v7</text>
  <text x="690" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">sha256:ccc333...</text>
  <text x="690" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Raspberry Pi 등</text>

  <!-- Docker pull behavior -->
  <rect x="60" y="370" width="760" height="100" fill="#0d1117" rx="10" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker pull nginx:latest 실행 시</text>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">① Docker가 현재 호스트 CPU 아키텍처를 감지</text>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">② Manifest List에서 해당 플랫폼 이미지 Digest 선택</text>
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">③ 자동으로 올바른 이미지 pull — 사용자는 아무것도 안 해도 됨</text>
</svg>
