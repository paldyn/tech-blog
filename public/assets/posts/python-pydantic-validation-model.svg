<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">모델 선언 = 검증 규칙</text>

  <rect x="60" y="80" width="760" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">from</tspan> pydantic <tspan fill="#7ec8e3" font-weight="600">import</tspan> BaseModel, Field</text>
  <text x="76" y="142" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">class</tspan> User(BaseModel):</text>
  <text x="76" y="166" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    name: <tspan fill="#7ec8e3" font-weight="600">str</tspan>                       <tspan fill="#9aa4b8"># 필수</tspan></text>
  <text x="76" y="190" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    age: <tspan fill="#7ec8e3" font-weight="600">int</tspan> = Field(ge=<tspan fill="#b5cea8">0</tspan>)       <tspan fill="#9aa4b8"># 0 이상</tspan></text>
  <text x="76" y="214" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    email: <tspan fill="#7ec8e3" font-weight="600">str</tspan> | <tspan fill="#7ec8e3" font-weight="600">None</tspan> = <tspan fill="#7ec8e3" font-weight="600">None</tspan>    <tspan fill="#9aa4b8"># 선택</tspan></text>
  <text x="76" y="238" font-size="13" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 타입 힌트가 곧 규칙이 된다</text>

  <rect x="60" y="262" width="760" height="30" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="282" font-size="13" fill="#55c555" text-anchor="middle">필드 타입을 적는 것만으로 검증·형변환·기본값 규칙이 함께 정의된다</text>
</svg>
