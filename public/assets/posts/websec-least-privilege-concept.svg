<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">최소 권한 원칙 (Least Privilege)</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">필요한 권한만, 필요한 시간 동안, 필요한 리소스에만</text>

  <!-- Left: Overprivileged -->
  <rect x="60" y="100" width="350" height="340" rx="10" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="235" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">과도한 권한 (위험)</text>

  <rect x="80" y="148" width="310" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="235" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">DB 사용자: GRANT ALL PRIVILEGES</text>

  <rect x="80" y="196" width="310" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="235" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">서버 프로세스: root 권한 실행</text>

  <rect x="80" y="244" width="310" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="235" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">API 토큰: 만료 없음, 전체 접근</text>

  <rect x="80" y="292" width="310" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="235" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">S3 버킷: PublicReadWriteAcl</text>

  <rect x="80" y="340" width="310" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="235" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">직원: admin 계정 공유</text>

  <rect x="80" y="390" width="310" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="235" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">컨테이너: privileged 모드</text>

  <!-- Right: Least Privilege -->
  <rect x="470" y="100" width="350" height="340" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="645" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">최소 권한 (안전)</text>

  <rect x="490" y="148" width="310" height="36" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">DB: SELECT, INSERT, UPDATE 만</text>

  <rect x="490" y="196" width="310" height="36" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">서버 프로세스: 전용 비루트 계정</text>

  <rect x="490" y="244" width="310" height="36" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">API 토큰: 최소 스코프, 단기 만료</text>

  <rect x="490" y="292" width="310" height="36" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">S3: 특정 경로 읽기 전용</text>

  <rect x="490" y="340" width="310" height="36" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">직원: 역할별 개인 계정</text>

  <rect x="490" y="388" width="310" height="36" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">컨테이너: 읽기전용 루트 파일시스템</text>

  <!-- Bottom -->
  <rect x="60" y="454" width="760" height="18" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">침해 발생 시 최소 권한은 피해 범위를 극적으로 제한한다</text>
</svg>
