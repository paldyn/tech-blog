<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Zero-shot CoT vs Few-shot CoT</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">두 가지 CoT 구현 방식 비교</text>

  <!-- Zero-shot CoT -->
  <text x="215" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Zero-shot CoT</text>
  <text x="215" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Kojima et al. 2022</text>

  <!-- Code block -->
  <rect x="60" y="132" width="310" height="170" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 프롬프트</text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Q: 농부가 당근 18개 중</text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">   7개를 팔았다. 남은 수는?</text>
  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"></text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">A: 단계별로 생각해 봅시다.</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">   ↑ 이 한 문장이 전부!</text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 모델 출력</text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">18 - 7 = 11. 답: 11개</text>

  <rect x="60" y="316" width="310" height="56" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="215" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점: 예시 불필요, 범용</text>
  <text x="215" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점: 복잡한 도메인에서 불안정</text>

  <!-- Few-shot CoT -->
  <text x="665" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Few-shot CoT</text>
  <text x="665" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Wei et al. 2022</text>

  <!-- Code block -->
  <rect x="510" y="132" width="310" height="230" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="526" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 예시 포함 프롬프트</text>
  <text x="526" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Q: 사과 5개, 배 3개 합은?</text>
  <text x="526" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">A: 사과 5 + 배 3 = 8개.</text>
  <text x="526" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">   답: 8개</text>
  <text x="526" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">---</text>
  <text x="526" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Q: 농부가 당근 18개 중</text>
  <text x="526" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">   7개를 팔았다. 남은 수는?</text>
  <text x="526" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">A: 18 - 7 = 11. 답: 11개</text>
  <text x="526" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">   추론 패턴 학습됨</text>

  <rect x="510" y="376" width="310" height="56" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="665" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점: 패턴 제어, 고정밀</text>
  <text x="665" y="417" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점: 좋은 예시 작성 비용</text>

  <!-- Divider -->
  <line x1="440" y1="90" x2="440" y2="450" stroke="#222" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Bottom note -->
  <rect x="60" y="450" width="760" height="36" rx="6" fill="#111111" stroke="#1e2433"/>
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">GPT-4, Claude 등 대형 모델(~100B+)에서 CoT 효과 극대화 — 소형 모델은 오히려 혼란 가능</text>
</svg>
