<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">DI 의존성 주입 — 요청에서 응답까지 흐름</text>

  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Step labels -->
  <text x="105" y="100" text-anchor="middle" font-size="12" fill="#666">①요청</text>
  <text x="290" y="100" text-anchor="middle" font-size="12" fill="#666">②컨테이너</text>
  <text x="500" y="100" text-anchor="middle" font-size="12" fill="#666">③의존성 주입</text>
  <text x="690" y="100" text-anchor="middle" font-size="12" fill="#666">④실행</text>
  <text x="816" y="100" text-anchor="middle" font-size="12" fill="#666">⑤응답</text>

  <!-- HTTP Request -->
  <rect x="70" y="116" width="80" height="56" fill="#0d1117" stroke="#444" stroke-width="1.5" rx="8"/>
  <text x="110" y="142" text-anchor="middle" font-size="12" fill="#bbbbbb">HTTP</text>
  <text x="110" y="160" text-anchor="middle" font-size="12" fill="#bbbbbb">Request</text>

  <!-- Arrow 1 -->
  <line x1="152" y1="144" x2="190" y2="144" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- IoC Container -->
  <rect x="192" y="112" width="200" height="208" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1.5" rx="8"/>
  <text x="292" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">IoC Container</text>

  <rect x="208" y="146" width="168" height="100" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="224" y="172" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Component</text>
  <text x="224" y="190" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">OrderApi {</text>
  <text x="224" y="208" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  OrderService s;</text>
  <text x="224" y="226" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <text x="292" y="270" text-anchor="middle" font-size="11" fill="#777">빈 정의 스캔</text>
  <text x="292" y="288" text-anchor="middle" font-size="11" fill="#777">싱글톤 레지스트리</text>
  <text x="292" y="306" text-anchor="middle" font-size="11" fill="#55c555">ApplicationContext</text>

  <!-- Arrow 2 -->
  <line x1="394" y1="216" x2="430" y2="216" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- DI injection zone -->
  <rect x="432" y="112" width="220" height="208" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1.5" rx="8"/>
  <text x="542" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">의존성 그래프 생성</text>

  <rect x="448" y="146" width="88" height="56" fill="#070b14" stroke="#1e2433" rx="5"/>
  <text x="492" y="170" text-anchor="middle" font-size="12" fill="#7ec8e3">Controller</text>
  <text x="492" y="188" text-anchor="middle" font-size="10" fill="#666">@Controller</text>

  <rect x="548" y="146" width="88" height="56" fill="#070b14" stroke="#1e2433" rx="5"/>
  <text x="592" y="170" text-anchor="middle" font-size="12" fill="#7ec8e3">Service</text>
  <text x="592" y="188" text-anchor="middle" font-size="10" fill="#666">@Service</text>

  <rect x="448" y="220" width="88" height="56" fill="#070b14" stroke="#1e2433" rx="5"/>
  <text x="492" y="244" text-anchor="middle" font-size="12" fill="#7ec8e3">Repository</text>
  <text x="492" y="262" text-anchor="middle" font-size="10" fill="#666">@Repository</text>

  <rect x="548" y="220" width="88" height="56" fill="#070b14" stroke="#1e2433" rx="5"/>
  <text x="592" y="244" text-anchor="middle" font-size="12" fill="#7ec8e3">DataSource</text>
  <text x="592" y="262" text-anchor="middle" font-size="10" fill="#666">@Bean</text>

  <line x1="536" y1="174" x2="548" y2="174" stroke="#445" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="492" y1="202" x2="492" y2="220" stroke="#445" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="592" y1="202" x2="592" y2="220" stroke="#445" stroke-width="1" marker-end="url(#ar)"/>
  <text x="542" y="298" text-anchor="middle" font-size="10" fill="#666">생성자 주입</text>

  <!-- Arrow 3 -->
  <line x1="654" y1="216" x2="690" y2="216" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Business Execution -->
  <rect x="692" y="112" width="124" height="208" fill="#1a0f0a" stroke="#4a2a1a" stroke-width="1.5" rx="8"/>
  <text x="754" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#ddaa55">비즈니스 실행</text>
  <text x="708" y="162" font-size="11" fill="#888">트랜잭션 시작</text>
  <text x="708" y="184" font-size="12" fill="#bbbbbb">placeOrder()</text>
  <text x="708" y="206" font-size="12" fill="#bbbbbb">재고 확인</text>
  <text x="708" y="228" font-size="12" fill="#bbbbbb">결제 처리</text>
  <text x="708" y="250" font-size="12" fill="#bbbbbb">주문 저장</text>
  <text x="708" y="272" font-size="11" fill="#888">트랜잭션 커밋</text>

  <!-- Response -->
  <line x1="816" y1="144" x2="816" y2="144" stroke="transparent"/>

  <!-- AOP layer -->
  <rect x="192" y="346" width="624" height="84" fill="#100a1a" stroke="#2a1a3a" stroke-width="1.5" rx="8"/>
  <text x="504" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#cc55cc">AOP 프록시 레이어 (투명하게 삽입)</text>
  <text x="240" y="394" font-size="12" fill="#999">로깅 Advice</text>
  <text x="380" y="394" font-size="12" fill="#999">@Transactional</text>
  <text x="520" y="394" font-size="12" fill="#999">@PreAuthorize</text>
  <text x="660" y="394" font-size="12" fill="#999">@Cacheable</text>
  <text x="504" y="416" text-anchor="middle" font-size="11" fill="#665566">비즈니스 코드 수정 없이 위 기능이 자동 적용</text>

  <line x1="292" y1="320" x2="292" y2="346" stroke="#2a1a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="542" y1="320" x2="542" y2="346" stroke="#2a1a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="754" y1="320" x2="754" y2="346" stroke="#2a1a3a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- PSA note -->
  <rect x="60" y="450" width="760" height="68" fill="#0f1a0a" stroke="#2a3a1a" stroke-width="1" rx="8"/>
  <text x="440" y="474" text-anchor="middle" font-size="13" font-weight="600" fill="#aadd55">PSA — 기술 추상화</text>
  <text x="200" y="498" text-anchor="middle" font-size="12" fill="#888">JdbcTemplate</text>
  <text x="360" y="498" text-anchor="middle" font-size="12" fill="#888">JpaRepository</text>
  <text x="520" y="498" text-anchor="middle" font-size="12" fill="#888">CacheManager</text>
  <text x="690" y="498" text-anchor="middle" font-size="12" fill="#888">TransactionManager</text>

  <!-- Footer -->
  <text x="440" y="540" text-anchor="middle" font-size="10" fill="#444">PALDYN · Spring 완전 정복 시리즈</text>
</svg>
