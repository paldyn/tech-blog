<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">DI 의존성 주입 — 요청에서 응답까지 흐름</text>

  <!-- Step labels -->
  <text x="90" y="86" text-anchor="middle" font-size="11" fill="#555">①시작</text>
  <text x="280" y="86" text-anchor="middle" font-size="11" fill="#555">②컨테이너 조회</text>
  <text x="480" y="86" text-anchor="middle" font-size="11" fill="#555">③의존성 주입</text>
  <text x="680" y="86" text-anchor="middle" font-size="11" fill="#555">④실행</text>
  <text x="820" y="86" text-anchor="middle" font-size="11" fill="#555">⑤응답</text>

  <!-- Boxes -->
  <!-- HTTP Request -->
  <rect x="60" y="96" width="80" height="50" fill="#0d1117" stroke="#333" stroke-width="1.5" rx="8"/>
  <text x="100" y="120" text-anchor="middle" font-size="11" fill="#aaa">HTTP</text>
  <text x="100" y="136" text-anchor="middle" font-size="11" fill="#aaa">Request</text>

  <!-- Arrow 1 -->
  <line x1="142" y1="121" x2="180" y2="121" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- IoC Container -->
  <rect x="182" y="72" width="196" height="180" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1.5" rx="8"/>
  <text x="280" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#55c555">IoC Container</text>
  <rect x="196" y="102" width="168" height="60" fill="#070b14" stroke="#1e2433" stroke-width="1" rx="6"/>
  <text x="212" y="120" font-size="10" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Component</text>
  <text x="212" y="136" font-size="10" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">OrderController {</text>
  <text x="212" y="152" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  OrderService svc;</text>
  <text x="212" y="163" font-size="10" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="280" y="186" text-anchor="middle" font-size="10" fill="#555">빈 정의 스캔</text>
  <text x="280" y="202" text-anchor="middle" font-size="10" fill="#555">싱글톤 레지스트리 보관</text>
  <text x="280" y="218" text-anchor="middle" font-size="10" fill="#555">요청 시 인스턴스 제공</text>
  <text x="280" y="238" text-anchor="middle" font-size="10" fill="#55c555">ApplicationContext</text>

  <!-- Arrow 2 -->
  <line x1="378" y1="162" x2="416" y2="162" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- DI injection zone -->
  <rect x="418" y="100" width="224" height="140" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1.5" rx="8"/>
  <text x="530" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">의존성 그래프 생성</text>

  <!-- Component boxes inside -->
  <rect x="432" y="132" width="88" height="40" fill="#070b14" stroke="#1e2433" stroke-width="1" rx="5"/>
  <text x="476" y="150" text-anchor="middle" font-size="10" fill="#7ec8e3">Controller</text>
  <text x="476" y="164" text-anchor="middle" font-size="9" fill="#555">@Controller</text>

  <rect x="542" y="132" width="88" height="40" fill="#070b14" stroke="#1e2433" stroke-width="1" rx="5"/>
  <text x="586" y="150" text-anchor="middle" font-size="10" fill="#7ec8e3">Service</text>
  <text x="586" y="164" text-anchor="middle" font-size="9" fill="#555">@Service</text>

  <rect x="432" y="186" width="88" height="40" fill="#070b14" stroke="#1e2433" stroke-width="1" rx="5"/>
  <text x="476" y="204" text-anchor="middle" font-size="10" fill="#7ec8e3">Repository</text>
  <text x="476" y="218" text-anchor="middle" font-size="9" fill="#555">@Repository</text>

  <rect x="542" y="186" width="88" height="40" fill="#070b14" stroke="#1e2433" stroke-width="1" rx="5"/>
  <text x="586" y="204" text-anchor="middle" font-size="10" fill="#7ec8e3">DataSource</text>
  <text x="586" y="218" text-anchor="middle" font-size="9" fill="#555">@Bean</text>

  <!-- dependency arrows inside DI zone -->
  <line x1="520" y1="152" x2="542" y2="152" stroke="#334" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="476" y1="172" x2="476" y2="186" stroke="#334" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="586" y1="172" x2="586" y2="186" stroke="#334" stroke-width="1" marker-end="url(#ar)"/>

  <!-- Arrow 3 -->
  <line x1="642" y1="162" x2="680" y2="162" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Business Execution -->
  <rect x="682" y="100" width="136" height="140" fill="#1a0f0a" stroke="#4a2a1a" stroke-width="1.5" rx="8"/>
  <text x="750" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#ddaa55">비즈니스 실행</text>
  <text x="698" y="148" font-size="10" fill="#888">트랜잭션 시작</text>
  <text x="698" y="166" font-size="10" fill="#aaa">플레이스오더()</text>
  <text x="698" y="184" font-size="10" fill="#aaa">상품 재고 확인</text>
  <text x="698" y="202" font-size="10" fill="#aaa">결제 처리</text>
  <text x="698" y="220" font-size="10" fill="#aaa">주문 저장</text>
  <text x="698" y="234" font-size="10" fill="#888">트랜잭션 커밋</text>

  <!-- Arrow 4 -->
  <line x1="818" y1="162" x2="820" y2="162" stroke="#333" stroke-width="1" />

  <!-- Response box -->
  <rect x="812" y="96" width="50" height="50" fill="#0d1117" stroke="#333" stroke-width="1.5" rx="8"/>
  <text x="837" y="120" text-anchor="middle" font-size="10" fill="#aaa">HTTP</text>
  <text x="837" y="136" text-anchor="middle" font-size="10" fill="#aaa">200 OK</text>

  <!-- AOP layer at bottom -->
  <rect x="182" y="278" width="680" height="80" fill="#100a1a" stroke="#2a1a3a" stroke-width="1.5" rx="8"/>
  <text x="522" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#cc55cc">AOP 프록시 레이어 (투명하게 삽입)</text>
  <text x="232" y="322" font-size="11" fill="#888">로깅 Advice</text>
  <text x="380" y="322" font-size="11" fill="#888">@Transactional</text>
  <text x="528" y="322" font-size="11" fill="#888">@PreAuthorize</text>
  <text x="676" y="322" font-size="11" fill="#888">캐시(@Cacheable)</text>
  <text x="522" y="344" text-anchor="middle" font-size="10" fill="#554455">비즈니스 코드 수정 없이 위 기능이 자동 적용됨</text>

  <!-- Vertical connectors to AOP -->
  <line x1="280" y1="252" x2="280" y2="278" stroke="#2a1a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="530" y1="240" x2="530" y2="278" stroke="#2a1a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="750" y1="240" x2="750" y2="278" stroke="#2a1a3a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- PSA note -->
  <rect x="60" y="380" width="760" height="60" fill="#0f1a0a" stroke="#2a3a1a" stroke-width="1" rx="8"/>
  <text x="440" y="403" text-anchor="middle" font-size="12" font-weight="600" fill="#aadd55">PSA — 기술 추상화</text>
  <text x="200" y="425" text-anchor="middle" font-size="11" fill="#777">JdbcTemplate</text>
  <text x="360" y="425" text-anchor="middle" font-size="11" fill="#777">JpaRepository</text>
  <text x="520" y="425" text-anchor="middle" font-size="11" fill="#777">CacheManager</text>
  <text x="680" y="425" text-anchor="middle" font-size="11" fill="#777">PlatformTransactionManager</text>
  <text x="440" y="444" text-anchor="middle" font-size="10" fill="#444">모두 동일한 추상 인터페이스 → 구현체 교체에도 비즈니스 코드 무변경</text>

  <!-- Footer -->
  <text x="440" y="470" text-anchor="middle" font-size="10" fill="#333">PALDYN · Spring 완전 정복 시리즈</text>
</svg>
