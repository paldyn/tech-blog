<svg xmlns="http://www.w3.org/2000/svg" width="880" height="600" viewBox="0 0 880 600" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="600" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">DI 의존성 주입 — 요청에서 응답까지 흐름</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">컨테이너가 의존성 그래프를 만들고 비즈니스를 실행한다</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7777cc"/>
    </marker>
    <marker id="arS" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#445"/>
    </marker>
  </defs>

  <!-- step labels -->
  <text x="115" y="116" text-anchor="middle" font-size="11" fill="#666">① 요청</text>
  <text x="296" y="116" text-anchor="middle" font-size="11" fill="#666">② 컨테이너</text>
  <text x="514" y="116" text-anchor="middle" font-size="11" fill="#666">③ 의존성 주입</text>
  <text x="700" y="116" text-anchor="middle" font-size="11" fill="#666">④ 실행</text>

  <!-- HTTP Request -->
  <rect x="76" y="128" width="80" height="60" fill="#0d1117" stroke="#444" stroke-width="1.5" rx="8"/>
  <text x="116" y="156" text-anchor="middle" font-size="12" fill="#bbbbbb">HTTP</text>
  <text x="116" y="174" text-anchor="middle" font-size="12" fill="#bbbbbb">Request</text>

  <line x1="158" y1="158" x2="194" y2="158" stroke="#7777cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- IoC Container -->
  <rect x="196" y="128" width="200" height="216" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1.5" rx="8"/>
  <text x="296" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">IoC Container</text>

  <rect x="216" y="162" width="160" height="100" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="232" y="186" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Component</text>
  <text x="232" y="204" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">OrderApi {</text>
  <text x="246" y="222" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// inject</text>
  <text x="246" y="240" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">OrderService s;</text>

  <text x="296" y="288" text-anchor="middle" font-size="11" fill="#888">빈 정의 스캔 · 싱글톤 등록</text>
  <text x="296" y="306" text-anchor="middle" font-size="11" fill="#888">생명주기 관리</text>
  <text x="296" y="328" text-anchor="middle" font-size="11" fill="#55c555">ApplicationContext</text>

  <line x1="398" y1="232" x2="434" y2="232" stroke="#7777cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- DI graph zone -->
  <rect x="436" y="128" width="220" height="216" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1.5" rx="8"/>
  <text x="546" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">의존성 그래프 생성</text>

  <rect x="452" y="162" width="88" height="60" fill="#070b14" stroke="#1e2433" rx="5"/>
  <text x="496" y="186" text-anchor="middle" font-size="12" fill="#7ec8e3">Controller</text>
  <text x="496" y="206" text-anchor="middle" font-size="10" fill="#666">@Controller</text>

  <rect x="552" y="162" width="88" height="60" fill="#070b14" stroke="#1e2433" rx="5"/>
  <text x="596" y="186" text-anchor="middle" font-size="12" fill="#7ec8e3">Service</text>
  <text x="596" y="206" text-anchor="middle" font-size="10" fill="#666">@Service</text>

  <rect x="452" y="240" width="88" height="60" fill="#070b14" stroke="#1e2433" rx="5"/>
  <text x="496" y="264" text-anchor="middle" font-size="12" fill="#7ec8e3">Repository</text>
  <text x="496" y="284" text-anchor="middle" font-size="10" fill="#666">@Repository</text>

  <rect x="552" y="240" width="88" height="60" fill="#070b14" stroke="#1e2433" rx="5"/>
  <text x="596" y="264" text-anchor="middle" font-size="12" fill="#7ec8e3">DataSource</text>
  <text x="596" y="284" text-anchor="middle" font-size="10" fill="#666">@Bean</text>

  <line x1="540" y1="192" x2="552" y2="192" stroke="#445" stroke-width="1" marker-end="url(#arS)"/>
  <line x1="496" y1="222" x2="496" y2="240" stroke="#445" stroke-width="1" marker-end="url(#arS)"/>
  <line x1="596" y1="222" x2="596" y2="240" stroke="#445" stroke-width="1" marker-end="url(#arS)"/>
  <text x="546" y="324" text-anchor="middle" font-size="11" fill="#7777cc">생성자 주입으로 연결</text>

  <line x1="658" y1="232" x2="694" y2="232" stroke="#7777cc" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Business execution -->
  <rect x="696" y="128" width="124" height="216" fill="#1a0f0a" stroke="#4a2a1a" stroke-width="1.5" rx="8"/>
  <text x="758" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#ddaa55">비즈니스 실행</text>
  <text x="712" y="178" font-size="11" fill="#888">트랜잭션 시작</text>
  <text x="712" y="200" font-size="12" fill="#bbbbbb">placeOrder()</text>
  <text x="712" y="222" font-size="12" fill="#bbbbbb">재고 확인</text>
  <text x="712" y="244" font-size="12" fill="#bbbbbb">결제 처리</text>
  <text x="712" y="266" font-size="12" fill="#bbbbbb">주문 저장</text>
  <text x="712" y="294" font-size="11" fill="#888">트랜잭션 커밋</text>
  <text x="712" y="324" font-size="11" fill="#ddaa55">⑤ 응답 반환</text>

  <!-- AOP layer -->
  <rect x="196" y="372" width="624" height="92" fill="#100a1a" stroke="#2a1a3a" stroke-width="1.5" rx="8"/>
  <text x="508" y="396" text-anchor="middle" font-size="13" font-weight="600" fill="#cc77cc">AOP 프록시 레이어 (투명하게 삽입)</text>

  <rect x="216" y="408" width="132" height="32" fill="#150d1a" stroke="#2a1a3a" rx="4"/>
  <text x="282" y="429" text-anchor="middle" font-size="12" fill="#cc77cc">로깅 Advice</text>
  <rect x="360" y="408" width="132" height="32" fill="#150d1a" stroke="#2a1a3a" rx="4"/>
  <text x="426" y="429" text-anchor="middle" font-size="12" fill="#cc77cc">@Transactional</text>
  <rect x="504" y="408" width="132" height="32" fill="#150d1a" stroke="#2a1a3a" rx="4"/>
  <text x="570" y="429" text-anchor="middle" font-size="12" fill="#cc77cc">@PreAuthorize</text>
  <rect x="648" y="408" width="132" height="32" fill="#150d1a" stroke="#2a1a3a" rx="4"/>
  <text x="714" y="429" text-anchor="middle" font-size="12" fill="#cc77cc">@Cacheable</text>

  <text x="508" y="456" text-anchor="middle" font-size="11" fill="#665566">비즈니스 코드 수정 없이 위 기능이 자동 적용</text>

  <line x1="296" y1="344" x2="296" y2="372" stroke="#2a1a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="546" y1="344" x2="546" y2="372" stroke="#2a1a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="758" y1="344" x2="758" y2="372" stroke="#2a1a3a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- PSA note -->
  <rect x="60" y="484" width="760" height="72" fill="#0f1a0a" stroke="#2a3a1a" stroke-width="1" rx="8"/>
  <text x="440" y="508" text-anchor="middle" font-size="13" font-weight="600" fill="#aadd55">PSA · 기술 추상화 — 어떤 구현이든 동일 API</text>
  <text x="200" y="534" text-anchor="middle" font-size="12" fill="#888">JdbcTemplate</text>
  <text x="360" y="534" text-anchor="middle" font-size="12" fill="#888">JpaRepository</text>
  <text x="520" y="534" text-anchor="middle" font-size="12" fill="#888">CacheManager</text>
  <text x="690" y="534" text-anchor="middle" font-size="12" fill="#888">TransactionManager</text>

  <text x="440" y="582" text-anchor="middle" font-size="11" fill="#444">PALDYN · Spring 완전 정복 시리즈</text>
</svg>
