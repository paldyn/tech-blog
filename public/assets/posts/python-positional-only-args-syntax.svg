<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">위치 전용 인수: / 구분자 (Python 3.8+)</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">/ 이전 매개변수는 반드시 위치로만 전달</text>

  <!-- Full syntax example -->
  <rect x="60" y="90" width="760" height="68" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> f(pos_only, /, normal, *, kw_only):</tspan></text>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">    #  ↑ 위치 전용    ↑ 자유      ↑ 키워드 전용</text>

  <!-- 3 zones -->
  <!-- Zone 1: positional-only -->
  <rect x="60" y="188" width="220" height="220" fill="#070b14" rx="8" stroke="#7ec8e3"/>
  <text x="170" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">위치 전용 (/ 이전)</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">f(1, 2, kw_only=3)</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555"># pos_only=1 ✓</text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">f(pos_only=1, 2, kw_only=3)</text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555"># TypeError ✗</text>
  <text x="76" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이름 사용 금지</text>

  <!-- Zone 2: normal -->
  <rect x="330" y="188" width="220" height="220" fill="#070b14" rx="8" stroke="#55c555"/>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">자유 (/ 이후, * 이전)</text>
  <text x="346" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">f(1, 2, kw_only=3)</text>
  <text x="346" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555"># normal=2 ✓ 위치로</text>
  <text x="346" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">f(1, normal=2, kw_only=3)</text>
  <text x="346" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555"># normal=2 ✓ 키워드로</text>
  <text x="346" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">위치·키워드 둘 다 가능</text>

  <!-- Zone 3: keyword-only -->
  <rect x="600" y="188" width="220" height="220" fill="#070b14" rx="8" stroke="#7777cc"/>
  <text x="710" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">키워드 전용 (* 이후)</text>
  <text x="616" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">f(1, 2, kw_only=3)</text>
  <text x="616" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555"># kw_only=3 ✓</text>
  <text x="616" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">f(1, 2, 3)</text>
  <text x="616" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555"># TypeError ✗</text>
  <text x="616" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이름 사용 필수</text>
</svg>
