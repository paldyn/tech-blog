<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 450">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8a55a"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="36" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">투타워 모델 아키텍처 &amp; 서빙 파이프라인</text>
  <text x="440" y="56" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Two-Tower Architecture for Large-Scale Retrieval</text>

  <!-- 구분선: 상단(학습) / 하단(서빙) -->
  <line x1="60" y1="300" x2="820" y2="300" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">▼ 실시간 서빙 파이프라인</text>

  <!-- ═══ 상단: 두 타워 구조 ═══ -->

  <!-- 좌측 타워: User Tower -->
  <text x="220" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">User Tower</text>
  <text x="220" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">사용자 타워 (온라인)</text>

  <!-- 사용자 특성 입력 박스 -->
  <rect x="120" y="112" width="200" height="44" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="220" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">사용자 특성 입력</text>
  <text x="220" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ID, 나이, 지역, 최근 행동</text>

  <!-- 화살표: 입력 → FC Layer 1 -->
  <line x1="220" y1="156" x2="220" y2="174" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- FC Layer 1 -->
  <rect x="140" y="176" width="160" height="38" fill="#0d1f3c" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="220" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">FC Layer + ReLU</text>
  <text x="220" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">256 → 128</text>

  <!-- 화살표 -->
  <line x1="220" y1="214" x2="220" y2="232" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- FC Layer 2 -->
  <rect x="140" y="234" width="160" height="38" fill="#0d1f3c" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="220" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">FC Layer + ReLU</text>
  <text x="220" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">128 → 64</text>

  <!-- 화살표 -->
  <line x1="220" y1="272" x2="220" y2="284" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- 사용자 임베딩 출력 -->
  <rect x="130" y="286" width="180" height="38" fill="#0a1a30" stroke="#55c555" stroke-width="2" rx="6"/>
  <text x="220" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">사용자 임베딩</text>
  <text x="220" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">user_vec ∈ ℝ⁶⁴</text>

  <!-- 수직 구분선 -->
  <line x1="440" y1="76" x2="440" y2="295" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 우측 타워: Item Tower -->
  <text x="660" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8a55a" text-anchor="middle">Item Tower</text>
  <text x="660" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">아이템 타워 (오프라인)</text>

  <!-- 아이템 특성 입력 박스 -->
  <rect x="560" y="112" width="200" height="44" fill="#2a1a0a" stroke="#e8a55a" stroke-width="1.5" rx="6"/>
  <text x="660" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">아이템 특성 입력</text>
  <text x="660" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ID, 카테고리, 태그, 텍스트</text>

  <!-- 화살표 -->
  <line x1="660" y1="156" x2="660" y2="174" stroke="#e8a55a" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- FC Layer 1 -->
  <rect x="580" y="176" width="160" height="38" fill="#2a1508" stroke="#e8a55a" stroke-width="1.5" rx="6"/>
  <text x="660" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a55a" text-anchor="middle">FC Layer + ReLU</text>
  <text x="660" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">256 → 128</text>

  <!-- 화살표 -->
  <line x1="660" y1="214" x2="660" y2="232" stroke="#e8a55a" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- FC Layer 2 -->
  <rect x="580" y="234" width="160" height="38" fill="#2a1508" stroke="#e8a55a" stroke-width="1.5" rx="6"/>
  <text x="660" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a55a" text-anchor="middle">FC Layer + ReLU</text>
  <text x="660" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">128 → 64</text>

  <!-- 화살표 -->
  <line x1="660" y1="272" x2="660" y2="284" stroke="#e8a55a" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- 아이템 임베딩 출력 -->
  <rect x="570" y="286" width="180" height="38" fill="#2a1200" stroke="#55c555" stroke-width="2" rx="6"/>
  <text x="660" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">아이템 임베딩</text>
  <text x="660" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">item_vec ∈ ℝ⁶⁴</text>

  <!-- 중앙: 내적 (Dot Product) -->
  <!-- 사용자 임베딩 → 내적 화살표 -->
  <line x1="310" y1="305" x2="400" y2="305" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- 아이템 임베딩 → 내적 화살표 -->
  <line x1="570" y1="305" x2="480" y2="305" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- 내적 박스 -->
  <rect x="400" y="286" width="80" height="38" fill="#0a2a0a" stroke="#55c555" stroke-width="2" rx="6"/>
  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">⊙ 내적</text>
  <text x="440" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Dot Product</text>

  <!-- ═══ 하단: 서빙 파이프라인 ═══ -->

  <!-- 서빙 박스 1: 실시간 사용자 임베딩 -->
  <rect x="60" y="330" width="160" height="44" fill="#0d1f3c" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="140" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">실시간 요청</text>
  <text x="140" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">User Tower (온라인)</text>

  <line x1="220" y1="352" x2="258" y2="352" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- 서빙 박스 2: ANN 검색 -->
  <rect x="260" y="330" width="160" height="44" fill="#161628" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="340" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">ANN 검색</text>
  <text x="340" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">FAISS / HNSW</text>

  <line x1="420" y1="352" x2="458" y2="352" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- 서빙 박스 3: 아이템 후보 -->
  <rect x="460" y="330" width="160" height="44" fill="#2a1a0a" stroke="#e8a55a" stroke-width="1.5" rx="6"/>
  <text x="540" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a55a" text-anchor="middle">Top-K 후보</text>
  <text x="540" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">100~1000개 아이템</text>

  <line x1="620" y1="352" x2="658" y2="352" stroke="#e8a55a" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- 서빙 박스 4: 랭킹 -->
  <rect x="660" y="330" width="160" height="44" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="740" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">랭킹 모델</text>
  <text x="740" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Wide&amp;Deep / DLRM</text>

  <!-- 오프라인 배치 라벨 -->
  <text x="660" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">아이템 임베딩: 오프라인 배치 계산 → FAISS 인덱스 저장</text>
  <text x="440" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">수십억 아이템 중 수십 ms 이내 Top-K 후보 추출</text>
</svg>
