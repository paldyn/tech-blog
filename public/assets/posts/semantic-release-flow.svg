<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Semantic Release 자동 릴리즈 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">커밋 메시지 → 버전 결정 → 태그 → 배포</text>

  <!-- Step boxes (pipeline) -->
  <!-- Step 1: Commits analysis -->
  <rect x="40" y="96" width="160" height="70" rx="8" fill="#0d1220" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">① 커밋 분석</text>
  <text x="120" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">마지막 태그 이후</text>
  <text x="120" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모든 커밋 메시지 파싱</text>

  <line x1="200" y1="131" x2="228" y2="131" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- Step 2: Version determine -->
  <rect x="232" y="96" width="160" height="70" rx="8" fill="#0d1220" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="312" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">② 버전 결정</text>
  <text x="312" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SemVer 규칙으로</text>
  <text x="312" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">다음 버전 계산</text>

  <line x1="392" y1="131" x2="420" y2="131" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- Step 3: Changelog -->
  <rect x="424" y="96" width="160" height="70" rx="8" fill="#0d1220" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="504" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">③ Changelog 생성</text>
  <text x="504" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CHANGELOG.md 자동</text>
  <text x="504" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">업데이트</text>

  <line x1="584" y1="131" x2="612" y2="131" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- Step 4: Tag & Publish -->
  <rect x="616" y="96" width="160" height="70" rx="8" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="696" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">④ 태그 + 배포</text>
  <text x="696" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Git 태그 push</text>
  <text x="696" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GitHub Release 생성</text>

  <!-- Version bumping rules -->
  <text x="440" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">커밋 유형 → 버전 범프 규칙</text>

  <!-- Commit type table -->
  <rect x="40" y="220" width="800" height="218" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Header row -->
  <text x="180" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">커밋 메시지 유형</text>
  <text x="440" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">버전 범프</text>
  <text x="650" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">예시</text>
  <line x1="56" y1="252" x2="824" y2="252" stroke="#1e1e1e" stroke-width="1"/>

  <!-- fix row -->
  <text x="72" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">fix:</text>
  <text x="180" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Patch (버그 수정)</text>
  <text x="440" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">1.2.3 → 1.2.4</text>
  <text x="560" y="274"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">fix(auth): 토큰 갱신 오류 수정</text>
  <line x1="56" y1="284" x2="824" y2="284" stroke="#1a1a1a" stroke-width="1"/>

  <!-- feat row -->
  <text x="72" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">feat:</text>
  <text x="180" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Minor (새 기능)</text>
  <text x="440" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0955e">1.2.3 → 1.3.0</text>
  <text x="560" y="306"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">feat(search): 전문 검색 지원</text>
  <line x1="56" y1="316" x2="824" y2="316" stroke="#1a1a1a" stroke-width="1"/>

  <!-- BREAKING row -->
  <text x="72" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">BREAKING CHANGE:</text>
  <text x="180" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Major (하위 비호환)</text>
  <text x="440" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">1.2.3 → 2.0.0</text>
  <text x="560" y="338"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">feat!: API 응답 구조 변경</text>
  <line x1="56" y1="348" x2="824" y2="348" stroke="#1a1a1a" stroke-width="1"/>

  <!-- chore/docs/... row -->
  <text x="72" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">chore: docs: style:</text>
  <text x="180" y="370" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">릴리즈 없음</text>
  <text x="440" y="370" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버전 변경 없음</text>
  <text x="560" y="370"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#555">chore: 의존성 업데이트</text>
  <line x1="56" y1="380" x2="824" y2="380" stroke="#1a1a1a" stroke-width="1"/>

  <!-- perf/refactor row -->
  <text x="72" y="400" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">perf: refactor:</text>
  <text x="180" y="400" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Patch 또는 없음</text>
  <text x="440" y="400" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">설정에 따라 다름</text>
  <text x="560" y="400"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#555">perf: 쿼리 최적화</text>

  <!-- Footer -->
  <text x="440" y="468" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">semantic-release는 CI 파이프라인에서 실행 — main 머지 시 자동 버전업 + GitHub Release 생성</text>
  <text x="440" y="486" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Conventional Commits 규칙 준수가 전제 조건</text>
</svg>
