<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">자주 쓰는 내장 예외 빠른 참조</text>

  <!-- 3x3 grid of exception cards -->
  <!-- Row 1 -->
  <rect x="55" y="60" width="240" height="80" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="75" y="85" font-size="13" font-weight="700" fill="#7777cc">ValueError</text>
  <text x="75" y="105" font-size="11" fill="#888">값이 올바른 타입이지만</text>
  <text x="75" y="122" font-size="11" fill="#888">범위나 의미가 잘못됨</text>
  <text x="75" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">int("abc")</text>

  <rect x="320" y="60" width="240" height="80" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="340" y="85" font-size="13" font-weight="700" fill="#7777cc">TypeError</text>
  <text x="340" y="105" font-size="11" fill="#888">연산에 부적합한 타입</text>
  <text x="340" y="122" font-size="11" fill="#888">사용 시 발생</text>
  <text x="340" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">"a" + 1</text>

  <rect x="585" y="60" width="240" height="80" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="605" y="85" font-size="13" font-weight="700" fill="#7777cc">KeyError</text>
  <text x="605" y="105" font-size="11" fill="#888">딕셔너리에 존재하지</text>
  <text x="605" y="122" font-size="11" fill="#888">않는 키 접근 시 발생</text>
  <text x="605" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">d["missing"]</text>

  <!-- Row 2 -->
  <rect x="55" y="162" width="240" height="80" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="75" y="187" font-size="13" font-weight="700" fill="#7777cc">IndexError</text>
  <text x="75" y="207" font-size="11" fill="#888">시퀀스 인덱스 범위</text>
  <text x="75" y="224" font-size="11" fill="#888">초과 시 발생</text>
  <text x="75" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">[1,2][5]</text>

  <rect x="320" y="162" width="240" height="80" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="340" y="187" font-size="13" font-weight="700" fill="#7777cc">AttributeError</text>
  <text x="340" y="207" font-size="11" fill="#888">객체에 없는 속성/메서드</text>
  <text x="340" y="224" font-size="11" fill="#888">에 접근할 때 발생</text>
  <text x="340" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">None.upper()</text>

  <rect x="585" y="162" width="240" height="80" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="605" y="187" font-size="13" font-weight="700" fill="#7777cc">FileNotFoundError</text>
  <text x="605" y="207" font-size="11" fill="#888">파일/디렉터리가</text>
  <text x="605" y="224" font-size="11" fill="#888">존재하지 않을 때</text>
  <text x="605" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">open("x.txt")</text>

  <!-- Row 3 -->
  <rect x="55" y="264" width="240" height="80" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="75" y="289" font-size="13" font-weight="700" fill="#7777cc">NameError</text>
  <text x="75" y="309" font-size="11" fill="#888">정의되지 않은 변수</text>
  <text x="75" y="326" font-size="11" fill="#888">에 접근할 때 발생</text>
  <text x="75" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">print(undefined)</text>

  <rect x="320" y="264" width="240" height="80" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="340" y="289" font-size="13" font-weight="700" fill="#7777cc">RuntimeError</text>
  <text x="340" y="309" font-size="11" fill="#888">다른 카테고리에 속하지</text>
  <text x="340" y="326" font-size="11" fill="#888">않는 런타임 오류</text>
  <text x="340" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">RecursionError 등</text>

  <rect x="585" y="264" width="240" height="80" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="605" y="289" font-size="13" font-weight="700" fill="#7777cc">ZeroDivisionError</text>
  <text x="605" y="309" font-size="11" fill="#888">0으로 나누기 또는</text>
  <text x="605" y="326" font-size="11" fill="#888">0으로 나머지 연산</text>
  <text x="605" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">1 / 0</text>

  <!-- Bottom tip -->
  <text x="440" y="385" text-anchor="middle" font-size="11" fill="#888">isinstance(e, LookupError)  →  KeyError와 IndexError 모두 잡는다 (공통 부모 클래스 활용)</text>
</svg>
