<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">정규화 방법 비교: BN · LN · IN · GN</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">어떤 축으로 통계를 계산하느냐에 따라 네 가지 방법으로 나뉜다</text>

  <!-- Grid legend -->
  <text x="440" y="96" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">텐서 차원: (N=배치, C=채널, H×W=공간)  ■ = 정규화되는 영역</text>

  <!-- ===== Batch Norm ===== -->
  <rect x="60" y="108" width="170" height="220" rx="8" fill="#0d0d0d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="145" y="130" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600" xml:space="preserve">Batch Norm</text>
  <text x="145" y="148" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">N 방향으로 정규화</text>
  <!-- Grid: 4x4 (N x C), BN normalizes across N for each C -->
  <rect x="84" y="160" width="26" height="26" rx="2" fill="#7777cc" opacity="0.8"/>
  <rect x="84" y="190" width="26" height="26" rx="2" fill="#7777cc" opacity="0.8"/>
  <rect x="84" y="220" width="26" height="26" rx="2" fill="#7777cc" opacity="0.8"/>
  <rect x="84" y="250" width="26" height="26" rx="2" fill="#7777cc" opacity="0.8"/>
  <rect x="114" y="160" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.6"/>
  <rect x="114" y="190" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.6"/>
  <rect x="114" y="220" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.6"/>
  <rect x="114" y="250" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.6"/>
  <rect x="144" y="160" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.4"/>
  <rect x="144" y="190" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.4"/>
  <rect x="144" y="220" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.4"/>
  <rect x="144" y="250" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.4"/>
  <rect x="174" y="160" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.2"/>
  <rect x="174" y="190" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.2"/>
  <rect x="174" y="220" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.2"/>
  <rect x="174" y="250" width="26" height="26" rx="2" fill="#1a1a2a" opacity="0.2"/>
  <text x="84" y="296" fill="#888" font-size="10" xml:space="preserve">N↓  C→</text>
  <text x="145" y="316" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">배치 간 같은 채널</text>
  <text x="145" y="332" text-anchor="middle" fill="#7777cc" font-size="10" xml:space="preserve">CNN, MLP에 적합</text>

  <!-- ===== Layer Norm ===== -->
  <rect x="250" y="108" width="170" height="220" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="2"/>
  <text x="335" y="130" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600" xml:space="preserve">Layer Norm</text>
  <text x="335" y="148" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">C 방향으로 정규화</text>
  <!-- Grid: all C for each N -->
  <rect x="274" y="160" width="26" height="26" rx="2" fill="#55c555" opacity="0.8"/>
  <rect x="304" y="160" width="26" height="26" rx="2" fill="#55c555" opacity="0.8"/>
  <rect x="334" y="160" width="26" height="26" rx="2" fill="#55c555" opacity="0.8"/>
  <rect x="364" y="160" width="26" height="26" rx="2" fill="#55c555" opacity="0.8"/>
  <rect x="274" y="190" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.6"/>
  <rect x="304" y="190" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.6"/>
  <rect x="334" y="190" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.6"/>
  <rect x="364" y="190" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.6"/>
  <rect x="274" y="220" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.4"/>
  <rect x="304" y="220" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.4"/>
  <rect x="334" y="220" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.4"/>
  <rect x="364" y="220" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.4"/>
  <rect x="274" y="250" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.2"/>
  <rect x="304" y="250" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.2"/>
  <rect x="334" y="250" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.2"/>
  <rect x="364" y="250" width="26" height="26" rx="2" fill="#1a2a1a" opacity="0.2"/>
  <text x="274" y="296" fill="#888" font-size="10" xml:space="preserve">N↓  C→</text>
  <text x="335" y="316" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">샘플 내 모든 채널</text>
  <text x="335" y="332" text-anchor="middle" fill="#55c555" font-size="10" xml:space="preserve">트랜스포머, RNN</text>

  <!-- ===== Instance Norm ===== -->
  <rect x="440" y="108" width="170" height="220" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="525" y="130" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600" xml:space="preserve">Instance Norm</text>
  <text x="525" y="148" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">H×W 방향으로 정규화</text>
  <!-- Grid: diagonal -->
  <rect x="464" y="160" width="26" height="26" rx="2" fill="#7ec8e3" opacity="0.8"/>
  <rect x="464" y="190" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.4"/>
  <rect x="464" y="220" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.4"/>
  <rect x="494" y="160" width="26" height="26" rx="2" fill="#7ec8e3" opacity="0.8"/>
  <rect x="494" y="190" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.4"/>
  <rect x="524" y="160" width="26" height="26" rx="2" fill="#7ec8e3" opacity="0.8"/>
  <rect x="464" y="250" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.2"/>
  <rect x="494" y="220" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.2"/>
  <rect x="494" y="250" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.2"/>
  <rect x="524" y="190" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.2"/>
  <rect x="524" y="220" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.2"/>
  <rect x="524" y="250" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.2"/>
  <rect x="554" y="160" width="26" height="26" rx="2" fill="#7ec8e3" opacity="0.8"/>
  <rect x="554" y="190" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.2"/>
  <rect x="554" y="220" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.2"/>
  <rect x="554" y="250" width="26" height="26" rx="2" fill="#1a2a3a" opacity="0.2"/>
  <text x="525" y="316" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">샘플 × 채널 각각</text>
  <text x="525" y="332" text-anchor="middle" fill="#7ec8e3" font-size="10" xml:space="preserve">스타일 트랜스퍼</text>

  <!-- ===== Group Norm ===== -->
  <rect x="630" y="108" width="190" height="220" rx="8" fill="#0d0d0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="725" y="130" text-anchor="middle" fill="#ce9178" font-size="13" font-weight="600" xml:space="preserve">Group Norm</text>
  <text x="725" y="148" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">그룹 채널 + H×W</text>
  <!-- Grid: group coloring -->
  <rect x="654" y="160" width="26" height="116" rx="2" fill="#ce9178" opacity="0.8"/>
  <rect x="684" y="160" width="26" height="116" rx="2" fill="#ce9178" opacity="0.8"/>
  <rect x="714" y="160" width="26" height="116" rx="2" fill="#ce9178" opacity="0.4"/>
  <rect x="744" y="160" width="26" height="116" rx="2" fill="#ce9178" opacity="0.4"/>
  <rect x="774" y="160" width="26" height="116" rx="2" fill="#ce9178" opacity="0.15"/>
  <text x="725" y="316" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">채널을 G개 그룹으로</text>
  <text x="725" y="332" text-anchor="middle" fill="#ce9178" font-size="10" xml:space="preserve">소배치 CNN, 탐지</text>

  <!-- Comparison bar -->
  <rect x="60" y="350" width="760" height="100" rx="8" fill="#0d0d0d" stroke="#1e1e1e"/>
  <text x="440" y="374" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="600" xml:space="preserve">실무 선택 기준</text>
  <text x="145" y="398" text-anchor="middle" fill="#7777cc" font-size="12" xml:space="preserve">BatchNorm</text>
  <text x="145" y="416" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">CNN + 대배치</text>
  <text x="145" y="432" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">배치 크기 ≥ 32</text>
  <text x="335" y="398" text-anchor="middle" fill="#55c555" font-size="12" xml:space="preserve">LayerNorm ★</text>
  <text x="335" y="416" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">트랜스포머, RNN</text>
  <text x="335" y="432" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">배치 무관</text>
  <text x="525" y="398" text-anchor="middle" fill="#7ec8e3" font-size="12" xml:space="preserve">InstanceNorm</text>
  <text x="525" y="416" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">스타일 전이</text>
  <text x="525" y="432" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">이미지 생성</text>
  <text x="725" y="398" text-anchor="middle" fill="#ce9178" font-size="12" xml:space="preserve">GroupNorm</text>
  <text x="725" y="416" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">소배치 CNN</text>
  <text x="725" y="432" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">객체 탐지</text>

  <!-- Footer -->
</svg>
