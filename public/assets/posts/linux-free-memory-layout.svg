<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Linux 메모리 구조 — free 명령 기준</text>

  <!-- Code box: free -h output -->
  <rect x="60" y="68" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">$ free -h</text>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">              total    used    free   shared  buff/cache  available</text>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">Mem:          15.5G    4.2G    2.1G    350M        9.2G        10.6G</text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">Swap:          2.0G    0.0G    2.0G</text>

  <!-- Memory bar visualization -->
  <text x="440" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">물리 메모리 15.5G 구성</text>

  <!-- Bar background -->
  <rect x="60" y="200" width="760" height="48" rx="6" fill="#1a1a1a"/>

  <!-- used: 4.2G = 4.2/15.5 = 27.1% → 760 * 0.271 = 206px -->
  <rect x="60" y="200" width="206" height="48" rx="0" fill="#e05555"/>
  <!-- buff/cache: 9.2G = 9.2/15.5 = 59.4% → 760 * 0.594 = 451px -->
  <rect x="266" y="200" width="451" height="48" rx="0" fill="#7777cc"/>
  <!-- free: 2.1G = 2.1/15.5 = 13.5% → remaining 103px -->
  <rect x="717" y="200" width="103" height="48" rx="6" fill="#55c555" style="border-radius: 0 6px 6px 0;"/>
  <rect x="717" y="200" width="103" height="48" fill="#55c555"/>
  <rect x="715" y="200" width="105" height="48" rx="0" fill="#55c555"/>

  <!-- Round corners on left and right of bar -->
  <rect x="60" y="200" width="15" height="48" rx="6" fill="#e05555"/>
  <rect x="815" y="200" width="5" height="48" rx="6" fill="#55c555"/>

  <!-- Bar labels -->
  <text x="163" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ffffff">used 4.2G</text>
  <text x="491" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ffffff">buff/cache 9.2G</text>
  <text x="768" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">free 2.1G</text>

  <!-- Column explanations -->
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">핵심 컬럼 해석</text>

  <!-- 3 explanation boxes -->
  <rect x="60" y="298" width="230" height="110" rx="8" fill="#0d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="175" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">used</text>
  <text x="175" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">프로세스가 실제로 점유한</text>
  <text x="175" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">메모리 (해제 불가)</text>
  <text x="175" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">total - free - buff/cache</text>
  <text x="175" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">= 실제 프로세스 메모리</text>

  <rect x="325" y="298" width="230" height="110" rx="8" fill="#0d0d0d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">buff/cache</text>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">커널이 성능을 위해 쓰는</text>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">페이지 캐시 + 버퍼</text>
  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메모리 부족 시 자동 해제</text>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실질적으로 재사용 가능</text>

  <rect x="590" y="298" width="230" height="110" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">available</text>
  <text x="705" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실제로 할당 가능한 메모리</text>
  <text x="705" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">free + 해제 가능 캐시</text>
  <text x="705" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메모리 여유 판단 기준</text>
  <text x="705" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">이 값이 가장 중요!</text>
</svg>
