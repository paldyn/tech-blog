<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DREAD 위험 점수 모델</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">위협 우선순위화 프레임워크</text>

  <!-- Table header -->
  <rect x="60" y="100" width="760" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">요소</text>
  <text x="380" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">의미</text>
  <text x="630" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">평가 기준</text>
  <text x="790" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">점수</text>

  <!-- Row 1 D -->
  <rect x="60" y="152" width="760" height="48" rx="0" fill="#111116" stroke="#222" stroke-width="1"/>
  <text x="160" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">D — Damage</text>
  <text x="160" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">피해 규모</text>
  <text x="380" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">공격 성공 시 얼마나 피해가 큰가</text>
  <text x="630" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전체 시스템 손상=10, 개인 파일=1</text>
  <text x="790" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">1~10</text>

  <!-- Row 2 R -->
  <rect x="60" y="200" width="760" height="48" rx="0" fill="#0e0e14" stroke="#222" stroke-width="1"/>
  <text x="160" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a055" text-anchor="middle">R — Reproducibility</text>
  <text x="160" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">재현 가능성</text>
  <text x="380" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">공격을 매번 재현할 수 있는가</text>
  <text x="630" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">항상 성공=10, 특정 조건=5</text>
  <text x="790" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a055" text-anchor="middle">1~10</text>

  <!-- Row 3 E -->
  <rect x="60" y="248" width="760" height="48" rx="0" fill="#111116" stroke="#222" stroke-width="1"/>
  <text x="160" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">E — Exploitability</text>
  <text x="160" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">공격 용이성</text>
  <text x="380" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">공격 수행이 얼마나 쉬운가</text>
  <text x="630" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">브라우저만=10, 전문가 필요=2</text>
  <text x="790" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">1~10</text>

  <!-- Row 4 A -->
  <rect x="60" y="296" width="760" height="48" rx="0" fill="#0e0e14" stroke="#222" stroke-width="1"/>
  <text x="160" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">A — Affected Users</text>
  <text x="160" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">영향 범위</text>
  <text x="380" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">얼마나 많은 사용자가 영향받는가</text>
  <text x="630" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전체 사용자=10, 일부=5</text>
  <text x="790" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">1~10</text>

  <!-- Row 5 D -->
  <rect x="60" y="344" width="760" height="48" rx="0" fill="#111116" stroke="#222" stroke-width="1"/>
  <text x="160" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">D — Discoverability</text>
  <text x="160" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">발견 가능성</text>
  <text x="380" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">취약점을 얼마나 쉽게 발견하나</text>
  <text x="630" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">공개된 취약점=10, 전혀 미공개=1</text>
  <text x="790" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">1~10</text>

  <!-- Formula -->
  <rect x="60" y="410" width="760" height="32" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="431" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">DREAD 점수 = (D + R + E + A + D) / 5 — 높을수록 우선 대응 필요</text>
</svg>
