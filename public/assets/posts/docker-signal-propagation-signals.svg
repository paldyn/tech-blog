<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 시그널 참조</text>

  <!-- Table header -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">시그널</text>
  <text x="200" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">번호</text>
  <text x="290" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">무시 가능</text>
  <text x="420" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Docker 사용 맥락</text>
  <line x1="60" y1="88" x2="820" y2="88" stroke="#2a2a3a" stroke-width="1"/>

  <!-- SIGTERM -->
  <rect x="60" y="96" width="760" height="40" rx="4" fill="#111827"/>
  <text x="80" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">SIGTERM</text>
  <text x="200" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">15</text>
  <text x="290" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">예</text>
  <text x="420" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">docker stop 기본 종료 시그널</text>

  <!-- SIGKILL -->
  <text x="80" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">SIGKILL</text>
  <text x="200" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">9</text>
  <text x="290" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">아니오</text>
  <text x="420" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">타임아웃 초과 시 강제 종료</text>

  <!-- SIGINT -->
  <rect x="60" y="168" width="760" height="40" rx="4" fill="#111827"/>
  <text x="80" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">SIGINT</text>
  <text x="200" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">2</text>
  <text x="290" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">예</text>
  <text x="420" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">docker attach 중 Ctrl+C → PID 1 전달</text>

  <!-- SIGQUIT -->
  <text x="80" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">SIGQUIT</text>
  <text x="200" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">3</text>
  <text x="290" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">예</text>
  <text x="420" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">nginx STOPSIGNAL — graceful drain</text>

  <!-- SIGHUP -->
  <rect x="60" y="240" width="760" height="40" rx="4" fill="#111827"/>
  <text x="80" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">SIGHUP</text>
  <text x="200" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">1</text>
  <text x="290" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">예</text>
  <text x="420" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">설정 리로드 관례 (nginx -s reload 등)</text>

  <!-- Note -->
  <rect x="60" y="290" width="760" height="20" rx="4" fill="#1a1a2e"/>
  <text x="440" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">PID 1은 SIGTERM의 기본 핸들러(종료)가 없음 — 명시적 핸들러 없으면 SIGTERM 무시</text>
</svg>
