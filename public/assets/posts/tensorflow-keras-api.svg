<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TensorFlow / Keras API 계층</text>

  <!-- TF Ecosystem layers -->
  <rect x="60" y="72" width="760" height="50" rx="8" fill="#2a1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="440" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">TFX · TF Serving · TF Lite · TF.js — 프로덕션·배포 생태계</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ML 파이프라인 | REST API 서빙 | 모바일·엣지 | 브라우저</text>

  <line x1="440" y1="122" x2="440" y2="144" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="146" width="760" height="50" rx="8" fill="#1a2c1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="440" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Keras 3.x — 고수준 API (백엔드 독립)</text>
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Sequential · Functional · Subclassing API | fit/evaluate/predict | 콜백 시스템</text>

  <line x1="440" y1="196" x2="440" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="220" width="760" height="50" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">TensorFlow 2.x — 미드 레벨 API</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">tf.GradientTape | tf.data | tf.function | tf.Module | 분산 학습</text>

  <!-- 3 API styles -->
  <rect x="60" y="296" width="220" height="80" rx="8" fill="#1a1a2a" stroke="#4a4a8e" stroke-width="1.5"/>
  <text x="170" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9999ee" text-anchor="middle">Sequential API</text>
  <text x="170" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">간단한 선형 스택</text>
  <text x="170" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">keras.Sequential([...])</text>
  <text x="170" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">초보자 추천</text>

  <rect x="310" y="296" width="260" height="80" rx="8" fill="#1a1a2a" stroke="#4a4a8e" stroke-width="1.5"/>
  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9999ee" text-anchor="middle">Functional API</text>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">다중 입력·출력·공유 레이어</text>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">x = layers.Dense(64)(inputs)</text>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">실전 추천</text>

  <rect x="600" y="296" width="220" height="80" rx="8" fill="#1a1a2a" stroke="#4a4a8e" stroke-width="1.5"/>
  <text x="710" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9999ee" text-anchor="middle">Subclassing API</text>
  <text x="710" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">완전한 커스터마이징</text>
  <text x="710" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">class MyModel(Model):</text>
  <text x="710" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#c77ec8" text-anchor="middle">연구·고급 사용자</text>

  <!-- Code snippet -->
  <rect x="60" y="396" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Keras 3.x는 TF·PyTorch·JAX 모두 백엔드로 사용 가능</text>
  <text x="450" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  KERAS_BACKEND=torch python train.py</text>
</svg>
