<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">비전 태스크 비교: 분류 → 탐지 → 분할</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">각 태스크의 출력 형식 차이</text>

  <!-- Image Classification -->
  <rect x="36" y="95" width="185" height="230" fill="#0d1520" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="128" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">이미지 분류</text>

  <g transform="translate(56, 130)">
    <!-- Image with one label -->
    <rect x="22" y="0" width="100" height="80" fill="#1a2535" rx="4" stroke="#3a4560" stroke-width="1"/>
    <text x="72" y="45" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="32">🐱</text>
    <rect x="0" y="90" width="146" height="28" fill="#1a3d2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
    <text x="73" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">cat: 97.3%</text>
  </g>

  <text x="128" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">출력: 클래스 레이블 + 확률</text>
  <text x="128" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">태스크: 무엇인가?</text>
  <text x="128" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">ResNet, EfficientNet</text>

  <!-- Object Detection -->
  <rect x="240" y="95" width="185" height="230" fill="#0d1117" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="332" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">객체 탐지</text>

  <g transform="translate(258, 130)">
    <rect x="0" y="0" width="150" height="100" fill="#1a1a2a" rx="4" stroke="#3a3a5a" stroke-width="1"/>
    <!-- Bounding boxes -->
    <rect x="10" y="10" width="60" height="80" fill="none" stroke="#7777cc" stroke-width="2"/>
    <rect x="80" y="20" width="60" height="70" fill="none" stroke="#ce9178" stroke-width="2"/>
    <text x="10" y="8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">cat 94%</text>
    <text x="80" y="18" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">dog 87%</text>
  </g>

  <text x="332" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">출력: 박스 좌표 + 클래스</text>
  <text x="332" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">태스크: 무엇이 어디에?</text>
  <text x="332" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">YOLO, Faster R-CNN</text>

  <!-- Semantic Segmentation -->
  <rect x="444" y="95" width="185" height="230" fill="#0d1520" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="536" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">시맨틱 분할</text>

  <g transform="translate(462, 130)">
    <rect x="0" y="0" width="150" height="100" fill="#1a1208" rx="4" stroke="#ce9178" stroke-width="1"/>
    <!-- Colored pixel regions -->
    <rect x="0" y="0"  width="60" height="100" fill="#1a3d2a" rx="1" opacity="0.8"/>
    <rect x="60" y="0" width="60" height="100" fill="#1a1a3d" rx="1" opacity="0.8"/>
    <rect x="120" y="0" width="30" height="100" fill="#3d1a1a" rx="1" opacity="0.8"/>
    <text x="30"  y="55" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">cat</text>
    <text x="90"  y="55" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">dog</text>
    <text x="135" y="55" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">bg</text>
  </g>

  <text x="536" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">출력: 픽셀별 클래스 맵</text>
  <text x="536" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">태스크: 각 픽셀이 무엇?</text>
  <text x="536" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">U-Net, DeepLab</text>

  <!-- Instance Segmentation -->
  <rect x="648" y="95" width="196" height="230" fill="#080f08" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="746" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">인스턴스 분할</text>

  <g transform="translate(666, 130)">
    <rect x="0" y="0" width="160" height="100" fill="#081208" rx="4" stroke="#1e4a20" stroke-width="1"/>
    <!-- Instance masks (different colors for each instance) -->
    <rect x="5"  y="10" width="60" height="80" fill="#1a3d2a" rx="2" opacity="0.8" stroke="#55c555" stroke-width="1.5"/>
    <rect x="75" y="15" width="60" height="80" fill="#2a1a3d" rx="2" opacity="0.8" stroke="#7777cc" stroke-width="1.5"/>
    <rect x="120" y="5" width="35" height="50" fill="#3d2a1a" rx="2" opacity="0.8" stroke="#ce9178" stroke-width="1.5"/>
    <text x="35"  y="55" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">cat #1</text>
    <text x="105" y="60" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">cat #2</text>
    <text x="137" y="35" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">dog</text>
  </g>

  <text x="746" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">출력: 인스턴스별 마스크</text>
  <text x="746" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">태스크: 각 개체가 누구?</text>
  <text x="746" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Mask R-CNN, SOLOv2</text>

  <!-- Difference note -->
  <rect x="36" y="338" width="808" height="30" fill="#070b14" rx="4" stroke="#1e2433"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시맨틱 vs 인스턴스: 같은 클래스(고양이 2마리)를 시맨틱은 구분 못함 · 인스턴스는 개별 ID 부여</text>
</svg>
