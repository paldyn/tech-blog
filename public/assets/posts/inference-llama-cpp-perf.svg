<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">llama.cpp 성능 최적화 옵션</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">하드웨어별 속도 향상 설정</text>

  <!-- CPU perf options -->
  <rect x="60" y="96" width="360" height="180" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">CPU 최적화</text>
  <line x1="80" y1="130" x2="400" y2="130" stroke="#222" stroke-width="1"/>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-t {물리코어}    물리 코어 수만큼 설정 (HTT 제외)</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">--mlock          모델을 RAM에 고정 (스왑 방지)</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-b 512           배치 크기 (프리필 속도 향상)</text>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">--no-mmap        메모리 맵 비활성 (SSD가 느릴 때)</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">AVX2/AVX-512 자동 감지 → 최적 커널 선택</text>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Apple M1/M2: Metal 백엔드로 자동 GPU 가속</text>

  <!-- GPU perf options -->
  <rect x="460" y="96" width="360" height="180" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">GPU 최적화 (CUDA)</text>
  <line x1="480" y1="130" x2="800" y2="130" stroke="#222" stroke-width="1"/>
  <text x="480" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-ngl -1          모든 레이어 GPU 오프로드</text>
  <text x="480" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">--split-mode row  다중 GPU 레이어 분산</text>
  <text x="480" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-fa              Flash Attention 활성화</text>
  <text x="480" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">--cache-type-k q8_0  KV 캐시 양자화</text>
  <text x="480" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">VRAM 부족 시: -ngl 20으로 일부만 오프로드</text>
  <text x="480" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">나머지는 RAM에서 처리 (속도 저하 있음)</text>

  <!-- Token speed reference -->
  <rect x="60" y="296" width="760" height="88" rx="6" fill="#111" stroke="#222"/>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">토큰 생성 속도 참고치 (Q4_K_M, 7B 모델 기준)</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Apple M2 Max (CPU+GPU Metal): ~40 tok/s &nbsp; Intel i9 CPU: ~8 tok/s</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RTX 3090 전체 GPU 오프로드: ~90 tok/s &nbsp; RTX 3090 부분 오프로드(-ngl 20): ~30 tok/s</text>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">사람이 읽는 속도 ~15-25 tok/s → Q4_K_M + M2/RTX로 충분</text>
</svg>
