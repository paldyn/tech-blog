<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Sealed Secrets 워크플로</text>

  <!-- Step 1: Developer -->
  <rect x="50" y="70" width="180" height="80" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">개발자</text>
  <text x="140" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">kubectl create secret</text>
  <text x="140" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">평문 Secret 생성</text>
  <text x="90" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="26" fill="#7ec8e3">①</text>

  <!-- Arrow 1→2 -->
  <line x1="232" y1="110" x2="298" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="265" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">kubeseal</text>

  <!-- Step 2: kubeseal encrypts -->
  <rect x="300" y="70" width="180" height="80" rx="8" fill="#0f1a10" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="390" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">kubeseal</text>
  <text x="390" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Public Key로 암호화</text>
  <text x="390" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">SealedSecret 생성</text>
  <text x="340" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="26" fill="#55c555">②</text>

  <!-- Arrow 2→3 -->
  <line x1="482" y1="110" x2="548" y2="110" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="515" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">git push</text>

  <!-- Step 3: Git repo -->
  <rect x="550" y="70" width="180" height="80" rx="8" fill="#0f1030" stroke="#4a2a6a" stroke-width="1.5"/>
  <text x="640" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Git Repository</text>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">sealed-secret.yaml</text>
  <text x="640" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">암호화된 값만 저장</text>
  <text x="590" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="26" fill="#7777cc">③</text>

  <!-- Arrow down from Git to ArgoCD/Flux -->
  <line x1="640" y1="150" x2="640" y2="216" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>
  <text x="660" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">GitOps</text>

  <!-- Step 4: ArgoCD/Flux applies -->
  <rect x="550" y="220" width="180" height="80" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">ArgoCD / Flux</text>
  <text x="640" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">kubectl apply</text>
  <text x="640" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">SealedSecret CR 배포</text>
  <text x="590" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="26" fill="#7ec8e3">④</text>

  <!-- Arrow from ArgoCD to Controller -->
  <line x1="550" y1="260" x2="484" y2="260" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Step 5: Sealed Secrets Controller decrypts -->
  <rect x="300" y="220" width="180" height="80" rx="8" fill="#0f1a10" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="390" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">SS Controller</text>
  <text x="390" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Private Key로 복호화</text>
  <text x="390" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">K8s Secret 생성</text>
  <text x="340" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="26" fill="#55c555">⑤</text>

  <!-- Arrow from Controller to K8s Secret -->
  <line x1="300" y1="260" x2="234" y2="260" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Step 6: K8s Secret -->
  <rect x="50" y="220" width="180" height="80" rx="8" fill="#1a1235" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">K8s Secret</text>
  <text x="140" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">일반 Secret 오브젝트</text>
  <text x="140" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">파드에서 참조 가능</text>
  <text x="90" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="26" fill="#7777cc">⑥</text>

  <!-- Key pair info -->
  <rect x="50" y="360" width="780" height="90" rx="6" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">핵심: 비대칭 암호화</text>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Public Key(kubeseal 다운로드) → 암호화 / Private Key(클러스터 내부만 보유) → 복호화</text>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Private Key가 없으면 암호화된 SealedSecret 복호화 불가 → Git에 안전하게 저장 가능</text>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">키 페어는 kube-system/sealed-secrets-key Secret에 저장 — 반드시 백업 필요</text>
</svg>
