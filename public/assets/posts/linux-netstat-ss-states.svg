<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TCP 소켓 상태</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">ss -tnp 출력에서 자주 보이는 상태들</text>

  <!-- LISTEN -->
  <rect x="60" y="96" width="160" height="54" fill="#1a2e1a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="140" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">LISTEN</text>
  <text x="140" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">수신 대기 중</text>

  <!-- SYN_SENT -->
  <rect x="250" y="96" width="160" height="54" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="330" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">SYN_SENT</text>
  <text x="330" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">연결 요청 보냄</text>

  <!-- SYN_RECV -->
  <rect x="440" y="96" width="160" height="54" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="520" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">SYN_RECV</text>
  <text x="520" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SYN 수신, ACK 대기</text>

  <!-- ESTABLISHED -->
  <rect x="630" y="96" width="190" height="54" fill="#1a2e1a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="725" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">ESTABLISHED</text>
  <text x="725" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">연결 완료 (데이터 전송 중)</text>

  <!-- FIN_WAIT1 -->
  <rect x="60" y="186" width="160" height="54" fill="#1a1a1a" rx="8" stroke="#888" stroke-width="1"/>
  <text x="140" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">FIN_WAIT1</text>
  <text x="140" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">종료 요청 보냄</text>

  <!-- FIN_WAIT2 -->
  <rect x="250" y="186" width="160" height="54" fill="#1a1a1a" rx="8" stroke="#888" stroke-width="1"/>
  <text x="330" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">FIN_WAIT2</text>
  <text x="330" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">원격 FIN 대기</text>

  <!-- CLOSE_WAIT -->
  <rect x="440" y="186" width="160" height="54" fill="#2e1a1a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="520" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">CLOSE_WAIT</text>
  <text x="520" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">앱이 닫지 않음 (누수!)</text>

  <!-- TIME_WAIT -->
  <rect x="630" y="186" width="190" height="54" fill="#2a1a1a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="725" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">TIME_WAIT</text>
  <text x="725" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">2MSL 대기 (60–120s)</text>

  <!-- ss command examples -->
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">ss 진단 명령어</text>

  <rect x="60" y="292" width="760" height="148" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># ESTABLISHED 연결 수 확인</text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ss</font><text x="94" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> -s</text></text>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># CLOSE_WAIT 연결 (앱 버그 감지)</text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ss</font><text x="94" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> -tnp state close-wait</text></text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># TIME_WAIT 수 (너무 많으면 포트 부족)</text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ss</font><text x="94" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> -tnp state time-wait | wc -l</text></text>

  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">CLOSE_WAIT 다수 = 앱이 소켓을 제때 닫지 않는 버그</text>
</svg>
