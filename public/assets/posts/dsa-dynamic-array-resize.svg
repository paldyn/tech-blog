<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">동적 배열 크기 확장 전략</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">왜 2배씩 늘리는가 — 성장 인자(growth factor)의 의미</text>

  <defs>
    <marker id="grow-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Strategy 1: +1 per append (bad) -->
  <rect x="60" y="90" width="360" height="140" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">전략 A: 1씩 증가 (나쁨)</text>
  <text x="240" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">capacity: 1→2→3→4→...→n</text>
  <text x="240" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">총 복사: 1+2+3+...+(n-1) = n(n-1)/2</text>
  <text x="240" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">→ append 분할상환 O(n)</text>
  <text x="240" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">매번 확장 → 총 O(n²) 비용</text>

  <!-- Strategy 2: ×2 (good) -->
  <rect x="460" y="90" width="360" height="140" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">전략 B: 2배 증가 (좋음)</text>
  <text x="640" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">capacity: 1→2→4→8→...→2^k</text>
  <text x="640" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">총 복사: 1+2+4+...+n = 2n-1</text>
  <text x="640" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">→ append 분할상환 O(1)</text>
  <text x="640" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">로그 횟수 확장 → 총 O(n) 비용</text>

  <!-- Growth factor comparison -->
  <rect x="60" y="250" width="760" height="60" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">성장 인자(Growth Factor) 비교</text>
  <text x="120" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">×1.25 — 메모리 절약, 빈번 복사</text>
  <text x="310" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">×1.5 — C++ vector 기본</text>
  <text x="490" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">×2.0 — Java ArrayList, Go slice 기본</text>
  <text x="700" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">×3 이상 — 메모리 낭비</text>

  <!-- Code -->
  <rect x="60" y="328" width="760" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// Python list의 실제 성장 패턴 (CPython)</tspan>
  </text>
  <text x="76" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 0→4→8→16→25→35→46→58→72→88→... (정확히 2배가 아님)</tspan>
  </text>
  <text x="76" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 공식: new_cap = (old_cap &gt;&gt; 3) + (old_cap &lt; 9 ? 3 : 6) + old_cap</tspan>
  </text>
  <text x="76" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 실효 성장률 ≈ 1.125배 — 메모리와 시간의 균형</tspan>
  </text>
</svg>
