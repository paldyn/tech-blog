<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">스트랭글러 패턴 · 점진적 교체</text>
  <text x="60" y="72" font-size="13" fill="#888">파사드가 요청을 분기하며 레거시(빨강)를 신규(초록)로 조금씩 대체한다</text>

  <defs>
    <marker id="lm-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Stage 1 -->
  <text x="170" y="118" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">1단계 · 파사드 도입</text>
  <rect x="60" y="134" width="220" height="30" rx="6" fill="#12203a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="154" font-size="13" fill="#7ec8e3" text-anchor="middle">파사드 (라우터)</text>
  <rect x="60" y="180" width="220" height="160" rx="6" fill="#2a1414" stroke="#e05555" stroke-width="1"/>
  <text x="170" y="256" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">레거시 100%</text>
  <text x="170" y="278" font-size="12" fill="#c88" text-anchor="middle">모든 요청을 그대로 전달</text>

  <!-- Stage 2 -->
  <text x="440" y="118" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">2단계 · 부분 대체</text>
  <rect x="330" y="134" width="220" height="30" rx="6" fill="#12203a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="154" font-size="13" fill="#7ec8e3" text-anchor="middle">파사드 (분기)</text>
  <rect x="330" y="180" width="220" height="96" rx="6" fill="#2a1414" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="234" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">레거시 60%</text>
  <rect x="330" y="280" width="220" height="60" rx="6" fill="#14240f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="316" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">신규 40%</text>

  <!-- Stage 3 -->
  <text x="710" y="118" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">3단계 · 레거시 소멸</text>
  <rect x="600" y="134" width="220" height="30" rx="6" fill="#12203a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="154" font-size="13" fill="#7ec8e3" text-anchor="middle">파사드 (제거 예정)</text>
  <rect x="600" y="180" width="220" height="52" rx="6" fill="#2a1414" stroke="#e05555" stroke-width="1"/>
  <text x="710" y="211" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">레거시 20%</text>
  <rect x="600" y="236" width="220" height="104" rx="6" fill="#14240f" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="294" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">신규 80%</text>

  <!-- arrows between stages -->
  <line x1="284" y1="260" x2="326" y2="260" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lm-arr)"/>
  <line x1="554" y1="260" x2="596" y2="260" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lm-arr)"/>
</svg>
