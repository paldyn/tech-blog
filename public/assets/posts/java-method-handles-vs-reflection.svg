<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">Reflection vs MethodHandle</text>

  <!-- reflection -->
  <rect x="60" y="78" width="360" height="220" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="108" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Reflection (Method)</text>
  <text x="84" y="146" font-size="13" fill="#ffffff">• 멤버 조회 + 호출 모두 지원</text>
  <text x="84" y="172" font-size="13" fill="#ffffff">• 매 invoke마다 접근 검사</text>
  <text x="84" y="198" font-size="13" fill="#ffffff">• 인자/반환 항상 박싱(Object)</text>
  <text x="84" y="224" font-size="13" fill="#9aa4b8">• JIT 최적화 제한적</text>
  <text x="84" y="256" font-size="13" fill="#e0a955">→ 유연하지만 느림</text>
  <text x="84" y="282" font-size="12" fill="#888">프레임워크의 일반 도구</text>

  <!-- method handle -->
  <rect x="460" y="78" width="360" height="220" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="108" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">MethodHandle</text>
  <text x="484" y="146" font-size="13" fill="#ffffff">• 호출에 특화 (조회는 Lookup)</text>
  <text x="484" y="172" font-size="13" fill="#ffffff">• 접근 검사는 lookup 시 1회</text>
  <text x="484" y="198" font-size="13" fill="#ffffff">• 타입 특화, 박싱 회피 가능</text>
  <text x="484" y="224" font-size="13" fill="#9aa4b8">• JIT가 직접 호출처럼 최적화</text>
  <text x="484" y="256" font-size="13" fill="#55c555">→ 빠름, invokedynamic 토대</text>
  <text x="484" y="282" font-size="12" fill="#888">람다·문자열 결합이 내부에서 사용</text>
</svg>
