<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 메서드 ↔ CRUD 매핑</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">REST API 설계 패턴 — /users 리소스 예시</text>

  <!-- Table header -->
  <rect x="60" y="90" width="760" height="44" rx="6" fill="#0f1a2a" stroke="#2a3a5a" stroke-width="1.5"/>
  <text x="130" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">CRUD</text>
  <text x="280" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">HTTP 메서드</text>
  <text x="430" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">경로 예시</text>
  <text x="620" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">설명</text>

  <!-- Row 1: Read list -->
  <rect x="60" y="140" width="760" height="50" rx="4" fill="#0f1a0f" stroke="#1a2a1a" stroke-width="1"/>
  <text x="130" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Read (목록)</text>
  <rect x="236" y="151" width="88" height="28" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="280" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">GET</text>
  <text x="430" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">GET /users</text>
  <text x="620" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용자 목록 조회</text>

  <!-- Row 2: Read single -->
  <rect x="60" y="196" width="760" height="50" rx="4" fill="#0a0a0a" stroke="#1a2020" stroke-width="1"/>
  <text x="130" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Read (단건)</text>
  <rect x="236" y="207" width="88" height="28" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="280" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">GET</text>
  <text x="430" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">GET /users/42</text>
  <text x="620" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">특정 사용자 조회</text>

  <!-- Row 3: Create -->
  <rect x="60" y="252" width="760" height="50" rx="4" fill="#0f1a0f" stroke="#1a2a1a" stroke-width="1"/>
  <text x="130" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">Create</text>
  <rect x="232" y="263" width="96" height="28" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="280" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">POST</text>
  <text x="430" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">POST /users</text>
  <text x="620" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">새 사용자 생성 → 201</text>

  <!-- Row 4: Update full -->
  <rect x="60" y="308" width="760" height="50" rx="4" fill="#0a0a0a" stroke="#1a2020" stroke-width="1"/>
  <text x="130" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" font-weight="600" text-anchor="middle">Update (전체)</text>
  <rect x="228" y="319" width="104" height="28" rx="4" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="280" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">PUT</text>
  <text x="430" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">PUT /users/42</text>
  <text x="620" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용자 정보 전체 교체</text>

  <!-- Row 5: Update partial -->
  <rect x="60" y="364" width="760" height="50" rx="4" fill="#0f1a0f" stroke="#1a2a1a" stroke-width="1"/>
  <text x="130" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">Update (부분)</text>
  <rect x="220" y="375" width="120" height="28" rx="4" fill="#0f0f1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="280" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">PATCH</text>
  <text x="430" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">PATCH /users/42</text>
  <text x="620" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이름·이메일만 수정</text>

  <!-- Row 6: Delete -->
  <rect x="60" y="420" width="760" height="28" rx="4" fill="#1a0f0f" stroke="#2a1a1a" stroke-width="1"/>
  <text x="130" y="439" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" font-weight="600" text-anchor="middle">Delete</text>
  <rect x="220" y="427" width="120" height="18" rx="3" fill="#1a0f0f" stroke="#e05555" stroke-width="1.2"/>
  <text x="280" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">DELETE</text>
  <text x="430" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">DELETE /users/42</text>
  <text x="620" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용자 삭제 → 204</text>
</svg>
