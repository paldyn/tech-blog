<svg xmlns="http://www.w3.org/2000/svg" width="880" height="278" viewBox="0 0 880 278">
<rect width="880" height="278" fill="#0a0a0a" rx="12"/>
<text x="50" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">요청·응답을 제네릭으로 묶기</text>
<text x="50" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">Handler 타입</text>
<rect x="50" y="96" width="780" height="154" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">type</tspan><tspan fill="#ffffff"> Handler&lt;Body, Res&gt; = (</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  req: { body: Body },</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  res: { json(d: Res): </tspan><tspan font-weight="600" fill="#7ec8e3">void</tspan><tspan fill="#ffffff"> }</tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">) =&gt; </tspan><tspan font-weight="600" fill="#7ec8e3">void</tspan></text>
<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> create: Handler&lt;NewUser, User&gt; =</tspan></text>
<text y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  (req, res) =&gt; res.json(save(req.body))</tspan></text>
<text y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// 입력·출력 타입이 핸들러 시그니처에 고정된다</tspan></text>
</svg>
