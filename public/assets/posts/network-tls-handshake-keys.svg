<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TLS 1.3 키 파생 구조 (HKDF)</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">각 단계에서 HKDF로 파생되는 시크릿 계층</text>

  <!-- Early Secret -->
  <rect x="310" y="88" width="260" height="48" rx="8" fill="#1a1a0a" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c44a">Early Secret</text>
  <text x="440" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PSK (없으면 0) → HKDF-Extract</text>

  <defs>
    <marker id="arrDown" viewBox="0 0 14 14" refX="7" refY="12" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#7777cc"/>
    </marker>
    <marker id="arrDownG" viewBox="0 0 14 14" refX="7" refY="12" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Early Secret → Handshake Secret -->
  <line x1="440" y1="136" x2="440" y2="170" stroke="#7777cc" stroke-width="2" marker-end="url(#arrDown)"/>
  <text x="450" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">+ ECDHE Shared Secret</text>

  <!-- Handshake Secret -->
  <rect x="280" y="172" width="320" height="48" rx="8" fill="#1a0d2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Handshake Secret</text>
  <text x="440" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버·클라이언트 핸드셰이크 트래픽 키 파생</text>

  <!-- Handshake Secret → 두 갈래 -->
  <line x1="370" y1="220" x2="200" y2="270" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="510" y1="220" x2="680" y2="270" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="80" y="270" width="240" height="44" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">client_handshake_traffic_secret</text>
  <text x="200" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라 Finished 메시지 암호화</text>

  <rect x="560" y="270" width="240" height="44" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="680" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">server_handshake_traffic_secret</text>
  <text x="680" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버 Finished 메시지 암호화</text>

  <!-- Handshake Secret → Master Secret -->
  <line x1="440" y1="220" x2="440" y2="342" stroke="#7777cc" stroke-width="2" marker-end="url(#arrDown)"/>
  <text x="450" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">+ 0 → HKDF-Extract</text>

  <!-- Master Secret -->
  <rect x="290" y="344" width="300" height="48" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Master Secret</text>
  <text x="440" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">앱 데이터 트래픽 키 및 재개 PSK 파생</text>

  <!-- 코드 박스 설명 -->
  <rect x="60" y="406" width="760" height="20" rx="4" fill="#0a0a0a"/>
  <text x="440" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">HKDF = HMAC-based Key Derivation Function  ·  모든 키는 핸드셰이크 완료 후 폐기(Forward Secrecy)</text>
</svg>
