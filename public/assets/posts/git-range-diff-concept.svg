<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="rdMatch" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">git range-diff: 두 커밋 계열을 짝지어 비교</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">리베이스·amend 전후의 변경을 커밋 단위로 대응시킨다</text>

  <text x="160" y="120" font-size="15" font-weight="600" fill="#7ec8e3">rebase 전 (old)</text>
  <text x="600" y="120" font-size="15" font-weight="600" fill="#55c555">rebase 후 (new)</text>

  <!-- old column -->
  <rect x="120" y="140" width="180" height="48" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="170" font-size="14" fill="#ffffff">1:  a1b2c3  로그인 추가</text>
  <rect x="120" y="210" width="180" height="48" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="240" font-size="14" fill="#ffffff">2:  d4e5f6  검증 추가</text>
  <rect x="120" y="280" width="180" height="48" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="310" font-size="14" fill="#ffffff">3:  09a8b7  오타 수정</text>

  <!-- new column -->
  <rect x="580" y="140" width="180" height="48" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="600" y="170" font-size="14" fill="#ffffff">1:  7c6d5e  로그인 추가</text>
  <rect x="580" y="210" width="180" height="48" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="600" y="240" font-size="14" fill="#ffffff">2:  f1e2d3  검증 보강</text>
  <rect x="580" y="280" width="180" height="48" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="600" y="310" font-size="14" fill="#ffffff">3:  44c3b2  오타 수정</text>

  <!-- matching arrows -->
  <line x1="300" y1="164" x2="580" y2="164" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#rdMatch)"/>
  <text x="380" y="156" font-size="12" fill="#55c555">동일</text>
  <line x1="300" y1="234" x2="580" y2="234" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#rdMatch)"/>
  <text x="370" y="226" font-size="12" fill="#e05555">내용 변경</text>
  <line x1="300" y1="304" x2="580" y2="304" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#rdMatch)"/>
  <text x="380" y="296" font-size="12" fill="#55c555">동일</text>

  <text x="60" y="360" font-size="13" fill="#888">해시는 달라도 같은 작업 단위끼리 묶어, 실제 내용 차이만 보여 준다</text>
</svg>
