<svg xmlns="http://www.w3.org/2000/svg" width="880" height="318" viewBox="0 0 880 318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="318" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">pdb 핵심 명령어</text>

  <rect x="60" y="84" width="370" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="103" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">n  (next)</text>
  <text xml:space="preserve" x="78" y="121" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 다음 줄 (함수는 통째로)</text>

  <rect x="450" y="84" width="370" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="468" y="103" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">s  (step)</text>
  <text xml:space="preserve" x="468" y="121" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 함수 안으로 들어감</text>

  <rect x="60" y="140" width="370" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">c  (continue)</text>
  <text xml:space="preserve" x="78" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 다음 중단점까지 실행</text>

  <rect x="450" y="140" width="370" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="468" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">l  (list)</text>
  <text xml:space="preserve" x="468" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 현재 위치 소스 보기</text>

  <rect x="60" y="196" width="370" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">p expr / pp expr</text>
  <text xml:space="preserve" x="78" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 값 출력 / 보기 좋게</text>

  <rect x="450" y="196" width="370" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="468" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">w (where) / u / d</text>
  <text xml:space="preserve" x="468" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 호출 스택 이동</text>

  <rect x="60" y="258" width="760" height="40" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="78" y="283" font-size="13" fill="#55c555">q (quit) — 디버거 종료 · h (help) — 명령어 도움말 · Enter — 직전 명령 반복</text>
</svg>
