<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 740">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect fill="#0a0a0a" rx="12" width="880" height="740"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Reconcile 함수 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">WorkQueue → Reconcile → 상태 수렴 → Requeue 결정</text>

  <!-- Step 1: WorkQueue delivers request -->
  <rect x="300" y="90" width="280" height="56" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">WorkQueue → Reconcile 호출</text>
  <text x="440" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Request{NamespacedName}</text>

  <!-- Arrow down -->
  <line x1="440" y1="146" x2="440" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Get resource -->
  <rect x="300" y="175" width="280" height="56" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">r.Get(ctx, req, &amp;obj)</text>
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">캐시에서 리소스 조회</text>

  <!-- Arrow down -->
  <line x1="440" y1="231" x2="440" y2="257" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision: NotFound? -->
  <!-- Diamond shape -->
  <polygon points="440,260 560,295 440,330 320,295" fill="#0f1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">NotFound?</text>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">errors.IsNotFound</text>

  <!-- Yes branch: right -->
  <line x1="560" y1="295" x2="660" y2="295" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="605" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Yes</text>
  <rect x="660" y="268" width="160" height="54" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">return nil</text>
  <text x="740" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이미 삭제됨 — 정상</text>

  <!-- No branch: down -->
  <line x1="440" y1="330" x2="440" y2="356" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="452" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">No</text>

  <!-- Decision: DeletionTimestamp set? -->
  <polygon points="440,360 580,398 440,436 300,398" fill="#0f1a2e" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">삭제 중?</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DeletionTimestamp != nil</text>

  <!-- Yes branch: right (deletion cleanup) -->
  <line x1="580" y1="398" x2="660" y2="398" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="615" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Yes</text>
  <rect x="660" y="370" width="160" height="56" rx="8" fill="#0f1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Finalizer 처리</text>
  <text x="740" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">cleanup → RemoveFinalizer</text>

  <!-- No branch: down -->
  <line x1="440" y1="436" x2="440" y2="462" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="452" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">No</text>

  <!-- Step: Reconcile logic -->
  <rect x="280" y="465" width="320" height="64" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">비즈니스 로직 수행</text>
  <text x="440" y="510" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자식 리소스 생성/수정/삭제</text>
  <text x="440" y="527" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">외부 시스템 호출</text>

  <!-- Arrow down -->
  <line x1="440" y1="529" x2="440" y2="553" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step: Update Status -->
  <rect x="280" y="556" width="320" height="56" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="580" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Status 업데이트</text>
  <text x="440" y="600" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">r.Status().Update() / Patch()</text>

  <!-- Arrow down -->
  <line x1="440" y1="612" x2="440" y2="636" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision: Requeue? -->
  <polygon points="440,640 560,668 440,696 320,668" fill="#0f1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="664" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Requeue?</text>
  <text x="440" y="680" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">에러 또는 RequeueAfter</text>

  <!-- Yes: requeue left arrow back up -->
  <line x1="320" y1="668" x2="200" y2="668" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="256" y="658" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Yes</text>
  <line x1="200" y1="668" x2="200" y2="118" stroke="#e05555" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="200" y1="118" x2="298" y2="118" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="170" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" transform="rotate(-90 170 400)">WorkQueue 재등록</text>

  <!-- No: done -->
  <line x1="560" y1="668" x2="640" y2="668" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="596" y="658" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">No</text>
  <rect x="640" y="644" width="140" height="48" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="665" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">완료</text>
  <text x="710" y="683" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">return Result{}, nil</text>

  <!-- Bottom label -->
  <text x="440" y="728" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">reconcile.Reconciler — 단일 함수로 전체 수렴 논리 표현</text>
</svg>
