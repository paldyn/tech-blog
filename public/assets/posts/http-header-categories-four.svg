<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="415" viewBox="0 0 880 415">
  <rect width="880" height="415" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">HTTP 헤더 4대 분류</text>
    <!-- General Headers -->
    <rect x="60" y="65" width="375" height="148" rx="8" fill="#0f1f2a" stroke="#4a8aaa" stroke-width="1.5"/>
    <line x1="60" y1="110" x2="435" y2="110" stroke="#4a8aaa" stroke-width="1"/>
    <text x="247" y="87" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">공통 헤더</text>
    <text x="247" y="104" text-anchor="middle" font-size="11" fill="#888">General Headers</text>
    <text x="80" y="130" font-size="11" fill="#888">역할: 요청/응답 양쪽에 적용되는 제어 헤더</text>
    <text x="80" y="151" font-size="12" fill="#e8e8e8">Cache-Control, Connection, Date</text>
    <text x="80" y="171" font-size="12" fill="#e8e8e8">Transfer-Encoding, Upgrade</text>
    <text x="80" y="196" font-size="11" fill="#7777cc">메시지 제어 · 전송 특성</text>
    <!-- Request Headers -->
    <rect x="445" y="65" width="375" height="148" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <line x1="445" y1="110" x2="820" y2="110" stroke="#3aaa5a" stroke-width="1"/>
    <text x="632" y="87" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">요청 헤더</text>
    <text x="632" y="104" text-anchor="middle" font-size="11" fill="#888">Request Headers</text>
    <text x="465" y="130" font-size="11" fill="#888">역할: 클라이언트가 서버에 보내는 부가 정보</text>
    <text x="465" y="151" font-size="12" fill="#e8e8e8">Host, User-Agent, Accept</text>
    <text x="465" y="171" font-size="12" fill="#e8e8e8">Authorization, Cookie, Referer</text>
    <text x="465" y="196" font-size="11" fill="#7777cc">클라이언트 선호 · 인증 · 컨텍스트</text>
    <!-- Response Headers -->
    <rect x="60" y="233" width="375" height="148" rx="8" fill="#2a1a0f" stroke="#aa6a3a" stroke-width="1.5"/>
    <line x1="60" y1="278" x2="435" y2="278" stroke="#aa6a3a" stroke-width="1"/>
    <text x="247" y="255" text-anchor="middle" font-size="15" font-weight="700" fill="#dd9955">응답 헤더</text>
    <text x="247" y="272" text-anchor="middle" font-size="11" fill="#888">Response Headers</text>
    <text x="80" y="298" font-size="11" fill="#888">역할: 서버가 클라이언트에 보내는 부가 정보</text>
    <text x="80" y="319" font-size="12" fill="#e8e8e8">Server, Set-Cookie, Location</text>
    <text x="80" y="339" font-size="12" fill="#e8e8e8">WWW-Authenticate, ETag, Age</text>
    <text x="80" y="364" font-size="11" fill="#7777cc">서버 상태 · 지시 · 리다이렉션</text>
    <!-- Representation Headers -->
    <rect x="445" y="233" width="375" height="148" rx="8" fill="#2a0f2a" stroke="#aa3aaa" stroke-width="1.5"/>
    <line x1="445" y1="278" x2="820" y2="278" stroke="#aa3aaa" stroke-width="1"/>
    <text x="632" y="255" text-anchor="middle" font-size="15" font-weight="700" fill="#cc77cc">표현 헤더</text>
    <text x="632" y="272" text-anchor="middle" font-size="11" fill="#888">Representation Headers</text>
    <text x="465" y="298" font-size="11" fill="#888">역할: 메시지 본문의 형식과 인코딩 명세</text>
    <text x="465" y="319" font-size="12" fill="#e8e8e8">Content-Type, Content-Length</text>
    <text x="465" y="339" font-size="12" fill="#e8e8e8">Content-Encoding, Content-Language</text>
    <text x="465" y="364" font-size="11" fill="#7777cc">본문 형식 · 압축 · 언어</text>
    <text x="440" y="400" text-anchor="middle" font-size="11" fill="#555">RFC 7230-7235 기반 분류 — HTTP/2, HTTP/3에서도 동일 체계 유지</text>
  </g>
</svg>
