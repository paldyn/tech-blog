<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">컨테이너 접속 방법 비교</text>

  <!-- Header -->
  <rect x="40" y="62" width="800" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">방법</text>
  <text x="360" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">특징</text>
  <text x="570" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">셸 필요</text>
  <text x="730" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">권장 상황</text>

  <line x1="40" y1="98" x2="840" y2="98" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="280" y1="62" x2="280" y2="410" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="460" y1="62" x2="460" y2="410" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="640" y1="62" x2="640" y2="410" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Row: docker exec -it -->
  <text x="170" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">docker exec -it</text>
  <text x="360" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새 프로세스 생성</text>
  <text x="360" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PID 1과 독립적</text>
  <text x="570" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">필요</text>
  <text x="730" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">일반 디버깅</text>
  <text x="730" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">명령 실행</text>
  <line x1="40" y1="148" x2="840" y2="148" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Row: docker attach -->
  <text x="170" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">docker attach</text>
  <text x="360" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PID 1 stdin/out에 연결</text>
  <text x="360" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Ctrl+C → 컨테이너 종료</text>
  <text x="570" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">필요</text>
  <text x="730" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PID 1 출력 모니터링</text>
  <text x="730" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">거의 미사용</text>
  <line x1="40" y1="198" x2="840" y2="198" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Row: nsenter -->
  <text x="170" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">nsenter</text>
  <text x="360" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">네임스페이스 직접 진입</text>
  <text x="360" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트 도구 사용 가능</text>
  <text x="570" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">불필요</text>
  <text x="730" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">distroless, scratch</text>
  <text x="730" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">셸 없는 컨테이너</text>
  <line x1="40" y1="248" x2="840" y2="248" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Row: docker debug -->
  <text x="170" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">docker debug</text>
  <text x="360" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">임시 컨테이너 sidecar</text>
  <text x="360" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Docker Desktop 4.27+</text>
  <text x="570" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">불필요</text>
  <text x="730" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">최소 이미지</text>
  <text x="730" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로컬 개발 환경</text>
  <line x1="40" y1="298" x2="840" y2="298" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Row: kubectl debug -->
  <text x="170" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">kubectl debug</text>
  <text x="360" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ephemeral container</text>
  <text x="360" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">프로세스 네임스페이스 공유</text>
  <text x="570" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">불필요</text>
  <text x="730" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Kubernetes</text>
  <text x="730" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">프로덕션 파드</text>
  <line x1="40" y1="348" x2="840" y2="348" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Row: SSH -->
  <text x="170" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">SSH (비권장)</text>
  <text x="360" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컨테이너 내 sshd 실행</text>
  <text x="360" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">보안 문제 많음</text>
  <text x="570" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">필요</text>
  <text x="730" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">사용 자제</text>

  <!-- Border -->
  <rect x="40" y="62" width="800" height="350" rx="6" fill="none" stroke="#3a4a6e" stroke-width="1"/>
</svg>
