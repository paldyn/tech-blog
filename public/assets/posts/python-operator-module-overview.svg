<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">operator 모듈 — 연산자를 함수로</text>

  <!-- 산술 연산 -->
  <rect x="60" y="72" width="230" height="170" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">산술 연산</text>
  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">add(a, b)    →  a + b</text>
  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">sub(a, b)    →  a - b</text>
  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">mul(a, b)    →  a * b</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">truediv(a,b) →  a / b</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">pow(a, b)    →  a ** b</text>
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">neg(a)       →  -a</text>

  <!-- 비교 연산 -->
  <rect x="310" y="72" width="230" height="170" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="425" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">비교 / 논리 연산</text>
  <text x="330" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">eq(a, b)  →  a == b</text>
  <text x="330" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">ne(a, b)  →  a != b</text>
  <text x="330" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">lt(a, b)  →  a &lt; b</text>
  <text x="330" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">le(a, b)  →  a &lt;= b</text>
  <text x="330" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">and_(a,b) →  a &amp; b</text>
  <text x="330" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">or_(a, b) →  a | b</text>

  <!-- 컨테이너 접근 -->
  <rect x="560" y="72" width="260" height="170" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="690" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">컨테이너 접근</text>
  <text x="580" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">itemgetter(key)  → obj[key]</text>
  <text x="580" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">attrgetter(name) → obj.name</text>
  <text x="580" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">methodcaller(nm) → obj.nm()</text>
  <text x="580" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">setitem(obj,k,v) → obj[k]=v</text>
  <text x="580" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">getitem(obj, k)  → obj[k]</text>
  <text x="580" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">contains(a, b)   → b in a</text>

  <!-- Benefit box -->
  <rect x="60" y="264" width="760" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">왜 operator 모듈인가?</text>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">lambda 없이 map/sorted/reduce에 바로 전달 가능 · C 구현으로 lambda보다 빠름 · pickle 직렬화 가능</text>

  <!-- Example row -->
  <rect x="60" y="346" width="360" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">sorted(users, key=attrgetter('age'))</text>
  <text x="240" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">vs  lambda u: u.age</text>

  <rect x="460" y="346" width="360" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">reduce(operator.add, [1,2,3,4])</text>
  <text x="640" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">vs  reduce(lambda a,b: a+b, ...)</text>
</svg>
