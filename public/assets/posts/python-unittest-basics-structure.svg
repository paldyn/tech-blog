<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">unittest의 기본 구조</text>

  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="84" width="430" height="244" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import unittest</text>
  <text xml:space="preserve" x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">class</text>
  <text xml:space="preserve" x="146" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">TestMath(unittest.TestCase):</text>
  <text xml:space="preserve" x="100" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="142" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_add(self):</text>
  <text xml:space="preserve" x="142" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">self.assertEqual(1 + 1, 2)</text>
  <text xml:space="preserve" x="100" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="142" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_sub(self):</text>
  <text xml:space="preserve" x="142" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">self.assertEqual(3 - 1, 2)</text>
  <text xml:space="preserve" x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># python -m unittest</text>

  <line x1="490" y1="180" x2="556" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="498" y="166" font-size="13" fill="#888">발견·실행</text>

  <rect x="566" y="100" width="254" height="58" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="586" y="126" font-size="14" font-weight="600" fill="#55c555">test_add</text>
  <text x="586" y="146" font-size="12" fill="#888">독립 실행 → OK</text>

  <rect x="566" y="172" width="254" height="58" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="586" y="198" font-size="14" font-weight="600" fill="#55c555">test_sub</text>
  <text x="586" y="218" font-size="12" fill="#888">독립 실행 → OK</text>

  <rect x="566" y="244" width="254" height="58" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="586" y="270" font-size="14" font-weight="600" fill="#7ec8e3">test runner</text>
  <text x="586" y="290" font-size="12" fill="#888">test_ 접두사만 수집</text>
</svg>
