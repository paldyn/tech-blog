<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">파일 트랜잭션 흐름</text>

  <!-- Section headers -->
  <text x="205" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">fileupload() — 업로드</text>
  <text x="675" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">filedownload() — 다운로드</text>

  <!-- Divider -->
  <line x1="440" y1="64" x2="440" y2="480" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== UPLOAD SIDE (left, cx=205) ===== -->

  <!-- Box 1: Form -->
  <rect x="95" y="106" width="220" height="50" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="205" y="135" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Form + FileUpload 컴포넌트</text>

  <!-- Arrow 1 upload (cx=205, y=156→206) shaft ends 194 -->
  <polygon points="202,156 208,156 208,194 214,194 205,206 196,194 202,194"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <text x="222" y="184"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">fileupload() 호출</text>

  <!-- Box 2: HTTP Request -->
  <rect x="95" y="206" width="220" height="50" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="205" y="235" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">HTTP Multipart 요청 전송</text>

  <!-- Arrow 2 upload (y=256→306) -->
  <polygon points="202,256 208,256 208,294 214,294 205,306 196,294 202,294"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <text x="222" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">multipart/form-data</text>

  <!-- Box 3: Server -->
  <rect x="95" y="306" width="220" height="50" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="205" y="335" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">서버 (upload.do)</text>

  <!-- Arrow 3 upload (y=356→406) -->
  <polygon points="202,356 208,356 208,394 214,394 205,406 196,394 202,394"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <text x="222" y="384"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">응답 Dataset</text>

  <!-- Box 4: Callback -->
  <rect x="95" y="406" width="220" height="50" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="205" y="435" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">fn_uploadCallback()</text>

  <!-- ===== DOWNLOAD SIDE (right, cx=675) ===== -->

  <!-- Box 1: Form + Button -->
  <rect x="565" y="106" width="220" height="50" fill="#12213a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="135" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Form + 다운로드 버튼</text>

  <!-- Arrow 1 download (y=156→206) -->
  <polygon points="672,156 678,156 678,194 684,194 675,206 666,194 672,194"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="692" y="184"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">filedownload() 호출</text>

  <!-- Box 2: HTTP GET -->
  <rect x="565" y="206" width="220" height="50" fill="#12213a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="235" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">HTTP GET 요청 전송</text>

  <!-- Arrow 2 download (y=256→306) -->
  <polygon points="672,256 678,256 678,294 684,294 675,306 666,294 672,294"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="692" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">파일 경로 전달</text>

  <!-- Box 3: Server -->
  <rect x="565" y="306" width="220" height="50" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="675" y="335" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">서버 (download.do)</text>

  <!-- Arrow 3 download (y=356→406) -->
  <polygon points="672,356 678,356 678,394 684,394 675,406 666,394 672,394"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="692" y="384"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">binary stream</text>

  <!-- Box 4: Browser Save -->
  <rect x="565" y="406" width="220" height="50" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="435" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">브라우저 파일 저장</text>

  <!-- Bottom labels -->
  <text x="205" y="476"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">파일 선택 → 서버 저장</text>
  <text x="675" y="476"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">서버 파일 → 브라우저 로컬 저장</text>
</svg>
