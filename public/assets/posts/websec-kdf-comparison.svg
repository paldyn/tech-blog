  <rect x="208" y="210" width="148" height="44" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="282" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">낮음 (GPU 가속됨)</text>

  <rect x="364" y="210" width="148" height="44" rx="4" fill="#0d200d" stroke="#2a5e2a" stroke-width="1"/>
  <text x="438" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055">중간 (Blowfish)</text>

  <rect x="520" y="210" width="148" height="44" rx="4" fill="#200d05" stroke="#5e3a1a" stroke-width="1"/>
  <text x="594" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">높음 (메모리 경화)</text>

  <rect x="676" y="210" width="144" height="44" rx="4" fill="#110d20" stroke="#3a2a5e" stroke-width="1"/>
  <text x="748" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">높음 (메모리 경화)</text>

  <!-- Row 4: 병렬 -->
  <rect x="60" y="262" width="140" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="130" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">병렬 공격 저항</text>

  <rect x="208" y="262" width="148" height="44" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="282" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">낮음</text>

  <rect x="364" y="262" width="148" height="44" rx="4" fill="#0d200d" stroke="#2a5e2a" stroke-width="1"/>
  <text x="438" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055">중간</text>

  <rect x="520" y="262" width="148" height="44" rx="4" fill="#200d05" stroke="#5e3a1a" stroke-width="1"/>
  <text x="594" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">높음</text>

  <rect x="676" y="262" width="144" height="44" rx="4" fill="#110d20" stroke="#3a2a5e" stroke-width="1"/>
  <text x="748" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">높음 (p 파라미터)</text>

  <!-- Row 5: 표준 -->
  <rect x="60" y="314" width="140" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="130" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">표준/권장</text>

  <rect x="208" y="314" width="148" height="44" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="282" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">NIST SP 800-132</text>

  <rect x="364" y="314" width="148" height="44" rx="4" fill="#0d200d" stroke="#2a5e2a" stroke-width="1"/>
  <text x="438" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">OWASP 권장</text>

  <rect x="520" y="314" width="148" height="44" rx="4" fill="#200d05" stroke="#5e3a1a" stroke-width="1"/>
  <text x="594" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055">레거시 호환용</text>

  <rect x="676" y="314" width="144" height="44" rx="4" fill="#110d20" stroke="#3a2a5e" stroke-width="1"/>
  <text x="748" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">PHC 우승, 최신 권장</text>

  <!-- Recommendation -->
  <rect x="60" y="376" width="760" height="44" rx="8" fill="#110d20" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">신규 시스템 권장 순서: Argon2id ▶ bcrypt (레거시 지원) ▶ PBKDF2 (FIPS 환경)</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비밀번호 해싱 전용 KDF — 일반 데이터 암호화 키 유도엔 HKDF/PKDF2 사용</text>
</svg>
