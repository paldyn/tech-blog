<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">비밀번호 KDF 비교: PBKDF2 · bcrypt · scrypt · Argon2</text>

  <!-- Headers -->
  <rect x="60" y="62" width="140" height="36" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="130" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">항목</text>

  <rect x="208" y="62" width="148" height="36" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="282" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">PBKDF2</text>

  <rect x="364" y="62" width="148" height="36" rx="6" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="438" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">bcrypt</text>

  <rect x="520" y="62" width="148" height="36" rx="6" fill="#211511" stroke="#e0a055" stroke-width="1.5"/>
  <text x="594" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055">scrypt</text>

  <rect x="676" y="62" width="144" height="36" rx="6" fill="#1a1122" stroke="#7777cc" stroke-width="1.5"/>
  <text x="748" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Argon2id ★</text>

  <!-- Row 1: CPU 비용 -->
  <rect x="60" y="106" width="140" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="130" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU 비용</text>

  <rect x="208" y="106" width="148" height="44" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="282" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">반복 횟수</text>

  <rect x="364" y="106" width="148" height="44" rx="4" fill="#0d200d" stroke="#2a5e2a" stroke-width="1"/>
  <text x="438" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">cost factor</text>

  <rect x="520" y="106" width="148" height="44" rx="4" fill="#200d05" stroke="#5e3a1a" stroke-width="1"/>
  <text x="594" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055">N (CPU+RAM)</text>

  <rect x="676" y="106" width="144" height="44" rx="4" fill="#110d20" stroke="#3a2a5e" stroke-width="1"/>
  <text x="748" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">t (이터레이션)</text>

  <!-- Row 2: 메모리 비용 -->
  <rect x="60" y="158" width="140" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="130" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메모리 경화</text>

  <rect x="208" y="158" width="148" height="44" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="282" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">❌ 없음</text>

  <rect x="364" y="158" width="148" height="44" rx="4" fill="#0d200d" stroke="#2a5e2a" stroke-width="1"/>
  <text x="438" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">❌ 4KB 고정</text>

  <rect x="520" y="158" width="148" height="44" rx="4" fill="#200d05" stroke="#5e3a1a" stroke-width="1"/>
  <text x="594" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✅ r×p×128B</text>

  <rect x="676" y="158" width="144" height="44" rx="4" fill="#110d20" stroke="#3a2a5e" stroke-width="1"/>
  <text x="748" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✅ m (KB 단위)</text>

  <!-- Row 3: GPU 저항 -->
  <rect x="60" y="210" width="140" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="130" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
