<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">LLM 단독 vs RAG 비교</text>

  <!-- Left box: LLM alone -->
  <rect x="50" y="60" width="320" height="240" rx="10" fill="#1a0e0e" stroke="#e05555" stroke-width="2"/>
  <rect x="50" y="60" width="320" height="44" rx="10" fill="#e05555"/>
  <rect x="50" y="92" width="320" height="12" rx="0" fill="#e05555"/>
  <text x="210" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#fff">LLM 단독</text>

  <!-- Problems -->
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗  환각 (Hallucination)</text>
  <text x="98" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사실과 다른 내용을 자신있게 생성</text>

  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗  구식 정보</text>
  <text x="98" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">학습 데이터 컷오프 이후 정보 없음</text>

  <text x="80" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗  출처 추적 불가</text>
  <text x="98" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">답변 근거를 검증할 수 없음</text>

  <text x="80" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗  도메인 지식 부족</text>
  <text x="98" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사내 문서, 전문 지식 미반영</text>

  <!-- Center arrow -->
  <line x1="382" y1="180" x2="448" y2="180" stroke="#7777cc" stroke-width="3"/>
  <polygon points="448,172 468,180 448,188" fill="#7777cc"/>
  <text x="415" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">RAG</text>
  <text x="415" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">적용</text>

  <!-- Right box: RAG -->
  <rect x="510" y="60" width="320" height="240" rx="10" fill="#0e1a0e" stroke="#55c555" stroke-width="2"/>
  <rect x="510" y="60" width="320" height="44" rx="10" fill="#55c555"/>
  <rect x="510" y="92" width="320" height="12" rx="0" fill="#55c555"/>
  <text x="670" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#fff">RAG 적용</text>

  <!-- Solutions -->
  <text x="540" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✓  사실 기반 답변</text>
  <text x="558" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">검색된 문서를 근거로 생성</text>

  <text x="540" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✓  최신 정보 반영</text>
  <text x="558" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실시간 문서 업데이트 가능</text>

  <text x="540" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✓  출처 제공</text>
  <text x="558" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">참조 문서와 함께 답변 제공</text>

  <text x="540" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✓  도메인 특화 가능</text>
  <text x="558" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사내 문서, 전문 지식 즉시 반영</text>
</svg>
