<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GET vs POST — 요청 구조 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">데이터 전달 위치와 캐시·보안 특성 차이</text>

  <!-- GET column -->
  <text x="220" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">GET</text>

  <rect x="60" y="110" width="320" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#55c555" font-weight="600">GET</text>
  <text x="118" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> /search?q=http&amp;page=1</text>
  <text x="80" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> HTTP/1.1</text>
  <line x1="68" y1="158" x2="372" y2="158" stroke="#222" stroke-width="1"/>
  <text x="80" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Host:</text>
  <text x="130" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> example.com</text>
  <text x="80" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Accept:</text>
  <text x="144" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> text/html</text>
  <line x1="68" y1="202" x2="372" y2="202" stroke="#222" stroke-width="1"/>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#9aa4b8">\r\n</text>
  <line x1="68" y1="228" x2="372" y2="228" stroke="#222" stroke-width="1"/>
  <text x="80" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#555">(본문 없음)</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="10" fill="#9aa4b8">데이터: URL 쿼리스트링에 포함</text>

  <!-- GET characteristics -->
  <rect x="60" y="334" width="320" height="130" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">GET 특성</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">✓ 브라우저 히스토리에 저장</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">✓ 캐시·북마크 가능</text>
  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">✗ URL 길이 제한 (~2000자)</text>
  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">✗ 민감 데이터 노출 (로그·리퍼러)</text>
  <text x="80" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">✓ 멱등 — 재시도 안전</text>

  <!-- POST column -->
  <text x="660" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555" text-anchor="middle">POST</text>

  <rect x="500" y="110" width="320" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="520" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#e05555" font-weight="600">POST</text>
  <text x="568" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> /login HTTP/1.1</text>
  <line x1="508" y1="140" x2="812" y2="140" stroke="#222" stroke-width="1"/>
  <text x="520" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Host:</text>
  <text x="570" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> example.com</text>
  <text x="520" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Content-Type:</text>
  <text x="660" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> application/json</text>
  <text x="520" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Content-Length:</text>
  <text x="666" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#b5cea8"> 38</text>
  <line x1="508" y1="202" x2="812" y2="202" stroke="#222" stroke-width="1"/>
  <text x="520" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#9aa4b8">\r\n</text>
  <line x1="508" y1="228" x2="812" y2="228" stroke="#222" stroke-width="1"/>
  <text x="520" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff">{"user":"alice","pw":"secret"}</text>
  <text x="520" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="10" fill="#9aa4b8">데이터: 요청 본문에 포함</text>

  <!-- POST characteristics -->
  <rect x="500" y="334" width="320" height="130" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="520" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">POST 특성</text>
  <text x="520" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">✗ 히스토리·캐시에 저장 안 됨</text>
  <text x="520" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">✓ 데이터 크기 제한 없음</text>
  <text x="520" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">✓ URL에 노출 안 됨 (HTTPS 필수)</text>
  <text x="520" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">✗ 멱등 X — 재시도 주의</text>
  <text x="520" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ 로그인·파일업로드·결제에 사용</text>
</svg>
