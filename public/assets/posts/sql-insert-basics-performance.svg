<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360" style="background:#0a0a0a;border-radius:12px">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">INSERT 성능 — 단건 vs 배치</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">네트워크 왕복과 트랜잭션 오버헤드 최소화</text>

  <!-- Visual bars -->
  <rect x="60" y="96" width="760" height="120" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">1,000행 삽입 상대 속도 비교</text>
  <!-- Single insert bar -->
  <text x="80" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단건 ×1000</text>
  <rect x="200" y="132" width="520" height="20" rx="3" fill="#e05555" opacity="0.8"/>
  <text x="730" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">100x</text>
  <!-- Batch insert bar -->
  <text x="80" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">배치 삽입</text>
  <rect x="200" y="172" width="52" height="20" rx="3" fill="#55c555" opacity="0.8"/>
  <text x="260" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">~10x</text>
  <!-- Copy bar -->
  <text x="80" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">COPY/LOAD</text>
  <rect x="200" y="192" width="26" height="20" rx="3" fill="#7ec8e3" opacity="0.8"/>
  <text x="234" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">1x (기준)</text>

  <!-- Code block -->
  <rect x="60" y="240" width="760" height="82" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- PostgreSQL: CSV 파일에서 빠른 대량 적재</text>
  <text x="80" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">COPY</text>
  <text x="116" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> products (name, price)</text>
  <text x="80" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="116" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> '/data/products.csv'</text>
  <text x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">WITH (FORMAT CSV, HEADER </text>
  <text x="305" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" xml:space="preserve">TRUE</text>
  <text x="337" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">);</text>

  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
