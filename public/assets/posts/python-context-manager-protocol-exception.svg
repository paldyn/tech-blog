<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">__exit__ 예외 처리 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">예외 억제 vs 전파</text>

  <!-- Left: suppress -->
  <rect x="60" y="88" width="370" height="260" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <rect x="60" y="88" width="370" height="32" rx="8" fill="#0a2010"/>
  <text x="245" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">예외 억제 (True 반환)</text>
  <rect x="80" y="130" width="330" height="130" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="96" y="150" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">class </text>
  <text x="136" y="150" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">SuppressError:</text>
  <text x="96" y="168" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="132" y="168" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__init__(self, *exc):</text>
  <text x="96" y="186" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        self.exc = exc</text>
  <text x="96" y="204" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="132" y="204" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__enter__(self):</text>
  <text x="96" y="222" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="160" y="222" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">self</text>
  <text x="96" y="240" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="132" y="240" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__exit__(self, et, ev, tb):</text>
  <text x="96" y="258" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="160" y="258" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">isinstance(ev, self.exc)</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">True 반환 → 예외 억제</text>
  <text x="80" y="302" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">with SuppressError(ValueError):</text>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    int(</text>
  <text x="116" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"bad"</text>
  <text x="148" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)  </text>
  <text x="148" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">  # 에러 없이 통과</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">contextlib.suppress(exc) 와 동일 효과</text>

  <!-- Right: propagate -->
  <rect x="450" y="88" width="370" height="260" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <rect x="450" y="88" width="370" height="32" rx="8" fill="#2a1010"/>
  <text x="635" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">예외 전파 (None/False 반환)</text>
  <rect x="470" y="130" width="330" height="130" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="486" y="150" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">class </text>
  <text x="526" y="150" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ManagedFile:</text>
  <text x="486" y="168" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="522" y="168" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__init__(self, path, mode):</text>
  <text x="486" y="186" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        self.path = path; self.mode = mode</text>
  <text x="486" y="204" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="522" y="204" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__enter__(self):</text>
  <text x="486" y="222" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        self.file = open(self.path, self.mode)</text>
  <text x="486" y="240" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="550" y="240" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">self.file</text>
  <text x="486" y="258" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="522" y="258" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__exit__(self, *args):</text>
  <text x="486" y="276" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        self.file.close()  </text>
  <text x="486" y="276" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">           # None 반환</text>
  <text x="470" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">None 반환 → 예외 전파</text>
  <text x="470" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파일은 항상 닫히지만</text>
  <text x="470" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">예외는 그대로 호출자에게 전달</text>
  <text x="470" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">일반적인 패턴: 리소스 해제만, 예외는 전파</text>
</svg>
