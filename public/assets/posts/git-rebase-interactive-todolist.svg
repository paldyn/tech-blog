<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Interactive Rebase Todo 리스트</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">에디터에서 커밋 동작을 지정한다</text>

  <!-- Code block: todo list -->
  <rect x="60" y="88" width="760" height="190" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="80" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># git rebase -i HEAD~5 실행 결과 에디터</text>
  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">pick</text>
  <text x="128" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">a1b2c3d feat: 로그인 폼 구현</text>
  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0aa55">squash</text>
  <text x="148" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">b2c3d4e fix: 오타 수정</text>
  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0aa55">squash</text>
  <text x="148" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">c3d4e5f wip: 저장 진행중</text>
  <text x="80" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">reword</text>
  <text x="148" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">d4e5f6a feat: 비밀번호 검증</text>
  <text x="80" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">pick</text>
  <text x="128" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">e5f6a7b feat: 로그아웃 버튼</text>
  <text x="80" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 저장 후 닫으면 Git이 순서대로 실행</text>

  <!-- Legend -->
  <text x="80" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">주요 명령어</text>

  <rect x="80" y="326" width="70" height="22" rx="4" fill="#0a1a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="115" y="342" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">pick</text>
  <text x="162" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">그대로 사용</text>

  <rect x="280" y="326" width="70" height="22" rx="4" fill="#1a1a0a" stroke="#e0aa55" stroke-width="1"/>
  <text x="315" y="342" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0aa55">squash</text>
  <text x="362" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이전 커밋에 합치기</text>

  <rect x="500" y="326" width="70" height="22" rx="4" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="535" y="342" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">reword</text>
  <text x="582" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메시지만 수정</text>

  <rect x="80" y="358" width="70" height="22" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="115" y="374" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">drop</text>
  <text x="162" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커밋 삭제</text>

  <rect x="280" y="358" width="70" height="22" rx="4" fill="#1a100a" stroke="#e0aa55" stroke-width="1"/>
  <text x="315" y="374" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0aa55">fixup</text>
  <text x="362" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">합치기(메시지 버림)</text>

  <rect x="500" y="358" width="70" height="22" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="535" y="374" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">edit</text>
  <text x="582" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커밋 직접 수정</text>
</svg>
