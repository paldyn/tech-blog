<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">두 가지 시나리오, 두 가지 처방</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">아직 안 푸쉬했나, 이미 push했나로 갈린다</text>

  <!-- local case -->
  <rect x="60" y="105" width="370" height="170" rx="10" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="135" font-size="16" font-weight="600" fill="#55c555">아직 push 안 함</text>
  <text x="80" y="163" font-size="13" fill="#ffffff">새 브랜치를 만들고</text>
  <text x="80" y="185" font-size="13" fill="#ffffff">원래 브랜치를 되감는다</text>
  <text x="80" y="223" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">git switch -c feature</text>
  <text x="80" y="245" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">git switch main</text>
  <text x="80" y="267" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">git reset --hard origin/main</text>

  <!-- pushed case -->
  <rect x="450" y="105" width="370" height="170" rx="10" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="135" font-size="16" font-weight="600" fill="#e05555">이미 push 함</text>
  <text x="470" y="163" font-size="13" fill="#ffffff">cherry-pick으로 복사 후</text>
  <text x="470" y="185" font-size="13" fill="#ffffff">main에는 revert를 남긴다</text>
  <text x="470" y="223" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">git switch feature</text>
  <text x="470" y="245" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">git cherry-pick &lt;sha&gt;</text>
  <text x="470" y="267" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">git switch main; git revert &lt;sha&gt;</text>

  <text x="60" y="305" font-size="13" fill="#888">push된 main 히스토리는 reset 대신 revert로 처리해 협업자를 보호한다</text>
</svg>
