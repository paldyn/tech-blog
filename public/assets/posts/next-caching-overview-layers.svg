<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Next.js 4계층 캐싱 아키텍처</text>

  <!-- Layer 1: Request Memoization -->
  <rect x="60" y="72" width="760" height="80" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="100"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">1. Request Memoization</text>
  <text x="200" y="122"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">React 확장  |  서버 인메모리  |  단일 렌더 패스</text>
  <text x="660" y="100"
        text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">fetch() / React.cache()</text>
  <text x="660" y="122"
        text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">렌더 완료 → 자동 해제</text>

  <!-- Arrow 1->2 -->
  <line x1="440" y1="152" x2="440" y2="172" stroke="#3a4a6e" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Layer 2: Data Cache -->
  <rect x="60" y="176" width="760" height="80" rx="8" fill="#160d20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="204"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">2. Data Cache</text>
  <text x="200" y="226"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Next.js 확장  |  서버 파일시스템  |  영속적</text>
  <text x="660" y="204"
        text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">fetch cache 옵션  |  revalidate  |  tags</text>
  <text x="660" y="226"
        text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">revalidateTag / revalidatePath → 무효화</text>

  <!-- Arrow 2->3 -->
  <line x1="440" y1="256" x2="440" y2="276" stroke="#3a4a6e" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Layer 3: Full Route Cache -->
  <rect x="60" y="280" width="760" height="80" rx="8" fill="#1a1000" stroke="#e09050" stroke-width="1.5"/>
  <text x="200" y="308"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e09050">3. Full Route Cache</text>
  <text x="200" y="330"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">빌드 타임  |  서버 파일시스템  |  HTML + RSC Payload</text>
  <text x="660" y="308"
        text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e09050">정적 라우트 사전 렌더링</text>
  <text x="660" y="330"
        text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">동적 함수 사용 시 비활성화</text>

  <!-- Arrow 3->4 -->
  <line x1="440" y1="360" x2="440" y2="380" stroke="#3a4a6e" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Layer 4: Router Cache -->
  <rect x="60" y="384" width="760" height="80" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="412"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">4. Router Cache</text>
  <text x="200" y="434"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클라이언트 메모리  |  브라우저 세션  |  RSC Payload</text>
  <text x="660" y="412"
        text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Link hover prefetch  |  뒤로가기 즉시 렌더</text>
  <text x="660" y="434"
        text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">router.refresh() / revalidate → 무효화</text>

  <!-- Bottom note -->
  <text x="440" y="500"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">요청은 위에서 아래로 흐릅니다 — 상위 계층 캐시 히트 시 하위 계층에 접근하지 않음</text>
  <text x="440" y="520"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">각 계층의 스코프와 수명이 다르므로 목적에 맞는 계층을 의도적으로 제어해야 합니다</text>
</svg>
