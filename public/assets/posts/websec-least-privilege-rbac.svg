<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrlp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RBAC (역할 기반 접근 제어)</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">사용자 → 역할 → 권한 매핑</text>

  <!-- Users -->
  <rect x="60" y="110" width="140" height="48" rx="8" fill="#1a2035" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Alice (개발자)</text>

  <rect x="60" y="178" width="140" height="48" rx="8" fill="#1a2035" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Bob (운영자)</text>

  <rect x="60" y="246" width="140" height="48" rx="8" fill="#1a2035" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Carol (분석가)</text>

  <rect x="60" y="314" width="140" height="48" rx="8" fill="#1a2035" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Dave (지원)</text>

  <!-- Arrows user -> role -->
  <line x1="200" y1="134" x2="285" y2="152" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrlp)"/>
  <line x1="200" y1="202" x2="285" y2="224" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrlp)"/>
  <line x1="200" y1="270" x2="285" y2="295" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrlp)"/>
  <line x1="200" y1="338" x2="285" y2="367" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrlp)"/>

  <!-- Roles -->
  <rect x="285" y="130" width="150" height="48" rx="8" fill="#2a1a0d" stroke="#e0a055" stroke-width="1.5"/>
  <text x="360" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0a055" text-anchor="middle">role:developer</text>

  <rect x="285" y="200" width="150" height="48" rx="8" fill="#2a1a0d" stroke="#e0a055" stroke-width="1.5"/>
  <text x="360" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0a055" text-anchor="middle">role:operator</text>

  <rect x="285" y="270" width="150" height="48" rx="8" fill="#2a1a0d" stroke="#e0a055" stroke-width="1.5"/>
  <text x="360" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0a055" text-anchor="middle">role:analyst</text>

  <rect x="285" y="340" width="150" height="48" rx="8" fill="#2a1a0d" stroke="#e0a055" stroke-width="1.5"/>
  <text x="360" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0a055" text-anchor="middle">role:support</text>

  <!-- Arrows role -> permissions -->
  <line x1="435" y1="154" x2="530" y2="154" stroke="#e0a055" stroke-width="1.5" marker-end="url(#arrlp)"/>
  <line x1="435" y1="224" x2="530" y2="260" stroke="#e0a055" stroke-width="1.5" marker-end="url(#arrlp)"/>
  <line x1="435" y1="294" x2="530" y2="330" stroke="#e0a055" stroke-width="1.5" marker-end="url(#arrlp)"/>
  <line x1="435" y1="364" x2="530" y2="398" stroke="#e0a055" stroke-width="1.5" marker-end="url(#arrlp)"/>

  <!-- Permissions -->
  <rect x="530" y="120" width="290" height="70" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">코드 읽기/쓰기, API 테스트</text>
  <text x="675" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스테이징 DB 접근, 로그 읽기</text>
  <text x="675" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">✗ 프로덕션 DB 직접 접근 불가</text>

  <rect x="530" y="235" width="290" height="60" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">서버 재시작, 설정 변경</text>
  <text x="675" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프로덕션 로그 읽기</text>

  <rect x="530" y="305" width="290" height="60" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">데이터 읽기 전용</text>
  <text x="675" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대시보드, 보고서 접근</text>

  <rect x="530" y="375" width="290" height="50" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">티켓 시스템만 접근</text>
  <text x="675" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">내부 인프라 접근 없음</text>

  <!-- Bottom -->
  <rect x="60" y="440" width="760" height="14" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">권한은 역할에 부여 — 개인이 아닌 역할을 관리하면 확장성과 감사 편의성이 높아진다</text>
</svg>
