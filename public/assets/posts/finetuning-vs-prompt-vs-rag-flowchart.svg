<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">전략 선택 플로우차트</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">어떤 방법을 선택할지 단계별 판단</text>

  <!-- Start -->
  <rect x="340" y="90" width="200" height="44" rx="22" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">LLM 최적화 필요</text>

  <!-- Arrow down -->
  <line x1="440" y1="134" x2="440" y2="154" stroke="#444" stroke-width="2"/>
  <polygon points="435,150 440,160 445,150" fill="#444"/>

  <!-- Q1 -->
  <rect x="290" y="160" width="300" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="440" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Q1. 기본 프롬프트만으로 충분한가?</text>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">퓨샷 예시, 명시적 지시로 해결되나?</text>

  <!-- Yes arrow right -->
  <line x1="590" y1="182" x2="650" y2="182" stroke="#55c555" stroke-width="2"/>
  <polygon points="646,177 656,182 646,187" fill="#55c555"/>
  <text x="620" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Yes</text>

  <rect x="656" y="162" width="164" height="44" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="738" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">프롬프트 엔지니어링</text>
  <text x="738" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가장 빠르고 저렴</text>

  <!-- No arrow down -->
  <line x1="440" y1="204" x2="440" y2="224" stroke="#e05555" stroke-width="2"/>
  <polygon points="435,220 440,230 445,220" fill="#e05555"/>
  <text x="460" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">No</text>

  <!-- Q2 -->
  <rect x="290" y="230" width="300" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="440" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Q2. 외부 지식이 부족해서 실패하는가?</text>
  <text x="440" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">최신 정보, 특정 문서 내용이 필요한가?</text>

  <!-- Yes arrow right -->
  <line x1="590" y1="252" x2="650" y2="252" stroke="#7777cc" stroke-width="2"/>
  <polygon points="646,247 656,252 646,257" fill="#7777cc"/>
  <text x="620" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Yes</text>

  <rect x="656" y="232" width="164" height="44" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="738" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">RAG 추가</text>
  <text x="738" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">벡터 검색 파이프라인</text>

  <!-- No arrow down -->
  <line x1="440" y1="274" x2="440" y2="294" stroke="#e05555" stroke-width="2"/>
  <polygon points="435,290 440,300 445,290" fill="#e05555"/>
  <text x="460" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">No</text>

  <!-- Q3 / Result -->
  <rect x="290" y="300" width="300" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Q3. 특정 스타일/형식/행동이 필요한가?</text>
  <text x="440" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">도메인 전문 행동 패턴 학습이 필요한가?</text>

  <!-- Yes arrow right -->
  <line x1="590" y1="322" x2="650" y2="322" stroke="#e8b84b" stroke-width="2"/>
  <polygon points="646,317 656,322 646,327" fill="#e8b84b"/>
  <text x="620" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8b84b">Yes</text>

  <rect x="656" y="302" width="164" height="44" rx="8" fill="#1a1500" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="738" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8b84b">파인튜닝</text>
  <text x="738" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">LoRA / QLoRA 권고</text>

  <!-- Left side: Back to start suggestion -->
  <rect x="60" y="302" width="200" height="44" rx="8" fill="#111" stroke="#333"/>
  <text x="160" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">No → 더 큰 모델로</text>
  <text x="160" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">업그레이드 고려</text>
  <line x1="290" y1="322" x2="264" y2="322" stroke="#333" stroke-width="1.5"/>
  <polygon points="268,317 258,322 268,327" fill="#333"/>
</svg>
