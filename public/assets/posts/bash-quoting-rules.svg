<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Bash 인용 부호 규칙</text>

  <!-- Double quote card -->
  <rect x="60" y="72" width="360" height="160" rx="10" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">" " 큰따옴표</text>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">변수·명령치환 확장 O, 단어 분리 X</text>
  <rect x="76" y="130" width="328" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">NAME</text>
  <text x="132" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">="John Doe"</text>
  <text x="92" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">echo <tspan fill="#ce9178">"Hello, $NAME"</tspan>  <tspan fill="#9aa4b8"># 확장됨</tspan></text>
  <text x="92" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">echo <tspan fill="#ce9178">"$(date)"</tspan>         <tspan fill="#9aa4b8"># 명령치환 O</tspan></text>
  <text x="92" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">cp "$FILE" /tmp/   <tspan fill="#9aa4b8"># 공백 안전</tspan></text>

  <!-- Single quote card -->
  <rect x="460" y="72" width="360" height="160" rx="10" fill="#071407" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">' ' 작은따옴표</text>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 확장 억제 — 완전한 리터럴</text>
  <rect x="476" y="130" width="328" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">echo <tspan fill="#ce9178">'Hello, $NAME'</tspan>  <tspan fill="#9aa4b8"># $NAME 그대로</tspan></text>
  <text x="492" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">echo <tspan fill="#ce9178">'$(date)'</tspan>         <tspan fill="#9aa4b8"># 명령치환 X</tspan></text>
  <text x="492" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">echo <tspan fill="#ce9178">'It'\''s OK'</tspan>     <tspan fill="#9aa4b8"># 내부 ' 처리</tspan></text>
  <text x="492" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 정규표현식, awk 패턴에 유용</text>

  <!-- Word splitting danger section -->
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">따옴표 없는 변수의 위험 — 단어 분리(Word Splitting)</text>

  <rect x="60" y="278" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">FILE</text>
  <text x="110" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">="my important file.txt"</text>

  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" font-weight="600">rm $FILE     </text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">             # rm my important file.txt → 3개 인자로 분리, "my" "important" "file.txt" 삭제 시도!</text>

  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">rm "$FILE"   </text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">             # rm "my important file.txt" → 1개 인자, 올바름</text>

  <!-- Bottom rule -->
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">원칙: 변수 확장은 항상 "$VAR" 형태로 큰따옴표로 감싸라</text>
</svg>
