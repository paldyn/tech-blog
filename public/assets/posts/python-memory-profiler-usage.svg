<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="240" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">세 단계로 쓰기</text>

  <defs>
    <marker id="mparr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="96" width="220" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">설치</text>
  <text xml:space="preserve" x="170" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" text-anchor="middle">pip install memory_profiler</text>

  <line x1="280" y1="130" x2="336" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mparr)"/>

  <rect x="340" y="96" width="220" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="450" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">데코레이터</text>
  <text xml:space="preserve" x="450" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">@profile</text>

  <line x1="560" y1="130" x2="616" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mparr)"/>

  <rect x="620" y="96" width="200" height="68" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="124" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">실행</text>
  <text xml:space="preserve" x="720" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" text-anchor="middle">python -m memory_profiler</text>

  <rect x="60" y="192" width="760" height="34" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="78" y="214" font-size="13" fill="#55c555">시간이 아니라 "어느 줄이 메모리를 잡아먹는가"를 본다</text>
</svg>
