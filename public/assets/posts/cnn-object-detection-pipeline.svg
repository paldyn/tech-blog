  <line x1="162" y1="316" x2="198" y2="316" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arrce9178)"/>

  <rect x="201" y="298" width="80" height="36" fill="#1a1208" rx="4" stroke="#ce9178"/>
  <text x="241" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">FC Head</text>
  <text x="241" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">클래스 분류</text>

  <line x1="281" y1="316" x2="317" y2="316" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr55c555)"/>

  <rect x="320" y="298" width="60" height="36" fill="#0d1a0d" rx="4" stroke="#55c555"/>
  <text x="350" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">BBox</text>
  <text x="350" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">+ Class</text>

  <text x="226" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">높은 정확도, 느린 속도</text>
  <text x="226" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">~5 FPS (GPU)</text>

