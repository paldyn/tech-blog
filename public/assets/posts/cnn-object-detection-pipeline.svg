      <rect x="72"  y="108" width="36" height="36" fill="#0d1a0d" stroke="#1e4a20" stroke-width="1"/>
      <rect x="108" y="108" width="36" height="36" fill="#0d1a0d" stroke="#1e4a20" stroke-width="1"/>
      <rect x="144" y="108" width="36" height="36" fill="#0d1a0d" stroke="#1e4a20" stroke-width="1"/>

      <rect x="0"   y="144" width="36" height="36" fill="#0d1a0d" stroke="#1e4a20" stroke-width="1"/>
      <rect x="36"  y="144" width="36" height="36" fill="#0d1a0d" stroke="#1e4a20" stroke-width="1"/>
      <rect x="72"  y="144" width="36" height="36" fill="#0d1a0d" stroke="#1e4a20" stroke-width="1"/>
      <rect x="108" y="144" width="36" height="36" fill="#0d1a0d" stroke="#1e4a20" stroke-width="1"/>
      <rect x="144" y="144" width="36" height="36" fill="#0d1a0d" stroke="#1e4a20" stroke-width="1"/>

      <!-- Object center -->
      <circle cx="90" cy="90" r="4" fill="#55c555"/>
      <text x="90" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555">중심 셀 담당</text>
    </g>
  </g>

  <text x="654" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 셀: B개 박스 예측 (x,y,w,h,conf) + C개 클래스 확률</text>
  <text x="654" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">출력 텐서: S×S×(B×5 + C)</text>

  <!-- Output boxes visual -->
  <rect x="474" y="318" width="340" height="72" fill="#081208" rx="4" stroke="#1e4a20"/>
  <text x="654" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">YOLOv8 성능</text>
  <text x="554" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">YOLOv8n: 37.3 mAP</text>
  <text x="554" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">160 FPS · 3.2M params</text>
  <text x="754" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">YOLOv8x: 53.9 mAP</text>
  <text x="754" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">14 FPS · 68.2M params</text>

  <text x="654" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실시간 처리, 엣지 배포에 최적</text>
  <text x="654" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">~160+ FPS (GPU)</text>
