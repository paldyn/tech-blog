      <rect x="36"  y="72"  width="36" height="36" fill="#1a3d2a" stroke="#55c555" stroke-width="2"/>
      <rect x="72"  y="72"  width="36" height="36" fill="#1a3d2a" stroke="#55c555" stroke-width="2"/>
      <rect x="108" y="72"  width="36" height="36" fill="#0d1a0d" stroke="#1e4a20" stroke-width="1"/>
