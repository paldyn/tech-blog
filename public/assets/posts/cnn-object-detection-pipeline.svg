  <text x="122" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Backbone (VGG/ResNet)</text>

  <line x1="172" y1="180" x2="208" y2="180" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr7ec8e3)"/>

  <rect x="211" y="162" width="80" height="36" fill="#1a2535" rx="4" stroke="#3a4560"/>
  <text x="251" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">RPN</text>
  <text x="251" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">앵커 제안</text>

  <line x1="291" y1="180" x2="327" y2="180" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr7ec8e3)"/>

