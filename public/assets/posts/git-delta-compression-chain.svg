<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Delta 압축: 체인 구조</text>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- FULL object (base) -->
  <rect x="60" y="90" width="200" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Base Object (FULL)</text>
  <text x="160" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전체 내용 zlib 압축</text>
  <text x="160" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Depth: 0</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="130" x2="330" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="295" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">delta</text>

  <!-- DELTA object 1 -->
  <rect x="330" y="90" width="200" height="80" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="430" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">OFS_DELTA 1</text>
  <text x="430" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Base 와 차이만 저장</text>
  <text x="430" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Depth: 1</text>

  <!-- Arrow 2 -->
  <line x1="530" y1="130" x2="600" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="565" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">delta</text>

  <!-- DELTA object 2 -->
  <rect x="600" y="90" width="220" height="80" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="710" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">OFS_DELTA 2</text>
  <text x="710" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이전 delta 와 차이만</text>
  <text x="710" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Depth: 2</text>

  <!-- Depth annotation row -->
  <text x="160" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">12,000 bytes</text>
  <text x="430" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">850 bytes</text>
  <text x="710" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">220 bytes</text>

  <!-- Config box -->
  <rect x="60" y="250" width="760" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 델타 체인 깊이 제어</text>
  <text xml:space="preserve" x="80" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git config pack.depth 50        </text>
  <text xml:space="preserve" x="80" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 델타 압축 윈도우 크기 (비교할 오브젝트 수)</text>
  <text xml:space="preserve" x="80" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git config pack.window 10</text>
  <text xml:space="preserve" x="80" y="351" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 깊은 최적화 실행</text>

  <!-- Stats comparison -->
  <rect x="60" y="380" width="360" height="90" rx="8" fill="#111111" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">델타 압축 전</text>
  <text x="240" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">1,000 loose objects: ~50 MB</text>
  <text x="240" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">각 버전 전체 zlib 압축</text>
  <text x="240" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888"> </text>

  <rect x="460" y="380" width="360" height="90" rx="8" fill="#111111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">델타 압축 후</text>
  <text x="640" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">1 pack file: ~3 MB</text>
  <text x="640" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">유사 오브젝트 차이만 저장</text>
  <text x="640" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888"> </text>
</svg>
