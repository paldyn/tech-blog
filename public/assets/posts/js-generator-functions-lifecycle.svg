<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">제너레이터 함수 실행 흐름</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Generator Function Lifecycle: Pause &amp; Resume</text>

  <!-- Generator code -->
  <rect x="60" y="90" width="360" height="280" fill="#0d0d1a" rx="10" stroke="#1a1a3a" stroke-width="1.5"/>
  <text x="240" y="114" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">제너레이터 함수 정의</text>

  <rect x="76" y="124" width="328" height="224" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function*</tspan> <tspan fill="#e8e8e8">counter</tspan>() {</text>
  <text x="92" y="162" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // [A] 시작</text>
  <text x="92" y="180" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">yield</tspan> <tspan fill="#b5cea8">1</tspan>; <tspan fill="#6a8aa0">// [B] 일시 정지</tspan></text>
  <text x="92" y="198" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">yield</tspan> <tspan fill="#b5cea8">2</tspan>; <tspan fill="#6a8aa0">// [C] 일시 정지</tspan></text>
  <text x="92" y="216" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">yield</tspan> <tspan fill="#b5cea8">3</tspan>; <tspan fill="#6a8aa0">// [D] 일시 정지</tspan></text>
  <text x="92" y="234" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // [E] 함수 종료</text>
  <text x="92" y="252" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="92" y="278" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> gen = counter();</text>
  <text x="92" y="296" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 아직 실행 안 됨!</text>
  <text x="92" y="314" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">gen.next(); <tspan fill="#6a8aa0">// {value:1, done:false}</tspan></text>
  <text x="92" y="332" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">gen.next(); <tspan fill="#6a8aa0">// {value:2, done:false}</tspan></text>

  <!-- State diagram -->
  <rect x="460" y="90" width="360" height="280" fill="#0d0d0d" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="640" y="114" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">제너레이터 상태 전이</text>

  <!-- State boxes -->
  <rect x="550" y="130" width="180" height="32" fill="#1a1a0a" rx="6" stroke="#3a3a1a" stroke-width="1"/>
  <text x="640" y="150" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Suspended (대기)</text>

  <line x1="640" y1="162" x2="640" y2="180" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="634,180 640,192 646,180" fill="#7ec8e3"/>
  <text x="650" y="174" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">.next()</text>

  <rect x="550" y="192" width="180" height="32" fill="#0d0d1a" rx="6" stroke="#1a1a3a" stroke-width="1.5"/>
  <text x="640" y="212" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Executing (실행 중)</text>

  <line x1="640" y1="224" x2="640" y2="242" stroke="#e8e8e8" stroke-width="1.5"/>
  <polygon points="634,242 640,254 646,242" fill="#e8e8e8"/>
  <text x="650" y="236" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">yield</text>

  <rect x="550" y="254" width="180" height="32" fill="#1a1a0a" rx="6" stroke="#3a3a1a" stroke-width="1"/>
  <text x="640" y="274" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Suspended (일시 정지)</text>

  <!-- Arrows back -->
  <path d="M730 274 Q780 274 780 212 Q780 150 730 150" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="732,144 730,150 726,156" fill="#55c555"/>
  <text x="785" y="214" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">.next()</text>

  <line x1="640" y1="286" x2="640" y2="304" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="634,304 640,316 646,304" fill="#e05555"/>
  <text x="650" y="298" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">return/끝</text>

  <rect x="560" y="316" width="160" height="32" fill="#1a0d0d" rx="6" stroke="#3a1a1a" stroke-width="1"/>
  <text x="640" y="336" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Completed (완료)</text>

  <!-- Iterator result -->
  <rect x="60" y="390" width="760" height="60" fill="#0d0d0d" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="410" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">next() 반환값 구조</text>
  <text x="160" y="434" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">{ value: 1, done: false }</text>
  <text x="440" y="434" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">→ 진행 중</text>
  <text x="660" y="434" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">{ value: undefined, done: true }</text>

  <!-- Footer -->
  <text x="440" y="474" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
