<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">로지스틱 회귀 구현 및 다중 분류</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">sklearn, PyTorch, Softmax 다중 분류 코드</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Left: sklearn -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">scikit-learn: 이진 및 다중 분류</text>
  <rect x="60" y="115" width="370" height="232" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="112" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sklearn.linear_model</text>
  <text x="264" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="312" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">LogisticRegression</text>
  <text x="76" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 이진 분류</text>
  <text x="76" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">clf = LogisticRegression(</text>
  <text x="76" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    C=</tspan><tspan fill="#b5cea8">1.0</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#9aa4b8">  # 1/λ (역 정규화 강도)</tspan></text>

  <text x="76" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    penalty=</tspan><tspan fill="#ce9178">'l2'</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#9aa4b8">  # L2 정규화</tspan></text>

  <text x="76" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    solver=</tspan><tspan fill="#ce9178">'lbfgs'</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#9aa4b8">  # 최적화 알고리즘</tspan></text>

  <text x="76" y="245" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    max_iter=</tspan><tspan fill="#b5cea8">1000</tspan></text>
  
  <text x="76" y="263" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="76" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">clf.fit(X_train, y_train)</text>
  <text x="76" y="299" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">proba = clf.predict_proba(X_test)</text>
  <text x="76" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># proba: [[P(0), P(1)], ...]</text>
  <text x="76" y="335" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pred = clf.predict(X_test)</text>

  <!-- Right: PyTorch with softmax -->
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">PyTorch: 소프트맥스 다중 분류</text>
  <rect x="460" y="115" width="360" height="232" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="524" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">torch.nn as nn</text>
  <text x="476" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 다중 분류: Softmax + CE</text>
  <text x="476" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Softmax: P(class=k) = e^zₖ / Σe^zⱼ</text>
  <text x="476" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">model = nn.Sequential(</text>
  <text x="476" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    nn.Linear(</tspan><tspan fill="#b5cea8">n_features, 64</tspan><tspan fill="#ffffff">),</tspan></text>

  <text x="476" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    nn.ReLU(),</text>
  <text x="476" y="245" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    nn.Linear(</tspan><tspan fill="#b5cea8">64, n_classes</tspan><tspan fill="#ffffff">),</tspan></text>

  <text x="476" y="263" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # CE에 Softmax 포함됨</text>
  <text x="476" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="476" y="299" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">loss_fn = nn.CrossEntropyLoss()</text>
  <text x="476" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 확률 얻기 (추론 시)</text>
  <text x="476" y="335" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">proba = nn.Softmax(dim=</tspan><tspan fill="#b5cea8">-1</tspan><tspan fill="#ffffff">)(logits)</tspan></text>

  <!-- Bottom metrics -->
  <rect x="60" y="364" width="760" height="76" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">분류 평가 지표</text>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">정확도(Accuracy): 전체 중 맞힌 비율  |  정밀도(Precision): TP/(TP+FP)  |  재현율(Recall): TP/(TP+FN)</text>
  <text x="80" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">F1 Score: 2·Precision·Recall/(P+R) → 불균형 클래스에서 정확도보다 유용</text>
  <text x="80" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">AUC-ROC: 분류 임계값 무관한 종합 성능  |  Log-Loss: 확률 예측의 정확도</text>

  <!-- Footer -->
</svg>
