<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8">&#xba85;&#xbaa9;&#xc801; &#xd0c0;&#xc785; &#x2014; Brand &#xd328;&#xd134;</text>
  <text x="440" y="62" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">&#xad6c;&#xc870;&#xc801;&#xc73c;&#xb85c; &#xac19;&#xc740; &#xd0c0;&#xc785;&#xc774;&#xb77c;&#xb3c4; &#xc758;&#xbbf8;&#xac00; &#xb2e4;&#xb97c; &#xb54c; &#xad6c;&#xbd84;</text>

  <!-- Problem: without branding -->
  <rect x="30" y="82" width="400" height="175" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="50" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">&#xbb38;&#xc81c; &#x2014; &#xad6c;&#xbd84;&#xb418;&#xc9c0; &#xc54a;&#xb294; number</text>
  <rect x="50" y="118" width="362" height="124" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="140" font-family="'Courier New',monospace" font-size="12" fill="#888">type UserId  = number;</text>
  <text x="66" y="158" font-family="'Courier New',monospace" font-size="12" fill="#888">type OrderId = number;</text>
  <text x="66" y="180" font-family="'Courier New',monospace" font-size="12" fill="#888">function getUser(id: UserId) { ... }</text>
  <text x="66" y="202" font-family="'Courier New',monospace" font-size="12" fill="#888">const orderId: OrderId = 42;</text>
  <text x="66" y="224" font-family="'Courier New',monospace" font-size="12" fill="#e05555">getUser(orderId);  // &#xc624;&#xb958; &#xc5c6;&#xc74c; &#x274c;</text>

  <!-- Solution: with branding -->
  <rect x="450" y="82" width="400" height="175" rx="8" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="470" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#22c55e">&#xd574;&#xacb0; &#x2014; Brand &#xd0c0;&#xc785;&#xc73c;&#xb85c; &#xad6c;&#xbd84;</text>
  <rect x="470" y="118" width="362" height="124" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="140" font-family="'Courier New',monospace" font-size="12" fill="#888">type UserId  = number &amp; { _brand: "UserId"  };</text>
  <text x="486" y="158" font-family="'Courier New',monospace" font-size="12" fill="#888">type OrderId = number &amp; { _brand: "OrderId" };</text>
  <text x="486" y="180" font-family="'Courier New',monospace" font-size="12" fill="#888">function getUser(id: UserId) { ... }</text>
  <text x="486" y="202" font-family="'Courier New',monospace" font-size="12" fill="#888">const orderId = 42 as OrderId;</text>
  <text x="486" y="224" font-family="'Courier New',monospace" font-size="12" fill="#22c55e">getUser(orderId);  // TS &#xc624;&#xb958; &#x2705;</text>

  <!-- Factory function pattern -->
  <rect x="30" y="270" width="820" height="100" rx="8" fill="#0d1117" stroke="#a855f7" stroke-width="1.5"/>
  <text x="50" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#a855f7">&#xd0c0;&#xc785; &#xc548;&#xc804; &#xd314;&#xd1a0;&#xb9ac; &#xd568;&#xc218;</text>
  <rect x="50" y="306" width="760" height="52" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="328" font-family="'Courier New',monospace" font-size="12" fill="#888">declare const __brand: unique symbol;</text>
  <text x="66" y="346" font-family="'Courier New',monospace" font-size="12" fill="#a855f7">type Brand&lt;T, B&gt; = T &amp; { [__brand]: B };</text>

  <!-- Use cases -->
  <rect x="30" y="382" width="820" height="80" rx="8" fill="#0f0f0f" stroke="#3a4a6e" stroke-width="1"/>
  <text x="50" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">&#xb300;&#xd45c;&#xc801; &#xc0ac;&#xc6a9; &#xc0ac;&#xb840;</text>
  <text x="50" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">UserId / OrderId &#xad6c;&#xbd84; &#x2022; &#xb2ac;&#xb7ec; / &#xc13c;&#xd2b8; &#xad6c;&#xbd84; &#x2022; &#xc5f0;&#xb3c4;&#xbd84; / &#xc77c;&#xbc18; &#xc22b;&#xc790; &#xad6c;&#xbd84; &#x2022; &#xac80;&#xc99d;&#xb41c; &#xbb38;&#xc790;&#xc5f4; / &#xbbf8;&#xac80;&#xc99d; &#xbb38;&#xc790;&#xc5f4;</text>
  <text x="50" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">&#xb7f0;&#xd0c0;&#xc784; &#xc624;&#xbc84;&#xd5e4;&#xb4dc; &#xc5c6;&#xc74c; &#x2014; &#xcef4;&#xd30c;&#xc77c; &#xd0c0;&#xc784;&#xc5d0;&#xb9cc; &#xc874;&#xc7ac;&#xd558;&#xb294; &#xac00;&#xc0c1; &#xd544;&#xb4dc;</text>
</svg>