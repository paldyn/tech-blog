<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">회귀 평가 지표 비교</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">MAE · MSE · RMSE · MAPE · R² — 각 지표는 오차를 다른 방식으로 요약한다</text>

  <!-- Cards: 5 metrics in a 2+3 or similar layout -->
  <!-- Row 1: MAE, MSE, RMSE -->
  <!-- MAE card -->
  <rect x="60" y="88" width="240" height="130" rx="8" fill="#111827" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="180" y="112" text-anchor="middle" fill="#7ec8e3" font-size="15" font-weight="700">MAE</text>
  <text x="180" y="130" text-anchor="middle" fill="#888" font-size="11">Mean Absolute Error</text>
  <text x="180" y="154" text-anchor="middle" fill="#e8e8e8" font-size="13">Σ|y - ŷ| / n</text>
  <line x1="76" y1="164" x2="284" y2="164" stroke="#1a3a5c" stroke-width="1"/>
  <text x="180" y="180" text-anchor="middle" fill="#ccc" font-size="11">이상치에 강건</text>
  <text x="180" y="196" text-anchor="middle" fill="#ccc" font-size="11">원래 단위와 동일 (해석 쉬움)</text>
  <text x="180" y="212" text-anchor="middle" fill="#55c555" font-size="10">권장: 이상치 많은 데이터</text>

  <!-- MSE card -->
  <rect x="320" y="88" width="240" height="130" rx="8" fill="#111827" stroke="#3a2905" stroke-width="1.5"/>
  <text x="440" y="112" text-anchor="middle" fill="#e0a020" font-size="15" font-weight="700">MSE</text>
  <text x="440" y="130" text-anchor="middle" fill="#888" font-size="11">Mean Squared Error</text>
  <text x="440" y="154" text-anchor="middle" fill="#e8e8e8" font-size="13">Σ(y - ŷ)² / n</text>
  <line x1="336" y1="164" x2="544" y2="164" stroke="#3a2905" stroke-width="1"/>
  <text x="440" y="180" text-anchor="middle" fill="#ccc" font-size="11">큰 오차를 크게 패널티</text>
  <text x="440" y="196" text-anchor="middle" fill="#ccc" font-size="11">경사 하강법 최적화 용이</text>
  <text x="440" y="212" text-anchor="middle" fill="#e05555" font-size="10">단점: 이상치에 민감, 단위 제곱</text>

  <!-- RMSE card -->
  <rect x="580" y="88" width="240" height="130" rx="8" fill="#111827" stroke="#0a2a15" stroke-width="1.5"/>
  <text x="700" y="112" text-anchor="middle" fill="#55c555" font-size="15" font-weight="700">RMSE</text>
  <text x="700" y="130" text-anchor="middle" fill="#888" font-size="11">Root Mean Squared Error</text>
  <text x="700" y="154" text-anchor="middle" fill="#e8e8e8" font-size="13">√(Σ(y - ŷ)² / n)</text>
  <line x1="596" y1="164" x2="804" y2="164" stroke="#0a2a15" stroke-width="1"/>
  <text x="700" y="180" text-anchor="middle" fill="#ccc" font-size="11">원래 단위로 복원 (MSE + 직관)</text>
  <text x="700" y="196" text-anchor="middle" fill="#ccc" font-size="11">큰 오차에 더 민감</text>
  <text x="700" y="212" text-anchor="middle" fill="#55c555" font-size="10">가장 많이 사용되는 지표</text>

  <!-- Row 2: MAPE, R² -->
  <!-- MAPE card -->
  <rect x="60" y="240" width="380" height="130" rx="8" fill="#111827" stroke="#1a0a2a" stroke-width="1.5"/>
  <text x="250" y="264" text-anchor="middle" fill="#7777cc" font-size="15" font-weight="700">MAPE</text>
  <text x="250" y="282" text-anchor="middle" fill="#888" font-size="11">Mean Absolute Percentage Error</text>
  <text x="250" y="306" text-anchor="middle" fill="#e8e8e8" font-size="13">100 × Σ|y - ŷ| / |y| / n  (%)</text>
  <line x1="76" y1="316" x2="424" y2="316" stroke="#1a0a2a" stroke-width="1"/>
  <text x="250" y="334" text-anchor="middle" fill="#ccc" font-size="11">비율(%)로 표현 — 단위 무관 비교 가능</text>
  <text x="250" y="352" text-anchor="middle" fill="#e05555" font-size="10">단점: y≈0 이면 발산, 음수 예측에 부적합</text>

  <!-- R² card -->
  <rect x="460" y="240" width="360" height="130" rx="8" fill="#111827" stroke="#2a1505" stroke-width="1.5"/>
  <text x="640" y="264" text-anchor="middle" fill="#e07030" font-size="15" font-weight="700">R² (결정 계수)</text>
  <text x="640" y="282" text-anchor="middle" fill="#888" font-size="11">Coefficient of Determination</text>
  <text x="640" y="306" text-anchor="middle" fill="#e8e8e8" font-size="13">1 - SS_res / SS_tot</text>
  <line x1="476" y1="316" x2="804" y2="316" stroke="#2a1505" stroke-width="1"/>
  <text x="640" y="334" text-anchor="middle" fill="#ccc" font-size="11">0~1: 모델이 분산을 설명하는 비율</text>
  <text x="640" y="352" text-anchor="middle" fill="#888" font-size="10">R²=0.80 → 분산의 80% 설명 가능</text>

  <!-- Summary -->
  <rect x="60" y="388" width="760" height="28" rx="6" fill="#111827" stroke="#333" stroke-width="1"/>
  <text x="440" y="406" text-anchor="middle" fill="#888" font-size="11">비교 기준: MAE(이상치 강건) · RMSE(큰 오차 패널티) · MAPE(단위 독립) · R²(설명력 비율)</text>

  <!-- Footer -->
  <text x="440" y="428" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
