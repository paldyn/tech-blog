<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Covering Index — INCLUDE 컬럼 구조</text>

  <!-- Without INCLUDE (left column) -->
  <text x="200" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">일반 인덱스</text>
  <text x="200" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인덱스 → 힙 왕복 발생</text>

  <!-- Index node -->
  <rect x="120" y="130" width="160" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">INDEX LEAF</text>
  <text x="200" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">email (키 컬럼)</text>

  <!-- Arrow down to heap -->
  <line x1="200" y1="180" x2="200" y2="230" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="200,238 194,224 206,224" fill="#e05555"/>
  <text x="215" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Heap Fetch</text>

  <!-- Heap block -->
  <rect x="100" y="240" width="200" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">HEAP PAGE</text>
  <text x="200" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">email, name, created_at</text>
  <text x="200" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">+ 기타 모든 컬럼</text>

  <!-- Cost label -->
  <rect x="100" y="328" width="200" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">랜덤 I/O 발생 (느림)</text>
  <text x="200" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">힙 페이지 물리 접근 필요</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="480" stroke="#333" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- With INCLUDE (right column) -->
  <text x="660" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">INCLUDE 인덱스</text>
  <text x="660" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Index-Only Scan 가능</text>

  <!-- Index node with INCLUDE -->
  <rect x="540" y="130" width="240" height="80" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">INDEX LEAF (INCLUDE)</text>
  <text x="660" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">키: email</text>
  <text x="660" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">포함: name, created_at</text>
  <text x="660" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(정렬 키에 영향 없음)</text>

  <!-- Green check, no heap fetch -->
  <rect x="560" y="240" width="200" height="50" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Visibility Map 확인</text>
  <text x="660" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">힙 접근 없이 데이터 반환</text>

  <!-- Arrow from index to result -->
  <line x1="660" y1="210" x2="660" y2="238" stroke="#55c555" stroke-width="2"/>
  <polygon points="660,242 654,230 666,230" fill="#55c555"/>

  <!-- Cost label right -->
  <rect x="560" y="308" width="200" height="36" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Index-Only Scan (빠름)</text>
  <text x="660" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">힙 접근 제로 (Visibility Map OK 시)</text>

  <!-- Bottom: SQL example -->
  <rect x="60" y="400" width="760" height="90" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- INCLUDE 인덱스 생성</text>
  <text x="76" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CREATE</text>
  <text x="118" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> INDEX</text>
  <text x="160" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> idx_users_email_cov </text>
  <text x="325" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ON</text>
  <text x="343" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> users (email)</text>
  <text x="76" y="456" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">INCLUDE</text>
  <text x="130" y="456" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (name, created_at);</text>
  <text x="76" y="474" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 위 인덱스가 있으면 아래 쿼리는 Index-Only Scan 사용 가능</text>
</svg>
