<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <defs>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">default 메서드 &#8212; 인터페이스 진화와 하위 호환성</text>

  <!-- Center divider -->
  <line x1="440" y1="64" x2="440" y2="432" stroke="#333333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ====== LEFT PANEL ====== -->
  <text x="240" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">Java 8 이전 (문제)</text>

  <!-- Interface box: x=90, y=106, w=300, h=76 -->
  <rect x="90" y="106" width="300" height="76" fill="#1e1020" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">&#171;interface&#187; Collection</text>
  <text x="240" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">add() / remove() / size()</text>
  <text x="240" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">+ stream() &#8592; 새 추상 메서드 추가</text>

  <!-- 3 arrows down to impl classes -->
  <line x1="240" y1="182" x2="135" y2="240" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrR)"/>
  <line x1="240" y1="182" x2="240" y2="240" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrR)"/>
  <line x1="240" y1="182" x2="345" y2="240" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- 3 broken impl boxes: y=240, h=56 -->
  <rect x="90" y="240" width="90" height="56" fill="#200e0e" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="135" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">ArrayList</text>
  <text x="135" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">&#10008; 미구현</text>

  <rect x="195" y="240" width="90" height="56" fill="#200e0e" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">HashSet</text>
  <text x="240" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">&#10008; 미구현</text>

  <rect x="300" y="240" width="90" height="56" fill="#200e0e" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="345" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Custom...</text>
  <text x="345" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">&#10008; 미구현</text>

  <!-- Result box: x=90, y=318, w=300, h=76 -->
  <rect x="90" y="318" width="300" height="76" fill="#200e0e" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">&#10008; 컴파일 오류 전파</text>
  <text x="240" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">stream() 없는 모든 구현 클래스</text>
  <text x="240" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">전면 수정 불가피 — 하위 호환성 파괴</text>

  <!-- ====== RIGHT PANEL ====== -->
  <text x="640" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">Java 8+ (default 메서드)</text>

  <!-- Interface box: x=490, y=106, w=300, h=76 -->
  <rect x="490" y="106" width="300" height="76" fill="#0e200e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">&#171;interface&#187; Collection</text>
  <text x="640" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">add() / remove() / size()</text>
  <text x="640" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">+ default stream() { ... }</text>

  <!-- 3 arrows down to impl classes -->
  <line x1="640" y1="182" x2="535" y2="240" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="640" y1="182" x2="640" y2="240" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="640" y1="182" x2="745" y2="240" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- 3 OK impl boxes: y=240, h=56 -->
  <rect x="490" y="240" width="90" height="56" fill="#0e200e" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="535" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">ArrayList</text>
  <text x="535" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#10004; 기본 구현 상속</text>

  <rect x="595" y="240" width="90" height="56" fill="#0e200e" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">HashSet</text>
  <text x="640" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#10004; 기본 구현 상속</text>

  <rect x="700" y="240" width="90" height="56" fill="#0e200e" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="745" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Custom...</text>
  <text x="745" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#10004; 기본 구현 상속</text>

  <!-- Result box: x=490, y=318, w=300, h=76 -->
  <rect x="490" y="318" width="300" height="76" fill="#0e200e" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">&#10004; 하위 호환성 유지</text>
  <text x="640" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">기존 구현 클래스 변경 없이</text>
  <text x="640" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">default 구현이 자동 상속됨</text>
</svg>
