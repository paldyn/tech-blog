<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">테스트 피라미드</text>

  <!-- Pyramid E2E (top) -->
  <polygon points="440,80 330,180 550,180" fill="#1a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">E2E</text>
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">느림 · 비쌈</text>

  <!-- Pyramid Integration (middle) -->
  <polygon points="330,184 220,284 550,180 550,284" fill="#141a0a" stroke="#b5cea8" stroke-width="2"/>
  <!-- Fix: correct trapezoid for integration -->
  <polygon points="330,184 220,284 660,284 550,184" fill="#141a0a" stroke="#b5cea8" stroke-width="2"/>
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#b5cea8">통합 테스트</text>
  <text x="440" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">중간 속도 · 중간 비용</text>

  <!-- Pyramid Unit (bottom) -->
  <polygon points="220,288 110,388 770,388 660,288" fill="#0d2218" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">단위 테스트</text>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">빠름 · 저렴 · 격리</text>

  <!-- Labels on right -->
  <text x="600" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">소수 (5~10%)</text>
  <text x="600" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">중간 (20~30%)</text>
  <text x="600" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">다수 (60~70%)</text>

  <!-- Anti-patterns below -->
  <text x="60" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">안티패턴 비교</text>

  <rect x="60" y="432" width="220" height="52" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">역 피라미드</text>
  <text x="170" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">E2E 위주 → 느리고 불안정</text>

  <rect x="330" y="432" width="220" height="52" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">모래시계</text>
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">통합 테스트 공백 → 중간 계층 취약</text>

  <rect x="600" y="432" width="220" height="52" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">트로피(현대적 변형)</text>
  <text x="710" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">통합 테스트 강화 → 높은 신뢰도</text>
</svg>
