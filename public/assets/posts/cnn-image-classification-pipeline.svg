<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">이미지 분류 전체 파이프라인</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">데이터 준비 → 학습 → 추론</text>

  <!-- Stage 1: Data -->
  <rect x="36" y="95" width="150" height="240" fill="#0d1520" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="111" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① 데이터</text>
  <text x="54" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">원본 이미지</text>
  <text x="54" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Resize(256)</text>
  <text x="54" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">RandomCrop(224)</text>
  <text x="54" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HorizontalFlip</text>
  <text x="54" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ColorJitter</text>
  <text x="54" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Normalize</text>
  <text x="54" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ (B,3,224,224)</text>
  <text x="54" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ labels (B,)</text>
  <text x="54" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">DataLoader + GPU</text>
  <text x="54" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">prefetch로 병렬화</text>

  <!-- Arrow 1 -->
  <polygon points="198,215 224,205 224,225" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <line x1="186" y1="215" x2="224" y2="215" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Stage 2: Model -->
  <rect x="227" y="95" width="160" height="240" fill="#0d1117" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="307" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">② 모델</text>
  <text x="245" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Backbone (ResNet 등)</text>
  <text x="245" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">특징 추출</text>
  <text x="245" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">GAP</text>
  <text x="245" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(B,2048,7,7)→(B,2048)</text>
  <text x="245" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">FC Head</text>
  <text x="245" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(B,2048)→(B,1000)</text>
  <text x="245" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ logits (B,1000)</text>
  <text x="245" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Softmax 확률</text>
  <text x="245" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">사전학습 활용 가능</text>

  <!-- Arrow 2 -->
  <polygon points="399,215 425,205 425,225" fill="#7777cc" stroke="#3a3a8a" stroke-width="1"/>
  <line x1="387" y1="215" x2="425" y2="215" stroke="#7777cc" stroke-width="2"/>

  <!-- Stage 3: Loss -->
  <rect x="428" y="95" width="150" height="240" fill="#0d1117" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="503" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">③ 손실</text>
  <text x="446" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">CrossEntropyLoss</text>
  <text x="446" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">= NLLLoss + LogSoftmax</text>
  <text x="446" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Label Smoothing</text>
  <text x="446" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ε=0.1 → 과적합 방지</text>
  <text x="446" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Mixup / CutMix</text>
  <text x="446" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이미지/레이블 혼합</text>
  <text x="446" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ scalar loss</text>
  <text x="446" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">loss.backward()</text>
  <text x="446" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">optimizer.step()</text>

  <!-- Arrow 3 -->
  <polygon points="590,215 616,205 616,225" fill="#ce9178" stroke="#7a5530" stroke-width="1"/>
  <line x1="578" y1="215" x2="616" y2="215" stroke="#ce9178" stroke-width="2"/>

  <!-- Stage 4: Optimizer -->
  <rect x="619" y="95" width="225" height="240" fill="#0d1117" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="731" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">④ 최적화 & 스케줄</text>
  <text x="637" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Optimizer: AdamW / SGD+momentum</text>
  <text x="637" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Weight Decay 0.05 (AdamW)</text>
  <text x="637" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">LR Schedule: Cosine Annealing</text>
  <text x="637" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Warmup 5에폭 → 300에폭</text>
  <text x="637" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">EMA (Exponential Moving Avg)</text>
  <text x="637" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">추론 시 안정적 가중치</text>
  <text x="637" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Gradient Clipping max_norm=1.0</text>
  <text x="637" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Mixed Precision (AMP)</text>
  <text x="637" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">fp16 → 2× 빠른 학습</text>

  <!-- Bottom metrics -->
  <rect x="36" y="352" width="808" height="52" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="440" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">평가 지표</text>
  <text x="130" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Top-1 Accuracy</text>
  <text x="130" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가장 높은 확률 클래스</text>
  <text x="340" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Top-5 Accuracy</text>
  <text x="340" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">상위 5개 안에 정답</text>
  <text x="560" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">Confusion Matrix</text>
  <text x="560" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클래스별 오분류 분석</text>
  <text x="760" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Calibration (ECE)</text>
  <text x="760" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">확률 신뢰도 보정</text>
</svg>
