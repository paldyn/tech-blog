<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">머지 정책 결정 가이드</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">팀 상황에 따른 권장 정책</text>

  <!-- Decision Q1 -->
  <rect x="290" y="90" width="300" height="50" rx="8" fill="#0d1220" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">선형 히스토리가 중요한가?</text>
  <text x="440" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">git log --graph 이쁘게 유지하고 싶은지</text>

  <!-- No branch -->
  <line x1="290" y1="115" x2="200" y2="200" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-w)"/>
  <text x="220" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">아니오</text>

  <rect x="60" y="200" width="280" height="50" rx="8" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Merge Commit 정책</text>
  <text x="200" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모든 브랜치 히스토리 보존 우선</text>

  <!-- Yes branch -->
  <line x1="590" y1="115" x2="680" y2="200" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-w)"/>
  <text x="660" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">예</text>

  <!-- Decision Q2 -->
  <rect x="540" y="200" width="300" height="50" rx="8" fill="#0d1220" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="690" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">커밋 메시지 품질을 관리하나?</text>
  <text x="690" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">개별 커밋 단위 의미가 있는지</text>

  <!-- No branch of Q2 -->
  <line x1="690" y1="250" x2="690" y2="300" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-w)"/>
  <text x="716" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">아니오</text>

  <rect x="540" y="306" width="300" height="50" rx="8" fill="#1a150a" stroke="#e0955e" stroke-width="1.5"/>
  <text x="690" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0955e">Squash and Merge 정책</text>
  <text x="690" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PR 단위로 1커밋, 깔끔한 main</text>

  <!-- Yes branch of Q2 -->
  <line x1="540" y1="225" x2="440" y2="306" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="460" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">예</text>

  <rect x="290" y="306" width="240" height="50" rx="8" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="410" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9988dd">Rebase and Merge 정책</text>
  <text x="410" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">개별 커밋 보존 + 선형 히스토리</text>

  <!-- GitHub settings note -->
  <rect x="60" y="390" width="760" height="34" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="407" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GitHub: Settings → General → Pull Requests 섹션에서 허용할 머지 방식 체크박스 제어 가능</text>
  <text x="440" y="419" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">한 가지만 남기면 팀 실수 방지 — Squash 한 가지만 허용하는 팀이 많다</text>
</svg>
