<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">공급망 공격: SRI 없을 때 vs 있을 때</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">CDN 파일 변조 시나리오 비교</text>

  <!-- Left: Without SRI -->
  <rect x="60" y="95" width="370" height="36" rx="6" fill="#2d0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">SRI 없음 — 공격 성공</text>

  <rect x="60" y="145" width="165" height="60" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1"/>
  <text x="143" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">공격자</text>
  <text x="143" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CDN 계정 탈취</text>

  <rect x="265" y="145" width="165" height="60" rx="6" fill="#1a0d0d" stroke="#a83a3a" stroke-width="1"/>
  <text x="348" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">CDN 파일 변조</text>
  <text x="348" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">악성 코드 삽입</text>

  <rect x="60" y="228" width="370" height="55" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1"/>
  <text x="245" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">브라우저: 변조된 파일 그대로 실행</text>
  <text x="245" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">→ 쿠키 탈취 · 키로거 · 크립토마이너</text>

  <rect x="60" y="300" width="370" height="50" rx="6" fill="#0f1010" stroke="#555" stroke-width="1"/>
  <text x="245" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실제 사례: 2016 jQuery CDN 사건</text>
  <text x="245" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">수십만 사이트에 악성 스크립트 전파</text>

  <!-- Right: With SRI -->
  <rect x="460" y="95" width="360" height="36" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">SRI 있음 — 공격 차단</text>

  <rect x="460" y="145" width="360" height="60" rx="6" fill="#1a0d0d" stroke="#a83a3a" stroke-width="1"/>
  <text x="640" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">CDN 파일 변조 동일하게 발생</text>
  <text x="640" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(공격자는 같은 시도)</text>

  <rect x="460" y="228" width="360" height="55" rx="6" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1"/>
  <text x="640" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">브라우저: 해시 불일치 감지</text>
  <text x="640" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">→ 리소스 로드 거부 · 콘솔 오류 기록</text>

  <rect x="460" y="300" width="360" height="50" rx="6" fill="#0d1a0d" stroke="#2a7a2a" stroke-width="1"/>
  <text x="640" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">악성 코드 실행되지 않음</text>
  <text x="640" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사용자 보호 완전</text>

  <!-- Bottom note -->
  <rect x="60" y="374" width="760" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8"># 해시 생성 명령어</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">echo </text>
  <text x="110" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">-n $(</text>
  <text x="148" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">curl </text>
  <text x="181" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">-s https://cdn.example.com/lib.js | </text>
  <text x="413" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">openssl </text>
  <text x="460" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">dgst -sha384 -binary | </text>
  <text x="623" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">openssl </text>
  <text x="670" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">base64 -A)</text>
</svg>
