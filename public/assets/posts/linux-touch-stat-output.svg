<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">stat 명령 출력 해설</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">파일의 모든 메타데이터를 한 번에 확인</text>

  <!-- stat output -->
  <rect x="60" y="88" width="480" height="284" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ stat report.txt</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  File: <tspan fill="#ce9178">report.txt</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  Size: <tspan fill="#b5cea8">4096</tspan><tspan fill="#888">  Blocks: 8   IO Block: 4096</tspan></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Device: <tspan fill="#b5cea8">fd00h/64768d</tspan><tspan fill="#888">  Inode: </tspan><tspan fill="#b5cea8">1234567</tspan><tspan fill="#888">  Links: 1</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Access: <tspan fill="#55c555">(0644/-rw-r--r--)</tspan><tspan fill="#888">  Uid:</tspan><tspan fill="#b5cea8"> (1000/alice)</tspan></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">                         Gid:<tspan fill="#b5cea8"> (1000/alice)</tspan></text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Access: <tspan fill="#e8c55a">2026-05-09 10:30:00.000</tspan><tspan fill="#888"> +0900</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Modify: <tspan fill="#55c555">2026-05-09 09:00:00.000</tspan><tspan fill="#888"> +0900</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Change: <tspan fill="#e05555">2026-05-09 09:00:00.000</tspan><tspan fill="#888"> +0900</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> Birth: <tspan fill="#888">-</tspan></text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># Birth: 파일시스템 지원 시 생성 시각 표시</text>

  <!-- Annotation labels -->
  <rect x="570" y="88" width="270" height="284" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="586" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">항목 설명</text>
  <text x="586" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">File: 파일 이름</text>
  <text x="586" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Size: 바이트 단위 크기</text>
  <text x="586" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Blocks: 512B 블록 수</text>
  <text x="586" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Inode: inode 번호</text>
  <text x="586" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Links: 하드 링크 수</text>
  <text x="586" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">0644: 8진수 권한</text>
  <text x="586" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55a">Access: atime</text>
  <text x="586" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Modify: mtime</text>
  <text x="586" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Change: ctime</text>
  <text x="586" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Birth: 생성 시각(ext4+)</text>
  <text x="586" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">stat -c '%Y' f</text>
  <text x="586" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ mtime 에포크 숫자</text>
</svg>
