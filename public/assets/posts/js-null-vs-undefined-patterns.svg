<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">null / undefined 안전 처리 패턴</text>

  <!-- Null check patterns -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">검사 패턴 비교</text>
  <rect x="60" y="98" width="360" height="170" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 느슨한 검사 (null/undefined 둘 다)</text>
  <text x="80" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (value == </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">) { ... }</tspan></text>

  <text x="80" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 엄격한 검사</text>
  <text x="80" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (value === </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">) { ... }</tspan></text>
  <text x="80" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (value === </tspan><tspan fill="#7777cc">undefined</tspan><tspan fill="#ffffff">) { ... }</tspan></text>

  <text x="80" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// nullish 연산자 활용</text>
  <text x="80" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const</text><text x="120" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> v = value ?? </text><text x="218" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'default'</text><text x="282" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>

  <text x="80" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 옵셔널 체이닝</text>

  <!-- Anti-patterns -->
  <rect x="460" y="98" width="360" height="170" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="480" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ undefined 직접 할당 (지양)</text>
  <text x="480" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">obj.prop = </tspan><tspan fill="#7777cc">undefined</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="480" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✓ null로 명시적 비움</text>
  <text x="480" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">obj.prop = </text><text x="560" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">null</text><text x="592" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="480" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// JSON 직렬화 차이</text>
  <text x="480" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">JSON</text><text x="510" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">.stringify({a:</text><text x="616" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">null</text><text x="648" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
  <text x="480" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// '{"a":null}'</text>
  <text x="480" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">JSON</tspan><tspan fill="#ffffff">.stringify({a:</tspan><tspan fill="#7777cc">undefined</tspan><tspan fill="#ffffff">});</tspan></text>
  <text x="480" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// '{}' ← 키 제외!</text>

  <!-- typeof null bug explanation -->
  <text x="60" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">typeof null === "object" — 역사적 버그</text>
  <rect x="60" y="318" width="760" height="76" fill="#111418" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">초기 JavaScript(1995)에서 값 타입을 3비트 태그로 인코딩했습니다. 객체 태그는 000이었고, null은</text>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">NULL 포인터(0x00000000)였으므로 태그 비트가 000 → typeof가 "object"를 반환했습니다.</text>
  <text x="80" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">null을 검사할 때는 항상 === null을 사용하세요.</text>

  <!-- Footer -->
</svg>
