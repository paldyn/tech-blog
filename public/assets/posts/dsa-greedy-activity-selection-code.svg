<svg width="880" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">활동 선택 — Python 구현</text>

  <!-- Code block -->
  <text x="60" y="82" font-size="16" font-weight="600" fill="#e8e8e8">알고리즘 코드</text>
  <rect x="60" y="96" width="440" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def</text>
  <text x="114" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> activity_selection(activities):</text>
  <text x="80" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">  # Sort by finish time</text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  activities.sort(</text>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    key=</text>
  <text x="130" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lambda</text>
  <text x="187" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> x: x[</text>
  <text x="233" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="241" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">])</text>
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  selected = [activities[</text>
  <text x="258" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="266" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">]]</text>
  <text x="80" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  last = activities[</text>
  <text x="222" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="230" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">][</text>
  <text x="248" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="256" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">]</text>
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  for</text>
  <text x="111" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> start, finish </text>
  <text x="234" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">in</text>
  <text x="255" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> activities[</text>
  <text x="337" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="345" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">:]:</text>
  <text x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    if</text>
  <text x="111" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> start &gt;= last:</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      selected.append(</text>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        (start, finish))</text>
  <text x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      last = finish</text>
  <text x="80" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text>
  <text x="138" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> selected</text>

  <!-- Right: complexity + key points -->
  <text x="540" y="82" font-size="16" font-weight="600" fill="#e8e8e8">알고리즘 분석</text>

  <!-- Complexity -->
  <rect x="540" y="96" width="280" height="90" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="680" y="120" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">복잡도</text>
  <text x="560" y="146" font-size="13" fill="#e8e8e8">시간: O(N log N)</text>
  <text x="560" y="166" font-size="13" fill="#888">정렬 O(N log N) + 선택 O(N)</text>
  <text x="560" y="180" font-size="13" fill="#e8e8e8">공간: O(1) 추가</text>

  <!-- Greedy insight -->
  <rect x="540" y="205" width="280" height="100" rx="8" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="228" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">탐욕 직관</text>
  <text x="560" y="252" font-size="13" fill="#e8e8e8">가장 먼저 끝나는 활동</text>
  <text x="560" y="272" font-size="13" fill="#e8e8e8">을 선택하면 뒤에 남는</text>
  <text x="560" y="292" font-size="13" fill="#e8e8e8">시간이 최대화됨</text>
  <text x="560" y="300" font-size="12" fill="#888">→ 최적 부분 구조 성립</text>

  <!-- vs Interval Scheduling -->
  <rect x="540" y="322" width="280" height="90" rx="8" fill="#1a1420" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="345" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">구간 스케줄링과 차이</text>
  <text x="560" y="370" font-size="13" fill="#e8e8e8">동일한 알고리즘 구조</text>
  <text x="560" y="390" font-size="13" fill="#e8e8e8">활동에 이름/인덱스 부여</text>
  <text x="560" y="406" font-size="12" fill="#888">→ 초기값을 activities[0]으로</text>
</svg>
