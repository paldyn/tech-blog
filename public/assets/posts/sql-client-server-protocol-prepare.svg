<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Simple vs Prepared Statement</text>

  <!-- Simple -->
  <text x="210" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">Simple Statement</text>

  <rect x="60" y="94" width="300" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- SQL 인젝션 위험!</text>
  <text x="76" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">query = </tspan>
    <tspan fill="#ce9178">"SELECT * FROM users"</tspan>
  </text>
  <text x="76" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">       + </tspan>
    <tspan fill="#ce9178">" WHERE id = "</tspan>
  </text>
  <text x="76" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">       + user_input;</tspan>
  </text>
  <text x="76" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 매 실행마다 파싱+최적화</text>
  <text x="76" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">-- 인젝션: id = "1 OR 1=1"</text>

  <!-- Prepared -->
  <text x="670" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Prepared Statement</text>

  <rect x="520" y="94" width="300" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="536" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 1단계: 준비 (파싱+최적화 1회)</text>
  <text x="536" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">PREPARE</tspan>
    <tspan fill="#ffffff"> stmt</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> FROM</tspan>
  </text>
  <text x="536" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#ce9178">'SELECT * FROM users WHERE id = ?'</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="536" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 2단계: 실행 (바인딩만)</text>
  <text x="536" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">EXECUTE</tspan>
    <tspan fill="#ffffff"> stmt</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> USING</tspan>
    <tspan fill="#ffffff"> @user_id;</tspan>
  </text>
  <text x="536" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-- 값은 데이터로만 처리됨</text>

  <!-- Benefits -->
  <rect x="60" y="274" width="760" height="64" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Prepared Statement 장점</text>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL 인젝션 방어 · 반복 실행 시 파싱 비용 절감 · 플랜 캐시 재사용</text>
</svg>
