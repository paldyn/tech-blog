<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Simple vs Extended Query Protocol</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">Simple Query (문자열 전송) vs Prepared Statement (파싱 캐시)</text>

  <!-- Left: Simple Query -->
  <rect x="60" y="90" width="360" height="280" fill="#0f1520" rx="8" stroke="#1e3a5a" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">Simple Query</text>
  <text x="240" y="138" text-anchor="middle" font-size="12" fill="#888">매 실행마다 전체 SQL 전송</text>

  <!-- Simple step boxes -->
  <rect x="80" y="152" width="320" height="36" fill="#1a0f0f" rx="5" stroke="#3a1e1e"/>
  <text x="240" y="175" text-anchor="middle" font-size="12" fill="#e8e8e8">SQL 문자열 전송 (매번)</text>

  <line x1="240" y1="188" x2="240" y2="200" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="234,200 246,200 240,208" fill="#e05555"/>

  <rect x="80" y="208" width="320" height="36" fill="#1a0f0f" rx="5" stroke="#3a1e1e"/>
  <text x="240" y="231" text-anchor="middle" font-size="12" fill="#e8e8e8">파싱 (매번)</text>

  <line x1="240" y1="244" x2="240" y2="256" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="234,256 246,256 240,264" fill="#e05555"/>

  <rect x="80" y="264" width="320" height="36" fill="#1a0f0f" rx="5" stroke="#3a1e1e"/>
  <text x="240" y="287" text-anchor="middle" font-size="12" fill="#e8e8e8">실행 계획 생성 (매번)</text>

  <line x1="240" y1="300" x2="240" y2="312" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="234,312 246,312 240,320" fill="#e05555"/>

  <rect x="80" y="320" width="320" height="36" fill="#1a0f0f" rx="5" stroke="#3a1e1e"/>
  <text x="240" y="343" text-anchor="middle" font-size="12" fill="#e8e8e8">실행 → 결과 반환</text>

  <rect x="80" y="368" width="320" height="36" fill="#2a0f0f" rx="5" stroke="#5a1e1e"/>
  <text x="240" y="391" text-anchor="middle" font-size="12" fill="#e05555">SQL Injection 취약 (파라미터 미바인딩 시)</text>

  <!-- Center arrow -->
  <polygon points="430,268 450,268 450,254 470,278 450,302 450,288 430,288"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Right: Extended (Prepared) Query -->
  <rect x="480" y="90" width="360" height="280" fill="#0f1a10" rx="8" stroke="#1e5a1e" stroke-width="1.5"/>
  <text x="660" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">Extended Query (Prepared)</text>
  <text x="660" y="138" text-anchor="middle" font-size="12" fill="#888">파싱·실행 계획을 서버에 캐시</text>

  <!-- Extended step boxes -->
  <rect x="500" y="152" width="320" height="36" fill="#0a1a0a" rx="5" stroke="#1e3a1e"/>
  <text x="660" y="175" text-anchor="middle" font-size="12" fill="#55c555">1회: Parse (SQL + 파라미터 타입)</text>

  <line x1="660" y1="188" x2="660" y2="200" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="654,200 666,200 660,208" fill="#55c555"/>

  <rect x="500" y="208" width="320" height="36" fill="#0a1a0a" rx="5" stroke="#1e3a1e"/>
  <text x="660" y="231" text-anchor="middle" font-size="12" fill="#55c555">1회: Bind (값 바인딩)</text>

  <line x1="660" y1="244" x2="660" y2="256" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="654,256 666,256 660,264" fill="#55c555"/>

  <rect x="500" y="264" width="320" height="36" fill="#0a1a0a" rx="5" stroke="#1e3a1e"/>
  <text x="660" y="287" text-anchor="middle" font-size="12" fill="#55c555">N회: Execute (파싱 재사용)</text>

  <line x1="660" y1="300" x2="660" y2="312" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="654,312 666,312 660,320" fill="#55c555"/>

  <rect x="500" y="320" width="320" height="36" fill="#0a1a0a" rx="5" stroke="#1e3a1e"/>
  <text x="660" y="343" text-anchor="middle" font-size="12" fill="#55c555">결과 반환 → Close/Sync</text>

  <rect x="500" y="368" width="320" height="36" fill="#0a2a0a" rx="5" stroke="#1e5a1e"/>
  <text x="660" y="391" text-anchor="middle" font-size="12" fill="#55c555">SQL Injection 방어 + 성능 향상</text>

  <!-- Code block -->
  <rect x="60" y="398" width="760" height="64" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#6a8aa0" xml:space="preserve">-- Prepared Statement (JDBC 예시 — SQL Injection 방어)</text>
  <text x="80" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#7ec8e3" xml:space="preserve">PreparedStatement</text>
  <text x="224" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#e8e8e8" xml:space="preserve"> ps = conn.prepareStatement(</text>
  <text x="80" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#ce9178" xml:space="preserve">    "SELECT * FROM users WHERE id = ?"</text>
  <text x="580" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#e8e8e8" xml:space="preserve">);</text>

  <!-- Footer -->
  <text x="440" y="484" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 Chapter 1</text>
</svg>
