<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">일급 함수 활용 패턴</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">콜백 · 전략 패턴 · 디스패치 테이블</text>

  <!-- Left: 전략 패턴 -->
  <rect x="60" y="100" width="360" height="200" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">전략 패턴 (Strategy Pattern)</text>
  <rect x="76" y="136" width="328" height="148" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 정렬 전략을 함수로 교체</text>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">data = [<tspan fill="#ce9178">"banana"</tspan>, <tspan fill="#ce9178">"apple"</tspan>, <tspan fill="#ce9178">"fig"</tspan>]</text>
  <text x="92" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sorted(data, key=len)</text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ['fig', 'apple', 'banana']</text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sorted(data, key=str.upper)</text>
  <text x="92" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ['apple', 'banana', 'fig']</text>
  <text x="92" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sorted(data, key=<tspan fill="#7ec8e3">lambda</tspan> s: s[-<tspan fill="#b5cea8">1</tspan>])</text>

  <!-- Right: 디스패치 테이블 -->
  <rect x="460" y="100" width="360" height="200" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">디스패치 테이블 (Dispatch Table)</text>
  <rect x="476" y="136" width="328" height="148" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="492" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># if/elif 대신 dict로 분기</text>
  <text x="492" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ops = {</text>
  <text x="492" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"add"</tspan>: <tspan fill="#7ec8e3">lambda</tspan> a, b: a + b,</text>
  <text x="492" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"mul"</tspan>: <tspan fill="#7ec8e3">lambda</tspan> a, b: a * b,</text>
  <text x="492" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="492" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ops[<tspan fill="#ce9178">"add"</tspan>](<tspan fill="#b5cea8">3</tspan>, <tspan fill="#b5cea8">4</tspan>)  <tspan fill="#9aa4b8"># → 7</tspan></text>
  <text x="492" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ops[<tspan fill="#ce9178">"mul"</tspan>](<tspan fill="#b5cea8">3</tspan>, <tspan fill="#b5cea8">4</tspan>)  <tspan fill="#9aa4b8"># → 12</tspan></text>

  <!-- Bottom: 콜백 패턴 -->
  <rect x="60" y="320" width="760" height="120" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">콜백 패턴 — 함수를 나중에 호출</text>
  <rect x="76" y="356" width="728" height="68" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">def</tspan> process(items, on_success, on_error):</text>
  <text x="92" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">for</tspan> item <tspan fill="#7ec8e3">in</tspan> items: on_success(item) <tspan fill="#7ec8e3">if</tspan> item > <tspan fill="#b5cea8">0</tspan> <tspan fill="#7ec8e3">else</tspan> on_error(item)</text>
  <text x="92" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">process([<tspan fill="#b5cea8">1</tspan>,-<tspan fill="#b5cea8">2</tspan>,<tspan fill="#b5cea8">3</tspan>], on_success=print, on_error=<tspan fill="#7ec8e3">lambda</tspan> x: print(<tspan fill="#ce9178">f"ERR:{x}"</tspan>))</text>

  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">일급 함수 → 코드 재사용성 · 유연성 극대화</text>
</svg>
