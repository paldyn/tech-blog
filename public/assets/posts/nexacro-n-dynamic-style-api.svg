<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">동적 스타일 API 레퍼런스</text>

  <!-- Table headers -->
  <rect x="60" y="60" width="760" height="34" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">API 메서드</text>
  <text x="460" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">대상</text>
  <text x="680" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">값 예시</text>

  <line x1="340" y1="60" x2="340" y2="340" stroke="#222" stroke-width="1"/>
  <line x1="580" y1="60" x2="580" y2="340" stroke="#222" stroke-width="1"/>

  <!-- Row 1 -->
  <line x1="60" y1="94" x2="820" y2="94" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">set_background(v)</text>
  <text x="460" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 컴포넌트</text>
  <text x="680" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" text-anchor="middle">"#ff0000"</text>

  <!-- Row 2 -->
  <line x1="60" y1="122" x2="820" y2="122" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">set_color(v)</text>
  <text x="460" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">텍스트 있는 컴포넌트</text>
  <text x="680" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" text-anchor="middle">"#333333"</text>

  <!-- Row 3 -->
  <line x1="60" y1="150" x2="820" y2="150" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">set_font(v)</text>
  <text x="460" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">텍스트 있는 컴포넌트</text>
  <text x="680" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" text-anchor="middle">"bold 14px ..."</text>

  <!-- Row 4 -->
  <line x1="60" y1="178" x2="820" y2="178" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">set_border(v)</text>
  <text x="460" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">박스형 컴포넌트</text>
  <text x="680" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" text-anchor="middle">"1px solid #ccc"</text>

  <!-- Row 5 -->
  <line x1="60" y1="206" x2="820" y2="206" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">set_cssclass(v)</text>
  <text x="460" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 컴포넌트</text>
  <text x="680" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" text-anchor="middle">"btn_primary"</text>

  <!-- Row 6 -->
  <line x1="60" y1="234" x2="820" y2="234" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">set_opacity(v)</text>
  <text x="460" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 컴포넌트</text>
  <text x="680" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" text-anchor="middle">0.0 ~ 1.0</text>

  <!-- Row 7 -->
  <line x1="60" y1="262" x2="820" y2="262" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">e.color (ongetcellstyle)</text>
  <text x="460" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Grid 셀 (이벤트 핸들러)</text>
  <text x="680" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" text-anchor="middle">"#55c555"</text>

  <!-- Row 8 -->
  <line x1="60" y1="290" x2="820" y2="290" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">e.background</text>
  <text x="460" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Grid 셀 (이벤트 핸들러)</text>
  <text x="680" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" text-anchor="middle">"#fff0f0"</text>

  <!-- Row 9 -->
  <line x1="60" y1="318" x2="820" y2="318" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">e.cssclass</text>
  <text x="460" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Grid 셀 (이벤트 핸들러)</text>
  <text x="680" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" text-anchor="middle">"cell_highlight"</text>
</svg>
