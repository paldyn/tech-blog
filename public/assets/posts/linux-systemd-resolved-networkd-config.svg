<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">systemd-networkd .network 파일</text>

  <!-- Left: static config -->
  <text x="80" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">정적 IP 설정</text>
  <rect x="60" y="90" width="360" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># /etc/systemd/network/10-eth0.network</text>
  <text x="80" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">[Match]</text>
  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Name=eth0</text>
  <text x="80" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">[Network]</text>
  <text x="80" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Address=<tspan fill="#ce9178">192.168.1.100/24</tspan></text>
  <text x="80" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Gateway=<tspan fill="#ce9178">192.168.1.1</tspan></text>
  <text x="80" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">DNS=<tspan fill="#ce9178">8.8.8.8 1.1.1.1</tspan></text>
  <text x="80" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Domains=<tspan fill="#ce9178">example.com</tspan></text>
  <text x="80" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">NTP=<tspan fill="#ce9178">pool.ntp.org</tspan></text>

  <!-- Right: DHCP config -->
  <text x="480" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">DHCP 설정</text>
  <rect x="460" y="90" width="360" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># /etc/systemd/network/20-wifi.network</text>
  <text x="480" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">[Match]</text>
  <text x="480" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Name=wl*</text>
  <text x="480" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">[Network]</text>
  <text x="480" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">DHCP=<tspan fill="#ce9178">yes</tspan></text>
  <text x="480" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">DNSSECNegativeTrust=<tspan fill="#ce9178">no</tspan></text>
  <text x="480" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">[DHCP]</text>
  <text x="480" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">RouteMetric=<tspan fill="#b5cea8">20</tspan></text>
  <text x="480" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">UseDNS=<tspan fill="#ce9178">yes</tspan></text>

  <!-- Bottom commands -->
  <rect x="60" y="322" width="760" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">sudo systemctl enable --now systemd-networkd systemd-resolved</text>
  <text x="80" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">resolvectl status           <tspan fill="#888"># DNS 상태 확인</tspan></text>
</svg>
