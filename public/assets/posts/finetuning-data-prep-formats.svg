<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LLM 파인튜닝 데이터 형식 3종</text>
  <text x="440" y="70" font-size="15" fill="#888" text-anchor="middle">Completion · Instruction · Chat — 태스크에 맞는 형식 선택이 성능을 결정한다</text>

  <!-- ── Box 1: Completion Format ── -->
  <rect x="40" y="92" width="252" height="358" fill="#111520" rx="12" stroke="#3a4a6e" stroke-width="1.2"/>
  <text x="166" y="120" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Completion Format</text>
  <text x="166" y="139" font-size="12" fill="#888" text-anchor="middle">단순 텍스트 완성</text>

  <!-- code block 1 -->
  <rect x="56" y="150" width="220" height="126" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="168" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#9aa4b8">// JSONL 한 줄</text>
  <text x="68" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ffffff">{</text>
  <text x="68" y="204" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">  "text"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"대한민국의 수도는</tspan></text>
  <text x="68" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#ce9178">    서울입니다."</tspan></text>
  <text x="68" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ffffff">}</text>
  <text x="68" y="262" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#9aa4b8">// loss: 전체 시퀀스</text>

  <!-- tags -->
  <rect x="56" y="292" width="220" height="1" fill="#1e2433"/>
  <text x="166" y="316" font-size="12" fill="#888" text-anchor="middle">적합한 태스크</text>
  <rect x="68" y="328" width="88" height="24" fill="#1a2235" rx="6"/>
  <text x="112" y="344" font-size="11" fill="#7ec8e3" text-anchor="middle">언어 모델링</text>
  <rect x="164" y="328" width="100" height="24" fill="#1a2235" rx="6"/>
  <text x="214" y="344" font-size="11" fill="#7ec8e3" text-anchor="middle">도메인 적응</text>
  <rect x="68" y="360" width="88" height="24" fill="#1a2235" rx="6"/>
  <text x="112" y="376" font-size="11" fill="#7ec8e3" text-anchor="middle">텍스트 생성</text>
  <rect x="164" y="360" width="100" height="24" fill="#1a2235" rx="6"/>
  <text x="214" y="376" font-size="11" fill="#7ec8e3" text-anchor="middle">계속 쓰기</text>
  <text x="166" y="422" font-size="11" fill="#555" text-anchor="middle">단일 text 필드만 필요</text>
  <text x="166" y="438" font-size="11" fill="#55c555" text-anchor="middle">구현 난이도: 낮음</text>

  <!-- ── Box 2: Instruction Format ── -->
  <rect x="314" y="92" width="252" height="358" fill="#111520" rx="12" stroke="#3a4a6e" stroke-width="1.2"/>
  <text x="440" y="120" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Instruction Format</text>
  <text x="440" y="139" font-size="12" fill="#888" text-anchor="middle">Alpaca / Stanford 스타일</text>

  <!-- code block 2 -->
  <rect x="330" y="150" width="220" height="126" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="342" y="168" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ffffff">{</text>
  <text x="342" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">  "instruction"</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="342" y="204" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#ce9178">    "다음을 요약하라"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="342" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">  "input"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"...텍스트..."</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="342" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">  "output"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"요약 결과"</tspan></text>
  <text x="342" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ffffff">}</text>

  <rect x="330" y="292" width="220" height="1" fill="#1e2433"/>
  <text x="440" y="316" font-size="12" fill="#888" text-anchor="middle">적합한 태스크</text>
  <rect x="342" y="328" width="88" height="24" fill="#201a35" rx="6"/>
  <text x="386" y="344" font-size="11" fill="#7777cc" text-anchor="middle">요약·번역</text>
  <rect x="438" y="328" width="100" height="24" fill="#201a35" rx="6"/>
  <text x="488" y="344" font-size="11" fill="#7777cc" text-anchor="middle">질의응답</text>
  <rect x="342" y="360" width="88" height="24" fill="#201a35" rx="6"/>
  <text x="386" y="376" font-size="11" fill="#7777cc" text-anchor="middle">분류·추출</text>
  <rect x="438" y="360" width="100" height="24" fill="#201a35" rx="6"/>
  <text x="488" y="376" font-size="11" fill="#7777cc" text-anchor="middle">지시 따르기</text>
  <text x="440" y="422" font-size="11" fill="#555" text-anchor="middle">3개 필드 (input 생략 가능)</text>
  <text x="440" y="438" font-size="11" fill="#55c555" text-anchor="middle">구현 난이도: 중간</text>

  <!-- ── Box 3: Chat Format ── -->
  <rect x="588" y="92" width="252" height="358" fill="#111520" rx="12" stroke="#3a4a6e" stroke-width="1.2"/>
  <text x="714" y="120" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Chat Format (ChatML)</text>
  <text x="714" y="139" font-size="12" fill="#888" text-anchor="middle">멀티턴 대화 스타일</text>

  <!-- code block 3 -->
  <rect x="604" y="150" width="220" height="126" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="616" y="168" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#ffffff">{</tspan><tspan fill="#7ec8e3">"messages"</tspan><tspan fill="#ffffff">: [</tspan></text>
  <text x="616" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#ffffff">  {</tspan><tspan fill="#7ec8e3">"role"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"system"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="616" y="204" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">    "content"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"당신은..."</tspan><tspan fill="#ffffff">},</tspan></text>
  <text x="616" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#ffffff">  {</tspan><tspan fill="#7ec8e3">"role"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"user"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="616" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">    "content"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"질문"</tspan><tspan fill="#ffffff">},</tspan></text>
  <text x="616" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#ffffff">  {</tspan><tspan fill="#7ec8e3">"role"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"assistant"</tspan><tspan fill="#ffffff">}]}</tspan></text>

  <rect x="604" y="292" width="220" height="1" fill="#1e2433"/>
  <text x="714" y="316" font-size="12" fill="#888" text-anchor="middle">적합한 태스크</text>
  <rect x="616" y="328" width="88" height="24" fill="#152015" rx="6"/>
  <text x="660" y="344" font-size="11" fill="#55c555" text-anchor="middle">챗봇 구축</text>
  <rect x="712" y="328" width="100" height="24" fill="#152015" rx="6"/>
  <text x="762" y="344" font-size="11" fill="#55c555" text-anchor="middle">멀티턴 대화</text>
  <rect x="616" y="360" width="88" height="24" fill="#152015" rx="6"/>
  <text x="660" y="376" font-size="11" fill="#55c555" text-anchor="middle">어시스턴트</text>
  <rect x="712" y="360" width="100" height="24" fill="#152015" rx="6"/>
  <text x="762" y="376" font-size="11" fill="#55c555" text-anchor="middle">역할 플레이</text>
  <text x="714" y="422" font-size="11" fill="#555" text-anchor="middle">apply_chat_template() 사용</text>
  <text x="714" y="438" font-size="11" fill="#7ec8e3" text-anchor="middle">구현 난이도: 높음</text>
</svg>
