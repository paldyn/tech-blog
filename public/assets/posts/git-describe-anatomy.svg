<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arrda" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git describe 출력 해부</text>

  <!-- Output example -->
  <rect x="60" y="70" width="760" height="60" rx="8" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="22" font-weight="600" fill="#55c555" text-anchor="middle">v1.2.0-14-gabc1234</text>

  <!-- Annotations -->
  <!-- Tag part -->
  <rect x="60" y="160" width="220" height="70" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">태그 이름</text>
  <text x="170" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#ffffff" text-anchor="middle">v1.2.0</text>
  <text x="170" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">가장 가까운 Annotated 태그</text>

  <!-- Count part -->
  <rect x="330" y="160" width="220" height="70" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">커밋 수</text>
  <text x="440" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#ffffff" text-anchor="middle">14</text>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">태그 이후 커밋 개수</text>

  <!-- SHA part -->
  <rect x="600" y="160" width="220" height="70" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">커밋 해시</text>
  <text x="710" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#ffffff" text-anchor="middle">gabc1234</text>
  <text x="710" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">g = git + HEAD SHA 앞 7자리</text>

  <!-- Special case: on tag -->
  <rect x="60" y="260" width="760" height="60" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">정확히 태그가 붙은 커밋이면</text>
  <text x="440" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555" text-anchor="middle">v1.2.0   (태그 이름만 출력)</text>

  <!-- Code block -->
  <rect x="60" y="340" width="760" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git describe</text>
  <text x="200" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --tags --always --dirty</text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># LW 태그 포함, 태그 없으면 SHA, 미커밋 변경 있으면 -dirty 접미사</text>
</svg>
