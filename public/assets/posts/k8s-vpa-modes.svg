<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">VPA updateMode 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Off · Initial · Recreate · Auto</text>

  <!-- Off -->
  <rect x="60" y="90" width="185" height="180" fill="#0f1923" rx="8" stroke="#555" stroke-width="1.5"/>
  <text x="152" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888" text-anchor="middle">Off</text>
  <rect x="76" y="128" width="153" height="50" fill="#0a1015" rx="5" stroke="#2a2a2a" stroke-width="1"/>
  <text x="152" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">권장값 계산만</text>
  <text x="152" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">적용 없음</text>
  <text x="152" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">용도: 모니터링/</text>
  <text x="152" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">수동 결정</text>
  <text x="152" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#3a3a3a" text-anchor="middle">Pod 재시작 없음</text>

  <!-- Initial -->
  <rect x="260" y="90" width="185" height="180" fill="#0f1923" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="352" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Initial</text>
  <rect x="276" y="128" width="153" height="50" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="352" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">신규 Pod 생성 시만</text>
  <text x="352" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Admission에서 주입</text>
  <text x="352" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">용도: 초기 설정</text>
  <text x="352" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">보조 도구</text>
  <text x="352" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">기존 Pod 변경 없음</text>

  <!-- Recreate -->
  <rect x="460" y="90" width="185" height="180" fill="#0f1923" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="552" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8a020" text-anchor="middle">Recreate</text>
  <rect x="476" y="128" width="153" height="50" fill="#0a1015" rx="5" stroke="#3a2a0a" stroke-width="1"/>
  <text x="552" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">범위 벗어난 Pod</text>
  <text x="552" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">퇴출 후 재생성</text>
  <text x="552" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle">용도: 일반 배포</text>
  <text x="552" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle">(in-place 전)</text>
  <text x="552" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">⚠ Pod 재시작 발생</text>

  <!-- Auto -->
  <rect x="660" y="90" width="180" height="180" fill="#0f1923" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="750" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Auto</text>
  <rect x="676" y="128" width="148" height="50" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="750" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">In-place update</text>
  <text x="750" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(k8s 1.27+) 또는 Recreate</text>
  <text x="750" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">용도: 자동화</text>
  <text x="750" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">권장 모드</text>
  <text x="750" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">PDB 무시 가능</text>

  <!-- Code block -->
  <rect x="60" y="290" width="760" height="68" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">spec:</text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  updatePolicy: {updateMode: "Off"}   </text>
  <text x="460" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888"># 처음엔 Off로 권장값 파악 후 전환 권장</text>
  <text x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  resourcePolicy: {containerPolicies: [{containerName: "*", minAllowed: {cpu: 50m}}]}</text>
</svg>
