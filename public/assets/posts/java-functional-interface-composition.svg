<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-main" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-compose" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">함수형 인터페이스 합성 — andThen / compose</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Function 합성 체인 및 Predicate 논리 조합</text>

  <!-- andThen 흐름 -->
  <text x="440" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">f.andThen(g) — f 먼저, 그 결과를 g에 전달</text>

  <!-- 입력 박스 -->
  <rect x="60" y="118" width="120" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="120" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Input T</text>

  <!-- f 박스 -->
  <rect x="230" y="118" width="140" height="44" rx="6" fill="#0d0d1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="300" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">f: T -&gt; R</text>
  <text x="300" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Function&lt;T,R&gt;</text>

  <!-- 중간 결과 -->
  <rect x="420" y="118" width="100" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="470" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Result R</text>

  <!-- g 박스 -->
  <rect x="570" y="118" width="140" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">g: R -&gt; V</text>
  <text x="640" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Function&lt;R,V&gt;</text>

  <!-- 출력 박스 -->
  <rect x="760" y="118" width="80" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="800" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">V</text>

  <!-- 화살표들 -->
  <line x1="180" y1="140" x2="230" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-main)"/>
  <line x1="370" y1="140" x2="420" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-main)"/>
  <line x1="520" y1="140" x2="570" y2="140" stroke="#55c555" stroke-width="2" marker-end="url(#arr-main)"/>
  <line x1="710" y1="140" x2="760" y2="140" stroke="#55c555" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- compose 흐름 -->
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">f.compose(g) — g 먼저, 그 결과를 f에 전달</text>

  <!-- 입력 박스 (compose) -->
  <rect x="60" y="213" width="120" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="120" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Input V</text>

  <!-- g 박스 (compose) -->
  <rect x="230" y="213" width="140" height="44" rx="6" fill="#1a0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="300" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">g: V -&gt; T</text>
  <text x="300" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">먼저 실행</text>

  <!-- 중간 결과 (compose) -->
  <rect x="420" y="213" width="100" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="470" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">T</text>

  <!-- f 박스 (compose) -->
  <rect x="570" y="213" width="140" height="44" rx="6" fill="#0d0d1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">f: T -&gt; R</text>
  <text x="640" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">나중에 실행</text>

  <!-- 출력 박스 (compose) -->
  <rect x="760" y="213" width="80" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="800" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">R</text>

  <!-- compose 화살표들 -->
  <line x1="180" y1="235" x2="230" y2="235" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-compose)"/>
  <line x1="370" y1="235" x2="420" y2="235" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-compose)"/>
  <line x1="520" y1="235" x2="570" y2="235" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-main)"/>
  <line x1="710" y1="235" x2="760" y2="235" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- Predicate 조합 섹션 -->
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Predicate 논리 조합</text>

  <!-- 3개 박스 -->
  <rect x="60" y="304" width="220" height="60" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">p.and(q)</text>
  <text x="170" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">p(x) &amp;&amp; q(x) — 둘 다 true</text>

  <rect x="330" y="304" width="220" height="60" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">p.or(q)</text>
  <text x="440" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">p(x) || q(x) — 하나라도 true</text>

  <rect x="600" y="304" width="220" height="60" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">p.negate()</text>
  <text x="710" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">!p(x) — 반전</text>

  <!-- 코드 박스 -->
  <rect x="60" y="382" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Function</text>
  <text x="144" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">&lt;String, String&gt; pipeline =</text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">    String::trim</text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">        .andThen(String::toLowerCase)</text>
  <text x="76" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">        .andThen(s -&gt; s.replace(</text>
  <text x="328" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ce9178">" "</text>
  <text x="367" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">, </text>
  <text x="387" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ce9178">"-"</text>
  <text x="420" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">));</text>
</svg>
