<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LimitRange 타입별 제한 범위</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Container · Pod · PersistentVolumeClaim</text>

  <!-- Container type -->
  <rect x="60" y="94" width="240" height="220" fill="#0f1923" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Container</text>

  <rect x="78" y="132" width="204" height="48" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="180" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">default</text>
  <text x="180" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">request 미지정 시 자동 적용</text>

  <rect x="78" y="188" width="204" height="48" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="180" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">defaultRequest</text>
  <text x="180" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">limit 미지정 시 자동 적용</text>

  <rect x="78" y="244" width="204" height="48" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="180" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">min / max</text>
  <text x="180" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">허용 range (min ≤ req ≤ max)</text>

  <!-- Pod type -->
  <rect x="320" y="94" width="240" height="220" fill="#0f1923" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Pod</text>

  <rect x="338" y="132" width="204" height="48" fill="#0a1015" rx="5" stroke="#2a2a4e" stroke-width="1"/>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Pod 전체 합산 min/max</text>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 컨테이너 합산 기준</text>

  <rect x="338" y="188" width="204" height="48" fill="#0a1015" rx="5" stroke="#2a2a4e" stroke-width="1"/>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">default/defaultRequest 없음</text>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Pod 타입은 자동 주입 안 됨</text>

  <rect x="338" y="244" width="204" height="48" fill="#0a1015" rx="5" stroke="#2a2a4e" stroke-width="1"/>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">maxLimitRequestRatio</text>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">limit/request 비율 상한</text>

  <!-- PVC type -->
  <rect x="580" y="94" width="240" height="220" fill="#0f1923" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">PersistentVolumeClaim</text>

  <rect x="598" y="132" width="204" height="48" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="700" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">storage min/max</text>
  <text x="700" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PVC 요청 크기 범위 제한</text>

  <rect x="598" y="188" width="204" height="48" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="700" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">예: min 1Gi / max 50Gi</text>
  <text x="700" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">초과 PVC 생성 거부</text>

  <rect x="598" y="244" width="204" height="48" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="700" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">StorageClass 무관</text>
  <text x="700" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">어떤 StorageClass든 적용</text>

  <!-- Code block -->
  <rect x="60" y="334" width="760" height="136" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">kind:</text>
  <text x="116" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ce9178"> LimitRange</text>
  <text x="80" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">spec:</text>
  <text x="80" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  limits:</text>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  - type: Container</text>
  <text x="80" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">    default: {cpu: 200m, memory: 256Mi}</text>
  <text x="80" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">    defaultRequest: {cpu: 100m, memory: 128Mi}</text>
</svg>
