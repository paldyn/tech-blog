<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500" style="background:#0a0a0a;border-radius:12px">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ALTER TABLE 주요 연산</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">컬럼·제약·인덱스 추가·수정·삭제</text>

  <!-- Category boxes -->
  <!-- Column ops -->
  <rect x="60" y="96" width="230" height="200" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="175" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">컬럼 조작</text>
  <line x1="80" y1="128" x2="270" y2="128" stroke="#1e2433"/>
  <text x="80" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">ADD COLUMN</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 컬럼 추가</text>
  <text x="80" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ALTER COLUMN</text>
  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타입·기본값 변경</text>
  <text x="80" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">DROP COLUMN</text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컬럼 삭제</text>
  <text x="80" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">RENAME COLUMN</text>

  <!-- Constraint ops -->
  <rect x="325" y="96" width="230" height="200" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">제약 조작</text>
  <line x1="345" y1="128" x2="535" y2="128" stroke="#1e2433"/>
  <text x="345" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">ADD CONSTRAINT</text>
  <text x="345" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PK/FK/UNIQUE/CHECK 추가</text>
  <text x="345" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">DROP CONSTRAINT</text>
  <text x="345" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">제약 삭제</text>
  <text x="345" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ENABLE/DISABLE</text>
  <text x="345" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">제약 임시 비활성화</text>
  <text x="345" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">RENAME CONSTRAINT</text>

  <!-- Table ops -->
  <rect x="590" y="96" width="230" height="200" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="705" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">테이블 조작</text>
  <line x1="610" y1="128" x2="800" y2="128" stroke="#1e2433"/>
  <text x="610" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">RENAME TO</text>
  <text x="610" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">테이블 이름 변경</text>
  <text x="610" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SET SCHEMA</text>
  <text x="610" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스키마 이동</text>
  <text x="610" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">ADD GENERATED</text>
  <text x="610" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Generated 컬럼 추가</text>
  <text x="610" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">SET ACCESS METHOD</text>

  <!-- Code block -->
  <rect x="60" y="320" width="760" height="140" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- 컬럼 추가 (NULL 허용 → 빠름, NOT NULL → 느림)</text>
  <text x="80" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ALTER TABLE</text>
  <text x="172" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> orders </text>
  <text x="242" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">ADD COLUMN</text>
  <text x="349" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> shipped_at TIMESTAMP;</text>
  <text x="80" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- 컬럼 타입 변경</text>
  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ALTER TABLE</text>
  <text x="172" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> products </text>
  <text x="250" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ALTER COLUMN</text>
  <text x="361" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> price </text>
  <text x="410" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">TYPE</text>
  <text x="444" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> NUMERIC(14,2);</text>
  <text x="80" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- 제약 추가</text>
  <text x="80" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ALTER TABLE</text>
  <text x="172" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> users </text>
  <text x="228" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">ADD CONSTRAINT</text>
  <text x="356" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> uq_email </text>
  <text x="449" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">UNIQUE</text>
  <text x="501" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> (email);</text>

  <text x="440" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
