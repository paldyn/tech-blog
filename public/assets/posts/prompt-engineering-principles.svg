<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">프롬프트 엔지니어링 6대 원칙</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">좋은 프롬프트 = 명확한 역할 + 구체적 지시 + 충분한 맥락</text>

  <!-- Principle 1 -->
  <rect x="60" y="90" width="370" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">① 역할 부여 (Role Assignment)</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모델에게 구체적인 페르소나 부여</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">"당신은 10년 경력의 시니어 파이썬 개발자입니다."</text>

  <!-- Principle 2 -->
  <rect x="450" y="90" width="370" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">② 명확한 태스크 정의</text>
  <text x="470" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">무엇을, 어떤 형식으로, 얼마나 상세히</text>
  <text x="470" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">"3개 항목의 불릿 리스트로 요약해줘."</text>

  <!-- Principle 3 -->
  <rect x="60" y="190" width="370" height="80" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">③ 충분한 컨텍스트 제공</text>
  <text x="80" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">배경, 제약, 대상 독자, 목적 명시</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">"독자는 비개발자 임원이며, 기술 용어 최소화"</text>

  <!-- Principle 4 -->
  <rect x="450" y="190" width="370" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">④ 예시 포함 (Few-shot)</text>
  <text x="470" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원하는 출력 형식을 예시로 보여줌</text>
  <text x="470" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">"예: '입력: X → 출력: Y' 형태로"</text>

  <!-- Principle 5 -->
  <rect x="60" y="290" width="370" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">⑤ 제약 및 금지사항 명시</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원하지 않는 출력을 명시적으로 배제</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">"서론/결론 없이 본론만, 500자 이내"</text>

  <!-- Principle 6 -->
  <rect x="450" y="290" width="370" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">⑥ 단계별 사고 요청</text>
  <text x="470" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">복잡한 문제를 분해해 순서대로 처리</text>
  <text x="470" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">"단계별로 생각하고 최종 답을 제시해."</text>

  <!-- Bottom key insight -->
  <rect x="60" y="392" width="760" height="50" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="440" y="415" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">핵심 원칙: 모델에게 <tspan fill="#55c555">원하는 출력</tspan>을 명확히, <tspan fill="#7ec8e3">아는 것</tspan>과 <tspan fill="#e05555">모르는 것</tspan>의 경계를 정확히 전달</text>
  <text x="440" y="433" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프롬프트 엔지니어링 = 모호한 요청 → 명확한 사양(Specification)으로 변환하는 기술</text>
</svg>
