<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Kaplan vs Chinchilla 스케일링 권고</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">같은 컴퓨팅 예산에서 어떻게 분배할 것인가</text>

  <!-- Column headers -->
  <rect x="60" y="88" width="360" height="44" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">Kaplan et al. (2020)</text>

  <rect x="460" y="88" width="360" height="44" fill="#0a1a0f" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">Chinchilla (2022)</text>

  <!-- Row 1: Core claim -->
  <rect x="60" y="144" width="360" height="54" fill="#111827" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">핵심 주장</text>
  <text x="80" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">고정 컴퓨트 → 모델 크기 우선</text>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(데이터보다 N을 늘리는 게 유리)</text>

  <rect x="460" y="144" width="360" height="54" fill="#111827" rx="6" stroke="#3a4a6e"/>
  <text x="480" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">핵심 주장</text>
  <text x="480" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">모델 크기와 데이터 동등하게 증가</text>
  <text x="480" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(N과 D를 함께 늘려야 최적)</text>

  <!-- Row 2: Optimal ratio -->
  <rect x="60" y="210" width="360" height="54" fill="#111827" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최적 토큰:파라미터 비율</text>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7777cc" font-weight="700">D ≈ 10 × N</text>

  <rect x="460" y="210" width="360" height="54" fill="#111827" rx="6" stroke="#3a4a6e"/>
  <text x="480" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최적 토큰:파라미터 비율</text>
  <text x="480" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555" font-weight="700">D ≈ 20 × N</text>

  <!-- Row 3: GPT-3 implication -->
  <rect x="60" y="276" width="360" height="54" fill="#111827" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GPT-3 (175B)에 대한 권고</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">1.75T 토큰으로 충분</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(실제 GPT-3: 300B 토큰 사용)</text>

  <rect x="460" y="276" width="360" height="54" fill="#111827" rx="6" stroke="#3a4a6e"/>
  <text x="480" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GPT-3 (175B)에 대한 권고</text>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">3.5T 토큰이 최적</text>
  <text x="480" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(GPT-3는 심각하게 과소 학습됨)</text>

  <!-- Row 4: Model implication -->
  <rect x="60" y="342" width="360" height="54" fill="#111827" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동등 컴퓨트 대안</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">더 큰 모델을 적게 학습</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(1T 파라미터 × 10T 토큰)</text>

  <rect x="460" y="342" width="360" height="54" fill="#111827" rx="6" stroke="#3a4a6e"/>
  <text x="480" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동등 컴퓨트 대안</text>
  <text x="480" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">작은 모델을 많이 학습</text>
  <text x="480" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(70B 모델 × 1.4T 토큰)</text>

  <!-- VS divider -->
  <line x1="440" y1="88" x2="440" y2="400" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="415" y="228" width="50" height="30" fill="#1a1020" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">VS</text>

  <!-- Bottom note -->
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Chinchilla(70B, 1.4T 토큰)은 Gopher(280B, 300B 토큰)보다 훨씬 적은 파라미터로 우수한 성능</text>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Hoffmann et al., DeepMind 2022 — "Training Compute-Optimal Large Language Models"</text>
</svg>
