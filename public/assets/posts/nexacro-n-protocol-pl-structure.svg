<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PL(Protocol Layer) 패킷 구조</text>

  <!-- Request packet -->
  <text x="220" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">요청 패킷 (Client → Server)</text>

  <rect x="40" y="96" width="360" height="340" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Header section -->
  <rect x="56" y="112" width="328" height="56" rx="4" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="220" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">PL 헤더</text>
  <text x="220" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">버전 · 인코딩 · 트랜잭션 ID · 서비스 ID</text>

  <!-- Variable section -->
  <rect x="56" y="178" width="328" height="56" rx="4" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="220" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Variable 블록</text>
  <text x="220" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">key=value 쌍 목록 (세션 정보, 검색 파라미터 등)</text>

  <!-- Dataset section -->
  <rect x="56" y="244" width="328" height="80" rx="4" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="220" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">DataSet 블록 (0개 이상)</text>
  <text x="220" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DataSet 이름 · 컬럼 정의 · 행 데이터</text>
  <text x="220" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">각 행의 RowType(Normal/Insert/Update/Delete)</text>

  <!-- Footer -->
  <rect x="56" y="334" width="328" height="40" rx="4" fill="#0a0a0a" stroke="#888" stroke-width="1"/>
  <text x="220" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PL 종료 마커</text>

  <!-- Response packet -->
  <text x="660" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">응답 패킷 (Server → Client)</text>

  <rect x="480" y="96" width="360" height="340" rx="8" fill="#14200a" stroke="#55c555" stroke-width="1.5"/>

  <!-- Header section response -->
  <rect x="496" y="112" width="328" height="56" rx="4" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">PL 헤더 (응답)</text>
  <text x="660" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">버전 · 인코딩 · errCode · errMsg</text>

  <!-- Variable section response -->
  <rect x="496" y="178" width="328" height="56" rx="4" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="660" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Variable 블록 (응답)</text>
  <text x="660" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">errCode · errMsg · TOTAL_CNT 등</text>

  <!-- Dataset section response -->
  <rect x="496" y="244" width="328" height="80" rx="4" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="660" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">DataSet 블록 (결과)</text>
  <text x="660" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컬럼 정의 · 조회 결과 행 데이터</text>
  <text x="660" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 행 RowType = Normal(1)</text>

  <!-- Footer response -->
  <rect x="496" y="334" width="328" height="40" rx="4" fill="#0a0a0a" stroke="#888" stroke-width="1"/>
  <text x="660" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PL 종료 마커</text>

  <!-- Arrow between -->
  <line x1="400" y1="270" x2="480" y2="270" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HTTP/S</text>

  <!-- Note bottom -->
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">PL(Protocol Layer): Nexacro N 고유 이진/텍스트 혼합 직렬화 포맷 — JSON보다 Dataset 전송에 최적화</text>
</svg>
