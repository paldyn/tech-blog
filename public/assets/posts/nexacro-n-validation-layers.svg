<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">유효성 검사 계층 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">클라이언트 3단계 + 서버 검증 — 빠를수록 좋다</text>

  <!-- Layer 1 -->
  <rect x="200" y="96" width="480" height="72" fill="#0d2137" rx="8" stroke="#2a4a7a" stroke-width="2"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">1단계: 입력 즉시 (onChange / onchanged)</text>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">글자 수 제한, 문자 타입 제한, 실시간 포맷 교정</text>

  <!-- 화살표 1→2 -->
  <line x1="440" y1="168" x2="440" y2="188" stroke="#555" stroke-width="1.5"/>
  <polygon points="434,188 440,200 446,188" fill="#555"/>

  <!-- Layer 2 -->
  <rect x="160" y="200" width="560" height="72" fill="#0d1e0d" rx="8" stroke="#2a5a2a" stroke-width="2"/>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">2단계: 저장 직전 (fn_save → gfn_validate)</text>
  <text x="440" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">필수값, 형식, 범위, 상호의존성 검증 — 전부 통과해야 전송</text>

  <!-- 화살표 2→3 -->
  <line x1="440" y1="272" x2="440" y2="292" stroke="#555" stroke-width="1.5"/>
  <polygon points="434,292 440,304 446,292" fill="#555"/>

  <!-- Layer 3 -->
  <rect x="120" y="304" width="640" height="72" fill="#160f28" rx="8" stroke="#4a2a7a" stroke-width="2"/>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">3단계: 서버 (Adapter → DB 제약·비즈니스 룰)</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중복 체크, 권한 검증, 트리거 — errCode/errMsg로 클라이언트 통보</text>

  <!-- 특성 레이블 (좌측) -->
  <text x="100" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="end">즉각 반응</text>
  <text x="100" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="end">저장 전 차단</text>
  <text x="100" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="end">최종 방어선</text>

  <!-- 성능 레이블 (우측) -->
  <text x="780" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빠름</text>
  <text x="780" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중간</text>
  <text x="780" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">느림</text>

  <!-- 원칙 박스 -->
  <rect x="120" y="408" width="640" height="48" fill="#0f0f0f" rx="6" stroke="#333" stroke-width="1"/>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">원칙: 가능한 한 앞 단계에서 잡아라 — 서버까지 갈수록 비용이 크다</text>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">클라이언트 검증은 UX를 위한 것, 서버 검증은 보안을 위한 것</text>
</svg>
