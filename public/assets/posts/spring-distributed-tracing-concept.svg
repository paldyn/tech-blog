<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">분산 추적 개념 — Trace &amp; Span 계층 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">단일 요청이 여러 서비스를 거치는 동안 하나의 TraceId로 묶인다</text>

  <!-- TraceId band -->
  <rect x="60" y="96" width="760" height="36" rx="6" fill="#1a2535" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="440" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">TraceId: a1b2c3d4e5f6 (전체 요청 생애 동안 동일)</text>

  <!-- Service A -->
  <rect x="60" y="152" width="220" height="56" rx="8" fill="#111827" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="170" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">API Gateway</text>
  <text x="170" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Span A  (root span)</text>

  <!-- Service B -->
  <rect x="330" y="152" width="220" height="56" rx="8" fill="#111827" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="440" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Order Service</text>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Span B  (child span)</text>

  <!-- Service C -->
  <rect x="600" y="152" width="220" height="56" rx="8" fill="#111827" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="710" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Inventory Service</text>
  <text x="710" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Span C  (child span)</text>

  <!-- Arrows between services -->
  <line x1="280" y1="180" x2="329" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="550" y1="180" x2="599" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Span detail boxes -->
  <!-- Span A detail -->
  <rect x="60" y="234" width="220" height="100" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Span A 속성</text>
  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">traceId:  a1b2c3d4e5f6</text>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">spanId:   0000000000000001</text>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">parentId: (없음 — root)</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">duration: 120ms</text>

  <!-- Span B detail -->
  <rect x="330" y="234" width="220" height="100" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="350" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Span B 속성</text>
  <text x="350" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">traceId:  a1b2c3d4e5f6</text>
  <text x="350" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">spanId:   0000000000000002</text>
  <text x="350" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">parentId: 0000000000000001</text>
  <text x="350" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">duration: 85ms</text>

  <!-- Span C detail -->
  <rect x="600" y="234" width="220" height="100" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="620" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Span C 속성</text>
  <text x="620" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">traceId:  a1b2c3d4e5f6</text>
  <text x="620" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">spanId:   0000000000000003</text>
  <text x="620" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">parentId: 0000000000000002</text>
  <text x="620" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">duration: 42ms</text>

  <!-- Propagation labels -->
  <text x="305" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">HTTP Header</text>
  <text x="305" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">전파</text>
  <text x="575" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">HTTP Header</text>
  <text x="575" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">전파</text>

  <!-- Zipkin export arrows -->
  <line x1="170" y1="334" x2="170" y2="374" stroke="#666" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-gray)"/>
  <line x1="440" y1="334" x2="440" y2="374" stroke="#666" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-gray)"/>
  <line x1="710" y1="334" x2="710" y2="374" stroke="#666" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-gray)"/>

  <!-- Zipkin / Backend -->
  <rect x="60" y="374" width="760" height="50" rx="8" fill="#1a2535" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Zipkin / Jaeger</text>
  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Span 수집 &amp; TraceId 기준 타임라인 시각화</text>

  <!-- Propagation format labels -->
  <rect x="60" y="444" width="360" height="36" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">W3C Trace Context</text>
  <text x="240" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">traceparent: 00-{traceId}-{spanId}-01</text>

  <rect x="460" y="444" width="360" height="36" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">B3 Propagation (Zipkin)</text>
  <text x="640" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">X-B3-TraceId / X-B3-SpanId 헤더</text>
</svg>
