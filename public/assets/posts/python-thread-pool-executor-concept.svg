<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ThreadPoolExecutor 작동 원리</text>

  <!-- Task queue -->
  <rect x="60" y="64" width="200" height="200" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">작업 큐</text>
  <text x="160" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">submit() 로 추가</text>

  <rect x="80" y="114" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Task A</text>

  <rect x="80" y="148" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Task B</text>

  <rect x="80" y="182" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Task C</text>

  <rect x="80" y="216" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="160" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#444">...</text>

  <!-- Arrow to thread pool -->
  <line x1="260" y1="164" x2="310" y2="164" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Thread pool -->
  <rect x="310" y="64" width="300" height="200" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="460" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">스레드 풀 (max_workers=3)</text>

  <rect x="330" y="100" width="260" height="40" rx="4" fill="#0d2b1a" stroke="#55c555" stroke-width="1"/>
  <text x="460" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Thread 1 — Task A 실행 중</text>
  <text x="460" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">I/O 대기 시 GIL 해제</text>

  <rect x="330" y="148" width="260" height="40" rx="4" fill="#0d2b1a" stroke="#55c555" stroke-width="1"/>
  <text x="460" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Thread 2 — Task B 실행 중</text>
  <text x="460" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">I/O 대기 시 GIL 해제</text>

  <rect x="330" y="196" width="260" height="40" rx="4" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="460" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Thread 3 — 대기 중</text>
  <text x="460" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Task C 할당 대기</text>

  <!-- Arrow to futures -->
  <line x1="610" y1="164" x2="660" y2="164" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Futures -->
  <rect x="660" y="64" width="180" height="200" rx="8" fill="#2b1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="750" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">Future 객체</text>
  <text x="750" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">submit() 즉시 반환</text>

  <rect x="678" y="114" width="144" height="36" rx="4" fill="#2b1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="750" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">fut_A (완료)</text>
  <text x="750" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">result() 가능</text>

  <rect x="678" y="158" width="144" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="750" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">fut_B (진행 중)</text>
  <text x="750" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">result() 는 블록</text>

  <rect x="678" y="202" width="144" height="36" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="750" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">fut_C (대기)</text>
  <text x="750" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">아직 시작 안 됨</text>

  <!-- Use case boxes -->
  <rect x="60" y="290" width="370" height="100" rx="8" fill="#0d2b1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">ThreadPoolExecutor 가 적합한 경우</text>
  <text x="245" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">다수의 I/O 바운드 작업 동시 처리</text>
  <text x="245" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HTTP 요청, 파일 읽기, DB 쿼리</text>
  <text x="245" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스레드 생성 비용 절감 (풀 재사용)</text>

  <rect x="450" y="290" width="370" height="100" rx="8" fill="#2b0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">ThreadPoolExecutor 가 부적합한 경우</text>
  <text x="635" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU 집약 계산 (GIL 때문에 효과 없음)</text>
  <text x="635" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ ProcessPoolExecutor 사용</text>
  <text x="635" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">고성능 비동기 I/O → asyncio 검토</text>

  <!-- Default workers note -->
  <rect x="60" y="410" width="760" height="30" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본 max_workers: Python 3.8+ → min(32, os.cpu_count() + 4)</text>
</svg>
