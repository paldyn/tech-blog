<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Kustomize Components — 재사용 가능한 기능 단위</text>

  <!-- Components -->
  <rect x="60" y="70" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">components/logging/</text>
  <text x="160" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">kind: Component</text>
  <text x="160" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Fluent Bit 사이드카 추가</text>

  <rect x="60" y="170" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">components/monitoring/</text>
  <text x="160" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">kind: Component</text>
  <text x="160" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Prometheus 어노테이션 추가</text>

  <rect x="60" y="270" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">components/hpa/</text>
  <text x="160" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">kind: Component</text>
  <text x="160" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">HPA 리소스 + 설정</text>

  <!-- arrows to overlays -->
  <line x1="260" y1="110" x2="340" y2="150" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrd)"/>
  <line x1="260" y1="210" x2="340" y2="210" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrd)"/>
  <line x1="260" y1="310" x2="340" y2="310" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrd)"/>
  <line x1="260" y1="110" x2="340" y2="280" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrd)"/>

  <!-- dev overlay -->
  <rect x="340" y="120" width="200" height="100" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">overlays/dev/</text>
  <rect x="354" y="156" width="172" height="54" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">components:</text>
  <text x="370" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" xml:space="preserve">  - ../../components/logging</text>

  <!-- prod overlay -->
  <rect x="340" y="250" width="200" height="120" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">overlays/prod/</text>
  <rect x="354" y="288" width="172" height="72" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">components:</text>
  <text x="370" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" xml:space="preserve">  - .../logging</text>
  <text x="370" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" xml:space="preserve">  - .../monitoring</text>
  <text x="370" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" xml:space="preserve">  - .../hpa</text>

  <!-- final output arrows -->
  <line x1="540" y1="170" x2="610" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="310" x2="610" y2="310" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- dev output -->
  <rect x="610" y="130" width="230" height="80" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">dev 최종 결과</text>
  <text x="725" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">base + logging sidecar</text>
  <text x="725" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">replicas: 1, no HPA</text>

  <!-- prod output -->
  <rect x="610" y="270" width="230" height="100" rx="8" fill="#201010" stroke="#e05555" stroke-width="1.5"/>
  <text x="725" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">prod 최종 결과</text>
  <text x="725" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">base + logging + monitoring</text>
  <text x="725" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">+ HPA</text>
  <text x="725" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">replicas: 5, full stack</text>

  <!-- Component label box -->
  <rect x="60" y="380" width="200" height="56" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Component 특징</text>
  <text x="160" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">선택적 포함, 재사용</text>
  <text x="160" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">복사 없이 여러 overlay 공유</text>
</svg>
