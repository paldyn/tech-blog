<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Redux Slices 도메인 기반 구조</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">기능(Feature) 별로 상태를 분리하는 패턴</text>

  <!-- Root Store box -->
  <rect x="340" y="94" width="200" height="52" rx="10" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">Root Store</text>
  <text x="440" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">configureStore</text>

  <!-- Lines to slices -->
  <line x1="360" y1="146" x2="200" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="146" x2="380" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="146" x2="540" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="480" y1="146" x2="700" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Slice boxes -->
  <rect x="100" y="190" width="180" height="60" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="190" y="214" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#e8c800">authSlice</text>
  <text x="190" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">user, token, isLoggedIn</text>
  <text x="190" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">login/logout actions</text>

  <rect x="290" y="190" width="180" height="60" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="380" y="214" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#e8c800">cartSlice</text>
  <text x="380" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">items, total, coupon</text>
  <text x="380" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">add/remove/clear</text>

  <rect x="480" y="190" width="180" height="60" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="570" y="214" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#e8c800">productsSlice</text>
  <text x="570" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">list, loading, filter</text>
  <text x="570" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">fetchProducts</text>

  <rect x="670" y="190" width="180" height="60" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="760" y="214" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#e8c800">uiSlice</text>
  <text x="760" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">modal, toast, theme</text>
  <text x="760" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">showModal/hideModal</text>

  <!-- File structure -->
  <rect x="60" y="280" width="340" height="196" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Feature-based 파일 구조</text>
  <text x="76" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">src/</text>
  <text x="76" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  features/</text>
  <text x="76" y="353" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    auth/</text>
  <text x="76" y="371" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">      authSlice.ts</text>
  <text x="76" y="389" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      authSelectors.ts</text>
  <text x="76" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      LoginForm.tsx</text>
  <text x="76" y="425" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    cart/</text>
  <text x="76" y="443" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">      cartSlice.ts</text>
  <text x="76" y="461" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      CartPage.tsx</text>
  <text x="76" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">  store.ts  // configureStore</text>

  <!-- cartSlice code -->
  <rect x="420" y="280" width="400" height="196" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="436" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// cartSlice.ts</text>
  <text x="436" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> cartSlice = createSlice(&#123;</text>
  <text x="436" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  name: <tspan fill="#ce9178">'cart'</tspan>,</text>
  <text x="436" y="353" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  initialState: &#123; items: [] <tspan fill="#7ec8e3" font-weight="600">as</tspan> Item[] &#125;,</text>
  <text x="436" y="371" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  reducers: &#123;</text>
  <text x="436" y="389" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    addItem: (s, a: PayloadAction&lt;Item&gt;) =&gt;</text>
  <text x="436" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &#123; s.items.push(a.payload); &#125;,</text>
  <text x="436" y="425" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    removeItem: (s, a: PayloadAction&lt;<tspan fill="#7ec8e3" font-weight="600">string</tspan>&gt;) =&gt;</text>
  <text x="436" y="443" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &#123; s.items = s.items.filter(i =&gt; i.id !== a.payload); &#125;,</text>
  <text x="436" y="461" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    clearCart: s =&gt; &#123; s.items = []; &#125;,</text>
  <text x="436" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">  &#125;, &#125;); // export actions, reducer...</text>
</svg>
