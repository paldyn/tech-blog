<svg xmlns="http://www.w3.org/2000/svg" width="880" height="528" viewBox="0 0 880 528">
  <rect width="880" height="528" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">바이트코드 제어 흐름 — max(int, int) 분기 추적</text>

  <!-- ===== Left: Java Source ===== -->
  <rect x="60" y="72" width="290" height="286" fill="#0d1117" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="205" y="96" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e8e8e8">Java 소스</text>
  <text x="205" y="114" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">max(int, int)</text>

  <rect x="76" y="124" width="258" height="222" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="88" y="144" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">static int max(</text>
  <text x="88" y="162" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    int a, int b) {</text>
  <text x="88" y="180" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">  // a > b 이면 a 반환</text>
  <text x="88" y="198" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e05555">  if (a &gt; b) {</text>
  <text x="88" y="216" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">    return a;</text>
  <text x="88" y="234" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  }</text>
  <text x="88" y="252" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">  // a &lt;= b 이면 b 반환</text>
  <text x="88" y="270" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555">  return b;</text>
  <text x="88" y="288" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">}</text>
  <text x="88" y="318" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// javac 컴파일 →</text>
  <text x="88" y="336" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 오른쪽 바이트코드</text>

  <!-- ===== Right: Bytecode ===== -->
  <rect x="400" y="72" width="420" height="286" fill="#0d1117" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="610" y="96" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e8e8e8">바이트코드 (javap -c)</text>
  <text x="610" y="114" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">stack=2, locals=2</text>

  <!-- Bytecode block outer -->
  <rect x="416" y="124" width="388" height="228" fill="#000000" rx="6" stroke="#3a4a6e"/>

  <!-- Lines 0-1: normal (iload) -->
  <text x="428" y="144" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">0: iload_0</text>
  <text x="534" y="144" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">         // push a</text>
  <text x="428" y="162" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">1: iload_1</text>
  <text x="534" y="162" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">         // push b</text>

  <!-- Line 2: if_icmple — highlighted in red (conditional branch) -->
  <rect x="420" y="168" width="380" height="20" fill="#2a1010" rx="2"/>
  <text x="428" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e05555">2: if_icmple 7</text>
  <text x="534" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e05555">   // a&lt;=b? → 7</text>

  <!-- Path label: a > b -->
  <text x="428" y="208" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#9aa4b8">── a &gt; b (거짓, fall-through) ──</text>

  <!-- Lines 5-6: a>b path (blue) -->
  <rect x="420" y="212" width="380" height="20" fill="#0d1a20" rx="2"/>
  <text x="428" y="226" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">5: iload_0</text>
  <text x="534" y="226" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">         // push a</text>
  <rect x="420" y="232" width="380" height="20" fill="#0d1a20" rx="2"/>
  <text x="428" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">6: ireturn</text>
  <text x="534" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">         // return a</text>

  <!-- Path label: a <= b -->
  <text x="428" y="270" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#9aa4b8">── a ≤ b (참, jump target) ───────</text>

  <!-- Lines 7-8: a<=b path (green) -->
  <rect x="420" y="274" width="380" height="20" fill="#0a1a0a" rx="2"/>
  <text x="428" y="288" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555">7: iload_1</text>
  <text x="534" y="288" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555">         // push b</text>
  <rect x="420" y="294" width="380" height="20" fill="#0a1a0a" rx="2"/>
  <text x="428" y="308" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555">8: ireturn</text>
  <text x="534" y="308" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555">         // return b</text>

  <!-- ===== Bottom: Branch flow diagram ===== -->
  <!-- if_icmple box -->
  <rect x="160" y="386" width="200" height="40" fill="#2a1010" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="260" y="412" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555">if_icmple (PC=2)</text>

  <!-- Arrow left: a>b false branch -->
  <line x1="160" y1="406" x2="100" y2="406" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="100" y1="406" x2="100" y2="448" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="93,448 100,462 107,448" fill="#7ec8e3"/>
  <text x="70" y="400" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">거짓</text>
  <text x="70" y="416" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">(a &gt; b)</text>
  <rect x="58" y="462" width="162" height="30" fill="#0d1a20" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="139" y="482" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">PC=5 → return a</text>

  <!-- Arrow right: a<=b true branch (jump) -->
  <line x1="360" y1="406" x2="420" y2="406" stroke="#55c555" stroke-width="2"/>
  <line x1="420" y1="406" x2="420" y2="448" stroke="#55c555" stroke-width="2"/>
  <polygon points="413,448 420,462 427,448" fill="#55c555"/>
  <text x="450" y="400" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">참 (점프)</text>
  <text x="450" y="416" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">(a ≤ b)</text>
  <rect x="340" y="462" width="162" height="30" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="421" y="482" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">PC=7 → return b</text>

  <!-- Note -->
  <text x="640" y="410" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">if_icmple: 스택 top 2개 비교</text>
  <text x="640" y="430" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">조건 성립 시 오프셋으로 점프</text>
  <text x="640" y="450" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">성립 안 하면 다음 명령 실행</text>

  <!-- Caption -->
  <text x="440" y="516" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#9aa4b8">if_icmple = "if integer compare less or equal" — 점프 오프셋은 현재 PC 기준 상대값</text>
</svg>
