<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <!-- 배경 -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SecurityFilterChain 폼 로그인 설정</text>

  <!-- ===== 왼쪽 코드 박스: SecurityFilterChain (x=50, y=68, w=378, h=382) ===== -->
  <rect x="50" y="68" width="378" height="382" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="239" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">SecurityConfig.java</text>
  <line x1="50" y1="104" x2="428" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- 코드 (15줄 × 18px = 270px, first y = 104 + (382-104-270)/2 + 13 = 143) -->
  <!-- adjusted: body=104~450=346, 14줄×18=252, pad=(346-252)/2=47 → first=104+47+13=164 -->
  <text x="66" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="66" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> SecurityFilterChain</tspan></text>
  <text x="66" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#ffffff">filterChain(HttpSecurity http)</tspan></text>
  <text x="66" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">throws</tspan><tspan fill="#ffffff"> Exception {</tspan></text>
  <text x="66" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> http</tspan></text>
  <text x="66" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">.authorizeHttpRequests(auth -&gt; auth</tspan></text>
  <text x="66" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.requestMatchers(</tspan><tspan fill="#ce9178">"/login"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="66" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="122" fill="#ffffff">.permitAll()</tspan></text>
  <text x="66" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.anyRequest().authenticated())</tspan></text>
  <text x="66" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">.formLogin(form -&gt; form</tspan></text>
  <text x="66" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.loginPage(</tspan><tspan fill="#ce9178">"/login"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="66" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.defaultSuccessUrl(</tspan><tspan fill="#ce9178">"/home"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="66" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.failureUrl(</tspan><tspan fill="#ce9178">"/login?error"</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="66" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">.logout(lo -&gt; lo</tspan></text>
  <text x="66" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.logoutSuccessUrl(</tspan><tspan fill="#ce9178">"/"</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="66" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">.build();</tspan></text>
  <text x="66" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- ===== 오른쪽: 핵심 옵션 설명 패널 (x=452, y=68, w=378, h=382) ===== -->
  <rect x="452" y="68" width="378" height="382" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="641" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">주요 옵션 정리</text>
  <line x1="452" y1="104" x2="830" y2="104" stroke="#7777cc" stroke-width="1" opacity="0.35"/>

  <!-- 항목 1: loginPage -->
  <rect x="468" y="120" width="346" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">.loginPage("/login")</text>
  <text x="484" y="159"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커스텀 로그인 페이지 경로 지정</text>

  <!-- 항목 2: defaultSuccessUrl -->
  <rect x="468" y="184" width="346" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="204"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">.defaultSuccessUrl("/home")</text>
  <text x="484" y="223"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인증 성공 후 리다이렉트 경로</text>

  <!-- 항목 3: failureUrl -->
  <rect x="468" y="248" width="346" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="268"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600">.failureUrl("/login?error")</text>
  <text x="484" y="287"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인증 실패 시 이동 경로 (파라미터 포함)</text>

  <!-- 항목 4: usernameParameter/passwordParameter -->
  <rect x="468" y="312" width="346" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="332"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">.usernameParameter("email")</text>
  <text x="484" y="351"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본값 username → 이메일 필드로 변경 가능</text>

  <!-- 항목 5: permitAll() 안내 -->
  <rect x="468" y="376" width="346" height="52" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="484" y="396"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600">.formLogin(...).permitAll()</text>
  <text x="484" y="415"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로그인 URL 자체를 인증 없이 허용</text>
</svg>
