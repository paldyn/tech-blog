<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">etcd Raft 합의 알고리즘</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">과반수 동의 후 커밋 — 1대 장애에도 클러스터 유지</text>

  <!-- etcd nodes -->
  <!-- Leader -->
  <rect x="340" y="100" width="200" height="110" rx="10" fill="#1a100d" stroke="#ce9178" stroke-width="2.5"/>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">etcd Leader</text>
  <text x="440" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Node 1</text>
  <text x="440" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">쓰기 요청 수신</text>
  <text x="440" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">팔로워에 Log 전파</text>
  <text x="440" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">Heartbeat 전송</text>

  <!-- Follower 1 -->
  <rect x="80" y="100" width="200" height="110" rx="10" fill="#111" stroke="#888" stroke-width="1.5"/>
  <text x="180" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">etcd Follower</text>
  <text x="180" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Node 2</text>
  <text x="180" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Log 복제 수신</text>
  <text x="180" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ACK 응답</text>
  <text x="180" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">읽기 서비스 가능</text>

  <!-- Follower 2 -->
  <rect x="600" y="100" width="200" height="110" rx="10" fill="#111" stroke="#888" stroke-width="1.5"/>
  <text x="700" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">etcd Follower</text>
  <text x="700" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Node 3</text>
  <text x="700" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Log 복제 수신</text>
  <text x="700" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ACK 응답</text>
  <text x="700" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">읽기 서비스 가능</text>

  <!-- Leader to Follower arrows -->
  <line x1="340" y1="145" x2="282" y2="145" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>
  <text x="311" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">AppendEntries</text>

  <line x1="542" y1="145" x2="598" y2="145" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>
  <text x="570" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">AppendEntries</text>

  <!-- ACK arrows back -->
  <line x1="282" y1="162" x2="340" y2="162" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="311" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">ACK</text>

  <line x1="598" y1="162" x2="542" y2="162" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="570" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">ACK</text>

  <!-- Commit label -->
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">과반수 (2/3) ACK 수신 → Commit 확정</text>

  <!-- Quorum boxes -->
  <rect x="60" y="264" width="760" height="80" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Quorum 계산 (과반수 = floor(n/2) + 1)</text>
  <text x="220" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3대 클러스터</text>
  <text x="220" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Quorum=2, 1대 장애 허용</text>
  <text x="440" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">5대 클러스터</text>
  <text x="440" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Quorum=3, 2대 장애 허용</text>
  <text x="680" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">2대 클러스터</text>
  <text x="680" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">1대 장애 시 클러스터 중단 (비권장)</text>

  <!-- Code block -->
  <rect x="60" y="366" width="760" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># etcd 클러스터 멤버 확인</text>
  <text x="80" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ETCDCTL_API=3 etcdctl member list --endpoints=https://127.0.0.1:2379</text>
  <text x="80" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># etcd 헬스 체크</text>
  <text x="80" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ETCDCTL_API=3 etcdctl endpoint health</text>
</svg>
