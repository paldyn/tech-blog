<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@property 속성 접근 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Python은 속성 접근 종류에 따라 세 가지 메서드를 자동 호출합니다</text>

  <!-- Row 1: Read (getter) -->
  <!-- Left box: attribute access syntax -->
  <rect x="60" y="100" width="240" height="70" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="180" y="129" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" xml:space="preserve">obj.name</text>
  <text x="180" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">속성 읽기 (read)</text>

  <!-- Arrow -->
  <line x1="300" y1="135" x2="380" y2="135" stroke="#55c555" stroke-width="2"/>
  <polygon points="380,128 396,135 380,142" fill="#55c555"/>
  <text x="340" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">__get__</text>

  <!-- Right box: method called -->
  <rect x="400" y="100" width="300" height="70" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="550" y="126" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">@property</text>
  <text x="550" y="145" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">def name(self): ...</text>
  <text x="550" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">fget 함수 호출 → 반환값</text>

  <!-- Row 2: Write (setter) -->
  <rect x="60" y="200" width="240" height="70" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="180" y="229" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" xml:space="preserve">obj.name = value</text>
  <text x="180" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">속성 쓰기 (write)</text>

  <!-- Arrow -->
  <line x1="300" y1="235" x2="380" y2="235" stroke="#e8c040" stroke-width="2"/>
  <polygon points="380,228 396,235 380,242" fill="#e8c040"/>
  <text x="340" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">__set__</text>

  <!-- Right box -->
  <rect x="400" y="200" width="300" height="70" rx="8" fill="#0d1117" stroke="#e8c040" stroke-width="1.5"/>
  <text x="550" y="226" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c040" xml:space="preserve">@name.setter</text>
  <text x="550" y="245" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">def name(self, v): ...</text>
  <text x="550" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">fset 함수 호출 → 유효성 검사</text>

  <!-- Row 3: Delete (deleter) -->
  <rect x="60" y="300" width="240" height="70" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="180" y="329" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" xml:space="preserve">del obj.name</text>
  <text x="180" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">속성 삭제 (delete)</text>

  <!-- Arrow -->
  <line x1="300" y1="335" x2="380" y2="335" stroke="#e05555" stroke-width="2"/>
  <polygon points="380,328 396,335 380,342" fill="#e05555"/>
  <text x="340" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">__delete__</text>

  <!-- Right box -->
  <rect x="400" y="300" width="300" height="70" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="550" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">@name.deleter</text>
  <text x="550" y="345" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">def name(self): ...</text>
  <text x="550" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">fdel 함수 호출 → 리소스 정리</text>

  <!-- Footer note -->
  <rect x="60" y="395" width="760" height="44" rx="6" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">setter·deleter 미정의 시: </text>
  <text x="510" y="414" text-anchor="start" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">AttributeError</text>
  <text x="440" y="431" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">읽기 전용(read-only) 속성 구현에 @property만 정의하는 패턴이 일반적</text>
</svg>
