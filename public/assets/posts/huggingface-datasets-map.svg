<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset.map() — 데이터 변환 파이프라인</text>

  <!-- Left: Raw Dataset -->
  <rect x="60" y="70" width="220" height="140" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">원본 Dataset</text>
  <text x="170" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">{'text': '안녕하세요',</text>
  <text x="170" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle"> 'label': 0}</text>
  <text x="170" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">{'text': '반갑습니다',</text>
  <text x="170" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle"> 'label': 1}</text>
  <text x="170" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">N rows × M columns</text>

  <!-- Arrow -->
  <line x1="280" y1="140" x2="328" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="304" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.map(fn)</text>

  <!-- Middle: Transform function -->
  <rect x="330" y="70" width="220" height="140" rx="8" fill="#1a2c1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">변환 함수</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">def preprocess(batch):</text>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">  return tokenizer(</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">    batch["text"],</text>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">    truncation=True)</text>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">batched=True로 병렬화</text>

  <!-- Arrow -->
  <line x1="550" y1="140" x2="598" y2="140" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="574" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">결과</text>

  <!-- Right: Transformed Dataset -->
  <rect x="600" y="70" width="220" height="140" rx="8" fill="#1a2c1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="710" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">변환된 Dataset</text>
  <text x="710" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">{'input_ids': [101, ...],</text>
  <text x="710" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle"> 'attention_mask': [1,..],</text>
  <text x="710" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle"> 'label': 0}</text>
  <text x="710" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컬럼 추가/제거 가능</text>
  <text x="710" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">캐시에 자동 저장</text>

  <!-- Column operations row -->
  <text x="60" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">컬럼 조작 API</text>

  <rect x="60" y="260" width="190" height="80" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="155" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">select / filter</text>
  <text x="155" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ds.select(range(1000))</text>
  <text x="155" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ds.filter(lambda x: ...)</text>

  <rect x="265" y="260" width="190" height="80" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="360" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">rename / remove</text>
  <text x="360" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">rename_column("old","new")</text>
  <text x="360" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">remove_columns(["col"])</text>

  <rect x="470" y="260" width="190" height="80" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="565" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#c77ec8" text-anchor="middle">sort / shuffle</text>
  <text x="565" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ds.sort("label")</text>
  <text x="565" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ds.shuffle(seed=42)</text>

  <rect x="675" y="260" width="165" height="80" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="757" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">train_test_split</text>
  <text x="757" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ds.train_test_split(</text>
  <text x="757" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">  test_size=0.2)</text>

  <!-- Code block -->
  <rect x="60" y="366" width="760" height="94" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># batched=True — 배치 단위로 처리하여 토크나이저 속도 10x 향상</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">tokenized = ds.map(preprocess, batched=</text>
  <text x="418" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">True</text>
  <text x="444" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, num_proc=</text>
  <text x="556" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">4</text>
  <text x="564" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">tokenized = tokenized.remove_columns([</text>
  <text x="400" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"text"</text>
  <text x="440" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">])</text>
  <text x="76" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">tokenized.set_format(</text>
  <text x="232" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"torch"</text>
  <text x="284" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, columns=[</text>
  <text x="374" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"input_ids"</text>
  <text x="452" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, </text>
  <text x="466" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"label"</text>
  <text x="514" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">])</text>
</svg>
