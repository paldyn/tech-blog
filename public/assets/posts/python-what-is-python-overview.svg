<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python이란 무엇인가?</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">범용 인터프리터 언어의 네 가지 핵심 특징</text>

  <!-- 인터프리터 언어 -->
  <rect x="60" y="86" width="360" height="98" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="112" font-size="14" font-weight="700" fill="#7ec8e3">인터프리터 언어</text>
  <text x="80" y="132" font-size="12" fill="#aaa">소스 코드를 한 줄씩 즉시 실행</text>
  <text x="80" y="150" font-size="12" fill="#aaa">컴파일 단계 없이 바로 결과 확인</text>
  <text x="80" y="170" font-size="11" fill="#666">빠른 개발·디버깅 사이클 가능</text>

  <!-- 동적 타이핑 -->
  <rect x="460" y="86" width="360" height="98" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="112" font-size="14" font-weight="700" fill="#55c555">동적 타이핑</text>
  <text x="480" y="132" font-size="12" fill="#aaa">타입을 명시하지 않고 변수 사용</text>
  <text x="480" y="150" font-size="12" fill="#aaa">실행 시점에 타입이 결정됨</text>
  <text x="480" y="170" font-size="11" fill="#666">코드가 간결하고 표현력이 높음</text>

  <!-- 범용 언어 -->
  <rect x="60" y="202" width="360" height="98" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="228" font-size="14" font-weight="700" fill="#7777cc">범용 언어</text>
  <text x="80" y="248" font-size="12" fill="#aaa">웹·데이터·AI·자동화 전 분야</text>
  <text x="80" y="266" font-size="12" fill="#aaa">방대한 표준 + 서드파티 생태계</text>
  <text x="80" y="286" font-size="11" fill="#666">하나의 언어로 다양한 문제 해결</text>

  <!-- 높은 가독성 -->
  <rect x="460" y="202" width="360" height="98" rx="8" fill="#0f1820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="480" y="228" font-size="14" font-weight="700" fill="#ce9178">높은 가독성</text>
  <text x="480" y="248" font-size="12" fill="#aaa">영어 의사코드처럼 읽히는 문법</text>
  <text x="480" y="266" font-size="12" fill="#aaa">들여쓰기로 블록 구조를 표현</text>
  <text x="480" y="286" font-size="11" fill="#666">초보자도 직관적으로 이해 가능</text>

  <!-- Code block -->
  <rect x="60" y="320" width="760" height="160" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># Python 한눈에 보기</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">name = </tspan><tspan fill="#ce9178">"Python"</tspan><tspan fill="#6a8aa0">  # 타입 선언 불필요</tspan></text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">numbers = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">]</tspan></text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> n </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> numbers:</tspan></text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">f"{name}: {n}"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># Python: 1  Python: 2  Python: 3</text>
  <text x="76" y="456" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 영어처럼 읽히는 코드</text>
</svg>
