<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python이란 무엇인가?</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Python의 핵심 특징과 설계 철학</text>
  <rect x="60" y="100" width="180" height="80" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">인터프리터 언어</text>
  <text x="150" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">소스 코드를 즉시 실행</text>
  <text x="150" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">별도 컴파일 불필요</text>
  <rect x="270" y="100" width="180" height="80" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">동적 타이핑</text>
  <text x="360" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">변수 타입을 런타임에 결정</text>
  <text x="360" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">타입 선언 불필요</text>
  <rect x="480" y="100" width="180" height="80" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="570" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">멀티 패러다임</text>
  <text x="570" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">절차형·OOP·함수형</text>
  <text x="570" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">모두 지원</text>
  <rect x="690" y="100" width="130" height="80" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="755" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">가독성 최우선</text>
  <text x="755" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">들여쓰기로</text>
  <text x="755" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">블록 구분</text>
  <rect x="60" y="210" width="360" height="210" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Python 코드 예시</text>
  <text x="76" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 간결하고 읽기 쉬운 Python</text>
  <text x="76" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> greet(name):</tspan></text>
  <text x="76" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">f"Hello, {name}!"</tspan></text>
  <text x="76" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> </text>
  <text x="76" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> person </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> [</tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"Bob"</tspan><tspan fill="#ffffff">]:</tspan></text>
  <text x="76" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(greet(person))</tspan></text>
  <text x="76" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Hello, Alice! / Hello, Bob!</text>
  <rect x="460" y="210" width="360" height="210" rx="8" fill="#0f1a0f" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Python 주요 활용 분야</text>
  <rect x="480" y="248" width="150" height="36" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="555" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">데이터 과학 / AI</text>
  <rect x="648" y="248" width="152" height="36" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="724" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">웹 백엔드</text>
  <rect x="480" y="298" width="150" height="36" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="555" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">자동화 / 스크립트</text>
  <rect x="648" y="298" width="152" height="36" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="724" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">DevOps / 클라우드</text>
  <rect x="480" y="348" width="150" height="36" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="555" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">게임 / 교육</text>
  <rect x="648" y="348" width="152" height="36" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="724" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">임베디드 / IoT</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">간결함&#160;·&#160;명확함&#160;·&#160;생산성 — Python의 설계 원칙</text>
</svg>
