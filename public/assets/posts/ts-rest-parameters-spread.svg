<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">스프레드 연산자와 함수 호출</text>

  <!-- Left: Spread in call -->
  <text x="230" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">함수 호출 시 스프레드</text>

  <rect x="60" y="88" width="340" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> add(a: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">, b: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">) {</tspan>
  </text>
  <text x="75" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> a + b;</tspan>
  </text>
  <text x="75" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="75" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> pair: [</tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">] = [</tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">7</tspan>
    <tspan fill="#ffffff">];</tspan>
  </text>
  <text x="75" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 튜플 타입 → 안전하게 스프레드</text>
  <text x="75" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">add(...pair);    </tspan>
    <tspan fill="#9aa4b8">// OK: 10</tspan>
  </text>
  <text x="75" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#9aa4b8">// add(...[1,2,3]): 오류!</tspan>
  </text>

  <!-- Right: Generic rest + spread -->
  <text x="650" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">제네릭 Rest + 스프레드</text>

  <rect x="480" y="88" width="340" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="495" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 함수 래핑 패턴</text>
  <text x="495" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> withLog&lt;T </tspan>
    <tspan fill="#7ec8e3" font-weight="600">extends</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">any</tspan>
    <tspan fill="#ffffff">[]&gt;(</tspan>
  </text>
  <text x="495" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  fn: (...args: T) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">=&gt; void</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="495" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  ...args: T</tspan>
  </text>
  <text x="495" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">) {</tspan>
  </text>
  <text x="495" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  console.log(args); fn(...args);</tspan>
  </text>
  <text x="495" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Bottom: Practical examples -->
  <text x="440" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">실용 패턴 예시</text>

  <rect x="60" y="280" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// Math.max 래퍼 — 타입 안전하게</text>
  <text x="75" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> nums = [</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">5</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">9</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">] </tspan>
    <tspan fill="#7ec8e3" font-weight="600">as const</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="75" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">Math.max(...nums);              </tspan>
    <tspan fill="#9aa4b8">// OK</tspan>
  </text>
  <text x="75" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// console.log 스타일: 첫 인수 레벨, 나머지 데이터</text>
  <text x="75" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> debug(tag: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">, ...data: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">unknown</tspan>
    <tspan fill="#ffffff">[]): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">void</tspan>
    <tspan fill="#ffffff"> { console.log(tag, ...data); }</tspan>
  </text>
  <text x="75" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">debug(</tspan>
    <tspan fill="#ce9178">'[API]'</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">'status'</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">200</tspan>
    <tspan fill="#ffffff">, { ok: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">true</tspan>
    <tspan fill="#ffffff"> });   </tspan>
    <tspan fill="#9aa4b8">// 타입 안전</tspan>
  </text>
</svg>
