<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">디지털 신호 인코딩 방식</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">비트를 물리 신호로 변환하는 방법들</text>

  <!-- Data bits label -->
  <text x="100" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">데이터 비트:</text>
  <text x="220" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">0  1  0  0  1  1  0  1</text>

  <!-- NRZ-L -->
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">NRZ-L</text>
  <!-- signal: 0=low, 1=high -->
  <polyline points="160,160 200,160 200,120 240,120 240,160 280,160 320,160 320,120 360,120 400,120 400,160 440,160 480,120 520,160"
            fill="none" stroke="#55c555" stroke-width="2"/>
  <text x="540" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">0=Low, 1=High</text>
  <text x="540" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DC 성분 있음</text>

  <!-- Manchester -->
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Manchester</text>
  <!-- 0: high->low mid, 1: low->high mid -->
  <polyline points="160,220 180,220 180,240 200,240 200,200 220,200 220,240 240,240 240,220 260,220 260,200 280,200 280,240 300,240 300,200 320,200 320,220 340,220 340,200 360,200 360,240 380,240 380,200 400,200 400,220 420,220 420,240 440,240 440,200 460,200 460,220 480,220 480,200 500,200 500,240 520,240"
            fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <text x="540" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">0=↓ 1=↑ (클럭 내장)</text>
  <text x="540" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이더넷 10BASE-T 사용</text>

  <!-- 4B/5B -->
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">4B/5B</text>
  <text x="160" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">4비트:</text>
  <text x="216" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">0000</text>
  <text x="340" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→</text>
  <text x="360" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">11110</text>
  <text x="160" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">4비트:</text>
  <text x="216" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">0001</text>
  <text x="340" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→</text>
  <text x="360" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">01001</text>
  <text x="540" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">4비트를 5비트로 매핑</text>
  <text x="540" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">연속 0 방지, 동기화</text>
  <text x="540" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">오버헤드: 25%</text>

  <!-- 8B/10B -->
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">8B/10B</text>
  <text x="160" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">8비트 → 10비트 (DC 균형 + 동기화)</text>
  <text x="160" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기가비트 이더넷(GbE), SATA 사용</text>
  <text x="540" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">±1 이상의 불균형 방지</text>
  <text x="540" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">오버헤드: 25%</text>

  <!-- Grid lines for signal diagrams -->
  <line x1="160" y1="112" x2="160" y2="170" stroke="#1e2a3a" stroke-width="1"/>
  <line x1="200" y1="112" x2="200" y2="170" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="240" y1="112" x2="240" y2="170" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="280" y1="112" x2="280" y2="170" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="320" y1="112" x2="320" y2="170" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="360" y1="112" x2="360" y2="170" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="400" y1="112" x2="400" y2="170" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="440" y1="112" x2="440" y2="170" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="480" y1="112" x2="480" y2="170" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="520" y1="112" x2="520" y2="170" stroke="#1e2a3a" stroke-width="1"/>

  <!-- Bottom summary -->
  <rect x="60" y="410" width="760" height="32" rx="6" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="431" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">현대 고속 이더넷(10GbE+): PAM4(4레벨 펄스 진폭 변조) 사용 — 심볼당 2비트 전송</text>
</svg>
