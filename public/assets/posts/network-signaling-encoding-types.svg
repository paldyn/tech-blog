<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">디지털 신호 인코딩 방식 비교</text>

  <!-- Bit sequence label -->
  <text x="80" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">비트: 1 0 1 1 0 0 1 0</text>

  <!-- NRZ-L (Non-Return to Zero Level) -->
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">NRZ-L (단극성)</text>
  <line x1="80" y1="130" x2="80" y2="160" stroke="#7ec8e3" stroke-width="1.5"/>
  <!-- 1=high, 0=low -->
  <polyline points="80,130 160,130 160,160 240,160 240,130 320,130 400,130 400,160 480,160 560,160 560,130 640,130 640,160 720,160" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <line x1="720" y1="160" x2="800" y2="160" stroke="#7ec8e3" stroke-width="2.5" stroke-dasharray="4,4"/>
  <text x="810" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">High=1</text>
  <text x="810" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Low=0</text>

  <!-- Manchester -->
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Manchester (이더넷)</text>
  <!-- 1=Low-to-High, 0=High-to-Low -->
  <polyline points="80,230 120,230 120,210 160,210 160,230 200,230 200,210 240,210 240,230 280,230 280,210 320,210 320,230 360,230 360,210 400,210 400,230 440,230 440,210 480,210 480,230 520,230 520,210 560,210 560,230 600,230 600,210 640,210 640,230 680,230 680,210 720,210" fill="none" stroke="#55c555" stroke-width="2.5"/>
  <!-- Clock transitions in middle of each bit -->
  <polyline points="80,210 120,210 120,230 160,230 160,230 200,230 200,210 240,210 240,230 280,230 280,210 320,210 320,230" fill="none" stroke="#55c555" stroke-width="2.5"/>
  <!-- Simplify: just draw the actual Manchester encoding -->
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">각 비트 중간에 전이: ↑=1, ↓=0</text>

  <!-- NRZI -->
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a55c">NRZI (차분 인코딩)</text>
  <polyline points="80,290 160,290 160,310 240,310 240,290 320,290 400,290 400,310 480,310 560,310 560,290 640,290 640,310 720,310" fill="none" stroke="#e8a55c" stroke-width="2.5"/>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">1=전이 발생, 0=전이 없음</text>

  <!-- Summary table -->
  <rect x="60" y="350" width="760" height="90" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">인코딩 방식 비교</text>
  <text x="200" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">NRZ-L: 구현 간단, DC 성분 문제</text>
  <text x="200" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">클록 동기화 어려움</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Manchester: 자체 클록 동기화</text>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">2배 대역폭 필요</text>
  <text x="690" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a55c" text-anchor="middle">NRZI: USB, 광섬유 사용</text>
  <text x="690" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">연속 0은 동기화 어려움</text>
</svg>
