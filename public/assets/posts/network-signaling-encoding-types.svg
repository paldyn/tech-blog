<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">디지털 신호 인코딩 방식</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">비트 0과 1을 전기 신호로 표현하는 방법</text>

  <!-- Data bits label -->
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">데이터 비트:</text>
  <text x="200" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#ffffff">1  0  1  1  0  0  1</text>

  <!-- NRZ (Non-Return-to-Zero) -->
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">NRZ (단순)</text>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">1=고전압, 0=저전압</text>
  <!-- NRZ waveform for 1 0 1 1 0 0 1 -->
  <!-- x positions: 200,310,360,410,460,510,560,610,670 -->
  <polyline points="200,175 260,175 260,200 320,200 320,175 380,175 380,175 440,175 440,200 500,200 500,200 560,200 560,175 620,175"
            fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <line x1="200" y1="188" x2="620" y2="188" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="640" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">0V</text>

  <!-- Manchester -->
  <text x="80" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Manchester</text>
  <text x="80" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">1=하강 에지, 0=상승 에지</text>
  <!-- Manchester waveform: 1(H->L), 0(L->H), 1(H->L), 1(H->L), 0(L->H), 0(L->H), 1(H->L) -->
  <polyline points="200,260 230,260 230,280 260,280 260,260 290,260 290,280 320,280 320,260 350,260 350,280 380,280 380,260 410,260 410,280 440,280 440,260 470,260 470,280 500,280 500,260 530,260 530,280 560,280 560,260 590,260 590,280 620,280"
            fill="none" stroke="#55c555" stroke-width="2.5"/>
  <line x1="200" y1="270" x2="620" y2="270" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="640" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">0V</text>
  <text x="220" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#55c555">1</text>
  <text x="280" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#55c555">0</text>

  <!-- 4B/5B + NRZI block -->
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">4B/5B + NRZI (Fast Ethernet)</text>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">4비트를 5비트로 확장해 연속 0 방지, NRZI로 클록 동기</text>
  <rect x="200" y="346" width="420" height="34" rx="5" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="270" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">0100 → 01011  |  1011 → 10111</text>

  <!-- 8b/10b block -->
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">8B/10B (Gigabit Ethernet, PCI-e)</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">8비트 → 10비트. DC 밸런스 유지, 클록 복원에 최적</text>
  <rect x="200" y="428" width="420" height="22" rx="5" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="410" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">오버헤드 25% — 실효 대역폭 80%</text>
</svg>
