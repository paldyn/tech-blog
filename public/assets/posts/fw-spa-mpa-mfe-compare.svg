  <text x="700" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Micro-Frontend</text>

  <!-- Row: 초기 로드 -->
  <text x="60" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">초기 로드</text>
  <rect x="60" y="196" width="240" height="44" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">느림 (JS 번들 전체 로드)</text>
  <rect x="320" y="196" width="240" height="44" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">빠름 (페이지별 최소 JS)</text>
  <rect x="580" y="196" width="240" height="44" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">매우 느림 (다수 번들)</text>

  <!-- Row: 페이지 전환 -->
  <text x="60" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">페이지 전환</text>
  <rect x="60" y="272" width="240" height="44" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
