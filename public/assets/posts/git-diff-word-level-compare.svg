<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">줄 단위 vs 단어 단위 diff</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">한 단어만 고쳐도 줄 diff는 줄 전체를 다시 보여준다</text>

  <!-- line diff box -->
  <rect x="60" y="100" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본 줄 단위</text>
  <text x="78" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">- 결제 금액은 1000 원입니다.</text>
  <text x="78" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">+ 결제 금액은 2000 원입니다.</text>
  <text x="78" y="195" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">→ 어디가 바뀌었는지 눈으로 찾아야 한다</text>

  <!-- word diff box -->
  <rect x="60" y="222" width="760" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># --word-diff</text>
  <text x="78" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">결제 금액은 <tspan fill="#e05555">[-1000-]</tspan><tspan fill="#55c555">{+2000+}</tspan> 원입니다.</text>
  <text x="78" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">→ 바뀐 단어만 콕 집어 보여준다</text>
</svg>
