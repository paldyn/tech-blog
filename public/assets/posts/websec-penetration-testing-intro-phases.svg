<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <defs>
    <marker id="arr-blue6" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green6" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">침투 테스트 진행 단계</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">계약된 범위 안에서, 공격자의 절차를 그대로 따라간다</text>

  <!-- Row 1: 3 phases -->
  <rect x="50" y="100" width="240" height="90" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">1. 범위 정의 · 계약</text>
  <text x="170" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">대상 시스템 · 기간 · 금지 행위</text>
  <text x="170" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">서면 승인 (Rules of Engagement)</text>

  <rect x="320" y="100" width="240" height="90" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">2. 정찰 (Reconnaissance)</text>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">OSINT · 서브도메인 열거</text>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">기술 스택 식별 · 공격 표면 지도</text>

  <rect x="590" y="100" width="240" height="90" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">3. 스캐닝 · 취약점 분석</text>
  <text x="710" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">포트 · 서비스 스캔 (nmap)</text>
  <text x="710" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">취약점 후보 선별 · 검증 계획</text>

  <line x1="290" y1="145" x2="318" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue6)"/>
  <line x1="560" y1="145" x2="588" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue6)"/>

  <!-- connector to row 2 -->
  <path d="M 710 190 C 710 225, 170 215, 170 248" fill="none" stroke="#7ec8e3"
        stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-blue6)"/>

  <!-- Row 2: 3 phases -->
  <rect x="50" y="250" width="240" height="90" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">4. 익스플로잇 (Exploitation)</text>
  <text x="170" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">취약점 실증 · 접근 권한 획득</text>
  <text x="170" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">범위 내에서 통제된 공격만</text>

  <rect x="320" y="250" width="240" height="90" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">5. 포스트 익스플로잇</text>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">권한 상승 · 횡적 이동 가능성</text>
  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">실제 피해 범위(영향도) 평가</text>

  <rect x="590" y="250" width="240" height="90" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">6. 보고 · 재테스트</text>
  <text x="710" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">재현 절차 · 위험도 · 권고안</text>
  <text x="710" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">수정 후 재검증 (Retest)</text>

  <line x1="290" y1="295" x2="318" y2="295" stroke="#e05555" stroke-width="2" marker-end="url(#arr-blue6)"/>
  <line x1="560" y1="295" x2="588" y2="295" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green6)"/>

  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">산출물은 익스플로잇이 아니라 보고서다 — 재현 가능하고 우선순위가 매겨진 개선 목록</text>
</svg>
