<svg xmlns="http://www.w3.org/2000/svg" width="880" height="396" viewBox="0 0 880 396">
  <defs>
    <marker id="mcA" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="396" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ArgumentCaptor의 작동</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Mock에 전달된 인자를 붙잡아 검증</text>

  <!-- SUT -->
  <rect x="60" y="110" width="220" height="80" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">service.signup()</text>
  <text x="170" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">내부에서 User 생성</text>
  <text x="170" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">save(user) 호출</text>

  <!-- Mock -->
  <rect x="360" y="110" width="220" height="80" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">repository (Mock)</text>
  <text x="470" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">save(User) 수신</text>
  <text x="470" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">전달 인자 보관</text>

  <!-- Captor -->
  <rect x="660" y="110" width="160" height="80" rx="8" fill="#0a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">Captor</text>
  <text x="740" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">인자 붙잡기</text>
  <text x="740" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">getValue()</text>

  <line x1="280" y1="150" x2="360" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mcA)"/>
  <line x1="580" y1="150" x2="660" y2="150" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#mcA)"/>

  <!-- note -->
  <rect x="60" y="222" width="760" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">언제 ArgumentCaptor를 쓰나</text>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">· SUT가 내부에서 만든 객체를 Mock에 넘길 때, 그 객체의 필드를 검증</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">· 예: save(user) 의 user.name 이 입력값과 같은지 확인</text>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">· verify(repo).save(captor.capture()) → captor.getValue() 로 꺼냄</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">· 단순 인자 매칭은 eq()/any() 로 충분 — 캡처는 내부 객체 검증용</text>
</svg>
