<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">OpenAI API 코딩 활용 예시</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">GPT-4o Code Generation + Tool Calling</text>

  <!-- Left: Code generation -->
  <text x="80" y="102" font-size="13" font-weight="600" fill="#55c555">코드 생성 (GPT-4o)</text>
  <rect x="60" y="114" width="370" height="186" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="112" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> openai </text>
  <text x="166" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="208" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> OpenAI</text>
  <text x="76" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">client = OpenAI()</text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">response = client.chat.completions</text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    .create(</text>
  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    model=</text>
  <text x="130" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">"gpt-4o"</text>
  <text x="76" y="236" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    messages=[{</text>
  <text x="76" y="254" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">        "role"</text>
  <text x="132" y="254" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">: </text>
  <text x="144" y="254" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">"user"</text>
  <text x="76" y="272" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">        "content"</text>
  <text x="152" y="272" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">: prompt}])</text>
  <text x="76" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">code = response.choices[</text>
  <text x="252" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="260" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">]</text>
  <text x="76" y="312" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    .message.content</text>

  <!-- Right: o-series reasoning -->
  <text x="456" y="102" font-size="13" font-weight="600" fill="#7777cc">o-series 추론 모델 (코딩 최적)</text>
  <rect x="440" y="114" width="380" height="186" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># o4-mini: 빠른 추론, 저비용</text>
  <text x="456" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># o3: 최고 성능, 복잡한 문제</text>
  <text x="456" y="180" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">response = client.chat.completions</text>
  <text x="456" y="198" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    .create(</text>
  <text x="456" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    model=</text>
  <text x="510" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">"o4-mini"</text>
  <text x="456" y="234" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    reasoning_effort=</text>
  <text x="590" y="234" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">"medium"</text>
  <text x="456" y="254" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    messages=[{</text>
  <text x="456" y="272" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">        "role"</text>
  <text x="512" y="272" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">: </text>
  <text x="524" y="272" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">"user"</text>
  <text x="456" y="290" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">        "content"</text>
  <text x="532" y="290" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">: hard_algo_problem</text>
  <text x="456" y="308" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    }])</text>

  <!-- Model comparison boxes -->
  <text x="60" y="332" font-size="14" font-weight="600" fill="#e8e8e8">모델 선택 가이드</text>

  <rect x="60" y="346" width="180" height="24" rx="4" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="362" text-anchor="middle" font-size="12" fill="#888">GPT-4o → 일반 코딩, 빠른 응답</text>

  <rect x="256" y="346" width="180" height="24" rx="4" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="346" y="362" text-anchor="middle" font-size="12" fill="#888">o4-mini → 알고리즘, 수학</text>

  <rect x="452" y="346" width="180" height="24" rx="4" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="542" y="362" text-anchor="middle" font-size="12" fill="#888">o3 → 복잡한 아키텍처 설계</text>

  <text x="60" y="375" font-size="12" fill="#555">* o-series 모델은 내부적으로 단계별 추론(Chain of Thought)을 수행해 알고리즘 문제에 특히 강함</text>
</svg>
