<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">코드 리뷰 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">PR 생성부터 머지까지 — 작성자와 리뷰어의 역할</text>

  <!-- Columns: Author (left), Reviewer (right) -->
  <text x="220" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">작성자 (Author)</text>
  <text x="660" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">리뷰어 (Reviewer)</text>

  <!-- Vertical center line -->
  <line x1="440" y1="104" x2="440" y2="490" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: Create PR -->
  <rect x="100" y="108" width="240" height="46" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">① PR 생성</text>
  <text x="220" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">제목·설명·스크린샷·테스트 결과 포함</text>

  <!-- Arrow: PR → Reviewer notified -->
  <line x1="340" y1="131" x2="540" y2="131" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)" stroke-dasharray="4,4"/>

  <!-- Step 2: Reviewer reads -->
  <rect x="540" y="108" width="240" height="46" rx="6" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="660" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9988dd">② 코드 검토</text>
  <text x="660" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">변경 이유 이해 → 로직·스타일·테스트</text>

  <!-- Arrows down -->
  <line x1="660" y1="154" x2="660" y2="190" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- Step 3: Leave comments -->
  <rect x="540" y="196" width="240" height="46" rx="6" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="660" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9988dd">③ 코멘트 작성</text>
  <text x="660" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">질문 / 제안 / 필수 수정 구분 명시</text>

  <!-- Arrow: comment → author -->
  <line x1="540" y1="219" x2="340" y2="219" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)" stroke-dasharray="4,4"/>

  <!-- Step 4: Author responds -->
  <rect x="100" y="196" width="240" height="46" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">④ 수정 또는 답변</text>
  <text x="220" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">동의 시 수정, 이견 시 근거로 토론</text>

  <line x1="220" y1="242" x2="220" y2="278" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- Step 5: Re-request review -->
  <rect x="100" y="284" width="240" height="46" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="304" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">⑤ Re-request review</text>
  <text x="220" y="322" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">수정 완료 후 리뷰어에게 재요청</text>

  <!-- Arrow: re-request → reviewer -->
  <line x1="340" y1="307" x2="540" y2="307" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)" stroke-dasharray="4,4"/>

  <!-- Step 6: Approve or Request Changes -->
  <rect x="540" y="284" width="240" height="46" rx="6" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="660" y="304" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9988dd">⑥ Approve / Changes 요청</text>
  <text x="660" y="322" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">충분하면 Approve, 아니면 반복</text>

  <!-- Decision: Approve branch -->
  <line x1="660" y1="330" x2="660" y2="366" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Step 7: Merge -->
  <rect x="300" y="372" width="280" height="46" rx="6" fill="#071a07" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">⑦ 머지</text>
  <text x="440" y="410" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CI 통과 + Required Approve 충족</text>

  <!-- Arrow from approve to merge -->
  <line x1="580" y1="372" x2="560" y2="372" stroke="#55c555" stroke-width="1.5"/>

  <!-- Footer note -->
  <text x="440" y="460" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Draft PR</text>
  <text x="440" y="478" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">작업 초반에 Draft PR을 열어 방향성 공유 → 큰 방향 수정을 일찍 잡을 수 있다</text>
  <text x="440" y="498" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Ready for review 클릭 시 정식 리뷰 요청으로 전환</text>
</svg>
