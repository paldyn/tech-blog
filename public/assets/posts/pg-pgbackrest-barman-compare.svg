  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">pgBackRest 추천: 클라우드/S3 중심, 대용량 DB, 병렬 처리 필요</text>
