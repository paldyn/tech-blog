<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">build vs image 플로우</text>

  <!-- Left: image flow -->
  <text x="200" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">image: 레지스트리에서 pull</text>

  <!-- Registry -->
  <rect x="80" y="98" width="240" height="52" rx="8" fill="#132030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Docker Hub / ECR / GHCR</text>
  <text x="200" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">image: nginx:1.25</text>

  <line x1="200" y1="150" x2="200" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="214" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker pull</text>

  <!-- Local image cache -->
  <rect x="80" y="182" width="240" height="48" rx="8" fill="#111820" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">로컬 이미지 캐시</text>
  <text x="200" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">이미 있으면 pull 생략</text>

  <line x1="200" y1="230" x2="200" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Container -->
  <rect x="80" y="260" width="240" height="48" rx="8" fill="#0f1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">컨테이너 실행</text>
  <text x="200" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">항상 같은 이미지</text>

  <!-- image pros/cons -->
  <rect x="60" y="326" width="280" height="92" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="200" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">장점</text>
  <text x="200" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빌드 시간 없음, 팀 전체 동일 이미지</text>
  <text x="200" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">단점</text>
  <text x="200" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">레지스트리 push 필요</text>
  <text x="200" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">코드 변경 → 빌드·push 순서 필요</text>

  <!-- Divider -->
  <line x1="440" y1="72" x2="440" y2="440" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right: build flow -->
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">build: 로컬에서 빌드</text>

  <!-- Source code -->
  <rect x="540" y="98" width="280" height="52" rx="8" fill="#181828" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">소스 코드 + Dockerfile</text>
  <text x="680" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">build: { context: ./api }</text>

  <line x1="680" y1="150" x2="680" y2="180" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="694" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker build</text>

  <!-- Build result -->
  <rect x="540" y="182" width="280" height="48" rx="8" fill="#181828" stroke="#7777cc" stroke-width="1"/>
  <text x="680" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">로컬 이미지 생성</text>
  <text x="680" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">BuildKit 레이어 캐시 활용</text>

  <line x1="680" y1="230" x2="680" y2="258" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Container -->
  <rect x="540" y="260" width="280" height="48" rx="8" fill="#0f1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">컨테이너 실행</text>
  <text x="680" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">--build 옵션 시 재빌드</text>

  <!-- build pros/cons -->
  <rect x="520" y="326" width="300" height="92" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="670" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">장점</text>
  <text x="670" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">코드 변경 즉시 반영 가능</text>
  <text x="670" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">단점</text>
  <text x="670" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">첫 빌드 느림</text>
  <text x="670" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">팀원마다 빌드 결과 다를 수 있음</text>

  <!-- Bottom: combined tip -->
  <rect x="60" y="434" width="760" height="36" rx="8" fill="#181828" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="457" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">build + image 함께 쓰기: 빌드 후 image 이름 부여 → compose push로 레지스트리에 공유 가능</text>
</svg>
