<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">zip · enumerate 고급 활용</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">zip_longest · unzip · 다중 리스트</text>

  <!-- zip_longest -->
  <rect x="60" y="100" width="360" height="160" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">zip_longest — 긴 쪽에 맞춤</text>
  <rect x="76" y="136" width="328" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from</tspan> itertools <tspan fill="#7ec8e3">import</tspan> zip_longest</text>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a = [<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">2</tspan>, <tspan fill="#b5cea8">3</tspan>]</text>
  <text x="92" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">b = [<tspan fill="#ce9178">"a"</tspan>, <tspan fill="#ce9178">"b"</tspan>]</text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">list</tspan>(zip_longest(a, b, fillvalue=<tspan fill="#b5cea8">0</tspan>))</text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># [(1,'a'),(2,'b'),(3,0)]</tspan></text>

  <!-- unzip -->
  <rect x="460" y="100" width="360" height="160" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">zip(*pairs) — 언패킹 (unzip)</text>
  <rect x="476" y="136" width="328" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">pairs = [(<tspan fill="#ce9178">"a"</tspan>,<tspan fill="#b5cea8">1</tspan>), (<tspan fill="#ce9178">"b"</tspan>,<tspan fill="#b5cea8">2</tspan>), (<tspan fill="#ce9178">"c"</tspan>,<tspan fill="#b5cea8">3</tspan>)]</text>
  <text x="492" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">keys, vals = <tspan fill="#7ec8e3">zip</tspan>(*pairs)</text>
  <text x="492" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># keys = ('a', 'b', 'c')</tspan></text>
  <text x="492" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># vals = (1, 2, 3)</tspan></text>
  <text x="492" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 전치(transpose) 효과</tspan></text>

  <!-- enumerate with modify -->
  <rect x="60" y="280" width="360" height="150" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="240" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">enumerate + 수정 패턴</text>
  <rect x="76" y="316" width="328" height="98" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 인덱스 기반 수정</tspan></text>
  <text x="92" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">data = [<tspan fill="#b5cea8">10</tspan>, <tspan fill="#b5cea8">20</tspan>, <tspan fill="#b5cea8">30</tspan>]</text>
  <text x="92" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for</tspan> i, v <tspan fill="#7ec8e3">in</tspan> <tspan fill="#7ec8e3">enumerate</tspan>(data):</text>
  <text x="92" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">if</tspan> v > <tspan fill="#b5cea8">15</tspan>: data[i] *= <tspan fill="#b5cea8">2</tspan></text>
  <text x="92" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># [10, 40, 60]</tspan></text>

  <!-- zip + enumerate combo -->
  <rect x="460" y="280" width="360" height="150" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">zip + enumerate 조합</text>
  <rect x="476" y="316" width="328" height="98" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">hs = [<tspan fill="#b5cea8">178</tspan>,<tspan fill="#b5cea8">165</tspan>,<tspan fill="#b5cea8">182</tspan>]</text>
  <text x="492" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">ws = [<tspan fill="#b5cea8">70</tspan>,<tspan fill="#b5cea8">55</tspan>,<tspan fill="#b5cea8">80</tspan>]</text>
  <text x="492" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for</tspan> i,(h,w) <tspan fill="#7ec8e3">in</tspan> <tspan fill="#7ec8e3">enumerate</tspan>(<tspan fill="#7ec8e3">zip</tspan>(hs,ws)):</text>
  <text x="492" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    bmi = w / (h/<tspan fill="#b5cea8">100</tspan>)**<tspan fill="#b5cea8">2</tspan></text>
  <text x="492" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    print(i, <tspan fill="#ce9178">f"BMI={bmi:.1f}"</tspan>)</text>

  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">zip(a,b)를 enumerate와 함께 쓸 때 튜플 언패킹에 주의</text>
</svg>
