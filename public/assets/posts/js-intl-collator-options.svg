<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">Intl.Collator — 옵션 비교</text>

  <!-- sensitivity 섹션 -->
  <rect x="60" y="76" width="360" height="200" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="102" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600">sensitivity 옵션</text>

  <!-- sensitivity rows -->
  <rect x="80" y="114" width="320" height="28" fill="#0d1117" rx="4"/>
  <text x="96" y="133" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'base'</text>
  <text x="200" y="133" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">a≡á≡A  (문자 기반만)</text>

  <rect x="80" y="148" width="320" height="28" fill="#111" rx="4"/>
  <text x="96" y="167" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'accent'</text>
  <text x="200" y="167" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">a≡A, a≠á  (악센트 구분)</text>

  <rect x="80" y="182" width="320" height="28" fill="#0d1117" rx="4"/>
  <text x="96" y="201" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'case'</text>
  <text x="200" y="201" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">a≠A, a≡á  (대소문자 구분)</text>

  <rect x="80" y="216" width="320" height="28" fill="#111" rx="4"/>
  <text x="96" y="235" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'variant'</text>
  <text x="200" y="235" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">a≠á≠A  (기본값, 전부 구분)</text>

  <text x="80" y="264" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">용도: 검색/필터링 → 'base' | 사전 정렬 → 'variant'</text>

  <!-- usage 섹션 -->
  <rect x="460" y="76" width="360" height="200" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="480" y="102" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600">usage &amp; caseFirst 옵션</text>

  <rect x="480" y="114" width="320" height="28" fill="#0d1117" rx="4"/>
  <text x="496" y="133" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">usage: 'sort'</text>
  <text x="620" y="133" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">사전식 정렬 (기본)</text>

  <rect x="480" y="148" width="320" height="28" fill="#111" rx="4"/>
  <text x="496" y="167" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">usage: 'search'</text>
  <text x="620" y="167" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">검색 최적화 (더 넓게)</text>

  <rect x="480" y="182" width="320" height="28" fill="#0d1117" rx="4"/>
  <text x="496" y="201" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">caseFirst: 'upper'</text>
  <text x="620" y="201" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">대문자 우선 정렬</text>

  <rect x="480" y="216" width="320" height="28" fill="#111" rx="4"/>
  <text x="496" y="235" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">caseFirst: 'lower'</text>
  <text x="620" y="235" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">소문자 우선 정렬</text>

  <text x="480" y="264" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">numeric: true → '10' &gt; '9'  (숫자 자연 정렬)</text>

  <!-- 정렬 예시 코드 -->
  <rect x="60" y="300" width="760" height="180" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="326" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="326" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> col = new Intl.Collator(</text>
  <text x="340" y="326" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'ko-KR'</text>
  <text x="400" y="326" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, {</text>
  <text x="80" y="344" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">  sensitivity: </text>
  <text x="206" y="344" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'base'</text>
  <text x="248" y="344" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, numeric: </text>
  <text x="340" y="344" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">true</text>
  <text x="372" y="344" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">,</text>
  <text x="80" y="362" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">});</text>
  <text x="80" y="392" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// compare() 반환: -1(앞), 0(같음), 1(뒤)</text>
  <text x="80" y="410" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">col.compare(</text>
  <text x="172" y="410" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'사과'</text>
  <text x="222" y="410" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, </text>
  <text x="236" y="410" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'바나나'</text>
  <text x="296" y="410" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);  </text>
  <text x="340" y="410" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// -1 (사 &lt; 바)</text>
  <text x="80" y="428" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">['item10','item2'].sort(col.compare); </text>
  <text x="380" y="428" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// ['item2','item10']</text>
  <text x="80" y="458" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// resolvedOptions() — 실제 적용된 옵션 확인</text>
  <text x="80" y="476" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">col.resolvedOptions().locale; </text>
  <text x="308" y="476" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 'ko-KR'</text>
</svg>
