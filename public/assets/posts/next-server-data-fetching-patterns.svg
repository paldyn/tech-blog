<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-down-b" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 0 L 7 13 L 13 0 z" fill="#e05555"/>
    </marker>
    <marker id="arr-right-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">순차 패칭 vs 병렬 패칭</text>

  <!-- Left: Sequential -->
  <rect x="50" y="68" width="360" height="380" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="230" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">순차 패칭 (Waterfall)</text>

  <!-- Timeline bars -->
  <rect x="90" y="118" width="60" height="20" rx="3" fill="#3a5a7e"/>
  <text x="160" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자 조회 (200ms)</text>

  <rect x="90" y="148" width="100" height="20" rx="3" fill="#3a5a7e"/>
  <text x="200" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">게시물 조회 (300ms)</text>

  <rect x="90" y="178" width="60" height="20" rx="3" fill="#3a5a7e"/>
  <text x="160" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">댓글 조회 (200ms)</text>

  <text x="230" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">총 700ms</text>

  <rect x="70" y="230" width="320" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="86" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 순차적 — 각각 기다림</text>
  <text x="86" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="124" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> user = await getUser(id)</text>
  <text x="86" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// user 완료 후 시작</text>
  <text x="86" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="124" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> posts = await getPosts(user.id)</text>
  <text x="86" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// posts 완료 후 시작</text>
  <text x="86" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="124" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> comments = await getComments()</text>

  <rect x="70" y="386" width="320" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="405" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">서로 의존성 없어도 순서대로 대기</text>
  <text x="230" y="422" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">user.id 없이 posts를 못 가져올 때만 허용</text>

  <!-- Right: Parallel -->
  <rect x="470" y="68" width="360" height="380" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="650" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">병렬 패칭 (Promise.all)</text>

  <!-- Timeline bars (parallel) -->
  <rect x="510" y="118" width="100" height="20" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자 조회 (200ms)</text>

  <rect x="510" y="118" width="100" height="20" rx="3" fill="none" stroke="#888" stroke-width="0"/>
  <rect x="510" y="118" width="100" height="60" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">게시물 조회 (300ms)</text>
  <rect x="510" y="118" width="60" height="60" rx="3" fill="none" stroke="#888" stroke-width="0"/>
  <!-- just use 3 bars that show they start at same time -->
  <rect x="510" y="144" width="60" height="20" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="580" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">댓글 (200ms)</text>

  <text x="650" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">총 300ms (가장 긴 것 기준)</text>

  <rect x="490" y="214" width="320" height="158" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 병렬 — Promise.all 동시 시작</text>
  <text x="506" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="544" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> [user, posts, comments]</text>
  <text x="506" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  = await Promise.all([</text>
  <text x="506" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    getUser(id),</text>
  <text x="506" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    getPosts(id),</text>
  <text x="506" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    getComments(id),</text>
  <text x="506" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  ])</text>
  <text x="506" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// 셋 다 독립적이면 병렬 사용</text>

  <rect x="490" y="386" width="320" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="405" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">독립적인 요청은 항상 병렬로</text>
  <text x="650" y="422" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">의존성이 있을 때만 순차 사용</text>
</svg>
