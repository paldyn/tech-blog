<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">반례를 찾고 최소화(shrink)한다</text>

  <defs>
    <marker id="arr9" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="100" width="220" height="72" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="132" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">입력 생성</text>
  <text x="170" y="154" font-size="12" fill="#888" text-anchor="middle">다양한 값 자동 생성</text>

  <rect x="330" y="100" width="220" height="72" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="132" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">반례 발견</text>
  <text x="440" y="154" font-size="12" fill="#888" text-anchor="middle">[-1, 9999, 0, ...]</text>

  <rect x="600" y="100" width="220" height="72" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="132" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">최소화</text>
  <text x="710" y="154" font-size="12" fill="#888" text-anchor="middle">[0] 처럼 가장 단순하게</text>

  <line x1="280" y1="136" x2="324" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr9)"/>
  <line x1="550" y1="136" x2="594" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr9)"/>

  <text x="60" y="222" font-size="13" fill="#888" xml:space="preserve">실패가 나면 그대로 멈추지 않고, 같은 실패를 내는 가장 작고 단순한 입력까지 줄여서 보여 준다.</text>
  <text x="60" y="252" font-size="13" fill="#888" xml:space="preserve">덕분에 "거대한 무작위 입력"이 아니라 "디버깅하기 쉬운 최소 반례"를 손에 쥔다.</text>
</svg>
