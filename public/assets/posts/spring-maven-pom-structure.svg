<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pom.xml 핵심 구조</text>

  <!-- pom.xml code block -->
  <rect x="60" y="64" width="460" height="400" fill="#070b14" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;project&gt;</text>
  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  &lt;!-- 1. 부모 POM --&gt;</text>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  &lt;parent&gt;</text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    &lt;groupId&gt;org.springframework.boot&lt;/groupId&gt;</text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    &lt;artifactId&gt;spring-boot-starter-parent</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    &lt;/artifactId&gt;</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">    &lt;version&gt;3.3.0&lt;/version&gt;</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  &lt;/parent&gt;</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  &lt;!-- 2. 프로젝트 좌표 --&gt;</text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  &lt;groupId&gt;com.example&lt;/groupId&gt;</text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  &lt;artifactId&gt;my-app&lt;/artifactId&gt;</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  &lt;version&gt;0.0.1-SNAPSHOT&lt;/version&gt;</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  &lt;!-- 3. 의존성 --&gt;</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  &lt;dependencies&gt;</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    &lt;dependency&gt;</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">      &lt;groupId&gt;org.springframework.boot&lt;/groupId&gt;</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">      &lt;artifactId&gt;spring-boot-starter-web&lt;/artifactId&gt;</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    &lt;/dependency&gt;</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  &lt;/dependencies&gt;</text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;/project&gt;</text>
  <text x="76" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 버전 없음 → 부모 BOM이 결정</text>

  <!-- Right: annotation boxes -->
  <!-- 1. 부모 POM -->
  <rect x="548" y="80" width="272" height="72" fill="#131a2a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="684" y="100" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">1. 부모 POM</text>
  <text x="564" y="120" font-size="11" fill="#888">spring-boot-starter-parent가</text>
  <text x="564" y="136" font-size="11" fill="#888">의존성 버전 전체를 관리 (BOM)</text>
  <line x1="520" y1="152" x2="548" y2="130" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 2. 프로젝트 좌표 -->
  <rect x="548" y="220" width="272" height="72" fill="#1a110a" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="684" y="240" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">2. 프로젝트 좌표 (GAV)</text>
  <text x="564" y="260" font-size="11" fill="#888">groupId:artifactId:version으로</text>
  <text x="564" y="276" font-size="11" fill="#888">저장소에서 고유하게 식별됨</text>
  <line x1="520" y1="278" x2="548" y2="256" stroke="#ce9178" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 3. 의존성 -->
  <rect x="548" y="360" width="272" height="72" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="684" y="380" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">3. 의존성</text>
  <text x="564" y="400" font-size="11" fill="#888">버전 생략 가능 — 부모 BOM이</text>
  <text x="564" y="416" font-size="11" fill="#888">호환되는 버전을 자동 결정</text>
  <line x1="520" y1="394" x2="548" y2="400" stroke="#55c555" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Footer -->
  <text x="440" y="490" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #6</text>
</svg>
