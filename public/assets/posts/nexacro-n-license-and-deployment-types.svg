<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N 라이선스 구조</text>

  <!-- ── Left: 개발 라이선스 ── -->
  <rect x="60" y="68" width="345" height="406" rx="10" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="232" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#7777cc">개발 라이선스</text>

  <!-- Studio N License -->
  <rect x="80" y="114" width="305" height="120" rx="6" fill="#131b2e" stroke="#1e2433"/>
  <text x="232" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Studio N 사용 라이선스</text>
  <text x="232" y="162" text-anchor="middle" font-size="12" fill="#888">개발자 1인 = Named 라이선스 1개</text>
  <text x="232" y="182" text-anchor="middle" font-size="12" fill="#888">개발용 런타임 내장 (Test Run 가능)</text>
  <text x="232" y="202" text-anchor="middle" font-size="12" fill="#55c555">✓ 팀원 수만큼 라이선스 필요</text>

  <!-- Activation -->
  <rect x="80" y="254" width="305" height="100" rx="6" fill="#131b2e" stroke="#1e2433"/>
  <text x="232" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">라이선스 활성화</text>
  <text x="232" y="300" text-anchor="middle" font-size="12" fill="#888">온라인: 투비소프트 포털 계정 연동</text>
  <text x="232" y="320" text-anchor="middle" font-size="12" fill="#888">오프라인: 머신 코드 → 키 파일 발급</text>

  <!-- Left notes -->
  <text x="232" y="384" text-anchor="middle" font-size="12" fill="#7ec8e3">※ 개발 라이선스로 운영 환경 배포 불가</text>
  <text x="232" y="404" text-anchor="middle" font-size="12" fill="#888">운영 배포 시 별도 운영 라이선스 필요</text>
  <text x="232" y="424" text-anchor="middle" font-size="12" fill="#888">라이선스 문의: 투비소프트 고객센터</text>
  <text x="232" y="448" text-anchor="middle" font-size="12" fill="#888">※ 교육 및 평가판 별도 문의 가능</text>

  <!-- Center arrow (shaft ≥30px, head width ≥16px) -->
  <text x="440" y="249" text-anchor="middle" font-size="11" fill="#888">빌드·배포</text>
  <polygon points="408,261 452,261 452,255 472,265 452,275 452,269 408,269"
           fill="#555" stroke="#333" stroke-width="1"/>

  <!-- ── Right: 운영 라이선스 ── -->
  <rect x="475" y="68" width="345" height="406" rx="10" fill="#0f1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="648" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#55c555">운영(배포) 라이선스</text>

  <!-- Named User -->
  <rect x="495" y="114" width="305" height="90" rx="6" fill="#131b2e" stroke="#1e2433"/>
  <text x="648" y="138" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Named User License</text>
  <text x="648" y="160" text-anchor="middle" font-size="12" fill="#888">접속 계정(ID) 수 기준 과금</text>
  <text x="648" y="180" text-anchor="middle" font-size="12" fill="#888">사내 업무 시스템, 고정 사용자 환경</text>

  <!-- Concurrent User -->
  <rect x="495" y="220" width="305" height="90" rx="6" fill="#131b2e" stroke="#1e2433"/>
  <text x="648" y="244" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Concurrent User License</text>
  <text x="648" y="266" text-anchor="middle" font-size="12" fill="#888">동시 접속자 수 기준 과금</text>
  <text x="648" y="286" text-anchor="middle" font-size="12" fill="#888">포털·대민 서비스, 유동 사용자 환경</text>

  <!-- Server License -->
  <rect x="495" y="326" width="305" height="90" rx="6" fill="#131b2e" stroke="#1e2433"/>
  <text x="648" y="350" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Server License</text>
  <text x="648" y="372" text-anchor="middle" font-size="12" fill="#888">서버 대수 기준 (특수 구성 시 적용)</text>
  <text x="648" y="392" text-anchor="middle" font-size="12" fill="#888">클라우드·컨테이너 환경 별도 협의</text>

  <!-- Right notes -->
  <text x="648" y="436" text-anchor="middle" font-size="12" fill="#888">세부 조건 및 단가: 투비소프트 영업팀</text>
  <text x="648" y="456" text-anchor="middle" font-size="12" fill="#888">공공기관 단가 계약·MAS 납품 가능</text>

  <!-- Footer -->
  <text x="440" y="500" text-anchor="middle" font-size="11" fill="#444">© PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
