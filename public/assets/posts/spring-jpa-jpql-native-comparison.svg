<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#ffffff">
    JPQL vs SQL — 핵심 차이
  </text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8">
    JPQL은 엔티티 객체를 대상으로, SQL은 테이블을 대상으로 작동합니다
  </text>

  <!-- Left header: JPQL -->
  <rect x="50" y="86" width="360" height="36" rx="6" fill="#0f1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="109" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">
    JPQL (Java Persistence Query Language)
  </text>

  <!-- Right header: Native SQL -->
  <rect x="470" y="86" width="360" height="36" rx="6" fill="#1e1a0e" stroke="#e0a055" stroke-width="1.5"/>
  <text x="650" y="109" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e0a055">
    Native SQL
  </text>

  <!-- Left code block: JPQL -->
  <rect x="50" y="130" width="360" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text xml:space="preserve" x="66" y="156"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">
    // 엔티티 클래스명·필드명 사용
  </text>
  <text xml:space="preserve" x="66" y="174"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">SELECT</tspan><tspan> u </tspan><tspan fill="#7ec8e3">FROM</tspan><tspan> User u</tspan>
  </text>
  <text xml:space="preserve" x="66" y="192"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">WHERE</tspan><tspan> u.status = </tspan><tspan fill="#b5cea8">:status</tspan>
  </text>
  <text xml:space="preserve" x="66" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">AND</tspan><tspan> u.age &gt;= </tspan><tspan fill="#b5cea8">:minAge</tspan>
  </text>
  <text xml:space="preserve" x="66" y="246"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">
    // JOIN도 엔티티 연관관계 기반
  </text>
  <text xml:space="preserve" x="66" y="264"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">SELECT</tspan><tspan> u </tspan><tspan fill="#7ec8e3">FROM</tspan><tspan> User u</tspan>
  </text>
  <text xml:space="preserve" x="66" y="282"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">JOIN FETCH</tspan><tspan> u.orders o</tspan>
  </text>
  <text xml:space="preserve" x="66" y="300"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">WHERE</tspan><tspan> o.amount &gt; </tspan><tspan fill="#b5cea8">:amount</tspan>
  </text>
  <text xml:space="preserve" x="66" y="336"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">
    // 결과: User 엔티티 리스트
  </text>

  <!-- Right code block: Native SQL -->
  <rect x="470" y="130" width="360" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text xml:space="preserve" x="486" y="156"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">
    // 실제 테이블명·컬럼명 사용
  </text>
  <text xml:space="preserve" x="486" y="174"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">SELECT</tspan><tspan> * </tspan><tspan fill="#7ec8e3">FROM</tspan><tspan> tbl_user u</tspan>
  </text>
  <text xml:space="preserve" x="486" y="192"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">WHERE</tspan><tspan> u.user_status = </tspan><tspan fill="#b5cea8">:status</tspan>
  </text>
  <text xml:space="preserve" x="486" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">AND</tspan><tspan> u.user_age &gt;= </tspan><tspan fill="#b5cea8">:minAge</tspan>
  </text>
  <text xml:space="preserve" x="486" y="246"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">
    // DB 함수·힌트 사용 가능
  </text>
  <text xml:space="preserve" x="486" y="264"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">SELECT</tspan><tspan> * </tspan><tspan fill="#7ec8e3">FROM</tspan><tspan> tbl_user u</tspan>
  </text>
  <text xml:space="preserve" x="486" y="282"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">USE INDEX</tspan><tspan>(idx_age)</tspan>
  </text>
  <text xml:space="preserve" x="486" y="300"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">WHERE</tspan><tspan> u.user_age &gt; </tspan><tspan fill="#b5cea8">:amount</tspan>
  </text>
  <text xml:space="preserve" x="486" y="336"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">
    // 결과: Object[] 또는 매핑 필요
  </text>

  <!-- Comparison table -->
  <rect x="50" y="366" width="780" height="94" rx="6" fill="#111" stroke="#222"/>

  <!-- Table headers -->
  <text x="90" y="386"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">항목</text>
  <text x="260" y="386"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">JPQL</text>
  <text x="560" y="386"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0a055">Native SQL</text>

  <line x1="66" y1="392" x2="814" y2="392" stroke="#222" stroke-width="1"/>

  <text x="90" y="410"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">쿼리 대상</text>
  <text x="260" y="410"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">엔티티 클래스 · 필드명</text>
  <text x="560" y="410"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">실제 테이블 · 컬럼명</text>

  <text x="90" y="430"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DB 이식성</text>
  <text x="260" y="430"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">DB 독립적 (Dialect 추상화)</text>
  <text x="560" y="430"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">DB 종속적 (방언 문법)</text>

  <text x="90" y="450"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용 시점</text>
  <text x="260" y="450"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">일반적인 비즈니스 쿼리</text>
  <text x="560" y="450"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">성능 튜닝 · DB 전용 함수</text>

  <line x1="244" y1="372" x2="244" y2="454" stroke="#222" stroke-width="1"/>
  <line x1="544" y1="372" x2="544" y2="454" stroke="#222" stroke-width="1"/>
</svg>
