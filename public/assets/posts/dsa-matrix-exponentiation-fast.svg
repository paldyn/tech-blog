<svg width="880" height="450" viewBox="0 0 880 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrB5" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">행렬 빠른 거듭제곱: M¹³ = M⁸ · M⁴ · M¹</text>

  <rect x="60" y="84" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">지수 13 = </tspan><tspan fill="#7ec8e3" font-weight="600">1101₂</tspan><tspan fill="#ffffff"> — 수의 거듭제곱과 완전히 같은 구조, 곱셈만 행렬 곱으로</tspan></text>

  <!-- squaring chain -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <rect x="60" y="190" width="150" height="70" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="84" y="218" xml:space="preserve" fill="#ffffff">M¹</text>
    <text x="84" y="242" xml:space="preserve" fill="#55c555" font-weight="600">bit0=1 곱함</text>

    <rect x="250" y="190" width="150" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="274" y="218" xml:space="preserve" fill="#9aa4b8">M²</text>
    <text x="274" y="242" xml:space="preserve" fill="#9aa4b8">bit1=0 스킵</text>

    <rect x="440" y="190" width="150" height="70" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="464" y="218" xml:space="preserve" fill="#ffffff">M⁴</text>
    <text x="464" y="242" xml:space="preserve" fill="#55c555" font-weight="600">bit2=1 곱함</text>

    <rect x="630" y="190" width="150" height="70" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="654" y="218" xml:space="preserve" fill="#ffffff">M⁸</text>
    <text x="654" y="242" xml:space="preserve" fill="#55c555" font-weight="600">bit3=1 곱함</text>
  </g>

  <!-- arrows -->
  <line x1="212" y1="225" x2="248" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB5)"/>
  <line x1="402" y1="225" x2="438" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB5)"/>
  <line x1="592" y1="225" x2="628" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB5)"/>
  <text x="230" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제곱</text>
  <text x="420" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제곱</text>
  <text x="610" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제곱</text>

  <!-- complexity -->
  <rect x="60" y="304" width="760" height="44" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">k×k 행렬 곱 1회 = O(k³)  →  전체 </tspan><tspan fill="#55c555" font-weight="600">O(k³ log n)</tspan></text>

  <text x="60" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">피보나치(k=2): n = 10¹⁸ 도 행렬 곱 약 120회 — 단순 반복 O(n)과 비교 불가</text>
  <text x="60" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">행렬 곱은 결합법칙이 성립하므로 (교환법칙은 불필요) 거듭제곱 분할이 그대로 적용된다</text>
</svg>
