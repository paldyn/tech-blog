<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 3 마일스톤</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">주요 버전별 핵심 추가 기능</text>

  <!-- Row 1 -->
  <rect x="60" y="90" width="180" height="70" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">3.5 (2015)</text>
  <text x="150" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">async/await 문법</text>
  <text x="150" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">타입 힌트 (PEP 484)</text>

  <rect x="270" y="90" width="180" height="70" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="360" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">3.6 (2016)</text>
  <text x="360" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">f-string 도입</text>
  <text x="360" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">dict 삽입 순서 보장</text>

  <rect x="480" y="90" width="180" height="70" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">3.8 (2019)</text>
  <text x="570" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">walrus operator :=</text>
  <text x="570" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">positional-only params</text>

  <rect x="690" y="90" width="130" height="70" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">3.9 (2020)</text>
  <text x="755" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">dict 병합 |=</text>
  <text x="755" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">list[int] 힌트</text>

  <!-- Row 2 -->
  <rect x="60" y="185" width="180" height="70" rx="8" fill="#0f1025" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">3.10 (2021)</text>
  <text x="150" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">match/case 문</text>
  <text x="150" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">X | Y 타입 유니온</text>

  <rect x="270" y="185" width="180" height="70" rx="8" fill="#0f1025" stroke="#7777cc" stroke-width="1.5"/>
  <text x="360" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">3.11 (2022)</text>
  <text x="360" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">25% 속도 향상</text>
  <text x="360" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">ExceptionGroup</text>

  <rect x="480" y="185" width="180" height="70" rx="8" fill="#0f1025" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">3.12 (2023)</text>
  <text x="570" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">개선된 오류 메시지</text>
  <text x="570" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">타입 파라미터 문법</text>

  <rect x="690" y="185" width="130" height="70" rx="8" fill="#1f1020" stroke="#e05555" stroke-width="1.5"/>
  <text x="755" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">3.13 (2024)</text>
  <text x="755" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">실험적 JIT</text>
  <text x="755" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">GIL 선택 해제</text>

  <!-- code example -->
  <rect x="60" y="278" width="760" height="82" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 버전 확인</text>
  <text x="76" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> sys</tspan></text>
  <text x="76" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(sys.version)  </tspan><tspan fill="#9aa4b8"># 3.13.0 (main, ...) ...</tspan></text>

  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">Python 3.12+ 사용 권장 — EOL 전까지 보안 패치 제공</text>
</svg>
