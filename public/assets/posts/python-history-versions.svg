<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 3.x 주요 버전 변화</text>

  <!-- Header row -->
  <rect x="60" y="64" width="760" height="36" rx="4" fill="#111827"/>
  <text x="130" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">버전</text>
  <text x="280" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">출시</text>
  <text x="570" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">핵심 변화</text>

  <!-- Rows -->
  <rect x="60" y="104" width="760" height="36" rx="0" fill="#0d1117"/>
  <text x="130" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">3.5</text>
  <text x="280" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">2015</text>
  <text x="560" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">async/await 구문, typing 모듈 도입</text>

  <rect x="60" y="144" width="760" height="36" rx="0" fill="#0a0a0a"/>
  <text x="130" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">3.6</text>
  <text x="280" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">2016</text>
  <text x="560" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">f-string, 변수 어노테이션, dict 순서 보장</text>

  <rect x="60" y="184" width="760" height="36" rx="0" fill="#0d1117"/>
  <text x="130" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">3.8</text>
  <text x="280" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">2019</text>
  <text x="560" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Walrus 연산자 (:=), 위치 전용 매개변수</text>

  <rect x="60" y="224" width="760" height="36" rx="0" fill="#0a0a0a"/>
  <text x="130" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">3.10</text>
  <text x="280" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">2021</text>
  <text x="560" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">match-case 패턴 매칭, 개선된 오류 메시지</text>

  <rect x="60" y="264" width="760" height="36" rx="0" fill="#0d1117"/>
  <text x="130" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">3.11</text>
  <text x="280" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">2022</text>
  <text x="560" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">평균 25% 성능 향상, ExceptionGroup 도입</text>

  <rect x="60" y="304" width="760" height="36" rx="0" fill="#0a0a0a"/>
  <text x="130" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">3.12~</text>
  <text x="280" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">2023~</text>
  <text x="560" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">추가 성능 향상, 실험적 GIL 제거 (3.13)</text>

  <line x1="60" y1="104" x2="820" y2="104" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="144" x2="820" y2="144" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="184" x2="820" y2="184" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="224" x2="820" y2="224" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="264" x2="820" y2="264" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="304" x2="820" y2="304" stroke="#1e293b" stroke-width="1"/>
  <rect x="60" y="64" width="760" height="276" rx="4" fill="none" stroke="#1e293b" stroke-width="1"/>
  <line x1="200" y1="64" x2="200" y2="340" stroke="#1e293b" stroke-width="1"/>
  <line x1="360" y1="64" x2="360" y2="340" stroke="#1e293b" stroke-width="1"/>
</svg>
