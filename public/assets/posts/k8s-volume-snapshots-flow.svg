<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Volume Snapshot — 생성과 복원 흐름</text>

  <!-- Snapshot Creation flow -->
  <text x="220" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">스냅샷 생성</text>

  <!-- PVC source -->
  <rect x="60" y="96" width="140" height="64" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">PVC (원본)</text>
  <text x="130" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">db-data (20Gi)</text>
  <text x="130" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Bound</text>

  <line x1="200" y1="128" x2="230" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- VolumeSnapshot -->
  <rect x="232" y="96" width="156" height="64" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="310" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">VolumeSnapshot</text>
  <text x="310" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자 요청 오브젝트</text>
  <text x="310" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">ReadyToUse: true</text>

  <line x1="388" y1="128" x2="418" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- VolumeSnapshotContent -->
  <rect x="420" y="96" width="190" height="64" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="515" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">VolumeSnapshotContent</text>
  <text x="515" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클러스터 수준 오브젝트</text>
  <text x="515" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실제 스냅샷 메타데이터</text>

  <line x1="610" y1="128" x2="640" y2="128" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>

  <!-- Cloud Snapshot -->
  <rect x="642" y="96" width="178" height="64" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="731" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">클라우드 스냅샷</text>
  <text x="731" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AWS EBS Snapshot</text>
  <text x="731" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">snap-0abc1234</text>

  <!-- Restore flow -->
  <line x1="440" y1="196" x2="820" y2="196" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">스냅샷에서 복원</text>

  <!-- Snapshot source -->
  <rect x="60" y="238" width="156" height="64" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="138" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">VolumeSnapshot</text>
  <text x="138" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">db-snapshot-20260605</text>
  <text x="138" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">ReadyToUse: true</text>

  <line x1="216" y1="270" x2="246" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- New PVC from snapshot -->
  <rect x="248" y="238" width="180" height="64" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="338" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">PVC (복원)</text>
  <text x="338" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dataSource: snapshot 참조</text>
  <text x="338" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Bound (복원된 데이터)</text>

  <line x1="428" y1="270" x2="458" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- New Pod using restored PVC -->
  <rect x="460" y="238" width="160" height="64" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Pod (복원)</text>
  <text x="540" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">복원된 PVC 마운트</text>
  <text x="540" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DB 데이터 복구 완료</text>

  <!-- VolumeSnapshotClass box -->
  <rect x="60" y="330" width="760" height="140" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">VolumeSnapshotClass (스냅샷 정책 정의)</text>

  <rect x="80" y="000" width="0" height="0" rx="0"/>

  <!-- Code -->
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">driver</text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">        : ebs.csi.aws.com</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">deletionPolicy</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff"> : Delete</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#9aa4b8">           # or Retain</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">parameters</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">    :</text>
  <text x="76" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">  csi.storage.k8s.io/snapshotter-secret-name: </text>
  <text x="595" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ce9178">aws-secret</text>
  <text x="76" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#9aa4b8">  # deletionPolicy: Retain → VolumeSnapshot 삭제 시 클라우드 스냅샷 보존</text>
</svg>
