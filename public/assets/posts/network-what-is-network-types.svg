<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">네트워크 범위별 분류</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">PAN · LAN · MAN · WAN</text>

  <!-- PAN -->
  <rect x="60" y="100" width="175" height="130" rx="10" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="147" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">PAN</text>
  <text x="147" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Personal Area Network</text>
  <text x="147" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반경 ~10m</text>
  <text x="147" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Bluetooth, 개인 기기</text>
  <text x="147" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스마트폰 ↔ 이어폰</text>

  <!-- LAN -->
  <rect x="270" y="100" width="175" height="130" rx="10" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="357" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">LAN</text>
  <text x="357" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Local Area Network</text>
  <text x="357" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반경 ~1km</text>
  <text x="357" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이더넷, Wi-Fi</text>
  <text x="357" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사무실, 가정</text>

  <!-- MAN -->
  <rect x="480" y="100" width="175" height="130" rx="10" fill="#1a1a0f" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="567" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8c44a">MAN</text>
  <text x="567" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Metropolitan Area Network</text>
  <text x="567" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반경 ~100km</text>
  <text x="567" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">광케이블, 도시망</text>
  <text x="567" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">도시 단위 연결</text>

  <!-- WAN -->
  <rect x="690" y="100" width="130" height="130" rx="10" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="755" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">WAN</text>
  <text x="755" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Wide Area Network</text>
  <text x="755" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수천 km 이상</text>
  <text x="755" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인터넷, 위성</text>
  <text x="755" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">국가/대륙 연결</text>

  <!-- scale bar -->
  <line x1="60" y1="280" x2="820" y2="280" stroke="#333" stroke-width="1.5"/>
  <circle cx="147" cy="280" r="5" fill="#7777cc"/>
  <circle cx="357" cy="280" r="5" fill="#55c555"/>
  <circle cx="567" cy="280" r="5" fill="#e8c44a"/>
  <circle cx="755" cy="280" r="5" fill="#e05555"/>
  <text x="60" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">개인</text>
  <text x="770" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">전 세계</text>
  <text x="440" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">← 범위 확대 →</text>

  <!-- code box: topology types -->
  <rect x="60" y="330" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">주요 토폴로지 (Topology)</text>
  <text x="80" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">버스형  — 하나의 케이블에 모든 장치 연결</text>
  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">스타형  — 중앙 허브/스위치에 방사형 연결 (가장 일반적)</text>
  <text x="80" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">링형    — 원형으로 연결, 각 노드가 다음 노드로 전달</text>
</svg>
