<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrt" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">네트워크 규모별 분류</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">커버리지 범위에 따른 네트워크 유형</text>

  <!-- Scale diagram - horizontal -->
  <!-- PAN -->
  <rect x="60" y="100" width="140" height="88" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">PAN</text>
  <text x="130" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Personal Area</text>
  <text x="130" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Bluetooth, USB</text>
  <text x="130" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">~10m</text>

  <!-- LAN -->
  <rect x="220" y="100" width="140" height="88" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="290" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">LAN</text>
  <text x="290" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Local Area</text>
  <text x="290" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Ethernet, Wi-Fi</text>
  <text x="290" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">~1km (사무실/집)</text>

  <!-- MAN -->
  <rect x="380" y="100" width="140" height="88" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="450" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">MAN</text>
  <text x="450" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Metropolitan Area</text>
  <text x="450" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Metro Ethernet</text>
  <text x="450" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">~100km (도시)</text>

  <!-- WAN -->
  <rect x="540" y="100" width="140" height="88" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="610" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">WAN</text>
  <text x="610" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Wide Area</text>
  <text x="610" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">MPLS, 전용선</text>
  <text x="610" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">국가/대륙 규모</text>

  <!-- Internet -->
  <rect x="700" y="100" width="140" height="88" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="770" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">Internet</text>
  <text x="770" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Global Network</text>
  <text x="770" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">TCP/IP</text>
  <text x="770" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전세계</text>

  <!-- Arrows between -->
  <line x1="200" y1="144" x2="220" y2="144" stroke="#55c555" stroke-width="2" marker-end="url(#arrt)"/>
  <line x1="360" y1="144" x2="380" y2="144" stroke="#55c555" stroke-width="2" marker-end="url(#arrt)"/>
  <line x1="520" y1="144" x2="540" y2="144" stroke="#55c555" stroke-width="2" marker-end="url(#arrt)"/>
  <line x1="680" y1="144" x2="700" y2="144" stroke="#55c555" stroke-width="2" marker-end="url(#arrt)"/>

  <!-- Code block: protocol stack -->
  <rect x="60" y="220" width="380" height="216" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">프로토콜 계층 예시</text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 웹 요청 한 번에 관여하는 프로토콜</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 7: 응용</text>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">HTTP</text>
  <text x="124" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">/ DNS</text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 4: 전송</text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">TCP</text>
  <text x="116" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">/ UDP</text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 3: 네트워크</text>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">IP</text>
  <text x="100" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">/ ICMP</text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 2: 데이터링크</text>
  <text x="76" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">Ethernet</text>
  <text x="148" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">/ Wi-Fi</text>

  <!-- Key concepts right side -->
  <rect x="460" y="220" width="360" height="216" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">네트워크 핵심 개념</text>

  <rect x="476" y="258" width="160" height="60" rx="6" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="556" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">패킷 교환</text>
  <text x="556" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터를 작은 패킷으로</text>
  <text x="556" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">분할해 전송</text>

  <rect x="644" y="258" width="160" height="60" rx="6" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="724" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">프로토콜 계층화</text>
  <text x="724" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">역할을 계층으로 분리</text>
  <text x="724" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OSI / TCP-IP 모델</text>

  <rect x="476" y="334" width="160" height="60" rx="6" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="556" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">주소 체계</text>
  <text x="556" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MAC (L2) / IP (L3)</text>
  <text x="556" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">노드 식별·라우팅</text>

  <rect x="644" y="334" width="160" height="60" rx="6" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="724" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">대역폭 / 지연</text>
  <text x="724" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Bandwidth / Latency</text>
  <text x="724" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">성능 측정 지표</text>

  <rect x="476" y="410" width="328" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">인터넷 = 수십억 개 장치가 TCP/IP로 연결된 네트워크</text>
</svg>
