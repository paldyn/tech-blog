<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">네트워크 종류: LAN, MAN, WAN</text>

  <!-- LAN -->
  <rect x="40" y="80" width="240" height="320" rx="10" fill="#0d2016" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">LAN</text>
  <text x="160" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Local Area Network</text>
  <rect x="70" y="155" width="180" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">범위: 건물 / 캠퍼스</text>
  <text x="160" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">수십 m ~ 1 km</text>
  <rect x="70" y="220" width="180" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">속도: 1 Gbps ~ 100 Gbps</text>
  <text x="160" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이더넷, Wi-Fi</text>
  <rect x="70" y="285" width="180" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">예시: 가정, 사무실 망</text>
  <text x="160" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사설 운영, 저지연</text>
  <rect x="70" y="350" width="180" height="36" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">지연: 0.1 ~ 1 ms</text>

  <!-- MAN -->
  <rect x="320" y="80" width="240" height="320" rx="10" fill="#1a120a" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8a55c" text-anchor="middle">MAN</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Metropolitan Area Network</text>
  <rect x="350" y="155" width="180" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">범위: 도시 / 지역</text>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">1 km ~ 100 km</text>
  <rect x="350" y="220" width="180" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">속도: 수십 ~ 수백 Mbps</text>
  <text x="440" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">광섬유, CATV</text>
  <rect x="350" y="285" width="180" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">예시: 시 전체 케이블망</text>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ISP 운영, 중간 지연</text>
  <rect x="350" y="350" width="180" height="36" rx="6" fill="#2a1800" stroke="#e8a55c" stroke-width="1"/>
  <text x="440" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a55c" text-anchor="middle">지연: 1 ~ 10 ms</text>

  <!-- WAN -->
  <rect x="600" y="80" width="240" height="320" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">WAN</text>
  <text x="720" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Wide Area Network</text>
  <rect x="630" y="155" width="180" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">범위: 국가 / 대륙</text>
  <text x="720" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">100 km ~ 지구 전체</text>
  <rect x="630" y="220" width="180" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">속도: 수 Mbps ~ 100 Gbps</text>
  <text x="720" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">해저 케이블, 위성</text>
  <rect x="630" y="285" width="180" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">예시: 인터넷</text>
  <text x="720" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">다수 ISP 협력 운영</text>
  <rect x="630" y="350" width="180" height="36" rx="6" fill="#0a0a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="720" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">지연: 10 ~ 200 ms+</text>
</svg>
