<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">SemVer 버전 범위 시각화</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Major.Minor.Patch — 캐럿(^) · 틸드(~) · 범위 연산자</text>

  <!-- Version axis -->
  <line x1="60" y1="130" x2="820" y2="130" stroke="#333" stroke-width="1"/>
  <!-- Ticks -->
  <line x1="100" y1="124" x2="100" y2="136" stroke="#555" stroke-width="1"/>
  <text x="100" y="150" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">1.0.0</text>
  <line x1="220" y1="124" x2="220" y2="136" stroke="#555" stroke-width="1"/>
  <text x="220" y="150" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">1.1.0</text>
  <line x1="340" y1="124" x2="340" y2="136" stroke="#555" stroke-width="1"/>
  <text x="340" y="150" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">1.2.0</text>
  <line x1="460" y1="124" x2="460" y2="136" stroke="#555" stroke-width="1"/>
  <text x="460" y="150" text-anchor="middle" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">2.0.0</text>
  <line x1="580" y1="124" x2="580" y2="136" stroke="#555" stroke-width="1"/>
  <text x="580" y="150" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">2.1.0</text>
  <line x1="700" y1="124" x2="700" y2="136" stroke="#555" stroke-width="1"/>
  <text x="700" y="150" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">2.2.0</text>
  <line x1="820" y1="124" x2="820" y2="136" stroke="#555" stroke-width="1"/>
  <text x="820" y="150" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">3.0.0</text>

  <!-- ^1.1.0 range (caret) -->
  <text x="60" y="186" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">^1.1.0</text>
  <text x="130" y="186" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">(캐럿 — Major 고정)</text>
  <rect x="220" y="170" width="240" height="22" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="340" y="186" text-anchor="middle" fill="#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600">>=1.1.0 &lt;2.0.0</text>

  <!-- ~1.1.0 range (tilde) -->
  <text x="60" y="226" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">~1.1.0</text>
  <text x="130" y="226" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">(틸드 — Minor 고정)</text>
  <rect x="220" y="210" width="120" height="22" rx="4" fill="#7777cc" opacity="0.7"/>
  <text x="280" y="226" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600">>=1.1.0 &lt;1.2.0</text>

  <!-- 1.x range -->
  <text x="60" y="266" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">1.x</text>
  <text x="130" y="266" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">(x 와일드카드)</text>
  <rect x="100" y="250" width="360" height="22" rx="4" fill="#55c555" opacity="0.6"/>
  <text x="280" y="266" text-anchor="middle" fill="#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600">>=1.0.0 &lt;2.0.0</text>

  <!-- >=1.0.0 <3.0.0 range -->
  <text x="60" y="306" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">>=1.0.0 &lt;3.0.0</text>
  <text x="185" y="306" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">(비교 연산자)</text>
  <rect x="100" y="290" width="720" height="22" rx="4" fill="#e8e8e8" opacity="0.3"/>
  <text x="460" y="306" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600">1.0.0 이상 3.0.0 미만</text>

  <!-- exact 1.1.0 -->
  <text x="60" y="346" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">1.1.0</text>
  <text x="130" y="346" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">(정확한 버전)</text>
  <rect x="218" y="330" width="5" height="22" rx="2" fill="#e05555"/>
  <text x="280" y="346" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">정확히 1.1.0만 허용</text>

  <!-- Pre-release explanation -->
  <rect x="60" y="380" width="760" height="80" rx="8" fill="#111218" stroke="#555" stroke-width="1"/>
  <text x="80" y="406" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">SemVer 구조:   </text>
  <text x="186" y="406" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">MAJOR</text>
  <text x="236" y="406" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">.</text>
  <text x="246" y="406" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">MINOR</text>
  <text x="300" y="406" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">.</text>
  <text x="310" y="406" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">PATCH</text>
  <text x="370" y="406" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">[-prerelease][+build]</text>
  <text x="80" y="428" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">MAJOR: 호환 불가 변경 (breaking)</text>
  <text x="330" y="428" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">MINOR: 하위 호환 기능 추가</text>
  <text x="570" y="428" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">PATCH: 버그 수정</text>

  <!-- Bottom note -->
  <text x="440" y="476" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">^0.1.0은 0.x 특수 규칙: >=0.1.0 &lt;0.2.0 (Major=0이면 Minor가 breaking 변경 기준)</text>
</svg>
