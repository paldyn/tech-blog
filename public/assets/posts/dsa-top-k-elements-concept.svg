<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-d" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">상위 K개 원소 (Top-K Elements)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">크기 K 최소 힙(Min-Heap)으로 O(N log K) 스트리밍 처리</text>

  <!-- Approach comparison header -->
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">크기 K 최소 힙으로 상위 K개 유지하는 방법</text>

  <!-- Input stream -->
  <rect x="60" y="115" width="760" height="36" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">입력 스트림: [3, 7, 2, 9, 1, 5, 8, 4, 6]  (k=3 최댓값)</text>
  <text x="440" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">크기 K 최소 힙 유지 → 힙의 최솟값이 "k번째로 큰 값"</text>

  <!-- Heap states -->
  <!-- After adding 3,7,2: heap=[2,7,3] -->
  <rect x="60" y="168" width="380" height="110" rx="8" fill="#0d1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">3개 채울 때까지 push</text>
  <!-- heap tree: 2 at top, 7 left, 3 right -->
  <circle cx="250" cy="226" r="22" fill="#111" stroke="#7ec8e3"/>
  <text x="250" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">2</text>
  <text x="250" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">heap min</text>

  <circle cx="180" cy="260" r="20" fill="#111" stroke="#444"/>
  <text x="180" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">7</text>

  <circle cx="320" cy="260" r="20" fill="#111" stroke="#444"/>
  <text x="320" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">3</text>

  <line x1="232" y1="244" x2="196" y2="242" stroke="#444" stroke-width="1.5"/>
  <line x1="268" y1="244" x2="304" y2="242" stroke="#444" stroke-width="1.5"/>

  <!-- After adding 9: 9>heap[0]=2, replace -->
  <rect x="460" y="168" width="380" height="110" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">새 원소 &gt; heap[0] → pushpop</text>
  <!-- heap tree after 9: [3,7,9] -->
  <circle cx="650" cy="226" r="22" fill="#111" stroke="#55c555"/>
  <text x="650" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">3</text>
  <text x="650" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">heap min</text>

  <circle cx="580" cy="260" r="20" fill="#111" stroke="#444"/>
  <text x="580" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">7</text>

  <circle cx="720" cy="260" r="20" fill="#111" stroke="#444"/>
  <text x="720" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">9</text>

  <line x1="632" y1="244" x2="596" y2="242" stroke="#444" stroke-width="1.5"/>
  <line x1="668" y1="244" x2="704" y2="242" stroke="#444" stroke-width="1.5"/>

  <!-- Arrow between -->
  <text x="420" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" fill="#e05555" text-anchor="middle">→</text>
  <text x="420" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">9 push, 2 pop</text>

  <!-- Skip small elements -->
  <rect x="60" y="295" width="760" height="36" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">1이 들어옴: 1 &lt; heap[0]=3 → 무시 (스킵)</text>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">→ 힙 크기가 K를 넘지 않아 O(log K) 유지</text>

  <!-- Final result -->
  <rect x="60" y="350" width="760" height="50" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">최종: 힙 = [6, 8, 9] → 상위 3개 = {6, 8, 9} ✓</text>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시간: O(N log K) | 공간: O(K)</text>

  <!-- Comparison table -->
  <rect x="60" y="418" width="760" height="50" rx="8" fill="#111" stroke="#333"/>
  <text x="200" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">Min-Heap: O(N log K)</text>
  <text x="200" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">k 작을 때 최적</text>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Quickselect: O(N) avg</text>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">오프라인 배열</text>
  <text x="700" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Sort: O(N log N)</text>
  <text x="700" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전체 순서 필요 시</text>
</svg>
