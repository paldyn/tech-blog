<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#071f18;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a"/>

  <!-- Title -->
  <rect x="0" y="0" width="880" height="56" fill="url(#headerGrad)"/>
  <text x="440" y="35" font-family="'Wanted Sans Variable', 'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">AI 에이전트 + MCP 아키텍처</text>

  <!-- User box -->
  <rect x="30" y="90" width="120" height="52" rx="10" fill="#1e1e2e" stroke="#6366f1" stroke-width="1.5"/>
  <text x="90" y="111" font-family="'Wanted Sans Variable', sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">👤 사용자</text>
  <text x="90" y="130" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#666" text-anchor="middle">"여행 일정 짜줘"</text>

  <!-- Arrow user -> LLM -->
  <line x1="150" y1="116" x2="210" y2="116" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr1)"/>
  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- LLM Agent core -->
  <rect x="210" y="70" width="200" height="280" rx="14" fill="url(#agentGrad)" stroke="#7c3aed" stroke-width="2"/>
  <text x="310" y="95" font-family="'Wanted Sans Variable', sans-serif" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle">🤖 LLM Agent</text>
  <line x1="225" y1="103" x2="395" y2="103" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Agent internals -->
  <rect x="225" y="112" width="170" height="40" rx="8" fill="#2d1b69" stroke="#6d28d9" stroke-width="1"/>
  <text x="310" y="128" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#ddd6fe" text-anchor="middle">🧠 Planning / Reasoning</text>
  <text x="310" y="143" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#888" text-anchor="middle">목표 분해 → 하위 태스크</text>

  <rect x="225" y="162" width="170" height="40" rx="8" fill="#2d1b69" stroke="#6d28d9" stroke-width="1"/>
  <text x="310" y="178" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#ddd6fe" text-anchor="middle">🔧 Tool Use</text>
  <text x="310" y="193" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#888" text-anchor="middle">함수 호출 / MCP 연결</text>

  <rect x="225" y="212" width="170" height="40" rx="8" fill="#2d1b69" stroke="#6d28d9" stroke-width="1"/>
  <text x="310" y="228" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#ddd6fe" text-anchor="middle">💾 Memory</text>
  <text x="310" y="243" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#888" text-anchor="middle">단기(컨텍스트) / 장기(벡터)</text>

  <rect x="225" y="262" width="170" height="40" rx="8" fill="#2d1b69" stroke="#6d28d9" stroke-width="1"/>
  <text x="310" y="278" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#ddd6fe" text-anchor="middle">🔁 Reflection</text>
  <text x="310" y="293" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#888" text-anchor="middle">결과 평가 → 재시도</text>

  <!-- MCP Bridge -->
  <rect x="460" y="70" width="160" height="95" rx="12" fill="#1a2a1a" stroke="#34d399" stroke-width="2"/>
  <text x="540" y="93" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="middle">🔌 MCP Server</text>
  <text x="540" y="112" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#888" text-anchor="middle">Model Context Protocol</text>
  <text x="540" y="130" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#555" text-anchor="middle">표준화된 도구 연결 규약</text>
  <text x="540" y="150" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#34d399" text-anchor="middle">JSON-RPC 2.0</text>

  <!-- Arrow Agent -> MCP -->
  <line x1="410" y1="155" x2="458" y2="115" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Tools section -->
  <text x="460" y="195" font-family="'Wanted Sans Variable', sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">연결 도구 (Tools)</text>

  <!-- Tool boxes -->
  <rect x="460" y="205" width="72" height="44" rx="8" fill="url(#toolGrad)" stroke="#059669" stroke-width="1"/>
  <text x="496" y="223" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">🌐 Web</text>
  <text x="496" y="238" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#555" text-anchor="middle">검색</text>

  <rect x="544" y="205" width="72" height="44" rx="8" fill="url(#toolGrad)" stroke="#059669" stroke-width="1"/>
  <text x="580" y="223" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">📁 File</text>
  <text x="580" y="238" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#555" text-anchor="middle">파일 I/O</text>

  <rect x="628" y="205" width="72" height="44" rx="8" fill="url(#toolGrad)" stroke="#059669" stroke-width="1"/>
  <text x="664" y="223" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">🗄️ DB</text>
  <text x="664" y="238" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#555" text-anchor="middle">데이터베이스</text>

  <rect x="460" y="261" width="72" height="44" rx="8" fill="url(#toolGrad)" stroke="#059669" stroke-width="1"/>
  <text x="496" y="279" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">📧 Email</text>
  <text x="496" y="294" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#555" text-anchor="middle">메일 전송</text>

  <rect x="544" y="261" width="72" height="44" rx="8" fill="url(#toolGrad)" stroke="#059669" stroke-width="1"/>
  <text x="580" y="279" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">📅 Cal</text>
  <text x="580" y="294" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#555" text-anchor="middle">캘린더</text>

  <rect x="628" y="261" width="72" height="44" rx="8" fill="url(#toolGrad)" stroke="#059669" stroke-width="1"/>
  <text x="664" y="279" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">🔗 API</text>
  <text x="664" y="294" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#555" text-anchor="middle">외부 서비스</text>

  <!-- Loop arrow (reflection) -->
  <path d="M 210 210 C 160 210 160 330 210 330" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="145" y="275" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#7c3aed" text-anchor="middle">ReAct</text>
  <text x="145" y="288" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#7c3aed" text-anchor="middle">루프</text>

  <!-- Output arrow -->
  <line x1="150" y1="380" x2="90" y2="380" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr2)"/>
  <rect x="210" y="358" width="200" height="40" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="310" y="375" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#a5b4fc" text-anchor="middle">📋 최종 응답 생성</text>
  <text x="310" y="390" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#555" text-anchor="middle">수집된 정보 통합 → 사용자 반환</text>

  <rect x="30" y="358" width="120" height="40" rx="8" fill="#1e1e2e" stroke="#6366f1" stroke-width="1.5"/>
  <text x="90" y="375" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#e8e8e8" text-anchor="middle">여행 일정</text>
  <text x="90" y="390" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#6366f1" text-anchor="middle">3박 4일 완성 ✓</text>

  <!-- Legend -->
  <rect x="30" y="430" width="820" height="70" rx="10" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="50" y="452" font-family="'Wanted Sans Variable', sans-serif" font-size="10" font-weight="600" fill="#888">핵심 개념</text>
  <circle cx="60" cy="468" r="4" fill="#7c3aed"/>
  <text x="72" y="472" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#aaa">Planning: 목표를 단계별 작업으로 분해</text>
  <circle cx="60" cy="484" r="4" fill="#34d399"/>
  <text x="72" y="488" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#aaa">MCP: 도구 호출을 표준 프로토콜로 통일</text>
  <circle cx="300" cy="468" r="4" fill="#6366f1"/>
  <text x="312" y="472" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#aaa">ReAct: Reasoning + Acting 반복 루프</text>
  <circle cx="300" cy="484" r="4" fill="#a78bfa"/>
  <text x="312" y="488" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#aaa">Reflection: 결과 자기평가 후 재시도</text>
  <circle cx="560" cy="468" r="4" fill="#f59e0b"/>
  <text x="572" y="472" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#aaa">Memory: 단기(컨텍스트 창) + 장기(벡터 DB)</text>
</svg>
