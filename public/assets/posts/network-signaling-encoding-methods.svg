<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">디지털 신호 인코딩 방식 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">데이터 비트를 전기 신호로 변환하는 방법 — 클럭 동기화와 에러 감지 능력이 핵심</text>

  <!-- Bit sequence -->
  <text x="80" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">입력 비트:  1   0   1   1   0   0   1</text>

  <!-- NRZ-L -->
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">NRZ-L (Non-Return-to-Zero Level)</text>
  <polyline points="160,160 220,160 220,185 280,185 280,160 340,160 400,160 460,185 520,185 580,160" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <text x="630" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">High=1, Low=0</text>
  <text x="630" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">단점: 연속 1/0 시 클럭 손실</text>

  <!-- Manchester -->
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">맨체스터 인코딩 (IEEE 802.3 이더넷)</text>
  <!-- bit 1: high->low transition, bit 0: low->high -->
  <polyline points="160,250 190,250 190,275 220,275 220,250 250,250 250,275 280,275 280,250 310,250 310,275 340,275 340,250 370,250 370,275 400,275 400,250 430,250 430,275 460,275 460,250 490,250 490,275 520,275 520,250 550,250 550,275 580,275" fill="none" stroke="#55c555" stroke-width="2"/>
  <text x="630" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1=하강, 0=상승</text>
  <text x="630" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">클럭 내장, 동기화 용이</text>

  <!-- 4B/5B -->
  <text x="80" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">4B/5B (Fast Ethernet 100BASE-TX)</text>
  <rect x="80" y="330" width="760" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">4비트 데이터 →  5비트 코드워드 (25 = 32 중 16개만 유효)</text>
  <text x="100" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">0000 → 11110   0001 → 01001   1111 → 11101</text>
  <text x="100" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">연속 0 최대 3개 제한 → NRZ-I와 결합 시 클럭 동기 보장</text>

  <!-- Summary table -->
  <rect x="80" y="430" width="760" height="34" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="100" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NRZ: 단순·효율 높음 (대역폭 낭비 없음)   |   맨체스터: 클럭 자체 포함, 대역폭 2배 소모   |   4B/5B: 25% 오버헤드</text>
</svg>
