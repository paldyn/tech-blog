<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">ff-only를 설정으로 강제하기</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">명령 플래그와 전역 설정, 두 층위에서 적용한다</text>

  <rect x="60" y="100" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="130" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 한 번만: ff가 불가능하면 머지 자체를 거부</text>
  <text xml:space="preserve" x="80" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git merge --ff-only feature</text>
  <text xml:space="preserve" x="80" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 항상: pull도 ff-only로 (불필요한 머지 커밋 방지)</text>
  <text xml:space="preserve" x="80" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git config --global pull.ff only</text>

  <rect x="60" y="250" width="760" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="281" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git config branch.main.mergeoptions "--ff-only"   <tspan fill="#9aa4b8"># 특정 브랜치 한정</tspan></text>
</svg>
