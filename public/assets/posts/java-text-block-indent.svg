<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Text Block 들여쓰기 자동 제거</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">closing """ 위치가 incidental whitespace 기준을 결정</text>

  <defs>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- ===== LEFT: Source code (소스) ===== -->
  <rect x="60" y="84" width="360" height="34" rx="6" fill="#1a2d4a"/>
  <text x="240" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">소스 코드</text>

  <rect x="60" y="122" width="360" height="214" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Incidental whitespace indicator bar (8 spaces = 8 * 7.8px ≈ 62px from code x=76) -->
  <!-- Highlight columns 1-8 as incidental (light blue tint stripe) -->
  <rect x="76" y="130" width="62" height="198" rx="0" fill="#0d1f35" opacity="0.7"/>

  <text x="76" y="145" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff"> html = </tspan><tspan fill="#ce9178">"""</tspan></text>
  <text x="76" y="163" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        &lt;html&gt;</tspan></text>
  <text x="76" y="181" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">          &lt;body&gt;</tspan></text>
  <text x="76" y="199" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">            &lt;p&gt;Hello&lt;/p&gt;</tspan></text>
  <text x="76" y="217" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">          &lt;/body&gt;</tspan></text>
  <text x="76" y="235" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        &lt;/html&gt;</tspan></text>
  <text x="76" y="253" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        """</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="313" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// closing """ 앞 공백 = 8칸</text>

  <!-- Bracket annotation for incidental spaces -->
  <text x="82" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">↑</text>
  <text x="65" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">8칸 제거</text>

  <!-- Arrow -->
  <line x1="432" y1="228" x2="440" y2="228" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- ===== RIGHT: Result (결과) ===== -->
  <rect x="460" y="84" width="360" height="34" rx="6" fill="#163322"/>
  <text x="640" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">결과 문자열</text>

  <rect x="460" y="122" width="360" height="214" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="476" y="145" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 8칸 incidental 제거 후</text>
  <text x="476" y="163" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">&lt;html&gt;</tspan></text>
  <text x="476" y="181" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  &lt;body&gt;</tspan></text>
  <text x="476" y="199" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    &lt;p&gt;Hello&lt;/p&gt;</tspan></text>
  <text x="476" y="217" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  &lt;/body&gt;</tspan></text>
  <text x="476" y="235" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">&lt;/html&gt;</tspan></text>
  <text x="476" y="253" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 끝에 \n 포함 (trailing newline)</text>

  <!-- ===== Bottom: Rules ===== -->
  <rect x="60" y="352" width="760" height="80" rx="6" fill="#0d1520" stroke="#1e2a40" stroke-width="1.5"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">들여쓰기 제거 규칙 요약</text>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">① closing """ 앞 공백 수 = incidental whitespace 제거 열 수</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">② closing """ 를 맨 앞에 두면 들여쓰기 전혀 제거 안 됨  ③ \s 이스케이프로 trailing 공백 보존 가능</text>

</svg>
