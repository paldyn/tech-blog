<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">세션 타임아웃 감지 및 처리 흐름</text>

  <!-- Timeline -->
  <!-- User activity -->
  <rect x="60" y="80" width="760" height="50" rx="6" fill="#1a2a1a" stroke="#55c555"/>
  <text x="440" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">사용자 활동 (클릭, 키 입력, 트랜잭션)</text>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 마지막 활동 시각 갱신 (g_lastActivity = new Date())</text>

  <!-- Timer checks -->
  <rect x="60" y="150" width="760" height="50" rx="6" fill="#111827" stroke="#7ec8e3"/>
  <text x="440" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">클라이언트 타이머 (setInterval — 30초마다)</text>
  <text x="440" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">경과 시간 = now - g_lastActivity</text>

  <!-- Warning zone -->
  <rect x="60" y="220" width="370" height="60" rx="6" fill="#2a2a1a" stroke="#e05555" stroke-dasharray="5,3"/>
  <text x="245" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">경고 구간 (만료 2분 전)</text>
  <text x="245" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">팝업: "세션이 곧 만료됩니다. 연장하시겠습니까?"</text>

  <rect x="450" y="220" width="370" height="60" rx="6" fill="#2a1a1a" stroke="#e05555"/>
  <text x="635" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">타임아웃 (30분 이상 무활동)</text>
  <text x="635" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">강제 로그아웃 → 로그인 화면</text>

  <!-- Arrow: warning → extend -->
  <line x1="245" y1="280" x2="245" y2="316" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="239,314 245,328 251,314" fill="#7ec8e3"/>
  <rect x="130" y="330" width="230" height="44" rx="4" fill="#1a2428" stroke="#7ec8e3"/>
  <text x="245" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">연장 선택 → /api/session/extend</text>
  <text x="245" y="369" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">g_lastActivity 재설정</text>

  <!-- Arrow: timeout → logout -->
  <line x1="635" y1="280" x2="635" y2="316" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="629,314 635,328 641,314" fill="#e05555"/>
  <rect x="500" y="330" width="270" height="44" rx="4" fill="#2a1a1a" stroke="#e05555"/>
  <text x="635" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">로그아웃 처리 → 로그인 화면 이동</text>
  <text x="635" y="369" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">clearInterval + 전역 변수 초기화</text>

  <!-- Server side note -->
  <rect x="60" y="395" width="760" height="40" rx="6" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="415" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버 세션도 독립적으로 만료 — 클라이언트 타이머와 서버 timeout 값을 일치시켜야 함</text>
  <text x="440" y="431" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">server.session.timeout=1800 (30분) ↔ 클라이언트 TIMEOUT_MS=1800000</text>
</svg>
