<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 470">
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Pull Request의 구성</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">하나의 PR 화면을 이루는 핵심 요소들</text>

  <!-- PR card -->
  <rect x="140" y="96" width="600" height="320" rx="10" fill="#101010" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Title bar -->
  <text x="164" y="132"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">Add login feature</text>
  <text x="360" y="132"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc">#42</text>

  <!-- Open badge -->
  <rect x="600" y="116" width="116" height="26" rx="13" fill="#071a07" stroke="#55c555" stroke-width="1"/>
  <text x="658" y="133" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">● Open</text>

  <!-- base/compare line -->
  <text x="164" y="160"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12.5" fill="#aaaaaa">base: main  ←  compare: feature/login</text>

  <line x1="140" y1="176" x2="740" y2="176" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Tabs -->
  <text x="164" y="200"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Conversation</text>
  <text x="300" y="200"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Commits 3</text>
  <text x="420" y="200"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Files changed 8</text>

  <line x1="140" y1="216" x2="740" y2="216" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Description code box -->
  <rect x="164" y="232" width="552" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 설명(Description)</text>
  <text x="180" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">로그인 폼과 세션 처리를 추가합니다.</text>
  <text x="180" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- 비밀번호 해싱 적용</text>
  <text x="180" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Closes #38</text>

  <!-- Merge button -->
  <rect x="164" y="348" width="200" height="40" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="264" y="373" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Merge pull request</text>

  <text x="392" y="373"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#888">리뷰 승인 + CI 통과 후 활성화</text>
</svg>
