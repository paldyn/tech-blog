<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">useRef의 두 가지 얼굴</text>
  <text x="60" y="78" font-size="13" fill="#888">DOM 참조용과 가변 값 컨테이너용은 타입이 다르다</text>

  <!-- DOM ref -->
  <rect x="60" y="100" width="360" height="250" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" font-size="14" font-weight="600" fill="#7ec8e3">① DOM 참조용</text>
  <text xml:space="preserve" x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> ref =</tspan></text>
  <text xml:space="preserve" x="76" y="184" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  useRef&lt;HTMLInputElement&gt;(null);</text>
  <text xml:space="preserve" x="76" y="218" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// current:</text>
  <text xml:space="preserve" x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// HTMLInputElement | null</text>
  <text x="76" y="280" font-size="13" fill="#ffffff">초깃값 null + 제네릭.</text>
  <text x="76" y="302" font-size="13" fill="#ffffff">&lt;input ref={ref} /&gt; 로 연결.</text>
  <text x="76" y="324" font-size="13" fill="#e05555">접근 전 null 체크 필수.</text>

  <!-- mutable ref -->
  <rect x="460" y="100" width="360" height="250" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="128" font-size="14" font-weight="600" fill="#55c555">② 가변 값 컨테이너</text>
  <text xml:space="preserve" x="476" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> timer =</tspan></text>
  <text xml:space="preserve" x="476" y="184" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  useRef(0);</text>
  <text xml:space="preserve" x="476" y="218" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// current: number</text>
  <text xml:space="preserve" x="476" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 자유롭게 읽고 쓴다</text>
  <text x="476" y="280" font-size="13" fill="#ffffff">초깃값으로 타입 추론.</text>
  <text x="476" y="302" font-size="13" fill="#ffffff">리렌더 없이 값 보존.</text>
  <text x="476" y="324" font-size="13" fill="#55c555">current는 항상 number.</text>
</svg>
