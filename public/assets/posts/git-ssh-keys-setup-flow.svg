<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SSH 키 생성 &amp; GitHub 등록 흐름</text>

  <!-- Step boxes -->
  <rect x="60" y="76" width="160" height="64" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">1. 키 생성</text>
  <text x="140" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ssh-keygen</text>
  <text x="140" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">-t ed25519</text>

  <line x1="220" y1="108" x2="274" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="276" y="76" width="160" height="64" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="356" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">2. ssh-agent</text>
  <text x="356" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">eval ssh-agent</text>
  <text x="356" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ssh-add</text>

  <line x1="436" y1="108" x2="490" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="492" y="76" width="160" height="64" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="572" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">3. 공개 키 등록</text>
  <text x="572" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GitHub</text>
  <text x="572" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Settings &gt; SSH Keys</text>

  <line x1="652" y1="108" x2="706" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="708" y="76" width="112" height="64" rx="8" fill="#0f1a2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="764" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">4. 연결 테스트</text>
  <text x="764" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ssh -T</text>
  <text x="764" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">github.com</text>

  <!-- Local / Remote boxes -->
  <rect x="60" y="166" width="360" height="110" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="240" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">로컬 ~/.ssh/</text>
  <rect x="80" y="202" width="140" height="56" rx="6" fill="#0f1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">id_ed25519</text>
  <text x="150" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비밀 키 (절대 공유 금지)</text>
  <text x="150" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">chmod 600</text>

  <rect x="240" y="202" width="160" height="56" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="320" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">id_ed25519.pub</text>
  <text x="320" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">공개 키</text>
  <text x="320" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">GitHub에 등록</text>

  <!-- Arrow between -->
  <line x1="440" y1="221" x2="495" y2="221" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
  <text x="468" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">등록</text>

  <!-- Remote GitHub box -->
  <rect x="500" y="166" width="320" height="110" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="660" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">GitHub 서버</text>
  <rect x="520" y="202" width="280" height="56" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">authorized_keys</text>
  <text x="660" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">등록된 공개 키 목록</text>
  <text x="660" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">비밀 키와 대조해 인증</text>

  <!-- Code block -->
  <rect x="60" y="298" width="760" height="196" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 1. ed25519 키 생성 (권장)</text>
  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ssh-keygen -t ed25519 -C <tspan fill="#ce9178">"alice@example.com"</tspan></text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 2. ssh-agent에 추가</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">eval</tspan> <tspan fill="#ce9178">"$(ssh-agent -s)"</tspan> &amp;&amp; ssh-add ~/.ssh/id_ed25519</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 3. 공개 키 복사 후 GitHub Settings에 붙여넣기</text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">cat</tspan> ~/.ssh/id_ed25519.pub</text>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 4. 연결 테스트</text>
  <text x="76" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ssh -T git@github.com   <tspan fill="#9aa4b8"># Hi username! You've authenticated</tspan></text>
  <text x="76" y="482" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 레포 clone시 SSH URL 사용</text>
</svg>
