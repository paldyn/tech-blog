<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">next/font 최적화 구조</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">폰트 로드 과정 Before / After 비교</text>

  <!-- Before column -->
  <text x="210" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">Before (일반 @import)</text>

  <rect x="60" y="130" width="300" height="54" rx="7" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="210" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">브라우저 → Google Fonts CDN</text>
  <text x="210" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">외부 네트워크 요청 발생</text>

  <rect x="60" y="204" width="300" height="54" rx="7" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="210" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">폰트 파일 다운로드 지연</text>
  <text x="210" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">FOUT / CLS 발생 위험</text>

  <rect x="60" y="278" width="300" height="54" rx="7" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="210" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">렌더 차단 (Render Blocking)</text>
  <text x="210" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">LCP 점수 하락 원인</text>

  <!-- After column -->
  <text x="670" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">After (next/font)</text>

  <rect x="520" y="130" width="300" height="54" rx="7" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">빌드 타임 폰트 다운로드</text>
  <text x="670" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">외부 네트워크 요청 0건</text>

  <rect x="520" y="204" width="300" height="54" rx="7" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">자체 호스팅 (Self-hosted)</text>
  <text x="670" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CDN 의존성 제거</text>

  <rect x="520" y="278" width="300" height="54" rx="7" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">size-adjust + CSS 변수 자동 생성</text>
  <text x="670" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CLS=0, 렌더 차단 없음</text>

  <!-- Divider -->
  <line x1="440" y1="110" x2="440" y2="355" stroke="#333" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">VS</text>

  <!-- Bottom summary -->
  <rect x="160" y="408" width="560" height="36" rx="7" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">next/font → 빌드 타임 최적화 · 자체 호스팅 · CLS 0 · 렌더 차단 제거</text>
</svg>
