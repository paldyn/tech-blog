<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrInfo" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrWarn" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">GraphQL HTTP 요청 / 응답 구조</text>

  <!-- request label -->
  <text x="60" y="92" font-size="16" font-weight="600" fill="#e8e8e8">요청</text>
  <!-- response label -->
  <text x="560" y="92" font-size="16" font-weight="600" fill="#e8e8e8">응답</text>

  <!-- ===== REQUEST BOX ===== -->
  <rect x="60" y="108" width="320" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="134" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">POST</tspan> /graphql HTTP/1.1</text>
  <text x="76" y="156" font-size="13" fill="#ffffff" xml:space="preserve">Content-Type: <tspan fill="#ce9178">application/json</tspan></text>
  <text x="76" y="178" font-size="13" fill="#9aa4b8" xml:space="preserve"></text>
  <text x="76" y="200" font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="76" y="222" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">"query"</tspan>: <tspan fill="#ce9178">"query($id:ID!){</tspan></text>
  <text x="76" y="244" font-size="13" fill="#ce9178" xml:space="preserve">    user(id:$id){ name } }",</text>
  <text x="76" y="266" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">"variables"</tspan>: { <tspan fill="#ce9178">"id"</tspan>: <tspan fill="#b5cea8">1</tspan> },</text>
  <text x="76" y="288" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">"operationName"</tspan>: <tspan fill="#ce9178">null</tspan></text>
  <text x="76" y="310" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="334" font-size="11" fill="#9aa4b8" xml:space="preserve"># query / variables / operationName</text>

  <!-- ===== RESPONSE BOX ===== -->
  <rect x="560" y="108" width="320" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="576" y="134" font-size="13" fill="#ffffff" xml:space="preserve">HTTP/1.1 <tspan fill="#55c555" font-weight="600">200 OK</tspan></text>
  <text x="576" y="156" font-size="13" fill="#ffffff" xml:space="preserve">Content-Type:</text>
  <text x="576" y="178" font-size="13" fill="#ce9178" xml:space="preserve">  application/graphql-response+json</text>
  <text x="576" y="200" font-size="13" fill="#9aa4b8" xml:space="preserve"></text>
  <text x="576" y="222" font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="576" y="244" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">"data"</tspan>: { <tspan fill="#ce9178">"user"</tspan>: <tspan fill="#ce9178">null</tspan> },</text>
  <text x="576" y="266" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">"errors"</tspan>: [</text>
  <text x="576" y="288" font-size="13" fill="#ce9178" xml:space="preserve">    { "message": "Not found" }</text>
  <text x="576" y="310" font-size="13" fill="#ffffff" xml:space="preserve">  ]</text>
  <text x="576" y="334" font-size="11" fill="#9aa4b8" xml:space="preserve"># data + errors 배열</text>

  <!-- arrow request -> response -->
  <line x1="380" y1="200" x2="560" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <text x="470" y="186" font-size="13" fill="#888" text-anchor="middle">전송</text>

  <!-- ===== WARNING ===== -->
  <rect x="200" y="400" width="480" height="64" rx="6" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="425" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">⚠ 상태코드 모호성</text>
  <text x="440" y="448" font-size="13" fill="#e8e8e8" text-anchor="middle">필드 에러가 있어도 보통 HTTP 200 — 성패 판단은 errors 배열로.</text>

  <line x1="700" y1="228" x2="660" y2="396" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrWarn)"/>
</svg>
