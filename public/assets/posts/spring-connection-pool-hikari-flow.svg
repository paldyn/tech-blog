<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HikariCP 커넥션 풀 동작 원리</text>

  <!-- ── Connection Pool Box ── -->
  <rect x="260" y="68" width="360" height="200" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="94"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">HikariCP 커넥션 풀</text>

  <!-- Connection slots -->
  <!-- Slot 1: active -->
  <rect x="282" y="108" width="72" height="34" rx="5" fill="#1a3a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="318" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">conn-1</text>

  <!-- Slot 2: active -->
  <rect x="362" y="108" width="72" height="34" rx="5" fill="#1a3a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="398" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">conn-2</text>

  <!-- Slot 3: in use -->
  <rect x="442" y="108" width="72" height="34" rx="5" fill="#3a1a1a" stroke="#e05555" stroke-width="1.2"/>
  <text x="478" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555" text-anchor="middle">conn-3</text>

  <!-- Slot 4: in use -->
  <rect x="522" y="108" width="72" height="34" rx="5" fill="#3a1a1a" stroke="#e05555" stroke-width="1.2"/>
  <text x="558" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555" text-anchor="middle">conn-4</text>

  <!-- Legend -->
  <rect x="282" y="156" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="300" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">유휴 (idle)</text>
  <rect x="382" y="156" width="12" height="12" rx="2" fill="#e05555"/>
  <text x="400" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">사용 중 (active)</text>

  <!-- Pool stats -->
  <text x="282" y="198"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">maximumPoolSize: 10  /  minimumIdle: 2</text>
  <text x="282" y="218"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">connectionTimeout: 30s  /  idleTimeout: 10min</text>
  <text x="282" y="238"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">maxLifetime: 30min  /  keepaliveTime: 60s</text>

  <!-- ── Application Threads ── -->
  <!-- Thread 1 (gets conn) -->
  <rect x="60" y="150" width="140" height="44" rx="7" fill="#111827" stroke="#7777cc" stroke-width="1.2"/>
  <text x="130" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">스레드 A</text>
  <text x="130" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">getConnection()</text>

  <!-- Arrow: Thread A → Pool (get) -->
  <line x1="200" y1="172" x2="258" y2="172" stroke="#55c555" stroke-width="2"/>
  <polygon points="264,172 254,166 254,178" fill="#55c555"/>
  <text x="226" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">획득</text>

  <!-- Thread 2 (waiting) -->
  <rect x="60" y="220" width="140" height="44" rx="7" fill="#1a1507" stroke="#e8a030" stroke-width="1.2"/>
  <text x="130" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8a030" text-anchor="middle">스레드 B</text>
  <text x="130" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">대기 중...</text>

  <!-- Waiting arrow (dashed) -->
  <line x1="200" y1="242" x2="258" y2="242" stroke="#e8a030" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="264,242 254,236 254,248" fill="#e8a030"/>
  <text x="226" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8a030" text-anchor="middle">대기</text>

  <!-- Thread 3 (returns conn) -->
  <rect x="680" y="150" width="140" height="44" rx="7" fill="#111827" stroke="#7777cc" stroke-width="1.2"/>
  <text x="750" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">스레드 C</text>
  <text x="750" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">close() 호출</text>

  <!-- Arrow: Pool → Thread C (return) -->
  <line x1="622" y1="172" x2="678" y2="172" stroke="#55c555" stroke-width="2"/>
  <polygon points="684,172 674,166 674,178" fill="#55c555"/>
  <text x="650" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">반납</text>

  <!-- ── DB Server ── -->
  <rect x="300" y="316" width="280" height="52" rx="8" fill="#0d1117" stroke="#888" stroke-width="1"/>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#888" text-anchor="middle">실제 DB 서버</text>
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555" text-anchor="middle">TCP 소켓 연결 (비용이 큰 작업)</text>

  <!-- Arrow: Pool → DB -->
  <line x1="440" y1="268" x2="440" y2="314" stroke="#444" stroke-width="1.5"/>
  <polygon points="440,320 434,310 446,310" fill="#444"/>
  <text x="490" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#555">물리 연결 (애플리케이션 시작 시 미리 생성)</text>

  <!-- ── Key benefits ── -->
  <rect x="60" y="390" width="360" height="84" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">커넥션 풀의 이점</text>
  <text x="80" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• TCP 핸드셰이크 비용 제거 → 응답 지연 감소</text>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• DB 최대 연결 수 제한 → 과부하 방지</text>
  <text x="80" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• 유휴 Connection 사전 유지 (keepalive)</text>

  <rect x="460" y="390" width="360" height="84" rx="8" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">HikariCP 특징</text>
  <text x="480" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• Spring Boot 기본 커넥션 풀 (자동 구성)</text>
  <text x="480" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• Java Instrumentation 기반 — 벤치마크 1위</text>
  <text x="480" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• ByteBuddy 없는 경량 구현</text>
</svg>
