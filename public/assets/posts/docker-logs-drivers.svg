<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Docker 로깅 드라이버</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">컨테이너 로그를 어디로 보낼지 결정</text>

  <!-- Driver boxes -->
  <!-- json-file (default) -->
  <rect x="60" y="104" width="180" height="80" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">json-file</text>
  <text x="150" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">기본값</text>
  <text x="150" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">호스트 파일로 저장</text>

  <!-- local -->
  <rect x="260" y="104" width="140" height="80" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="330" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">local</text>
  <text x="330" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">압축 저장</text>
  <text x="330" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">디스크 절약</text>

  <!-- journald -->
  <rect x="420" y="104" width="140" height="80" rx="8" fill="#1a1a30" stroke="#7777cc" stroke-width="1.5"/>
  <text x="490" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">journald</text>
  <text x="490" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">systemd 저널</text>
  <text x="490" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Linux 전용</text>

  <!-- syslog -->
  <rect x="580" y="104" width="140" height="80" rx="8" fill="#1f1400" stroke="#e8a030" stroke-width="1.5"/>
  <text x="650" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a030">syslog</text>
  <text x="650" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">syslog 서버</text>
  <text x="650" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원격 전송</text>

  <!-- none -->
  <rect x="740" y="104" width="100" height="80" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="790" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#555">none</text>
  <text x="790" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">로그 없음</text>
  <text x="790" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">성능 최적화</text>

  <!-- Warning: non-json-file drivers disable docker logs -->
  <rect x="60" y="208" width="760" height="50" rx="6" fill="#2d1a00" stroke="#e8a030" stroke-width="1.5"/>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a030">⚠ 주의:</text>
  <text x="140" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">json-file / local 외의 드라이버에서는 docker logs 명령이 동작하지 않습니다.</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">journald, syslog 등 사용 시 해당 시스템 도구로 로그를 조회해야 합니다.</text>

  <!-- Code block: rotation settings -->
  <rect x="60" y="278" width="760" height="104" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 로그 파일 크기·개수 제한 (json-file 기본값 무제한)</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker run</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">--log-driver json-file</tspan>
    <tspan fill="#e8e8e8"> \</tspan>
  </text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">       </tspan>
    <tspan fill="#7777cc">--log-opt max-size=10m</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">--log-opt max-file=3</tspan>
    <tspan fill="#e8e8e8"> \</tspan>
  </text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">       </tspan>
    <tspan fill="#ce9178">nginx:alpine</tspan>
    <tspan fill="#6a8aa0">   # 10MB x 3개 로테이션</tspan>
  </text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 현재 컨테이너 로깅 드라이버 확인</text>
</svg>
