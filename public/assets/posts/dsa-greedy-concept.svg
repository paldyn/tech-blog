<svg width="880" viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr-g" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#55c555" stroke-width="1.5"/>
    </marker>
    <marker id="arr-d" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#555" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">탐욕 알고리즘 개념</text>

  <!-- Left section label -->
  <text x="60" y="85" font-size="16" font-weight="600" fill="#e8e8e8">결정 트리 — 탐욕 선택 경로</text>

  <!-- Root -->
  <circle cx="260" cy="135" r="28" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="260" y="140" text-anchor="middle" font-size="13" fill="#e8e8e8">시작</text>

  <!-- Level 1: two choices -->
  <line x1="237" y1="156" x2="170" y2="205" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <line x1="283" y1="156" x2="350" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <text x="175" y="188" font-size="11" fill="#55c555">최선</text>
  <text x="308" y="188" font-size="11" fill="#888">차선</text>

  <circle cx="155" cy="220" r="28" fill="#0d2b0d" stroke="#55c555" stroke-width="2.5"/>
  <text x="155" y="225" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">10</text>

  <circle cx="365" cy="220" r="28" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
  <text x="365" y="225" text-anchor="middle" font-size="13" fill="#888">4</text>

  <!-- Level 2 from greedy node -->
  <line x1="132" y1="241" x2="105" y2="290" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <line x1="178" y1="241" x2="208" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <circle cx="90" cy="305" r="28" fill="#0d2b0d" stroke="#55c555" stroke-width="2.5"/>
  <text x="90" y="310" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">8</text>

  <circle cx="223" cy="305" r="28" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
  <text x="223" y="310" text-anchor="middle" font-size="13" fill="#888">2</text>

  <!-- Level 2 from other node -->
  <line x1="342" y1="241" x2="322" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="388" y1="241" x2="408" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <circle cx="307" cy="305" r="28" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
  <text x="307" y="310" text-anchor="middle" font-size="13" fill="#888">6</text>

  <circle cx="423" cy="305" r="28" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
  <text x="423" y="310" text-anchor="middle" font-size="13" fill="#888">3</text>

  <!-- Greedy result -->
  <line x1="90" y1="333" x2="90" y2="375" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="50" y="378" width="200" height="52" rx="8" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="400" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">탐욕 경로 합계: 18</text>
  <text x="150" y="420" text-anchor="middle" font-size="12" fill="#888">시작 → 10 → 8</text>

  <text x="60" y="460" font-size="13" fill="#888">최적 경로: 4 → 6 = 합계 10 (더 낮을 수 있음)</text>
  <text x="60" y="478" font-size="13" fill="#7ec8e3">두 조건이 성립할 때만 탐욕 = 전역 최적</text>

  <!-- Divider -->
  <line x1="500" y1="68" x2="500" y2="530" stroke="#222" stroke-width="1"/>

  <!-- Right section label -->
  <text x="522" y="85" font-size="16" font-weight="600" fill="#e8e8e8">탐욕 알고리즘 두 가지 조건</text>

  <!-- Condition 1 -->
  <rect x="522" y="105" width="298" height="135" rx="8" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="671" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">탐욕 선택 속성</text>
  <text x="671" y="150" text-anchor="middle" font-size="12" fill="#888">Greedy Choice Property</text>
  <text x="540" y="174" font-size="13" fill="#e8e8e8">현재 최선의 선택이 전체</text>
  <text x="540" y="194" font-size="13" fill="#e8e8e8">최적해의 일부가 됨</text>
  <text x="540" y="214" font-size="13" fill="#888">→ 미래를 고려하지 않아도 OK</text>
  <text x="540" y="232" font-size="12" fill="#7ec8e3">예) 동전 교환, MST 간선 선택</text>

  <!-- Condition 2 -->
  <rect x="522" y="258" width="298" height="135" rx="8" fill="#0a0a1e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="671" y="283" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">최적 부분 구조</text>
  <text x="671" y="303" text-anchor="middle" font-size="12" fill="#888">Optimal Substructure</text>
  <text x="540" y="327" font-size="13" fill="#e8e8e8">부분 문제의 최적해가 전체</text>
  <text x="540" y="347" font-size="13" fill="#e8e8e8">최적해에 포함됨</text>
  <text x="540" y="367" font-size="13" fill="#888">→ 하위 문제로 재귀 분해 가능</text>
  <text x="540" y="385" font-size="12" fill="#7ec8e3">예) 최단 경로, 활동 선택</text>

  <!-- Warning box -->
  <rect x="522" y="413" width="298" height="80" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="671" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">탐욕이 실패하는 경우</text>
  <text x="540" y="460" font-size="13" fill="#888">위 두 조건이 모두 성립해야</text>
  <text x="540" y="480" font-size="13" fill="#888">탐욕 = 최적해 보장</text>

  <!-- DP vs Greedy bottom note -->
  <text x="60" y="515" font-size="13" fill="#888">Greedy: O(N log N) 이하 — DP: O(N²) 이상, 더 일반적</text>
</svg>
