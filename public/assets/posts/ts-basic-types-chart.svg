<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 기본 타입 분류</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">모든 타입의 기반이 되는 3가지 카테고리</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="ch" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Root: TypeScript Types -->
  <rect x="320" y="96" width="240" height="50" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">TypeScript 타입</text>

  <!-- Arrow to 3 branches -->
  <line x1="280" y1="172" x2="188" y2="196" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ch)"/>
  <line x1="440" y1="146" x2="440" y2="196" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ch)"/>
  <line x1="600" y1="172" x2="692" y2="196" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ch)"/>

  <!-- Branch 1: Primitive -->
  <rect x="60" y="198" width="256" height="50" rx="8" fill="#0d1a0d" stroke="#3a8e3a" stroke-width="1.5"/>
  <text x="188" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">원시 타입 (Primitive)</text>

  <!-- Branch 2: Object -->
  <rect x="312" y="198" width="256" height="50" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">객체 타입 (Object)</text>

  <!-- Branch 3: Special -->
  <rect x="564" y="198" width="256" height="50" rx="8" fill="#1a0d0d" stroke="#8e3a3a" stroke-width="1.5"/>
  <text x="692" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">특수 타입 (Special)</text>

  <!-- Primitive subtypes -->
  <line x1="188" y1="248" x2="188" y2="276" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="60" y="278" width="256" height="160" rx="8" fill="#0a120a" stroke="#2a6e2a" stroke-width="1"/>
  <text x="188" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">string</text>
  <text x="188" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">number</text>
  <text x="188" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">boolean</text>
  <text x="188" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">bigint</text>
  <text x="188" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">symbol</text>
  <text x="188" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">null, undefined</text>

  <!-- Object subtypes -->
  <line x1="440" y1="248" x2="440" y2="276" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="312" y="278" width="256" height="160" rx="8" fill="#0a0a14" stroke="#2a3a6e" stroke-width="1"/>
  <text x="440" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">object</text>
  <text x="440" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">Array&lt;T&gt;</text>
  <text x="440" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">Tuple</text>
  <text x="440" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">interface</text>
  <text x="440" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">class</text>
  <text x="440" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">enum</text>

  <!-- Special subtypes -->
  <line x1="692" y1="248" x2="692" y2="276" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="564" y="278" width="256" height="160" rx="8" fill="#140a0a" stroke="#6e2a2a" stroke-width="1"/>
  <text x="692" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">any</text>
  <text x="692" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">unknown</text>
  <text x="692" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">never</text>
  <text x="692" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">void</text>
  <text x="692" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">undefined</text>
  <text x="692" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">null</text>

  <!-- Bottom note -->
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Union(&lt;A | B&gt;), Intersection(A &amp; B), 제네릭(T) 등 조합 타입도 지원</text>
</svg>
