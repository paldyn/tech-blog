<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">DevTools 주요 설정 & 활성화 방법</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">의존성 추가 → 자동 활성화</text>

  <!-- Left: Gradle dependency -->
  <rect x="60" y="96" width="370" height="34" rx="6" fill="#141414" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">build.gradle.kts 의존성 추가</text>

  <rect x="60" y="140" width="370" height="130" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dependencies {</text>
  <text x="76" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  implementation(</text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    "org.springframework</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    .boot:spring-boot-</text>
  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    devtools")</text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Left: properties -->
  <rect x="60" y="284" width="370" height="34" rx="6" fill="#141414" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">application.properties 설정</text>

  <rect x="60" y="328" width="370" height="90" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 자동 재시작 비활성화</text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">spring.devtools.restart.enabled=false</text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># LiveReload 비활성화</text>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">spring.devtools.livereload.enabled=false</text>

  <!-- Right: features list -->
  <rect x="450" y="96" width="370" height="34" rx="6" fill="#141414" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="635" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c84a">DevTools 제공 기능</text>

  <rect x="450" y="140" width="370" height="270" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>

  <rect x="466" y="156" width="338" height="40" rx="6" fill="#55c555" fill-opacity="0.1" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">자동 재시작 (Automatic Restart)</text>
  <text x="635" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클래스패스 변경 시 앱 자동 재시작</text>

  <rect x="466" y="206" width="338" height="40" rx="6" fill="#7ec8e3" fill-opacity="0.1" stroke="#7ec8e3" stroke-width="1"/>
  <text x="635" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">LiveReload</text>
  <text x="635" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">브라우저 자동 새로고침 (WebSocket)</text>

  <rect x="466" y="256" width="338" height="40" rx="6" fill="#7777cc" fill-opacity="0.1" stroke="#7777cc" stroke-width="1"/>
  <text x="635" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#9999ee">Property 기본값 오버라이드</text>
  <text x="635" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">캐시 비활성화 · 로그 레벨 조정</text>

  <rect x="466" y="306" width="338" height="40" rx="6" fill="#e8c84a" fill-opacity="0.1" stroke="#e8c84a" stroke-width="1"/>
  <text x="635" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a">Remote DevTools</text>
  <text x="635" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원격 서버에도 재시작/LiveReload 적용</text>

  <rect x="466" y="356" width="338" height="38" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="635" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">⚠ 프로덕션 JAR에는 포함되지 않음</text>
  <text x="635" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">fully packaged JAR/WAR에서 자동 비활성화</text>

  <!-- Bottom note -->
  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">IDE에서 "Build Automatically"를 켜야 파일 저장 시 즉시 재시작이 트리거됩니다</text>
</svg>
