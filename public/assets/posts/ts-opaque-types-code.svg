<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" font-weight="600" fill="#7ec8e3">type</tspan><tspan fill="#ffffff"> Brand&lt;T, B&gt; =</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">  T &amp; { __b: B }</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" font-weight="600" fill="#7ec8e3">type</tspan><tspan fill="#ffffff"> UserId =</tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">  Brand&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">string</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">&quot;User&quot;</tspan><tspan fill="#ffffff">&gt;</tspan></text>
