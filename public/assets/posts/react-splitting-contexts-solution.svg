<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Context 분리 전략: 역할별로 나누기</text>

  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- UserContext -->
  <rect x="60" y="76" width="220" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">UserContext</text>
  <text x="170" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">user: { name, email }</text>

  <!-- ThemeContext -->
  <rect x="60" y="158" width="220" height="60" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">ThemeContext</text>
  <text x="170" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">theme: 'dark'</text>

  <!-- CartContext -->
  <rect x="60" y="240" width="220" height="60" rx="8" fill="#0d1212" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">CartContext</text>
  <text x="170" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">cart: [item1, item2]</text>

  <!-- Arrows -->
  <line x1="280" y1="106" x2="380" y2="106" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="280" y1="188" x2="380" y2="188" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="280" y1="270" x2="380" y2="270" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Right: consumer components -->
  <rect x="380" y="76" width="240" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">UserProfile</text>
  <text x="500" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">user 변경 시에만 리렌더 ✓</text>

  <rect x="380" y="158" width="240" height="60" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="500" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">ThemeToggle</text>
  <text x="500" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc" text-anchor="middle">theme 변경 시에만 리렌더 ✓</text>

  <rect x="380" y="240" width="240" height="60" rx="8" fill="#0d1212" stroke="#7ec8e3" stroke-width="1"/>
  <text x="500" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">CartBadge</text>
  <text x="500" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3" text-anchor="middle">cart 변경 시에만 리렌더 ✓</text>

  <!-- Code example -->
  <rect x="648" y="76" width="200" height="224" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="663" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">// 분리된 Provider</text>
  <text x="663" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">&lt;UserProvider&gt;</text>
  <text x="663" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">  &lt;ThemeProvider&gt;</text>
  <text x="663" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    &lt;CartProvider&gt;</text>
  <text x="663" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">      &lt;App /&gt;</text>
  <text x="663" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    &lt;/CartProvider&gt;</text>
  <text x="663" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">  &lt;/ThemeProvider&gt;</text>
  <text x="663" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">&lt;/UserProvider&gt;</text>
  <text x="663" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="11" fill="#55c555">각 Context 독립 업데이트</text>

  <!-- Bottom -->
  <rect x="60" y="330" width="560" height="50" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="340" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">Context를 역할(도메인)별로 분리하면</text>
  <text x="340" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555" text-anchor="middle">관련 없는 컴포넌트의 불필요한 리렌더를 방지</text>
</svg>
