<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">.gitattributes 문법 구조</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">패턴  속성1  속성2  ... 형식</text>

  <!-- Anatomy diagram -->
  <rect x="60" y="90" width="760" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15">
    <tspan x="76" y="128" fill="#ce9178">*.c</tspan>
    <tspan fill="#ffffff">          </tspan>
    <tspan fill="#7ec8e3" font-weight="600">diff</tspan>
    <tspan fill="#ffffff">=cstyle  </tspan>
    <tspan fill="#55c555" font-weight="600">text</tspan>
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#b5cea8">eol</tspan>
    <tspan fill="#ffffff">=lf</tspan>
  </text>

  <!-- Labels pointing to each part -->
  <line x1="86" y1="154" x2="86" y2="174" stroke="#ce9178" stroke-width="1.5"/>
  <text x="86" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">파일 패턴</text>
  <text x="86" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">glob 형식</text>

  <line x1="310" y1="154" x2="310" y2="174" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="310" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">diff 드라이버</text>
  <text x="310" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">diff=&lt;driver&gt;</text>

  <line x1="500" y1="154" x2="500" y2="174" stroke="#55c555" stroke-width="1.5"/>
  <text x="500" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">텍스트 처리</text>
  <text x="500" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">text / -text / auto</text>

  <line x1="680" y1="154" x2="680" y2="174" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="680" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">줄 끝 설정</text>
  <text x="680" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">eol=lf / eol=crlf</text>

  <!-- Attribute types table -->
  <text x="440" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">주요 속성 유형</text>

  <!-- Row 1 -->
  <rect x="60" y="250" width="760" height="36" fill="#0d1520" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="80" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">text</text>
  <text x="220" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">줄 끝 정규화 활성화</text>
  <text x="560" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">*.txt text  /  *.py text=auto</text>

  <!-- Row 2 -->
  <rect x="60" y="288" width="760" height="36" fill="#0a0f1a" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">-text</text>
  <text x="220" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">바이너리로 처리 (줄 끝 변환 없음)</text>
  <text x="560" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">*.png -text  /  *.mp4 -text</text>

  <!-- Row 3 -->
  <rect x="60" y="326" width="760" height="36" fill="#0d1520" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">eol=</text>
  <text x="220" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">체크아웃 시 줄 끝 강제 지정</text>
  <text x="560" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">*.sh eol=lf  /  *.bat eol=crlf</text>

  <!-- Row 4 -->
  <rect x="60" y="364" width="760" height="36" fill="#0a0f1a" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="80" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">diff=</text>
  <text x="220" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">커스텀 diff 드라이버 지정</text>
  <text x="560" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">*.py diff=python</text>

  <!-- Row 5 -->
  <rect x="60" y="402" width="760" height="36" fill="#0d1520" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">merge=</text>
  <text x="220" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">커스텀 merge 전략 드라이버</text>
  <text x="560" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">package-lock.json merge=ours</text>
</svg>
