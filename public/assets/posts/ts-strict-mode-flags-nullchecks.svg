<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">strictNullChecks: 같은 코드, 다른 결과</text>

  <text x="60" y="82" font-size="14" font-weight="600" fill="#e05555">strictNullChecks: false</text>
  <rect x="60" y="94" width="370" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="78" y="120" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> len(s: string) {</tspan>
    <tspan x="78" y="140" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> s.length;</tspan>
    <tspan x="78" y="160" fill="#ffffff">}</tspan>
    <tspan x="78" y="188" fill="#ffffff">len(</tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="78" y="216" fill="#9aa4b8">// 컴파일 통과</tspan>
    <tspan x="78" y="244" fill="#e05555">// 런타임에 TypeError 💥</tspan>
  </text>

  <text x="470" y="82" font-size="14" font-weight="600" fill="#55c555">strictNullChecks: true</text>
  <rect x="470" y="94" width="350" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="488" y="120" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> len(s: string) {</tspan>
    <tspan x="488" y="140" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> s.length;</tspan>
    <tspan x="488" y="160" fill="#ffffff">}</tspan>
    <tspan x="488" y="188" fill="#ffffff">len(</tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="488" y="216" fill="#55c555">// ✅ 컴파일 에러로 차단</tspan>
    <tspan x="488" y="244" fill="#9aa4b8">// null은 string에 할당 불가</tspan>
  </text>
</svg>
