<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="sl1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="sl2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">ServerSocket의 생애 — 한 번 열고, 반복해서 수락한다</text>

  <!-- step boxes -->
  <rect x="60" y="110" width="200" height="90" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="148" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">new ServerSocket</text>
  <text x="160" y="174" font-size="12" fill="#888" text-anchor="middle">포트에 바인딩 (1회)</text>

  <rect x="340" y="110" width="200" height="90" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="148" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">accept()</text>
  <text x="440" y="174" font-size="12" fill="#888" text-anchor="middle">연결을 기다림 (블로킹)</text>

  <rect x="620" y="110" width="200" height="90" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="148" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Socket 반환</text>
  <text x="720" y="174" font-size="12" fill="#888" text-anchor="middle">클라이언트와 1:1 연결</text>

  <line x1="262" y1="155" x2="338" y2="155" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#sl1)"/>
  <line x1="542" y1="155" x2="618" y2="155" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#sl1)"/>

  <!-- loop back arrow -->
  <path d="M 720 202 L 720 250 L 440 250 L 440 202" fill="none" stroke="#7777cc" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#sl2)"/>
  <text x="580" y="272" font-size="12" fill="#7777cc" text-anchor="middle">처리 후 다시 accept() — 다음 클라이언트를 기다린다</text>
</svg>
