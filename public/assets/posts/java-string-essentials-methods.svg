<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">자주 쓰는 String 메서드 한눈에 보기</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">검색 · 변환 · 비교 · 분리 핵심 API</text>

  <!-- Code block left: search/check -->
  <rect x="50" y="92" width="370" height="198" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="66" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 검색·확인</text>
  <text x="66" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">String</tspan><tspan fill="#e8e8e8"> s = </tspan><tspan fill="#ce9178">"Hello, World!"</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="66" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.length();           </tspan><tspan fill="#6a8aa0">// 13</tspan></text>
  <text x="66" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.charAt(</tspan><tspan fill="#b5cea8">7</tspan><tspan fill="#e8e8e8">);        </tspan><tspan fill="#6a8aa0">// 'W'</tspan></text>
  <text x="66" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.indexOf(</tspan><tspan fill="#ce9178">"World"</tspan><tspan fill="#e8e8e8">);  </tspan><tspan fill="#6a8aa0">// 7</tspan></text>
  <text x="66" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.contains(</tspan><tspan fill="#ce9178">"World"</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// true</tspan></text>
  <text x="66" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.startsWith(</tspan><tspan fill="#ce9178">"He"</tspan><tspan fill="#e8e8e8">);  </tspan><tspan fill="#6a8aa0">// true</tspan></text>
  <text x="66" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.endsWith(</tspan><tspan fill="#ce9178">"!"</tspan><tspan fill="#e8e8e8">);    </tspan><tspan fill="#6a8aa0">// true</tspan></text>
  <text x="66" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.isEmpty();          </tspan><tspan fill="#6a8aa0">// false</tspan></text>
  <text x="66" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.isBlank();          </tspan><tspan fill="#6a8aa0">// false (Java11)</tspan></text>

  <!-- Code block right: transform/compare -->
  <rect x="460" y="92" width="370" height="198" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 변환·비교·분리</text>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.toUpperCase();     </tspan><tspan fill="#6a8aa0">// "HELLO, WORLD!"</tspan></text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.toLowerCase();     </tspan><tspan fill="#6a8aa0">// "hello, world!"</tspan></text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.trim();            </tspan><tspan fill="#6a8aa0">// 앞뒤 공백 제거</tspan></text>
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.strip();           </tspan><tspan fill="#6a8aa0">// 유니코드 공백도 제거</tspan></text>
  <text x="476" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.substring(</tspan><tspan fill="#b5cea8">7</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">12</tspan><tspan fill="#e8e8e8">);  </tspan><tspan fill="#6a8aa0">// "World"</tspan></text>
  <text x="476" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.replace(</tspan><tspan fill="#ce9178">'l'</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#ce9178">'L'</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// "HeLLo, WorLd!"</tspan></text>
  <text x="476" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.split(</tspan><tspan fill="#ce9178">", "</tspan><tspan fill="#e8e8e8">);      </tspan><tspan fill="#6a8aa0">// ["Hello","World!"]</tspan></text>
  <text x="476" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.equalsIgnoreCase(</tspan><tspan fill="#ce9178">"hello, world!"</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="476" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">String.join(</tspan><tspan fill="#ce9178">"-"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"b"</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// "a-b"</tspan></text>

  <!-- Bottom: comparison trap -->
  <rect x="50" y="314" width="780" height="92" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="66" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// == vs equals() — 절대 헷갈리지 말 것</text>
  <text x="66" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">String</tspan><tspan fill="#e8e8e8"> a = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> String(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#e8e8e8">);  </tspan><tspan fill="#7ec8e3">String</tspan><tspan fill="#e8e8e8"> b = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> String(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="66" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a == b;           </tspan><tspan fill="#6a8aa0">// </tspan><tspan fill="#e05555">false</tspan><tspan fill="#6a8aa0"> — 참조 비교 (다른 객체)</tspan></text>
  <text x="66" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a.equals(b);      </tspan><tspan fill="#6a8aa0">// </tspan><tspan fill="#55c555">true</tspan><tspan fill="#6a8aa0">  — 내용 비교 (올바른 방법)</tspan></text>

  <!-- Bottom tips row -->
  <rect x="50" y="424" width="240" height="90" rx="8" fill="#0f1a0f" stroke="#55c555"/>
  <text x="170" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Java 11+ 추가 메서드</text>
  <text x="66" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">strip() / stripLeading() / stripTrailing()</text>
  <text x="66" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">isBlank()  ·  repeat(n)  ·  lines()</text>

  <rect x="320" y="424" width="240" height="90" rx="8" fill="#0f0f1a" stroke="#7777cc"/>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">format / valueOf</text>
  <text x="336" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">String.format("%s=%d", key, val)</text>
  <text x="336" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">String.valueOf(42)  →  "42"</text>

  <rect x="590" y="424" width="240" height="90" rx="8" fill="#1a0f0f" stroke="#e05555"/>
  <text x="710" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">흔한 실수</text>
  <text x="606" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">null.equals()  →  NullPointerException</text>
  <text x="606" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">"literal".equals(var) 패턴으로 방어</text>
</svg>
