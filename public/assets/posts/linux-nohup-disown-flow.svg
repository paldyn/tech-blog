<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SIGHUP 전파와 nohup/disown 보호</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">터미널 종료 시 프로세스가 죽는 이유와 방어 방법</text>

  <!-- Terminal/Session box -->
  <rect x="50" y="90" width="180" height="260" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">터미널</text>
  <text x="140" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(SSH 세션)</text>

  <rect x="66" y="148" width="148" height="34" rx="4" fill="#1a2535" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">sshd (세션 리더)</text>

  <rect x="66" y="192" width="148" height="34" rx="4" fill="#0f2010" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">bash (셸)</text>

  <rect x="66" y="236" width="148" height="34" rx="4" fill="#1a1000" stroke="#b5cea8" stroke-width="1"/>
  <text x="140" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8" text-anchor="middle">job1 (백그라운드)</text>

  <rect x="66" y="280" width="148" height="34" rx="4" fill="#1a1000" stroke="#b5cea8" stroke-width="1"/>
  <text x="140" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8" text-anchor="middle">job2 (백그라운드)</text>

  <!-- X marks terminal close -->
  <text x="140" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="24" fill="#e05555" text-anchor="middle">✕ 종료</text>
  <text x="140" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">연결 끊김</text>

  <!-- SIGHUP arrow to job1 (dies) -->
  <line x1="230" y1="253" x2="330" y2="200" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="330,193 342,200 330,207" fill="#e05555"/>
  <text x="285" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">SIGHUP</text>

  <!-- job1 dead box -->
  <rect x="342" y="178" width="180" height="48" rx="8" fill="#200a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="432" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">job1 종료 ✕</text>
  <text x="432" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SIGHUP 수신 → 기본 종료</text>

  <!-- nohup protected job2 -->
  <line x1="230" y1="297" x2="330" y2="310" stroke="#55c555" stroke-width="2"/>
  <polygon points="330,303 342,310 330,317" fill="#55c555"/>
  <text x="285" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">nohup</text>

  <!-- job2 survives box -->
  <rect x="342" y="288" width="220" height="48" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="452" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">job2 생존 ✓</text>
  <text x="452" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SIGHUP 무시 → 계속 실행</text>

  <!-- PID 1 adoption arrow -->
  <line x1="562" y1="312" x2="660" y2="312" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="660,305 672,312 660,319" fill="#7777cc"/>
  <text x="611" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">부모 변경</text>

  <!-- PID 1 box -->
  <rect x="672" y="292" width="160" height="40" rx="8" fill="#1a2535" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="752" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">systemd (PID 1)</text>

  <!-- Comparison table at bottom -->
  <rect x="50" y="410" width="780" height="72" rx="8" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">nohup vs disown</text>

  <text x="160" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">nohup</text>
  <text x="160" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">시작 전 — SIGHUP 무시 설정</text>

  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">disown</text>
  <text x="440" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">시작 후 — 셸 작업 테이블에서 제거</text>

  <text x="720" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">tmux/screen</text>
  <text x="720" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">세션 자체를 분리 — 완전한 재접속 가능</text>
</svg>
