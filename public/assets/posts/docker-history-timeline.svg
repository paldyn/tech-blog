<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컨테이너 기술의 역사</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">1979 ~ 2024</text>

  <!-- Timeline axis -->
  <line x1="100" y1="240" x2="780" y2="240" stroke="#333" stroke-width="2"/>
  <!-- Arrowhead -->
  <polygon points="780,240 768,234 768,246" fill="#333"/>

  <!-- Events above the line -->

  <!-- 1979 chroot -->
  <line x1="130" y1="200" x2="130" y2="240" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="130" cy="240" r="5" fill="#7777cc"/>
  <rect x="64" y="148" width="132" height="48" fill="#13122a" stroke="#7777cc" rx="6"/>
  <text x="130" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">1979</text>
  <text x="130" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">chroot 등장</text>

  <!-- 2000 FreeBSD Jails -->
  <line x1="230" y1="200" x2="230" y2="240" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="230" cy="240" r="5" fill="#7777cc"/>
  <rect x="166" y="148" width="128" height="48" fill="#13122a" stroke="#7777cc" rx="6"/>
  <text x="230" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">2000</text>
  <text x="230" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">FreeBSD Jails</text>

  <!-- 2006 cgroups -->
  <line x1="330" y1="280" x2="330" y2="240" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="330" cy="240" r="5" fill="#55c555"/>
  <rect x="266" y="286" width="128" height="48" fill="#0f1f0f" stroke="#55c555" rx="6"/>
  <text x="330" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">2006</text>
  <text x="330" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">cgroups (Google)</text>

  <!-- 2008 LXC -->
  <line x1="420" y1="200" x2="420" y2="240" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="420" cy="240" r="5" fill="#7ec8e3"/>
  <rect x="356" y="148" width="128" height="48" fill="#0d1a20" stroke="#7ec8e3" rx="6"/>
  <text x="420" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">2008</text>
  <text x="420" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">LXC 등장</text>

  <!-- 2013 Docker -->
  <line x1="530" y1="280" x2="530" y2="240" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="530" cy="240" r="7" fill="#e0a030"/>
  <rect x="462" y="286" width="136" height="48" fill="#1a1408" stroke="#e0a030" stroke-width="2" rx="6"/>
  <text x="530" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e0a030">2013</text>
  <text x="530" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Docker 오픈소스 공개</text>

  <!-- 2014 Kubernetes -->
  <line x1="620" y1="200" x2="620" y2="240" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="620" cy="240" r="6" fill="#7ec8e3"/>
  <rect x="556" y="148" width="128" height="48" fill="#0d1a20" stroke="#7ec8e3" rx="6"/>
  <text x="620" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">2015</text>
  <text x="620" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">OCI + k8s 1.0</text>

  <!-- 2017 containerd / Moby -->
  <line x1="710" y1="280" x2="710" y2="240" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="710" cy="240" r="5" fill="#55c555"/>
  <rect x="644" y="286" width="132" height="48" fill="#0f1f0f" stroke="#55c555" rx="6"/>
  <text x="710" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">2017</text>
  <text x="710" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">containerd / Moby</text>

  <!-- Year labels on axis -->
  <text x="130" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">1979</text>
  <text x="230" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2000</text>
  <text x="330" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2006</text>
  <text x="420" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2008</text>
  <text x="530" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2013</text>
  <text x="620" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2015</text>
  <text x="710" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2017</text>

  <!-- Bottom note -->
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">컨테이너 기술은 UNIX chroot(1979)에서 시작해 45년에 걸쳐 발전했습니다</text>
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">Docker(2013)는 이 모든 기술을 개발자가 쉽게 쓸 수 있는 단일 도구로 통합했습니다</text>
</svg>
