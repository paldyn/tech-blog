<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker image ls — 필터 &amp; 포맷 패턴</text>

  <!-- Left column: filter -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">필터 옵션</text>
  <rect x="60" y="92" width="370" height="154" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 특정 이미지만 조회</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker images</tspan><tspan fill="#e8e8e8"> nginx</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 댕글링 이미지만</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker images</tspan><tspan fill="#e8e8e8"> --filter </tspan><tspan fill="#ce9178">'dangling=true'</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 특정 이미지 기반 자식 이미지</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker images</tspan><tspan fill="#e8e8e8"> --filter </tspan><tspan fill="#ce9178">'since=nginx:1.25'</ttml></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 특정 라벨</text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker images</tspan><tspan fill="#e8e8e8"> --filter </tspan><tspan fill="#ce9178">'label=version=1.0'</tspan></text>

  <!-- Left column: extra options -->
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">기타 옵션</text>
  <rect x="60" y="280" width="370" height="72" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># ID만 출력 (스크립트용)</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker images</tspan><tspan fill="#e8e8e8"> -q myapp</tspan></text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 중간 레이어 포함 전체 표시</text>

  <!-- Right column: format -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">포맷 커스터마이징</text>
  <rect x="448" y="92" width="372" height="136" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="464" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 이름:태그만 출력</text>
  <text x="464" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker images</tspan><tspan fill="#e8e8e8"> \</tspan></text>
  <text x="464" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  --format </tspan><tspan fill="#ce9178">'{{.Repository}}:{{.Tag}}'</tspan></text>
  <text x="464" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># JSON 출력</text>
  <text x="464" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker images</tspan><tspan fill="#e8e8e8"> --format </tspan><tspan fill="#ce9178">'{{json .}}'</tspan><tspan fill="#e8e8e8"> | jq .</tspan></text>
  <text x="464" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 테이블 포맷 (헤더 포함)</text>
  <text x="464" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker images</tspan><tspan fill="#e8e8e8"> \</tspan></text>
  <text x="464" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  --format </tspan><tspan fill="#ce9178">'table {{.Repository}}\t{{.Size}}'</tspan></text>

  <!-- Right column: practical examples -->
  <text x="460" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">댕글링 이미지 정리</text>
  <rect x="448" y="268" width="372" height="84" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="464" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 댕글링 이미지 일괄 삭제</text>
  <text x="464" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker rmi</tspan><tspan fill="#e8e8e8"> $(</tspan><tspan fill="#7ec8e3">docker images</tspan><tspan fill="#e8e8e8"> -qf dangling=true)</tspan></text>
  <text x="464" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 또는 prune 활용</text>
  <text x="464" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker image prune</tspan></text>

  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">가용 포맷 변수: .Repository .Tag .ID .CreatedAt .Size .Digest</text>
</svg>
