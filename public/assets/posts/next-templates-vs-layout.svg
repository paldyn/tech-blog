<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">layout.tsx vs template.tsx</text>

  <!-- LEFT PANEL: layout.tsx -->
  <rect x="50" y="68" width="360" height="400" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="230" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">layout.tsx</text>
  <text x="230" y="117" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">페이지 이동 시 리렌더 없음</text>

  <!-- Layout wrapper (persistent) -->
  <rect x="75" y="132" width="310" height="52" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Layout 컴포넌트</text>
  <text x="230" y="173" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">마운트 1회 — 재사용됨</text>

  <!-- Page A (left) -->
  <rect x="85" y="208" width="120" height="44" rx="6" fill="#1e2d3d" stroke="#3a4a6e" stroke-width="1"/>
  <text x="145" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">page-a</text>
  <text x="145" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">현재 페이지</text>

  <!-- Page B (left) -->
  <rect x="250" y="208" width="120" height="44" rx="6" fill="#1e2d3d" stroke="#3a4a6e" stroke-width="1"/>
  <text x="310" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">page-b</text>
  <text x="310" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이동 후</text>

  <!-- Arrow A→B (left) -->
  <line x1="205" y1="230" x2="250" y2="230" stroke="#55c555" stroke-width="2"
        marker-end="url(#arr-green)"/>

  <!-- State persists indicator -->
  <rect x="75" y="276" width="310" height="50" rx="6" fill="#0a1a0a" stroke="#55c555"
        stroke-width="1" stroke-dasharray="4,4"/>
  <text x="230" y="297" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">상태 유지</text>
  <text x="230" y="315" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">useState, useEffect 그대로 유지</text>

  <!-- Code block (left) -->
  <rect x="75" y="346" width="310" height="104" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="91" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// app/dashboard/layout.tsx</text>
  <text x="91" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export default function</text>
  <text x="91" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  Layout({ children }) {</text>
  <text x="91" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  return &lt;div&gt;{children}&lt;/div&gt;</text>
  <text x="91" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- RIGHT PANEL: template.tsx -->
  <rect x="470" y="68" width="360" height="400" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="650" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">template.tsx</text>
  <text x="650" y="117" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">페이지 이동마다 재마운트</text>

  <!-- Template instance 1 -->
  <rect x="490" y="132" width="140" height="52" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="560" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Template #1</text>
  <text x="560" y="173" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">page-a 방문 시</text>

  <!-- Template instance 2 -->
  <rect x="650" y="132" width="140" height="52" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Template #2</text>
  <text x="720" y="173" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">page-b 방문 시</text>

  <!-- Arrow T1→T2 -->
  <line x1="630" y1="158" x2="650" y2="158" stroke="#e05555" stroke-width="2"
        marker-end="url(#arr-red)"/>

  <!-- Page A (right) -->
  <rect x="495" y="208" width="120" height="44" rx="6" fill="#1e2d3d" stroke="#3a4a6e" stroke-width="1"/>
  <text x="555" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">page-a</text>
  <text x="555" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">현재 페이지</text>

  <!-- Page B (right) -->
  <rect x="655" y="208" width="120" height="44" rx="6" fill="#1e2d3d" stroke="#3a4a6e" stroke-width="1"/>
  <text x="715" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">page-b</text>
  <text x="715" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이동 후</text>

  <!-- State resets indicator -->
  <rect x="490" y="276" width="310" height="50" rx="6" fill="#1a0a0a" stroke="#e05555"
        stroke-width="1" stroke-dasharray="4,4"/>
  <text x="645" y="297" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">상태 초기화</text>
  <text x="645" y="315" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새 인스턴스 생성 — state 리셋</text>

  <!-- Code block (right) -->
  <rect x="490" y="346" width="310" height="104" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// app/dashboard/template.tsx</text>
  <text x="506" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export default function</text>
  <text x="506" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  Template({ children }) {</text>
  <text x="506" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  return &lt;div&gt;{children}&lt;/div&gt;</text>
  <text x="506" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
