<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">사용 시나리오 결정 가이드</text>

  <!-- SCP scenarios -->
  <rect x="60" y="64" width="360" height="40" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">SCP 를 선택하는 상황</text>

  <rect x="60" y="112" width="360" height="44" rx="5" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="86" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">CI/CD 파이프라인 배포 단계</text>
  <text x="86" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">빌드 결과물 한 개를 서버로 밀어넣을 때</text>

  <rect x="60" y="164" width="360" height="44" rx="5" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="86" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">스크립트 한 줄 복사</text>
  <text x="86" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">scp 설정 파일 server1:~/ 즉시 배포</text>

  <rect x="60" y="216" width="360" height="44" rx="5" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="86" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">소용량 파일 임시 복사</text>
  <text x="86" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로그 파일, 설정 파일 등 1회성</text>

  <rect x="60" y="268" width="360" height="44" rx="5" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="86" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">rsync가 설치되지 않은 환경</text>
  <text x="86" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">구형 장비, 미니멀 컨테이너 등</text>

  <!-- rsync scenarios -->
  <rect x="460" y="64" width="360" height="40" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="640" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">rsync 를 선택하는 상황</text>

  <rect x="460" y="112" width="360" height="44" rx="5" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="486" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">정기 백업 (일/주 단위)</text>
  <text x="486" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">증분 전송으로 시간·대역폭 절약</text>

  <rect x="460" y="164" width="360" height="44" rx="5" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="486" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">대용량 파일 (수 GB~TB)</text>
  <text x="486" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">중단 재개·변경분만 전송</text>

  <rect x="460" y="216" width="360" height="44" rx="5" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="486" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">웹 루트 배포 미러링</text>
  <text x="486" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">--delete 로 삭제된 파일도 동기화</text>

  <rect x="460" y="268" width="360" height="44" rx="5" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="486" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">느린 네트워크 환경</text>
  <text x="486" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">-z 압축 + 델타로 대역폭 최소화</text>

  <!-- Bottom note -->
  <rect x="60" y="328" width="760" height="36" rx="6" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">rsync는 내부적으로 SSH를 사용 → 인증·암호화는 동일. 선택 기준은 '효율성'과 '기능'</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">SCP는 deprecation 논의 중(OpenSSH 9.0+), 신규 스크립트는 rsync 권장</text>
</svg>
