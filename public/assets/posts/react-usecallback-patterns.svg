<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useCallback 주요 패턴</text>

  <!-- Pattern 1: React.memo + useCallback -->
  <rect x="60" y="66" width="360" height="170" rx="8" fill="#0a200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">React.memo + useCallback</text>
  <rect x="76" y="100" width="328" height="122" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> Child = React.memo(({ onClick }) =&gt; (</tspan></text>
  <text x="88" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">button</tspan><tspan fill="#ffffff"> onClick={onClick}&gt;클릭&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">button</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="88" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">));</tspan></text>
  <text x="88" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> onClick = </tspan><tspan fill="#7ec8e3" font-weight="600">useCallback</tspan><tspan fill="#ffffff">(() =&gt; {</tspan></text>
  <text x="88" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  doSomething();</tspan></text>
  <text x="88" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">}, []);</tspan></text>

  <!-- Pattern 2: useEffect deps -->
  <rect x="460" y="66" width="360" height="170" rx="8" fill="#0a1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">useEffect 의존성에 함수</text>
  <rect x="476" y="100" width="328" height="122" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="488" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#9aa4b8">// 함수를 deps에 넣을 때 useCallback 필수</tspan></text>
  <text x="488" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> fetchData = </tspan><tspan fill="#7ec8e3" font-weight="600">useCallback</tspan><tspan fill="#ffffff">(() =&gt; {</tspan></text>
  <text x="488" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">fetch</tspan><tspan fill="#ffffff">(`/api/${userId}`);</tspan></text>
  <text x="488" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">}, [userId]);</tspan></text>
  <text x="488" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">useEffect</tspan><tspan fill="#ffffff">(() =&gt; {</tspan></text>
  <text x="488" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">fetchData</tspan><tspan fill="#ffffff">();</tspan></text>

  <!-- Pattern 3: Wrong use / Anti-pattern -->
  <rect x="60" y="258" width="360" height="160" rx="8" fill="#200a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">불필요한 사용 (피할 것)</text>
  <rect x="76" y="292" width="328" height="112" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// DOM 이벤트 핸들러에 직접 쓰면 효과 없음</text>
  <text x="88" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#9aa4b8">// onClick={useCallback...} — React.memo 없으면 의미 없음</tspan></text>
  <text x="88" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#e05555">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#e05555">button</tspan><tspan fill="#ffffff"> onClick={</tspan><tspan fill="#e05555">useCallback</tspan><tspan fill="#ffffff">(...)} /&gt;</tspan></text>
  <text x="88" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// ↑ 부모가 리렌더되면 어차피 자식도 리렌더됨</text>
  <text x="88" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// React.memo + useCallback 세트로 써야 의미 있음</text>
  <text x="88" y="399" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">// useCallback만 쓰면 오히려 비용 추가</text>
</svg>