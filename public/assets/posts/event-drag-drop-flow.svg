<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Drag &amp; Drop 이벤트 흐름</text>

  <!-- Source element events (left column) -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">드래그 소스 이벤트</text>

  <rect x="60" y="96" width="220" height="44" rx="6" fill="#131a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="119" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">dragstart</text>
  <text x="170" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">dataTransfer에 데이터 저장</text>

  <line x1="170" y1="140" x2="170" y2="160" stroke="#555" stroke-width="1.5"/>
  <polygon points="170,164 165,156 175,156" fill="#555"/>

  <rect x="60" y="164" width="220" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="170" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">drag</text>
  <text x="170" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">드래그 중 반복 발생</text>

  <line x1="170" y1="208" x2="170" y2="228" stroke="#555" stroke-width="1.5"/>
  <polygon points="170,232 165,224 175,224" fill="#555"/>

  <rect x="60" y="232" width="220" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="255" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">dragend</text>
  <text x="170" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">드롭 성공·실패 모두 발생</text>

  <!-- Target element events (right column) -->
  <text x="500" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8a84c">드롭 대상 이벤트</text>

  <rect x="500" y="96" width="220" height="44" rx="6" fill="#131a2e" stroke="#e8a84c" stroke-width="1.5"/>
  <text x="610" y="119" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8a84c" text-anchor="middle">dragenter</text>
  <text x="610" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">요소 진입 시</text>

  <line x1="610" y1="140" x2="610" y2="160" stroke="#555" stroke-width="1.5"/>
  <polygon points="610,164 605,156 615,156" fill="#555"/>

  <rect x="500" y="164" width="220" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="610" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">dragover</text>
  <text x="610" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">요소 위에서 반복 발생</text>

  <line x1="610" y1="208" x2="610" y2="228" stroke="#555" stroke-width="1.5"/>
  <polygon points="610,232 605,224 615,224" fill="#555"/>

  <rect x="500" y="232" width="220" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="610" y="255" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">dragleave</text>
  <text x="610" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">요소 이탈 시</text>

  <line x1="610" y1="276" x2="610" y2="296" stroke="#555" stroke-width="1.5"/>
  <polygon points="610,300 605,292 615,292" fill="#555"/>

  <rect x="500" y="300" width="220" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">drop</text>
  <text x="610" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">데이터 수신 처리</text>

  <!-- Key requirement box -->
  <rect x="60" y="310" width="380" height="80" rx="8" fill="#2a1a0a" stroke="#e8a84c" stroke-width="1.5"/>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a84c">드롭 허용을 위한 필수 조건</text>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">dragover 리스너에서 e.preventDefault() 호출</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">호출 안 하면 drop 이벤트 자체가 발생하지 않음</text>

  <!-- dataTransfer box -->
  <text x="60" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">dataTransfer 핵심 API</text>

  <rect x="60" y="436" width="760" height="48" rx="6" fill="#131a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">setData(type, data) — 설정 | getData(type) — 읽기 | setDragImage(el, x, y) — 고스트 이미지 커스텀</text>
  <text x="80" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">effectAllowed: 'copy'|'move'|'link'   dropEffect: 'copy'|'move'|'link'|'none'</text>
</svg>
