<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">비교 연산자와 암묵적 형변환 흐름</text>

  <!-- Abstract Equality (==) flow -->
  <text x="300" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#e05555">== (느슨한 동등) 변환 흐름</text>

  <!-- Start node -->
  <rect x="80" y="92" width="440" height="40" fill="#141f2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="300" y="117" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">x == y 비교 시작</text>

  <line x1="300" y1="134" x2="300" y2="152" stroke="#888" stroke-width="1.5"/>
  <polygon points="296,149 300,162 304,149" fill="#888"/>

  <!-- Step 1: same type? -->
  <rect x="80" y="162" width="440" height="40" fill="#0f1a0f" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="300" y="187" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">타입이 같은가?</text>

  <!-- Yes branch -->
  <text x="146" y="230"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">YES →</text>
  <rect x="80" y="240" width="200" height="40" fill="#0f1a0f" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="265" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">===와 동일 비교</text>

  <!-- No branch -->
  <text x="420" y="230"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">NO ↓</text>
  <line x1="300" y1="202" x2="300" y2="240" stroke="#888" stroke-width="1.5"/>
  <polygon points="296,237 300,250 304,237" fill="#888"/>

  <!-- Step 2: null/undefined? -->
  <rect x="80" y="250" width="440" height="40" fill="#0f0f1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="300" y="275" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">null == undefined? → true (특별 규칙)</text>

  <line x1="300" y1="292" x2="300" y2="310" stroke="#888" stroke-width="1.5"/>
  <polygon points="296,307 300,320 304,307" fill="#888"/>

  <!-- Step 3: number+string? -->
  <rect x="80" y="320" width="440" height="40" fill="#0f0f1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="300" y="345" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">number + string → string을 Number()로 변환</text>

  <line x1="300" y1="362" x2="300" y2="380" stroke="#888" stroke-width="1.5"/>
  <polygon points="296,377 300,390 304,377" fill="#888"/>

  <!-- Step 4: boolean involved? -->
  <rect x="80" y="390" width="440" height="32" fill="#0f0f1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="300" y="411" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc">boolean 포함 → boolean을 Number()로 변환 후 재비교</text>

  <!-- Right: practical advice -->
  <text x="720" y="120" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">실무 가이드</text>

  <rect x="580" y="132" width="260" height="260" fill="#0f0f0f" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="596" y="156"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e05555">❌ 피해야 할 패턴</text>
  <text x="596" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">if (x == false)</tspan>
  </text>
  <text x="596" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">if (x == 0)</tspan>
  </text>
  <text x="596" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">if (x == "")</tspan>
  </text>

  <text x="596" y="246"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">✅ 권장 패턴</text>
  <text x="596" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">if (!x)</tspan>
  </text>
  <text x="596" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">if (x === 0)</tspan>
  </text>
  <text x="596" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">if (x === "")</tspan>
  </text>
  <text x="596" y="340"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">null/undefined 예외:</text>
  <text x="596" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">if (x == null)</tspan>
  </text>
  <text x="596" y="376"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">= null 또는 undefined</text>

  <!-- Bottom note -->
  <text x="300" y="434" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">ESLint eqeqeq 규칙: == 사용 시 경고 → 팀 전체에 === 강제 적용 권장</text>
</svg>
