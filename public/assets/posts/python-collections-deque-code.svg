<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">deque 주요 메서드 코드 예제</text>

  <!-- Left -->
  <text x="70" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">기본 조작</text>
  <rect x="60" y="88" width="370" height="240" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from collections <tspan fill="#7ec8e3">import</tspan> deque</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dq = deque([<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">2</tspan>, <tspan fill="#b5cea8">3</tspan>])</text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dq.append(<tspan fill="#b5cea8">4</tspan>)       <tspan fill="#6a8aa0"># [1,2,3,4]</tspan></text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dq.appendleft(<tspan fill="#b5cea8">0</tspan>)  <tspan fill="#6a8aa0"># [0,1,2,3,4]</tspan></text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dq.pop()         <tspan fill="#6a8aa0"># → 4, [0,1,2,3]</tspan></text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dq.popleft()     <tspan fill="#6a8aa0"># → 0, [1,2,3]</tspan></text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dq.rotate(<tspan fill="#b5cea8">1</tspan>)     <tspan fill="#6a8aa0"># [3,1,2]</tspan></text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dq.rotate(-<tspan fill="#b5cea8">1</tspan>)    <tspan fill="#6a8aa0"># [1,2,3]</tspan></text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dq.extendleft([<tspan fill="#b5cea8">-1</tspan>, <tspan fill="#b5cea8">-2</tspan>])</text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># [-2,-1,1,2,3] ← 역순 주의</text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">len</tspan>(dq), dq[<tspan fill="#b5cea8">0</tspan>], dq[-<tspan fill="#b5cea8">1</tspan>]</text>

  <!-- Right: maxlen sliding window -->
  <text x="460" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#b5cea8">maxlen 슬라이딩 윈도우</text>
  <rect x="450" y="88" width="370" height="240" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 최근 5개만 유지</text>
  <text x="466" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">history = deque(maxlen=<tspan fill="#b5cea8">5</tspan>)</text>
  <text x="466" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for <text x="466" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    i </text></text>
  <text x="466" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">for i in range(<tspan fill="#b5cea8">8</tspan>):</text>
  <text x="466" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    history.append(i)</text>
  <text x="466" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 마지막: deque([3,4,5,6,7])</text>
  <text x="466" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 오래된 것은 자동 제거</text>
  <text x="466" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># BFS 큐로도 활용</text>
  <text x="466" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">queue = deque([start])</text>
  <text x="466" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">while queue:</text>
  <text x="466" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    node = queue.popleft()</text>
  <text x="466" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    queue.extend(neighbors)</text>

  <!-- Bottom note -->
  <rect x="60" y="352" width="760" height="60" rx="8" fill="#0d0d0d" stroke="#1e2433"/>
  <text x="440" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">임의 접근(dq[i])은 O(n) — 리스트처럼 인덱스 접근이 잦다면 list 권장</text>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">양쪽 끝에서 삽입·삭제가 빈번할 때만 deque를 선택하세요</text>
</svg>
