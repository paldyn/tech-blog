<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="ev-arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="ev-arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="ev-arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#e05555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">EventEmitter · 이벤트 발행-구독 패턴</text>

  <!-- EventEmitter core box -->
  <rect x="310" y="72" width="260" height="160" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="98" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#7ec8e3">EventEmitter</text>

  <rect x="326" y="110" width="228" height="22" rx="4" fill="#0a1520"/>
  <text x="440" y="126" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">on(event, listener)</text>

  <rect x="326" y="138" width="228" height="22" rx="4" fill="#0a1520"/>
  <text x="440" y="154" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">once(event, listener)</text>

  <rect x="326" y="166" width="228" height="22" rx="4" fill="#0a1520"/>
  <text x="440" y="182" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">emit(event, ...args)</text>

  <rect x="326" y="194" width="228" height="22" rx="4" fill="#0a1520"/>
  <text x="440" y="210" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">off(event, listener)</text>

  <!-- Listeners (right) -->
  <rect x="640" y="96" width="200" height="40" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Listener A</text>
  <text x="740" y="128" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">on('data', fnA)</text>

  <rect x="640" y="148" width="200" height="40" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Listener B</text>
  <text x="740" y="180" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">once('data', fnB)</text>

  <rect x="640" y="200" width="200" height="40" rx="6" fill="#0a2010" stroke="#7777cc" stroke-width="1.5"/>
  <text x="740" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Error Handler</text>
  <text x="740" y="232" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">on('error', fnC)</text>

  <!-- Arrows: emit → listeners -->
  <line x1="570" y1="152" x2="632" y2="116" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ev-arr)"/>
  <line x1="570" y1="165" x2="632" y2="168" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ev-arr)"/>

  <!-- emit label -->
  <text x="600" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">emit('data')</text>

  <!-- emitter caller (left) -->
  <rect x="60" y="120" width="230" height="80" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="175" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">이벤트 발생 주체</text>
  <text x="175" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">emitter.emit('data', buf)</text>
  <text x="175" y="182" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">emitter.emit('error', err)</text>

  <line x1="290" y1="152" x2="308" y2="152" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ev-arr)"/>

  <!-- Memory leak warning -->
  <rect x="60" y="260" width="760" height="66" rx="8" fill="#140e00" stroke="#e0a030" stroke-width="1.5"/>
  <text x="440" y="286" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e0a030">⚠ 메모리 누수 경고</text>
  <text x="440" y="308" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">기본 최대 리스너 수: 10개 — 초과 시 "MaxListenersExceededWarning" 경고</text>
  <text x="440" y="320" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#888">emitter.setMaxListeners(20)  또는  emitter.setMaxListeners(Infinity)</text>

  <!-- API table -->
  <rect x="60" y="346" width="760" height="72" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <text x="174" y="372" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">on(e, fn)</text>
  <text x="174" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">영구 리스너</text>

  <text x="310" y="372" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">once(e, fn)</text>
  <text x="310" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1회 후 제거</text>

  <text x="440" y="372" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">emit(e, …args)</text>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동기 순서대로 호출</text>

  <text x="580" y="372" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">off(e, fn)</text>
  <text x="580" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리스너 제거</text>

  <text x="730" y="372" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a030">prependListener</text>
  <text x="730" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">맨 앞에 삽입</text>
</svg>
