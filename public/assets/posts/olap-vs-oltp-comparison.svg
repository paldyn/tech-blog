<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OLTP vs OLAP: 근본적 차이</text>

  <!-- Header row -->
  <rect x="60" y="65" width="360" height="46" rx="8" fill="#12213a" stroke="#3a6ea8" stroke-width="2"/>
  <text x="240" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">OLTP (트랜잭션 처리)</text>

  <rect x="460" y="65" width="360" height="46" rx="8" fill="#1a2010" stroke="#4a6020" stroke-width="2"/>
  <text x="640" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#88cc44" text-anchor="middle">OLAP (분석 처리)</text>

  <!-- Row 1: 목적 -->
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">목적</text>
  <rect x="60" y="140" width="360" height="46" rx="6" fill="#0e1c30" stroke="#1e3a5a" stroke-width="1"/>
  <text x="240" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">단건 읽기·쓰기 · 소규모 업데이트</text>

  <rect x="460" y="140" width="360" height="46" rx="6" fill="#0e1a08" stroke="#1e3a10" stroke-width="1"/>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">대용량 집계 · 복잡한 리포트</text>

  <!-- Row 2: 데이터 규모 -->
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">데이터 규모</text>
  <rect x="60" y="210" width="360" height="46" rx="6" fill="#0e1c30" stroke="#1e3a5a" stroke-width="1"/>
  <text x="240" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">KB 단위 · 수백~수천 행</text>

  <rect x="460" y="210" width="360" height="46" rx="6" fill="#0e1a08" stroke="#1e3a10" stroke-width="1"/>
  <text x="640" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">GB~TB 단위 · 수억 행 스캔</text>

  <!-- Row 3: 쿼리 패턴 -->
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">쿼리 패턴</text>
  <rect x="60" y="280" width="360" height="46" rx="6" fill="#0e1c30" stroke="#1e3a5a" stroke-width="1"/>
  <text x="240" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">PK 기반 포인트 조회 · 단순 JOIN</text>

  <rect x="460" y="280" width="360" height="46" rx="6" fill="#0e1a08" stroke="#1e3a10" stroke-width="1"/>
  <text x="640" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">GROUP BY · WINDOW · 복잡한 집계</text>

  <!-- Row 4: 스토리지 구조 -->
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">스토리지 구조</text>
  <rect x="60" y="350" width="360" height="46" rx="6" fill="#0e1c30" stroke="#1e3a5a" stroke-width="1"/>
  <text x="240" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">행 지향(Row-oriented) · B-Tree 인덱스</text>

  <rect x="460" y="350" width="360" height="46" rx="6" fill="#0e1a08" stroke="#1e3a10" stroke-width="1"/>
  <text x="640" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">열 지향(Column-oriented) · 높은 압축률</text>

  <!-- Row 5: 대표 시스템 -->
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">대표 시스템</text>
  <rect x="60" y="420" width="360" height="46" rx="6" fill="#0e1c30" stroke="#1e3a5a" stroke-width="1"/>
  <text x="240" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">MySQL · PostgreSQL · Oracle · SQL Server</text>

  <rect x="460" y="420" width="360" height="46" rx="6" fill="#0e1a08" stroke="#1e3a10" stroke-width="1"/>
  <text x="640" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#88cc44" text-anchor="middle">BigQuery · Snowflake · Redshift · ClickHouse</text>

  <text x="440" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HTAP: TiDB / DuckDB처럼 두 워크로드를 동시에 처리하는 시스템도 등장</text>
</svg>
