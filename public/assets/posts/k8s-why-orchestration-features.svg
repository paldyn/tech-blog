<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">쿠버네티스 핵심 기능 6가지</text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">K8s가 기본으로 제공하는 오케스트레이션 기능</text>

  <!-- Row 1: Self-healing + Auto-scaling -->
  <!-- Self-healing box -->
  <rect x="60" y="100" width="370" height="110" rx="8" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="128"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Self-healing</text>
  <text x="80" y="148"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파드 장애 시 자동 재시작, 노드 장애 시</text>
  <text x="80" y="164"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">다른 노드로 자동 재스케줄링.</text>
  <text x="80" y="184"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ 온콜 없이 365일 24시간 자동 복구</text>

  <!-- Auto-scaling box -->
  <rect x="450" y="100" width="370" height="110" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="128"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Auto-scaling (HPA)</text>
  <text x="470" y="148"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU/메모리 사용률 기준으로 파드 수를</text>
  <text x="470" y="164"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">minReplicas ~ maxReplicas 범위에서 자동 조절.</text>
  <text x="470" y="184"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">→ 트래픽 폭증·감소에 자동 대응</text>

  <!-- Row 2: Service Discovery + Rolling Update -->
  <!-- Service discovery box -->
  <rect x="60" y="230" width="370" height="110" rx="8" fill="#1e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="258"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">Service Discovery</text>
  <text x="80" y="278"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ClusterIP Service + CoreDNS로 안정적인</text>
  <text x="80" y="294"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서비스 이름(DNS) 제공. 파드 IP 변경 무관.</text>
  <text x="80" y="314"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">→ http://user-service:8080 으로 항상 접근</text>

  <!-- Rolling update box -->
  <rect x="450" y="230" width="370" height="110" rx="8" fill="#2d1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="470" y="258"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#ce9178">Rolling Update</text>
  <text x="470" y="278"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파드를 하나씩 교체해 무중단 배포 구현.</text>
  <text x="470" y="294"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">문제 발생 시 kubectl rollout undo 로 즉시 롤백.</text>
  <text x="470" y="314"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">→ 서비스 중단 없이 버전 업그레이드</text>

  <!-- Row 3: Secret Mgmt + Storage -->
  <!-- Secret management box -->
  <rect x="60" y="360" width="370" height="110" rx="8" fill="#200d1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="388"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">Secret Management</text>
  <text x="80" y="408"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비밀번호, API 키 등 민감 정보를 Secret으로</text>
  <text x="80" y="424"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">분리 저장. 코드 내 하드코딩 방지.</text>
  <text x="80" y="444"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">→ ConfigMap/Secret으로 설정 외부화</text>

  <!-- Storage box -->
  <rect x="450" y="360" width="370" height="110" rx="8" fill="#1a1400" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="470" y="388"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#b5cea8">Persistent Storage</text>
  <text x="470" y="408"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PersistentVolume/PVC로 파드 생명주기와</text>
  <text x="470" y="424"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">독립적인 스토리지 관리. 동적 프로비저닝 지원.</text>
  <text x="470" y="444"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">→ 파드 재시작 후에도 데이터 보존</text>

  <!-- Bottom summary bar -->
  <rect x="60" y="492" width="760" height="32" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="513" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이 6가지 기능은 K8s가 기본 제공 — 별도 도구 없이 YAML 선언만으로 활성화</text>
</svg>
