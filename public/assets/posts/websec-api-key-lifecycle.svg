<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">API 키 생명주기 관리</text>

  <!-- Lifecycle stages -->
  <!-- Stage 1: Generate -->
  <rect x="60" y="70" width="140" height="70" rx="8" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="2"/>
  <text x="130" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">1. 생성</text>
  <text x="130" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CSPRNG 32바이트+</text>
  <text x="130" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">접두사 포함</text>

  <line x1="200" y1="105" x2="240" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Stage 2: Store -->
  <rect x="240" y="70" width="140" height="70" rx="8" fill="#0d1a2e" stroke="#1a3a5e" stroke-width="2"/>
  <text x="310" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">2. 저장</text>
  <text x="310" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SHA-256 해시만 DB에</text>
  <text x="310" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원본은 1회 표시 후 버림</text>

  <line x1="380" y1="105" x2="420" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Stage 3: Use -->
  <rect x="420" y="70" width="140" height="70" rx="8" fill="#1a1a0d" stroke="#4a4a1a" stroke-width="2"/>
  <text x="490" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">3. 사용</text>
  <text x="490" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">요청 시 해시 비교</text>
  <text x="490" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">접근 로그 기록</text>

  <line x1="560" y1="105" x2="600" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Stage 4: Rotate -->
  <rect x="600" y="70" width="140" height="70" rx="8" fill="#1a0d1a" stroke="#4a1a4a" stroke-width="2"/>
  <text x="670" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">4. 로테이션</text>
  <text x="670" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">신규 키 발급 후</text>
  <text x="670" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구 키 유예 기간</text>

  <line x1="740" y1="105" x2="780" y2="105" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Stage 5: Revoke -->
  <rect x="780" y="70" width="80" height="70" rx="8" fill="#2a1010" stroke="#7a2a2a" stroke-width="2"/>
  <text x="820" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">5. 폐기</text>
  <text x="820" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">즉시 무효화</text>
  <text x="820" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">감사 로그</text>

  <!-- Code: Key generation -->
  <rect x="60" y="162" width="380" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># API 키 생성 (Python)</text>
  <text x="76" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import secrets, hashlib</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"> </text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def generate_api_key(prefix="sk"):</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">    # 32바이트 = 256비트 엔트로피</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    raw = secrets.token_bytes(32)</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    key = f"{prefix}_{raw.hex()}"</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    hashed = hashlib.sha256(key.encode())</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">    # DB에는 hash만 저장</text>
</svg>
