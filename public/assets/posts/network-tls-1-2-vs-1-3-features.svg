<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TLS 1.2 vs 1.3 기능 비교표</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">제거된 취약 기능과 추가된 개선 사항</text>

  <!-- 헤더 -->
  <rect x="60" y="88" width="310" height="36" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="215" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">TLS 1.2</text>
  <rect x="510" y="88" width="310" height="36" rx="6" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="665" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">TLS 1.3</text>

  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">→</text>

  <!-- 행 1: 키 교환 -->
  <rect x="60" y="136" width="310" height="36" rx="4" fill="#1a0a0a"/>
  <text x="215" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">RSA, DH, ECDH, ECDHE</text>
  <rect x="510" y="136" width="310" height="36" rx="4" fill="#0a1a0a"/>
  <text x="665" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">DHE, ECDHE만 (FS 필수)</text>
  <text x="430" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">키 교환</text>

  <!-- 행 2: 대칭 암호 -->
  <rect x="60" y="180" width="310" height="36" rx="4" fill="#1a0a0a"/>
  <text x="215" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">AES-CBC, RC4, 3DES 허용</text>
  <rect x="510" y="180" width="310" height="36" rx="4" fill="#0a1a0a"/>
  <text x="665" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">AEAD만 (AES-GCM, ChaCha20)</text>
  <text x="430" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">대칭키</text>

  <!-- 행 3: 압축 -->
  <rect x="60" y="224" width="310" height="36" rx="4" fill="#1a0a0a"/>
  <text x="215" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">TLS 압축 지원 (CRIME 취약)</text>
  <rect x="510" y="224" width="310" height="36" rx="4" fill="#0a1a0a"/>
  <text x="665" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">TLS 압축 완전 제거</text>
  <text x="430" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">압축</text>

  <!-- 행 4: 재협상 -->
  <rect x="60" y="268" width="310" height="36" rx="4" fill="#1a0a0a"/>
  <text x="215" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">재협상(Renegotiation) 가능</text>
  <rect x="510" y="268" width="310" height="36" rx="4" fill="#0a1a0a"/>
  <text x="665" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">재협상 제거 → KeyUpdate 대체</text>
  <text x="430" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">키 갱신</text>

  <!-- 행 5: 0-RTT -->
  <rect x="60" y="312" width="310" height="36" rx="4" fill="#1a0a0a"/>
  <text x="215" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">미지원</text>
  <rect x="510" y="312" width="310" height="36" rx="4" fill="#0a1a0a"/>
  <text x="665" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">0-RTT Early Data 지원</text>
  <text x="430" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">0-RTT</text>
</svg>
