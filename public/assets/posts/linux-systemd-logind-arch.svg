<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">systemd-logind 구조</text>

  <!-- Users layer -->
  <rect x="60" y="66" width="180" height="56" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">로컬 TTY</text>
  <text x="150" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">tty1 ~ tty6</text>

  <rect x="260" y="66" width="180" height="56" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="350" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">SSH 세션</text>
  <text x="350" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pts/0, pts/1 ...</text>

  <rect x="460" y="66" width="180" height="56" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="550" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">GUI 세션</text>
  <text x="550" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GNOME/KDE seat</text>

  <rect x="660" y="66" width="160" height="56" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="740" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">서비스 세션</text>
  <text x="740" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PAM login</text>

  <!-- Arrows down -->
  <line x1="150" y1="122" x2="360" y2="166" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="122" x2="390" y2="166" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="122" x2="450" y2="166" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="740" y1="122" x2="500" y2="166" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Logind box -->
  <rect x="240" y="166" width="400" height="64" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">systemd-logind</text>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">세션 트래킹 · 시트 관리 · 디바이스 권한 · idle 감지</text>

  <!-- Three outputs -->
  <line x1="330" y1="230" x2="180" y2="282" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="230" x2="440" y2="282" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="230" x2="700" y2="282" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="282" width="240" height="56" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">전원 관리</text>
  <text x="180" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">suspend / hibernate / shutdown</text>

  <rect x="320" y="282" width="240" height="56" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">loginctl</text>
  <text x="440" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">세션·사용자·시트 조회</text>

  <rect x="580" y="282" width="240" height="56" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">PAM / polkit 연동</text>
  <text x="700" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">디바이스 접근 권한 부여</text>

  <!-- logind.conf -->
  <rect x="180" y="356" width="520" height="40" rx="6" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="440" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">/etc/systemd/logind.conf — 전원 버튼·유휴 시간·자동 잠금 설정</text>
</svg>
