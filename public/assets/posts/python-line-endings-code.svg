<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">개행 정규화 — 치환 순서가 중요하다</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">긴 시퀀스(\r\n)를 먼저 바꾸지 않으면 빈 줄이 생긴다</text>

  <!-- LEFT: correct order -->
  <rect x="60" y="100" width="360" height="238" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">✓ 올바른 순서</text>

  <rect x="76" y="144" width="328" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 1) CRLF 먼저 치환</tspan></text>
  <text x="92" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">s = s.replace(</tspan><tspan fill="#ce9178">"\r\n"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"\n"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="92" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 2) 남은 CR 치환</tspan></text>
  <text x="92" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">s = s.replace(</tspan><tspan fill="#ce9178">"\r"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"\n"</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">→ 모든 개행이 \n 하나로 통일</text>

  <!-- RIGHT: wrong order -->
  <rect x="460" y="100" width="360" height="238" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">✗ 잘못된 순서</text>

  <rect x="476" y="144" width="328" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># CR 을 먼저 바꾸면…</tspan></text>
  <text x="492" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">s = s.replace(</tspan><tspan fill="#ce9178">"\r"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"\n"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="492" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">s = s.replace(</tspan><tspan fill="#ce9178">"\r\n"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"\n"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="492" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># "\r\n" → "\n\n" 깨짐</tspan></text>

  <text x="480" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">→ CRLF 이 \n\n 으로, 빈 줄 발생</text>

  <!-- Bottom concrete illustration -->
  <text x="440" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle"><tspan fill="#d4d4d4">"A\r\nB"   →   </tspan><tspan fill="#55c555">✓ "A\nB"</tspan><tspan fill="#d4d4d4">      </tspan><tspan fill="#e05555">✗ "A\n\nB"</tspan></text>
</svg>
