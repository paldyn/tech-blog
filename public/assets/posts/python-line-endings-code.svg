<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">줄 끝 문자 감지·변환·통일</text>

  <rect x="60" y="68" width="370" height="26" rx="4" fill="#1a2a4a"/>
  <text x="245" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">줄 끝 감지 및 통일</text>

  <rect x="60" y="96" width="370" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이진 모드로 원본 확인</text>
  <text xml:space="preserve" x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">with</ttml:tspan> <ttml:tspan font-weight="600" fill="#7ec8e3">open</ttml:ttml:tspan>(<ttml:tspan fill="#ce9178">"file.txt"</ttml:tspan>, <ttml:tspan fill="#ce9178">"rb"</ttml:tspan>) as f:</text>
  <text xml:space="preserve" x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    raw = f.read()</text>
  <text xml:space="preserve" x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">crlf = raw.count(b<ttml:tspan fill="#ce9178">"\r\n"</ttml:tspan>)</text>
  <text xml:space="preserve" x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">lf_only = raw.count(b<ttml:tspan fill="#ce9178">"\n"</ttml:tspan>) - crlf</text>
  <text xml:space="preserve" x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># CRLF → LF 변환</text>
  <text xml:space="preserve" x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">def</ttml:tspan> <ttml:tspan fill="#55c555">to_lf</ttml:tspan>(path):</text>
  <text xml:space="preserve" x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    text = Path(path).read_bytes()</text>
  <text xml:space="preserve" x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    text = text.replace(b<ttml:tspan fill="#ce9178">"\r\n"</ttml:tspan>, b<ttml:tspan fill="#ce9178">"\n"</ttml:ttml:tspan>)</text>
  <text xml:space="preserve" x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    text = text.replace(b<ttml:tspan fill="#ce9178">"\r"</ttml:tspan>, b<ttml:ttml:tspan fill="#ce9178">"\n"</ttml:ttml:tspan>)</text>
  <text xml:space="preserve" x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    Path(path).write_bytes(text)</text>

  <rect x="450" y="68" width="370" height="26" rx="4" fill="#1a2a1a"/>
  <text x="635" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">.gitattributes 설정</text>

  <rect x="450" y="96" width="370" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="466" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># .gitattributes — 개행 통일</text>
  <text xml:space="preserve" x="466" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 저장소 루트에 추가</text>
  <text xml:space="preserve" x="466" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">* text=auto eol=lf</text>
  <text xml:space="preserve" x="466" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">*.bat text eol=crlf</text>
  <text xml:space="preserve" x="466" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">*.png binary</text>
  <text xml:space="preserve" x="466" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">*.jpg binary</text>
  <text xml:space="preserve" x="466" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># .editorconfig</text>
  <text xml:space="preserve" x="466" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">[*]</text>
  <text xml:space="preserve" x="466" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">end_of_line = lf</text>
  <text xml:space="preserve" x="466" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">insert_final_newline = true</text>
  <text xml:space="preserve" x="466" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">[*.bat]</text>
  <text xml:space="preserve" x="466" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">end_of_line = crlf</text>

  <rect x="60" y="392" width="760" height="5" rx="2" fill="#3a4a6e"/>
</svg>
