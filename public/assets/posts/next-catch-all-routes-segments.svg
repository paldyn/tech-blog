<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Catch-all 라우트 — [...slug] 세그먼트 캡처</text>

  <!-- Row header -->
  <rect x="50" y="68" width="220" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">파일 경로</text>
  <rect x="290" y="68" width="280" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="430" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">매칭 URL</text>
  <rect x="590" y="68" width="240" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">params.slug 값</text>

  <!-- Row 1: [...slug] -->
  <rect x="50" y="118" width="780" height="64" rx="6" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="143" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">docs/[...slug]/</text>
  <text x="160" y="169" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">page.tsx</text>

  <text x="430" y="143" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">/docs/getting-started</text>
  <text x="430" y="161" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">/docs/api/reference</text>
  <text x="430" y="174" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">/docs/a/b/c/d  (무한 depth)</text>

  <text x="710" y="143" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">['getting-started']</text>
  <text x="710" y="161" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">['api', 'reference']</text>

  <!-- Row 2: [[...slug]] optional -->
  <rect x="50" y="198" width="780" height="64" rx="6" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="223" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e07840">docs/[[...slug]]/</text>
  <text x="160" y="249" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">page.tsx (선택적)</text>

  <text x="430" y="223" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">/docs  (세그먼트 없음)</text>
  <text x="430" y="241" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">/docs/getting-started</text>
  <text x="430" y="254" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">/docs/a/b/c  (무한 depth)</text>

  <text x="710" y="223" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e07840">undefined</text>
  <text x="710" y="241" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">['getting-started']</text>

  <!-- Difference note -->
  <rect x="50" y="280" width="780" height="52" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="90" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">[...slug]  vs  [[...slug]]</text>
  <text x="90" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">[...slug] 필수: /docs 만으로는 404 | [[...slug]] 선택: /docs도 매핑됨 (slug = undefined)</text>

  <!-- Code block -->
  <rect x="50" y="350" width="780" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// app/docs/[...slug]/page.tsx</text>
  <text x="66" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export default async function</text>
  <text x="66" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  DocsPage({ params }: { params: Promise&lt;{ slug: string[] }&gt; }) {</text>
  <text x="66" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  const { slug } = await params  </text>
  <text x="66" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // slug: string[]  예: ['api', 'reference']</text>
  <text x="66" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">}</text>
</svg>
