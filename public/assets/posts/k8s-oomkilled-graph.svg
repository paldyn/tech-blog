<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrO" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">메모리가 limit에 닿으면 OOMKill</text>
  <text x="50" y="80" font-size="14" fill="#888">컨테이너 메모리가 limit를 초과하면 커널 OOM Killer가 SIGKILL(137)로 종료한다</text>

  <line x1="90" y1="120" x2="90" y2="290" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="90" y1="290" x2="820" y2="290" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="60" y="130" font-size="12" fill="#888">메모리</text>
  <text x="790" y="312" font-size="12" fill="#888">시간</text>

  <line x1="90" y1="145" x2="820" y2="145" stroke="#e05555" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="98" y="138" font-size="12" fill="#e05555">limit (예: 256Mi)</text>

  <line x1="90" y1="235" x2="820" y2="235" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="98" y="228" font-size="12" fill="#7777cc">request (예: 128Mi)</text>

  <path d="M 90 285 L 200 270 L 320 250 L 440 215 L 560 180 L 640 150 L 690 146" fill="none" stroke="#55c555" stroke-width="2.5"/>
  <circle cx="690" cy="146" r="6" fill="#e05555"/>
  <line x1="690" y1="120" x2="690" y2="140" stroke="#e05555" stroke-width="2" marker-end="url(#arrO)"/>
  <text x="690" y="112" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">OOMKilled (137)</text>

  <path d="M 696 152 L 730 250 L 760 248" fill="none" stroke="#55c555" stroke-width="2.5" stroke-dasharray="4,4"/>
  <text x="755" y="272" font-size="12" fill="#9aa4b8">재시작 후 다시 증가</text>

  <text x="50" y="342" font-size="13" fill="#888">limit를 넘은 그 순간 종료된다 — request는 스케줄링 기준일 뿐, OOM의 경계선은 언제나 limit다.</text>
</svg>
