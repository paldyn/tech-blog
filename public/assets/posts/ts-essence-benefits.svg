<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript vs TypeScript 코드 비교</text>
  <!-- Left label -->
  <text x="225" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#f0db4f">JavaScript</text>
  <!-- Right label -->
  <text x="655" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#3178c6">TypeScript</text>
  <!-- JS code block -->
  <rect x="60" y="95" width="330" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="76" dy="0" fill="#9aa4b8">// 타입 없음 - 런타임에 오류 발생</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> add(a, b) {</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> a + b;</tspan>
    <tspan x="76" dy="20" fill="#ffffff">}</tspan>
    <tspan x="76" dy="26" fill="#9aa4b8">// 오류 없이 실행됨</tspan>
    <tspan x="76" dy="20" fill="#ffffff">add(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"20"</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">// 결과: "1020" (버그!)</tspan>
    <tspan x="76" dy="26" fill="#ffffff">add(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">// 결과: "hello5" (버그!)</tspan>
  </text>
  <!-- TS code block -->
  <rect x="490" y="95" width="330" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="506" dy="0" fill="#9aa4b8">// 타입 있음 - 컴파일 타임 오류</tspan>
    <tspan x="506" dy="20" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> add(</tspan>
    <tspan x="506" dy="20" fill="#ffffff">  a: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">,</tspan>
    <tspan x="506" dy="20" fill="#ffffff">  b: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan x="506" dy="20" fill="#ffffff">): </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff"> {</tspan>
    <tspan x="506" dy="20" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> a + b;</tspan>
    <tspan x="506" dy="20" fill="#ffffff">}</tspan>
    <tspan x="506" dy="26" fill="#e05555">// TS2345: 오류!</tspan>
    <tspan x="506" dy="20" fill="#ffffff">add(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"20"</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <!-- Divider line -->
  <line x1="440" y1="95" x2="440" y2="335" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Bottom comparison labels -->
  <rect x="60" y="350" width="330" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="225" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">런타임 오류</text>
  <text x="225" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">배포 후 사용자가 마주침</text>
  <rect x="490" y="350" width="330" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="655" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">컴파일 타임 오류</text>
  <text x="655" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">개발 중 즉시 발견 및 수정</text>
  <!-- Bottom summary -->
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3">TypeScript는 오류를 실행 전에 잡아냅니다</text>
</svg>
