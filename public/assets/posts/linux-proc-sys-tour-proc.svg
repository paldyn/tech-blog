<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">/proc 프로세스 정보 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">PID 디렉터리 내 핵심 파일들</text>

  <!-- Code block left -->
  <rect x="60" y="88" width="380" height="270" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 현재 프로세스 정보</text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">ls</tspan><tspan fill="#ffffff"> /proc/$$</tspan></text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 주요 파일:</text>
  <text x="76" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">cmdline  cwd  exe  fd/</text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">maps  mem  net/  root</text>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">status  stat  statm</text>
  <text x="76" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">limits  environ  io</text>
  <text x="76" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 실행 중인 명령줄</text>
  <text x="76" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">cat</tspan><tspan fill="#ffffff"> /proc/1/cmdline | tr '\0' ' '</tspan></text>
  <text x="76" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 메모리 매핑</text>
  <text x="76" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">cat</tspan><tspan fill="#ffffff"> /proc/$$/maps</tspan></text>
  <text x="76" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 열린 파일 디스크립터</text>
  <text x="76" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">ls</tspan><tspan fill="#ffffff"> -la /proc/$$/fd/</tspan></text>

  <!-- Right panel: misc /proc entries -->
  <rect x="470" y="88" width="350" height="270" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="645" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">/proc 루트 주요 파일</text>

  <text x="486" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">/proc/cpuinfo</text>
  <text x="486" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CPU 모델, 코어 수, 플래그</text>

  <text x="486" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">/proc/meminfo</text>
  <text x="486" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">MemTotal, MemFree, Buffers, Cached</text>

  <text x="486" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">/proc/loadavg</text>
  <text x="486" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">1분/5분/15분 부하평균, 프로세스 수</text>

  <text x="486" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">/proc/net/</text>
  <text x="486" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">tcp, udp, arp, route, if_inet6 등</text>

  <text x="486" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">/proc/mounts</text>
  <text x="486" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">현재 마운트 목록 (/etc/mtab 심볼릭)</text>

  <text x="486" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">/proc/modules</text>
  <text x="486" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lsmod 데이터 소스</text>
</svg>
