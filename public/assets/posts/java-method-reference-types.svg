<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메서드 참조 — 4가지 종류</text>

  <!-- Type 1: 정적 메서드 참조 -->
  <rect x="60" y="66" width="760" height="88" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">1. 정적 메서드 참조</text>
  <text x="80" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">형식: 클래스명::정적메서드명</text>

  <rect x="80" y="116" width="320" height="28" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">// 람다</text>
  <text x="200" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">Function&lt;String,Integer&gt; f = s -&gt; Integer.parseInt(s);</tspan>
  </text>

  <rect x="420" y="116" width="380" height="28" rx="4" fill="#000" stroke="#55c555" stroke-width="1"/>
  <text x="436" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">// 메서드 참조</text>
  <text x="560" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">Function&lt;String,Integer&gt; f = Integer::</tspan><tspan font-weight="600" fill="#7ec8e3">parseInt</tspan><tspan fill="#ffffff">;</tspan>
  </text>

  <!-- Type 2: 인스턴스 메서드 참조 (특정 객체) -->
  <rect x="60" y="166" width="760" height="88" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">2. 특정 객체의 인스턴스 메서드 참조</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">형식: 특정객체::인스턴스메서드명</text>

  <rect x="80" y="216" width="320" height="28" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// 람다  </tspan>
    <tspan fill="#ffffff">Supplier&lt;String&gt; s = () -&gt; str.toUpperCase();</tspan>
  </text>

  <rect x="420" y="216" width="380" height="28" rx="4" fill="#000" stroke="#55c555" stroke-width="1"/>
  <text x="436" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// 참조  </tspan>
    <tspan fill="#ffffff">Supplier&lt;String&gt; s = str::</tspan><tspan font-weight="600" fill="#7ec8e3">toUpperCase</tspan><tspan fill="#ffffff">;</tspan>
  </text>

  <!-- Type 3: 임의 객체의 인스턴스 메서드 참조 -->
  <rect x="60" y="266" width="760" height="88" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">3. 임의 객체의 인스턴스 메서드 참조</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">형식: 클래스명::인스턴스메서드명  — 첫 번째 파라미터가 수신자</text>

  <rect x="80" y="316" width="320" height="28" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// 람다  </tspan>
    <tspan fill="#ffffff">Function&lt;String,String&gt; f = s -&gt; s.toLowerCase();</tspan>
  </text>

  <rect x="420" y="316" width="380" height="28" rx="4" fill="#000" stroke="#55c555" stroke-width="1"/>
  <text x="436" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// 참조  </tspan>
    <tspan fill="#ffffff">Function&lt;String,String&gt; f = String::</tspan><tspan font-weight="600" fill="#7ec8e3">toLowerCase</tspan><tspan fill="#ffffff">;</tspan>
  </text>

  <!-- Type 4: 생성자 참조 -->
  <rect x="60" y="366" width="760" height="88" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">4. 생성자 참조</text>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">형식: 클래스명::new</text>

  <rect x="80" y="416" width="320" height="28" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="434" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// 람다  </tspan>
    <tspan fill="#ffffff">Supplier&lt;List&lt;String&gt;&gt; s = () -&gt; new ArrayList&lt;&gt;();</tspan>
  </text>

  <rect x="420" y="416" width="380" height="28" rx="4" fill="#000" stroke="#55c555" stroke-width="1"/>
  <text x="436" y="434" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// 참조  </tspan>
    <tspan fill="#ffffff">Supplier&lt;List&lt;String&gt;&gt; s = ArrayList::</tspan><tspan font-weight="600" fill="#7ec8e3">new</tspan><tspan fill="#ffffff">;</tspan>
  </text>

  <text x="440" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메서드 참조는 람다의 축약형 — 가독성을 높이려는 목적에서만 사용, 과도한 축약은 혼란 유발</text>
</svg>
