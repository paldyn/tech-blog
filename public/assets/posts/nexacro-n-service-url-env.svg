<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">환경별 BaseURL 분리 전략</text>

  <!-- Three env boxes -->
  <!-- Dev -->
  <rect x="60" y="72" width="220" height="200" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">개발 (DEV)</text>
  <rect x="78" y="114" width="184" height="50" fill="#0d1520" rx="4" stroke="#1e2433"/>
  <text x="170" y="134" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">environment_dev.xml</text>
  <text x="170" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">http://dev-api:8080</text>
  <rect x="78" y="176" width="184" height="36" fill="#0d1520" rx="4" stroke="#1e2433"/>
  <text x="170" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">로컬 개발 서버</text>
  <text x="170" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인증 없이 접근 가능</text>
  <rect x="78" y="226" width="184" height="30" fill="#0d1520" rx="4" stroke="#1e2433"/>
  <text x="170" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Studio 빌드 시 선택</text>

  <!-- Staging -->
  <rect x="330" y="72" width="220" height="200" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">검증 (STG)</text>
  <rect x="348" y="114" width="184" height="50" fill="#0d1520" rx="4" stroke="#1e2433"/>
  <text x="440" y="134" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">environment_stg.xml</text>
  <text x="440" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">https://stg-api.company.com</text>
  <rect x="348" y="176" width="184" height="36" fill="#0d1520" rx="4" stroke="#1e2433"/>
  <text x="440" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">통합 검증 서버</text>
  <text x="440" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">운영과 동일한 구성</text>
  <rect x="348" y="226" width="184" height="30" fill="#0d1520" rx="4" stroke="#1e2433"/>
  <text x="440" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">QA·사용자 검수</text>

  <!-- Production -->
  <rect x="600" y="72" width="220" height="200" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">운영 (PRD)</text>
  <rect x="618" y="114" width="184" height="50" fill="#0d1520" rx="4" stroke="#1e2433"/>
  <text x="710" y="134" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">environment_prd.xml</text>
  <text x="710" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">https://api.company.com</text>
  <rect x="618" y="176" width="184" height="36" fill="#0d1520" rx="4" stroke="#1e2433"/>
  <text x="710" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실서비스 서버</text>
  <text x="710" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HTTPS · 인증 필수</text>
  <rect x="618" y="226" width="184" height="30" fill="#0d1520" rx="4" stroke="#1e2433"/>
  <text x="710" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">배포 빌드 시 교체</text>

  <!-- Down arrows -->
  <polygon points="170,290 160,290 165,310" fill="#7777cc"/>
  <line x1="165" y1="272" x2="165" y2="310" stroke="#7777cc" stroke-width="2"/>
  <polygon points="440,290 430,290 435,310" fill="#7777cc"/>
  <line x1="435" y1="272" x2="435" y2="310" stroke="#7777cc" stroke-width="2"/>
  <polygon points="710,290 700,290 705,310" fill="#7777cc"/>
  <line x1="705" y1="272" x2="705" y2="310" stroke="#7777cc" stroke-width="2"/>

  <!-- Common TypeDef Box -->
  <rect x="60" y="318" width="760" height="60" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">TypeDefinition.xml (공통 — 환경 무관)</text>
  <text x="440" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SVC_EMP, SVC_DEPT, SVC_CODE … 서비스 상대 URL만 정의. BaseURL은 환경 파일이 제공</text>

  <!-- Bottom note -->
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">environment.xml만 교체하면 TypeDefinition 변경 없이 환경 전환 완료</text>
</svg>
