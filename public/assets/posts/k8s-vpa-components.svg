<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">VPA(VerticalPodAutoscaler) 컴포넌트</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Recommender · Updater · Admission Controller</text>

  <!-- Metrics input -->
  <rect x="60" y="98" width="160" height="60" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Metrics Server</text>
  <text x="140" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">과거 사용량 히스토리</text>

  <!-- Arrow to Recommender -->
  <line x1="220" y1="128" x2="276" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Recommender -->
  <rect x="276" y="96" width="200" height="64" fill="#0f1923" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="376" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Recommender</text>
  <text x="376" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">최적 request/limit 계산</text>
  <text x="376" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">VPA 오브젝트에 recommendation 기록</text>

  <!-- Arrow down to VPA Status -->
  <line x1="376" y1="160" x2="376" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- VPA Status -->
  <rect x="276" y="196" width="200" height="56" fill="#0a1015" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="376" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">VPA.status.recommendation</text>
  <text x="376" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">lowerBound / target / upperBound</text>

  <!-- Arrow to Updater -->
  <line x1="476" y1="224" x2="536" y2="224" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Updater -->
  <rect x="536" y="196" width="200" height="56" fill="#0f1923" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="636" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Updater</text>
  <text x="636" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">evict out-of-range Pods</text>

  <!-- Arrow to Pods (evict) -->
  <line x1="636" y1="252" x2="636" y2="292" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-b)"/>
  <text x="656" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">재시작</text>

  <!-- Pods -->
  <rect x="536" y="292" width="200" height="56" fill="#1a0a0a" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="636" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">기존 Pod 퇴출</text>
  <text x="636" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">updateMode: Auto에서만 동작</text>

  <!-- Admission Controller -->
  <rect x="276" y="292" width="200" height="56" fill="#0f1923" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="376" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Admission Controller</text>
  <text x="376" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">신규 Pod에 권장값 주입</text>

  <!-- Arrow from Updater eviction to new Pod via Admission -->
  <line x1="536" y1="320" x2="476" y2="320" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="506" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">신규 Pod</text>

  <!-- New Pod with updated resources -->
  <rect x="60" y="292" width="200" height="56" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1"/>
  <line x1="276" y1="320" x2="260" y2="320" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="160" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">새 Pod (권장값 적용)</text>
  <text x="160" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">업데이트된 requests/limits</text>

  <!-- Code block -->
  <rect x="60" y="370" width="760" height="88" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888"># VPA recommendation 확인</text>
  <text x="80" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">kubectl describe vpa my-vpa</text>
  <text x="80" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888"># Target: cpu 250m, memory 512Mi</text>
  <text x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888"># Range:  cpu 100m-500m, memory 256Mi-1Gi</text>
</svg>
