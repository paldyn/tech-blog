<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">인증(Authentication) vs 인가(Authorization)</text>

  <!-- 가운데 구분선 -->
  <line x1="440" y1="62" x2="440" y2="460"
        stroke="#333" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== 왼쪽: 인증 (Authentication) ===== -->
  <!-- 패널 헤더 -->
  <rect x="60" y="62" width="360" height="48" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="83" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#7ec8e3">인증 (Authentication)</text>
  <text x="240" y="101" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Who are you? — 신원을 확인하는 과정</text>

  <!-- 인증 흐름 박스들 -->
  <!-- A1: 자격증명 -->
  <rect x="80" y="132" width="300" height="42" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="230" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">자격증명 제출</text>
  <text x="230" y="167" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">username + password (또는 토큰)</text>

  <!-- Arrow A1 → A2 -->
  <line x1="230" y1="174" x2="230" y2="197"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- A2: AuthenticationManager -->
  <rect x="80" y="199" width="300" height="42" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="230" y="219" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">AuthenticationManager</text>
  <text x="230" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">UserDetailsService 호출 → 비밀번호 검증</text>

  <!-- Arrow A2 → A3 -->
  <line x1="230" y1="241" x2="230" y2="264"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- A3: Authentication 객체 생성 -->
  <rect x="80" y="266" width="300" height="42" rx="6" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="286" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Authentication 객체</text>
  <text x="230" y="301" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Principal + Authorities + isAuthenticated()</text>

  <!-- Arrow A3 → SecurityContext -->
  <line x1="230" y1="308" x2="230" y2="331"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- SecurityContext -->
  <rect x="80" y="333" width="300" height="42" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="353" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">SecurityContextHolder</text>
  <text x="230" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ThreadLocal에 인증 정보 저장 (요청 수명)</text>

  <!-- 인증 실패 -->
  <rect x="80" y="397" width="300" height="40" rx="6" fill="#1f0a0a" stroke="#e05555" stroke-width="1.2"/>
  <text x="230" y="417" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">인증 실패 → 401 Unauthorized</text>
  <text x="230" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AuthenticationException 발생</text>

  <!-- ===== 오른쪽: 인가 (Authorization) ===== -->
  <!-- 패널 헤더 -->
  <rect x="460" y="62" width="360" height="48" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="83" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#55c555">인가 (Authorization)</text>
  <text x="640" y="101" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">What can you do? — 리소스 접근 권한 확인</text>

  <!-- B1: SecurityContext 읽기 -->
  <rect x="480" y="132" width="300" height="42" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="630" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">SecurityContext 조회</text>
  <text x="630" y="167" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인증된 사용자 + 부여된 권한(Roles) 확인</text>

  <!-- Arrow B1 → B2 -->
  <line x1="630" y1="174" x2="630" y2="197"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- B2: AuthorizationManager -->
  <rect x="480" y="199" width="300" height="42" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="630" y="219" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">AuthorizationManager</text>
  <text x="630" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">requestMatchers / @PreAuthorize 규칙 평가</text>

  <!-- Arrow B2 → 2-way split -->
  <line x1="630" y1="241" x2="630" y2="264"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- B3: 인가 결정 -->
  <rect x="480" y="266" width="300" height="42" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="286" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">권한 검사</text>
  <text x="630" y="301" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">hasRole("ADMIN") / hasAuthority("READ_USER")</text>

  <!-- Two outcomes -->
  <!-- Arrow to granted -->
  <line x1="580" y1="308" x2="530" y2="335"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- Arrow to denied -->
  <line x1="680" y1="308" x2="730" y2="335"
        stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Granted -->
  <rect x="480" y="337" width="130" height="40" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="545" y="357" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">허용</text>
  <text x="545" y="371" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">요청 계속 처리</text>

  <!-- Denied -->
  <rect x="650" y="337" width="130" height="40" rx="6" fill="#1f0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="715" y="357" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">거부</text>
  <text x="715" y="371" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">403 Forbidden</text>

  <!-- 비고 -->
  <rect x="480" y="397" width="300" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.2"/>
  <text x="630" y="417" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">인가는 인증 이후 단계 (순서 중요)</text>
  <text x="630" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">미인증 → 401, 인증 후 권한 없음 → 403</text>
</svg>
