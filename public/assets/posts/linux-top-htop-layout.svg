<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">top 출력 레이아웃 해설</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">헤더 요약 영역과 프로세스 목록 영역 구조</text>

  <!-- top output mockup -->
  <rect x="50" y="86" width="780" height="390" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Line 1: top header -->
  <rect x="50" y="86" width="780" height="26" rx="8" fill="#0d1929"/>
  <text x="66" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">top - 14:23:05 up 3 days,  2:15,  2 users,  load average: 0.52, 0.61, 0.58</text>

  <!-- Line 2: Tasks -->
  <text x="66" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Tasks: 215 total,   1 running, 214 sleeping,   0 stopped,   0 zombie</text>

  <!-- Line 3: CPU -->
  <rect x="50" y="130" width="780" height="20" rx="0" fill="#0d1929"/>
  <text x="66" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">%Cpu(s):  3.2 us,  1.1 sy,  0.0 ni, 94.3 id,  0.8 wa,  0.0 hi,  0.6 si</text>

  <!-- Line 4: Memory -->
  <text x="66" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">MiB Mem :  15872.0 total,   2341.5 free,   9812.3 used,   3718.2 buff/cache</text>

  <!-- Line 5: Swap -->
  <text x="66" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">MiB Swap:   2048.0 total,   2048.0 free,      0.0 used.   5214.7 avail Mem</text>

  <!-- Blank line + header -->
  <rect x="50" y="188" width="780" height="20" rx="0" fill="#1a2535"/>
  <text x="66" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    PID USER      PR  NI    VIRT    RES    SHR S  %CPU  %MEM     TIME+ COMMAND</text>

  <!-- Process rows -->
  <text x="66" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">   1234 user      20   0  512.3m  85.2m  41.3m S   8.3   0.5   2:14.32 python</text>
  <rect x="50" y="224" width="780" height="18" rx="0" fill="#0d1929"/>
  <text x="66" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">   5678 www-data  20   0  224.1m  32.0m  18.4m S   2.3   0.2   0:31.07 nginx</text>
  <text x="66" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      1 root      20   0   21.7m   9.8m   8.1m S   0.0   0.1   0:02.41 systemd</text>

  <!-- Annotation brackets on right side -->
  <!-- Header area bracket -->
  <line x1="840" y1="86" x2="850" y2="86" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="850" y1="86" x2="850" y2="200" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="840" y1="200" x2="850" y2="200" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="854" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" transform="rotate(90,854,148)" text-anchor="middle">요약 헤더</text>

  <!-- Annotations below the mockup -->
  <rect x="50" y="488" width="780" height="38" rx="6" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="76" y="506" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">load average</text>
  <text x="175" y="506" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">1분 / 5분 / 15분 평균 실행 큐 길이  |  CPU 코어 수보다 크면 과부하</text>
  <text x="76" y="522" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">%Cpu</text>
  <text x="122" y="522" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">us=사용자  sy=커널  ni=nice  id=유휴  wa=I/O대기  si=소프트 인터럽트</text>
</svg>
