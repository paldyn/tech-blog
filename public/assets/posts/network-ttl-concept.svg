<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TTL(Time To Live) — 패킷의 최대 홉 수</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">라우터를 지날 때마다 TTL -1 → TTL=0이 되면 폐기 (무한 루프 방지)</text>

  <defs>
    <marker id="ttl1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ttl2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Source -->
  <rect x="60" y="175" width="90" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="105" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">송신자</text>
  <text x="105" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">TTL=64</text>

  <!-- Routers -->
  <circle cx="240" cy="200" r="28" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle" font-weight="600">R1</text>
  <text x="240" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">TTL→63</text>

  <circle cx="400" cy="200" r="28" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="400" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle" font-weight="600">R2</text>
  <text x="400" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">TTL→62</text>

  <circle cx="560" cy="200" r="28" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="560" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle" font-weight="600">R3</text>
  <text x="560" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">TTL→61</text>

  <!-- Destination -->
  <rect x="680" y="175" width="90" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">수신자</text>
  <text x="725" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">TTL=61</text>

  <!-- Links -->
  <line x1="150" y1="200" x2="212" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ttl1)"/>
  <line x1="268" y1="200" x2="372" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ttl1)"/>
  <line x1="428" y1="200" x2="532" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ttl1)"/>
  <line x1="588" y1="200" x2="680" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ttl1)"/>

  <!-- TTL=0 scenario -->
  <text x="80" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">TTL=0 도달 시 — 라우터가 폐기 + ICMP Time Exceeded 전송</text>

  <circle cx="400" cy="330" r="28" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="400" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">Rx</text>
  <text x="400" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">TTL=0</text>

  <!-- ICMP reply -->
  <line x1="375" y1="330" x2="170" y2="300" stroke="#e05555" stroke-width="2" marker-end="url(#ttl2)" stroke-dasharray="5,3"/>
  <text x="270" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">ICMP Time Exceeded</text>
  <text x="270" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Type 11, Code 0</text>

  <!-- Code box -->
  <rect x="60" y="378" width="760" height="44" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">기본 TTL값: </text>
  <text x="180" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Linux=64  Windows=128  Cisco IOS=255  macOS=64</text>
  <text x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">ping 응답의 TTL값으로 OS 추측 가능 (TTL fingerprinting)</text>
</svg>
