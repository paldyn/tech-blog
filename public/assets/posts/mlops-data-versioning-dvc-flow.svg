<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DVC 데이터 버전 관리 흐름</text>

  <!-- Raw Data Box -->
  <rect x="60" y="80" width="160" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Raw Data</text>
  <text x="140" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">S3 / GCS / NFS</text>

  <!-- DVC Add -->
  <rect x="270" y="80" width="160" height="60" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="350" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">dvc add</text>
  <text x="350" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.dvc 파일 생성</text>

  <!-- Git Commit -->
  <rect x="480" y="80" width="160" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="560" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">git commit</text>
  <text x="560" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.dvc 메타데이터 추적</text>

  <!-- DVC Push -->
  <rect x="690" y="80" width="140" height="60" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="760" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">dvc push</text>
  <text x="760" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">원격 저장소 업로드</text>

  <!-- Arrows row 1 -->
  <line x1="220" y1="110" x2="268" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="430" y1="110" x2="478" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="640" y1="110" x2="688" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- .dvc file box -->
  <rect x="270" y="200" width="160" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="350" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle" xml:space="preserve">data.csv.dvc</text>
  <text x="350" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">md5: a1b2c3d4...</text>

  <!-- Git Repo box -->
  <rect x="480" y="200" width="160" height="60" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="560" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Git Repository</text>
  <text x="560" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.dvc / .gitignore</text>

  <!-- Remote Storage box -->
  <rect x="690" y="200" width="140" height="60" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="760" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Remote Cache</text>
  <text x="760" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실제 데이터 파일</text>

  <!-- Arrows row 2 -->
  <line x1="350" y1="160" x2="350" y2="198" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-gray)"/>
  <line x1="560" y1="160" x2="560" y2="198" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-gray)"/>
  <line x1="760" y1="160" x2="760" y2="198" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- dvc pull row -->
  <rect x="270" y="330" width="340" height="64" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">dvc pull (복원)</text>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git checkout → .dvc 읽기 → 원격 캐시에서 다운로드</text>

  <!-- Arrow from remote to pull -->
  <path d="M 760 260 Q 760 310 610 330" stroke="#55c555" stroke-width="2" fill="none"
        stroke-dasharray="4,4" marker-end="url(#arr-green)"/>

  <!-- Separator -->
  <line x1="60" y1="420" x2="820" y2="420" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Code block -->
  <rect x="60" y="432" width="760" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 데이터 버전 관리 기본 워크플로우</text>
  <text x="76" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">dvc</tspan><tspan fill="#ffffff"> add data/train.csv   </tspan><tspan fill="#9aa4b8"># .dvc 파일 생성</tspan></text>
  <text x="76" y="488" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan><tspan fill="#ffffff"> add data/train.csv.dvc &amp;&amp; </tspan><tspan fill="#7ec8e3" font-weight="600">git</tspan><tspan fill="#ffffff"> commit -m </tspan><tspan fill="#ce9178">"v1"</tspan></text>
</svg>
