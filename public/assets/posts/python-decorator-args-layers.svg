<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">인자를 받는 데코레이터: 3겹 함수 구조</text>
  <!-- Level 1: outermost -->
  <rect x="60" y="74" width="760" height="290" fill="#0d0d1a" rx="8" stroke="#7777cc" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="80" y="97"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">① 데코레이터 팩토리: repeat(n=3)</text>
  <text x="80" y="115"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인자(n)를 받아 실제 데코레이터를 반환</text>
  <!-- Level 2: decorator -->
  <rect x="120" y="128" width="640" height="200" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="140" y="150"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">② 데코레이터: decorator(func)</text>
  <text x="140" y="168"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">func를 받아 wrapper를 반환 / n은 클로저로 캡처</text>
  <!-- Level 3: wrapper -->
  <rect x="180" y="180" width="520" height="120" fill="#051005" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="202" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">③ wrapper(*args, **kwargs)</text>
  <text x="440" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 실행 시 호출되는 함수 / func과 n 모두 캡처</text>
  <text x="440" y="252" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">for _ in range(n): func(*args, **kwargs)</text>
  <text x="440" y="272" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원본 함수를 n번 반복 호출</text>
  <!-- usage note -->
  <text x="440" y="355" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">@repeat(n=3)  =  greet = repeat(n=3)(greet)</text>
  <text x="440" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">repeat(n=3) 호출 → 데코레이터 반환 → 데코레이터(greet) 호출 → wrapper 반환</text>
</svg>
