<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09055"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">라이브락 vs 기아 현상 비교</text>

  <!-- ── LIVELOCK section ── -->
  <rect x="60" y="70" width="340" height="180" rx="10" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">라이브락 (Livelock)</text>

  <!-- Thread A -->
  <rect x="80" y="110" width="110" height="44" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">Thread A</text>
  <text x="135" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">양보 시도 중</text>

  <!-- Thread B -->
  <rect x="250" y="110" width="110" height="44" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="305" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">Thread B</text>
  <text x="305" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">양보 시도 중</text>

  <!-- Bidirectional arrows (livelock) -->
  <path d="M 190 124 L 250 124" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <path d="M 250 140 L 190 140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Curved loop arrows showing infinite cycling -->
  <path d="M 135 154 Q 135 200 230 200 Q 305 200 305 154" stroke="#7ec8e3" stroke-width="2"
        stroke-dasharray="4,4" fill="none"/>

  <text x="230" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">서로 반응하며 무한 반복 (CPU 점유)</text>
  <text x="230" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">진행이 없지만 BLOCKED 상태는 아님</text>

  <!-- ── STARVATION section ── -->
  <rect x="480" y="70" width="340" height="180" rx="10" fill="#2a1a0f" stroke="#6e4a3a" stroke-width="1"/>
  <text x="650" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e09055">기아 현상 (Starvation)</text>

  <!-- High priority threads -->
  <rect x="500" y="110" width="100" height="36" rx="8" fill="#2a1a0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="550" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">HIGH (×3)</text>

  <rect x="500" y="152" width="100" height="36" rx="8" fill="#2a1a0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="550" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">HIGH (×3)</text>

  <!-- CPU Resource -->
  <rect x="650" y="120" width="80" height="56" rx="8" fill="#1a1a0f" stroke="#e09055" stroke-width="2"/>
  <text x="690" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09055">CPU</text>
  <text x="690" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">자원</text>

  <!-- Low priority thread - waiting -->
  <rect x="500" y="195" width="100" height="36" rx="8" fill="#1a1a1a" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="550" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#666">LOW (굶음)</text>

  <!-- Arrows from HIGH to CPU -->
  <path d="M 600 132 L 650 140" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <path d="M 600 170 L 650 156" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Blocked arrow from LOW -->
  <path d="M 600 213 L 640 190" stroke="#666" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="545" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">진입 불가</text>

  <text x="715" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09055">높은 우선순위가 자원 독점</text>
  <text x="715" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">낮은 우선순위는 영원히 대기</text>

  <!-- ── Solution section ── -->
  <rect x="60" y="272" width="760" height="148" rx="10" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">해결 전략 비교</text>

  <!-- Livelock solutions -->
  <rect x="80" y="308" width="280" height="96" rx="8" fill="#050e05" stroke="#2a4a2a" stroke-width="1"/>
  <text x="220" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">라이브락 해결</text>
  <text x="90" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 랜덤 백오프 (random backoff)</text>
  <text x="90" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 재시도 횟수 제한</text>
  <text x="90" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 중앙 조정자(coordinator) 도입</text>

  <!-- Starvation solutions -->
  <rect x="500" y="308" width="300" height="96" rx="8" fill="#050e05" stroke="#2a4a2a" stroke-width="1"/>
  <text x="650" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">기아 현상 해결</text>
  <text x="510" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 에이징(aging): 대기 시간에 따라 우선순위 상향</text>
  <text x="510" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 공정 락: ReentrantLock(true)</text>
  <text x="510" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 작업 큐로 균등 분배</text>
</svg>
