<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Promise 체이닝 — 성공 경로와 오류 경로</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">각 .then()은 새 Promise를 반환 — 이전 결과를 다음으로 전달</text>

  <defs>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4caf7d"/>
    </marker>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05252"/>
    </marker>
    <marker id="arGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- ===== Main chain (4 boxes, centered) =====
       box w=160 h=56, gap=32
       x: 72, 264, 456, 648  (ends 232, 424, 616, 808)
       y: 108-164, center 136 -->

  <!-- Step 1 -->
  <rect x="72" y="108" width="160" height="56" rx="8" fill="#1a1a2e" stroke="#5555aa" stroke-width="1.5"/>
  <text x="152" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#8888ff">fetch('/api/user')</text>
  <text x="152" y="152" text-anchor="middle" font-size="11" fill="#777">Promise 반환</text>

  <line x1="232" y1="136" x2="260" y2="136" stroke="#4caf7d" stroke-width="1.5" marker-end="url(#arG)"/>
  <text x="248" y="128" text-anchor="middle" font-size="10" fill="#4caf7d">.then</text>

  <!-- Step 2 -->
  <rect x="264" y="108" width="160" height="56" rx="8" fill="#0d2010" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="344" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#4caf7d">res.json()</text>
  <text x="344" y="152" text-anchor="middle" font-size="11" fill="#777">JSON 파싱</text>

  <line x1="424" y1="136" x2="452" y2="136" stroke="#4caf7d" stroke-width="1.5" marker-end="url(#arG)"/>
  <text x="440" y="128" text-anchor="middle" font-size="10" fill="#4caf7d">.then</text>

  <!-- Step 3 -->
  <rect x="456" y="108" width="160" height="56" rx="8" fill="#0d2010" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="536" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#4caf7d">processUser(data)</text>
  <text x="536" y="152" text-anchor="middle" font-size="11" fill="#777">데이터 가공</text>

  <line x1="616" y1="136" x2="644" y2="136" stroke="#4caf7d" stroke-width="1.5" marker-end="url(#arG)"/>
  <text x="632" y="128" text-anchor="middle" font-size="10" fill="#4caf7d">.then</text>

  <!-- Step 4 -->
  <rect x="648" y="108" width="160" height="56" rx="8" fill="#0d2010" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="728" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#4caf7d">render(user)</text>
  <text x="728" y="152" text-anchor="middle" font-size="11" fill="#777">화면에 출력</text>

  <!-- ===== Error path: each box drops a red dashed line to a unified collector ===== -->
  <!-- drop lines from each box bottom (y=164) to collector y=204 -->
  <line x1="152" y1="164" x2="152" y2="204" stroke="#e05252" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="344" y1="164" x2="344" y2="204" stroke="#e05252" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="536" y1="164" x2="536" y2="204" stroke="#e05252" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="728" y1="164" x2="728" y2="204" stroke="#e05252" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- horizontal collector at y=204 -->
  <line x1="152" y1="204" x2="728" y2="204" stroke="#e05252" stroke-width="1.2" stroke-dasharray="4,3"/>

  <rect x="276" y="180" width="328" height="20" fill="#0a0a0a"/>
  <text x="440" y="194" text-anchor="middle" font-size="12" fill="#e05252">어느 단계에서 reject되어도 .catch()로 이동</text>

  <!-- arrow down from center to .catch -->
  <line x1="440" y1="204" x2="440" y2="244" stroke="#e05252" stroke-width="1.5" marker-end="url(#arR)"/>

  <!-- ===== .catch (centered) ===== -->
  <rect x="360" y="248" width="160" height="56" rx="8" fill="#2a0d0d" stroke="#7a2a2a" stroke-width="1.5"/>
  <text x="440" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#e05252">.catch(err)</text>
  <text x="440" y="292" text-anchor="middle" font-size="11" fill="#777">오류 중앙 처리</text>

  <!-- arrow to .finally -->
  <line x1="440" y1="304" x2="440" y2="328" stroke="#666" stroke-width="1.2" marker-end="url(#arGray)"/>

  <!-- ===== .finally ===== -->
  <rect x="360" y="332" width="160" height="44" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="440" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#888">.finally()</text>
  <text x="440" y="370" text-anchor="middle" font-size="11" fill="#555">성공·실패 무관 항상 실행</text>

  <text x="440" y="412" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 시리즈 · Promise</text>
</svg>
