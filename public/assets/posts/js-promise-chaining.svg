<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">Promise 체이닝 — 성공 경로와 오류 경로</text>

  <!-- Step boxes: main chain -->
  <!-- Step 1 -->
  <rect x="40" y="100" width="160" height="56" rx="8" fill="#1a1a2e" stroke="#4444aa" stroke-width="1.5"/>
  <text x="120" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#8888ff" text-anchor="middle">fetch('/api/user')</text>
  <text x="120" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">Promise 반환</text>

  <!-- Arrow -->
  <line x1="200" y1="128" x2="240" y2="128" stroke="#4caf7d" stroke-width="1.5" marker-end="url(#arrowG2)"/>
  <text x="220" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#4caf7d" text-anchor="middle">.then</text>

  <!-- Step 2 -->
  <rect x="240" y="100" width="160" height="56" rx="8" fill="#0d2010" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="320" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4caf7d" text-anchor="middle">res.json()</text>
  <text x="320" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">JSON 파싱</text>

  <!-- Arrow -->
  <line x1="400" y1="128" x2="440" y2="128" stroke="#4caf7d" stroke-width="1.5" marker-end="url(#arrowG2)"/>
  <text x="420" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#4caf7d" text-anchor="middle">.then</text>

  <!-- Step 3 -->
  <rect x="440" y="100" width="160" height="56" rx="8" fill="#0d2010" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="520" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4caf7d" text-anchor="middle">processUser(data)</text>
  <text x="520" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">데이터 가공</text>

  <!-- Arrow -->
  <line x1="600" y1="128" x2="640" y2="128" stroke="#4caf7d" stroke-width="1.5" marker-end="url(#arrowG2)"/>
  <text x="620" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#4caf7d" text-anchor="middle">.then</text>

  <!-- Step 4 -->
  <rect x="640" y="100" width="160" height="56" rx="8" fill="#0d2010" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="720" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4caf7d" text-anchor="middle">render(user)</text>
  <text x="720" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">화면에 출력</text>

  <!-- Error path -->
  <!-- Downward arrow from step 1 -->
  <line x1="120" y1="156" x2="120" y2="240" stroke="#e05252" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Error propagation line -->
  <line x1="120" y1="270" x2="620" y2="270" stroke="#e05252" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="370" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05252" text-anchor="middle">어디서 오류가 나도 .catch()로 이동</text>

  <!-- Down arrow to catch -->
  <line x1="620" y1="270" x2="620" y2="310" stroke="#e05252" stroke-width="1.2" marker-end="url(#arrowR2)"/>

  <!-- Catch box -->
  <rect x="540" y="310" width="160" height="56" rx="8" fill="#2a0d0d" stroke="#7a2a2a" stroke-width="1.5"/>
  <text x="620" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05252" text-anchor="middle">.catch(err)</text>
  <text x="620" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">오류 중앙 처리</text>

  <!-- Finally -->
  <line x1="620" y1="366" x2="620" y2="396" stroke="#888" stroke-width="1.2" marker-end="url(#arrowGray)"/>
  <rect x="540" y="396" width="160" height="44" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="620" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">.finally()</text>
  <text x="620" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444" text-anchor="middle">항상 실행</text>

  <!-- Labels -->
  <text x="440" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">각 .then()은 새 Promise를 반환 — 이전 결과를 다음으로 전달</text>

  <defs>
    <marker id="arrowG2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4caf7d"/>
    </marker>
    <marker id="arrowR2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05252"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>
</svg>
