<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-pu" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-gr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Spring MVC vs WebFlux</text>

  <!-- LEFT: Spring MVC -->
  <rect x="60" y="68" width="350" height="390" rx="10" fill="#17102a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">Spring MVC</text>
  <text x="235" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Thread-Per-Request 모델</text>
  <line x1="70" y1="124" x2="400" y2="124" stroke="#7777cc" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Thread row 1 -->
  <rect x="78" y="136" width="66" height="28" rx="5" fill="#22133a" stroke="#7777cc" stroke-width="1"/>
  <text x="111" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">요청 1</text>
  <line x1="144" y1="150" x2="174" y2="150" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-pu)"/>
  <rect x="176" y="130" width="90" height="40" rx="5" fill="#2a1042" stroke="#7777cc" stroke-width="1.5"/>
  <text x="221" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" font-weight="600">Thread 1</text>
  <text x="221" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">블로킹 대기</text>
  <line x1="266" y1="150" x2="296" y2="150" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-pu)"/>
  <rect x="298" y="136" width="66" height="28" rx="5" fill="#22133a" stroke="#7777cc" stroke-width="1"/>
  <text x="331" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">응답 1</text>

  <!-- Thread row 2 -->
  <rect x="78" y="182" width="66" height="28" rx="5" fill="#22133a" stroke="#7777cc" stroke-width="1"/>
  <text x="111" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">요청 2</text>
  <line x1="144" y1="196" x2="174" y2="196" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-pu)"/>
  <rect x="176" y="176" width="90" height="40" rx="5" fill="#2a1042" stroke="#7777cc" stroke-width="1.5"/>
  <text x="221" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" font-weight="600">Thread 2</text>
  <text x="221" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">블로킹 대기</text>
  <line x1="266" y1="196" x2="296" y2="196" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-pu)"/>
  <rect x="298" y="182" width="66" height="28" rx="5" fill="#22133a" stroke="#7777cc" stroke-width="1"/>
  <text x="331" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">응답 2</text>

  <!-- Thread row 3 -->
  <rect x="78" y="228" width="66" height="28" rx="5" fill="#22133a" stroke="#7777cc" stroke-width="1"/>
  <text x="111" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">요청 N</text>
  <line x1="144" y1="242" x2="174" y2="242" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-pu)"/>
  <rect x="176" y="222" width="90" height="40" rx="5" fill="#2a1042" stroke="#7777cc" stroke-width="1.5"/>
  <text x="221" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" font-weight="600">Thread N</text>
  <text x="221" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">블로킹 대기</text>
  <line x1="266" y1="242" x2="296" y2="242" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-pu)"/>
  <rect x="298" y="228" width="66" height="28" rx="5" fill="#22133a" stroke="#7777cc" stroke-width="1"/>
  <text x="331" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">응답 N</text>

  <!-- Ellipsis -->
  <text x="221" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7777cc" font-weight="600">⋯</text>

  <!-- Thread pool exhaustion warning -->
  <rect x="78" y="298" width="80" height="28" rx="5" fill="#2a0808" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="118" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">요청 N+1</text>
  <text x="235" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">← 스레드 풀 소진 → 대기</text>

  <!-- MVC characteristics -->
  <rect x="78" y="340" width="314" height="98" rx="6" fill="#140a20" stroke="#7777cc" stroke-width="1"/>
  <text x="235" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">특성</text>
  <text x="92" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 1 요청 = 1 스레드 점유</text>
  <text x="92" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 블로킹 I/O (JDBC, RestTemplate 등)</text>
  <text x="92" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 동기·명령형 코드 스타일</text>
  <text x="92" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">권장: 복잡한 비즈니스 로직, RDBMS 중심 앱</text>

  <!-- VS badge -->
  <circle cx="440" cy="270" r="22" fill="#1a1a1a" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="440" y="275" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">VS</text>

  <!-- RIGHT: Spring WebFlux -->
  <rect x="470" y="68" width="350" height="390" rx="10" fill="#091a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">Spring WebFlux</text>
  <text x="645" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Event Loop 모델</text>
  <line x1="480" y1="124" x2="810" y2="124" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Multiple requests queue -->
  <rect x="486" y="136" width="58" height="24" rx="4" fill="#071510" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">요청 1</text>
  <rect x="486" y="166" width="58" height="24" rx="4" fill="#071510" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">요청 2</text>
  <rect x="486" y="196" width="58" height="24" rx="4" fill="#071510" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">요청 3</text>
  <rect x="486" y="226" width="58" height="24" rx="4" fill="#071510" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">요청 N</text>

  <!-- Arrows to event loop -->
  <line x1="544" y1="148" x2="596" y2="200" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-gr)"/>
  <line x1="544" y1="178" x2="596" y2="208" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-gr)"/>
  <line x1="544" y1="208" x2="596" y2="216" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-gr)"/>
  <line x1="544" y1="238" x2="596" y2="224" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-gr)"/>

  <!-- Event Loop box -->
  <rect x="596" y="168" width="110" height="96" rx="8" fill="#0c2e16" stroke="#55c555" stroke-width="2"/>
  <text x="651" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">Event Loop</text>
  <text x="651" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">소수의 스레드로</text>
  <text x="651" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">N 요청 동시 처리</text>
  <text x="651" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">비동기 · 논블로킹</text>

  <!-- Arrows from event loop to responses -->
  <line x1="706" y1="200" x2="748" y2="180" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-gr)"/>
  <line x1="706" y1="213" x2="748" y2="213" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-gr)"/>
  <line x1="706" y1="226" x2="748" y2="246" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-gr)"/>

  <!-- Responses -->
  <rect x="748" y="166" width="58" height="24" rx="4" fill="#071510" stroke="#55c555" stroke-width="1"/>
  <text x="777" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">응답 1</text>
  <rect x="748" y="200" width="58" height="24" rx="4" fill="#071510" stroke="#55c555" stroke-width="1"/>
  <text x="777" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">응답 2-N</text>
  <rect x="748" y="234" width="58" height="24" rx="4" fill="#071510" stroke="#55c555" stroke-width="1"/>
  <text x="777" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">응답 N</text>

  <!-- WebFlux characteristics -->
  <rect x="486" y="340" width="314" height="98" rx="6" fill="#061210" stroke="#55c555" stroke-width="1"/>
  <text x="643" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">특성</text>
  <text x="500" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• CPU 코어 수 스레드로 N 요청 처리</text>
  <text x="500" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 논블로킹 I/O (R2DBC, WebClient 등)</text>
  <text x="500" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 비동기·함수형 코드 스타일</text>
  <text x="500" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">권장: 고동시성 I/O 집약형, 스트리밍 앱</text>
</svg>
