<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="inh" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="impl" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Vector · Stack 클래스 계층</text>

  <!-- List interface -->
  <rect x="315" y="68" width="250" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="85" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">«interface»</text>
  <text x="440" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">List&lt;E&gt;</text>

  <!-- AbstractList -->
  <rect x="315" y="152" width="250" height="44" rx="6" fill="#0f1827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">abstract class</text>
  <text x="440" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">AbstractList&lt;E&gt;</text>

  <!-- Vector -->
  <rect x="200" y="246" width="240" height="56" rx="6" fill="#0f1827" stroke="#e8a020" stroke-width="1.5"/>
  <text x="320" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8a020">Vector&lt;E&gt;</text>
  <text x="320" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">synchronized 배열, 2배 확장</text>
  <text x="320" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">deprecated (Java 1.0, 레거시)</text>

  <!-- ArrayList (for reference) -->
  <rect x="460" y="246" width="220" height="56" rx="6" fill="#0d1b2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="570" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">ArrayList&lt;E&gt;</text>
  <text x="570" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비동기화, 1.5배 확장</text>
  <text x="570" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">권장 (Java 1.2+)</text>

  <!-- Stack extends Vector -->
  <rect x="200" y="350" width="240" height="52" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="320" y="370" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">Stack&lt;E&gt;</text>
  <text x="320" y="387" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">push / pop / peek / empty / search</text>
  <text x="320" y="399" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">deprecated — ArrayDeque 사용 권장</text>

  <!-- Arrows: List -> AbstractList (implements/extends) -->
  <line x1="440" y1="112" x2="440" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#inh)"/>

  <!-- AbstractList -> Vector -->
  <line x1="380" y1="196" x2="330" y2="242" stroke="#7ec8e3" stroke-width="2" marker-end="url(#inh)"/>

  <!-- AbstractList -> ArrayList -->
  <line x1="490" y1="196" x2="550" y2="242" stroke="#7ec8e3" stroke-width="2" marker-end="url(#inh)"/>

  <!-- Vector -> Stack -->
  <line x1="320" y1="302" x2="320" y2="346" stroke="#e05555" stroke-width="2" marker-end="url(#inh)"/>

  <!-- Labels on arrows -->
  <text x="452" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">extends</text>
  <text x="340" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">extends</text>
  <text x="508" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">extends</text>
  <text x="330" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">extends</text>
</svg>
