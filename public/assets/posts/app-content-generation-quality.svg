<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ae" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">콘텐츠 품질 검토 루프</text>

  <!-- Draft -->
  <rect x="330" y="72" width="220" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="96" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">초안 생성</text>
  <text x="440" y="117" text-anchor="middle" font-size="12" fill="#888">AI 드래프트</text>

  <line x1="440" y1="132" x2="440" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- AI Review -->
  <rect x="290" y="162" width="300" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="186" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">AI 품질 검토</text>
  <text x="440" y="207" text-anchor="middle" font-size="12" fill="#888">사실성 · 톤 · 길이 · SEO</text>

  <!-- Decision fork -->
  <line x1="360" y1="222" x2="200" y2="272" stroke="#e05555" stroke-width="2" marker-end="url(#ae)"/>
  <line x1="520" y1="222" x2="680" y2="272" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
  <text x="270" y="254" text-anchor="middle" font-size="12" fill="#e05555">품질 미달</text>
  <text x="608" y="254" text-anchor="middle" font-size="12" fill="#55c555">통과</text>

  <!-- Retry -->
  <rect x="80" y="272" width="240" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="296" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">피드백 재작성</text>
  <text x="200" y="317" text-anchor="middle" font-size="12" fill="#888">개선 지시 + 재생성 (max 3회)</text>

  <!-- Pass -->
  <rect x="560" y="272" width="240" height="60" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="296" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">최종 발행 준비</text>
  <text x="680" y="317" text-anchor="middle" font-size="12" fill="#888">CMS 업로드 · 스케줄링</text>

  <!-- Retry loop back -->
  <path d="M 80 302 C 40 302, 40 192, 290 192" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#ae)"/>
  <text x="60" y="248" text-anchor="middle" font-size="11" fill="#888">재시도</text>
</svg>
