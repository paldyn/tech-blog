<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">다중 인터페이스 확장</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">여러 인터페이스를 동시에 extends</text>

  <!-- Serializable -->
  <rect x="60" y="84" width="220" height="80" rx="8" fill="#0d1627" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Serializable</text>
  <text x="170" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">serialize(): string</text>
  <text x="170" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">deserialize(s): T</text>

  <!-- Loggable -->
  <rect x="330" y="84" width="220" height="80" rx="8" fill="#0a2a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Loggable</text>
  <text x="440" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">log(msg: string): void</text>
  <text x="440" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">getLog(): string[]</text>

  <!-- Identifiable -->
  <rect x="600" y="84" width="220" height="80" rx="8" fill="#130d2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Identifiable</text>
  <text x="710" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">id: number</text>
  <text x="710" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">createdAt: Date</text>

  <!-- Arrows -->
  <line x1="200" y1="164" x2="360" y2="238" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="440" y1="164" x2="440" y2="238" stroke="#55c555" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="680" y1="164" x2="520" y2="238" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Result -->
  <rect x="240" y="240" width="400" height="120" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">Entity</text>
  <text x="440" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">extends Serializable, Loggable, Identifiable</text>
  <text x="440" y="306" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">serialize, deserialize</text>
  <text x="440" y="322" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">log, getLog</text>
  <text x="440" y="338" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">id, createdAt</text>

  <!-- Code example -->
  <rect x="60" y="382" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">interface</text>
  <text x="70" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          Entity </text>
  <text x="70" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                  extends</text>
  <text x="70" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                           Serializable, Loggable, Identifiable { ... }</text>
</svg>