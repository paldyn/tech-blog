<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">제거 · 교체 · DocumentFragment</text>

  <!-- 제거 메서드 -->
  <rect x="60" y="72" width="360" height="160" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="97" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">제거 메서드</text>

  <text x="80" y="120" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">el.remove()</text>
  <text x="260" y="120" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">자신 제거 (현대 표준)</text>
  <text x="80" y="144" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">parent.removeChild(el)</text>
  <text x="260" y="144" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">부모에서 자식 제거 (구형)</text>
  <text x="80" y="168" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">el.replaceWith(newEl)</text>
  <text x="260" y="168" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">교체 (현대 표준)</text>
  <text x="80" y="192" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">parent.replaceChild()</text>
  <text x="260" y="192" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">교체 (구형)</text>
  <text x="80" y="218" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">⚠ remove()된 요소는 메모리에 남음 (참조 유지 시)</text>

  <!-- DocumentFragment -->
  <rect x="460" y="72" width="360" height="160" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="97" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">DocumentFragment</text>
  <text x="480" y="118" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">용도</text>
  <text x="540" y="118" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">여러 노드를 한 번에 삽입</text>
  <text x="480" y="140" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">장점</text>
  <text x="540" y="140" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">리플로우 최소화</text>
  <text x="480" y="162" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">삽입 후</text>
  <text x="540" y="162" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Fragment 자체는 비워짐</text>
  <text x="480" y="184" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">대안</text>
  <text x="540" y="184" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">append(el1, el2, ...) 다중 인자</text>
  <text x="480" y="218" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">DOM에 append되지 않음 (가상 컨테이너)</text>

  <!-- 코드 블록 -->
  <rect x="60" y="258" width="760" height="132" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="284" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// DocumentFragment — 배치 삽입</text>
  <text x="80" y="302" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="302" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> frag = document.createDocumentFragment();</text>
  <text x="80" y="320" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">for</text>
  <text x="104" y="320" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> (const item of items) {</text>
  <text x="80" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  const</tspan><tspan fill="#ffffff"> li = document.createElement(</tspan><tspan fill="#ce9178">'li'</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="80" y="356" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">  li.textContent = item.name;</text>
  <text x="80" y="374" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">  frag.appendChild(li);</text>
  <text x="80" y="392" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">}</text>
  <text x="80" y="380" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">ul.appendChild(frag);  </text>
  <text x="270" y="380" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 단 1번의 리플로우</text>
</svg>
