<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="a2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Link 프리패칭 동작 원리</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">클릭 전에 미리 데이터를 가져와 즉시 전환</text>

  <!-- Step 1: Viewport -->
  <rect x="60" y="100" width="180" height="80" rx="8" fill="#0c1a28" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="133" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">뷰포트 진입</text>
  <text x="150" y="155" text-anchor="middle" font-size="12" fill="#888">Link 컴포넌트 보임</text>

  <line x1="240" y1="140" x2="298" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#a1)"/>
  <text x="269" y="130" text-anchor="middle" font-size="10" fill="#7ec8e3">자동</text>

  <!-- Step 2: Prefetch -->
  <rect x="300" y="100" width="180" height="80" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="390" y="133" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">프리패치</text>
  <text x="390" y="155" text-anchor="middle" font-size="12" fill="#888">라우트 데이터 로드</text>

  <line x1="480" y1="140" x2="538" y2="140" stroke="#55c555" stroke-width="2" marker-end="url(#a2)"/>
  <text x="509" y="130" text-anchor="middle" font-size="10" fill="#55c555">클릭</text>

  <!-- Step 3: Navigate -->
  <rect x="540" y="100" width="180" height="80" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="133" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">즉시 전환</text>
  <text x="630" y="155" text-anchor="middle" font-size="12" fill="#888">캐시에서 즉시 렌더링</text>

  <!-- Cache info box -->
  <rect x="80" y="220" width="720" height="80" rx="8" fill="#0a0f0a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="248" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">Router Cache (in-memory)</text>
  <text x="440" y="272" text-anchor="middle" font-size="12" fill="#888">프리패치한 라우트 payload가 세션 동안 캐시됨</text>
  <text x="440" y="290" text-anchor="middle" font-size="12" fill="#888">재방문 시 서버 요청 없이 캐시에서 즉시 서빙</text>

  <!-- prefetch=false note -->
  <rect x="80" y="330" width="340" height="60" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="250" y="356" text-anchor="middle" font-size="13" fill="#e05555">prefetch={false}</text>
  <text x="250" y="376" text-anchor="middle" font-size="12" fill="#888">뷰포트 진입해도 프리패치 안 함</text>

  <!-- prefetch=true note -->
  <rect x="460" y="330" width="340" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="630" y="356" text-anchor="middle" font-size="13" fill="#55c555">prefetch={true}</text>
  <text x="630" y="376" text-anchor="middle" font-size="12" fill="#888">뷰포트 여부 무관하게 즉시 프리패치</text>
</svg>
