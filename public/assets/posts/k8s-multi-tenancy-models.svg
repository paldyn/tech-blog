<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">멀티 테넌시 모델 — 격리와 비용의 저울</text>

  <!-- spectrum arrow -->
  <text x="90" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">← 비용 효율 · 약한 격리</text>
  <text x="790" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="end">강한 격리 · 높은 비용 →</text>

  <!-- soft: namespace -->
  <rect x="50" y="110" width="250" height="230" rx="10" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">네임스페이스 분리</text>
  <text x="175" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(소프트 멀티테넌시)</text>
  <text x="74" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 테넌트당 1+ 네임스페이스</text>
  <text x="74" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· RBAC·Quota·NetPol로 격리</text>
  <text x="74" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 컨트롤 플레인 공유</text>
  <text x="74" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ 가장 저렴, 운영 단순</text>
  <text x="74" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">− 커널·API 공유 위험</text>

  <!-- virtual cluster -->
  <rect x="315" y="110" width="250" height="230" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">가상 클러스터</text>
  <text x="440" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(vCluster 등)</text>
  <text x="339" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 테넌트별 가상 API 서버</text>
  <text x="339" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 호스트 노드는 공유</text>
  <text x="339" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· CRD·버전 독립</text>
  <text x="339" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ API 격리 강화</text>
  <text x="339" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">− 운영 복잡도 증가</text>

  <!-- cluster per tenant -->
  <rect x="580" y="110" width="250" height="230" rx="10" fill="#2a1416" stroke="#e05555" stroke-width="1.5"/>
  <text x="705" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">테넌트별 클러스터</text>
  <text x="705" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(하드 멀티테넌시)</text>
  <text x="604" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 테넌트마다 별도 클러스터</text>
  <text x="604" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 컨트롤 플레인까지 분리</text>
  <text x="604" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 폭발 반경 최소</text>
  <text x="604" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ 가장 강한 격리</text>
  <text x="604" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">− 가장 비싸고 관리 부담 ↑</text>
</svg>
