<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">fill 레이아웃 · 원격 이미지 설정</text>

  <!-- Left: fill pattern -->
  <rect x="60" y="66" width="380" height="330" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// fill prop — 부모 요소에 맞게 채움</text>
  <text x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">&lt;div</tspan><tspan fill="#ffffff"> style=&#123;&#123; position: </tspan><tspan fill="#ce9178">'relative'</tspan><tspan fill="#ffffff">, height: </tspan><tspan fill="#ce9178">'400px'</tspan><tspan fill="#ffffff"> &#125;&#125;</tspan><tspan fill="#7ec8e3" font-weight="600">&gt;</tspan></text>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">&lt;Image</tspan></text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    src=</tspan><tspan fill="#ce9178">"/cover.jpg"</tspan></text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    alt=</tspan><tspan fill="#ce9178">"커버 이미지"</tspan></text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    fill</tspan></text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    objectFit=</tspan><tspan fill="#ce9178">"cover"</tspan></text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    sizes=</tspan><tspan fill="#ce9178">"100vw"</tspan></text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">/&gt;</tspan></text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">&lt;/div&gt;</tspan></text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff"> </text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// fill 사용 시</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// - 부모에 position:relative 필수</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// - width/height prop 불필요</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// - sizes는 반드시 설정</text>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// - 부모 높이는 직접 지정</text>

  <!-- Right: remote image config -->
  <rect x="460" y="66" width="360" height="330" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// next.config.js — 원격 이미지 허용</text>
  <text x="476" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> nextConfig = &#123;</tspan></text>
  <text x="476" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  images: &#123;</tspan></text>
  <text x="476" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    remotePatterns: [</tspan></text>
  <text x="476" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">      &#123;</tspan></text>
  <text x="476" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">        protocol: </tspan><tspan fill="#ce9178">'https'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">        hostname: </tspan><tspan fill="#ce9178">'images.paldyn.com'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">        pathname: </tspan><tspan fill="#ce9178">'/uploads/**'</tspan></text>
  <text x="476" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">      &#125;,</tspan></text>
  <text x="476" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">      &#123; hostname: </tspan><tspan fill="#ce9178">'avatars.githubusercontent.com'</tspan><tspan fill="#ffffff"> &#125;</tspan></text>
  <text x="476" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    ],</tspan></text>
  <text x="476" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    formats: [</tspan><tspan fill="#ce9178">'image/avif'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'image/webp'</tspan><tspan fill="#ffffff">],</tspan></text>
  <text x="476" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    deviceSizes: [</tspan><tspan fill="#b5cea8">640</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">750</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">1080</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">1920</tspan><tspan fill="#ffffff">],</tspan></text>
  <text x="476" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    minimumCacheTTL: </tspan><tspan fill="#b5cea8">3600</tspan></text>
  <text x="476" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  &#125;</tspan></text>
  <text x="476" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">&#125;</tspan></text>

  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">remotePatterns 없이 원격 URL 사용 시 오류 — 보안상 명시적 허용 필요</text>
</svg>
