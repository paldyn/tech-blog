<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">퀵 정렬 — Lomuto 파티션 과정</text>

  <!-- Labels -->
  <text x="60" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">초기</text>
  <text x="60" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">j=0</text>
  <text x="60" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">j=2</text>
  <text x="60" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">j=4</text>
  <text x="60" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">완료</text>

  <!-- Array [7, 2, 5, 3, 8, 4, 1, 6], pivot=6 (last) -->
  <!-- x positions: 110 + idx*92 -->

  <!-- Initial row -->
  <rect x="110" y="75" width="72" height="36" fill="#1a1a2e" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="146" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">7</text>
  <rect x="200" y="75" width="72" height="36" fill="#1a1a2e" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="236" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">2</text>
  <rect x="290" y="75" width="72" height="36" fill="#1a1a2e" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="326" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">5</text>
  <rect x="380" y="75" width="72" height="36" fill="#1a1a2e" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="416" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">3</text>
  <rect x="470" y="75" width="72" height="36" fill="#1a1a2e" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="506" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">8</text>
  <rect x="560" y="75" width="72" height="36" fill="#1a1a2e" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="596" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">4</text>
  <rect x="650" y="75" width="72" height="36" fill="#1a1a2e" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="686" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">1</text>
  <!-- pivot -->
  <rect x="740" y="75" width="72" height="36" fill="#2a1a1a" rx="5" stroke="#e05555" stroke-width="2"/>
  <text x="776" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#e05555">6</text>
  <text x="776" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">pivot</text>

  <!-- Step j=0: a[j]=7 > pivot(6), i stays at -1 -->
  <!-- Step j=1: a[j]=2 <=6 → swap(a[i+1=0], a[j=1]) i=0 → [2,7,5,3,8,4,1,6] -->
  <!-- Show state after i=0 (2 moved left) -->
  <rect x="110" y="155" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="146" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555">2</text>
  <text x="146" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">i=0</text>
  <rect x="200" y="155" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="236" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">7</text>
  <rect x="290" y="155" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="326" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">5</text>
  <rect x="380" y="155" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="416" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">3</text>
  <rect x="470" y="155" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="506" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">8</text>
  <rect x="560" y="155" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="596" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">4</text>
  <rect x="650" y="155" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="686" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">1</text>
  <rect x="740" y="155" width="72" height="36" fill="#2a1a1a" rx="5" stroke="#e05555" stroke-width="2"/>
  <text x="776" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#e05555">6</text>

  <!-- After more swaps: [2,5,3,4,1 | 7,8 | 6] → final step -->
  <!-- j=2(5<=6), j=3(3<=6), j=5(4<=6), j=6(1<=6) → i=4 -->
  <rect x="110" y="235" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="146" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555">2</text>
  <rect x="200" y="235" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="236" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555">5</text>
  <text x="236" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">i=1</text>
  <rect x="290" y="235" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="326" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">7</text>
  <rect x="380" y="235" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="416" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">3</text>
  <rect x="470" y="235" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="506" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">8</text>
  <rect x="560" y="235" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="596" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">4</text>
  <rect x="650" y="235" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="686" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">1</text>
  <rect x="740" y="235" width="72" height="36" fill="#2a1a1a" rx="5" stroke="#e05555" stroke-width="2"/>
  <text x="776" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#e05555">6</text>

  <!-- After i=4 (all ≤6 items at left): [2,5,3,4,1,7,8,6] swap pivot to i+1=5 → [2,5,3,4,1,6,8,7] ... -->
  <!-- Simplified final partition result -->
  <rect x="110" y="315" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="146" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555">2</text>
  <rect x="200" y="315" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="236" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555">5</text>
  <rect x="290" y="315" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="326" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555">3</text>
  <rect x="380" y="315" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="416" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555">4</text>
  <rect x="470" y="315" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="506" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555">1</text>
  <!-- pivot in position -->
  <rect x="560" y="315" width="72" height="36" fill="#2a1a1a" rx="5" stroke="#e05555" stroke-width="2"/>
  <text x="596" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#e05555">6</text>
  <text x="596" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">확정</text>
  <rect x="650" y="315" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="686" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">8</text>
  <rect x="740" y="315" width="72" height="36" fill="#111" rx="5" stroke="#555" stroke-width="1"/>
  <text x="776" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888">7</text>

  <!-- Final sorted -->
  <rect x="110" y="395" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="2"/>
  <text x="146" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">1</text>
  <rect x="200" y="395" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="2"/>
  <text x="236" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">2</text>
  <rect x="290" y="395" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="2"/>
  <text x="326" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">3</text>
  <rect x="380" y="395" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="2"/>
  <text x="416" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">4</text>
  <rect x="470" y="395" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="2"/>
  <text x="506" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">5</text>
  <rect x="560" y="395" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="2"/>
  <text x="596" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">6</text>
  <rect x="650" y="395" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="2"/>
  <text x="686" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">7</text>
  <rect x="740" y="395" width="72" height="36" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="2"/>
  <text x="776" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">8</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">정렬 완료 (재귀 적용 후)</text>
</svg>
