<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript Playground</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">브라우저에서 바로 TypeScript 실험하기 — typescriptlang.org/play</text>
  <!-- Browser chrome mockup -->
  <rect x="60" y="100" width="760" height="320" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <!-- Browser toolbar -->
  <rect x="60" y="100" width="760" height="36" rx="8" fill="#1a1a1a"/>
  <rect x="60" y="120" width="760" height="16" fill="#1a1a1a"/>
  <circle cx="86" cy="118" r="6" fill="#e05555"/>
  <circle cx="108" cy="118" r="6" fill="#e0a055"/>
  <circle cx="130" cy="118" r="6" fill="#55c555"/>
  <!-- URL bar -->
  <rect x="160" y="108" width="480" height="20" rx="4" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="400" y="122" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">typescriptlang.org/play</text>
  <!-- Left panel label -->
  <rect x="68" y="140" width="370" height="24" rx="0" fill="#0d1a2a"/>
  <text x="90" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">TypeScript 입력 (.ts)</text>
  <!-- Right panel label -->
  <rect x="442" y="140" width="370" height="24" rx="0" fill="#0d2a0d"/>
  <text x="464" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">JavaScript 출력 (.js)</text>
  <!-- Left panel content -->
  <rect x="68" y="164" width="370" height="248" fill="#050505"/>
  <text x="84" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">interface</tspan><tspan fill="#ffffff"> Point {</tspan></text>
  <text x="84" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  x: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="84" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  y: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="84" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">}</tspan></text>
  <text x="84" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff"> </tspan></text>
  <text x="84" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> dist(p: Point) {</tspan></text>
  <text x="84" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> Math.sqrt(</tspan></text>
  <text x="84" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    p.x**</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> + p.y**</tspan><tspan fill="#b5cea8">2</tspan></text>
  <text x="84" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  );</tspan></text>
  <text x="84" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">}</tspan></text>
  <!-- Right panel content -->
  <rect x="442" y="164" width="370" height="248" fill="#050505"/>
  <text x="458" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#9aa4b8">// (타입 제거됨)</tspan></text>
  <text x="458" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff"> </tspan></text>
  <text x="458" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff"> </tspan></text>
  <text x="458" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff"> </tspan></text>
  <text x="458" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff"> </tspan></text>
  <text x="458" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> dist(p) {</tspan></text>
  <text x="458" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> Math.sqrt(</tspan></text>
  <text x="458" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    p.x**</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> + p.y**</tspan><tspan fill="#b5cea8">2</tspan></text>
  <text x="458" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  );</tspan></text>
  <text x="458" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">}</tspan></text>
  <!-- Divider line -->
  <line x1="440" y1="140" x2="440" y2="412" stroke="#333" stroke-width="1"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">설치 없이 브라우저에서 즉시 TypeScript 실험 — URL로 코드 공유 가능</text>
</svg>
