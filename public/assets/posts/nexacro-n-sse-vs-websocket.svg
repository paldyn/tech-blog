<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SSE vs WebSocket 비교</text>

  <!-- Table header background -->
  <rect x="60" y="68" width="340" height="44" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="420" y="68" width="400" height="44" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>

  <text x="230" y="95" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">SSE (EventSource)</text>
  <text x="620" y="95" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">WebSocket</text>

  <!-- Row separator helper function (conceptual) -->
  <!-- Row 1: 통신 방향 -->
  <rect x="60" y="122" width="760" height="2" fill="#1e1e1e"/>
  <text x="60" y="148"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">통신 방향</text>
  <text x="230" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">서버 → 클라이언트 (단방향)</text>
  <text x="620" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">양방향 (서버 ↔ 클라이언트)</text>

  <!-- Row 2: 프로토콜 -->
  <rect x="60" y="162" width="760" height="1" fill="#1e1e1e"/>
  <text x="60" y="188"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">프로토콜</text>
  <text x="230" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">HTTP/1.1 스트리밍</text>
  <text x="620" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">ws:// / wss:// (RFC 6455)</text>

  <!-- Row 3: 재연결 -->
  <rect x="60" y="202" width="760" height="1" fill="#1e1e1e"/>
  <text x="60" y="228"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">재연결</text>
  <text x="230" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">브라우저 자동 재연결</text>
  <text x="620" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">수동 구현 필요</text>

  <!-- Row 4: 데이터 형식 -->
  <rect x="60" y="242" width="760" height="1" fill="#1e1e1e"/>
  <text x="60" y="268"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">데이터 형식</text>
  <text x="230" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">텍스트 전용</text>
  <text x="620" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">텍스트 + 바이너리</text>

  <!-- Row 5: 구현 복잡도 -->
  <rect x="60" y="282" width="760" height="1" fill="#1e1e1e"/>
  <text x="60" y="308"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">구현 복잡도</text>
  <text x="230" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">낮음 — EventSource 3줄</text>
  <text x="620" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">중간 — 핸드셰이크+이벤트</text>

  <!-- Row 6: 서버 구현 -->
  <rect x="60" y="322" width="760" height="1" fill="#1e1e1e"/>
  <text x="60" y="348"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">서버 구현</text>
  <text x="230" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">text/event-stream 응답</text>
  <text x="620" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">WebSocketHandler 구현</text>

  <!-- Row 7: 적합한 사용 사례 -->
  <rect x="60" y="362" width="760" height="1" fill="#1e1e1e"/>
  <text x="60" y="388"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">적합한 경우</text>
  <text x="230" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">알림·로그·진행률 표시</text>
  <text x="620" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">채팅·실시간 협업·게임</text>

  <!-- Bottom line -->
  <rect x="60" y="402" width="760" height="1" fill="#1e1e1e"/>

  <!-- Recommendation -->
  <text x="440" y="436" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">단방향 서버 푸시라면 SSE가 더 단순 · HTTP 인프라(프록시·CORS) 그대로 활용 가능</text>

  <!-- Vertical divider -->
  <line x1="400" y1="68" x2="400" y2="410" stroke="#2a2a2a" stroke-width="1"/>
</svg>
