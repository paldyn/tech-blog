<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N 런타임 아키텍처</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">브라우저부터 서버까지 — 5계층 구조</text>

  <!--
    Layer layout (x=60, w=760):
    Layer 1 (Browser):     y=90,  h=48,  bottom=138
    Arrow zone:            138→152 (14px)
    Layer 2 (Runtime):     y=152, h=118, bottom=270
    Arrow zone:            270→284
    Layer 3 (Dataset):     y=284, h=58,  bottom=342
    Arrow zone:            342→356
    Layer 4 (Transaction): y=356, h=58,  bottom=414
    Arrow zone:            414→428
    Layer 5 (Server):      y=428, h=52,  bottom=480
    Footer: y=520, total=560, bottom margin=40 ✓
  -->

  <!-- ===== Layer 1: Browser ===== -->
  <rect x="60" y="90" width="760" height="48" rx="6" fill="#0f1620" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="111" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">브라우저 / 사용자 영역</text>
  <text x="440" y="129" text-anchor="middle" font-size="11" fill="#888">Chrome · Edge · Safari · Firefox · Nexacro Desktop Runtime</text>

  <!-- Arrow 1: y=138→152 -->
  <line x1="440" y1="138" x2="440" y2="146" stroke="#444" stroke-width="1.5"/>
  <polygon points="436,144 444,144 440,152" fill="#444"/>

  <!-- ===== Layer 2: Nexacro N Runtime ===== -->
  <rect x="60" y="152" width="760" height="118" rx="6" fill="#13101a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="173" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">Nexacro N 런타임 엔진</text>

  <!-- Sub-boxes inside Layer 2 (y=182, h=78): three boxes w=220, gap=30 -->
  <!-- Sub1: x=80..300, center=190   Sub2: x=330..550, center=440   Sub3: x=580..800, center=690 -->

  <!-- Sub-box 1: Form Engine -->
  <rect x="80" y="182" width="220" height="78" rx="4" fill="#0d1020" stroke="#7777cc" stroke-width="1"/>
  <text x="190" y="203" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">Form Engine</text>
  <text x="190" y="220" text-anchor="middle" font-size="11" fill="#888">폼 생명주기 관리</text>
  <text x="190" y="236" text-anchor="middle" font-size="11" fill="#888">Layout · Script 바인딩</text>
  <text x="190" y="252" text-anchor="middle" font-size="10" fill="#666">load · init · destroy</text>

  <!-- Sub-box 2: Component Layer -->
  <rect x="330" y="182" width="220" height="78" rx="4" fill="#0d1420" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="203" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">컴포넌트 레이어</text>
  <text x="440" y="220" text-anchor="middle" font-size="11" fill="#888">Grid · Edit · Button</text>
  <text x="440" y="236" text-anchor="middle" font-size="11" fill="#888">Combo · Tree · Tab</text>
  <text x="440" y="252" text-anchor="middle" font-size="10" fill="#666">이벤트 처리 · 렌더링</text>

  <!-- Sub-box 3: Script Engine -->
  <rect x="580" y="182" width="220" height="78" rx="4" fill="#0d1a10" stroke="#55c555" stroke-width="1"/>
  <text x="690" y="203" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">Script Engine</text>
  <text x="690" y="220" text-anchor="middle" font-size="11" fill="#888">TypeScript · ES6+</text>
  <text x="690" y="236" text-anchor="middle" font-size="11" fill="#888">비즈니스 로직</text>
  <text x="690" y="252" text-anchor="middle" font-size="10" fill="#666">이벤트 핸들러</text>

  <!-- Arrow 2: y=270→284 -->
  <line x1="440" y1="270" x2="440" y2="278" stroke="#444" stroke-width="1.5"/>
  <polygon points="436,276 444,276 440,284" fill="#444"/>

  <!-- ===== Layer 3: Dataset / DataBinding ===== -->
  <rect x="60" y="284" width="760" height="58" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="308" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Dataset / DataBinding 레이어</text>
  <text x="440" y="328" text-anchor="middle" font-size="11" fill="#888">Dataset · ConstColumn · RowStatus · Filter · Sort · Group</text>

  <!-- Arrow 3: y=342→356 -->
  <line x1="440" y1="342" x2="440" y2="350" stroke="#444" stroke-width="1.5"/>
  <polygon points="436,348 444,348 440,356" fill="#444"/>

  <!-- ===== Layer 4: Transaction / Service ===== -->
  <rect x="60" y="356" width="760" height="58" rx="6" fill="#1a150a" stroke="#f4a261" stroke-width="1.5"/>
  <text x="440" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#f4a261">Transaction / Service 레이어</text>
  <text x="440" y="400" text-anchor="middle" font-size="11" fill="#888">services.xml · transaction() · HTTP/HTTPS 프로토콜</text>

  <!-- Arrow 4: y=414→428 -->
  <line x1="440" y1="414" x2="440" y2="422" stroke="#444" stroke-width="1.5"/>
  <polygon points="436,420 444,420 440,428" fill="#444"/>

  <!-- ===== Layer 5: Server ===== -->
  <rect x="60" y="428" width="760" height="52" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="450" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">서버 어댑터 레이어</text>
  <text x="440" y="469" text-anchor="middle" font-size="11" fill="#888">Java (Spring Boot) · .NET · Node.js · Oracle · MySQL · MSSQL</text>

  <!-- Footer y=520, total=560, bottom margin=40 ✓ -->
  <text x="440" y="520" text-anchor="middle" font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈 #1</text>
</svg>
