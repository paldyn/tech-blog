<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N 핵심 구조</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">클라이언트 · 프로토콜 · 서버 3계층</text>

  <!-- ===== CLIENT OUTER BOX ===== -->
  <!-- x=60, width=290, right=350 -->
  <rect x="60" y="92" width="290" height="340" fill="#080d14" rx="10" stroke="#1e3050" stroke-width="1.5"/>
  <text x="205" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">클라이언트 (브라우저)</text>

  <!-- Client sub-box 1: Runtime -->
  <rect x="78" y="128" width="254" height="56" fill="#0f1a28" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="205" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Nexacro N Runtime</text>
  <text x="205" y="168" text-anchor="middle" font-size="11" fill="#888">HTML5 엔진 · 이벤트 루프</text>

  <!-- Client sub-box 2: Form/Component -->
  <rect x="78" y="198" width="254" height="56" fill="#0d1520" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="205" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Form · Component Layer</text>
  <text x="205" y="238" text-anchor="middle" font-size="11" fill="#888">Grid · Edit · Button · Tab …</text>

  <!-- Client sub-box 3: Dataset -->
  <rect x="78" y="268" width="254" height="56" fill="#0d1520" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="205" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Dataset · DataBinding</text>
  <text x="205" y="308" text-anchor="middle" font-size="11" fill="#888">메모리 데이터 · 양방향 바인딩</text>

  <!-- Client sub-box 4: Script -->
  <rect x="78" y="338" width="254" height="56" fill="#0d1520" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="205" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Script Engine (JavaScript)</text>
  <text x="205" y="378" text-anchor="middle" font-size="11" fill="#888">비즈니스 로직 · 이벤트 핸들러</text>

  <!-- ===== SERVER OUTER BOX ===== -->
  <!-- x=530, width=290, right=820 -->
  <rect x="530" y="92" width="290" height="340" fill="#0d0a08" rx="10" stroke="#302010" stroke-width="1.5"/>
  <text x="675" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#e0a060">서버</text>

  <!-- Server sub-box 1: Web Server -->
  <rect x="548" y="128" width="254" height="56" fill="#1a1008" rx="6" stroke="#e0a060" stroke-width="1"/>
  <text x="675" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#e0a060">Web Server / WAS</text>
  <text x="675" y="168" text-anchor="middle" font-size="11" fill="#888">Apache · Nginx · Tomcat</text>

  <!-- Server sub-box 2: Adapter -->
  <rect x="548" y="198" width="254" height="56" fill="#16100a" rx="6" stroke="#2a1e10" stroke-width="1"/>
  <text x="675" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Nexacro Adapter</text>
  <text x="675" y="238" text-anchor="middle" font-size="11" fill="#888">Java · .NET · Node.js</text>

  <!-- Server sub-box 3: Business Logic -->
  <rect x="548" y="268" width="254" height="56" fill="#16100a" rx="6" stroke="#2a1e10" stroke-width="1"/>
  <text x="675" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Business Logic Layer</text>
  <text x="675" y="308" text-anchor="middle" font-size="11" fill="#888">서비스 · 트랜잭션 · 보안</text>

  <!-- Server sub-box 4: Database -->
  <rect x="548" y="338" width="254" height="56" fill="#16100a" rx="6" stroke="#2a1e10" stroke-width="1"/>
  <text x="675" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Database</text>
  <text x="675" y="378" text-anchor="middle" font-size="11" fill="#888">Oracle · MySQL · MSSQL</text>

  <!-- ===== ARROWS between boxes (solid polygon) ===== -->
  <!-- Gap zone: x=350 to x=530, width=180px -->

  <!-- Label ABOVE request arrow: y=200 (baseline), gap from arrow top(y=215)=15px -->
  <text x="440" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#7ec8e3">요청 (HTTP/HTTPS)</text>

  <!-- Request arrow → : center y=228, shaft y=221-235, full y=214-242 -->
  <polygon points="350,221 510,221 510,214 530,228 510,242 510,235 350,235"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>

  <!-- Protocol info label between arrows: y=261 and y=275 -->
  <!-- Mask line behind label -->
  <text x="440" y="262" text-anchor="middle" font-size="10" fill="#555">· · · · · · · · · · · ·</text>
  <rect x="370" y="265" width="140" height="18" fill="#0a0a0a"/>
  <text x="440" y="278" text-anchor="middle" font-size="10" fill="#666">Nexacro Protocol (PL)</text>

  <!-- Response arrow ← : center y=296, shaft y=289-303, full y=282-310 -->
  <polygon points="530,289 370,289 370,282 350,296 370,310 370,303 530,303"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>

  <!-- Label BELOW response arrow: y=336 (baseline), gap from arrow tip(y=310) ~15px -->
  <text x="440" y="336" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">응답 (JSON / Dataset)</text>

  <!-- Footer -->
  <text x="440" y="498" text-anchor="middle" font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈 — Chapter 1</text>
</svg>
