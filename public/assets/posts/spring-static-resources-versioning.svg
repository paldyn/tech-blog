<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">정적 리소스 버전 관리 전략 비교</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">ContentVersion vs FixedVersion · Cache-Control 최적화</text>

  <!-- ContentVersionStrategy -->
  <rect x="60" y="100" width="360" height="200" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">ContentVersionStrategy</text>
  <text x="240" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일 내용의 MD5 해시를 URL에 삽입</text>

  <rect x="72" y="152" width="336" height="96" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">// 요청 URL</text>
  <text x="80" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">/css/app-a3f4b1c2d5e6.css</text>
  <text x="80" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">// 파일 변경 → 해시 변경</text>
  <text x="80" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">/css/app-9f8e7d6c5b4a.css</text>
  <text x="80" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">// Cache-Control: max-age=31536000</text>

  <text x="240" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 파일 변경 시 캐시 자동 무효화</text>
  <text x="240" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 1년 캐싱으로 성능 극대화</text>

  <!-- FixedVersionStrategy -->
  <rect x="460" y="100" width="360" height="200" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">FixedVersionStrategy</text>
  <text x="640" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">애플리케이션 버전 번호를 URL에 삽입</text>

  <rect x="472" y="152" width="336" height="96" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="480" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">// application.yml 설정</text>
  <text x="480" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">version: "1.4.0"</text>
  <text x="480" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">// 생성되는 URL</text>
  <text x="480" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">/css/1.4.0/app.css</text>
  <text x="480" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">// 배포 시 버전 변경</text>

  <text x="640" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 배포 단위로 캐시 무효화 제어</text>
  <text x="640" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗ 변경 없는 파일도 캐시 무효화</text>

  <!-- WebJars section -->
  <rect x="60" y="328" width="760" height="96" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">WebJars 지원</text>
  <rect x="72" y="360" width="736" height="52" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// build.gradle — Bootstrap, jQuery 등을 JAR로 관리</text>
  <text x="80" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">implementation 'org.webjars:bootstrap:5.3.2'  </text>
  <text x="560" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ /webjars/bootstrap/5.3.2/css/bootstrap.css</text>
</svg>
