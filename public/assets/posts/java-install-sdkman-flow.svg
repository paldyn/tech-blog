<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">SDKMAN 설치 &amp; JDK 관리 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">curl → 설치 → JDK 목록 → 설치 → 전환</text>

  <!-- Step boxes: horizontal flow -->
  <!-- Step 1 -->
  <rect x="60" y="100" width="140" height="70" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="130" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">① SDKMAN 설치</text>
  <text x="130" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">curl | bash</text>
  <text x="130" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">~/.sdkman/</text>

  <!-- arrow -->
  <polygon points="212,135 240,126 240,144" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="200" y1="135" x2="240" y2="135" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Step 2 -->
  <rect x="242" y="100" width="140" height="70" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="312" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">② 배포판 탐색</text>
  <text x="312" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">sdk list java</text>
  <text x="312" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">70+ 버전 목록</text>

  <!-- arrow -->
  <polygon points="394,135 422,126 422,144" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="382" y1="135" x2="422" y2="135" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Step 3 -->
  <rect x="424" y="100" width="140" height="70" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="494" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ JDK 설치</text>
  <text x="494" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">sdk install java</text>
  <text x="494" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">자동 다운로드</text>

  <!-- arrow -->
  <polygon points="576,135 604,126 604,144" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="564" y1="135" x2="604" y2="135" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Step 4 -->
  <rect x="606" y="100" width="214" height="70" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="713" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">④ 전환 &amp; 고정</text>
  <text x="713" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">sdk use / sdk default</text>
  <text x="713" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">.sdkmanrc 프로젝트별</text>

  <!-- Code block: install SDKMAN -->
  <rect x="60" y="196" width="368" height="170" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">SDKMAN 설치 &amp; 기본 사용</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 설치</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">$ </text>
  <text x="91" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">curl -s "https://get.sdkman.io" | bash</text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">$ </text>
  <text x="91" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">source ~/.sdkman/bin/sdkman-init.sh</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># JDK 목록 조회</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">$ </text>
  <text x="91" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">sdk list java</text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># Temurin 21 설치 &amp; 기본값 지정</text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">$ </text>
  <text x="91" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">sdk install java 21.0.3-tem</text>

  <!-- Code block: project .sdkmanrc -->
  <rect x="452" y="196" width="368" height="170" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="468" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">프로젝트별 JDK 고정 (.sdkmanrc)</text>
  <text x="468" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 프로젝트 루트에 .sdkmanrc 생성</text>
  <text x="468" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">$ </text>
  <text x="483" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">cat .sdkmanrc</text>
  <text x="468" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">java=21.0.3-tem</text>
  <text x="468" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 최초 설치 + 전환</text>
  <text x="468" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">$ </text>
  <text x="483" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">sdk env install</text>
  <text x="468" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 이후 디렉터리 진입 시 자동 전환</text>
  <text x="468" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">$ </text>
  <text x="483" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">sdk env</text>

  <!-- Multi-version illustration -->
  <rect x="60" y="388" width="760" height="90" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">프로젝트별 JDK 버전 분리 예시</text>

  <!-- project-a -->
  <rect x="80" y="420" width="180" height="46" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">project-a/</text>
  <text x="170" y="456" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">java=17.0.10-tem</text>

  <!-- project-b -->
  <rect x="350" y="420" width="180" height="46" rx="6" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">project-b/</text>
  <text x="440" y="456" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">java=21.0.3-tem</text>

  <!-- project-c -->
  <rect x="620" y="420" width="180" height="46" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">project-c/</text>
  <text x="710" y="456" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">java=21.0.3-graalce</text>

  <!-- Footer -->
  <text x="440" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">SDKMAN은 ~/.sdkman/candidates/java/ 아래 버전별로 JDK를 보관 | JAVA_HOME을 자동으로 전환</text>
</svg>
