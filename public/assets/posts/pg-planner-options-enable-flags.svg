<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">플래너 enable_* 플래그 — 실행 계획 타입 제어</text>

  <!-- Table header -->
  <rect x="60" y="64" width="760" height="34" rx="6" fill="#111520" stroke="#333"/>
  <text x="180" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">GUC 파라미터</text>
  <text x="380" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">제어 대상</text>
  <text x="580" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">off 시 대안</text>
  <text x="740" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">기본</text>

  <!-- Rows -->
  <rect x="60" y="98" width="760" height="28" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="180" y="116" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">enable_seqscan</text>
  <text x="380" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">순차 스캔 선호</text>
  <text x="580" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인덱스 스캔 (있을 때)</text>
  <text x="740" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">on</text>

  <rect x="60" y="126" width="760" height="28" rx="0" fill="#0a0f14" stroke="#3a4a6e"/>
  <text x="180" y="144" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">enable_indexscan</text>
  <text x="380" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">인덱스 스캔 사용</text>
  <text x="580" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Seq Scan 또는 Bitmap</text>
  <text x="740" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">on</text>

  <rect x="60" y="154" width="760" height="28" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="180" y="172" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">enable_indexonlyscan</text>
  <text x="380" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Index-Only Scan</text>
  <text x="580" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일반 Index Scan</text>
  <text x="740" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">on</text>

  <rect x="60" y="182" width="760" height="28" rx="0" fill="#0a0f14" stroke="#3a4a6e"/>
  <text x="180" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">enable_bitmapscan</text>
  <text x="380" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Bitmap Heap Scan</text>
  <text x="580" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Seq Scan</text>
  <text x="740" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">on</text>

  <rect x="60" y="210" width="760" height="28" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="180" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">enable_hashjoin</text>
  <text x="380" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Hash Join</text>
  <text x="580" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Merge 또는 NL</text>
  <text x="740" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">on</text>

  <rect x="60" y="238" width="760" height="28" rx="0" fill="#0a0f14" stroke="#3a4a6e"/>
  <text x="180" y="256" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">enable_mergejoin</text>
  <text x="380" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Merge Join</text>
  <text x="580" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Hash 또는 NL</text>
  <text x="740" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">on</text>

  <rect x="60" y="266" width="760" height="28" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="180" y="284" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">enable_nestloop</text>
  <text x="380" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Nested Loop Join</text>
  <text x="580" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Hash 또는 Merge</text>
  <text x="740" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">on</text>

  <rect x="60" y="294" width="760" height="28" rx="0" fill="#0a0f14" stroke="#3a4a6e"/>
  <text x="180" y="312" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">enable_parallel_hash</text>
  <text x="380" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">병렬 Hash Join</text>
  <text x="580" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단일 Hash Join</text>
  <text x="740" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">on</text>

  <!-- Warning note -->
  <rect x="60" y="340" width="760" height="44" rx="6" fill="#2a1000" stroke="#e8a800" stroke-width="1"/>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a800">⚠ enable_* off는 완전 금지가 아닌 높은 페널티 부여 — 대안이 없으면 여전히 사용될 수 있음</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디버깅·테스트 목적으로만 사용하고, 운영에서 영구 off는 피할 것</text>

  <!-- Code snippet -->
  <rect x="60" y="400" width="760" height="28" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SET</text>
  <text x="100" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> enable_seqscan = </text>
  <text x="215" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">off</text>
  <text x="239" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="251" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 인덱스를 강제 사용하게 유도 (임시)</text>
</svg>
