<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrInfo" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrAux" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="560" rx="12" fill="#0a0a0a"/>

  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">Authorization Code + PKCE 흐름</text>
  <text x="60" y="73" font-size="16" font-weight="600" fill="#e8e8e8">실제 주고받는 HTTP 메시지 순서</text>

  <!-- Actor headers -->
  <rect x="60" y="92" width="200" height="44" rx="6" fill="#11161f" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="119" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">브라우저 / Client</text>

  <rect x="340" y="92" width="200" height="44" rx="6" fill="#11161f" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="119" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">Authorization Server</text>

  <rect x="620" y="92" width="200" height="44" rx="6" fill="#11161f" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="119" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">Resource Server</text>

  <!-- lifelines -->
  <line x1="160" y1="136" x2="160" y2="520" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="440" y1="136" x2="440" y2="520" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="720" y1="136" x2="720" y2="520" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1 -->
  <text x="160" y="174" font-size="13" fill="#888">① GET /authorize?response_type=code&amp;...</text>
  <line x1="160" y1="186" x2="440" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <text x="300" y="206" font-size="12" fill="#9aa4b8" text-anchor="middle">client_id · scope · state · code_challenge</text>

  <!-- Step 2 -->
  <text x="440" y="240" font-size="13" fill="#888" text-anchor="middle">② 사용자 로그인 + 동의 (authn)</text>

  <!-- Step 3 -->
  <text x="440" y="278" font-size="13" fill="#888" text-anchor="end">③ 302 Location: redirect_uri?code=…&amp;state=…</text>
  <line x1="440" y1="290" x2="160" y2="290" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- Step 4 -->
  <text x="160" y="328" font-size="13" fill="#888">④ POST /token (back-channel)</text>
  <line x1="160" y1="340" x2="440" y2="340" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <text x="300" y="360" font-size="12" fill="#9aa4b8" text-anchor="middle">grant_type · code · code_verifier · redirect_uri</text>

  <!-- Step 5 -->
  <text x="440" y="394" font-size="13" fill="#888" text-anchor="end">⑤ 200 JSON { access_token, refresh_token }</text>
  <line x1="440" y1="406" x2="160" y2="406" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- Step 6 -->
  <text x="160" y="444" font-size="13" fill="#888">⑥ GET /api/me  Authorization: Bearer …</text>
  <line x1="160" y1="456" x2="720" y2="456" stroke="#7777cc" stroke-width="2" marker-end="url(#arrAux)"/>

  <!-- Step 7 -->
  <text x="720" y="494" font-size="13" fill="#888" text-anchor="end">⑦ 200 보호된 자원 (토큰 검증 후)</text>
  <line x1="720" y1="506" x2="160" y2="506" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
</svg>
