<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RBAC 구성 요소 관계도</text>

  <!-- Subject (who) -->
  <rect x="50" y="70" width="200" height="200" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">Subject (누가)</text>
  <rect x="66" y="108" width="168" height="40" rx="4" fill="#111827" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">User</text>
  <rect x="66" y="158" width="168" height="40" rx="4" fill="#0d1a0d" stroke="#1a3a1a" stroke-width="1"/>
  <text x="150" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">Group</text>
  <rect x="66" y="208" width="168" height="40" rx="4" fill="#1a1235" stroke="#3a2a5a" stroke-width="1"/>
  <text x="150" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">ServiceAccount</text>
  <text x="150" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Binding의 subjects 필드</text>

  <!-- RoleBinding / ClusterRoleBinding (center) -->
  <rect x="310" y="70" width="260" height="200" rx="8" fill="#0f1225" stroke="#3a4a6e" stroke-width="2"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Binding (연결)</text>
  <rect x="326" y="108" width="228" height="56" rx="4" fill="#111827" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">RoleBinding</text>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네임스페이스 범위</text>
  <rect x="326" y="174" width="228" height="56" rx="4" fill="#1a1235" stroke="#4a2a7a" stroke-width="1"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">ClusterRoleBinding</text>
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">클러스터 범위 (전체 NS)</text>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">roleRef + subjects 로 구성</text>

  <!-- Role / ClusterRole (right) -->
  <rect x="630" y="70" width="210" height="200" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="735" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">Role (무엇을)</text>
  <rect x="646" y="108" width="178" height="50" rx="4" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1"/>
  <text x="735" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Role</text>
  <text x="735" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네임스페이스 범위 권한</text>
  <rect x="646" y="168" width="178" height="50" rx="4" fill="#1a1030" stroke="#4a2a6a" stroke-width="1"/>
  <text x="735" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">ClusterRole</text>
  <text x="735" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">클러스터 범위 권한</text>
  <text x="735" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">rules: verbs + resources</text>

  <!-- Arrows -->
  <line x1="250" y1="170" x2="308" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="572" y1="170" x2="628" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Rules box at bottom -->
  <rect x="50" y="300" width="780" height="168" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Role rules 구조</text>
  <rect x="66" y="332" width="748" height="116" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">rules:</text>
  <text x="82" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- apiGroups: ["", "apps"]</text>
  <text x="82" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">                           # ""=core API, "apps"=Deployment 등</text>
  <text x="82" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  resources: ["pods", "deployments"]</text>
  <text x="82" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  verbs: ["get", "list", "watch"]</text>
  <text x="82" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">                                  # create/update/patch/delete/watch</text>
  <text x="82" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # resourceNames: ["specific-pod"]  # 특정 리소스 이름으로 제한 가능</text>
</svg>
