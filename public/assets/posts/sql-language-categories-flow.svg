<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr4" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DDL vs DML — 트랜잭션 처리 차이</text>

  <!-- DDL flow -->
  <text x="220" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">DDL 실행</text>

  <rect x="80" y="108" width="140" height="44" fill="#2a1010" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="150" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">CREATE TABLE</text>

  <path d="M 220 130 L 260 130" fill="none" stroke="#55c555" stroke-width="2" marker-end="url(#arr4)"/>

  <rect x="260" y="108" width="140" height="44" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="330" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">자동 COMMIT</text>
  <text x="330" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">이전 트랜잭션도 함께</text>

  <text x="220" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">⚠ PostgreSQL은 예외: DDL도 트랜잭션 가능</text>

  <!-- DML flow -->
  <text x="660" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">DML 실행</text>

  <rect x="480" y="108" width="120" height="44" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">INSERT 10건</text>

  <path d="M 600 130 L 630 130" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr4)"/>

  <rect x="630" y="108" width="120" height="44" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="690" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">UPDATE 5건</text>

  <path d="M 750 130 L 780 130" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr4)"/>

  <rect x="780" y="108" width="60" height="44" fill="#0a1a2a" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="810" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">COMMIT</text>

  <text x="660" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">또는 ROLLBACK으로 전체 취소 가능</text>

  <!-- Code block -->
  <rect x="60" y="220" width="360" height="120" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- DDL: 즉시 커밋</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">CREATE TABLE</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">             t (id INT);</text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- DDL 전 미커밋 DML도 커밋됨!</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">ROLLBACK</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">        ;</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- 이미 커밋됐으므로 롤백 안 됨</text>

  <rect x="480" y="220" width="360" height="120" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- DML: 트랜잭션 제어 가능</text>
  <text x="496" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">BEGIN</text>
  <text x="496" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">     ;</text>
  <text x="496" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">INSERT INTO</text>
  <text x="496" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">            t VALUES(1);</text>
  <text x="496" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">ROLLBACK</text>
  <text x="496" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">        ;</text>
  <text x="496" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- INSERT 취소됨</text>
</svg>
