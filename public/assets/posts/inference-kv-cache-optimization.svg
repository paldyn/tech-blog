<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">KV 캐시 4대 최적화 전략</text>

  <!-- ── 카드 1: FP8 양자화 ── -->
  <rect x="60" y="68" width="175" height="170" rx="10" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="147" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">① FP8 양자화</text>

  <rect x="78" y="104" width="140" height="36" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="148" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">FP16 KV 캐시</text>
  <text x="148" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">2 bytes/element</text>

  <text x="148" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">↓</text>

  <rect x="78" y="172" width="140" height="36" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="148" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">FP8 KV 캐시</text>
  <text x="148" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">1 byte/element</text>

  <rect x="78" y="216" width="140" height="16" rx="4" fill="#2e2a1a" stroke="#6e6e3a" stroke-width="1"/>
  <text x="148" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#b5cea8" text-anchor="middle">메모리 50% 절감 🎯</text>

  <!-- ── 카드 2: GQA ── -->
  <rect x="255" y="68" width="175" height="170" rx="10" fill="#0f0f1a" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="342" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">② GQA 적용</text>

  <rect x="273" y="104" width="140" height="36" rx="6" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="343" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">MHA: 32 KV 헤드</text>
  <text x="343" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">32 Q · 32 K · 32 V</text>

  <text x="343" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#7ec8e3" text-anchor="middle">↓</text>

  <rect x="273" y="172" width="140" height="36" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="343" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">GQA: 8 KV 헤드</text>
  <text x="343" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">32 Q · 8 K · 8 V</text>

  <rect x="273" y="216" width="140" height="16" rx="4" fill="#2e2a1a" stroke="#6e6e3a" stroke-width="1"/>
  <text x="343" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#b5cea8" text-anchor="middle">KV 캐시 4× 절감 🎯</text>

  <!-- ── 카드 3: Prefix Caching ── -->
  <rect x="450" y="68" width="175" height="170" rx="10" fill="#1a0f0a" stroke="#6e5a3a" stroke-width="1.5"/>
  <text x="537" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">③ Prefix Caching</text>

  <rect x="468" y="104" width="140" height="36" rx="6" fill="#2e1a0a" stroke="#6e5a3a" stroke-width="1"/>
  <text x="538" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">반복 프롬프트</text>
  <text x="538" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">매번 Prefill 재계산</text>

  <text x="538" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#ce9178" text-anchor="middle">↓</text>

  <rect x="468" y="172" width="140" height="36" rx="6" fill="#2e1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="538" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">KV 해시 캐싱</text>
  <text x="538" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">공통 프리픽스 재사용</text>

  <rect x="468" y="216" width="140" height="16" rx="4" fill="#2e2a1a" stroke="#6e6e3a" stroke-width="1"/>
  <text x="538" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#b5cea8" text-anchor="middle">TTFT 80% 절감 🎯</text>

  <!-- ── 카드 4: PagedAttention ── -->
  <rect x="645" y="68" width="175" height="170" rx="10" fill="#1a0a1a" stroke="#6e3a6e" stroke-width="1.5"/>
  <text x="732" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">④ PagedAttn</text>

  <rect x="663" y="104" width="140" height="36" rx="6" fill="#2a0a2a" stroke="#6e3a6e" stroke-width="1"/>
  <text x="733" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">연속 메모리</text>
  <text x="733" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">단편화 &amp; 낭비 발생</text>

  <text x="733" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#7777cc" text-anchor="middle">↓</text>

  <rect x="663" y="172" width="140" height="36" rx="6" fill="#2a0a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="733" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">블록 페이징</text>
  <text x="733" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">논리-물리 블록 매핑</text>

  <rect x="663" y="216" width="140" height="16" rx="4" fill="#2e2a1a" stroke="#6e6e3a" stroke-width="1"/>
  <text x="733" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#b5cea8" text-anchor="middle">배치 2~4× 증가 🎯</text>

  <!-- ── 코드 블록 ── -->
  <rect x="60" y="260" width="760" height="108" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"
        ># vLLM: KV 캐시 최적화 설정 조합</text>
  <text x="80" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">llm</tspan><tspan fill="#ffffff"> = LLM(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">model</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"meta-llama/Llama-3.1-8B-Instruct"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="80" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    kv_cache_dtype</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"fp8"</tspan><tspan fill="#ffffff">,           </tspan>
    <tspan fill="#9aa4b8"># ① 50% 절감</tspan>
  </text>
  <text x="80" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    enable_prefix_caching</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#7ec8e3" font-weight="600">True</tspan><tspan fill="#ffffff">,  </tspan>
    <tspan fill="#9aa4b8"># ③ Prefix 재사용</tspan>
  </text>
  <text x="80" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    gpu_memory_utilization</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#b5cea8">0.92</tspan><tspan fill="#ffffff">)</tspan>
    <tspan fill="#9aa4b8">  # ④ 최대한 활용</tspan>
  </text>

  <!-- ── 하단: 조합 효과 ── -->
  <rect x="60" y="382" width="760" height="96" rx="8" fill="#0a1a0a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">최적화 조합 효과 (Llama-3.1-8B, batch=32, seq=8192)</text>

  <text x="100" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본 (FP16, MHA)</text>
  <text x="100" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">FP8 + GQA 적용</text>
  <text x="100" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">+ Prefix Caching</text>

  <text x="320" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">KV: 34 GB</text>
  <text x="320" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">KV: ~4.3 GB</text>
  <text x="320" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">TTFT ↓80% + KV 공유</text>

  <text x="520" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">처리량 기준</text>
  <text x="520" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">배치 크기 약 8× 확대 가능</text>
  <text x="520" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">동일 GPU에서 처리량 극대화</text>
</svg>
