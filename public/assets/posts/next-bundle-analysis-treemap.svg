<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">번들 분석 — 크기 구성 예시</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">@next/bundle-analyzer 트리맵 읽는 법</text>

  <!-- Treemap blocks -->
  <!-- node_modules: large -->
  <rect x="60" y="96" width="440" height="180" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="280" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">node_modules</text>
  <text x="280" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">~68% of bundle</text>

  <!-- Sub blocks inside node_modules -->
  <rect x="72" y="160" width="140" height="104" rx="4" fill="#111827" stroke="#e05555" stroke-width="1"/>
  <text x="142" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">moment.js</text>
  <text x="142" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">67 kB</text>
  <text x="142" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">⚠ date-fns로 교체 고려</text>

  <rect x="222" y="160" width="120" height="104" rx="4" fill="#111827" stroke="#ce9178" stroke-width="1"/>
  <text x="282" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">lodash</text>
  <text x="282" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">71 kB</text>
  <text x="282" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">⚠ tree-shake 필요</text>

  <rect x="352" y="160" width="136" height="104" rx="4" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="420" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">react + react-dom</text>
  <text x="420" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">132 kB</text>
  <text x="420" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">필수 (줄일 수 없음)</text>

  <!-- App code -->
  <rect x="510" y="96" width="310" height="180" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="665" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">app code</text>
  <text x="665" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">~32% of bundle</text>

  <rect x="522" y="160" width="140" height="104" rx="4" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="592" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">pages / components</text>
  <text x="592" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">89 kB</text>

  <rect x="672" y="160" width="136" height="104" rx="4" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="740" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">shared chunks</text>
  <text x="740" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">44 kB</text>

  <!-- How to read -->
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">분석 순서</text>

  <rect x="60" y="332" width="232" height="80" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="176" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① 큰 블록 식별</text>
  <text x="176" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">트리맵에서 가장 넓은</text>
  <text x="176" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모듈 파악</text>

  <rect x="324" y="332" width="232" height="80" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">② 필요성 판단</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대체 라이브러리 또는</text>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dynamic() 전환 검토</text>

  <rect x="588" y="332" width="232" height="80" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="704" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ 적용 &amp; 재측정</text>
  <text x="704" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최적화 후 번들</text>
  <text x="704" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">크기 재확인</text>
</svg>
