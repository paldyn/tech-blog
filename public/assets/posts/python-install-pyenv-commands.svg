<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pyenv 핵심 명령어</text>

  <rect x="60" y="66" width="760" height="296" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 설치 가능한 버전 목록 조회</text>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">$</tspan><tspan fill="#ffffff"> pyenv install --list | grep </tspan><tspan fill="#ce9178">"3\\.12"</tspan></text>

  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 특정 버전 설치</text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">$</tspan><tspan fill="#ffffff"> pyenv install </tspan><tspan fill="#b5cea8">3.12.4</tspan></text>

  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 설치된 버전 목록 및 현재 활성 버전 확인</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">$</tspan><tspan fill="#ffffff"> pyenv versions</tspan></text>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">system</tspan></text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">* </tspan><tspan fill="#ffffff">3.12.4  </tspan><tspan fill="#9aa4b8">(global 설정)</tspan></text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  3.10.14</tspan></text>

  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 프로젝트 디렉터리에 로컬 버전 지정 (.python-version 생성)</text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">$</tspan><tspan fill="#ffffff"> cd ~/my-project &amp;&amp; pyenv local </tspan><tspan fill="#b5cea8">3.10.14</tspan></text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">$</tspan><tspan fill="#ffffff"> python --version    </tspan><tspan fill="#9aa4b8"># → Python 3.10.14</tspan></text>
</svg>
