<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">React.memo — 컴포넌트 메모이제이션</text>

  <defs>
    <marker id="arrG2" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrR2" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Without memo -->
  <text x="220" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">React.memo 없이</text>

  <rect x="60" y="96" width="320" height="70" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">부모 리렌더 → 자식도 무조건 리렌더</text>
  <text x="220" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">props 변화 여부와 관계없이 항상 실행</text>

  <rect x="60" y="186" width="320" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text x="140" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> Child({ name }) {</text>
  <text x="78" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">  // 부모 리렌더마다 실행됨</text>
  <text x="78" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="126" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> &lt;div&gt;{name}&lt;/div&gt;;</text>
  <text x="78" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">}</text>
  <text x="78" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e05555">// 매번 새 렌더 트리 생성 ⚠</text>

  <!-- With memo -->
  <text x="660" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">React.memo 적용</text>

  <rect x="500" y="96" width="320" height="70" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">부모 리렌더 → props 얕은 비교</text>
  <text x="660" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">props 동일 → 이전 결과 재사용</text>

  <rect x="500" y="186" width="320" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="518" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text x="560" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> Child = memo(({ name }) =&gt; {</text>
  <text x="518" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">  // name 같으면 건너뜀</text>
  <text x="518" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="566" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> &lt;div&gt;{name}&lt;/div&gt;;</text>
  <text x="518" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">});</text>
  <text x="518" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#55c555">// props 동일이면 스킵 ✓</text>

  <!-- Bottom note -->
  <rect x="60" y="322" width="760" height="52" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">⚠ 주의: 비교 비용 &gt; 렌더 비용이면 오히려 손해. 렌더가 비싼 컴포넌트에만 적용 권장</text>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc" text-anchor="middle">콜백 prop은 useCallback으로 감싸야 효과 있음 — 매 렌더마다 새 참조 생성 방지</text>
</svg>
