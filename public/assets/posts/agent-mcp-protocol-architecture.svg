<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="11" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 1 L 12 7 L 1 13 z" fill="#8a93a8"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MCP 프로토콜 아키텍처</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">에이전트와 외부 시스템을 표준 프로토콜로 연결</text>

  <!-- LEFT: MCP Client -->
  <rect x="60" y="110" width="250" height="230" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">MCP Client</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">호스트 · 에이전트 측</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">· Claude Desktop</text>
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">· Cursor · IDE</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">· 커스텀 에이전트</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">MCP 를 한 번만 구현</text>

  <!-- MIDDLE: protocol channel -->
  <text x="440" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#d4d4d4" text-anchor="middle">JSON-RPC 2.0</text>
  <line x1="322" y1="212" x2="558" y2="212" stroke="#8a93a8" stroke-width="2" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <rect x="350" y="234" width="180" height="28" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">stdio · 로컬</text>
  <rect x="350" y="270" width="180" height="28" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">HTTP+SSE · 원격</text>

  <!-- RIGHT: MCP Server -->
  <rect x="570" y="110" width="250" height="230" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="590" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">MCP Server</text>
  <text x="590" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">외부 시스템 래핑</text>
  <text x="590" y="208" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#55c555">●</tspan><tspan fill="#d4d4d4"> Tools — 행동 (함수)</tspan></text>
  <text x="590" y="236" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#7ec8e3">●</tspan><tspan fill="#d4d4d4"> Resources — 컨텍스트</tspan></text>
  <text x="590" y="264" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#ce9178">●</tspan><tspan fill="#d4d4d4"> Prompts — 지시문</tspan></text>
  <text x="590" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ GitHub · Slack · DB</text>

  <!-- Bottom note -->
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">M×N 개의 개별 통합을 M+N 으로 — 에이전트와 도구가 각자 MCP 만 한 번 구현한다</text>
</svg>
