<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MCP 프로토콜 아키텍처</text>

  <!-- ── MCP Host (Claude Desktop) ── -->
  <rect x="30" y="68" width="360" height="280" rx="12" fill="#0f0f1a" stroke="#3a3a6e" stroke-width="2"/>
  <text x="210" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">MCP Host (Claude Desktop)</text>

  <!-- LLM -->
  <rect x="60" y="108" width="140" height="52" rx="8" fill="#1a0a1a" stroke="#6e3a6e" stroke-width="1.5"/>
  <text x="130" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Claude LLM</text>
  <text x="130" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">claude-opus-4-7</text>

  <!-- MCP Client 1 -->
  <rect x="218" y="108" width="140" height="52" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="288" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">MCP Client 1</text>
  <text x="288" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">GitHub 연결</text>

  <!-- MCP Client 2 -->
  <rect x="60" y="176" width="140" height="52" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="130" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">MCP Client 2</text>
  <text x="130" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Slack 연결</text>

  <!-- MCP Client 3 -->
  <rect x="218" y="176" width="140" height="52" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="288" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">MCP Client 3</text>
  <text x="288" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">DB 연결</text>

  <!-- 프로토콜 표시 -->
  <rect x="60" y="248" width="298" height="84" rx="6" fill="#0a0a0a" stroke="#2a2a4e" stroke-width="1"/>
  <text x="209" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">JSON-RPC 2.0 over stdio / HTTP SSE</text>
  <text x="209" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">초기화: initialize → initialized</text>
  <text x="209" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">도구: tools/list → tools/call</text>
  <text x="209" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리소스: resources/list → resources/read</text>

  <!-- ── 오른쪽: MCP Servers ── -->
  <!-- Server 1: GitHub -->
  <rect x="490" y="68" width="360" height="100" rx="10" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="670" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">MCP Server: GitHub</text>
  <text x="670" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Tools: create_issue, search_repos, get_pr</text>
  <text x="670" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Resources: 파일 목록, 커밋 히스토리</text>
  <text x="670" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전송: stdio (로컬 프로세스)</text>

  <!-- Server 2: Slack -->
  <rect x="490" y="188" width="360" height="100" rx="10" fill="#1a1a0a" stroke="#6e6e3a" stroke-width="1.5"/>
  <text x="670" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#b5cea8" text-anchor="middle">MCP Server: Slack</text>
  <text x="670" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Tools: send_message, list_channels</text>
  <text x="670" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Resources: 채널 메시지 히스토리</text>
  <text x="670" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전송: HTTP SSE (원격 서버)</text>

  <!-- Server 3: Database -->
  <rect x="490" y="308" width="360" height="100" rx="10" fill="#1a0f0a" stroke="#6e5a3a" stroke-width="1.5"/>
  <text x="670" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">MCP Server: Database</text>
  <text x="670" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Tools: query, insert, update</text>
  <text x="670" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Resources: 스키마, 테이블 정보</text>
  <text x="670" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전송: stdio</text>

  <!-- 연결 화살표 -->
  <line x1="390" y1="134" x2="490" y2="118" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="390" y1="202" x2="490" y2="238" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="390" y1="202" x2="490" y2="358" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 하단: 메시지 형식 -->
  <rect x="30" y="368" width="440" height="132" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="50" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"
        ># MCP 메시지 형식 (JSON-RPC 2.0)</text>
  <text x="50" y="410" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"
        ># 요청</text>
  <text x="50" y="430" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">{</tspan>
    <tspan fill="#ce9178">"jsonrpc"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"2.0"</tspan><tspan fill="#ffffff">,</tspan>
    <tspan fill="#ce9178">"id"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan>
    <tspan fill="#ce9178">"method"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"tools/call"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="50" y="450" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ce9178"> "params"</tspan><tspan fill="#ffffff">:{</tspan>
    <tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"create_issue"</tspan><tspan fill="#ffffff">,</tspan>
    <tspan fill="#ce9178">"arguments"</tspan><tspan fill="#ffffff">:{</tspan>
    <tspan fill="#ce9178">"title"</tspan><ttml-fill="#ffffff">:</ttml-fill="#ffffff"><tspan fill="#ce9178">"버그"</tspan><tspan fill="#ffffff">}}}</tspan>
  </text>
  <text x="50" y="470" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"
        ># 응답: {"jsonrpc":"2.0","id":1,"result":{"content":[...]}}</text>
  <text x="50" y="490" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"
        ># 오류: {"jsonrpc":"2.0","id":1,"error":{"code":-32601,"message":"..."}}</text>
</svg>
