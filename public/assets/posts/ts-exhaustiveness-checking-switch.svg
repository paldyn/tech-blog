  <text x="82" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    case</text>
  <text x="82" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
