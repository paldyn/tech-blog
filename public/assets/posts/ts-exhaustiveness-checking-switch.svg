  <text x="482" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">           assertNever(s)</text>
  <text x="482" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="482" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
