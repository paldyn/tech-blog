  <text x="82" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                   :</text>
  <text x="82" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
