  <text x="482" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">         assertNever(</text>
  <text x="482" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  x: </text>
  <text x="482" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
