  <text x="82" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  switch</text>
  <text x="82" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
