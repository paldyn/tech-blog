      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">switch Æ44È04Á31 ¬80Àac (Exhaustiveness Checking)</text>
  <text x="440" y="64" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">모든 케이스를 커버했는지 컴파일 타임에 검증</text>

  <!-- Left: Incomplete switch -->
  <rect x="60" y="82" width="360" height="350" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
