<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Hello World 코드 해부</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">한 줄 한 줄의 역할을 정확히 이해하자</text>

  <!-- ─── Code block ─── -->
  <rect x="60" y="88" width="400" height="264" rx="6" fill="#070b14" stroke="#1e2433"/>

  <!-- line 1: public class Hello { -->
  <text x="76" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">public</text>
  <text x="128" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8"> class </text>
  <text x="184" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">Hello {</text>

  <!-- line 2: blank -->

  <!-- line 3: public static void main -->
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">  public static void</text>

  <!-- line 4:     main(String[] args) { -->
  <text x="76" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">      main(</text>
  <text x="176" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">String</text>
  <text x="224" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">[] args) {</text>

  <!-- line 5: blank -->

  <!-- line 6:     System.out.println( -->
  <text x="76" y="206" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">    System.out.println(</text>

  <!-- line 7:         "Hello, World!"); -->
  <text x="76" y="224" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">        "Hello, World!");</text>

  <!-- line 8: blank -->

  <!-- line 9:   } -->
  <text x="76" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">  }</text>

  <!-- line 10: } -->
  <text x="76" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">}</text>

  <!-- Horizontal highlight bars -->
  <rect x="62" y="103" width="396" height="18" rx="2" fill="#7ec8e3" fill-opacity="0.06"/>
  <rect x="62" y="139" width="396" height="36" rx="2" fill="#7777cc" fill-opacity="0.06"/>
  <rect x="62" y="193" width="396" height="36" rx="2" fill="#55c555" fill-opacity="0.06"/>

  <!-- ─── Annotation lines + callouts ─── -->

  <!-- Callout 1: public class Hello -->
  <line x1="462" y1="114" x2="510" y2="114" stroke="#7ec8e3" stroke-width="1.2" stroke-dasharray="4 3"/>
  <rect x="510" y="88" width="310" height="64" rx="6" fill="#0c1d2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="528" y="110"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">클래스 선언</text>
  <text x="528" y="130"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">파일명과 클래스명은 반드시 일치해야 한다.</text>
  <text x="528" y="148"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">public → 어디서나 접근 가능한 최상위 클래스.</text>

  <!-- Callout 2: public static void main -->
  <line x1="462" y1="161" x2="510" y2="178" stroke="#9999dd" stroke-width="1.2" stroke-dasharray="4 3"/>
  <rect x="510" y="160" width="310" height="80" rx="6" fill="#131028" stroke="#7777cc" stroke-width="1"/>
  <text x="528" y="182"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#9999dd">진입점 (Entry Point)</text>
  <text x="528" y="202"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">JVM이 프로그램 시작 시 호출하는 메서드.</text>
  <text x="528" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">시그니처: public static void main(String[])</text>
  <text x="528" y="236"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">이 시그니처가 정확하지 않으면 MainMethodNotFound.</text>

  <!-- Callout 3: System.out.println -->
  <line x1="462" y1="215" x2="510" y2="280" stroke="#55c555" stroke-width="1.2" stroke-dasharray="4 3"/>
  <rect x="510" y="258" width="310" height="80" rx="6" fill="#0d1e10" stroke="#55c555" stroke-width="1"/>
  <text x="528" y="280"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">표준 출력</text>
  <text x="528" y="300"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">System: java.lang 패키지의 클래스 (자동 import).</text>
  <text x="528" y="318"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">out: PrintStream 타입의 static 필드.</text>
  <text x="528" y="334"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">println: 문자열 출력 후 개행 추가.</text>

  <!-- ─── Bottom: Run commands ─── -->
  <rect x="60" y="368" width="756" height="80" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0"># 컴파일 후 실행</text>
  <text x="76" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">$ javac Hello.java   </text>
  <text x="260" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0"># Hello.class 생성</text>
  <text x="76" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">$ java Hello         </text>
  <text x="260" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">Hello, World!</text>
  <text x="420" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">   # .class 확장자 없이 실행</text>
</svg>
