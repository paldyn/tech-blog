<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">감사 컬럼 패턴</text>

  <!-- Table with audit columns -->
  <rect x="60" y="66" width="760" height="220" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="60" y="66" width="760" height="36" rx="8" fill="#1e3a5f"/>
  <rect x="60" y="86" width="760" height="16" fill="#1e3a5f"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">orders (감사 컬럼 포함)</text>

  <!-- Column headers -->
  <rect x="60" y="102" width="760" height="28" rx="0" fill="#0f1f35"/>
  <text x="120" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">id</text>
  <text x="220" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">amount</text>
  <text x="320" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">created_at</text>
  <text x="450" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">updated_at</text>
  <text x="570" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3">created_by</text>
  <text x="680" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3">updated_by</text>
  <text x="790" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#ce9178">version</text>

  <!-- Data rows -->
  <text x="120" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">1001</text>
  <text x="220" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">50,000</text>
  <text x="320" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">2024-01-15 09:00</text>
  <text x="450" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">2024-01-15 14:30</text>
  <text x="570" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">user:42</text>
  <text x="680" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">admin:7</text>
  <text x="790" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">3</text>

  <line x1="60" y1="164" x2="820" y2="164" stroke="#2a3a5e" stroke-width="1"/>

  <text x="120" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">1002</text>
  <text x="220" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">32,000</text>
  <text x="320" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">2024-01-16 11:20</text>
  <text x="450" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">2024-01-16 11:20</text>
  <text x="570" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">user:18</text>
  <text x="680" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">user:18</text>
  <text x="790" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">1</text>

  <line x1="60" y1="196" x2="820" y2="196" stroke="#2a3a5e" stroke-width="1"/>

  <!-- Column dividers -->
  <line x1="190" y1="102" x2="190" y2="220" stroke="#2a3a5e" stroke-width="1"/>
  <line x1="290" y1="102" x2="290" y2="220" stroke="#2a3a5e" stroke-width="1"/>
  <line x1="430" y1="102" x2="430" y2="220" stroke="#2a3a5e" stroke-width="1"/>
  <line x1="550" y1="102" x2="550" y2="220" stroke="#2a3a5e" stroke-width="1"/>
  <line x1="660" y1="102" x2="660" y2="220" stroke="#2a3a5e" stroke-width="1"/>
  <line x1="770" y1="102" x2="770" y2="220" stroke="#2a3a5e" stroke-width="1"/>

  <!-- Legend labels -->
  <text x="370" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">타임스탬프 (자동)</text>
  <text x="615" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">작업자 추적</text>
  <text x="790" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">낙관적 잠금</text>

  <!-- DDL code -->
  <rect x="60" y="262" width="760" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 감사 컬럼이 포함된 테이블 DDL</text>
  <text x="80" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  created_at  </tspan><tspan fill="#7ec8e3" font-weight="600">TIMESTAMPTZ NOT NULL DEFAULT</tspan><tspan fill="#ffffff"> NOW(),</tspan>
  </text>
  <text x="80" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  updated_at  </tspan><tspan fill="#7ec8e3" font-weight="600">TIMESTAMPTZ NOT NULL DEFAULT</tspan><tspan fill="#ffffff"> NOW(),</tspan>
  </text>
  <text x="80" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  created_by  </tspan><tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#ffffff">),</tspan>
  </text>
  <text x="80" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  updated_by  </tspan><tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#ffffff">),</tspan>
  </text>
  <text x="80" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  version     </tspan><tspan fill="#7ec8e3" font-weight="600">BIGINT NOT NULL DEFAULT</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">     </tspan><tspan fill="#9aa4b8">-- 낙관적 잠금</tspan>
  </text>
  <text x="80" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">-- 인덱스: 최근 변경 조회용</tspan>
  </text>
</svg>
