<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">HTTP는 소켓 위를 흐르는 텍스트 메시지다</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#7ec8e3">요청 (Request)</text>
  <rect x="60" y="106" width="360" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#b5cea8" font-weight="600">GET</tspan> /api/users HTTP/1.1</text>
  <text xml:space="preserve" x="76" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">Host: example.com</text>
  <text xml:space="preserve" x="76" y="178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">Accept: application/json</text>
  <text xml:space="preserve" x="76" y="200" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">(빈 줄 = 헤더 끝)</text>
  <text xml:space="preserve" x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 시작줄 + 헤더 + 빈줄 + 본문</text>
  <text xml:space="preserve" x="76" y="278" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 모두 사람이 읽는 텍스트</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#55c555">응답 (Response)</text>
  <rect x="460" y="106" width="360" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">HTTP/1.1 <tspan fill="#b5cea8" font-weight="600">200</tspan> OK</text>
  <text xml:space="preserve" x="476" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">Content-Type: application/json</text>
  <text xml:space="preserve" x="476" y="178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">Content-Length: 42</text>
  <text xml:space="preserve" x="476" y="200" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">(빈 줄)</text>
  <text xml:space="preserve" x="476" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">{"users": [...]}</text>
  <text xml:space="preserve" x="476" y="278" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 상태줄 + 헤더 + 본문</text>

  <text x="440" y="338" font-size="13" fill="#888" text-anchor="middle">HttpURLConnection은 이 텍스트 메시지의 조립·해석을 대신해 준다</text>
</svg>
