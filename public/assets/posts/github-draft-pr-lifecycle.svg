<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888888"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Draft PR의 생애주기</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">초안으로 열고, 준비되면 리뷰 단계로 전환한다</text>

  <!-- Box 1 Draft -->
  <rect x="60" y="130" width="200" height="70" rx="10" fill="#101010" stroke="#888888" stroke-width="1.5"/>
  <text x="160" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#aaaaaa">○ Draft PR 열기</text>
  <text x="160" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">작업 중인 코드 공유</text>

  <line x1="260" y1="165" x2="338" y2="165" stroke="#888888" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-gray)"/>
  <text x="300" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">작업 반복</text>

  <!-- Box 2 Ready -->
  <rect x="340" y="130" width="200" height="70" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Ready for review</text>
  <text x="440" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리뷰어에게 알림 전송</text>

  <line x1="540" y1="165" x2="618" y2="165" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="580" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">승인</text>

  <!-- Box 3 Merge -->
  <rect x="620" y="130" width="200" height="70" rx="10" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">Merge</text>
  <text x="720" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">base 브랜치 병합</text>

  <text x="440" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">필요하면 Ready 상태에서 다시 Draft로 되돌릴 수도 있다 (Convert to draft)</text>
</svg>
