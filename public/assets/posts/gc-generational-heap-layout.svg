<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">힙의 세대 구조 — Young &amp; Old</text>

  <!-- Section labels -->
  <text x="290" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Young Generation</text>
  <text x="690" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Old Generation</text>

  <!-- Heap track baseline -->
  <!-- Eden -->
  <rect x="60" y="104" width="320" height="96" rx="6" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Eden</text>
  <text x="220" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새 객체가 할당되는 곳</text>

  <!-- Survivor S0 -->
  <rect x="392" y="104" width="62" height="96" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="423" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">S0</text>
  <text x="423" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Survivor</text>

  <!-- Survivor S1 -->
  <rect x="464" y="104" width="62" height="96" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="495" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">S1</text>
  <text x="495" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Survivor</text>

  <!-- Old -->
  <rect x="556" y="104" width="264" height="96" rx="6" fill="#0e0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="688" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">Old (Tenured)</text>
  <text x="688" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">오래 살아남은 객체</text>

  <!-- Relative size note -->
  <text x="290" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Eden : S0 : S1 = 8 : 1 : 1  (-XX:SurvivorRatio=8)</text>
  <text x="688" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기본적으로 Young보다 크다 (≈ 2/3 힙)</text>

  <!-- Minor GC scope bracket (Young only) -->
  <line x1="60" y1="262" x2="60" y2="276" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="526" y1="262" x2="526" y2="276" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="60" y1="276" x2="526" y2="276" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="293" y1="276" x2="293" y2="294" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="170" y="300" width="246" height="60" rx="8" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="293" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Minor GC</text>
  <text x="293" y="345" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Young 세대만 수집 — 빈번하고 짧다</text>

  <!-- Major/Full GC scope bracket (whole heap) -->
  <line x1="60" y1="386" x2="60" y2="400" stroke="#e05555" stroke-width="2"/>
  <line x1="820" y1="386" x2="820" y2="400" stroke="#e05555" stroke-width="2"/>
  <line x1="60" y1="400" x2="820" y2="400" stroke="#e05555" stroke-width="2"/>
  <line x1="440" y1="400" x2="440" y2="414" stroke="#e05555" stroke-width="2"/>
  <rect x="300" y="420" width="280" height="40" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="445" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">Major / Full GC — 힙 전체 수집, 가장 긴 STW</text>
</svg>
