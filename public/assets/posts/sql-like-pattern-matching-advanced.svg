<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">DBMS 확장 패턴 매칭 — ILIKE · SIMILAR TO · REGEXP</text>

  <!-- Left: ILIKE / case insensitive -->
  <text x="80" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" xml:space="preserve">대소문자 무시 (PostgreSQL ILIKE)</text>
  <rect x="60" y="100" width="370" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- LIKE: 대소문자 구분 (PostgreSQL)</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> name </text>
  <text x="172" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ILIKE</text>
  <text x="212" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve"> 'kim%'</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- Kim, KIM, kim 모두 매칭</text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- MySQL: 기본 대소문자 무시</text>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- LIKE BINARY 'Kim%': 구분 강제</text>

  <!-- Right: SIMILAR TO / REGEXP -->
  <text x="470" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" xml:space="preserve">정규표현식 (REGEXP · SIMILAR TO)</text>
  <rect x="450" y="100" width="370" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- MySQL: REGEXP / RLIKE</text>
  <text x="466" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="514" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> phone </text>
  <text x="562" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">REGEXP</text>
  <text x="616" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve"> '^010-'</text>
  <text x="466" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- PostgreSQL: ~ (정규식) / !~ (불일치)</text>
  <text x="466" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="514" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> email </text>
  <text x="562" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">~</text>
  <text x="576" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve"> '@[a-z]+\.com$'</text>
  <text x="466" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- ~* 는 대소문자 무시</text>

  <!-- LIKE vs Full-Text comparison table -->
  <text x="60" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" xml:space="preserve">방법별 특징 비교</text>

  <rect x="60" y="248" width="760" height="32" rx="4" fill="#111827"/>
  <text x="180" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">방법</text>
  <text x="370" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">인덱스</text>
  <text x="560" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">표현력</text>
  <text x="730" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">성능</text>

  <rect x="60" y="280" width="760" height="28" fill="#0d1117"/>
  <text x="180" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">LIKE 'prefix%'</text>
  <text x="370" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">B-tree 활용</text>
  <text x="560" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">접두사만</text>
  <text x="730" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">빠름</text>

  <rect x="60" y="308" width="760" height="28" fill="#111827"/>
  <text x="180" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">LIKE '%mid%'</text>
  <text x="370" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">풀 스캔</text>
  <text x="560" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">부분 문자열</text>
  <text x="730" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">느림</text>

  <rect x="60" y="336" width="760" height="28" fill="#0d1117"/>
  <text x="180" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle" xml:space="preserve">REGEXP</text>
  <text x="370" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">미지원 (일반적)</text>
  <text x="560" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">복잡한 패턴</text>
  <text x="730" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">가장 느림</text>

  <rect x="60" y="364" width="760" height="28" fill="#111827"/>
  <text x="180" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">Full-Text Index</text>
  <text x="370" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">전문 검색 인덱스</text>
  <text x="560" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">형태소·랭킹</text>
  <text x="730" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">빠름</text>

  <!-- Footer -->
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle" xml:space="preserve">PALDYN — SQL 완전 정복</text>
</svg>
