<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@Primary / @Qualifier / 커스텀 어노테이션</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">같은 인터페이스 구현체 2개 — 선택 전략 비교</text>

  <!-- Interface -->
  <rect x="340" y="90" width="200" height="44" rx="8" fill="#0e1820" stroke="#1e3050"/>
  <text x="440" y="117" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">PaymentGateway</text>

  <!-- Impl 1 -->
  <rect x="80" y="180" width="200" height="44" rx="8" fill="#071207" stroke="#1e3a1e"/>
  <text x="180" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">@Primary</text>
  <text x="180" y="216" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">KakaoPay</text>

  <!-- Impl 2 -->
  <rect x="600" y="180" width="200" height="44" rx="8" fill="#0e1820" stroke="#1e2433"/>
  <text x="700" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 기본 아님</text>
  <text x="700" y="216" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">TossPay</text>

  <!-- Lines from interface to impls -->
  <line x1="380" y1="134" x2="220" y2="180" stroke="#444" stroke-width="1.5"/>
  <line x1="500" y1="134" x2="660" y2="180" stroke="#444" stroke-width="1.5"/>

  <!-- Code blocks: three strategies side by side -->

  <!-- Strategy 1: @Primary -->
  <text x="160" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">@Primary 활용</text>
  <rect x="40" y="262" width="240" height="128" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="56" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">@Service</text>
  <text x="56" y="301" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">class OrderService {</text>
  <text x="56" y="319" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" xml:space="preserve">  private final</text>
  <text x="56" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  PaymentGateway gw;</text>
  <text x="56" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  // KakaoPay 자동 선택</text>
  <text x="56" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Strategy 2: @Qualifier -->
  <text x="440" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">@Qualifier 활용</text>
  <rect x="320" y="262" width="240" height="128" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="336" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">@Service</text>
  <text x="336" y="301" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">class RefundService {</text>
  <text x="336" y="319" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  @Qualifier("tossPay")</text>
  <text x="336" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" xml:space="preserve">  private final</text>
  <text x="336" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  PaymentGateway gw;</text>
  <text x="336" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  // TossPay 명시 선택</text>

  <!-- Strategy 3: Custom annotation -->
  <text x="720" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">커스텀 어노테이션</text>
  <rect x="600" y="262" width="240" height="128" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="616" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">@TossPay</text>
  <text x="616" y="301" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" xml:space="preserve">private final</text>
  <text x="616" y="319" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">PaymentGateway gw;</text>
  <text x="616" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 타입 안전</text>
  <text x="616" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 오타 컴파일 오류</text>
  <text x="616" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// 가장 권장</text>

  <!-- Pros/cons row -->
  <text x="160" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">기본값 하나 지정 시 편리</text>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">문자열 오타 위험 있음</text>
  <text x="720" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">컴파일 타임 안전 최강</text>

  <!-- Footer -->
  <text x="440" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · Spring 완전 정복 시리즈</text>
</svg>
