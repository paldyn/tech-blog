<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일 읽기 방법 4가지 비교</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">read · readline · readlines · 반복자(for loop) — 언제 무엇을 써야 하나</text>

  <!-- 4 method boxes in a row -->
  <!-- read() -->
  <rect x="60" y="96" width="175" height="280" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="147" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">read()</text>
  <text x="147" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전체를 하나의</text>
  <text x="147" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">str로 반환</text>
  <line x1="75" y1="172" x2="225" y2="172" stroke="#3a4a6e" stroke-width="1"/>
  <text x="147" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 간단</text>
  <text x="147" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 메모리 전체</text>
  <text x="147" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 대용량 위험</text>
  <line x1="75" y1="240" x2="225" y2="240" stroke="#3a4a6e" stroke-width="1"/>
  <text x="147" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">소용량·설정 파일</text>
  <text x="147" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JSON·XML 파싱 전</text>

  <!-- readline() -->
  <rect x="255" y="96" width="175" height="280" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="342" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">readline()</text>
  <text x="342" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">한 줄씩 반환</text>
  <text x="342" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">빈 str → EOF</text>
  <line x1="265" y1="172" x2="420" y2="172" stroke="#3a4a6e" stroke-width="1"/>
  <text x="342" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 저메모리</text>
  <text x="342" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 중간 중단 가능</text>
  <text x="342" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 반복 코드</text>
  <line x1="265" y1="240" x2="420" y2="240" stroke="#3a4a6e" stroke-width="1"/>
  <text x="342" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">커서 제어 필요</text>
  <text x="342" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">헤더만 읽을 때</text>

  <!-- readlines() -->
  <rect x="450" y="96" width="175" height="280" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="537" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">readlines()</text>
  <text x="537" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전체를 list[str]</text>
  <text x="537" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">로 반환</text>
  <line x1="460" y1="172" x2="615" y2="172" stroke="#3a4a6e" stroke-width="1"/>
  <text x="537" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 인덱스 접근</text>
  <text x="537" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 메모리 전체</text>
  <text x="537" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 대용량 위험</text>
  <line x1="460" y1="240" x2="615" y2="240" stroke="#3a4a6e" stroke-width="1"/>
  <text x="537" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">줄 수 카운팅</text>
  <text x="537" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">마지막 줄 접근</text>

  <!-- for loop -->
  <rect x="645" y="96" width="175" height="280" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="732" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">for loop</text>
  <text x="732" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">반복자로 한 줄씩</text>
  <text x="732" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">스트리밍 처리</text>
  <line x1="655" y1="172" x2="810" y2="172" stroke="#55c555" stroke-width="1"/>
  <text x="732" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 저메모리</text>
  <text x="732" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 간결한 문법</text>
  <text x="732" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 파이써닉</text>
  <line x1="655" y1="240" x2="810" y2="240" stroke="#55c555" stroke-width="1"/>
  <text x="732" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">★ 대부분의 경우</text>
  <text x="732" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">가장 권장</text>

  <!-- Memory indicator -->
  <text x="147" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">메모리: 높음</text>
  <text x="342" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">메모리: 낮음</text>
  <text x="537" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">메모리: 높음</text>
  <text x="732" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">메모리: 낮음</text>

  <!-- Bottom -->
  <rect x="60" y="398" width="760" height="28" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">대용량 파일 처리의 기본: for line in f: — 한 줄씩 스트리밍, 메모리 O(한 줄)</text>
</svg>
