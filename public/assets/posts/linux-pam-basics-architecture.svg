<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PAM 아키텍처</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Pluggable Authentication Modules</text>

  <!-- Application layer -->
  <rect x="300" y="88" width="280" height="50" fill="#1a1a2e" rx="8" stroke="#2d2d5f" stroke-width="1.5"/>
  <text x="440" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">애플리케이션 (login, sshd, sudo)</text>

  <!-- Arrow down -->
  <line x1="440" y1="138" x2="440" y2="158" stroke="#555" stroke-width="2"/>
  <polygon points="435,158 440,168 445,158" fill="#555"/>

  <!-- PAM library -->
  <rect x="240" y="168" width="400" height="50" fill="#0d1929" rx="8" stroke="#1e3a5f" stroke-width="2"/>
  <text x="440" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">libpam — PAM 라이브러리</text>

  <!-- Arrow to config -->
  <line x1="200" y1="193" x2="240" y2="193" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="60" y="168" width="140" height="50" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/etc/pam.d/</text>
  <text x="130" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">설정 파일</text>

  <!-- Arrow down -->
  <line x1="440" y1="218" x2="440" y2="238" stroke="#555" stroke-width="2"/>
  <polygon points="435,238 440,248 445,238" fill="#555"/>

  <!-- 4 module types -->
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">4가지 모듈 유형 (스택으로 쌓임)</text>

  <rect x="60" y="282" width="170" height="70" fill="#0d200d" rx="6" stroke="#2d4a1e" stroke-width="1.5"/>
  <text x="145" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">auth</text>
  <text x="145" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">신원 확인</text>
  <text x="145" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(비밀번호, 토큰)</text>

  <rect x="250" y="282" width="170" height="70" fill="#0d1929" rx="6" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="335" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">account</text>
  <text x="335" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">접근 허용 여부</text>
  <text x="335" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(만료, 잠금 등)</text>

  <rect x="440" y="282" width="170" height="70" fill="#1a1a2e" rx="6" stroke="#2d2d5f" stroke-width="1.5"/>
  <text x="525" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">password</text>
  <text x="525" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">비밀번호 변경</text>
  <text x="525" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(정책, 해시)</text>

  <rect x="630" y="282" width="190" height="70" fill="#1a0d0d" rx="6" stroke="#5f1e1e" stroke-width="1.5"/>
  <text x="725" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">session</text>
  <text x="725" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">로그인/로그아웃</text>
  <text x="725" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(환경 설정, 감사)</text>

  <!-- Result -->
  <line x1="440" y1="352" x2="440" y2="372" stroke="#555" stroke-width="2"/>
  <polygon points="435,372 440,382 445,372" fill="#555"/>

  <rect x="300" y="382" width="280" height="50" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">PAM_SUCCESS / PAM_AUTH_ERR</text>
  <text x="440" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">앱에 결과 반환</text>

  <text x="440" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">PAM 덕분에 애플리케이션 코드를 변경하지 않고 인증 방식만 교체 가능</text>
</svg>
