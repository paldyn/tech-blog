<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset rowType 상태 전이</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">행이 생성·수정·삭제될 때 rowType 값이 어떻게 바뀌는지</text>

  <!-- ===== rowType value boxes ===== -->
  <!-- NORMAL (1) -->
  <rect x="60" y="100" width="160" height="70" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">NORMAL</text>
  <text x="140" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#55c555" text-anchor="middle">1</text>
  <text x="140" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">서버에서 조회된 행</text>

  <!-- INSERT (2) -->
  <rect x="260" y="100" width="160" height="70" fill="#1a1a0f" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">INSERT</text>
  <text x="340" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#7ec8e3" text-anchor="middle">2</text>
  <text x="340" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">addRow()로 추가된 행</text>

  <!-- UPDATE (4) -->
  <rect x="460" y="100" width="160" height="70" fill="#1a100f" rx="8" stroke="#e8c85a" stroke-width="1.5"/>
  <text x="540" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8c85a" text-anchor="middle">UPDATE</text>
  <text x="540" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8c85a" text-anchor="middle">4</text>
  <text x="540" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">setColumn()으로 수정된 행</text>

  <!-- DELETE (8) -->
  <rect x="660" y="100" width="160" height="70" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">DELETE</text>
  <text x="740" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e05555" text-anchor="middle">8</text>
  <text x="740" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">deleteRow()로 삭제된 행</text>

  <!-- ===== State transition arrows ===== -->
  <!-- transaction() → NORMAL (all become 1) -->
  <!-- NORMAL → UPDATE (setColumn) -->
  <polygon points="220,200 246,194 246,197 294,197 294,194 320,200 294,206 294,203 246,203 246,206" fill="#e8c85a" stroke="#8a7020" stroke-width="1"/>
  <text x="270" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">setColumn()</text>

  <!-- NORMAL → DELETE (deleteRow) -->
  <path d="M 180 170 Q 180 240 680 240 Q 720 240 720 195" fill="none" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="716,195 724,195 720,175" fill="#e05555"/>
  <text x="440" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">deleteRow() — NORMAL 행은 DELETE(8)로 전환</text>

  <!-- INSERT → (deleteRow = removed, no DELETE) note -->
  <text x="340" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0" text-anchor="middle">↓ deleteRow()</text>
  <text x="340" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0" text-anchor="middle">완전 제거(DELETE 아님)</text>

  <!-- ===== Dataset table example ===== -->
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 상태 테이블 예시</text>

  <!-- Table header -->
  <rect x="100" y="305" width="680" height="28" fill="#1a2a1a"/>
  <text x="160" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">EMP_CD</text>
  <text x="320" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">EMP_NM</text>
  <text x="500" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">rowType</text>
  <text x="700" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">상태</text>

  <!-- Separator lines -->
  <line x1="240" y1="305" x2="240" y2="425" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="305" x2="400" y2="425" stroke="#333" stroke-width="1"/>
  <line x1="600" y1="305" x2="600" y2="425" stroke="#333" stroke-width="1"/>

  <!-- Row 1: NORMAL -->
  <rect x="100" y="333" width="680" height="26" fill="#0d1a0d"/>
  <text x="160" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">E001</text>
  <text x="320" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">김철수</text>
  <text x="500" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">1</text>
  <text x="700" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">NORMAL</text>

  <!-- Row 2: INSERT -->
  <rect x="100" y="359" width="680" height="26" fill="#111"/>
  <text x="160" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">E002</text>
  <text x="320" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">이영희 (신규)</text>
  <text x="500" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">2</text>
  <text x="700" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">INSERT</text>

  <!-- Row 3: UPDATE -->
  <rect x="100" y="385" width="680" height="26" fill="#1a1000"/>
  <text x="160" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">E003</text>
  <text x="320" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c85a" text-anchor="middle">박민준 (수정됨)</text>
  <text x="500" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c85a" text-anchor="middle">4</text>
  <text x="700" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c85a" text-anchor="middle">UPDATE</text>

  <!-- Row 4: DELETE -->
  <rect x="100" y="411" width="680" height="26" fill="#1a0000"/>
  <text x="160" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">E004</text>
  <text x="320" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">최지원 (삭제 대기)</text>
  <text x="500" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">8</text>
  <text x="700" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">DELETE</text>

  <rect x="100" y="305" width="680" height="132" fill="none" rx="4" stroke="#333" stroke-width="1"/>
</svg>
