<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Owner Reference + Finalizer 패턴</text>

  <!-- Parent Resource -->
  <rect x="310" y="74" width="260" height="80" rx="8" fill="#0a1020" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">부모 리소스 (Parent)</text>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예: CustomApp / Deployment</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055" text-anchor="middle">finalizers: ["cleanup.example.com"]</text>

  <!-- Owns arrows to children -->
  <line x1="360" y1="156" x2="210" y2="224" stroke="#7777cc" stroke-width="2" marker-end="url(#arrPurple)"/>
  <line x1="440" y1="156" x2="440" y2="222" stroke="#7777cc" stroke-width="2" marker-end="url(#arrPurple)"/>
  <line x1="520" y1="156" x2="672" y2="224" stroke="#7777cc" stroke-width="2" marker-end="url(#arrPurple)"/>

  <!-- owns labels -->
  <text x="270" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">owns</text>
  <text x="448" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">owns</text>
  <text x="614" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">owns</text>

  <!-- Child 1: ConfigMap -->
  <rect x="100" y="226" width="220" height="70" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">ConfigMap</text>
  <text x="210" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ownerReferences:</text>
  <text x="210" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">- name: parent-app</text>

  <!-- Child 2: Secret -->
  <rect x="330" y="224" width="220" height="70" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Secret</text>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ownerReferences:</text>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">- name: parent-app</text>

  <!-- Child 3: Service -->
  <rect x="560" y="226" width="220" height="70" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Service</text>
  <text x="670" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ownerReferences:</text>
  <text x="670" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">- name: parent-app</text>

  <!-- Divider line -->
  <line x1="60" y1="332" x2="820" y2="332" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">── 삭제 시 Finalizer 동작 순서 ──</text>

  <!-- Deletion flow -->
  <!-- Step A -->
  <rect x="60" y="344" width="180" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="150" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">① 부모 DELETE 요청</text>
  <text x="150" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">deletionTimestamp 설정</text>

  <line x1="242" y1="374" x2="298" y2="374" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step B -->
  <rect x="300" y="344" width="180" height="60" rx="8" fill="#1a1a0a" stroke="#e0a055" stroke-width="1.5"/>
  <text x="390" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0a055" text-anchor="middle">② 컨트롤러 감지</text>
  <text x="390" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Reconcile 호출됨</text>

  <line x1="482" y1="374" x2="538" y2="374" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step C -->
  <rect x="540" y="344" width="180" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">③ 자식 리소스 정리</text>
  <text x="630" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">child 삭제 / 외부 정리</text>

  <!-- Step D -->
  <line x1="630" y1="406" x2="630" y2="432" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="540" y="434" width="180" height="60" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="630" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">④ Finalizer 제거</text>
  <text x="630" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PATCH metadata.finalizers = []</text>

  <line x1="538" y1="464" x2="482" y2="464" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <rect x="300" y="434" width="180" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">⑤ 부모 오브젝트 삭제</text>
  <text x="390" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">etcd에서 완전 제거</text>

  <!-- Note box -->
  <rect x="60" y="434" width="220" height="60" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Owner Reference 자동 GC</text>
  <text x="80" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">부모 삭제 시 자식도 자동 삭제</text>
</svg>
