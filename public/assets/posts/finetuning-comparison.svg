<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }
    </style>
    <linearGradient id="gradPE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2035;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradRAG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2018;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradFT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#200d20;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="20" font-weight="700">세 가지 LLM 적응 전략 비교</text>
  <text x="440" y="68" text-anchor="middle" fill="#666" font-size="13">Prompt Engineering · RAG · Fine-tuning</text>

  <!-- Column headers -->
  <rect x="30" y="88" width="258" height="44" rx="8" fill="url(#gradPE)" stroke="#2a6aa0" stroke-width="1.5"/>
  <text x="159" y="108" text-anchor="middle" fill="#5ab4f5" font-size="14" font-weight="700">프롬프트 엔지니어링</text>
  <text x="159" y="124" text-anchor="middle" fill="#3a7ab5" font-size="11">Prompt Engineering</text>

  <rect x="311" y="88" width="258" height="44" rx="8" fill="url(#gradRAG)" stroke="#2a7a50" stroke-width="1.5"/>
  <text x="440" y="108" text-anchor="middle" fill="#5af5a0" font-size="14" font-weight="700">RAG</text>
  <text x="440" y="124" text-anchor="middle" fill="#3ab570" font-size="11">Retrieval-Augmented Generation</text>

  <rect x="592" y="88" width="258" height="44" rx="8" fill="url(#gradFT)" stroke="#7a2a7a" stroke-width="1.5"/>
  <text x="721" y="108" text-anchor="middle" fill="#f55af5" font-size="14" font-weight="700">파인튜닝</text>
  <text x="721" y="124" text-anchor="middle" fill="#b53ab5" font-size="11">Fine-tuning</text>

  <!-- Row labels -->
  <text x="18" y="168" text-anchor="middle" fill="#888" font-size="11" transform="rotate(-90,18,168)"></text>

  <!-- Row definitions -->
  <!-- Row 1: 핵심 아이디어 -->
  <rect x="14" y="148" width="852" height="58" rx="4" fill="#111"/>
  <text x="26" y="167" fill="#aaa" font-size="11" font-weight="600">핵심 아이디어</text>
  <!-- PE -->
  <text x="159" y="168" text-anchor="middle" fill="#c8e8ff" font-size="12">지시를 정교하게 설계해</text>
  <text x="159" y="185" text-anchor="middle" fill="#c8e8ff" font-size="12">원하는 답을 유도</text>
  <!-- RAG -->
  <text x="440" y="168" text-anchor="middle" fill="#c8ffc8" font-size="12">외부 지식을 실시간 검색해</text>
  <text x="440" y="185" text-anchor="middle" fill="#c8ffc8" font-size="12">프롬프트에 주입</text>
  <!-- FT -->
  <text x="721" y="168" text-anchor="middle" fill="#ffc8ff" font-size="12">도메인 데이터로 모델의</text>
  <text x="721" y="185" text-anchor="middle" fill="#ffc8ff" font-size="12">가중치를 직접 업데이트</text>

  <!-- Dividers between columns -->
  <line x1="288" y1="148" x2="288" y2="206" stroke="#222" stroke-width="1"/>
  <line x1="570" y1="148" x2="570" y2="206" stroke="#222" stroke-width="1"/>

  <!-- Row 2: 모델 변경 여부 -->
  <rect x="14" y="214" width="852" height="58" rx="4" fill="#0d0d0d"/>
  <text x="26" y="233" fill="#aaa" font-size="11" font-weight="600">모델 변경</text>
  <text x="159" y="247" text-anchor="middle" fill="#5ab4f5" font-size="22">✕</text>
  <text x="440" y="247" text-anchor="middle" fill="#5af5a0" font-size="22">✕</text>
  <text x="721" y="247" text-anchor="middle" fill="#f55af5" font-size="22">✓</text>
  <line x1="288" y1="214" x2="288" y2="272" stroke="#222" stroke-width="1"/>
  <line x1="570" y1="214" x2="570" y2="272" stroke="#222" stroke-width="1"/>

  <!-- Row 3: 비용 / 준비 시간 -->
  <rect x="14" y="280" width="852" height="58" rx="4" fill="#111"/>
  <text x="26" y="299" fill="#aaa" font-size="11" font-weight="600">비용 / 준비시간</text>
  <text x="159" y="315" text-anchor="middle" fill="#c8e8ff" font-size="12">거의 없음 / 즉시</text>
  <text x="440" y="308" text-anchor="middle" fill="#c8ffc8" font-size="12">인프라 구축 필요</text>
  <text x="440" y="325" text-anchor="middle" fill="#c8ffc8" font-size="12">(중간 비용)</text>
  <text x="721" y="308" text-anchor="middle" fill="#ffc8ff" font-size="12">GPU 훈련 비용</text>
  <text x="721" y="325" text-anchor="middle" fill="#ffc8ff" font-size="12">(높음 / 수 시간~일)</text>
  <line x1="288" y1="280" x2="288" y2="338" stroke="#222" stroke-width="1"/>
  <line x1="570" y1="280" x2="570" y2="338" stroke="#222" stroke-width="1"/>

  <!-- Row 4: 지식 최신성 -->
  <rect x="14" y="346" width="852" height="58" rx="4" fill="#0d0d0d"/>
  <text x="26" y="365" fill="#aaa" font-size="11" font-weight="600">지식 최신성</text>
  <text x="159" y="380" text-anchor="middle" fill="#c8e8ff" font-size="12">훈련 데이터 기준</text>
  <text x="440" y="380" text-anchor="middle" fill="#c8ffc8" font-size="12">실시간 업데이트 가능</text>
  <text x="721" y="380" text-anchor="middle" fill="#ffc8ff" font-size="12">훈련 시점에 고정</text>
  <line x1="288" y1="346" x2="288" y2="404" stroke="#222" stroke-width="1"/>
  <line x1="570" y1="346" x2="570" y2="404" stroke="#222" stroke-width="1"/>

  <!-- Row 5: 최적 사용 상황 -->
  <rect x="14" y="412" width="852" height="68" rx="4" fill="#111"/>
  <text x="26" y="431" fill="#aaa" font-size="11" font-weight="600">최적 상황</text>
  <text x="159" y="445" text-anchor="middle" fill="#c8e8ff" font-size="11">형식·톤 조정, 작업</text>
  <text x="159" y="460" text-anchor="middle" fill="#c8e8ff" font-size="11">방식 지정, 빠른 실험</text>
  <text x="440" y="445" text-anchor="middle" fill="#c8ffc8" font-size="11">사내 문서, 최신 정보,</text>
  <text x="440" y="460" text-anchor="middle" fill="#c8ffc8" font-size="11">출처 제공이 필요한 경우</text>
  <text x="721" y="445" text-anchor="middle" fill="#ffc8ff" font-size="11">특정 스타일·도메인 언어,</text>
  <text x="721" y="460" text-anchor="middle" fill="#ffc8ff" font-size="11">행동 패턴 자체를 바꿀 때</text>
  <line x1="288" y1="412" x2="288" y2="480" stroke="#222" stroke-width="1"/>
  <line x1="570" y1="412" x2="570" y2="480" stroke="#222" stroke-width="1"/>

  <!-- Bottom note -->
  <text x="440" y="516" text-anchor="middle" fill="#555" font-size="11">세 방법은 상호 배타적이지 않다 — 실무에서는 조합해서 쓰는 경우가 많다</text>
</svg>
