<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="tlArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="tlArrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">MDC의 정체 — 스레드별 ThreadLocal 맵</text>

  <!-- thread 1 -->
  <rect x="60" y="92" width="340" height="180" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">Thread A</text>
  <rect x="80" y="138" width="300" height="46" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="96" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">traceId = <tspan fill="#ce9178">"a1b2c3"</tspan></text>
  <rect x="80" y="194" width="300" height="46" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="96" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">userId  = <tspan fill="#ce9178">"u-77"</tspan></text>

  <!-- thread 2 -->
  <rect x="480" y="92" width="340" height="180" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="500" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">Thread B</text>
  <rect x="500" y="138" width="300" height="46" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="516" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">traceId = <tspan fill="#ce9178">"x9y8z7"</tspan></text>
  <rect x="500" y="194" width="300" height="46" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="516" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">userId  = <tspan fill="#ce9178">"u-12"</tspan></text>

  <text x="60" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">put / get은 현재 스레드의 맵에만 작용 → 스레드끼리 값이 섞이지 않는다</text>
  <text x="60" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">스레드 풀에서 재사용되므로 finally에서 MDC.clear() 필수 — 안 하면 다음 요청에 누수</text>
</svg>
