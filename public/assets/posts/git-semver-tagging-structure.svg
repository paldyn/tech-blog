<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Semantic Versioning 구조</text>

  <!-- SemVer decomposition -->
  <rect x="60" y="70" width="760" height="70" rx="8" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="28" font-weight="700" fill="#55c555" text-anchor="middle">v  1  .  2  .  3  -  rc.1  +  build.42</text>

  <!-- Labels -->
  <text x="160" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">MAJOR</text>
  <text x="340" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">MINOR</text>
  <text x="490" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">PATCH</text>
  <text x="620" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">pre-release</text>
  <text x="760" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">build meta</text>

  <!-- Descriptions -->
  <rect x="60" y="180" width="220" height="80" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="170" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">MAJOR</text>
  <text x="170" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">하위 호환 불가 변경</text>
  <text x="170" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">API 파괴적 변경</text>

  <rect x="300" y="180" width="220" height="80" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="410" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">MINOR</text>
  <text x="410" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">하위 호환 신기능 추가</text>
  <text x="410" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">비파괴적 API 추가</text>

  <rect x="540" y="180" width="220" height="80" rx="6" fill="#0d1a10" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">PATCH</text>
  <text x="650" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">하위 호환 버그 수정</text>
  <text x="650" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기능 변경 없음</text>

  <!-- Examples -->
  <rect x="60" y="285" width="760" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="307" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 버전 올리기 규칙</text>
  <text x="76" y="327" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">v1.2.3 </text>
  <text x="155" y="327" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">→ </text>
  <text x="185" y="327" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">v1.2.4</text>
  <text x="280" y="327" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">   버그 수정</text>
  <text x="76" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">v1.2.3 </text>
  <text x="155" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">→ </text>
  <text x="185" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">v1.3.0</text>
  <text x="280" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">   신기능 추가 (호환)</text>
  <text x="76" y="367" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">v1.2.3 </text>
  <text x="155" y="367" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">→ </text>
  <text x="185" y="367" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">v2.0.0</text>
  <text x="280" y="367" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">   파괴적 변경 (API 호환 불가)</text>
</svg>
