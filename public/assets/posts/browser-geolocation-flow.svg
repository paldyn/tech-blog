<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Geolocation API 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">권한 요청 → 위치 획득 → 오류 처리</text>

  <!-- App -->
  <rect x="60" y="100" width="180" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">앱 코드</text>
  <text x="150" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">getCurrentPosition()</text>

  <!-- Arrow App → Browser -->
  <line x1="240" y1="130" x2="295" y2="130" stroke="#555" stroke-width="1.5"/>
  <polygon points="295,124 307,130 295,136" fill="#555"/>

  <!-- Browser -->
  <rect x="307" y="100" width="180" height="60" rx="8" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="397" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">브라우저</text>
  <text x="397" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">권한 다이얼로그 표시</text>

  <!-- Arrow Browser → OS -->
  <line x1="487" y1="130" x2="543" y2="130" stroke="#555" stroke-width="1.5"/>
  <polygon points="543,124 555,130 543,136" fill="#555"/>

  <!-- OS / HW -->
  <rect x="555" y="100" width="265" height="60" rx="8" fill="#1f1400" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="687" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8b84b">OS / 하드웨어</text>
  <text x="687" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GPS · Wi-Fi · IP 위치</text>

  <!-- Sources row -->
  <text x="440" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">위치 소스 (정확도 순)</text>

  <rect x="60" y="210" width="220" height="50" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">GPS 위성</text>
  <text x="170" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오차 &lt;5m / 배터리 소모↑</text>

  <rect x="330" y="210" width="220" height="50" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Wi-Fi / 셀 타워</text>
  <text x="440" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오차 수십 m~수 km</text>

  <rect x="600" y="210" width="220" height="50" rx="6" fill="#1f1400" stroke="#e8b84b" stroke-width="1"/>
  <text x="710" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8b84b">IP 주소</text>
  <text x="710" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오차 수 km / 실내 가능</text>

  <!-- Divider -->
  <line x1="60" y1="286" x2="820" y2="286" stroke="#222" stroke-width="1"/>

  <!-- GeolocationPosition object -->
  <text x="440" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">GeolocationPosition 객체</text>

  <rect x="60" y="325" width="360" height="100" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="80" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pos.coords.latitude    <text fill="#9aa4b8">// 위도</text></text>
  <text x="80" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pos.coords.longitude   <text fill="#9aa4b8">// 경도</text></text>
  <text x="80" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pos.coords.accuracy    <text fill="#9aa4b8">// 반경(m)</text></text>
  <text x="80" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pos.timestamp          <text fill="#9aa4b8">// Unix ms</text></text>

  <!-- Error codes -->
  <rect x="460" y="325" width="360" height="100" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="480" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">PERMISSION_DENIED   <text fill="#9aa4b8">// 1</text></text>
  <text x="480" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8b84b" xml:space="preserve">POSITION_UNAVAILABLE <text fill="#9aa4b8">// 2</text></text>
  <text x="480" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">TIMEOUT             <text fill="#9aa4b8">// 3</text></text>
  <text x="480" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">err.message  <text fill="#9aa4b8">// 상세 메시지</text></text>

  <!-- Bottom -->
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">HTTPS 또는 localhost에서만 동작 · 사용자 명시적 허가 필수</text>
</svg>
