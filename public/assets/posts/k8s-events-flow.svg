<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Event는 누가 만들고 어디로 가는가</text>

  <!-- emitters -->
  <text x="160" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">이벤트 생산자 (컨트롤러들)</text>

  <rect x="60" y="100" width="200" height="56" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Scheduler</text>
  <text x="160" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">FailedScheduling</text>

  <rect x="60" y="172" width="200" height="56" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">kubelet</text>
  <text x="160" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">Pulled · BackOff · Killing</text>

  <rect x="60" y="244" width="200" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Controller Manager</text>
  <text x="160" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">ScalingReplicaSet</text>

  <rect x="60" y="316" width="200" height="56" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="160" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">HPA · 기타 컨트롤러</text>
  <text x="160" y="359" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">SuccessfulRescale</text>

  <line x1="260" y1="128" x2="330" y2="195" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="260" y1="200" x2="330" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="260" y1="272" x2="330" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="260" y1="344" x2="330" y2="276" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- API server / etcd -->
  <rect x="330" y="150" width="240" height="170" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="450" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">API Server</text>

  <rect x="348" y="196" width="204" height="46" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="450" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">Event 오브젝트</text>
  <text x="450" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">일반 리소스처럼 etcd에 저장</text>

  <rect x="348" y="252" width="204" height="50" rx="4" fill="#200f10" stroke="#e05555" stroke-width="1"/>
  <text x="450" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">기본 보관 1시간 (TTL)</text>
  <text x="450" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">--event-ttl=1h — 지나면 영구 소실</text>

  <line x1="570" y1="200" x2="640" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="570" y1="270" x2="640" y2="310" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- consumers -->
  <text x="730" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">소비자</text>

  <rect x="640" y="130" width="180" height="64" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">kubectl describe</text>
  <text x="730" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">kubectl events</text>

  <rect x="640" y="280" width="180" height="64" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="730" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">이벤트 익스포터</text>
  <text x="730" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Loki · Slack 등으로 영구 보존</text>

  <!-- bottom -->
  <rect x="60" y="410" width="760" height="64" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Event = 컨트롤러들이 남기는 "행동 기록"</text>
  <text x="440" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">앱 로그에는 없는 인프라 레벨의 사연 — 스케줄 실패, 이미지 풀, 프로브 실패, 축출 — 이 모두 여기에 남는다</text>
</svg>
