<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="aAny" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="aUni" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Anycast vs Unicast — CDN DNS 라우팅</text>

  <!-- ========= Anycast (left half) ========= -->
  <text x="220" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Anycast (CDN 방식)</text>

  <!-- Same IP for all PoPs -->
  <text x="220" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동일 IP: 1.2.3.4 → BGP로 가장 가까운 PoP</text>

  <!-- PoPs with same IP -->
  <rect x="30" y="122" width="130" height="44" rx="6" fill="#091b0e" stroke="#1a6030" stroke-width="1.5"/>
  <text x="95" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">PoP 서울  1.2.3.4</text>

  <rect x="180" y="122" width="130" height="44" rx="6" fill="#091b0e" stroke="#1a6030" stroke-width="1.5"/>
  <text x="245" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">PoP 도쿄  1.2.3.4</text>

  <rect x="30" y="190" width="130" height="44" rx="6" fill="#091b0e" stroke="#1a6030" stroke-width="1.5"/>
  <text x="95" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">PoP 뉴욕  1.2.3.4</text>

  <rect x="180" y="190" width="130" height="44" rx="6" fill="#091b0e" stroke="#1a6030" stroke-width="1.5"/>
  <text x="245" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">PoP 런던  1.2.3.4</text>

  <!-- User Seoul -->
  <rect x="90" y="275" width="130" height="44" rx="6" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="155" y="301" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">사용자 (서울)</text>

  <!-- Arrow user → nearest PoP -->
  <line x1="130" y1="275" x2="100" y2="166" stroke="#55c555" stroke-width="2" marker-end="url(#aAny)"/>
  <text x="98" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">자동 최근접</text>

  <!-- BGP note -->
  <rect x="30" y="340" width="380" height="56" rx="6" fill="#0a1a0a" stroke="#1a3a1a" stroke-width="1"/>
  <text x="220" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BGP가 동일 IP를 여러 PoP에 광고 (Anycast)</text>
  <text x="220" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">라우터가 자동으로 가장 짧은 경로 PoP 선택</text>

  <!-- ========= Unicast (right half) ========= -->
  <line x1="440" y1="70" x2="440" y2="400" stroke="#1a2a1a" stroke-width="1"/>
  <text x="660" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">Unicast (일반 DNS 방식)</text>

  <text x="660" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 PoP는 고유 IP → DNS가 적절한 IP 반환</text>

  <rect x="470" y="122" width="130" height="44" rx="6" fill="#1a0c0c" stroke="#5a1a1a" stroke-width="1.5"/>
  <text x="535" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">PoP 서울  5.5.5.1</text>

  <rect x="620" y="122" width="130" height="44" rx="6" fill="#1a0c0c" stroke="#5a1a1a" stroke-width="1.5"/>
  <text x="685" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">PoP 도쿄  5.5.5.2</text>

  <rect x="470" y="190" width="130" height="44" rx="6" fill="#1a0c0c" stroke="#5a1a1a" stroke-width="1.5"/>
  <text x="535" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">PoP 뉴욕  5.5.5.3</text>

  <rect x="620" y="190" width="130" height="44" rx="6" fill="#1a0c0c" stroke="#5a1a1a" stroke-width="1.5"/>
  <text x="685" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">PoP 런던  5.5.5.4</text>

  <!-- User Seoul -->
  <rect x="530" y="275" width="130" height="44" rx="6" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="595" y="301" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">사용자 (서울)</text>

  <!-- Arrow user → PoP via DNS -->
  <line x1="566" y1="275" x2="520" y2="166" stroke="#e05555" stroke-width="2" marker-end="url(#aUni)"/>
  <text x="530" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">DNS → 5.5.5.1</text>

  <!-- DNS note -->
  <rect x="455" y="340" width="390" height="56" rx="6" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="650" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DNS 기반 지오 라우팅 (GeoDNS)</text>
  <text x="650" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">클라이언트 IP 위치로 DNS 서버가 IP 선택</text>
</svg>
