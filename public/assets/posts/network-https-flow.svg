<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HTTPS = HTTP over TLS</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">TCP 연결 → TLS 핸드셰이크 → HTTP 요청/응답</text>

  <defs>
    <marker id="httpsR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="httpsL" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 13 0 L 0 7 L 13 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 클라이언트 / 서버 -->
  <rect x="60" y="88" width="160" height="44" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">클라이언트</text>
  <rect x="660" y="88" width="160" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">서버 (:443)</text>

  <line x1="140" y1="132" x2="140" y2="410" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="740" y1="132" x2="740" y2="410" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Phase 1: TCP -->
  <rect x="220" y="136" width="340" height="22" rx="4" fill="#1a1500" stroke="#e8c44a" stroke-width="1" opacity="0.6"/>
  <text x="390" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c44a">Phase 1: TCP 3-Way Handshake</text>

  <line x1="140" y1="172" x2="740" y2="172" stroke="#e8c44a" stroke-width="1.5" marker-end="url(#httpsR)"/>
  <text x="390" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">SYN</text>
  <line x1="740" y1="188" x2="140" y2="188" stroke="#e8c44a" stroke-width="1.5" marker-end="url(#httpsL)"/>
  <text x="390" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">SYN-ACK</text>
  <line x1="140" y1="204" x2="740" y2="204" stroke="#e8c44a" stroke-width="1.5" marker-end="url(#httpsR)"/>
  <text x="390" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ACK</text>

  <!-- Phase 2: TLS -->
  <rect x="220" y="216" width="340" height="22" rx="4" fill="#1a0d2a" stroke="#7777cc" stroke-width="1" opacity="0.6"/>
  <text x="390" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Phase 2: TLS 1.3 핸드셰이크 (1-RTT)</text>

  <line x1="140" y1="256" x2="740" y2="256" stroke="#7777cc" stroke-width="1.5" marker-end="url(#httpsR)"/>
  <text x="390" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ClientHello (key_share, SNI: example.com)</text>
  <line x1="740" y1="290" x2="140" y2="290" stroke="#7777cc" stroke-width="1.5" marker-end="url(#httpsL)"/>
  <text x="390" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ServerHello + {Certificate + Finished}</text>
  <line x1="140" y1="318" x2="740" y2="318" stroke="#7777cc" stroke-width="1.5" marker-end="url(#httpsR)"/>
  <text x="390" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">Finished</text>

  <!-- Phase 3: HTTP -->
  <rect x="220" y="328" width="340" height="22" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1" opacity="0.6"/>
  <text x="390" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Phase 3: 암호화된 HTTP 통신</text>

  <line x1="140" y1="368" x2="740" y2="368" stroke="#55c555" stroke-width="1.5" marker-end="url(#httpsR)"/>
  <text x="390" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">GET / HTTP/1.1 (암호화됨)</text>
  <line x1="740" y1="392" x2="140" y2="392" stroke="#55c555" stroke-width="1.5" marker-end="url(#httpsL)"/>
  <text x="390" y="387" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">HTTP/1.1 200 OK + Body (암호화됨)</text>

  <!-- 포트 정보 -->
  <rect x="60" y="420" width="760" height="28" rx="6" fill="#111"/>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HTTP: TCP 80 (평문)  ·  HTTPS: TCP 443 (TLS)  ·  HTTP/3: UDP 443 (QUIC)</text>
</svg>
