<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L0,10 L12,5 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrRed" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L0,10 L12,5 Z" fill="#e05a5a"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP &#xC694;&#xCCAD; &#xC2A4;&#xBA38;&#xAE00;&#xB9C1; &#xACF5;&#xACA9;</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#9aa4b8" text-anchor="middle">HTTP Request Smuggling Attack</text>

  <!-- Architecture flow -->
  <!-- Attacker -->
  <rect x="30" y="100" width="130" height="60" rx="8" fill="#1a0808" stroke="#e05a5a" stroke-width="1.5"/>
  <text x="95" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05a5a" text-anchor="middle">&#x1F608; &#xACF5;&#xACA9;&#xC790;</text>
  <text x="95" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">Attacker</text>

  <!-- Arrow to Frontend -->
  <line x1="160" y1="130" x2="226" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="193" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#9aa4b8" text-anchor="middle">HTTP/1.1</text>

  <!-- Frontend Nginx -->
  <rect x="238" y="100" width="160" height="60" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="318" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">&#xD504;&#xB860;&#xD2B8; &#xD504;&#xB85D;&#xC2DC;</text>
  <text x="318" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">Nginx</text>
  <text x="318" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">Content-Length &#xAE30;&#xC900;</text>

  <!-- Arrow with conflict notice -->
  <line x1="398" y1="130" x2="462" y2="130" stroke="#e05a5a" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrRed)"/>
  <text x="430" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05a5a" text-anchor="middle">&#x26A0; &#xCDA9;&#xB3CC;</text>

  <!-- Backend Node.js -->
  <rect x="474" y="100" width="160" height="60" rx="8" fill="#0f1520" stroke="#d4c027" stroke-width="1.5"/>
  <text x="554" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#d4c027" text-anchor="middle">&#xBC31;&#xC5D4;&#xB4DC; &#xC11C;&#xBC84;</text>
  <text x="554" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">Node.js</text>
  <text x="554" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">Transfer-Encoding &#xAE30;&#xC900;</text>

  <!-- Conflict explanation box -->
  <rect x="238" y="176" width="396" height="44" rx="6" fill="#1a0808" stroke="#e05a5a" stroke-width="1"/>
  <text x="436" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05a5a" text-anchor="middle">CL-TE &#xCDA9;&#xB3CC;: &#xD504;&#xB860;&#xD2B8;&#xC640; &#xBC31;&#xC5D4;&#xB4DC;&#xAC00; &#xC694;&#xCCAD; &#xACBD;&#xACC4;&#xB97C; &#xB2E4;&#xB974;&#xAC8C; &#xD574;&#xC11D;</text>
  <text x="436" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">Content-Length (&#xD504;&#xB860;&#xD2B8;) vs Transfer-Encoding: chunked (&#xBC31;&#xC5D4;&#xB4DC;)</text>

  <!-- Code box: smuggled request -->
  <rect x="30" y="236" width="820" height="218" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="30" y="236" width="820" height="32" rx="8" fill="#0f1929"/>
  <rect x="30" y="252" width="820" height="16" fill="#0f1929"/>
  <circle cx="54" cy="252" r="5" fill="#e05a5a"/>
  <circle cx="72" cy="252" r="5" fill="#d4c027"/>
  <circle cx="90" cy="252" r="5" fill="#4ec94e"/>
  <text x="440" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">smuggled-request.http</text>

  <text x="58" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">POST</tspan><tspan fill="#ffffff"> / HTTP/1.1</tspan></text>
  <text x="58" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Host: example.com</tspan></text>
  <text x="58" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Length</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">13</tspan></text>
  <text x="58" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Transfer-Encoding</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">chunked</tspan></text>
  <text x="58" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff"> </tspan></text>
  <text x="58" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">0</tspan></text>
  <text x="58" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff"> </tspan></text>
  <text x="58" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">GET</tspan><tspan fill="#ffffff"> /admin HTTP/1.1</tspan><tspan fill="#9aa4b8">  &#x2190; &#xBC00;&#xC218; &#xC694;&#xCCAD; &#xC2A4;&#xBA38;&#xAE00;&#xB9C1;</tspan></text>

  <!-- Footer -->
  <line x1="30" y1="492" x2="850" y2="492" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="510" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555e77" text-anchor="middle">HTTP Request Smuggling – CWE-444 (Inconsistent HTTP Request Interpretation)</text>
</svg>
