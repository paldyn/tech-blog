<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="cr-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클러스터 PKI — CA가 뿌리, 인증서가 가지</text>

  <!-- root CA -->
  <rect x="320" y="86" width="240" height="64" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Kubernetes CA</text>
  <text x="440" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">ca.crt / ca.key (장수)</text>

  <!-- leaf certs row -->
  <rect x="50" y="220" width="180" height="80" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">apiserver</text>
  <text x="140" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서버 인증서</text>
  <text x="140" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">클라이언트들이 신뢰</text>

  <rect x="250" y="220" width="180" height="80" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">etcd</text>
  <text x="340" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">peer · server · client</text>
  <text x="340" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">별도 etcd CA 가능</text>

  <rect x="450" y="220" width="180" height="80" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="540" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">controller·scheduler</text>
  <text x="540" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">kubeconfig 내 인증서</text>
  <text x="540" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">API 서버에 접속</text>

  <rect x="650" y="220" width="180" height="80" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="740" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">kubelet</text>
  <text x="740" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">클라이언트 인증서</text>
  <text x="740" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자동 갱신 지원</text>

  <line x1="380" y1="150" x2="140" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#cr-arr)"/>
  <line x1="420" y1="150" x2="340" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#cr-arr)"/>
  <line x1="460" y1="150" x2="540" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#cr-arr)"/>
  <line x1="500" y1="150" x2="740" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#cr-arr)"/>

  <!-- bottom note -->
  <rect x="50" y="340" width="380" height="64" rx="8" fill="#2a1416" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">리프 인증서 — 기본 유효기간 1년</text>
  <text x="240" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">갱신을 잊으면 만료 → API 통신 마비</text>

  <rect x="450" y="340" width="380" height="64" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">CA 인증서 — 보통 10년</text>
  <text x="640" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CA 교체는 훨씬 무거운 작업(별도 절차)</text>
</svg>
