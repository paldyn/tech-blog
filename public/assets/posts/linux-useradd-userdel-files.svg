<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">/etc/passwd 필드 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">콜론(:)으로 구분된 7개 필드</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#3a4a6e" stroke-width="1"/>

  <!-- passwd file line example -->
  <rect x="60" y="98" width="760" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">/etc/passwd (한 줄 예시)</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#ce9178">alice</tspan>:<tspan fill="#b5cea8">x</tspan>:<tspan fill="#7ec8e3">1001</tspan>:<tspan fill="#7777cc">1001</tspan>:<tspan fill="#55c555">Alice Kim</tspan>:<tspan fill="#9aa4b8">/home/alice</tspan>:<tspan fill="#e05555">/bin/bash</tspan></text>

  <!-- Field breakdown boxes -->
  <!-- Field 1: username -->
  <rect x="60" y="168" width="100" height="54" rx="6" fill="#1a0d0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="110" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#ce9178" xml:space="preserve">alice</text>
  <text x="110" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">사용자명</text>

  <!-- Field 2: password -->
  <rect x="168" y="168" width="80" height="54" rx="6" fill="#12192a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="208" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#b5cea8" xml:space="preserve">x</text>
  <text x="208" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">비밀번호</text>
  <text x="208" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" xml:space="preserve">(shadow)</text>

  <!-- Field 3: UID -->
  <rect x="256" y="168" width="100" height="54" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="306" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7ec8e3" xml:space="preserve">1001</text>
  <text x="306" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">UID</text>

  <!-- Field 4: GID -->
  <rect x="364" y="168" width="100" height="54" rx="6" fill="#12112a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="414" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7777cc" xml:space="preserve">1001</text>
  <text x="414" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">GID (기본 그룹)</text>

  <!-- Field 5: GECOS -->
  <rect x="472" y="168" width="110" height="54" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="527" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" font-weight="700" fill="#55c555" xml:space="preserve">Alice Kim</text>
  <text x="527" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">GECOS (코멘트)</text>

  <!-- Field 6: home -->
  <rect x="590" y="168" width="120" height="54" rx="6" fill="#12192a" stroke="#888" stroke-width="1"/>
  <text x="650" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">/home/alice</text>
  <text x="650" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">홈 디렉터리</text>

  <!-- Field 7: shell -->
  <rect x="718" y="168" width="102" height="54" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="769" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" font-weight="700" fill="#e05555" xml:space="preserve">/bin/bash</text>
  <text x="769" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">로그인 셸</text>

  <!-- Related files table -->
  <text x="440" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" xml:space="preserve">관련 설정 파일</text>

  <rect x="60" y="260" width="760" height="40" rx="6" fill="#12192a"/>
  <text x="200" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">파일</text>
  <text x="500" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">내용</text>
  <line x1="340" y1="260" x2="340" y2="300" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="60" y="300" width="760" height="36" fill="#0d1520"/>
  <text x="200" y="323" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">/etc/passwd</text>
  <text x="500" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">사용자 기본 정보 (모두 읽기 가능)</text>
  <line x1="340" y1="300" x2="340" y2="336" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="60" y="336" width="760" height="36" fill="#0a0a0a"/>
  <text x="200" y="359" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">/etc/shadow</text>
  <text x="500" y="359" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">해시된 비밀번호 (root만 읽기)</text>
  <line x1="340" y1="336" x2="340" y2="372" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="60" y="372" width="760" height="36" fill="#0d1520"/>
  <text x="200" y="395" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" xml:space="preserve">/etc/group</text>
  <text x="500" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">그룹 정보 및 멤버 목록</text>
  <line x1="340" y1="372" x2="340" y2="408" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="60" y="260" width="760" height="148" rx="6" fill="none" stroke="#3a4a6e" stroke-width="1"/>
</svg>
