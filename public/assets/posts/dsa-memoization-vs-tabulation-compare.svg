<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">메모이제이션 vs 타뷸레이션</text>

  <!-- Left Column: Memoization -->
  <rect x="50" y="70" width="360" height="440" fill="#111" rx="10" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">Top-Down (메모이제이션)</text>
  <text x="230" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">재귀 + 캐시</text>

  <!-- Call tree nodes for fib(4) -->
  <rect x="195" y="138" width="70" height="30" fill="#1a2a3a" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">fib(4)</text>

  <!-- fib(3) and fib(2) level -->
  <rect x="130" y="195" width="70" height="30" fill="#1a2a3a" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="165" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">fib(3)</text>

  <rect x="260" y="195" width="70" height="30" fill="#1a3a2a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="295" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">fib(2)✓</text>

  <!-- Arrows from fib(4) -->
  <line x1="210" y1="168" x2="185" y2="193" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="250" y1="168" x2="275" y2="193" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- fib(2) and fib(1) from fib(3) -->
  <rect x="80" y="252" width="70" height="30" fill="#1a3a2a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="115" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">fib(2)✓</text>

  <rect x="180" y="252" width="70" height="30" fill="#1a2a3a" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="215" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">fib(1)</text>

  <!-- Arrows from fib(3) -->
  <line x1="150" y1="225" x2="130" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="180" y1="225" x2="200" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Legend -->
  <rect x="90" y="305" width="14" height="14" fill="#1a3a2a" rx="2" stroke="#55c555" stroke-width="1"/>
  <text x="112" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">캐시 히트 (재계산 생략)</text>
  <rect x="90" y="325" width="14" height="14" fill="#1a2a3a" rx="2" stroke="#7ec8e3" stroke-width="1"/>
  <text x="112" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">실제 계산</text>

  <!-- Code box memoization -->
  <rect x="70" y="355" width="320" height="136" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="86" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 메모이제이션</text>
  <text x="86" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">memo = {}</text>
  <text x="86" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def fib(n):</text>
  <text x="86" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    if n in memo: return memo[n]</text>
  <text x="86" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    if n &lt;= 1: return n</text>
  <text x="86" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    memo[n] = fib(n-1)+fib(n-2)</text>
  <text x="86" y="482" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    return memo[n]</text>

  <!-- Right Column: Tabulation -->
  <rect x="470" y="70" width="360" height="440" fill="#111" rx="10" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">Bottom-Up (타뷸레이션)</text>
  <text x="650" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반복문 + 테이블</text>

  <!-- DP table cells -->
  <text x="490" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dp 배열:</text>

  <!-- index labels -->
  <text x="530" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">0</text>
  <text x="580" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1</text>
  <text x="630" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">2</text>
  <text x="680" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">3</text>
  <text x="730" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">4</text>
  <text x="790" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">5</text>

  <!-- Step 1: base cases -->
  <text x="490" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Step 1 (기저):</text>
  <rect x="515" y="160" width="40" height="34" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="535" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">0</text>
  <rect x="565" y="160" width="40" height="34" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="585" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">1</text>
  <rect x="615" y="160" width="40" height="34" fill="#1a2a1a" rx="4" stroke="#3a4a3a" stroke-width="1"/>
  <text x="635" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">?</text>
  <rect x="665" y="160" width="40" height="34" fill="#1a2a1a" rx="4" stroke="#3a4a3a" stroke-width="1"/>
  <text x="685" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">?</text>
  <rect x="715" y="160" width="40" height="34" fill="#1a2a1a" rx="4" stroke="#3a4a3a" stroke-width="1"/>
  <text x="735" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">?</text>
  <rect x="775" y="160" width="40" height="34" fill="#1a2a1a" rx="4" stroke="#3a4a3a" stroke-width="1"/>
  <text x="795" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">?</text>

  <!-- Step 2 -->
  <text x="490" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Step 2 (i=2):</text>
  <rect x="515" y="208" width="40" height="34" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="535" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">0</text>
  <rect x="565" y="208" width="40" height="34" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="585" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">1</text>
  <rect x="615" y="208" width="40" height="34" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">1</text>
  <rect x="665" y="208" width="40" height="34" fill="#1a2a1a" rx="4" stroke="#3a4a3a" stroke-width="1"/>
  <text x="685" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">?</text>
  <rect x="715" y="208" width="40" height="34" fill="#1a2a1a" rx="4" stroke="#3a4a3a" stroke-width="1"/>
  <text x="735" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">?</text>
  <rect x="775" y="208" width="40" height="34" fill="#1a2a1a" rx="4" stroke="#3a4a3a" stroke-width="1"/>
  <text x="795" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">?</text>

  <!-- Step final -->
  <text x="490" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">완료 (i=5):</text>
  <rect x="515" y="256" width="40" height="34" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="535" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">0</text>
  <rect x="565" y="256" width="40" height="34" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="585" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">1</text>
  <rect x="615" y="256" width="40" height="34" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">1</text>
  <rect x="665" y="256" width="40" height="34" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="685" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">2</text>
  <rect x="715" y="256" width="40" height="34" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="735" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">3</text>
  <rect x="775" y="256" width="40" height="34" fill="#2a4a2a" rx="4" stroke="#77dd77" stroke-width="2"/>
  <text x="795" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#77dd77">5</text>

  <!-- Bottom-up arrows -->
  <line x1="555" y1="273" x2="613" y2="273" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="605" y1="273" x2="613" y2="273" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Code box tabulation -->
  <rect x="490" y="305" width="320" height="136" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 타뷸레이션</text>
  <text x="506" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def fib(n):</text>
  <text x="506" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp = [0]*(n+1)</text>
  <text x="506" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp[1] = 1</text>
  <text x="506" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for i in range(2, n+1):</text>
  <text x="506" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        dp[i]=dp[i-1]+dp[i-2]</text>
  <text x="506" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    return dp[n]</text>

  <!-- Comparison bottom bar -->
  <rect x="50" y="458" width="780" height="40" fill="#111" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="483" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">메모이제이션: 필요한 부분만 계산, 스택 오버플로 위험</text>
  <text x="650" y="483" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">타뷸레이션: 전체 채움, O(n) 공간·오버헤드 없음</text>
</svg>
