<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">낙관적 UI — 서버 응답 전 즉시 반영</text>

  <!-- Timeline labels -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">시간 →</text>

  <!-- Without optimistic -->
  <text x="60" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">일반 방식 (서버 응답 대기)</text>

  <rect x="60" y="120" width="100" height="40" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="110" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클릭</text>

  <rect x="180" y="120" width="160" height="40" rx="6" fill="#2a1a1a" stroke="#5a2a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="260" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">대기... (500ms~)</text>

  <rect x="360" y="120" width="120" height="40" rx="6" fill="#1a2a1a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="420" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">UI 업데이트</text>

  <line x1="160" y1="140" x2="180" y2="140" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="140" x2="360" y2="140" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- With optimistic -->
  <text x="60" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">낙관적 UI (useOptimistic)</text>

  <rect x="60" y="208" width="100" height="40" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="110" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클릭</text>

  <rect x="180" y="208" width="120" height="40" rx="6" fill="#1a2a1a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="240" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">즉시 반영 ✓</text>

  <rect x="320" y="208" width="120" height="40" rx="6" fill="#0f1a2e" stroke="#2a4a7e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="380" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">서버 처리 중...</text>

  <rect x="460" y="208" width="140" height="40" rx="6" fill="#1a2a1a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="530" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">실제 데이터 확정</text>

  <line x1="160" y1="228" x2="180" y2="228" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="300" y1="228" x2="320" y2="228" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="228" x2="460" y2="228" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Rollback case -->
  <text x="60" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a030">서버 오류 시 롤백</text>

  <rect x="60" y="292" width="120" height="40" rx="6" fill="#1a2a1a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="120" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">즉시 반영</text>

  <rect x="200" y="292" width="120" height="40" rx="6" fill="#0f1a2e" stroke="#2a4a7e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="260" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">서버 오류 발생</text>

  <rect x="340" y="292" width="140" height="40" rx="6" fill="#2a1a1a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="410" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">원래 상태로 복원</text>

  <line x1="180" y1="312" x2="200" y2="312" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="312" x2="340" y2="312" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Code box -->
  <text x="60" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">useOptimistic 시그니처</text>
  <rect x="60" y="380" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [optimisticState, addOptimistic] = useOptimistic(state, updateFn)</tspan>
  </text>
</svg>
