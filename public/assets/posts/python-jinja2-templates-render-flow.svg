<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">템플릿 + 데이터 → HTML</text>

  <defs>
    <marker id="j2ar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="92" width="250" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="185" y="116" font-size="13" fill="#9aa4b8" text-anchor="middle">템플릿 (.html)</text>
  <text x="76" y="146" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ce9178">&lt;h1&gt;</tspan>{{ name }}<tspan fill="#ce9178">&lt;/h1&gt;</tspan></text>
  <text x="76" y="174" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">{% <tspan fill="#7ec8e3" font-weight="600">for</tspan> b <tspan fill="#7ec8e3" font-weight="600">in</tspan> items %}...</text>

  <rect x="60" y="206" width="250" height="56" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="185" y="230" font-size="13" fill="#9aa4b8" text-anchor="middle">데이터 (context)</text>
  <text x="76" y="252" font-size="12" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">{name: "책", items: [...]}</text>

  <path d="M 310 158 Q 380 158 380 175 L 380 200" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 310 234 Q 380 234 380 215 L 380 192" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="390" y1="177" x2="470" y2="177" stroke="#7ec8e3" stroke-width="2" marker-end="url(#j2ar)"/>
  <text x="430" y="160" font-size="11" fill="#9aa4b8" text-anchor="middle">render</text>

  <rect x="474" y="100" width="346" height="92" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="647" y="124" font-size="13" fill="#55c555" text-anchor="middle">완성된 HTML</text>
  <text x="490" y="152" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ce9178">&lt;h1&gt;</tspan>책<tspan fill="#ce9178">&lt;/h1&gt;</tspan></text>
  <text x="490" y="178" font-size="13" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 값이 채워져 브라우저로</text>
</svg>
