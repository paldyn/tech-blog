<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">PluralRules · DisplayNames · ListFormat</text>

  <!-- PluralRules 박스 -->
  <rect x="60" y="72" width="360" height="140" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="240" y="97" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">Intl.PluralRules</text>

  <text x="80" y="120" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">범주</text>
  <text x="160" y="120" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">zero · one · two · few · many · other</text>
  <text x="80" y="142" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">한국어</text>
  <text x="160" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">항상 'other' (복수형 없음)</text>
  <text x="80" y="164" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">영어</text>
  <text x="160" y="164" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">1→'one', 2+→'other'</text>
  <text x="80" y="186" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">아랍어</text>
  <text x="160" y="186" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">zero/one/two/few/many/other 모두 사용</text>

  <!-- DisplayNames 박스 -->
  <rect x="460" y="72" width="360" height="140" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="640" y="97" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">Intl.DisplayNames</text>

  <text x="480" y="120" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">type: 'language'</text>
  <text x="620" y="120" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'en' → '영어'</text>
  <text x="480" y="142" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">type: 'region'</text>
  <text x="620" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'KR' → '대한민국'</text>
  <text x="480" y="164" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">type: 'currency'</text>
  <text x="620" y="164" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'USD' → '미국 달러'</text>
  <text x="480" y="186" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">type: 'script'</text>
  <text x="620" y="186" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'Kore' → '한국 문자'</text>

  <!-- 코드 블록 -->
  <rect x="60" y="236" width="760" height="214" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="262" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// PluralRules — 복수형 메시지 선택</text>
  <text x="80" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> pr = new Intl.PluralRules(</tspan><tspan fill="#ce9178">'en'</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="80" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> msgs = { one: </tspan><tspan fill="#ce9178">'1 item'</tspan><tspan fill="#ffffff">, other: </tspan><tspan fill="#ce9178">'# items'</tspan><tspan fill="#ffffff"> };</tspan></text>

  <text x="80" y="316" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">msgs[pr.select(</text>
  <text x="196" y="316" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">3</text>
  <text x="204" y="316" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">)].replace(</text>
  <text x="308" y="316" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'#'</text>
  <text x="334" y="316" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, </text>
  <text x="350" y="316" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">3</text>
  <text x="358" y="316" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">); </text>
  <text x="400" y="316" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// '3 items'</text>
  <text x="80" y="346" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// DisplayNames</text>
  <text x="80" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> dn = new Intl.DisplayNames([</tspan><tspan fill="#ce9178">'ko'</tspan><tspan fill="#ffffff">], { type: </tspan><tspan fill="#ce9178">'language'</tspan><tspan fill="#ffffff"> });</tspan></text>

  <text x="80" y="382" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">dn.of(</text>
  <text x="128" y="382" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'en'</text>
  <text x="160" y="382" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">); </text>
  <text x="188" y="382" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// '영어'</text>
  <text x="300" y="382" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">dn.of(</text>
  <text x="348" y="382" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'fr'</text>
  <text x="380" y="382" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">); </text>
  <text x="408" y="382" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// '프랑스어'</text>
  <text x="80" y="412" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// ListFormat</text>
  <text x="80" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">new Intl.ListFormat(</tspan><tspan fill="#ce9178">'ko'</tspan><tspan fill="#ffffff">, { type: </tspan><tspan fill="#ce9178">'conjunction'</tspan><tspan fill="#ffffff"> }).format([</tspan><tspan fill="#ce9178">'A','B','C'</tspan><tspan fill="#ffffff">]);</tspan></text>

  <text x="80" y="448" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// → 'A, B, C'</text>
</svg>
