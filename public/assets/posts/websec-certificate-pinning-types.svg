<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Certificate Pinning 구현 방식 비교</text>

  <!-- Column Headers -->
  <text x="150" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">Static Pinning</text>
  <text x="440" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">Dynamic Pinning (HPKP)</text>
  <text x="730" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Cert Transparency (CT)</text>

  <!-- Dividers -->
  <line x1="290" y1="65" x2="290" y2="440" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="580" y1="65" x2="580" y2="440" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Static Pinning -->
  <!-- Code block -->
  <rect x="60" y="95" width="210" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Android</text>
  <text x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">val pins = PinSet(</text>
  <text x="76" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  pins = setOf(</text>
  <text x="76" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    "sha256/abc123..."</text>
  <text x="76" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  ))</text>

  <!-- Static pros/cons -->
  <rect x="60" y="222" width="210" height="54" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 오프라인 동작, 배포 즉시 적용</text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 외부 의존 없음</text>

  <rect x="60" y="286" width="210" height="54" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">- 인증서 교체 시 앱 업데이트</text>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">- 핀 만료 = 서비스 중단 위험</text>

  <rect x="60" y="350" width="210" height="36" rx="6" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="165" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">모바일 앱, 내부 서비스에 적합</text>

  <!-- Dynamic Pinning (HPKP) -->
  <rect x="305" y="95" width="260" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="321" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># HPKP 응답 헤더</text>
  <text x="321" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Public-Key-Pins:</text>
  <text x="321" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  pin-sha256="abc...";</text>
  <text x="321" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  pin-sha256="bak...";</text>
  <text x="321" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">  max-age=2592000</text>

  <rect x="305" y="222" width="260" height="54" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="325" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 앱 재배포 없이 업데이트 가능</text>
  <text x="325" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 백업 핀 지원</text>

  <rect x="305" y="286" width="260" height="70" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="325" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">- 잘못 설정 시 사이트 영구 차단</text>
  <text x="325" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">- Chrome 2018, Firefox 2020 제거</text>
  <text x="325" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">- 사실상 deprecated</text>

  <rect x="305" y="366" width="260" height="36" rx="6" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="435" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">레거시 참고용, 신규 배포 비권장</text>

  <!-- CT (Certificate Transparency) -->
  <rect x="595" y="95" width="225" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="611" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># nginx CT 설정</text>
  <text x="611" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ssl_ct on;</text>
  <text x="611" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ssl_ct_static_scts</text>
  <text x="611" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  /etc/nginx/scts/;</text>
  <text x="611" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># SCT 포함 강제</text>

  <rect x="595" y="222" width="225" height="70" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="615" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 공개 로그 기반 투명성</text>
  <text x="615" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ 불법 발급 인증서 빠른 탐지</text>
  <text x="615" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">+ Chrome 필수 요구사항</text>

  <rect x="595" y="302" width="225" height="54" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="615" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">- 모든 인증서 공개 (도메인 노출)</text>
  <text x="615" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">- 실시간 차단 아닌 사후 감지</text>

  <rect x="595" y="366" width="225" height="36" rx="6" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="707" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">퍼블릭 웹사이트 표준, 감사용</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현대 권장: Static SPKI Pinning (모바일) + Certificate Transparency (웹) 조합</text>
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HPKP는 deprecated — 신규 구현에 사용하지 않는다</text>
</svg>
