<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">open() 모드 완전 정리</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">파일을 어떻게 열 것인가: 읽기·쓰기·추가·이진 모드의 조합</text>

  <!-- Mode table header -->
  <rect x="60" y="100" width="760" height="36" rx="6" fill="#1a2a4a"/>
  <text x="130" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">모드</text>
  <text x="240" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">의미</text>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">파일 없으면?</text>
  <text x="620" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">기존 내용?</text>

  <!-- Row 1: r -->
  <rect x="60" y="136" width="760" height="36" rx="0" fill="#111827"/>
  <text x="130" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">'r'</text>
  <text x="240" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">읽기 전용 (기본값)</text>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">FileNotFoundError</text>
  <text x="620" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">유지</text>

  <!-- Row 2: w -->
  <rect x="60" y="172" width="760" height="36" rx="0" fill="#0f1520"/>
  <text x="130" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">'w'</text>
  <text x="240" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">쓰기 전용</text>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">자동 생성</text>
  <text x="620" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">덮어씀 (삭제)</text>

  <!-- Row 3: a -->
  <rect x="60" y="208" width="760" height="36" rx="0" fill="#111827"/>
  <text x="130" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">'a'</text>
  <text x="240" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">추가 (append)</text>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">자동 생성</text>
  <text x="620" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">끝에 추가</text>

  <!-- Row 4: x -->
  <rect x="60" y="244" width="760" height="36" rx="0" fill="#0f1520"/>
  <text x="130" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">'x'</text>
  <text x="240" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">배타 생성 (exclusive)</text>
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">새로 생성</text>
  <text x="620" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">FileExistsError</text>

  <!-- Row 5: r+ -->
  <rect x="60" y="280" width="760" height="36" rx="0" fill="#111827"/>
  <text x="130" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#ce9178">'r+'</text>
  <text x="240" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">읽기+쓰기</text>
  <text x="440" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">FileNotFoundError</text>
  <text x="620" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">유지</text>

  <!-- Row 6: w+ -->
  <rect x="60" y="316" width="760" height="36" rx="0" fill="#0f1520"/>
  <text x="130" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#ce9178">'w+'</text>
  <text x="240" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">읽기+쓰기 (덮어씀)</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">자동 생성</text>
  <text x="620" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">덮어씀</text>

  <!-- Binary modifier note -->
  <rect x="60" y="370" width="760" height="70" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">이진 모드 수식어 'b' 추가</text>
  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">'rb' · 'wb' · 'ab' · 'r+b' — 개행 문자 변환 없이 raw bytes 처리</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">이미지·오디오·exe 등 non-text 파일에 필수</text>
</svg>
