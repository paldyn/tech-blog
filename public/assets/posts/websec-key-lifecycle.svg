<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">암호화 키 생명주기 (Key Lifecycle)</text>

  <!-- Phase 1: Generation -->
  <rect x="60" y="70" width="160" height="80" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① 생성</text>
  <text x="140" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CSPRNG 사용</text>
  <text x="140" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HSM 또는 KMS</text>

  <line x1="222" y1="110" x2="258" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 2: Distribution -->
  <rect x="260" y="70" width="160" height="80" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② 배포</text>
  <text x="340" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">암호화 전송</text>
  <text x="340" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최소 권한 원칙</text>

  <line x1="422" y1="110" x2="458" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3: Usage -->
  <rect x="460" y="70" width="160" height="80" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">③ 사용</text>
  <text x="540" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">암호화/복호화</text>
  <text x="540" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">감사 로그 기록</text>

  <line x1="622" y1="110" x2="658" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 4: Rotation -->
  <rect x="660" y="70" width="160" height="80" rx="8" fill="#111a22" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="740" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">④ 순환</text>
  <text x="740" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주기적 갱신</text>
  <text x="740" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">또는 침해 시 즉시</text>

  <!-- Rotation back arrow -->
  <path d="M 740 152 Q 740 180 440 180 Q 140 180 140 152" stroke="#7ec8e3" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="440" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">순환 후 새 키로 재생성 → 재배포</text>

  <!-- Phase 5: Archival -->
  <rect x="260" y="220" width="160" height="80" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="340" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">⑤ 보관</text>
  <text x="340" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">과거 데이터 복호화용</text>
  <text x="340" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">접근 제한 강화</text>

  <!-- Phase 6: Destruction -->
  <rect x="460" y="220" width="160" height="80" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="540" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">⑥ 파기</text>
  <text x="540" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">보관 기간 종료 후</text>
  <text x="540" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Crypto-shredding</text>

  <line x1="420" y1="260" x2="458" y2="260" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Vertical arrows -->
  <line x1="340" y1="152" x2="340" y2="218" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="540" y1="152" x2="540" y2="218" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="250" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">만료 후</text>
  <text x="445" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">만료 후</text>

  <!-- Key rotation types -->
  <rect x="60" y="320" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 키 순환 유형과 권장 주기</text>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">데이터 암호화 키 (DEK): 90일~1년 주기, 침해 시 즉시</text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">키 암호화 키 (KEK/마스터 키): 1~3년 주기 (KMS 관리)</text>
  <text x="76" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">TLS 인증서: 90일(Let's Encrypt) ~ 1년 (자동 갱신 필수)</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">API 키: 90일 권장, 직원 퇴직 시 즉시 폐기</text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">SSH 키: 1년 주기, 퇴직자 즉시 제거</text>
</svg>
