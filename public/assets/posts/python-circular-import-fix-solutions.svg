<svg xmlns="http://www.w3.org/2000/svg" width="880" height="350" viewBox="0 0 880 350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="350" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">세 가지 해결법</text>

  <!-- sol 1 -->
  <rect x="60" y="80" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="108" font-size="14" fill="#55c555" font-weight="600">① 구조 분리 — 공통 코드를 제3의 모듈로</text>
  <text xml:space="preserve" x="80" y="138" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># a, b가 서로가 아니라 common을 import</tspan></text>

  <!-- sol 2 -->
  <rect x="60" y="172" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="200" font-size="14" fill="#55c555" font-weight="600">② 지연 import — 함수 안에서 import</text>
  <text xml:space="preserve" x="80" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> handle(): </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> b </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Order   </tspan><tspan fill="#9aa4b8"># 호출 시점에 로드</tspan></text>

  <!-- sol 3 -->
  <rect x="60" y="264" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="292" font-size="14" fill="#55c555" font-weight="600">③ 타입 힌트만 필요하면 TYPE_CHECKING</text>
  <text xml:space="preserve" x="80" y="322" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> TYPE_CHECKING: </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> b </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Order  </tspan><tspan fill="#9aa4b8"># 런타임 미실행</tspan></text>
</svg>
