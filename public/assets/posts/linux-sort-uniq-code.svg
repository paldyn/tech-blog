<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">sort · uniq 실전 패턴</text>

  <!-- Left: sort examples -->
  <rect x="60" y="66" width="360" height="320" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">sort 실전 예제</text>

  <text x="80" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 숫자 내림차순</text>
  <text x="80" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">sort</tspan> -rn numbers.txt</text>

  <text x="80" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># CSV 2번 필드(숫자) 기준</text>
  <text x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">sort</tspan> -t, -k2 -n data.csv</text>

  <text x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 2번 필드 역순, 같으면 1번 정순</text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">sort</tspan> -t, -k2rn -k1 data.csv</text>

  <text x="80" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 파일 크기 인간 가독형 정렬</text>
  <text x="80" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">du -sh * | <tspan fill="#7ec8e3" font-weight="600">sort</tspan> -h</text>

  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 안정 정렬 (-s: stable)</text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">sort</tspan> -s -k2,2 input.txt</text>

  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-k2,2 : 2번 필드 시작~끝 (단일 필드 정렬)</text>

  <!-- Right: uniq examples -->
  <rect x="460" y="66" width="360" height="320" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">uniq 실전 예제</text>

  <text x="480" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 중복 제거 (정렬 선행 필수)</text>
  <text x="480" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">sort</tspan> file.txt | <tspan fill="#7ec8e3" font-weight="600">uniq</tspan></text>

  <text x="480" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 빈도 내림차순 TOP10</text>
  <text x="480" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">sort</tspan> ips.txt | <tspan fill="#7ec8e3" font-weight="600">uniq</tspan> -c | <tspan fill="#7ec8e3" font-weight="600">sort</tspan> -rn | head -10</text>

  <text x="480" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 중복된 줄만 보기</text>
  <text x="480" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">sort</tspan> file.txt | <tspan fill="#7ec8e3" font-weight="600">uniq</tspan> -d</text>

  <text x="480" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 유일한 줄만 보기</text>
  <text x="480" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">sort</tspan> file.txt | <tspan fill="#7ec8e3" font-weight="600">uniq</tspan> -u</text>

  <text x="480" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 접속 로그 IP 빈도 분석</text>
  <text x="480" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">awk '{print $1}' access.log | <tspan fill="#7ec8e3" font-weight="600">sort</tspan> | <tspan fill="#7ec8e3" font-weight="600">uniq</tspan> -c | <tspan fill="#7ec8e3" font-weight="600">sort</tspan> -rn</text>

  <text x="480" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">uniq는 인접 중복만 제거 — 반드시 sort 후 파이프</text>
</svg>
