<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">클로저 메모리 누수 — 패턴 vs 해결책</text>

  <!-- Left: Leak pattern -->
  <text x="210" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#e05555">❌ 누수 패턴</text>

  <rect x="60" y="88" width="360" height="330" fill="#000000" rx="6" stroke="#e05555" stroke-width="1"/>

  <text x="76" y="110" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 이벤트 리스너 내 클로저 누수
  </text>
  <text x="76" y="128" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">class</tspan><tspan fill="#ffffff"> Dashboard {</tspan>
  </text>
  <text x="76" y="146" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  constructor() {</tspan>
  </text>
  <text x="76" y="164" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.bigData </tspan><tspan fill="#7ec8e3">=</tspan>
  </text>
  <text x="76" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">      Array(</tspan><tspan fill="#b5cea8">100000</tspan><tspan fill="#ffffff">).fill(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="200" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    btn.addEventListener(</tspan>
  </text>
  <text x="76" y="218" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">      'click'</tspan><tspan fill="#ffffff">, () </tspan><tspan fill="#7ec8e3">=&gt;</tspan><tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="76" y="236" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">        // this 전체를 캡처!</tspan>
  </text>
  <text x="76" y="254" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        use(</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.bigData);</tspan>
  </text>
  <text x="76" y="272" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      });
  </text>
  <text x="76" y="290" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }
  </text>
  <text x="76" y="308" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}
  </text>
  <text x="76" y="330" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">// Dashboard 해제 후에도
  </text>
  <text x="76" y="348" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">// bigData가 메모리에 잔류!
  </text>
  <text x="76" y="390" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// destroy() 없음 → 누수
  </text>

  <!-- Right: Fix -->
  <text x="660" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#55c555">✅ 해결책</text>

  <rect x="460" y="88" width="360" height="330" fill="#000000" rx="6" stroke="#55c555" stroke-width="1"/>

  <text x="476" y="110" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">class</tspan><tspan fill="#ffffff"> Dashboard {</tspan>
  </text>
  <text x="476" y="128" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  constructor() {</tspan>
  </text>
  <text x="476" y="146" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.bigData </tspan><tspan fill="#7ec8e3">=</tspan>
  </text>
  <text x="476" y="164" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">      Array(</tspan><tspan fill="#b5cea8">100000</tspan><tspan fill="#ffffff">).fill(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="476" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">    // 필요한 값만 추출!</tspan>
  </text>
  <text x="476" y="200" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">    const</tspan><tspan fill="#ffffff"> len </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.bigData.length;</tspan>
  </text>
  <text x="476" y="218" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.ac </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> AbortController();</tspan>
  </text>
  <text x="476" y="236" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    btn.addEventListener(</tspan>
  </text>
  <text x="476" y="254" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">      'click'</tspan><tspan fill="#ffffff">, () </tspan><tspan fill="#7ec8e3">=&gt;</tspan><tspan fill="#ffffff"> use(len),</tspan>
  </text>
  <text x="476" y="272" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">      { signal: </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.ac.signal });</tspan>
  </text>
  <text x="476" y="290" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }
  </text>
  <text x="476" y="310" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  destroy() {</tspan>
  </text>
  <text x="476" y="328" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.ac.abort();</tspan><tspan fill="#9aa4b8"> // 리스너 제거</tspan>
  </text>
  <text x="476" y="346" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.bigData </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="476" y="364" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }
  </text>
  <text x="476" y="382" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}
  </text>

  <!-- Bottom summary -->
  <text x="440" y="440" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">핵심: 클로저가 캡처하는 변수의 크기와 수명을 최소화 + 명시적 cleanup</text>
</svg>
