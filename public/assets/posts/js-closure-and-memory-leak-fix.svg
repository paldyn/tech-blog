<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">클로저 메모리 누수 — 패턴 vs 해결책</text>

  <!-- Left: Leak pattern -->
  <text x="210" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#e05555">❌ 누수 패턴</text>

  <rect x="60" y="88" width="360" height="330" fill="#070b14" rx="6" stroke="#e05555" stroke-width="1"/>

  <text x="76" y="110" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 이벤트 리스너 내 클로저 누수</tspan>
  </text>
  <text x="76" y="128" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">class</tspan><tspan fill="#e8e8e8"> Dashboard {</tspan>
  </text>
  <text x="76" y="146" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  constructor() {</tspan>
  </text>
  <text x="76" y="164" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.bigData </tspan><tspan fill="#7ec8e3">=</tspan>
  </text>
  <text x="76" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">      Array(</tspan><tspan fill="#b5cea8">100000</tspan><tspan fill="#e8e8e8">).fill(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">);</tspan>
  </text>
  <text x="76" y="200" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">    btn.addEventListener(</tspan>
  </text>
  <text x="76" y="218" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ce9178">      'click'</tspan><tspan fill="#e8e8e8">, () </tspan><tspan fill="#7ec8e3">=&gt;</tspan><tspan fill="#e8e8e8"> {</tspan>
  </text>
  <text x="76" y="236" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#6a8aa0">        // this 전체를 캡처!</tspan>
  </text>
  <text x="76" y="254" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">        use(</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.bigData);</tspan>
  </text>
  <text x="76" y="272" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      });</tspan>
  </text>
  <text x="76" y="290" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</tspan>
  </text>
  <text x="76" y="308" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</tspan>
  </text>
  <text x="76" y="330" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// Dashboard 해제 후에도</tspan>
  </text>
  <text x="76" y="348" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// bigData가 메모리에 잔류!</tspan>
  </text>
  <text x="76" y="390" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// destroy() 없음 → 누수</tspan>
  </text>

  <!-- Right: Fix -->
  <text x="660" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#55c555">✅ 해결책</text>

  <rect x="460" y="88" width="360" height="330" fill="#070b14" rx="6" stroke="#55c555" stroke-width="1"/>

  <text x="476" y="110" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">class</tspan><tspan fill="#e8e8e8"> Dashboard {</tspan>
  </text>
  <text x="476" y="128" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  constructor() {</tspan>
  </text>
  <text x="476" y="146" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.bigData </tspan><tspan fill="#7ec8e3">=</tspan>
  </text>
  <text x="476" y="164" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">      Array(</tspan><tspan fill="#b5cea8">100000</tspan><tspan fill="#e8e8e8">).fill(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">);</tspan>
  </text>
  <text x="476" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#6a8aa0">    // 필요한 값만 추출!</tspan>
  </text>
  <text x="476" y="200" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    const</tspan><tspan fill="#e8e8e8"> len </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.bigData.length;</tspan>
  </text>
  <text x="476" y="218" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.ac </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> AbortController();</tspan>
  </text>
  <text x="476" y="236" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">    btn.addEventListener(</tspan>
  </text>
  <text x="476" y="254" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ce9178">      'click'</tspan><tspan fill="#e8e8e8">, () </tspan><tspan fill="#7ec8e3">=&gt;</tspan><tspan fill="#e8e8e8"> use(len),</tspan>
  </text>
  <text x="476" y="272" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">      { signal: </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.ac.signal });</tspan>
  </text>
  <text x="476" y="290" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</tspan>
  </text>
  <text x="476" y="310" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  destroy() {</tspan>
  </text>
  <text x="476" y="328" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.ac.abort();</tspan><tspan fill="#6a8aa0"> // 리스너 제거</tspan>
  </text>
  <text x="476" y="346" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.bigData </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#e8e8e8">;</tspan>
  </text>
  <text x="476" y="364" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</tspan>
  </text>
  <text x="476" y="382" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</tspan>
  </text>

  <!-- Bottom summary -->
  <text x="440" y="440" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">핵심: 클로저가 캡처하는 변수의 크기와 수명을 최소화 + 명시적 cleanup</text>
</svg>
