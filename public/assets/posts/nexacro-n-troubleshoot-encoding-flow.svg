<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">인코딩 문제 발생 경로</text>

  <!-- Client -->
  <rect x="60" y="68" width="180" height="80" rx="6" fill="#0d1e35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Nexacro 클라이언트</text>
  <text x="150" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dataset → PL 변환</text>
  <text x="150" y="130" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">UTF-8 전송</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="108" x2="300" y2="108" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="270" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">HTTP</text>

  <!-- WAS -->
  <rect x="300" y="68" width="180" height="80" rx="6" fill="#1a1435" stroke="#7777cc" stroke-width="1.5"/>
  <text x="390" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">WAS / Adapter</text>
  <text x="390" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">요청 파싱·인코딩</text>
  <text x="390" y="130" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">설정 따라 가변</text>

  <!-- Arrow 2 -->
  <line x1="480" y1="108" x2="540" y2="108" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DB -->
  <rect x="540" y="68" width="180" height="80" rx="6" fill="#0d2b1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">DB</text>
  <text x="630" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">저장·조회</text>
  <text x="630" y="130" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">UTF-8 / EUC-KR</text>

  <!-- Arrow 3: back -->
  <line x1="540" y1="132" x2="480" y2="132" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="300" y1="132" x2="240" y2="132" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Encoding mismatch zones -->
  <text x="150" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Zone A</text>
  <text x="390" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Zone B</text>
  <text x="630" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Zone C</text>

  <!-- Problem boxes -->
  <rect x="60" y="186" width="240" height="60" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="180" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">Zone A: 응답 디코딩 오류</text>
  <text x="180" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PL 파싱 시 한글 깨짐</text>
  <text x="180" y="241" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">charset 불일치</text>

  <rect x="320" y="186" width="240" height="60" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">Zone B: 서블릿 필터 누락</text>
  <text x="440" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">request.setCharacterEncoding 미설정</text>
  <text x="440" y="241" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">ISO-8859-1 기본값</text>

  <rect x="580" y="186" width="240" height="60" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">Zone C: DB 인코딩 불일치</text>
  <text x="700" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컬럼·테이블 CharSet 혼재</text>
  <text x="700" y="241" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">EUC-KR 컬럼에 UTF-8 저장</text>

  <!-- Solution row -->
  <rect x="60" y="270" width="760" height="60" rx="6" fill="#0d2b1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">해결: 전 구간 UTF-8 통일</text>
  <text x="440" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Nexacro charset=utf-8 · 서블릿 필터 UTF-8 · DB NLS_CHARACTERSET=AL32UTF8</text>

  <text x="440" y="385" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">인코딩 문제는 클라이언트→서버→DB 전 구간 일관성이 핵심이다</text>
</svg>
