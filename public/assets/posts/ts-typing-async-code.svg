<svg xmlns="http://www.w3.org/2000/svg" width="880" height="278" viewBox="0 0 880 278">
<rect width="880" height="278" fill="#0a0a0a" rx="12"/>
<text x="50" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Promise 반환과 await 추론</text>
<text x="50" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">async 함수 시그니처</text>
<text x="470" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">호출부 await 추론</text>
<rect x="50" y="96" width="360" height="154" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">async function </tspan><tspan fill="#ffffff">getUser</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">(id: </tspan><tspan font-weight="600" fill="#7ec8e3">number</tspan><tspan fill="#ffffff">): </tspan><tspan font-weight="600" fill="#7ec8e3">Promise</tspan><tspan fill="#ffffff">&lt;</tspan><tspan fill="#ffffff">User</tspan><tspan fill="#ffffff">&gt; {</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  const res = </tspan><tspan font-weight="600" fill="#7ec8e3">await</tspan><tspan fill="#ffffff"> fetch(...)</tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">  return</tspan><tspan fill="#ffffff"> res.json()</tspan></text>
<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">}</tspan></text>
<text y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff"></tspan></text>
<text y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// 반환은 항상 Promise로 래핑</tspan></text>
<rect x="470" y="96" width="360" height="154" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">const u = </tspan><tspan font-weight="600" fill="#7ec8e3">await</tspan><tspan fill="#ffffff"> getUser(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#9aa4b8">//    ^? User  (언래핑됨)</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff"></tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">const us = </tspan><tspan font-weight="600" fill="#7ec8e3">await</tspan><tspan font-weight="600" fill="#7ec8e3"> Promise</tspan><tspan fill="#ffffff">.all([</tspan></text>
<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">  getUser(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">), getUser(</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)</tspan></text>
<text y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">])</tspan></text>
<text y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#9aa4b8">//    ^? User[]</tspan></text>
</svg>
