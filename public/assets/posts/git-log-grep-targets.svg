<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-gg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">--grep은 커밋 메시지를 검색한다</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">코드가 아니라 "왜 바꿨는가"의 기록을 뒤진다</text>

  <!-- a commit object box -->
  <rect x="240" y="100" width="400" height="160" rx="10" fill="#101010" stroke="#444" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="14" font-weight="600" fill="#888">커밋 메타데이터</text>

  <rect x="270" y="142" width="340" height="34" rx="6" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="288" y="164" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#9988dd">author / committer  ← --author</text>

  <rect x="270" y="184" width="340" height="34" rx="6" fill="#101010" stroke="#55c555" stroke-width="2"/>
  <text x="288" y="206" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#55c555">message (제목 + 본문)  ← --grep</text>

  <rect x="270" y="226" width="340" height="24" rx="6" fill="#101010" stroke="#444" stroke-width="1"/>
  <text x="288" y="243" font-family="'Wanted Sans Variable',sans-serif" font-size="12" fill="#888">date  ← --since / --until</text>

  <text x="440" y="294" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git log --grep "fix" --author "kim" --since "2 weeks"</text>
</svg>
