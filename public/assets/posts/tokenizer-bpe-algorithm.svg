<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BPE 병합 알고리즘 단계별 시각화</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">가장 빈번한 인접 쌍을 반복 병합해 어휘를 구축한다</text>

  <!-- Initial state -->
  <text x="60" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">초기 상태 — 문자 단위 분해 (말뭉치: "low", "lower", "newest", "widest")</text>

  <rect x="60" y="110" width="760" height="50" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#888">어휘:</tspan><tspan fill="#e8e8e8"> {l,o,w,e,r,n,s,t,i,d,</tspan><tspan fill="#ce9178"> &lt;/w&gt;</tspan><tspan fill="#e8e8e8">}   (</tspan><tspan fill="#ce9178">&lt;/w&gt;</tspan><tspan fill="#888"> = 단어 경계 마커)</tspan></text>

  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#888">빈도:</tspan><tspan fill="#e8e8e8"> l-o-w</tspan><tspan fill="#ce9178">&lt;/w&gt;</tspan><tspan fill="#e8e8e8">×5,  l-o-w-e-r</tspan><tspan fill="#ce9178">&lt;/w&gt;</tspan><tspan fill="#e8e8e8">×2,  n-e-w-e-s-t</tspan><tspan fill="#ce9178">&lt;/w&gt;</tspan><tspan fill="#e8e8e8">×6</tspan></text>

  <!-- Step 1 -->
  <rect x="60" y="174" width="760" height="76" rx="8" fill="#0a1428" stroke="#1e3a5e"/>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Step 1: 가장 빈번한 쌍 → (e, s) 병합</text>
  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인접 쌍 빈도 계산: (l,o)=7, (o,w)=7, (e,s)=9, (s,t)=9, ...</text>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최빈 쌍 선택: (e, s) 빈도=9</text>
  <text x="80" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">어휘에 추가: "es"  |  n-</text>
  <text x="274" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">es</text>
  <text x="298" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-t→new-</text>
  <text x="374" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">es</text>
  <text x="398" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-t</text>

  <!-- Step 2 -->
  <rect x="60" y="262" width="760" height="76" rx="8" fill="#0a1428" stroke="#1e3a5e"/>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Step 2: (es, t) 병합 → "est"</text>
  <text x="80" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">새 빈도 계산: (es,t)=9, (l,o)=7, (o,w)=7, ...</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최빈 쌍 선택: (es, t) 빈도=9</text>
  <text x="80" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">어휘에 추가: "est"  |  n-w-</text>
  <text x="322" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">est</text>
  <text x="352" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">→ n-e-w-</text>
  <text x="432" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">est</text>

  <!-- Step 3 -->
  <rect x="60" y="350" width="760" height="76" rx="8" fill="#0a1428" stroke="#1e3a5e"/>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Step 3: (l, o) 병합 → "lo"</text>
  <text x="80" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최빈 쌍: (l,o)=7</text>
  <text x="80" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#55c555">어휘에 추가: "lo"  |  </tspan><tspan fill="#55c555">lo</tspan><tspan fill="#e8e8e8">-w</tspan><tspan fill="#ce9178">&lt;/w&gt;</tspan><tspan fill="#e8e8e8">,  </tspan><tspan fill="#55c555">lo</tspan><tspan fill="#e8e8e8">-w-e-r</tspan><tspan fill="#ce9178">&lt;/w&gt;</tspan></text>

  <!-- Result -->
  <rect x="60" y="438" width="760" height="58" rx="8" fill="#0f1a0f" stroke="#1e3a1e"/>
  <text x="80" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">최종 어휘 (N회 병합 후)</text>
  <text x="80" y="480" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">{l, o, w, e, r, n, s, t, i, d, </tspan><tspan fill="#ce9178">&lt;/w&gt;</tspan><tspan fill="#55c555">, es, est, lo, low, new, newest, ...</tspan><tspan fill="#888">}</tspan></text>

</svg>
