<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JDK 버전 선택 가이드 (2024 기준)</text>

  <!-- JDK 17 -->
  <rect x="60" y="70" width="360" height="200" fill="#0a120a" rx="10" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="100" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">JDK 17 LTS</text>
  <text x="240" y="122" font-size="12" fill="#888" text-anchor="middle">Spring Boot 3.x 최소 요구 버전</text>

  <text x="80" y="152" font-size="13" fill="#55c555">✓  Spring Boot 3.x 기본 지원</text>
  <text x="80" y="174" font-size="13" fill="#e8e8e8">•  Record, Sealed Class</text>
  <text x="80" y="196" font-size="13" fill="#e8e8e8">•  Text Block (""" ... """)</text>
  <text x="80" y="218" font-size="13" fill="#e8e8e8">•  Pattern Matching for instanceof</text>
  <text x="80" y="240" font-size="13" fill="#888">지원 종료: 2029년 9월</text>

  <!-- JDK 21 -->
  <rect x="460" y="70" width="360" height="200" fill="#131a2a" rx="10" stroke="#7ec8e3" stroke-width="2.5"/>
  <rect x="460" y="70" width="100" height="28" fill="#7ec8e3" rx="6"/>
  <text x="510" y="89" font-size="12" font-weight="700" fill="#0a0a0a" text-anchor="middle">권장</text>
  <text x="640" y="100" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">JDK 21 LTS</text>
  <text x="640" y="122" font-size="12" fill="#888" text-anchor="middle">이 시리즈 기준 버전</text>

  <text x="480" y="152" font-size="13" fill="#55c555">✓  Virtual Threads (Project Loom)</text>
  <text x="480" y="174" font-size="13" fill="#e8e8e8">•  Sequenced Collections</text>
  <text x="480" y="196" font-size="13" fill="#e8e8e8">•  Pattern Matching Switch</text>
  <text x="480" y="218" font-size="13" fill="#e8e8e8">•  Record Patterns</text>
  <text x="480" y="240" font-size="13" fill="#888">지원 종료: 2031년 9월</text>

  <!-- Build tools section -->
  <rect x="60" y="290" width="760" height="80" fill="#0e1420" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="318" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">IDE 선택</text>
  <text x="180" y="344" font-size="13" fill="#55c555" text-anchor="middle">IntelliJ IDEA</text>
  <text x="180" y="360" font-size="11" fill="#888" text-anchor="middle">Community (무료) / Ultimate</text>
  <text x="440" y="344" font-size="13" fill="#888" text-anchor="middle">Eclipse + STS</text>
  <text x="440" y="360" font-size="11" fill="#888" text-anchor="middle">레거시 프로젝트 중심</text>
  <text x="700" y="344" font-size="13" fill="#888" text-anchor="middle">VS Code + Extension Pack</text>
  <text x="700" y="360" font-size="11" fill="#888" text-anchor="middle">경량 편집기 선호 시</text>

  <!-- SDKMAN code block -->
  <rect x="60" y="390" width="760" height="66" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># SDKMAN으로 JDK 설치 (macOS/Linux)</text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ sdk install java 21.0.3-tem</text>
  <text x="76" y="448" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ sdk use java 21.0.3-tem</text>

  <!-- Footer -->
  <text x="440" y="488" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #5 · Chapter 2</text>
</svg>
