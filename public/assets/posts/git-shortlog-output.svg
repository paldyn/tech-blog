<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git shortlog 기본 출력</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">저자별로 그룹화된 커밋 목록</text>

  <!-- Default output -->
  <text x="60" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">git shortlog (기본)</text>
  <rect x="60" y="122" width="360" height="200" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#55c555">Alice</tspan> (14):</tspan>
    <tspan x="76" dy="18">      feat: add login page</tspan>
    <tspan x="76" dy="18">      fix: null check on user</tspan>
    <tspan x="76" dy="18">      refactor: extract auth utils</tspan>
    <tspan x="76" dy="18">      ...</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">Bob</tspan> (8):</tspan>
    <tspan x="76" dy="18">      feat: dashboard layout</tspan>
    <tspan x="76" dy="18">      fix: responsive breakpoint</tspan>
    <tspan x="76" dy="18">      ...</tspan>
  </text>

  <!-- -sn output -->
  <text x="450" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">git shortlog -sn (통계 요약)</text>
  <rect x="450" y="122" width="370" height="200" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="466" dy="0"><tspan fill="#b5cea8">    14</tspan>  <tspan fill="#55c555">Alice</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#b5cea8">     8</tspan>  <tspan fill="#7ec8e3">Bob</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#b5cea8">     5</tspan>  <tspan fill="#e8a838">Carol</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#b5cea8">     3</tspan>  <tspan fill="#7777cc">Dave</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#b5cea8">     1</tspan>  Eve</tspan>
    <tspan x="466" dy="18"> </tspan>
    <tspan x="466" dy="18"><tspan fill="#9aa4b8"># -s: 숫자만, -n: 내림차순 정렬</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#9aa4b8"># -e: 이메일 포함</tspan></tspan>
  </text>

  <!-- Summary cards -->
  <rect x="60" y="346" width="230" height="80" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="175" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">git shortlog</text>
  <text x="175" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">저자별 커밋 제목 목록</text>
  <text x="175" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">기본 알파벳 정렬</text>

  <rect x="310" y="346" width="230" height="80" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="425" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">git shortlog -sn</text>
  <text x="425" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">숫자 + 내림차순</text>
  <text x="425" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">CONTRIBUTORS 생성에 사용</text>

  <rect x="560" y="346" width="260" height="80" rx="8" fill="#0d1117" stroke="#e8a838" stroke-width="1.2"/>
  <text x="690" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a838" text-anchor="middle">git shortlog -sne</text>
  <text x="690" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">이메일 포함 통계</text>
  <text x="690" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">동명이인 구분</text>
</svg>
