<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">pre-push 훅 실행 흐름 &amp; stdin 입력</text>

  <!-- git push -->
  <rect x="340" y="74" width="200" height="52" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">git push</text>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로컬 커밋 존재</text>

  <line x1="440" y1="126" x2="440" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- pre-push hook -->
  <rect x="240" y="158" width="400" height="72" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">pre-push 훅</text>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">$1 = remote name, $2 = remote URL</text>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">stdin: &lt;local-ref&gt; &lt;local-sha&gt; &lt;remote-ref&gt; &lt;remote-sha&gt;</text>

  <!-- Branches -->
  <line x1="240" y1="194" x2="140" y2="194" stroke="#55c555" stroke-width="2"/>
  <line x1="140" y1="194" x2="140" y2="286" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="70" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">exit 0</text>

  <line x1="640" y1="194" x2="740" y2="194" stroke="#e05555" stroke-width="2"/>
  <line x1="740" y1="194" x2="740" y2="286" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="810" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">exit 1</text>

  <rect x="60" y="288" width="160" height="64" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Push 전송</text>
  <text x="140" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원격으로 전송</text>

  <rect x="660" y="288" width="160" height="64" rx="8" fill="#1f1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">Push 취소</text>
  <text x="740" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전송 없음</text>

  <!-- Code block -->
  <rect x="60" y="374" width="760" height="104" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">#!/bin/sh</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># stdin에서 push 정보 읽기</text>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">while</tspan> <tspan fill="#7ec8e3" font-weight="600">read</tspan> local_ref local_sha remote_ref remote_sha; <tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="76" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    npm <tspan fill="#7ec8e3" font-weight="600">test</tspan>  <tspan fill="#9aa4b8"># 테스트 실패 시 exit 1 → push 취소</tspan></text>
  <text x="76" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
</svg>
