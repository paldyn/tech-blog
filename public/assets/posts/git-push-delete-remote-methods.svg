<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">원격 브랜치 삭제 — 두 가지 문법</text>
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#888">머지된 브랜치를 원격에서 정리하는 방법</text>

  <!-- Divider -->
  <line x1="440" y1="100" x2="440" y2="370" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: --delete 문법 -->
  <text x="220" y="120" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">--delete 문법 (권장)</text>

  <rect x="68" y="136" width="352" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="84" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0"># 브랜치 삭제</text>
  <text x="84" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">git push </text>
  <text x="165" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">origin </text>
  <text x="215" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">--delete </text>
  <text x="280" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">feature/x</text>
  <text x="84" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">git push </text>
  <text x="165" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">origin </text>
  <text x="215" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">-d </text>
  <text x="236" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">feature/x</text>

  <rect x="68" y="255" width="352" height="68" rx="6" fill="#0d1117" stroke="#2a3a52"/>
  <text x="244" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">읽기 명확, 실수 방지</text>
  <text x="244" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Git 1.7+ 에서 사용 가능</text>

  <!-- RIGHT: colon 문법 -->
  <text x="660" y="120" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">콜론(:) 문법 (구버전 호환)</text>

  <rect x="460" y="136" width="352" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0"># 빈 ref를 원격에 push = 삭제</text>
  <text x="476" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">git push </text>
  <text x="557" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">origin </text>
  <text x="607" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">:feature/x</text>
  <text x="476" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0"># :태그명 으로 태그 삭제도 가능</text>

  <rect x="460" y="255" width="352" height="68" rx="6" fill="#0d1117" stroke="#2a3a52"/>
  <text x="636" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">구버전 Git 호환</text>
  <text x="636" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">의도 파악이 다소 불명확</text>

  <!-- Bottom warning -->
  <rect x="60" y="345" width="760" height="40" rx="6" fill="#1a0a0a" stroke="#3a1a1a"/>
  <text x="440" y="370" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 로컬 브랜치는 삭제되지 않음 — 로컬도 정리하려면 git branch -d 따로 실행</text>
</svg>
