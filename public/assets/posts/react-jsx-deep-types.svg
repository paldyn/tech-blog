<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JSX에서 렌더링 가능한 값의 종류</text>

  <!-- Renderable values table -->
  <rect x="60" y="66" width="200" height="50" rx="8" fill="#0f1f3d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">값의 종류</text>
  <text x="160" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입</text>

  <rect x="270" y="66" width="200" height="50" rx="8" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="370" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">렌더링 결과</text>
  <text x="370" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">화면 출력</text>

  <rect x="480" y="66" width="340" height="50" rx="8" fill="#1a1025" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="650" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#cc77cc">예시</text>
  <text x="650" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드</text>

  <!-- Rows -->
  <rect x="60" y="126" width="200" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">string / number</text>
  <rect x="270" y="126" width="200" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">그대로 출력</text>
  <rect x="480" y="126" width="340" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="151" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">{"hello"} {42}</text>

  <rect x="60" y="172" width="200" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">null / undefined / false</text>
  <rect x="270" y="172" width="200" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">아무것도 안 나옴</text>
  <rect x="480" y="172" width="340" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="197" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">{null} {undefined} {false}</text>

  <rect x="60" y="218" width="200" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">JSX Element</text>
  <rect x="270" y="218" width="200" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">해당 Element 렌더링</text>
  <rect x="480" y="218" width="340" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="243" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">{&lt;span&gt;텍스트&lt;/span&gt;}</text>

  <rect x="60" y="264" width="200" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Array</text>
  <rect x="270" y="264" width="200" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">배열 항목 순서대로</text>
  <rect x="480" y="264" width="340" height="40" rx="4" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="289" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">{[&lt;li&gt;A&lt;/li&gt;, &lt;li&gt;B&lt;/li&gt;]}</text>

  <rect x="60" y="310" width="200" height="40" rx="4" fill="#2a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">Object</text>
  <rect x="270" y="310" width="200" height="40" rx="4" fill="#2a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="370" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">런타임 에러!</text>
  <rect x="480" y="310" width="340" height="40" rx="4" fill="#2a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="650" y="335" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">{obj} // 렌더링 불가</text>

  <!-- Code: dynamic element type -->
  <rect x="60" y="374" width="760" height="66" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 컴포넌트 타입을 동적으로 결정 (대문자 변수 필수!)</text>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> Tag = isHeading ? </tspan><tspan fill="#ce9178">'h1'</tspan><tspan fill="#ffffff"> : </tspan><tspan fill="#ce9178">'p'</tspan><tspan fill="#ffffff">;  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;Tag&gt;내용&lt;/Tag&gt;;</tspan></text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// lowercase tag → HTML element, Uppercase → React Component</text>
</svg>
