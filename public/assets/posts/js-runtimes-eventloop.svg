<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
  style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">브라우저 vs Node.js 이벤트 루프 구조</text>

  <!-- Browser side -->
  <rect x="60" y="80" width="360" height="340" rx="10" fill="#0d1928" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">브라우저 이벤트 루프</text>

  <!-- JS Engine box -->
  <rect x="80" y="120" width="320" height="60" rx="7" fill="#070b14" stroke="#7ec8e3"/>
  <text x="240" y="145" text-anchor="middle" font-size="13" fill="#e8e8e8">JS 엔진 (V8 / JSC / SpiderMonkey)</text>
  <text x="240" y="163" text-anchor="middle" font-size="11" fill="#888">싱글 스레드 — 한 번에 하나의 작업</text>

  <!-- Call Stack -->
  <rect x="80" y="200" width="140" height="90" rx="6" fill="#111827" stroke="#555"/>
  <text x="150" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#aaa">콜 스택</text>
  <text x="150" y="242" text-anchor="middle" font-size="11" fill="#666">함수 실행 추적</text>
  <text x="150" y="260" text-anchor="middle" font-size="11" fill="#666">LIFO 구조</text>
  <text x="150" y="278" text-anchor="middle" font-size="11" fill="#666">동기 실행</text>

  <!-- Task Queue -->
  <rect x="240" y="200" width="140" height="90" rx="6" fill="#111827" stroke="#555"/>
  <text x="310" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#aaa">태스크 큐</text>
  <text x="310" y="242" text-anchor="middle" font-size="11" fill="#666">setTimeout</text>
  <text x="310" y="260" text-anchor="middle" font-size="11" fill="#666">DOM 이벤트</text>
  <text x="310" y="278" text-anchor="middle" font-size="11" fill="#666">fetch 콜백</text>

  <!-- Microtask Queue -->
  <rect x="80" y="310" width="300" height="70" rx="6" fill="#0d1f0d" stroke="#55c555"/>
  <text x="230" y="332" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">마이크로태스크 큐 (우선순위 높음)</text>
  <text x="230" y="352" text-anchor="middle" font-size="11" fill="#888">Promise.then · queueMicrotask · MutationObserver</text>
  <text x="230" y="370" text-anchor="middle" font-size="11" fill="#555">각 태스크 끝날 때마다 전부 처리</text>

  <!-- Web APIs box -->
  <rect x="80" y="395" width="300" height="14" rx="4" fill="#1e2a3a"/>
  <text x="230" y="406" text-anchor="middle" font-size="10" fill="#7ec8e3">Web APIs: setTimeout · fetch · DOM 이벤트 · requestAnimationFrame</text>

  <!-- Node.js side -->
  <rect x="460" y="80" width="360" height="340" rx="10" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Node.js 이벤트 루프 (libuv)</text>

  <!-- JS Engine -->
  <rect x="480" y="120" width="320" height="60" rx="7" fill="#070b14" stroke="#55c555"/>
  <text x="640" y="145" text-anchor="middle" font-size="13" fill="#e8e8e8">V8 엔진</text>
  <text x="640" y="163" text-anchor="middle" font-size="11" fill="#888">libuv가 이벤트 루프 제어권 담당</text>

  <!-- libuv phases -->
  <rect x="480" y="200" width="320" height="160" rx="6" fill="#111827" stroke="#333"/>
  <text x="640" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#aaa">libuv 이벤트 루프 단계</text>
  <text x="496" y="244" font-size="11" fill="#888">1. timers — setTimeout · setInterval</text>
  <text x="496" y="262" font-size="11" fill="#888">2. I/O callbacks — 네트워크·파일 콜백</text>
  <text x="496" y="280" font-size="11" fill="#888">3. idle · prepare</text>
  <text x="496" y="298" font-size="11" fill="#888">4. poll — 새 I/O 이벤트 대기</text>
  <text x="496" y="316" font-size="11" fill="#888">5. check — setImmediate</text>
  <text x="496" y="334" font-size="11" fill="#888">6. close callbacks</text>

  <!-- process.nextTick -->
  <rect x="480" y="370" width="320" height="38" rx="5" fill="#0d1f0d" stroke="#55c555"/>
  <text x="640" y="385" text-anchor="middle" font-size="11" fill="#55c555">process.nextTick — 마이크로태스크보다도 먼저 실행</text>
  <text x="640" y="400" text-anchor="middle" font-size="10" fill="#555">각 단계 전환 전에 큐를 비움</text>

  <!-- Bottom note -->
  <rect x="60" y="440" width="760" height="38" rx="7" fill="#111" stroke="#333"/>
  <text x="440" y="458" text-anchor="middle" font-size="12" fill="#888">공통: 싱글 스레드 + 이벤트 루프 + 비동기 I/O 모델</text>
  <text x="440" y="472" text-anchor="middle" font-size="11" fill="#555">차이: Web API 종류 · 이벤트 루프 단계 수 · process.nextTick 존재 여부</text>

  <!-- Footer -->
  <text x="440" y="492" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 · Part I</text>
</svg>
