<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Node.js 아키텍처 — V8 + libuv</text>

  <!-- Your JS Code box -->
  <rect x="60" y="72" width="200" height="70" rx="8" fill="#0d1117" stroke="#f7df1e" stroke-width="2"/>
  <text x="160" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#f7df1e">JavaScript 코드</text>
  <text x="160" y="118" text-anchor="middle" font-size="12" fill="#888">당신이 작성한 .js 파일</text>
  <text x="160" y="134" text-anchor="middle" font-size="11" fill="#555">async, await, Promise...</text>

  <!-- Arrow down to V8 -->
  <line x1="160" y1="142" x2="160" y2="168" stroke="#444" stroke-width="2"/>
  <polygon points="154,168 160,178 166,168" fill="#444"/>

  <!-- V8 Engine box -->
  <rect x="60" y="178" width="200" height="70" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">V8 엔진</text>
  <text x="160" y="224" text-anchor="middle" font-size="12" fill="#888">파싱 · 실행 · JIT</text>
  <text x="160" y="240" text-anchor="middle" font-size="11" fill="#555">JS 코드 실행 전담</text>

  <!-- Arrow down to Node API -->
  <line x1="160" y1="248" x2="160" y2="272" stroke="#444" stroke-width="2"/>
  <polygon points="154,272 160,282 166,272" fill="#444"/>

  <!-- Node API / Bindings -->
  <rect x="60" y="282" width="200" height="70" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">Node.js API</text>
  <text x="160" y="328" text-anchor="middle" font-size="12" fill="#888">fs · http · crypto · net</text>
  <text x="160" y="344" text-anchor="middle" font-size="11" fill="#555">C++ 바인딩 (N-API)</text>

  <!-- libuv box (right side, tall) -->
  <rect x="380" y="100" width="220" height="280" rx="10" fill="#0d1117" stroke="#ce9178" stroke-width="2"/>
  <text x="490" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#ce9178">libuv</text>
  <text x="490" y="150" text-anchor="middle" font-size="12" fill="#888">이벤트 루프 · 비동기 I/O</text>

  <text x="400" y="180" font-size="13" font-weight="600" fill="#e8e8e8">이벤트 루프 단계:</text>
  <text x="400" y="200" font-size="12" fill="#7ec8e3">1. timers</text>
  <text x="400" y="218" font-size="11" fill="#888">   setTimeout · setInterval 콜백</text>
  <text x="400" y="238" font-size="12" fill="#7ec8e3">2. I/O callbacks</text>
  <text x="400" y="256" font-size="11" fill="#888">   fs, 네트워크 완료 콜백</text>
  <text x="400" y="276" font-size="12" fill="#7ec8e3">3. poll</text>
  <text x="400" y="294" font-size="11" fill="#888">   새 I/O 이벤트 대기</text>
  <text x="400" y="314" font-size="12" fill="#7ec8e3">4. check</text>
  <text x="400" y="332" font-size="11" fill="#888">   setImmediate 콜백</text>
  <text x="400" y="352" font-size="12" fill="#7ec8e3">5. close callbacks</text>
  <text x="400" y="370" font-size="11" fill="#888">   소켓 close 등</text>

  <!-- Thread Pool (OS) -->
  <rect x="640" y="100" width="200" height="130" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">스레드 풀</text>
  <text x="740" y="144" text-anchor="middle" font-size="12" fill="#888">(libuv 내부)</text>
  <text x="740" y="168" text-anchor="middle" font-size="12" fill="#e8e8e8">무거운 작업 처리:</text>
  <text x="740" y="186" text-anchor="middle" font-size="11" fill="#888">파일 I/O (fs)</text>
  <text x="740" y="204" text-anchor="middle" font-size="11" fill="#888">DNS 조회</text>
  <text x="740" y="220" text-anchor="middle" font-size="11" fill="#888">crypto (암호화)</text>

  <!-- OS box -->
  <rect x="640" y="252" width="200" height="80" rx="8" fill="#0d1117" stroke="#555" stroke-width="1.5"/>
  <text x="740" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#888">운영체제</text>
  <text x="740" y="300" text-anchor="middle" font-size="12" fill="#555">네트워크 스택 · 파일 시스템</text>
  <text x="740" y="316" text-anchor="middle" font-size="11" fill="#555">epoll(Linux) · kqueue(macOS)</text>

  <!-- Arrows between sections -->
  <line x1="265" y1="317" x2="375" y2="317" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="370,312 380,317 370,322" fill="#7777cc"/>
  <text x="318" y="310" text-anchor="middle" font-size="10" fill="#555">비동기</text>
  <text x="318" y="325" text-anchor="middle" font-size="10" fill="#555">요청</text>

  <line x1="605" y1="165" x2="635" y2="165" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="630,160 640,165 630,170" fill="#ce9178"/>

  <line x1="605" y1="285" x2="635" y2="285" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="630,280 640,285 630,290" fill="#ce9178"/>

  <!-- Footer -->
  <text x="440" y="412" text-anchor="middle" font-size="11" fill="#888">V8은 JS 실행만 담당. I/O와 이벤트 루프는 libuv가 처리합니다.</text>
  <text x="440" y="430" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #4</text>
</svg>
