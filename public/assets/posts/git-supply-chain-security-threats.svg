<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Git 공급망 공격 유형과 대응</text>

  <!-- Threat 1 -->
  <rect x="60" y="76" width="360" height="88" rx="8" fill="#1f1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">커밋 위조 (Author Spoofing)</text>
  <text x="240" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">git config user.email로 타인을 사칭</text>
  <text x="240" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서명 없이 push → 히스토리 신뢰 불가</text>
  <text x="240" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ 커밋 서명 + Require signed commits</text>

  <!-- Threat 2 -->
  <rect x="460" y="76" width="360" height="88" rx="8" fill="#1f1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">비밀 정보 유출 (Secret Leak)</text>
  <text x="640" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">API 키·PAT가 커밋에 포함돼 공개</text>
  <text x="640" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">fork·clone 후 악용 가능</text>
  <text x="640" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ secret scanning + pre-commit hook</text>

  <!-- Threat 3 -->
  <rect x="60" y="184" width="360" height="88" rx="8" fill="#1f1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">의존성 혼란 (Dependency Confusion)</text>
  <text x="240" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내부 패키지와 같은 이름의 악성 패키지</text>
  <text x="240" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공개 레지스트리에 업로드 → 자동 설치</text>
  <text x="240" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ lockfile 커밋 + 스코프 레지스트리 명시</text>

  <!-- Threat 4 -->
  <rect x="460" y="184" width="360" height="88" rx="8" fill="#1f1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">악성 서브모듈 / Action</text>
  <text x="640" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서브모듈·GitHub Action이 변경된 경우</text>
  <text x="640" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">태그가 아닌 HEAD를 참조 시 위험</text>
  <text x="640" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ SHA 핀닝 + Dependabot</text>

  <!-- Defense layer -->
  <rect x="60" y="292" width="760" height="184" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Git 공급망 보안 방어 레이어</text>

  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">● 커밋 서명</text>
  <text x="200" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GPG/SSH 서명 + Require signed commits (브랜치 보호)</text>

  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">● Secret Scanning</text>
  <text x="200" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GitHub Secret Scanning + git-secrets pre-commit hook</text>

  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">● SHA 핀닝</text>
  <text x="200" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GitHub Actions: uses: actions/checkout@v4 대신 SHA 지정</text>

  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">● SBOM</text>
  <text x="200" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Software Bill of Materials로 의존성 투명성 확보</text>

  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">● Sigstore / SLSA</text>
  <text x="200" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 출처 증명 (provenance) 서명 및 검증</text>

  <text x="80" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">● 최소 권한 PAT</text>
  <text x="200" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Fine-grained PAT + 만료일 설정 + 정기 교체</text>
</svg>
