<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">monkeypatch와 mock.patch</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e8e8e8">monkeypatch (pytest)</text>
  <rect x="60" y="108" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="118" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_x(monkeypatch):</text>
  <text xml:space="preserve" x="92" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">monkeypatch.setattr(</text>
  <text xml:space="preserve" x="116" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"mod.api"</text>
  <text xml:space="preserve" x="208" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, fake)</text>
  <text xml:space="preserve" x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 끝나면 자동 복원</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#e8e8e8">unittest.mock.patch</text>
  <rect x="460" y="108" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">@patch("mod.api")</text>
  <text xml:space="preserve" x="476" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="518" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_x(m):</text>
  <text xml:space="preserve" x="500" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">m.return_value = 42</text>
  <text xml:space="preserve" x="500" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">m.assert_called_once()</text>

  <text x="60" y="296" font-size="13" fill="#888" xml:space="preserve">monkeypatch는 값 교체에 간결하고, mock은 호출 여부·인자까지 검증하는 기능이 풍부하다.</text>
</svg>
