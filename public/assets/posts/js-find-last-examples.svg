<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">findLast / findLastIndex 실전 예제</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">로그, 이벤트 히스토리에서의 활용</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Left panel -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">최근 에러 이벤트 찾기</text>
  <rect x="60" y="126" width="360" height="208" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> events = [</tspan>
  </text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  { type: </tspan><tspan fill="#ce9178">'info'</tspan><tspan fill="#ffffff">, msg: </tspan><tspan fill="#ce9178">'start'</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  { type: </tspan><tspan fill="#ce9178">'error'</tspan><tspan fill="#ffffff">, msg: </tspan><tspan fill="#ce9178">'db'</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  { type: </tspan><tspan fill="#ce9178">'info'</tspan><tspan fill="#ffffff">, msg: </tspan><tspan fill="#ce9178">'retry'</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  { type: </tspan><tspan fill="#ce9178">'error'</tspan><tspan fill="#ffffff">, msg: </tspan><tspan fill="#ce9178">'net'</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">];</tspan>
  </text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> last = events.findLast(</tspan>
  </text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  e =&gt; e.type === </tspan><tspan fill="#ce9178">'error'</tspan>
  </text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan><tspan fill="#9aa4b8"> // { type:'error', msg:'net' }</tspan>
  </text>

  <!-- Right panel -->
  <text x="460" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기존 방식과 비교</text>
  <rect x="460" y="126" width="360" height="208" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 기존: reverse + find</text>
  <text x="476" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">[...events].reverse()</tspan>
  </text>
  <text x="476" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  .find(e =&gt; e.type === </tspan><tspan fill="#ce9178">'error'</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="476" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 복사본 생성 + 반전 비용</text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// findLast: 복사 없이 역방향</text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">events.findLast(</tspan>
  </text>
  <text x="476" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  e =&gt; e.type === </tspan><tspan fill="#ce9178">'error'</tspan>
  </text>
  <text x="476" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="476" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// O(n) 탐색, 불변 원본</text>

</svg>
