<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arrm" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MAC 주소의 범위와 역할</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">같은 네트워크 안에서만 유효한 L2 주소</text>

  <!-- LAN scope -->
  <rect x="60" y="88" width="760" height="200" rx="10" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">LAN 범위 내 MAC 통신</text>

  <!-- PC A -->
  <rect x="90" y="128" width="120" height="52" rx="6" fill="#1a2535" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">PC A</text>
  <text x="150" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">AA:BB:CC:11:22:33</text>

  <!-- Switch -->
  <rect x="340" y="128" width="120" height="52" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="400" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Switch</text>
  <text x="400" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MAC 테이블 유지</text>

  <!-- PC B -->
  <rect x="590" y="128" width="120" height="52" rx="6" fill="#1a2535" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">PC B</text>
  <text x="650" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">AA:BB:CC:44:55:66</text>

  <!-- Arrows -->
  <line x1="210" y1="154" x2="340" y2="154" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrm)"/>
  <line x1="460" y1="154" x2="590" y2="154" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- Ethernet frame label on arrow -->
  <text x="275" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Dst: AA:BB:CC:44:55:66</text>
  <text x="275" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Src: AA:BB:CC:11:22:33</text>

  <!-- Router boundary -->
  <rect x="90" y="198" width="700" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">MAC 주소는 라우터를 넘지 못함 — 라우터에서 새 Ethernet 프레임으로 재포장됨</text>

  <!-- Scope note -->
  <rect x="60" y="310" width="760" height="52" rx="8" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">MAC (L2): 같은 LAN 내 장치 식별 — IP (L3): 서로 다른 네트워크 간 라우팅</text>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">ARP가 IP → MAC 주소를 해석해 연결</text>
</svg>
