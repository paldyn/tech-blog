<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrShallow" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrDeep" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="44" font-size="22" font-weight="700" fill="#e8e8e8">바깥은 복제, 안쪽은?</text>

  <text x="55" y="80" font-size="16" font-weight="600" fill="#e05555">얕은 복사 — 안쪽을 공유</text>
  <rect x="55" y="96" width="150" height="44" rx="8" fill="#101622" stroke="#888" stroke-width="1"/>
  <text x="130" y="124" font-size="14" fill="#e8e8e8" text-anchor="middle">원본 a</text>
  <rect x="55" y="178" width="150" height="44" rx="8" fill="#101622" stroke="#888" stroke-width="1"/>
  <text x="130" y="206" font-size="14" fill="#e8e8e8" text-anchor="middle">복사본 b</text>
  <rect x="255" y="137" width="135" height="44" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="322" y="165" font-size="14" fill="#e8e8e8" text-anchor="middle">[1, 2]</text>
  <line x1="205" y1="118" x2="251" y2="151" stroke="#e05555" stroke-width="2" marker-end="url(#arrShallow)"/>
  <line x1="205" y1="200" x2="251" y2="167" stroke="#e05555" stroke-width="2" marker-end="url(#arrShallow)"/>
  <text x="55" y="262" font-size="13" fill="#cccccc">안쪽 리스트는 하나 — b 로 바꿔도 a 가 같이 변한다.</text>

  <text x="475" y="80" font-size="16" font-weight="600" fill="#55c555">깊은 복사 — 끝까지 복제</text>
  <rect x="475" y="96" width="150" height="44" rx="8" fill="#101622" stroke="#888" stroke-width="1"/>
  <text x="550" y="124" font-size="14" fill="#e8e8e8" text-anchor="middle">원본 a</text>
  <rect x="475" y="178" width="150" height="44" rx="8" fill="#101622" stroke="#888" stroke-width="1"/>
  <text x="550" y="206" font-size="14" fill="#e8e8e8" text-anchor="middle">복사본 b</text>
  <rect x="675" y="96" width="135" height="44" rx="8" fill="#101a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="742" y="124" font-size="14" fill="#e8e8e8" text-anchor="middle">[1, 2]</text>
  <rect x="675" y="178" width="135" height="44" rx="8" fill="#101a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="742" y="206" font-size="14" fill="#e8e8e8" text-anchor="middle">[1, 2]</text>
  <line x1="625" y1="118" x2="671" y2="118" stroke="#55c555" stroke-width="2" marker-end="url(#arrDeep)"/>
  <line x1="625" y1="200" x2="671" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arrDeep)"/>
  <text x="475" y="262" font-size="13" fill="#cccccc">안쪽까지 따로 복제 — b 를 바꿔도 a 는 그대로다.</text>
</svg>
