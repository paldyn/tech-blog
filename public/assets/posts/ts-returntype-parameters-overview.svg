<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ReturnType · Parameters 함수 분해</text>

  <!-- Function box -->
  <rect x="60" y="72" width="280" height="100" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="200" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">함수 타입 F</text>
  <text x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">function greet(</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  name: string, age: number</text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">): { msg: string }</text>

  <!-- Arrow to Parameters -->
  <line x1="342" y1="116" x2="420" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="348" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Parameters&lt;F&gt;</text>

  <!-- Arrow to ReturnType -->
  <line x1="342" y1="148" x2="420" y2="270" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="348" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">ReturnType&lt;F&gt;</text>

  <!-- Marker for ReturnType arrow -->
  <defs>
    <marker id="arr-ret" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <line x1="342" y1="148" x2="418" y2="268" stroke="#55c555" stroke-width="2" marker-end="url(#arr-ret)"/>

  <!-- Parameters result -->
  <rect x="422" y="80" width="240" height="80" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="542" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Parameters&lt;F&gt;</text>
  <text x="438" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">[string, number]</text>
  <text x="438" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">파라미터 타입을 튜플로</text>

  <!-- ReturnType result -->
  <rect x="422" y="252" width="240" height="80" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="542" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">ReturnType&lt;F&gt;</text>
  <text x="438" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">{"{"} msg: string {"}"}</text>
  <text x="438" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">반환 타입을 추출</text>

  <!-- Implementation boxes -->
  <rect x="692" y="72" width="168" height="120" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="776" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현</text>
  <text x="704" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">ReturnType =</text>
  <text x="704" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  F extends</text>
  <text x="704" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  (...a:any)=&gt;infer R</text>
  <text x="704" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">    ? R : never</text>

  <rect x="692" y="208" width="168" height="120" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="776" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현</text>
  <text x="704" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">Parameters =</text>
  <text x="704" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  F extends</text>
  <text x="704" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  (...a:infer P)=&gt;any</text>
  <text x="704" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" xml:space="preserve">    ? P : never</text>

  <!-- Use cases -->
  <rect x="60" y="192" width="280" height="200" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="200" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 사용 사례</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">ReturnType</text>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 함수 반환값 타입 재사용</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 팩토리 반환 타입 추론</text>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 미들웨어 체인 타입</text>
  <line x1="80" y1="310" x2="320" y2="310" stroke="#334155" stroke-width="1"/>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Parameters</text>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 함수 인자 타입 재사용</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 래퍼 함수 시그니처</text>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 데코레이터 타입 추론</text>
</svg>
