<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Fragment가 필요한 이유</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">불필요한 div 래퍼가 만드는 DOM 문제</text>

  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Problem: div soup -->
  <rect x="55" y="95" width="370" height="330" rx="8" fill="#1e0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="118" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">❌ div 래퍼 방식의 문제</text>

  <rect x="70" y="128" width="340" height="110" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 컴포넌트</text>
  <text x="82" y="166" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="125" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Row() {</text>
  <text x="82" y="184" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="126" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> &lt;div&gt;</text>
  <text x="82" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;td&gt;이름&lt;/td&gt;&lt;td&gt;나이&lt;/td&gt;</text>
  <text x="82" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;/div&gt;</text>
  <text x="82" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>

  <text x="240" y="268" font-size="13" fill="#e05555" text-anchor="middle">생성되는 DOM (유효하지 않음)</text>
  <rect x="70" y="278" width="340" height="115" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="298" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;table&gt;</text>
  <text x="82" y="316" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;tr&gt;</text>
  <text x="82" y="334" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;div&gt;</text>
  <text x="82" y="352" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;td&gt;이름&lt;/td&gt;&lt;td&gt;나이&lt;/td&gt;</text>
  <text x="82" y="370" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;/div&gt;</text>
  <text x="82" y="388" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;/tr&gt;</text>
  <text x="82" y="406" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;/table&gt;</text>

  <!-- Arrow center -->
  <line x1="425" y1="260" x2="455" y2="260" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="440" y="252" font-size="11" fill="#888" text-anchor="middle">Fragment</text>
  <text x="440" y="275" font-size="11" fill="#888" text-anchor="middle">사용</text>

  <!-- Solution: Fragment -->
  <rect x="455" y="95" width="370" height="330" rx="8" fill="#0f1e12" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="118" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">✅ Fragment 방식</text>

  <rect x="470" y="128" width="340" height="110" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="148" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// Fragment 사용</text>
  <text x="482" y="166" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="525" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Row() {</text>
  <text x="482" y="184" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="526" y="184" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace" xml:space="preserve"> &lt;&gt;</text>
  <text x="482" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;td&gt;이름&lt;/td&gt;&lt;td&gt;나이&lt;/td&gt;</text>
  <text x="482" y="220" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;/&gt;</text>
  <text x="482" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>

  <text x="640" y="268" font-size="13" fill="#55c555" text-anchor="middle">생성되는 DOM (유효한 구조)</text>
  <rect x="470" y="278" width="340" height="115" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="298" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;table&gt;</text>
  <text x="482" y="316" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;tr&gt;</text>
  <text x="482" y="334" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;!-- 래퍼 없음 --&gt;</text>
  <text x="482" y="352" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;td&gt;이름&lt;/td&gt;</text>
  <text x="482" y="370" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;td&gt;나이&lt;/td&gt;</text>
  <text x="482" y="388" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;/tr&gt;</text>
  <text x="482" y="406" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;/table&gt;</text>
</svg>
