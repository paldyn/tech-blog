<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Fragment가 필요한 이유</text>

  <!-- Problem: div wrapper (left) -->
  <text x="220" y="78" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">❌ 불필요한 div 래퍼</text>
  <rect x="60" y="88" width="320" height="270" rx="10" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>

  <!-- JSX code in problem -->
  <rect x="76" y="100" width="288" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="120" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Columns() {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;div&gt;</tspan><tspan fill="#9aa4b8"> {/* 불필요! */}</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;td&gt;</tspan><tspan fill="#ffffff">이름</tspan><tspan fill="#ce9178">&lt;/td&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;td&gt;</tspan><tspan fill="#ffffff">나이</tspan><tspan fill="#ce9178">&lt;/td&gt;</tspan>
  </text>

  <!-- DOM output for problem -->
  <text x="220" y="220" text-anchor="middle" font-size="12" fill="#888">실제 DOM 출력</text>
  <rect x="76" y="228" width="288" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="248" fill="#ce9178">&lt;table&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">&lt;tr&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#e05555">&lt;div&gt;</tspan><tspan fill="#9aa4b8"> &lt;!-- 잘못된 DOM --&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;td&gt;</tspan><tspan fill="#ffffff">이름</tspan><tspan fill="#ce9178">&lt;/td&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;td&gt;</tspan><tspan fill="#ffffff">나이</tspan><tspan fill="#ce9178">&lt;/td&gt;</tspan>
    <tspan x="92" dy="18" fill="#e05555">    &lt;/div&gt;</tspan>
  </text>

  <!-- Solution: Fragment (right) -->
  <text x="660" y="78" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">✓ Fragment 사용</text>
  <rect x="500" y="88" width="320" height="270" rx="10" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>

  <!-- JSX code in solution -->
  <rect x="516" y="100" width="288" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="532" y="120" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Columns() {</tspan>
    <tspan x="532" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="532" dy="18" fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">&lt;&gt;</tspan><tspan fill="#9aa4b8"> {/* Fragment */}</tspan>
    <tspan x="532" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;td&gt;</tspan><tspan fill="#ffffff">이름</tspan><tspan fill="#ce9178">&lt;/td&gt;</tspan>
    <tspan x="532" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;td&gt;</tspan><tspan fill="#ffffff">나이</tspan><tspan fill="#ce9178">&lt;/td&gt;</tspan>
  </text>

  <!-- DOM output for solution -->
  <text x="660" y="220" text-anchor="middle" font-size="12" fill="#888">실제 DOM 출력</text>
  <rect x="516" y="228" width="288" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="532" y="248" fill="#ce9178">&lt;table&gt;</tspan>
    <tspan x="532" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">&lt;tr&gt;</tspan>
    <tspan x="532" dy="18" fill="#ffffff">    </tspan><tspan fill="#9aa4b8">&lt;!-- Fragment 흔적 없음 --&gt;</tspan>
    <tspan x="532" dy="18" fill="#ffffff">    </tspan><tspan fill="#55c555">&lt;td&gt;</tspan><tspan fill="#ffffff">이름</tspan><tspan fill="#55c555">&lt;/td&gt;</tspan>
    <tspan x="532" dy="18" fill="#ffffff">    </tspan><tspan fill="#55c555">&lt;td&gt;</tspan><tspan fill="#ffffff">나이</tspan><tspan fill="#55c555">&lt;/td&gt;</tspan>
    <tspan x="532" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">&lt;/tr&gt;</tspan>
  </text>

  <!-- Bottom explanation -->
  <rect x="60" y="378" width="760" height="60" rx="8" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Fragment는 DOM에 아무 흔적도 남기지 않는다</text>
  <text x="440" y="418" text-anchor="middle" font-size="12" fill="#888">&lt;&gt;...&lt;/&gt; (단축 문법)  =  &lt;React.Fragment&gt;...&lt;/React.Fragment&gt; (명시 문법)</text>
  <text x="440" y="436" text-anchor="middle" font-size="12" fill="#888">key prop이 필요한 경우에만 명시 문법 사용 — 단축 문법은 key를 지원하지 않는다</text>
</svg>
