<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Fragment — 불필요한 DOM 노드 없애기</text>

  <!-- Problem: wrapper div -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">문제: 불필요한 &lt;div&gt; 추가됨</text>
  <rect x="60" y="104" width="350" height="120" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Cols() {</tspan>
  </text>
  <text x="80" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> (</tspan>
  </text>
  <text x="80" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">
    <tspan>    &lt;div&gt;</tspan><tspan fill="#9aa4b8">  {/* 필요 없는 div */}</tspan>
  </text>
  <text x="80" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      &lt;td&gt;이름&lt;/td&gt;&lt;td&gt;값&lt;/td&gt;</tspan>
  </text>
  <text x="80" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">
    <tspan>    &lt;/div&gt;</tspan>
  </text>

  <!-- Solution: Fragment -->
  <text x="470" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">해결: Fragment 사용</text>
  <rect x="470" y="104" width="350" height="120" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="490" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Cols() {</tspan>
  </text>
  <text x="490" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> (</tspan>
  </text>
  <text x="490" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>    &lt;&gt;</tspan><tspan fill="#9aa4b8">  {/* Fragment: DOM에 안 남음 */}</tspan>
  </text>
  <text x="490" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      &lt;td&gt;이름&lt;/td&gt;&lt;td&gt;값&lt;/td&gt;</tspan>
  </text>
  <text x="490" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>    &lt;/&gt;</tspan>
  </text>

  <!-- Two syntax comparison -->
  <text x="60" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">두 가지 문법</text>

  <rect x="60" y="284" width="360" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">단축 문법 (권장)</text>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">&lt;&gt; ... &lt;/&gt;</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">key prop 사용 불가</text>

  <rect x="460" y="284" width="360" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">명시적 Fragment</text>
  <text x="480" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">&lt;React.Fragment key={id}&gt; ... &lt;/React.Fragment&gt;</text>
  <text x="480" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">key prop 사용 가능 (목록 렌더링 시)</text>

  <!-- Use case -->
  <rect x="60" y="396" width="760" height="44" rx="8" fill="#141414" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Fragment가 필요한 대표 케이스</text>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">table &gt; tr &gt; td 구조 · dl &gt; dt/dd 쌍 · flex/grid 레이아웃에서 여분 div 금지 시</text>
</svg>
