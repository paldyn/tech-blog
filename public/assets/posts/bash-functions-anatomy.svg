<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Bash 함수 구조</text>

  <!-- Syntax box -->
  <rect x="60" y="64" width="760" height="160" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="88" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">두 가지 선언 문법 (동일한 동작)</text>
  <rect x="76" y="98" width="338" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="118" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 방법 1: function 키워드</text>
  <text x="92" y="136" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> greet() {</tspan></text>
  <text x="92" y="154" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">local</tspan><tspan fill="#ffffff"> name=$1</tspan></text>
  <text x="92" y="172" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"Hello, $name"</tspan></text>
  <text x="92" y="190" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>

  <rect x="426" y="98" width="378" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="442" y="118" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 방법 2: 이름만 (POSIX 호환)</text>
  <text x="442" y="136" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">greet() {</tspan></text>
  <text x="442" y="154" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">local</tspan><tspan fill="#ffffff"> name=$1</tspan></text>
  <text x="442" y="172" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"Hello, $name"</tspan></text>
  <text x="442" y="190" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>

  <!-- Return value section -->
  <rect x="60" y="240" width="370" height="210" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="245" y="264" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">반환값</text>
  <rect x="76" y="274" width="338" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="294" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># return — 종료 코드 (0~255)</text>
  <text x="92" y="312" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">is_even() {</tspan></text>
  <text x="92" y="330" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    (( $1 % </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> == </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> )) &amp;&amp; </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0</tspan></text>
  <text x="92" y="348" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan></text>
  <text x="92" y="366" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>
  <text x="92" y="384" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> is_even </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"짝수"</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">fi</tspan></text>
  <text x="92" y="402" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 문자열 반환 — 명령 치환</text>
  <text x="92" y="420" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">result=$(greet </tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- Scope section -->
  <rect x="450" y="240" width="370" height="210" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="635" y="264" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">변수 범위 (scope)</text>
  <rect x="466" y="274" width="338" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="294" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">x=</tspan><tspan fill="#ce9178">"global"</tspan></text>
  <text x="482" y="312" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">demo() {</tspan></text>
  <text x="482" y="330" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">local</tspan><tspan fill="#ffffff"> x=</tspan><tspan fill="#ce9178">"local"</tspan><tspan fill="#9aa4b8"> # 함수 내 한정</tspan></text>
  <text x="482" y="348" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $x</tspan><tspan fill="#9aa4b8">   # local</tspan></text>
  <text x="482" y="366" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>
  <text x="482" y="384" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">demo</tspan></text>
  <text x="482" y="402" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $x</tspan><tspan fill="#9aa4b8">  # global (변경 없음)</tspan></text>
  <text x="482" y="420" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># local 없으면 전역 수정됨</text>
</svg>
