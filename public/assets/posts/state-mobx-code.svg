<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="45" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">MobX 6 — makeAutoObservable 패턴</text>

  <!-- ===== LEFT: Store 정의 ===== -->
  <rect x="60" y="70" width="380" height="30" fill="#0a1020" rx="6"/>
  <text x="250" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Store 정의</text>

  <rect x="60" y="100" width="380" height="290" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <text xml:space="preserve" x="80" y="122"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">import { makeAutoObservable }</text>
  <text xml:space="preserve" x="80" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  from 'mobx'</text>
  <text xml:space="preserve" x="80" y="165"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">class CartStore {</text>
  <text xml:space="preserve" x="80" y="183"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  items = []</text>
  <text xml:space="preserve" x="80" y="201"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  taxRate = 0.1</text>
  <text xml:space="preserve" x="80" y="225"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  constructor() {</text>
  <text xml:space="preserve" x="80" y="243"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">    makeAutoObservable(this)</text>
  <text xml:space="preserve" x="80" y="261"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text xml:space="preserve" x="80" y="279"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">  get total() {</text>
  <text xml:space="preserve" x="80" y="297"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    return this.items</text>
  <text xml:space="preserve" x="80" y="315"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      .reduce((s, i) =&gt;</text>
  <text xml:space="preserve" x="80" y="333"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        s + i.price, 0)</text>
  <text xml:space="preserve" x="80" y="351"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text xml:space="preserve" x="80" y="369"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  addItem(item) {</text>
  <text xml:space="preserve" x="80" y="382"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">    this.items.push(item)  }</text>

  <!-- ===== RIGHT: React 연동 ===== -->
  <rect x="460" y="70" width="380" height="30" fill="#0a1020" rx="6"/>
  <text x="650" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">React 연동</text>

  <rect x="460" y="100" width="380" height="290" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <text xml:space="preserve" x="480" y="122"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">import { observer }</text>
  <text xml:space="preserve" x="480" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  from 'mobx-react-lite'</text>
  <text xml:space="preserve" x="480" y="165"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// observer로 감싸면</text>
  <text xml:space="preserve" x="480" y="183"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// observable 변경 시</text>
  <text xml:space="preserve" x="480" y="201"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 자동 리렌더링</text>
  <text xml:space="preserve" x="480" y="219"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">const CartView =</text>
  <text xml:space="preserve" x="480" y="237"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  observer(({ store }) =&gt; {</text>
  <text xml:space="preserve" x="480" y="255"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    return (</text>
  <text xml:space="preserve" x="480" y="273"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      &lt;div&gt;</text>
  <text xml:space="preserve" x="480" y="291"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        &lt;p&gt;총액: {store.total}&lt;/p&gt;</text>
  <text xml:space="preserve" x="480" y="309"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        &lt;button onClick={() =&gt;</text>
  <text xml:space="preserve" x="480" y="327"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          store.addItem(...)</text>
  <text xml:space="preserve" x="480" y="345"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        &gt;추가&lt;/button&gt;</text>
  <text xml:space="preserve" x="480" y="363"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      &lt;/div&gt;</text>
  <text xml:space="preserve" x="480" y="381"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    )</text>
</svg>
