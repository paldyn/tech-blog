<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <defs>
    <marker id="arrow-cyan" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-purple" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#7777cc"/>
    </marker>
    <marker id="arrow-orange" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#ce9178"/>
    </marker>
    <marker id="arrow-red" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ML 시스템 생명주기</text>

  <!-- Center circle and text -->
  <ellipse cx="440" cy="262" rx="82" ry="66" fill="#111118" stroke="#333355" stroke-width="1.5"/>
  <text x="440" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e8e8e8">ML</text>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e8e8e8">라이프사이클</text>
  <text x="440" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">MLOps가 자동화하는 구간</text>

  <!-- Stage 1: 데이터 수집·준비 (top, ~12 o'clock) cx=440 cy=100 -->
  <rect x="340" y="76" width="200" height="62" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">데이터 수집·준비</text>
  <text x="440" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">수집 · 정제 · 레이블링</text>

  <!-- Stage 2: 모델 학습 (top-right, ~2 o'clock) cx=670 cy=160 -->
  <rect x="588" y="138" width="180" height="62" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="678" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">모델 학습</text>
  <text x="678" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">훈련 · 하이퍼파라미터 튜닝</text>

  <!-- Stage 3: 평가·검증 (bottom-right, ~4 o'clock) cx=670 cy=340 -->
  <rect x="588" y="318" width="180" height="62" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="678" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">평가·검증</text>
  <text x="678" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">지표 측정 · A/B 테스트</text>

  <!-- Stage 4: 배포 (bottom, ~6 o'clock) cx=440 cy=410 -->
  <rect x="340" y="386" width="200" height="62" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="411" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">배포</text>
  <text x="440" y="429" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">REST API · 컨테이너 · 엣지</text>

  <!-- Stage 5: 모니터링 (bottom-left, ~8 o'clock) cx=112 cy=340 -->
  <rect x="112" y="318" width="180" height="62" rx="8" fill="#1a1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="202" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">모니터링</text>
  <text x="202" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">드리프트 감지 · 알림</text>

  <!-- Stage 6: 피드백·재학습 (top-left, ~10 o'clock) cx=112 cy=160 -->
  <rect x="112" y="138" width="180" height="62" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="202" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">피드백·재학습</text>
  <text x="202" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터 피드백 · 트리거</text>

  <!-- Arrows connecting stages clockwise -->
  <!-- 1→2: top to top-right (데이터 → 모델 학습) -->
  <path d="M 540,100 Q 590,120 588,160" fill="none" stroke="#55c555" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- 2→3: top-right to bottom-right (모델 학습 → 평가) -->
  <path d="M 678,200 L 678,318" fill="none" stroke="#7777cc" stroke-width="1.8" marker-end="url(#arrow-purple)"/>

  <!-- 3→4: bottom-right to bottom (평가 → 배포) -->
  <path d="M 588,355 Q 540,380 540,386" fill="none" stroke="#ce9178" stroke-width="1.8" marker-end="url(#arrow-orange)"/>

  <!-- 4→5: bottom to bottom-left (배포 → 모니터링) -->
  <path d="M 340,415 Q 290,415 292,380" fill="none" stroke="#e05555" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- 5→6: bottom-left to top-left (모니터링 → 피드백) -->
  <path d="M 202,318 L 202,200" fill="none" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-cyan)"/>

  <!-- 6→1: top-left to top (피드백 → 데이터) -->
  <path d="M 292,165 Q 310,120 340,107" fill="none" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-cyan)"/>
</svg>
