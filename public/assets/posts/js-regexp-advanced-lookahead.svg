<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">전방탐색 · 후방탐색 (Lookahead · Lookbehind)</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">매치하지 않고 조건만 확인하는 zero-width 어서션</text>

  <!-- Table -->
  <rect x="60" y="88" width="760" height="36" rx="6" fill="#1a1f2e"/>
  <text x="170" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">구문</text>
  <text x="340" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">이름</text>
  <text x="590" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">설명</text>

  <rect x="60" y="124" width="760" height="36" fill="#111827"/>
  <text x="170" y="147" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">(?=x)</text>
  <text x="340" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Positive Lookahead</text>
  <text x="590" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">뒤에 x가 오는 위치에서 매치</text>

  <rect x="60" y="160" width="760" height="36" fill="#0d1117"/>
  <text x="170" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">(?!x)</text>
  <text x="340" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Negative Lookahead</text>
  <text x="590" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">뒤에 x가 없는 위치에서 매치</text>

  <rect x="60" y="196" width="760" height="36" fill="#111827"/>
  <text x="170" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">(?&lt;=x)</text>
  <text x="340" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Positive Lookbehind</text>
  <text x="590" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">앞에 x가 있는 위치에서 매치</text>

  <rect x="60" y="232" width="760" height="36" fill="#0d1117"/>
  <text x="170" y="255" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">(?&lt;!x)</text>
  <text x="340" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Negative Lookbehind</text>
  <text x="590" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">앞에 x가 없는 위치에서 매치</text>

  <!-- Code block -->
  <rect x="60" y="286" width="760" height="110" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실용 예제</text>
  <rect x="72" y="316" width="736" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 숫자 앞에 $ 통화 기호가 있는 경우만 추출</text>
  <text x="88" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'$100 and 200 and $300'</text><text x="300" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">.match(/(?&lt;=\$)\d+/g);</text>
  <text x="88" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// → ['100', '300']</text>
  <text x="88" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 소문자 뒤 대문자 위치에 _ 삽입 (camelCase→snake)</text>
</svg>
