<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pick · Omit 실전 패턴</text>

  <!-- API Response Pattern -->
  <rect x="60" y="68" width="365" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">// API 응답 타입 분리</text>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan font-weight="600" fill="#7ec8e3">type</tspan> UserPublic =</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Pick</tspan>&lt;User, <tspan fill="#ce9178">"id"</tspan> | <tspan fill="#ce9178">"name"</tspan>&gt;;</tspan>
    <tspan x="76" dy="20"> </tspan>
    <tspan x="76" dy="20"><tspan font-weight="600" fill="#7ec8e3">type</tspan> UserWithoutSecret =</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Omit</tspan>&lt;User,</tspan>
    <tspan x="76" dy="20">    <tspan fill="#ce9178">"password"</tspan> | <tspan fill="#ce9178">"salt"</tspan>&gt;;</tspan>
  </text>

  <!-- Form Pattern -->
  <rect x="455" y="68" width="365" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="471" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">// 생성/수정 폼 타입</text>
  <text x="471" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="471" dy="0"><tspan font-weight="600" fill="#7ec8e3">type</tspan> CreateUser =</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Omit</tspan>&lt;User, <tspan fill="#ce9178">"id"</tspan> | <tspan fill="#ce9178">"createdAt"</tspan>&gt;;</tspan>
    <tspan x="471" dy="20"> </tspan>
    <tspan x="471" dy="20"><tspan font-weight="600" fill="#7ec8e3">type</tspan> UpdateUser =</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Partial</tspan>&lt;</tspan>
    <tspan x="471" dy="20">    <tspan font-weight="600" fill="#7ec8e3">Omit</tspan>&lt;User, <tspan fill="#ce9178">"id"</tspan>&gt;&gt;;</tspan>
  </text>

  <!-- Component Props Pattern -->
  <rect x="60" y="262" width="365" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">// 컴포넌트 Props 파생</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan font-weight="600" fill="#7ec8e3">type</tspan> ButtonProps =</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Pick</tspan>&lt;HTMLButtonElement,</tspan>
    <tspan x="76" dy="20">    <tspan fill="#ce9178">"disabled"</tspan> | <tspan fill="#ce9178">"type"</tspan> | <tspan fill="#ce9178">"onClick"</tspan>&gt;</tspan>
    <tspan x="76" dy="20">  &amp; { label: <tspan fill="#b5cea8">string</tspan> };</tspan>
    <tspan x="76" dy="20"> </tspan>
    <tspan x="76" dy="20"><tspan fill="#9aa4b8">// DOM 타입에서 원하는 속성만</tspan></tspan>
  </text>

  <!-- Composition Pattern -->
  <rect x="455" y="262" width="365" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="471" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">// Pick + Omit 조합</text>
  <text x="471" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="471" dy="0"><tspan font-weight="600" fill="#7ec8e3">type</tspan> Override&lt;T, U&gt; =</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Omit</tspan>&lt;T, <tspan font-weight="600" fill="#7ec8e3">keyof</tspan> U&gt; &amp; U;</tspan>
    <tspan x="471" dy="20"> </tspan>
    <tspan x="471" dy="20"><tspan fill="#9aa4b8">// T의 일부를 U로 덮어쓰기</tspan></tspan>
    <tspan x="471" dy="20"><tspan font-weight="600" fill="#7ec8e3">type</tspan> StrictUser =</tspan>
    <tspan x="471" dy="20">  Override&lt;User,</tspan>
    <tspan x="471" dy="20">    { role: <tspan fill="#ce9178">"admin"</tspan> | <tspan fill="#ce9178">"user"</tspan> }&gt;;</tspan>
  </text>
</svg>
