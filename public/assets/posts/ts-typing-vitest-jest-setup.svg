<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">테스트 타입을 켜는 설정</text>
  <text x="60" y="78" font-size="13" fill="#888">전역 API 타입을 어떻게 인식시킬지가 첫 관문이다</text>

  <rect x="60" y="100" width="370" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" font-size="14" font-weight="600" fill="#7ec8e3">Vitest</text>
  <text x="76" y="152" font-size="13" fill="#ffffff">globals:true → tsconfig types에</text>
  <text x="76" y="172" font-size="13" fill="#ffffff">"vitest/globals" 추가</text>
  <text x="76" y="194" font-size="13" fill="#9aa4b8">또는 import { test } from "vitest"</text>

  <rect x="450" y="100" width="370" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="128" font-size="14" font-weight="600" fill="#55c555">Jest</text>
  <text x="466" y="152" font-size="13" fill="#ffffff">@types/jest 또는 @jest/globals</text>
  <text x="466" y="172" font-size="13" fill="#ffffff">ts-jest / babel-jest 변환</text>
  <text x="466" y="194" font-size="13" fill="#9aa4b8">describe·it·expect 전역 인식</text>

  <rect x="60" y="230" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="258" font-size="14" font-weight="600" fill="#e05555">공통: expect 매처도 타입을 본다</text>
  <text x="76" y="282" font-size="13" fill="#ffffff">expect(user).toEqual({ ... }) — 인자가 user 타입과 호환되는지 검사</text>
  <text x="76" y="304" font-size="13" fill="#9aa4b8">toHaveLength는 length 있는 값에만, toBeCloseTo는 number에만 등</text>
  <text x="76" y="322" font-size="13" fill="#9aa4b8">오타·타입 불일치를 테스트 실행 전에 잡는다</text>
</svg>
