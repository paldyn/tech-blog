<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <!-- 배경 -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">인증·인가 설정 코드 비교</text>

  <!-- 왼쪽: 인증 설정 코드 -->
  <rect x="50" y="66" width="378" height="340" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="239" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">인증 설정 (Authentication)</text>
  <line x1="50" y1="102" x2="428" y2="102" stroke="#3a4a6e" stroke-width="1"/>

  <!-- 인증 코드: body=102~406=304px, 11줄×18=198span
       pad=(304-198-13)/2=46.5 → first=102+46.5+10=158.5≈159 -->
  <text x="66" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 인증 방식 설정</text>
  <text x="66" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="66" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> SecurityFilterChain</tspan></text>
  <text x="66" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">auth(HttpSecurity http) </tspan><tspan fill="#7ec8e3" font-weight="600">throws</tspan><tspan fill="#ffffff"> Exception {</tspan></text>
  <text x="66" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#ffffff">http</tspan></text>
  <text x="66" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">.formLogin(form -&gt; form</tspan></text>
  <text x="66" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.loginPage(</tspan><tspan fill="#ce9178">"/login"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="66" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.permitAll()</tspan></text>
  <text x="66" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan x="94">)</tspan></text>
  <text x="66" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> http.build();</tspan></text>
  <text x="66" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- 오른쪽: 인가 설정 코드 -->
  <rect x="452" y="66" width="378" height="340" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="641" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">인가 설정 (Authorization)</text>
  <line x1="452" y1="102" x2="830" y2="102" stroke="#3a4a6e" stroke-width="1"/>

  <!-- 인가 코드: same dimensions -->
  <text x="468" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// URL 접근 권한 설정</text>
  <text x="468" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">http</tspan></text>
  <text x="468" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#ffffff">.authorizeHttpRequests(auth -&gt; auth</tspan></text>
  <text x="468" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="496" fill="#ffffff">.requestMatchers(</tspan><tspan fill="#ce9178">"/pub/**"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="468" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="510" fill="#55c555" font-weight="600">.permitAll()</tspan></text>
  <text x="468" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="496" fill="#ffffff">.requestMatchers(</tspan><tspan fill="#ce9178">"/admin/**"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="468" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="510" fill="#55c555" font-weight="600">.hasRole(</tspan><tspan fill="#ce9178">"ADMIN"</tspan><tspan fill="#55c555" font-weight="600">)</tspan></text>
  <text x="468" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="496" fill="#ffffff">.anyRequest()</tspan></text>
  <text x="468" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="510" fill="#55c555" font-weight="600">.authenticated()</tspan></text>
  <text x="468" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan x="482">);</tspan></text>
  <text x="468" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"><tspan x="468">// 메서드 레벨 인가</tspan></text>
  <text x="468" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@PreAuthorize</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"hasRole('ADMIN')"</tspan><tspan fill="#ffffff">)</tspan></text>
</svg>
