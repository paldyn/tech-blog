<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">0.1 + 0.2 는 정확히 0.3 이 아니다</text>

  <rect x="60" y="78" width="760" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="110" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8">&gt;&gt;&gt;</tspan><tspan fill="#ffffff"> 0.1 + 0.2</tspan></text>
  <text xml:space="preserve" x="80" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8">0.30000000000000004</text>
  <text xml:space="preserve" x="80" y="164" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8">&gt;&gt;&gt;</tspan><tspan fill="#ffffff"> 0.1 + 0.2 == 0.3</tspan></text>
  <text xml:space="preserve" x="80" y="188" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">False</text>

  <rect x="60" y="222" width="760" height="74" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="252" font-size="14" fill="#cccccc">0.1 은 이진 분수로 정확히 표현되지 않는다 (10진수의 1/3 처럼)</text>
  <text x="84" y="278" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">0.1 → 0.0001100110011001100... (무한 반복) → 가까운 값으로 반올림 저장</text>
</svg>
