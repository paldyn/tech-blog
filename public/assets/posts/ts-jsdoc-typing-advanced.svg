<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">JSDoc으로 제네릭과 import</text>
  <text x="60" y="76" font-size="14" fill="#888">.ts 없이도 제네릭·import 타입·캐스팅을 표현할 수 있다</text>

  <rect x="60" y="100" width="760" height="250" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="130" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 다른 파일의 타입을 import</text>
  <text xml:space="preserve" x="80" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#9aa4b8">/** @typedef {import('./types').User} User */</tspan></text>
  <text xml:space="preserve" x="80" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 제네릭 함수</text>
  <text xml:space="preserve" x="80" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#9aa4b8">/**</tspan></text>
  <text xml:space="preserve" x="80" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"> * @template T</text>
  <text xml:space="preserve" x="80" y="250" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"> * @param {T[]} arr</text>
  <text xml:space="preserve" x="80" y="270" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"> * @returns {T | undefined}</text>
  <text xml:space="preserve" x="80" y="290" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"> */</text>
  <text xml:space="preserve" x="80" y="310" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> first(arr) { <tspan fill="#7ec8e3" font-weight="600">return</tspan> arr[<tspan fill="#b5cea8">0</tspan>]; }</text>
  <text xml:space="preserve" x="80" y="338" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> u = <tspan fill="#9aa4b8">/** @type {User} */</tspan> (raw); <tspan fill="#9aa4b8">// 캐스팅</tspan></text>
</svg>
