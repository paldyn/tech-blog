<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">toolz 핵심 함수 예제</text>

  <!-- compose & pipe -->
  <rect x="60" y="68" width="360" height="160" rx="8" fill="#0f1a2e" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">compose &amp; pipe</text>
  <rect x="76" y="100" width="328" height="114" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> toolz </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> compose, pipe</tspan>
  </text>
  <text x="90" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># compose: 오른쪽→왼쪽</tspan>
  </text>
  <text x="90" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">f = compose(str, abs, int)</tspan>
  </text>
  <text x="90" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">f(</tspan><tspan fill="#b5cea8">-3.7</tspan>
    <tspan fill="#ffffff">)  </tspan>
    <tspan fill="#9aa4b8"># "3"  (int→abs→str)</tspan>
  </text>
  <text x="90" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># pipe: 왼쪽→오른쪽</tspan>
  </text>
  <text x="90" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
  </text>
  <text x="90" y="204" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"> </text>
  <text x="90" y="206" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">pipe(</tspan><tspan fill="#b5cea8">-3.7</tspan>
    <tspan fill="#ffffff">, int, abs, str)  </tspan>
    <tspan fill="#9aa4b8"># "3"</tspan>
  </text>

  <!-- curry & memoize -->
  <rect x="460" y="68" width="360" height="160" rx="8" fill="#0f2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">curry &amp; memoize</text>
  <rect x="476" y="100" width="328" height="114" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> toolz </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> curry, memoize</tspan>
  </text>
  <text x="490" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#55c555">@curry</tspan>
  </text>
  <text x="490" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> add(a, b, c): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> a+b+c</tspan>
  </text>
  <text x="490" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">add(</tspan><tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">)(</tspan><tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">)(</tspan><tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">)  </tspan>
    <tspan fill="#9aa4b8"># 6</tspan>
  </text>
  <text x="490" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">add(</tspan><tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">)(</tspan><tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">)  </tspan>
    <tspan fill="#9aa4b8"># 6 (혼합 가능)</tspan>
  </text>

  <!-- dicttoolz -->
  <rect x="60" y="248" width="360" height="148" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">dicttoolz</text>
  <rect x="76" y="280" width="328" height="102" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> toolz.dicttoolz </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> valmap, merge</tspan>
  </text>
  <text x="90" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">d = {</tspan>
    <tspan fill="#ce9178">"a"</tspan>
    <tspan fill="#ffffff">:</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">"b"</tspan>
    <tspan fill="#ffffff">:</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">"c"</tspan>
    <tspan fill="#ffffff">:</tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="90" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">valmap(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">lambda</tspan>
    <tspan fill="#ffffff"> v: v*</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">, d)  </tspan>
    <tspan fill="#9aa4b8"># {"a":2,"b":4,"c":6}</tspan>
  </text>
  <text x="90" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">merge(d, {</tspan>
    <tspan fill="#ce9178">"d"</tspan>
    <tspan fill="#ffffff">:</tspan>
    <tspan fill="#b5cea8">4</tspan>
    <tspan fill="#ffffff">})  </tspan>
    <tspan fill="#9aa4b8"># {"a":1,"b":2,"c":3,"d":4}</tspan>
  </text>

  <!-- frequencies & groupby -->
  <rect x="460" y="248" width="360" height="148" rx="8" fill="#2a1a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">frequencies &amp; groupby</text>
  <rect x="476" y="280" width="328" height="102" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> toolz </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> frequencies, groupby</tspan>
  </text>
  <text x="490" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">words = [</tspan>
    <tspan fill="#ce9178">"hi"</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#ce9178">"hello"</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#ce9178">"hi"</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#ce9178">"bye"</tspan>
    <tspan fill="#ffffff">]</tspan>
  </text>
  <text x="490" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">frequencies(words)  </tspan>
    <tspan fill="#9aa4b8"># {"hi":2,...}</tspan>
  </text>
  <text x="490" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">groupby(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">len</tspan>
    <tspan fill="#ffffff">, words)  </tspan>
    <tspan fill="#9aa4b8"># {2:[hi,hi],3:[bye]}</tspan>
  </text>
</svg>
