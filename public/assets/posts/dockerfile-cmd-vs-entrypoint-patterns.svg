<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" role="img" aria-label="CMD ENTRYPOINT 실전 패턴">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">실전 패턴: ENTRYPOINT + CMD</text>

  <!-- Code block -->
  <rect x="60" y="72" width="760" height="252" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 패턴 1: 실행 파일 고정 + 기본 인수 재정의 가능</text>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ENTRYPOINT</text>
  <text x="158" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> ["nginx"]</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">CMD</text>
  <text x="110" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">         ["-g", "daemon off;"]</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># docker run img        → nginx -g "daemon off;"</text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># docker run img -t     → nginx -t (설정 검사)</text>

  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 패턴 2: 래퍼 스크립트로 초기화 처리</text>
  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">COPY</text>
  <text x="110" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> docker-entrypoint.sh /</text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ENTRYPOINT</text>
  <text x="158" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> ["/docker-entrypoint.sh"]</text>
  <text x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">CMD</text>
  <text x="110" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">         ["node", "server.js"]</text>

  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># ENTRYPOINT 완전 무시: --entrypoint 플래그</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># docker run --entrypoint /bin/sh img</text>
</svg>
