<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">필수값 검사 판단 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">null · 빈 문자열 · 공백만 있는 값 — 세 가지 모두 차단</text>

  <!-- 값 가져오기 -->
  <rect x="330" y="96" width="220" height="44" fill="#0d2137" rx="8" stroke="#2a4a7a" stroke-width="1.5"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">ds.getColumn(row, col)</text>

  <!-- 화살표 -->
  <line x1="440" y1="140" x2="440" y2="160" stroke="#555" stroke-width="1.5"/>
  <polygon points="434,160 440,172 446,160" fill="#555"/>

  <!-- null 체크 -->
  <rect x="310" y="172" width="260" height="44" fill="#111" rx="8" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">값 == null ?</text>

  <!-- Yes → 실패 (왼쪽) -->
  <line x1="310" y1="194" x2="200" y2="194" stroke="#555" stroke-width="1.5"/>
  <line x1="200" y1="194" x2="200" y2="290" stroke="#555" stroke-width="1.5"/>
  <polygon points="194,290 200,302 206,290" fill="#e05555"/>
  <text x="245" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Yes</text>

  <!-- No → 계속 -->
  <line x1="440" y1="216" x2="440" y2="236" stroke="#555" stroke-width="1.5"/>
  <polygon points="434,236 440,248 446,236" fill="#555"/>
  <text x="452" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">No</text>

  <!-- 빈 문자열 체크 -->
  <rect x="310" y="248" width="260" height="44" fill="#111" rx="8" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">trim() 후 길이 == 0 ?</text>

  <!-- Yes → 실패 (왼쪽) -->
  <line x1="310" y1="270" x2="240" y2="270" stroke="#555" stroke-width="1.5"/>
  <line x1="240" y1="270" x2="200" y2="290" stroke="#555" stroke-width="1.5"/>
  <text x="215" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Yes</text>

  <!-- No → 통과 (오른쪽) -->
  <line x1="570" y1="270" x2="680" y2="270" stroke="#555" stroke-width="1.5"/>
  <polygon points="680,264 692,270 680,276" fill="#55c555"/>
  <text x="620" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">No → 통과</text>

  <!-- 실패 박스 -->
  <rect x="80" y="302" width="240" height="60" fill="#1e0d0d" rx="8" stroke="#4a1e1e" stroke-width="1.5"/>
  <text x="200" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">검증 실패</text>
  <text x="200" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">alert + 포커스 이동</text>
  <text x="200" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">return false</text>

  <!-- 통과 박스 -->
  <rect x="600" y="246" width="220" height="60" fill="#0d1e0d" rx="8" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="710" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">검증 통과</text>
  <text x="710" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">다음 필드로 진행</text>
  <text x="710" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">return true</text>

  <!-- 주의사항 박스 -->
  <rect x="60" y="390" width="760" height="34" fill="#0f0f0f" rx="6" stroke="#333" stroke-width="1"/>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">⚠ "  " (공백만) 도 빈 값으로 처리해야 함 — nexacro에서 getColumn()은 공백 문자열을 그대로 반환</text>
</svg>
