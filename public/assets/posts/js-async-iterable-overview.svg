<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">비동기 이터러블 프로토콜</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Symbol.asyncIterator · for await...of</text>

  <!-- 동기 vs 비동기 비교 -->
  <!-- 동기 -->
  <rect x="60" y="96" width="360" height="170" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">동기 이터러블</text>
  <rect x="80" y="126" width="320" height="120" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="96" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">obj[</tspan><tspan fill="#7ec8e3">Symbol</tspan><tspan fill="#ffffff">.iterator]</tspan></text>

  <text x="96" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">→ iterator 반환</text>
  <text x="96" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">iterator.next()</text>
  <text x="96" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">→ { value, done } 즉시</text>
  <text x="96" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> v </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#ffffff"> iter)</tspan><tspan fill="#ffffff"> ...</tspan></text>

  <!-- 비동기 -->
  <rect x="460" y="96" width="360" height="170" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">비동기 이터러블</text>
  <rect x="480" y="126" width="320" height="120" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="496" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">obj[</tspan><tspan fill="#7ec8e3">Symbol</tspan><tspan fill="#ffffff">.asyncIterator]</tspan></text>

  <text x="496" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">→ asyncIterator 반환</text>
  <text x="496" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">iterator.next()</text>
  <text x="496" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">→ Promise&lt;{ value, done }&gt;</text>
  <text x="496" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">for await</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> v </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#ffffff"> iter)</tspan><tspan fill="#ffffff"> ...</tspan></text>

  <!-- 비동기 제너레이터 예 -->
  <rect x="60" y="290" width="760" height="170" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 비동기 제너레이터 — 페이지네이션 API</text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">async function</tspan><tspan fill="#ffffff">* fetchPages(baseUrl) {</tspan></text>
  
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  let</tspan><tspan fill="#ffffff"> cursor = </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  do</text>
  <text x="104" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> {</text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    const</tspan><tspan fill="#ffffff"> url = cursor ? `${baseUrl}?cursor=${cursor}` : baseUrl;</tspan></text>
  
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    const</tspan><tspan fill="#ffffff"> data = </tspan><tspan fill="#7ec8e3">await</tspan><tspan fill="#ffffff"> fetch(url).then(r => r.json());</tspan></text>

  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    yield</tspan><tspan fill="#ffffff"> data.items;    cursor = data.nextCursor;</tspan></text>
  
  <text x="76" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  } </text>
  <text x="104" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">while</text>
  <text x="136" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (cursor);</text>
  <text x="76" y="458" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

</svg>
