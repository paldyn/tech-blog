<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">마스터-디테일 화면 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Master Grid → currentrow 변경 → Detail 자동 조회</text>

  <!-- Master Grid -->
  <rect x="60" y="96" width="350" height="240" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Master Grid (주문 목록)</text>
  <text x="235" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">binddataset=dsMaster</text>
  <line x1="60" y1="140" x2="410" y2="140" stroke="#222" stroke-width="1"/>
  <text x="100" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">주문번호</text>
  <text x="210" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">고객명</text>
  <text x="310" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">금액</text>
  <line x1="60" y1="164" x2="410" y2="164" stroke="#222" stroke-width="1"/>
  <!-- Selected row -->
  <rect x="61" y="165" width="348" height="22" rx="0" fill="#1a2233"/>
  <text x="100" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">ORD-001 ◄</text>
  <text x="210" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">홍길동</text>
  <text x="310" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">150,000</text>
  <text x="100" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ORD-002</text>
  <text x="210" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이순신</text>
  <text x="310" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">80,000</text>
  <text x="100" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ORD-003</text>
  <text x="210" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">강감찬</text>
  <text x="310" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">230,000</text>

  <!-- Event label -->
  <text x="235" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">oncurrentchanged</text>
  <text x="235" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">→ fn_getDetail(ORD-001)</text>

  <!-- Arrow -->
  <polygon points="430,192 460,184 460,200" fill="#55c555"/>
  <line x1="410" y1="192" x2="460" y2="192" stroke="#55c555" stroke-width="2.5"/>
  <text x="435" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">선택</text>
  <text x="435" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">조회</text>

  <!-- Detail Grid -->
  <rect x="460" y="96" width="360" height="240" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Detail Grid (주문 상세)</text>
  <text x="640" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">binddataset=dsDetail</text>
  <line x1="460" y1="140" x2="820" y2="140" stroke="#222" stroke-width="1"/>
  <text x="490" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">상품코드</text>
  <text x="590" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">상품명</text>
  <text x="700" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">수량</text>
  <text x="750" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단가</text>
  <line x1="460" y1="164" x2="820" y2="164" stroke="#222" stroke-width="1"/>
  <text x="490" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">P001</text>
  <text x="590" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">노트북</text>
  <text x="700" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">1</text>
  <text x="750" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">120,000</text>
  <text x="490" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">P003</text>
  <text x="590" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">마우스</text>
  <text x="700" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">2</text>
  <text x="750" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">15,000</text>
  <text x="640" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ORD-001의 상세 목록</text>
  <text x="640" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">dsDetail ← transaction 결과</text>

  <!-- Event flow -->
  <rect x="60" y="358" width="760" height="96" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">이벤트 흐름</text>
  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">① grdMaster 행 클릭 → dsMaster.oncurrentchanged 발화</text>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">② dsMaster.getColumn(currentrow, "ORD_NO") 로 키 값 추출</text>
  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">③ transaction("detail", SVC, input=dsParam, output=dsDetail) 호출</text>
</svg>
