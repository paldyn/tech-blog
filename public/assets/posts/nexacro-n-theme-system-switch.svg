<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">테마 전환 구현 패턴</text>

  <!-- Before: Light -->
  <rect x="60" y="72" width="340" height="180" rx="8" fill="#f8f8f0" stroke="#ccc" stroke-width="1.5"/>
  <text x="230" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#333" text-anchor="middle">라이트 테마 (light.ess)</text>
  <rect x="80" y="110" width="300" height="28" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <text x="230" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#333" text-anchor="middle">[ 저장 ]   [ 조회 ]   [ 삭제 ]</text>
  <rect x="80" y="148" width="300" height="50" rx="4" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <text x="230" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">이름: 홍길동</text>
  <text x="230" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">부서: 개발팀</text>
  <rect x="80" y="208" width="300" height="28" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="230" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#999" text-anchor="middle">그리드 헤더 (밝은 배경)</text>

  <!-- Arrow -->
  <line x1="405" y1="162" x2="469" y2="162" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="437" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">setTheme</text>
  <text x="437" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">("dark")</text>

  <!-- After: Dark -->
  <rect x="475" y="72" width="340" height="180" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="645" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">다크 테마 (dark.ess)</text>
  <rect x="495" y="110" width="300" height="28" rx="4" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="645" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">[ 저장 ]   [ 조회 ]   [ 삭제 ]</text>
  <rect x="495" y="148" width="300" height="50" rx="4" fill="#252525" stroke="#444" stroke-width="1"/>
  <text x="645" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ccc" text-anchor="middle">이름: 홍길동</text>
  <text x="645" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ccc" text-anchor="middle">부서: 개발팀</text>
  <rect x="495" y="208" width="300" height="28" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="645" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777" text-anchor="middle">그리드 헤더 (어두운 배경)</text>

  <!-- Code box -->
  <rect x="60" y="276" width="760" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 테마 전환 공통 함수</text>
  <text x="80" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> gfn_setTheme(sTheme) {</tspan>
  </text>
  <text x="80" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  nexacro.setTheme(sTheme); gfn_setCookie(</tspan>
    <tspan fill="#ce9178">"THEME"</tspan>
    <tspan fill="#ffffff">, sTheme, </tspan>
    <tspan fill="#b5cea8">365</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="80" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
</svg>
