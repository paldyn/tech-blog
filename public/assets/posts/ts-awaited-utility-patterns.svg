<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Awaited 실전 패턴</text>

  <!-- Promise.all -->
  <rect x="60" y="68" width="365" height="152" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">// Promise.all 결과 타입</text>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan font-weight="600" fill="#7ec8e3">const</tspan> results =</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">await</tspan> Promise.all([</tspan>
    <tspan x="76" dy="20">    fetchUser(id),</tspan>
    <tspan x="76" dy="20">    fetchPosts(id),</tspan>
    <tspan x="76" dy="20">  ]);</tspan>
    <tspan x="76" dy="20"><tspan fill="#9aa4b8">// results: [User, Post[]]</tspan></tspan>
  </text>

  <!-- Generic async util -->
  <rect x="455" y="68" width="365" height="152" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="471" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">// 제네릭 async 유틸리티</text>
  <text x="471" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="471" dy="0"><tspan font-weight="600" fill="#7ec8e3">type</tspan> AsyncValue&lt;F</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">extends</tspan> () =&gt; Promise&lt;any&gt;</tspan>
    <tspan x="471" dy="20">&gt; = Awaited&lt;ReturnType&lt;F&gt;&gt;;</tspan>
    <tspan x="471" dy="20"> </tspan>
    <tspan x="471" dy="20"><tspan font-weight="600" fill="#7ec8e3">type</tspan> UserData =</tspan>
    <tspan x="471" dy="20">  AsyncValue&lt;<tspan font-weight="600" fill="#7ec8e3">typeof</tspan> fetchUser&gt;;</tspan>
  </text>

  <!-- useQuery pattern -->
  <rect x="60" y="242" width="365" height="152" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">// React Query 데이터 타입</text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan font-weight="600" fill="#7ec8e3">const</tspan> { data } = useQuery({</tspan>
    <tspan x="76" dy="20">  queryFn: fetchProduct,</tspan>
    <tspan x="76" dy="20">});</tspan>
    <tspan x="76" dy="20"><tspan font-weight="600" fill="#7ec8e3">type</tspan> Product =</tspan>
    <tspan x="76" dy="20">  Awaited&lt;ReturnType&lt;</tspan>
    <tspan x="76" dy="20">    <tspan font-weight="600" fill="#7ec8e3">typeof</tspan> fetchProduct&gt;&gt;;</tspan>
  </text>

  <!-- Retry wrapper -->
  <rect x="455" y="242" width="365" height="152" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="471" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">// 재시도 래퍼 타입 보존</text>
  <text x="471" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="471" dy="0"><tspan font-weight="600" fill="#7ec8e3">async function</tspan> retry&lt;T&gt;(</tspan>
    <tspan x="471" dy="20">  fn: () =&gt; Promise&lt;T&gt;,</tspan>
    <tspan x="471" dy="20">  times = <tspan fill="#b5cea8">3</tspan></tspan>
    <tspan x="471" dy="20">): Promise&lt;T&gt; {</tspan>
    <tspan x="471" dy="20">  <tspan fill="#9aa4b8">// Awaited&lt;Promise&lt;T&gt;&gt; = T</tspan></tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">return</tspan> fn();</tspan>
  </text>
</svg>
