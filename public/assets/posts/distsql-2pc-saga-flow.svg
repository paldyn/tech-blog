<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">2PC (2단계 커밋) 프로토콜 흐름</text>

  <!-- Phase 1 label -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">Phase 1 — Prepare</text>

  <!-- Coordinator box -->
  <rect x="340" y="105" width="200" height="52" rx="8" fill="#12213a" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="440" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Coordinator</text>
  <text x="440" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">트랜잭션 조율자</text>

  <!-- Participant A box -->
  <rect x="60" y="220" width="170" height="52" rx="8" fill="#1a2a1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="145" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Participant A</text>
  <text x="145" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">노드 A</text>

  <!-- Participant B box -->
  <rect x="340" y="220" width="170" height="52" rx="8" fill="#1a2a1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="425" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Participant B</text>
  <text x="425" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">노드 B</text>

  <!-- Participant C box -->
  <rect x="620" y="220" width="170" height="52" rx="8" fill="#1a2a1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="705" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Participant C</text>
  <text x="705" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">노드 C</text>

  <!-- Arrows: Coordinator -> Participants (PREPARE) -->
  <line x1="390" y1="157" x2="195" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="258" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">PREPARE</text>

  <line x1="430" y1="157" x2="425" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="450" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">PREPARE</text>

  <line x1="490" y1="157" x2="665" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="610" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">PREPARE</text>

  <!-- Arrows: Participants -> Coordinator (VOTE YES) -->
  <line x1="195" y1="272" x2="380" y2="330" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="255" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">VOTE YES</text>

  <line x1="425" y1="272" x2="430" y2="330" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="400" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">VOTE YES</text>

  <line x1="665" y1="272" x2="500" y2="330" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="618" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">VOTE YES</text>

  <!-- Phase 2 label -->
  <text x="60" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">Phase 2 — Commit</text>

  <!-- Coordinator box phase 2 -->
  <rect x="340" y="330" width="200" height="52" rx="8" fill="#12213a" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Coordinator</text>
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 YES → COMMIT 결정</text>

  <!-- Commit arrows -->
  <line x1="390" y1="382" x2="195" y2="440" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="258" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">COMMIT</text>

  <line x1="430" y1="382" x2="425" y2="440" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="452" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">COMMIT</text>

  <line x1="490" y1="382" x2="665" y2="440" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="618" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">COMMIT</text>

  <!-- ACK participants bottom -->
  <rect x="60" y="440" width="170" height="40" rx="8" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="145" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">COMMITTED ✓</text>

  <rect x="340" y="440" width="170" height="40" rx="8" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="425" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">COMMITTED ✓</text>

  <rect x="620" y="440" width="170" height="40" rx="8" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="705" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">COMMITTED ✓</text>

  <!-- Bottom note -->
  <text x="440" y="512" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">하나라도 VOTE NO → 전체 ROLLBACK</text>
</svg>
