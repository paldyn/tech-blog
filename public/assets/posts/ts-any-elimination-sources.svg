<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="ae_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">any는 어디서 들어오나</text>
  <text x="60" y="76" font-size="14" fill="#888">유입 경로마다 정해진 대체 전략이 있다</text>

  <!-- sources -->
  <rect x="60" y="100" width="320" height="250" fill="#101418" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="134" font-size="16" font-weight="600" fill="#e05555">유입 경로</text>
  <text x="84" y="168" font-size="13" fill="#888">JSON.parse() 결과</text>
  <text x="84" y="200" font-size="13" fill="#888">catch (e) 의 e</text>
  <text x="84" y="232" font-size="13" fill="#888">타입 없는 서드파티 라이브러리</text>
  <text x="84" y="264" font-size="13" fill="#888">as any 캐스팅</text>
  <text x="84" y="296" font-size="13" fill="#888">암묵적 any (타입 누락)</text>
  <text x="84" y="328" font-size="13" fill="#888">any[] · Function · object</text>

  <!-- arrow -->
  <line x1="380" y1="225" x2="500" y2="225" stroke="#55c555" stroke-width="2.5" marker-end="url(#ae_arr)"/>
  <text x="440" y="210" font-size="12" fill="#9aa4b8" text-anchor="middle">대체</text>

  <!-- replacements -->
  <rect x="520" y="100" width="300" height="250" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="544" y="134" font-size="16" font-weight="600" fill="#55c555">대체 전략</text>
  <text x="544" y="168" font-size="13" fill="#888">→ unknown + 스키마 검증</text>
  <text x="544" y="200" font-size="13" fill="#888">→ unknown + instanceof 좁힘</text>
  <text x="544" y="232" font-size="13" fill="#888">→ @types 설치 or 선언 작성</text>
  <text x="544" y="264" font-size="13" fill="#888">→ 정확한 타입으로 캐스팅</text>
  <text x="544" y="296" font-size="13" fill="#888">→ 타입 명시 / 제네릭</text>
  <text x="544" y="328" font-size="13" fill="#888">→ unknown[] · 구체 시그니처</text>
</svg>
