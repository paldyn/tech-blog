<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">set과 frozenset — 집합 자료구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">중복 제거 · 집합 연산 · 불변 집합</text>

  <!-- Set operations visual -->
  <!-- Union circle A -->
  <circle cx="320" cy="156" r="50" fill="#7ec8e3" fill-opacity="0.15" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="295" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">A</text>
  <text x="295" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">{1,2,3}</text>

  <!-- circle B -->
  <circle cx="380" cy="156" r="50" fill="#7777cc" fill-opacity="0.15" stroke="#7777cc" stroke-width="1.5"/>
  <text x="405" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">B</text>
  <text x="405" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">{3,4,5}</text>

  <text x="350" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">교집합: {3}</text>

  <!-- operation labels -->
  <text x="120" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">| (합집합)</text>
  <text x="120" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">{1,2,3,4,5}</text>
  <text x="120" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">&amp; (교집합)</text>
  <text x="120" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">{3}</text>

  <text x="560" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">- (차집합 A-B)</text>
  <text x="560" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">{1, 2}</text>
  <text x="560" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">^ (대칭차)</text>
  <text x="560" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">{1,2,4,5}</text>

  <!-- Code left -->
  <rect x="60" y="248" width="380" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 생성</tspan></text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s = {</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">}</tspan></text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s2 = </tspan><tspan fill="#7ec8e3">set</tspan><tspan fill="#e8e8e8">([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">])</tspan><tspan fill="#6a8aa0"> # 중복 제거</tspan></text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">empty = </tspan><tspan fill="#7ec8e3">set</tspan><tspan fill="#e8e8e8">()  </tspan><tspan fill="#6a8aa0"># {} 는 dict!</tspan></text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 추가·삭제</tspan></text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.</tspan><tspan fill="#7ec8e3">add</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.</tspan><tspan fill="#7ec8e3">discard</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#e8e8e8">)  </tspan><tspan fill="#6a8aa0"># 없어도 오류 없음</tspan></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.</tspan><tspan fill="#7ec8e3">remove</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">)   </tspan><tspan fill="#6a8aa0"># 없으면 KeyError</tspan></text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> s        </tspan><tspan fill="#6a8aa0"># O(1) 검사</tspan></text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s.</tspan><tspan fill="#7ec8e3">pop</tspan><tspan fill="#e8e8e8">()          </tspan><tspan fill="#6a8aa0"># 임의 원소 제거</tspan></text>

  <!-- Code right -->
  <rect x="460" y="248" width="360" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 집합 연산</tspan></text>
  <text x="476" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">A = {</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">}; B = {</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">}</tspan></text>
  <text x="476" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">A | B   </tspan><tspan fill="#6a8aa0"># {1,2,3,4,5} 합</tspan></text>
  <text x="476" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">A &amp; B   </tspan><tspan fill="#6a8aa0"># {3}       교</tspan></text>
  <text x="476" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">A - B   </tspan><tspan fill="#6a8aa0"># {1,2}     차</tspan></text>
  <text x="476" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">A ^ B   </tspan><tspan fill="#6a8aa0"># {1,2,4,5} 대칭차</tspan></text>
  <text x="476" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 부분집합·상위집합</tspan></text>
  <text x="476" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">{</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">} &lt;= A  </tspan><tspan fill="#6a8aa0"># True (부분집합)</tspan></text>
  <text x="476" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># frozenset</tspan></text>
  <text x="476" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">fs = </tspan><tspan fill="#7ec8e3">frozenset</tspan><tspan fill="#e8e8e8">({</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">})</tspan></text>
  <text x="476" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d = {fs: </tspan><tspan fill="#ce9178">"key"</tspan><tspan fill="#e8e8e8">}  </tspan><tspan fill="#6a8aa0"># 해시 가능!</tspan></text>
</svg>
