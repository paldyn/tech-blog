<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">cp · mv · rm 동작 원리</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">원본 보존 여부와 이름 변경 여부가 핵심 차이</text>

  <!-- cp operation -->
  <text x="80" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">cp — 복사</text>
  <!-- Source box -->
  <rect x="60" y="110" width="120" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">src.txt</text>
  <!-- Arrow -->
  <polygon points="222,130 240,122 240,138" fill="#7ec8e3"/>
  <line x1="180" y1="130" x2="239" y2="130" stroke="#7ec8e3" stroke-width="2"/>
  <text x="210" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">cp</text>
  <!-- Dest box -->
  <rect x="240" y="110" width="120" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="300" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">dst.txt</text>
  <!-- Source remains -->
  <text x="120" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">원본 유지</text>
  <text x="300" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">새로 생성</text>

  <!-- mv operation -->
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c55a">mv — 이동/이름 변경</text>
  <rect x="60" y="210" width="120" height="40" fill="#1a1a2e" rx="6" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="120" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" text-anchor="middle">old.txt</text>
  <polygon points="222,230 240,222 240,238" fill="#e8c55a"/>
  <line x1="180" y1="230" x2="239" y2="230" stroke="#e8c55a" stroke-width="2"/>
  <text x="210" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c55a" text-anchor="middle">mv</text>
  <rect x="240" y="210" width="120" height="40" fill="#1a1a2e" rx="6" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="300" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" text-anchor="middle">new.txt</text>
  <!-- Source gone -->
  <line x1="74" y1="265" x2="166" y2="265" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="120" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">원본 사라짐</text>
  <text x="300" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">새 위치/이름</text>

  <!-- rm operation -->
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">rm — 삭제</text>
  <rect x="60" y="316" width="120" height="40" fill="#1a1a2e" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="120" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">file.txt</text>
  <polygon points="222,336 240,328 240,344" fill="#e05555"/>
  <line x1="180" y1="336" x2="239" y2="336" stroke="#e05555" stroke-width="2"/>
  <text x="210" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">rm</text>
  <rect x="240" y="316" width="120" height="40" fill="#1a0808" rx="6" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="300" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#555" text-anchor="middle">사라짐</text>
  <text x="300" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">복구 불가</text>

  <!-- Key options right panel -->
  <rect x="460" y="92" width="360" height="280" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">cp 주요 옵션</text>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cp -r  <tspan fill="#9aa4b8"># 디렉터리 재귀 복사</tspan></text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cp -i  <tspan fill="#9aa4b8"># 덮어쓰기 전 확인</tspan></text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cp -p  <tspan fill="#9aa4b8"># 권한·시간 유지</tspan></text>
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cp -a  <tspan fill="#9aa4b8"># 아카이브 모드 (-dRp)</tspan></text>
  <text x="476" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cp -u  <tspan fill="#9aa4b8"># 더 새 파일만 복사</tspan></text>

  <text x="476" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c55a">mv 주요 옵션</text>
  <text x="476" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">mv -i  <tspan fill="#9aa4b8"># 덮어쓰기 전 확인</tspan></text>
  <text x="476" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">mv -n  <tspan fill="#9aa4b8"># 기존 파일 덮어쓰기 금지</tspan></text>
  <text x="476" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">mv -v  <tspan fill="#9aa4b8"># 이동 과정 출력</tspan></text>

  <text x="476" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">rm 주요 옵션</text>
  <text x="476" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">rm -i  <tspan fill="#9aa4b8"># 삭제 전 확인</tspan></text>
  <text x="476" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">rm -r  <tspan fill="#9aa4b8"># 디렉터리 재귀 삭제</tspan></text>
  <text x="476" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">rm -rf <tspan fill="#9aa4b8"># 강제 재귀 삭제 ⚠</tspan></text>
</svg>
