<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">산술 연산 매직 메서드 전체 목록</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">이진 연산: 일반/반사/복합 대입 세 가지 버전</text>

  <!-- Header -->
  <rect x="60" y="88" width="760" height="32" rx="6" fill="#1a2332"/>
  <text x="120" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">연산자</text>
  <text x="270" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">일반 (a op b)</text>
  <text x="440" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">반사 (b op a)</text>
  <text x="610" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">복합 대입 (a op= b)</text>
  <text x="760" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">의미</text>

  <!-- Rows -->
  <rect x="60" y="122" width="760" height="26" fill="#0d1117"/>
  <text x="120" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">+</text>
  <text x="270" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">__add__</text>
  <text x="440" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">__radd__</text>
  <text x="610" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">__iadd__</text>
  <text x="760" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">덧셈</text>

  <rect x="60" y="150" width="760" height="26" fill="#111"/>
  <text x="120" y="168" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">-</text>
  <text x="270" y="168" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">__sub__</text>
  <text x="440" y="168" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">__rsub__</text>
  <text x="610" y="168" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">__isub__</text>
  <text x="760" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">뺄셈</text>

  <rect x="60" y="178" width="760" height="26" fill="#0d1117"/>
  <text x="120" y="196" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">*</text>
  <text x="270" y="196" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">__mul__</text>
  <text x="440" y="196" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">__rmul__</text>
  <text x="610" y="196" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">__imul__</text>
  <text x="760" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">곱셈</text>

  <rect x="60" y="206" width="760" height="26" fill="#111"/>
  <text x="120" y="224" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">/</text>
  <text x="270" y="224" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">__truediv__</text>
  <text x="440" y="224" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">__rtruediv__</text>
  <text x="610" y="224" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">__itruediv__</text>
  <text x="760" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">나눗셈</text>

  <rect x="60" y="234" width="760" height="26" fill="#0d1117"/>
  <text x="120" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">//</text>
  <text x="270" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">__floordiv__</text>
  <text x="440" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">__rfloordiv__</text>
  <text x="610" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">__ifloordiv__</text>
  <text x="760" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정수 나눗셈</text>

  <rect x="60" y="262" width="760" height="26" fill="#111"/>
  <text x="120" y="280" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">%</text>
  <text x="270" y="280" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">__mod__</text>
  <text x="440" y="280" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">__rmod__</text>
  <text x="610" y="280" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">__imod__</text>
  <text x="760" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">나머지</text>

  <rect x="60" y="290" width="760" height="26" fill="#0d1117"/>
  <text x="120" y="308" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">**</text>
  <text x="270" y="308" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">__pow__</text>
  <text x="440" y="308" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">__rpow__</text>
  <text x="610" y="308" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">__ipow__</text>
  <text x="760" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">거듭제곱</text>

  <!-- Unary -->
  <rect x="60" y="330" width="760" height="26" fill="#1a1a2e"/>
  <text x="120" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">단항</text>
  <text x="270" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">__neg__  __pos__</text>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">-obj, +obj</text>
  <text x="610" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">__abs__  __invert__</text>
  <text x="760" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">abs(), ~obj</text>

  <!-- Note -->
  <rect x="60" y="370" width="760" height="70" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">__iadd__ 구현 주의점</text>
  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">불변 객체: __iadd__ 구현하지 않거나 새 객체 반환. a += b → a = a.__add__(b)</text>
  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">가변 객체: self 수정 후 return self. a += b → a.__iadd__(b); a 변경됨</text>
</svg>
