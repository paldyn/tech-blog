<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Heap · TOAST 분석 SQL</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">ctid · 페이지 크기 · TOAST 설정 확인</text>

  <!-- Left -->
  <rect x="60" y="92" width="370" height="300" rx="12" fill="#0e1623" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">Heap 물리 위치 &amp; Dead Tuple</text>
  <rect x="76" y="124" width="338" height="252" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="92" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- ctid: (page_no, item_offset)</text>
  <text x="92" y="166" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> ctid, id, amount</text>
  <text x="92" y="184" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  orders <tspan fill="#7ec8e3">LIMIT</tspan> <tspan fill="#b5cea8">5</tspan>;</text>
  <text x="92" y="202" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- (0,1) = 0번 페이지 1번 슬롯</text>

  <text x="92" y="230" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- Dead Tuple 비율 확인</text>
  <text x="92" y="248" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> relname,</text>
  <text x="92" y="266" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  n_live_tup, n_dead_tup,</text>
  <text x="92" y="284" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  last_vacuum, last_autovacuum</text>
  <text x="92" y="302" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  pg_stat_user_tables</text>
  <text x="92" y="320" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ORDER BY</tspan> n_dead_tup <tspan fill="#7ec8e3">DESC</tspan>;</text>

  <text x="92" y="348" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 테이블 파일 크기</text>
  <text x="92" y="366" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> pg_size_pretty(</text>
  <text x="92" y="384" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  pg_total_relation_size(<tspan fill="#ce9178">'orders'</tspan>));</text>

  <!-- Right -->
  <rect x="450" y="92" width="370" height="300" rx="12" fill="#1a1208" stroke="#e0a833" stroke-width="1.5"/>
  <text x="635" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#e0a833">TOAST 설정 확인 &amp; 조정</text>
  <rect x="466" y="124" width="338" height="252" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="482" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 컬럼별 TOAST 전략 확인</text>
  <text x="482" y="166" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> attname, atttypid::regtype,</text>
  <text x="482" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">       attstorage</text>
  <text x="482" y="202" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  pg_attribute</text>
  <text x="482" y="220" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">WHERE</tspan> attrelid = <tspan fill="#ce9178">'orders'</tspan>::regclass</text>
  <text x="482" y="238" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  <tspan fill="#7ec8e3">AND</tspan>  attnum > <tspan fill="#b5cea8">0</tspan>;</text>
  <text x="482" y="256" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- x=EXTENDED e=EXTERNAL m=MAIN p=PLAIN</text>

  <text x="482" y="284" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- TOAST 전략 변경 (검색용 텍스트)</text>
  <text x="482" y="302" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ALTER TABLE</tspan> articles</text>
  <text x="482" y="320" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  <tspan fill="#7ec8e3">ALTER COLUMN</tspan> body</text>
  <text x="482" y="338" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  <tspan fill="#7ec8e3">SET STORAGE EXTERNAL</tspan>;</text>
  <text x="482" y="356" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- LIKE 검색 성능 중시: 압축 안 함</text>

  <text x="482" y="384" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SHOW</tspan> default_toast_compression;</text>
</svg>
