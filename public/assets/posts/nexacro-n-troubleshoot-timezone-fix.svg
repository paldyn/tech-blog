<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="40" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">타임존 안전한 날짜 처리 패턴</text>

  <!-- Bad -->
  <rect x="60" y="62" width="360" height="260" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="84" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555">Date 객체 직접 사용 (문제)</text>
  <text x="76" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">// Date 객체 → 로컬 TZ 적용</text>
  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">var</text><text x="104" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> d = </text><text x="136" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">new</text><text x="168" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> Date(serverDateStr);</text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">// UTC 문자열이면 KST로 자동 변환됨</text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e05555" xml:space="preserve">// → 9시간 차이 발생!</text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">var</text><text x="104" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> diff = d2 - d1;</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">// 날짜 차이 계산 오류</text>

  <!-- Good -->
  <rect x="460" y="62" width="360" height="260" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="84" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">문자열 기반 처리 (권장)</text>
  <text x="476" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">// YYYYMMDD 문자열로 처리</text>
  <text x="476" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text><text x="536" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> dateDiff(d1, d2) {</text>
  <text x="476" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // "20260522" → 날짜 객체</text>
  <text x="476" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  var</text><text x="508" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> y1 = d1.substr(</text><text x="650" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8" xml:space="preserve">0,4</text><text x="684" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="476" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  var</text><text x="508" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> dt1 = </text><text x="556" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">new</text><text x="590" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> Date(</text>
  <text x="476" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">    y1, m1-</text><text x="568" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8" xml:space="preserve">1</text><text x="580" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">, d1day);</text>
  <text x="476" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // TZ 오프셋 없이 로컬 날짜만</text>
  <text x="476" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text><text x="530" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> (dt2 - dt1) / </text><text x="660" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8" xml:space="preserve">86400000</text><text x="740" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">;</text>
  <text x="476" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="476" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555" xml:space="preserve">// TZ 영향 없는 날짜 계산</text>

  <text x="440" y="344" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">날짜 처리는 Date 객체보다 문자열(YYYYMMDD) 기반 연산이 타임존 문제를 방지한다</text>
</svg>
