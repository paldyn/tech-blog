<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 셀 타입(celltype) 종류</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">normal · edit · combo · button · checkbox · image</text>

  <!-- normal -->
  <rect x="60" y="94" width="230" height="100" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="175" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">normal</text>
  <rect x="80" y="128" width="190" height="28" fill="#0f1929" rx="4"/>
  <text x="175" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">홍길동</text>
  <text x="175" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">읽기 전용 텍스트 표시</text>

  <!-- edit -->
  <rect x="310" y="94" width="230" height="100" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="425" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">edit</text>
  <rect x="330" y="128" width="190" height="28" fill="#0f1929" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="344" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">홍길동</text>
  <text x="505" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">|</text>
  <text x="425" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">직접 입력 가능한 텍스트 셀</text>

  <!-- combo -->
  <rect x="560" y="94" width="260" height="100" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="690" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a030" text-anchor="middle">combo</text>
  <rect x="580" y="128" width="220" height="28" fill="#0f1929" rx="4" stroke="#e0a030" stroke-width="1"/>
  <text x="600" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">개발1팀</text>
  <text x="786" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a030">▼</text>
  <text x="690" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">코드 Dataset 선택 드롭다운</text>

  <!-- button -->
  <rect x="60" y="220" width="230" height="100" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="175" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">button</text>
  <rect x="100" y="254" width="150" height="28" fill="#1d4ed8" rx="4"/>
  <text x="175" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#fff" text-anchor="middle">상세 보기</text>
  <text x="175" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">셀 내 버튼 삽입</text>

  <!-- checkbox -->
  <rect x="310" y="220" width="230" height="100" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="425" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">checkbox</text>
  <rect x="402" y="254" width="46" height="28" fill="#0f1929" rx="4"/>
  <rect x="412" y="261" width="14" height="14" fill="#1d4ed8" rx="2"/>
  <text x="425" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#fff" text-anchor="middle">✓</text>
  <text x="425" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">체크박스 / 토글 선택</text>

  <!-- image -->
  <rect x="560" y="220" width="260" height="100" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="690" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">image</text>
  <rect x="630" y="254" width="120" height="28" fill="#0f1929" rx="4"/>
  <text x="690" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#55c555" text-anchor="middle">✔</text>
  <text x="690" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">상태 아이콘·이미지 표시</text>

  <!-- Properties box -->
  <rect x="60" y="350" width="760" height="140" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">셀 타입별 추가 속성</text>

  <text x="90" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">edit</text>
  <text x="90" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">edittype, mask, maxlength</text>

  <text x="280" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a030">combo</text>
  <text x="280" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">codecolumn, datacolumn</text>
  <text x="280" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">lcodentype, usenull</text>

  <text x="480" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">checkbox</text>
  <text x="480" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">checkedvalue, uncheckedvalue</text>

  <text x="680" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">button</text>
  <text x="680" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">onclick 연결</text>
  <text x="680" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">text: 버튼 텍스트</text>

  <text x="90" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ celltype은 Format Editor에서 Cell 선택 후 속성 패널에서 지정</text>
</svg>
