<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrowGray" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 L5,7 Z" fill="#555"/>
    </marker>
    <marker id="arrowGreen" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 L5,7 Z" fill="#55c555"/>
    </marker>
    <marker id="arrowBlue" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 L5,7 Z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N 캐시 관리 전략</text>

  <!-- Flow: 사용자 요청 (circle) -->
  <circle cx="80" cy="110" r="36" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">사용자</text>
  <text x="80" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">요청</text>

  <!-- Arrow: circle → diamond -->
  <line x1="116" y1="110" x2="168" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Diamond: 브라우저 캐시 확인 -->
  <polygon points="260,74 352,110 260,146 168,110" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">브라우저</text>
  <text x="260" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">캐시 확인</text>

  <!-- Yes branch: right → 캐시 파일 반환 -->
  <line x1="352" y1="110" x2="420" y2="110" stroke="#55c555" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="384" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Yes</text>
  <rect x="422" y="84" width="140" height="52" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="492" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">캐시 파일</text>
  <text x="492" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">반환</text>

  <!-- No branch: down → 서버에서 파일 수신 -->
  <line x1="260" y1="146" x2="260" y2="186" stroke="#e05555" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="274" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">No</text>
  <rect x="160" y="188" width="200" height="44" rx="8" fill="#1a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">서버에서 파일 수신</text>

  <!-- Arrow: 서버 수신 → 캐시 저장 -->
  <line x1="260" y1="232" x2="260" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrowGray)"/>
  <rect x="160" y="262" width="200" height="44" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="260" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">캐시 저장</text>

  <!-- Arrow: 캐시 저장 → 파일 반환 -->
  <line x1="260" y1="306" x2="260" y2="334" stroke="#555" stroke-width="2" marker-end="url(#arrowGray)"/>
  <rect x="160" y="336" width="200" height="44" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="260" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">파일 반환</text>

  <!-- Divider -->
  <line x1="40" y1="406" x2="840" y2="406" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">캐시 전략 유형</text>

  <!-- Strategy boxes -->
  <!-- Box 1 -->
  <rect x="40" y="436" width="250" height="32" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="165" y="453" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">TypeDef.xml</text>
  <text x="165" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">캐시 금지 (no-store)</text>

  <!-- Box 2 -->
  <rect x="314" y="436" width="252" height="32" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="453" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">JS/CSS 번들</text>
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">버전해시 캐시 (1년)</text>

  <!-- Box 3 -->
  <rect x="590" y="436" width="250" height="32" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="715" y="453" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">서비스 응답</text>
  <text x="715" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Cache-Control 제어</text>
</svg>
