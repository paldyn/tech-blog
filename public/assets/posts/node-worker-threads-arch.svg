<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">Worker Threads 아키텍처</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Node.js 멀티스레드 — isMainThread / parentPort / workerData</text>

  <!-- Main Thread box -->
  <rect x="60" y="100" width="240" height="280" rx="10" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="128" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600">Main Thread</text>
  <text x="180" y="150" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">isMainThread === true</text>

  <!-- Main Thread internals -->
  <rect x="84" y="165" width="192" height="36" rx="6" fill="#1a2533" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="188" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">new Worker('./worker.js')</text>

  <rect x="84" y="213" width="192" height="36" rx="6" fill="#1a2533" stroke="#7777cc" stroke-width="1"/>
  <text x="180" y="236" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">worker.postMessage(data)</text>

  <rect x="84" y="261" width="192" height="36" rx="6" fill="#1a2533" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="284" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">worker.on('message', cb)</text>

  <rect x="84" y="309" width="192" height="36" rx="6" fill="#1a2533" stroke="#e05555" stroke-width="1"/>
  <text x="180" y="326" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">worker.on('error', cb)</text>
  <text x="180" y="342" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">worker.terminate()</text>

  <!-- SharedArrayBuffer box (center) -->
  <rect x="340" y="170" width="200" height="60" rx="8" fill="#1a1025" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="196" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">SharedArrayBuffer</text>
  <text x="440" y="216" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">Atomics.add / wait / notify</text>

  <!-- MessageChannel box (center) -->
  <rect x="340" y="260" width="200" height="50" rx="8" fill="#0f1a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="282" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">MessagePort</text>
  <text x="440" y="300" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">복사(구조적 복제) 또는 이전</text>

  <!-- Worker Thread box -->
  <rect x="580" y="100" width="240" height="280" rx="10" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="128" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600">Worker Thread</text>
  <text x="700" y="150" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">isMainThread === false</text>

  <!-- Worker internals -->
  <rect x="604" y="165" width="192" height="36" rx="6" fill="#1a2533" stroke="#7777cc" stroke-width="1"/>
  <text x="700" y="188" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">workerData (초기값)</text>

  <rect x="604" y="213" width="192" height="36" rx="6" fill="#1a2533" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="236" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">parentPort.on('message', cb)</text>

  <rect x="604" y="261" width="192" height="36" rx="6" fill="#1a2533" stroke="#7777cc" stroke-width="1"/>
  <text x="700" y="284" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">parentPort.postMessage(res)</text>

  <rect x="604" y="309" width="192" height="36" rx="6" fill="#1a2533" stroke="#7ec8e3" stroke-width="1"/>
  <text x="700" y="326" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">독립적 V8 힙</text>
  <text x="700" y="342" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">별도 GC 실행</text>

  <!-- Arrows: Main → SharedArrayBuffer -->
  <line x1="300" y1="200" x2="340" y2="200" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Arrow: SharedArrayBuffer → Worker -->
  <line x1="540" y1="200" x2="580" y2="200" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Arrows: Main ↔ MessagePort -->
  <line x1="300" y1="285" x2="340" y2="285" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="340,285 333,280 333,290" fill="#55c555"/>
  <line x1="540" y1="285" x2="580" y2="285" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="540,285 547,280 547,290" fill="#55c555"/>

  <!-- Bottom labels -->
  <text x="180" y="410" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">이벤트 루프 실행</text>
  <text x="440" y="410" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">공유 메모리 / 메시지 채널</text>
  <text x="700" y="410" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">CPU 집약 작업 분리</text>

  <!-- Thread separator note -->
  <text x="440" y="450" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">스레드 간 직접 메모리 접근 불가 — SharedArrayBuffer / Atomics 사용</text>
</svg>
