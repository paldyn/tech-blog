<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RNN의 한계: 기울기 소실과 병렬화 불가</text>

  <!-- Vanishing gradient visualization -->
  <text x="440" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">기울기 소실 (Vanishing Gradient)</text>

  <!-- Gradient magnitude bars -->
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">역전파 방향  ←</text>
  <!-- t=8 (near) -->
  <rect x="730" y="124" width="110" height="50" rx="4" fill="#55c555" fill-opacity="0.9"/>
  <text x="785" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#0a0a0a">t=8  큼</text>
  <!-- t=6 -->
  <rect x="590" y="134" width="110" height="40" rx="4" fill="#55c555" fill-opacity="0.6"/>
  <text x="645" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">t=6</text>
  <!-- t=4 -->
  <rect x="450" y="144" width="110" height="30" rx="4" fill="#55c555" fill-opacity="0.35"/>
  <text x="505" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">t=4</text>
  <!-- t=2 -->
  <rect x="310" y="152" width="110" height="22" rx="4" fill="#55c555" fill-opacity="0.15"/>
  <text x="365" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">t=2</text>
  <!-- t=1 (far) -->
  <rect x="170" y="156" width="110" height="18" rx="4" fill="#55c555" fill-opacity="0.05"/>
  <text x="225" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">t=1 ≈0</text>
  <!-- Baseline -->
  <line x1="60" y1="174" x2="840" y2="174" stroke="#333" stroke-width="1"/>
  <text x="60" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">∂L/∂h_t  크기 (W_h &lt; 1인 경우 기하급수 감소)</text>

  <!-- RNN Sequential dependency -->
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">순차 의존성 → 병렬화 불가</text>

  <!-- Sequential chain -->
  <rect x="80" y="248" width="100" height="46" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">t=1</text>
  <line x1="180" y1="271" x2="218" y2="271" stroke="#e05555" stroke-width="2"/>
  <polygon points="218,265 230,271 218,277" fill="#e05555"/>
  <rect x="230" y="248" width="100" height="46" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="280" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">t=2</text>
  <text x="205" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">순서 강제</text>
  <line x1="330" y1="271" x2="368" y2="271" stroke="#e05555" stroke-width="2"/>
  <polygon points="368,265 380,271 368,277" fill="#e05555"/>
  <rect x="380" y="248" width="100" height="46" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="430" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">t=3</text>
  <line x1="480" y1="271" x2="518" y2="271" stroke="#e05555" stroke-width="2"/>
  <polygon points="518,265 530,271 518,277" fill="#e05555"/>
  <rect x="530" y="248" width="100" height="46" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">t=4</text>
  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이전 스텝 완료 전 다음 스텝 시작 불가 → GPU 활용률 저하</text>

  <!-- Summary table -->
  <rect x="60" y="336" width="760" height="98" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">RNN 계열 한계 요약</text>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">① 기울기 소실/폭발</text>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">② 병렬화 불가 (순차 처리)</text>
  <text x="450" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">③ 장거리 의존성 포착 어려움</text>
  <text x="450" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">→ Transformer가 모두 해결</text>
  <text x="80" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">LSTM/GRU는 ①③ 완화, ②는 여전히 해결 못함</text>
</svg>
