<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">희소 어텐션 패턴 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">각 토큰이 참조하는 위치를 선택적으로 제한해 O(N²) → O(N) 달성</text>

  <!-- Full Attention -->
  <text x="100" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">Full Attention</text>
  <text x="100" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">O(N²) — 전체 참조</text>
  <!-- 6x6 all blue -->
  <rect x="52" y="130" width="28" height="28" fill="#2a3a5a" rx="1"/>
  <rect x="84" y="130" width="28" height="28" fill="#2a3a5a" rx="1"/>
  <rect x="116" y="130" width="28" height="28" fill="#2a3a5a" rx="1"/>
  <rect x="52" y="162" width="28" height="28" fill="#2a3a5a" rx="1"/>
  <rect x="84" y="162" width="28" height="28" fill="#2a3a5a" rx="1"/>
  <rect x="116" y="162" width="28" height="28" fill="#2a3a5a" rx="1"/>
  <rect x="52" y="194" width="28" height="28" fill="#2a3a5a" rx="1"/>
  <rect x="84" y="194" width="28" height="28" fill="#2a3a5a" rx="1"/>
  <rect x="116" y="194" width="28" height="28" fill="#2a3a5a" rx="1"/>

  <!-- Sliding Window -->
  <text x="280" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Sliding Window</text>
  <text x="280" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">O(N·W) — 인접만 참조</text>
  <!-- diagonal band pattern (3x3 showing 9 cells, band=1) -->
  <rect x="232" y="130" width="28" height="28" fill="#1a2a4a" rx="1"/>
  <rect x="264" y="130" width="28" height="28" fill="#7ec8e3" rx="1" opacity="0.7"/>
  <rect x="296" y="130" width="28" height="28" fill="#111827" rx="1"/>
  <rect x="232" y="162" width="28" height="28" fill="#7ec8e3" rx="1" opacity="0.7"/>
  <rect x="264" y="162" width="28" height="28" fill="#1a2a4a" rx="1"/>
  <rect x="296" y="162" width="28" height="28" fill="#7ec8e3" rx="1" opacity="0.7"/>
  <rect x="232" y="194" width="28" height="28" fill="#111827" rx="1"/>
  <rect x="264" y="194" width="28" height="28" fill="#7ec8e3" rx="1" opacity="0.7"/>
  <rect x="296" y="194" width="28" height="28" fill="#1a2a4a" rx="1"/>

  <!-- Longformer -->
  <text x="460" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">Longformer</text>
  <text x="460" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">로컬 + 글로벌([CLS])</text>
  <!-- window + global first row/col -->
  <rect x="412" y="130" width="28" height="28" fill="#ce9178" rx="1" opacity="0.8"/>
  <rect x="444" y="130" width="28" height="28" fill="#ce9178" rx="1" opacity="0.8"/>
  <rect x="476" y="130" width="28" height="28" fill="#ce9178" rx="1" opacity="0.8"/>
  <rect x="412" y="162" width="28" height="28" fill="#ce9178" rx="1" opacity="0.8"/>
  <rect x="444" y="162" width="28" height="28" fill="#1a2a4a" rx="1"/>
  <rect x="476" y="162" width="28" height="28" fill="#7ec8e3" rx="1" opacity="0.5"/>
  <rect x="412" y="194" width="28" height="28" fill="#ce9178" rx="1" opacity="0.8"/>
  <rect x="444" y="194" width="28" height="28" fill="#7ec8e3" rx="1" opacity="0.5"/>
  <rect x="476" y="194" width="28" height="28" fill="#1a2a4a" rx="1"/>

  <!-- BigBird -->
  <text x="640" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">BigBird</text>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">로컬 + 글로벌 + 랜덤</text>
  <!-- window + global + random -->
  <rect x="592" y="130" width="28" height="28" fill="#55c555" rx="1" opacity="0.8"/>
  <rect x="624" y="130" width="28" height="28" fill="#55c555" rx="1" opacity="0.8"/>
  <rect x="656" y="130" width="28" height="28" fill="#55c555" rx="1" opacity="0.8"/>
  <rect x="592" y="162" width="28" height="28" fill="#55c555" rx="1" opacity="0.8"/>
  <rect x="624" y="162" width="28" height="28" fill="#1a2a4a" rx="1"/>
  <rect x="656" y="162" width="28" height="28" fill="#1a1a1a" rx="1"/>
  <rect x="592" y="194" width="28" height="28" fill="#55c555" rx="1" opacity="0.8"/>
  <rect x="624" y="194" width="28" height="28" fill="#333" rx="1"/>
  <rect x="656" y="194" width="28" height="28" fill="#1a2a4a" rx="1"/>
  <!-- random attention spot -->
  <rect x="720" y="162" width="28" height="28" fill="#55c555" rx="1" opacity="0.4"/>
  <text x="740" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">랜덤</text>

  <!-- Flash Attention box -->
  <rect x="50" y="250" width="780" height="140" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Flash Attention: IO-Aware 알고리즘</text>
  <text x="440" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">복잡도는 O(N²)이지만 GPU 메모리 계층 최적화로 실질 속도 2-4배 향상</text>

  <!-- 3 boxes: HBM → SRAM → HBM -->
  <rect x="66" y="308" width="200" height="50" fill="#0d1117" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="166" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">HBM (느림, 큰 용량)</text>
  <text x="166" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Q, K, V, Output 저장</text>

  <line x1="266" y1="333" x2="300" y2="333" stroke="#55c555" stroke-width="2"/>
  <polygon points="300,327 314,333 300,339" fill="#55c555"/>

  <rect x="314" y="308" width="250" height="50" fill="#0d1117" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="439" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">SRAM (빠름, 작은 용량)</text>
  <text x="439" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">타일 단위로 Q·K·V 계산 (On-chip)</text>

  <line x1="564" y1="333" x2="598" y2="333" stroke="#55c555" stroke-width="2"/>
  <polygon points="598,327 612,333 598,339" fill="#55c555"/>

  <rect x="612" y="308" width="200" height="50" fill="#0d1117" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="712" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">HBM (결과 저장)</text>
  <text x="712" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">HBM 접근 횟수 최소화</text>

  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중간 N×N 행렬을 HBM에 쓰지 않아 메모리 O(N²) → O(N) 절약</text>
</svg>
