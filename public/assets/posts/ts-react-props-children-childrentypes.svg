<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">children 타입 고르기</text>
  <text x="60" y="78" font-size="13" fill="#888">받을 children의 형태에 따라 타입을 좁히면 의도가 드러난다</text>

  <!-- row 1 -->
  <rect x="60" y="100" width="760" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" font-size="14" font-weight="600" fill="#7ec8e3">React.ReactNode</text>
  <text x="76" y="150" font-size="13" fill="#ffffff">가장 넓다. JSX · 문자열 · 숫자 · 배열 · null · boolean 모두 허용.</text>
  <text x="76" y="170" font-size="13" fill="#9aa4b8">래퍼·레이아웃 컴포넌트의 기본값</text>

  <!-- row 2 -->
  <rect x="60" y="194" width="760" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="222" font-size="14" font-weight="600" fill="#55c555">React.ReactElement</text>
  <text x="76" y="244" font-size="13" fill="#ffffff">단일 JSX 엘리먼트만. 문자열·null은 거부 → 자식을 한 개로 강제.</text>
  <text x="76" y="264" font-size="13" fill="#9aa4b8">cloneElement로 props 주입하는 패턴에서 유용</text>

  <!-- row 3 -->
  <rect x="60" y="288" width="760" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="316" font-size="14" font-weight="600" fill="#e05555">(value: T) =&gt; React.ReactNode</text>
  <text x="76" y="338" font-size="13" fill="#ffffff">함수형 children(render props). 부모가 자식에게 값을 내려준다.</text>
  <text x="76" y="358" font-size="13" fill="#9aa4b8">children을 함수로 호출: {children(data)}</text>
</svg>
