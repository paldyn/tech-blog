<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>

  <!-- background -->
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Java 연산자 분류</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" font-weight="400" fill="#888">Operator Categories &amp; Precedence</text>

  <!-- Row 1: Arithmetic, Comparison -->
  <!-- Arithmetic box -->
  <rect x="60" y="96" width="220" height="136" rx="8" fill="#111827" stroke="#1e2a3a" stroke-width="1"/>
  <text x="170" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">산술 연산자</text>
  <text x="170" y="141" text-anchor="middle" font-size="12" fill="#888">Arithmetic</text>
  <text x="80" y="163" font-size="13" fill="#e8e8e8">+  −  *  /  %</text>
  <text x="80" y="182" font-size="13" fill="#e8e8e8">++  −−  (증감)</text>
  <text x="80" y="201" font-size="12" fill="#6a8aa0">정수 나눗셈: /  나머지: %</text>
  <text x="80" y="218" font-size="12" fill="#6a8aa0">전위(++i) / 후위(i++) 구분</text>

  <!-- Comparison box -->
  <rect x="330" y="96" width="220" height="136" rx="8" fill="#111827" stroke="#1e2a3a" stroke-width="1"/>
  <text x="440" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">비교 연산자</text>
  <text x="440" y="141" text-anchor="middle" font-size="12" fill="#888">Comparison / Relational</text>
  <text x="350" y="163" font-size="13" fill="#e8e8e8">==  !=  &gt;  &lt;  &gt;=  &lt;=</text>
  <text x="350" y="182" font-size="13" fill="#e8e8e8">instanceof</text>
  <text x="350" y="201" font-size="12" fill="#6a8aa0">결과: boolean (true/false)</text>
  <text x="350" y="218" font-size="12" fill="#6a8aa0">== 는 참조 비교 (기본형은 값)</text>

  <!-- Logical box -->
  <rect x="600" y="96" width="220" height="136" rx="8" fill="#111827" stroke="#1e2a3a" stroke-width="1"/>
  <text x="710" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">논리 연산자</text>
  <text x="710" y="141" text-anchor="middle" font-size="12" fill="#888">Logical</text>
  <text x="620" y="163" font-size="13" fill="#e8e8e8">&amp;&amp;  ||  !  ^</text>
  <text x="620" y="182" font-size="13" fill="#e8e8e8">&amp;  |  (비단락)</text>
  <text x="620" y="201" font-size="12" fill="#6a8aa0">&amp;&amp; / || 은 단락 평가(Short-circuit)</text>
  <text x="620" y="218" font-size="12" fill="#6a8aa0">^ : XOR (배타적 논리합)</text>

  <!-- Row 2: Bitwise, Assignment, Ternary -->
  <!-- Bitwise box -->
  <rect x="60" y="258" width="220" height="136" rx="8" fill="#111827" stroke="#1e2a3a" stroke-width="1"/>
  <text x="170" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">비트 연산자</text>
  <text x="170" y="303" text-anchor="middle" font-size="12" fill="#888">Bitwise / Shift</text>
  <text x="80" y="325" font-size="13" fill="#e8e8e8">&amp;  |  ^  ~</text>
  <text x="80" y="344" font-size="13" fill="#e8e8e8">&lt;&lt;  &gt;&gt;  &gt;&gt;&gt;</text>
  <text x="80" y="363" font-size="12" fill="#6a8aa0">&gt;&gt; : 산술 시프트 (부호 유지)</text>
  <text x="80" y="380" font-size="12" fill="#6a8aa0">&gt;&gt;&gt; : 논리 시프트 (0 채움)</text>

  <!-- Assignment box -->
  <rect x="330" y="258" width="220" height="136" rx="8" fill="#111827" stroke="#1e2a3a" stroke-width="1"/>
  <text x="440" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">대입 연산자</text>
  <text x="440" y="303" text-anchor="middle" font-size="12" fill="#888">Assignment &amp; Compound</text>
  <text x="350" y="325" font-size="13" fill="#e8e8e8">=  +=  −=  *=  /=  %=</text>
  <text x="350" y="344" font-size="13" fill="#e8e8e8">&amp;=  |=  ^=  &lt;&lt;=  &gt;&gt;=</text>
  <text x="350" y="363" font-size="12" fill="#6a8aa0">복합 대입: a += b  →  a = a + b</text>
  <text x="350" y="380" font-size="12" fill="#6a8aa0">오른쪽 결합성(right-to-left)</text>

  <!-- Ternary / Special box -->
  <rect x="600" y="258" width="220" height="136" rx="8" fill="#111827" stroke="#1e2a3a" stroke-width="1"/>
  <text x="710" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">기타 연산자</text>
  <text x="710" y="303" text-anchor="middle" font-size="12" fill="#888">Ternary / Special</text>
  <text x="620" y="325" font-size="13" fill="#e8e8e8">?:   (삼항 연산자)</text>
  <text x="620" y="344" font-size="13" fill="#e8e8e8">instanceof  (타입 검사)</text>
  <text x="620" y="363" font-size="12" fill="#6a8aa0">condition ? a : b</text>
  <text x="620" y="380" font-size="12" fill="#6a8aa0">Java 16+: 패턴 instanceof</text>

  <!-- Precedence bar -->
  <rect x="60" y="420" width="760" height="52" rx="8" fill="#0f1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="441" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">우선순위 (높음 → 낮음)</text>
  <text x="440" y="460" text-anchor="middle" font-size="12" fill="#e8e8e8">() []  →  단항  →  산술  →  시프트  →  비교  →  비트  →  논리  →  삼항  →  대입</text>

  <!-- Tip box -->
  <rect x="60" y="490" width="760" height="40" rx="8" fill="#1a1200" stroke="#3a2e00" stroke-width="1"/>
  <text x="440" y="508" text-anchor="middle" font-size="12" font-weight="600" fill="#e0b840">Tip</text>
  <text x="440" y="524" text-anchor="middle" font-size="12" fill="#c8a830">우선순위가 헷갈릴 때는 괄호 ()를 명시적으로 사용하면 가독성과 안전성 모두 향상됩니다</text>
</svg>
