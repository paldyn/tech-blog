<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">동시성 Map 구현체 비교</text>

  <!-- Header -->
  <rect x="60" y="64" width="760" height="40" rx="4" fill="#0f1827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">특성</text>
  <text x="350" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">HashMap</text>
  <text x="530" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a020">Hashtable</text>
  <text x="710" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">ConcurrentHashMap</text>
  <line x1="260" y1="64" x2="260" y2="104" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="440" y1="64" x2="440" y2="104" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="620" y1="64" x2="620" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1: Thread safety -->
  <rect x="60" y="104" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="170" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">스레드 안전</text>
  <text x="350" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">아니오</text>
  <text x="530" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">예 (전체 락)</text>
  <text x="710" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">예 (버킷 락)</text>
  <line x1="260" y1="104" x2="260" y2="148" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="440" y1="104" x2="440" y2="148" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="620" y1="104" x2="620" y2="148" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 2: Concurrency -->
  <rect x="60" y="148" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="170" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">동시 쓰기</text>
  <text x="350" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불안전</text>
  <text x="530" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a020">1개 스레드만</text>
  <text x="710" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">버킷 수만큼</text>
  <line x1="260" y1="148" x2="260" y2="192" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="440" y1="148" x2="440" y2="192" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="620" y1="148" x2="620" y2="192" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 3: null -->
  <rect x="60" y="192" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="170" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">null 키/값</text>
  <text x="350" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">1개 허용</text>
  <text x="530" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불허</text>
  <text x="710" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불허</text>
  <line x1="260" y1="192" x2="260" y2="236" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="440" y1="192" x2="440" y2="236" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="620" y1="192" x2="620" y2="236" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 4: 성능 -->
  <rect x="60" y="236" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="170" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">멀티스레드 성능</text>
  <text x="350" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">비안전</text>
  <text x="530" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">낮음 (병목)</text>
  <text x="710" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">높음</text>
  <line x1="260" y1="236" x2="260" y2="280" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="440" y1="236" x2="440" y2="280" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="620" y1="236" x2="620" y2="280" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Note -->
  <text x="440" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Hashtable은 Java 1.0 레거시 — 새 코드에서는 ConcurrentHashMap 사용 권장</text>
</svg>
