<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">타입 변환 — 명시적·암묵적 변환</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">int · float · str · list · bool 상호 변환</text>

  <!-- Conversion flow diagram -->
  <!-- Central int -->
  <rect x="370" y="110" width="140" height="50" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">int</text>

  <!-- str -->
  <rect x="90" y="110" width="140" height="50" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="160" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">str</text>

  <!-- float -->
  <rect x="650" y="110" width="140" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">float</text>

  <!-- bool -->
  <rect x="230" y="220" width="140" height="50" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="300" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555" text-anchor="middle">bool</text>

  <!-- list -->
  <rect x="510" y="220" width="140" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="580" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">list</text>

  <!-- Arrows str→int -->
  <line x1="230" y1="135" x2="370" y2="135" stroke="#888" stroke-width="1.5"/>
  <polygon points="370,130 382,135 370,140" fill="#888"/>
  <text x="300" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">int("42")</text>

  <!-- int→str -->
  <line x1="370" y1="148" x2="230" y2="148" stroke="#888" stroke-width="1.5"/>
  <polygon points="230,143 218,148 230,153" fill="#888"/>
  <text x="300" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">str(42)</text>

  <!-- int→float -->
  <line x1="510" y1="135" x2="650" y2="135" stroke="#888" stroke-width="1.5"/>
  <polygon points="650,130 662,135 650,140" fill="#888"/>
  <text x="580" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">float(42)</text>

  <!-- float→int -->
  <line x1="650" y1="148" x2="510" y2="148" stroke="#888" stroke-width="1.5"/>
  <polygon points="510,143 498,148 510,153" fill="#888"/>
  <text x="580" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">int(3.7)</text>

  <!-- int→bool -->
  <line x1="400" y1="160" x2="330" y2="220" stroke="#888" stroke-width="1.5"/>
  <polygon points="330,220 322,210 334,208" fill="#888"/>

  <!-- str→list -->
  <line x1="200" y1="160" x2="540" y2="220" stroke="#888" stroke-width="1.5"/>
  <polygon points="540,220 548,210 554,218" fill="#888"/>
  <text x="370" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">list("abc")</text>

  <!-- Code block -->
  <rect x="60" y="300" width="760" height="170" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 숫자 변환</tspan></text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">int</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"42"</tspan><tspan fill="#e8e8e8">)       </tspan><tspan fill="#6a8aa0"># 42</tspan><tspan fill="#e8e8e8">         </tspan><tspan fill="#7ec8e3">int</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#b5cea8">3.9</tspan><tspan fill="#e8e8e8">)     </tspan><tspan fill="#6a8aa0"># 3 (버림)</tspan></text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">float</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"3.14"</tspan><tspan fill="#e8e8e8">)    </tspan><tspan fill="#6a8aa0"># 3.14</tspan><tspan fill="#e8e8e8">       </tspan><tspan fill="#7ec8e3">str</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#e8e8e8">)      </tspan><tspan fill="#6a8aa0"># "42"</tspan></text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">int</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"0xff"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">16</tspan><tspan fill="#e8e8e8">)  </tspan><tspan fill="#6a8aa0"># 255 (16진수)</tspan><tspan fill="#e8e8e8">  </tspan><tspan fill="#7ec8e3">int</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"0b11"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">) </tspan><tspan fill="#6a8aa0"># 3 (2진수)</tspan></text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 컨테이너 변환</tspan></text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">list</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"abc"</tspan><tspan fill="#e8e8e8">)    </tspan><tspan fill="#6a8aa0"># ['a','b','c']</tspan><tspan fill="#e8e8e8">   </tspan><tspan fill="#7ec8e3">tuple</tspan><tspan fill="#e8e8e8">({</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">})  </tspan><tspan fill="#6a8aa0"># (1,2) 또는 (2,1)</tspan></text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">set</tspan><tspan fill="#e8e8e8">([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">])  </tspan><tspan fill="#6a8aa0"># {1, 2}</tspan><tspan fill="#e8e8e8">          </tspan><tspan fill="#7ec8e3">dict</tspan><tspan fill="#e8e8e8">([(</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">)]) </tspan><tspan fill="#6a8aa0"># {"a":1}</tspan></text>
</svg>
