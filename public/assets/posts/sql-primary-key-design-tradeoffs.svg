<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">기본 키 설계 트레이드오프</text>

  <!-- Header -->
  <rect x="30" y="66" width="820" height="32" fill="#192040" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#9aa4b8">기준</text>
  <text x="340" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3">BIGINT (순차)</text>
  <text x="530" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#7777cc">UUID v4</text>
  <text x="720" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#ce9178">ULID / UUID v7</text>
  <line x1="260" y1="66" x2="260" y2="352" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="430" y1="66" x2="430" y2="352" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="620" y1="66" x2="620" y2="352" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row: 인덱스 효율 -->
  <rect x="30" y="98" width="820" height="40" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="123" text-anchor="middle" font-size="12" fill="#e8e8e8">B-Tree 인덱스 효율</text>
  <text x="340" y="123" text-anchor="middle" font-size="12" fill="#55c555">&#9733;&#9733;&#9733;&#9733;&#9733; 최상</text>
  <text x="530" y="123" text-anchor="middle" font-size="12" fill="#e05555">&#9733;&#9733; 랜덤 삽입 → 분열</text>
  <text x="720" y="123" text-anchor="middle" font-size="12" fill="#7ec8e3">&#9733;&#9733;&#9733;&#9733; 시간순 정렬</text>

  <!-- Row: 분산 생성 -->
  <rect x="30" y="138" width="820" height="40" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="163" text-anchor="middle" font-size="12" fill="#e8e8e8">분산 환경 생성</text>
  <text x="340" y="163" text-anchor="middle" font-size="12" fill="#e05555">&#9733;&#9733; 중앙 시퀀스 필요</text>
  <text x="530" y="163" text-anchor="middle" font-size="12" fill="#55c555">&#9733;&#9733;&#9733;&#9733;&#9733; DB 없이 생성</text>
  <text x="720" y="163" text-anchor="middle" font-size="12" fill="#55c555">&#9733;&#9733;&#9733;&#9733;&#9733; DB 없이 생성</text>

  <!-- Row: 예측 가능성 -->
  <rect x="30" y="178" width="820" height="40" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="203" text-anchor="middle" font-size="12" fill="#e8e8e8">보안 (예측 불가)</text>
  <text x="340" y="203" text-anchor="middle" font-size="12" fill="#e05555">&#9733; 순차라 열거 쉬움</text>
  <text x="530" y="203" text-anchor="middle" font-size="12" fill="#55c555">&#9733;&#9733;&#9733;&#9733;&#9733; 완전 랜덤</text>
  <text x="720" y="203" text-anchor="middle" font-size="12" fill="#7ec8e3">&#9733;&#9733;&#9733;&#9733; 시간 부분만 예측</text>

  <!-- Row: 저장 크기 -->
  <rect x="30" y="218" width="820" height="40" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="243" text-anchor="middle" font-size="12" fill="#e8e8e8">저장 크기</text>
  <text x="340" y="243" text-anchor="middle" font-size="12" fill="#55c555">&#9733;&#9733;&#9733;&#9733;&#9733; 8 bytes</text>
  <text x="530" y="243" text-anchor="middle" font-size="12" fill="#ce9178">&#9733;&#9733;&#9733; 16 bytes</text>
  <text x="720" y="243" text-anchor="middle" font-size="12" fill="#ce9178">&#9733;&#9733;&#9733; 16 bytes</text>

  <!-- Row: 디버깅 편의 -->
  <rect x="30" y="258" width="820" height="40" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="283" text-anchor="middle" font-size="12" fill="#e8e8e8">디버깅 편의</text>
  <text x="340" y="283" text-anchor="middle" font-size="12" fill="#55c555">&#9733;&#9733;&#9733;&#9733; 짧고 읽기 쉬움</text>
  <text x="530" y="283" text-anchor="middle" font-size="12" fill="#e05555">&#9733; 길고 외우기 불가</text>
  <text x="720" y="283" text-anchor="middle" font-size="12" fill="#7ec8e3">&#9733;&#9733;&#9733; 시간순 정렬 가능</text>

  <!-- Row: 추천 상황 -->
  <rect x="30" y="298" width="820" height="54" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="320" text-anchor="middle" font-size="12" fill="#e8e8e8">추천 상황</text>
  <text x="340" y="316" text-anchor="middle" font-size="11" fill="#888">단일 DB 서비스,</text>
  <text x="340" y="334" text-anchor="middle" font-size="11" fill="#888">성능이 최우선</text>
  <text x="340" y="344" text-anchor="middle" font-size="11" fill="#888">내부 API URL에 쓰면 위험</text>
  <text x="530" y="316" text-anchor="middle" font-size="11" fill="#888">분산 시스템, 마이크로서비스</text>
  <text x="530" y="334" text-anchor="middle" font-size="11" fill="#888">외부 노출 ID</text>
  <text x="720" y="316" text-anchor="middle" font-size="11" fill="#888">분산 + 시간순 정렬 필요</text>
  <text x="720" y="334" text-anchor="middle" font-size="11" fill="#888">이벤트 로그, 메시지 시스템</text>

  <!-- Bottom: code example -->
  <rect x="30" y="372" width="820" height="70" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="50" y="392" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace">-- PostgreSQL UUID v7 (pg_uuidv7 확장 또는 직접 생성)</text>
  <text x="50" y="412" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">id UUID DEFAULT gen_random_uuid() PRIMARY KEY</text>
  <text x="50" y="430" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">id BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY</text>
</svg>
