<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ar1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ar2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="ar3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 챗봇 서비스 아키텍처</text>

  <!-- Layer labels -->
  <text x="155" y="74" text-anchor="middle" font-size="13" fill="#888">프론트엔드</text>
  <text x="440" y="74" text-anchor="middle" font-size="13" fill="#888">백엔드</text>
  <text x="725" y="74" text-anchor="middle" font-size="13" fill="#888">AI 레이어</text>

  <!-- Row 1: Service boxes -->
  <rect x="60" y="86" width="190" height="68" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="155" y="112" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">사용자 클라이언트</text>
  <text x="155" y="134" text-anchor="middle" font-size="12" fill="#888">웹 · iOS · Android</text>

  <rect x="340" y="86" width="200" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="112" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">백엔드 서버</text>
  <text x="440" y="134" text-anchor="middle" font-size="12" fill="#888">대화 관리자 · 세션</text>

  <rect x="630" y="86" width="190" height="68" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="112" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">LLM API</text>
  <text x="725" y="134" text-anchor="middle" font-size="12" fill="#888">Claude · GPT-4o · Gemini</text>

  <!-- Row 1 arrows -->
  <line x1="250" y1="120" x2="340" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ar1)"/>
  <text x="295" y="113" text-anchor="middle" font-size="11" fill="#888">HTTP</text>

  <line x1="540" y1="120" x2="630" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ar1)"/>
  <text x="585" y="113" text-anchor="middle" font-size="11" fill="#888">API 호출</text>

  <!-- Row 2: Data layer boxes -->
  <rect x="340" y="226" width="200" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="252" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">대화 이력 DB</text>
  <text x="440" y="274" text-anchor="middle" font-size="12" fill="#888">Redis · PostgreSQL</text>

  <rect x="630" y="226" width="190" height="68" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="252" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">Vector DB</text>
  <text x="725" y="274" text-anchor="middle" font-size="12" fill="#888">pgvector · Pinecone</text>

  <!-- Vertical arrows: Backend ↔ History DB -->
  <line x1="408" y1="154" x2="408" y2="226" stroke="#7777cc" stroke-width="2" marker-end="url(#ar2)"/>
  <line x1="472" y1="226" x2="472" y2="154" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ar2)"/>
  <text x="485" y="193" font-size="11" fill="#888">이력 조회</text>

  <!-- Vertical arrows: LLM ↔ Vector DB -->
  <line x1="693" y1="154" x2="693" y2="226" stroke="#55c555" stroke-width="2" marker-end="url(#ar3)"/>
  <line x1="757" y1="226" x2="757" y2="154" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ar3)"/>
  <text x="768" y="193" font-size="11" fill="#888">벡터 검색</text>

  <!-- Row 3: Tool bar -->
  <rect x="60" y="356" width="760" height="44" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="383" text-anchor="middle" font-size="13" fill="#888">도구 실행기 — 웹 검색 · 코드 실행 · 캘린더 · 외부 API</text>

  <!-- Arrow Backend → Tools -->
  <line x1="440" y1="294" x2="440" y2="356" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ar2)"/>
  <text x="452" y="328" font-size="11" fill="#888">Tool Call</text>
</svg>
