<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">쿠버네티스 오브젝트 타입 분류</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">apiVersion / kind 조합으로 선언하는 5가지 카테고리</text>

  <!-- Row 1: Workload + Network -->
  <!-- Workload box -->
  <rect x="60" y="96" width="370" height="132" rx="8" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="122"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Workload</text>
  <text x="80" y="142"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 컨테이너를 실행하는 리소스</text>
  <text x="80" y="166"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Pod</text>
  <text x="130" y="166"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 가장 작은 배포 단위 (v1)</text>
  <text x="80" y="186"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Deployment</text>
  <text x="170" y="186"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 레플리카 + 롤링 업데이트 (apps/v1)</text>
  <text x="80" y="206"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">StatefulSet / DaemonSet</text>
  <text x="80" y="218"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">상태 저장 / 모든 노드에 1개씩 (apps/v1)</text>

  <!-- Network box -->
  <rect x="450" y="96" width="370" height="132" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="122"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Network</text>
  <text x="470" y="142"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서비스 노출 및 네트워크 정책</text>
  <text x="470" y="166"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Service</text>
  <text x="530" y="166"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 안정적 IP + DNS 제공 (v1)</text>
  <text x="470" y="186"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Ingress</text>
  <text x="530" y="186"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— HTTP 라우팅 규칙 (networking.k8s.io/v1)</text>
  <text x="470" y="206"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">NetworkPolicy</text>
  <text x="470" y="218"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파드 간 통신 허용/차단 규칙 (networking.k8s.io/v1)</text>

  <!-- Row 2: Config + Storage -->
  <!-- Config box -->
  <rect x="60" y="248" width="370" height="128" rx="8" fill="#1e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="274"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">Config</text>
  <text x="80" y="294"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">설정값 및 민감 정보 분리 저장</text>
  <text x="80" y="318"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">ConfigMap</text>
  <text x="160" y="318"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 비민감 설정값 (v1)</text>
  <text x="80" y="338"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Secret</text>
  <text x="130" y="338"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 비밀번호·토큰 Base64 인코딩 (v1)</text>
  <text x="80" y="358"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">HPA</text>
  <text x="110" y="358"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 자동 스케일링 정책 (autoscaling/v2)</text>

  <!-- Storage box -->
  <rect x="450" y="248" width="370" height="128" rx="8" fill="#1a1400" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="470" y="274"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#b5cea8">Storage</text>
  <text x="470" y="294"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파드 생명주기와 독립적인 스토리지</text>
  <text x="470" y="318"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">PersistentVolume</text>
  <text x="610" y="318"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 실제 스토리지 (v1)</text>
  <text x="470" y="338"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">PersistentVolumeClaim</text>
  <text x="470" y="350"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스토리지 요청 리소스 (v1)</text>
  <text x="470" y="370"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">StorageClass</text>
  <text x="558" y="370"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 동적 프로비저닝 (storage.k8s.io/v1)</text>

  <!-- Row 3: RBAC (full width) -->
  <rect x="60" y="396" width="760" height="100" rx="8" fill="#200d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="422"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">RBAC (접근 제어)</text>
  <text x="80" y="442"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클러스터 리소스에 대한 권한 제어  (rbac.authorization.k8s.io/v1)</text>
  <text x="80" y="466"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">ServiceAccount</text>
  <text x="190" y="466"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 파드에 부여하는 ID (v1)</text>
  <text x="460" y="466"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Role / ClusterRole</text>
  <text x="580" y="466"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 허용 권한 목록</text>
  <text x="80" y="486"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">RoleBinding / ClusterRoleBinding</text>
  <text x="310" y="486"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 주체(Subject)에 Role 연결</text>

  <!-- Bottom bar -->
  <rect x="60" y="514" width="760" height="30" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="534" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 오브젝트는 kubectl api-resources 명령으로 확인 가능</text>
</svg>
