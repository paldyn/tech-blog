<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">StorageClass 티어링 전략</text>

  <!-- Fast tier -->
  <rect x="60" y="68" width="230" height="120" rx="8" fill="#0f1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="175" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">fast (고성능)</text>
  <text x="175" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">type: io2 / pd-extreme</text>
  <text x="175" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">iops: 16000+ / GB단위 과금</text>
  <text x="175" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DB, 고빈도 I/O</text>
  <text x="175" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">비용: 매우 높음</text>

  <!-- Standard tier -->
  <rect x="325" y="68" width="230" height="120" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">standard (범용)</text>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">type: gp3 / pd-ssd</text>
  <text x="440" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">iops: 3000 / 균형잡힌 성능</text>
  <text x="440" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">웹 앱, 캐시, 로그</text>
  <text x="440" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">비용: 중간</text>

  <!-- Archive tier -->
  <rect x="590" y="68" width="230" height="120" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">archive (저비용)</text>
  <text x="705" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">type: sc1 / EFS IA</text>
  <text x="705" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대용량 / 순차 읽기 최적화</text>
  <text x="705" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">백업, 로그 아카이브</text>
  <text x="705" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">비용: 낮음</text>

  <!-- Code block: StorageClass YAML -->
  <rect x="60" y="214" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#9aa4b8"># 범용 StorageClass 예시 (AWS gp3)</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">apiVersion</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">        : storage.k8s.io/v1</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">kind</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">               : StorageClass</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">provisioner</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">           : ebs.csi.aws.com</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">parameters</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">            :</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">  type: </text>
  <text x="145" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ce9178">gp3</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">  iops: </text>
  <text x="145" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#b5cea8">3000</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">volumeBindingMode</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff"> : WaitForFirstConsumer</text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#7ec8e3" font-weight="600">allowVolumeExpansion</text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff"> : </text>
  <text x="290" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#b5cea8">true</text>
</svg>
