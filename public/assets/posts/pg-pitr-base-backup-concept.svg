<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PITR — 특정 시점으로 되돌리기</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Base Backup + WAL 아카이브로 임의 시점 복구</text>

  <!-- Timeline bar -->
  <line x1="80" y1="160" x2="800" y2="160" stroke="#3a4a6e" stroke-width="3"/>
  <!-- Arrow head -->
  <polygon points="800,160 782,153 782,167" fill="#1e2433"/>

  <!-- Base Backup point -->
  <circle cx="160" cy="160" r="10" fill="#7ec8e3"/>
  <text x="160" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Base</text>
  <text x="160" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Backup</text>
  <text x="160" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일요일 02:00</text>

  <!-- WAL archive segments -->
  <rect x="170" y="148" width="50" height="24" fill="#1e2433" rx="3"/>
  <text x="195" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">WAL 1</text>
  <rect x="224" y="148" width="50" height="24" fill="#1e2433" rx="3"/>
  <text x="249" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">WAL 2</text>
  <rect x="278" y="148" width="50" height="24" fill="#1e2433" rx="3"/>
  <text x="303" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">WAL 3</text>
  <rect x="332" y="148" width="50" height="24" fill="#55c555" rx="3" opacity="0.5"/>
  <text x="357" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">WAL 4</text>
  <rect x="386" y="148" width="50" height="24" fill="#55c555" rx="3" opacity="0.5"/>
  <text x="411" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">WAL 5</text>
  <rect x="440" y="148" width="50" height="24" fill="#55c555" rx="3" opacity="0.5"/>
  <text x="465" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">WAL 6</text>
  <rect x="494" y="148" width="50" height="24" fill="#e05555" rx="3" opacity="0.7"/>
  <text x="519" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555">WAL 7</text>
  <rect x="548" y="148" width="50" height="24" fill="#888" rx="3" opacity="0.3"/>
  <text x="573" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#555">WAL 8</text>
  <rect x="602" y="148" width="50" height="24" fill="#888" rx="3" opacity="0.3"/>
  <text x="627" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#555">WAL 9</text>

  <!-- Disaster marker -->
  <line x1="519" y1="105" x2="519" y2="148" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="519" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">💥 장애 (화요일 14:00)</text>

  <!-- Recovery target marker -->
  <line x1="465" y1="105" x2="465" y2="148" stroke="#55c555" stroke-width="2"/>
  <text x="465" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">복구 목표 (화요일 13:30)</text>

  <!-- Recovery steps -->
  <rect x="60" y="270" width="760" height="160" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">PITR 복구 단계</text>

  <rect x="80" y="308" width="160" height="100" fill="#0f1724" rx="6" stroke="#7ec8e3"/>
  <text x="160" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">① Base Backup</text>
  <text x="160" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">복구 서버에</text>
  <text x="160" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">베이스 백업 복원</text>
  <text x="160" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">pg_basebackup</text>
  <text x="160" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">또는 파일 복사</text>

  <line x1="240" y1="358" x2="272" y2="358" stroke="#888" stroke-width="1.5"/>
  <polygon points="272,358 260,352 260,364" fill="#888"/>

  <rect x="272" y="308" width="160" height="100" fill="#0f1724" rx="6" stroke="#7777cc"/>
  <text x="352" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">② recovery.conf</text>
  <text x="352" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">restore_command</text>
  <text x="352" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">recovery_target_time</text>
  <text x="352" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">설정</text>

  <line x1="432" y1="358" x2="464" y2="358" stroke="#888" stroke-width="1.5"/>
  <polygon points="464,358 452,352 452,364" fill="#888"/>

  <rect x="464" y="308" width="160" height="100" fill="#0f1724" rx="6" stroke="#55c555"/>
  <text x="544" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">③ WAL Apply</text>
  <text x="544" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">베이스부터</text>
  <text x="544" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">목표 시점까지</text>
  <text x="544" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">WAL 순서대로 재생</text>

  <line x1="624" y1="358" x2="656" y2="358" stroke="#888" stroke-width="1.5"/>
  <polygon points="656,358 644,352 644,364" fill="#888"/>

  <rect x="656" y="308" width="144" height="100" fill="#0f1724" rx="6" stroke="#7ec8e3"/>
  <text x="728" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">④ 복구 완료</text>
  <text x="728" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">pg_ctl promote</text>
  <text x="728" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">또는</text>
  <text x="728" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">recovery_target</text>
  <text x="728" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">= 'immediate'</text>
</svg>
