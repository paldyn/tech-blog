<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="440" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8">var vs let vs const</text>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#555">스코프·재선언·재할당 비교</text>

  <!-- Column headers -->
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="180" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#e06c75">var</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="440" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#6b9fff">let</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="700" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#6abf5e">const</text>

  <!-- Row: 스코프 -->
  <text x="40" y="142" font-size="12" fill="#888">스코프</text>
  <line x1="30" y1="150" x2="850" y2="150" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="80" y="124" width="200" height="32" rx="6" fill="#2a1a1a"/>
  <text x="180" y="145" text-anchor="middle" font-size="12" fill="#e06c75">함수 스코프</text>

  <rect x="340" y="124" width="200" height="32" rx="6" fill="#1a1a2a"/>
  <text x="440" y="145" text-anchor="middle" font-size="12" fill="#6b9fff">블록 스코프</text>

  <rect x="600" y="124" width="200" height="32" rx="6" fill="#1a2a1a"/>
  <text x="700" y="145" text-anchor="middle" font-size="12" fill="#6abf5e">블록 스코프</text>

  <!-- Row: 재선언 -->
  <text x="40" y="198" font-size="12" fill="#888">재선언</text>
  <line x1="30" y1="206" x2="850" y2="206" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="80" y="180" width="200" height="32" rx="6" fill="#2a1a1a"/>
  <text x="180" y="201" text-anchor="middle" font-size="12" fill="#e06c75">가능 ✓</text>

  <rect x="340" y="180" width="200" height="32" rx="6" fill="#1a1a1a"/>
  <text x="440" y="201" text-anchor="middle" font-size="12" fill="#555">불가 ✗</text>

  <rect x="600" y="180" width="200" height="32" rx="6" fill="#1a1a1a"/>
  <text x="700" y="201" text-anchor="middle" font-size="12" fill="#555">불가 ✗</text>

  <!-- Row: 재할당 -->
  <text x="40" y="254" font-size="12" fill="#888">재할당</text>
  <line x1="30" y1="262" x2="850" y2="262" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="80" y="236" width="200" height="32" rx="6" fill="#2a1a1a"/>
  <text x="180" y="257" text-anchor="middle" font-size="12" fill="#e06c75">가능 ✓</text>

  <rect x="340" y="236" width="200" height="32" rx="6" fill="#1a1a2a"/>
  <text x="440" y="257" text-anchor="middle" font-size="12" fill="#6b9fff">가능 ✓</text>

  <rect x="600" y="236" width="200" height="32" rx="6" fill="#1a1a1a"/>
  <text x="700" y="257" text-anchor="middle" font-size="12" fill="#555">불가 ✗</text>

  <!-- Row: 호이스팅 -->
  <text x="40" y="310" font-size="12" fill="#888">호이스팅</text>
  <line x1="30" y1="318" x2="850" y2="318" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="80" y="292" width="200" height="32" rx="6" fill="#2a1a1a"/>
  <text x="180" y="313" text-anchor="middle" font-size="12" fill="#e06c75">undefined로 초기화</text>

  <rect x="340" y="292" width="200" height="32" rx="6" fill="#1a1a2a"/>
  <text x="440" y="313" text-anchor="middle" font-size="12" fill="#6b9fff">TDZ (오류 발생)</text>

  <rect x="600" y="292" width="200" height="32" rx="6" fill="#1a1a2a"/>
  <text x="700" y="313" text-anchor="middle" font-size="12" fill="#6abf5e">TDZ (오류 발생)</text>

  <!-- Row: 권장 -->
  <text x="40" y="366" font-size="12" fill="#888">권장</text>
  <rect x="80" y="348" width="200" height="32" rx="6" fill="#1a1a1a"/>
  <text x="180" y="369" text-anchor="middle" font-size="12" fill="#444">레거시 코드에서만</text>

  <rect x="340" y="348" width="200" height="32" rx="6" fill="#1a1a2a"/>
  <text x="440" y="369" text-anchor="middle" font-size="12" fill="#6b9fff">값이 바뀌는 변수</text>

  <rect x="600" y="348" width="200" height="32" rx="6" fill="#1a2a1a"/>
  <text x="700" y="369" text-anchor="middle" font-size="12" fill="#6abf5e">기본값 (권장)</text>

  <!-- Bottom note -->
  <text x="440" y="416" text-anchor="middle" font-size="12" fill="#444">ES6(2015) 이후 var 대신 const를 기본으로, 변경이 필요할 때만 let을 사용하는 것이 관례입니다</text>
</svg>
