<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">BFLA 방어: 권한 매트릭스 설계</text>

  <!-- Matrix header -->
  <rect x="60" y="62" width="760" height="34" rx="6" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">엔드포인트</text>
  <text x="380" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Guest</text>
  <text x="490" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">User</text>
  <text x="600" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Manager</text>
  <text x="720" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Admin</text>

  <!-- Rows -->
  <!-- GET /api/products -->
  <rect x="60" y="96" width="760" height="32" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="200" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">GET /api/products</text>
  <text x="380" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>
  <text x="490" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>
  <text x="600" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>
  <text x="720" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>

  <!-- GET /api/orders/:id -->
  <rect x="60" y="128" width="760" height="32" rx="0" fill="#111820" stroke="#2a3a5e" stroke-width="1"/>
  <text x="200" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">GET /api/orders/:id</text>
  <text x="380" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717;</text>
  <text x="490" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">소유자만</text>
  <text x="600" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">팀 내</text>
  <text x="720" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>

  <!-- POST /api/orders -->
  <rect x="60" y="160" width="760" height="32" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="200" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">POST /api/orders</text>
  <text x="380" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717;</text>
  <text x="490" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>
  <text x="600" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>
  <text x="720" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>

  <!-- DELETE /api/orders/:id -->
  <rect x="60" y="192" width="760" height="32" rx="0" fill="#111820" stroke="#2a3a5e" stroke-width="1"/>
  <text x="200" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">DELETE /api/orders/:id</text>
  <text x="380" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717;</text>
  <text x="490" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717;</text>
  <text x="600" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">팀 내만</text>
  <text x="720" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>

  <!-- POST /api/admin/users -->
  <rect x="60" y="224" width="760" height="32" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="200" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">POST /api/admin/users</text>
  <text x="380" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717;</text>
  <text x="490" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717;</text>
  <text x="600" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717;</text>
  <text x="720" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>

  <!-- PUT /api/admin/config -->
  <rect x="60" y="256" width="760" height="32" rx="0" fill="#111820" stroke="#2a3a5e" stroke-width="1"/>
  <text x="200" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PUT /api/admin/config</text>
  <text x="380" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717;</text>
  <text x="490" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717;</text>
  <text x="600" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717;</text>
  <text x="720" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2714;</text>

  <!-- Code block: automated test -->
  <rect x="60" y="306" width="760" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Pytest: 권한 매트릭스 자동 테스트</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">@pytest.mark.parametrize("role,expected", [</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    ("guest", 401), ("user", 403),</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    ("manager", 403), ("admin", 200),</text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">])</text>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">def test_admin_config(client, role, expected):</text>
</svg>
