<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">QuerySet은 게으르다 (lazy)</text>

  <defs>
    <marker id="lqar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="96" width="300" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">qs = Book.objects.filter(</text>
  <text x="76" y="150" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    price__lt=<tspan fill="#b5cea8">20000</tspan>)</text>
  <text x="76" y="178" font-size="12" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 아직 DB에 안 감</text>

  <line x1="360" y1="146" x2="426" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lqar)"/>
  <text x="393" y="129" font-size="11" fill="#9aa4b8" text-anchor="middle">평가 시점</text>

  <rect x="430" y="96" width="390" height="100" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="446" y="126" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">for</tspan> book <tspan fill="#7ec8e3" font-weight="600">in</tspan> qs:  <tspan fill="#9aa4b8"># 이때 쿼리 실행</tspan></text>
  <text x="446" y="154" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">list(qs) / len(qs) / qs[0]</text>
  <text x="446" y="182" font-size="12" xml:space="preserve" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 결과가 필요한 순간 SQL 1번</text>

  <rect x="60" y="220" width="760" height="56" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="244" font-size="13" fill="#55c555" text-anchor="middle">filter()를 여러 번 이어 붙여도 쿼리는 결과가 필요할 때 딱 한 번만 실행된다</text>
  <text x="440" y="266" font-size="12" fill="#9aa4b8" text-anchor="middle">덕분에 조건을 자유롭게 조립해 두고, 평가는 마지막에 한 번에 한다</text>
</svg>
