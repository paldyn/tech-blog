<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">낭비는 어디서 오는가 — 요청·사용·청구의 간극</text>

  <!-- node capacity bar -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">노드 용량 (내가 돈 내는 양)</text>
  <rect x="60" y="112" width="760" height="44" rx="6" fill="#13151c" stroke="#3a4a6e" stroke-width="1"/>

  <!-- requested -->
  <text x="60" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">requests 합계 (스케줄러가 예약한 양)</text>
  <rect x="60" y="198" width="540" height="44" rx="6" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="600" y="198" width="220" height="44" rx="6" fill="#201010" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="710" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">예약 안 됨 → 빈 슬롯 낭비</text>

  <!-- actually used -->
  <text x="60" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">실제 사용량 (진짜 일한 양)</text>
  <rect x="60" y="284" width="240" height="44" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <rect x="300" y="284" width="300" height="44" rx="6" fill="#201010" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="450" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">과대 요청(over-request) → 슬랙 낭비</text>

  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">청구는 노드 용량 기준 · 스케줄링은 requests 기준 · 가치는 실제 사용 기준 — 세 막대를 좁히는 게 최적화</text>
</svg>
