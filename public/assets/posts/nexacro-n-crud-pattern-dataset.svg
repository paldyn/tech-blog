<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Dataset rowStatus — CRUD 상태 흐름</text>

  <!-- rowStatus legend -->
  <text x="60" y="82"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">rowStatus 값:</text>

  <rect x="190" y="68" width="90" height="26" fill="#12213a" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="235" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">NORMAL (1)</text>

  <rect x="296" y="68" width="90" height="26" fill="#122a12" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="341" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">INSERT (2)</text>

  <rect x="402" y="68" width="100" height="26" fill="#1a1a35" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="452" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">UPDATE (4)</text>

  <rect x="518" y="68" width="100" height="26" fill="#2a1212" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="568" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">DELETE (8)</text>

  <!-- Transition diagram -->
  <!-- Start state -->
  <rect x="350" y="114" width="180" height="50" fill="#12213a" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">NORMAL (1)</text>
  <text x="440" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버 조회 후 초기 상태</text>

  <!-- Arrow: NORMAL → INSERT (left) -->
  <polygon points="353,137 295,137 295,132 283,140 295,148 295,143 353,143"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="318" y="128"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">addRow()</text>

  <!-- INSERT box -->
  <rect x="120" y="114" width="160" height="50" fill="#122a12" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="200" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">INSERT (2)</text>
  <text x="200" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">신규 행 추가됨</text>

  <!-- Arrow: NORMAL → UPDATE (right) -->
  <polygon points="530,137 588,137 588,132 600,140 588,148 588,143 530,143"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>
  <text x="565" y="128"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">setColumn()</text>

  <!-- UPDATE box -->
  <rect x="600" y="114" width="160" height="50" fill="#1a1a35" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="680" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">UPDATE (4)</text>
  <text x="680" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기존 행 수정됨</text>

  <!-- Arrows down to DELETE or SAVE -->
  <!-- INSERT → fn_save →  서버 INSERT -->
  <polygon points="197,164 197,222 192,222 200,234 208,222 203,222 203,164"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>

  <!-- UPDATE → fn_save → 서버 UPDATE -->
  <polygon points="677,164 677,222 672,222 680,234 688,222 683,222 683,164"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>

  <!-- NORMAL → DELETE -->
  <polygon points="437,164 437,222 432,222 440,234 448,222 443,222 443,164"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="460" y="198"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">deleteRow()</text>

  <!-- DELETE box (center) -->
  <rect x="350" y="234" width="180" height="50" fill="#2a1212" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="256" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">DELETE (8)</text>
  <text x="440" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">논리 삭제 (Grid 숨김)</text>

  <!-- Save boxes at bottom -->
  <rect x="120" y="330" width="160" height="46" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">서버 INSERT</text>
  <text x="200" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">신규 레코드 생성</text>

  <!-- Arrow: DELETE box → server DELETE -->
  <polygon points="437,284 437,322 432,322 440,334 448,322 443,322 443,284"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>

  <rect x="350" y="334" width="180" height="46" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="354" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">서버 DELETE</text>
  <text x="440" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">레코드 삭제</text>

  <rect x="600" y="330" width="160" height="46" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">서버 UPDATE</text>
  <text x="680" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기존 레코드 수정</text>

  <!-- fn_save label -->
  <text x="440" y="398"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">fn_save() 호출 시 rowStatus별로 분기 처리하여 서버에 일괄 전송</text>
</svg>
