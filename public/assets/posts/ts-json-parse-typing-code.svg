<svg xmlns="http://www.w3.org/2000/svg" width="880" height="278" viewBox="0 0 880 278">
<rect width="880" height="278" fill="#0a0a0a" rx="12"/>
<text x="50" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">안전한 JSON.parse 타이핑</text>
<text x="50" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">위험한 단언</text>
<text x="470" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">unknown + 검증</text>
<rect x="50" y="96" width="360" height="116" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> u = </tspan><tspan font-weight="600" fill="#7ec8e3">JSON</tspan><tspan fill="#ffffff">.parse(s)</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">  </tspan><tspan font-weight="600" fill="#7ec8e3">as</tspan><tspan fill="#ffffff"> User</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff"></tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// 런타임 검증 없음</tspan></text>
<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// 형태 틀려도 통과</tspan></text>
<rect x="470" y="96" width="360" height="154" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> parse(s: </tspan><tspan font-weight="600" fill="#7ec8e3">string</tspan><tspan fill="#ffffff">)</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">  : </tspan><tspan font-weight="600" fill="#7ec8e3">unknown</tspan><tspan fill="#ffffff"> {</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" font-weight="600" fill="#7ec8e3">  return</tspan><tspan font-weight="600" fill="#7ec8e3"> JSON</tspan><tspan fill="#ffffff">.parse(s)</tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">}</tspan></text>
<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> raw = parse(s)</tspan></text>
<text y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (isUser(raw)) use(raw)</tspan></text>
<text y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#9aa4b8">// 가드 통과 후 User</tspan></text>
</svg>
