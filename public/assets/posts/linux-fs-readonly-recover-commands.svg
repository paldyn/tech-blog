<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">파일 시스템 복구 명령어</text>

  <!-- Left -->
  <text x="220" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">진단</text>

  <rect x="50" y="88" width="360" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 디스크 오류 로그</text>
  <text x="66" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">dmesg | grep -E "I/O error|EXT4"</text>
  <text x="66" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 마운트 상태 확인</text>
  <text x="66" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">mount | grep "(ro)"</text>
  <text x="66" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">findmnt -o TARGET,OPTIONS</text>
  <text x="66" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># SMART 상태 확인</text>
  <text x="66" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">smartctl -a /dev/sda</text>
  <text x="66" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 파일 시스템 정보</text>
  <text x="66" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">tune2fs -l /dev/sda1 | grep state</text>

  <!-- Right -->
  <text x="660" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">복구</text>

  <rect x="470" y="88" width="360" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="486" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 즉각 remount</text>
  <text x="486" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">mount -o remount,rw /</text>
  <text x="486" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 비루트 파티션 remount</text>
  <text x="486" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">mount -o remount,rw /data</text>
  <text x="486" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># fsck (언마운트 필요)</text>
  <text x="486" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">umount /dev/sdb1</text>
  <text x="486" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">fsck</tspan><tspan fill="#ffffff"> -y /dev/sdb1</tspan></text>
  <text x="486" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 에러 카운트 초기화</text>
  <text x="486" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">tune2fs -C 0 /dev/sda1</text>

  <!-- Bottom tip -->
  <rect x="50" y="298" width="780" height="70" rx="8" fill="#0f1525" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="322" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">루트 파티션 fsck — 복구 모드 필요</text>
  <text x="440" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">부팅 시 GRUB → 복구 모드(Recovery mode) → 루트 셸 진입</text>
  <text x="440" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">mount -o remount,rw / → fsck -y /dev/sda1 → reboot</text>
</svg>
