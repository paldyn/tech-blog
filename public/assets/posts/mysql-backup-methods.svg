<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MySQL 백업 방법 비교</text>

  <defs>
    <marker id="arr-bk" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- mysqldump -->
  <rect x="60" y="80" width="360" height="260" rx="8" fill="#0f1a2e" stroke="#3a6aae" stroke-width="2"/>
  <text x="240" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">mysqldump (논리 백업)</text>

  <text x="76" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">방식: SQL 문으로 내보내기</text>
  <text x="76" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  설정 간단, 이식성 최고</text>
  <text x="76" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  파티션 테이블·뷰 포함</text>
  <text x="76" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  텍스트 파일, 검증 쉬움</text>
  <text x="76" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  수십GB 이상에서 느림</text>
  <text x="76" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  복구 시 재INSERT → 느림</text>
  <text x="76" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  백업 중 잠금 (MyISAM)</text>

  <line x1="76" y1="268" x2="404" y2="268" stroke="#3a6aae" stroke-width="1"/>
  <text x="76" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">적합: 소규모 DB, 스키마 마이그레이션</text>
  <text x="76" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">한계: 1TB 이상에서 실용적이지 않음</text>
  <text x="76" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">--single-transaction: InnoDB 무잠금 백업</text>

  <!-- XtraBackup -->
  <rect x="460" y="80" width="360" height="260" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">XtraBackup (물리 백업)</text>

  <text x="476" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">방식: 데이터 파일 직접 복사</text>
  <text x="476" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  핫 백업 — 서비스 중단 없음</text>
  <text x="476" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  수TB 대용량도 빠름</text>
  <text x="476" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  증분 백업 지원</text>
  <text x="476" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  새 Replica 구축에 최적</text>
  <text x="476" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  같은 MySQL 버전에서만 복구</text>
  <text x="476" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  prepare 단계 필요</text>

  <line x1="476" y1="268" x2="804" y2="268" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">적합: 프로덕션 대용량 DB</text>
  <text x="476" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">도구: Percona XtraBackup (무료, 오픈소스)</text>
  <text x="476" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">MySQL Enterprise Backup은 상용 대응</text>

  <!-- Bottom: RTO/RPO -->
  <rect x="60" y="360" width="760" height="110" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">백업 전략 핵심 지표</text>

  <text x="100" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">RTO</text>
  <text x="100" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">복구 목표 시간</text>
  <text x="100" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">장애→서비스 복구</text>

  <text x="270" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">RPO</text>
  <text x="270" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">복구 목표 시점</text>
  <text x="270" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">허용 데이터 손실 범위</text>

  <text x="500" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e09055" text-anchor="middle">3-2-1 원칙</text>
  <text x="500" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">복사본 3개 · 미디어 2종</text>
  <text x="500" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">오프사이트 1개 보관</text>

  <text x="730" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">PITR</text>
  <text x="730" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">전체백업 + binlog</text>
  <text x="730" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">초 단위 복구 가능</text>
</svg>
