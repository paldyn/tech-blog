<svg width="880" height="470" viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrP" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="470" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">폴라드 로(Pollard's Rho): 수열이 그리는 ρ 모양</text>

  <!-- tail -->
  <line x1="142" y1="162" x2="222" y2="231" stroke="#7777cc" stroke-width="2" marker-end="url(#arrP)"/>
  <circle cx="132" cy="153" r="13" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
  <text x="132" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">x₀</text>

  <!-- cycle nodes: hexagon around (300,290) r=85 -->
  <line x1="231" y1="240" x2="290" y2="200" stroke="#7777cc" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="311" y1="206" x2="365" y2="240" stroke="#7777cc" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="374" y1="252" x2="374" y2="324" stroke="#7777cc" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="365" y1="338" x2="311" y2="372" stroke="#7777cc" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="290" y1="378" x2="236" y2="344" stroke="#7777cc" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="226" y1="332" x2="226" y2="252" stroke="#7777cc" stroke-width="2" marker-end="url(#arrP)"/>

  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" text-anchor="middle">
    <circle cx="226" cy="245" r="13" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
    <text x="226" y="250" fill="#7ec8e3">x₁</text>
    <circle cx="300" cy="198" r="13" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
    <text x="300" y="203" fill="#7ec8e3">x₂</text>
    <circle cx="374" cy="245" r="13" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
    <text x="374" y="250" fill="#7ec8e3">x₃</text>
    <circle cx="374" cy="338" r="13" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
    <text x="374" y="343" fill="#7ec8e3">x₄</text>
    <circle cx="300" cy="384" r="13" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
    <text x="300" y="389" fill="#7ec8e3">x₅</text>
    <circle cx="226" cy="338" r="13" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
    <text x="226" y="343" fill="#7ec8e3">x₆</text>
  </g>

  <text x="300" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">mod p 에서 순환</text>

  <!-- annotation box -->
  <rect x="520" y="140" width="300" height="220" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="536" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">f(x)</tspan><tspan fill="#ffffff"> = (x² + c) mod n</tspan></text>
    <text x="536" y="206" fill="#ffffff">유한 집합의 수열은 반드시</text>
    <text x="536" y="232" fill="#ffffff">ρ 모양(꼬리 + 순환)이 된다</text>
    <text x="536" y="264" fill="#ffffff">거북 1칸 · 토끼 2칸으로 추적</text>
    <text x="536" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#ffffff">d = gcd(|x - y|, n)</tspan></text>
    <text x="536" y="328" fill="#55c555" font-weight="600">1 &lt; d &lt; n 이면 약수 발견!</text>
  </g>

  <text x="60" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">생일 역설에 의해 기대 O(n¼) 번의 반복으로 충돌 — 64비트 합성수도 빠르게 분해</text>
</svg>
