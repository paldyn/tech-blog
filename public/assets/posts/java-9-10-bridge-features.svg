<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 9 · 10 핵심 변경 사항</text>

  <!-- Java 9 column -->
  <text x="220" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">Java 9 (2017.09)</text>

  <rect x="60" y="90" width="340" height="68" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Java Platform Module System (JPMS)</text>
  <text x="230" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">module-info.java — requires / exports</text>
  <text x="230" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">강한 캡슐화 · 명시적 의존성 선언</text>

  <rect x="60" y="172" width="340" height="56" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">JShell (REPL)</text>
  <text x="230" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대화형 Java 실행 환경 — 빠른 프로토타이핑</text>

  <rect x="60" y="242" width="340" height="56" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Collection Factory Methods</text>
  <text x="230" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">List.of() · Set.of() · Map.of() — 불변 컬렉션</text>

  <rect x="60" y="312" width="340" height="56" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="336" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Stream / Optional 개선</text>
  <text x="230" y="354" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">takeWhile() · dropWhile() · iterate() / ifPresentOrElse()</text>

  <rect x="60" y="382" width="340" height="56" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Private Interface Methods</text>
  <text x="230" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">default 메서드 내 공통 로직 추출 가능</text>

  <!-- divider -->
  <line x1="440" y1="60" x2="440" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Java 10 column -->
  <text x="660" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">Java 10 (2018.03)</text>

  <rect x="460" y="90" width="360" height="68" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Local Variable Type Inference (var)</text>
  <text x="640" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로컬 변수 타입 추론 — var 키워드</text>
  <text x="640" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컴파일 타임에 타입 결정 (동적 타입 아님)</text>

  <rect x="460" y="172" width="360" height="56" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Collectors 추가</text>
  <text x="640" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">toUnmodifiableList() · toUnmodifiableMap()</text>

  <rect x="460" y="242" width="360" height="56" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">G1GC 기본 설정 변경</text>
  <text x="640" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Parallel GC → G1 GC 기본값 변경</text>

  <rect x="460" y="312" width="360" height="56" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="336" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">App CDS (Class Data Sharing)</text>
  <text x="640" y="354" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JVM 시작 시간 단축 · 메모리 절약</text>

  <rect x="460" y="382" width="360" height="56" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">6개월 릴리스 사이클 시작</text>
  <text x="640" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Java 10부터 6개월마다 새 버전 출시</text>
</svg>
