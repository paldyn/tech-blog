<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">const enum 컴파일 결과 비교</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 2 0 L 7 13 L 12 0 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- LEFT COLUMN: 일반 enum -->
  <text x="230" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">일반 enum</text>

  <!-- LEFT: TypeScript source box (2 lines) -->
  <rect x="60" y="96" width="340" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">enum</tspan><tspan fill="#ffffff"> Dir { Up = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, Down = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> }</tspan></text>
  <text x="76" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> d = Dir.Up;</tspan></text>

  <!-- Arrow DOWN left -->
  <line x1="230" y1="158" x2="230" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- LEFT: compiled JS box (7 lines, height ~148) -->
  <rect x="60" y="196" width="340" height="202" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> Dir;</tspan></text>
  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> (Dir) {</tspan></text>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  Dir[Dir[</tspan><tspan fill="#ce9178">"Up"</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#ce9178">"Up"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  Dir[Dir[</tspan><tspan fill="#ce9178">"Down"</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#ce9178">"Down"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">})(Dir || (Dir = {}));</tspan></text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> d = Dir.Up;</tspan></text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// enum 객체 생성됨</tspan></text>

  <!-- LEFT label: compiled JS -->
  <text x="230" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">컴파일된 JavaScript</text>

  <!-- RIGHT COLUMN: const enum -->
  <text x="650" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">const enum</text>

  <!-- RIGHT: TypeScript source box (2 lines) -->
  <rect x="480" y="96" width="340" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const enum</tspan><tspan fill="#ffffff"> Dir { Up = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, Down = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> }</tspan></text>
  <text x="496" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> d = Dir.Up;</tspan></text>

  <!-- Arrow DOWN right -->
  <line x1="650" y1="158" x2="650" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- RIGHT: compiled JS box (2 lines) -->
  <rect x="480" y="196" width="340" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// enum 객체 없음!</tspan></text>
  <text x="496" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> d = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// 인라인됨</tspan></text>

  <!-- RIGHT label: compiled JS -->
  <text x="650" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">컴파일된 JavaScript</text>

  <!-- RIGHT: benefit note box -->
  <rect x="480" y="326" width="340" height="50" rx="6" fill="#0a1a0a" stroke="#1a4a1a" stroke-width="1"/>
  <text x="650" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">숫자 리터럴로 직접 치환됨</text>
  <text x="650" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">런타임에 enum 객체 참조 없음</text>

  <!-- VS divider -->
  <line x1="440" y1="80" x2="440" y2="440" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#555" text-anchor="middle" xml:space="preserve">VS</text>
</svg>
