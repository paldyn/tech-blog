<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">IPv4 주소 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">32비트 = 4 옥텟 — 네트워크 부분 + 호스트 부분</text>

  <!-- IP address binary display -->
  <rect x="60" y="90" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" fill="#7ec8e3" font-weight="600" xml:space="preserve">192         .  168         .  1           .  10</text>
  <text x="440" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">11000000  .  10101000  .  00000001  .  00001010</text>

  <!-- network vs host split (assuming /24) -->
  <rect x="60" y="165" width="575" height="50" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="347" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">네트워크 부분 (Network ID)</text>
  <text x="347" y="206" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">192.168.1   (/24 기준 앞 24비트)</text>

  <rect x="645" y="165" width="175" height="50" rx="6" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="732" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8c44a">호스트 부분</text>
  <text x="732" y="206" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">.10 (뒤 8비트)</text>

  <!-- special addresses -->
  <rect x="60" y="235" width="760" height="130" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">IPv4 특수 주소</text>
  <line x1="70" y1="266" x2="810" y2="266" stroke="#222" stroke-width="1"/>

  <text x="80" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">127.0.0.1          </text>
  <text x="290" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">루프백 (loopback) — 자기 자신</text>

  <text x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">0.0.0.0            </text>
  <text x="290" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">미지정 주소 (any)</text>

  <text x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">255.255.255.255    </text>
  <text x="290" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">제한 브로드캐스트</text>

  <text x="80" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">192.168.x.x        </text>
  <text x="290" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">사설 IP (RFC 1918) — 인터넷 불가</text>

  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">서브넷 마스크 /24 = 255.255.255.0 — 앞 24비트가 네트워크, 뒤 8비트가 호스트</text>
</svg>
