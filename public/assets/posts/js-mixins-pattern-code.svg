  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">고차 함수로 Base를 받아 기능이 추가된 클래스 반환</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="256" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"><tspan fill="#7ec8e3">const</tspan><tspan> Flyable = (B) =></tspan></text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  <tspan fill="#7ec8e3">class</tspan><tspan> </tspan><tspan fill="#7ec8e3">extends</tspan><tspan> B {</tspan></text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">    fly() { <tspan fill="#7ec8e3">return</tspan><tspan> </tspan><tspan fill="#ce9178">'fly'</tspan><tspan>; }</tspan></text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  };</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"><tspan fill="#7ec8e3">const</tspan><tspan> Swim = (B) =></tspan></text>
  <text x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  <tspan fill="#7ec8e3">class</tspan><tspan> </tspan><tspan fill="#7ec8e3">extends</tspan><tspan> B {</tspan></text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">    swim() { <tspan fill="#7ec8e3">return</tspan><tspan> </tspan><tspan fill="#ce9178">'swim'</tspan><tspan>; }</tspan></text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  };</text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"><tspan fill="#7ec8e3">class</tspan><tspan> Animal {}</tspan></text>
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"><tspan fill="#7ec8e3">class</tspan><tspan> Duck </tspan><tspan fill="#7ec8e3">extends</tspan></text>
  <text x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  Flyable(Swim(Animal)) {}</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"><tspan fill="#7ec8e3">const</tspan><tspan> d = </tspan><tspan fill="#7ec8e3">new</tspan><tspan> Duck(); d.fly(); d.swim();</tspan></text>

