<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">서버 컴포넌트 vs 클라이언트 컴포넌트</text>

  <!-- LEFT: Server Component -->
  <rect x="50" y="68" width="360" height="420" rx="8" fill="#0d1f2d" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="230" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">Server Component</text>
  <text x="230" y="119" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본값 — 선언 불필요</text>

  <!-- Server features -->
  <rect x="72" y="134" width="316" height="36" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="88" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  서버에서 렌더링 — JS 번들 포함 안 됨</text>

  <rect x="72" y="180" width="316" height="36" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="88" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  DB, 파일시스템 직접 접근 가능</text>

  <rect x="72" y="226" width="316" height="36" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="88" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  API 키 등 민감 정보 노출 없음</text>

  <rect x="72" y="272" width="316" height="36" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="88" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  async/await 컴포넌트 작성 가능</text>

  <rect x="72" y="318" width="316" height="36" rx="5" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="88" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗  useState, useEffect 사용 불가</text>

  <rect x="72" y="364" width="316" height="36" rx="5" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="88" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗  onClick 등 이벤트 핸들러 불가</text>

  <!-- Code block (server) -->
  <rect x="72" y="414" width="316" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 선언 불필요 (기본값)</text>
  <text x="88" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export default async function</text>
  <text x="88" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  Page() { ... }</text>

  <!-- RIGHT: Client Component -->
  <rect x="470" y="68" width="360" height="420" rx="8" fill="#1a1a0d" stroke="#5a5a2e" stroke-width="1.5"/>
  <text x="650" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8d44d">Client Component</text>
  <text x="650" y="119" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">'use client' 지시문 필요</text>

  <!-- Client features -->
  <rect x="492" y="134" width="316" height="36" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  useState, useEffect, useRef 사용</text>

  <rect x="492" y="180" width="316" height="36" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  onClick 등 이벤트 핸들러 사용</text>

  <rect x="492" y="226" width="316" height="36" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  브라우저 API (window, document) 접근</text>

  <rect x="492" y="272" width="316" height="36" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  클라이언트 사이드 라이브러리 사용</text>

  <rect x="492" y="318" width="316" height="36" rx="5" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="508" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗  DB 직접 접근 불가</text>

  <rect x="492" y="364" width="316" height="36" rx="5" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="508" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗  JS 번들에 포함됨 (크기 주의)</text>

  <!-- Code block (client) -->
  <rect x="492" y="414" width="316" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="508" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">'use client'</text>
  <text x="508" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export default function</text>
  <text x="508" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  Counter() { ... }</text>
</svg>
