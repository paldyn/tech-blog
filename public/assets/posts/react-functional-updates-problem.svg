<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">클로저 함정과 함수형 업데이트</text>

  <!-- Problem (top) -->
  <text x="440" y="74" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">문제: 클로저가 오래된 값을 참조</text>

  <rect x="60" y="84" width="760" height="130" rx="10" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <rect x="76" y="96" width="728" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="116" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Counter() {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [count, setCount] = useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  function</tspan><tspan fill="#ffffff"> handleTripleClick() {</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#e05555">setCount(count + 1);</tspan><tspan fill="#9aa4b8"> // count=0 캡처</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#e05555">setCount(count + 1);</tspan><tspan fill="#9aa4b8"> // count=0 캡처 (동일)</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#e05555">setCount(count + 1);</tspan><tspan fill="#9aa4b8"> // count=0 캡처 (동일) → 결과: 1 (3 아님!)</tspan>
  </text>

  <!-- Solution (bottom) -->
  <text x="440" y="248" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">해결: 함수형 업데이트 (이전 값을 인자로)</text>

  <rect x="60" y="258" width="760" height="148" rx="10" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>
  <rect x="76" y="270" width="728" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="290" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Counter() {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [count, setCount] = useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  function</tspan><tspan fill="#ffffff"> handleTripleClick() {</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#55c555">setCount(prev =&gt; prev + 1);</tspan><tspan fill="#9aa4b8"> // prev=0 → 1</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#55c555">setCount(prev =&gt; prev + 1);</tspan><tspan fill="#9aa4b8"> // prev=1 → 2</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#55c555">setCount(prev =&gt; prev + 1);</tspan><tspan fill="#9aa4b8"> // prev=2 → 3 ✓</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  }</tspan>
  </text>

  <!-- Bottom rule -->
  <rect x="60" y="420" width="760" height="44" rx="8" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">함수형 업데이트: setCount(prev =&gt; prev + 1)</text>
  <text x="440" y="456" text-anchor="middle" font-size="12" fill="#888">React가 큐에서 순서대로 prev를 넘겨주므로, 동일 렌더 내 여러 번 호출해도 각각 최신 값을 받는다</text>
</svg>
