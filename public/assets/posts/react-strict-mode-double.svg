<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <defs>
    <marker id="arrY" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">StrictMode — 이중 실행과 감지 원리</text>

  <!-- StrictMode 설명 -->
  <rect x="60" y="68" width="760" height="58" rx="10" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">React.StrictMode — 개발 모드 전용 품질 검사 도구</text>
  <text x="440" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로덕션 빌드에서는 완전히 비활성화 — 렌더 성능에 영향 없음</text>

  <!-- 이중 실행 타임라인 -->
  <text x="440" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">개발 모드: 마운트 시 이중 실행 흐름</text>

  <rect x="60" y="166" width="148" height="58" rx="8" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="134" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">1. 마운트</text>
  <text x="134" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컴포넌트 실행</text>

  <line x1="208" y1="195" x2="228" y2="195" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrY)"/>

  <rect x="232" y="166" width="148" height="58" rx="8" fill="#1f1008" stroke="#ce9178" stroke-width="1.5"/>
  <text x="306" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">2. 언마운트</text>
  <text x="306" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cleanup 실행</text>

  <line x1="380" y1="195" x2="400" y2="195" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrY)"/>

  <rect x="404" y="166" width="148" height="58" rx="8" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="478" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">3. 재마운트</text>
  <text x="478" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컴포넌트 재실행</text>

  <line x1="552" y1="195" x2="572" y2="195" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>

  <rect x="576" y="166" width="244" height="58" rx="8" fill="#0d1f12" stroke="#55c555" stroke-width="1.5"/>
  <text x="698" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">최종 마운트 상태 유지</text>
  <text x="698" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">화면에 보이는 것은 이 상태</text>

  <!-- 코드 박스 -->
  <rect x="60" y="248" width="380" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="270"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// StrictMode 설정</text>
  <text x="76" y="290"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">import</text>
  <text x="130" y="290"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> { StrictMode } from </text>
  <text x="282" y="290"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'react'</text>
  <text x="338" y="290"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">;</text>
  <text x="76" y="320"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// main.jsx</text>
  <text x="76" y="340"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">root.render(</text>
  <text x="76" y="360"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  &lt;StrictMode&gt;</text>
  <text x="76" y="380"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    &lt;App /&gt;</text>
  <text x="76" y="400"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  &lt;/StrictMode&gt;</text>
  <text x="76" y="420"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>

  <!-- 오른쪽 이유 설명 -->
  <rect x="468" y="248" width="352" height="180" rx="8" fill="#101820" stroke="#55c555" stroke-width="1.5"/>
  <text x="644" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">왜 이중 실행하는가?</text>
  <text x="484" y="298"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">cleanup 없는 effect 감지</text>
  <text x="484" y="318"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">비순수 컴포넌트 함수 감지</text>
  <text x="484" y="338"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">deprecated API 사용 경고</text>
  <text x="484" y="362"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">실수 예: 이중 실행에서 깨지는 코드</text>
  <text x="484" y="382"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useEffect 안에서 cleanup 없는 구독</text>
  <text x="484" y="402"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">두 번 호출되면 이벤트 핸들러 두 번 등록</text>
  <text x="484" y="422"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">cleanup 반환하면 정상 동작 확인됨</text>
</svg>
