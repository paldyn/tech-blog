  <rect x="480" y="352" width="324" height="28" rx="4" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="500" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">POST</text>
  <text x="540" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
