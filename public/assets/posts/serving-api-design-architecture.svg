  <rect x="480" y="388" width="324" height="28" rx="4" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="500" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">POST</text>
  <text x="540" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">/v1/embeddings</text>
  <text x="790" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="end">임베딩 생성</text>

  <rect x="480" y="424" width="324" height="28" rx="4" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="500" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3">GET</text>
  <text x="540" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">/v1/models</text>
  <text x="790" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="end">모델 목록</text>

  <rect x="480" y="460" width="324" height="28" rx="4" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="500" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3">GET</text>
  <text x="540" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">/health</text>
  <text x="790" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
