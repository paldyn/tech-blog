  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">POST /v1/chat/completions</text>

  <!-- 클라이언트 → 게이트웨이 -->
  <line x1="255" y1="112" x2="310" y2="112" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="283" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">HTTPS</text>

