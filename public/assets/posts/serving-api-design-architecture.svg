  <rect x="365" y="185" width="150" height="68" rx="8" fill="#1a0f1a" stroke="#6e3a6e" stroke-width="1.5"/>
  <text x="440" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">vLLM Worker</text>
  <text x="440" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GPU 2-3</text>
  <text x="440" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">PagedAttention</text>

  <rect x="530" y="185" width="150" height="68" rx="8" fill="#1a0f1a" stroke="#6e3a6e" stroke-width="1.5"/>
  <text x="605" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">vLLM Worker</text>
  <text x="605" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GPU 4-5</text>
  <text x="605" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
