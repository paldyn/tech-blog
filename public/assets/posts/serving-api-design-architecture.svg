  <!-- ── API 게이트웨이 ── -->
  <rect x="310" y="68" width="260" height="80" rx="10" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="2"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
