  <line x1="365" y1="148" x2="275" y2="185" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="185" x2="440" y2="185" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="515" y1="148" x2="605" y2="185" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── OpenAI 호환 요청/응답 형식 ── -->
  <rect x="60" y="280" width="356" height="216" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="302" xml:space="preserve"
