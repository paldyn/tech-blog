  <!-- ── 패턴 1: ReAct (좌) ── -->
  <rect x="30" y="65" width="260" height="28" rx="6" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="160" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
