  <!-- 하단: 선택 가이드 -->
  <rect x="60" y="402" width="760" height="80" rx="8" fill="#0f0f0f" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
