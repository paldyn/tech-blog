<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MusicGen 음악 생성 파이프라인</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">텍스트 프롬프트 → Transformer → EnCodec → 오디오 출력</text>

  <!-- Left pipeline: 4-step vertical flow -->

  <!-- Step 1: Text Prompt -->
  <rect x="50" y="100" width="150" height="72" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">① Text Prompt</text>
  <text x="125" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">"happy rock music</text>
  <text x="125" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle"> with guitar"</text>

  <line x1="125" y1="172" x2="125" y2="198" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: MusicGen Transformer -->
  <rect x="50" y="200" width="150" height="72" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="2"/>
  <text x="125" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">② MusicGen</text>
  <text x="125" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Transformer</text>
  <text x="125" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">자기회귀 토큰 생성</text>

  <line x1="125" y1="272" x2="125" y2="298" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Step 3: EnCodec Decoder -->
  <rect x="50" y="300" width="150" height="60" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="2"/>
  <text x="125" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">③ EnCodec</text>
  <text x="125" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Decoder (토큰 → 파형)</text>

  <!-- Arrow right from EnCodec to Audio Output -->
  <line x1="200" y1="330" x2="268" y2="330" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Audio Output -->
  <rect x="270" y="306" width="120" height="48" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="330" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">④ Audio Output</text>
  <text x="330" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">32kHz WAV</text>

  <!-- Vertical divider -->
  <line x1="450" y1="90" x2="450" y2="370" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right side: Architecture explanation -->
  <text x="470" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">아키텍처 구성 요소</text>

  <!-- EnCodec box -->
  <rect x="470" y="126" width="370" height="76" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="490" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">EnCodec</text>
  <text x="580" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> — 신경망 오디오 코덱</text>
  <text x="490" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">오디오 → RVQ 토큰 (Residual Vector</text>
  <text x="490" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Quantization) 4개 코드북 × 50토큰/초</text>

  <!-- Transformer box -->
  <rect x="470" y="214" width="370" height="76" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Transformer</text>
  <text x="580" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> — 조건부 자기회귀 생성</text>
  <text x="490" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">T5 텍스트 인코더로 프롬프트 조건화</text>
  <text x="490" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">300M / 1.5B / 3.3B 파라미터 변형</text>

  <!-- Decoder box -->
  <rect x="470" y="302" width="370" height="60" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="490" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">Decoder</text>
  <text x="548" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> — 토큰 → 파형 재구성</text>
  <text x="490" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">EnCodec 디코더, 최대 30초, Mono/Stereo</text>
</svg>
