<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">내장 서버 설정 & 커스터마이징</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">application.properties + WebServerFactoryCustomizer</text>

  <!-- Left: properties config -->
  <rect x="60" y="96" width="370" height="34" rx="6" fill="#141414" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">application.properties 기본 설정</text>

  <rect x="60" y="140" width="370" height="210" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 포트 및 컨텍스트 경로</text>
  <text x="76" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">server.port=8080</text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">server.servlet.context-path=/api</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"></text>
  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 연결 설정</text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">server.tomcat.threads.max=200</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">server.tomcat.accept-count=100</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"></text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># HTTPS(SSL)</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">server.ssl.key-store=classpath:ks.p12</text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">server.ssl.key-store-type=PKCS12</text>

  <!-- Right: Java config -->
  <rect x="450" y="96" width="370" height="34" rx="6" fill="#141414" stroke="#7777cc" stroke-width="1.5"/>
  <text x="635" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">WebServerFactoryCustomizer</text>

  <rect x="450" y="140" width="370" height="210" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888888">@Component</text>
  <text x="466" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">public class</text>
  <text x="554" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> ServerConfig</text>
  <text x="466" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  implements</text>
  <text x="554" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> WebServerFactory</text>
  <text x="466" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    Customizer&lt;Tomcat...&gt; {</text>
  <text x="466" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text>
  <text x="466" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888888">  @Override</text>
  <text x="466" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  public void</text>
  <text x="554" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> customize(</text>
  <text x="466" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      TomcatServletWeb</text>
  <text x="466" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      ServerFactory f) {</text>
  <text x="466" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    f.setPort(9090);</text>
  <text x="466" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>

  <!-- Bottom: server types -->
  <rect x="60" y="368" width="760" height="80" rx="8" fill="#141414" stroke="#444" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">지원하는 내장 서버</text>

  <rect x="100" y="406" width="160" height="30" rx="6" fill="#55c555" fill-opacity="0.15" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Tomcat (기본)</text>

  <rect x="300" y="406" width="160" height="30" rx="6" fill="#7ec8e3" fill-opacity="0.15" stroke="#7ec8e3" stroke-width="1"/>
  <text x="380" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Jetty</text>

  <rect x="500" y="406" width="160" height="30" rx="6" fill="#7777cc" fill-opacity="0.15" stroke="#7777cc" stroke-width="1"/>
  <text x="580" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9999ee">Undertow</text>

  <rect x="700" y="406" width="100" height="30" rx="6" fill="#e8c84a" fill-opacity="0.15" stroke="#e8c84a" stroke-width="1"/>
  <text x="750" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c84a">Netty*</text>

  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">* Netty는 WebFlux(Reactive) 전용</text>
</svg>
