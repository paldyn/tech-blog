<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">create-next-app 설치 흐름</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">npx 명령 한 줄로 완성되는 프로젝트 구성</text>

  <!-- Step boxes: vertical flow -->
  <!-- Step 1 -->
  <rect x="240" y="96" width="400" height="58" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① Node.js 설치 확인 (v18.17+)</text>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">node -v &amp;&amp; npm -v</text>

  <line x1="440" y1="154" x2="440" y2="178" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="240" y="180" width="400" height="58" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② create-next-app 실행</text>
  <text x="440" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">npx create-next-app@latest my-app</text>

  <line x1="440" y1="238" x2="440" y2="262" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="240" y="264" width="400" height="58" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="440" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">③ 대화형 설정 선택</text>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TypeScript · ESLint · Tailwind · App Router</text>

  <line x1="440" y1="322" x2="440" y2="346" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="240" y="348" width="400" height="58" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">④ 개발 서버 실행</text>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">cd my-app &amp;&amp; npm run dev → localhost:3000</text>

  <!-- Notes on the side -->
  <text x="70" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">권장: pnpm</text>
  <text x="70" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">또는 yarn</text>

  <text x="70" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">App Router</text>
  <text x="70" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">권장 선택</text>

  <!-- turbopack note -->
  <text x="660" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Turbopack</text>
  <text x="660" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본 활성화</text>
</svg>
