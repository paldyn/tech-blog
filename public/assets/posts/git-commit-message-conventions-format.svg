<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커밋 메시지 구조와 Conventional Commits</text>

  <!-- Left: Format structure -->
  <rect x="60" y="68" width="360" height="316" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">메시지 형식</text>

  <!-- Subject line breakdown -->
  <text x="80" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">type</text>
  <text x="116" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text>
  <text x="122" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">scope</text>
  <text x="160" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">): </text>
  <text x="178" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">subject</text>
  <text x="80" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">←── 50자 이하 권장 ──→</text>

  <!-- Blank line -->
  <text x="80" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555">(빈 줄 — 필수)</text>

  <!-- Body -->
  <text x="80" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">body (선택)</text>
  <text x="80" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">72자 이하 per line</text>
  <text x="80" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">왜 바꿨는지를 설명</text>

  <!-- Blank line 2 -->
  <text x="80" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555">(빈 줄)</text>

  <!-- Footer -->
  <text x="80" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">BREAKING CHANGE: </text>
  <text x="228" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">설명</text>
  <text x="80" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">Fixes: </text>
  <text x="136" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">#123</text>
  <text x="80" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">Co-authored-by: </text>
  <text x="220" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Name &lt;email&gt;</text>
  <text x="80" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">← footer (선택)</text>

  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">* subject와 body, body와 footer 사이 반드시 빈 줄</text>

  <!-- Right: Type table -->
  <rect x="450" y="68" width="370" height="316" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="470" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">type 목록</text>

  <!-- Type rows -->
  <text x="470" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">feat    </text>
  <text x="550" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">새 기능 추가</text>

  <text x="470" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">fix     </text>
  <text x="550" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">버그 수정</text>

  <text x="470" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">docs    </text>
  <text x="550" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">문서만 변경</text>

  <text x="470" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">style   </text>
  <text x="550" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">코드 의미 변경 없는 포맷</text>

  <text x="470" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">refactor</text>
  <text x="550" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">리팩토링 (기능 변경 없음)</text>

  <text x="470" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">perf    </text>
  <text x="550" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">성능 개선</text>

  <text x="470" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">test    </text>
  <text x="550" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">테스트 추가/수정</text>

  <text x="470" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">chore   </text>
  <text x="550" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">빌드, 패키지 설정 등</text>

  <text x="470" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">ci      </text>
  <text x="550" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CI 설정 변경</text>

  <text x="470" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">revert  </text>
  <text x="550" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이전 커밋 되돌리기</text>

  <text x="470" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">feat/fix + BREAKING CHANGE → major semver 자동 범프</text>
  <text x="470" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">semantic-release 등과 연동 시 자동화 가능</text>
</svg>
