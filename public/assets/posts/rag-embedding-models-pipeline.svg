<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="34" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">임베딩 파이프라인</text>

  <!-- Main pipeline boxes -->
  <!-- 문서 입력 -->
  <rect x="40" y="70" width="110" height="64" rx="8" fill="#1a1f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="95" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">문서 입력</text>
  <text x="95" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">텍스트 청크</text>
  <text x="95" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">List[str]</text>

  <!-- Arrow -->
  <line x1="150" y1="102" x2="178" y2="102" stroke="#555" stroke-width="2"/>
  <polygon points="178,96 192,102 178,108" fill="#555"/>

  <!-- 전처리 -->
  <rect x="192" y="70" width="116" height="64" rx="8" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">전처리</text>
  <text x="250" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">토크나이저</text>
  <text x="250" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정규화·패딩</text>

  <!-- Arrow -->
  <line x1="308" y1="102" x2="336" y2="102" stroke="#555" stroke-width="2"/>
  <polygon points="336,96 350,102 336,108" fill="#555"/>

  <!-- 임베딩 모델 -->
  <rect x="350" y="56" width="160" height="92" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="430" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">임베딩 모델</text>
  <text x="430" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Transformer Encoder</text>
  <text x="430" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Mean Pooling</text>
  <text x="430" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">API / Local 모델</text>

  <!-- Arrow -->
  <line x1="510" y1="102" x2="538" y2="102" stroke="#555" stroke-width="2"/>
  <polygon points="538,96 552,102 538,108" fill="#555"/>

  <!-- 벡터 출력 -->
  <rect x="552" y="70" width="130" height="64" rx="8" fill="#1a1f2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="617" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">벡터 출력</text>
  <text x="617" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">1536-dim</text>
  <text x="617" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">float32 vector</text>

  <!-- Arrow -->
  <line x1="682" y1="102" x2="710" y2="102" stroke="#555" stroke-width="2"/>
  <polygon points="710,96 724,102 710,108" fill="#555"/>

  <!-- 정규화 -->
  <rect x="724" y="70" width="116" height="64" rx="8" fill="#1a1f2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="782" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">정규화</text>
  <text x="782" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">L2 normalize</text>
  <text x="782" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">코사인 최적화</text>

  <!-- Downward arrow from 정규화 -->
  <line x1="782" y1="134" x2="782" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="776,160 782,174 788,160" fill="#555"/>

  <!-- 저장 -->
  <rect x="724" y="174" width="116" height="50" rx="8" fill="#1a1f2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="782" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">벡터DB 저장</text>
  <text x="782" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Upsert</text>

  <!-- Batch processing note -->
  <rect x="40" y="170" width="660" height="100" rx="8" fill="#111520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">배치 처리 (Batch Processing) 최적화</text>

  <rect x="60" y="208" width="190" height="48" rx="6" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="155" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">배치 크기 설정</text>
  <text x="155" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">API: 100~1000개/배치</text>

  <rect x="270" y="208" width="190" height="48" rx="6" fill="#1a1f2e" stroke="#55c555" stroke-width="1"/>
  <text x="365" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">병렬 처리</text>
  <text x="365" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">asyncio / ThreadPool</text>

  <rect x="480" y="208" width="200" height="48" rx="6" fill="#1a1f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="580" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Rate Limit 관리</text>
  <text x="580" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">지수 백오프 재시도</text>

  <!-- Code block area -->
  <rect x="40" y="286" width="800" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 배치 임베딩 예시</text>
  <text x="60" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">embeddings = model.encode(chunks, </text>
  <text x="290" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">batch_size=</text>
  <text x="374" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">32</text>
  <text x="395" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, normalize_embeddings=</text>
  <text x="608" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">True</text>
  <text x="641" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>
</svg>
