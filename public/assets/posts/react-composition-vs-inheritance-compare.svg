<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컴포지션 vs 상속</text>

  <!-- Inheritance (left, X) -->
  <rect x="60" y="72" width="360" height="56" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">❌ 상속 (Inheritance)</text>

  <rect x="60" y="144" width="360" height="240" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="164" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#9aa4b8">// ❌ React에서 권장하지 않음</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Button </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> Component {}</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> PrimaryButton </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> Button {}</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> DangerButton </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> Button {}</tspan></tspan>
    <tspan x="76" dy="20"> </tspan>
    <tspan x="76" dy="20"><tspan fill="#9aa4b8">// 문제점:</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#9aa4b8">// - 부모 변경이 모든 자식에 영향</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#9aa4b8">// - 다중 상속 불가</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#9aa4b8">// - 테스트 복잡</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#9aa4b8">// - 계층이 깊어질수록 이해 어려움</tspan></tspan>
  </text>

  <!-- Composition (right, O) -->
  <rect x="460" y="72" width="360" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">✓ 컴포지션 (Composition)</text>

  <rect x="460" y="144" width="360" height="240" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="164" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="476" dy="0"><tspan fill="#9aa4b8">// ✓ 작은 조각을 조합</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Button({ variant, children }) {</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">button</tspan><tspan fill="#ffffff"> className={</tspan><tspan fill="#ce9178">`btn btn-${variant}`</tspan><tspan fill="#ffffff">}&gt;</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#ffffff">      {children}</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#ffffff">    &lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">button</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#ffffff">  );</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="476" dy="20"> </tspan>
    <tspan x="476" dy="20"><tspan fill="#9aa4b8">// variant prop으로 변형 표현</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Button</tspan><tspan fill="#ffffff"> variant=</tspan><tspan fill="#ce9178">"primary"</tspan><tspan fill="#ffffff">&gt;저장&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Button</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
  </text>

  <!-- Bottom summary -->
  <rect x="60" y="400" width="760" height="28" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">React 공식 권장: "컴포지션을 상속보다 우선시하라"</text>
</svg>
