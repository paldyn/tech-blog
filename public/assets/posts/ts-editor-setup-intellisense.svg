<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript IntelliSense 체험</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">타입 정보가 만드는 강력한 개발 경험</text>
  <!-- Left: Error example -->
  <text x="225" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">타입 오류 실시간 감지</text>
  <rect x="60" y="124" width="330" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">interface</tspan><tspan fill="#ffffff"> User {</tspan></text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  age: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff"> </tspan></text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> u: User = {</tspan></text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  name: </tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">,</tspan></text>
  <!-- Error underline simulation -->
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  age: </tspan><tspan fill="#ce9178">"30"</tspan><tspan fill="#e05555">  ← 오류</tspan></text>
  <line x1="107" y1="295" x2="136" y2="295" stroke="#e05555" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">};</tspan></text>
  <!-- Error tooltip -->
  <rect x="68" y="320" width="314" height="36" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Type 'string' is not assignable to type 'number'</text>
  <!-- Right: Autocomplete example -->
  <text x="655" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">자동완성 목록</text>
  <rect x="490" y="124" width="330" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="506" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> user: User = {</tspan></text>
  <text x="506" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  name: </tspan><tspan fill="#ce9178">"Bob"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="506" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  age: </tspan><tspan fill="#b5cea8">25</tspan></text>
  <text x="506" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">};</tspan></text>
  <text x="506" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">user.</tspan><tspan fill="#7ec8e3">|</tspan><tspan fill="#9aa4b8"> ← 자동완성</tspan></text>
  <!-- Autocomplete popup -->
  <rect x="530" y="240" width="180" height="84" rx="4" fill="#1a1a1a" stroke="#4a4a8e" stroke-width="1"/>
  <rect x="530" y="240" width="180" height="22" rx="4" fill="#0d1a2a"/>
  <text x="544" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">name</text>
  <text x="680" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">string</text>
  <text x="544" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">age</text>
  <text x="680" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">number</text>
  <text x="544" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">toString</text>
  <text x="680" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">method</text>
  <text x="544" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">valueOf</text>
  <text x="680" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">method</text>
  <!-- Bottom note -->
  <rect x="60" y="368" width="760" height="58" rx="6" fill="#0d1a0d" stroke="#2d6a2d" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">타입 정보는 IDE를 강력한 개발 파트너로 만듭니다</text>
  <text x="440" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오타 방지 · 정확한 자동완성 · 함수 시그니처 힌트 · 빠른 탐색</text>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">JavaScript Checker도 활성화하면 JS 파일에서도 기본 타입 검사가 가능합니다</text>
</svg>
