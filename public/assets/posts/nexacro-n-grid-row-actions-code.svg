<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">행 단위 액션 구현 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">oncellclick · onrowdblclick · 다중 선택 처리</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="274" fill="#000000" rx="6" stroke="#3a4a6e"/>

  <!-- Comment 1: oncellclick -->
  <text x="80" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 셀 클릭: 버튼 셀 처리</text>
  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">function</text>
  <text x="136" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> grd_emp_oncellclick(obj, e) {</text>
  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  if</text>
  <text x="101" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (e.col == </text>
  <text x="177" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">4</text>
  <text x="184" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">) {</text>
  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">    var</tspan><tspan fill="#ffffff"> empId = </tspan><tspan fill="#7777cc">this</tspan><tspan fill="#ffffff">.ds_emp.getColumn(e.row, </tspan><tspan fill="#ce9178">"emp_id"</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="80" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">    this</tspan><tspan fill="#ffffff">.fn_openDetail(empId);</tspan></text>
  
  <text x="80" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="80" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Comment 2: onrowdblclick -->
  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 더블클릭: 수정 팝업 열기</text>
  <text x="80" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">function</text>
  <text x="136" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> grd_emp_onrowdblclick(obj, e) {</text>
  <text x="80" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">  var</tspan><tspan fill="#ffffff"> empId = </tspan><tspan fill="#7777cc">this</tspan><tspan fill="#ffffff">.ds_emp.getColumn(e.row, </tspan><tspan fill="#ce9178">"emp_id"</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="80" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">  this</text>
  <text x="122" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">.fn_openEditPopup(empId);</text>
  <text x="80" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Bottom note -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">e.row: 행 인덱스(Dataset rowposition) | e.col: 컬럼 인덱스</text>
</svg>
