<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a050"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">in 연산자 타입 가드</text>

  <!-- Type definitions (left panel) -->
  <rect x="40" y="66" width="360" height="118" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> Dog = { </tspan><tspan fill="#7ec8e3" font-weight="600">bark</tspan><tspan fill="#ffffff">: () =&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> };</tspan></text>
  <text x="56" y="105" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> Cat = { </tspan><tspan fill="#7ec8e3" font-weight="600">meow</tspan><tspan fill="#ffffff">: () =&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> };</tspan></text>
  <text x="56" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> makeSound(</tspan></text>
  <text x="56" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  animal: Dog | Cat) {</tspan></text>
  <text x="56" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  // in 연산자로 좁히기</tspan></text>

  <!-- In check code box -->
  <rect x="40" y="200" width="360" height="108" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ce9178">"bark"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> animal) {</tspan></text>
  <text x="56" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// animal: Dog</tspan></text>
  <text x="56" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    animal.</tspan><tspan fill="#7ec8e3" font-weight="600">bark</tspan><tspan fill="#ffffff">();</tspan></text>
  <text x="56" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  } </tspan><tspan fill="#7ec8e3" font-weight="600">else</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="56" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// animal: Cat</tspan></text>

  <!-- Closing brace -->
  <rect x="40" y="322" width="360" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    animal.</tspan><tspan fill="#7ec8e3" font-weight="600">meow</tspan><tspan fill="#ffffff">(); } }</tspan></text>

  <!-- Flow diagram (right side) -->
  <text x="640" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9aa4b8">흐름 다이어그램</text>

  <!-- Input union type -->
  <rect x="500" y="90" width="280" height="48" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="640" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">입력 타입</text>
  <text x="640" y="130" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="700" fill="#ffffff">Dog | Cat</text>

  <!-- Arrow down -->
  <line x1="640" y1="138" x2="640" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- in check diamond -->
  <rect x="510" y="168" width="260" height="44" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="191" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ce9178">"bark"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> animal</tspan></text>

  <!-- Fork arrows -->
  <line x1="510" y1="190" x2="538" y2="260" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="770" y1="190" x2="742" y2="260" stroke="#e0a050" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- true label -->
  <text x="510" y="232"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">true</text>
  <!-- false label -->
  <text x="752" y="232"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a050" font-weight="600">false</text>

  <!-- Dog branch -->
  <rect x="480" y="262" width="148" height="56" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="554" y="283" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">animal: Dog</text>
  <text x="554" y="304" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">.bark() 사용 가능</text>

  <!-- Cat branch -->
  <rect x="652" y="262" width="148" height="56" rx="8" fill="#1a1200" stroke="#e0a050" stroke-width="1.5"/>
  <text x="726" y="283" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a050">animal: Cat</text>
  <text x="726" y="304" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">.meow() 사용 가능</text>

  <!-- Key points -->
  <rect x="480" y="340" width="360" height="98" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="660" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">in 연산자 핵심 포인트</text>
  <text x="498" y="384"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2022; 객체에 특정 프로퍼티 존재 여부를 검사합니다</text>
  <text x="498" y="404"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2022; 인터페이스/타입 별칭에도 동작합니다</text>
  <text x="498" y="424"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">&#x2022; 구조적 타입 시스템과 잘 어울립니다</text>

  <!-- Left side key label -->
  <rect x="40" y="360" width="360" height="78" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="220" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">타입 정의 &amp; 사용 코드</text>
  <text x="60" y="402"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2022; Dog: bark 프로퍼티 보유</text>
  <text x="60" y="422"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2022; Cat: meow 프로퍼티 보유</text>
</svg>
