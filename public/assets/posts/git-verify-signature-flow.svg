<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git verify-commit / verify-tag 서명 검증 흐름</text>

  <!-- Step 1: Commit Object -->
  <rect x="60" y="80" width="220" height="80" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">커밋 오브젝트</text>
  <text x="170" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">gpgsig 필드에 서명 포함</text>
  <text x="170" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(PGP / SSH 중 하나)</text>

  <!-- Arrow 1 -->
  <line x1="280" y1="120" x2="336" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="308" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">읽기</text>

  <!-- Step 2: Parse -->
  <rect x="338" y="80" width="204" height="80" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">서명 분리 &amp; 파싱</text>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서명 블록 추출</text>
  <text x="440" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원본 payload 재구성</text>

  <!-- Arrow 2 -->
  <line x1="542" y1="120" x2="598" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="570" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">검증</text>

  <!-- Step 3: Keyring -->
  <rect x="600" y="80" width="220" height="80" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">공개 키 조회</text>
  <text x="710" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GPG keyring</text>
  <text x="710" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">또는 allowed_signers</text>

  <!-- Result: Good -->
  <rect x="60" y="230" width="360" height="90" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Good signature (성공)</text>
  <text x="240" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">gpg: Good signature from "Alice"</text>
  <text x="240" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서명자 일치 + 데이터 무결성 확인</text>

  <!-- Result: Bad -->
  <rect x="460" y="230" width="360" height="90" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">BAD signature (실패)</text>
  <text x="640" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커밋 내용 변조 또는 키 불일치</text>
  <text x="640" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">exit code 1 반환 (스크립트 활용 가능)</text>

  <!-- Arrows down -->
  <line x1="440" y1="160" x2="280" y2="228" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="440" y1="160" x2="600" y2="228" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Code block -->
  <rect x="60" y="348" width="760" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 커밋 서명 검증</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> verify-commit HEAD</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> verify-commit <tspan fill="#ce9178">--verbose</tspan> HEAD</text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 태그 서명 검증</text>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> verify-tag v1.0.0</text>
  <text x="76" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> log <tspan fill="#ce9178">--show-signature</tspan> <tspan fill="#b5cea8">-5</tspan></text>
</svg>
