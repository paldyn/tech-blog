<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">this 매개변수 패턴</text>

  <!-- Left: Class methods with this -->
  <text x="230" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">클래스 메서드 + this 타입</text>

  <rect x="60" y="88" width="340" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan>
    <tspan fill="#ffffff"> Builder {</tspan>
  </text>
  <text x="75" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  items: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">[] = [];</tspan>
  </text>
  <text x="75" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">  // this: 메서드 체이닝</text>
  <text x="75" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  add(item: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">this</tspan>
    <tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="75" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">this</tspan>
    <tspan fill="#ffffff">.items.push(item);</tspan>
  </text>
  <text x="75" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">    return this</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="75" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  }</tspan>
  </text>
  <text x="75" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="75" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 빌더 패턴 — 타입 유지 체이닝</text>

  <!-- Right: noImplicitThis + ThisType -->
  <text x="650" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">noImplicitThis &amp; ThisType&lt;T&gt;</text>

  <rect x="480" y="88" width="340" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="495" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// tsconfig: noImplicitThis: true</text>
  <text x="495" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> obj = {</tspan>
  </text>
  <text x="495" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  name: </tspan>
    <tspan fill="#ce9178">'World'</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="495" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  greet(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">this</tspan>
    <tspan fill="#ffffff">: { name: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff"> }) {</tspan>
  </text>
  <text x="495" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ce9178"> `Hello ${</tspan>
    <tspan fill="#7ec8e3" font-weight="600">this</tspan>
    <tspan fill="#ce9178">.name}`</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="495" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  }</tspan>
  </text>
  <text x="495" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">};</tspan>
  </text>
  <text x="495" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// this 타입 없으면 오류 발생</text>

  <!-- Bottom: ThisType<T> -->
  <text x="440" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">ThisType&lt;T&gt; 유틸리티 타입</text>

  <rect x="60" y="298" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 객체 리터럴의 메서드 this 타입을 일괄 지정</text>
  <text x="75" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">type</tspan>
    <tspan fill="#ffffff"> State = { count: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">; name: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff"> };</tspan>
  </text>
  <text x="75" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">type</tspan>
    <tspan fill="#ffffff"> Methods = ThisType&lt;State&gt; &amp; {</tspan>
  </text>
  <text x="75" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  increment(): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">void</tspan>
    <tspan fill="#ffffff">;  reset(): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">void</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="75" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">};</tspan>
    <tspan fill="#9aa4b8">  // 모든 메서드에서 this: State 자동 적용</tspan>
  </text>

  <!-- Info box -->
  <rect x="60" y="425" width="760" height="22" rx="4" fill="#0a1628" stroke="#3178c6" stroke-width="1"/>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">this: ClassName 반환 타입은 서브클래스에서 오버라이드 시 서브클래스 타입을 유지하는 다형적 this로 동작</text>
</svg>
