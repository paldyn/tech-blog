<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Self-Attention의 이차 복잡도 문제</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">시퀀스 길이 N에 대해 O(N²) 메모리 · 연산 → 긴 컨텍스트의 병목</text>

  <!-- Left: Complexity visualization -->
  <rect x="50" y="90" width="360" height="350" fill="#0d1117" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">표준 Attention: O(N²) 어텐션 행렬</text>

  <!-- Attention matrix visualization: N=6 -->
  <text x="230" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">N=6일 때 어텐션 행렬 (6×6 = 36 원소)</text>

  <!-- 6x6 grid of cells -->
  <!-- Row header -->
  <text x="90" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">t1</text>
  <text x="130" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">t2</text>
  <text x="170" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">t3</text>
  <text x="210" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">t4</text>
  <text x="250" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">t5</text>
  <text x="290" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">t6</text>

  <text x="68" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">t1</text>
  <text x="68" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">t2</text>
  <text x="68" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">t3</text>
  <text x="68" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">t4</text>
  <text x="68" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">t5</text>
  <text x="68" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">t6</text>

  <!-- 6x6 cells (all filled = full attention) -->
  <rect x="78" y="170" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="118" y="170" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="158" y="170" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="198" y="170" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="238" y="170" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="278" y="170" width="36" height="32" fill="#1a2a4a" rx="1"/>

  <rect x="78" y="208" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="118" y="208" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="158" y="208" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="198" y="208" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="238" y="208" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="278" y="208" width="36" height="32" fill="#1a2a4a" rx="1"/>

  <rect x="78" y="246" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="118" y="246" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="158" y="246" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="198" y="246" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="238" y="246" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="278" y="246" width="36" height="32" fill="#1a2a4a" rx="1"/>

  <rect x="78" y="284" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="118" y="284" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="158" y="284" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="198" y="284" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="238" y="284" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="278" y="284" width="36" height="32" fill="#1a2a4a" rx="1"/>

  <rect x="78" y="322" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="118" y="322" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="158" y="322" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="198" y="322" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="238" y="322" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="278" y="322" width="36" height="32" fill="#1a2a4a" rx="1"/>

  <rect x="78" y="360" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="118" y="360" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="158" y="360" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="198" y="360" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="238" y="360" width="36" height="32" fill="#1a2a4a" rx="1"/>
  <rect x="278" y="360" width="36" height="32" fill="#1a2a4a" rx="1"/>

  <!-- N2 label -->
  <text x="230" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">N=512 → 262,144 셀</text>
  <text x="230" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">N=4096 → 16,777,216 셀</text>

  <!-- Right: Efficient methods comparison -->
  <rect x="430" y="90" width="420" height="350" fill="#0d1117" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">효율적 어텐션 방법들</text>

  <!-- Sparse Attention -->
  <text x="446" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Sparse Attention (Longformer, BigBird)</text>
  <text x="446" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">지역 윈도 + 글로벌 토큰으로 O(N)</text>
  <text x="446" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 토큰이 인접 w개 + [CLS] 등만 참조</text>

  <line x1="446" y1="190" x2="838" y2="190" stroke="#1e2433" stroke-width="1"/>

  <!-- Linear Attention -->
  <text x="446" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">Linear Attention (Performer, RWKV)</text>
  <text x="446" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커널 함수로 softmax 근사 → O(N)</text>
  <text x="446" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">행렬 분해로 KV 먼저 계산 가능</text>

  <line x1="446" y1="260" x2="838" y2="260" stroke="#1e2433" stroke-width="1"/>

  <!-- Flash Attention -->
  <text x="446" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Flash Attention (IO-aware)</text>
  <text x="446" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">복잡도는 동일(O(N²)) but HBM↓</text>
  <text x="446" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타일링으로 SRAM 내 계산 → 실질 속도 2-4배↑</text>

  <line x1="446" y1="330" x2="838" y2="330" stroke="#1e2433" stroke-width="1"/>

  <!-- Sliding Window -->
  <text x="446" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Sliding Window (Mistral, Gemma)</text>
  <text x="446" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 위치가 최근 W 토큰만 참조</text>
  <text x="446" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">KV Cache 크기 O(W·L)로 고정</text>

  <line x1="446" y1="400" x2="838" y2="400" stroke="#1e2433" stroke-width="1"/>

  <!-- SSM -->
  <text x="446" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#b5cea8">State Space Model (Mamba, S4)</text>
  <text x="446" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">어텐션 없이 O(N) 장거리 의존성 포착</text>
</svg>
