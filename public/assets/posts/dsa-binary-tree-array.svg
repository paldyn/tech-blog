<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">완전 이진 트리의 배열 표현</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">인덱스 i의 자식: 2i+1 (왼), 2i+2 (오른) — 포인터 없이 트리 구현</text>

    <!-- Tree visualization (left) -->
    <circle cx="200" cy="128" r="22" fill="#1a2544" stroke="#7ec8e3" stroke-width="2"/>
    <text x="200" y="133" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">10</text>

    <circle cx="120" cy="206" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="120" y="211" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">5</text>
    <circle cx="280" cy="206" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="280" y="211" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">15</text>

    <circle cx="80" cy="284" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="80" y="289" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">3</text>
    <circle cx="160" cy="284" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="160" y="289" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">7</text>
    <circle cx="240" cy="284" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="240" y="289" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">12</text>
    <circle cx="320" cy="284" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="320" y="289" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">20</text>

    <!-- Edges -->
    <line x1="183" y1="144" x2="137" y2="188" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="217" y1="144" x2="263" y2="188" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="108" y1="222" x2="91" y2="266" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="132" y1="222" x2="149" y2="266" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="268" y1="222" x2="251" y2="266" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="292" y1="222" x2="309" y2="266" stroke="#3a4a6e" stroke-width="2"/>

    <!-- Index labels (small, above each node) -->
    <text x="200" y="112" font-size="10" fill="#888" text-anchor="middle">[0]</text>
    <text x="120" y="190" font-size="10" fill="#888" text-anchor="middle">[1]</text>
    <text x="280" y="190" font-size="10" fill="#888" text-anchor="middle">[2]</text>
    <text x="80" y="268" font-size="10" fill="#888" text-anchor="middle">[3]</text>
    <text x="160" y="268" font-size="10" fill="#888" text-anchor="middle">[4]</text>
    <text x="240" y="268" font-size="10" fill="#888" text-anchor="middle">[5]</text>
    <text x="320" y="268" font-size="10" fill="#888" text-anchor="middle">[6]</text>

    <!-- Array representation -->
    <text x="600" y="108" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">배열 표현</text>

    <rect x="460" y="120" width="48" height="42" fill="#1a2544" stroke="#7ec8e3" stroke-width="2" rx="3"/>
    <text x="484" y="137" font-size="10" fill="#888" text-anchor="middle">[0]</text>
    <text x="484" y="153" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">10</text>

    <rect x="510" y="120" width="48" height="42" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="534" y="137" font-size="10" fill="#888" text-anchor="middle">[1]</text>
    <text x="534" y="153" font-size="13" fill="#e8e8e8" text-anchor="middle">5</text>

    <rect x="560" y="120" width="48" height="42" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="584" y="137" font-size="10" fill="#888" text-anchor="middle">[2]</text>
    <text x="584" y="153" font-size="13" fill="#e8e8e8" text-anchor="middle">15</text>

    <rect x="610" y="120" width="48" height="42" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="634" y="137" font-size="10" fill="#888" text-anchor="middle">[3]</text>
    <text x="634" y="153" font-size="13" fill="#e8e8e8" text-anchor="middle">3</text>

    <rect x="660" y="120" width="48" height="42" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="684" y="137" font-size="10" fill="#888" text-anchor="middle">[4]</text>
    <text x="684" y="153" font-size="13" fill="#e8e8e8" text-anchor="middle">7</text>

    <rect x="710" y="120" width="48" height="42" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="734" y="137" font-size="10" fill="#888" text-anchor="middle">[5]</text>
    <text x="734" y="153" font-size="13" fill="#e8e8e8" text-anchor="middle">12</text>

    <rect x="760" y="120" width="48" height="42" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="784" y="137" font-size="10" fill="#888" text-anchor="middle">[6]</text>
    <text x="784" y="153" font-size="13" fill="#e8e8e8" text-anchor="middle">20</text>

    <!-- Index formulas -->
    <rect x="460" y="185" width="360" height="120" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="480" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 인덱스 관계</text>
    <text x="480" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">left  = 2*i + 1</text>
    <text x="480" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">right = 2*i + 2</text>
    <text x="480" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">parent = (i - 1) // 2</text>
    <text x="480" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># i=0: left=1, right=2</text>
    <text x="480" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># i=1: left=3, right=4</text>

    <!-- Bottom note -->
    <rect x="60" y="320" width="760" height="44" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="440" y="342" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">배열 표현의 장점</text>
    <text x="440" y="358" font-size="12" fill="#888" text-anchor="middle">포인터 없음 → 캐시 효율 우수  |  힙(Heap)·세그먼트 트리가 이 방식 사용  |  공간 낭비 없음 (완전 이진 트리 한정)</text>
  </g>
</svg>
