<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Tibero vs Oracle 호환성 비교</text>

  <!-- Header -->
  <rect x="60" y="64" width="350" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Oracle</text>

  <rect x="470" y="64" width="350" height="36" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Tibero</text>

  <!-- Compat rows -->
  <!-- Row 1: SQL Syntax -->
  <rect x="60" y="110" width="350" height="44" rx="4" fill="#0d0d1a"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">SQL 문법</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SELECT / INSERT / UPDATE / MERGE ...</text>

  <rect x="470" y="110" width="350" height="44" rx="4" fill="#0a150a"/>
  <text x="490" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">&#x2713; 완전 호환</text>
  <text x="490" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Oracle SQL 표준 그대로 동작</text>

  <!-- Row 2: PL/SQL -->
  <rect x="60" y="164" width="350" height="44" rx="4" fill="#0d0d1a"/>
  <text x="80" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">PL/SQL</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">패키지·프로시저·트리거</text>

  <rect x="470" y="164" width="350" height="44" rx="4" fill="#0a150a"/>
  <text x="490" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">&#x2713; PSM(tbPSM)으로 지원</text>
  <text x="490" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Oracle PL/SQL과 호환 문법</text>

  <!-- Row 3: Data types -->
  <rect x="60" y="218" width="350" height="44" rx="4" fill="#0d0d1a"/>
  <text x="80" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">데이터 타입</text>
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NUMBER / VARCHAR2 / DATE / CLOB</text>

  <rect x="470" y="218" width="350" height="44" rx="4" fill="#0a150a"/>
  <text x="490" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">&#x2713; 동일 타입 지원</text>
  <text x="490" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Oracle 타입 별칭 포함</text>

  <!-- Row 4: Optimizer -->
  <rect x="60" y="272" width="350" height="44" rx="4" fill="#0d0d1a"/>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">옵티마이저</text>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CBO (비용 기반) / 힌트 시스템</text>

  <rect x="470" y="272" width="350" height="44" rx="4" fill="#0a150a"/>
  <text x="490" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">&#x2248; 대부분 호환 (힌트 일부 차이)</text>
  <text x="490" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Oracle 힌트 대부분 지원</text>

  <!-- Row 5: License -->
  <rect x="60" y="326" width="350" height="44" rx="4" fill="#0d0d1a"/>
  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">라이선스</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">상용 (고비용)</text>

  <rect x="470" y="326" width="350" height="44" rx="4" fill="#0a150a"/>
  <text x="490" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">&#x2713; 국산 상용 (비용 절감)</text>
  <text x="490" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공공기관·금융권 채택</text>

  <!-- Center divider -->
  <line x1="415" y1="100" x2="415" y2="380" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#7ec8e3" text-anchor="middle">&#x2248;</text>
</svg>
