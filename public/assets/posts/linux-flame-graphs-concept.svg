<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Flame Graph 구조 이해</text>

  <!-- Flame Graph visual simulation -->
  <!-- Bottom bars are widest (most common stack frames) -->

  <!-- Level 1 - bottom (most common in CPU samples) -->
  <rect x="80" y="410" width="720" height="30" rx="3" fill="#e05555" stroke="#c04040" stroke-width="1"/>
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" font-weight="600">main() — 전체 CPU 시간의 기반</text>

  <!-- Level 2 -->
  <rect x="80" y="376" width="450" height="28" rx="3" fill="#e07030" stroke="#c05020" stroke-width="1"/>
  <text x="305" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">processData() — 51%</text>

  <rect x="540" y="376" width="260" height="28" rx="3" fill="#c05533" stroke="#a04030" stroke-width="1"/>
  <text x="670" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">handleIO() — 30%</text>

  <!-- Level 3 -->
  <rect x="80" y="342" width="280" height="28" rx="3" fill="#e09040" stroke="#c07030" stroke-width="1"/>
  <text x="220" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">parseJSON() — 32%</text>

  <rect x="370" y="342" width="160" height="28" rx="3" fill="#e06040" stroke="#c04030" stroke-width="1"/>
  <text x="450" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">sort() — 18%</text>

  <rect x="540" y="342" width="150" height="28" rx="3" fill="#c06040" stroke="#a04030" stroke-width="1"/>
  <text x="615" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">read() — 17%</text>

  <rect x="700" y="342" width="100" height="28" rx="3" fill="#a05033" stroke="#804028" stroke-width="1"/>
  <text x="750" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">write() 11%</text>

  <!-- Level 4 -->
  <rect x="80" y="308" width="180" height="28" rx="3" fill="#e0b050" stroke="#c09040" stroke-width="1"/>
  <text x="170" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">malloc() — 20%</text>

  <rect x="270" y="308" width="90" height="28" rx="3" fill="#d08040" stroke="#b06030" stroke-width="1"/>
  <text x="315" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">strcmp 10%</text>

  <rect x="370" y="308" width="100" height="28" rx="3" fill="#c07040" stroke="#a05030" stroke-width="1"/>
  <text x="420" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">qsort 11%</text>

  <rect x="540" y="308" width="150" height="28" rx="3" fill="#b06040" stroke="#904030" stroke-width="1"/>
  <text x="615" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">sys_read 17%</text>

  <!-- Level 5 -->
  <rect x="80" y="274" width="100" height="28" rx="3" fill="#e0c060" stroke="#c0a050" stroke-width="1"/>
  <text x="130" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ffffff">__malloc 11%</text>

  <rect x="190" y="274" width="70" height="28" rx="3" fill="#d0a050" stroke="#b08040" stroke-width="1"/>
  <text x="225" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ffffff">mmap 8%</text>

  <!-- Labels and annotations -->
  <text x="80" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">▲ 스택 깊이 (위로 갈수록 호출 깊어짐)</text>

  <!-- Arrow pointing to wide bar -->
  <line x1="520" y1="440" x2="520" y2="470" stroke="#e05555" stroke-width="2"/>
  <text x="525" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">가로 너비 = CPU 시간 비율</text>

  <!-- Explanation boxes -->
  <rect x="80" y="475" width="200" height="32" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="495" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">너비가 넓을수록 병목</text>

  <rect x="296" y="475" width="200" height="32" rx="6" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="396" y="495" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">상단 = 리프 함수 (실제 실행)</text>

  <rect x="512" y="475" width="200" height="32" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="612" y="495" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">색상 = 의미 없음 (구분용)</text>

  <!-- Title label -->
  <text x="80" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">읽는 법:</text>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">1. 가장 넓은 바 = 가장 많은 CPU를 소비하는 호출 체인</text>
  <text x="80" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">2. 맨 위의 함수가 실제로 CPU를 쓰는 "리프" 함수</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">3. 아래로 내려갈수록 호출자 (caller) 체인</text>
  <text x="80" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">4. 평평한 상단("고원") = 그 함수 자체가 CPU 소비 → 최적화 대상</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">5. 가로 정렬은 알파벳순 (시간 순서 아님)</text>

  <!-- Highlight: parseJSON is widest at level 3 -->
  <rect x="80" y="228" width="280" height="14" rx="3" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="370" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">← parseJSON 최적화 우선 대상</text>
</svg>
