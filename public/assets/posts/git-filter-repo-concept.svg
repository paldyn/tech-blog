<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git filter-repo — 전체 히스토리 재작성</text>

  <!-- Use cases -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">주요 사용 시나리오</text>

  <!-- Case 1 -->
  <rect x="60" y="108" width="235" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="178" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">파일/디렉터리 완전 제거</text>
  <text x="178" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">모든 커밋 히스토리에서</text>
  <text x="178" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">특정 파일을 삭제</text>

  <!-- Case 2 -->
  <rect x="323" y="108" width="235" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="441" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">비밀 정보 제거</text>
  <text x="441" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">API 키, 비밀번호가 실수로</text>
  <text x="441" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">커밋된 경우 삭제</text>

  <!-- Case 3 -->
  <rect x="586" y="108" width="235" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="704" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">서브디렉터리 추출</text>
  <text x="704" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">모노레포에서 일부만</text>
  <text x="704" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">새 저장소로 분리</text>

  <!-- Code examples -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">주요 옵션</text>

  <rect x="60" y="244" width="760" height="168" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="267" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 특정 파일을 전체 히스토리에서 제거</text>
  <text x="76" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git filter-repo </text>
  <text x="76" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">--path</text>
  <text x="283" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> secrets.env </text>
  <text x="399" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">--invert-paths</text>

  <text x="76" y="313" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 디렉터리 단위 제거</text>
  <text x="76" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git filter-repo </text>
  <text x="225" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">--path</text>
  <text x="283" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> dist/ </text>
  <text x="340" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">--invert-paths</text>

  <text x="76" y="359" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 서브디렉터리만 남기고 추출</text>
  <text x="76" y="379" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git filter-repo </text>
  <text x="225" y="379" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">--subdirectory-filter</text>
  <text x="448" y="379" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> packages/core</text>

  <!-- Warning -->
  <rect x="60" y="435" width="760" height="14" rx="0" fill="none"/>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">⚠ 실행 전 반드시 백업 — 전체 히스토리의 SHA가 바뀜</text>
</svg>
