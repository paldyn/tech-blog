<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">커버리지 지표 4종</text>

  <!-- Statement Coverage -->
  <rect x="60" y="68" width="370" height="88" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Statement Coverage (구문)</text>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행된 구문 수 / 전체 구문 수</text>
  <text x="80" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">if (a) { doA() } else { doB() }  // 실행된 구문만 측정</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">가장 기본 지표. 실행 여부만 체크하므로 분기 누락 가능</text>

  <!-- Branch Coverage -->
  <rect x="450" y="68" width="370" height="88" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Branch Coverage (분기)</text>
  <text x="470" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행된 분기 수 / 전체 분기 수 (if/else 각각)</text>
  <text x="470" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">if (a) → true/false 양쪽 모두 실행해야 100%</text>
  <text x="470" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">삼항 연산자·옵셔널 체이닝·단락 평가도 분기로 집계</text>

  <!-- Function Coverage -->
  <rect x="60" y="168" width="370" height="88" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Function Coverage (함수)</text>
  <text x="80" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">호출된 함수 수 / 전체 함수 수</text>
  <text x="80" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">export function deadCode() {}  // 미호출 → 0%</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">데드코드 발견에 유용. 내부 로직은 측정하지 않음</text>

  <!-- Line Coverage -->
  <rect x="450" y="168" width="370" height="88" rx="8" fill="#111827" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="470" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#b5cea8">Line Coverage (라인)</text>
  <text x="470" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행된 줄 수 / 전체 줄 수</text>
  <text x="470" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">한 줄에 여러 구문 → Statement와 미세 차이</text>
  <text x="470" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Istanbul 기본값. Statement coverage와 유사</text>

  <!-- Coverage report example -->
  <text x="60" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">커버리지 리포트 예시</text>
  <rect x="60" y="298" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">File           | Stmts | Branch | Funcs | Lines</text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">---------------|-------|--------|-------|------</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">auth.ts        |</text>
  <text x="220" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555"> 92.3 |</text>
  <text x="290" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">  78.5 |</text>
  <text x="380" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555"> 100.0 |</text>
  <text x="460" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555"> 91.8</text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">util.ts        |</text>
  <text x="220" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555"> 54.1 |</text>
  <text x="290" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">  40.0 |</text>
  <text x="380" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">  66.7 |</text>
  <text x="460" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555"> 52.0</text>

  <!-- False sense of security -->
  <text x="60" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">높은 커버리지가 보장하지 않는 것</text>
  <rect x="60" y="414" width="760" height="52" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 어서션 없는 테스트 (커버리지 올리기용 빈 테스트)도 실행 경로를 덮음</text>
  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 경계값·에지케이스 누락 가능 · 올바른 동작 검증 != 실행됨 · 통합 문제는 단위 커버리지로 안 보임</text>
</svg>
