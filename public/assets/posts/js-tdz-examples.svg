<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 552"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">TDZ 실전 예제 — 어디서 터지나</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">같은 블록 안에서도 순서가 곧 안전이다</text>

  <!--
    Left: x=60 w=360 (TDZ 에러 예제)
    Gap: 60px → x=480
    Right: x=480 w=340 (안전한 패턴)
  -->

  <!-- Left: TDZ error examples (x=60, w=360) -->
  <rect x="60" y="104" width="360" height="320" fill="#1a0808" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="128" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">TDZ ReferenceError 발생 패턴</text>

  <rect x="78" y="144" width="324" height="240" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- y base=164, spacing=18: 164,182,200,218,236,254,272,290,308,326,344,362 -->
  <text x="94" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 패턴 1: 선언 전 사용</text>
  <text x="94" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">console.log(a); // ReferenceError</text>
  <text x="94" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">let a = 1;</text>
  <text x="94" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 패턴 2: typeof도 TDZ에선 에러</text>
  <text x="94" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">typeof b; // ReferenceError!</text>
  <text x="94" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">let b = 2;</text>
  <text x="94" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 패턴 3: 기본값이 TDZ 변수 참조</text>
  <text x="94" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">function fn(x = y) {}</text>
  <text x="94" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">let y = 3;</text>
  <text x="94" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">fn(); // ReferenceError!</text>

  <text x="78" y="394" font-size="12" fill="#e05555">✗ typeof도 let/const TDZ에선 안전하지 않음</text>

  <!-- Center arrow -->
  <polygon points="422,265 422,251 452,251 452,245 478,258 452,271 452,265"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="410" y="228" width="80" height="18" fill="#0a0a0a"/>
  <text x="450" y="241" font-size="11" fill="#7777cc" text-anchor="middle">안전한</text>
  <rect x="410" y="274" width="80" height="18" fill="#0a0a0a"/>
  <text x="450" y="287" font-size="11" fill="#7777cc" text-anchor="middle">패턴으로</text>

  <!-- Right: safe patterns (x=480, w=340) -->
  <rect x="480" y="104" width="340" height="320" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="128" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">TDZ 안전 패턴</text>

  <rect x="498" y="144" width="304" height="240" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="514" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 패턴 1: 선언 먼저</text>
  <text x="514" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">let a = 1;</text>
  <text x="514" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">console.log(a); // 1 ✓</text>
  <text x="514" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="514" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 패턴 2: 선언 후 typeof</text>
  <text x="514" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">let b = 2;</text>
  <text x="514" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">typeof b; // "number" ✓</text>
  <text x="514" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="514" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 패턴 3: 기본값 순서 정렬</text>
  <text x="514" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">let y = 3;</text>
  <text x="514" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">function fn(x = y) {}</text>
  <text x="514" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">fn(); // 정상 동작 ✓</text>

  <text x="498" y="394" font-size="12" fill="#55c555">✓ 선언을 사용보다 항상 위에 작성</text>

  <!-- Bottom rule box -->
  <rect x="60" y="444" width="760" height="48" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="464" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">TDZ 핵심 규칙</text>
  <text x="440" y="482" font-size="12" fill="#888" text-anchor="middle">let/const는 선언문이 실행되기 전까지 접근 불가 — typeof조차 에러 · var는 TDZ 없음</text>

  <!-- Footer -->
  <text x="60" y="510" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part II — TDZ (일시적 사각지대)</text>
</svg>
