<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Promise Pool — 동시 실행 한도 시각화</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">concurrency limit = 3 — 슬롯이 빌 때마다 대기 큐에서 진입</text>

  <!-- Left: Running -->
  <rect x="50" y="90" width="355" height="30" rx="6" fill="#071e1e" stroke="#7ec8e3"/>
  <text x="227" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">실행 중 (3 / 3)</text>

  <!-- Task A -->
  <rect x="50" y="130" width="355" height="62" rx="6" fill="#071510" stroke="#55c555"/>
  <text x="70" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Task A</text>
  <text x="390" y="153" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">진행중</text>
  <rect x="70" y="163" width="315" height="8" rx="4" fill="#1a2a1a"/>
  <rect x="70" y="163" width="220" height="8" rx="4" fill="#55c555"/>
  <text x="392" y="185" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">70%</text>

  <!-- Task B -->
  <rect x="50" y="202" width="355" height="62" rx="6" fill="#071510" stroke="#55c555"/>
  <text x="70" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Task B</text>
  <text x="390" y="225" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">진행중</text>
  <rect x="70" y="235" width="315" height="8" rx="4" fill="#1a2a1a"/>
  <rect x="70" y="235" width="130" height="8" rx="4" fill="#55c555"/>
  <text x="392" y="257" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">41%</text>

  <!-- Task C -->
  <rect x="50" y="274" width="355" height="62" rx="6" fill="#071510" stroke="#55c555"/>
  <text x="70" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Task C</text>
  <text x="390" y="297" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">진행중</text>
  <rect x="70" y="307" width="315" height="8" rx="4" fill="#1a2a1a"/>
  <rect x="70" y="307" width="55" height="8" rx="4" fill="#55c555"/>
  <text x="392" y="329" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">17%</text>

  <!-- Right: Queue -->
  <rect x="475" y="90" width="355" height="30" rx="6" fill="#1a1a0d" stroke="#888"/>
  <text x="652" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">대기 큐 (4개)</text>

  <rect x="475" y="130" width="355" height="42" rx="6" fill="#141410" stroke="#444"/>
  <text x="495" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">Task D</text>
  <text x="815" y="156" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">대기</text>

  <rect x="475" y="182" width="355" height="42" rx="6" fill="#141410" stroke="#444"/>
  <text x="495" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">Task E</text>
  <text x="815" y="208" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">대기</text>

  <rect x="475" y="234" width="355" height="42" rx="6" fill="#141410" stroke="#444"/>
  <text x="495" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">Task F</text>
  <text x="815" y="260" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">대기</text>

  <rect x="475" y="286" width="355" height="42" rx="6" fill="#141410" stroke="#444"/>
  <text x="495" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">Task G</text>
  <text x="815" y="312" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">대기</text>

  <!-- Arrow: queue → running (dashed) -->
  <line x1="474" y1="152" x2="408" y2="161" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="408,153 405,162 414,161" fill="#7777cc"/>
  <text x="440" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">슬롯 해제 시 진입</text>

  <!-- Code block -->
  <rect x="50" y="358" width="780" height="114" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="66" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="108" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> pLimit </text>
  <text x="156" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from</text>
  <text x="188" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> 'p-limit'</text>
  <text x="252" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>

  <text x="66" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text>
  <text x="102" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> limit = pLimit(</text>
  <text x="222" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">3</text>
  <text x="228" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">);  </text>
  <text x="270" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 동시 실행 최대 3개</text>

  <text x="66" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text>
  <text x="102" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> tasks = urls.map(url =&gt; limit(() =&gt; fetch(url)));</text>

  <text x="66" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text>
  <text x="102" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> results = </text>
  <text x="168" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">await</text>
  <text x="202" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Promise.all(tasks);</text>

  <text x="66" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 7개 URL → 3개씩 처리, 완료되면 다음 태스크 진입</text>
</svg>
