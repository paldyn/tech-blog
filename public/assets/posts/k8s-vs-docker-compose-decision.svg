<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arry" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">도구 선택 결정 트리</text>

  <!-- Start -->
  <rect x="330" y="70" width="220" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">프로덕션 환경인가?</text>

  <line x1="330" y1="95" x2="180" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arry)"/>
  <text x="220" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">아니오</text>

  <line x1="550" y1="95" x2="700" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="640" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">예</text>

  <!-- Left: not prod -->
  <rect x="60" y="160" width="240" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="180" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Docker Compose 충분</text>

  <!-- Right: prod - question 2 -->
  <rect x="580" y="160" width="240" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="700" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">HA / 자동 스케일링</text>
  <text x="700" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">필요한가?</text>

  <line x1="580" y1="185" x2="440" y2="260" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arry)"/>
  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">아니오</text>
  <line x1="700" y1="210" x2="700" y2="260" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="710" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">예</text>

  <!-- middle -->
  <rect x="320" y="260" width="240" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9ca3af" text-anchor="middle">단순 서버: Docker run</text>
  <text x="440" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9ca3af" text-anchor="middle">또는 Compose 고려</text>

  <!-- K8s -->
  <rect x="580" y="260" width="240" height="50" rx="8" fill="#1a237e" stroke="#3949ab" stroke-width="2"/>
  <text x="700" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Kubernetes 선택</text>

  <!-- Notes -->
  <rect x="60" y="350" width="760" height="44" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">두 도구는 경쟁 관계가 아니다. 로컬 개발에 Compose, 프로덕션에 K8s 조합도 일반적.</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">Compose 파일을 Kompose 도구로 K8s YAML로 변환할 수 있다.</text>
</svg>
