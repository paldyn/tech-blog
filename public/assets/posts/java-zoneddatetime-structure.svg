<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ZonedDateTime 한 줄 해부</text>

  <!-- The full string, colored segments -->
  <text x="272" y="106" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600"><tspan fill="#7ec8e3">2026-06-12T14:30</tspan><tspan fill="#55c555">+09:00</tspan><tspan fill="#7777cc">[Asia/Seoul]</tspan></text>

  <!-- Arrows from segments to boxes -->
  <line x1="348" y1="120" x2="180" y2="176" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="454" y1="120" x2="442" y2="176" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="544" y1="120" x2="700" y2="176" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- LocalDateTime box -->
  <rect x="60" y="180" width="230" height="104" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">LocalDateTime 부분</text>
  <text x="175" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">벽시계 날짜·시각</text>
  <text x="175" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자에게 보이는 현지 표기</text>
  <text x="175" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">toLocalDateTime()으로 추출</text>

  <!-- ZoneOffset box -->
  <rect x="325" y="180" width="230" height="104" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">ZoneOffset</text>
  <text x="440" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">UTC와의 시차 (+09:00)</text>
  <text x="440" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">그 순간에 적용된 오프셋</text>
  <text x="440" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DST면 계절마다 달라짐</text>

  <!-- ZoneId box -->
  <rect x="590" y="180" width="230" height="104" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">ZoneId</text>
  <text x="705" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">타임존 규칙 식별자</text>
  <text x="705" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DST 등 역사적 규칙 포함</text>
  <text x="705" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">IANA tzdb 기반</text>

  <!-- Bottom comparison -->
  <rect x="60" y="324" width="760" height="84" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">ZonedDateTime vs OffsetDateTime</text>
  <text x="440" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ZonedDateTime은 ZoneId를 알아 DST를 자동 처리 — OffsetDateTime은 고정 오프셋만 가져</text>
  <text x="440" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">규칙 변화와 무관 (DB 저장·API 교환에는 OffsetDateTime이 단순해서 유리)</text>
</svg>
