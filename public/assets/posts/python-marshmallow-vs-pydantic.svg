<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">marshmallow vs Pydantic</text>

  <rect x="60" y="84" width="360" height="180" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="116" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">marshmallow</text>
  <text x="240" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">Schema 클래스에 필드 명시</text>
  <text x="240" y="172" font-size="13" fill="#9aa4b8" text-anchor="middle">load / dump 방향이 또렷</text>
  <text x="240" y="196" font-size="13" fill="#9aa4b8" text-anchor="middle">ORM 모델과 분리해 매핑</text>
  <text x="240" y="220" font-size="13" fill="#9aa4b8" text-anchor="middle">Flask 생태계와 오랜 궁합</text>
  <text x="240" y="246" font-size="12" fill="#9aa4b8" text-anchor="middle">타입 힌트와는 별개 문법</text>

  <rect x="460" y="84" width="360" height="180" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="116" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Pydantic</text>
  <text x="640" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">타입 힌트가 곧 스키마</text>
  <text x="640" y="172" font-size="13" fill="#9aa4b8" text-anchor="middle">v2는 Rust 코어로 빠름</text>
  <text x="640" y="196" font-size="13" fill="#9aa4b8" text-anchor="middle">FastAPI가 기본 채택</text>
  <text x="640" y="220" font-size="13" fill="#9aa4b8" text-anchor="middle">IDE 자동완성과 잘 맞음</text>
  <text x="640" y="246" font-size="12" fill="#9aa4b8" text-anchor="middle">신규 프로젝트의 기본 선택</text>

  <rect x="60" y="276" width="760" height="0"/>
  <text x="440" y="288" font-size="13" fill="#9aa4b8" text-anchor="middle">기존 Flask·marshmallow 코드라면 유지, 새로 시작이라면 Pydantic이 무난</text>
</svg>
