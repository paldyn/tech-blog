<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">삭제된 브랜치 복구 흐름</text>

  <!-- Before delete: branch exists -->
  <rect x="60" y="80" width="180" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">feature/auth</text>
  <text x="150" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">abc1234 → 최신 커밋</text>

  <!-- Arrow: delete -->
  <line x1="240" y1="105" x2="310" y2="105" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="275" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">git branch -D</text>

  <!-- After delete -->
  <rect x="320" y="80" width="180" height="50" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="410" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555">feature/auth</text>
  <text x="410" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">브랜치 삭제됨</text>

  <!-- But commits remain -->
  <rect x="320" y="148" width="180" height="50" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="410" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">abc1234 커밋</text>
  <text x="410" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dangling commit으로 존재</text>

  <!-- Arrow: reflog find -->
  <line x1="500" y1="170" x2="570" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="535" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">reflog 확인</text>

  <!-- Recovery -->
  <rect x="580" y="148" width="240" height="50" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">git checkout -b feature/auth abc1234</text>
  <text x="700" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">브랜치 복구 완료</text>

  <!-- Code block -->
  <rect x="60" y="230" width="760" height="164" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 1. 브랜치 삭제 (실수)</text>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#e05555" font-weight="600">branch</tspan> -D feature/auth</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 2. reflog에서 브랜치의 마지막 커밋 찾기</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">reflog</tspan> | <tspan fill="#7ec8e3" font-weight="600">grep</tspan> feature/auth</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># abc1234 HEAD@{3}: checkout: feature/auth → main</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 3. 해당 SHA에서 브랜치 재생성</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">checkout</tspan> -b feature/auth abc1234</text>
</svg>
