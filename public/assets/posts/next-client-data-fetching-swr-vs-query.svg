<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SWR vs TanStack Query 비교</text>

  <!-- Column headers -->
  <text x="230" y="82"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">SWR</text>
  <text x="230" y="102"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Vercel 제작 — 경량 · 심플</text>

  <text x="650" y="82"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">TanStack Query</text>
  <text x="650" y="102"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">강력한 서버 상태 관리</text>

  <!-- Divider -->
  <line x1="440" y1="68" x2="440" y2="400" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Row 1: 번들 사이즈 -->
  <rect x="60" y="116" width="340" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="138"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">번들 사이즈</text>
  <text x="100" y="156"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">~4kB gzip</text>

  <rect x="480" y="116" width="340" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="520" y="138"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">번들 사이즈</text>
  <text x="520" y="156"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">~13kB gzip</text>

  <!-- Row 2: 뮤테이션 -->
  <rect x="60" y="180" width="340" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="202"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">뮤테이션 (쓰기)</text>
  <text x="100" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">기본 제공 (간단)</text>

  <rect x="480" y="180" width="340" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="520" y="202"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">뮤테이션 (쓰기)</text>
  <text x="520" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">useMutation — 풍부한 옵션</text>

  <!-- Row 3: 옵티미스틱 UI -->
  <rect x="60" y="244" width="340" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="266"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">옵티미스틱 업데이트</text>
  <text x="100" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">mutate() + optimisticData</text>

  <rect x="480" y="244" width="340" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="520" y="266"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">옵티미스틱 업데이트</text>
  <text x="520" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">onMutate + rollback 내장</text>

  <!-- Row 4: 무한 스크롤 -->
  <rect x="60" y="308" width="340" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="330"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">무한 스크롤</text>
  <text x="100" y="348"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">useSWRInfinite</text>

  <rect x="480" y="308" width="340" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="520" y="330"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">무한 스크롤</text>
  <text x="520" y="348"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">useInfiniteQuery</text>

  <!-- Bottom recommendation -->
  <text x="440" y="408"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">SWR: 간단한 조회 위주 앱  |  TanStack Query: 복잡한 서버 상태·뮤테이션이 많은 앱</text>
</svg>
