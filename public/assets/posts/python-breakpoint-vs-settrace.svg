<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="270" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">옛 방식과 새 방식</text>

  <rect x="60" y="84" width="370" height="160" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 옛 방식 (3.6 이하)</text>
  <text xml:space="preserve" x="78" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import pdb</text>
  <text xml:space="preserve" x="78" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pdb.set_trace()</text>
  <text xml:space="preserve" x="78" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 두 줄 · 디버거 고정</text>
  <text xml:space="preserve" x="78" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 끄려면 일일이 삭제</text>

  <rect x="450" y="84" width="370" height="160" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text xml:space="preserve" x="468" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 새 방식 (3.7+)</text>
  <text xml:space="preserve" x="468" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">breakpoint()</text>
  <text xml:space="preserve" x="468" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 한 줄 · import 불필요</text>
  <text xml:space="preserve" x="468" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 디버거 교체 가능</text>
  <text xml:space="preserve" x="468" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># env로 한꺼번에 끔</text>
</svg>
