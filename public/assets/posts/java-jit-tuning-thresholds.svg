<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">호출 카운터와 컴파일 임계값</text>

  <defs>
    <marker id="jt-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- progression boxes -->
  <rect x="40" y="100" width="180" height="90" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="134" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">인터프리터</text>
  <text x="130" y="158" font-size="13" fill="#9aa4b8" text-anchor="middle">바이트코드 한 줄씩</text>
  <text x="130" y="178" font-size="13" fill="#9aa4b8" text-anchor="middle">실행하며 호출 카운트</text>

  <rect x="270" y="100" width="180" height="90" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="360" y="134" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">C1 (Client)</text>
  <text x="360" y="158" font-size="13" fill="#9aa4b8" text-anchor="middle">빠른 컴파일·</text>
  <text x="360" y="178" font-size="13" fill="#9aa4b8" text-anchor="middle">프로파일 수집</text>

  <rect x="500" y="100" width="180" height="90" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="590" y="134" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">C2 (Server)</text>
  <text x="590" y="158" font-size="13" fill="#9aa4b8" text-anchor="middle">강한 최적화·</text>
  <text x="590" y="178" font-size="13" fill="#9aa4b8" text-anchor="middle">최고 성능 코드</text>

  <rect x="730" y="100" width="110" height="90" rx="8" fill="#101010" stroke="#e05555" stroke-width="1"/>
  <text x="785" y="134" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Deopt</text>
  <text x="785" y="158" font-size="13" fill="#9aa4b8" text-anchor="middle">가정 깨지면</text>
  <text x="785" y="178" font-size="13" fill="#9aa4b8" text-anchor="middle">되돌림</text>

  <line x1="220" y1="145" x2="268" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jt-arr)"/>
  <line x1="450" y1="145" x2="498" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jt-arr)"/>
  <line x1="680" y1="145" x2="728" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jt-arr)"/>

  <text x="244" y="92" font-size="13" fill="#7ec8e3" text-anchor="middle">Tier3</text>
  <text x="474" y="92" font-size="13" fill="#7ec8e3" text-anchor="middle">Tier4</text>

  <text x="40" y="240" font-size="13" fill="#9aa4b8">-XX:CompileThreshold (단계형은 -XX:Tier4InvocationThreshold)을 넘으면 컴파일 큐에 등록.</text>
  <text x="40" y="266" font-size="13" fill="#9aa4b8">메서드는 핫해질수록 더 높은 티어로 승급하고, 충분히 안 쓰이면 인터프리터에 머뭅니다.</text>
  <text x="40" y="292" font-size="13" fill="#9aa4b8">C2가 세운 가정(타입·분기)이 런타임에 어긋나면 역최적화(deoptimization)로 안전하게 복귀합니다.</text>
</svg>
