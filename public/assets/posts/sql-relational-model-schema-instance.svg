<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 530"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="530" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스키마 vs 인스턴스</text>

  <!-- ── Left Panel: Schema ── -->
  <rect x="60" y="76" width="350" height="390" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="235" y="104" text-anchor="middle" font-size="16" font-weight="600" fill="#7ec8e3">릴레이션 스키마 (정적)</text>
  <text x="235" y="120" text-anchor="middle" font-size="11" fill="#555">설계 시점에 정의 · 거의 변하지 않음</text>
  <line x1="60" y1="130" x2="410" y2="130" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Schema: attribute boxes -->
  <!-- id -->
  <rect x="84" y="146" width="298" height="38" rx="4" fill="#111827" stroke="#1e2433"/>
  <text x="100" y="168" font-size="13" font-weight="600" fill="#7ec8e3">id</text>
  <text x="145" y="168" font-size="12" fill="#888">INTEGER</text>
  <rect x="270" y="154" width="60" height="20" rx="3" fill="#1a2a1a"/>
  <text x="300" y="168" text-anchor="middle" font-size="10" fill="#55c555">PK</text>

  <!-- name -->
  <rect x="84" y="196" width="298" height="38" rx="4" fill="#111827" stroke="#1e2433"/>
  <text x="100" y="218" font-size="13" font-weight="600" fill="#7ec8e3">name</text>
  <text x="155" y="218" font-size="12" fill="#888">VARCHAR(100)</text>
  <rect x="270" y="204" width="78" height="20" rx="3" fill="#1a1a0a"/>
  <text x="309" y="218" text-anchor="middle" font-size="10" fill="#e8c555">NOT NULL</text>

  <!-- email -->
  <rect x="84" y="246" width="298" height="38" rx="4" fill="#111827" stroke="#1e2433"/>
  <text x="100" y="268" font-size="13" font-weight="600" fill="#7ec8e3">email</text>
  <text x="155" y="268" font-size="12" fill="#888">VARCHAR(200)</text>
  <rect x="270" y="254" width="60" height="20" rx="3" fill="#1a1a2a"/>
  <text x="300" y="268" text-anchor="middle" font-size="10" fill="#7777cc">UNIQUE</text>

  <!-- dept_id -->
  <rect x="84" y="296" width="298" height="38" rx="4" fill="#111827" stroke="#1e2433"/>
  <text x="100" y="318" font-size="13" font-weight="600" fill="#7ec8e3">dept_id</text>
  <text x="175" y="318" font-size="12" fill="#888">INTEGER</text>
  <rect x="270" y="304" width="48" height="20" rx="3" fill="#1a0a0a"/>
  <text x="294" y="318" text-anchor="middle" font-size="10" fill="#e05555">FK</text>

  <!-- Schema note -->
  <line x1="60" y1="352" x2="410" y2="352" stroke="#1a1a1a" stroke-width="1"/>
  <text x="235" y="374" text-anchor="middle" font-size="12" fill="#555">도메인(Domain): 각 속성의 허용 값 집합</text>
  <text x="235" y="392" text-anchor="middle" font-size="12" fill="#555">예) dept_id ∈ 정수, age ∈ [0, 150]</text>
  <text x="235" y="416" text-anchor="middle" font-size="12" fill="#555">차수(Degree): 속성 수 = 4</text>
  <text x="235" y="434" text-anchor="middle" font-size="12" fill="#555">외연(Extension): 인스턴스 = 아래 오른쪽 →</text>

  <!-- ── Right Panel: Instance ── -->
  <rect x="470" y="76" width="350" height="390" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="645" y="104" text-anchor="middle" font-size="16" font-weight="600" fill="#55c555">릴레이션 인스턴스 (동적)</text>
  <text x="645" y="120" text-anchor="middle" font-size="11" fill="#555">특정 시점 T의 스냅샷 · 행 삽입/삭제 시 변화</text>
  <line x1="470" y1="130" x2="820" y2="130" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Instance mini-table -->
  <!-- Header -->
  <rect x="490" y="146" width="310" height="32" fill="#1a1a2e"/>
  <line x1="540" y1="146" x2="540" y2="338" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="640" y1="146" x2="640" y2="338" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="750" y1="146" x2="750" y2="338" stroke="#2a2a3a" stroke-width="1"/>
  <text x="515" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">id</text>
  <text x="590" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">name</text>
  <text x="695" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">email</text>
  <text x="770" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">dept</text>

  <!-- Row 1 -->
  <rect x="490" y="178" width="310" height="32" fill="#0d0d15"/>
  <line x1="490" y1="178" x2="800" y2="178" stroke="#2a2a3a" stroke-width="1"/>
  <text x="515" y="199" text-anchor="middle" font-size="12" fill="#e8e8e8">1</text>
  <text x="590" y="199" text-anchor="middle" font-size="12" fill="#e8e8e8">Alice</text>
  <text x="695" y="199" text-anchor="middle" font-size="11" fill="#888">alice@corp</text>
  <text x="770" y="199" text-anchor="middle" font-size="12" fill="#e8e8e8">10</text>

  <!-- Row 2 -->
  <rect x="490" y="210" width="310" height="32" fill="#080810"/>
  <line x1="490" y1="210" x2="800" y2="210" stroke="#2a2a3a" stroke-width="1"/>
  <text x="515" y="231" text-anchor="middle" font-size="12" fill="#e8e8e8">2</text>
  <text x="590" y="231" text-anchor="middle" font-size="12" fill="#e8e8e8">Bob</text>
  <text x="695" y="231" text-anchor="middle" font-size="11" fill="#888">bob@corp</text>
  <text x="770" y="231" text-anchor="middle" font-size="12" fill="#e8e8e8">20</text>

  <!-- Row 3 -->
  <rect x="490" y="242" width="310" height="32" fill="#0d0d15"/>
  <line x1="490" y1="242" x2="800" y2="242" stroke="#2a2a3a" stroke-width="1"/>
  <text x="515" y="263" text-anchor="middle" font-size="12" fill="#e8e8e8">3</text>
  <text x="590" y="263" text-anchor="middle" font-size="12" fill="#e8e8e8">Carol</text>
  <text x="695" y="263" text-anchor="middle" font-size="11" fill="#888">carol@corp</text>
  <text x="770" y="263" text-anchor="middle" font-size="12" fill="#e8e8e8">10</text>

  <!-- Table border -->
  <rect x="490" y="146" width="310" height="128" fill="none" stroke="#444" stroke-width="1"/>

  <!-- Instance note -->
  <line x1="470" y1="292" x2="820" y2="292" stroke="#1a1a1a" stroke-width="1"/>
  <text x="645" y="314" text-anchor="middle" font-size="12" fill="#55c555">카디널리티(Cardinality): 3개 튜플</text>
  <text x="645" y="334" text-anchor="middle" font-size="12" fill="#555">INSERT/DELETE 시 카디널리티 변화</text>
  <text x="645" y="354" text-anchor="middle" font-size="12" fill="#555">스키마는 유지, 인스턴스만 바뀜</text>
  <text x="645" y="378" text-anchor="middle" font-size="12" fill="#555">ORDER BY 없으면 행 순서 보장 없음</text>
  <text x="645" y="398" text-anchor="middle" font-size="12" fill="#555">(릴레이션은 집합 — 순서가 없다)</text>
  <text x="645" y="430" text-anchor="middle" font-size="12" fill="#555">중복 튜플 없음 (PK가 보장)</text>

  <!-- Center Arrow -->
  <polygon points="413,271 452,271 452,267 467,275 452,283 452,279 413,279"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Footer -->
  <text x="440" y="490" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 1</text>
</svg>
