<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Copy-on-Write &amp; Whiteout — OverlayFS 핵심 메커니즘</text>

  <!-- CoW section -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Copy-on-Write (파일 수정 시)</text>

  <!-- Step 1 -->
  <rect x="60" y="92" width="240" height="100" rx="6" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="180" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">1. 파일 수정 전</text>
  <rect x="80" y="120" width="200" height="30" rx="4" fill="#1a2a3e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lower: /etc/nginx.conf (원본)</text>
  <rect x="80" y="155" width="200" height="30" rx="4" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">upper: (비어 있음)</text>

  <line x1="300" y1="142" x2="350" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="325" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">쓰기 감지</text>

  <!-- Step 2 -->
  <rect x="352" y="92" width="240" height="100" rx="6" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="472" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">2. lower → upper 복사</text>
  <rect x="370" y="120" width="204" height="30" rx="4" fill="#1a2a3e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="472" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lower: /etc/nginx.conf (원본 그대로)</text>
  <rect x="370" y="155" width="204" height="30" rx="4" fill="#1a3e1a" stroke="#55c555" stroke-width="2"/>
  <text x="472" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">upper: /etc/nginx.conf (복사됨)</text>

  <line x1="592" y1="142" x2="642" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="617" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">수정 적용</text>

  <!-- Step 3 -->
  <rect x="644" y="92" width="196" height="100" rx="6" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="742" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">3. 수정 완료</text>
  <rect x="660" y="120" width="164" height="30" rx="4" fill="#1a2a3e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="742" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lower: 원본 (변경 없음)</text>
  <rect x="660" y="155" width="164" height="30" rx="4" fill="#1a3e1a" stroke="#55c555" stroke-width="2"/>
  <text x="742" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">upper: 수정된 버전</text>

  <!-- Whiteout section -->
  <text x="60" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Whiteout (파일 삭제 시)</text>

  <rect x="60" y="232" width="760" height="100" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="80" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">lower 레이어의 파일은 직접 삭제 불가 (읽기 전용). 대신 upper에 특수 파일 생성:</text>

  <rect x="80" y="264" width="200" height="54" rx="6" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="180" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">whiteout 파일</text>
  <text x="180" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">upper/.wh.deleted_file</text>
  <text x="180" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">char device 0,0</text>

  <text x="296" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ merged에서 해당 파일이 안 보임</text>
  <text x="296" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ lower의 원본은 그대로 보존 (이미지 레이어 불변)</text>

  <!-- opaque whiteout -->
  <rect x="560" y="264" width="260" height="54" rx="6" fill="#2e2a1a" stroke="#e0a050" stroke-width="1.5"/>
  <text x="690" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0a050">opaque whiteout</text>
  <text x="690" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">upper/.wh..wh..opq</text>
  <text x="690" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">해당 디렉터리 하위 lower 모두 숨김</text>

  <!-- Docker usage block -->
  <rect x="60" y="350" width="760" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Docker OverlayFS 확인</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">docker inspect</text>
  <text x="186" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> mycontainer | python3 -c \</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  "import sys,json; d=json.load(sys.stdin); print(d[0]['GraphDriver'])"</text>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 직접 overlay 마운트 확인</text>
  <text x="76" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">mount</text>
  <text x="118" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> | grep overlay</text>
  <text x="76" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 컨테이너 레이어 크기</text>
</svg>
