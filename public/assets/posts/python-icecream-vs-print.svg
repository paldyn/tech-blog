<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="270" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">print 대신 ic()</text>

  <rect x="60" y="84" width="370" height="160" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># print — 무엇을 찍었는지 모름</text>
  <text xml:space="preserve" x="78" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">print(user)</text>
  <text xml:space="preserve" x="78" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">print(total)</text>
  <text xml:space="preserve" x="78" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 출력</text>
  <text xml:space="preserve" x="78" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">alice</text>
  <text xml:space="preserve" x="78" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">42   ← 누가 무슨 값인지 불명</text>

  <rect x="450" y="84" width="370" height="160" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text xml:space="preserve" x="468" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ic — 식과 값을 함께</text>
  <text xml:space="preserve" x="468" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from icecream import ic</text>
  <text xml:space="preserve" x="468" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ic(user); ic(total)</text>
  <text xml:space="preserve" x="468" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 출력</text>
  <text xml:space="preserve" x="468" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">ic| user: 'alice'</text>
  <text xml:space="preserve" x="468" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">ic| total: 42</text>
</svg>
