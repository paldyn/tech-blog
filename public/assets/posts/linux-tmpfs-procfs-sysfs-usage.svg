<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">가상 파일시스템 실전 사용법</text>

  <!-- tmpfs usage -->
  <text x="220" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">tmpfs</text>

  <rect x="60" y="95" width="320" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="117" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 임시 tmpfs 마운트 (1GB 제한)</text>
  <text x="76" y="135" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">mount</tspan> -t tmpfs -o size=1G tmpfs /mnt/fast</text>
  <text x="76" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># fstab에 영구 등록</text>
  <text x="76" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">tmpfs /tmp tmpfs <tspan fill="#ce9178">size=2G,noexec</tspan> 0 0</text>
  <text x="76" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 공유 메모리 크기 확인</text>
  <text x="76" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">df</tspan> -h /dev/shm</text>
  <text x="76" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">ls</tspan> /run  <tspan fill="#9aa4b8"># systemd 런타임 파일들</tspan></text>

  <!-- procfs usage -->
  <text x="220" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">procfs</text>

  <rect x="60" y="268" width="320" height="158" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># PID 1234 프로세스 정보</text>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">cat</tspan> /proc/1234/cmdline | tr '\0' ' '</text>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">cat</tspan> /proc/1234/status</text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 메모리 사용량</text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">cat</tspan> /proc/meminfo</text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 커널 파라미터 쓰기</text>
  <text x="76" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">echo</tspan> 1 &gt; /proc/sys/net/ipv4/ip_forward</text>
  <text x="76" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># sysctl로 동일 효과</text>

  <!-- sysfs usage -->
  <text x="660" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">sysfs</text>

  <rect x="500" y="95" width="320" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="117" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 배터리 잔량 (노트북)</text>
  <text x="516" y="135" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">cat</tspan> /sys/class/power_supply/BAT0/capacity</text>
  <text x="516" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 네트워크 인터페이스 MTU</text>
  <text x="516" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">cat</tspan> /sys/class/net/eth0/mtu</text>
  <text x="516" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># CPU 주파수</text>
  <text x="516" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">cat</tspan> /sys/devices/system/cpu/cpu0/</text>
  <text x="516" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      cpufreq/scaling_cur_freq</text>

  <!-- devtmpfs note -->
  <rect x="500" y="258" width="320" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># devtmpfs: /dev 관리</text>
  <text x="516" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">ls</tspan> -la /dev/null /dev/zero /dev/random</text>
  <text x="516" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 마운트 현황 확인</text>
  <text x="516" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">findmnt</tspan> -t tmpfs,proc,sysfs</text>
  <text x="516" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 또는</text>
  <text x="516" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">mount</tspan> | grep -E 'tmpfs|proc|sysfs'</text>
  <text x="516" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># /proc/mounts 도 동일 내용</text>
</svg>
