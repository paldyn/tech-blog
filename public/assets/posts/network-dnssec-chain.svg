<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DNSSEC 신뢰 체인 (Chain of Trust)</text>

  <!-- Root zone -->
  <rect x="340" y="60" width="200" height="60" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Root Zone (.)</text>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Root KSK (Trust Anchor)</text>

  <!-- Arrow root to TLD -->
  <line x1="440" y1="120" x2="440" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DS 레코드</text>

  <!-- TLD zone -->
  <rect x="330" y="158" width="220" height="60" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">TLD Zone (.com)</text>
  <text x="440" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ZSK로 레코드 서명</text>

  <!-- Arrow TLD to 2ndlevel -->
  <line x1="440" y1="218" x2="440" y2="253" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DS 레코드</text>

  <!-- 2nd level zone -->
  <rect x="320" y="256" width="240" height="60" rx="8" fill="#1a1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">example.com Zone</text>
  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">RRSIG로 각 RRset 서명</text>

  <!-- Validation path (right side) -->
  <rect x="620" y="80" width="200" height="56" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">검증 과정</text>
  <text x="720" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RRSIG → DNSKEY → DS</text>

  <line x1="720" y1="136" x2="720" y2="168" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="620" y="168" width="200" height="56" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">DS 해시 비교</text>
  <text x="720" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">부모 → 자식 DNSKEY 검증</text>

  <line x1="720" y1="224" x2="720" y2="256" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="620" y="256" width="200" height="56" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">응답 인증 완료</text>
  <text x="720" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">AD bit = 1 설정</text>

  <!-- Key types explanation -->
  <text x="60" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">DNSSEC 레코드 타입</text>

  <!-- KSK box -->
  <rect x="60" y="362" width="180" height="72" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">KSK</text>
  <text x="150" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Key Signing Key</text>
  <text x="150" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ZSK를 서명</text>

  <!-- ZSK box -->
  <rect x="270" y="362" width="180" height="72" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="360" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">ZSK</text>
  <text x="360" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Zone Signing Key</text>
  <text x="360" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 RRset 서명</text>

  <!-- RRSIG box -->
  <rect x="480" y="362" width="180" height="72" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">RRSIG</text>
  <text x="570" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">레코드 서명값</text>
  <text x="570" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ZSK로 생성</text>

  <!-- DS box -->
  <rect x="690" y="362" width="130" height="72" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="755" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">DS</text>
  <text x="755" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Delegation Signer</text>
  <text x="755" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">KSK 해시</text>

  <!-- Code block -->
  <rect x="60" y="450" width="760" height="46" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="469" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># DNSSEC 검증 확인</text>
  <text x="76" y="487" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">dig <tspan fill="#7ec8e3" font-weight="600">+dnssec</tspan> example.com A  <tspan fill="#9aa4b8">; AD bit=1 → 검증 성공</tspan></text>
</svg>
