<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Labels vs Annotations — 차이점</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">어느 쪽에 데이터를 담아야 할지 판단 기준</text>

  <!-- Labels column -->
  <rect x="50" y="84" width="370" height="48" rx="8" fill="#121e38" stroke="#7ec8e3" stroke-width="2"/>
  <text x="235" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">Labels</text>
  <text x="235" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">식별 · 선택 · 그룹화 목적</text>

  <!-- Labels features -->
  <rect x="50" y="142" width="370" height="190" rx="6" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="166"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  Selector로 필터링 가능</text>
  <text x="70" y="190"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  API 인덱싱 / 쿼리 최적화</text>
  <text x="70" y="214"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  ReplicaSet · Service가 직접 참조</text>
  <text x="70" y="238"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗  값 크기 제한: 63자 이하</text>
  <text x="70" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗  임의 구조적 데이터 불가</text>
  <text x="70" y="286"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗  자유 텍스트·URL 비적합</text>
  <text x="70" y="318"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">예: app=web, env=prod, version=v1</text>

  <!-- Annotations column -->
  <rect x="460" y="84" width="370" height="48" rx="8" fill="#1a1428" stroke="#7777cc" stroke-width="2"/>
  <text x="645" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">Annotations</text>
  <text x="645" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">비식별 메타데이터 · 도구 통합 목적</text>

  <!-- Annotations features -->
  <rect x="460" y="142" width="370" height="190" rx="6" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="166"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  값 크기 제한 없음 (대용량 가능)</text>
  <text x="480" y="190"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  JSON · URL · 긴 설명문 저장</text>
  <text x="480" y="214"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  외부 도구 설정 주입 (Ingress 등)</text>
  <text x="480" y="238"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗  Selector로 선택 불가</text>
  <text x="480" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗  API 인덱싱 안 됨</text>
  <text x="480" y="286"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗  리소스 선택·그룹화에 사용 불가</text>
  <text x="480" y="318"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">예: nginx.ingress 설정, 빌드 URL, 담당자</text>

  <!-- Decision rule -->
  <rect x="50" y="350" width="780" height="50" rx="8" fill="#121e38" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">판단 기준</text>
  <text x="440" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">이 값으로 Pod나 리소스를 선택해야 한다면 → Label / 그 외 도구 통합·문서화 목적이라면 → Annotation</text>

  <!-- Common annotation examples -->
  <rect x="50" y="416" width="780" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="436"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">kubectl.kubernetes.io/last-applied-configuration</text>
  <text x="66" y="454"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">nginx.ingress.kubernetes.io/rewrite-target: /</text>
</svg>
