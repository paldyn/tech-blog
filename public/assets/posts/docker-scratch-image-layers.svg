<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    이미지 크기 비교: scratch vs 다른 베이스
  </text>

  <!-- Size comparison bars -->
  <!-- ubuntu 77MB bar -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">ubuntu:22.04</text>
  <rect x="60" y="88" width="616" height="28" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="684" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">~77 MB</text>

  <!-- alpine bar -->
  <text x="60" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">alpine:3.20</text>
  <rect x="60" y="144" width="56" height="28" rx="4" fill="#e8a020" opacity="0.8"/>
  <text x="124" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a020">~7 MB</text>

  <!-- distroless static bar -->
  <text x="60" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">distroless/static</text>
  <rect x="60" y="200" width="16" height="28" rx="4" fill="#7777cc" opacity="0.8"/>
  <text x="84" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">~2 MB</text>

  <!-- scratch bar -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">scratch</text>
  <rect x="60" y="256" width="4" height="28" rx="2" fill="#55c555" opacity="0.8"/>
  <text x="72" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">0 bytes (진정한 빈 이미지)</text>

  <!-- What scratch contains -->
  <text x="60" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">scratch 이미지가 포함하는 것</text>

  <rect x="60" y="334" width="220" height="56" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="170" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#444" text-anchor="middle" font-style="italic">파일시스템 없음</text>
  <text x="170" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#333" text-anchor="middle">0 bytes, 0 layers</text>

  <!-- Arrow -->
  <text x="294" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" fill="#7ec8e3" text-anchor="middle">+</text>

  <rect x="314" y="334" width="220" height="56" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="424" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">정적 바이너리</text>
  <text x="424" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CGO_ENABLED=0 Go/Rust 실행파일</text>

  <!-- Equals -->
  <text x="548" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" fill="#7ec8e3" text-anchor="middle">=</text>

  <rect x="568" y="334" width="252" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="694" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">완전한 앱 이미지</text>
  <text x="694" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">바이너리 크기 = 이미지 크기</text>

  <!-- Warning -->
  <rect x="60" y="410" width="760" height="50" rx="6" fill="#1a0a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="80" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020">⚠ 주의</text>
  <text x="80" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">scratch는 셸, libc, CA 인증서, 시간대 정보가 없음. docker exec로 접속 불가. CA 필요 시 별도 COPY 필요</text>
</svg>
