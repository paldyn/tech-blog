<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">EXPLAIN 포맷 비교 — TRADITIONAL / JSON / TREE / ANALYZE</text>

  <!-- Left: Traditional -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">TRADITIONAL (기본)</text>
  <rect x="40" y="92" width="380" height="148" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">EXPLAIN</text>
  <text x="56" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  SELECT * FROM orders o</text>
  <text x="56" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  JOIN customers c</text>
  <text x="56" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    ON o.customer_id = c.id</text>
  <text x="56" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  WHERE o.status = </text>
  <text x="56" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">                    'paid'</text>
  <text x="56" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- id, select_type, table,</text>
  <text x="56" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- id, select_type, table,</text>

  <!-- Right: JSON format -->
  <text x="460" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">JSON 포맷</text>
  <rect x="440" y="92" width="400" height="148" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">EXPLAIN FORMAT=JSON</text>
  <text x="456" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  SELECT ...;</text>
  <text x="456" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 출력 예시:</text>
  <text x="456" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">{</text>
  <text x="456" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  "cost_info": {</text>
  <text x="456" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    "query_cost": </text>
  <text x="660" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"124.5"</text>
  <text x="714" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> } }</text>

  <!-- Bottom Left: TREE -->
  <text x="60" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">TREE 포맷 (8.0.16+)</text>
  <rect x="40" y="276" width="380" height="148" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">EXPLAIN FORMAT=TREE</text>
  <text x="56" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  SELECT ...;</text>
  <text x="56" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 출력 예시:</text>
  <text x="56" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">-&gt; Nested loop inner join</text>
  <text x="56" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    -&gt; Filter: o.status=</text>
  <text x="56" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    -&gt; Index lookup</text>

  <!-- Bottom Right: ANALYZE -->
  <text x="460" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">EXPLAIN ANALYZE (8.0.18+)</text>
  <rect x="440" y="276" width="400" height="148" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">EXPLAIN ANALYZE</text>
  <text x="456" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  SELECT ...;</text>
  <text x="456" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 실제 실행 + 시간 측정:</text>
  <text x="456" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">actual time=0.5..12.3</text>
  <text x="456" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">rows=450 loops=1</text>
  <text x="456" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 예상 vs 실제 비교 가능</text>

  <!-- Summary boxes -->
  <rect x="40" y="442" width="185" height="52" fill="#0e1420" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="132" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">TRADITIONAL</text>
  <text x="132" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빠른 개요 확인</text>

  <rect x="237" y="442" width="185" height="52" fill="#0e1420" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="329" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">JSON</text>
  <text x="329" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비용·세부 정보</text>

  <rect x="434" y="442" width="185" height="52" fill="#0e1420" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="526" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">TREE</text>
  <text x="526" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실행 트리 구조</text>

  <rect x="631" y="442" width="209" height="52" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="735" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">ANALYZE</text>
  <text x="735" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 실행 시간 측정 (권장)</text>
</svg>
