<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">forwardRef — ref를 자식 DOM까지 전달</text>
  <text x="60" y="78" font-size="13" fill="#888">forwardRef&lt;ElementType, Props&gt; 순서로 두 타입 인자를 준다</text>

  <defs>
    <marker id="arrF" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- parent -->
  <rect x="60" y="120" width="210" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="165" y="152" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">부모 컴포넌트</text>
  <text x="165" y="184" font-size="13" fill="#ffffff" text-anchor="middle">ref = useRef&lt;</text>
  <text x="165" y="204" font-size="13" fill="#ffffff" text-anchor="middle">HTMLInputElement&gt;</text>

  <!-- forwardRef component -->
  <rect x="335" y="110" width="210" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="142" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">forwardRef</text>
  <text x="440" y="172" font-size="13" fill="#ffffff" text-anchor="middle">(props, ref) =&gt;</text>
  <text x="440" y="200" font-size="13" fill="#9aa4b8" text-anchor="middle">ref를 전달만 함</text>
  <text x="440" y="222" font-size="13" fill="#9aa4b8" text-anchor="middle">(렌더 안 함)</text>

  <!-- DOM -->
  <rect x="610" y="120" width="210" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="715" y="152" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">실제 DOM</text>
  <text x="715" y="184" font-size="13" fill="#ffffff" text-anchor="middle">&lt;input ref={ref} /&gt;</text>
  <text x="715" y="204" font-size="13" fill="#9aa4b8" text-anchor="middle">ref.current 연결</text>

  <line x1="270" y1="175" x2="333" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrF)"/>
  <line x1="545" y1="175" x2="608" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrF)"/>

  <text x="60" y="290" font-size="13" fill="#ffffff">제네릭 첫 인자는 노출할 엘리먼트(HTMLInputElement), 둘째는 Props.</text>
  <text x="60" y="312" font-size="13" fill="#9aa4b8">React 19부터는 ref를 일반 prop으로 받을 수 있어 forwardRef가 선택이 된다.</text>
</svg>
