<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Link 컴포넌트 핵심 속성</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">next/link — 클라이언트 사이드 네비게이션의 핵심</text>

  <!-- Code example -->
  <rect x="80" y="90" width="720" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Link </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ce9178"> 'next/link'</tspan>
  </text>
  <text x="96" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> </text>
  <text x="96" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Link</tspan><tspan fill="#ce9178"> href</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"/blog"</tspan><tspan fill="#ce9178"> prefetch</tspan><tspan fill="#ffffff">={</tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">}</tspan>
  </text>
  <text x="96" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#ce9178">      replace</tspan><tspan fill="#ffffff">={</tspan><tspan fill="#b5cea8">false</tspan><tspan fill="#ffffff">} </tspan><tspan fill="#ce9178">scroll</tspan><tspan fill="#ffffff">={</tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">}&gt;</tspan>
  </text>
  <text x="96" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">  블로그 보기</tspan>
  </text>
  <text x="96" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Link</tspan><tspan fill="#ffffff">&gt;</tspan>
  </text>

  <!-- Props description -->
  <text x="440" y="258" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">주요 Props</text>

  <rect x="60" y="272" width="340" height="80" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="298" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">href (필수)</text>
  <text x="230" y="318" text-anchor="middle" font-size="12" fill="#888">이동할 경로 (string 또는 URL 객체)</text>
  <text x="230" y="338" text-anchor="middle" font-size="11" fill="#9aa4b8">href={{ pathname: '/blog', query: { id: 1 } }}</text>

  <rect x="480" y="272" width="340" height="80" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="298" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">prefetch</text>
  <text x="650" y="318" text-anchor="middle" font-size="12" fill="#888">뷰포트 진입 시 미리 데이터 로드</text>
  <text x="650" y="338" text-anchor="middle" font-size="11" fill="#9aa4b8">기본값: null (자동 · 프로덕션에서만)</text>

  <rect x="60" y="368" width="340" height="80" rx="8" fill="#1a150a" stroke="#ce9178" stroke-width="1"/>
  <text x="230" y="394" text-anchor="middle" font-size="14" font-weight="600" fill="#ce9178">replace</text>
  <text x="230" y="414" text-anchor="middle" font-size="12" fill="#888">히스토리 스택에 추가 대신 교체</text>
  <text x="230" y="434" text-anchor="middle" font-size="11" fill="#9aa4b8">기본값: false (push)</text>

  <rect x="480" y="368" width="340" height="80" rx="8" fill="#0c1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="394" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">scroll</text>
  <text x="650" y="414" text-anchor="middle" font-size="12" fill="#888">이동 후 페이지 상단으로 스크롤</text>
  <text x="650" y="434" text-anchor="middle" font-size="11" fill="#9aa4b8">기본값: true</text>
</svg>
