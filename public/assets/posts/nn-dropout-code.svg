<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">드롭아웃 PyTorch 구현</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">Inverted Dropout 원리, 변형들, 그리고 추론 시 주의사항</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="240" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">import</tspan> torch, torch.nn <tspan fill="#7ec8e3">as</tspan> nn</text>

  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8"># 표준 드롭아웃 (FC 레이어 후)</tspan></text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">model = nn.Sequential(</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    nn.Linear(<tspan fill="#b5cea8">512</tspan>, <tspan fill="#b5cea8">256</tspan>), nn.ReLU(),</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    nn.Dropout(p=<tspan fill="#b5cea8">0.5</tspan>),  <tspan fill="#9aa4b8"># 50% 비활성화</tspan></text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    nn.Linear(<tspan fill="#b5cea8">256</tspan>, <tspan fill="#b5cea8">10</tspan>),</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8"># 수동 Inverted Dropout 구현</tspan></text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">def</tspan> <tspan fill="#55c555">dropout</tspan>(x, p, training):</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">if</tspan> <tspan fill="#7ec8e3">not</tspan> training: <tspan fill="#7ec8e3">return</tspan> x</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    mask = (torch.rand_like(x) &gt; p)</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">return</tspan> x * mask / (<tspan fill="#b5cea8">1.0</tspan> - p)</text>

  <!-- Variants box -->
  <rect x="60" y="345" width="350" height="60" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="364" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600" xml:space="preserve">드롭아웃 변형</text>
  <text x="235" y="382" text-anchor="middle" fill="#e8e8e8" font-size="11" xml:space="preserve">Dropout2d: 채널 단위 (CNN)</text>
  <text x="235" y="398" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">DropPath: 잔차 경로 (ViT)</text>

  <!-- Rate guide -->
  <rect x="470" y="345" width="350" height="60" rx="8" fill="#0c1a0c" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="364" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600" xml:space="preserve">p 설정 가이드</text>
  <text x="645" y="382" text-anchor="middle" fill="#e8e8e8" font-size="11" xml:space="preserve">FC 은닉층: p=0.4~0.5</text>
  <text x="645" y="398" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">CNN / 트랜스포머: p=0.1~0.3</text>

  <!-- Footer -->
</svg>
