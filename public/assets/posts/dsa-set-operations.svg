<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">집합 연산 (Set Operations)</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">합집합·교집합·차집합·대칭차 — Python 집합 연산자</text>

    <!-- A = {1,2,3,4,5}, B = {3,4,5,6,7} -->
    <text x="200" y="102" font-size="13" fill="#7ec8e3" text-anchor="middle">A = {1, 2, 3, 4, 5}</text>
    <text x="680" y="102" font-size="13" fill="#55c555" text-anchor="middle">B = {3, 4, 5, 6, 7}</text>

    <!-- Union -->
    <rect x="60" y="116" width="186" height="100" fill="#0d1520" stroke="#7ec8e3" stroke-width="1" rx="6"/>
    <text x="153" y="138" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">합집합 A | B</text>
    <text x="153" y="160" font-size="12" fill="#888" text-anchor="middle">A ∪ B</text>
    <text x="153" y="182" font-size="13" fill="#e8e8e8" text-anchor="middle">{1,2,3,4,5,6,7}</text>
    <text x="153" y="202" font-size="11" fill="#888" text-anchor="middle">O(|A|+|B|)</text>

    <!-- Intersection -->
    <rect x="256" y="116" width="186" height="100" fill="#0d1520" stroke="#55c555" stroke-width="1" rx="6"/>
    <text x="349" y="138" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">교집합 A &amp; B</text>
    <text x="349" y="160" font-size="12" fill="#888" text-anchor="middle">A ∩ B</text>
    <text x="349" y="182" font-size="13" fill="#e8e8e8" text-anchor="middle">{3, 4, 5}</text>
    <text x="349" y="202" font-size="11" fill="#888" text-anchor="middle">O(min(|A|,|B|))</text>

    <!-- Difference A-B -->
    <rect x="452" y="116" width="186" height="100" fill="#0d1520" stroke="#ce9178" stroke-width="1" rx="6"/>
    <text x="545" y="138" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">차집합 A - B</text>
    <text x="545" y="160" font-size="12" fill="#888" text-anchor="middle">A \ B</text>
    <text x="545" y="182" font-size="13" fill="#e8e8e8" text-anchor="middle">{1, 2}</text>
    <text x="545" y="202" font-size="11" fill="#888" text-anchor="middle">O(|A|)</text>

    <!-- Symmetric difference -->
    <rect x="648" y="116" width="186" height="100" fill="#0d1520" stroke="#7777cc" stroke-width="1" rx="6"/>
    <text x="741" y="138" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">대칭차 A ^ B</text>
    <text x="741" y="160" font-size="12" fill="#888" text-anchor="middle">A △ B</text>
    <text x="741" y="182" font-size="13" fill="#e8e8e8" text-anchor="middle">{1,2,6,7}</text>
    <text x="741" y="202" font-size="11" fill="#888" text-anchor="middle">O(|A|+|B|)</text>

    <!-- Code block -->
    <rect x="60" y="236" width="760" height="136" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">A = {1, 2, 3, 4, 5}</text>
    <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">                        </text>
    <text x="80" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">B = {3, 4, 5, 6, 7}</text>
    <text x="80" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"></text>
    <text x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">A | B   </text>
    <text x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">        # {1,2,3,4,5,6,7}  합집합</text>
    <text x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">A &amp; B   </text>
    <text x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">        # {3,4,5}          교집합</text>
    <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">A - B   </text>
    <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">        # {1,2}             차집합</text>
    <text x="80" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">A ^ B   </text>
    <text x="80" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">        # {1,2,6,7}         대칭차</text>
  </g>
</svg>
