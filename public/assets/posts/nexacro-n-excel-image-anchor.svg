<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ClientAnchor 좌표 체계</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">셀 기준 위치 + EMU 오프셋으로 픽셀 정밀 배치</text>

  <!-- Grid mock (spreadsheet cells) -->
  <!-- Column headers -->
  <rect x="200" y="100" width="150" height="32" rx="0" fill="#1a2030" stroke="#2a3040"/>
  <text x="275" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Col 1 (B)</text>
  <rect x="350" y="100" width="150" height="32" rx="0" fill="#1a2030" stroke="#2a3040"/>
  <text x="425" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Col 2 (C)</text>
  <rect x="500" y="100" width="150" height="32" rx="0" fill="#1a2030" stroke="#2a3040"/>
  <text x="575" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Col 3 (D)</text>

  <!-- Row headers -->
  <rect x="60" y="132" width="140" height="80" rx="0" fill="#1a2030" stroke="#2a3040"/>
  <text x="130" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Row 2</text>
  <rect x="60" y="212" width="140" height="80" rx="0" fill="#1a2030" stroke="#2a3040"/>
  <text x="130" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Row 3</text>
  <rect x="60" y="292" width="140" height="80" rx="0" fill="#1a2030" stroke="#2a3040"/>
  <text x="130" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Row 4</text>

  <!-- Cells -->
  <rect x="200" y="132" width="450" height="240" rx="0" fill="#0f1520" stroke="#2a3040"/>
  <!-- Cell grid lines -->
  <line x1="350" y1="132" x2="350" y2="372" stroke="#2a3040" stroke-width="1"/>
  <line x1="500" y1="132" x2="500" y2="372" stroke="#2a3040" stroke-width="1"/>
  <line x1="200" y1="212" x2="650" y2="212" stroke="#2a3040" stroke-width="1"/>
  <line x1="200" y1="292" x2="650" y2="292" stroke="#2a3040" stroke-width="1"/>

  <!-- Image placeholder -->
  <rect x="220" y="150" width="260" height="160" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-dasharray="4,4"/>
  <text x="350" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">삽입된 이미지</text>
  <text x="350" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">col1=1,row1=2 → col2=3,row2=4</text>

  <!-- Anchor labels -->
  <!-- Top-left anchor point -->
  <circle cx="220" cy="150" r="5" fill="#7ec8e3"/>
  <text x="228" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">setCol1(1) setRow1(2)</text>

  <!-- Bottom-right anchor point -->
  <circle cx="480" cy="310" r="5" fill="#7777cc"/>
  <text x="488" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">setCol2(3) setRow2(4)</text>

  <!-- Offset annotation -->
  <rect x="60" y="390" width="760" height="44" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dx/Dy 오프셋: 1 EMU = 1/914400 inch  |  setDx1(914400) ≈ 1mm 오른쪽 이동</text>
  <text x="440" y="427" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이미지 원본 비율 유지: picture.resize(1.0) 또는 setCol2/Row2 생략</text>
</svg>
