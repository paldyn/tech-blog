<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NetworkPolicy — Ingress/Egress 제어</text>

  <!-- Namespace boundary -->
  <rect x="50" y="60" width="780" height="370" rx="8" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="66" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#444">Namespace: production</text>

  <!-- Backend Pod (protected) -->
  <rect x="330" y="110" width="220" height="80" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="2"/>
  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">backend Pod</text>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">app=backend</text>
  <text x="440" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">NetworkPolicy 적용 대상</text>

  <!-- Frontend Pod (allowed) -->
  <rect x="90" y="200" width="180" height="72" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">frontend Pod</text>
  <text x="180" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">app=frontend</text>
  <text x="180" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">허용된 소스</text>

  <!-- Other Pod (denied) -->
  <rect x="90" y="310" width="180" height="72" rx="8" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <text x="180" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">other Pod</text>
  <text x="180" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">app=other</text>
  <text x="180" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">차단된 소스</text>

  <!-- DB Pod (egress target) -->
  <rect x="610" y="200" width="180" height="72" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="700" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">database Pod</text>
  <text x="700" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">app=db</text>
  <text x="700" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">허용된 목적지</text>

  <!-- External (denied egress) -->
  <rect x="610" y="310" width="180" height="72" rx="8" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <text x="700" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">external</text>
  <text x="700" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">0.0.0.0/0</text>
  <text x="700" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">차단된 목적지</text>

  <!-- Ingress: frontend → backend (allowed) -->
  <line x1="272" y1="236" x2="328" y2="172" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="285" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">허용 ✓</text>

  <!-- Ingress: other → backend (denied) -->
  <line x1="272" y1="346" x2="328" y2="182" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <text x="220" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">차단 ✗</text>

  <!-- Egress: backend → database (allowed) -->
  <line x1="552" y1="172" x2="608" y2="236" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="568" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">허용 ✓</text>

  <!-- Egress: backend → external (denied) -->
  <line x1="552" y1="182" x2="608" y2="346" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <text x="582" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">차단 ✗</text>

  <!-- Labels -->
  <text x="290" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Ingress :8080</text>
  <text x="590" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Egress :5432</text>

  <!-- Bottom note -->
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">NetworkPolicy가 없으면 모든 파드 간 통신이 허용됨 (기본 Allow All)</text>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">정책 적용은 CNI 플러그인이 담당 — Flannel은 NetworkPolicy 미지원</text>
</svg>
