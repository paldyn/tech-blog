<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">단순 요청의 CORS — 차단되는 건 요청이 아니라 읽기</text>
    <!-- Actors -->
    <rect x="70" y="64" width="170" height="46" rx="8" fill="#1f173a" stroke="#7777cc" stroke-width="1.5"/>
    <text x="155" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#9b8fe8">자바스크립트</text>
    <rect x="355" y="64" width="170" height="46" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="440" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">브라우저</text>
    <rect x="640" y="64" width="170" height="46" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="725" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">교차 출처 서버</text>
    <!-- Lifelines -->
    <line x1="155" y1="110" x2="155" y2="330" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="440" y1="110" x2="440" y2="330" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="725" y1="110" x2="725" y2="330" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,4"/>
    <!-- 1. fetch -->
    <text x="297" y="138" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9b8fe8">fetch('https://api.shop.com/items')</text>
    <line x1="155" y1="150" x2="438" y2="150" stroke="#7777cc" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- 2. request with Origin -->
    <text x="582" y="178" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">GET /items + Origin: https://app.com</text>
    <line x1="440" y1="190" x2="723" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- 3. response -->
    <text x="582" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">200 OK + Access-Control-Allow-Origin</text>
    <line x1="725" y1="230" x2="442" y2="230" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrG)"/>
    <!-- browser check note -->
    <text x="440" y="266" text-anchor="middle" font-size="12" fill="#888">브라우저가 ACAO 헤더를 검사</text>
    <!-- Branch arrows -->
    <line x1="400" y1="330" x2="240" y2="368" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
    <line x1="480" y1="330" x2="640" y2="368" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>
    <!-- Outcome boxes -->
    <rect x="60" y="370" width="350" height="70" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="235" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">ACAO가 Origin과 일치</text>
    <text x="235" y="410" text-anchor="middle" font-size="11" fill="#888">응답 데이터를 자바스크립트에 전달</text>
    <text x="235" y="428" text-anchor="middle" font-size="11" fill="#888">res.json() 정상 동작</text>
    <rect x="470" y="370" width="350" height="70" rx="8" fill="#2a0f0f" stroke="#aa3a3a" stroke-width="1.5"/>
    <text x="645" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">ACAO 없음 · 불일치</text>
    <text x="645" y="410" text-anchor="middle" font-size="11" fill="#888">TypeError: Failed to fetch — 읽기 차단</text>
    <text x="645" y="428" text-anchor="middle" font-size="11" fill="#888">요청은 이미 서버에 도달해 실행됐다</text>
    <!-- Summary -->
    <text x="440" y="472" text-anchor="middle" font-size="12" fill="#888">CORS는 서버 보호 장치가 아니라, 브라우저가 응답을 스크립트에 줄지 결정하는 읽기 통제다</text>
  </g>
</svg>
