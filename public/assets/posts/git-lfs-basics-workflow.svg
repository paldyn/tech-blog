<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Git LFS 설치 및 기본 사용</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">install → track → add → commit → push 순서</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="94" width="148" height="52" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="134" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① 설치</text>
  <text x="134" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">git lfs install</text>

  <line x1="208" y1="120" x2="238" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="238" y="94" width="148" height="52" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="312" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② 트래킹</text>
  <text x="312" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">git lfs track "*.mp4"</text>

  <line x1="386" y1="120" x2="416" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="416" y="94" width="148" height="52" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="490" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">③ 스테이징</text>
  <text x="490" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">git add</text>

  <line x1="564" y1="120" x2="594" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="594" y="94" width="148" height="52" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="668" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">④ 커밋·푸시</text>
  <text x="668" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">git commit + push</text>

  <!-- Code block: install + track -->
  <rect x="60" y="170" width="370" height="136" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="194" fill="#9aa4b8"># LFS 초기화 (저장소당 1회)</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git lfs install</tspan>
    <tspan x="76" dy="22" fill="#9aa4b8"># 추적할 패턴 등록</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git lfs track</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"*.psd"</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git lfs track</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"*.mp4" "*.mov"</tspan>
  </text>

  <!-- Code block: commit + push -->
  <rect x="450" y="170" width="370" height="136" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="466" y="194" fill="#9aa4b8"># .gitattributes 반드시 포함</tspan>
    <tspan x="466" dy="18" fill="#7ec8e3" font-weight="600">git add</tspan><tspan fill="#ffffff"> .gitattributes video.mp4</tspan>
    <tspan x="466" dy="22" fill="#7ec8e3" font-weight="600">git commit</tspan><tspan fill="#ffffff"> -m </tspan><tspan fill="#ce9178">"add LFS tracked video"</tspan>
    <tspan x="466" dy="18" fill="#9aa4b8"># push 시 LFS 서버로 전송</tspan>
    <tspan x="466" dy="18" fill="#7ec8e3" font-weight="600">git push</tspan><tspan fill="#ffffff"> origin main</tspan>
  </text>

  <!-- .gitattributes box -->
  <rect x="60" y="326" width="760" height="70" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">.gitattributes — git lfs track가 자동으로 추가하는 내용</text>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="200" y="368" fill="#ce9178">*.psd</tspan><tspan fill="#ffffff">  filter=lfs diff=lfs merge=lfs -text</tspan>
    <tspan x="200" dy="18" fill="#ce9178">*.mp4</tspan><tspan fill="#ffffff">  filter=lfs diff=lfs merge=lfs -text</tspan>
  </text>
</svg>
