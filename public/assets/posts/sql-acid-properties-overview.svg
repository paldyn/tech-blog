<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ACID 속성</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">트랜잭션 신뢰성을 보장하는 4가지 성질</text>

  <!-- A: Atomicity -->
  <rect x="50" y="92" width="370" height="148" rx="10" fill="#111118" stroke="#55c555" stroke-width="2"/>
  <text x="235" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">A — Atomicity (원자성)</text>
  <text x="235" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">트랜잭션 내 작업은 전부 성공하거나</text>
  <text x="235" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">전부 실패해야 한다 (All-or-Nothing)</text>
  <rect x="80" y="174" width="160" height="24" rx="4" fill="#0f1a0f"/>
  <text x="160" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">COMMIT → 전부 반영</text>
  <rect x="260" y="174" width="130" height="24" rx="4" fill="#1a0f0f"/>
  <text x="325" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">ROLLBACK → 전부 취소</text>
  <text x="235" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구현: Undo Log (롤백 정보)</text>

  <!-- C: Consistency -->
  <rect x="460" y="92" width="370" height="148" rx="10" fill="#111118" stroke="#7ec8e3" stroke-width="2"/>
  <text x="645" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">C — Consistency (일관성)</text>
  <text x="645" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">트랜잭션 전후로 DB는 항상</text>
  <text x="645" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">제약(Constraints)을 만족해야 한다</text>
  <rect x="490" y="174" width="310" height="24" rx="4" fill="#0d1a1a"/>
  <text x="645" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PK, FK, NOT NULL, CHECK 위반 시 롤백</text>
  <text x="645" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구현: 제약 검사(Constraint Evaluation)</text>

  <!-- I: Isolation -->
  <rect x="50" y="260" width="370" height="148" rx="10" fill="#111118" stroke="#7777cc" stroke-width="2"/>
  <text x="235" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">I — Isolation (격리성)</text>
  <text x="235" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">동시에 실행되는 트랜잭션들이</text>
  <text x="235" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">서로 간섭하지 않아야 한다</text>
  <rect x="80" y="342" width="310" height="24" rx="4" fill="#12101a"/>
  <text x="235" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">격리 수준: READ UNCOMMITTED ~ SERIALIZABLE</text>
  <text x="235" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구현: 잠금(Locking) 또는 MVCC</text>

  <!-- D: Durability -->
  <rect x="460" y="260" width="370" height="148" rx="10" fill="#111118" stroke="#e05555" stroke-width="2"/>
  <text x="645" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555">D — Durability (지속성)</text>
  <text x="645" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">COMMIT된 트랜잭션 결과는</text>
  <text x="645" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">장애 후에도 영구 보존된다</text>
  <rect x="490" y="342" width="310" height="24" rx="4" fill="#1a0d0d"/>
  <text x="645" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Redo Log(WAL) → 복구 시 재수행 가능</text>
  <text x="645" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구현: Write-Ahead Log (WAL / Redo Log)</text>

  <!-- Bottom -->
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Jim Gray(1981)가 정립한 개념 · C(일관성)는 애플리케이션 설계 책임이기도 함</text>
</svg>
