<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커널 링 버퍼 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">dmesg의 데이터 소스 — printk 링 버퍼</text>

  <!-- Kernel printk sources -->
  <rect x="60" y="100" width="160" height="44" rx="6" fill="#1a1a2a" stroke="#5a5a9a" stroke-width="1"/>
  <text x="140" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">커널 부트 메시지</text>

  <rect x="60" y="164" width="160" height="44" rx="6" fill="#1a2a1a" stroke="#3a7a3a" stroke-width="1"/>
  <text x="140" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">드라이버 초기화</text>

  <rect x="60" y="228" width="160" height="44" rx="6" fill="#1a2a2a" stroke="#2a6a6a" stroke-width="1"/>
  <text x="140" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">하드웨어 감지</text>

  <rect x="60" y="292" width="160" height="44" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1"/>
  <text x="140" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">에러/경고</text>

  <!-- arrows to ring buffer -->
  <line x1="220" y1="122" x2="300" y2="185" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="186" x2="300" y2="210" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="250" x2="300" y2="235" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="314" x2="300" y2="260" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Ring buffer -->
  <rect x="300" y="140" width="280" height="160" rx="8" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="440" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">printk Ring Buffer</text>
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">크기: 512KB ~ 2MB (CONFIG_LOG_BUF_SHIFT)</text>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">버퍼 가득 차면 오래된 메시지 덮어쓰기</text>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/dev/kmsg 로 접근 가능</text>
  <text x="440" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">[ 타임스탬프 ] 레벨 서브시스템: 메시지</text>
  <text x="440" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#3a6ea8" text-anchor="middle">KERN_EMERG 0 ~ KERN_DEBUG 7</text>

  <!-- Output arrows -->
  <line x1="580" y1="200" x2="640" y2="165" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="580" y1="220" x2="640" y2="245" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="580" y1="240" x2="640" y2="310" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Consumers -->
  <rect x="640" y="140" width="180" height="44" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="730" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">dmesg (user)</text>

  <rect x="640" y="220" width="180" height="44" rx="6" fill="#1a1a2a" stroke="#5a5a9a" stroke-width="1"/>
  <text x="730" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">journald (persistent)</text>

  <rect x="640" y="300" width="180" height="44" rx="6" fill="#1a2a1a" stroke="#3a6a3a" stroke-width="1"/>
  <text x="730" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">console / tty</text>

  <!-- Log level table -->
  <rect x="60" y="370" width="760" height="64" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">로그 레벨 (숫자 낮을수록 심각)</text>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">0:emerg  1:alert  2:crit  3:err  4:warning  5:notice  6:info  7:debug</text>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">dmesg -l err,crit,alert,emerg  → 에러 이상만 필터</text>
</svg>
