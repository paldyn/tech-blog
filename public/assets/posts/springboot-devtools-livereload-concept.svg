<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring Boot DevTools 동작 원리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">ClassLoader 분리 + 자동 재시작</text>

  <!-- Developer box -->
  <rect x="60" y="100" width="200" height="60" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">개발자 코드 수정</text>
  <text x="160" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IDE 자동 컴파일</text>

  <!-- Arrow -->
  <line x1="260" y1="130" x2="300" y2="130" stroke="#555" stroke-width="2"/>
  <polygon points="310,130 298,124 298,136" fill="#555"/>

  <!-- ClassPath Change -->
  <rect x="310" y="108" width="220" height="44" rx="8" fill="#141414" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="420" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a">클래스패스 변경 감지</text>
  <text x="420" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DevTools 파일와처</text>

  <!-- Arrow down -->
  <line x1="420" y1="152" x2="420" y2="180" stroke="#555" stroke-width="2"/>
  <polygon points="420,190 413,178 427,178" fill="#555"/>

  <!-- Restart Process -->
  <rect x="310" y="194" width="220" height="80" rx="8" fill="#141414" stroke="#55c555" stroke-width="1.5"/>
  <text x="420" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">앱 ClassLoader 재시작</text>
  <text x="420" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Base ClassLoader 유지</text>
  <text x="420" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">(라이브러리 재로딩 생략)</text>

  <!-- Arrow right -->
  <line x1="530" y1="234" x2="570" y2="234" stroke="#555" stroke-width="2"/>
  <polygon points="580,234 568,228 568,240" fill="#555"/>

  <!-- LiveReload Signal -->
  <rect x="580" y="214" width="240" height="44" rx="8" fill="#141414" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#9999ee">LiveReload 신호 전송</text>
  <text x="700" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">WebSocket → 브라우저</text>

  <!-- Browser -->
  <rect x="620" y="288" width="200" height="50" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">브라우저 자동 새로고침</text>
  <text x="720" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">F5 없이 변경 확인</text>
  <line x1="700" y1="258" x2="700" y2="288" stroke="#555" stroke-width="2"/>
  <polygon points="700,288 694,276 706,276" fill="#555"/>

  <!-- ClassLoader Diagram -->
  <rect x="60" y="220" width="230" height="170" rx="10" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="175" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">ClassLoader 분리 구조</text>
  <rect x="80" y="256" width="190" height="44" rx="6" fill="#0a2014" stroke="#55c555" stroke-width="1"/>
  <text x="175" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Base ClassLoader</text>
  <text x="175" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서드파티 라이브러리 (불변)</text>
  <rect x="80" y="312" width="190" height="44" rx="6" fill="#1a0f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="175" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9999ee">Restart ClassLoader</text>
  <text x="175" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">애플리케이션 코드 (재로딩)</text>
  <text x="175" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">재시작 시간: 풀 재시작의 1/3 수준</text>

  <!-- Bottom comparison -->
  <rect x="60" y="410" width="760" height="50" rx="8" fill="#141414" stroke="#444" stroke-width="1"/>
  <text x="240" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">전체 재시작: 10~30초 (JVM 재구동)</text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">|</text>
  <text x="640" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">DevTools 재시작: 1~3초</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HotSwap(JRebel)과 달리 오픈소스·무료로 사용 가능</text>
</svg>
