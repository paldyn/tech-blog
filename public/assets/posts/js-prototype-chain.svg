<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">프로토타입 체인 — 속성 탐색 경로</text>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#555">인스턴스 → 프로토타입 → 상위 프로토타입 → Object.prototype → null</text>

  <!-- alice instance -->
  <rect x="60" y="95" width="200" height="130" rx="10" fill="#101420" stroke="#223355" stroke-width="1.5"/>
  <text x="160" y="120" text-anchor="middle" font-size="12" fill="#6688cc" font-weight="700">alice (인스턴스)</text>
  <line x1="80" y1="130" x2="240" y2="130" stroke="#223355" stroke-width="1"/>
  <text x="90" y="152" font-size="11.5" fill="#888">name: "Alice"</text>
  <text x="90" y="170" font-size="11.5" fill="#888">age: 30</text>
  <text x="90" y="188" font-size="11.5" fill="#446">[[Prototype]] →</text>
  <rect x="80" y="198" width="160" height="18" rx="4" fill="#0a0e18"/>
  <text x="160" y="211" text-anchor="middle" font-size="10.5" fill="#556">Object.create(Person.prototype)</text>

  <!-- Arrow to Person.prototype -->
  <path d="M 260 155 L 335 155" stroke="#334466" stroke-width="1.5" marker-end="url(#barr)"/>
  <text x="295" y="148" text-anchor="middle" font-size="10" fill="#445">[[Prototype]]</text>

  <!-- Person.prototype -->
  <rect x="335" y="95" width="220" height="160" rx="10" fill="#141020" stroke="#332255" stroke-width="1.5"/>
  <text x="445" y="120" text-anchor="middle" font-size="12" fill="#9966cc" font-weight="700">Person.prototype</text>
  <line x1="355" y1="130" x2="535" y2="130" stroke="#332255" stroke-width="1"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="360" y="152" font-size="11.5" fill="#888">constructor: Person</text>
  <text x="360" y="172" font-size="11.5" fill="#9966cc">greet(): function</text>
  <text x="360" y="192" font-size="11.5" fill="#9966cc">introduce(): function</text>
  <text x="360" y="212" font-size="11.5" fill="#446">[[Prototype]] →</text>
  <rect x="355" y="222" width="160" height="18" rx="4" fill="#0c0a18"/>
  <text x="435" y="235" text-anchor="middle" font-size="10.5" fill="#556">Object.prototype</text>

  <!-- Arrow to Object.prototype -->
  <path d="M 555 175 L 625 175" stroke="#443366" stroke-width="1.5" marker-end="url(#barr)"/>
  <text x="588" y="168" text-anchor="middle" font-size="10" fill="#445">[[Prototype]]</text>

  <!-- Object.prototype -->
  <rect x="625" y="95" width="220" height="160" rx="10" fill="#181018" stroke="#442255" stroke-width="1.5"/>
  <text x="735" y="120" text-anchor="middle" font-size="12" fill="#cc66aa" font-weight="700">Object.prototype</text>
  <line x1="645" y1="130" x2="825" y2="130" stroke="#442255" stroke-width="1"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="650" y="152" font-size="11.5" fill="#888">constructor: Object</text>
  <text x="650" y="172" font-size="11.5" fill="#cc66aa">toString(): function</text>
  <text x="650" y="192" font-size="11.5" fill="#cc66aa">hasOwnProperty(): fn</text>
  <text x="650" y="212" font-size="11.5" fill="#446">[[Prototype]] →</text>
  <rect x="645" y="222" width="140" height="18" rx="4" fill="#160c16"/>
  <text x="715" y="235" text-anchor="middle" font-size="10.5" fill="#556">null (체인 종료)</text>

  <!-- null -->
  <rect x="660" y="290" width="100" height="40" rx="8" fill="#1a0a0a" stroke="#330000" stroke-width="1"/>
  <text x="710" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#664444">null</text>
  <path d="M 735 258 L 735 282" stroke="#443" stroke-width="1.5" marker-end="url(#barr)"/>

  <!-- Property lookup example -->
  <rect x="60" y="285" width="500" height="175" rx="10" fill="#0e0e0e" stroke="#222" stroke-width="1"/>
  <text x="310" y="308" text-anchor="middle" font-size="12" fill="#888" font-weight="600">프로퍼티 탐색 순서: alice.greet() 호출 시</text>

  <rect x="80" y="318" width="130" height="26" rx="5" fill="#1a1a2a"/>
  <text x="145" y="335" text-anchor="middle" font-size="11" fill="#6688cc">① alice에서 탐색</text>

  <text x="230" y="335" font-size="13" fill="#444">→</text>

  <rect x="244" y="318" width="130" height="26" rx="5" fill="#1a1a2a"/>
  <text x="309" y="335" text-anchor="middle" font-size="11" fill="#9966cc">greet 없음 → [[Prototype]]</text>

  <text x="390" y="335" font-size="13" fill="#444">→</text>

  <rect x="405" y="318" width="130" height="26" rx="5" fill="#1a2010"/>
  <text x="470" y="335" text-anchor="middle" font-size="11" fill="#66bb66">Person.prototype에서 발견!</text>

  <text x="310" y="370" text-anchor="middle" font-size="11.5" fill="#666">hasOwnProperty()처럼 Person.prototype에도 없으면 Object.prototype까지 탐색</text>
  <text x="310" y="392" text-anchor="middle" font-size="11.5" fill="#666">Object.prototype에도 없으면 → null → undefined 반환</text>

  <text x="310" y="422" text-anchor="middle" font-size="12" fill="#888">alice.greet         → Person.prototype.greet (공유, 메모리 효율)</text>
  <text x="310" y="444" text-anchor="middle" font-size="12" fill="#888">alice.name          → alice 자신의 프로퍼티 (인스턴스 고유)</text>

  <text x="440" y="488" text-anchor="middle" font-size="11" fill="#444">모든 객체는 [[Prototype]] 링크를 통해 연결된 체인을 형성 — JavaScript 객체 지향의 핵심 메커니즘</text>

  <defs>
    <marker id="barr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334466"/>
    </marker>
  </defs>
</svg>
