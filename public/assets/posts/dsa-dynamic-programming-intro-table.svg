<svg width="880" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr-b" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#7ec8e3" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">동적 프로그래밍 — 타뷸레이션</text>

  <!-- Code block -->
  <text x="60" y="82" font-size="16" font-weight="600" fill="#e8e8e8">바텀업 DP 코드</text>
  <rect x="60" y="96" width="420" height="240" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def</text>
  <text x="114" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> fib_dp(n):</text>
  <text x="80" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  if</text>
  <text x="111" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> n &lt;= </text>
  <text x="155" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="163" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">: </text>
  <text x="180" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">return</text>
  <text x="238" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> n</text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  dp = [</text>
  <text x="144" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="152" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">] * (n + </text>
  <text x="218" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="226" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  dp[</text>
  <text x="120" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="128" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">] = </text>
  <text x="156" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  for</text>
  <text x="111" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> i </text>
  <text x="131" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">in</text>
  <text x="152" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> range(</text>
  <text x="207" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="215" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, n + </text>
  <text x="265" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="273" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">):</text>
  <text x="80" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    dp[i] = dp[i-</text>
  <text x="229" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="237" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">]+dp[i-</text>
  <text x="299" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="307" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">]</text>
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text>
  <text x="138" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> dp[n]</text>
  <text x="80" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Time: O(N), Space: O(N)</text>
  <text x="80" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Space opt: O(1) with 2 vars</text>

  <!-- Right: DP table visualization -->
  <text x="520" y="82" font-size="16" font-weight="600" fill="#e8e8e8">DP 테이블 (n=7)</text>

  <!-- Index row label -->
  <text x="520" y="115" font-size="13" fill="#888">인덱스 i</text>

  <!-- Index boxes -->
  <rect x="520" y="122" width="44" height="32" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="542" y="143" text-anchor="middle" font-size="13" fill="#7777cc" font-weight="600">0</text>
  <rect x="568" y="122" width="44" height="32" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="590" y="143" text-anchor="middle" font-size="13" fill="#7777cc" font-weight="600">1</text>
  <rect x="616" y="122" width="44" height="32" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="638" y="143" text-anchor="middle" font-size="13" fill="#7777cc" font-weight="600">2</text>
  <rect x="664" y="122" width="44" height="32" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="686" y="143" text-anchor="middle" font-size="13" fill="#7777cc" font-weight="600">3</text>
  <rect x="712" y="122" width="44" height="32" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="734" y="143" text-anchor="middle" font-size="13" fill="#7777cc" font-weight="600">4</text>
  <rect x="760" y="122" width="44" height="32" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="782" y="143" text-anchor="middle" font-size="13" fill="#7777cc" font-weight="600">5</text>
  <rect x="808" y="122" width="44" height="32" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="830" y="143" text-anchor="middle" font-size="13" fill="#7777cc" font-weight="600">6</text>

  <!-- dp row label -->
  <text x="520" y="190" font-size="13" fill="#888">dp[i]</text>

  <!-- dp value boxes -->
  <rect x="520" y="196" width="44" height="40" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="542" y="221" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">0</text>

  <rect x="568" y="196" width="44" height="40" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="590" y="221" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">1</text>

  <rect x="616" y="196" width="44" height="40" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="638" y="221" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">1</text>

  <rect x="664" y="196" width="44" height="40" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="686" y="221" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">2</text>

  <rect x="712" y="196" width="44" height="40" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="734" y="221" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">3</text>

  <rect x="760" y="196" width="44" height="40" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="782" y="221" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">5</text>

  <rect x="808" y="196" width="44" height="40" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="830" y="221" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">8</text>

  <!-- Arrow showing i=6 depends on i=5 and i=4 -->
  <path d="M 782 236 Q 782 272 830 272 Q 852 272 830 236" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="845" y="260" font-size="11" fill="#55c555">dp[6]</text>

  <line x1="734" y1="236" x2="800" y2="268" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-b)"/>
  <line x1="782" y1="236" x2="810" y2="268" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-b)"/>
  <text x="705" y="282" font-size="12" fill="#55c555">dp[4]+dp[5]=8</text>

  <!-- Two conditions box -->
  <text x="520" y="316" font-size="16" font-weight="600" fill="#e8e8e8">DP의 두 조건</text>

  <rect x="520" y="330" width="175" height="100" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="607" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">최적 부분 구조</text>
  <text x="535" y="376" font-size="12" fill="#888">fib(n) = fib(n-1)</text>
  <text x="535" y="394" font-size="12" fill="#888">       + fib(n-2)</text>
  <text x="535" y="414" font-size="12" fill="#888">부분 최적이 전체</text>
  <text x="535" y="428" font-size="12" fill="#888">최적해 구성</text>

  <rect x="705" y="330" width="175" height="100" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="792" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">겹치는 부분 문제</text>
  <text x="720" y="376" font-size="12" fill="#888">fib(3), fib(2) 등이</text>
  <text x="720" y="394" font-size="12" fill="#888">여러 번 호출됨</text>
  <text x="720" y="414" font-size="12" fill="#888">메모이제이션으로</text>
  <text x="720" y="428" font-size="12" fill="#888">중복 제거</text>

  <!-- Memoization vs Tabulation -->
  <rect x="60" y="380" width="420" height="90" rx="8" fill="#0a0a0a" stroke="#444" stroke-width="1"/>
  <text x="270" y="402" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">메모이제이션 vs 타뷸레이션</text>
  <text x="80" y="422" font-size="13" fill="#7ec8e3">메모이제이션</text>
  <text x="80" y="440" font-size="12" fill="#888">탑다운 재귀 + 캐시</text>
  <text x="80" y="456" font-size="12" fill="#888">필요한 부분만 계산</text>
  <text x="260" y="422" font-size="13" fill="#55c555">타뷸레이션</text>
  <text x="260" y="440" font-size="12" fill="#888">바텀업 반복 + 테이블</text>
  <text x="260" y="456" font-size="12" fill="#888">스택 오버플로 없음</text>

  <!-- Final result -->
  <rect x="60" y="480" width="420" height="30" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="270" y="500" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">fib_dp(7) = 13 — 시간 O(N), 공간 O(N)</text>
</svg>
