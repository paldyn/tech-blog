<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- 배경 -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CSRF · CORS 코드 설정</text>

  <!-- ===== 왼쪽 코드 박스: CSRF 설정 (x=50, y=68, w=378, h=362) ===== -->
  <rect x="50" y="68" width="378" height="362" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="239" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">CSRF — REST API 비활성화</text>
  <line x1="50" y1="104" x2="428" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- CSRF 코드 (12줄 × 18 = 216, body=104~430=326, pad=(326-216)/2=55 → first=104+55+13=172) -->
  <text x="66" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// REST API는 상태 없음 → CSRF 비활성화</text>
  <text x="66" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="66" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> SecurityFilterChain</tspan></text>
  <text x="66" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#ffffff">apiChain(HttpSecurity http) {</tspan></text>
  <text x="66" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> http</tspan></text>
  <text x="66" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">.csrf(AbstractHttpConfigurer</tspan></text>
  <text x="66" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">::disable)</tspan></text>
  <text x="66" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // 폼 기반 앱은 활성화(기본값 유지)</text>
  <text x="66" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">.sessionManagement(s -&gt; s</tspan></text>
  <text x="66" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.sessionCreationPolicy(</tspan></text>
  <text x="66" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="122" fill="#7ec8e3" font-weight="600">SessionCreationPolicy</tspan></text>
  <text x="66" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="136" fill="#ffffff">.STATELESS))</tspan></text>
  <text x="66" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">.build();</tspan></text>
  <text x="66" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- ===== 오른쪽 코드 박스: CORS 설정 (x=452, y=68, w=378, h=362) ===== -->
  <rect x="452" y="68" width="378" height="362" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="641" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">CORS — CorsConfigurationSource</text>
  <line x1="452" y1="104" x2="830" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- CORS 코드-->
  <text x="468" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="468" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> CorsConfigurationSource</tspan></text>
  <text x="468" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#ffffff">corsConfigurationSource() {</tspan></text>
  <text x="468" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> config = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> CorsConfiguration();</tspan></text>
  <text x="468" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#ffffff">config.setAllowedOrigins(</tspan></text>
  <text x="468" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="496" fill="#ffffff">List.of(</tspan><tspan fill="#ce9178">"https://app.example.com"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="468" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#ffffff">config.setAllowedMethods(</tspan></text>
  <text x="468" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="496" fill="#ffffff">List.of(</tspan><tspan fill="#ce9178">"GET"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ce9178">"POST"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ce9178">"PUT"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ce9178">"DELETE"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="468" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#ffffff">config.setAllowedHeaders(List.of(</tspan><tspan fill="#ce9178">"*"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="468" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#ffffff">config.setAllowCredentials(</tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="468" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="468" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> source = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan></text>
  <text x="468" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="496" fill="#ffffff">UrlBasedCorsConfigurationSource();</tspan></text>
  <text x="468" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#ffffff">source.registerCorsConfiguration(</tspan><tspan fill="#ce9178">"/**"</tspan><tspan fill="#ffffff">, config);</tspan></text>
  <text x="468" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> source;</tspan></text>
  <text x="468" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
