<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Context vs 외부 상태 관리 비교</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">성능, 구조, 사용 편의성 관점 비교</text>

  <!-- Headers -->
  <rect x="60" y="94" width="360" height="44" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="121" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">Context + useReducer</text>

  <rect x="460" y="94" width="360" height="44" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="640" y="121" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8c800">Zustand / Redux</text>

  <!-- Comparison rows -->
  <!-- Row 1: 설치 -->
  <rect x="60" y="154" width="150" height="40" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="135" y="179" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">설치/의존성</text>

  <rect x="220" y="154" width="200" height="40" rx="4" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="320" y="179" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">추가 패키지 불필요</text>

  <rect x="460" y="154" width="360" height="40" rx="4" fill="#1a1a00" stroke="#e8c800" stroke-width="1"/>
  <text x="640" y="179" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">npm install 필요</text>

  <!-- Row 2: 성능 -->
  <rect x="60" y="204" width="150" height="40" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="135" y="229" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">렌더 최적화</text>

  <rect x="220" y="204" width="200" height="40" rx="4" fill="#2a1a0d" stroke="#e05555" stroke-width="1"/>
  <text x="320" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">소비자 전체 re-render</text>
  <text x="320" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">분리 Context 전략 필요</text>

  <rect x="460" y="204" width="360" height="40" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">구독 기반 — 변경된 값만 re-render</text>
  <text x="640" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">selector로 세밀한 구독 제어</text>

  <!-- Row 3: 보일러플레이트 -->
  <rect x="60" y="254" width="150" height="40" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="135" y="279" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">보일러플레이트</text>

  <rect x="220" y="254" width="200" height="40" rx="4" fill="#2a1a0d" stroke="#e05555" stroke-width="1"/>
  <text x="320" y="272" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Context, Provider, hook</text>
  <text x="320" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일 분리 필요</text>

  <rect x="460" y="254" width="360" height="40" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="279" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Zustand: 최소 (3~5줄로 스토어 생성)</text>

  <!-- Row 4: DevTools -->
  <rect x="60" y="304" width="150" height="40" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="135" y="329" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DevTools</text>

  <rect x="220" y="304" width="200" height="40" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="320" y="329" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">React DevTools 기본</text>

  <rect x="460" y="304" width="360" height="40" rx="4" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="329" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Redux DevTools: 시간 여행 디버깅</text>

  <!-- Row 5: Suited for -->
  <rect x="60" y="354" width="150" height="50" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="135" y="384" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">적합한 경우</text>

  <rect x="220" y="354" width="200" height="50" rx="4" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="320" y="373" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">소규모 앱, 테마/인증,</text>
  <text x="320" y="391" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">업데이트 빈도 낮음</text>

  <rect x="460" y="354" width="360" height="50" rx="4" fill="#1a1a00" stroke="#e8c800" stroke-width="1"/>
  <text x="640" y="373" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c800">중대규모 앱, 빈번한 업데이트,</text>
  <text x="640" y="391" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c800">복잡한 비즈니스 로직</text>

  <!-- VS divider -->
  <circle cx="440" cy="300" r="26" fill="#111111" stroke="#888" stroke-width="1"/>
  <text x="440" y="307" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#888">vs</text>
</svg>
