<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">난수 모듈 두 가지: 용도가 다르다</text>

  <!-- left: random -->
  <rect x="60" y="85" width="360" height="235" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="127" font-size="16" font-weight="600" fill="#e05555">random — 일반 난수</text>
  <text x="84" y="161" font-size="13" fill="#cccccc">· 의사난수 생성기(PRNG)</text>
  <text x="84" y="195" font-size="13" fill="#cccccc">· seed를 주면 결과 재현 가능</text>
  <text x="84" y="229" font-size="13" fill="#cccccc">· 빠르지만 예측 가능</text>
  <text x="84" y="263" font-size="13" fill="#cccccc">· 시뮬레이션·게임·샘플링용</text>
  <text x="84" y="297" font-size="13" fill="#e05555">✗ 토큰·비밀번호엔 금지</text>

  <!-- right: secrets -->
  <rect x="460" y="85" width="360" height="235" rx="10" fill="#101a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="127" font-size="16" font-weight="600" fill="#55c555">secrets — 보안용 난수</text>
  <text x="484" y="161" font-size="13" fill="#cccccc">· 암호학적 난수(CSPRNG)</text>
  <text x="484" y="195" font-size="13" fill="#cccccc">· OS 엔트로피 풀에서 추출</text>
  <text x="484" y="229" font-size="13" fill="#cccccc">· 예측·재현 불가능</text>
  <text x="484" y="263" font-size="13" fill="#cccccc">· token_hex / token_urlsafe</text>
  <text x="484" y="297" font-size="13" fill="#55c555">✔ 토큰·키·비밀번호에 사용</text>
</svg>
