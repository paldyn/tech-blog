<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">설정값 검증 & 메타데이터 생성</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">@Validated + spring-boot-configuration-processor</text>

  <!-- Left: Validation code -->
  <rect x="60" y="96" width="390" height="34" rx="6" fill="#141414" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="255" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Bean Validation 적용</text>

  <rect x="60" y="140" width="390" height="230" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888888">@ConfigurationProperties("mail")</text>
  <text x="76" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888888">@Validated</text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">public class</text>
  <text x="164" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> MailProperties {</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text>
  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888888">  @NotEmpty</text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  private</text>
  <text x="130" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> String host;</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888888">  @Min(1) @Max(65535)</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  private</text>
  <text x="130" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> int port;</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888888">  @Valid</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  private</text>
  <text x="130" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Ssl ssl;</text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  // getter/setter ...</text>

  <!-- Failure box -->
  <rect x="60" y="386" width="390" height="50" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="255" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">검증 실패 시 → 애플리케이션 시작 실패</text>
  <text x="255" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Binding/Validation failure in 'mail' 메시지 출력</text>

  <!-- Right: Metadata -->
  <rect x="470" y="96" width="370" height="34" rx="6" fill="#141414" stroke="#55c555" stroke-width="1.5"/>
  <text x="655" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Configuration Processor 설정</text>

  <rect x="470" y="140" width="370" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="486" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// build.gradle.kts</text>
  <text x="486" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">annotationProcessor(</text>
  <text x="486" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  "org.springframework</text>
  <text x="486" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  .boot:spring-boot-</text>
  <text x="486" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  configuration-processor")</text>

  <!-- IDE autocomplete mockup -->
  <rect x="470" y="256" width="370" height="180" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="655" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">IDE 자동완성 지원</text>
  <text x="490" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">spring-boot-configuration-metadata.json</text>
  <text x="490" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일이 자동 생성됩니다</text>

  <rect x="490" y="332" width="330" height="90" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="504" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9999ee">app.mail.</text>
  <rect x="504" y="358" width="280" height="22" rx="3" fill="#1e2040" stroke="#7777cc" stroke-width="1"/>
  <text x="514" y="373" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">host</text>
  <text x="610" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">String — SMTP 호스트 주소</text>
  <text x="514" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">port</text>
  <text x="610" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">int — SMTP 포트 (1~65535)</text>
  <text x="514" y="413" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">ssl.enabled</text>
  <text x="614" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">boolean</text>

  <!-- Bottom note -->
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">메타데이터는 IntelliJ IDEA / VS Code에서 application.properties 자동완성에 활용됩니다</text>
</svg>
