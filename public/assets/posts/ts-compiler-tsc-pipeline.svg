<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 컴파일러 (tsc) 파이프라인</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">.ts 소스가 .js로 변환되는 5단계 과정</text>
  <!-- Pipeline steps -->
  <!-- Step 1: Parsing -->
  <rect x="60" y="106" width="130" height="80" rx="8" fill="#1a1a2e" stroke="#4a4a8e" stroke-width="1.5"/>
  <text x="125" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">1. 파싱</text>
  <text x="125" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">소스 → AST</text>
  <text x="125" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구문 분석</text>
  <!-- Arrow 1-2 -->
  <line x1="190" y1="146" x2="218" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr3)"/>
  <!-- Step 2: Binding -->
  <rect x="220" y="106" width="130" height="80" rx="8" fill="#1a1a2e" stroke="#4a4a8e" stroke-width="1.5"/>
  <text x="285" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">2. 바인딩</text>
  <text x="285" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">심볼 테이블</text>
  <text x="285" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스코프 분석</text>
  <!-- Arrow 2-3 -->
  <line x1="350" y1="146" x2="378" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr3)"/>
  <!-- Step 3: Type Checking -->
  <rect x="380" y="106" width="130" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="445" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">3. 타입 검사</text>
  <text x="445" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">타입 오류 검출</text>
  <text x="445" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">핵심 단계!</text>
  <!-- Arrow 3-4 -->
  <line x1="510" y1="146" x2="538" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr3)"/>
  <!-- Step 4: Transform -->
  <rect x="540" y="106" width="130" height="80" rx="8" fill="#1a1a2e" stroke="#4a4a8e" stroke-width="1.5"/>
  <text x="605" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">4. 변환</text>
  <text x="605" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타입 제거</text>
  <text x="605" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ES 다운레벨</text>
  <!-- Arrow 4-5 -->
  <line x1="670" y1="146" x2="698" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr3)"/>
  <!-- Step 5: Emit -->
  <rect x="700" y="106" width="120" height="80" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="760" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">5. 출력</text>
  <text x="760" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.js 파일</text>
  <text x="760" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.d.ts 파일</text>
  <!-- Error path -->
  <text x="445" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">오류 발견 시 출력 중단 (noEmitOnError)</text>
  <!-- Command box -->
  <text x="440" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">자주 쓰는 tsc 명령어</text>
  <rect x="60" y="264" width="760" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">$</tspan><tspan fill="#ffffff"> npx tsc                   </tspan><tspan fill="#9aa4b8"># tsconfig.json 기준 전체 컴파일</tspan></text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">$</tspan><tspan fill="#ffffff"> npx tsc --watch           </tspan><tspan fill="#9aa4b8"># 파일 변경 감지 후 자동 재컴파일</tspan></text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">$</tspan><tspan fill="#ffffff"> npx tsc --noEmit          </tspan><tspan fill="#9aa4b8"># 타입 검사만 (파일 미출력)</tspan></text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">$</tspan><tspan fill="#ffffff"> npx tsc --strict src/app.ts</tspan><tspan fill="#9aa4b8"># 단일 파일 엄격 모드 컴파일</tspan></text>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">$</tspan><tspan fill="#ffffff"> npx tsc --target ES2020    </tspan><tspan fill="#9aa4b8"># 타겟 버전 지정</tspan></text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">tsc는 TypeScript 공식 컴파일러입니다. 빠른 빌드에는 SWC/esbuild 대안도 있습니다.</text>
</svg>
