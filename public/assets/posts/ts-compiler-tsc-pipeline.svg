<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">tsc 컴파일러 내부 파이프라인</text>
  <defs>
    <marker id="arr-pipe" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <!-- Pipeline stages (horizontal) -->
  <!-- Stage 1: Source -->
  <rect x="30" y="90" width="130" height="110" rx="8" fill="#0a0a1a" stroke="#3178c6" stroke-width="2"/>
  <text x="95" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#3178c6">소스 파일</text>
  <text x="95" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.ts / .tsx</text>
  <text x="95" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원시 코드</text>
  <!-- Arrow -->
  <line x1="160" y1="145" x2="195" y2="145" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-pipe)"/>
  <!-- Stage 2: Scanner/Parser -->
  <rect x="195" y="90" width="130" height="110" rx="8" fill="#1a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="260" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">스캐너</text>
  <text x="260" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">토큰화</text>
  <text x="260" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">+</text>
  <text x="260" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">파서</text>
  <text x="260" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AST 생성</text>
  <!-- Arrow -->
  <line x1="325" y1="145" x2="360" y2="145" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-pipe)"/>
  <!-- Stage 3: Binder -->
  <rect x="360" y="90" width="130" height="110" rx="8" fill="#1a1a0a" stroke="#f0db4f" stroke-width="2"/>
  <text x="425" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#f0db4f">바인더</text>
  <text x="425" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">심볼 테이블</text>
  <text x="425" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">스코프 분석</text>
  <!-- Arrow -->
  <line x1="490" y1="145" x2="525" y2="145" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-pipe)"/>
  <!-- Stage 4: Type Checker -->
  <rect x="525" y="90" width="130" height="110" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="590" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">타입 검사기</text>
  <text x="590" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 추론</text>
  <text x="590" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오류 탐지</text>
  <text x="590" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 호환성</text>
  <!-- Arrow -->
  <line x1="655" y1="145" x2="690" y2="145" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-pipe)"/>
  <!-- Stage 5: Emitter -->
  <rect x="690" y="90" width="130" height="110" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="755" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">이미터</text>
  <text x="755" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.js 출력</text>
  <text x="755" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.d.ts 생성</text>
  <text x="755" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">소스맵</text>
  <!-- CLI command box -->
  <rect x="30" y="240" width="820" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="50" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#9aa4b8">$</tspan><tspan fill="#ffffff"> npx tsc                    </tspan><tspan fill="#9aa4b8"># tsconfig.json 기준 컴파일</tspan>
    <tspan x="50" dy="20" fill="#9aa4b8">$</tspan><tspan fill="#ffffff"> npx tsc --noEmit           </tspan><tspan fill="#9aa4b8"># 타입 검사만 (출력 없음)</tspan>
  </text>
  <!-- Key facts -->
  <rect x="30" y="325" width="395" height="100" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1"/>
  <text x="228" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">tsconfig.json 핵심 옵션</text>
  <text x="50" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">target: "ES2022"    // 출력 JS 버전</text>
  <text x="50" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">strict: true        // 엄격 모드</text>
  <text x="50" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">outDir: "./dist"    // 출력 디렉토리</text>
  <rect x="455" y="325" width="395" height="100" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1"/>
  <text x="653" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">--noEmit 사용 이유</text>
  <text x="475" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">번들러(webpack, vite)가 컴파일 담당 시</text>
  <text x="475" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">tsc는 타입 검사 역할만 수행</text>
  <text x="475" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CI 파이프라인에서 자주 사용</text>
</svg>
