<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">tsc 컴파일러 파이프라인</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">TypeScript 소스에서 JavaScript 출력까지의 4단계</text>
  <!-- Stage boxes - horizontal pipeline -->
  <!-- Stage 1: Parsing -->
  <rect x="60" y="110" width="160" height="100" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">① 파싱</text>
  <text x="140" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">소스 코드를</text>
  <text x="140" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">AST로 변환</text>
  <text x="140" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(구문 분석)</text>
  <!-- Arrow 1 -->
  <line x1="222" y1="160" x2="248" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Stage 2: Symbol Resolution -->
  <rect x="250" y="110" width="160" height="100" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="330" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">② 심볼 해석</text>
  <text x="330" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">선언 바인딩,</text>
  <text x="330" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">스코프 분석</text>
  <text x="330" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(의미 분석)</text>
  <!-- Arrow 2 -->
  <line x1="412" y1="160" x2="438" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Stage 3: Type Checking -->
  <rect x="440" y="110" width="160" height="100" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="520" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">③ 타입 검사</text>
  <text x="520" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">타입 규칙 위반</text>
  <text x="520" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">검사 및 추론</text>
  <text x="520" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">(핵심 단계)</text>
  <!-- Arrow 3 -->
  <line x1="602" y1="160" x2="628" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Stage 4: Emit -->
  <rect x="630" y="110" width="160" height="100" rx="8" fill="#111" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">④ 출력</text>
  <text x="710" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">.js 파일 생성,</text>
  <text x="710" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">타입 선언(.d.ts)</text>
  <text x="710" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">(JS 변환)</text>
  <!-- Error branch from type check -->
  <line x1="520" y1="210" x2="520" y2="258" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <rect x="430" y="260" width="180" height="60" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="520" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">타입 에러 발견 시</text>
  <text x="520" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">에러 보고 (noEmitOnError)</text>
  <!-- Detail sections below -->
  <rect x="60" y="355" width="760" height="120" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">주요 컴파일러 플래그</text>
  <text x="100" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">--watch (-w)</text>
  <text x="100" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 변경 감지 후 자동 재컴파일</text>
  <text x="310" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">--noEmit</text>
  <text x="310" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타입 검사만 수행 (파일 미출력)</text>
  <text x="520" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">--strict</text>
  <text x="520" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">엄격 모드 (권장)</text>
  <text x="700" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">--declaration</text>
  <text x="700" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">.d.ts 파일 생성</text>
  <text x="100" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">npx tsc --watch | npx tsc --noEmit | npx tsc --strict</text>
</svg>
