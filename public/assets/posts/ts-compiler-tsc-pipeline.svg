<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tsc 내부 처리 흐름</text>

  <!-- Nodes -->
  <rect x="60" y="80" width="120" height="50" rx="6" fill="#0f1f2f" stroke="#3178c6" stroke-width="1.5"/>
  <text x="120" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">tsconfig</text>
  <text x="120" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파일 읽기</text>

  <line x1="180" y1="105" x2="228" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="230" y="80" width="120" height="50" rx="6" fill="#1f1a0a" stroke="#e8c840" stroke-width="1.5"/>
  <text x="290" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c840" text-anchor="middle">파싱</text>
  <text x="290" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">AST 생성</text>

  <line x1="350" y1="105" x2="398" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="400" y="80" width="120" height="50" rx="6" fill="#0f2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="460" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">바인더</text>
  <text x="460" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">심벌 테이블</text>

  <line x1="520" y1="105" x2="568" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="570" y="80" width="120" height="50" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="630" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">타입 검사</text>
  <text x="630" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">오류 감지</text>

  <line x1="690" y1="105" x2="738" y2="105" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="740" y="80" width="100" height="50" rx="6" fill="#1a1a0a" stroke="#e8c840" stroke-width="1.5"/>
  <text x="790" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c840" text-anchor="middle">방출</text>
  <text x="790" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.js 출력</text>

  <!-- Error path -->
  <path d="M 630 130 Q 630 170 460 170 Q 290 170 290 145"
        stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-r)"/>
  <text x="460" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">타입 오류 → 기본적으로 컴파일 중단</text>
  <text x="460" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(--noEmitOnError false 설정 시 오류 있어도 출력)</text>

  <!-- Output types -->
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">출력 파일 종류</text>

  <rect x="60" y="265" width="220" height="68" rx="6" fill="#1a1a0a" stroke="#e8c840" stroke-width="1"/>
  <text x="170" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c840" text-anchor="middle">.js</text>
  <text x="170" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실행 가능한 JavaScript</text>
  <text x="170" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">항상 생성 (기본)</text>

  <rect x="310" y="265" width="240" height="68" rx="6" fill="#0f1f2f" stroke="#3178c6" stroke-width="1"/>
  <text x="430" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">.d.ts</text>
  <text x="430" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">타입 선언 파일</text>
  <text x="430" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">--declaration 옵션 시 생성</text>

  <rect x="580" y="265" width="240" height="68" rx="6" fill="#0f2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">.js.map</text>
  <text x="700" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">소스맵 (디버깅용)</text>
  <text x="700" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">--sourceMap 옵션 시 생성</text>
</svg>
