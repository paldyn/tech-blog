<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Version 클래스 — 완전한 비교 구현</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">@total_ordering 활용</text>

  <!-- Code -->
  <rect x="60" y="88" width="430" height="282" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="112" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">from </text>
  <text x="116" y="112" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">functools import total_ordering</text>
  <text x="80" y="130" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="80" y="148" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">@total_ordering</text>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">class </text>
  <text x="120" y="166" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Version:</text>
  <text x="80" y="184" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="184" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__init__(self, major, minor, patch):</text>
  <text x="80" y="202" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        self.t = (major, minor, patch)</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="220" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__eq__(self, other):</text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        if not </text>
  <text x="140" y="238" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">isinstance(other, Version):</text>
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">            return </text>
  <text x="152" y="256" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">NotImplemented</text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="148" y="274" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">self.t == other.t</text>
  <text x="80" y="292" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="292" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__lt__(self, other):</text>
  <text x="80" y="310" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        if not </text>
  <text x="140" y="310" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">isinstance(other, Version):</text>
  <text x="80" y="328" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">            return </text>
  <text x="152" y="328" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">NotImplemented</text>
  <text x="80" y="346" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="148" y="346" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">self.t &lt; other.t</text>
  <text x="80" y="364" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">    # __le__, __gt__, __ge__ 자동 생성!</text>

  <!-- Right -->
  <rect x="520" y="88" width="300" height="282" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="540" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">사용 예</text>
  <rect x="540" y="120" width="260" height="130" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="556" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">v1 = Version(</text>
  <text x="640" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="648" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="656" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="664" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="672" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="680" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="556" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">v2 = Version(</text>
  <text x="640" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="648" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="656" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="664" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="672" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="680" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="556" y="176" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">v1 &lt; v2   </text>
  <text x="556" y="176" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">           # True</text>
  <text x="556" y="194" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">v2 &gt; v1   </text>
  <text x="556" y="194" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">           # True</text>
  <text x="556" y="212" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">v1 &lt;= v1  </text>
  <text x="556" y="212" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">           # True</text>
  <text x="556" y="230" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">sorted([v2, v1])</text>
  <text x="556" y="248" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># [v1, v2]</text>

  <text x="540" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">sorted/min/max 호환</text>
  <text x="540" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">비교 메서드를 구현하면</text>
  <text x="540" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">sorted(), min(), max(),</text>
  <text x="540" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">heapq 모두 사용 가능</text>
  <text x="540" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">key= 인수 없이 직접 정렬</text>
</svg>
