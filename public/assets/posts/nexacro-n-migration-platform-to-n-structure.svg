  <text x="52" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">핵심 포인트</text>
  <text x="52" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Nexacro N은 Platform 대비 렌더링 성능이 30~40% 향상되며 기존 코드의 99%를 그대로 활용할 수 있습니다.</text>
