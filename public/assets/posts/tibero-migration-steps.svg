<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Oracle → Tibero 마이그레이션 단계</text>

  <!-- Step 1 -->
  <rect x="60" y="68" width="148" height="300" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="134" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">① 현황 분석</text>
  <text x="134" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL 목록 추출</text>
  <text x="134" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PL/SQL 객체 현황</text>
  <text x="134" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터 타입 사용</text>
  <text x="134" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">힌트 사용 여부</text>
  <text x="134" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">도구: TMIG</text>
  <text x="134" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">호환성 분석</text>

  <line x1="208" y1="218" x2="228" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="232" y="68" width="148" height="300" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="306" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">② 스키마 변환</text>
  <text x="306" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DDL 변환</text>
  <text x="306" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시퀀스 재생성</text>
  <text x="306" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">동의어 처리</text>
  <text x="306" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인덱스 재정의</text>
  <text x="306" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">Oracle DDL 스크립트</text>
  <text x="306" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">→ Tibero DDL로 변환</text>

  <line x1="380" y1="218" x2="400" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="404" y="68" width="148" height="300" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="478" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">③ 데이터 이전</text>
  <text x="478" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">exp/imp 또는</text>
  <text x="478" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DB Link 방식</text>
  <text x="478" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LOB 타입 특별 주의</text>
  <text x="478" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">건수 검증 필수</text>
  <text x="478" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">tbLoader / TMIG</text>
  <text x="478" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">데이터 이전 도구</text>

  <line x1="552" y1="218" x2="572" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="576" y="68" width="244" height="300" rx="8" fill="#0a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="698" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">④ 검증 &amp; 전환</text>
  <text x="698" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL 결과 비교</text>
  <text x="698" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PL/SQL 컴파일 확인</text>
  <text x="698" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">성능 벤치마크</text>
  <text x="698" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">통합 테스트</text>
  <text x="698" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">운영 전환 (Cutover)</text>
  <text x="698" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">롤백 계획 필수</text>
  <text x="698" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Oracle 병행 운영 기간</text>
  <text x="698" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">최소 2~4주 권장</text>

  <!-- Bottom bar -->
  <rect x="60" y="386" width="760" height="0" rx="0" fill="none"/>
</svg>
