<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="ssArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">세션을 재사용해 연결 풀 공유</text>

  <rect x="60" y="100" width="220" height="80" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="170" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">세션 1개</text>
  <text x="170" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">연결 풀 유지</text>

  <rect x="620" y="60" width="200" height="48" fill="#222222" stroke="#555555" stroke-width="1" rx="6"/>
  <text x="720" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">요청 A</text>
  <rect x="620" y="118" width="200" height="48" fill="#222222" stroke="#555555" stroke-width="1" rx="6"/>
  <text x="720" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">요청 B</text>
  <rect x="620" y="176" width="200" height="48" fill="#222222" stroke="#555555" stroke-width="1" rx="6"/>
  <text x="720" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">요청 C</text>

  <path d="M 280 140 L 612 84" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ssArr)"/>
  <path d="M 280 140 L 612 142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ssArr)"/>
  <path d="M 280 140 L 612 200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ssArr)"/>

  <text x="60" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">한 세션을 재사용</text>
  <text x="60" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">요청마다 세션을 새로 만들면 연결/TLS 핸드셰이크 비용이 매번 발생</text>
