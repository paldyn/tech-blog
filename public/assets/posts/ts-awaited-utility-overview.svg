<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Awaited&lt;T&gt; — Promise 재귀 언래핑</text>

  <!-- Promise chain visualization -->
  <!-- Level 0 -->
  <rect x="60" y="72" width="210" height="50" fill="#1a1f2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="165" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" text-anchor="middle">Promise&lt;string&gt;</text>

  <line x1="272" y1="97" x2="316" y2="97" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Awaited</text>

  <rect x="318" y="72" width="140" height="50" fill="#1a3a2a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="388" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">string</text>

  <!-- Level 1 -->
  <rect x="60" y="144" width="210" height="50" fill="#1a1f2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="165" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc" text-anchor="middle">Promise&lt;Promise&lt;number&gt;&gt;</text>

  <line x1="272" y1="169" x2="316" y2="169" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Awaited</text>

  <rect x="318" y="144" width="140" height="50" fill="#1a3a2a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="388" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">number</text>

  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">재귀적으로 풀어냄</text>

  <!-- Level 2 -->
  <rect x="60" y="216" width="210" height="50" fill="#1a1f2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="165" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle">{ then(f: (v: T)=&gt;</text>
  <text x="165" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle">  void): void }</text>

  <line x1="272" y1="241" x2="316" y2="241" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Awaited</text>

  <rect x="318" y="216" width="140" height="50" fill="#1a3a2a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="388" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">T</text>

  <text x="480" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">thenable도 처리</text>

  <!-- Level 3: non-promise -->
  <rect x="60" y="288" width="210" height="50" fill="#1a1f2e" rx="6" stroke="#334155" stroke-width="1.5"/>
  <text x="165" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">string[]</text>

  <line x1="272" y1="313" x2="316" y2="313" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Awaited</text>

  <rect x="318" y="288" width="140" height="50" fill="#1a1f2e" rx="6" stroke="#334155" stroke-width="1.5"/>
  <text x="388" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">string[]</text>

  <text x="480" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">비-Promise는 그대로</text>

  <!-- Implementation -->
  <rect x="620" y="72" width="220" height="200" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="730" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현 (재귀 조건부 타입)</text>
  <text x="636" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">type Awaited&lt;T&gt; =</text>
  <text x="636" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  T extends null</text>
  <text x="636" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    | undefined</text>
  <text x="636" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  ? T</text>
  <text x="636" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  : T extends object &amp;</text>
  <text x="636" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    {then(f:infer F):any}</text>
  <text x="636" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  ? Awaited&lt;...&gt; : T;</text>
  <text x="636" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">재귀적으로 then 언래핑</text>

  <!-- History note -->
  <rect x="620" y="290" width="220" height="110" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="730" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">TypeScript 4.5에서 도입</text>
  <text x="636" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 이전: Promise&lt;T&gt;["then"]</text>
  <text x="636" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  로 수동 추출</text>
  <text x="636" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· async 함수 반환 타입</text>
  <text x="636" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  자동 처리</text>

  <!-- common pattern -->
  <rect x="60" y="360" width="530" height="52" fill="#0d1117" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="325" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">자주 쓰는 조합</text>
  <text x="80" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">Awaited&lt;ReturnType&lt;typeof asyncFn&gt;&gt;</text>
</svg>
