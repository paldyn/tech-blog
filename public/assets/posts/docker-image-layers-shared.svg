<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">레이어 공유 — 디스크 효율</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">같은 베이스는 한 번만 저장</text>

  <!-- App A layers -->
  <text x="200" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">myapp-web:v1</text>

  <rect x="80" y="120" width="240" height="44" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">COPY web/ (3MB)</text>

  <rect x="80" y="172" width="240" height="44" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">RUN npm install (120MB)</text>

  <!-- App B layers -->
  <text x="680" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">myapp-api:v1</text>

  <rect x="560" y="120" width="240" height="44" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="680" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">COPY api/ (1.5MB)</text>

  <rect x="560" y="172" width="240" height="44" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="680" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">RUN pip install (90MB)</text>

  <!-- Shared layer: node + python base? Let's use a common base -->
  <!-- Shared RUN apt layer -->
  <rect x="80" y="224" width="240" height="44" fill="#0f1a0f" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="200" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">RUN apt install curl (30MB)</text>

  <!-- Arrow lines from both to shared -->
  <line x1="200" y1="268" x2="200" y2="296" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="680" y1="216" x2="680" y2="296" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Horizontal connector -->
  <line x1="200" y1="296" x2="680" y2="296" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Down arrow to shared block -->
  <line x1="440" y1="296" x2="440" y2="318" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="440,324 434,310 446,310" fill="#55c555"/>

  <!-- Shared base layers -->
  <rect x="200" y="330" width="480" height="44" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">FROM debian:bookworm-slim  (공유 레이어)</text>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">75MB — 디스크에 한 번만 저장</text>

  <!-- Size calculation -->
  <rect x="60" y="396" width="340" height="64" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker images 표시 크기</text>
  <text x="230" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">myapp-web: 228MB</text>
  <text x="230" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">myapp-api: 196.5MB</text>

  <rect x="480" y="396" width="340" height="64" fill="#0d1117" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">실제 디스크 사용량</text>
  <text x="650" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중복 없이 약 349.5MB</text>
  <text x="650" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">docker system df -v 로 확인</text>
</svg>
