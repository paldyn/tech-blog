<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">자주 쓰이는 커스텀 훅 패턴</text>

  <!-- Hook 1: useToggle -->
  <rect x="60" y="68" width="360" height="170" rx="8" fill="#0a1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">useToggle</text>
  <rect x="76" y="102" width="328" height="122" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> useToggle(init = </tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="88" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [on, setOn] = </tspan><tspan fill="#7ec8e3" font-weight="600">useState</tspan><tspan fill="#ffffff">(init);</tspan></text>
  <text x="88" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> toggle = </tspan><tspan fill="#7ec8e3" font-weight="600">useCallback</tspan><tspan fill="#ffffff">(() =&gt; {</tspan></text>
  <text x="88" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">setOn</tspan><tspan fill="#ffffff">(v =&gt; !v);</tspan></text>
  <text x="88" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  }, []);</tspan></text>
  <text x="88" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> [on, toggle];</tspan></text>
  <text x="88" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">}</tspan></text>

  <!-- Hook 2: useWindowSize -->
  <rect x="460" y="68" width="360" height="170" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">useWindowSize</text>
  <rect x="476" y="102" width="328" height="122" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="488" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> useWindowSize() {</tspan></text>
  <text x="488" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [size, setSize] = </tspan><tspan fill="#7ec8e3" font-weight="600">useState</tspan><tspan fill="#ffffff">({</tspan></text>
  <text x="488" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    w: window.innerWidth, h: window.innerHeight</tspan></text>
  <text x="488" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  });</tspan></text>
  <text x="488" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  useEffect</tspan><tspan fill="#ffffff">(() =&gt; {</tspan></text>
  <text x="488" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> h = () =&gt; setSize({ w: window.innerWidth, h: window.innerHeight });</tspan></text>
  <text x="488" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    window.addEventListener(</tspan><tspan fill="#ce9178">'resize'</tspan><tspan fill="#ffffff">, h); </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> () =&gt; window.removeEventListener(</tspan><tspan fill="#ce9178">'resize'</tspan><tspan fill="#ffffff">, h);</tspan></text>

  <!-- Rules box -->
  <rect x="60" y="258" width="760" height="172" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">커스텀 훅 규칙 &amp; 설계 가이드</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  이름은 반드시 "use"로 시작 (React의 훅 규칙 감지)</text>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  내부에서 다른 훅(useState, useEffect...) 자유롭게 호출 가능</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  훅을 호출하는 각 컴포넌트는 독립적인 상태를 가짐</text>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">→  두 컴포넌트에서 같은 훅을 써도 state는 공유되지 않음</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">   (state를 공유하려면 Context나 외부 상태 관리가 필요)</text>
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">★  조건문/루프 안에서 훅 호출 금지 (Rules of Hooks)</text>
</svg>
