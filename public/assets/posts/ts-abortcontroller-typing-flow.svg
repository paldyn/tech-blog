<svg xmlns="http://www.w3.org/2000/svg" width="880" height="350" viewBox="0 0 880 350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="350" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">AbortController → signal → 소비처</text>
  <text x="60" y="78" font-size="13" fill="#888">controller가 signal을 만들고, abort() 한 번이 모든 구독자에게 전파된다</text>

  <defs>
    <marker id="arrAb" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect x="60" y="120" width="220" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="150" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">AbortController</text>
  <text x="170" y="184" font-size="13" fill="#ffffff" text-anchor="middle">.signal 보유</text>
  <text x="170" y="210" font-size="13" fill="#ffffff" text-anchor="middle">.abort() 호출</text>

  <rect x="340" y="120" width="200" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="150" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">AbortSignal</text>
  <text x="440" y="184" font-size="13" fill="#ffffff" text-anchor="middle">읽기 전용 핸들</text>
  <text x="440" y="210" font-size="13" fill="#9aa4b8" text-anchor="middle">.aborted / abort 이벤트</text>

  <rect x="600" y="100" width="220" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="132" font-size="13" fill="#ffffff" text-anchor="middle">fetch(url, { signal })</text>
  <text x="710" y="158" font-size="13" fill="#9aa4b8" text-anchor="middle">취소 가능한 요청</text>

  <rect x="600" y="200" width="220" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="232" font-size="13" fill="#ffffff" text-anchor="middle">addEventListener</text>
  <text x="710" y="258" font-size="13" fill="#9aa4b8" text-anchor="middle">({ signal }) 로 자동 해제</text>

  <line x1="280" y1="180" x2="338" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrAb)"/>
  <path d="M 540 165 L 598 140" stroke="#7ec8e3" stroke-width="2" fill="none" marker-end="url(#arrAb)"/>
  <path d="M 540 195 L 598 240" stroke="#7ec8e3" stroke-width="2" fill="none" marker-end="url(#arrAb)"/>

  <text x="60" y="312" font-size="13" fill="#9aa4b8">abort() 시 fetch는 AbortError로 reject, 리스너는 자동 제거된다.</text>
</svg>
