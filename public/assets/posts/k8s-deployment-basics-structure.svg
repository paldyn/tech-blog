<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Deployment 구조와 역할</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Deployment → ReplicaSet → Pod 계층 관계</text>

  <!-- Deployment box -->
  <rect x="320" y="90" width="240" height="64" rx="10" fill="#0f0f2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Deployment</text>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">선언적 업데이트 관리</text>

  <!-- Arrow down to ReplicaSet -->
  <line x1="440" y1="154" x2="440" y2="182" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ReplicaSet box -->
  <rect x="320" y="183" width="240" height="64" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">ReplicaSet</text>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파드 복제 수 보장 (replicas: 3)</text>

  <!-- Arrows to pods -->
  <line x1="380" y1="247" x2="200" y2="308" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="247" x2="440" y2="308" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="247" x2="680" y2="308" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Pod 1 -->
  <rect x="100" y="310" width="200" height="80" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Pod-1</text>
  <text x="200" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">myapp-7d8f9c-xkjw2</text>
  <text x="200" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Running</text>

  <!-- Pod 2 -->
  <rect x="340" y="310" width="200" height="80" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Pod-2</text>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">myapp-7d8f9c-mnpl3</text>
  <text x="440" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Running</text>

  <!-- Pod 3 -->
  <rect x="580" y="310" width="200" height="80" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Pod-3</text>
  <text x="680" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">myapp-7d8f9c-qrst4</text>
  <text x="680" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Running</text>

  <!-- Code block: basic deployment command -->
  <rect x="60" y="415" width="760" height="46" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="140" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> create deployment myapp --image=myapp:1.0 --replicas=3</text>
  <text x="76" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="140" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> rollout status deployment/myapp</text>
</svg>
