<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3" stroke="#2a4a5a" stroke-width="0.5"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e05555" stroke="#5a1a1a" stroke-width="0.5"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#55c555" stroke="#1a4a1a" stroke-width="0.5"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">생성자 주입과 순환 참조 감지</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">ApplicationContext 초기화 단계에서 즉시 탐지</text>

  <!-- Left: Circular reference (bad) -->
  <text x="220" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">순환 참조 — 기동 실패</text>

  <rect x="100" y="118" width="140" height="50" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">ServiceA</text>
  <text x="170" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">needs ServiceB</text>

  <rect x="100" y="240" width="140" height="50" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">ServiceB</text>
  <text x="170" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">needs ServiceA</text>

  <!-- Circular arrows -->
  <line x1="200" y1="168" x2="200" y2="230" stroke="#e05555" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="210" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">주입 요청</text>
  <line x1="140" y1="240" x2="140" y2="178" stroke="#e05555" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="70" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">주입 요청</text>

  <!-- Error box -->
  <rect x="60" y="312" width="320" height="60" rx="6" fill="#0f0606" stroke="#e05555"/>
  <text x="220" y="336" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">BeanCurrentlyInCreation</text>
  <text x="220" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">Exception</text>

  <text x="220" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">앱 시작 즉시 실패 → 운영 투입 전 발견</text>

  <!-- Divider -->
  <line x1="430" y1="100" x2="430" y2="440" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Right: Proper design (good) -->
  <text x="660" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">단방향 의존 — 정상</text>

  <rect x="550" y="118" width="140" height="50" rx="8" fill="#071207" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Controller</text>
  <text x="620" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ Service</text>

  <rect x="550" y="218" width="140" height="50" rx="8" fill="#071207" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Service</text>
  <text x="620" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ Repository</text>

  <rect x="550" y="318" width="140" height="50" rx="8" fill="#071207" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Repository</text>
  <text x="620" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ DB only</text>

  <!-- Downward arrows -->
  <line x1="620" y1="168" x2="620" y2="210" stroke="#55c555" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="620" y1="268" x2="620" y2="310" stroke="#55c555" stroke-width="2" marker-end="url(#arrowG)"/>

  <text x="660" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">레이어드 아키텍처로 순환 원천 차단</text>

  <!-- Footer -->
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · Spring 완전 정복 시리즈</text>
</svg>
