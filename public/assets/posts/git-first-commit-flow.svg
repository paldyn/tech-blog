<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">첫 번째 커밋 만들기 흐름</text>

  <!-- Step boxes -->
  <!-- Step 1: Working Directory -->
  <rect x="60" y="80" width="180" height="80" rx="8" fill="#111827" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="150" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Working Directory</text>
  <text x="150" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">파일 생성/수정</text>
  <text x="150" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">README.md 작성</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="120" x2="290" y2="120" stroke="#55c555" stroke-width="2"/>
  <polygon points="290,114 302,120 290,126" fill="#55c555"/>
  <text x="271" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">git add</text>

  <!-- Step 2: Staging Area -->
  <rect x="302" y="80" width="180" height="80" rx="8" fill="#111827" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="392" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Staging Area</text>
  <text x="392" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인덱스에 등록</text>
  <text x="392" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">커밋 대상 선별</text>

  <!-- Arrow 2 -->
  <line x1="482" y1="120" x2="532" y2="120" stroke="#55c555" stroke-width="2"/>
  <polygon points="532,114 544,120 532,126" fill="#55c555"/>
  <text x="513" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">git commit</text>

  <!-- Step 3: Repository -->
  <rect x="544" y="80" width="180" height="80" rx="8" fill="#111827" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="634" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Repository (.git)</text>
  <text x="634" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">커밋 객체 생성</text>
  <text x="634" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">히스토리에 기록</text>

  <!-- Commit Object Detail -->
  <rect x="60" y="210" width="760" height="170" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">커밋 객체 구조</text>

  <!-- Commit hash line -->
  <text x="80" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">commit a3f9d21...</text>
  <text x="80" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Author: </text>
  <text x="144" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">PALDYN &lt;dev@paldyn.com&gt;</text>
  <text x="80" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Date:   </text>
  <text x="144" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Thu May 8 12:00:00 2025 +0900</text>
  <text x="80" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">tree:   </text>
  <text x="144" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">b2c4e8f...</text>
  <text x="80" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">parent: </text>
  <text x="144" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">(없음 — 첫 커밋)</text>
  <text x="80" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    Initialize repository</text>

  <!-- Right side annotation -->
  <text x="560" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">← SHA-1 해시 (40자)</text>
  <text x="560" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">← 타임스탬프 + 타임존</text>
  <text x="560" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">← 파일 스냅샷 해시</text>
  <text x="560" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">← 부모 없음 = 루트 커밋</text>
  <text x="560" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">← 커밋 메시지</text>
</svg>
