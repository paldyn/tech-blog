<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-v" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LlamaIndex Workflow & SubQuestion</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">이벤트 기반 Workflow와 복잡 질의를 분해하는 SubQuestion 패턴</text>

  <!-- Workflow (left side) -->
  <text x="220" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Workflow (이벤트 기반)</text>

  <rect x="60" y="116" width="320" height="46" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">StartEvent</text>
  <text x="220" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자 쿼리 + 컨텍스트 입력</text>

  <line x1="220" y1="162" x2="220" y2="182" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="184" width="320" height="46" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">@step retrieve</text>
  <text x="220" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">VectorStore에서 관련 Node 검색</text>

  <line x1="220" y1="230" x2="220" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="252" width="320" height="46" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">@step synthesize</text>
  <text x="220" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">LLM으로 컨텍스트+쿼리 합성</text>

  <line x1="220" y1="298" x2="220" y2="318" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="60" y="320" width="320" height="46" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">StopEvent</text>
  <text x="220" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최종 응답 반환</text>

  <!-- Vertical separator -->
  <line x1="440" y1="90" x2="440" y2="390" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- SubQuestion (right side) -->
  <text x="660" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e0a855">SubQuestion Query Engine</text>

  <rect x="500" y="116" width="340" height="46" rx="6" fill="#2a1a0a" stroke="#e0a855" stroke-width="1.5"/>
  <text x="670" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">복잡한 원본 질의</text>
  <text x="670" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">"A와 B를 비교하고 C를 요약해줘"</text>

  <line x1="670" y1="162" x2="670" y2="182" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Subquestions -->
  <rect x="500" y="184" width="100" height="60" rx="6" fill="#1a0f0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="550" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">Sub Q1</text>
  <text x="550" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">A 정보</text>
  <text x="550" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">검색</text>

  <rect x="620" y="184" width="100" height="60" rx="6" fill="#1a0f0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="670" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">Sub Q2</text>
  <text x="670" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">B 정보</text>
  <text x="670" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">검색</text>

  <rect x="740" y="184" width="100" height="60" rx="6" fill="#1a0f0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="790" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">Sub Q3</text>
  <text x="790" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">C 요약</text>
  <text x="790" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">요청</text>

  <line x1="550" y1="244" x2="630" y2="284" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-v)"/>
  <line x1="670" y1="244" x2="670" y2="284" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-v)"/>
  <line x1="790" y1="244" x2="710" y2="284" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-v)"/>

  <!-- Combine -->
  <rect x="560" y="286" width="220" height="46" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="670" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">결과 합성 (LLM)</text>
  <text x="670" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">각 서브 답변 통합</text>

  <line x1="670" y1="332" x2="670" y2="352" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="560" y="354" width="220" height="36" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">최종 통합 답변</text>

  <!-- Bottom code hint -->
  <rect x="60" y="400" width="760" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Workflow: </text>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">           @step</text>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                 데코레이터로 단계 정의, </text>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                                         Event</text>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                               로 연결</text>
  <text x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># SubQuestion: </text>
  <text x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">               SubQuestionQueryEngine(query_engine_tools=[...])</text>
</svg>
