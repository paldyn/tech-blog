<svg xmlns="http://www.w3.org/2000/svg" width="880" height="454" viewBox="0 0 880 454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="454" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">실무에서 바로 쓰는 5가지 팁</text>

  <rect x="60" y="88" width="760" height="56" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="110" font-size="14" font-weight="600" fill="#7ec8e3">satisfies 우선</text>
  <text x="84" y="130" font-size="13" fill="#9aa4b8">타입 검증은 받되 좁은 추론 결과는 그대로 유지한다</text>

  <rect x="60" y="158" width="760" height="56" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="180" font-size="14" font-weight="600" fill="#7ec8e3">as 는 최후의 수단</text>
  <text x="84" y="200" font-size="13" fill="#9aa4b8">단언 전에 타입 가드로 좁히기를 먼저 시도한다</text>

  <rect x="60" y="228" width="760" height="56" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="250" font-size="14" font-weight="600" fill="#7ec8e3">any 대신 unknown</text>
  <text x="84" y="270" font-size="13" fill="#9aa4b8">검사를 끄지 말고, 쓰기 전에 좁히도록 강제한다</text>

  <rect x="60" y="298" width="760" height="56" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="320" font-size="14" font-weight="600" fill="#7ec8e3">const 단언으로 고정</text>
  <text x="84" y="340" font-size="13" fill="#9aa4b8">리터럴 타입을 넓히지 않고 그대로 보존한다</text>

  <rect x="60" y="368" width="760" height="56" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="390" font-size="14" font-weight="600" fill="#7ec8e3">유틸리티 타입 활용</text>
  <text x="84" y="410" font-size="13" fill="#9aa4b8">Pick·Omit·Partial 로 중복 타입 정의를 제거한다</text>
</svg>
