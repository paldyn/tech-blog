<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Radio / CheckBox — 선택 컴포넌트 비교</text>

  <!-- Left: Radio -->
  <rect x="50" y="66" width="370" height="396" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="235" y="94" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#7ec8e3">Radio (단일 선택)</text>

  <!-- Radio mock UI -->
  <rect x="70" y="106" width="330" height="90" rx="6" fill="#101828"/>
  <text x="84" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">성별 선택</text>
  <!-- Male radio: selected -->
  <circle cx="90" cy="148" r="8" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="90" cy="148" r="4" fill="#7ec8e3"/>
  <text x="104" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">남성</text>
  <!-- Female radio: unselected -->
  <circle cx="190" cy="148" r="8" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="204" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">여성</text>
  <text x="84" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">value = "M"</text>

  <!-- Radio properties -->
  <rect x="70" y="208" width="330" height="224" rx="6" fill="#0d1828"/>
  <text x="84" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">속성</text>
  <text x="180" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">설명</text>
  <rect x="74" y="234" width="322" height="1" fill="#1e2a40"/>

  <text x="84" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">value</text>
  <text x="180" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">선택 시 반환 값</text>

  <text x="84" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">group</text>
  <text x="180" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">같은 그룹에서 단일 선택</text>

  <text x="84" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">groupid</text>
  <text x="180" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">그룹 식별자 문자열</text>

  <text x="84" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#55c555">onchanged</text>
  <text x="180" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">선택 변경 시 발생</text>

  <text x="84" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">text</text>
  <text x="180" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">표시 라벨 텍스트</text>

  <rect x="70" y="350" width="330" height="62" rx="4" fill="#0a1a0a" stroke="#1e5020"/>
  <text x="84" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">읽기: radGender.value</text>
  <text x="84" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">그룹 내 하나만 선택 가능</text>
  <text x="84" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">checked 속성 대신 value 사용</text>

  <!-- Right: CheckBox -->
  <rect x="460" y="66" width="370" height="396" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="645" y="94" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#55c555">CheckBox (다중 선택)</text>

  <!-- CheckBox mock UI -->
  <rect x="480" y="106" width="330" height="90" rx="6" fill="#101828"/>
  <text x="494" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">관심 분야 선택 (복수 가능)</text>
  <!-- chkA: checked -->
  <rect x="490" y="138" width="14" height="14" rx="2" fill="#55c555"/>
  <text x="494" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#0a0a0a" font-weight="700">✓</text>
  <text x="510" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">개발</text>
  <!-- chkB: unchecked -->
  <rect x="570" y="138" width="14" height="14" rx="2" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="590" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">디자인</text>
  <!-- chkC: checked -->
  <rect x="668" y="138" width="14" height="14" rx="2" fill="#55c555"/>
  <text x="672" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#0a0a0a" font-weight="700">✓</text>
  <text x="688" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">기획</text>
  <text x="494" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">value = 1 (선택됨) / 0 (미선택)</text>

  <!-- CheckBox properties -->
  <rect x="480" y="208" width="330" height="224" rx="6" fill="#0d1828"/>
  <text x="494" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">속성</text>
  <text x="590" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">설명</text>
  <rect x="484" y="234" width="322" height="1" fill="#1e2a40"/>

  <text x="494" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">value</text>
  <text x="590" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">1 (선택) / 0 (미선택)</text>

  <text x="494" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">checkedvalue</text>
  <text x="590" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">선택 시 저장 값 커스텀</text>

  <text x="494" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">uncheckedvalue</text>
  <text x="590" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">미선택 시 저장 값</text>

  <text x="494" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#55c555">onchanged</text>
  <text x="590" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">체크 상태 변경 시 발생</text>

  <text x="494" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">text</text>
  <text x="590" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">표시 라벨 텍스트</text>

  <rect x="480" y="350" width="330" height="62" rx="4" fill="#0a1a0a" stroke="#1e5020"/>
  <text x="494" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">읽기: chkDev.value == 1</text>
  <text x="494" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">독립적 다중 선택 가능</text>
  <text x="494" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">그룹 없이 각각 독립 동작</text>

  <!-- Footer -->
</svg>
