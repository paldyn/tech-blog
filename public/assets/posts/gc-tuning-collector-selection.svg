<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrI" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrA" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">수집기 선택 결정 흐름 — 목표가 곧 답이다</text>

  <!-- Root decision -->
  <rect x="320" y="78" width="240" height="60" rx="8" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">무엇을 최우선으로?</text>
  <text x="440" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">throughput · latency · footprint</text>

  <!-- Branch arrows from root -->
  <path d="M 360 138 L 150 188" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arrG)"/>
  <path d="M 408 138 L 360 188" stroke="#7ec8e3" stroke-width="2" fill="none" marker-end="url(#arrI)"/>
  <path d="M 472 138 L 520 188" stroke="#7777cc" stroke-width="2" fill="none" marker-end="url(#arrA)"/>
  <path d="M 520 138 L 730 188" stroke="#7777cc" stroke-width="2" fill="none" marker-end="url(#arrA)"/>

  <!-- Branch condition labels -->
  <text x="200" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">처리량 우선</text>
  <text x="318" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">지연 우선·큰 힙</text>
  <text x="566" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">균형·기본</text>
  <text x="690" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">작은 힙·단일코어</text>

  <!-- Condition boxes (second row) -->
  <rect x="60" y="188" width="200" height="64" rx="8" fill="#101010" stroke="#55c555" stroke-width="1.2"/>
  <text x="160" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">배치·대용량 처리</text>
  <text x="160" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">멈춤 길어도 무방</text>

  <rect x="300" y="188" width="200" height="64" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="400" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">밀리초 단위 응답</text>
  <text x="400" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">수십 GB~TB 힙</text>

  <rect x="540" y="188" width="160" height="64" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1.2"/>
  <text x="620" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">일반 웹 서비스</text>
  <text x="620" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">멈춤·처리량 절충</text>

  <rect x="730" y="188" width="120" height="64" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1.2"/>
  <text x="790" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">컨테이너·CLI</text>
  <text x="790" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">~수백 MB 힙</text>

  <!-- Arrows down to collector boxes -->
  <line x1="160" y1="252" x2="160" y2="312" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="400" y1="252" x2="400" y2="312" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrI)"/>
  <line x1="620" y1="252" x2="620" y2="312" stroke="#7777cc" stroke-width="2" marker-end="url(#arrA)"/>
  <line x1="790" y1="252" x2="790" y2="312" stroke="#7777cc" stroke-width="2" marker-end="url(#arrA)"/>

  <!-- Collector result boxes -->
  <rect x="60" y="314" width="200" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Parallel GC</text>
  <text x="160" y="366" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">+UseParallelGC</text>

  <rect x="300" y="314" width="200" height="70" rx="8" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="400" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">ZGC</text>
  <text x="400" y="366" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">+UseZGC (대안: Shenandoah)</text>

  <rect x="540" y="314" width="160" height="70" rx="8" fill="#12122a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="620" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#9a9ae0">G1 GC</text>
  <text x="620" y="366" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">+UseG1GC (JDK 9+ 기본)</text>

  <rect x="730" y="314" width="120" height="70" rx="8" fill="#12122a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="790" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#9a9ae0">Serial GC</text>
  <text x="790" y="366" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">+UseSerialGC</text>

  <!-- Bottom note box -->
  <rect x="60" y="426" width="790" height="84" rx="8" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1.2"/>
  <text x="80" y="454"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">선택의 원칙</text>
  <text x="80" y="478"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 확신이 없으면 기본값 G1으로 시작 — 대부분의 서버 워크로드에서 합리적 절충점을 제공</text>
  <text x="80" y="498"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 측정 없이 ZGC/Shenandoah로 바꾸지 말 것 — 동시 수집은 CPU·footprint를 더 쓴다 (공짜 점심 없음)</text>
</svg>
