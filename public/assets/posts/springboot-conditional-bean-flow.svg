<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@Conditional — Bean 등록 조건 평가 흐름</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Spring Boot Auto-configuration 핵심 메커니즘</text>

  <!-- Step 1: ApplicationContext starts -->
  <rect x="300" y="100" width="280" height="52" rx="8" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">ApplicationContext 시작</text>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AutoConfiguration.imports 로드</text>

  <!-- Arrow -->
  <line x1="440" y1="152" x2="440" y2="178" stroke="#444" stroke-width="2"/>
  <polygon points="440,186 433,174 447,174" fill="#444"/>

  <!-- Step 2: Condition check -->
  <rect x="270" y="186" width="340" height="52" rx="8" fill="#1a1f2e" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="440" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Condition 인터페이스 matches() 호출</text>
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ConditionContext · AnnotatedTypeMetadata 참조</text>

  <!-- Arrow with YES/NO -->
  <line x1="440" y1="238" x2="440" y2="264" stroke="#444" stroke-width="2"/>
  <polygon points="440,272 433,260 447,260" fill="#444"/>

  <!-- Diamond decision -->
  <polygon points="440,272 540,310 440,348 340,310" fill="#1a1418" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="440" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">matches()?</text>

  <!-- YES path (right) -->
  <line x1="540" y1="310" x2="640" y2="310" stroke="#55c555" stroke-width="2"/>
  <polygon points="648,310 636,304 636,316" fill="#55c555"/>
  <text x="588" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">true</text>
  <rect x="648" y="285" width="172" height="50" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="734" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Bean 등록</text>
  <text x="734" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IoC 컨테이너에 추가</text>

  <!-- NO path (left) -->
  <line x1="340" y1="310" x2="240" y2="310" stroke="#e05555" stroke-width="2"/>
  <polygon points="232,310 244,304 244,316" fill="#e05555"/>
  <text x="290" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">false</text>
  <rect x="60" y="285" width="172" height="50" rx="8" fill="#2a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="146" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">Bean 건너뜀</text>
  <text x="146" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨테이너에 미등록</text>

  <!-- Bottom: Condition types -->
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">주요 @Conditional 변형</text>

  <rect x="60" y="406" width="168" height="60" rx="6" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="144" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">@ConditionalOnClass</text>
  <text x="144" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클래스패스에 클래스 존재</text>

  <rect x="248" y="406" width="172" height="60" rx="6" fill="#1a1f2e" stroke="#55c555" stroke-width="1"/>
  <text x="334" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">@ConditionalOnMissingBean</text>
  <text x="334" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Bean이 아직 없을 때</text>

  <rect x="440" y="406" width="172" height="60" rx="6" fill="#1a1f2e" stroke="#ce9178" stroke-width="1"/>
  <text x="526" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">@ConditionalOnProperty</text>
  <text x="526" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로퍼티 값 조건</text>

  <rect x="632" y="406" width="188" height="60" rx="6" fill="#1a1f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="726" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">@ConditionalOnWebApplication</text>
  <text x="726" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">웹 컨텍스트 여부</text>
</svg>
