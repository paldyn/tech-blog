<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-fk" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-fk2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-fk3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
    <marker id="arr-fk4" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Fork & Clone 전체 워크플로우</text>

  <!-- Step labels on left -->
  <text x="36" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">①</text>
  <text x="36" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">②</text>
  <text x="36" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">③</text>
  <text x="36" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">④</text>
  <text x="36" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">⑤</text>

  <!-- Step 1: Fork on GitHub -->
  <rect x="60" y="86" width="200" height="50" rx="8" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">원본 저장소</text>
  <text x="160" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">github.com/original/repo</text>

  <!-- Fork arrow →  -->
  <line x1="260" y1="111" x2="364" y2="111" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-fk)"/>
  <text x="311" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">Fork</text>

  <rect x="365" y="86" width="200" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="465" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">내 포크 (origin)</text>
  <text x="465" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">github.com/myname/repo</text>

  <!-- Step 2: Clone to local -->
  <line x1="465" y1="136" x2="465" y2="176" stroke="#55c555" stroke-width="2" marker-end="url(#arr-fk2)"/>
  <text x="490" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Clone</text>

  <rect x="335" y="178" width="260" height="50" rx="8" fill="#0e1420" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="465" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">로컬 저장소</text>
  <text x="465" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">origin + upstream 설정</text>

  <!-- Step 3: upstream 추가 -->
  <line x1="160" y1="136" x2="160" y2="196" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-fk)"/>
  <line x1="160" y1="196" x2="335" y2="210" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-fk)"/>
  <text x="116" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">remote add</text>
  <text x="116" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">upstream</text>

  <!-- Step 4: 브랜치 작업 + push -->
  <line x1="465" y1="228" x2="465" y2="274" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-fk3)"/>
  <text x="490" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">feature 브랜치 작업</text>

  <rect x="335" y="276" width="260" height="50" rx="8" fill="#1a1a0e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="465" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">feature/fix-bug 브랜치</text>
  <text x="465" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커밋 → git push origin feature/fix-bug</text>

  <!-- Step 5: PR -->
  <line x1="465" y1="326" x2="465" y2="374" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-fk4)"/>
  <text x="490" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Pull Request 생성</text>

  <rect x="335" y="376" width="260" height="50" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="465" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Pull Request</text>
  <text x="465" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">myname/repo → original/repo</text>

  <!-- Step 5: Merge -->
  <line x1="335" y1="401" x2="261" y2="390" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-fk2)"/>
  <line x1="260" y1="390" x2="260" y2="136" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-fk2)"/>
  <text x="222" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">머지되면</text>
  <text x="222" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">upstream</text>
  <text x="222" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">에 반영</text>

  <!-- Bottom numbers guide -->
  <rect x="60" y="444" width="760" height="40" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="469" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">① Fork  ② Clone  ③ upstream 연결  ④ 작업 + push  ⑤ PR 생성 → 머지</text>
</svg>
