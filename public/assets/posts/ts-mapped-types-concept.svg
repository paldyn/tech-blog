<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">Mapped Types — 기존 타입을 순회해 새 타입 생성</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle" xml:space="preserve">{ [K in keyof T]: ... } 패턴</text>

  <!-- Left: Original Type -->
  <rect x="60" y="100" width="340" height="100" rx="8" fill="#111827" stroke="#2d3748" stroke-width="1.5"/>
  <text x="230" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">원본 타입 T</text>
  <text x="80" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">type User = {</text>
  <text x="80" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  name: string;</text>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  age: number; }</text>

  <!-- Arrow -->
  <line x1="400" y1="150" x2="450" y2="150" stroke="#7777cc" stroke-width="2"/>
  <polygon points="450,143 465,150 450,157" fill="#7777cc"/>
  <text x="432" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">매핑</text>

  <!-- Right: Mapped Type -->
  <rect x="480" y="100" width="340" height="100" rx="8" fill="#111827" stroke="#2d3748" stroke-width="1.5"/>
  <text x="650" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">매핑 결과</text>
  <text x="500" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">type Readonly&lt;User&gt; = {</text>
  <text x="500" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  readonly name: string;</text>
  <text x="500" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  readonly age: number; }</text>

  <!-- Code block: Mapped type syntax -->
  <rect x="60" y="226" width="760" height="128" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">// 제네릭 매핑 — 모든 속성을 선택적으로</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">type Partial&lt;T&gt; = { [K in keyof T]?: T[K] };</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">// 모든 속성을 읽기 전용으로</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">type Readonly&lt;T&gt; = { readonly [K in keyof T]: T[K] };</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">// 값 타입을 string으로 재매핑</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">type Stringify&lt;T&gt; = { [K in keyof T]: string };</text>

  <!-- Bottom labels -->
  <rect x="60" y="378" width="220" height="70" rx="8" fill="#0f1a0f" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="170" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">keyof T</text>
  <text x="170" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">모든 키의 유니언 타입</text>
  <text x="170" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">"name" | "age"</text>

  <rect x="330" y="378" width="220" height="70" rx="8" fill="#0d0f1a" stroke="#1a1e3a" stroke-width="1.5"/>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle" xml:space="preserve">K in keyof T</text>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">각 키를 K로 순회</text>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">for...in과 유사한 개념</text>

  <rect x="600" y="378" width="220" height="70" rx="8" fill="#1a0f0a" stroke="#3a1e0f" stroke-width="1.5"/>
  <text x="710" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">T[K]</text>
  <text x="710" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">인덱스 접근 타입</text>
  <text x="710" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">원래 속성 값 타입 유지</text>
</svg>
