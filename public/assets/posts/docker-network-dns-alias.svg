<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">DNS 별칭과 커스텀 DNS 설정</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">--network-alias, --dns, --add-host 옵션 활용</text>

  <!-- Left: alias -->
  <rect x="60" y="88" width="360" height="240" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="80" y="114" fill="#888" font-size="12" xml:space="preserve"># 네트워크 별칭 추가 (같은 이름,</text>
  <text x="80" y="132" fill="#888" font-size="12" xml:space="preserve"># 여러 컨테이너 → 로드밸런싱)</text>
  <text x="80" y="150" fill="#7ec8e3" font-size="12" xml:space="preserve">docker run -d \</text>
  <text x="80" y="168" fill="#7ec8e3" font-size="12" xml:space="preserve">  --network my-net \</text>
  <text x="80" y="186" fill="#7ec8e3" font-size="12" xml:space="preserve">  --network-alias db \</text>
  <text x="80" y="204" fill="#7ec8e3" font-size="12" xml:space="preserve">  --name db-primary postgres</text>
  <line x1="80" y1="220" x2="400" y2="220" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="240" fill="#888" font-size="12" xml:space="preserve"># 두 번째 컨테이너도 같은 alias</text>
  <text x="80" y="258" fill="#7ec8e3" font-size="12" xml:space="preserve">docker run -d \</text>
  <text x="80" y="276" fill="#7ec8e3" font-size="12" xml:space="preserve">  --network my-net \</text>
  <text x="80" y="294" fill="#7ec8e3" font-size="12" xml:space="preserve">  --network-alias db \</text>
  <text x="80" y="312" fill="#7ec8e3" font-size="12" xml:space="preserve">  --name db-replica postgres</text>

  <!-- Right: custom dns -->
  <rect x="460" y="88" width="360" height="240" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="480" y="114" fill="#888" font-size="12" xml:space="preserve"># 커스텀 DNS 서버 지정</text>
  <text x="480" y="132" fill="#7ec8e3" font-size="12" xml:space="preserve">docker run --dns 8.8.8.8 \</text>
  <text x="480" y="150" fill="#7ec8e3" font-size="12" xml:space="preserve">  --dns 1.1.1.1 myapp</text>
  <line x1="480" y1="166" x2="800" y2="166" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="186" fill="#888" font-size="12" xml:space="preserve"># /etc/hosts 직접 추가</text>
  <text x="480" y="204" fill="#7ec8e3" font-size="12" xml:space="preserve">docker run \</text>
  <text x="480" y="222" fill="#7ec8e3" font-size="12" xml:space="preserve">  --add-host db.local:10.0.0.5 \</text>
  <text x="480" y="240" fill="#7ec8e3" font-size="12" xml:space="preserve">  myapp</text>
  <line x1="480" y1="256" x2="800" y2="256" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="276" fill="#888" font-size="12" xml:space="preserve"># DNS 검색 도메인 추가</text>
  <text x="480" y="294" fill="#7ec8e3" font-size="12" xml:space="preserve">docker run \</text>
  <text x="480" y="312" fill="#7ec8e3" font-size="12" xml:space="preserve">  --dns-search company.internal \</text>
  <text x="480" y="316" fill="#888" font-size="11" xml:space="preserve">  myapp</text>
</svg>
