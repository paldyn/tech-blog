<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">다중 헤더 XFD 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">HeadLine·HeadCell colspan·rowspan 설정</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="274" fill="#070b14" rx="6" stroke="#1e2433"/>

  <!-- Comment -->
  <text x="80" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Head 영역에 2개의 HeadLine 선언</text>

  <!-- HeadLine 0 -->
  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;</tspan><tspan fill="#7ec8e3">HeadLine</tspan><tspan fill="#e8e8e8"> height=</tspan><tspan fill="#b5cea8">"40"</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- HeadCell: 기본정보 colspan=2 -->
  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">HeadCell</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#b5cea8">"0"</tspan><tspan fill="#e8e8e8"> colspan=</tspan><tspan fill="#b5cea8">"2"</tspan><tspan fill="#e8e8e8"> text=</tspan><tspan fill="#ce9178">"기본정보"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <!-- HeadCell: 인사정보 colspan=3 -->
  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">HeadCell</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#b5cea8">"2"</tspan><tspan fill="#e8e8e8"> colspan=</tspan><tspan fill="#b5cea8">"3"</tspan><tspan fill="#e8e8e8"> text=</tspan><tspan fill="#ce9178">"인사정보"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <!-- HeadCell: 급여 rowspan=2 -->
  <text x="80" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">HeadCell</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#b5cea8">"5"</tspan><tspan fill="#e8e8e8"> rowspan=</tspan><tspan fill="#b5cea8">"2"</tspan><tspan fill="#e8e8e8"> text=</tspan><tspan fill="#ce9178">"급여"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <!-- /HeadLine -->
  <text x="80" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;/</tspan><tspan fill="#7ec8e3">HeadLine</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- HeadLine 1 -->
  <text x="80" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;</tspan><tspan fill="#7ec8e3">HeadLine</tspan><tspan fill="#e8e8e8"> height=</tspan><tspan fill="#b5cea8">"38"</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- HeadCell col 0,1,2,3,4 -->
  <text x="80" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">HeadCell</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#b5cea8">"0"</tspan><tspan fill="#e8e8e8"> text=</tspan><tspan fill="#ce9178">"사번"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <text x="80" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // 나머지 컬럼: col="1"~col="4"</text>

  <!-- /HeadLine -->
  <text x="80" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;/</tspan><tspan fill="#7ec8e3">HeadLine</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">HeadLine을 중첩 선언하고 각 HeadCell의 col·colspan·rowspan으로 병합 위치를 지정</text>
</svg>
