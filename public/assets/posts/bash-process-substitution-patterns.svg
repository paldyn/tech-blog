<svg width="880" height="360" viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">프로세스 치환 실전 패턴</text>

  <!-- Pattern 1 -->
  <rect x="60" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">카운터 보존 while 루프</text>
  <rect x="60" y="106" width="370" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">count=</tspan><tspan fill="#b5cea8">0</tspan></text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> IFS= </tspan><tspan fill="#7ec8e3" font-weight="600">read</tspan><tspan fill="#ffffff"> -r line; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    (( count++ ))</tspan></text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan><tspan fill="#ffffff"> &lt;(grep </tspan><tspan fill="#ce9178">"ERROR"</tspan><tspan fill="#ffffff"> app.log)</tspan></text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"에러 수: $count"</tspan><tspan fill="#9aa4b8"> # 보임</tspan></text>

  <!-- Pattern 2 -->
  <rect x="450" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">파일 없이 diff</text>
  <rect x="450" y="106" width="370" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 두 명령 출력 비교</text>
  <text x="466" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">diff</tspan><tspan fill="#ffffff"> &lt;(ls /dir1 | sort) \</tspan></text>
  <text x="466" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">     &lt;(ls /dir2 | sort)</tspan></text>
  <text x="466" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="466" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#9aa4b8"># 원격 vs 로컬 파일 비교</tspan></text>
  <text x="466" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">diff</tspan><tspan fill="#ffffff"> &lt;(ssh host </tspan><tspan fill="#ce9178">"cat /etc/f"</tspan><tspan fill="#ffffff">) /etc/f</tspan></text>

  <!-- Pattern 3: tee multiple -->
  <rect x="60" y="236" width="760" height="96" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="260" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">tee + &gt;() 다중 출력</text>
  <rect x="76" y="270" width="728" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="290" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 동시에 압축 저장 + 줄 수 카운트 + 화면 출력</text>
  <text x="92" y="308" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">generate_data</tspan><tspan fill="#ffffff"> | </tspan><tspan fill="#7ec8e3" font-weight="600">tee</tspan><tspan fill="#ffffff"> &gt;(gzip &gt; out.gz) &gt;(wc -l &gt; count.txt)</tspan></text>
</svg>
