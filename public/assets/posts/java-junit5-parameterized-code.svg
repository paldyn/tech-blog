<svg xmlns="http://www.w3.org/2000/svg" width="880" height="384" viewBox="0 0 880 384">
  <rect width="880" height="384" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">소스 종류별 작성법</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">@ValueSource · @CsvSource</text>

  <rect x="60" y="90" width="760" height="278" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="78" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  >// 단일 값 목록</text>
  <text x="78" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#b5cea8">@ParameterizedTest</tspan></text>
  <text x="78" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#b5cea8">@ValueSource</tspan>(ints = {<tspan fill="#b5cea8">2</tspan>, <tspan fill="#b5cea8">4</tspan>, <tspan fill="#b5cea8">6</tspan>, <tspan fill="#b5cea8">8</tspan>})</text>
  <text x="78" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">void</tspan> isEven(<tspan fill="#7ec8e3" font-weight="600">int</tspan> n) {</text>
  <text x="78" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    assertTrue(n % <tspan fill="#b5cea8">2</tspan> == <tspan fill="#b5cea8">0</tspan>);</text>
  <text x="78" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
  <text x="78" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  >// 여러 인자를 한 행씩 (입력 → 기대값)</text>
  <text x="78" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#b5cea8">@ParameterizedTest</tspan></text>
  <text x="78" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#b5cea8">@CsvSource</tspan>({<tspan fill="#ce9178">"2,3,5"</tspan>, <tspan fill="#ce9178">"10,20,30"</tspan>})</text>
  <text x="78" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">void</tspan> add(<tspan fill="#7ec8e3" font-weight="600">int</tspan> a, <tspan fill="#7ec8e3" font-weight="600">int</tspan> b, <tspan fill="#7ec8e3" font-weight="600">int</tspan> sum) {</text>
  <text x="78" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    assertEquals(sum, calc.add(a, b));</text>
  <text x="78" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
</svg>
