<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Docker 아키텍처 전체 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">클라이언트 ↔ Docker Host ↔ Registry</text>

  <!-- Client box -->
  <rect x="40" y="96" width="200" height="280" fill="#0d1020" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="140" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Docker Client</text>

  <rect x="58" y="132" width="164" height="36" fill="#111827" stroke="#2a3a4a" rx="6"/>
  <text x="140" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">docker build</text>

  <rect x="58" y="176" width="164" height="36" fill="#111827" stroke="#2a3a4a" rx="6"/>
  <text x="140" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">docker run</text>

  <rect x="58" y="220" width="164" height="36" fill="#111827" stroke="#2a3a4a" rx="6"/>
  <text x="140" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">docker pull</text>

  <rect x="58" y="264" width="164" height="36" fill="#111827" stroke="#2a3a4a" rx="6"/>
  <text x="140" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">docker push</text>

  <text x="140" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">REST API</text>
  <text x="140" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">unix:///var/run/docker.sock</text>

  <!-- Arrow Client → Daemon -->
  <line x1="248" y1="236" x2="296" y2="236" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="300,236 289,230 289,242" fill="#7ec8e3"/>
  <text x="272" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">REST</text>

  <!-- Docker Host box -->
  <rect x="300" y="90" width="340" height="340" fill="#0c0f0c" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="470" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Docker Host (dockerd)</text>

  <!-- dockerd internals -->
  <rect x="320" y="130" width="300" height="56" fill="#0f1f0f" stroke="#336633" rx="7"/>
  <text x="470" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Docker Daemon (dockerd)</text>
  <text x="470" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">API 요청 처리 / 오케스트레이션</text>

  <!-- Arrow dockerd → containerd -->
  <line x1="470" y1="192" x2="470" y2="216" stroke="#444" stroke-width="1.5"/>
  <polygon points="470,220 464,210 476,210" fill="#444"/>

  <rect x="320" y="220" width="300" height="50" fill="#0f150a" stroke="#2a3a1a" rx="7"/>
  <text x="470" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#88bb66">containerd</text>
  <text x="470" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨테이너 라이프사이클 관리</text>

  <!-- Arrow containerd → runc -->
  <line x1="470" y1="274" x2="470" y2="298" stroke="#444" stroke-width="1.5"/>
  <polygon points="470,302 464,292 476,292" fill="#444"/>

  <rect x="320" y="302" width="300" height="50" fill="#120f08" stroke="#3a2a08" rx="7"/>
  <text x="470" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a030">runc (OCI 런타임)</text>
  <text x="470" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실제 컨테이너 프로세스 생성</text>

  <!-- Images / Containers labels -->
  <text x="340" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">Containers: C1, C2, C3 ...</text>
  <text x="340" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">Images: ubuntu, nginx, myapp ...</text>

  <!-- Arrow Daemon → Registry -->
  <line x1="648" y1="236" x2="696" y2="236" stroke="#e0a030" stroke-width="2"/>
  <polygon points="700,236 689,230 689,242" fill="#e0a030"/>
  <text x="672" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0a030">HTTPS</text>

  <!-- Registry box -->
  <rect x="700" y="96" width="160" height="280" fill="#1a1408" stroke="#e0a030" stroke-width="1.5" rx="10"/>
  <text x="780" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a030">Registry</text>

  <rect x="716" y="136" width="128" height="36" fill="#241c08" stroke="#4a3a08" rx="6"/>
  <text x="780" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Docker Hub</text>

  <rect x="716" y="180" width="128" height="36" fill="#241c08" stroke="#4a3a08" rx="6"/>
  <text x="780" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ECR / GCR</text>

  <rect x="716" y="224" width="128" height="36" fill="#241c08" stroke="#4a3a08" rx="6"/>
  <text x="780" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">GHCR</text>

  <rect x="716" y="268" width="128" height="36" fill="#241c08" stroke="#4a3a08" rx="6"/>
  <text x="780" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Private Registry</text>

  <!-- Bottom note -->
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">Docker CLI는 REST API로 dockerd에 명령을 전달하고, dockerd는 containerd를 통해 실제 컨테이너를 실행합니다</text>
  <text x="440" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">이미지는 Registry에서 pull해 Docker Host의 로컬 스토리지에 저장됩니다</text>
</svg>
