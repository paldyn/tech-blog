<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">클러스터드 인덱스 vs 세컨더리 인덱스 구조</text>

  <!-- Left: Clustered index tree -->
  <text x="200" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">클러스터드 인덱스 (PRIMARY KEY)</text>

  <!-- Root node -->
  <rect x="130" y="100" width="140" height="40" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">Root: 1 | 50 | 100</text>

  <!-- Branch nodes -->
  <rect x="60" y="180" width="120" height="40" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">1 | 25</text>

  <rect x="240" y="180" width="120" height="40" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="300" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">50 | 75</text>

  <!-- Lines root → branch -->
  <line x1="180" y1="140" x2="130" y2="180" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="220" y1="140" x2="270" y2="180" stroke="#7ec8e3" stroke-width="1"/>

  <!-- Leaf nodes (with actual row data) -->
  <rect x="40" y="260" width="150" height="56" rx="6" fill="#0a1528" stroke="#55c555" stroke-width="1.5"/>
  <text x="115" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">Leaf (행 전체 포함)</text>
  <text x="115" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">id=1, name='A', val=10</text>
  <text x="115" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">id=5, name='B', val=20</text>

  <rect x="220" y="260" width="150" height="56" rx="6" fill="#0a1528" stroke="#55c555" stroke-width="1.5"/>
  <text x="295" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">Leaf (행 전체 포함)</text>
  <text x="295" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">id=26, name='C', val=30</text>
  <text x="295" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">id=40, name='D', val=40</text>

  <line x1="110" y1="220" x2="100" y2="260" stroke="#55c555" stroke-width="1"/>
  <line x1="130" y1="220" x2="200" y2="260" stroke="#55c555" stroke-width="1"/>
  <line x1="270" y1="220" x2="250" y2="260" stroke="#55c555" stroke-width="1"/>
  <line x1="290" y1="220" x2="310" y2="260" stroke="#55c555" stroke-width="1"/>

  <!-- Right: Secondary index tree -->
  <text x="660" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178">세컨더리 인덱스 (name 칼럼)</text>

  <!-- Root node -->
  <rect x="590" y="100" width="140" height="40" rx="6" fill="#2e1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="660" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">Root: C | F | K</text>

  <!-- Branch -->
  <rect x="520" y="180" width="140" height="40" rx="6" fill="#2e1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="590" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">A | B</text>

  <rect x="700" y="180" width="140" height="40" rx="6" fill="#2e1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="770" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">C | D</text>

  <line x1="640" y1="140" x2="600" y2="180" stroke="#ce9178" stroke-width="1"/>
  <line x1="680" y1="140" x2="740" y2="180" stroke="#ce9178" stroke-width="1"/>

  <!-- Leaf nodes: key + PK only -->
  <rect x="490" y="260" width="180" height="56" rx="6" fill="#281a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc">Leaf (키 + PK 포인터)</text>
  <text x="580" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">name='A' → pk=1</text>
  <text x="580" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">name='B' → pk=5</text>

  <rect x="700" y="260" width="150" height="56" rx="6" fill="#281a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="775" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc">Leaf (키 + PK 포인터)</text>
  <text x="775" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">name='C' → pk=26</text>
  <text x="775" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">name='D' → pk=40</text>

  <line x1="570" y1="220" x2="560" y2="260" stroke="#7777cc" stroke-width="1"/>
  <line x1="590" y1="220" x2="620" y2="260" stroke="#7777cc" stroke-width="1"/>
  <line x1="740" y1="220" x2="730" y2="260" stroke="#7777cc" stroke-width="1"/>
  <line x1="760" y1="220" x2="790" y2="260" stroke="#7777cc" stroke-width="1"/>

  <!-- Arrow from secondary leaf → clustered leaf (double lookup) -->
  <path d="M 490 310 Q 400 370 230 316" stroke="#ce9178" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arr-o)"/>
  <text x="380" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">PK로 클러스터드 인덱스 재탐색 (Double Lookup)</text>

  <!-- Note -->
  <rect x="60" y="360" width="760" height="50" rx="6" fill="#1a1a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" font-weight="600">세컨더리 인덱스는 PK를 가리킨다 — InnoDB 핵심 특성</text>
  <text x="440" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비PK 칼럼 조회 → 세컨더리 탐색 → PK 얻기 → 클러스터드 탐색 (2회 B-tree 탐색)</text>

  <!-- Covering index hint -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">커버링 인덱스: SELECT name, pk FROM t WHERE name='A' → 세컨더리만으로 해결</text>
</svg>
