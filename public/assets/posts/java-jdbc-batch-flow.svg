<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="bfArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">배치 흐름 — addBatch로 모으고 executeBatch로 전송</text>

  <!-- accumulate -->
  <rect x="60" y="92" width="340" height="170" fill="#101622" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">반복: addBatch() 누적</text>
  <rect x="80" y="136" width="300" height="40" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="96" y="161" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ps.setLong(1, id); ps.addBatch();</text>
  <rect x="80" y="184" width="300" height="40" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="96" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ps.setLong(1, id); ps.addBatch();</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">메모리에만 쌓인다 (전송 X)</text>

  <!-- arrow -->
  <line x1="400" y1="177" x2="500" y2="177" stroke="#7ec8e3" stroke-width="2" marker-end="url(#bfArr)"/>
  <text x="408" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">N건마다</text>

  <!-- execute -->
  <rect x="500" y="92" width="320" height="170" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="520" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">executeBatch()</text>
  <rect x="520" y="136" width="280" height="40" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="536" y="161" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">int[] counts = ps.executeBatch();</text>
  <text x="520" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">쌓인 묶음을 한 번에 전송</text>
  <text x="520" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">각 건의 영향 행 수를 배열로 반환</text>
  <text x="520" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">clearBatch()로 비우고 다음 묶음</text>

  <text x="60" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">대량 처리는 수천 건씩 끊어 N건마다 flush — 메모리 폭증과 트랜잭션 비대화를 막는다.</text>
</svg>
