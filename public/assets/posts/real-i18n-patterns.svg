<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">i18n 고급 패턴</text>

  <!-- Pluralization -->
  <rect x="60" y="68" width="360" height="170" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">복수형 처리</text>
  <rect x="76" y="104" width="328" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// en/common.json</text>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">{</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">"item_one"</tspan>: <tspan fill="#ce9178">"{{count}} item"</tspan>,</text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">"item_other"</tspan>: <tspan fill="#ce9178">"{{count}} items"</tspan></text>
  <text x="92" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">}</text>
  <text x="92" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">t(<tspan fill="#ce9178">'item'</tspan>, { count: <tspan fill="#b5cea8">3</tspan> }) <tspan fill="#9aa4b8">// "3 items"</tspan></text>

  <!-- Intl formatting -->
  <rect x="460" y="68" width="360" height="170" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Intl API 날짜·숫자 포매팅</text>
  <rect x="476" y="104" width="328" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// locale = 'ko-KR'</text>
  <text x="492" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">new</tspan> Intl.NumberFormat(locale, {</text>
  <text x="492" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  style: <tspan fill="#ce9178">'currency'</tspan>, currency: <tspan fill="#ce9178">'KRW'</tspan></text>
  <text x="492" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">}).format(<tspan fill="#b5cea8">1234567</tspan>)  <tspan fill="#9aa4b8">// ₩1,234,567</tspan></text>
  <text x="492" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">new</tspan> Intl.DateTimeFormat(locale, {</text>
  <text x="492" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  dateStyle: <tspan fill="#ce9178">'long'</tspan> }).format(<tspan fill="#7ec8e3" font-weight="600">new</tspan> Date())</text>

  <!-- Trans component -->
  <rect x="60" y="258" width="360" height="170" rx="8" fill="#1a1a0f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Trans 컴포넌트 (JSX 포함 번역)</text>
  <rect x="76" y="294" width="328" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// "agree": "I &lt;1&gt;agree&lt;/1&gt; to terms"</text>
  <text x="92" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#7ec8e3" font-weight="600">Trans</tspan> i18nKey=<tspan fill="#ce9178">"agree"</tspan>&gt;</text>
  <text x="92" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  I &lt;<tspan fill="#7ec8e3" font-weight="600">a</tspan> href=<tspan fill="#ce9178">"/terms"</tspan>&gt;agree&lt;/<tspan fill="#7ec8e3" font-weight="600">a</tspan>&gt; to terms</text>
  <text x="92" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;/<tspan fill="#7ec8e3" font-weight="600">Trans</tspan>&gt;</text>
  <text x="92" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 링크/볼드 등 JSX 포함 번역 가능</text>

  <!-- Namespace -->
  <rect x="460" y="258" width="360" height="170" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">네임스페이스 분리</text>
  <rect x="476" y="294" width="328" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 기능별 파일 분리</text>
  <text x="492" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">locales/ko/auth.json</text>
  <text x="492" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">locales/ko/dashboard.json</text>
  <text x="492" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> { t } = <tspan fill="#7ec8e3" font-weight="600">useTranslation</tspan>(<tspan fill="#ce9178">'auth'</tspan>);</text>
  <text x="492" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">t(<tspan fill="#ce9178">'login.title'</tspan>) <tspan fill="#9aa4b8">// auth 네임스페이스</tspan></text>
</svg>
