<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">대시보드 레이아웃 패턴</text>

  <!-- Header -->
  <rect x="60" y="68" width="760" height="48" rx="6" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">헤더: 제목 / 새로고침 버튼 / 마지막 갱신 시각</text>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Static + Button + Static</text>

  <!-- KPI Row -->
  <rect x="60" y="130" width="170" height="80" rx="6" fill="#1a2a1a" stroke="#55c555"/>
  <text x="145" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">총 주문 수</text>
  <text x="145" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#55c555">12,847</text>

  <rect x="245" y="130" width="170" height="80" rx="6" fill="#1a1a2a" stroke="#7777cc"/>
  <text x="330" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">매출액</text>
  <text x="330" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#7777cc">₩4.2억</text>

  <rect x="430" y="130" width="170" height="80" rx="6" fill="#1a2428" stroke="#7ec8e3"/>
  <text x="515" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">처리율</text>
  <text x="515" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#7ec8e3">98.3%</text>

  <rect x="615" y="130" width="205" height="80" rx="6" fill="#2a1a1a" stroke="#e05555"/>
  <text x="717" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오류 건수</text>
  <text x="717" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e05555">23</text>

  <!-- Chart Row -->
  <rect x="60" y="228" width="460" height="180" rx="6" fill="#0f1520" stroke="#2a3040"/>
  <text x="290" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">꺾은선 차트 — 일별 추이</text>
  <polyline points="80,370 130,340 180,355 230,310 280,325 330,290 380,305 430,275 480,295" fill="none" stroke="#55c555" stroke-width="2"/>
  <line x1="75" y1="390" x2="510" y2="390" stroke="#555" stroke-width="1"/>
  <line x1="75" y1="260" x2="75" y2="390" stroke="#555" stroke-width="1"/>

  <rect x="535" y="228" width="285" height="180" rx="6" fill="#0f1520" stroke="#2a3040"/>
  <text x="677" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">파이 차트 — 카테고리 비율</text>
  <circle cx="677" cy="330" r="55" fill="none" stroke="#2a3040"/>
  <path d="M677,330 L677,275 A55,55 0 0,1 725,357 Z" fill="#55c555" opacity="0.85"/>
  <path d="M677,330 L725,357 A55,55 0 0,1 640,382 Z" fill="#7ec8e3" opacity="0.85"/>
  <path d="M677,330 L640,382 A55,55 0 0,1 622,303 Z" fill="#7777cc" opacity="0.85"/>
  <path d="M677,330 L622,303 A55,55 0 0,1 677,275 Z" fill="#e05555" opacity="0.85"/>

  <!-- Grid Row -->
  <rect x="60" y="424" width="760" height="52" rx="6" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Grid — 상세 데이터 테이블 (최근 20건)</text>
  <text x="440" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">클릭 → 드릴다운 팝업</text>
</svg>
