<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Multi-Head: 헤드별 역할 분담 예시</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">각 헤드가 서로 다른 언어적 관계를 학습</text>

  <!-- Head examples -->
  <rect x="60" y="90" width="170" height="140" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="145" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Head 1</text>
  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구문 의존 관계</text>
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">"먹다" ↔ "사과"</text>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(주어-동사)</text>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">단거리 의존성</text>

  <rect x="250" y="90" width="170" height="140" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="335" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Head 2</text>
  <text x="270" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대명사 참조</text>
  <text x="270" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">"그것" → "사과"</text>
  <text x="270" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(공참조)</text>
  <text x="270" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">장거리 의존성</text>

  <rect x="440" y="90" width="170" height="140" rx="10" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="525" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Head 3</text>
  <text x="460" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">의미 유사성</text>
  <text x="460" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">"빠른" ↔ "신속한"</text>
  <text x="460" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(유의어)</text>
  <text x="460" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">의미 관계</text>

  <rect x="630" y="90" width="190" height="140" rx="10" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="725" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Head h…</text>
  <text x="650" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">위치적 패턴</text>
  <text x="650" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">인접 토큰 관계</text>
  <text x="650" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">등 다양한 패턴</text>
  <text x="650" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">자동으로 학습됨</text>

  <!-- Code block -->
  <rect x="60" y="252" width="760" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># PyTorch MultiheadAttention</text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">mha = nn.MultiheadAttention(</text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">    embed_dim=</tspan><tspan fill="#b5cea8">512</tspan><tspan fill="#e8e8e8">, num_heads=</tspan><tspan fill="#b5cea8">8</tspan><tspan fill="#e8e8e8">,   </tspan><tspan fill="#6a8aa0"># d_k = 512/8 = 64</tspan></text>

  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">    dropout=</tspan><tspan fill="#b5cea8">0.1</tspan><tspan fill="#e8e8e8">, batch_first=</tspan><tspan fill="#b5cea8">True</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># Self-Attention: Q=K=V=x</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">out, weights = mha(query=x, key=x, value=x)</text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># weights: (B, n, n) 어텐션 행렬 — 시각화 가능</text>
</svg>
