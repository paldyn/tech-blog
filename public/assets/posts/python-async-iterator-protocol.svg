<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">동기 vs 비동기 이터레이터 프로토콜</text>

  <!-- Sync column title -->
  <text x="240" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">동기 (Synchronous)</text>

  <!-- Async column title -->
  <text x="640" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">비동기 (Asynchronous)</text>

  <!-- Sync iterable -->
  <rect x="50" y="84" width="200" height="90" rx="8"
        fill="#111827" stroke="#888" stroke-width="1.5"/>
  <text x="150" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">이터러블</text>
  <text x="150" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">__iter__()</text>
  <text x="150" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">for x in obj</text>

  <!-- Arrow: sync iterable → sync iterator -->
  <line x1="250" y1="129" x2="278" y2="129"
        stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Sync iterator -->
  <rect x="280" y="84" width="200" height="90" rx="8"
        fill="#111827" stroke="#888" stroke-width="1.5"/>
  <text x="380" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">이터레이터</text>
  <text x="380" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">__iter__() + __next__()</text>
  <text x="380" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">next() → 값 or StopIteration</text>

  <!-- Async iterable -->
  <rect x="450" y="84" width="200" height="90" rx="8"
        fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="550" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">비동기 이터러블</text>
  <text x="550" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">__aiter__()</text>
  <text x="550" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">async for x in obj</text>

  <!-- Arrow: async iterable → async iterator -->
  <line x1="650" y1="129" x2="678" y2="129"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Async iterator -->
  <rect x="680" y="84" width="150" height="90" rx="8"
        fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">비동기 이터레이터</text>
  <text x="755" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">__aiter__() + __anext__()</text>
  <text x="755" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">await anext()</text>
  <text x="755" y="165" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">or StopAsyncIteration</text>

  <!-- Comparison table area -->
  <rect x="50" y="200" width="780" height="100" rx="8"
        fill="#111827" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Table header -->
  <text x="160" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">구분</text>
  <text x="400" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">동기</text>
  <text x="660" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">비동기</text>

  <!-- Row 1 -->
  <text x="160" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">이터러블 메서드</text>
  <text x="400" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">__iter__()</text>
  <text x="660" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">__aiter__()</text>

  <!-- Row 2 -->
  <text x="160" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">이터레이터 메서드</text>
  <text x="400" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">__next__()</text>
  <text x="660" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">async def __anext__()</text>
</svg>
