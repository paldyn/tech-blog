<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">warnings 모듈 제어와 경고 필터</text>
  <!-- Code block -->
  <rect x="60" y="66" width="760" height="298" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="94" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import </tspan><tspan fill="#ffffff">warnings</tspan></text>
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># 1. 경고 억제 (사용자 코드)</tspan></text>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">warnings.filterwarnings(</tspan><tspan fill="#ce9178">"ignore"</tspan><tspan fill="#ffffff">, category=DeprecationWarning)</tspan></text>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># 2. 첫 번째 호출에서만 경고</tspan></text>
  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">warnings.filterwarnings(</tspan><tspan fill="#ce9178">"once"</tspan><tspan fill="#ffffff">, category=DeprecationWarning)</tspan></text>
  <text x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># 3. 에러로 전환 (엄격 모드)</tspan></text>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">warnings.filterwarnings(</tspan><tspan fill="#ce9178">"error"</tspan><tspan fill="#ffffff">, category=DeprecationWarning)</tspan></text>
  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># 4. 컨텍스트 매니저로 임시 필터</tspan></text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">with </tspan><tspan fill="#ffffff">warnings.catch_warnings():</tspan></text>
  <text x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    warnings.simplefilter(</tspan><tspan fill="#ce9178">"ignore"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    old_func()</tspan><tspan fill="#9aa4b8">  # 경고 없이 호출</tspan></text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># pytest: -W error::DeprecationWarning 으로 테스트 중 에러 처리</tspan></text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># python -W error::DeprecationWarning script.py</tspan></text>
  <text x="76" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">stacklevel=2 → 경고 위치가 데코레이터가 아닌 호출자 코드줄을 가리킴</text>
</svg>
