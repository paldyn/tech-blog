<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fn_search() 구현 코드</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">조건 수집 → transaction() → 콜백 에러 처리 구조</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="264" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="115" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">function</tspan><tspan> fn_search() {</tspan>
  </text>
  <text x="76" y="133" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.ds_cond.clearData();</tspan>
  </text>
  <text x="76" y="151" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3">var</tspan><tspan> r = </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.ds_cond.addRow();</tspan>
  </text>
  <text x="76" y="169" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.ds_cond.setColumn(r,</tspan><tspan fill="#ce9178">"KWD"</tspan><tspan>,</tspan>
  </text>
  <text x="76" y="187" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>    </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.edt_kwd.value);</tspan>
  </text>
  <text x="76" y="205" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.transaction(</tspan>
  </text>
  <text x="76" y="223" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>    </tspan><tspan fill="#ce9178">"ListSvc::list.do"</tspan><tspan>,</tspan>
  </text>
  <text x="76" y="241" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>    </tspan><tspan fill="#ce9178">"ds_cond:input"</tspan><tspan>,</tspan>
  </text>
  <text x="76" y="259" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>    </tspan><tspan fill="#ce9178">"ds_list:output"</tspan><tspan>,</tspan>
  </text>
  <text x="76" y="277" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>    fn_nocache(),</tspan><tspan fill="#ce9178">""</tspan><tspan>,</tspan><tspan fill="#ce9178">"fn_searchCb"</tspan>
  </text>
  <text x="76" y="295" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  );</text>
  <text x="76" y="313" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <text x="440" y="374"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">fn_nocache() → "_t=" + Date.getTime() — 캐시 무력화 (공통 함수)</text>
</svg>
