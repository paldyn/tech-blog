<svg xmlns="http://www.w3.org/2000/svg" width="880" height="250" viewBox="0 0 880 250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="250" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">언롤링이 빨라지는 이유</text>

  <rect x="40" y="80" width="250" height="140" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="165" y="112" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">분기 오버헤드 ↓</text>
  <text x="165" y="142" font-size="13" fill="#9aa4b8" text-anchor="middle">종료 조건 검사·점프가</text>
  <text x="165" y="164" font-size="13" fill="#9aa4b8" text-anchor="middle">반복 횟수에 비례해</text>
  <text x="165" y="186" font-size="13" fill="#9aa4b8" text-anchor="middle">줄어든다 (×4면 1/4)</text>

  <rect x="315" y="80" width="250" height="140" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="112" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">ILP 향상</text>
  <text x="440" y="142" font-size="13" fill="#9aa4b8" text-anchor="middle">독립적인 연산이 늘어</text>
  <text x="440" y="164" font-size="13" fill="#9aa4b8" text-anchor="middle">CPU가 병렬로 처리</text>
  <text x="440" y="186" font-size="13" fill="#9aa4b8" text-anchor="middle">(명령어 수준 병렬성)</text>

  <rect x="590" y="80" width="250" height="140" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="715" y="112" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">벡터화 발판</text>
  <text x="715" y="142" font-size="13" fill="#9aa4b8" text-anchor="middle">펼친 반복을 SIMD</text>
  <text x="715" y="164" font-size="13" fill="#9aa4b8" text-anchor="middle">명령으로 묶어 한 번에</text>
  <text x="715" y="186" font-size="13" fill="#9aa4b8" text-anchor="middle">여러 원소 처리 가능</text>
</svg>
