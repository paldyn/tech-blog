<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">단일 연결 리스트 주요 연산</text>

  <defs>
    <marker id="op-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="new-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- PREPEND section -->
  <text x="80" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">앞에 삽입 (prepend) — O(1)</text>

  <!-- New node -->
  <rect x="80" y="104" width="70" height="40" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="115" y="129" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#55c555" text-anchor="middle">99</text>
  <text x="115" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">new</text>
  <!-- new.next → old head -->
  <line x1="150" y1="124" x2="210" y2="124" stroke="#55c555" stroke-width="2" marker-end="url(#new-arr)"/>

  <!-- Old nodes -->
  <rect x="210" y="104" width="70" height="40" rx="6" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="245" y="129" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" text-anchor="middle">10</text>
  <line x1="280" y1="124" x2="340" y2="124" stroke="#7ec8e3" stroke-width="2" marker-end="url(#op-arr)"/>
  <rect x="340" y="104" width="70" height="40" rx="6" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="375" y="129" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" text-anchor="middle">25</text>
  <line x1="410" y1="124" x2="470" y2="124" stroke="#7ec8e3" stroke-width="2" marker-end="url(#op-arr)"/>
  <rect x="470" y="104" width="60" height="40" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="500" y="129" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#444" text-anchor="middle">NULL</text>

  <text x="650" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">head = new → 완료</text>

  <!-- DELETE HEAD section -->
  <text x="80" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">앞 삭제 (delete head) — O(1)</text>

  <rect x="80" y="198" width="70" height="40" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="2"/>
  <text x="115" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#e05555" text-anchor="middle">10</text>
  <text x="115" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">삭제됨</text>
  <line x1="150" y1="218" x2="210" y2="218" stroke="#e05555" stroke-width="2" marker-end="url(#op-arr)"/>
  <rect x="210" y="198" width="70" height="40" rx="6" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="245" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" text-anchor="middle">25</text>
  <line x1="280" y1="218" x2="340" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#op-arr)"/>
  <rect x="340" y="198" width="60" height="40" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="370" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#444" text-anchor="middle">NULL</text>
  <text x="650" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">head = head.next → 완료</text>

  <!-- REVERSE section code -->
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">리스트 역전 — O(n)</text>

  <rect x="80" y="292" width="760" height="108" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> reverse(self):</tspan>
  </text>
  <text x="96" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    prev, curr = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">None</tspan>
    <tspan fill="#ffffff">, self.head</tspan>
  </text>
  <text x="96" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    while</tspan>
    <tspan fill="#ffffff"> curr:</tspan>
  </text>
  <text x="96" y="376" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        curr.next, prev, curr = prev, curr, curr.next</tspan>
  </text>
  <text x="96" y="396" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self.head = prev   </tspan>
    <tspan fill="#9aa4b8">// 포인터만 변경, 데이터 이동 없음</tspan>
  </text>
</svg>
