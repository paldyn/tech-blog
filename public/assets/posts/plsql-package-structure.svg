<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PL/SQL 패키지 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">명세(Spec)와 본문(Body)으로 구성된 PL/SQL 모듈화 단위</text>

  <!-- Left: Package Spec -->
  <rect x="60" y="90" width="360" height="330" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <rect x="60" y="90" width="360" height="36" fill="#1e2e50" rx="8 8 0 0"/>
  <text x="240" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">패키지 명세 (Spec)</text>

  <rect x="70" y="134" width="340" height="276" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="86" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE OR REPLACE PACKAGE</text>
  <text x="86" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  emp_mgr </text><text x="166" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">AS</text>
  <text x="86" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  -- 공개 상수</text>
  <text x="86" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  c_min_sal </tspan><tspan fill="#7ec8e3">CONSTANT NUMBER</tspan><tspan fill="#e8e8e8"> := </tspan><tspan fill="#b5cea8">2000</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="86" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  -- 공개 TYPE</text>
  <text x="86" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  TYPE</tspan><tspan fill="#e8e8e8"> t_emp_tbl </tspan><tspan fill="#7ec8e3">IS TABLE OF</tspan></text>
  <text x="86" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    employees%ROWTYPE </text><text x="262" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">INDEX BY</text><text x="318" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> PLS_INTEGER;</text>
  <text x="86" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  -- 프로시저 시그니처</text>
  <text x="86" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  PROCEDURE</tspan><tspan fill="#e8e8e8"> hire_employee (</tspan></text>
  <text x="86" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    p_name </tspan><tspan fill="#7ec8e3">IN</tspan><tspan fill="#e8e8e8"> VARCHAR2,</tspan></text>
  <text x="86" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    p_sal  </tspan><tspan fill="#7ec8e3">IN</tspan><tspan fill="#e8e8e8"> NUMBER);</tspan></text>
  <text x="86" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  -- 함수 시그니처</text>
  <text x="86" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  FUNCTION</tspan><tspan fill="#e8e8e8"> get_salary(p_id NUMBER)</tspan></text>
  <text x="86" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    RETURN NUMBER</text><text x="208" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="86" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">END</text><text x="110" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> emp_mgr;</text>

  <!-- Right: Package Body -->
  <rect x="460" y="90" width="360" height="330" fill="#111620" rx="8" stroke="#2a5020" stroke-width="1"/>
  <rect x="460" y="90" width="360" height="36" fill="#1e4020" rx="8 8 0 0"/>
  <text x="640" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">패키지 본문 (Body)</text>

  <rect x="470" y="134" width="340" height="276" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="486" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE OR REPLACE PACKAGE BODY</text>
  <text x="486" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  emp_mgr </text><text x="562" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">AS</text>
  <text x="486" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  -- 비공개 전역변수 (본문에만 보임)</text>
  <text x="486" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  g_call_count NUMBER := 0;</text>
  <text x="486" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  PROCEDURE</tspan><tspan fill="#e8e8e8"> hire_employee (</tspan></text>
  <text x="486" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    p_name IN VARCHAR2,</text>
  <text x="486" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    p_sal  IN NUMBER) </tspan><tspan fill="#7ec8e3">IS</tspan></text>
  <text x="486" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  BEGIN</text>
  <text x="486" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    INSERT INTO</tspan><tspan fill="#e8e8e8"> employees...</tspan></text>
  <text x="486" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    g_call_count := g_call_count + 1;</text>
  <text x="486" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  END</tspan><tspan fill="#e8e8e8"> hire_employee;</tspan></text>
  <text x="486" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  FUNCTION</tspan><tspan fill="#e8e8e8"> get_salary(p_id NUMBER)</tspan></text>
  <text x="486" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    RETURN NUMBER IS</text>
  <text x="486" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    v_sal NUMBER;</text>
  <text x="486" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  BEGIN</text>
  <text x="486" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    SELECT</tspan><tspan fill="#e8e8e8"> salary </tspan><tspan fill="#7ec8e3">INTO</tspan><tspan fill="#e8e8e8"> v_sal ...</tspan></text>
  <text x="486" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    RETURN</tspan><tspan fill="#e8e8e8"> v_sal;</tspan></text>
  <text x="486" y="470" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  END</tspan><tspan fill="#e8e8e8"> get_salary;</tspan></text>

  <!-- Bottom benefit bar -->
  <rect x="60" y="436" width="760" height="68" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">패키지의 3대 장점</text>
  <text x="185" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">① 정보 은닉 — 본문 변경 시 명세 유지</text>
  <text x="445" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">② 성능 — 첫 호출 시 전체 로드, 캐시 유지</text>
  <text x="700" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">③ 전역 변수 — 세션 내 상태 공유</text>
  <text x="440" y="496" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">명세만 수정하면 의존 객체 무효화 (본문만 수정하면 유효)</text>
</svg>
