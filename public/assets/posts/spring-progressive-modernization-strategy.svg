<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OpenRewrite 자동 마이그레이션 전략</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">코드 변환 자동화로 마이그레이션 공수 90% 절감</text>

  <!-- Left: pom.xml setup code -->
  <rect x="40" y="92" width="390" height="234" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="235" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">pom.xml - OpenRewrite 플러그인 설정</text>
  <text x="56" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">&lt;plugin&gt;</tspan></text>
  <text x="56" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">&lt;groupId&gt;</tspan><tspan fill="#ce9178">org.openrewrite.maven</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/groupId&gt;</tspan></text>
  <text x="56" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">&lt;artifactId&gt;</tspan><tspan fill="#ce9178">rewrite-maven-plugin</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/artifactId&gt;</tspan></text>
  <text x="56" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">&lt;configuration&gt;</tspan></text>
  <text x="56" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">&lt;activeRecipes&gt;</tspan></text>
  <text x="56" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">      <tspan fill="#7ec8e3" font-weight="600">&lt;recipe&gt;</tspan></text>
  <text x="56" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" xml:space="preserve">      org.openrewrite.java.spring.boot3</text>
  <text x="56" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" xml:space="preserve">        .UpgradeSpringBoot_3_2</text>
  <text x="56" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">      <tspan fill="#7ec8e3" font-weight="600">&lt;/recipe&gt;</tspan></text>
  <text x="56" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">&lt;/activeRecipes&gt;</tspan></text>
  <text x="56" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">&lt;/configuration&gt;</tspan></text>

  <!-- Right: what OpenRewrite does -->
  <rect x="450" y="92" width="390" height="234" rx="8" fill="#1a1a1a" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">OpenRewrite가 자동 처리하는 항목</text>
  <text x="466" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x2713;</text>
  <text x="482" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">javax.* → jakarta.* 전체 import 변환</text>
  <text x="466" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x2713;</text>
  <text x="482" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">application.properties 키 이름 변경</text>
  <text x="466" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x2713;</text>
  <text x="482" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Spring Security API 변경 적용</text>
  <text x="466" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x2713;</text>
  <text x="482" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">pom.xml 의존성 버전 일괄 업데이트</text>
  <text x="466" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x2713;</text>
  <text x="482" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Deprecated API 대체 코드 자동 적용</text>
  <text x="466" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x2713;</text>
  <text x="482" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">JUnit 4 → JUnit 5 테스트 코드 변환</text>
  <text x="466" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">&#x26A0;</text>
  <text x="482" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">비즈니스 로직 변경은 수동 검토 필요</text>
  <text x="466" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">&#x26A0;</text>
  <text x="482" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">커스텀 설정 클래스는 수동 확인</text>
  <text x="466" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">실행: mvn rewrite:run</text>

  <!-- Bottom tips -->
  <rect x="40" y="346" width="800" height="94" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">마이그레이션 성공을 위한 실전 팁</text>
  <text x="60" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">1. git commit 후 mvn rewrite:run 실행 (롤백 가능한 상태 확보)</text>
  <text x="60" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">2. Spring Boot 2.7 → 3.0으로 먼저 올린 뒤 3.x 최신으로 순차 업그레이드</text>
  <text x="60" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">3. 서드파티 라이브러리의 Jakarta EE 호환 버전 사전 확인 (Hibernate 6+, Flyway 9+ 등)</text>
</svg>
