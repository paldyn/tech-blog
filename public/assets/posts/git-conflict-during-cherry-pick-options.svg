<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Cherry-pick 충돌 관련 옵션 정리</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">충돌 예방과 대응을 위한 핵심 옵션</text>

  <!-- Left: conflict handling options -->
  <text x="220" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">충돌 대응 옵션</text>
  <rect x="60" y="114" width="340" height="200" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 충돌 해결 후 계속</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">git cherry-pick --continue</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 이 커밋만 건너뜀</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc" xml:space="preserve">git cherry-pick --skip</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 전체 취소 (원상 복구)</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve">git cherry-pick --abort</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 상태만 초기화 (변경 유지)</text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">git cherry-pick --quit</text>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># (stash나 임시 branch로 이동 가능)</text>

  <!-- Right: prevention options -->
  <text x="660" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">충돌 예방 옵션</text>
  <rect x="480" y="114" width="340" height="200" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 커밋 없이 스테이지만</text>
  <text x="496" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc" xml:space="preserve">git cherry-pick -n abc1234</text>
  <text x="496" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 충돌 전략: ours 자동 선택</text>
  <text x="496" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc" xml:space="preserve">git cherry-pick -X ours abc</text>
  <text x="496" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 충돌 전략: theirs 자동 선택</text>
  <text x="496" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc" xml:space="preserve">git cherry-pick -X theirs abc</text>
  <text x="496" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 공백 무시</text>
  <text x="496" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc" xml:space="preserve">git cherry-pick -Xignore-all-space</text>

  <!-- Bottom -->
  <rect x="60" y="332" width="760" height="18" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="345" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">--quit 는 cherry-pick 상태 파일만 제거, 수정 파일은 유지 — stash 후 재시도에 유용</text>
</svg>
