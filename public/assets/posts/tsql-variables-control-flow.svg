<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">T-SQL 제어흐름 구조</text>

  <!-- IF/ELSE flowchart -->
  <text x="170" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">IF / ELSE IF / ELSE</text>

  <!-- Start -->
  <rect x="120" y="100" width="100" height="36" rx="18" fill="#0f1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="170" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">시작</text>

  <line x1="170" y1="136" x2="170" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Condition diamond -->
  <polygon points="170,158 230,185 170,212 110,185" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">조건?</text>

  <!-- TRUE path -->
  <line x1="230" y1="185" x2="290" y2="185" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="258" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">TRUE</text>
  <rect x="292" y="166" width="90" height="38" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="337" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">IF 블록</text>

  <!-- FALSE path -->
  <line x1="170" y1="212" x2="170" y2="238" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="182" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">FALSE</text>
  <polygon points="170,240 230,265 170,290 110,265" fill="#0f1a2e" stroke="#e0a040" stroke-width="1.5"/>
  <text x="170" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a040" text-anchor="middle">ELSE IF?</text>

  <line x1="230" y1="265" x2="290" y2="265" stroke="#e0a040" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="292" y="246" width="90" height="38" rx="6" fill="#1a1a0a" stroke="#e0a040" stroke-width="1.5"/>
  <text x="337" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a040" text-anchor="middle">ELSE IF 블록</text>

  <line x1="170" y1="290" x2="170" y2="316" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="120" y="318" width="100" height="38" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="170" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ELSE 블록</text>

  <!-- WHILE loop -->
  <text x="580" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">WHILE 루프</text>

  <rect x="520" y="100" width="120" height="36" rx="18" fill="#0f1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="580" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">초기화</text>

  <line x1="580" y1="136" x2="580" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <polygon points="580,158 640,185 580,212 520,185" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">조건 참?</text>

  <!-- TRUE → body -->
  <line x1="640" y1="185" x2="700" y2="185" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="668" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">TRUE</text>
  <rect x="700" y="166" width="110" height="38" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">루프 본문</text>
  <text x="755" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">BREAK / CONTINUE</text>
  <!-- Loop back arrow -->
  <path d="M 810 185 Q 830 185 830 130 Q 830 96 700 96 Q 640 96 640 155"
        fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>

  <!-- FALSE → end -->
  <line x1="580" y1="212" x2="580" y2="248" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="594" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">FALSE</text>
  <rect x="520" y="250" width="120" height="36" rx="18" fill="#0f1520" stroke="#e05555" stroke-width="2"/>
  <text x="580" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">루프 종료</text>

  <!-- Code block -->
  <rect x="60" y="380" width="760" height="82" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 변수 선언과 WHILE 예시</text>
  <text xml:space="preserve" x="80" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">DECLARE</tspan><tspan fill="#ffffff"> @cnt </tspan><tspan fill="#7ec8e3" font-weight="600">INT</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, @max </tspan><tspan fill="#7ec8e3" font-weight="600">INT</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">;</tspan></text>
  <text xml:space="preserve" x="80" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">WHILE</tspan><tspan fill="#ffffff"> @cnt &lt;= @max </tspan><tspan fill="#7ec8e3" font-weight="600">BEGIN</tspan></text>
  <text xml:space="preserve" x="80" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">PRINT</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'Row: '</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#7ec8e3" font-weight="600">CAST</tspan><tspan fill="#ffffff">(@cnt </tspan><tspan fill="#7ec8e3" font-weight="600">AS</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">NVARCHAR</tspan><tspan fill="#ffffff">);  </tspan><tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> @cnt += </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">END</tspan></text>
</svg>
