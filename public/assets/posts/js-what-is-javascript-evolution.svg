<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript의 진화: 스크립팅에서 범용 언어로</text>

  <!-- Timeline line -->
  <line x1="80" y1="120" x2="800" y2="120" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Era 1: 1995 -->
  <circle cx="130" cy="120" r="8" fill="#7ec8e3"/>
  <text x="130" y="105" text-anchor="middle" font-size="12" fill="#7ec8e3">1995</text>
  <rect x="60" y="140" width="140" height="90" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">탄생</text>
  <text x="130" y="182" text-anchor="middle" font-size="12" fill="#888">Netscape</text>
  <text x="130" y="200" text-anchor="middle" font-size="12" fill="#888">브라우저</text>
  <text x="130" y="218" text-anchor="middle" font-size="12" fill="#888">폼 검증 용도</text>

  <!-- Arrow 1→2 -->
  <polygon points="218,116 218,124 248,120" fill="#444"/>

  <!-- Era 2: 1997 -->
  <circle cx="270" cy="120" r="8" fill="#55c555"/>
  <text x="270" y="105" text-anchor="middle" font-size="12" fill="#55c555">1997</text>
  <rect x="200" y="140" width="140" height="90" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="270" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">표준화</text>
  <text x="270" y="182" text-anchor="middle" font-size="12" fill="#888">ECMAScript</text>
  <text x="270" y="200" text-anchor="middle" font-size="12" fill="#888">ECMA-262</text>
  <text x="270" y="218" text-anchor="middle" font-size="12" fill="#888">언어 명세 확립</text>

  <!-- Arrow 2→3 -->
  <polygon points="358,116 358,124 388,120" fill="#444"/>

  <!-- Era 3: 2009 -->
  <circle cx="410" cy="120" r="8" fill="#ce9178"/>
  <text x="410" y="105" text-anchor="middle" font-size="12" fill="#ce9178">2009</text>
  <rect x="340" y="140" width="140" height="90" rx="6" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="410" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">서버 진출</text>
  <text x="410" y="182" text-anchor="middle" font-size="12" fill="#888">Node.js 출시</text>
  <text x="410" y="200" text-anchor="middle" font-size="12" fill="#888">V8 엔진 기반</text>
  <text x="410" y="218" text-anchor="middle" font-size="12" fill="#888">서버사이드 JS</text>

  <!-- Arrow 3→4 -->
  <polygon points="498,116 498,124 528,120" fill="#444"/>

  <!-- Era 4: 2015 -->
  <circle cx="550" cy="120" r="8" fill="#7777cc"/>
  <text x="550" y="105" text-anchor="middle" font-size="12" fill="#7777cc">2015</text>
  <rect x="480" y="140" width="140" height="90" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="550" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">모던 JS</text>
  <text x="550" y="182" text-anchor="middle" font-size="12" fill="#888">ES2015(ES6)</text>
  <text x="550" y="200" text-anchor="middle" font-size="12" fill="#888">클래스·모듈</text>
  <text x="550" y="218" text-anchor="middle" font-size="12" fill="#888">화살표 함수 등</text>

  <!-- Arrow 4→5 -->
  <polygon points="638,116 638,124 668,120" fill="#444"/>

  <!-- Era 5: 현재 -->
  <circle cx="690" cy="120" r="8" fill="#e8e8e8"/>
  <text x="690" y="105" text-anchor="middle" font-size="12" fill="#e8e8e8">현재</text>
  <rect x="620" y="140" width="160" height="90" rx="6" fill="#0d1117" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="700" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">범용 언어</text>
  <text x="700" y="182" text-anchor="middle" font-size="12" fill="#888">웹·서버·모바일</text>
  <text x="700" y="200" text-anchor="middle" font-size="12" fill="#888">IoT·데스크톱</text>
  <text x="700" y="218" text-anchor="middle" font-size="12" fill="#888">ML 활용까지</text>

  <!-- Bottom section: where JS runs today -->
  <text x="440" y="280" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">오늘날 JavaScript가 실행되는 곳</text>

  <!-- 6 run environments -->
  <!-- Browser -->
  <rect x="60" y="300" width="120" height="60" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="326" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">브라우저</text>
  <text x="120" y="346" text-anchor="middle" font-size="11" fill="#888">Chrome · Firefox</text>

  <!-- Node.js -->
  <rect x="200" y="300" width="120" height="60" rx="6" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="260" y="326" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Node.js</text>
  <text x="260" y="346" text-anchor="middle" font-size="11" fill="#888">서버 · CLI 도구</text>

  <!-- Deno -->
  <rect x="340" y="300" width="120" height="60" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="400" y="326" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">Deno · Bun</text>
  <text x="400" y="346" text-anchor="middle" font-size="11" fill="#888">모던 런타임</text>

  <!-- Mobile -->
  <rect x="480" y="300" width="120" height="60" rx="6" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="540" y="326" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">모바일</text>
  <text x="540" y="346" text-anchor="middle" font-size="11" fill="#888">RN · Expo</text>

  <!-- Desktop -->
  <rect x="620" y="300" width="120" height="60" rx="6" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="680" y="326" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">데스크톱</text>
  <text x="680" y="346" text-anchor="middle" font-size="11" fill="#888">Electron · Tauri</text>

  <!-- Edge / IoT -->
  <rect x="340" y="380" width="200" height="60" rx="6" fill="#111827" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="406" text-anchor="middle" font-size="13" font-weight="600" fill="#888">엣지 · IoT · 임베디드</text>
  <text x="440" y="426" text-anchor="middle" font-size="11" fill="#666">Cloudflare Workers · Espruino</text>

  <!-- Key fact banner -->
  <rect x="60" y="460" width="760" height="40" rx="6" fill="#0d1117" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="485" text-anchor="middle" font-size="13" fill="#888">Netscape의 10일 프로젝트 → 세계에서 가장 많이 사용되는 프로그래밍 언어 (Stack Overflow 2023)</text>

  <!-- Footer -->
  <text x="440" y="528" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
