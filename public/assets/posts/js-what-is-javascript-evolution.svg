<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540"
  style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript의 진화 — 브라우저 스크립팅에서 범용 언어로</text>

  <!-- Timeline line -->
  <line x1="100" y1="110" x2="780" y2="110" stroke="#333" stroke-width="2"/>

  <!-- Era 1: 1995 -->
  <circle cx="130" cy="110" r="8" fill="#7ec8e3"/>
  <text x="130" y="100" text-anchor="middle" font-size="11" fill="#7ec8e3">1995</text>
  <rect x="70" y="125" width="150" height="90" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="145" y="147" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">브라우저 스크립팅</text>
  <text x="145" y="165" text-anchor="middle" font-size="12" fill="#888">Netscape Navigator</text>
  <text x="145" y="182" text-anchor="middle" font-size="12" fill="#888">폼 유효성 검증</text>
  <text x="145" y="199" text-anchor="middle" font-size="12" fill="#888">DOM 조작</text>

  <!-- Arrow 1→2 -->
  <polygon points="236,108 270,108 270,104 282,110 270,116 270,112 236,112" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Era 2: 2005 -->
  <circle cx="310" cy="110" r="8" fill="#7ec8e3"/>
  <text x="310" y="100" text-anchor="middle" font-size="11" fill="#7ec8e3">2005</text>
  <rect x="250" y="125" width="150" height="90" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="325" y="147" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">AJAX 혁명</text>
  <text x="325" y="165" text-anchor="middle" font-size="12" fill="#888">XMLHttpRequest</text>
  <text x="325" y="182" text-anchor="middle" font-size="12" fill="#888">Google Maps / Gmail</text>
  <text x="325" y="199" text-anchor="middle" font-size="12" fill="#888">jQuery 등장</text>

  <!-- Arrow 2→3 -->
  <polygon points="416,108 450,108 450,104 462,110 450,116 450,112 416,112" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Era 3: 2009 -->
  <circle cx="490" cy="110" r="8" fill="#55c555"/>
  <text x="490" y="100" text-anchor="middle" font-size="11" fill="#55c555">2009</text>
  <rect x="430" y="125" width="150" height="90" rx="8" fill="#0d1f0d" stroke="#1a3a1a"/>
  <text x="505" y="147" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">서버 진출</text>
  <text x="505" y="165" text-anchor="middle" font-size="12" fill="#888">Node.js 탄생</text>
  <text x="505" y="182" text-anchor="middle" font-size="12" fill="#888">npm 패키지 생태계</text>
  <text x="505" y="199" text-anchor="middle" font-size="12" fill="#888">비동기 I/O 모델</text>

  <!-- Arrow 3→4 -->
  <polygon points="596,108 630,108 630,104 642,110 630,116 630,112 596,112" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Era 4: 2015+ -->
  <circle cx="670" cy="110" r="8" fill="#e8e8e8"/>
  <text x="690" y="100" text-anchor="middle" font-size="11" fill="#e8e8e8">2015~</text>
  <rect x="610" y="125" width="200" height="90" rx="8" fill="#1a1a1a" stroke="#333"/>
  <text x="710" y="147" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">범용 언어</text>
  <text x="710" y="165" text-anchor="middle" font-size="12" fill="#888">ES6+ 표준화</text>
  <text x="710" y="182" text-anchor="middle" font-size="12" fill="#888">모바일·데스크톱·IoT</text>
  <text x="710" y="199" text-anchor="middle" font-size="12" fill="#888">TypeScript 생태계</text>

  <!-- Section divider -->
  <line x1="60" y1="270" x2="820" y2="270" stroke="#1e2433" stroke-width="1"/>

  <!-- Bottom: Key characteristics -->
  <text x="440" y="300" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">JavaScript의 핵심 특성</text>

  <!-- Char 1 -->
  <rect x="60" y="320" width="175" height="80" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="147" y="345" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">동적 타입</text>
  <text x="147" y="365" text-anchor="middle" font-size="12" fill="#888">런타임에 타입 결정</text>
  <text x="147" y="382" text-anchor="middle" font-size="12" fill="#888">유연하지만 주의 필요</text>

  <!-- Char 2 -->
  <rect x="255" y="320" width="175" height="80" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="342" y="345" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">인터프리터</text>
  <text x="342" y="365" text-anchor="middle" font-size="12" fill="#888">JIT 컴파일로 고성능</text>
  <text x="342" y="382" text-anchor="middle" font-size="12" fill="#888">즉시 실행 가능</text>

  <!-- Char 3 -->
  <rect x="450" y="320" width="175" height="80" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="537" y="345" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">프로토타입 기반</text>
  <text x="537" y="365" text-anchor="middle" font-size="12" fill="#888">클래스 없이 상속</text>
  <text x="537" y="382" text-anchor="middle" font-size="12" fill="#888">유연한 객체 모델</text>

  <!-- Char 4 -->
  <rect x="645" y="320" width="175" height="80" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="732" y="345" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">일급 함수</text>
  <text x="732" y="365" text-anchor="middle" font-size="12" fill="#888">함수가 값으로 취급</text>
  <text x="732" y="382" text-anchor="middle" font-size="12" fill="#888">함수형 프로그래밍</text>

  <!-- Tagline -->
  <text x="440" y="450" text-anchor="middle" font-size="14" fill="#7777cc">"웹의 언어"에서 세계에서 가장 많이 쓰이는 프로그래밍 언어로</text>

  <!-- Footer -->
  <text x="440" y="490" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 · Part I</text>
</svg>
