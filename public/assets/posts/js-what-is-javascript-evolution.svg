<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript의 진화 — 브라우저 스크립팅에서 범용 언어로</text>

  <!-- Timeline arrow -->
  <line x1="60" y1="140" x2="820" y2="140" stroke="#333" stroke-width="2"/>
  <polygon points="820,135 830,140 820,145" fill="#333"/>

  <!-- Era 1: 1995 -->
  <rect x="60" y="100" width="140" height="76" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">1995</text>
  <text x="130" y="140" text-anchor="middle" font-size="12" fill="#e8e8e8">브라우저 스크립팅</text>
  <text x="130" y="158" text-anchor="middle" font-size="11" fill="#888">Netscape · 10일 만에 탄생</text>
  <!-- dot on timeline -->
  <circle cx="130" cy="140" r="5" fill="#7ec8e3"/>

  <!-- Era 2: 2009 -->
  <rect x="230" y="100" width="140" height="76" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="300" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">2009</text>
  <text x="300" y="140" text-anchor="middle" font-size="12" fill="#e8e8e8">서버 진출</text>
  <text x="300" y="158" text-anchor="middle" font-size="11" fill="#888">Node.js · Ryan Dahl</text>
  <circle cx="300" cy="140" r="5" fill="#55c555"/>

  <!-- Era 3: 2015 -->
  <rect x="400" y="100" width="140" height="76" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">2015</text>
  <text x="470" y="140" text-anchor="middle" font-size="12" fill="#e8e8e8">현대화 (ES6)</text>
  <text x="470" y="158" text-anchor="middle" font-size="11" fill="#888">클래스 · 모듈 · Promise</text>
  <circle cx="470" cy="140" r="5" fill="#7777cc"/>

  <!-- Era 4: 2024 -->
  <rect x="570" y="100" width="160" height="76" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="650" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">2024+</text>
  <text x="650" y="140" text-anchor="middle" font-size="12" fill="#e8e8e8">범용 언어</text>
  <text x="650" y="158" text-anchor="middle" font-size="11" fill="#888">Deno · Bun · Edge · Wasm</text>
  <circle cx="650" cy="140" r="5" fill="#ce9178"/>

  <!-- JS Roles section -->
  <text x="60" y="218" font-size="16" font-weight="600" fill="#e8e8e8">JavaScript가 사용되는 곳</text>

  <!-- Box: 브라우저 -->
  <rect x="60" y="232" width="180" height="90" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">브라우저</text>
  <text x="150" y="278" text-anchor="middle" font-size="12" fill="#e8e8e8">DOM 조작 · UI 로직</text>
  <text x="150" y="298" text-anchor="middle" font-size="11" fill="#888">Chrome · Firefox · Safari</text>

  <!-- Box: 서버 -->
  <rect x="260" y="232" width="180" height="90" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1"/>
  <text x="350" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">서버</text>
  <text x="350" y="278" text-anchor="middle" font-size="12" fill="#e8e8e8">API · 파일 · DB 처리</text>
  <text x="350" y="298" text-anchor="middle" font-size="11" fill="#888">Node · Deno · Bun</text>

  <!-- Box: 모바일 -->
  <rect x="460" y="232" width="180" height="90" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">모바일</text>
  <text x="550" y="278" text-anchor="middle" font-size="12" fill="#e8e8e8">네이티브 앱 개발</text>
  <text x="550" y="298" text-anchor="middle" font-size="11" fill="#888">React Native · Expo</text>

  <!-- Box: Edge/Wasm -->
  <rect x="660" y="232" width="160" height="90" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1"/>
  <text x="740" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">Edge / Wasm</text>
  <text x="740" y="278" text-anchor="middle" font-size="12" fill="#e8e8e8">CDN 엣지 로직</text>
  <text x="740" y="298" text-anchor="middle" font-size="11" fill="#888">Cloudflare Workers</text>

  <!-- Code block: hello world -->
  <text x="60" y="366" font-size="16" font-weight="600" fill="#e8e8e8">가장 단순한 JavaScript</text>
  <rect x="60" y="380" width="420" height="90" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">// 브라우저 콘솔에서 실행</text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">console</text>
  <text x="152" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">.log(</text>
  <text x="204" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"Hello, JavaScript!"</text>
  <text x="358" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">// → "Hello, JavaScript!"</text>
  <text x="76" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">// Node, Deno, Bun 어디서든 동일</text>

  <!-- Key facts -->
  <rect x="500" y="380" width="320" height="90" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="520" y="402" font-size="13" font-weight="600" fill="#e8e8e8">핵심 특성</text>
  <text x="520" y="422" font-size="12" fill="#7ec8e3">• 인터프리터 기반 (JIT 컴파일 포함)</text>
  <text x="520" y="440" font-size="12" fill="#55c555">• 동적 타입, 싱글 스레드</text>
  <text x="520" y="458" font-size="12" fill="#7777cc">• 이벤트 기반 비동기 I/O</text>

  <!-- Footer -->
  <text x="440" y="500" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #1</text>
</svg>
