<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">NRZ vs PAM4 — 고속 인터페이스의 발전</text>
  <text x="440" y="58" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">같은 클록 속도에서 PAM4는 NRZ의 2배 데이터 전송</text>

  <!-- NRZ left -->
  <text x="190" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">NRZ (1bit/symbol)</text>
  <!-- NRZ levels: 2 levels (+1, -1) -->
  <line x1="80" y1="180" x2="300" y2="180" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="68" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#7ec8e3">+1</text>
  <text x="68" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#7ec8e3">-1</text>
  <!-- Waveform -->
  <polyline points="80,125 120,125 120,180 160,180 160,125 200,125 200,125 240,125 240,180 280,180 280,125 300,125"
            fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <!-- Bit labels -->
  <text x="100" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">1</text>
  <text x="140" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">0</text>
  <text x="180" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">1</text>
  <text x="220" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">1</text>
  <text x="260" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">0</text>

  <!-- PAM4 right -->
  <text x="630" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">PAM4 (2bit/symbol)</text>
  <!-- PAM4 levels: 4 levels -->
  <text x="460" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555">+3</text>
  <text x="460" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555">+1</text>
  <text x="460" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555">-1</text>
  <text x="460" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555">-3</text>
  <!-- PAM4 waveform: 11=+3, 10=+1, 01=-1, 00=-3 -->
  <polyline points="480,115 520,115 520,138 560,138 560,162 600,162 600,185 640,185 640,115 680,115 680,138 720,138 720,185 760,185 760,162 800,162"
            fill="none" stroke="#55c555" stroke-width="2.5"/>
  <!-- Guide lines -->
  <line x1="480" y1="138" x2="800" y2="138" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="480" y1="162" x2="800" y2="162" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Bit pair labels -->
  <text x="494" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="9" fill="#888">11</text>
  <text x="534" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="9" fill="#888">10</text>
  <text x="574" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="9" fill="#888">01</text>
  <text x="614" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="9" fill="#888">00</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="220" stroke="#222" stroke-width="1.5"/>

  <!-- Bottom note -->
  <rect x="60" y="240" width="760" height="56" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PAM4는 400G/800G 이더넷, PCIe 4.0+에서 사용. 클록 속도 유지하며 2배 대역폭.</text>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단점: 4레벨 구분을 위해 높은 SNR 필요 → 전송 거리 단축, 고품질 케이블 필요.</text>
</svg>
