<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이중 해싱 (Double Hashing)</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">두 번째 해시 함수로 탐사 간격을 동적으로 결정 — 최소 클러스터링</text>

    <!-- Code block: double hashing formula -->
    <rect x="60" y="88" width="420" height="120" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 이중 해싱 공식</text>
    <text x="80" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">h(k,i) = (h1(k) + i*h2(k)) % m</text>
    <text x="80" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 좋은 h2 조건: m과 서로소</text>
    <text x="80" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">h2(k) = p - (k % p)</text>
    <text x="80" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve"># p: m보다 작은 소수</text>

    <!-- Right: comparison table -->
    <rect x="520" y="88" width="320" height="130" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="680" y="110" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">탐사 방식별 클러스터 비교</text>
    <text x="540" y="134" font-size="12" fill="#888">선형 탐사</text>
    <text x="820" y="134" font-size="12" fill="#e05555" text-anchor="end">1차 클러스터 (심각)</text>
    <text x="540" y="156" font-size="12" fill="#888">이차 탐사</text>
    <text x="820" y="156" font-size="12" fill="#e8e8e8" text-anchor="end">2차 클러스터 (완화)</text>
    <text x="540" y="178" font-size="12" fill="#888">이중 해싱</text>
    <text x="820" y="178" font-size="12" fill="#55c555" text-anchor="end">거의 없음 (최적)</text>
    <text x="540" y="200" font-size="12" fill="#888">분리 체이닝</text>
    <text x="820" y="200" font-size="12" fill="#7ec8e3" text-anchor="end">클러스터 없음</text>

    <!-- Visual probing sequence -->
    <text x="440" y="250" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">이중 해싱 삽입 추적: h1(K)=3, h2(K)=5, m=11</text>

    <!-- 11 slots -->
    <text x="72" y="290" font-size="11" fill="#888" text-anchor="middle">idx</text>
    <!-- slots 0-10 -->
    <rect x="88" y="272" width="38" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="107" y="287" font-size="10" fill="#555" text-anchor="middle">0</text><text x="107" y="302" font-size="11" fill="#555" text-anchor="middle">—</text>

    <rect x="128" y="272" width="38" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="147" y="287" font-size="10" fill="#555" text-anchor="middle">1</text><text x="147" y="302" font-size="11" fill="#555" text-anchor="middle">—</text>

    <rect x="168" y="272" width="38" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="187" y="287" font-size="10" fill="#555" text-anchor="middle">2</text><text x="187" y="302" font-size="11" fill="#555" text-anchor="middle">—</text>

    <!-- slot 3: OCCUPIED -->
    <rect x="208" y="272" width="38" height="36" fill="#2a1010" stroke="#e05555" stroke-width="1.5" rx="3"/>
    <text x="227" y="287" font-size="10" fill="#888" text-anchor="middle">3</text><text x="227" y="302" font-size="11" fill="#e05555" text-anchor="middle">X</text>

    <rect x="248" y="272" width="38" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="267" y="287" font-size="10" fill="#555" text-anchor="middle">4</text><text x="267" y="302" font-size="11" fill="#555" text-anchor="middle">—</text>

    <rect x="288" y="272" width="38" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="307" y="287" font-size="10" fill="#555" text-anchor="middle">5</text><text x="307" y="302" font-size="11" fill="#555" text-anchor="middle">—</text>

    <rect x="328" y="272" width="38" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="347" y="287" font-size="10" fill="#555" text-anchor="middle">6</text><text x="347" y="302" font-size="11" fill="#555" text-anchor="middle">—</text>

    <rect x="368" y="272" width="38" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="387" y="287" font-size="10" fill="#555" text-anchor="middle">7</text><text x="387" y="302" font-size="11" fill="#555" text-anchor="middle">—</text>

    <!-- slot 8: TARGET (3+5=8) -->
    <rect x="408" y="272" width="38" height="36" fill="#0d2a1e" stroke="#55c555" stroke-width="2" rx="3"/>
    <text x="427" y="287" font-size="10" fill="#888" text-anchor="middle">8</text><text x="427" y="302" font-size="11" fill="#55c555" text-anchor="middle">K</text>

    <rect x="448" y="272" width="38" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="467" y="287" font-size="10" fill="#555" text-anchor="middle">9</text><text x="467" y="302" font-size="11" fill="#555" text-anchor="middle">—</text>

    <rect x="488" y="272" width="38" height="36" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="507" y="287" font-size="10" fill="#555" text-anchor="middle">10</text><text x="507" y="302" font-size="11" fill="#555" text-anchor="middle">—</text>

    <!-- Step annotation -->
    <text x="227" y="330" font-size="11" fill="#e05555" text-anchor="middle">i=0 충돌</text>
    <text x="427" y="330" font-size="11" fill="#55c555" text-anchor="middle">i=1: (3+5)%11=8 삽입!</text>
    <path d="M 227 308 L 227 340 L 400 340 L 400 308" fill="none" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

    <!-- Bottom summary -->
    <rect x="60" y="360" width="760" height="44" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="440" y="378" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">이중 해싱은 가장 균일한 분포 — Python dict, CPython set 내부에서 사용</text>
    <text x="440" y="396" font-size="12" fill="#888" text-anchor="middle">단, 두 해시 함수 계산 비용이 추가됨. 메모리 지역성은 선형 탐사가 우수</text>
  </g>
</svg>
