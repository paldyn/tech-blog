<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <!-- 배경 -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">MapStruct 고급 매핑 패턴</text>

  <!-- 왼쪽: 필드 이름 다를 때 -->
  <text x="220" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">@Mapping — 필드 이름 매핑</text>
  <rect x="60" y="92" width="320" height="186" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">@Mapper(componentModel = <tspan fill="#ce9178">"spring"</tspan>)</text>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public interface</tspan> OrderMapper {</text>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  @Mapping(source = <tspan fill="#ce9178">"product.name"</tspan>,</text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">           target = <tspan fill="#ce9178">"productName"</tspan>)</text>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  @Mapping(source = <tspan fill="#ce9178">"user.id"</tspan>,</text>
  <text x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">           target = <tspan fill="#ce9178">"userId"</tspan>)</text>
  <text x="76" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  OrderResponse toResponse(Order o);</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- 오른쪽: 커스텀 변환 -->
  <text x="660" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">@Named — 커스텀 변환</text>
  <rect x="500" y="92" width="320" height="204" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="516" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">@Mapper(componentModel = <tspan fill="#ce9178">"spring"</tspan>)</text>
  <text x="516" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public abstract class</tspan> ProductMapper {</text>
  <text x="516" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  @Mapping(target = <tspan fill="#ce9178">"priceStr"</tspan>,</text>
  <text x="516" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    qualifiedByName = <tspan fill="#ce9178">"formatPrice"</tspan>)</text>
  <text x="516" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">abstract</tspan> ProductResp toResp(Product p);</text>
  <text x="516" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="516" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  @Named(<tspan fill="#ce9178">"formatPrice"</tspan>)</text>
  <text x="516" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">protected</tspan> String formatPrice(<tspan fill="#7ec8e3" font-weight="600">int</tspan> p) {</text>
  <text x="516" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">return</tspan> <tspan fill="#ce9178">"₩"</tspan> + p;</text>
  <text x="516" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="516" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- 하단: uses로 다른 Mapper 재사용 -->
  <text x="220" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">uses — 다른 Mapper 재사용</text>
  <rect x="60" y="350" width="320" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// uses에 다른 Mapper 등록</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">@Mapper(componentModel = <tspan fill="#ce9178">"spring"</tspan>,</text>
  <text x="76" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">       uses = {AddressMapper.<tspan fill="#7ec8e3">class</tspan>})</text>
  <text x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public interface</tspan> CustomerMapper {</text>
  <text x="76" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#9aa4b8">// Address는 AddressMapper가 처리</tspan></text>
  <text x="76" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  CustomerResp toResp(Customer c);</text>
  <text x="76" y="482" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- 하단: 의존성 설정 -->
  <text x="660" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">Gradle 의존성</text>
  <rect x="500" y="350" width="320" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="516" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// build.gradle</text>
  <text x="516" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">dependencies {</text>
  <text x="516" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  implementation <tspan fill="#ce9178">"org.mapstruct:mapstruct</tspan></text>
  <text x="516" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    <tspan fill="#ce9178">:1.5.5.Final"</tspan></text>
  <text x="516" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  annotationProcessor</text>
  <text x="516" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    <tspan fill="#ce9178">"org.mapstruct:mapstruct-</tspan></text>
  <text x="516" y="482" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">     <tspan fill="#ce9178">processor:1.5.5.Final"</tspan></text>
</svg>
