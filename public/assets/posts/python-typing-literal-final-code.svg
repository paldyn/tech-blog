<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Literal과 Final 사용 예</text>

  <rect x="60" y="64" width="760" height="236" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="80" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> typing </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Literal, Final</tspan></text>

  <text x="80" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Mode = Literal[</tspan><tspan fill="#ce9178">"r"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"w"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#ffffff">]</tspan></text>

  <text x="80" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> open_file(path: </tspan><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">, mode: Mode) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">None</tspan><tspan fill="#ffffff">: ...</tspan></text>

  <text x="80" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">open_file(</tspan><tspan fill="#ce9178">"a.txt"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"w"</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8">    # OK</tspan></text>

  <text x="80" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">open_file(</tspan><tspan fill="#ce9178">"a.txt"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"x"</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#e05555">    # 오류: "x" 불가</tspan></text>

  <text x="80" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">RATE: Final[</tspan><tspan fill="#7ec8e3" font-weight="600">float</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#b5cea8">0.05</tspan></text>

  <text x="80" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">RATE = </tspan><tspan fill="#b5cea8">0.07</tspan><tspan fill="#e05555">              # 오류: 재할당 금지</tspan></text>
</svg>
