<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">SWC · esbuild 설정 코드</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">@swc/core API와 esbuild build API 비교</text>

  <!-- SWC code block -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" xml:space="preserve">SWC (@swc/core)</text>
  <rect x="60" y="110" width="380" height="258" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ffffff">{ transform } </tspan><tspan fill="#7ec8e3">from  </tspan><tspan fill="#ce9178">'@swc/core'</tspan></text>

  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const </tspan><tspan fill="#ffffff">{ code, map } = </tspan><tspan fill="#7ec8e3">await</tspan></text>

  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  transform(source, {</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    filename: </tspan><tspan fill="#ce9178">'index.ts'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    sourceMaps: </tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    jsc: {</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      parser: {</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        syntax: </tspan><tspan fill="#ce9178">'typescript'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        tsx: </tspan><tspan fill="#7ec8e3">true</tspan></text>
  
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      },</text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      target: </tspan><tspan fill="#ce9178">'es2020'</tspan></text>
  
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    }</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  });</text>

  <!-- esbuild code block -->
  <text x="480" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">esbuild</text>
  <rect x="480" y="110" width="360" height="258" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="496" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ffffff">* </tspan><tspan fill="#7ec8e3">as </tspan><tspan fill="#ffffff">esbuild </tspan><tspan fill="#7ec8e3">from</tspan><tspan fill="#ce9178"> 'esbuild'</tspan></text>

  <text x="496" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">await </tspan><tspan fill="#ffffff">esbuild.build({</tspan></text>
  
  <text x="496" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  entryPoints: [</tspan><tspan fill="#ce9178">'src/index.ts'</tspan><tspan fill="#ffffff">],</tspan></text>

  <text x="496" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  bundle: </tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="496" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  outdir: </tspan><tspan fill="#ce9178">'dist'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="496" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  platform: </tspan><tspan fill="#ce9178">'node'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="496" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  target: [</tspan><tspan fill="#ce9178">'node18'</tspan><tspan fill="#ffffff">],</tspan></text>

  <text x="496" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  format: </tspan><tspan fill="#ce9178">'esm'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="496" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  sourcemap: </tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="496" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  minify: </tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="496" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  splitting: </tspan><tspan fill="#7ec8e3">true</tspan></text>
  
  <text x="496" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">});</text>

  <!-- Bottom label -->
  <text x="60" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">SWC는 파일 단위 변환, esbuild는 번들링까지 포함 — 두 도구는 상호 보완적입니다.</text>
</svg>
