<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">분산성 어노테이션 — in / out</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">TypeScript 4.7+ — 타입 파라미터에 분산성을 명시적으로 선언</text>

  <!-- Left code: out (covariant) -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">out — 공변 (읽기만 가능)</text>
  <rect x="60" y="116" width="360" height="144" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">interface</tspan> Producer&lt;<tspan fill="#55c555">out</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt; {</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  produce(): <tspan fill="#7ec8e3" font-weight="600">T</tspan>;  <tspan fill="#9aa4b8">// T는 출력만</tspan></text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Producer&lt;Dog&gt; extends Producer&lt;Animal&gt;</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> p: Producer&lt;Animal&gt; =</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  getDogProducer();  <tspan fill="#9aa4b8">// ✓ 공변</tspan></text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// out 없으면 에러나는 경우도 통과</text>

  <!-- Right code: in (contravariant) -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">in — 반변 (쓰기만 가능)</text>
  <rect x="460" y="116" width="360" height="144" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">interface</tspan> Consumer&lt;<tspan fill="#e05555">in</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt; {</text>
  <text x="476" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  consume(value: <tspan fill="#7ec8e3" font-weight="600">T</tspan>): <tspan fill="#7ec8e3" font-weight="600">void</tspan>;</text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Consumer&lt;Animal&gt; extends Consumer&lt;Dog&gt;</text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> c: Consumer&lt;Dog&gt; =</text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  getAnimalConsumer();  <tspan fill="#9aa4b8">// ✓ 반변</tspan></text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Animal 소비자는 Dog도 소비 가능</text>

  <!-- in out combination -->
  <text x="60" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">in out — 불변 (읽기+쓰기)</text>
  <rect x="60" y="296" width="760" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">interface</tspan> ReadWrite&lt;<tspan fill="#e05555">in</tspan> <tspan fill="#55c555">out</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt; {</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  get(): <tspan fill="#7ec8e3" font-weight="600">T</tspan>;           <tspan fill="#9aa4b8">// out 위치</tspan></text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  set(value: <tspan fill="#7ec8e3" font-weight="600">T</tspan>): <tspan fill="#7ec8e3" font-weight="600">void</tspan>;  <tspan fill="#9aa4b8">// in 위치 → 불변, 정확히 같은 타입만 가능</tspan></text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Summary -->
  <rect x="60" y="412" width="760" height="54" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">어노테이션 효과</text>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">컴파일러 추론 검증 + 성능 최적화 (분산성 계산 생략) — 라이브러리 .d.ts 선언에 특히 유용</text>
</svg>
