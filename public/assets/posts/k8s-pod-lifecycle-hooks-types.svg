<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">훅 핸들러 3가지 타입</text>

  <!-- exec handler -->
  <rect x="60" y="74" width="240" height="130" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="180" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">exec</text>
  <text x="180" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">컨테이너 내 명령 실행</text>
  <text x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">lifecycle:</text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  preStop:</text>
  <text x="80" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">    exec:</text>
  <text x="80" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" xml:space="preserve">      command: ["/shutdown"]</text>

  <!-- httpGet handler -->
  <rect x="320" y="74" width="240" height="130" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">httpGet</text>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">HTTP 엔드포인트 호출</text>
  <text x="340" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">lifecycle:</text>
  <text x="340" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  postStart:</text>
  <text x="340" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">    httpGet:</text>
  <text x="340" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" xml:space="preserve">      path: /init</text>

  <!-- tcpSocket handler -->
  <rect x="580" y="74" width="240" height="130" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="700" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">tcpSocket</text>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">TCP 포트 연결 시도</text>
  <text x="600" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">lifecycle:</text>
  <text x="600" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  postStart:</text>
  <text x="600" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">    tcpSocket:</text>
  <text x="600" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" xml:space="preserve">      port: 8080</text>

  <!-- Notes -->
  <rect x="60" y="240" width="760" height="100" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">훅 사용 시 주의사항</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; postStart: 훅 실패 시 컨테이너도 종료됨. 너무 무거운 작업은 주의</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; preStop: SIGTERM과 동시에 호출 — exec 명령이 오래 걸리면 gracePeriod 조정 필요</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; 훅은 최소 1회 실행 보장 — 멱등(idempotent)하게 작성 권장</text>
</svg>
