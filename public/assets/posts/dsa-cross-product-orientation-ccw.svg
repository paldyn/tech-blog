<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ccwA" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">외적 부호 = A→B→C 가 도는 방향</text>

  <!-- three panels -->
  <!-- panel 1 CCW -->
  <text x="190" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">반시계 (CCW)</text>
  <line x1="120" y1="280" x2="260" y2="280" stroke="#888" stroke-width="2" marker-end="url(#ccwA)"/>
  <line x1="120" y1="280" x2="210" y2="160" stroke="#888" stroke-width="2" marker-end="url(#ccwA)"/>
  <circle cx="120" cy="280" r="5" fill="#7ec8e3"/><text x="106" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">A</text>
  <circle cx="266" cy="280" r="5" fill="#7ec8e3"/><text x="272" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">B</text>
  <circle cx="216" cy="152" r="5" fill="#7ec8e3"/><text x="222" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C</text>
  <text x="190" y="332" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555" font-weight="600">cross &gt; 0</text>

  <!-- panel 2 collinear -->
  <text x="450" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">일직선 (collinear)</text>
  <line x1="380" y1="280" x2="520" y2="200" stroke="#888" stroke-width="2" marker-end="url(#ccwA)"/>
  <circle cx="380" cy="280" r="5" fill="#7ec8e3"/><text x="366" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">A</text>
  <circle cx="450" cy="240" r="5" fill="#7ec8e3"/><text x="438" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">B</text>
  <circle cx="525" cy="197" r="5" fill="#7ec8e3"/><text x="531" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C</text>
  <text x="450" y="332" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" font-weight="600">cross = 0</text>

  <!-- panel 3 CW -->
  <text x="710" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">시계 (CW)</text>
  <line x1="640" y1="280" x2="780" y2="280" stroke="#888" stroke-width="2" marker-end="url(#ccwA)"/>
  <line x1="640" y1="280" x2="730" y2="240" stroke="#888" stroke-width="2" marker-end="url(#ccwA)"/>
  <circle cx="640" cy="280" r="5" fill="#7ec8e3"/><text x="626" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">A</text>
  <circle cx="786" cy="280" r="5" fill="#7ec8e3"/><text x="780" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">B</text>
  <circle cx="736" cy="238" r="5" fill="#7ec8e3"/><text x="742" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C</text>
  <text x="710" y="332" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555" font-weight="600">cross &lt; 0</text>

  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">cross(A,B,C) = (B−A) × (C−A) — 부호 하나로 세 점의 회전 방향을 결정</text>
</svg>
