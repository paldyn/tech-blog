<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Shadow DOM 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Light DOM · Shadow DOM · Shadow Root 관계</text>

  <!-- Main document (Light DOM) -->
  <rect x="60" y="96" width="760" height="64" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Light DOM (메인 문서)</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">&lt;my-card&gt; … &lt;/my-card&gt;  |  document.querySelector('my-card')</text>

  <!-- Arrow down to host -->
  <line x1="440" y1="160" x2="440" y2="190" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,198 434,188 446,188" fill="#555"/>

  <!-- Shadow Host -->
  <rect x="240" y="198" width="400" height="48" rx="8" fill="#0d1a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Shadow Host</text>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">el.attachShadow({ mode: 'open' })  → ShadowRoot 반환</text>

  <!-- Arrow down to shadow root -->
  <line x1="440" y1="246" x2="440" y2="276" stroke="#55c555" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="440,284 434,274 446,274" fill="#55c555"/>

  <!-- Shadow Root -->
  <rect x="160" y="284" width="560" height="48" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Shadow Root  (캡슐화 경계)</text>
  <text x="440" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">document.querySelector()로 내부 접근 불가 · CSS 스코프 격리</text>

  <!-- Shadow DOM contents -->
  <rect x="200" y="352" width="480" height="48" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Shadow DOM 내부 트리</text>
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">&lt;style&gt;, &lt;slot&gt;, &lt;div&gt; …  스타일·로직 완전 캡슐화</text>

  <!-- Arrows from shadow root to contents -->
  <line x1="440" y1="332" x2="440" y2="352" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="440,352 434,342 446,342" fill="#7777cc"/>

  <!-- mode: open vs closed -->
  <rect x="60" y="426" width="370" height="50" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">mode: 'open'</text>
  <text x="80" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">el.shadowRoot 로 외부에서 접근 가능</text>

  <rect x="450" y="426" width="370" height="50" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="470" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">mode: 'closed'</text>
  <text x="470" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">el.shadowRoot === null  (완전 캡슐화)</text>
</svg>
