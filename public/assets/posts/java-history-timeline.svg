<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 620" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="620" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Java 역사 타임라인</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">1991 ~ 2023 주요 이정표</text>

  <!-- Timeline vertical line -->
  <line x1="160" y1="96" x2="160" y2="568" stroke="#222" stroke-width="2"/>

  <!-- Entry helper macro: year label | dot | title | desc -->
  <!-- 1991 -->
  <text x="148" y="112" text-anchor="end" font-size="12" font-weight="600" fill="#7777cc">1991</text>
  <circle cx="160" cy="108" r="5" fill="#7777cc"/>
  <text x="176" y="112" font-size="13" font-weight="600" fill="#e8e8e8">Project Green 시작</text>
  <text x="176" y="128" font-size="12" fill="#888">James Gosling, Oak 언어 설계. 가전제품용 소프트웨어가 목표.</text>

  <!-- 1995 -->
  <text x="148" y="164" text-anchor="end" font-size="12" font-weight="600" fill="#7ec8e3">1995</text>
  <circle cx="160" cy="160" r="6" fill="#7ec8e3"/>
  <text x="176" y="164" font-size="13" font-weight="600" fill="#e8e8e8">Java 1.0 공개 (Sun Microsystems)</text>
  <text x="176" y="180" font-size="12" fill="#888">Oak → Java 改名. "Write Once, Run Anywhere" 슬로건. Netscape 브라우저 탑재.</text>

  <!-- 1998 -->
  <text x="148" y="216" text-anchor="end" font-size="12" font-weight="600" fill="#7777cc">1998</text>
  <circle cx="160" cy="212" r="5" fill="#7777cc"/>
  <text x="176" y="216" font-size="13" font-weight="600" fill="#e8e8e8">Java 2 (J2SE 1.2) — Collections 도입</text>
  <text x="176" y="232" font-size="12" fill="#888">Swing GUI, Collections Framework, JIT 컴파일러 탑재.</text>

  <!-- 2004 -->
  <text x="148" y="268" text-anchor="end" font-size="12" font-weight="600" fill="#7777cc">2004</text>
  <circle cx="160" cy="264" r="5" fill="#7777cc"/>
  <text x="176" y="268" font-size="13" font-weight="600" fill="#e8e8e8">Java 5 (1.5) — 제네릭·어노테이션·enum</text>
  <text x="176" y="284" font-size="12" fill="#888">Generics, Annotations, Autoboxing, for-each, enum, varargs.</text>

  <!-- 2006 -->
  <text x="148" y="320" text-anchor="end" font-size="12" font-weight="600" fill="#7777cc">2006</text>
  <circle cx="160" cy="316" r="5" fill="#7777cc"/>
  <text x="176" y="320" font-size="13" font-weight="600" fill="#e8e8e8">OpenJDK — Java 오픈소스화</text>
  <text x="176" y="336" font-size="12" fill="#888">Sun이 Java SE를 GPL v2로 오픈소스 공개. OpenJDK 프로젝트 시작.</text>

  <!-- 2014 / Java 8 LTS -->
  <text x="148" y="372" text-anchor="end" font-size="12" font-weight="600" fill="#55c555">2014</text>
  <circle cx="160" cy="368" r="7" fill="#55c555"/>
  <rect x="176" y="354" width="632" height="34" fill="#071407" rx="5" stroke="#1a3a1a" stroke-width="1"/>
  <text x="186" y="373" font-size="13" font-weight="700" fill="#55c555">Java 8 LTS — Lambda · Stream · Optional · java.time</text>
  <text x="176" y="402" font-size="12" fill="#888">가장 오래 사용된 LTS. 함수형 프로그래밍 패러다임 도입.</text>

  <!-- 2017 Oracle JDK -->
  <text x="148" y="436" text-anchor="end" font-size="12" font-weight="600" fill="#7777cc">2017</text>
  <circle cx="160" cy="432" r="5" fill="#7777cc"/>
  <text x="176" y="436" font-size="13" font-weight="600" fill="#e8e8e8">Java 9 — 모듈 시스템 (Jigsaw)</text>
  <text x="176" y="452" font-size="12" fill="#888">JPMS(Java Platform Module System). 6개월 릴리스 사이클 도입.</text>

  <!-- 2018 Java 11 LTS -->
  <text x="148" y="488" text-anchor="end" font-size="12" font-weight="600" fill="#55c555">2018</text>
  <circle cx="160" cy="484" r="7" fill="#55c555"/>
  <rect x="176" y="470" width="500" height="34" fill="#071407" rx="5" stroke="#1a3a1a" stroke-width="1"/>
  <text x="186" y="489" font-size="13" font-weight="700" fill="#55c555">Java 11 LTS — HttpClient · var in lambda · Oracle 유료화</text>
  <text x="176" y="518" font-size="12" fill="#888">Oracle JDK 상업 사용 유료 전환. OpenJDK 배포판 다양화.</text>

  <!-- 2021 Java 17 LTS -->
  <text x="148" y="554" text-anchor="end" font-size="12" font-weight="600" fill="#55c555">2021</text>
  <circle cx="160" cy="550" r="7" fill="#55c555"/>
  <rect x="176" y="536" width="540" height="34" fill="#071407" rx="5" stroke="#1a3a1a" stroke-width="1"/>
  <text x="186" y="555" font-size="13" font-weight="700" fill="#55c555">Java 17 LTS — sealed · Pattern Matching · Records 정식</text>
  <text x="176" y="568" font-size="12" fill="#888">현대적 언어 기능 완성. Java 8 이후 가장 큰 업그레이드.</text>

  <!-- LTS legend -->
  <circle cx="700" y="580" r="6" fill="#55c555"/>
  <text x="712" y="584" font-size="11" fill="#55c555">LTS 버전</text>
  <circle cx="770" y="580" r="5" fill="#7777cc"/>
  <text x="782" y="584" font-size="11" fill="#7777cc">일반 릴리스</text>

  <!-- Footer -->
  <text x="440" y="600" text-anchor="middle" font-size="11" fill="#444">Java 완전 정복 시리즈 — Part I. 언어의 본질과 역사 | PALDYN</text>
</svg>
