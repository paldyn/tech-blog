<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Multi-Head Attention 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">h개 독립 헤드 병렬 실행 → Concat → 선형 투영</text>

  <!-- Input X -->
  <rect x="340" y="88" width="200" height="40" rx="6" fill="#0d1117" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">입력 X ∈ R^{n × d_model}</text>

  <!-- 4 heads -->
  <!-- Head 1 -->
  <line x1="390" y1="128" x2="130" y2="172" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="60" y="172" width="140" height="80" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Head 1</text>
  <text x="130" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">W_Q¹,W_K¹,W_V¹</text>
  <text x="130" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">d_k = d_model/h</text>

  <!-- Head 2 -->
  <line x1="410" y1="128" x2="310" y2="172" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="240" y="172" width="140" height="80" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="310" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Head 2</text>
  <text x="310" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">W_Q²,W_K²,W_V²</text>
  <text x="310" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">독립된 표현 공간</text>

  <!-- Head 3 -->
  <line x1="470" y1="128" x2="570" y2="172" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="500" y="172" width="140" height="80" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="570" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Head 3</text>
  <text x="570" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">W_Q³,W_K³,W_V³</text>
  <text x="570" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">다른 관계 포착</text>

  <!-- Head h (last) -->
  <line x1="490" y1="128" x2="750" y2="172" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="680" y="172" width="140" height="80" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="750" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Head h</text>
  <text x="750" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">W_Qʰ,W_Kʰ,W_Vʰ</text>
  <text x="750" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">h=8 (BERT-base)</text>

  <!-- Concat box -->
  <rect x="190" y="284" width="500" height="50" rx="8" fill="#111" stroke="#e8e8e8" stroke-width="2"/>
  <text x="440" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Concat [head₁ ; head₂ ; ... ; headₕ] ∈ R^{n × d_model}</text>

  <!-- Arrows from heads to concat -->
  <line x1="130" y1="252" x2="250" y2="282" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="248,278 252,290 258,280" fill="#7ec8e3"/>
  <line x1="310" y1="252" x2="360" y2="282" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="358,278 362,290 368,280" fill="#55c555"/>
  <line x1="570" y1="252" x2="530" y2="282" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="524,280 530,292 536,280" fill="#e05555"/>
  <line x1="750" y1="252" x2="660" y2="282" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="654,280 660,292 666,280" fill="#7777cc"/>

  <!-- W_O linear -->
  <rect x="300" y="358" width="280" height="44" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc">× W_O  (출력 선형 투영)</text>
  <line x1="440" y1="334" x2="440" y2="356" stroke="#e8e8e8" stroke-width="2"/>
  <polygon points="434,356 440,368 446,356" fill="#e8e8e8"/>

  <!-- Final output -->
  <rect x="330" y="420" width="220" height="40" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="445" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">출력 ∈ R^{n × d_model}</text>
  <line x1="440" y1="402" x2="440" y2="418" stroke="#7777cc" stroke-width="2"/>
  <polygon points="434,418 440,430 446,418" fill="#7777cc"/>
</svg>
