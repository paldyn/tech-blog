<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Richardson 성숙도 모델</text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Level 0 → Level 3으로 올라갈수록 REST 원칙에 충실한 API</text>

  <!-- Level 3: HATEOAS (top, brightest) -->
  <rect x="60" y="96" width="760" height="78" rx="8" fill="#0a1e0f" stroke="#55c555" stroke-width="2"/>
  <text x="80" y="124"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Level 3 — Hypermedia Controls (HATEOAS)</text>
  <text x="80" y="144"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aacaaa">응답 본문에 관련 리소스 링크 포함 → 클라이언트가 다음 행동을 응답에서 발견</text>
  <text x="80" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666">예: { "id": 1, "_links": { "self": "/users/1", "orders": "/users/1/orders" } }</text>

  <!-- Level 2: HTTP Verbs -->
  <rect x="60" y="192" width="760" height="78" rx="8" fill="#0a0f1e" stroke="#4a8ac8" stroke-width="2"/>
  <text x="80" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Level 2 — HTTP Verbs</text>
  <text x="80" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aab8cc">여러 URI + 올바른 HTTP 메서드 사용 (GET/POST/PUT/PATCH/DELETE)</text>
  <text x="80" y="258"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666">예: GET /users, POST /users, DELETE /users/1 — 대부분의 REST API가 이 수준</text>

  <!-- Level 1: Resources -->
  <rect x="60" y="288" width="760" height="78" rx="8" fill="#1e1e0a" stroke="#c8a03a" stroke-width="2"/>
  <text x="80" y="316"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#c8b060">Level 1 — Resources</text>
  <text x="80" y="336"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c0aa">각 리소스에 개별 URI가 존재하지만 메서드는 GET/POST만 사용</text>
  <text x="80" y="354"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666">예: GET /users, GET /orders — URI는 분리되었으나 HTTP 메서드 의미 무시</text>

  <!-- Level 0: POX (bottom, dimmest) -->
  <rect x="60" y="384" width="760" height="78" rx="8" fill="#1e0a0a" stroke="#9e4a3a" stroke-width="1.5"/>
  <text x="80" y="412"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e07070">Level 0 — The Swamp of POX</text>
  <text x="80" y="432"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8aaaa">단일 URI에 POST만 사용 — SOAP, XML-RPC 스타일</text>
  <text x="80" y="450"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666">예: POST /api  { "action": "getUser", "id": 1 } — 행위를 본문에 담음</text>
</svg>
