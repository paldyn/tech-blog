<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">전체 프로그램 vs 파일 단위 변환</text>

  <rect x="50" y="84" width="360" height="180" rx="8" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="72" y="112" font-size="15" font-weight="600" fill="#e8e8e8">tsc — 전체 프로그램</text>
  <text x="72" y="142" font-size="12" fill="#888">모든 파일을 함께 분석</text>
  <text x="72" y="166" font-size="12" fill="#888">import한 이름이 타입인지</text>
  <text x="72" y="186" font-size="12" fill="#888">값인지 다른 파일을 봐서 앎</text>
  <text x="72" y="216" font-size="12" fill="#888">→ 어떤 코드든 변환 가능</text>
  <text x="72" y="244" font-size="12" fill="#55c555">느리지만 정확</text>

  <rect x="470" y="84" width="360" height="180" rx="8" fill="#11151c" stroke="#e05555" stroke-width="1.5"/>
  <text x="492" y="112" font-size="15" font-weight="600" fill="#e8e8e8">esbuild·swc·Babel</text>
  <text x="492" y="142" font-size="12" fill="#888">한 파일씩 독립적으로 변환</text>
  <text x="492" y="166" font-size="12" fill="#888">다른 파일을 보지 않음</text>
  <text x="492" y="186" font-size="12" fill="#888">타입/값 구분을 못 하는</text>
  <text x="492" y="206" font-size="12" fill="#888">코드가 있으면 깨짐</text>
  <text x="492" y="244" font-size="12" fill="#e05555">빠르지만 제약 있음</text>

  <text x="60" y="300" font-size="13" fill="#9aa4b8">isolatedModules는 "한 파일만 봐도 안전한 코드"인지를 tsc가 미리 검사하게 한다.</text>
</svg>
