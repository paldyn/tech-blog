<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">파일 업로드 진행률 UI</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">ProgressBar + onprogress 이벤트 조합</text>

  <!-- Overall progress -->
  <rect x="60" y="96" width="760" height="100" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">전체 진행률</text>
  <text x="76" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전체</text>
  <rect x="108" y="134" width="620" height="20" rx="4" fill="#1e2433"/>
  <rect x="108" y="134" width="465" height="20" rx="4" fill="#7ec8e3"/>
  <text x="740" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">75%</text>
  <text x="76" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현재 파일: 보고서.pdf (3.2MB / 4.0MB)</text>
  <text x="440" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">파일 3/4 업로드 중...</text>

  <!-- Per-file progress list -->
  <rect x="60" y="216" width="760" height="180" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">파일별 상태</text>

  <!-- File 1 - done -->
  <text x="76" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">계약서.pdf</text>
  <rect x="200" y="254" width="520" height="16" rx="3" fill="#1e2433"/>
  <rect x="200" y="254" width="520" height="16" rx="3" fill="#55c555"/>
  <text x="732" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">완료</text>

  <!-- File 2 - done -->
  <text x="76" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">사진모음.zip</text>
  <rect x="200" y="280" width="520" height="16" rx="3" fill="#1e2433"/>
  <rect x="200" y="280" width="520" height="16" rx="3" fill="#55c555"/>
  <text x="732" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">완료</text>

  <!-- File 3 - in progress -->
  <text x="76" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">보고서.pdf</text>
  <rect x="200" y="306" width="520" height="16" rx="3" fill="#1e2433"/>
  <rect x="200" y="306" width="390" height="16" rx="3" fill="#7ec8e3"/>
  <text x="732" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">75%</text>

  <!-- File 4 - waiting -->
  <text x="76" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">설계서.xlsx</text>
  <rect x="200" y="332" width="520" height="16" rx="3" fill="#1e2433"/>
  <text x="732" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대기</text>

  <!-- Cancel button area -->
  <rect x="340" y="406" width="200" height="20" rx="4" fill="#1e2433"/>
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">업로드 취소</text>
</svg>
