<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">mtr — 실시간 네트워크 경로 모니터링</text>

  <!-- mtr header simulation -->
  <rect x="50" y="66" width="780" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- mtr title bar -->
  <rect x="50" y="66" width="780" height="30" rx="8" fill="#0d1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="86" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">My traceroute [v0.95]  example.com (93.184.216.34)  Keys: H=Help D=Display</text>

  <!-- Header row -->
  <text x="68" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">Host                        Loss%   Snt   Last   Avg   Best   Wrst  StDev</text>
  <line x1="68" y1="122" x2="812" y2="122" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="68" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> 1. <tspan fill="#55c555">192.168.1.1</tspan>           0.0%   10    0.4    0.4    0.3    0.5   0.1</text>

  <!-- Row 2 -->
  <text x="68" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> 2. <tspan fill="#7ec8e3">10.10.10.1</tspan>            0.0%   10    2.1    2.2    2.0    2.5   0.2</text>

  <!-- Row 3: packet loss -->
  <text x="68" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> 3. ???                       <tspan fill="#e05555">100.0%</tspan>  10   ---   ---   ---   ---   ---</text>

  <!-- Row 4 -->
  <text x="68" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> 4. <tspan fill="#7ec8e3">203.0.113.1</tspan>           0.0%   10   15.2  15.3  14.8  16.0   0.4</text>

  <!-- Row 5: high latency -->
  <text x="68" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> 5. <tspan fill="#e0a055">198.51.100.45</tspan>          0.0%   10  <tspan fill="#e05555"> 145.1  148.3</tspan>  143.2  158.9   4.2</text>

  <!-- Row 6 -->
  <text x="68" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> 6. <tspan fill="#e0a055">93.184.216.34</tspan>          0.0%   10   18.2  18.5  17.9  19.1   0.4</text>

  <!-- Column annotations -->
  <text x="68" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Loss% = 패킷 유실률  Snt = 전송된 프로브 수  Last = 최근 RTT  Avg = 평균 RTT</text>
  <text x="68" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Best = 최소 RTT  Wrst = 최대 RTT  StDev = RTT 표준편차 (지터)</text>
  <text x="68" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">홉 3 Loss 100%: ICMP 필터링 (경로는 정상) | 홉 5 RTT 급증: 해당 구간 병목 가능성</text>
  <text x="68" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">StDev 높으면 지터(Jitter) 큼 → 실시간 통신(VoIP, 게임) 품질 저하</text>

  <!-- Command -->
  <rect x="50" y="388" width="780" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">$ <tspan fill="#7ec8e3" font-weight="600">mtr</tspan> -n --report --report-cycles=20 example.com    <tspan fill="#9aa4b8"># 20회 측정 후 보고서 출력</tspan></text>
</svg>
