<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">VPN 터널링 원리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">암호화된 가상 터널로 공용망을 전용망처럼 사용</text>

  <defs>
    <marker id="vpnArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="vpnArrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 클라이언트 -->
  <rect x="60" y="155" width="130" height="64" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">클라이언트</text>
  <text x="125" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">10.0.0.2</text>
  <text x="125" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">VPN 클라이언트 앱</text>

  <!-- VPN 게이트웨이 왼쪽 -->
  <rect x="240" y="140" width="140" height="96" rx="8" fill="#0a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="310" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">VPN 게이트웨이</text>
  <text x="310" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">203.0.113.1</text>
  <text x="310" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">암호화 / 캡슐화</text>
  <text x="310" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">IKEv2 / IPSec</text>

  <!-- 인터넷 (공용망) -->
  <rect x="390" y="148" width="100" height="80" rx="8" fill="#2a2a1a" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="440" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c44a">인터넷</text>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">공용망</text>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">암호화된 패킷만 통과</text>

  <!-- VPN 게이트웨이 오른쪽 -->
  <rect x="500" y="140" width="140" height="96" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">VPN 게이트웨이</text>
  <text x="570" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">203.0.113.100</text>
  <text x="570" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">복호화 / 역캡슐화</text>
  <text x="570" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">사내망 접근 허용</text>

  <!-- 사내 서버 -->
  <rect x="690" y="155" width="130" height="64" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">사내 서버</text>
  <text x="755" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">192.168.10.5</text>
  <text x="755" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">내부망 전용</text>

  <!-- 일반 트래픽 (위) -->
  <line x1="190" y1="163" x2="240" y2="163" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#vpnArr)"/>
  <text x="215" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">평문</text>

  <!-- 암호화 터널 (가운데) -->
  <rect x="240" y="252" width="500" height="32" rx="6" fill="#0a1520" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="490" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">🔒 암호화된 VPN 터널 (ESP/IKEv2)</text>

  <!-- 패킷 캡슐화 설명 -->
  <rect x="60" y="310" width="760" height="108" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># IPSec 터널 모드: 원본 패킷 전체를 ESP로 감쌈</text>
  <text x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 원본:  [IP: 10.0.0.2→192.168.10.5][TCP][데이터]</text>
  <text x="80" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">캡슐화:</text>
  <text x="164" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">[IP: 203.0.113.1→203.0.113.100]</text>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">         [ESP 헤더][암호화된 원본 패킷 전체][ESP 트레일러]</text>
  <text x="80" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 공용망에서는 외부 IP만 보임, 내부 IP/포트는 암호화</text>
</svg>
