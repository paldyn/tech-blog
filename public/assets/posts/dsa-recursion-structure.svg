<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">재귀 구조 - factorial &amp; fibonacci</text>

  <!-- Left: factorial code -->
  <text x="80" y="76" font-size="16" font-weight="600" fill="#e8e8e8">factorial (선형 재귀)</text>

  <rect x="60" y="86" width="360" height="172" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">factorial(n: </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="80" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  # Base case</tspan></text>

  <text x="80" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> n &lt;= </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="80" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan></text>

  <text x="80" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  # Recursive case</tspan></text>

  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> n * factorial(n - </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="80" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  # O(N) time, O(N) space</tspan></text>

  <!-- factorial annotation -->
  <rect x="60" y="268" width="360" height="60" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="290" font-size="13" fill="#55c555" text-anchor="middle">호출 체인: fact(n) - fact(n-1) - ... - fact(1)</text>
  <text x="240" y="310" font-size="12" fill="#888" text-anchor="middle">각 호출이 단 하나의 재귀 호출 - 선형 재귀(Linear Recursion)</text>
  <text x="240" y="324" font-size="12" fill="#888" text-anchor="middle">공간: O(N) 콜스택 누적</text>

  <!-- Right: fibonacci code -->
  <text x="480" y="76" font-size="16" font-weight="600" fill="#e8e8e8">fibonacci (이진 재귀)</text>

  <rect x="460" y="86" width="360" height="172" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="480" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">fibonacci(n: </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="480" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> n &lt;= </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">:    </tspan><tspan fill="#9aa4b8"># base case</tspan></text>

  <text x="480" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> n</tspan></text>

  <text x="480" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (fibonacci(n-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="480" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        + fibonacci(n-</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">))</tspan></text>

  <text x="480" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  # Naive: O(2^N) time</tspan></text>

  <text x="480" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  # Memoized: O(N)</tspan></text>

  <!-- fibonacci annotation -->
  <rect x="460" y="268" width="360" height="60" rx="6" fill="#2a1a0a" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="290" font-size="13" fill="#e05555" text-anchor="middle">각 호출이 2개 재귀 호출 - 이진 재귀</text>
  <text x="640" y="310" font-size="12" fill="#888" text-anchor="middle">중복 계산 폭발: fib(n) 호출 수 = O(2^N)</text>
  <text x="640" y="324" font-size="12" fill="#888" text-anchor="middle">메모이제이션으로 O(N)으로 최적화 필수</text>

  <!-- Bottom: recursion structure diagram -->
  <rect x="60" y="348" width="760" height="108" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="370" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">재귀 함수의 3요소</text>

  <!-- Element 1 -->
  <rect x="80" y="380" width="190" height="64" rx="5" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="175" y="400" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">1. 기저 조건 (Base Case)</text>
  <text x="175" y="420" font-size="12" fill="#888" text-anchor="middle">재귀를 멈추는 조건</text>
  <text x="175" y="436" font-size="12" fill="#888" text-anchor="middle">반드시 도달 가능해야 함</text>

  <!-- Element 2 -->
  <rect x="285" y="380" width="190" height="64" rx="5" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="380" y="400" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">2. 재귀 케이스</text>
  <text x="380" y="420" font-size="12" fill="#888" text-anchor="middle">더 작은 부분 문제 호출</text>
  <text x="380" y="436" font-size="12" fill="#888" text-anchor="middle">반드시 기저 조건에 수렴</text>

  <!-- Element 3 -->
  <rect x="490" y="380" width="190" height="64" rx="5" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="585" y="400" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">3. 결합 (Combine)</text>
  <text x="585" y="420" font-size="12" fill="#888" text-anchor="middle">하위 결과를 합쳐 반환</text>
  <text x="585" y="436" font-size="12" fill="#888" text-anchor="middle">ex) n * factorial(n-1)</text>
</svg>
