<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a6ea8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">postMessage 통신 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">크로스 오리진 메시지 전달 원리와 보안 포인트</text>

  <!-- Sender box -->
  <rect x="60" y="100" width="280" height="260" rx="8" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="200" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">발신자 (Sender)</text>
  <text x="200" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">parent.example.com</text>

  <!-- Sender code -->
  <rect x="80" y="162" width="240" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#aaa">const msg = {</text>
  <text x="96" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#aaa">  type: <text fill="#ce9178">'AUTH_DONE'</text></text>
  <text x="96" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#aaa">};</text>
  <text x="96" y="229" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">iframe</text>
  <text x="141" y="229" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#aaa">.contentWindow</text>
  <text x="96" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#aaa">  .postMessage(msg,</text>

  <rect x="80" y="265" width="240" height="30" rx="4" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1"/>
  <text x="200" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">targetOrigin 명시 필수!</text>

  <text x="200" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">targetOrigin = '*' 금지</text>
  <text x="200" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">정확한 오리진을 지정해야</text>
  <text x="200" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">의도한 수신자만 받는다</text>

  <!-- Center arrow -->
  <line x1="345" y1="230" x2="530" y2="230" stroke="#3a6ea8" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">postMessage</text>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">비동기 이벤트 전달</text>

  <!-- Receiver box -->
  <rect x="535" y="100" width="285" height="260" rx="8" fill="#0f0d18" stroke="#8a3aa8" stroke-width="1.5"/>
  <text x="677" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b07ad0" text-anchor="middle">수신자 (Receiver)</text>
  <text x="677" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">widget.example.com</text>

  <!-- Receiver code -->
  <rect x="555" y="162" width="245" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="571" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">window</text>
  <text x="616" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#aaa">.addEventListener(</text>
  <text x="571" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ce9178">  'message'</text>
  <text x="651" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#aaa">, e =&gt; {</text>
  <text x="571" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#9aa4b8">  // ① origin 검증</text>
  <text x="571" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#7ec8e3" font-weight="600">  if </text>
  <text x="594" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#aaa">(e.origin !==</text>
  <text x="571" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ce9178">      TRUSTED_ORIGIN</text>
  <text x="571" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#aaa">  ) </text>
  <text x="588" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#7ec8e3" font-weight="600">return</text>
  <text x="627" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#aaa">;</text>
  <text x="571" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#9aa4b8">  // ② data 처리</text>
  <text x="571" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#aaa">});</text>

  <!-- Bottom legend -->
  <rect x="60" y="390" width="360" height="50" rx="6" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1"/>
  <text x="240" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">안전한 패턴</text>
  <text x="240" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정확한 targetOrigin + origin 검증</text>

  <rect x="460" y="390" width="360" height="50" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">취약한 패턴</text>
  <text x="640" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">postMessage(data, '*') + origin 미검증</text>
</svg>
