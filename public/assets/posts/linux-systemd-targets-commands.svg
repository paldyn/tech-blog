<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">타겟 관련 명령어</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">기본 타겟 설정과 복구 모드 진입</text>

  <!-- Left: default target -->
  <rect x="60" y="88" width="370" height="280" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기본 타겟 관리</text>

  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ systemctl get-default</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">graphical.target</text>

  <text x="76" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ systemctl set-default multi-user.target</text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 다음 부팅부터 텍스트 모드</text>

  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ systemctl list-units --type=target</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 현재 활성 타겟 목록</text>

  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">$ systemctl isolate multi-user.target</text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 즉시 타겟 전환 (현재 세션)</text>

  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">$ systemctl isolate rescue.target</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 복구 모드 진입 (root 비번 필요)</text>

  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">$ systemctl isolate emergency.target</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 최소 환경 (파일시스템 ro)</text>

  <!-- Right: GRUB kernel params -->
  <rect x="450" y="88" width="370" height="280" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="466" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">GRUB 부팅 시 타겟 변경</text>

  <text x="466" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1. 부팅 시 GRUB에서 e키 (편집 모드)</text>
  <text x="466" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2. linux 줄 끝에 타겟 추가:</text>

  <text x="466" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">systemd.unit=rescue.target</text>
  <text x="466" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">systemd.unit=emergency.target</text>
  <text x="466" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">systemd.unit=multi-user.target</text>

  <text x="466" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3. Ctrl+X 로 부팅</text>

  <line x1="466" y1="252" x2="800" y2="252" stroke="#1e2433" stroke-width="1"/>
  <text x="466" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">나만의 타겟 만들기</text>

  <text x="466" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">[Unit]</text>
  <text x="466" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Description=Dev Environment</text>
  <text x="466" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Requires=multi-user.target</text>
  <text x="466" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">AllowIsolate=yes</text>
  <text x="466" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">[Install]</text>

  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">emergency.target은 파일시스템이 읽기 전용 — 복구 작업 시 mount -o remount,rw /</text>
</svg>
