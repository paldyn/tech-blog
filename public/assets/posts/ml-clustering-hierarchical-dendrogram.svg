<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="68" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="56" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="36" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">계층적 군집화: 덴드로그램 읽는 법</text>
  <text x="60" y="58" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">높이(Height) = 병합 거리 | 수평 절단선 = 군집 수 결정</text>
  <line x1="60" y1="78" x2="820" y2="78" stroke="#1e2433" stroke-width="1"/>

  <!-- LEFT: Dendrogram visualization -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">덴드로그램 (Dendrogram)</text>

  <!-- Y-axis label -->
  <text x="68" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">거리</text>
  <text x="65" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">250</text>
  <text x="65" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">180</text>
  <text x="65" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">120</text>
  <text x="65" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">60</text>
  <text x="65" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">20</text>
  <text x="65" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">0</text>

  <!-- Y axis -->
  <line x1="90" y1="112" x2="90" y2="340" stroke="#2a2a3a" stroke-width="1"/>
  <!-- Y grid lines -->
  <line x1="90" y1="120" x2="500" y2="120" stroke="#1a1a2a" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="90" y1="163" x2="500" y2="163" stroke="#1a1a2a" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="90" y1="206" x2="500" y2="206" stroke="#1a1a2a" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="90" y1="254" x2="500" y2="254" stroke="#1a1a2a" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="90" y1="302" x2="500" y2="302" stroke="#1a1a2a" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Leaf node positions (bottom, y=340) -->
  <!-- A(120) B(160) C(220) D(270) E(330) F(380) G(440) H(480) -->
  <!-- Leaf labels -->
  <text x="120" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">A</text>
  <text x="160" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">B</text>
  <text x="220" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">C</text>
  <text x="270" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">D</text>
  <text x="340" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">E</text>
  <text x="390" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">F</text>
  <text x="450" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">G</text>
  <text x="490" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">H</text>

  <!-- Level 1 merges (distance ~20, y=302) -->
  <!-- Merge A+B at y=318 -->
  <line x1="120" y1="340" x2="120" y2="318" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="160" y1="340" x2="160" y2="318" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="120" y1="318" x2="160" y2="318" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Merge C+D at y=310 -->
  <line x1="220" y1="340" x2="220" y2="310" stroke="#55c555" stroke-width="2"/>
  <line x1="270" y1="340" x2="270" y2="310" stroke="#55c555" stroke-width="2"/>
  <line x1="220" y1="310" x2="270" y2="310" stroke="#55c555" stroke-width="2"/>

  <!-- Merge E+F at y=320 -->
  <line x1="340" y1="340" x2="340" y2="320" stroke="#ce9178" stroke-width="2"/>
  <line x1="390" y1="340" x2="390" y2="320" stroke="#ce9178" stroke-width="2"/>
  <line x1="340" y1="320" x2="390" y2="320" stroke="#ce9178" stroke-width="2"/>

  <!-- Merge G+H at y=308 -->
  <line x1="450" y1="340" x2="450" y2="308" stroke="#7777cc" stroke-width="2"/>
  <line x1="490" y1="340" x2="490" y2="308" stroke="#7777cc" stroke-width="2"/>
  <line x1="450" y1="308" x2="490" y2="308" stroke="#7777cc" stroke-width="2"/>

  <!-- Level 2 merges (distance ~120, y=206) -->
  <!-- Merge (A,B)+(C,D) at y=206 -->
  <line x1="140" y1="318" x2="140" y2="206" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="245" y1="310" x2="245" y2="206" stroke="#55c555" stroke-width="2"/>
  <line x1="140" y1="206" x2="245" y2="206" stroke="#e8e8e8" stroke-width="2"/>

  <!-- Merge (E,F)+(G,H) at y=218 -->
  <line x1="365" y1="320" x2="365" y2="218" stroke="#ce9178" stroke-width="2"/>
  <line x1="470" y1="308" x2="470" y2="218" stroke="#7777cc" stroke-width="2"/>
  <line x1="365" y1="218" x2="470" y2="218" stroke="#e8e8e8" stroke-width="2"/>

  <!-- Level 3: root merge (distance ~250, y=120) -->
  <line x1="192" y1="206" x2="192" y2="120" stroke="#e8e8e8" stroke-width="2"/>
  <line x1="417" y1="218" x2="417" y2="120" stroke="#e8e8e8" stroke-width="2"/>
  <line x1="192" y1="120" x2="417" y2="120" stroke="#e8e8e8" stroke-width="2.5"/>

  <!-- CUT LINE at K=3 clusters -->
  <line x1="90" y1="190" x2="510" y2="190" stroke="#e05555" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="514" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" font-weight="600">K=3 절단</text>

  <!-- Cluster labels at cut -->
  <text x="192" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">군집 1</text>
  <text x="365" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">군집 2</text>
  <text x="470" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">군집 3</text>

  <!-- Height annotation arrow -->
  <line x1="82" y1="120" x2="82" y2="190" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="82,120 78,132 86,132" fill="#e05555"/>
  <polygon points="82,190 78,178 86,178" fill="#e05555"/>
  <text x="54" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" transform="rotate(-90,54,158)">병합 거리</text>

  <!-- RIGHT: Explanation panel -->
  <rect x="548" y="90" width="290" height="300" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="568" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">덴드로그램 읽는 법</text>

  <!-- Rule 1 -->
  <rect x="564" y="124" width="6" height="42" rx="3" fill="#7ec8e3"/>
  <text x="578" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">가로 선의 높이</text>
  <text x="578" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">두 군집이 합쳐지는 거리(비유사도)</text>
  <text x="578" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">높을수록 더 이질적인 군집의 병합</text>

  <!-- Rule 2 -->
  <rect x="564" y="182" width="6" height="42" rx="3" fill="#55c555"/>
  <text x="578" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">수평 절단선</text>
  <text x="578" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">선이 자르는 수직 선의 수 = K</text>
  <text x="578" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">큰 점프 위에 자르면 최적의 K</text>

  <!-- Rule 3 -->
  <rect x="564" y="240" width="6" height="42" rx="3" fill="#e05555"/>
  <text x="578" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">최적 절단 위치</text>
  <text x="578" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가장 긴 수직 선 위치 = 큰 거리 점프</text>
  <text x="578" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 자연스러운 군집 경계 탐지</text>

  <!-- Rule 4 -->
  <rect x="564" y="298" width="6" height="30" rx="3" fill="#7777cc"/>
  <text x="578" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">잎(Leaf)</text>
  <text x="578" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">개별 데이터 포인트 (맨 아래)</text>

  <!-- Bottom direction labels -->
  <text x="130" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Bottom-up: 개별 → 전체 병합</text>

  <!-- Footer -->
  <text x="440" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
