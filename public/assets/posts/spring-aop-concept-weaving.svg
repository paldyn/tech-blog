<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
<rect width="880" height="460" rx="12" fill="#0a0a0a"/>

<!-- Title -->
<text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Spring AOP 동작 원리</text>
<text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">프록시 객체가 호출을 가로채 Aspect 로직을 실행</text>

<!-- ── Top row: Components ── -->

<!-- Caller box -->
<rect x="60" y="104" width="150" height="60" rx="8" fill="#13131f" stroke="#2a2a44" stroke-width="1.5"/>
<text x="135" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">호출자</text>
<text x="135" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Controller 등</text>

<!-- Arrow Caller → Proxy -->
<line x1="210" y1="134" x2="252" y2="134" stroke="#7ec8e3" stroke-width="2.5"/>
<polygon points="250,127 264,134 250,141" fill="#7ec8e3" stroke="#0c1c2e" stroke-width="1"/>

<!-- Proxy box -->
<rect x="264" y="92" width="200" height="84" rx="8" fill="#0c1c2e" stroke="#7ec8e3" stroke-width="2"/>
<text x="364" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Spring 프록시</text>
<text x="364" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" opacity="0.8">JDK Dynamic Proxy</text>
<text x="364" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" opacity="0.8">또는 CGLIB Proxy</text>
<text x="364" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Aspect 로직 삽입</text>

<!-- Arrow Proxy → Target -->
<line x1="464" y1="134" x2="506" y2="134" stroke="#55c555" stroke-width="2.5"/>
<polygon points="504,127 518,134 504,141" fill="#55c555" stroke="#0a1a0a" stroke-width="1"/>

<!-- Target box -->
<rect x="518" y="104" width="170" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
<text x="603" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">대상 객체</text>
<text x="603" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실제 Service 빈</text>

<!-- Arrow from proxy down to Aspect -->
<line x1="364" y1="176" x2="364" y2="214" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
<polygon points="357,212 371,212 364,224" fill="#7ec8e3"/>

<!-- Aspect execution box -->
<rect x="200" y="224" width="330" height="110" rx="8" fill="#0a0f1a" stroke="#7ec8e3" stroke-width="1.5"/>
<text x="365" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Aspect 실행 순서</text>
<text x="216" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cccccc">① @Before — 대상 메서드 실행 전</text>
<text x="216" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">② 대상 객체 메서드 실행</text>
<text x="216" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cccccc">③ @AfterReturning / @AfterThrowing</text>
<text x="216" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cccccc">④ @After — 정상/예외 관계없이 실행</text>

<!-- ── Bottom row: Proxy types ── -->
<text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Spring AOP 프록시 방식 선택</text>

<!-- JDK Proxy box -->
<rect x="60" y="380" width="350" height="54" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
<text x="76" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">JDK Dynamic Proxy</text>
<text x="76" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">인터페이스 기반 — 대상 클래스가 인터페이스 구현 시</text>
<text x="76" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">java.lang.reflect.Proxy 사용</text>

<!-- CGLIB Proxy box -->
<rect x="470" y="380" width="350" height="54" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
<text x="486" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#9999ee">CGLIB Proxy</text>
<text x="486" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">클래스 상속 기반 — 인터페이스 없는 클래스에 적용</text>
<text x="486" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Spring Boot는 CGLIB를 기본 사용</text>

<!-- Footer -->
<text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — Spring 완전 정복</text>
</svg>
