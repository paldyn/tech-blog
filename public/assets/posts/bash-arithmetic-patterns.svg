<svg width="880" height="360" viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">산술 연산 실전 패턴</text>

  <rect x="60" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">일반 패턴</text>
  <rect x="60" y="106" width="370" height="222" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 바이트 단위 변환</text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">bytes=</tspan><tspan fill="#b5cea8">1073741824</tspan></text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"$(( bytes / 1024 / 1024 )) MB"</tspan></text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 짝수/홀수 판별</text>
  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> n </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> {1..10}; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="76" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  (( n % </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> == </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> )) &amp;&amp; </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"$n 짝수"</tspan></text>
  <text x="76" y="252" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="76" y="270" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="76" y="288" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 삼항 연산자</text>
  <text x="76" y="306" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">max=$(( a &gt; b ? a : b ))</tspan></text>

  <rect x="450" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">부동소수 / 진법 변환</text>
  <rect x="450" y="106" width="370" height="222" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># bc — 소수점 계산</text>
  <text x="466" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">rate=$(</tspan><tspan fill="#7ec8e3" font-weight="600">bc</tspan><tspan fill="#ffffff"> &lt;&lt;&lt; </tspan><tspan fill="#ce9178">"scale=2; $used/$total*100"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="466" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"사용률: ${rate}%"</tspan></text>
  <text x="466" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="466" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 16진수 변환</text>
  <text x="466" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">dec=</tspan><tspan fill="#b5cea8">255</tspan></text>
  <text x="466" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">printf</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"0x%X\n"</tspan><tspan fill="#ffffff"> $dec</tspan><tspan fill="#9aa4b8">  # 0xFF</tspan></text>
  <text x="466" y="252" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $(( 16#FF ))</tspan><tspan fill="#9aa4b8">   # 255</tspan></text>
  <text x="466" y="270" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="466" y="288" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># awk — 부동소수 출력</text>
  <text x="466" y="306" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">awk</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"BEGIN{printf \"%.3f\n\",22/7}"</tspan></text>
</svg>
