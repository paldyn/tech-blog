<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
<rect width="880" height="460" rx="12" fill="#0a0a0a"/>

<!-- Title -->
<text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Property Source 우선순위</text>
<text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">높은 우선순위가 낮은 우선순위를 덮어씁니다</text>

<!-- Priority arrow on right -->
<line x1="828" y1="92" x2="828" y2="390" stroke="#555555" stroke-width="2" stroke-dasharray="4,3"/>
<text x="848" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" transform="rotate(90,848,200)">우선순위 낮아짐 ↓</text>
<polygon points="822,388 834,388 828,398" fill="#555555"/>

<!-- Layer 1: JVM 시스템 프로퍼티 (highest) -->
<rect x="60" y="92" width="750" height="56" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
<text x="76" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">① JVM 시스템 프로퍼티</text>
<text x="76" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">java -Dapp.name=myapp -jar app.jar</text>
<text x="560" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" font-weight="600">최우선</text>

<!-- Layer 2: OS 환경 변수 -->
<rect x="60" y="160" width="750" height="56" rx="8" fill="#1a1000" stroke="#e8b04a" stroke-width="1.5"/>
<text x="76" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8b04a">② OS 환경 변수</text>
<text x="76" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">export APP_NAME=myapp  →  @Value("${APP_NAME}")</text>

<!-- Layer 3: @PropertySource -->
<rect x="60" y="228" width="750" height="56" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
<text x="76" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#9999ee">③ @PropertySource 로드 파일</text>
<text x="76" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">@PropertySource("classpath:custom.properties")</text>

<!-- Layer 4: application.properties -->
<rect x="60" y="296" width="750" height="56" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
<text x="76" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">④ application.properties / yml</text>
<text x="76" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">classpath:application.properties  (가장 흔한 설정 파일)</text>

<!-- Layer 5: @Value default -->
<rect x="60" y="364" width="750" height="56" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
<text x="76" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">⑤ @Value 기본값 (코드 내 하드코딩)</text>
<text x="76" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">@Value("${app.timeout:30}")  →  키 없을 때 30 사용</text>
<text x="560" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">최후 폴백</text>

<!-- Footer -->
<text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — Spring 완전 정복</text>
</svg>
