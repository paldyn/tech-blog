<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">WebSocket 연결 상태 머신</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">HTTP Upgrade → 양방향 전이중 통신 → 닫기</text>

  <!-- State 1: CONNECTING (0) -->
  <rect x="50" y="100" width="160" height="80" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="130" y="132" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#7777cc">CONNECTING</text>
  <text x="130" y="152" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">readyState: 0</text>
  <text x="130" y="170" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">HTTP Upgrade 핸드셰이크</text>

  <!-- Arrow: CONNECTING → OPEN -->
  <rect x="210" y="137" width="85" height="6" fill="#55c555"/>
  <polygon points="295,129 315,140 295,151" fill="#55c555"/>
  <text x="252" y="125" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">onopen</text>

  <!-- State 2: OPEN (1) -->
  <rect x="315" y="88" width="200" height="104" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="415" y="120" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#55c555">OPEN</text>
  <text x="415" y="140" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">readyState: 1</text>
  <text x="415" y="160" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">send() 가능</text>
  <text x="415" y="178" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">onmessage 수신</text>

  <!-- Arrow: OPEN → CLOSING -->
  <rect x="515" y="137" width="85" height="6" fill="#e05555"/>
  <polygon points="600,129 620,140 600,151" fill="#e05555"/>
  <text x="557" y="125" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555">close()</text>

  <!-- State 3: CLOSING (2) -->
  <rect x="620" y="100" width="160" height="80" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="700" y="132" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#e05555">CLOSING</text>
  <text x="700" y="152" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">readyState: 2</text>
  <text x="700" y="170" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">닫기 핸드셰이크 중</text>

  <!-- Arrow: CLOSING → CLOSED -->
  <line x1="700" y1="180" x2="700" y2="248" stroke="#888" stroke-width="2"/>
  <polygon points="692,248 700,266 708,248" fill="#888"/>
  <text x="718" y="230" text-anchor="start"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">onclose</text>

  <!-- State 4: CLOSED (3) -->
  <rect x="620" y="266" width="160" height="80" rx="8" fill="#0d1117" stroke="#888" stroke-width="1.5"/>
  <text x="700" y="298" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#888">CLOSED</text>
  <text x="700" y="318" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">readyState: 3</text>
  <text x="700" y="336" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">CloseEvent.code, reason</text>

  <!-- Handshake detail box -->
  <rect x="50" y="230" width="370" height="170" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="50" y="230" width="370" height="30" rx="8" fill="#1a1f35"/>
  <rect x="50" y="248" width="370" height="12" fill="#1a1f35"/>
  <text x="235" y="248" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">HTTP Upgrade 핸드셰이크</text>
  <text x="66" y="278"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">요청: Upgrade: websocket</text>
  <text x="66" y="298"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">       Connection: Upgrade</text>
  <text x="66" y="318"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">       Sec-WebSocket-Key: …</text>
  <text x="66" y="342"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">응답: 101 Switching Protocols</text>
  <text x="66" y="362"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">       Sec-WebSocket-Accept: …</text>
  <text x="66" y="382"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">이후 TCP 연결이 WebSocket 프레임으로 전환</text>

  <!-- Message flow indicator (center) -->
  <rect x="440" y="240" width="165" height="150" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="522" y="262" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#888">전이중 메시지</text>
  <!-- Up arrow -->
  <rect x="510" y="278" width="6" height="40" fill="#7ec8e3"/>
  <polygon points="502,278 513,262 524,278" fill="#7ec8e3"/>
  <text x="530" y="300"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">Client → Server</text>
  <!-- Down arrow -->
  <rect x="510" y="332" width="6" height="40" fill="#55c555"/>
  <polygon points="502,372 513,388 524,372" fill="#55c555"/>
  <text x="530" y="355"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">Server → Client</text>
</svg>
