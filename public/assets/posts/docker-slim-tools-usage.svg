<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    docker-slim 주요 사용법
  </text>

  <!-- slim build command -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">slim build — 이미지 최적화</text>

  <rect x="60" y="86" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본 사용법</text>
  <text x="76" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">slim build myapp:latest</tspan>
  </text>
  <text x="76" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># HTTP 포트를 통한 동적 프로브</text>
  <text x="76" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">slim build --http-probe myapp:latest</tspan>
  </text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 결과: myapp.slim:latest 생성</text>

  <!-- dive -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">dive — 레이어 분석</text>

  <rect x="60" y="238" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 인터랙티브 TUI 레이어 분석</text>
  <text x="76" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">dive myapp:latest</tspan>
  </text>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># CI에서 효율성 점수 검사</text>
  <text x="76" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">dive --ci myapp:latest  </tspan><tspan fill="#9aa4b8"># 95% 미만이면 exit 1</tspan>
  </text>

  <!-- crane flatten -->
  <text x="60" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">crane flatten — 레이어 병합</text>

  <rect x="60" y="368" width="760" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">crane flatten myapp:latest | crane push - myapp:flat</tspan>
    <tspan fill="#9aa4b8">  # 단일 레이어로 병합</tspan>
  </text>
</svg>
