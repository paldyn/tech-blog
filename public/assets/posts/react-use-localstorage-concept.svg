<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useLocalStorage — 상태와 저장소 동기화</text>

  <!-- React State box -->
  <rect x="60" y="80" width="220" height="120" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">React State</text>
  <text x="170" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">useState</text>
  <text x="170" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메모리 안에만 존재</text>
  <text x="170" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">페이지 새로고침 시 사라짐</text>

  <!-- Arrow bidirectional -->
  <line x1="280" y1="140" x2="370" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="370" y1="120" x2="280" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="325" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">읽기</text>
  <text x="325" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">쓰기</text>

  <!-- useLocalStorage hook box -->
  <rect x="372" y="80" width="220" height="120" rx="8" fill="#0a1a20" stroke="#7ec8e3" stroke-width="2"/>
  <text x="482" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">useLocalStorage</text>
  <text x="482" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">useState + useEffect</text>
  <text x="482" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">초기값: localStorage 읽기</text>
  <text x="482" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">쓰기: localStorage.setItem</text>

  <!-- Arrow bidirectional 2 -->
  <line x1="592" y1="140" x2="682" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="682" y1="120" x2="592" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="637" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">읽기</text>
  <text x="637" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">쓰기</text>

  <!-- LocalStorage box -->
  <rect x="684" y="80" width="136" height="120" rx="8" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="752" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">localStorage</text>
  <text x="752" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">브라우저 저장소</text>
  <text x="752" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JSON 직렬화</text>
  <text x="752" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">새로고침 후에도</text>
  <text x="752" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">유지됨</text>

  <!-- Code section -->
  <rect x="60" y="224" width="760" height="190" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> useLocalStorage(key, defaultValue) {</tspan></text>
  <text x="76" y="265" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8">  // 초기값: localStorage에서 읽거나 기본값 사용</tspan></text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [value, setValue] = </tspan><tspan fill="#7ec8e3" font-weight="600">useState</tspan><tspan fill="#ffffff">(() =&gt; {</tspan></text>
  <text x="76" y="303" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">    try</tspan><tspan fill="#ffffff"> { </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> item = localStorage.getItem(key);</tspan></text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">      </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> item !== </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff"> ? JSON.parse(item) : defaultValue;</tspan></text>
  <text x="76" y="341" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    } </tspan><tspan fill="#7ec8e3" font-weight="600">catch</tspan><tspan fill="#ffffff"> { </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> defaultValue; } </tspan><tspan fill="#9aa4b8">// JSON.parse 실패 대비</tspan></text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  });</tspan></text>
  <text x="76" y="379" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> setStoredValue = </tspan><tspan fill="#7ec8e3" font-weight="600">useCallback</tspan><tspan fill="#ffffff">((newValue) =&gt; {</tspan></text>
  <text x="76" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> v = newValue </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> Function ? newValue(value) : newValue;</tspan></text>
  <text x="76" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    setValue(v); localStorage.setItem(key, JSON.stringify(v));</tspan></text>
</svg>
