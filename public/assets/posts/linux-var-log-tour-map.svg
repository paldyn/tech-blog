<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">/var/log 주요 파일</text>

  <!-- System logs column -->
  <text x="80" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">시스템</text>
  <rect x="60" y="84" width="360" height="196" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">syslog</text>
  <text x="220" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전체 시스템 메시지</text>

  <text x="80" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">messages</text>
  <text x="220" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RHEL/CentOS 전체 메시지</text>

  <text x="80" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">kern.log</text>
  <text x="220" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커널 메시지</text>

  <text x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">dmesg</text>
  <text x="220" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">부팅 시 커널 링 버퍼</text>

  <text x="80" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">boot.log</text>
  <text x="220" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">부팅 메시지</text>

  <text x="80" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">faillog</text>
  <text x="220" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로그인 실패 기록</text>

  <text x="80" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">lastlog</text>
  <text x="220" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자 마지막 로그인</text>

  <!-- Security logs column -->
  <text x="480" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">보안 / 인증</text>
  <rect x="460" y="84" width="360" height="196" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>

  <text x="480" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">auth.log</text>
  <text x="620" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인증 (Debian/Ubuntu)</text>

  <text x="480" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">secure</text>
  <text x="620" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인증 (RHEL/CentOS)</text>

  <text x="480" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">wtmp</text>
  <text x="620" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로그인 이력 (last로 조회)</text>

  <text x="480" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">btmp</text>
  <text x="620" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실패 로그인 (lastb로 조회)</text>

  <text x="480" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">sudo.log</text>
  <text x="620" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">sudo 명령 이력</text>

  <text x="480" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">audit/audit.log</text>
  <text x="620" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">auditd 감사 로그</text>

  <!-- App logs column -->
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">애플리케이션</text>
  <rect x="60" y="320" width="360" height="152" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">nginx/</text>
  <text x="220" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">access.log, error.log</text>

  <text x="80" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">apache2/</text>
  <text x="220" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">access.log, error.log</text>

  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">mysql/</text>
  <text x="220" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">error.log, slow.log</text>

  <text x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">dpkg.log</text>
  <text x="220" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">패키지 설치/제거 이력</text>

  <text x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">apt/</text>
  <text x="220" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">history.log, term.log</text>

  <!-- Binary files note -->
  <rect x="460" y="320" width="360" height="152" rx="8" fill="#1a1000" stroke="#ce9178" stroke-width="1"/>
  <text x="640" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">바이너리 파일 조회</text>
  <text x="480" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">last        <tspan fill="#888"># wtmp (로그인 이력)</tspan></text>
  <text x="480" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">lastb       <tspan fill="#888"># btmp (실패 이력)</tspan></text>
  <text x="480" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">lastlog     <tspan fill="#888"># lastlog 파일</tspan></text>
  <text x="480" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">faillog -a  <tspan fill="#888"># faillog 파일</tspan></text>
</svg>
