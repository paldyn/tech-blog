<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tail -f: 로그 실시간 모니터링</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">파일에 새 줄이 추가될 때마다 화면에 즉시 출력</text>

  <!-- tail -f flow -->
  <!-- Log file box -->
  <rect x="60" y="92" width="220" height="160" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="middle">/var/log/app.log</text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">2026-05-09 10:00 INFO start</text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">2026-05-09 10:01 INFO req</text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">2026-05-09 10:02 ERROR</text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">2026-05-09 10:03 INFO ok</text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">← 새 줄 추가</text>

  <!-- Arrow -->
  <polygon points="320,172 340,162 340,182" fill="#7ec8e3"/>
  <line x1="280" y1="172" x2="339" y2="172" stroke="#7ec8e3" stroke-width="2"/>
  <text x="310" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">tail -f</text>

  <!-- Terminal output box -->
  <rect x="350" y="92" width="280" height="160" fill="#070b14" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">터미널 출력</text>
  <text x="366" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">2026-05-09 10:02 ERROR</text>
  <text x="366" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">2026-05-09 10:03 INFO ok</text>
  <text x="366" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">2026-05-09 10:04 INFO ←</text>
  <text x="366" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">새 줄이 즉시 출력됨</text>

  <!-- Key commands -->
  <rect x="660" y="92" width="180" height="160" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="750" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">종료·옵션</text>
  <text x="676" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Ctrl+C</text>
  <text x="676" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  모니터링 종료</text>
  <text x="676" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">tail -F</text>
  <text x="676" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  로테이션 대응</text>
  <text x="676" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">multitail</text>
  <text x="676" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  여러 파일 동시</text>

  <!-- Practical examples -->
  <rect x="60" y="276" width="760" height="64" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c55a">자주 쓰는 조합</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">tail -f /var/log/syslog | grep <tspan fill="#ce9178">ERROR</tspan>   <tspan fill="#6a8aa0"># 에러만 실시간 필터</tspan></text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">tail -n 100 access.log | awk <tspan fill="#ce9178">'{print $1}'</tspan> | sort | uniq -c   <tspan fill="#6a8aa0"># 최근 IP 집계</tspan></text>
</svg>
