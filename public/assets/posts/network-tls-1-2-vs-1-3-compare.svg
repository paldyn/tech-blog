<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TLS 1.2 vs TLS 1.3 핸드셰이크 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">RTT 수 차이와 키 교환 방식의 변화</text>

  <defs>
    <marker id="arrB12" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrB13" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrL12" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 13 0 L 0 7 L 13 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrL13" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 13 0 L 0 7 L 13 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- TLS 1.2 섹션 제목 -->
  <rect x="60" y="88" width="355" height="36" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="237" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">TLS 1.2 — 2-RTT</text>

  <!-- TLS 1.3 섹션 제목 -->
  <rect x="465" y="88" width="355" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="642" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">TLS 1.3 — 1-RTT</text>

  <!-- 분리선 -->
  <line x1="440" y1="88" x2="440" y2="470" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- TLS 1.2 타임라인 -->
  <text x="100" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">클라이언트</text>
  <text x="335" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">서버</text>
  <line x1="115" y1="155" x2="115" y2="450" stroke="#e05555" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="360" y1="155" x2="360" y2="450" stroke="#e05555" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <line x1="115" y1="175" x2="360" y2="175" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrB12)"/>
  <text x="237" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ClientHello</text>

  <line x1="360" y1="215" x2="115" y2="215" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrL12)"/>
  <text x="237" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ServerHello + Certificate + ServerHelloDone</text>

  <line x1="115" y1="260" x2="360" y2="260" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrB12)"/>
  <text x="237" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ClientKeyExchange + ChangeCipherSpec + Finished</text>

  <line x1="360" y1="305" x2="115" y2="305" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrL12)"/>
  <text x="237" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ChangeCipherSpec + Finished</text>

  <line x1="115" y1="345" x2="360" y2="345" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrB12)"/>
  <text x="237" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">앱 데이터 →</text>

  <!-- RTT 브래킷 TLS1.2 -->
  <line x1="75" y1="175" x2="75" y2="305" stroke="#e8c44a" stroke-width="1.5"/>
  <line x1="70" y1="175" x2="80" y2="175" stroke="#e8c44a" stroke-width="1.5"/>
  <line x1="70" y1="305" x2="80" y2="305" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="68" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c44a" transform="rotate(-90,68,244)">2-RTT</text>

  <!-- TLS 1.3 타임라인 -->
  <text x="505" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">클라이언트</text>
  <text x="755" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">서버</text>
  <line x1="520" y1="155" x2="520" y2="450" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="780" y1="155" x2="780" y2="450" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <line x1="520" y1="175" x2="780" y2="175" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrB13)"/>
  <text x="650" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ClientHello + key_share + supported_versions</text>

  <line x1="780" y1="230" x2="520" y2="230" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrL13)"/>
  <text x="650" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ServerHello + {Cert + CertVerify + Finished}</text>

  <line x1="520" y1="280" x2="780" y2="280" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrB13)"/>
  <text x="650" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">Finished (클라이언트)</text>

  <line x1="520" y1="320" x2="780" y2="320" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrB13)"/>
  <text x="650" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">앱 데이터 →</text>

  <!-- RTT 브래킷 TLS1.3 -->
  <line x1="840" y1="175" x2="840" y2="280" stroke="#e8c44a" stroke-width="1.5"/>
  <line x1="835" y1="175" x2="845" y2="175" stroke="#e8c44a" stroke-width="1.5"/>
  <line x1="835" y1="280" x2="845" y2="280" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="858" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c44a" transform="rotate(90,858,232)">1-RTT</text>

  <!-- 하단 요약 -->
  <rect x="60" y="395" width="760" height="60" rx="8" fill="#111"/>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">주요 변경점</text>
  <text x="160" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">RSA 키 교환 제거</text>
  <text x="340" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">취약 암호 스위트 제거</text>
  <text x="530" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ChangeCipherSpec 제거</text>
  <text x="720" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0-RTT(Early Data) 지원</text>
  <text x="160" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ Forward Secrecy 필수화</text>
  <text x="340" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ 보안 강화</text>
  <text x="530" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ 메시지 수 감소</text>
  <text x="720" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">→ 재전송 공격 주의</text>
</svg>
