  <text x="88" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="106" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">자주 변하는 정보 (뉴스, 규정, 가격)</text>
  <text x="88" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="106" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">사내 문서 검색, Q&amp;A 시스템</text>
  <text x="88" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="106" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">답변 출처 인용이 중요한 경우</text>
  <text x="88" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="106" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">대량 문서 + 제한된 GPU 예산</text>
  <text x="88" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="106" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">기존 LLM 능력 유지가 중요할 때</text>
  <text x="88" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="106" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">프로토타입 개발, 빠른 시도</text>

  <!-- Fine-tuning use cases -->
  <rect x="460" y="88" width="360" height="200" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">파인튜닝이 적합한 경우</text>

  <text x="488" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="506" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">특정 응답 형식이나 스타일 필요</text>
  <text x="488" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="506" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">전문 도메인 언어·용어 학습</text>
  <text x="488" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="506" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">지식보다 행동 방식 학습이 목적</text>
  <text x="488" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="506" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">추론 비용 최소화가 핵심인 경우</text>
  <text x="488" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="506" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">정적이고 안정적인 지식 기반</text>
  <text x="488" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="506" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">오프라인/에어갭 환경</text>

  <!-- Hybrid recommendation -->
  <rect x="60" y="306" width="760" height="52" rx="8" fill="#1a1500" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8b84b">실전 권고: 대부분의 경우 두 기법을 결합</text>
  <text x="440" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파인튜닝으로 스타일·형식 학습 + RAG로 최신 지식 주입 → 성능과 정확도 모두 확보</text>
</svg>
