<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">가변 배열 vs 읽기 전용 배열</text>

  <!-- LEFT label -->
  <text x="230" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">mutable array</text>

  <!-- RIGHT label -->
  <text x="640" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">readonly array</text>

  <!-- LEFT code box: y=105, height=220 → bottom=325, first text y=126 (pad=21), last text y=284 (pad=41) -->
  <!-- Adjusted: y=105, height=200 → bottom=305; 7 lines * 20px = 140px; first at 126, last at 266, bottom-pad=39 — extend height -->
  <!-- Lines at 126,146,166,186,206,226,246,266 → last is 266, need bottom of box to be ~280 -->
  <rect x="60" y="105" width="340" height="178" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <text x="76" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> arr: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">[] = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">];</tspan>
  </text>
  <text x="76" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 모두 허용됨</text>
  <text x="76" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.push(</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.pop();</tspan>
  </text>
  <text x="76" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.sort();</tspan>
  </text>
  <text x="76" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.splice(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan>
  </text>

  <!-- RIGHT code box: same height -->
  <rect x="460" y="105" width="360" height="178" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <text x="476" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> arr: </tspan><tspan fill="#7ec8e3" font-weight="600">readonly</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">[] = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">];</tspan>
  </text>
  <text x="476" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 모두 에러!</text>
  <text x="476" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.push(</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">);    </tspan><tspan fill="#e05555">// Error</tspan>
  </text>
  <text x="476" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.pop();      </tspan><tspan fill="#e05555">// Error</tspan>
  </text>
  <text x="476" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">;    </tspan><tspan fill="#e05555">// Error</tspan>
  </text>
  <text x="476" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.sort();     </tspan><tspan fill="#e05555">// Error</tspan>
  </text>
  <text x="476" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.splice(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#e05555">// Error</tspan>
  </text>

  <!-- Note box: y=310, height=54 → bottom=364; text at y=342 (center), top-pad=32, bottom-pad=22 -->
  <rect x="60" y="310" width="760" height="54" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="440" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">읽기 전용 배열은 원본 보호 — 함수 파라미터에 특히 유용</text>
</svg>
