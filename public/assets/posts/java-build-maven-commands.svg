<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Maven 표준 디렉토리 구조 &amp; 기본 명령어</text>

  <!-- Left: directory tree code box -->
  <rect x="60" y="72" width="340" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="76" dy="0"  fill="#9aa4b8"># 표준 디렉토리 레이아웃</tspan><tspan x="76" dy="19" fill="#ffffff">my-app/</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">├── pom.xml</tspan><tspan x="76" dy="19" fill="#ffffff">└── src/</tspan><tspan x="76" dy="19" fill="#ffffff">    ├── main/</tspan><tspan x="76" dy="19" fill="#55c555">    │   ├── java/     </tspan><tspan fill="#9aa4b8"># 소스</tspan><tspan x="76" dy="19" fill="#55c555">    │   └── resources/ </tspan><tspan fill="#9aa4b8"># 리소스</tspan><tspan x="76" dy="19" fill="#ffffff">    └── test/</tspan><tspan x="76" dy="19" fill="#7777cc">        ├── java/     </tspan><tspan fill="#9aa4b8"># 테스트</tspan><tspan x="76" dy="19" fill="#7777cc">        └── resources/</tspan><tspan x="76" dy="19" fill="#9aa4b8"># 빌드 결과: target/</tspan></text>

  <!-- Left bottom label -->
  <text x="230" y="354" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Convention over Configuration — 설정 없이 규칙을 따름</text>

  <!-- Right: commands code box -->
  <rect x="460" y="72" width="360" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="476" dy="0"  fill="#9aa4b8"># 주요 mvn 명령어</tspan><tspan x="476" dy="19" fill="#ffffff"> </tspan><tspan x="476" dy="19" fill="#7ec8e3" font-weight="600">mvn compile</tspan><tspan x="476" dy="19" fill="#9aa4b8">  # src/main/java 컴파일</tspan><tspan x="476" dy="19" fill="#ffffff"> </tspan><tspan x="476" dy="19" fill="#7ec8e3" font-weight="600">mvn test</tspan><tspan x="476" dy="19" fill="#9aa4b8">  # 단위 테스트 실행</tspan><tspan x="476" dy="19" fill="#ffffff"> </tspan><tspan x="476" dy="19" fill="#7ec8e3" font-weight="600">mvn package</tspan><tspan x="476" dy="19" fill="#9aa4b8">  # JAR/WAR 생성 (target/)</tspan><tspan x="476" dy="19" fill="#ffffff"> </tspan><tspan x="476" dy="19" fill="#55c555" font-weight="600">mvn install</tspan><tspan x="476" dy="19" fill="#9aa4b8">  # 로컬 ~/.m2에 설치</tspan></text>

  <!-- Right bottom label -->
  <text x="640" y="354" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">각 명령은 이전 단계를 누적 실행 (compile→test→package)</text>

  <!-- Bottom row: dependency resolution flow -->
  <!-- Box: 소스코드 -->
  <rect x="60" y="390" width="140" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">pom.xml 선언</text>
  <text x="130" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">의존성 목록</text>

  <!-- Arrow -->
  <line x1="200" y1="416" x2="254" y2="416" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box: Maven Central -->
  <rect x="255" y="390" width="150" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="330" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Maven Central</text>
  <text x="330" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">원격 저장소</text>

  <!-- Arrow -->
  <line x1="405" y1="416" x2="459" y2="416" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box: Local Cache -->
  <rect x="460" y="390" width="160" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="540" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">~/.m2/repository</text>
  <text x="540" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">로컬 캐시</text>

  <!-- Arrow -->
  <line x1="620" y1="416" x2="674" y2="416" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box: Project classpath -->
  <rect x="675" y="390" width="145" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="748" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">프로젝트 클래스패스</text>
  <text x="748" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">전이 의존성 포함</text>
</svg>
