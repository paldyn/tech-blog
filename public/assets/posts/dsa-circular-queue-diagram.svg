<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">원형 큐 (Circular Queue)</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">배열 끝에 도달하면 앞으로 되돌아가 빈 공간 재활용</text>

  <!-- ─── LEFT: Linear queue problem ─── -->
  <text x="210" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">선형 큐의 문제</text>

  <!-- linear queue: cells 0-5 -->
  <rect x="60" y="104" width="300" height="50" rx="6" fill="#0d1020" stroke="#2a3a5e" stroke-width="1"/>

  <!-- dequeued (grey) -->
  <rect x="66"  y="110" width="44" height="38" rx="4" fill="#1a0d0d" stroke="#4a2a2a" stroke-width="1"/>
  <text x="88"  y="134" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555">✗</text>
  <rect x="117" y="110" width="44" height="38" rx="4" fill="#1a0d0d" stroke="#4a2a2a" stroke-width="1"/>
  <text x="139" y="134" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555">✗</text>
  <rect x="168" y="110" width="44" height="38" rx="4" fill="#1a0d0d" stroke="#4a2a2a" stroke-width="1"/>
  <text x="190" y="134" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555">✗</text>

  <!-- active -->
  <rect x="219" y="110" width="44" height="38" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="241" y="134" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">A</text>
  <rect x="270" y="110" width="44" height="38" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="292" y="134" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">B</text>
  <rect x="321" y="110" width="32" height="38" rx="4" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- labels -->
  <text x="88"  y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">낭비</text>
  <text x="139" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">낭비</text>
  <text x="190" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">낭비</text>
  <text x="241" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">front</text>
  <text x="292" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">rear</text>

  <text x="210" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">앞 공간이 낭비되고 rear가 끝에 도달하면 꽉 찼다고 판단</text>

  <!-- ─── RIGHT: Circular queue ─── -->
  <text x="650" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">원형 큐의 해결</text>

  <!-- circular ring — using arc/path -->
  <!-- 6 slots arranged in a circle, center (650, 200), r=90 -->
  <!-- Positions: 0=top, 1=top-right, 2=right, 3=bottom-right, 4=bottom-left, 5=left -->
  <!-- slot 0: top (90deg → angle=-90 → x=650, y=110) -->

  <!-- draw cells as rects around circle -->
  <!-- Slot 0 (top): filled -->
  <rect x="614" y="94" width="72" height="40" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="650" y="119" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">C</text>

  <!-- Slot 1 (top-right): filled -->
  <rect x="714" y="140" width="72" height="40" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="750" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">D</text>
  <!-- rear label -->
  <text x="800" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">rear</text>

  <!-- Slot 2 (right): empty -->
  <rect x="726" y="200" width="72" height="40" rx="6" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="762" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">빈칸</text>

  <!-- Slot 3 (bottom-right): empty -->
  <rect x="714" y="262" width="72" height="40" rx="6" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="750" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">빈칸</text>

  <!-- Slot 4 (bottom-left): was dequeued, now reusable -->
  <rect x="566" y="262" width="72" height="40" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="602" y="287" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">A</text>
  <!-- front label -->
  <text x="552" y="285" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">front</text>

  <!-- Slot 5 (left): filled -->
  <rect x="566" y="200" width="72" height="40" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="602" y="225" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">B</text>

  <!-- circular arrows -->
  <path d="M 650 134 C 700 140, 740 155, 750 162" fill="none" stroke="#3a5a8a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <path d="M 762 162 C 770 190, 770 222, 762 240" fill="none" stroke="#3a5a8a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <path d="M 750 262 C 730 288, 688 300, 640 302" fill="none" stroke="#3a5a8a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <path d="M 566 280 C 540 275, 532 245, 540 220" fill="none" stroke="#3a5a8a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <path d="M 566 218 C 550 185, 580 140, 618 120" fill="none" stroke="#3a5a8a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- center text -->
  <text x="650" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">capacity=6</text>
  <text x="650" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">size=4</text>

  <!-- ─── BOTTOM: Key formula ─── -->
  <rect x="60" y="360" width="760" height="140" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">핵심 수식 — 나머지 연산(%)으로 인덱스 순환</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">enqueue</tspan>: rear = (rear + 1) % capacity</text>
  <text x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#e05555" font-weight="600">dequeue</tspan>: front = (front + 1) % capacity</text>
  <text x="76" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7777cc" font-weight="600">isEmpty</tspan>: front == rear</text>
  <text x="76" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#55c555" font-weight="600">isFull</tspan>:  (rear + 1) % capacity == front   // 슬롯 1개 희생</text>
  <text x="76" y="490" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// 모두 채우면 isEmpty와 isFull 구분 불가 → 실제 크기는 capacity - 1</text>
</svg>
