<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript 실행 환경</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">2024년 기준 · 한 언어로 어디서나</text>

  <!-- ── Row 1 ── -->

  <!-- Box 1 : 브라우저 (x=60, y=108) -->
  <rect x="60" y="108" width="240" height="140" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="60" y="104" font-size="0" fill="none"/>
  <text x="78" y="135" font-size="14" font-weight="600" fill="#7ec8e3">브라우저</text>
  <text x="78" y="158" font-size="12" fill="#888">Chrome · Firefox · Safari</text>
  <text x="78" y="176" font-size="12" fill="#888">Edge · Opera</text>
  <text x="78" y="194" font-size="12" fill="#666">V8 · SpiderMonkey · JSC</text>

  <!-- Box 2 : 서버 런타임 (x=320, y=108) -->
  <rect x="320" y="108" width="240" height="140" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="338" y="135" font-size="14" font-weight="600" fill="#55c555">서버 런타임</text>
  <text x="338" y="158" font-size="12" fill="#888">Node.js · Deno · Bun</text>
  <text x="338" y="176" font-size="12" fill="#888">npm · pnpm · yarn</text>
  <text x="338" y="194" font-size="12" fill="#666">REST · GraphQL · gRPC</text>

  <!-- Box 3 : 모바일 (x=580, y=108) -->
  <rect x="580" y="108" width="240" height="140" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="598" y="135" font-size="14" font-weight="600" fill="#7777cc">모바일</text>
  <text x="598" y="158" font-size="12" fill="#888">React Native · Expo</text>
  <text x="598" y="176" font-size="12" fill="#888">NativeScript · Capacitor</text>
  <text x="598" y="194" font-size="12" fill="#666">iOS · Android 동시 개발</text>

  <!-- ── Row 2 ── -->

  <!-- Box 4 : 데스크탑 (x=60, y=268) -->
  <rect x="60" y="268" width="240" height="140" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="78" y="295" font-size="14" font-weight="600" fill="#e05555">데스크탑</text>
  <text x="78" y="318" font-size="12" fill="#888">Electron · Tauri</text>
  <text x="78" y="336" font-size="12" fill="#888">NW.js · NodeGUI</text>
  <text x="78" y="354" font-size="12" fill="#666">Windows · macOS · Linux</text>

  <!-- Box 5 : 엣지 / CDN (x=320, y=268) -->
  <rect x="320" y="268" width="240" height="140" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="338" y="295" font-size="14" font-weight="600" fill="#7ec8e3">엣지 / CDN</text>
  <text x="338" y="318" font-size="12" fill="#888">Cloudflare Workers</text>
  <text x="338" y="336" font-size="12" fill="#888">Vercel Edge · Deno Deploy</text>
  <text x="338" y="354" font-size="12" fill="#666">낮은 레이턴시 · 분산 실행</text>

  <!-- Box 6 : IoT / 임베디드 (x=580, y=268) -->
  <rect x="580" y="268" width="240" height="140" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="598" y="295" font-size="14" font-weight="600" fill="#7777cc">IoT / 임베디드</text>
  <text x="598" y="318" font-size="12" fill="#888">Espruino · JerryScript</text>
  <text x="598" y="336" font-size="12" fill="#888">QuickJS · Duktape</text>
  <text x="598" y="354" font-size="12" fill="#666">초소형 기기에서도 JS</text>

  <!-- Footer -->
  <text x="60" y="455" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part I — 언어의 본질과 역사</text>
</svg>
