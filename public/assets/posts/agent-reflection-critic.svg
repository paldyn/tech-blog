  <!-- Total score -->
  <rect x="60" y="290" width="320" height="42" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="220" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
