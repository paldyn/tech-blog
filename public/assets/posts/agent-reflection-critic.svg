  <!-- Right: structured critic output -->
  <rect x="440" y="90" width="400" height="260" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="460" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Critic 출력 (구조화 JSON)</text>
  <text x="460" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="460" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  "scores"</text>
  <text x="460" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          : {</text>
  <text x="460" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    "accuracy"</text>
  <text x="460" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">              : </text>
  <text x="460" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">                9</text>
  <text x="460" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                 ,</text>
  <text x="460" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    "completeness"</text>
  <text x="460" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                  : </text>
  <text x="460" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">                    7</text>
  <text x="460" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  "issues"</text>
  <text x="460" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          : [</text>
  <text x="460" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    "코드 예제 부족"</text>
  <text x="460" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                   ,</text>
  <text x="460" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    "마무리 요약 없음"</text>
  <text x="460" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  ],</text>
  <text x="460" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  "approved"</text>
  <text x="460" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">            : </text>
  <text x="460" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">              false</text>
  <text x="460" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Threshold note -->
  <rect x="40" y="360" width="800" height="12" rx="4" fill="#0f0f0f"/>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#333">임계값 설정: threshold=8.0 → 승인. 7.25 &lt; 8.0이므로 수정 요청 (Reviser 호출)</text>
</svg>
