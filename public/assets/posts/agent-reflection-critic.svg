<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Critic 평가 기준과 점수화</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">구조화된 평가 프롬프트로 일관된 피드백과 수치화된 점수 확보</text>

  <!-- Left: evaluation dimensions -->
  <rect x="40" y="90" width="360" height="260" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="220" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">평가 차원 (글쓰기 예시)</text>

  <!-- Dimension bars -->
  <text x="60" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">정확성</text>
  <rect x="60" y="146" width="320" height="14" rx="3" fill="#1a1a1a"/>
  <rect x="60" y="146" width="288" height="14" rx="3" fill="#55c555"/>
  <text x="362" y="158" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">9/10</text>

  <text x="60" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">완결성</text>
  <rect x="60" y="182" width="320" height="14" rx="3" fill="#1a1a1a"/>
  <rect x="60" y="182" width="224" height="14" rx="3" fill="#e0a855"/>
  <text x="362" y="194" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a855">7/10</text>

  <text x="60" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">가독성</text>
  <rect x="60" y="218" width="320" height="14" rx="3" fill="#1a1a1a"/>
  <rect x="60" y="218" width="256" height="14" rx="3" fill="#7ec8e3"/>
  <text x="362" y="230" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">8/10</text>

  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">코드 예제</text>
  <rect x="60" y="254" width="320" height="14" rx="3" fill="#1a1a1a"/>
  <rect x="60" y="254" width="160" height="14" rx="3" fill="#e05555"/>
  <text x="362" y="266" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
