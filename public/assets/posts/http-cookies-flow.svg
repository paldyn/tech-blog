<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">HTTP 쿠키 동작 흐름</text>
    <!-- Step boxes -->
    <!-- Step 1: 첫 요청 -->
    <rect x="60" y="70" width="190" height="60" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="155" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">① 첫 요청</text>
    <text x="155" y="114" text-anchor="middle" font-size="11" fill="#888">GET /login HTTP/1.1</text>
    <!-- Step 2: 서버 쿠키 설정 -->
    <rect x="345" y="70" width="190" height="60" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="440" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">② 쿠키 설정</text>
    <text x="440" y="114" text-anchor="middle" font-size="11" fill="#888">Set-Cookie 응답</text>
    <!-- Step 3: 브라우저 저장 -->
    <rect x="630" y="70" width="190" height="60" rx="8" fill="#2a2a0a" stroke="#aaaa3a" stroke-width="1.5"/>
    <text x="725" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#dddd55">③ 브라우저 저장</text>
    <text x="725" y="114" text-anchor="middle" font-size="11" fill="#888">쿠키 저장소에 보관</text>
    <!-- Step 4: 다음 요청 with Cookie -->
    <rect x="345" y="230" width="190" height="60" rx="8" fill="#1a1a2e" stroke="#6655aa" stroke-width="1.5"/>
    <text x="440" y="255" text-anchor="middle" font-size="13" font-weight="600" fill="#9999ee">④ 다음 요청</text>
    <text x="440" y="274" text-anchor="middle" font-size="11" fill="#888">Cookie 헤더 자동 첨부</text>
    <!-- Step 5: 서버 인식 -->
    <rect x="60" y="230" width="190" height="60" rx="8" fill="#2a1a0f" stroke="#aa6a3a" stroke-width="1.5"/>
    <text x="155" y="255" text-anchor="middle" font-size="13" font-weight="600" fill="#dd9955">⑤ 서버 인식</text>
    <text x="155" y="274" text-anchor="middle" font-size="11" fill="#888">사용자 상태 복원</text>
    <!-- Arrows -->
    <line x1="250" y1="100" x2="345" y2="100" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="535" y1="100" x2="630" y2="100" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="725" y1="130" x2="725" y2="200" stroke="#7ec8e3" stroke-width="1.5"/>
    <line x1="725" y1="200" x2="535" y2="200" stroke="#7ec8e3" stroke-width="1.5"/>
    <line x1="535" y1="200" x2="535" y2="230" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="345" y1="260" x2="250" y2="260" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
    <!-- Code block at bottom -->
    <rect x="60" y="310" width="760" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 서버 응답 (Set-Cookie)</text>
    <text x="76" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Set-Cookie</tspan><tspan fill="#ffffff">: sessionId=abc123; HttpOnly; Secure; SameSite=Lax</tspan></text>
    <text x="76" y="377" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Cookie</tspan><tspan fill="#ffffff">: sessionId=abc123</tspan><tspan fill="#9aa4b8">  # 이후 자동 첨부</tspan></text>
    <text x="440" y="406" text-anchor="middle" font-size="11" fill="#555">쿠키는 상태 비저장(stateless) HTTP에서 클라이언트 상태를 유지하는 핵심 메커니즘</text>
  </g>
</svg>
