<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">traceback 모듈 주요 함수</text>

  <!-- 4 function cards in a row -->
  <!-- traceback.print_exc -->
  <rect x="55" y="65" width="185" height="110" rx="8" fill="#0c1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="148" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">print_exc()</text>
  <line x1="73" y1="98" x2="222" y2="98" stroke="#2a3d5e" stroke-width="1"/>
  <text x="73" y="116" font-size="11" fill="#888">현재 예외 트레이스백을</text>
  <text x="73" y="134" font-size="11" fill="#888">stderr에 출력</text>
  <text x="73" y="152" font-size="11" fill="#888">except 블록 안에서 사용</text>
  <text x="73" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">file= 파라미터로 대상 변경</text>

  <!-- traceback.format_exc -->
  <rect x="258" y="65" width="185" height="110" rx="8" fill="#0c1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="351" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">format_exc()</text>
  <line x1="276" y1="98" x2="425" y2="98" stroke="#2a3d5e" stroke-width="1"/>
  <text x="276" y="116" font-size="11" fill="#888">트레이스백을 문자열로</text>
  <text x="276" y="134" font-size="11" fill="#888">반환 (로그 저장용)</text>
  <text x="276" y="152" font-size="11" fill="#888">logging.error(tb_str) 패턴</text>
  <text x="276" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">tb_str = format_exc()</text>

  <!-- traceback.print_tb -->
  <rect x="461" y="65" width="185" height="110" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="554" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">print_tb(tb)</text>
  <line x1="479" y1="98" x2="628" y2="98" stroke="#2a3d5e" stroke-width="1"/>
  <text x="479" y="116" font-size="11" fill="#888">traceback 객체 직접</text>
  <text x="479" y="134" font-size="11" fill="#888">출력. __traceback__와</text>
  <text x="479" y="152" font-size="11" fill="#888">함께 사용</text>
  <text x="479" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">print_tb(e.__traceback__)</text>

  <!-- traceback.walk_tb -->
  <rect x="664" y="65" width="161" height="110" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="745" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">walk_tb(tb)</text>
  <line x1="682" y1="98" x2="807" y2="98" stroke="#2a3d5e" stroke-width="1"/>
  <text x="682" y="116" font-size="11" fill="#888">각 프레임·줄번호를</text>
  <text x="682" y="134" font-size="11" fill="#888">이터레이터로 반환</text>
  <text x="682" y="152" font-size="11" fill="#888">세밀한 분석 가능</text>
  <text x="682" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">for f, ln in walk_tb(tb)</text>

  <!-- Code example -->
  <rect x="55" y="198" width="770" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="75" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">import</text><text x="131" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> traceback, logging</text>
  <text x="75" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">try</text><text x="99" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="75" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    risky_operation()</text>
  <text x="75" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">except</font></text><text x="135" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Exception:</text>
  <text x="75" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    tb_str = traceback.</text><text x="255" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">format_exc</text><text x="340" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">()</text>
  <text x="75" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    logging.</text><text x="165" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">error</text><text x="200" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text><text x="208" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"작업 실패:\n%s"</text><text x="375" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, tb_str)</text>
  <text x="75" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">    # 트레이스백을 로그 파일에 저장 (stderr가 아닌 파일로)</text>
</svg>
