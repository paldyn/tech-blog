<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PDB 자발적 중단 처리 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Eviction API → PDB 확인 → 허용/거부</text>

  <!-- Disruption sources -->
  <rect x="60" y="100" width="180" height="54" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">kubectl drain</text>
  <text x="150" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">노드 드레인</text>

  <rect x="60" y="172" width="180" height="54" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Rolling Update</text>
  <text x="150" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">배포 업데이트</text>

  <rect x="60" y="244" width="180" height="54" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Cluster Autoscaler</text>
  <text x="150" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">노드 축소</text>

  <text x="150" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">자발적 중단(Voluntary)</text>

  <!-- Arrows to Eviction API -->
  <line x1="240" y1="127" x2="316" y2="200" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w)"/>
  <line x1="240" y1="199" x2="316" y2="209" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w)"/>
  <line x1="240" y1="271" x2="316" y2="218" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- Eviction API -->
  <rect x="316" y="170" width="180" height="72" fill="#1a1420" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="406" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Eviction API</text>
  <text x="406" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">v1/eviction 리소스</text>
  <text x="406" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">kube-apiserver 처리</text>

  <!-- Arrow to PDB Check -->
  <line x1="496" y1="206" x2="556" y2="206" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- PDB Check -->
  <rect x="556" y="170" width="180" height="72" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="2"/>
  <text x="646" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">PDB 검사</text>
  <text x="646" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">disruptionsAllowed</text>
  <text x="646" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">&gt; 0 ?</text>

  <!-- Arrow allow -->
  <line x1="736" y1="192" x2="796" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <!-- Allow box -->
  <rect x="796" y="130" width="44" height="44" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="818" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>
  <text x="818" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">허용</text>

  <!-- Arrow deny -->
  <line x1="736" y1="220" x2="796" y2="250" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <!-- Deny box -->
  <rect x="796" y="236" width="44" height="44" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="818" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">✗</text>
  <text x="818" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">429 거부</text>

  <!-- Involuntary box -->
  <rect x="316" y="320" width="420" height="52" fill="#1a1a0a" rx="8" stroke="#e8a020" stroke-width="1"/>
  <text x="526" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">비자발적 중단 (Involuntary) — PDB 무시</text>
  <text x="526" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">노드 OOM · 하드웨어 장애 · 커널 패닉은 PDB로 막을 수 없음</text>

  <!-- Code block -->
  <rect x="60" y="392" width="760" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888"># PDB 상태 확인</text>
  <text x="80" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">kubectl get pdb -n default</text>
  <text x="450" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888">  # ALLOWED DISRUPTIONS 컬럼 확인</text>
</svg>
