<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">LLM-as-Judge 평가 방식 비교</text>

  <!-- ===== COL 1: Pointwise (x=60-290) ===== -->
  <!-- Header rect -->
  <rect x="60" y="80" width="230" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="#e8e8e8">Pointwise</text>
  <text x="175" y="120" text-anchor="middle" font-size="14" fill="#7ec8e3">단일 응답 채점</text>

  <!-- Description box (y=145, h=120) -->
  <rect x="60" y="145" width="230" height="120" rx="6" fill="#111118" stroke="#333" stroke-width="1"/>
  <text x="175" y="170" text-anchor="middle" font-size="13" fill="#ccc">응답 하나를 루브릭 기준으로</text>
  <text x="175" y="190" text-anchor="middle" font-size="13" fill="#ccc">1–10점 채점. 절대 기준이 있어</text>
  <text x="175" y="210" text-anchor="middle" font-size="13" fill="#ccc">비교 없이 독립 평가 가능.</text>

  <!-- Score display inside description -->
  <rect x="120" y="222" width="110" height="30" rx="4" fill="#1a1a2e"/>
  <text x="175" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">Score: 7 / 10</text>

  <!-- Pros -->
  <text x="75" y="283" font-size="13" fill="#55c555">✓ 병렬 처리 용이</text>
  <text x="75" y="303" font-size="13" fill="#55c555">✓ 확장성 높음</text>

  <!-- Cons -->
  <text x="75" y="335" font-size="13" fill="#e05555">✗ 모델 간 일관성 부족</text>
  <text x="75" y="355" font-size="13" fill="#e05555">✗ 척도 기준 설정 필요</text>

  <!-- ===== COL 2: Pairwise (x=305-535) ===== -->
  <!-- Header rect -->
  <rect x="305" y="80" width="230" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="420" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="#e8e8e8">Pairwise</text>
  <text x="420" y="120" text-anchor="middle" font-size="14" fill="#55c555">두 응답 비교 선택</text>

  <!-- Description box -->
  <rect x="305" y="145" width="230" height="120" rx="6" fill="#111118" stroke="#333" stroke-width="1"/>
  <text x="420" y="170" text-anchor="middle" font-size="13" fill="#ccc">응답 A와 B를 동시에 제시해</text>
  <text x="420" y="190" text-anchor="middle" font-size="13" fill="#ccc">우월한 쪽 선택. 인간 선호도와</text>
  <text x="420" y="210" text-anchor="middle" font-size="13" fill="#ccc">상관관계 높음.</text>

  <!-- A vs B display -->
  <rect x="320" y="222" width="45" height="30" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="342" y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">A</text>
  <text x="420" y="242" text-anchor="middle" font-size="13" fill="#888">vs</text>
  <rect x="470" y="222" width="45" height="30" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="492" y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">B</text>

  <!-- Pros -->
  <text x="320" y="283" font-size="13" fill="#55c555">✓ 인간 판단과 일치</text>
  <text x="320" y="303" font-size="13" fill="#55c555">✓ 미묘한 차이 포착</text>

  <!-- Cons -->
  <text x="320" y="335" font-size="13" fill="#e05555">✗ O(n²) 비교 필요</text>
  <text x="320" y="355" font-size="13" fill="#e05555">✗ 순서 편향 발생 가능</text>

  <!-- ===== COL 3: Reference-based (x=550-820) ===== -->
  <!-- Header rect -->
  <rect x="550" y="80" width="270" height="50" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="685" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="#e8e8e8">Reference-based</text>
  <text x="685" y="120" text-anchor="middle" font-size="14" fill="#7777cc">정답 참조 채점</text>

  <!-- Description box -->
  <rect x="550" y="145" width="270" height="120" rx="6" fill="#111118" stroke="#333" stroke-width="1"/>
  <text x="685" y="170" text-anchor="middle" font-size="13" fill="#ccc">골든 정답과 비교해 유사도·정확도</text>
  <text x="685" y="190" text-anchor="middle" font-size="13" fill="#ccc">채점. 객관적 기준이 명확한</text>
  <text x="685" y="210" text-anchor="middle" font-size="13" fill="#ccc">태스크에 적합.</text>

  <!-- Reference display -->
  <rect x="570" y="222" width="65" height="30" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="602" y="242" text-anchor="middle" font-size="11" fill="#7777cc">정답(Ref)</text>
  <text x="685" y="242" text-anchor="middle" font-size="13" fill="#888">↔</text>
  <rect x="710" y="222" width="65" height="30" rx="4" fill="#2a1a2a" stroke="#ce9178" stroke-width="1"/>
  <text x="742" y="242" text-anchor="middle" font-size="11" fill="#ce9178">응답(Ans)</text>

  <!-- Pros -->
  <text x="565" y="283" font-size="13" fill="#55c555">✓ 객관적·재현 가능</text>
  <text x="565" y="303" font-size="13" fill="#55c555">✓ 정답 명확 태스크</text>

  <!-- Cons -->
  <text x="565" y="335" font-size="13" fill="#e05555">✗ 레퍼런스 구축 비용</text>
  <text x="565" y="355" font-size="13" fill="#e05555">✗ 창의적 태스크 부적합</text>

  <!-- Dividers between columns -->
  <line x1="295" y1="80" x2="295" y2="375" stroke="#222" stroke-width="1.5"/>
  <line x1="543" y1="80" x2="543" y2="375" stroke="#222" stroke-width="1.5"/>
</svg>
