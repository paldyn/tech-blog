<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">jmod 도구 — 생성과 jlink 입력</text>

  <defs>
    <marker id="jmArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="110" width="180" height="90" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="142" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">컴파일 산출물</text>
  <text x="150" y="166" font-size="12" fill="#888" text-anchor="middle">classes/</text>
  <text x="150" y="185" font-size="12" fill="#888" text-anchor="middle">libs/ conf/</text>

  <rect x="350" y="110" width="180" height="90" rx="8" fill="#0d1322" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="142" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">jmod create</text>
  <text x="440" y="166" font-size="12" fill="#888" text-anchor="middle">--class-path</text>
  <text x="440" y="185" font-size="12" fill="#888" text-anchor="middle">--libs --cmds</text>

  <rect x="640" y="110" width="180" height="90" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="142" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace">com.app.jmod</text>
  <text x="730" y="166" font-size="12" fill="#888" text-anchor="middle">jlink 입력으로</text>
  <text x="730" y="185" font-size="12" fill="#888" text-anchor="middle">사용</text>

  <line x1="240" y1="155" x2="348" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jmArr)"/>
  <line x1="530" y1="155" x2="638" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jmArr)"/>

  <text x="440" y="250" font-size="13" fill="#9aa4b8" text-anchor="middle">JMOD는 네이티브 코드까지 담아 jlink로 런타임 이미지를 만들 때 입력으로 쓴다</text>
</svg>
