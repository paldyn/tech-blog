<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클라우드 GPU 비용 최적화 전략</text>
  <text x="440" y="68" font-size="15" fill="#888" text-anchor="middle">인스턴스 유형별 비용 비교 및 스팟 인스턴스 활용</text>

  <!-- Bar chart area -->
  <!-- Y-axis label -->
  <text x="30" y="96" font-size="11" fill="#888" text-anchor="middle">$/hr</text>
  <text x="30" y="112" font-size="11" fill="#888" text-anchor="middle">35</text>
  <text x="30" y="152" font-size="11" fill="#888" text-anchor="middle">28</text>
  <text x="30" y="192" font-size="11" fill="#888" text-anchor="middle">21</text>
  <text x="30" y="232" font-size="11" fill="#888" text-anchor="middle">14</text>
  <text x="30" y="270" font-size="11" fill="#888" text-anchor="middle">7</text>
  <text x="30" y="306" font-size="11" fill="#888" text-anchor="middle">0</text>

  <!-- Grid lines -->
  <line x1="48" y1="108" x2="520" y2="108" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="48" y1="148" x2="520" y2="148" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="48" y1="188" x2="520" y2="188" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="48" y1="228" x2="520" y2="228" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="48" y1="268" x2="520" y2="268" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="48" y1="306" x2="520" y2="306" stroke="#555" stroke-width="1"/>

  <!-- GPU groups labels -->
  <text x="120" y="322" font-size="11" fill="#ccc" text-anchor="middle">A100 40GB</text>
  <text x="250" y="322" font-size="11" fill="#ccc" text-anchor="middle">A100 80GB</text>
  <text x="380" y="322" font-size="11" fill="#ccc" text-anchor="middle">H100 SXM</text>

  <!-- A100 40GB bars (3 types) -->
  <!-- On-demand: ~$3.5/hr per GPU, 1 GPU price shown -->
  <!-- A100 40GB On-demand -->
  <rect x="68" y="175" width="36" height="131" rx="4" fill="#7ec8e3" opacity="0.9"/>
  <text x="86" y="170" font-size="10" fill="#7ec8e3" text-anchor="middle">$2.8</text>

  <!-- A100 40GB Spot -->
  <rect x="112" y="228" width="36" height="78" rx="4" fill="#55c555" opacity="0.9"/>
  <text x="130" y="223" font-size="10" fill="#55c555" text-anchor="middle">$1.0</text>

  <!-- A100 40GB Reserved -->
  <rect x="156" y="214" width="36" height="92" rx="4" fill="#7777cc" opacity="0.9"/>
  <text x="174" y="209" font-size="10" fill="#7777cc" text-anchor="middle">$1.8</text>

  <!-- A100 80GB bars -->
  <!-- On-demand -->
  <rect x="200" y="140" width="36" height="166" rx="4" fill="#7ec8e3" opacity="0.9"/>
  <text x="218" y="135" font-size="10" fill="#7ec8e3" text-anchor="middle">$4.0</text>

  <!-- Spot -->
  <rect x="244" y="215" width="36" height="91" rx="4" fill="#55c555" opacity="0.9"/>
  <text x="262" y="210" font-size="10" fill="#55c555" text-anchor="middle">$1.4</text>

  <!-- Reserved -->
  <rect x="288" y="180" width="36" height="126" rx="4" fill="#7777cc" opacity="0.9"/>
  <text x="306" y="175" font-size="10" fill="#7777cc" text-anchor="middle">$2.5</text>

  <!-- H100 bars -->
  <!-- On-demand -->
  <rect x="332" y="108" width="36" height="198" rx="4" fill="#7ec8e3" opacity="0.9"/>
  <text x="350" y="103" font-size="10" fill="#7ec8e3" text-anchor="middle">$6.5</text>

  <!-- Spot -->
  <rect x="376" y="198" width="36" height="108" rx="4" fill="#55c555" opacity="0.9"/>
  <text x="394" y="193" font-size="10" fill="#55c555" text-anchor="middle">$2.3</text>

  <!-- Reserved -->
  <rect x="420" y="148" width="36" height="158" rx="4" fill="#7777cc" opacity="0.9"/>
  <text x="438" y="143" font-size="10" fill="#7777cc" text-anchor="middle">$4.2</text>

  <!-- Legend -->
  <rect x="60" y="332" width="14" height="12" rx="2" fill="#7ec8e3"/>
  <text x="80" y="342" font-size="11" fill="#ccc">온디맨드</text>
  <rect x="148" y="332" width="14" height="12" rx="2" fill="#55c555"/>
  <text x="168" y="342" font-size="11" fill="#ccc">스팟/프리엠티블</text>
  <rect x="278" y="332" width="14" height="12" rx="2" fill="#7777cc"/>
  <text x="298" y="342" font-size="11" fill="#ccc">예약 인스턴스 (1년)</text>

  <!-- Savings annotation -->
  <text x="440" y="342" font-size="11" fill="#55c555">스팟 절감: 최대 60~80%</text>

  <!-- Code block -->
  <text x="546" y="90" font-size="12" font-weight="700" fill="#888">체크포인팅으로 스팟 인스턴스 활용</text>
  <rect x="546" y="100" width="306" height="234" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text xml:space="preserve" x="560" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># TrainingArguments 스팟 설정</text>
  <text xml:space="preserve" x="560" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">from</tspan><tspan fill="#e8e8e8"> transformers </tspan><tspan fill="#7ec8e3">import</tspan></text>
  <text xml:space="preserve" x="560" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    TrainingArguments</tspan></text>
  <text xml:space="preserve" x="560" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> </text>
  <text xml:space="preserve" x="560" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">args </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> TrainingArguments(</tspan></text>
  <text xml:space="preserve" x="560" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  output_dir</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ce9178">"s3://bucket/ckpt"</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text xml:space="preserve" x="560" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  save_steps</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#b5cea8">50</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text xml:space="preserve" x="560" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  save_total_limit</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text xml:space="preserve" x="560" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  resume_from_checkpoint</tspan><tspan fill="#7ec8e3">=</tspan></text>
  <text xml:space="preserve" x="560" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    True</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text xml:space="preserve" x="560" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  bf16</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#7ec8e3">True</tspan></text>
  <text xml:space="preserve" x="560" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">)</tspan></text>

  <!-- Bottom tip -->
  <rect x="60" y="356" width="760" height="60" rx="8" fill="#111220" stroke="#333" stroke-width="1"/>
  <text x="440" y="374" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">스팟 인스턴스 절감 핵심: 50스텝마다 체크포인트 저장 + S3/GCS 즉시 업로드</text>
  <text x="440" y="392" font-size="12" fill="#aaa" text-anchor="middle">중단(preemption) 시 마지막 체크포인트부터 자동 재개 → 비용 70% 절감 가능</text>
  <text x="440" y="408" font-size="11" fill="#7ec8e3" text-anchor="middle">7B 모델 1000스텝 기준: 온디맨드 ~$45 → 스팟 ~$14 (A100 80GB 1장)</text>
</svg>
