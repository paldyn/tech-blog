<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Object.groupBy() — 그룹화 개념</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">ES2024 — 콜백 반환값 기준으로 배열 분류</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Input items -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">입력 배열</text>
  <rect x="60" y="126" width="680" height="50" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="100" y="146" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">fruits</text>
  <text x="100" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">🍎 apple</text>
  <text x="220" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">🍌 banana</text>
  <text x="360" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">🍇 grape</text>
  <text x="490" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">🍎 cherry</text>
  <text x="620" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">🍌 mango</text>

  <!-- Grouping function -->
  <text x="440" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">groupBy(item => item.type)</text>

  <!-- Arrow -->
  <line x1="400" y1="186" x2="400" y2="220" stroke="#7777cc" stroke-width="2"/>
  <polygon points="400,222 394,212 406,212" fill="#7777cc"/>
  <line x1="480" y1="186" x2="480" y2="220" stroke="#7777cc" stroke-width="2"/>
  <polygon points="480,222 474,212 486,212" fill="#7777cc"/>

  <!-- Output groups -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">출력 객체 (null 프로토타입)</text>

  <!-- "red" group -->
  <rect x="60" y="258" width="220" height="100" fill="#1a0e0e" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="170" y="278" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">red:</text>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">[ apple, cherry ]</text>

  <!-- "yellow" group -->
  <rect x="310" y="258" width="220" height="100" fill="#1a1a0e" rx="8" stroke="#b5cea8" stroke-width="2"/>
  <text x="420" y="278" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">yellow:</text>
  <text x="326" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">[ banana, mango ]</text>

  <!-- "purple" group -->
  <rect x="560" y="258" width="220" height="100" fill="#0e0e1a" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="670" y="278" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">purple:</text>
  <text x="576" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">[ grape ]</text>

  <!-- Code -->
  <text x="60" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">사용 예</text>
  <rect x="60" y="396" width="760" height="46" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> grouped = Object.groupBy(fruits, f =&gt; f.type);</tspan>
  </text>
  <text x="76" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">grouped.red; </tspan><tspan fill="#9aa4b8">// [apple, cherry]</tspan>
  </text>

</svg>
