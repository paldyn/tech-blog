<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CASE 실무 활용 패턴</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">조건부 집계 · 피벗 · ORDER BY 내 정렬 제어</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="228" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 조건부 집계 (피벗 패턴)</tspan></text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">SELECT</tspan></text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#7ec8e3">SUM</tspan>(<tspan fill="#7ec8e3">CASE WHEN</tspan> region=<tspan fill="#ce9178">'서울'</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    <tspan fill="#7ec8e3">THEN</tspan> amount <tspan fill="#7ec8e3">ELSE</tspan> <tspan fill="#b5cea8">0</tspan> <tspan fill="#7ec8e3">END</tspan>) <tspan fill="#7ec8e3">AS</tspan> seoul,</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#7ec8e3">SUM</tspan>(<tspan fill="#7ec8e3">CASE WHEN</tspan> region=<tspan fill="#ce9178">'부산'</tspan></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    <tspan fill="#7ec8e3">THEN</tspan> amount <tspan fill="#7ec8e3">ELSE</tspan> <tspan fill="#b5cea8">0</tspan> <tspan fill="#7ec8e3">END</tspan>) <tspan fill="#7ec8e3">AS</tspan> busan</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">FROM</tspan> sales;</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 사용자 지정 정렬 순서</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">ORDER BY</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#7ec8e3">CASE</tspan> status</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    <tspan fill="#7ec8e3">WHEN</tspan> <tspan fill="#ce9178">'긴급'</tspan> <tspan fill="#7ec8e3">THEN</tspan> <tspan fill="#b5cea8">1</tspan> <tspan fill="#7ec8e3">WHEN</tspan> <tspan fill="#ce9178">'일반'</tspan> <tspan fill="#7ec8e3">THEN</tspan> <tspan fill="#b5cea8">2</tspan></text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    <tspan fill="#7ec8e3">ELSE</tspan> <tspan fill="#b5cea8">3</tspan> <tspan fill="#7ec8e3">END</tspan>;</text>

  <!-- Note -->
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">CASE WHEN condition THEN val END — ELSE 생략 시 NULL / 단락 평가(short-circuit) 적용</text>
</svg>
