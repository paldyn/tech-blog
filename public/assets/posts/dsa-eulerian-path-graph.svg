<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">오일러 경로 vs 오일러 회로</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">모든 간선을 정확히 한 번 통과하는 경로/회로</text>

  <defs>
    <marker id="euler-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Left: Eulerian Circuit (all even degree) -->
  <rect x="40" y="86" width="380" height="300" fill="#111" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">오일러 회로 (모든 차수 짝수)</text>

  <!-- Pentagon graph with Eulerian circuit -->
  <!-- Nodes: A(150,180) B(280,180) C(320,280) D(215,350) E(80,280) -->
  <line x1="170" y1="180" x2="266" y2="180" stroke="#55c555" stroke-width="2.5" marker-end="url(#euler-arr)"/>
  <text x="218" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">1</text>

  <line x1="288" y1="192" x2="315" y2="272" stroke="#55c555" stroke-width="2.5" marker-end="url(#euler-arr)"/>
  <text x="310" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">2</text>

  <line x1="307" y1="286" x2="228" y2="344" stroke="#55c555" stroke-width="2.5" marker-end="url(#euler-arr)"/>
  <text x="274" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">3</text>

  <line x1="200" y1="350" x2="104" y2="287" stroke="#55c555" stroke-width="2.5" marker-end="url(#euler-arr)"/>
  <text x="145" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">4</text>

  <line x1="82" y1="270" x2="144" y2="187" stroke="#55c555" stroke-width="2.5" marker-end="url(#euler-arr)"/>
  <text x="103" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">5</text>

  <circle cx="150" cy="180" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">A</text>
  <text x="150" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">deg=2</text>

  <circle cx="285" cy="180" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="285" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">B</text>
  <text x="285" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">deg=2</text>

  <circle cx="325" cy="280" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="325" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">C</text>
  <text x="352" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">deg=2</text>

  <circle cx="215" cy="355" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="215" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">D</text>
  <text x="215" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">deg=2</text>

  <circle cx="80" cy="280" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="80" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">E</text>
  <text x="52" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">deg=2</text>

  <text x="230" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">A→B→C→D→E→A 회로 존재</text>

  <!-- Right: Eulerian Path (exactly 2 odd degree nodes) -->
  <rect x="460" y="86" width="380" height="300" fill="#111" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">오일러 경로 (홀수 차수 2개)</text>

  <defs>
    <marker id="euler-path" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Simple graph with 2 odd-degree nodes -->
  <line x1="510" y1="180" x2="616" y2="180" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#euler-path)"/>
  <text x="563" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">1</text>

  <line x1="636" y1="186" x2="736" y2="270" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#euler-path)"/>
  <text x="700" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">2</text>

  <line x1="724" y1="286" x2="640" y2="286" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#euler-path)"/>
  <text x="683" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">3</text>

  <line x1="626" y1="280" x2="530" y2="200" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#euler-path)"/>
  <text x="570" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">4</text>

  <line x1="630" y1="188" x2="630" y2="274" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#euler-path)"/>
  <text x="650" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">5</text>

  <!-- Odd degree start (A) -->
  <circle cx="490" cy="180" r="20" fill="#1a3a5e" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="490" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">A</text>
  <text x="490" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">deg=1</text>
  <text x="490" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시작</text>

  <circle cx="630" cy="180" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="630" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">B</text>
  <text x="630" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">deg=4</text>

  <circle cx="750" cy="280" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="750" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">C</text>
  <text x="778" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">deg=2</text>

  <!-- Odd degree end (D) -->
  <circle cx="630" cy="285" r="20" fill="#3a1a1a" stroke="#e05555" stroke-width="2.5"/>
  <text x="630" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">D</text>
  <text x="630" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">deg=3</text>
  <text x="630" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">끝</text>

  <text x="650" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">A→B→C→D→B→D 경로 존재</text>

  <!-- Bottom: conditions table -->
  <rect x="40" y="406" width="800" height="76" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">존재 조건 (무방향 그래프)</text>

  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">오일러 회로:</text>
  <text x="200" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">모든 노드의 차수가 짝수 + 그래프 연결</text>

  <text x="80" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">오일러 경로:</text>
  <text x="200" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">홀수 차수 노드 정확히 2개 + 그래프 연결</text>
</svg>
