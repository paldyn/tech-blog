<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">타입 전용 구문 세 가지 형태</text>

  <!-- Row 1: import type -->
  <rect x="60" y="80" width="380" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import type { User }</text>
  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  from "./models.js";</text>
  <rect x="480" y="80" width="340" height="64" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="496" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" xml:space="preserve">구문 전체가 타입 전용</text>
  <text x="496" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">컴파일 시 라인 전체가 제거됨 (TS 3.8+)</text>

  <!-- Row 2: inline type -->
  <rect x="60" y="160" width="380" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import { api, type User }</text>
  <text x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  from "./mod.js";</text>
  <rect x="480" y="160" width="340" height="64" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="496" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" xml:space="preserve">인라인 type 한정자</text>
  <text x="496" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">값과 타입을 한 줄에서 구분 (TS 4.5+)</text>

  <!-- Row 3: export type -->
  <rect x="60" y="240" width="380" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export type { User }</text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  from "./models.js";</text>
  <rect x="480" y="240" width="340" height="64" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="496" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" xml:space="preserve">타입만 재내보내기</text>
  <text x="496" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">배럴 파일에서 타입 재수출할 때 안전</text>

  <!-- Bottom note -->
  <rect x="60" y="330" width="760" height="62" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">왜 필요한가 — 파일 단위 트랜스파일러는 타입 정보를 모른다</text>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">esbuild·SWC·Babel이 "무엇을 지워야 하는지" 구문만 보고 판단할 수 있게 해 준다</text>
</svg>
