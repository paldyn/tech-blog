<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">조건 표현식 (삼항 연산자) 해부</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa" text-anchor="middle">value_if_true  if  condition  else  value_if_false</text>

  <!-- Anatomy diagram -->
  <rect x="60" y="88" width="760" height="80" rx="8" fill="#070b14" stroke="#1e2433"/>

  <!-- Parts labeled -->
  <text x="150" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">"합격"</text>
  <text x="310" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">if</text>
  <text x="460" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">score &gt;= 60</text>
  <text x="636" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">else</text>
  <text x="770" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">"불합격"</text>

  <!-- Labels -->
  <text x="150" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">True일 때 값</text>
  <text x="460" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">조건식</text>
  <text x="770" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">False일 때 값</text>

  <!-- Equivalence -->
  <text x="60" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">동등한 if/else 문</text>
  <rect x="60" y="202" width="360" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 한 줄 표현식</text>
  <text x="76" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">result = </text>
  <text x="148" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"합격"</text>
  <text x="196" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> if</text>
  <text x="218" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> score >= </text>
  <text x="290" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">60</text>
  <text x="308" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> else</text>
  <text x="342" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> "불합격"</text>
  <text x="76" y="271" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 동등한 if/else</text>
  <text x="76" y="289" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">if</text>
  <text x="94" y="289" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> score >= </text>
  <text x="166" y="289" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">60</text>
  <text x="184" y="289" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">: result = </text>
  <text x="274" y="289" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"합격"</text>
  <text x="76" y="307" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">else</text>
  <text x="108" y="307" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">: result = </text>
  <text x="198" y="307" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"불합격"</text>

  <!-- Right: use cases -->
  <text x="460" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">실전 사용 패턴</text>
  <rect x="460" y="202" width="360" height="184" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 함수 인수에 직접</text>
  <text x="476" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">print</text>
  <text x="516" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text>
  <text x="524" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"짝수"</text>
  <text x="566" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> if</text>
  <text x="588" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> n%</text>
  <text x="612" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2</text>
  <text x="620" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">==</text>
  <text x="638" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0</text>
  <text x="476" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">         else</text>
  <text x="558" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> "홀수"</text>
  <text x="606" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>
  <text x="476" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 리스트 컴프리헨션</text>
  <text x="476" y="305" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">labels = [</text>
  <text x="476" y="323" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "짝"</text>
  <text x="518" y="323" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> if</text>
  <text x="540" y="323" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> n%</text>
  <text x="564" y="323" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2</text>
  <text x="572" y="323" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">==</text>
  <text x="590" y="323" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0</text>
  <text x="476" y="341" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    else</text>
  <text x="526" y="341" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> "홀"</text>
  <text x="476" y="359" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    for</text>
  <text x="518" y="359" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> n </text>
  <text x="536" y="359" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">in</text>
  <text x="554" y="359" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> range(</text>
  <text x="602" y="359" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">5</text>
  <text x="610" y="359" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)]</text>

  <!-- Bottom warning -->
  <rect x="60" y="364" width="760" height="42" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle"><tspan font-weight="700" fill="#e05555">주의:</tspan> 중첩 삼항 연산자는 가독성을 크게 해침 — 2단계 이상이면 if/elif로 풀어 쓸 것</text>
  <text x="440" y="399" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">a if c1 else b if c2 else d   # 읽기 어렵다</text>
</svg>
