<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#9988dd"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">내장 자동화로 카드가 스스로 움직인다</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">이벤트가 발생하면 Status 필드가 자동으로 바뀐다</text>

  <!-- event -->
  <rect x="56" y="120" width="200" height="64" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="156" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">이슈에 PR 연결됨</text>
  <text x="156" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">작업 시작 이벤트</text>

  <line x1="256" y1="152" x2="324" y2="152" stroke="#9988dd" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>

  <rect x="326" y="120" width="220" height="64" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="436" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">자동 규칙 실행</text>
  <text x="436" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Status → In progress</text>

  <line x1="546" y1="152" x2="614" y2="152" stroke="#9988dd" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>

  <rect x="616" y="120" width="208" height="64" rx="10" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">보드에 즉시 반영</text>
  <text x="720" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">카드가 컬럼 이동</text>

  <text x="440" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#888">기본 제공 규칙: 항목 추가 시 Todo · PR 머지 시 Done · 이슈 닫힘 시 Done 등</text>
</svg>
