<svg width="880" viewBox="0 0 880 700"
     xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="700" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N 3-Tier 아키텍처</text>
  <text x="440" y="70" text-anchor="middle"
        font-size="14" fill="#888">브라우저 · 런타임 · 서버 전체 구조</text>

  <!-- ========== Layer 1: Browser ========== -->
  <rect x="60" y="88" width="760" height="132"
        fill="#0b1520" stroke="#1e3a5f" stroke-width="1.5" rx="8"/>
  <text x="80" y="109" font-size="13" font-weight="600" fill="#7ec8e3">브라우저 레이어 (Client)</text>

  <!-- Sub-box Left: HTML5 Canvas/DOM -->
  <rect x="80" y="118" width="340" height="90"
        fill="#060d18" stroke="#1e3a5f" stroke-width="1" rx="5"/>
  <text x="250" y="145" text-anchor="middle"
        font-size="14" font-weight="600" fill="#e8e8e8">HTML5 Canvas / DOM</text>
  <text x="250" y="165" text-anchor="middle"
        font-size="12" fill="#888">브라우저 네이티브 렌더링 엔진</text>
  <text x="250" y="183" text-anchor="middle"
        font-size="12" fill="#888">Chrome · Firefox · Safari · Edge</text>

  <!-- Sub-box Right: JavaScript Engine -->
  <rect x="440" y="118" width="340" height="90"
        fill="#060d18" stroke="#1e3a5f" stroke-width="1" rx="5"/>
  <text x="610" y="145" text-anchor="middle"
        font-size="14" font-weight="600" fill="#e8e8e8">JavaScript Engine</text>
  <text x="610" y="165" text-anchor="middle"
        font-size="12" fill="#888">V8 · SpiderMonkey · JavaScriptCore</text>
  <text x="610" y="183" text-anchor="middle"
        font-size="12" fill="#888">Nexacro 스크립트 실행 환경</text>

  <!-- Arrow 1: Down — Browser to Runtime (gap y=220 to y=270, 50px) -->
  <!-- Solid polygon arrow, shaft 8px wide, head 28px wide -->
  <polygon points="436,220 444,220 444,252 454,252 440,268 426,252 436,252"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>
  <text x="460" y="250" font-size="12" fill="#7777cc">HTTP / PL Protocol</text>

  <!-- ========== Layer 2: Nexacro Runtime ========== -->
  <rect x="60" y="270" width="760" height="170"
        fill="#070e07" stroke="#1a3d1a" stroke-width="1.5" rx="8"/>
  <text x="80" y="292" font-size="13" font-weight="600" fill="#55c555">Nexacro 런타임 레이어</text>

  <!-- 4 sub-boxes: width=167 each, gap=17px, start x=80 -->
  <!-- Box 1 end: 247, Box 2 start: 264, Box 2 end: 431, Box 3 start: 448, Box 3 end: 615, Box 4 start: 632, Box 4 end: 799 -->

  <!-- Box 1: Component Engine -->
  <rect x="80" y="302" width="167" height="120"
        fill="#050c05" stroke="#1a3d1a" stroke-width="1" rx="5"/>
  <text x="163" y="325" text-anchor="middle"
        font-size="13" font-weight="600" fill="#e8e8e8">컴포넌트 엔진</text>
  <text x="163" y="345" text-anchor="middle" font-size="11" fill="#888">Button · Grid</text>
  <text x="163" y="360" text-anchor="middle" font-size="11" fill="#888">Edit · Combo · Tree</text>
  <text x="163" y="375" text-anchor="middle" font-size="11" fill="#888">Tab · Calendar...</text>
  <text x="163" y="408" text-anchor="middle" font-size="11" fill="#55c555">약 300개 컴포넌트</text>

  <!-- Box 2: Layout Engine -->
  <rect x="264" y="302" width="167" height="120"
        fill="#050c05" stroke="#1a3d1a" stroke-width="1" rx="5"/>
  <text x="347" y="325" text-anchor="middle"
        font-size="13" font-weight="600" fill="#e8e8e8">레이아웃 엔진</text>
  <text x="347" y="345" text-anchor="middle" font-size="11" fill="#888">절대 좌표 배치</text>
  <text x="347" y="360" text-anchor="middle" font-size="11" fill="#888">Anchor · Margin</text>
  <text x="347" y="375" text-anchor="middle" font-size="11" fill="#888">다중 해상도 대응</text>
  <text x="347" y="408" text-anchor="middle" font-size="11" fill="#55c555">픽셀 정밀 제어</text>

  <!-- Box 3: Dataset Manager -->
  <rect x="448" y="302" width="167" height="120"
        fill="#050c05" stroke="#1a3d1a" stroke-width="1" rx="5"/>
  <text x="531" y="325" text-anchor="middle"
        font-size="13" font-weight="600" fill="#e8e8e8">Dataset 관리자</text>
  <text x="531" y="345" text-anchor="middle" font-size="11" fill="#888">Row · Column</text>
  <text x="531" y="360" text-anchor="middle" font-size="11" fill="#888">RowStatus 추적</text>
  <text x="531" y="375" text-anchor="middle" font-size="11" fill="#888">Filter · Sort · Group</text>
  <text x="531" y="408" text-anchor="middle" font-size="11" fill="#55c555">인메모리 DB 역할</text>

  <!-- Box 4: Transaction Manager -->
  <rect x="632" y="302" width="167" height="120"
        fill="#050c05" stroke="#1a3d1a" stroke-width="1" rx="5"/>
  <text x="715" y="325" text-anchor="middle"
        font-size="13" font-weight="600" fill="#e8e8e8">Transaction 관리자</text>
  <text x="715" y="345" text-anchor="middle" font-size="11" fill="#888">transaction() 처리</text>
  <text x="715" y="360" text-anchor="middle" font-size="11" fill="#888">직렬화 / 역직렬화</text>
  <text x="715" y="375" text-anchor="middle" font-size="11" fill="#888">비동기 콜백 관리</text>
  <text x="715" y="408" text-anchor="middle" font-size="11" fill="#55c555">서버 연동 핵심</text>

  <!-- Arrow 2: Down — Runtime to Server (gap y=440 to y=490, 50px) -->
  <polygon points="436,440 444,440 444,472 454,472 440,488 426,472 436,472"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>
  <text x="460" y="470" font-size="12" fill="#7777cc">PL Protocol</text>

  <!-- ========== Layer 3: Server ========== -->
  <rect x="60" y="490" width="760" height="130"
        fill="#110710" stroke="#3d1a1a" stroke-width="1.5" rx="8"/>
  <text x="80" y="512" font-size="13" font-weight="600" fill="#e05555">서버 레이어</text>

  <!-- 3 sub-boxes: x=80, width=226, gap=16; x=322, x=564 -->
  <!-- Box 1 end: 306, Box 2: 322-548, Box 3: 564-790 (within 820 ✓) -->

  <!-- Box 1: Nexacro Adapter -->
  <rect x="80" y="522" width="226" height="84"
        fill="#0c0408" stroke="#3d1a1a" stroke-width="1" rx="5"/>
  <text x="193" y="550" text-anchor="middle"
        font-size="13" font-weight="600" fill="#e8e8e8">Nexacro 어댑터</text>
  <text x="193" y="570" text-anchor="middle" font-size="11" fill="#888">Java / .NET / Node.js</text>
  <text x="193" y="590" text-anchor="middle" font-size="11" fill="#e05555">PL 프로토콜 파싱</text>

  <!-- Box 2: Business Logic -->
  <rect x="322" y="522" width="226" height="84"
        fill="#0c0408" stroke="#3d1a1a" stroke-width="1" rx="5"/>
  <text x="435" y="550" text-anchor="middle"
        font-size="13" font-weight="600" fill="#e8e8e8">비즈니스 로직</text>
  <text x="435" y="570" text-anchor="middle" font-size="11" fill="#888">Service · DAO 계층</text>
  <text x="435" y="590" text-anchor="middle" font-size="11" fill="#e05555">Spring / MyBatis 등</text>

  <!-- Box 3: Database -->
  <rect x="564" y="522" width="226" height="84"
        fill="#0c0408" stroke="#3d1a1a" stroke-width="1" rx="5"/>
  <text x="677" y="550" text-anchor="middle"
        font-size="13" font-weight="600" fill="#e8e8e8">데이터베이스</text>
  <text x="677" y="570" text-anchor="middle" font-size="11" fill="#888">Oracle · MySQL</text>
  <text x="677" y="590" text-anchor="middle" font-size="11" fill="#e05555">MSSQL · PostgreSQL</text>

  <!-- Footer -->
  <text x="440" y="648" text-anchor="middle"
        font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈</text>

</svg>
