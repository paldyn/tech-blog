<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">쿠버네티스 파드(Pod) 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파드는 하나 이상의 컨테이너를 묶는 최소 배포 단위</text>

  <!-- Pod outer box -->
  <rect x="60" y="90" width="500" height="370" rx="12" fill="#0d0d1a" stroke="#7777cc" stroke-width="2"/>
  <text x="180" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Pod</text>
  <text x="230" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(공유: IP, 네트워크 네임스페이스, 볼륨)</text>

  <!-- Container 1 -->
  <rect x="90" y="128" width="200" height="100" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="190" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Main Container</text>
  <text x="190" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">myapp:latest</text>
  <text x="190" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">port: 8080</text>
  <text x="190" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">CPU: 0.5 / MEM: 256Mi</text>

  <!-- Container 2: sidecar -->
  <rect x="310" y="128" width="200" height="100" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="410" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Sidecar Container</text>
  <text x="410" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">nginx:latest (proxy)</text>
  <text x="410" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">port: 80</text>
  <text x="410" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">CPU: 0.1 / MEM: 64Mi</text>

  <!-- Shared network namespace -->
  <rect x="90" y="248" width="420" height="48" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="300" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">공유 네트워크 네임스페이스</text>
  <text x="300" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">IP: 10.244.0.5  → localhost 통신 가능</text>

  <!-- Shared volumes -->
  <rect x="90" y="315" width="420" height="48" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="300" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">공유 볼륨 (emptyDir / PVC)</text>
  <text x="300" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">/shared-data  → 컨테이너 간 파일 공유</text>

  <!-- Init container -->
  <rect x="90" y="381" width="420" height="48" rx="6" fill="#1a1a0d" stroke="#ce9178" stroke-width="1"/>
  <text x="300" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">Init Container (선택)</text>
  <text x="300" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메인 컨테이너 시작 전 완료해야 하는 작업</text>

  <!-- Right side: Pod metadata -->
  <rect x="600" y="90" width="220" height="370" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="710" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Pod 메타데이터</text>

  <rect x="616" y="128" width="188" height="310" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="632" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">apiVersion</text>
  <text x="632" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  v1</text>
  <text x="632" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kind</text>
  <text x="632" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  Pod</text>
  <text x="632" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">metadata</text>
  <text x="632" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  name: myapp</text>
  <text x="632" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  labels:</text>
  <text x="632" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    app: myapp</text>
  <text x="632" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">spec</text>
  <text x="632" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  containers:</text>
  <text x="632" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  - name: app</text>
  <text x="632" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    image:</text>
  <text x="632" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">     myapp:1.0</text>
  <text x="632" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    ports:</text>
  <text x="632" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    - 8080</text>
</svg>
