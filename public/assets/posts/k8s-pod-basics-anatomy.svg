<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pod 내부 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">하나의 Pod는 하나의 네트워크 네임스페이스를 공유하는 컨테이너 묶음</text>

  <!-- Pod outer box -->
  <rect x="60" y="100" width="760" height="300" rx="12" fill="#0d1117" stroke="#3949ab" stroke-width="2"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#9fa8da" text-anchor="middle">Pod (공유: IP, Port 공간, localhost, Volume)</text>

  <!-- pause container -->
  <rect x="100" y="148" width="140" height="80" rx="8" fill="#1a237e" stroke="#3949ab" stroke-width="1"/>
  <text x="170" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9fa8da" text-anchor="middle">pause 컨테이너</text>
  <text x="170" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">(infra container)</text>
  <text x="170" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">네트워크 NS 보유</text>

  <!-- App container 1 -->
  <rect x="280" y="148" width="160" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="360" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">앱 컨테이너 1</text>
  <text x="360" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9ca3af" text-anchor="middle">nginx:1.25</text>
  <text x="360" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9ca3af" text-anchor="middle">port: 80</text>

  <!-- App container 2 -->
  <rect x="460" y="148" width="160" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="540" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">사이드카 컨테이너</text>
  <text x="540" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9ca3af" text-anchor="middle">fluentd:latest</text>
  <text x="540" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9ca3af" text-anchor="middle">로그 수집</text>

  <!-- Shared Volume -->
  <rect x="640" y="148" width="140" height="80" rx="8" fill="#0d1f12" stroke="#166534" stroke-width="1"/>
  <text x="710" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">공유 Volume</text>
  <text x="710" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9ca3af" text-anchor="middle">/var/log</text>
  <text x="710" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9ca3af" text-anchor="middle">emptyDir</text>

  <!-- Shared network label -->
  <rect x="100" y="265" width="440" height="50" rx="6" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="320" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">공유 네트워크: 동일 IP (10.0.0.5), localhost 통신 가능</text>
  <text x="320" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">컨테이너간 port 충돌 주의 — 같은 포트를 두 컨테이너가 열 수 없음</text>

  <!-- External -->
  <rect x="100" y="340" width="150" height="34" rx="6" fill="#1a0000" stroke="#7f1d1d" stroke-width="1"/>
  <text x="175" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">외부 컨테이너 B</text>

  <line x1="258" y1="357" x2="310" y2="357" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="310" y="340" width="250" height="34" rx="6" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="435" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">Pod IP로 접근 (네트워크 격리)</text>

  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#6b7280" text-anchor="middle">Pod는 K8s 최소 배포 단위 &#x2014; 컨테이너를 개별 배포하지 않고 Pod 단위로 배포</text>
</svg>
