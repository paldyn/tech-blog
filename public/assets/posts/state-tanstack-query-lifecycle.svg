<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14"
            refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14"
            refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#e05555"/>
    </marker>
    <marker id="arr-teal" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14"
            refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-gray" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14"
            refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="45" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TanStack Query — 쿼리 수명 주기</text>

  <!-- STATE 1: loading (top center) -->
  <rect x="340" y="80" width="200" height="60" fill="#1a1000" stroke="#e8c55a" stroke-width="2" rx="8"/>
  <text x="440" y="107" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8c55a">loading</text>
  <text x="440" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">isFetching: true</text>

  <!-- STATE 2: success (left) -->
  <rect x="60" y="220" width="200" height="60" fill="#0a1a0a" stroke="#55c555" stroke-width="2" rx="8"/>
  <text x="160" y="247" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">success</text>
  <text x="160" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">data: T</text>

  <!-- STATE 3: error (right) -->
  <rect x="620" y="220" width="200" height="60" fill="#1a0a0a" stroke="#e05555" stroke-width="2" rx="8"/>
  <text x="720" y="247" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">error</text>
  <text x="720" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">error: Error</text>

  <!-- STATE 4: stale (bottom left) -->
  <rect x="60" y="370" width="200" height="60" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="2" rx="8"/>
  <text x="160" y="397" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">stale</text>
  <text x="160" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">staleTime 경과</text>

  <!-- STATE 5: paused (bottom center) -->
  <rect x="340" y="370" width="200" height="60" fill="#111" stroke="#555" stroke-width="2" rx="8"/>
  <text x="440" y="397" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">paused</text>
  <text x="440" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">offline / no observer</text>

  <!-- Arrow: loading → success -->
  <path d="M 340,140 L 160,220"
        fill="none" stroke="#55c555" stroke-width="2"
        marker-end="url(#arr-green)"/>
  <text x="222" y="184"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">fetchFn resolves</text>

  <!-- Arrow: loading → error -->
  <path d="M 540,140 L 720,220"
        fill="none" stroke="#e05555" stroke-width="2"
        marker-end="url(#arr-red)"/>
  <text x="654" y="184"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">fetchFn rejects</text>

  <!-- Arrow: success → stale -->
  <line x1="160" y1="280" x2="160" y2="368"
        stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arr-teal)"/>
  <text x="178" y="330"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">staleTime↑</text>

  <!-- Arrow: stale → loading (dashed, curved back up) -->
  <path d="M 260,400 C 440,440 440,200 340,140"
        fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#arr-teal)"/>
  <text x="388" y="445"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">refetch on focus / mount</text>

  <!-- Arrow: error → loading (dashed retry) -->
  <path d="M 620,250 C 500,200 480,160 540,140"
        fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#arr-red)"/>
  <text x="544" y="210"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">retry</text>

  <!-- Arrow: success → paused (when offline) -->
  <path d="M 260,420 L 338,420"
        fill="none" stroke="#555" stroke-width="2"
        marker-end="url(#arr-gray)"/>
  <text x="300" y="413"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">offline</text>

  <!-- Bottom info text -->
  <text x="440" y="460"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">gcTime(기본 5분) 후 캐시 삭제 | staleTime(기본 0) 후 stale 상태 | retry(기본 3회)</text>
</svg>
