<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Context 흐름과 타입의 출처</text>
  <text x="60" y="78" font-size="13" fill="#888">createContext의 제네릭이 Provider value와 소비 훅까지 한 타입으로 묶는다</text>

  <defs>
    <marker id="arrC" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="120" width="220" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="150" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">createContext&lt;T&gt;</text>
  <text x="170" y="184" font-size="13" fill="#ffffff" text-anchor="middle">타입 T를 선언</text>
  <text x="170" y="212" font-size="13" fill="#9aa4b8" text-anchor="middle">진실의 출처</text>

  <rect x="340" y="120" width="200" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="150" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Provider</text>
  <text x="440" y="184" font-size="13" fill="#ffffff" text-anchor="middle">value={...}</text>
  <text x="440" y="212" font-size="13" fill="#9aa4b8" text-anchor="middle">T와 일치 검증</text>

  <rect x="600" y="120" width="220" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="150" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">useContext</text>
  <text x="710" y="184" font-size="13" fill="#ffffff" text-anchor="middle">값을 T로 받음</text>
  <text x="710" y="212" font-size="13" fill="#9aa4b8" text-anchor="middle">자동완성·검사</text>

  <line x1="280" y1="180" x2="338" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrC)"/>
  <line x1="540" y1="180" x2="598" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrC)"/>

  <text x="60" y="290" font-size="13" fill="#ffffff">T 한 곳만 바꾸면 Provider와 모든 소비처가 동시에 타입 검사를 다시 받는다.</text>
</svg>
