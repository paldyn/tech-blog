<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Leftmost Prefix 규칙 — 복합 인덱스 활용 패턴</text>

  <!-- Index definition -->
  <rect x="60" y="66" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="84" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 복합 인덱스 정의</text>
  <text x="76" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">CREATE INDEX</text>
  <text x="186" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> idx_a_b_c </text>
  <text x="298" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ON</text>
  <text x="322" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> orders (status, country, amount);</text>

  <!-- Header row -->
  <rect x="60" y="126" width="760" height="30" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">WHERE 조건</text>
  <text x="420" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">인덱스 사용 여부</text>
  <text x="680" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">사용 칼럼</text>

  <!-- Row 1: all three -->
  <rect x="60" y="156" width="760" height="40" rx="0" fill="#0d1f0d" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="180" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">status=? AND country=? AND amount=?</text>
  <text x="420" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" font-weight="700">✓ Full Index</text>
  <text x="680" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">status, country, amount</text>

  <!-- Row 2: first two -->
  <rect x="60" y="196" width="760" height="40" rx="0" fill="#0d1f0d" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="220" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">status=? AND country=?</text>
  <text x="420" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" font-weight="700">✓ Partial</text>
  <text x="680" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">status, country</text>

  <!-- Row 3: first only -->
  <rect x="60" y="236" width="760" height="40" rx="0" fill="#0d1f0d" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="260" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">status=?</text>
  <text x="420" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" font-weight="700">✓ Partial</text>
  <text x="680" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">status</text>

  <!-- Row 4: skip first -->
  <rect x="60" y="276" width="760" height="40" rx="0" fill="#1f0d0d" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="300" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">country=?</text>
  <text x="420" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" font-weight="700">✗ Full Scan</text>
  <text x="680" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">status 빠짐</text>

  <!-- Row 5: last only -->
  <rect x="60" y="316" width="760" height="40" rx="0" fill="#1f0d0d" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="340" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">amount &gt; 100</text>
  <text x="420" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" font-weight="700">✗ Full Scan</text>
  <text x="680" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">앞 2칼럼 빠짐</text>

  <!-- Row 6: first range then eq -->
  <rect x="60" y="356" width="760" height="40" rx="0" fill="#1a1a0a" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="380" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">status=? AND amount &gt; 100</text>
  <text x="420" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7777cc" font-weight="700">△ Partial</text>
  <text x="680" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">status만 (country 건너뜀)</text>

  <!-- Row 7: ORDER BY -->
  <rect x="60" y="396" width="760" height="40" rx="0" fill="#0d1f0d" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="420" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">status=? ORDER BY country</text>
  <text x="420" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" font-weight="700">✓ Index Sort</text>
  <text x="680" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">filesort 없음</text>

  <!-- Rule box -->
  <rect x="60" y="454" width="760" height="62" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Leftmost Prefix 핵심 규칙</text>
  <text x="440" y="496" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">인덱스 칼럼은 왼쪽부터 순서대로 사용해야 함 — 중간 칼럼 건너뛰기 불가</text>
  <text x="440" y="508" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">범위 조건(>, &lt;, LIKE 'prefix%') 이후의 칼럼은 인덱스 필터에서 제외됨</text>
</svg>
