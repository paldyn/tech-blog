<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 도입의 핵심 이점</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">실무에서 검증된 5가지 생산성 향상 요소</text>
  <!-- Benefit 1 -->
  <rect x="60" y="100" width="360" height="155" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="88" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">① 에러의 조기 발견</text>
  <text x="88" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">타입 불일치, null 참조, 오타 등을</text>
  <text x="88" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">에디터가 실시간으로 표시한다.</text>
  <text x="88" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">런타임 크래시 → 컴파일 타임 경고</text>
  <text x="88" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">버그 발견 비용 최소화</text>
  <text x="88" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">대형 프로젝트일수록 효과 극대화</text>
  <!-- Benefit 2 -->
  <rect x="460" y="100" width="360" height="155" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="488" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">② 강력한 IDE 지원</text>
  <text x="488" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">타입 정보를 바탕으로 자동완성,</text>
  <text x="488" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">리팩터링, 타입 힌트가 정확해진다.</text>
  <text x="488" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">IntelliSense 자동완성 정확도 향상</text>
  <text x="488" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">안전한 리팩터링 (이름 변경, 이동)</text>
  <text x="488" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">코드 탐색 시간 대폭 단축</text>
  <!-- Benefit 3 -->
  <rect x="60" y="280" width="360" height="155" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="88" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#ce9178">③ 살아있는 문서화</text>
  <text x="88" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">함수 시그니처와 타입이 곧 사용 설명서.</text>
  <text x="88" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">항상 최신 상태를 유지한다.</text>
  <text x="88" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">별도 문서 작성 부담 감소</text>
  <text x="88" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">팀 합류 시 코드 이해 속도 향상</text>
  <text x="88" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">코드 = 명세서 (Self-documenting)</text>
  <!-- Benefit 4 -->
  <rect x="460" y="280" width="360" height="155" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="488" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">④ 안전한 대규모 리팩터링</text>
  <text x="488" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">타입 시스템이 변경의 영향 범위를</text>
  <text x="488" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">자동으로 추적한다.</text>
  <text x="488" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">API 변경 시 모든 호출 지점 자동 검사</text>
  <text x="488" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">두려움 없는 코드 개선 가능</text>
  <text x="488" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">수천 개 파일 변경도 자신감 있게</text>
</svg>
