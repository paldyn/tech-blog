<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">왜 TypeScript인가?</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">개발팀이 TypeScript를 선택하는 5가지 이유</text>

  <!-- Row 1: 2 boxes -->
  <!-- Box 1 -->
  <rect x="60" y="100" width="370" height="110" rx="10" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="90" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">01  조기 버그 발견</text>
  <text x="90" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">런타임이 아닌 컴파일 단계에서 타입 오류를</text>
  <text x="90" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">사전에 잡아냄으로써 프로덕션 버그를 줄입니다.</text>
  <text x="90" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2714; undefined is not a function 방지</text>

  <!-- Box 2 -->
  <rect x="450" y="100" width="370" height="110" rx="10" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">02  IDE 지원 강화</text>
  <text x="480" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">자동완성, 정의로 이동, 리팩터링 등</text>
  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">강력한 IDE 인텔리센스 기능을 활성화합니다.</text>
  <text x="480" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2714; VS Code, WebStorm 완벽 지원</text>

  <!-- Row 2: 2 boxes -->
  <!-- Box 3 -->
  <rect x="60" y="228" width="370" height="110" rx="10" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="90" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">03  코드 문서화</text>
  <text x="90" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">타입 선언이 곧 살아있는 문서가 됩니다.</text>
  <text x="90" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">함수 시그니처만 봐도 사용법이 명확합니다.</text>
  <text x="90" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2714; 별도 JSDoc 불필요</text>

  <!-- Box 4 -->
  <rect x="450" y="228" width="370" height="110" rx="10" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">04  대규모 협업</text>
  <text x="480" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">명시적 인터페이스로 팀 간 계약을 정의합니다.</text>
  <text x="480" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">코드 리뷰 시 타입 불일치를 즉시 발견합니다.</text>
  <text x="480" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2714; 구글, 마이크로소프트, 에어비앤비 채택</text>

  <!-- Row 3: 1 wide box -->
  <rect x="60" y="356" width="760" height="110" rx="10" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">05  점진적 도입 가능</text>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">기존 JavaScript 프로젝트에 TypeScript를 한 파일씩 도입할 수 있습니다.</text>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">.js 파일을 .ts로 바꾸고 타입을 점진적으로 추가하는 마이그레이션 전략이 공식 지원됩니다.</text>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">&#x2714; allowJs: true 옵션으로 JS/TS 혼용 가능</text>
</svg>
