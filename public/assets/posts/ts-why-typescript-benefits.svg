<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 도입 효과</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">개발 경험과 코드 품질의 동시 향상</text>
  <!-- Row 1 left -->
  <rect x="60" y="100" width="370" height="90" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="96" cy="130" r="18" fill="#0d2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="96" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7ec8e3">1</text>
  <text x="126" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">조기 오류 발견</text>
  <text x="126" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">런타임 전에 컴파일 타임에 버그를 잡아 줌</text>
  <text x="126" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로덕션 장애 비용 절감</text>
  <!-- Row 1 right -->
  <rect x="450" y="100" width="370" height="90" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="486" cy="130" r="18" fill="#0d2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="486" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7ec8e3">2</text>
  <text x="516" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">강력한 IDE 지원</text>
  <text x="516" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자동완성, 타입 힌트, 오류 즉시 표시</text>
  <text x="516" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드 탐색 및 리팩터링 자동화</text>
  <!-- Row 2 left -->
  <rect x="60" y="210" width="370" height="90" rx="8" fill="#0d1a2a" stroke="#55c555" stroke-width="1.5"/>
  <circle cx="96" cy="240" r="18" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="96" y="245" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#55c555">3</text>
  <text x="126" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">코드 가독성 향상</text>
  <text x="126" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입이 의도를 명시하는 살아있는 문서</text>
  <text x="126" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수 시그니처만 봐도 용도 파악 가능</text>
  <!-- Row 2 right -->
  <rect x="450" y="210" width="370" height="90" rx="8" fill="#0d1a2a" stroke="#55c555" stroke-width="1.5"/>
  <circle cx="486" cy="240" r="18" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="486" y="245" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#55c555">4</text>
  <text x="516" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">안전한 리팩터링</text>
  <text x="516" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 변경 시 영향 범위를 즉시 파악</text>
  <text x="516" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대규모 코드베이스 리팩터링 자신감 UP</text>
  <!-- Row 3 left -->
  <rect x="60" y="320" width="370" height="90" rx="8" fill="#0d1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <circle cx="96" cy="350" r="18" fill="#1a1a3a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="96" y="355" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7777cc">5</text>
  <text x="126" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">팀 협업 강화</text>
  <text x="126" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인터페이스로 API 계약 명확히 정의</text>
  <text x="126" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드 리뷰 효율성 향상</text>
  <!-- Row 3 right -->
  <rect x="450" y="320" width="370" height="90" rx="8" fill="#0d1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <circle cx="486" cy="350" r="18" fill="#1a1a3a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="486" y="355" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7777cc">6</text>
  <text x="516" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">생태계 지원</text>
  <text x="516" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">React, Node, Vue 등 완전 지원</text>
  <text x="516" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">@types/* 패키지로 서드파티 타입 제공</text>
  <text x="440" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Microsoft 자체 연구: TypeScript 도입 후 버그 15% 감소 효과</text>
</svg>
