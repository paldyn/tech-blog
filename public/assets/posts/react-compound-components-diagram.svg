<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컴파운드 컴포넌트 패턴</text>

  <defs>
    <marker id="arrc" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Root component -->
  <rect x="330" y="72" width="220" height="56" rx="10" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">&lt;Select&gt; (Root)</text>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Context 제공 · 상태 관리</text>

  <!-- Lines from root to children -->
  <line x1="370" y1="128" x2="200" y2="178" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrc)"/>
  <line x1="440" y1="128" x2="440" y2="178" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrc)"/>
  <line x1="510" y1="128" x2="680" y2="178" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrc)"/>

  <!-- Sub-components -->
  <rect x="100" y="182" width="200" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Select.Trigger</text>
  <text x="200" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">선택된 값 표시·클릭</text>

  <rect x="330" y="182" width="220" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Select.List</text>
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">열림/닫힘 상태 구독</text>

  <rect x="580" y="182" width="200" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="680" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Select.Option</text>
  <text x="680" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">항목 클릭 → 상태 업데이트</text>

  <!-- Usage code box -->
  <rect x="60" y="256" width="760" height="140" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#9aa4b8">// 사용자 코드 — 내부 상태 관리 없이 직관적 구성</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Select</tspan><tspan fill="#ffffff"> defaultValue=</tspan><tspan fill="#ce9178">"react"</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Select.Trigger</tspan><tspan fill="#ffffff"> /&gt;</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Select.List</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Select.Option</tspan><tspan fill="#ffffff"> value=</tspan><tspan fill="#ce9178">"react"</tspan><tspan fill="#ffffff">&gt;React&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Select.Option</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Select.Option</tspan><tspan fill="#ffffff"> value=</tspan><tspan fill="#ce9178">"vue"</tspan><tspan fill="#ffffff">&gt;Vue&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Select.Option</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">  &lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Select.List</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
  </text>
</svg>
