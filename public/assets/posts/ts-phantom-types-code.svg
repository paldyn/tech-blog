<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" font-weight="600" fill="#7ec8e3">declare</tspan><tspan font-weight="600" fill="#7ec8e3"> function</tspan><tspan fill="#ffffff"> send(</tspan></text>
