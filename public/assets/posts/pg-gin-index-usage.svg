<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GIN 인덱스 주요 활용 패턴</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">tsvector 전문검색, 배열 포함 검사, JSONB 키 검색</text>

  <!-- FTS block -->
  <rect x="60" y="96" width="240" height="268" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="180" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">전문 검색 (FTS)</text>
  <text x="74" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- FTS 인덱스</text>
  <text x="74" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">CREATE INDEX</text>
  <text x="74" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  idx_docs_fts ON docs</text>
  <text x="74" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">USING gin</text>
  <text x="74" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  (to_tsvector(</text>
  <text x="74" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">    'english', body));</text>
  <text x="74" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 검색</text>
  <text x="74" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">SELECT title FROM docs</text>
  <text x="74" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="74" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  to_tsvector(</text>
  <text x="74" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">    'english', body)</text>
  <text x="74" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  @@ to_tsquery(</text>
  <text x="74" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">    'english','gin');</text>

  <!-- Array block -->
  <rect x="320" y="96" width="240" height="268" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">배열 포함 검사</text>
  <text x="334" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 배열 GIN 인덱스</text>
  <text x="334" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">CREATE INDEX</text>
  <text x="334" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  idx_tags ON articles</text>
  <text x="334" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">USING gin (tags);</text>
  <text x="334" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 포함 검사 (@&gt;)</text>
  <text x="334" y="229" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">SELECT * FROM articles</text>
  <text x="334" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">WHERE tags @&gt;</text>
  <text x="334" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">  ARRAY['postgresql'];</text>
  <text x="334" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 겹침 검사 (&amp;&amp;)</text>
  <text x="334" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">SELECT * FROM articles</text>
  <text x="334" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">WHERE tags &amp;&amp;</text>
  <text x="334" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">  ARRAY['gin','btree'];</text>

  <!-- JSONB block -->
  <rect x="580" y="96" width="240" height="268" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="700" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">JSONB 키 검색</text>
  <text x="594" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- JSONB GIN 인덱스</text>
  <text x="594" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">CREATE INDEX</text>
  <text x="594" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  idx_meta ON events</text>
  <text x="594" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">USING gin (metadata);</text>
  <text x="594" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 키 존재 여부 (?)</text>
  <text x="594" y="229" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">SELECT * FROM events</text>
  <text x="594" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">WHERE metadata</text>
  <text x="594" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  ? 'user_id';</text>
  <text x="594" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 포함 포함 (@&gt;)</text>
  <text x="594" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">SELECT * FROM events</text>
  <text x="594" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">WHERE metadata @&gt;</text>
  <text x="594" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">  '{"type":"login"}';</text>
  <text x="594" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- jsonb_path_ops 오퍼클래스</text>
</svg>
