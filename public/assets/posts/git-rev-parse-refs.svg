<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git rev-parse: 참조 → SHA 변환</text>

  <defs>
    <marker id="arrrev" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Input refs column -->
  <text x="180" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">참조 표현식</text>

  <rect x="60" y="100" width="240" height="40" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="125" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">HEAD</text>

  <rect x="60" y="150" width="240" height="40" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="175" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">main~3</text>

  <rect x="60" y="200" width="240" height="40" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="225" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">HEAD^{tree}</text>

  <rect x="60" y="250" width="240" height="40" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="275" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">v1.0.0</text>

  <rect x="60" y="300" width="240" height="40" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="325" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">origin/main</text>

  <rect x="60" y="350" width="240" height="40" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="375" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">HEAD@{1}</text>

  <!-- Arrows -->
  <line x1="300" y1="120" x2="390" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arrrev)"/>
  <line x1="300" y1="170" x2="390" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#arrrev)"/>
  <line x1="300" y1="220" x2="390" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arrrev)"/>
  <line x1="300" y1="270" x2="390" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arrrev)"/>
  <line x1="300" y1="320" x2="390" y2="320" stroke="#55c555" stroke-width="2" marker-end="url(#arrrev)"/>
  <line x1="300" y1="370" x2="390" y2="370" stroke="#55c555" stroke-width="2" marker-end="url(#arrrev)"/>

  <!-- Output SHAs column -->
  <text x="620" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">SHA</text>

  <rect x="390" y="100" width="430" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="605" y="125" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">abc123def456789...  (commit)</text>

  <rect x="390" y="150" width="430" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="605" y="175" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">3ea456bcd012...     (commit-3)</text>

  <rect x="390" y="200" width="430" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="605" y="225" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">9f8a3e2f...         (tree)</text>

  <rect x="390" y="250" width="430" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="605" y="275" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">tag abc123...       (tag)</text>

  <rect x="390" y="300" width="430" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="605" y="325" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">def789012...        (remote)</text>

  <rect x="390" y="350" width="430" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="605" y="375" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">bcd234...           (reflog)</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">~N = N번째 조상 | ^N = N번째 부모(merge) | ^{type} = 타입 역참조 | @{N} = reflog</text>
</svg>
