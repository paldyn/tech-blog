<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="ae" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 폼 · 서류 자동화 파이프라인</text>

  <!-- Step 1 -->
  <rect x="60" y="80" width="180" height="68" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">서류 입력</text>
  <text x="150" y="123" text-anchor="middle" font-size="12" fill="#888">이미지 · PDF · 스캔본</text>

  <line x1="240" y1="114" x2="290" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Step 2: OCR -->
  <rect x="290" y="80" width="180" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="380" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">OCR · 텍스트 추출</text>
  <text x="380" y="123" text-anchor="middle" font-size="12" fill="#888">Vision API · Tesseract</text>

  <line x1="470" y1="114" x2="520" y2="114" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Step 3: Field Extract -->
  <rect x="520" y="80" width="180" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="610" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">필드 추출</text>
  <text x="610" y="123" text-anchor="middle" font-size="12" fill="#888">LLM 구조화 파싱</text>

  <line x1="700" y1="114" x2="748" y2="114" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Step 4: Validate -->
  <rect x="748" y="80" width="72" height="68" rx="8" fill="#1a1200" stroke="#e09060" stroke-width="1.5"/>
  <text x="784" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#e09060">검증</text>
  <text x="784" y="123" text-anchor="middle" font-size="11" fill="#888">규칙·형식</text>

  <!-- Multimodal Vision path -->
  <text x="440" y="196" text-anchor="middle" font-size="13" fill="#888">Vision LLM 직접 파싱 (OCR 없이)</text>

  <rect x="60" y="210" width="760" height="68" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="234" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">Vision LLM 통합 처리 (권장)</text>
  <text x="440" y="255" text-anchor="middle" font-size="12" fill="#888">이미지 → Claude Vision / GPT-4o Vision → JSON 직접 출력 (OCR 단계 생략 가능)</text>

  <!-- Result types -->
  <text x="440" y="322" text-anchor="middle" font-size="13" fill="#888">처리 결과 용도</text>

  <rect x="60" y="334" width="230" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="175" y="358" text-anchor="middle" font-size="13" fill="#e8e8e8">시스템 자동 입력</text>
  <text x="175" y="376" text-anchor="middle" font-size="12" fill="#888">ERP · CRM 직접 연동</text>

  <rect x="325" y="334" width="230" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="358" text-anchor="middle" font-size="13" fill="#e8e8e8">검토 대기열</text>
  <text x="440" y="376" text-anchor="middle" font-size="12" fill="#888">신뢰도 낮은 항목 플래그</text>

  <rect x="590" y="334" width="230" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="705" y="358" text-anchor="middle" font-size="13" fill="#e8e8e8">감사 로그 저장</text>
  <text x="705" y="376" text-anchor="middle" font-size="12" fill="#888">원본 + 추출값 보관</text>
</svg>
