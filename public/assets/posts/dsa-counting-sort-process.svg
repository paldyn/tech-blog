<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">카운팅 정렬 3단계 과정</text>

  <!-- Input array -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">입력 배열 A</text>
  <!-- boxes: 4, 2, 2, 8, 3, 3, 1 -->
  <rect x="60" y="88" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="82" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8">4</text>
  <rect x="108" y="88" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="130" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8">2</text>
  <rect x="156" y="88" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="178" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8">2</text>
  <rect x="204" y="88" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="226" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8">8</text>
  <rect x="252" y="88" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="274" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8">3</text>
  <rect x="300" y="88" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="322" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8">3</text>
  <rect x="348" y="88" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="370" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8">1</text>
  <text x="406" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">범위: 0~8 (k=8)</text>

  <!-- Step 1: Count array -->
  <line x1="220" y1="140" x2="220" y2="168" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="232" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">1단계: 빈도 집계</text>

  <text x="60" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">카운트 배열 C (인덱스 = 값)</text>
  <!-- Count array: 0,1,2,2,1,0,0,0,1 for values 0-8 -->
  <rect x="60" y="200" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">0</text>
  <rect x="108" y="200" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">1</text>
  <rect x="156" y="200" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="178" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">2</text>
  <rect x="204" y="200" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="226" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">2</text>
  <rect x="252" y="200" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="274" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">1</text>
  <rect x="300" y="200" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="322" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">0</text>
  <rect x="348" y="200" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">0</text>
  <rect x="396" y="200" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="418" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">0</text>
  <rect x="444" y="200" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="466" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">1</text>

  <!-- Index labels for Count array -->
  <text x="82" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">0</text>
  <text x="130" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">1</text>
  <text x="178" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2</text>
  <text x="226" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">3</text>
  <text x="274" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">4</text>
  <text x="322" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">5</text>
  <text x="370" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">6</text>
  <text x="418" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">7</text>
  <text x="466" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">8</text>

  <!-- Step 2: Prefix sum -->
  <line x1="280" y1="268" x2="280" y2="296" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="292" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">2단계: 누적합 (Prefix Sum)</text>

  <text x="60" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">누적 카운트 (C[i] = A에서 i 이하 원소 수)</text>
  <!-- Prefix sum: 0,1,3,5,6,6,6,6,7 -->
  <rect x="60" y="326" width="44" height="44" rx="6" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="82" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">0</text>
  <rect x="108" y="326" width="44" height="44" rx="6" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">1</text>
  <rect x="156" y="326" width="44" height="44" rx="6" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="178" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">3</text>
  <rect x="204" y="326" width="44" height="44" rx="6" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="226" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">5</text>
  <rect x="252" y="326" width="44" height="44" rx="6" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="274" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">6</text>
  <rect x="300" y="326" width="44" height="44" rx="6" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="322" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">6</text>
  <rect x="348" y="326" width="44" height="44" rx="6" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="370" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">6</text>
  <rect x="396" y="326" width="44" height="44" rx="6" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="418" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">6</text>
  <rect x="444" y="326" width="44" height="44" rx="6" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="466" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">7</text>

  <!-- Step 3: Output -->
  <line x1="280" y1="380" x2="280" y2="408" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="292" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">3단계: 역방향 배치 (안정 정렬)</text>

  <text x="60" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">출력 배열 B (정렬 완료)</text>
  <rect x="60" y="438" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="82" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">1</text>
  <rect x="108" y="438" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">2</text>
  <rect x="156" y="438" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="178" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">2</text>
  <rect x="204" y="438" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="226" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">3</text>
  <rect x="252" y="438" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="274" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">3</text>
  <rect x="300" y="438" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="322" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">4</text>
  <rect x="348" y="438" width="44" height="44" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="370" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">8</text>

  <!-- Right panel: complexity -->
  <rect x="560" y="88" width="280" height="152" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">복잡도</text>
  <text x="580" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">시간: O(N + K)</text>
  <text x="580" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">  N = 원소 수, <tspan font-weight="700" fill="#7ec8e3">K = 값의 범위</tspan></text>
  <text x="580" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">공간: O(N + K)</text>
  <text x="580" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">  카운트 배열 크기 = K+1</text>
  <text x="580" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">  안정 정렬 (역방향 배치 시)</text>

  <rect x="560" y="260" width="280" height="100" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">사용 조건</text>
  <text x="580" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">K &#171;&#171; N 일 때 비교 기반보다 빠름</text>
  <text x="580" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">정수 또는 이산 값에 적합</text>
  <text x="580" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">K가 크면 메모리 낭비 주의</text>
</svg>
