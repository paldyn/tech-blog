<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520"
  style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript가 동작하는 곳</text>

  <!-- Center: JavaScript Engine -->
  <rect x="340" y="80" width="200" height="70" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">JavaScript</text>
  <text x="440" y="132" text-anchor="middle" font-size="13" fill="#7ec8e3">단일 언어</text>

  <!-- Arrows from center to each domain (6 directions) -->

  <!-- Top: Browser -->
  <line x1="440" y1="80" x2="440" y2="30" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Left Top: Frontend -->
  <line x1="340" y1="108" x2="248" y2="168" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Left Bottom: Mobile -->
  <line x1="340" y1="132" x2="248" y2="268" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Right Top: Server -->
  <line x1="540" y1="108" x2="636" y2="168" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Right Bottom: Desktop -->
  <line x1="540" y1="132" x2="636" y2="268" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom: IoT -->
  <line x1="440" y1="150" x2="440" y2="368" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Domain boxes -->

  <!-- Frontend (Web Browser) -->
  <rect x="60" y="160" width="185" height="110" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="152" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">프론트엔드</text>
  <text x="152" y="205" text-anchor="middle" font-size="12" fill="#888">React · Vue · Svelte</text>
  <text x="152" y="222" text-anchor="middle" font-size="12" fill="#888">DOM · Canvas · WebGL</text>
  <text x="152" y="239" text-anchor="middle" font-size="12" fill="#888">PWA · WebAssembly</text>
  <text x="152" y="256" text-anchor="middle" font-size="11" fill="#444">Chrome · Firefox · Safari</text>

  <!-- Server (Node.js) -->
  <rect x="635" y="160" width="185" height="110" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="727" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">서버 / 백엔드</text>
  <text x="727" y="205" text-anchor="middle" font-size="12" fill="#888">Express · Fastify · Hono</text>
  <text x="727" y="222" text-anchor="middle" font-size="12" fill="#888">REST API · GraphQL</text>
  <text x="727" y="239" text-anchor="middle" font-size="12" fill="#888">마이크로서비스</text>
  <text x="727" y="256" text-anchor="middle" font-size="11" fill="#444">Node.js · Deno · Bun</text>

  <!-- Mobile -->
  <rect x="60" y="300" width="185" height="100" rx="8" fill="#1a1420" stroke="#ce9178" stroke-width="1.5"/>
  <text x="152" y="325" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">모바일 앱</text>
  <text x="152" y="345" text-anchor="middle" font-size="12" fill="#888">React Native</text>
  <text x="152" y="362" text-anchor="middle" font-size="12" fill="#888">Expo · Ionic</text>
  <text x="152" y="379" text-anchor="middle" font-size="11" fill="#444">iOS · Android</text>

  <!-- Desktop -->
  <rect x="635" y="300" width="185" height="100" rx="8" fill="#1a1420" stroke="#ce9178" stroke-width="1.5"/>
  <text x="727" y="325" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">데스크톱 앱</text>
  <text x="727" y="345" text-anchor="middle" font-size="12" fill="#888">Electron · Tauri</text>
  <text x="727" y="362" text-anchor="middle" font-size="12" fill="#888">VS Code · Slack</text>
  <text x="727" y="379" text-anchor="middle" font-size="11" fill="#444">Windows · macOS · Linux</text>

  <!-- IoT / Edge -->
  <rect x="340" y="370" width="200" height="90" rx="8" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="396" text-anchor="middle" font-size="13" font-weight="600" fill="#b5cea8">IoT · Edge</text>
  <text x="440" y="416" text-anchor="middle" font-size="12" fill="#888">Cloudflare Workers</text>
  <text x="440" y="433" text-anchor="middle" font-size="12" fill="#888">임베디드 장치</text>
  <text x="440" y="450" text-anchor="middle" font-size="11" fill="#444">V8 · JerryScript</text>

  <!-- Footer -->
  <text x="440" y="492" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 · Part I — 언어의 본질과 역사</text>
</svg>
