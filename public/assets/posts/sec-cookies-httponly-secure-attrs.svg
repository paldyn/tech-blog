<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">쿠키 보안 속성 한눈에 보기</text>

  <!-- HttpOnly -->
  <rect x="60" y="70" width="150" height="52" rx="6" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">HttpOnly</text>
  <text x="135" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JS 접근 차단</text>

  <rect x="230" y="70" width="590" height="52" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="246" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">document.cookie로 읽기/쓰기 불가</text>
  <text x="246" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">XSS로 쿠키 탈취 불가 → 세션 쿠키에 필수</text>

  <!-- Secure -->
  <rect x="60" y="138" width="150" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="135" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Secure</text>
  <text x="135" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">HTTPS만 전송</text>

  <rect x="230" y="138" width="590" height="52" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="246" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">HTTP 요청에는 쿠키 포함 안 함</text>
  <text x="246" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">네트워크 도청(MitM)으로 쿠키 탈취 방지</text>

  <!-- SameSite=Strict -->
  <rect x="60" y="206" width="150" height="52" rx="6" fill="#1a0a0a" stroke="#e8883a" stroke-width="1.5"/>
  <text x="135" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#e8883a" text-anchor="middle">SameSite</text>
  <text x="135" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CSRF 방어</text>

  <rect x="230" y="206" width="590" height="52" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="246" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Strict: 크로스 사이트 전송 완전 차단</text>
  <text x="246" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Lax: GET 탑 레벨 이동 허용 / None: 모두 허용(Secure 필수)</text>

  <!-- __Host- 접두사 -->
  <rect x="60" y="274" width="150" height="52" rx="6" fill="#1a1a0a" stroke="#e8e83a" stroke-width="1.5"/>
  <text x="135" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#e8e83a" text-anchor="middle">__Host-</text>
  <text x="135" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">최강 잠금</text>

  <rect x="230" y="274" width="590" height="52" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="246" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Secure·Path=/ 필수, Domain 속성 금지</text>
  <text x="246" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서브도메인에서 덮어쓰기 불가 → 쿠키 고정 공격 방어</text>

  <!-- __Secure- 접두사 -->
  <rect x="60" y="342" width="150" height="52" rx="6" fill="#0a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="135" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">__Secure-</text>
  <text x="135" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">HTTPS 강제</text>

  <rect x="230" y="342" width="590" height="52" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="246" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Secure 속성 없으면 설정 자체 거부</text>
  <text x="246" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HTTP에서 실수로 쿠키 설정하는 것 방지</text>

  <!-- 모범 설정 코드 -->
  <rect x="60" y="413" width="760" height="48" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 모범 세션 쿠키 설정</text>
  <text x="76" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Set-Cookie: __Host-session=xyz; HttpOnly; Secure; SameSite=Strict; Path=/</text>

  <!-- 구분선 -->
  <line x1="60" y1="130" x2="820" y2="130" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="60" y1="198" x2="820" y2="198" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="60" y1="266" x2="820" y2="266" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="60" y1="334" x2="820" y2="334" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="60" y1="402" x2="820" y2="402" stroke="#1e1e1e" stroke-width="1"/>
</svg>
