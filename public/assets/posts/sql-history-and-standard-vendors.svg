<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 RDBMS 표준 준수 현황</text>

  <!-- Core SQL: Standard -->
  <rect x="320" y="70" width="240" height="60" fill="#1e3a5f" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">ISO/IEC SQL 표준</text>
  <text x="440" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">SQL-86 → SQL-92 → SQL:1999 → SQL:2003 → SQL:2023</text>

  <!-- Oracle -->
  <rect x="60" y="180" width="160" height="90" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">Oracle</text>
  <text x="140" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL:2016 대부분 지원</text>
  <text x="140" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PL/SQL 독자 확장</text>
  <text x="140" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">ROWNUM, CONNECT BY</text>

  <!-- PostgreSQL -->
  <rect x="250" y="180" width="160" height="90" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="330" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">PostgreSQL</text>
  <text x="330" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">표준 준수율 최상위</text>
  <text x="330" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">확장 기능 풍부</text>
  <text x="330" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">JSON, 배열, COPY 등</text>

  <!-- MySQL -->
  <rect x="440" y="180" width="160" height="90" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="520" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">MySQL</text>
  <text x="520" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">웹 서비스 표준</text>
  <text x="520" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">InnoDB 엔진 중심</text>
  <text x="520" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">일부 표준 미준수 있음</text>

  <!-- SQL Server -->
  <rect x="630" y="180" width="160" height="90" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">SQL Server</text>
  <text x="710" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">T-SQL 방언 존재</text>
  <text x="710" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">엔터프라이즈 기능</text>
  <text x="710" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">APPLY, TOP 등</text>

  <!-- Arrows from standard to vendors -->
  <line x1="360" y1="130" x2="180" y2="180" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="400" y1="130" x2="330" y2="180" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="480" y1="130" x2="520" y2="180" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="520" y1="130" x2="680" y2="180" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Bottom note -->
  <rect x="60" y="308" width="760" height="60" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 제품은 표준의 핵심 기능(코어 SQL)을 구현하지만, 각자 방언(Dialect)과 확장 기능을 갖습니다.</text>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이 시리즈는 표준 SQL을 먼저 설명한 뒤 각 DBMS별 차이점을 다룹니다.</text>
</svg>
