<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="ms-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="ms-arr-info" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Mark-Sweep &amp; Mark-Compact</text>

  <!-- Roots -->
  <text x="70" y="92" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">GC Roots</text>
  <rect x="70" y="100" width="120" height="36" rx="6" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="123" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">스택 · static</text>

  <!-- arrow roots -> mark heap -->
  <line x1="130" y1="136" x2="130" y2="166" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ms-arr-info)"/>

