<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">sorted() vs list.sort() 핵심 차이</text>

  <!-- sorted column -->
  <rect x="60" y="72" width="360" height="280" rx="10" fill="#0d1926" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">sorted()</text>
  <text x="240" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">내장 함수</text>

  <line x1="80" y1="132" x2="400" y2="132" stroke="#3a4a6e"/>

  <text x="90" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">✓ 원본을 변경하지 않음 (새 리스트 반환)</text>
  <text x="90" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">✓ 모든 이터러블에 사용 가능</text>
  <text x="90" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">✓ 항상 리스트를 반환</text>
  <text x="90" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">✓ key=, reverse= 지원</text>
  <text x="90" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">✓ 표현식 안에서 사용 가능</text>

  <rect x="80" y="296" width="300" height="40" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="100" y="321" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">new = <tspan fill="#7ec8e3">sorted</tspan>(original)</text>

  <!-- sort column -->
  <rect x="460" y="72" width="360" height="280" rx="10" fill="#1a0d1a" stroke="#e05555" stroke-width="2"/>
  <text x="640" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555">list.sort()</text>
  <text x="640" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">리스트 메서드</text>

  <line x1="480" y1="132" x2="800" y2="132" stroke="#3a4a6e"/>

  <text x="490" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">✓ 원본 리스트를 제자리 정렬 (in-place)</text>
  <text x="490" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">✓ 리스트 전용</text>
  <text x="490" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">✓ None 반환 (실수 주의)</text>
  <text x="490" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">✓ key=, reverse= 지원</text>
  <text x="490" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">✓ 메모리 효율 (복사 없음)</text>

  <rect x="480" y="296" width="320" height="40" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="500" y="321" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">my_list.<tspan fill="#e05555">sort</tspan>()  <tspan fill="#9aa4b8"># None 반환!</tspan></text>

  <!-- Bottom: Timsort badge -->
  <rect x="60" y="372" width="760" height="50" rx="8" fill="#1a1a0d" stroke="#b5cea8"/>
  <text x="440" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b5cea8">둘 다 Timsort 알고리즘 사용 — 시간 복잡도 O(n log n) · 안정 정렬(stable sort)</text>
  <text x="440" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">같은 키 값을 가진 요소들의 원래 순서가 유지됩니다</text>
</svg>
