<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Bind Mount 개발 워크플로우</text>

  <!-- Code block: compose -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">docker-compose.yml (개발 환경)</text>
  <rect x="80" y="90" width="380" height="234" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">services</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="96" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3">app</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="96" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">image</tspan><tspan fill="#ffffff">: node:20-alpine</tspan></text>
  <text x="96" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">working_dir</tspan><tspan fill="#ffffff">: /app</tspan></text>
  <text x="96" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">command</tspan><tspan fill="#ffffff">: node --watch server.js</tspan></text>
  <text x="96" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">volumes</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="96" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">      - </tspan><tspan fill="#ce9178">./src:/app</tspan><tspan fill="#9aa4b8">  # bind mount</tspan></text>
  <text x="96" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">      - </tspan><tspan fill="#ce9178">node_modules:/app/node_modules</tspan></text>
  <text x="96" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">volumes</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="96" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3">node_modules</tspan><tspan fill="#ffffff">: {}</tspan><tspan fill="#9aa4b8">  # named vol</tspan></text>
  <text x="96" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">  # 호스트 node_modules 덮어쓰기 방지</tspan></text>

  <!-- Right: options and tips -->
  <text x="490" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">마운트 옵션</text>

  <rect x="490" y="90" width="340" height="234" fill="#111318" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="506" y="106" width="308" height="44" fill="#0f1f0a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">:ro  읽기 전용</text>
  <text x="660" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">-v ./config.yml:/app/config.yml:ro</text>

  <rect x="506" y="162" width="308" height="44" fill="#1a1500" rx="4" stroke="#e8c53a" stroke-width="1"/>
  <text x="660" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c53a" text-anchor="middle">:delegated / :cached (Mac)</text>
  <text x="660" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">I/O 성능 힌트 (Docker Desktop)</text>

  <rect x="506" y="218" width="308" height="44" fill="#0f1625" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="660" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">:z / :Z  (SELinux)</text>
  <text x="660" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">-v ./data:/data:z  # shared label</text>

  <rect x="506" y="274" width="308" height="36" fill="#1a0f0f" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="660" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">주의: 호스트 경로 없으면 에러</text>
  <text x="660" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Named Volume은 없으면 자동 생성</text>
</svg>
