<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">실전 루프 패턴</text>

  <!-- Pattern 1: read line -->
  <rect x="60" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">파일 줄별 읽기</text>
  <rect x="60" y="106" width="370" height="124" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># while + read — 가장 안전한 방법</text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> IFS= </tspan><tspan fill="#7ec8e3" font-weight="600">read</tspan><tspan fill="#ffffff"> -r line; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"line: $line"</tspan></text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan><tspan fill="#ffffff"> &lt; /etc/passwd</tspan></text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># IFS= : 앞뒤 공백 보존</text>
  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># -r   : 백슬래시 이스케이프 방지</text>

  <!-- Pattern 2: parallel -->
  <rect x="450" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">병렬 처리</text>
  <rect x="450" y="106" width="370" height="124" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 백그라운드(&amp;) + wait</text>
  <text x="466" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> host </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> "${hosts[@]}"; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="466" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    ping -c1 "$host" &amp;</tspan></text>
  <text x="466" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="466" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">wait</tspan><tspan fill="#9aa4b8">  # 모든 백그라운드 완료 대기</tspan></text>

  <!-- Pattern 3: infinite loop -->
  <rect x="60" y="250" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">무한 루프 + 재시도</text>
  <rect x="60" y="292" width="370" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="312" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="76" y="330" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    ping -c1 host &amp;&gt;/dev/null &amp;&amp; </tspan><tspan fill="#7ec8e3" font-weight="600">break</tspan></text>
  <text x="76" y="348" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">sleep</tspan><tspan fill="#ffffff"> 5</tspan></text>
  <text x="76" y="366" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>

  <!-- Pattern 4: seq -->
  <rect x="450" y="250" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">seq / printf 범위</text>
  <rect x="450" y="292" width="370" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="312" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># seq — 변수 범위 가능</text>
  <text x="466" y="330" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> $(seq 1 $N); </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan><tspan fill="#ffffff"> ...</tspan></text>
  <text x="466" y="348" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> $(seq 0 2 10); </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan><tspan fill="#ffffff"> ...</tspan></text>
  <text x="466" y="366" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># {1..10} 브레이스는 변수 불가</text>
</svg>
