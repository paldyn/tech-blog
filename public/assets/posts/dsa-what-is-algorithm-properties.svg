<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">좋은 알고리즘의 5가지 조건</text>

  <!-- Property 1: 입력 -->
  <rect x="60" y="70" width="360" height="70" rx="8" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="82" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">① 입력 (Input)</text>
  <text x="82" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0개 이상의 외부 데이터를 입력으로 받는다</text>

  <!-- Property 2: 출력 -->
  <rect x="460" y="70" width="360" height="70" rx="8" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="482" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">② 출력 (Output)</text>
  <text x="482" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">1개 이상의 결과를 반드시 출력한다</text>

  <!-- Property 3: 명확성 -->
  <rect x="60" y="160" width="360" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="82" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">③ 명확성 (Definiteness)</text>
  <text x="82" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">각 단계는 모호함 없이 명확하게 정의된다</text>

  <!-- Property 4: 유한성 -->
  <rect x="460" y="160" width="360" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="482" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">④ 유한성 (Finiteness)</text>
  <text x="482" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">유한한 단계 수 이내에 반드시 종료된다</text>

  <!-- Property 5: 효과성 -->
  <rect x="60" y="250" width="360" height="70" rx="8" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="82" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">⑤ 효과성 (Effectiveness)</text>
  <text x="82" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">각 연산은 수행 가능한 기본 단위로 구성된다</text>

  <!-- Algorithm vs Program note -->
  <rect x="460" y="250" width="360" height="70" rx="8" fill="#1a0f00" stroke="#ce9178" stroke-width="1.5"/>
  <text x="482" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178">알고리즘 vs 프로그램</text>
  <text x="482" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">프로그램은 알고리즘의 구체적인 구현</text>

  <!-- Examples row -->
  <rect x="60" y="345" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 명확하지 않은 것 (알고리즘 아님)</tspan>
  </text>
  <text x="76" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#e05555">"숫자를 몇 번쯤 더 작은 숫자와 바꿔라"</tspan>
    <tspan fill="#9aa4b8"> // 모호함</tspan>
  </text>
  <text x="76" y="413" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 명확한 것 (알고리즘)</tspan>
  </text>
  <text x="76" y="433" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555">"i번째와 i+1번째를 비교해 arr[i]&gt;arr[i+1]이면 교환"</tspan>
  </text>
</svg>
