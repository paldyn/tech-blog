<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker exec 실행 흐름</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">기존 컨테이너에 새 프로세스 추가</text>

  <!-- Host terminal -->
  <rect x="60" y="108" width="200" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">호스트 터미널</text>
  <text x="160" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">docker exec ...</text>
  <text x="160" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">사용자 입력</text>

  <!-- Arrow 1: host → docker daemon -->
  <polygon points="268,148 282,142 282,154" fill="#555"/>
  <line x1="260" y1="148" x2="282" y2="148" stroke="#555" stroke-width="2"/>

  <!-- Docker Daemon -->
  <rect x="290" y="108" width="200" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="390" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">Docker Daemon</text>
  <text x="390" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">exec API 처리</text>
  <text x="390" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">containerd 위임</text>

  <!-- Arrow 2: daemon → container -->
  <polygon points="498,148 512,142 512,154" fill="#555"/>
  <line x1="490" y1="148" x2="512" y2="148" stroke="#555" stroke-width="2"/>

  <!-- Container -->
  <rect x="520" y="88" width="300" height="200" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="670" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">실행 중인 컨테이너</text>

  <!-- PID 1 -->
  <rect x="540" y="128" width="120" height="44" rx="6" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="600" y="149" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">PID 1</text>
  <text x="600" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">기존 메인 프로세스</text>

  <!-- New process from exec -->
  <rect x="680" y="128" width="120" height="44" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="740" y="149" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">PID N</text>
  <text x="740" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">exec 새 프로세스</text>

  <!-- Shared namespaces label -->
  <text x="670" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동일 네임스페이스 공유</text>
  <text x="670" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(network · mount · pid)</text>
  <text x="670" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일시스템·환경변수 접근 가능</text>
  <text x="670" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">cgroup 리소스 동일 적용</text>

  <!-- Key note: exec requires running container -->
  <rect x="60" y="310" width="760" height="44" rx="6" fill="#2d1a00" stroke="#e8a030" stroke-width="1.5"/>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a030">⚠ 주의:</text>
  <text x="140" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">docker exec는 반드시 실행 중(Running) 상태의 컨테이너에서만 작동합니다.</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중지된 컨테이너에 exec하면 Error: Container is not running 오류가 발생합니다.</text>

  <!-- Code block -->
  <rect x="60" y="370" width="760" height="56" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker exec</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">-it</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">web</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">bash</tspan>
    <tspan fill="#6a8aa0">      # 실행 중인 web 컨테이너에 bash 쉘 진입</tspan>
  </text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker exec</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">web</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">nginx -t</tspan>
    <tspan fill="#6a8aa0">         # nginx 설정 파일 문법 검사</tspan>
  </text>
</svg>
