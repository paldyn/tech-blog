<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">비동기 이터레이터 관련 타입들</text>
  <text x="60" y="78" font-size="13" fill="#888">세 가지 타입의 역할과 제네릭 인자를 구분한다</text>

  <rect x="60" y="100" width="760" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" font-size="14" font-weight="600" fill="#7ec8e3">AsyncIterable&lt;T&gt;</text>
  <text x="76" y="152" font-size="13" fill="#ffffff">[Symbol.asyncIterator]() 메서드를 가진 객체 — for await...of 대상</text>
  <text x="76" y="172" font-size="13" fill="#9aa4b8">함수 인자 타입으로 쓰면 어떤 비동기 소스든 받는다</text>

  <rect x="60" y="194" width="760" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="222" font-size="14" font-weight="600" fill="#55c555">AsyncIterator&lt;T&gt;</text>
  <text x="76" y="246" font-size="13" fill="#ffffff">next()가 Promise&lt;IteratorResult&lt;T&gt;&gt;를 반환하는 실제 반복자</text>
  <text x="76" y="266" font-size="13" fill="#9aa4b8">{ value: T, done: boolean } 을 비동기로 produce</text>

  <rect x="60" y="288" width="760" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="316" font-size="14" font-weight="600" fill="#e05555">AsyncGenerator&lt;T, TReturn, TNext&gt;</text>
  <text x="76" y="336" font-size="13" fill="#ffffff">async function* 의 반환 타입 — 보통 T만 신경 쓰면 된다</text>
</svg>
