<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-bz" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">bisect run: 이분 탐색으로 범인 찾기</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">매 단계 절반씩 좁혀 첫 실패 커밋을 자동 격리한다</text>

  <!-- commit dots -->
  <circle cx="100" cy="150" r="14" fill="#101010" stroke="#55c555" stroke-width="2"/>
  <text x="100" y="155" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#55c555">G</text>
  <circle cx="210" cy="150" r="14" fill="#101010" stroke="#55c555" stroke-width="2"/>
  <text x="210" y="155" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#55c555">G</text>
  <circle cx="320" cy="150" r="14" fill="#16122a" stroke="#9988dd" stroke-width="2"/>
  <text x="320" y="155" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#9988dd">?</text>
  <circle cx="430" cy="150" r="16" fill="#101010" stroke="#e05555" stroke-width="2.5"/>
  <text x="430" y="155" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#e05555">X</text>
  <circle cx="540" cy="150" r="14" fill="#101010" stroke="#e05555" stroke-width="2"/>
  <text x="540" y="155" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#e05555">B</text>
  <circle cx="650" cy="150" r="14" fill="#101010" stroke="#e05555" stroke-width="2"/>
  <text x="650" y="155" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#e05555">B</text>
  <circle cx="760" cy="150" r="14" fill="#101010" stroke="#e05555" stroke-width="2"/>
  <text x="760" y="155" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#e05555">B</text>

  <line x1="114" y1="150" x2="196" y2="150" stroke="#444" stroke-width="2"/>
  <line x1="224" y1="150" x2="306" y2="150" stroke="#444" stroke-width="2"/>
  <line x1="334" y1="150" x2="412" y2="150" stroke="#444" stroke-width="2"/>
  <line x1="448" y1="150" x2="524" y2="150" stroke="#444" stroke-width="2"/>
  <line x1="554" y1="150" x2="636" y2="150" stroke="#444" stroke-width="2"/>
  <line x1="664" y1="150" x2="746" y2="150" stroke="#444" stroke-width="2"/>

  <text x="100" y="200" text-anchor="middle" font-family="'Wanted Sans Variable',sans-serif" font-size="12" fill="#55c555">good (옛날)</text>
  <text x="760" y="200" text-anchor="middle" font-family="'Wanted Sans Variable',sans-serif" font-size="12" fill="#e05555">bad (HEAD)</text>

  <line x1="430" y1="100" x2="430" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-bz)"/>
  <text x="430" y="92" text-anchor="middle" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#7ec8e3">첫 bad = 범인</text>

  <text x="440" y="260" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">G good · ? 미검사 · X 첫 실패 · B bad</text>
  <text x="440" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">N개 커밋을 약 log2(N)번 검사로 좁힌다</text>
</svg>
