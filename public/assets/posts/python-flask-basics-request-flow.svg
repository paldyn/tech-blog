<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Flask 요청 처리 흐름</text>

  <defs>
    <marker id="flar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="110" width="150" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="150" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">브라우저</text>
  <text x="135" y="174" font-size="12" fill="#9aa4b8" text-anchor="middle">GET /hello</text>

  <line x1="210" y1="155" x2="266" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#flar)"/>
  <text x="238" y="138" font-size="11" fill="#9aa4b8" text-anchor="middle">요청</text>

  <rect x="270" y="110" width="180" height="90" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="360" y="146" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">URL 라우팅</text>
  <text x="360" y="170" font-size="12" fill="#9aa4b8" text-anchor="middle">@app.route 매칭</text>
  <text x="360" y="190" font-size="12" fill="#9aa4b8" text-anchor="middle">뷰 함수 선택</text>

  <line x1="450" y1="155" x2="506" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#flar)"/>
  <text x="478" y="138" font-size="11" fill="#9aa4b8" text-anchor="middle">호출</text>

  <rect x="510" y="110" width="180" height="90" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="600" y="146" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">뷰 함수</text>
  <text x="600" y="170" font-size="12" fill="#9aa4b8" text-anchor="middle">로직 실행</text>
  <text x="600" y="190" font-size="12" fill="#9aa4b8" text-anchor="middle">return 문자열</text>

  <line x1="690" y1="155" x2="746" y2="155" stroke="#55c555" stroke-width="2" marker-end="url(#flar)"/>
  <text x="718" y="138" font-size="11" fill="#9aa4b8" text-anchor="middle">응답</text>

  <rect x="750" y="110" width="70" height="90" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="785" y="150" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">HTTP</text>
  <text x="785" y="174" font-size="12" fill="#9aa4b8" text-anchor="middle">200</text>

  <rect x="60" y="226" width="760" height="38" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="250" font-size="14" fill="#55c555" text-anchor="middle">URL을 뷰 함수에 연결하는 라우팅이 Flask의 핵심이다</text>
</svg>
