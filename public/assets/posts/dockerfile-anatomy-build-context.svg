<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" role="img" aria-label="Dockerfile 빌드 컨텍스트와 이미지 빌드 과정">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">빌드 컨텍스트와 이미지 생성</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">docker build . 실행 시 내부 흐름</text>

  <!-- Step 1: Local directory -->
  <rect x="60" y="100" width="200" height="200" rx="8" fill="#111318" stroke="#2a2d3a" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">로컬 디렉터리</text>
  <text x="160" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(빌드 컨텍스트)</text>

  <text x="80" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">📄 Dockerfile</text>
  <text x="80" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">📄 .dockerignore</text>
  <text x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">📁 src/</text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">📄 package.json</text>
  <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#555" xml:space="preserve">🚫 node_modules/</text>
  <text x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#555" xml:space="preserve">🚫 .git/</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="200" x2="320" y2="200" stroke="#444" stroke-width="2"/>
  <polygon points="320,194 334,200 320,206" fill="#444"/>
  <text x="302" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전송</text>

  <!-- Step 2: Docker daemon -->
  <rect x="340" y="100" width="200" height="200" rx="8" fill="#0d1520" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Docker 데몬</text>

  <text x="360" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">① Dockerfile 파싱</text>
  <text x="360" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">② 인스트럭션 순서대로 실행</text>
  <text x="360" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">③ 각 RUN/COPY → 레이어 생성</text>
  <text x="360" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">④ 캐시 히트 시 재사용</text>
  <text x="360" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">⑤ 최종 이미지 조립</text>

  <!-- Arrow 2 -->
  <line x1="550" y1="200" x2="600" y2="200" stroke="#444" stroke-width="2"/>
  <polygon points="600,194 614,200 600,206" fill="#444"/>
  <text x="582" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">생성</text>

  <!-- Step 3: Image layers -->
  <rect x="620" y="100" width="200" height="200" rx="8" fill="#0d180d" stroke="#1e3d1e" stroke-width="1.5"/>
  <text x="720" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">이미지 레이어</text>

  <!-- Layer stack -->
  <rect x="640" y="144" width="160" height="24" rx="3" fill="#0a2a0a" stroke="#1e4d1e" stroke-width="1"/>
  <text x="720" y="161" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Layer 5: CMD</text>

  <rect x="640" y="173" width="160" height="24" rx="3" fill="#0a250a" stroke="#1e4a1e" stroke-width="1"/>
  <text x="720" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Layer 4: RUN npm ci</text>

  <rect x="640" y="202" width="160" height="24" rx="3" fill="#0a200a" stroke="#1e451e" stroke-width="1"/>
  <text x="720" y="219" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Layer 3: COPY . .</text>

  <rect x="640" y="231" width="160" height="24" rx="3" fill="#0a1b0a" stroke="#1e401e" stroke-width="1"/>
  <text x="720" y="248" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Layer 2: WORKDIR</text>

  <rect x="640" y="260" width="160" height="24" rx="3" fill="#081508" stroke="#1e3a1e" stroke-width="1"/>
  <text x="720" y="277" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Layer 1: FROM base</text>

  <!-- Bottom notes -->
  <rect x="60" y="330" width="760" height="50" rx="6" fill="#111318" stroke="#2a2d3a" stroke-width="1"/>
  <text x="440" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">빌드 컨텍스트 크기 = 전송 시간 직결 — .dockerignore로 불필요한 파일 제외 필수</text>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 레이어는 이전 레이어의 변경분만 저장 (Union FS / OverlayFS)</text>
</svg>
