<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Stream API 파이프라인 구조</text>

  <!-- Source -->
  <rect x="60" y="70" width="140" height="56" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="130" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">Source</text>
  <text x="130" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Collection / Array / IO</text>

  <line x1="200" y1="98" x2="234" y2="98" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Intermediate 1 -->
  <rect x="236" y="70" width="120" height="56" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="296" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">filter()</text>
  <text x="296" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Predicate</text>

  <line x1="356" y1="98" x2="390" y2="98" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Intermediate 2 -->
  <rect x="392" y="70" width="120" height="56" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="452" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">map()</text>
  <text x="452" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Function</text>

  <line x1="512" y1="98" x2="546" y2="98" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Intermediate 3 -->
  <rect x="548" y="70" width="120" height="56" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="608" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">sorted()</text>
  <text x="608" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Comparator</text>

  <line x1="668" y1="98" x2="702" y2="98" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Terminal -->
  <rect x="704" y="70" width="116" height="56" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="762" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">collect()</text>
  <text x="762" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Terminal Op</text>

  <!-- Labels -->
  <text x="296" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">중간 연산 (Lazy)</text>
  <text x="452" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">중간 연산 (Lazy)</text>
  <text x="608" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">중간 연산 (Lazy)</text>
  <text x="762" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">최종 연산 → 실행</text>

  <!-- Code example -->
  <text x="440" y="178" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">실전 Stream 예제</text>

  <rect x="60" y="192" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="214"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 직원 목록에서 고연봉자 이름 추출</text>
  <text xml:space="preserve" x="76" y="234"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">List</text>
  <text xml:space="preserve" x="76" y="234"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    &lt;String&gt; names = employees.stream()</text>
  <text xml:space="preserve" x="76" y="254"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  .filter(e -&gt; e.getSalary() &gt; 5000)</text>
  <text xml:space="preserve" x="76" y="274"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  .sorted(Comparator.comparing(</text>
  <text xml:space="preserve" x="76" y="294"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    Employee::getSalary).reversed())</text>
  <text xml:space="preserve" x="76" y="314"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  .map(Employee::getName)</text>
  <text xml:space="preserve" x="76" y="334"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  .collect(Collectors.toList());</text>

  <!-- Collectors box -->
  <rect x="460" y="192" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="214"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Collectors 주요 메서드</text>
  <text xml:space="preserve" x="476" y="234"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Collectors.toList()</text>
  <text xml:space="preserve" x="476" y="254"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Collectors.toSet()</text>
  <text xml:space="preserve" x="476" y="274"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Collectors.groupingBy(key)</text>
  <text xml:space="preserve" x="476" y="294"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Collectors.joining(</text>
  <text xml:space="preserve" x="476" y="314"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  ", ", "[", "]"</text>
  <text xml:space="preserve" x="476" y="334"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">)</text>

  <!-- Lazy evaluation note -->
  <rect x="60" y="372" width="760" height="48" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Lazy 평가 원칙</text>
  <text x="440" y="410" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">중간 연산은 최종 연산 호출 전까지 실행되지 않음 — 불필요한 계산 자동 스킵</text>
</svg>
