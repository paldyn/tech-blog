<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <rect x="0" y="0" width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">결정 트리: 질문의 연쇄로 만드는 분류 모델</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">루트 노드 → 내부 노드 → 리프 노드의 3단계 분기 구조</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- LEVEL 0: Root Node -->
  <rect x="330" y="100" width="220" height="54" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">루트 노드 (Root Node)</text>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">꽃잎 길이 ≤ 2.45?</text>

  <!-- Arrows Root → Level 1 -->
  <!-- Left branch: Yes -->
  <line x1="380" y1="154" x2="210" y2="212" stroke="#55c555" stroke-width="2"/>
  <polygon points="204,209 216,209 210,220" fill="#55c555"/>
  <text x="265" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">예 (Yes)</text>

  <!-- Right branch: No -->
  <line x1="500" y1="154" x2="668" y2="212" stroke="#e05555" stroke-width="2"/>
  <polygon points="662,209 674,209 668,220" fill="#e05555"/>
  <text x="570" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" font-weight="600">아니오 (No)</text>

  <!-- LEVEL 1 Left: Leaf -->
  <rect x="100" y="220" width="220" height="54" rx="8" fill="#0d1a2a" stroke="#55c555" stroke-width="2"/>
  <text x="210" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리프 노드 (Leaf Node)</text>
  <text x="210" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Setosa (100%)</text>

  <!-- LEVEL 1 Right: Internal Node -->
  <rect x="558" y="220" width="220" height="54" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="668" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">내부 노드 (Internal Node)</text>
  <text x="668" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">꽃잎 너비 ≤ 1.75?</text>

  <!-- Arrows Level1 Right → Level 2 -->
  <line x1="618" y1="274" x2="500" y2="326" stroke="#55c555" stroke-width="2"/>
  <polygon points="494,323 506,323 500,334" fill="#55c555"/>
  <text x="524" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">예</text>

  <line x1="718" y1="274" x2="778" y2="326" stroke="#e05555" stroke-width="2"/>
  <polygon points="772,323 784,323 778,334" fill="#e05555"/>
  <text x="730" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" font-weight="600">아니오</text>

  <!-- LEVEL 2 Leaf Left -->
  <rect x="388" y="334" width="224" height="54" rx="8" fill="#0d1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="500" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리프 노드</text>
  <text x="500" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">Versicolor (90.7%)</text>

  <!-- LEVEL 2 Leaf Right -->
  <rect x="666" y="334" width="148" height="54" rx="8" fill="#0d1a2a" stroke="#ce9178" stroke-width="2"/>
  <text x="740" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리프 노드</text>
  <text x="740" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">Virginica (97.8%)</text>

  <!-- Legend -->
  <rect x="60" y="220" width="30" height="16" rx="3" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="98" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">내부/루트 노드: 분기 조건</text>
  <rect x="60" y="244" width="30" height="16" rx="3" fill="#0d1a2a" stroke="#55c555" stroke-width="2"/>
  <text x="98" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">리프 노드: 예측 클래스</text>
  <text x="60" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">깊이(Depth): 3 레벨</text>
  <text x="60" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">분기 기준: 정보 이득 최대화</text>
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Iris 데이터셋 (150개 샘플)</text>

  <!-- Impurity badge -->
  <rect x="60" y="334" width="290" height="54" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" font-weight="600">각 노드가 저장하는 정보</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">분기 조건 · 샘플 수 · 불순도 · 클래스 분포</text>
  <text x="80" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">→ CART가 최적 분기점을 탐욕적으로 선택</text>

  <!-- Footer -->
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
