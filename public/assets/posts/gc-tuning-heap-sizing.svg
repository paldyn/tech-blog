<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="hsArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="hsArrW" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">힙 사이징과 영원한 트레이드오프</text>

  <!-- Heap layout bar -->
  <text x="60" y="90"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">힙 레이아웃</text>

  <!-- Young region -->
  <rect x="60" y="104" width="300" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="210" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Young 세대</text>
  <text x="210" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">-Xmn / -XX:NewRatio</text>

  <!-- Old region -->
  <rect x="360" y="104" width="460" height="56" rx="6" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="590" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Old 세대</text>
  <text x="590" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">NewRatio=2 → Young:Old = 1:2</text>

  <!-- Xms=Xmx span line under bar -->
  <line x1="60" y1="178" x2="813" y2="178" stroke="#e05555" stroke-width="2" marker-start="url(#hsArrW)" marker-end="url(#hsArrW)"/>
  <text x="440" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">-Xms = -Xmx (운영 환경에선 동일하게 — 런타임 힙 리사이즈 방지)</text>

  <!-- Metaspace separate box -->
  <rect x="60" y="216" width="360" height="60" rx="6" fill="#101010" stroke="#7777cc" stroke-width="1.2"/>
  <text x="240" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#9a9ae0">Metaspace (힙 밖, 네이티브 메모리)</text>
  <text x="240" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">-XX:MetaspaceSize / -XX:MaxMetaspaceSize</text>

  <!-- Container box -->
  <rect x="440" y="216" width="380" height="60" rx="6" fill="#101010" stroke="#7777cc" stroke-width="1.2"/>
  <text x="630" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#9a9ae0">컨테이너 인식 (JDK 10+)</text>
  <text x="630" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">+UseContainerSupport · -XX:MaxRAMPercentage=75</text>

  <!-- Tradeoff triangle title -->
  <text x="440" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">셋 중 둘만 — pick two</text>

  <!-- Triangle -->
  <path d="M 440 340 L 620 500 L 260 500 Z" fill="none" stroke="#7777cc" stroke-width="2"/>

  <!-- Vertices -->
  <circle cx="440" cy="340" r="5" fill="#55c555"/>
  <text x="440" y="328" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Throughput</text>

  <circle cx="260" cy="500" r="5" fill="#7ec8e3"/>
  <text x="218" y="522" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Latency</text>

  <circle cx="620" cy="500" r="5" fill="#e05555"/>
  <text x="664" y="522" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">Footprint</text>

  <!-- Edge labels (flags steering each axis) -->
  <text x="318" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" transform="rotate(-41 318 416)">GCTimeRatio</text>
  <text x="562" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" transform="rotate(41 562 416)">힙 ↓</text>
  <text x="440" y="494" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">MaxGCPauseMillis</text>

  <!-- Side flag panel -->
  <rect x="660" y="338" width="160" height="168" rx="8" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1.2"/>
  <text x="676" y="362"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8">조향 플래그</text>
  <text x="676" y="386"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">↑ 처리량</text>
  <text x="676" y="404"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GCTimeRatio ↑</text>
  <text x="676" y="430"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">↓ 지연</text>
  <text x="676" y="448"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">MaxGCPauseMillis ↓</text>
  <text x="676" y="474"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">↓ 메모리</text>
  <text x="676" y="492"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">-Xmx ↓</text>
</svg>
