<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">OpenAPI 어노테이션 활용</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">전역 설정(OpenAPI Bean) · 컨트롤러 문서화(@Operation, @ApiResponse)</text>

  <!-- Left label -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">전역 OpenAPI 설정 Bean</text>
  <!-- Left code box: 12 lines -->
  <rect x="60" y="108" width="380" height="262" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Configuration</tspan></text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public class </tspan><tspan fill="#ffffff">OpenApiConfig {</tspan></text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">public </tspan><tspan fill="#ffffff">OpenAPI openAPI() {</tspan></text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">return new </tspan><tspan fill="#ffffff">OpenAPI()</tspan></text>
  <text x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">      <tspan fill="#ffffff">.info(</tspan><tspan fill="#7ec8e3" font-weight="600">new </tspan><tspan fill="#ffffff">Info()</tspan></text>
  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">        <tspan fill="#ffffff">.title(</tspan><tspan fill="#ce9178">"My API"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">        <tspan fill="#ffffff">.version(</tspan><tspan fill="#ce9178">"v1.0"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">        <tspan fill="#ffffff">.description(</tspan><tspan fill="#ce9178">"사용자 관리 API"</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">      <tspan fill="#ffffff">.addSecurityItem(</tspan></text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">        <tspan fill="#7ec8e3" font-weight="600">new </tspan><tspan fill="#ffffff">SecurityRequirement().addList(</tspan><tspan fill="#ce9178">"JWT"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#ffffff">} }</tspan></text>

  <!-- Right label -->
  <text x="460" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">컨트롤러 문서화 어노테이션</text>
  <!-- Right code box: 12 lines -->
  <rect x="460" y="108" width="360" height="262" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Tag</tspan><tspan fill="#ffffff">(name = </tspan><tspan fill="#ce9178">"users"</tspan><tspan fill="#ffffff">, description = </tspan><tspan fill="#ce9178">"사용자"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@RestController</tspan></text>
  <text x="476" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public class </tspan><tspan fill="#ffffff">UserController {</tspan></text>
  <text x="476" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> </text>
  <text x="476" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@Operation</tspan><tspan fill="#ffffff">(summary = </tspan><tspan fill="#ce9178">"단일 조회"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@ApiResponse</tspan><tspan fill="#ffffff">(responseCode = </tspan><tspan fill="#ce9178">"200"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#ffffff">description = </tspan><tspan fill="#ce9178">"성공"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@ApiResponse</tspan><tspan fill="#ffffff">(responseCode = </tspan><tspan fill="#ce9178">"404"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">    <tspan fill="#ffffff">description = </tspan><tspan fill="#ce9178">"사용자 없음"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@GetMapping</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"/users/{id}"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">public </tspan><tspan fill="#ffffff">UserResponse get(</tspan></text>
  <text x="476" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">      <tspan fill="#7ec8e3" font-weight="600">@Parameter</tspan><tspan fill="#ffffff">(description=</tspan><tspan fill="#ce9178">"사용자 ID"</tspan><tspan fill="#ffffff">) Long id){...}</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555">Swagger UI: http://localhost:8080/swagger-ui.html · JSON: /v3/api-docs</text>
</svg>
