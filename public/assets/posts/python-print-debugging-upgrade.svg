<svg xmlns="http://www.w3.org/2000/svg" width="880" height="250" viewBox="0 0 880 250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="250" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">print에서 한 단계 위로</text>

  <defs>
    <marker id="upg" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect x="60" y="92" width="340" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 임시 확인이라면 이 정도는</text>
  <text xml:space="preserve" x="78" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">print(<tspan fill="#ce9178">f"{x=}"</tspan>, file=sys.stderr,</text>
  <text xml:space="preserve" x="78" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      flush=<tspan fill="#7ec8e3" font-weight="600">True</tspan>)</text>
  <text xml:space="preserve" x="78" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># stderr + flush + f"{x=}"</text>

  <line x1="400" y1="152" x2="476" y2="152" stroke="#55c555" stroke-width="2" marker-end="url(#upg)"/>

  <rect x="480" y="92" width="340" height="120" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text xml:space="preserve" x="498" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 남길 거라면 logging</text>
  <text xml:space="preserve" x="498" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import logging</text>
  <text xml:space="preserve" x="498" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">log.debug(<tspan fill="#ce9178">"x=%s"</tspan>, x)</text>
  <text xml:space="preserve" x="498" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 레벨로 켜고 끔</text>
</svg>
