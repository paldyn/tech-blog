<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">애너테이션 선언과 요소(element)</text>

  <rect x="60" y="78" width="760" height="186" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="106" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># @interface 키워드로 선언한다</text>
  <text x="78" y="130" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">public </text>
  <text x="150" y="130" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-weight="600" xml:space="preserve">@interface</text>
  <text x="262" y="130" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> Schedule {</text>
  <text x="78" y="154" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    String cron();             </text>
  <text x="430" y="154" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 필수 요소</text>
  <text x="78" y="178" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    int retries() default 3;   </text>
  <text x="430" y="178" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 기본값 있는 요소</text>
  <text x="78" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">}</text>
  <text x="78" y="234" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 사용</text>
  <text x="78" y="256" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-weight="600" xml:space="preserve">@Schedule(cron = "0 0 * * *")</text>

  <text x="440" y="296" font-size="13" fill="#9aa4b8" text-anchor="middle">요소 타입은 기본형·String·Class·enum·애너테이션과 그 배열만 가능하다</text>
</svg>
