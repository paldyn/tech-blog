<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Commit 오브젝트 조회 명령</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">git cat-file / git log / git show</text>

  <!-- Left: cat-file -->
  <rect x="60" y="94" width="360" height="160" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">원시 오브젝트 조회</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git cat-file</tspan><tspan fill="#ffffff"> -t HEAD</tspan></text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  commit</text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git cat-file</tspan><tspan fill="#ffffff"> -p HEAD</tspan></text>
  <text x="76" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  tree  abc123...</text>
  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  parent fff000...</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  author Alice ...</text>

  <!-- Right: log/show -->
  <rect x="460" y="94" width="360" height="160" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">커밋 정보 조회</text>
  <text x="476" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git log</tspan><tspan fill="#ffffff"> --oneline -5</tspan></text>
  <text x="476" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git show</tspan><tspan fill="#ffffff"> HEAD          </tspan><tspan fill="#888"># diff 포함</tspan></text>
  <text x="476" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git show</tspan><tspan fill="#ffffff"> HEAD:path/to/file</tspan></text>
  <text x="476" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 커밋의 tree SHA</text>
  <text x="476" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git rev-parse</tspan><tspan fill="#ffffff"> HEAD^{tree}</tspan></text>
  <text x="476" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  abc123def...</text>

  <!-- commit-tree: create commit manually -->
  <rect x="60" y="272" width="760" height="130" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">커밋 수동 생성 (내부 이해용)</text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 1. 파일 추가 후 blob 생성</text>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  BLOB=$(echo "hello" | <tspan fill="#7ec8e3" font-weight="600">git hash-object</tspan><tspan fill="#ffffff"> -w --stdin)</tspan></text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  TREE=$(<tspan fill="#7ec8e3" font-weight="600">git write-tree</tspan><tspan fill="#ffffff">)                      </tspan><tspan fill="#888"># index 기반</tspan></text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  echo "init" | <tspan fill="#7ec8e3" font-weight="600">git commit-tree</tspan><tspan fill="#ffffff"> $TREE -p HEAD  </tspan><tspan fill="#888"># commit 생성</tspan></text>
</svg>
