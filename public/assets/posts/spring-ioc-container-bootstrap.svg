<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 510"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="510" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">ApplicationContext 부트스트랩 단계</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#888">refresh() 호출 시 내부적으로 진행되는 5단계</text>

  <!-- ── Left column: step flow (x=60..380) ── -->

  <!-- Step 1 (y=90..136) -->
  <rect x="60" y="90" width="320" height="46" rx="7" fill="#0f1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">① 설정 소스 로드</text>
  <text x="220" y="128" text-anchor="middle" font-size="12" fill="#888">XML / @Configuration / 컴포넌트 스캔</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="136" x2="220" y2="156" stroke="#444" stroke-width="1.5"/>
  <polygon points="220,159 214,150 226,150" fill="#444"/>

  <!-- Step 2 (y=159..205) -->
  <rect x="60" y="159" width="320" height="46" rx="7" fill="#0f1814" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="179" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">② BeanDefinition 파싱·등록</text>
  <text x="220" y="197" text-anchor="middle" font-size="12" fill="#888">BeanDefinitionRegistry에 메타데이터 저장</text>

  <!-- Arrow 2→3 -->
  <line x1="220" y1="205" x2="220" y2="225" stroke="#444" stroke-width="1.5"/>
  <polygon points="220,228 214,219 226,219" fill="#444"/>

  <!-- Step 3 (y=228..274) -->
  <rect x="60" y="228" width="320" height="46" rx="7" fill="#1a130a" stroke="#e8a03a" stroke-width="1.5"/>
  <text x="220" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#e8a03a">③ BeanFactoryPostProcessor 실행</text>
  <text x="220" y="266" text-anchor="middle" font-size="12" fill="#888">설정 메타데이터 조작 · PropertySource 로드</text>

  <!-- Arrow 3→4 -->
  <line x1="220" y1="274" x2="220" y2="294" stroke="#444" stroke-width="1.5"/>
  <polygon points="220,297 214,288 226,288" fill="#444"/>

  <!-- Step 4 (y=297..343) -->
  <rect x="60" y="297" width="320" height="46" rx="7" fill="#0f1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="317" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">④ 싱글톤 빈 인스턴스화 &amp; DI</text>
  <text x="220" y="335" text-anchor="middle" font-size="12" fill="#888">BeanPostProcessor · @PostConstruct 실행</text>

  <!-- Arrow 4→5 -->
  <line x1="220" y1="343" x2="220" y2="363" stroke="#444" stroke-width="1.5"/>
  <polygon points="220,366 214,357 226,357" fill="#444"/>

  <!-- Step 5 (y=366..412) -->
  <rect x="60" y="366" width="320" height="46" rx="7" fill="#0f1a14" stroke="#55c555" stroke-width="2"/>
  <text x="220" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">⑤ ApplicationContext Ready</text>
  <text x="220" y="404" text-anchor="middle" font-size="12" fill="#888">ContextRefreshedEvent 발행 · 사용 가능 상태</text>

  <!-- ── Right column: code block (x=440..820) ── -->
  <rect x="440" y="90" width="380" height="320" rx="6" fill="#070b14" stroke="#1e2433"/>
  <!-- line 1  y=90+14+13=117 -->
  <text x="456" y="117" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#6a8aa0">// XML 방식</text>
  <text x="456" y="135" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">ApplicationContext</text>
  <text x="456" y="153" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  ctx = </text>
  <text x="456" y="171" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  new </text>
  <text x="530" y="171" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">ClassPathXmlApplicationContext(</text>
  <text x="456" y="189" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">    "applicationContext.xml"</text>
  <text x="456" y="207" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  );</text>
  <!-- blank line -->
  <text x="456" y="243" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#6a8aa0">// Java Config (권장)</text>
  <text x="456" y="261" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">ApplicationContext</text>
  <text x="456" y="279" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  ctx = </text>
  <text x="456" y="297" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  new </text>
  <text x="530" y="297" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">AnnotationConfigApplicationContext(</text>
  <text x="456" y="315" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">    AppConfig</text>
  <text x="570" y="315" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">.class);</text>
  <!-- blank line -->
  <text x="456" y="351" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#6a8aa0">// 빈 꺼내기</text>
  <text x="456" y="369" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">var svc = ctx.getBean(MyService.class);</text>
  <text x="456" y="387" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">svc.execute();</text>

  <!-- Footer -->
  <text x="440" y="480" text-anchor="middle" font-size="11" fill="#444">refresh()는 AbstractApplicationContext에 구현돼 있으며, 상속 구현체들은 이 메서드를 재정의하지 않습니다</text>
</svg>
