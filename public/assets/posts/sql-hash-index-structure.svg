<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">해시 인덱스 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">해시 함수로 버킷을 결정 — 등치(=) 검색 O(1), 범위 검색 불가</text>

  <!-- Hash function box -->
  <rect x="60" y="95" width="200" height="50" fill="#0d0d18" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">해시 함수</text>
  <text x="160" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">hash(key) mod N</text>

  <!-- Input keys -->
  <text x="60" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">입력 키</text>

  <rect x="60" y="205" width="85" height="30" fill="#1a1a1a" rx="4" stroke="#555"/>
  <text x="102" y="225" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">'alice'</text>

  <rect x="155" y="205" width="85" height="30" fill="#1a1a1a" rx="4" stroke="#555"/>
  <text x="197" y="225" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">'bob'</text>

  <!-- Arrows from input to hash -->
  <line x1="102" y1="205" x2="130" y2="145" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="197" y1="205" x2="170" y2="145" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Hash result arrows -->
  <line x1="260" y1="120" x2="380" y2="170" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="380,170 368,162 368,178" fill="#7ec8e3"/>

  <line x1="260" y1="120" x2="380" y2="240" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="380,240 368,232 368,248" fill="#7ec8e3"/>

  <line x1="260" y1="120" x2="380" y2="310" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="380,310 368,302 368,318" fill="#7ec8e3"/>

  <line x1="260" y1="120" x2="380" y2="380" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="380,380 368,372 368,388" fill="#7ec8e3"/>

  <!-- Hash Bucket array -->
  <text x="390" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">버킷 배열</text>

  <!-- Bucket 0 -->
  <rect x="380" y="152" width="80" height="36" fill="#0d1520" rx="4" stroke="#3a4a6e"/>
  <text x="420" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">Bucket[0]</text>

  <!-- Bucket 1 -->
  <rect x="380" y="222" width="80" height="36" fill="#0d1520" rx="4" stroke="#7ec8e3" stroke-width="2"/>
  <text x="420" y="244" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">Bucket[1]</text>

  <!-- Bucket 2 -->
  <rect x="380" y="292" width="80" height="36" fill="#0d1520" rx="4" stroke="#55c555" stroke-width="2"/>
  <text x="420" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Bucket[2]</text>

  <!-- Bucket 3 -->
  <rect x="380" y="362" width="80" height="36" fill="#0d1520" rx="4" stroke="#3a4a6e"/>
  <text x="420" y="384" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">Bucket[3]</text>

  <!-- Entries linked from buckets -->
  <!-- Bucket 1 → 'bob' entry -->
  <line x1="460" y1="240" x2="540" y2="240" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="540,240 528,233 528,247" fill="#7ec8e3"/>
  <rect x="540" y="222" width="140" height="36" fill="#111" rx="4" stroke="#7ec8e3"/>
  <text x="610" y="235" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">'bob'</text>
  <text x="610" y="251" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">→ heap tid (3,5)</text>

  <!-- Bucket 2 → 'alice' entry -->
  <line x1="460" y1="310" x2="540" y2="310" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="540,310 528,303 528,317" fill="#55c555"/>
  <rect x="540" y="292" width="140" height="36" fill="#111" rx="4" stroke="#55c555"/>
  <text x="610" y="305" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">'alice'</text>
  <text x="610" y="321" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">→ heap tid (1,2)</text>

  <!-- Collision example -->
  <text x="700" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">충돌(Collision)</text>
  <text x="700" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">발생 시 체인</text>
  <line x1="680" y1="251" x2="680" y2="280" stroke="#555" stroke-dasharray="4,2"/>
  <rect x="630" y="280" width="100" height="30" fill="#1a1a1a" rx="4" stroke="#555"/>
  <text x="680" y="299" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">'carol' → …</text>

  <!-- B-Tree comparison box -->
  <rect x="60" y="450" width="760" height="50" fill="#111" rx="6" stroke="#333"/>
  <text x="260" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">해시 인덱스</text>
  <text x="260" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">등치 조건 O(1) · 범위/정렬 불가</text>
  <line x1="440" y1="455" x2="440" y2="495" stroke="#333"/>
  <text x="620" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">B-Tree 인덱스</text>
  <text x="620" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">범위/정렬 가능 · 등치 O(log n)</text>
</svg>
