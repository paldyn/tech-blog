<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker image prune — 정리 모드 비교</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">기본 모드 vs -a (전체 미사용 이미지)</text>

  <!-- 기본 모드 card -->
  <rect x="60" y="104" width="360" height="340" fill="#0d1117" rx="10" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="104" width="360" height="48" fill="#1a1a2e" rx="10" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="136" width="360" height="16" fill="#1a1a2e"/>
  <text x="240" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">docker image prune</text>

  <text x="240" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">댕글링 이미지만 삭제</text>
  <text x="240" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">&lt;none&gt;:&lt;none&gt; 으로 표시되는 이미지</text>

  <!-- Dangling 이미지 시각화 -->
  <rect x="84" y="210" width="312" height="36" fill="#180e0e" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">&lt;none&gt;:&lt;none&gt; → 삭제 ✗</text>

  <rect x="84" y="254" width="312" height="36" fill="#111820" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">nginx:latest → 유지 ✓</text>

  <rect x="84" y="298" width="312" height="36" fill="#111820" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">myapp:v2 → 유지 ✓</text>

  <text x="240" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">태그 있는 이미지는 건드리지 않음</text>
  <text x="240" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">컨테이너 실행 여부 무관</text>
  <text x="240" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">✓ 안전한 기본 정리</text>

  <!-- -a 모드 card -->
  <rect x="460" y="104" width="360" height="340" fill="#0d1117" rx="10" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="460" y="104" width="360" height="48" fill="#1a0a1a" rx="10" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="460" y="136" width="360" height="16" fill="#1a0a1a"/>
  <text x="640" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">docker image prune -a</text>

  <text x="640" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">미사용 이미지 전체 삭제</text>
  <text x="640" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실행 중 컨테이너에서 사용 안 하는 모든 것</text>

  <rect x="484" y="210" width="312" height="36" fill="#180e0e" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">&lt;none&gt;:&lt;none&gt; → 삭제 ✗</text>

  <rect x="484" y="254" width="312" height="36" fill="#180e0e" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">nginx:latest → 삭제 ✗</text>

  <rect x="484" y="298" width="312" height="36" fill="#111820" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">myapp:v2 (컨테이너 실행 중) ✓</text>

  <text x="640" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실행 중 컨테이너 이미지만 보호</text>
  <text x="640" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">멈춘 컨테이너의 이미지도 삭제됨</text>
  <text x="640" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">⚠ CI/CD 환경에서 주의 필요</text>
</svg>
