<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">관계 모델 핵심 개념</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">Edgar F. Codd, 1970 — 집합론 기반 데이터 모델</text>

  <defs>
    <marker id="aw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Relation box (center) -->
  <rect x="320" y="100" width="240" height="80" fill="#0f1320" stroke="#7777cc" stroke-width="2" rx="8"/>
  <text x="440" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#7777cc">릴레이션 (Relation)</text>
  <text x="440" y="152" text-anchor="middle" font-size="12" fill="#888">순서 없는 튜플들의 집합</text>
  <text x="440" y="170" text-anchor="middle" font-size="11" fill="#888">= 수학의 집합(set)과 동일</text>

  <!-- Attribute -->
  <rect x="60" y="100" width="200" height="80" fill="#0f1320" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="160" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">속성 (Attribute)</text>
  <text x="160" y="148" text-anchor="middle" font-size="12" fill="#888">릴레이션의 각 열</text>
  <text x="160" y="165" text-anchor="middle" font-size="11" fill="#888">이름 + 도메인으로 정의</text>
  <line x1="260" y1="140" x2="318" y2="140" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#aw)"/>

  <!-- Tuple -->
  <rect x="620" y="100" width="200" height="80" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="720" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">튜플 (Tuple)</text>
  <text x="720" y="148" text-anchor="middle" font-size="12" fill="#888">릴레이션의 각 행</text>
  <text x="720" y="165" text-anchor="middle" font-size="11" fill="#888">속성값들의 순서쌍</text>

  <defs>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <line x1="560" y1="140" x2="618" y2="140" stroke="#55c555" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Domain -->
  <rect x="60" y="240" width="200" height="80" fill="#0f1320" stroke="#ce9178" stroke-width="1.5" rx="8"/>
  <text x="160" y="268" text-anchor="middle" font-size="15" font-weight="600" fill="#ce9178">도메인 (Domain)</text>
  <text x="160" y="288" text-anchor="middle" font-size="12" fill="#888">속성이 가질 수 있는 값 집합</text>
  <text x="160" y="305" text-anchor="middle" font-size="11" fill="#888">예: age = {0..150}</text>

  <!-- Key -->
  <rect x="320" y="240" width="240" height="80" fill="#0f1320" stroke="#e05555" stroke-width="1.5" rx="8"/>
  <text x="440" y="268" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">키 (Key)</text>
  <text x="440" y="288" text-anchor="middle" font-size="12" fill="#888">튜플을 유일하게 식별하는 속성(들)</text>
  <text x="440" y="305" text-anchor="middle" font-size="11" fill="#888">후보 키 &#8835; 기본 키 &#8835; 슈퍼 키</text>

  <!-- Schema -->
  <rect x="620" y="240" width="200" height="80" fill="#0f1320" stroke="#b5cea8" stroke-width="1.5" rx="8"/>
  <text x="720" y="268" text-anchor="middle" font-size="15" font-weight="600" fill="#b5cea8">스키마 (Schema)</text>
  <text x="720" y="288" text-anchor="middle" font-size="12" fill="#888">릴레이션의 구조 정의</text>
  <text x="720" y="305" text-anchor="middle" font-size="11" fill="#888">이름 + 속성 목록</text>

  <!-- Connecting lines domain - relation -->
  <line x1="160" y1="240" x2="350" y2="182" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Connecting lines key - relation -->
  <line x1="440" y1="240" x2="440" y2="182" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Connecting lines schema - relation -->
  <line x1="720" y1="240" x2="530" y2="182" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom: 12 rules hint -->
  <rect x="60" y="368" width="760" height="82" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="8"/>
  <text x="440" y="390" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Codd의 12 규칙 (핵심 3가지)</text>
  <text x="440" y="412" text-anchor="middle" font-size="12" fill="#888">규칙 1: 정보는 오직 테이블의 값으로만 표현된다</text>
  <text x="440" y="428" text-anchor="middle" font-size="12" fill="#888">규칙 2: NULL 값은 미지(missing) 정보를 나타내는 단일 방식으로 지원되어야 한다</text>
  <text x="440" y="444" text-anchor="middle" font-size="12" fill="#888">규칙 6: 뷰(View)는 갱신 가능해야 한다</text>
</svg>
