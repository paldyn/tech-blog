<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제네릭 함수와 제네릭 클래스 (PEP 695)</text>

  <rect x="60" y="64" width="760" height="236" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="80" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># Python 3.12+ : 대괄호로 타입 파라미터 선언</tspan></text>

  <text x="80" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> first[T](items: </tspan><tspan fill="#7ec8e3" font-weight="600">list</tspan><tspan fill="#ffffff">[T]) -&gt; T:</tspan></text>

  <text x="80" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> items[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">]</tspan></text>

  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Box[T]:</tspan></text>

  <text x="80" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> __init__(self, value: T) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">None</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="80" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        self.value = value</tspan></text>

  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">n = first([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">])</tspan><tspan fill="#9aa4b8">      # n: int 으로 추론</tspan></text>

  <text x="80" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">b: Box[</tspan><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">] = Box(</tspan><tspan fill="#ce9178">"hi"</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8">   # b.value: str</tspan></text>
</svg>
