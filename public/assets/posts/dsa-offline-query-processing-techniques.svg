<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">오프라인 쿼리 처리 4가지 기법</text>

  <!-- Technique 1: Mo's Algorithm -->
  <rect x="60" y="68" width="360" height="170" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="68" width="360" height="40" rx="8" fill="#1a3a5a"/>
  <text x="240" y="93" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">1. Mo's Algorithm</text>
  <text x="240" y="108" font-size="12" fill="#7ec8e3" text-anchor="middle">구간 쿼리 정렬</text>
  <text x="80" y="132" font-size="13" fill="#888">대상: 정적 배열 구간 쿼리</text>
  <text x="80" y="152" font-size="13" fill="#888">방법: L/R 포인터 블록 정렬</text>
  <text x="80" y="172" font-size="13" fill="#888">복잡도: O((N+Q) sqrt N)</text>
  <text x="80" y="192" font-size="13" fill="#888">예시: 구간 서로 다른 원소 수</text>
  <rect x="80" y="202" width="320" height="26" rx="4" fill="#0d1a2a"/>
  <text x="240" y="220" font-size="12" fill="#7ec8e3" text-anchor="middle">add(pos) / remove(pos) O(1) 필요</text>

  <!-- Technique 2: 이벤트 정렬 -->
  <rect x="460" y="68" width="360" height="170" rx="8" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <rect x="460" y="68" width="360" height="40" rx="8" fill="#1a5a3a"/>
  <text x="640" y="93" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">2. 이벤트 정렬</text>
  <text x="640" y="108" font-size="12" fill="#55c555" text-anchor="middle">시간축 처리</text>
  <text x="480" y="132" font-size="13" fill="#888">대상: 시간 순서 있는 쿼리</text>
  <text x="480" y="152" font-size="13" fill="#888">방법: 이벤트를 시간순 정렬</text>
  <text x="480" y="172" font-size="13" fill="#888">복잡도: O((N+Q) log N)</text>
  <text x="480" y="192" font-size="13" fill="#888">예시: 특정 시점 이전 삽입 수</text>
  <rect x="480" y="202" width="320" height="26" rx="4" fill="#0a1a0a"/>
  <text x="640" y="220" font-size="12" fill="#55c555" text-anchor="middle">BIT / 세그먼트 트리와 조합</text>

  <!-- Technique 3: 분할 정복 -->
  <rect x="60" y="258" width="360" height="170" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="60" y="258" width="360" height="40" rx="8" fill="#2a2a5a"/>
  <text x="240" y="283" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">3. 분할 정복</text>
  <text x="240" y="298" font-size="12" fill="#7777cc" text-anchor="middle">쿼리 분할 처리</text>
  <text x="80" y="322" font-size="13" fill="#888">대상: 구간 분할 가능한 쿼리</text>
  <text x="80" y="342" font-size="13" fill="#888">방법: mid 기준 쿼리 분리</text>
  <text x="80" y="362" font-size="13" fill="#888">복잡도: O(N log^2 N)</text>
  <text x="80" y="382" font-size="13" fill="#888">예시: 오프라인 LCT, 동적 연결성</text>
  <rect x="80" y="392" width="320" height="26" rx="4" fill="#111122"/>
  <text x="240" y="410" font-size="12" fill="#7777cc" text-anchor="middle">CDQ Divide &amp; Conquer</text>

  <!-- Technique 4: 병합 정렬 기반 -->
  <rect x="460" y="258" width="360" height="170" rx="8" fill="#2a1a0a" stroke="#e8c070" stroke-width="1.5"/>
  <rect x="460" y="258" width="360" height="40" rx="8" fill="#5a3a1a"/>
  <text x="640" y="283" font-size="15" font-weight="600" fill="#e8c070" text-anchor="middle">4. 병합 정렬 기반</text>
  <text x="640" y="298" font-size="12" fill="#e8c070" text-anchor="middle">역전 쌍 / 기여 계산</text>
  <text x="480" y="322" font-size="13" fill="#888">대상: 쌍 비교 기반 쿼리</text>
  <text x="480" y="342" font-size="13" fill="#888">방법: 병합 시 기여 누적</text>
  <text x="480" y="362" font-size="13" fill="#888">복잡도: O(N log N)</text>
  <text x="480" y="382" font-size="13" fill="#888">예시: 역전 쌍 수, 범위 합 쿼리</text>
  <rect x="480" y="392" width="320" height="26" rx="4" fill="#1a0a00"/>
  <text x="640" y="410" font-size="12" fill="#e8c070" text-anchor="middle">merge sort tree, BIT 조합</text>

  <!-- Bottom note -->
  <text x="440" y="452" font-size="13" fill="#888" text-anchor="middle">모든 오프라인 기법의 공통점: 쿼리를 미리 수집해 최적 순서로 처리</text>
  <text x="440" y="468" font-size="13" fill="#7ec8e3" text-anchor="middle">온라인 필요 없으면 항상 오프라인 고려 - 상수 계수 2~10x 향상</text>
</svg>
