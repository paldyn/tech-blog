<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PostgreSQL Hash 인덱스 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">해시 함수 → Bucket → Overflow → Heap TID</text>

  <!-- Hash function -->
  <rect x="60" y="100" width="200" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="160" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">키 값 입력</text>
  <text x="160" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">'user@example.com'</text>

  <!-- Arrow to hash -->
  <line x1="260" y1="130" x2="296" y2="130" stroke="#7777cc" stroke-width="2"/>
  <polygon points="296,124 308,130 296,136" fill="#7777cc"/>

  <!-- Hash function box -->
  <rect x="308" y="100" width="200" height="60" rx="8" fill="#111" stroke="#7ec8e3"/>
  <text x="408" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Hash Function</text>
  <text x="408" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">hashtext() → uint32</text>

  <!-- Arrow to bucket -->
  <line x1="508" y1="130" x2="544" y2="130" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="544,124 556,130 544,136" fill="#7ec8e3"/>

  <!-- Bucket result -->
  <rect x="556" y="100" width="264" height="60" rx="8" fill="#111" stroke="#55c555"/>
  <text x="688" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">hash % num_buckets = 3</text>
  <text x="688" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Linear Hashing으로 버킷 수 동적 확장</text>

  <!-- Buckets -->
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Bucket Pages</text>

  <!-- bucket 0 -->
  <rect x="60" y="212" width="140" height="80" rx="6" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="130" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">Bucket 0</text>
  <text x="130" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">TID(1,5)</text>
  <text x="130" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">TID(4,2)</text>
  <text x="130" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">hash val: 0x00...</text>

  <!-- bucket 1 -->
  <rect x="220" y="212" width="140" height="80" rx="6" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="290" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">Bucket 1</text>
  <text x="290" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">TID(2,1)</text>
  <text x="290" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">TID(8,7)</text>

  <!-- bucket 2 -->
  <rect x="380" y="212" width="140" height="80" rx="6" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="450" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">Bucket 2</text>
  <text x="450" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">TID(5,3)</text>

  <!-- bucket 3 (highlighted) -->
  <rect x="540" y="212" width="140" height="80" rx="6" fill="#0d1a0d" stroke="#55c555"/>
  <text x="610" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">Bucket 3 ←</text>
  <text x="610" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">TID(9,4)</text>
  <text x="610" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">TID(12,1)</text>
  <text x="610" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">← 현재 검색 대상</text>

  <!-- Overflow page -->
  <rect x="700" y="212" width="140" height="80" rx="6" fill="#0d1117" stroke="#e05555" stroke-dasharray="4,2"/>
  <text x="770" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">Overflow</text>
  <text x="770" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">TID(15,2)</text>
  <text x="770" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">충돌 시 연결</text>

  <!-- Arrow from bucket 3 to overflow -->
  <line x1="680" y1="252" x2="698" y2="252" stroke="#e05555" stroke-width="2" stroke-dasharray="3,2"/>
  <polygon points="698,246 700,252 698,258" fill="#e05555"/>

  <!-- Arrow from hash result to bucket 3 -->
  <line x1="688" y1="160" x2="610" y2="210" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="605,204 610,216 617,206" fill="#55c555"/>

  <!-- Bottom comparison -->
  <rect x="60" y="316" width="760" height="140" rx="8" fill="#111" stroke="#3a4a6e"/>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Hash vs B-Tree 비교</text>
  <!-- headers -->
  <text x="120" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">특성</text>
  <text x="380" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Hash</text>
  <text x="640" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">B-Tree</text>
  <line x1="80" y1="372" x2="800" y2="372" stroke="#3a4a6e"/>
  <text x="120" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">등호(=) 조회</text>
  <text x="380" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">O(1) 이론적</text>
  <text x="640" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">O(log N)</text>
  <text x="120" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">범위(&lt;, &gt;, BETWEEN)</text>
  <text x="380" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">불가</text>
  <text x="640" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">가능</text>
  <text x="120" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">정렬 결과 반환</text>
  <text x="380" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">불가</text>
  <text x="640" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">가능</text>
  <text x="120" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">WAL 기록</text>
  <text x="380" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">PG 10+부터 완전 지원</text>
  <text x="640" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">항상 지원</text>
</svg>
