<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="background:#0a0a0a;border-radius:12px">
  <!-- Background -->
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Header band -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">최대 마진 초평면과 서포트 벡터</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">SVM은 두 클래스 사이의 마진을 최대화하는 결정 경계를 찾는다</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- ===== LEFT: VISUALIZATION PANEL ===== -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">최대 마진 초평면 시각화</text>
  <rect x="60" y="116" width="400" height="228" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Grid lines (subtle) -->
  <line x1="80" y1="116" x2="80" y2="344" stroke="#141e2e" stroke-width="1"/>
  <line x1="140" y1="116" x2="140" y2="344" stroke="#141e2e" stroke-width="1"/>
  <line x1="200" y1="116" x2="200" y2="344" stroke="#141e2e" stroke-width="1"/>
  <line x1="260" y1="116" x2="260" y2="344" stroke="#141e2e" stroke-width="1"/>
  <line x1="320" y1="116" x2="320" y2="344" stroke="#141e2e" stroke-width="1"/>
  <line x1="380" y1="116" x2="380" y2="344" stroke="#141e2e" stroke-width="1"/>
  <line x1="60" y1="150" x2="460" y2="150" stroke="#141e2e" stroke-width="1"/>
  <line x1="60" y1="200" x2="460" y2="200" stroke="#141e2e" stroke-width="1"/>
  <line x1="60" y1="250" x2="460" y2="250" stroke="#141e2e" stroke-width="1"/>
  <line x1="60" y1="300" x2="460" y2="300" stroke="#141e2e" stroke-width="1"/>

  <!-- Decision boundary (solid) -->
  <line x1="82" y1="344" x2="458" y2="120" stroke="#7777cc" stroke-width="2.5"/>

  <!-- Margin boundaries (dashed) -->
  <line x1="60" y1="320" x2="420" y2="116" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="120" y1="344" x2="460" y2="144" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- Margin width arrow -->
  <line x1="150" y1="282" x2="188" y2="234" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="148" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">마진(margin)</text>

  <!-- Class + (circles) — upper-left region -->
  <circle cx="110" cy="170" r="9" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="140" cy="145" r="9" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="85" cy="200" r="9" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="170" cy="160" r="9" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="95" cy="240" r="9" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <!-- Support vector + -->
  <circle cx="145" cy="198" r="9" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="145" cy="198" r="14" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Class - (squares) — lower-right region -->
  <rect x="278" y="225" width="18" height="18" rx="2" fill="none" stroke="#ce9178" stroke-width="2.5"/>
  <rect x="320" y="255" width="18" height="18" rx="2" fill="none" stroke="#ce9178" stroke-width="2.5"/>
  <rect x="350" y="220" width="18" height="18" rx="2" fill="none" stroke="#ce9178" stroke-width="2.5"/>
  <rect x="380" y="290" width="18" height="18" rx="2" fill="none" stroke="#ce9178" stroke-width="2.5"/>
  <rect x="310" y="290" width="18" height="18" rx="2" fill="none" stroke="#ce9178" stroke-width="2.5"/>
  <!-- Support vector - -->
  <rect x="257" y="198" width="18" height="18" rx="2" fill="none" stroke="#ce9178" stroke-width="2.5"/>
  <rect x="257" y="198" width="18" height="18" rx="2" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="3,2" transform="translate(-5,-5) scale(1.4,1.4)"/>

  <!-- Labels -->
  <text x="82" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">클래스 +</text>
  <text x="350" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" font-weight="600">클래스 -</text>

  <!-- Decision boundary label -->
  <text x="390" y="136" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">결정 경계</text>
  <text x="390" y="148" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">w·x + b = 0</text>

  <!-- Support vector label -->
  <text x="100" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">서포트</text>
  <text x="100" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">벡터</text>

  <!-- ===== RIGHT: CONCEPT CARDS ===== -->
  <text x="486" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">핵심 개념 정리</text>

  <!-- Card: Support Vector -->
  <rect x="486" y="116" width="334" height="62" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="506" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">서포트 벡터 (Support Vector)</text>
  <text x="506" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">결정 경계와 가장 가까운 훈련 데이터 포인트</text>
  <text x="506" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이 점들만이 모델을 결정한다 — 나머지는 영향 없음</text>

  <!-- Card: Margin -->
  <rect x="486" y="192" width="334" height="62" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="506" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">마진 (Margin)</text>
  <text x="506" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">두 클래스 서포트 벡터 사이의 거리 = 2/‖w‖</text>
  <text x="506" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SVM 목표: 이 마진을 최대화 ↔ ‖w‖ 최소화</text>

  <!-- Card: Hard vs Soft -->
  <rect x="486" y="268" width="334" height="76" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="506" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">하드 마진 vs. 소프트 마진</text>
  <text x="506" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">하드 마진: 오분류 허용 안 함 — 잡음에 취약</text>
  <text x="506" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">소프트 마진: C 파라미터로 위반 허용량 조절</text>
  <text x="506" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">C 크면 → 하드(과적합 위험), C 작으면 → 부드러움</text>

  <!-- Footer -->
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
