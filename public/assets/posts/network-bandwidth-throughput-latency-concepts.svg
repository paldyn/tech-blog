<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrb2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">대역폭 · 처리량 · 지연시간</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Bandwidth · Throughput · Latency 개념 비교</text>

  <!-- Bandwidth: pipe analogy -->
  <text x="180" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">대역폭 (Bandwidth)</text>
  <text x="180" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파이프의 굵기 = 최대 용량</text>

  <!-- Pipe drawing -->
  <rect x="60" y="134" width="240" height="40" rx="20" fill="#1a2a35" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">1 Gbps (1,000 Mbps)</text>
  <line x1="300" y1="154" x2="320" y2="154" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrb)"/>

  <!-- Thin pipe -->
  <rect x="60" y="192" width="240" height="22" rx="11" fill="#1a2a35" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">100 Mbps (더 좁은 파이프)</text>
  <line x1="300" y1="203" x2="320" y2="203" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrb)"/>

  <text x="180" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">단위: bps, Kbps, Mbps, Gbps</text>

  <!-- Throughput -->
  <text x="500" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">처리량 (Throughput)</text>
  <text x="500" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실제 흐르는 물의 양 = 실측값</text>

  <!-- Throughput bars -->
  <rect x="380" y="134" width="240" height="22" rx="3" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="380" y="134" width="200" height="22" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">실제 처리량 750 Mbps</text>

  <text x="500" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대역폭보다 항상 작거나 같음</text>
  <text x="500" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">혼잡·오류·오버헤드로 감소</text>

  <rect x="380" y="206" width="240" height="22" rx="3" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="380" y="206" width="140" height="22" rx="3" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="500" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">혼잡 시 500 Mbps</text>

  <!-- Latency section -->
  <rect x="60" y="260" width="760" height="180" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">지연시간 (Latency) 구성요소</text>

  <!-- Latency components -->
  <rect x="80" y="298" width="148" height="60" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1.5"/>
  <text x="154" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">전파 지연</text>
  <text x="154" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Propagation</text>
  <text x="154" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빛 속도 한계 ~5ms/1000km</text>

  <line x1="228" y1="328" x2="248" y2="328" stroke="#3a4a6e" stroke-width="1.5" marker-end="url(#arrb)"/>

  <rect x="248" y="298" width="148" height="60" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="322" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">전송 지연</text>
  <text x="322" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Transmission</text>
  <text x="322" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">패킷크기 ÷ 대역폭</text>

  <line x1="396" y1="328" x2="416" y2="328" stroke="#3a4a6e" stroke-width="1.5" marker-end="url(#arrb)"/>

  <rect x="416" y="298" width="148" height="60" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="490" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">처리 지연</text>
  <text x="490" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Processing</text>
  <text x="490" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">라우터 헤더 분석 시간</text>

  <line x1="564" y1="328" x2="584" y2="328" stroke="#3a4a6e" stroke-width="1.5" marker-end="url(#arrb)"/>

  <rect x="584" y="298" width="216" height="60" rx="6" fill="#1a1a1a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="692" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">큐잉 지연</text>
  <text x="692" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Queuing</text>
  <text x="692" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">라우터 버퍼 대기 (혼잡 시 증가)</text>

  <!-- Formula -->
  <rect x="80" y="376" width="720" height="40" rx="6" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">총 지연 = 전파지연 + 전송지연 + 처리지연 + 큐잉지연</text>
  <text x="440" y="409" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">RTT (Round-Trip Time) = 왕복 지연 ≈ 2 × 단방향 지연</text>

  <!-- Summary -->
  <rect x="60" y="456" width="760" height="12" rx="4" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
</svg>
