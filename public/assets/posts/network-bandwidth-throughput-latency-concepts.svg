<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">대역폭 · 처리량 · 지연</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">네트워크 성능을 측정하는 세 가지 핵심 지표</text>

  <!-- Bandwidth box -->
  <rect x="60" y="90" width="240" height="130" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">대역폭 (Bandwidth)</text>
  <text x="180" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">링크의 이론적 최대 용량</text>
  <text x="180" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단위: bps (bits per second)</text>
  <text x="180" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">도로의 차선 수</text>
  <text x="180" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">예: 1 Gbps 이더넷</text>

  <!-- Throughput box -->
  <rect x="320" y="90" width="240" height="130" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">처리량 (Throughput)</text>
  <text x="440" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실제 전송된 데이터량</text>
  <text x="440" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">항상 대역폭 이하</text>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">실제로 달리는 차량 수</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">혼잡·손실로 줄어듦</text>

  <!-- Latency box -->
  <rect x="580" y="90" width="240" height="130" rx="8" fill="#2a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">지연 (Latency)</text>
  <text x="700" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">패킷이 이동하는 데 걸리는 시간</text>
  <text x="700" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단위: ms (밀리초)</text>
  <text x="700" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">목적지까지의 이동 시간</text>
  <text x="700" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">물리 거리에 비례</text>

  <!-- Pipe diagram: Bandwidth vs Throughput -->
  <text x="440" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">대역폭 vs 처리량</text>
  <!-- Pipe -->
  <rect x="100" y="268" width="680" height="30" rx="4" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <!-- Fill (throughput ~70%) -->
  <rect x="100" y="270" width="475" height="26" rx="3" fill="#1a3a1a" stroke="none"/>
  <text x="335" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">실제 처리량 (70%)</text>
  <text x="625" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#333" text-anchor="middle">미사용 (30%)</text>
  <!-- Arrows -->
  <line x1="100" y1="310" x2="780" y2="310" stroke="#3a4a6e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">링크 대역폭 (1 Gbps)</text>

  <!-- Latency diagram -->
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">지연 구성 요소</text>
  <rect x="60" y="370" width="760" height="46" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전파 지연(Propagation) + 전송 지연(Transmission) + 처리 지연(Processing) + 큐잉 지연(Queuing)</text>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">서울 → 뉴욕: 약 180ms / 서울 → 도쿄: 약 30ms</text>
</svg>
