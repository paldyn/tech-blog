<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">대역폭, 처리량, 지연 시간 개념</text>

  <!-- Bandwidth pipe illustration -->
  <text x="440" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">수도관 비유로 이해하기</text>

  <!-- Bandwidth = pipe width -->
  <rect x="60" y="100" width="360" height="100" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">대역폭 (Bandwidth)</text>
  <!-- Pipe visual: wide pipe -->
  <rect x="90" y="140" width="300" height="30" rx="4" fill="#0a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">파이프의 굵기 = 최대 전송 가능 용량</text>
  <text x="240" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">단위: bps, Mbps, Gbps</text>

  <!-- Throughput = actual water flow -->
  <rect x="460" y="100" width="360" height="100" rx="8" fill="#0d2016" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">처리량 (Throughput)</text>
  <!-- Pipe visual: partially filled -->
  <rect x="490" y="140" width="300" height="30" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <rect x="490" y="140" width="200" height="30" rx="4" fill="#0a3018" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">실제 흐르는 물의 양</text>
  <text x="640" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">대역폭 이하, 손실/혼잡 영향</text>

  <!-- Latency timeline -->
  <rect x="60" y="230" width="760" height="110" rx="8" fill="#1a120a" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8a55c" text-anchor="middle">지연 시간 (Latency) = 전파 + 전송 + 처리 + 큐</text>
  <!-- Timeline bar -->
  <rect x="90" y="274" width="140" height="30" rx="4" fill="#2a1800" stroke="#e8a55c" stroke-width="1"/>
  <text x="160" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a55c" text-anchor="middle">전파 지연</text>
  <rect x="240" y="274" width="100" height="30" rx="4" fill="#1a1200" stroke="#c8c855" stroke-width="1"/>
  <text x="290" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#c8c855" text-anchor="middle">전송 지연</text>
  <rect x="350" y="274" width="100" height="30" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="400" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">처리 지연</text>
  <rect x="460" y="274" width="80" height="30" rx="4" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="500" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">큐 지연</text>
  <!-- Total bracket -->
  <line x1="90" y1="318" x2="540" y2="318" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="315" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a55c" text-anchor="middle">총 지연 시간 (End-to-End Latency)</text>

  <!-- Bottom summary -->
  <rect x="60" y="360" width="240" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">대역폭</text>
  <text x="180" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이론적 최대 전송 속도</text>

  <rect x="320" y="360" width="240" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">처리량</text>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실제 측정 전송 속도</text>

  <rect x="580" y="360" width="240" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a55c" text-anchor="middle">지연</text>
  <text x="700" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">데이터 도달 소요 시간</text>
</svg>
