<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-rg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">대역폭 · 처리량 · 지연</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">네트워크 성능을 나타내는 3가지 핵심 지표</text>

  <!-- Bandwidth section -->
  <rect x="60" y="90" width="240" height="140" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">대역폭 (Bandwidth)</text>
  <text x="180" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이론적 최대 전송 능력</text>
  <text x="180" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단위: bps, Mbps, Gbps</text>
  <text x="180" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">도로의 최대 차선 수</text>
  <text x="180" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">예: 1Gbps 광케이블</text>
  <text x="180" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(실제 속도와 다를 수 있음)</text>

  <!-- Throughput section -->
  <rect x="320" y="90" width="240" height="140" rx="8" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">처리량 (Throughput)</text>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 측정된 전송 속도</text>
  <text x="440" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단위: bps (실측값)</text>
  <text x="440" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 도로 위 차량 흐름</text>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">예: 750Mbps 실측</text>
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(항상 대역폭 이하)</text>

  <!-- Latency section -->
  <rect x="580" y="90" width="240" height="140" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">지연 (Latency)</text>
  <text x="700" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">데이터 이동 소요 시간</text>
  <text x="700" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단위: ms (밀리초)</text>
  <text x="700" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">출발지 → 도착지 시간</text>
  <text x="700" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">예: RTT 20ms</text>
  <text x="700" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(낮을수록 좋음)</text>

  <!-- Pipe analogy -->
  <text x="440" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">도로 비유</text>

  <!-- Road visualization -->
  <rect x="60" y="285" width="760" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>

  <!-- bandwidth lanes -->
  <line x1="60" y1="300" x2="820" y2="300" stroke="#333" stroke-width="1" stroke-dasharray="8,8"/>
  <line x1="60" y1="315" x2="820" y2="315" stroke="#333" stroke-width="1" stroke-dasharray="8,8"/>
  <line x1="60" y1="330" x2="820" y2="330" stroke="#333" stroke-width="1" stroke-dasharray="8,8"/>

  <!-- cars (throughput) -->
  <rect x="100" y="288" width="30" height="16" rx="3" fill="#55c555"/>
  <rect x="200" y="302" width="30" height="16" rx="3" fill="#55c555"/>
  <rect x="320" y="317" width="30" height="16" rx="3" fill="#55c555"/>
  <rect x="450" y="288" width="30" height="16" rx="3" fill="#55c555"/>
  <rect x="600" y="302" width="30" height="16" rx="3" fill="#55c555"/>
  <rect x="730" y="317" width="30" height="16" rx="3" fill="#55c555"/>

  <text x="440" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대역폭 = 차선 수 (최대 용량) | 처리량 = 실제 차량 수 | 지연 = 목적지까지 소요 시간</text>

  <!-- code box: latency breakdown -->
  <rect x="60" y="385" width="760" height="55" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">지연의 구성 요소</text>
  <text x="80" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">전파지연 + 전송지연 + 큐잉지연 + 처리지연 = 총 지연(RTT/2)</text>
</svg>
