<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">브랜치 이름 Good vs Bad</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">팀이 공유하는 컨벤션이 없으면 브랜치 목록이 혼돈</text>

  <!-- Bad column -->
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Bad</text>
  <rect x="60" y="124" width="360" height="236" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.2"/>

  <text x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">test</text>
  <text x="240" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">무엇을 테스트하는지 불명확</text>

  <text x="80" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">my-branch</text>
  <text x="240" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">개인 작업 → 공유 불가</text>

  <text x="80" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">fix</text>
  <text x="240" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">어떤 수정인지 불명확</text>

  <text x="80" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">branch_login_AUTH</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">밑줄+대문자 혼용 → 탭 완성 어려움</text>

  <text x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">이번-작업</text>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">한글 → URL 인코딩 문제</text>

  <text x="80" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">aaa / temp / wip2</text>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">의미 없는 임시 이름</text>

  <!-- Good column -->
  <text x="500" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Good</text>
  <rect x="480" y="124" width="360" height="236" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.2"/>

  <text x="500" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">feature/login-page</text>
  <text x="500" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입/설명 구조</text>

  <text x="500" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">fix/GH-42-null-user</text>
  <text x="500" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이슈 번호 + 간략한 설명</text>

  <text x="500" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">hotfix/v2.1.1-crash</text>
  <text x="500" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">긴급 수정 + 버전 명시</text>

  <text x="500" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">release/2.1.0</text>
  <text x="500" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">릴리스 + 버전</text>

  <text x="500" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">chore/upgrade-vite-5</text>
  <text x="500" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">잡무 + 무엇을 업데이트했는지</text>

  <!-- Rule box -->
  <rect x="60" y="376" width="760" height="28" rx="6" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">소문자 + 하이픈(-) + 슬래시(/) 계층 구분 — 팀 내 규칙을 CONTRIBUTING.md에 문서화</text>
</svg>
