<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">리눅스 프로세스 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">PID · 메모리 레이아웃 · 파일 디스크립터</text>

  <!-- Panel 1: Process Metadata -->
  <rect x="50" y="90" width="240" height="390" rx="8" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="170" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">프로세스 메타데이터</text>
  <line x1="66" y1="124" x2="274" y2="124" stroke="#1e2d45" stroke-width="1"/>

  <!-- Metadata rows -->
  <rect x="66" y="134" width="208" height="34" rx="4" fill="#0d1929"/>
  <text x="78" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PID</text>
  <text x="268" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="end">1234</text>

  <rect x="66" y="174" width="208" height="34" rx="4" fill="#0a0a0a"/>
  <text x="78" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PPID</text>
  <text x="268" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">1</text>

  <rect x="66" y="214" width="208" height="34" rx="4" fill="#0d1929"/>
  <text x="78" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">UID / GID</text>
  <text x="268" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">1000 / 1000</text>

  <rect x="66" y="254" width="208" height="34" rx="4" fill="#0a0a0a"/>
  <text x="78" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">상태 (State)</text>
  <text x="268" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="end">S (Sleeping)</text>

  <rect x="66" y="294" width="208" height="34" rx="4" fill="#0d1929"/>
  <text x="78" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">우선순위 (NI)</text>
  <text x="268" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="end">0</text>

  <rect x="66" y="334" width="208" height="34" rx="4" fill="#0a0a0a"/>
  <text x="78" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">작업 디렉터리</text>
  <text x="268" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178" text-anchor="end">/home/user</text>

  <rect x="66" y="374" width="208" height="34" rx="4" fill="#0d1929"/>
  <text x="78" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실행 파일 경로</text>
  <text x="268" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178" text-anchor="end">/usr/bin/bash</text>

  <rect x="66" y="414" width="208" height="50" rx="4" fill="#0a0a0a"/>
  <text x="78" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">주소 공간</text>
  <text x="268" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="end">가상 메모리</text>
  <text x="268" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">(독립 주소 공간)</text>

  <!-- Panel 2: Memory Layout -->
  <rect x="320" y="90" width="240" height="390" rx="8" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">가상 메모리 레이아웃</text>
  <line x1="336" y1="124" x2="544" y2="124" stroke="#1e2d45" stroke-width="1"/>

  <!-- Address labels -->
  <text x="336" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">높은 주소 (0xFFFF...)</text>

  <!-- Stack -->
  <rect x="352" y="154" width="176" height="48" rx="4" fill="#1a2535" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Stack</text>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">↓ 지역변수, 함수 호출</text>

  <!-- Arrow down -->
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7777cc" text-anchor="middle">↓</text>

  <!-- Gap (unmapped) -->
  <rect x="352" y="226" width="176" height="30" rx="4" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">... (빈 공간) ...</text>

  <!-- Arrow up -->
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555" text-anchor="middle">↑</text>

  <!-- Heap -->
  <rect x="352" y="284" width="176" height="48" rx="4" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Heap</text>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">↑ malloc / new</text>

  <!-- BSS -->
  <rect x="352" y="338" width="176" height="36" rx="4" fill="#1a1a0a" stroke="#e8e8e8" stroke-width="1"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">BSS — 초기화 안 된 전역</text>

  <!-- Data -->
  <rect x="352" y="380" width="176" height="36" rx="4" fill="#1a1000" stroke="#e8e8e8" stroke-width="1"/>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Data — 초기화된 전역</text>

  <!-- Text -->
  <rect x="352" y="422" width="176" height="36" rx="4" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Text — 실행 코드 (읽기전용)</text>

  <text x="336" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">낮은 주소 (0x0000...)</text>

  <!-- Panel 3: File Descriptors -->
  <rect x="590" y="90" width="240" height="390" rx="8" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="710" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">열린 파일 디스크립터</text>
  <line x1="606" y1="124" x2="814" y2="124" stroke="#1e2d45" stroke-width="1"/>

  <!-- FD table header -->
  <rect x="606" y="132" width="208" height="24" rx="3" fill="#1e2d45"/>
  <text x="640" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">fd 번호</text>
  <text x="814" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="end">가리키는 곳</text>

  <!-- fd 0 -->
  <rect x="606" y="162" width="208" height="40" rx="4" fill="#0d1929"/>
  <rect x="606" y="162" width="52" height="40" rx="4" fill="#1a2535"/>
  <text x="632" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">0</text>
  <text x="666" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">stdin</text>
  <text x="666" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">/dev/tty (키보드 입력)</text>

  <!-- fd 1 -->
  <rect x="606" y="208" width="208" height="40" rx="4" fill="#0a0a0a"/>
  <rect x="606" y="208" width="52" height="40" rx="4" fill="#1a2535"/>
  <text x="632" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">1</text>
  <text x="666" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">stdout</text>
  <text x="666" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">/dev/tty (터미널 출력)</text>

  <!-- fd 2 -->
  <rect x="606" y="254" width="208" height="40" rx="4" fill="#0d1929"/>
  <rect x="606" y="254" width="52" height="40" rx="4" fill="#1a2535"/>
  <text x="632" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">2</text>
  <text x="666" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">stderr</text>
  <text x="666" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">/dev/tty (에러 출력)</text>

  <!-- fd 3+ -->
  <rect x="606" y="300" width="208" height="40" rx="4" fill="#0a0a0a"/>
  <rect x="606" y="300" width="52" height="40" rx="4" fill="#1a2535"/>
  <text x="632" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">3+</text>
  <text x="666" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">소켓 / 파일</text>
  <text x="666" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">open() 으로 열린 파일</text>

  <!-- Note -->
  <rect x="606" y="352" width="208" height="58" rx="4" fill="#0d1415" stroke="#1e3535" stroke-width="1"/>
  <text x="622" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ls -la /proc/1234/fd/</text>
  <text x="622" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">lrwx… 0 → /dev/pts/0</text>
  <text x="622" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">lrwx… 1 → /dev/pts/0</text>

  <rect x="606" y="420" width="208" height="44" rx="4" fill="#0a0a0a"/>
  <text x="622" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">상속: fork() 시 자식이</text>
  <text x="622" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">부모 FD 테이블을 복사</text>
</svg>
