<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="a2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="a3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker restart 정책 — 4가지 모드</text>

  <!-- no box -->
  <rect x="60" y="80" width="180" height="100" fill="#1a1a1a" rx="8" stroke="#555" stroke-width="1.5"/>
  <text x="150" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">no</text>
  <text x="150" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">종료 시 재시작 안 함</text>
  <text x="150" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">기본값</text>
  <text x="150" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">일회성 작업·개발</text>

  <!-- on-failure box -->
  <rect x="260" y="80" width="180" height="100" fill="#1a0a0a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="350" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">on-failure</text>
  <text x="350" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">exit code ≠ 0일 때만</text>
  <text x="350" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">정상 종료는 재시작 안 함</text>
  <text x="350" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">:N 으로 최대 횟수 지정</text>

  <!-- always box -->
  <rect x="460" y="80" width="180" height="100" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="550" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">always</text>
  <text x="550" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">항상 재시작</text>
  <text x="550" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">daemon 재시작 시도 포함</text>
  <text x="550" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">수동 stop도 재시작</text>

  <!-- unless-stopped box -->
  <rect x="660" y="80" width="160" height="100" fill="#1a1a0a" rx="8" stroke="#e0a055" stroke-width="1.5"/>
  <text x="740" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0a055" text-anchor="middle">unless-stopped</text>
  <text x="740" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">수동 stop 전까지</text>
  <text x="740" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">daemon 재시작 시도</text>
  <text x="740" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">수동 stop은 유지</text>

  <!-- Divider -->
  <line x1="60" y1="202" x2="820" y2="202" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Comparison table header -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">always vs unless-stopped 차이</text>

  <rect x="60" y="244" width="760" height="44" fill="#1a1a1a" rx="6" stroke="#3a3a3a" stroke-width="1"/>
  <text x="76" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">시나리오</text>
  <text x="250" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">always</text>
  <text x="450" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">unless-stopped</text>
  <text x="76" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">docker stop → daemon 재시작</text>
  <text x="250" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">재시작 ✓</text>
  <text x="450" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">재시작 안 함 ✗</text>

  <rect x="60" y="292" width="760" height="44" fill="#111" rx="6" stroke="#3a3a3a" stroke-width="1"/>
  <text x="76" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">crash → daemon 재시작</text>
  <text x="250" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">재시작 ✓</text>
  <text x="450" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">재시작 ✓</text>
  <text x="76" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">on-failure 상태로 종료 → daemon 재시작</text>
  <text x="250" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">재시작 ✓</text>
  <text x="450" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">재시작 ✓</text>

  <!-- Divider -->
  <line x1="60" y1="356" x2="820" y2="356" stroke="#2a2a3a" stroke-width="1"/>

  <!-- on-failure retry note -->
  <text x="60" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">on-failure 재시도 간격 (exponential backoff)</text>
  <rect x="60" y="396" width="760" height="64" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="76" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1회: 즉시  →  2회: 1s  →  3회: 2s  →  4회: 4s  →  ...  →  최대 ~120s 간격</text>
  <text x="76" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">on-failure:5 → 5회 실패 후 중단</text>
  <text x="76" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">docker start로 수동 재시작 가능</text>
</svg>
