<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이름 규약 요약표</text>

  <!-- Table header -->
  <rect x="60" y="64" width="760" height="36" rx="8" fill="#111827"/>
  <text x="160" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">패턴</text>
  <text x="360" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">의미</text>
  <text x="560" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">언어 차원 강제</text>
  <text x="730" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">예시</text>

  <!-- Row 1 -->
  <rect x="60" y="100" width="760" height="44" rx="0" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="160" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">name</text>
  <text x="360" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">공개 (public)</text>
  <text x="360" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">누구나 사용 가능</text>
  <text x="560" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">없음</text>
  <text x="730" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">value, run()</text>

  <!-- Row 2 -->
  <rect x="60" y="144" width="760" height="44" rx="0" fill="#0a0f1a" stroke="#1e2433" stroke-width="1"/>
  <text x="160" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">_name</text>
  <text x="360" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">내부용 관례</text>
  <text x="360" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">from pkg import * 미포함</text>
  <text x="560" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">없음 (관례)</text>
  <text x="730" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">_cache, _helper()</text>

  <!-- Row 3 -->
  <rect x="60" y="188" width="760" height="44" rx="0" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="160" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" text-anchor="middle">__name</text>
  <text x="360" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">이름 맹글링</text>
  <text x="360" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">클래스 내 → _ClassName__name</text>
  <text x="560" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">컴파일 시 변환</text>
  <text x="730" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">__value, __run()</text>

  <!-- Row 4 -->
  <rect x="60" y="232" width="760" height="44" rx="0" fill="#0a0f1a" stroke="#1e2433" stroke-width="1"/>
  <text x="160" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">__name__</text>
  <text x="360" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">매직/던더 메서드</text>
  <text x="360" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">언어 프로토콜 정의</text>
  <text x="560" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">인터프리터 사용</text>
  <text x="730" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">__init__, __str__</text>

  <!-- Row 5 -->
  <rect x="60" y="276" width="760" height="44" rx="0" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="160" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" text-anchor="middle">_ (단독)</text>
  <text x="360" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">임시/무시 변수</text>
  <text x="360" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">또는 REPL 마지막 결과</text>
  <text x="560" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">없음 (관례)</text>
  <text x="730" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">for _ in range(3)</text>

  <!-- Note -->
  <rect x="60" y="332" width="760" height="50" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">맹글링은 완전한 접근 차단이 아닙니다. _MyClass__name 으로 언제든 접근 가능합니다.</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Python은 "우리는 모두 성인"이라는 철학 — 숨기되 막지 않습니다.</text>
</svg>
