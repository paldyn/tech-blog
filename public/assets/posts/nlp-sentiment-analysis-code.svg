  <text x="82" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">1</text>
  <text x="82" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">2</text>
