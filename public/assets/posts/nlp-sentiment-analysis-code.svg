  <text x="82" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">11</text>
  <text x="82" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">12</text>

  <!-- Code lines -->
  <!-- Line 1: from transformers import pipeline -->
  <text x="120" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="162" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> transformers </text>
  <text x="284" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="332" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> pipeline</text>

  <!-- Line 2: blank -->

  <!-- Line 3: sa = pipeline( -->
  <text x="120" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sa </text>
  <text x="144" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="156" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> pipeline(</text>

  <!-- Line 4:     "sentiment-analysis", -->
  <text x="120" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    "sentiment-analysis"</text>
  <text x="366" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>

  <!-- Line 5:     model="snunlp/KR-FinBert-SC", -->
  <text x="120" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    model</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ce9178">"snunlp/KR-FinBert-SC"</tspan><tspan fill="#ffffff">,</tspan></text>

  <!-- Line 6: ) -->
  <text x="120" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <!-- Line 7: blank -->

  <!-- Line 8: texts = [ -->
  <text x="120" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">texts </text>
  <text x="166" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="178" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> [</text>

  <!-- Line 9:     "이 제품 정말 좋아요!", -->
  <text x="120" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    "이 제품 정말 좋아요!"</text>
  <text x="364" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>

  <!-- Line 10:     "배송이 너무 느렸어요.", -->
  <text x="120" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    "배송이 너무 느렸어요."</text>
  <text x="364" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>

  <!-- Line 11: ] -->
  <text x="120" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]</text>

  <!-- Line 12: results = sa(texts) -->
  <text x="120" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">results </text>
  <text x="182" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="194" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> sa(texts)</text>

  <!-- Annotation box -->
  <rect x="530" y="88" width="270" height="140" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="546" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">출력 결과</text>
  <text x="546" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># [</text>
  <text x="546" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">#  {'label': 'positive',</text>
  <text x="546" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">#   'score': 0.98},</text>
  <text x="546" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">#  {'label': 'negative',</text>
  <text x="546" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">#   'score': 0.94}</text>
  <text x="546" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># ]</text>
</svg>
