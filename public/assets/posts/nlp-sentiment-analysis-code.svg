<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <!-- Background -->
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BERT 감성 분석 파이프라인 코드</text>

  <!-- Code block background -->
  <rect x="60" y="68" width="760" height="262" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Line numbers background -->
  <rect x="60" y="68" width="44" height="262" fill="#060910" rx="6"/>
  <rect x="104" y="68" width="1" height="262" fill="#1e2433"/>

