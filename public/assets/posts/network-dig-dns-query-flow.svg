<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="aQ" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="aRsp" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">dig +trace — DNS 재귀 질의 흐름</text>

  <!-- Nodes -->
  <!-- Client -->
  <rect x="40" y="175" width="110" height="52" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="95" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">클라이언트</text>

  <!-- Recursive Resolver -->
  <rect x="220" y="175" width="155" height="52" rx="8" fill="#0b1a0b" stroke="#2a6030" stroke-width="1.5"/>
  <text x="297" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">리졸버</text>
  <text x="297" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">8.8.8.8 (Google)</text>

  <!-- Root NS -->
  <rect x="460" y="90" width="145" height="52" rx="8" fill="#1a0f0b" stroke="#6a4a1a" stroke-width="1.5"/>
  <text x="532" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0a055">루트 NS</text>
  <text x="532" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">.(dot) 13개 루트</text>

  <!-- TLD NS -->
  <rect x="460" y="178" width="145" height="52" rx="8" fill="#1a0f0b" stroke="#6a4a1a" stroke-width="1.5"/>
  <text x="532" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0a055">TLD NS</text>
  <text x="532" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">.com 네임서버</text>

  <!-- Auth NS -->
  <rect x="460" y="266" width="145" height="52" rx="8" fill="#1a0f0b" stroke="#6a4a1a" stroke-width="1.5"/>
  <text x="532" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0a055">권한 NS</text>
  <text x="532" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">ns1.example.com</text>

  <!-- Arrow: client → resolver -->
  <line x1="150" y1="201" x2="220" y2="201" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aQ)"/>

  <!-- Arrows: resolver → roots (numbered) -->
  <line x1="375" y1="195" x2="460" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aQ)"/>
  <text x="415" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">① .com NS?</text>

  <line x1="460" y1="128" x2="375" y2="196" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aRsp)"/>

  <line x1="375" y1="204" x2="460" y2="204" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aQ)"/>
  <text x="416" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">② example.com NS?</text>

  <line x1="460" y1="212" x2="375" y2="212" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aRsp)"/>

  <line x1="375" y1="213" x2="460" y2="282" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aQ)"/>
  <text x="415" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">③ www.example.com A?</text>

  <line x1="460" y1="292" x2="375" y2="220" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aRsp)"/>
  <text x="410" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">93.184.216.34</text>

  <!-- Final response to client -->
  <line x1="220" y1="214" x2="150" y2="214" stroke="#55c555" stroke-width="2" marker-end="url(#aRsp)"/>
  <text x="184" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">최종 IP</text>

  <!-- Cache note -->
  <rect x="660" y="90" width="190" height="230" rx="8" fill="#0f1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="755" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">캐시 효과</text>
  <line x1="680" y1="128" x2="830" y2="128" stroke="#1a2a3a" stroke-width="1"/>
  <text x="755" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TLD NS 주소는</text>
  <text x="755" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리졸버에 캐시됨</text>
  <text x="755" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">두 번째 쿼리부터</text>
  <text x="755" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">루트 NS 생략</text>
  <text x="755" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">dig +trace 옵션으로</text>
  <text x="755" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">캐시 무시 전체 추적</text>
  <text x="755" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">가능</text>

  <!-- Bottom note -->
  <text x="440" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dig @8.8.8.8 example.com A +short  →  IP만 출력 (스크립트에 유용)</text>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dig example.com MX +noall +answer  →  MX 레코드만 깔끔하게 출력</text>
</svg>
