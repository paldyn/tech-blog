<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">윈도우 함수 3가지 범주</text>

  <!-- Category 1: Ranking -->
  <rect x="50" y="72" width="240" height="300" fill="#0d0d0d" rx="8" stroke="#55c555"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">순위 함수</text>
  <text x="170" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PARTITION + ORDER BY 필수</text>

  <rect x="66" y="126" width="208" height="172" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="82" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">ROW_NUMBER()   1,2,3,4</text>
  <text x="82" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  동점 무시, 항상 고유</text>
  <text x="82" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">RANK()         1,1,3,4</text>
  <text x="82" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  동점 같은 순위, 다음 건너뜀</text>
  <text x="82" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">DENSE_RANK()   1,1,2,3</text>
  <text x="82" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  동점 같은 순위, 건너뜀 없음</text>
  <text x="82" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">NTILE(4)       1,1,2,3</text>
  <text x="82" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  N등분 버킷 번호</text>
  <text x="82" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">PERCENT_RANK() 0~1</text>
  <text x="82" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  상대 순위 비율</text>
  <text x="170" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프레임 미적용</text>

  <!-- Category 2: Aggregate -->
  <rect x="320" y="72" width="240" height="300" fill="#0d0d0d" rx="8" stroke="#7777cc"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">집계 함수 (윈도우)</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">OVER() 붙이면 윈도우 모드</text>

  <rect x="336" y="126" width="208" height="172" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="352" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">SUM(sal) OVER (PARTITION BY dept)</text>
  <text x="352" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  부서별 급여 합계</text>
  <text x="352" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">AVG(sal) OVER (PARTITION BY dept)</text>
  <text x="352" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  부서별 평균</text>
  <text x="352" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">COUNT(*) OVER ()</text>
  <text x="352" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  전체 행 수 (각 행에)</text>
  <text x="352" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">SUM(sal) OVER (ORDER BY dt</text>
  <text x="352" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  ROWS UNBOUNDED PRECEDING)</text>
  <text x="352" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  누적 합계 (Running Total)</text>
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프레임으로 이동 집계 가능</text>

  <!-- Category 3: Offset -->
  <rect x="590" y="72" width="240" height="300" fill="#0d0d0d" rx="8" stroke="#7ec8e3"/>
  <text x="710" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">오프셋 함수</text>
  <text x="710" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ORDER BY 필수</text>

  <rect x="606" y="126" width="208" height="172" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="622" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">LAG(col, 1)</text>
  <text x="622" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  이전 행 값</text>
  <text x="622" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">LEAD(col, 1)</text>
  <text x="622" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  다음 행 값</text>
  <text x="622" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">FIRST_VALUE(col)</text>
  <text x="622" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  프레임 첫 행 값</text>
  <text x="622" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">LAST_VALUE(col)</text>
  <text x="622" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  프레임 마지막 행 값</text>
  <text x="622" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">NTH_VALUE(col, N)</text>
  <text x="622" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">  N번째 행 값</text>
  <text x="710" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프레임 적용 (LAST_VALUE 주의)</text>
</svg>
