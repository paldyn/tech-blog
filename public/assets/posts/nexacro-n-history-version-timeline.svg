  <rect x="260" y="100" width="160" height="270" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <rect x="260" y="100" width="160" height="36" rx="8" fill="#0d200d"/>
  <rect x="260" y="120" width="160" height="16" fill="#0d200d"/>
