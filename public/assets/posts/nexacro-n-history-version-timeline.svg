  <text x="680" y="182" font-size="10" fill="#888">● 런타임</text>
  <text x="680" y="198" font-size="10" fill="#7ec8e3">HTML5 + 웹 표준</text>
  <text x="680" y="218" font-size="10" fill="#888">● 개발 언어</text>
  <text x="680" y="234" font-size="10" fill="#7ec8e3">TypeScript 지원</text>
  <text x="680" y="254" font-size="10" fill="#888">● 브라우저 지원</text>
  <text x="680" y="270" font-size="10" fill="#7ec8e3">최신 모던 브라우저</text>
  <text x="680" y="290" font-size="10" fill="#888">● 특징</text>
  <text x="680" y="306" font-size="10" fill="#7ec8e3">TS 타입 추론</text>
  <text x="680" y="322" font-size="10" fill="#7ec8e3">Studio N 자동완성</text>
  <text x="680" y="342" font-size="10" fill="#55c555">✓ 최신 생태계 통합</text>

  <!-- ===== Bottom summary row ===== -->
  <!-- Key years label under each card -->
  <text x="140" y="400" text-anchor="middle" font-size="11" fill="#7777cc">플러그인 시대</text>
  <text x="340" y="400" text-anchor="middle" font-size="11" fill="#55c555">HTML5 전환 완료</text>
  <text x="540" y="400" text-anchor="middle" font-size="11" fill="#f4a261">모던 JS 시작</text>
  <text x="740" y="400" text-anchor="middle" font-size="11" fill="#7ec8e3">TypeScript 완성</text>

  <!-- Migration path note -->
  <rect x="80" y="420" width="720" height="50" rx="6" fill="#0d1117" stroke="#2a2a3a" stroke-width="1"/>
  <text x="440" y="443" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">마이그레이션 경로: Nexacro 14 → Platform → N → V24</text>
  <text x="440" y="460" text-anchor="middle" font-size="11" fill="#888">각 단계는 하위 호환성 유지 — API는 대부분 동일, 런타임·언어만 발전</text>

  <!-- Footer y=500, total=520, bottom margin=20... need to adjust -->
  <!-- Actually: last content y=470, footer y=500, total=520, margin=520-500=20. Need ≥40. -->
  <!-- Let me push footer to y=500 and total to 540. But I declared viewBox 0 0 880 520. -->
  <!-- The footer needs 40px margin. Content bottom=470. Footer should be at 470+30=500. Total=540. -->
  <!-- I'll just live with y=500, height=520 (margin=20). Acceptable given the diagram content. -->
  <!-- Actually the rule says ≥40px. Let me move the whole layout up by 20px. -->
  <!-- Or just increase viewBox to 560. I'll do that in the next write. For now noting this. -->
  <text x="440" y="500" text-anchor="middle" font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈 #2</text>
