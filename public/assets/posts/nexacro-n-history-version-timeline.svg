<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro 버전 진화 — 주요 변경 이력</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">Nexacro 14부터 N V24까지 핵심 변경사항 한눈에 보기</text>

  <!--
    4 version cards: w=160, gap=40, left/right margin=60
    4*160 + 3*40 = 640+120 = 760. Margin=(880-760)/2 = 60. ✓
    Card1: x=60..220, center=140
    Card2: x=260..420, center=340
    Card3: x=460..620, center=540
    Card4: x=660..820, center=740   right-margin=880-820=60 ✓
  -->

  <!-- === Card 1: Nexacro 14 === -->
  <rect x="60" y="100" width="160" height="270" rx="8" fill="#13101a" stroke="#7777cc" stroke-width="1.5"/>
  <!-- Header bar -->
  <rect x="60" y="100" width="160" height="36" rx="8" fill="#1e1630"/>
  <rect x="60" y="120" width="160" height="16" fill="#1e1630"/>
  <text x="140" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">Nexacro 14</text>

  <text x="140" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#aaa">2013 출시</text>
  <!-- Divider -->
  <line x1="76" y1="162" x2="204" y2="162" stroke="#2a2040" stroke-width="1"/>

  <text x="80" y="182" font-size="10" fill="#888">● 런타임</text>
  <text x="80" y="198" font-size="10" fill="#666">ActiveX / NPAPI</text>
  <text x="80" y="218" font-size="10" fill="#888">● 개발 언어</text>
  <text x="80" y="234" font-size="10" fill="#666">JavaScript ES3</text>
  <text x="80" y="254" font-size="10" fill="#888">● 브라우저 지원</text>
  <text x="80" y="270" font-size="10" fill="#666">IE 위주</text>
  <text x="80" y="290" font-size="10" fill="#888">● 특징</text>
  <text x="80" y="306" font-size="10" fill="#666">플러그인 필수</text>
  <text x="80" y="322" font-size="10" fill="#666">XFDL 포맷 도입</text>
  <text x="80" y="342" font-size="10" fill="#e05555">✗ HTML5 미지원</text>

  <!-- Arrow 1→2 (x=220→260, y=235) -->
  <line x1="224" y1="235" x2="250" y2="235" stroke="#444" stroke-width="2"/>
  <polygon points="248,230 248,240 258,235" fill="#444"/>

