  <text x="280" y="198" font-size="10" fill="#666">HTML5 네이티브</text>
  <text x="280" y="218" font-size="10" fill="#888">● 개발 언어</text>
  <text x="280" y="234" font-size="10" fill="#666">JavaScript ES5</text>
  <text x="280" y="254" font-size="10" fill="#888">● 브라우저 지원</text>
  <text x="280" y="270" font-size="10" fill="#666">IE11 + 모던</text>
  <text x="280" y="290" font-size="10" fill="#888">● 특징</text>
  <text x="280" y="306" font-size="10" fill="#666">플러그인 완전 제거</text>
  <text x="280" y="322" font-size="10" fill="#666">크로스브라우저 지원</text>
  <text x="280" y="342" font-size="10" fill="#55c555">✓ HTML5 완전 전환</text>

  <!-- Arrow 2→3 -->
  <line x1="424" y1="235" x2="450" y2="235" stroke="#444" stroke-width="2"/>
  <polygon points="448,230 448,240 458,235" fill="#444"/>

