  <rect x="460" y="100" width="160" height="270" rx="8" fill="#1a150a" stroke="#f4a261" stroke-width="1.5"/>
  <rect x="460" y="100" width="160" height="36" rx="8" fill="#241a08"/>
  <rect x="460" y="120" width="160" height="16" fill="#241a08"/>
  <text x="540" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#f4a261">Nexacro N</text>

  <text x="540" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#aaa">2022 출시</text>
  <line x1="476" y1="162" x2="604" y2="162" stroke="#281f08" stroke-width="1"/>

  <text x="480" y="182" font-size="10" fill="#888">● 런타임</text>
  <text x="480" y="198" font-size="10" fill="#666">HTML5 최적화</text>
  <text x="480" y="218" font-size="10" fill="#888">● 개발 언어</text>
  <text x="480" y="234" font-size="10" fill="#bbb">ES6+ 지원 시작</text>
  <text x="480" y="254" font-size="10" fill="#888">● 브라우저 지원</text>
  <text x="480" y="270" font-size="10" fill="#666">모던 브라우저</text>
  <text x="480" y="290" font-size="10" fill="#888">● 특징</text>
