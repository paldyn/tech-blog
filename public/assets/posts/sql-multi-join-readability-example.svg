<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">나쁜 예 vs 좋은 예 — 동일한 쿼리</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">가독성이 유지보수성을 결정한다</text>

  <!-- Bad example -->
  <rect x="60" y="90" width="370" height="320" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">나쁜 예</text>
  <rect x="72" y="124" width="346" height="276" rx="6" fill="#070b14" stroke="#3a1e1e"/>
  <text x="88" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">select id,name,amount,title,qty</text>
  <text x="88" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">from orders join users on</text>
  <text x="88" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">users.id=orders.user_id join</text>
  <text x="88" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">order_items on order_items</text>
  <text x="88" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">.order_id=orders.id join</text>
  <text x="88" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">products on products.id=</text>
  <text x="88" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">order_items.product_id where</text>
  <text x="88" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">orders.status='paid' and</text>
  <text x="88" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">users.country='KR'</text>
  <text x="245" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">접두사 없음, 한 줄 나열, 들여쓰기 없음</text>
  <text x="245" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">어떤 조인인지 한 눈에 파악 불가</text>

  <!-- Good example -->
  <rect x="450" y="90" width="370" height="320" rx="8" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">좋은 예</text>
  <rect x="462" y="124" width="346" height="276" rx="6" fill="#070b14" stroke="#1e3a1e"/>
  <text x="478" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="478" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    o.id,  u.name,</text>
  <text x="478" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    o.amount, p.title, oi.qty</text>
  <text x="478" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">FROM orders o</text>
  <text x="478" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    JOIN users u</text>
  <text x="478" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">        ON u.id = o.user_id</text>
  <text x="478" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    JOIN order_items oi</text>
  <text x="478" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">        ON oi.order_id = o.id</text>
  <text x="478" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    JOIN products p</text>
  <text x="478" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">        ON p.id = oi.product_id</text>
  <text x="478" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">WHERE o.status = </text>
  <text x="621" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">'paid'</text>
  <text x="478" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">  AND u.country = </text>
  <text x="627" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">'KR'</text>
  <text x="635" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">접두사 명시, JOIN별 줄 구분, ON 들여쓰기</text>
  <text x="635" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구조가 한 눈에 파악 가능</text>

  <!-- Footer -->
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
