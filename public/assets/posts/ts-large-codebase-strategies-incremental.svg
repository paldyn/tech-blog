<svg xmlns="http://www.w3.org/2000/svg" width="880" height="312" viewBox="0 0 880 312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="312" rx="12" fill="#0a0a0a"/>
  <text x="60" y="44" font-size="22" font-weight="700" fill="#e8e8e8">composite + incremental 설정</text>
  <text x="60" y="70" font-size="14" fill="#7ec8e3">.tsbuildinfo 에 이전 결과를 캐시해 변경분만 다시 검사</text>

  <rect x="60" y="92" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="120" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">// tsconfig.json</text>
  <text x="76" y="140" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">{</text>
  <text x="76" y="160" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">"compilerOptions"</tspan>: {</text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    <tspan fill="#ce9178">"composite"</tspan>: <tspan fill="#7ec8e3" font-weight="600">true</tspan>,</text>
  <text x="76" y="200" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    <tspan fill="#ce9178">"incremental"</tspan>: <tspan fill="#7ec8e3" font-weight="600">true</tspan>,</text>
  <text x="76" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    <tspan fill="#ce9178">"skipLibCheck"</tspan>: <tspan fill="#7ec8e3" font-weight="600">true</tspan></text>
  <text x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="76" y="260" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">}  <tspan fill="#9aa4b8">// tsc --build 로 빌드</tspan></text>
</svg>
