<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrL" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">typescript-eslint: 타입 정보를 읽는 린터</text>

  <rect x="50" y="100" width="170" height="80" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="135" y="134" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">.ts 소스</text>
  <text x="135" y="156" font-size="11" fill="#888" text-anchor="middle">코드</text>

  <rect x="270" y="100" width="180" height="80" rx="8" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="360" y="128" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">parser</text>
  <text x="360" y="150" font-size="11" fill="#888" text-anchor="middle">AST + 타입 정보</text>
  <text x="360" y="168" font-size="11" fill="#888" text-anchor="middle">(프로그램 연결)</text>

  <rect x="500" y="100" width="160" height="80" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="134" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">규칙 적용</text>
  <text x="580" y="156" font-size="11" fill="#888" text-anchor="middle">rules</text>

  <rect x="710" y="100" width="120" height="80" rx="8" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="134" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">경고·자동수정</text>
  <text x="770" y="156" font-size="11" fill="#888" text-anchor="middle">report</text>

  <line x1="220" y1="140" x2="270" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrL)"/>
  <line x1="450" y1="140" x2="500" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrL)"/>
  <line x1="660" y1="140" x2="710" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrL)"/>

  <text x="60" y="240" font-size="13" fill="#9aa4b8">parser가 타입 정보를 함께 제공해야 "floating promise" 같은 타입 인식 규칙이 동작한다.</text>
  <text x="60" y="266" font-size="13" fill="#9aa4b8">tsc는 타입 오류를, eslint는 스타일·관용·잠재 버그를 잡는다 — 역할이 다르다.</text>
</svg>
