<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SCP vs rsync 완전 비교</text>

  <!-- Headers -->
  <rect x="220" y="60" width="260" height="40" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="350" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">SCP</text>
  <rect x="490" y="60" width="260" height="40" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="620" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">rsync</text>

  <!-- Row label col -->
  <!-- Row 1: 전송 방식 -->
  <rect x="60" y="108" width="152" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="136" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">전송 방식</text>
  <text x="136" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">algorithm</text>
  <rect x="220" y="108" width="260" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="350" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">전체 파일 복사</text>
  <text x="350" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">항상 처음부터 전송</text>
  <rect x="490" y="108" width="260" height="44" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="620" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">델타 전송</text>
  <text x="620" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">변경 블록만 전송</text>

  <!-- Row 2: 재개 -->
  <rect x="60" y="160" width="152" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="136" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">전송 재개</text>
  <text x="136" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">resume</text>
  <rect x="220" y="160" width="260" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="350" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">불가</text>
  <text x="350" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">중단 시 처음부터</text>
  <rect x="490" y="160" width="260" height="44" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="620" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">가능 (--partial)</text>
  <text x="620" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">중단 지점 이어받기</text>

  <!-- Row 3: 대용량 재전송 -->
  <rect x="60" y="212" width="152" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="136" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">수정 파일</text>
  <text x="136" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">재전송 시</text>
  <rect x="220" y="212" width="260" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="350" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">전체 재전송</text>
  <text x="350" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1바이트 변경도 전체</text>
  <rect x="490" y="212" width="260" height="44" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="620" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">변경 블록만</text>
  <text x="620" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대용량 증분 백업 최적</text>

  <!-- Row 4: 속도(소량) -->
  <rect x="60" y="264" width="152" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="136" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">소파일 속도</text>
  <text x="136" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">small files</text>
  <rect x="220" y="264" width="260" height="44" rx="4" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="350" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">빠름</text>
  <text x="350" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">협상 오버헤드 없음</text>
  <rect x="490" y="264" width="260" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="620" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">약간 느림</text>
  <text x="620" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">체크섬 협상 오버헤드</text>

  <!-- Row 5: 디렉터리 삭제 동기화 -->
  <rect x="60" y="316" width="152" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="136" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">삭제 동기화</text>
  <text x="136" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">--delete</text>
  <rect x="220" y="316" width="260" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="350" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">불가</text>
  <text x="350" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">미러링 기능 없음</text>
  <rect x="490" y="316" width="260" height="44" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="620" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">--delete 옵션</text>
  <text x="620" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">완전 미러링 가능</text>

  <!-- Row 6: 복잡도 -->
  <rect x="60" y="368" width="152" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="136" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">사용 복잡도</text>
  <rect x="220" y="368" width="260" height="44" rx="4" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="350" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">낮음 — 한 줄로 끝</text>
  <text x="350" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스크립트 삽입 간단</text>
  <rect x="490" y="368" width="260" height="44" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="620" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">중간 — 옵션 이해 필요</text>
  <text x="620" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">--delete 실수 주의</text>

  <!-- Code -->
  <rect x="60" y="428" width="760" height="74" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="448" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># SCP: 단건 복사 (단순·빠름)</text>
  <text x="80" y="466" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">scp</text>
  <text x="110" y="466" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> build.tar.gz user@host:~/deploy/</text>
  <text x="80" y="484" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># rsync: 증분 백업 (효율·안전)</text>
  <text x="80" y="502" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">rsync</text>
  <text x="116" y="502" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -avz --delete --partial src/ user@host:dst/</text>
</svg>
