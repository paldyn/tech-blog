<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">삽입 정렬 — 구현 및 이진 탐색 최적화</text>

  <!-- Code block left: standard -->
  <rect x="60" y="58" width="370" height="280" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="82" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// 기본 구현</text>
  <text x="76" y="101" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">void</text>
  <text x="116" y="101" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> insertionSort(vector&lt;int&gt;&amp; a) &#123;</text>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">    int</text>
  <text x="116" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> n = a.size();</text>
  <text x="76" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">    for</text>
  <text x="111" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (int i = 1; i &lt; n; i++) &#123;</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">        int</text>
  <text x="130" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> key = a[i], j = i-1;</text>
  <text x="76" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">        while</text>
  <text x="137" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (j &gt;= 0 &amp;&amp; a[j] &gt; key) &#123;</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">            a[j+1] = a[j];</text>
  <text x="76" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">            j--;</text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        &#125;</text>
  <text x="76" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        a[j+1] = key;</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">    &#125;</text>
  <text x="76" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">&#125;</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// 비교·이동 모두 O(N²)</text>

  <!-- Code block right: binary search version -->
  <rect x="450" y="58" width="370" height="280" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="82" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// 이진 탐색 최적화</text>
  <text x="466" y="101" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">void</text>
  <text x="506" y="101" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> binaryInsertionSort(vector&lt;int&gt;&amp; a) &#123;</text>
  <text x="466" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">    int</text>
  <text x="506" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> n = a.size();</text>
  <text x="466" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">    for</text>
  <text x="501" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (int i = 1; i &lt; n; i++) &#123;</text>
  <text x="466" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">        int</text>
  <text x="520" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> key = a[i];</text>
  <text x="466" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">        // 이진 탐색으로 삽입 위치</text>
  <text x="466" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">        int</text>
  <text x="520" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> pos = lower_bound(</text>
  <text x="466" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">            a.begin(), a.begin()+i, key) - a.begin();</text>
  <text x="466" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">        // 이동은 여전히 O(N)</text>
  <text x="466" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        a.insert(a.begin()+pos, key);</text>
  <text x="466" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">        a.erase(a.begin()+i+1);</text>
  <text x="466" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">    &#125;</text>
  <text x="466" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">&#125;</text>
  <text x="466" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// 비교 O(N log N), 이동 O(N²)</text>
</svg>
