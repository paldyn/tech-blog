<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">실전 시나리오 — 웹 서버 배포 소유권</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">배포 사용자 → 웹 서버 프로세스 그룹 권한 분리</text>

  <!-- Left: Before -->
  <rect x="60" y="84" width="340" height="200" rx="8" fill="#0e1018" stroke="#1e2433"/>
  <rect x="60" y="84" width="340" height="34" rx="8" fill="#2a1010"/>
  <text x="230" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">잘못된 구성</text>

  <text x="80" y="136" font-size="13" fill="#888">파일 소유자</text>
  <text x="300" y="136" text-anchor="end" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">root:root (777)</text>

  <text x="80" y="160" font-size="13" fill="#888">웹 서버 프로세스</text>
  <text x="300" y="160" text-anchor="end" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">www-data</text>

  <text x="80" y="188" font-size="12" fill="#e05555">✗ 모든 사용자 쓰기 가능</text>
  <text x="80" y="208" font-size="12" fill="#e05555">✗ 악성코드 업로드 위험</text>
  <text x="80" y="228" font-size="12" fill="#e05555">✗ 권한 분리 없음</text>
  <text x="80" y="248" font-size="12" fill="#e05555">✗ 감사·추적 어려움</text>
  <text x="80" y="268" font-size="12" fill="#e05555">✗ 서버 탈취 시 전체 노출</text>

  <!-- Right: After -->
  <rect x="480" y="84" width="340" height="200" rx="8" fill="#0e1018" stroke="#1e2433"/>
  <rect x="480" y="84" width="340" height="34" rx="8" fill="#1a2a1a"/>
  <text x="650" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">올바른 구성</text>

  <text x="500" y="136" font-size="13" fill="#888">파일 소유자</text>
  <text x="806" y="136" text-anchor="end" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">deploy:www-data</text>

  <text x="500" y="160" font-size="13" fill="#888">웹 서버 프로세스</text>
  <text x="806" y="160" text-anchor="end" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">www-data</text>

  <text x="500" y="188" font-size="12" fill="#55c555">✓ 배포 계정만 파일 수정</text>
  <text x="500" y="208" font-size="12" fill="#55c555">✓ 웹 서버는 읽기 전용</text>
  <text x="500" y="228" font-size="12" fill="#55c555">✓ 최소 권한 원칙 준수</text>
  <text x="500" y="248" font-size="12" fill="#55c555">✓ 권한 분리로 피해 최소화</text>
  <text x="500" y="268" font-size="12" fill="#7ec8e3">파일: 644, 디렉터리: 755</text>

  <!-- Command -->
  <rect x="60" y="298" width="760" height="28" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="316" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chown </text>
  <text x="116" y="316" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">-R deploy:www-data /var/www/html &amp;&amp; </text>
  <text x="450" y="316" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chmod </text>
  <text x="490" y="316" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">-R o-w /var/www/html</text>
</svg>
