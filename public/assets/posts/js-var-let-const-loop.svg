<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">var vs let — for 루프 클로저 함정</text>

  <!-- Left: var problem -->
  <rect x="60" y="68" width="360" height="280" rx="10" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#e05555">var — 클로저 함정</text>

  <rect x="80" y="108" width="320" height="200" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="136" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> fns = [];</text>
  <text x="96" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">for</text>
  <text x="120" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (</text>
  <text x="136" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">var</text>
  <text x="160" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> i = </text>
  <text x="196" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="204" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; i &lt; </text>
  <text x="244" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">3</text>
  <text x="252" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; i++) {</text>
  <text x="96" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  fns.push(() =&gt; i);</text>
  <text x="96" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="96" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 루프 끝나면 i = 3</text>
  <text x="96" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 모든 함수가 같은 i 참조!</text>
  <text x="96" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fns[</text>
  <text x="128" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="136" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">]();</text>
  <text x="176" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve"> // 3 (예상: 0)</text>
  <text x="96" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fns[</text>
  <text x="128" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="136" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">]();</text>
  <text x="176" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve"> // 3 (예상: 1)</text>
  <text x="96" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fns[</text>
  <text x="128" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="136" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">]();</text>
  <text x="176" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve"> // 3 (예상: 2)</text>

  <text x="240" y="364" text-anchor="middle" font-size="12" fill="#e05555">var i는 함수 스코프 → 루프마다 공유</text>

  <!-- Arrow -->
  <polygon points="422,188 444,176 444,184 456,184 456,192 444,192 444,200" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="440" y="216" text-anchor="middle" font-size="11" fill="#7777cc">let</text>
  <text x="440" y="230" text-anchor="middle" font-size="10" fill="#555">으로</text>

  <!-- Right: let fix -->
  <rect x="460" y="68" width="360" height="280" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">let — 반복마다 새로운 스코프</text>

  <rect x="480" y="108" width="320" height="200" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="536" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> fns = [];</text>
  <text x="496" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">for</text>
  <text x="520" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (</text>
  <text x="536" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">let</text>
  <text x="560" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> i = </text>
  <text x="596" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="604" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; i &lt; </text>
  <text x="644" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">3</text>
  <text x="652" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; i++) {</text>
  <text x="496" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  fns.push(() =&gt; i);</text>
  <text x="496" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="496" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 반복마다 독립적인 i 생성!</text>
  <text x="496" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 각 함수가 자기만의 i를 캡처</text>
  <text x="496" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fns[</text>
  <text x="528" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="536" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">]();</text>
  <text x="576" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve"> // 0 ✓</text>
  <text x="496" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fns[</text>
  <text x="528" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="536" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">]();</text>
  <text x="576" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve"> // 1 ✓</text>
  <text x="496" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fns[</text>
  <text x="528" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="536" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">]();</text>
  <text x="576" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve"> // 2 ✓</text>

  <text x="640" y="364" text-anchor="middle" font-size="12" fill="#55c555">let i는 블록 스코프 → 반복마다 새 바인딩</text>

  <!-- Footer -->
  <text x="440" y="402" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #6</text>
</svg>
