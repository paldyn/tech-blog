<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <linearGradient id="hdrTs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    <marker id="arrD" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff8844"/>
    </marker>
    <marker id="arrU" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4488ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="64" rx="12" fill="url(#hdrTs)"/>
  <rect x="0" y="52" width="880" height="12" fill="url(#hdrTs)"/>
  <text x="44" y="38" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">Nexacro N — transaction() 메서드 구조</text>
  <text x="44" y="56" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" fill="#555">인자 분해 · 입출력 Dataset · Callback 패턴</text>

  <!-- ── METHOD SIGNATURE PANEL ── -->
  <rect x="30" y="84" width="820" height="80" rx="8" fill="#0c0c14" stroke="#22224a" stroke-width="1.5"/>
  <text x="56" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#6699ff">this.</text>
  <text x="96" y="107" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="700" fill="#ff9933">transaction</text>
  <text x="222" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#e8e8e8">(</text>
  <text x="240" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#ffcc44">svcid</text>
  <text x="298" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#888">,</text>
  <text x="316" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#88ddff">url</text>
  <text x="346" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#888">,</text>
  <text x="364" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#99ff88">inDatasets</text>
  <text x="472" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#888">,</text>
  <text x="490" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#ff88aa">outDatasets</text>
  <text x="608" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#888">,</text>
  <text x="626" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#cc88ff">args</text>
  <text x="666" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#888">,</text>
  <text x="684" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#ff8844">callbackFn</text>
  <text x="788" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#e8e8e8">)</text>

  <!-- Second line - async flag -->
  <text x="56" y="130" font-family="'Courier New', Courier, monospace" font-size="11" fill="#444">// 선택 인자: async (기본 true), timeout, contentType</text>
  <text x="56" y="152" font-family="'Courier New', Courier, monospace" font-size="11" fill="#333">// return: transaction 객체 (cancelTransaction 등에 활용)</text>

  <!-- ── ARGUMENT BREAKDOWN ── -->
  <!-- svcid -->
  <rect x="30" y="182" width="130" height="70" rx="7" fill="#12120a" stroke="#44440a" stroke-width="1.5"/>
  <text x="95" y="202" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffcc44" text-anchor="middle">svcid</text>
  <text x="95" y="220" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888" text-anchor="middle">서비스 식별자</text>
  <text x="95" y="234" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">"svcSearch"</text>
  <text x="95" y="246" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555" text-anchor="middle">콜백에서 구분</text>

  <!-- url -->
  <rect x="172" y="182" width="130" height="70" rx="7" fill="#0a1218" stroke="#0a3048" stroke-width="1.5"/>
  <text x="237" y="202" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#88ddff" text-anchor="middle">url</text>
  <text x="237" y="220" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888" text-anchor="middle">서비스 URL</text>
  <text x="237" y="234" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#446688" text-anchor="middle">"SVC/search.do"</text>
  <text x="237" y="246" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555" text-anchor="middle">상대·절대 경로</text>

  <!-- inDatasets -->
  <rect x="314" y="182" width="140" height="70" rx="7" fill="#0a180a" stroke="#0a440a" stroke-width="1.5"/>
  <text x="384" y="202" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#99ff88" text-anchor="middle">inDatasets</text>
  <text x="384" y="218" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888" text-anchor="middle">요청 Dataset 매핑</text>
  <text x="384" y="232" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#338833" text-anchor="middle">"input=dsParam"</text>
  <text x="384" y="246" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#226622" text-anchor="middle">서버명=클라이언트명</text>

  <!-- outDatasets -->
  <rect x="466" y="182" width="140" height="70" rx="7" fill="#180a10" stroke="#440a20" stroke-width="1.5"/>
  <text x="536" y="202" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ff88aa" text-anchor="middle">outDatasets</text>
  <text x="536" y="218" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888" text-anchor="middle">응답 Dataset 매핑</text>
  <text x="536" y="232" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#883344" text-anchor="middle">"output=dsResult"</text>
  <text x="536" y="246" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#662233" text-anchor="middle">서버명=클라이언트명</text>

  <!-- args -->
  <rect x="618" y="182" width="110" height="70" rx="7" fill="#120a18" stroke="#2a0a44" stroke-width="1.5"/>
  <text x="673" y="202" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#cc88ff" text-anchor="middle">args</text>
  <text x="673" y="220" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888" text-anchor="middle">추가 파라미터</text>
  <text x="673" y="234" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#664488" text-anchor="middle">"param1=val1"</text>
  <text x="673" y="248" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#553377" text-anchor="middle">URL 쿼리스트링</text>

  <!-- callbackFn -->
  <rect x="740" y="182" width="110" height="70" rx="7" fill="#180a04" stroke="#441804" stroke-width="1.5"/>
  <text x="795" y="202" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ff8844" text-anchor="middle">callbackFn</text>
  <text x="795" y="218" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888" text-anchor="middle">완료 콜백</text>
  <text x="795" y="232" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#664422" text-anchor="middle">"fn_callback"</text>
  <text x="795" y="248" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#553311" text-anchor="middle">문자열 or 함수</text>

  <!-- ── CALLBACK DETAIL ── -->
  <rect x="30" y="274" width="820" height="110" rx="8" fill="#0c0c0c" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="56" y="298" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ff8844">Callback 함수 시그니처</text>

  <text x="56" y="322" font-family="'Courier New', Courier, monospace" font-size="12" fill="#888">function </text>
  <text x="128" y="322" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ff9933">fn_searchCallback</text>
  <text x="310" y="322" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e8e8e8">(</text>
  <text x="322" y="322" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ffcc44">svcid</text>
  <text x="370" y="322" font-family="'Courier New', Courier, monospace" font-size="12" fill="#888">,</text>
  <text x="384" y="322" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ff6666">errorCode</text>
  <text x="472" y="322" font-family="'Courier New', Courier, monospace" font-size="12" fill="#888">,</text>
  <text x="486" y="322" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ff8888">errorMsg</text>
  <text x="564" y="322" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e8e8e8">) {</text>

  <text x="80" y="344" font-family="'Courier New', Courier, monospace" font-size="11" fill="#336633">  if</text>
  <text x="104" y="344" font-family="'Courier New', Courier, monospace" font-size="11" fill="#e8e8e8"> (</text>
  <text x="122" y="344" font-family="'Courier New', Courier, monospace" font-size="11" fill="#ff6666">errorCode</text>
  <text x="206" y="344" font-family="'Courier New', Courier, monospace" font-size="11" fill="#e8e8e8"> == 0) {</text>
  <text x="290" y="344" font-family="'Courier New', Courier, monospace" font-size="11" fill="#555">// 정상: dsResult 자동 바인딩 완료 상태</text>

  <text x="80" y="360" font-family="'Courier New', Courier, monospace" font-size="11" fill="#336633">  } else {</text>
  <text x="172" y="360" font-family="'Courier New', Courier, monospace" font-size="11" fill="#555">// 오류: alert(errorMsg) 또는 로깅 처리</text>

  <text x="56" y="375" font-family="'Courier New', Courier, monospace" font-size="11" fill="#e8e8e8">}</text>

  <!-- ── NOTES ── -->
  <rect x="30" y="404" width="820" height="70" rx="8" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>
  <text x="56" y="426" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#555">주요 동작 원칙</text>
  <text x="56" y="444" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444">• errorCode == 0: 정상 — outDatasets에 지정된 Dataset은 이미 서버 데이터로 교체된 상태</text>
  <text x="56" y="460" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444">• errorCode  &lt; 0: 통신 오류 (네트워크, 타임아웃)    •  errorCode &gt; 0: 서버 비즈니스 오류 (setError로 설정)</text>
  <text x="56" y="475" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444">• async=true(기본): 비동기 처리 — UI 블로킹 없음    •  cancelTransaction(svcid): 진행 중인 요청 취소 가능</text>
</svg>
