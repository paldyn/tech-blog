<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">apiVersion 별 주요 오브젝트</text>

  <!-- Table header -->
  <rect x="60" y="74" width="240" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="180" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">apiVersion</text>
  <rect x="310" y="74" width="510" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="565" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">오브젝트 (kind)</text>

  <!-- Rows -->
  <rect x="60" y="118" width="240" height="36" rx="0" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="180" y="141" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">v1</text>
  <rect x="310" y="118" width="510" height="36" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
  <text x="565" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">Pod, Service, ConfigMap, Secret, PersistentVolume, Namespace</text>

  <rect x="60" y="154" width="240" height="36" rx="0" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="180" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">apps/v1</text>
  <rect x="310" y="154" width="510" height="36" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
  <text x="565" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">Deployment, StatefulSet, DaemonSet, ReplicaSet</text>

  <rect x="60" y="190" width="240" height="36" rx="0" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="180" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">batch/v1</text>
  <rect x="310" y="190" width="510" height="36" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
  <text x="565" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">Job, CronJob</text>

  <rect x="60" y="226" width="240" height="36" rx="0" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="180" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" text-anchor="middle">networking.k8s.io/v1</text>
  <rect x="310" y="226" width="510" height="36" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
  <text x="565" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
