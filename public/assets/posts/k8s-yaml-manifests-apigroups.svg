  <rect x="60" y="262" width="240" height="36" rx="0" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="180" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" text-anchor="middle">rbac.authorization.../v1</text>
  <rect x="310" y="262" width="510" height="36" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
