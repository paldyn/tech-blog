<svg xmlns="http://www.w3.org/2000/svg" width="880" height="350" viewBox="0 0 880 350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="350" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">OOMKilled 진단과 조치</text>
  <text x="50" y="80" font-size="14" fill="#888">확정 → 원인 분리 → 조치</text>

  <rect x="50" y="105" width="380" height="100" rx="10" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="132" xml:space="preserve" font-size="13" font-weight="600" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 확정: Reason 확인</text>
  <text x="66" y="156" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">kubectl describe pod web | \</text>
  <text x="66" y="176" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  grep -i oom</text>
  <text x="66" y="198" xml:space="preserve" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">Last State: Terminated · OOMKilled</text>

  <rect x="470" y="105" width="360" height="100" rx="10" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="486" y="132" xml:space="preserve" font-size="13" font-weight="600" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 실사용량 관찰</text>
  <text x="486" y="156" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">kubectl top pod web \</text>
  <text x="486" y="176" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  --containers</text>
  <text x="486" y="198" xml:space="preserve" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">limit 대비 얼마나 쓰는지 추세 확인</text>

  <rect x="50" y="225" width="380" height="85" rx="10" fill="#16181d" stroke="#55c555" stroke-width="1.3"/>
  <text x="66" y="252" font-size="14" font-weight="600" fill="#55c555">한도가 빡빡하다면</text>
  <text x="66" y="276" font-size="12" fill="#ffffff">limit 상향 — 실사용 + 여유분(headroom)</text>
  <text x="66" y="296" font-size="12" fill="#9aa4b8">JVM 등은 컨테이너 인식 옵션도 함께</text>

  <rect x="470" y="225" width="360" height="85" rx="10" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="486" y="252" font-size="14" font-weight="600" fill="#e05555">계속 증가한다면</text>
  <text x="486" y="276" font-size="12" fill="#ffffff">메모리 누수 — 힙 덤프·프로파일링</text>
  <text x="486" y="296" font-size="12" fill="#9aa4b8">limit만 올리면 더 늦게 또 죽는다</text>

  <text x="50" y="338" font-size="13" fill="#888">한도가 작은 건지 앱이 새는 건지부터 가른다 — 추세가 평평하면 한도, 계속 우상향이면 누수.</text>
</svg>
