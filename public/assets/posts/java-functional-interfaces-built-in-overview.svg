<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">내장 함수형 인터페이스 — java.util.function 패키지</text>

  <!-- Category: Function -->
  <rect x="60" y="66" width="372" height="108" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="246" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Function&lt;T, R&gt;</text>
  <text x="246" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">추상 메서드: R apply(T t)</text>
  <text x="246" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">T를 받아 R로 변환</text>
  <text x="246" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c542" text-anchor="middle">예: String::length, s -&gt; s.trim()</text>
  <text x="246" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">파생: UnaryOperator&lt;T&gt;  (T → T)</text>

  <!-- Category: Consumer -->
  <rect x="448" y="66" width="372" height="108" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="634" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Consumer&lt;T&gt;</text>
  <text x="634" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">추상 메서드: void accept(T t)</text>
  <text x="634" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">T를 받아 소비 (반환 없음)</text>
  <text x="634" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c542" text-anchor="middle">예: System.out::println, list::add</text>
  <text x="634" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">기본 메서드: andThen(Consumer)</text>

  <!-- Category: Supplier -->
  <rect x="60" y="186" width="372" height="108" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="246" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Supplier&lt;T&gt;</text>
  <text x="246" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">추상 메서드: T get()</text>
  <text x="246" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파라미터 없이 T를 생성/반환</text>
  <text x="246" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c542" text-anchor="middle">예: ArrayList::new, () -&gt; UUID.randomUUID()</text>
  <text x="246" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">지연 평가 패턴에 유용</text>

  <!-- Category: Predicate -->
  <rect x="448" y="186" width="372" height="108" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="634" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Predicate&lt;T&gt;</text>
  <text x="634" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">추상 메서드: boolean test(T t)</text>
  <text x="634" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">T를 받아 boolean 반환</text>
  <text x="634" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c542" text-anchor="middle">예: String::isEmpty, n -&gt; n &gt; 0</text>
  <text x="634" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">기본 메서드: and / or / negate</text>

  <!-- Primitive specialization row -->
  <line x1="60" y1="310" x2="820" y2="310" stroke="#222" stroke-width="1"/>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">기본형 특화 인터페이스 (박싱 없이 성능 향상)</text>

  <rect x="60" y="344" width="185" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="152" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">IntFunction&lt;R&gt;</text>
  <text x="152" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">int -&gt; R</text>
  <text x="152" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LongFunction, DoubleFunction도 있음</text>

  <rect x="263" y="344" width="185" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="355" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">ToIntFunction&lt;T&gt;</text>
  <text x="355" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">T -&gt; int</text>
  <text x="355" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ToLong, ToDouble 도 있음</text>

  <rect x="466" y="344" width="185" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="558" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">IntConsumer</text>
  <text x="558" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">int -&gt; void</text>
  <text x="558" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LongConsumer, DoubleConsumer</text>

  <rect x="669" y="344" width="151" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="744" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">IntPredicate</text>
  <text x="744" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">int -&gt; boolean</text>
  <text x="744" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Long, Double 도 있음</text>

  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">java.util.function 패키지에 약 43개의 함수형 인터페이스가 있으며 대부분 기본 4종의 변형</text>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커스텀 함수형 인터페이스는 기본 제공으로 충분하지 않을 때만 작성 (표준 재사용 우선)</text>
</svg>
