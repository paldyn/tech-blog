<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JDK 주요 도구와 바이트코드 실행 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">.java → .class → JVM 실행까지</text>

  <!-- Step 1: .java source -->
  <rect x="60" y="100" width="160" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="140" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">소스 코드</text>
  <text x="140" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">Hello.java</text>
  <text x="140" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">작성 단계</text>

  <!-- arrow 1 -->
  <polygon points="232,140 262,130 262,150" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="220" y1="140" x2="262" y2="140" stroke="#7ec8e3" stroke-width="2"/>
  <text x="242" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">javac</text>

  <!-- Step 2: .class bytecode -->
  <rect x="264" y="100" width="160" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="344" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">바이트코드</text>
  <text x="344" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">Hello.class</text>
  <text x="344" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">플랫폼 독립적</text>

  <!-- arrow 2 -->
  <polygon points="436,140 466,130 466,150" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="424" y1="140" x2="466" y2="140" stroke="#7ec8e3" stroke-width="2"/>
  <text x="446" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">java</text>

  <!-- Step 3: JVM -->
  <rect x="468" y="100" width="160" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="548" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">JVM 실행</text>
  <text x="548" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Class Load + Run</text>
  <text x="548" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">OS에 맞게 번역</text>

  <!-- arrow 3 -->
  <polygon points="640,140 670,130 670,150" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="628" y1="140" x2="670" y2="140" stroke="#7ec8e3" stroke-width="2"/>
  <text x="650" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">JIT</text>

  <!-- Step 4: Native -->
  <rect x="672" y="100" width="148" height="80" rx="8" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="746" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">네이티브 코드</text>
  <text x="746" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">Machine Code</text>
  <text x="746" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">CPU 직접 실행</text>

  <!-- Code block: javac 컴파일 -->
  <rect x="60" y="215" width="368" height="150" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">컴파일 &amp; 실행</text>
  <text x="76" y="263" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 컴파일</text>
  <text x="76" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">$ </text>
  <text x="91" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">javac Hello.java</text>
  <text x="76" y="299" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 실행</text>
  <text x="76" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">$ </text>
  <text x="91" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">java Hello</text>
  <text x="76" y="335" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">Hello, World!</text>
  <text x="76" y="353" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 버전 확인</text>
  <text x="76" y="371" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">$ </text>
  <text x="91" y="371" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">java -version</text>

  <!-- Code block: JDK tools -->
  <rect x="452" y="215" width="368" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="468" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">JDK 주요 도구</text>
  <text x="468" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">javac</text>
  <text x="538" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">   # 컴파일러</text>
  <text x="468" y="279" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">java</text>
  <text x="524" y="279" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">    # 런처</text>
  <text x="468" y="297" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">javadoc</text>
  <text x="554" y="297" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> # API 문서 생성</text>
  <text x="468" y="315" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">jar</text>
  <text x="503" y="315" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">     # JAR 패키징</text>
  <text x="468" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">jshell</text>
  <text x="524" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  # REPL (JDK 9+)</text>
  <text x="468" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">jlink</text>
  <text x="519" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">   # 커스텀 JRE 생성</text>
  <text x="468" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">jcmd</text>
  <text x="510" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">    # JVM 진단</text>
  <text x="468" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">jmap / jstack</text>
  <text x="565" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 힙·스레드 덤프</text>
  <text x="468" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">jfr</text>
  <text x="498" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">     # Flight Recorder</text>
  <text x="468" y="423" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">keytool</text>
  <text x="537" y="423" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> # 키·인증서 관리</text>

  <!-- JDK 11+ note -->
  <rect x="60" y="390" width="368" height="70" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="244" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">JDK 11+ 변화: JRE 별도 배포 종료</text>
  <text x="244" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">JDK 하나만 설치하면 개발·운영 모두 가능</text>
  <text x="244" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">jlink로 필요한 모듈만 묶어 경량 런타임 생성 가능</text>

  <!-- Footer -->
  <text x="440" y="525" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">javac: 소스 → 바이트코드 | java: 바이트코드 → JVM 실행 | JIT: 핫 메서드를 네이티브 코드로 최적화</text>
</svg>
