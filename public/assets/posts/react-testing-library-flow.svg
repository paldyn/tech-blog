<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrYellow" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c800"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">테스트의 네 단계</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">렌더 → 질의 → 상호작용 → 단언</text>

  <!-- Step 1 -->
  <rect x="70" y="100" width="320" height="70" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="230" y="128" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">1. render(&lt;Counter /&gt;)</text>
  <text x="230" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">jsdom 가상 DOM에 컴포넌트 마운트</text>

  <!-- Step 2 -->
  <rect x="490" y="100" width="320" height="70" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="650" y="128" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8c800">2. screen.getByRole(...)</text>
  <text x="650" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자가 찾는 방식으로 요소 질의</text>

  <!-- Step 3 -->
  <rect x="490" y="240" width="320" height="70" rx="8" fill="#12121f" stroke="#7777cc" stroke-width="2"/>
  <text x="650" y="268" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7777cc">3. await user.click(button)</text>
  <text x="650" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실제 사용자 상호작용 시뮬레이션</text>

  <!-- Step 4 -->
  <rect x="70" y="240" width="320" height="70" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="230" y="268" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">4. expect(...).toBeVisible()</text>
  <text x="230" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">화면에 보이는 결과를 단언</text>

  <!-- Arrows -->
  <line x1="390" y1="135" x2="490" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="650" y1="170" x2="650" y2="240" stroke="#e8c800" stroke-width="2" marker-end="url(#arrYellow)"/>
  <line x1="490" y1="275" x2="390" y2="275" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>

  <text x="440" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">네 단계 모두에서 내부 구현(state, props)을 단 한 번도 들여다보지 않는다</text>
</svg>
