<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">OverlayFS — Docker 이미지 레이어 구조</text>

  <!-- Layer stack (top to bottom = upper to lower) -->

  <!-- Container Layer (writable) -->
  <rect x="200" y="68" width="480" height="62" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Container Layer (upperdir) — 쓰기 가능</text>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수정된 파일 + 새로 생성된 파일 + whiteout 파일</text>
  <text x="720" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">CoW 시 여기에 복사</text>

  <!-- Arrow down -->
  <line x1="440" y1="130" x2="440" y2="152" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>
  <text x="455" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">merged view</text>

  <!-- Image Layer 4 -->
  <rect x="200" y="154" width="480" height="52" rx="6" fill="#1a2a3e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Image Layer 4 (lowerdir[0])</text>
  <text x="440" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">COPY . /app, RUN pip install ... | 앱 코드 레이어</text>

  <!-- Image Layer 3 -->
  <rect x="200" y="216" width="480" height="52" rx="6" fill="#162030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Image Layer 3 (lowerdir[1])</text>
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RUN apt install nginx | 패키지 설치 레이어</text>

  <!-- Image Layer 2 -->
  <rect x="200" y="278" width="480" height="52" rx="6" fill="#12182a" stroke="#5577aa" stroke-width="1"/>
  <text x="440" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#5577aa">Image Layer 2 (lowerdir[2])</text>
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ENV + RUN ... | 환경 설정 레이어</text>

  <!-- Image Layer 1 / base -->
  <rect x="200" y="340" width="480" height="52" rx="6" fill="#0d1220" stroke="#446688" stroke-width="1"/>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#446688">Image Layer 1 / Base (lowerdir[3])</text>
  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">FROM ubuntu:22.04 | 베이스 이미지</text>

  <!-- Mount command -->
  <rect x="60" y="412" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># OverlayFS 수동 마운트</text>
  <text x="76" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">mount</text>
  <text x="122" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -t overlay overlay \</text>
  <text x="76" y="474" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  -o lowerdir=/layer4:/layer3:/layer2:/layer1,\</text>
  <text x="76" y="494" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">     upperdir=/container/upper,workdir=/container/work \</text>
  <text x="76" y="510" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  /container/merged</text>

  <!-- Read path annotation -->
  <text x="690" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">읽기:</text>
  <text x="690" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">upper 먼저 확인</text>
  <text x="690" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">없으면 lower 순서대로</text>
</svg>
