<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">id 명령 출력 분석</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">UID · GID · 보조 그룹 한눈에 보기</text>

  <!-- id output -->
  <rect x="60" y="88" width="760" height="56" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ id alice</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">uid=1001(alice)  gid=1001(alice)  groups=1001(alice),27(sudo),999(docker)</text>

  <!-- Breakdown arrows -->
  <!-- uid -->
  <line x1="130" y1="150" x2="130" y2="172" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="172" width="160" height="56" fill="#0d1929" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="140" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">UID</text>
  <text x="140" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">실제 사용자 ID</text>
  <text x="140" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" text-anchor="middle">1001</text>

  <!-- gid -->
  <line x1="320" y1="150" x2="320" y2="172" stroke="#55c555" stroke-width="1.5"/>
  <rect x="240" y="172" width="160" height="56" fill="#0d200d" rx="6" stroke="#2d4a1e" stroke-width="1"/>
  <text x="320" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">기본 GID</text>
  <text x="320" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">기본 그룹 ID</text>
  <text x="320" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" text-anchor="middle">1001(alice)</text>

  <!-- groups -->
  <line x1="560" y1="150" x2="560" y2="172" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="450" y="172" width="360" height="56" fill="#1a1a2e" rx="6" stroke="#2d2d5f" stroke-width="1"/>
  <text x="630" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">보조 그룹 목록</text>
  <text x="630" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">alice, sudo, docker</text>
  <text x="630" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이 그룹 파일에 접근 가능</text>

  <!-- id options -->
  <rect x="60" y="258" width="760" height="160" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">id 주요 옵션</text>

  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">$ id -u</text><text x="196" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">         # UID만 출력 (스크립트용)</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">$ id -g</text><text x="196" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">         # 기본 GID만</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">$ id -G</text><text x="196" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">         # 모든 GID 숫자만</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">$ id -n -u</text><text x="196" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">      # UID 대신 이름 출력</text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># root 확인 패턴</text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">[ "$(id -u)" -eq 0 ] &amp;&amp; echo "root" || echo "일반 사용자"</text>

  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">sudo 실행 중에는 euid=0 (유효 UID가 0) 으로 바뀜</text>
</svg>
