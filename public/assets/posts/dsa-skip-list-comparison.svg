<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">자료구조 비교 — 정렬된 집합 구현</text>

  <!-- header -->
  <text x="76"  y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">자료구조</text>
  <text x="240" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">탐색</text>
  <text x="340" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">삽입</text>
  <text x="440" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">삭제</text>
  <text x="550" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">공간</text>
  <text x="660" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">특이사항</text>
  <line x1="60" y1="90" x2="820" y2="90" stroke="#2a3a5e" stroke-width="1"/>

  <!-- sorted array -->
  <rect x="60" y="100" width="760" height="46" rx="6" fill="#0d1020" stroke="none"/>
  <text x="76"  y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">정렬 배열</text>
  <text x="240" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(log n)</text>
  <text x="340" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">O(n)</text>
  <text x="440" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">O(n)</text>
  <text x="550" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(n)</text>
  <text x="660" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">삽입/삭제에 shift 필요</text>

  <!-- linked list -->
  <rect x="60" y="152" width="760" height="46" rx="6" fill="none"/>
  <text x="76"  y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">정렬 연결 리스트</text>
  <text x="240" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">O(n)</text>
  <text x="340" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)*</text>
  <text x="440" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)*</text>
  <text x="550" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(n)</text>
  <text x="660" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">*위치 탐색은 O(n)</text>

  <!-- BST (balanced) -->
  <rect x="60" y="204" width="760" height="46" rx="6" fill="#0d1020" stroke="none"/>
  <text x="76"  y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">균형 BST (AVL/RB)</text>
  <text x="240" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(log n)</text>
  <text x="340" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(log n)</text>
  <text x="440" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(log n)</text>
  <text x="550" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(n)</text>
  <text x="660" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구현 복잡, 회전 필요</text>

  <!-- Skip List -->
  <rect x="60" y="256" width="760" height="46" rx="6" fill="#0d1f0d" stroke="#1a5a1a" stroke-width="1"/>
  <text x="76"  y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">스킵 리스트 ★</text>
  <text x="240" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(log n) avg</text>
  <text x="340" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(log n) avg</text>
  <text x="440" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(log n) avg</text>
  <text x="550" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">O(n log n)</text>
  <text x="660" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">간단 구현, 병렬 친화</text>

  <!-- Hash Table -->
  <rect x="60" y="308" width="760" height="46" rx="6" fill="none"/>
  <text x="76"  y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">해시 테이블</text>
  <text x="240" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1) avg</text>
  <text x="340" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1) avg</text>
  <text x="440" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1) avg</text>
  <text x="550" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(n)</text>
  <text x="660" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">순서 보장 없음</text>

  <!-- note -->
  <line x1="60" y1="362" x2="820" y2="362" stroke="#2a2a2a" stroke-width="1"/>
  <text x="76" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">스킵 리스트는 Redis의 Sorted Set, LevelDB의 메모리 컴포넌트에 사용됩니다.</text>
  <text x="76" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">AVL/Red-Black Tree보다 구현이 단순하고 락-프리(lock-free) 구현이 용이해 동시성 환경에 적합합니다.</text>
</svg>
