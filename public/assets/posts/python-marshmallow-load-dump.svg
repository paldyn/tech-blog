<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">load와 dump: 두 방향의 변환</text>

  <defs>
    <marker id="mmar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="mmar2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect x="60" y="110" width="250" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="185" y="148" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">바깥 데이터</text>
  <text x="185" y="174" font-size="12" fill="#9aa4b8" text-anchor="middle">dict · JSON (직렬화 형태)</text>

  <rect x="570" y="110" width="250" height="90" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="695" y="148" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">파이썬 객체</text>
  <text x="695" y="174" font-size="12" fill="#9aa4b8" text-anchor="middle">검증된 값 · 모델 인스턴스</text>

  <line x1="312" y1="138" x2="566" y2="138" stroke="#55c555" stroke-width="2" marker-end="url(#mmar)"/>
  <text x="440" y="124" font-size="13" fill="#55c555" text-anchor="middle">load() — 역직렬화 + 검증</text>

  <line x1="568" y1="178" x2="314" y2="178" stroke="#7777cc" stroke-width="2" marker-end="url(#mmar2)"/>
  <text x="440" y="196" font-size="13" fill="#7ec8e3" text-anchor="middle">dump() — 직렬화 (출력용)</text>

  <rect x="60" y="226" width="760" height="46" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="254" font-size="13" fill="#55c555" text-anchor="middle">load는 받을 때 검증하고, dump는 내보낼 때 형태를 맞춘다</text>
</svg>
