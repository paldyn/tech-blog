<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">팀 정렬: Run 탐지 + 병합 정렬</text>

  <!-- Phase 1: Input -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">1단계: 배열에서 Run(오름/내림 연속 구간) 탐지</text>

  <!-- Array with run annotations -->
  <!-- Run 1: 3,7,12,18 (ascending) -->
  <rect x="60" y="90" width="192" height="44" rx="4" fill="#1a2030" stroke="#7ec8e3" stroke-width="2"/>
  <text x="66" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Run 1 (오름)</text>
  <text x="66" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3"> 3   7  12  18</text>

  <!-- Run 2: 15,9,4 (descending → reversed) -->
  <rect x="256" y="90" width="144" height="44" rx="4" fill="#1f1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="262" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Run 2 (내림→뒤집기)</text>
  <text x="262" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">15   9   4</text>

  <!-- Run 3: 20,22,30 (ascending) -->
  <rect x="404" y="90" width="144" height="44" rx="4" fill="#1a2030" stroke="#7ec8e3" stroke-width="2"/>
  <text x="410" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Run 3 (오름)</text>
  <text x="410" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">20  22  30</text>

  <!-- Run 4: 1,6,11,14 (ascending) -->
  <rect x="552" y="90" width="192" height="44" rx="4" fill="#1a2030" stroke="#7ec8e3" stroke-width="2"/>
  <text x="558" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Run 4 (오름)</text>
  <text x="558" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3"> 1   6  11  14</text>

  <!-- Note: minRun -->
  <text x="760" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">minRun 32~64</text>
  <text x="760" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">짧으면 삽입 정렬로</text>
  <text x="760" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Run 연장</text>

  <!-- Phase 2: After reversing descending runs -->
  <text x="60" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">2단계: 내림 Run 뒤집기 + Run 스택에 push</text>

  <rect x="60" y="178" width="192" height="44" rx="4" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="156" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">3  7  12  18</text>

  <rect x="256" y="178" width="144" height="44" rx="4" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="328" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">4   9  15</text>
  <text x="328" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">(뒤집힘)</text>

  <rect x="404" y="178" width="144" height="44" rx="4" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="476" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">20  22  30</text>

  <rect x="552" y="178" width="192" height="44" rx="4" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="648" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">1   6  11  14</text>

  <!-- Phase 3: Merge passes -->
  <line x1="440" y1="234" x2="440" y2="262" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="452" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">3단계: Run 스택 조건 기반 병합</text>

  <!-- Merge pass 1 -->
  <text x="60" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">병합 1회차: Run1 + Run2, Run3 + Run4</text>
  <rect x="60" y="300" width="340" height="44" rx="4" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">3  4  7  9  12  15  18</text>

  <rect x="410" y="300" width="340" height="44" rx="4" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">1  6  11  14  20  22  30</text>

  <line x1="440" y1="356" x2="440" y2="382" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="452" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">병합 2회차: 최종 병합</text>

  <rect x="60" y="392" width="760" height="48" rx="6" fill="#1a2a1f" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">1  3  4  6  7  9  11  12  14  15  18  20  22  30</text>

  <!-- Bottom info -->
  <rect x="60" y="456" width="760" height="44" rx="6" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">팀 정렬 핵심</text>
  <text x="440" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">이미 정렬된 데이터 활용 → 실전 데이터에서 <tspan font-weight="700" fill="#55c555">O(N)</tspan> 근접 · 최악 <tspan font-weight="700" fill="#7ec8e3">O(N log N)</tspan></text>
</svg>
