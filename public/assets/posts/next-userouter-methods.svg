<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">useRouter 메서드 비교</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">History Stack 동작 방식</text>

  <!-- Header -->
  <rect x="60" y="88" width="220" height="40" rx="6" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="170" y="113" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">메서드</text>
  <rect x="292" y="88" width="280" height="40" rx="6" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="432" y="113" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">동작</text>
  <rect x="584" y="88" width="236" height="40" rx="6" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="702" y="113" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">히스토리 스택</text>

  <!-- push -->
  <rect x="60" y="140" width="220" height="54" rx="6" fill="#10102a" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="172" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7777cc">router.push()</text>
  <rect x="292" y="140" width="280" height="54" rx="6" fill="#0a0a14" stroke="#333" stroke-width="1"/>
  <text x="432" y="165" text-anchor="middle" font-size="12" fill="#888">새 URL로 이동</text>
  <text x="432" y="183" text-anchor="middle" font-size="11" fill="#666">뒤로 가기 버튼 작동</text>
  <rect x="584" y="140" width="236" height="54" rx="6" fill="#0a0a14" stroke="#333" stroke-width="1"/>
  <text x="702" y="172" text-anchor="middle" font-size="12" fill="#7777cc">스택에 추가 (push)</text>

  <!-- replace -->
  <rect x="60" y="206" width="220" height="54" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="238" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">router.replace()</text>
  <rect x="292" y="206" width="280" height="54" rx="6" fill="#0a0f0a" stroke="#333" stroke-width="1"/>
  <text x="432" y="231" text-anchor="middle" font-size="12" fill="#888">현재 URL을 새 URL로 교체</text>
  <text x="432" y="249" text-anchor="middle" font-size="11" fill="#666">뒤로 가기로 돌아올 수 없음</text>
  <rect x="584" y="206" width="236" height="54" rx="6" fill="#0a0f0a" stroke="#333" stroke-width="1"/>
  <text x="702" y="238" text-anchor="middle" font-size="12" fill="#55c555">현재 항목 교체 (replace)</text>

  <!-- back / forward -->
  <rect x="60" y="272" width="220" height="54" rx="6" fill="#1a150a" stroke="#ce9178" stroke-width="1"/>
  <text x="170" y="296" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#ce9178">router.back()</text>
  <text x="170" y="316" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#ce9178">router.forward()</text>
  <rect x="292" y="272" width="280" height="54" rx="6" fill="#100e00" stroke="#333" stroke-width="1"/>
  <text x="432" y="296" text-anchor="middle" font-size="12" fill="#888">히스토리 뒤로/앞으로 이동</text>
  <text x="432" y="316" text-anchor="middle" font-size="11" fill="#666">브라우저 뒤로/앞으로 버튼과 동일</text>
  <rect x="584" y="272" width="236" height="54" rx="6" fill="#100e00" stroke="#333" stroke-width="1"/>
  <text x="702" y="304" text-anchor="middle" font-size="12" fill="#ce9178">스택 포인터 이동</text>

  <!-- refresh -->
  <rect x="60" y="338" width="220" height="54" rx="6" fill="#0c1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="370" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">router.refresh()</text>
  <rect x="292" y="338" width="280" height="54" rx="6" fill="#0a1015" stroke="#333" stroke-width="1"/>
  <text x="432" y="363" text-anchor="middle" font-size="12" fill="#888">현재 라우트 서버 재렌더링</text>
  <text x="432" y="381" text-anchor="middle" font-size="11" fill="#666">Server Components 데이터 갱신</text>
  <rect x="584" y="338" width="236" height="54" rx="6" fill="#0a1015" stroke="#333" stroke-width="1"/>
  <text x="702" y="370" text-anchor="middle" font-size="12" fill="#7ec8e3">스택 변경 없음 (현재 유지)</text>
</svg>
