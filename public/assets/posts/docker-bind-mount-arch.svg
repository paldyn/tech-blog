<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Bind Mount 구조</text>

  <!-- Host side -->
  <rect x="60" y="68" width="340" height="260" fill="#111318" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="230" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8c53a" text-anchor="middle">호스트 파일시스템</text>

  <rect x="86" y="112" width="288" height="40" fill="#1a1a0a" rx="6" stroke="#e8c53a" stroke-width="1"/>
  <text x="230" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c53a" text-anchor="middle">/home/user/myapp/src</text>

  <rect x="86" y="164" width="288" height="100" fill="#0a0a00" rx="6" stroke="#3a3a00" stroke-width="1"/>
  <text x="112" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">src/</text>
  <text x="126" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">├── index.js</text>
  <text x="126" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">├── app.js</text>
  <text x="126" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">└── utils/</text>
  <text x="140" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">    └── helper.js</text>

  <text x="230" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">에디터로 파일 수정</text>

  <!-- Arrows (bidirectional) -->
  <line x1="400" y1="180" x2="438" y2="180" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="446,180 434,174 434,186" fill="#55c555"/>
  <line x1="440" y1="208" x2="402" y2="208" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="394,208 406,202 406,214" fill="#55c555"/>
  <text x="420" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">실시간</text>
  <text x="420" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">동기화</text>

  <!-- Container side -->
  <rect x="444" y="68" width="376" height="260" fill="#111318" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="632" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">컨테이너</text>

  <rect x="468" y="112" width="328" height="40" fill="#0f1625" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="632" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">/app  (마운트 포인트)</text>

  <rect x="468" y="164" width="328" height="100" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="494" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">app/ (= 호스트 src/)</text>
  <text x="508" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">├── index.js</text>
  <text x="508" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">├── app.js</text>
  <text x="508" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">└── utils/</text>
  <text x="522" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">    └── helper.js</text>

  <text x="632" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">node 프로세스가 파일 실행</text>

  <!-- Command at bottom -->
  <rect x="60" y="352" width="760" height="0" fill="none"/>
  <text x="440" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">docker run -v /home/user/myapp/src:/app node:20  →  호스트 src 디렉터리가 컨테이너 /app에 그대로 연결</text>
</svg>
