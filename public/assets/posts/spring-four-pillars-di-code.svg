<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DI 전·후 비교 — 결합도 변화</text>

  <!-- Left: Without DI -->
  <rect x="60" y="68" width="360" height="340" fill="#120a0a" rx="10" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="240" y="96" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">DI 없이 (직접 생성)</text>

  <rect x="76" y="108" width="328" height="200" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">public class</text>
  <text x="180" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> OrderService {</text>
  <text x="92" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  private</text>
  <text x="148" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> OrderRepo repo</text>
  <text x="92" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    // 직접 생성 — 강결합!</text>
  <text x="92" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    = new JdbcOrderRepo();</text>
  <text x="92" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text>
  <text x="92" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  public</text>
  <text x="140" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> void process() {</text>
  <text x="92" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    repo.save(order);</text>
  <text x="92" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="92" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="92" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// 테스트시 실DB 필요</text>

  <text x="92" y="340" font-size="13" fill="#e05555">✗  구현체가 바뀌면 코드 수정 필요</text>
  <text x="92" y="362" font-size="13" fill="#e05555">✗  단위 테스트에서 Mock 불가</text>
  <text x="92" y="384" font-size="13" fill="#e05555">✗  높은 결합도</text>

  <!-- Center arrow -->
  <polygon points="420,224 456,224 456,212 476,244 456,276 456,264 420,264"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Right: With DI -->
  <rect x="460" y="68" width="360" height="340" fill="#0a120a" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="640" y="96" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">DI 적용 (주입 받기)</text>

  <rect x="476" y="108" width="328" height="200" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">@Service</text>
  <text x="492" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">public class</text>
  <text x="580" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> OrderService {</text>
  <text x="492" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  private final</text>
  <text x="590" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> OrderRepo repo;</text>
  <text x="492" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // 스프링이 주입</text>
  <text x="492" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  public</text>
  <text x="540" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> OrderService(</text>
  <text x="492" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      OrderRepo repo) {</text>
  <text x="492" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    this.repo = repo;</text>
  <text x="492" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="492" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="492" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">// Mock 주입으로 테스트 가능</text>

  <text x="492" y="340" font-size="13" fill="#55c555">✓  구현체 교체 시 코드 변경 없음</text>
  <text x="492" y="362" font-size="13" fill="#55c555">✓  Mock 주입으로 단위 테스트</text>
  <text x="492" y="384" font-size="13" fill="#55c555">✓  낮은 결합도, 높은 유연성</text>

  <!-- Footer -->
  <text x="440" y="450" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #2</text>
</svg>
