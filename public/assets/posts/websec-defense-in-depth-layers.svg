<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">심층 방어 (Defense in Depth)</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">다층 보안 — 하나가 뚫려도 다음이 막는다</text>

  <!-- Castle analogy layers (concentric boxes) -->
  <!-- Outer: Perimeter -->
  <rect x="60" y="100" width="760" height="410" rx="10" fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">외부 경계 (Perimeter): 방화벽 · CDN · DDoS 방어 · TLS</text>

  <!-- 2nd: Network -->
  <rect x="100" y="140" width="680" height="340" rx="10" fill="none" stroke="#e0a055" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a055" text-anchor="middle">네트워크 계층: WAF · IDS/IPS · 네트워크 분리</text>

  <!-- 3rd: Application -->
  <rect x="140" y="180" width="600" height="270" rx="10" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">애플리케이션 계층: 인증 · 인가 · 입력 검증 · 세션 관리</text>

  <!-- 4th: Data -->
  <rect x="180" y="220" width="520" height="200" rx="10" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="440" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">데이터 계층: 암호화 · 최소 권한 · DB 접근 제어</text>

  <!-- 5th: Core Asset (innermost) -->
  <rect x="230" y="265" width="420" height="130" rx="10" fill="#1a2035" stroke="#e8e8e8" stroke-width="2"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">핵심 자산</text>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">고객 데이터 · 비즈니스 로직</text>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">시크릿 · 암호화 키</text>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">모니터링 · 감사 로그 (모든 계층 관통)</text>

  <!-- Bottom legend -->
  <text x="440" y="510" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">각 계층은 독립적으로 방어 — 한 계층이 침해돼도 나머지가 공격을 차단</text>
</svg>
