<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">심층 방어 (Defense in Depth): 5계층 보안</text>

  <!-- Layer 5: Perimeter (outermost) -->
  <rect x="60" y="70" width="760" height="390" rx="10" fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">① 경계 보안 (Perimeter)</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">방화벽 · WAF · DDoS 방어 · IDS/IPS</text>

  <!-- Layer 4: Network -->
  <rect x="110" y="130" width="660" height="295" rx="9" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="440" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">② 네트워크 보안 (Network)</text>
  <text x="440" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">VPN · 네트워크 분리 · 트래픽 모니터링</text>

  <!-- Layer 3: Host -->
  <rect x="160" y="190" width="560" height="205" rx="8" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="440" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">③ 호스트 보안 (Host)</text>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">OS 패치 · 안티바이러스 · 호스트 방화벽</text>

  <!-- Layer 2: Application -->
  <rect x="210" y="250" width="460" height="115" rx="7" fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="440" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">④ 애플리케이션 보안 (Application)</text>
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">입력 검증 · 인증/인가 · 취약점 패치</text>

  <!-- Layer 1: Data (innermost) -->
  <rect x="280" y="315" width="320" height="70" rx="6" fill="#1a1400" stroke="#e8c55a" stroke-width="2"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c55a" text-anchor="middle">⑤ 데이터 보안 (Data)</text>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">암호화 · 접근 통제 · 백업</text>

  <!-- Attacker arrow from left -->
  <line x1="30" y1="295" x2="58" y2="295" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="30" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">공격</text>

  <!-- Bottom key insight -->
  <rect x="60" y="475" width="760" height="34" rx="6" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="497" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">한 계층이 뚫려도 다음 계층이 공격자를 막는다 — 단일 실패점(SPOF) 제거</text>
</svg>
