<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arrtz" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrtg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TIMESTAMP vs TIMESTAMPTZ — 타임존 함정</text>

  <!-- TIMESTAMP without TZ -->
  <rect x="60" y="70" width="360" height="170" fill="#1a1010" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">TIMESTAMP (타임존 없음)</text>
  <text x="78" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">저장값: 2026-05-29 14:00:00</text>
  <text x="78" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타임존 정보 없음 — "어느 기준?"</text>
  <text x="78" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">서울(+9)에서 읽으면: 14:00 KST?</text>
  <text x="78" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">뉴욕(-5)에서 읽으면: 14:00 EST?</text>
  <text x="78" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버 타임존 설정에 따라 해석이 달라짐</text>
  <text x="78" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">⚠ 글로벌 서비스에서 버그의 온상</text>

  <!-- Arrow down -->
  <path d="M 240 240 L 240 260" fill="none" stroke="#55c555" stroke-width="2" marker-end="url(#arrtg)"/>

  <!-- TIMESTAMPTZ -->
  <rect x="60" y="260" width="360" height="90" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">TIMESTAMPTZ (타임존 포함)</text>
  <text x="78" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내부 UTC로 저장, 출력 시 세션 타임존으로 변환</text>
  <text x="78" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 글로벌 서비스의 표준 선택</text>

  <!-- Right side: best practices -->
  <rect x="460" y="70" width="360" height="280" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">날짜·시간 설계 모범 사례</text>

  <text x="478" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">✓ created_at, updated_at</text>
  <text x="478" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TIMESTAMPTZ NOT NULL DEFAULT now()</text>
  <text x="478" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모든 레코드에 추가하는 기본 감사 컬럼</text>

  <line x1="478" y1="172" x2="802" y2="172" stroke="#3a4a6e" stroke-width="1"/>

  <text x="478" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">✓ 생일, 만료일</text>
  <text x="478" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DATE 타입 — 시간 불필요</text>
  <text x="478" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">예: birth_date DATE NOT NULL</text>

  <line x1="478" y1="242" x2="802" y2="242" stroke="#3a4a6e" stroke-width="1"/>

  <text x="478" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">✗ 피해야 할 패턴</text>
  <text x="478" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">날짜를 VARCHAR로 저장: '2026-05-29'</text>
  <text x="478" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ 정렬·계산 불가, 유효성 검사 없음</text>
  <text x="478" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Unix 타임스탬프를 BIGINT로 저장</text>
  <text x="478" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ DB 날짜 함수 사용 불가</text>
</svg>
