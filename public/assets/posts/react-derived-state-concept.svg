<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">파생 상태: 계산하면 되는 걸 state로 만들지 마라</text>

  <!-- Bad: redundant state (left) -->
  <text x="220" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">❌ 중복 상태 (동기화 버그 유발)</text>
  <rect x="60" y="84" width="360" height="230" rx="10" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <rect x="76" y="96" width="328" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="92" y="116" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Cart() {</tspan>
    <tspan x="92" dy="16" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [items, setItems] = useState([]);</tspan>
    <tspan x="92" dy="16" fill="#9aa4b8">  // ❌ items에서 계산 가능한 값</tspan>
    <tspan x="92" dy="16" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [total, setTotal] = useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [count, setCount] = useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="22" fill="#9aa4b8">  // 항상 세 가지를 함께 업데이트해야 함</tspan>
    <tspan x="92" dy="16" fill="#7ec8e3" font-weight="600">  function</tspan><tspan fill="#ffffff"> addItem(item) {</tspan>
    <tspan x="92" dy="16" fill="#ffffff">    setItems(prev =&gt; [...prev, item]);</tspan>
    <tspan x="92" dy="16" fill="#e05555">    setTotal(prev =&gt; prev + item.price);</tspan>
    <tspan x="92" dy="16" fill="#e05555">    setCount(prev =&gt; prev + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e05555">);</tspan>
    <tspan x="92" dy="16" fill="#9aa4b8">    // 하나 빠뜨리면 동기화 버그!</tspan>
  </text>

  <!-- Good: derived value (right) -->
  <text x="660" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">✓ 파생값 (계산으로 해결)</text>
  <rect x="460" y="84" width="360" height="230" rx="10" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>
  <rect x="476" y="96" width="328" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="492" y="116" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Cart() {</tspan>
    <tspan x="492" dy="16" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [items, setItems] = useState([]);</tspan>
    <tspan x="492" dy="16" fill="#9aa4b8">  // ✓ items에서 실시간 계산</tspan>
    <tspan x="492" dy="16" fill="#55c555">  const total = items.reduce(</tspan>
    <tspan x="492" dy="16" fill="#55c555">    (sum, i) =&gt; sum + i.price, </tspan><tspan fill="#b5cea8">0</tspan>
    <tspan x="492" dy="16" fill="#55c555">  );</tspan>
    <tspan x="492" dy="16" fill="#55c555">  const count = items.length;</tspan>
    <tspan x="492" dy="22" fill="#9aa4b8">  // 상태는 items 하나뿐</tspan>
    <tspan x="492" dy="16" fill="#7ec8e3" font-weight="600">  function</tspan><tspan fill="#ffffff"> addItem(item) {</tspan>
    <tspan x="492" dy="16" fill="#ffffff">    setItems(prev =&gt; [...prev, item]);</tspan>
    <tspan x="492" dy="16" fill="#9aa4b8">    // total, count 자동 갱신!</tspan>
  </text>

  <!-- Bottom rule -->
  <rect x="60" y="330" width="760" height="88" rx="8" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="352" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">파생 상태 판단 기준</text>
  <text x="440" y="372" text-anchor="middle" font-size="12" fill="#888">"이 값이 다른 state나 prop으로부터 계산될 수 있는가?" → Yes → state 대신 계산식</text>
  <text x="440" y="390" text-anchor="middle" font-size="12" fill="#888">계산 비용이 크다면 useMemo로 메모이제이션, 그렇지 않으면 그냥 렌더마다 계산</text>
  <text x="440" y="408" text-anchor="middle" font-size="12" fill="#55c555">state를 최소화할수록 동기화 버그가 줄고, 코드가 단순해진다</text>
</svg>
