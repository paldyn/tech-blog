<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">module.exports vs exports · 차이 이해</text>

  <!-- Left: correct usage -->
  <rect x="60" y="62" width="370" height="340" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">✓ 올바른 사용</text>

  <!-- exports.foo = ... -->
  <text x="76" y="110" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// exports는 module.exports의 참조</text>
  <text x="76" y="128" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">exports.greet = </text>
  <text x="206" y="128" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text>
  <text x="259" y="128" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(name) {</text>
  <text x="76" y="146" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  return </text>
  <text x="131" y="146" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">`안녕, ${name}`</text>
  <text x="243" y="146" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="76" y="164" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">};</text>
  <text x="76" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">exports.VERSION = </text>
  <text x="220" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'1.0.0'</text>
  <text x="264" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="76" y="200" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// module.exports === exports 유지됨</text>

  <!-- module.exports = {} -->
  <text x="76" y="230" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 전체 교체 시 module.exports 사용</text>
  <text x="76" y="248" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">module.exports = {</text>
  <text x="76" y="266" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  greet,</text>
  <text x="76" y="284" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  VERSION: </text>
  <text x="165" y="284" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'1.0.0'</text>
  <text x="209" y="284" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>
  <text x="76" y="302" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">};</text>

  <!-- using require -->
  <text x="76" y="330" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 사용 측</text>
  <text x="76" y="348" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const </text>
  <text x="117" y="348" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{ greet } = require(</text>
  <text x="285" y="348" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'./utils'</text>
  <text x="339" y="348" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">);</text>
  <text x="76" y="366" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">console.log(greet(</text>
  <text x="207" y="366" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'세계'</text>
  <text x="244" y="366" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">));</text>
  <text x="76" y="384" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// '안녕, 세계'</text>

  <!-- Right: wrong usage + explanation -->
  <rect x="450" y="62" width="370" height="340" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">✗ 흔한 실수</text>

  <text x="466" y="110" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// exports를 통째로 교체 → 무효!</text>
  <text x="466" y="128" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">exports = { greet };</text>
  <text x="466" y="146" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// module.exports는 여전히 {}이므로</text>
  <text x="466" y="164" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// require() 는 {} 를 반환함</text>

  <!-- explanation diagram -->
  <rect x="466" y="182" width="340" height="106" rx="6" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="636" y="204" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">참조 관계</text>
  <text x="476" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">module.exports → </text>
  <text x="618" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">{ }  ← 실제 내보낸 객체</text>
  <text x="476" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">exports →</text>
  <text x="566" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">module.exports  (초기)</text>
  <text x="476" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">exports =</text>
  <text x="555" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">{ greet }  (재할당 후 끊김)</text>

  <!-- module wrapper -->
  <text x="466" y="314" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Node가 모든 모듈을 래핑하는 함수</text>
  <text x="466" y="332" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">(function</text>
  <text x="538" y="332" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(exports, require,</text>
  <text x="466" y="350" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  module, __filename, __dirname) {</text>
  <text x="466" y="368" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // 여기에 모듈 코드 삽입</text>
  <text x="466" y="386" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
</svg>
