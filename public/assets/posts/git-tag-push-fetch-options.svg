<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    push 옵션 비교
  </text>

  <!-- Table header -->
  <rect x="60" y="65" width="760" height="40" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">옵션</text>
  <text x="480" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">포함 범위</text>
  <text x="740" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">추천 상황</text>

  <!-- Row 1 -->
  <rect x="60" y="110" width="760" height="44" rx="0" fill="#111111" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" text-anchor="middle">git push origin v1.0.0</text>
  <text x="200" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이름 명시</text>
  <text x="480" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">지정한 태그 하나</text>
  <text x="740" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">단일 릴리스</text>

  <!-- Row 2 -->
  <rect x="60" y="158" width="760" height="44" rx="0" fill="#111111" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" text-anchor="middle">git push origin --tags</text>
  <text x="480" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">LW + Annotated 전체</text>
  <text x="740" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">일괄 동기화</text>

  <!-- Row 3 -->
  <rect x="60" y="206" width="760" height="44" rx="0" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">git push --follow-tags</text>
  <text x="480" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">커밋에 연결된 Annotated만</text>
  <text x="740" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">CI 릴리스 권장 ✓</text>

  <!-- Row 4 -->
  <rect x="60" y="254" width="760" height="44" rx="0" fill="#111111" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" text-anchor="middle">git push (기본)</text>
  <text x="480" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">태그 미포함</text>
  <text x="740" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">태그 의도 없을 때</text>

  <!-- vertical dividers -->
  <line x1="340" y1="65" x2="340" y2="298" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="620" y1="65" x2="620" y2="298" stroke="#3a4a6e" stroke-width="0.5"/>
</svg>
