<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">트라이 자동완성: 접두사 "ca"의 서브트리 수집</text>

  <!-- edges -->
  <line x1="340" y1="130" x2="240" y2="210" stroke="#7ec8e3" stroke-width="3"/>
  <line x1="340" y1="130" x2="460" y2="210" stroke="#555555" stroke-width="2"/>
  <line x1="240" y1="210" x2="240" y2="290" stroke="#7ec8e3" stroke-width="3"/>
  <line x1="460" y1="210" x2="460" y2="290" stroke="#555555" stroke-width="2"/>
  <line x1="240" y1="290" x2="180" y2="370" stroke="#55c555" stroke-width="2"/>
  <line x1="240" y1="290" x2="300" y2="370" stroke="#55c555" stroke-width="2"/>
  <line x1="460" y1="290" x2="460" y2="370" stroke="#555555" stroke-width="2"/>

  <!-- nodes -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600">
    <circle cx="340" cy="130" r="20" fill="#000000" stroke="#888888" stroke-width="2"/>
    <text x="340" y="135" text-anchor="middle" fill="#9aa4b8" font-size="11">root</text>

    <circle cx="240" cy="210" r="20" fill="#000000" stroke="#7ec8e3" stroke-width="2.5"/>
    <text x="240" y="215" text-anchor="middle" fill="#ffffff">c</text>

    <circle cx="460" cy="210" r="20" fill="#000000" stroke="#555555" stroke-width="2"/>
    <text x="460" y="215" text-anchor="middle" fill="#ffffff">d</text>

    <circle cx="240" cy="290" r="20" fill="#000000" stroke="#7ec8e3" stroke-width="2.5"/>
    <text x="240" y="295" text-anchor="middle" fill="#ffffff">a</text>

    <circle cx="460" cy="290" r="20" fill="#000000" stroke="#555555" stroke-width="2"/>
    <text x="460" y="295" text-anchor="middle" fill="#ffffff">o</text>

    <circle cx="180" cy="370" r="20" fill="#000000" stroke="#55c555" stroke-width="2.5"/>
    <text x="180" y="375" text-anchor="middle" fill="#55c555">r</text>

    <circle cx="300" cy="370" r="20" fill="#000000" stroke="#55c555" stroke-width="2.5"/>
    <text x="300" y="375" text-anchor="middle" fill="#55c555">t</text>

    <circle cx="460" cy="370" r="20" fill="#000000" stroke="#55c555" stroke-width="2.5"/>
    <text x="460" y="375" text-anchor="middle" fill="#55c555">g</text>
  </g>

  <!-- word labels under leaves -->
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">
    <text x="180" y="412" text-anchor="middle">car ●</text>
    <text x="300" y="412" text-anchor="middle">cat ●</text>
    <text x="460" y="412" text-anchor="middle">dog ●</text>
  </g>

  <!-- annotation box -->
  <rect x="580" y="160" width="240" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="596" y="192" fill="#ffffff">입력 접두사: <tspan fill="#7ec8e3" font-weight="600">"ca"</tspan></text>
    <text x="596" y="222" fill="#ffffff">후보: <tspan fill="#55c555" font-weight="600">car, cat</tspan></text>
    <text x="596" y="252" fill="#9aa4b8">dog는 다른 서브트리 → 제외</text>
  </g>

  <text x="60" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">파란 경로 = 접두사 탐색 O(m) · 초록 노드 = "ca" 노드 아래 서브트리 DFS로 수집한 단어 끝</text>
</svg>
