<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">프롬프트 A/B 테스트 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">새 버전 검증 후 점진적 롤아웃</text>

  <!-- Traffic split -->
  <rect x="310" y="88" width="260" height="44" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">사용자 트래픽</text>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해시 기반 또는 랜덤 분할</text>

  <!-- Split arrows -->
  <line x1="360" y1="132" x2="220" y2="180" stroke="#555" stroke-width="2"/>
  <line x1="520" y1="132" x2="660" y2="180" stroke="#555" stroke-width="2"/>

  <!-- Version A -->
  <rect x="100" y="180" width="240" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">버전 A (Control)</text>
  <text x="220" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1.1.0 — 현재 Production</text>
  <text x="220" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">트래픽 80%</text>

  <!-- Version B -->
  <rect x="540" y="180" width="240" height="60" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">버전 B (Challenger)</text>
  <text x="660" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1.2.0 — 신규 CoT 추가</text>
  <text x="660" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">트래픽 20%</text>

  <!-- Metrics -->
  <rect x="100" y="256" width="240" height="68" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="120" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">지표 (A):</text>
  <text x="120" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">정확도: 74.2%</text>
  <text x="120" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">레이턴시: 1,100ms</text>

  <rect x="540" y="256" width="240" height="68" rx="6" fill="#0d2d0d" stroke="#55c555"/>
  <text x="560" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">지표 (B):</text>
  <text x="560" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">정확도: 81.5% (+7.3%p)</text>
  <text x="560" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">레이턴시: 1,480ms (+34%)</text>

  <!-- Decision -->
  <rect x="250" y="340" width="380" height="28" rx="6" fill="#111111" stroke="#1e2433"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">결정: 정확도 우선이면 B 채택 / 레이턴시 중요하면 A 유지</text>
</svg>
