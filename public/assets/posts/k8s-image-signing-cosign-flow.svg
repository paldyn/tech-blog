<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Cosign 이미지 서명 &amp; 검증 흐름</text>

  <!-- Signing side -->
  <rect x="60" y="70" width="340" height="300" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">서명 (CI/CD 파이프라인)</text>

  <rect x="80" y="106" width="160" height="50" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">1. 이미지 빌드</text>
  <text x="160" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">docker build &amp; push</text>

  <line x1="160" y1="156" x2="160" y2="176" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="176" width="160" height="50" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">2. 이미지 스캔</text>
  <text x="160" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Trivy (취약점 없으면 진행)</text>

  <line x1="160" y1="226" x2="160" y2="246" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="246" width="160" height="50" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">3. cosign sign</text>
  <text x="160" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">개인키 또는 Keyless</text>

  <line x1="240" y1="271" x2="280" y2="271" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <rect x="280" y="246" width="100" height="50" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="330" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">서명 저장</text>
  <text x="330" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">OCI 레지스트리</text>

  <!-- Rekor transparency log -->
  <rect x="80" y="320" width="300" height="36" rx="6" fill="#2a1a00" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">Rekor 투명성 로그 (Keyless 방식)</text>

  <!-- Verification side -->
  <rect x="480" y="70" width="340" height="300" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">검증 (Kubernetes 배포 시)</text>

  <rect x="500" y="106" width="160" height="50" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="580" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">cosign verify</text>
  <text x="580" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서명 유효성 확인</text>

  <line x1="580" y1="156" x2="580" y2="176" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <rect x="500" y="176" width="160" height="50" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="580" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Policy 검사</text>
  <text x="580" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Kyverno / OPA</text>

  <line x1="580" y1="226" x2="580" y2="246" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- pass/fail -->
  <line x1="580" y1="246" x2="540" y2="276" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="580" y1="246" x2="620" y2="276" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>

  <rect x="500" y="276" width="70" height="50" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="535" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">허용</text>
  <text x="535" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Pod 생성</text>

  <rect x="590" y="276" width="70" height="50" rx="6" fill="#200f10" stroke="#e05555" stroke-width="1"/>
  <text x="625" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">거부</text>
  <text x="625" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Admission 차단</text>

  <!-- arrow between two sides -->
  <line x1="400" y1="220" x2="478" y2="220" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="440" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">서명 검증</text>

  <!-- Bottom: keyless vs key -->
  <rect x="60" y="390" width="360" height="86" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">키 기반 서명</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">cosign generate-key-pair</text>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">cosign sign --key cosign.key myapp:v2</text>
  <text x="76" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">cosign verify --key cosign.pub myapp:v2</text>

  <rect x="480" y="390" width="360" height="86" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Keyless 서명 (OIDC)</text>
  <text x="496" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># GitHub Actions OIDC 토큰 사용</text>
  <text x="496" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" font-weight="600" xml:space="preserve">cosign sign myapp:v2</text>
  <text x="496" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># 키 관리 불필요, Rekor에 기록</text>
</svg>
