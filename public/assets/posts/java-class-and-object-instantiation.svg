<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="ref-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">객체 생성과 메모리 구조</text>

  <!-- Code Block (top) -->
  <rect x="60" y="54" width="760" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- code line 1 -->
  <text y="81" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="76" fill="#7ec8e3" font-weight="600">Dog</tspan><tspan fill="#ffffff"> d1 = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> Dog(</tspan><tspan fill="#ce9178">"Rex"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- code line 2 -->
  <text y="101" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="76" fill="#7ec8e3" font-weight="600">Dog</tspan><tspan fill="#ffffff"> d2 = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> Dog(</tspan><tspan fill="#ce9178">"Max"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- code comment -->
  <text y="121" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="76" fill="#9aa4b8">// d1, d2 는 스택 → 실제 객체는 힙에 생성</tspan></text>

  <!-- === Stack Section === -->
  <!-- Stack label -->
  <text x="60" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">Stack (스택)</text>
  <text x="60" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">참조 변수 (주소 저장)</text>

  <!-- Stack box -->
  <rect x="60" y="186" width="300" height="242" rx="6" fill="#101828" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- d1 row -->
  <rect x="76" y="206" width="260" height="48" rx="4" fill="#0a0f1c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="227" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">d1</text>
  <text x="130" y="227" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">Dog</text>
  <rect x="200" y="213" width="120" height="28" rx="3" fill="#1a2540" stroke="#7ec8e3" stroke-width="1"/>
  <text x="260" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">0xAF01</text>

  <!-- d2 row -->
  <rect x="76" y="310" width="260" height="48" rx="4" fill="#0a0f1c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">d2</text>
  <text x="130" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">Dog</text>
  <rect x="200" y="317" width="120" height="28" rx="3" fill="#1a2540" stroke="#7ec8e3" stroke-width="1"/>
  <text x="260" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">0xBF02</text>

  <!-- === Heap Section === -->
  <!-- Heap label -->
  <text x="520" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">Heap (힙)</text>
  <text x="520" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실제 객체 인스턴스</text>

  <!-- Heap box -->
  <rect x="520" y="186" width="300" height="242" rx="6" fill="#101828" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Dog object 1 -->
  <rect x="536" y="202" width="268" height="98" rx="4" fill="#0d1f12" stroke="#55c555" stroke-width="1.5"/>
  <text x="546" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Dog @ 0xAF01</text>
  <line x1="536" y1="228" x2="804" y2="228" stroke="#55c555" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="546" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">name = <tspan fill="#ce9178">"Rex"</tspan></text>
  <text x="546" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">age  = <tspan fill="#b5cea8">3</tspan></text>
  <text x="546" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">bark() { ... }</text>

  <!-- Dog object 2 -->
  <rect x="536" y="316" width="268" height="98" rx="4" fill="#0d1f12" stroke="#55c555" stroke-width="1.5"/>
  <text x="546" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Dog @ 0xBF02</text>
  <line x1="536" y1="342" x2="804" y2="342" stroke="#55c555" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="546" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">name = <tspan fill="#ce9178">"Max"</tspan></text>
  <text x="546" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">age  = <tspan fill="#b5cea8">5</tspan></text>
  <text x="546" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">bark() { ... }</text>

  <!-- Reference arrows: d1 → Dog@0xAF01 -->
  <path d="M 322 230 L 410 230 L 410 251 L 534 251" fill="none"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#ref-arr)"/>

  <!-- Reference arrows: d2 → Dog@0xBF02 -->
  <path d="M 322 334 L 410 334 L 410 365 L 534 365" fill="none"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#ref-arr)"/>

  <!-- Label for arrows -->
  <text x="360" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">참조</text>
  <text x="360" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">참조</text>
</svg>
