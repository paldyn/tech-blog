<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a6ea8"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">iframe sandbox 격리 메커니즘</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">부모 페이지와 임베드 콘텐츠 사이의 보안 경계</text>

  <!-- Parent page box -->
  <rect x="60" y="100" width="260" height="300" rx="8" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="190" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">부모 페이지</text>
  <text x="190" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">example.com</text>

  <!-- Parent resources -->
  <rect x="80" y="160" width="220" height="28" rx="4" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="190" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">document.cookie</text>

  <rect x="80" y="196" width="220" height="28" rx="4" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="190" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">localStorage</text>

  <rect x="80" y="232" width="220" height="28" rx="4" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="190" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">window.location</text>

  <rect x="80" y="268" width="220" height="28" rx="4" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="190" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">DOM 조작</text>

  <rect x="80" y="338" width="220" height="40" rx="4" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1"/>
  <text x="190" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">postMessage 통신</text>
  <text x="190" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">안전한 유일 통로</text>

  <!-- Sandbox wall (center) -->
  <rect x="350" y="100" width="80" height="300" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="390" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle" transform="rotate(-90 390 245)">sandbox 경계</text>

  <!-- Blocked arrows (red) -->
  <line x1="300" y1="174" x2="348" y2="174" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="322" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">차단</text>

  <line x1="300" y1="210" x2="348" y2="210" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="322" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">차단</text>

  <line x1="300" y1="246" x2="348" y2="246" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="322" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">차단</text>

  <line x1="300" y1="282" x2="348" y2="282" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="322" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">차단</text>

  <!-- Allowed arrow (green) for postMessage -->
  <line x1="300" y1="358" x2="348" y2="358" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="432" y1="358" x2="478" y2="358" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- iframe content box -->
  <rect x="480" y="100" width="340" height="300" rx="8" fill="#0f0d18" stroke="#8a3aa8" stroke-width="1.5"/>
  <text x="650" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b07ad0" text-anchor="middle">iframe 콘텐츠</text>
  <text x="650" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">third-party.com</text>

  <!-- iframe restrictions -->
  <rect x="500" y="162" width="300" height="28" rx="4" fill="#1a0f2a" stroke="#8a3aa8" stroke-width="1"/>
  <text x="650" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">JS 실행 불가 (allow-scripts 없음)</text>

  <rect x="500" y="198" width="300" height="28" rx="4" fill="#1a0f2a" stroke="#8a3aa8" stroke-width="1"/>
  <text x="650" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">쿠키 접근 불가 (다른 오리진)</text>

  <rect x="500" y="234" width="300" height="28" rx="4" fill="#1a0f2a" stroke="#8a3aa8" stroke-width="1"/>
  <text x="650" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">폼 제출 불가 (allow-forms 없음)</text>

  <rect x="500" y="270" width="300" height="28" rx="4" fill="#1a0f2a" stroke="#8a3aa8" stroke-width="1"/>
  <text x="650" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">팝업 불가 (allow-popups 없음)</text>

  <rect x="500" y="338" width="300" height="40" rx="4" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1"/>
  <text x="650" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">postMessage 수신 가능</text>
  <text x="650" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">origin 검증 필수</text>

  <!-- Code example at bottom -->
  <rect x="60" y="424" width="760" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#888">&lt;iframe </text>
  <text x="148" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">sandbox</text>
  <text x="221" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#888">="</text>
  <text x="241" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ce9178">allow-scripts allow-same-origin</text>
  <text x="520" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#888">"  </text>
  <text x="544" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">src="..."&gt;</text>
  <text x="80" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">← 이 조합은 sandbox 우회 가능 (주의!)</text>
</svg>
