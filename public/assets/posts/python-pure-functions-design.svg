<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">순수 함수 설계 전략</text>

  <!-- Step boxes with arrows -->
  <rect x="60" y="72" width="200" height="70" rx="8" fill="#0f1a2e" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="160" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">입력 데이터</text>
  <text x="160" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">불변 인자</text>

  <!-- Arrow 1 -->
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#4a90d9"/>
    </marker>
  </defs>
  <line x1="260" y1="107" x2="320" y2="107" stroke="#4a90d9" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="320" y="72" width="240" height="70" rx="8" fill="#0f2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">순수 함수 변환</text>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">외부 상태 참조 없음</text>

  <!-- Arrow 2 -->
  <defs>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <line x1="560" y1="107" x2="620" y2="107" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="620" y="72" width="200" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">출력 데이터</text>
  <text x="720" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">새 객체 반환</text>

  <!-- Benefits grid -->
  <rect x="60" y="172" width="180" height="70" rx="6" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="150" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">단위 테스트 용이</text>
  <text x="150" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">mock 없이 테스트</text>
  <text x="150" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">가능</text>

  <rect x="260" y="172" width="180" height="70" rx="6" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="350" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">메모이제이션</text>
  <text x="350" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">lru_cache 적용</text>
  <text x="350" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자동 가능</text>

  <rect x="460" y="172" width="180" height="70" rx="6" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="550" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">병렬 처리 안전</text>
  <text x="550" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공유 상태 없어</text>
  <text x="550" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">경쟁 조건 없음</text>

  <rect x="660" y="172" width="160" height="70" rx="6" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="740" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">조합 가능</text>
  <text x="740" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">함수 합성으로</text>
  <text x="740" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파이프라인 구성</text>

  <!-- Refactoring example -->
  <rect x="60" y="262" width="760" height="132" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 불순 → 순수로 리팩터링</text>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># 불순: results 목록 외부에서 변경</tspan>
  </text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> process_impure(items, results):</tspan>
  </text>
  <text x="76" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    results += [item * </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">for</tspan>
    <tspan fill="#ffffff"> item </tspan>
    <tspan fill="#7ec8e3" font-weight="600">in</tspan>
    <tspan fill="#ffffff"> items]</tspan>
  </text>
  <text x="76" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># 순수: 새 리스트 반환</tspan>
  </text>
  <text x="76" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> process_pure(items): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> [item * </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">for</tspan>
    <tspan fill="#ffffff"> item </tspan>
    <tspan fill="#7ec8e3" font-weight="600">in</tspan>
    <tspan fill="#ffffff"> items]</tspan>
  </text>
</svg>
