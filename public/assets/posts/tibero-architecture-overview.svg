<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Tibero RDBMS 아키텍처</text>

  <!-- Client layer -->
  <rect x="60" y="66" width="760" height="60" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트 계층</text>
  <text x="180" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JDBC / ODBC</text>
  <text x="340" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">tbSQL (CLI)</text>
  <text x="500" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">tbAdmin (GUI)</text>
  <text x="680" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">애플리케이션</text>

  <!-- Arrow down -->
  <line x1="440" y1="126" x2="440" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">TCP/IP</text>

  <!-- Instance box -->
  <rect x="60" y="152" width="760" height="200" rx="8" fill="#0a0d18" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Tibero 인스턴스 (프로세스 구조)</text>

  <!-- Tbero processes -->
  <rect x="80" y="190" width="140" height="52" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">WTHR</text>
  <text x="150" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Worker Thread</text>

  <rect x="240" y="190" width="140" height="52" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="310" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">AGNT</text>
  <text x="310" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Agent Process</text>

  <rect x="400" y="190" width="140" height="52" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="470" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">DBWR</text>
  <text x="470" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DB Writer</text>

  <rect x="560" y="190" width="140" height="52" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="630" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">LGWR</text>
  <text x="630" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Log Writer</text>

  <rect x="716" y="190" width="84" height="52" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="758" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">CKPT</text>
  <text x="758" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Checkpoint</text>

  <!-- Shared memory -->
  <rect x="80" y="260" width="720" height="76" rx="6" fill="#0c1428" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">공유 메모리 (SGA 상당)</text>
  <text x="200" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DB Buffer Cache</text>
  <text x="440" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL Query Cache</text>
  <text x="680" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Redo Log Buffer</text>

  <!-- Arrow down -->
  <line x1="440" y1="352" x2="440" y2="374" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Storage layer -->
  <rect x="60" y="378" width="760" height="90" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">스토리지 계층</text>
  <text x="160" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 파일 (.dbf)</text>
  <text x="330" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">리두 로그 파일</text>
  <text x="500" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컨트롤 파일</text>
  <text x="680" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">아카이브 로그</text>
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Oracle 호환 파일 구조 (tablespace / segment / extent / block)</text>
</svg>
