<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">브랜치 = 커밋 포인터</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">브랜치는 SHA-1 해시 하나를 담은 41바이트 파일</text>

  <!-- Commit chain -->
  <!-- C1 -->
  <rect x="60" y="148" width="120" height="60" rx="8" fill="#0d1117" stroke="#555" stroke-width="1.5"/>
  <text x="120" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">C1</text>
  <text x="120" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555" text-anchor="middle">a1b2c3d</text>

  <!-- Arrow C1→C2 -->
  <line x1="180" y1="178" x2="240" y2="178" stroke="#555" stroke-width="2"/>
  <polygon points="240,173 252,178 240,183" fill="#555"/>

  <!-- C2 -->
  <rect x="252" y="148" width="120" height="60" rx="8" fill="#0d1117" stroke="#555" stroke-width="1.5"/>
  <text x="312" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">C2</text>
  <text x="312" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555" text-anchor="middle">e4f5a6b</text>

  <!-- Arrow C2→C3 -->
  <line x1="372" y1="178" x2="432" y2="178" stroke="#555" stroke-width="2"/>
  <polygon points="432,173 444,178 432,183" fill="#555"/>

  <!-- C3 -->
  <rect x="444" y="148" width="120" height="60" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="504" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">C3</text>
  <text x="504" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555" text-anchor="middle">c7d8e9f</text>

  <!-- main branch pointer -->
  <rect x="444" y="96" width="120" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="504" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">main</text>
  <!-- Arrow main→C3 -->
  <line x1="504" y1="132" x2="504" y2="148" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="499,148 504,160 509,148" fill="#55c555"/>

  <!-- Arrow C3→C4 -->
  <line x1="564" y1="178" x2="624" y2="178" stroke="#555" stroke-width="2"/>
  <polygon points="624,173 636,178 624,183" fill="#555"/>

  <!-- C4 -->
  <rect x="636" y="148" width="120" height="60" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="696" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">C4</text>
  <text x="696" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555" text-anchor="middle">f1e2d3c</text>

  <!-- feature branch pointer -->
  <rect x="636" y="96" width="120" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="696" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">feature</text>
  <!-- Arrow feature→C4 -->
  <line x1="696" y1="132" x2="696" y2="148" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="691,148 696,160 701,148" fill="#7777cc"/>

  <!-- HEAD pointer -->
  <rect x="636" y="48" width="120" height="32" rx="6" fill="#2a1a0a" stroke="#e8a838" stroke-width="1.5"/>
  <text x="696" y="69" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a838" text-anchor="middle">HEAD</text>
  <!-- Arrow HEAD→feature -->
  <line x1="696" y1="80" x2="696" y2="96" stroke="#e8a838" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- branch file explanation -->
  <rect x="60" y="254" width="760" height="90" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">브랜치 파일 실체</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">$ cat .git/refs/heads/main</text>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">c7d8e9f1234567890abcdef1234567890abcdef12    <tspan fill="#9aa4b8">← 41바이트 텍스트 파일</tspan></text>

  <!-- Key insight -->
  <rect x="60" y="362" width="760" height="80" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">브랜치가 가벼운 이유</text>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">복사가 아닌 포인터만 생성 → 브랜치 생성은 파일 1개 쓰기, 삭제는 파일 1개 삭제</text>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">SVN·Perforce 방식(파일 전체 복사)과 근본적으로 다름</text>
</svg>
