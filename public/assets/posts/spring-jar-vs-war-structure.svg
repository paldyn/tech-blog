<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JAR vs WAR — 내부 구조 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Spring Boot Fat JAR과 WAR의 디렉터리 레이아웃 차이</text>

  <!-- JAR column header -->
  <rect x="60" y="90" width="360" height="36" rx="6" fill="#1a2535" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Fat JAR (Executable JAR)</text>

  <!-- WAR column header -->
  <rect x="460" y="90" width="360" height="36" rx="6" fill="#1a2535" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">WAR (Web Application Archive)</text>

  <!-- JAR structure tree -->
  <rect x="60" y="138" width="360" height="260" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">myapp.jar</text>
  <text xml:space="preserve" x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">├── BOOT-INF/</text>
  <text xml:space="preserve" x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">│   ├── classes/</text>
  <text xml:space="preserve" x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">│   │   └── com/example/...</text>
  <text xml:space="preserve" x="80" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">│   └── lib/</text>
  <text xml:space="preserve" x="80" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">│       ├── spring-boot-3.x.jar</text>
  <text xml:space="preserve" x="80" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">│       └── ...의존성 전부</text>
  <text xml:space="preserve" x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">├── META-INF/MANIFEST.MF</text>
  <text xml:space="preserve" x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">│   Main-Class: JarLauncher</text>
  <text xml:space="preserve" x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">│   Start-Class: com.example.App</text>
  <text xml:space="preserve" x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">└── org/ (Spring Boot Loader)</text>
  <text xml:space="preserve" x="80" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">    └── springframework/boot/...</text>
  <text xml:space="preserve" x="80" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # 내장 Tomcat 포함</text>

  <!-- WAR structure tree -->
  <rect x="460" y="138" width="360" height="260" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="480" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">myapp.war</text>
  <text xml:space="preserve" x="480" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">├── WEB-INF/</text>
  <text xml:space="preserve" x="480" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">│   ├── classes/</text>
  <text xml:space="preserve" x="480" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">│   │   └── com/example/...</text>
  <text xml:space="preserve" x="480" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">│   └── lib/</text>
  <text xml:space="preserve" x="480" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">│       └── ...앱 의존성 (Tomcat 제외)</text>
  <text xml:space="preserve" x="480" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">├── WEB-INF/lib-provided/</text>
  <text xml:space="preserve" x="480" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">│   └── tomcat-embed-*.jar</text>
  <text xml:space="preserve" x="480" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">│   # WAR 실행 시 사용 (내장 부트)</text>
  <text xml:space="preserve" x="480" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">├── META-INF/MANIFEST.MF</text>
  <text xml:space="preserve" x="480" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">│   Main-Class: WarLauncher</text>
  <text xml:space="preserve" x="480" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">└── static/ (정적 리소스)</text>
  <text xml:space="preserve" x="480" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # 외부 WAS 배포 시 컨테이너 처리</text>

  <!-- Bottom comparison -->
  <rect x="60" y="418" width="360" height="94" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">JAR 실행</text>
  <text x="240" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">java -jar myapp.jar</text>
  <text x="240" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">내장 Tomcat이 바로 구동</text>
  <text x="240" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JRE만 있으면 어디서든 실행</text>
  <text x="240" y="506" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle"> </text>

  <rect x="460" y="418" width="360" height="94" rx="6" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">WAR 배포</text>
  <text x="640" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tomcat webapps/ 디렉터리에 복사</text>
  <text x="640" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">외부 WAS가 앱을 로드</text>
  <text x="640" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">레거시 온프레미스 환경 적합</text>
  <text x="640" y="506" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle"> </text>
</svg>
