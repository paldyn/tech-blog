<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">타임아웃이 곧 취소다</text>

  <text x="60" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제한 시간 안에 끝나면 결과, 넘기면 자동 취소 + TimeoutError</text>

  <!-- 성공 케이스 -->
  <rect x="60" y="110" width="360" height="160" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="240" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">시간 내 완료</text>
  <rect x="90" y="166" width="180" height="30" fill="#55c555" rx="4"/>
  <text x="180" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">작업 (2초)</text>
  <rect x="90" y="206" width="300" height="2" fill="#555555"/>
  <text x="90" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제한 5초 |————————|</text>
  <text x="90" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">→ 정상 결과 반환</text>

  <!-- 타임아웃 케이스 -->
  <rect x="460" y="110" width="360" height="160" fill="#11161f" stroke="#e05555" stroke-width="1.5" rx="10"/>
  <text x="640" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">시간 초과</text>
  <rect x="490" y="166" width="300" height="30" fill="#e05555" rx="4"/>
  <text x="640" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">작업 (10초, 끝나지 않음)</text>
  <rect x="490" y="206" width="150" height="2" fill="#555555"/>
  <text x="490" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제한 5초 |————|</text>
  <text x="490" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">→ 취소 + TimeoutError</text>
</svg>
