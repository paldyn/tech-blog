<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">structuredClone() — 깊은 복사</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">ES2022 — 얕은 복사 vs 깊은 복사</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#1e2433" stroke-width="1"/>

  <!-- Object structure diagram -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">원본 객체</text>

  <rect x="60" y="126" width="180" height="90" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="150" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">original</text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">name: 'Alice'</text>
  <text x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">scores: →</text>
  <text x="76" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">meta: →</text>

  <!-- Nested objects -->
  <rect x="280" y="152" width="140" height="40" fill="#1a1a2e" rx="6" stroke="#6a8aa0" stroke-width="1"/>
  <text x="350" y="176" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">[90, 85, 92]</text>

  <rect x="280" y="198" width="140" height="40" fill="#1a1a2e" rx="6" stroke="#6a8aa0" stroke-width="1"/>
  <text x="350" y="222" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">{ role: 'admin' }</text>

  <line x1="160" y1="184" x2="278" y2="176" stroke="#6a8aa0" stroke-width="1"/>
  <line x1="160" y1="200" x2="278" y2="218" stroke="#6a8aa0" stroke-width="1"/>

  <!-- Shallow copy -->
  <text x="60" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">얕은 복사 ({...obj}) — 위험</text>
  <rect x="60" y="276" width="180" height="90" fill="#1a0e0e" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="150" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">shallow</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">name: 'Alice'</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">scores: →</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">meta: →</text>

  <!-- Same nested objects (shared) -->
  <line x1="240" y1="334" x2="278" y2="176" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="240" y1="350" x2="278" y2="218" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">같은 참조 → 공유!</text>
  <text x="450" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">수정 시 원본도 변경됨</text>

  <!-- Deep clone -->
  <text x="60" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">깊은 복사 (structuredClone) — 안전</text>
  <rect x="60" y="408" width="180" height="35" fill="#0e1a0e" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="430" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">새 객체 + 새 중첩 객체</text>

  <text x="280" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">완전 독립 복사본 — 원본과 무관</text>

  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
