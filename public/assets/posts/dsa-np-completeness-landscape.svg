<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">P ⊆ NP, 그리고 NP-완전 / NP-난해</text>

  <!-- left: P != NP world -->
  <text x="270" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">P ≠ NP 가정 시</text>

  <!-- NP big ellipse -->
  <ellipse cx="270" cy="270" rx="190" ry="130" fill="#7ec8e311" stroke="#7ec8e3" stroke-width="2"/>
  <text x="270" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">NP</text>

  <!-- P ellipse inside -->
  <ellipse cx="210" cy="300" rx="100" ry="75" fill="#55c55522" stroke="#55c555" stroke-width="2"/>
  <text x="190" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">P</text>

  <!-- NP-complete band on the boundary -->
  <ellipse cx="360" cy="230" rx="78" ry="58" fill="#e0555522" stroke="#e05555" stroke-width="2"/>
  <text x="372" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">NP-완전</text>
  <text x="372" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">(NP ∩ NP-hard)</text>

  <!-- right: definitions -->
  <rect x="500" y="110" width="320" height="68" rx="6" fill="#000000" stroke="#55c555" stroke-width="2"/>
  <text x="516" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">P</text>
  <text x="516" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">다항 시간에 풀 수 있는 문제</text>

  <rect x="500" y="190" width="320" height="68" rx="6" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
  <text x="516" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">NP</text>
  <text x="516" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">답을 다항 시간에 검증 가능</text>

  <rect x="500" y="270" width="320" height="68" rx="6" fill="#000000" stroke="#e05555" stroke-width="2"/>
  <text x="516" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555" font-weight="600">NP-완전 (NP-complete)</text>
  <text x="516" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">NP 안에서 가장 어려운 문제들</text>

  <rect x="500" y="350" width="320" height="68" rx="6" fill="#000000" stroke="#e8a855" stroke-width="2"/>
  <text x="516" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8a855" font-weight="600">NP-난해 (NP-hard)</text>
  <text x="516" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">NP만큼 어렵다 (NP 밖일 수도)</text>

  <text x="270" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">NP-완전 하나라도 P에 들어가면 P = NP</text>
</svg>
