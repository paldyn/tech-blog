<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 상태 코드 5개 범주</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">3자리 숫자 — 첫 자리가 범주를 결정</text>

  <!-- 1xx -->
  <rect x="60" y="90" width="740" height="60" rx="6" fill="#0d1117" stroke="#9aa4b8" stroke-width="1.5"/>
  <rect x="60" y="90" width="8" height="60" rx="4" fill="#9aa4b8"/>
  <text x="90" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#9aa4b8">1xx</text>
  <text x="146" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">정보 (Informational)</text>
  <text x="146" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">요청 수신·처리 중 — 100 Continue, 101 Switching Protocols</text>
  <text x="700" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#9aa4b8" text-anchor="middle">100–199</text>

  <!-- 2xx -->
  <rect x="60" y="162" width="740" height="60" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <rect x="60" y="162" width="8" height="60" rx="4" fill="#55c555"/>
  <text x="90" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#55c555">2xx</text>
  <text x="146" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">성공 (Successful)</text>
  <text x="146" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">요청 수신·이해·수락 완료 — 200 OK, 201 Created, 204 No Content</text>
  <text x="700" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#55c555" text-anchor="middle">200–299</text>

  <!-- 3xx -->
  <rect x="60" y="234" width="740" height="60" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="60" y="234" width="8" height="60" rx="4" fill="#ce9178"/>
  <text x="90" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#ce9178">3xx</text>
  <text x="146" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">리다이렉션 (Redirection)</text>
  <text x="146" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">추가 조치 필요 — 301 Moved Permanently, 302 Found, 304 Not Modified</text>
  <text x="700" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#ce9178" text-anchor="middle">300–399</text>

  <!-- 4xx -->
  <rect x="60" y="306" width="740" height="60" rx="6" fill="#1a0f00" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="306" width="8" height="60" rx="4" fill="#e05555"/>
  <text x="90" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e05555">4xx</text>
  <text x="146" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">클라이언트 오류 (Client Error)</text>
  <text x="146" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">잘못된 요청 — 400 Bad Request, 401 Unauthorized, 403 Forbidden, 404 Not Found</text>
  <text x="700" y="343" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#e05555" text-anchor="middle">400–499</text>

  <!-- 5xx -->
  <rect x="60" y="378" width="740" height="60" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="60" y="378" width="8" height="60" rx="4" fill="#7777cc"/>
  <text x="90" y="405" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7777cc">5xx</text>
  <text x="146" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">서버 오류 (Server Error)</text>
  <text x="146" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버 처리 실패 — 500 Internal Server Error, 502 Bad Gateway, 503 Service Unavailable</text>
  <text x="700" y="415" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7777cc" text-anchor="middle">500–599</text>

  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">4xx = 클라이언트가 고쳐야 · 5xx = 서버가 고쳐야 — 이 구분이 디버깅의 출발점</text>
  <text x="440" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">모르는 코드면 첫 자리만 보고 범주 파악 가능 (예: 299 → 2xx 성공)</text>
</svg>
