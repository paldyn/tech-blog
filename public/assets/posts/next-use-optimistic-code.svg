<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">useOptimistic — 좋아요 버튼 예제</text>

  <!-- Left: Client component -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">PostLike.tsx (Client Component)</text>
  <rect x="60" y="88" width="380" height="320" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="108" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#ce9178">'use client'</tspan>
  </text>
  <text x="76" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { useOptimistic, useTransition } </tspan>
  </text>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ce9178"> 'react'</tspan>
  </text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { toggleLike } </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ce9178"> '@/actions/likes'</tspan>
  </text>
  <text x="76" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> </text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> Props = { postId: string; liked: boolean; count: number }</tspan>
  </text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">export function</tspan><tspan fill="#ffffff"> PostLike({ postId, liked, count }: Props) {</tspan>
  </text>
  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [isPending, startTransition] = useTransition()</tspan>
  </text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [optimistic, setOptimistic] =</tspan>
  </text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    useOptimistic({ liked, count }, (cur, next) =&gt; next)</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> </text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  function</tspan><tspan fill="#ffffff"> handleClick() {</tspan>
  </text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    startTransition(async () =&gt; {</text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">      setOptimistic({ liked: !optimistic.liked,</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">        count: optimistic.count + (optimistic.liked ? -1 : 1) })</text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">      await toggleLike(postId)</text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    })</text>

  <!-- Right: explanation -->
  <text x="480" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">동작 설명</text>

  <rect x="480" y="90" width="360" height="100" rx="6" fill="#0f1f0f" stroke="#2a5a2a" stroke-width="1"/>
  <text x="500" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">서버 응답 전 즉시 반영</text>
  <text x="500" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">setOptimistic 호출 → 즉시 UI 업데이트</text>
  <text x="500" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버 완료 → props 기반 실제값으로 확정</text>
  <text x="500" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버 오류 → 자동으로 원래 state로 롤백</text>

  <rect x="480" y="206" width="360" height="80" rx="6" fill="#1a1a0f" stroke="#4a4a1a" stroke-width="1"/>
  <text x="500" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0a030">updateFn 시그니처</text>
  <text x="500" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(currentState, optimisticValue) =&gt; newState</text>
  <text x="500" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">순수 함수여야 함 (부수 효과 없음)</text>

  <rect x="480" y="302" width="360" height="80" rx="6" fill="#1a0f1a" stroke="#4a1a4a" stroke-width="1"/>
  <text x="500" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">startTransition 필수</text>
  <text x="500" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useOptimistic는 startTransition 내부에서</text>
  <text x="500" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">setOptimistic를 호출해야 올바르게 동작함</text>

  <!-- Bottom tip -->
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">optimisticState는 렌더링에만 사용 — 실제 데이터는 props/state에서 관리</text>
</svg>
