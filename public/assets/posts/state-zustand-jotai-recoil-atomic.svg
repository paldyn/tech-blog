<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="background:#0a0a0a" rx="12">
  <defs>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-purple" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#b07ec8"/>
    </marker>
    <marker id="arrow-yellow" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#e8c55a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="45" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Atomic 상태 관리 — Jotai 파생 Atom</text>

  <!-- ===== BASE ATOMS (left column) ===== -->

  <!-- priceAtom -->
  <rect x="80" y="100" width="140" height="50" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="150" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">priceAtom</text>
  <text x="150" y="140" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">₩15,000</text>

  <!-- quantityAtom -->
  <rect x="80" y="200" width="140" height="50" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="150" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">quantityAtom</text>
  <text x="150" y="240" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">3</text>

  <!-- taxRateAtom -->
  <rect x="80" y="300" width="140" height="50" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="150" y="322" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">taxRateAtom</text>
  <text x="150" y="340" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">0.1</text>

  <!-- Column label -->
  <text x="150" y="82" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본 Atom</text>

  <!-- ===== DERIVED ATOMS (center column) ===== -->

  <!-- subtotalAtom -->
  <rect x="320" y="150" width="160" height="50" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="400" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">subtotalAtom</text>
  <text x="400" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">price × qty</text>

  <!-- taxAtom -->
  <rect x="320" y="265" width="160" height="50" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="400" y="287" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">taxAtom</text>
  <text x="400" y="305" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">subtotal × rate</text>

  <!-- Column label -->
  <text x="400" y="135" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파생 Atom</text>

  <!-- ===== FINAL ATOM (right of center) ===== -->

  <!-- totalAtom -->
  <rect x="560" y="200" width="160" height="50" fill="#1a0a1a" stroke="#b07ec8" stroke-width="1.5" rx="6"/>
  <text x="640" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b07ec8">totalAtom</text>
  <text x="640" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">subtotal + tax</text>

  <!-- Column label -->
  <text x="640" y="185" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">집계 Atom</text>

  <!-- ===== COMPONENT (far right) ===== -->

  <rect x="760" y="188" width="82" height="74" fill="#111111" stroke="#e8c55a" stroke-width="1.5" rx="6"/>
  <text x="801" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c55a">Cart</text>
  <text x="801" y="236" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Component</text>

  <!-- Column label -->
  <text x="801" y="173" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컴포넌트</text>

  <!-- ===== ARROWS ===== -->

  <!-- priceAtom → subtotalAtom -->
  <line x1="221" y1="125" x2="316" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- quantityAtom → subtotalAtom -->
  <line x1="221" y1="225" x2="316" y2="195" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- subtotalAtom → taxAtom -->
  <line x1="400" y1="201" x2="400" y2="261" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- taxRateAtom → taxAtom -->
  <line x1="221" y1="325" x2="316" y2="305" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- subtotalAtom → totalAtom -->
  <line x1="481" y1="175" x2="556" y2="218" stroke="#b07ec8" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- taxAtom → totalAtom -->
  <line x1="481" y1="290" x2="556" y2="242" stroke="#b07ec8" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- totalAtom → Cart Component -->
  <line x1="721" y1="225" x2="756" y2="225" stroke="#e8c55a" stroke-width="2" marker-end="url(#arrow-yellow)"/>
</svg>
