<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GC 관점의 JVM 메모리 지도</text>

  <text x="310" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Heap — GC가 관리</text>
  <text x="710" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">Non-Heap — GC 직접 대상 아님</text>

  <!-- Heap container -->
  <rect x="60" y="90" width="500" height="256" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>

  <!-- Young Generation -->
  <rect x="80" y="110" width="210" height="222" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="185" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Young Generation</text>

  <rect x="95" y="150" width="180" height="80" rx="6" fill="#0d1420" stroke="#7ec8e3" stroke-width="1"/>
  <text x="185" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">Eden</text>
  <text x="185" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새 객체가 태어나는 곳</text>

  <rect x="95" y="250" width="85" height="70" rx="6" fill="#0d1420" stroke="#7ec8e3" stroke-width="1"/>
  <text x="137" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">S0</text>
  <text x="137" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Survivor</text>

  <rect x="190" y="250" width="85" height="70" rx="6" fill="#0d1420" stroke="#7ec8e3" stroke-width="1"/>
  <text x="232" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">S1</text>
  <text x="232" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Survivor</text>

  <!-- Old Generation -->
  <rect x="310" y="110" width="230" height="222" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="425" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">Old Generation</text>
  <text x="425" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">오래 살아남은 객체</text>
  <text x="425" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">승격(promotion)으로 유입</text>
  <text x="425" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Major GC의 대상</text>

  <!-- Non-heap column -->
  <rect x="600" y="90" width="220" height="72" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="710" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Metaspace</text>
  <text x="710" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클래스 메타데이터 (네이티브)</text>

  <rect x="600" y="182" width="220" height="72" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="710" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Code Cache</text>
  <text x="710" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JIT 컴파일된 네이티브 코드</text>

  <rect x="600" y="274" width="220" height="72" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="710" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Thread Stacks</text>
  <text x="710" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스레드별 프레임·지역 변수</text>

  <!-- Bottom note -->
  <rect x="60" y="386" width="760" height="84" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="414" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">GC가 청소하는 것은 Heap의 객체</text>
  <text x="440" y="440" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스택 프레임은 메서드 리턴과 함께, Metaspace는 클래스 언로드 시 해제 —</text>
  <text x="440" y="458" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GC 튜닝·로그 분석의 무대는 거의 전부 Heap의 세대 구조다</text>
</svg>
