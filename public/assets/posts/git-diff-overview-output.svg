<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git diff 출력 읽기</text>

  <!-- Output block -->
  <rect x="60" y="68" width="760" height="252" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>

  <text x="76" y="90" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">diff --git a/src/app.js b/src/app.js</text>
  <text x="76" y="108" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">index 3a4b5c..8d9e0f 100644</text>
  <text x="76" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">--- a/src/app.js</text>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">+++ b/src/app.js</text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">@@ -10,7 +10,8 @@</text>
  <text x="76" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> function greet(name) {</text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">-  console.log('Hello ' + name);</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">+  const msg = `Hello, ${name}!`;</text>
  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">+  console.log(msg);</text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> }</text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> </text>

  <!-- Annotations -->
  <line x1="660" y1="88" x2="800" y2="88" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="670" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">파일 헤더</text>

  <line x1="660" y1="162" x2="800" y2="162" stroke="#7777cc" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="670" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">hunk 헤더 (범위)</text>

  <line x1="660" y1="198" x2="800" y2="198" stroke="#e05555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="670" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">삭제된 줄</text>

  <line x1="660" y1="225" x2="800" y2="225" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="670" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">추가된 줄</text>

  <!-- Useful options -->
  <rect x="60" y="340" width="760" height="60" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">git diff --stat       </text>
  <text x="310" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"># 파일별 변경 통계</text>
  <text x="80" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">git diff --word-diff  </text>
  <text x="310" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"># 단어 단위 diff</text>
</svg>
