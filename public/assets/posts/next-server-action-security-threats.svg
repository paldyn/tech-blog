<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Server Action 보안 위협과 대응</text>

  <!-- Column headers -->
  <text x="200" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">위협</text>
  <text x="640" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">대응 방법</text>
  <line x1="420" y1="68" x2="420" y2="420" stroke="#333" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="60" y="90" width="340" height="70" rx="6" fill="#2a1a1a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">미인증 접근</text>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로그인 없이 Server Action 직접 호출</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">curl/fetch로 POST /action 요청</text>

  <rect x="440" y="90" width="380" height="70" rx="6" fill="#0f2e0f" stroke="#2a6e2a" stroke-width="1"/>
  <text x="460" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">서버에서 세션/토큰 검증</text>
  <text x="460" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">cookies()로 세션 확인, auth() 미들웨어 적용</text>
  <text x="460" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">미인증 시 즉시 throw Error or redirect</text>

  <!-- Row 2 -->
  <rect x="60" y="174" width="340" height="70" rx="6" fill="#2a1a1a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">권한 없는 리소스 접근 (IDOR)</text>
  <text x="80" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타인의 postId로 수정·삭제 요청</text>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">URL 파라미터 조작</text>

  <rect x="440" y="174" width="380" height="70" rx="6" fill="#0f2e0f" stroke="#2a6e2a" stroke-width="1"/>
  <text x="460" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">소유권 서버 검증</text>
  <text x="460" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">WHERE id=? AND userId=currentUserId 조회</text>
  <text x="460" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클라이언트의 userId 파라미터 신뢰 금지</text>

  <!-- Row 3 -->
  <rect x="60" y="258" width="340" height="70" rx="6" fill="#2a1a1a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">CSRF (교차 사이트 요청 위조)</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">다른 사이트에서 Server Action 호출 유도</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자 모르게 액션 실행</text>

  <rect x="440" y="258" width="380" height="70" rx="6" fill="#0f2e0f" stroke="#2a6e2a" stroke-width="1"/>
  <text x="460" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Next.js 자동 보호 + Origin 검사</text>
  <text x="460" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Next.js 14.2+: Origin 헤더 자동 검증</text>
  <text x="460" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">추가: SameSite=Strict 쿠키 설정</text>

  <!-- Row 4 -->
  <rect x="60" y="342" width="340" height="70" rx="6" fill="#2a1a1a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Rate Limiting 부재</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자동화 봇의 대량 요청으로 서버 과부하</text>
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DB 오염 / 이메일 스팸 발송</text>

  <rect x="440" y="342" width="380" height="70" rx="6" fill="#0f2e0f" stroke="#2a6e2a" stroke-width="1"/>
  <text x="460" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">upstash/ratelimit or 미들웨어</text>
  <text x="460" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IP/사용자별 요청 횟수 제한</text>
  <text x="460" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">민감 액션(회원가입, 비밀번호 변경)에 적용</text>

  <!-- Bottom note -->
  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Server Action은 공개 API 엔드포인트로 취급하라 — 항상 서버에서 인증/인가/검증</text>
</svg>
