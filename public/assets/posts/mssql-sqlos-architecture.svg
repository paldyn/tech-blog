<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL Server SQLOS 아키텍처</text>

  <!-- Layer labels -->
  <!-- Top: SQL Server Engine -->
  <rect x="60" y="65" width="760" height="70" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">SQL Server 엔진 계층</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Query Processor · Storage Engine · Access Methods · Buffer Manager</text>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Lock Manager · Log Manager · Transaction Manager</text>

  <!-- SQLOS layer -->
  <rect x="60" y="150" width="760" height="170" rx="8" fill="#0a1520" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">SQLOS (SQL Server Operating System)</text>

  <!-- SQLOS sub-components -->
  <rect x="80" y="185" width="160" height="50" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">스케줄러</text>
  <text x="160" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">UMS (User Mode Scheduler)</text>

  <rect x="260" y="185" width="160" height="50" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="340" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">메모리 관리</text>
  <text x="340" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Buffer Pool · MemClerks</text>

  <rect x="440" y="185" width="160" height="50" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="520" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">I/O 서브시스템</text>
  <text x="520" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비동기 I/O 큐</text>

  <rect x="620" y="185" width="180" height="50" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">동기화 오브젝트</text>
  <text x="710" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Latch · Spinlock · Mutex</text>

  <!-- Second row SQLOS -->
  <rect x="80" y="248" width="160" height="50" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">태스크·워커</text>
  <text x="160" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Worker Thread Pool</text>

  <rect x="260" y="248" width="160" height="50" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="340" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">타이머·예외처리</text>
  <text x="340" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SEH 기반 예외</text>

  <rect x="440" y="248" width="360" height="50" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">진단 · NUMA 인식</text>
  <text x="620" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DMV 통계 수집 · NUMA 노드별 스케줄러 배치</text>

  <!-- Windows OS layer -->
  <rect x="60" y="335" width="760" height="60" rx="8" fill="#1a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Windows OS / Linux (SQL Server 2017+)</text>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Win32 API · NTFS · TCP/IP · Virtual Memory</text>

  <!-- Arrows between layers -->
  <line x1="440" y1="135" x2="440" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="320" x2="440" y2="333" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Code block -->
  <rect x="60" y="415" width="760" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- SQLOS 스케줄러 상태 조회</text>
  <text xml:space="preserve" x="80" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> scheduler_id, cpu_id, status, runnable_tasks_count,</tspan></text>
  <text xml:space="preserve" x="80" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">       current_tasks_count, work_queue_count </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> sys.dm_os_schedulers;</tspan></text>
</svg>
