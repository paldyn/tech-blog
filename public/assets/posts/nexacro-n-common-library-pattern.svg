<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">공통 라이브러리 파일 구성 예시</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">프로젝트 내 common/ 폴더 레이아웃</text>

  <!-- Left: file tree -->
  <rect x="60" y="95" width="340" height="290" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">project/</text>
  <text x="80" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">├─ common/</text>
  <text x="80" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">│  ├─ gfn_string.xjs</text>
  <text x="80" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">│  ├─ gfn_date.xjs</text>
  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">│  ├─ gfn_number.xjs</text>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">│  ├─ gfn_validate.xjs</text>
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">│  ├─ gfn_transaction.xjs</text>
  <text x="80" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">│  ├─ CommonVariables.xjs</text>
  <text x="80" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8a840" xml:space="preserve">│  ├─ gfn_confirm.xfdl</text>
  <text x="80" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" xml:space="preserve">│  └─ BaseForm.xfdl</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">└─ screens/</text>
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">   ├─ SCR001.xfdl</text>
  <text x="80" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">   └─ SCR002.xfdl</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" xml:space="preserve">※ 파일명은 프로젝트 관례에 따라 달라질 수 있음</text>

  <!-- Right: legend -->
  <rect x="480" y="95" width="340" height="290" rx="8" fill="#111" stroke="#3a4a6e"/>
  <text x="500" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">파일 역할 설명</text>

  <rect x="500" y="135" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="520" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">gfn_*.xjs</text>
  <text x="520" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">도메인별 전역 함수 묶음</text>
  <text x="520" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(문자열·날짜·숫자·유효성·트랜잭션)</text>

  <rect x="500" y="196" width="12" height="12" rx="2" fill="#7ec8e3"/>
  <text x="520" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">CommonVariables.xjs</text>
  <text x="520" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전 화면이 공유하는 전역 변수</text>
  <text x="520" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(사용자 세션, 코드 목록 등)</text>

  <rect x="500" y="257" width="12" height="12" rx="2" fill="#e8a840"/>
  <text x="520" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">gfn_confirm.xfdl</text>
  <text x="520" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공통 confirm/alert 팝업 폼</text>

  <rect x="500" y="302" width="12" height="12" rx="2" fill="#7777cc"/>
  <text x="520" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">BaseForm.xfdl</text>
  <text x="520" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 업무 폼이 상속할 기본 폼</text>
  <text x="520" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(공통 이벤트·공통 버튼 포함)</text>
