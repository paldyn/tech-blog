<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GitHub Actions Docker 워크플로 구조</text>

  <!-- Trigger -->
  <rect x="60" y="80" width="760" height="50" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">트리거</text>
  <text x="200" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">on: push (main), pull_request, workflow_dispatch, schedule</text>

  <!-- Arrow down -->
  <line x1="440" y1="130" x2="440" y2="154" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Job: build-and-push -->
  <rect x="60" y="158" width="760" height="256" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Job: build-and-push (runs-on: ubuntu-latest)</text>

  <!-- Steps inside job -->
  <rect x="80" y="194" width="340" height="46" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Step 1: Checkout</text>
  <text x="100" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">actions/checkout@v4</text>

  <rect x="460" y="194" width="340" height="46" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Step 2: Set up Docker Buildx</text>
  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">docker/setup-buildx-action@v3</text>

  <rect x="80" y="252" width="340" height="46" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Step 3: Login to Registry</text>
  <text x="100" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">docker/login-action@v3 (secrets 사용)</text>

  <rect x="460" y="252" width="340" height="46" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Step 4: Extract Metadata</text>
  <text x="480" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">docker/metadata-action@v5 (태그 자동 생성)</text>

  <rect x="80" y="310" width="720" height="46" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Step 5: Build and Push</text>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">docker/build-push-action@v5 — 빌드 + 레지스트리 푸시 + 캐시 설정 통합</text>

  <rect x="80" y="368" width="720" height="36" rx="6" fill="#0a0a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">secrets: DOCKERHUB_TOKEN, DOCKERHUB_USERNAME (Settings → Secrets → Actions)</text>

  <!-- Arrow down to result -->
  <line x1="440" y1="414" x2="440" y2="434" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Result -->
  <rect x="60" y="438" width="760" height="10" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
</svg>
