<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">로케일 / 인코딩 문제 트러블슈팅</text>

  <!-- Start -->
  <rect x="240" y="60" width="340" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="410" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">텍스트 깨짐 / 한글 문자 오류</text>
  <text x="410" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모지바케 · ??? · 이상한 특수문자 출력</text>

  <line x1="410" y1="120" x2="410" y2="144" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 1: locale -->
  <rect x="240" y="146" width="340" height="60" rx="8" fill="#0f1f30" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="410" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① locale 명령 — 현재 설정 확인</text>
  <text x="410" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">LANG · LC_ALL · LC_CTYPE 값 점검</text>
  <line x1="580" y1="176" x2="628" y2="176" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="584" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">C 또는 POSIX</text>
  <rect x="630" y="152" width="200" height="48" rx="6" fill="#200a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="730" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">UTF-8 로케일 설정</text>
  <text x="730" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">LANG=ko_KR.UTF-8</text>

  <line x1="410" y1="206" x2="410" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: locale -a -->
  <rect x="240" y="232" width="340" height="60" rx="8" fill="#0f1f30" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="410" y="256" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② locale -a — 설치된 로케일 확인</text>
  <text x="410" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ko_KR.UTF-8 설치 여부 확인</text>
  <line x1="580" y1="262" x2="628" y2="262" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="584" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">미설치</text>
  <rect x="630" y="238" width="200" height="48" rx="6" fill="#200a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="730" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">로케일 생성</text>
  <text x="730" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">locale-gen ko_KR.UTF-8</text>

  <line x1="410" y1="292" x2="410" y2="316" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: file encoding -->
  <rect x="240" y="318" width="340" height="60" rx="8" fill="#0f1f30" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="410" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">③ file 명령 — 파일 인코딩 확인</text>
  <text x="410" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">EUC-KR / UTF-8 / ISO-8859 구분</text>
  <line x1="580" y1="348" x2="628" y2="348" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="584" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">EUC-KR 등</text>
  <rect x="630" y="324" width="200" height="48" rx="6" fill="#200a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="730" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">iconv 변환</text>
  <text x="730" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">EUC-KR → UTF-8</text>

  <line x1="410" y1="378" x2="410" y2="402" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: terminal -->
  <rect x="240" y="404" width="340" height="60" rx="8" fill="#0f1f30" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="410" y="428" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">④ 터미널 인코딩 확인</text>
  <text x="410" y="450" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">터미널 설정 → UTF-8 인코딩 맞추기</text>

  <line x1="410" y1="464" x2="410" y2="488" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- End -->
  <rect x="240" y="490" width="340" height="20" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="410" y="504" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">한글 정상 출력 확인</text>
</svg>
