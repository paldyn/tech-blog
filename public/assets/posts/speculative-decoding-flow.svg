<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">투기적 디코딩 동작 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Draft Model이 제안 → Target Model이 병렬 검증</text>

  <!-- Step 1: Draft generates K tokens -->
  <rect x="60" y="96" width="240" height="90" rx="6" fill="#151c24" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">① Draft Model 실행</text>
  <text x="180" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">소형 모델 (예: 7B)</text>
  <text x="180" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">K개 토큰 자기회귀 생성</text>
  <text x="180" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">"the cat sat on"</text>

  <!-- Arrow 1→2 -->
  <line x1="300" y1="141" x2="348" y2="141" stroke="#444" stroke-width="2"/>
  <polygon points="348,135 360,141 348,147" fill="#444"/>

  <!-- Step 2: Target verifies in parallel -->
  <rect x="360" y="96" width="240" height="90" rx="6" fill="#20181a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">② Target Model 검증</text>
  <text x="480" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">대형 모델 (예: 70B)</text>
  <text x="480" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">K+1 위치 동시 Forward Pass</text>
  <text x="480" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">1번의 Forward = K+1 토큰 검증</text>

  <!-- Arrow 2→3 -->
  <line x1="600" y1="141" x2="648" y2="141" stroke="#444" stroke-width="2"/>
  <polygon points="648,135 660,141 648,147" fill="#444"/>

  <!-- Step 3: Accept/Reject -->
  <rect x="660" y="96" width="160" height="90" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">③ 수락/거부</text>
  <text x="740" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">✓ 수락된 토큰</text>
  <text x="740" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">✗ 거부 시 재샘플</text>
  <text x="740" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">품질 동일 보장</text>

  <!-- Token acceptance visualization -->
  <rect x="60" y="216" width="760" height="70" rx="6" fill="#111" stroke="#222"/>
  <text x="80" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">토큰 수락 과정 예시 (K=4)</text>
  <!-- Tokens -->
  <rect x="80" y="248" width="52" height="28" rx="4" fill="#1a3a1a" stroke="#55c555"/>
  <text x="106" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">"the" ✓</text>
  <rect x="140" y="248" width="52" height="28" rx="4" fill="#1a3a1a" stroke="#55c555"/>
  <text x="166" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">"cat" ✓</text>
  <rect x="200" y="248" width="52" height="28" rx="4" fill="#1a3a1a" stroke="#55c555"/>
  <text x="226" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">"sat" ✓</text>
  <rect x="260" y="248" width="52" height="28" rx="4" fill="#1a1020" stroke="#e05555"/>
  <text x="286" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">"in" ✗</text>
  <rect x="330" y="248" width="80" height="28" rx="4" fill="#151c24" stroke="#7ec8e3"/>
  <text x="370" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">"on" (재샘플)</text>
  <text x="450" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 이번 라운드: 3+1=4 토큰 출력</text>

  <!-- Code block -->
  <rect x="60" y="306" width="760" height="174" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 투기적 디코딩 수락 기준 (rejection sampling)</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">import</text>
  <text x="124" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> torch</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="100" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> accept_token(p_target, p_draft, token_id):</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">    # 수락 확률 = min(1, p_target / p_draft)</text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    ratio = p_target[token_id] / p_draft[token_id]</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    accept_prob = torch.clamp(ratio, max=</text>
  <text x="400" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1.0</text>
  <text x="424" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="76" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    if</text>
  <text x="104" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> torch.rand(</text>
  <text x="208" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="220" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">) &lt; accept_prob:</text>
  <text x="76" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return</text>
  <text x="148" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> token_id  </text>
  <text x="220" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 수락</text>
  <text x="76" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    return</text>
  <text x="148" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> resample(p_target - p_draft)  </text>
  <text x="388" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 거부 후 재샘플</text>
</svg>
