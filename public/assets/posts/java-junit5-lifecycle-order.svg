<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="lcA" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JUnit 5 테스트 생명주기</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">@BeforeAll → 각 테스트 → @AfterAll</text>

  <!-- BeforeAll -->
  <rect x="300" y="92" width="280" height="50" rx="8" fill="#0a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">@BeforeAll  (static · 한 번)</text>

  <line x1="440" y1="142" x2="440" y2="166" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lcA)"/>

  <!-- per-test loop box -->
  <rect x="120" y="170" width="640" height="170" rx="10" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="140" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">테스트 메서드마다 반복</text>

  <rect x="300" y="202" width="280" height="42" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">@BeforeEach</text>

  <line x1="440" y1="244" x2="440" y2="262" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lcA)"/>

  <rect x="300" y="266" width="280" height="42" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">@Test  (테스트 본문)</text>

  <line x1="580" y1="287" x2="650" y2="287" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lcA)"/>
  <rect x="630" y="266" width="118" height="42" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="689" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">@AfterEach</text>

  <line x1="440" y1="340" x2="440" y2="364" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lcA)"/>

  <!-- AfterAll -->
  <rect x="300" y="368" width="280" height="50" rx="8" fill="#0a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">@AfterAll  (static · 한 번)</text>
</svg>
