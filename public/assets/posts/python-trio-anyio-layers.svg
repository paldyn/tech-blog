<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="lyArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">AnyIO 는 공통 인터페이스다</text>

  <rect x="290" y="90" width="300" height="60" fill="#11161f" stroke="#7777cc" stroke-width="1.5" rx="10"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">내 코드 (AnyIO API)</text>
  <text x="440" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">한 번 작성하면 양쪽에서 동작</text>

  <path d="M 380 152 L 250 208" stroke="#7777cc" stroke-width="2" marker-end="url(#lyArr)"/>
  <path d="M 500 152 L 630 208" stroke="#7777cc" stroke-width="2" marker-end="url(#lyArr)"/>

  <rect x="120" y="212" width="260" height="60" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="250" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">asyncio 백엔드</text>
  <text x="250" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">표준 라이브러리</text>

  <rect x="500" y="212" width="260" height="60" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="630" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">Trio 백엔드</text>
  <text x="630" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">구조적 동시성</text>
