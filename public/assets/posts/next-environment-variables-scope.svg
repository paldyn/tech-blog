<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">환경 변수 노출 범위</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">서버 전용 vs 클라이언트 노출 — 보안의 핵심</text>

  <!-- Server only (left) -->
  <rect x="60" y="90" width="360" height="320" rx="10" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#55c555">서버 전용</text>
  <text x="240" y="142" text-anchor="middle" font-size="12" fill="#888">NODE.js 환경에서만 접근 가능</text>

  <rect x="80" y="158" width="320" height="40" rx="6" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="183" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">DATABASE_URL=postgres://...</text>

  <rect x="80" y="208" width="320" height="40" rx="6" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="233" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">SECRET_KEY=sk_live_...</text>

  <rect x="80" y="258" width="320" height="40" rx="6" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="283" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">API_SECRET=...</text>

  <text x="240" y="340" text-anchor="middle" font-size="12" fill="#55c555">Server Components, Route Handlers,</text>
  <text x="240" y="358" text-anchor="middle" font-size="12" fill="#55c555">Server Actions에서 사용 가능</text>
  <text x="240" y="390" text-anchor="middle" font-size="11" fill="#888">브라우저 번들에 포함되지 않음</text>

  <!-- Client exposed (right) -->
  <rect x="460" y="90" width="360" height="320" rx="10" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <text x="640" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#e05555">클라이언트 노출</text>
  <text x="640" y="142" text-anchor="middle" font-size="12" fill="#888">NEXT_PUBLIC_ 접두사 필수</text>

  <rect x="480" y="158" width="320" height="40" rx="6" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="183" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">NEXT_PUBLIC_API_URL=https://...</text>

  <rect x="480" y="208" width="320" height="40" rx="6" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="233" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">NEXT_PUBLIC_GA_ID=G-...</text>

  <rect x="480" y="258" width="320" height="40" rx="6" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="283" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">NEXT_PUBLIC_SITE_URL=...</text>

  <text x="640" y="340" text-anchor="middle" font-size="12" fill="#e05555">브라우저 JavaScript 번들에 인라인됨</text>
  <text x="640" y="358" text-anchor="middle" font-size="12" fill="#e05555">누구나 볼 수 있음 — 비밀값 절대 금지</text>
  <text x="640" y="390" text-anchor="middle" font-size="11" fill="#888">빌드 시 값이 소스코드에 삽입됨</text>
</svg>
