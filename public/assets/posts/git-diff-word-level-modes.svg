<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 290">
  <rect width="880" height="290" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">--word-diff 의 표시 모드</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">출력 방식과 단어를 나누는 경계를 고를 수 있다</text>

  <rect x="50" y="100" width="250" height="150" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="132" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">color</text>
  <text x="175" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">색으로만 구분</text>
  <text x="175" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">[-]{+} 기호 없음</text>
  <text x="175" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#55c555">터미널 읽기 좋음</text>

  <rect x="315" y="100" width="250" height="150" rx="10" fill="#101010" stroke="#9988dd" stroke-width="1.5"/>
  <text x="440" y="132" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#9988dd">plain</text>
  <text x="440" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">[-삭제-]{+추가+}</text>
  <text x="440" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">기본값</text>
  <text x="440" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#55c555">색 없이도 구분</text>

  <rect x="580" y="100" width="250" height="150" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="132" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">porcelain</text>
  <text x="705" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">기계 파싱용</text>
  <text x="705" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">스크립트 입력</text>
  <text x="705" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#55c555">안정적 포맷</text>
</svg>
