<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Bi 계열 함수형 인터페이스 — 두 입력 처리</text>

  <!-- BiFunction -->
  <text x="213" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">BiFunction&lt;T, U, R&gt;</text>

  <rect x="60" y="94" width="110" height="44" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="115" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">T (첫번째)</text>
  <text x="115" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력 1</text>

  <rect x="60" y="150" width="110" height="44" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="115" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">U (두번째)</text>
  <text x="115" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력 2</text>

  <line x1="170" y1="116" x2="228" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="170" y1="172" x2="228" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="230" y="116" width="128" height="52" rx="6" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="294" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">R apply(T t, U u)</text>
  <text x="294" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두 값 결합 → R</text>

  <line x1="358" y1="142" x2="408" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="410" y="116" width="110" height="52" rx="6" fill="#1a1a08" stroke="#e8c542" stroke-width="1"/>
  <text x="465" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c542" text-anchor="middle">R</text>
  <text x="465" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">결과</text>

  <!-- BiPredicate -->
  <text x="213" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">BiPredicate&lt;T, U&gt;</text>

  <rect x="60" y="236" width="110" height="44" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="115" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">T</text>
  <text x="115" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력 1</text>

  <rect x="60" y="292" width="110" height="44" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="115" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">U</text>
  <text x="115" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력 2</text>

  <line x1="170" y1="258" x2="228" y2="276" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="170" y1="314" x2="228" y2="298" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="230" y="258" width="128" height="52" rx="6" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="294" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">boolean test(T t, U u)</text>
  <text x="294" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두 값 조건 검사</text>

  <line x1="358" y1="284" x2="408" y2="284" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="410" y="258" width="110" height="52" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="465" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">boolean</text>
  <text x="465" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">true / false</text>

  <!-- BiConsumer -->
  <text x="213" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">BiConsumer&lt;T, U&gt;</text>

  <rect x="60" y="380" width="110" height="44" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="115" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">T</text>

  <rect x="60" y="436" width="110" height="30" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="115" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">U</text>

  <line x1="170" y1="402" x2="228" y2="416" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="170" y1="451" x2="228" y2="434" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="230" y="400" width="128" height="52" rx="6" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="294" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">void accept(T t, U u)</text>
  <text x="294" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두 값 소비</text>

  <line x1="358" y1="426" x2="408" y2="426" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="410" y="400" width="110" height="52" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="465" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">void</text>
  <text x="465" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">반환 없음</text>

  <!-- Right side: BinaryOperator -->
  <rect x="570" y="66" width="250" height="380" rx="10" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="695" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">파생 및 관련</text>

  <text x="585" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">BinaryOperator&lt;T&gt;</text>
  <text x="585" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">= BiFunction&lt;T, T, T&gt;</text>
  <text x="585" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">예: Integer::max, (a,b) -&gt; a+b</text>

  <line x1="585" y1="166" x2="810" y2="166" stroke="#222" stroke-width="1"/>

  <text x="585" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">ToIntBiFunction&lt;T,U&gt;</text>
  <text x="585" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">T, U -&gt; int (박싱 없음)</text>

  <line x1="585" y1="218" x2="810" y2="218" stroke="#222" stroke-width="1"/>

  <text x="585" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">andThen (BiFunction)</text>
  <text x="585" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">BiFunction.andThen(Function)</text>
  <text x="585" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">결과를 Function으로 추가 변환</text>

  <line x1="585" y1="288" x2="810" y2="288" stroke="#222" stroke-width="1"/>

  <text x="585" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">and / or / negate</text>
  <text x="585" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(BiPredicate)</text>
  <text x="585" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Predicate와 동일 조합 기능</text>

  <line x1="585" y1="360" x2="810" y2="360" stroke="#222" stroke-width="1"/>

  <text x="585" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Map.forEach()</text>
  <text x="585" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">BiConsumer를 파라미터로 받음</text>
  <text x="585" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">map.forEach((k,v) -&gt; ...)</text>

  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Bi 계열은 파라미터가 2개인 것 외에는 단일 파라미터 버전과 동일한 패턴</text>
</svg>
