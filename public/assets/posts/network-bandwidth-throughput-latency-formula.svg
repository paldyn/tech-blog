<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">전송 시간 계산 공식</text>

  <!-- Formula boxes -->
  <rect x="60" y="65" width="340" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">전송 지연</text>
  <text x="230" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle" xml:space="preserve">= 파일 크기 / 링크 속도</text>
  <text x="230" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" text-anchor="middle" xml:space="preserve">1GB / 1Gbps = 8초</text>
  <text x="230" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">(파일을 링크에 밀어넣는 시간)</text>

  <rect x="480" y="65" width="340" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="650" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle" xml:space="preserve">전파 지연</text>
  <text x="650" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle" xml:space="preserve">= 거리 / 전파 속도</text>
  <text x="650" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" text-anchor="middle" xml:space="preserve">18,000km / 2x10^5 km/s = 90ms</text>
  <text x="650" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">(신호가 매체를 통해 이동하는 시간)</text>

  <!-- Total latency formula -->
  <rect x="60" y="185" width="760" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle" xml:space="preserve">총 지연 = 전파 + 전송 + 처리 + 큐잉</text>
  <text x="440" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle" xml:space="preserve">예: 서울 → 뉴욕 180ms(전파) + 0.1ms(전송) + ~10ms(처리+큐잉)</text>
  <text x="440" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">= 약 190ms</text>

  <!-- Note -->
  <rect x="60" y="283" width="760" height="38" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대역폭을 높여도 전파 지연은 줄지 않는다. 큰 파일엔 대역폭이, 실시간 통신엔 낮은 지연이 더 중요하다.</text>
  <text x="440" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Bandwidth-Delay Product (BDP) = 대역폭 x 지연 → 파이프에 있는 비트 수</text>
</svg>
