<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ProcessPoolExecutor 코드 예제</text>

  <rect x="60" y="62" width="760" height="330" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text xml:space="preserve" x="84" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="120" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> concurrent.futures </text>
  <text xml:space="preserve" x="278" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="328" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ProcessPoolExecutor, as_completed</text>

  <text xml:space="preserve" x="84" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="112" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> heavy(n):</text>
  <text xml:space="preserve" x="84" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    return</text>
  <text xml:space="preserve" x="145" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> sum(i * i </text>
  <text xml:space="preserve" x="258" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">for</text>
  <text xml:space="preserve" x="286" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> i </text>
  <text xml:space="preserve" x="304" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">in</text>
  <text xml:space="preserve" x="324" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> range(n))</text>

  <text xml:space="preserve" x="84" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">if</text>
  <text xml:space="preserve" x="104" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> __name__ == </text>
  <text xml:space="preserve" x="220" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"__main__"</text>
  <text xml:space="preserve" x="310" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>

  <text xml:space="preserve" x="84" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &#35; map: 순서 보장 결과</text>
  <text xml:space="preserve" x="84" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    with</text>
  <text xml:space="preserve" x="128" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ProcessPoolExecutor(max_workers=</text>
  <text xml:space="preserve" x="434" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">4</text>
  <text xml:space="preserve" x="442" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">) </text>
  <text xml:space="preserve" x="460" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text>
  <text xml:space="preserve" x="482" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ex:</text>
  <text xml:space="preserve" x="84" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        results = list(ex.map(heavy, [</text>
  <text xml:space="preserve" x="440" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1_000_000</text>
  <text xml:space="preserve" x="526" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">] * </text>
  <text xml:space="preserve" x="554" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">8</text>
  <text xml:space="preserve" x="562" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">))</text>

  <text xml:space="preserve" x="84" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &#35; submit: 완료 순 처리</text>
  <text xml:space="preserve" x="84" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    with</text>
  <text xml:space="preserve" x="128" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ProcessPoolExecutor() </text>
  <text xml:space="preserve" x="322" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text>
  <text xml:space="preserve" x="344" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ex:</text>
  <text xml:space="preserve" x="84" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        futures = {ex.submit(heavy, n): n </text>
  <text xml:space="preserve" x="452" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">for</text>
  <text xml:space="preserve" x="482" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> n </text>
  <text xml:space="preserve" x="502" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">in</text>
  <text xml:space="preserve" x="522" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> [</text>
  <text xml:space="preserve" x="536" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">10000</text>
  <text xml:space="preserve" x="580" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text xml:space="preserve" x="596" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">20000</text>
  <text xml:space="preserve" x="640" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]}</text>
  <text xml:space="preserve" x="84" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">        for</text>
  <text xml:space="preserve" x="138" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> fut </text>
  <text xml:space="preserve" x="168" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">in</text>
  <text xml:space="preserve" x="188" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> as_completed(futures):</text>
  <text xml:space="preserve" x="84" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">            n = futures[fut]</text>
  <text xml:space="preserve" x="84" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">            print(</text>
  <text xml:space="preserve" x="172" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">f"n={n}: {fut.result()}"</text>
  <text xml:space="preserve" x="346" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text xml:space="preserve" x="84" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &#35; 완료된 것부터 출력 (순서 비보장)</text>
</svg>
