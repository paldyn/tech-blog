<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 밴드별 스타일 영역</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">head · body · summary · footer 스타일 분리 설정</text>

  <!-- Grid mock -->
  <rect x="60" y="90" width="760" height="320" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Head band -->
  <rect x="60" y="90" width="760" height="54" fill="#1a2744" rx="8"/>
  <rect x="60" y="120" width="760" height="24" fill="#1a2744"/>
  <text x="92" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">사번</text>
  <text x="230" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">성명</text>
  <text x="400" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">부서</text>
  <text x="570" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">급여</text>
  <text x="720" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">재직</text>
  <line x1="60" y1="144" x2="820" y2="144" stroke="#253555" stroke-width="1"/>

  <!-- Band label: head -->
  <rect x="62" y="92" width="56" height="20" fill="#2a3f6e" rx="4"/>
  <text x="90" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">head</text>

  <!-- Body band: row 1 (odd) -->
  <rect x="60" y="144" width="760" height="36" fill="#0e1420"/>
  <text x="92" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">EMP001</text>
  <text x="230" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">홍길동</text>
  <text x="400" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">개발1팀</text>
  <text x="570" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">4,500,000</text>
  <text x="730" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Y</text>
  <line x1="60" y1="180" x2="820" y2="180" stroke="#1a2030" stroke-width="1"/>

  <!-- Body band: row 2 (even) -->
  <rect x="60" y="180" width="760" height="36" fill="#111827"/>
  <text x="92" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">EMP002</text>
  <text x="230" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">김철수</text>
  <text x="400" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">기획팀</text>
  <text x="570" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">3,800,000</text>
  <text x="730" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Y</text>
  <line x1="60" y1="216" x2="820" y2="216" stroke="#1a2030" stroke-width="1"/>

  <!-- Body band: row 3 (selected) -->
  <rect x="60" y="216" width="760" height="36" fill="#1d3a6e"/>
  <text x="92" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">EMP003</text>
  <text x="230" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">이영희</text>
  <text x="400" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">인사팀</text>
  <text x="570" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="end">4,100,000</text>
  <text x="730" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Y</text>
  <rect x="60" y="216" width="4" height="36" fill="#7ec8e3"/>
  <line x1="60" y1="252" x2="820" y2="252" stroke="#2a4a8e" stroke-width="1"/>

  <!-- Band label: body -->
  <rect x="740" y="146" width="38" height="20" fill="#1d3050" rx="4"/>
  <text x="759" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#88aadd" text-anchor="middle">body</text>

  <!-- Body band: row 4 (odd) -->
  <rect x="60" y="252" width="760" height="36" fill="#0e1420"/>
  <text x="92" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">EMP004</text>
  <text x="230" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">박민수</text>
  <text x="400" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">영업팀</text>
  <text x="570" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="end">3,600,000</text>
  <text x="730" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">N</text>
  <line x1="60" y1="288" x2="820" y2="288" stroke="#1a2030" stroke-width="1"/>

  <!-- Summary band -->
  <rect x="60" y="324" width="760" height="36" fill="#162030"/>
  <text x="92" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">소계</text>
  <text x="570" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="end">15,000,000</text>
  <line x1="60" y1="360" x2="820" y2="360" stroke="#253555" stroke-width="1"/>

  <!-- Footer band -->
  <rect x="60" y="360" width="760" height="50" fill="#1a2033" rx="0"/>
  <rect x="60" y="380" width="760" height="30" fill="#1a2033"/>
  <text x="92" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a030">합계</text>
  <text x="570" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a030" text-anchor="end">15,000,000</text>

  <!-- Band label: summary -->
  <rect x="740" y="326" width="68" height="20" fill="#253555" rx="4"/>
  <text x="774" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7777cc" text-anchor="middle">summary</text>

  <!-- Band label: footer -->
  <rect x="740" y="362" width="54" height="20" fill="#253040" rx="4"/>
  <text x="767" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e0a030" text-anchor="middle">footer</text>

  <!-- Legend -->
  <rect x="60" y="428" width="760" height="20" fill="none"/>
  <rect x="80" y="430" width="14" height="10" fill="#0e1420" rx="2"/>
  <text x="100" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">홀수 행 (odd)</text>
  <rect x="220" y="430" width="14" height="10" fill="#111827" rx="2"/>
  <text x="240" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">짝수 행 (even)</text>
  <rect x="380" y="430" width="14" height="10" fill="#1d3a6e" rx="2"/>
  <text x="400" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">선택 행 (selected)</text>
  <rect x="560" y="430" width="14" height="10" fill="#888" rx="2"/>
  <text x="580" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비활성 행 (disabled)</text>
</svg>
