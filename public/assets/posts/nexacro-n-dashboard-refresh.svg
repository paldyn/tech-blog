<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">자동 갱신 패턴 — setInterval</text>

  <!-- Code block -->
  <rect x="60" y="68" width="500" height="300" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">var</text><text x="104" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> g_timerId = null;</text>
  <text x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">var</text><text x="104" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> INTERVAL = </text><text x="202" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">60000</text><text x="242" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;  </text><text x="272" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 1분</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text><text x="150" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> Form_onload(obj, e) {</text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    fn_loadAll();</text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    g_timerId = application.setInterval(</text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">        "fn_loadAll()"</text><text x="202" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, INTERVAL);</text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text><text x="150" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> Form_onunload(obj, e) {</text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    if</text><text x="104" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (g_timerId != null) {</text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        application.clearInterval(g_timerId);</text>
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        g_timerId = null;</text>
  <text x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    }</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Right: timeline -->
  <rect x="580" y="68" width="260" height="300" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="710" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">실행 흐름</text>
  <circle cx="620" cy="120" r="6" fill="#55c555"/>
  <text x="634" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Form_onload</text>
  <line x1="620" y1="126" x2="620" y2="156" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="620" cy="162" r="6" fill="#55c555"/>
  <text x="634" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">fn_loadAll() 즉시</text>
  <line x1="620" y1="168" x2="620" y2="198" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="620" cy="204" r="6" fill="#7ec8e3"/>
  <text x="634" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">setInterval 등록</text>
  <line x1="620" y1="210" x2="620" y2="240" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="620" cy="246" r="6" fill="#7ec8e3"/>
  <text x="634" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1분마다 fn_loadAll</text>
  <line x1="620" y1="252" x2="620" y2="282" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="620" cy="288" r="6" fill="#e05555"/>
  <text x="634" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Form_onunload</text>
  <line x1="620" y1="294" x2="620" y2="324" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="620" cy="330" r="6" fill="#e05555"/>
  <text x="634" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">clearInterval ← 필수!</text>
</svg>
