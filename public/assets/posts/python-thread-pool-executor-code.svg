<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ThreadPoolExecutor 코드 예제</text>

  <rect x="60" y="62" width="760" height="310" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text xml:space="preserve" x="84" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="120" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> concurrent.futures </text>
  <text xml:space="preserve" x="278" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="328" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ThreadPoolExecutor, as_completed</text>
  <text xml:space="preserve" x="84" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="130" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> time, random</text>

  <text xml:space="preserve" x="84" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="112" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> fetch_url(url):</text>
  <text xml:space="preserve" x="84" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &#35; I/O 대기 시뮬레이션</text>
  <text xml:space="preserve" x="84" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    time.sleep(random.uniform(</text>
  <text xml:space="preserve" x="314" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0.5</text>
  <text xml:space="preserve" x="340" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text xml:space="preserve" x="354" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2.0</text>
  <text xml:space="preserve" x="380" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">))</text>
  <text xml:space="preserve" x="84" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    return</text>
  <text xml:space="preserve" x="148" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> f"OK: {url}"</text>

  <text xml:space="preserve" x="84" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">urls = [</text>
  <text xml:space="preserve" x="148" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"site1.com"</text>
  <text xml:space="preserve" x="248" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text xml:space="preserve" x="262" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"site2.com"</text>
  <text xml:space="preserve" x="362" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text xml:space="preserve" x="376" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"site3.com"</text>
  <text xml:space="preserve" x="476" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]</text>

  <text xml:space="preserve" x="84" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">with</text>
  <text xml:space="preserve" x="117" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ThreadPoolExecutor(max_workers=</text>
  <text xml:space="preserve" x="403" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">5</text>
  <text xml:space="preserve" x="411" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">) </text>
  <text xml:space="preserve" x="429" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text>
  <text xml:space="preserve" x="451" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ex:</text>

  <text xml:space="preserve" x="84" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    futures = {ex.submit(fetch_url, u): u </text>
  <text xml:space="preserve" x="450" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">for</text>
  <text xml:space="preserve" x="480" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> u </text>
  <text xml:space="preserve" x="500" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">in</text>
  <text xml:space="preserve" x="520" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> urls}</text>

  <text xml:space="preserve" x="84" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    for</text>
  <text xml:space="preserve" x="120" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> fut </text>
  <text xml:space="preserve" x="150" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">in</text>
  <text xml:space="preserve" x="170" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> as_completed(futures):</text>
  <text xml:space="preserve" x="84" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        url = futures[fut]</text>
  <text xml:space="preserve" x="84" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        print(</text>
  <text xml:space="preserve" x="152" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">f"{url}: {fut.result()}"</text>
  <text xml:space="preserve" x="330" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text xml:space="preserve" x="84" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 완료 순서대로 출력 (총 시간 ≈ 가장 긴 단일 작업 시간)</text>
</svg>
