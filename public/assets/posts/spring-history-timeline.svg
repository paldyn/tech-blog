<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="580" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링의 역사 — 버전별 타임라인</text>

  <!-- Timeline spine -->
  <line x1="440" y1="72" x2="440" y2="530" stroke="#222" stroke-width="3"/>

  <!-- === Spring 1.x === -->
  <circle cx="440" cy="92" r="8" fill="#2a4a2a" stroke="#55c555" stroke-width="2"/>
  <!-- Left label -->
  <rect x="60" y="72" width="340" height="44" fill="#0d1a0d" stroke="#2a3a1a" stroke-width="1" rx="8"/>
  <text x="380" y="92" text-anchor="end" font-size="13" font-weight="700" fill="#55dd55">Spring 1.0</text>
  <text x="380" y="108" text-anchor="end" font-size="11" fill="#666">2003년 6월 · Rod Johnson</text>
  <!-- Right detail -->
  <text x="460" y="88" font-size="11" fill="#aaa">XML 기반 Bean 설정</text>
  <text x="460" y="104" font-size="11" fill="#aaa">BeanFactory · AOP · JDBC 추상화</text>

  <!-- === Spring 2.x === -->
  <circle cx="440" cy="162" r="8" fill="#2a4a2a" stroke="#55c555" stroke-width="2"/>
  <rect x="60" y="142" width="340" height="44" fill="#0d1a0d" stroke="#2a3a1a" stroke-width="1" rx="8"/>
  <text x="380" y="162" text-anchor="end" font-size="13" font-weight="700" fill="#55dd55">Spring 2.x</text>
  <text x="380" y="178" text-anchor="end" font-size="11" fill="#666">2006–2007년</text>
  <text x="460" y="158" font-size="11" fill="#aaa">어노테이션 도입 (@Transactional)</text>
  <text x="460" y="174" font-size="11" fill="#aaa">AspectJ 통합 · XML 네임스페이스 단순화</text>

  <!-- === Spring 3.x === -->
  <circle cx="440" cy="238" r="8" fill="#2a3a4a" stroke="#55aacc" stroke-width="2"/>
  <rect x="60" y="218" width="340" height="44" fill="#0d1520" stroke="#1a2a3a" stroke-width="1" rx="8"/>
  <text x="380" y="238" text-anchor="end" font-size="13" font-weight="700" fill="#55aadd">Spring 3.x</text>
  <text x="380" y="254" text-anchor="end" font-size="11" fill="#666">2009–2011년</text>
  <text x="460" y="234" font-size="11" fill="#aaa">Java Config (@Configuration, @Bean)</text>
  <text x="460" y="250" font-size="11" fill="#aaa">REST 지원 강화 · Spring Expression Language</text>
  <text x="460" y="266" font-size="11" fill="#777">XML → Java 설정 전환의 시작점</text>

  <!-- === Spring 4.x === -->
  <circle cx="440" cy="318" r="8" fill="#2a3a4a" stroke="#55aacc" stroke-width="2"/>
  <rect x="60" y="298" width="340" height="44" fill="#0d1520" stroke="#1a2a3a" stroke-width="1" rx="8"/>
  <text x="380" y="318" text-anchor="end" font-size="13" font-weight="700" fill="#55aadd">Spring 4.x</text>
  <text x="380" y="334" text-anchor="end" font-size="11" fill="#666">2013–2016년</text>
  <text x="460" y="314" font-size="11" fill="#aaa">Java 8 지원 · WebSocket · @RestController</text>
  <text x="460" y="330" font-size="11" fill="#aaa">Spring Boot 1.x 출시 (2014)</text>
  <text x="460" y="346" font-size="11" fill="#777">스프링 부트 시대의 시작</text>

  <!-- === Spring 5.x === -->
  <circle cx="440" cy="404" r="8" fill="#2a1a3a" stroke="#aa55cc" stroke-width="2"/>
  <rect x="60" y="384" width="340" height="44" fill="#150d20" stroke="#2a1a3a" stroke-width="1" rx="8"/>
  <text x="380" y="404" text-anchor="end" font-size="13" font-weight="700" fill="#cc77ee">Spring 5.x</text>
  <text x="380" y="420" text-anchor="end" font-size="11" fill="#666">2017–2022년</text>
  <text x="460" y="400" font-size="11" fill="#aaa">리액티브 스택 (WebFlux, R2DBC)</text>
  <text x="460" y="416" font-size="11" fill="#aaa">Spring Boot 2.x · Kotlin 공식 지원</text>
  <text x="460" y="432" font-size="11" fill="#777">javax.* → 아직 javax, Servlet 4 기반</text>

  <!-- === Spring 6.x === -->
  <circle cx="440" cy="490" r="10" fill="#1a2a3a" stroke="#ffaa44" stroke-width="2.5"/>
  <rect x="60" y="468" width="340" height="54" fill="#1a1500" stroke="#3a3000" stroke-width="1.5" rx="8"/>
  <text x="380" y="490" text-anchor="end" font-size="14" font-weight="700" fill="#ffcc55">Spring 6.x</text>
  <text x="380" y="508" text-anchor="end" font-size="11" fill="#888">2022년 11월 ~ 현재</text>
  <text x="460" y="482" font-size="11" fill="#aaa">Jakarta EE 9+ (javax → jakarta)</text>
  <text x="460" y="498" font-size="11" fill="#aaa">Java 17 최소 요구 · GraalVM Native Image</text>
  <text x="460" y="514" font-size="11" fill="#aaa">가상 스레드(Loom) 지원 · AOT 처리</text>
  <text x="460" y="530" font-size="11" fill="#cc9922">↑ 이 시리즈의 기준 버전 (Spring Boot 3.x)</text>

  <!-- year markers on spine -->
  <text x="430" y="136" text-anchor="end" font-size="9" fill="#333">2003</text>
  <text x="430" y="208" text-anchor="end" font-size="9" fill="#333">2006</text>
  <text x="430" y="286" text-anchor="end" font-size="9" fill="#333">2009</text>
  <text x="430" y="366" text-anchor="end" font-size="9" fill="#333">2013</text>
  <text x="430" y="452" text-anchor="end" font-size="9" fill="#333">2017</text>

  <!-- Footer -->
  <text x="440" y="560" text-anchor="middle" font-size="10" fill="#333">PALDYN · Spring 완전 정복 시리즈 · Chapter 1</text>
</svg>
