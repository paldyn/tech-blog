<svg xmlns="http://www.w3.org/2000/svg" width="880" height="640" viewBox="0 0 880 640" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="640" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링의 역사 — 버전별 타임라인</text>

  <!-- Timeline spine -->
  <line x1="440" y1="84" x2="440" y2="572" stroke="#222" stroke-width="3"/>

  <!-- ===== Spring 1.0 ===== -->
  <circle cx="440" cy="108" r="8" fill="#2a4a2a" stroke="#55c555" stroke-width="2"/>
  <rect x="80" y="84" width="320" height="56" fill="#0d1a0d" stroke="#2a3a1a" stroke-width="1" rx="8"/>
  <text x="380" y="108" text-anchor="end" font-size="14" font-weight="700" fill="#55dd55">Spring 1.0</text>
  <text x="380" y="128" text-anchor="end" font-size="12" fill="#777">2003년 6월 · Rod Johnson</text>
  <text x="476" y="100" font-size="12" fill="#bbbbbb">XML 기반 Bean 설정</text>
  <text x="476" y="120" font-size="12" fill="#bbbbbb">BeanFactory · AOP · JDBC 추상화</text>

  <!-- ===== Spring 2.x ===== -->
  <circle cx="440" cy="188" r="8" fill="#2a4a2a" stroke="#55c555" stroke-width="2"/>
  <rect x="80" y="164" width="320" height="56" fill="#0d1a0d" stroke="#2a3a1a" stroke-width="1" rx="8"/>
  <text x="380" y="188" text-anchor="end" font-size="14" font-weight="700" fill="#55dd55">Spring 2.x</text>
  <text x="380" y="208" text-anchor="end" font-size="12" fill="#777">2006–2007년</text>
  <text x="476" y="180" font-size="12" fill="#bbbbbb">어노테이션 도입 (@Transactional)</text>
  <text x="476" y="200" font-size="12" fill="#bbbbbb">AspectJ 통합 · XML 네임스페이스 단순화</text>

  <!-- ===== Spring 3.x ===== -->
  <circle cx="440" cy="268" r="8" fill="#2a3a4a" stroke="#55aacc" stroke-width="2"/>
  <rect x="80" y="240" width="320" height="64" fill="#0d1520" stroke="#1a2a3a" stroke-width="1" rx="8"/>
  <text x="380" y="264" text-anchor="end" font-size="14" font-weight="700" fill="#55aadd">Spring 3.x</text>
  <text x="380" y="284" text-anchor="end" font-size="12" fill="#777">2009–2011년</text>
  <text x="476" y="256" font-size="12" fill="#bbbbbb">Java Config (@Configuration, @Bean)</text>
  <text x="476" y="276" font-size="12" fill="#bbbbbb">REST 지원 강화 · SpEL</text>
  <text x="476" y="296" font-size="11" fill="#888">XML → Java 설정 전환의 시작점</text>

  <!-- ===== Spring 4.x ===== -->
  <circle cx="440" cy="348" r="8" fill="#2a3a4a" stroke="#55aacc" stroke-width="2"/>
  <rect x="80" y="320" width="320" height="64" fill="#0d1520" stroke="#1a2a3a" stroke-width="1" rx="8"/>
  <text x="380" y="344" text-anchor="end" font-size="14" font-weight="700" fill="#55aadd">Spring 4.x</text>
  <text x="380" y="364" text-anchor="end" font-size="12" fill="#777">2013–2016년</text>
  <text x="476" y="336" font-size="12" fill="#bbbbbb">Java 8 지원 · @RestController</text>
  <text x="476" y="356" font-size="12" fill="#bbbbbb">Spring Boot 1.x 출시 (2014)</text>
  <text x="476" y="376" font-size="11" fill="#888">스프링 부트 시대의 시작</text>

  <!-- ===== Spring 5.x ===== -->
  <circle cx="440" cy="428" r="8" fill="#2a1a3a" stroke="#aa55cc" stroke-width="2"/>
  <rect x="80" y="400" width="320" height="64" fill="#150d20" stroke="#2a1a3a" stroke-width="1" rx="8"/>
  <text x="380" y="424" text-anchor="end" font-size="14" font-weight="700" fill="#cc77ee">Spring 5.x</text>
  <text x="380" y="444" text-anchor="end" font-size="12" fill="#777">2017–2022년</text>
  <text x="476" y="416" font-size="12" fill="#bbbbbb">리액티브 스택 (WebFlux, R2DBC)</text>
  <text x="476" y="436" font-size="12" fill="#bbbbbb">Spring Boot 2.x · Kotlin 공식 지원</text>
  <text x="476" y="456" font-size="11" fill="#888">아직 javax.* 기반, Servlet 4</text>

  <!-- ===== Spring 6.x ===== -->
  <circle cx="440" cy="520" r="10" fill="#1a2a3a" stroke="#ffaa44" stroke-width="2.5"/>
  <rect x="80" y="488" width="320" height="80" fill="#1a1500" stroke="#3a3000" stroke-width="1.5" rx="8"/>
  <text x="380" y="514" text-anchor="end" font-size="15" font-weight="700" fill="#ffcc55">Spring 6.x</text>
  <text x="380" y="538" text-anchor="end" font-size="12" fill="#888">2022년 11월 ~ 현재</text>
  <text x="476" y="504" font-size="12" fill="#bbbbbb">Jakarta EE 9+ (javax → jakarta)</text>
  <text x="476" y="524" font-size="12" fill="#bbbbbb">Java 17 최소 · GraalVM Native</text>
  <text x="476" y="544" font-size="12" fill="#bbbbbb">가상 스레드(Loom) · AOT 처리</text>
  <text x="476" y="564" font-size="11" fill="#cc9922">↑ 이 시리즈의 기준 버전 (Spring Boot 3.x)</text>

  <!-- Footer -->
  <text x="440" y="612" text-anchor="middle" font-size="11" fill="#444">PALDYN · Spring 완전 정복 시리즈 · Chapter 1</text>
</svg>
