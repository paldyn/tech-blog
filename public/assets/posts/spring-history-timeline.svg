<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring Framework 버전별 역사</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">2002년 탄생부터 2024년 Spring 6.x까지</text>

  <!-- Timeline line -->
  <line x1="160" y1="120" x2="160" y2="510" stroke="#333" stroke-width="2"/>

  <!-- 2003 Spring 1.x -->
  <circle cx="160" cy="130" r="8" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <text x="180" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2003</text>
  <rect x="180" y="134" width="640" height="52" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="198" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Spring 1.0</text>
  <text x="310" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">IoC 컨테이너, XML 설정, JdbcTemplate, AOP 기반</text>
  <text x="198" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Rod Johnson의 저서 코드 기반. EJB 대체 목적으로 오픈소스 출시</text>

  <!-- 2006 Spring 2.x -->
  <circle cx="160" cy="210" r="8" fill="#7777cc" stroke="#0a0a0a" stroke-width="2"/>
  <text x="180" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2006</text>
  <rect x="180" y="214" width="640" height="52" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="198" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Spring 2.x</text>
  <text x="310" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">어노테이션 지원 도입, AspectJ AOP, 네임스페이스 XML</text>
  <text x="198" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Java 5 어노테이션 활용 시작. @Transactional, @Repository 등장</text>

  <!-- 2009 Spring 3.x -->
  <circle cx="160" cy="290" r="8" fill="#ce9178" stroke="#0a0a0a" stroke-width="2"/>
  <text x="180" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2009</text>
  <rect x="180" y="294" width="640" height="52" rx="6" fill="#0d1520" stroke="#ce9178" stroke-width="1"/>
  <text x="198" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">Spring 3.x</text>
  <text x="310" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Java Config, REST 지원, SpEL, Async/Scheduled</text>
  <text x="198" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">XML 없이 Java 코드만으로 설정 가능. @RestController 전신</text>

  <!-- 2013 Spring 4.x -->
  <circle cx="160" cy="370" r="8" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <text x="180" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2013</text>
  <rect x="180" y="374" width="640" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="198" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Spring 4.x + Spring Boot 1.x</text>
  <text x="380" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Java 8, 람다, WebSocket, 조건부 빈</text>
  <text x="198" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Spring Boot 1.0 출시(2014). @SpringBootApplication, 자동 설정 시대 개막</text>

  <!-- 2017 Spring 5.x -->
  <circle cx="160" cy="450" r="8" fill="#e0c555" stroke="#0a0a0a" stroke-width="2"/>
  <text x="180" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2017</text>
  <rect x="180" y="454" width="640" height="52" rx="6" fill="#1a1400" stroke="#e0c555" stroke-width="1"/>
  <text x="198" y="475" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0c555">Spring 5.x + Spring Boot 2.x</text>
  <text x="384" y="475" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">WebFlux(Reactor), Kotlin, JDK 9+ 모듈</text>
  <text x="198" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리액티브 프로그래밍 본격 지원. Spring Boot 2.x(2018) 함께 성장</text>
</svg>
