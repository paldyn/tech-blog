<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="580" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스프링 역사 타임라인 (2003 ~ 2024)</text>

  <!-- Timeline axis -->
  <line x1="100" y1="300" x2="780" y2="300" stroke="#333" stroke-width="2"/>

  <!-- 2003 Spring 1.0 -->
  <circle cx="120" cy="300" r="8" fill="#7777cc"/>
  <line x1="120" y1="292" x2="120" y2="180" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="120" width="160" height="58" fill="#0e0e1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="142" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Spring 1.0</text>
  <text x="140" y="160" font-size="11" fill="#888" text-anchor="middle">2003 · XML 설정 시대</text>
  <text x="140" y="176" font-size="11" fill="#888" text-anchor="middle">IoC, AOP 기반 정립</text>
  <text x="120" y="322" font-size="11" fill="#888" text-anchor="middle">2003</text>

  <!-- 2006 Spring 2.0 -->
  <circle cx="220" cy="300" r="8" fill="#55c555"/>
  <line x1="220" y1="308" x2="220" y2="408" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="160" y="408" width="160" height="58" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="430" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Spring 2.0</text>
  <text x="240" y="448" font-size="11" fill="#888" text-anchor="middle">2006 · 어노테이션 도입</text>
  <text x="240" y="464" font-size="11" fill="#888" text-anchor="middle">@Component 시작</text>
  <text x="220" y="322" font-size="11" fill="#888" text-anchor="middle">2006</text>

  <!-- 2009 Spring 3.0 -->
  <circle cx="340" cy="300" r="8" fill="#7ec8e3"/>
  <line x1="340" y1="292" x2="340" y2="180" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="270" y="120" width="170" height="58" fill="#0a141a" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="355" y="142" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Spring 3.0</text>
  <text x="355" y="160" font-size="11" fill="#888" text-anchor="middle">2009 · Java Config</text>
  <text x="355" y="176" font-size="11" fill="#888" text-anchor="middle">RESTful MVC 강화</text>
  <text x="340" y="322" font-size="11" fill="#888" text-anchor="middle">2009</text>

  <!-- 2013 Spring 4.0 + Boot 1.0 -->
  <circle cx="480" cy="300" r="8" fill="#ce9178"/>
  <line x1="480" y1="308" x2="480" y2="408" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="400" y="408" width="180" height="70" fill="#1a100a" rx="6" stroke="#ce9178" stroke-width="1"/>
  <text x="490" y="430" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Spring 4 + Boot 1</text>
  <text x="490" y="448" font-size="11" fill="#888" text-anchor="middle">2013~2014</text>
  <text x="490" y="464" font-size="11" fill="#888" text-anchor="middle">람다·Java 8 지원</text>
  <text x="490" y="478" font-size="11" fill="#888" text-anchor="middle">Boot 자동 구성 등장</text>
  <text x="480" y="322" font-size="11" fill="#888" text-anchor="middle">2013</text>

  <!-- 2017 Spring 5.0 -->
  <circle cx="620" cy="300" r="8" fill="#55c555"/>
  <line x1="620" y1="292" x2="620" y2="180" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="545" y="120" width="170" height="70" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="630" y="142" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Spring 5 + Boot 2</text>
  <text x="630" y="160" font-size="11" fill="#888" text-anchor="middle">2017~2018</text>
  <text x="630" y="176" font-size="11" fill="#888" text-anchor="middle">Reactive(WebFlux)</text>
  <text x="630" y="190" font-size="11" fill="#888" text-anchor="middle">Kotlin 공식 지원</text>
  <text x="620" y="322" font-size="11" fill="#888" text-anchor="middle">2017</text>

  <!-- 2022 Spring 6.0 -->
  <circle cx="760" cy="300" r="10" fill="#7ec8e3" stroke="#e8e8e8" stroke-width="2"/>
  <line x1="760" y1="308" x2="760" y2="408" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="670" y="408" width="180" height="82" fill="#0a141a" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="760" y="430" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Spring 6 + Boot 3</text>
  <text x="760" y="448" font-size="11" fill="#888" text-anchor="middle">2022~현재</text>
  <text x="760" y="464" font-size="11" fill="#888" text-anchor="middle">Jakarta EE 9+</text>
  <text x="760" y="480" font-size="11" fill="#888" text-anchor="middle">GraalVM Native</text>
  <text x="760" y="496" font-size="11" fill="#888" text-anchor="middle">JDK 17+ 필수</text>
  <text x="760" y="322" font-size="11" fill="#888" text-anchor="middle">2022</text>

  <!-- Label: NOW -->
  <rect x="734" y="280" width="52" height="18" fill="#0a0a0a"/>
  <text x="760" y="294" font-size="11" fill="#7ec8e3" text-anchor="middle">현재</text>

  <!-- Footer -->
  <text x="440" y="548" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #4 · Chapter 1</text>
</svg>
