<svg xmlns="http://www.w3.org/2000/svg" width="880" height="660" viewBox="0 0 880 660" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="660" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링의 역사 — 버전별 타임라인</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">Spring 1.x → 6.x · 22년의 진화</text>

  <!-- Timeline spine -->
  <line x1="440" y1="100" x2="440" y2="600" stroke="#222" stroke-width="3"/>

  <!-- ===== Spring 1.0 ===== y=128 -->
  <circle cx="440" cy="128" r="8" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <rect x="80" y="104" width="320" height="60" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1" rx="8"/>
  <text x="376" y="130" text-anchor="end" font-size="15" font-weight="700" fill="#55c555">Spring 1.0</text>
  <text x="376" y="150" text-anchor="end" font-size="11" fill="#666">2003.06 · Rod Johnson</text>
  <text x="476" y="124" font-size="13" fill="#bbbbbb">XML 기반 Bean 설정</text>
  <text x="476" y="146" font-size="12" fill="#888">BeanFactory · AOP · JDBC 추상화</text>

  <!-- ===== Spring 2.x ===== y=204 -->
  <circle cx="440" cy="204" r="8" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <rect x="80" y="180" width="320" height="60" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1" rx="8"/>
  <text x="376" y="206" text-anchor="end" font-size="15" font-weight="700" fill="#55c555">Spring 2.x</text>
  <text x="376" y="226" text-anchor="end" font-size="11" fill="#666">2006 – 2007</text>
  <text x="476" y="200" font-size="13" fill="#bbbbbb">애노테이션 도입 (@Transactional)</text>
  <text x="476" y="222" font-size="12" fill="#888">AspectJ 통합 · XML 네임스페이스 단순화</text>

  <!-- ===== Spring 3.x ===== y=288 -->
  <circle cx="440" cy="288" r="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="80" y="256" width="320" height="76" fill="#0d1520" stroke="#1e3a5a" stroke-width="1" rx="8"/>
  <text x="376" y="282" text-anchor="end" font-size="15" font-weight="700" fill="#7ec8e3">Spring 3.x</text>
  <text x="376" y="302" text-anchor="end" font-size="11" fill="#666">2009 – 2011</text>
  <text x="376" y="320" text-anchor="end" font-size="11" fill="#888">Java Config 시작</text>
  <text x="476" y="276" font-size="13" fill="#bbbbbb">Java Config (@Configuration, @Bean)</text>
  <text x="476" y="298" font-size="12" fill="#888">REST 지원 강화 · SpEL 도입</text>
  <text x="476" y="320" font-size="11" fill="#666">XML → Java 설정 전환의 시작점</text>

  <!-- ===== Spring 4.x ===== y=380 -->
  <circle cx="440" cy="380" r="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="80" y="348" width="320" height="76" fill="#0d1520" stroke="#1e3a5a" stroke-width="1" rx="8"/>
  <text x="376" y="374" text-anchor="end" font-size="15" font-weight="700" fill="#7ec8e3">Spring 4.x</text>
  <text x="376" y="394" text-anchor="end" font-size="11" fill="#666">2013 – 2016</text>
  <text x="376" y="412" text-anchor="end" font-size="11" fill="#888">Boot 1.x 출시</text>
  <text x="476" y="368" font-size="13" fill="#bbbbbb">Java 8 지원 · @RestController</text>
  <text x="476" y="390" font-size="12" fill="#888">Spring Boot 1.x 출시 (2014)</text>
  <text x="476" y="412" font-size="11" fill="#666">스프링 부트 시대의 시작</text>

  <!-- ===== Spring 5.x ===== y=472 -->
  <circle cx="440" cy="472" r="8" fill="#150d20" stroke="#cc77ee" stroke-width="2"/>
  <rect x="80" y="440" width="320" height="76" fill="#150d20" stroke="#3a1a4a" stroke-width="1" rx="8"/>
  <text x="376" y="466" text-anchor="end" font-size="15" font-weight="700" fill="#cc77ee">Spring 5.x</text>
  <text x="376" y="486" text-anchor="end" font-size="11" fill="#666">2017 – 2022</text>
  <text x="376" y="504" text-anchor="end" font-size="11" fill="#888">리액티브 도입</text>
  <text x="476" y="460" font-size="13" fill="#bbbbbb">리액티브 스택 (WebFlux, R2DBC)</text>
  <text x="476" y="482" font-size="12" fill="#888">Spring Boot 2.x · Kotlin 공식 지원</text>
  <text x="476" y="504" font-size="11" fill="#666">javax.* 기반 · Servlet 4</text>

  <!-- ===== Spring 6.x ===== y=568 -->
  <circle cx="440" cy="568" r="10" fill="#1a1500" stroke="#ffaa44" stroke-width="2.5"/>
  <rect x="80" y="532" width="320" height="92" fill="#1a1500" stroke="#3a3000" stroke-width="1.5" rx="8"/>
  <text x="376" y="558" text-anchor="end" font-size="15" font-weight="700" fill="#ffcc55">Spring 6.x</text>
  <text x="376" y="578" text-anchor="end" font-size="11" fill="#666">2022.11 – 현재</text>
  <text x="376" y="600" text-anchor="end" font-size="11" fill="#cc9922">기준 버전</text>
  <text x="376" y="616" text-anchor="end" font-size="11" fill="#888">Boot 3.x</text>
  <text x="476" y="552" font-size="13" fill="#bbbbbb">Jakarta EE 9+ (javax → jakarta)</text>
  <text x="476" y="574" font-size="13" fill="#bbbbbb">Java 17 최소 · GraalVM Native</text>
  <text x="476" y="596" font-size="12" fill="#888">가상 스레드(Loom) · AOT 처리</text>
  <text x="476" y="616" font-size="11" fill="#cc9922">↑ 이 시리즈의 기준 버전</text>

  <text x="440" y="648" text-anchor="middle" font-size="11" fill="#444">PALDYN · Spring 완전 정복 시리즈 · Chapter 1</text>
</svg>
