<svg xmlns="http://www.w3.org/2000/svg" width="880" height="530" viewBox="0 0 880 530">
  <rect width="880" height="530" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring 역사 타임라인</text>

  <!-- Vertical timeline line -->
  <line x1="220" y1="70" x2="220" y2="476" stroke="#333" stroke-width="2"/>

  <!-- Event 1: 2004 Spring 1.0 -->
  <circle cx="220" cy="70" r="6" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="226" y1="70" x2="256" y2="70" stroke="#55c555" stroke-width="1.5"/>
  <text x="210" y="74"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="end">2004</text>
  <text x="262" y="74"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Spring Framework 1.0 공식 출시</text>
  <text x="262" y="90"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Rod Johnson이 EJB 대체 경량 컨테이너 공개</text>
  <text x="262" y="105"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">IoC, AOP, JDBC Template, XML 기반 Bean 설정</text>

  <!-- Event 2: 2006 Spring 2.0 -->
  <circle cx="220" cy="142" r="6" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="226" y1="142" x2="256" y2="142" stroke="#55c555" stroke-width="1.5"/>
  <text x="210" y="146"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="end">2006</text>
  <text x="262" y="146"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Spring 2.0 — XML 네임스페이스 도입</text>
  <text x="262" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">설정 XML 간결화, AOP 표현식 개선</text>

  <!-- Event 3: 2007 Spring 2.5 -->
  <circle cx="220" cy="200" r="6" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="226" y1="200" x2="256" y2="200" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="204"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="end">2007</text>
  <text x="262" y="204"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Spring 2.5 — 어노테이션 기반 설정 시작</text>
  <text x="262" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">@Component, @Service, @Autowired 등장 — XML 의존 탈피</text>

  <!-- Event 4: 2009 Spring 3.0 -->
  <circle cx="220" cy="258" r="6" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="226" y1="258" x2="256" y2="258" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="end">2009</text>
  <text x="262" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Spring 3.0 — Java 5+, REST, @Configuration</text>
  <text x="262" y="278"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">순수 Java 설정(@Bean), RESTful 지원, SpEL, Validation</text>

  <!-- Event 5: 2013 Spring 4.0 -->
  <circle cx="220" cy="316" r="6" fill="#7777cc" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="226" y1="316" x2="256" y2="316" stroke="#7777cc" stroke-width="1.5"/>
  <text x="210" y="320"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="end">2013</text>
  <text x="262" y="320"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Spring 4.0 — Java 8 준비, WebSocket, @Conditional</text>
  <text x="262" y="336"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">람다·스트림 친화적 API, 조건부 Bean 등록, Groovy DSL</text>

  <!-- Event 6: 2014 Spring Boot 1.0 -->
  <circle cx="220" cy="374" r="7" fill="#ce9178" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="227" y1="374" x2="256" y2="374" stroke="#ce9178" stroke-width="2"/>
  <text x="210" y="378"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="end">2014</text>
  <text x="262" y="378"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178">Spring Boot 1.0 — 자동 설정의 시대 개막</text>
  <text x="262" y="394"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">starter, 내장 Tomcat, application.properties — 진입 장벽 대폭 낮춤</text>

  <!-- Event 7: 2017 Spring 5.0 -->
  <circle cx="220" cy="432" r="6" fill="#7777cc" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="226" y1="432" x2="256" y2="432" stroke="#7777cc" stroke-width="1.5"/>
  <text x="210" y="436"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="end">2017</text>
  <text x="262" y="436"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Spring 5.0 — Reactive 웹, Kotlin 공식 지원</text>
  <text x="262" y="452"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Spring WebFlux(Reactor 기반), HTTP/2, Java 8 기준선</text>

  <!-- Event 8: 2022 Spring 6.0 -->
  <circle cx="220" cy="490" r="7" fill="#e05555" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="227" y1="490" x2="256" y2="490" stroke="#e05555" stroke-width="2"/>
  <text x="210" y="494"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="end">2022</text>
  <text x="262" y="494"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">Spring 6.0 / Boot 3.0 — Jakarta EE, Java 17+</text>
  <text x="262" y="510"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">javax.* → jakarta.* 패키지 전환, GraalVM AOT, Virtual Threads</text>
</svg>
