<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="abk" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="achn" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">HashSet 내부 구조 — HashMap 기반</text>

  <!-- Input element -->
  <rect x="60" y="80" width="160" height="48" rx="6" fill="#0d1b2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="99" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">원소 추가</text>
  <text x="140" y="119" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">set.add("apple")</text>

  <!-- hashCode step -->
  <rect x="280" y="80" width="180" height="48" rx="6" fill="#1a1a0a" stroke="#e8a020" stroke-width="1.5"/>
  <text x="370" y="99" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">hashCode() 계산</text>
  <text x="370" y="119" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8a020">93029210</text>

  <!-- bucket index step -->
  <rect x="510" y="80" width="200" height="48" rx="6" fill="#1a1a0a" stroke="#e8a020" stroke-width="1.5"/>
  <text x="610" y="99" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버킷 인덱스</text>
  <text x="610" y="119" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8a020">hash &amp; (n-1) = 2</text>

  <!-- Arrows between steps -->
  <line x1="220" y1="104" x2="276" y2="104" stroke="#7ec8e3" stroke-width="2" marker-end="url(#abk)"/>
  <line x1="460" y1="104" x2="506" y2="104" stroke="#7ec8e3" stroke-width="2" marker-end="url(#abk)"/>

  <!-- HashMap bucket array -->
  <text x="440" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">HashMap 버킷 배열 (내부 table[])</text>

  <!-- Bucket 0 -->
  <rect x="60" y="188" width="100" height="44" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bucket[0]</text>
  <text x="110" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">"banana"</text>

  <!-- Bucket 1 -->
  <rect x="175" y="188" width="100" height="44" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="225" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bucket[1]</text>
  <text x="225" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">null</text>

  <!-- Bucket 2 — apple goes here -->
  <rect x="290" y="188" width="100" height="44" rx="4" fill="#0f1827" stroke="#e8a020" stroke-width="2"/>
  <text x="340" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bucket[2]</text>
  <text x="340" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">"apple"</text>

  <!-- Bucket 3 -->
  <rect x="405" y="188" width="100" height="44" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="455" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bucket[3]</text>
  <text x="455" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">null</text>

  <!-- Bucket 4 — collision chain -->
  <rect x="520" y="188" width="100" height="44" rx="4" fill="#1a0a0f" stroke="#ce9178" stroke-width="1.5"/>
  <text x="570" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bucket[4]</text>
  <text x="570" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">"cherry"</text>

  <!-- Bucket 4 chain node -->
  <rect x="635" y="188" width="100" height="44" rx="4" fill="#1a0a0f" stroke="#ce9178" stroke-width="1.5"/>
  <text x="685" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">chain</text>
  <text x="685" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">"date"</text>

  <!-- Bucket 5 -->
  <rect x="750" y="188" width="70" height="44" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="785" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">...(n-1)</text>
  <text x="785" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">...</text>

  <!-- Collision chain arrow -->
  <line x1="620" y1="210" x2="631" y2="210" stroke="#ce9178" stroke-width="2" marker-end="url(#achn)"/>

  <!-- apple goes to bucket 2 arrow -->
  <line x1="610" y1="128" x2="380" y2="182" stroke="#e8a020" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#abk)"/>

  <!-- threshold / load factor info -->
  <rect x="60" y="260" width="760" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">load factor (기본 0.75) × capacity 초과 시 → rehash (2배 확장)</text>
  <text x="440" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버킷 하나에 8개 이상 연결 시 링크드 리스트 → Red-Black Tree로 전환 (Java 8+)</text>

  <!-- Key point box -->
  <rect x="60" y="328" width="760" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// HashSet은 내부적으로 HashMap&lt;E, Object&gt; 사용</text>
  <text x="76" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">map.put(e, </text>
  <text x="165" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">PRESENT</text>
  <text x="229" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>
  <text x="76" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// PRESENT = new Object() — 더미 값</text>
  <text x="76" y="410" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 중복 체크: hashCode() 같고 equals() true → 거부</text>
  <text x="76" y="430" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 순서 보장 없음 (버킷 인덱스 순서)</text>
</svg>
