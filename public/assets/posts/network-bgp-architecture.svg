<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="abe" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="abi" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BGP: 자율 시스템(AS) 간 경로 교환</text>

  <!-- AS 1 -->
  <rect x="40" y="70" width="220" height="180" rx="10" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">AS 64500 (ISP A)</text>
  <rect x="65" y="110" width="80" height="44" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="105" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">R1 (eBGP)</text>
  <text x="105" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">1.2.3.0/24</text>
  <rect x="155" y="160" width="80" height="44" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="195" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">R2 (iBGP)</text>
  <text x="195" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">1.2.4.0/24</text>
  <!-- iBGP line inside AS1 -->
  <line x1="145" y1="132" x2="155" y2="162" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="143" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">iBGP</text>

  <!-- AS 2 -->
  <rect x="330" y="70" width="220" height="180" rx="10" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">AS 64501 (ISP B)</text>
  <rect x="345" y="110" width="80" height="44" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="385" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">R3 (eBGP)</text>
  <text x="385" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">5.6.7.0/24</text>
  <rect x="435" y="160" width="80" height="44" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="475" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">R4 (iBGP)</text>
  <text x="475" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">5.6.8.0/24</text>
  <line x1="425" y1="132" x2="435" y2="162" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="433" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">iBGP</text>

  <!-- AS 3 -->
  <rect x="620" y="70" width="220" height="180" rx="10" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="730" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">AS 64502 (ISP C)</text>
  <rect x="635" y="110" width="80" height="44" rx="6" fill="#1a1a3a" stroke="#7777cc" stroke-width="1"/>
  <text x="675" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">R5 (eBGP)</text>
  <text x="675" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">9.10.11.0/24</text>
  <rect x="725" y="160" width="80" height="44" rx="6" fill="#1a1a3a" stroke="#7777cc" stroke-width="1"/>
  <text x="765" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">R6 (iBGP)</text>
  <text x="765" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">9.10.12.0/24</text>
  <line x1="715" y1="132" x2="725" y2="162" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="723" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">iBGP</text>

  <!-- eBGP sessions between AS -->
  <line x1="260" y1="130" x2="330" y2="130" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#abe)"/>
  <line x1="330" y1="130" x2="260" y2="130" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#abe)"/>
  <text x="295" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">eBGP</text>

  <line x1="550" y1="130" x2="620" y2="130" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#abe)"/>
  <line x1="620" y1="130" x2="550" y2="130" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#abe)"/>
  <text x="585" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">eBGP</text>

  <!-- BGP attributes box -->
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">핵심 BGP 경로 속성</text>
  <rect x="60" y="296" width="760" height="170" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">속성              설명                          경로 선택 영향</text>
  <line x1="80" y1="326" x2="800" y2="326" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">AS_PATH          AS 번호 리스트                  짧을수록 선호</text>
  <text x="80" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">NEXT_HOP         다음 라우터 IP                  도달 가능 여부</text>
  <text x="80" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">LOCAL_PREF       로컬 선호도 (iBGP)              높을수록 선호</text>
  <text x="80" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">MED              Multi-Exit Discriminator      낮을수록 선호</text>
  <text x="80" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">COMMUNITY        태그 (필터링·정책 적용)          관리자 정의</text>
  <text x="80" y="444" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8a030">ORIGIN           IGP / EGP / Incomplete         IGP &gt; EGP &gt; ?</text>
</svg>
