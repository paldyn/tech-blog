<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Gemini 1.5 Pro: 1M 토큰 컨텍스트 활용</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">긴 컨텍스트가 가능하게 만드는 것들</text>

  <!-- Left: context size comparison bar chart -->
  <text x="80" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">컨텍스트 창 비교</text>

  <!-- GPT-4 Turbo -->
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">GPT-4 Turbo</text>
  <rect x="200" y="120" width="128" height="20" rx="4" fill="#7777cc"/>
  <text x="334" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">128K</text>

  <!-- Claude 3 Opus -->
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Claude 3 Opus</text>
  <rect x="200" y="154" width="200" height="20" rx="4" fill="#e05555"/>
  <text x="406" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">200K</text>

  <!-- Gemini 1.5 Pro -->
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Gemini 1.5 Pro</text>
  <rect x="200" y="188" width="400" height="20" rx="4" fill="#55c555"/>
  <text x="606" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">1,000K</text>

  <!-- Right: what 1M tokens means -->
  <rect x="480" y="96" width="360" height="200" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="660" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">1M 토큰으로 가능한 것</text>
  <text x="500" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 소설 10권 전체 분석</text>
  <text x="500" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 1시간 분량 동영상 처리</text>
  <text x="500" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 3만 줄 코드베이스 리뷰</text>
  <text x="500" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 수천 페이지 법률 문서 검색</text>
  <text x="500" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">• 전체 대화 기록 장기 유지</text>
  <text x="500" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">※ 비용은 입력 토큰 수에 비례해 증가</text>

  <!-- Code block -->
  <rect x="60" y="240" width="400" height="148" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># Gemini API 기본 사용</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">import</text>
  <text x="127" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> google.generativeai</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">as</text>
  <text x="97" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> genai</text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">genai.configure(api_key=</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">  "YOUR_API_KEY"</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>

  <!-- Bottom note -->
  <text x="440" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Gemini 1.5 Pro는 동영상·오디오·이미지·텍스트를 하나의 호출로 처리 가능</text>
</svg>
