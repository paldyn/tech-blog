<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">여러 값 반환 실용 패턴</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">분할 정보 반환 / 상태 반환 / 스타 언패킹</text>

  <!-- Left: stat + error pattern -->
  <rect x="60" y="90" width="360" height="270" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 결과 + 상태 반환</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> safe_div(a, b):</tspan></text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    if</tspan><tspan fill="#e8e8e8"> b == </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">        return</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"division by zero"</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#e8e8e8"> a / b, </tspan><tspan fill="#7ec8e3">None</tspan></text>

  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">val, err = safe_div(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># val=5.0, err=None</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">val, err = safe_div(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># val=None, err="div..."</text>
  <text x="76" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Go 스타일 에러 핸들링</text>

  <!-- Right: star unpacking -->
  <rect x="460" y="90" width="360" height="270" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="476" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 스타 언패킹</text>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> stats(nums):</tspan></text>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#e8e8e8"> min(nums), max(nums), \</tspan></text>
  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">           sum(nums)/len(nums)</tspan></text>

  <text x="476" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">lo, hi, avg = stats([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">])</tspan></text>
  <text x="476" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># lo=1, hi=5, avg=3.0</text>

  <text x="476" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 첫/마지막만 필요</text>
  <text x="476" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">first, *rest = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">]</tspan></text>
  <text x="476" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># first=1, rest=[2,3,4]</text>
  <text x="476" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">*mid, last = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">]</tspan></text>
  <text x="476" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># mid=[1,2,3], last=4</text>
  <text x="476" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">* 는 나머지를 리스트로 수집</text>
</svg>
