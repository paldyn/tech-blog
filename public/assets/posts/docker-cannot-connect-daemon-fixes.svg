<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">환경별 해결 명령 모음</text>

  <!-- Linux -->
  <rect x="60" y="68" width="240" height="280" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Linux (systemd)</text>
  <rect x="76" y="106" width="208" height="224" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 상태 확인</text>
  <text x="92" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">systemctl</text>
  <text x="92" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  status docker</text>
  <text x="92" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 시작 / 재시작</text>
  <text x="92" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">sudo</text>
  <text x="92" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  systemctl start</text>
  <text x="92" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  docker</text>
  <text x="92" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 부팅 자동 시작</text>
  <text x="92" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">sudo systemctl</text>
  <text x="92" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  enable docker</text>

  <!-- macOS -->
  <rect x="320" y="68" width="240" height="280" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">macOS (Docker Desktop)</text>
  <rect x="336" y="106" width="208" height="224" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="352" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># Desktop 재시작</text>
  <text x="352" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">open</text>
  <text x="352" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  -a Docker</text>
  <text x="352" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 컨텍스트 확인</text>
  <text x="352" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">docker</text>
  <text x="352" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  context ls</text>
  <text x="352" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 소켓 경로 확인</text>
  <text x="352" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">echo</text>
  <text x="352" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  $DOCKER_HOST</text>
  <text x="352" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 비어있으면 정상</text>

  <!-- CI / Container -->
  <rect x="580" y="68" width="240" height="280" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">CI / 컨테이너 환경</text>
  <rect x="596" y="106" width="208" height="224" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="612" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 소켓 마운트 확인</text>
  <text x="612" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">ls</text>
  <text x="612" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  /var/run/docker.sock</text>
  <text x="612" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># DinD 소켓 마운트</text>
  <text x="612" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">volumes:</text>
  <text x="612" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  - /var/run/</text>
  <text x="612" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    docker.sock:/var/</text>
  <text x="612" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    run/docker.sock</text>
  <text x="612" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># DOCKER_HOST 오버라이드</text>
  <text x="612" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">unset DOCKER_HOST</text>
</svg>
