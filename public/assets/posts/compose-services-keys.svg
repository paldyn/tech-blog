<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">서비스 키 전체 구조</text>

  <!-- service definition code -->
  <rect x="60" y="66" width="400" height="420" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="86" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">services:</text>
  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  api:</text>
  <text x="76" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    image</text><text x="144" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: node:20-alpine</text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    build</text><text x="140" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: ./api</text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    ports</text><text x="140" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      - </text><text x="118" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"3000:3000"</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    volumes</text><text x="152" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      - </text><text x="118" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">./src:/app/src</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    environment</text><text x="196" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      - NODE_ENV=dev</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    depends_on</text><text x="196" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      db:</text>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        condition: </text><text x="228" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">service_healthy</text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    healthcheck</text><text x="196" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      test: </text><text x="155" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">["CMD","curl","-f","http://localhost:3000"]</text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    restart</text><text x="148" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: unless-stopped</text>
  <text x="76" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    networks</text><text x="156" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      - frontend</text>
  <text x="76" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      - backend</text>
  <text x="76" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    command</text><text x="152" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: node server.js</text>

  <!-- Right annotations -->
  <rect x="482" y="82" width="338" height="36" rx="6" fill="#132030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="651" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">이미지 또는 빌드 — 하나만 (또는 둘 다)</text>
  <line x1="460" y1="136" x2="480" y2="100" stroke="#7ec8e3" stroke-width="1"/>

  <rect x="482" y="130" width="338" height="36" rx="6" fill="#0f1a10" stroke="#55c555" stroke-width="1"/>
  <text x="651" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">호스트포트:컨테이너포트 바인딩</text>
  <line x1="460" y1="166" x2="480" y2="148" stroke="#55c555" stroke-width="1"/>

  <rect x="482" y="178" width="338" height="36" rx="6" fill="#181818" stroke="#555" stroke-width="1"/>
  <text x="651" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">bind mount / named volume</text>
  <line x1="460" y1="206" x2="480" y2="196" stroke="#555" stroke-width="1"/>

  <rect x="482" y="226" width="338" height="36" rx="6" fill="#181818" stroke="#555" stroke-width="1"/>
  <text x="651" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">환경 변수 (리스트/맵)</text>
  <line x1="460" y1="246" x2="480" y2="244" stroke="#555" stroke-width="1"/>

  <rect x="482" y="274" width="338" height="56" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="651" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">의존성 + 헬스체크 조건</text>
  <text x="651" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">service_started / service_healthy</text>
  <line x1="460" y1="306" x2="480" y2="302" stroke="#e05555" stroke-width="1"/>

  <rect x="482" y="342" width="338" height="36" rx="6" fill="#181828" stroke="#7777cc" stroke-width="1"/>
  <text x="651" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">컨테이너 상태 모니터링</text>
  <line x1="460" y1="356" x2="480" y2="360" stroke="#7777cc" stroke-width="1"/>

  <rect x="482" y="390" width="338" height="36" rx="6" fill="#0f1a10" stroke="#55c555" stroke-width="1"/>
  <text x="651" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">재시작 정책 (no/always/on-failure)</text>
  <line x1="460" y1="386" x2="480" y2="408" stroke="#55c555" stroke-width="1"/>

  <rect x="482" y="438" width="338" height="36" rx="6" fill="#132030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="651" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">소속 네트워크 (복수 가능)</text>
  <line x1="460" y1="426" x2="480" y2="456" stroke="#7ec8e3" stroke-width="1"/>
</svg>
