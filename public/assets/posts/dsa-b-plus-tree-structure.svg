<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arwb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">B+ 트리 구조</text>

  <!-- Internal node label -->
  <text x="50" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">내부 노드 (키만 보유, 데이터 없음)</text>

  <!-- Root: [20 | 40] -->
  <rect x="310" y="92" width="260" height="48" fill="#1a2a4a" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="396" y1="92" x2="396" y2="140" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="483" y1="92" x2="483" y2="140" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="353" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">20</text>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">40</text>
  <text x="526" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→</text>

  <!-- Level 2 internal: [10] [30] [50 | 60] -->
  <rect x="90" y="185" width="140" height="44" fill="#1a2a4a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="159" y1="185" x2="159" y2="229" stroke="#7ec8e3" stroke-width="1"/>
  <text x="124" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">10</text>
  <text x="195" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→</text>

  <rect x="340" y="185" width="140" height="44" fill="#1a2a4a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="409" y1="185" x2="409" y2="229" stroke="#7ec8e3" stroke-width="1"/>
  <text x="374" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">30</text>
  <text x="445" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→</text>

  <rect x="580" y="185" width="200" height="44" fill="#1a2a4a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="646" y1="185" x2="646" y2="229" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="713" y1="185" x2="713" y2="229" stroke="#7ec8e3" stroke-width="1"/>
  <text x="613" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">50</text>
  <text x="679" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">60</text>
  <text x="746" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→</text>

  <!-- Edges root→level2 -->
  <line x1="353" y1="140" x2="160" y2="185" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="140" x2="409" y2="185" stroke="#555" stroke-width="1.5"/>
  <line x1="526" y1="140" x2="680" y2="185" stroke="#555" stroke-width="1.5"/>

  <!-- Leaf nodes label -->
  <text x="50" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">리프 노드 (실제 데이터 보유 + 연결 리스트)</text>

  <!-- Leaf nodes -->
  <rect x="50" y="278" width="130" height="50" fill="#0d2010" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="115" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">5, 8, 9</text>
  <text x="115" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ data</text>

  <rect x="200" y="278" width="130" height="50" fill="#0d2010" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="265" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">10, 15, 18</text>
  <text x="265" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ data</text>

  <rect x="350" y="278" width="130" height="50" fill="#0d2010" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="415" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">20, 25, 28</text>
  <text x="415" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ data</text>

  <rect x="500" y="278" width="130" height="50" fill="#0d2010" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="565" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">40, 45, 48</text>
  <text x="565" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ data</text>

  <rect x="650" y="278" width="130" height="50" fill="#0d2010" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="715" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">50, 55, 58</text>
  <text x="715" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ data</text>

  <!-- Linked list arrows between leaves -->
  <path d="M 180 303 L 200 303" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <path d="M 330 303 L 350 303" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <path d="M 480 303 L 500 303" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <path d="M 630 303 L 650 303" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arw)"/>

  <!-- Internal → leaf edges -->
  <line x1="124" y1="229" x2="115" y2="278" stroke="#555" stroke-width="1.5"/>
  <line x1="195" y1="229" x2="265" y2="278" stroke="#555" stroke-width="1.5"/>
  <line x1="374" y1="229" x2="350" y2="278" stroke="#555" stroke-width="1.5"/>
  <line x1="445" y1="229" x2="475" y2="278" stroke="#555" stroke-width="1.5"/>
  <line x1="613" y1="229" x2="565" y2="278" stroke="#555" stroke-width="1.5"/>
  <line x1="746" y1="229" x2="715" y2="278" stroke="#555" stroke-width="1.5"/>

  <!-- Summary box -->
  <rect x="50" y="345" width="780" height="75" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">B 트리 vs B+ 트리 핵심 차이</text>
  <text x="80" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">B 트리: 모든 노드에 데이터. 검색이 빠를 수도 있음</text>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">B+ 트리: 리프에만 데이터. 리프 연결→범위 검색 O(k). 내부 노드가 더 많은 키→높이 낮아짐</text>
</svg>
