<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">논리 할당 — 단락 평가 비교</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">할당이 일어나는 조건</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Left panel -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">언제 할당되는가?</text>
  <rect x="60" y="126" width="340" height="190" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">x = </tspan><tspan fill="#7ec8e3">1</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">x </tspan><tspan fill="#7ec8e3">&amp;&amp;=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// 1→99 ✓</tspan>
  </text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">x = </tspan><tspan fill="#7ec8e3">0</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">x </tspan><tspan fill="#7ec8e3">&amp;&amp;=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// 0 (할당 안됨) ✗</tspan>
  </text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">x = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">x </tspan><tspan fill="#7ec8e3">||=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// 0→99 ✓</tspan>
  </text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">x = </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">x </tspan><tspan fill="#7ec8e3">??=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// null→99 ✓</tspan>
  </text>

  <!-- Right panel -->
  <text x="480" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실전 패턴</text>
  <rect x="480" y="126" width="340" height="190" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 기본값 설정 (null 병합)</text>
  <text x="496" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">opts.timeout </tspan><tspan fill="#7ec8e3">??=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">5000</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="496" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 로그인 상태 검증</text>
  <text x="496" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">user </tspan><tspan fill="#7ec8e3">&amp;&amp;=</tspan><tspan fill="#ffffff"> sanitize(user);</tspan>
  </text>
  <text x="496" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 폴백 라벨</text>
  <text x="496" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">label </tspan><tspan fill="#7ec8e3">||=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'익명'</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="496" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ('' 빈 문자열도 대체됨)</text>

</svg>
