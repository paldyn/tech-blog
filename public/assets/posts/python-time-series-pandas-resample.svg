<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">resample: 시간 단위로 다시 묶기</text>

  <defs>
    <marker id="rsar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="160" y="92" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">일별 데이터</text>
  <g text-anchor="middle">
    <rect x="60" y="104" width="200" height="30" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="160" y="124" font-size="12" fill="#9aa4b8">01-01  ·  01-02</text>
    <rect x="60" y="138" width="200" height="30" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="160" y="158" font-size="12" fill="#9aa4b8">01-03  ·  ...</text>
    <rect x="60" y="172" width="200" height="30" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="160" y="192" font-size="12" fill="#9aa4b8">01-31  (31행)</text>
  </g>

  <path d="M 270 153 C 330 153, 330 153, 386 153" fill="none" stroke="#7ec8e3" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#rsar)"/>
  <text x="332" y="133" font-size="12" fill="#9aa4b8" text-anchor="middle">resample("M")</text>
  <text x="332" y="178" font-size="12" fill="#9aa4b8" text-anchor="middle">.sum()</text>

  <text x="560" y="92" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">월별 집계 (다운샘플)</text>
  <rect x="390" y="104" width="340" height="98" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="140" font-size="14" fill="#55c555" text-anchor="middle">2026-01    합계 372</text>
  <text x="560" y="172" font-size="13" fill="#9aa4b8" text-anchor="middle">31행 → 1행으로 요약</text>

  <rect x="60" y="226" width="760" height="58" rx="6" fill="#0f1320" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">df.resample(<tspan fill="#ce9178">"M"</tspan>).sum()    <tspan fill="#9aa4b8"># 월별 합계 (다운샘플링)</tspan></text>
  <text xml:space="preserve" x="78" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">df.rolling(<tspan fill="#b5cea8">7</tspan>).mean()      <tspan fill="#9aa4b8"># 7일 이동평균</tspan></text>
</svg>
