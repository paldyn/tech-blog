<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">babel.config.json 구성 레이어</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">Preset = 플러그인 묶음 · 프리셋은 역순으로 실행 · 플러그인은 정순 실행</text>

  <!-- Left column: config code -->
  <rect x="60" y="96" width="390" height="282" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// babel.config.json</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">"presets"</tspan><tspan fill="#ffffff">: [</tspan></text>

  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    [</tspan><tspan fill="#ce9178">"@babel/preset-env"</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      {</text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">        "targets"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"&gt; 0.5%, last 2"</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">        "useBuiltIns"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"usage"</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">        "corejs"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">3</tspan></text>

  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      }]</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  ],</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">  "plugins"</tspan><tspan fill="#ffffff">: [</tspan></text>
  
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    "@babel/plugin-transform-runtime"</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  ]</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Right column: preset/plugin explanation -->
  <text x="490" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">주요 프리셋</text>

  <rect x="490" y="120" width="330" height="56" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="506" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">@babel/preset-env</text>
  <text x="506" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">타겟 브라우저 기준 ES5 변환 + polyfill</text>

  <rect x="490" y="186" width="330" height="56" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="506" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">@babel/preset-react</text>
  <text x="506" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">JSX → React.createElement 변환</text>

  <rect x="490" y="252" width="330" height="56" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="506" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">@babel/preset-typescript</text>
  <text x="506" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">TS 타입 제거 (타입 검사 제외)</text>

  <text x="490" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" xml:space="preserve">실행 순서</text>

  <rect x="490" y="338" width="330" height="40" rx="6" fill="#1a0d2b" stroke="#3a1e70"/>
  <text x="506" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">플러그인 → 정순 (위에서 아래로)</text>
  <text x="506" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">프리셋 → 역순 (아래에서 위로)</text>

  <!-- Bottom note -->
  <text x="60" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">useBuiltIns: "usage" — import된 기능만 자동 polyfill / corejs: 3 — core-js v3 사용</text>
</svg>
