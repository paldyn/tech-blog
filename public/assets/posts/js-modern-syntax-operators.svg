<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }</style>
  </defs>
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" fill="#e8e8e8" font-size="18" font-weight="600" text-anchor="middle">ES2020–2023 핵심 모던 연산자</text>
  <line x1="40" y1="54" x2="840" y2="54" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Card 1: Optional Chaining -->
  <rect x="20" y="68" width="415" height="178" fill="#111" rx="8"/>
  <rect x="20" y="68" width="4" height="178" fill="#7dd3fc" rx="2"/>
  <text x="38" y="91" fill="#7dd3fc" font-size="13" font-weight="600">옵셔널 체이닝  ?.   — ES2020</text>
  <text x="38" y="109" fill="#888" font-size="11">null · undefined 에서 프로퍼티 접근 시 오류 대신 undefined 반환</text>

  <rect x="38" y="119" width="381" height="80" fill="#0d0d0d" rx="5"/>
  <text x="50" y="136" fill="#555" font-size="11" font-family="monospace, 'Courier New'">//  이전: 방어 코드</text>
  <text x="50" y="152" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const city = user &amp;&amp; user.address &amp;&amp; user.address.city</text>
  <text x="50" y="170" fill="#555" font-size="11" font-family="monospace, 'Courier New'">//  이후</text>
  <text x="50" y="186" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const city = user<tspan fill="#7dd3fc">?.</tspan>address<tspan fill="#7dd3fc">?.</tspan>city</text>

  <text x="38" y="221" fill="#444" font-size="10">?.()  메서드 호출  ·  ?.[]  동적 키  ·  ?.  와 await 결합 가능</text>

  <!-- Card 2: Nullish Coalescing -->
  <rect x="445" y="68" width="415" height="178" fill="#111" rx="8"/>
  <rect x="445" y="68" width="4" height="178" fill="#86efac" rx="2"/>
  <text x="463" y="91" fill="#86efac" font-size="13" font-weight="600">널 병합  ??   — ES2020</text>
  <text x="463" y="109" fill="#888" font-size="11">null · undefined 일 때만 오른쪽 값을 사용 (falsy와 구별)</text>

  <rect x="463" y="119" width="381" height="80" fill="#0d0d0d" rx="5"/>
  <text x="475" y="136" fill="#555" font-size="11" font-family="monospace, 'Courier New'">//  ||  는 0, '', false 도 우측 선택</text>
  <text x="475" y="152" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const port = config.port <tspan fill="#f87171">||</tspan> 3000  <tspan fill="#555">// 0 → 3000 ❌</tspan></text>
  <text x="475" y="170" fill="#555" font-size="11" font-family="monospace, 'Courier New'">//  ??  는 null/undefined 만</text>
  <text x="475" y="186" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const port = config.port <tspan fill="#86efac">??</tspan> 3000  <tspan fill="#555">// 0 → 0  ✓</tspan></text>

  <text x="463" y="221" fill="#444" font-size="10">?. 와 결합:  user?.name ?? '익명'  —  안전하고 간결한 기본값 패턴</text>

  <!-- Card 3: Logical Assignment -->
  <rect x="20" y="260" width="415" height="185" fill="#111" rx="8"/>
  <rect x="20" y="260" width="4" height="185" fill="#c4b5fd" rx="2"/>
  <text x="38" y="283" fill="#c4b5fd" font-size="13" font-weight="600">논리 할당  &amp;&amp;=  ||=  ??=   — ES2021</text>
  <text x="38" y="301" fill="#888" font-size="11">논리 연산 + 조건부 할당을 하나의 표현식으로</text>

  <rect x="38" y="311" width="381" height="96" fill="#0d0d0d" rx="5"/>
  <text x="50" y="329" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">obj.count <tspan fill="#c4b5fd">&amp;&amp;=</tspan> obj.count + 1 <tspan fill="#555">// truthy일 때만 할당</tspan></text>
  <text x="50" y="348" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">settings.theme <tspan fill="#f59e0b">||=</tspan> 'dark'      <tspan fill="#555">// falsy면 기본값</tspan></text>
  <text x="50" y="367" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">config.timeout <tspan fill="#86efac">??=</tspan> 5000      <tspan fill="#555">// null/undef면 기본값</tspan></text>
  <text x="50" y="386" fill="#555" font-size="11" font-family="monospace, 'Courier New'"><tspan fill="#555">// ??=  이 가장 안전 — 0, false, '' 도 보존</tspan></text>

  <text x="38" y="427" fill="#444" font-size="10">단락 평가(short-circuit)로 동작 — 조건이 거짓이면 우측 표현식 실행 안 함</text>

  <!-- Card 4: Misc ES2021-2023 -->
  <rect x="445" y="260" width="415" height="185" fill="#111" rx="8"/>
  <rect x="445" y="260" width="4" height="185" fill="#fbbf24" rx="2"/>
  <text x="463" y="283" fill="#fbbf24" font-size="13" font-weight="600">기타 편의 문법   — ES2021–2023</text>
  <text x="463" y="301" fill="#888" font-size="11">숫자 구분자 · at() · hasOwn() · 불변 배열 메서드</text>

  <rect x="463" y="311" width="381" height="96" fill="#0d0d0d" rx="5"/>
  <text x="475" y="329" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const budget = 1<tspan fill="#fbbf24">_</tspan>000<tspan fill="#fbbf24">_</tspan>000    <tspan fill="#555">// 숫자 구분자 2021</tspan></text>
  <text x="475" y="348" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">arr<tspan fill="#fbbf24">.at</tspan>(-1)                  <tspan fill="#555">// 끝에서 n번째 2022</tspan></text>
  <text x="475" y="367" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">Object<tspan fill="#fbbf24">.hasOwn</tspan>(obj, 'key')    <tspan fill="#555">// 안전한 소유 검사 2022</tspan></text>
  <text x="475" y="386" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">arr<tspan fill="#fbbf24">.toSorted</tspan>()              <tspan fill="#555">// 원본 보존 정렬 2023</tspan></text>

  <text x="463" y="427" fill="#444" font-size="10">toReversed()  ·  toSpliced()  ·  with(i, v)  모두 ES2023 불변 배열 API</text>
</svg>
