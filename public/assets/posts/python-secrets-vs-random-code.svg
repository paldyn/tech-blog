<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">보안 토큰은 secrets로 만든다</text>

  <rect x="60" y="80" width="760" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="112" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 예측 가능 — 절대 보안에 쓰지 말 것</text>
  <text xml:space="preserve" x="80" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> random</tspan></text>
  <text xml:space="preserve" x="80" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">token = random.randint(</tspan><tspan fill="#b5cea8">1000</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">9999</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8"># 취약</tspan></text>

  <text xml:space="preserve" x="80" y="200" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 암호학적으로 안전 — 토큰·비밀번호 재설정 링크</text>
  <text xml:space="preserve" x="80" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> secrets</tspan></text>
  <text xml:space="preserve" x="80" y="244" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">api_key = secrets.token_urlsafe(</tspan><tspan fill="#b5cea8">32</tspan><tspan fill="#ffffff">)</tspan></text>
  <text xml:space="preserve" x="80" y="266" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">otp = secrets.randbelow(</tspan><tspan fill="#b5cea8">1000000</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8"># 안전</tspan></text>
</svg>
