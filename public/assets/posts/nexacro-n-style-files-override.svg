<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스타일 우선순위 &amp; 재정의 규칙</text>

  <!-- Priority pyramid -->
  <!-- Inline style (highest) -->
  <rect x="320" y="68" width="240" height="52" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">① 인라인 스타일 (최고 우선순위)</text>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">XFDL 속성 직접 설정 / set_xxx() API</text>

  <line x1="440" y1="120" x2="440" y2="138" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="480" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">덮어씀</text>

  <!-- cssclass -->
  <rect x="260" y="142" width="360" height="52" rx="6" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">② cssclass 스타일</text>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컴포넌트에 지정한 클래스 (.btn_primary 등)</text>

  <line x1="440" y1="194" x2="440" y2="212" stroke="#b5cea8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Theme override ESS -->
  <rect x="200" y="216" width="480" height="52" rx="6" fill="#0d1523" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 테마 override ESS (light/override.ess)</text>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">테마별 색상 재정의 — TypeDef에서 나중에 로드</text>

  <line x1="440" y1="268" x2="440" y2="286" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Common ESS (lowest) -->
  <rect x="80" y="290" width="720" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">④ 공통 ESS (common/button.ess 등)</text>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기본 컴포넌트 스타일 — 최초 로드, 가장 낮은 우선순위</text>

  <!-- Note -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">TypeDefinition에서 StyleSheet 등록 순서대로 로드 → 나중 파일이 이전 파일을 덮어씀</text>
</svg>
