<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">5xx 서버 오류</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">서버 처리 실패 — 서버·인프라 팀이 수정해야 함</text>

  <!-- 500 -->
  <rect x="60" y="90" width="760" height="56" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="60" y="90" width="74" height="56" rx="6" fill="#100812" stroke="#7777cc" stroke-width="1.5"/>
  <text x="97" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7777cc" text-anchor="middle">500</text>
  <text x="168" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Internal Server Error</text>
  <text x="168" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버 내부 예외 · NullPointerException·DB 오류 등 · 스택 트레이스 노출 금지</text>

  <!-- 501 -->
  <rect x="60" y="154" width="760" height="50" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1"/>
  <rect x="60" y="154" width="74" height="50" rx="6" fill="#100812" stroke="#7777cc" stroke-width="1"/>
  <text x="97" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7777cc" text-anchor="middle">501</text>
  <text x="168" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Not Implemented</text>
  <text x="168" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버가 해당 기능 미구현 · 향후 지원 예정 기능 · 405와 구별</text>

  <!-- 502 -->
  <rect x="60" y="212" width="760" height="56" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="60" y="212" width="74" height="56" rx="6" fill="#100812" stroke="#7777cc" stroke-width="1.5"/>
  <text x="97" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7777cc" text-anchor="middle">502</text>
  <text x="168" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Bad Gateway</text>
  <text x="168" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">프록시·게이트웨이가 업스트림 서버에서 잘못된 응답 수신 · Nginx ↔ 앱 서버 단절</text>

  <!-- 503 -->
  <rect x="60" y="276" width="760" height="56" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="60" y="276" width="74" height="56" rx="6" fill="#100812" stroke="#7777cc" stroke-width="1.5"/>
  <text x="97" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7777cc" text-anchor="middle">503</text>
  <text x="168" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Service Unavailable</text>
  <text x="168" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서비스 일시 불가 · 과부하·점검 · Retry-After 헤더로 재시도 시간 안내</text>

  <!-- 504 / 508 -->
  <rect x="60" y="340" width="360" height="56" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1"/>
  <rect x="60" y="340" width="74" height="56" rx="6" fill="#100812" stroke="#7777cc" stroke-width="1"/>
  <text x="97" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7777cc" text-anchor="middle">504</text>
  <text x="168" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Gateway Timeout</text>
  <text x="168" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">업스트림 응답 시간 초과</text>

  <rect x="460" y="340" width="360" height="56" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1"/>
  <rect x="460" y="340" width="74" height="56" rx="6" fill="#100812" stroke="#7777cc" stroke-width="1"/>
  <text x="497" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7777cc" text-anchor="middle">508</text>
  <text x="568" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Loop Detected</text>
  <text x="568" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버 처리 중 무한 루프 탐지</text>

  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">500: 개발자 코드 버그 · 502/504: 인프라/네트워크 문제 · 503: 서버 과부하·점검</text>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">500 응답 시 스택 트레이스·내부 경로 절대 노출 금지 — 보안 취약점으로 악용 가능</text>
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">503 + Retry-After: 클라이언트가 지수 백오프로 재시도하도록 유도</text>
</svg>
