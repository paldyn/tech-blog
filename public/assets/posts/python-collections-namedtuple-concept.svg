<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">namedtuple — 이름 있는 튜플</text>

  <!-- Comparison: tuple vs namedtuple -->
  <rect x="60" y="72" width="360" height="148" rx="10" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">일반 tuple</text>
  <rect x="76" y="106" width="328" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p = (<tspan fill="#ce9178">"Alice"</tspan>, <tspan fill="#b5cea8">30</tspan>, <tspan fill="#ce9178">"Seoul"</tspan>)</text>
  <text x="92" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p[<tspan fill="#b5cea8">0</tspan>]  <tspan fill="#6a8aa0"># "Alice" — 인덱스만</tspan></text>
  <text x="92" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p[<tspan fill="#b5cea8">1</tspan>]  <tspan fill="#6a8aa0"># 30 — 의미 불분명</tspan></text>
  <text x="92" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p[<tspan fill="#b5cea8">2</tspan>]  <tspan fill="#6a8aa0"># "Seoul" — 무엇인지?</tspan></text>

  <rect x="460" y="72" width="360" height="148" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">namedtuple</text>
  <rect x="476" y="106" width="328" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from collections <tspan fill="#7ec8e3">import</tspan> namedtuple</text>
  <text x="492" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Person = namedtuple(<tspan fill="#ce9178">'Person'</tspan>, [<tspan fill="#ce9178">'name'</tspan>,<tspan fill="#ce9178">'age'</tspan>,<tspan fill="#ce9178">'city'</tspan>])</text>
  <text x="492" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p = Person(<tspan fill="#ce9178">"Alice"</tspan>, <tspan fill="#b5cea8">30</tspan>, <tspan fill="#ce9178">"Seoul"</tspan>)</text>
  <text x="492" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p.name  <tspan fill="#6a8aa0"># "Alice" — 명확!</tspan></text>

  <!-- Features -->
  <rect x="60" y="240" width="760" height="136" rx="8" fill="#0d0d0d" stroke="#1e2433"/>
  <text x="440" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">namedtuple의 특성</text>

  <text x="100" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 불변(immutable)</text>
  <text x="280" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">튜플과 동일 — 수정 불가</text>

  <text x="100" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 인덱스 + 이름 접근</text>
  <text x="280" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">p[0] 과 p.name 모두 가능</text>

  <text x="100" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 언패킹 지원</text>
  <text x="280" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">name, age, city = p</text>

  <text x="100" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 메모리 효율</text>
  <text x="280" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">dict보다 훨씬 적은 메모리 사용 (tuple 기반)</text>
</svg>
