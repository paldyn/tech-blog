<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="ms-flow" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">멀티플렉싱 — 하나의 연결에 여러 스트림이 동시에</text>

  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">클라이언트</text>
  <text x="744" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">서버</text>

  <!-- single TCP connection channel -->
  <rect x="60" y="118" width="760" height="160" fill="#000000" stroke="#3a4a6e" rx="6"/>
  <text x="78" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단일 TCP 연결 — 프레임이 인터리빙되어 흐름</text>

  <!-- interleaved frames inside the channel, colored by stream -->
  <!-- stream 1 = blue, stream 3 = green, stream 5 = purple -->
  <rect x="84" y="160"  width="58" height="34" fill="#7ec8e3" rx="4"/>
  <text x="100" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#0a0a0a">S1</text>
  <rect x="150" y="160" width="58" height="34" fill="#55c555" rx="4"/>
  <text x="166" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#0a0a0a">S3</text>
  <rect x="216" y="160" width="58" height="34" fill="#7777cc" rx="4"/>
  <text x="232" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#0a0a0a">S5</text>
  <rect x="282" y="160" width="58" height="34" fill="#55c555" rx="4"/>
  <text x="298" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#0a0a0a">S3</text>
  <rect x="348" y="160" width="58" height="34" fill="#7ec8e3" rx="4"/>
  <text x="364" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#0a0a0a">S1</text>
  <rect x="414" y="160" width="58" height="34" fill="#7777cc" rx="4"/>
  <text x="430" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#0a0a0a">S5</text>
  <rect x="480" y="160" width="58" height="34" fill="#7ec8e3" rx="4"/>
  <text x="496" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#0a0a0a">S1</text>
  <rect x="546" y="160" width="58" height="34" fill="#55c555" rx="4"/>
  <text x="562" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#0a0a0a">S3</text>

  <!-- direction arrow within channel -->
  <line x1="84" y1="222" x2="796" y2="222" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ms-flow)"/>
  <text x="84" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">각 프레임에 스트림 ID가 붙어 있어 받는 쪽이 스트림별로 재조립</text>

  <!-- legend: three streams = three request/response pairs -->
  <rect x="60" y="306" width="240" height="84" fill="#000000" stroke="#3a4a6e" rx="6"/>
  <rect x="80" y="328" width="18" height="18" fill="#7ec8e3" rx="3"/>
  <text x="108" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스트림 1 — GET /index.html</text>
  <rect x="80" y="358" width="18" height="18" fill="#55c555" rx="3"/>
  <text x="108" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스트림 3 — GET /app.css</text>

  <rect x="320" y="306" width="240" height="84" fill="#000000" stroke="#3a4a6e" rx="6"/>
  <rect x="340" y="328" width="18" height="18" fill="#7777cc" rx="3"/>
  <text x="368" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스트림 5 — GET /app.js</text>
  <text x="340" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">= 요청/응답 쌍 = 스트림</text>

  <rect x="580" y="306" width="240" height="84" fill="#000000" stroke="#3a4a6e" rx="6"/>
  <text x="600" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">순서에 묶이지 않음</text>
  <text x="600" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">준비되는 대로 응답</text>
</svg>
