<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GitHub Pages 배포 파이프라인</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">push 한 번으로 빌드와 배포가 자동 실행된다</text>

  <rect x="40" y="130" width="180" height="80" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="165" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">git push</text>
  <text x="130" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">소스 커밋</text>

  <rect x="280" y="130" width="180" height="80" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="370" y="165" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#9988dd">Actions</text>
  <text x="370" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">빌드 → artifact</text>

  <rect x="520" y="130" width="180" height="80" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="610" y="165" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#9988dd">deploy</text>
  <text x="610" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Pages 게시</text>

  <rect x="730" y="130" width="120" height="80" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="165" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">CDN</text>
  <text x="790" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">공개 URL</text>

  <line x1="220" y1="170" x2="274" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="460" y1="170" x2="514" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="700" y1="170" x2="724" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <text x="440" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">결과 URL: https://&lt;user&gt;.github.io/&lt;repo&gt;/</text>
</svg>
