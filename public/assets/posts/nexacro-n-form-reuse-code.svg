<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">BaseForm 상속 코드 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">공통 기능을 BaseForm에, 화면별 로직을 자식 폼에</text>

  <!-- Left: BaseForm -->
  <text x="40" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">BaseForm.xfdl — 공통 로직</text>
  <rect x="40" y="108" width="380" height="272" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 공통 단축키 처리</text>
  <text x="56" y="151" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> form_onkeydown(obj, e) {</text>
  <text x="56" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">if</tspan> (e.keycode == <tspan fill="#b5cea8">116</tspan>) { <tspan fill="#9aa4b8">// F5</tspan></text>
  <text x="56" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">if</tspan> (<tspan fill="#7ec8e3" font-weight="600">typeof</tspan> <tspan fill="#7ec8e3" font-weight="600">this</tspan>.fnSearch</text>
  <text x="56" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      == <tspan fill="#ce9178">"function"</tspan>) {</text>
  <text x="56" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">this</tspan>.fnSearch();</text>
  <text x="56" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    }</text>
  <text x="56" y="265" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="56" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="56" y="311" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 공통 권한 확인</text>
  <text x="56" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> fnCheckAuth(sMenu) {</text>
  <text x="56" y="349" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> gfn_checkAuth(sMenu);</text>
  <text x="56" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Right: Child form -->
  <text x="460" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">UserList.xfdl — 자식 폼 (BaseForm 상속)</text>
  <rect x="460" y="108" width="380" height="272" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// inheriturl로 BaseForm 상속</text>
  <text x="476" y="151" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// (xfdl에서 inheriturl 속성 설정)</text>
  <text x="476" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 자식 폼의 onload</text>
  <text x="476" y="197" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> form_onload(obj, e) {</text>
  <text x="476" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#9aa4b8">// 부모 onload 호출 (필요 시)</tspan></text>
  <text x="476" y="235" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">this</tspan>.parent.form_onload(obj, e);</text>
  <text x="476" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">this</tspan>.fnSearch();</text>
  <text x="476" y="273" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="476" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 화면별 조회 로직만 구현</text>
  <text x="476" y="319" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> fnSearch() {</text>
  <text x="476" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">this</tspan>.transaction(</text>
  <text x="476" y="357" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"USER_LIST"</tspan>, svcUrl, ...);</text>
  <text x="476" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
</svg>
