<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring Framework — 계층 구조</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">엔터프라이즈 애플리케이션을 위한 종합 프레임워크</text>

  <!-- Layer 1: Your Application (top) -->
  <rect x="60" y="108" width="760" height="80" rx="10" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">비즈니스 로직 (Your Application)</text>
  <text x="440" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Controller · Service · Repository · Domain</text>

  <!-- Arrow down -->
  <line x1="440" y1="188" x2="440" y2="212" stroke="#555" stroke-width="2"/>
  <polygon points="440,220 433,208 447,208" fill="#555"/>
  <text x="460" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">의존</text>

  <!-- Layer 2: Spring Framework (middle) -->
  <rect x="60" y="220" width="760" height="116" rx="10" fill="#1a1f2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">Spring Framework</text>

  <!-- Sub-modules inside Spring -->
  <rect x="90" y="258" width="155" height="60" rx="6" fill="#0f1a10" stroke="#55c555" stroke-width="1"/>
  <text x="167" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Core / IoC</text>
  <text x="167" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Bean · DI · AOP</text>

  <rect x="265" y="258" width="155" height="60" rx="6" fill="#0f1318" stroke="#7ec8e3" stroke-width="1"/>
  <text x="342" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Web MVC</text>
  <text x="342" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Controller · REST</text>

  <rect x="440" y="258" width="155" height="60" rx="6" fill="#12100f" stroke="#ce9178" stroke-width="1"/>
  <text x="517" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">Data Access</text>
  <text x="517" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JDBC · JPA · TX</text>

  <rect x="615" y="258" width="155" height="60" rx="6" fill="#100f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="692" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Security / Test</text>
  <text x="692" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Auth · MockMvc</text>

  <!-- Arrow down -->
  <line x1="440" y1="336" x2="440" y2="360" stroke="#555" stroke-width="2"/>
  <polygon points="440,368 433,356 447,356" fill="#555"/>
  <text x="460" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">구동</text>

  <!-- Layer 3: Java / Jakarta EE (bottom) -->
  <rect x="60" y="368" width="760" height="72" rx="10" fill="#1a1f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">Java / Jakarta EE</text>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">JVM · Servlet · JDBC · JPA 표준 · JTA</text>
</svg>
