<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">feature 브랜치 워크플로우</text>

  <!-- develop baseline -->
  <text x="76" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">develop</text>
  <line x1="60" y1="114" x2="820" y2="114" stroke="#55c555" stroke-width="2.5"/>

  <!-- develop commits -->
  <circle cx="160" cy="114" r="7" fill="#55c555"/>
  <circle cx="340" cy="114" r="7" fill="#55c555"/>
  <circle cx="560" cy="114" r="7" fill="#55c555"/>

  <!-- feature/login -->
  <text x="200" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">feature/login</text>
  <line x1="220" y1="204" x2="440" y2="204" stroke="#7777cc" stroke-width="2"/>
  <circle cx="300" cy="204" r="6" fill="#7777cc"/>
  <circle cx="380" cy="204" r="6" fill="#7777cc"/>
  <circle cx="440" cy="204" r="6" fill="#7777cc"/>

  <!-- feature/login branch + merge -->
  <line x1="220" y1="114" x2="220" y2="204" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-p)"/>
  <path d="M 440 204 Q 500 204 500 160 Q 500 114 560 114" fill="none" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>

  <!-- feature/payment -->
  <text x="400" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">feature/payment</text>
  <line x1="420" y1="304" x2="640" y2="304" stroke="#7777cc" stroke-width="2"/>
  <circle cx="480" cy="304" r="6" fill="#7777cc"/>
  <circle cx="560" cy="304" r="6" fill="#7777cc"/>
  <circle cx="640" cy="304" r="6" fill="#7777cc"/>

  <line x1="420" y1="114" x2="420" y2="304" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-p)"/>
  <path d="M 640 304 Q 700 304 700 210 Q 700 114 740 114" fill="none" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
  <circle cx="740" cy="114" r="7" fill="#55c555"/>

  <!-- labels -->
  <text x="160" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">초기</text>
  <text x="340" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">다른 머지</text>
  <text x="560" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">login 머지</text>
  <text x="740" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">payment 머지</text>

  <!-- step boxes -->
  <rect x="60" y="364" width="178" height="72" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="149" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">① 브랜치 생성</text>
  <text x="149" y="406" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">git flow feature</text>
  <text x="149" y="422" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">  start login</text>

  <rect x="258" y="364" width="178" height="72" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.2"/>
  <text x="347" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">② 커밋</text>
  <text x="347" y="406" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">git add .</text>
  <text x="347" y="422" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">git commit</text>

  <rect x="456" y="364" width="178" height="72" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="545" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">③ 리베이스</text>
  <text x="545" y="406" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">git rebase develop</text>
  <text x="545" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">(충돌 예방)</text>

  <rect x="654" y="364" width="166" height="72" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="737" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">④ 머지</text>
  <text x="737" y="406" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">git flow feature</text>
  <text x="737" y="422" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">  finish login</text>
</svg>
