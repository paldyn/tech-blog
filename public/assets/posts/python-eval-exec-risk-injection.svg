<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="ev_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">eval은 입력을 코드로 평가한다</text>

  <rect x="60" y="78" width="760" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="110" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 계산기를 만든다며 사용자 입력을 그대로 평가</text>
  <text xml:space="preserve" x="80" y="132" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">expr = input()            </tspan><tspan fill="#9aa4b8"># 기대값: "2 + 2"</tspan></text>
  <text xml:space="preserve" x="80" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">result = </tspan><tspan fill="#e05555" font-weight="600">eval</tspan><tspan fill="#ffffff">(expr)        </tspan><tspan fill="#9aa4b8"># 위험</tspan></text>
  <text xml:space="preserve" x="80" y="188" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># 공격자가 이렇게 입력하면:</tspan></text>

  <rect x="60" y="232" width="760" height="58" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="266" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">__import__('os').system('rm -rf ~')</text>
  <text x="560" y="266" font-size="14" fill="#e05555">→ 시스템 명령이 그대로 실행됨 ⚠</text>

  <line x1="440" y1="206" x2="440" y2="228" stroke="#e05555" stroke-width="2" marker-end="url(#ev_arr)"/>
</svg>
