<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BuildKit 캐시 마운트 전략</text>

  <!-- Without cache mount -->
  <rect x="60" y="70" width="360" height="200" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">기존 방식 (캐시 미사용)</text>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">매 빌드마다 패키지 전체 다운로드</text>
  <rect x="76" y="126" width="328" height="132" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">FROM</text>
  <text x="136" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> node:20-alpine</text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">COPY</text>
  <text x="136" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> package*.json ./</text>
  <text x="92" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">RUN</text>
  <text x="124" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> npm install</text>
  <text x="92" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" xml:space="preserve"># package.json 변경 시</text>
  <text x="92" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" xml:space="preserve"># 전체 npm install 재실행</text>
  <text x="92" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># 수백 MB 다운로드 반복</text>

  <!-- With cache mount -->
  <rect x="460" y="70" width="360" height="200" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">BuildKit 캐시 마운트</text>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">npm 캐시를 BuildKit이 재사용</text>
  <rect x="476" y="126" width="328" height="132" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">FROM</text>
  <text x="536" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> node:20-alpine</text>
  <text x="492" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">COPY</text>
  <text x="536" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> package*.json ./</text>
  <text x="492" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">RUN</text>
  <text x="524" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve"> --mount=type=cache,target=/root/.npm \</text>
  <text x="492" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    npm install</text>
  <text x="492" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve"># npm 캐시 유지 — 재빌드 빠름</text>
  <text x="492" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># DOCKER_BUILDKIT=1 필요</text>

  <!-- Bottom note -->
  <rect x="60" y="300" width="760" height="100" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">자주 쓰는 캐시 마운트 경로</text>
  <text x="220" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">npm: /root/.npm</text>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">pip: /root/.cache/pip</text>
  <text x="660" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">apt: /var/cache/apt</text>
  <text x="220" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">go: /go/pkg/mod</text>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">gradle: /root/.gradle</text>
  <text x="660" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">maven: /root/.m2</text>
</svg>
