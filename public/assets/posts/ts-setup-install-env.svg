<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 개발 환경 구성 요소</text>
  <defs>
    <marker id="arr-setup" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <!-- Node.js -->
  <rect x="60" y="80" width="200" height="100" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">Node.js</text>
  <text x="160" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v18 LTS 이상 권장</text>
  <text x="160" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">npm 포함 제공</text>
  <!-- Arrow Node -> npm -->
  <line x1="260" y1="130" x2="330" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-setup)"/>
  <!-- npm -->
  <rect x="330" y="80" width="200" height="100" rx="10" fill="#0a1a10" stroke="#55c555" stroke-width="2"/>
  <text x="430" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">npm</text>
  <text x="430" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패키지 매니저</text>
  <text x="430" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">yarn / pnpm 대체 가능</text>
  <!-- Arrow npm -> TypeScript -->
  <line x1="530" y1="130" x2="600" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-setup)"/>
  <!-- TypeScript -->
  <rect x="600" y="80" width="220" height="100" rx="10" fill="#0a0a1a" stroke="#3178c6" stroke-width="2"/>
  <text x="710" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#3178c6">TypeScript</text>
  <text x="710" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">npm install -D typescript</text>
  <text x="710" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">tsc 컴파일러 포함</text>
  <!-- VS Code -->
  <rect x="160" y="240" width="560" height="110" rx="10" fill="#0d1020" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">VS Code (에디터)</text>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TypeScript Language Server 내장 — 추가 설치 불필요</text>
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">자동완성 · 타입 힌트 · 오류 하이라이팅 기본 제공</text>
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">WebStorm · Neovim · Vim 등도 TypeScript 지원</text>
  <!-- tsconfig.json -->
  <rect x="60" y="380" width="760" height="46" rx="8" fill="#1a1000" stroke="#f0db4f" stroke-width="1"/>
  <text x="440" y="405" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#f0db4f">tsconfig.json — 컴파일러 설정 파일 (npx tsc --init 으로 생성)</text>
  <text x="440" y="421" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">target, module, strict, outDir 등 주요 옵션 설정</text>
</svg>
