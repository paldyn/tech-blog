<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">|| vs ?? — falsy vs nullish 차이</text>

  <!-- || behavior -->
  <rect x="60" y="72" width="360" height="200" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">|| (OR) — falsy 체크</text>
  <text x="240" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">0, '', false, null, undefined, NaN 모두 스킵</text>
  <rect x="84" y="136" width="312" height="120" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="100" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text><text x="110" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> || </text><text x="132" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'default'</text><text x="196" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> // 'default'</text>
  <text x="100" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">''</text><text x="116" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> || </text><text x="138" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'default'</text><text x="202" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> // 'default'</text>
  <text x="100" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">false</text><text x="136" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> || </text><text x="160" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'default'</text><text x="224" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 'default'</text>
  <text x="100" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">null</text><text x="130" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> || </text><text x="152" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'default'</text><text x="216" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> // 'default'</text>
  <text x="100" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">⚠ port || </tspan><tspan fill="#b5cea8">3000</tspan><tspan fill="#9aa4b8">  // port=0이면 3000!</tspan></text>
  <text x="100" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 0은 유효한 포트인데 무시됨</text>

  <!-- ?? behavior -->
  <rect x="460" y="72" width="360" height="200" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">?? (Nullish 병합) — null/undefined만</text>
  <text x="640" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">null, undefined만 우측으로 넘어감</text>
  <rect x="484" y="136" width="312" height="120" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="500" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text><text x="510" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ?? </text><text x="534" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'default'</text><text x="598" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555"> // 0 ✓</text>
  <text x="500" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">''</text><text x="516" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ?? </text><text x="540" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'default'</text><text x="604" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555"> // '' ✓</text>
  <text x="500" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">false</text><text x="536" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ?? </text><text x="562" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'default'</text><text x="626" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">// false ✓</text>
  <text x="500" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">null</text><text x="530" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ?? </text><text x="554" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'default'</text><text x="618" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> // 'default'</text>
  <text x="500" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">port ?? </tspan><tspan fill="#b5cea8">3000</tspan><tspan fill="#55c555">  // port=0도 OK ✓</tspan></text>
  <text x="500" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 0은 유효한 포트로 유지</text>

  <!-- Logical assignment -->
  <text x="60" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">논리 대입 연산자 (ES2021)</text>
  <rect x="60" y="320" width="760" height="138" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// &amp;&amp;= : 왼쪽이 truthy일 때만 오른쪽 대입</text>
  <text x="80" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">let</tspan><tspan fill="#ffffff"> a = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">; a &amp;&amp;= </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// a=99 (1은 truthy)</tspan></text>
  <text x="80" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ||= : 왼쪽이 falsy일 때만 오른쪽 대입</text>
  <text x="80" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">let</tspan><tspan fill="#ffffff"> b = </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">; b ||= </tspan><tspan fill="#ce9178">'init'</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// b='init'</tspan></text>
  <text x="80" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ??= : 왼쪽이 null/undefined일 때만 대입</text>
  <text x="80" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">let</tspan><tspan fill="#ffffff"> c = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">; c ??= </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// c=0 (0은 nullish가 아님)</tspan></text>
  <text x="80" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">let</tspan><tspan fill="#ffffff"> d = </tspan><tspan fill="#7ec8e3">undefined</tspan><tspan fill="#ffffff">; d ??= </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// d=99</tspan></text>

  <!-- Footer -->
</svg>
