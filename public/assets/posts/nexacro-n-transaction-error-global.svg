<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">전역 오류 핸들러 — ontransactionerror</text>

  <!-- Code block -->
  <rect x="60" y="68" width="760" height="292" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="94" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// Application 스크립트에 전역 오류 핸들러 등록</text>
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="133" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> Application_onload(obj, e) {</text>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">    // 전역 트랜잭션 오류 핸들러 등록</text>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    nexacro.ontransactionerror = </text>
  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">        gfn_onTransactionError;</text>
  <text x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">}</text>

  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// 전역 핸들러 함수 (콜백 없는 트랜잭션 오류 포착)</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="133" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> gfn_onTransactionError(svcId, errCode, errMsg) {</text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">    // 세션 만료 공통 처리</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    if</text>
  <text x="99" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> (errCode === </text>
  <text x="175" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">-200</text>
  <text x="203" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">) {</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">        gfn_sessionExpired();</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">        return</text>
  <text x="134" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    }</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">    // 기타 시스템 오류</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    alert(</text>
  <text x="118" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"시스템 오류: "</text>
  <text x="208" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> + errMsg);</text>

  <!-- Bottom note -->
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">콜백 내에서 오류 처리를 했으면 전역 핸들러는 호출되지 않음 — 보완적 안전망 역할</text>
</svg>
