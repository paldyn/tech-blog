<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">멀티 아키텍처 이미지 빌드 흐름</text>

  <!-- Platform boxes -->
  <!-- linux/amd64 -->
  <rect x="60" y="80" width="220" height="80" fill="#111827" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="170" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">linux/amd64</text>
  <text x="170" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">x86_64 서버, CI 환경</text>

  <!-- linux/arm64 -->
  <rect x="60" y="190" width="220" height="80" fill="#111827" rx="10" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle" xml:space="preserve">linux/arm64</text>
  <text x="170" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">Apple M1/M2, AWS Graviton</text>

  <!-- linux/arm/v7 -->
  <rect x="60" y="300" width="220" height="80" fill="#111827" rx="10" stroke="#7777cc" stroke-width="2"/>
  <text x="170" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle" xml:space="preserve">linux/arm/v7</text>
  <text x="170" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">Raspberry Pi 등 IoT</text>

  <!-- Arrows to buildx -->
  <line x1="280" y1="120" x2="360" y2="210" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="280" y1="230" x2="360" y2="230" stroke="#55c555" stroke-width="1.5"/>
  <line x1="280" y1="340" x2="360" y2="260" stroke="#7777cc" stroke-width="1.5"/>

  <!-- buildx builder -->
  <rect x="360" y="170" width="180" height="120" fill="#1a1a2e" rx="10" stroke="#e8e8e8" stroke-width="2"/>
  <text x="450" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">buildx</text>
  <text x="450" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">QEMU 에뮬레이션</text>
  <text x="450" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">또는 크로스 컴파일</text>

  <!-- Arrow to manifest -->
  <line x1="540" y1="230" x2="620" y2="230" stroke="#e8e8e8" stroke-width="2"/>
  <polygon points="620,224 632,230 620,236" fill="#e8e8e8"/>

  <!-- Manifest -->
  <rect x="632" y="160" width="188" height="140" fill="#0d2818" rx="10" stroke="#55c555" stroke-width="2"/>
  <text x="726" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle" xml:space="preserve">manifest list</text>
  <text x="726" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">myapp:latest</text>
  <line x1="650" y1="224" x2="800" y2="224" stroke="#1e2433" stroke-width="1"/>
  <text x="726" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">amd64 → sha256:abc</text>
  <text x="726" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">arm64 → sha256:def</text>
  <text x="726" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">arm/v7→ sha256:ghi</text>

  <!-- Pull clients -->
  <rect x="632" y="326" width="188" height="52" fill="#111827" rx="8" stroke="#888"/>
  <text x="726" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">docker pull myapp:latest</text>
  <text x="726" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle" xml:space="preserve">자동으로 해당 아키텍처 레이어 선택</text>

  <line x1="726" y1="300" x2="726" y2="326" stroke="#888" stroke-width="1.5"/>
  <polygon points="720,326 726,338 732,326" fill="#888"/>

  <!-- Divider -->
  <line x1="60" y1="408" x2="820" y2="408" stroke="#1e2433" stroke-width="1"/>

  <!-- Commands -->
  <text x="60" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" xml:space="preserve">주요 명령</text>
  <rect x="60" y="442" width="760" height="24" fill="#070b14" rx="4" stroke="#1e2433"/>
  <text x="76" y="459" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">docker buildx build --platform linux/amd64,linux/arm64 --push -t myapp:latest .</text>
</svg>
