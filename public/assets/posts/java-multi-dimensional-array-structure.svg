<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">2차원 배열 메모리 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Java는 "배열의 배열" — 행마다 독립 힙 객체</text>

  <!-- Stack -->
  <rect x="60" y="96" width="130" height="180" rx="8" fill="#0f1a2a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="125" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Stack</text>
  <rect x="76" y="126" width="98" height="32" rx="4" fill="#1a2a3a" stroke="#2a4a6a"/>
  <text x="125" y="147" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">mat →</text>

  <!-- Arrow stack to outer array -->
  <line x1="190" y1="142" x2="230" y2="142" stroke="#7777cc" stroke-width="2"/>
  <polygon points="230,137 244,142 230,147" fill="#7777cc"/>

  <!-- Outer array (row pointers) -->
  <rect x="244" y="96" width="130" height="180" rx="8" fill="#0f1a2a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="309" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">외부 배열 (Heap)</text>
  <rect x="260" y="126" width="98" height="30" rx="4" fill="#1a2a3a" stroke="#2a4a6a"/>
  <text x="309" y="145" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">mat[0] →</text>
  <rect x="260" y="162" width="98" height="30" rx="4" fill="#1a2a3a" stroke="#2a4a6a"/>
  <text x="309" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">mat[1] →</text>
  <rect x="260" y="198" width="98" height="30" rx="4" fill="#1a2a3a" stroke="#2a4a6a"/>
  <text x="309" y="217" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">mat[2] →</text>

  <!-- Arrows outer to inner -->
  <line x1="358" y1="141" x2="404" y2="141" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="404,136 416,141 404,146" fill="#55c555"/>
  <line x1="358" y1="177" x2="404" y2="177" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="404,172 416,177 404,182" fill="#55c555"/>
  <line x1="358" y1="213" x2="404" y2="213" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="404,208 416,213 404,218" fill="#55c555"/>

  <!-- Row 0 -->
  <rect x="416" y="120" width="50" height="36" rx="4" fill="#1a2a3a" stroke="#2a6a2a" stroke-width="1.5"/>
  <text x="441" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text>
  <text x="441" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">[0][0]</text>
  <rect x="470" y="120" width="50" height="36" rx="4" fill="#1a2a3a" stroke="#2a6a2a" stroke-width="1.5"/>
  <text x="495" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text>
  <text x="495" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">[0][1]</text>
  <rect x="524" y="120" width="50" height="36" rx="4" fill="#1a2a3a" stroke="#2a6a2a" stroke-width="1.5"/>
  <text x="549" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">3</text>
  <text x="549" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">[0][2]</text>
  <text x="495" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">행 0 (독립 배열)</text>

  <!-- Row 1 -->
  <rect x="416" y="160" width="50" height="36" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="441" y="180" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">4</text>
  <text x="441" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">[1][0]</text>
  <rect x="470" y="160" width="50" height="36" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="495" y="180" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">5</text>
  <text x="495" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">[1][1]</text>
  <rect x="524" y="160" width="50" height="36" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="549" y="180" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">6</text>
  <text x="549" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">[1][2]</text>

  <!-- Row 2 -->
  <rect x="416" y="200" width="50" height="36" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="441" y="220" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">7</text>
  <text x="441" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">[2][0]</text>
  <rect x="470" y="200" width="50" height="36" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="495" y="220" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">8</text>
  <text x="495" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">[2][1]</text>
  <rect x="524" y="200" width="50" height="36" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="549" y="220" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">9</text>
  <text x="549" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">[2][2]</text>

  <!-- Heap label -->
  <rect x="404" y="96" width="186" height="152" rx="6" fill="none" stroke="#2a4a6a" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="497" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">각 행이 힙에서 분리된 객체</text>

  <!-- Jagged array section -->
  <rect x="620" y="96" width="200" height="180" rx="8" fill="#111827" stroke="#1e2d40" stroke-width="1.5"/>
  <text x="720" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">가변 배열 (Jagged Array)</text>
  <text x="636" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">int</text>
  <text x="660" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">[][] jag = </text>
  <text x="736" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">new int</text>
  <text x="636" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">    [3][];</text>
  <text x="636" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">jag[0] = </text>
  <text x="700" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">new int</text>
  <text x="748" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">[1];</text>
  <text x="636" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">jag[1] = </text>
  <text x="700" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">new int</text>
  <text x="748" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">[3];</text>
  <text x="636" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">jag[2] = </text>
  <text x="700" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">new int</text>
  <text x="748" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">[2];</text>
  <text x="720" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">행마다 길이 다름 → 가변 배열</text>
  <!-- visual jagged -->
  <rect x="636" y="258" width="14" height="14" rx="2" fill="#2a4a6a"/>
  <rect x="636" y="276" width="14" height="14" rx="2" fill="#2a4a6a"/>
  <rect x="654" y="276" width="14" height="14" rx="2" fill="#2a4a6a"/>
  <rect x="672" y="276" width="14" height="14" rx="2" fill="#2a4a6a"/>
  <rect x="636" y="258" width="14" height="14" rx="2" fill="#2a4a6a" opacity="0.6"/>
  <rect x="636" y="294" width="14" height="14" rx="2" fill="#2a4a6a"/>
  <rect x="654" y="294" width="14" height="14" rx="2" fill="#2a4a6a"/>
  <text x="700" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">길이 1</text>
  <text x="700" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">길이 3</text>
  <text x="700" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">길이 2</text>

  <!-- bottom code hint -->
  <rect x="60" y="306" width="540" height="90" rx="8" fill="#111827" stroke="#1e2d40" stroke-width="1.5"/>
  <text x="290" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">2차원 배열 선언 &amp; 순회</text>
  <rect x="76" y="336" width="508" height="52" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">int</text>
  <text x="116" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">[][] mat = {{</text>
  <text x="220" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1,2,3</text>
  <text x="262" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">},{</text>
  <text x="286" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">4,5,6</text>
  <text x="328" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">},{</text>
  <text x="352" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">7,8,9</text>
  <text x="394" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}};</text>
  <text x="92" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for </text>
  <text x="116" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text>
  <text x="122" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">int</text>
  <text x="146" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">[] row : mat)   </text>
  <text x="280" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for </text>
  <text x="304" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text>
  <text x="310" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">int </text>
  <text x="334" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">v : row) sysout(v);</text>

  <!-- bottom facts -->
  <rect x="60" y="410" width="760" height="56" rx="8" fill="#0d1a2a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">핵심 포인트</text>
  <text x="120" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">행 수: mat.length</text>
  <text x="320" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">열 수: mat[0].length</text>
  <text x="530" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">행마다 독립 힙 객체</text>
  <text x="720" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">가변 길이 행 가능</text>
</svg>
