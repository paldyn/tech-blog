<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ReplicaSet vs Deployment</text>

  <!-- Headers -->
  <rect x="200" y="74" width="240" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="320" y="99" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ReplicaSet</text>
  <rect x="460" y="74" width="240" height="40" rx="6" fill="#1a237e" stroke="#3949ab" stroke-width="1"/>
  <text x="580" y="99" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9fa8da" text-anchor="middle">Deployment</text>

  <!-- Rows -->
  <text x="60" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">역할</text>
  <text x="320" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">Pod 복제본 수 유지</text>
  <text x="580" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">ReplicaSet 관리 + 업데이트 전략</text>
  <line x1="60" y1="148" x2="820" y2="148" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">롤링 업데이트</text>
  <text x="320" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">없음</text>
  <text x="580" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">지원 (새 RS 생성으로 구현)</text>
  <line x1="60" y1="182" x2="820" y2="182" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">롤백</text>
  <text x="320" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">없음</text>
  <text x="580" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">지원 (이전 RS로 되돌리기)</text>
  <line x1="60" y1="216" x2="820" y2="216" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">직접 사용</text>
  <text x="320" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">비권장 (특수 목적 제외)</text>
  <text x="580" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">권장 (일반 무상태 앱)</text>
  <line x1="60" y1="250" x2="820" y2="250" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">이미지 업데이트 시</text>
  <text x="320" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">기존 Pod 삭제 후 재생성</text>
  <text x="580" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">새 RS 생성, 점진 전환</text>

  <rect x="60" y="308" width="760" height="44" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9ca3af" text-anchor="middle">Deployment는 내부적으로 ReplicaSet을 생성한다. kubectl get rs 로 확인 가능.</text>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9ca3af" text-anchor="middle">RS를 직접 사용해야 할 특별한 이유가 없다면 항상 Deployment를 사용하라.</text>
</svg>
