<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">CrashLoopBackOff — 지수 백오프 재시작</text>
  <text x="50" y="80" font-size="14" fill="#888">컨테이너가 죽을 때마다 재시작 대기 시간이 2배씩, 최대 5분까지 늘어난다</text>

  <line x1="50" y1="160" x2="830" y2="160" stroke="#3a4a6e" stroke-width="2"/>

  <g>
    <rect x="60" y="135" width="70" height="50" rx="6" fill="#16181d" stroke="#55c555" stroke-width="1.5"/>
    <text x="95" y="165" font-size="12" fill="#ffffff" text-anchor="middle">start</text>
  </g>
  <text x="148" y="120" font-size="12" fill="#e05555" text-anchor="middle">crash</text>
  <text x="180" y="195" font-size="12" fill="#9aa4b8" text-anchor="middle">10s</text>

  <g>
    <rect x="210" y="135" width="56" height="50" rx="6" fill="#16181d" stroke="#e05555" stroke-width="1.5"/>
    <text x="238" y="165" font-size="12" fill="#ffffff" text-anchor="middle">run</text>
  </g>
  <text x="284" y="120" font-size="12" fill="#e05555" text-anchor="middle">crash</text>
  <text x="320" y="195" font-size="12" fill="#9aa4b8" text-anchor="middle">20s</text>

  <g>
    <rect x="356" y="135" width="56" height="50" rx="6" fill="#16181d" stroke="#e05555" stroke-width="1.5"/>
    <text x="384" y="165" font-size="12" fill="#ffffff" text-anchor="middle">run</text>
  </g>
  <text x="430" y="120" font-size="12" fill="#e05555" text-anchor="middle">crash</text>
  <text x="480" y="195" font-size="12" fill="#9aa4b8" text-anchor="middle">40s</text>

  <g>
    <rect x="530" y="135" width="56" height="50" rx="6" fill="#16181d" stroke="#e05555" stroke-width="1.5"/>
    <text x="558" y="165" font-size="12" fill="#ffffff" text-anchor="middle">run</text>
  </g>
  <text x="604" y="120" font-size="12" fill="#e05555" text-anchor="middle">crash</text>
  <text x="668" y="195" font-size="12" fill="#9aa4b8" text-anchor="middle">80s → … → 300s</text>

  <g>
    <rect x="746" y="135" width="74" height="50" rx="6" fill="#16181d" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="783" y="165" font-size="12" fill="#ffffff" text-anchor="middle">run</text>
  </g>

  <text x="50" y="245" font-size="13" fill="#888">BackOff은 증상일 뿐 원인이 아니다 — "왜 죽는가"는 logs --previous 와 종료 코드에 적혀 있다.</text>
  <text x="50" y="271" font-size="13" fill="#888">대기 시간이 길어질수록 한 번 죽을 때마다 진단할 시간 여유는 늘지만, 서비스는 그만큼 더 비어 있다.</text>
</svg>
