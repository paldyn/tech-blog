<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="370" viewBox="0 0 880 370">
  <rect width="880" height="370" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PARTITION BY로 부서별 순위 매기기</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">OVER (PARTITION BY dept ORDER BY salary DESC)</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="228" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <!-- Line 1 -->
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">SELECT</tspan></text>
  <!-- Line 2 -->
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  emp_name, dept, salary,</text>
  <!-- Line 3 -->
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#55c555">ROW_NUMBER</tspan>() <tspan fill="#7ec8e3">OVER</tspan> (</text>
  <!-- Line 4 -->
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">PARTITION BY</tspan> dept</text>
  <!-- Line 5 -->
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">ORDER BY</tspan> salary <tspan fill="#7ec8e3">DESC</tspan>) <tspan fill="#7ec8e3">AS</tspan> rn,</text>
  <!-- Line 6 -->
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#55c555">RANK</tspan>()       <tspan fill="#7ec8e3">OVER</tspan> (</text>
  <!-- Line 7 -->
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">PARTITION BY</tspan> dept</text>
  <!-- Line 8 -->
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">ORDER BY</tspan> salary <tspan fill="#7ec8e3">DESC</tspan>) <tspan fill="#7ec8e3">AS</tspan> rnk,</text>
  <!-- Line 9 -->
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#55c555">DENSE_RANK</tspan>() <tspan fill="#7ec8e3">OVER</tspan> (</text>
  <!-- Line 10 -->
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">PARTITION BY</tspan> dept</text>
  <!-- Line 11 -->
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">ORDER BY</tspan> salary <tspan fill="#7ec8e3">DESC</tspan>) <tspan fill="#7ec8e3">AS</tspan> drk</text>
  <!-- Line 12 -->
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">FROM</tspan> employees;</text>

  <!-- Footer note -->
  <text x="440" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">PARTITION BY 생략 시 전체 테이블을 하나의 파티션으로 처리</text>
</svg>
