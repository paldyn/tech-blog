<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 2 vs Python 3 핵심 차이</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">코드 수준 비교</text>

  <!-- Headers -->
  <rect x="60" y="88" width="360" height="36" rx="6" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">Python 2 (EOL 2020)</text>

  <rect x="460" y="88" width="360" height="36" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Python 3 (현재 표준)</text>

  <!-- print -->
  <text x="60" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">① print</text>
  <rect x="60" y="156" width="360" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">         </tspan><tspan fill="#9aa4b8"># 문(statement)</tspan></text>
  <rect x="460" y="156" width="360" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">)      </tspan><tspan fill="#9aa4b8"># 함수(function)</tspan></text>

  <!-- division -->
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">② 나눗셈</text>
  <rect x="60" y="218" width="360" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff"> / </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> == </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">         </tspan><tspan fill="#9aa4b8"># 정수 나눗셈</tspan></text>
  <rect x="460" y="218" width="360" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff"> / </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> == </tspan><tspan fill="#b5cea8">1.5</tspan><tspan fill="#ffffff">       </tspan><tspan fill="#9aa4b8"># 실수 나눗셈</tspan></text>

  <!-- unicode -->
  <text x="60" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">③ 문자열</text>
  <rect x="60" y="280" width="360" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">   </tspan><tspan fill="#9aa4b8"># bytes (ASCII)</tspan></text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">unicode</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#9aa4b8"># 유니코드 따로 존재</tspan></text>
  <rect x="460" y="280" width="360" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">   </tspan><tspan fill="#9aa4b8"># 항상 유니코드(UTF-8)</tspan></text>
  <text x="476" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">bytes</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#9aa4b8"># 바이너리 데이터 따로</tspan></text>

  <!-- range -->
  <text x="60" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">④ range</text>
  <rect x="60" y="360" width="360" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">range</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#9aa4b8"># 리스트 생성</tspan></text>
  <rect x="460" y="360" width="360" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">range</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#9aa4b8"># 이터레이터 (메모리 효율)</tspan></text>

  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">Python 2는 2020년 EOL — 신규 프로젝트는 Python 3만 사용</text>
</svg>
