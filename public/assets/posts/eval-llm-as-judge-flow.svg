<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrow-blue" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">LLM-as-Judge 평가 흐름</text>

  <!-- Section labels at y=92 -->
  <text x="155" y="92" text-anchor="middle" font-size="13" fill="#888">입력</text>
  <text x="440" y="92" text-anchor="middle" font-size="13" fill="#888">평가 LLM</text>
  <text x="725" y="92" text-anchor="middle" font-size="13" fill="#888">출력</text>

  <!-- LEFT COLUMN: Input boxes -->
  <!-- 사용자 질문 (y=110, h=65) -->
  <rect x="60" y="110" width="190" height="65" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="155" y="136" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">사용자 질문</text>
  <text x="155" y="157" text-anchor="middle" font-size="12" fill="#7ec8e3">User Query</text>

  <!-- 모델 응답 (y=200, h=65) -->
  <rect x="60" y="200" width="190" height="65" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="155" y="226" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">모델 응답</text>
  <text x="155" y="247" text-anchor="middle" font-size="12" fill="#7777cc">Model Response (A or B)</text>

  <!-- 평가 기준 (y=290, h=65) -->
  <rect x="60" y="290" width="190" height="65" rx="8" fill="#0a0a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="155" y="316" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">평가 기준</text>
  <text x="155" y="337" text-anchor="middle" font-size="12" fill="#ce9178">Rubric / Reference</text>

  <!-- CENTER: Judge LLM box (x=320, w=240, y=155, h=150) -->
  <rect x="320" y="155" width="240" height="150" rx="10" fill="#0d1f3c" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="198" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8">Judge LLM</text>
  <text x="440" y="221" text-anchor="middle" font-size="12" fill="#7ec8e3">GPT-4 · Claude · Gemini</text>
  <line x1="340" y1="232" x2="540" y2="232" stroke="#7ec8e3" stroke-width="0.5" opacity="0.4"/>
  <text x="440" y="254" text-anchor="middle" font-size="11" fill="#888">System Prompt + Query</text>
  <text x="440" y="273" text-anchor="middle" font-size="11" fill="#888">+ Response + Criteria</text>

  <!-- RIGHT COLUMN: Output boxes -->
  <!-- 평가 점수 (y=110, h=65) -->
  <rect x="630" y="110" width="190" height="65" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="136" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">평가 점수</text>
  <text x="725" y="157" text-anchor="middle" font-size="12" fill="#55c555">Numeric Score (1–10)</text>

  <!-- 판단 근거 (y=200, h=65) -->
  <rect x="630" y="200" width="190" height="65" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="226" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">판단 근거</text>
  <text x="725" y="247" text-anchor="middle" font-size="12" fill="#55c555">Rationale / Explanation</text>

  <!-- 최종 판정 (y=290, h=65) -->
  <rect x="630" y="290" width="190" height="65" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="316" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">최종 판정</text>
  <text x="725" y="337" text-anchor="middle" font-size="12" fill="#55c555">Pass / Fail / Winner</text>

  <!-- Arrows: Left boxes → Center (blue) -->
  <!-- 사용자 질문 (right edge ~250,142) → Center left edge (320,205) -->
  <line x1="250" y1="142" x2="318" y2="200" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <!-- 모델 응답 (right edge 250,232) → Center left edge (320,232) -->
  <line x1="250" y1="232" x2="318" y2="232" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <!-- 평가 기준 (right edge 250,322) → Center left edge (320,262) -->
  <line x1="250" y1="322" x2="318" y2="264" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Arrows: Center → Right boxes (green) -->
  <!-- Center right (560,200) → 평가 점수 left (630,142) -->
  <line x1="562" y1="200" x2="628" y2="148" stroke="#55c555" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <!-- Center right (560,232) → 판단 근거 left (630,232) -->
  <line x1="562" y1="232" x2="628" y2="232" stroke="#55c555" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <!-- Center right (560,264) → 최종 판정 left (630,322) -->
  <line x1="562" y1="264" x2="628" y2="316" stroke="#55c555" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Footer label -->
  <text x="440" y="420" text-anchor="middle" font-size="12" fill="#555">평가자 LLM이 입력 세 가지를 종합하여 정량·정성 평가 결과를 출력</text>
</svg>
