<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">DBMS_STATS &amp; DBMS_SQLTUNE 실무 SQL</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">통계 수집 · SQL Tuning Advisor 태스크</text>

  <!-- Left: DBMS_STATS -->
  <rect x="60" y="92" width="370" height="360" rx="12" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">DBMS_STATS — 통계 수집</text>
  <rect x="76" y="124" width="338" height="312" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="92" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 테이블 통계 수집</text>
  <text x="92" y="166" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">EXEC</tspan> DBMS_STATS.gather_table_stats(</text>
  <text x="92" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  ownname  =&gt; <tspan fill="#ce9178">'SCOTT'</tspan>,</text>
  <text x="92" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  tabname  =&gt; <tspan fill="#ce9178">'ORDERS'</tspan>,</text>
  <text x="92" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  estimate_percent =&gt; <tspan fill="#b5cea8">DBMS_STATS</tspan></text>
  <text x="92" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    .auto_sample_size,</text>
  <text x="92" y="256" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  method_opt  =&gt; <tspan fill="#ce9178">'FOR ALL COLUMNS'</tspan>,</text>
  <text x="92" y="274" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  cascade  =&gt; <tspan fill="#7ec8e3">TRUE</tspan>);</text>

  <text x="92" y="302" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 마지막 분석 시간 확인</text>
  <text x="92" y="320" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> table_name, last_analyzed,</text>
  <text x="92" y="338" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">       num_rows, stale_stats</text>
  <text x="92" y="356" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  dba_tab_statistics</text>
  <text x="92" y="374" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">WHERE</tspan> owner = <tspan fill="#ce9178">'SCOTT'</tspan></text>
  <text x="92" y="392" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ORDER BY</tspan> last_analyzed;</text>

  <!-- Right: DBMS_SQLTUNE -->
  <rect x="450" y="92" width="370" height="360" rx="12" fill="#1a0e1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="635" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">DBMS_SQLTUNE — STA 태스크</text>
  <rect x="466" y="124" width="338" height="312" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="482" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 태스크 생성</text>
  <text x="482" y="166" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">DECLARE</tspan></text>
  <text x="482" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  l_task VARCHAR2(100);</text>
  <text x="482" y="202" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">BEGIN</tspan></text>
  <text x="482" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  l_task := DBMS_SQLTUNE</text>
  <text x="482" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    .create_tuning_task(</text>
  <text x="482" y="256" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">      sql_id  =&gt; <tspan fill="#ce9178">'abc123xyz'</tspan>,</text>
  <text x="482" y="274" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">      task_name =&gt; <tspan fill="#ce9178">'tune_task1'</tspan>);</text>
  <text x="482" y="292" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  DBMS_SQLTUNE.execute_tuning_task(</text>
  <text x="482" y="310" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    task_name =&gt; <tspan fill="#ce9178">'tune_task1'</tspan>);</text>
  <text x="482" y="328" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">END</tspan>;</text>

  <text x="482" y="356" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 권고 리포트 확인</text>
  <text x="482" y="374" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> DBMS_SQLTUNE</text>
  <text x="482" y="392" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  .report_tuning_task(</text>
  <text x="482" y="410" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    <tspan fill="#ce9178">'tune_task1'</tspan>) <tspan fill="#7ec8e3">FROM</tspan> dual;</text>
</svg>
