<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">차이 배열 (Difference Array)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">구간 일괄 업데이트를 O(1)에, 최종 값은 누적 합으로 O(N) 복원</text>

  <!-- Problem: range update +3 on [1..4] -->
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">문제: A[1..4] += 3 을 Q번 수행 후 배열 출력</text>

  <!-- Original array -->
  <text x="80" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">원본 A</text>

  <rect x="140" y="110" width="56" height="40" rx="4" fill="#222" stroke="#444"/>
  <text x="168" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">0</text>
  <text x="168" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[0]</text>

  <rect x="200" y="110" width="56" height="40" rx="4" fill="#222" stroke="#7ec8e3" stroke-width="2"/>
  <text x="228" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">0</text>
  <text x="228" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[1]</text>

  <rect x="260" y="110" width="56" height="40" rx="4" fill="#222" stroke="#7ec8e3" stroke-width="2"/>
  <text x="288" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">0</text>
  <text x="288" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[2]</text>

  <rect x="320" y="110" width="56" height="40" rx="4" fill="#222" stroke="#7ec8e3" stroke-width="2"/>
  <text x="348" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">0</text>
  <text x="348" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[3]</text>

  <rect x="380" y="110" width="56" height="40" rx="4" fill="#222" stroke="#7ec8e3" stroke-width="2"/>
  <text x="408" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">0</text>
  <text x="408" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[4]</text>

  <rect x="440" y="110" width="56" height="40" rx="4" fill="#222" stroke="#444"/>
  <text x="468" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">0</text>
  <text x="468" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[5]</text>

  <!-- Operation: +3 on [1..4] -->
  <text x="600" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">연산: A[1..4] += 3</text>

  <!-- Difference array -->
  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">차이 배열 D (D[i] = A[i] - A[i-1])</text>

  <rect x="140" y="186" width="56" height="40" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="168" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">0</text>

  <!-- D[1] += +3 -->
  <rect x="200" y="186" width="56" height="40" rx="4" fill="#1a2e1a" stroke="#55c555" stroke-width="2.5"/>
  <text x="228" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">+3</text>
  <text x="228" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">D[l]+=v</text>

  <rect x="260" y="186" width="56" height="40" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="288" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">0</text>

  <rect x="320" y="186" width="56" height="40" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="348" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">0</text>

  <rect x="380" y="186" width="56" height="40" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="408" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">0</text>

  <!-- D[r+1] -= v -->
  <rect x="440" y="186" width="56" height="40" rx="4" fill="#2e0d0d" stroke="#e05555" stroke-width="2.5"/>
  <text x="468" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" text-anchor="middle">-3</text>
  <text x="468" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">D[r+1]-=v</text>

  <!-- Arrow down -->
  <line x1="300" y1="240" x2="300" y2="274" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="540" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">누적 합으로 복원: A[i] = D[0]+...+D[i]</text>

  <!-- Restored array -->
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">복원 결과 A (prefix sum of D)</text>

  <rect x="140" y="306" width="56" height="40" rx="4" fill="#111" stroke="#444"/>
  <text x="168" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">0</text>

  <rect x="200" y="306" width="56" height="40" rx="4" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="228" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">3</text>

  <rect x="260" y="306" width="56" height="40" rx="4" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="288" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">3</text>

  <rect x="320" y="306" width="56" height="40" rx="4" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="348" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">3</text>

  <rect x="380" y="306" width="56" height="40" rx="4" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="408" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">3</text>

  <rect x="440" y="306" width="56" height="40" rx="4" fill="#111" stroke="#444"/>
  <text x="468" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">0</text>

  <!-- Complexity box -->
  <rect x="60" y="364" width="760" height="76" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">복잡도 비교 (Q번 구간 업데이트, N크기 배열)</text>

  <text x="220" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">순수 루프 업데이트</text>
  <text x="220" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">O(N) × Q = O(NQ)</text>

  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">차이 배열</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">업데이트 O(1) × Q + 복원 O(N) = O(N+Q)</text>

  <text x="680" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">쿼리 중 조회 필요</text>
  <text x="680" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">→ 펜윅 트리 O(log N)</text>
</svg>
