<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fn_new() 구현 코드</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">addRow → 기본값 초기화 → Grid setFocus 3단계 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="264" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="115" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan fill="#7ec8e3">function</tspan><tspan> fn_new() {</tspan>
  </text>
  <text x="76" y="133" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0">  // 신규 행 추가</text>
  <text x="76" y="151" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">var</tspan><tspan> row = </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.ds_list.addRow();</tspan>
  </text>
  <text x="76" y="169" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0">  // 기본값 설정</text>
  <text x="76" y="187" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.ds_list.setColumn(row,</tspan><tspan fill="#ce9178">"REG_DT"</tspan><tspan>,</tspan>
  </text>
  <text x="76" y="205" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>    gfn_getToday());</tspan>
  </text>
  <text x="76" y="223" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.ds_list.setColumn(row,</tspan><tspan fill="#ce9178">"STATUS"</tspan><tspan>,</tspan>
  </text>
  <text x="76" y="241" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>    </tspan><tspan fill="#ce9178">"01"</tspan><tspan>);</tspan>
  </text>
  <text x="76" y="259" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0">  // 포커스 이동</text>
  <text x="76" y="277" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.Grid00.setFocus(row,</tspan><tspan fill="#ce9178">"ITEM_NM"</tspan><tspan>);</tspan>
  </text>
  <text x="76" y="295" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">}</text>

  <text x="440" y="368"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">insertRow(row) — 특정 위치에 삽입 · addRow() — 항상 맨 끝 추가</text>
</svg>
