<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Shared Worker 코드 패턴</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">탭 → Shared Worker ← 탭 다중 연결</text>

  <!-- Left: Page code -->
  <text x="60" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">page.js — 각 탭에서 실행</text>
  <rect x="60" y="110" width="370" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">const</tspan> sw = <tspan fill="#7ec8e3">new</tspan> SharedWorker(</text>
  <text x="76" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  <tspan fill="#ce9178">'./shared.js'</tspan></text>
  <text x="76" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">);</text>
  <text x="76" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// SharedWorker는 .port를 사용</text>
  <text x="76" y="210" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">const</tspan> port = sw.port;</text>
  <text x="76" y="228" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">port.start(); <tspan fill="#9aa4b8">// 필수: 메시지 수신 시작</tspan></text>
  <text x="76" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">port.onmessage = ({ data }) => {</text>
  <text x="76" y="264" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  updateUI(data);</text>
  <text x="76" y="282" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">};</text>
  <text x="76" y="300" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">port.postMessage({</text>
  <text x="76" y="318" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  type: <tspan fill="#ce9178">'SUBSCRIBE'</tspan>,</text>
  <text x="76" y="336" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  channel: <tspan fill="#ce9178">'stock-prices'</tspan></text>
  <text x="76" y="354" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">});</text>
  <text x="76" y="376" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 탭 닫힐 때 정리</text>
  <text x="76" y="394" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">window.onbeforeunload = () =></text>

  <!-- Right: Shared Worker script -->
  <text x="460" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc">shared.js — Shared Worker</text>
  <rect x="460" y="110" width="370" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">const ports = <tspan fill="#7ec8e3">new</tspan> Set();</text>
  <text x="476" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">let</tspan> sharedState = {};</text>
  <text x="476" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"></text>
  <text x="476" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 새 탭 연결 시 호출</text>
  <text x="476" y="210" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">self.onconnect = ({ ports: [p] }) => {</text>
  <text x="476" y="228" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  ports.add(p);</text>
  <text x="476" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  p.start();</text>
  <text x="476" y="264" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  p.onmessage = ({ data }) => {</text>
  <text x="476" y="282" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    handleMessage(p, data);</text>
  <text x="476" y="300" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  };</text>
  <text x="476" y="318" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">  // 현재 상태 즉시 전송</text>
  <text x="476" y="336" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  p.postMessage(sharedState);</text>
  <text x="476" y="354" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">};</text>
  <text x="476" y="376" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 모든 탭에 브로드캐스트</text>
  <text x="476" y="394" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">function</tspan> broadcast(msg) {</text>
</svg>
