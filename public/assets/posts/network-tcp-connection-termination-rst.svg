<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="ar1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="ar2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">RST 강제 종료 vs 정상 FIN 종료</text>

  <!-- FIN column -->
  <rect x="60" y="68" width="340" height="44" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">FIN (정상 종료)</text>

  <!-- RST column -->
  <rect x="480" y="68" width="340" height="44" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">RST (강제 종료)</text>

  <!-- FIN items -->
  <rect x="60" y="126" width="340" height="56" rx="6" fill="#0a180a" stroke="#1a4a1a" stroke-width="1"/>
  <text x="80" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">절차</text>
  <text x="80" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">4-way 교환, 양측 확인 후 종료</text>

  <rect x="60" y="194" width="340" height="56" rx="6" fill="#0a180a" stroke="#1a4a1a" stroke-width="1"/>
  <text x="80" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">잔여 데이터</text>
  <text x="80" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">상대방이 버퍼에 남은 데이터 수신 가능</text>

  <rect x="60" y="262" width="340" height="56" rx="6" fill="#0a180a" stroke="#1a4a1a" stroke-width="1"/>
  <text x="80" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">TIME_WAIT</text>
  <text x="80" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Active Close 측에 2MSL 잔류</text>

  <!-- RST items -->
  <rect x="480" y="126" width="340" height="56" rx="6" fill="#1a0808" stroke="#4a1a1a" stroke-width="1"/>
  <text x="500" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">절차</text>
  <text x="500" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단방향 RST 전송, 즉시 CLOSED</text>

  <rect x="480" y="194" width="340" height="56" rx="6" fill="#1a0808" stroke="#4a1a1a" stroke-width="1"/>
  <text x="500" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">잔여 데이터</text>
  <text x="500" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버퍼 즉시 삭제, 유실 가능</text>

  <rect x="480" y="262" width="340" height="56" rx="6" fill="#1a0808" stroke="#4a1a1a" stroke-width="1"/>
  <text x="500" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">발생 시점</text>
  <text x="500" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">오류 상태, 잘못된 포트, 방화벽 차단</text>

  <!-- Code block -->
  <rect x="60" y="336" width="760" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># RST 탐지: tcp[tcpflags] &amp; tcp-rst != 0</text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">tcpdump -i eth0 <text fill="#ce9178">'tcp[tcpflags] &amp; tcp-rst != 0'</text></text>
</svg>
