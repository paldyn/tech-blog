<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git fetch --prune — 오래된 추적 브랜치 정리</text>
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#888">원격에서 삭제된 브랜치를 로컬 추적 목록에서 제거</text>

  <!-- Left: Before -->
  <rect x="60" y="105" width="340" height="240" rx="8" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="230" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">fetch 전 (stale 브랜치 존재)</text>
  <rect x="76" y="142" width="308" height="183" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  origin/main</text>
  <text x="92" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  origin/develop</text>
  <text x="92" y="203" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">  origin/feature/old-a  </text>
  <text x="92" y="221" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">  origin/feature/old-b  </text>
  <text x="92" y="239" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  origin/release/v1.0</text>
  <text x="92" y="257" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  origin/hotfix/patch</text>
  <!-- stale labels -->
  <text x="346" y="203" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">←stale</text>
  <text x="346" y="221" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">←stale</text>
  <text x="92" y="305" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555"># 원격에서는 이미 삭제됨</text>

  <!-- Arrow -->
  <rect x="402" y="222" width="68" height="4" fill="#7777cc"/>
  <polygon points="470,214 470,234 500,224" fill="#7777cc" stroke="#4a4a88" stroke-width="1"/>
  <text x="437" y="207" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">--prune</text>

  <!-- Right: After -->
  <rect x="500" y="105" width="320" height="240" rx="8" fill="#0d1117" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="660" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">fetch --prune 후 (정리됨)</text>
  <rect x="516" y="142" width="288" height="183" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="532" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  origin/main</text>
  <text x="532" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  origin/develop</text>
  <text x="532" y="203" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  origin/release/v1.0</text>
  <text x="532" y="221" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  origin/hotfix/patch</text>
  <text x="532" y="285" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555"># stale 브랜치 2개 제거됨</text>

  <!-- Bottom command -->
  <rect x="60" y="368" width="760" height="34" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="391" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">git fetch </text>
  <text x="156" y="391" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">--prune </text>
  <text x="228" y="391" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">origin</text>
  <text x="282" y="391" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">   # 또는: git remote prune origin</text>
</svg>
