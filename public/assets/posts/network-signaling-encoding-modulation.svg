<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">아날로그 변조 방식</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">디지털 데이터를 아날로그 캐리어 신호에 실는 방법</text>

  <!-- AM: Amplitude Modulation -->
  <text x="200" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ASK (진폭 편이)</text>
  <!-- 0: small amplitude, 1: large -->
  <polyline points="60,150 80,130 100,170 120,130 140,170 160,160 180,160 200,140 220,180 240,140 260,180 280,160"
            fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <text x="60" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">0</text>
  <text x="100" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">0</text>
  <text x="160" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">0</text>
  <text x="200" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">1</text>
  <text x="240" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">1</text>
  <text x="200" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">진폭 변화로 비트 표현</text>
  <text x="200" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">잡음에 취약</text>

  <!-- FSK: Frequency Modulation -->
  <text x="470" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">FSK (주파수 편이)</text>
  <!-- 0: low freq, 1: high freq -->
  <polyline points="320,150 340,170 360,130 380,170 400,130 420,150 440,144 456,156 472,144 488,156 504,144 520,156 536,144 552,156 568,144 584,156 600,150 620,150"
            fill="none" stroke="#55c555" stroke-width="2"/>
  <text x="470" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">주파수 변화로 비트 표현</text>
  <text x="470" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Wi-Fi, 블루투스</text>

  <!-- PSK: Phase Modulation -->
  <text x="750" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">PSK (위상 편이)</text>
  <!-- phase shift at bit boundary -->
  <polyline points="640,150 660,130 680,170 700,130 720,150 740,170 760,130 780,170 800,130 820,150"
            fill="none" stroke="#7777cc" stroke-width="2"/>
  <text x="750" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">위상 변화로 비트 표현</text>
  <text x="750" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Wi-Fi QAM 기반</text>

  <!-- QAM explanation -->
  <rect x="60" y="240" width="760" height="136" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">QAM (직교 진폭 변조): 진폭 + 위상 동시 변조</text>

  <rect x="80" y="278" width="200" height="80" rx="6" fill="#0f1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="180" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">QAM-16</text>
  <text x="180" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">16개 심볼 = 4비트/심볼</text>
  <text x="180" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Wi-Fi 4 (802.11n)</text>
  <text x="180" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">케이블 모뎀</text>

  <rect x="300" y="278" width="200" height="80" rx="6" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="400" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">QAM-256</text>
  <text x="400" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">256개 심볼 = 8비트/심볼</text>
  <text x="400" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Wi-Fi 5 (802.11ac)</text>
  <text x="400" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">양호한 SNR 필요</text>

  <rect x="520" y="278" width="280" height="80" rx="6" fill="#0f1a2a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">QAM-4096</text>
  <text x="660" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">4096개 심볼 = 12비트/심볼</text>
  <text x="660" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Wi-Fi 7 (802.11be)</text>
  <text x="660" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">매우 높은 SNR 필요</text>
</svg>
