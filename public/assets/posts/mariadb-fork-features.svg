<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MariaDB vs MySQL — 주요 차별화 기능</text>

  <!-- MariaDB extras -->
  <rect x="60" y="74" width="360" height="300" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="2"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">MariaDB 전용 기능</text>

  <text x="76" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">스토리지 엔진 다양성</text>
  <text x="76" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Aria (충돌 복구 MyISAM 대안)</text>
  <text x="76" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ColumnStore (분산 컬럼 스토어)</text>
  <text x="76" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Spider (분산 스토리지 엔진)</text>

  <text x="76" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">시스템 버저닝 (Temporal Table)</text>
  <text x="76" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">WITH SYSTEM VERSIONING으로 시점 조회</text>
  <text x="76" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SELECT … FOR SYSTEM_TIME AS OF</text>

  <text x="76" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">동적 컬럼</text>
  <text x="76" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BLOB에 키-값 쌍 저장, COLUMN_GET/CREATE 함수</text>

  <text x="76" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Galera Cluster 내장 지원</text>
  <text x="76" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">wsrep API 기반 동기 다중 Primary</text>
  <text x="76" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">MySQL Group Replication 대응</text>

  <!-- MySQL extras -->
  <rect x="460" y="74" width="360" height="300" rx="8" fill="#0f1a2e" stroke="#3a6aae" stroke-width="2"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">MySQL 8.0+ 전용 기능</text>

  <text x="476" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">InnoDB Cluster (공식 HA)</text>
  <text x="476" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Group Replication + MySQL Shell + Router</text>

  <text x="476" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Hash Join 알고리즘</text>
  <text x="476" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">MariaDB는 8.0 이전부터 Hash Join 지원</text>

  <text x="476" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Invisible Columns (8.0.23+)</text>
  <text x="476" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SELECT *에서 제외되는 컬럼</text>

  <text x="476" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Query Store (8.4+)</text>
  <text x="476" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">쿼리 실행 계획 이력 영구 저장</text>

  <text x="476" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Oracle 호환성 향상</text>
  <text x="476" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DUAL 테이블, 함수 패키지 등</text>

  <text x="476" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Enterprise Edition: Thread Pool, Audit Log 추가 비용</text>

  <!-- Bottom: common ground -->
  <rect x="60" y="392" width="760" height="28" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">공통: InnoDB 호환 | SQL 표준 | GTID 리플리케이션 | JSON 함수 | 윈도우 함수 | CTE</text>
</svg>
