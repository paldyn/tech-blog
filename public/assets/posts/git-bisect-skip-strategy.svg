<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">skip 결과와 후속 처리 전략</text>

  <!-- Three outcome boxes -->
  <rect x="60" y="68" width="230" height="90" rx="8" fill="#0e1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">케이스 1: 정확한 커밋 발견</text>
  <text x="175" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">skip 커밋과 버그 커밋이</text>
  <text x="175" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">인접하지 않은 경우</text>
  <text x="175" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">→ 버그 커밋 SHA 출력</text>

  <rect x="325" y="68" width="230" height="90" rx="8" fill="#14120a" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8c84a" text-anchor="middle">케이스 2: 범위 제공</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">skip 커밋이 버그 커밋 근처에</text>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">있어 정확히 특정 불가</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c84a" text-anchor="middle">→ 후보 커밋 목록 제공</text>

  <rect x="590" y="68" width="230" height="90" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="705" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">케이스 3: 탐색 불가</text>
  <text x="705" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">탐색 범위 전체가</text>
  <text x="705" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">skip으로 채워진 경우</text>
  <text x="705" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">→ 수동 분석 필요</text>

  <!-- Code: handling range result -->
  <rect x="60" y="180" width="760" height="170" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 케이스 2 출력 예시: 범위 제공</text>
  <text x="76" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve"># There are only 'skip'ped commits left to test.</text>
  <text x="76" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve"># The first bad commit could be...</text>
  <text x="76" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve"># abc1234 ... (후보 1)</text>
  <text x="76" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve"># def5678 ... (후보 2)</text>
  <text x="76" y="309" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 후보 커밋들을 직접 checkout하여 수동 확인</text>
  <text x="76" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git checkout abc1234 &amp;&amp; ./test.sh &amp;&amp; echo "ok"</text>
</svg>
