<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">각 절의 가시 범위(Scope)와 자주 하는 실수</text>

  <!-- Scope table header -->
  <rect x="60" y="68" width="760" height="34" rx="4" fill="#111827"/>
  <text x="200" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">절</text>
  <text x="420" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">볼 수 있는 것</text>
  <text x="680" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">볼 수 없는 것</text>

  <!-- Row 1: FROM -->
  <rect x="60" y="102" width="760" height="32" rx="0" fill="#0d1117"/>
  <text x="200" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">FROM / JOIN</text>
  <text x="420" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">테이블 원본 컬럼</text>
  <text x="680" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">—</text>

  <!-- Row 2: WHERE -->
  <rect x="60" y="134" width="760" height="32" rx="0" fill="#111827"/>
  <text x="200" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">WHERE</text>
  <text x="420" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">테이블 원본 컬럼</text>
  <text x="680" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">SELECT 별칭, 집계함수</text>

  <!-- Row 3: GROUP BY -->
  <rect x="60" y="166" width="760" height="32" rx="0" fill="#0d1117"/>
  <text x="200" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle" xml:space="preserve">GROUP BY</text>
  <text x="420" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">테이블 원본 컬럼</text>
  <text x="680" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">SELECT 별칭 (DB에 따라 허용)</text>

  <!-- Row 4: HAVING -->
  <rect x="60" y="198" width="760" height="32" rx="0" fill="#111827"/>
  <text x="200" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle" xml:space="preserve">HAVING</text>
  <text x="420" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">그룹 컬럼, 집계함수</text>
  <text x="680" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">SELECT 별칭</text>

  <!-- Row 5: SELECT -->
  <rect x="60" y="230" width="760" height="32" rx="0" fill="#0d1117"/>
  <text x="200" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">SELECT</text>
  <text x="420" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">그룹 컬럼, 집계함수, 표현식</text>
  <text x="680" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">—</text>

  <!-- Row 6: ORDER BY -->
  <rect x="60" y="262" width="760" height="32" rx="0" fill="#111827"/>
  <text x="200" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">ORDER BY / LIMIT</text>
  <text x="420" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">SELECT 별칭 사용 가능</text>
  <text x="680" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">—</text>

  <!-- Code example: common mistakes -->
  <text x="60" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" xml:space="preserve">흔한 실수와 해결책</text>

  <rect x="60" y="340" width="370" height="74" rx="6" fill="#070b14" stroke="#e05555" stroke-width="1"/>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- ✗ 에러: WHERE에서 별칭 사용</text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="124" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> amount*</text>
  <text x="208" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1.1</text>
  <text x="232" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> AS total</text>
  <text x="76" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> total &gt; </text>
  <text x="196" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">10000</text>
  <text x="256" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve"> -- ✗</text>

  <rect x="450" y="340" width="370" height="74" rx="6" fill="#070b14" stroke="#55c555" stroke-width="1"/>
  <text x="466" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- ✓ 해결: 표현식 그대로 사용</text>
  <text x="466" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="514" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> amount*</text>
  <text x="598" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1.1</text>
  <text x="622" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> AS total</text>
  <text x="466" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="514" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> amount*</text>
  <text x="598" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1.1</text>
  <text x="622" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> &gt; </text>
  <text x="646" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">10000</text>
  <text x="718" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve"> -- ✓</text>

  <!-- Footer -->
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle" xml:space="preserve">PALDYN — SQL 완전 정복</text>
</svg>
