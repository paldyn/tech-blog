<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">창발적 능력 예시</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">모델 규모에 따라 갑자기 나타나는 능력들</text>

  <!-- Header row -->
  <rect x="60" y="88" width="200" height="34" fill="#1e2433" rx="6"/>
  <text x="160" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">창발적 능력</text>

  <rect x="270" y="88" width="180" height="34" fill="#1e2433" rx="6"/>
  <text x="360" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">임계 규모</text>

  <rect x="460" y="88" width="360" height="34" fill="#1e2433" rx="6"/>
  <text x="640" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">설명</text>

  <!-- Row 1: Chain-of-Thought -->
  <rect x="60" y="132" width="200" height="44" fill="#0d1520" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">Chain-of-Thought</text>
  <text x="160" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">단계적 추론</text>

  <rect x="270" y="132" width="180" height="44" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="360" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle" font-weight="700">~100B+</text>
  <text x="360" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">GPT-3.5급 이상</text>

  <rect x="460" y="132" width="360" height="44" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="480" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">"먼저 생각해보겠습니다..."처럼 단계를</text>
  <text x="480" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">나눠 복잡한 추론 문제를 해결</text>

  <!-- Row 2: Arithmetic -->
  <rect x="60" y="186" width="200" height="44" fill="#0d1520" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">다자릿수 산술</text>
  <text x="160" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">복잡한 계산</text>

  <rect x="270" y="186" width="180" height="44" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="360" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle" font-weight="700">~13B+</text>
  <text x="360" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">7B 미만은 거의 불가</text>

  <rect x="460" y="186" width="360" height="44" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="480" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">5자리 이상 덧셈·곱셈을 정확히 수행</text>
  <text x="480" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">7B 이하에서는 정확도 ~5%</text>

  <!-- Row 3: Word Unscrambling -->
  <rect x="60" y="240" width="200" height="44" fill="#0d1520" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">단어 재배열</text>
  <text x="160" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">스크램블 해독</text>

  <rect x="270" y="240" width="180" height="44" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="360" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle" font-weight="700">~7B+</text>
  <text x="360" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">소규모 모델은 실패</text>

  <rect x="460" y="240" width="360" height="44" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="480" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">"tca" → "cat" 처럼 뒤섞인 철자를</text>
  <text x="480" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">올바른 단어로 복원</text>

  <!-- Row 4: IFEval -->
  <rect x="60" y="294" width="200" height="44" fill="#0d1520" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">지시 따르기</text>
  <text x="160" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">복잡한 지시 수행</text>

  <rect x="270" y="294" width="180" height="44" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="360" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle" font-weight="700">~50B+</text>
  <text x="360" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">정렬 학습 포함</text>

  <rect x="460" y="294" width="360" height="44" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="480" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">"JSON으로 출력하고, 단어 수를 정확히</text>
  <text x="480" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">100개로 맞추고, 이모지를 포함해"</text>

  <!-- Row 5: Code Generation -->
  <rect x="60" y="348" width="200" height="44" fill="#0d1520" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">코드 생성</text>
  <text x="160" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">정확한 코드 작성</text>

  <rect x="270" y="348" width="180" height="44" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="360" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle" font-weight="700">~7B~30B</text>
  <text x="360" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">코드 특화 학습 포함</text>

  <rect x="460" y="348" width="360" height="44" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="480" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">자연어 설명을 실행 가능한 코드로</text>
  <text x="480" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">변환, HumanEval 벤치마크로 평가</text>

  <!-- Bottom note -->
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">임계 규모는 학습 데이터·아키텍처·파인튜닝 방법에 따라 달라질 수 있음</text>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Wei et al. (2022), "Emergent Abilities of Large Language Models" 기반</text>
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">※ 창발 여부와 임계값은 측정 방식에 따라 논쟁 중 (Schaeffer et al., 2023)</text>
</svg>
