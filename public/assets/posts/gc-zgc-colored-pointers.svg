<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="cp-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="cp-arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">컬러드 포인터 — 메타데이터를 포인터에 담는다</text>

  <!-- 64-bit pointer layout -->
  <text x="60" y="88" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">64비트 포인터의 비트 구성 (Colored Pointer)</text>

  <!-- unused high bits -->
  <rect x="60" y="104" width="150" height="56" rx="6" fill="#15151d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="135" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">미사용 상위 비트</text>
  <text x="135" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(bits 47~63)</text>

  <!-- metadata color bits -->
  <rect x="216" y="104" width="60" height="56" rx="6" fill="#241414" stroke="#e05555" stroke-width="1.5"/>
  <text x="246" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">M0</text>
  <text x="246" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Marked0</text>

  <rect x="282" y="104" width="60" height="56" rx="6" fill="#241414" stroke="#e05555" stroke-width="1.5"/>
  <text x="312" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">M1</text>
  <text x="312" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Marked1</text>

  <rect x="348" y="104" width="64" height="56" rx="6" fill="#241414" stroke="#e05555" stroke-width="1.5"/>
  <text x="380" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">RM</text>
  <text x="380" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Remapped</text>

  <rect x="418" y="104" width="64" height="56" rx="6" fill="#241414" stroke="#e05555" stroke-width="1.5"/>
  <text x="450" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">F</text>
  <text x="450" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Finalizable</text>

  <!-- object address -->
  <rect x="488" y="104" width="332" height="56" rx="6" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="654" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">객체 주소 (Object Address)</text>
  <text x="654" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실제 힙 오프셋 — bits 0~41</text>

  <text x="246" y="178" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">메타데이터(컬러) 비트 — 객체 상태를 인코딩</text>

  <!-- Load barrier flow -->
  <text x="60" y="232" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">로드 배리어 — 참조를 읽을 때마다 색을 검사하고 자가 치유</text>

  <!-- App load box -->
  <rect x="60" y="256" width="200" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">앱 스레드가 참조 로드</text>
  <text x="160" y="304" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">obj.field 읽기</text>

  <!-- arrow -->
  <line x1="260" y1="291" x2="316" y2="291" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cp-arr)"/>

  <!-- color check -->
  <rect x="320" y="256" width="220" height="70" rx="8" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="430" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">로드 배리어: 색 검사</text>
  <text x="430" y="304" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기대 색과 다른가? (bad color)</text>

  <!-- arrow down to good -->
  <line x1="430" y1="326" x2="430" y2="380" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cp-arr)"/>
  <text x="446" y="358" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">색이 다르면 (relocate됨)</text>

  <!-- heal box -->
  <rect x="320" y="384" width="220" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="430" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">자가 치유 (self-healing)</text>
  <text x="430" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새 주소 조회 후 슬롯을 갱신</text>

  <!-- arrow back to app: heal updates the slot -->
  <line x1="320" y1="419" x2="160" y2="419" stroke="#55c555" stroke-width="2" marker-end="url(#cp-arr-g)"/>
  <text x="240" y="405" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">필드에 올바른 포인터 기록</text>

  <!-- good color path -->
  <line x1="540" y1="291" x2="596" y2="291" stroke="#55c555" stroke-width="2" marker-end="url(#cp-arr-g)"/>
  <text x="568" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">good</text>
  <rect x="600" y="256" width="220" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">그대로 사용</text>
  <text x="710" y="304" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">추가 작업 없이 빠른 경로</text>

  <!-- effect note -->
  <rect x="600" y="384" width="220" height="70" rx="8" fill="#15151d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">한 번 고치면 끝</text>
  <text x="710" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">같은 슬롯은 다시 안 거침</text>

  <!-- code: barrier concept -->
  <rect x="60" y="480" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="505" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">if</tspan> (color(ref) != GOOD) { ref = relocate_or_remap(ref); store(slot, ref); }  <tspan fill="#9aa4b8">// 로드 배리어</tspan></text>
</svg>
