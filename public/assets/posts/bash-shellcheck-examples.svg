<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ShellCheck이 잡아내는 대표 패턴</text>

  <!-- Left: bad code -->
  <rect x="60" y="70" width="360" height="320" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">❌ 문제 코드</text>
  <text x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># SC2086: 인용 누락</tspan></text>
  <text x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">for f in $FILES; do echo $f; done</text>
  <text x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># SC2039: [[]] 대신 []</tspan></text>
  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan> [ <tspan fill="#ce9178">"$a"</tspan> == <tspan fill="#ce9178">"$b"</tspan> ]; <tspan fill="#7ec8e3" font-weight="600">then</tspan> ...</text>
  <text x="80" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># SC2155: 선언과 대입 분리 필요</tspan></text>
  <text x="80" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">local</tspan> var=$(risky_cmd)</text>
  <text x="80" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># SC2091: 명령 이름 인용 잘못</tspan></text>
  <text x="80" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#ce9178">"ls"</tspan> -la</text>
  <text x="80" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># SC2166: -a/-o 대신 &amp;&amp;/||</tspan></text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan> [ <tspan fill="#ce9178">"$a"</tspan> -eq 1 -a <tspan fill="#ce9178">"$b"</tspan> -eq 2 ]</text>

  <!-- Right: fixed code -->
  <rect x="460" y="70" width="360" height="320" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">✅ 수정 코드</text>
  <text x="480" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 배열 + 인용 사용</tspan></text>
  <text x="480" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan> f <tspan fill="#7ec8e3" font-weight="600">in</tspan> <tspan fill="#ce9178">"${FILES[@]}"</tspan>; <tspan fill="#7ec8e3" font-weight="600">do</tspan> echo <tspan fill="#ce9178">"$f"</tspan>; <tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="480" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># [[ ]] 사용 (Bash 전용)</tspan></text>
  <text x="480" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan> [[ <tspan fill="#ce9178">"$a"</tspan> == <tspan fill="#ce9178">"$b"</tspan> ]]; <tspan fill="#7ec8e3" font-weight="600">then</tspan> ...</text>
  <text x="480" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 선언과 대입 분리</tspan></text>
  <text x="480" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">local</tspan> var; var=$(risky_cmd)</text>
  <text x="480" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 인용 없이 명령 실행</tspan></text>
  <text x="480" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">ls -la</text>
  <text x="480" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># &amp;&amp; 사용</tspan></text>
  <text x="480" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan> [[ <tspan fill="#ce9178">"$a"</tspan> -eq 1 ]] &amp;&amp; [[ <tspan fill="#ce9178">"$b"</tspan> -eq 2 ]]</text>

  <!-- Bottom label -->
  <text x="440" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">shellcheck script.sh | grep SC — SC 번호로 위키에서 설명 검색 가능</text>
</svg>
