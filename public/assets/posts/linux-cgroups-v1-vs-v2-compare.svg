<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">cgroups v1 vs v2 — 구조 비교</text>

  <!-- v1 section -->
  <rect x="60" y="64" width="360" height="320" rx="8" fill="#0d1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">cgroups v1</text>
  <text x="240" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(Linux 2.6.24, 2007)</text>

  <!-- v1 hierarchy -->
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서브시스템별 독립 계층 구조:</text>

  <rect x="80" y="142" width="100" height="26" rx="4" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="130" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">/sys/fs/cgroup/memory</text>

  <rect x="188" y="142" width="100" height="26" rx="4" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="238" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">/sys/fs/cgroup/cpu</text>

  <rect x="296" y="142" width="100" height="26" rx="4" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="346" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">/sys/fs/cgroup/blkio</text>

  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">문제점:</text>

  <rect x="80" y="206" width="320" height="162" rx="6" fill="#1a1010" stroke="#444" stroke-width="1"/>
  <text x="96" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">❌ 프로세스가 여러 계층에 분산</text>
  <text x="96" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> memory: /app/myproc</text>
  <text x="96" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> cpu: /batch/myproc → 불일치 가능</text>
  <text x="96" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">❌ 서브시스템 간 조율 없음</text>
  <text x="96" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> 메모리 + CPU 조합 제한 어려움</text>
  <text x="96" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">❌ 스레드 granularity 혼재</text>
  <text x="96" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> 일부는 프로세스, 일부는 스레드 단위</text>

  <!-- v2 section -->
  <rect x="460" y="64" width="360" height="320" rx="8" fill="#0d2214" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">cgroups v2</text>
  <text x="640" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(Linux 4.5, 2016 / 완전 지원 5.2+)</text>

  <!-- v2 unified hierarchy -->
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단일 통합 계층 구조:</text>

  <rect x="560" y="142" width="160" height="26" rx="4" fill="#1a3e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">/sys/fs/cgroup/</text>

  <text x="480" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">개선사항:</text>

  <rect x="480" y="206" width="320" height="162" rx="6" fill="#0d1a0d" stroke="#444" stroke-width="1"/>
  <text x="496" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✅ 단일 계층 (모든 서브시스템 통합)</text>
  <text x="496" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> /sys/fs/cgroup/app/myproc 하나에 모두</text>
  <text x="496" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✅ 프로세스 단위만 (스레드 선택적)</text>
  <text x="496" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> 일관된 granularity</text>
  <text x="496" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✅ 위임(delegation) 모델 개선</text>
  <text x="496" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> rootless 컨테이너 지원</text>
  <text x="496" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✅ PSI (Pressure Stall Info) 내장</text>

  <!-- current state -->
  <rect x="60" y="400" width="760" height="90" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">현재 상태 &amp; 마이그레이션</text>
  <text x="80" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Ubuntu 21.10+, Fedora 31+, RHEL 9+:</text>
  <text x="310" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">기본적으로 cgroup v2 사용</text>
  <text x="80" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Docker 20.10+, Podman 3+, Kubernetes 1.25+:</text>
  <text x="360" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">cgroup v2 완전 지원</text>
  <text x="80" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">확인:</text>
  <text x="120" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">stat -fc %T /sys/fs/cgroup/</text>
  <text x="310" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(cgroup2fs = v2, tmpfs = v1)</text>
</svg>
