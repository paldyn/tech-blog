<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BigQuery 아키텍처</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">스토리지·컴퓨팅 완전 분리 — 서버리스 MPP</text>

  <!-- Dremel Query Engine Layer -->
  <rect x="60" y="86" width="760" height="54" rx="8" fill="#12182a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Dremel 쿼리 엔진 (컴퓨팅 레이어)</text>
  <text x="440" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL 파싱 → 분산 실행 트리 → 슬롯(CPU 단위) 동적 할당 → 결과 집계</text>

  <!-- Arrows down -->
  <defs>
    <marker id="arrD" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#555"/>
    </marker>
  </defs>
  <line x1="440" y1="140" x2="440" y2="162" stroke="#555" stroke-width="2" marker-end="url(#arrD)"/>

  <!-- Jupiter Network -->
  <rect x="60" y="162" width="760" height="34" rx="6" fill="#1a1220" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Jupiter 네트워크 (초고속 내부 패브릭 — Petabit/s 급)</text>

  <line x1="440" y1="196" x2="440" y2="218" stroke="#555" stroke-width="2" marker-end="url(#arrD)"/>

  <!-- Colossus Storage Layer -->
  <rect x="60" y="218" width="760" height="54" rx="8" fill="#0e1a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Colossus 분산 파일시스템 (스토리지 레이어)</text>
  <text x="440" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Capacitor 열 지향 포맷 — 자동 압축·암호화·복제 — 용량 무제한</text>

  <!-- Three format/feature boxes -->
  <rect x="60" y="298" width="220" height="76" rx="8" fill="#111"/>
  <text x="170" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Capacitor 포맷</text>
  <text x="170" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">열 단위 압축 저장</text>
  <text x="170" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Dictionary / RLE 인코딩</text>
  <text x="170" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Parquet 호환</text>

  <rect x="330" y="298" width="220" height="76" rx="8" fill="#111"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">파티션 &amp; 클러스터</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">날짜 파티션 → 스캔 최소화</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">클러스터링 → 블록 Pruning</text>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">비용 절감의 핵심 수단</text>

  <rect x="600" y="298" width="220" height="76" rx="8" fill="#111"/>
  <text x="710" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">슬롯 모델</text>
  <text x="710" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">On-demand: 스캔 TB당 과금</text>
  <text x="710" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Editions: 슬롯 예약 정액</text>
  <text x="710" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">BI Engine: 인메모리 가속</text>

  <!-- Bottom comparison -->
  <rect x="60" y="396" width="760" height="72" rx="8" fill="#111"/>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">전통 DW vs BigQuery 차이</text>
  <!-- columns -->
  <text x="200" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전통 DW</text>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">항목</text>
  <text x="680" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">BigQuery</text>
  <text x="200" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">클러스터 규모 사전 프로비저닝</text>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">확장 방식</text>
  <text x="680" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">쿼리마다 자동 슬롯 확장·축소</text>
  <text x="200" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle"> </text>
</svg>
