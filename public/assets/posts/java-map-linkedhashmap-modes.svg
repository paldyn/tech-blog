<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LinkedHashMap 두 가지 모드</text>

  <!-- Header -->
  <rect x="60" y="64" width="760" height="40" rx="4" fill="#0f1827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="200" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">특성</text>
  <text x="490" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">삽입 순서 (accessOrder=false)</text>
  <text x="750" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">접근 순서 (accessOrder=true)</text>
  <line x1="330" y1="64" x2="330" y2="104" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="650" y1="64" x2="650" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="60" y="104" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">순서 기준</text>
  <text x="490" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">put 순서 (기본값)</text>
  <text x="750" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">get/put 접근 시간</text>
  <line x1="330" y1="104" x2="330" y2="148" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="650" y1="104" x2="650" y2="148" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 2 -->
  <rect x="60" y="148" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">head (oldest)</text>
  <text x="490" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">가장 먼저 삽입된 항목</text>
  <text x="750" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">가장 오래 접근 안 된 항목 (LRU)</text>
  <line x1="330" y1="148" x2="330" y2="192" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="650" y1="148" x2="650" y2="192" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 3 -->
  <rect x="60" y="192" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">생성 방법</text>
  <text x="490" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">new LinkedHashMap&lt;&gt;()</text>
  <text x="750" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">new LinkedHashMap&lt;&gt;(16, 0.75f, true)</text>
  <line x1="330" y1="192" x2="330" y2="236" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="650" y1="192" x2="650" y2="236" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 4 -->
  <rect x="60" y="236" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">주요 사용 사례</text>
  <text x="490" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">중복 제거 + 순서 재현</text>
  <text x="750" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">LRU 캐시, 최근 접근 기록</text>
  <line x1="330" y1="236" x2="330" y2="280" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="650" y1="236" x2="650" y2="280" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Note -->
  <text x="440" y="305" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">성능: HashMap과 동일 O(1) 평균 | 메모리: before/after 포인터 2개 추가</text>
</svg>
