<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">STP 포트 상태 전이</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">링크 활성 후 Forwarding까지 약 30~50초 소요 — RSTP는 1~2초로 단축</text>

  <defs>
    <marker id="st1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- States -->
  <rect x="60" y="110" width="140" height="80" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555" text-anchor="middle" font-weight="600">Blocking</text>
  <text x="130" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">BPDU 수신만</text>
  <text x="130" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">데이터 전달 X</text>

  <rect x="240" y="110" width="140" height="80" rx="8" fill="#1a1a0a" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="310" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8c44a" text-anchor="middle" font-weight="600">Listening</text>
  <text x="310" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">BPDU 송수신</text>
  <text x="310" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">15초 대기</text>

  <rect x="420" y="110" width="140" height="80" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="490" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc" text-anchor="middle" font-weight="600">Learning</text>
  <text x="490" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MAC 학습 시작</text>
  <text x="490" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">15초 대기</text>

  <rect x="600" y="110" width="140" height="80" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="670" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle" font-weight="600">Forwarding</text>
  <text x="670" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">정상 데이터 전달</text>
  <text x="670" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MAC 학습 계속</text>

  <!-- Arrows between states -->
  <line x1="200" y1="150" x2="240" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#st1)"/>
  <line x1="380" y1="150" x2="420" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#st1)"/>
  <line x1="560" y1="150" x2="600" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#st1)"/>

  <text x="220" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">선출</text>
  <text x="400" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">15s</text>
  <text x="580" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">15s</text>

  <!-- Disabled state -->
  <rect x="780" y="110" width="60" height="80" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="810" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle" font-weight="600">Dis-</text>
  <text x="810" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">abled</text>
  <text x="810" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444" text-anchor="middle">관리 비활성</text>

  <!-- BPDU Info -->
  <rect x="60" y="220" width="760" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" font-weight="600">BPDU (Bridge Protocol Data Unit) — STP 제어 메시지</text>
  <text x="80" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Configuration BPDU </text>
  <text x="284" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">루트 BID, 루트 경로 비용, 브리지 BID, 포트 ID</text>
  <text x="80" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">TCN BPDU        </text>
  <text x="260" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">토폴로지 변경 알림 (MAC 테이블 플러시 요청)</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">루트 브리지 선출 기준 (낮을수록 우선)</text>
  <text x="80" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">① Bridge Priority (기본 32768, 4096 단위 조정)</text>
  <text x="80" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">② MAC 주소 (동점 시 낮은 MAC이 루트)</text>
  <text x="80" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">SW(config)# spanning-tree vlan 1 priority 4096  ← 루트 강제 지정</text>
</svg>
