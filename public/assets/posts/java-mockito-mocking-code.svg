<svg xmlns="http://www.w3.org/2000/svg" width="880" height="384" viewBox="0 0 880 384">
  <rect width="880" height="384" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스터빙 · 검증 심화</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">matcher · 연속 반환 · captor</text>

  <rect x="60" y="90" width="760" height="278" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="78" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  >// 인자 매처 — 어떤 값이든 매칭</text>
  <text x="78" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >when(repo.findById(anyLong()))</text>
  <text x="78" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    .thenReturn(Optional.of(user));</text>
  <text x="78" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  >// 연속 호출마다 다른 값 반환</text>
  <text x="78" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >when(seq.next())</text>
  <text x="78" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    .thenReturn(<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">2</tspan>, <tspan fill="#b5cea8">3</tspan>);</text>
  <text x="78" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  >// 전달된 인자를 붙잡아 검증</text>
  <text x="78" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >var captor = ArgumentCaptor.forClass(User.class);</text>
  <text x="78" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >verify(repo).save(captor.capture());</text>
  <text x="78" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >assertEquals(<tspan fill="#ce9178">"kim"</tspan>, captor.getValue().getName());</text>
  <text x="78" y="348" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  >// 매처와 실제값을 섞을 땐 eq() 로 감싸야 함</text>
</svg>
