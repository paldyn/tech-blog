<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker ps 출력 컬럼 해부</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">각 컬럼이 의미하는 것</text>

  <!-- ps output code block -->
  <rect x="60" y="96" width="760" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">CONTAINER ID   IMAGE          COMMAND    CREATED       STATUS        PORTS          NAMES</text>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a1b2c3d4e5f6   nginx:alpine   "/docker…" 2 hours ago   Up 2 hours    0.0.0.0:80->   web</text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">9f8e7d6c5b4a   postgres:16    "docker…"  5 min ago     Up 5 minutes  5432/tcp       db</text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888888">3c2b1a0f9e8d   redis:7        "redis-…"  1 day ago     Exited (0)                   cache</text>

  <!-- Column annotation boxes -->
  <!-- CONTAINER ID -->
  <rect x="60" y="218" width="120" height="56" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">CONTAINER ID</text>
  <text x="120" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SHA256 앞 12자</text>

  <!-- IMAGE -->
  <rect x="192" y="218" width="100" height="56" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1.5"/>
  <text x="242" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">IMAGE</text>
  <text x="242" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이미지:태그</text>

  <!-- COMMAND -->
  <rect x="304" y="218" width="100" height="56" rx="6" fill="#1a1a30" stroke="#555588" stroke-width="1"/>
  <text x="354" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#9999cc">COMMAND</text>
  <text x="354" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실행 중인 명령</text>

  <!-- STATUS -->
  <rect x="416" y="218" width="120" height="56" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="476" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">STATUS</text>
  <text x="476" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Up / Exited / Paused</text>

  <!-- PORTS -->
  <rect x="548" y="218" width="100" height="56" rx="6" fill="#1f1400" stroke="#e8a030" stroke-width="1.5"/>
  <text x="598" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8a030">PORTS</text>
  <text x="598" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">호스트→컨테이너 포트</text>

  <!-- NAMES -->
  <rect x="660" y="218" width="100" height="56" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">NAMES</text>
  <text x="710" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨테이너 이름</text>

  <!-- Status color guide -->
  <text x="60" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">STATUS 상태값</text>

  <rect x="60" y="326" width="14" height="14" rx="3" fill="#55c555"/>
  <text x="82" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Up Nh</text>
  <text x="82" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정상 실행 중</text>

  <rect x="220" y="326" width="14" height="14" rx="3" fill="#e05555"/>
  <text x="242" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Exited (N)</text>
  <text x="242" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">종료 (종료코드 N)</text>

  <rect x="400" y="326" width="14" height="14" rx="3" fill="#e8a030"/>
  <text x="422" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Paused</text>
  <text x="422" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일시 정지 상태</text>

  <rect x="560" y="326" width="14" height="14" rx="3" fill="#7777cc"/>
  <text x="582" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Restarting</text>
  <text x="582" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">재시작 중</text>

  <!-- Tip -->
  <rect x="60" y="376" width="760" height="32" rx="6" fill="#111827" stroke="#1e2433"/>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Tip: </text>
  <text x="108" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">docker ps -a</text>
  <text x="232" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> — 종료된 컨테이너까지 모두 표시 (--all)</text>
</svg>
