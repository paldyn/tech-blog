<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">쿠버네티스 서비스 타입 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">접근 범위에 따른 서비스 타입 선택</text>

  <!-- ClusterIP -->
  <rect x="60" y="90" width="370" height="170" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">ClusterIP (기본값)</text>
  <text x="245" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클러스터 내부에서만 접근 가능</text>
  <rect x="78" y="150" width="334" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">type</text>
  <text x="134" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">: ClusterIP</text>
  <text x="94" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 내부 DNS: myapp.default.svc</text>
  <text x="94" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># ClusterIP: 10.96.0.5:80</text>
  <text x="94" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve"># 마이크로서비스 내부 통신에 사용</text>

  <!-- NodePort -->
  <rect x="450" y="90" width="370" height="170" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">NodePort</text>
  <text x="635" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">노드 IP:포트로 외부 접근</text>
  <rect x="468" y="150" width="334" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">type</text>
  <text x="524" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">: NodePort</text>
  <text x="484" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">nodePort</text>
  <text x="556" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">: 30080</text>
  <text x="484" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># NodeIP:30080 → Pod:80</text>
  <text x="484" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 범위: 30000~32767</text>

  <!-- LoadBalancer -->
  <rect x="60" y="280" width="370" height="170" rx="8" fill="#1a1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="245" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#ce9178">LoadBalancer</text>
  <text x="245" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클라우드 LB 자동 프로비저닝</text>
  <rect x="78" y="340" width="334" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">type</text>
  <text x="134" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">: LoadBalancer</text>
  <text x="94" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># EXTERNAL-IP 자동 할당</text>
  <text x="94" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># AWS ELB, GCP LB 등</text>
  <text x="94" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve"># 프로덕션 외부 서비스용</text>

  <!-- ExternalName -->
  <rect x="450" y="280" width="370" height="170" rx="8" fill="#0f0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="635" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">ExternalName</text>
  <text x="635" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">외부 DNS 이름으로 CNAME 매핑</text>
  <rect x="468" y="340" width="334" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">type</text>
  <text x="524" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">: ExternalName</text>
  <text x="484" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">externalName</text>
  <text x="484" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  : db.example.com</text>
  <text x="484" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 외부 DB 추상화에 사용</text>
</svg>
