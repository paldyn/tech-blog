      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">pip install 의 흐름</text>

  <rect x="60" y="120" width="200" height="64" rx="8" fill="#11151f" stroke="#7777cc" stroke-width="1.5"/>
