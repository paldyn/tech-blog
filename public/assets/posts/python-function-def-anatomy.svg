<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Python 함수 해부도</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">def 키워드로 시작하는 함수의 각 구성 요소</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="112" fill="#000000" rx="6" stroke="#3a4a6e"/>

  <!-- Line 1: def + name + params + colon -->
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> greet(name, greeting=</tspan><tspan fill="#ce9178">"Hello"</tspan><tspan fill="#ffffff">):</tspan></text>
  <!-- Line 2: docstring -->
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    """이름에게 인사를 출력한다."""</text>
  <!-- Line 3: body -->
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    message = greeting + </tspan><tspan fill="#ce9178">", "</tspan><tspan fill="#ffffff"> + name</tspan></text>
  <!-- Line 4: return -->
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> message</tspan></text>

  <!-- Section divider -->
  <line x1="60" y1="230" x2="820" y2="230" stroke="#3a4a6e" stroke-width="1"/>

  <!-- 4 Annotation boxes -->
  <!-- Box 1: def keyword -->
  <rect x="60" y="248" width="168" height="172" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <rect x="60" y="248" width="168" height="5" fill="#7ec8e3" rx="8"/>
  <rect x="60" y="251" width="168" height="3" fill="#7ec8e3"/>
  <text x="144" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">def 키워드</text>
  <text x="144" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수 정의를 시작하는</text>
  <text x="144" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Python 예약어</text>
  <rect x="88" y="336" width="112" height="28" fill="#0f1825" rx="4"/>
  <text x="144" y="354" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">def greet(...):</text>
  <text x="144" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">예약어 — 변경 불가</text>

  <!-- Box 2: function name + params -->
  <rect x="256" y="248" width="168" height="172" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <rect x="256" y="248" width="168" height="5" fill="#e8e8e8" rx="8"/>
  <rect x="256" y="251" width="168" height="3" fill="#e8e8e8"/>
  <text x="340" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">함수 이름·매개변수</text>
  <text x="340" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">호출 시 사용할 이름과</text>
  <text x="340" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">입력값(parameter)</text>
  <rect x="280" y="336" width="120" height="28" fill="#0f1825" rx="4"/>
  <text x="340" y="354" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">greet(name, ...)</text>
  <text x="340" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">snake_case 권장</text>

  <!-- Box 3: docstring -->
  <rect x="452" y="248" width="168" height="172" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <rect x="452" y="248" width="168" height="5" fill="#6a8aa0" rx="8"/>
  <rect x="452" y="251" width="168" height="3" fill="#6a8aa0"/>
  <text x="536" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#6a8aa0">독스트링</text>
  <text x="536" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수 첫 줄에 오는</text>
  <text x="536" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">삼중 따옴표 문서 문자열</text>
  <rect x="476" y="336" width="120" height="28" fill="#0f1825" rx="4"/>
  <text x="536" y="354" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">"""..."""</text>
  <text x="536" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">선택사항 · help() 출력</text>

  <!-- Box 4: return -->
  <rect x="648" y="248" width="168" height="172" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <rect x="648" y="248" width="168" height="5" fill="#7777cc" rx="8"/>
  <rect x="648" y="251" width="168" height="3" fill="#7777cc"/>
  <text x="732" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">return 문</text>
  <text x="732" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">호출자에게 값을</text>
  <text x="732" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">돌려주는 키워드</text>
  <rect x="672" y="336" width="120" height="28" fill="#0f1825" rx="4"/>
  <text x="732" y="354" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">return message</text>
  <text x="732" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">없으면 None 반환</text>

  <!-- Connector lines from code to boxes -->
  <line x1="90" y1="202" x2="144" y2="248" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="200" y1="202" x2="340" y2="248" stroke="#e8e8e8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="200" y1="202" x2="536" y2="248" stroke="#6a8aa0" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="752" y1="202" x2="732" y2="248" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
