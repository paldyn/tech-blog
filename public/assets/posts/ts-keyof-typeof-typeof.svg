<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">typeof 타입 연산자</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">값에서 타입을 추출 — 중복 없는 타입 정의</text>

  <!-- Left: typeof value -->
  <rect x="60" y="84" width="360" height="220" rx="8" fill="#0d1627" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">값에서 타입 추출</text>
  <rect x="74" y="122" width="332" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 설정 객체 (값)</text>
  <text x="82" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="82" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">       defaultConfig = {</text>
  <text x="82" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  host: </text>
  <text x="82" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">         "localhost"</text>
  <text x="82" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, port: </text>
  <text x="82" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">         8080</text>
  <text x="82" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="82" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 타입을 값에서 추출 (중복 없음)</text>
  <text x="82" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">type</text>
  <text x="82" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">       Config = </text>
  <text x="82" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                  typeof</text>
  <text x="82" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                         defaultConfig</text>
  <text x="82" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// { host: string; port: number }</text>

  <!-- Right: keyof typeof combo -->
  <rect x="460" y="84" width="360" height="220" rx="8" fill="#130d2a" stroke="#7777cc" stroke-width="2"/>
  <text x="640" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">keyof typeof 조합</text>
  <rect x="474" y="122" width="332" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 객체의 키 유니온 추출</text>
  <text x="482" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="482" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">       colors = {</text>
  <text x="482" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  red: </text>
  <text x="482" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">         "#e05555"</text>
  <text x="482" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, blue: </text>
  <text x="482" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">          "#7ec8e3"</text>
  <text x="482" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="482" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">type</text>
  <text x="482" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">       Color = </text>
  <text x="482" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                 keyof</text>
  <text x="482" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                        typeof</text>
  <text x="482" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> colors</text>
  <text x="482" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// "red" | "blue"</text>
  <text x="482" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">colors.red       </text>
  <text x="482" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">        // string</text>
  <text x="482" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">colors.green     </text>
  <text x="482" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">        // TS2339!</text>

  <!-- Summary -->
  <rect x="60" y="324" width="760" height="96" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">keyof vs typeof 구분</text>
  <text x="240" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">keyof T → 타입 T의 키 유니온</text>
  <text x="240" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">입력: 타입 / 출력: 키 유니온 타입</text>
  <text x="640" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">typeof v → 값 v의 타입</text>
  <text x="640" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">입력: 값 / 출력: 해당 값의 타입</text>
  <text x="440" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">keyof typeof v → 값의 모든 키를 유니온으로</text>
</svg>