<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">arguments vs 나머지 파라미터</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">비교 및 현대 코드 권장 사항</text>

  <!-- 비교표 -->
  <rect x="60" y="100" width="760" height="210" fill="#111827" rx="8" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 차이 비교</text>

  <rect x="80" y="132" width="720" height="26" fill="#1a2030" rx="4"/>
  <text x="240" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">항목</text>
  <text x="480" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a855" text-anchor="middle">arguments</text>
  <text x="700" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">나머지 파라미터</text>
  <line x1="80" y1="158" x2="800" y2="158" stroke="#2a2a2a" stroke-width="1"/>

  <text x="240" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">타입</text>
  <text x="480" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">유사 배열 (Array-like)</text>
  <text x="700" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">진짜 배열 (Array)</text>
  <line x1="80" y1="184" x2="800" y2="184" stroke="#2a2a2a" stroke-width="1"/>

  <text x="240" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">배열 메서드</text>
  <text x="480" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">직접 사용 불가</text>
  <text x="700" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">직접 사용 가능</text>
  <line x1="80" y1="210" x2="800" y2="210" stroke="#2a2a2a" stroke-width="1"/>

  <text x="240" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">화살표 함수 지원</text>
  <text x="480" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">없음</text>
  <text x="700" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">있음</text>
  <line x1="80" y1="236" x2="800" y2="236" stroke="#2a2a2a" stroke-width="1"/>

  <text x="240" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">부분 수집</text>
  <text x="480" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">불가 (전체만)</text>
  <text x="700" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">가능 (named 뒤 나머지)</text>
  <line x1="80" y1="262" x2="800" y2="262" stroke="#2a2a2a" stroke-width="1"/>

  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">권장 여부</text>
  <text x="480" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a855" text-anchor="middle">레거시 코드에서만</text>
  <text x="700" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">현대 코드에서 권장</text>

  <line x1="400" y1="132" x2="400" y2="290" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="600" y1="132" x2="600" y2="290" stroke="#2a2a2a" stroke-width="1"/>

  <!-- arguments callee 예시 -->
  <rect x="60" y="325" width="760" height="65" fill="#111827" rx="8" stroke="#5f1e1e" stroke-width="1.5"/>
  <text x="440" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">arguments.callee — strict mode에서 사용 금지</text>
  <rect x="80" y="357" width="720" height="25" fill="#070b14" rx="4" stroke="#1e2433"/>
  <text x="96" y="375" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 비엄격 한정: arguments.callee = 현재 실행 중인 함수. strict에서 TypeError. 사용 금지.</text>

  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN — JavaScript 완전 정복</text>
</svg>
