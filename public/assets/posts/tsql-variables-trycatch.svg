<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TRY...CATCH 오류 처리 흐름</text>

  <!-- TRY block -->
  <rect x="60" y="70" width="360" height="200" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">BEGIN TRY</text>
  <line x1="80" y1="106" x2="400" y2="106" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="90" y="116" width="300" height="36" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">① SQL 문 실행</text>

  <rect x="90" y="162" width="300" height="36" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">② COMMIT</text>

  <rect x="90" y="208" width="300" height="44" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">③ TRY 블록 정상 종료</text>
  <text x="240" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CATCH 블록 실행 안 됨</text>

  <!-- Error arrow -->
  <line x1="390" y1="134" x2="460" y2="134" stroke="#e05555" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="425" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">오류 발생</text>

  <!-- CATCH block -->
  <rect x="462" y="70" width="358" height="200" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="641" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">BEGIN CATCH</text>
  <line x1="480" y1="106" x2="800" y2="106" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="482" y="116" width="318" height="36" rx="4" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="641" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">ERROR_NUMBER() / ERROR_MESSAGE()</text>

  <rect x="482" y="162" width="318" height="36" rx="4" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="641" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">ERROR_SEVERITY() / ERROR_STATE()</text>

  <rect x="482" y="208" width="318" height="44" rx="4" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="641" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a040" text-anchor="middle">ROLLBACK 또는 재시도 로직</text>
  <text x="641" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">THROW 로 재발생 가능</text>

  <!-- Code block -->
  <rect x="60" y="292" width="760" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- TRY...CATCH 실전 패턴</text>
  <text xml:space="preserve" x="80" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">BEGIN TRY</tspan></text>
  <text xml:space="preserve" x="80" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">BEGIN TRAN</tspan><tspan fill="#ffffff">;</tspan></text>
  <text xml:space="preserve" x="80" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">UPDATE</tspan><tspan fill="#ffffff"> accounts </tspan><tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> balance -= </tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> id = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">;</tspan></text>
  <text xml:space="preserve" x="80" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">UPDATE</tspan><tspan fill="#ffffff"> accounts </tspan><tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> balance += </tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> id = </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">;</tspan></text>
  <text xml:space="preserve" x="80" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">COMMIT TRAN</tspan><tspan fill="#ffffff">;</tspan></text>
  <text xml:space="preserve" x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">END TRY</tspan></text>
  <text xml:space="preserve" x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">BEGIN CATCH</tspan></text>
  <text xml:space="preserve" x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan></text>
</svg>
