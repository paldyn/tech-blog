<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">islice()로 무한 이터레이터 제어</text>

  <!-- Left: islice usage patterns -->
  <text x="230" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">islice 시그니처와 패턴</text>
  <rect x="50" y="80" width="370" height="284" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">from </tspan><tspan>itertools </tspan><tspan font-weight="600" fill="#7ec8e3">import </tspan><tspan>islice, count</tspan>
  </text>
  <text x="66" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># islice(it, stop)</tspan></text>
  <text x="66" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">list(islice(count(<tspan fill="#b5cea8">0</tspan>), <tspan fill="#b5cea8">5</tspan>))</text>
  <text x="66" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># [0, 1, 2, 3, 4]</tspan></text>
  <text x="66" y="211" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># islice(it, start, stop)</tspan></text>
  <text x="66" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">list(islice(count(<tspan fill="#b5cea8">0</tspan>), <tspan fill="#b5cea8">5</tspan>, <tspan fill="#b5cea8">10</tspan>))</text>
  <text x="66" y="247" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># [5, 6, 7, 8, 9]</tspan></text>
  <text x="66" y="283" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># islice(it, start, stop, step)</tspan></text>
  <text x="66" y="301" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">list(islice(count(<tspan fill="#b5cea8">0</tspan>), <tspan fill="#b5cea8">0</tspan>, <tspan fill="#b5cea8">20</tspan>, <tspan fill="#b5cea8">3</tspan>))</text>
  <text x="66" y="319" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># [0, 3, 6, 9, 12, 15, 18]</tspan></text>
  <text x="66" y="355" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 주의: 음수 인덱스 지원 안 함</tspan></text>

  <!-- Right: practical patterns -->
  <text x="650" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">실전 활용 패턴</text>
  <rect x="460" y="80" width="370" height="284" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 파일 처음 n줄 읽기</tspan></text>
  <text x="476" y="121" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">with </tspan><tspan>open(<tspan fill="#ce9178">"big.log"</tspan>) </tspan><tspan font-weight="600" fill="#7ec8e3">as </tspan><tspan>f:</tspan>
  </text>
  <text x="476" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    head = list(islice(f, <tspan fill="#b5cea8">10</tspan>))</text>
  <text x="476" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 무한 피보나치에서 처음 8개</tspan></text>
  <text x="476" y="193" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">def </tspan><tspan>fib():</tspan>
  </text>
  <text x="476" y="211" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    a, b = <tspan fill="#b5cea8">0</tspan>, <tspan fill="#b5cea8">1</tspan></text>
  <text x="476" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">while True</tspan><tspan>: </tspan><tspan font-weight="600" fill="#7ec8e3">yield </tspan><tspan>a; a,b=b,a+b</tspan>
  </text>
  <text x="476" y="247" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">list(islice(fib(), <tspan fill="#b5cea8">8</tspan>))</text>
  <text x="476" y="265" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># [0,1,1,2,3,5,8,13]</tspan></text>
  <text x="476" y="301" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># cycle + islice 로 반복 패턴</tspan></text>
  <text x="476" y="319" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">from </tspan><tspan>itertools </tspan><tspan font-weight="600" fill="#7ec8e3">import </tspan><tspan>cycle</tspan>
  </text>
  <text x="476" y="337" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">colors = list(islice(cycle([</text>
  <text x="476" y="355" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">'red'</tspan>, <tspan fill="#ce9178">'blue'</tspan>]), <tspan fill="#b5cea8">5</tspan>))</tspan></text>
</svg>
