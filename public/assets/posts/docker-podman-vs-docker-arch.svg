<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker vs Podman — 아키텍처 비교</text>

  <!-- Docker side -->
  <text x="220" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">Docker (데몬 기반)</text>

  <rect x="80" y="96" width="280" height="50" rx="6" fill="#0a1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">docker CLI (사용자)</text>

  <line x1="220" y1="146" x2="220" y2="176" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="240" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">REST API</text>

  <rect x="80" y="176" width="280" height="50" rx="6" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="220" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">dockerd (root 데몬)</text>
  <text x="220" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">항상 실행 중, root 권한 필요</text>

  <line x1="220" y1="226" x2="220" y2="256" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="256" width="280" height="50" rx="6" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="220" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">containerd</text>
  <text x="220" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컨테이너 런타임 관리</text>

  <line x1="220" y1="306" x2="220" y2="336" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="336" width="280" height="50" rx="6" fill="#0a1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">runc → Linux Kernel</text>

  <!-- Security risk label -->
  <rect x="90" y="398" width="260" height="44" rx="5" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="220" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">⚠ root 데몬이 단일 장애점</text>
  <text x="220" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">소켓 접근 = 사실상 root 권한</text>

  <!-- Podman side -->
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">Podman (데몬리스)</text>

  <rect x="520" y="96" width="280" height="50" rx="6" fill="#0a1628" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">podman CLI (사용자)</text>

  <line x1="660" y1="146" x2="660" y2="176" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="680" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">직접 fork</text>

  <rect x="520" y="176" width="280" height="50" rx="6" fill="#0d1117" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="660" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#b5cea8" text-anchor="middle">conmon (모니터 프로세스)</text>
  <text x="660" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컨테이너당 1개 경량 모니터</text>

  <line x1="660" y1="226" x2="660" y2="256" stroke="#b5cea8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="520" y="256" width="280" height="50" rx="6" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="660" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">runc / crun</text>
  <text x="660" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OCI 런타임 (동일)</text>

  <line x1="660" y1="306" x2="660" y2="336" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="520" y="336" width="280" height="50" rx="6" fill="#0a1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Linux Kernel</text>

  <!-- Advantage label -->
  <rect x="530" y="398" width="260" height="44" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✅ 데몬 없음 — rootless 가능</text>
  <text x="660" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">각 컨테이너가 독립 프로세스</text>

  <!-- Separator -->
  <line x1="440" y1="68" x2="440" y2="450" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom -->
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Podman은 데몬 없이 각 명령이 직접 컨테이너 생성 → 단일 장애점 제거 · 사용자 네임스페이스 활용</text>
</svg>
