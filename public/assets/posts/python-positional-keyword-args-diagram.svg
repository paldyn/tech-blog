<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">위치 인수 vs 키워드 인수</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">같은 함수를 두 가지 방식으로 호출하기</text>

  <!-- Function definition box -->
  <rect x="60" y="90" width="760" height="62" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> connect(host, port, timeout):</tspan></text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    ...</text>

  <!-- Left side: Positional -->
  <rect x="60" y="178" width="360" height="222" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <rect x="60" y="178" width="360" height="5" fill="#7ec8e3" rx="8"/>
  <rect x="60" y="181" width="360" height="3" fill="#7ec8e3"/>
  <text x="240" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">위치 인수 (Positional)</text>

  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">connect(</tspan><tspan fill="#ce9178">"db.example.com"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        </tspan><tspan fill="#b5cea8">5432</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#ffffff">)</tspan></text>

  <line x1="76" y1="268" x2="324" y2="268" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">순서가 의미를 결정한다</text>
  <text x="76" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">첫 번째 → host</text>
  <text x="76" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">두 번째 → port</text>
  <text x="76" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">세 번째 → timeout</text>
  <text x="76" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">순서 틀리면 버그!</text>

  <!-- Right side: Keyword -->
  <rect x="460" y="178" width="360" height="222" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <rect x="460" y="178" width="360" height="5" fill="#55c555" rx="8"/>
  <rect x="460" y="181" width="360" height="3" fill="#55c555"/>
  <text x="640" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">키워드 인수 (Keyword)</text>

  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">connect(</tspan></text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    host=</tspan><tspan fill="#ce9178">"db.example.com"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    timeout=</tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#ffffff">, port=</tspan><tspan fill="#b5cea8">5432</tspan></text>
  <text x="476" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <line x1="476" y1="302" x2="800" y2="302" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이름이 의미를 결정한다</text>
  <text x="476" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">순서가 달라도 정확하게 전달</text>
  <text x="476" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가독성 향상 · 오류 예방</text>

  <!-- Rule at bottom -->
  <rect x="60" y="416" width="760" height="2" fill="#1e2433"/>
  <text x="440" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">규칙: 위치 인수는 키워드 인수보다 먼저  |  혼합 시 위치 인수가 앞에 와야 함</text>
</svg>
