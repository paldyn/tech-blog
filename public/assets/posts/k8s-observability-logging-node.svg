<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컨테이너 로그는 어디에 쌓이는가</text>

  <!-- Worker Node -->
  <rect x="60" y="80" width="540" height="340" rx="10" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="90" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Worker Node</text>

  <!-- app container -->
  <rect x="90" y="124" width="160" height="66" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">앱 컨테이너</text>
  <text x="170" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">stdout / stderr 출력</text>

  <line x1="250" y1="157" x2="330" y2="157" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- containerd -->
  <rect x="330" y="124" width="170" height="66" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="415" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">containerd</text>
  <text x="415" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스트림을 파일로 기록</text>

  <line x1="415" y1="190" x2="415" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- log file -->
  <rect x="90" y="240" width="390" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="106" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">/var/log/pods/</tspan></text>
  <text x="106" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  default_api_&lt;uid&gt;/app/0.log</text>

  <!-- kubelet -->
  <rect x="90" y="338" width="390" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="285" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">kubelet</text>
  <text x="285" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로그 파일 읽기 제공 + 로테이션 관리 (기본 10Mi × 5개)</text>

  <line x1="285" y1="338" x2="285" y2="316" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrp)"/>

  <!-- kubectl logs flow (right) -->
  <rect x="650" y="124" width="170" height="66" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="735" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">kubectl logs</text>
  <text x="735" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사용자 조회</text>

  <line x1="735" y1="190" x2="735" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="650" y="240" width="170" height="66" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="735" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">API Server</text>
  <text x="735" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">요청을 kubelet에 전달</text>

  <path d="M 650 290 C 580 310, 540 340, 480 360" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- bottom warning -->
  <rect x="60" y="446" width="760" height="56" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">노드 로컬 로그는 휘발성</text>
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파드 삭제 · 노드 장애 시 로그도 사라진다 → 중앙집중식 수집이 필요한 이유</text>
</svg>
