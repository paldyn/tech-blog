<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e8c55e" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Git 설정의 세 가지 레벨</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">좁은 범위가 넓은 범위를 덮어쓴다 (local &gt; global &gt; system)</text>

  <!-- System level -->
  <rect x="60" y="90" width="760" height="90" rx="10" fill="#111" stroke="#2a2a2a"/>
  <rect x="60" y="90" width="8" height="90" rx="4" fill="#7777cc"/>
  <text x="90" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">system</text>
  <text x="90" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 사용자 · 모든 저장소에 적용</text>
  <text x="90" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">/etc/gitconfig  또는  /usr/local/etc/gitconfig</text>
  <text x="700" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">--system</text>
  <text x="700" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">관리자 권한 필요</text>

  <!-- Global level -->
  <rect x="80" y="196" width="720" height="90" rx="10" fill="#111" stroke="#2a2a1e"/>
  <rect x="80" y="196" width="8" height="90" rx="4" fill="#7ec8e3"/>
  <text x="110" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">global</text>
  <text x="110" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현재 사용자의 모든 저장소에 적용</text>
  <text x="110" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">~/.gitconfig  또는  ~/.config/git/config</text>
  <text x="680" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">--global  ← 가장 자주 사용</text>

  <!-- Local level -->
  <rect x="100" y="302" width="680" height="90" rx="10" fill="#0d1a0d" stroke="#1e3a1e"/>
  <rect x="100" y="302" width="8" height="90" rx="4" fill="#55c555"/>
  <text x="130" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">local</text>
  <text x="130" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">해당 저장소에만 적용 (가장 높은 우선순위)</text>
  <text x="130" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">{project}/.git/config</text>
  <text x="660" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">--local  (기본값)</text>

  <!-- Override arrow -->
  <text x="820" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55e" transform="rotate(90, 820, 200)">우선순위 ↑</text>

  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">같은 키가 여러 레벨에 정의되면 local &gt; global &gt; system 순으로 적용</text>
</svg>
