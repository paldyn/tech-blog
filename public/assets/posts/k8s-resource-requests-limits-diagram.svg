<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Requests vs Limits — 노드 자원 배분</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">requests는 스케줄링 기준 · limits는 실제 사용 상한선</text>

  <!-- Node box (capacity: 4 CPU, 8Gi) -->
  <rect x="60" y="88" width="760" height="260" rx="10" fill="#0d1520" stroke="#3a4a6e" stroke-width="2"/>
  <text x="440" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">Node (CPU: 4 cores · Memory: 8Gi)</text>

  <!-- CPU bar -->
  <text x="90" y="142"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">CPU</text>

  <!-- CPU bar background -->
  <rect x="140" y="128" width="650" height="28" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Pod-a requests CPU: 0.5 → 162px of 650 -->
  <rect x="140" y="128" width="81" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <!-- Pod-b requests CPU: 1.0 -->
  <rect x="221" y="128" width="162" height="28" rx="4" fill="#7ec8e3" opacity="0.8"/>
  <!-- Pod-c requests CPU: 0.5 -->
  <rect x="383" y="128" width="81" height="28" rx="4" fill="#7777cc" opacity="0.8"/>
  <!-- remaining capacity -->
  <text x="540" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">남은 여유 용량</text>

  <text x="172" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#0a0a0a" font-weight="700">Pod-A</text>
  <text x="302" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#0a0a0a" font-weight="700">Pod-B</text>
  <text x="423" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#0a0a0a" font-weight="700">Pod-C</text>

  <!-- Memory bar -->
  <text x="90" y="186"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">MEM</text>

  <rect x="140" y="172" width="650" height="28" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Pod-A: 128Mi -->
  <rect x="140" y="172" width="61" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <!-- Pod-B: 256Mi -->
  <rect x="201" y="172" width="122" height="28" rx="4" fill="#7ec8e3" opacity="0.8"/>
  <!-- Pod-C: 128Mi -->
  <rect x="323" y="172" width="61" height="28" rx="4" fill="#7777cc" opacity="0.8"/>
  <text x="172" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#0a0a0a" font-weight="700">Pod-A</text>
  <text x="262" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#0a0a0a" font-weight="700">Pod-B</text>
  <text x="354" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#0a0a0a" font-weight="700">Pod-C</text>

  <!-- Legend: requests vs limits -->
  <rect x="80" y="220" width="680" height="110" rx="6" fill="#0a0a14" stroke="#3a4a6e" stroke-width="1"/>
  <text x="420" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">각 Pod의 requests / limits 설정</text>

  <!-- Headers -->
  <text x="120" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Pod</text>
  <text x="220" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU requests</text>
  <text x="370" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU limits</text>
  <text x="490" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MEM requests</text>
  <text x="650" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MEM limits</text>

  <text x="120" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Pod-A</text>
  <text x="220" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">500m</text>
  <text x="370" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">1000m</text>
  <text x="490" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">128Mi</text>
  <text x="650" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">256Mi</text>

  <text x="120" y="304"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Pod-B</text>
  <text x="220" y="304"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">1000m</text>
  <text x="370" y="304"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">2000m</text>
  <text x="490" y="304"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">256Mi</text>
  <text x="650" y="304"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">512Mi</text>

  <text x="120" y="324"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Pod-C</text>
  <text x="220" y="324"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">500m</text>
  <text x="370" y="324"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">500m</text>
  <text x="490" y="324"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">128Mi</text>
  <text x="650" y="324"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">128Mi</text>

  <!-- Bottom explains -->
  <rect x="60" y="372" width="760" height="104" rx="8" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">requests vs limits 차이</text>
  <text x="90" y="416"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">requests</text>
  <text x="180" y="416"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">스케줄러가 Pod를 배치할 노드를 고를 때 기준 (예약된 용량)</text>
  <text x="90" y="436"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">limits</text>
  <text x="155" y="436"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">실제 사용 상한선 · CPU 초과 시 스로틀 · 메모리 초과 시 OOMKilled</text>
  <text x="90" y="456"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">requests 없이 limits만 설정하면 requests = limits로 자동 설정됩니다</text>
</svg>
