<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">매핑된 타입 수정자 +/-</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">readonly와 ? 를 더하거나 제거하는 제어 문법</text>

  <!-- Left: adding modifiers -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">수정자 추가 (+readonly, +?)</text>
  <rect x="60" y="116" width="360" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// +readonly = readonly 추가</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Freeze&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt; = {</text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  +<tspan fill="#7ec8e3" font-weight="600">readonly</tspan> [<tspan fill="#7ec8e3" font-weight="600">K</tspan> <tspan fill="#7ec8e3" font-weight="600">in</tspan> <tspan fill="#7ec8e3" font-weight="600">keyof</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan>]: <tspan fill="#7ec8e3" font-weight="600">T</tspan>[<tspan fill="#7ec8e3" font-weight="600">K</tspan>];</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">};</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Freeze === Readonly (내장과 동일)</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// +? 는 그냥 ?와 동일 (명시용)</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  [<tspan fill="#7ec8e3" font-weight="600">K</tspan> <tspan fill="#7ec8e3" font-weight="600">in</tspan> <tspan fill="#7ec8e3" font-weight="600">keyof</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan>]+?: <tspan fill="#7ec8e3" font-weight="600">T</tspan>[<tspan fill="#7ec8e3" font-weight="600">K</tspan>];</text>

  <!-- Right: removing modifiers -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">수정자 제거 (-readonly, -?)</text>
  <rect x="460" y="116" width="360" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// -readonly = readonly 제거</text>
  <text x="476" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Mutable&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt; = {</text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  -<tspan fill="#7ec8e3" font-weight="600">readonly</tspan> [<tspan fill="#7ec8e3" font-weight="600">K</tspan> <tspan fill="#7ec8e3" font-weight="600">in</tspan> <tspan fill="#7ec8e3" font-weight="600">keyof</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan>]: <tspan fill="#7ec8e3" font-weight="600">T</tspan>[<tspan fill="#7ec8e3" font-weight="600">K</tspan>];</text>
  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">};</text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// -? = optional 제거 (=== Required)</text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Required2&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt; = {</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  [<tspan fill="#7ec8e3" font-weight="600">K</tspan> <tspan fill="#7ec8e3" font-weight="600">in</tspan> <tspan fill="#7ec8e3" font-weight="600">keyof</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan>]-?: <tspan fill="#7ec8e3" font-weight="600">T</tspan>[<tspan fill="#7ec8e3" font-weight="600">K</tspan>];</text>
  <text x="476" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">};</text>

  <!-- Combined: before/after -->
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">적용 전후 비교</text>
  <rect x="60" y="316" width="760" height="126" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> User = { readonly id: <tspan fill="#b5cea8">number</tspan>; name?: <tspan fill="#ce9178">string</tspan> };</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> MutableRequired = {</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  -<tspan fill="#7ec8e3" font-weight="600">readonly</tspan> [<tspan fill="#7ec8e3" font-weight="600">K</tspan> <tspan fill="#7ec8e3" font-weight="600">in</tspan> <tspan fill="#7ec8e3" font-weight="600">keyof</tspan> User]-?: User[<tspan fill="#7ec8e3" font-weight="600">K</tspan>];</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}; <tspan fill="#9aa4b8">// { id: number; name: string } — readonly 제거, optional 제거</tspan></text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Partial&lt;T&gt;: +?  |  Required&lt;T&gt;: -?  |  Readonly&lt;T&gt;: +readonly  |  Mutable&lt;T&gt;: -readonly</text>
  <text x="76" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 두 수정자 동시 적용 가능: -readonly 와 -? 를 한 매핑에서 함께 사용</text>

  <!-- Note -->
  <rect x="60" y="464" width="760" height="18" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="477" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">+는 기본값이므로 생략 가능 · -는 명시해야 함</text>
</svg>
