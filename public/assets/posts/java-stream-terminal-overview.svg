<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Stream 종료 연산 — 분류와 반환 타입</text>

  <!-- Category: collect -->
  <rect x="60" y="66" width="240" height="186" fill="#0f1f30" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">수집 (collect)</text>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">collect(Collectors.toList())</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">collect(Collectors.toSet())</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">collect(Collectors.toMap(...))</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">collect(Collectors.joining())</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">toList() — Java 16 간편 버전</text>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">toUnmodifiable... — Java 10</text>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">반환: Collection / Map / String</text>

  <!-- Category: reduce -->
  <rect x="320" y="66" width="240" height="186" fill="#0f2010" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">집계 (reduce)</text>
  <text x="340" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">reduce(identity, BinaryOp)    T</text>
  <text x="340" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">reduce(BinaryOp)     Optional&lt;T&gt;</text>
  <text x="340" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">count()              long</text>
  <text x="340" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">sum() / avg() / min() / max()</text>
  <text x="340" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IntStream 전용 통계 메서드</text>
  <text x="340" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">summaryStatistics() — 한 번에</text>
  <text x="340" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">반환: T / Optional / long / double</text>

  <!-- Category: find/match -->
  <rect x="580" y="66" width="240" height="186" fill="#201020" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">탐색 · 매칭</text>
  <text x="600" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">findFirst()    Optional&lt;T&gt;</text>
  <text x="600" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">findAny()      Optional&lt;T&gt;</text>
  <text x="600" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">anyMatch()     boolean</text>
  <text x="600" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">allMatch()     boolean</text>
  <text x="600" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">noneMatch()    boolean</text>
  <text x="600" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">min(comp)      Optional&lt;T&gt;</text>
  <text x="600" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">max(comp)      Optional&lt;T&gt;</text>

  <!-- Category: forEach / toArray -->
  <rect x="60" y="272" width="360" height="100" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">부수 효과 · 배열 변환</text>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">forEach(Consumer)         void — 순서 미보장(병렬)</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">forEachOrdered(Consumer)  void — 만남 순서 보장</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">toArray()                 Object[] / T[]</text>

  <!-- Category: iterator -->
  <rect x="440" y="272" width="380" height="100" fill="#1a1500" rx="8" stroke="#e0b555" stroke-width="1.5"/>
  <text x="630" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0b555">반복자 · 단락 평가 여부</text>
  <text x="460" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">iterator()     Iterator&lt;T&gt; (외부 반복 필요 시)</text>
  <text x="460" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">단락 평가 지원: find*, *Match, limit</text>
  <text x="460" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단락 없음: collect, reduce, forEach, count</text>

  <!-- Note: terminal triggers execution -->
  <rect x="60" y="390" width="760" height="74" fill="#0a0a14" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">종료 연산의 특성</text>
  <text x="80" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1. 파이프라인 실행을 트리거 — 종료 연산 없으면 중간 연산은 아무것도 실행되지 않음</text>
  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2. 스트림 소비 — 종료 연산 후 스트림 재사용 불가 (IllegalStateException)</text>
</svg>
