<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Combo — 데이터 바인딩 구조</text>

  <!-- Dataset box (source) -->
  <rect x="50" y="76" width="240" height="200" rx="8" fill="#0d1a30" stroke="#2050a0" stroke-width="1.5"/>
  <text x="170" y="102" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">Dataset (dsCode)</text>

  <!-- Dataset columns header -->
  <rect x="62" y="112" width="216" height="26" rx="4" fill="#1a2a40"/>
  <text x="116" y="130" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">CD</text>
  <text x="226" y="130" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">NM</text>

  <!-- Dataset rows -->
  <rect x="62" y="142" width="216" height="24" rx="2" fill="#111a28"/>
  <text x="116" y="159" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178">"01"</text>
  <text x="226" y="159" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">영업팀</text>

  <rect x="62" y="168" width="216" height="24" rx="2" fill="#0d1520"/>
  <text x="116" y="185" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178">"02"</text>
  <text x="226" y="185" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">개발팀</text>

  <rect x="62" y="194" width="216" height="24" rx="2" fill="#111a28"/>
  <text x="116" y="211" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178">"03"</text>
  <text x="226" y="211" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">기획팀</text>

  <rect x="62" y="218" width="216" height="24" rx="2" fill="#0d1520"/>
  <text x="116" y="235" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178">"04"</text>
  <text x="226" y="235" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">인사팀</text>

  <!-- Arrow from dataset to combo (arrow center y=176) -->
  <!-- shaft rect -->
  <rect x="300" y="172" width="80" height="10" rx="2" fill="#7777cc"/>
  <!-- arrowhead -->
  <polygon points="380,162 380,192 406,177" fill="#7777cc" stroke="#3a3a80" stroke-width="1"/>
  <!-- label (above arrow, diff = 172-156=16 >= 14) -->
  <text x="340" y="158" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc">innerdataset</text>

  <!-- Combo component box -->
  <rect x="416" y="96" width="244" height="160" rx="8" fill="#0d2030" stroke="#20608a" stroke-width="1.5"/>
  <text x="538" y="122" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">Combo (cmbDept)</text>

  <!-- Combo mock closed -->
  <rect x="432" y="132" width="212" height="34" rx="4" fill="#111a28" stroke="#2a4060"/>
  <text x="446" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">개발팀</text>
  <text x="628" y="155" text-anchor="end"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">▼</text>

  <!-- codecolumn / displaycolumn labels -->
  <text x="432" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">codecolumn:</text>
  <text x="530" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">"CD"</text>
  <text x="432" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">displaycolumn:</text>
  <text x="548" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">"NM"</text>
  <text x="432" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">value =</text>
  <text x="488" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ce9178">"02"</text>
  <text x="514" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">(코드 값)</text>

  <!-- Arrow from combo to binding target -->
  <rect x="670" y="172" width="70" height="10" rx="2" fill="#55c555"/>
  <polygon points="740,162 740,192 764,177" fill="#55c555" stroke="#256025" stroke-width="1"/>
  <text x="705" y="158" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">value</text>

  <!-- bindcolumn result box -->
  <rect x="774" y="116" width="66" height="60" rx="6" fill="#0a2010" stroke="#205020"/>
  <text x="807" y="140" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555">"02"</text>
  <text x="807" y="162" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">코드</text>

  <!-- Bottom: property descriptions -->
  <rect x="50" y="306" width="780" height="140" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="440" y="332" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">Combo 주요 속성 요약</text>

  <text x="72" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">innerdataset</text>
  <text x="200" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">→</text>
  <text x="216" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">데이터 소스 Dataset 지정</text>

  <text x="72" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">codecolumn</text>
  <text x="200" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">→</text>
  <text x="216" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">value에 저장할 컬럼 (코드)</text>

  <text x="72" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">displaycolumn</text>
  <text x="200" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">→</text>
  <text x="216" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">화면에 보여줄 컬럼 (명칭)</text>

  <text x="72" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#55c555">onchanged</text>
  <text x="200" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">→</text>
  <text x="216" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">선택 변경 시 obj.value = 코드값</text>

  <!-- Footer -->
</svg>
