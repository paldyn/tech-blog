<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MVP vs MVC — Nexacro N 적용 패턴</text>

  <!-- MVP Section -->
  <rect x="40" y="70" width="380" height="400" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">MVP 패턴</text>

  <!-- View -->
  <rect x="60" y="114" width="340" height="64" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="230" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">View (Form)</text>
  <text x="230" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">UI 컴포넌트만 배치 — 비즈니스 로직 없음</text>

  <line x1="230" y1="178" x2="230" y2="206" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Presenter -->
  <rect x="60" y="208" width="340" height="64" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Presenter (Script 파일)</text>
  <text x="230" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">View 이벤트 수신 → 비즈니스 판단 → Model 호출</text>

  <line x1="230" y1="272" x2="230" y2="300" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Model -->
  <rect x="60" y="302" width="340" height="64" rx="6" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="230" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Model (공통 라이브러리)</text>
  <text x="230" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 상태 · transaction() 호출</text>

  <!-- MVP characteristic -->
  <rect x="60" y="380" width="340" height="64" rx="6" fill="#0a1a00" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">★ View-Presenter 1:1 의존</text>
  <text x="230" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">테스트 용이 · 역할 명확 · 파일 증가</text>

  <!-- MVC Section -->
  <rect x="460" y="70" width="380" height="400" rx="10" fill="#14200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">MVC 패턴</text>

  <!-- View MVC -->
  <rect x="480" y="114" width="340" height="64" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">View (Form + 일부 Script)</text>
  <text x="650" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">UI + 간단한 이벤트 핸들러</text>

  <line x1="650" y1="178" x2="650" y2="206" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Controller MVC -->
  <rect x="480" y="208" width="340" height="64" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Controller (Form Script)</text>
  <text x="650" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이벤트 처리 + Model 업데이트 직접 수행</text>

  <line x1="650" y1="272" x2="650" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Model MVC -->
  <rect x="480" y="302" width="340" height="64" rx="6" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Model (Dataset + 서버)</text>
  <text x="650" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Dataset 상태 · transaction() 호출</text>

  <!-- MVC characteristic -->
  <rect x="480" y="380" width="340" height="64" rx="6" fill="#0a1a00" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">★ Controller가 View·Model 모두 접근</text>
  <text x="650" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">코드량 적음 · 소규모 Form에 적합</text>
</svg>
