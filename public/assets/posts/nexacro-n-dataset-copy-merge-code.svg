<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">copyData · appendData · mergeData 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">세 가지 Dataset 데이터 이동 API 실전 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="256" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="76" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// copyData — 대상을 완전히 덮어씀</text>
  <text xml:space="preserve" x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dsB.copyData(dsA);</text>
  <text xml:space="preserve" x="76" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// dsB = dsA의 완전한 사본</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// appendData — 뒤에 이어 붙임</text>
  <text xml:space="preserve" x="76" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dsB.appendData(dsA);</text>
  <text xml:space="preserve" x="76" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// dsB 기존 행 유지 + dsA 행 추가</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// mergeData — 키 기준 업서트</text>
  <text xml:space="preserve" x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dsB.mergeData(dsA, <tspan fill="#ce9178">"CODE"</tspan>);</text>
  <text xml:space="preserve" x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// CODE 일치 → UPDATE, 없으면 INSERT</text>
  <text xml:space="preserve" x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// rowType 자동 반영</text>

  <!-- Note -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">mergeData 후 transaction() 호출 시 UPDATE·INSERT 행이 서버로 정상 전송됩니다</text>
</svg>
