<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <defs>
    <marker id="pr_arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Protocol — 상속 없는 구조적 타이핑</text>

  <!-- Protocol box (center top) -->
  <rect x="330" y="76" width="220" height="74" rx="8" fill="#111418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="104" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="14.5" font-weight="600" fill="#7ec8e3" text-anchor="middle">class Drawable(Protocol)</text>
  <text x="440" y="130" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">def draw(self) -&gt; None</text>

  <!-- two conforming classes -->
  <rect x="100" y="210" width="280" height="60" rx="8" fill="#111418" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="236" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">class Circle: draw(self)</text>
  <text x="240" y="258" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12" fill="#aaaaaa" text-anchor="middle">Protocol 상속 안 함 — 그래도 일치</text>

  <rect x="500" y="210" width="280" height="60" rx="8" fill="#111418" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="236" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">class Button: draw(self)</text>
  <text x="640" y="258" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12" fill="#aaaaaa" text-anchor="middle">draw 메서드만 있으면 OK</text>

  <!-- arrows: classes satisfy protocol -->
  <line x1="240" y1="210" x2="400" y2="150" stroke="#55c555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#pr_arr)"/>
  <line x1="640" y1="210" x2="480" y2="150" stroke="#55c555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#pr_arr)"/>

  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#9aa4b8" text-anchor="middle">시그니처가 맞으면 자동으로 부합</text>
</svg>
