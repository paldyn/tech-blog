<svg width="880" height="450" viewBox="0 0 880 450"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">한국어 NLP 처리 파이프라인</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">교착어 구조 → 형태소 분석 → 표준 NLP 태스크</text>

  <!-- Raw input -->
  <rect x="60" y="88" width="760" height="44" rx="6" fill="#0f0f18" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="107" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">원시 텍스트</text>
  <text x="440" y="123" text-anchor="middle" fill="#e8e8e8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"삼성전자가 반도체 시장에서 선두를 유지하고 있다."</text>

  <!-- Arrow down -->
  <polygon points="440,140 430,140 430,156 420,156 440,174 460,156 450,156 450,140" fill="#7777cc"/>

  <!-- Tokenization -->
  <rect x="60" y="174" width="760" height="64" rx="6" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="196" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">형태소 분석 (Morphological Analysis)</text>
  <text x="440" y="214" text-anchor="middle" fill="#888" font-size="12">교착어 분해: 어근 + 접사 + 조사 + 어미</text>
  <text x="440" y="230" text-anchor="middle" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">삼성전자/NNP  가/JKS  반도체/NNG  시장/NNG  에서/JKB  선두/NNG  를/JKO  유지/NNG  하/XSV  고/EC  있/VX  다/EF  ./SF</text>

  <!-- Arrow -->
  <polygon points="440,246 430,246 430,258 420,258 440,276 460,258 450,258 450,246" fill="#555"/>

  <!-- Three downstream tasks -->
  <!-- POS -->
  <rect x="60" y="276" width="220" height="100" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="298" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">품사 태깅 (POS)</text>
  <text x="170" y="318" text-anchor="middle" fill="#888" font-size="11">NNP: 고유명사</text>
  <text x="170" y="334" text-anchor="middle" fill="#888" font-size="11">NNG: 일반명사</text>
  <text x="170" y="350" text-anchor="middle" fill="#888" font-size="11">JKS: 주격조사</text>
  <text x="170" y="366" text-anchor="middle" fill="#888" font-size="11">KoNLPy / Kiwi</text>

  <!-- NER -->
  <rect x="330" y="276" width="220" height="100" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="298" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">개체명 인식 (NER)</text>
  <text x="440" y="318" text-anchor="middle" fill="#888" font-size="11">삼성전자 → ORG</text>
  <text x="440" y="334" text-anchor="middle" fill="#888" font-size="11">반도체 → PRODUCT</text>
  <text x="440" y="350" text-anchor="middle" fill="#888" font-size="11">시장 → LOC/FIELD</text>
  <text x="440" y="366" text-anchor="middle" fill="#888" font-size="11">KLUE-NER / ETRI</text>

  <!-- Dependency -->
  <rect x="600" y="276" width="220" height="100" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="298" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">의존 구문 분석</text>
  <text x="710" y="318" text-anchor="middle" fill="#888" font-size="11">주어: 삼성전자가</text>
  <text x="710" y="334" text-anchor="middle" fill="#888" font-size="11">목적어: 선두를</text>
  <text x="710" y="350" text-anchor="middle" fill="#888" font-size="11">서술어: 유지하고 있다</text>
  <text x="710" y="366" text-anchor="middle" fill="#888" font-size="11">spaCy KO / HanNanum</text>

  <!-- Korean model ecosystem -->
  <text x="440" y="400" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">한국어 NLP 모델 생태계</text>

  <rect x="60" y="412" width="130" height="28" rx="5" fill="#0f0f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="125" y="430" text-anchor="middle" fill="#7777cc" font-size="11">KLUE-BERT/RoBERTa</text>

  <rect x="202" y="412" width="100" height="28" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="252" y="430" text-anchor="middle" fill="#55c555" font-size="11">KoELECTRA</text>

  <rect x="314" y="412" width="100" height="28" rx="5" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="364" y="430" text-anchor="middle" fill="#7ec8e3" font-size="11">KoBERT (SKT)</text>

  <rect x="426" y="412" width="110" height="28" rx="5" fill="#1a1a0f" stroke="#e8c84e" stroke-width="1"/>
  <text x="481" y="430" text-anchor="middle" fill="#e8c84e" font-size="11">HyperCLOVA X</text>

  <rect x="548" y="412" width="100" height="28" rx="5" fill="#1a0f1a" stroke="#b577cc" stroke-width="1"/>
  <text x="598" y="430" text-anchor="middle" fill="#b577cc" font-size="11">EXAONE (LG)</text>

  <rect x="660" y="412" width="160" height="28" rx="5" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="430" text-anchor="middle" fill="#e05555" font-size="11">Qwen / LLaMA KO 파인튜닝</text>
</svg>
