<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <rect x="0" y="0" width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="68" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="56" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">K-평균 알고리즘: 반복 수렴 과정</text>
  <text x="60" y="60" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">초기화 → 할당 → 갱신 → 수렴까지의 3단계 시각화 (K=2)</text>

  <!-- ===== Step Labels ===== -->
  <text x="136" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">① 초기화</text>
  <text x="396" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">② 할당 + 갱신</text>
  <text x="666" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">③ 수렴</text>

  <!-- ===== PANEL 1: Initialization ===== -->
  <rect x="60" y="105" width="152" height="200" rx="8" fill="#0d1520" stroke="#1e2433" stroke-width="1.5"/>
  <!-- Data points (ungrouped, grey) -->
  <circle cx="95"  cy="145" r="6" fill="#444"/>
  <circle cx="110" cy="168" r="6" fill="#444"/>
  <circle cx="88"  cy="190" r="6" fill="#444"/>
  <circle cx="105" cy="210" r="6" fill="#444"/>
  <circle cx="78"  cy="225" r="6" fill="#444"/>
  <circle cx="148" cy="140" r="6" fill="#444"/>
  <circle cx="170" cy="155" r="6" fill="#444"/>
  <circle cx="162" cy="178" r="6" fill="#444"/>
  <circle cx="180" cy="195" r="6" fill="#444"/>
  <circle cx="155" cy="218" r="6" fill="#444"/>
  <circle cx="130" cy="265" r="6" fill="#444"/>
  <circle cx="115" cy="248" r="6" fill="#444"/>
  <circle cx="143" cy="250" r="6" fill="#444"/>
  <!-- Initial centroids (stars / large markers) -->
  <polygon points="100,132 104,143 116,143 107,150 110,162 100,155 90,162 93,150 84,143 96,143" fill="#7777cc" opacity="0.9"/>
  <polygon points="175,230 179,241 191,241 182,248 185,260 175,253 165,260 168,248 159,241 171,241" fill="#7ec8e3" opacity="0.9"/>
  <text x="136" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">무작위 중심점 2개 배치</text>
  <text x="100" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7777cc">μ₁</text>
  <text x="178" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7ec8e3">μ₂</text>

  <!-- Arrow 1→2 -->
  <line x1="216" y1="205" x2="260" y2="205" stroke="#555" stroke-width="2"/>
  <polygon points="260,199 274,205 260,211" fill="#555"/>

  <!-- ===== PANEL 2: Assign + Update ===== -->
  <rect x="272" y="105" width="248" height="200" rx="8" fill="#0d1520" stroke="#1e2433" stroke-width="1.5"/>
  <!-- Cluster 1 points (purple) -->
  <circle cx="307"  cy="145" r="6" fill="#7777cc" opacity="0.8"/>
  <circle cx="322" cy="168" r="6" fill="#7777cc" opacity="0.8"/>
  <circle cx="300"  cy="190" r="6" fill="#7777cc" opacity="0.8"/>
  <circle cx="317" cy="210" r="6" fill="#7777cc" opacity="0.8"/>
  <circle cx="290"  cy="225" r="6" fill="#7777cc" opacity="0.8"/>
  <!-- Cluster 2 points (blue) -->
  <circle cx="360" cy="140" r="6" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="382" cy="155" r="6" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="374" cy="178" r="6" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="392" cy="195" r="6" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="367" cy="218" r="6" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="342" cy="265" r="6" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="327" cy="248" r="6" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="355" cy="250" r="6" fill="#7ec8e3" opacity="0.8"/>
  <!-- New centroids (recalculated) -->
  <polygon points="307,200 311,211 323,211 314,218 317,230 307,223 297,230 300,218 291,211 303,211" fill="#7777cc"/>
  <polygon points="368,208 372,219 384,219 375,226 378,238 368,231 358,238 361,226 352,219 364,219" fill="#7ec8e3"/>
  <text x="307" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="8" fill="#fff" text-anchor="middle">μ₁</text>
  <text x="368" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="8" fill="#fff" text-anchor="middle">μ₂</text>
  <!-- Connecting lines (membership) -->
  <line x1="307" y1="145" x2="307" y2="200" stroke="#7777cc" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="360" y1="140" x2="368" y2="208" stroke="#7ec8e3" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="396" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">색 할당 후 중심점 재계산</text>

  <!-- Arrow 2→3 -->
  <line x1="524" y1="205" x2="568" y2="205" stroke="#555" stroke-width="2"/>
  <polygon points="568,199 582,205 568,211" fill="#555"/>

  <!-- ===== PANEL 3: Converged ===== -->
  <rect x="580" y="105" width="240" height="200" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="2"/>
  <!-- Cluster 1 final (purple) -->
  <circle cx="610"  cy="142" r="7" fill="#7777cc" opacity="0.9"/>
  <circle cx="626" cy="165" r="7" fill="#7777cc" opacity="0.9"/>
  <circle cx="602"  cy="188" r="7" fill="#7777cc" opacity="0.9"/>
  <circle cx="620" cy="208" r="7" fill="#7777cc" opacity="0.9"/>
  <circle cx="594"  cy="222" r="7" fill="#7777cc" opacity="0.9"/>
  <!-- Cluster 2 final (teal) -->
  <circle cx="680" cy="138" r="7" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="702" cy="152" r="7" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="694" cy="175" r="7" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="712" cy="192" r="7" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="687" cy="215" r="7" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="740" cy="255" r="7" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="720" cy="240" r="7" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="750" cy="240" r="7" fill="#7ec8e3" opacity="0.9"/>
  <!-- Final centroids (solid stars) -->
  <polygon points="610,182 614,192 626,192 617,198 620,210 610,204 600,210 603,198 594,192 606,192" fill="#7777cc"/>
  <circle cx="706" cy="198" r="10" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="706" cy="198" r="5" fill="#7ec8e3"/>
  <!-- Cluster boundaries (ellipses) -->
  <ellipse cx="612" cy="185" rx="46" ry="60" fill="none" stroke="#7777cc" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.6"/>
  <ellipse cx="705" cy="198" rx="62" ry="72" fill="none" stroke="#7ec8e3" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="700" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">중심점 이동 없음 → 수렴!</text>

  <!-- Iteration flow label -->
  <rect x="60" y="320" width="760" height="2" rx="0" fill="#1e2433"/>

  <!-- Bottom explanation -->
  <rect x="60" y="334" width="232" height="54" rx="6" fill="#0e1420"/>
  <text x="176" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">할당 단계</text>
  <text x="176" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">각 점 → 가장 가까운 중심점</text>
  <text x="176" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">거리 기준: 유클리드</text>

  <rect x="308" y="334" width="264" height="54" rx="6" fill="#0e1420"/>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">갱신 단계</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중심점 = 클러스터 내 평균 좌표</text>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">μ = (1/|Cₖ|) Σ xᵢ</text>

  <rect x="588" y="334" width="232" height="54" rx="6" fill="#0e1420"/>
  <text x="704" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">수렴 조건</text>
  <text x="704" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중심점 이동 &lt; tol (1e-4)</text>
  <text x="704" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">또는 max_iter 도달</text>

  <!-- Footer -->
  <text x="60" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">K-means++는 초기 중심점을 서로 멀리 배치하여 수렴 속도와 품질을 모두 향상시킨다 — PALDYN AI 완전 정복</text>
</svg>
