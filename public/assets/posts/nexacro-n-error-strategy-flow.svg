<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">에러 처리 흐름</text>

  <!-- Start box -->
  <rect x="340" y="62" width="200" height="44" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="89" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">트랜잭션 실행</text>

  <!-- Arrow down -->
  <line x1="440" y1="106" x2="440" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Error? diamond -->
  <polygon points="440,132 520,164 440,196 360,164" fill="#1e1505" stroke="#e0a030" stroke-width="1.5"/>
  <text x="440" y="169" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e0a030">에러 발생?</text>

  <!-- No: right arrow to Success -->
  <line x1="520" y1="164" x2="700" y2="164" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="608" y="156" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">정상</text>
  <rect x="700" y="144" width="120" height="40" rx="6" fill="#0d2b1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="760" y="169" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">처리 완료</text>

  <!-- Yes: down arrow -->
  <line x1="440" y1="196" x2="440" y2="228" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="452" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">에러</text>

  <!-- errCode check diamond -->
  <polygon points="440,230 520,262 440,294 360,262" fill="#1e0505" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="267" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">코드 분류</text>

  <!-- Warn branch (left) -->
  <line x1="360" y1="262" x2="200" y2="262" stroke="#e0a030" stroke-width="2" marker-end="url(#arr)"/>
  <text x="278" y="254" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e0a030">경고</text>
  <rect x="60" y="242" width="140" height="40" rx="6" fill="#241a05" stroke="#e0a030" stroke-width="1.5"/>
  <text x="130" y="267" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e0a030">Alert 표시</text>

  <!-- Fatal branch (right) -->
  <line x1="520" y1="262" x2="680" y2="262" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="598" y="254" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">치명</text>
  <rect x="680" y="242" width="140" height="40" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="750" y="267" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e05555">화면 이동·로그</text>

  <!-- Down arrow from diamond to logging -->
  <line x1="440" y1="294" x2="440" y2="328" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Logging box -->
  <rect x="330" y="330" width="220" height="44" rx="6" fill="#1a1435" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="348" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc">에러 로그 기록</text>
  <text x="440" y="366" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">trace.log / 서버 전송</text>

  <!-- Down to end -->
  <line x1="440" y1="374" x2="440" y2="408" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="330" y="410" width="220" height="20" rx="4" fill="#1a1a1a" stroke="#444"/>
  <text x="440" y="424" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">종료 또는 재시도</text>
</svg>
