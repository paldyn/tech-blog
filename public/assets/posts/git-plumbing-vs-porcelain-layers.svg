<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Plumbing vs Porcelain 계층 구조</text>

  <!-- User layer -->
  <rect x="60" y="70" width="760" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">사용자 (User)</text>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">git add / git commit / git push / git log / git status ...</text>

  <!-- Porcelain layer -->
  <rect x="60" y="150" width="760" height="90" rx="8" fill="#111122" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Porcelain (고수준 명령)</text>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사람 친화적 출력 | 여러 plumbing 조합 | 색상·페이징·diff</text>
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">add · commit · push · pull · merge · rebase · log · status · diff</text>

  <!-- Plumbing layer -->
  <rect x="60" y="260" width="760" height="90" rx="8" fill="#111111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Plumbing (저수준 명령)</text>
  <text x="440" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">스크립트 친화적 | 안정적 출력 형식 | 단일 책임</text>
  <text x="440" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">cat-file · hash-object · update-ref · rev-parse · ls-files · write-tree</text>

  <!-- Object store layer -->
  <rect x="60" y="370" width="760" height="60" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#888">Object Store / Refs</text>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">.git/objects/ · .git/refs/ · .git/packed-refs · .git/index</text>

  <!-- Down arrows -->
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#888">↓</text>
  <text x="440" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#888">↓</text>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#888">↓</text>

  <!-- Note -->
  <text x="440" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">Porcelain은 내부적으로 Plumbing을 호출 | 스크립트에서는 Plumbing이 더 안정적</text>
</svg>
