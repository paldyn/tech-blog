<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">논리 복제 vs 물리(스트리밍) 복제</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">행 단위 변경 스트림으로 테이블 선택 복제</text>

  <!-- Physical replication -->
  <rect x="60" y="100" width="340" height="240" fill="#111827" rx="8" stroke="#888" stroke-width="1.5"/>
  <text x="230" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888">물리(스트리밍) 복제</text>

  <rect x="80" y="140" width="300" height="28" fill="#0f1724" rx="5"/>
  <text x="230" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">WAL 바이트 그대로 전송</text>
  <rect x="80" y="176" width="300" height="28" fill="#0f1724" rx="5"/>
  <text x="230" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB 전체 복제 (테이블 선택 불가)</text>
  <rect x="80" y="212" width="300" height="28" fill="#0f1724" rx="5"/>
  <text x="230" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">버전 동일해야 함</text>
  <rect x="80" y="248" width="300" height="28" fill="#0f1724" rx="5"/>
  <text x="230" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HA/Failover에 최적화</text>
  <rect x="80" y="284" width="300" height="28" fill="#0f1724" rx="5" stroke="#55c555"/>
  <text x="230" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">낮은 지연, 단순 설정</text>

  <!-- Logical replication -->
  <rect x="480" y="100" width="340" height="240" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">논리 복제 (Logical Replication)</text>

  <rect x="500" y="140" width="300" height="28" fill="#0f1724" rx="5" stroke="#7ec8e3"/>
  <text x="650" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">행 변경 이벤트(INSERT/UPDATE/DELETE)</text>
  <rect x="500" y="176" width="300" height="28" fill="#0f1724" rx="5" stroke="#7ec8e3"/>
  <text x="650" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">테이블 단위 선택 복제 가능</text>
  <rect x="500" y="212" width="300" height="28" fill="#0f1724" rx="5" stroke="#7ec8e3"/>
  <text x="650" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">크로스 버전 복제 (업그레이드 활용)</text>
  <rect x="500" y="248" width="300" height="28" fill="#0f1724" rx="5" stroke="#7ec8e3"/>
  <text x="650" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">구독자에 다른 테이블 존재 허용</text>
  <rect x="500" y="284" width="300" height="28" fill="#0f1724" rx="5" stroke="#7777cc"/>
  <text x="650" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">DDL 자동 복제 안 됨, 설정 복잡</text>

  <!-- Publication → Subscription flow -->
  <rect x="60" y="370" width="200" height="70" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Publication</text>
  <text x="160" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">게시자(Publisher)가</text>
  <text x="160" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">테이블 변경을 발행</text>

  <line x1="260" y1="405" x2="380" y2="405" stroke="#7ec8e3" stroke-width="2.5"/>
  <polygon points="380,405 364,397 364,413" fill="#7ec8e3"/>
  <text x="320" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">WAL 디코딩</text>
  <text x="320" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">논리 디코딩</text>

  <rect x="380" y="370" width="200" height="70" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Subscription</text>
  <text x="480" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구독자(Subscriber)가</text>
  <text x="480" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">변경을 수신·적용</text>

  <line x1="580" y1="405" x2="700" y2="405" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="700" y="370" width="120" height="70" fill="#111827" rx="8" stroke="#888"/>
  <text x="760" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다른 버전</text>
  <text x="760" y="417" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB 가능</text>
</svg>
