<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">쿼리 파싱 단계 상세</text>

  <!-- SQL string input -->
  <rect x="60" y="74" width="760" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="92" text-anchor="middle" font-size="11" fill="#888" font-family="'JetBrains Mono','Menlo',monospace">입력 SQL</text>
  <text x="440" y="108" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace">SELECT id, name FROM employees WHERE dept_id = 10</text>

  <defs>
    <marker id="da" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Step 1: Lexer -->
  <line x1="440" y1="118" x2="440" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#da)"/>
  <rect x="160" y="140" width="560" height="60" fill="#0f1320" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="440" y="163" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">① 렉서(Lexer) — 토큰 분리</text>
  <text x="440" y="183" text-anchor="middle" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff">[SELECT] [id] [,] [name] [FROM] [employees] [WHERE] [dept_id] [=] [10]</text>

  <!-- Step 2: Parser -->
  <line x1="440" y1="200" x2="440" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#da)"/>
  <rect x="160" y="220" width="560" height="56" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="440" y="243" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">② 파서(Parser) — 파스 트리(AST) 생성</text>
  <text x="440" y="264" text-anchor="middle" font-size="11" fill="#888">SELECT[target: id, name] FROM[table: employees] WHERE[dept_id = 10]</text>

  <!-- Step 3: Semantic Analysis -->
  <line x1="440" y1="276" x2="440" y2="294" stroke="#7ec8e3" stroke-width="2" marker-end="url(#da)"/>
  <rect x="160" y="296" width="560" height="56" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="440" y="319" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">③ 의미 분석 — 카탈로그 조회</text>
  <text x="440" y="338" text-anchor="middle" font-size="11" fill="#888">테이블 존재 확인 / 컬럼 타입 검증 / 권한 확인</text>

  <!-- Step 4: Query Tree -->
  <line x1="440" y1="352" x2="440" y2="370" stroke="#7ec8e3" stroke-width="2" marker-end="url(#da)"/>
  <rect x="160" y="372" width="560" height="56" fill="#0f1320" stroke="#ce9178" stroke-width="1.5" rx="6"/>
  <text x="440" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">④ 쿼리 트리 → 옵티마이저로 전달</text>
  <text x="440" y="414" text-anchor="middle" font-size="11" fill="#888">논리 실행 계획 수립 후 최적 물리 계획 선택 (인덱스, 조인 순서)</text>
</svg>
