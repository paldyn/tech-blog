<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Taints와 Tolerations — 오염과 내성</text>

  <!-- Node with taint -->
  <rect x="60" y="80" width="240" height="340" rx="10" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <rect x="60" y="80" width="240" height="44" rx="10" fill="#e05555"/>
  <rect x="60" y="104" width="240" height="20" fill="#e05555"/>
  <text x="180" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Node (GPU)</text>
  <text x="180" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Taint 적용:</text>
  <rect x="76" y="158" width="208" height="36" rx="4" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="180" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">gpu=true:NoSchedule</text>

  <!-- Pod A - No toleration - rejected -->
  <rect x="80" y="215" width="180" height="60" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="170" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">Pod A</text>
  <text x="170" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">toleration 없음 → 거부</text>
  <text x="170" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555" text-anchor="middle">✗</text>

  <!-- Pod B - Has toleration - allowed -->
  <rect x="80" y="315" width="180" height="80" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Pod B (GPU 워크로드)</text>
  <text x="170" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">toleration 있음</text>
  <text x="170" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178" text-anchor="middle">gpu=true:NoSchedule</text>
  <text x="170" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555" text-anchor="middle">✓</text>

  <!-- Effect types -->
  <rect x="340" y="80" width="500" height="340" rx="10" fill="#0f0f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="590" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Taint Effect 종류</text>

  <rect x="360" y="120" width="460" height="90" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="370" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">NoSchedule</text>
  <text x="370" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">toleration 없는 Pod는 이 노드에 새로 스케줄되지 않음</text>
  <text x="370" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">기존 실행 중인 Pod는 영향받지 않음</text>
  <text x="370" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">예: GPU 노드 전용 예약, 특수 하드웨어 노드</text>

  <rect x="360" y="226" width="460" height="90" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="370" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">PreferNoSchedule</text>
  <text x="370" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">toleration 없는 Pod를 가능하면 피함 (Soft)</text>
  <text x="370" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">다른 노드가 없으면 이 노드에도 스케줄 가능</text>
  <text x="370" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">예: 절약 모드, 스팟 인스턴스 우선 회피</text>

  <rect x="360" y="332" width="460" height="72" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="370" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">NoExecute</text>
  <text x="370" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">새 스케줄 거부 + 기존 Pod도 즉시 축출(Evict)</text>
  <text x="370" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">tolerationSeconds로 유예 시간 설정 가능</text>

  <!-- Bottom label -->
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Taint = 노드가 Pod를 밀어내는 힘 / Toleration = Pod가 Taint를 참는 능력</text>
</svg>
