  <!-- 2 not yet -->
  <rect x="80" y="458" width="340" height="32" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <circle cx="100" cy="474" r="6" fill="#e05555"/>
  <text x="120" y="479" class="mono" font-size="11" fill="#aaa">erd_tag</text>
