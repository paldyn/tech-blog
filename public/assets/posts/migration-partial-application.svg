    <text x="120" y="199" class="mono" font-size="11" fill="#aaa">erd_project</text>
    <text x="404" y="199" text-anchor="end" font-size="10" fill="#55c555">commit ✓</text>

    <rect x="80" y="218" width="340" height="32" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
    <circle cx="100" cy="234" r="6" fill="#55c555"/>
    <text x="120" y="239" class="mono" font-size="11" fill="#aaa">erd_project_member</text>
    <text x="404" y="239" text-anchor="end" font-size="10" fill="#55c555">commit ✓</text>

    <rect x="80" y="258" width="340" height="32" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
    <circle cx="100" cy="274" r="6" fill="#55c555"/>
    <text x="120" y="279" class="mono" font-size="11" fill="#aaa">erd_business_unit</text>
