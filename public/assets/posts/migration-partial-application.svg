  <text x="498" y="268" class="mono" font-size="10" fill="#aaa">Statement: ALTER TABLE erd_relation</text>
  <text x="498" y="282" class="mono" font-size="10" fill="#aaa">           ADD COLUMN project_code ...</text>

  <!-- Right: idempotent fix -->
  <rect x="470" y="320" width="350" height="230" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="490" y="348" font-size="14" font-weight="700" fill="#55c555">fix — IF NOT EXISTS 한 줄</text>
  <text x="490" y="368" font-size="11" fill="#888">이미 적용된 컬럼은 skip, 누락만 마저 적용</text>
  <line x1="490" y1="380" x2="800" y2="380" stroke="#222"/>

  <rect x="490" y="394" width="310" height="80" rx="4" fill="#000" stroke="#222"/>
  <text x="498" y="412" class="mono" font-size="10" fill="#7ec8e3">ALTER TABLE erd_relation</text>
  <text x="498" y="428" class="mono" font-size="10" fill="#55c555">  ADD COLUMN IF NOT EXISTS</text>
  <text x="498" y="444" class="mono" font-size="10" fill="#aaa">  project_code VARCHAR(100)</text>
  <text x="498" y="460" class="mono" font-size="10" fill="#aaa">  NOT NULL DEFAULT 'mebrix';</text>

  <text x="490" y="498" font-size="11" fill="#aaa">+ 운영 회복 가이드:</text>
  <text x="498" y="516" class="mono" font-size="10" fill="#888">DELETE FROM flyway_schema_history</text>
  <text x="498" y="530" class="mono" font-size="10" fill="#888"> WHERE version='13' AND success=false;</text>

  <text x="440" y="582" text-anchor="middle" font-size="11" fill="#444">PALDYN · V13 부분 적용 사건</text>
</svg>
