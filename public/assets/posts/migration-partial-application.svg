    <circle cx="100" cy="354" r="6" fill="#55c555"/>
    <text x="120" y="359" class="mono" font-size="11" fill="#aaa">erd_table</text>
    <text x="404" y="359" text-anchor="end" font-size="10" fill="#55c555">commit ✓</text>

    <rect x="80" y="378" width="340" height="32" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
    <circle cx="100" cy="394" r="6" fill="#55c555"/>
    <text x="120" y="399" class="mono" font-size="11" fill="#aaa">erd_column</text>
