  <rect x="470" y="100" width="350" height="200" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="490" y="128" font-size="14" font-weight="700" fill="#e05555">두 번째 시도 — 즉시 실패</text>
  <text x="490" y="148" font-size="11" fill="#888">Spring Boot 부팅 → V13 재실행</text>
  <line x1="490" y1="160" x2="800" y2="160" stroke="#222"/>

  <rect x="490" y="174" width="310" height="110" rx="4" fill="#000" stroke="#222"/>
  <text x="498" y="192" class="mono" font-size="10" fill="#e05555">SQL State: 42701</text>
  <text x="498" y="208" class="mono" font-size="10" fill="#aaa">Message  : column "project_code"</text>
  <text x="498" y="222" class="mono" font-size="10" fill="#aaa">           of relation "erd_relation"</text>
  <text x="498" y="236" class="mono" font-size="10" fill="#aaa">           already exists</text>
