    <rect x="80" y="298" width="340" height="32" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
    <circle cx="100" cy="314" r="6" fill="#55c555"/>
    <text x="120" y="319" class="mono" font-size="11" fill="#aaa">erd_diagram</text>
