  <rect x="80" y="498" width="340" height="32" rx="4" fill="#1a0f0f" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="100" cy="514" r="6" fill="#444"/>
  <text x="120" y="519" class="mono" font-size="11" fill="#666">erd_project_system_column_default</text>
