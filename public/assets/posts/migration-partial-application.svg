<svg xmlns="http://www.w3.org/2000/svg" width="880" height="600" viewBox="0 0 880 600">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    .mono { font-family: 'JetBrains Mono','Menlo',monospace; }</style>
  </defs>
  <rect width="880" height="600" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">V13 부분 적용 사건 — 9개 ALTER 가 도중에 멈췄을 때</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">한 번에 commit 되어야 하는 트랜잭션이 어딘가에서 끊겼다</text>

  <!-- 9 ALTER table column -->
  <rect x="60" y="100" width="380" height="450" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="250" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#e8e8e8">V13__add_project_code.sql</text>
  <text x="250" y="148" text-anchor="middle" font-size="11" fill="#888">9개 ALTER TABLE — 첫 시도 결과</text>
  <line x1="80" y1="160" x2="420" y2="160" stroke="#222"/>

  <!-- 7 succeeded -->
  <g>
    <rect x="80" y="178" width="340" height="32" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
