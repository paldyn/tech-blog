<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker Compose vs Kubernetes</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">도구 선택의 기준: 규모와 운영 요구사항</text>

  <!-- Header row -->
  <rect x="60" y="100" width="340" height="44" rx="6" fill="#1565c0" stroke="#1976d2" stroke-width="1"/>
  <text x="230" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Docker Compose</text>
  <rect x="480" y="100" width="340" height="44" rx="6" fill="#1a237e" stroke="#3949ab" stroke-width="1"/>
  <text x="650" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Kubernetes</text>

  <!-- Row labels -->
  <text x="60" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">운영 환경</text>
  <text x="230" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">단일 호스트</text>
  <text x="650" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">멀티 노드 클러스터</text>
  <line x1="60" y1="178" x2="820" y2="178" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">HA / 자가 치유</text>
  <text x="230" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">&#x2717; 없음</text>
  <text x="650" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">&#x2713; 자동 재시작·이전</text>
  <line x1="60" y1="214" x2="820" y2="214" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">자동 스케일링</text>
  <text x="230" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">&#x2717; 수동</text>
  <text x="650" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">&#x2713; HPA / KEDA</text>
  <line x1="60" y1="250" x2="820" y2="250" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">롤링 업데이트</text>
  <text x="230" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">&#x2717; 없음 (재시작 필요)</text>
  <text x="650" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">&#x2713; 무중단 배포</text>
  <line x1="60" y1="286" x2="820" y2="286" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">학습 곡선</text>
  <text x="230" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">낮음 (하루면 충분)</text>
  <text x="650" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">높음 (수주~수개월)</text>
  <line x1="60" y1="322" x2="820" y2="322" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">로컬 개발</text>
  <text x="230" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">최적</text>
  <text x="650" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">minikube / kind 로 가능</text>
  <line x1="60" y1="358" x2="820" y2="358" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">적합한 규모</text>
  <text x="230" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">1~10개 서비스</text>
  <text x="650" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">10개+ 서비스, 프로덕션</text>

  <!-- Divider -->
  <line x1="420" y1="100" x2="420" y2="420" stroke="#374151" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Recommendation -->
  <rect x="60" y="410" width="760" height="60" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">&#x1F4A1; 판단 기준: 프로덕션에서 고가용성과 자동 스케일링이 필요하면 Kubernetes,</text>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">로컬 개발 환경이거나 단일 서버 배포면 Docker Compose가 더 단순하다.</text>
</svg>
