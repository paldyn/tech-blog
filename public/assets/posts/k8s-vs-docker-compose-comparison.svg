<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Kubernetes vs Docker Compose</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">목적과 규모에 따른 선택 기준</text>

  <!-- Headers -->
  <rect x="60" y="90" width="360" height="48" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">Docker Compose</text>

  <rect x="460" y="90" width="360" height="48" rx="8" fill="#0f0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">Kubernetes</text>

  <!-- Row 1: Purpose -->
  <rect x="60" y="155" width="360" height="50" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="240" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">단일 호스트 개발/테스트</text>
  <text x="240" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">로컬 개발, 간단한 스테이징</text>

  <rect x="460" y="155" width="360" height="50" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="640" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">멀티 노드 프로덕션 클러스터</text>
  <text x="640" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">고가용성, 수평 확장</text>

  <!-- Row 2: Config -->
  <rect x="60" y="218" width="360" height="50" rx="4" fill="#0d0d15" stroke="#222" stroke-width="1"/>
  <text x="240" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">compose.yml 1개 파일</text>
  <text x="240" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">services · volumes · networks</text>

  <rect x="460" y="218" width="360" height="50" rx="4" fill="#0d0d15" stroke="#222" stroke-width="1"/>
  <text x="640" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">다수의 YAML 리소스</text>
  <text x="640" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Pod, Deployment, Service, Ingress...</text>

  <!-- Row 3: Scaling -->
  <rect x="60" y="281" width="360" height="50" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="240" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">수동 replicas 지정</text>
  <text x="240" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">같은 호스트 내 복제</text>

  <rect x="460" y="281" width="360" height="50" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="640" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">자동 스케일링 (HPA)</text>
  <text x="640" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">멀티 노드 분산 배포</text>

  <!-- Row 4: Learning -->
  <rect x="60" y="344" width="360" height="50" rx="4" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">진입 장벽 낮음</text>
  <text x="240" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">5분이면 시작 가능</text>

  <rect x="460" y="344" width="360" height="50" rx="4" fill="#200d0d" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">가파른 학습 곡선</text>
  <text x="640" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">많은 개념 학습 필요</text>

  <!-- Row labels -->
  <text x="430" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">목적</text>
  <text x="430" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">설정</text>
  <text x="430" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">스케일</text>
  <text x="430" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">난이도</text>

  <!-- Bottom recommendation -->
  <rect x="60" y="415" width="760" height="60" rx="8" fill="#0f0f0f" stroke="#444" stroke-width="1"/>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">추천 전략: 로컬 개발 → Compose / 프로덕션 배포 → Kubernetes</text>
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Compose로 개발하고 K8s로 배포하는 패턴이 가장 일반적</text>
</svg>
