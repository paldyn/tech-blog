<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">함수(FUNCTION) vs 프로시저(PROCEDURE)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">PostgreSQL 11+에서 추가된 PROCEDURE의 핵심 차이</text>

  <!-- FUNCTION column -->
  <rect x="60" y="90" width="340" height="340" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">FUNCTION</text>

  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">호출 방식</text>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SELECT, 표현식 내 직접 사용 가능</text>

  <line x1="80" y1="180" x2="380" y2="180" stroke="#2a2a3e" stroke-width="1"/>
  <text x="80" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">반환값</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RETURNS 절로 반드시 값 반환</text>

  <line x1="80" y1="232" x2="380" y2="232" stroke="#2a2a3e" stroke-width="1"/>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">트랜잭션 제어</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">COMMIT / ROLLBACK 불가</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">호출자 트랜잭션에 종속</text>

  <line x1="80" y1="302" x2="380" y2="302" stroke="#2a2a3e" stroke-width="1"/>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">OUT 파라미터</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">지원 (복수 값 반환)</text>

  <line x1="80" y1="354" x2="380" y2="354" stroke="#2a2a3e" stroke-width="1"/>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">트리거 함수로 사용</text>
  <text x="80" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능 (RETURNS trigger)</text>

  <!-- PROCEDURE column -->
  <rect x="480" y="90" width="340" height="340" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">PROCEDURE</text>

  <text x="500" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">호출 방식</text>
  <text x="500" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CALL 문으로만 호출</text>

  <line x1="500" y1="180" x2="800" y2="180" stroke="#1a2e1a" stroke-width="1" style="stroke:#253525"/>
  <text x="500" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">반환값</text>
  <text x="500" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">없음 (INOUT 파라미터로 출력)</text>

  <line x1="500" y1="232" x2="800" y2="232" stroke="#253525" stroke-width="1"/>
  <text x="500" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">트랜잭션 제어</text>
  <text x="500" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">COMMIT / ROLLBACK 가능</text>
  <text x="500" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">배치 처리·분할 커밋에 적합</text>

  <line x1="500" y1="302" x2="800" y2="302" stroke="#253525" stroke-width="1"/>
  <text x="500" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">OUT 파라미터</text>
  <text x="500" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">INOUT 파라미터로 지원</text>

  <line x1="500" y1="354" x2="800" y2="354" stroke="#253525" stroke-width="1"/>
  <text x="500" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">트리거 함수로 사용</text>
  <text x="500" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">불가</text>

  <!-- VS divider -->
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#888" text-anchor="middle">VS</text>

  <!-- Bottom hint -->
  <text x="440" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">PostgreSQL 11 (2018)부터 PROCEDURE 지원 — ANSI SQL 표준 준수</text>
</svg>
