<svg width="880" height="420" viewBox="0 0 880 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <defs>
    <style>
      .t-title { fill: #e8e8e8; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 22px; font-weight: 700; }
      .t-label { fill: #888; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 12px; }
      .t-cat   { fill: #e8e8e8; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 13px; font-weight: 700; }
      .t-item  { fill: #aaa; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 11px; }
      .t-code  { fill: #6ee7b7; font-family: "JetBrains Mono", monospace; font-size: 10px; }
      .t-blue  { fill: #93c5fd; font-family: "JetBrains Mono", monospace; font-size: 10px; }
      .t-rose  { fill: #fda4af; font-family: "JetBrains Mono", monospace; font-size: 10px; }
      .t-center { text-anchor: middle; }
    </style>
    <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#555"/>
    </marker>
  </defs>

  <text x="36" y="46" class="t-title">Nexacro N — 컴포넌트 구성 요소</text>
  <text x="36" y="66" class="t-label">모든 컴포넌트는 속성(Property) · 메서드(Method) · 이벤트(Event) 세 요소로 이루어집니다</text>

  <!-- Center component box -->
  <rect x="320" y="110" width="240" height="80" rx="12" fill="#1a1a2e" stroke="#4f46e5" stroke-width="2"/>
  <text x="440" y="148" class="t-cat t-center">Edit 컴포넌트</text>
  <text x="440" y="170" class="t-label t-center">edt_userid</text>

  <!-- Left: Properties -->
  <rect x="36" y="88" width="230" height="240" rx="10" fill="#0f1117" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="36" y="88" width="230" height="30" rx="10" fill="#1e3a5f"/>
  <text x="52" y="109" class="t-cat">속성 (Property)</text>
  <text x="52" y="138" class="t-code">value</text>
  <text x="120" y="138" class="t-item">현재 입력 값</text>
  <text x="52" y="156" class="t-code">text</text>
  <text x="120" y="156" class="t-item">표시 텍스트</text>
  <text x="52" y="174" class="t-code">enable</text>
  <text x="120" y="174" class="t-item">활성화 여부</text>
  <text x="52" y="192" class="t-code">visible</text>
  <text x="120" y="192" class="t-item">표시 여부</text>
  <text x="52" y="210" class="t-code">left / top</text>
  <text x="120" y="210" class="t-item">위치 좌표</text>
  <text x="52" y="228" class="t-code">width / height</text>
  <text x="120" y="228" class="t-item">크기</text>
  <text x="52" y="246" class="t-code">cssclass</text>
  <text x="120" y="246" class="t-item">스타일 클래스</text>
  <text x="52" y="264" class="t-code">maxlength</text>
  <text x="120" y="264" class="t-item">최대 입력 길이</text>
  <text x="52" y="282" class="t-code">readonly</text>
  <text x="120" y="282" class="t-item">읽기 전용 여부</text>
  <text x="52" y="302" class="t-item">읽기: obj.value</text>
  <text x="52" y="318" class="t-item">쓰기: obj.set_value("abc")</text>

  <!-- Arrow left → center -->
  <line x1="266" y1="150" x2="318" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Right: Methods -->
  <rect x="614" y="88" width="230" height="200" rx="10" fill="#0f1117" stroke="#365314" stroke-width="1.5"/>
  <rect x="614" y="88" width="230" height="30" rx="10" fill="#1a3a0f"/>
  <text x="630" y="109" class="t-cat">메서드 (Method)</text>
  <text x="630" y="138" class="t-code">set_value("abc")</text>
  <text x="630" y="154" class="t-item">값 직접 설정</text>
  <text x="630" y="172" class="t-code">set_enable(false)</text>
  <text x="630" y="188" class="t-item">활성화 상태 변경</text>
  <text x="630" y="206" class="t-code">set_visible(false)</text>
  <text x="630" y="222" class="t-item">표시 여부 변경</text>
  <text x="630" y="240" class="t-code">set_cssclass("err")</text>
  <text x="630" y="256" class="t-item">스타일 클래스 변경</text>
  <text x="630" y="274" class="t-code">setFocus()</text>
  <text x="630" y="290" class="t-item">포커스 이동</text>

  <!-- Arrow center → right -->
  <line x1="562" y1="150" x2="612" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Bottom: Events -->
  <rect x="240" y="250" width="400" height="130" rx="10" fill="#0f1117" stroke="#4c1d2e" stroke-width="1.5"/>
  <rect x="240" y="250" width="400" height="30" rx="10" fill="#2a0f1a"/>
  <text x="256" y="271" class="t-cat">이벤트 (Event)</text>
  <text x="256" y="302" class="t-rose">onload</text>       <text x="316" y="302" class="t-item">컴포넌트 로드 완료 시</text>
  <text x="256" y="320" class="t-rose">onchange</text>     <text x="336" y="320" class="t-item">값 변경 시 발생</text>
  <text x="256" y="338" class="t-rose">onfocus</text>      <text x="322" y="338" class="t-item">포커스 받았을 때</text>
  <text x="256" y="356" class="t-rose">onkillfocus</text>  <text x="346" y="356" class="t-item">포커스 잃었을 때 (유효성 검사 적합)</text>
  <text x="460" y="302" class="t-rose">onclick</text>      <text x="516" y="302" class="t-item">마우스 클릭</text>
  <text x="460" y="320" class="t-rose">onkeydown</text>    <text x="536" y="320" class="t-item">키 입력 시</text>
  <text x="460" y="338" class="t-rose">onenter</text>      <text x="520" y="338" class="t-item">Enter 키 입력 시</text>
  <text x="460" y="356" class="t-rose">ondblclick</text>   <text x="546" y="356" class="t-item">더블클릭</text>

  <!-- Arrow center → bottom -->
  <line x1="440" y1="192" x2="440" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Bottom note -->
  <text x="36" y="398" class="t-label">* 모든 컴포넌트는 위와 같은 공통 구조를 가지며, 컴포넌트 유형별로 추가 속성/메서드/이벤트가 제공됩니다</text>
</svg>
