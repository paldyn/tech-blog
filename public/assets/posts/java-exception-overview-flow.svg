<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">예외 전파와 처리 흐름</text>

  <!-- Method stack -->
  <rect x="60" y="70" width="160" height="50" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">main()</text>
  <text x="140" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">try-catch</text>

  <line x1="220" y1="95" x2="260" y2="95" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <rect x="270" y="70" width="160" height="50" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">service()</text>
  <text x="350" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">호출</text>

  <line x1="430" y1="95" x2="470" y2="95" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <rect x="480" y="70" width="160" height="50" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="560" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">repository()</text>
  <text x="560" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">호출</text>

  <line x1="640" y1="95" x2="680" y2="95" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <rect x="690" y="70" width="140" height="50" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="760" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">throw</text>
  <text x="760" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SQLException</text>

  <!-- Exception propagates back -->
  <line x1="690" y1="140" x2="480" y2="180" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <text x="580" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">전파 (uncaught)</text>

  <rect x="350" y="184" width="230" height="60" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="465" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">service()에서 catch</text>
  <text x="465" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">또는 wrapping해서 re-throw</text>

  <!-- throw/catch code -->
  <rect x="60" y="270" width="760" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 예외 throw</text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">throw new</tspan><tspan fill="#ffffff"> IllegalArgumentException(</tspan><tspan fill="#ce9178">"유효하지 않은 입력"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 예외 catch</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    riskyOperation();</tspan></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">} </tspan><tspan fill="#7ec8e3" font-weight="600">catch</tspan><tspan fill="#ffffff"> (IOException e) {</tspan></text>
  <text x="76" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    log.error(</tspan><tspan fill="#ce9178">"IO 오류"</tspan><tspan fill="#ffffff">, e); </tspan><tspan fill="#9aa4b8">// 원인 포함 로그</tspan></text>
</svg>
