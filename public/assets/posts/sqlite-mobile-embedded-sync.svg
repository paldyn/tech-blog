<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arrs2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">오프라인-퍼스트 동기화 패턴</text>

  <!-- Device -->
  <rect x="60" y="80" width="220" height="280" fill="#0a1a0a" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">디바이스</text>
  <text x="170" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(SQLite 로컬 DB)</text>

  <rect x="76" y="140" width="188" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">오프라인 쓰기 (로컬)</text>

  <rect x="76" y="190" width="188" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">변경 큐 (pending_sync)</text>
  <text x="170" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">작업ID, 타임스탬프, 페이로드</text>

  <rect x="76" y="242" width="188" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">네트워크 감지</text>
  <text x="170" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">온라인 전환 시 동기화</text>

  <rect x="76" y="294" width="188" height="50" fill="#2a1a1a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="170" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">충돌 해결</text>
  <text x="170" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Last-write-wins</text>
  <text x="170" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">또는 수동 병합</text>

  <!-- Arrows -->
  <path d="M 280 200 C 330 200 330 200 380 200" stroke="#7ec8e3" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arrs2)"/>
  <text x="330" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">동기화</text>

  <path d="M 500 200 C 550 200 550 200 600 200" stroke="#55c555" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arrd2)"/>
  <text x="550" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">응답</text>

  <!-- Sync API -->
  <rect x="380" y="140" width="120" height="120" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Sync API</text>
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#9aa4b8" text-anchor="middle">REST / gRPC</text>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#9aa4b8" text-anchor="middle">변경분 전송</text>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#9aa4b8" text-anchor="middle">결과 수신</text>
  <text x="440" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">멱등성 보장</text>

  <!-- Server DB -->
  <rect x="600" y="80" width="220" height="280" fill="#0f1a2e" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">서버 DB</text>
  <text x="710" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(PostgreSQL / MySQL)</text>

  <rect x="616" y="140" width="188" height="40" fill="#1a1a2e" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">신뢰 원본 (Source of Truth)</text>

  <rect x="616" y="190" width="188" height="40" fill="#1a1a2e" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">updated_at + version</text>
  <text x="710" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">변경 추적용 타임스탬프</text>

  <rect x="616" y="242" width="188" height="40" fill="#1a1a2e" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">다중 디바이스 지원</text>
  <text x="710" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Turso / PocketBase / Supabase</text>

  <rect x="616" y="294" width="188" height="50" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">델타 동기화</text>
  <text x="710" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">마지막 sync 이후 변경분</text>
  <text x="710" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">watermark timestamp 방식</text>
</svg>
