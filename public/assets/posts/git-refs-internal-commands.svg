<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Refs 조작 명령</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">git for-each-ref / update-ref / show-ref</text>

  <!-- Left -->
  <rect x="60" y="92" width="360" height="160" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ref 조회</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 모든 ref 나열</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git show-ref</tspan></text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 브랜치 refs만</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git show-ref</tspan><tspan fill="#ffffff"> --heads</tspan></text>
  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git for-each-ref</tspan><tspan fill="#ffffff"> refs/heads/</tspan></text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git rev-parse</tspan><tspan fill="#ffffff"> refs/heads/main</tspan></text>

  <!-- Right -->
  <rect x="460" y="92" width="360" height="160" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">ref 수동 조작 (내부 이해용)</text>
  <text x="476" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # ref 직접 갱신</text>
  <text x="476" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git update-ref</tspan><tspan fill="#ffffff"> refs/heads/main &lt;SHA&gt;</tspan></text>
  <text x="476" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # ref 삭제</text>
  <text x="476" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git update-ref</tspan><tspan fill="#ffffff"> -d refs/heads/old</tspan></text>
  <text x="476" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # ref 로그 확인</text>
  <text x="476" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git reflog</tspan><tspan fill="#ffffff"> refs/heads/main</tspan></text>

  <!-- for-each-ref format -->
  <rect x="60" y="268" width="760" height="136" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">for-each-ref 포맷 활용</text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 브랜치명과 최신 커밋 메시지</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git for-each-ref</tspan><tspan fill="#ffffff"> --format='%(refname:short) %(subject)' refs/heads/</tspan></text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 마지막 커밋 날짜 기준 정렬</text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git for-each-ref</tspan><tspan fill="#ffffff"> --sort=-committerdate refs/heads/</tspan></text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git for-each-ref</tspan><tspan fill="#ffffff"> --format='%(objectname:short) %(refname)' refs/tags/</tspan></text>
</svg>
