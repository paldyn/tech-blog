<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">cat · tac · head · tail 명령어 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">파일에서 어느 줄을 읽을 것인가</text>

  <!-- File representation -->
  <rect x="380" y="88" width="120" height="200" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">file.txt</text>
  <text x="440" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">줄 1</text>
  <text x="440" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">줄 2</text>
  <text x="440" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">줄 3</text>
  <text x="440" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">…</text>
  <text x="440" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle">줄 N-2</text>
  <text x="440" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle">줄 N-1</text>
  <text x="440" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle">줄 N</text>
  <text x="440" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">총 N줄</text>

  <!-- cat arrow (all lines) -->
  <line x1="380" y1="160" x2="300" y2="160" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="302,155 282,160 302,165" fill="#7ec8e3"/>
  <text x="200" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">cat</text>
  <text x="200" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">전체 출력</text>

  <!-- tac arrow (all lines reversed) -->
  <line x1="380" y1="215" x2="300" y2="215" stroke="#7777cc" stroke-width="2"/>
  <polygon points="302,210 282,215 302,220" fill="#7777cc"/>
  <text x="200" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">tac</text>
  <text x="200" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">역순 전체</text>

  <!-- head arrow (top N lines) -->
  <line x1="500" y1="135" x2="580" y2="135" stroke="#55c555" stroke-width="2"/>
  <polygon points="578,130 598,135 578,140" fill="#55c555"/>
  <text x="660" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">head</text>
  <text x="660" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">앞 N줄 (기본 10)</text>

  <!-- tail arrow (bottom N lines) -->
  <line x1="500" y1="215" x2="580" y2="215" stroke="#e05555" stroke-width="2"/>
  <polygon points="578,210 598,215 578,220" fill="#e05555"/>
  <text x="660" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">tail</text>
  <text x="660" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">끝 N줄 (기본 10)</text>

  <!-- Key options -->
  <rect x="60" y="310" width="360" height="110" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">head / tail 주요 옵션</text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">head -n 20 file  <tspan fill="#9aa4b8"># 앞 20줄</tspan></text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">tail -n 20 file  <tspan fill="#9aa4b8"># 끝 20줄</tspan></text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">tail -n +5 file  <tspan fill="#9aa4b8"># 5번째 줄부터 끝까지</tspan></text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">tail -f app.log  <tspan fill="#9aa4b8"># 실시간 모니터링</tspan></text>

  <rect x="460" y="310" width="360" height="110" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">cat 주요 옵션</text>
  <text x="476" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cat -n file      <tspan fill="#9aa4b8"># 줄 번호 표시</tspan></text>
  <text x="476" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cat -A file      <tspan fill="#9aa4b8"># 특수문자 가시화</tspan></text>
  <text x="476" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cat -s file      <tspan fill="#9aa4b8"># 연속 빈 줄 하나로</tspan></text>
  <text x="476" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cat f1 f2 > f3   <tspan fill="#9aa4b8"># 파일 합치기</tspan></text>
</svg>
