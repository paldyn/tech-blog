<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">자동 배칭(Automatic Batching): React 18</text>

  <!-- React 17: partial batching -->
  <text x="220" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">React 17 — 이벤트 핸들러 안에서만 배칭</text>
  <rect x="60" y="84" width="360" height="220" rx="10" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <rect x="76" y="96" width="328" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="92" y="114" fill="#9aa4b8">// 이벤트 핸들러: 배칭 O</tspan>
    <tspan x="92" dy="16" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> handleClick() {</tspan>
    <tspan x="92" dy="16" fill="#ffffff">  setA(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);  setB(</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#55c555">  // → 1번만 리렌더 (배칭)</tspan>
    <tspan x="92" dy="16" fill="#ffffff">}</tspan>
    <tspan x="92" dy="22" fill="#9aa4b8">// 비동기 콜백: 배칭 X (React 17)</tspan>
    <tspan x="92" dy="16" fill="#ffffff">fetch(url).then(() =&gt; {</tspan>
    <tspan x="92" dy="16" fill="#ffffff">  setA(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#e05555">  // → 리렌더 1회</tspan>
    <tspan x="92" dy="16" fill="#ffffff">  setB(</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#e05555">  // → 리렌더 2회</tspan>
  </text>

  <!-- React 18: full batching -->
  <text x="660" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">React 18 — 어디서나 자동 배칭</text>
  <rect x="460" y="84" width="360" height="220" rx="10" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>
  <rect x="476" y="96" width="328" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="492" y="114" fill="#9aa4b8">// 이벤트 핸들러: 배칭 O (이전과 동일)</tspan>
    <tspan x="492" dy="16" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> handleClick() {</tspan>
    <tspan x="492" dy="16" fill="#ffffff">  setA(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);  setB(</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="492" dy="16" fill="#55c555">  // → 1번만 리렌더 (배칭)</tspan>
    <tspan x="492" dy="16" fill="#ffffff">}</tspan>
    <tspan x="492" dy="22" fill="#9aa4b8">// 비동기 콜백: 배칭 O (React 18 신규)</tspan>
    <tspan x="492" dy="16" fill="#ffffff">fetch(url).then(() =&gt; {</tspan>
    <tspan x="492" dy="16" fill="#ffffff">  setA(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);  setB(</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="492" dy="16" fill="#55c555">  // → 1번만 리렌더 (자동 배칭)</tspan>
    <tspan x="492" dy="16" fill="#ffffff">})</tspan>
  </text>

  <!-- Bottom explanation -->
  <rect x="60" y="320" width="760" height="72" rx="8" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">배칭(Batching)이란</text>
  <text x="440" y="360" text-anchor="middle" font-size="12" fill="#888">동일한 이벤트 루프 틱 안에서 발생하는 여러 setState 호출을 하나로 묶어 리렌더를 한 번만 실행하는 최적화</text>
  <text x="440" y="378" text-anchor="middle" font-size="12" fill="#888">React 18: createRoot() 사용 시 setTimeout, Promise, native 이벤트 등 모든 컨텍스트에서 자동 배칭</text>
  <text x="440" y="396" text-anchor="middle" font-size="12" fill="#888">배칭을 끄고 싶다면 flushSync(() =&gt; { setState(...) }) — 동기적 즉시 DOM 업데이트가 필요한 경우에만 사용</text>
  <text x="440" y="414" text-anchor="middle" font-size="11" fill="#555">React 17에서 비동기 콜백 내 배칭을 원했다면 unstable_batchedUpdates()를 수동으로 호출해야 했다</text>
  <text x="440" y="430" text-anchor="middle" font-size="11" fill="#555">React 18 이후에는 이 API 없이도 자동으로 처리되므로 대부분의 경우 신경 쓰지 않아도 됩니다</text>
</svg>
