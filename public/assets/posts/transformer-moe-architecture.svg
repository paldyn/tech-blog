<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Mixture of Experts: 구조와 라우팅</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">각 토큰이 Top-K 전문가만 선택해 희소 활성화를 구현한다</text>

  <!-- Input token -->
  <rect x="380" y="96" width="120" height="44" rx="8" fill="#1e2433" stroke="#3e4a5e"/>
  <text x="440" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">입력 토큰 x</text>

  <!-- Arrow to Router -->
  <line x1="440" y1="140" x2="440" y2="168" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="432,168 440,184 448,168" fill="#7ec8e3"/>

  <!-- Router -->
  <rect x="330" y="184" width="220" height="50" rx="8" fill="#0a1428" stroke="#1e3a5e"/>
  <text x="440" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">라우터 (Router)</text>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">softmax(W_g · x) → Top-K 선택</text>

  <!-- Arrows from router to experts -->
  <!-- Expert 1 - selected -->
  <line x1="340" y1="234" x2="140" y2="316" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="132,310 140,328 148,310" fill="#55c555"/>
  <text x="220" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">선택됨</text>

  <!-- Expert 2 - not selected -->
  <line x1="380" y1="234" x2="280" y2="316" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="272,310 280,328 288,310" fill="#333"/>
  <text x="295" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">스킵</text>

  <!-- Expert 3 - selected -->
  <line x1="440" y1="234" x2="440" y2="316" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="432,310 440,328 448,310" fill="#55c555"/>
  <text x="450" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">선택됨</text>

  <!-- Expert 4 - not selected -->
  <line x1="500" y1="234" x2="600" y2="316" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="592,310 600,328 608,310" fill="#333"/>
  <text x="545" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">스킵</text>

  <!-- Expert 5 - not selected -->
  <line x1="540" y1="234" x2="740" y2="316" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="732,310 740,328 748,310" fill="#333"/>
  <text x="670" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">스킵</text>

  <!-- Expert boxes -->
  <rect x="80" y="328" width="120" height="72" rx="8" fill="#0a1a0a" stroke="#1e3a1e"/>
  <text x="140" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Expert 1</text>
  <text x="140" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">FFN (활성)</text>
  <text x="140" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">g₁ = 0.42</text>

  <rect x="220" y="328" width="120" height="72" rx="8" fill="#111" stroke="#222"/>
  <text x="280" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#555" text-anchor="middle">Expert 2</text>
  <text x="280" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">FFN (비활성)</text>
  <text x="280" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">g₂ = 0.08</text>

  <rect x="380" y="328" width="120" height="72" rx="8" fill="#0a1a0a" stroke="#1e3a1e"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Expert 3</text>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">FFN (활성)</text>
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">g₃ = 0.35</text>

  <rect x="540" y="328" width="120" height="72" rx="8" fill="#111" stroke="#222"/>
  <text x="600" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#555" text-anchor="middle">Expert 4</text>
  <text x="600" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">FFN (비활성)</text>
  <text x="600" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">g₄ = 0.10</text>

  <rect x="680" y="328" width="120" height="72" rx="8" fill="#111" stroke="#222"/>
  <text x="740" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#555" text-anchor="middle">Expert 5</text>
  <text x="740" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">FFN (비활성)</text>
  <text x="740" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">g₅ = 0.05</text>

  <!-- Combine arrow -->
  <line x1="140" y1="400" x2="390" y2="446" stroke="#55c555" stroke-width="2"/>
  <line x1="440" y1="400" x2="440" y2="446" stroke="#55c555" stroke-width="2"/>
  <polygon points="432,440 440,458 448,440" fill="#55c555"/>

  <!-- Output -->
  <rect x="330" y="458" width="220" height="44" rx="8" fill="#0a1a0a" stroke="#1e3a1e"/>
  <text x="440" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">출력 = g₁·E1(x) + g₃·E3(x)</text>
  <text x="440" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Top-2 가중 합산 (정규화된 게이트 점수)</text>
</svg>
