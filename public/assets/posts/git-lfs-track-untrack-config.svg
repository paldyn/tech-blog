<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LFS 트래킹 패턴 설정</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">git lfs track 명령이 .gitattributes를 수정한다</text>

  <!-- Left: Commands -->
  <rect x="60" y="90" width="370" height="190" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="114" fill="#9aa4b8"># 확장자로 트래킹</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git lfs track</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"*.png" "*.jpg"</tspan>
    <tspan x="76" dy="22" fill="#9aa4b8"># 특정 경로 패턴</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git lfs track</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"assets/**"</tspan>
    <tspan x="76" dy="22" fill="#9aa4b8"># 특정 파일 하나만</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git lfs track</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"data/model.bin"</tspan>
    <tspan x="76" dy="22" fill="#9aa4b8"># 현재 트래킹 목록 확인</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git lfs track</tspan>
  </text>

  <!-- Right: .gitattributes result -->
  <rect x="460" y="90" width="360" height="190" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">.gitattributes (자동 생성)</text>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan x="476" y="136" fill="#ce9178">*.png</tspan>
    <tspan fill="#ffffff"> filter=lfs diff=lfs merge=lfs -text</tspan>
    <tspan x="476" dy="18" fill="#ce9178">*.jpg</tspan>
    <tspan fill="#ffffff"> filter=lfs diff=lfs merge=lfs -text</tspan>
    <tspan x="476" dy="18" fill="#ce9178">assets/**</tspan>
    <tspan fill="#ffffff"> filter=lfs diff=lfs merge=lfs -text</tspan>
    <tspan x="476" dy="18" fill="#ce9178">data/model.bin</tspan>
    <tspan fill="#ffffff"> filter=lfs diff=lfs -text</tspan>
  </text>
  <text x="640" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">.gitattributes를 반드시 커밋해야 적용됨</text>

  <!-- Pattern types section -->
  <text x="440" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">패턴 유형</text>

  <!-- Pattern type cards -->
  <rect x="60" y="322" width="220" height="82" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="170" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">*.ext</text>
  <text x="170" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 디렉터리에서</text>
  <text x="170" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">해당 확장자 전부</text>
  <text x="170" y="396" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">ex) *.mp4, *.psd, *.bin</text>

  <rect x="330" y="322" width="220" height="82" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">path/**</text>
  <text x="440" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">특정 경로 하위</text>
  <text x="440" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 파일</text>
  <text x="440" y="396" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">ex) assets/**, models/**</text>

  <rect x="600" y="322" width="220" height="82" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="710" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">exact/path</text>
  <text x="710" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정확한 파일 하나만</text>
  <text x="710" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">경로 포함 매칭</text>
  <text x="710" y="396" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">ex) data/weights.pt</text>
</svg>
