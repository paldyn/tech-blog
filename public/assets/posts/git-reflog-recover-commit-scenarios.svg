<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">커밋 복구 시나리오별 명령</text>

  <!-- Scenario 1 -->
  <rect x="60" y="70" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="94" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 시나리오 1: reset --hard로 여러 커밋 날린 경우</text>
  <text x="76" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">reset</tspan> --hard HEAD@{3}  <tspan fill="#9aa4b8"># 3번 전 상태로 복구</tspan></text>

  <!-- Scenario 2 -->
  <rect x="60" y="154" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 시나리오 2: amend로 덮어쓴 커밋 복원 (원본 내용만)</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">cherry-pick</tspan> HEAD@{1}  <tspan fill="#9aa4b8"># amend 전 커밋을 새 커밋으로</tspan></text>

  <!-- Scenario 3 -->
  <rect x="60" y="238" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 시나리오 3: 특정 커밋만 꺼내고 싶을 때</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">reflog</tspan>  <tspan fill="#9aa4b8"># SHA 확인: abc1234</tspan></text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">checkout</tspan> -b recovery abc1234  <tspan fill="#9aa4b8"># 새 브랜치로 꺼내기</tspan></text>

  <!-- Warning -->
  <rect x="60" y="334" width="760" height="34" rx="6" fill="#1f1800" stroke="#e8a42a" stroke-width="1.5"/>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a42a">⚠ GC(git gc) 실행 후에는 reflog에서도 도달 불가 커밋이 삭제됨 — 즉시 시도할 것</text>
</svg>
