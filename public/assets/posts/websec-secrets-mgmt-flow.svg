<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">시크릿 관리 아키텍처: 잘못된 방식 vs 올바른 방식</text>

  <!-- Bad way -->
  <text x="200" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">&#x2717; 잘못된 방식</text>

  <!-- Source code box -->
  <rect x="60" y="92" width="140" height="52" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="130" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">소스코드</text>
  <text x="130" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">SECRET="abc123" 하드코딩</text>

  <line x1="200" y1="118" x2="250" y2="118" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <rect x="250" y="92" width="140" height="52" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="320" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Git 저장소</text>
  <text x="320" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">커밋 히스토리에 영구 노출</text>

  <line x1="390" y1="118" x2="440" y2="118" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <rect x="440" y="92" width="140" height="52" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="510" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">GitHub 유출</text>
  <text x="510" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">secret scanning으로도 복구</text>

  <!-- Other bad ways -->
  <rect x="60" y="162" width="200" height="42" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="160" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">평문 .env 파일</text>
  <text x="160" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.gitignore 실수 한 번으로 노출</text>

  <rect x="280" y="162" width="200" height="42" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="380" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">로그·에러 메시지</text>
  <text x="380" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스택트레이스에 API 키 출력</text>

  <rect x="500" y="162" width="200" height="42" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="600" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Slack/Jira 메시지</text>
  <text x="600" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">팀 채널에 토큰 공유</text>

  <!-- Divider -->
  <line x1="60" y1="224" x2="820" y2="224" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Good way -->
  <text x="440" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">&#x2714; 올바른 방식 — Vault/KMS 중앙화</text>

  <!-- App -->
  <rect x="60" y="262" width="120" height="52" rx="6" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="120" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">앱 인스턴스</text>
  <text x="120" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서비스 ID로 인증</text>

  <line x1="180" y1="288" x2="240" y2="288" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="210" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">요청</text>

  <!-- Vault/KMS -->
  <rect x="240" y="256" width="200" height="64" rx="8" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="2"/>
  <text x="340" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Vault / KMS</text>
  <text x="340" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인증 + 권한 확인</text>
  <text x="340" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">감사 로그 기록</text>

  <line x1="440" y1="288" x2="500" y2="288" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="470" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">시크릿 반환</text>

  <!-- App uses secret -->
  <rect x="500" y="262" width="160" height="52" rx="6" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="580" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">메모리에서만 사용</text>
  <text x="580" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">디스크·로그 기록 없음</text>

  <!-- Lease/Rotation -->
  <rect x="690" y="262" width="130" height="52" rx="6" fill="#1a1a0d" stroke="#4a4a1a" stroke-width="1"/>
  <text x="755" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">자동 갱신</text>
  <text x="755" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Lease TTL 만료</text>

  <!-- Key features -->
  <rect x="60" y="340" width="760" height="130" rx="8" fill="#111111" stroke="#222222" stroke-width="1"/>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">올바른 시크릿 관리의 핵심 원칙</text>

  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2714;</text>
  <text x="96" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중앙화된 저장소 (Vault, AWS Secrets Manager, GCP Secret Manager)</text>

  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2714;</text>
  <text x="96" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최소 권한: 앱은 자신이 필요한 시크릿만 접근 가능</text>

  <text x="80" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2714;</text>
  <text x="96" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자동 로테이션: 주기적 교체, 침해 시 즉시 무효화</text>

  <text x="430" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2714;</text>
  <text x="446" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">감사 로그: 누가, 언제, 어떤 시크릿에 접근했는지</text>

  <text x="430" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2714;</text>
  <text x="446" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동적 자격증명: DB 비밀번호를 요청 시마다 임시 발급</text>

  <text x="430" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2714;</text>
  <text x="446" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">암호화 저장: Vault는 내부 데이터를 AES-256으로 암호화</text>

  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">&#x26A0;</text>
  <text x="96" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시크릿은 소스코드, 컨테이너 이미지, 환경변수 로그, CI 아티팩트에 절대 포함하지 말 것</text>
</svg>
