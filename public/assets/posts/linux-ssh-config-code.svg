<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SSH config 고급 패턴</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">ProxyJump · 와일드카드 · ControlMaster 로 접속을 더 편하게</text>

  <!-- Card 1: ProxyJump -->
  <rect x="60" y="100" width="380" height="152" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">① ProxyJump — 점프 호스트</text>
  <rect x="76" y="146" width="348" height="74" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Host</tspan><tspan fill="#ffffff"> internal</tspan></text>
  <text x="92" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    HostName</tspan><tspan fill="#ffffff">  10.0.1.5</tspan></text>
  <text x="92" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    ProxyJump</tspan><tspan fill="#ffffff"> bastion</tspan></text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">방화벽 내부 서버를 베스천 경유로 접속</text>

  <!-- Card 2: 와일드카드 -->
  <rect x="460" y="100" width="380" height="152" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">② 와일드카드 — 그룹 설정</text>
  <rect x="476" y="146" width="348" height="74" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Host</tspan><tspan fill="#ffffff"> dev-*</tspan></text>
  <text x="492" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    User</tspan><tspan fill="#ffffff"> ubuntu</tspan></text>
  <text x="492" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    IdentityFile</tspan><tspan fill="#ce9178"> ~/.ssh/dev_key</tspan></text>
  <text x="480" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dev-web · dev-db 등에 일괄 적용</text>

  <!-- Card 3: ControlMaster -->
  <rect x="60" y="268" width="780" height="126" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">③ ControlMaster — 연결 재사용</text>
  <rect x="76" y="306" width="420" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Host</tspan><tspan fill="#ffffff"> *</tspan></text>
  <text x="92" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    ControlMaster</tspan><tspan fill="#ffffff"> auto</tspan></text>
  <text x="92" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    ControlPath</tspan><tspan fill="#ce9178"> ~/.ssh/sockets/%r@%h:%p</tspan></text>
  <text x="92" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    ControlPersist</tspan><tspan fill="#ffffff"> 10m</tspan></text>
  <text x="520" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">소켓 하나로 여러 세션 공유</text>
  <text x="520" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">2번째 접속부터 인증 생략 → 즉시 연결</text>
  <text x="520" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">ControlPersist 10m · 유휴 후에도 유지</text>

  <!-- Bottom note -->
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ProxyJump 은 베스천을, ControlMaster 는 소켓을 재사용해 반복 접속을 줄인다</text>
</svg>
