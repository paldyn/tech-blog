<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">EUI-64: MAC → IPv6 인터페이스 ID 변환</text>

  <!-- MAC Address breakdown -->
  <text x="440" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">MAC 주소 48비트 → 인터페이스 ID 64비트</text>

  <!-- MAC address -->
  <text x="100" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">MAC 주소:</text>
  <rect x="220" y="104" width="72" height="34" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="256" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">00:1A</text>
  <rect x="296" y="104" width="72" height="34" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="332" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">:2B:3C</text>
  <text x="375" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#555" text-anchor="middle">|</text>
  <rect x="385" y="104" width="72" height="34" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="421" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">4D:5E</text>
  <rect x="461" y="104" width="72" height="34" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="497" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">:6F:7A</text>
  <text x="100" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">OUI (제조사 3바이트)</text>
  <text x="400" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">NIC (장치 3바이트)</text>

  <!-- Step arrows -->
  <text x="440" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">↓  중간에 FF:FE 삽입  +  7번째 비트(U/L) 반전</text>

  <!-- EUI-64 result -->
  <text x="100" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">EUI-64:</text>
  <rect x="220" y="200" width="72" height="34" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="256" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">02:1A</text>
  <rect x="296" y="200" width="72" height="34" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="332" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">:2B:3C</text>
  <rect x="372" y="200" width="72" height="34" rx="4" fill="#2a1a3a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="408" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" text-anchor="middle">:FF:FE</text>
  <rect x="448" y="200" width="72" height="34" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">4D:5E</text>
  <rect x="524" y="200" width="72" height="34" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="560" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">:6F:7A</text>
  <text x="233" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">00→02 (U/L비트 반전)</text>
  <text x="375" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">FF:FE 삽입</text>

  <!-- Final IPv6 address -->
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">최종 IPv6 글로벌 주소</text>
  <rect x="160" y="292" width="560" height="44" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" text-anchor="middle">2001:db8:: + 021a:2b3c:ff fe:4d5e:6f7a</text>

  <!-- Privacy Extensions note -->
  <rect x="60" y="354" width="760" height="50" rx="8" fill="#111" stroke="#e8a030" stroke-width="1"/>
  <text x="80" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a030">⚠ Privacy Extensions (RFC 4941)</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">EUI-64는 MAC이 노출됨. 대부분의 OS는 임의 인터페이스 ID를 생성하는 Privacy Extensions를 기본 활성화.</text>
</svg>
