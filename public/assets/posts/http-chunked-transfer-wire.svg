<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">청크 전송의 와이어 포맷</text>
    <rect x="60" y="70" width="760" height="284" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="97" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555">HTTP/1.1 200 OK</tspan></text>
    <text x="76" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Transfer-Encoding</tspan><tspan fill="#ffffff">: chunked</tspan><tspan fill="#9aa4b8">      # Content-Length 없음</tspan></text>
    <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">7</tspan><tspan fill="#9aa4b8">\r\n                            # 청크 크기 — 16진수</tspan></text>
    <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Network</tspan><tspan fill="#9aa4b8">\r\n                      # 데이터 7바이트</tspan></text>
    <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">1A</tspan><tspan fill="#9aa4b8">\r\n                           # 0x1A = 26바이트</tspan></text>
    <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">and HTTP, fully conquered.</tspan><tspan fill="#9aa4b8">\r\n</tspan></text>
    <text x="76" y="227" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">0</tspan><tspan fill="#9aa4b8">\r\n                            # 크기 0 = 마지막 청크</tspan></text>
    <text x="76" y="247" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">X-Body-Sha256</tspan><tspan fill="#ffffff">: 9f86d0...</tspan><tspan fill="#9aa4b8">       # 트레일러 (선택)</tspan></text>
    <text x="76" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">\r\n                             # 메시지 종료</tspan></text>
    <text x="76" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 수신 측 재조립 결과:</text>
    <text x="76" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Network and HTTP, fully conquered.</tspan><tspan fill="#9aa4b8">  # 33바이트</tspan></text>
    <text x="76" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 청크 경계는 의미 단위가 아니다 — 그저 전송 조각일 뿐</text>
    <!-- Summary -->
    <text x="440" y="394" text-anchor="middle" font-size="12" fill="#888">크기를 먼저 알리고 그만큼 보내기를 반복 — 0 크기 청크가 "끝"의 신호</text>
    <text x="440" y="412" text-anchor="middle" font-size="11" fill="#555">전체 본문 길이를 모르는 채로 전송을 시작할 수 있다는 것이 핵심</text>
  </g>
</svg>
