<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSON vs JSONB 저장 구조 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">텍스트 보존 vs 바이너리 파싱</text>

  <!-- Left: JSON -->
  <rect x="60" y="95" width="350" height="300" rx="8" fill="#1a1a0d" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="235" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8c84a" text-anchor="middle">json 타입</text>

  <!-- json flow -->
  <rect x="90" y="140" width="290" height="36" rx="6" fill="#2a2a00" stroke="#e8c84a" stroke-width="1"/>
  <text x="235" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c84a" text-anchor="middle">입력: {"b":2,"a":1,"a":3}</text>

  <line x1="235" y1="176" x2="235" y2="196" stroke="#888" stroke-width="1.5"/>
  <polygon points="229,196 235,208 241,196" fill="#888"/>
  <text x="280" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">텍스트 그대로</text>

  <rect x="90" y="212" width="290" height="36" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="235" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle" font-family="'JetBrains Mono',monospace">{"b":2,"a":1,"a":3}</text>

  <text x="90" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">저장: 원본 텍스트 그대로 보존</text>
  <text x="90" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중복 키 허용 (a가 두 번)</text>
  <text x="90" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">키 순서 보존</text>
  <text x="90" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 인덱스 생성 불가 (GIN)</text>
  <text x="90" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 경로 탐색마다 재파싱</text>
  <text x="90" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 공백·순서·중복 그대로 출력</text>

  <!-- Right: JSONB -->
  <rect x="470" y="95" width="350" height="300" rx="8" fill="#1a0d0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="645" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">jsonb 타입</text>

  <!-- jsonb flow -->
  <rect x="500" y="140" width="290" height="36" rx="6" fill="#002233" stroke="#7ec8e3" stroke-width="1"/>
  <text x="645" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">입력: {"b":2,"a":1,"a":3}</text>

  <line x1="645" y1="176" x2="645" y2="196" stroke="#888" stroke-width="1.5"/>
  <polygon points="639,196 645,208 651,196" fill="#888"/>
  <text x="690" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파싱 → 바이너리</text>

  <rect x="500" y="212" width="290" height="36" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="645" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">{"a":3,"b":2}  ← 바이너리</text>

  <text x="500" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">저장: 파싱된 바이너리 포맷</text>
  <text x="500" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중복 키 제거 (마지막 값 유지)</text>
  <text x="500" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">키 정렬 저장 (알파벳 순)</text>
  <text x="500" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ GIN 인덱스 지원</text>
  <text x="500" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 경로 탐색 빠름 (파싱 생략)</text>
  <text x="500" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 저장 시 파싱 비용 소폭 증가</text>

  <!-- Bottom comparison table -->
  <rect x="60" y="415" width="760" height="82" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">선택 기준</text>
  <text x="150" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c84a" text-anchor="middle">json 선택 상황</text>
  <text x="700" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">jsonb 선택 상황 (대부분)</text>
  <text x="150" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">원본 보존이 필요한 감사 로그</text>
  <text x="700" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">검색·인덱스·경로 탐색이 필요한 모든 경우</text>
</svg>
