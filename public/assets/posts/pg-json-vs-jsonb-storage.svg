<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="11" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 1 L 12 7 L 1 13 z" fill="#8a93a8"/>
    </marker>
  </defs>
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSON vs JSONB 저장 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">json 은 원본 텍스트, jsonb 는 파싱된 바이너리</text>

  <!-- Input pill -->
  <rect x="290" y="98" width="300" height="36" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4" text-anchor="middle">'{"b":2,"a":1,"a":3}'</text>

  <!-- Arrows to two cards -->
  <line x1="398" y1="136" x2="250" y2="176" stroke="#8a93a8" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="482" y1="136" x2="630" y2="176" stroke="#8a93a8" stroke-width="2" marker-end="url(#ar)"/>
  <text x="300" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">그대로</text>
  <text x="582" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">파싱</text>

  <!-- LEFT: json -->
  <rect x="60" y="180" width="360" height="200" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#7ec8e3">json</text>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원본 텍스트 그대로</text>
  <rect x="76" y="248" width="328" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">{"b":2,"a":1,"a":3}</text>
  <text x="80" y="312" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#7ec8e3">●</tspan><tspan fill="#d4d4d4">  원본 · 키 순서 보존</tspan></text>
  <text x="80" y="338" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#9aa4b8">●</tspan><tspan fill="#d4d4d4">  읽을 때마다 파싱</tspan></text>
  <text x="80" y="364" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#e05555">●</tspan><tspan fill="#9aa4b8">  GIN 인덱스 불가</tspan></text>

  <!-- RIGHT: jsonb -->
  <rect x="460" y="180" width="360" height="200" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#55c555">jsonb</text>
  <text x="480" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파싱된 바이너리</text>
  <rect x="476" y="248" width="328" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">{"a": 3, "b": 2}</text>
  <text x="480" y="312" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#55c555">●</tspan><tspan fill="#d4d4d4">  중복 키 제거 · 정렬</tspan></text>
  <text x="480" y="338" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#55c555">●</tspan><tspan fill="#d4d4d4">  읽기 · 탐색 빠름</tspan></text>
  <text x="480" y="364" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#55c555">●</tspan><tspan fill="#d4d4d4">  GIN 인덱스 가능</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">특별한 이유가 없으면 jsonb — 검색 · 인덱스 · 집계에 유리하다</text>
</svg>
