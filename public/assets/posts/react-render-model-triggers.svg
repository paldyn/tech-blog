<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">렌더링 트리거 — 언제 React가 리렌더하는가</text>

  <!-- Initial render -->
  <rect x="60" y="68" width="220" height="64" rx="10" fill="#0f1c2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">최초 렌더링</text>
  <text x="170" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">createRoot().render() 호출 시</text>

  <!-- setState -->
  <rect x="330" y="68" width="220" height="64" rx="10" fill="#0f1c2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">setState 호출</text>
  <text x="440" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useState / useReducer dispatch</text>

  <!-- context -->
  <rect x="600" y="68" width="220" height="64" rx="10" fill="#0f1c2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="710" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">Context 변경</text>
  <text x="710" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Provider value가 바뀔 때</text>

  <!-- 화살표들 -->
  <line x1="170" y1="132" x2="170" y2="158" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="132" x2="440" y2="158" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="710" y1="132" x2="710" y2="158" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- React decides to re-render -->
  <rect x="60" y="160" width="760" height="50" rx="10" fill="#131a24" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="191" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">React가 해당 컴포넌트(+ 자손들)를 리렌더 예약</text>

  <!-- 코드 박스 -->
  <rect x="60" y="230" width="380" height="192" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="254"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 리렌더 유발 O</text>
  <text x="76" y="274"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">const</text>
  <text x="120" y="274"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> [count, setCount] =</text>
  <text x="76" y="294"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  useState(</text>
  <text x="149" y="294"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">0</text>
  <text x="160" y="294"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>
  <text x="76" y="314"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">setCount(count + </text>
  <text x="224" y="314"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">1</text>
  <text x="235" y="314"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>
  <text x="76" y="344"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 리렌더 유발 X (같은 값)</text>
  <text x="76" y="364"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">setCount(</text>
  <text x="142" y="364"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">5</text>
  <text x="153" y="364"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">); setCount(</text>
  <text x="253" y="364"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">5</text>
  <text x="264" y="364"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>
  <text x="76" y="406"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// Object.is()로 비교: 같으면 스킵</text>

  <!-- 오른쪽: 오해 설명 -->
  <rect x="468" y="230" width="352" height="90" rx="8" fill="#101820" stroke="#e05555" stroke-width="1.5"/>
  <text x="644" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">흔한 오해</text>
  <text x="644" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">props가 바뀌어야만 리렌더된다 (X)</text>
  <text x="644" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">부모가 리렌더되면 자식도 기본적으로 리렌더됨</text>

  <rect x="468" y="340" width="352" height="82" rx="8" fill="#101820" stroke="#55c555" stroke-width="1.5"/>
  <text x="644" y="366" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">최적화 전략</text>
  <text x="644" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">React.memo — props 얕은 비교로 스킵</text>
  <text x="644" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">필요할 때만 적용 (기본 렌더는 빠름)</text>
</svg>
