<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">java.lang의 세 내장 애너테이션</text>

  <!-- Override -->
  <rect x="50" y="86" width="250" height="180" rx="8" fill="#0f1626" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="116" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">@Override</text>
  <text x="175" y="146" font-size="13" fill="#ffffff" text-anchor="middle">상위 메서드를</text>
  <text x="175" y="166" font-size="13" fill="#ffffff" text-anchor="middle">재정의한다는 선언</text>
  <text x="175" y="200" font-size="12" fill="#9aa4b8" text-anchor="middle">시그니처 오타 시</text>
  <text x="175" y="218" font-size="12" fill="#9aa4b8" text-anchor="middle">컴파일 에러로 잡아 준다</text>
  <text x="175" y="248" font-size="12" fill="#55c555" text-anchor="middle">안전망 — 권장</text>

  <!-- Deprecated -->
  <rect x="315" y="86" width="250" height="180" rx="8" fill="#1a160d" stroke="#e0a955" stroke-width="1.5"/>
  <text x="440" y="116" font-size="16" font-weight="600" fill="#e0a955" text-anchor="middle">@Deprecated</text>
  <text x="440" y="146" font-size="13" fill="#ffffff" text-anchor="middle">더 이상 쓰지 말라는</text>
  <text x="440" y="166" font-size="13" fill="#ffffff" text-anchor="middle">사용 중단 표시</text>
  <text x="440" y="200" font-size="12" fill="#9aa4b8" text-anchor="middle">since / forRemoval</text>
  <text x="440" y="218" font-size="12" fill="#9aa4b8" text-anchor="middle">요소로 메타정보 제공</text>
  <text x="440" y="248" font-size="12" fill="#e0a955" text-anchor="middle">사용 시 경고</text>

  <!-- SuppressWarnings -->
  <rect x="580" y="86" width="250" height="180" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="116" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">@SuppressWarnings</text>
  <text x="705" y="146" font-size="13" fill="#ffffff" text-anchor="middle">특정 경고를</text>
  <text x="705" y="166" font-size="13" fill="#ffffff" text-anchor="middle">의도적으로 숨김</text>
  <text x="705" y="200" font-size="12" fill="#9aa4b8" text-anchor="middle">"unchecked"</text>
  <text x="705" y="218" font-size="12" fill="#9aa4b8" text-anchor="middle">"deprecation" 등</text>
  <text x="705" y="248" font-size="12" fill="#e05555" text-anchor="middle">최소 범위로만</text>
</svg>
