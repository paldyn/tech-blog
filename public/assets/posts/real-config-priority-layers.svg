<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">설정 우선순위 레이어</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">낮은 우선순위 → 높은 우선순위 (오른쪽이 덮어씀)</text>

  <!-- Priority layers (left=lowest, right=highest) -->
  <!-- Layer 1: Hardcoded defaults -->
  <rect x="50" y="100" width="130" height="200" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="115" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#555">⑤ 최저</text>
  <text x="115" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 기본값</text>
  <text x="115" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">const DEFAULT =</text>
  <text x="115" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">{ port: 3000 }</text>

  <!-- Layer 2: .env file -->
  <rect x="200" y="90" width="130" height="220" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="265" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">④ .env 파일</text>
  <text x="265" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">공통 기본값</text>
  <text x="265" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">PORT=3000</text>
  <text x="265" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">LOG_LEVEL=info</text>
  <text x="265" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">(git 커밋 가능)</text>

  <!-- Layer 3: .env.local -->
  <rect x="350" y="80" width="130" height="240" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="415" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">③ .env.local</text>
  <text x="415" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">개발자 개인 설정</text>
  <text x="415" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">DATABASE_URL=...</text>
  <text x="415" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">PORT=4000</text>
  <text x="415" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">(gitignore 필수)</text>

  <!-- Layer 4: OS ENV -->
  <rect x="500" y="70" width="130" height="260" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="565" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">② OS 환경 변수</text>
  <text x="565" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">export PORT=8080</text>
  <text x="565" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">systemd, docker run -e</text>
  <text x="565" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">.env 값 덮어씀</text>

  <!-- Layer 5: CLI args -->
  <rect x="650" y="60" width="180" height="280" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">① 최고 — CLI / 런타임</text>
  <text x="740" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">PORT=9000 node app.js</text>
  <text x="740" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">명령줄 인자 --port 9000</text>
  <text x="740" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">모든 파일 설정 무시</text>

  <!-- arrows between layers -->
  <line x1="182" y1="200" x2="198" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="332" y1="200" x2="348" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="482" y1="200" x2="498" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="632" y1="200" x2="648" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Result box -->
  <rect x="50" y="370" width="780" height="42" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">최종 설정 = spread({ ...defaults, ...dotenv, ...dotenvLocal, ...processEnv, ...cliArgs })</text>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">오른쪽 소스가 왼쪽을 덮어씀 · undefined는 건너뜀 (null은 덮어씀)</text>
</svg>
