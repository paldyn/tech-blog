<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Figure 안에 Axes가 들어 있다</text>

  <rect x="60" y="80" width="420" height="230" rx="8" fill="#0f1320" stroke="#7777cc" stroke-width="1.5"/>
  <text x="72" y="102" font-size="13" fill="#7777cc">Figure — 전체 도화지</text>

  <rect x="110" y="120" width="330" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="125" y="142" font-size="13" fill="#7ec8e3">Axes — 하나의 그래프 영역</text>

  <line x1="150" y1="260" x2="410" y2="260" stroke="#888" stroke-width="1.5"/>
  <line x1="150" y1="260" x2="150" y2="160" stroke="#888" stroke-width="1.5"/>
  <polyline points="160,250 220,210 280,225 340,180 400,170" fill="none" stroke="#55c555" stroke-width="2.5"/>
  <text x="280" y="278" font-size="11" fill="#888" text-anchor="middle">x축 (xlabel)</text>
  <text x="132" y="210" font-size="11" fill="#888" text-anchor="middle" transform="rotate(-90 132 210)">y축 (ylabel)</text>

  <rect x="510" y="120" width="310" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="528" y="142" font-size="14" font-weight="600" fill="#7777cc">Figure</text>
  <text x="528" y="162" font-size="13" fill="#9aa4b8">제목·크기·여러 그래프를 담는 틀</text>

  <rect x="510" y="178" width="310" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="528" y="200" font-size="14" font-weight="600" fill="#7ec8e3">Axes</text>
  <text x="528" y="220" font-size="13" fill="#9aa4b8">실제 plot·축·라벨이 그려지는 곳</text>

  <rect x="510" y="236" width="310" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="528" y="258" font-size="14" font-weight="600" fill="#55c555">Artist</text>
  <text x="528" y="278" font-size="13" fill="#9aa4b8">선·점·텍스트 등 그려지는 모든 요소</text>
</svg>
