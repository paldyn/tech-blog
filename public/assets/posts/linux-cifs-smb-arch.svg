<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CIFS/SMB 아키텍처</text>

  <!-- Windows Server -->
  <rect x="60" y="68" width="300" height="280" rx="10" fill="#0a1018" stroke="#7ec8e3" stroke-width="2"/>
  <text x="210" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">Windows / Samba 서버</text>

  <rect x="85" y="110" width="250" height="48" rx="6" fill="#1a2030" stroke="#7777cc" stroke-width="1"/>
  <text x="210" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">SMB 서버 데몬</text>
  <text x="210" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">smbd (포트 445) / nmbd (포트 137-139)</text>

  <rect x="85" y="172" width="250" height="48" rx="6" fill="#1a2030" stroke="#55c555" stroke-width="1"/>
  <text x="210" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">공유 폴더</text>
  <text x="210" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">\\SERVER\share  (UNC 경로)</text>

  <rect x="85" y="234" width="250" height="48" rx="6" fill="#1a2030" stroke="#e8c55e" stroke-width="1"/>
  <text x="210" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c55e" text-anchor="middle">인증</text>
  <text x="210" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용자/비밀번호 또는 Kerberos (AD)</text>

  <rect x="85" y="296" width="250" height="40" rx="6" fill="#0a1508" stroke="#55c555" stroke-width="1"/>
  <text x="210" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SMB1 (보안 취약·구형)</text>
  <text x="210" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">SMB2 / SMB3 권장</text>

  <!-- Network -->
  <rect x="340" y="188" width="120" height="56" rx="8" fill="#222" stroke="#555" stroke-width="1"/>
  <text x="400" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">TCP</text>
  <text x="400" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Port 445</text>

  <line x1="360" y1="216" x2="342" y2="216" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="460" y1="216" x2="480" y2="216" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Linux Client -->
  <rect x="480" y="68" width="340" height="280" rx="10" fill="#0f200f" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">리눅스 클라이언트</text>

  <rect x="505" y="110" width="290" height="48" rx="6" fill="#1a2830" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">cifs.ko (커널 CIFS 드라이버)</text>
  <text x="650" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">mount.cifs / mount -t cifs</text>

  <rect x="505" y="172" width="290" height="48" rx="6" fill="#1a2830" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">cifs-utils 패키지</text>
  <text x="650" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">smbclient, smbmount, credentials</text>

  <rect x="505" y="234" width="290" height="48" rx="6" fill="#1a2830" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">마운트 포인트</text>
  <text x="650" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/mnt/smb (로컬처럼 접근)</text>

  <rect x="505" y="296" width="290" height="40" rx="6" fill="#1a2830" stroke="#e8c55e" stroke-width="1"/>
  <text x="650" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">uid=, gid=, file_mode=, dir_mode=</text>
  <text x="650" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c55e" text-anchor="middle">리눅스 권한 매핑 옵션</text>

  <!-- Protocol versions -->
  <rect x="60" y="368" width="760" height="70" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">SMB 버전별 특징</text>
  <text x="130" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">SMB1 (취약)</text>
  <text x="330" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c55e" text-anchor="middle">SMB2 (Win7+)</text>
  <text x="530" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">SMB3 (Win8+, 암호화)</text>
  <text x="730" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">SMB3.1.1 (최신)</text>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">vers=3.0 또는 vers=3.1.1 옵션으로 지정 (기본: 협상)</text>
</svg>
