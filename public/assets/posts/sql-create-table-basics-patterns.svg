<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">테이블 생성 패턴 — CTAS / 복합 PK</text>

  <!-- CTAS -->
  <rect x="60" y="66" width="370" height="270" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">CTAS — CREATE TABLE AS SELECT</text>

  <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 쿼리 결과로 새 테이블 생성</tspan></text>
  <text x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> 서울고객 </tspan><tspan fill="#7ec8e3" font-weight="600">AS</tspan></text>
  <text x="80" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> 고객</tspan></text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> 도시 = </tspan><tspan fill="#ce9178">'서울'</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 구조만 복사 (데이터 없이)</tspan></text>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> 고객_백업 </tspan><tspan fill="#7ec8e3" font-weight="600">AS</tspan></text>
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> 고객</tspan></text>
  <text x="80" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CTAS는 제약 조건을 복사하지 않음</text>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PK, FK, 인덱스는 별도로 생성 필요</text>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">임시 분석 테이블, 마이그레이션에 유용</text>

  <!-- Composite PK -->
  <rect x="450" y="66" width="370" height="270" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="470" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">복합 기본 키 (Composite PK)</text>

  <text x="470" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 다대다 관계의 중간 테이블</tspan></text>
  <text x="470" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> 주문_제품 (</tspan></text>
  <text x="470" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  주문ID  </tspan><tspan fill="#7ec8e3" font-weight="600">INTEGER NOT NULL</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="470" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  제품ID  </tspan><tspan fill="#7ec8e3" font-weight="600">INTEGER NOT NULL</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="470" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  수량    </tspan><tspan fill="#7ec8e3" font-weight="600">INTEGER</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="470" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  PRIMARY KEY</tspan><tspan fill="#ffffff"> (주문ID, 제품ID)</tspan></text>
  <text x="470" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">);</tspan></text>

  <text x="470" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">두 열의 조합이 유일하면 복합 PK 사용</text>
  <text x="470" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ORM 사용 시 대리 키(surrogate key)를</text>
  <text x="470" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">별도 추가하는 경우가 많음</text>
  <text x="470" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">(주문ID, 제품ID) 조합으로 행 유일 식별</text>

  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">테이블 설계 시 제약 조건은 생성 시점에 선언 — 나중에 추가하면 기존 데이터 검증 필요</text>
</svg>
