<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
      .mono { font-family: 'JetBrains Mono','Menlo','Consolas',monospace; }
    </style>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">같은 문제, 다른 접근 방식</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">예제: 이메일이 스팸인지 판단하기</text>

  <!-- Left: Symbolic -->
  <rect x="60" y="84" width="360" height="30" rx="6" fill="#1a1a2e"/>
  <text x="240" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">기호주의 접근 (규칙 기반)</text>

  <rect x="60" y="120" width="360" height="216" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="76" y="143" class="mono" font-size="12" fill="#7ec8e3">def</text>
  <text xml:space="preserve" x="108" y="143" class="mono" font-size="12" fill="#e8e8e8">is_spam_rule_based(email):</text>
  <text xml:space="preserve" x="76" y="161" class="mono" font-size="12" fill="#6a8aa0">    # 전문가가 직접 작성한 규칙들</text>
  <text xml:space="preserve" x="76" y="179" class="mono" font-size="12" fill="#7ec8e3">    if</text>
  <text xml:space="preserve" x="104" y="179" class="mono" font-size="12" fill="#e8e8e8">"무료" in email</text>
  <text xml:space="preserve" x="104" y="197" class="mono" font-size="12" fill="#7ec8e3">        and</text>
  <text xml:space="preserve" x="146" y="197" class="mono" font-size="12" fill="#e8e8e8">"클릭" in email:</text>
  <text xml:space="preserve" x="76" y="215" class="mono" font-size="12" fill="#7ec8e3">        return</text>
  <text xml:space="preserve" x="138" y="215" class="mono" font-size="12" fill="#ce9178">True</text>
  <text xml:space="preserve" x="76" y="233" class="mono" font-size="12" fill="#7ec8e3">    if</text>
  <text xml:space="preserve" x="104" y="233" class="mono" font-size="12" fill="#e8e8e8">sender.endswith(</text>
  <text xml:space="preserve" x="104" y="251" class="mono" font-size="12" fill="#ce9178">        ".ru"</text>
  <text xml:space="preserve" x="138" y="251" class="mono" font-size="12" fill="#e8e8e8">):</text>
  <text xml:space="preserve" x="76" y="269" class="mono" font-size="12" fill="#7ec8e3">        return</text>
  <text xml:space="preserve" x="138" y="269" class="mono" font-size="12" fill="#ce9178">True</text>
  <text xml:space="preserve" x="76" y="287" class="mono" font-size="12" fill="#7ec8e3">    return</text>
  <text xml:space="preserve" x="124" y="287" class="mono" font-size="12" fill="#ce9178">False</text>
  <text xml:space="preserve" x="76" y="323" class="mono" font-size="12" fill="#6a8aa0">    # 규칙이 틀리면? 직접 수정 필요</text>

  <!-- Right: Statistical -->
  <rect x="460" y="84" width="360" height="30" rx="6" fill="#0e2010"/>
  <text x="640" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">통계적 접근 (ML 기반)</text>

  <rect x="460" y="120" width="360" height="216" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="476" y="143" class="mono" font-size="12" fill="#7ec8e3">from</text>
  <text xml:space="preserve" x="512" y="143" class="mono" font-size="12" fill="#e8e8e8">sklearn.naive_bayes</text>
  <text xml:space="preserve" x="476" y="161" class="mono" font-size="12" fill="#7ec8e3">    import</text>
  <text xml:space="preserve" x="534" y="161" class="mono" font-size="12" fill="#e8e8e8">MultinomialNB</text>
  <text xml:space="preserve" x="476" y="179" class="mono" font-size="12" fill="#e8e8e8">model = MultinomialNB()</text>
  <text xml:space="preserve" x="476" y="197" class="mono" font-size="12" fill="#6a8aa0">  # 스팸/정상 이메일 데이터로 학습</text>
  <text xml:space="preserve" x="476" y="215" class="mono" font-size="12" fill="#e8e8e8">model.fit(X_train, y_train)</text>
  <text xml:space="preserve" x="476" y="233" class="mono" font-size="12" fill="#6a8aa0">  # 예측 (규칙 없이 패턴으로)</text>
  <text xml:space="preserve" x="476" y="251" class="mono" font-size="12" fill="#e8e8e8">pred = model.predict(</text>
  <text xml:space="preserve" x="476" y="269" class="mono" font-size="12" fill="#e8e8e8">    [new_email]</text>
  <text xml:space="preserve" x="476" y="287" class="mono" font-size="12" fill="#e8e8e8">)</text>
  <text xml:space="preserve" x="476" y="323" class="mono" font-size="12" fill="#6a8aa0">  # 데이터가 많을수록 정확도 향상</text>

  <!-- Insight box -->
  <rect x="60" y="356" width="760" height="76" rx="8" fill="#111"/>
  <text x="440" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">현대 AI의 답: 두 방식의 결합 (Neuro-symbolic AI)</text>
  <text x="440" y="400" text-anchor="middle" font-size="12" fill="#aaa">LLM은 통계적 학습으로 언어를 이해하고, RAG·도구 사용으로 기호적 지식(DB, API, 계산기)에 접근한다</text>
  <text x="440" y="420" text-anchor="middle" font-size="12" fill="#aaa">통계적 AI가 주류이지만, 지식 그래프·온톨로지 같은 기호주의 AI의 유산이 실용 시스템에 녹아 있다</text>

  <!-- Footer -->
  <text x="440" y="464" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
