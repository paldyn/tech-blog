<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Qwik — Resumability vs Hydration</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">SSR HTML → 이벤트 발생 시 필요한 코드만 지연 로드</text>

  <!-- Traditional Hydration -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">전통적 Hydration (React/Next.js)</text>

  <rect x="60" y="118" width="145" height="52" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="132" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">서버 HTML</text>
  <text x="132" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정적 페이지</text>

  <line x1="205" y1="144" x2="235" y2="144" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <rect x="240" y="118" width="160" height="52" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="320" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">전체 JS 다운로드</text>
  <text x="320" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">느린 TTI</text>
  <text x="320" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모든 컴포넌트 재실행</text>

  <line x1="400" y1="144" x2="430" y2="144" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <rect x="435" y="118" width="160" height="52" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="515" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Hydration 완료</text>
  <text x="515" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이제 인터랙션 가능</text>

  <!-- Qwik Resumability -->
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Qwik Resumability</text>

  <rect x="60" y="222" width="145" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="132" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">서버 HTML</text>
  <text x="132" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">+ 직렬화된 상태</text>

  <line x1="205" y1="248" x2="235" y2="248" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="240" y="222" width="200" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="340" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">즉시 인터랙션 가능!</text>
  <text x="340" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">최소 JS (~1KB 런타임)</text>

  <line x1="440" y1="248" x2="470" y2="248" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="475" y="222" width="180" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="565" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">클릭 이벤트 발생</text>
  <text x="565" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">핸들러 코드만 로드</text>

  <line x1="655" y1="248" x2="685" y2="248" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="690" y="222" width="130" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O(1) 실행</text>
  <text x="755" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">나머지는 필요 시</text>

  <!-- Code blocks -->
  <rect x="60" y="300" width="760" height="196" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// Qwik 컴포넌트 — $ 접미사가 지연 로딩 경계</text>
  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan> { component$, useSignal } <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">'@builder.io/qwik'</tspan></text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"></text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> Counter = component$(() =&gt; {</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> count = useSignal(<tspan fill="#b5cea8">0</tspan>)   <tspan fill="#9aa4b8">// 서버 상태 직렬화</tspan></text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> (</text>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    &lt;button onClick$={() =&gt; count.value++}&gt;  <tspan fill="#9aa4b8">// $ = 지연 로딩 핸들러</tspan></text>
  <text x="76" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      Count: &#123;count.value&#125;</text>
  <text x="76" y="482" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    &lt;/button&gt;</text>
  <text x="76" y="498" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  )</text>
</svg>
