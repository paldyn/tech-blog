  <rect x="60" y="390" width="380" height="74" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
