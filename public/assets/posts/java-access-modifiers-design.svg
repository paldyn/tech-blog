  <rect x="60" y="90" width="340" height="226" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <!-- line 1 -->
  <text x="76" y="111" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">public class</text>
  <text x="183" y="111" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
