  <rect x="460" y="414" width="360" height="52" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
