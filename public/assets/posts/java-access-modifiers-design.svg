  <!-- pattern 3: method -->
  <rect x="460" y="262" width="360" height="72" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
