  <text x="710" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">정적 타입 언어</text>
  <line x1="620" y1="168" x2="800" y2="168" stroke="#1e3a4e" stroke-width="1"/>
