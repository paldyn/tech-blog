  <text x="147" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컴파일 타임 오류 검출</text>
  <text x="147" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">런타임 버그 예방</text>
  <rect x="255" y="302" width="175" height="72" rx="6" fill="#111122" stroke="#3a3a6e" stroke-width="1"/>
