<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 본질: 타입이 있는 JavaScript</text>

  <rect x="60" y="75" width="220" height="60" rx="8" fill="#1a1a0a" stroke="#e8c840" stroke-width="2"/>
  <text x="170" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8c840" text-anchor="middle">JavaScript</text>
  <text x="170" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">동적 타입 · 런타임 오류</text>

  <line x1="280" y1="105" x2="348" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="314" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">슈퍼셋</text>

  <rect x="350" y="75" width="220" height="60" rx="8" fill="#0a1a2a" stroke="#3178c6" stroke-width="2"/>
  <text x="460" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">TypeScript</text>
  <text x="460" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">정적 타입 · 컴파일 타임 오류</text>

  <line x1="570" y1="105" x2="638" y2="105" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="604" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컴파일</text>

  <rect x="640" y="75" width="180" height="60" rx="8" fill="#1a1a0a" stroke="#e8c840" stroke-width="1"/>
  <text x="730" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c840" text-anchor="middle">.js 출력</text>
  <text x="730" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">브라우저 · Node.js 실행</text>

  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">TypeScript 3대 핵심 가치</text>

  <rect x="60" y="200" width="240" height="100" rx="8" fill="#0f1f2f" stroke="#3178c6" stroke-width="1.5"/>
  <text x="180" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">정적 타입 검사</text>
  <text x="180" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">코드 실행 전 오류 감지</text>
  <text x="180" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">타입 불일치 · undefined 접근 방지</text>
  <text x="180" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">리팩터링 안전성 보장</text>

  <rect x="320" y="200" width="240" height="100" rx="8" fill="#0f2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">IDE 자동완성</text>
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">타입 기반 인텔리센스</text>
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메서드 · 프로퍼티 자동 제안</text>
  <text x="440" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Go-to-definition 정확도 향상</text>

  <rect x="580" y="200" width="240" height="100" rx="8" fill="#2a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="700" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">문서화 효과</text>
  <text x="700" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">타입 선언 = 살아있는 문서</text>
  <text x="700" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">함수 시그니처로 의도 표현</text>
  <text x="700" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">협업 · 유지보수 비용 감소</text>

  <rect x="60" y="325" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="349" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// JavaScript: 런타임에 터짐</text>
  <text x="76" y="369" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> greet(name) { <tspan fill="#7ec8e3" font-weight="600">return</tspan> name.toUpperCase(); }</text>
  <text x="76" y="393" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// TypeScript: 컴파일 타임에 잡힘</text>
  <text x="76" y="413" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> greet(name: <tspan fill="#ce9178">string</tspan>): <tspan fill="#ce9178">string</tspan> {</text>
  <text x="76" y="433" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> name.toUpperCase(); }</text>
</svg>
