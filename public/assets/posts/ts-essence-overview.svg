<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TypeScript의 본질</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">JavaScript 위에 타입 시스템을 얹은 언어</text>
  <!-- TS outer box -->
  <rect x="60" y="95" width="760" height="315" rx="10" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">TypeScript</text>
  <!-- JS inner box -->
  <rect x="200" y="138" width="480" height="225" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="440" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">JavaScript (ES2015+)</text>
  <!-- JS features -->
  <text x="310" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">변수 / 함수 / 클래스</text>
  <text x="310" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">모듈 / Promise / 이터레이터</text>
  <text x="310" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">프로토타입 체인 / 클로저</text>
  <text x="570" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Spread / Destructuring</text>
  <text x="570" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Generator / async/await</text>
  <text x="570" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Symbol / BigInt / WeakRef</text>
  <line x1="440" y1="172" x2="440" y2="348" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="440" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">모든 유효한 JavaScript는 유효한 TypeScript</text>
  <!-- TS-only left -->
  <text x="130" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">타입 주석</text>
  <text x="130" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">x: number</text>
  <text x="130" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">인터페이스</text>
  <text x="130" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">interface User {}</text>
  <text x="130" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">제네릭</text>
  <text x="130" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Array&lt;T&gt;</text>
  <!-- TS-only right -->
  <text x="750" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">열거형</text>
  <text x="750" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">enum Direction</text>
  <text x="750" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">타입 가드</text>
  <text x="750" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">typeof / instanceof</text>
  <text x="750" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">유틸리티 타입</text>
  <text x="750" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Partial / Required</text>
  <!-- Bottom facts -->
  <rect x="60" y="430" width="230" height="68" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="453" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">컴파일 타임 타입 검사</text>
  <text x="175" y="473" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행 전 에러 미리 발견</text>
  <text x="175" y="489" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">런타임 오버헤드 없음</text>
  <rect x="325" y="430" width="230" height="68" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="453" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">점진적 도입 가능</text>
  <text x="440" y="473" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기존 JS 프로젝트에 단계적으로</text>
  <text x="440" y="489" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">allowJs / checkJs 옵션</text>
  <rect x="590" y="430" width="230" height="68" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="453" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">2012년 Microsoft 발표</text>
  <text x="705" y="473" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Anders Hejlsberg 설계</text>
  <text x="705" y="489" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">오픈소스 (Apache 2.0)</text>
</svg>
