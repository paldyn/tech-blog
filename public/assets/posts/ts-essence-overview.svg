  <text x="537" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타입이 곧 문서</text>
  <text x="537" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">API 계약 명확화</text>
  <rect x="645" y="302" width="175" height="72" rx="6" fill="#111122" stroke="#3a3a6e" stroke-width="1"/>
  <text x="732" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">JS 완전 호환</text>
  <text x="732" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모든 JS 코드 동작</text>
  <text x="732" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">점진적 마이그레이션</text>
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TypeScript 코드는 컴파일 후 JavaScript로 변환 — 모든 JS 런타임에서 실행 가능</text>
  <circle cx="440" cy="463" r="18" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="469" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">TS</text>
