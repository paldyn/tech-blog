  <text x="710" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">대규모 협업 최적화</text>
  <text x="440" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">TypeScript의 핵심 가치</text>
  <rect x="60" y="302" width="175" height="72" rx="6" fill="#111122" stroke="#3a3a6e" stroke-width="1"/>
