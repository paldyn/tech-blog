<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">awk 필드 분리 메커니즘</text>

  <!-- FS = space (default) -->
  <rect x="60" y="75" width="760" height="95" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">FS = " " (기본값: 연속 공백 처리)</text>
  <text x="80" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#ffffff" xml:space="preserve">  Alice   30    Engineer    Seoul</text>

  <!-- Field labels -->
  <rect x="80" y="140" width="60" height="22" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="110" y="156" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">$1=Alice</text>
  <rect x="200" y="140" width="40" height="22" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="220" y="156" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">$2=30</text>
  <rect x="350" y="140" width="90" height="22" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="395" y="156" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">$3=Engineer</text>
  <rect x="570" y="140" width="60" height="22" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="600" y="156" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">$4=Seoul</text>

  <!-- OFS effect -->
  <rect x="60" y="195" width="760" height="85" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">OFS 효과: 필드 재할당 시 적용</text>
  <text x="80" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">awk <tspan fill="#ce9178">'BEGIN{OFS=","} {$1=$1; print}'</tspan> users.txt</text>
  <text x="80" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve"><tspan fill="#9aa4b8"># → Alice,30,Engineer,Seoul  ($1=$1 은 $0 재구성 트리거)</tspan></text>

  <!-- RS = multi-char -->
  <rect x="60" y="300" width="760" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">RS: 레코드 구분자 변경 — 여러 줄을 하나의 레코드로</text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">awk <tspan fill="#ce9178">'BEGIN{RS=""; FS="\n"}'</tspan> paragraphs.txt  <tspan fill="#9aa4b8"># 단락 단위 처리</tspan></text>
  <text x="80" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">awk <tspan fill="#ce9178">'BEGIN{RS="---\n"}'</tspan> sections.txt     <tspan fill="#9aa4b8"># --- 구분 섹션 처리</tspan></text>
</svg>
