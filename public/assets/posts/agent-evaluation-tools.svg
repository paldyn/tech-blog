<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LangSmith 평가 파이프라인</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">테스트 데이터셋 → 에이전트 실행 → 자동 평가 → 대시보드 비교</text>

  <!-- Pipeline flow -->
  <!-- Dataset -->
  <rect x="40" y="100" width="140" height="70" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="110" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Dataset</text>
  <text x="110" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Q&A 쌍 / 도구</text>
  <text x="110" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용 트레이스</text>

  <line x1="180" y1="135" x2="218" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Agent Runs -->
  <rect x="220" y="100" width="140" height="70" rx="8" fill="#1a0f0a" stroke="#e0a855" stroke-width="1.5"/>
  <text x="290" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">Agent Runs</text>
  <text x="290" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">병렬 실행</text>
  <text x="290" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">트레이스 수집</text>

  <line x1="360" y1="135" x2="398" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Evaluators -->
  <rect x="400" y="100" width="140" height="70" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Evaluators</text>
  <text x="470" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Exact Match</text>
  <text x="470" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">LLM Judge</text>
  <text x="470" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Custom</text>

  <line x1="540" y1="135" x2="578" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Dashboard -->
  <rect x="580" y="100" width="140" height="70" rx="8" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Dashboard</text>
  <text x="650" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">점수 비교</text>
  <text x="650" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">회귀 감지</text>

  <line x1="720" y1="135" x2="758" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Improvement -->
  <rect x="760" y="100" width="90" height="70" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="805" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">개선</text>
  <text x="805" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">프롬프트</text>
  <text x="805" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">튜닝</text>

  <!-- Code block -->
  <rect x="40" y="196" width="800" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="60" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># LangSmith 평가 파이프라인</text>
  <text x="60" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="60" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      langsmith import Client</text>
  <text x="60" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ls_client = Client()</text>
  <text x="60" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 데이터셋 생성</text>
  <text x="60" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">dataset = ls_client.create_dataset(</text>
  <text x="60" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                                   "agent-eval-v1"</text>
  <text x="60" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                  )</text>
  <text x="60" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 평가 실행 (병렬)</text>
  <text x="60" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">results = evaluate(agent_function, data=</text>
  <text x="60" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                                        "agent-eval-v1"</text>
  <text x="60" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                       ,</text>
  <text x="60" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                   evaluators=[correctness_eval, trajectory_eval],</text>
  <text x="60" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                                                                   max_concurrency=</text>
  <text x="60" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">                                                                                    10</text>
  <text x="60" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                                                      )</text>
</svg>
