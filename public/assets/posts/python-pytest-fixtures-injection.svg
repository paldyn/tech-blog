<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">fixture는 인자 이름으로 주입된다</text>

  <defs>
    <marker id="arr4" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect x="60" y="86" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">@pytest.fixture</text>
  <text xml:space="preserve" x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="118" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">sample_user</text>
  <text xml:space="preserve" x="222" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">():</text>
  <text xml:space="preserve" x="100" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text xml:space="preserve" x="162" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">User(name="kim")</text>

  <text xml:space="preserve" x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="118" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_name(</text>
  <text xml:space="preserve" x="214" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">sample_user</text>
  <text xml:space="preserve" x="318" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">):</text>
  <text xml:space="preserve" x="100" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">assert</text>
  <text xml:space="preserve" x="162" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sample_user.name == "kim"</text>

  <path d="M 150 150 C 150 185, 150 185, 150 204" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr4)"/>
  <path d="M 300 150 C 360 178, 300 178, 268 204" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr4)"/>

  <text x="60" y="300" font-size="13" fill="#888" xml:space="preserve">fixture 함수의 이름과 똑같은 인자를 적으면, pytest가 그 반환값을 자동으로 넣어준다.</text>
</svg>
