<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">토큰 편향 워터마크 작동 원리</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Kirchenbauer et al. 2023 — LLM 텍스트 워터마크 표준 방법론</text>

  <!-- Step 1: Generation -->
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">① 생성 단계</text>

  <rect x="60" y="120" width="360" height="120" rx="10" fill="#0a1820" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">이전 토큰을 시드로 사용</text>
  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">hash(이전 토큰, 비밀 키) → 랜덤 시드</text>

  <!-- Token split visualization -->
  <rect x="80" y="178" width="80" height="28" rx="4" fill="#0a4a0a" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Green 토큰</text>

  <rect x="172" y="178" width="80" height="28" rx="4" fill="#4a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="212" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Red 토큰</text>

  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 50% Green 목록, 50% Red 목록 무작위 분류</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 생성 시 Green 토큰 logit +δ 편향</text>

  <!-- Arrow right -->
  <line x1="430" y1="180" x2="460" y2="180" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Detection -->
  <text x="480" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">② 검출 단계</text>

  <rect x="460" y="120" width="360" height="120" rx="10" fill="#0a1820" stroke="#7ec8e3" stroke-width="1"/>
  <text x="480" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">비밀 키로 Green/Red 재분류</text>
  <text x="480" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">텍스트의 각 토큰이 Green인지 확인</text>

  <!-- Statistics box -->
  <rect x="480" y="178" width="320" height="50" rx="6" fill="#101820" stroke="#7777cc" stroke-width="1"/>
  <text x="500" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Green 토큰 비율 ≫ 0.5 → AI 생성</text>
  <text x="500" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">z-test로 통계적 유의성 검증 (p &lt; 0.01)</text>

  <text x="480" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인간이 쓴 텍스트: ~50% Green (무작위)</text>
  <text x="480" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">워터마크 텍스트: ~75% Green (편향)</text>

  <!-- Code box -->
  <rect x="60" y="270" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text x="124" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> markllm </text>
  <text x="236" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text x="300" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> AutoWatermark</text>
  <text x="76" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">wm = AutoWatermark.load(</text>
  <text x="76" y="312" xml:space="preserve" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"/>
  <text x="76" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    </text>
  <text x="94" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'KGW'</text>
  <text x="148" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, algorithm_config=cfg, transformers_config=tcfg)</text>
  <text x="76" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">watermarked_text = wm.generate_watermarked_text(prompt)</text>
  <text x="76" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">result = wm.detect(watermarked_text)   </text>
  <text x="550" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># {'is_watermarked': True, 'score': 0.83}</text>

  <!-- Note -->
  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">한계: 워터마크된 텍스트를 paraphrase(의역)하면 신호가 약해질 수 있음</text>
</svg>
