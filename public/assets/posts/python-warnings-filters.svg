<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">경고 필터 액션 (filterwarnings)</text>

  <!-- Filter action table -->
  <rect x="55" y="65" width="770" height="40" rx="6" fill="#0c1628" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="91" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">액션</text>
  <text x="500" y="91" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">동작</text>
  <text x="750" y="91" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">주요 사용처</text>
  <line x1="310" y1="65" x2="310" y2="285" stroke="#2a3d5e" stroke-width="1"/>
  <line x1="680" y1="65" x2="680" y2="285" stroke="#2a3d5e" stroke-width="1"/>

  <!-- Rows -->
  <rect x="55" y="105" width="770" height="36" rx="0" fill="#1a0c0c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="128" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">"error"</text>
  <text x="490" y="128" text-anchor="middle" font-size="12" fill="#e8e8e8">경고를 예외로 변환하여 프로그램 중단</text>
  <text x="750" y="128" text-anchor="middle" font-size="11" fill="#888">테스트, CI 환경</text>

  <rect x="55" y="141" width="770" height="36" rx="0" fill="#0c1628" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"ignore"</text>
  <text x="490" y="164" text-anchor="middle" font-size="12" fill="#e8e8e8">경고를 완전히 숨김</text>
  <text x="750" y="164" text-anchor="middle" font-size="11" fill="#888">서드파티 라이브러리 노이즈 제거</text>

  <rect x="55" y="177" width="770" height="36" rx="0" fill="#0c1628" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">"always"</text>
  <text x="490" y="200" text-anchor="middle" font-size="12" fill="#e8e8e8">매번 경고 출력 (같은 위치라도)</text>
  <text x="750" y="200" text-anchor="middle" font-size="11" fill="#888">디버깅, 상세 출력</text>

  <rect x="55" y="213" width="770" height="36" rx="0" fill="#0c1628" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">"once"</text>
  <text x="490" y="236" text-anchor="middle" font-size="12" fill="#e8e8e8">처음 한 번만 출력 (기본값에 가까움)</text>
  <text x="750" y="236" text-anchor="middle" font-size="11" fill="#888">일반적인 개발 환경</text>

  <rect x="55" y="249" width="770" height="36" rx="0" fill="#0c1628" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="272" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">"default"</text>
  <text x="490" y="272" text-anchor="middle" font-size="12" fill="#e8e8e8">위치별 첫 번째 발생만 출력</text>
  <text x="750" y="272" text-anchor="middle" font-size="11" fill="#888">기본 동작</text>

  <!-- CLI tip -->
  <rect x="55" y="305" width="770" height="38" rx="6" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="319" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">CLI 옵션</text>
  <text x="440" y="337" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">python -W error::DeprecationWarning script.py  또는  PYTHONWARNINGS=error python script.py</text>
</svg>
