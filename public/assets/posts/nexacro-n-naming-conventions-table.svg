<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 네이밍 컨벤션 체계</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">컴포넌트 / Dataset / 변수 / 함수 접두사 규칙</text>

  <!-- Header row -->
  <rect x="60" y="96" width="760" height="36" rx="4" fill="#1e2433"/>
  <text x="120" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">유형</text>
  <text x="280" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">접두사</text>
  <text x="420" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">예시</text>
  <text x="620" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">비고</text>

  <!-- Row 1 -->
  <rect x="60" y="132" width="760" height="34" rx="0" fill="#111"/>
  <line x1="60" y1="132" x2="820" y2="132" stroke="#222" stroke-width="1"/>
  <text x="120" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Button</text>
  <text x="280" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">btn_</text>
  <text x="420" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">btn_search, btn_save</text>
  <text x="620" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">버튼</text>

  <!-- Row 2 -->
  <rect x="60" y="166" width="760" height="34" rx="0" fill="#0d0d0d"/>
  <line x1="60" y1="166" x2="820" y2="166" stroke="#222" stroke-width="1"/>
  <text x="120" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Edit / MaskEdit</text>
  <text x="280" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">edt_</text>
  <text x="420" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">edt_name, edt_phone</text>
  <text x="620" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">입력 필드</text>

  <!-- Row 3 -->
  <rect x="60" y="200" width="760" height="34" rx="0" fill="#111"/>
  <line x1="60" y1="200" x2="820" y2="200" stroke="#222" stroke-width="1"/>
  <text x="120" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Grid</text>
  <text x="280" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">grd_</text>
  <text x="420" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">grd_list, grd_detail</text>
  <text x="620" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">그리드</text>

  <!-- Row 4 -->
  <rect x="60" y="234" width="760" height="34" rx="0" fill="#0d0d0d"/>
  <line x1="60" y1="234" x2="820" y2="234" stroke="#222" stroke-width="1"/>
  <text x="120" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Dataset</text>
  <text x="280" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">ds_</text>
  <text x="420" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ds_list, ds_search</text>
  <text x="620" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">또는 ds + 파스칼케이스</text>

  <!-- Row 5 -->
  <rect x="60" y="268" width="760" height="34" rx="0" fill="#111"/>
  <line x1="60" y1="268" x2="820" y2="268" stroke="#222" stroke-width="1"/>
  <text x="120" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Div / Container</text>
  <text x="280" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">div_</text>
  <text x="420" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">div_top, div_content</text>
  <text x="620" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨테이너</text>

  <!-- Row 6 -->
  <rect x="60" y="302" width="760" height="34" rx="0" fill="#0d0d0d"/>
  <line x1="60" y1="302" x2="820" y2="302" stroke="#222" stroke-width="1"/>
  <text x="120" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Combo / Select</text>
  <text x="280" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">cbo_</text>
  <text x="420" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cbo_gender, cbo_dept</text>
  <text x="620" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">콤보박스</text>

  <!-- Row 7 -->
  <rect x="60" y="336" width="760" height="34" rx="0" fill="#111"/>
  <line x1="60" y1="336" x2="820" y2="336" stroke="#222" stroke-width="1"/>
  <text x="120" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Calendar</text>
  <text x="280" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">cal_</text>
  <text x="420" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cal_fromDt, cal_toDt</text>
  <text x="620" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">날짜 선택</text>

  <!-- Row 8 -->
  <rect x="60" y="370" width="760" height="34" rx="0" fill="#0d0d0d"/>
  <line x1="60" y1="370" x2="820" y2="370" stroke="#222" stroke-width="1"/>
  <text x="120" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Popup / Overlay</text>
  <text x="280" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">pop_</text>
  <text x="420" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pop_user, pop_dept</text>
  <text x="620" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">팝업</text>

  <!-- Row 9 -->
  <rect x="60" y="404" width="760" height="34" rx="0" fill="#111"/>
  <line x1="60" y1="404" x2="820" y2="404" stroke="#222" stroke-width="1"/>
  <text x="120" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Tab</text>
  <text x="280" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">tab_</text>
  <text x="420" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">tab_main, tab_info</text>
  <text x="620" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">탭 컨트롤</text>

  <!-- Row 10 -->
  <rect x="60" y="438" width="760" height="34" rx="0" fill="#0d0d0d"/>
  <line x1="60" y1="438" x2="820" y2="438" stroke="#222" stroke-width="1"/>
  <text x="120" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Static (라벨)</text>
  <text x="280" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">stc_</text>
  <text x="420" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">stc_title, stc_total</text>
  <text x="620" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">텍스트 표시</text>

  <line x1="60" y1="472" x2="820" y2="472" stroke="#222" stroke-width="1"/>
</svg>
