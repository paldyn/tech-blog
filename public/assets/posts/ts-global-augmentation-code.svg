<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">Window와 globalThis 확장하기</text>

  <rect x="60" y="80" width="760" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="80" y="108" fill="#9aa4b8">// global.d.ts — 반드시 모듈이어야 함</tspan>
    <tspan x="80" y="128" fill="#7ec8e3" font-weight="600">export</tspan><tspan fill="#ffffff"> {};  </tspan><tspan fill="#9aa4b8">// 빈 export로 모듈화</tspan>
    <tspan x="80" y="156" fill="#7ec8e3" font-weight="600">declare global</tspan><tspan fill="#ffffff"> {</tspan>
    <tspan x="80" y="176" fill="#7ec8e3" font-weight="600">  interface</tspan><tspan fill="#ffffff"> Window {</tspan>
    <tspan x="80" y="196" fill="#ffffff">    dataLayer: unknown[];</tspan>
    <tspan x="80" y="216" fill="#ffffff">  }</tspan>
    <tspan x="80" y="236" fill="#ffffff">  var __APP_VERSION__: string;</tspan>
    <tspan x="80" y="256" fill="#ffffff">}</tspan>
    <tspan x="80" y="284" fill="#ffffff">window.dataLayer.push({ event: </tspan><tspan fill="#ce9178">'ok'</tspan><tspan fill="#ffffff"> });</tspan>
  </text>
</svg>
