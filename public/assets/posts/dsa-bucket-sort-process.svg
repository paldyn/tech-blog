  <text x="448" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.21</text>
  <rect x="480" y="90" width="56" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="508" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.12</text>
  <rect x="540" y="90" width="56" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="568" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.23</text>
