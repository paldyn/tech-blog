  <rect x="60" y="366" width="56" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="88" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">.12</text>
  <rect x="120" y="366" width="56" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="148" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">.17</text>
  <rect x="180" y="366" width="56" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="208" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">.21</text>
  <rect x="240" y="366" width="56" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="268" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">.23</text>
  <rect x="300" y="366" width="56" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="328" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">.26</text>
  <rect x="360" y="366" width="56" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="388" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">.39</text>
  <rect x="420" y="366" width="56" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="448" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">.68</text>
  <rect x="480" y="366" width="56" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="508" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">.72</text>
  <rect x="540" y="366" width="56" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="568" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">.78</text>
  <rect x="600" y="366" width="56" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="628" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">.94</text>

  <!-- Complexity note -->
  <rect x="680" y="340" width="168" height="100" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="764" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">복잡도</text>
  <text x="696" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">평균: <tspan font-weight="700" fill="#55c555">O(N)</tspan></text>
  <text x="696" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">최악: <tspan fill="#e05555">O(N²)</tspan></text>
  <text x="696" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">균등 분포 가정 시 O(N)</text>
  <text x="696" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="1" fill="#000">.</text>
</svg>
