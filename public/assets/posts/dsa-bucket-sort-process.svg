  <text x="436" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">empty</text>

  <!-- Bucket 6: .68 -->
  <rect x="485" y="175" width="72" height="90" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="521" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">B[6]</text>
  <text x="521" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0.6-0.7</text>
  <text x="521" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">.68</text>

  <!-- Bucket 7: .78, .72 -->
  <rect x="570" y="175" width="72" height="90" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="606" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">B[7]</text>
  <text x="606" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0.7-0.8</text>
  <text x="606" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">.78</text>
  <text x="606" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">.72</text>

  <!-- Bucket 9: .94 -->
  <rect x="655" y="175" width="72" height="90" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="691" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">B[9]</text>
  <text x="691" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0.9-1.0</text>
  <text x="691" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">.94</text>

  <!-- Step 2 label -->
  <text x="60" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">2단계: 각 버킷 내부 정렬 (삽입 정렬 등 소규모 정렬)</text>

