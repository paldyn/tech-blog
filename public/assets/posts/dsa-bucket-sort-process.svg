<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">버킷 정렬: 분배 → 개별 정렬 → 합병</text>

  <!-- Input array -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">입력 [0.0 ~ 1.0 균등 분포]</text>
  <!-- values: 0.78, 0.17, 0.39, 0.26, 0.72, 0.94, 0.21, 0.12, 0.23, 0.68 -->
  <rect x="60" y="90" width="56" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.78</text>
  <rect x="120" y="90" width="56" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="148" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.17</text>
  <rect x="180" y="90" width="56" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="208" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.39</text>
  <rect x="240" y="90" width="56" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="268" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.26</text>
  <rect x="300" y="90" width="56" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="328" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.72</text>
  <rect x="360" y="90" width="56" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="388" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.94</text>
