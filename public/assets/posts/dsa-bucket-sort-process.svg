  <text x="628" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">.68</text>

  <text x="670" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">n = 10</text>
  <text x="670" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">버킷 수 = 10</text>

  <!-- Arrow down -->
  <line x1="340" y1="138" x2="340" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="356" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">1단계: 분배 (bucket[i] = ⌊n × x⌋)</text>

  <!-- Buckets -->
  <!-- Bucket 0: 0.0-0.1 (empty) -->
  <rect x="60" y="175" width="72" height="90" rx="6" fill="#0f1218" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">B[0]</text>
  <text x="96" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#444">0.0-0.1</text>
  <text x="96" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">empty</text>

  <!-- Bucket 1: 0.1-0.2 (.17, .12) -->
  <rect x="145" y="175" width="72" height="90" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="181" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">B[1]</text>
  <text x="181" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0.1-0.2</text>
  <text x="181" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">.17</text>
  <text x="181" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">.12</text>

  <!-- Bucket 2: 0.2-0.3 (.26, .21, .23) -->
  <rect x="230" y="175" width="72" height="90" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="266" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">B[2]</text>
  <text x="266" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0.2-0.3</text>
  <text x="266" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">.26</text>
  <text x="266" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">.21</text>
  <text x="266" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">.23</text>

  <!-- Bucket 3: 0.3-0.4 (.39) -->
  <rect x="315" y="175" width="72" height="90" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="351" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">B[3]</text>
  <text x="351" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0.3-0.4</text>
  <text x="351" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">.39</text>

