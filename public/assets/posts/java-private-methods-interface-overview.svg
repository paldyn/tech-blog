<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 9 인터페이스 private 메서드</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">default / static 메서드의 중복 제거 — 구현 캡슐화</text>

  <!-- 인터페이스 박스 (상단 중앙) -->
  <rect x="290" y="100" width="300" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">interface MyInterface</text>
  <text x="440" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Java 9+</text>

  <!-- 3개 메서드 박스 (하단) -->
  <!-- default 메서드 박스 -->
  <rect x="60" y="220" width="220" height="68" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">default 메서드</text>
  <text x="170" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">구현체에 상속됨</text>
  <text x="170" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">public 가시성</text>

  <!-- private 메서드 박스 (중앙, 강조) -->
  <rect x="330" y="205" width="220" height="98" rx="8" fill="#1a0a2e" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">private 메서드</text>
  <text x="440" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인터페이스 내부에서만 호출</text>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">구현체·자식에 상속 안 됨</text>
  <text x="440" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Java 9 추가</text>

  <!-- static 메서드 박스 -->
  <rect x="600" y="220" width="220" height="68" rx="8" fill="#0f0f1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">static 메서드</text>
  <text x="710" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인터페이스명으로 직접 호출</text>
  <text x="710" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">public 가시성</text>

  <!-- 화살표: 인터페이스 → default -->
  <line x1="340" y1="160" x2="215" y2="220" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- 화살표: 인터페이스 → private -->
  <line x1="440" y1="160" x2="440" y2="205" stroke="#e05555" stroke-width="2" marker-end="url(#arr-blue)"/>
  <!-- 화살표: 인터페이스 → static -->
  <line x1="540" y1="160" x2="665" y2="220" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- private 메서드 사용 관계 -->
  <!-- default → private 화살표 (점선) -->
  <path d="M 170 288 Q 270 340 330 270" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-green)"/>
  <text x="210" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">호출 가능</text>

  <!-- static → private static 화살표 (점선) -->
  <path d="M 710 288 Q 620 340 550 270" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-blue)"/>
  <text x="668" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">호출 가능</text>

  <!-- 하단 코드 박스 -->
  <rect x="60" y="375" width="760" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="399" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">interface</text>
  <text x="144" y="399" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> Validator {</text>
  <text x="76" y="417" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">  default</text>
  <text x="153" y="417" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> boolean validate(String s) { </text>
  <text x="76" y="435" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">    </text>
  <text x="103" y="435" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text x="151" y="435" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> !isNullOrEmpty(s); }</text>
  <text x="76" y="453" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">  private</text>
  <text x="151" y="453" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> boolean isNullOrEmpty(String s) {</text>
  <text x="76" y="471" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">    </text>
  <text x="103" y="471" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text x="151" y="471" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> s == </text>
  <text x="194" y="471" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">null</text>
  <text x="225" y="471" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> || s.isEmpty(); }</text>
  <text x="76" y="489" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">}</text>
  <text x="350" y="489" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#9aa4b8">// private 메서드로 공통 로직 분리</text>
</svg>
