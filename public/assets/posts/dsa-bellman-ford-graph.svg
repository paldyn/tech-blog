<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-neg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-sp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">벨만-포드 — 음수 간선 그래프</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">빨간 간선 = 음수 가중치 | 초록 = 최단 경로</text>

  <!-- Nodes: S(120,250), A(280,130), B(280,370), C(460,250), D(620,130), E(620,370) -->

  <!-- Edges -->
  <!-- S→A: 6 -->
  <line x1="148" y1="238" x2="258" y2="148" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="193" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">6</text>

  <!-- S→B: 7 — shortest path part -->
  <line x1="148" y1="262" x2="258" y2="362" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-sp)"/>
  <text x="193" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle" font-weight="600">7</text>

  <!-- A→C: 5 -->
  <line x1="308" y1="138" x2="436" y2="242" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="367" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">5</text>

  <!-- A→B: -3 (negative) -->
  <line x1="280" y1="160" x2="280" y2="348" stroke="#e05555" stroke-width="2" marker-end="url(#arr-neg)"/>
  <text x="254" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" text-anchor="middle" font-weight="600">-3</text>

  <!-- B→C: 4 — shortest path -->
  <line x1="308" y1="362" x2="434" y2="260" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-sp)"/>
  <text x="376" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle" font-weight="600">4</text>

  <!-- B→E: 2 -->
  <line x1="308" y1="378" x2="590" y2="378" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="449" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">2</text>

  <!-- C→D: -4 (negative) — shortest path -->
  <line x1="488" y1="240" x2="594" y2="148" stroke="#e05555" stroke-width="2.5" marker-end="url(#arr-neg)"/>
  <text x="546" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" text-anchor="middle" font-weight="600">-4</text>

  <!-- C→E: 2 — shortest path -->
  <line x1="488" y1="260" x2="592" y2="360" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-sp)"/>
  <text x="545" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle" font-weight="600">2</text>

  <!-- D→E: -1 (negative) -->
  <line x1="620" y1="158" x2="620" y2="348" stroke="#e05555" stroke-width="2" marker-end="url(#arr-neg)"/>
  <text x="648" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" text-anchor="middle" font-weight="600">-1</text>

  <!-- Nodes -->
  <circle cx="120" cy="250" r="28" fill="#1a3a5e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">S</text>
  <text x="120" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">dist=0</text>

  <circle cx="280" cy="130" r="28" fill="#111" stroke="#555" stroke-width="2"/>
  <text x="280" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">A</text>
  <text x="280" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">dist=6</text>

  <circle cx="280" cy="370" r="28" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="280" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">B</text>
  <text x="280" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">dist=7</text>

  <circle cx="460" cy="250" r="28" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="460" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">C</text>
  <text x="460" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">dist=11</text>

  <circle cx="620" cy="130" r="28" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="620" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">D</text>
  <text x="620" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">dist=7</text>

  <circle cx="620" cy="370" r="28" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="620" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">E</text>
  <text x="620" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">dist=13</text>

  <!-- Info box -->
  <rect x="680" y="90" width="180" height="120" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="770" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">간선 완화 순서</text>
  <text x="700" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">이터1: S→A=6, S→B=7</text>
  <text x="700" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">이터2: A→B=3,B→C=11</text>
  <text x="700" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">이터3: C→D=7</text>

  <!-- Neg cycle warning box -->
  <rect x="680" y="230" width="180" height="100" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="770" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" font-weight="600" text-anchor="middle">음수 사이클</text>
  <text x="700" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">V-1번 이후에도</text>
  <text x="700" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">갱신 발생 시 탐지</text>

  <!-- Complexity box -->
  <rect x="680" y="350" width="180" height="80" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="770" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">시간 복잡도</text>
  <text x="770" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7ec8e3" font-weight="600" text-anchor="middle">O(V × E)</text>
</svg>
