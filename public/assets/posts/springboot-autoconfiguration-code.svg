<svg width="880" viewBox="0 0 880 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@Conditional 계열 애노테이션</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Auto-Configuration이 빈을 언제 등록할지 결정하는 조건 애노테이션들</text>

  <!-- Left: Auto-config class example -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">DataSourceAutoConfiguration 단순화 예</text>
  <rect x="60" y="114" width="370" height="300" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">@AutoConfiguration</tspan></text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">@ConditionalOnClass</tspan><tspan fill="#e8e8e8">({</tspan></text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#e8e8e8">DataSource.class,</tspan></text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#e8e8e8">EmbeddedDatabaseType.class</tspan></text>
  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">})</tspan></text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">@ConditionalOnMissingBean</tspan></text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#e8e8e8">(</tspan><tspan fill="#e8e8e8">DataSource.class</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">public class </tspan><tspan fill="#e8e8e8">DataSourceAutoConfiguration {</tspan></text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> </text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">@Bean</tspan></text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">@ConditionalOnProperty</tspan><tspan fill="#e8e8e8">(</tspan></text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      <tspan fill="#7ec8e3">prefix</tspan><tspan fill="#e8e8e8"> = </tspan><tspan fill="#ce9178">"spring.datasource"</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      <tspan fill="#7ec8e3">name</tspan><tspan fill="#e8e8e8"> = </tspan><tspan fill="#ce9178">"url"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#e8e8e8">DataSource </tspan><tspan fill="#e8e8e8">dataSource(...) { ... }</tspan></text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">}</tspan></text>

  <!-- Right: @Conditional table -->
  <text x="450" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">주요 @Conditional 계열 정리</text>
  <rect x="450" y="114" width="370" height="300" fill="#111" rx="6" stroke="#1e2433" stroke-width="1"/>

  <!-- Table header -->
  <rect x="450" y="114" width="370" height="32" fill="#1e2433" rx="6"/>
  <rect x="450" y="130" width="370" height="16" fill="#1e2433"/>
  <text x="462" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">애노테이션</text>
  <text x="680" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">조건</text>

  <!-- Row 1 -->
  <text x="462" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@ConditionalOnClass</text>
  <text x="680" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클래스가 CP에 있을 때</text>

  <!-- Row 2 -->
  <rect x="450" y="168" width="370" height="24" fill="#0f1218"/>
  <text x="462" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@ConditionalOnMissingClass</text>
  <text x="680" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클래스가 CP에 없을 때</text>

  <!-- Row 3 -->
  <text x="462" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@ConditionalOnBean</text>
  <text x="680" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">빈이 이미 있을 때</text>

  <!-- Row 4 -->
  <rect x="450" y="214" width="370" height="24" fill="#0f1218"/>
  <text x="462" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@ConditionalOnMissingBean</text>
  <text x="680" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">빈이 없을 때 (가장 多)</text>

  <!-- Row 5 -->
  <text x="462" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@ConditionalOnProperty</text>
  <text x="680" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">설정 키 값이 일치할 때</text>

  <!-- Row 6 -->
  <rect x="450" y="260" width="370" height="24" fill="#0f1218"/>
  <text x="462" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@ConditionalOnWebApplication</text>
  <text x="680" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">웹 애플리케이션일 때</text>

  <!-- Row 7 -->
  <text x="462" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@ConditionalOnResource</text>
  <text x="680" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">특정 리소스가 있을 때</text>

  <!-- Row 8 -->
  <rect x="450" y="306" width="370" height="24" fill="#0f1218"/>
  <text x="462" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@ConditionalOnExpression</text>
  <text x="680" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SpEL 표현식이 참일 때</text>

  <!-- Row 9 -->
  <text x="462" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@ConditionalOnJava</text>
  <text x="680" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JVM 버전 조건</text>

  <!-- Row 10 -->
  <rect x="450" y="352" width="370" height="24" fill="#0f1218"/>
  <text x="462" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@ConditionalOnSingleCandidate</text>
  <text x="680" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">후보 빈이 단 하나일 때</text>

  <text x="462" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">조건은 AND로 결합 — 모든 조건이 참이어야 빈 등록</text>
</svg>
