<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dev Containers 아키텍처</text>

  <!-- VS Code on host -->
  <rect x="60" y="80" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">VS Code</text>
  <text x="160" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(호스트에서 실행)</text>
  <text x="160" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">UI + 키보드 입력</text>

  <!-- Arrow: VS Code → Container -->
  <line x1="260" y1="120" x2="314" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="287" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Remote</text>

  <!-- Container -->
  <rect x="318" y="68" width="500" height="296" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="568" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">개발 컨테이너 (Dev Container)</text>

  <!-- Inside container -->
  <rect x="336" y="110" width="462" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="567" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">VS Code Server (컨테이너 안에서 실행)</text>
  <text x="567" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">언어 서버 · 디버거 · 확장 기능 · 터미널 — 모두 컨테이너 환경</text>

  <rect x="336" y="172" width="220" height="52" rx="6" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="446" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">소스 코드</text>
  <text x="446" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">bind mount (호스트 동기화)</text>

  <rect x="578" y="172" width="220" height="52" rx="6" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="688" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">런타임 + 도구</text>
  <text x="688" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">Node / Python / Go etc.</text>

  <rect x="336" y="234" width="462" height="52" rx="6" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="567" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">postCreateCommand 설치 완료된 개발 도구</text>
  <text x="567" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">eslint, prettier, black, go-tools, rust-analyzer ...</text>

  <rect x="336" y="296" width="462" height="52" rx="6" fill="#0a0a1a" stroke="#555" stroke-width="1"/>
  <text x="567" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#555" text-anchor="middle">도커 네트워크 — 부속 서비스(DB, Redis) 접근</text>
  <text x="567" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">compose 기반 devcontainer: 동일 네트워크 공유</text>

  <!-- Source: devcontainer.json -->
  <rect x="60" y="200" width="200" height="64" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">.devcontainer/</text>
  <text x="160" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">devcontainer.json</text>
  <text x="160" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">Dockerfile 또는 compose</text>

  <line x1="260" y1="232" x2="318" y2="280" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="276" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">설정</text>
</svg>
