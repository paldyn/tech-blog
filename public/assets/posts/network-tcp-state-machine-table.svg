<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TCP 상태별 의미 요약</text>

  <!-- Table header -->
  <rect x="60" y="60" width="200" height="34" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">상태</text>

  <rect x="262" y="60" width="160" height="34" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="342" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">주체</text>

  <rect x="424" y="60" width="396" height="34" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="622" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">의미</text>

  <!-- Rows -->
  <!-- LISTEN -->
  <rect x="60" y="96" width="200" height="30" rx="0" fill="#0a180a" stroke="#1a3a1a" stroke-width="1"/>
  <text x="160" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">LISTEN</text>
  <rect x="262" y="96" width="160" height="30" rx="0" fill="#0a180a" stroke="#1a3a1a" stroke-width="1"/>
  <text x="342" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버</text>
  <rect x="424" y="96" width="396" height="30" rx="0" fill="#0a180a" stroke="#1a3a1a" stroke-width="1"/>
  <text x="622" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SYN 대기 중</text>

  <!-- SYN_SENT -->
  <rect x="60" y="128" width="200" height="30" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="160" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SYN_SENT</text>
  <rect x="262" y="128" width="160" height="30" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="342" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클라이언트</text>
  <rect x="424" y="128" width="396" height="30" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="622" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SYN 전송, SYN+ACK 대기</text>

  <!-- SYN_RCVD -->
  <rect x="60" y="160" width="200" height="30" rx="0" fill="#111828" stroke="#2a3a4a" stroke-width="1"/>
  <text x="160" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">SYN_RCVD</text>
  <rect x="262" y="160" width="160" height="30" rx="0" fill="#111828" stroke="#2a3a4a" stroke-width="1"/>
  <text x="342" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버</text>
  <rect x="424" y="160" width="396" height="30" rx="0" fill="#111828" stroke="#2a3a4a" stroke-width="1"/>
  <text x="622" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SYN 수신, SYN+ACK 전송, ACK 대기</text>

  <!-- ESTABLISHED -->
  <rect x="60" y="192" width="200" height="30" rx="0" fill="#0a2a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="160" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555">ESTABLISHED</text>
  <rect x="262" y="192" width="160" height="30" rx="0" fill="#0a2a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="342" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">양측</text>
  <rect x="424" y="192" width="396" height="30" rx="0" fill="#0a2a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="622" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">연결 수립, 데이터 전송 가능</text>

  <!-- FIN_WAIT_1 -->
  <rect x="60" y="224" width="200" height="30" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="160" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">FIN_WAIT_1</text>
  <rect x="262" y="224" width="160" height="30" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="342" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Active Close</text>
  <rect x="424" y="224" width="396" height="30" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="622" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">FIN 전송, ACK 대기</text>

  <!-- FIN_WAIT_2 -->
  <rect x="60" y="256" width="200" height="30" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="160" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">FIN_WAIT_2</text>
  <rect x="262" y="256" width="160" height="30" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="342" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Active Close</text>
  <rect x="424" y="256" width="396" height="30" rx="0" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <text x="622" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ACK 수신, 상대 FIN 대기 (Half-close)</text>

  <!-- CLOSE_WAIT -->
  <rect x="60" y="288" width="200" height="30" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="160" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">CLOSE_WAIT</text>
  <rect x="262" y="288" width="160" height="30" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="342" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Passive Close</text>
  <rect x="424" y="288" width="396" height="30" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="622" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">FIN 수신, close() 호출 전 (앱 레벨 대기)</text>

  <!-- LAST_ACK -->
  <rect x="60" y="320" width="200" height="30" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="160" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">LAST_ACK</text>
  <rect x="262" y="320" width="160" height="30" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="342" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Passive Close</text>
  <rect x="424" y="320" width="396" height="30" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="622" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">FIN 전송, 마지막 ACK 대기</text>

  <!-- TIME_WAIT -->
  <rect x="60" y="352" width="200" height="30" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="160" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">TIME_WAIT</text>
  <rect x="262" y="352" width="160" height="30" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="342" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Active Close</text>
  <rect x="424" y="352" width="396" height="30" rx="0" fill="#1a0a0a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="622" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">2MSL 대기 후 CLOSED</text>

  <!-- Code block -->
  <rect x="60" y="398" width="760" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 현재 소켓 상태 확인</text>
  <text x="76" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ss -tan | <text fill="#7ec8e3" font-weight="600">awk</text> <text fill="#ce9178">'{print $1}'</text> | <text fill="#7ec8e3" font-weight="600">sort</text> | uniq -c | sort -rn</text>
</svg>
