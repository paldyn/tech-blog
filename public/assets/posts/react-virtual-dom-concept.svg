<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Virtual DOM — 개념과 작동 원리</text>

  <!-- Virtual DOM (왼쪽) -->
  <rect x="60" y="66" width="340" height="44" rx="8" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Virtual DOM (메모리)</text>

  <!-- VDOM tree -->
  <rect x="160" y="126" width="120" height="34" rx="6" fill="#0f1c2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="220" y="148" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">div#app</text>

  <line x1="220" y1="160" x2="220" y2="176" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="140" y1="176" x2="300" y2="176" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="140" y1="176" x2="140" y2="190" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="300" y1="176" x2="300" y2="190" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrB)"/>

  <rect x="80" y="190" width="120" height="34" rx="6" fill="#0f1c2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="212" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">h1</text>

  <rect x="240" y="190" width="120" height="34" rx="6" fill="#0f1c2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="300" y="212" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">ul</text>

  <line x1="300" y1="224" x2="300" y2="244" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="240" y1="244" x2="360" y2="244" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="240" y1="244" x2="240" y2="258" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="360" y1="244" x2="360" y2="258" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrB)"/>

  <rect x="185" y="258" width="80" height="30" rx="5" fill="#0f1c2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="225" y="278" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">li</text>

  <rect x="305" y="258" width="80" height="30" rx="5" fill="#0f1c2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="345" y="278" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">li</text>

  <!-- 중간 비교/반영 화살표 -->
  <line x1="400" y1="200" x2="480" y2="200" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="440" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">diffing</text>
  <text x="440" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">변경분만</text>

  <!-- Real DOM (오른쪽) -->
  <rect x="480" y="66" width="340" height="44" rx="8" fill="#0d1f12" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Real DOM (브라우저)</text>

  <!-- Real DOM tree -->
  <rect x="590" y="126" width="120" height="34" rx="6" fill="#0d1f12" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="148" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">div#app</text>

  <line x1="650" y1="160" x2="650" y2="176" stroke="#55c555" stroke-width="1.5"/>
  <line x1="570" y1="176" x2="730" y2="176" stroke="#55c555" stroke-width="1.5"/>
  <line x1="570" y1="176" x2="570" y2="190" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="730" y1="176" x2="730" y2="190" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>

  <rect x="510" y="190" width="120" height="34" rx="6" fill="#0d1f12" stroke="#55c555" stroke-width="1"/>
  <text x="570" y="212" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">h1</text>

  <rect x="670" y="190" width="120" height="34" rx="6" fill="#0d1f12" stroke="#55c555" stroke-width="1"/>
  <text x="730" y="212" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">ul</text>

  <line x1="730" y1="224" x2="730" y2="244" stroke="#55c555" stroke-width="1.5"/>
  <line x1="670" y1="244" x2="790" y2="244" stroke="#55c555" stroke-width="1.5"/>
  <line x1="670" y1="244" x2="670" y2="258" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="790" y1="244" x2="790" y2="258" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>

  <rect x="614" y="258" width="80" height="30" rx="5" fill="#0d1f12" stroke="#55c555" stroke-width="1"/>
  <text x="654" y="278" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">li</text>

  <rect x="734" y="258" width="80" height="30" rx="5" fill="#0d1f12" stroke="#55c555" stroke-width="1"/>
  <text x="774" y="278" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">li</text>

  <!-- 하단 설명 -->
  <rect x="60" y="322" width="760" height="130" rx="10" fill="#0a0e16" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Virtual DOM의 핵심 가치</text>
  <text x="440" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Real DOM 조작은 비용이 크다 — 레이아웃 재계산, 화면 리페인트 발생</text>
  <text x="440" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">React는 메모리 상의 Virtual DOM에서 먼저 변경을 계산(diffing)</text>
  <text x="440" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">최소한의 Real DOM 변경만 일괄 적용해 성능 최적화</text>
  <text x="440" y="438" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단, "항상 더 빠르다"는 아님 — 복잡도를 추상화해 개발자 경험을 높이는 것이 주목적</text>
</svg>
