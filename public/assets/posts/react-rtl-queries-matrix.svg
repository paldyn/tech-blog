<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">getBy vs queryBy vs findBy</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">요소가 없을 때의 동작이 세 쿼리의 차이를 가른다</text>

  <!-- Header row -->
  <rect x="80" y="100" width="180" height="44" rx="6" fill="#12121f" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="127" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">쿼리</text>
  <rect x="260" y="100" width="180" height="44" rx="6" fill="#12121f" stroke="#3a4a6e" stroke-width="1"/>
  <text x="350" y="127" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">요소 없음</text>
  <rect x="440" y="100" width="180" height="44" rx="6" fill="#12121f" stroke="#3a4a6e" stroke-width="1"/>
  <text x="530" y="127" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">요소 있음</text>
  <rect x="620" y="100" width="180" height="44" rx="6" fill="#12121f" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="127" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">비동기 대기</text>

  <!-- getBy row -->
  <rect x="80" y="152" width="180" height="56" rx="6" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="186" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">getBy*</text>
  <rect x="260" y="152" width="180" height="56" rx="6" fill="#0a0a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="350" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">즉시 에러 throw</text>
  <rect x="440" y="152" width="180" height="56" rx="6" fill="#0a0a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="530" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">요소 반환</text>
  <rect x="620" y="152" width="180" height="56" rx="6" fill="#0a0a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="710" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">기다리지 않음</text>

  <!-- queryBy row -->
  <rect x="80" y="216" width="180" height="56" rx="6" fill="#1a1a00" stroke="#e8c800" stroke-width="1.5"/>
  <text x="170" y="250" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8c800">queryBy*</text>
  <rect x="260" y="216" width="180" height="56" rx="6" fill="#0a0a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="350" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">null 반환</text>
  <rect x="440" y="216" width="180" height="56" rx="6" fill="#0a0a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="530" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">요소 반환</text>
  <rect x="620" y="216" width="180" height="56" rx="6" fill="#0a0a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="710" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">기다리지 않음</text>

  <!-- findBy row -->
  <rect x="80" y="280" width="180" height="56" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="314" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">findBy*</text>
  <rect x="260" y="280" width="180" height="56" rx="6" fill="#0a0a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="350" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">타임아웃 후 reject</text>
  <rect x="440" y="280" width="180" height="56" rx="6" fill="#0a0a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="530" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">Promise로 요소 반환</text>
  <rect x="620" y="280" width="180" height="56" rx="6" fill="#0a0a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="710" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">기본 1초 폴링</text>

  <text x="440" y="384" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">"없음"을 단언할 때만 queryBy, 나타나길 기다릴 때는 findBy, 그 외에는 getBy</text>
</svg>
