<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">디스크 쿼터 — 사용량 제한 구조</text>

  <!-- Filesystem Box -->
  <rect x="330" y="80" width="220" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">/dev/sda1  (ext4)</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">usrquota, grpquota 옵션 마운트</text>

  <!-- User quotas -->
  <text x="130" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">사용자 쿼터</text>

  <!-- User 1 -->
  <rect x="50" y="210" width="160" height="80" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">alice</text>
  <text x="130" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용: 3.2 GB</text>
  <text x="130" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">soft: 4 GB / hard: 5 GB</text>
  <text x="130" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">정상</text>

  <!-- User 2 -->
  <rect x="230" y="210" width="160" height="80" rx="8" fill="#1e1000" stroke="#e05555" stroke-width="1.5"/>
  <text x="310" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">bob</text>
  <text x="310" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용: 4.8 GB</text>
  <text x="310" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">soft: 4 GB / hard: 5 GB</text>
  <text x="310" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">경고 (soft 초과)</text>

  <!-- Group quotas -->
  <text x="670" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">그룹 쿼터</text>

  <!-- Group 1 -->
  <rect x="550" y="210" width="160" height="80" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="630" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">developers</text>
  <text x="630" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용: 18 GB</text>
  <text x="630" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">soft: 20 GB / hard: 25 GB</text>
  <text x="630" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">정상</text>

  <!-- Group 2 -->
  <rect x="720" y="210" width="130" height="80" rx="8" fill="#1e1000" stroke="#e05555" stroke-width="1.5"/>
  <text x="785" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">interns</text>
  <text x="785" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용: 5.0 GB</text>
  <text x="785" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">hard: 5 GB</text>
  <text x="785" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">hard 초과 차단</text>

  <!-- Arrows from FS to users/groups -->
  <line x1="380" y1="140" x2="210" y2="210" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="410" y1="140" x2="310" y2="210" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="470" y1="140" x2="630" y2="210" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="490" y1="140" x2="770" y2="210" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Soft/Hard limit legend -->
  <rect x="60" y="330" width="760" height="130" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">Soft Limit vs Hard Limit</text>

  <!-- Soft limit -->
  <rect x="90" y="368" width="12" height="12" fill="#e8c55e"/>
  <text x="112" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c55e">Soft Limit</text>
  <text x="90" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">초과 시 경고만 발생. Grace Period(유예 기간, 기본 7일)</text>
  <text x="90" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내에 줄이지 않으면 이후 쓰기 차단</text>

  <!-- Hard limit -->
  <rect x="470" y="368" width="12" height="12" fill="#e05555"/>
  <text x="492" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">Hard Limit</text>
  <text x="470" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">즉시 차단. 초과하는 순간 EDQUOT 에러</text>
  <text x="470" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반환. 블록(용량)과 inode(파일 수) 별개 설정</text>
</svg>
