<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrd" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#55c555"/>
    </marker>
    <marker id="arro" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#e8a855"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Materialized View 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">사전 계산 결과를 디스크에 저장 · 갱신 · 조회</text>

  <!-- Base tables -->
  <rect x="50" y="96" width="150" height="52" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">ORDERS</text>
  <text x="125" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">베이스 테이블</text>

  <rect x="50" y="168" width="150" height="52" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">PRODUCTS</text>
  <text x="125" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">베이스 테이블</text>

  <!-- Arrow to MV -->
  <line x1="202" y1="122" x2="310" y2="175" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrd)"/>
  <line x1="202" y1="194" x2="310" y2="185" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- MV box -->
  <rect x="314" y="148" width="220" height="80" rx="8" fill="#122020" stroke="#55c555" stroke-width="2"/>
  <text x="424" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Materialized View</text>
  <text x="424" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">MV_SALES_SUMMARY</text>
  <text x="424" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">사전 집계 결과 저장 (디스크)</text>

  <!-- Refresh arrow (bidirectional label) -->
  <rect x="50" y="272" width="240" height="44" rx="6" fill="#1a1a10" stroke="#e8a855" stroke-width="1"/>
  <text x="170" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a855">갱신(Refresh) 방식</text>
  <text x="170" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">COMPLETE · FAST · FORCE · NEVER</text>

  <line x1="290" y1="294" x2="312" y2="218" stroke="#e8a855" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arro)"/>

  <!-- Refresh timing -->
  <rect x="50" y="334" width="240" height="44" rx="6" fill="#1a1510" stroke="#e8a855" stroke-width="1"/>
  <text x="170" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a855">갱신 시점</text>
  <text x="170" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">ON COMMIT · ON DEMAND · NEVER</text>

  <!-- Query Rewrite flow -->
  <rect x="570" y="96" width="260" height="52" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">사용자 쿼리</text>
  <text x="700" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SELECT SUM(amt) FROM orders...</text>

  <line x1="700" y1="150" x2="700" y2="180" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrd)"/>

  <rect x="570" y="184" width="260" height="52" rx="6" fill="#0e0c18" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">CBO Query Rewrite</text>
  <text x="700" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MV와 동등 여부 검사</text>

  <!-- Branch: MV hit -->
  <line x1="700" y1="238" x2="700" y2="265" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="700" y1="265" x2="586" y2="265" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="586" y1="265" x2="586" y2="290" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>

  <rect x="504" y="294" width="164" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="586" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">MV Scan (빠름)</text>
  <text x="586" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">사전 집계 결과 직접 반환</text>

  <!-- Branch: no rewrite -->
  <line x1="700" y1="265" x2="810" y2="265" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="810" y1="265" x2="810" y2="290" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrd)"/>

  <rect x="728" y="294" width="164" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="810" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Base Table Scan</text>
  <text x="810" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Rewrite 불가 시 원본 조회</text>

  <text x="640" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">Rewrite 성공</text>
  <text x="768" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">Rewrite 실패</text>

  <!-- MV → Query Rewrite connection -->
  <line x1="534" y1="188" x2="568" y2="210" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrg)"/>

  <!-- Bottom summary -->
  <rect x="50" y="400" width="780" height="76" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Refresh 방식 요약</text>
  <text x="200" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">COMPLETE</text>
  <text x="200" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체 재계산 (느림·확실)</text>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">FAST (증분)</text>
  <text x="440" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MV Log 이용, 변경분만 반영</text>
  <text x="680" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a855">ON COMMIT</text>
  <text x="680" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트랜잭션 커밋 시 자동 갱신</text>
</svg>
