<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">힙 정렬 구현: heapify + heapSort</text>

  <!-- Left: heapify -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">heapify (최대 힙 유지)</text>
  <rect x="60" y="92" width="370" height="222" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> heapify(</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">* a,</tspan>
  </text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">                </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> n, </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> i) {</tspan>
  </text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> largest = i;</tspan>
  </text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> l = 2*i+1, r = 2*i+2;</tspan>
  </text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (l &lt; n &amp;&amp; a[l] &gt; a[largest])</tspan>
  </text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    largest = l;</tspan>
  </text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (r &lt; n &amp;&amp; a[r] &gt; a[largest])</tspan>
  </text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    largest = r;</tspan>
  </text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (largest != i) {</tspan>
  </text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    swap(a[i], a[largest]);</tspan>
  </text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    heapify(a, n, largest); }</tspan>
  </text>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <rect x="60" y="326" width="370" height="56" rx="6" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">재귀적으로 자식과 비교 후 최대값을 루트로</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">시간: <tspan font-weight="700" fill="#7ec8e3">O(log N)</tspan>  ·  재귀 스택: <tspan font-weight="700" fill="#7ec8e3">O(log N)</tspan></text>

  <!-- Right: heapSort -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">heapSort (전체 정렬)</text>
  <rect x="460" y="92" width="360" height="222" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> heapSort(</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">* a,</tspan>
  </text>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">              </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> n) {</tspan>
  </text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">  // 1. Build Max-Heap</tspan>
  </text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> i=n/2-1; i&gt;=0; i--)</tspan>
  </text>
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    heapify(a, n, i);</tspan>
  </text>
  <text x="476" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">  // 2. Extract max N-1번</tspan>
  </text>
  <text x="476" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> i=n-1; i&gt;0; i--) {</tspan>
  </text>
  <text x="476" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    swap(a[0], a[i]);</tspan>
  </text>
  <text x="476" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    heapify(a, i, 0);</tspan>
  </text>
  <text x="476" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  }</tspan>
  </text>
  <text x="476" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <rect x="460" y="326" width="360" height="56" rx="6" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Build-Heap O(N) + 추출 N번 x O(log N)</text>
  <text x="480" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">전체: <tspan font-weight="700" fill="#55c555">O(N log N)</tspan>  ·  In-place: <tspan font-weight="700" fill="#55c555">O(1)</tspan></text>

  <!-- Bottom note -->
  <rect x="60" y="404" width="760" height="56" rx="8" fill="#0f0f18" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">힙 정렬 특성</text>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">최선/평균/최악 모두 <tspan font-weight="700" fill="#7ec8e3">O(N log N)</tspan>  ·  불안정 정렬  ·  캐시 효율 낮음 (랜덤 접근)</text>
</svg>
