<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arrD" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 14 L 14 0 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클래스 상속 체인과 super 호출</text>

  <!-- Base class -->
  <rect x="290" y="66" width="300" height="80" rx="10" fill="#0a1419" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">Animal</text>
  <text x="440" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">name: string</text>
  <text x="440" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">speak(): string</text>

  <!-- Arrow down -->
  <line x1="440" y1="146" x2="440" y2="194" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrD)"/>
  <text x="470" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">extends</text>

  <!-- Dog class -->
  <rect x="160" y="196" width="240" height="96" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="280" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">Dog</text>
  <text x="280" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">breed: string</text>
  <text x="280" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">speak() — override</text>
  <text x="280" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">fetch(): void</text>

  <!-- Cat class -->
  <rect x="480" y="196" width="240" height="96" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="600" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">Cat</text>
  <text x="600" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">indoor: boolean</text>
  <text x="600" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">speak() — override</text>
  <text x="600" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">purr(): void</text>

  <!-- Arrows from Animal to children -->
  <line x1="400" y1="146" x2="296" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrD)"/>
  <line x1="480" y1="146" x2="584" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrD)"/>

  <!-- super call note -->
  <rect x="80" y="320" width="720" height="78" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">super() 규칙</text>
  <text x="100" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· 서브클래스 constructor에서 this 사용 전 반드시 super() 호출</text>
  <text x="100" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· 메서드 오버라이드 시 super.methodName()으로 부모 구현 재사용 가능</text>
</svg>
