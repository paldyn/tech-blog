<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">패턴 선택 가이드</text>

  <!-- Table header -->
  <rect x="60" y="60" width="760" height="40" rx="6" fill="#1e3a5f" stroke="#3a7cc4" stroke-width="1"/>
  <text x="200" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">상황</text>
  <text x="460" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">권장 패턴</text>
  <text x="720" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">이유</text>

  <!-- Row 1 -->
  <rect x="60" y="100" width="760" height="50" rx="0" fill="#0d1117" stroke="#374151" stroke-width="1"/>
  <line x1="340" y1="100" x2="340" y2="150" stroke="#374151" stroke-width="1"/>
  <line x1="580" y1="100" x2="580" y2="150" stroke="#374151" stroke-width="1"/>
  <text x="200" y="130" text-anchor="middle" font-size="13" fill="#888">여러 케이스 분기</text>
  <text x="460" y="130" text-anchor="middle" font-size="13" fill="#55c555">if / else if / else</text>
  <text x="720" y="130" text-anchor="middle" font-size="12" fill="#888">가독성·디버깅 용이</text>

  <!-- Row 2 -->
  <rect x="60" y="150" width="760" height="50" rx="0" fill="#111827" stroke="#374151" stroke-width="1"/>
  <line x1="340" y1="150" x2="340" y2="200" stroke="#374151" stroke-width="1"/>
  <line x1="580" y1="150" x2="580" y2="200" stroke="#374151" stroke-width="1"/>
  <text x="200" y="180" text-anchor="middle" font-size="13" fill="#888">A 또는 B 중 하나</text>
  <text x="460" y="180" text-anchor="middle" font-size="13" fill="#55c555">삼항 연산자 ? :</text>
  <text x="720" y="180" text-anchor="middle" font-size="12" fill="#888">JSX 인라인에서 간결</text>

  <!-- Row 3 -->
  <rect x="60" y="200" width="760" height="50" rx="0" fill="#0d1117" stroke="#374151" stroke-width="1"/>
  <line x1="340" y1="200" x2="340" y2="250" stroke="#374151" stroke-width="1"/>
  <line x1="580" y1="200" x2="580" y2="250" stroke="#374151" stroke-width="1"/>
  <text x="200" y="230" text-anchor="middle" font-size="13" fill="#888">조건부로 보여주기</text>
  <text x="460" y="230" text-anchor="middle" font-size="13" fill="#55c555">&amp;&amp; (Boolean 변환 필수)</text>
  <text x="720" y="230" text-anchor="middle" font-size="12" fill="#888">렌더링 여부 단순 제어</text>

  <!-- Row 4 -->
  <rect x="60" y="250" width="760" height="50" rx="0" fill="#111827" stroke="#374151" stroke-width="1"/>
  <line x1="340" y1="250" x2="340" y2="300" stroke="#374151" stroke-width="1"/>
  <line x1="580" y1="250" x2="580" y2="300" stroke="#374151" stroke-width="1"/>
  <text x="200" y="280" text-anchor="middle" font-size="13" fill="#888">삼항이 2단 중첩 이상</text>
  <text x="460" y="280" text-anchor="middle" font-size="13" fill="#e05555">변수로 추출 또는 컴포넌트 분리</text>
  <text x="720" y="280" text-anchor="middle" font-size="12" fill="#888">중첩 삼항은 가독성 급락</text>

  <!-- Bottom note -->
  <rect x="60" y="320" width="760" height="44" rx="8" fill="#0f1629" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="347" text-anchor="middle" font-size="13" fill="#888">중첩 삼항 대신: JSX를 변수에 저장하거나, 컴포넌트로 분리하면 코드가 깔끔해집니다.</text>
</svg>
