<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="dpArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="dpArr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">내적의 기하: 부호로 각의 예각·둔각을 안다</text>

  <!-- diagram -->
  <line x1="90" y1="320" x2="380" y2="320" stroke="#333" stroke-width="1"/>
  <circle cx="150" cy="320" r="5" fill="#888"/>
  <line x1="150" y1="320" x2="350" y2="320" stroke="#55c555" stroke-width="2.5" marker-end="url(#dpArr)"/>
  <text x="300" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">a</text>
  <line x1="150" y1="320" x2="280" y2="160" stroke="#7777cc" stroke-width="2.5" marker-end="url(#dpArr2)"/>
  <text x="232" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc" font-weight="600">b</text>
  <path d="M 195 320 A 45 45 0 0 0 178 282" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <text x="206" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">θ</text>

  <!-- formula box -->
  <rect x="450" y="92" width="370" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">a·b = a.x·b.x + a.y·b.y</tspan></text>
  <text x="466" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">    = |a||b| cos θ</tspan></text>

  <!-- three sign boxes -->
  <rect x="450" y="172" width="370" height="38" rx="6" fill="#000000" stroke="#55c555" stroke-width="2"/>
  <text x="466" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555" font-weight="600">a·b &gt; 0</tspan><tspan fill="#ffffff">  →  예각 (같은 방향 성분)</tspan></text>

  <rect x="450" y="222" width="370" height="38" rx="6" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
  <text x="466" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">a·b = 0</tspan><tspan fill="#ffffff">  →  직각 (수직, 90°)</tspan></text>

  <rect x="450" y="272" width="370" height="38" rx="6" fill="#000000" stroke="#e05555" stroke-width="2"/>
  <text x="466" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e05555" font-weight="600">a·b &lt; 0</tspan><tspan fill="#ffffff">  →  둔각 (반대 방향 성분)</tspan></text>

  <text x="60" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">내적은 b를 a 위에 사영한 길이 × |a| 와 같다 — 각도 cos을 부동소수 없이 부호만으로 판정</text>
</svg>
