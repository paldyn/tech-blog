<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fn_save() 구현 코드</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">유효성 검사 → transaction → 콜백 savePoint() 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="264" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="115" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan fill="#7ec8e3">function</tspan><tspan> fn_save() {</tspan>
  </text>
  <text x="76" y="133" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0">  // 유효성 검사</text>
  <text x="76" y="151" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">if</tspan><tspan> (!gfn_validate(</tspan><tspan fill="#7ec8e3">this</tspan><tspan>.ds_list))</tspan>
  </text>
  <text x="76" y="169" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>    </tspan><tspan fill="#7ec8e3">return</tspan><tspan>;</tspan>
  </text>
  <text x="76" y="187" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0">  // 저장 트랜잭션</text>
  <text x="76" y="205" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.transaction(</tspan>
  </text>
  <text x="76" y="223" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>    </tspan><tspan fill="#ce9178">"ListSvc::save.do"</tspan><tspan>,</tspan>
  </text>
  <text x="76" y="241" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>    </tspan><tspan fill="#ce9178">"ds_list:input"</tspan><tspan>,</tspan>
  </text>
  <text x="76" y="259" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>    </tspan><tspan fill="#ce9178">"ds_list:output"</tspan><tspan>,</tspan>
  </text>
  <text x="76" y="277" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>    </tspan><tspan fill="#ce9178">""</tspan><tspan>,</tspan><tspan fill="#ce9178">""</tspan><tspan>,</tspan><tspan fill="#ce9178">"fn_saveCb"</tspan>
  </text>
  <text x="76" y="295" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">  );</text>
  <text x="76" y="313" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">}</text>

  <text x="76" y="331" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan fill="#7ec8e3">function</tspan><tspan> fn_saveCb(s,e,msg) {</tspan>
  </text>
  <text x="76" y="349" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">if</tspan><tspan>(e!=</tspan><tspan fill="#b5cea8">0</tspan><tspan>){alert(msg);}</tspan>
  </text>

  <text x="440" y="382"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">콜백 성공 시: this.ds_list.savePoint() + this.fn_search() 호출로 화면 갱신</text>
</svg>
