<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Altibase 하이브리드 데이터 티어링 전략</text>

  <!-- Hot Data: Memory tier -->
  <rect x="60" y="68" width="760" height="140" rx="10" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">메모리 티어 (Hot Data)</text>
  <text x="130" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">응답 시간: 수 μs | 최대 용량: RAM 크기 (통상 수백 GB)</text>

  <rect x="80" y="128" width="180" height="60" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">실시간 거래 체결</text>
  <text x="170" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">trade_tick (MEM)</text>

  <rect x="280" y="128" width="180" height="60" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="370" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">사용자 세션 상태</text>
  <text x="370" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">user_session (MEM)</text>

  <rect x="480" y="128" width="180" height="60" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="570" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">실시간 통화 CDR</text>
  <text x="570" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">call_record (MEM)</text>

  <rect x="680" y="128" width="120" height="60" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="740" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">랭킹 캐시</text>
  <text x="740" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ranking (MEM)</text>

  <!-- Arrow: data aging -->
  <line x1="440" y1="208" x2="440" y2="248" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="560" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">주기적 이전 (Aging / INSERT INTO ... SELECT)</text>

  <!-- Cold Data: Disk tier -->
  <rect x="60" y="252" width="760" height="140" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="130" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">디스크 티어 (Cold Data)</text>
  <text x="130" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">응답 시간: ms 수준 | 최대 용량: TB 이상</text>

  <rect x="80" y="314" width="200" height="60" rx="6" fill="#112211" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">체결 이력 (1년+)</text>
  <text x="180" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">trade_history (DISK)</text>

  <rect x="300" y="314" width="200" height="60" rx="6" fill="#112211" stroke="#55c555" stroke-width="1"/>
  <text x="400" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">과금 이력</text>
  <text x="400" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">billing_history (DISK)</text>

  <rect x="520" y="314" width="200" height="60" rx="6" fill="#112211" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">분석/리포트 데이터</text>
  <text x="620" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">analytics (DISK)</text>

  <!-- Bottom bar -->
  <rect x="60" y="416" width="760" height="24" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="440" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">단일 SQL 엔진에서 메모리 + 디스크 테이블을 JOIN / UNION / 서브쿼리로 자유롭게 조합</text>
</svg>
