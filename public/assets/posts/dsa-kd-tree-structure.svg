<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-kd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">k-d 트리 — 공간 분할 구조</text>

  <!-- 2D scatter plot (left side) -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">2D 공간 분할</text>
  <rect x="60" y="86" width="360" height="300" rx="6" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Axes labels -->
  <text x="240" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">x</text>
  <text x="65" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">y</text>

  <!-- Vertical split: x=240 (median x) -->
  <line x1="240" y1="88" x2="240" y2="384" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="243" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">x=5 (x축 분할)</text>

  <!-- Left horizontal split: y=220 -->
  <line x1="62" y1="220" x2="238" y2="220" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="65" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">y=4</text>

  <!-- Right horizontal split: y=280 -->
  <line x1="242" y1="280" x2="418" y2="280" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="310" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">y=7</text>

  <!-- Data points -->
  <!-- Left-top quadrant -->
  <circle cx="120" cy="120" r="6" fill="#55c555"/>
  <text x="128" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(2,8)</text>
  <circle cx="160" cy="150" r="6" fill="#55c555"/>
  <text x="168" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(3,7)</text>

  <!-- Left-bottom quadrant -->
  <circle cx="90" cy="300" r="6" fill="#7777cc"/>
  <text x="98" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(1,2)</text>
  <circle cx="180" cy="320" r="6" fill="#7777cc"/>
  <text x="188" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(4,1)</text>

  <!-- Root (median) -->
  <circle cx="240" cy="180" r="8" fill="#7ec8e3"/>
  <text x="248" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" font-weight="600">(5,6)←root</text>

  <!-- Right-top quadrant -->
  <circle cx="320" cy="140" r="6" fill="#e05555"/>
  <text x="328" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(7,8)</text>

  <!-- Right-bottom quadrant -->
  <circle cx="360" cy="340" r="6" fill="#e8c060"/>
  <text x="328" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(8,3)</text>
  <circle cx="290" cy="350" r="6" fill="#e8c060"/>
  <text x="250" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(6,2)</text>

  <!-- Right side: tree structure -->
  <text x="460" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">트리 구조 (분할 깊이에 따라 축 교대)</text>

  <!-- Root node -->
  <rect x="590" y="88" width="100" height="40" rx="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="640" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">(5,6) x축</text>

  <!-- Level 1 nodes -->
  <rect x="480" y="168" width="100" height="40" rx="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="530" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">(3,7) y축</text>

  <rect x="710" y="168" width="100" height="40" rx="20" fill="#3a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="760" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">(7,8) y축</text>

  <!-- Level 2 nodes -->
  <rect x="460" y="252" width="80" height="36" rx="18" fill="#0f0f1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="500" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">(2,8)</text>

  <rect x="560" y="252" width="80" height="36" rx="18" fill="#0f0f1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="600" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">(4,1)</text>

  <rect x="680" y="252" width="80" height="36" rx="18" fill="#0f0f1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">(6,2)</text>

  <rect x="775" y="252" width="80" height="36" rx="18" fill="#0f0f1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="815" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">(8,3)</text>

  <!-- Level 3 -->
  <rect x="490" y="326" width="80" height="36" rx="18" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="530" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">(1,2)</text>

  <!-- Arrows root → children -->
  <line x1="600" y1="128" x2="554" y2="168" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-kd)"/>
  <line x1="680" y1="128" x2="726" y2="168" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-kd)"/>

  <!-- Arrows level1 → level2 -->
  <line x1="510" y1="208" x2="490" y2="252" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-kd)"/>
  <line x1="550" y1="208" x2="590" y2="252" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-kd)"/>
  <line x1="740" y1="208" x2="714" y2="252" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-kd)"/>
  <line x1="780" y1="208" x2="810" y2="252" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-kd)"/>

  <!-- Arrow level2 → level3 -->
  <line x1="480" y1="288" x2="520" y2="326" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-kd)"/>

  <!-- Bottom labels -->
  <text x="60" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">깊이 0(짝수): x축 기준 분할   |   깊이 1(홀수): y축 기준 분할</text>
  <text x="60" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">k차원: 깊이 d에서 (d mod k) 번째 축 기준으로 중앙값 분할</text>
  <text x="60" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">최근접 이웃 탐색: O(log n) 평균, O(n) 최악 (균형 트리 기준)</text>
</svg>
