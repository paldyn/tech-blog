<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">코루틴과 이벤트 루프의 협력</text>

  <!-- 이벤트 루프 박스 -->
  <rect x="60" y="100" width="220" height="220" fill="#11161f" stroke="#7777cc" stroke-width="1.5" rx="10"/>
  <text x="170" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">이벤트 루프</text>
  <text x="170" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실행 준비된 코루틴을</text>
  <text x="170" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">번갈아 깨운다</text>

  <rect x="90" y="205" width="160" height="40" fill="#222222" stroke="#555555" stroke-width="1" rx="6"/>
  <text x="170" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">코루틴 A</text>
  <rect x="90" y="255" width="160" height="40" fill="#222222" stroke="#555555" stroke-width="1" rx="6"/>
  <text x="170" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">코루틴 B</text>

  <!-- await 흐름 -->
  <path d="M 290 225 L 540 225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="305" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">await: 제어권을 루프에 양보</text>

  <path d="M 540 290 L 290 290" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrR)"/>
  <text x="320" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">I/O 완료 시 다시 재개</text>

  <!-- I/O 박스 -->
  <rect x="550" y="180" width="270" height="120" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="685" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">네트워크 / 디스크 I/O</text>
  <text x="685" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">응답을 기다리는 동안</text>
  <text x="685" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">루프는 다른 코루틴을 실행</text>
</svg>
