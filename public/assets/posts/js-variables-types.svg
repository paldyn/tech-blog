<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8">JavaScript의 8가지 타입</text>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#555">7가지 원시 타입 + 1가지 객체 타입</text>

  <!-- Primitive types group -->
  <rect x="40" y="88" width="560" height="270" rx="10" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="60" y="112" font-size="13" font-weight="700" fill="#888">원시 타입 (Primitive)</text>
  <text x="60" y="130" font-size="11" fill="#444">불변(immutable), 값 자체가 복사됨</text>

  <!-- Primitives grid -->
  <!-- Number -->
  <rect x="60" y="142" width="148" height="58" rx="8" fill="#1a1a2a"/>
  <text x="134" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#6b9fff">Number</text>
  <text x="134" y="180" text-anchor="middle" font-size="11" fill="#555">42, 3.14, NaN,</text>
  <text x="134" y="194" text-anchor="middle" font-size="11" fill="#555">Infinity</text>

  <!-- String -->
  <rect x="218" y="142" width="148" height="58" rx="8" fill="#1a2a1a"/>
  <text x="292" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#6abf5e">String</text>
  <text x="292" y="180" text-anchor="middle" font-size="11" fill="#555">'hello', "world",</text>
  <text x="292" y="194" text-anchor="middle" font-size="11" fill="#555">`template`</text>

  <!-- Boolean -->
  <rect x="376" y="142" width="148" height="58" rx="8" fill="#2a1a2a"/>
  <text x="450" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#c678dd">Boolean</text>
  <text x="450" y="180" text-anchor="middle" font-size="11" fill="#555">true</text>
  <text x="450" y="194" text-anchor="middle" font-size="11" fill="#555">false</text>

  <!-- undefined -->
  <rect x="60" y="212" width="148" height="58" rx="8" fill="#2a1a1a"/>
  <text x="134" y="233" text-anchor="middle" font-size="13" font-weight="700" fill="#e06c75">undefined</text>
  <text x="134" y="250" text-anchor="middle" font-size="11" fill="#555">선언만 하고</text>
  <text x="134" y="264" text-anchor="middle" font-size="11" fill="#555">할당 안 된 상태</text>

  <!-- null -->
  <rect x="218" y="212" width="148" height="58" rx="8" fill="#2a1a1a"/>
  <text x="292" y="233" text-anchor="middle" font-size="13" font-weight="700" fill="#e06c75">null</text>
  <text x="292" y="250" text-anchor="middle" font-size="11" fill="#555">의도적으로</text>
  <text x="292" y="264" text-anchor="middle" font-size="11" fill="#555">비어있음</text>

  <!-- Symbol -->
  <rect x="376" y="212" width="148" height="58" rx="8" fill="#1a2a2a"/>
  <text x="450" y="233" text-anchor="middle" font-size="13" font-weight="700" fill="#56b6c2">Symbol</text>
  <text x="450" y="250" text-anchor="middle" font-size="11" fill="#555">고유한 식별자</text>
  <text x="450" y="264" text-anchor="middle" font-size="11" fill="#555">ES6 추가</text>

  <!-- BigInt -->
  <rect x="60" y="282" width="464" height="52" rx="8" fill="#2a2a1a"/>
  <text x="292" y="303" text-anchor="middle" font-size="13" font-weight="700" fill="#d4a84b">BigInt</text>
  <text x="292" y="320" text-anchor="middle" font-size="11" fill="#555">Number 범위를 초과하는 정수 — 9007199254740991n (ES2020 추가)</text>

  <!-- Object type -->
  <rect x="620" y="88" width="220" height="270" rx="10" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="640" y="112" font-size="13" font-weight="700" fill="#888">객체 타입 (Object)</text>
  <text x="640" y="130" font-size="11" fill="#444">참조로 복사됨</text>

  <rect x="640" y="148" width="180" height="46" rx="8" fill="#1a2a1a"/>
  <text x="730" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#6abf5e">Object</text>
  <text x="730" y="184" text-anchor="middle" font-size="11" fill="#555">{ key: value }</text>

  <rect x="640" y="204" width="180" height="46" rx="8" fill="#1a1a2a"/>
  <text x="730" y="224" text-anchor="middle" font-size="12" font-weight="700" fill="#6b9fff">Array</text>
  <text x="730" y="240" text-anchor="middle" font-size="11" fill="#555">[1, 2, 3]</text>

  <rect x="640" y="260" width="180" height="46" rx="8" fill="#2a1a2a"/>
  <text x="730" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#c678dd">Function</text>
  <text x="730" y="296" text-anchor="middle" font-size="11" fill="#555">function() {}</text>

  <!-- Bottom note -->
  <text x="440" y="378" text-anchor="middle" font-size="12" fill="#444">typeof 연산자로 타입을 확인할 수 있지만, typeof null === "object"는 역사적인 버그입니다</text>
</svg>
