<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="ma1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ma2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Mockito 핵심 개념 — Mock·Stub·Verify</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">테스트 대역(Test Double) 유형과 Mockito 동작 흐름</text>

  <!-- Test Double types -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">테스트 대역(Test Double) 유형</text>

  <rect x="60" y="116" width="136" height="80" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="128" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">Dummy</text>
  <text x="128" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전달만 하고</text>
  <text x="128" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사용 안 함</text>

  <rect x="214" y="116" width="136" height="80" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="282" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Stub</text>
  <text x="282" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정해진 값 반환</text>
  <text x="282" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">given().willReturn()</text>

  <rect x="368" y="116" width="136" height="80" rx="6" fill="#1a2020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="436" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Mock</text>
  <text x="436" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">호출 기록 검증</text>
  <text x="436" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">then().should()</text>

  <rect x="522" y="116" width="136" height="80" rx="6" fill="#1a1510" stroke="#e09555" stroke-width="1.5"/>
  <text x="590" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e09555" text-anchor="middle">Spy</text>
  <text x="590" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 객체 + 일부</text>
  <text x="590" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메서드 스텁</text>

  <rect x="676" y="116" width="144" height="80" rx="6" fill="#1a1515" stroke="#e05555" stroke-width="1.5"/>
  <text x="748" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">Fake</text>
  <text x="748" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">동작하는 구현체</text>
  <text x="748" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인메모리 Repository</text>

  <!-- Mockito flow -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">Mockito 3단계 흐름</text>

  <!-- Step boxes -->
  <rect x="60" y="244" width="220" height="80" rx="6" fill="#141424" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">1. Stubbing (Given)</text>
  <text x="170" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">given(mock.method())</text>
  <text x="170" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">.willReturn(value)</text>

  <line x1="280" y1="284" x2="320" y2="284" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ma1)"/>

  <rect x="324" y="244" width="232" height="80" rx="6" fill="#141424" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">2. Execute (When)</text>
  <text x="440" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">sut.businessMethod()</text>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">테스트 대상 실행</text>

  <line x1="556" y1="284" x2="596" y2="284" stroke="#55c555" stroke-width="2" marker-end="url(#ma2)"/>

  <rect x="600" y="244" width="220" height="80" rx="6" fill="#141424" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">3. Verify (Then)</text>
  <text x="710" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">then(mock).should()</text>
  <text x="710" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">.have.called(once())</text>

  <!-- Argument matcher section -->
  <text x="60" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">Argument Matchers</text>

  <rect x="60" y="380" width="180" height="86" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="150" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">any()</text>
  <text x="150" y="421" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">any(Type.class)</text>
  <text x="150" y="441" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">anyLong()</text>
  <text x="150" y="461" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">타입별 전체 매칭</text>

  <rect x="260" y="380" width="180" height="86" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="350" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">eq("exact")</text>
  <text x="350" y="421" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">isNull()</text>
  <text x="350" y="441" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">isNotNull()</text>
  <text x="350" y="461" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">값 정확히 일치</text>

  <rect x="460" y="380" width="180" height="86" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="550" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e09555" text-anchor="middle">argThat(pred)</text>
  <text x="550" y="421" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e09555" text-anchor="middle">startsWith("A")</text>
  <text x="550" y="441" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e09555" text-anchor="middle">contains("x")</text>
  <text x="550" y="461" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">커스텀 조건</text>

  <rect x="660" y="380" width="180" height="86" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="750" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">times(n)</text>
  <text x="750" y="421" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">never()</text>
  <text x="750" y="441" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">atLeastOnce()</text>
  <text x="750" y="461" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">호출 횟수 검증</text>
</svg>
