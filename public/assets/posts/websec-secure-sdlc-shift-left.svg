<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-red2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Shift Left: 결함 수정 비용은 단계마다 뛴다</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">같은 취약점이라도 발견 시점이 늦을수록 수정 비용이 기하급수로 증가</text>

  <!-- cost bars (relative): design 1x, coding 5x, testing 15x, production 60x -->
  <rect x="100" y="296" width="120" height="24" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">1x</text>

  <rect x="280" y="260" width="120" height="60" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="340" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">5x</text>

  <rect x="460" y="200" width="120" height="120" rx="4" fill="#2a2010" stroke="#e0a555" stroke-width="1.5"/>
  <text x="520" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0a555" text-anchor="middle">15x</text>

  <rect x="640" y="110" width="120" height="210" rx="4" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">60x +</text>

  <!-- baseline -->
  <line x1="80" y1="320" x2="800" y2="320" stroke="#333" stroke-width="1.5"/>

  <!-- stage labels under bars -->
  <text x="160" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">설계</text>
  <text x="160" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">위협 모델링으로 발견</text>

  <text x="340" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현</text>
  <text x="340" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SAST · 코드 리뷰로 발견</text>

  <text x="520" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">테스트</text>
  <text x="520" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DAST · 침투 테스트로 발견</text>

  <text x="700" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">프로덕션</text>
  <text x="700" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">침해사고로 발견</text>

  <!-- shift-left arrow -->
  <line x1="640" y1="92" x2="140" y2="92" stroke="#55c555" stroke-width="2.5"
        stroke-dasharray="4,4" marker-end="url(#arr-green2)"/>
  <text x="390" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle" dy="-12">발견 시점을 왼쪽으로 (Shift Left)</text>

  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">프로덕션 단계의 60x에는 사고 대응 · 고객 통지 · 신뢰 손실 비용이 포함된다</text>
</svg>
