<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git cat-file --batch 활용</text>

  <defs>
    <marker id="arr8" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- stdin box -->
  <rect x="60" y="80" width="240" height="100" rx="8" fill="#111111" stroke="#888" stroke-width="1.5"/>
  <text x="180" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">stdin (SHA 목록)</text>
  <text xml:space="preserve" x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">abc123</text>
  <text xml:space="preserve" x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">def456</text>
  <text xml:space="preserve" x="80" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ghi789</text>

  <!-- Arrow -->
  <line x1="300" y1="130" x2="400" y2="130" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr8)"/>
  <text x="350" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">--batch</text>

  <!-- stdout box -->
  <rect x="400" y="80" width="420" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="420" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 출력 포맷 (SHA당 2줄)</text>
  <text xml:space="preserve" x="420" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">abc123</text><text xml:space="preserve" x="476" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> blob 1234</text>
  <text xml:space="preserve" x="420" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(1234 bytes of data)</text>
  <text xml:space="preserve" x="420" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">def456</text><text xml:space="preserve" x="476" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> commit 250</text>
  <text xml:space="preserve" x="420" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(250 bytes of data)</text>
  <text xml:space="preserve" x="420" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># --batch-check: 내용 없이 메타만</text>
  <text xml:space="preserve" x="420" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">ghi789</text><text xml:space="preserve" x="476" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> tree 88</text>

  <!-- Practical examples -->
  <rect x="60" y="260" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 실전: 모든 커밋 메타데이터 추출</text>
  <text xml:space="preserve" x="80" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git log</text><text xml:space="preserve" x="136" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --format=</text><text xml:space="preserve" x="240" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"%H"</text><text xml:space="preserve" x="284" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> | </text><text xml:space="preserve" x="310" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git cat-file</text><text xml:space="preserve" x="404" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --batch-check</text>
  <text xml:space="preserve" x="80" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 특정 경로 내용 직접 읽기</text>
  <text xml:space="preserve" x="80" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git cat-file</text><text xml:space="preserve" x="174" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -p main:src/main.go</text>
</svg>
