<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Agentic RAG 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">에이전트가 도구를 선택하며 자율적으로 검색·추론</text>

  <!-- User -->
  <rect x="60" y="100" width="120" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">사용자 질문</text>
  <text x="120" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">복합 질의</text>

  <!-- Arrow to Agent -->
  <line x1="180" y1="125" x2="226" y2="125" stroke="#444" stroke-width="2"/>
  <polygon points="222,120 232,125 222,130" fill="#444"/>

  <!-- Central Agent Box -->
  <rect x="232" y="80" width="240" height="210" rx="10" fill="#0d1020" stroke="#7777cc" stroke-width="2"/>
  <text x="352" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">LLM 에이전트</text>
  <text x="352" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(ReAct Loop)</text>

  <!-- Agent internal steps -->
  <rect x="248" y="136" width="208" height="30" rx="4" fill="#1a1a30"/>
  <text x="352" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">Thought: 무엇을 찾아야 하나?</text>

  <rect x="248" y="172" width="208" height="30" rx="4" fill="#1a1a30"/>
  <text x="352" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Action: 도구 선택 및 실행</text>

  <rect x="248" y="208" width="208" height="30" rx="4" fill="#1a1a30"/>
  <text x="352" y="227" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Observation: 결과 확인</text>

  <rect x="248" y="244" width="208" height="30" rx="4" fill="#1a1a30"/>
  <text x="352" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">필요시 반복 → 최종 답변</text>

  <!-- Loop arrow -->
  <path d="M 248 259 C 220 259 220 146 248 146" stroke="#444" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="244,141 248,152 252,141" fill="#444"/>

  <!-- Tools on right -->
  <!-- Vector Search -->
  <rect x="552" y="100" width="160" height="50" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="632" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">벡터 검색</text>
  <text x="632" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">사내 문서 RAG</text>

  <!-- Web Search -->
  <rect x="552" y="164" width="160" height="50" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="632" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">웹 검색</text>
  <text x="632" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실시간 정보</text>

  <!-- SQL Query -->
  <rect x="552" y="228" width="160" height="50" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="632" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">SQL 쿼리</text>
  <text x="632" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구조화 데이터</text>

  <!-- API Call -->
  <rect x="552" y="292" width="160" height="50" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="632" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">외부 API</text>
  <text x="632" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">날씨·주가 등</text>

  <!-- Arrows from agent to tools -->
  <line x1="472" y1="175" x2="548" y2="125" stroke="#444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="545,122 552,132 540,129" fill="#444"/>
  <line x1="472" y1="185" x2="548" y2="189" stroke="#444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="544,184 554,189 544,194" fill="#444"/>
  <line x1="472" y1="195" x2="548" y2="253" stroke="#444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="545,249 552,259 540,256" fill="#444"/>
  <line x1="472" y1="205" x2="548" y2="317" stroke="#444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="545,313 552,323 540,320" fill="#444"/>

  <!-- Labels on right -->
  <text x="728" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">도구</text>

  <!-- Response back -->
  <rect x="60" y="190" width="120" height="50" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="120" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">최종 답변</text>
  <text x="120" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">종합 응답</text>

  <line x1="232" y1="215" x2="186" y2="215" stroke="#e05555" stroke-width="2"/>
  <polygon points="190,210 180,215 190,220" fill="#e05555"/>

  <!-- Code block -->
  <rect x="60" y="370" width="760" height="70" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># Agentic RAG 핵심: 도구를 가진 에이전트</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">tools = [vector_search_tool, web_search_tool, sql_tool]</text>
  <text x="76" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">agent = create_react_agent(llm=claude, tools=tools)</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">                                                     # 에이전트가 도구 자율 선택</text>
</svg>
