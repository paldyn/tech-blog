<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
      .mono { font-family: 'JetBrains Mono','Menlo','Consolas',monospace; }
    </style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI를 위한 선형대수 핵심 개념</text>

  <!-- Section 1: Scalar, Vector, Matrix -->
  <text x="440" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#888">데이터 표현의 계층 구조</text>

  <!-- Scalar -->
  <rect x="60" y="92" width="180" height="110" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">스칼라 (Scalar)</text>
  <text x="150" y="138" text-anchor="middle" font-size="13" fill="#e8e8e8">단일 숫자</text>
  <text x="150" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#7ec8e3">3.14</text>
  <text x="150" y="180" text-anchor="middle" font-size="11" fill="#666">예: 학습률, 손실값, 온도</text>
  <text x="150" y="196" text-anchor="middle" font-size="11" fill="#555">차원: 0D</text>

  <!-- Vector -->
  <rect x="260" y="92" width="200" height="110" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="360" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">벡터 (Vector)</text>
  <text x="360" y="138" text-anchor="middle" font-size="12" fill="#e8e8e8">숫자의 1차원 배열</text>
  <text x="360" y="162" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">[0.2, 0.8, 0.1, 0.9]</text>
  <text x="360" y="182" text-anchor="middle" font-size="11" fill="#666">예: 단어 임베딩, 특징 벡터</text>
  <text x="360" y="196" text-anchor="middle" font-size="11" fill="#555">차원: 1D (크기 n)</text>

  <!-- Matrix -->
  <rect x="480" y="92" width="200" height="110" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="580" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">행렬 (Matrix)</text>
  <text x="580" y="138" text-anchor="middle" font-size="12" fill="#e8e8e8">숫자의 2차원 배열</text>
  <text x="580" y="158" text-anchor="middle" font-size="13" fill="#e05555">[[1,2],[3,4],[5,6]]</text>
  <text x="580" y="178" text-anchor="middle" font-size="11" fill="#666">예: 가중치, 이미지 픽셀</text>
  <text x="580" y="196" text-anchor="middle" font-size="11" fill="#555">차원: 2D (m×n)</text>

  <!-- Tensor -->
  <rect x="700" y="92" width="120" height="110" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="760" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">텐서 (Tensor)</text>
  <text x="760" y="138" text-anchor="middle" font-size="12" fill="#e8e8e8">n차원 배열</text>
  <text x="760" y="160" text-anchor="middle" font-size="12" fill="#7777cc">3D, 4D, ...</text>
  <text x="760" y="178" text-anchor="middle" font-size="11" fill="#666">예: RGB 이미지</text>
  <text x="760" y="196" text-anchor="middle" font-size="11" fill="#555">H×W×C</text>

  <!-- Section 2: Vector operations -->
  <text x="440" y="228" text-anchor="middle" font-size="14" font-weight="600" fill="#888">벡터 핵심 연산</text>

  <!-- Dot product -->
  <rect x="60" y="240" width="370" height="90" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="76" y="264" class="mono" font-size="12" fill="#6a8aa0"># 내적 (Dot Product): 유사도 계산의 핵심</text>
  <text xml:space="preserve" x="76" y="282" class="mono" font-size="12" fill="#7ec8e3">import</text>
  <text xml:space="preserve" x="124" y="282" class="mono" font-size="12" fill="#e8e8e8">numpy as np</text>
  <text xml:space="preserve" x="76" y="300" class="mono" font-size="12" fill="#e8e8e8">a = np.array([</text>
  <text xml:space="preserve" x="76" y="318" class="mono" font-size="12" fill="#b5cea8">    1, 2, 3</text>
  <text xml:space="preserve" x="76" y="318" class="mono" font-size="12" fill="#e8e8e8">            ])</text>

  <!-- More code to the right -->
  <rect x="450" y="240" width="370" height="90" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="466" y="264" class="mono" font-size="12" fill="#e8e8e8">b = np.array([</text>
  <text xml:space="preserve" x="466" y="282" class="mono" font-size="12" fill="#b5cea8">    4, 5, 6</text>
  <text xml:space="preserve" x="466" y="282" class="mono" font-size="12" fill="#e8e8e8">            ])</text>
  <text xml:space="preserve" x="466" y="300" class="mono" font-size="12" fill="#e8e8e8">dot = np.dot(a, b)</text>
  <text xml:space="preserve" x="466" y="318" class="mono" font-size="12" fill="#6a8aa0"># = 1×4+2×5+3×6 = 32</text>

  <!-- Section 3: AI applications -->
  <text x="440" y="360" text-anchor="middle" font-size="14" font-weight="600" fill="#888">AI에서 선형대수가 쓰이는 곳</text>

  <rect x="60" y="372" width="220" height="80" rx="6" fill="#111"/>
  <text x="170" y="396" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">임베딩 유사도</text>
  <text x="170" y="414" text-anchor="middle" font-size="12" fill="#aaa">두 단어 벡터의 내적으로</text>
  <text x="170" y="432" text-anchor="middle" font-size="12" fill="#aaa">의미적 유사도 계산</text>
  <text x="170" y="446" text-anchor="middle" font-size="10" fill="#555">코사인 유사도 = a·b / (|a||b|)</text>

  <rect x="300" y="372" width="220" height="80" rx="6" fill="#111"/>
  <text x="410" y="396" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">신경망 순전파</text>
  <text x="410" y="414" text-anchor="middle" font-size="12" fill="#aaa">입력 벡터 × 가중치 행렬</text>
  <text x="410" y="432" text-anchor="middle" font-size="12" fill="#aaa">= 출력 벡터 (행렬곱)</text>
  <text x="410" y="446" text-anchor="middle" font-size="10" fill="#555">y = Wx + b</text>

  <rect x="540" y="372" width="220" height="80" rx="6" fill="#111"/>
  <text x="650" y="396" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">Attention 메커니즘</text>
  <text x="650" y="414" text-anchor="middle" font-size="12" fill="#aaa">Q·K^T 행렬곱으로</text>
  <text x="650" y="432" text-anchor="middle" font-size="12" fill="#aaa">토큰 간 관련도 계산</text>
  <text x="650" y="446" text-anchor="middle" font-size="10" fill="#555">Self-Attention의 핵심 연산</text>

  <!-- Footer -->
  <text x="440" y="504" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
