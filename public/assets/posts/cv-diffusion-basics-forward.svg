<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">확산 모델: 순방향 과정과 역방향 과정</text>

  <!-- Forward Process label -->
  <text x="50" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">순방향 과정 q(x_t | x_{t-1})</text>
  <text x="50" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Gaussian 노이즈를 단계적으로 추가 (학습 불필요)</text>

  <!-- Forward steps -->
  <!-- x0 -->
  <rect x="40" y="135" width="80" height="80" rx="6" fill="#1a2a3e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">x₀</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원본 이미지</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">노이즈 0%</text>

  <line x1="120" y1="175" x2="158" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- x1 -->
  <rect x="160" y="135" width="80" height="80" rx="6" fill="#192433" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="200" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">x₁</text>
  <text x="200" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">약간 흐림</text>
  <text x="200" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">노이즈 5%</text>

  <line x1="240" y1="175" x2="278" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- x_t/2 -->
  <rect x="280" y="135" width="80" height="80" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="320" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">x_{T/2}</text>
  <text x="320" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">절반 노이즈</text>
  <text x="320" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">50%</text>

  <line x1="360" y1="175" x2="390" y2="175" stroke="#7777cc" stroke-width="2"/>
  <text x="400" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#666" text-anchor="middle">…</text>
  <line x1="415" y1="175" x2="438" y2="175" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- x_{T-1} -->
  <rect x="440" y="135" width="80" height="80" rx="6" fill="#1a1a1a" stroke="#e05555" stroke-width="1.2"/>
  <text x="480" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">x_{T-1}</text>
  <text x="480" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대부분 노이즈</text>
  <text x="480" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">95%</text>

  <line x1="520" y1="175" x2="558" y2="175" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- xT -->
  <rect x="560" y="135" width="80" height="80" rx="6" fill="#1a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="600" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">x_T</text>
  <text x="600" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">순수 가우시안</text>
  <text x="600" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">N(0, I)</text>

  <!-- Forward formula -->
  <rect x="680" y="135" width="160" height="80" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="760" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">q(x_t|x_{t-1})</text>
  <text x="760" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">= N(x_t; √(1-β_t)</text>
  <text x="760" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">· x_{t-1}, β_t I)</text>

  <!-- Reverse Process label -->
  <text x="50" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">역방향 과정 p_θ(x_{t-1} | x_t)</text>
  <text x="50" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">노이즈 예측 신경망(U-Net)으로 단계적 복원 (학습 대상)</text>

  <!-- Reverse steps (right to left) -->
  <!-- xT -->
  <rect x="560" y="293" width="80" height="80" rx="6" fill="#1a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="600" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">x_T</text>
  <text x="600" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">샘플링 시작</text>
  <text x="600" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">N(0, I)</text>

  <line x1="560" y1="333" x2="522" y2="333" stroke="#55c555" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- x_{T-1} -->
  <rect x="440" y="293" width="80" height="80" rx="6" fill="#111" stroke="#55c555" stroke-width="1.2"/>
  <text x="480" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">x_{T-1}</text>
  <text x="480" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">노이즈 예측</text>
  <text x="480" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">U-Net(x_t, t)</text>

  <line x1="440" y1="333" x2="402" y2="333" stroke="#55c555" stroke-width="2"/>
  <text x="392" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#666" text-anchor="middle">…</text>
  <line x1="375" y1="333" x2="362" y2="333" stroke="#55c555" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- x1 -->
  <rect x="160" y="293" width="80" height="80" rx="6" fill="#192433" stroke="#55c555" stroke-width="1.2"/>
  <text x="200" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">x₁</text>
  <text x="200" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">거의 복원</text>

  <line x1="160" y1="333" x2="122" y2="333" stroke="#55c555" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- x0 restored -->
  <rect x="40" y="293" width="80" height="80" rx="6" fill="#1a2a3e" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">x̂₀</text>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">생성된 이미지</text>

  <!-- UNet box -->
  <rect x="680" y="293" width="160" height="80" rx="6" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="760" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">U-Net ε_θ</text>
  <text x="760" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">입력: (x_t, t)</text>
  <text x="760" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">출력: 노이즈 ε 예측</text>

  <!-- Training objective note -->
  <rect x="40" y="398" width="800" height="30" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">훈련 목적: L = E[‖ε - ε_θ(√ᾱ_t x₀ + √(1-ᾱ_t)ε, t)‖²]  (노이즈 예측 MSE)</text>
</svg>
