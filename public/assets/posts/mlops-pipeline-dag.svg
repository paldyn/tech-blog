<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="dag-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="dag-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Airflow DAG: 병렬 학습 파이프라인</text>

  <!-- Node: fetch_data -->
  <rect x="60" y="76" width="140" height="54" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">fetch_data</text>
  <text x="130" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">BashOperator</text>

  <!-- Node: validate -->
  <rect x="240" y="76" width="140" height="54" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="310" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">validate_data</text>
  <text x="310" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PythonOperator</text>

  <!-- Arrow fetch -> validate -->
  <line x1="200" y1="103" x2="238" y2="103" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dag-arr)"/>

  <!-- Node: preprocess_A (parallel) -->
  <rect x="420" y="40" width="150" height="54" rx="8" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="495" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">preprocess_A</text>
  <text x="495" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SparkSubmit</text>

  <!-- Node: preprocess_B (parallel) -->
  <rect x="420" y="130" width="150" height="54" rx="8" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="495" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">preprocess_B</text>
  <text x="495" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SparkSubmit</text>

  <!-- Arrows validate -> preprocess A/B (fan-out) -->
  <line x1="380" y1="93" x2="418" y2="67" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dag-arr)"/>
  <line x1="380" y1="113" x2="418" y2="157" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dag-arr)"/>

  <!-- Node: train_model -->
  <rect x="610" y="76" width="150" height="54" rx="8" fill="#2a2a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="685" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">train_model</text>
  <text x="685" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">KubernetesPod</text>

  <!-- Arrows preprocess A/B -> train (fan-in) -->
  <line x1="570" y1="67" x2="608" y2="93" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dag-arr)"/>
  <line x1="570" y1="157" x2="608" y2="113" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dag-arr)"/>

  <!-- Node: evaluate -->
  <rect x="420" y="230" width="150" height="54" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="495" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">evaluate</text>
  <text x="495" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PythonOperator</text>

  <!-- Arrow train -> evaluate -->
  <line x1="685" y1="130" x2="685" y2="190" stroke="#7ec8e3" stroke-width="2" fill="none"/>
  <line x1="685" y1="190" x2="572" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dag-arr)"/>

  <!-- Branch: pass / fail -->
  <text x="200" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">threshold 미달</text>

  <rect x="60" y="280" width="140" height="54" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">alert_slack</text>
  <text x="130" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Fail &amp; Notify</text>

  <text x="685" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">threshold 통과</text>

  <rect x="610" y="280" width="150" height="54" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="685" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">register_model</text>
  <text x="685" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MLflow Registry</text>

  <!-- Arrows evaluate -> pass/fail -->
  <line x1="420" y1="257" x2="200" y2="257" stroke="#7ec8e3" stroke-width="1.5" fill="none"/>
  <line x1="200" y1="257" x2="200" y2="278" stroke="#e05555" stroke-width="2" marker-end="url(#dag-red)"/>
  <line x1="570" y1="257" x2="685" y2="257" stroke="#7ec8e3" stroke-width="1.5" fill="none"/>
  <line x1="685" y1="257" x2="685" y2="278" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dag-arr)"/>

  <!-- deploy -->
  <rect x="610" y="370" width="150" height="54" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="685" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">deploy_model</text>
  <text x="685" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">K8s Rolling Update</text>

  <line x1="685" y1="334" x2="685" y2="368" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dag-arr)"/>
</svg>
