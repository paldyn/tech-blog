<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git add 주요 패턴</text>

  <!-- Left column -->
  <rect x="60" y="68" width="370" height="300" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">명령과 동작</text>

  <text x="80" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">git add </text>
  <text x="148" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">file.txt</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">특정 파일 스테이징</text>

  <text x="80" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">git add </text>
  <text x="148" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">src/</text>
  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">디렉터리 전체 (재귀) 스테이징</text>

  <text x="80" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">git add </text>
  <text x="148" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">*.js</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">글로브 패턴 스테이징</text>

  <text x="80" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">git add </text>
  <text x="148" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-A</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모든 변경(수정+삭제+신규) 스테이징</text>

  <text x="80" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">git add </text>
  <text x="148" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">.</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">현재 디렉터리 기준 (Git 2.x: -A와 동일)</text>

  <text x="80" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">git add </text>
  <text x="148" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-u</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">추적 중인 파일의 수정/삭제만 스테이징</text>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(새 파일은 포함 안 됨)</text>

  <!-- Right column -->
  <rect x="450" y="68" width="370" height="300" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="470" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">-A vs . vs -u 차이</text>

  <!-- Table header -->
  <text x="470" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">옵션        수정  삭제  신규</text>
  <line x1="470" y1="126" x2="800" y2="126" stroke="#1e2433" stroke-width="1"/>

  <text x="470" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">-A         </text>
  <text x="594" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555"> ✓     ✓     ✓</text>

  <text x="470" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">.          </text>
  <text x="594" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555"> ✓     ✓     ✓</text>
  <text x="470" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">  (cwd 기준, Git ≥2.0)</text>

  <text x="470" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">-u         </text>
  <text x="594" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555"> ✓     ✓  </text>
  <text x="700" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">   ✗</text>

  <!-- Warning box -->
  <rect x="470" y="234" width="330" height="104" rx="6" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="484" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">git add -A 주의점</text>
  <text x="484" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.env, 빌드 산출물, 시크릿 등</text>
  <text x="484" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">민감한 파일이 함께 스테이징될 수 있다.</text>
  <text x="484" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.gitignore를 먼저 정비하고 사용하거나</text>
  <text x="484" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일을 명시적으로 지정하는 것이 안전.</text>
</svg>
