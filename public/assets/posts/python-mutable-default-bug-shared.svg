<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="md_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">기본 리스트는 호출마다 공유된다</text>

  <rect x="60" y="74" width="760" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="110" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> add(item, bag=[]):  bag.append(item); </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> bag</tspan></text>

  <!-- call 1 -->
  <rect x="60" y="170" width="200" height="80" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="204" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" text-anchor="middle">add('a')</text>
  <text x="160" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" text-anchor="middle">→ ['a']</text>

  <!-- call 2 -->
  <rect x="340" y="170" width="200" height="80" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="204" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" text-anchor="middle">add('b')</text>
  <text x="440" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" text-anchor="middle">→ ['a', 'b']</text>

  <!-- call 3 -->
  <rect x="620" y="170" width="200" height="80" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="204" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" text-anchor="middle">add('c')</text>
  <text x="720" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" text-anchor="middle">→ ['a','b','c']</text>

  <line x1="260" y1="210" x2="334" y2="210" stroke="#e05555" stroke-width="2" marker-end="url(#md_arr)"/>
  <line x1="540" y1="210" x2="614" y2="210" stroke="#e05555" stroke-width="2" marker-end="url(#md_arr)"/>

  <text x="440" y="296" font-size="13" fill="#9aa4b8" text-anchor="middle">기본값 []는 함수가 "정의될 때" 단 한 번 만들어져, 모든 호출이 같은 리스트를 공유한다</text>
</svg>
