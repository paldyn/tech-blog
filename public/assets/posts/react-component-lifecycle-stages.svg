<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <defs>
    <marker id="arrW" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">함수형 컴포넌트 생명주기</text>

  <!-- 1단계: Mount -->
  <rect x="60" y="66" width="220" height="100" rx="10" fill="#0d1f12" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">마운트</text>
  <text x="170" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트가 처음</text>
  <text x="170" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DOM에 추가됨</text>
  <text x="170" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">useEffect(fn, []) 실행</text>

  <!-- 화살표 -->
  <line x1="280" y1="116" x2="316" y2="116" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrW)"/>

  <!-- 2단계: Update -->
  <rect x="320" y="66" width="240" height="100" rx="10" fill="#0d1828" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">업데이트</text>
  <text x="440" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">state / props 변경으로</text>
  <text x="440" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">리렌더링 발생</text>
  <text x="440" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">useEffect(fn, [dep]) 실행</text>

  <!-- 화살표 -->
  <line x1="560" y1="116" x2="596" y2="116" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrW)"/>

  <!-- 3단계: Unmount -->
  <rect x="600" y="66" width="220" height="100" rx="10" fill="#1f0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="710" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">언마운트</text>
  <text x="710" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트가 DOM에서</text>
  <text x="710" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">제거됨</text>
  <text x="710" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cleanup 함수 실행</text>

  <!-- 업데이트 루프 화살표 (위쪽 곡선) -->
  <path d="M 440 66 C 440 40 400 40 360 66" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrW)"/>
  <text x="400" y="36" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">반복</text>

  <!-- 코드 박스: useEffect 패턴 -->
  <rect x="60" y="192" width="380" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="216"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 마운트 시 1회만 실행</text>
  <text x="76" y="236"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">useEffect</text>
  <text x="154" y="236"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">(() =&gt; {</text>
  <text x="76" y="256"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  setup(); </text>
  <text x="76" y="276"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">  return</text>
  <text x="138" y="276"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> () =&gt; cleanup(); </text>
  <text x="76" y="296"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}, []);</text>
  <text x="76" y="326"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// dep 변경 시마다 실행</text>
  <text x="76" y="346"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">useEffect</text>
  <text x="154" y="346"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">(() =&gt; {</text>
  <text x="76" y="366"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  fetchUser(userId);</text>
  <text x="76" y="386"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}, [userId]);</text>
  <text x="76" y="416"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 언마운트 = cleanup 실행</text>
  <text x="76" y="436"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// + 다음 effect 실행 전에도</text>
  <text x="76" y="456"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// cleanup 먼저 실행됨</text>

  <!-- 오른쪽 타이밍 설명 -->
  <rect x="468" y="192" width="352" height="130" rx="8" fill="#101820" stroke="#55c555" stroke-width="1.5"/>
  <text x="644" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">마운트 실행 순서</text>
  <text x="484" y="242"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">1. 컴포넌트 함수 실행 (Render)</text>
  <text x="484" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">2. DOM 반영 (Commit)</text>
  <text x="484" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">3. useLayoutEffect 동기 실행</text>
  <text x="484" y="302"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">4. 화면 페인트 후 useEffect 실행</text>

  <rect x="468" y="342" width="352" height="130" rx="8" fill="#101820" stroke="#e05555" stroke-width="1.5"/>
  <text x="644" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">언마운트 실행 순서</text>
  <text x="484" y="392"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">1. 이전 effect cleanup 함수 실행</text>
  <text x="484" y="412"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">2. DOM에서 컴포넌트 제거</text>
  <text x="484" y="432"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(구독 해제, 타이머 정리 등)</text>
  <text x="484" y="452"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">cleanup 없으면 메모리 누수 위험</text>
</svg>
