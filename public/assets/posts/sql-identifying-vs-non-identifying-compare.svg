<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">식별 관계 vs 비식별 관계</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">자식 PK에 부모 FK 포함 여부</text>

  <!-- Identifying Relationship panel -->
  <rect x="60" y="86" width="360" height="310" rx="8" fill="#0d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">식별 관계 (Identifying)</text>
  <text x="240" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자식 PK에 부모 FK 포함 · 실선</text>

  <!-- Parent table -->
  <rect x="80" y="144" width="140" height="80" rx="4" fill="#111" stroke="#e8e8e8" stroke-width="1"/>
  <rect x="80" y="144" width="140" height="26" rx="4" fill="#1a1210" stroke="#e8e8e8" stroke-width="1"/>
  <text x="150" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8">ORDER</text>
  <text x="90" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PK  id</text>
  <text x="90" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">    …</text>

  <!-- Child table -->
  <rect x="250" y="144" width="160" height="100" rx="4" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <rect x="250" y="144" width="160" height="26" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="330" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">ORDER_ITEM</text>
  <text x="260" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">PK,FK  order_id</text>
  <text x="260" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">PK     seq</text>
  <text x="260" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">       qty</text>

  <!-- Solid relationship line -->
  <line x1="220" y1="184" x2="250" y2="184" stroke="#e05555" stroke-width="2"/>
  <!-- "1" side -->
  <line x1="225" y1="178" x2="225" y2="190" stroke="#e05555" stroke-width="2"/>
  <!-- N side -->
  <line x1="245" y1="184" x2="237" y2="178" stroke="#e05555" stroke-width="2"/>
  <line x1="245" y1="184" x2="235" y2="184" stroke="#e05555" stroke-width="2"/>
  <line x1="245" y1="184" x2="237" y2="190" stroke="#e05555" stroke-width="2"/>

  <text x="240" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자식은 부모 없이 존재 불가</text>
  <text x="240" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">복합 PK = (order_id, seq)</text>

  <!-- Code snippet -->
  <rect x="76" y="300" width="328" height="82" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">CREATE TABLE</text><text x="183" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> order_items (</text>
  <text x="92" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  order_id INT </text><text x="211" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">REFERENCES</text><text x="305" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> orders,</text>
  <text x="92" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  seq      INT,</text>
  <text x="92" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">  PRIMARY KEY</text><text x="191" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> (order_id, seq));</text>

  <!-- Non-Identifying Relationship panel -->
  <rect x="460" y="86" width="360" height="310" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">비식별 관계 (Non-Identifying)</text>
  <text x="640" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자식 PK 별도 · FK는 일반 컬럼 · 점선</text>

  <!-- Parent table -->
  <rect x="480" y="144" width="140" height="80" rx="4" fill="#111" stroke="#e8e8e8" stroke-width="1"/>
  <rect x="480" y="144" width="140" height="26" rx="4" fill="#0d200d" stroke="#e8e8e8" stroke-width="1"/>
  <text x="550" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8">CUSTOMER</text>
  <text x="490" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PK  id</text>
  <text x="490" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">    name</text>

  <!-- Child table -->
  <rect x="650" y="144" width="160" height="100" rx="4" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <rect x="650" y="144" width="160" height="26" rx="4" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">ORDER</text>
  <text x="660" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PK     id</text>
  <text x="660" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">FK     cust_id</text>
  <text x="660" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">       total</text>

  <!-- Dashed relationship line -->
  <line x1="620" y1="184" x2="650" y2="184" stroke="#55c555" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- "1" side -->
  <line x1="625" y1="178" x2="625" y2="190" stroke="#55c555" stroke-width="2"/>
  <!-- N side -->
  <line x1="645" y1="184" x2="637" y2="178" stroke="#55c555" stroke-width="2"/>
  <line x1="645" y1="184" x2="635" y2="184" stroke="#55c555" stroke-width="2"/>
  <line x1="645" y1="184" x2="637" y2="190" stroke="#55c555" stroke-width="2"/>

  <text x="640" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자식은 독립 PK 보유</text>
  <text x="640" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">부모 없이도 존재 가능 (NULL FK)</text>

  <!-- Code snippet -->
  <rect x="476" y="300" width="328" height="82" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">CREATE TABLE</text><text x="583" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8"> orders (</text>
  <text x="492" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  id      </text><text x="548" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">BIGINT PRIMARY KEY</text><text x="704" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">,</text>
  <text x="492" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">  cust_id INT </tspan><tspan fill="#7ec8e3">REFERENCES</tspan><tspan fill="#e8e8e8"> customers,</tspan></text>
  <text x="492" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  total   NUMERIC(12,2));</text>

  <!-- Bottom summary -->
  <rect x="60" y="410" width="760" height="36" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="433" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">실무 기본값 = 비식별 관계 (서로게이트 PK) · 식별 관계는 약한 엔티티·로그·이력 테이블에 한정</text>
</svg>
