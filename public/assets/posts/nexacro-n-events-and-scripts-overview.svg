<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 이벤트 &amp; 스크립트 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">사용자 행동 → 이벤트 → 핸들러 → 스크립트 처리</text>

  <!-- User Action Box -->
  <rect x="60" y="108" width="180" height="64" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">사용자 행동</text>
  <text x="150" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">클릭 / 입력 / 포커스</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="140" x2="288" y2="140" stroke="#555" stroke-width="2"/>
  <polygon points="288,133 300,140 288,147" fill="#555"/>

  <!-- Event Box -->
  <rect x="300" y="108" width="180" height="64" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">이벤트 발생</text>
  <text x="390" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">onclick / onchanged 등</text>

  <!-- Arrow 2 -->
  <line x1="480" y1="140" x2="528" y2="140" stroke="#555" stroke-width="2"/>
  <polygon points="528,133 540,140 528,147" fill="#555"/>

  <!-- Handler Box -->
  <rect x="540" y="108" width="180" height="64" rx="10" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">핸들러 실행</text>
  <text x="630" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">form 스크립트 함수</text>

  <!-- Three Categories below -->
  <!-- Event Types -->
  <rect x="60" y="220" width="240" height="240" rx="10" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="180" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">주요 이벤트 유형</text>
  <line x1="80" y1="258" x2="280" y2="258" stroke="#333" stroke-width="1"/>
  <text x="90" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• onclick</text>
  <text x="90" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• ondblclick</text>
  <text x="90" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• onchanged</text>
  <text x="90" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• onfocus / onkillfocus</text>
  <text x="90" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• onload / onunload</text>
  <text x="90" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• oncurrentchanged</text>
  <text x="90" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• ontransactionerror</text>

  <!-- Script Structure -->
  <rect x="320" y="220" width="240" height="240" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">스크립트 구성</text>
  <line x1="340" y1="258" x2="540" y2="258" stroke="#333" stroke-width="1"/>
  <text x="350" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 이벤트 핸들러</text>
  <text x="350" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 공통 함수(fn_*)</text>
  <text x="350" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 초기화 함수</text>
  <text x="350" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 트랜잭션 콜백</text>
  <text x="350" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 유효성 검사 함수</text>
  <text x="350" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 포맷/변환 함수</text>
  <text x="350" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 헬퍼 함수</text>

  <!-- Script Scope -->
  <rect x="580" y="220" width="240" height="240" rx="10" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">스크립트 범위</text>
  <line x1="600" y1="258" x2="800" y2="258" stroke="#333" stroke-width="1"/>
  <text x="610" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• Form 스크립트</text>
  <text x="630" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해당 Form 내 전역</text>
  <text x="610" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• Include 스크립트</text>
  <text x="630" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">여러 Form 공유</text>
  <text x="610" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• App 스크립트</text>
  <text x="630" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">애플리케이션 전역</text>
  <text x="610" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• External JS</text>
  <text x="630" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">외부 라이브러리</text>

  <!-- Bottom arrow from event to handler -->
  <line x1="630" y1="172" x2="630" y2="220" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
