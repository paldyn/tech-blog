<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker pause / unpause — cgroup freezer 동작 원리</text>

  <!-- Running state -->
  <rect x="60" y="80" width="360" height="300" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">RUNNING 상태</text>

  <!-- CPU scheduler -->
  <rect x="80" y="124" width="320" height="60" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">CPU 스케줄러</text>
  <text x="240" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">프로세스 정상 스케줄링</text>

  <!-- Processes -->
  <rect x="80" y="202" width="90" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="125" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">PID 1001</text>

  <rect x="190" y="202" width="90" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="235" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">PID 1002</text>

  <rect x="300" y="202" width="90" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="345" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">PID 1003</text>

  <!-- cgroup status -->
  <rect x="80" y="264" width="320" height="50" rx="6" fill="#0d1a0d" stroke="#333"/>
  <text x="96" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">cgroup freezer.state:</text>
  <text x="96" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">THAWED</text>

  <!-- Memory usage indicator -->
  <rect x="80" y="330" width="320" height="36" rx="6" fill="#0d1a0d" stroke="#333"/>
  <text x="96" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메모리: 유지  |  CPU: 사용 중  |  I/O: 진행 중</text>

  <!-- Arrow: pause -->
  <line x1="420" y1="220" x2="460" y2="220" stroke="#e05555" stroke-width="2.5"/>
  <polygon points="448,213 462,220 448,227" fill="#e05555"/>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">docker pause</text>

  <!-- Arrow: unpause -->
  <line x1="460" y1="240" x2="420" y2="240" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="432,233 418,240 432,247" fill="#55c555"/>
  <text x="440" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">docker unpause</text>

  <!-- Paused state -->
  <rect x="460" y="80" width="360" height="300" rx="10" fill="#1a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="640" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">PAUSED 상태</text>

  <!-- CPU scheduler paused -->
  <rect x="480" y="124" width="320" height="60" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">CPU 스케줄러</text>
  <text x="640" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SIGSTOP 대기 (스케줄 불가)</text>

  <!-- Frozen processes -->
  <rect x="480" y="202" width="90" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1" opacity="0.7"/>
  <text x="525" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" opacity="0.7">PID 1001</text>

  <rect x="590" y="202" width="90" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1" opacity="0.7"/>
  <text x="635" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" opacity="0.7">PID 1002</text>

  <rect x="700" y="202" width="90" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1" opacity="0.7"/>
  <text x="745" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" opacity="0.7">PID 1003</text>

  <!-- Frozen text -->
  <text x="525" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">❄ 동결</text>
  <text x="635" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">❄ 동결</text>
  <text x="745" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">❄ 동결</text>

  <!-- cgroup status paused -->
  <rect x="480" y="264" width="320" height="50" rx="6" fill="#1a0d0d" stroke="#333"/>
  <text x="496" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">cgroup freezer.state:</text>
  <text x="496" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">FROZEN</text>

  <!-- Memory kept -->
  <rect x="480" y="330" width="320" height="36" rx="6" fill="#1a0d0d" stroke="#333"/>
  <text x="496" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메모리: 유지  |  CPU: 0%  |  I/O: 중단</text>

  <!-- Bottom note -->
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">pause는 프로세스를 종료하지 않음 — 메모리 상태·파일 핸들·소켓 연결 모두 보존</text>
</svg>
