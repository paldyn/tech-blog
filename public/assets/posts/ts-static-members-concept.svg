<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arrDown" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 14 L 14 0 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrR2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a020"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">정적 멤버 vs 인스턴스 멤버</text>

  <!-- Class box -->
  <rect x="270" y="66" width="340" height="130" rx="10" fill="#0a0a12" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Counter 클래스</text>

  <!-- Static section -->
  <rect x="286" y="104" width="148" height="72" rx="6" fill="#1a1200" stroke="#e0a020" stroke-width="1.5"/>
  <text x="360" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0a020" text-anchor="middle">static (클래스 공유)</text>
  <text x="360" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">count: number</text>
  <text x="360" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">reset(): void</text>

  <!-- Instance section -->
  <rect x="446" y="104" width="148" height="72" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="520" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">instance (각자)</text>
  <text x="520" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">id: number</text>
  <text x="520" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">increment(): void</text>

  <!-- Access from class name -->
  <rect x="60" y="240" width="200" height="52" rx="8" fill="#111" stroke="#e0a020" stroke-width="1.5"/>
  <text x="160" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e0a020" text-anchor="middle">Counter.count</text>
  <text x="160" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">클래스 이름으로 접근</text>

  <!-- Arrow class to static -->
  <line x1="200" y1="266" x2="286" y2="180" stroke="#e0a020" stroke-width="2" marker-end="url(#arrR2)"/>

  <!-- Instances -->
  <rect x="60" y="330" width="180" height="52" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">instance 1</text>
  <text x="150" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">{ id: 1 }</text>

  <rect x="260" y="330" width="180" height="52" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="350" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">instance 2</text>
  <text x="350" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">{ id: 2 }</text>

  <rect x="460" y="330" width="180" height="52" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="550" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">instance 3</text>
  <text x="550" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">{ id: 3 }</text>

  <!-- Shared count -->
  <rect x="660" y="330" width="160" height="52" rx="8" fill="#1a1200" stroke="#e0a020" stroke-width="2"/>
  <text x="740" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a020" text-anchor="middle">count = 3</text>
  <text x="740" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 인스턴스 공유</text>

  <!-- Arrows from instances to count (dashed) -->
  <line x1="240" y1="356" x2="660" y2="356" stroke="#e0a020" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="440" y1="356" x2="660" y2="356" stroke="#e0a020" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="640" y1="356" x2="660" y2="356" stroke="#e0a020" stroke-width="1.5" stroke-dasharray="4,4"/>
</svg>
