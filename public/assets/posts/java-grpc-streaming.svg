<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">gRPC의 네 가지 호출 방식</text>

  <!-- unary -->
  <rect x="50" y="90" width="190" height="200" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="145" y="120" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Unary</text>
  <text x="145" y="158" font-size="12" fill="#ffffff" text-anchor="middle">요청 1 → 응답 1</text>
  <text x="145" y="186" font-size="12" fill="#888" text-anchor="middle">일반 함수 호출과</text>
  <text x="145" y="206" font-size="12" fill="#888" text-anchor="middle">동일한 형태</text>
  <text x="145" y="252" font-size="12" fill="#888" text-anchor="middle">가장 흔한 방식</text>

  <!-- server stream -->
  <rect x="255" y="90" width="190" height="200" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="350" y="120" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Server Streaming</text>
  <text x="350" y="158" font-size="12" fill="#ffffff" text-anchor="middle">요청 1 → 응답 N</text>
  <text x="350" y="186" font-size="12" fill="#888" text-anchor="middle">서버가 여러 건을</text>
  <text x="350" y="206" font-size="12" fill="#888" text-anchor="middle">차례로 보냄</text>
  <text x="350" y="252" font-size="12" fill="#888" text-anchor="middle">목록·구독 전송</text>

  <!-- client stream -->
  <rect x="460" y="90" width="190" height="200" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="555" y="120" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Client Streaming</text>
  <text x="555" y="158" font-size="12" fill="#ffffff" text-anchor="middle">요청 N → 응답 1</text>
  <text x="555" y="186" font-size="12" fill="#888" text-anchor="middle">클라이언트가 여러</text>
  <text x="555" y="206" font-size="12" fill="#888" text-anchor="middle">건을 모아 보냄</text>
  <text x="555" y="252" font-size="12" fill="#888" text-anchor="middle">업로드·집계</text>

  <!-- bidi -->
  <rect x="665" y="90" width="190" height="200" rx="10" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="760" y="120" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Bidirectional</text>
  <text x="760" y="158" font-size="12" fill="#ffffff" text-anchor="middle">요청 N ↔ 응답 N</text>
  <text x="760" y="186" font-size="12" fill="#888" text-anchor="middle">양쪽이 동시에</text>
  <text x="760" y="206" font-size="12" fill="#888" text-anchor="middle">자유롭게 스트림</text>
  <text x="760" y="252" font-size="12" fill="#888" text-anchor="middle">실시간 양방향</text>
</svg>
