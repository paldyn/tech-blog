<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MutationObserver 사용 예제</text>

  <rect x="60" y="64" width="760" height="292" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> observer = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> MutationObserver((mutations) =&gt; {</tspan></text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> m </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#ffffff"> mutations) {</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (m.type === </tspan><tspan fill="#ce9178">'childList'</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">      m.addedNodes.</tspan><tspan fill="#ffffff">forEach</tspan><tspan fill="#ffffff">(n =&gt; console.</tspan><tspan fill="#ffffff">log</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'추가:'</tspan><tspan fill="#ffffff">, n));</tspan></text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    } </tspan><tspan fill="#7ec8e3">else if</tspan><tspan fill="#ffffff"> (m.type === </tspan><tspan fill="#ce9178">'attributes'</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="84" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">      console.</tspan><tspan fill="#ffffff">log</tspan><tspan fill="#ffffff">(m.attributeName, </tspan><tspan fill="#ce9178">'변경'</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    }</tspan></text>
  <text x="84" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  }</tspan></text>
  <text x="84" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">});</tspan></text>

  <line x1="84" y1="250" x2="796" y2="250" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> target = document.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'#app'</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">observer.</tspan><tspan fill="#ffffff">observe</tspan><tspan fill="#ffffff">(target, {</tspan></text>
  <text x="84" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  childList: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">, subtree: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">, attributes: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="84" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">});</tspan></text>
  <text x="84" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 정리: observer.disconnect();  |  observer.takeRecords()</tspan></text>
</svg>
