<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MutationObserver 사용 예제</text>

  <rect x="60" y="64" width="760" height="292" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> observer = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> MutationObserver((mutations) =&gt; {</tspan></text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  </tspan><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> m </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#e8e8e8"> mutations) {</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">if</tspan><tspan fill="#e8e8e8"> (m.type === </tspan><tspan fill="#ce9178">'childList'</tspan><tspan fill="#e8e8e8">) {</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">      m.addedNodes.</tspan><tspan fill="#e8e8e8">forEach</tspan><tspan fill="#e8e8e8">(n =&gt; console.</tspan><tspan fill="#e8e8e8">log</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'추가:'</tspan><tspan fill="#e8e8e8">, n));</tspan></text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    } </tspan><tspan fill="#7ec8e3">else if</tspan><tspan fill="#e8e8e8"> (m.type === </tspan><tspan fill="#ce9178">'attributes'</tspan><tspan fill="#e8e8e8">) {</tspan></text>
  <text x="84" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">      console.</tspan><tspan fill="#e8e8e8">log</tspan><tspan fill="#e8e8e8">(m.attributeName, </tspan><tspan fill="#ce9178">'변경'</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="84" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    }</tspan></text>
  <text x="84" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  }</tspan></text>
  <text x="84" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">});</tspan></text>

  <line x1="84" y1="250" x2="796" y2="250" stroke="#1e2433" stroke-width="1"/>

  <text x="84" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> target = document.</tspan><tspan fill="#e8e8e8">querySelector</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'#app'</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="84" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">observer.</tspan><tspan fill="#e8e8e8">observe</tspan><tspan fill="#e8e8e8">(target, {</tspan></text>
  <text x="84" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  childList: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#e8e8e8">, subtree: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#e8e8e8">, attributes: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text x="84" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">});</tspan></text>
  <text x="84" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#6a8aa0">// 정리: observer.disconnect();  |  observer.takeRecords()</tspan></text>
</svg>
