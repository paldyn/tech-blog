<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 0 L 7 13 L 13 0 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">동적 라우트 파라미터 흐름</text>

  <!-- URL examples -->
  <rect x="50" y="68" width="780" height="56" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">URL 예시</text>
  <text x="180" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3">/blog/hello-world</text>
  <text x="440" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3">/blog/nextjs-tips</text>
  <text x="700" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3">/blog/react-hooks</text>

  <!-- File path box -->
  <rect x="50" y="148" width="780" height="52" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">파일 경로</text>
  <text x="440" y="190" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="700" fill="#55c555">app/blog/[slug]/page.tsx</text>

  <!-- Arrow down -->
  <line x1="440" y1="200" x2="440" y2="224" stroke="#55c555" stroke-width="2"
        marker-end="url(#arr-down)"/>

  <!-- params flow -->
  <rect x="230" y="224" width="420" height="52" rx="8" fill="#0d1f2d" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="440" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">컴포넌트 파라미터</text>
  <text x="440" y="265" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3">params: Promise&lt;{ slug: string }&gt;</text>

  <!-- Arrow down -->
  <line x1="440" y1="276" x2="440" y2="298" stroke="#55c555" stroke-width="2"
        marker-end="url(#arr-down)"/>

  <!-- Code block: page component -->
  <rect x="50" y="298" width="780" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// app/blog/[slug]/page.tsx</text>
  <text x="66" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export default async function</text>
  <text x="66" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  BlogPost({ params }: { params: Promise&lt;{ slug: string }&gt; }) {</text>
  <text x="66" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  const { slug } = await params  </text>
  <text x="66" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // slug = 'hello-world' | 'nextjs-tips' | ...</text>
  <text x="66" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  const post = await getPost(slug)</text>
  <text x="66" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  return &lt;article&gt;{post.content}&lt;/article&gt;</text>
  <text x="66" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
