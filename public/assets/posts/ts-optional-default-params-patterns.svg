<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">선택적/기본값 매개변수 패턴</text>

  <!-- Pattern 1: Error case -->
  <text x="230" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">오류: 선택적 후 필수 불가</text>

  <rect x="60" y="88" width="340" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// ❌ 컴파일 오류</text>
  <text x="75" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> bad(a</tspan>
    <tspan fill="#e05555">?</tspan>
    <tspan fill="#ffffff">: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">, b: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">) {}</tspan>
  </text>
  <text x="75" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// ✓ 올바른 순서</text>
  <text x="75" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> ok(b: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">, a</tspan>
    <tspan fill="#55c555">?</tspan>
    <tspan fill="#ffffff">: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">) {}</tspan>
  </text>
  <text x="75" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 필수 매개변수는 선택적 앞에 위치</text>

  <!-- Pattern 2: Generics with defaults -->
  <text x="650" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">제네릭 + 기본값</text>

  <rect x="480" y="88" width="340" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="495" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 제네릭과 기본값 조합</text>
  <text x="495" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> wrap&lt;T = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">&gt;(</tspan>
  </text>
  <text x="495" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  value: T,</tspan>
  </text>
  <text x="495" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  label = </tspan>
    <tspan fill="#ce9178">'value'</tspan>
    <tspan fill="#ffffff">): { label: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">; value: T }</tspan>
  </text>
  <text x="495" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  { </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> { label, value }; }</tspan>
  </text>

  <!-- Pattern 3: Object destructuring with defaults -->
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">객체 구조분해 + 기본값</text>

  <rect x="60" y="230" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 옵션 객체 패턴 (Options Object Pattern)</text>
  <text x="75" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">interface</tspan>
    <tspan fill="#ffffff"> Config { host: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">; port</tspan>
    <tspan fill="#7ec8e3" font-weight="600">?</tspan>
    <tspan fill="#ffffff">: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">; tls</tspan>
    <tspan fill="#7ec8e3" font-weight="600">?</tspan>
    <tspan fill="#ffffff">: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">boolean</tspan>
    <tspan fill="#ffffff"> }</tspan>
  </text>
  <text x="75" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> connect({ host, port = </tspan>
    <tspan fill="#b5cea8">3000</tspan>
    <tspan fill="#ffffff">, tls = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">false</tspan>
    <tspan fill="#ffffff"> }: Config) {</tspan>
  </text>
  <text x="75" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#9aa4b8">  // port와 tls는 기본값 자동 적용</tspan>
  </text>
  <text x="75" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  console.log(`${host}:${port} tls=${tls}`);</tspan>
  </text>
  <text x="75" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Bottom info -->
  <rect x="60" y="378" width="370" height="62" rx="6" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="245" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">선택적 체이닝과 함께 사용</text>
  <text x="245" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">greet(user?.name ?? 'Guest')</text>
  <text x="245" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">null 병합 연산자로 안전하게 전달</text>

  <rect x="450" y="378" width="370" height="62" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">기본값 표현식 사용 가능</text>
  <text x="635" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">function f(n = Date.now()) {...}</text>
  <text x="635" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">호출 시마다 기본값 표현식 평가</text>
</svg>
