<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Topology Spread Constraints — Pod 분산 배치</text>

  <!-- Without TSC - skewed -->
  <rect x="40" y="72" width="370" height="380" rx="10" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="225" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">TSC 없음 — 편중 발생</text>

  <!-- Zone A -->
  <rect x="58" y="112" width="155" height="320" rx="8" fill="#1a1a0a" stroke="#888" stroke-width="1"/>
  <text x="135" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Zone A</text>
  <rect x="68" y="142" width="55" height="32" rx="4" fill="#7ec8e3" opacity="0.8"/>
  <text x="95" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">Pod 1</text>
  <rect x="130" y="142" width="55" height="32" rx="4" fill="#7ec8e3" opacity="0.8"/>
  <text x="157" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">Pod 2</text>
  <rect x="68" y="184" width="55" height="32" rx="4" fill="#7ec8e3" opacity="0.8"/>
  <text x="95" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">Pod 3</text>
  <rect x="130" y="184" width="55" height="32" rx="4" fill="#7ec8e3" opacity="0.8"/>
  <text x="157" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">Pod 4</text>
  <rect x="68" y="226" width="55" height="32" rx="4" fill="#7ec8e3" opacity="0.8"/>
  <text x="95" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">Pod 5</text>
  <text x="135" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">5개 몰림</text>
  <text x="135" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">AZ 장애 시</text>
  <text x="135" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">서비스 전체 다운</text>

  <!-- Zone B -->
  <rect x="225" y="112" width="155" height="320" rx="8" fill="#1a1a0a" stroke="#888" stroke-width="1"/>
  <text x="302" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Zone B</text>
  <text x="302" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">0개</text>
  <text x="302" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="30" fill="#888" text-anchor="middle">∅</text>

  <!-- With TSC - balanced -->
  <rect x="460" y="72" width="380" height="380" rx="10" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">TSC 적용 — 균등 분산</text>

  <!-- Zone A balanced -->
  <rect x="478" y="112" width="155" height="320" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="555" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Zone A</text>
  <rect x="488" y="142" width="55" height="32" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="515" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">Pod 1</text>
  <rect x="550" y="142" width="55" height="32" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="577" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">Pod 2</text>
  <rect x="488" y="184" width="55" height="32" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="515" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">Pod 3</text>
  <text x="555" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">3개</text>

  <!-- Zone B balanced -->
  <rect x="645" y="112" width="155" height="320" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="722" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Zone B</text>
  <rect x="655" y="142" width="55" height="32" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="682" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">Pod 4</text>
  <rect x="717" y="142" width="55" height="32" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="744" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">Pod 5</text>
  <text x="722" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">2개</text>
  <text x="722" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">maxSkew=1</text>
  <text x="722" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">차이 1 ≤ 허용</text>

  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">maxSkew: 토폴로지 도메인 간 Pod 수 최대 허용 차이</text>
</svg>
