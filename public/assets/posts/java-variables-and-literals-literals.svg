<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Java 리터럴 종류</text>

  <!-- Vertical divider -->
  <line x1="450" y1="66" x2="450" y2="438" stroke="#3a4a6e" stroke-width="1"/>

  <!-- ═══════ LEFT: 코드 예제 ═══════ -->
  <text x="60" y="82" font-size="16" font-weight="600" fill="#e8e8e8">리터럴 예제</text>

  <!-- Code block -->
  <rect x="60" y="94" width="370" height="216" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text xml:space="preserve" x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// ── 정수형 ──</tspan></text>
  <text xml:space="preserve" x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">int</tspan><tspan fill="#ffffff">  a = </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">;        </tspan><tspan fill="#9aa4b8">// 10진수</tspan></text>
  <text xml:space="preserve" x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">int</tspan><tspan fill="#ffffff">  b = </tspan><tspan fill="#b5cea8">0xFF</tspan><tspan fill="#ffffff">;      </tspan><tspan fill="#9aa4b8">// 16진수</tspan></text>
  <text xml:space="preserve" x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">long</tspan><tspan fill="#ffffff"> c = </tspan><tspan fill="#b5cea8">1_000L</tspan><tspan fill="#ffffff">;    </tspan><tspan fill="#9aa4b8">// 구분자·long</tspan></text>
  <text xml:space="preserve" x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// ── 부동소수점 ──</tspan></text>
  <text xml:space="preserve" x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">double</tspan><tspan fill="#ffffff"> d = </tspan><tspan fill="#b5cea8">3.14</tspan><tspan fill="#ffffff">;     </tspan><tspan fill="#9aa4b8">// 기본 double</tspan></text>
  <text xml:space="preserve" x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">float</tspan><tspan fill="#ffffff">  e = </tspan><tspan fill="#b5cea8">3.14f</tspan><tspan fill="#ffffff">;    </tspan><tspan fill="#9aa4b8">// 접미사 f</tspan></text>
  <text xml:space="preserve" x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// ── 문자·문자열 ──</tspan></text>
  <text xml:space="preserve" x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">char</tspan><tspan fill="#ffffff">   f = </tspan><tspan fill="#ce9178">'A'</tspan><tspan fill="#ffffff">;      </tspan><tspan fill="#9aa4b8">// 단일 문자</tspan></text>
  <text xml:space="preserve" x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">String</tspan><tspan fill="#ffffff"> g = </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">;  </tspan><tspan fill="#9aa4b8">// 문자열</tspan></text>
  <text xml:space="preserve" x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">boolean</tspan><tspan fill="#ffffff"> h = </tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff">;   </tspan><tspan fill="#9aa4b8">// 논리</tspan></text>

  <!-- ═══════ RIGHT: 리터럴 범주 ═══════ -->
  <text x="470" y="82" font-size="16" font-weight="600" fill="#e8e8e8">리터럴 범주</text>

  <!-- Category 1: 정수형 -->
  <rect x="470" y="94" width="350" height="80" rx="6" fill="#0d1929" stroke="#3a4a6e"/>
  <rect x="470" y="94" width="4" height="80" rx="2" fill="#b5cea8"/>
  <text x="486" y="118" font-size="14" font-weight="600" fill="#b5cea8">정수형 리터럴</text>
  <text x="486" y="137" font-size="12" fill="#c8c8c8">접두사: 0x(16진), 0b(2진), 0(8진)</text>
  <text x="486" y="155" font-size="12" fill="#888">접미사 L/l → long, 구분자 _ 사용 가능(JDK 7+)</text>

  <!-- Category 2: 부동소수점 -->
  <rect x="470" y="182" width="350" height="80" rx="6" fill="#0d1929" stroke="#3a4a6e"/>
  <rect x="470" y="182" width="4" height="80" rx="2" fill="#7ec8e3"/>
  <text x="486" y="206" font-size="14" font-weight="600" fill="#7ec8e3">부동소수점 리터럴</text>
  <text x="486" y="225" font-size="12" fill="#c8c8c8">기본 타입: double (접미사 d 생략 가능)</text>
  <text x="486" y="243" font-size="12" fill="#888">float은 반드시 접미사 f/F 명시</text>

  <!-- Category 3: 문자·문자열 -->
  <rect x="470" y="270" width="350" height="80" rx="6" fill="#0d1929" stroke="#3a4a6e"/>
  <rect x="470" y="270" width="4" height="80" rx="2" fill="#ce9178"/>
  <text x="486" y="294" font-size="14" font-weight="600" fill="#ce9178">문자 &amp; 문자열 리터럴</text>
  <text x="486" y="313" font-size="12" fill="#c8c8c8">char: 작은따옴표, '\n' '\t' '\uXXXX'</text>
  <text x="486" y="331" font-size="12" fill="#888">String: 큰따옴표, 문자열 풀(String Pool) 저장</text>

  <!-- Category 4: 논리·null -->
  <rect x="470" y="358" width="350" height="62" rx="6" fill="#0d1929" stroke="#3a4a6e"/>
  <rect x="470" y="358" width="4" height="62" rx="2" fill="#7777cc"/>
  <text x="486" y="382" font-size="14" font-weight="600" fill="#7777cc">논리 &amp; null 리터럴</text>
  <text x="486" y="401" font-size="12" fill="#888">boolean: true / false (소문자 고정)</text>
  <text x="486" y="416" font-size="12" fill="#888">null: 참조형 변수에만 대입 가능</text>
</svg>
