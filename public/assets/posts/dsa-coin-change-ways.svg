<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">동전 교환 경우의 수 (Coin Change II)</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">동전 [1,2,5], amount=5 — 몇 가지 방법?</text>

  <!-- Left: ways table -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">dp[i] = 금액 i를 만드는 경우의 수</text>

  <!-- Header -->
  <text x="98" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">0</text>
  <text x="148" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1</text>
  <text x="198" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">2</text>
  <text x="248" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">3</text>
  <text x="298" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">4</text>
  <text x="348" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">5</text>

  <!-- After c=1 -->
  <text x="62" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">c=1:</text>
  <rect x="74" y="130" width="48" height="32" fill="#1a3a2a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="98" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">1</text>
  <rect x="124" y="130" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="148" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">1</text>
  <rect x="174" y="130" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="198" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">1</text>
  <rect x="224" y="130" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="248" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">1</text>
  <rect x="274" y="130" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="298" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">1</text>
  <rect x="324" y="130" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="348" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">1</text>

  <!-- After c=2 -->
  <text x="62" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">c=2:</text>
  <rect x="74" y="178" width="48" height="32" fill="#1a3a2a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="98" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">1</text>
  <rect x="124" y="178" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="148" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">1</text>
  <rect x="174" y="178" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="198" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">2</text>
  <rect x="224" y="178" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="248" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">2</text>
  <rect x="274" y="178" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="298" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">3</text>
  <rect x="324" y="178" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="348" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">3</text>

  <!-- After c=5 -->
  <text x="62" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">c=5:</text>
  <rect x="74" y="226" width="48" height="32" fill="#1a3a2a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="98" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">1</text>
  <rect x="124" y="226" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="148" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">1</text>
  <rect x="174" y="226" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="198" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">2</text>
  <rect x="224" y="226" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="248" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">2</text>
  <rect x="274" y="226" width="48" height="32" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="298" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">3</text>
  <rect x="324" y="226" width="48" height="32" fill="#2a4a2a" rx="3" stroke="#77dd77" stroke-width="2"/>
  <text x="348" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#77dd77">4</text>

  <text x="390" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#77dd77">← 4가지 방법</text>
  <text x="390" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">{5}, {2+2+1}, {2+1+1+1}, {1×5}</text>

  <!-- Right: Code -->
  <rect x="490" y="88" width="360" height="168" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Coin Change II: 경우의 수</text>
  <text x="506" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def change(amount, coins):</text>
  <text x="506" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp = [0] * (amount + 1)</text>
  <text x="506" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp[0] = 1  # 빈 집합 1가지</text>
  <text x="506" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for c in coins:  # 동전 순서 외부</text>
  <text x="506" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">        for i in range(c, amount+1):</text>
  <text x="506" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">            dp[i] += dp[i - c]</text>
  <text x="506" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    return dp[amount]</text>
  <text x="506" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 순열이 아닌 조합만 셈</text>

  <!-- Bottom comparison -->
  <rect x="60" y="298" width="760" height="82" fill="#111" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">순열 vs 조합: 반복문 순서가 핵심</text>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">조합 수 (순서 무관): for coin / for amount — 중복 없음</text>
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">순열 수 (순서 유관): for amount / for coin — 모든 순서 포함</text>
</svg>
