<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useContext 3단계 패턴</text>

  <!-- Step labels -->
  <text x="143" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">① 컨텍스트 생성</text>
  <text x="440" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">② Provider로 값 공급</text>
  <text x="737" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">③ Consumer에서 구독</text>

  <!-- Box 1: createContext -->
  <rect x="60" y="100" width="166" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// context.js</tspan>
  </text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  createContext</tspan>
  </text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">} </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'react'</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  </text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export const</tspan>
  </text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  ThemeCtx =</tspan>
  </text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  createContext</tspan>
  </text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  (</tspan><tspan fill="#ce9178">'light'</tspan><tspan fill="#ffffff">);</tspan>
  </text>

  <!-- Box 2: Provider -->
  <rect x="244" y="100" width="388" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="260" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> App() {</tspan>
  </text>
  <text x="260" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [t, setT] = </tspan><tspan fill="#7ec8e3" font-weight="600">useState</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'dark'</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="260" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
  </text>
  <text x="260" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    &lt;</tspan><tspan fill="#55c555">ThemeCtx.Provider</tspan>
  </text>
  <text x="260" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">      value={{ theme: t, setTheme: setT }}</tspan>
  </text>
  <text x="260" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    &gt;</tspan>
  </text>
  <text x="260" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Layout</tspan><tspan fill="#ffffff"> /&gt;</tspan>
  </text>
  <text x="260" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    &lt;/</tspan><tspan fill="#55c555">ThemeCtx.Provider</tspan><tspan fill="#ffffff">&gt;</tspan>
  </text>
  <text x="260" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  );</text>

  <!-- Box 3: Consumer -->
  <rect x="650" y="100" width="170" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="666" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
  </text>
  <text x="666" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">ThemeButton() {</tspan>
  </text>
  <text x="666" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="666" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    theme,</tspan>
  </text>
  <text x="666" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    setTheme</tspan>
  </text>
  <text x="666" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  } = </tspan><tspan fill="#7ec8e3" font-weight="600">useContext</tspan>
  </text>
  <text x="666" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    (ThemeCtx);</tspan>
  </text>
  <text x="666" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
  </text>
  <text x="666" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    &lt;button&gt;...</tspan>
  </text>
</svg>
