<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">시작 줄 (Start Line) 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">요청과 응답의 첫 번째 줄 — 메시지 방향과 결과를 결정</text>

  <!-- Request start line -->
  <rect x="60" y="95" width="360" height="270" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">요청 줄</text>
  <text x="240" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메서드 SP 요청-목표 SP HTTP-버전 CRLF</text>

  <!-- Parsed boxes -->
  <rect x="80" y="156" width="80" height="40" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="120" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">POST</text>

  <rect x="174" y="156" width="140" height="40" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="244" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" text-anchor="middle">/api/users</text>

  <rect x="328" y="156" width="74" height="40" rx="6" fill="#1a0e00" stroke="#ce9178" stroke-width="1.5"/>
  <text x="365" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" text-anchor="middle">HTTP/1.1</text>

  <text x="120" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메서드</text>
  <text x="244" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">요청 목표(경로)</text>
  <text x="365" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">버전</text>

  <!-- Rule description for request -->
  <rect x="80" y="236" width="320" height="110" rx="6" fill="#111" stroke="#2a3a2a" stroke-width="1"/>
  <text x="100" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">메서드 규칙</text>
  <text x="100" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">대문자만 허용 (GET, POST, PUT...)</text>
  <text x="100" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">요청 목표 규칙</text>
  <text x="100" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">절대 경로, 쿼리 포함 가능</text>
  <text x="100" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">예: /search?q=http&amp;page=1</text>

  <!-- Response status line -->
  <rect x="460" y="95" width="360" height="270" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">상태 줄</text>
  <text x="640" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HTTP-버전 SP 상태코드 SP 이유구문 CRLF</text>

  <!-- Parsed boxes -->
  <rect x="478" y="156" width="80" height="40" rx="6" fill="#1a0e00" stroke="#ce9178" stroke-width="1.5"/>
  <text x="518" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" text-anchor="middle">HTTP/1.1</text>

  <rect x="572" y="156" width="64" height="40" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="604" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">200</text>

  <rect x="650" y="156" width="152" height="40" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="726" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" text-anchor="middle">OK</text>

  <text x="518" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">버전</text>
  <text x="604" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상태 코드</text>
  <text x="726" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이유 구문</text>

  <rect x="478" y="236" width="322" height="110" rx="6" fill="#111" stroke="#2a3a2a" stroke-width="1"/>
  <text x="498" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">상태 코드 범위</text>
  <text x="498" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">1xx 정보 · 2xx 성공 · 3xx 리다이렉트</text>
  <text x="498" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">4xx 클라이언트 오류 · 5xx 서버 오류</text>
  <text x="498" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">이유 구문</text>
  <text x="498" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HTTP/2부터는 생략됨 (프레임 기반)</text>

  <!-- Bottom note -->
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">SP = 공백 한 칸 (0x20) · CRLF = \r\n (0x0D 0x0A) — RFC 7230 토큰 정의</text>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">HTTP/2·3에서는 시작 줄이 헤더 프레임의 가상 헤더(:method, :status 등)로 대체됨</text>
</svg>
