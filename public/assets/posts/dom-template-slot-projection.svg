<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">slot — Light DOM 콘텐츠 투영</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">실제 이동 없이 렌더링 위치만 바뀜</text>

  <!-- Light DOM (left) -->
  <text x="200" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Light DOM (사용처)</text>
  <rect x="60" y="118" width="280" height="200" rx="8" fill="#0a0d1a" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="84" y="138" width="232" height="28" rx="5" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">&lt;my-dialog title="확인"&gt;</text>

  <rect x="100" y="176" width="196" height="24" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="198" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">&lt;p slot="body"&gt;내용&lt;/p&gt;</text>

  <rect x="100" y="208" width="196" height="24" rx="4" fill="#1a1a2e" stroke="#55c555" stroke-width="1"/>
  <text x="198" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">&lt;button slot="footer"&gt;OK&lt;/button&gt;</text>

  <rect x="84" y="240" width="232" height="24" rx="5" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">&lt;/my-dialog&gt;</text>

  <!-- Arrow -->
  <line x1="340" y1="218" x2="400" y2="218" stroke="#555" stroke-width="2"/>
  <polygon points="410,218 398,212 398,224" fill="#555"/>
  <text x="375" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">투영</text>

  <!-- Shadow DOM (right) -->
  <text x="640" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Shadow DOM (컴포넌트 내부)</text>
  <rect x="420" y="118" width="400" height="260" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>

  <rect x="444" y="138" width="352" height="24" rx="4" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">&lt;div class="dialog"&gt;</text>

  <rect x="460" y="172" width="300" height="24" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="610" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">&lt;h2&gt; 제목 속성 &lt;/h2&gt;</text>

  <!-- Named slot: body -->
  <rect x="460" y="206" width="300" height="34" rx="4" fill="#1a0a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="610" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">&lt;slot name="body"&gt;</text>
  <text x="610" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">← &lt;p slot="body"&gt; 투영됨</text>

  <!-- Named slot: footer -->
  <rect x="460" y="250" width="300" height="34" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">&lt;slot name="footer"&gt;</text>
  <text x="610" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">← &lt;button slot="footer"&gt; 투영됨</text>

  <rect x="444" y="294" width="352" height="24" rx="4" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">&lt;/div&gt;</text>

  <!-- Default slot note -->
  <rect x="60" y="348" width="760" height="48" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">이름 없는 &lt;slot&gt; = 기본 슬롯 (slot 속성 없는 모든 자식을 받음)</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">슬롯 폴백: &lt;slot name="icon"&gt;☆&lt;/slot&gt; — slot 없을 때 기본 콘텐츠 표시</text>

  <!-- slotchange event -->
  <rect x="60" y="416" width="760" height="48" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">slotchange 이벤트: 슬롯 배분이 바뀔 때 발화</text>
  <text x="440" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">slot.assignedNodes()  |  slot.assignedElements()  — 배분된 노드 접근</text>
</svg>
