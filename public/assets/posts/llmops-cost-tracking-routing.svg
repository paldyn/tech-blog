<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="rt-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="rt-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="rt-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">비용 최적화: 지능형 모델 라우팅</text>

  <!-- User Request -->
  <rect x="340" y="68" width="200" height="54" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">사용자 요청</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자연어 질문</text>

  <line x1="440" y1="122" x2="440" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rt-arr)"/>

  <!-- Complexity classifier -->
  <rect x="280" y="154" width="320" height="54" rx="8" fill="#2a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">복잡도 분류기</text>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단어 수 · 추론 필요 여부 · 도메인 키워드</text>

  <!-- Fan-out to three models -->
  <line x1="360" y1="208" x2="180" y2="246" stroke="#55c555" stroke-width="2" marker-end="url(#rt-green)"/>
  <line x1="440" y1="208" x2="440" y2="246" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rt-arr)"/>
  <line x1="520" y1="208" x2="660" y2="246" stroke="#e05555" stroke-width="2" marker-end="url(#rt-red)"/>

  <!-- Haiku -->
  <rect x="60" y="254" width="240" height="76" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">claude-haiku-4-5</text>
  <text x="180" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단순 Q&amp;A · 분류 · 번역</text>
  <text x="180" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">$0.8 / $4.0 per 1M tokens</text>
  <text x="180" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">약 60% 요청 처리</text>

  <!-- Sonnet -->
  <rect x="320" y="254" width="240" height="76" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">claude-sonnet-4-6</text>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">일반 분석 · RAG · 요약</text>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">$3.0 / $15.0 per 1M tokens</text>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">약 35% 요청 처리</text>

  <!-- Opus -->
  <rect x="580" y="254" width="240" height="76" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">claude-opus-4-7</text>
  <text x="700" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">복잡 추론 · 코드 · 전략</text>
  <text x="700" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">더 높은 단가</text>
  <text x="700" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">약 5% 요청 처리</text>

  <!-- Cost savings note -->
  <rect x="220" y="348" width="440" height="22" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">라우팅 적용 시 동급 품질에서 비용 40~60% 절감 가능</text>
</svg>
