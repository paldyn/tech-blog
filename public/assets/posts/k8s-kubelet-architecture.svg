<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">kubelet 아키텍처</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">노드 에이전트 — API Server와 Container Runtime 사이의 다리</text>

  <!-- API Server (top) -->
  <rect x="305" y="90" width="270" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">API Server</text>
  <text x="440" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Watch: 내 노드의 파드 스펙 수신</text>

  <!-- kubelet center -->
  <rect x="230" y="192" width="420" height="120" rx="10" fill="#111" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#ce9178">kubelet</text>
  <text x="440" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파드 스펙 → 컨테이너 실행 지시</text>
  <text x="440" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파드 상태 → API Server에 보고</text>
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Liveness/Readiness Probe 실행</text>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">노드 리소스 상태 수집 (metrics)</text>

  <!-- API Server <-> kubelet arrows -->
  <line x1="420" y1="152" x2="390" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="380" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">파드 스펙</text>

  <line x1="470" y1="190" x2="490" y2="152" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="510" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">상태 보고</text>

  <!-- containerd (bottom center) -->
  <rect x="305" y="356" width="270" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">containerd (CRI)</text>
  <text x="440" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨테이너 생성 / 시작 / 중지</text>

  <!-- kubelet <-> containerd -->
  <line x1="420" y1="314" x2="400" y2="354" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>
  <text x="368" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">gRPC CRI</text>

  <line x1="470" y1="354" x2="490" y2="314" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="518" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">컨테이너 상태</text>

  <!-- Pods (bottom) -->
  <rect x="60" y="432" width="160" height="50" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Pod A</text>
  <text x="140" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">container 1, 2</text>

  <rect x="240" y="432" width="160" height="50" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="320" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Pod B</text>
  <text x="320" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">container 1</text>

  <rect x="420" y="432" width="160" height="50" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Pod C</text>
  <text x="500" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">container 1, 2, 3</text>

  <rect x="600" y="432" width="220" height="50" rx="6" fill="#1a100d" stroke="#ce9178" stroke-width="1"/>
  <text x="710" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">Static Pod</text>
  <text x="710" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">/etc/kubernetes/manifests/</text>

  <!-- containerd to pods arrows -->
  <line x1="380" y1="418" x2="300" y2="430" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="400" y1="418" x2="400" y2="430" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="460" y1="418" x2="490" y2="430" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
</svg>
