<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">빅오 표기법 치트시트</text>

  <!-- Header row -->
  <rect x="60" y="66" width="760" height="34" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="160" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">표기</text>
  <text x="310" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">이름</text>
  <text x="510" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">대표 알고리즘</text>
  <text x="740" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">n=10⁶ 연산</text>

  <!-- Row 1: O(1) -->
  <rect x="60" y="100" width="760" height="36" rx="0" fill="#0a1a0a" stroke="#1a2a1a" stroke-width="1"/>
  <text x="160" y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#55c555" text-anchor="middle">O(1)</text>
  <text x="310" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">상수</text>
  <text x="510" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">해시 조회, 스택 push</text>
  <text x="740" y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">1</text>

  <!-- Row 2: O(log n) -->
  <rect x="60" y="136" width="760" height="36" rx="0" fill="#0a1510" stroke="#1a2a1a" stroke-width="1"/>
  <text x="160" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" text-anchor="middle">O(log n)</text>
  <text x="310" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">로그</text>
  <text x="510" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">이진 탐색, AVL 조회</text>
  <text x="740" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">20</text>

  <!-- Row 3: O(n) -->
  <rect x="60" y="172" width="760" height="36" rx="0" fill="#0a1a0a" stroke="#1a2a1a" stroke-width="1"/>
  <text x="160" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#b5cea8" text-anchor="middle">O(n)</text>
  <text x="310" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">선형</text>
  <text x="510" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">선형 탐색, 배열 순회</text>
  <text x="740" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" text-anchor="middle">1,000,000</text>

  <!-- Row 4: O(n log n) -->
  <rect x="60" y="208" width="760" height="36" rx="0" fill="#0a1510" stroke="#1a2a1a" stroke-width="1"/>
  <text x="160" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#ce9178" text-anchor="middle">O(n log n)</text>
  <text x="310" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">선형로그</text>
  <text x="510" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">합병 정렬, 힙 정렬</text>
  <text x="740" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">20,000,000</text>

  <!-- Row 5: O(n²) -->
  <rect x="60" y="244" width="760" height="36" rx="0" fill="#1a0a0a" stroke="#2a1a1a" stroke-width="1"/>
  <text x="160" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#e05555" text-anchor="middle">O(n²)</text>
  <text x="310" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">이차</text>
  <text x="510" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">버블·삽입·선택 정렬</text>
  <text x="740" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">10¹²</text>

  <!-- Row 6: O(2^n) -->
  <rect x="60" y="280" width="760" height="36" rx="0" fill="#1a0a0a" stroke="#2a1a1a" stroke-width="1"/>
  <text x="160" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#e05555" text-anchor="middle">O(2ⁿ)</text>
  <text x="310" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">지수</text>
  <text x="510" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">피보나치 순수재귀, 부분집합</text>
  <text x="740" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">∞</text>

  <!-- Row 7: O(n!) -->
  <rect x="60" y="316" width="760" height="36" rx="0" fill="#1a0a0a" stroke="#2a1a1a" stroke-width="1"/>
  <text x="160" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#e05555" text-anchor="middle">O(n!)</text>
  <text x="310" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">팩토리얼</text>
  <text x="510" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">TSP 완전탐색, 순열 생성</text>
  <text x="740" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">∞∞</text>

  <!-- Note -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">* n=10⁶ 기준 초당 10⁹ 연산 컴퓨터 가정</text>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">O(1) &lt; O(log n) &lt; O(n) &lt; O(n log n) &lt; O(n²) &lt; O(2ⁿ) &lt; O(n!)</text>
</svg>
