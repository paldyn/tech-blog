<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파인튜닝 하이퍼파라미터 권장값</text>
  <text x="440" y="70" font-size="15" fill="#888" text-anchor="middle">HuggingFace TrainingArguments 기준 — 7B 모델 단일 GPU 기준</text>

  <!-- Table background -->
  <rect x="40" y="84" width="800" height="332" fill="#0d1117" rx="10" stroke="#1e2433" stroke-width="1.2"/>

  <!-- Table header -->
  <rect x="40" y="84" width="800" height="36" fill="#111b2e" rx="10"/>
  <rect x="40" y="102" width="800" height="18" fill="#111b2e"/>
  <text x="116" y="107" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">파라미터명</text>
  <text x="294" y="107" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">권장값</text>
  <text x="444" y="107" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">범위</text>
  <text x="648" y="107" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">설명</text>

  <!-- Column dividers -->
  <line x1="196" y1="84" x2="196" y2="416" stroke="#1e2433" stroke-width="1"/>
  <line x1="392" y1="84" x2="392" y2="416" stroke="#1e2433" stroke-width="1"/>
  <line x1="506" y1="84" x2="506" y2="416" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 1: learning_rate -->
  <rect x="40" y="120" width="800" height="36" fill="#0d1117"/>
  <text x="75" y="143" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">learning_rate</text>
  <text x="294" y="143" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">2e-4</text>
  <text x="444" y="143" font-size="12" fill="#888" text-anchor="middle">1e-5 ~ 3e-4</text>
  <text x="514" y="143" font-size="12" fill="#e8e8e8">LoRA 파인튜닝 기준 권장</text>

  <!-- Row 2 -->
  <rect x="40" y="156" width="800" height="36" fill="#111520"/>
  <text x="75" y="179" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">per_device_train_batch_size</text>
  <text x="294" y="179" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">4</text>
  <text x="444" y="179" font-size="12" fill="#888" text-anchor="middle">1 ~ 16</text>
  <text x="514" y="179" font-size="12" fill="#e8e8e8">GPU당 미니배치 크기</text>

  <!-- Row 3 -->
  <rect x="40" y="192" width="800" height="36" fill="#0d1117"/>
  <text x="75" y="215" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">gradient_accumulation_steps</text>
  <text x="294" y="215" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">8</text>
  <text x="444" y="215" font-size="12" fill="#888" text-anchor="middle">4 ~ 32</text>
  <text x="514" y="215" font-size="12" fill="#e8e8e8">실효 배치 = 4×8 = 32</text>

  <!-- Row 4 -->
  <rect x="40" y="228" width="800" height="36" fill="#111520"/>
  <text x="75" y="251" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">num_train_epochs</text>
  <text x="294" y="251" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">3</text>
  <text x="444" y="251" font-size="12" fill="#888" text-anchor="middle">2 ~ 5</text>
  <text x="514" y="251" font-size="12" fill="#e8e8e8">소량 데이터일수록 늘림</text>

  <!-- Row 5 -->
  <rect x="40" y="264" width="800" height="36" fill="#0d1117"/>
  <text x="75" y="287" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">warmup_ratio</text>
  <text x="294" y="287" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">0.05</text>
  <text x="444" y="287" font-size="12" fill="#888" text-anchor="middle">0.03 ~ 0.10</text>
  <text x="514" y="287" font-size="12" fill="#e8e8e8">전체 스텝의 3~10%</text>

  <!-- Row 6 -->
  <rect x="40" y="300" width="800" height="36" fill="#111520"/>
  <text x="75" y="323" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">lr_scheduler_type</text>
  <text x="294" y="323" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">cosine</text>
  <text x="444" y="323" font-size="12" fill="#888" text-anchor="middle">linear / cosine</text>
  <text x="514" y="323" font-size="12" fill="#e8e8e8">cosine이 대체로 우수</text>

  <!-- Row 7 -->
  <rect x="40" y="336" width="800" height="36" fill="#0d1117"/>
  <text x="75" y="359" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">max_seq_length</text>
  <text x="294" y="359" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">2048</text>
  <text x="444" y="359" font-size="12" fill="#888" text-anchor="middle">512 ~ 8192</text>
  <text x="514" y="359" font-size="12" fill="#e8e8e8">데이터 분포에 맞게 설정</text>

  <!-- Row 8 -->
  <rect x="40" y="372" width="800" height="44" fill="#111520" rx="0"/>
  <rect x="40" y="395" width="800" height="21" fill="#111520"/>
  <text x="75" y="399" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">weight_decay</text>
  <text x="294" y="399" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">0.01</text>
  <text x="444" y="399" font-size="12" fill="#888" text-anchor="middle">0.01 ~ 0.1</text>
  <text x="514" y="399" font-size="12" fill="#e8e8e8">L2 정규화, 과적합 방지</text>

  <!-- bottom border-radius fix -->
  <rect x="40" y="400" width="800" height="16" fill="#111520" rx="0"/>
  <rect x="40" y="408" width="800" height="8" fill="#111520" rx="10"/>

  <!-- Bottom note -->
  <text x="440" y="435" font-size="12" fill="#555" text-anchor="middle">* 실효 배치 크기 = per_device × gradient_accumulation_steps × num_gpus | max_grad_norm: 1.0 권장</text>
</svg>
