<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">디렉터리 권한 — 파일 권한과의 차이</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">같은 r/w/x 비트도 디렉터리에서는 의미가 달라진다</text>

  <!-- Three columns: r, w, x -->
  <!-- r column -->
  <rect x="60" y="84" width="230" height="220" rx="8" fill="#0e1018" stroke="#1e2433"/>
  <rect x="60" y="84" width="230" height="36" rx="8" fill="#1a2a1a"/>
  <text x="175" y="107" text-anchor="middle" font-size="18" font-weight="700" fill="#55c555">r (read)</text>

  <text x="175" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#888">파일</text>
  <text x="175" y="160" text-anchor="middle" font-size="13" fill="#e8e8e8">내용 읽기 가능</text>
  <text x="175" y="178" text-anchor="middle" font-size="12" fill="#555">cat, head, less ...</text>

  <line x1="80" y1="192" x2="270" y2="192" stroke="#1e2433" stroke-width="1"/>

  <text x="175" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#888">디렉터리</text>
  <text x="175" y="238" text-anchor="middle" font-size="13" fill="#e8e8e8">파일 목록 조회 가능</text>
  <text x="175" y="256" text-anchor="middle" font-size="12" fill="#555">ls 명령 허용</text>
  <text x="175" y="278" text-anchor="middle" font-size="12" fill="#e05555">⚠ x 없으면 진입 불가</text>

  <!-- w column -->
  <rect x="325" y="84" width="230" height="220" rx="8" fill="#0e1018" stroke="#1e2433"/>
  <rect x="325" y="84" width="230" height="36" rx="8" fill="#0d1a2a"/>
  <text x="440" y="107" text-anchor="middle" font-size="18" font-weight="700" fill="#7ec8e3">w (write)</text>

  <text x="440" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#888">파일</text>
  <text x="440" y="160" text-anchor="middle" font-size="13" fill="#e8e8e8">내용 수정 가능</text>
  <text x="440" y="178" text-anchor="middle" font-size="12" fill="#555">vim, echo &gt;&gt; ...</text>

  <line x1="345" y1="192" x2="535" y2="192" stroke="#1e2433" stroke-width="1"/>

  <text x="440" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#888">디렉터리</text>
  <text x="440" y="238" text-anchor="middle" font-size="13" fill="#e8e8e8">파일 생성·삭제 가능</text>
  <text x="440" y="256" text-anchor="middle" font-size="12" fill="#555">touch, rm, mv ...</text>
  <text x="440" y="278" text-anchor="middle" font-size="12" fill="#e05555">⚠ x 없으면 무의미</text>

  <!-- x column -->
  <rect x="590" y="84" width="230" height="220" rx="8" fill="#0e1018" stroke="#1e2433"/>
  <rect x="590" y="84" width="230" height="36" rx="8" fill="#2a1010"/>
  <text x="705" y="107" text-anchor="middle" font-size="18" font-weight="700" fill="#e05555">x (execute)</text>

  <text x="705" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#888">파일</text>
  <text x="705" y="160" text-anchor="middle" font-size="13" fill="#e8e8e8">프로그램으로 실행</text>
  <text x="705" y="178" text-anchor="middle" font-size="12" fill="#555">./script.sh, ./a.out</text>

  <line x1="610" y1="192" x2="800" y2="192" stroke="#1e2433" stroke-width="1"/>

  <text x="705" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#888">디렉터리</text>
  <text x="705" y="238" text-anchor="middle" font-size="13" fill="#55c555">진입(traverse) 허용</text>
  <text x="705" y="256" text-anchor="middle" font-size="12" fill="#555">cd, 경로 통과 가능</text>
  <text x="705" y="278" text-anchor="middle" font-size="12" fill="#7ec8e3">가장 핵심 권한</text>

  <!-- Key insight -->
  <rect x="60" y="320" width="760" height="28" rx="6" fill="#141622"/>
  <text x="440" y="338" text-anchor="middle" font-size="13" fill="#7ec8e3">디렉터리 x 없음 → cd 불가 · 파일 경로 접근 불가 (r 있어도 열람 안됨)</text>
</svg>
