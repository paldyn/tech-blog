<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">~/.ssh/config — SSH 접속 설정 관리</text>

  <!-- Before/After comparison -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">config 파일 사용 전/후 비교</text>

  <!-- Before -->
  <rect x="60" y="92" width="360" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">Before (긴 명령어)</text>
  <text x="80" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">ssh -i ~/.ssh/work_key -p 2222 \</text>
  <text x="80" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  -l admin 192.168.10.5</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">매번 옵션 기억 필요</text>

  <!-- After -->
  <rect x="460" y="92" width="360" height="90" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">After (config 사용)</text>
  <text x="480" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">ssh work</text>
  <text x="480" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">짧은 alias로 접속</text>

  <!-- Config file anatomy -->
  <text x="60" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">~/.ssh/config 구조</text>

  <rect x="60" y="232" width="760" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Host block 1 -->
  <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Host</tspan> <tspan fill="#55c555">work</tspan></text>
  <text x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    HostName     192.168.10.5</text>
  <text x="80" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    User         admin</text>
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    Port         2222</text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    IdentityFile ~/.ssh/work_key</text>

  <!-- Host block 2 -->
  <text x="460" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Host</tspan> <tspan fill="#55c555">github.com</tspan></text>
  <text x="460" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    User         git</text>
  <text x="460" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    IdentityFile ~/.ssh/github</text>
  <text x="460" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Host</tspan> <tspan fill="#ce9178">*</tspan></text>
  <text x="460" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    ServerAliveInterval  60</text>
  <text x="460" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    AddKeysToAgent       yes</text>

  <!-- Annotation -->
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Host *는 글로벌 기본값 — 가장 아래 위치시킬 것 (위에 있는 설정이 우선)</text>
</svg>
