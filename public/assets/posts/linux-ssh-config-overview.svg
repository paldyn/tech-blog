<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410">
  <rect width="880" height="410" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">~/.ssh/config 파일 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Host 블록으로 접속 설정을 별칭 하나로 관리</text>

  <!-- LEFT: config sample -->
  <text x="80" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">~/.ssh/config</text>
  <rect x="60" y="138" width="440" height="234" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Host</tspan><tspan fill="#ffffff"> work</tspan><tspan fill="#9aa4b8">              # 별칭</tspan></text>
  <text x="78" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    HostName</tspan><tspan fill="#ffffff">     192.168.10.5</tspan></text>
  <text x="78" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    User</tspan><tspan fill="#ffffff">         admin</tspan></text>
  <text x="78" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    Port</tspan><tspan fill="#ffffff">         2222</tspan></text>
  <text x="78" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    IdentityFile</tspan><tspan fill="#ce9178"> ~/.ssh/work_key</tspan></text>
  <text x="78" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Host</tspan><tspan fill="#ffffff"> *</tspan><tspan fill="#9aa4b8">                 # 전역 기본값</tspan></text>
  <text x="78" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    ServerAliveInterval</tspan><tspan fill="#ffffff"> 60</tspan></text>
  <text x="78" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    AddKeysToAgent</tspan><tspan fill="#ffffff">      yes</tspan></text>

  <!-- RIGHT: 3 rule cards -->
  <rect x="520" y="100" width="300" height="84" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="540" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">별칭으로 접속</text>
  <text x="540" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#d4d4d4">ssh work</text>
  <text x="540" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">긴 옵션 없이 한 줄로 접속</text>

  <rect x="520" y="196" width="300" height="84" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="540" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">첫 매칭 우선</text>
  <text x="540" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaaaaa">위 → 아래 순서로 읽음</text>
  <text x="540" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Host * 는 반드시 맨 아래에</text>

  <rect x="520" y="292" width="300" height="84" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">권한 600 필수</text>
  <text x="540" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#d4d4d4">chmod 600 ~/.ssh/config</text>
  <text x="540" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">권한이 열려 있으면 무시됨</text>
</svg>
