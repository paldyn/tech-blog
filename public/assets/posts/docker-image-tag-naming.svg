<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker image tag — 이미지 이름과 태그 구조</text>

  <!-- Full image reference anatomy -->
  <rect x="60" y="70" width="760" height="100" rx="10" fill="#111320" stroke="#7777cc" stroke-width="1.5"/>

  <text x="440" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">registry.example.com / myorg / myapp : v1.2.0</text>

  <!-- Annotations -->
  <!-- Registry -->
  <line x1="172" y1="110" x2="172" y2="140" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="60" y1="140" x2="220" y2="140" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="106,134 60,140 106,146" fill="#7ec8e3"/>
  <polygon points="174,134 220,140 174,146" fill="#7ec8e3"/>
  <text x="140" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Registry</text>
  <text x="140" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">생략 시 docker.io</text>

  <!-- Namespace -->
  <line x1="340" y1="110" x2="340" y2="152" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="240" y1="152" x2="400" y2="152" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="286,146 240,152 286,158" fill="#7777cc"/>
  <polygon points="354,146 400,152 354,158" fill="#7777cc"/>
  <text x="320" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">Namespace</text>
  <text x="320" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">계정/조직명</text>

  <!-- Name -->
  <line x1="515" y1="110" x2="515" y2="140" stroke="#55c555" stroke-width="1.5"/>
  <line x1="430" y1="140" x2="560" y2="140" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="476,134 430,140 476,146" fill="#55c555"/>
  <polygon points="514,134 560,140 514,146" fill="#55c555"/>
  <text x="495" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Name</text>
  <text x="495" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이미지 이름</text>

  <!-- Tag -->
  <line x1="720" y1="110" x2="720" y2="140" stroke="#e05555" stroke-width="1.5"/>
  <line x1="650" y1="140" x2="800" y2="140" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="696,134 650,140 696,146" fill="#e05555"/>
  <polygon points="744,134 800,140 744,146" fill="#e05555"/>
  <text x="724" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">Tag</text>
  <text x="724" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">생략 시 latest</text>

  <!-- Tag examples -->
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">태그 전략 예시</text>

  <rect x="60" y="234" width="230" height="154" rx="8" fill="#111320" stroke="#55c555" stroke-width="1"/>
  <text x="175" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">SemVer</text>
  <text x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:1.2.3</text>
  <text x="80" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:1.2</text>
  <text x="80" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:1</text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:latest</text>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">floating + pinned 조합</text>

  <rect x="310" y="234" width="230" height="154" rx="8" fill="#111320" stroke="#7ec8e3" stroke-width="1"/>
  <text x="425" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Git 기반</text>
  <text x="326" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:abc1234</text>
  <text x="326" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:main</text>
  <text x="326" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:pr-42</text>
  <text x="326" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:sha-$(git rev-parse --short HEAD)</text>
  <text x="326" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CI에서 커밋/브랜치 추적</text>

  <rect x="560" y="234" width="260" height="154" rx="8" fill="#111320" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">환경 / 빌드 정보</text>
  <text x="576" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:prod-1.2.3</text>
  <text x="576" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:staging</text>
  <text x="576" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:debug</text>
  <text x="576" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:1.2.3-alpine</text>
  <text x="576" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">베이스 이미지 변형 구분</text>

  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">태그는 포인터 — 같은 이미지 레이어에 여러 태그를 붙일 수 있다</text>
</svg>
