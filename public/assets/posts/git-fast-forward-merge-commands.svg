<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Fast-Forward vs --no-ff 비교</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">기본 동작과 강제 머지 커밋 생성 차이</text>

  <!-- Left: FF merge commands -->
  <text x="100" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Fast-Forward (기본)</text>

  <rect x="60" y="122" width="340" height="168" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="147" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># feature 브랜치를 main에 병합</text>
  <text x="76" y="165" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git</text>
  <text x="118" y="165" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">switch main</text>
  <text x="76" y="183" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git</text>
  <text x="118" y="183" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">merge feature</text>
  <text x="76" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 출력 예시:</text>
  <text x="76" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Updating c3a..f2e</text>
  <text x="76" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Fast-forward</text>
  <text x="76" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> index.js | 12 +++</text>
  <text x="76" y="279" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> 1 file changed</text>

  <!-- Result indicator -->
  <rect x="60" y="302" width="340" height="40" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">히스토리: 직선 유지, 머지 커밋 없음</text>

  <!-- Right: –no-ff merge commands -->
  <text x="490" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">--no-ff (머지 커밋 강제)</text>

  <rect x="460" y="122" width="360" height="168" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="147" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 머지 커밋을 강제로 생성</text>
  <text x="476" y="165" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git</text>
  <text x="518" y="165" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">switch main</text>
  <text x="476" y="183" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git</text>
  <text x="518" y="183" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">merge --no-ff feature</text>
  <text x="476" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 출력 예시:</text>
  <text x="476" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Merge branch 'feature'</text>
  <text x="476" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> index.js | 12 +++</text>
  <text x="476" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> 1 file changed</text>
  <text x="476" y="279" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 에디터 열려 커밋 메시지 작성</text>

  <!-- Result indicator -->
  <rect x="460" y="302" width="360" height="40" rx="6" fill="#120a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">히스토리: 머지 커밋 포함, 브랜치 흔적 보존</text>
</svg>
