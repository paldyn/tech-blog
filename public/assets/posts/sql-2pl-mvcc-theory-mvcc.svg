<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">MVCC 스냅샷 읽기 동작 원리</text>

  <!-- Timeline -->
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">PostgreSQL xmin/xmax 기반 가시성 예시</text>

  <!-- Column headers -->
  <rect x="50" y="82" width="780" height="26" rx="4" fill="#1a2233"/>
  <text x="150" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">이벤트</text>
  <text x="340" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Tx ID</text>
  <text x="490" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">행 xmin</text>
  <text x="640" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">행 xmax</text>
  <text x="780" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Tx5에 보임?</text>

  <!-- Row 1 -->
  <rect x="50" y="108" width="780" height="30" fill="#111118"/>
  <text x="150" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">INSERT (Tx 2)</text>
  <text x="340" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2</text>
  <text x="490" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">xmin=2</text>
  <text x="640" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">xmax=0</text>
  <text x="780" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">보임 (2&lt;5)</text>

  <!-- Row 2 -->
  <rect x="50" y="138" width="780" height="30" fill="#0d0d14"/>
  <text x="150" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">INSERT (Tx 6, 미커밋)</text>
  <text x="340" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">6</text>
  <text x="490" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">xmin=6</text>
  <text x="640" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">xmax=0</text>
  <text x="780" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">안 보임 (6&gt;5)</text>

  <!-- Row 3 -->
  <rect x="50" y="168" width="780" height="30" fill="#111118"/>
  <text x="150" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">UPDATE (Tx 3이 Tx 2 행 변경)</text>
  <text x="340" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3</text>
  <text x="490" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구행: xmin=2</text>
  <text x="640" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">xmax=3</text>
  <text x="780" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">안 보임 (xmax=3&lt;5)</text>

  <!-- Row 4 -->
  <rect x="50" y="198" width="780" height="30" fill="#0d0d14"/>
  <text x="150" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">UPDATE 신행 (Tx 3 커밋)</text>
  <text x="340" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3</text>
  <text x="490" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">xmin=3</text>
  <text x="640" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">xmax=0</text>
  <text x="780" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">보임 (3&lt;5)</text>

  <rect x="50" y="108" width="780" height="120" fill="none" stroke="#222"/>

  <!-- Rule explanation -->
  <rect x="50" y="244" width="780" height="96" rx="8" fill="#111118" stroke="#333"/>
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">MVCC 가시성 규칙 (PostgreSQL)</text>
  <text x="440" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">행이 보이려면: xmin &lt;= snapshot_xid AND (xmax = 0 OR xmax &gt; snapshot_xid)</text>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">xmin = 삽입한 트랜잭션 ID | xmax = 삭제/변경한 트랜잭션 ID (0이면 현재 최신)</text>
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Oracle: Undo Segment 체인 | MySQL InnoDB: DB_TRX_ID + DB_ROLL_PTR</text>

  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">VACUUM(PG) / Purge Thread(MySQL)가 xmax &lt; oldest_xid인 구버전 행 정리</text>
</svg>
