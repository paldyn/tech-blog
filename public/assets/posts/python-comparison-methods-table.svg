<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">비교 메서드와 반사(reflected) 호출</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">a &lt; b → a.__lt__(b) 실패 시 → b.__gt__(a) 시도</text>

  <!-- Header row -->
  <rect x="60" y="88" width="760" height="36" rx="6" fill="#1a2332"/>
  <text x="120" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">연산자</text>
  <text x="280" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">좌항 메서드</text>
  <text x="480" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">반사 메서드 (우항)</text>
  <text x="700" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">설명</text>

  <!-- Rows -->
  <rect x="60" y="128" width="760" height="30" rx="0" fill="#0d1117"/>
  <text x="120" y="148" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">a &lt; b</text>
  <text x="280" y="148" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">a.__lt__(b)</text>
  <text x="480" y="148" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">b.__gt__(a)</text>
  <text x="700" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">미만</text>

  <rect x="60" y="160" width="760" height="30" rx="0" fill="#111"/>
  <text x="120" y="180" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">a &lt;= b</text>
  <text x="280" y="180" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">a.__le__(b)</text>
  <text x="480" y="180" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">b.__ge__(a)</text>
  <text x="700" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">이하</text>

  <rect x="60" y="192" width="760" height="30" rx="0" fill="#0d1117"/>
  <text x="120" y="212" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">a &gt; b</text>
  <text x="280" y="212" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">a.__gt__(b)</text>
  <text x="480" y="212" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">b.__lt__(a)</text>
  <text x="700" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">초과</text>

  <rect x="60" y="224" width="760" height="30" rx="0" fill="#111"/>
  <text x="120" y="244" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">a &gt;= b</text>
  <text x="280" y="244" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">a.__ge__(b)</text>
  <text x="480" y="244" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">b.__le__(a)</text>
  <text x="700" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">이상</text>

  <rect x="60" y="256" width="760" height="30" rx="0" fill="#0d1117"/>
  <text x="120" y="276" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">a == b</text>
  <text x="280" y="276" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">a.__eq__(b)</text>
  <text x="480" y="276" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">b.__eq__(a)</text>
  <text x="700" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">동등</text>

  <rect x="60" y="288" width="760" height="30" rx="0" fill="#111"/>
  <text x="120" y="308" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">a != b</text>
  <text x="280" y="308" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" text-anchor="middle">a.__ne__(b)</text>
  <text x="480" y="308" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" text-anchor="middle">b.__ne__(a)</text>
  <text x="700" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">불동등</text>

  <!-- functools.total_ordering -->
  <rect x="60" y="334" width="760" height="68" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">functools.total_ordering: __eq__ + 하나만 구현하면 나머지 자동 완성</text>
  <text x="80" y="378" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">@total_ordering  →  __eq__ + __lt__ 구현 시 __le__, __gt__, __ge__ 자동 생성</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단점: 성능 오버헤드 있음. 성능 민감 코드에선 직접 구현 권장</text>
</svg>
