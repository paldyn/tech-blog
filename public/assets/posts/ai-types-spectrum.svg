<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 유형 스펙트럼 — Narrow · General · Super</text>
  <text x="440" y="74" text-anchor="middle" font-size="13" fill="#888">현재 우리가 사용하는 AI는 모두 Narrow AI</text>

  <!-- Spectrum gradient bar -->
  <defs>
    <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7777cc"/>
      <stop offset="50%" stop-color="#7ec8e3"/>
      <stop offset="100%" stop-color="#e05555"/>
    </linearGradient>
  </defs>
  <rect x="60" y="100" width="760" height="20" rx="10" fill="url(#spectrumGrad)"/>
  <!-- Arrow indicator left -->
  <text x="90" y="95" text-anchor="middle" font-size="11" fill="#7777cc">현재</text>
  <polygon points="90,97 85,88 95,88" fill="#7777cc"/>

  <!-- Three type boxes -->

  <!-- Narrow AI -->
  <rect x="60" y="130" width="220" height="280" fill="#111122" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#7777cc">Narrow AI</text>
  <text x="170" y="178" text-anchor="middle" font-size="12" fill="#888">약 AI · 특화 AI</text>
  <line x1="80" y1="188" x2="260" y2="188" stroke="#222" stroke-width="1"/>
  <text x="80" y="208" font-size="12" fill="#e8e8e8">• 하나의 특정 작업만 수행</text>
  <text x="80" y="228" font-size="12" fill="#e8e8e8">• 그 작업에서 인간 초월 가능</text>
  <text x="80" y="248" font-size="12" fill="#e8e8e8">• 다른 작업엔 전혀 적용 불가</text>
  <line x1="80" y1="266" x2="260" y2="266" stroke="#222" stroke-width="1"/>
  <text x="80" y="286" font-size="12" fill="#888">예시:</text>
  <text x="80" y="306" font-size="11" fill="#7777cc">AlphaGo (바둑만 둠)</text>
  <text x="80" y="324" font-size="11" fill="#7777cc">GPT-4o (언어만 처리)</text>
  <text x="80" y="342" font-size="11" fill="#7777cc">DALL-E (이미지만 생성)</text>
  <text x="80" y="360" font-size="11" fill="#7777cc">AlphaFold (단백질만 예측)</text>
  <rect x="80" y="376" width="160" height="20" fill="#1a1a33" rx="4"/>
  <text x="160" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#55c555">현존 · 실용화 완료</text>

  <!-- AGI -->
  <rect x="330" y="130" width="220" height="280" fill="#0f1a1f" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#7ec8e3">AGI</text>
  <text x="440" y="178" text-anchor="middle" font-size="12" fill="#888">범용 인공지능</text>
  <line x1="350" y1="188" x2="530" y2="188" stroke="#222" stroke-width="1"/>
  <text x="350" y="208" font-size="12" fill="#e8e8e8">• 인간과 동등한 범용 지능</text>
  <text x="350" y="228" font-size="12" fill="#e8e8e8">• 모든 인지 작업 수행 가능</text>
  <text x="350" y="248" font-size="12" fill="#e8e8e8">• 새 작업 스스로 학습·전이</text>
  <line x1="350" y1="266" x2="530" y2="266" stroke="#222" stroke-width="1"/>
  <text x="350" y="286" font-size="12" fill="#888">예상 시점:</text>
  <text x="350" y="306" font-size="11" fill="#7ec8e3">낙관론: 2030년대</text>
  <text x="350" y="324" font-size="11" fill="#7ec8e3">중립론: 2040~50년대</text>
  <text x="350" y="342" font-size="11" fill="#7ec8e3">회의론: 달성 불가</text>
  <text x="350" y="360" font-size="11" fill="#888">현재 LLM과의 차이:</text>
  <text x="350" y="378" font-size="11" fill="#888">자아·목표·전이 부재</text>
  <rect x="350" y="376" width="160" height="20" fill="#0f2030" rx="4"/>
  <text x="430" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#e8e8e8">연구 중 · 미실현</text>

  <!-- ASI -->
  <rect x="600" y="130" width="220" height="280" fill="#1f0f0f" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#e05555">ASI</text>
  <text x="710" y="178" text-anchor="middle" font-size="12" fill="#888">초지능 인공지능</text>
  <line x1="620" y1="188" x2="800" y2="188" stroke="#222" stroke-width="1"/>
  <text x="620" y="208" font-size="12" fill="#e8e8e8">• 모든 면에서 인간을 초월</text>
  <text x="620" y="228" font-size="12" fill="#e8e8e8">• 스스로 더 지능적 AI 설계</text>
  <text x="620" y="248" font-size="12" fill="#e8e8e8">• 지능 폭발(Intelligence Explosion)</text>
  <line x1="620" y1="266" x2="800" y2="266" stroke="#222" stroke-width="1"/>
  <text x="620" y="286" font-size="12" fill="#888">주요 논의:</text>
  <text x="620" y="306" font-size="11" fill="#e05555">Singularity (특이점)</text>
  <text x="620" y="324" font-size="11" fill="#e05555">Alignment 문제</text>
  <text x="620" y="342" font-size="11" fill="#e05555">Existential Risk</text>
  <text x="620" y="360" font-size="11" fill="#888">주요 우려 인물:</text>
  <text x="620" y="378" font-size="11" fill="#888">Bostrom · Yudkowsky</text>
  <rect x="620" y="376" width="160" height="20" fill="#2a0f0f" rx="4"/>
  <text x="700" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#e05555">이론상 가설</text>

  <!-- Arrows between boxes -->
  <polygon points="284,265 310,265 310,255 330,270 310,285 310,275 284,275"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="554,265 580,265 580,255 600,270 580,285 580,275 554,275"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Bottom note -->
  <rect x="60" y="430" width="760" height="60" fill="#141414" rx="8" stroke="#333" stroke-width="1"/>
  <text x="440" y="452" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">현재 LLM(GPT-4o · Claude · Gemini)은 Narrow AI입니다</text>
  <text x="440" y="472" text-anchor="middle" font-size="12" fill="#888">언어 처리에 특화된 모델이며, 범용 추론·자아·목적 의식은 없습니다.</text>

  <!-- Footer -->
  <text x="440" y="516" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈 #3</text>
</svg>
