<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">터미널 · 셸 · 커널 관계</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">사용자 입력이 커널에 닿기까지 세 계층</text>

  <!-- User -->
  <ellipse cx="440" cy="118" rx="60" ry="36" fill="#161616" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">사용자</text>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">키보드 입력</text>

  <!-- Arrow down -->
  <line x1="440" y1="154" x2="440" y2="176" stroke="#555" stroke-width="2"/>
  <polygon points="440,180 435,172 445,172" fill="#555"/>

  <!-- Terminal Emulator -->
  <rect x="230" y="180" width="420" height="72" fill="#1a0d1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">터미널 에뮬레이터</text>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">GNOME Terminal · iTerm2 · Alacritty · Windows Terminal</text>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">키 입력을 받아 화면에 글자를 표시하는 GUI 앱</text>

  <!-- Arrow down -->
  <line x1="440" y1="252" x2="440" y2="274" stroke="#555" stroke-width="2"/>
  <polygon points="440,278 435,270 445,270" fill="#555"/>

  <!-- Shell -->
  <rect x="230" y="278" width="420" height="72" fill="#0d1f0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">셸 (Shell)</text>
  <text x="440" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">bash · zsh · fish · sh · ksh · dash</text>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">명령어를 해석하고 프로그램을 실행하는 사용자 공간 프로세스</text>

  <!-- Arrow down -->
  <line x1="440" y1="350" x2="440" y2="372" stroke="#555" stroke-width="2"/>
  <polygon points="440,376 435,368 445,368" fill="#555"/>

  <!-- Kernel -->
  <rect x="230" y="376" width="420" height="44" fill="#0d1a2a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">Linux 커널</text>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">시스템 콜 처리 · 프로세스 생성 · 파일/네트워크 I/O</text>

  <!-- Labels on right side -->
  <text x="680" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">GUI 화면 렌더링</text>
  <text x="680" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">명령 해석·실행</text>
  <text x="680" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">자원 관리</text>
</svg>
