<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">한 번에 다 읽지 말고, 조각으로</text>

  <defs>
    <marker id="ckar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="96" width="150" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">거대한 CSV</text>
  <text x="135" y="148" font-size="12" fill="#9aa4b8" text-anchor="middle">수천만 행</text>
  <text x="135" y="172" font-size="12" fill="#9aa4b8" text-anchor="middle">디스크에 저장</text>
  <text x="135" y="196" font-size="12" fill="#888" text-anchor="middle">RAM보다 큼</text>

  <line x1="210" y1="156" x2="266" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ckar)"/>
  <text x="238" y="140" font-size="11" fill="#9aa4b8" text-anchor="middle">chunksize</text>

  <g text-anchor="middle">
    <rect x="270" y="104" width="170" height="32" rx="4" fill="#0f1320" stroke="#7777cc"/>
    <text x="355" y="125" font-size="12" fill="#7ec8e3">chunk 1 (10만 행)</text>
    <rect x="270" y="142" width="170" height="32" rx="4" fill="#0f1320" stroke="#7777cc"/>
    <text x="355" y="163" font-size="12" fill="#7ec8e3">chunk 2 (10만 행)</text>
    <rect x="270" y="180" width="170" height="32" rx="4" fill="#0f1320" stroke="#7777cc"/>
    <text x="355" y="201" font-size="12" fill="#7ec8e3">chunk 3 ...</text>
  </g>

  <line x1="440" y1="156" x2="496" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ckar)"/>
  <text x="468" y="140" font-size="11" fill="#9aa4b8" text-anchor="middle">조각마다 처리</text>

  <rect x="500" y="96" width="320" height="120" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="124" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">누적 결과</text>
  <text x="660" y="150" font-size="13" fill="#9aa4b8" text-anchor="middle">조각별 부분합 → 합산</text>
  <text x="660" y="174" font-size="13" fill="#9aa4b8" text-anchor="middle">메모리엔 한 조각만</text>
  <text x="660" y="198" font-size="13" fill="#9aa4b8" text-anchor="middle">상주한다</text>

  <rect x="60" y="244" width="760" height="40" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="269" font-size="14" fill="#55c555" text-anchor="middle">전체를 RAM에 올리는 대신, 조각을 흘려보내며 결과만 누적한다</text>
</svg>
