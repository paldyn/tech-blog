<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">break vs continue 동작 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa" text-anchor="middle">루프 흐름 세밀 제어</text>

  <!-- break diagram (left) -->
  <text x="110" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">break</text>
  <text x="110" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">루프 완전 탈출</text>

  <!-- break loop box -->
  <rect x="40" y="128" width="140" height="30" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="110" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">루프 시작</text>
  <line x1="110" y1="158" x2="110" y2="176" stroke="#555" stroke-width="1.5"/>
  <polygon points="110,180 105,170 115,170" fill="#555"/>

  <rect x="40" y="180" width="140" height="30" rx="6" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="110" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">바디 실행</text>
  <line x1="110" y1="210" x2="110" y2="228" stroke="#555" stroke-width="1.5"/>
  <polygon points="110,232 105,222 115,222" fill="#555"/>

  <!-- break condition -->
  <polygon points="110,232 180,258 110,284 40,258" fill="#1a1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="110" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">break?</text>

  <!-- break True: exit -->
  <line x1="180" y1="258" x2="240" y2="258" stroke="#e05555" stroke-width="2"/>
  <polygon points="244,258 234,253 234,263" fill="#e05555"/>
  <text x="212" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">Yes</text>

  <rect x="244" y="238" width="100" height="40" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="294" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">루프 종료</text>

  <!-- break False: back to top -->
  <line x1="110" y1="284" x2="110" y2="302" stroke="#555" stroke-width="1.5"/>
  <text x="122" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">No</text>
  <line x1="110" y1="302" x2="20" y2="302" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="20" y1="302" x2="20" y2="143" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="20" y1="143" x2="40" y2="143" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- continue diagram (right) -->
  <text x="550" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">continue</text>
  <text x="550" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">현재 반복 건너뜀</text>

  <rect x="480" y="128" width="140" height="30" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="550" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">루프 시작</text>
  <line x1="550" y1="158" x2="550" y2="176" stroke="#555" stroke-width="1.5"/>
  <polygon points="550,180 545,170 555,170" fill="#555"/>

  <rect x="480" y="180" width="140" height="30" rx="6" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="550" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">바디 실행 (앞부분)</text>
  <line x1="550" y1="210" x2="550" y2="228" stroke="#555" stroke-width="1.5"/>
  <polygon points="550,232 545,222 555,222" fill="#555"/>

  <!-- continue condition -->
  <polygon points="550,232 620,258 550,284 480,258" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="550" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">continue?</text>

  <!-- continue True: skip to next -->
  <line x1="620" y1="258" x2="690" y2="258" stroke="#7ec8e3" stroke-width="2"/>
  <text x="655" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Yes</text>
  <line x1="690" y1="258" x2="690" y2="143" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="690" y1="143" x2="620" y2="143" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="616,143 626,138 626,148" fill="#7ec8e3"/>
  <text x="720" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">다음 반복으로</text>

  <!-- continue False: rest of body -->
  <line x1="550" y1="284" x2="550" y2="302" stroke="#555" stroke-width="1.5"/>
  <text x="562" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">No</text>
  <rect x="480" y="302" width="140" height="30" rx="6" fill="#0d2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="550" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">바디 나머지 실행</text>
  <line x1="550" y1="332" x2="550" y2="350" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="550" y1="350" x2="460" y2="350" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="460" y1="350" x2="460" y2="143" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="460" y1="143" x2="480" y2="143" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Code examples bottom -->
  <rect x="60" y="374" width="360" height="90" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="397" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># break: 5 찾으면 중단</text>
  <text x="76" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">for</text>
  <text x="106" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> n </text>
  <text x="124" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">in</text>
  <text x="142" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> range(</text>
  <text x="190" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">10</text>
  <text x="210" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">):</text>
  <text x="76" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    if</text>
  <text x="110" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> n == </text>
  <text x="152" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">5</text>
  <text x="160" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="172" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">break</text>
  <text x="76" y="451" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    print</text>
  <text x="136" y="451" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(n)  </text>
  <text x="190" y="451" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 0 1 2 3 4</text>

  <rect x="460" y="374" width="360" height="90" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="397" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># continue: 짝수만 건너뜀</text>
  <text x="476" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">for</text>
  <text x="506" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> n </text>
  <text x="524" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">in</text>
  <text x="542" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> range(</text>
  <text x="590" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">6</text>
  <text x="598" y="415" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">):</text>
  <text x="476" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    if</text>
  <text x="510" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> n % </text>
  <text x="546" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text>
  <text x="554" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> == </text>
  <text x="582" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="590" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="602" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">continue</text>
  <text x="476" y="451" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    print</text>
  <text x="536" y="451" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(n)  </text>
  <text x="590" y="451" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 1 3 5</text>
</svg>
