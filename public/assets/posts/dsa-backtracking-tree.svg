<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arrt" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrred" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrgreen" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">백트래킹 탐색 트리 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">선택 → 제약 확인 → 백트랙 사이클로 상태 공간 탐색</text>

  <!-- Root node -->
  <circle cx="440" cy="110" r="26" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">root</text>

  <!-- Level 1 nodes -->
  <circle cx="180" cy="210" r="24" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">선택 1</text>

  <circle cx="440" cy="210" r="24" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">선택 2</text>

  <circle cx="700" cy="210" r="24" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="700" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">선택 3</text>

  <!-- Root to Level 1 arrows -->
  <line x1="420" y1="132" x2="200" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrt)"/>
  <line x1="440" y1="136" x2="440" y2="184" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrt)"/>
  <line x1="460" y1="132" x2="680" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrt)"/>

  <!-- Level 2 nodes under 선택1 -->
  <circle cx="90" cy="320" r="24" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="90" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1-1</text>

  <circle cx="180" cy="320" r="24" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="180" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">1-2✗</text>

  <circle cx="270" cy="320" r="24" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="270" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1-3</text>

  <!-- 선택1 to level2 -->
  <line x1="162" y1="230" x2="106" y2="298" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrt)"/>
  <line x1="180" y1="234" x2="180" y2="294" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrred)"/>
  <line x1="198" y1="230" x2="254" y2="298" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrt)"/>

  <!-- Level 2 nodes under 선택2 -->
  <circle cx="390" cy="320" r="24" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="390" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">2-1 ✓</text>

  <circle cx="490" cy="320" r="24" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="490" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">2-2✗</text>

  <!-- 선택2 to level2 -->
  <line x1="422" y1="230" x2="406" y2="298" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrgreen)"/>
  <line x1="458" y1="230" x2="474" y2="298" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrred)"/>

  <!-- Level 2 under 선택3: pruned -->
  <circle cx="660" cy="320" r="24" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="660" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">3-1✗</text>

  <circle cx="740" cy="320" r="24" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="740" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">3-2✗</text>

  <line x1="682" y1="230" x2="666" y2="298" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrred)"/>
  <line x1="718" y1="230" x2="726" y2="298" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrred)"/>

  <!-- Pruning marker on 1-2 -->
  <line x1="168" y1="308" x2="192" y2="332" stroke="#e05555" stroke-width="2"/>
  <line x1="192" y1="308" x2="168" y2="332" stroke="#e05555" stroke-width="2"/>

  <!-- Backtrack arrows (dashed) -->
  <path d="M 180 344 Q 130 380 130 400 Q 130 440 180 450 Q 220 440 220 400" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  <text x="148" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">백트랙</text>

  <!-- Level 3 under 1-1 -->
  <circle cx="60" cy="430" r="22" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="60" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">1-1-1✗</text>

  <circle cx="120" cy="430" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="120" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">1-1-2✓</text>

  <line x1="76" y1="342" x2="68" y2="408" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrt)"/>
  <line x1="104" y1="342" x2="112" y2="408" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrgreen)"/>

  <!-- Legend -->
  <rect x="570" y="360" width="250" height="130" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="695" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">범례</text>
  <circle cx="592" cy="402" r="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="610" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">해 발견 (✓)</text>
  <circle cx="592" cy="426" r="8" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="610" y="431" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">제약 위반 — 가지치기</text>
  <circle cx="592" cy="450" r="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="610" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">탐색 중 노드</text>
  <line x1="586" y1="474" x2="610" y2="474" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="616" y="479" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">백트랙 경로</text>
</svg>
