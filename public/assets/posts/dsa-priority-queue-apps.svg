<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">우선순위 큐 활용 사례</text>

  <!-- App boxes -->
  <!-- 1 -->
  <rect x="50" y="65" width="176" height="130" fill="#0f1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="138" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">다익스트라 알고리즘</text>
  <text x="138" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">최단 거리 노드를</text>
  <text x="138" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">O(1)으로 꺼냄</text>
  <text x="138" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">O((V+E) log V)</text>
  <text x="138" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">→ 네비게이션, 라우팅</text>

  <!-- 2 -->
  <rect x="243" y="65" width="176" height="130" fill="#0f1a2e" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="331" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">힙 정렬</text>
  <text x="331" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">최대값 반복 추출로</text>
  <text x="331" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">in-place 정렬</text>
  <text x="331" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">O(n log n), O(1) 공간</text>
  <text x="331" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">→ 임베디드 시스템</text>

  <!-- 3 -->
  <rect x="436" y="65" width="176" height="130" fill="#0f1a2e" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="524" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">작업 스케줄러</text>
  <text x="524" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">우선순위 기반</text>
  <text x="524" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">CPU 스케줄링</text>
  <text x="524" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">O(log n) 삽입/추출</text>
  <text x="524" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">→ OS 커널, 게임 엔진</text>

  <!-- 4 -->
  <rect x="629" y="65" width="201" height="130" fill="#0f1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="729" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">K번째 원소 문제</text>
  <text x="729" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">크기 K 힙 유지로</text>
  <text x="729" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">스트림에서 Top-K</text>
  <text x="729" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">O(n log k)</text>
  <text x="729" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">→ 실시간 순위, 추천</text>

  <!-- Code box -->
  <rect x="50" y="212" width="780" height="110" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 다익스트라 우선순위 큐 핵심</tspan>
  </text>
  <text x="66" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">pq = [(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, start)]              </tspan><tspan fill="#9aa4b8"># (거리, 노드)</tspan>
  </text>
  <text x="66" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> pq:</tspan>
  </text>
  <text x="66" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    dist, u = heapq.heappop(pq)  </tspan><tspan fill="#9aa4b8"># 미확정 중 최단거리 노드</tspan>
  </text>
  <text x="66" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    for</tspan><tspan fill="#ffffff"> v, w </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> graph[u]: heapq.heappush(pq, (dist+w, v))</tspan>
  </text>
</svg>
