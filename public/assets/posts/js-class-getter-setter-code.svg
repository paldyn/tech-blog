  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Temperature 클래스 — 섭씨/화씨 상호 변환</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="256" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"><tspan fill="#7ec8e3">class</tspan><tspan> Temperature {</tspan></text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  #celsius = <tspan fill="#b5cea8">0</tspan><tspan>;</tspan></text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"> </text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  <tspan fill="#7ec8e3">get</tspan><tspan> fahrenheit() {</tspan></text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">    <tspan fill="#7ec8e3">return</tspan><tspan> </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.#celsius * </tspan><tspan fill="#b5cea8">9</tspan><tspan>/</tspan><tspan fill="#b5cea8">5</tspan><tspan> + </tspan><tspan fill="#b5cea8">32</tspan><tspan>;</tspan></text>
  <text x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  }</text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"> </text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  <tspan fill="#7ec8e3">set</tspan><tspan> fahrenheit(f) {</tspan></text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">    <tspan fill="#7ec8e3">this</tspan><tspan>.#celsius = (f - </tspan><tspan fill="#b5cea8">32</tspan><tspan>) * </tspan><tspan fill="#b5cea8">5</tspan><tspan> / </tspan><tspan fill="#b5cea8">9</tspan><tspan>;</tspan></text>
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  }</text>
  <text x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">}</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"><tspan fill="#7ec8e3">const</tspan><tspan> t = </tspan><tspan fill="#7ec8e3">new</tspan><tspan> Temperature(); t.fahrenheit = </tspan><tspan fill="#b5cea8">212</tspan><tspan>;</tspan></text>

