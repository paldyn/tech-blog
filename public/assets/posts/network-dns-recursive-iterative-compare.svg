<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">공개 DNS 해석기 비교</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">선택 기준: 속도, 개인정보, 필터링</text>

  <!-- Headers -->
  <text x="160" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">서비스</text>
  <text x="320" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">IP 주소</text>
  <text x="470" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">평균 응답시간</text>
  <text x="640" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">특징</text>

  <line x1="40" y1="103" x2="840" y2="103" stroke="#333" stroke-width="1"/>

  <!-- Google -->
  <rect x="40" y="110" width="800" height="44" rx="4" fill="#0f1a0f" stroke="#1a3a1a" stroke-width="0.5"/>
  <text x="160" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Google DNS</text>
  <text x="320" y="136" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">8.8.8.8 / 8.8.4.4</text>
  <text x="470" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">~25ms (글로벌)</text>
  <text x="640" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빠르고 안정적, DoH/DoT 지원</text>

  <!-- Cloudflare -->
  <rect x="40" y="158" width="800" height="44" rx="4" fill="#1a1a0a" stroke="#3a3a1a" stroke-width="0.5"/>
  <text x="160" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0c055">Cloudflare</text>
  <text x="320" y="184" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">1.1.1.1 / 1.0.0.1</text>
  <text x="470" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">~11ms (가장 빠름)</text>
  <text x="640" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">개인정보 중심, 로그 최소화</text>

  <!-- Quad9 -->
  <rect x="40" y="206" width="800" height="44" rx="4" fill="#0f0f1a" stroke="#1a1a3a" stroke-width="0.5"/>
  <text x="160" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">Quad9</text>
  <text x="320" y="232" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">9.9.9.9</text>
  <text x="470" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">~20ms</text>
  <text x="640" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">악성 도메인 차단, 비영리</text>

  <!-- ISP -->
  <rect x="40" y="254" width="800" height="44" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="0.5"/>
  <text x="160" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">ISP 기본</text>
  <text x="320" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자동 할당</text>
  <text x="470" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가변적</text>
  <text x="640" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">트래픽 로깅 가능성, 광고 주입</text>

  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">속도 최우선: Cloudflare 1.1.1.1 | 보안 중시: Quad9 9.9.9.9</text>
</svg>
