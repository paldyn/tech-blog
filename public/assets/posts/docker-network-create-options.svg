<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">docker network create 주요 옵션</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">사용자 정의 네트워크 생성 시 알아야 할 플래그들</text>

  <!-- Left column -->
  <rect x="60" y="90" width="360" height="300" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="116" fill="#888" font-size="12" xml:space="preserve"># 기본 브리지 네트워크 생성</text>
  <text x="80" y="134" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network create \</text>
  <text x="80" y="152" fill="#7ec8e3" font-size="12" xml:space="preserve">  --driver bridge \</text>
  <text x="80" y="170" fill="#7ec8e3" font-size="12" xml:space="preserve">  --subnet 172.20.0.0/16 \</text>
  <text x="80" y="188" fill="#7ec8e3" font-size="12" xml:space="preserve">  --ip-range 172.20.10.0/24 \</text>
  <text x="80" y="206" fill="#7ec8e3" font-size="12" xml:space="preserve">  --gateway 172.20.0.1 \</text>
  <text x="80" y="224" fill="#7ec8e3" font-size="12" xml:space="preserve">  --label env=production \</text>
  <text x="80" y="242" fill="#7ec8e3" font-size="12" xml:space="preserve">  prod-net</text>
  <line x1="80" y1="258" x2="400" y2="258" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="278" fill="#888" font-size="12" xml:space="preserve"># IPv6 지원</text>
  <text x="80" y="296" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network create \</text>
  <text x="80" y="314" fill="#7ec8e3" font-size="12" xml:space="preserve">  --ipv6 \</text>
  <text x="80" y="332" fill="#7ec8e3" font-size="12" xml:space="preserve">  --subnet fd00::/64 \</text>
  <text x="80" y="350" fill="#7ec8e3" font-size="12" xml:space="preserve">  ipv6-net</text>
  <text x="80" y="376" fill="#888" font-size="11" xml:space="preserve"># IPv4 + IPv6 듀얼 스택 가능</text>

  <!-- Right column: options table -->
  <rect x="460" y="90" width="360" height="300" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="480" y="116" fill="#888" font-size="13">주요 옵션 요약</text>
  <line x1="480" y1="124" x2="800" y2="124" stroke="#1e2433" stroke-width="1"/>
  <text x="480" y="144" fill="#7ec8e3" font-size="12" xml:space="preserve">--driver</text>
  <text x="640" y="144" fill="#e8e8e8" font-size="12" xml:space="preserve">bridge/overlay/macvlan</text>
  <text x="480" y="164" fill="#7ec8e3" font-size="12" xml:space="preserve">--subnet</text>
  <text x="640" y="164" fill="#e8e8e8" font-size="12" xml:space="preserve">IP 대역 지정</text>
  <text x="480" y="184" fill="#7ec8e3" font-size="12" xml:space="preserve">--gateway</text>
  <text x="640" y="184" fill="#e8e8e8" font-size="12" xml:space="preserve">게이트웨이 IP</text>
  <text x="480" y="204" fill="#7ec8e3" font-size="12" xml:space="preserve">--ip-range</text>
  <text x="640" y="204" fill="#e8e8e8" font-size="12" xml:space="preserve">자동 할당 IP 범위</text>
  <text x="480" y="224" fill="#7ec8e3" font-size="12" xml:space="preserve">--internal</text>
  <text x="640" y="224" fill="#e8e8e8" font-size="12" xml:space="preserve">외부 통신 차단</text>
  <text x="480" y="244" fill="#7ec8e3" font-size="12" xml:space="preserve">--attachable</text>
  <text x="640" y="244" fill="#e8e8e8" font-size="12" xml:space="preserve">단독 컨테이너 연결 허용</text>
  <text x="480" y="264" fill="#7ec8e3" font-size="12" xml:space="preserve">--opt</text>
  <text x="640" y="264" fill="#e8e8e8" font-size="12" xml:space="preserve">드라이버별 추가 옵션</text>
  <text x="480" y="284" fill="#7ec8e3" font-size="12" xml:space="preserve">--ipv6</text>
  <text x="640" y="284" fill="#e8e8e8" font-size="12" xml:space="preserve">IPv6 활성화</text>
  <text x="480" y="304" fill="#7ec8e3" font-size="12" xml:space="preserve">--label</text>
  <text x="640" y="304" fill="#e8e8e8" font-size="12" xml:space="preserve">메타데이터 태그</text>
  <line x1="480" y1="316" x2="800" y2="316" stroke="#1e2433" stroke-width="1"/>
  <text x="480" y="336" fill="#888" font-size="12" xml:space="preserve">--scope</text>
  <text x="640" y="336" fill="#e8e8e8" font-size="12" xml:space="preserve">local / swarm / global</text>
  <text x="480" y="356" fill="#888" font-size="12" xml:space="preserve">--config-from</text>
  <text x="640" y="356" fill="#e8e8e8" font-size="12" xml:space="preserve">다른 네트워크 설정 복사</text>
  <text x="480" y="376" fill="#888" font-size="12" xml:space="preserve">-o parent</text>
  <text x="640" y="376" fill="#e8e8e8" font-size="12" xml:space="preserve">macvlan 부모 인터페이스</text>
</svg>
