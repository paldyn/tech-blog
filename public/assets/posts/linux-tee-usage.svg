<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tee 실전 사용 예시</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">옵션과 파이프라인 패턴</text>

  <!-- left: basic usage -->
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 옵션</text>
  <rect x="60" y="120" width="360" height="236" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 기본: stdout + 파일 동시 저장</text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -l | tee output.txt</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># -a: 파일에 추가 (덮어쓰기 아님)</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ date | tee -a log.txt</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 여러 파일에 동시 저장</text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ echo "data" | tee a.txt b.txt c.txt</text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 파이프라인 중간 디버그</text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ cat data.csv \</text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  | tee /tmp/raw.csv \</text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  | grep "error" \</text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  | tee /tmp/errors.csv \</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  | wc -l</text>

  <!-- right: sudo tee trick + process substitution -->
  <text x="480" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">sudo tee 패턴 & 응용</text>
  <rect x="460" y="120" width="360" height="236" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># root 소유 파일에 쓰기</text>
  <text x="476" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ echo "nameserver 8.8.8.8" \</text>
  <text x="476" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  | sudo tee /etc/resolv.conf</text>
  <text x="476" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 아래는 오류 — sudo가 리다이렉트에 안 적용</text>
  <text x="476" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">$ sudo echo "..." &gt; /etc/resolv.conf</text>
  <text x="476" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 출력 숨기기 (파일만 저장)</text>
  <text x="476" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ make 2&gt;&amp;1 | tee build.log &gt;/dev/null</text>
  <text x="476" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 빌드 로그 저장하며 실시간 확인</text>
  <text x="476" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ./long_test.sh 2&gt;&amp;1 | tee test.log</text>
  <text x="476" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 설정 파일 한 줄 추가</text>
  <text x="476" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ echo "vm.swappiness=10" \</text>
  <text x="476" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  | sudo tee -a /etc/sysctl.conf</text>

  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">sudo tee는 리다이렉션이 아닌 명령어가 파일을 열므로 root 권한이 올바르게 적용됨</text>
</svg>
