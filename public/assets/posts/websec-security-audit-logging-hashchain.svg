<svg xmlns="http://www.w3.org/2000/svg" width="880" height="370" viewBox="0 0 880 370">
  <defs>
    <marker id="arr-hc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="370" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">해시 체인으로 변조를 탐지한다</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">각 로그의 해시 = H(이전 해시 + 현재 데이터) — 한 줄만 바꿔도 사슬이 끊긴다</text>

  <!-- Entry 1 -->
  <rect x="60" y="110" width="220" height="140" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.3"/>
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Entry #41</text>
  <text x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#aaa">prev: 0000…</text>
  <text x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">data: LOGIN ok</text>
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">hash: 9f3a…</text>

  <!-- Entry 2 -->
  <rect x="330" y="110" width="220" height="140" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.3"/>
  <text x="350" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Entry #42</text>
  <text x="350" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#aaa">prev: 9f3a…</text>
  <text x="350" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">data: DELETE 88</text>
  <text x="350" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">hash: e7b1…</text>

  <!-- Entry 3 -->
  <rect x="600" y="110" width="220" height="140" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.3"/>
  <text x="620" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Entry #43</text>
  <text x="620" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#aaa">prev: e7b1…</text>
  <text x="620" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">data: UPDATE pw</text>
  <text x="620" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">hash: 4c2d…</text>

  <!-- chain arrows -->
  <line x1="280" y1="180" x2="330" y2="180" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr-hc)"/>
  <line x1="550" y1="180" x2="600" y2="180" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr-hc)"/>

  <!-- tamper note -->
  <rect x="60" y="282" width="760" height="56" rx="10" fill="#1a0d0d" stroke="#e05555" stroke-width="1.3"/>
  <text x="440" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Entry #42의 data를 몰래 바꾸면 → hash가 달라지고 → #43의 prev와 불일치</text>
  <text x="440" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">사슬이 끊긴 지점이 곧 변조 위치. 정기적으로 체인을 재계산해 무결성을 검증한다.</text>
</svg>
