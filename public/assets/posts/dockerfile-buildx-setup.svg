<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">buildx 설정 및 빌드 명령</text>

  <!-- Step 1 -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">① 멀티플랫폼 빌더 생성</text>
  <rect x="60" y="102" width="760" height="56" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># QEMU 등록 (x86 호스트에서 arm 빌드)</text>
  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">docker run --rm --privileged multiarch/qemu-user-static --reset -p yes</text>

  <!-- Step 2 -->
  <text x="60" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">② 빌더 인스턴스 생성 및 사용</text>
  <rect x="60" y="196" width="760" height="74" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">docker buildx create --name multiarch --driver docker-container --use</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">docker buildx inspect --bootstrap</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 지원 플랫폼 목록 확인</text>

  <!-- Step 3 -->
  <text x="60" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">③ 멀티 플랫폼 빌드 및 레지스트리 푸시</text>
  <rect x="60" y="308" width="760" height="92" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">docker buildx build \</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  --platform linux/amd64,linux/arm64,linux/arm/v7 \</text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">  --push</text>
  <text x="156" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> \</text>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  -t myregistry/myapp:latest .</text>

  <!-- Note -->
  <rect x="60" y="418" width="760" height="10" fill="transparent"/>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">--push 없이 --load 사용 시 단일 플랫폼만 로컬에 로드 가능</text>
</svg>
