<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">flatMap 활용 코드 예제</text>

  <!-- Code block 1: 중첩 List 평탄화 -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">중첩 리스트 평탄화</text>
  <rect x="60" y="90" width="380" height="154" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 부서별 직원 목록 → 전체 직원 목록</text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">List</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">List</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt;&gt; deptEmps = ...</tspan></text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">List</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; allEmps = deptEmps</tspan></text>
  <text x="76" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">()</tspan></text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .</tspan><tspan font-weight="600" fill="#7ec8e3">flatMap</tspan><tspan fill="#ffffff">(Collection::</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .</tspan><tspan font-weight="600" fill="#7ec8e3">collect</tspan><tspan fill="#ffffff">(</tspan><tspan font-weight="600" fill="#7ec8e3">toList</tspan><tspan fill="#ffffff">());</tspan></text>
  <text x="76" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ["홍길동","김영수","이철희",...]</text>

  <!-- Code block 2: 단어 분리 -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">문자열 단어 분리 + 중복 제거</text>
  <rect x="460" y="90" width="360" height="154" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 문장 배열에서 고유 단어 추출</text>
  <text x="476" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">[] lines = {</tspan></text>
  <text x="476" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "hello world"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"java stream"</tspan></text>
  <text x="476" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">};</tspan></text>
  <text x="476" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">Set</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; words = Arrays.</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">(lines)</tspan></text>
  <text x="476" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .</tspan><tspan font-weight="600" fill="#7ec8e3">flatMap</tspan><tspan fill="#ffffff">(s -> Arrays.</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="476" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        s.</tspan><tspan font-weight="600" fill="#7ec8e3">split</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">" "</tspan><tspan fill="#ffffff">)))</tspan></text>

  <!-- Code block 3: Optional 연쇄 -->
  <text x="60" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Optional 체이닝 — flatMap</text>
  <rect x="60" y="280" width="380" height="136" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Optional 중첩 방지</text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">Optional</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; result =</tspan></text>
  <text x="76" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    findUser(id)</tspan></text>
  <text x="76" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        .</tspan><tspan font-weight="600" fill="#7ec8e3">flatMap</tspan><tspan fill="#ffffff">(u -> u.</tspan><tspan font-weight="600" fill="#7ec8e3">getAddress</tspan><tspan fill="#ffffff">())</tspan></text>
  <text x="76" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        .</tspan><tspan font-weight="600" fill="#7ec8e3">map</tspan><tspan fill="#ffffff">(Address::</tspan><tspan font-weight="600" fill="#7ec8e3">getCity</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Optional&lt;Optional&lt;T&gt;&gt; 발생 안 함</text>

  <!-- Code block 4: flatMapToInt -->
  <text x="460" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">기본형 flatMapToInt</text>
  <rect x="460" y="280" width="360" height="136" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 팀별 점수 합계 (박싱 없이)</text>
  <text x="476" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">int</tspan><tspan fill="#ffffff"> total = teams</tspan></text>
  <text x="476" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">()</tspan></text>
  <text x="476" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .</tspan><tspan font-weight="600" fill="#7ec8e3">flatMapToInt</tspan><tspan fill="#ffffff">(t -> t.</tspan><tspan font-weight="600" fill="#7ec8e3">scores</tspan><tspan fill="#ffffff">()</tspan></text>
  <text x="476" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        .</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">()</tspan></text>
  <text x="476" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        .</tspan><tspan font-weight="600" fill="#7ec8e3">mapToInt</tspan><tspan fill="#ffffff">(Integer::intValue))</tspan></text>

  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">flatMap의 람다는 절대 null을 반환하면 안 됨 — 빈 결과는 Stream.empty() 반환</text>
</svg>
