<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">setFilter 실전 활용 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">콤보 선택·검색어 입력 연동 필터 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="256" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text xml:space="preserve" x="76" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 콤보 선택 → 부서 필터</text>
  <text xml:space="preserve" x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text>
  <text xml:space="preserve" x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">         cmbDept_onitemchanged(o,e) {</text>
  <text xml:space="preserve" x="76" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#7ec8e3">var</tspan> dept = o.value;</text>
  <text xml:space="preserve" x="76" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#7ec8e3">if</tspan> (!dept) { ds.clearFilter(); <tspan fill="#7ec8e3">return</tspan>; }</text>
  <text xml:space="preserve" x="76" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  ds.setFilter(</text>
  <text xml:space="preserve" x="76" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    <tspan fill="#ce9178">"DEPT_CD == '"</tspan> + dept + <tspan fill="#ce9178">"'"</tspan>);</text>
  <text xml:space="preserve" x="76" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">}</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 검색어 포함 필터</text>
  <text xml:space="preserve" x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">var</tspan> kw = this.edtSearch.value;</text>
  <text xml:space="preserve" x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">ds.setFilter(</text>
  <text xml:space="preserve" x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#ce9178">"like(EMP_NM, '*"</tspan>+kw+<tspan fill="#ce9178">"*')"</tspan>);</text>

  <!-- Note -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">필터는 메모리 내 표시 제어이므로 rowType·savedOrg에 영향을 주지 않습니다</text>
</svg>
