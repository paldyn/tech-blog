<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">export / import 명령 패턴</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">컨테이너 → tar → 새 이미지 변환</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="240" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 실행 중 컨테이너 파일시스템 추출</text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker </tspan><tspan fill="#e8e8e8">export mycontainer \</tspan></text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  -o snapshot.tar</tspan></text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># tar를 새 이미지로 가져오기</text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker </tspan><tspan fill="#e8e8e8">import snapshot.tar \</tspan></text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  myimage:custom</tspan></text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># CMD 지정해서 import</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker </tspan><tspan fill="#e8e8e8">import snapshot.tar \</tspan></text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  --change </tspan><tspan fill="#ce9178">'CMD ["/app"]'</tspan><tspan fill="#e8e8e8"> myimg:v1</tspan></text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 파이프 활용</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker </tspan><tspan fill="#e8e8e8">export mycontainer \</tspan></text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  | docker import - myimg:flat</tspan></text>

  <!-- Warning note -->
  <rect x="60" y="358" width="760" height="44" fill="#180e0e" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">⚠ import된 이미지는 레이어 1개 · 히스토리 없음 · CMD/ENV 등 메타데이터 소실</text>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">--change 옵션으로 CMD/ENV/EXPOSE 등 재정의 가능</text>
</svg>
