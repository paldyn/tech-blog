<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">재귀 호출 스택과 깊이 제한</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">기본 제한 1000 — 초과 시 RecursionError</text>

  <!-- Call stack visualization -->
  <rect x="60" y="90" width="300" height="350" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <text x="210" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">호출 스택 (Call Stack)</text>

  <!-- Stack frames (bottom to top) -->
  <rect x="76" y="374" width="268" height="36" fill="#0d1f0d" rx="4" stroke="#55c555"/>
  <text x="210" y="396" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">factorial(1) → return 1</text>

  <rect x="76" y="334" width="268" height="36" fill="#0d1a0d" rx="4" stroke="#55c555" stroke-opacity="0.7"/>
  <text x="210" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">factorial(2) → 2 * ...</text>

  <rect x="76" y="294" width="268" height="36" fill="#0d160d" rx="4" stroke="#55c555" stroke-opacity="0.5"/>
  <text x="210" y="316" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">factorial(3) → 3 * ...</text>

  <rect x="76" y="254" width="268" height="36" fill="#0d120d" rx="4" stroke="#55c555" stroke-opacity="0.3"/>
  <text x="210" y="276" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">factorial(4) → 4 * ...</text>

  <rect x="76" y="214" width="268" height="36" fill="#0d100d" rx="4" stroke="#888"/>
  <text x="210" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">factorial(5) → 5 * ...</text>

  <rect x="76" y="174" width="268" height="36" fill="#0d0e0d" rx="4" stroke="#888"/>
  <text x="210" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">factorial(n) ...</text>

  <text x="210" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">↑ 스택 증가 방향</text>

  <!-- Overflow marker -->
  <rect x="76" y="132" width="268" height="28" fill="#1a0a0a" rx="4" stroke="#e05555"/>
  <text x="210" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">RecursionError! (1001번째)</text>

  <!-- Right: code + limit -->
  <rect x="400" y="90" width="420" height="350" fill="#000000" rx="8" stroke="#3a4a6e"/>

  <text x="416" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> sys</tspan></text>
  <text x="416" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">print(sys.getrecursionlimit())</tspan></text>
  <text x="416" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 1000 (기본값)</text>

  <line x1="416" y1="168" x2="800" y2="168" stroke="#3a4a6e" stroke-width="1"/>

  <text x="416" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 팩토리얼</text>
  <text x="416" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> factorial(n):</tspan></text>
  <text x="416" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    if</tspan><tspan fill="#ffffff"> n &lt;= </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="416" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">        return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan></text>
  <text x="416" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ffffff"> n * factorial(n-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="416" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">factorial(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">)   </tspan><tspan fill="#9aa4b8"># 120  ✓</tspan></text>
  <text x="416" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">factorial(</tspan><tspan fill="#b5cea8">1001</tspan><tspan fill="#e05555">)  </tspan><tspan fill="#9aa4b8"># ✗</tspan></text>
  <text x="416" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555"># RecursionError:</text>
  <text x="416" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555"># maximum recursion depth exceeded</text>

  <text x="416" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 한계 변경 (신중하게)</tspan></text>
  <text x="416" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">sys.setrecursionlimit(</tspan><tspan fill="#b5cea8">5000</tspan><tspan fill="#ffffff">)</tspan></text>
</svg>
