<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git log vs git reflog</text>

  <!-- git log side -->
  <text x="200" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">git log (공개 이력)</text>

  <rect x="60" y="96" width="280" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">abc1234  feat: 로그인 구현</text>

  <rect x="60" y="148" width="280" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">def5678  refactor: 코드 정리</text>

  <rect x="60" y="200" width="280" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">ghi9012  init: 프로젝트 시작</text>

  <!-- git reflog side -->
  <text x="660" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">git reflog (모든 이동 기록)</text>

  <rect x="460" y="96" width="360" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">HEAD@{0}  abc1234  commit: 로그인 구현</text>

  <rect x="460" y="148" width="360" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">HEAD@{1}  def5678  reset: moving to def</text>

  <rect x="460" y="200" width="360" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">HEAD@{2}  zzz9999  commit: 실수로 삭제됨</text>

  <rect x="460" y="252" width="360" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">HEAD@{3}  def5678  checkout: main→feature</text>

  <!-- Key difference box -->
  <rect x="60" y="320" width="760" height="70" rx="8" fill="#1a1000" stroke="#e8a42a" stroke-width="1.5"/>
  <text x="440" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a42a">핵심: reflog는 HEAD가 이동한 모든 기록을 저장</text>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">reset, rebase, checkout, commit, amend — 모든 동작이 남는다. 로컬 전용.</text>
</svg>
