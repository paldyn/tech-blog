<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PostgreSQL 풍부한 데이터 타입 분류</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">표준 SQL을 넘어선 다양한 내장 타입</text>

  <!-- Root: PostgreSQL Types -->
  <rect x="330" y="100" width="220" height="44" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">PostgreSQL 데이터 타입</text>

  <!-- Connector lines from root -->
  <line x1="440" y1="144" x2="440" y2="165" stroke="#444" stroke-width="1.5"/>
  <line x1="160" y1="165" x2="720" y2="165" stroke="#444" stroke-width="1.5"/>
  <line x1="160" y1="165" x2="160" y2="185" stroke="#444" stroke-width="1.5"/>
  <line x1="350" y1="165" x2="350" y2="185" stroke="#444" stroke-width="1.5"/>
  <line x1="540" y1="165" x2="540" y2="185" stroke="#444" stroke-width="1.5"/>
  <line x1="720" y1="165" x2="720" y2="185" stroke="#444" stroke-width="1.5"/>

  <!-- Category 1: 수치 -->
  <rect x="70" y="185" width="180" height="44" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">수치 타입</text>

  <!-- Category 2: 문자/바이너리 -->
  <rect x="260" y="185" width="180" height="44" rx="8" fill="#1f1a0d" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="350" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c84a" text-anchor="middle">문자 / 바이너리</text>

  <!-- Category 3: 날짜/시간 -->
  <rect x="450" y="185" width="180" height="44" rx="8" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="540" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">날짜 / 시간</text>

  <!-- Category 4: PG 고급 -->
  <rect x="640" y="185" width="160" height="44" rx="8" fill="#1a0d1f" stroke="#c880e0" stroke-width="1.5"/>
  <text x="720" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#c880e0" text-anchor="middle">PG 고급 타입</text>

  <!-- Items for 수치 -->
  <line x1="160" y1="229" x2="160" y2="260" stroke="#444" stroke-width="1"/>
  <rect x="80" y="260" width="160" height="110" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="160" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">smallint / integer</text>
  <text x="160" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">bigint</text>
  <text x="160" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">numeric(p,s)</text>
  <text x="160" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">float / double</text>
  <text x="160" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">serial / bigserial</text>

  <!-- Items for 문자/바이너리 -->
  <line x1="350" y1="229" x2="350" y2="260" stroke="#444" stroke-width="1"/>
  <rect x="270" y="260" width="160" height="110" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="350" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">char(n) / varchar(n)</text>
  <text x="350" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">text</text>
  <text x="350" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">bytea</text>
  <text x="350" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">bit / bit varying</text>
  <text x="350" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c84a" text-anchor="middle">citext (확장)</text>

  <!-- Items for 날짜/시간 -->
  <line x1="540" y1="229" x2="540" y2="260" stroke="#444" stroke-width="1"/>
  <rect x="460" y="260" width="160" height="110" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="540" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">date</text>
  <text x="540" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">time [tz]</text>
  <text x="540" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">timestamp [tz]</text>
  <text x="540" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">interval</text>
  <text x="540" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">timestamptz 권장</text>

  <!-- Items for PG 고급 -->
  <line x1="720" y1="229" x2="720" y2="260" stroke="#444" stroke-width="1"/>
  <rect x="640" y="260" width="160" height="130" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="720" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c880e0" text-anchor="middle">배열 (array)</text>
  <text x="720" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c880e0" text-anchor="middle">json / jsonb</text>
  <text x="720" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c880e0" text-anchor="middle">범위 (range)</text>
  <text x="720" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c880e0" text-anchor="middle">uuid</text>
  <text x="720" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c880e0" text-anchor="middle">inet / macaddr</text>
  <text x="720" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c880e0" text-anchor="middle">geometry (PostGIS)</text>

  <!-- Bottom note -->
  <rect x="60" y="415" width="760" height="80" rx="8" fill="#0d1520" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="441" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">PostgreSQL = "표준 + 확장" 철학</text>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">ANSI SQL 타입을 모두 지원하면서, 배열·JSON·범위·기하·네트워크 주소 등</text>
  <text x="440" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">고유 타입을 내장해 복잡한 데이터 구조를 DB 레이어에서 직접 처리</text>
</svg>
