<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Pod 퇴출(Eviction) 흐름</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">kubelet이 노드 리소스 압박을 감지하면 Pod를 퇴출합니다</text>

  <!-- Node resource pressure -->
  <rect x="60" y="88" width="300" height="120" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="210" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">노드 리소스 압박</text>
  <text x="210" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">메모리 사용률 &gt; 임계값</text>
  <text x="210" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">디스크 사용률 &gt; 임계값</text>
  <text x="210" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">MemoryPressure / DiskPressure</text>
  <text x="210" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">NodeCondition: True</text>

  <!-- Arrow to kubelet -->
  <line x1="362" y1="148" x2="458" y2="148" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- kubelet decision -->
  <rect x="460" y="88" width="360" height="120" rx="8" fill="#121e38" stroke="#7ec8e3" stroke-width="2"/>
  <text x="640" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">kubelet 퇴출 결정</text>
  <text x="640" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">퇴출 우선순위 결정:</text>
  <text x="640" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">1. BestEffort QoS</text>
  <text x="640" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a020">2. Burstable (limits 초과분)</text>
  <text x="640" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">3. Guaranteed (최후 수단)</text>

  <!-- Arrow down to eviction candidates -->
  <line x1="640" y1="210" x2="640" y2="250" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Eviction candidates -->
  <rect x="60" y="252" width="760" height="80" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">퇴출 후보 선정 기준 (같은 QoS 클래스 내에서)</text>
  <text x="200" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Priority 낮은 Pod 먼저</text>
  <text x="440" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">requests 대비 사용량 많은 Pod 먼저</text>
  <text x="700" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Pod 시작 시각 (나중 시작한 Pod 먼저)</text>
  <text x="200" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">priority.class 설정으로 제어</text>
  <text x="440" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">usage / request 비율 기준</text>

  <!-- Two types: soft/hard -->
  <rect x="60" y="354" width="370" height="120" rx="8" fill="#0d1520" stroke="#e0a020" stroke-width="1.5"/>
  <text x="245" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e0a020">Soft Eviction</text>
  <text x="245" y="398" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">임계값 초과 후 grace period 대기</text>
  <text x="245" y="418" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">evictionSoftGracePeriod: 1m30s</text>
  <text x="245" y="438" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">SIGTERM → 정상 종료 시도</text>
  <text x="245" y="458" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a020">memory.available &lt; 1Gi 일정 시간 유지 시</text>

  <rect x="450" y="354" width="370" height="120" rx="8" fill="#0d1520" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">Hard Eviction</text>
  <text x="635" y="398" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">임계값 즉시 퇴출 (grace period 없음)</text>
  <text x="635" y="418" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">evictionHard: memory.available &lt; 100Mi</text>
  <text x="635" y="438" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">SIGKILL 즉시 강제 종료</text>
  <text x="635" y="458" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">memory.available &lt; 100Mi 즉시</text>
</svg>
