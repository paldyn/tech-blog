<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git diff --staged 워크플로</text>

  <!-- Step 1: Edit file -->
  <rect x="60" y="72" width="160" height="80" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
  <text x="140" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">① 파일 수정</text>
  <text x="140" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">워킹트리 변경</text>
  <text x="140" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">app.js 수정</text>

  <!-- Arrow -->
  <polygon points="228,112 264,105 264,119" fill="#555"/>
  <line x1="220" y1="112" x2="264" y2="112" stroke="#555" stroke-width="2"/>

  <!-- Step 2: git add -->
  <rect x="270" y="72" width="160" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="350" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">② git add</text>
  <text x="350" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인덱스 스테이징</text>
  <text x="350" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">git add app.js</text>

  <!-- Arrow -->
  <polygon points="438,112 474,105 474,119" fill="#555"/>
  <line x1="430" y1="112" x2="474" y2="112" stroke="#555" stroke-width="2"/>

  <!-- Step 3: diff –staged -->
  <rect x="480" y="72" width="200" height="80" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="580" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ diff --staged</text>
  <text x="580" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인덱스 vs HEAD</text>
  <text x="580" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">커밋 예정 내용 검토</text>

  <!-- Arrow -->
  <polygon points="688,112 724,105 724,119" fill="#555"/>
  <line x1="680" y1="112" x2="724" y2="112" stroke="#555" stroke-width="2"/>

  <!-- Step 4: git commit -->
  <rect x="730" y="72" width="120" height="80" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">④ 커밋</text>
  <text x="790" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">OK이면</text>
  <text x="790" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">git commit</text>

  <!-- Output example -->
  <text x="60" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">git diff --staged 출력 예시</text>
  <rect x="60" y="208" width="760" height="162" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">diff --git a/src/app.js b/src/app.js</text>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">index a1b2c3..d4e5f6 100644</text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">--- a/src/app.js</text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">+++ b/src/app.js</text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">@@ -5,6 +5,7 @@</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">-const PORT = 3000;</text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">+const PORT = process.env.PORT || 3000;</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> app.listen(PORT);</text>

  <!-- Tip -->
  <rect x="60" y="390" width="760" height="36" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">팁: </text>
  <text x="106" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">--staged는 --cached와 동일 — 둘 다 쓸 수 있음. git diff --cached는 구버전 Git에서도 동작.</text>
</svg>
