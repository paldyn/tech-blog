<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="runArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">asyncio.run 이 하는 일</text>

  <rect x="60" y="90" width="200" height="64" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="160" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">새 이벤트 루프</text>
  <text x="160" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">new_event_loop()</text>

  <rect x="340" y="90" width="200" height="64" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">코루틴 실행</text>
  <text x="440" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">run_until_complete</text>

  <rect x="620" y="90" width="200" height="64" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="720" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">루프 정리</text>
  <text x="720" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">close()</text>

  <path d="M 260 122 L 332 122" stroke="#55c555" stroke-width="2" marker-end="url(#runArr)"/>
  <path d="M 540 122 L 612 122" stroke="#55c555" stroke-width="2" marker-end="url(#runArr)"/>

  <rect x="60" y="200" width="760" height="100" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text xml:space="preserve" x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># asyncio.run() 한 줄이 위 세 단계를 모두 처리</text>
  <text xml:space="preserve" x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">import</tspan> asyncio</text>
  <text xml:space="preserve" x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">asyncio.run(main())   <tspan fill="#9aa4b8"># 보통 프로그램당 한 번만</tspan></text>
</svg>
