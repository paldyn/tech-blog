<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">typeof 타입 가드</text>

  <!-- Table header -->
  <rect x="60" y="70" width="760" height="40" rx="6" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="200" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">typeof 결과값</text>
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">TypeScript 타입</text>
  <text x="680" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">예시</text>

  <!-- Row 1 -->
  <rect x="60" y="112" width="760" height="36" rx="0" fill="#0d0d1a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"string"</text>
  <text x="440" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">string</text>
  <text x="680" y="135" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">"hello"</text>

  <!-- Row 2 -->
  <rect x="60" y="148" width="760" height="36" rx="0" fill="#0a0a0a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"number"</text>
  <text x="440" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">number</text>
  <text x="680" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">42</text>

  <!-- Row 3 -->
  <rect x="60" y="184" width="760" height="36" rx="0" fill="#0d0d1a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="207" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"boolean"</text>
  <text x="440" y="207" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">boolean</text>
  <text x="680" y="207" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">true</text>

  <!-- Row 4 -->
  <rect x="60" y="220" width="760" height="36" rx="0" fill="#0a0a0a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="243" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"symbol"</text>
  <text x="440" y="243" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">symbol</text>
  <text x="680" y="243" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Symbol("id")</text>

  <!-- Row 5 -->
  <rect x="60" y="256" width="760" height="36" rx="0" fill="#0d0d1a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="279" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"bigint"</text>
  <text x="440" y="279" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">bigint</text>
  <text x="680" y="279" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">9007199254740991n</text>

  <!-- Row 6 -->
  <rect x="60" y="292" width="760" height="36" rx="0" fill="#0a0a0a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="315" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"undefined"</text>
  <text x="440" y="315" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">undefined</text>
  <text x="680" y="315" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">undefined</text>

  <!-- Row 7 -->
  <rect x="60" y="328" width="760" height="36" rx="0" fill="#0d0d1a" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="351" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"function"</text>
  <text x="440" y="351" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">Function</text>
  <text x="680" y="351" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">() =&gt; {}</text>

  <!-- Row 8: object (null caveat) -->
  <rect x="60" y="364" width="760" height="36" rx="0" fill="#1a0a0a" stroke="#e05555" stroke-width="0.8"/>
  <text x="200" y="387" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"object"</text>
  <text x="440" y="387" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">object | null</text>
  <text x="680" y="387" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{} 또는 null</text>

  <!-- Warning note -->
  <rect x="60" y="415" width="760" height="30" rx="6" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">⚠ typeof null === "object" — null 체크는 별도로 해야 합니다</text>

  <!-- Column dividers -->
  <line x1="340" y1="70" x2="340" y2="400" stroke="#3178c6" stroke-width="0.5"/>
  <line x1="540" y1="70" x2="540" y2="400" stroke="#3178c6" stroke-width="0.5"/>
</svg>
