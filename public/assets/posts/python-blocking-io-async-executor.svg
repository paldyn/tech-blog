<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="exArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="exArrB" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">블로킹 코드를 executor로 떠넘기기</text>

  <rect x="60" y="110" width="240" height="100" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="180" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">이벤트 루프</text>
  <text x="180" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">계속 다른 코루틴 처리</text>

  <rect x="600" y="110" width="220" height="100" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="710" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">스레드 풀</text>
  <text x="710" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">블로킹 작업 실행</text>

  <path d="M 300 142 L 592 142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#exArr)"/>
  <text x="360" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">run_in_executor(블로킹 함수)</text>

  <path d="M 592 182 L 308 182" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#exArrB)"/>
  <text x="370" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">완료되면 결과 반환 (await)</text>

  <text x="60" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">루프는 블로킹되지 않고, 무거운 동기 함수는 별도 스레드에서 돈다</text>
</svg>
