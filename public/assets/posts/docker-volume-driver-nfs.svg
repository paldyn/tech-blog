<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">local 드라이버로 NFS 마운트</text>

  <!-- Code block -->
  <text x="80" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">NFS 볼륨 생성 예시</text>
  <rect x="80" y="88" width="720" height="180" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># NFS 서버 공유 경로를 볼륨으로 생성</tspan></text>
  <text x="96" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker volume create</tspan><tspan fill="#e8e8e8"> \</tspan></text>
  <text x="96" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  --driver local \</tspan></text>
  <text x="96" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  --opt type=nfs \</tspan></text>
  <text x="96" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  --opt o=</tspan><tspan fill="#ce9178">addr=192.168.1.10,rw,nfsvers=4</tspan><tspan fill="#e8e8e8"> \</tspan></text>
  <text x="96" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  --opt device=:/exports/mydata \</tspan></text>
  <text x="96" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  nfs-data</tspan></text>
  <text x="96" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 이후 컨테이너에서 일반 볼륨처럼 사용</tspan></text>

  <!-- Info box -->
  <rect x="80" y="292" width="720" height="36" fill="#0f1f0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">외부 플러그인(docker plugin install) 없이 내장 local 드라이버만으로 NFS·CIFS 마운트 가능</text>
</svg>
