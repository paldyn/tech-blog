<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">never 타입으로 완전성 보장</text>
  <text x="440" y="64" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">never = 절대 도달할 수 없는 분기 = 캘이스 누락 증거</text>

  <!-- never 개념 -->
  <rect x="60" y="84" width="340" height="130" rx="8" fill="#0d1627" stroke="#7777cc" stroke-width="2"/>
  <text x="230" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">never 타입의 의미</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">‣ 가능한 값이 없는 타입</text>
  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">‣ 모든 타입의 하위 타입</text>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">‣ 철저한 컴파일 타임 검증에 활용</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">‣ x: never ⇒ 이 분기는 도달이 불가능함을 의미</text>

  <!-- Flow diagram -->
  <rect x="60" y="234" width="760" height="180" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>

  <!-- Union type narrowing -->
  <rect x="80" y="254" width="160" height="80" rx="6" fill="#130d2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Shape 유니온</text>
  <text x="160" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">"circle" | "square"</text>
  <text x="160" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">| "triangle"</text>

  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <line x1="240" y1="294" x2="288" y2="294" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="264" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">case</text>

  <rect x="290" y="254" width="160" height="80" rx="6" fill="#0a2a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="370" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">각 case 체크</text>
  <text x="370" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">circle ✓  square ✓</text>
  <text x="370" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">triangle ✓</text>

  <line x1="450" y1="294" x2="498" y2="294" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="474" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">default</text>

  <rect x="500" y="254" width="160" height="80" rx="6" fill="#13112a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">assertNever(s)</text>
  <text x="580" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">s의 타입 = never</text>
  <text x="580" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">컴파일 성공!</text>

  <line x1="660" y1="294" x2="708" y2="294" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <rect x="710" y="254" width="108" height="80" rx="6" fill="#0a2a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="764" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">안전!</text>
  <text x="764" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">미래 케이스</text>
  <text x="764" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컴파일 보장</text>

  <!-- Bottom labels -->
  <text x="440" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">새 케이스 추가 시 assertNever(s)에서 TS2345 발생 → 버그 사전 차단</text>
</svg>