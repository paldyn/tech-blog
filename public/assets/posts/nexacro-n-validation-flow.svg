<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="aD" markerWidth="9" markerHeight="9" refX="4.5" refY="8" orient="auto">
      <path d="M0,0 L9,0 L4.5,9 z" fill="#555"/>
    </marker>
    <marker id="aR" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <marker id="aRR" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#ef5350"/>
    </marker>
    <marker id="aRG" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#69f0ae"/>
    </marker>
    <marker id="aDG" markerWidth="9" markerHeight="9" refX="4.5" refY="8" orient="auto">
      <path d="M0,0 L9,0 L4.5,9 z" fill="#69f0ae"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle"
    font-family="Wanted Sans Variable, -apple-system, sans-serif"
    font-size="18" font-weight="700" fill="#e8e8e8">Nexacro N 저장 전 유효성 검사 흐름</text>

  <!-- ===== Main Flow (center column x=340 w=200) ===== -->

  <!-- Step 1: 저장 버튼 클릭 -->
  <rect x="320" y="60" width="240" height="44" rx="8" fill="#1a0a3a" stroke="#5a2a9e" stroke-width="1.5"/>
  <text x="440" y="77" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ce93d8">저장 버튼 클릭</text>
  <text x="440" y="95" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">fn_save() 진입</text>
  <line x1="440" y1="104" x2="440" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#aD)"/>

  <!-- Step 2: 행 수 확인 -->
  <!-- Diamond shape -->
  <polygon points="440,128 560,158 440,188 320,158" fill="#0d1520" stroke="#1e3a6e" stroke-width="1.5"/>
  <text x="440" y="153" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#90caf9">저장할 행 있음?</text>
  <text x="440" y="168" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">rowcount &gt; 0</text>

  <!-- NO branch (left) -->
  <line x1="320" y1="158" x2="200" y2="158" stroke="#ef5350" stroke-width="1.5" marker-end="url(#aRR)"/>
  <text x="258" y="150" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ef5350">NO</text>
  <rect x="80" y="138" width="120" height="40" rx="6" fill="#200808" stroke="#7c1c1c" stroke-width="1"/>
  <text x="140" y="156" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ef9a9a">alert("저장할</text>
  <text x="140" y="170" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ef9a9a">데이터 없음")</text>

  <!-- YES branch (down) -->
  <text x="448" y="196" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#69f0ae">YES</text>
  <line x1="440" y1="188" x2="440" y2="210" stroke="#69f0ae" stroke-width="1.5" marker-end="url(#aDG)"/>

  <!-- Step 3: 루프 시작 -->
  <rect x="320" y="210" width="240" height="44" rx="8" fill="#0d150d" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="440" y="228" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#81c784">행 순회 루프</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="440" y="245" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">for (var i=0; i &lt; ds.rowcount; i++)</text>
  <line x1="440" y1="254" x2="440" y2="276" stroke="#555" stroke-width="1.5" marker-end="url(#aD)"/>

  <!-- Step 4: 필수값 검사 diamond -->
  <polygon points="440,278 570,308 440,338 310,308" fill="#1a1000" stroke="#7c3b00" stroke-width="1.5"/>
  <text x="440" y="303" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffcc80">필수값 검사</text>
  <text x="440" y="318" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#666">getColumn(i, "col") == ""</text>

  <!-- FAIL branch (right) -->
  <line x1="570" y1="308" x2="680" y2="308" stroke="#ef5350" stroke-width="1.5" marker-end="url(#aRR)"/>
  <text x="600" y="300" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ef5350">FAIL</text>
  <rect x="680" y="282" width="176" height="52" rx="6" fill="#200808" stroke="#7c1c1c" stroke-width="1"/>
  <text x="768" y="303" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ef9a9a">alert(메시지)</text>
  <text x="768" y="319" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ef9a9a">컴포넌트.setFocus()</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="768" y="335" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">return; // 중단</text>

  <!-- PASS branch (down) -->
  <text x="448" y="346" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#69f0ae">PASS</text>
  <line x1="440" y1="338" x2="440" y2="360" stroke="#69f0ae" stroke-width="1.5" marker-end="url(#aDG)"/>

  <!-- Step 5: 형식·범위 검사 diamond -->
  <polygon points="440,362 570,392 440,422 310,392" fill="#0d150d" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="440" y="387" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#a5d6a7">형식·범위 검사</text>
  <text x="440" y="402" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#666">정규식 / 숫자 범위 검증</text>

  <!-- FAIL branch (right) -->
  <line x1="570" y1="392" x2="680" y2="392" stroke="#ef5350" stroke-width="1.5" marker-end="url(#aRR)"/>
  <text x="600" y="384" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ef5350">FAIL</text>
  <rect x="680" y="366" width="176" height="52" rx="6" fill="#200808" stroke="#7c1c1c" stroke-width="1"/>
  <text x="768" y="387" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ef9a9a">alert(형식 오류)</text>
  <text x="768" y="403" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ef9a9a">Grid 포커스 이동</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="768" y="419" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">return;</text>

  <!-- PASS branch (down) -->
  <text x="448" y="430" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#69f0ae">PASS</text>
  <line x1="440" y1="422" x2="440" y2="446" stroke="#69f0ae" stroke-width="1.5" marker-end="url(#aDG)"/>

  <!-- Step 6: transaction 호출 -->
  <rect x="290" y="446" width="300" height="54" rx="8" fill="#1a0a3a" stroke="#5a2a9e" stroke-width="1.5"/>
  <text x="440" y="468" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ce93d8">this.transaction() 호출</text>
  <text x="440" y="486" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">유효성 통과 → 서버 전송</text>
  <text x="440" y="500" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">콜백에서 결과 처리</text>

  <!-- Left annotation: tip -->
  <rect x="20" y="270" width="178" height="120" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="109" y="290" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#888">검사 순서 권장</text>
  <text x="36" y="310" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">1. 행 수 / 상태 확인</text>
  <text x="36" y="328" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">2. 필수 입력값 여부</text>
  <text x="36" y="346" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">3. 형식(날짜/숫자/코드)</text>
  <text x="36" y="364" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">4. 범위·연관 값 비교</text>
  <text x="36" y="382" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">5. 비즈니스 규칙</text>
</svg>
