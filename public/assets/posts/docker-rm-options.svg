<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker rm 주요 옵션</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">컨테이너 삭제 방법과 주의사항</text>

  <!-- rm vs rm -f comparison -->
  <!-- Left: docker rm (normal) -->
  <rect x="60" y="104" width="340" height="160" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">docker rm</text>
  <text x="80" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">· 중지된 컨테이너만 삭제 가능</text>
  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">· 실행 중이면 오류 반환</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">· 안전한 기본 동작</text>
  <rect x="80" y="224" width="60" height="24" rx="4" fill="#1a3020"/>
  <text x="110" y="240" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">안전</text>

  <!-- Right: docker rm -f (force) -->
  <rect x="480" y="104" width="340" height="160" rx="8" fill="#0d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">docker rm -f</text>
  <text x="500" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">· 실행 중에도 강제 삭제 (SIGKILL)</text>
  <text x="500" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">· grace period 없음</text>
  <text x="500" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">· 데이터 유실 위험</text>
  <rect x="500" y="224" width="72" height="24" rx="4" fill="#3d0d0d"/>
  <text x="536" y="240" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">위험</text>

  <!-- VS in middle -->
  <text x="440" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#555">VS</text>

  <!-- -v option note -->
  <rect x="60" y="290" width="760" height="50" rx="6" fill="#0d1f2d" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">-v 옵션:</text>
  <text x="150" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">컨테이너와 함께 익명(anonymous) 볼륨도 삭제. 명명된 볼륨은 삭제되지 않음.</text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">docker rm -v container_name</text>

  <!-- Code block -->
  <rect x="60" y="356" width="760" height="50" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker rm</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">web</tspan>
    <tspan fill="#ffffff">          </tspan>
    <tspan fill="#9aa4b8"># 중지된 컨테이너 삭제</tspan>
  </text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker rm</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">-f</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">web</tspan>
    <tspan fill="#ffffff">       </tspan>
    <tspan fill="#9aa4b8"># 실행 중인 컨테이너 강제 삭제</tspan>
  </text>
</svg>
