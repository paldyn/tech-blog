<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">관계형 모델의 핵심 성질</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">수학적 집합론 기반 — 순서 무관성과 유일성</text>

  <!-- Property cards: 2 columns × 3 rows -->
  <!-- Card 1 -->
  <rect x="60" y="90" width="360" height="96" fill="#0f1520" rx="8" stroke="#1e3a5a" stroke-width="1"/>
  <text x="80" y="116" font-size="13" font-weight="600" fill="#7ec8e3">① 튜플 순서 무관성</text>
  <text x="80" y="138" font-size="12" fill="#888">릴레이션은 집합(set)이므로</text>
  <text x="80" y="156" font-size="12" fill="#e8e8e8">행의 순서에 의미가 없다.</text>
  <text x="80" y="174" font-size="12" fill="#55c555">ORDER BY 없는 SELECT 결과 순서는 보장 안 됨</text>

  <!-- Card 2 -->
  <rect x="460" y="90" width="360" height="96" fill="#0f1520" rx="8" stroke="#1e3a5a" stroke-width="1"/>
  <text x="480" y="116" font-size="13" font-weight="600" fill="#7ec8e3">② 속성 순서 무관성</text>
  <text x="480" y="138" font-size="12" fill="#888">컬럼 순서도 의미 없다.</text>
  <text x="480" y="156" font-size="12" fill="#e8e8e8">SELECT * 보다 명시적 컬럼 나열 권장</text>
  <text x="480" y="174" font-size="12" fill="#55c555">ALTER TABLE ADD COLUMN 위치가 무의미한 이유</text>

  <!-- Card 3 -->
  <rect x="60" y="202" width="360" height="96" fill="#0f1520" rx="8" stroke="#1e3a5a" stroke-width="1"/>
  <text x="80" y="228" font-size="13" font-weight="600" fill="#7ec8e3">③ 튜플 유일성</text>
  <text x="80" y="250" font-size="12" fill="#888">릴레이션은 중복 튜플을 허용하지 않는다.</text>
  <text x="80" y="268" font-size="12" fill="#e8e8e8">→ PRIMARY KEY 또는 UNIQUE 제약 필요</text>
  <text x="80" y="286" font-size="12" fill="#e05555">실제 SQL 테이블은 다중집합(multiset) — 주의!</text>

  <!-- Card 4 -->
  <rect x="460" y="202" width="360" height="96" fill="#0f1520" rx="8" stroke="#1e3a5a" stroke-width="1"/>
  <text x="480" y="228" font-size="13" font-weight="600" fill="#7ec8e3">④ 원자값(1NF)</text>
  <text x="480" y="250" font-size="12" fill="#888">각 셀은 더 이상 분해 불가한 단일 값</text>
  <text x="480" y="268" font-size="12" fill="#e8e8e8">배열·JSON 저장은 엄밀히 1NF 위반</text>
  <text x="480" y="286" font-size="12" fill="#888">→ 정규화 1단계 기반</text>

  <!-- Card 5 -->
  <rect x="60" y="314" width="360" height="96" fill="#0f1520" rx="8" stroke="#1e3a5a" stroke-width="1"/>
  <text x="80" y="340" font-size="13" font-weight="600" fill="#7ec8e3">⑤ NULL의 의미</text>
  <text x="80" y="362" font-size="12" fill="#888">NULL = "알 수 없음" (not 0, not '')</text>
  <text x="80" y="380" font-size="12" fill="#e8e8e8">3값 논리: TRUE / FALSE / UNKNOWN</text>
  <text x="80" y="398" font-size="12" fill="#e05555">NULL = NULL 은 UNKNOWN → IS NULL 사용</text>

  <!-- Card 6 -->
  <rect x="460" y="314" width="360" height="96" fill="#0f1520" rx="8" stroke="#1e3a5a" stroke-width="1"/>
  <text x="480" y="340" font-size="13" font-weight="600" fill="#7ec8e3">⑥ 닫힘 성질(Closure)</text>
  <text x="480" y="362" font-size="12" fill="#888">관계 연산의 결과도 릴레이션이다.</text>
  <text x="480" y="380" font-size="12" fill="#e8e8e8">SELECT 결과를 다시 FROM에 넣을 수 있는 이유</text>
  <text x="480" y="398" font-size="12" fill="#55c555">서브쿼리·CTE의 이론적 근거</text>

  <!-- Code block -->
  <rect x="60" y="428" width="760" height="90" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="452" font-size="13" font-weight="600" fill="#888">SQL에서 확인하는 집합 연산</text>
  <text x="80" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="136" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#e8e8e8" xml:space="preserve"> id, name FROM customers WHERE grade = </text>
  <text x="602" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#ce9178" xml:space="preserve">'GOLD'</text>
  <text x="80" y="490" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#7ec8e3" xml:space="preserve">UNION</text>
  <text x="136" y="490" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#7ec8e3" xml:space="preserve"> ALL</text>
  <text x="80" y="508" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="136" y="508" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"
        fill="#e8e8e8" xml:space="preserve"> id, name FROM vip_customers;</text>

  <!-- Footer -->
  <text x="440" y="540" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 Chapter 1</text>
</svg>
