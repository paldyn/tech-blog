<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">환경 변수 선언 패턴</text>

  <!-- Left: environment vs env_file -->
  <text x="200" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">environment vs env_file</text>

  <rect x="60" y="96" width="360" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 인라인 (리스트 형식)</text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">environment</text><text x="184" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  - NODE_ENV=production</text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  - PORT=3000</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 값 없이 선언 → 호스트 변수 전달</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  - DEBUG</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 파일에서 로드</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">env_file</text><text x="144" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  - .env</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  - .env.local</text>

  <!-- Right: variable substitution patterns -->
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">변수 치환 패턴</text>

  <rect x="460" y="96" width="360" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 기본값: 변수 없으면 latest</text>
  <text x="476" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">image: myapp:</text><text x="595" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">${TAG:-latest}</text>
  <text x="476" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 필수: 없으면 오류 발생</text>
  <text x="476" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">image: myapp:</text><text x="595" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">${TAG:?TAG required}</text>
  <text x="476" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 값이 있을 때만 치환</text>
  <text x="476" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">image: myapp:</text><text x="595" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">${TAG:+custom}</text>
  <text x="476" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># .env 파일</text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">TAG=</text><text x="512" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">v2.1.0</text>
  <text x="476" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">DB_PASSWORD=</text><text x="589" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">secret</text>

  <!-- Bottom: best practices -->
  <rect x="60" y="322" width="760" height="80" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">보안 베스트 프랙티스</text>
  <text x="200" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ .env를 .gitignore에 추가</text>
  <text x="200" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ .env.example 예시 파일 커밋</text>
  <text x="200" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시크릿 파일 포함</text>
  <text x="580" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✕ 패스워드를 compose.yaml에 하드코딩</text>
  <text x="580" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✕ .env를 git에 커밋</text>
  <text x="580" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시크릿 노출 위험</text>
</svg>
