<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">vmstat 패턴으로 병목 진단</text>

  <!-- Defs -->
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- 3 scenario columns -->
  <!-- Scenario 1: CPU 병목 -->
  <rect x="60" y="72" width="235" height="300" rx="10" fill="#0e0808" stroke="#e05555" stroke-width="2"/>
  <text x="177" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">CPU 병목</text>
  <rect x="76" y="112" width="203" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">r: <tspan fill="#e05555">8</tspan>   b: 0</text>
  <text x="92" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">us: <tspan fill="#e05555">85</tspan>  sy: 10</text>
  <text x="92" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">id: <tspan fill="#e05555">5</tspan>   wa: 0</text>
  <text x="177" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">r이 CPU 수 초과</text>
  <text x="177" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">us 높고 id 낮음</text>
  <text x="177" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 프로세스 최적화</text>
  <text x="177" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ CPU 스케일업</text>
  <text x="177" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ nice/cgroup 조정</text>

  <!-- Scenario 2: I/O 병목 -->
  <rect x="323" y="72" width="235" height="300" rx="10" fill="#0e0c08" stroke="#e0d455" stroke-width="2"/>
  <text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e0d455">I/O 병목</text>
  <rect x="339" y="112" width="203" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="355" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">r: 1   b: <tspan fill="#e0d455">5</tspan></text>
  <text x="355" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">bi: <tspan fill="#e0d455">12800</tspan>  bo: <tspan fill="#e0d455">4200</tspan></text>
  <text x="355" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">wa: <tspan fill="#e0d455">42</tspan>  id: 55</text>
  <text x="440" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">b 높고 wa 높음</text>
  <text x="440" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">bi/bo 값 큼</text>
  <text x="440" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ iostat으로 상세 분석</text>
  <text x="440" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ SSD 업그레이드 검토</text>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 디스크 캐시 튜닝</text>

  <!-- Scenario 3: 메모리 부족 -->
  <rect x="586" y="72" width="234" height="300" rx="10" fill="#080a14" stroke="#7ec8e3" stroke-width="2"/>
  <text x="703" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">메모리 부족</text>
  <rect x="602" y="112" width="202" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="618" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">free: <tspan fill="#7ec8e3">1024</tspan></text>
  <text x="618" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">si: <tspan fill="#7ec8e3">128</tspan>  so: <tspan fill="#7ec8e3">256</tspan></text>
  <text x="618" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">swpd: <tspan fill="#7ec8e3">524288</tspan></text>
  <text x="703" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">si/so 지속적 증가</text>
  <text x="703" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">swpd 크고 free 작음</text>
  <text x="703" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ free -h로 상세 확인</text>
  <text x="703" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 메모리 누수 점검</text>
  <text x="703" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ RAM 증설</text>

  <!-- Bottom note -->
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">첫 번째 줄은 부팅 이후 누적 평균이므로 두 번째 줄부터 실시간 값으로 해석</text>
</svg>
