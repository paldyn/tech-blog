<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Props로 전달할 수 있는 값</text>

  <!-- String -->
  <rect x="60" y="64" width="360" height="100" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="240" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">문자열 / 숫자 / 불리언</text>
  <rect x="76" y="98" width="328" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="120" fill="#ce9178">&lt;Input</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">label</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"이름"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">maxLength</tspan><tspan fill="#ffffff">={</tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#ffffff">} </tspan><tspan fill="#7ec8e3">required</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">/&gt;</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// required만 쓰면 required={true}와 동일</tspan>
  </text>

  <!-- Object/Array -->
  <rect x="460" y="64" width="360" height="100" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="640" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">객체 / 배열</text>
  <rect x="476" y="98" width="328" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="492" y="120" fill="#ce9178">&lt;UserCard</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">user</tspan><tspan fill="#ffffff">={user} </tspan><tspan fill="#7ec8e3">tags</tspan><tspan fill="#ffffff">={[</tspan><tspan fill="#ce9178">'a'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'b'</tspan><tspan fill="#ffffff">]} </tspan><tspan fill="#ce9178">/&gt;</tspan>
    <tspan x="492" dy="18" fill="#9aa4b8">// 중괄호로 어떤 JS 값이든 전달 가능</tspan>
  </text>

  <!-- Function -->
  <rect x="60" y="186" width="360" height="100" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="240" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">함수 (이벤트 핸들러)</text>
  <rect x="76" y="222" width="328" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="244" fill="#ce9178">&lt;Button</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">onClick</tspan><tspan fill="#ffffff">={handleSave} </tspan><tspan fill="#7ec8e3">onHover</tspan><tspan fill="#ffffff">={showTip} </tspan><tspan fill="#ce9178">/&gt;</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// 콜백을 내려서 자식 이벤트를 처리</tspan>
  </text>

  <!-- Children -->
  <rect x="460" y="186" width="360" height="100" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="640" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">children (중첩 JSX)</text>
  <rect x="476" y="222" width="328" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="492" y="244" fill="#ce9178">&lt;Card&gt;</tspan>
    <tspan x="492" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">&lt;h2&gt;</tspan><tspan fill="#ffffff">제목</tspan><tspan fill="#ce9178">&lt;/h2&gt;</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">// props.children</tspan>
    <tspan x="492" dy="18" fill="#ce9178">&lt;/Card&gt;</tspan>
  </text>

  <!-- Default props code -->
  <rect x="60" y="308" width="760" height="96" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">기본값 (Default Props) — 구조 분해 시 설정</text>
  <rect x="76" y="342" width="728" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="362" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Button({ label = </tspan><tspan fill="#ce9178">'확인'</tspan><tspan fill="#ffffff">, variant = </tspan><tspan fill="#ce9178">'primary'</tspan><tspan fill="#ffffff">, disabled = </tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff"> }) { </tspan><tspan fill="#9aa4b8">/* ... */</tspan><tspan fill="#ffffff"> }</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// prop을 전달하지 않으면 기본값 사용</tspan>
  </text>
</svg>
