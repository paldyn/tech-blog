<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Props 타입과 기본값 패턴</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">전달할 수 있는 값의 종류와 기본값 설정 방법</text>

  <!-- Box 1: Primitive types -->
  <rect x="55" y="95" width="370" height="175" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">원시값 Props</text>
  <rect x="70" y="128" width="340" height="128" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 문자열 (따옴표)</text>
  <text x="82" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;Btn label=</text>
  <text x="152" y="166" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">"확인"</text>
  <text x="192" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> /&gt;</text>
  <text x="82" y="184" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 숫자 / boolean (중괄호)</text>
  <text x="82" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;Rating value={</text>
  <text x="175" y="202" font-size="13" fill="#b5cea8" font-family="'JetBrains Mono',monospace" xml:space="preserve">4.5</text>
  <text x="196" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">} /&gt;</text>
  <text x="82" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;Input disabled={</text>
  <text x="175" y="220" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">true</text>
  <text x="207" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">} /&gt;</text>
  <text x="82" y="238" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// boolean 축약: disabled={true}</text>

  <!-- Box 2: Complex types -->
  <rect x="455" y="95" width="370" height="175" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="118" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">복합 Props (객체·배열·함수)</text>
  <rect x="470" y="128" width="340" height="128" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 객체</text>
  <text x="482" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;Card user={{name:</text>
  <text x="580" y="166" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">'Alice'</text>
  <text x="621" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}} /&gt;</text>
  <text x="482" y="184" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 배열</text>
  <text x="482" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;List items={[</text>
  <text x="569" y="202" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">'a'</text>
  <text x="589" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">,</text>
  <text x="597" y="202" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">'b'</text>
  <text x="617" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">]} /&gt;</text>
  <text x="482" y="220" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 함수 (콜백)</text>
  <text x="482" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;Btn onClick={() =&gt; save()} /&gt;</text>

  <!-- Default values -->
  <rect x="55" y="295" width="770" height="135" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="318" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">기본값(Default Props) 설정 패턴</text>

  <rect x="70" y="330" width="350" height="85" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="350" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 구조분해 기본값 (권장)</text>
  <text x="82" y="368" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="125" y="368" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Btn({</text>
  <text x="82" y="386" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  label</text>
  <text x="119" y="386" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> = </text>
  <text x="135" y="386" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">'버튼'</text>
  <text x="163" y="386" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">,</text>
  <text x="82" y="404" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  disabled</text>
  <text x="140" y="404" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> = </text>
  <text x="156" y="404" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">false</text>

  <rect x="440" y="330" width="375" height="85" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="452" y="350" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// TypeScript props 타입 정의</text>
  <text x="452" y="368" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">type</text>
  <text x="477" y="368" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> BtnProps = {</text>
  <text x="452" y="386" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  label</text>
  <text x="489" y="386" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">?: </text>
  <text x="507" y="386" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">string</text>
  <text x="452" y="404" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  onClick</text>
  <text x="504" y="404" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">: () =&gt; </text>
  <text x="554" y="404" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">void</text>
</svg>
