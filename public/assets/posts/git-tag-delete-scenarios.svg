<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">태그 삭제 시나리오</text>
  <!-- Scenario 1 -->
  <rect x="60" y="70" width="360" height="110" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">잘못된 커밋에 태그</text>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">git tag -d v1.0.0</text>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">git push origin --delete v1.0.0</text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">git tag -a v1.0.0 correct-sha</text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">git push origin v1.0.0</text>
  <!-- Scenario 2 -->
  <rect x="460" y="70" width="360" height="110" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">시험용 태그 전체 제거</text>
  <text x="476" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># test- 로 시작하는 태그 모두 삭제</text>
  <text x="476" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" font-weight="600">git tag -l "test-*" | xargs git tag -d</text>
  <text x="476" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 원격에도 적용</text>
  <text x="476" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" font-weight="600">git push origin --delete $(git tag -l "test-*")</text>
  <!-- Warning -->
  <rect x="60" y="200" width="760" height="110" rx="8" fill="#180a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">주의사항</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">- 이미 push된 태그를 삭제하면 다른 팀원의 로컬에는 태그가 남아있음</text>
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">- 릴리스 아티팩트(GitHub Releases, npm 등)와 연결된 태그 삭제는 더욱 주의</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 불가피하면 삭제 후 팀 공지 + git fetch --prune-tags 권장</text>
</svg>
