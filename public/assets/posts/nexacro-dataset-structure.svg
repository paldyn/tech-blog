<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <linearGradient id="hdrDs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2018;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="colHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e4a38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#153322;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rowNormal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#131313;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rowAlt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#161616;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141414;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="64" rx="12" fill="url(#hdrDs)"/>
  <rect x="0" y="52" width="880" height="12" fill="url(#hdrDs)"/>
  <text x="44" y="38" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">Nexacro N — Dataset 구조</text>
  <text x="44" y="54" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" fill="#555">Column 메타데이터 + Row 데이터 + 변경 상태(RowSaveType)로 구성되는 인메모리 테이블</text>

  <!-- Dataset Box -->
  <rect x="44" y="82" width="792" height="340" rx="10" fill="#0f0f0f" stroke="#2a4a38" stroke-width="1.5"/>

  <!-- Dataset Label -->
  <text x="64" y="104" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4aff9e">dsEmployee</text>
  <text x="160" y="104" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444">Dataset (인메모리 테이블)</text>

  <!-- Column Header Row -->
  <rect x="64" y="112" width="752" height="32" rx="4" fill="url(#colHead)"/>

  <!-- Column cells in header -->
  <line x1="64" y1="112" x2="64" y2="400" stroke="#2a4a38" stroke-width="0.5"/>

  <!-- rowposition indicator -->
  <rect x="64" y="112" width="48" height="32" rx="0" fill="#1e4a38"/>
  <text x="88" y="132" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#4aff9e" text-anchor="middle">rowpos</text>

  <line x1="112" y1="112" x2="112" y2="400" stroke="#2a4a38" stroke-width="0.5"/>

  <!-- saveType column -->
  <rect x="112" y="112" width="72" height="32" fill="#1e4a38"/>
  <text x="148" y="128" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#88ffcc" text-anchor="middle">SaveType</text>
  <text x="148" y="141" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#555" text-anchor="middle">변경 상태</text>

  <line x1="184" y1="112" x2="184" y2="400" stroke="#2a4a38" stroke-width="0.5"/>

  <!-- empNo column -->
  <rect x="184" y="112" width="120" height="32" fill="#1e4a38"/>
  <text x="244" y="128" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#88ffcc" text-anchor="middle">empNo</text>
  <text x="244" y="141" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#555" text-anchor="middle">STRING(10) · PK</text>

  <line x1="304" y1="112" x2="304" y2="400" stroke="#2a4a38" stroke-width="0.5"/>

  <!-- empName column -->
  <rect x="304" y="112" width="130" height="32" fill="#1e4a38"/>
  <text x="369" y="128" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#88ffcc" text-anchor="middle">empName</text>
  <text x="369" y="141" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#555" text-anchor="middle">STRING(50)</text>

  <line x1="434" y1="112" x2="434" y2="400" stroke="#2a4a38" stroke-width="0.5"/>

  <!-- deptCd column -->
  <rect x="434" y="112" width="100" height="32" fill="#1e4a38"/>
  <text x="484" y="128" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#88ffcc" text-anchor="middle">deptCd</text>
  <text x="484" y="141" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#555" text-anchor="middle">STRING(6)</text>

  <line x1="534" y1="112" x2="534" y2="400" stroke="#2a4a38" stroke-width="0.5"/>

  <!-- salary column -->
  <rect x="534" y="112" width="110" height="32" fill="#1e4a38"/>
  <text x="589" y="128" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#88ffcc" text-anchor="middle">salary</text>
  <text x="589" y="141" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#555" text-anchor="middle">INT · 급여</text>

  <line x1="644" y1="112" x2="644" y2="400" stroke="#2a4a38" stroke-width="0.5"/>

  <!-- joinDate column -->
  <rect x="644" y="112" width="172" height="32" fill="#1e4a38"/>
  <text x="730" y="128" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#88ffcc" text-anchor="middle">joinDate</text>
  <text x="730" y="141" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#555" text-anchor="middle">STRING(8) · YYYYMMDD</text>

  <line x1="816" y1="112" x2="816" y2="400" stroke="#2a4a38" stroke-width="0.5"/>

  <!-- Row 0 — Normal (N) -->
  <rect x="64" y="144" width="752" height="32" fill="url(#rowNormal)"/>
  <rect x="64" y="144" width="48" height="32" fill="#0f1f17"/>
  <text x="88" y="164" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#4aff9e" text-anchor="middle">0 ◀</text>
  <rect x="112" y="144" width="72" height="32" fill="#111"/>
  <text x="148" y="164" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444" text-anchor="middle">N (원본)</text>
  <text x="244" y="164" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">EMP001</text>
  <text x="369" y="164" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">홍길동</text>
  <text x="484" y="164" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">D001</text>
  <text x="589" y="164" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">4,500,000</text>
  <text x="730" y="164" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">20200315</text>

  <!-- Row 1 — Updated (U) -->
  <rect x="64" y="176" width="752" height="32" fill="url(#rowAlt)"/>
  <rect x="64" y="176" width="48" height="32" fill="#111"/>
  <text x="88" y="196" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="middle">1</text>
  <rect x="112" y="176" width="72" height="32" fill="#1a2a00"/>
  <text x="148" y="196" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#aaff44" text-anchor="middle">U (수정)</text>
  <text x="244" y="196" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">EMP002</text>
  <text x="369" y="196" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#aaff44" text-anchor="middle">이순신 ✎</text>
  <text x="484" y="196" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">D002</text>
  <text x="589" y="196" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#aaff44" text-anchor="middle">5,200,000 ✎</text>
  <text x="730" y="196" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">20180601</text>

  <!-- Row 2 — Insert (I) -->
  <rect x="64" y="208" width="752" height="32" fill="url(#rowNormal)"/>
  <rect x="64" y="208" width="48" height="32" fill="#111"/>
  <text x="88" y="228" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="middle">2</text>
  <rect x="112" y="208" width="72" height="32" fill="#001a2a"/>
  <text x="148" y="228" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#44aaff" text-anchor="middle">I (신규)</text>
  <text x="244" y="228" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#44aaff" text-anchor="middle">EMP003 +</text>
  <text x="369" y="228" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#44aaff" text-anchor="middle">강감찬 +</text>
  <text x="484" y="228" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#44aaff" text-anchor="middle">D001 +</text>
  <text x="589" y="228" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#44aaff" text-anchor="middle">3,800,000 +</text>
  <text x="730" y="228" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#44aaff" text-anchor="middle">20260101 +</text>

  <!-- Row 3 — Delete (D) -->
  <rect x="64" y="240" width="752" height="32" fill="url(#rowAlt)"/>
  <rect x="64" y="240" width="48" height="32" fill="#111"/>
  <text x="88" y="260" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="middle">3</text>
  <rect x="112" y="240" width="72" height="32" fill="#2a0000"/>
  <text x="148" y="260" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ff6666" text-anchor="middle">D (삭제)</text>
  <text x="244" y="260" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444" text-anchor="middle" text-decoration="line-through">EMP004</text>
  <text x="369" y="260" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444" text-anchor="middle">신사임당</text>
  <text x="484" y="260" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444" text-anchor="middle">D003</text>
  <text x="589" y="260" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444" text-anchor="middle">4,100,000</text>
  <text x="730" y="260" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444" text-anchor="middle">20150901</text>

  <!-- Row border bottom -->
  <line x1="64" y1="272" x2="816" y2="272" stroke="#222" stroke-width="0.5"/>
  <text x="88" y="290" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#333" text-anchor="middle">...</text>
  <line x1="64" y1="300" x2="816" y2="300" stroke="#222" stroke-width="0.5"/>

  <!-- Stats Row -->
  <rect x="64" y="300" width="752" height="40" rx="0" fill="#0c0c0c"/>
  <text x="88" y="316" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#333" text-anchor="middle">통계</text>
  <text x="148" y="316" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444" text-anchor="middle">rowcount</text>
  <text x="148" y="332" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#4aff9e" text-anchor="middle">4</text>
  <text x="304" y="316" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444" text-anchor="middle">getDeletedRowCount()</text>
  <text x="304" y="332" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#ff6666" text-anchor="middle">1</text>
  <text x="484" y="316" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444" text-anchor="middle">colcount</text>
  <text x="484" y="332" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#88c0ff" text-anchor="middle">5</text>
  <text x="644" y="316" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444" text-anchor="middle">rowposition</text>
  <text x="644" y="332" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#ffcc44" text-anchor="middle">0 (현재 행 포인터)</text>

  <!-- Outer border bottom -->
  <line x1="64" y1="340" x2="816" y2="340" stroke="#2a4a38" stroke-width="0.5"/>

  <!-- Legend -->
  <text x="64" y="365" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#555">SaveType 범례:</text>
  <rect x="160" y="354" width="12" height="12" rx="2" fill="#444"/>
  <text x="178" y="365" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#666">N — 원본 (변경 없음)</text>
  <rect x="310" y="354" width="12" height="12" rx="2" fill="#1a2a00"/>
  <text x="328" y="365" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#aaff44">U — Updated (수정됨)</text>
  <rect x="470" y="354" width="12" height="12" rx="2" fill="#001a2a"/>
  <text x="488" y="365" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#44aaff">I — Inserted (신규)</text>
  <rect x="610" y="354" width="12" height="12" rx="2" fill="#2a0000"/>
  <text x="628" y="365" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ff6666">D — Deleted (삭제 표시)</text>

  <!-- Footer -->
  <text x="836" y="448" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#333" text-anchor="end">PALDYN · Nexacro N 시리즈</text>
</svg>
