<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="pm-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="pm-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">프롬프트 관리 워크플로우</text>

  <!-- Dev -->
  <rect x="60" y="76" width="140" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">개발자</text>
  <text x="130" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프롬프트 작성</text>
  <text x="130" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로컬 테스트</text>

  <!-- Git / PR -->
  <rect x="250" y="76" width="140" height="70" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="320" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Git PR</text>
  <text x="320" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리뷰 · 자동 평가</text>
  <text x="320" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CI 점수 체크</text>

  <!-- Staging -->
  <rect x="440" y="76" width="140" height="70" rx="8" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="510" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">스테이징</text>
  <text x="510" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">A/B 테스트</text>
  <text x="510" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">소수 트래픽 적용</text>

  <!-- Production -->
  <rect x="630" y="76" width="140" height="70" rx="8" fill="#1a2a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">프로덕션</text>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">100% 롤아웃</text>
  <text x="700" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모니터링</text>

  <!-- Flow arrows -->
  <line x1="200" y1="111" x2="248" y2="111" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pm-arr)"/>
  <line x1="390" y1="111" x2="438" y2="111" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pm-arr)"/>
  <line x1="580" y1="111" x2="628" y2="111" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pm-arr)"/>

  <!-- Prompt Registry section -->
  <rect x="60" y="186" width="760" height="54" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">프롬프트 레지스트리 (Langfuse / PromptLayer)</text>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">템플릿 저장 · 버전 이력 · 레이블(dev/staging/prod) · 즉시 롤백</text>

  <!-- Version timeline -->
  <text x="60" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">버전 이력</text>

  <!-- v1 -->
  <rect x="60" y="290" width="160" height="54" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">v1  (current prod)</text>
  <text x="140" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">score: 0.82  2026-04-01</text>

  <!-- v2 -->
  <rect x="240" y="290" width="160" height="54" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="320" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">v2  (staging)</text>
  <text x="320" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">score: 0.86  2026-04-20</text>

  <!-- v3 draft -->
  <rect x="420" y="290" width="160" height="54" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="500" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">v3  (draft)</text>
  <text x="500" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">평가 진행 중...</text>

  <!-- Rollback annotation -->
  <path d="M 240 317 Q 180 360 160 344" stroke="#e05555" stroke-width="2" fill="none"
        stroke-dasharray="4,4" marker-end="url(#pm-arr)"/>
  <text x="168" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">즉시 롤백 가능</text>

  <!-- Code block -->
  <rect x="60" y="394" width="760" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 프롬프트 레지스트리에서 특정 버전 조회</text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">prompt = langfuse.get_prompt(</tspan><tspan fill="#ce9178">"qa-bot"</tspan><tspan fill="#ffffff">, label=</tspan><tspan fill="#ce9178">"production"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">text = prompt.compile(context=doc, question=q)</tspan></text>
  <text x="76" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># label="production"만 바꾸면 즉시 롤백</tspan></text>
</svg>
