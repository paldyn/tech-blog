<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">버퍼링 vs 스트리밍 — 첫 바이트 시간(TTFB)</text>
    <!-- Row 1: buffered -->
    <text x="70" y="92" font-size="13" font-weight="600" fill="#e05555">① 버퍼링 — 다 만들고 나서 보내기</text>
    <rect x="70" y="106" width="380" height="34" rx="5" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1"/>
    <text x="260" y="128" text-anchor="middle" font-size="12" fill="#7ec8e3">서버가 본문 전체 생성 (3초)</text>
    <rect x="450" y="106" width="160" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="530" y="128" text-anchor="middle" font-size="12" fill="#55c555">전송</text>
    <rect x="610" y="106" width="130" height="34" rx="5" fill="#1f173a" stroke="#7777cc" stroke-width="1"/>
    <text x="675" y="128" text-anchor="middle" font-size="12" fill="#9b8fe8">렌더링</text>
    <line x1="450" y1="98" x2="450" y2="148" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="450" y="170" text-anchor="middle" font-size="12" fill="#e05555">첫 바이트 = 3.0초 후</text>
    <!-- Row 2: streaming -->
    <text x="70" y="222" font-size="13" font-weight="600" fill="#55c555">② 스트리밍 — 만들면서 바로바로 보내기</text>
    <rect x="70" y="236" width="110" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="125" y="258" text-anchor="middle" font-size="12" fill="#55c555">조각 1</text>
    <rect x="190" y="236" width="110" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="245" y="258" text-anchor="middle" font-size="12" fill="#55c555">조각 2</text>
    <rect x="310" y="236" width="110" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="365" y="258" text-anchor="middle" font-size="12" fill="#55c555">조각 3</text>
    <rect x="430" y="236" width="110" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="485" y="258" text-anchor="middle" font-size="12" fill="#55c555">조각 4</text>
    <rect x="550" y="236" width="110" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="605" y="258" text-anchor="middle" font-size="12" fill="#55c555">조각 5</text>
    <rect x="670" y="236" width="140" height="34" rx="5" fill="#1f173a" stroke="#7777cc" stroke-width="1"/>
    <text x="740" y="258" text-anchor="middle" font-size="12" fill="#9b8fe8">렌더는 그동안 진행</text>
    <line x1="180" y1="228" x2="180" y2="278" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="180" y="300" text-anchor="middle" font-size="12" fill="#55c555">첫 바이트 = 0.6초 후</text>
    <!-- Summary -->
    <text x="440" y="348" text-anchor="middle" font-size="12" fill="#888">총 소요 시간은 비슷해도 체감 속도가 다르다 — 브라우저는 받은 HTML부터 그리기 시작한다</text>
    <text x="440" y="366" text-anchor="middle" font-size="11" fill="#555">TTFB가 생성 전체 시간에서 첫 조각 생성 시간으로 줄어든다</text>
  </g>
</svg>
