<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" markerWidth="21" markerHeight="14" refX="19.25" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 21 7, 0 14" fill="#555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">AOP 실전 활용 사례 맵</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">비즈니스 로직에서 분리해야 할 횡단 관심사</text>

  <!-- Center: Business Logic -->
  <ellipse cx="440" cy="280" rx="72" ry="44" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">비즈니스</text>
  <text x="440" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">로직</text>

  <!-- 1. Logging -->
  <line x1="370" y1="254" x2="262" y2="178" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="90" y="106" width="170" height="90" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">로깅 / 추적</text>
  <text x="110" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 요청/응답 로깅</text>
  <text x="110" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• MDC 트레이스 ID</text>
  <text x="110" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 실행 시간 측정</text>

  <!-- 2. Security -->
  <line x1="440" y1="236" x2="440" y2="172" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="344" y="106" width="192" height="64" rx="8" fill="#1a1228" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">보안 / 인가</text>
  <text x="360" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 메서드 권한 검사</text>
  <text x="360" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• Rate Limiting</text>

  <!-- 3. Caching -->
  <line x1="508" y1="254" x2="602" y2="178" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="620" y="106" width="170" height="90" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">캐싱</text>
  <text x="640" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 결과 캐싱</text>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 캐시 무효화</text>
  <text x="640" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• Caffeine / Redis</text>

  <!-- 4. Transaction -->
  <line x1="508" y1="306" x2="602" y2="378" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="620" y="390" width="170" height="90" rx="8" fill="#1a0f08" stroke="#ce9178" stroke-width="1.5"/>
  <text x="705" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">트랜잭션</text>
  <text x="640" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• @Transactional</text>
  <text x="640" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 분산 트랜잭션</text>
  <text x="640" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• TCC 패턴</text>

  <!-- 5. Audit -->
  <line x1="440" y1="324" x2="440" y2="384" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="344" y="386" width="192" height="64" rx="8" fill="#0d0d1a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b5cea8">감사 / 모니터링</text>
  <text x="360" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 감사 로그 기록</text>
  <text x="360" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• Micrometer 메트릭</text>

  <!-- 6. Retry / Resilience -->
  <line x1="370" y1="306" x2="262" y2="378" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="90" y="390" width="170" height="90" rx="8" fill="#1a1a08" stroke="#e8e840" stroke-width="1.5"/>
  <text x="175" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e840">복원력</text>
  <text x="110" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 재시도 (Retry)</text>
  <text x="110" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• Circuit Breaker</text>
  <text x="110" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• Timeout 제어</text>

  <!-- footer -->
</svg>
