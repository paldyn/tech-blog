<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메뉴 클릭 → 화면 동적 로드 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">form_url 읽기 + loadPage() + 중복 탭 방지</text>

  <!-- Code block -->
  <rect x="60" y="92" width="760" height="320" fill="#070b14" rx="6" stroke="#1e2433"/>

  <text x="80" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 메뉴 트리 노드 클릭</text>
  <text x="80" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text>
  <text x="151" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> tre_menu_onnodeclick(obj, e) {</text>
  <text x="80" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  // 리프 노드만 처리</text>
  <text x="80" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  if</tspan><tspan fill="#e8e8e8"> (e.node.childcount != </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">) </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#e8e8e8">;</tspan></text>

  <text x="80" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  var</tspan><tspan fill="#e8e8e8"> menuId  = e.node.getDataValue(</tspan><tspan fill="#ce9178">"menu_id"</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  var</tspan><tspan fill="#e8e8e8"> formUrl = e.node.getDataValue(</tspan><tspan fill="#ce9178">"form_url"</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  var</tspan><tspan fill="#e8e8e8"> menuNm  = e.node.getDataValue(</tspan><tspan fill="#ce9178">"menu_text"</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  // 메인 프레임에 페이지 로드</text>
  <text x="80" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  gfn_loadPage(menuId, formUrl, menuNm);</text>
  <text x="80" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <text x="80" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 공통 라이브러리 — 탭 중복 방지</text>
  <text x="80" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text>
  <text x="151" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> gfn_loadPage(menuId, url, title) {</text>
  <text x="80" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  // 이미 열린 탭이면 포커스만 이동</text>
  <text x="80" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  var existTab = fn_findTab(menuId);</text>
  <text x="80" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  if</tspan><tspan fill="#e8e8e8"> (existTab) { existTab.focus(); </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#e8e8e8">; }</tspan></text>

  <text x="80" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  // 새 탭 추가 후 loadPage</text>
</svg>
