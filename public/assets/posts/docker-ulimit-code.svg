<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ulimit 설정 방법</text>

  <!-- Left: docker run -->
  <rect x="60" y="70" width="360" height="160" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">docker run --ulimit</text>

  <rect x="76" y="106" width="328" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> run \</text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  --ulimit <tspan fill="#ce9178">nofile</tspan>=<tspan fill="#b5cea8">65536</tspan>:<tspan fill="#b5cea8">65536</tspan> \</text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  --ulimit <tspan fill="#ce9178">nproc</tspan>=<tspan fill="#b5cea8">4096</tspan>:<tspan fill="#b5cea8">4096</tspan> \</text>
  <text x="92" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  --ulimit <tspan fill="#ce9178">memlock</tspan>=<tspan fill="#b5cea8">-1</tspan>:<tspan fill="#b5cea8">-1</tspan> \</text>
  <text x="92" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  nginx</text>

  <!-- Right: docker-compose.yml -->
  <rect x="460" y="70" width="360" height="160" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">docker-compose.yml</text>

  <rect x="476" y="106" width="328" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">services</tspan>:</text>
  <text x="492" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">web</tspan>:</text>
  <text x="492" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">ulimits</tspan>:</text>
  <text x="492" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      <tspan fill="#ce9178">nofile</tspan>: { <tspan fill="#7ec8e3">soft</tspan>: <tspan fill="#b5cea8">65536</tspan>, <tspan fill="#7ec8e3">hard</tspan>: <tspan fill="#b5cea8">65536</tspan>}</text>
  <text x="492" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      <tspan fill="#ce9178">memlock</tspan>: <tspan fill="#b5cea8">-1</tspan></text>

  <!-- Bottom: daemon.json -->
  <rect x="60" y="250" width="760" height="140" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">데몬 기본값 변경 — /etc/docker/daemon.json</text>

  <rect x="76" y="286" width="728" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="92" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">"default-ulimits"</tspan>: {</text>
  <text x="92" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#ce9178">"nofile"</tspan>: { <tspan fill="#7ec8e3">"Soft"</tspan>: <tspan fill="#b5cea8">65536</tspan>, <tspan fill="#7ec8e3">"Hard"</tspan>: <tspan fill="#b5cea8">65536</tspan>, <tspan fill="#7ec8e3">"Name"</tspan>: <tspan fill="#ce9178">"nofile"</tspan> }</text>
  <text x="92" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="92" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
