<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TCP vs UDP 핵심 비교</text>

  <!-- TCP Column Header -->
  <rect x="60" y="68" width="340" height="44" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">TCP</text>

  <!-- UDP Column Header -->
  <rect x="480" y="68" width="340" height="44" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">UDP</text>

  <!-- Row 1: 연결 방식 -->
  <rect x="60" y="128" width="340" height="58" rx="6" fill="#111820" stroke="#2a3a4a" stroke-width="1"/>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">연결 방식</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">연결 지향 (Connection-oriented)</text>

  <rect x="480" y="128" width="340" height="58" rx="6" fill="#111811" stroke="#2a4a2a" stroke-width="1"/>
  <text x="500" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">연결 방식</text>
  <text x="500" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">비연결 (Connectionless)</text>

  <!-- Row 2: 신뢰성 -->
  <rect x="60" y="198" width="340" height="58" rx="6" fill="#111820" stroke="#2a3a4a" stroke-width="1"/>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">신뢰성</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">보장 (재전송·순서·중복 제거)</text>

  <rect x="480" y="198" width="340" height="58" rx="6" fill="#111811" stroke="#2a4a2a" stroke-width="1"/>
  <text x="500" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">신뢰성</text>
  <text x="500" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">미보장 (Best-effort)</text>

  <!-- Row 3: 흐름·혼잡 제어 -->
  <rect x="60" y="268" width="340" height="58" rx="6" fill="#111820" stroke="#2a3a4a" stroke-width="1"/>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">흐름 / 혼잡 제어</text>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">있음 (슬라이딩 윈도우, CWND)</text>

  <rect x="480" y="268" width="340" height="58" rx="6" fill="#111811" stroke="#2a4a2a" stroke-width="1"/>
  <text x="500" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">흐름 / 혼잡 제어</text>
  <text x="500" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">없음</text>

  <!-- Row 4: 헤더 크기 -->
  <rect x="60" y="338" width="340" height="58" rx="6" fill="#111820" stroke="#2a3a4a" stroke-width="1"/>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">헤더 크기</text>
  <text x="80" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">20~60 바이트</text>

  <rect x="480" y="338" width="340" height="58" rx="6" fill="#111811" stroke="#2a4a2a" stroke-width="1"/>
  <text x="500" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">헤더 크기</text>
  <text x="500" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">고정 8 바이트</text>

  <!-- Row 5: 주요 사용처 -->
  <rect x="60" y="408" width="340" height="58" rx="6" fill="#111820" stroke="#2a3a4a" stroke-width="1"/>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">주요 사용처</text>
  <text x="80" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">HTTP, HTTPS, SSH, SMTP</text>

  <rect x="480" y="408" width="340" height="58" rx="6" fill="#111811" stroke="#2a4a2a" stroke-width="1"/>
  <text x="500" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">주요 사용처</text>
  <text x="500" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">DNS, DHCP, 실시간 스트리밍</text>

  <!-- vs separator -->
  <text x="440" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#555">vs</text>

  <!-- Bottom summary -->
  <rect x="60" y="484" width="760" height="38" rx="6" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="440" y="508" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9a9abb">TCP = 신뢰성 우선 · UDP = 속도/단순성 우선 — 두 프로토콜 모두 IP 위에서 동작하는 전송 계층 프로토콜</text>
</svg>
