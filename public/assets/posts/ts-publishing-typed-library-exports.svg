<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">package.json의 exports 맵</text>
  <text x="60" y="76" font-size="14" fill="#888">조건별로 타입·ESM·CJS 진입점을 가리킨다 (순서가 중요)</text>

  <rect x="60" y="100" width="760" height="300" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="132" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">{</text>
  <text xml:space="preserve" x="80" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#9cdcfe">"name"</tspan>: <tspan fill="#ce9178">"my-lib"</tspan>,</text>
  <text xml:space="preserve" x="80" y="180" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#9cdcfe">"type"</tspan>: <tspan fill="#ce9178">"module"</tspan>,</text>
  <text xml:space="preserve" x="80" y="204" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#9cdcfe">"exports"</tspan>: {</text>
  <text xml:space="preserve" x="80" y="228" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    <tspan fill="#ce9178">"."</tspan>: {</text>
  <text xml:space="preserve" x="80" y="252" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">      <tspan fill="#9cdcfe">"types"</tspan>: <tspan fill="#ce9178">"./dist/index.d.ts"</tspan>,   <tspan fill="#9aa4b8">// 맨 앞</tspan></text>
  <text xml:space="preserve" x="80" y="276" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">      <tspan fill="#9cdcfe">"import"</tspan>: <tspan fill="#ce9178">"./dist/index.js"</tspan>,    <tspan fill="#9aa4b8">// ESM</tspan></text>
  <text xml:space="preserve" x="80" y="300" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">      <tspan fill="#9cdcfe">"require"</tspan>: <tspan fill="#ce9178">"./dist/index.cjs"</tspan>  <tspan fill="#9aa4b8">// CJS</tspan></text>
  <text xml:space="preserve" x="80" y="324" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    }</text>
  <text xml:space="preserve" x="80" y="348" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  },</text>
  <text xml:space="preserve" x="80" y="372" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#9cdcfe">"files"</tspan>: [<tspan fill="#ce9178">"dist"</tspan>]   <tspan fill="#9aa4b8">// 배포에 포함할 것만</tspan></text>
  <text xml:space="preserve" x="80" y="392" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">}</text>
</svg>
