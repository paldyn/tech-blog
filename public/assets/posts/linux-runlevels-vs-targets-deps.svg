<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">systemd 타겟 의존 그래프</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">graphical.target 까지의 계층 구조</text>

  <!-- graphical.target (top) -->
  <rect x="310" y="88" width="260" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">graphical.target</text>

  <line x1="440" y1="132" x2="440" y2="158" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- multi-user.target -->
  <rect x="310" y="158" width="260" height="44" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="440" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">multi-user.target</text>

  <line x1="440" y1="202" x2="440" y2="228" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="202" x2="220" y2="228" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="530" y1="202" x2="660" y2="228" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- basic.target -->
  <rect x="310" y="228" width="260" height="44" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">basic.target</text>

  <!-- network.target -->
  <rect x="120" y="228" width="180" height="44" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="210" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">network.target</text>

  <!-- sshd.service -->
  <rect x="560" y="228" width="200" height="44" rx="6" fill="#1a2a2a" stroke="#3a6a6a" stroke-width="1"/>
  <text x="660" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">sshd.service</text>

  <line x1="440" y1="272" x2="440" y2="298" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- sysinit.target -->
  <rect x="310" y="298" width="260" height="44" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">sysinit.target</text>

  <line x1="440" y1="342" x2="440" y2="368" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- local-fs.target -->
  <rect x="240" y="368" width="200" height="36" rx="6" fill="#1a1a2a" stroke="#5a5a9a" stroke-width="1"/>
  <text x="340" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">local-fs.target</text>

  <!-- swap.target -->
  <rect x="460" y="368" width="180" height="36" rx="6" fill="#1a1a2a" stroke="#5a5a9a" stroke-width="1"/>
  <text x="550" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">swap.target</text>

  <line x1="340" y1="368" x2="420" y2="342" stroke="#5a5a9a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="550" y1="368" x2="470" y2="342" stroke="#5a5a9a" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
