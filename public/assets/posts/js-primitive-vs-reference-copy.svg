<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8">값 복사 vs 참조 복사</text>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#555">복사 후 원본이 변경되는가?</text>

  <!-- LEFT: Primitive Copy -->
  <text x="210" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#6b9fff">원시 타입 — 값 복사</text>

  <!-- Code -->
  <rect x="40" y="114" width="340" height="72" rx="8" fill="#111" stroke="#1a1a2a" stroke-width="1"/>
  <text x="60" y="136" font-size="12" fill="#555">let a = 10;</text>
  <text x="60" y="154" font-size="12" fill="#555">let b = a;  <tspan fill="#444">// b에 10이 복사됨</tspan></text>
  <text x="60" y="172" font-size="12" fill="#555">a = 99;</text>

  <!-- a box -->
  <rect x="60" y="206" width="120" height="48" rx="6" fill="#1a1a2a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="120" y="226" text-anchor="middle" font-size="11" fill="#888">a</text>
  <text x="120" y="244" text-anchor="middle" font-size="18" font-weight="700" fill="#e06c75">99</text>

  <!-- b box -->
  <rect x="220" y="206" width="120" height="48" rx="6" fill="#1a1a2a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="280" y="226" text-anchor="middle" font-size="11" fill="#888">b</text>
  <text x="280" y="244" text-anchor="middle" font-size="18" font-weight="700" fill="#6b9fff">10</text>

  <!-- Result -->
  <rect x="60" y="272" width="280" height="44" rx="6" fill="#1a2a1a"/>
  <text x="200" y="290" text-anchor="middle" font-size="12" fill="#6abf5e">✓ a 변경해도 b는 그대로</text>
  <text x="200" y="307" text-anchor="middle" font-size="11" fill="#555">각자 독립적인 복사본</text>

  <!-- Divider -->
  <line x1="440" y1="90" x2="440" y2="380" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- RIGHT: Reference Copy -->
  <text x="660" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#d4a84b">객체 타입 — 참조 복사</text>

  <!-- Code -->
  <rect x="500" y="114" width="340" height="72" rx="8" fill="#111" stroke="#2a2a1a" stroke-width="1"/>
  <text x="520" y="136" font-size="12" fill="#555">let obj1 = { x: 1 };</text>
  <text x="520" y="154" font-size="12" fill="#555">let obj2 = obj1; <tspan fill="#444">// 주소 복사</tspan></text>
  <text x="520" y="172" font-size="12" fill="#555">obj1.x = 99;</text>

  <!-- obj1 box -->
  <rect x="510" y="206" width="130" height="48" rx="6" fill="#2a2a1a" stroke="#4a4a2a" stroke-width="1"/>
  <text x="575" y="226" text-anchor="middle" font-size="11" fill="#888">obj1</text>
  <text x="575" y="244" text-anchor="middle" font-size="13" font-weight="600" fill="#d4a84b">→ 0x1a2b</text>

  <!-- obj2 box -->
  <rect x="660" y="206" width="130" height="48" rx="6" fill="#2a2a1a" stroke="#4a4a2a" stroke-width="1"/>
  <text x="725" y="226" text-anchor="middle" font-size="11" fill="#888">obj2</text>
  <text x="725" y="244" text-anchor="middle" font-size="13" font-weight="600" fill="#d4a84b">→ 0x1a2b</text>

  <!-- Same address arrows -->
  <line x1="575" y1="254" x2="648" y2="290" stroke="#d4a84b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="725" y1="254" x2="652" y2="290" stroke="#d4a84b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Heap object -->
  <rect x="600" y="290" width="150" height="48" rx="6" fill="#2a1a1a" stroke="#4a2a2a" stroke-width="1"/>
  <text x="675" y="312" text-anchor="middle" font-size="12" fill="#e06c75">{ x: 99 }</text>
  <text x="675" y="328" text-anchor="middle" font-size="10" fill="#555">힙 메모리</text>

  <!-- Result -->
  <rect x="500" y="354" width="340" height="44" rx="6" fill="#2a1a1a"/>
  <text x="670" y="372" text-anchor="middle" font-size="12" fill="#e06c75">⚠ obj2.x도 99로 변경됨!</text>
  <text x="670" y="389" text-anchor="middle" font-size="11" fill="#555">같은 객체를 가리키기 때문</text>

  <!-- Bottom note -->
  <text x="440" y="434" text-anchor="middle" font-size="12" fill="#444">참조를 복사하는 것은 데이터를 복사하는 게 아닙니다 — 같은 집으로 가는 주소 두 장을 가진 것과 같습니다</text>
</svg>
