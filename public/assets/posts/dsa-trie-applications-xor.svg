<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">XOR 트라이: x=4(100)와 XOR 최대가 되는 수 찾기</text>

  <!-- level labels -->
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">
    <text x="70" y="219">bit 2</text>
    <text x="70" y="294">bit 1</text>
    <text x="70" y="369">bit 0</text>
  </g>

  <!-- edges -->
  <line x1="300" y1="140" x2="200" y2="215" stroke="#55c555" stroke-width="3"/>
  <line x1="300" y1="140" x2="400" y2="215" stroke="#555555" stroke-width="2"/>
  <line x1="200" y1="215" x2="200" y2="290" stroke="#55c555" stroke-width="3"/>
  <line x1="400" y1="215" x2="350" y2="290" stroke="#555555" stroke-width="2"/>
  <line x1="400" y1="215" x2="470" y2="290" stroke="#555555" stroke-width="2"/>
  <line x1="200" y1="290" x2="200" y2="365" stroke="#55c555" stroke-width="3"/>
  <line x1="350" y1="290" x2="350" y2="365" stroke="#555555" stroke-width="2"/>
  <line x1="470" y1="290" x2="470" y2="365" stroke="#555555" stroke-width="2"/>

  <!-- nodes -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600">
    <circle cx="300" cy="140" r="20" fill="#000000" stroke="#888888" stroke-width="2"/>
    <text x="300" y="145" text-anchor="middle" fill="#9aa4b8" font-size="11">root</text>

    <circle cx="200" cy="215" r="20" fill="#000000" stroke="#55c555" stroke-width="2.5"/>
    <text x="200" y="220" text-anchor="middle" fill="#55c555">0</text>
    <circle cx="400" cy="215" r="20" fill="#000000" stroke="#555555" stroke-width="2"/>
    <text x="400" y="220" text-anchor="middle" fill="#ffffff">1</text>

    <circle cx="200" cy="290" r="20" fill="#000000" stroke="#55c555" stroke-width="2.5"/>
    <text x="200" y="295" text-anchor="middle" fill="#55c555">1</text>
    <circle cx="350" cy="290" r="20" fill="#000000" stroke="#555555" stroke-width="2"/>
    <text x="350" y="295" text-anchor="middle" fill="#ffffff">0</text>
    <circle cx="470" cy="290" r="20" fill="#000000" stroke="#555555" stroke-width="2"/>
    <text x="470" y="295" text-anchor="middle" fill="#ffffff">1</text>

    <circle cx="200" cy="365" r="20" fill="#000000" stroke="#55c555" stroke-width="2.5"/>
    <text x="200" y="370" text-anchor="middle" fill="#55c555">1</text>
    <circle cx="350" cy="365" r="20" fill="#000000" stroke="#555555" stroke-width="2"/>
    <text x="350" y="370" text-anchor="middle" fill="#ffffff">1</text>
    <circle cx="470" cy="365" r="20" fill="#000000" stroke="#555555" stroke-width="2"/>
    <text x="470" y="370" text-anchor="middle" fill="#ffffff">0</text>
  </g>

  <!-- leaf value labels -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">
    <text x="200" y="407" text-anchor="middle">3 (011)</text>
    <text x="350" y="407" text-anchor="middle">5 (101)</text>
    <text x="470" y="407" text-anchor="middle">6 (110)</text>
  </g>

  <!-- annotation box -->
  <rect x="580" y="140" width="240" height="170" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="596" y="172" fill="#ffffff">쿼리: <tspan fill="#7ec8e3" font-weight="600">x = 4 (100)</tspan></text>
    <text x="596" y="200" fill="#ffffff">bit2 = 1 → <tspan fill="#55c555" font-weight="600">0</tspan> 선택</text>
    <text x="596" y="228" fill="#ffffff">bit1 = 0 → <tspan fill="#55c555" font-weight="600">1</tspan> 선택</text>
    <text x="596" y="256" fill="#ffffff">bit0 = 0 → <tspan fill="#55c555" font-weight="600">1</tspan> 선택</text>
    <text x="596" y="284" fill="#ffffff">결과: 4 ⊕ 3 = <tspan fill="#55c555" font-weight="600">7</tspan></text>
  </g>

  <text x="60" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">각 비트에서 내 비트와 반대 방향 자식을 우선 선택 → 비트 수 B만큼만 내려가면 끝 O(B)</text>
</svg>
