<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">OS 엔트로피 풀 → 응용 프로그램</text>

  <!-- Entropy Sources -->
  <rect x="60" y="68" width="760" height="60" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">하드웨어 엔트로피 소스</text>
  <text x="200" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">키보드/마우스 이벤트 타이밍</text>
  <text x="440" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU 인터럽트 타이밍 · 열잡음</text>
  <text x="680" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RDRAND (Intel x86) · HW RNG</text>

  <line x1="440" y1="130" x2="440" y2="155" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- OS Entropy Pool -->
  <rect x="240" y="158" width="400" height="64" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">OS 엔트로피 풀</text>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Linux: /dev/random · /dev/urandom</text>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Windows: BCryptGenRandom · macOS: /dev/urandom</text>

  <line x1="440" y1="224" x2="440" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Language APIs -->
  <rect x="60" y="252" width="760" height="80" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">언어별 CSPRNG API</text>

  <text x="145" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Python</text>
  <text x="145" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">secrets / os.urandom()</text>

  <text x="310" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">JavaScript</text>
  <text x="310" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">crypto.getRandomValues()</text>

  <text x="480" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055">Java</text>
  <text x="480" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SecureRandom (NativePRNG)</text>

  <text x="660" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Go / Rust</text>
  <text x="660" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">crypto/rand · rand::rngs::OsRng</text>

  <!-- Warning: Early boot -->
  <rect x="60" y="348" width="760" height="36" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">⚠ 부팅 직후 엔트로피 부족 문제 (Boot-Time Entropy Starvation)</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨테이너·VM 환경에서 특히 주의 — getrandom(2) syscall 또는 RDRAND 사용 권장</text>
</svg>
