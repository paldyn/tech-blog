<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">webpack 빌드 파이프라인</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">Entry → Dependency Graph → Loaders → Plugins → Chunks → Output</text>

  <!-- Entry -->
  <rect x="60" y="100" width="140" height="60" rx="8" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="76" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">Entry Points</text>
  <text x="76" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">src/index.js</text>

  <!-- Arrow 1 -->
  <line x1="202" y1="130" x2="234" y2="130" stroke="#7777cc" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Dependency Graph -->
  <rect x="236" y="100" width="160" height="60" rx="8" fill="#1a0d2b" stroke="#3a1e70"/>
  <text x="252" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" xml:space="preserve">Dependency Graph</text>
  <text x="252" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">모듈 그래프 구성</text>

  <!-- Arrow 2 -->
  <line x1="398" y1="130" x2="430" y2="130" stroke="#7777cc" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Loaders -->
  <rect x="432" y="100" width="140" height="60" rx="8" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="448" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" xml:space="preserve">Loaders</text>
  <text x="448" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">파일 변환</text>

  <!-- Arrow 3 -->
  <line x1="574" y1="130" x2="606" y2="130" stroke="#7777cc" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Plugins -->
  <rect x="608" y="100" width="120" height="60" rx="8" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="624" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" xml:space="preserve">Plugins</text>
  <text x="624" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">빌드 프로세스</text>

  <!-- Arrow 4 -->
  <line x1="730" y1="130" x2="762" y2="130" stroke="#7777cc" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Output -->
  <rect x="764" y="100" width="96" height="60" rx="8" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="778" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" xml:space="preserve">Output</text>
  <text x="778" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">dist/*.js</text>

  <!-- Divider -->
  <line x1="60" y1="188" x2="820" y2="188" stroke="#1e2433" stroke-width="1"/>

  <!-- Left: Loader examples -->
  <text x="60" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" xml:space="preserve">주요 Loader</text>

  <rect x="60" y="222" width="360" height="204" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">// webpack.config.js — module.rules</text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">module: {</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  rules: [</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">    // TypeScript</text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    { test: </text>
  <text x="142" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">/\.tsx?$/</text>
  <text x="198" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">      use: </text>
  <text x="125" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'swc-loader'</text>
  <text x="208" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> },</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">    // CSS Modules</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    { test: </text>
  <text x="142" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">/\.module\.css$/</text>
  <text x="257" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">      use: [</text>
  <text x="131" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'style-loader'</text>
  <text x="217" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="224" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'css-loader'</text>
  <text x="308" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">] }</text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  ]</text>

  <!-- Right: Plugin examples -->
  <text x="460" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" xml:space="preserve">주요 Plugin</text>

  <rect x="460" y="222" width="360" height="52" rx="6" fill="#1a0d2b" stroke="#3a1e70"/>
  <text x="476" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">HtmlWebpackPlugin</text>
  <text x="476" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">HTML에 번들 스크립트 자동 삽입</text>

  <rect x="460" y="284" width="360" height="52" rx="6" fill="#1a0d2b" stroke="#3a1e70"/>
  <text x="476" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">MiniCssExtractPlugin</text>
  <text x="476" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">CSS를 별도 파일로 추출</text>

  <rect x="460" y="346" width="360" height="52" rx="6" fill="#1a0d2b" stroke="#3a1e70"/>
  <text x="476" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">DefinePlugin</text>
  <text x="476" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">전역 상수 정의 (process.env.NODE_ENV)</text>

  <rect x="460" y="408" width="360" height="32" rx="6" fill="#1a0d2b" stroke="#3a1e70"/>
  <text x="476" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">BundleAnalyzerPlugin — 번들 크기 시각화</text>
</svg>
