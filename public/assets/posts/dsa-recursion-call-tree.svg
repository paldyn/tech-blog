<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr-d" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-u" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">재귀 호출 트리 - factorial(4)</text>

  <!-- Level labels -->
  <text x="820" y="108" font-size="12" fill="#888" text-anchor="middle">depth 0</text>
  <text x="820" y="188" font-size="12" fill="#888" text-anchor="middle">depth 1</text>
  <text x="820" y="268" font-size="12" fill="#888" text-anchor="middle">depth 2</text>
  <text x="820" y="348" font-size="12" fill="#888" text-anchor="middle">depth 3</text>

  <!-- fact(4) - root -->
  <rect x="340" y="82" width="160" height="44" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="420" y="101" font-size="13" fill="#888" text-anchor="middle">factorial(4)</text>
  <text x="420" y="119" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">= 4 * factorial(3)</text>

  <!-- Arrow down -->
  <line x1="420" y1="126" x2="420" y2="158" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- fact(3) -->
  <rect x="340" y="162" width="160" height="44" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="420" y="181" font-size="13" fill="#888" text-anchor="middle">factorial(3)</text>
  <text x="420" y="199" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">= 3 * factorial(2)</text>

  <!-- Arrow down -->
  <line x1="420" y1="206" x2="420" y2="238" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- fact(2) -->
  <rect x="340" y="242" width="160" height="44" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="420" y="261" font-size="13" fill="#888" text-anchor="middle">factorial(2)</text>
  <text x="420" y="279" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">= 2 * factorial(1)</text>

  <!-- Arrow down -->
  <line x1="420" y1="286" x2="420" y2="318" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- fact(1) - base case -->
  <rect x="340" y="322" width="160" height="44" rx="8" fill="#0a2a1a" stroke="#55c555" stroke-width="2.5"/>
  <text x="420" y="341" font-size="13" fill="#888" text-anchor="middle">factorial(1)</text>
  <text x="420" y="359" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">= 1  (기저 조건)</text>

  <!-- Base case label -->
  <rect x="520" y="328" width="120" height="32" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="580" y="344" font-size="12" fill="#55c555" text-anchor="middle">n &lt;= 1</text>
  <text x="580" y="358" font-size="12" fill="#55c555" text-anchor="middle">return 1</text>
  <line x1="520" y1="344" x2="502" y2="344" stroke="#55c555" stroke-width="1.5"/>

  <!-- RETURN PHASE - right side -->
  <text x="680" y="82" font-size="14" font-weight="600" fill="#e8e8e8">반환 단계 (Unwinding)</text>

  <!-- Return values going up -->
  <!-- return 1 -->
  <rect x="630" y="322" width="120" height="44" rx="8" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="341" font-size="13" fill="#888" text-anchor="middle">return</text>
  <text x="690" y="359" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">1</text>

  <!-- Arrow up -->
  <line x1="690" y1="322" x2="690" y2="294" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>

  <!-- return 2 -->
  <rect x="630" y="242" width="120" height="44" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="261" font-size="13" fill="#888" text-anchor="middle">2 * 1 = return</text>
  <text x="690" y="279" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">2</text>

  <!-- Arrow up -->
  <line x1="690" y1="242" x2="690" y2="214" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>

  <!-- return 6 -->
  <rect x="630" y="162" width="120" height="44" rx="8" fill="#2a4a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="181" font-size="13" fill="#888" text-anchor="middle">3 * 2 = return</text>
  <text x="690" y="199" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">6</text>

  <!-- Arrow up -->
  <line x1="690" y1="162" x2="690" y2="134" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>

  <!-- return 24 - final -->
  <rect x="630" y="82" width="120" height="44" rx="8" fill="#2a5a1a" stroke="#55c555" stroke-width="2"/>
  <text x="690" y="101" font-size="13" fill="#888" text-anchor="middle">4 * 6 = return</text>
  <text x="690" y="119" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">24</text>

  <!-- Connection lines between call stack and return -->
  <line x1="502" y1="344" x2="630" y2="344" stroke="#3a3a3a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="502" y1="264" x2="630" y2="264" stroke="#3a3a3a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="502" y1="184" x2="630" y2="184" stroke="#3a3a3a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="502" y1="104" x2="630" y2="104" stroke="#3a3a3a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="60" y="420" width="760" height="76" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="442" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">콜 스택 구조</text>
  <text x="150" y="464" font-size="13" fill="#7ec8e3" text-anchor="middle">파란색: 호출 단계</text>
  <text x="150" y="480" font-size="12" fill="#888" text-anchor="middle">각 호출이 스택에 쌓임</text>
  <text x="440" y="464" font-size="13" fill="#55c555" text-anchor="middle">초록색: 기저 조건 (Base Case)</text>
  <text x="440" y="480" font-size="12" fill="#888" text-anchor="middle">재귀 탈출 조건, 없으면 무한 재귀</text>
  <text x="730" y="464" font-size="13" fill="#55c555" text-anchor="middle">반환 값 역전파</text>
  <text x="730" y="480" font-size="12" fill="#888" text-anchor="middle">스택 언와인딩 (Unwinding)</text>
</svg>
