<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Docker 내장 DNS 동작 흐름</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">127.0.0.11 내장 DNS 서버가 컨테이너 이름을 IP로 변환</text>

  <!-- Container A -->
  <rect x="60" y="100" width="200" height="120" rx="8" fill="#0d1320" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600">Container A (api)</text>
  <text x="160" y="152" text-anchor="middle" fill="#e8e8e8" font-size="12">IP: 172.20.0.2</text>
  <text x="160" y="172" text-anchor="middle" fill="#888" font-size="11">resolv.conf:</text>
  <text x="160" y="190" text-anchor="middle" fill="#55c555" font-size="11">nameserver 127.0.0.11</text>
  <text x="160" y="208" text-anchor="middle" fill="#888" font-size="11">options ndots:0</text>

  <!-- DNS query arrow 1 -->
  <line x1="260" y1="155" x2="340" y2="155" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="340,155 328,149 328,161" fill="#7ec8e3"/>
  <text x="300" y="145" text-anchor="middle" fill="#888" font-size="11">1. curl http://db:5432</text>

  <!-- Docker DNS Server -->
  <rect x="340" y="100" width="200" height="120" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="128" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">Docker DNS</text>
  <text x="440" y="148" text-anchor="middle" fill="#e8e8e8" font-size="12">127.0.0.11:53</text>
  <text x="440" y="168" text-anchor="middle" fill="#888" font-size="11">컨테이너 등록 DB</text>
  <text x="440" y="186" text-anchor="middle" fill="#888" font-size="11">db → 172.20.0.4</text>
  <text x="440" y="204" text-anchor="middle" fill="#888" font-size="11">api → 172.20.0.2</text>

  <!-- DNS response arrow -->
  <line x1="340" y1="175" x2="260" y2="175" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="260,175 272,169 272,181" fill="#55c555"/>
  <text x="300" y="195" text-anchor="middle" fill="#888" font-size="11">2. 172.20.0.4 반환</text>

  <!-- Fallback arrow to external DNS -->
  <line x1="540" y1="155" x2="620" y2="155" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="620,155 608,149 608,161" fill="#888"/>
  <text x="580" y="145" text-anchor="middle" fill="#888" font-size="11">3. 미등록 도메인</text>
  <text x="580" y="165" text-anchor="middle" fill="#888" font-size="11">(외부 DNS 포워딩)</text>

  <!-- External DNS -->
  <rect x="620" y="100" width="200" height="80" rx="8" fill="#0d1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="132" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">외부 DNS</text>
  <text x="720" y="152" text-anchor="middle" fill="#e8e8e8" font-size="12">8.8.8.8 / 1.1.1.1</text>
  <text x="720" y="168" text-anchor="middle" fill="#888" font-size="11">호스트 resolv.conf 기반</text>

  <!-- Container DB -->
  <rect x="340" y="270" width="200" height="100" rx="8" fill="#0d1b2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="298" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">Container B (db)</text>
  <text x="440" y="318" text-anchor="middle" fill="#e8e8e8" font-size="12">IP: 172.20.0.4</text>
  <text x="440" y="338" text-anchor="middle" fill="#888" font-size="11">postgres:5432</text>
  <text x="440" y="356" text-anchor="middle" fill="#888" font-size="11">같은 네트워크</text>

  <!-- DNS → Container B -->
  <line x1="440" y1="220" x2="440" y2="270" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="440,270 434,258 446,258" fill="#55c555"/>
  <text x="490" y="250" fill="#888" font-size="11">4. 연결</text>

  <!-- Bottom note: default bridge exception -->
  <rect x="60" y="400" width="760" height="80" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="428" text-anchor="middle" fill="#e05555" font-size="13" font-weight="600">주의: 기본 bridge 네트워크에서는 내장 DNS 동작 안 함</text>
  <text x="440" y="452" text-anchor="middle" fill="#e8e8e8" font-size="12">기본 bridge(docker0)에서는 컨테이너 이름 DNS 해석이 지원되지 않는다.</text>
  <text x="440" y="472" text-anchor="middle" fill="#888" font-size="12">반드시 사용자 정의 네트워크를 만들어야 이름으로 통신 가능.</text>
</svg>
