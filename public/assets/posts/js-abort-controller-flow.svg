<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">AbortController — 신호 전파 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">controller.abort() 한 번으로 모든 연결된 작업을 취소</text>

  <!-- AbortController box -->
  <rect x="310" y="90" width="260" height="70" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">AbortController</text>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.abort(reason?)  →  .signal</text>

  <!-- Signal box -->
  <rect x="310" y="210" width="260" height="60" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">AbortSignal</text>
  <text x="440" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.aborted  .reason  .addEventListener</text>

  <!-- Arrow: controller → signal -->
  <line x1="440" y1="160" x2="440" y2="208" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="433,200 440,210 447,200" fill="#7ec8e3"/>
  <text x="456" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">.signal</text>

  <!-- fetch() box -->
  <rect x="50" y="330" width="200" height="60" rx="8" fill="#071510" stroke="#55c555"/>
  <text x="150" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">fetch(url, {signal})</text>
  <text x="150" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">네트워크 요청 취소</text>

  <!-- setTimeout/listener box -->
  <rect x="340" y="330" width="200" height="60" rx="8" fill="#0a1020" stroke="#7777cc"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">addEventListener</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">'abort' 이벤트 수신</text>

  <!-- Custom async box -->
  <rect x="630" y="330" width="200" height="60" rx="8" fill="#1a0a0a" stroke="#e05555"/>
  <text x="730" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">커스텀 비동기 작업</text>
  <text x="730" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">signal.throwIfAborted()</text>

  <!-- Arrow: signal → fetch -->
  <line x1="370" y1="270" x2="200" y2="328" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="194,320 196,330 204,323" fill="#7777cc"/>

  <!-- Arrow: signal → listener -->
  <line x1="440" y1="270" x2="440" y2="328" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="433,320 440,330 447,320" fill="#7777cc"/>

  <!-- Arrow: signal → custom -->
  <line x1="510" y1="270" x2="680" y2="328" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="676,320 682,328 688,322" fill="#7777cc"/>

  <!-- Labels -->
  <text x="150" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">{ signal }</text>
  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">{ signal }</text>
  <text x="730" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">{ signal }</text>

  <!-- Abort result -->
  <rect x="50" y="410" width="780" height="32" rx="6" fill="#1a0a0a" stroke="#e05555"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">controller.abort() → signal.aborted = true → 모든 리스너에 'abort' 이벤트 발생</text>
</svg>
