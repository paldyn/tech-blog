<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">줄 끝 문자: LF · CRLF · CR</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">플랫폼별 개행 표현과 파이썬의 Universal Newlines</text>

  <!-- LF -->
  <rect x="60" y="100" width="230" height="170" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="175" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="30" font-weight="700" fill="#7ec8e3" text-anchor="middle">LF</text>
  <text x="175" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="17" fill="#ffffff" text-anchor="middle">\n</text>
  <text x="175" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" text-anchor="middle">0x0A</text>
  <text x="175" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Unix · Linux · macOS</text>

  <!-- CRLF -->
  <rect x="325" y="100" width="230" height="170" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="30" font-weight="700" fill="#7777cc" text-anchor="middle">CRLF</text>
  <text x="440" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="17" fill="#ffffff" text-anchor="middle">\r\n</text>
  <text x="440" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" text-anchor="middle">0x0D 0x0A</text>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Windows</text>

  <!-- CR -->
  <rect x="590" y="100" width="230" height="170" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="705" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="30" font-weight="700" fill="#e05555" text-anchor="middle">CR</text>
  <text x="705" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="17" fill="#ffffff" text-anchor="middle">\r</text>
  <text x="705" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" text-anchor="middle">0x0D</text>
  <text x="705" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">구형 Mac (Classic)</text>

  <!-- Universal Newlines band -->
  <rect x="60" y="296" width="760" height="100" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Universal Newlines — 파이썬 텍스트 모드 기본</text>
  <line x1="440" y1="340" x2="440" y2="380" stroke="#2a4a2a" stroke-width="1"/>
  <text x="92" y="368" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#e8e8e8" font-weight="600">읽기  </tspan><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">\r\n · \r  →  \n</tspan><tspan fill="#888"> 으로 통일</tspan></text>
  <text x="472" y="368" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#e8e8e8" font-weight="600">쓰기  </tspan><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">\n  →  os.linesep</tspan><tspan fill="#888"> 으로 변환</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">텍스트 모드에서만 자동 적용 — 바이너리 모드(rb/wb)는 변환 없이 원본 유지</text>
</svg>
