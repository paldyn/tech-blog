<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GTID 기반 리플리케이션 플로우</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">Global Transaction Identifier — 자동 포지션 추적</text>

  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09055"/>
    </marker>
  </defs>

  <!-- Source (Primary) -->
  <rect x="60" y="100" width="220" height="90" rx="8" fill="#0f1a2e" stroke="#3a6aae" stroke-width="2"/>
  <text x="170" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Primary (Source)</text>
  <text x="170" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">server_uuid: aaaa-bbbb</text>
  <text x="170" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">gtid_mode=ON</text>

  <!-- Binary Log -->
  <rect x="60" y="220" width="220" height="76" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Binary Log</text>
  <text x="170" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">aaaa-bbbb:1  BEGIN</text>
  <text x="170" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">aaaa-bbbb:2  UPDATE …</text>

  <!-- Arrow: Primary → Binlog -->
  <line x1="170" y1="190" x2="170" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="180" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">write</text>

  <!-- Replica -->
  <rect x="600" y="100" width="220" height="90" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="2"/>
  <text x="710" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Replica</text>
  <text x="710" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">gtid_executed: aaaa-bbbb:1-5</text>
  <text x="710" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">자동으로 다음 GTID 요청</text>

  <!-- Relay Log -->
  <rect x="600" y="220" width="220" height="76" rx="8" fill="#1a150a" stroke="#e09055" stroke-width="1.5"/>
  <text x="710" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e09055" text-anchor="middle">Relay Log</text>
  <text x="710" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">복사된 이벤트 저장</text>
  <text x="710" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SQL Thread가 적용</text>

  <!-- Arrow: Replica ← IO Thread -->
  <line x1="600" y1="145" x2="282" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="420" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">COM_BINLOG_DUMP_GTID</text>
  <text x="420" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">IO Thread → Primary 연결</text>

  <!-- Arrow: Binlog → Relay Log (network) -->
  <path d="M 280 255 C 380 235 500 265 598 258" stroke="#55c555" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Binlog Events 전송</text>

  <!-- Arrow: Relay Log → Apply -->
  <line x1="710" y1="296" x2="710" y2="338" stroke="#e09055" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- Applied box -->
  <rect x="600" y="340" width="220" height="62" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">SQL Thread 적용</text>
  <text x="710" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">gtid_executed에 추가</text>

  <!-- GTID Format Box -->
  <rect x="290" y="360" width="300" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="306" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">GTID 형식</text>
  <text x="306" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">source_id:transaction_id</text>
  <text x="306" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">-- 예시</text>
  <text x="306" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">aaaa-bbbb-cccc-dddd-eeee:1-100</text>

  <!-- Bottom labels -->
  <text x="170" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">소스 식별 (UUID)</text>
  <text x="710" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">자동 포지션 — 수동 설정 불필요</text>
</svg>
