<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">RLS와 Always Encrypted 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">접근 제어 레이어 vs 저장/전송 암호화</text>

  <!-- RLS -->
  <rect x="60" y="88" width="360" height="256" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">행 수준 보안 (Row-Level Security)</text>
  <text x="240" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">보안 정책 함수로 SELECT·DML 행 필터링</text>
  <text x="240" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">사용자·컨텍스트 기반 가시성 제한</text>
  <text x="240" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">적용 대상: 영업 담당자별 고객 분리</text>
  <text x="240" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">         멀티 테넌트 SaaS 테넌트 격리</text>
  <text x="240" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">         HIPAA 의료 기록 접근 제어</text>
  <text x="240" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점: 앱 코드 변경 없이 DB 레벨 적용</text>
  <text x="240" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">       WHERE 절 자동 삽입 (투명)</text>
  <text x="240" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">주의: sysadmin·dbo는 우회 가능</text>
  <text x="240" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">       복잡한 정책 = 쿼리 성능 영향</text>
  <text x="240" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">암호화: ✗ (데이터는 평문)</text>

  <!-- Always Encrypted -->
  <rect x="460" y="88" width="360" height="256" rx="8" fill="#0a1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Always Encrypted</text>
  <text x="640" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">클라이언트 드라이버에서 암호화/복호화</text>
  <text x="640" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DB 엔진·DBA도 평문 절대 접근 불가</text>
  <text x="640" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">적용 대상: 주민등록번호·신용카드 번호</text>
  <text x="640" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">         의료 기록·급여 정보</text>
  <text x="640" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">         클라우드 DB 민감 컬럼</text>
  <text x="640" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점: DBA·클라우드 관리자도 열람 불가</text>
  <text x="640" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">       규정 준수(PCI-DSS·GDPR) 강력</text>
  <text x="640" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">주의: 암호화 컬럼 범위 조건 제한</text>
  <text x="640" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">       결정적 암호화만 등치 조건 가능</text>
  <text x="640" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">RLS: ✗ (행 필터 없음, 컬럼 암호화만)</text>

  <!-- Code: RLS -->
  <rect x="60" y="364" width="360" height="96" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- RLS 정책 함수</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">CREATE FUNCTION fn_filter(@OwnerID INT)</text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  RETURNS TABLE WITH SCHEMABINDING AS</text>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  RETURN SELECT 1 AS r</text>
  <text x="76" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    WHERE @OwnerID = USER_ID();</text>

  <!-- Code: Always Encrypted -->
  <rect x="460" y="364" width="360" height="96" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- Always Encrypted 컬럼 정의</text>
  <text x="476" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">SSN NVARCHAR(11)</text>
  <text x="476" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  ENCRYPTED WITH (</text>
  <text x="476" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    COLUMN_ENCRYPTION_KEY = cek1,</text>
  <text x="476" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    ENCRYPTION_TYPE = DETERMINISTIC)</text>
</svg>
