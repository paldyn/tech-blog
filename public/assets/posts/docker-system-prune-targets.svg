<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="asp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker system prune 정리 대상</text>

  <!-- docker system prune -->
  <rect x="300" y="72" width="280" height="52" rx="8" fill="#2a1515" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">docker system prune</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">기본: --all 없이</text>

  <!-- Targets -->
  <!-- Stopped containers -->
  <rect x="60" y="162" width="175" height="66" rx="6" fill="#111827" stroke="#e05555" stroke-width="1"/>
  <text x="148" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">중지된 컨테이너</text>
  <text x="148" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Status=Exited</text>
  <text x="148" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">항상 포함</text>

  <!-- Dangling images -->
  <rect x="265" y="162" width="175" height="66" rx="6" fill="#111827" stroke="#e05555" stroke-width="1"/>
  <text x="353" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">댕글링 이미지</text>
  <text x="353" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">태그 없는 &lt;none&gt;:&lt;none&gt;</text>
  <text x="353" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">항상 포함</text>

  <!-- Unused networks -->
  <rect x="470" y="162" width="175" height="66" rx="6" fill="#111827" stroke="#e05555" stroke-width="1"/>
  <text x="558" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">미사용 네트워크</text>
  <text x="558" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">컨테이너 없는 네트워크</text>
  <text x="558" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">항상 포함</text>

  <!-- Build cache -->
  <rect x="675" y="162" width="145" height="66" rx="6" fill="#111827" stroke="#e05555" stroke-width="1"/>
  <text x="748" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">빌드 캐시</text>
  <text x="748" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">BuildKit 캐시</text>
  <text x="748" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">항상 포함</text>

  <!-- Arrows from prune to targets -->
  <path d="M 380 124 L 148 162" stroke="#e05555" stroke-width="1.5" marker-end="url(#asp)"/>
  <path d="M 420 124 L 353 162" stroke="#e05555" stroke-width="1.5" marker-end="url(#asp)"/>
  <path d="M 460 124 L 558 162" stroke="#e05555" stroke-width="1.5" marker-end="url(#asp)"/>
  <path d="M 500 124 L 748 162" stroke="#e05555" stroke-width="1.5" marker-end="url(#asp)"/>

  <!-- --all flag -->
  <rect x="60" y="260" width="760" height="120" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">--all 플래그 추가 시 대상 확장</text>

  <rect x="76" y="296" width="728" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> system prune --all    <tspan fill="#9aa4b8"># + 미사용 이미지 전체 (태그 있는 것 포함)</tspan></text>
  <text x="92" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> system prune --volumes <tspan fill="#9aa4b8"># + 미사용 볼륨 (데이터 삭제 주의)</tspan></text>
  <text x="92" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> system prune -af       <tspan fill="#9aa4b8"># 확인 프롬프트 없이 전부</tspan></text>
</svg>
