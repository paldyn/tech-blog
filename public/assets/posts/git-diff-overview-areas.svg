<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git diff 비교 영역</text>

  <!-- Three areas -->
  <!-- Working Tree -->
  <rect x="60" y="72" width="220" height="100" rx="10" fill="#111827" stroke="#2a3650" stroke-width="2"/>
  <text x="170" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">워킹트리</text>
  <text x="170" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">수정된 파일</text>
  <text x="170" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">(git add 전)</text>

  <!-- Index -->
  <rect x="330" y="72" width="220" height="100" rx="10" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">인덱스</text>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">스테이징 영역</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">(git add 후)</text>

  <!-- HEAD / commits -->
  <rect x="600" y="72" width="220" height="100" rx="10" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">커밋</text>
  <text x="710" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">HEAD / 브랜치</text>
  <text x="710" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">(git commit 후)</text>

  <!-- Arrow 1: Working Tree → Index (git diff) -->
  <polygon points="280,118 318,111 318,125" fill="#7ec8e3"/>
  <line x1="280" y1="118" x2="318" y2="118" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="278" y="128" width="46" height="22" rx="4" fill="#0a0a0a"/>
  <text x="301" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">git diff</text>

  <!-- Arrow 2: Index → HEAD (git diff –staged) -->
  <polygon points="550,118 588,111 588,125" fill="#7777cc"/>
  <line x1="550" y1="118" x2="588" y2="118" stroke="#7777cc" stroke-width="2"/>
  <rect x="527" y="128" width="90" height="22" rx="4" fill="#0a0a0a"/>
  <text x="572" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7777cc" text-anchor="middle">diff --staged</text>

  <!-- Arrow 3: Working Tree → HEAD (git diff HEAD) -->
  <path d="M 170 172 Q 440 230 710 172" stroke="#55c555" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="706,172 722,165 720,180" fill="#55c555"/>
  <rect x="380" y="210" width="102" height="22" rx="4" fill="#0a0a0a"/>
  <text x="431" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555" text-anchor="middle">git diff HEAD</text>

  <!-- Summary table -->
  <rect x="60" y="260" width="760" height="170" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>

  <!-- Table header -->
  <rect x="60" y="260" width="760" height="34" rx="8" fill="#1a2035"/>
  <text x="190" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">명령</text>
  <text x="490" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">비교 대상</text>
  <text x="740" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">용도</text>

  <line x1="60" y1="294" x2="820" y2="294" stroke="#2a3650" stroke-width="1"/>

  <text x="190" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">git diff</text>
  <text x="490" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">워킹트리 vs 인덱스</text>
  <text x="740" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">add 전 변경 확인</text>

  <line x1="60" y1="326" x2="820" y2="326" stroke="#2a3650" stroke-width="1"/>

  <text x="190" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">git diff --staged</text>
  <text x="490" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">인덱스 vs HEAD</text>
  <text x="740" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">커밋 전 내용 검토</text>

  <line x1="60" y1="358" x2="820" y2="358" stroke="#2a3650" stroke-width="1"/>

  <text x="190" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">git diff HEAD</text>
  <text x="490" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">워킹트리 vs HEAD</text>
  <text x="740" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이번 작업 전체 확인</text>

  <line x1="60" y1="390" x2="820" y2="390" stroke="#2a3650" stroke-width="1"/>

  <text x="190" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">git diff A B</text>
  <text x="490" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">커밋 A vs 커밋 B</text>
  <text x="740" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">브랜치·커밋 간 비교</text>
</svg>
