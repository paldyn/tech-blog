<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">런타임 이미지 구조와 jlink 명령</text>

  <!-- left: command -->
  <rect x="60" y="78" width="370" height="230" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="104" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 런타임 이미지 생성</text>
  <text x="76" y="126" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">jlink \</text>
  <text x="76" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  --module-path mods:$JDK/jmods \</text>
  <text x="76" y="170" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  --add-modules com.app \</text>
  <text x="76" y="192" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  --launcher run=com.app/com.app.Main \</text>
  <text x="76" y="214" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  --compress=2 --strip-debug \</text>
  <text x="76" y="236" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  --output dist</text>
  <text x="76" y="266" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 실행</text>
  <text x="76" y="288" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">dist/bin/run</text>

  <!-- right: layout tree -->
  <rect x="470" y="78" width="350" height="230" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="490" y="106" font-size="14" font-weight="600" fill="#e8e8e8">dist/</text>
  <text x="510" y="134" font-size="13" fill="#7ec8e3">bin/</text>
  <text x="540" y="158" font-size="13" fill="#888">run</text>
  <text x="680" y="158" font-size="12" fill="#9aa4b8">← --launcher</text>
  <text x="540" y="180" font-size="13" fill="#888">java</text>
  <text x="510" y="208" font-size="13" fill="#7ec8e3">lib/</text>
  <text x="540" y="232" font-size="13" fill="#888">modules</text>
  <text x="680" y="232" font-size="12" fill="#9aa4b8">← 모듈 묶음</text>
  <text x="510" y="260" font-size="13" fill="#7ec8e3">conf/</text>
  <text x="510" y="288" font-size="13" fill="#7ec8e3">release</text>
  <text x="680" y="288" font-size="12" fill="#9aa4b8">← 버전 정보</text>

  <text x="440" y="338" font-size="13" fill="#9aa4b8" text-anchor="middle">이미지는 bin/java를 포함한 완전한 실행 환경 — 대상 머신에 JDK가 없어도 동작</text>
</svg>
