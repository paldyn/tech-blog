<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 430"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python 예외 계층 구조</text>

  <!-- BaseException (root) -->
  <rect x="310" y="65" width="260" height="44" rx="8" fill="#0c1628" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="93" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">BaseException</text>

  <!-- Vertical line from BaseException -->
  <line x1="440" y1="109" x2="440" y2="135" stroke="#3a4a6e" stroke-width="2"/>
  <!-- Horizontal split line -->
  <line x1="135" y1="135" x2="745" y2="135" stroke="#3a4a6e" stroke-width="2"/>

  <!-- Branch lines down to level-2 boxes -->
  <line x1="135" y1="135" x2="135" y2="155" stroke="#3a4a6e" stroke-width="2"/>
  <line x1="345" y1="135" x2="345" y2="155" stroke="#3a4a6e" stroke-width="2"/>
  <line x1="555" y1="135" x2="555" y2="155" stroke="#3a4a6e" stroke-width="2"/>
  <line x1="745" y1="135" x2="745" y2="155" stroke="#3a4a6e" stroke-width="2"/>

  <!-- SystemExit -->
  <rect x="60" y="155" width="150" height="44" rx="6" fill="#1a0c0c" stroke="#e05555" stroke-width="1.5"/>
  <text x="135" y="183" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">SystemExit</text>

  <!-- KeyboardInterrupt -->
  <rect x="255" y="155" width="180" height="44" rx="6" fill="#1a0c0c" stroke="#e05555" stroke-width="1.5"/>
  <text x="345" y="183" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">KeyboardInterrupt</text>

  <!-- GeneratorExit -->
  <rect x="470" y="155" width="170" height="44" rx="6" fill="#1a0c0c" stroke="#e05555" stroke-width="1.5"/>
  <text x="555" y="183" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">GeneratorExit</text>

  <!-- Exception (main) -->
  <rect x="660" y="155" width="170" height="44" rx="6" fill="#0c1c0a" stroke="#55c555" stroke-width="2"/>
  <text x="745" y="183" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">Exception</text>

  <!-- Line from Exception down -->
  <line x1="745" y1="199" x2="745" y2="225" stroke="#3a4a6e" stroke-width="2"/>
  <!-- Horizontal line under Exception -->
  <line x1="85" y1="225" x2="795" y2="225" stroke="#2a3d5e" stroke-width="1.5"/>

  <!-- 6 Exception subclasses in 2 rows of 3 -->
  <!-- Drop lines -->
  <line x1="185" y1="225" x2="185" y2="245" stroke="#2a3d5e" stroke-width="1.5"/>
  <line x1="385" y1="225" x2="385" y2="245" stroke="#2a3d5e" stroke-width="1.5"/>
  <line x1="585" y1="225" x2="585" y2="245" stroke="#2a3d5e" stroke-width="1.5"/>
  <line x1="185" y1="315" x2="185" y2="335" stroke="#2a3d5e" stroke-width="1.5"/>
  <line x1="385" y1="315" x2="385" y2="335" stroke="#2a3d5e" stroke-width="1.5"/>
  <line x1="585" y1="315" x2="585" y2="335" stroke="#2a3d5e" stroke-width="1.5"/>

  <!-- Row 1: ValueError, TypeError, KeyError -->
  <rect x="100" y="245" width="170" height="40" rx="6" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="185" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">ValueError</text>

  <rect x="300" y="245" width="170" height="40" rx="6" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="385" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">TypeError</text>

  <rect x="500" y="245" width="170" height="40" rx="6" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="585" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">KeyError / IndexError</text>

  <!-- Row 2: AttributeError, OSError, RuntimeError -->
  <rect x="100" y="335" width="170" height="40" rx="6" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="185" y="360" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">AttributeError</text>

  <rect x="300" y="335" width="170" height="40" rx="6" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="385" y="360" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">OSError</text>

  <rect x="500" y="335" width="170" height="40" rx="6" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="585" y="360" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">RuntimeError</text>

  <!-- Horizontal lines connecting rows -->
  <line x1="85" y1="315" x2="695" y2="315" stroke="#2a3d5e" stroke-width="1.5"/>

  <!-- "..." more exceptions hint -->
  <text x="700" y="295" font-size="20" fill="#3a4a6e">···</text>
  <text x="700" y="365" font-size="11" fill="#888">외 수십 가지</text>

  <!-- Legend bottom -->
  <rect x="55" y="392" width="770" height="28" rx="6" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="411" text-anchor="middle" font-size="11" fill="#888">일반적으로 catch해야 하는 대상은 Exception과 그 서브클래스 | SystemExit·KeyboardInterrupt는 직접 잡지 않는 것이 원칙</text>
</svg>
