<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect x="0" y="0" width="880" height="470" rx="12" fill="#0a0a0a"/>

  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="60" y="56" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HTTP/2 스트림 생명주기 상태 머신</text>

  <!-- idle -->
  <rect x="60" y="110" width="180" height="72" fill="#000000" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="150" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="17" font-weight="600" fill="#7777cc" text-anchor="middle">idle</text>
  <text x="150" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">초기 상태</text>

  <!-- open -->
  <rect x="350" y="110" width="180" height="72" fill="#000000" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="17" font-weight="600" fill="#55c555" text-anchor="middle">open</text>
  <text x="440" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">양방향 DATA 송수신</text>

  <!-- half-closed (local) -->
  <rect x="640" y="70" width="180" height="72" fill="#000000" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="730" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">half-closed</text>
  <text x="730" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">(local)</text>

  <!-- half-closed (remote) -->
  <rect x="640" y="186" width="180" height="72" fill="#000000" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="730" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">half-closed</text>
  <text x="730" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">(remote)</text>

  <!-- closed -->
  <rect x="350" y="320" width="180" height="72" fill="#000000" stroke="#e05555" stroke-width="1.5" rx="6"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="17" font-weight="600" fill="#e05555" text-anchor="middle">closed</text>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">종료 상태</text>

  <!-- idle -> open -->
  <line x1="240" y1="146" x2="350" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="295" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">HEADERS</text>

  <!-- open -> half-closed local (send END_STREAM) -->
  <line x1="530" y1="132" x2="640" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="588" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">send ES</text>

  <!-- open -> half-closed remote (recv END_STREAM) -->
  <line x1="530" y1="160" x2="640" y2="208" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="588" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">recv ES</text>

  <!-- half-closed local -> closed -->
  <path d="M 730 142 L 730 290 L 530 332" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="635" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">recv ES</text>

  <!-- half-closed remote -> closed -->
  <path d="M 730 258 L 730 300 L 530 348" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="640" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">send ES</text>

  <!-- open -> closed via RST_STREAM (red dashed) -->
  <path d="M 410 182 L 410 320" fill="none" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#arrRed)"/>
  <text x="330" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">RST_STREAM</text>

  <!-- footer note -->
  <text x="60" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">ES = END_STREAM 플래그. RST_STREAM은 어느 상태에서든 곧장 closed로 보낸다. closed된 ID는 재사용되지 않는다.</text>
</svg>
