<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python 구현체 비교</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">CPython · PyPy · Jython · IronPython</text>

  <!-- Table header -->
  <rect x="60" y="84" width="760" height="36" rx="6" fill="#1a1a2e"/>
  <text x="160" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#888">구현체</text>
  <text x="320" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#888">구현 언어</text>
  <text x="470" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#888">JIT</text>
  <text x="600" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#888">속도</text>
  <text x="750" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#888">주요 특징</text>
  <line x1="240" y1="84" x2="240" y2="120" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="84" x2="400" y2="120" stroke="#333" stroke-width="1"/>
  <line x1="530" y1="84" x2="530" y2="120" stroke="#333" stroke-width="1"/>
  <line x1="670" y1="84" x2="670" y2="120" stroke="#333" stroke-width="1"/>

  <!-- CPython -->
  <rect x="60" y="120" width="760" height="60" rx="0" fill="#0f1820" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">CPython</text>
  <text x="160" y="163" text-anchor="middle" font-size="10" fill="#666">표준 · 공식</text>
  <text x="320" y="152" text-anchor="middle" font-size="12" fill="#aaa">C</text>
  <text x="470" y="148" text-anchor="middle" font-size="12" fill="#e05555">없음</text>
  <text x="470" y="165" text-anchor="middle" font-size="10" fill="#666">3.13+ 실험적</text>
  <text x="600" y="152" text-anchor="middle" font-size="12" fill="#888">기준</text>
  <text x="750" y="148" text-anchor="middle" font-size="11" fill="#aaa">표준 참조 구현체</text>
  <text x="750" y="165" text-anchor="middle" font-size="10" fill="#666">pip, 대부분 라이브러리 호환</text>
  <line x1="240" y1="120" x2="240" y2="180" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="120" x2="400" y2="180" stroke="#333" stroke-width="1"/>
  <line x1="530" y1="120" x2="530" y2="180" stroke="#333" stroke-width="1"/>
  <line x1="670" y1="120" x2="670" y2="180" stroke="#333" stroke-width="1"/>

  <!-- PyPy -->
  <rect x="60" y="180" width="760" height="60" rx="0" fill="#111" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">PyPy</text>
  <text x="160" y="223" text-anchor="middle" font-size="10" fill="#666">고성능</text>
  <text x="320" y="212" text-anchor="middle" font-size="12" fill="#aaa">RPython</text>
  <text x="470" y="208" text-anchor="middle" font-size="12" fill="#55c555">있음</text>
  <text x="470" y="225" text-anchor="middle" font-size="10" fill="#666">강력한 JIT</text>
  <text x="600" y="208" text-anchor="middle" font-size="12" fill="#55c555">최대 10배↑</text>
  <text x="750" y="208" text-anchor="middle" font-size="11" fill="#aaa">순수 Python 코드 최적화</text>
  <text x="750" y="225" text-anchor="middle" font-size="10" fill="#666">C 확장 호환성 일부 제한</text>
  <line x1="240" y1="180" x2="240" y2="240" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="180" x2="400" y2="240" stroke="#333" stroke-width="1"/>
  <line x1="530" y1="180" x2="530" y2="240" stroke="#333" stroke-width="1"/>
  <line x1="670" y1="180" x2="670" y2="240" stroke="#333" stroke-width="1"/>

