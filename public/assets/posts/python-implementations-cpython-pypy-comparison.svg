  <rect x="60" y="240" width="760" height="60" rx="0" fill="#0f1418" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">Jython</text>
  <text x="160" y="283" text-anchor="middle" font-size="10" fill="#666">JVM 통합</text>
  <text x="320" y="272" text-anchor="middle" font-size="12" fill="#aaa">Java</text>
  <text x="470" y="272" text-anchor="middle" font-size="12" fill="#888">JVM JIT</text>
  <text x="600" y="272" text-anchor="middle" font-size="12" fill="#aaa">보통</text>
  <text x="750" y="268" text-anchor="middle" font-size="11" fill="#aaa">Java 라이브러리 직접 사용</text>
  <text x="750" y="285" text-anchor="middle" font-size="10" fill="#666">JVM 생태계와 완전 통합</text>
  <line x1="240" y1="240" x2="240" y2="300" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="240" x2="400" y2="300" stroke="#333" stroke-width="1"/>
  <line x1="530" y1="240" x2="530" y2="300" stroke="#333" stroke-width="1"/>
  <line x1="670" y1="240" x2="670" y2="300" stroke="#333" stroke-width="1"/>

  <!-- IronPython -->
  <rect x="60" y="300" width="760" height="60" rx="0" fill="#111" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#ce9178">IronPython</text>
  <text x="160" y="343" text-anchor="middle" font-size="10" fill="#666">.NET 통합</text>
  <text x="320" y="332" text-anchor="middle" font-size="12" fill="#aaa">C#</text>
  <text x="470" y="328" text-anchor="middle" font-size="12" fill="#888">.NET JIT</text>
  <text x="600" y="332" text-anchor="middle" font-size="12" fill="#aaa">보통</text>
  <text x="750" y="328" text-anchor="middle" font-size="11" fill="#aaa">.NET 라이브러리 직접 사용</text>
  <text x="750" y="345" text-anchor="middle" font-size="10" fill="#666">C# · F#과 혼용 가능</text>
  <line x1="240" y1="300" x2="240" y2="360" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="300" x2="400" y2="360" stroke="#333" stroke-width="1"/>
  <line x1="530" y1="300" x2="530" y2="360" stroke="#333" stroke-width="1"/>
  <line x1="670" y1="300" x2="670" y2="360" stroke="#333" stroke-width="1"/>

  <!-- Recommendation -->
  <rect x="60" y="376" width="760" height="64" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">권장 선택</text>
  <text x="440" y="422" text-anchor="middle" font-size="12" fill="#aaa">일반 개발: CPython   |   성능 중요: PyPy   |   JVM 통합: Jython   |   .NET 통합: IronPython</text>
</svg>
