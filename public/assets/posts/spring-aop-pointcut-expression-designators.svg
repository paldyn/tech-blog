<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Pointcut 지시자(Designator) 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">각 지시자의 매칭 기준과 파라미터 바인딩 방법</text>

  <!-- table header -->
  <rect x="60" y="88" width="760" height="36" rx="6" fill="#1a1228"/>
  <text x="100" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">지시자</text>
  <text x="230" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">매칭 기준</text>
  <text x="500" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">예시 / 특이사항</text>

  <!-- row 1: execution -->
  <rect x="60" y="124" width="760" height="54" rx="0" fill="#111"/>
  <line x1="60" y1="178" x2="820" y2="178" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">execution</text>
  <text x="230" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">메서드 실행 시그니처</text>
  <text x="230" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가장 범용적. 수식어·반환타입·클래스·메서드·파라미터 지정</text>
  <text x="500" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">execution(* get*(..))</text>

  <!-- row 2: within -->
  <rect x="60" y="178" width="760" height="54" rx="0" fill="#0f0f0f"/>
  <line x1="60" y1="232" x2="820" y2="232" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">within</text>
  <text x="230" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">특정 타입(또는 패키지) 내 모든 메서드</text>
  <text x="230" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">execution보다 간결. 클래스 단위 일괄 적용에 유리</text>
  <text x="500" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">within(com.example.service.*)</text>

  <!-- row 3: @annotation -->
  <rect x="60" y="232" width="760" height="54" rx="0" fill="#111"/>
  <line x1="60" y1="286" x2="820" y2="286" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@annotation</text>
  <text x="230" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">특정 어노테이션이 붙은 메서드</text>
  <text x="230" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">어노테이션 인스턴스를 Advice 파라미터로 바인딩 가능</text>
  <text x="500" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@annotation(Transactional)</text>

  <!-- row 4: @within -->
  <rect x="60" y="286" width="760" height="54" rx="0" fill="#0f0f0f"/>
  <line x1="60" y1="340" x2="820" y2="340" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="307" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@within</text>
  <text x="230" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">특정 어노테이션이 붙은 클래스의 모든 메서드</text>
  <text x="230" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">within의 어노테이션 버전. 클래스 레벨 어노테이션 매칭</text>
  <text x="500" y="307" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">@within(Service)</text>

  <!-- row 5: args -->
  <rect x="60" y="340" width="760" height="54" rx="0" fill="#111"/>
  <line x1="60" y1="394" x2="820" y2="394" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="361" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">args</text>
  <text x="230" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">런타임에 특정 타입 인자를 받는 메서드</text>
  <text x="230" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인자 객체를 Advice 파라미터로 바인딩할 때 핵심</text>
  <text x="500" y="361" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">args(id, ..)  → id 바인딩</text>

  <!-- row 6: bean -->
  <rect x="60" y="394" width="760" height="54" rx="0" fill="#0f0f0f"/>
  <line x1="60" y1="448" x2="820" y2="448" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="415" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">bean</text>
  <text x="230" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">빈 이름 패턴으로 매칭 (Spring AOP 전용)</text>
  <text x="230" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">AspectJ에는 없는 Spring 전용 지시자. 빈 이름 와일드카드 사용 가능</text>
  <text x="500" y="415" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">bean(*Service)</text>

  <!-- table border -->
  <rect x="60" y="88" width="760" height="360" rx="6" fill="none" stroke="#3a4a6e" stroke-width="1"/>

  <!-- col dividers -->
  <line x1="220" y1="88" x2="220" y2="448" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="88" x2="490" y2="448" stroke="#3a4a6e" stroke-width="1"/>

  <!-- footer -->
</svg>
