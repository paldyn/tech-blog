<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-v" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Service 타입 4가지 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">ClusterIP · NodePort · LoadBalancer · ExternalName — 트래픽 흐름 비교</text>

  <!-- ===== ClusterIP ===== -->
  <rect x="40" y="92" width="380" height="200" rx="8" fill="#0d0d1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">ClusterIP (기본값)</text>
  <text x="60" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클러스터 내부 전용 — 외부 접근 불가</text>

  <!-- Pod inside cluster -->
  <rect x="60" y="152" width="80" height="40" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="100" y="171" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Pod A</text>
  <text x="100" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">app:myapp</text>

  <line x1="140" y1="172" x2="195" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ClusterIP Service box -->
  <rect x="196" y="148" width="120" height="48" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="256" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">ClusterIP</text>
  <text x="256" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">10.96.0.1:80</text>

  <line x1="316" y1="172" x2="355" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Target pods -->
  <rect x="356" y="152" width="50" height="34" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="381" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Pod</text>

  <!-- External blocked -->
  <rect x="60" y="208" width="120" height="36" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="120" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">외부 접근 차단</text>

  <line x1="180" y1="226" x2="193" y2="226" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="200" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">✕</text>
  <text x="60" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">용도: 마이크로서비스 내부 통신</text>

  <!-- ===== NodePort ===== -->
  <rect x="460" y="92" width="380" height="200" rx="8" fill="#0d1a0d" stroke="#333" stroke-width="1"/>
  <text x="480" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">NodePort</text>
  <text x="480" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">노드 IP:포트(30000-32767)로 외부 접근</text>

  <!-- External client -->
  <rect x="480" y="150" width="70" height="36" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="515" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">외부</text>
  <text x="515" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">클라이언트</text>

  <line x1="550" y1="168" x2="578" y2="168" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Node -->
  <rect x="579" y="142" width="100" height="48" rx="6" fill="#111a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="629" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">Node</text>
  <text x="629" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">:30080</text>

  <line x1="679" y1="168" x2="707" y2="168" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="708" y="152" width="50" height="34" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="733" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Pod</text>

  <text x="480" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">NodeIP:NodePort → ClusterIP → Pod</text>
  <text x="480" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">용도: 개발/테스트 환경, 단순 외부 노출</text>

  <!-- ===== LoadBalancer ===== -->
  <rect x="40" y="312" width="380" height="210" rx="8" fill="#0d0d1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">LoadBalancer</text>
  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클라우드 LB → NodePort → ClusterIP</text>

  <rect x="60" y="370" width="70" height="36" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="95" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">외부</text>
  <text x="95" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">클라이언트</text>

  <line x1="130" y1="388" x2="157" y2="388" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-v)"/>

  <rect x="158" y="364" width="90" height="48" rx="6" fill="#13103a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="203" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7777cc">Cloud LB</text>
  <text x="203" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">External IP</text>

  <line x1="248" y1="388" x2="275" y2="388" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-v)"/>

  <rect x="276" y="370" width="70" height="36" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="311" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Node</text>
  <text x="311" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">:NodePort</text>

  <line x1="346" y1="388" x2="370" y2="388" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-v)"/>

  <rect x="371" y="374" width="36" height="28" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="389" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">Pod</text>

  <text x="60" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라우드 환경(AWS/GCP/Azure) 전용</text>
  <text x="60" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">용도: 프로덕션 서비스 외부 노출</text>

  <!-- ===== ExternalName ===== -->
  <rect x="460" y="312" width="380" height="210" rx="8" fill="#1a0d0a" stroke="#333" stroke-width="1"/>
  <text x="480" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">ExternalName</text>
  <text x="480" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CNAME DNS 별칭 — 외부 서비스 매핑</text>

  <rect x="480" y="370" width="80" height="36" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="520" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Pod</text>
  <text x="520" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">내부</text>

  <line x1="560" y1="388" x2="587" y2="388" stroke="#e05555" stroke-width="2" marker-end="url(#arr-o)"/>

  <rect x="588" y="364" width="110" height="48" rx="6" fill="#2a1008" stroke="#e05555" stroke-width="1.5"/>
  <text x="643" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#e05555">ExternalName</text>
  <text x="643" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">CNAME</text>

  <line x1="698" y1="388" x2="725" y2="388" stroke="#e05555" stroke-width="2" marker-end="url(#arr-o)"/>

  <rect x="726" y="370" width="90" height="36" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="771" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">외부 DNS</text>
  <text x="771" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">db.example.com</text>

  <text x="480" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CoreDNS가 CNAME으로 응답 — IP 없음</text>
  <text x="480" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">용도: 외부 DB/SaaS를 K8s 내부 이름으로 참조</text>
</svg>
