<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" fill="#ffffff">  u: </tspan><tspan font-weight="600" fill="#7ec8e3">string</tspan><tspan fill="#ffffff">, g: (x: </tspan><tspan font-weight="600" fill="#7ec8e3">unknown</tspan><tspan fill="#ffffff">)=&gt;x </tspan><tspan font-weight="600" fill="#7ec8e3">is</tspan><tspan fill="#ffffff"> T</tspan></text>
