<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> r = </tspan><tspan font-weight="600" fill="#7ec8e3">await</tspan><tspan fill="#ffffff"> fetch(u)</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> d = </tspan><tspan font-weight="600" fill="#7ec8e3">await</tspan><tspan fill="#ffffff"> r.json()</tspan></text>
