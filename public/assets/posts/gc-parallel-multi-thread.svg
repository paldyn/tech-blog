<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Parallel GC — 여러 GC 스레드가 STW 구간을 나눠 처리</text>

  <!-- STW band -->
  <rect x="380" y="92" width="120" height="266" fill="#e05555" fill-opacity="0.12" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">STW pause (짧음)</text>

  <!-- App thread bars -->
  <text x="120" y="124" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">App T1</text>
  <rect x="130" y="110" width="250" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="500" y="110" width="300" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>

  <text x="120" y="158" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">App T2</text>
  <rect x="130" y="144" width="250" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="500" y="144" width="300" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>

  <text x="120" y="192" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">App T3</text>
  <rect x="130" y="178" width="250" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="500" y="178" width="300" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>

  <!-- GC thread bars (4 parallel lanes) -->
  <text x="120" y="234" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">GC T1</text>
  <rect x="380" y="220" width="120" height="18" rx="4" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>

  <text x="120" y="264" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">GC T2</text>
  <rect x="380" y="250" width="120" height="18" rx="4" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>

  <text x="120" y="294" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">GC T3</text>
  <rect x="380" y="280" width="120" height="18" rx="4" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>

  <text x="120" y="324" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">GC T4</text>
  <rect x="380" y="310" width="120" height="18" rx="4" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>

  <!-- Phase labels -->
  <text x="255" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">애플리케이션 실행</text>
  <text x="440" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">전 스레드 정지 · GC 병렬 작업</text>
  <text x="650" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">재개</text>

  <!-- Comparison note boxes -->
  <rect x="60" y="392" width="360" height="84" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">Serial GC — GC 스레드 1개</text>
  <text x="240" y="444" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">같은 양의 작업을 혼자 처리</text>
  <text x="240" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ STW 구간이 길어짐</text>

  <rect x="460" y="392" width="360" height="84" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Parallel GC — GC 스레드 N개</text>
  <text x="640" y="444" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">작업을 여러 코어로 분담</text>
  <text x="640" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ 같은 작업, 더 짧은 STW</text>
</svg>
