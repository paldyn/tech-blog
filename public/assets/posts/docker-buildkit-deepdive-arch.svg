<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BuildKit 아키텍처</text>

  <!-- Docker CLI -->
  <rect x="60" y="75" width="160" height="60" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Docker CLI</text>
  <text x="140" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">docker build</text>

  <!-- Arrow -->
  <line x1="220" y1="105" x2="278" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Frontend box -->
  <rect x="280" y="75" width="180" height="60" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="370" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Frontend</text>
  <text x="370" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Dockerfile 파싱</text>

  <!-- Arrow -->
  <line x1="460" y1="105" x2="518" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- LLB Solver -->
  <rect x="520" y="75" width="180" height="60" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="610" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">LLB Solver</text>
  <text x="610" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">병렬 의존성 그래프</text>

  <!-- Arrow -->
  <line x1="700" y1="105" x2="758" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Executor -->
  <rect x="760" y="75" width="60" height="60" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">실행</text>
  <text x="790" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">runc</text>

  <!-- Key features -->
  <rect x="60" y="170" width="380" height="150" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">BuildKit 핵심 기능</text>
  <text x="90" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">병렬 빌드 — 독립 단계를 동시 실행</text>
  <text x="90" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">캐시 마운트 — 패키지 캐시 이미지 외부 유지</text>
  <text x="90" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">시크릿 마운트 — 이미지에 흔적 없이 사용</text>
  <text x="90" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">SSH 포워딩 — 에이전트 키 안전 전달</text>
  <text x="90" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">멀티 플랫폼 — 단일 명령으로 amd64+arm64</text>

  <!-- Code: enable buildkit -->
  <rect x="60" y="350" width="360" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># BuildKit 활성화 방법</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 1. 환경변수 (일시)</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">DOCKER_BUILDKIT</text>
  <text x="210" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">=1 docker build .</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 2. daemon.json (영구)</text>
  <text x="76" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">{"features":{"buildkit": true}}</text>
  <text x="76" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># Docker 23+ 기본 활성화</text>

  <!-- Secret/SSH code -->
  <rect x="460" y="170" width="360" height="310" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 시크릿 마운트 (이미지에 비밀번호 미포함)</text>
  <text x="476" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Dockerfile</text>
  <text x="476" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">RUN</text>
  <text x="510" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve"> --mount=type=secret,id=npmrc \</text>
  <text x="476" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    cp /run/secrets/npmrc ~/.npmrc \</text>
  <text x="476" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    &amp;&amp; npm install</text>
  <text x="476" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 빌드 시</text>
  <text x="476" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">docker build \</text>
  <text x="476" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --secret id=npmrc,src=$HOME/.npmrc .</text>
  <text x="476" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># SSH 포워딩</text>
  <text x="476" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">RUN</text>
  <text x="510" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve"> --mount=type=ssh \</text>
  <text x="476" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    git clone git@github.com:org/repo</text>
  <text x="476" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># docker build --ssh default .</text>
  <text x="476" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># SSH 키가 이미지에 포함되지 않음</text>
  <text x="476" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># eval $(ssh-agent) 먼저 실행 필요</text>
</svg>
