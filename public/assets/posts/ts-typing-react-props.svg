<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrRe" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">Props 타입이 JSX 사용처까지 흐른다</text>

  <rect x="50" y="92" width="240" height="100" rx="8" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="70" y="120" font-size="13" font-weight="600" fill="#e8e8e8">Props 타입</text>
  <text x="70" y="146" font-size="12" fill="#888">interface ButtonProps {</text>
  <text x="86" y="166" font-size="12" fill="#888">label: string;</text>
  <text x="86" y="184" font-size="12" fill="#888">onClick: () =&gt; void; }</text>

  <rect x="340" y="92" width="240" height="100" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="360" y="120" font-size="13" font-weight="600" fill="#e8e8e8">컴포넌트</text>
  <text x="360" y="146" font-size="12" fill="#888">function Button(</text>
  <text x="376" y="166" font-size="12" fill="#888">props: ButtonProps</text>
  <text x="360" y="184" font-size="12" fill="#888">) { ... }</text>

  <rect x="630" y="92" width="200" height="100" rx="8" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="120" font-size="13" font-weight="600" fill="#e8e8e8">JSX 사용</text>
  <text x="650" y="146" font-size="12" fill="#888">&lt;Button</text>
  <text x="650" y="166" font-size="12" fill="#888">  label="OK"</text>
  <text x="650" y="184" font-size="12" fill="#55c555">  onClick={fn} /&gt;</text>

  <line x1="290" y1="142" x2="340" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrRe)"/>
  <line x1="580" y1="142" x2="630" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrRe)"/>

  <text x="60" y="240" font-size="13" fill="#9aa4b8">props에 타입을 주면 빠뜨린 속성·잘못된 타입을 JSX 작성 시점에 잡는다.</text>
  <text x="60" y="266" font-size="13" fill="#9aa4b8">예: label 누락 → "필수 속성 누락" 에러, onClick에 string → 타입 불일치.</text>
</svg>
