<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">전파 제어 — 코드 패턴</text>

  <!-- Left panel: preventDefault -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">preventDefault() 예시</text>

  <rect x="60" y="96" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 링크 기본 동작 차단</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">link.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, (e) =&gt; {</tspan></text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  e.<tspan fill="#7ec8e3">preventDefault</tspan><tspan fill="#e8e8e8">();</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // 페이지 이동 없이 처리</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">handleRoute</tspan><tspan fill="#e8e8e8">(e.currentTarget.href);</tspan></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// cancelable 확인 후 호출 권장</text>

  <!-- Right panel: stopPropagation -->
  <text x="460" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">stopPropagation() 예시</text>

  <rect x="460" y="96" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 모달 외부 클릭 감지 패턴</text>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">modal.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, e =&gt; {</tspan></text>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  e.<tspan fill="#7ec8e3">stopPropagation</tspan><tspan fill="#e8e8e8">();</tspan></text>
  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // document 리스너에 전달 안 됨</text>
  <text x="476" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
  <text x="476" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">document.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, () =&gt; {</tspan></text>
  <text x="476" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">closeModal</tspan><tspan fill="#e8e8e8">(); });</tspan></text>

  <!-- Bottom panel: stopImmediatePropagation + returnValue -->
  <text x="60" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">stopImmediatePropagation() &amp; event.returnValue</text>

  <rect x="60" y="284" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 같은 요소의 다른 리스너도 차단</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">btn.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, e =&gt; {</tspan></text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  e.<tspan fill="#7ec8e3">stopImmediatePropagation</tspan><tspan fill="#e8e8e8">();</tspan></text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 두 번째 리스너는 실행 안 됨</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">btn.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, () =&gt; {</tspan></text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // ← 여기 도달 불가</text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>

  <!-- Right bottom: cancelable check -->
  <text x="460" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">cancelable 확인 패턴</text>

  <rect x="460" y="284" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// cancelable=false면 호출해도 무시</text>
  <text x="476" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function <tspan fill="#ffffff">safePrevent(e) {</tspan></text>
  <text x="476" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  if <tspan fill="#ffffff">(e.cancelable) {</tspan></text>
  <text x="476" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    e.<tspan fill="#7ec8e3">preventDefault</tspan><tspan fill="#e8e8e8">();</tspan></text>
  <text x="476" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="476" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="476" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// passive:true 리스너에서는</text>
  <text x="476" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// preventDefault() 경고 발생</text>
</svg>
