<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-cyan" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-red2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">객체의 나이 먹기와 승격(Promotion)</text>

  <!-- Eden -->
  <rect x="60" y="90" width="180" height="120" rx="6" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Eden</text>
  <circle cx="110" cy="150" r="12" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <circle cx="150" cy="150" r="12" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <circle cx="190" cy="150" r="12" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <circle cx="130" cy="182" r="12" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <circle cx="170" cy="182" r="12" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">① new 로 할당</text>

  <!-- Survivor (From/To) -->
  <rect x="330" y="90" width="160" height="120" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="410" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Survivor</text>
  <text x="410" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">From ⇄ To</text>
  <circle cx="375" cy="170" r="13" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="375" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">age 1</text>
  <circle cx="445" cy="170" r="13" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="445" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">age 2</text>
  <text x="410" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">② 생존 시 복사 + 나이 +1</text>

  <!-- Old -->
  <rect x="630" y="90" width="190" height="120" rx="6" fill="#0e0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="725" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Old</text>
  <circle cx="690" cy="160" r="13" fill="#0e0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <circle cx="725" cy="160" r="13" fill="#0e0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <circle cx="760" cy="160" r="13" fill="#0e0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="725" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">③ 임계 나이 도달 → 승격</text>

  <!-- Arrows between regions -->
  <line x1="240" y1="150" x2="328" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-cyan)"/>
  <text x="284" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">Minor GC</text>

  <line x1="490" y1="150" x2="628" y2="150" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="559" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">promote</text>

  <!-- Self-copy loop on survivor -->
  <path d="M 360 92 C 360 60, 460 60, 460 92" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <text x="410" y="56" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">S0 ⇄ S1 복사 반복</text>

  <!-- Threshold note box -->
  <rect x="60" y="262" width="760" height="46" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">나이 ≥ -XX:MaxTenuringThreshold (HotSpot 기본 15) 이면 다음 Minor GC 때 Old 로 승격된다</text>

  <!-- Card Table / Remembered Set -->
  <text x="440" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">교차 세대 참조 추적 — Card Table / Remembered Set</text>

  <rect x="120" y="368" width="280" height="120" rx="6" fill="#0e0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="260" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">Old</text>
  <circle cx="260" cy="430" r="16" fill="#0e0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="260" y="434" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">O</text>

  <rect x="480" y="368" width="280" height="120" rx="6" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="620" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Young</text>
  <circle cx="620" cy="430" r="16" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="434" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Y</text>

  <!-- old -> young ref -->
  <line x1="278" y1="430" x2="602" y2="430" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red2)"/>
  <text x="440" y="418" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">old → young 참조</text>
  <text x="440" y="460" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">write barrier 가 이 참조를 카드에 기록 →</text>
  <text x="440" y="478" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Minor GC 가 Old 전체를 스캔하지 않아도 됨</text>
</svg>
