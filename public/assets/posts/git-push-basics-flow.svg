<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
  <marker id="arr-7777cc" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto"><path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/></marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git push — 로컬 커밋을 원격으로</text>
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#888">로컬 브랜치의 커밋을 원격 저장소에 업로드</text>

  <!-- Local repo box -->
  <rect x="60" y="108" width="300" height="240" rx="8" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="210" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">로컬 저장소</text>

  <!-- Commit chain in local -->
  <circle cx="100" cy="175" r="14" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">A</text>
  <line x1="114" y1="175" x2="146" y2="175" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="160" cy="175" r="14" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">B</text>
  <line x1="174" y1="175" x2="206" y2="175" stroke="#55c555" stroke-width="2"/>
  <circle cx="220" cy="175" r="14" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="220" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">C</text>
  <text x="220" y="203" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">새 커밋</text>

  <!-- Branch label -->
  <rect x="80" y="218" width="240" height="28" rx="4" fill="#0a1a0a" stroke="#1a3a1a"/>
  <text x="200" y="236" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">HEAD → main</text>

  <!-- Tracking branch -->
  <rect x="80" y="260" width="240" height="28" rx="4" fill="#0d1117" stroke="#2a3a52"/>
  <text x="200" y="278" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">origin/main → B</text>

  <!-- Remote repo box -->
  <rect x="520" y="108" width="300" height="240" rx="8" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="670" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">원격 저장소</text>

  <!-- Commits in remote (before push: A-B) -->
  <circle cx="570" cy="175" r="14" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="570" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">A</text>
  <line x1="584" y1="175" x2="616" y2="175" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="630" cy="175" r="14" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="630" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">B</text>
  <text x="630" y="203" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">push 전</text>

  <!-- After push: A-B-C -->
  <circle cx="570" cy="270" r="14" fill="#1a2a3a" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">A</text>
  <line x1="584" y1="270" x2="616" y2="270" stroke="#55c555" stroke-width="1.5"/>
  <circle cx="630" cy="270" r="14" fill="#1a2a3a" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">B</text>
  <line x1="644" y1="270" x2="676" y2="270" stroke="#55c555" stroke-width="2"/>
  <circle cx="690" cy="270" r="14" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="690" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">C</text>
  <text x="630" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">push 후</text>

  <!-- Push arrow -->
  <line x1="363" y1="220" x2="522" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-7777cc)"/>
  
  <text x="440" y="202" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">git push</text>

  <!-- Bottom command -->
  <rect x="60" y="375" width="760" height="32" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="397" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">git push </text>
  <text x="157" y="397" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">-u </text>
  <text x="180" y="397" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">origin main</text>
  <text x="285" y="397" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # -u: 업스트림 추적 설정 포함</text>
</svg>
