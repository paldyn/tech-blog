<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Lighthouse vs WebPageTest — 도구 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">각 도구의 강점과 사용 시나리오</text>

  <!-- Lighthouse -->
  <rect x="60" y="96" width="360" height="250" rx="10" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">Lighthouse</text>
  <text x="240" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Chrome 내장 · Google 운영</text>

  <text x="80" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">✅ 개발 중 즉각 피드백</text>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">✅ CI/CD 파이프라인 통합</text>
  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">✅ Performance·SEO·접근성 통합 점검</text>
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">✅ 구체적인 개선 제안 포함</text>
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 로컬 머신 성능에 의존 (재현성 낮음)</text>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 시뮬레이션 기반 (실제 사용자와 다름)</text>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 로그인 필요 페이지 자동화 어려움</text>
  <text x="240" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">DevTools / CLI / PageSpeed Insights</text>

  <!-- WebPageTest -->
  <rect x="460" y="96" width="360" height="250" rx="10" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">WebPageTest</text>
  <text x="640" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">webpagetest.org · 오픈소스</text>

  <text x="480" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">✅ 실제 디바이스·네트워크 조건 테스트</text>
  <text x="480" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">✅ 전 세계 여러 위치에서 측정</text>
  <text x="480" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">✅ 폭포수 차트·filmstrip 시각화</text>
  <text x="480" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">✅ Video 비교 (Before/After)</text>
  <text x="480" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">✅ 스크립트로 인증된 페이지 테스트</text>
  <text x="480" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 무료 플랜은 큐 대기 시간 있음</text>
  <text x="480" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ CI 통합에 API 키 필요</text>
  <text x="640" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">webpagetest.org / self-host 가능</text>

  <!-- Bottom: CI integration -->
  <rect x="60" y="370" width="760" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># GitHub Actions에서 Lighthouse CI 실행</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- <tspan fill="#7ec8e3" font-weight="600">name</tspan>: Lighthouse CI</text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">run</tspan>: npx lhci autorun --config=lighthouserc.js</text>
</svg>
