<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a" rx="12">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PEFT 방법론 비교: Prefix Tuning vs P-Tuning vs LoRA</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">HuggingFace PEFT 라이브러리 PrefixTuningConfig 설정 예시 포함</text>

  <!-- ─── Comparison Table ─── -->
  <rect x="60" y="82" width="760" height="172" rx="8" fill="#0f1117" stroke="#3a4a6e" stroke-width="1.2"/>

  <!-- Header row -->
  <rect x="60" y="82" width="760" height="30" rx="8" fill="#131825"/>
  <line x1="60" y1="112" x2="820" y2="112" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Column separators -->
  <line x1="210" y1="82" x2="210" y2="254" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="400" y1="82" x2="400" y2="254" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="575" y1="82" x2="575" y2="254" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="710" y1="82" x2="710" y2="254" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row separators -->
  <line x1="60" y1="144" x2="820" y2="144" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="178" x2="820" y2="178" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="212" x2="820" y2="212" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Header text -->
  <text x="135" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">방법</text>
  <text x="305" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">위치 / 방식</text>
  <text x="487" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">학습 파라미터 수</text>
  <text x="642" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">추론 오버헤드</text>
  <text x="765" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">적합 태스크</text>

  <!-- Row 1: Prefix Tuning -->
  <text x="135" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">Prefix Tuning</text>
  <text x="135" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Li &amp; Liang 2021</text>
  <text x="305" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">전 레이어 KV</text>
  <text x="487" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">~0.1% (토큰 수에 비례)</text>
  <text x="642" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">있음 (시퀀스 길이 증가)</text>
  <text x="765" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">NLG, 요약, 번역</text>

  <!-- Row 2: P-Tuning v1 -->
  <text x="135" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">P-Tuning v1</text>
  <text x="135" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Liu et al. 2021</text>
  <text x="305" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">입력 레이어만</text>
  <text x="487" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">매우 적음 (&lt;0.1%)</text>
  <text x="642" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">거의 없음</text>
  <text x="765" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">NLU, 분류</text>

  <!-- Row 3: P-Tuning v2 -->
  <text x="135" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">P-Tuning v2</text>
  <text x="135" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Liu et al. 2022</text>
  <text x="305" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">전 레이어 (Prefix와 동일)</text>
  <text x="487" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">~0.1–3%</text>
  <text x="642" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">있음</text>
  <text x="765" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">NER, NLU, QA</text>

  <!-- Row 4: LoRA -->
  <text x="135" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">LoRA</text>
  <text x="135" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Hu et al. 2021</text>
  <text x="305" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">가중치 행렬 (병합 가능)</text>
  <text x="487" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">0.1–1% (rank에 비례)</text>
  <text x="642" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">없음 (병합 후)</text>
  <text x="765" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">범용 (NLG·NLU)</text>

  <!-- ─── Code block ─── -->
  <rect x="60" y="268" width="760" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.2"/>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">## HuggingFace PEFT - PrefixTuningConfig 설정 예시</text>

  <text xml:space="preserve" x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>

  <!-- Line 1 -->
  <text x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">from</tspan><tspan fill="#ffffff"> peft </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> PrefixTuningConfig, TaskType, get_peft_model</tspan></text>
  <text x="80" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">config = </tspan><tspan fill="#ffffff">PrefixTuningConfig(</tspan></text>
  <text x="80" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    task_type=</tspan><tspan fill="#ffffff">TaskType.</tspan><tspan fill="#b5cea8">SEQ_2_SEQ_LM</tspan><tspan fill="#ffffff">,  </tspan><tspan fill="#9aa4b8"># 태스크 유형</tspan></text>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    num_virtual_tokens=</tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#ffffff">,        </tspan><tspan fill="#9aa4b8"># prefix 토큰 수</tspan></text>
  <text x="80" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">)</tspan></text>
</svg>
