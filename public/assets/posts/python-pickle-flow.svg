<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pickle 직렬화 흐름과 보안 경고</text>

  <!-- Python obj -->
  <rect x="60" y="80" width="200" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 객체</text>
  <text x="80" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클래스 인스턴스</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">복잡한 자료구조</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수, 람다 제외</text>

  <!-- dumps arrow -->
  <line x1="260" y1="115" x2="348" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="304" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">pickle.dumps()</text>

  <!-- Bytes -->
  <rect x="350" y="80" width="200" height="100" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="450" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">바이트 스트림</text>
  <text x="370" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">b'\x80\x05\x95...'</text>
  <text x="370" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Python 전용 형식</text>
  <text x="370" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">버전 간 호환 주의</text>

  <!-- loads arrow -->
  <line x1="350" y1="148" x2="262" y2="148" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="306" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">pickle.loads()</text>

  <!-- File arrow -->
  <line x1="550" y1="115" x2="618" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="584" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">dump(obj,f)</text>

  <line x1="618" y1="148" x2="550" y2="148" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="584" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">load(f)</text>

  <!-- File -->
  <rect x="620" y="80" width="200" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">바이너리 파일</text>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">model.pkl</text>
  <text x="640" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">cache.pickle</text>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모드: 'wb'/'rb'</text>

  <!-- Security warning -->
  <rect x="60" y="210" width="760" height="80" rx="8" fill="#1f0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">⚠ 보안 경고</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">pickle.loads()는 역직렬화 중 임의 코드를 실행할 수 있습니다.</text>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">신뢰할 수 없는 소스(인터넷, 사용자 입력)의 pickle 데이터는 절대 로드하지 마세요.</text>

  <!-- Use cases -->
  <rect x="60" y="312" width="360" height="52" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">적합한 사용처</text>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ML 모델 저장 · 로컬 캐시 · 프로세스 간 객체 전달</text>

  <rect x="460" y="312" width="360" height="52" rx="8" fill="#1f0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">부적합한 사용처</text>
  <text x="480" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">외부 API 전송 · DB 저장 · 장기 보관 데이터</text>
</svg>
