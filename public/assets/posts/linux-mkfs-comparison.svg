<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일시스템 타입 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">용도에 맞는 파일시스템 선택이 성능과 안정성을 좌우한다</text>

  <!-- Table header -->
  <rect x="60" y="88" width="760" height="30" fill="#111827" rx="6"/>
  <text x="100" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">타입</text>
  <text x="210" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">최대 파일 크기</text>
  <text x="370" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">특징</text>
  <text x="660" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">주요 용도</text>

  <!-- ext4 row -->
  <rect x="60" y="118" width="760" height="36" fill="#071420" rx="0"/>
  <text x="100" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ext4</text>
  <text x="210" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">16TB</text>
  <text x="370" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">저널링, 성숙, 안정적</text>
  <text x="660" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Linux 기본·범용</text>

  <!-- xfs row -->
  <rect x="60" y="154" width="760" height="36" fill="#0d1117" rx="0"/>
  <text x="100" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">xfs</text>
  <text x="210" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">8EB</text>
  <text x="370" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">대용량, 병렬 I/O 강점</text>
  <text x="660" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">RHEL 기본·대용량 서버</text>

  <!-- btrfs row -->
  <rect x="60" y="190" width="760" height="36" fill="#071420" rx="0"/>
  <text x="100" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">btrfs</text>
  <text x="210" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">16EB</text>
  <text x="370" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CoW, 스냅샷, 서브볼륨</text>
  <text x="660" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Fedora/openSUSE 기본</text>

  <!-- vfat row -->
  <rect x="60" y="226" width="760" height="36" fill="#0d1117" rx="0"/>
  <text x="100" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a020">vfat</text>
  <text x="210" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">4GB (FAT32)</text>
  <text x="370" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Windows 호환, 권한 없음</text>
  <text x="660" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">USB·EFI 파티션</text>

  <!-- exfat row -->
  <rect x="60" y="262" width="760" height="36" fill="#071420" rx="0"/>
  <text x="100" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a020">exfat</text>
  <text x="210" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">128PB</text>
  <text x="370" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">FAT32 후속, 대용량 파일</text>
  <text x="660" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">대용량 USB·SD카드</text>

  <!-- swap row -->
  <rect x="60" y="298" width="760" height="36" fill="#0d1117" rx="0"/>
  <text x="100" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">swap</text>
  <text x="210" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-</text>
  <text x="370" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가상 메모리 전용</text>
  <text x="660" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">스왑 파티션/파일</text>

  <!-- Border -->
  <rect x="60" y="88" width="760" height="246" fill="none" rx="6" stroke="#3a4a6e" stroke-width="1"/>
</svg>
