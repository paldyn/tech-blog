<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 구현체 비교</text>

  <!-- Header -->
  <rect x="60" y="64" width="760" height="36" rx="4" fill="#111827"/>
  <text x="170" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">구현체</text>
  <text x="340" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">언어</text>
  <text x="530" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">특징</text>
  <text x="740" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">용도</text>

  <!-- CPython row -->
  <rect x="60" y="104" width="760" height="50" rx="0" fill="#0d1117"/>
  <text x="170" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">CPython</text>
  <text x="170" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">기본 구현체</text>
  <text x="340" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">C</text>
  <text x="530" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">레퍼런스 구현체, 가장 호환성 높음</text>
  <text x="530" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">GIL 존재, C 확장 모듈 지원</text>
  <text x="740" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">일반 개발 전반</text>

  <!-- PyPy row -->
  <rect x="60" y="158" width="760" height="50" rx="0" fill="#0a0a0a"/>
  <text x="170" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">PyPy</text>
  <text x="170" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">JIT 컴파일</text>
  <text x="340" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">RPython</text>
  <text x="530" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">트레이싱 JIT — 반복 루프 최대 10배 빠름</text>
  <text x="530" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">C 확장 일부 미지원, 시작 오버헤드 있음</text>
  <text x="740" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">CPU 집약적 연산</text>

  <!-- Jython row -->
  <rect x="60" y="212" width="760" height="50" rx="0" fill="#0d1117"/>
  <text x="170" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">Jython</text>
  <text x="170" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">JVM 구현체</text>
  <text x="340" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Java</text>
  <text x="530" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Java 라이브러리와 직접 통합 가능</text>
  <text x="530" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Python 3 미지원 (2.7까지)</text>
  <text x="740" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Java 생태계 연동</text>

  <!-- IronPython row -->
  <rect x="60" y="266" width="760" height="50" rx="0" fill="#0a0a0a"/>
  <text x="170" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">IronPython</text>
  <text x="170" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">.NET 구현체</text>
  <text x="340" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">C#</text>
  <text x="530" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">.NET CLR 위에서 동작, C# 라이브러리 활용</text>
  <text x="530" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">GIL 없음 — 진정한 멀티스레딩</text>
  <text x="740" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">.NET 생태계 연동</text>

  <line x1="60" y1="104" x2="820" y2="104" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="158" x2="820" y2="158" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="212" x2="820" y2="212" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="266" x2="820" y2="266" stroke="#1e293b" stroke-width="1"/>
  <rect x="60" y="64" width="760" height="252" rx="4" fill="none" stroke="#1e293b" stroke-width="1"/>
  <line x1="248" y1="64" x2="248" y2="316" stroke="#1e293b" stroke-width="1"/>
  <line x1="420" y1="64" x2="420" y2="316" stroke="#1e293b" stroke-width="1"/>
  <line x1="648" y1="64" x2="648" y2="316" stroke="#1e293b" stroke-width="1"/>

  <text x="440" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">일반 개발에는 CPython, 성능이 핵심이면 PyPy, Java/.NET 연동이 필요하면 Jython/IronPython</text>
</svg>
