<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560"
  style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript 런타임 환경 비교</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">같은 JS 엔진, 다른 런타임 — 무엇이 달라지는가</text>

  <!-- Browser Runtime -->
  <rect x="60" y="92" width="370" height="200" rx="10" fill="#0d1928" stroke="#7ec8e3" stroke-width="2"/>
  <text x="245" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">브라우저 런타임</text>
  <text x="245" y="138" text-anchor="middle" font-size="12" fill="#888">Chrome · Firefox · Safari · Edge</text>

  <!-- Browser: provided APIs -->
  <rect x="76" y="150" width="338" height="124" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="94" y="170" font-size="12" fill="#888">제공 API:</text>
  <text x="94" y="188" font-size="12" fill="#7ec8e3">• DOM · CSSOM · BOM</text>
  <text x="94" y="206" font-size="12" fill="#7ec8e3">• fetch · WebSocket · WebRTC</text>
  <text x="94" y="224" font-size="12" fill="#7ec8e3">• localStorage · IndexedDB</text>
  <text x="94" y="242" font-size="12" fill="#7ec8e3">• Canvas · WebGL · WebAudio</text>
  <text x="94" y="260" font-size="12" fill="#888">• 보안 샌드박스 — 파일시스템 접근 제한</text>

  <!-- Node.js Runtime -->
  <rect x="450" y="92" width="370" height="200" rx="10" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="635" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">Node.js 런타임</text>
  <text x="635" y="138" text-anchor="middle" font-size="12" fill="#888">V8 + libuv + C++ 바인딩</text>

  <rect x="466" y="150" width="338" height="124" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="484" y="170" font-size="12" fill="#888">제공 API:</text>
  <text x="484" y="188" font-size="12" fill="#55c555">• fs (파일시스템)</text>
  <text x="484" y="206" font-size="12" fill="#55c555">• http · https · net</text>
  <text x="484" y="224" font-size="12" fill="#55c555">• process · child_process</text>
  <text x="484" y="242" font-size="12" fill="#55c555">• Buffer · Stream · EventEmitter</text>
  <text x="484" y="260" font-size="12" fill="#888">• DOM 없음 — 서버 환경 중심</text>

  <!-- Divider -->
  <line x1="60" y1="316" x2="820" y2="316" stroke="#1e2433" stroke-width="1"/>

  <!-- Deno Runtime -->
  <rect x="60" y="336" width="240" height="165" rx="10" fill="#12122a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#9999dd">Deno</text>
  <text x="180" y="380" text-anchor="middle" font-size="11" fill="#888">V8 + Rust · 2018년 Ryan Dahl</text>
  <text x="76" y="400" font-size="11" fill="#888">• 보안 우선 (명시적 권한 필요)</text>
  <text x="76" y="418" font-size="11" fill="#888">• TypeScript 네이티브 지원</text>
  <text x="76" y="436" font-size="11" fill="#888">• ES Module 기본 (npm 호환 추가)</text>
  <text x="76" y="454" font-size="11" fill="#888">• 표준 라이브러리 내장</text>
  <text x="76" y="472" font-size="11" fill="#888">• Web 표준 API 우선 (fetch 내장)</text>
  <text x="76" y="490" font-size="11" fill="#666">deno.land</text>

  <!-- Bun Runtime -->
  <rect x="320" y="336" width="240" height="165" rx="10" fill="#1a1a0a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#b5cea8">Bun</text>
  <text x="440" y="380" text-anchor="middle" font-size="11" fill="#888">JavaScriptCore + Zig · 2022년</text>
  <text x="336" y="400" font-size="11" fill="#888">• 초고속 시작·실행 (JSC 최적화)</text>
  <text x="336" y="418" font-size="11" fill="#888">• 번들러·트랜스파일러 내장</text>
  <text x="336" y="436" font-size="11" fill="#888">• npm 호환 패키지 관리자</text>
  <text x="336" y="454" font-size="11" fill="#888">• Node.js API 대부분 호환</text>
  <text x="336" y="472" font-size="11" fill="#888">• TypeScript/JSX 기본 지원</text>
  <text x="336" y="490" font-size="11" fill="#666">bun.sh</text>

  <!-- Edge Runtime note -->
  <rect x="580" y="336" width="240" height="165" rx="10" fill="#1a1208" stroke="#ce9178" stroke-width="1.5"/>
  <text x="700" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#ce9178">Edge 런타임</text>
  <text x="700" y="380" text-anchor="middle" font-size="11" fill="#888">Cloudflare Workers · Vercel Edge</text>
  <text x="596" y="400" font-size="11" fill="#888">• V8 Isolate 기반 경량 실행</text>
  <text x="596" y="418" font-size="11" fill="#888">• 사용자 근처 서버에서 실행</text>
  <text x="596" y="436" font-size="11" fill="#888">• 극히 빠른 콜드 스타트 (~1ms)</text>
  <text x="596" y="454" font-size="11" fill="#888">• Node.js API 일부만 사용 가능</text>
  <text x="596" y="472" font-size="11" fill="#888">• Web Crypto · Fetch API 지원</text>
  <text x="596" y="490" font-size="11" fill="#666">workerd · Cloudflare Workers</text>

  <!-- Footer -->
  <text x="440" y="530" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 · Part I</text>
</svg>
