<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">라우팅 종류: 정적 vs 동적</text>

  <!-- Static routing box -->
  <rect x="60" y="70" width="360" height="290" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">정적 라우팅 (Static)</text>
  <text x="240" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">관리자가 직접 경로 설정</text>
  <text x="80" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 예측 가능, 오버헤드 없음</text>
  <text x="80" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 소규모 네트워크에 적합</text>
  <text x="80" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 보안 우수 (경로 노출 없음)</text>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 장애 시 자동 전환 없음</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 대규모 설정 관리 어려움</text>
  <!-- code example -->
  <rect x="78" y="258" width="322" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># Linux 정적 경로 추가</text>
  <text x="94" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">ip route add</text>
  <text x="200" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> 10.0.4.0/24</text>
  <text x="94" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">     via 10.0.2.2 dev eth1</text>
  <text x="94" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">ip route show</text>

  <!-- Dynamic routing box -->
  <rect x="460" y="70" width="360" height="290" rx="10" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">동적 라우팅 (Dynamic)</text>
  <text x="640" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">라우팅 프로토콜이 자동으로 경로 교환</text>
  <text x="480" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 장애 시 자동 우회</text>
  <text x="480" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 대규모 네트워크에 적합</text>
  <text x="480" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 토폴로지 변화 자동 적응</text>
  <text x="480" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ CPU/메모리 오버헤드</text>
  <text x="480" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 설정 복잡도 높음</text>
  <!-- protocol table -->
  <rect x="478" y="258" width="322" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="494" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600">프로토콜    유형      적용</text>
  <text x="494" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">OSPF       링크상태   기업 내부망</text>
  <text x="494" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">RIP        거리벡터   소규모/레거시</text>
  <text x="494" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">BGP        경로벡터   인터넷(AS간)</text>
</svg>
