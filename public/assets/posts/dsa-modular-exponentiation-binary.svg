<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">반복문 trace: pow_mod(3, 13, 7)</text>

  <!-- header -->
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">
    <text x="76" y="104">단계</text>
    <text x="180" y="104">e (이진)</text>
    <text x="330" y="104">e 홀수?</text>
    <text x="470" y="104">result</text>
    <text x="600" y="104">base (다음 제곱)</text>
  </g>

  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <rect x="60" y="118" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="143" xml:space="preserve" fill="#9aa4b8">시작</text>
    <text x="180" y="143" xml:space="preserve" fill="#b5cea8">13 (1101)</text>
    <text x="330" y="143" xml:space="preserve" fill="#9aa4b8">—</text>
    <text x="470" y="143" xml:space="preserve" fill="#ffffff">1</text>
    <text x="600" y="143" xml:space="preserve" fill="#ffffff">3</text>

    <rect x="60" y="166" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="191" xml:space="preserve" fill="#9aa4b8">1</text>
    <text x="180" y="191" xml:space="preserve" fill="#b5cea8">13 (1101)</text>
    <text x="330" y="191" xml:space="preserve" fill="#55c555" font-weight="600">홀 → 곱</text>
    <text x="470" y="191" xml:space="preserve" fill="#ffffff">1·3 = 3</text>
    <text x="600" y="191" xml:space="preserve" fill="#ffffff">3² ≡ 2</text>

    <rect x="60" y="214" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="239" xml:space="preserve" fill="#9aa4b8">2</text>
    <text x="180" y="239" xml:space="preserve" fill="#b5cea8">6 (110)</text>
    <text x="330" y="239" xml:space="preserve" fill="#888888">짝 → 유지</text>
    <text x="470" y="239" xml:space="preserve" fill="#ffffff">3</text>
    <text x="600" y="239" xml:space="preserve" fill="#ffffff">2² = 4</text>

    <rect x="60" y="262" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="287" xml:space="preserve" fill="#9aa4b8">3</text>
    <text x="180" y="287" xml:space="preserve" fill="#b5cea8">3 (11)</text>
    <text x="330" y="287" xml:space="preserve" fill="#55c555" font-weight="600">홀 → 곱</text>
    <text x="470" y="287" xml:space="preserve" fill="#ffffff">3·4 ≡ 5</text>
    <text x="600" y="287" xml:space="preserve" fill="#ffffff">4² ≡ 2</text>

    <rect x="60" y="310" width="760" height="40" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
    <text x="76" y="335" xml:space="preserve" fill="#9aa4b8">4</text>
    <text x="180" y="335" xml:space="preserve" fill="#b5cea8">1 (1)</text>
    <text x="330" y="335" xml:space="preserve" fill="#55c555" font-weight="600">홀 → 곱</text>
    <text x="470" y="335" xml:space="preserve"><tspan fill="#ffffff">5·2 ≡ </tspan><tspan fill="#55c555" font-weight="600">3</tspan></text>
    <text x="600" y="335" xml:space="preserve" fill="#9aa4b8">(e=0, 종료)</text>
  </g>

  <rect x="60" y="380" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">매 단계</tspan><tspan fill="#ffffff">: e가 홀수면 result에 base를 곱하고, base는 제곱, e는 반으로</tspan></text>

  <text x="60" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">e가 매 단계 절반으로 줄어든다 → 반복 횟수 = 지수의 비트 수 = O(log e)</text>
</svg>
