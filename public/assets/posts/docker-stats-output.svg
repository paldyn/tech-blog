<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker stats 출력 컬럼 해부</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">실시간 리소스 사용량 각 컬럼의 의미</text>

  <!-- Stats output header row -->
  <rect x="60" y="96" width="760" height="36" rx="4" fill="#111827"/>
  <text x="80" y="119" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">NAME   CPU%   MEM USAGE/LIMIT   MEM%   NET I/O     BLOCK I/O   PIDS</text>

  <!-- Sample data row -->
  <rect x="60" y="132" width="760" height="36" rx="0" fill="#0d0d0d" stroke="#3a4a6e" stroke-width="0"/>
  <text x="80" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">web    1.2%   45.8MB/512MB      8.9%   1.2MB/380kB 2.4GB/0B    6</text>

  <!-- Column annotation boxes -->
  <!-- NAME -->
  <rect x="60" y="188" width="80" height="60" rx="6" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="100" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#aaa">NAME</text>
  <text x="100" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">컨테이너명</text>

  <!-- CPU% -->
  <rect x="154" y="188" width="80" height="60" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="194" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555">CPU%</text>
  <text x="194" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">전체 CPU 대비</text>
  <text x="194" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">사용 비율</text>

  <!-- MEM USAGE/LIMIT -->
  <rect x="248" y="188" width="160" height="60" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="328" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7ec8e3">MEM USAGE/LIMIT</text>
  <text x="328" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">실제 사용 / 할당 제한</text>
  <text x="328" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">제한 없으면 호스트 전체</text>

  <!-- MEM% -->
  <rect x="422" y="188" width="80" height="60" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1.5"/>
  <text x="462" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7777cc">MEM%</text>
  <text x="462" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">메모리 제한 대비</text>
  <text x="462" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">사용 비율</text>

  <!-- NET I/O -->
  <rect x="516" y="188" width="100" height="60" rx="6" fill="#1f1400" stroke="#e8a030" stroke-width="1.5"/>
  <text x="566" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#e8a030">NET I/O</text>
  <text x="566" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">수신 / 송신 누계</text>
  <text x="566" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">컨테이너 시작 이후</text>

  <!-- BLOCK I/O -->
  <rect x="630" y="188" width="110" height="60" rx="6" fill="#1f1400" stroke="#e8a030" stroke-width="1"/>
  <text x="685" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#e8a030">BLOCK I/O</text>
  <text x="685" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">디스크 읽기/쓰기 누계</text>

  <!-- PIDS -->
  <rect x="754" y="188" width="66" height="60" rx="6" fill="#2d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="787" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#e05555">PIDS</text>
  <text x="787" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">현재 프로세스</text>
  <text x="787" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">쓰레드 수 포함</text>

  <!-- CPU% note: multi-core -->
  <rect x="60" y="278" width="760" height="46" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">CPU% 계산:</text>
  <text x="166" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">코어 수 × 100%가 최대. 4코어에서 400%면 풀 사용.</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">--cpus=1.5 제한 시 최대 150%까지만 표시됨</text>

  <!-- Code block -->
  <rect x="60" y="344" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 스냅샷 (1회 출력 후 종료): 스크립트에 유용</text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker stats</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">--no-stream</tspan>
  </text>
  <text x="76" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 특정 컨테이너 + 커스텀 포맷</text>
  <text x="76" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker stats</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">--format</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">'{{.Name}}: CPU={{.CPUPerc}} MEM={{.MemPerc}}'</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">web</tspan>
  </text>
</svg>
