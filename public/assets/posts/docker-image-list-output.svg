<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker image ls — 출력 컬럼 해석</text>

  <!-- Command output box -->
  <rect x="60" y="64" width="760" height="188" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <!-- Header row -->
  <text x="76" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7ec8e3">REPOSITORY               TAG          IMAGE ID       CREATED        SIZE</text>

  <!-- Data rows -->
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">nginx                    1.25-alpine  e5e16e1a5897   2 days ago     42.6MB</text>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">nginx                    latest       e5e16e1a5897   2 days ago     188MB</text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp                    v1.2.3       a1b2c3d4e5f6   5 hours ago    124MB</text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp                    latest       a1b2c3d4e5f6   5 hours ago    124MB</text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">postgres                 16-alpine    b7c8d9e0f1a2   3 weeks ago    268MB</text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&lt;none&gt;                   &lt;none&gt;       c3d4e5f6a7b8   1 hour ago     199MB</text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">redis                    7-alpine     d4e5f6a7b8c9   5 weeks ago    41.5MB</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">python                   3.11-slim    f6a7b8c9d0e1   2 months ago   130MB</text>

  <!-- Column annotations -->
  <!-- IMAGE ID same = same image -->
  <rect x="60" y="270" width="360" height="74" rx="8" fill="#111320" stroke="#7777cc" stroke-width="1"/>
  <text x="76" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">IMAGE ID 동일 = 같은 이미지</text>
  <text x="76" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">nginx:1.25-alpine과 nginx:latest가</text>
  <text x="76" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동일 ID → 같은 레이어, 태그만 다름</text>

  <!-- Dangling image -->
  <rect x="440" y="270" width="380" height="74" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="456" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">&lt;none&gt;:&lt;none&gt; = 댕글링 이미지</text>
  <text x="456" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이름 없는 중간 빌드 레이어 또는</text>
  <text x="456" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">덮어써진 이전 이미지 → prune 대상</text>

  <!-- SIZE note -->
  <rect x="60" y="360" width="760" height="52" rx="8" fill="#111320" stroke="#333" stroke-width="1"/>
  <text x="76" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">SIZE 컬럼: 실제 디스크 사용량과 다를 수 있음</text>
  <text x="76" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공유 레이어는 중복 합산됨 — 실제 사용량은 docker system df 로 확인</text>

  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">docker images = docker image ls (동일한 명령의 단축형)</text>
</svg>
