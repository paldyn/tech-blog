<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">권한 기반 메뉴 필터링 흐름</text>

  <!-- Login box -->
  <rect x="60" y="76" width="160" height="64" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="103" fill="#7ec8e3" font-size="14" font-weight="600" text-anchor="middle">로그인</text>
  <text x="140" y="122" fill="#888" font-size="12" text-anchor="middle">userId, roleId 획득</text>

  <line x1="220" y1="108" x2="254" y2="108" stroke="#374151" stroke-width="2"/>
  <polygon points="260,108 248,102 248,114" fill="#374151"/>

  <!-- Server query -->
  <rect x="260" y="76" width="200" height="64" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="360" y="100" fill="#55c555" font-size="14" font-weight="600" text-anchor="middle">서버 메뉴 조회</text>
  <text x="360" y="118" fill="#e8e8e8" font-size="12" text-anchor="middle">역할별 메뉴 + 버튼권한</text>
  <text x="360" y="134" fill="#888" font-size="12" text-anchor="middle">svc/menu/getMenuAuth</text>

  <line x1="460" y1="108" x2="494" y2="108" stroke="#374151" stroke-width="2"/>
  <polygon points="500,108 488,102 488,114" fill="#374151"/>

  <!-- Dataset store -->
  <rect x="500" y="76" width="320" height="64" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="100" fill="#7777cc" font-size="14" font-weight="600" text-anchor="middle">전역 Dataset 저장</text>
  <text x="660" y="118" fill="#e8e8e8" font-size="12" text-anchor="middle">application.gds_menu</text>
  <text x="660" y="134" fill="#888" font-size="12" text-anchor="middle">application.gds_menuAuth</text>

  <!-- Down arrow -->
  <line x1="440" y1="140" x2="440" y2="174" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Filter box -->
  <rect x="60" y="180" width="760" height="100" rx="8" fill="#111827" stroke="#374151"/>
  <text x="440" y="208" fill="#e8e8e8" font-size="15" font-weight="600" text-anchor="middle">메뉴 필터링</text>
  <text x="100" y="232" fill="#7ec8e3" font-size="12">• ds_menu에서 허용된 menuId만 남기기 (filter 함수)</text>
  <text x="100" y="252" fill="#55c555" font-size="12">• 버튼 권한: gds_menuAuth로 각 화면 버튼 enable/visible 제어</text>
  <text x="100" y="268" fill="#888" font-size="12">• 미허용 메뉴 직접 URL 접근 시 서버·클라이언트 이중 차단</text>

  <!-- Menu display result -->
  <text x="440" y="314" fill="#888" font-size="13" text-anchor="middle">필터링 결과 — 역할별 다른 메뉴</text>

  <rect x="60" y="324" width="350" height="130" rx="8" fill="#0f172a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="348" fill="#7ec8e3" font-size="13" font-weight="600" text-anchor="middle">관리자(ADMIN)</text>
  <text x="80" y="372" fill="#e8e8e8" font-size="12">✓ 시스템관리  ✓ 영업관리</text>
  <text x="80" y="392" fill="#e8e8e8" font-size="12">✓ 구매관리   ✓ 재무관리</text>
  <text x="80" y="412" fill="#55c555" font-size="12">✓ 관리콘솔   ✓ 로그조회</text>
  <text x="80" y="432" fill="#55c555" font-size="12">→ 전체 메뉴 표시</text>

  <rect x="470" y="324" width="350" height="130" rx="8" fill="#0f172a" stroke="#374151" stroke-width="1.5"/>
  <text x="645" y="348" fill="#e8e8e8" font-size="13" font-weight="600" text-anchor="middle">일반사용자(USER)</text>
  <text x="490" y="372" fill="#e8e8e8" font-size="12">✓ 영업관리   ✓ 구매관리</text>
  <text x="490" y="392" fill="#888" font-size="12">✗ 시스템관리 ✗ 관리콘솔</text>
  <text x="490" y="412" fill="#888" font-size="12">✗ 로그조회</text>
  <text x="490" y="432" fill="#e05555" font-size="12">→ 허용 메뉴만 표시</text>
</svg>
