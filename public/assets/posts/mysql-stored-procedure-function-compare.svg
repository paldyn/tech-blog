<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스토어드 프로시저 vs 스토어드 함수 비교</text>

  <!-- Header row -->
  <rect x="40" y="60" width="380" height="36" fill="#0e1a2e" rx="6" stroke="#3a5a8e" stroke-width="1"/>
  <text x="230" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">Stored Procedure</text>

  <rect x="440" y="60" width="400" height="36" fill="#0e1a2e" rx="6" stroke="#3a5a8e" stroke-width="1"/>
  <text x="640" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">Stored Function</text>

  <!-- Row 1: 반환 방식 -->
  <text x="40" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">반환 방식</text>
  <rect x="40" y="128" width="380" height="44" fill="#0b1520" rx="4" stroke="#2a3a5e" stroke-width="1"/>
  <text x="230" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">OUT/INOUT 파라미터 또는</text>
  <text x="230" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">SELECT 결과셋 (복수 결과셋 가능)</text>
  <rect x="440" y="128" width="400" height="44" fill="#0b1520" rx="4" stroke="#2a3a5e" stroke-width="1"/>
  <text x="640" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">RETURNS 로 선언한 단일 스칼라값</text>
  <text x="640" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">RETURN 문으로 반환 (필수)</text>

  <!-- Row 2: 호출 방식 -->
  <text x="40" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">호출 방식</text>
  <rect x="40" y="204" width="380" height="44" fill="#0b1520" rx="4" stroke="#2a3a5e" stroke-width="1"/>
  <text x="230" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">CALL proc_name(args)</text>
  <text x="230" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">SELECT/DML 내에서 직접 호출 불가</text>
  <rect x="440" y="204" width="400" height="44" fill="#0b1520" rx="4" stroke="#2a3a5e" stroke-width="1"/>
  <text x="640" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">SELECT fn_name(args), fn() AS alias</text>
  <text x="640" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">WHERE, JOIN ON 등 어디서든 사용 가능</text>

  <!-- Row 3: DML 허용 -->
  <text x="40" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">DML 허용</text>
  <rect x="40" y="280" width="380" height="44" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ INSERT / UPDATE / DELETE / DDL</text>
  <text x="230" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">트랜잭션 제어(COMMIT/ROLLBACK) 가능</text>
  <rect x="440" y="280" width="400" height="44" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ SELECT만 가능 (기본)</text>
  <text x="640" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">DETERMINISTIC / READS SQL DATA 선언 필요</text>

  <!-- Row 4: 용도 -->
  <text x="40" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">주요 용도</text>
  <rect x="40" y="356" width="380" height="44" fill="#0b1520" rx="4" stroke="#2a3a5e" stroke-width="1"/>
  <text x="230" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">복잡한 비즈니스 로직 / 배치 처리</text>
  <text x="230" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">데이터 마이그레이션 / 트랜잭션 포함 처리</text>
  <rect x="440" y="356" width="400" height="44" fill="#0b1520" rx="4" stroke="#2a3a5e" stroke-width="1"/>
  <text x="640" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">재사용 가능한 계산 / 파생 컬럼 생성</text>
  <text x="640" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">UDF처럼 활용 / 뷰에서도 호출 가능</text>

  <!-- Bottom warning -->
  <rect x="40" y="420" width="800" height="40" fill="#1e1a0a" rx="6" stroke="#e0aa55" stroke-width="1"/>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0aa55" text-anchor="middle">주의: 스토어드 루틴은 실행 계획 캐시 미적용 — 루프 내 호출 시 성능 저하 가능</text>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">바이너리 로그 복제 시 함수는 DETERMINISTIC 선언 필요 (log_bin_trust_function_creators)</text>
</svg>
