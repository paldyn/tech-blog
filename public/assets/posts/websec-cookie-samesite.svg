<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a6ea8"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SameSite 속성 동작 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">요청 유형별 쿠키 전송 여부</text>

  <!-- Header row -->
  <rect x="60" y="95" width="760" height="38" rx="6" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="190" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">요청 유형</text>
  <text x="370" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">None</text>
  <text x="510" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a020" text-anchor="middle">Lax</text>
  <text x="660" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Strict</text>
  <line x1="290" y1="95" x2="290" y2="430" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="440" y1="95" x2="440" y2="430" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="580" y1="95" x2="580" y2="430" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Row 1: Same-site 요청 -->
  <rect x="60" y="133" width="760" height="48" rx="0" fill="#0f1820"/>
  <text x="190" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">동일 사이트 모든 요청</text>
  <text x="190" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">링크, 폼, XHR 등</text>
  <text x="370" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>
  <text x="510" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>
  <text x="660" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>

  <!-- Row 2: Cross-site GET 탑레벨 링크 -->
  <rect x="60" y="181" width="760" height="48" rx="0" fill="#0d1520"/>
  <text x="190" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">크로스 사이트 GET 이동</text>
  <text x="190" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">&lt;a href&gt;, window.location</text>
  <text x="370" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>
  <text x="510" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>
  <text x="660" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>

  <!-- Row 3: Cross-site POST 폼 -->
  <rect x="60" y="229" width="760" height="48" rx="0" fill="#0f1820"/>
  <text x="190" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">크로스 사이트 POST 폼</text>
  <text x="190" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CSRF 공격 벡터</text>
  <text x="370" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>
  <text x="510" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>
  <text x="660" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>

  <!-- Row 4: 크로스 사이트 이미지/iframe -->
  <rect x="60" y="277" width="760" height="48" rx="0" fill="#0d1520"/>
  <text x="190" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">크로스 사이트 XHR/Fetch</text>
  <text x="190" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">AJAX 크로스 오리진 요청</text>
  <text x="370" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>
  <text x="510" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>
  <text x="660" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>

  <!-- Row 5: iframe 임베드 -->
  <rect x="60" y="325" width="760" height="48" rx="0" fill="#0f1820"/>
  <text x="190" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">크로스 사이트 iframe</text>
  <text x="190" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">서드파티 임베드</text>
  <text x="370" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>
  <text x="510" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>
  <text x="660" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>

  <!-- Table border -->
  <rect x="60" y="133" width="760" height="240" fill="none" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Bottom info -->
  <rect x="60" y="396" width="760" height="52" rx="8" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1"/>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">세션 쿠키 권장: SameSite=Lax 이상 + HttpOnly + Secure</text>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">OAuth·결제 플로우처럼 크로스 사이트가 필요하면 None+Secure + CSRF 토큰 병행</text>
</svg>
