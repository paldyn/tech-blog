<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Jakarta EE 애플리케이션 아키텍처</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="400" fill="#888">Web Tier → Business Tier → Data Tier 흐름</text>

  <!-- ── Client ── -->
  <rect x="60" y="160" width="120" height="130" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="120" y="215" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">클라이언트</text>
  <text x="120" y="237" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">브라우저</text>
  <text x="120" y="255" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모바일 앱</text>
  <text x="120" y="273" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">REST 클라이언트</text>

  <!-- Arrow: Client → Web Tier -->
  <line x1="182" y1="225" x2="222" y2="225" stroke="#555" stroke-width="2"/>
  <polygon points="222,219 235,225 222,231" fill="#555"/>

  <!-- ── Web Tier ── -->
  <rect x="235" y="100" width="160" height="250" rx="8" fill="#0c1820" stroke="#1e3040" stroke-width="1"/>
  <rect x="235" y="100" width="160" height="36" fill="#0c2840" rx="8"/>
  <rect x="235" y="124" width="160" height="12" fill="#0c2840"/>
  <text x="315" y="123" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Web Tier</text>

  <text x="253" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• Servlet</text>
  <text x="253" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• JSP / Faces</text>
  <text x="253" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• JAX-RS (REST)</text>
  <text x="253" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• WebSocket</text>
  <text x="253" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• JSON-B / JSON-P</text>

  <line x1="253" y1="252" x2="377" y2="252" stroke="#1e3040" stroke-width="1"/>
  <text x="253" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#4a8aaa">@WebServlet</text>
  <text x="253" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#4a8aaa">@Path ("/api")</text>
  <text x="253" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#4a8aaa">@GET @POST</text>
  <text x="253" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#4a8aaa">@Produces (JSON)</text>

  <!-- Arrow: Web → Business -->
  <line x1="397" y1="225" x2="437" y2="225" stroke="#555" stroke-width="2"/>
  <polygon points="437,219 450,225 437,231" fill="#555"/>

  <!-- ── Business Tier ── -->
  <rect x="450" y="100" width="160" height="250" rx="8" fill="#0e1820" stroke="#203040" stroke-width="1"/>
  <rect x="450" y="100" width="160" height="36" fill="#0e2840" rx="8"/>
  <rect x="450" y="124" width="160" height="12" fill="#0e2840"/>
  <text x="530" y="123" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Business Tier</text>

  <text x="468" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• EJB (Bean)</text>
  <text x="468" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• CDI (의존성 주입)</text>
  <text x="468" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• JPA (영속성)</text>
  <text x="468" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• JTA (트랜잭션)</text>
  <text x="468" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• JMS (메시징)</text>

  <line x1="468" y1="252" x2="592" y2="252" stroke="#203040" stroke-width="1"/>
  <text x="468" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">@Stateless</text>
  <text x="468" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">@Inject</text>
  <text x="468" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">@Transactional</text>
  <text x="468" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">@Entity @Table</text>

  <!-- Arrow: Business → Data -->
  <line x1="612" y1="225" x2="652" y2="225" stroke="#555" stroke-width="2"/>
  <polygon points="652,219 665,225 652,231" fill="#555"/>

  <!-- ── Data Tier ── -->
  <rect x="665" y="140" width="155" height="170" rx="8" fill="#0e1614" stroke="#1e3020" stroke-width="1"/>
  <rect x="665" y="140" width="155" height="36" fill="#0c2810" rx="8"/>
  <rect x="665" y="164" width="155" height="12" fill="#0c2810"/>
  <text x="742" y="163" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Data Tier</text>

  <text x="683" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• RDBMS (MySQL…)</text>
  <text x="683" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• NoSQL (MongoDB…)</text>
  <text x="683" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• Message Queue</text>
  <text x="683" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• Cache (Redis…)</text>
  <text x="683" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• EIS / Legacy</text>

  <!-- Java SE 기반 bar (bottom) -->
  <rect x="60" y="390" width="760" height="36" rx="6" fill="#0c1420" stroke="#1e2840" stroke-width="1"/>
  <text x="440" y="413" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#4a8aaa">Java SE 표준 라이브러리 — 모든 티어의 공통 기반</text>

  <!-- Footer -->
  <text x="440" y="458" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">PALDYN — Java 완전 정복</text>
</svg>
