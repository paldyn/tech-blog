<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arrpf" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrpf2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    태그 Push / Fetch 흐름
  </text>

  <!-- Local -->
  <rect x="60" y="70" width="340" height="340" rx="10" fill="#111111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">로컬 저장소</text>

  <rect x="84" y="110" width="292" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">v1.0.0, v1.1.0, v2.0.0</text>
  <text x="230" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로컬 태그</text>

  <rect x="84" y="175" width="292" height="52" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">git push origin v1.0.0</text>
  <text x="230" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">특정 태그 push</text>

  <rect x="84" y="240" width="292" height="52" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">git push origin --tags</text>
  <text x="230" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 태그 push</text>

  <rect x="84" y="305" width="292" height="52" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">git push --follow-tags</text>
  <text x="230" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Annotated 태그만 push</text>

  <!-- Remote -->
  <rect x="480" y="70" width="340" height="340" rx="10" fill="#111111" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">원격 저장소 (origin)</text>

  <rect x="504" y="110" width="292" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">v1.0.0, v2.0.0</text>
  <text x="650" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격 태그</text>

  <rect x="504" y="175" width="292" height="52" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">git fetch --tags</text>
  <text x="650" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격 태그 가져오기</text>

  <rect x="504" y="240" width="292" height="52" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">git ls-remote --tags origin</text>
  <text x="650" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격 태그 조회</text>

  <rect x="504" y="305" width="292" height="52" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="650" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">git push --delete origin v1.0.0</text>
  <text x="650" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격 태그 삭제</text>

  <!-- Arrows push/fetch -->
  <line x1="376" y1="200" x2="478" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arrpf)"/>
  <text x="427" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">push</text>

  <line x1="478" y1="265" x2="376" y2="265" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrpf2)"/>
  <text x="427" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">fetch</text>

  <!-- Bottom note -->
  <rect x="60" y="425" width="760" height="40" rx="6" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git push 기본 동작은 태그를 포함하지 않음 — 명시적으로 push해야 함</text>
  <text x="440" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">--follow-tags: push하는 커밋과 연결된 Annotated 태그만 자동 포함</text>
</svg>
