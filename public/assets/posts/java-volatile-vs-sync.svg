<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">volatile vs synchronized 비교</text>

  <!-- Header row -->
  <rect x="60" y="60" width="240" height="36" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <rect x="302" y="60" width="240" height="36" rx="4" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="544" y="60" width="276" height="36" rx="4" fill="#0a1f0a" stroke="#55c555" stroke-width="1"/>

  <text x="180" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">항목</text>
  <text x="422" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">volatile</text>
  <text x="682" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">synchronized</text>

  <!-- Row 1 -->
  <rect x="60" y="98" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="302" y="98" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="544" y="98" width="276" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="180" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메모리 가시성</text>
  <text x="422" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 보장</text>
  <text x="682" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 보장</text>

  <!-- Row 2 -->
  <rect x="60" y="136" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="302" y="136" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="544" y="136" width="276" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="180" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원자성</text>
  <text x="422" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">단순 read/write만</text>
  <text x="682" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 복합 연산도 가능</text>

  <!-- Row 3 -->
  <rect x="60" y="174" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="302" y="174" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="544" y="174" width="276" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="180" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스레드 블로킹</text>
  <text x="422" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 없음</text>
  <text x="682" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">BLOCKED 가능</text>

  <!-- Row 4 -->
  <rect x="60" y="212" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="302" y="212" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="544" y="212" width="276" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="180" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">명령어 재정렬 방지</text>
  <text x="422" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 메모리 펜스</text>
  <text x="682" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 진입/탈출 시</text>

  <!-- Row 5 -->
  <rect x="60" y="250" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="302" y="250" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="544" y="250" width="276" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="180" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">적합한 사용처</text>
  <text x="422" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">플래그, 상태 변수</text>
  <text x="682" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">복합 연산, 조건 대기</text>

  <!-- Warning -->
  <rect x="60" y="300" width="760" height="44" rx="6" fill="#1f1400" stroke="#e8c44a" stroke-width="1"/>
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">⚠ volatile은 원자성을 보장하지 않는다</text>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">volatile int count; count++; 는 여전히 레이스 컨디션 — AtomicInteger 사용</text>
</svg>
