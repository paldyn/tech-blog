<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring Initializr — 프로젝트 생성 흐름</text>
  <text x="440" y="65"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">start.spring.io에서 설정 선택 → ZIP 다운로드 → IDE 임포트 → 즉시 실행</text>

  <!-- Step 1: start.spring.io -->
  <rect x="60" y="88" width="200" height="100" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="115"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">start.spring.io</text>
  <text x="160" y="136"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">빌드 도구 선택</text>
  <text x="160" y="154"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Spring Boot 버전 선택</text>
  <text x="160" y="172"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">의존성(Starter) 추가</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="138" x2="302" y2="138" stroke="#444" stroke-width="2"/>
  <polygon points="308,138 298,133 298,143" fill="#444"/>

  <!-- Step 2: ZIP 생성 -->
  <rect x="308" y="88" width="180" height="100" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="398" y="115"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">ZIP 생성·다운로드</text>
  <text x="398" y="136"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프로젝트 골격 생성</text>
  <text x="398" y="154"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">build.gradle / pom.xml</text>
  <text x="398" y="172"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">main 클래스 포함</text>

  <!-- Arrow 2→3 -->
  <line x1="488" y1="138" x2="530" y2="138" stroke="#444" stroke-width="2"/>
  <polygon points="536,138 526,133 526,143" fill="#444"/>

  <!-- Step 3: IDE Import -->
  <rect x="536" y="88" width="180" height="100" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="626" y="115"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">IDE 임포트</text>
  <text x="626" y="136"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">IntelliJ IDEA</text>
  <text x="626" y="154"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">VS Code + Spring Tools</text>
  <text x="626" y="172"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Eclipse STS</text>

  <!-- Arrow 3 down -->
  <line x1="626" y1="188" x2="626" y2="215" stroke="#444" stroke-width="2"/>
  <polygon points="626,221 620,209 632,209" fill="#444"/>

  <!-- Step 4: Run -->
  <rect x="536" y="221" width="180" height="60" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="626" y="247"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">즉시 실행</text>
  <text x="626" y="267"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">./gradlew bootRun</text>

  <!-- Generated Structure (large box at bottom) -->
  <rect x="60" y="220" width="440" height="195" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="280" y="244"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">생성되는 프로젝트 구조</text>
  <line x1="76" y1="252" x2="484" y2="252" stroke="#3a4a6e" stroke-width="1"/>

  <text x="88" y="272"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">my-project/</text>
  <text x="88" y="290"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">├── build.gradle (or pom.xml)</text>
  <text x="88" y="308"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">├── src/main/java/</text>
  <text x="88" y="326"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">│   └── com/example/</text>
  <text x="88" y="344"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">│       └── MyProjectApplication.java</text>
  <text x="88" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">├── src/main/resources/</text>
  <text x="88" y="380"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">│   └── application.properties</text>
  <text x="88" y="398"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">└── src/test/java/</text>
</svg>
