<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arrc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrc2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrc3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이더넷 FCS(CRC-32) 동작 흐름</text>

  <!-- Sender side -->
  <rect x="60" y="68" width="340" height="90" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">송신 측</text>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1. 이더넷 프레임 생성 (헤더 + 데이터)</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">2. CRC-32 계산 → FCS(4바이트) 생성</text>
  <text x="80" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">3. 프레임 끝에 FCS 부착 후 전송</text>

  <!-- Ethernet frame -->
  <rect x="60" y="178" width="80" height="34" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Preamble</text>
  <rect x="144" y="178" width="70" height="34" rx="4" fill="#1a2a35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="179" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Dst MAC</text>
  <rect x="218" y="178" width="70" height="34" rx="4" fill="#1a2a35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="253" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Src MAC</text>
  <rect x="292" y="178" width="80" height="34" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="332" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Payload</text>
  <rect x="376" y="178" width="44" height="34" rx="4" fill="#1a1a35" stroke="#7777cc" stroke-width="2"/>
  <text x="398" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">FCS</text>
  <text x="398" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">CRC-32</text>

  <!-- Arrow: send -->
  <line x1="440" y1="195" x2="500" y2="195" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrc)"/>
  <text x="470" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전송</text>

  <!-- Receiver side: good -->
  <rect x="500" y="68" width="340" height="90" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">수신 측</text>
  <text x="520" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1. 프레임 수신</text>
  <text x="520" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">2. 데이터로 CRC-32 재계산</text>
  <text x="520" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">3. 수신된 FCS와 비교</text>

  <!-- Comparison result -->
  <rect x="500" y="178" width="160" height="66" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="580" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">일치 (OK)</text>
  <text x="580" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프레임 상위 계층</text>
  <text x="580" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">으로 전달</text>

  <rect x="680" y="178" width="160" height="66" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="760" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">불일치 (오류)</text>
  <text x="760" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프레임 폐기</text>
  <text x="760" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(상위 계층이 재전송)</text>

  <!-- Error correction note -->
  <rect x="60" y="282" width="760" height="80" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">오류 감지(Detection) vs 오류 수정(Correction)</text>
  <text x="200" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">오류 감지 (CRC, Checksum)</text>
  <text x="200" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">오류 존재 여부만 탐지 → 상위 계층 재전송</text>
  <text x="640" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">오류 수정 (FEC: Hamming, Reed-Solomon)</text>
  <text x="640" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">오류를 자동으로 수정 → 위성·Wi-Fi에서 사용</text>
  <line x1="440" y1="316" x2="440" y2="356" stroke="#1e2a3a" stroke-width="1"/>
</svg>
