<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">SLF4J + Logback 아키텍처</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">추상화 계층 + 구현체 분리 구조</text>

  <!-- Application layer -->
  <rect x="280" y="100" width="320" height="56" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">애플리케이션 코드</text>
  <text x="440" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">log.info("message") — SLF4J API 호출</text>

  <!-- Arrow down -->
  <line x1="440" y1="156" x2="440" y2="182" stroke="#555" stroke-width="2"/>
  <polygon points="440,192 433,180 447,180" fill="#555"/>

  <!-- SLF4J layer -->
  <rect x="210" y="196" width="460" height="52" rx="10" fill="#141414" stroke="#e8c84a" stroke-width="2"/>
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8c84a">SLF4J (Simple Logging Facade for Java)</text>
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인터페이스만 정의 — 구현체 교체 가능</text>

  <!-- Arrow down: to binding -->
  <line x1="440" y1="248" x2="440" y2="274" stroke="#555" stroke-width="2"/>
  <polygon points="440,284 433,272 447,272" fill="#555"/>

  <!-- Binding layer -->
  <rect x="210" y="288" width="460" height="44" rx="10" fill="#141414" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#9999ee">SLF4J Binding (logback-classic)</text>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">SLF4J ↔ Logback 연결 어댑터</text>

  <!-- Arrow down -->
  <line x1="440" y1="332" x2="440" y2="358" stroke="#555" stroke-width="2"/>
  <polygon points="440,368 433,356 447,356" fill="#555"/>

  <!-- Logback layer -->
  <rect x="60" y="372" width="760" height="50" rx="10" fill="#0f2014" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Logback (구현체)</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">ConsoleAppender  ·  FileAppender  ·  RollingFileAppender  ·  AsyncAppender</text>

  <!-- Alternatives box (right side) -->
  <rect x="700" y="196" width="150" height="148" rx="8" fill="#141414" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="775" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">대안 구현체</text>
  <text x="775" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Log4j 2</text>
  <text x="775" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">java.util.logging</text>
  <text x="775" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Commons Logging</text>
  <line x1="700" y1="288" x2="670" y2="310" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Left note -->
  <rect x="60" y="196" width="140" height="148" rx="8" fill="#141414" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">SLF4J의 장점</text>
  <text x="130" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">코드 변경 없이</text>
  <text x="130" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">구현체 교체</text>
  <text x="130" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">의존성만 바꾸면</text>
  <text x="130" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">구현체 전환 완료</text>

  <!-- Bottom note -->
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Spring Boot는 기본으로 Logback을 사용하며 spring-boot-starter-logging에 포함됩니다</text>
</svg>
