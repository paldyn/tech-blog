<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">IPv4 vs IPv6 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">32비트 → 128비트 — 주소 공간 확장과 설계 개선</text>

  <!-- column headers -->
  <rect x="60" y="90" width="360" height="40" rx="6" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">IPv4</text>

  <rect x="460" y="90" width="360" height="40" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">IPv6</text>

  <!-- rows -->
  <!-- row 1: address size -->
  <rect x="60" y="138" width="360" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주소 길이: 32비트</text>
  <text x="240" y="173" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">192.168.1.1</text>

  <rect x="460" y="138" width="360" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주소 길이: 128비트</text>
  <text x="640" y="173" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">2001:db8::1</text>

  <!-- row 2: address count -->
  <rect x="60" y="188" width="360" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">총 주소 수</text>
  <text x="240" y="223" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">약 43억 (고갈됨)</text>

  <rect x="460" y="188" width="360" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">총 주소 수</text>
  <text x="640" y="223" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">340간 (사실상 무한)</text>

  <!-- row 3: header -->
  <rect x="60" y="238" width="360" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">헤더 크기</text>
  <text x="240" y="273" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">20~60 바이트 (가변)</text>

  <rect x="460" y="238" width="360" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">헤더 크기</text>
  <text x="640" y="273" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">40 바이트 (고정)</text>

  <!-- row 4: config -->
  <rect x="60" y="288" width="360" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주소 설정</text>
  <text x="240" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수동 또는 DHCP 필요</text>

  <rect x="460" y="288" width="360" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주소 설정</text>
  <text x="640" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">SLAAC 자동 설정 가능</text>

  <!-- row 5: security -->
  <rect x="60" y="338" width="360" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">보안</text>
  <text x="240" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IPSec 선택적</text>

  <rect x="460" y="338" width="360" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">보안</text>
  <text x="640" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">IPSec 설계에 내장</text>

  <text x="440" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">2024년 기준 전 세계 인터넷 트래픽의 약 45% 이상이 IPv6 사용</text>
</svg>
