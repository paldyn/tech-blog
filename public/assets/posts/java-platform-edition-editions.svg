  <text x="342" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• LTS: 8 / 11 / 17 / 21</text>
  <text x="342" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
