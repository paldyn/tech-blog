  <line x1="82" y1="205" x2="278" y2="205" stroke="#2a2a40" stroke-width="1"/>

  <!-- ME 특징 -->
  <text x="82" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
