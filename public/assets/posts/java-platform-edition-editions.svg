  <text x="602" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• CDI · JPA · JTA</text>
  <text x="602" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• JAX-RS · MicroProfile</text>
  <text x="602" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• EJB · JMS</text>
  <line x1="602" y1="320" x2="798" y2="320" stroke="#1e3020" stroke-width="1"/>

  <!-- EE 특징 -->
  <text x="602" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">특징</text>
  <text x="602" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• Java SE 기반 확장</text>
  <text x="602" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• Eclipse 재단 이관 (2019)</text>
  <text x="602" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• Spring이 사실상 표준</text>

  <!-- EE status badge -->
  <rect x="602" y="426" width="80" height="22" rx="4" fill="#0c2810"/>
  <text x="642" y="441" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">엔터프라이즈</text>

  <!-- Footer -->
  <text x="440" y="518" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
