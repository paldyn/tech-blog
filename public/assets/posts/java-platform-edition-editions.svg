<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 플랫폼 에디션</text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="400" fill="#888">Java ME · Java SE · Jakarta EE 의 역할과 적용 범위</text>

  <!-- ===== Java ME Column x=60 w=240 ===== -->
  <rect x="60" y="96" width="240" height="386" fill="#13121e" rx="8" stroke="#2a2a40" stroke-width="1"/>
  <!-- Header bar -->
  <rect x="60" y="96" width="240" height="52" fill="#1e1840" rx="8"/>
  <rect x="60" y="128" width="240" height="20" fill="#1e1840"/>
  <text x="180" y="123" text-anchor="middle"
