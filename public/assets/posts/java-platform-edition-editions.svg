  <text x="82" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">• 경량 런타임 (JVM 서브셋)</text>
  <text x="82" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
