<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="430" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Props 타이핑의 기본</text>
  <text x="60" y="78" font-size="13" fill="#888">interface로 props 모양을 선언하고, children은 React.ReactNode로 받는다</text>

  <!-- code box -->
  <rect x="60" y="100" width="440" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="128" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">interface</tspan><tspan fill="#ffffff"> ButtonProps {</tspan></text>
  <text xml:space="preserve" x="76" y="150" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  label: <tspan fill="#7ec8e3" font-weight="600">string</tspan>;</text>
  <text xml:space="preserve" x="76" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  onClick: () =&gt; <tspan fill="#7ec8e3" font-weight="600">void</tspan>;</text>
  <text xml:space="preserve" x="76" y="194" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  children?: React.ReactNode;</text>
  <text xml:space="preserve" x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">}</text>
  <text xml:space="preserve" x="76" y="260" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Button({ label,</tspan></text>
  <text xml:space="preserve" x="76" y="282" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  onClick, children }: ButtonProps) {</text>
  <text xml:space="preserve" x="76" y="304" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> &lt;button onClick={onClick}&gt;</tspan></text>
  <text xml:space="preserve" x="76" y="326" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    {label}{children}&lt;/button&gt;;</text>
  <text xml:space="preserve" x="76" y="348" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">}</text>
  <text xml:space="preserve" x="76" y="378" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 호출부 오타·타입 불일치를 컴파일 타임에 차단</text>

  <!-- annotation cards -->
  <rect x="560" y="100" width="260" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="576" y="128" font-size="14" font-weight="600" fill="#7ec8e3">필수 prop</text>
  <text x="576" y="150" font-size="13" fill="#ffffff">label / onClick은 ? 없이</text>
  <text x="576" y="170" font-size="13" fill="#ffffff">선언 → 누락 시 에러</text>

  <rect x="560" y="200" width="260" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="576" y="228" font-size="14" font-weight="600" fill="#55c555">children</text>
  <text x="576" y="250" font-size="13" fill="#ffffff">React.ReactNode = JSX,</text>
  <text x="576" y="270" font-size="13" fill="#ffffff">문자열, 배열, null 모두 허용</text>

  <rect x="560" y="300" width="260" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="576" y="328" font-size="14" font-weight="600" fill="#e05555">옵셔널 ?</text>
  <text x="576" y="350" font-size="13" fill="#ffffff">children? → 안 넘겨도 OK</text>
  <text x="576" y="370" font-size="13" fill="#ffffff">undefined 가능성 포함</text>
</svg>
