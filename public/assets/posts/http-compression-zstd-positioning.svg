<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="axw" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888888"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">압축률 × 속도 지형도에서 zstd의 위치</text>
    <!-- Axes -->
    <line x1="100" y1="380" x2="800" y2="380" stroke="#888888" stroke-width="2" marker-end="url(#axw)"/>
    <line x1="100" y1="380" x2="100" y2="92" stroke="#888888" stroke-width="2" marker-end="url(#axw)"/>
    <text x="450" y="414" text-anchor="middle" font-size="12" fill="#888">압축 속도 (오른쪽일수록 빠름) →</text>
    <text x="118" y="86" font-size="12" fill="#888">↑ 압축률 (위일수록 작아짐)</text>
    <!-- Points -->
    <circle cx="180" cy="130" r="7" fill="#9b8fe8"/>
    <text x="196" y="124" font-size="12" fill="#9b8fe8">brotli -11 (정적 사전 압축용)</text>
    <circle cx="300" cy="158" r="7" fill="#55c555"/>
    <text x="316" y="152" font-size="12" fill="#55c555">zstd -19</text>
    <circle cx="250" cy="252" r="7" fill="#7ec8e3"/>
    <text x="266" y="246" font-size="12" fill="#7ec8e3">gzip -9</text>
    <circle cx="490" cy="212" r="7" fill="#9b8fe8"/>
    <text x="506" y="206" font-size="12" fill="#9b8fe8">brotli -4</text>
    <circle cx="450" cy="276" r="7" fill="#7ec8e3"/>
    <text x="466" y="270" font-size="12" fill="#7ec8e3">gzip -6</text>
    <circle cx="680" cy="238" r="7" fill="#55c555"/>
    <text x="664" y="232" text-anchor="end" font-size="12" fill="#55c555">zstd -3 (기본값)</text>
    <!-- Summary -->
    <text x="440" y="440" text-anchor="middle" font-size="12" fill="#888">zstd는 gzip급 속도에서 더 높은 압축률, 높은 레벨에서는 brotli에 근접 — 해제 속도는 전 레벨에서 최상급</text>
  </g>
</svg>
