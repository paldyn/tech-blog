<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">자주 쓰는 JDK 명령어 예시</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">컴파일 → 실행 → 패키징 → 진단 플로우</text>

  <!-- Left column: Compile & Run -->
  <text x="80" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">컴파일 &amp; 실행</text>
  <rect x="80" y="114" width="360" height="148" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="96" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 단일 파일 컴파일</text>
  <text x="96" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">javac <tspan fill="#ce9178">-d out src/Hello.java</tspan></text>
  <text x="96" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 실행</text>
  <text x="96" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">java <tspan fill="#ce9178">-cp out</tspan> Hello</text>
  <text x="96" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 소스 직접 실행 (Java 11+)</text>
  <text x="96" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">java <tspan fill="#ce9178">src/Hello.java</tspan></text>
  <text x="96" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 바이트코드 역어셈블</text>
  <text x="96" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">javap <tspan fill="#ce9178">-c -verbose</tspan> out/Hello.class</text>

  <!-- Left column: JAR packaging -->
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">JAR 패키징</text>
  <rect x="80" y="300" width="360" height="130" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="96" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># JAR 생성 (메인 클래스 지정)</text>
  <text x="96" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">jar <tspan fill="#7ec8e3">--create</tspan> <tspan fill="#b5cea8">--file</tspan>=app.jar \</text>
  <text x="96" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#b5cea8">--main-class</tspan>=Hello <tspan fill="#ce9178">-C out .</tspan></text>
  <text x="96" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># JAR 실행</text>
  <text x="96" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">java <tspan fill="#7ec8e3">-jar</tspan> app.jar</text>
  <text x="96" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># JAR 내용 확인</text>
  <text x="96" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">jar <tspan fill="#7ec8e3">--list</tspan> <tspan fill="#b5cea8">--file</tspan>=app.jar</text>

  <!-- Right column: Diagnostic commands -->
  <text x="460" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">진단 &amp; 모니터링</text>
  <rect x="460" y="114" width="360" height="202" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 실행 중인 Java 프로세스 확인</text>
  <text x="476" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">jps <tspan fill="#7ec8e3">-lv</tspan></text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># GC 통계 (1초 간격 10회)</text>
  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">jstat <tspan fill="#7ec8e3">-gcutil</tspan> <tspan fill="#b5cea8">&lt;pid&gt;</tspan> <tspan fill="#ce9178">1000 10</tspan></text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 스레드 덤프</text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">jstack <tspan fill="#b5cea8">&lt;pid&gt;</tspan> &gt; thread.txt</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 힙 히스토그램</text>
  <text x="476" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">jcmd <tspan fill="#b5cea8">&lt;pid&gt;</tspan> <tspan fill="#7ec8e3">GC.heap_info</tspan></text>
  <text x="476" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># Flight Recorder 시작</text>
  <text x="476" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">jcmd <tspan fill="#b5cea8">&lt;pid&gt;</tspan> <tspan fill="#7ec8e3">JFR.start</tspan> \</text>
  <text x="476" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#ce9178">duration=60s filename=rec.jfr</tspan></text>

  <!-- Right column: jdeps -->
  <text x="460" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">의존성 분석</text>
  <rect x="460" y="354" width="360" height="94" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="476" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># JAR 모듈 의존성 분석</text>
  <text x="476" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">jdeps <tspan fill="#7ec8e3">--multi-release 21</tspan> \</text>
  <text x="476" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      <tspan fill="#7ec8e3">--print-module-deps</tspan> app.jar</text>
  <text x="476" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 출력 예: java.base,java.logging</text>

  <!-- Bottom note -->
  <text x="440" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">&lt;pid&gt; 는 jps 명령으로 확인한 프로세스 ID</text>
</svg>
