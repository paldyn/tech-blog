<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">Stop-The-World — 앱 스레드가 멈추고 GC가 일한다</text>

  <!-- STW band -->
  <rect x="430" y="78" width="180" height="190" rx="6" fill="#e05555" fill-opacity="0.12" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="520" y="98" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">STW Pause</text>

  <!-- lanes -->
  <!-- App A -->
  <text x="60" y="135" font-size="14" fill="#e8e8e8">App 스레드 A</text>
  <rect x="210" y="123" width="220" height="18" rx="3" fill="#55c555"/>
  <rect x="610" y="123" width="210" height="18" rx="3" fill="#55c555"/>
  <!-- App B -->
  <text x="60" y="172" font-size="14" fill="#e8e8e8">App 스레드 B</text>
  <rect x="210" y="160" width="220" height="18" rx="3" fill="#55c555"/>
  <rect x="610" y="160" width="210" height="18" rx="3" fill="#55c555"/>
  <!-- App C -->
  <text x="60" y="209" font-size="14" fill="#e8e8e8">App 스레드 C</text>
  <rect x="210" y="197" width="220" height="18" rx="3" fill="#55c555"/>
  <rect x="610" y="197" width="210" height="18" rx="3" fill="#55c555"/>
  <!-- GC -->
  <text x="60" y="246" font-size="14" fill="#e8e8e8">GC 스레드</text>
  <rect x="430" y="234" width="180" height="18" rx="3" fill="#e0a055"/>

  <!-- bottom labels -->
  <text x="320" y="300" font-size="13" fill="#888" text-anchor="middle">실행 중 (running)</text>
  <text x="520" y="300" font-size="13" fill="#888" text-anchor="middle">전 스레드 정지 → GC 수행</text>
  <text x="715" y="300" font-size="13" fill="#888" text-anchor="middle">재개 (resume)</text>
</svg>
