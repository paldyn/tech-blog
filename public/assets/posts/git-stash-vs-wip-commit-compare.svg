<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">stash vs WIP 커밋 비교</text>

  <!-- Headers -->
  <rect x="60" y="70" width="360" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">git stash</text>

  <rect x="460" y="70" width="360" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">WIP 커밋</text>

  <!-- Row 1: scope -->
  <text x="40" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">범위</text>
  <rect x="60" y="124" width="360" height="36" rx="4" fill="#111122" stroke="#333" stroke-width="1"/>
  <text x="240" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">로컬 전용 (push 불가)</text>
  <rect x="460" y="124" width="360" height="36" rx="4" fill="#111811" stroke="#333" stroke-width="1"/>
  <text x="640" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">원격 push 가능</text>

  <!-- Row 2: history -->
  <text x="40" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">히스토리</text>
  <rect x="60" y="172" width="360" height="36" rx="4" fill="#111122" stroke="#333" stroke-width="1"/>
  <text x="240" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">별도 스택, git log에 안 보임</text>
  <rect x="460" y="172" width="360" height="36" rx="4" fill="#111811" stroke="#333" stroke-width="1"/>
  <text x="640" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">일반 커밋, git log에 보임</text>

  <!-- Row 3: restore -->
  <text x="40" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">복원</text>
  <rect x="60" y="220" width="360" height="36" rx="4" fill="#111122" stroke="#333" stroke-width="1"/>
  <text x="240" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">stash pop / apply</text>
  <rect x="460" y="220" width="360" height="36" rx="4" fill="#111811" stroke="#333" stroke-width="1"/>
  <text x="640" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">git reset HEAD~1</text>

  <!-- Row 4: duration -->
  <text x="40" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">지속성</text>
  <rect x="60" y="268" width="360" height="36" rx="4" fill="#111122" stroke="#333" stroke-width="1"/>
  <text x="240" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a42a">GC 후 영구 삭제 가능</text>
  <rect x="460" y="268" width="360" height="36" rx="4" fill="#111811" stroke="#333" stroke-width="1"/>
  <text x="640" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">push 시 영구 보존</text>

  <!-- Row 5: conflict risk -->
  <text x="40" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">충돌 위험</text>
  <rect x="60" y="316" width="360" height="36" rx="4" fill="#111122" stroke="#333" stroke-width="1"/>
  <text x="240" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">브랜치 변경 후 적용 시 충돌</text>
  <rect x="460" y="316" width="360" height="36" rx="4" fill="#111811" stroke="#333" stroke-width="1"/>
  <text x="640" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">rebase로 정리 필요</text>

  <!-- Recommendation -->
  <rect x="60" y="376" width="760" height="48" rx="6" fill="#1a1000" stroke="#e8a42a" stroke-width="1.5"/>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a42a">단기 전환 → stash   /   장기 보존·공유 → WIP 커밋</text>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">WIP 커밋은 push 후 squash 또는 amend로 정리 예정</text>
</svg>
