<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSX: JavaScript + XML</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Babel이 JSX를 React.createElement() 호출로 변환한다</text>

  <!-- JSX code box -->
  <rect x="60" y="96" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JSX</text>
  <text x="80" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan> </tspan>
    <tspan fill="#ffffff">Button</tspan>
    <tspan fill="#ffffff">() {</tspan>
  </text>
  <text x="80" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> (</tspan>
  </text>
  <text x="80" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    </tspan><tspan fill="#ce9178">&lt;button</tspan><tspan> </tspan><tspan fill="#b5cea8">className</tspan><tspan>=</tspan><tspan fill="#ce9178">"btn"</tspan><tspan>&gt;</tspan>
  </text>
  <text x="80" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      클릭</tspan>
  </text>
  <text x="80" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    </tspan><tspan fill="#ce9178">&lt;/button&gt;</tspan>
  </text>
  <text x="80" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  );</tspan>
  </text>

  <!-- arrow -->
  <line x1="420" y1="170" x2="460" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Babel</text>

  <!-- Compiled JS code box -->
  <rect x="460" y="96" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Compiled JS</text>
  <text x="480" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> </tspan><tspan fill="#ffffff">Button() {</tspan>
  </text>
  <text x="480" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> _jsx(</tspan>
  </text>
  <text x="480" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    </tspan><tspan fill="#ce9178">"button"</tspan><tspan>,</tspan>
  </text>
  <text x="480" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    { </tspan><tspan fill="#b5cea8">className</tspan><tspan>: </tspan><tspan fill="#ce9178">"btn"</tspan><tspan> },</tspan>
  </text>
  <text x="480" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    </tspan><tspan fill="#ce9178">"클릭"</tspan>
  </text>
  <text x="480" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  );</tspan>
  </text>

  <!-- Rules section -->
  <text x="60" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">JSX 핵심 규칙</text>

  <rect x="60" y="302" width="370" height="160" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">반드시 지켜야 하는 규칙</text>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">① 최상위 요소는 반드시 하나</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">② 모든 태그는 반드시 닫음 &lt;img /&gt;</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">③ class → className</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">④ style은 객체 → style=&#123;&#123; color: 'red' &#125;&#125;</text>
  <text x="80" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">* 이벤트 핸들러도 카멜케이스: onclick → onClick</text>

  <rect x="450" y="302" width="370" height="160" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">중괄호 &#123; &#125; — JS 표현식 삽입</text>
  <text x="470" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">변수: &#123;name&#125;</text>
  <text x="470" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">연산: &#123;count + 1&#125;</text>
  <text x="470" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">함수 호출: &#123;getName()&#125;</text>
  <text x="470" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">삼항 연산자: &#123;ok ? 'Y' : 'N'&#125;</text>
  <text x="470" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">* 문(statement)은 불가. if/for를 직접 쓸 수 없음</text>
</svg>
