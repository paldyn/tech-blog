<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSX 핵심 문법 규칙</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">HTML과 비슷하지만 JavaScript 규칙을 따른다</text>

  <!-- Rule 1: Single Root -->
  <rect x="55" y="95" width="370" height="145" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="118" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">규칙 1: 단일 루트 요소</text>
  <rect x="70" y="128" width="340" height="100" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ❌ 오류: 루트 2개</text>
  <text x="82" y="166" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">return</text>
  <text x="120" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> &lt;h1&gt;제목&lt;/h1&gt;&lt;p&gt;본문&lt;/p&gt;</text>
  <text x="82" y="184" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ✅ 올바름: &lt;&gt;로 감싸기</text>
  <text x="82" y="202" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">return</text>
  <text x="120" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> (&lt;&gt;&lt;h1/&gt;&lt;p/&gt;&lt;/&gt;)</text>
  <text x="82" y="220" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 또는 &lt;div&gt;로 감싸기</text>

  <!-- Rule 2: className -->
  <rect x="455" y="95" width="370" height="145" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">규칙 2: className / htmlFor</text>
  <rect x="470" y="128" width="340" height="100" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ❌ HTML 속성명 사용 불가</text>
  <text x="482" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;div</text>
  <text x="510" y="166" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve"> class</text>
  <text x="549" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">="box"&gt;</text>
  <text x="482" y="184" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ✅ camelCase 사용</text>
  <text x="482" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;div</text>
  <text x="510" y="202" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve"> className</text>
  <text x="592" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">="box"&gt;</text>
  <text x="482" y="220" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// for -&gt; htmlFor</text>

  <!-- Rule 3: Expressions -->
  <rect x="55" y="260" width="370" height="135" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="283" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">규칙 3: 중괄호로 JS 표현식</text>
  <rect x="70" y="293" width="340" height="90" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="313" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// {} 안에 JS 표현식</text>
  <text x="82" y="331" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;p&gt;{</text>
  <text x="110" y="331" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">user.name</text>
  <text x="177" y="331" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}&lt;/p&gt;</text>
  <text x="82" y="349" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;p&gt;{</text>
  <text x="110" y="349" font-size="13" fill="#b5cea8" font-family="'JetBrains Mono',monospace" xml:space="preserve">2 + 3</text>
  <text x="148" y="349" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}&lt;/p&gt;</text>
  <text x="82" y="367" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;p&gt;{</text>
  <text x="110" y="367" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">fn()</text>
  <text x="143" y="367" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}&lt;/p&gt;</text>

  <!-- Rule 4: Self-closing -->
  <rect x="455" y="260" width="370" height="135" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="283" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">규칙 4: 태그 반드시 닫기</text>
  <rect x="470" y="293" width="340" height="90" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="313" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ❌ HTML에서는 OK, JSX는 오류</text>
  <text x="482" y="331" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;img src="cat.jpg"&gt;</text>
  <text x="482" y="349" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ✅ 자기닫힘(/) 필수</text>
  <text x="482" y="367" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;img src="cat.jpg"</text>
  <text x="618" y="367" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace" xml:space="preserve"> /&gt;</text>
  <text x="482" y="385" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;br /&gt;  &lt;input /&gt;</text>

  <!-- Bottom tip -->
  <rect x="55" y="420" width="770" height="55" rx="8" fill="#111118" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="444" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">JSX는 컴파일 타임에 JavaScript로 바뀐다 — 런타임 오버헤드 없음</text>
  <text x="440" y="462" font-size="12" fill="#888" text-anchor="middle">style 속성은 객체로: style={{ color: 'red', fontSize: '16px' }}</text>
</svg>
