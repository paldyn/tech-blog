<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="aReq" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="aRes" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HTTP 요청 · 응답 구조</text>

  <!-- Client -->
  <rect x="50" y="90" width="160" height="260" rx="10" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="2"/>
  <text x="130" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">클라이언트</text>
  <text x="130" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(브라우저/앱)</text>
  <line x1="70" y1="160" x2="190" y2="160" stroke="#1a3a5a" stroke-width="1"/>
  <text x="130" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TCP 연결</text>
  <text x="130" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(3-way handshake)</text>
  <text x="130" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">요청 전송</text>
  <text x="130" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답 수신</text>
  <text x="130" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">렌더링</text>

  <!-- Request box -->
  <rect x="280" y="78" width="300" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="430" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">HTTP 요청</text>
  <line x1="296" y1="112" x2="564" y2="112" stroke="#1a2a4a" stroke-width="1"/>
  <text x="296" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a055" xml:space="preserve">GET /index.html HTTP/1.1</text>
  <text x="296" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">Host: example.com</text>
  <text x="296" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">Accept: text/html</text>
  <text x="296" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">Cookie: session=abc123</text>

  <!-- Response box -->
  <rect x="280" y="258" width="300" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="430" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">HTTP 응답</text>
  <line x1="296" y1="292" x2="564" y2="292" stroke="#1a2a4a" stroke-width="1"/>
  <text x="296" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">HTTP/1.1 200 OK</text>
  <text x="296" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">Content-Type: text/html</text>
  <text x="296" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">Content-Length: 1234</text>
  <text x="296" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">&lt;blank line&gt;</text>
  <text x="296" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">&lt;!DOCTYPE html&gt;...</text>

  <!-- Server -->
  <rect x="660" y="90" width="160" height="260" rx="10" fill="#1a0f20" stroke="#6a3a8a" stroke-width="2"/>
  <text x="740" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#b87ce8">서버</text>
  <text x="740" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(Nginx / Apache)</text>
  <line x1="680" y1="160" x2="800" y2="160" stroke="#3a1a5a" stroke-width="1"/>
  <text x="740" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">요청 수신</text>
  <text x="740" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">처리 (파일 / API)</text>
  <text x="740" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답 생성</text>
  <text x="740" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전송</text>

  <!-- Arrows -->
  <line x1="210" y1="143" x2="280" y2="143" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aReq)"/>
  <line x1="580" y1="143" x2="660" y2="143" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aReq)"/>
  <text x="435" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">요청</text>

  <line x1="660" y1="332" x2="580" y2="332" stroke="#55c555" stroke-width="2" marker-end="url(#aRes)"/>
  <line x1="280" y1="332" x2="210" y2="332" stroke="#55c555" stroke-width="2" marker-end="url(#aRes)"/>
  <text x="435" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">응답</text>

  <!-- Stateless note -->
  <rect x="50" y="424" width="780" height="40" rx="6" fill="#0f1a0f" stroke="#1a4a2a" stroke-width="1"/>
  <text x="440" y="449" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HTTP는 무상태(Stateless) — 각 요청은 독립적. 서버는 이전 요청을 기억하지 않음. 상태 유지에는 쿠키·세션 필요.</text>
</svg>
