<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">fixture의 scope: 재생성 주기</text>

  <rect x="60" y="92" width="180" height="80" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="124" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">function</text>
  <text x="150" y="148" font-size="12" fill="#888" text-anchor="middle">테스트마다(기본)</text>

  <rect x="260" y="92" width="180" height="80" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="350" y="124" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">class</text>
  <text x="350" y="148" font-size="12" fill="#888" text-anchor="middle">클래스마다</text>

  <rect x="460" y="92" width="180" height="80" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="124" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">module</text>
  <text x="550" y="148" font-size="12" fill="#888" text-anchor="middle">파일마다</text>

  <rect x="660" y="92" width="160" height="80" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="124" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">session</text>
  <text x="740" y="148" font-size="12" fill="#888" text-anchor="middle">전체 1번</text>

  <rect x="60" y="206" width="760" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">@pytest.fixture(scope="module")</text>

  <text x="60" y="298" font-size="13" fill="#888" xml:space="preserve">왼쪽으로 갈수록 자주 재생성되어 격리는 강하지만 느리고, 오른쪽일수록 공유되어 빠르다.</text>
</svg>
