<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Zod 스키마 기반 유효성 검사</text>

  <!-- Schema Box -->
  <rect x="60" y="70" width="360" height="280" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Zod 스키마 정의</text>

  <rect x="76" y="108" width="328" height="230" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan> { z } <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">'zod'</tspan>;</text>
  <text x="92" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"></text>
  <text x="92" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> schema = z.object({</text>
  <text x="92" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  name: z.string().min(<tspan fill="#b5cea8">2</tspan>),</text>
  <text x="92" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  email: z.string().email(),</text>
  <text x="92" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  age: z.number().min(<tspan fill="#b5cea8">18</tspan>).max(<tspan fill="#b5cea8">120</tspan>),</text>
  <text x="92" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  pw: z.string().min(<tspan fill="#b5cea8">8</tspan>),</text>
  <text x="92" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  confirm: z.string(),</text>
  <text x="92" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}).refine(d =&gt; d.pw === d.confirm, {</text>
  <text x="92" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  message: <tspan fill="#ce9178">'비밀번호 불일치'</tspan>,</text>
  <text x="92" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">});</text>

  <!-- Arrow -->
  <line x1="420" y1="210" x2="475" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="447" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">zodResolver</text>

  <!-- RHF integration box -->
  <rect x="475" y="70" width="345" height="280" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="648" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">React Hook Form 연결</text>

  <rect x="491" y="108" width="313" height="230" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="507" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan> { zodResolver } <tspan fill="#7ec8e3" font-weight="600">from</tspan></text>
  <text x="507" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">'@hookform/resolvers/zod'</tspan>;</text>
  <text x="507" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"></text>
  <text x="507" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> { register,</text>
  <text x="507" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  handleSubmit, formState }</text>
  <text x="507" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  = <tspan fill="#7ec8e3" font-weight="600">useForm</tspan>({</text>
  <text x="507" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    resolver: <tspan fill="#7ec8e3" font-weight="600">zodResolver</tspan>(schema),</text>
  <text x="507" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    mode: <tspan fill="#ce9178">'all'</tspan>,</text>
  <text x="507" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  });</text>
  <text x="507" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// TypeScript 타입 자동 추론</text>
  <text x="507" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// z.infer&lt;typeof schema&gt;</text>

  <!-- Bottom labels -->
  <text x="60" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">Zod의 장점</text>

  <rect x="60" y="406" width="180" height="54" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">타입 자동 추론</text>
  <text x="150" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">z.infer&lt;typeof schema&gt;</text>

  <rect x="256" y="406" width="180" height="54" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="346" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">크로스 필드 검사</text>
  <text x="346" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.refine() / .superRefine()</text>

  <rect x="452" y="406" width="180" height="54" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="542" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">서버·클라이언트 공유</text>
  <text x="542" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">동일 스키마 재사용</text>

  <rect x="648" y="406" width="192" height="54" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="744" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">에러 메시지 커스텀</text>
  <text x="744" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.min(8, { message: '...' })</text>
</svg>
