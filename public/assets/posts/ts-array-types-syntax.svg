<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">배열 타입 선언 방법 비교</text>

  <!-- LEFT column label -->
  <text x="230" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">T[] 문법</text>

  <!-- LEFT code box: y=105, height=220 → bottom=325, top-pad=14, bottom-pad=14 -->
  <rect x="60" y="105" width="340" height="220" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 배열 리터럴 문법</text>
  <text x="76" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> nums: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">[] = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">];</tspan>
  </text>
  <text x="76" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> strs: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">[] = [</tspan><tspan fill="#ce9178">'a'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'b'</tspan><tspan fill="#ffffff">];</tspan>
  </text>
  <text x="76" y="186" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> flags: </tspan><tspan fill="#7ec8e3" font-weight="600">boolean</tspan><tspan fill="#ffffff">[] = [</tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">];</tspan>
  </text>
  <text x="76" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 중첩 배열</text>
  <text x="76" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> matrix: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">[][] = [[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">]];</tspan>
  </text>

  <!-- RIGHT column label -->
  <text x="640" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">Array&lt;T&gt; 문법</text>

  <!-- RIGHT code box: y=105, height=220 → bottom=325 -->
  <rect x="460" y="105" width="360" height="220" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="476" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 제네릭 문법</text>
  <text x="476" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> nums: Array&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">&gt; = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">];</tspan>
  </text>
  <text x="476" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> strs: Array&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">&gt; = [</tspan><tspan fill="#ce9178">'a'</tspan><tspan fill="#ffffff">];</tspan>
  </text>
  <text x="476" y="186" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> flags: Array&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">boolean</tspan><tspan fill="#ffffff">&gt; = [];</tspan>
  </text>
  <text x="476" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 중첩 배열</text>
  <text x="476" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> m: Array&lt;Array&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">&gt;&gt; = [];</tspan>
  </text>

  <!-- Note box: y=345, height=54 → bottom=399, top-pad≈14, bottom-pad≈14 -->
  <rect x="60" y="345" width="760" height="54" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="440" y="377" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">두 문법은 완전히 동일 — 팀/프로젝트 컨벤션에 따라 선택</text>
</svg>
