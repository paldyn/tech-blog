<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">보안 마인드셋 5가지 핵심 질문</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">코드 작성 전에 스스로 물어야 할 것들</text>

  <!-- Q1 -->
  <rect x="60" y="100" width="360" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Q1. 이 입력을 신뢰할 수 있는가?</text>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 외부 입력은 검증 전까지 악성으로 가정</text>
  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">URL, 헤더, 쿠키, 파일, API 응답 모두 포함</text>

  <!-- Q2 -->
  <rect x="460" y="100" width="360" height="80" rx="8" fill="#2a1a0d" stroke="#e0a055" stroke-width="1.5"/>
  <text x="480" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a055">Q2. 이 정보를 노출해야 하는가?</text>
  <text x="480" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">오류 메시지, 로그, API 응답에서 불필요한</text>
  <text x="480" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정보 제거 — 스택 트레이스, 버전 정보 등</text>

  <!-- Q3 -->
  <rect x="60" y="200" width="360" height="80" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Q3. 권한 검증이 빠진 곳은 없는가?</text>
  <text x="80" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 API 엔드포인트, 페이지, 파일 접근에</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">명시적 인증·인가 확인 추가</text>

  <!-- Q4 -->
  <rect x="460" y="200" width="360" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">Q4. 이 실패를 어떻게 알 수 있는가?</text>
  <text x="480" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">침해·이상 동작을 감지할 로그와 알림을</text>
  <text x="480" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">미리 설계 — 탐지 없는 방어는 반쪽</text>

  <!-- Q5 -->
  <rect x="60" y="300" width="760" height="80" rx="8" fill="#2a1a2a" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="440" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#cc77cc" text-anchor="middle">Q5. 최악의 시나리오는 무엇이며, 피해를 최소화할 수 있는가?</text>
  <text x="440" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이 코드가 완전히 침해된다면 어떤 피해가 발생하나?</text>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">피해 반경을 최소화할 방법은? (격리, 최소 권한, 암호화)</text>

  <!-- Bottom -->
  <rect x="60" y="400" width="760" height="30" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">이 다섯 질문을 PR 리뷰마다 체크하면 보안 회귀(regression)를 대폭 줄일 수 있다</text>
</svg>
