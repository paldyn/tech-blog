<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">자주 쓰는 유틸리티 타입 치트시트</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">입력 → 출력 패턴으로 외우기</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="360" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Partial: 모든 속성 optional</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> P = Partial&lt;{ a: <tspan fill="#b5cea8">string</tspan>; b: <tspan fill="#b5cea8">number</tspan> }&gt;; <tspan fill="#9aa4b8">// { a?: string; b?: number }</tspan></text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Pick/Omit: 속성 선택 / 제외</text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Q = Pick&lt;User, <tspan fill="#ce9178">"id"</tspan> | <tspan fill="#ce9178">"name"</tspan>&gt;;      <tspan fill="#9aa4b8">// id, name만 추출</tspan></text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> R = Omit&lt;User, <tspan fill="#ce9178">"password"</tspan>&gt;;       <tspan fill="#9aa4b8">// password 제외</tspan></text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Extract/Exclude: 유니언 필터링</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> E1 = Extract&lt;<tspan fill="#b5cea8">string</tspan> | <tspan fill="#b5cea8">number</tspan> | <tspan fill="#b5cea8">boolean</tspan>, <tspan fill="#b5cea8">string</tspan> | <tspan fill="#b5cea8">number</tspan>&gt;; <tspan fill="#9aa4b8">// string | number</tspan></text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> E2 = Exclude&lt;<tspan fill="#b5cea8">string</tspan> | <tspan fill="#b5cea8">number</tspan> | <tspan fill="#b5cea8">boolean</tspan>, <tspan fill="#b5cea8">boolean</tspan>&gt;;    <tspan fill="#9aa4b8">// string | number</tspan></text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ReturnType / Parameters / Awaited</text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> RT = ReturnType&lt;<tspan fill="#7ec8e3" font-weight="600">typeof</tspan> fetch&gt;;    <tspan fill="#9aa4b8">// Promise&lt;Response&gt;</tspan></text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> AW = Awaited&lt;Promise&lt;Promise&lt;<tspan fill="#b5cea8">string</tspan>&gt;&gt;&gt;; <tspan fill="#9aa4b8">// string</tspan></text>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Record: 키-값 쌍 객체 타입</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Dict = Record&lt;<tspan fill="#b5cea8">string</tspan>, <tspan fill="#b5cea8">number</tspan>&gt;;  <tspan fill="#9aa4b8">// { [key: string]: number }</tspan></text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Map2 = Record&lt;<tspan fill="#ce9178">"a"</tspan> | <tspan fill="#ce9178">"b"</tspan>, <tspan fill="#b5cea8">boolean</tspan>&gt;; <tspan fill="#9aa4b8">// { a: boolean; b: boolean }</tspan></text>
  <text x="76" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// NonNullable: null | undefined 제거</text>

  <!-- Note -->
  <rect x="60" y="462" width="760" height="0" rx="4"/>
</svg>
