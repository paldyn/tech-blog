<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">process.env · 종료 처리 패턴</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">환경 변수 접근(왼쪽)과 graceful shutdown(오른쪽)</text>

  <!-- Left: env access -->
  <text x="60" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">환경 변수 접근</text>
  <rect x="60" y="112" width="370" height="270" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="140" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">// 환경 변수 읽기</text>
  <text x="76" y="158" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">const</text>
  <text x="116" y="158" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> port = process.env.PORT ?? </text>
  <text x="338" y="158" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">'3000'</text>
  <text x="376" y="158" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">;</text>

  <text x="76" y="194" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">// NODE_ENV 확인</text>
  <text x="76" y="212" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">const</text>
  <text x="116" y="212" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> isDev = process.env.NODE_ENV === </text>
  <text x="76" y="230" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  'development'</text>
  <text x="166" y="230" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">;</text>

  <text x="76" y="266" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">// argv 파싱 (node script.js --port 8080)</text>
  <text x="76" y="284" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">const</text>
  <text x="116" y="284" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> args = process.argv.slice(</text>
  <text x="324" y="284" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">2</text>
  <text x="330" y="284" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">);</text>

  <text x="76" y="320" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">// process.hrtime.bigint() — 고해상도 타이머</text>
  <text x="76" y="338" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">const</text>
  <text x="116" y="338" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> start = process.hrtime.bigint();</text>
  <text x="76" y="356" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">// 작업 후</text>
  <text x="76" y="374" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">const</text>
  <text x="116" y="374" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> ns = process.hrtime.bigint() - start;</text>

  <!-- Right: graceful shutdown -->
  <text x="450" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Graceful Shutdown</text>
  <rect x="450" y="112" width="370" height="270" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="466" y="140" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">async function</text>
  <text x="566" y="140" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> shutdown() {</text>
  <text x="466" y="158" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  console.log(</text>
  <text x="566" y="158" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">'종료 시작'</text>
  <text x="626" y="158" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">);</text>
  <text x="466" y="176" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  await</text>
  <text x="506" y="176" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> db.close();</text>
  <text x="466" y="194" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  await</text>
  <text x="506" y="194" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> server.close();</text>
  <text x="466" y="212" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  process.exitCode = </text>
  <text x="602" y="212" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">0</text>
  <text x="608" y="212" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">;</text>
  <text x="466" y="230" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">}</text>

  <text x="466" y="266" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">// 시그널 처리</text>
  <text x="466" y="284" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">for</text>
  <text x="490" y="284" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> (</text>
  <text x="506" y="284" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">const</text>
  <text x="546" y="284" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> sig </text>
  <text x="580" y="284" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">of</text>
  <text x="598" y="284" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> [</text>
  <text x="466" y="302" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  'SIGTERM'</text>
  <text x="558" y="302" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">, </text>
  <text x="576" y="302" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">'SIGINT'</text>
  <text x="628" y="302" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">]) {</text>
  <text x="466" y="320" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  process.on(sig, shutdown);</text>
  <text x="466" y="338" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">}</text>

  <text x="466" y="374" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">process.on(</text>
  <text x="556" y="374" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">'uncaughtException'</text>
  <text x="686" y="374" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">,</text>
  <text x="466" y="392" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  (err) =&gt; { logger.fatal(err); shutdown(); });</text>

  <!-- Bottom note -->
  <text x="440" y="405" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">process.exit() 대신 process.exitCode 설정 → 자연 종료 권장 (비동기 정리 가능)</text>
</svg>
