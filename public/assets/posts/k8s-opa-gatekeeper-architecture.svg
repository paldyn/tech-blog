<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="580" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OPA Gatekeeper &#x2014; 아키텍처 &amp; 요청 흐름</text>

  <!-- Section label: Policy Resources -->
  <text x="440" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">정책 정의 레이어</text>

  <!-- ConstraintTemplate -->
  <rect x="60" y="94" width="210" height="80" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="165" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ConstraintTemplate</text>
  <text x="165" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정책 스키마 + Rego 정의</text>
  <text x="165" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">새 CRD 자동 생성</text>

  <!-- Arrow: ConstraintTemplate to Constraint -->
  <line x1="270" y1="134" x2="318" y2="134" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="294" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">CRD 생성</text>

  <!-- Constraint -->
  <rect x="318" y="94" width="210" height="80" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="423" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Constraint</text>
  <text x="423" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">파라미터 + 적용 범위</text>
  <text x="423" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">enforcementAction 설정</text>

  <!-- Arrow: Constraint to Gatekeeper Webhook -->
  <line x1="528" y1="134" x2="576" y2="134" stroke="#7777cc" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="552" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">정책 로드</text>

  <!-- Gatekeeper Webhook (top) -->
  <rect x="576" y="94" width="244" height="80" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="698" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Gatekeeper Webhook</text>
  <text x="698" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ValidatingWebhookConfiguration</text>
  <text x="698" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">gatekeeper-system (HA 3 replicas)</text>

  <!-- Section label: Request Flow -->
  <text x="440" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">API 요청 흐름</text>

  <!-- API Request box -->
  <rect x="60" y="226" width="140" height="60" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">API 요청</text>
  <text x="130" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">kubectl apply</text>

  <!-- Arrow to API Server -->
  <line x1="200" y1="256" x2="248" y2="256" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- API Server box -->
  <rect x="248" y="226" width="160" height="60" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="328" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">kube-apiserver</text>
  <text x="328" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Admission 단계</text>

  <!-- Arrow to Gatekeeper -->
  <line x1="408" y1="256" x2="456" y2="256" stroke="#7777cc" stroke-width="2" marker-end="url(#arrPurple)"/>

  <!-- Gatekeeper Webhook (middle flow) -->
  <rect x="456" y="216" width="190" height="80" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="551" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Gatekeeper</text>
  <text x="551" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Webhook 수신</text>
  <text x="551" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">OPA 엔진 호출</text>

  <!-- Arrow to OPA Evaluate -->
  <line x1="646" y1="256" x2="690" y2="256" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- OPA Evaluate -->
  <rect x="690" y="226" width="150" height="60" rx="8" fill="#1a1a0a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="765" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">OPA + Rego</text>
  <text x="765" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정책 평가</text>

  <!-- Decision arrows -->
  <line x1="765" y1="286" x2="765" y2="332" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="775" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">결과</text>

  <!-- Allow -->
  <line x1="755" y1="348" x2="665" y2="388" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrGreen)"/>
  <rect x="560" y="388" width="160" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Allow</text>
  <text x="640" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">요청 허용 &#x2192; etcd</text>

  <!-- Deny -->
  <line x1="775" y1="348" x2="800" y2="388" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrRed)"/>
  <rect x="730" y="388" width="120" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="790" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Deny</text>
  <text x="790" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">거부 메시지</text>

  <!-- OPA decision node -->
  <rect x="730" y="332" width="70" height="36" rx="6" fill="#1a1a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="765" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">평가 결과</text>

  <!-- Audit Controller section -->
  <text x="250" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Audit Controller (비동기)</text>

  <rect x="60" y="372" width="440" height="76" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="280" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Audit Controller</text>
  <text x="280" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">기존 리소스 주기적 재검사 (기본 60초)</text>
  <text x="280" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">위반 &#x2192; Constraint.status.violations 에 기록</text>

  <!-- Footer legend -->
  <text x="440" y="530" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">실선: 동기 요청 경로  |  점선: 결과 분기 / 비동기 경로</text>
</svg>
