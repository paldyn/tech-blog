<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Strict mode 적용 범위와 활성화 방법</text>

  <!-- Left: Script level -->
  <rect x="60" y="68" width="230" height="240" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">스크립트 전체 적용</text>
  <rect x="76" y="104" width="198" height="176" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"use strict"</text>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 이 파일 전체에</text>
  <text x="92" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// strict mode 적용</text>
  <text x="92" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="164" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> foo() {</text>
  <text x="92" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  x = </text>
  <text x="136" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="144" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="92" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">  // → ReferenceError</text>
  <text x="92" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Middle: Function level -->
  <rect x="325" y="68" width="230" height="240" rx="10" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">함수 단위 적용</text>
  <rect x="341" y="104" width="198" height="176" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="357" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 전역: sloppy</text>
  <text x="357" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">x = </text>
  <text x="389" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="397" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; </text>
  <text x="357" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="429" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> strict() {</text>
  <text x="357" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">  "use strict"</text>
  <text x="357" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  ;</text>
  <text x="357" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  y = </text>
  <text x="397" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="405" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="357" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">  // → ReferenceError</text>
  <text x="357" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Right: Always strict -->
  <rect x="590" y="68" width="230" height="240" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">항상 strict인 경우</text>
  <text x="705" y="108" text-anchor="middle" font-size="11" fill="#888">(선언 없이도 자동 적용)</text>
  <text x="610" y="134" font-size="12" fill="#7ec8e3">• ES Modules (import/export)</text>
  <text x="610" y="156" font-size="12" fill="#7ec8e3">• class 내부 코드</text>
  <text x="610" y="178" font-size="12" fill="#7ec8e3">• Webpack/번들러 산출물</text>
  <text x="610" y="200" font-size="12" fill="#7ec8e3">• TypeScript 컴파일 출력</text>
  <text x="610" y="222" font-size="12" fill="#7ec8e3">• Node --input-type=module</text>
  <text x="610" y="252" font-size="12" fill="#888">→ 현대 JavaScript는</text>
  <text x="610" y="270" font-size="12" fill="#888">  대부분 strict가 기본값</text>
  <text x="610" y="288" font-size="12" fill="#55c555">  (명시 불필요)</text>

  <!-- Key rule box -->
  <rect x="60" y="328" width="760" height="42" rx="8" fill="#0d1117" stroke="#f7df1e" stroke-width="1"/>
  <text x="440" y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#f7df1e">실용 원칙: 레거시 코드 수정 시 최상단에 "use strict" 추가 — 기존 sloppy 동작이 오류로 노출될 수 있음</text>
  <text x="440" y="364" text-anchor="middle" font-size="12" fill="#888">새 프로젝트는 ESM 또는 class를 사용하면 자동으로 strict 적용 → 별도 선언 불필요</text>

  <!-- Footer -->
  <text x="440" y="390" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #5</text>
</svg>
