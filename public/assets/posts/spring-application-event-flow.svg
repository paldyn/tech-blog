<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arrB" viewBox="0 0 21 14" refX="19" refY="7" markerUnits="userSpaceOnUse" markerWidth="21" markerHeight="14" orient="auto">
      <polygon points="0,0 21,7 0,14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 21 14" refX="19" refY="7" markerUnits="userSpaceOnUse" markerWidth="21" markerHeight="14" orient="auto">
      <polygon points="0,0 21,7 0,14" fill="#55c555"/>
    </marker>
    <marker id="arrY" viewBox="0 0 21 14" refX="19" refY="7" markerUnits="userSpaceOnUse" markerWidth="21" markerHeight="14" orient="auto">
      <polygon points="0,0 21,7 0,14" fill="#e0b755"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Spring ApplicationEvent 흐름</text>
  <text x="440" y="62" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Publisher → ApplicationContext (EventBus) → Listener 1 … N</text>

  <!-- ====== Publisher ====== -->
  <rect x="60" y="84" width="220" height="60" rx="8" fill="#0d1f35" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">이벤트 발행자</text>
  <text x="170" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ApplicationEventPublisher</text>

  <!-- Arrow Publisher → Event -->
  <line x1="280" y1="114" x2="318" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="299" y="107"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">publishEvent()</text>

  <!-- ====== Event Object ====== -->
  <rect x="320" y="84" width="240" height="60" rx="8" fill="#1a1228" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">이벤트 객체</text>
  <text x="440" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ApplicationEvent 서브클래스 (or POJO)</text>

  <!-- Arrow Event → ApplicationContext -->
  <line x1="560" y1="114" x2="598" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- ====== ApplicationContext (EventBus) ====== -->
  <rect x="600" y="84" width="220" height="60" rx="8" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ApplicationContext</text>
  <text x="710" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SimpleApplicationEventMulticaster</text>

  <!-- Arrow down from ApplicationContext to listeners -->
  <line x1="710" y1="144" x2="710" y2="178" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="710" y1="178" x2="240" y2="178" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="440" y1="178" x2="440" y2="178" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="660" y1="178" x2="660" y2="178" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Branch points to 3 listeners -->
  <line x1="240" y1="178" x2="240" y2="208" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="440" y1="178" x2="440" y2="208" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="660" y1="178" x2="660" y2="208" stroke="#e0b755" stroke-width="2" marker-end="url(#arrY)"/>

  <!-- Listener 1 -->
  <rect x="100" y="210" width="280" height="60" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">@EventListener (동기)</text>
  <text x="240" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">발행 스레드와 동일 스레드에서 실행</text>

  <!-- Listener 2 -->
  <rect x="300" y="210" width="280" height="60" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">@EventListener + @Order</text>
  <text x="440" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">@Order(1) → @Order(2) 순서 보장</text>

  <!-- Listener 3 (Async) -->
  <rect x="520" y="210" width="280" height="60" rx="8" fill="#1a1208" stroke="#e0b755" stroke-width="1.5"/>
  <text x="660" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0b755">@EventListener + @Async</text>
  <text x="660" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">별도 스레드풀에서 비동기 처리</text>

  <!-- Separator -->
  <line x1="60" y1="292" x2="820" y2="292" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">이벤트 타입별 설계 패턴</text>

  <!-- Pattern 1: ApplicationEvent -->
  <rect x="60" y="322" width="230" height="76" rx="8" fill="#0d1020" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="175" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ApplicationEvent 상속</text>
  <text x="175" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Spring 4.2 이전 방식</text>
  <text x="175" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">source 객체 필수</text>

  <!-- Pattern 2: POJO event -->
  <rect x="325" y="322" width="230" height="76" rx="8" fill="#0d1020" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">POJO 이벤트 (권장)</text>
  <text x="440" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Spring 4.2+, record 클래스 가능</text>
  <text x="440" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">상속 불필요, 불변 설계 용이</text>

  <!-- Pattern 3: Generic event -->
  <rect x="590" y="322" width="230" height="76" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">제네릭 이벤트</text>
  <text x="705" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PayloadApplicationEvent&lt;T&gt;</text>
  <text x="705" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">publishEvent(plainObject) 내부 래핑</text>

  <!-- Bottom note -->
  <rect x="60" y="414" width="760" height="36" rx="6" fill="#141414" stroke="#333"/>
  <text x="440" y="437" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본 Multicaster는 동기(단일 스레드) → 비동기 처리 필요 시 TaskExecutor를 주입한 SimpleApplicationEventMulticaster 재정의</text>
</svg>
