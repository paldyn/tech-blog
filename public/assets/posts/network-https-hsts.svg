<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HTTPS 보안 강화 메커니즘</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">HSTS · CSP · Certificate Transparency · OCSP Stapling</text>

  <!-- HSTS -->
  <rect x="60" y="88" width="370" height="96" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">HSTS (HTTP Strict Transport Security)</text>
  <text x="80" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">서버 응답 헤더:</text>
  <rect x="80" y="142" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">Strict-Transport-Security: max-age=31536000; includeSubDomains</text>
  <text x="80" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">브라우저가 HTTP 요청을 HTTPS로 자동 업그레이드</text>

  <!-- Certificate Transparency -->
  <rect x="450" y="88" width="370" height="96" rx="8" fill="#1a0d2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="635" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Certificate Transparency (CT)</text>
  <text x="470" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">모든 CA가 발급한 인증서를 공개 로그에 기록</text>
  <text x="470" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">도메인 소유자가 무단 인증서 발급 탐지 가능</text>
  <text x="470" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">크롬: CT 없으면 net::ERR_CERTIFICATE_TRANSPARENCY_REQUIRED</text>

  <!-- CAA -->
  <rect x="60" y="204" width="370" height="96" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">CAA (Certification Authority Authorization)</text>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">DNS CAA 레코드로 허용된 CA 지정:</text>
  <rect x="80" y="258" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="273" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">example.com CAA 0 issue "letsencrypt.org"</text>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">지정된 CA 외에서는 인증서 발급 불가</text>

  <!-- OCSP Stapling -->
  <rect x="450" y="204" width="370" height="96" rx="8" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="635" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c44a">OCSP Stapling</text>
  <text x="470" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">서버가 OCSP 응답을 주기적으로 가져와 캐시</text>
  <text x="470" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">TLS 핸드셰이크 시 Certificate Status 포함</text>
  <text x="470" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라이언트가 CA에 직접 확인 불필요 → 지연 감소</text>

  <!-- 하단 -->
  <rect x="60" y="320" width="760" height="44" rx="8" fill="#111"/>
  <text x="440" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">종합 보안 체크리스트</text>
  <text x="200" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TLS 1.3 강제</text>
  <text x="380" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HSTS + preload 등록</text>
  <text x="570" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CAA 레코드 설정</text>
  <text x="750" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">OCSP Stapling 활성화</text>
</svg>
