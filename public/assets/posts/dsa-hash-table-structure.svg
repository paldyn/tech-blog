<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-chain" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#9aa4b8"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">해시 테이블 — 체이닝(Chaining) 방식</text>

  <!-- ─── LEFT: Keys input ─── -->
  <text x="100" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">키 입력</text>

  <!-- key boxes -->
  <rect x="60" y="94" width="80" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="117" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"apple"</text>

  <rect x="60" y="138" width="80" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="161" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"banana"</text>

  <rect x="60" y="182" width="80" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="205" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"cherry"</text>

  <rect x="60" y="226" width="80" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="249" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"date"</text>

  <rect x="60" y="270" width="80" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="293" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"elderberry"</text>

  <!-- ─── MIDDLE: Hash function ─── -->
  <rect x="186" y="158" width="120" height="80" rx="10" fill="#1a1a3a" stroke="#5a5aaa" stroke-width="2"/>
  <text x="246" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">hash(key)</text>
  <text x="246" y="211" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8">% capacity</text>
  <text x="246" y="229" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">→ 인덱스</text>

  <!-- arrows keys → hash -->
  <line x1="140" y1="112" x2="186" y2="190" stroke="#3a5a8a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="140" y1="156" x2="186" y2="195" stroke="#3a5a8a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="140" y1="200" x2="186" y2="198" stroke="#3a5a8a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="140" y1="244" x2="186" y2="203" stroke="#3a5a8a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="140" y1="288" x2="186" y2="210" stroke="#3a5a8a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- ─── RIGHT: Hash table buckets ─── -->
  <text x="480" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">해시 테이블 (capacity=7)</text>

  <!-- bucket 0 -->
  <rect x="340" y="94" width="60" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="370" y="117" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">0</text>
  <!-- empty -->
  <text x="420" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#444">None</text>

  <!-- bucket 1 -->
  <rect x="340" y="138" width="60" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="370" y="161" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">1</text>
  <!-- "banana" at 1 -->
  <rect x="408" y="138" width="120" height="36" rx="4" fill="#0d1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="468" y="161" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"banana": 2</text>

  <!-- bucket 2 -->
  <rect x="340" y="182" width="60" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="370" y="205" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">2</text>
  <text x="420" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#444">None</text>

  <!-- bucket 3 — collision: apple + elderberry -->
  <rect x="340" y="226" width="60" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="370" y="249" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">3</text>
  <!-- chain: apple → elderberry -->
  <rect x="408" y="226" width="120" height="36" rx="4" fill="#0d1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="468" y="249" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"apple": 1</text>
  <line x1="528" y1="244" x2="556" y2="244" stroke="#9aa4b8" stroke-width="1.5" marker-end="url(#arr-chain)"/>
  <rect x="556" y="226" width="120" height="36" rx="4" fill="#0d1020" stroke="#e05555" stroke-width="1"/>
  <text x="616" y="249" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"elderberry"</text>
  <!-- collision badge -->
  <text x="696" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">충돌!</text>

  <!-- bucket 4 -->
  <rect x="340" y="270" width="60" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="370" y="293" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">4</text>
  <rect x="408" y="270" width="120" height="36" rx="4" fill="#0d1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="468" y="293" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"cherry": 3</text>

  <!-- bucket 5 -->
  <rect x="340" y="314" width="60" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="370" y="337" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">5</text>
  <rect x="408" y="314" width="120" height="36" rx="4" fill="#0d1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="468" y="337" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"date": 4</text>

  <!-- bucket 6 -->
  <rect x="340" y="358" width="60" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="370" y="381" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">6</text>
  <text x="420" y="381" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#444">None</text>

  <!-- arrows from hash fn to buckets -->
  <line x1="306" y1="195" x2="340" y2="156" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="306" y1="198" x2="340" y2="244" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="306" y1="201" x2="340" y2="288" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- bottom: complexity -->
  <rect x="60" y="414" width="760" height="66" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">탐색/삽입/삭제: 평균 <tspan fill="#55c555" font-weight="600">O(1)</tspan>,  최악 O(n) (모든 키가 같은 버킷으로 충돌)</text>
  <text x="76" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">로드 팩터 <tspan fill="#7ec8e3" font-weight="600">α = n / capacity</tspan>  — α &lt; 0.75 유지 시 평균 O(1) 보장</text>
  <text x="76" y="474" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">α가 임계값 초과 시 용량 2배로 확장 + 전체 재해싱(rehashing)</text>
</svg>
