<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">순환 임포트 — 발생 원인과 해결법</text>

  <!-- Problem section -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">문제: 순환 임포트 발생</text>

  <rect x="60" y="90" width="360" height="130" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <rect x="76" y="100" width="328" height="110" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># a.py</text>
  <text x="92" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="130" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> b </text>
  <text x="148" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="200" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> B_func</text>
  <text x="92" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># b.py</text>
  <text x="92" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="130" y="184" font-family="'JetBrains Mono','Menpl','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> a </text>
  <text x="148" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="200" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> A_func</text>
  <text x="92" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve"># ImportError: cannot import</text>

  <!-- Cycle diagram -->
  <rect x="200" y="130" width="80" height="36" rx="6" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">a.py</text>

  <!-- circular arrows drawn with paths -->
  <path d="M 320 148 C 400 100 480 100 480 148" stroke="#e05555" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arrr)"/>

  <rect x="460" y="130" width="80" height="36" rx="6" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="500" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">b.py</text>

  <path d="M 460 164 C 380 210 300 210 300 164" stroke="#e05555" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arrr)"/>

  <!-- Solutions -->
  <text x="60" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">해결책 3가지</text>

  <!-- Solution 1 -->
  <rect x="60" y="272" width="240" height="100" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">① 함수 안으로 이동</text>
  <rect x="76" y="302" width="208" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def</text>
  <text x="116" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> run():</text>
  <text x="92" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    from</text>
  <text x="142" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> b </text>
  <text x="160" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="212" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> B</text>
  <text x="76" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호출 시점에 임포트 지연</text>

  <!-- Solution 2 -->
  <rect x="320" y="272" width="240" height="100" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② TYPE_CHECKING</text>
  <rect x="336" y="302" width="208" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="352" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="390" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> typing </text>
  <text x="450" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="352" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    TYPE_CHECKING</text>
  <text x="352" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">if</text>
  <text x="376" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> TYPE_CHECKING:</text>
  <text x="336" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">타입 힌트 전용, 런타임 미실행</text>

  <!-- Solution 3 -->
  <rect x="580" y="272" width="240" height="100" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="600" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">③ 공통 모듈 분리</text>
  <rect x="596" y="302" width="208" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="612" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># common.py 분리</text>
  <text x="612" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># a.py, b.py 모두</text>
  <text x="612" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># common 에서 임포트</text>
  <text x="596" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">근본 원인 해결, 권장</text>

  <!-- Root cause -->
  <rect x="60" y="388" width="760" height="88" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">순환 임포트의 근본 원인</text>
  <text x="80" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">모듈 간 결합도가 높을 때 발생. 의존 방향을 단방향으로 유지하는</text>
  <text x="80" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">아키텍처 설계가 가장 효과적인 예방책입니다 (의존 역전 원칙, DIP).</text>
  <text x="80" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">공유 상수·타입은 별도 모듈(types.py, constants.py)로 분리해 양쪽에서 임포트.</text>
</svg>
