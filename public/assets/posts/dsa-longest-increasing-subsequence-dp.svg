<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">최장 증가 부분 수열 (LIS)</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">nums = [10, 9, 2, 5, 3, 7, 101, 18]</text>

  <!-- Array display -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">입력 배열과 dp[i] (끝에 nums[i]가 있는 LIS 길이)</text>

  <!-- Array cells -->
  <rect x="60" y="106" width="64" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="92" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">10</text>
  <rect x="130" y="106" width="64" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="162" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">9</text>
  <rect x="200" y="106" width="64" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="232" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">2</text>
  <rect x="270" y="106" width="64" height="36" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="302" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">5</text>
  <rect x="340" y="106" width="64" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="372" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">3</text>
  <rect x="410" y="106" width="64" height="36" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="442" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">7</text>
  <rect x="480" y="106" width="64" height="36" fill="#2a4a2a" rx="4" stroke="#77dd77" stroke-width="2"/>
  <text x="512" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#77dd77">101</text>
  <rect x="550" y="106" width="64" height="36" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="582" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">18</text>

  <!-- dp values -->
  <text x="92" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">dp=1</text>
  <text x="162" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">dp=1</text>
  <text x="232" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">dp=1</text>
  <text x="302" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">dp=2</text>
  <text x="372" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">dp=2</text>
  <text x="442" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">dp=3</text>
  <text x="512" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#77dd77">dp=4</text>
  <text x="582" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">dp=4</text>

  <!-- LIS path annotation -->
  <text x="60" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">LIS (길이 4): </text>
  <text x="170" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#77dd77" font-weight="600">2 → 5 → 7 → 101</text>
  <text x="350" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888"> 또는 2 → 3 → 7 → 18 (길이 4)</text>

  <!-- O(n^2) DP explanation -->
  <rect x="60" y="206" width="760" height="86" fill="#111" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">O(n²) DP: dp[i] = max(dp[j]+1) for all j &lt; i where nums[j] &lt; nums[i]</text>
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dp[6] = 4 (nums[6]=101): j=5(nums=7,dp=3), j=3(nums=5,dp=2), j=2(nums=2,dp=1) ...</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">                          max(3+1, 2+1, 1+1, ...) = 4</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">시간 O(n²), 공간 O(n)</text>

  <!-- O(n log n) patience sorting visualization -->
  <text x="60" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">O(n log n) — 인내 정렬 (Patience Sorting) / 이분 탐색</text>
  <text x="60" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">tails 배열: 길이 k인 증가 수열의 가장 작은 끝 원소</text>

  <!-- tails evolution -->
  <text x="60" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">처리 순서: 10→9→2→5→3→7→101→18</text>

  <text x="60" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">tails: [10] → [9] → [2] → [2,5] → [2,3] → [2,3,7] → [2,3,7,101] → [2,3,7,18]</text>
  <text x="60" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">최종 tails 길이 = LIS 길이 = 4</text>
  <text x="60" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">※ tails는 실제 LIS가 아닌 최소 끝 원소를 유지하는 보조 배열</text>

  <!-- code snippet -->
  <rect x="60" y="428" width="760" height="38" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import bisect</text>
  <text x="200" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">pos = bisect_left(tails, x)  # x 삽입 위치</text>
</svg>
