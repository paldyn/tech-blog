<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">한국어 토크나이저 효율성 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">"안녕하세요, 반갑습니다" 토크나이징 예시</text>

  <!-- GPT-4 tokenizer -->
  <rect x="60" y="96" width="760" height="56" rx="6" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">GPT-4 (tiktoken, cl100k)</text>
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">["안", "녕", "하", "세", "요", ",", " ", "반", "갑", "습", "니", "다"] → 12토큰 (글자 단위 분리)</text>

  <!-- LLaMA 3 tokenizer -->
  <rect x="60" y="164" width="760" height="56" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">LLaMA 3 (128K 어휘)</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">["안녕", "하세요", ",", " 반갑", "습니다"] → 5토큰 (어절 단위 일부 묶음)</text>

  <!-- HyperCLOVA tokenizer -->
  <rect x="60" y="232" width="760" height="56" rx="6" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="80" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">HyperCLOVA X (한국어 특화 BPE)</text>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">["안녕하세요", ",", " 반갑습니다"] → 3토큰 (단어/구 단위 묶음)</text>

  <!-- Explanation -->
  <rect x="60" y="304" width="760" height="56" rx="6" fill="#0d1117" stroke="#333"/>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">토큰 수가 적을수록: API 비용↓, 컨텍스트 효율↑, 처리 속도↑</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">한국어 특화 토크나이저는 동일 텍스트를 2~4배 적은 토큰으로 처리 → 실질적 비용 절감</text>
</svg>
