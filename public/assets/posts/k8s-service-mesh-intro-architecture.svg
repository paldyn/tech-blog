<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">서비스 메시 아키텍처</text>

  <!-- Control Plane Box -->
  <rect x="240" y="62" width="400" height="72" rx="8" fill="#1a1235" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">Control Plane</text>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Istiod  (Pilot · Citadel · Galley)</text>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">설정 배포 · 인증서 관리 · 서비스 디스커버리</text>

  <!-- Config arrows: Control Plane to Pods -->
  <line x1="360" y1="134" x2="175" y2="192" stroke="#7777cc" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <line x1="440" y1="134" x2="440" y2="192" stroke="#7777cc" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <line x1="520" y1="134" x2="705" y2="192" stroke="#7777cc" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>

  <!-- Data Plane background -->
  <rect x="48" y="186" width="784" height="218" rx="8" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="58" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">Data Plane</text>

  <!-- Pod A -->
  <rect x="58" y="196" width="216" height="192" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="166" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Service A</text>
  <!-- App container box -->
  <rect x="73" y="226" width="186" height="64" rx="4" fill="#111827" stroke="#2a3a5e" stroke-width="1"/>
  <text x="166" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">App Container</text>
  <text x="166" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비즈니스 로직</text>
  <!-- Envoy proxy box -->
  <rect x="73" y="304" width="186" height="64" rx="4" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1"/>
  <text x="166" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Envoy Proxy</text>
  <text x="166" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Sidecar 자동 주입</text>

  <!-- Pod B -->
  <rect x="332" y="196" width="216" height="192" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Service B</text>
  <rect x="347" y="226" width="186" height="64" rx="4" fill="#111827" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">App Container</text>
  <text x="440" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비즈니스 로직</text>
  <rect x="347" y="304" width="186" height="64" rx="4" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1"/>
  <text x="440" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Envoy Proxy</text>
  <text x="440" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Sidecar 자동 주입</text>

  <!-- Pod C -->
  <rect x="606" y="196" width="216" height="192" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="714" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Service C</text>
  <rect x="621" y="226" width="186" height="64" rx="4" fill="#111827" stroke="#2a3a5e" stroke-width="1"/>
  <text x="714" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">App Container</text>
  <text x="714" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비즈니스 로직</text>
  <rect x="621" y="304" width="186" height="64" rx="4" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1"/>
  <text x="714" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Envoy Proxy</text>
  <text x="714" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Sidecar 자동 주입</text>

  <!-- mTLS arrows between A and B proxies -->
  <line x1="261" y1="329" x2="343" y2="329" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="341" y1="339" x2="259" y2="339" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="301" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">mTLS</text>

  <!-- mTLS arrows between B and C proxies -->
  <line x1="535" y1="329" x2="617" y2="329" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="615" y1="339" x2="533" y2="339" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="575" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">mTLS</text>

  <!-- Bottom note -->
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">애플리케이션 코드 변경 없이 트래픽 제어 · 보안 · 관찰 가능성 확보</text>
  <text x="440" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Istio / Linkerd / Cilium Service Mesh</text>
</svg>
