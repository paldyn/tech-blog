<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">주요 비정규화 패턴</text>

  <!-- Pattern 1: Computed Column -->
  <rect x="60" y="70" width="360" height="130" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">① 계산값 미리 저장</text>
  <rect x="75" y="102" width="330" height="84" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="91" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 매번 SUM() 대신 미리 집계</text>
  <text x="91" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ALTER TABLE</text><text x="181" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> orders</text>
  <text x="91" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  ADD COLUMN</text><text x="196" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> total_amt</text>
  <text x="91" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    NUMERIC(12,2);</text>

  <!-- Pattern 2: Redundant Column -->
  <rect x="460" y="70" width="360" height="130" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">② 중복 컬럼 복사</text>
  <rect x="475" y="102" width="330" height="84" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="491" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- JOIN 회피: 자주 읽는 컬럼 복사</text>
  <text x="491" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ALTER TABLE</text><text x="581" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> order_items</text>
  <text x="491" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  ADD COLUMN</text><text x="596" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> prod_name</text>
  <text x="491" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    VARCHAR(200);</text>

  <!-- Pattern 3: Flatten Lookup -->
  <rect x="60" y="220" width="360" height="130" rx="8" fill="#0d0d0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="240" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">③ 계층 평탄화</text>
  <rect x="75" y="252" width="330" height="84" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="91" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 재귀 대신 레벨 컬럼 직접 저장</text>
  <text x="91" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CREATE TABLE</text><text x="187" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> category (</text>
  <text x="91" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  id, name, l1, l2, l3</text>
  <text x="91" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">);</text>

  <!-- Pattern 4: Summary Table -->
  <rect x="460" y="220" width="360" height="130" rx="8" fill="#0d0d0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">④ 요약 테이블</text>
  <rect x="475" y="252" width="330" height="84" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="491" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 집계 결과 별도 테이블로</text>
  <text x="491" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CREATE TABLE</text><text x="587" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> daily_sales (</text>
  <text x="491" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  dt DATE, total NUMERIC,</text>
  <text x="491" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  cnt  BIGINT);</text>

  <!-- Warning banner -->
  <rect x="60" y="370" width="760" height="60" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">주의: 비정규화는 항상 "프로파일링 후" 결정</text>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b0b0b0">복제 컬럼은 쓰기 시점마다 동기화 로직 필요 → 트리거 또는 앱 레벨 일관성 관리</text>

  <!-- Key insight -->
  <rect x="60" y="448" width="760" height="32" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="469" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b0b0b0">정규화로 설계 → 느린 쿼리 측정 → 선택적 비정규화 적용 (Never First)</text>
</svg>
