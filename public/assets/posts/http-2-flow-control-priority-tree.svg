<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect x="0" y="0" width="880" height="460" rx="12" fill="#0a0a0a"/>

  <defs>
    <marker id="treeArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <text x="60" y="56" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">우선순위 의존성 트리 (RFC 7540 모델)</text>

  <!-- root -->
  <rect x="370" y="86" width="140" height="56" fill="#000000" stroke="#888" stroke-width="1.5" rx="6"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">root</text>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">stream 0</text>

  <!-- HTML -->
  <rect x="370" y="190" width="140" height="64" fill="#000000" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">HTML</text>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">stream 1 · w=256</text>

  <!-- CSS -->
  <rect x="120" y="300" width="170" height="64" fill="#000000" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="205" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">CSS</text>
  <text x="205" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">stream 3 · w=32</text>

  <!-- JS -->
  <rect x="355" y="300" width="170" height="64" fill="#000000" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">JS</text>
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">stream 5 · w=16</text>

  <!-- IMG -->
  <rect x="590" y="300" width="200" height="64" fill="#000000" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="690" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">IMG (below-fold)</text>
  <text x="690" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">stream 7 · w=8</text>

  <!-- edges -->
  <!-- root -> HTML -->
  <line x1="440" y1="142" x2="440" y2="190" stroke="#7777cc" stroke-width="2" marker-end="url(#treeArr)"/>

  <!-- HTML -> CSS -->
  <path d="M 410 254 L 240 300" fill="none" stroke="#7777cc" stroke-width="2" marker-end="url(#treeArr)"/>
  <!-- HTML -> JS -->
  <line x1="440" y1="254" x2="440" y2="300" stroke="#7777cc" stroke-width="2" marker-end="url(#treeArr)"/>
  <!-- HTML -> IMG -->
  <path d="M 470 254 L 660 300" fill="none" stroke="#7777cc" stroke-width="2" marker-end="url(#treeArr)"/>

  <!-- weight note for siblings -->
  <text x="297" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">└ 형제는 가중치 비율로 대역폭 분배 (CSS:JS:IMG ≈ 32:16:8 = 4:2:1)</text>

  <text x="60" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">부모(HTML)가 먼저, 자식은 부모가 끝나면 가중치대로. ※ 이 트리 모델은 RFC 9113에서 비권장 → Priority 힌트로 대체.</text>
</svg>
