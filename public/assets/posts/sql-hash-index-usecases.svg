<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">해시 인덱스 적합/부적합 사례</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">등치(=) 전용 - 범위·정렬·LIKE 조건엔 사용 불가</text>

  <!-- Good cases -->
  <rect x="60" y="95" width="360" height="300" fill="#111" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">적합한 사례</text>

  <rect x="80" y="135" width="320" height="220" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- ✓ 등치 조건</text>
  <text x="96" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="141" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> session_id = </text>
  <text x="259" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'abc123'</text>
  <text x="96" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- ✓ JOIN 등치</text>
  <text x="96" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ON</text>
  <text x="116" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> a.user_id = b.user_id</text>
  <text x="96" y="263" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- ✓ 키 룩업</text>
  <text x="96" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="141" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> api_key = </text>
  <text x="227" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">$1</text>
  <text x="96" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- ✓ 고유 해시 값 검색</text>
  <text x="96" y="335" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="141" y="335" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> md5_hash = </text>
  <text x="232" y="335" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">$checksum</text>

  <!-- Bad cases -->
  <rect x="460" y="95" width="360" height="300" fill="#111" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">부적합한 사례</text>

  <rect x="480" y="135" width="320" height="220" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="496" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- ✗ 범위 조건</text>
  <text x="496" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">WHERE</tspan><tspan fill="#e8e8e8"> score </tspan><tspan fill="#e05555">&gt;</tspan><tspan fill="#b5cea8"> 90</tspan></text>

  <text x="496" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- ✗ ORDER BY</text>
  <text x="496" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ORDER BY</text>
  <text x="561" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> created_at</text>
  <text x="496" y="263" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- ✗ LIKE 패턴</text>
  <text x="496" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="541" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> name </text>
  <text x="585" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">LIKE</text>
  <text x="613" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> 'A%'</text>
  <text x="496" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- ✗ NULL 비교</text>
  <text x="496" y="335" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">WHERE</tspan><tspan fill="#e8e8e8"> col </tspan><tspan fill="#7ec8e3">IS NULL</tspan></text>

  <!-- DB support note -->
  <rect x="60" y="415" width="760" height="30" fill="#0d0d18" rx="6" stroke="#1e2433"/>
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">PostgreSQL 10+ WAL 지원 해시인덱스 · MySQL InnoDB Adaptive Hash · Oracle In-Memory 해시 사용</text>
</svg>
