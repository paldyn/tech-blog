<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">브랜치 이름 변경과 삭제</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">-m(이름변경), -d(안전삭제), -D(강제삭제)</text>

  <!-- Left: rename -->
  <text x="60" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이름 변경 (-m)</text>
  <rect x="60" y="122" width="370" height="170" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">
    <tspan x="76" dy="0"><tspan fill="#6a8aa0"># 다른 브랜치 이름 변경</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> -m old-name new-name</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># 현재 브랜치 이름 변경</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> -m new-name</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># 원격에도 반영</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git push</tspan> origin -u new-name</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git push</tspan> origin --delete old-name</tspan>
  </text>

  <!-- Right: delete -->
  <text x="450" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">삭제 (-d / -D)</text>
  <rect x="450" y="122" width="370" height="170" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">
    <tspan x="466" dy="0"><tspan fill="#6a8aa0"># 안전 삭제 (병합 확인 후)</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#7ec8e3">git branch</tspan> -d feature-login</tspan>
    <tspan x="466" dy="18"> </tspan>
    <tspan x="466" dy="18"><tspan fill="#6a8aa0"># 강제 삭제 (병합 안 돼도 삭제)</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#e05555">git branch</tspan> -D feature-login</tspan>
    <tspan x="466" dy="18"> </tspan>
    <tspan x="466" dy="18"><tspan fill="#6a8aa0"># 원격 브랜치 삭제</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#7ec8e3">git push</tspan> origin --delete feature-login</tspan>
    <tspan x="466" dy="18"><tspan fill="#7ec8e3">git push</tspan> origin :feature-login  <tspan fill="#6a8aa0"># 동일</tspan></tspan>
  </text>

  <!-- Warning box -->
  <rect x="60" y="310" width="760" height="104" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.2"/>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">-d vs -D 차이</text>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">-d: 현재 브랜치에 병합됐을 때만 삭제. 미병합이면 오류 발생</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">-D: 병합 여부 무관하게 강제 삭제. 커밋은 reflog에 일정 기간 남아 복구 가능</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">-D 삭제 후 되돌리기: git branch recover &lt;dangling-sha&gt;</text>
</svg>
