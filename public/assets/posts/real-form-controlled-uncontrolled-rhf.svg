<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">React Hook Form 핵심 패턴</text>

  <!-- Left: controlled useState -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">❌ 제어 방식 (매 입력 리렌더)</text>
  <rect x="60" y="94" width="360" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> ControlledForm() {</tspan>
  </text>
  <text xml:space="preserve" x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> [name, setName] = useState(</tspan>
    <tspan fill="#ce9178">''</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text xml:space="preserve" x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> [email, setEmail] = useState(</tspan>
    <tspan fill="#ce9178">''</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text xml:space="preserve" x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 필드마다 state + handler 중복...</text>
  <text xml:space="preserve" x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> (</tspan>
  </text>
  <text xml:space="preserve" x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">&lt;input</tspan>
    <tspan fill="#ffffff"> value={name}</tspan>
  </text>
  <text xml:space="preserve" x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      onChange={e </tspan>
    <tspan fill="#7ec8e3" font-weight="600">=&gt;</tspan>
    <tspan fill="#ffffff"> setName(e.target.value)}</tspan>
  </text>
  <text xml:space="preserve" x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">/&gt;</tspan>
  </text>
  <text xml:space="preserve" x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 키 입력 50번 → 리렌더 50번</text>

  <!-- Right: RHF -->
  <text x="460" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">✓ React Hook Form (비제어 기반)</text>
  <rect x="460" y="94" width="360" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> { useForm } </tspan>
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ce9178"> 'react-hook-form'</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text xml:space="preserve" x="476" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> RHFForm() {</tspan>
  </text>
  <text xml:space="preserve" x="476" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> { register, handleSubmit,</tspan>
  </text>
  <text xml:space="preserve" x="476" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">          formState: { errors } } = useForm();</tspan>
  </text>
  <text xml:space="preserve" x="476" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> onSubmit = (data) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">=&gt;</tspan>
    <tspan fill="#ffffff"> {</tspan>
  </text>
  <text xml:space="preserve" x="476" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    console.log(data); </tspan>
    <tspan fill="#9aa4b8">// { name, email }</tspan>
  </text>
  <text xml:space="preserve" x="476" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  };</text>
  <text xml:space="preserve" x="476" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> (</tspan>
  </text>
  <text xml:space="preserve" x="476" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">&lt;form</tspan>
    <tspan fill="#ffffff"> onSubmit={handleSubmit(onSubmit)}&gt;</tspan>
  </text>
  <text xml:space="preserve" x="476" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      </tspan>
    <tspan fill="#7ec8e3" font-weight="600">&lt;input</tspan>
    <tspan fill="#ffffff"> {...register(</tspan>
    <tspan fill="#ce9178">'name'</tspan>
    <tspan fill="#ffffff">, {</tspan>
  </text>
  <text xml:space="preserve" x="476" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        required: </tspan>
    <tspan fill="#ce9178">'이름 필수'</tspan>
    <tspan fill="#ffffff"> })}</tspan>
  </text>
  <text xml:space="preserve" x="476" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      </tspan>
    <tspan fill="#7ec8e3" font-weight="600">/&gt;</tspan>
  </text>
  <text xml:space="preserve" x="476" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 키 입력 50번 → 리렌더 0번 (submit 시만)</tspan>

  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">RHF는 register()로 ref를 DOM에 연결 → 리렌더 없이 값 추적 → submit 시 한 번만 읽기</text>
</svg>
