<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ConstColumn으로 계산 컬럼 만들기</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Dataset 내 수식 컬럼 — 서버 전송 없이 계산</text>

  <rect x="60" y="90" width="760" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Dataset ColumnInfo에 ConstColumn 추가</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// (Designer 또는 loadXml로 정의)</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">&lt;Dataset</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"dsMain"</tspan><tspan fill="#7ec8e3">&gt;</tspan></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  &lt;ColumnInfo&gt;</text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">&lt;Column</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"PRICE"</tspan><tspan fill="#ffffff"> type=</tspan><tspan fill="#ce9178">"INT"</tspan><tspan fill="#7ec8e3">/&gt;</tspan></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">&lt;Column</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"QTY"</tspan><tspan fill="#ffffff"> type=</tspan><tspan fill="#ce9178">"INT"</tspan><tspan fill="#7ec8e3">/&gt;</tspan></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &lt;!-- 계산 컬럼: 서버에 전송되지 않음 --&gt;</text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">    &lt;ConstColumn</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"TOTAL"</tspan><tspan fill="#ffffff"> type=</tspan><tspan fill="#ce9178">"INT"</tspan></text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">                  value=</tspan><tspan fill="#ce9178">"PRICE*QTY"</tspan><tspan fill="#55c555">/&gt;</tspan></text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  &lt;/ColumnInfo&gt;</text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">&lt;/Dataset&gt;</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Grid 셀: bindcolumn="TOTAL" 로 합계 자동 표시</text>
</svg>
