<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Footer 집계 행 XFD 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">sumText · avgText · countText 속성 설정</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="274" fill="#070b14" rx="6" stroke="#1e2433"/>

  <!-- Comment 1 -->
  <text x="80" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Footer 밴드 — 합계 행 선언</text>

  <!-- Footer element -->
  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;</tspan><tspan fill="#7ec8e3">Footer</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- FooterLine 1: count + sum -->
  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">FooterLine</tspan><tspan fill="#e8e8e8"> height=</tspan><tspan fill="#b5cea8">"38"</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- countText cell -->
  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    &lt;</tspan><tspan fill="#7ec8e3">Cell</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#b5cea8">"0"</tspan><tspan fill="#e8e8e8"> counttext=</tspan><tspan fill="#ce9178">"emp_id"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <!-- sumText cell -->
  <text x="80" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    &lt;</tspan><tspan fill="#7ec8e3">Cell</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#b5cea8">"3"</tspan><tspan fill="#e8e8e8"> sumtext=</tspan><tspan fill="#ce9178">"sal_amt"</tspan><tspan fill="#e8e8e8"> displayformat=</tspan><tspan fill="#ce9178">"#,##0"</tspan><tspan fill="#e8e8e8"> halign=</tspan><tspan fill="#ce9178">"right"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <!-- /FooterLine -->
  <text x="80" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;/</tspan><tspan fill="#7ec8e3">FooterLine</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- FooterLine 2: avg -->
  <text x="80" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">FooterLine</tspan><tspan fill="#e8e8e8"> height=</tspan><tspan fill="#b5cea8">"36"</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- avgText cell -->
  <text x="80" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    &lt;</tspan><tspan fill="#7ec8e3">Cell</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#b5cea8">"3"</tspan><tspan fill="#e8e8e8"> avgtext=</tspan><tspan fill="#ce9178">"sal_amt"</tspan><tspan fill="#e8e8e8"> displayformat=</tspan><tspan fill="#ce9178">"#,##0"</tspan><tspan fill="#e8e8e8"> halign=</tspan><tspan fill="#ce9178">"right"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <!-- /FooterLine and /Footer -->
  <text x="80" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;/</tspan><tspan fill="#7ec8e3">FooterLine</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <text x="80" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;/</tspan><tspan fill="#7ec8e3">Footer</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">sumtext/avgtext/counttext 값에 Dataset 컬럼명을 지정하면 자동 집계됩니다</text>
</svg>
