<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PostgreSQL 트리거 실행 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">BEFORE / AFTER / INSTEAD OF · ROW / STATEMENT 레벨</text>

  <!-- DML Event box -->
  <rect x="60" y="100" width="160" height="52" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">DML 이벤트</text>
  <text x="140" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">INSERT / UPDATE / DELETE</text>

  <!-- Arrow: DML -> BEFORE STATEMENT -->
  <line x1="220" y1="126" x2="285" y2="126" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- BEFORE STATEMENT -->
  <rect x="290" y="100" width="170" height="52" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="375" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">BEFORE STATEMENT</text>
  <text x="375" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">문장 시작 전 1회 실행</text>

  <!-- Arrow: BEFORE STATEMENT -> Row Loop -->
  <line x1="460" y1="126" x2="520" y2="126" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>

  <!-- Row Loop box -->
  <rect x="525" y="95" width="160" height="230" rx="8" fill="#14141e" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="605" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">각 행 반복</text>

  <!-- BEFORE ROW -->
  <rect x="545" y="130" width="120" height="44" rx="6" fill="#1e1e2e" stroke="#55c555" stroke-width="1.2"/>
  <text x="605" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">BEFORE ROW</text>
  <text x="605" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">NEW/OLD 수정 가능</text>

  <!-- Arrow down -->
  <line x1="605" y1="174" x2="605" y2="196" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>

  <!-- Actual DML -->
  <rect x="545" y="200" width="120" height="36" rx="6" fill="#2a1a00" stroke="#e05555" stroke-width="1.2"/>
  <text x="605" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">실제 행 변경</text>

  <!-- Arrow down -->
  <line x1="605" y1="236" x2="605" y2="258" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AFTER ROW -->
  <rect x="545" y="262" width="120" height="44" rx="6" fill="#1e1e2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="605" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">AFTER ROW</text>
  <text x="605" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">audit·cascade</text>

  <!-- Arrow: Row Loop -> AFTER STATEMENT -->
  <line x1="525" y1="270" x2="465" y2="270" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AFTER STATEMENT -->
  <rect x="290" y="244" width="170" height="52" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="375" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">AFTER STATEMENT</text>
  <text x="375" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">모든 행 처리 후 1회</text>

  <!-- INSTEAD OF (View) -->
  <rect x="60" y="244" width="190" height="52" rx="8" fill="#2e1a00" stroke="#ce9178" stroke-width="1.5"/>
  <text x="155" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">INSTEAD OF (뷰 전용)</text>
  <text x="155" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">원래 DML 대체 실행</text>

  <!-- Arrow: DML -> INSTEAD OF (dashed) -->
  <line x1="140" y1="152" x2="140" y2="240" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- TRANSITION TABLE note -->
  <rect x="290" y="330" width="170" height="52" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="375" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">TRANSITION TABLE</text>
  <text x="375" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">OLD/NEW TABLE 참조</text>

  <line x1="375" y1="296" x2="375" y2="326" stroke="#7777cc" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- RETURN NEW note -->
  <rect x="60" y="340" width="190" height="72" rx="8" fill="#1a1a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="155" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">BEFORE ROW 반환값</text>
  <text x="155" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">RETURN NEW  → 변경 적용</text>
  <text x="155" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">RETURN NULL → 행 무시</text>

  <!-- Constraint Trigger note -->
  <rect x="525" y="345" width="220" height="72" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.2"/>
  <text x="635" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">CONSTRAINT TRIGGER</text>
  <text x="635" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">DEFERRABLE INITIALLY DEFERRED</text>
  <text x="635" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">트랜잭션 끝에 지연 실행</text>

  <!-- Legend -->
  <rect x="60" y="440" width="16" height="16" rx="3" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BEFORE</text>
  <rect x="160" y="440" width="16" height="16" rx="3" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="184" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AFTER</text>
  <rect x="250" y="440" width="16" height="16" rx="3" fill="#2e1a00" stroke="#ce9178" stroke-width="1.5"/>
  <text x="274" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">INSTEAD OF</text>
  <rect x="380" y="440" width="16" height="16" rx="3" fill="#1e1e2e" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="404" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ROW 반복 루프</text>
</svg>
