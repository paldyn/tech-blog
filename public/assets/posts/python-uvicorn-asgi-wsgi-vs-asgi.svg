<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">WSGI vs ASGI</text>

  <rect x="60" y="84" width="360" height="190" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="116" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">WSGI (동기)</text>
  <text x="240" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">한 요청을 끝낼 때까지</text>
  <text x="240" y="170" font-size="13" fill="#9aa4b8" text-anchor="middle">워커 하나가 묶인다</text>
  <text x="240" y="202" font-size="13" fill="#9aa4b8" text-anchor="middle">Flask · Django(전통) · Gunicorn</text>
  <text x="240" y="234" font-size="13" fill="#9aa4b8" text-anchor="middle">긴 I/O 동안 워커가 놀고 있음</text>
  <text x="240" y="258" font-size="12" fill="#e05555" text-anchor="middle">WebSocket·비동기 지원 없음</text>

  <rect x="460" y="84" width="360" height="190" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="116" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">ASGI (비동기)</text>
  <text x="640" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">I/O 대기 중 다른 요청 처리</text>
  <text x="640" y="170" font-size="13" fill="#9aa4b8" text-anchor="middle">하나의 루프가 여러 요청을</text>
  <text x="640" y="202" font-size="13" fill="#9aa4b8" text-anchor="middle">FastAPI · Starlette · uvicorn</text>
  <text x="640" y="234" font-size="13" fill="#9aa4b8" text-anchor="middle">async / await 그대로 활용</text>
  <text x="640" y="258" font-size="12" fill="#55c555" text-anchor="middle">WebSocket·장기 연결 지원</text>

  <rect x="60" y="288" width="760" height="30" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="308" font-size="13" fill="#55c555" text-anchor="middle">ASGI는 WSGI를 비동기로 확장한 규약이다 — 둘 다 서버와 앱 사이의 약속</text>
</svg>
