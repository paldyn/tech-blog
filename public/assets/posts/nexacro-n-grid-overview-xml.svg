<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid XML 기본 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">HeadBand → BodyBand → FootBand 구성</text>

  <!-- Code block -->
  <rect x="60" y="92" width="760" height="320" fill="#070b14" rx="6" stroke="#1e2433"/>

  <text x="80" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;</tspan><tspan fill="#7ec8e3">Grid</tspan><tspan fill="#e8e8e8"> id=</tspan><tspan fill="#ce9178">"grd_emp"</tspan><tspan fill="#e8e8e8"> bindingInfo=</tspan><tspan fill="#ce9178">"ds_emp"</tspan></text>

  <text x="80" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  selecttype=</tspan><tspan fill="#ce9178">"single"</tspan><tspan fill="#e8e8e8"> readonly=</tspan><tspan fill="#ce9178">"false"</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <text x="80" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  &lt;!-- 헤더 밴드 --&gt;</text>
  <text x="80" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">HeadBand</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <text x="80" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    &lt;</tspan><tspan fill="#7ec8e3">HeadCell</tspan><tspan fill="#e8e8e8"> text=</tspan><tspan fill="#ce9178">"성명"</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#ce9178">"1"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <text x="80" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;/</tspan><tspan fill="#7ec8e3">HeadBand</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <text x="80" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  &lt;!-- 바디 밴드 --&gt;</text>
  <text x="80" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">BodyBand</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <text x="80" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    &lt;</tspan><tspan fill="#7ec8e3">Cell</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#ce9178">"1"</tspan><tspan fill="#e8e8e8"> datacolumn=</tspan><tspan fill="#ce9178">"emp_nm"</tspan><tspan fill="#e8e8e8"> celltype=</tspan><tspan fill="#ce9178">"normal"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <text x="80" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;/</tspan><tspan fill="#7ec8e3">BodyBand</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <text x="80" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  &lt;!-- 풋 밴드: 합계 등 --&gt;</text>
  <text x="80" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">FootBand</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <text x="80" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  &lt;!-- 컬럼 너비 정의 --&gt;</text>
  <text x="80" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">Formats</tspan><tspan fill="#e8e8e8">&gt; … &lt;/</tspan><tspan fill="#7ec8e3">Formats</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <text x="80" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;/</tspan><tspan fill="#7ec8e3">Grid</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

</svg>
