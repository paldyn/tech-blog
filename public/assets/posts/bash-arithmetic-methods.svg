<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Bash 산술 연산 방법 비교</text>

  <!-- (( )) -->
  <rect x="60" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">(( )) — 산술 확장 (권장)</text>
  <rect x="60" y="106" width="370" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">(( x = </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff"> ))      </tspan><tspan fill="#9aa4b8"># x=15</tspan></text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">(( x++ ))           </tspan><tspan fill="#9aa4b8"># 후위 증가</tspan></text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">(( x += </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff"> ))        </tspan><tspan fill="#9aa4b8"># 복합 대입</tspan></text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">(( r = x % </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff"> ))      </tspan><tspan fill="#9aa4b8"># 나머지</tspan></text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">(( p = </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> ** </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff"> ))    </tspan><tspan fill="#9aa4b8"># 거듭제곱 = 1024</tspan></text>
  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (( x &gt; </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff"> )); </tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan><tspan fill="#ffffff"> ...</tspan><tspan fill="#7ec8e3" font-weight="600">fi</tspan></text>
  <text x="76" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">n=$(( x * </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> ))</tspan><tspan fill="#9aa4b8">       # 결과를 변수에</tspan></text>

  <!-- let / expr / bc -->
  <rect x="450" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">let / expr / bc</text>
  <rect x="450" y="106" width="370" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># let — (( ))와 동일, 구식</text>
  <text x="466" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> x=10+5 x++</tspan></text>
  <text x="466" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="466" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># expr — 외부 명령, 느림</text>
  <text x="466" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">n=$(</tspan><tspan fill="#7ec8e3" font-weight="600">expr</tspan><tspan fill="#ffffff"> $x + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8">  # 공백 필수</tspan></text>
  <text x="466" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="466" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># bc — 부동소수점 지원</text>
  <text x="466" y="252" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">n=$(</tspan><tspan fill="#7ec8e3" font-weight="600">bc</tspan><tspan fill="#ffffff"> &lt;&lt;&lt; </tspan><tspan fill="#ce9178">"scale=4; 22/7"</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8"> # 3.1428</tspan></text>

  <!-- Operators table -->
  <rect x="60" y="272" width="760" height="160" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="296" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">산술·비트 연산자</text>

  <!-- Left column -->
  <text x="80" y="318" font-size="13" fill="#7ec8e3" font-weight="600">+  -  *  /  %</text>
  <text x="220" y="318" font-size="13" fill="#888">사칙연산, 나머지</text>
  <text x="80" y="336" font-size="13" fill="#7ec8e3" font-weight="600">**</text>
  <text x="220" y="336" font-size="13" fill="#888">거듭제곱</text>
  <text x="80" y="354" font-size="13" fill="#7ec8e3" font-weight="600">++  --</text>
  <text x="220" y="354" font-size="13" fill="#888">전위/후위 증감</text>
  <text x="80" y="372" font-size="13" fill="#7ec8e3" font-weight="600">+=  -=  *=  /=</text>
  <text x="220" y="372" font-size="13" fill="#888">복합 대입</text>
  <text x="80" y="390" font-size="13" fill="#7ec8e3" font-weight="600">a ? b : c</text>
  <text x="220" y="390" font-size="13" fill="#888">삼항 연산자</text>

  <!-- Right column -->
  <text x="450" y="318" font-size="13" fill="#7ec8e3" font-weight="600">&amp;  |  ^  ~</text>
  <text x="560" y="318" font-size="13" fill="#888">AND, OR, XOR, NOT (비트)</text>
  <text x="450" y="336" font-size="13" fill="#7ec8e3" font-weight="600">&lt;&lt;  &gt;&gt;</text>
  <text x="560" y="336" font-size="13" fill="#888">비트 시프트</text>
  <text x="450" y="354" font-size="13" fill="#7ec8e3" font-weight="600">==  !=  &lt;  &gt;</text>
  <text x="560" y="354" font-size="13" fill="#888">비교 (0/1 반환)</text>
  <text x="450" y="372" font-size="13" fill="#7ec8e3" font-weight="600">&amp;&amp;  ||  !</text>
  <text x="560" y="372" font-size="13" fill="#888">논리 AND/OR/NOT</text>
  <text x="450" y="390" font-size="13" fill="#7ec8e3" font-weight="600">16진: 0x1A  8진: 017</text>
  <text x="560" y="390" font-size="13" fill="#888">진법 표기</text>
  <text x="450" y="408" font-size="13" fill="#7ec8e3" font-weight="600">2#1010  8#17  16#ff</text>
  <text x="560" y="408" font-size="13" fill="#888">진법 변환 표기</text>
</svg>
