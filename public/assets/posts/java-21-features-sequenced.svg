<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Sequenced Collections &amp; Pattern Matching</text>

  <!-- Sequenced Collections hierarchy -->
  <text x="220" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Sequenced Collections (JEP 431)</text>

  <!-- SequencedCollection box -->
  <rect x="80" y="88" width="280" height="44" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">SequencedCollection&lt;E&gt;</text>
  <text x="220" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">getFirst() getLast() reversed()</text>

  <line x1="220" y1="132" x2="220" y2="158" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- SequencedSet + SequencedMap -->
  <rect x="60" y="160" width="150" height="44" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="135" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">SequencedSet</text>
  <text x="135" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">addFirst addLast</text>

  <rect x="230" y="160" width="150" height="44" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="305" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">SequencedMap</text>
  <text x="305" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">firstEntry lastEntry</text>

  <!-- code example -->
  <rect x="60" y="222" width="340" height="154" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="244"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Java 21: 순서가 있는 컬렉션</text>
  <text xml:space="preserve" x="76" y="264"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">var</text>
  <text xml:space="preserve" x="76" y="264"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> list = </text>
  <text xml:space="preserve" x="76" y="264"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">new</text>
  <text xml:space="preserve" x="76" y="264"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> ArrayList&lt;&gt;(List.of(1,2,3));</text>
  <text xml:space="preserve" x="76" y="284"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">list.getFirst();</text>
  <text xml:space="preserve" x="76" y="284"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"> // 1</text>
  <text xml:space="preserve" x="76" y="304"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">list.getLast();</text>
  <text xml:space="preserve" x="76" y="304"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 3</text>
  <text xml:space="preserve" x="76" y="324"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">list.reversed();</text>
  <text xml:space="preserve" x="76" y="324"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"> // [3,2,1] (뷰)</text>
  <text xml:space="preserve" x="76" y="344"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">list.addFirst(0);</text>
  <text xml:space="preserve" x="76" y="344"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"> // [0,1,2,3]</text>
  <text xml:space="preserve" x="76" y="364"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// LinkedHashMap도 SequencedMap 구현</text>

  <!-- divider -->
  <line x1="440" y1="60" x2="440" y2="380" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Pattern Matching Switch examples -->
  <text x="660" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Pattern Matching Switch (Java 21)</text>

  <rect x="460" y="88" width="360" height="288" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="110"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// null 처리 포함</text>
  <text xml:space="preserve" x="476" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">String</text>
  <text xml:space="preserve" x="476" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> format(Object o) &#123;</text>
  <text xml:space="preserve" x="476" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  return switch</text>
  <text xml:space="preserve" x="476" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> (o) &#123;</text>
  <text xml:space="preserve" x="476" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    case</text>
  <text xml:space="preserve" x="476" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> null</text>
  <text xml:space="preserve" x="476" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -&gt; </text>
  <text xml:space="preserve" x="476" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"null"</text>
  <text xml:space="preserve" x="476" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    case</text>
  <text xml:space="preserve" x="476" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Integer i </text>
  <text xml:space="preserve" x="476" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">when</text>
  <text xml:space="preserve" x="476" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> i &lt; 0</text>
  <text xml:space="preserve" x="476" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         -&gt; </text>
  <text xml:space="preserve" x="476" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"neg: "</text>
  <text xml:space="preserve" x="476" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> + i</text>
  <text xml:space="preserve" x="476" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    case</text>
  <text xml:space="preserve" x="476" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Integer i -&gt; </text>
  <text xml:space="preserve" x="476" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"int: "</text>
  <text xml:space="preserve" x="476" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> + i</text>
  <text xml:space="preserve" x="476" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    case</text>
  <text xml:space="preserve" x="476" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> String s -&gt; </text>
  <text xml:space="preserve" x="476" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"str: "</text>
  <text xml:space="preserve" x="476" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> + s</text>
  <text xml:space="preserve" x="476" y="270"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    default</text>
  <text xml:space="preserve" x="476" y="270"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -&gt; o.toString()</text>
  <text xml:space="preserve" x="476" y="290"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  &#125;;</text>
  <text xml:space="preserve" x="476" y="310"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&#125;</text>
  <text xml:space="preserve" x="476" y="330"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// when = guarded pattern</text>
  <text xml:space="preserve" x="476" y="350"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// null case도 switch에서 처리 가능</text>
  <text xml:space="preserve" x="476" y="368"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 순서: guarded before general</text>
</svg>
