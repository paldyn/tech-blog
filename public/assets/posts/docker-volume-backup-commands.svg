<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="880" height="320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">백업·복원 전체 명령어</text>

  <!-- Backup command -->
  <text x="80" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">백업</text>
  <rect x="80" y="88" width="340" height="96" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#e8e8e8"> --rm \</tspan></text>
  <text x="96" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">  -v mydb:/data \</tspan></text>
  <text x="96" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">  -v $(pwd):/backup \</tspan></text>
  <text x="96" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">  alpine \</tspan></text>
  <text x="96" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">  tar czf /backup/mydb.tar.gz /data</tspan></text>

  <!-- Restore command -->
  <text x="460" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">복원</text>
  <rect x="460" y="88" width="360" height="96" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#e8e8e8"> --rm \</tspan></text>
  <text x="476" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">  -v mydb-restore:/data \</tspan></text>
  <text x="476" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">  -v $(pwd):/backup \</tspan></text>
  <text x="476" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">  alpine \</tspan></text>
  <text x="476" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#e8e8e8">  tar xzf /backup/mydb.tar.gz -C /</tspan></text>

  <!-- Copy between volumes -->
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">볼륨 간 직접 복사</text>
  <rect x="80" y="228" width="740" height="60" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#e8e8e8"> --rm -v </tspan><tspan fill="#ce9178">source-vol</tspan><tspan fill="#e8e8e8">:/from -v </tspan><tspan fill="#ce9178">dest-vol</tspan><tspan fill="#e8e8e8">:/to alpine sh -c </tspan><tspan fill="#ce9178">"cp -a /from/. /to/"</tspan></text>
  <text x="96" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#6a8aa0"># 두 볼륨을 동시에 마운트해 rsync나 cp로 복사</tspan></text>
</svg>
