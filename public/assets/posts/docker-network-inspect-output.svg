<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">docker network inspect 출력 구조</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">JSON 출력의 주요 필드 해석</text>

  <!-- Left: full output -->
  <rect x="60" y="88" width="380" height="340" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="112" fill="#7ec8e3" font-size="12" xml:space="preserve">[{</text>
  <text x="80" y="130" fill="#ce9178" font-size="12" xml:space="preserve">  "Name": </text><text x="200" y="130" fill="#b5cea8" font-size="12" xml:space="preserve">"my-net",</text>
  <text x="80" y="148" fill="#ce9178" font-size="12" xml:space="preserve">  "Driver": </text><text x="200" y="148" fill="#b5cea8" font-size="12" xml:space="preserve">"bridge",</text>
  <text x="80" y="166" fill="#ce9178" font-size="12" xml:space="preserve">  "Scope": </text><text x="200" y="166" fill="#b5cea8" font-size="12" xml:space="preserve">"local",</text>
  <text x="80" y="184" fill="#ce9178" font-size="12" xml:space="preserve">  "IPAM": {</text>
  <text x="80" y="202" fill="#888" font-size="12" xml:space="preserve">    "Config": [{</text>
  <text x="80" y="220" fill="#ce9178" font-size="12" xml:space="preserve">      "Subnet":</text>
  <text x="200" y="220" fill="#b5cea8" font-size="12" xml:space="preserve">"172.20.0.0/16",</text>
  <text x="80" y="238" fill="#ce9178" font-size="12" xml:space="preserve">      "Gateway":</text>
  <text x="200" y="238" fill="#b5cea8" font-size="12" xml:space="preserve">"172.20.0.1"</text>
  <text x="80" y="256" fill="#888" font-size="12" xml:space="preserve">    }]},</text>
  <text x="80" y="274" fill="#ce9178" font-size="12" xml:space="preserve">  "Containers": {</text>
  <text x="80" y="292" fill="#888" font-size="12" xml:space="preserve">    "abc123": {</text>
  <text x="80" y="310" fill="#ce9178" font-size="12" xml:space="preserve">      "Name": </text><text x="200" y="310" fill="#b5cea8" font-size="12" xml:space="preserve">"web",</text>
  <text x="80" y="328" fill="#ce9178" font-size="12" xml:space="preserve">      "IPv4Address":</text>
  <text x="80" y="346" fill="#b5cea8" font-size="12" xml:space="preserve">        "172.20.0.2/16"</text>
  <text x="80" y="364" fill="#888" font-size="12" xml:space="preserve">    }}</text>
  <text x="80" y="382" fill="#888" font-size="12" xml:space="preserve">  }</text>
  <text x="80" y="400" fill="#7ec8e3" font-size="12" xml:space="preserve">}]</text>

  <!-- Right: field annotations -->
  <rect x="480" y="88" width="360" height="340" rx="8" fill="#0d1320" stroke="#7ec8e3" stroke-width="1"/>
  <text x="500" y="114" fill="#7ec8e3" font-size="13" font-weight="600">필드 설명</text>
  <line x1="500" y1="122" x2="820" y2="122" stroke="#1e2433" stroke-width="1"/>

  <text x="500" y="146" fill="#ce9178" font-size="12">Name</text>
  <text x="600" y="146" fill="#888" font-size="11">네트워크 이름</text>

  <text x="500" y="170" fill="#ce9178" font-size="12">Id</text>
  <text x="600" y="170" fill="#888" font-size="11">네트워크 고유 ID (64자 해시)</text>

  <text x="500" y="194" fill="#ce9178" font-size="12">Driver</text>
  <text x="600" y="194" fill="#888" font-size="11">드라이버 (bridge/overlay…)</text>

  <text x="500" y="218" fill="#ce9178" font-size="12">Scope</text>
  <text x="600" y="218" fill="#888" font-size="11">local / swarm / global</text>

  <text x="500" y="242" fill="#ce9178" font-size="12">Internal</text>
  <text x="600" y="242" fill="#888" font-size="11">외부 차단 여부 (bool)</text>

  <text x="500" y="266" fill="#ce9178" font-size="12">IPAM.Config</text>
  <text x="600" y="266" fill="#888" font-size="11">서브넷·게이트웨이</text>

  <text x="500" y="290" fill="#ce9178" font-size="12">Containers</text>
  <text x="600" y="290" fill="#888" font-size="11">연결된 컨테이너 목록</text>

  <text x="500" y="314" fill="#ce9178" font-size="12">IPv4Address</text>
  <text x="600" y="314" fill="#888" font-size="11">컨테이너 IP/마스크</text>

  <text x="500" y="338" fill="#ce9178" font-size="12">Options</text>
  <text x="600" y="338" fill="#888" font-size="11">--opt으로 지정한 옵션들</text>

  <text x="500" y="362" fill="#ce9178" font-size="12">Labels</text>
  <text x="600" y="362" fill="#888" font-size="11">네트워크 레이블 (메타)</text>

  <text x="500" y="386" fill="#ce9178" font-size="12">Peers</text>
  <text x="600" y="386" fill="#888" font-size="11">overlay: 참여 호스트 목록</text>

  <text x="500" y="410" fill="#ce9178" font-size="12">EnableIPv6</text>
  <text x="600" y="410" fill="#888" font-size="11">IPv6 활성화 여부</text>
</svg>
