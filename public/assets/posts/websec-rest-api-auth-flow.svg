<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">REST API 인증 흐름 및 토큰 검증</text>

  <!-- Client -->
  <rect x="60" y="68" width="120" height="52" rx="6" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="120" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">클라이언트</text>
  <text x="120" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Bearer Token</text>

  <!-- Arrow: request with token -->
  <line x1="180" y1="94" x2="240" y2="94" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="210" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">요청</text>

  <!-- Auth Middleware -->
  <rect x="240" y="62" width="200" height="64" rx="8" fill="#1a1a0d" stroke="#4a4a1a" stroke-width="2"/>
  <text x="340" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">인증 미들웨어</text>
  <text x="340" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JWT 서명 검증</text>
  <text x="340" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">만료 시간 확인</text>

  <!-- Valid path -->
  <line x1="440" y1="94" x2="490" y2="94" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="465" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">유효</text>

  <!-- Auth check -->
  <rect x="490" y="62" width="200" height="64" rx="8" fill="#0d1a1a" stroke="#1a4a4a" stroke-width="2"/>
  <text x="590" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">인가 미들웨어</text>
  <text x="590" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">역할(Role) 확인</text>
  <text x="590" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리소스 소유자 확인</text>

  <line x1="690" y1="94" x2="740" y2="94" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="715" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">허가</text>

  <rect x="740" y="68" width="100" height="52" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="790" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">비즈니스</text>
  <text x="790" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">로직</text>

  <!-- Invalid path -->
  <line x1="340" y1="126" x2="340" y2="156" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <text x="355" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">무효</text>
  <rect x="240" y="156" width="200" height="36" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="340" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">401 Unauthorized</text>

  <!-- No auth path -->
  <line x1="590" y1="126" x2="590" y2="156" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <text x="605" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">거부</text>
  <rect x="490" y="156" width="200" height="36" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="590" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">403 Forbidden</text>

  <!-- Code block: Express JWT middleware -->
  <rect x="60" y="214" width="760" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Express JWT 인증 + 인가 미들웨어 (Node.js)</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const verifyToken = (req, res, next) =&gt; {</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  const token = req.headers.authorization</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    ?.replace("Bearer ", "");</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  if (!token)</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    return res.status(401).json({error:"No token"});</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  try {</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    req.user = jwt.verify(token, process.env.JWT_SECRET,</text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">      {algorithms: ["HS256"]}); // 알고리즘 명시 필수</text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    next();</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  } catch { res.status(401).json({error:"Invalid"}); }</text>
</svg>
