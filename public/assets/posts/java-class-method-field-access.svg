<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">setAccessible(true) — 캡슐화를 넘어선다</text>

  <defs>
    <marker id="caArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="caArrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect x="60" y="90" width="320" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="118" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># private 필드 직접 읽기</text>
  <text x="76" y="142" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">Field f = c.getDeclaredField("pw");</text>
  <text x="76" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">f.setAccessible(true);</text>
  <text x="76" y="190" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">Object v = f.get(user);</text>
  <text x="76" y="222" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># private이어도 접근 성공</text>

  <rect x="480" y="100" width="340" height="60" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="126" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">DI · ORM · 직렬화에 필수</text>
  <text x="650" y="147" font-size="12" fill="#888" text-anchor="middle">생성자 없이 필드 주입 가능</text>

  <rect x="480" y="180" width="340" height="60" rx="8" fill="#1a0f12" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="206" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">모듈 강한 캡슐화와 충돌</text>
  <text x="650" y="227" font-size="12" fill="#888" text-anchor="middle">InaccessibleObjectException</text>

  <line x1="380" y1="150" x2="478" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#caArrG)"/>
  <line x1="380" y1="180" x2="478" y2="208" stroke="#e05555" stroke-width="2" marker-end="url(#caArr)"/>
</svg>
