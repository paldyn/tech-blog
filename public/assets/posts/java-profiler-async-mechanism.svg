<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">두 가지 프로파일링 방식</text>

  <rect x="40" y="80" width="380" height="190" rx="8" fill="#101010" stroke="#e05555" stroke-width="1"/>
  <text x="56" y="108" font-size="15" font-weight="600" fill="#e05555">인스트루먼테이션</text>
  <text x="56" y="136" font-size="13" fill="#9aa4b8">메서드 진입·종료에 코드 삽입</text>
  <text x="56" y="158" font-size="13" fill="#9aa4b8">→ 정확한 호출 횟수</text>
  <text x="56" y="184" font-size="13" fill="#9aa4b8">단점: 오버헤드 큼, 인라이닝</text>
  <text x="56" y="204" font-size="13" fill="#9aa4b8">방해 → 측정이 동작을 왜곡</text>
  <text x="56" y="234" font-size="13" fill="#9aa4b8">(관찰자 효과)</text>

  <rect x="460" y="80" width="380" height="190" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="108" font-size="15" font-weight="600" fill="#55c555">샘플링 (async-profiler)</text>
  <text x="476" y="136" font-size="13" fill="#9aa4b8">주기적으로 스택을 스냅샷</text>
  <text x="476" y="158" font-size="13" fill="#9aa4b8">perf_events + AsyncGetCallTrace</text>
  <text x="476" y="184" font-size="13" fill="#9aa4b8">→ 세이프포인트 편향 없음</text>
  <text x="476" y="204" font-size="13" fill="#9aa4b8">장점: 오버헤드 1~2%대,</text>
  <text x="476" y="234" font-size="13" fill="#9aa4b8">네이티브·커널 프레임까지 포착</text>
</svg>
