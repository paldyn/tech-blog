<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PARTITION BY — 독립 윈도우 분할</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">파티션 경계를 넘어서는 집계·순위가 발생하지 않는다</text>

  <!-- Left: raw data -->
  <text x="175" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">원본 데이터</text>
  <rect x="60" y="110" width="230" height="270" rx="6" fill="#0e1117" stroke="#3a4a6e"/>
  <!-- Headers -->
  <line x1="60" y1="140" x2="290" y2="140" stroke="#3a4a6e"/>
  <line x1="155" y1="110" x2="155" y2="380" stroke="#3a4a6e"/>
  <text x="107" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">dept</text>
  <text x="222" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">salary</text>

  <!-- Rows -->
  <text x="107" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">개발</text>
  <text x="222" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">700</text>
  <line x1="60" y1="170" x2="290" y2="170" stroke="#252b3a"/>

  <text x="107" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">개발</text>
  <text x="222" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">600</text>
  <line x1="60" y1="200" x2="290" y2="200" stroke="#252b3a"/>

  <text x="107" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">개발</text>
  <text x="222" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">550</text>
  <line x1="60" y1="230" x2="290" y2="230" stroke="#3a4a6e" stroke-width="2"/>

  <text x="107" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">영업</text>
  <text x="222" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">500</text>
  <line x1="60" y1="260" x2="290" y2="260" stroke="#252b3a"/>

  <text x="107" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">영업</text>
  <text x="222" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">480</text>
  <line x1="60" y1="290" x2="290" y2="290" stroke="#252b3a"/>

  <text x="107" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">영업</text>
  <text x="222" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">450</text>
  <line x1="60" y1="320" x2="290" y2="320" stroke="#3a4a6e" stroke-width="2"/>

  <text x="107" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">인사</text>
  <text x="222" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">420</text>
  <line x1="60" y1="350" x2="290" y2="350" stroke="#252b3a"/>

  <text x="107" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">인사</text>
  <text x="222" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">390</text>

  <!-- Arrow -->
  <line x1="310" y1="245" x2="360" y2="245" stroke="#555" stroke-width="2"/>
  <polygon points="355,240 365,245 355,250" fill="#555"/>
  <text x="335" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">PARTITION</text>
  <text x="335" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">BY dept</text>

  <!-- Right: partitioned windows -->
  <text x="590" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">파티션별 독립 윈도우</text>

  <!-- 개발 partition -->
  <rect x="380" y="110" width="220" height="116" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="490" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">개발 파티션</text>
  <text x="430" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">700</text>
  <text x="545" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">rank=1</text>
  <text x="430" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">600</text>
  <text x="545" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">rank=2</text>
  <text x="430" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">550</text>
  <text x="545" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">rank=3</text>
  <text x="490" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">avg=616.7</text>

  <!-- 영업 partition -->
  <rect x="380" y="242" width="220" height="116" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">영업 파티션</text>
  <text x="430" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">500</text>
  <text x="545" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">rank=1</text>
  <text x="430" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">480</text>
  <text x="545" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">rank=2</text>
  <text x="430" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">450</text>
  <text x="545" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">rank=3</text>
  <text x="490" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">avg=476.7</text>

  <!-- 인사 partition -->
  <rect x="380" y="374" width="220" height="50" rx="6" fill="#12101a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="490" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7777cc">인사 파티션</text>
  <text x="430" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">420, 390</text>
  <text x="545" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">1, 2</text>

  <!-- Key insight box -->
  <rect x="620" y="110" width="240" height="316" rx="6" fill="#111218" stroke="#3a4a6e"/>
  <text x="740" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">핵심 원칙</text>
  <line x1="634" y1="140" x2="846" y2="140" stroke="#3a4a6e"/>
  <text x="640" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">① 파티션은 독립</text>
  <text x="640" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">  경계를 넘는 집계 없음</text>
  <text x="640" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">② 순위는 파티션 내</text>
  <text x="640" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">  모든 파티션에서 1부터</text>
  <text x="640" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">③ ORDER BY는 정렬만</text>
  <text x="640" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">  파티션 구분 역할 없음</text>
  <text x="640" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">④ 생략 가능</text>
  <text x="640" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">  PARTITION BY 생략 →</text>
  <text x="640" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">  전체가 하나의 파티션</text>
  <text x="640" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">⑤ 복수 컬럼 가능</text>
  <text x="640" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">  PARTITION BY a, b</text>
  <text x="640" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">  → (a,b) 조합별 분할</text>
  <text x="640" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">  GROUP BY와 달리 행 유지</text>
</svg>
