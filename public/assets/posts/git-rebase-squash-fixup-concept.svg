      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">squash vs fixup 비교</text>

  <!-- Before: 4 commits -->
  <text x="200" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">rebase -i 전 (4커밋)</text>
  <rect x="60" y="96" width="140" height="52" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="130" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">pick abc1234</text>
  <text x="130" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">feat: init login</text>

  <rect x="60" y="162" width="140" height="52" rx="6" fill="#1a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">squash def5678</text>
  <text x="130" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">wip: add form</text>

  <rect x="60" y="228" width="140" height="52" rx="6" fill="#1a0d10" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">fixup ghi9abc</text>
  <text x="130" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">fix: typo</text>

  <rect x="60" y="294" width="140" height="52" rx="6" fill="#1a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">squash jkl0123</text>
  <text x="130" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">add validation</text>

  <!-- Arrow -->
  <line x1="240" y1="220" x2="298" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arrsq2)"/>
  <text x="268" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">합병</text>

  <!-- After: 1 commit -->
  <text x="570" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">rebase 후 (1커밋)</text>
  <rect x="300" y="180" width="540" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="570" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">새 커밋 xyz7890</text>
  <text x="570" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">feat: init login</text>
  <text x="570" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">wip: add form  (squash — 메시지 포함)</text>

  <!-- Difference note -->
  <rect x="60" y="370" width="760" height="70" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">squash vs fixup 차이</text>
  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">squash(s): 이 커밋의 메시지를 최종 메시지에 포함 (에디터 열림)</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">fixup(f): 이 커밋의 메시지를 버리고 pick 커밋 메시지만 유지 (에디터 안 열림)</text>
