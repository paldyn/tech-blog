<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">리스트 렌더링: 배열 &#x2192; JSX</text>

  <rect x="60" y="68" width="200" height="160" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">배열 (원본)</text>
  <rect x="76" y="106" width="168" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">[</text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  { id: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    name: </tspan><tspan fill="#ce9178">'Alice'</tspan><tspan fill="#ffffff"> },</tspan></text>
  <text x="92" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  { id: </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    name: </tspan><tspan fill="#ce9178">'Bob'</tspan><tspan fill="#ffffff"> }</tspan></text>

  <line x1="260" y1="148" x2="310" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="285" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">.map()</text>

  <rect x="310" y="68" width="240" height="160" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="430" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">JSX 배열 (key 포함)</text>
  <rect x="326" y="106" width="208" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="342" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">[</text>
  <text x="342" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#55c555">li</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">key</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"1"</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="342" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    Alice&lt;/</tspan><tspan fill="#55c555">li</tspan><tspan fill="#ffffff">&gt;,</tspan></text>
  <text x="342" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#55c555">li</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">key</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"2"</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="342" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    Bob&lt;/</tspan><tspan fill="#55c555">li</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <line x1="550" y1="148" x2="600" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="575" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">렌더링</text>

  <rect x="600" y="68" width="220" height="160" rx="12" fill="#1a1025" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="710" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#cc77cc">실제 DOM</text>
  <rect x="616" y="106" width="188" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="632" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">&lt;ul&gt;</text>
  <text x="632" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  &lt;li&gt;Alice&lt;/li&gt;</text>
  <text x="632" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  &lt;li&gt;Bob&lt;/li&gt;</text>
  <text x="632" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">&lt;/ul&gt;</text>

  <rect x="60" y="252" width="760" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 기본 리스트 렌더링 패턴</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> UserList({ users }) {</tspan></text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (!users.length) </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;비어있음&lt;/</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;;</tspan></text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> (</tspan></text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#55c555">ul</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      {users.map(user =&gt; &lt;</tspan><tspan fill="#55c555">li</tspan><tspan fill="#ffffff"> key={user.id}&gt;{user.name}&lt;/</tspan><tspan fill="#55c555">li</tspan><tspan fill="#ffffff">&gt;)}</tspan></text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    &lt;/</tspan><tspan fill="#55c555">ul</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  );</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
