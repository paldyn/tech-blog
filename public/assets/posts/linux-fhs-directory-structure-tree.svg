<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">FHS 디렉터리 트리</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Filesystem Hierarchy Standard — 최상위 디렉터리 구조</text>

  <!-- Root -->
  <rect x="380" y="90" width="120" height="36" fill="#0d1a2a" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">/</text>

  <!-- Vertical line from root -->
  <line x1="440" y1="126" x2="440" y2="148" stroke="#333" stroke-width="1.5"/>

  <!-- Horizontal line -->
  <line x1="100" y1="148" x2="780" y2="148" stroke="#333" stroke-width="1.5"/>

  <!-- /bin -->
  <line x1="115" y1="148" x2="115" y2="166" stroke="#333" stroke-width="1.5"/>
  <rect x="60" y="166" width="110" height="32" fill="#0d1f0d" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="115" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">/bin</text>

  <!-- /sbin -->
  <line x1="215" y1="148" x2="215" y2="166" stroke="#333" stroke-width="1.5"/>
  <rect x="160" y="166" width="110" height="32" fill="#0d1f0d" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="215" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">/sbin</text>

  <!-- /etc -->
  <line x1="315" y1="148" x2="315" y2="166" stroke="#333" stroke-width="1.5"/>
  <rect x="260" y="166" width="110" height="32" fill="#1c1a0d" rx="4" stroke="#e8c55a" stroke-width="1"/>
  <text x="315" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" text-anchor="middle">/etc</text>

  <!-- /home -->
  <line x1="415" y1="148" x2="415" y2="166" stroke="#333" stroke-width="1.5"/>
  <rect x="360" y="166" width="110" height="32" fill="#1a0d1a" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="415" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">/home</text>

  <!-- /var -->
  <line x1="515" y1="148" x2="515" y2="166" stroke="#333" stroke-width="1.5"/>
  <rect x="460" y="166" width="110" height="32" fill="#1a0d0d" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="515" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">/var</text>

  <!-- /usr -->
  <line x1="615" y1="148" x2="615" y2="166" stroke="#333" stroke-width="1.5"/>
  <rect x="560" y="166" width="110" height="32" fill="#0d1a2a" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="615" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">/usr</text>

  <!-- /tmp -->
  <line x1="715" y1="148" x2="715" y2="166" stroke="#333" stroke-width="1.5"/>
  <rect x="660" y="166" width="110" height="32" fill="#0a1a0a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="715" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">/tmp</text>

  <!-- Descriptions below icons -->
  <text x="115" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">기본 명령어</text>
  <text x="215" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">시스템 명령</text>
  <text x="315" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">설정 파일</text>
  <text x="415" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">사용자 홈</text>
  <text x="515" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">가변 데이터</text>
  <text x="615" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">사용자 앱</text>
  <text x="715" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">임시 파일</text>

  <!-- Second row: more dirs -->
  <line x1="100" y1="250" x2="780" y2="250" stroke="#222" stroke-width="1"/>

  <!-- /dev /proc /sys /lib /opt /srv /root /boot -->
  <line x1="115" y1="250" x2="115" y2="268" stroke="#222" stroke-width="1"/>
  <rect x="60" y="268" width="110" height="32" fill="#080d14" rx="4" stroke="#2a3a4a" stroke-width="1"/>
  <text x="115" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">/dev</text>

  <line x1="215" y1="250" x2="215" y2="268" stroke="#222" stroke-width="1"/>
  <rect x="160" y="268" width="110" height="32" fill="#080d14" rx="4" stroke="#2a3a4a" stroke-width="1"/>
  <text x="215" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">/proc</text>

  <line x1="315" y1="250" x2="315" y2="268" stroke="#222" stroke-width="1"/>
  <rect x="260" y="268" width="110" height="32" fill="#080d14" rx="4" stroke="#2a3a4a" stroke-width="1"/>
  <text x="315" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">/sys</text>

  <line x1="415" y1="250" x2="415" y2="268" stroke="#222" stroke-width="1"/>
  <rect x="360" y="268" width="110" height="32" fill="#080d14" rx="4" stroke="#2a3a4a" stroke-width="1"/>
  <text x="415" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#aaa" text-anchor="middle">/lib</text>

  <line x1="515" y1="250" x2="515" y2="268" stroke="#222" stroke-width="1"/>
  <rect x="460" y="268" width="110" height="32" fill="#080d14" rx="4" stroke="#2a3a4a" stroke-width="1"/>
  <text x="515" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#aaa" text-anchor="middle">/opt</text>

  <line x1="615" y1="250" x2="615" y2="268" stroke="#222" stroke-width="1"/>
  <rect x="560" y="268" width="110" height="32" fill="#080d14" rx="4" stroke="#2a3a4a" stroke-width="1"/>
  <text x="615" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#aaa" text-anchor="middle">/root</text>

  <line x1="715" y1="250" x2="715" y2="268" stroke="#222" stroke-width="1"/>
  <rect x="660" y="268" width="110" height="32" fill="#080d14" rx="4" stroke="#2a3a4a" stroke-width="1"/>
  <text x="715" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#aaa" text-anchor="middle">/boot</text>

  <!-- /usr subtree -->
  <text x="615" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">/usr 하위 구조</text>
  <line x1="500" y1="346" x2="730" y2="346" stroke="#333" stroke-width="1"/>
  <line x1="520" y1="346" x2="520" y2="364" stroke="#333" stroke-width="1"/>
  <rect x="470" y="364" width="100" height="28" fill="#080d14" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="520" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">/usr/bin</text>
  <line x1="615" y1="346" x2="615" y2="364" stroke="#333" stroke-width="1"/>
  <rect x="565" y="364" width="100" height="28" fill="#080d14" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="615" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">/usr/lib</text>
  <line x1="710" y1="346" x2="710" y2="364" stroke="#333" stroke-width="1"/>
  <rect x="660" y="364" width="100" height="28" fill="#080d14" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">/usr/local</text>

  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">현대 배포판에서 /bin, /lib은 /usr/bin, /usr/lib의 심볼릭 링크</text>

  <!-- /var subtree -->
  <text x="190" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">/var 하위 구조</text>
  <line x1="80" y1="346" x2="320" y2="346" stroke="#333" stroke-width="1"/>
  <line x1="100" y1="346" x2="100" y2="364" stroke="#333" stroke-width="1"/>
  <rect x="55" y="364" width="90" height="28" fill="#080d14" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">/var/log</text>
  <line x1="200" y1="346" x2="200" y2="364" stroke="#333" stroke-width="1"/>
  <rect x="152" y="364" width="96" height="28" fill="#080d14" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">/var/lib</text>
  <line x1="300" y1="346" x2="300" y2="364" stroke="#333" stroke-width="1"/>
  <rect x="252" y="364" width="96" height="28" fill="#080d14" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="300" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">/var/tmp</text>

  <text x="440" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#444" text-anchor="middle">FHS 표준: https://refspecs.linuxfoundation.org/fhs.shtml</text>
</svg>
