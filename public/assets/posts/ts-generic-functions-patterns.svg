<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제네릭 함수 실전 패턴</text>

  <!-- Code block -->
  <rect x="60" y="64" width="760" height="304" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 1. 배열 첫 번째 요소 반환</text>
  <text x="76" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">function</text>
  <text x="148" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> first&lt;T&gt;(arr: T[]): T | </text>
  <text x="353" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">undefined</text>
  <text x="429" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> {</text>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="143" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> arr[</text>
  <text x="179" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#b5cea8">0</text>
  <text x="187" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">];</text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">}</text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">const</text>
  <text x="124" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> n = first([</text>
  <text x="213" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#b5cea8">1</text>
  <text x="221" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">, </text>
  <text x="237" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#b5cea8">2</text>
  <text x="245" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">, </text>
  <text x="261" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#b5cea8">3</text>
  <text x="269" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">]); </text>
  <text x="310" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// n: number | undefined</text>

  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 2. 다중 타입 파라미터</text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">function</text>
  <text x="148" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> zip&lt;A, B&gt;(a: A[], b: B[]): [A, B][] {</text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="143" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> a.map((item, i) =&gt; [item, b[i]]);</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">}</text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">const</text>
  <text x="124" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> pairs = zip([</text>
  <text x="225" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#b5cea8">1</text>
  <text x="233" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">, </text>
  <text x="249" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#b5cea8">2</text>
  <text x="257" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">], [</text>
  <text x="281" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">"a"</text>
  <text x="313" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">, </text>
  <text x="329" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">"b"</text>
  <text x="361" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">]); </text>
  <text x="402" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// [number, string][]</text>

  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 3. 제약 조건(constraint)</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">function</text>
  <text x="148" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> getLength&lt;T </text>
  <text x="264" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">extends</text>
  <text x="335" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> { length: </text>
  <text x="424" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">number</text>
  <text x="485" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> })(x: T): </text>
  <text x="578" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">number</text>
  <text x="639" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> {</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="143" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> x.length; }</text>
</svg>
