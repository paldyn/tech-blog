<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">방화벽 세대별 진화</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">패킷 필터 → 스테이트풀 → 애플리케이션 → NGFW</text>

  <!-- 1세대: 패킷 필터링 -->
  <rect x="60" y="88" width="360" height="92" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">1세대: 패킷 필터링 방화벽</text>
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">IP 주소, 포트, 프로토콜(TCP/UDP) 기반 규칙</text>
  <text x="80" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">연결 상태 추적 없음 → 각 패킷 독립 평가</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">iptables, ACL</text>

  <!-- 2세대: 스테이트풀 -->
  <rect x="460" y="88" width="360" height="92" rx="8" fill="#1a0d2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">2세대: 스테이트풀 인스펙션</text>
  <text x="480" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">연결 상태 테이블(State Table) 유지</text>
  <text x="480" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">허가된 연결의 응답 패킷 자동 허용</text>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Cisco ASA, iptables conntrack</text>

  <!-- 3세대: 애플리케이션 계층 -->
  <rect x="60" y="204" width="360" height="92" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">3세대: 애플리케이션 레이어 방화벽</text>
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">HTTP/FTP 등 L7 프로토콜 이해</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">URI, 헤더, 페이로드 내용 검사</text>
  <text x="80" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">WAF, 프록시 방화벽</text>

  <!-- 4세대: NGFW -->
  <rect x="460" y="204" width="360" height="92" rx="8" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="640" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c44a">4세대: NGFW (차세대 방화벽)</text>
  <text x="480" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">DPI + IPS/IDS + 앱 인식 + 사용자 식별</text>
  <text x="480" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SSL/TLS 복호화 검사 (HTTPS 트래픽)</text>
  <text x="480" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Palo Alto, Fortinet, Check Point</text>

  <!-- iptables 예시 코드 -->
  <rect x="60" y="316" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># iptables 기본 패킷 필터링 예시</text>
  <text x="80" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 기본 정책: 모두 DROP</text>
  <text x="80" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">iptables</text>
  <text x="161" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> -P INPUT DROP</text>
  <text x="80" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># HTTPS 허용 + 기존 연결 응답 허용</text>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">iptables</text>
  <text x="161" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> -A INPUT -p tcp --dport 443 -j ACCEPT</text>
</svg>
