<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a" rx="12">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">QLoRA vs LoRA vs Full FT 메모리 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">모델 크기별 GPU VRAM 요구량 (배치 크기 1, bf16/4bit 기준 추정)</text>

  <!-- Y-axis -->
  <line x1="110" y1="100" x2="110" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="110" y1="400" x2="840" y2="400" stroke="#333" stroke-width="1"/>

  <!-- Y grid + labels (max 160GB) -->
  <!-- 160GB → 300px range: 100%=300px, 10GB=18.75px -->
  <line x1="110" y1="400" x2="840" y2="400" stroke="#1e2433" stroke-width="1"/>
  <line x1="110" y1="325" x2="840" y2="325" stroke="#1e2433" stroke-width="1"/>
  <line x1="110" y1="250" x2="840" y2="250" stroke="#1e2433" stroke-width="1"/>
  <line x1="110" y1="175" x2="840" y2="175" stroke="#1e2433" stroke-width="1"/>
  <line x1="110" y1="100" x2="840" y2="100" stroke="#1e2433" stroke-width="1"/>

  <text x="98" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">0</text>
  <text x="98" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">40GB</text>
  <text x="98" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">80GB</text>
  <text x="98" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">120GB</text>
  <text x="98" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">160GB</text>
  <text x="65" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" transform="rotate(-90,65,260)">GPU VRAM (GB)</text>

  <!-- A100 80GB reference line -->
  <line x1="110" y1="250" x2="840" y2="250" stroke="#55c555" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <rect x="700" y="237" width="132" height="18" rx="4" fill="#0d1f0d"/>
  <text x="766" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">단일 A100 80GB 한계</text>

  <!-- === 7B model group === -->
  <text x="230" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">7B 모델</text>

  <!-- 7B Full FT: ~112GB (bf16 14GB + grads 14GB + optimizer 28GB + activations ~56GB) -->
  <!-- 112GB → y = 400 - (112/160)*300 = 400-210 = 190 -->
  <rect x="140" y="190" width="52" height="210" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="166" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">112GB</text>

  <!-- 7B LoRA: ~28GB -->
  <!-- 28GB → y = 400 - (28/160)*300 = 400-52.5 = 347.5 -->
  <rect x="202" y="348" width="52" height="52" rx="4" fill="#7777cc" opacity="0.8"/>
  <text x="228" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle" font-weight="600">28GB</text>

  <!-- 7B QLoRA: ~6GB -->
  <!-- 6GB → y = 400 - (6/160)*300 = 400-11.25 = 388.75 -->
  <rect x="264" y="389" width="52" height="11" rx="4" fill="#55c555" opacity="0.85"/>
  <text x="290" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle" font-weight="600">6GB</text>

  <!-- === 13B model group === -->
  <text x="460" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">13B 모델</text>

  <!-- 13B Full FT: ~208GB -->
  <!-- capped at 160GB display: y=100 -->
  <rect x="370" y="100" width="52" height="300" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="396" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">208GB↑</text>

  <!-- 13B LoRA: ~52GB -->
  <!-- 52GB → y = 400 - (52/160)*300 = 400-97.5 = 302.5 -->
  <rect x="432" y="303" width="52" height="97" rx="4" fill="#7777cc" opacity="0.8"/>
  <text x="458" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle" font-weight="600">52GB</text>

  <!-- 13B QLoRA: ~12GB -->
  <!-- 12GB → y = 400 - (12/160)*300 = 400-22.5 = 377.5 -->
  <rect x="494" y="378" width="52" height="22" rx="4" fill="#55c555" opacity="0.85"/>
  <text x="520" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle" font-weight="600">12GB</text>

  <!-- === 70B model group === -->
  <text x="695" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">70B 모델</text>

  <!-- 70B Full FT: >1000GB - show as overflow -->
  <rect x="605" y="100" width="52" height="300" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="631" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">1TB+↑</text>

  <!-- 70B LoRA: ~280GB (bf16 140GB + optimizer + grads) -->
  <rect x="667" y="100" width="52" height="300" rx="4" fill="#7777cc" opacity="0.8"/>
  <text x="693" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle" font-weight="600">280GB↑</text>

  <!-- 70B QLoRA: ~48GB -->
  <!-- 48GB → y = 400 - (48/160)*300 = 400-90 = 310 -->
  <rect x="729" y="310" width="52" height="90" rx="4" fill="#55c555" opacity="0.85"/>
  <text x="755" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle" font-weight="600">48GB</text>

  <!-- Legend -->
  <rect x="110" y="440" width="730" height="60" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <rect x="130" y="462" width="14" height="14" rx="3" fill="#e05555" opacity="0.8"/>
  <text x="150" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Full Fine-tuning (bf16)</text>
  <rect x="310" y="462" width="14" height="14" rx="3" fill="#7777cc" opacity="0.8"/>
  <text x="330" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">LoRA (bf16 베이스)</text>
  <rect x="490" y="462" width="14" height="14" rx="3" fill="#55c555" opacity="0.85"/>
  <text x="510" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">QLoRA (4-bit NF4) ← 단일 소비자 GPU 가능</text>
  <text x="440" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">QLoRA: 70B 모델도 48GB(듀얼 RTX 4090 또는 단일 A6000 48GB)로 파인튜닝 가능</text>
</svg>
