<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 레이아웃 모델</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">절대 좌표 배치 + Anchor 상대 조정</text>

  <!-- Form outer -->
  <rect x="60" y="90" width="760" height="360" rx="8" fill="#0e0e1c" stroke="#7777cc" stroke-width="2"/>
  <text x="100" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Form (1720 × 1020)</text>

  <!-- Component 1: left/top absolute -->
  <rect x="100" y="126" width="280" height="80" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Button (절대 좌표)</text>
  <text x="240" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">left="40" top="16"</text>
  <text x="240" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">width="200" height="40"</text>

  <!-- Margin labels -->
  <!-- Left margin -->
  <line x1="80" y1="166" x2="100" y2="166" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="80" y1="162" x2="80" y2="170" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="100" y1="162" x2="100" y2="170" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">left</text>

  <!-- Anchor demo -->
  <rect x="440" y="126" width="340" height="80" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="610" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Grid (Anchor 적용)</text>
  <text x="610" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">anchors="right bottom"</text>
  <text x="610" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">우하단에 고정 · 폼 크기 변화 시 이동</text>

  <!-- Style properties demo -->
  <rect x="100" y="234" width="620" height="186" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="410" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 배치 속성</text>

  <!-- left, top, width, height -->
  <text x="120" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">기본 위치 속성</text>
  <text x="120" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">left / top</text>
  <text x="280" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">: 부모 컨테이너 기준 픽셀 좌표</text>
  <text x="120" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">width / height</text>
  <text x="280" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">: 픽셀 크기 (px) 또는 %</text>
  <text x="120" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">right / bottom</text>
  <text x="280" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">: 부모 우/하단 기준 거리</text>

  <!-- anchor, margin -->
  <text x="460" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">유동 배치 속성</text>
  <text x="460" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">anchors</text>
  <text x="560" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">: 고정할 변(left right top bottom)</text>
  <text x="460" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">margin</text>
  <text x="560" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">: 바깥 여백 (top right bottom left)</text>
  <text x="460" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">padding</text>
  <text x="560" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">: 안쪽 여백 (Div·Form에 적용)</text>

  <!-- style -->
  <text x="120" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a">스타일 속성</text>
  <text x="120" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">style</text>
  <text x="200" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">: CSS 유사 속성 (background, color, font-size, border …)</text>
  <text x="120" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">cssclass</text>
  <text x="200" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">: .css 파일의 클래스명 참조 (theme 적용 시)</text>

  <!-- Footer -->
  <text x="440" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
