<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tsc 컴파일러 내부 파이프라인</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">.ts 파일이 .js로 변환되는 5단계 과정</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="fp" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Step boxes (horizontal flow at y=140) -->

  <!-- Stage 1: Scanner/Lexer -->
  <rect x="60" y="120" width="130" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="125" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Scanner</text>
  <text x="125" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">어휘 분석</text>
  <text x="125" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">토큰 생성</text>
  <text x="125" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">keyword, id...</text>

  <!-- Arrow 1-2 -->
  <line x1="190" y1="170" x2="214" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fp)"/>

  <!-- Stage 2: Parser -->
  <rect x="216" y="120" width="130" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="281" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Parser</text>
  <text x="281" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">구문 분석</text>
  <text x="281" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">AST 생성</text>
  <text x="281" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">추상 구문 트리</text>

  <!-- Arrow 2-3 -->
  <line x1="346" y1="170" x2="370" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fp)"/>

  <!-- Stage 3: Binder -->
  <rect x="372" y="120" width="130" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="437" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Binder</text>
  <text x="437" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">심볼 바인딩</text>
  <text x="437" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">스코프 분석</text>
  <text x="437" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">심볼 테이블</text>

  <!-- Arrow 3-4 -->
  <line x1="502" y1="170" x2="526" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fp)"/>

  <!-- Stage 4: Checker (type checker) -->
  <rect x="528" y="120" width="130" height="100" rx="8" fill="#0d1a1a" stroke="#3a8e8e" stroke-width="1.5"/>
  <text x="593" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Checker</text>
  <text x="593" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">&#x2605; 타입 검사</text>
  <text x="593" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">타입 추론</text>
  <text x="593" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">TS 고유 핵심</text>

  <!-- Arrow 4-5 -->
  <line x1="658" y1="170" x2="682" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fp)"/>

  <!-- Stage 5: Emitter -->
  <rect x="684" y="120" width="130" height="100" rx="8" fill="#0d1a0d" stroke="#3a8e3a" stroke-width="1.5"/>
  <text x="749" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Emitter</text>
  <text x="749" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">코드 생성</text>
  <text x="749" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">.js 출력</text>
  <text x="749" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">.d.ts 생성도</text>

  <!-- Input/Output boxes -->
  <rect x="60" y="260" width="130" height="50" rx="6" fill="#111" stroke="#6a4a9e" stroke-width="1"/>
  <text x="125" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">입력: .ts</text>

  <rect x="684" y="260" width="130" height="50" rx="6" fill="#111" stroke="#3a8e3a" stroke-width="1"/>
  <text x="749" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">출력: .js</text>

  <!-- Error path from Checker -->
  <defs>
    <marker id="fperr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <line x1="593" y1="220" x2="593" y2="258" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#fperr)"/>
  <rect x="528" y="260" width="130" height="50" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="593" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">타입 오류 보고</text>

  <!-- tsc noEmit note -->
  <rect x="60" y="346" width="760" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">유용한 tsc 명령어</text>
  <text x="440" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">tsc            tsc --watch            tsc --noEmit</text>
  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">전체 컴파일       변경 감지 자동 컴파일      타입 검사만 (출력 없음)</text>
</svg>
