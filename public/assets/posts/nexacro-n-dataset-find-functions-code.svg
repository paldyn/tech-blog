<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">find 함수 실전 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">findRow · findRowExpr · 순환 탐색</text>

  <!-- Left code block: findRow -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">findRow — 코드로 행 찾기</text>
  <rect x="60" y="110" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 코드 컬럼에서 'A001' 탐색</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">var</tspan><tspan fill="#ffffff"> nRow = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.dsMain</tspan></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .findRow(</tspan><tspan fill="#ce9178">"CODE"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"A001"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (nRow &lt; </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    alert(</tspan><tspan fill="#ce9178">"데이터 없음"</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.dsMain.setRow(nRow);</tspan></text>

  <!-- Right code block: findRowExpr -->
  <text x="460" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">findRowExpr — 복합 조건</text>
  <rect x="460" y="110" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// AMT > 1000 이고 STATUS='A'</text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">var</text><text x="512" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> expr =</text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "AMT > 1000 &amp;&amp; STATUS=='A'"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">var</text><text x="512" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> nRow =</text>
  <text x="476" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.dsMain</tspan></text>
  <text x="476" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    .findRowExpr(expr);</text>
  <text x="476" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 반환: 조건 만족 첫 행 번호</text>

  <!-- Bottom: find 순환 탐색 -->
  <text x="60" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">find — 현재 행 이후 순방향 탐색</text>
  <rect x="60" y="296" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text><text x="142" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> fn_findNext(searchVal) {</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    var</tspan><tspan fill="#ffffff"> startRow = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.dsMain.currentrow + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    var</tspan><tspan fill="#ffffff"> nRow = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.dsMain.find(startRow, </tspan><tspan fill="#ce9178">"NAME"</tspan><tspan fill="#ffffff">, searchVal);</tspan></text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    if</tspan><tspan fill="#ffffff"> (nRow == </tspan><tspan fill="#e05555">-1</tspan><tspan fill="#ffffff">) { alert(</tspan><tspan fill="#ce9178">"마지막 검색 완료"</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff">; }</tspan></text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.dsMain.setRow(nRow);</tspan></text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
</svg>
