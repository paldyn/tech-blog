<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">클래스 데코레이터 두 가지 패턴</text>
  <!-- Left: callable class as decorator -->
  <rect x="60" y="70" width="360" height="280" fill="#0d0d20" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">패턴 A: 함수에 클래스 데코레이터</text>
  <text x="240" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클래스 인스턴스가 함수 대체</text>
  <rect x="76" y="122" width="328" height="196" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">class </tspan><tspan fill="#ffffff">Timer:</tspan></text>
  <text x="90" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">__init__(self, func):</tspan></text>
  <text x="90" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        self.func = func</tspan></text>
  <text x="90" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        update_wrapper(self, func)</tspan></text>
  <text x="90" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">__call__(self, *a, **k):</tspan></text>
  <text x="90" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#9aa4b8"># 전처리 / 후처리</tspan></text>
  <text x="90" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">self.func(*a, **k)</tspan></text>
  <text x="240" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">@Timer → greet = Timer(greet)</text>
  <text x="240" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">__call__로 함수처럼 호출 가능</text>
  <!-- Right: decorator applied to class -->
  <rect x="460" y="70" width="360" height="280" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">패턴 B: 클래스에 함수 데코레이터</text>
  <text x="640" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클래스 자체를 변형/등록</text>
  <rect x="476" y="122" width="328" height="196" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">singleton(cls):</tspan></text>
  <text x="490" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    instances = {}</tspan></text>
  <text x="490" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    def </tspan><tspan fill="#ffffff">get_instance(*a,**k):</tspan></text>
  <text x="490" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">if </tspan><tspan fill="#ffffff">cls </tspan><tspan fill="#7ec8e3" font-weight="600">not in </tspan><tspan fill="#ffffff">instances:</tspan></text>
  <text x="490" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">            instances[cls]=cls(*a,**k)</tspan></text>
  <text x="490" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">instances[cls]</tspan></text>
  <text x="490" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    return </tspan><tspan fill="#ffffff">get_instance</tspan></text>
  <text x="640" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">@singleton &#x2192; DB = singleton(DB)</text>
  <text x="640" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클래스 생성자를 감싸 싱글턴 구현</text>
  <!-- VS -->
  <text x="440" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#888">vs</text>
  <!-- Bottom note -->
  <text x="440" y="375" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">두 패턴 모두 decorator(subject) 호출이라는 점은 동일</text>
</svg>
