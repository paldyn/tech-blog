<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <defs>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">key 없을 때 — 리스트 앞에 삽입 문제</text>

  <!-- 기존 리스트 -->
  <text x="230" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">기존 리스트</text>

  <rect x="120" y="88" width="220" height="38" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">index 0: 홍길동</text>

  <rect x="120" y="134" width="220" height="38" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="158" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">index 1: 김철수</text>

  <rect x="120" y="180" width="220" height="38" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="204" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">index 2: 이영희</text>

  <!-- 화살표 -->
  <text x="440" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">앞에 삽입</text>
  <line x1="350" y1="170" x2="468" y2="170" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- 새 리스트 -->
  <text x="650" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">새 리스트 (앞에 박민준 추가)</text>

  <rect x="540" y="88" width="220" height="38" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">index 0: 박민준 (NEW)</text>

  <rect x="540" y="134" width="220" height="38" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="158" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">index 1: 홍길동 (변경?)</text>

  <rect x="540" y="180" width="220" height="38" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="204" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">index 2: 김철수 (변경?)</text>

  <rect x="540" y="226" width="220" height="38" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="250" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">index 3: 이영희 (변경?)</text>

  <!-- 설명 박스 -->
  <rect x="60" y="292" width="760" height="68" rx="10" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">key 없으면 React는 index로 비교한다</text>
  <text x="440" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">4개 노드 모두 "다르다"고 판단 → 4개 전부 업데이트 (비효율)</text>

  <!-- 코드 박스 -->
  <rect x="60" y="378" width="380" height="68" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="400"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// key 없는 위험한 코드</text>
  <text x="76" y="422"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">users.map(u =&gt; &lt;Item user={u} /&gt;)</text>
  <text x="76" y="440"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 경고: key prop missing</text>

  <!-- 오른쪽 코드 박스 -->
  <rect x="460" y="378" width="360" height="68" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="400"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// key 있는 올바른 코드</text>
  <text x="476" y="422"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">users.map(u =&gt; &lt;Item key={u.id} user={u} /&gt;)</text>
  <text x="476" y="440"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// id로 동일성 추적</text>
</svg>
