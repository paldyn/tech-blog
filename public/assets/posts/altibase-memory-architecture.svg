<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Altibase 인메모리 데이터베이스 아키텍처</text>

  <!-- Client -->
  <rect x="60" y="64" width="760" height="48" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">클라이언트 (JDBC / ODBC / CLI / C-API)</text>

  <!-- Arrow -->
  <line x1="440" y1="112" x2="440" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Altibase Server -->
  <rect x="60" y="136" width="760" height="240" rx="8" fill="#0a0d18" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Altibase 서버 프로세스</text>

  <!-- Memory DB area -->
  <rect x="80" y="176" width="320" height="176" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">메모리 데이터베이스</text>
  <text x="240" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(Memory Tablespace)</text>

  <rect x="96" y="232" width="130" height="48" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="161" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">메모리 테이블</text>
  <text x="161" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">행 = 포인터 체인</text>

  <rect x="244" y="232" width="140" height="48" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="314" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">T-Index</text>
  <text x="314" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">B-Tree in Memory</text>

  <text x="240" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">디스크 I/O 없음 — 마이크로초 응답</text>
  <text x="240" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">체크포인트로 디스크에 백업</text>

  <!-- Disk DB area -->
  <rect x="460" y="176" width="340" height="176" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">디스크 데이터베이스</text>
  <text x="630" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(Disk Tablespace)</text>

  <rect x="476" y="232" width="140" height="48" rx="6" fill="#112211" stroke="#55c555" stroke-width="1"/>
  <text x="546" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">디스크 테이블</text>
  <text x="546" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">버퍼 풀 캐싱</text>

  <rect x="636" y="232" width="144" height="48" rx="6" fill="#112211" stroke="#55c555" stroke-width="1"/>
  <text x="708" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">D-Index</text>
  <text x="708" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">B-Tree on Disk</text>

  <text x="630" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">대용량 · 저비용 스토리지</text>
  <text x="630" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">표준 RDBMS 수준 성능</text>

  <!-- Arrow to log -->
  <line x1="440" y1="376" x2="440" y2="398" stroke="#e05555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="460" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">WAL</text>

  <!-- Log/Checkpoint area -->
  <rect x="60" y="402" width="760" height="64" rx="8" fill="#100a00" stroke="#e05555" stroke-width="1.5"/>
  <text x="250" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Redo Log</text>
  <text x="250" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메모리 변경 내용 기록 (내구성)</text>
  <text x="630" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">체크포인트 파일</text>
  <text x="630" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인메모리 DB 상태를 디스크에 스냅샷</text>
  <line x1="440" y1="402" x2="440" y2="466" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
