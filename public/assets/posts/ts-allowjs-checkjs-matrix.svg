<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">allowJs × checkJs 조합</text>
  <text x="60" y="76" font-size="14" fill="#888">두 옵션이 만드는 네 가지 상태</text>

  <!-- column headers -->
  <text x="300" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">checkJs: false</text>
  <text x="580" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">checkJs: true</text>

  <!-- row 1 -->
  <text x="150" y="180" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">allowJs: false</text>
  <rect x="240" y="140" width="280" height="70" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="380" y="170" font-size="13" fill="#e8e8e8" text-anchor="middle">JS 무시 (기본값)</text>
  <text x="380" y="192" font-size="12" fill="#888" text-anchor="middle">.ts 파일만 컴파일에 포함</text>

  <rect x="540" y="140" width="280" height="70" fill="#101418" rx="10" stroke="#888" stroke-width="1.5"/>
  <text x="680" y="170" font-size="13" fill="#888" text-anchor="middle">의미 없음</text>
  <text x="680" y="192" font-size="12" fill="#888" text-anchor="middle">JS가 포함 안 되니 검사 대상 없음</text>

  <!-- row 2 -->
  <text x="150" y="280" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">allowJs: true</text>
  <rect x="240" y="240" width="280" height="70" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="270" font-size="13" fill="#55c555" text-anchor="middle">JS 포함, 검사 안 함</text>
  <text x="380" y="292" font-size="12" fill="#888" text-anchor="middle">변환·번들에만 참여 (마이그 1단계)</text>

  <rect x="540" y="240" width="280" height="70" fill="#101418" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="680" y="270" font-size="13" fill="#e05555" text-anchor="middle">JS도 타입 검사</text>
  <text x="680" y="292" font-size="12" fill="#888" text-anchor="middle">JSDoc·추론으로 .js에 에러 표시</text>

  <text x="60" y="352" font-size="13" fill="#9aa4b8">→ 마이그레이션은 보통 좌하단(allowJs)에서 시작해 우하단(checkJs)으로 이동</text>
</svg>
