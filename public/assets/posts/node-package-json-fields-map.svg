<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">package.json 핵심 필드 구조</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">메타데이터 · 의존성 · 진입점 · 빌드 도구 설정</text>

  <!-- Column 1: Identity -->
  <rect x="60" y="90" width="200" height="340" rx="8" fill="#111218" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="116" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">식별 · 메타</text>

  <text x="78" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">name</text>
  <text x="78" y="158" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">패키지 이름 (고유)</text>
  <text x="78" y="182" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">version</text>
  <text x="78" y="198" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">SemVer 버전</text>
  <text x="78" y="222" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">description</text>
  <text x="78" y="238" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">npm 검색 노출</text>
  <text x="78" y="262" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">license</text>
  <text x="78" y="278" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">MIT, ISC, Apache-2.0</text>
  <text x="78" y="302" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">keywords</text>
  <text x="78" y="318" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">검색 태그 배열</text>
  <text x="78" y="342" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">repository</text>
  <text x="78" y="358" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">{ type, url }</text>
  <text x="78" y="382" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">private</text>
  <text x="78" y="398" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">true → 배포 방지</text>

  <!-- Column 2: Entry points -->
  <rect x="280" y="90" width="200" height="340" rx="8" fill="#111218" stroke="#7777cc" stroke-width="1.5"/>
  <text x="380" y="116" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">진입점 · 모듈</text>

  <text x="298" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">main</text>
  <text x="298" y="158" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">CJS 진입점</text>
  <text x="298" y="182" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">module</text>
  <text x="298" y="198" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">ESM 진입점 (번들러)</text>
  <text x="298" y="222" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">exports</text>
  <text x="298" y="238" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">조건부 진입점 (권장)</text>
  <text x="298" y="262" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">types</text>
  <text x="298" y="278" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">TypeScript 타입 정의</text>
  <text x="298" y="302" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">bin</text>
  <text x="298" y="318" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">CLI 실행 파일 등록</text>
  <text x="298" y="342" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">files</text>
  <text x="298" y="358" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">배포에 포함할 파일</text>
  <text x="298" y="382" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">type</text>
  <text x="298" y="398" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">"module" → ESM 기본</text>

  <!-- Column 3: Dependencies -->
  <rect x="500" y="90" width="200" height="340" rx="8" fill="#111218" stroke="#55c555" stroke-width="1.5"/>
  <text x="600" y="116" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">의존성</text>

  <text x="518" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">dependencies</text>
  <text x="518" y="158" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">런타임 의존성</text>
  <text x="518" y="182" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">devDependencies</text>
  <text x="518" y="198" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">개발/빌드 도구</text>
  <text x="518" y="222" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">peerDependencies</text>
  <text x="518" y="238" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">소비자가 제공해야 함</text>
  <text x="518" y="262" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">optionalDependencies</text>
  <text x="518" y="278" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">설치 실패 시 무시</text>
  <text x="518" y="302" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">engines</text>
  <text x="518" y="318" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">{ node: ">=18" }</text>
  <text x="518" y="342" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">overrides</text>
  <text x="518" y="358" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">하위 의존성 버전 강제</text>

  <!-- Column 4: Scripts + Misc -->
  <rect x="720" y="90" width="100" height="340" rx="8" fill="#111218" stroke="#888" stroke-width="1.5"/>
  <text x="770" y="116" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">기타</text>

  <text x="730" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">scripts</text>
  <text x="730" y="162" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">workspaces</text>
  <text x="730" y="182" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">config</text>
  <text x="730" y="202" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">publishConfig</text>
  <text x="730" y="222" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">sideEffects</text>
  <text x="730" y="242" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">packageManager</text>

  <!-- Bottom note -->
  <text x="440" y="465" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">exports 필드가 main/module보다 우선 — Node.js 12+, 번들러 모두 지원</text>
  <text x="440" y="485" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">sideEffects: false → 트리 셰이킹 최적화 힌트 (번들러)</text>
</svg>
