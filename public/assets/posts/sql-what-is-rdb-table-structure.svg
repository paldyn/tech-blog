<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">릴레이션(테이블) 해부 — 핵심 용어</text>

  <!-- Table name -->
  <text x="440" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">employees 테이블</text>

  <!-- Attribute bracket above columns -->
  <line x1="200" y1="100" x2="680" y2="100" stroke="#555" stroke-width="1"/>
  <line x1="200" y1="100" x2="200" y2="110" stroke="#555" stroke-width="1"/>
  <line x1="680" y1="100" x2="680" y2="110" stroke="#555" stroke-width="1"/>
  <text x="440" y="96" text-anchor="middle" font-size="11" fill="#888">속성 (Attribute / 열)</text>

  <!-- Table outer border -->
  <rect x="200" y="116" width="480" height="148" rx="0" fill="none" stroke="#444" stroke-width="1"/>

  <!-- Header row background -->
  <rect x="200" y="116" width="480" height="37" fill="#1a1a2e"/>

  <!-- Row backgrounds (alternating) -->
  <rect x="200" y="153" width="480" height="37" fill="#0d0d15"/>
  <rect x="200" y="190" width="480" height="37" fill="#080810"/>
  <rect x="200" y="227" width="480" height="37" fill="#0d0d15"/>

  <!-- Column separator lines -->
  <line x1="270" y1="116" x2="270" y2="264" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="400" y1="116" x2="400" y2="264" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="590" y1="116" x2="590" y2="264" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Row separator lines -->
  <line x1="200" y1="153" x2="680" y2="153" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="200" y1="190" x2="680" y2="190" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="200" y1="227" x2="680" y2="227" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Header cells -->
  <text x="235" y="139" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">id</text>
  <text x="335" y="139" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">name</text>
  <text x="495" y="139" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">email</text>
  <text x="635" y="139" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">dept_id</text>

  <!-- Row 1 -->
  <text x="235" y="176" text-anchor="middle" font-size="12" fill="#e8e8e8">1</text>
  <text x="335" y="176" text-anchor="middle" font-size="12" fill="#e8e8e8">Alice</text>
  <text x="495" y="176" text-anchor="middle" font-size="12" fill="#e8e8e8">alice@corp.com</text>
  <text x="635" y="176" text-anchor="middle" font-size="12" fill="#e8e8e8">10</text>

  <!-- Row 2 -->
  <text x="235" y="213" text-anchor="middle" font-size="12" fill="#e8e8e8">2</text>
  <text x="335" y="213" text-anchor="middle" font-size="12" fill="#e8e8e8">Bob</text>
  <text x="495" y="213" text-anchor="middle" font-size="12" fill="#e8e8e8">bob@corp.com</text>
  <text x="635" y="213" text-anchor="middle" font-size="12" fill="#e8e8e8">20</text>

  <!-- Row 3 -->
  <text x="235" y="250" text-anchor="middle" font-size="12" fill="#e8e8e8">3</text>
  <text x="335" y="250" text-anchor="middle" font-size="12" fill="#e8e8e8">Carol</text>
  <text x="495" y="250" text-anchor="middle" font-size="12" fill="#e8e8e8">carol@corp.com</text>
  <text x="635" y="250" text-anchor="middle" font-size="12" fill="#e8e8e8">10</text>

  <!-- ── Left annotation: 릴레이션 ── -->
  <line x1="188" y1="116" x2="188" y2="264" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="188" y1="190" x2="200" y2="190" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="184" y="183" text-anchor="end" font-size="13" font-weight="600" fill="#7ec8e3">릴레이션</text>
  <text x="184" y="199" text-anchor="end" font-size="11" fill="#888">(Relation)</text>

  <!-- ── Right annotation: 튜플 (Row 2) ── -->
  <line x1="682" y1="208" x2="700" y2="208" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="704" y="213" font-size="11" fill="#7ec8e3">튜플 (Tuple)</text>

  <!-- ── Below table: stats ── -->
  <text x="280" y="285" font-size="11" fill="#7ec8e3">차수(Degree): 4개 속성</text>
  <text x="490" y="285" font-size="11" fill="#7ec8e3">카디널리티(Cardinality): 3개 튜플</text>

  <!-- Concept box -->
  <rect x="100" y="310" width="680" height="110" rx="6" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="440" y="333" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">핵심 용어 정리</text>
  <text x="130" y="355" font-size="12" fill="#7ec8e3">릴레이션(Relation)</text>
  <text x="300" y="355" font-size="12" fill="#888">= 테이블. 같은 구조의 행 집합</text>
  <text x="130" y="374" font-size="12" fill="#7ec8e3">튜플(Tuple)</text>
  <text x="300" y="374" font-size="12" fill="#888">= 행(Row). 하나의 데이터 레코드</text>
  <text x="130" y="393" font-size="12" fill="#7ec8e3">속성(Attribute)</text>
  <text x="300" y="393" font-size="12" fill="#888">= 열(Column). 데이터의 한 특성</text>

  <!-- Footer -->
  <text x="440" y="440" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 1</text>
</svg>
