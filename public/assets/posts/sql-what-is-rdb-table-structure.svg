<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">테이블 · 행 · 열 — 관계형 DB의 핵심 구조</text>

  <!-- customers table -->
  <rect x="60" y="76" width="340" height="220" rx="8" fill="#111827" stroke="#2a2a40" stroke-width="1.5"/>
  <!-- Table header band -->
  <rect x="60" y="76" width="340" height="36" rx="8" fill="#1e2d4a"/>
  <rect x="60" y="96" width="340" height="16" fill="#1e2d4a"/>
  <text x="230" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">customers</text>

  <!-- Column headers -->
  <rect x="70" y="124" width="320" height="28" rx="4" fill="#16213e"/>
  <text x="90" y="143" font-size="13" font-weight="600" fill="#888">id</text>
  <text x="160" y="143" font-size="13" font-weight="600" fill="#888">name</text>
  <text x="260" y="143" font-size="13" font-weight="600" fill="#888">email</text>

  <!-- Row 1 -->
  <line x1="70" y1="152" x2="390" y2="152" stroke="#2a2a40" stroke-width="0.5"/>
  <text x="90" y="170" font-size="13" fill="#b5cea8">1</text>
  <text x="160" y="170" font-size="13" fill="#e8e8e8">김철수</text>
  <text x="260" y="170" font-size="13" fill="#ce9178">kim@ex.com</text>

  <!-- Row 2 -->
  <line x1="70" y1="178" x2="390" y2="178" stroke="#2a2a40" stroke-width="0.5"/>
  <text x="90" y="196" font-size="13" fill="#b5cea8">2</text>
  <text x="160" y="196" font-size="13" fill="#e8e8e8">이영희</text>
  <text x="260" y="196" font-size="13" fill="#ce9178">lee@ex.com</text>

  <!-- Row 3 -->
  <line x1="70" y1="204" x2="390" y2="204" stroke="#2a2a40" stroke-width="0.5"/>
  <text x="90" y="222" font-size="13" fill="#b5cea8">3</text>
  <text x="160" y="222" font-size="13" fill="#e8e8e8">박민준</text>
  <text x="260" y="222" font-size="13" fill="#ce9178">park@ex.com</text>

  <!-- Row 4 -->
  <line x1="70" y1="230" x2="390" y2="230" stroke="#2a2a40" stroke-width="0.5"/>
  <text x="90" y="248" font-size="13" fill="#b5cea8">4</text>
  <text x="160" y="248" font-size="13" fill="#e8e8e8">최지은</text>
  <text x="260" y="248" font-size="13" fill="#ce9178">choi@ex.com</text>

  <!-- Column label -->
  <text x="230" y="310" text-anchor="middle" font-size="13" fill="#888">열(Column) = 속성, 스키마 정의</text>

  <!-- Row label arrow -->
  <line x1="52" y1="196" x2="62" y2="196" stroke="#7777cc" stroke-width="1.5"/>
  <text x="6" y="200" font-size="13" fill="#7777cc">행</text>

  <!-- orders table -->
  <rect x="480" y="76" width="340" height="220" rx="8" fill="#111827" stroke="#2a2a40" stroke-width="1.5"/>
  <rect x="480" y="76" width="340" height="36" rx="8" fill="#1e3a2a"/>
  <rect x="480" y="96" width="340" height="16" fill="#1e3a2a"/>
  <text x="650" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">orders</text>

  <!-- Column headers -->
  <rect x="490" y="124" width="320" height="28" rx="4" fill="#0f2a1a"/>
  <text x="510" y="143" font-size="13" font-weight="600" fill="#888">id</text>
  <text x="570" y="143" font-size="13" font-weight="600" fill="#888">customer_id</text>
  <text x="700" y="143" font-size="13" font-weight="600" fill="#888">amount</text>

  <!-- Rows -->
  <line x1="490" y1="152" x2="810" y2="152" stroke="#2a2a40" stroke-width="0.5"/>
  <text x="510" y="170" font-size="13" fill="#b5cea8">101</text>
  <text x="570" y="170" font-size="13" fill="#7ec8e3">1</text>
  <text x="700" y="170" font-size="13" fill="#b5cea8">32,000</text>

  <line x1="490" y1="178" x2="810" y2="178" stroke="#2a2a40" stroke-width="0.5"/>
  <text x="510" y="196" font-size="13" fill="#b5cea8">102</text>
  <text x="570" y="196" font-size="13" fill="#7ec8e3">2</text>
  <text x="700" y="196" font-size="13" fill="#b5cea8">15,500</text>

  <line x1="490" y1="204" x2="810" y2="204" stroke="#2a2a40" stroke-width="0.5"/>
  <text x="510" y="222" font-size="13" fill="#b5cea8">103</text>
  <text x="570" y="222" font-size="13" fill="#7ec8e3">1</text>
  <text x="700" y="222" font-size="13" fill="#b5cea8">78,000</text>

  <line x1="490" y1="230" x2="810" y2="230" stroke="#2a2a40" stroke-width="0.5"/>
  <text x="510" y="248" font-size="13" fill="#b5cea8">104</text>
  <text x="570" y="248" font-size="13" fill="#7ec8e3">3</text>
  <text x="700" y="248" font-size="13" fill="#b5cea8">9,900</text>

  <!-- FK label -->
  <text x="650" y="310" text-anchor="middle" font-size="13" fill="#888">customer_id = 외래 키(FK)</text>

  <!-- Relationship arrow -->
  <line x1="400" y1="196" x2="478" y2="196" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="478,190 490,196 478,202" fill="#7ec8e3"/>
  <text x="438" y="185" text-anchor="middle" font-size="12" fill="#7ec8e3">FK</text>

  <!-- Bottom annotations -->
  <rect x="60" y="345" width="760" height="120" rx="8" fill="#111827" stroke="#2a2a40" stroke-width="1"/>

  <text x="180" y="373" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">테이블(Table)</text>
  <text x="180" y="395" text-anchor="middle" font-size="13" fill="#888">행과 열로 이루어진</text>
  <text x="180" y="413" text-anchor="middle" font-size="13" fill="#888">2차원 데이터 집합</text>

  <line x1="320" y1="360" x2="320" y2="450" stroke="#2a2a40" stroke-width="1"/>

  <text x="445" y="373" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">행(Row / Tuple)</text>
  <text x="445" y="395" text-anchor="middle" font-size="13" fill="#888">개별 데이터 레코드</text>
  <text x="445" y="413" text-anchor="middle" font-size="13" fill="#888">하나의 실체(Entity) 인스턴스</text>

  <line x1="570" y1="360" x2="570" y2="450" stroke="#2a2a40" stroke-width="1"/>

  <text x="715" y="373" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">열(Column / Attribute)</text>
  <text x="715" y="395" text-anchor="middle" font-size="13" fill="#888">데이터의 속성, 이름과</text>
  <text x="715" y="413" text-anchor="middle" font-size="13" fill="#888">타입이 스키마에 정의됨</text>
</svg>
