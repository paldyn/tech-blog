<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <!-- Arrow marker for main flow -->
    <marker id="arrow-blue" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <polygon points="2,2 12,7 2,12" fill="#7ec8e3"/>
    </marker>
    <!-- Arrow marker for green -->
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <polygon points="2,2 12,7 2,12" fill="#55c555"/>
    </marker>
    <!-- Arrow marker for dashed red -->
    <marker id="arrow-red" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <polygon points="2,2 12,7 2,12" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">ML CI/CD 파이프라인</text>

  <!-- CI Badge -->
  <rect x="20" y="108" width="36" height="52" rx="6" fill="#1a1a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="38" y="128" text-anchor="middle" font-size="10" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">C</text>
  <text x="38" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">I</text>

  <!-- CD Badge -->
  <rect x="20" y="318" width="36" height="52" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="38" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">C</text>
  <text x="38" y="352" text-anchor="middle" font-size="10" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">D</text>

  <!-- Stage 1: 코드 푸시 -->
  <rect x="60" y="100" width="160" height="70" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">코드 푸시</text>
  <text x="140" y="146" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">git push</text>
  <text x="140" y="161" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">+ 데이터 변경</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="135" x2="256" y2="135" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Stage 2: 자동 테스트 -->
  <rect x="260" y="100" width="160" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="340" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">자동 테스트</text>
  <text x="340" y="146" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">단위·통합</text>
  <text x="340" y="161" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">데이터 검증</text>

  <!-- Arrow 2→3 -->
  <line x1="420" y1="135" x2="456" y2="135" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Stage 3: 모델 학습 -->
  <rect x="460" y="100" width="160" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델 학습</text>
  <text x="540" y="146" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">재학습 파이프</text>
  <text x="540" y="161" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">라인 트리거</text>

  <!-- Arrow 3→4 -->
  <line x1="620" y1="135" x2="656" y2="135" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Stage 4: 평가 -->
  <rect x="660" y="100" width="160" height="70" rx="8" fill="#1a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">평가</text>
  <text x="740" y="146" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">성능 게이트</text>
  <text x="740" y="161" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">챔피언 비교</text>

  <!-- Decision diamond: 통과? -->
  <!-- Diamond centered at x=740, y=220 -->
  <polygon points="740,200 772,220 740,240 708,220" fill="#1a1a2e" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="740" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">통과?</text>

  <!-- Arrow Stage4 → Diamond -->
  <line x1="740" y1="170" x2="740" y2="197" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Yes: Diamond → Stage5 (vertical down, then horizontal) -->
  <!-- Yes label -->
  <text x="752" y="248" font-size="11" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Yes</text>
  <line x1="740" y1="240" x2="740" y2="270" stroke="#55c555" stroke-width="1.8"/>
  <line x1="740" y1="270" x2="340" y2="270" stroke="#55c555" stroke-width="1.8"/>
  <line x1="340" y1="270" x2="340" y2="307" stroke="#55c555" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- No: dashed arrow back to Stage 3 -->
  <text x="632" y="210" font-size="11" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">No</text>
  <line x1="708" y1="220" x2="590" y2="220" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="630" y="215" text-anchor="middle" font-size="9" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">재학습 트리거</text>

  <!-- Stage 5: 레지스트리 등록 -->
  <rect x="260" y="310" width="160" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="340" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">레지스트리 등록</text>
  <text x="340" y="356" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델 버전</text>
  <text x="340" y="371" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">아티팩트 저장</text>

  <!-- Arrow 5→6 -->
  <line x1="420" y1="345" x2="456" y2="345" stroke="#55c555" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Stage 6: Staging 배포 -->
  <rect x="460" y="310" width="160" height="70" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="540" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Staging 배포</text>
  <text x="540" y="356" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">카나리</text>
  <text x="540" y="371" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">5% 트래픽</text>

  <!-- Arrow 6→7 -->
  <line x1="620" y1="345" x2="656" y2="345" stroke="#55c555" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Stage 7: Production -->
  <rect x="660" y="310" width="160" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Production</text>
  <text x="740" y="356" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">전체 롤아웃</text>
  <text x="740" y="371" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모니터링 시작</text>

  <!-- Bottom row separator line label -->
  <text x="440" y="298" text-anchor="middle" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">── Continuous Deployment ──────────────────────────────────</text>
  <text x="440" y="90" text-anchor="middle" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">── Continuous Integration ─────────────────────────────────</text>

</svg>
