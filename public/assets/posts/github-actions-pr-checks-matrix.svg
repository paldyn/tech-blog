<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#9988dd"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">매트릭스로 검사를 펼치기</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">하나의 잡 정의로 여러 버전을 병렬 검사한다</text>

  <!-- matrix def -->
  <rect x="60" y="110" width="240" height="120" rx="8" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="180" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9988dd">matrix</text>
  <text x="180" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">node: [18, 20, 22]</text>
  <text x="180" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">3개 조합으로 확장</text>

  <line x1="300" y1="140" x2="378" y2="140" stroke="#9988dd" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <line x1="300" y1="170" x2="378" y2="170" stroke="#9988dd" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <line x1="300" y1="200" x2="378" y2="200" stroke="#9988dd" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>

  <!-- parallel jobs -->
  <rect x="380" y="118" width="300" height="44" rx="8" fill="#101010" stroke="#55c555" stroke-width="1.3"/>
  <text x="404" y="145"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ test (node 18)</text>
  <rect x="380" y="168" width="300" height="44" rx="8" fill="#101010" stroke="#55c555" stroke-width="1.3"/>
  <text x="404" y="195"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ test (node 20)</text>
  <rect x="380" y="218" width="300" height="44" rx="8" fill="#101010" stroke="#55c555" stroke-width="1.3"/>
  <text x="404" y="245"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ test (node 22)</text>

  <text x="440" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#888">각 조합은 별도 러너에서 동시에 돌아 전체 검사 시간을 줄인다</text>
</svg>
