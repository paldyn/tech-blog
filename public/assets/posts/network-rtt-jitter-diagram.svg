<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RTT와 지터 (Jitter)</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">왕복 지연과 지연 변동 — 실시간 통신 품질의 핵심 지표</text>

  <!-- Client -->
  <rect x="60" y="90" width="110" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="115" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Client</text>
  <text x="115" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">t=0: 송신</text>

  <!-- Server -->
  <rect x="710" y="90" width="110" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="765" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Server</text>
  <text x="765" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">t=90ms: 수신</text>

  <!-- Request arrow -->
  <line x1="170" y1="108" x2="710" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">PING 요청 (편도 지연 ~90ms)</text>

  <!-- Response arrow -->
  <line x1="710" y1="148" x2="170" y2="148" stroke="#55c555" stroke-width="2" marker-end="url(#arrb)"/>
  <text x="440" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">PONG 응답 (편도 지연 ~90ms)</text>

  <!-- RTT brace -->
  <line x1="115" y1="180" x2="115" y2="200" stroke="#e05555" stroke-width="1.5"/>
  <line x1="115" y1="200" x2="765" y2="200" stroke="#e05555" stroke-width="1.5"/>
  <line x1="765" y1="200" x2="765" y2="180" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">RTT (Round-Trip Time) ≈ 180ms</text>
  <text x="440" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ping 명령이 측정하는 값. 편도 지연의 2배.</text>

  <!-- Jitter section -->
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">지터 (Jitter) — 패킷 도착 간격의 변동</text>

  <!-- Jitter timeline -->
  <line x1="80" y1="310" x2="800" y2="310" stroke="#333" stroke-width="1.5"/>
  <!-- Ideal packets (equal spacing) -->
  <rect x="130" y="296" width="16" height="30" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="250" y="296" width="16" height="30" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="370" y="296" width="16" height="30" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="490" y="296" width="16" height="30" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="610" y="296" width="16" height="30" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">이상적 (지터=0)</text>
  <!-- Jitter packets (variable spacing) -->
  <rect x="130" y="360" width="16" height="30" rx="3" fill="#3a1a1a" stroke="#e05555" stroke-width="1"/>
  <rect x="210" y="360" width="16" height="30" rx="3" fill="#3a1a1a" stroke="#e05555" stroke-width="1"/>
  <rect x="370" y="360" width="16" height="30" rx="3" fill="#3a1a1a" stroke="#e05555" stroke-width="1"/>
  <rect x="440" y="360" width="16" height="30" rx="3" fill="#3a1a1a" stroke="#e05555" stroke-width="1"/>
  <rect x="660" y="360" width="16" height="30" rx="3" fill="#3a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">지터 있음 (불균등 도착)</text>
  <text x="440" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">음성/영상 통화에서 지터가 크면 음질/화질 저하, 버퍼링 발생</text>
</svg>
