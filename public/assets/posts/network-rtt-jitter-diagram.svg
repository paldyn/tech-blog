<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RTT(Round-Trip Time) 측정</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">요청 패킷이 대상 호스트에 도달해 응답이 돌아오기까지의 총 시간</text>

  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-l" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 13 0 L 0 7 L 13 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="60" y="100" width="120" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트</text>
  <text x="120" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">192.168.1.10</text>

  <!-- Server -->
  <rect x="700" y="100" width="120" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="760" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">서버</text>
  <text x="760" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">8.8.8.8</text>

  <!-- Request arrow -->
  <line x1="180" y1="195" x2="700" y2="215" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">ICMP Echo Request (ping)</text>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">t = 0ms</text>

  <!-- Response arrow -->
  <line x1="700" y1="265" x2="180" y2="285" stroke="#55c555" stroke-width="2" marker-end="url(#arr-l)"/>
  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">ICMP Echo Reply</text>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">t = 24ms</text>

  <!-- RTT brace -->
  <line x1="120" y1="310" x2="120" y2="350" stroke="#e05555" stroke-width="1.5"/>
  <line x1="760" y1="310" x2="760" y2="350" stroke="#e05555" stroke-width="1.5"/>
  <line x1="120" y1="330" x2="760" y2="330" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">RTT = 24ms</text>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">왕복 지연 = 전파 지연 × 2 + 처리 지연 + 큐 대기 지연</text>

  <!-- Code box -->
  <rect x="60" y="375" width="760" height="66" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">$ ping 8.8.8.8</text>
  <text x="80" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">64 bytes from 8.8.8.8: icmp_seq=1 ttl=118 <tspan fill="#55c555">time=24.3 ms</tspan></text>
</svg>
