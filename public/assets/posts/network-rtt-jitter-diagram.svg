<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RTT와 지터 (Jitter)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Round-Trip Time과 지연시간 변동성</text>

  <!-- RTT diagram -->
  <text x="250" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">RTT 측정 원리</text>

  <!-- Client box -->
  <rect x="60" y="108" width="110" height="80" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="115" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트</text>
  <text x="115" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">t=0: 요청 송신</text>
  <text x="115" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">t=RTT: 응답 수신</text>

  <!-- Server box -->
  <rect x="330" y="108" width="110" height="80" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="385" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">서버</text>
  <text x="385" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">t=RTT/2: 수신</text>
  <text x="385" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">즉시 응답 송신</text>

  <!-- Request arrow -->
  <line x1="170" y1="132" x2="330" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="250" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">ICMP Echo Request →</text>

  <!-- Response arrow -->
  <line x1="330" y1="168" x2="170" y2="168" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="250" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">&#8592; ICMP Echo Reply</text>

  <!-- RTT annotation -->
  <rect x="60" y="210" width="380" height="44" rx="6" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">RTT = t_receive - t_send</text>
  <text x="250" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">단방향 지연 ≈ RTT / 2</text>

  <!-- Jitter diagram -->
  <text x="660" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">지터 (Jitter)</text>
  <text x="660" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">연속 패킷의 RTT 변동성</text>

  <!-- Jitter visualization: packets arriving irregularly -->
  <!-- Sent evenly -->
  <text x="510" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">송신 (균등 간격):</text>
  <rect x="510" y="156" width="18" height="18" rx="3" fill="#7ec8e3" stroke="none"/>
  <rect x="548" y="156" width="18" height="18" rx="3" fill="#7ec8e3" stroke="none"/>
  <rect x="586" y="156" width="18" height="18" rx="3" fill="#7ec8e3" stroke="none"/>
  <rect x="624" y="156" width="18" height="18" rx="3" fill="#7ec8e3" stroke="none"/>
  <rect x="662" y="156" width="18" height="18" rx="3" fill="#7ec8e3" stroke="none"/>
  <rect x="700" y="156" width="18" height="18" rx="3" fill="#7ec8e3" stroke="none"/>

  <!-- Received unevenly (jitter) -->
  <text x="510" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">수신 (불균등, 지터 발생):</text>
  <rect x="510" y="208" width="18" height="18" rx="3" fill="#e05555" stroke="none"/>
  <rect x="536" y="208" width="18" height="18" rx="3" fill="#e05555" stroke="none"/>
  <rect x="594" y="208" width="18" height="18" rx="3" fill="#e05555" stroke="none"/>
  <rect x="610" y="208" width="18" height="18" rx="3" fill="#e05555" stroke="none"/>
  <rect x="660" y="208" width="18" height="18" rx="3" fill="#e05555" stroke="none"/>
  <rect x="720" y="208" width="18" height="18" rx="3" fill="#e05555" stroke="none"/>

  <!-- Bottom: Low jitter vs High jitter effects -->
  <rect x="60" y="275" width="370" height="160" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="245" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">낮은 지터 (좋음)</text>
  <text x="245" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">RTT: 10, 11, 10, 12, 11 ms</text>
  <text x="245" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">mdev ≈ 0.7 ms</text>
  <text x="245" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">음성/화상통화 품질 우수</text>
  <text x="245" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">VoIP 지터 버퍼 20ms면 충분</text>
  <text x="245" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">적합: 게임, 실시간 스트리밍</text>
  <text x="245" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">목표: &lt; 30ms (VoIP ITU-T G.114)</text>

  <rect x="450" y="275" width="370" height="160" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="635" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">높은 지터 (나쁨)</text>
  <text x="635" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">RTT: 10, 80, 12, 150, 8 ms</text>
  <text x="635" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">mdev ≈ 56 ms</text>
  <text x="635" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">음성 끊김, 영상 버퍼링</text>
  <text x="635" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">큰 지터 버퍼 필요 → 지연 증가</text>
  <text x="635" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">원인: 혼잡, 라우팅 경로 변경</text>
  <text x="635" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">해결: QoS, DSCP 우선순위</text>
</svg>
