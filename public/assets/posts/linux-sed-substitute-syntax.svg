<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">sed s 명령 구조 분해</text>

  <!-- Syntax breakdown -->
  <text x="440" y="100" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" fill="#ffffff">s<tspan fill="#e05555">/</tspan><tspan fill="#7ec8e3">pattern</tspan><tspan fill="#e05555">/</tspan><tspan fill="#55c555">replacement</tspan><tspan fill="#e05555">/</tspan><tspan fill="#ce9178">flags</tspan></text>

  <!-- Labels -->
  <text x="134" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">구분자</text>
  <text x="266" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">검색 패턴</text>
  <text x="446" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">치환 문자열</text>
  <text x="604" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">플래그</text>

  <!-- Flags table -->
  <rect x="60" y="155" width="360" height="195" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="80" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">플래그</text>

  <text x="80" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">g</text>
  <text x="115" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">전체 치환 (기본: 첫 번째만)</text>

  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">i</text>
  <text x="115" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">대소문자 무시 (ignore case)</text>

  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">p</text>
  <text x="115" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">치환된 줄 출력 (-n과 함께)</text>

  <text x="80" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">N</text>
  <text x="115" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">N번째 매칭만 치환 (숫자)</text>

  <text x="80" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">w file</text>
  <text x="140" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">치환된 줄을 파일로 저장</text>

  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">e: 치환 결과를 셸 명령으로 실행 (GNU sed)</text>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">구분자는 / 이외에도 @|! 등 사용 가능</text>

  <!-- Replacement specials -->
  <rect x="460" y="155" width="360" height="195" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">replacement 특수 기호</text>

  <text x="480" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">&amp;</text>
  <text x="515" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">전체 매칭 문자열</text>

  <text x="480" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">\1 \2</text>
  <text x="540" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">캡처 그룹 참조 \(pat\)</text>

  <text x="480" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">\n</text>
  <text x="520" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">줄바꿈 삽입</text>

  <text x="480" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">\u \l</text>
  <text x="540" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">다음 문자 대문자/소문자</text>

  <text x="480" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">\U \L</text>
  <text x="540" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">이후 전체 대문자/소문자</text>

  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: s/\(hello\)/[\1]/  → [hello]</text>
  <text x="480" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ERE: sed -E 's/(hello)/[\1]/'</text>
</svg>
