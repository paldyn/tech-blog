<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">React 상태 업데이트 큐 처리 흐름</text>

  <!-- Queue boxes -->
  <text x="440" y="76" text-anchor="middle" font-size="14" fill="#888">setCount(5) 와 setCount(prev =&gt; prev + 1) 세 번 — count 시작값 0</text>

  <!-- Queue step 1 -->
  <rect x="60" y="90" width="200" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="160" y="112" text-anchor="middle" font-size="12" fill="#888">큐 항목 1</text>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13">
    <tspan x="90" y="134" fill="#b5cea8">5</tspan><tspan fill="#9aa4b8"> (값 교체)</tspan>
    <tspan x="90" dy="18" fill="#888">prev 무시, 5로 교체</tspan>
  </text>

  <line x1="270" y1="130" x2="300" y2="130" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Queue step 2 -->
  <rect x="308" y="90" width="200" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="408" y="112" text-anchor="middle" font-size="12" fill="#888">큐 항목 2</text>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13">
    <tspan x="338" y="134" fill="#55c555">prev =&gt; prev+1</tspan>
    <tspan x="338" dy="18" fill="#888">prev=5 → 6</tspan>
  </text>

  <line x1="518" y1="130" x2="548" y2="130" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Queue step 3 -->
  <rect x="556" y="90" width="200" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="656" y="112" text-anchor="middle" font-size="12" fill="#888">큐 항목 3</text>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13">
    <tspan x="586" y="134" fill="#55c555">prev =&gt; prev+1</tspan>
    <tspan x="586" dy="18" fill="#888">prev=6 → 7</tspan>
  </text>

  <line x1="766" y1="130" x2="800" y2="130" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Result -->
  <rect x="808" y="108" width="48" height="44" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="2"/>
  <text x="832" y="136" text-anchor="middle" font-size="20" font-weight="700" fill="#55c555">7</text>

  <!-- Two column explanation -->
  <text x="220" y="208" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">값 교체 방식</text>
  <rect x="60" y="218" width="320" height="130" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="76" y="230" width="288" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="250" fill="#9aa4b8">// 항상 같은 값으로 덮어쓰기</tspan>
    <tspan x="92" dy="18" fill="#ffffff">setCount(count + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// 렌더 시점의 count 캡처</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// 여러 번 호출해도 +1만 됨</tspan>
    <tspan x="92" dy="18" fill="#e05555">// ← 배치 처리 시 주의!</tspan>
  </text>

  <text x="660" y="208" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">함수형 업데이트 방식</text>
  <rect x="500" y="218" width="320" height="130" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="516" y="230" width="288" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="532" y="250" fill="#9aa4b8">// React가 최신 값 전달</tspan>
    <tspan x="532" dy="18" fill="#ffffff">setCount(</tspan><tspan fill="#7ec8e3" font-weight="600">prev</tspan><tspan fill="#ffffff"> =&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">prev</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="532" dy="18" fill="#9aa4b8">// 큐에서 순서대로 처리</tspan>
    <tspan x="532" dy="18" fill="#9aa4b8">// 여러 번 호출 → 각각 +1</tspan>
    <tspan x="532" dy="18" fill="#55c555">// ← 항상 안전!</tspan>
  </text>

  <!-- Rule -->
  <text x="440" y="384" text-anchor="middle" font-size="12" fill="#888">규칙: 이전 상태에 의존하는 업데이트는 항상 함수형 업데이트를 사용한다</text>
  <text x="440" y="404" text-anchor="middle" font-size="12" fill="#888">직전 상태를 단순히 교체(예: setUser(newUser))하는 경우에는 값 교체 방식도 무방하다</text>
</svg>
