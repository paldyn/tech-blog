<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">배낭 문제 역추적 (Traceback)</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">dp 테이블에서 선택된 물품 복원하기</text>

  <!-- Traceback steps diagram -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">역추적 단계</text>

  <!-- Step boxes -->
  <rect x="60" y="112" width="200" height="64" fill="#1a2a3a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Step 1</text>
  <text x="160" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">dp[4][5] = 7</text>
  <text x="160" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dp[3][5]=7 이므로 물품4 미선택</text>

  <line x1="262" y1="144" x2="296" y2="144" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="298" y="112" width="200" height="64" fill="#1a2a3a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="398" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Step 2</text>
  <text x="398" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">dp[3][5] = 7</text>
  <text x="398" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dp[2][5]=7 이므로 물품3 미선택</text>

  <line x1="500" y1="144" x2="534" y2="144" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="536" y="112" width="200" height="64" fill="#2a3a2a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="636" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Step 3</text>
  <text x="636" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">dp[2][5] = 7</text>
  <text x="636" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">dp[1][2]+4=7 ⇒ 물품2 선택!</text>

  <!-- Step 4 -->
  <line x1="636" y1="178" x2="636" y2="214" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="536" y="216" width="200" height="64" fill="#2a3a2a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="636" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Step 4</text>
  <text x="636" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">dp[1][2] = 3</text>
  <text x="636" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">dp[0][0]+3=3 ⇒ 물품1 선택!</text>

  <!-- Result box -->
  <rect x="60" y="310" width="760" height="60" fill="#1a3a1a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">최종 선택: 물품1(w=2,v=3) + 물품2(w=3,v=4)</text>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">총 무게 = 5 ≤ W=5,  총 가치 = 7 (최적)</text>

  <!-- Traceback code -->
  <rect x="60" y="380" width="760" height="60" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def traceback(dp, weights, values, n, W):</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    items = []</text>
  <text x="76" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    w = W</text>
</svg>
