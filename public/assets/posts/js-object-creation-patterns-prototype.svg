<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">생성 패턴과 prototype 연결 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">어떤 패턴을 쓰든 인스턴스는 prototype 체인으로 연결된다</text>

  <!-- Factory function: no prototype chain -->
  <text x="170" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">팩토리 함수</text>

  <!-- alice object -->
  <rect x="60" y="116" width="220" height="70" rx="6" fill="#0d0d1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">alice 객체</text>
  <text x="80" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">name: 'Alice'</text>
  <text x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">greet: fn  ← 자체 보유</text>

  <rect x="60" y="206" width="220" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="170" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#444">Object.prototype</text>

  <line x1="170" y1="186" x2="170" y2="206" stroke="#333" stroke-width="1.5"/>
  <polygon points="166,204 170,216 174,204" fill="#333"/>

  <text x="170" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">greet 공유 없음 — 인스턴스마다 복사</text>

  <!-- Class / Constructor: shared prototype -->
  <text x="550" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">class / 생성자 함수</text>

  <!-- alice2 instance -->
  <rect x="380" y="116" width="200" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">alice 인스턴스</text>
  <text x="396" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">name: 'Alice'</text>
  <text x="396" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">__proto__ →</text>

  <!-- bob2 instance -->
  <rect x="620" y="116" width="200" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">bob 인스턴스</text>
  <text x="636" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">name: 'Bob'</text>
  <text x="636" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">__proto__ →</text>

  <!-- User.prototype shared -->
  <rect x="470" y="216" width="220" height="64" rx="6" fill="#1a1a0a" stroke="#e8a000" stroke-width="1.5"/>
  <text x="580" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a000" font-weight="600">User.prototype (공유)</text>
  <text x="486" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">constructor: User</text>
  <text x="486" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">greet: fn  ← 공유</text>

  <!-- Arrows from instances to prototype -->
  <line x1="480" y1="172" x2="530" y2="216" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="526,214 534,218 528,208" fill="#55c555"/>
  <line x1="720" y1="172" x2="640" y2="216" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="644,214 636,218 642,208" fill="#55c555"/>

  <!-- Object.prototype -->
  <rect x="470" y="308" width="220" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="580" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#444">Object.prototype</text>

  <line x1="580" y1="280" x2="580" y2="308" stroke="#333" stroke-width="1.5"/>
  <polygon points="576,306 580,318 584,306" fill="#333"/>

  <!-- Labels -->
  <text x="580" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">greet 함수 1개로 모든 인스턴스 공유</text>
  <text x="580" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메모리 효율적 · instanceof 동작</text>

  <!-- Bottom note -->
  <rect x="60" y="410" width="760" height="34" rx="6" fill="#0d0d0d" stroke="#1e2433"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">class는 내부적으로 생성자 함수 + prototype과 동일 — 문법 설탕(syntactic sugar)</text>

  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
