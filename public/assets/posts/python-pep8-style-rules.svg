<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PEP 8 핵심 규칙</text>

  <!-- Category: 네이밍 -->
  <rect x="60" y="62" width="370" height="174" rx="8" fill="#0d1117" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="80" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">명명 규칙 (Naming)</text>
  <line x1="80" y1="94" x2="410" y2="94" stroke="#1e3a5f" stroke-width="1"/>

  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">변수·함수</text>
  <text x="200" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">snake_case</text>
  <text x="340" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">user_name, get_data</text>

  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">클래스</text>
  <text x="200" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PascalCase</text>
  <text x="340" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">UserAccount</text>

  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">상수</text>
  <text x="200" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">UPPER_SNAKE_CASE</text>
  <text x="340" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">MAX_SIZE = 100</text>

  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">비공개</text>
  <text x="200" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">_single_underscore</text>
  <text x="340" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">_internal_use</text>

  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">모듈</text>
  <text x="200" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">short_lowercase</text>
  <text x="340" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">utils.py, data_reader</text>

  <text x="80" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">❌ 피할 것</text>
  <text x="200" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af">l, O, I (단일 문자)</text>
  <text x="340" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">1·0·I와 혼동</text>

  <!-- Category: 들여쓰기/줄 -->
  <rect x="450" y="62" width="370" height="174" rx="8" fill="#0d1117" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="470" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fbbf24">들여쓰기·줄 길이</text>
  <line x1="470" y1="94" x2="800" y2="94" stroke="#1e3a5f" stroke-width="1"/>

  <text x="470" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#fbbf24">들여쓰기</text>
  <text x="580" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">스페이스 4칸</text>
  <text x="700" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">탭 금지</text>

  <text x="470" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#fbbf24">최대 줄 길이</text>
  <text x="580" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">79자</text>
  <text x="700" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">주석은 72자</text>

  <text x="470" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#fbbf24">빈 줄</text>
  <text x="580" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">함수·클래스 사이 2줄</text>
  <text x="700" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">메서드 사이 1줄</text>

  <text x="470" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#fbbf24">연산자 공백</text>
  <text x="580" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">x = 1 + 2</text>
  <text x="700" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">x=1+2 금지</text>

  <text x="470" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#fbbf24">쉼표 공백</text>
  <text x="580" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">f(a, b, c)</text>
  <text x="700" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">f(a,b,c) 금지</text>

  <text x="470" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#fbbf24">임포트</text>
  <text x="580" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">한 줄에 하나</text>
  <text x="700" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280">import os, sys 지양</text>

  <!-- Category: 자동화 도구 -->
  <rect x="60" y="252" width="760" height="164" rx="8" fill="#0d1117" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">자동화 도구 (외울 필요 없음)</text>
  <line x1="80" y1="284" x2="800" y2="284" stroke="#1e3a5f" stroke-width="1"/>

  <rect x="80" y="296" width="170" height="104" rx="6" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="165" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle">flake8</text>
  <text x="165" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">스타일 검사기</text>
  <text x="165" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">위반 사항 보고</text>
  <text x="165" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">수정은 직접</text>
  <text x="165" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#475569" text-anchor="middle">pip install flake8</text>

  <rect x="280" y="296" width="170" height="104" rx="6" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="365" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle">black</text>
  <text x="365" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">자동 포매터</text>
  <text x="365" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">의견 없는 스타일</text>
  <text x="365" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">자동 수정</text>
  <text x="365" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#475569" text-anchor="middle">pip install black</text>

  <rect x="480" y="296" width="170" height="104" rx="6" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="565" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle">isort</text>
  <text x="565" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">임포트 정렬</text>
  <text x="565" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">표준·서드파티·</text>
  <text x="565" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">로컬 순서 정리</text>
  <text x="565" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#475569" text-anchor="middle">pip install isort</text>

  <rect x="680" y="296" width="140" height="104" rx="6" fill="#0d2340" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="750" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">ruff</text>
  <text x="750" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">통합 린터</text>
  <text x="750" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Rust 기반, 초고속</text>
  <text x="750" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">flake8+isort 대체</text>
  <text x="750" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#475569" text-anchor="middle">pip install ruff</text>

  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">실무에서는 black + ruff 조합이 현재 표준 — CI에서 자동으로 검사</text>
</svg>
