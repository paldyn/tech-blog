<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">PEP 8 핵심 규칙</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">Python 공식 스타일 가이드 요약</text>

  <!-- Rule 1: Indentation -->
  <rect x="60" y="88" width="360" height="80" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="112" font-size="13" font-weight="700" fill="#7ec8e3">들여쓰기</text>
  <text x="80" y="132" font-size="12" fill="#aaa">스페이스 4칸 사용 (탭 사용 금지)</text>
  <text x="80" y="150" font-size="12" fill="#aaa">탭과 스페이스 혼용 절대 금지</text>
  <text x="390" y="112" text-anchor="end" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#7ec8e3">4 spaces</text>

  <!-- Rule 2: Line length -->
  <rect x="460" y="88" width="360" height="80" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="112" font-size="13" font-weight="700" fill="#55c555">줄 길이</text>
  <text x="480" y="132" font-size="12" fill="#aaa">한 줄 최대 79자 (코드)</text>
  <text x="480" y="150" font-size="12" fill="#aaa">docstring·주석은 최대 72자</text>
  <text x="800" y="112" text-anchor="end" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#55c555">79 chars</text>

  <!-- Rule 3: Blank lines -->
  <rect x="60" y="184" width="360" height="80" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="208" font-size="13" font-weight="700" fill="#7777cc">빈 줄</text>
  <text x="80" y="228" font-size="12" fill="#aaa">최상위 함수/클래스 사이: 2줄</text>
  <text x="80" y="246" font-size="12" fill="#aaa">메서드 사이: 1줄</text>

  <!-- Rule 4: Imports -->
  <rect x="460" y="184" width="360" height="80" rx="8" fill="#0f1820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="480" y="208" font-size="13" font-weight="700" fill="#ce9178">import 순서</text>
  <text x="480" y="228" font-size="12" fill="#aaa">표준 라이브러리 → 서드파티 → 로컬</text>
  <text x="480" y="246" font-size="12" fill="#aaa">그룹 사이에 빈 줄 하나</text>

  <!-- Rule 5: Naming -->
  <rect x="60" y="280" width="760" height="80" rx="8" fill="#0f1820" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="304" font-size="13" font-weight="700" fill="#e05555">이름 규칙 (Naming Convention)</text>
  <text x="160" y="330" text-anchor="middle" font-size="12" fill="#7ec8e3">변수 · 함수</text>
  <text x="160" y="348" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#aaa">snake_case</text>
  <text x="360" y="330" text-anchor="middle" font-size="12" fill="#55c555">클래스</text>
  <text x="360" y="348" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#aaa">PascalCase</text>
  <text x="560" y="330" text-anchor="middle" font-size="12" fill="#7777cc">상수</text>
  <text x="560" y="348" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#aaa">UPPER_CASE</text>
  <text x="750" y="330" text-anchor="middle" font-size="12" fill="#ce9178">모듈 · 패키지</text>
  <text x="750" y="348" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#aaa">lowercase</text>

  <!-- Rule 6: Spaces -->
  <rect x="60" y="376" width="760" height="84" rx="8" fill="#0f1820" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#b5cea8">공백 규칙 빠른 참고</text>
  <text x="160" y="424" text-anchor="middle" font-size="11" fill="#55c555">f(x, y)  — 쉼표 뒤 공백</text>
  <text x="400" y="424" text-anchor="middle" font-size="11" fill="#55c555">x = 1  — 대입 주변 공백</text>
  <text x="650" y="424" text-anchor="middle" font-size="11" fill="#55c555">x**2  — 지수 공백 없음</text>
  <text x="200" y="448" text-anchor="middle" font-size="11" fill="#e05555">f( x )  — 괄호 안 공백 금지</text>
  <text x="500" y="448" text-anchor="middle" font-size="11" fill="#e05555">x =1  — 비대칭 공백 금지</text>
</svg>
