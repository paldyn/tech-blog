<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="11" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 1 L 12 7 L 1 13 z" fill="#8a93a8"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">부수 효과 격리 — 순수 코어, 명령형 경계</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">I/O는 경계에 두고, 비즈니스 로직은 순수 함수로 가운데에</text>

  <!-- Box 1: 입력 경계 -->
  <rect x="60" y="110" width="220" height="210" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">① 입력 (경계)</text>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">부수 효과 · I/O</text>
  <text x="80" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">order =</text>
  <text x="80" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">db.get_order(id)</text>

  <!-- Box 2: 순수 코어 -->
  <rect x="330" y="110" width="220" height="210" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="350" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">② 순수 코어</text>
  <text x="350" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비즈니스 로직</text>
  <text x="350" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">apply_discount()</text>
  <text x="350" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">build_receipt()</text>
  <text x="350" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 외부 의존 없음</text>
  <text x="350" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 단독 테스트 가능</text>

  <!-- Box 3: 출력 경계 -->
  <rect x="600" y="110" width="220" height="210" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="620" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">③ 출력 (경계)</text>
  <text x="620" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">부수 효과 · I/O</text>
  <text x="620" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">db.save_receipt(r)</text>
  <text x="620" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">email.send(...)</text>

  <!-- Arrows -->
  <line x1="280" y1="215" x2="326" y2="215" stroke="#8a93a8" stroke-width="2" marker-end="url(#ar)"/>
  <text x="303" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">주문</text>
  <line x1="550" y1="215" x2="596" y2="215" stroke="#8a93a8" stroke-width="2" marker-end="url(#ar)"/>
  <text x="573" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">영수증</text>

  <!-- Bottom note -->
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">부수 효과는 없애지 않고 경계로 격리 — 가운데 로직은 순수하게 유지한다</text>
</svg>
