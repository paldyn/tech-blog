<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Husky + lint-staged 설치 단계</text>

  <!-- Step 1 -->
  <rect x="60" y="70" width="36" height="36" rx="18" fill="#7ec8e3"/>
  <text x="78" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#0a0a0a">1</text>
  <text x="108" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">패키지 설치</text>

  <rect x="60" y="116" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">npm install -D husky lint-staged</text>

  <!-- Step 2 -->
  <rect x="60" y="178" width="36" height="36" rx="18" fill="#7ec8e3"/>
  <text x="78" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#0a0a0a">2</text>
  <text x="108" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Husky 초기화 (Git hooks 디렉토리 생성)</text>

  <rect x="60" y="224" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="251" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">npx husky init    <tspan fill="#9aa4b8"># .husky/ 디렉토리 + prepare 스크립트 자동 추가</tspan></text>

  <!-- Step 3 -->
  <rect x="60" y="286" width="36" height="36" rx="18" fill="#7ec8e3"/>
  <text x="78" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#0a0a0a">3</text>
  <text x="108" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">pre-commit 훅 내용 편집</text>

  <rect x="60" y="332" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">#!/usr/bin/env sh   (.husky/pre-commit)</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">npx lint-staged</text>

  <!-- Step 4 -->
  <rect x="60" y="394" width="36" height="36" rx="18" fill="#7ec8e3"/>
  <text x="78" y="417" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#0a0a0a">4</text>
  <text x="108" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">package.json에 lint-staged 설정 추가</text>

  <rect x="60" y="438" width="760" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="457" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#ce9178">"lint-staged"</tspan>: { <tspan fill="#ce9178">"*.{ts,tsx,js}"</tspan>: [<tspan fill="#ce9178">"eslint --fix"</tspan>, <tspan fill="#ce9178">"prettier --write"</tspan>] }</text>
</svg>
