<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">세 가지 벡터 유사도 지표</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">코사인 유사도 · 유클리드 거리 · 내적</text>

  <!-- Panel 1: Cosine Similarity -->
  <rect x="60" y="90" width="230" height="280" rx="8" fill="#0e0e1a" stroke="#7777cc" stroke-width="2"/>
  <text x="175" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">코사인 유사도</text>
  <text x="175" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Cosine Similarity</text>

  <!-- Angle diagram -->
  <line x1="140" y1="220" x2="210" y2="165" stroke="#7777cc" stroke-width="2.5"/>
  <line x1="140" y1="220" x2="220" y2="210" stroke="#7ec8e3" stroke-width="2.5"/>
  <polygon points="205,161 215,168 207,175" fill="#7777cc"/>
  <polygon points="218,204 224,215 213,215" fill="#7ec8e3"/>
  <path d="M 158,209 A 22,22 0 0,1 164,191" stroke="#e8e8e8" stroke-width="1.5" fill="none"/>
  <text x="170" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">θ</text>
  <text x="211" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">A</text>
  <text x="224" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">B</text>

  <rect x="76" y="238" width="198" height="36" rx="4" fill="#111" stroke="#333"/>
  <text x="175" y="261" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">cos(θ) = A·B / |A||B|</text>

  <text x="175" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">범위: -1 ~ 1</text>
  <text x="175" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">방향 기반</text>
  <rect x="110" y="334" width="130" height="24" rx="4" fill="#1a1040"/>
  <text x="175" y="351" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">정규화에 강함</text>

  <!-- Panel 2: Euclidean Distance -->
  <rect x="325" y="90" width="230" height="280" rx="8" fill="#0a1e0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">유클리드 거리</text>
  <text x="440" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Euclidean Distance</text>

  <circle cx="380" cy="185" r="7" fill="#55c555"/>
  <circle cx="480" cy="230" r="7" fill="#7ec8e3"/>
  <line x1="380" y1="185" x2="480" y2="230" stroke="#e8e8e8" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="480" y1="185" x2="480" y2="230" stroke="#555" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="380" y1="185" x2="480" y2="185" stroke="#555" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="430" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">d</text>
  <text x="375" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">A</text>
  <text x="484" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">B</text>

  <rect x="341" y="252" width="198" height="36" rx="4" fill="#111" stroke="#333"/>
  <text x="440" y="267" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">d = √Σ(aᵢ - bᵢ)²</text>
  <text x="440" y="282" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">i = 1 .. n</text>

  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">범위: 0 ~ ∞</text>
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">크기 기반</text>
  <rect x="375" y="350" width="130" height="24" rx="4" fill="#0a1e0a"/>
  <text x="440" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">절대 거리 반영</text>

  <!-- Panel 3: Dot Product -->
  <rect x="590" y="90" width="230" height="280" rx="8" fill="#0a1e28" stroke="#7ec8e3" stroke-width="2"/>
  <text x="705" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">내적 (Dot Product)</text>
  <text x="705" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Inner Product</text>

  <line x1="660" y1="230" x2="720" y2="175" stroke="#7ec8e3" stroke-width="2.5"/>
  <line x1="660" y1="230" x2="730" y2="225" stroke="#7777cc" stroke-width="2.5"/>
  <polygon points="716,171 723,180 713,182" fill="#7ec8e3"/>
  <polygon points="728,218 736,228 724,230" fill="#7777cc"/>
  <text x="658" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">O</text>
  <circle cx="693" cy="205" r="4" fill="#e8e8e8"/>
  <text x="716" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">A</text>
  <text x="738" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">B</text>

  <rect x="606" y="252" width="198" height="36" rx="4" fill="#111" stroke="#333"/>
  <text x="705" y="267" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">A·B = Σ(aᵢ × bᵢ)</text>
  <text x="705" y="282" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">= |A||B|cos(θ)</text>

  <text x="705" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">범위: -∞ ~ ∞</text>
  <text x="705" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">방향 + 크기</text>
  <rect x="640" y="350" width="130" height="24" rx="4" fill="#0a1e28"/>
  <text x="705" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">정규화시 = 코사인</text>
</svg>
