<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">set 활용 패턴</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">중복 제거 · 멤버십 테스트 · 집합 연산 실전</text>

  <rect x="60" y="100" width="760" height="252" rx="10" fill="#111520" stroke="#3a4a6e"/>
  <rect x="80" y="116" width="720" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="96" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 리스트에서 중복 제거 (순서 유지 X)</tspan></text>
  <text x="96" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">unique = </tspan><tspan fill="#7ec8e3">list</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3">set</tspan><tspan fill="#ffffff">([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">]))</tspan></text>
  <text x="96" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 순서 유지 중복 제거</tspan></text>
  <text x="96" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">seen = </tspan><tspan fill="#7ec8e3">set</tspan><tspan fill="#ffffff">()</tspan></text>
  <text x="96" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">uniq = [x </tspan><tspan fill="#7ec8e3">for</tspan><tspan fill="#ffffff"> x </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#ffffff"> lst </tspan><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> x </tspan><tspan fill="#7ec8e3">not in</tspan><tspan fill="#ffffff"> seen </tspan><tspan fill="#7ec8e3">and not</tspan><tspan fill="#ffffff"> seen.</tspan><tspan fill="#7ec8e3">add</tspan><tspan fill="#ffffff">(x)]</tspan></text>
  <text x="96" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 두 리스트의 공통 원소 (교집합)</tspan></text>
  <text x="96" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">common = </tspan><tspan fill="#7ec8e3">set</tspan><tspan fill="#ffffff">(a) &amp; </tspan><tspan fill="#7ec8e3">set</tspan><tspan fill="#ffffff">(b)</tspan></text>
  <text x="96" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 대용량 멤버십 테스트: list O(n) vs set O(1)</tspan></text>
  <text x="96" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">allowed = </tspan><tspan fill="#7ec8e3">set</tspan><tspan fill="#ffffff">([</tspan><tspan fill="#ce9178">"admin"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"user"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"guest"</tspan><tspan fill="#ffffff">])</tspan></text>
  <text x="96" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> role </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#ffffff"> allowed:    </tspan><tspan fill="#9aa4b8"># O(1)</tspan></text>
  <text x="96" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 두 집합이 겹치는지 확인</tspan></text>
  <text x="96" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">A.</tspan><tspan fill="#7ec8e3">isdisjoint</tspan><tspan fill="#ffffff">(B)   </tspan><tspan fill="#9aa4b8"># 교집합 없으면 True</tspan></text>
</svg>
