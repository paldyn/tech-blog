<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="lbArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">git filter-repo로 blob 제거하기</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">히스토리를 다시 써서 모든 커밋에서 파일을 들어낸다</text>

  <rect x="60" y="100" width="180" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="128" font-size="13" fill="#ffffff">1. 백업</text>
  <text x="80" y="148" font-size="12" fill="#9aa4b8">미러 clone 보관</text>

  <rect x="350" y="100" width="200" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="370" y="128" font-size="13" fill="#ffffff">2. 경로 제거</text>
  <text x="370" y="148" font-size="12" fill="#9aa4b8">filter-repo 실행</text>

  <rect x="660" y="100" width="160" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="680" y="128" font-size="13" fill="#ffffff">3. force push</text>
  <text x="680" y="148" font-size="12" fill="#9aa4b8">팀에 재clone 공지</text>

  <line x1="240" y1="130" x2="350" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lbArr)"/>
  <line x1="550" y1="130" x2="660" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lbArr)"/>

  <rect x="60" y="195" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="225" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 특정 파일을 전체 히스토리에서 제거</text>
  <text xml:space="preserve" x="80" y="249" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git filter-repo --path assets/big.psd --invert-paths</text>
  <text xml:space="preserve" x="80" y="277" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 50MB 넘는 blob을 한꺼번에 정리</text>
  <text xml:space="preserve" x="80" y="301" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git filter-repo --strip-blobs-bigger-than 50M</text>

  <text x="60" y="345" font-size="13" fill="#888">히스토리 재작성이므로 모든 커밋 해시가 바뀐다 — 협업자 합의 후 진행</text>
</svg>
