<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">각 범주 코드 예시</text>

  <rect x="60" y="64" width="760" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="88" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-- DDL: 구조 정의</text>
  <text x="76" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan>
    <tspan fill="#ffffff"> products (id INT PRIMARY KEY, name VARCHAR(200));</tspan>
  </text>

  <text x="76" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">-- DML: 데이터 조작</text>
  <text x="76" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">INSERT INTO</tspan>
    <tspan fill="#ffffff"> products </tspan>
    <tspan fill="#7ec8e3" font-weight="600">VALUES</tspan>
    <tspan fill="#ffffff"> (</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">'노트북'</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan>
    <tspan fill="#ffffff"> * </tspan>
    <tspan fill="#7ec8e3" font-weight="600">FROM</tspan>
    <tspan fill="#ffffff"> products </tspan>
    <tspan fill="#7ec8e3" font-weight="600">WHERE</tspan>
    <tspan fill="#ffffff"> id = </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>

  <text x="76" y="204" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">-- TCL: 트랜잭션 제어</text>
  <text x="76" y="224" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">BEGIN</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="244" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">UPDATE</tspan>
    <tspan fill="#ffffff"> products </tspan>
    <tspan fill="#7ec8e3" font-weight="600">SET</tspan>
    <tspan fill="#ffffff"> name = </tspan>
    <tspan fill="#ce9178">'게이밍 노트북'</tspan>
    <tspan fill="#ffffff"> WHERE id = </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">COMMIT</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>

  <text x="76" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">-- DCL: 권한 제어</text>
  <text x="76" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">GRANT</tspan>
    <tspan fill="#ffffff"> SELECT, INSERT </tspan>
    <tspan fill="#7ec8e3" font-weight="600">ON</tspan>
    <tspan fill="#ffffff"> products </tspan>
    <tspan fill="#7ec8e3" font-weight="600">TO</tspan>
    <tspan fill="#ffffff"> app_user;</tspan>
  </text>
  <text x="76" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">REVOKE</tspan>
    <tspan fill="#ffffff"> INSERT </tspan>
    <tspan fill="#7ec8e3" font-weight="600">ON</tspan>
    <tspan fill="#ffffff"> products </tspan>
    <tspan fill="#7ec8e3" font-weight="600">FROM</tspan>
    <tspan fill="#ffffff"> app_user;</tspan>
  </text>
</svg>
