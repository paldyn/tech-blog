<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GGUF 양자화 레벨 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">7B 모델 기준 파일 크기 vs 품질 점수 (MMLU 기준)</text>

  <!-- Table header -->
  <rect x="60" y="90" width="760" height="34" rx="4" fill="#151c24"/>
  <text x="130" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">레벨</text>
  <text x="270" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">비트/가중치</text>
  <text x="410" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">파일 크기</text>
  <text x="570" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">품질 (FP16=100%)</text>
  <text x="750" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">추천 용도</text>

  <!-- Rows -->
  <!-- Q2_K -->
  <rect x="60" y="124" width="760" height="32" rx="0" fill="#111"/>
  <text x="130" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Q2_K</text>
  <text x="270" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">2.63</text>
  <text x="410" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">2.8 GB</text>
  <rect x="510" y="132" width="80" height="14" rx="3" fill="#1a0a0a"/>
  <rect x="510" y="132" width="48" height="14" rx="3" fill="#e05555"/>
  <text x="600" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="start">~60%</text>
  <text x="700" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실험적 용도</text>

  <!-- Q4_0 -->
  <rect x="60" y="156" width="760" height="32" rx="0" fill="#0d0d0d"/>
  <text x="130" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Q4_0</text>
  <text x="270" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">4.0</text>
  <text x="410" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">3.8 GB</text>
  <rect x="510" y="164" width="80" height="14" rx="3" fill="#1a0a0a"/>
  <rect x="510" y="164" width="66" height="14" rx="3" fill="#e07740"/>
  <text x="600" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e07740" text-anchor="start">~82%</text>
  <text x="700" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">저사양 환경</text>

  <!-- Q4_K_M (recommended) -->
  <rect x="60" y="188" width="760" height="32" rx="0" fill="#0f1a0f"/>
  <rect x="60" y="188" width="4" height="32" fill="#55c555"/>
  <text x="130" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Q4_K_M ★</text>
  <text x="270" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">4.85</text>
  <text x="410" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">4.1 GB</text>
  <rect x="510" y="196" width="80" height="14" rx="3" fill="#1a0a0a"/>
  <rect x="510" y="196" width="75" height="14" rx="3" fill="#55c555"/>
  <text x="600" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="start">~94%</text>
  <text x="700" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">범용 권장</text>

  <!-- Q5_K_M -->
  <rect x="60" y="220" width="760" height="32" rx="0" fill="#111"/>
  <text x="130" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Q5_K_M</text>
  <text x="270" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">5.68</text>
  <text x="410" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">4.8 GB</text>
  <rect x="510" y="228" width="80" height="14" rx="3" fill="#1a0a0a"/>
  <rect x="510" y="228" width="78" height="14" rx="3" fill="#7ec8e3"/>
  <text x="600" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="start">~97%</text>
  <text x="700" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">품질 우선</text>

  <!-- Q6_K -->
  <rect x="60" y="252" width="760" height="32" rx="0" fill="#0d0d0d"/>
  <text x="130" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Q6_K</text>
  <text x="270" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">6.57</text>
  <text x="410" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">5.5 GB</text>
  <rect x="510" y="260" width="80" height="14" rx="3" fill="#1a0a0a"/>
  <rect x="510" y="260" width="79" height="14" rx="3" fill="#7ec8e3"/>
  <text x="600" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="start">~98%</text>
  <text x="700" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">고품질</text>

  <!-- Q8_0 -->
  <rect x="60" y="284" width="760" height="32" rx="0" fill="#111"/>
  <text x="130" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Q8_0</text>
  <text x="270" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">8.0</text>
  <text x="410" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">6.7 GB</text>
  <rect x="510" y="292" width="80" height="14" rx="3" fill="#1a0a0a"/>
  <rect x="510" y="292" width="80" height="14" rx="3" fill="#7777cc"/>
  <text x="600" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="start">~99.5%</text>
  <text x="700" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">거의 무손실</text>

  <!-- F16 -->
  <rect x="60" y="316" width="760" height="32" rx="0" fill="#0d0d0d"/>
  <text x="130" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">F16</text>
  <text x="270" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">16.0</text>
  <text x="410" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">13.5 GB</text>
  <rect x="510" y="324" width="80" height="14" rx="3" fill="#333"/>
  <text x="600" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="start">100% 기준</text>
  <text x="700" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">기준선</text>

  <!-- K-quant 설명 -->
  <rect x="60" y="376" width="760" height="80" rx="6" fill="#111" stroke="#222"/>
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">K-Quant(_K) 이란?</text>
  <text x="80" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중요도가 높은 레이어(attention, gate proj)에는 상위 비트(Q6/Q8)를, 나머지 레이어엔 Q4를 혼합 적용하는 전략.</text>
  <text x="80" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Q4_K_M = 중간 혼합(Medium), Q4_K_S = 소형 혼합(Small). 단순 Q4_0 대비 같은 크기에서 품질이 크게 향상됨.</text>
</svg>
