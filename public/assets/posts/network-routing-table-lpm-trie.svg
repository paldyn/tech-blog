<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="at" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Patricia Trie: 라우터의 LPM 자료구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">비트 트리 구조로 O(W) 탐색 (W = 주소 길이 32 또는 128비트)</text>

  <!-- Root node -->
  <rect x="390" y="90" width="100" height="36" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">Root</text>

  <!-- Level 1 -->
  <line x1="420" y1="126" x2="270" y2="162" stroke="#555" stroke-width="1.5" marker-end="url(#at)"/>
  <line x1="460" y1="126" x2="610" y2="162" stroke="#555" stroke-width="1.5" marker-end="url(#at)"/>
  <text x="330" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">bit=0</text>
  <text x="530" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">bit=1</text>

  <rect x="220" y="164" width="100" height="36" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="270" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">0xxxxxxx</text>

  <rect x="560" y="164" width="100" height="36" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">192.x.x.x</text>

  <!-- Level 2 under 192 -->
  <line x1="590" y1="200" x2="500" y2="236" stroke="#555" stroke-width="1.5" marker-end="url(#at)"/>
  <line x1="630" y1="200" x2="700" y2="236" stroke="#555" stroke-width="1.5" marker-end="url(#at)"/>
  <text x="530" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">168.x</text>
  <text x="665" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">169.x</text>

  <rect x="450" y="238" width="100" height="36" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="500" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">192.168/16</text>

  <rect x="660" y="238" width="100" height="36" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="710" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">192.169/16</text>

  <!-- Level 3 under 192.168 -->
  <line x1="480" y1="274" x2="430" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#at)"/>
  <line x1="520" y1="274" x2="570" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#at)"/>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">10.x</text>
  <text x="540" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">20.x</text>

  <rect x="380" y="312" width="100" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="430" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">192.168.10/24</text>

  <rect x="520" y="312" width="100" height="36" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="570" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">192.168.20/24</text>

  <!-- Highlight selected path -->
  <rect x="380" y="360" width="300" height="44" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="530" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">192.168.10.50 검색 경로</text>
  <text x="530" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Root → 192.x → 192.168/16 → 192.168.10/24 ✓</text>

  <!-- ECMP note -->
  <rect x="60" y="360" width="280" height="44" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">ECMP (동일 비용 다중 경로)</text>
  <text x="200" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메트릭 동일 시 여러 경로 동시 사용</text>
</svg>
