<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PROCEDURE 내 분할 커밋 패턴</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">대용량 배치를 N건씩 나눠 커밋 — 롤백 범위·잠금 최소화</text>

  <!-- Code block -->
  <rect x="60" y="88" width="440" height="320" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CREATE OR REPLACE PROCEDURE</text>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  batch_archive(batch_size INT)</text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">LANGUAGE plpgsql AS $$</text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">DECLARE</text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  v_count INT := 0;</text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">BEGIN</text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  LOOP</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    DELETE FROM logs</text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    WHERE id IN (</text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      SELECT id FROM logs</text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      WHERE created_at &lt; now()-'90d'::interval</text>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      LIMIT batch_size FOR UPDATE SKIP LOCKED);</text>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    EXIT WHEN NOT FOUND;</text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">    COMMIT;</text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    -- 다음 배치 전 잠금 해제됨</text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  END LOOP;</text>
  <text x="76" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">END; $$;</text>

  <!-- Call example -->
  <text x="540" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">CALL로 실행</text>
  <rect x="525" y="116" width="295" height="54" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="541" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">CALL batch_archive(5000);</text>
  <text x="541" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 5000건씩 커밋 반복</text>

  <!-- Flow diagram -->
  <text x="540" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">실행 흐름</text>

  <rect x="525" y="210" width="130" height="36" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="590" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">배치 N건 삭제</text>
  <line x1="590" y1="246" x2="590" y2="268" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <rect x="525" y="272" width="130" height="36" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="590" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">COMMIT</text>
  <line x1="590" y1="308" x2="590" y2="328" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <rect x="525" y="332" width="130" height="36" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="590" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">잠금 해제</text>
  <line x1="590" y1="368" x2="590" y2="388" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <rect x="525" y="392" width="130" height="36" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1.2"/>
  <text x="590" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">반복 or 종료</text>
  <!-- loop arrow back -->
  <line x1="655" y1="410" x2="700" y2="410" stroke="#888" stroke-width="1.2"/>
  <line x1="700" y1="410" x2="700" y2="228" stroke="#888" stroke-width="1.2"/>
  <line x1="700" y1="228" x2="659" y2="228" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="710" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">loop</text>

  <!-- INOUT note -->
  <rect x="525" y="200" width="0" height="0"/>
  <text x="540" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="0" fill="none"/>
  <!-- INOUT param note (재배치) -->
  <rect x="680" y="210" width="135" height="80" rx="6" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="747" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">INOUT 파라미터</text>
  <text x="690" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">OUT 값 반환 시 사용:</text>
  <text x="690" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">INOUT result INT</text>
  <text x="690" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ CALL f(v); -- v에 결과</text>
</svg>
