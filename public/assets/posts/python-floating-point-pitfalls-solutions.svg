<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">상황별 해결법</text>

  <!-- row 1 -->
  <rect x="60" y="80" width="320" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="106" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">math.isclose(a, b)</text>
  <text x="78" y="128" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">근사 비교</text>
  <text x="410" y="116" font-size="14" fill="#cccccc">실수끼리 같은지 판단할 때</text>

  <!-- row 2 -->
  <rect x="60" y="160" width="320" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">Decimal('0.1')</text>
  <text x="78" y="208" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">십진 정확 연산</text>
  <text x="410" y="196" font-size="14" fill="#cccccc">돈·금액 등 정확성이 필수일 때</text>

  <!-- row 3 -->
  <rect x="60" y="240" width="320" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="266" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">round(x, 2)</text>
  <text x="78" y="288" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">표시용 반올림</text>
  <text x="410" y="276" font-size="14" fill="#cccccc">화면에 보여줄 때만(연산엔 부적합)</text>
</svg>
