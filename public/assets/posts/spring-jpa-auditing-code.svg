<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 450">
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BaseEntity · AuditorAware 구현 예시</text>
  <text x="440" y="65"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">모든 Entity가 상속할 공통 Auditing 상위 클래스와 설정 Bean</text>

  <!-- Left code block: BaseEntity -->
  <rect x="60" y="82" width="370" height="330" rx="6" fill="#070b14" stroke="#1e2433"/>
  <!-- filename label -->
  <text x="76" y="104"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#6a8aa0" xml:space="preserve">// BaseEntity.java</text>

  <text x="76" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">@Getter</text>
  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">@MappedSuperclass</text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">@EntityListeners(</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    AuditingEntityListener.class)</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">public abstract class <text fill="#e8e8e8">BaseEntity</text> {</text>
  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">    // 생성 시각 (최초 1회)</text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">    @CreatedDate</text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">    @Column(updatable = false)</text>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    private <text fill="#e8e8e8">LocalDateTime createdAt;</text></text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">    @LastModifiedDate</text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    private <text fill="#e8e8e8">LocalDateTime updatedAt;</text></text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">    @CreatedBy</text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    private <text fill="#e8e8e8">String createdBy;</text></text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">    @LastModifiedBy</text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    private <text fill="#e8e8e8">String updatedBy;</text></text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Right code block: AuditorAware config -->
  <rect x="450" y="82" width="370" height="330" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="104"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#6a8aa0" xml:space="preserve">// JpaAuditingConfig.java</text>

  <text x="466" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">@Configuration</text>
  <text x="466" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">@EnableJpaAuditing(</text>
  <text x="466" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  auditorAwareRef = <text fill="#ce9178">"auditorProvider"</text>)</text>
  <text x="466" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">public class <text fill="#e8e8e8">JpaAuditingConfig</text> {</text>
  <text x="466" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">    @Bean</text>
  <text x="466" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    public <text fill="#e8e8e8">AuditorAware&lt;String&gt;</text></text>
  <text x="466" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">            auditorProvider() {</text>
  <text x="466" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        return <text fill="#e8e8e8">() -&gt; {</text></text>
  <text x="466" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">          var auth <text fill="#e8e8e8">= SecurityContextHolder</text></text>
  <text x="466" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">            .getContext().getAuthentication();</text>
  <text x="466" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">          if <text fill="#e8e8e8">(auth == null || !auth.isAuthenticated())</text></text>
  <text x="466" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">              return <text fill="#e8e8e8">Optional.empty();</text></text>
  <text x="466" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">          return <text fill="#e8e8e8">Optional.of(auth.getName());</text></text>
  <text x="466" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        };</text>
  <text x="466" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    }</text>
  <text x="466" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
</svg>
