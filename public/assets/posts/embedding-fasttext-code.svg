<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 338" width="880" height="338">
  <rect width="880" height="338" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">FastText 학습 및 OOV 처리</text>

  <!-- Code block background -->
  <rect x="60" y="68" width="760" height="252" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <!-- Line numbers -->
  <text x="76" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 1</text>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 2</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 3</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 4</text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 5</text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 6</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 7</text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 8</text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 9</text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve">10</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve">11</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve">12</text>

  <!-- Code -->
  <text x="110" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">from</tspan><tspan fill="#e8e8e8"> gensim.models </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> FastText</tspan></text>

  <text x="110" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">model = FastText(</text>

  <text x="110" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    sentences=corpus,</text>

  <text x="110" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e8e8e8">    vector_size=</tspan><tspan fill="#b5cea8">300</tspan><tspan fill="#e8e8e8">, window=</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="110" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e8e8e8">    min_count=</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="110" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e8e8e8">    min_n=</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, max_n=</tspan><tspan fill="#b5cea8">6</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="110" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">)</text>

  <text x="110" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># OOV 단어도 처리 가능</text>

  <text x="110" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">vec = model.wv[</text>
  <text x="228" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"새로운단어"</text>
  <text x="321" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">]</text>

  <text x="110" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e8e8e8">sim = model.wv.most_similar(</tspan><tspan fill="#ce9178">"학습"</tspan><tspan fill="#e8e8e8">)</tspan></text>

</svg>
