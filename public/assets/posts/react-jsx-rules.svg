<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JSX 핵심 규칙</text>

  <!-- Rule 1: Single root -->
  <rect x="60" y="64" width="360" height="130" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="240" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">① 반드시 하나의 루트 요소</text>
  <rect x="76" y="100" width="328" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="122" fill="#9aa4b8">// ❌ 오류 — 루트가 두 개</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;h1&gt;</tspan><tspan fill="#ffffff">Title</tspan><tspan fill="#ce9178">&lt;/h1&gt;</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;p&gt;</tspan><tspan fill="#ffffff">Text</tspan><tspan fill="#ce9178">&lt;/p&gt;</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// ✅ Fragment로 감싸기</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;&gt;&lt;h1&gt;</tspan><tspan fill="#ffffff">Title</tspan><tspan fill="#ce9178">&lt;/h1&gt;&lt;p&gt;</tspan><tspan fill="#ffffff">Text</tspan><tspan fill="#ce9178">&lt;/p&gt;&lt;/&gt;</tspan>
  </text>

  <!-- Rule 2: Self-closing -->
  <rect x="460" y="64" width="360" height="130" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="640" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">② 빈 태그는 반드시 자기 닫기</text>
  <rect x="476" y="100" width="328" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="492" y="122" fill="#9aa4b8">// ❌ HTML에서는 괜찮지만 JSX는 오류</tspan>
    <tspan x="492" dy="18" fill="#ce9178">&lt;img</tspan><tspan fill="#ffffff"> src=</tspan><tspan fill="#ce9178">"photo.jpg"</tspan><tspan fill="#ce9178">&gt;</tspan>
    <tspan x="492" dy="18" fill="#9aa4b8">// ✅ 슬래시로 닫기</tspan>
    <tspan x="492" dy="18" fill="#ce9178">&lt;img</tspan><tspan fill="#ffffff"> src=</tspan><tspan fill="#ce9178">"photo.jpg"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">/&gt;</tspan>
  </text>

  <!-- Rule 3: camelCase -->
  <rect x="60" y="220" width="360" height="130" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="240" y="244" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">③ 속성은 camelCase</text>
  <rect x="76" y="256" width="328" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="278" fill="#9aa4b8">// HTML 속성 → JSX 속성</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff">       → </tspan><tspan fill="#55c555" font-weight="600">className</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff">         → </tspan><tspan fill="#55c555" font-weight="600">htmlFor</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">onclick</tspan><tspan fill="#ffffff">     → </tspan><tspan fill="#55c555" font-weight="600">onClick</tspan>
  </text>

  <!-- Rule 4: JS expressions -->
  <rect x="460" y="220" width="360" height="130" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="640" y="244" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">④ {} 안에 JS 표현식</text>
  <rect x="476" y="256" width="328" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="492" y="278" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> name = </tspan><tspan fill="#ce9178">'React'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="492" dy="18" fill="#9aa4b8">// 변수, 함수 호출, 연산 모두 가능</tspan>
    <tspan x="492" dy="18" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;h1&gt;</tspan><tspan fill="#ffffff">Hello, {name}!</tspan><tspan fill="#ce9178">&lt;/h1&gt;</tspan>
    <tspan x="492" dy="18" fill="#9aa4b8">// 문(if, for)은 ❌ — 표현식만 ✅</tspan>
  </text>

  <!-- Bottom note -->
  <rect x="60" y="375" width="760" height="100" rx="8" fill="#0f1629" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">JSX는 문법 설탕(Syntactic Sugar)</text>
  <text x="440" y="424" text-anchor="middle" font-size="13" fill="#888">JSX를 사용하지 않고 React.createElement()를 직접 쓸 수도 있지만,</text>
  <text x="440" y="448" text-anchor="middle" font-size="13" fill="#888">JSX가 훨씬 직관적이고 가독성이 높아 실무에서 사실상 필수입니다.</text>
</svg>
