<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" style="background:#0a0a0a">
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JSX 핵심 규칙 5가지</text>

  <!-- Rule 1 -->
  <rect x="60" y="66" width="370" height="80" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">① 단일 루트 요소 반환</text>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">return 안에 최상위 태그가 반드시 하나여야 한다.</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">&lt;&gt;...&lt;/&gt; (Fragment)로 감싸도 된다.</text>

  <!-- Rule 2 -->
  <rect x="450" y="66" width="370" height="80" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">② 모든 태그는 닫아야 한다</text>
  <text x="470" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">HTML과 달리 &lt;br /&gt;, &lt;img /&gt; 등 자기닫힘 태그도</text>
  <text x="470" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">반드시 / 로 닫아야 한다.</text>

  <!-- Rule 3 -->
  <rect x="60" y="162" width="370" height="80" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">③ className (class 아님)</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">HTML의 class 속성은 JSX에서 className으로 쓴다.</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">for &#x2192; htmlFor, tabindex &#x2192; tabIndex 등도 동일.</text>

  <!-- Rule 4 -->
  <rect x="450" y="162" width="370" height="80" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">④ {} 중괄호로 JS 표현식 삽입</text>
  <text x="470" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">{변수}, {함수호출()}, {삼항연산자} 등</text>
  <text x="470" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">모든 JS 표현식을 JSX 안에 넣을 수 있다.</text>

  <!-- Rule 5 -->
  <rect x="60" y="258" width="370" height="80" rx="12" fill="#1a1025" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#cc77cc">⑤ 인라인 스타일은 객체로</text>
  <text x="80" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">style="color:red" 대신 style={{ color: 'red' }}.</text>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">속성명은 camelCase: background-color &#x2192; backgroundColor.</text>

  <!-- Example code block -->
  <rect x="60" y="360" width="760" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 5가지 규칙 모두 적용한 예시</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Profile({ user, isActive }) {</tspan></text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> (</tspan></text>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    &lt;&gt;</tspan><tspan fill="#9aa4b8">  {/* ① Fragment로 루트 */}</tspan></text>
  <text x="76" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#55c555">img</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">src</tspan><tspan fill="#ffffff">={user.avatar} </tspan><tspan fill="#cc77cc">alt</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff"> /&gt;</tspan><tspan fill="#9aa4b8">  {/* ② 자기닫힘 */}</tspan></text>
  <text x="76" y="482" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">className</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">style</tspan><tspan fill="#ffffff">={{ color: </tspan><tspan fill="#ce9178">'blue'</tspan><tspan fill="#ffffff"> }}&gt;{user.name}&lt;/</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="76" y="502" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    &lt;/&gt;</tspan></text>
</svg>
