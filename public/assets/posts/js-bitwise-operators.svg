<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">비트 연산자 — 32비트 정수 기반 연산</text>

  <!-- Bitwise operators table header -->
  <rect x="60" y="72" width="760" height="36" fill="#1e2433" rx="4"/>
  <text x="130" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">연산자</text>
  <text x="240" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">이름</text>
  <text x="430" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">예시 (5 &amp; 3 등)</text>
  <text x="700" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">결과</text>

  <!-- AND -->
  <rect x="60" y="108" width="760" height="32" fill="#111620" rx="0"/>
  <text x="130" y="129" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">&amp;</text>
  <text x="240" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">AND</text>
  <text x="430" y="129" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">5 &amp; 3  (0101 &amp; 0011)</text>
  <text x="700" y="129" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">1  (0001)</text>

  <!-- OR -->
  <rect x="60" y="140" width="760" height="32" fill="#0d1118" rx="0"/>
  <text x="130" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">|</text>
  <text x="240" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">OR</text>
  <text x="430" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">5 | 3  (0101 | 0011)</text>
  <text x="700" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">7  (0111)</text>

  <!-- XOR -->
  <rect x="60" y="172" width="760" height="32" fill="#111620" rx="0"/>
  <text x="130" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">^</text>
  <text x="240" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">XOR</text>
  <text x="430" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">5 ^ 3  (0101 ^ 0011)</text>
  <text x="700" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">6  (0110)</text>

  <!-- NOT -->
  <rect x="60" y="204" width="760" height="32" fill="#0d1118" rx="0"/>
  <text x="130" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">~</text>
  <text x="240" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">NOT</text>
  <text x="430" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">~5  (~00000101)</text>
  <text x="700" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">-6  (2의 보수)</text>

  <!-- Left shift -->
  <rect x="60" y="236" width="760" height="32" fill="#111620" rx="0"/>
  <text x="130" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">&lt;&lt;</text>
  <text x="240" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">왼쪽 시프트</text>
  <text x="430" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">5 &lt;&lt; 1  (×2)</text>
  <text x="700" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">10</text>

  <!-- Right shift -->
  <rect x="60" y="268" width="760" height="32" fill="#0d1118" rx="0"/>
  <text x="130" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">&gt;&gt;</text>
  <text x="240" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">부호 유지 오른쪽 시프트</text>
  <text x="430" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">-8 &gt;&gt; 1</text>
  <text x="700" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">-4 (부호 유지)</text>

  <!-- Zero-fill right shift -->
  <rect x="60" y="300" width="760" height="32" fill="#111620" rx="0"/>
  <text x="130" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">&gt;&gt;&gt;</text>
  <text x="240" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">부호 없는 오른쪽 시프트</text>
  <text x="430" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">-1 &gt;&gt;&gt; 0</text>
  <text x="700" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">4294967295 (uint32)</text>

  <!-- 32-bit note -->
  <rect x="60" y="356" width="760" height="122" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 비트 연산은 내부에서 32비트 정수로 변환 후 수행</text>
  <text x="80" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">3.9</text><text x="106" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> | </text><text x="120" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0</text><text x="128" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">;        // 3  (소수점 제거 — Math.trunc 대용)</text>
  <text x="80" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">-3.9</text><text x="112" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> | </text><text x="128" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0</text><text x="136" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">;       // -3</text>
  <text x="80" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">~~</text><text x="98" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">3.9</text><text x="122" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">;            // 3  (이중 NOT: 정수 변환)</text>
  <text x="80" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">n &lt;&lt; </text><text x="116" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1</text><text x="124" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">;            // n * 2 (2의 거듭제곱 곱셈)</text>
  <text x="80" y="470" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">n &gt;&gt; </text><text x="116" y="470" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1</text><text x="124" y="470" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">;            // Math.floor(n / 2)</text>

  <!-- Footer -->
  <text x="440" y="502" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN — JavaScript 완전 정복</text>
</svg>
