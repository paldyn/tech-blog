<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">자연키 vs 대리키 비교</text>

  <!-- Natural Key -->
  <rect x="60" y="70" width="360" height="50" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555" text-anchor="middle">자연키 (Natural Key)</text>

  <rect x="60" y="134" width="360" height="240" rx="6" fill="#120e0e" stroke="#3a1a1a" stroke-width="1"/>
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">정의</text>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비즈니스 의미 있는 값을 PK로 사용</text>
  <text x="80" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: 주민등록번호, 이메일, ISBN, 사원번호</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• JOIN 없이 의미 파악 가능</text>
  <text x="80" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 외부 시스템과 자연스럽게 연동</text>
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">단점</text>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 값이 바뀌면 CASCADE 업데이트 필요</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 길면 FK 인덱스 비용 증가</text>
  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 개인정보 포함 시 보안 위험</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 유일성이 미래에도 보장되지 않을 수 있음</text>

  <!-- Surrogate Key -->
  <rect x="460" y="70" width="360" height="50" rx="8" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">대리키 (Surrogate Key)</text>

  <rect x="460" y="134" width="360" height="240" rx="6" fill="#0d150d" stroke="#1a3a1a" stroke-width="1"/>
  <text x="480" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">정의</text>
  <text x="480" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DB가 생성하는 의미 없는 식별자</text>
  <text x="480" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: AUTO_INCREMENT, UUID, ULID, Snowflake</text>
  <text x="480" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="480" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 불변 — 비즈니스 변화 영향 없음</text>
  <text x="480" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 컴팩트 (BIGINT = 8바이트)</text>
  <text x="480" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• JOIN 성능 우수</text>
  <text x="480" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">단점</text>
  <text x="480" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 단독으로 의미 불명확</text>
  <text x="480" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 자연 유일성은 UNIQUE로 별도 강제</text>

  <!-- Recommendation -->
  <rect x="60" y="390" width="760" height="22" rx="4" fill="#0d1f14" stroke="#1a3a1a" stroke-width="1"/>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">실무 권장: 대부분 대리키(BIGINT PK) + 자연키에 UNIQUE 제약 조합이 최적</text>
</svg>
