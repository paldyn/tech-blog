<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Contrastive Search 개념도</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">품질(모델 확률)과 다양성(유사성 패널티)의 균형으로 토큰 선택</text>

  <!-- Formula box -->
  <rect x="60" y="86" width="760" height="52" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1" stroke-opacity="0.6"/>
  <text x="440" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">선택 점수(Selection Score)</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">score(v) = (1 - α) × P_model(v | context) − α × max_sim(v, past_tokens)</text>

  <!-- Alpha annotation -->
  <text x="200" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">α = 다양성 페널티 (0~1)</text>
  <text x="200" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">α=0: Greedy와 동일</text>
  <text x="200" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">α=1: 다양성만 추구</text>
  <text x="640" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">max_sim = 코사인 유사도</text>
  <text x="640" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이미 생성된 토큰들과</text>
  <text x="640" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">후보 토큰의 표현 유사도</text>

  <!-- Step by step process -->
  <!-- Step 1 box -->
  <rect x="60" y="210" width="200" height="130" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="160" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">Step 1</text>
  <text x="160" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Top-k 후보 선정</text>
  <text x="80" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모델이 출력한 로짓에서</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">상위 k개 토큰을</text>
  <text x="80" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">초기 후보군으로 설정</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">k = 4~8 권장</text>

  <!-- Arrow 1 -->
  <polygon points="268,262 268,282 290,272" fill="#444"/>
  <line x1="260" y1="272" x2="268" y2="272" stroke="#444" stroke-width="3"/>

  <!-- Step 2 box -->
  <rect x="296" y="210" width="200" height="130" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.5"/>
  <text x="396" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Step 2</text>
  <text x="396" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">유사도 계산</text>
  <text x="316" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 후보 토큰의 hidden</text>
  <text x="316" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">state를 이미 생성된</text>
  <text x="316" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 토큰과 비교</text>
  <text x="316" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">코사인 유사도 측정</text>

  <!-- Arrow 2 -->
  <polygon points="504,262 504,282 526,272" fill="#444"/>
  <line x1="496" y1="272" x2="504" y2="272" stroke="#444" stroke-width="3"/>

  <!-- Step 3 box -->
  <rect x="532" y="210" width="200" height="130" fill="#111827" rx="8" stroke="#e05555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="632" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">Step 3</text>
  <text x="632" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">점수 계산 및 선택</text>
  <text x="552" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">quality score에서</text>
  <text x="552" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">유사도 패널티를 빼서</text>
  <text x="552" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최종 점수 산출 후</text>
  <text x="552" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">최고 점수 토큰 선택</text>

  <!-- Right arrow to result -->
  <polygon points="740,262 740,282 762,272" fill="#55c555"/>
  <line x1="732" y1="272" x2="740" y2="272" stroke="#55c555" stroke-width="3"/>
  <rect x="762" y="242" width="58" height="60" fill="#0d2010" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="791" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">선택된</text>
  <text x="791" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">토큰</text>
  <text x="791" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#55c555" text-anchor="middle">✓</text>

  <!-- Comparison with regular sampling -->
  <rect x="60" y="356" width="760" height="88" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">왜 Contrastive Search가 필요한가?</text>
  <text x="110" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일반 샘플링:</text>
  <text x="200" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">동일한 표현이 반복될 수 있음 ("I think... I think... I think...")</text>
  <text x="110" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Contrastive:</text>
  <text x="200" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">이미 쓴 것과 유사한 표현에 패널티 → 반복 없이 일관된 텍스트 생성</text>
  <text x="110" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">적합 태스크:</text>
  <text x="200" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">긴 문서 생성, 스토리텔링, 번역, 요약 (α ≈ 0.6 권장)</text>
</svg>
