<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="arr-blue7" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green7" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">책임 있는 취약점 공개 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">연구자와 조직이 합의한 시한 안에서 비공개로 협력한 뒤 공개한다</text>

  <!-- 1 report -->
  <rect x="40" y="120" width="190" height="80" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">1. 비공개 제보</text>
  <text x="135" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">연구자 → 보안 연락처</text>
  <text x="135" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">security.txt · 바운티 플랫폼</text>

  <!-- 2 triage -->
  <rect x="255" y="120" width="190" height="80" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">2. 접수 · 분류</text>
  <text x="350" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">재현 확인 · 중복 점검</text>
  <text x="350" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">위험도 산정 · 접수 회신</text>

  <!-- 3 fix -->
  <rect x="470" y="120" width="190" height="80" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="565" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">3. 수정 · 배포</text>
  <text x="565" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">패치 개발 · 배포</text>
  <text x="565" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">합의된 시한 내 (보통 90일)</text>

  <!-- 4 disclose -->
  <rect x="685" y="120" width="155" height="80" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="762" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">4. 공개 · 보상</text>
  <text x="762" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">CVE 발급 · 크레딧</text>
  <text x="762" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">바운티 지급</text>

  <line x1="230" y1="160" x2="253" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue7)"/>
  <line x1="445" y1="160" x2="468" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue7)"/>
  <line x1="660" y1="160" x2="683" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green7)"/>

  <!-- timeline note -->
  <rect x="40" y="250" width="800" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="64" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">공개 정책의 두 축</text>
  <text x="64" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">• 협력적 공개(Coordinated Disclosure): 패치 배포 후 또는 합의 시한 경과 후에 세부 공개</text>
  <text x="64" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">• 완전 공개(Full Disclosure): 시한 내 미대응 시, 사용자 보호를 위해 즉시 공개하는 압박 수단</text>
  <text x="64" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">핵심은 "비공개 협력 우선, 무기한 침묵 금지" — 양쪽 모두를 위한 균형</text>

  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">제로데이를 공개 시장에 던지지 않고, 방어자가 고칠 시간을 주는 절차</text>
</svg>
