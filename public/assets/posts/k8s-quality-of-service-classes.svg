<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">QoS 클래스 — 퇴출 우선순위</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">메모리 부족 시 BestEffort → Burstable → Guaranteed 순으로 퇴출됩니다</text>

  <!-- Guaranteed (top tier) -->
  <rect x="220" y="88" width="440" height="104" rx="10" fill="#0d1e0d" stroke="#55c555" stroke-width="2.5"/>
  <text x="440" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">Guaranteed</text>
  <text x="440" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">모든 컨테이너에 requests == limits 설정</text>
  <text x="440" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">cpu requests: 500m = cpu limits: 500m</text>
  <text x="440" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">memory requests: 128Mi = memory limits: 128Mi</text>

  <!-- Burstable (middle tier) -->
  <rect x="120" y="212" width="640" height="104" rx="10" fill="#1a1500" stroke="#e0a020" stroke-width="2"/>
  <text x="440" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#e0a020">Burstable</text>
  <text x="440" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">하나 이상의 컨테이너에 requests 또는 limits 설정</text>
  <text x="440" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0a020">cpu requests: 250m, cpu limits: 1000m (requests != limits)</text>
  <text x="440" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0a020">또는 requests만 있고 limits 없는 경우</text>

  <!-- BestEffort (lowest tier) -->
  <rect x="60" y="336" width="760" height="90" rx="10" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#e05555">BestEffort</text>
  <text x="440" y="384" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">모든 컨테이너에 resources 설정 없음</text>
  <text x="440" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">리소스 보장 없음 — 메모리 부족 시 가장 먼저 OOMKilled</text>

  <!-- Eviction order annotation -->
  <text x="62" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">퇴출 순위 3 (마지막)</text>
  <text x="62" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a020">퇴출 순위 2</text>
  <text x="62" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">퇴출 순위 1 (가장 먼저)</text>
</svg>
