        font-size="13" fill="#7ec8e3">git push </text>
  <text x="157" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">origin </text>
  <text x="207" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">v1.2.0</text>
  <text x="76" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 모든 태그 전송</text>
  <text x="76" y="218" xml:space="preserve"
