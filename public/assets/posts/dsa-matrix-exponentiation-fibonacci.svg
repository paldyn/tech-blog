<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">피보나치 행렬 항등식</text>

  <!-- M^n -->
  <rect x="90" y="96" width="130" height="96" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" text-anchor="middle" fill="#ffffff">
    <text x="130" y="136">1</text>
    <text x="180" y="136">1</text>
    <text x="130" y="170">1</text>
    <text x="180" y="170">0</text>
  </g>
  <text x="232" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14"
        fill="#7ec8e3" font-weight="600">n</text>

  <text x="268" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" fill="#e8e8e8">=</text>

  <!-- result matrix -->
  <rect x="310" y="96" width="310" height="96" rx="8" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" text-anchor="middle">
    <text x="395" y="136" fill="#55c555" font-weight="600">F(n+1)</text>
    <text x="540" y="136" fill="#ffffff">F(n)</text>
    <text x="395" y="170" fill="#ffffff">F(n)</text>
    <text x="540" y="170" fill="#ffffff">F(n-1)</text>
  </g>

  <!-- annotation -->
  <rect x="660" y="96" width="160" height="96" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="676" y="130" fill="#9aa4b8">행렬 n제곱이</text>
    <text x="676" y="158" fill="#9aa4b8">피보나치 n번째</text>
    <text x="676" y="186" fill="#9aa4b8">항을 품고 있다</text>
  </g>

  <!-- example -->
  <rect x="60" y="240" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">예: M⁵ = [[8, 5], [5, 3]]  →  F(5) = </tspan><tspan fill="#55c555" font-weight="600">5</tspan><tspan fill="#ffffff">,  F(6) = </tspan><tspan fill="#55c555" font-weight="600">8</tspan></text>

  <!-- transition view -->
  <rect x="60" y="312" width="760" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">왜 성립할까 — 상태 전이 관점</text>
  <text x="76" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">M을 한 번 곱하면 (F(n), F(n-1))이 (F(n+1), F(n))으로 한 칸 전진 → n칸 전진 = Mⁿ</text>

  <text x="60" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">선형 점화식은 모두 이런 전이 행렬로 표현 가능 — 거듭제곱만 빠르면 n이 10¹⁸이어도 OK</text>
</svg>
