<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrB3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">시도 분할(Trial Division): 360 소인수분해</text>

  <!-- chain -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" text-anchor="middle">
    <rect x="60" y="150" width="96" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="108" y="184" fill="#ffffff">360</text>

    <rect x="188" y="150" width="96" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="236" y="184" fill="#ffffff">180</text>

    <rect x="316" y="150" width="96" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="364" y="184" fill="#ffffff">90</text>

    <rect x="444" y="150" width="96" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="492" y="184" fill="#ffffff">45</text>

    <rect x="572" y="150" width="96" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="620" y="184" fill="#ffffff">15</text>

    <rect x="700" y="150" width="96" height="56" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="748" y="184" fill="#55c555" font-weight="600">5</text>
  </g>

  <!-- arrows + labels -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" text-anchor="middle">
    <line x1="158" y1="178" x2="186" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB3)"/>
    <text x="172" y="136" fill="#7ec8e3" font-weight="600">÷2</text>
    <line x1="286" y1="178" x2="314" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB3)"/>
    <text x="300" y="136" fill="#7ec8e3" font-weight="600">÷2</text>
    <line x1="414" y1="178" x2="442" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB3)"/>
    <text x="428" y="136" fill="#7ec8e3" font-weight="600">÷2</text>
    <line x1="542" y1="178" x2="570" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB3)"/>
    <text x="556" y="136" fill="#7ec8e3" font-weight="600">÷3</text>
    <line x1="670" y1="178" x2="698" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB3)"/>
    <text x="684" y="136" fill="#7ec8e3" font-weight="600">÷3</text>
  </g>

  <text x="748" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">남은 수 = 소수</text>

  <!-- result -->
  <rect x="60" y="268" width="760" height="44" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">360 = </tspan><tspan fill="#55c555" font-weight="600">2³ × 3² × 5</tspan><tspan fill="#9aa4b8">   # 같은 소수로 나눠지지 않을 때까지 반복</tspan></text>

  <text x="60" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">나누는 수 d는 d² ≤ n 까지만 시도하면 충분 — 남은 수가 1보다 크면 그 자체가 소수</text>
</svg>
