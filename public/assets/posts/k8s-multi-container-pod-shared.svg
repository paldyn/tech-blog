<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">멀티 컨테이너 공유 리소스</text>

  <!-- Pod outer boundary -->
  <rect x="60" y="68" width="760" height="340" rx="12" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Pod (공유 네트워크 네임스페이스 + 볼륨)</text>

  <!-- Container A -->
  <rect x="100" y="112" width="240" height="120" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Container A</text>
  <text x="220" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">nginx (port 80)</text>
  <text x="220" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">127.0.0.1로 B 접근 가능</text>
  <text x="220" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">/shared-data 마운트</text>

  <!-- Container B (sidecar) -->
  <rect x="540" y="112" width="240" height="120" rx="8" fill="#1e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Container B</text>
  <text x="660" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">fluentd (port 9880)</text>
  <text x="660" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">A가 쓴 로그 파일 읽기</text>
  <text x="660" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">/shared-data 마운트</text>

  <!-- Network: double-arrow between A and B -->
  <line x1="340" y1="172" x2="540" y2="172" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <line x1="540" y1="152" x2="340" y2="152" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="440" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">localhost:9880</text>
  <text x="440" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">localhost:80</text>

  <!-- Shared Volume -->
  <rect x="300" y="272" width="280" height="64" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">emptyDir 공유 볼륨</text>
  <text x="440" y="320" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">/shared-data</text>

  <!-- Volume lines -->
  <line x1="220" y1="232" x2="360" y2="272" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="660" y1="232" x2="520" y2="272" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Shared IP note -->
  <rect x="100" y="360" width="660" height="36" rx="6" fill="#1a1a1a"/>
  <text x="440" y="382" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">파드 IP 하나 공유 — 컨테이너끼리 localhost로 통신</text>

  <!-- Code block at bottom -->
  <rect x="60" y="418" width="760" height="32" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="437" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">volumes: [{name: shared-data, emptyDir: {}}]</text>
</svg>
