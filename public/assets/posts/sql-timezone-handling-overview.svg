<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">타임존 처리: UTC 기준 저장과 변환</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">AT TIME ZONE · TIMESTAMPTZ · 오프셋 변환 흐름</text>

  <!-- UTC center box -->
  <rect x="330" y="100" width="220" height="56" rx="8" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">UTC (협정 세계시)</text>
  <text x="440" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB 내부 저장 기준</text>

  <!-- Timezone boxes -->
  <!-- KST -->
  <rect x="60" y="210" width="170" height="70" rx="8" fill="#181825" stroke="#55c555" stroke-width="1.5"/>
  <text x="145" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">KST (한국)</text>
  <text x="145" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">UTC + 9:00</text>
  <text x="145" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Asia/Seoul</text>

  <!-- EST -->
  <rect x="260" y="210" width="170" height="70" rx="8" fill="#181825" stroke="#7777cc" stroke-width="1.5"/>
  <text x="345" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">EST (뉴욕)</text>
  <text x="345" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">UTC − 5:00</text>
  <text x="345" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">America/New_York</text>

  <!-- JST -->
  <rect x="460" y="210" width="170" height="70" rx="8" fill="#181825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="545" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">JST (도쿄)</text>
  <text x="545" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">UTC + 9:00</text>
  <text x="545" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Asia/Tokyo</text>

  <!-- CET -->
  <rect x="660" y="210" width="170" height="70" rx="8" fill="#181825" stroke="#e05555" stroke-width="1.5"/>
  <text x="745" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">CET (파리)</text>
  <text x="745" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">UTC + 1:00</text>
  <text x="745" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Europe/Paris</text>

  <!-- Arrows from UTC to timezones -->
  <!-- UTC → KST -->
  <line x1="360" y1="156" x2="200" y2="210" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="196,206 204,215 212,206" fill="#55c555"/>

  <!-- UTC → EST -->
  <line x1="390" y1="156" x2="345" y2="210" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="341,206 349,215 357,206" fill="#7777cc"/>

  <!-- UTC → JST -->
  <line x1="490" y1="156" x2="545" y2="210" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="541,206 549,215 557,206" fill="#7ec8e3"/>

  <!-- UTC → CET -->
  <line x1="520" y1="156" x2="700" y2="210" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="696,206 704,215 712,206" fill="#e05555"/>

  <!-- TIMESTAMP vs TIMESTAMPTZ boxes -->
  <rect x="60" y="330" width="355" height="80" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="237" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">TIMESTAMP WITH TIME ZONE</text>
  <text x="237" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">내부적으로 UTC 저장, 조회 시 세션 TZ 변환</text>
  <text x="237" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PostgreSQL: TIMESTAMPTZ · Oracle: TIMESTAMP WITH TIME ZONE</text>

  <rect x="465" y="330" width="355" height="80" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="642" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">TIMESTAMP (WITHOUT TIME ZONE)</text>
  <text x="642" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">TZ 정보 없이 있는 그대로 저장</text>
  <text x="642" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TZ 전환 불가 → 혼용 시 버그 발생 위험</text>

  <!-- Label at bottom -->
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">TZ-aware 타입을 기본값으로 사용하고, 표시 시점에 AT TIME ZONE으로 변환</text>
</svg>
