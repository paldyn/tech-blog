<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">OFFSET vs 커서 기반 페이지네이션 비교</text>

  <!-- Left: OFFSET degradation -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" xml:space="preserve">OFFSET 방식 — 페이지 깊어질수록 느려짐</text>

  <!-- Page visual: rows -->
  <rect x="60" y="94" width="360" height="170" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <!-- Row blocks -->
  <rect x="76" y="108" width="328" height="16" rx="2" fill="#1e2433"/>
  <rect x="76" y="128" width="328" height="16" rx="2" fill="#1e2433"/>
  <rect x="76" y="148" width="328" height="16" rx="2" fill="#1e2433"/>
  <rect x="76" y="168" width="328" height="16" rx="2" fill="#1e2433"/>
  <rect x="76" y="188" width="328" height="16" rx="2" fill="#1e2433"/>
  <!-- Highlighted (returned) -->
  <rect x="76" y="228" width="328" height="16" rx="2" fill="#0a2a3a" stroke="#7ec8e3"/>
  <rect x="76" y="248" width="328" height="16" rx="2" fill="#0a2a3a" stroke="#7ec8e3"/>

  <text x="240" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">읽고 버리는 행들</text>
  <text x="240" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">(OFFSET만큼)</text>
  <text x="240" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">반환하는 행 (LIMIT만큼)</text>

  <!-- Arrow pointing down indicating growth -->
  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">페이지 N → OFFSET = (N-1) × pageSize</text>

  <!-- Right: Cursor-based -->
  <text x="470" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" xml:space="preserve">커서 기반 — 항상 일정한 성능</text>

  <rect x="450" y="96" width="370" height="148" rx="6" fill="#070b14" stroke="#55c555" stroke-width="1"/>
  <text x="466" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 첫 페이지</text>
  <text x="466" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="514" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> id, name </text>
  <text x="600" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="636" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> items</text>
  <text x="466" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ORDER BY</text>
  <text x="538" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> id </text>
  <text x="566" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">LIMIT</text>
  <text x="614" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve"> 10</text>
  <text x="466" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 마지막 id = 1000 이라면 다음 페이지:</text>
  <text x="466" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="514" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> id, name </text>
  <text x="600" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="636" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> items</text>
  <text x="466" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="514" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> id &gt; </text>
  <text x="550" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1000</text>
  <text x="590" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"> -- ← 커서</text>
  <text x="466" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ORDER BY</text>
  <text x="538" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> id </text>
  <text x="566" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">LIMIT</text>
  <text x="614" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve"> 10</text>
  <text x="466" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">-- 항상 인덱스 탐색 → O(log n)</text>

  <!-- Comparison table -->
  <rect x="60" y="294" width="760" height="32" rx="4" fill="#111827"/>
  <text x="200" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">방식</text>
  <text x="430" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">페이지 이동</text>
  <text x="600" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">깊은 페이지 성능</text>
  <text x="760" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">중간 페이지 점프</text>
  <rect x="60" y="326" width="760" height="28" fill="#0d1117"/>
  <text x="200" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">OFFSET</text>
  <text x="430" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">임의 이동 가능</text>
  <text x="600" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">O(n) 느려짐</text>
  <text x="760" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">가능</text>
  <rect x="60" y="354" width="760" height="28" fill="#111827"/>
  <text x="200" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">커서 기반</text>
  <text x="430" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">순차 이동만</text>
  <text x="600" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">O(log n) 일정</text>
  <text x="760" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" xml:space="preserve">불가</text>

  <!-- Footer -->
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle" xml:space="preserve">PALDYN — SQL 완전 정복</text>
</svg>
