<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro Platform vs Nexacro N — 핵심 차이점</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">마이그레이션 결정을 위한 항목별 비교</text>

  <!--
    3-column layout:
    Category col: x=60,  w=130, right=190
    Gap: 20px
    Platform col: x=210, w=270, right=480
    Gap: 80px  (center x=520)
    N col:        x=560, w=270, right=830
    Right margin: 880-830=50 (≥40 ✓)
    Left margin:  60 ✓

    "vs" label at x=520 center of gap (480→560=80px gap) ✓ ≥60px
  -->

  <!-- Column Headers -->
  <rect x="210" y="88" width="270" height="30" rx="4" fill="#13101a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="345" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">Nexacro Platform</text>

  <!-- vs label (center of gap x=480..560 = 520) -->
  <!-- Mask background so row lines don't show through label -->
  <rect x="490" y="88" width="60" height="30" fill="#0a0a0a"/>
  <text x="520" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#555">vs</text>

  <rect x="560" y="88" width="270" height="30" rx="4" fill="#0f1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="695" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">Nexacro N (V24)</text>

  <!--
    Rows: 8 items, row height=38px
    y start=126
    Row tops: 126, 164, 202, 240, 278, 316, 354, 392
    Row bottoms: 164, 202, 240, 278, 316, 354, 392, 430
    Text y = row_top + 24 (vertically centered in 38px)
  -->

  <!-- Alternating row backgrounds (even rows darker) -->
  <rect x="60" y="126" width="770" height="38" rx="0" fill="#0d0d0d"/>
  <rect x="60" y="164" width="770" height="38" fill="#111"/>
  <rect x="60" y="202" width="770" height="38" fill="#0d0d0d"/>
  <rect x="60" y="240" width="770" height="38" fill="#111"/>
  <rect x="60" y="278" width="770" height="38" fill="#0d0d0d"/>
  <rect x="60" y="316" width="770" height="38" fill="#111"/>
  <rect x="60" y="354" width="770" height="38" fill="#0d0d0d"/>
  <rect x="60" y="392" width="770" height="38" fill="#111"/>

  <!-- Vertical dividers -->
  <line x1="190" y1="118" x2="190" y2="430" stroke="#222" stroke-width="1"/>
  <line x1="480" y1="118" x2="480" y2="430" stroke="#222" stroke-width="1"/>
  <line x1="560" y1="118" x2="560" y2="430" stroke="#222" stroke-width="1"/>

  <!-- Top border -->
  <line x1="60" y1="126" x2="830" y2="126" stroke="#222" stroke-width="1"/>

  <!-- Row 1: 런타임 방식 (y=126, text y=150) -->
  <text x="75" y="150" font-size="12" font-weight="600" fill="#888">런타임 방식</text>
  <text x="220" y="150" font-size="11" fill="#aaa">HTML5 전환기 런타임</text>
  <text x="570" y="150" font-size="11" fill="#7ec8e3">순수 HTML5 · CSS3</text>

  <!-- Row 2: 개발 언어 (y=164) -->
  <text x="75" y="188" font-size="12" font-weight="600" fill="#888">개발 언어</text>
  <text x="220" y="188" font-size="11" fill="#aaa">JavaScript ES5</text>
  <text x="570" y="188" font-size="11" fill="#7ec8e3">ES6+ · const · let · Arrow</text>

  <!-- Row 3: TypeScript 지원 (y=202) -->
  <text x="75" y="226" font-size="12" font-weight="600" fill="#888">TypeScript</text>
  <text x="220" y="226" font-size="11" fill="#e05555">✗  미지원</text>
  <text x="570" y="226" font-size="11" fill="#55c555">✓  네이티브 지원 (V24)</text>

  <!-- Row 4: IE 지원 (y=240) -->
  <text x="75" y="264" font-size="12" font-weight="600" fill="#888">IE 브라우저</text>
  <text x="220" y="264" font-size="11" fill="#e8b84b">△  IE11 지원 (레거시)</text>
  <text x="570" y="264" font-size="11" fill="#55c555">✓  IE 종료 · 모던만</text>

  <!-- Row 5: 모바일 (y=278) -->
  <text x="75" y="302" font-size="12" font-weight="600" fill="#888">모바일 대응</text>
  <text x="220" y="302" font-size="11" fill="#e8b84b">△  제한적 지원</text>
  <text x="570" y="302" font-size="11" fill="#55c555">✓  반응형 레이아웃</text>

  <!-- Row 6: IDE (y=316) -->
  <text x="75" y="340" font-size="12" font-weight="600" fill="#888">개발 IDE</text>
  <text x="220" y="340" font-size="11" fill="#aaa">Studio Platform</text>
  <text x="570" y="340" font-size="11" fill="#7ec8e3">Studio N (자동완성↑)</text>

  <!-- Row 7: 성능 (y=354) -->
  <text x="75" y="378" font-size="12" font-weight="600" fill="#888">렌더링 성능</text>
  <text x="220" y="378" font-size="11" fill="#aaa">기준 수준</text>
  <text x="570" y="378" font-size="11" fill="#55c555">✓  렌더링 최적화</text>

  <!-- Row 8: 마이그레이션 (y=392) -->
  <text x="75" y="416" font-size="12" font-weight="600" fill="#888">API 호환성</text>
  <text x="220" y="416" font-size="11" fill="#aaa">기준 (마이그레이션 출발점)</text>
  <text x="570" y="416" font-size="11" fill="#e8b84b">△  대부분 호환 · 일부 수정</text>

  <!-- Bottom border -->
  <line x1="60" y1="430" x2="830" y2="430" stroke="#222" stroke-width="1"/>

  <!-- Outer border for the whole table -->
  <rect x="60" y="88" width="770" height="342" rx="6" fill="none" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Footer y=460, total=500, margin=40 ✓ -->
  <text x="440" y="460" text-anchor="middle" font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈 #2</text>
</svg>
