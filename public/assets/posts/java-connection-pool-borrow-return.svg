<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="cbArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="crArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">빌려주고 돌려받기 — 풀의 동작</text>

  <!-- pool box -->
  <rect x="330" y="92" width="220" height="220" fill="#101622" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="350" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">커넥션 풀</text>
  <rect x="350" y="138" width="180" height="36" fill="#0e1a0e" stroke="#55c555" stroke-width="1" rx="6"/>
  <text x="366" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">conn #1  idle</text>
  <rect x="350" y="182" width="180" height="36" fill="#1a1206" stroke="#e0a555" stroke-width="1" rx="6"/>
  <text x="366" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a555">conn #2  active</text>
  <rect x="350" y="226" width="180" height="36" fill="#0e1a0e" stroke="#55c555" stroke-width="1" rx="6"/>
  <text x="366" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">conn #3  idle</text>
  <text x="350" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">maxPoolSize 만큼 한정</text>

  <!-- app left -->
  <rect x="60" y="150" width="180" height="100" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">요청 스레드</text>
  <text x="80" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">getConnection()</text>

  <!-- borrow arrow -->
  <line x1="240" y1="178" x2="330" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cbArr)"/>
  <text x="245" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">빌림 (borrow)</text>

  <!-- return arrow -->
  <line x1="330" y1="224" x2="240" y2="224" stroke="#55c555" stroke-width="2" marker-end="url(#crArr)"/>
  <text x="245" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">close() = 반납 (return)</text>

  <!-- exhausted note -->
  <rect x="600" y="150" width="220" height="100" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5" rx="8"/>
  <text x="620" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">풀 고갈 시</text>
  <text x="620" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빈 연결 없으면 대기</text>
  <text x="620" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">timeout 초과 시 예외</text>

  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">반납을 빠뜨리면(누수) 풀이 고갈되어 모든 요청이 멈춘다 — try-with-resources 필수.</text>
</svg>
