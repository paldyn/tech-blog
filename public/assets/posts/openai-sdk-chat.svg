<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OpenAI SDK: Chat Completions 흐름</text>

  <!-- 클라이언트 생성 박스 -->
  <rect x="30" y="70" width="180" height="60" rx="8" fill="#0a1020" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="120" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">OpenAI 클라이언트</text>
  <text x="120" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">openai.OpenAI(api_key=...)</text>

  <!-- → -->
  <line x1="210" y1="100" x2="270" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 메시지 구성 박스 -->
  <rect x="270" y="70" width="200" height="60" rx="8" fill="#0a1020" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="370" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">messages 배열 구성</text>
  <text x="370" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">system / user / assistant</text>
  <text x="370" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">role + content 딕셔너리</text>

  <!-- → -->
  <line x1="470" y1="100" x2="530" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- API 호출 박스 -->
  <rect x="530" y="70" width="200" height="60" rx="8" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="630" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">chat.completions.create()</text>
  <text x="630" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">model, messages, temperature</text>
  <text x="630" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">max_tokens, stream=True/False</text>

  <!-- → 응답 -->
  <line x1="730" y1="100" x2="800" y2="100" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- 응답 박스 -->
  <rect x="800" y="70" width="52" height="60" rx="8" fill="#1a0f0a" stroke="#6e5a3a" stroke-width="1.5"/>
  <text x="826" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#ce9178" text-anchor="middle">응답</text>
  <text x="826" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">.choices</text>
  <text x="826" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[0]</text>

  <!-- 모델 선택 섹션 -->
  <text x="60" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">모델 선택 가이드</text>

  <rect x="30" y="172" width="200" height="70" rx="8" fill="#0a1020" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="130" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">gpt-4o</text>
  <text x="130" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">고성능 · 멀티모달</text>
  <text x="130" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비전 + 텍스트 통합</text>

  <rect x="250" y="172" width="200" height="70" rx="8" fill="#0a1020" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="350" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">gpt-4o-mini</text>
  <text x="350" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">경량 · 저비용</text>
  <text x="350" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빠른 응답, 대량 처리</text>

  <rect x="470" y="172" width="200" height="70" rx="8" fill="#0a1020" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="570" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">o1 / o3-mini</text>
  <text x="570" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">추론 특화 모델</text>
  <text x="570" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수학 · 코드 · 논리 문제</text>

  <rect x="690" y="172" width="160" height="70" rx="8" fill="#0a1020" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="770" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">text-embedding-3</text>
  <text x="770" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임베딩 전용</text>
  <text x="770" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">small / large 선택</text>

  <!-- 코드 블록: 기본 Chat 예시 -->
  <rect x="30" y="262" width="820" height="256" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="50" y="283" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"
        ># OpenAI SDK: 기본 Chat Completions 예시</text>

  <text x="50" y="303" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> openai </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> OpenAI</tspan>
  </text>

  <text x="50" y="323" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">client = OpenAI(api_key=</tspan><tspan fill="#ce9178">"sk-..."</tspan><tspan fill="#ffffff">)</tspan>
  </text>

  <text x="50" y="343" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">response = client.chat.completions.create(</tspan>
  </text>

  <text x="50" y="363" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    model=</tspan><tspan fill="#ce9178">"gpt-4o"</tspan><tspan fill="#ffffff">,</tspan>
  </text>

  <text x="50" y="383" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    messages=[</tspan>
  </text>

  <text x="50" y="403" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        {</tspan><tspan fill="#ce9178">"role"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"system"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"content"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"당신은 친절한 어시스턴트입니다."</tspan><tspan fill="#ffffff">},</tspan>
  </text>

  <text x="50" y="423" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        {</tspan><tspan fill="#ce9178">"role"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"user"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"content"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"파이썬이란 무엇인가요?"</tspan><tspan fill="#ffffff">},</tspan>
  </text>

  <text x="50" y="443" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    ], temperature=</tspan><tspan fill="#b5cea8">0.7</tspan><tspan fill="#ffffff">, max_tokens=</tspan><tspan fill="#b5cea8">500</tspan>
  </text>

  <text x="50" y="463" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">)</tspan>
  </text>

  <text x="50" y="483" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(response.choices[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">].message.content)</tspan>
  </text>

  <text x="50" y="503" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    <tspan># 사용량: response.usage.total_tokens</tspan>
  </text>

</svg>
