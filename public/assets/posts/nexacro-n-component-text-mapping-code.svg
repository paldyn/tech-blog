<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">텍스트 ID 활용 패턴</text>

  <!-- Static text ID -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">1. XFDL 컴포넌트 정적 바인딩</text>

  <rect x="60" y="94" width="360" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="78" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&lt;!-- $접두사로 텍스트 ID 지정 --&gt;</text>
  <text x="78" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">&lt;Button</tspan>
    <tspan fill="#ffffff"> text=</tspan>
    <tspan fill="#ce9178">"$SAVE"</tspan>
    <tspan fill="#7ec8e3" font-weight="600">/&gt;</tspan>
  </text>
  <text x="78" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">&lt;Static</tspan>
    <tspan fill="#ffffff"> text=</tspan>
    <tspan fill="#ce9178">"$LBL_USER_NM"</tspan>
    <tspan fill="#7ec8e3" font-weight="600">/&gt;</tspan>
  </text>
  <text x="78" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">&lt;Tab</tspan>
    <tspan fill="#ffffff"> tabId=</tspan>
    <tspan fill="#ce9178">"tab1"</tspan>
    <tspan fill="#ffffff"> text=</tspan>
    <tspan fill="#ce9178">"$TAB_BASIC"</tspan>
    <tspan fill="#7ec8e3" font-weight="600">/&gt;</tspan>
  </text>
  <text x="78" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">&lt;!-- Grid Cell도 동일 --&gt;</tspan>
  </text>

  <!-- Script gfn_getText -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">2. 스크립트 동적 조회</text>

  <rect x="440" y="94" width="400" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="458" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// nexacro.getLanguageText API</text>
  <text x="458" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> gfn_getText(id) {</tspan>
  </text>
  <text x="458" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> nexacro</tspan>
  </text>
  <text x="458" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    .getLanguageText(id);</tspan>
  </text>
  <text x="458" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Dynamic set text -->
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">3. 런타임 텍스트 동적 설정</text>

  <rect x="60" y="244" width="360" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="78" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 조건에 따라 텍스트 변경</text>
  <text x="78" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> fn_setStatus(bNew) {</tspan>
  </text>
  <text x="78" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">var</tspan>
    <tspan fill="#ffffff"> id = bNew ? </tspan>
    <tspan fill="#ce9178">"NEW"</tspan>
    <tspan fill="#ffffff"> : </tspan>
    <tspan fill="#ce9178">"EDIT"</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="78" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">this</tspan>
    <tspan fill="#ffffff">.lbl_status.set_text(</tspan>
  </text>
  <text x="78" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    gfn_getText(id)</tspan>
  </text>
  <text x="78" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  );</tspan>
  </text>

  <!-- Combo code mapping -->
  <text x="460" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">4. Combo 코드 매핑</text>

  <rect x="440" y="244" width="400" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="458" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Combo Dataset 언어별 값 설정</text>
  <text x="458" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">this</tspan>
    <tspan fill="#ffffff">.ds_gender.clearData();</tspan>
  </text>
  <text x="458" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">this</tspan>
    <tspan fill="#ffffff">.ds_gender.addRow();</tspan>
  </text>
  <text x="458" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">this</tspan>
    <tspan fill="#ffffff">.ds_gender.setColumn(</tspan>
  </text>
  <text x="458" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  0, </tspan>
    <tspan fill="#ce9178">"CDNM"</tspan>
    <tspan fill="#ffffff">, gfn_getText(</tspan>
    <tspan fill="#ce9178">"MALE"</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="458" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan>
  </text>
</svg>
