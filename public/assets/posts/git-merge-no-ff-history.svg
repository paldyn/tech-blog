<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">FF vs --no-ff 히스토리 비교</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">포인터 이동 vs 머지 커밋 생성</text>

  <!-- Left: FF Merge graph -->
  <text x="200" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Fast-Forward</text>

  <!-- C1 -->
  <circle cx="80" cy="200" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="80" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C1</text>
  <!-- C2 -->
  <circle cx="160" cy="200" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C2</text>
  <!-- C3 -->
  <circle cx="240" cy="200" r="22" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C3</text>
  <!-- C4 -->
  <circle cx="320" cy="200" r="22" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="320" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C4</text>

  <!-- FF arrows -->
  <line x1="102" y1="200" x2="136" y2="200" stroke="#555" stroke-width="2"/>
  <polygon points="136,195 146,200 136,205" fill="#555"/>
  <line x1="182" y1="200" x2="216" y2="200" stroke="#555" stroke-width="2"/>
  <polygon points="216,195 226,200 216,205" fill="#555"/>
  <line x1="262" y1="200" x2="296" y2="200" stroke="#555" stroke-width="2"/>
  <polygon points="296,195 306,200 296,205" fill="#555"/>

  <!-- main label -->
  <rect x="288" y="234" width="64" height="24" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="320" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">main</text>
  <line x1="320" y1="234" x2="320" y2="222" stroke="#7777cc" stroke-width="1.5"/>

  <text x="200" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">직선 — 브랜치 흔적 없음</text>

  <!-- Right: –no-ff graph -->
  <text x="660" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">--no-ff</text>

  <!-- C1 -->
  <circle cx="480" cy="200" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="480" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C1</text>
  <!-- C2 -->
  <circle cx="560" cy="200" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="560" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C2</text>

  <!-- Feature branch commits (upper path) -->
  <circle cx="620" cy="140" r="22" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="620" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C3</text>
  <circle cx="700" cy="140" r="22" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="700" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C4</text>

  <!-- Merge commit -->
  <circle cx="800" cy="200" r="26" fill="#1a1a2a" stroke="#e8e8e8" stroke-width="2.5"/>
  <text x="800" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">M5</text>
  <text x="800" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">merge</text>

  <!-- no-ff arrows -->
  <line x1="502" y1="200" x2="536" y2="200" stroke="#555" stroke-width="2"/>
  <polygon points="536,195 546,200 536,205" fill="#555"/>

  <!-- split to feature -->
  <line x1="576" y1="188" x2="598" y2="152" stroke="#55c555" stroke-width="2"/>
  <polygon points="595,145 602,154 608,148" fill="#55c555"/>

  <!-- feature commits arrows -->
  <line x1="642" y1="140" x2="676" y2="140" stroke="#55c555" stroke-width="2"/>
  <polygon points="676,135 686,140 676,145" fill="#55c555"/>

  <!-- merge from feature -->
  <line x1="722" y1="152" x2="774" y2="186" stroke="#55c555" stroke-width="2"/>
  <polygon points="768,182 778,185 772,194" fill="#55c555"/>

  <!-- straight from C2 to merge -->
  <line x1="582" y1="200" x2="772" y2="200" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="772,195 782,200 772,205" fill="#7ec8e3"/>

  <!-- main label -->
  <rect x="773" y="238" width="54" height="24" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="800" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">main</text>
  <line x1="800" y1="238" x2="800" y2="226" stroke="#7777cc" stroke-width="1.5"/>

  <text x="660" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">갈래 — 브랜치 작업 흔적 보존</text>

  <!-- Bottom info -->
  <line x1="60" y1="310" x2="820" y2="310" stroke="#222" stroke-width="1"/>
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">git merge --no-ff feature -m "Merge feature: 로그인 추가"</text>
  <text x="440" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PR/MR 단위 작업을 히스토리에 명확히 기록할 때 사용</text>
  <text x="440" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">git revert M5 로 기능 단위 롤백도 가능</text>
</svg>
