<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">String 불변성(Immutability) 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">한번 생성된 String 객체의 char[] 값은 절대 바뀌지 않는다</text>

  <!-- Left panel: code block -->
  <rect x="50" y="96" width="360" height="210" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="66" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 문자열 "재할당"의 진실</text>
  <text x="66" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">String</tspan><tspan fill="#ffffff"> s = </tspan><tspan fill="#ce9178">"Hello"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">s = s + </tspan><tspan fill="#ce9178">" World"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// s는 새 객체를 가리킴</text>
  <text x="66" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 기존 "Hello" 객체는 그대로</text>
  <text x="66" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">String</tspan><tspan fill="#ffffff"> a = </tspan><tspan fill="#ce9178">"Java"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">String</tspan><tspan fill="#ffffff"> b = a.toUpperCase();</tspan></text>
  <text x="66" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// a == "Java" (변하지 않음)</text>
  <text x="66" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// b == "JAVA" (새 객체)</text>

  <!-- Right panel: heap diagram -->
  <!-- Stack -->
  <rect x="470" y="96" width="120" height="180" rx="6" fill="#111827" stroke="#2a3a55"/>
  <text x="530" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Stack</text>
  <!-- variable s -->
  <rect x="486" y="128" width="88" height="32" rx="4" fill="#1a2233" stroke="#2a3a55"/>
  <text x="530" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">s →</text>
  <!-- variable a -->
  <rect x="486" y="172" width="88" height="32" rx="4" fill="#1a2233" stroke="#2a3a55"/>
  <text x="530" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">a →</text>
  <!-- variable b -->
  <rect x="486" y="216" width="88" height="32" rx="4" fill="#1a2233" stroke="#2a3a55"/>
  <text x="530" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">b →</text>

  <!-- Heap -->
  <rect x="660" y="96" width="170" height="230" rx="6" fill="#111827" stroke="#2a3a55"/>
  <text x="745" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Heap</text>

  <!-- "Hello" object (strikethrough-ish, faded) -->
  <rect x="676" y="126" width="138" height="38" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="745" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#555" text-anchor="middle">"Hello"</text>
  <text x="745" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">GC 대상</text>

  <!-- "Hello World" object -->
  <rect x="676" y="174" width="138" height="38" rx="4" fill="#1a2a1a" stroke="#55c555"/>
  <text x="745" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">"Hello World"</text>
  <text x="745" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">새 객체</text>

  <!-- "Java" object -->
  <rect x="676" y="222" width="138" height="38" rx="4" fill="#1a2233" stroke="#7ec8e3"/>
  <text x="745" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">"Java"</text>
  <text x="745" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">String Pool</text>

  <!-- "JAVA" object -->
  <rect x="676" y="270" width="138" height="38" rx="4" fill="#1a2233" stroke="#7777cc"/>
  <text x="745" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">"JAVA"</text>
  <text x="745" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">새 객체</text>

  <!-- Arrows: s → "Hello World" -->
  <line x1="574" y1="144" x2="674" y2="193" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="674,193 663,187 666,198" fill="#55c555"/>

  <!-- Arrow: a → "Java" -->
  <line x1="574" y1="188" x2="674" y2="241" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="674,241 663,235 666,246" fill="#7ec8e3"/>

  <!-- Arrow: b → "JAVA" -->
  <line x1="574" y1="232" x2="674" y2="285" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="674,285 663,279 666,290" fill="#7777cc"/>

  <!-- Bottom: key points -->
  <rect x="50" y="328" width="780" height="140" rx="8" fill="#0f1520" stroke="#3a4a6e"/>
  <text x="76" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">불변성이 주는 이점</text>

  <!-- Point 1 -->
  <circle cx="92" cy="382" r="6" fill="#55c555"/>
  <text x="108" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">스레드 안전 — 여러 스레드가 동시에 읽어도 경쟁 조건 없음</text>

  <!-- Point 2 -->
  <circle cx="92" cy="410" r="6" fill="#7ec8e3"/>
  <text x="108" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">String Pool 공유 — 동일 리터럴은 하나의 객체만 힙에 존재</text>

  <!-- Point 3 -->
  <circle cx="92" cy="438" r="6" fill="#7777cc"/>
  <text x="108" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">해시코드 캐싱 — hashCode()를 최초 1회만 계산, HashMap 키로 이상적</text>

  <!-- Point 4 -->
  <circle cx="92" cy="454" r="6" fill="#e05555"/>
  <text x="108" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">주의 — 루프 내 + 연결은 매번 새 객체 → StringBuilder 사용 권장</text>
</svg>
