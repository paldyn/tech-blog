  <text x="341" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">file-max</text>
  <text x="341" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">file-nr</text>
  <text x="341" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">inotify/max_user_watches</text>
  <text x="341" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">aio-max-nr</text>
  <text x="341" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
