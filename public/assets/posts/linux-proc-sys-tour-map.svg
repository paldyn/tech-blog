  <text x="606" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ipv4/ip_local_port_range</text>
  <text x="606" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
