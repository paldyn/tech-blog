  <text x="606" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ipv4/tcp_syncookies</text>
  <text x="606" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ipv4/tcp_tw_reuse</text>
  <text x="606" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ipv4/tcp_fin_timeout</text>
  <text x="606" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
