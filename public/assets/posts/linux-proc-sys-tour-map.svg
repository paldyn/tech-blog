  <rect x="590" y="90" width="230" height="400" rx="8" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="705" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
