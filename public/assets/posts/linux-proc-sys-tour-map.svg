  <text x="606" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">netfilter/nf_conntrack_*</text>
  <text x="606" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">TCP/IP 스택 전반</text>
</svg>
