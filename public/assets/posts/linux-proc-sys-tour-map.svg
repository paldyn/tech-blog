  <text x="76" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pid_max</text>
  <text x="76" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">panic</text>
  <text x="76" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">perf_event_paranoid</text>
  <text x="76" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
