<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Web Share API 코드 패턴</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">URL·텍스트 공유 · 파일 공유</text>

  <!-- Left: Basic share -->
  <text x="60" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">URL / 텍스트 공유</text>
  <rect x="60" y="110" width="370" height="270" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">async function</tspan> share(post) {</text>
  <text x="76" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">if</tspan> (!navigator.share) {</text>
  <text x="76" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">    // 폴백: 클립보드 복사</text>
  <text x="76" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">await</tspan> navigator.clipboard</text>
  <text x="76" y="210" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      .writeText(post.url);</text>
  <text x="76" y="228" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">return</tspan>;</text>
  <text x="76" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  }</text>
  <text x="76" y="264" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">try</tspan> {</text>
  <text x="76" y="282" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">await</tspan> navigator.share({</text>
  <text x="76" y="300" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      title: post.title,</text>
  <text x="76" y="318" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      text: post.summary,</text>
  <text x="76" y="336" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      url: post.url</text>
  <text x="76" y="354" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    });</text>
  <text x="76" y="372" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  } <tspan fill="#7ec8e3">catch</tspan> (e) {</text>

  <!-- Right: File share + canShare -->
  <text x="460" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">파일 공유 + canShare() 검사</text>
  <rect x="460" y="110" width="370" height="270" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">async function</tspan> shareImage(img) {</text>
  <text x="476" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">const</tspan> blob = <tspan fill="#7ec8e3">await</tspan></text>
  <text x="476" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    (await fetch(img.url)).blob();</text>
  <text x="476" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">const</tspan> file = <tspan fill="#7ec8e3">new</tspan> File(</text>
  <text x="476" y="210" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    [blob], <tspan fill="#ce9178">'photo.jpg'</tspan>,</text>
  <text x="476" y="228" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    { type: <tspan fill="#ce9178">'image/jpeg'</tspan> }</text>
  <text x="476" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  );</text>
  <text x="476" y="264" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">const</tspan> data = { files: [file] };</text>
  <text x="476" y="282" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">  // 파일 공유 가능 여부 확인</text>
  <text x="476" y="300" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">if</tspan> (!navigator.canShare(data)) {</text>
  <text x="476" y="318" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    showFallback();</text>
  <text x="476" y="336" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">return</tspan>;</text>
  <text x="476" y="354" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  }</text>
  <text x="476" y="372" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">await</tspan> navigator.share(data);</text>
</svg>
