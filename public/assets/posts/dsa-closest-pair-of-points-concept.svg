<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">가장 가까운 두 점 - 분할 정복 개념</text>

  <!-- Grid background -->
  <rect x="80" y="60" width="720" height="380" rx="6" fill="#080808" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="80" y1="135" x2="800" y2="135" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="80" y1="210" x2="800" y2="210" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="80" y1="285" x2="800" y2="285" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="80" y1="360" x2="800" y2="360" stroke="#1a1a1a" stroke-width="1"/>

  <line x1="200" y1="60" x2="200" y2="440" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="320" y1="60" x2="320" y2="440" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="440" y1="60" x2="440" y2="440" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="560" y1="60" x2="560" y2="440" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="680" y1="60" x2="680" y2="440" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Dividing line (median x) -->
  <line x1="440" y1="60" x2="440" y2="440" stroke="#7777cc" stroke-width="2.5"/>
  <text x="430" y="56" font-size="12" fill="#7777cc" text-anchor="end">중앙선 (x = mid)</text>

  <!-- Left half background -->
  <rect x="80" y="60" width="360" height="380" rx="0" fill="#7ec8e3" fill-opacity="0.04"/>
  <!-- Right half background -->
  <rect x="440" y="60" width="360" height="380" rx="0" fill="#55c555" fill-opacity="0.04"/>

  <!-- Half labels -->
  <text x="260" y="84" font-size="13" fill="#7ec8e3" text-anchor="middle">왼쪽 절반</text>
  <text x="620" y="84" font-size="13" fill="#55c555" text-anchor="middle">오른쪽 절반</text>

  <!-- Points - left half -->
  <!-- P1 -->
  <circle cx="150" cy="180" r="6" fill="#7ec8e3" stroke="#5ab8d8" stroke-width="1.5"/>
  <text x="158" y="175" font-size="11" fill="#888">P1</text>

  <!-- P2 -->
  <circle cx="240" cy="300" r="6" fill="#7ec8e3" stroke="#5ab8d8" stroke-width="1.5"/>
  <text x="248" y="295" font-size="11" fill="#888">P2</text>

  <!-- P3 -->
  <circle cx="310" cy="150" r="6" fill="#7ec8e3" stroke="#5ab8d8" stroke-width="1.5"/>
  <text x="318" y="145" font-size="11" fill="#888">P3</text>

  <!-- P4 -->
  <circle cx="190" cy="380" r="6" fill="#7ec8e3" stroke="#5ab8d8" stroke-width="1.5"/>
  <text x="198" y="375" font-size="11" fill="#888">P4</text>

  <!-- P5 -->
  <circle cx="350" cy="340" r="6" fill="#7ec8e3" stroke="#5ab8d8" stroke-width="1.5"/>
  <text x="358" y="335" font-size="11" fill="#888">P5</text>

  <!-- Points - right half -->
  <!-- P6 -->
  <circle cx="490" cy="190" r="6" fill="#55c555" stroke="#3aa543" stroke-width="1.5"/>
  <text x="498" y="185" font-size="11" fill="#888">P6</text>

  <!-- P7 -->
  <circle cx="580" cy="120" r="6" fill="#55c555" stroke="#3aa543" stroke-width="1.5"/>
  <text x="588" y="115" font-size="11" fill="#888">P7</text>

  <!-- P8 -->
  <circle cx="650" cy="310" r="6" fill="#55c555" stroke="#3aa543" stroke-width="1.5"/>
  <text x="658" y="305" font-size="11" fill="#888">P8</text>

  <!-- P9 -->
  <circle cx="720" cy="200" r="6" fill="#55c555" stroke="#3aa543" stroke-width="1.5"/>
  <text x="728" y="195" font-size="11" fill="#888">P9</text>

  <!-- P10 -->
  <circle cx="530" cy="370" r="6" fill="#55c555" stroke="#3aa543" stroke-width="1.5"/>
  <text x="538" y="365" font-size="11" fill="#888">P10</text>

  <!-- Closest pair highlight (P3 and P6 are close to dividing line) -->
  <!-- Draw a circle around P3 and P6 showing they're closest pair -->
  <circle cx="350" cy="340" r="8" fill="none" stroke="#e05555" stroke-width="2"/>
  <circle cx="490" cy="190" r="8" fill="none" stroke="#e05555" stroke-width="2"/>

  <!-- Actually P5 and P6 are close, let's show that -->
  <!-- Distance line between P5 and P6 -->
  <line x1="350" y1="340" x2="490" y2="190" stroke="#e05555" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Delta label -->
  <text x="430" y="280" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">&#948; = dist(P5, P6)</text>

  <!-- Delta label on dividing line -->
  <text x="440" y="460" font-size="13" fill="#7777cc" text-anchor="middle">&#948; = min(&#948;_left, &#948;_right)  →  strip 탐색으로 cross-pair 확인</text>

  <!-- Legend -->
  <rect x="80" y="452" width="300" height="28" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <circle cx="100" cy="466" r="5" fill="#7ec8e3"/>
  <text x="112" y="470" font-size="12" fill="#888">왼쪽 점</text>
  <circle cx="170" cy="466" r="5" fill="#55c555"/>
  <text x="182" y="470" font-size="12" fill="#888">오른쪽 점</text>
  <circle cx="250" cy="466" r="5" fill="#e05555"/>
  <text x="262" y="470" font-size="12" fill="#888">최근접 쌍</text>
</svg>
