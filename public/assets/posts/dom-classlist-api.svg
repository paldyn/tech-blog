<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">classList · DOMTokenList API</text>

  <!-- classList 메서드 테이블 -->
  <rect x="60" y="72" width="760" height="210" fill="#111827" rx="8" stroke="#1e2433"/>

  <!-- 헤더 -->
  <rect x="60" y="72" width="760" height="32" fill="#1a2235" rx="8"/>
  <text x="220" y="93" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">메서드 / 프로퍼티</text>
  <text x="540" y="93" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">설명</text>
  <text x="760" y="93" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">예시</text>

  <!-- 행들 -->
  <text x="100" y="121" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.add(cls, ...)</text>
  <text x="400" y="121" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">클래스 추가</text>
  <text x="660" y="121" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">add('a','b')</text>

  <text x="100" y="145" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.remove(cls, ...)</text>
  <text x="400" y="145" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">클래스 제거</text>
  <text x="660" y="145" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">remove('active')</text>

  <text x="100" y="169" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.toggle(cls, force?)</text>
  <text x="400" y="169" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">없으면 추가, 있으면 제거</text>
  <text x="660" y="169" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">toggle('open')</text>

  <text x="100" y="193" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.contains(cls)</text>
  <text x="400" y="193" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">클래스 보유 여부</text>
  <text x="660" y="193" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">→ true/false</text>

  <text x="100" y="217" fill="#7777cc" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.replace(old, new)</text>
  <text x="400" y="217" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">클래스 교체</text>
  <text x="660" y="217" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">→ true/false</text>

  <text x="100" y="241" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.item(index)</text>
  <text x="400" y="241" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">인덱스로 클래스명 접근</text>
  <text x="660" y="241" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">.item(0)</text>

  <text x="100" y="265" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.length · .value</text>
  <text x="400" y="265" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">클래스 수 / 문자열 전체</text>
  <text x="660" y="265" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">'a b c'</text>

  <!-- 코드 블록 -->
  <rect x="60" y="306" width="760" height="130" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="332" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="332" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> el = document.querySelector(</text>
  <text x="340" y="332" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'.btn'</text>
  <text x="386" y="332" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);</text>
  <text x="80" y="350" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">el.classList.add(</text>
  <text x="222" y="350" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'active'</text>
  <text x="276" y="350" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, </text>
  <text x="292" y="350" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'highlighted'</text>
  <text x="386" y="350" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);</text>
  <text x="80" y="368" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">el.classList.toggle(</text>
  <text x="236" y="368" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'open'</text>
  <text x="282" y="368" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, isOpen);  </text>
  <text x="390" y="368" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// force: true=add, false=remove</text>
  <text x="80" y="386" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">el.classList.replace(</text>
  <text x="236" y="386" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'primary'</text>
  <text x="298" y="386" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, </text>
  <text x="314" y="386" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'secondary'</text>
  <text x="388" y="386" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);</text>
  <text x="80" y="404" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 이터러블 — [...el.classList] → ['btn', 'active', 'highlighted']</text>
</svg>
