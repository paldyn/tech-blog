<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arrInfo" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrSucc" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrWarn" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="560" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">1-RTT vs 0-RTT 핸드셰이크 타이밍</text>

  <!-- ===== 1-RTT (left) ===== -->
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">1-RTT (최초 연결)</text>

  <text x="120" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Client</text>
  <text x="360" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Server</text>

  <line x1="120" y1="138" x2="120" y2="470" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="360" y1="138" x2="360" y2="470" stroke="#3a3a3a" stroke-width="1.5"/>

  <!-- msg 1 -->
  <text x="240" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Initial + CRYPTO(ClientHello)</text>
  <line x1="122" y1="180" x2="358" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>

  <!-- msg 2 -->
  <text x="240" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">CRYPTO(ServerHello) + 인증서</text>
  <line x1="358" y1="250" x2="122" y2="270" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>

  <!-- RTT bracket -->
  <text x="240" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">— 1 RTT 경과 —</text>

  <!-- msg 3 application data -->
  <text x="240" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">FINISHED + 첫 STREAM(요청)</text>
  <line x1="122" y1="364" x2="358" y2="384" stroke="#55c555" stroke-width="2" marker-end="url(#arrSucc)"/>

  <text x="240" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">응답까지: 1.5 RTT</text>
  <text x="240" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">키 합의 후 데이터 송신</text>

  <!-- ===== 0-RTT (right) ===== -->
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">0-RTT (세션 재개)</text>

  <text x="520" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Client</text>
  <text x="760" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Server</text>

  <line x1="520" y1="138" x2="520" y2="470" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="760" y1="138" x2="760" y2="470" stroke="#3a3a3a" stroke-width="1.5"/>

  <!-- msg 1: ClientHello + early data -->
  <text x="640" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">ClientHello + early data(요청)</text>
  <line x1="522" y1="180" x2="758" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arrSucc)"/>

  <!-- msg 2: response -->
  <text x="640" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">ServerHello + 응답 STREAM</text>
  <line x1="758" y1="250" x2="522" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arrSucc)"/>

  <text x="640" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">— 0 RTT: 첫 왕복에 데이터 동봉 —</text>

  <!-- replay warning box -->
  <rect x="500" y="334" width="280" height="78" rx="6" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">⚠ Replay 위험</text>
  <text x="640" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">early data는 재전송될 수 있음 →</text>
  <text x="640" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">멱등(GET) 요청에만 허용</text>

  <line x1="640" y1="412" x2="640" y2="446" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrWarn)"/>
  <text x="640" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">상태 변경 요청은 1-RTT로 강등</text>

  <!-- bottom note -->
  <text x="60" y="516" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">QUIC은 TLS 1.3을 전송에 통합해 최초 연결도 1-RTT, 재개 시 PSK로 0-RTT를 달성한다.</text>
</svg>
