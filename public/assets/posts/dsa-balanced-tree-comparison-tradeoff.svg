<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">균형 트리 트레이드오프</text>

  <!-- Y axis label -->
  <text x="68" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">검색 성능</text>
  <!-- X axis label -->
  <text x="750" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">수정(삽입/삭제) 성능</text>

  <!-- Axes -->
  <line x1="120" y1="340" x2="750" y2="340" stroke="#555" stroke-width="1.5"/>
  <line x1="120" y1="340" x2="120" y2="80" stroke="#555" stroke-width="1.5"/>

  <!-- Grid lines -->
  <line x1="120" y1="220" x2="750" y2="220" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="130" x2="750" y2="130" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="310" y1="80" x2="310" y2="340" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="560" y1="80" x2="560" y2="340" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- AVL: high search, low write -->
  <circle cx="180" cy="108" r="28" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">AVL</text>
  <text x="180" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">트리</text>
  <text x="180" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">검색↑ 쓰기↓</text>

  <!-- RB: balanced -->
  <circle cx="420" cy="175" r="28" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="420" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">R-B</text>
  <text x="420" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">트리</text>
  <text x="420" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">균형잡힌 트레이드오프</text>

  <!-- B+ tree: low search due to disk, high range -->
  <circle cx="620" cy="240" r="28" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="620" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">B+</text>
  <text x="620" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">트리</text>
  <text x="620" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">디스크 최적화</text>
  <text x="620" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">범위 검색 O(k)</text>

  <!-- Skip list -->
  <circle cx="530" cy="140" r="24" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="530" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">Skip</text>
  <text x="530" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">List</text>
  <text x="530" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">구현 간단</text>

  <!-- Treap -->
  <circle cx="270" cy="195" r="22" fill="#1a2a2a" stroke="#b5cea8" stroke-width="2"/>
  <text x="270" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">Treap</text>
  <text x="270" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">랜덤화</text>

  <!-- Axis ticks -->
  <text x="115" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="end">낮음</text>
  <text x="115" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="end">중간</text>
  <text x="115" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="end">높음</text>
  <text x="125" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">낮음</text>
  <text x="295" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">중간</text>
  <text x="548" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">높음</text>
</svg>
