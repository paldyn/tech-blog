<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">패키지 매니저 주요 명령어</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">npm / yarn / pnpm 대응 명령어 비교</text>

  <!-- Code block -->
  <rect x="60" y="86" width="760" height="284" rx="6" fill="#070b14" stroke="#1e2433"/>

  <!-- Header row -->
  <text x="76" y="112" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 설치</text>
  <text x="76" y="130" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">npm install          </text>
  <text x="280" y="130" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">yarn               </text>
  <text x="460" y="130" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">pnpm install</text>

  <text x="76" y="166" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 패키지 추가</text>
  <text x="76" y="184" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">npm i react          </text>
  <text x="280" y="184" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">yarn add react     </text>
  <text x="460" y="184" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">pnpm add react</text>

  <text x="76" y="220" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 개발 의존성 추가</text>
  <text x="76" y="238" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">npm i -D vitest      </text>
  <text x="280" y="238" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">yarn add -D vitest </text>
  <text x="460" y="238" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">pnpm add -D vitest</text>

  <text x="76" y="274" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 스크립트 실행</text>
  <text x="76" y="292" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">npm run build        </text>
  <text x="280" y="292" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">yarn build         </text>
  <text x="460" y="292" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">pnpm build</text>

  <text x="76" y="328" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 임시 실행 (설치 없이)</text>
  <text x="76" y="346" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">npx create-vite      </text>
  <text x="280" y="346" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">yarn dlx create-vite</text>
  <text x="460" y="346" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">pnpm dlx create-vite</text>

  <!-- Bottom note -->
  <text x="440" y="385" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">corepack enable → Node.js 내장 corepack으로 yarn/pnpm 버전 관리</text>
</svg>
