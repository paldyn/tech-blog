<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript vs JavaScript 핵심 비교</text>
  <!-- Header row -->
  <rect x="60" y="65" width="220" height="40" rx="6" fill="#1a1a1a"/>
  <rect x="290" y="65" width="260" height="40" rx="6" fill="#1a1a0a" stroke="#f0db4f" stroke-width="1"/>
  <rect x="560" y="65" width="260" height="40" rx="6" fill="#0a0a1a" stroke="#3178c6" stroke-width="1"/>
  <text x="170" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">항목</text>
  <text x="420" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#f0db4f">JavaScript</text>
  <text x="690" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#3178c6">TypeScript</text>
  <!-- Row 1 -->
  <rect x="60" y="115" width="220" height="48" rx="4" fill="#111"/>
  <rect x="290" y="115" width="260" height="48" rx="4" fill="#0d0d00"/>
  <rect x="560" y="115" width="260" height="48" rx="4" fill="#00000d"/>
  <text x="170" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">타입 시스템</text>
  <text x="420" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">동적 타이핑 (런타임)</text>
  <text x="690" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">정적 타이핑 (컴파일 타임)</text>
  <!-- Row 2 -->
  <rect x="60" y="173" width="220" height="48" rx="4" fill="#111"/>
  <rect x="290" y="173" width="260" height="48" rx="4" fill="#0d0d00"/>
  <rect x="560" y="173" width="260" height="48" rx="4" fill="#00000d"/>
  <text x="170" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">오류 발견 시점</text>
  <text x="420" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">실행 중 (런타임)</text>
  <text x="690" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">컴파일 단계</text>
  <!-- Row 3 -->
  <rect x="60" y="231" width="220" height="48" rx="4" fill="#111"/>
  <rect x="290" y="231" width="260" height="48" rx="4" fill="#0d0d00"/>
  <rect x="560" y="231" width="260" height="48" rx="4" fill="#00000d"/>
  <text x="170" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">브라우저/Node 직접 실행</text>
  <text x="420" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">가능</text>
  <text x="690" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">tsc 컴파일 후 JS로 실행</text>
  <!-- Row 4 -->
  <rect x="60" y="289" width="220" height="48" rx="4" fill="#111"/>
  <rect x="290" y="289" width="260" height="48" rx="4" fill="#0d0d00"/>
  <rect x="560" y="289" width="260" height="48" rx="4" fill="#00000d"/>
  <text x="170" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">학습 곡선</text>
  <text x="420" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">낮음</text>
  <text x="690" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">JS 지식 + 타입 시스템 추가</text>
  <!-- Row 5 -->
  <rect x="60" y="347" width="220" height="48" rx="4" fill="#111"/>
  <rect x="290" y="347" width="260" height="48" rx="4" fill="#0d0d00"/>
  <rect x="560" y="347" width="260" height="48" rx="4" fill="#00000d"/>
  <text x="170" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">IDE 지원</text>
  <text x="420" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기본 수준</text>
  <text x="690" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">정밀한 자동완성 · 타입 추론</text>
  <!-- Row 6 -->
  <rect x="60" y="405" width="220" height="48" rx="4" fill="#111"/>
  <rect x="290" y="405" width="260" height="48" rx="4" fill="#0d0d00"/>
  <rect x="560" y="405" width="260" height="48" rx="4" fill="#00000d"/>
  <text x="170" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">대규모 협업</text>
  <text x="420" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">어려움</text>
  <text x="690" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">계약 기반 협업 가능</text>
  <text x="440" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">TypeScript는 JS의 상위집합 — 언제든 JS로 컴파일됩니다</text>
</svg>
