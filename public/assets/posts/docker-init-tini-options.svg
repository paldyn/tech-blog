<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">init 프로세스 옵션 비교</text>

  <!-- tini -->
  <rect x="60" y="68" width="230" height="110" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="175" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">tini</text>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 경량 (~20KB)</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 좀비 수거 + 시그널 전파</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Alpine: apk add tini</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Debian: apt-get install tini</text>

  <!-- docker —init -->
  <rect x="320" y="68" width="230" height="110" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="435" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">docker run --init</text>
  <text x="340" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ Dockerfile 수정 불필요</text>
  <text x="340" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 내장 tini 사용</text>
  <text x="340" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 이미지에 포함 안 됨</text>
  <text x="340" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">런타임 플래그 의존</text>

  <!-- dumb-init -->
  <rect x="580" y="68" width="240" height="110" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="700" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">dumb-init</text>
  <text x="600" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ Yelp 제작 경량 init</text>
  <text x="600" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 프로세스 그룹 시그널</text>
  <text x="600" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">pip install dumb-init</text>
  <text x="600" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Python 이미지에서 자주 사용</text>

  <!-- Code comparison -->
  <rect x="60" y="196" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">ENTRYPOINT</tspan> [<tspan fill="#ce9178">"/sbin/tini"</tspan>, <tspan fill="#ce9178">"--"</tspan>]          <tspan fill="#9aa4b8"># tini (권장)</tspan></text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">ENTRYPOINT</tspan> [<tspan fill="#ce9178">"/usr/bin/dumb-init"</tspan>, <tspan fill="#ce9178">"--"</tspan>]  <tspan fill="#9aa4b8"># dumb-init</tspan></text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> run --init myimage              <tspan fill="#9aa4b8"># 런타임 플래그</tspan></text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">init</tspan>: <tspan fill="#b5cea8">true</tspan>  <tspan fill="#9aa4b8"># Compose service 항목</tspan></text>
</svg>
