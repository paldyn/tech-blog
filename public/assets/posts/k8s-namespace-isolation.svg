<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">네임스페이스 격리</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">하나의 클러스터를 논리적으로 분리하는 가상 경계</text>

  <!-- Cluster box -->
  <rect x="40" y="85" width="800" height="370" rx="12" fill="#0d0d12" stroke="#444" stroke-width="1.5"/>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#555">클러스터 (단일 물리/가상 인프라)</text>

  <!-- Namespace: production -->
  <rect x="60" y="120" width="350" height="320" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="235" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">production</text>

  <!-- Resources in production -->
  <rect x="78" y="156" width="148" height="48" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="152" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Deployment</text>
  <text x="152" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">myapp ×3</text>

  <rect x="236" y="156" width="154" height="48" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="313" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Service</text>
  <text x="313" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">myapp-svc</text>

  <rect x="78" y="215" width="148" height="48" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="152" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Secret</text>
  <text x="152" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">db-creds</text>

  <rect x="236" y="215" width="154" height="48" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="313" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">ConfigMap</text>
  <text x="313" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">app-config</text>

  <!-- ResourceQuota box -->
  <rect x="78" y="274" width="312" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># ResourceQuota</text>
  <text x="94" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">hard</text>
  <text x="94" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  pods: "50"</text>
  <text x="94" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  cpu: "10"</text>
  <text x="94" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  memory: 20Gi</text>
  <text x="94" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  secrets: "10"</text>

  <!-- Namespace: staging -->
  <rect x="430" y="120" width="390" height="320" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="625" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">staging</text>

  <!-- Resources in staging -->
  <rect x="448" y="156" width="148" height="48" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="522" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Deployment</text>
  <text x="522" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">myapp ×1</text>

  <rect x="606" y="156" width="194" height="48" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="703" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Service</text>
  <text x="703" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">myapp-svc (같은 이름 가능)</text>

  <!-- Cross-namespace note -->
  <rect x="448" y="215" width="352" height="215" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="464" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 네임스페이스 간 접근</text>
  <text x="464" y="255" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># (같은 클러스터 내 가능)</text>
  <text x="464" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">svc.namespace.svc.cluster.local</text>
  <text x="464" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 예:</text>
  <text x="464" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">db.production.svc.cluster.local</text>
  <text x="464" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># kubectl context 전환</text>
  <text x="464" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="528" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> config set-context \</text>
  <text x="464" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  --namespace=production</text>
  <text x="464" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  --current</text>
</svg>
