<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">희소 테이블 — RMQ O(1) 쿼리</text>

  <!-- Original array -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">원본 배열 a[]</text>

  <!-- Array cells -->
  <rect x="60" y="88" width="90" height="40" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="105" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">a[0]=2</text>

  <rect x="158" y="88" width="90" height="40" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="203" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">a[1]=4</text>

  <rect x="256" y="88" width="90" height="40" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="301" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">a[2]=3</text>

  <rect x="354" y="88" width="90" height="40" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="399" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">a[3]=1</text>

  <rect x="452" y="88" width="90" height="40" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="497" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">a[4]=6</text>

  <rect x="550" y="88" width="90" height="40" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="595" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">a[5]=5</text>

  <rect x="648" y="88" width="90" height="40" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="693" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">a[6]=7</text>

  <rect x="746" y="88" width="90" height="40" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="791" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">a[7]=2</text>

  <!-- Sparse table: each row = power of 2 length -->
  <text x="60" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">sparse[j][i] = min(a[i..i+2ʲ-1])</text>

  <!-- Row labels -->
  <text x="20" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">j=0</text>
  <text x="20" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">j=1</text>
  <text x="20" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">j=2</text>
  <text x="20" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">j=3</text>

  <!-- Row 0: window=1, each element itself -->
  <rect x="60" y="176" width="90" height="32" rx="3" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="105" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">2</text>
  <rect x="158" y="176" width="90" height="32" rx="3" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="203" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">4</text>
  <rect x="256" y="176" width="90" height="32" rx="3" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="301" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">3</text>
  <rect x="354" y="176" width="90" height="32" rx="3" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="399" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">1</text>
  <rect x="452" y="176" width="90" height="32" rx="3" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="497" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">6</text>
  <rect x="550" y="176" width="90" height="32" rx="3" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="595" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">5</text>
  <rect x="648" y="176" width="90" height="32" rx="3" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="693" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">7</text>
  <rect x="746" y="176" width="90" height="32" rx="3" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="791" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">2</text>

  <!-- Row 1: window=2 -->
  <rect x="60" y="216" width="90" height="32" rx="3" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
  <text x="105" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">2</text>
  <rect x="158" y="216" width="90" height="32" rx="3" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
  <text x="203" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">3</text>
  <rect x="256" y="216" width="90" height="32" rx="3" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="301" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">1</text>
  <rect x="354" y="216" width="90" height="32" rx="3" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="399" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">1</text>
  <rect x="452" y="216" width="90" height="32" rx="3" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
  <text x="497" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">5</text>
  <rect x="550" y="216" width="90" height="32" rx="3" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
  <text x="595" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">5</text>
  <rect x="648" y="216" width="90" height="32" rx="3" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
  <text x="693" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">2</text>

  <!-- Row 2: window=4 -->
  <rect x="60" y="256" width="90" height="32" rx="3" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="105" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">1</text>
  <rect x="158" y="256" width="90" height="32" rx="3" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="203" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">1</text>
  <rect x="256" y="256" width="90" height="32" rx="3" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="301" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">1</text>
  <rect x="354" y="256" width="90" height="32" rx="3" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="399" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">1</text>
  <rect x="452" y="256" width="90" height="32" rx="3" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
  <text x="497" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">2</text>

  <!-- Row 3: window=8 -->
  <rect x="60" y="296" width="90" height="32" rx="3" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="105" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">1</text>

  <!-- Query illustration -->
  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">쿼리 RMQ(1, 6) = min(a[1..6])</text>

  <!-- Two overlapping windows -->
  <rect x="158" y="370" width="290" height="28" rx="4" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <text x="303" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">sparse[2][1] = min[1..4] = 1</text>

  <rect x="354" y="370" width="290" height="28" rx="4" fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="499" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">sparse[2][3] = min[3..6] = 1</text>

  <text x="60" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">k = floor(log₂(6)) = 2   →   min(sparse[2][1], sparse[2][3]) = 1   (O(1)!)</text>
  <text x="60" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중복 허용: 두 구간이 겹쳐도 최솟값은 변하지 않으므로 O(1) 쿼리 가능</text>
</svg>
