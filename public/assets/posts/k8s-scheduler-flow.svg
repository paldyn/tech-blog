<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">kube-scheduler 동작 흐름</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Filtering &#x2192; Scoring &#x2192; Binding</text>

  <!-- Step boxes -->
  <rect x="60" y="100" width="160" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① Pod 생성 요청</text>
  <text x="140" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">Pending 상태</text>

  <line x1="230" y1="135" x2="270" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="280" y="100" width="160" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">② Filtering</text>
  <text x="360" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">불가 노드 제거</text>

  <line x1="450" y1="135" x2="490" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="500" y="100" width="160" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="580" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ Scoring</text>
  <text x="580" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">최적 노드 점수화</text>

  <line x1="670" y1="135" x2="710" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="720" y="100" width="120" height="70" rx="8" fill="#0d1f12" stroke="#166534" stroke-width="1.5"/>
  <text x="780" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">④ Binding</text>
  <text x="780" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">노드 배정</text>

  <!-- Filtering detail -->
  <rect x="60" y="210" width="340" height="130" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="230" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Filtering 단계 — 불가 조건</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; 리소스 부족 (CPU/Memory request 불충족)</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; nodeSelector 미일치</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; Taint 있고 Toleration 없음</text>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; NodeAffinity 조건 불충족</text>

  <!-- Scoring detail -->
  <rect x="480" y="210" width="340" height="130" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="650" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Scoring 단계 — 점수 기준</text>
  <text x="500" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; LeastRequestedPriority (리소스 여유)</text>
  <text x="500" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; BalancedResourceAllocation</text>
  <text x="500" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; NodeAffinityPriority</text>
  <text x="500" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; TaintTolerationPriority</text>

  <!-- Node result -->
  <rect x="60" y="380" width="760" height="80" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">스케줄러 결과: nodeName 필드에 선택된 노드 기록</text>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">kubelet이 nodeName 감시 &#x2192; 해당 노드에서 컨테이너 실행 &#x2192; Pod Running 상태로 전환</text>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#6b7280" text-anchor="middle">스케줄러는 Control Plane 컴포넌트 &#x2014; etcd의 상태를 읽고 API Server에 결과 기록</text>
</svg>
