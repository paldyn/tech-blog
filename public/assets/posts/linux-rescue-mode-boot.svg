<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a030"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">복구 모드 진입 방법</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">rescue.target · emergency.target · GRUB 편집</text>

  <!-- Normal boot -->
  <rect x="60" y="90" width="160" height="44" rx="6" fill="#1a2a1a" stroke="#3a6a3a" stroke-width="1.5"/>
  <text x="140" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">정상 부팅</text>

  <line x1="220" y1="112" x2="280" y2="112" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="280" y="90" width="200" height="44" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="380" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">graphical.target</text>
  <text x="380" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GUI · 네트워크 · 전체 서비스</text>

  <!-- Divider -->
  <line x1="60" y1="155" x2="820" y2="155" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">── 부팅 실패 시나리오 ──</text>

  <!-- GRUB edit method -->
  <rect x="60" y="168" width="200" height="60" rx="6" fill="#1a1a0a" stroke="#6a6a2a" stroke-width="1"/>
  <text x="160" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8d030" text-anchor="middle">방법 1: GRUB 편집</text>
  <text x="160" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">linux ... 줄에</text>
  <text x="160" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8d030" text-anchor="middle">systemd.unit=rescue.target</text>

  <line x1="260" y1="198" x2="320" y2="240" stroke="#e0a030" stroke-width="1.5" marker-end="url(#arr-y)"/>

  <!-- systemctl isolate method -->
  <rect x="60" y="250" width="200" height="60" rx="6" fill="#1a1a0a" stroke="#6a6a2a" stroke-width="1"/>
  <text x="160" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8d030" text-anchor="middle">방법 2: systemctl</text>
  <text x="160" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">systemctl isolate</text>
  <text x="160" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8d030" text-anchor="middle">rescue.target</text>

  <line x1="260" y1="280" x2="320" y2="263" stroke="#e0a030" stroke-width="1.5" marker-end="url(#arr-y)"/>

  <!-- rescue.target box -->
  <rect x="320" y="218" width="220" height="60" rx="6" fill="#1a2a2a" stroke="#3a7a7a" stroke-width="1.5"/>
  <text x="430" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">rescue.target</text>
  <text x="430" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">root 쉘 / 파일시스템 RO</text>
  <text x="430" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네트워크 없음</text>

  <!-- emergency.target box -->
  <rect x="320" y="318" width="220" height="60" rx="6" fill="#2a1a1a" stroke="#7a3a3a" stroke-width="1.5"/>
  <text x="430" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">emergency.target</text>
  <text x="430" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">최소 환경 (마운트 X)</text>
  <text x="430" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">커널 파닉 직전 최후 수단</text>

  <line x1="430" y1="278" x2="430" y2="318" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>

  <!-- emergency method -->
  <rect x="60" y="335" width="200" height="60" rx="6" fill="#2a1010" stroke="#7a3a3a" stroke-width="1"/>
  <text x="160" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">방법 3: GRUB 편집</text>
  <text x="160" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">systemd.unit=</text>
  <text x="160" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">emergency.target</text>

  <line x1="260" y1="365" x2="320" y2="358" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- What can be done -->
  <rect x="580" y="218" width="240" height="160" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="700" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">rescue에서 할 수 있는 일</text>
  <text x="596" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 파스워드 리셋</text>
  <text x="596" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 파일시스템 fsck</text>
  <text x="596" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 깨진 설정 파일 수정</text>
  <text x="596" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 깨진 패키지 제거</text>
  <text x="596" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· GRUB 재설치</text>
  <text x="596" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· fstab 수정</text>

  <!-- reminder: rw remount -->
  <rect x="60" y="432" width="760" height="40" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="457" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">rescue 진입 후 파일 수정 전: mount -o remount,rw /   (RO → RW 전환)</text>
</svg>
