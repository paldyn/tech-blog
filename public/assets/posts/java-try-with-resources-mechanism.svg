<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">try-with-resources 동작 메커니즘</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">AutoCloseable 자원이 자동으로 해제되는 원리</text>

  <!-- Code block -->
  <rect x="60" y="90" width="380" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// try-with-resources</text>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">try</text>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    (Resource r = </text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">        new</text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">         Resource()) {</text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">    // 자원 사용</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    r.doSomething();</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">} </text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  catch</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        (Exception e) {</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    e.printStackTrace();</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">} </text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">  // finally 없음!</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">} </text>

  <!-- Flow diagram on right -->
  <!-- Step boxes -->
  <rect x="520" y="90" width="300" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">① 자원 초기화</text>
  <text x="670" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">new Resource() — AutoCloseable 구현 필수</text>

  <line x1="670" y1="140" x2="670" y2="168" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="520" y="170" width="300" height="50" rx="8" fill="#1a2040" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">② try 블록 실행</text>
  <text x="670" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">r.doSomething() 수행</text>

  <line x1="670" y1="220" x2="670" y2="248" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Decision diamond -->
  <polygon points="670,258 740,278 670,298 600,278" fill="#1a1a10" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="670" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">예외 발생?</text>

  <!-- No path (normal) -->
  <line x1="670" y1="298" x2="670" y2="338" stroke="#55c555" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="680" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">아니오</text>

  <!-- Yes path -->
  <line x1="740" y1="278" x2="800" y2="278" stroke="#e05555" stroke-width="2"/>
  <line x1="800" y1="278" x2="800" y2="358" stroke="#e05555" stroke-width="2"/>
  <line x1="800" y1="358" x2="740" y2="358" stroke="#e05555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="810" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">예</text>

  <rect x="520" y="340" width="300" height="50" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="670" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">③ catch 블록 (선택)</text>
  <text x="670" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예외 처리 — close() 이미 호출됨</text>

  <line x1="670" y1="390" x2="670" y2="418" stroke="#7777cc" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="520" y="420" width="300" height="50" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="670" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">④ close() 자동 호출</text>
  <text x="670" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컴파일러가 finally 블록에 삽입</text>

  <!-- Note box -->
  <rect x="60" y="330" width="380" height="80" rx="8" fill="#101820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">AutoCloseable 인터페이스</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">void close() throws Exception</text>
  <text x="80" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Closeable(IOException) &lt; AutoCloseable(Exception)</text>

  <!-- Multiple resources note -->
  <rect x="60" y="430" width="380" height="60" rx="8" fill="#101820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">다중 자원 선언 시 역순 close</text>
  <text x="80" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">try(A a = ...; B b = ...) → close: b → a</text>
</svg>
