<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 타입별 선언 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">ConstDataset과 Script Dataset 생성 예제</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="274" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <!-- ConstDataset XML section -->
  <text xml:space="preserve" x="76" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">/* ConstDataset — 디자인 패널 (.xfdl) */</text>
  <text xml:space="preserve" x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">&lt;<tspan fill="#7ec8e3">ConstDataset</tspan> id=<tspan fill="#ce9178">"cdUseYn"</tspan>&gt;</text>
  <text xml:space="preserve" x="76" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  &lt;<tspan fill="#7ec8e3">ColumnInfo</tspan>&gt;&lt;<tspan fill="#7ec8e3">Column</tspan> id=<tspan fill="#ce9178">"CODE"</tspan>/&gt;&lt;/<tspan fill="#7ec8e3">ColumnInfo</tspan>&gt;</text>
  <text xml:space="preserve" x="76" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  &lt;<tspan fill="#7ec8e3">Rows</tspan>&gt;&lt;<tspan fill="#7ec8e3">Row</tspan>&gt;<tspan fill="#ce9178">Y</tspan>&lt;/<tspan fill="#7ec8e3">Row</tspan>&gt;&lt;<tspan fill="#7ec8e3">Row</tspan>&gt;<tspan fill="#ce9178">N</tspan>&lt;/<tspan fill="#7ec8e3">Row</tspan>&gt;&lt;/<tspan fill="#7ec8e3">Rows</tspan>&gt;</text>
  <text xml:space="preserve" x="76" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">&lt;/<tspan fill="#7ec8e3">ConstDataset</tspan>&gt;</text>

  <!-- blank -->
  <!-- Script Dataset section -->
  <text xml:space="preserve" x="76" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">/* Script Dataset — 런타임 생성 */</text>
  <text xml:space="preserve" x="76" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">var</tspan> dsTemp = <tspan fill="#7ec8e3">new</tspan> Dataset();</text>
  <text xml:space="preserve" x="76" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dsTemp.addColumn(<tspan fill="#ce9178">"CODE"</tspan>, <tspan fill="#ce9178">"string"</tspan>, <tspan fill="#b5cea8">10</tspan>);</text>
  <text xml:space="preserve" x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dsTemp.addColumn(<tspan fill="#ce9178">"NAME"</tspan>, <tspan fill="#ce9178">"string"</tspan>, <tspan fill="#b5cea8">50</tspan>);</text>
  <text xml:space="preserve" x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">var</tspan> r = dsTemp.addRow();</text>
  <text xml:space="preserve" x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dsTemp.setColumn(r, <tspan fill="#ce9178">"CODE"</tspan>, <tspan fill="#ce9178">"A01"</tspan>);</text>
  <text xml:space="preserve" x="76" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dsTemp.setColumn(r, <tspan fill="#ce9178">"NAME"</tspan>, <tspan fill="#ce9178">"항목1"</tspan>);</text>

  <!-- Bottom note -->
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Script Dataset은 사용 후 null 처리로 메모리를 해제하세요</text>
</svg>
