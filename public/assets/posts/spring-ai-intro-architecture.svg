<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Spring AI 핵심 구성 요소
  </text>

  <!-- App Layer -->
  <rect x="60" y="66" width="760" height="56" fill="#0f1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Spring Boot 애플리케이션</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@RestController / @Service — 비즈니스 로직</text>

  <!-- Down arrow -->
  <line x1="440" y1="122" x2="440" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ChatClient Layer -->
  <rect x="60" y="148" width="760" height="56" fill="#0f2820" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">ChatClient (중심 추상화)</text>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프롬프트 구성 · 스트리밍 · 구조화 출력 · 메모리 관리</text>

  <!-- Down arrow -->
  <line x1="440" y1="204" x2="440" y2="228" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Middle row: 3 components -->
  <rect x="60" y="230" width="220" height="80" fill="#1a1008" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="170" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">Prompt / Messages</text>
  <text x="170" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SystemMessage</text>
  <text x="170" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">UserMessage · PromptTemplate</text>

  <rect x="330" y="230" width="220" height="80" fill="#0f2020" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Tool / Function Calling</text>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Tool 어노테이션</text>
  <text x="440" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모델이 외부 기능 호출</text>

  <rect x="600" y="230" width="220" height="80" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">RAG Pipeline</text>
  <text x="710" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">VectorStore · Retriever</text>
  <text x="710" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">QuestionAnswerAdvisor</text>

  <!-- Arrows down -->
  <line x1="170" y1="310" x2="170" y2="334" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="310" x2="440" y2="334" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="710" y1="310" x2="710" y2="334" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ChatModel abstraction -->
  <rect x="60" y="336" width="760" height="56" fill="#1a0a0a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">ChatModel (AI 모델 추상화)</text>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OpenAI · Anthropic · Google Vertex · Ollama · Azure OpenAI</text>

  <!-- Provider boxes -->
  <line x1="200" y1="392" x2="200" y2="416" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="380" y1="392" x2="380" y2="416" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="560" y1="392" x2="560" y2="416" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="740" y1="392" x2="740" y2="416" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="100" y="418" width="180" height="44" fill="#111" rx="6" stroke="#444" stroke-width="1"/>
  <text x="190" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">OpenAI GPT</text>

  <rect x="290" y="418" width="180" height="44" fill="#111" rx="6" stroke="#444" stroke-width="1"/>
  <text x="380" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Anthropic Claude</text>

  <rect x="480" y="418" width="180" height="44" fill="#111" rx="6" stroke="#444" stroke-width="1"/>
  <text x="570" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Google Gemini</text>

  <rect x="670" y="418" width="150" height="44" fill="#111" rx="6" stroke="#444" stroke-width="1"/>
  <text x="745" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Ollama (로컬)</text>

  <!-- Portability note -->
  <rect x="60" y="480" width="760" height="42" fill="#111" rx="6" stroke="#333" stroke-width="1"/>
  <text x="440" y="506" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">
    ChatModel 인터페이스로 추상화 → 설정 변경만으로 AI 제공자 교체 가능
  </text>
</svg>
