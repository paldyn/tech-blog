<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">type</tspan><tspan fill="#ffffff"> State =</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  | { tag: </tspan><tspan fill="#ce9178">"idle"</tspan><tspan fill="#ffffff"> }</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  | { tag: </tspan><tspan fill="#ce9178">"loading"</tspan><tspan fill="#ffffff"> }</tspan></text>
