<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  | { tag: </tspan><tspan fill="#ce9178">"err"</tspan><tspan fill="#ffffff">; msg: </tspan><tspan font-weight="600" fill="#7ec8e3">string</tspan><tspan fill="#ffffff"> }</tspan></text>
<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="486" font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (s.tag === </tspan><tspan fill="#ce9178">"ok"</tspan><tspan fill="#ffffff">) {</tspan></text>
