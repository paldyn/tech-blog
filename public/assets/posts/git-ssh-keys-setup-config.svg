<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">~/.ssh/config 멀티 계정 설정</text>

  <!-- Left: config structure -->
  <rect x="60" y="76" width="360" height="200" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="240" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">~/.ssh/config</text>

  <rect x="80" y="114" width="320" height="50" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Host github-personal</text>
  <text x="240" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HostName github.com · IdentityFile ~/.ssh/id_personal</text>

  <rect x="80" y="176" width="320" height="50" rx="6" fill="#0f1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Host github-work</text>
  <text x="240" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HostName github.com · IdentityFile ~/.ssh/id_work</text>

  <text x="240" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">User git (항상 'git' — GitHub username 아님)</text>

  <!-- Right: usage -->
  <rect x="460" y="76" width="360" height="200" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="640" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">레포별 SSH Host 지정</text>

  <rect x="480" y="114" width="320" height="50" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">개인 레포 clone</text>
  <text x="640" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">git clone git@github-personal:alice/repo</text>

  <rect x="480" y="176" width="320" height="50" rx="6" fill="#1a1020" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">회사 레포 clone</text>
  <text x="640" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">git clone git@github-work:company/repo</text>

  <text x="640" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Host alias가 IdentityFile 선택을 결정</text>

  <!-- Code block -->
  <rect x="60" y="296" width="760" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># ~/.ssh/config 예시</text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Host</tspan> github-personal</text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">HostName</tspan>     github.com</text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">User</tspan>         git</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">IdentityFile</tspan> ~/.ssh/id_personal</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">    <tspan fill="#ce9178">AddKeysToAgent</tspan> yes</text>
</svg>
