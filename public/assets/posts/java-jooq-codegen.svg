<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <defs>
    <marker id="jqArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">jOOQ의 출발점 — DB 스키마에서 코드 생성</text>

  <!-- schema -->
  <rect x="60" y="110" width="200" height="100" fill="#1a1206" stroke="#e0a555" stroke-width="1.5" rx="8"/>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">DB 스키마</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">테이블·컬럼·타입</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">진실의 원천</text>

  <line x1="260" y1="160" x2="350" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jqArr)"/>
  <text x="258" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">코드 생성</text>

  <!-- generated -->
  <rect x="350" y="110" width="220" height="100" fill="#101622" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="370" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">생성된 자바 클래스</text>
  <text x="370" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">MEMBER.NAME</text>
  <text x="370" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">MEMBER.ID ...</text>

  <line x1="570" y1="160" x2="660" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jqArr)"/>

  <!-- queries -->
  <rect x="660" y="110" width="160" height="100" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="680" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">타입 안전 쿼리</text>
  <text x="680" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DSL로 작성</text>
  <text x="680" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컴파일 검증</text>

  <text x="60" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스키마가 바뀌면 코드 재생성 → 영향받는 쿼리가 컴파일 에러로 즉시 드러난다.</text>
  <text x="60" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">JPA가 객체→DB라면, jOOQ는 DB→코드 — 방향이 정반대다.</text>
</svg>
