<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ConstColumn vs 일반 컬럼 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">상수 컬럼은 모든 행에서 동일한 값을 유지합니다</text>

  <!-- ===== LEFT PANEL — 일반 컬럼 ===== -->
  <rect x="60" y="90" width="340" height="148" fill="#0f0f1a" rx="8" stroke="#444" stroke-width="1"/>
  <!-- Header bg (top rounded) -->
  <rect x="60" y="90" width="340" height="38" fill="#1a1a2e" rx="8"/>
  <rect x="60" y="110" width="340" height="18" fill="#1a1a2e"/>
  <text x="230" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">일반 컬럼 (Normal Column)</text>

  <!-- Column separators -->
  <line x1="155" y1="128" x2="155" y2="238" stroke="#333" stroke-width="1"/>
  <line x1="255" y1="128" x2="255" y2="238" stroke="#333" stroke-width="1"/>

  <!-- Column header row -->
  <rect x="60" y="128" width="340" height="28" fill="#1a2a1a"/>
  <text x="107" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">EMP_CD</text>
  <text x="205" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">EMP_NM</text>
  <text x="328" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">DEPT_CD</text>

  <!-- Row 1 -->
  <rect x="60" y="156" width="340" height="26" fill="#0d1a0d"/>
  <text x="107" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">E001</text>
  <text x="205" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">김철수</text>
  <text x="328" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">D001</text>

  <!-- Row 2 -->
  <rect x="60" y="182" width="340" height="26" fill="#111"/>
  <text x="107" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">E002</text>
  <text x="205" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">이영희</text>
  <text x="328" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">D002</text>

  <!-- Row 3 -->
  <rect x="60" y="208" width="340" height="26" fill="#0d1a0d"/>
  <text x="107" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">E003</text>
  <text x="205" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">박민준</text>
  <text x="328" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">D003</text>

  <text x="230" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">행마다 다른 값</text>

  <!-- ===== MIDDLE DIVIDER ===== -->
  <line x1="440" y1="90" x2="440" y2="238" stroke="#333" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#555" text-anchor="middle">VS</text>

  <!-- ===== RIGHT PANEL — ConstColumn ===== -->
  <rect x="480" y="90" width="340" height="148" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <!-- Header bg -->
  <rect x="480" y="90" width="340" height="38" fill="#1a2e1a" rx="8"/>
  <rect x="480" y="110" width="340" height="18" fill="#1a2e1a"/>
  <text x="650" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">ConstColumn</text>

  <!-- Column separators -->
  <line x1="575" y1="128" x2="575" y2="238" stroke="#333" stroke-width="1"/>
  <line x1="675" y1="128" x2="675" y2="238" stroke="#333" stroke-width="1"/>

  <!-- Column header row -->
  <rect x="480" y="128" width="340" height="28" fill="#0d2e0d"/>
  <text x="527" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">EMP_CD</text>
  <text x="625" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">EMP_NM</text>
  <!-- ConstColumn header with badge -->
  <text x="748" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">DEPT_CD</text>
  <rect x="718" y="147" width="60" height="14" fill="#2a2a4a" rx="3"/>
  <text x="748" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#7777cc" text-anchor="middle">CONST</text>

  <!-- Row 1 (all same DEPT_CD) -->
  <rect x="480" y="162" width="340" height="24" fill="#0d1a0d"/>
  <text x="527" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">E001</text>
  <text x="625" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">김철수</text>
  <text x="748" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">D001</text>

  <!-- Row 2 -->
  <rect x="480" y="186" width="340" height="24" fill="#111"/>
  <text x="527" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">E002</text>
  <text x="625" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">이영희</text>
  <text x="748" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">D001</text>

  <!-- Row 3 -->
  <rect x="480" y="210" width="340" height="24" fill="#0d1a0d"/>
  <text x="527" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">E003</text>
  <text x="625" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">박민준</text>
  <text x="748" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">D001</text>

  <text x="650" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">모든 행에 동일한 값</text>

  <!-- ===== BOTTOM INFO BOXES ===== -->
  <!-- Left: Normal API -->
  <rect x="60" y="272" width="340" height="110" fill="#0f0f1a" rx="8" stroke="#444" stroke-width="1"/>
  <text x="230" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">일반 컬럼 API</text>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">getColumn(row, colName)</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">setColumn(row, colName, val)</text>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 행마다 독립적으로 값 관리</text>

  <!-- Right: ConstColumn API -->
  <rect x="480" y="272" width="340" height="110" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">ConstColumn API</text>
  <text x="500" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">addConstColumn(name, type, val)</text>
  <text x="500" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">setConstColumn(name, val)</text>
  <text x="500" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">변경 즉시 전체 행에 반영</text>
</svg>
