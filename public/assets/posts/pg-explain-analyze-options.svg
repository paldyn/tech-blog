<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">EXPLAIN 옵션 가이드</text>

  <!-- Option table header -->
  <rect x="60" y="64" width="760" height="36" rx="6" fill="#111520" stroke="#333"/>
  <text x="140" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">옵션</text>
  <text x="380" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">기능</text>
  <text x="680" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">사용 시점</text>

  <!-- Row 1 -->
  <rect x="60" y="100" width="760" height="32" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="140" y="120" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">ANALYZE</text>
  <text x="380" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실제 실행 + actual time/rows</text>
  <text x="680" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">항상 — 추정과 실제 차이 확인</text>

  <!-- Row 2 -->
  <rect x="60" y="132" width="760" height="32" rx="0" fill="#0a0f14" stroke="#3a4a6e"/>
  <text x="140" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">BUFFERS</text>
  <text x="380" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">shared/local 버퍼 hit/read/dirty</text>
  <text x="680" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">I/O 병목 진단 시</text>

  <!-- Row 3 -->
  <rect x="60" y="164" width="760" height="32" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="140" y="184" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">VERBOSE</text>
  <text x="380" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">출력 컬럼, 스키마 정보 추가</text>
  <text x="680" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컬럼 ambiguity 디버깅 시</text>

  <!-- Row 4 -->
  <rect x="60" y="196" width="760" height="32" rx="0" fill="#0a0f14" stroke="#3a4a6e"/>
  <text x="140" y="216" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">FORMAT JSON</text>
  <text x="380" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">JSON 형식 출력</text>
  <text x="680" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">explain.depesz.com 등 도구 사용 시</text>

  <!-- Row 5 -->
  <rect x="60" y="228" width="760" height="32" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="140" y="248" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">SETTINGS</text>
  <text x="380" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">기본값과 다른 GUC 설정 표시</text>
  <text x="680" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">플래너 파라미터 재현 시</text>

  <!-- Row 6 -->
  <rect x="60" y="260" width="760" height="32" rx="0" fill="#0a0f14" stroke="#3a4a6e"/>
  <text x="140" y="280" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">WAL</text>
  <text x="380" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">WAL 레코드 생성량 표시</text>
  <text x="680" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DML WAL 오버헤드 측정 시</text>

  <!-- Code block -->
  <rect x="60" y="312" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 실전 표준 조합 (운영 DB에서는 트랜잭션 롤백 후 사용)</text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">EXPLAIN</text>
  <text x="124" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (</text>
  <text x="136" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ANALYZE</text>
  <text x="190" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text x="202" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">BUFFERS</text>
  <text x="256" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text x="268" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">VERBOSE</text>
  <text x="322" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text x="334" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FORMAT JSON</text>
  <text x="418" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">SELECT ... FROM ... WHERE ...;</text>
</svg>
