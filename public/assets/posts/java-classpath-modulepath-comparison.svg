<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클래스패스 vs 모듈패스</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Java 9 이전과 이후의 의존성 관리 방식 비교</text>

  <!-- Classpath column -->
  <rect x="60" y="92" width="360" height="380" fill="#0f1a2e" rx="8" stroke="#1e2d4a" stroke-width="1"/>
  <text x="240" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="17" font-weight="700" fill="#7ec8e3" text-anchor="middle">클래스패스 (Classpath)</text>
  <text x="240" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Java 1.0 ~ 현재</text>
  <rect x="80" y="152" width="320" height="1" fill="#1e2d4a"/>

  <!-- Classpath items -->
  <rect x="88" y="168" width="12" height="12" rx="2" fill="#7ec8e3"/>
  <text x="110" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">JAR 파일, 디렉터리, ZIP 파일 목록</text>

  <rect x="88" y="196" width="12" height="12" rx="2" fill="#7ec8e3"/>
  <text x="110" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">구분자: `:`(Unix) / `;`(Windows)</text>

  <rect x="88" y="224" width="12" height="12" rx="2" fill="#e05555"/>
  <text x="110" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">패키지 단위 접근 — 캡슐화 없음</text>

  <rect x="88" y="252" width="12" height="12" rx="2" fill="#e05555"/>
  <text x="110" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">클래스 충돌(JAR Hell) 발생 가능</text>

  <rect x="88" y="280" width="12" height="12" rx="2" fill="#e05555"/>
  <text x="110" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">순환 의존성 감지 불가</text>

  <rect x="88" y="308" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="110" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">레거시 라이브러리와 완벽 호환</text>

  <rect x="88" y="336" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="110" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">설정 단순, 학습 비용 낮음</text>

  <!-- Classpath JVM load diagram -->
  <rect x="88" y="370" width="312" height="68" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="104" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 예시</text>
  <text x="104" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">java <tspan fill="#7ec8e3">-cp</tspan> <tspan fill="#ce9178">lib/*:out</tspan> App</text>
  <text x="104" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">javac <tspan fill="#7ec8e3">-cp</tspan> <tspan fill="#ce9178">lib/*</tspan> -d out src/*.java</text>

  <!-- Modulepath column -->
  <rect x="460" y="92" width="360" height="380" fill="#0f2310" rx="8" stroke="#1e3a1a" stroke-width="1"/>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="17" font-weight="700" fill="#55c555" text-anchor="middle">모듈패스 (Module Path)</text>
  <text x="640" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Java 9+ (JPMS)</text>
  <rect x="480" y="152" width="320" height="1" fill="#1e3a1a"/>

  <!-- Modulepath items -->
  <rect x="488" y="168" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="510" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">module-info.class 가 있는 JAR/디렉터리</text>

  <rect x="488" y="196" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="510" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">구분자: `:`(Unix) / `;`(Windows) 동일</text>

  <rect x="488" y="224" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="510" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">패키지 exports 명시 → 강한 캡슐화</text>

  <rect x="488" y="252" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="510" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">requires 선언으로 의존성 명확화</text>

  <rect x="488" y="280" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="510" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">순환 의존성 컴파일 타임 오류로 감지</text>

  <rect x="488" y="308" width="12" height="12" rx="2" fill="#e05555"/>
  <text x="510" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">module-info.java 작성 필요</text>

  <rect x="488" y="336" width="12" height="12" rx="2" fill="#e05555"/>
  <text x="510" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">비모듈 라이브러리는 자동 모듈로 처리</text>

  <!-- Modulepath command example -->
  <rect x="488" y="370" width="312" height="68" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="504" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 예시</text>
  <text x="504" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">java <tspan fill="#55c555">-p</tspan> <tspan fill="#ce9178">mods</tspan> <tspan fill="#7ec8e3">-m</tspan> com.example/App</text>
  <text x="504" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">javac <tspan fill="#55c555">-p</tspan> <tspan fill="#ce9178">mods</tspan> -d out src/...</text>

  <!-- Center VS badge -->
  <circle cx="440" cy="282" r="28" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <text x="440" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#888" text-anchor="middle">VS</text>

  <!-- Bottom note -->
  <text x="440" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">혼합 사용 가능: -cp 와 -p 를 동시에 지정할 수 있습니다</text>
</svg>
