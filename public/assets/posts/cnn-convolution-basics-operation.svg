<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">합성곱(Convolution) 연산 원리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">입력 행렬 × 커널 → 특징 맵</text>

  <!-- Input Matrix Label -->
  <text x="100" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">입력 (5×5)</text>

  <!-- Input grid -->
  <g transform="translate(36, 125)">
    <!-- Grid cells -->
    <rect x="0"   y="0"   width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="50"  y="0"   width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="100" y="0"   width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="150" y="0"   width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="200" y="0"   width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>

    <rect x="0"   y="50"  width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="50"  y="50"  width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="100" y="50"  width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="150" y="50"  width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="200" y="50"  width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>

    <rect x="0"   y="100" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="50"  y="100" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="100" y="100" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="150" y="100" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="200" y="100" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>

    <rect x="0"   y="150" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="50"  y="150" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="100" y="150" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="150" y="150" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="200" y="150" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>

    <rect x="0"   y="200" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="50"  y="200" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="100" y="200" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="150" y="200" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="200" y="200" width="50" height="50" fill="#111827" stroke="#2a3550" stroke-width="1"/>

    <!-- Highlighted 3x3 region (top-left) -->
    <rect x="0" y="0" width="150" height="150" fill="none" stroke="#7ec8e3" stroke-width="2.5" rx="2"/>

    <!-- Input values -->
    <text x="25"  y="32"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">1</text>
    <text x="75"  y="32"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">2</text>
    <text x="125" y="32"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">3</text>
    <text x="175" y="32"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">0</text>
    <text x="225" y="32"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">1</text>

    <text x="25"  y="82"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">0</text>
    <text x="75"  y="82"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">1</text>
    <text x="125" y="82"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">2</text>
    <text x="175" y="82"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">1</text>
    <text x="225" y="82"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">0</text>

    <text x="25"  y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">2</text>
    <text x="75"  y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">1</text>
    <text x="125" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">0</text>
    <text x="175" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">2</text>
    <text x="225" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">1</text>

    <text x="25"  y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">1</text>
    <text x="75"  y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">0</text>
    <text x="125" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">1</text>
    <text x="175" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">0</text>
    <text x="225" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">2</text>

    <text x="25"  y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">0</text>
    <text x="75"  y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">2</text>
    <text x="125" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">1</text>
    <text x="175" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">0</text>
    <text x="225" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">1</text>
  </g>

  <!-- Multiply symbol -->
  <text x="310" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="32" font-weight="700" fill="#7777cc">×</text>

  <!-- Kernel Label -->
  <text x="400" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">커널 (3×3)</text>

  <!-- Kernel grid -->
  <g transform="translate(340, 125)">
    <rect x="0"  y="0"   width="50" height="50" fill="#1a1020" stroke="#5a2060" stroke-width="1.5"/>
    <rect x="50" y="0"   width="50" height="50" fill="#1a1020" stroke="#5a2060" stroke-width="1.5"/>
    <rect x="100" y="0"  width="50" height="50" fill="#1a1020" stroke="#5a2060" stroke-width="1.5"/>
    <rect x="0"  y="50"  width="50" height="50" fill="#1a1020" stroke="#5a2060" stroke-width="1.5"/>
    <rect x="50" y="50"  width="50" height="50" fill="#1a1020" stroke="#5a2060" stroke-width="1.5"/>
    <rect x="100" y="50" width="50" height="50" fill="#1a1020" stroke="#5a2060" stroke-width="1.5"/>
    <rect x="0"  y="100" width="50" height="50" fill="#1a1020" stroke="#5a2060" stroke-width="1.5"/>
    <rect x="50" y="100" width="50" height="50" fill="#1a1020" stroke="#5a2060" stroke-width="1.5"/>
    <rect x="100" y="100" width="50" height="50" fill="#1a1020" stroke="#5a2060" stroke-width="1.5"/>

    <text x="25"  y="32"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">1</text>
    <text x="75"  y="32"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">0</text>
    <text x="125" y="32"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">-1</text>
    <text x="25"  y="82"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">1</text>
    <text x="75"  y="82"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">0</text>
    <text x="125" y="82"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">-1</text>
    <text x="25"  y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">1</text>
    <text x="75"  y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">0</text>
    <text x="125" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">-1</text>
  </g>

  <!-- Arrow -->
  <polygon points="510,215 540,205 540,225" fill="#55c555" stroke="#2a6a2a" stroke-width="1"/>
  <line x1="490" y1="215" x2="540" y2="215" stroke="#55c555" stroke-width="3"/>

  <!-- Output Label -->
  <text x="640" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">출력 특징 맵 (3×3)</text>

  <!-- Output grid -->
  <g transform="translate(578, 125)">
    <rect x="0"   y="0"   width="62" height="62" fill="#0d1a0d" stroke="#1e5533" stroke-width="1.5"/>
    <rect x="62"  y="0"   width="62" height="62" fill="#0d1a0d" stroke="#1e5533" stroke-width="1.5"/>
    <rect x="124" y="0"   width="62" height="62" fill="#0d1a0d" stroke="#1e5533" stroke-width="1.5"/>
    <rect x="0"   y="62"  width="62" height="62" fill="#0d1a0d" stroke="#1e5533" stroke-width="1.5"/>
    <rect x="62"  y="62"  width="62" height="62" fill="#0d1a0d" stroke="#1e5533" stroke-width="1.5"/>
    <rect x="124" y="62"  width="62" height="62" fill="#0d1a0d" stroke="#1e5533" stroke-width="1.5"/>
    <rect x="0"   y="124" width="62" height="62" fill="#0d1a0d" stroke="#1e5533" stroke-width="1.5"/>
    <rect x="62"  y="124" width="62" height="62" fill="#0d1a0d" stroke="#1e5533" stroke-width="1.5"/>
    <rect x="124" y="124" width="62" height="62" fill="#0d1a0d" stroke="#1e5533" stroke-width="1.5"/>

    <!-- Highlight first cell -->
    <rect x="0" y="0" width="62" height="62" fill="#1a3d1a" stroke="#55c555" stroke-width="2"/>

    <text x="31"  y="38"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">-3</text>
    <text x="93"  y="38"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">-1</text>
    <text x="155" y="38"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">-2</text>
    <text x="31"  y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">-1</text>
    <text x="93"  y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">0</text>
    <text x="155" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">-1</text>
    <text x="31"  y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">1</text>
    <text x="93"  y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">-1</text>
    <text x="155" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">-2</text>
  </g>

  <!-- Calculation detail -->
  <rect x="36" y="400" width="808" height="110" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="60" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">계산 예시 (좌상단 셀):</text>
  <text x="60" y="447" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">입력 패치    ×    커널    =    원소별 곱    →    합산</text>
  <text x="60" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">[1,2,3 / 0,1,2 / 2,1,0]  ×  [1,0,-1 / 1,0,-1 / 1,0,-1]  =  [1,0,-3 / 0,0,-2 / 2,0,0]  →  합 = -3</text>
  <text x="60" y="493" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">stride=1, padding=0 → 출력 크기: (5-3)/1 + 1 = 3×3</text>

  <!-- Formula: output size -->
  <text x="600" y="447" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">출력 크기 공식:</text>
  <text x="600" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">⌊(H - K + 2P) / S⌋ + 1</text>
  <text x="600" y="493" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">H=입력, K=커널, P=패딩, S=스트라이드</text>
</svg>
