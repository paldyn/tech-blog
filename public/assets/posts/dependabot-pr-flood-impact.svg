<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    .mono { font-family: 'JetBrains Mono','Menlo',monospace; }</style>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">62개 PR 일괄 머지 → v0.1.4 빌드 폭탄</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">"minor/patch 만 머지" 는 그저 바람이었다</text>

  <!-- LEFT: PR pile -->
  <rect x="40" y="100" width="240" height="380" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="160" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">62개 PR (첫 주 누적)</text>
  <text x="160" y="148" text-anchor="middle" font-size="11" fill="#888">gh CLI 로 일괄 머지</text>
  <line x1="55" y1="160" x2="265" y2="160" stroke="#222"/>

  <text x="60" y="186" font-size="11" fill="#888" font-weight="600">메이저 bump 포함</text>
  <rect x="60" y="196" width="200" height="22" rx="4" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="68" y="211" class="mono" font-size="10" fill="#e05555">Spring Boot 3.3 → 4.0</text>
  <rect x="60" y="224" width="200" height="22" rx="4" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="68" y="239" class="mono" font-size="10" fill="#e05555">React 18 → 19</text>
  <rect x="60" y="252" width="200" height="22" rx="4" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="68" y="267" class="mono" font-size="10" fill="#e05555">electron-builder 24 → 26</text>
  <rect x="60" y="280" width="200" height="22" rx="4" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="68" y="295" class="mono" font-size="10" fill="#e05555">trivy-action @0.24.0 (잘못된 핀)</text>

  <text x="60" y="324" font-size="11" fill="#888" font-weight="600">minor/patch 그룹</text>
  <rect x="60" y="334" width="200" height="22" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="68" y="349" class="mono" font-size="10" fill="#55c555">spring (minor) 그룹</text>
  <rect x="60" y="362" width="200" height="22" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="68" y="377" class="mono" font-size="10" fill="#55c555">npm minor-and-patch 그룹</text>
  <rect x="60" y="390" width="200" height="22" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="68" y="405" class="mono" font-size="10" fill="#55c555">GH Actions / Docker base</text>

  <text x="160" y="445" text-anchor="middle" font-size="11" fill="#888">→ git tag v0.1.4</text>
  <text x="160" y="463" text-anchor="middle" font-size="11" fill="#888">→ orchestrator workflow trigger</text>

  <!-- Arrow -->
  <line x1="290" y1="290" x2="320" y2="290" stroke="#444" stroke-width="2"/>
  <polygon points="316,285 328,290 316,295" fill="#444"/>

  <!-- RIGHT: Build matrix -->
  <rect x="335" y="100" width="510" height="380" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="590" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#e8e8e8">v0.1.4 빌드 결과 — 5개 source repo</text>
  <text x="590" y="148" text-anchor="middle" font-size="11" fill="#888">모두 빨갛게 떴다</text>
  <line x1="350" y1="160" x2="830" y2="160" stroke="#222"/>

  <!-- Repo rows -->
  <g>
    <rect x="350" y="178" width="470" height="42" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
    <text x="362" y="200" font-size="12" font-weight="600" fill="#e8e8e8">mb-auth-api</text>
    <text x="362" y="216" class="mono" font-size="10" fill="#e05555">trivy-action@0.24.0 not found</text>
    <text x="810" y="201" text-anchor="end" font-size="11" fill="#e05555">FAIL</text>

    <rect x="350" y="226" width="470" height="42" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
    <text x="362" y="248" font-size="12" font-weight="600" fill="#e8e8e8">mb-dict-api</text>
    <text x="362" y="264" class="mono" font-size="10" fill="#e05555">동일 — trivy-action 잘못된 핀</text>
    <text x="810" y="249" text-anchor="end" font-size="11" fill="#e05555">FAIL</text>

    <rect x="350" y="274" width="470" height="42" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
    <text x="362" y="296" font-size="12" font-weight="600" fill="#e8e8e8">mb-dbwb-api</text>
    <text x="362" y="312" class="mono" font-size="10" fill="#e05555">eclipse-temurin:25-jre-jammy apt 실패</text>
    <text x="810" y="297" text-anchor="end" font-size="11" fill="#e05555">FAIL</text>

    <rect x="350" y="322" width="470" height="42" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
    <text x="362" y="344" font-size="12" font-weight="600" fill="#e8e8e8">mb-erd-api</text>
    <text x="362" y="360" class="mono" font-size="10" fill="#e05555">SARIF 업로드 권한 부족 (GHAS 미활성)</text>
    <text x="810" y="345" text-anchor="end" font-size="11" fill="#e05555">FAIL</text>

    <rect x="350" y="370" width="470" height="42" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
    <text x="362" y="392" font-size="12" font-weight="600" fill="#e8e8e8">mb-client</text>
    <text x="362" y="408" class="mono" font-size="10" fill="#e05555">React 19 + react-dom 18 호환 깨짐</text>
    <text x="810" y="393" text-anchor="end" font-size="11" fill="#e05555">FAIL</text>
  </g>

  <text x="590" y="446" text-anchor="middle" font-size="12" fill="#888">로컬 Spring Boot 4.0.6 컴파일도 줄줄이 깨짐</text>
  <text x="590" y="466" text-anchor="middle" font-size="11" fill="#666">io.spring.dependency-management 1.1.7 과 비호환</text>

  <text x="440" y="510" text-anchor="middle" font-size="11" fill="#444">PALDYN · Dependabot 자동 머지 사고기</text>
</svg>
