<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">주요 RuntimeException 분류</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">프로그래밍 오류로 발생 — 컴파일러가 선언 강제 안 함</text>

  <!-- RuntimeException root -->
  <rect x="310" y="90" width="260" height="44" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">RuntimeException</text>

  <!-- Branches -->
  <line x1="360" y1="134" x2="130" y2="174" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="134" x2="310" y2="174" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="134" x2="440" y2="174" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="480" y1="134" x2="570" y2="174" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="520" y1="134" x2="750" y2="174" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- NPE -->
  <rect x="60" y="176" width="200" height="55" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">NullPointerException</text>
  <text x="160" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">null 참조 역참조</text>
  <text x="160" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Java 14+ Helpful NPE</text>

  <!-- IAE -->
  <rect x="270" y="176" width="160" height="55" rx="8" fill="#2a1810" stroke="#ce9178" stroke-width="1.5"/>
  <text x="350" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">IllegalArgument</text>
  <text x="350" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#ce9178">Exception</text>
  <text x="350" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">잘못된 메서드 인수</text>

  <!-- ISE -->
  <rect x="370" y="176" width="160" height="55" rx="8" fill="#2a1810" stroke="#ce9178" stroke-width="1.5"/>
  <text x="450" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">IllegalState</text>
  <text x="450" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#ce9178">Exception</text>
  <text x="450" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">객체 상태 부적절</text>

  <!-- IOOBE -->
  <rect x="490" y="176" width="180" height="55" rx="8" fill="#2a1810" stroke="#ce9178" stroke-width="1.5"/>
  <text x="580" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">IndexOutOfBounds</text>
  <text x="580" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#ce9178">Exception</text>
  <text x="580" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">배열/리스트 범위 초과</text>

  <!-- CCE -->
  <rect x="680" y="176" width="160" height="55" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="760" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">ClassCast</text>
  <text x="760" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">Exception</text>
  <text x="760" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">잘못된 타입 캐스팅</text>

  <!-- Sub-branches for NPE and IOOBE -->
  <line x1="160" y1="231" x2="160" y2="271" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="580" y1="231" x2="500" y2="271" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="580" y1="231" x2="660" y2="271" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>

  <!-- NPE sub -->
  <rect x="60" y="273" width="200" height="40" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Helpful NPE (Java 14+)</text>
  <text x="160" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">"Cannot invoke 'X.y()' because 'z' is null"</text>

  <!-- AIOOBE -->
  <rect x="410" y="273" width="180" height="40" rx="6" fill="#180e08" stroke="#ce9178" stroke-width="1"/>
  <text x="500" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">ArrayIndexOutOfBounds</text>
  <text x="500" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">배열 범위 초과</text>

  <!-- SIOOBE -->
  <rect x="600" y="273" width="180" height="40" rx="6" fill="#180e08" stroke="#ce9178" stroke-width="1"/>
  <text x="690" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">StringIndexOutOfBounds</text>
  <text x="690" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">문자열 인덱스 초과</text>

  <!-- Additional important exceptions -->
  <rect x="60" y="340" width="760" height="150" rx="8" fill="#101010" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">자주 만나는 그 외 RuntimeException</text>

  <!-- Grid of exceptions -->
  <rect x="76" y="372" width="180" height="46" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="166" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">UnsupportedOperation</text>
  <text x="166" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">미구현 메서드 호출</text>

  <rect x="264" y="372" width="180" height="46" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="354" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">NoSuchElement</text>
  <text x="354" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Iterator 끝 이후 호출</text>

  <rect x="452" y="372" width="180" height="46" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="542" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">NumberFormat</text>
  <text x="542" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">숫자 파싱 실패</text>

  <rect x="640" y="372" width="164" height="46" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="722" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Arithmetic</text>
  <text x="722" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">0 나누기 등</text>

  <rect x="76" y="428" width="180" height="46" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="166" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">ConcurrentModification</text>
  <text x="166" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">반복 중 컬렉션 수정</text>

  <rect x="264" y="428" width="180" height="46" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="354" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">StackOverflow</text>
  <text x="354" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">재귀 깊이 초과</text>

  <rect x="452" y="428" width="180" height="46" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="542" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">NegativeArraySize</text>
  <text x="542" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">음수 배열 크기</text>

  <rect x="640" y="428" width="164" height="46" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="722" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">OutOfMemory</text>
  <text x="722" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">힙 공간 부족 (Error)</text>
</svg>
