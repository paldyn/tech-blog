<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Testcontainers 테스트 생애주기</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">테스트가 진짜 컨테이너를 띄우고 검증한 뒤 정리한다</text>

  <defs>
    <marker id="tcArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- step 1 -->
  <rect x="60" y="120" width="180" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">@Testcontainers</text>
  <text x="150" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">테스트 시작</text>

  <!-- step 2 -->
  <rect x="350" y="120" width="180" height="80" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Docker 컨테이너</text>
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">PostgreSQL 기동</text>

  <!-- step 3 -->
  <rect x="640" y="120" width="180" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="730" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">실제 쿼리 실행</text>
  <text x="730" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">JDBC 연결 검증</text>

  <line x1="240" y1="160" x2="350" y2="160" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#tcArr)"/>
  <line x1="530" y1="160" x2="640" y2="160" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#tcArr)"/>

  <!-- teardown -->
  <rect x="350" y="260" width="180" height="64" rx="8" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">컨테이너 종료</text>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">테스트 종료 후 자동 정리</text>

  <line x1="440" y1="200" x2="440" y2="260" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#tcArr)"/>
</svg>
