<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 450" style="background:#0a0a0a;border-radius:12px">
  <rect x="0" y="0" width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="68" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="56" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">최적 K 선택: 엘보우법 &amp; 실루엣 계수</text>
  <text x="60" y="60" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">WCSS 꺾임점과 실루엣 점수로 K를 결정하는 방법</text>

  <!-- ===== LEFT: Elbow Method Chart ===== -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">엘보우 법 (Elbow Method) — WCSS vs K</text>
  <rect x="60" y="104" width="360" height="220" rx="8" fill="#0d1520" stroke="#1e2433" stroke-width="1.5"/>

  <!-- Chart grid -->
  <line x1="100" y1="115" x2="100" y2="305" stroke="#1e2433" stroke-width="1"/>
  <line x1="100" y1="305" x2="405" y2="305" stroke="#1e2433" stroke-width="1"/>
  <!-- Y axis label -->
  <text x="78" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle" transform="rotate(-90, 78, 215)">WCSS</text>
  <!-- X axis label -->
  <text x="252" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">K (클러스터 수)</text>

  <!-- X axis ticks -->
  <text x="115" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">1</text>
  <text x="165" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">2</text>
  <text x="215" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">3</text>
  <text x="265" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">4</text>
  <text x="315" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">5</text>
  <text x="365" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">6</text>
  <text x="405" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">7</text>

  <!-- WCSS curve: steep drop then flattens -->
  <polyline points="115,130 165,180 215,230 265,258 315,272 365,280 405,285" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <!-- Data points on curve -->
  <circle cx="115" cy="130" r="4" fill="#7ec8e3"/>
  <circle cx="165" cy="180" r="4" fill="#7ec8e3"/>
  <circle cx="215" cy="230" r="4" fill="#7ec8e3"/>
  <circle cx="265" cy="258" r="4" fill="#7ec8e3"/>
  <circle cx="315" cy="272" r="4" fill="#7ec8e3"/>
  <circle cx="365" cy="280" r="4" fill="#7ec8e3"/>
  <circle cx="405" cy="285" r="4" fill="#7ec8e3"/>

  <!-- Elbow marker at K=3 -->
  <line x1="215" y1="115" x2="215" y2="305" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="215" cy="230" r="8" fill="none" stroke="#e05555" stroke-width="2"/>
  <text x="226" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">K=3 ← 엘보우</text>

  <!-- Annotation arrows: steep vs flat -->
  <text x="138" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#b5cea8">급격히</text>
  <text x="136" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#b5cea8">감소</text>
  <text x="316" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">완만</text>

  <!-- ===== RIGHT: Silhouette Score ===== -->
  <text x="450" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실루엣 계수 (Silhouette Score)</text>
  <rect x="450" y="104" width="370" height="220" rx="8" fill="#0d1520" stroke="#1e2433" stroke-width="1.5"/>

  <!-- Silhouette formula box -->
  <rect x="466" y="116" width="338" height="44" rx="4" fill="#131a2e"/>
  <text x="635" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">s(i) = (b(i) − a(i)) / max(a(i), b(i))</text>
  <text x="635" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">범위: −1 (최악) ~ +1 (최적)</text>

  <!-- Score interpretation bars -->
  <text x="466" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">a(i): 같은 클러스터 내 평균 거리</text>
  <text x="466" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">b(i): 인접 클러스터까지 평균 거리</text>

  <!-- Silhouette bar chart by K -->
  <text x="466" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">K별 평균 실루엣 점수:</text>
  <!-- K=2 -->
  <rect x="510" y="236" width="60" height="16" rx="3" fill="#7777cc" opacity="0.6"/>
  <text x="576" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">K=2: 0.52</text>
  <!-- K=3 (best) -->
  <rect x="510" y="256" width="96" height="16" rx="3" fill="#55c555" opacity="0.9"/>
  <text x="612" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">K=3: 0.68 ★ 최적</text>
  <!-- K=4 -->
  <rect x="510" y="276" width="72" height="16" rx="3" fill="#7777cc" opacity="0.6"/>
  <text x="588" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">K=4: 0.55</text>
  <!-- K=5 -->
  <rect x="510" y="296" width="52" height="16" rx="3" fill="#7777cc" opacity="0.4"/>
  <text x="568" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">K=5: 0.44</text>

  <!-- ===== Code block ===== -->
  <rect x="60" y="338" width="760" height="84" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="117" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">sklearn.cluster</text>
  <text x="259" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="313" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">KMeans</text>
  <text x="380" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">;</text>
  <text x="392" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="433" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">sklearn.metrics</text>
  <text x="583" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="637" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">silhouette_score</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">wcss = []</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">for</text>
  <text x="110" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">k</text>
  <text x="123" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">in</text>
  <text x="144" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">range(</text>
  <text x="206" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text>
  <text x="219" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">,</text>
  <text x="232" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">11</text>
  <text x="252" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">): km = KMeans(n_clusters=k, init=</text>
  <text x="600" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'k-means++'</text>
  <text x="694" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  km.fit(X_scaled); wcss.append(km.inertia_)</text>
  <text x="500" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">  # inertia_ = WCSS</text>

  <!-- Footer -->
  <text x="60" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">엘보우법과 실루엣 계수를 함께 사용하면 최적 K를 더 신뢰성 있게 결정할 수 있다 — PALDYN AI 완전 정복</text>
</svg>
