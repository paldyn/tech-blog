<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 21 LTS (2023.09) — 핵심 기능</text>

  <!-- Virtual Threads STANDARD -->
  <rect x="60" y="60" width="360" height="82" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">⭐ Virtual Threads (JEP 444) 표준화</text>
  <text x="240" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">경량 스레드 — OS 스레드 1:1이 아닌 N:M 매핑</text>
  <text x="240" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수백만 개의 동시 I/O-bound 요청 처리 가능</text>
  <text x="240" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">Spring Boot 3.2+ spring.threads.virtual.enabled=true</text>

  <!-- Pattern Matching Switch STANDARD -->
  <rect x="460" y="60" width="360" height="82" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">⭐ Pattern Matching Switch (JEP 441)</text>
  <text x="640" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">switch에서 타입 패턴 + when 절</text>
  <text x="640" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Sealed types + switch = 완전성 컴파일 검증</text>
  <text x="640" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">17~20 Preview → 21 Standard</text>

  <!-- Record Patterns STANDARD -->
  <rect x="60" y="158" width="360" height="68" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">⭐ Record Patterns (JEP 440) 표준화</text>
  <text x="240" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Record 컴포넌트 패턴 분해 · 중첩 패턴 지원</text>
  <text x="240" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">19·20 Preview → 21 Standard</text>

  <!-- Sequenced Collections STANDARD -->
  <rect x="460" y="158" width="360" height="68" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">⭐ Sequenced Collections (JEP 431)</text>
  <text x="640" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">getFirst/getLast/reversed 표준 인터페이스</text>
  <text x="640" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">새로운 기능 (이전 버전 Preview 없음)</text>

  <!-- Scoped Values Preview -->
  <rect x="60" y="242" width="360" height="64" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Scoped Values (JEP 446) Preview</text>
  <text x="240" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ThreadLocal 대안 — VT에 최적화된 컨텍스트 전달</text>
  <text x="240" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">20 Incubator → 21 Preview</text>

  <!-- Structured Concurrency Preview -->
  <rect x="460" y="242" width="360" height="64" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Structured Concurrency (JEP 453) Preview</text>
  <text x="640" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">StructuredTaskScope — 취소 전파 · 예외 수집</text>
  <text x="640" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">19·20 Preview → 21 Preview 유지</text>

  <!-- String Templates Preview -->
  <rect x="60" y="322" width="360" height="64" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="240" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">String Templates (JEP 430) Preview</text>
  <text x="240" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">STR. · FMT. 템플릿 프로세서</text>
  <text x="240" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">21 Preview — 이후 버전에서 재설계됨</text>

  <!-- Unnamed Patterns Preview -->
  <rect x="460" y="322" width="360" height="64" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">Unnamed Classes &amp; Patterns (JEP 443/445)</text>
  <text x="640" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">_ 미사용 변수 · 단순 main() 허용 Preview</text>
  <text x="640" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">21 Preview</text>

  <!-- bottom summary -->
  <rect x="60" y="404" width="760" height="64" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="428" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Java 21 = Java 11 이후 최대 규모의 LTS 업그레이드</text>
  <text x="440" y="448" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Virtual Threads(동시성 혁신) + Pattern Matching(언어 표현력) + Sequenced Collections(컬렉션 API) 완성</text>
  <text x="440" y="458" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">Spring Boot 3.2+ / JDK 21 LTS (지원 2031년 이후)</text>
</svg>
