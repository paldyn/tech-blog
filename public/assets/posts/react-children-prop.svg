  <rect x="476" y="106" width="328" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Card({ title, </tspan><tspan fill="#55c555">children</tspan><tspan fill="#ffffff"> }) {</tspan></text>
  <text x="492" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> (</tspan></text>
  <text x="492" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">className</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"card"</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="492" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#55c555">h2</tspan><tspan fill="#ffffff">&gt;{title}&lt;/</tspan><tspan fill="#55c555">h2</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="492" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#55c555">      {children}</tspan><tspan fill="#9aa4b8">  {/* л ҢлҚ”л§Ғ мң„м№ҳ */}</tspan></text>

