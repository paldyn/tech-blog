  <text x="440" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">childrenмқҙ лҗ  мҲҳ мһҲлҠ” кІғл“Ө</text>

  <rect x="60" y="284" width="760" height="60" rx="8" fill="#0f1825" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">л¬ёмһҗм—ҙ</text>
  <text x="170" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#aaa">"м•Ҳл…•н•ҳм„ёмҡ”"</text>
  <line x1="230" y1="314" x2="270" y2="314" stroke="#3a4a6e" stroke-width="1"/>
  <text x="360" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">JSX мҡ”мҶҢ</text>
  <text x="360" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#aaa">&lt;Avatar /&gt;</text>
  <line x1="440" y1="314" x2="480" y2="314" stroke="#3a4a6e" stroke-width="1"/>
  <text x="560" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0c044">л°°м—ҙ/н•ЁмҲҳ</text>
  <text x="560" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#aaa">[&lt;li/&gt;, &lt;li/&gt;]</text>
  <line x1="640" y1="314" x2="680" y2="314" stroke="#3a4a6e" stroke-width="1"/>
  <text x="750" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cc77cc">null/undefined</text>
  <text x="750" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#aaa">лҜёл ҢлҚ”л§Ғ</text>

  <!-- Render props pattern -->
  <rect x="60" y="368" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// childrenмқҙ н•ЁмҲҳмқё нҢЁн„ҙ (Render Props)</text>
  <text x="76" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Toggle({ children }) {</tspan></text>
  <text x="76" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> [on, setOn] = useState(</tspan><tspan font-weight="600" fill="#7ec8e3">false</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;&gt;{children(on, () =&gt; setOn(v =&gt; !v))}&lt;/&gt;;</tspan></text>
  <text x="76" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
