  <rect x="76" y="106" width="328" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9aa4b8">// м—¬лҠ” нғңк·ёмҷҖ лӢ«лҠ” нғңк·ё мӮ¬мқҙ = children</tspan></text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#e0c044">Card</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">title</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"н”„лЎңн•„"</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">  &lt;</tspan><tspan fill="#55c555">Avatar</tspan><tspan fill="#7ec8e3"> /&gt;</tspan></text>
  <text x="92" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">  &lt;</tspan><tspan fill="#55c555">UserInfo</tspan><tspan fill="#7ec8e3"> name=</tspan><tspan fill="#ce9178">"нҷҚкёёлҸҷ"</tspan><tspan fill="#7ec8e3"> /&gt;</tspan></text>
  <text x="92" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">&lt;/</tspan><tspan fill="#e0c044">Card</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <!-- Arrow -->
  <line x1="420" y1="148" x2="460" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

