  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">children prop: м»ҙнҸ¬л„ҢнҠё м•Ҳм—җ мҪҳн…җмё  л„Јкё°</text>

