<svg width="880" height="380" viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">데코레이터 메타데이터 문제와 해결</text>
  <!-- Left box: without wraps -->
  <rect x="60" y="72" width="340" height="220" fill="#1a0808" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">wraps 없이</text>
  <rect x="76" y="106" width="308" height="168" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">decorator(func):</tspan></text>
  <text x="90" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">wrapper(*a, **k):</tspan></text>
  <text x="90" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">func(*a, **k)</tspan></text>
  <text x="90" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">wrapper</tspan></text>
  <text x="90" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">greet.__name__  </tspan><tspan fill="#9aa4b8"># wrapper</tspan></text>
  <text x="90" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">greet.__doc__   </tspan><tspan fill="#9aa4b8"># None</tspan></text>
  <text x="90" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">원본 메타데이터 소실</text>
  <!-- Right box: with wraps -->
  <rect x="480" y="72" width="340" height="220" fill="#051005" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">functools.wraps 사용</text>
  <rect x="496" y="106" width="308" height="168" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="510" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">from </tspan><tspan fill="#ffffff">functools </tspan><tspan fill="#7ec8e3" font-weight="600">import </tspan><tspan fill="#ffffff">wraps</tspan></text>
  <text x="510" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">decorator(func):</tspan></text>
  <text x="510" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7777cc">@wraps(func)</tspan></text>
  <text x="510" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">wrapper(*a, **k):</tspan></text>
  <text x="510" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">func(*a, **k)</tspan></text>
  <text x="510" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">greet.__name__  </tspan><tspan fill="#9aa4b8"># greet</tspan></text>
  <text x="510" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">greet.__doc__   </tspan><tspan fill="#9aa4b8"># 원래 독스트링</tspan></text>
  <text x="510" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">메타데이터 완벽 보존</text>
  <!-- VS label -->
  <text x="440" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#888">VS</text>
  <!-- Bottom note -->
  <text x="440" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">@wraps(func) 는 __name__, __doc__, __module__, __qualname__, __annotations__, __wrapped__ 복사</text>
</svg>
