<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">왜 번들링하나</text>
  <text x="60" y="76" font-size="14" fill="#888">단일 .d.ts는 안정성·캡슐화·로딩 속도를 함께 얻는다</text>

  <!-- without bundling -->
  <rect x="60" y="100" width="360" height="250" fill="#101418" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="134" font-size="16" font-weight="600" fill="#e05555">번들 없이 (파일 트리)</text>
  <text x="84" y="170" font-size="13" fill="#888">• 내부 경로가 import에 노출</text>
  <text x="84" y="200" font-size="13" fill="#888">• internal 타입까지 새어나감</text>
  <text x="84" y="230" font-size="13" fill="#888">• 폴더 구조 바꾸면 깨질 위험</text>
  <text x="84" y="260" font-size="13" fill="#888">• 수많은 파일 → 에디터 로딩 부담</text>
  <rect x="84" y="282" width="312" height="48" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="100" y="312" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">import</tspan> { X } <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">"pkg/internal/x"</tspan></text>

  <!-- with bundling -->
  <rect x="460" y="100" width="360" height="250" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="134" font-size="16" font-weight="600" fill="#55c555">단일 .d.ts 번들</text>
  <text x="484" y="170" font-size="13" fill="#888">• 공개 진입점 하나만 노출</text>
  <text x="484" y="200" font-size="13" fill="#888">• internal은 합치며 비공개 처리</text>
  <text x="484" y="230" font-size="13" fill="#888">• 내부 구조 변경에 영향 없음</text>
  <text x="484" y="260" font-size="13" fill="#888">• 한 파일 → 빠른 타입 로딩</text>
  <rect x="484" y="282" width="312" height="48" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="500" y="312" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">import</tspan> { X } <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">"pkg"</tspan></text>
</svg>
