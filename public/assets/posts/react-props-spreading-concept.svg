<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Props 스프레딩: 언제 써도 되고 언제 쓰면 안 되나</text>

  <!-- Good case (left) -->
  <text x="220" y="74" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">✓ 권장: 래퍼 컴포넌트</text>
  <rect x="60" y="84" width="360" height="210" rx="10" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>
  <rect x="76" y="96" width="328" height="190" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="116" fill="#9aa4b8">// HTML button을 감싸는 래퍼</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Button({ variant, ...rest }) {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;button</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      className={</tspan><tspan fill="#ce9178">`btn btn-${variant}`</tspan><tspan fill="#ffffff">}</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      </tspan><tspan fill="#7ec8e3" font-weight="600">{...rest}</tspan><tspan fill="#9aa4b8"> {/* onClick, type 등 전달 */}</tspan>
    <tspan x="92" dy="18" fill="#ce9178">    /&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  );</tspan>
    <tspan x="92" dy="18" fill="#ffffff">}</tspan>
  </text>

  <!-- Good case usage -->
  <rect x="76" y="302" width="328" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="324" fill="#9aa4b8">// 사용: aria-label, disabled 자동 전달</tspan>
  </text>

  <!-- Bad case (right) -->
  <text x="660" y="74" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">✗ 주의: 불필요한 prop 전파</text>
  <rect x="460" y="84" width="360" height="210" rx="10" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <rect x="476" y="96" width="328" height="190" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="492" y="116" fill="#9aa4b8">// 무분별한 전체 전달 — 안티패턴</tspan>
    <tspan x="492" dy="18" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> UserCard(props) {</tspan>
    <tspan x="492" dy="18" fill="#9aa4b8">  // props에 무엇이 있는지 모름</tspan>
    <tspan x="492" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="492" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;div</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#e05555">{...props}</tspan><tspan fill="#ce9178">&gt;</tspan>
    <tspan x="492" dy="18" fill="#9aa4b8">    {/* unknown props -&gt; DOM 경고 */}</tspan>
    <tspan x="492" dy="18" fill="#ce9178">    &lt;/div&gt;</tspan>
    <tspan x="492" dy="18" fill="#ffffff">  );</tspan>
  </text>

  <!-- Bad case warning -->
  <rect x="476" y="302" width="328" height="36" rx="6" fill="#1a0808" stroke="#4a1010" stroke-width="1"/>
  <text x="640" y="320" text-anchor="middle" font-size="12" fill="#e05555">DOM에 알 수 없는 prop → React 경고</text>
  <text x="640" y="332" text-anchor="middle" font-size="11" fill="#888">Unknown prop 'isAdmin' on &lt;div&gt; element</text>

  <!-- Arrow pattern: rest props -->
  <text x="440" y="375" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">패턴: 필요한 prop만 꺼내고 나머지를 전달</text>
  <rect x="60" y="388" width="760" height="48" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="80" y="410" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Input({ label, error, className, </tspan><tspan fill="#7ec8e3" font-weight="600">...inputProps</tspan><tspan fill="#ffffff"> }) {</tspan>
    <tspan x="80" dy="18" fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;input</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">{...inputProps}</tspan><tspan fill="#ffffff"> className={</tspan><tspan fill="#ce9178">`input ${className}`</tspan><tspan fill="#ffffff">} /&gt;;</tspan>
  </text>
</svg>
