<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Props Spreading 개념</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">{...props}로 한번에 전달 — 편리하지만 제어를 잃는다</text>

  <defs>
    <marker id="arr-s" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Without spreading -->
  <rect x="55" y="95" width="370" height="200" rx="8" fill="#111" stroke="#888" stroke-width="1.5"/>
  <text x="240" y="118" font-size="14" font-weight="600" fill="#888" text-anchor="middle">명시적 전달 (Without Spread)</text>
  <rect x="70" y="128" width="340" height="152" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="125" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Input({ type, value, onChange,</text>
  <text x="82" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">               placeholder }) {</text>
  <text x="82" y="184" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="126" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> &lt;input</text>
  <text x="82" y="202" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">    type</text>
  <text x="120" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">={type}</text>
  <text x="82" y="220" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">    value</text>
  <text x="124" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">={value}</text>
  <text x="82" y="238" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">    onChange</text>
  <text x="138" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">={onChange}</text>
  <text x="82" y="256" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">    placeholder</text>
  <text x="158" y="256" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">={placeholder} /&gt;</text>
  <text x="82" y="274" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>

  <!-- With spreading -->
  <rect x="455" y="95" width="370" height="200" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Spread 전달 (With Spread)</text>
  <rect x="470" y="128" width="340" height="152" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="525" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Input(props) {</text>
  <text x="482" y="166" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="526" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> &lt;input</text>
  <text x="482" y="184" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace" xml:space="preserve">    {...props}</text>
  <text x="482" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  /&gt;</text>
  <text x="482" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>
  <text x="482" y="248" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 모든 props를 그대로 전달</text>
  <text x="482" y="266" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 코드는 짧지만...</text>

  <!-- Bottom warning -->
  <rect x="55" y="320" width="770" height="110" rx="8" fill="#1e0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="343" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">⚠ 무분별한 Spread의 위험</text>
  <rect x="70" y="355" width="740" height="60" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="375" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 예상치 못한 props가 DOM 요소에 전달될 수 있다</text>
  <text x="82" y="393" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;div {...{variant:</text>
  <text x="179" y="393" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">'primary'</text>
  <text x="237" y="393" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}} /&gt;</text>
  <text x="400" y="393" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// variant는 HTML div 속성이 아님 → 경고</text>
</svg>
