<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">시간 동기화 진단 명령어</text>

  <!-- Left -->
  <text x="220" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">진단 (chrony)</text>

  <rect x="50" y="88" width="360" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 기본 상태 확인</text>
  <text x="66" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">timedatectl</text>
  <text x="66" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 동기화 현황</text>
  <text x="66" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">chronyc</tspan><tspan fill="#ffffff"> tracking</tspan></text>
  <text x="66" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">chronyc</tspan><tspan fill="#ffffff"> sources -v</tspan></text>
  <text x="66" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># ntpq (ntpd 사용 시)</text>
  <text x="66" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ntpq -pn</text>
  <text x="66" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 현재 시각 확인</text>
  <text x="66" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">date; hwclock --show</text>

  <!-- Right -->
  <text x="660" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">조치</text>

  <rect x="470" y="88" width="360" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="486" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># NTP 활성화</text>
  <text x="486" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">timedatectl</tspan><tspan fill="#ffffff"> set-ntp true</tspan></text>
  <text x="486" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 즉각 강제 동기화</text>
  <text x="486" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">chronyc</tspan><tspan fill="#ffffff"> makestep</tspan></text>
  <text x="486" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 타임존 변경</text>
  <text x="486" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">timedatectl</tspan><tspan fill="#ffffff"> set-timezone \</tspan></text>
  <text x="486" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  Asia/Seoul</text>
  <text x="486" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># HW 시계 동기화</text>
  <text x="486" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">hwclock --systohc</text>

  <!-- Bottom tip -->
  <rect x="50" y="298" width="780" height="70" rx="8" fill="#0f1525" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="322" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">chronyc tracking 핵심 항목</text>
  <text x="440" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">System time: 오프셋 크기 / RMS offset: 안정성 / Stratum: NTP 계층</text>
  <text x="440" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">sources -v: * 표시 = 현재 동기화 중인 서버</text>
</svg>
