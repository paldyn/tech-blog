<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript의 구성 요소</text>

  <!-- Three pillars -->
  <!-- Core Language (ECMAScript) -->
  <rect x="60" y="70" width="230" height="360" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <rect x="60" y="70" width="230" height="44" rx="8" fill="#7777cc" fill-opacity="0.18"/>
  <text x="175" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">ECMAScript</text>

  <text x="90" y="138" font-size="13" fill="#e8e8e8">핵심 문법 명세</text>
  <line x1="80" y1="148" x2="280" y2="148" stroke="#2a2a2a" stroke-width="1"/>

  <text x="90" y="170" font-size="12" fill="#888">• 변수 · 타입 · 연산자</text>
  <text x="90" y="192" font-size="12" fill="#888">• 함수 · 클래스</text>
  <text x="90" y="214" font-size="12" fill="#888">• 이터러블 · 제너레이터</text>
  <text x="90" y="236" font-size="12" fill="#888">• Promise · async/await</text>
  <text x="90" y="258" font-size="12" fill="#888">• 모듈 시스템 (ESM)</text>

  <line x1="80" y1="272" x2="280" y2="272" stroke="#2a2a2a" stroke-width="1"/>
  <text x="90" y="294" font-size="12" fill="#666">표준화 기관: TC39 (ECMA)</text>
  <text x="90" y="314" font-size="12" fill="#666">매년 6월 신규 버전 출시</text>
  <text x="90" y="334" font-size="12" fill="#666">ES2015 → ES2024 ...</text>

  <!-- Code example box -->
  <rect x="78" y="352" width="194" height="64" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="90" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const greet = (name) =&gt;</text>
  <text x="90" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  // ES2015 화살표 함수</text>
  <text x="90" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  `Hello, ${name}!`;</text>

  <!-- DOM API -->
  <rect x="325" y="70" width="230" height="360" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="325" y="70" width="230" height="44" rx="8" fill="#7ec8e3" fill-opacity="0.18"/>
  <text x="440" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">DOM API</text>

  <text x="355" y="138" font-size="13" fill="#e8e8e8">브라우저 문서 조작</text>
  <line x1="335" y1="148" x2="545" y2="148" stroke="#2a2a2a" stroke-width="1"/>

  <text x="355" y="170" font-size="12" fill="#888">• document.querySelector</text>
  <text x="355" y="192" font-size="12" fill="#888">• createElement / append</text>
  <text x="355" y="214" font-size="12" fill="#888">• addEventListener</text>
  <text x="355" y="236" font-size="12" fill="#888">• classList · dataset</text>
  <text x="355" y="258" font-size="12" fill="#888">• MutationObserver</text>

  <line x1="335" y1="272" x2="545" y2="272" stroke="#2a2a2a" stroke-width="1"/>
  <text x="355" y="294" font-size="12" fill="#666">W3C / WHATWG 표준</text>
  <text x="355" y="314" font-size="12" fill="#666">브라우저 환경에서만 존재</text>
  <text x="355" y="334" font-size="12" fill="#666">Node.js에는 기본 없음</text>

  <rect x="343" y="352" width="194" height="64" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="355" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">document</text>
  <text x="355" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  .getElementById('btn')</text>
  <text x="355" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  .addEventListener(...);</text>

  <!-- BOM API -->
  <rect x="590" y="70" width="230" height="360" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <rect x="590" y="70" width="230" height="44" rx="8" fill="#55c555" fill-opacity="0.18"/>
  <text x="705" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">BOM API</text>

  <text x="620" y="138" font-size="13" fill="#e8e8e8">브라우저 환경 제어</text>
  <line x1="600" y1="148" x2="810" y2="148" stroke="#2a2a2a" stroke-width="1"/>

  <text x="620" y="170" font-size="12" fill="#888">• window · location</text>
  <text x="620" y="192" font-size="12" fill="#888">• navigator · history</text>
  <text x="620" y="214" font-size="12" fill="#888">• setTimeout · fetch</text>
  <text x="620" y="236" font-size="12" fill="#888">• localStorage · cookie</text>
  <text x="620" y="258" font-size="12" fill="#888">• console · performance</text>

  <line x1="600" y1="272" x2="810" y2="272" stroke="#2a2a2a" stroke-width="1"/>
  <text x="620" y="294" font-size="12" fill="#666">각 브라우저 벤더 구현</text>
  <text x="620" y="314" font-size="12" fill="#666">Node.js에도 일부 이식</text>
  <text x="620" y="334" font-size="12" fill="#666">(fetch, setTimeout 등)</text>

  <rect x="608" y="352" width="194" height="64" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="620" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">window.location.href</text>
  <text x="620" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  = 'https://...';</text>
  <text x="620" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">navigator.language;</text>

  <!-- Bottom note -->
  <rect x="60" y="456" width="760" height="36" rx="6" fill="#0d1117" stroke="#2a2a2a"/>
  <text x="440" y="479" text-anchor="middle" font-size="12" fill="#888">ECMAScript = 언어의 핵심 명세 / DOM·BOM = 런타임(브라우저)이 제공하는 API — 세 가지를 합쳐 "JavaScript 생태계"라 부릅니다</text>

  <!-- Footer -->
  <text x="440" y="510" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
