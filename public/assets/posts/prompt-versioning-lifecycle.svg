<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">프롬프트 생명주기 관리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Draft → Review → Staging → Production → Archive</text>

  <!-- Stages -->
  <!-- Draft -->
  <rect x="60" y="98" width="130" height="56" rx="8" fill="#111827" stroke="#888" stroke-width="1.5"/>
  <text x="125" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">Draft</text>
  <text x="125" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">v0.1.0</text>

  <!-- Arrow -->
  <line x1="190" y1="126" x2="218" y2="126" stroke="#444" stroke-width="2"/>
  <polygon points="226,126 214,120 214,132" fill="#444"/>

  <!-- Review -->
  <rect x="226" y="98" width="130" height="56" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="291" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Review</text>
  <text x="291" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동료 검토 + 테스트</text>

  <!-- Arrow -->
  <line x1="356" y1="126" x2="384" y2="126" stroke="#444" stroke-width="2"/>
  <polygon points="392,126 380,120 380,132" fill="#444"/>

  <!-- Staging -->
  <rect x="392" y="98" width="130" height="56" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="457" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Staging</text>
  <text x="457" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">A/B 테스트</text>

  <!-- Arrow -->
  <line x1="522" y1="126" x2="550" y2="126" stroke="#444" stroke-width="2"/>
  <polygon points="558,126 546,120 546,132" fill="#444"/>

  <!-- Production -->
  <rect x="558" y="98" width="130" height="56" rx="8" fill="#0d2d0d" stroke="#55c555" stroke-width="2"/>
  <text x="623" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Production</text>
  <text x="623" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">실서비스 운영</text>

  <!-- Arrow -->
  <line x1="688" y1="126" x2="716" y2="126" stroke="#444" stroke-width="2"/>
  <polygon points="724,126 712,120 712,132" fill="#444"/>

  <!-- Archive -->
  <rect x="724" y="98" width="106" height="56" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="777" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#444">Archive</text>
  <text x="777" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#333">구 버전 보존</text>

  <!-- Rollback arrow -->
  <path d="M 558 154 Q 457 180 392 154" stroke="#e05555" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="392,154 404,148 400,162" fill="#e05555"/>
  <text x="475" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">롤백</text>

  <!-- Version file structure -->
  <rect x="60" y="208" width="760" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># prompts/v1.2.0/summarizer.yaml</text>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">version</text>
  <text x="148" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="160" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"1.2.0"</text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">name</text>
  <text x="124" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="136" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"document-summarizer"</text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">status</text>
  <text x="136" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="148" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">"production"</text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">model</text>
  <text x="130" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="142" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"claude-opus-4-7"</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">changelog</text>
  <text x="166" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="178" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"CoT 추가로 요약 품질 +12%"</text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">rollback_to</text>
  <text x="184" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="196" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"1.1.0"</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">template</text>
  <text x="156" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: |</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  다음 {doc_type}을 {style} 스타일로 요약하세요...</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">metrics</text>
  <text x="148" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: {rouge_l: </text>
  <text x="248" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0.82</text>
  <text x="272" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, latency_ms: </text>
  <text x="374" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1240</text>
  <text x="404" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # 성능 지표를 메타데이터로 함께 보관</text>
</svg>
