<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ExternalSecret 템플릿 변환</text>

  <!-- Left: External Secret store -->
  <rect x="50" y="62" width="340" height="280" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="220" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">AWS Secrets Manager 원본</text>
  <rect x="66" y="100" width="308" height="220" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># my-app/prod 에 저장된 JSON</text>
  <text x="82" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">{</text>
  <text x="82" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">  "db_host": </text>
  <text x="82" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">              "db.prod.svc",</text>
  <text x="82" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">  "db_port": </text>
  <text x="82" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">              "5432",</text>
  <text x="82" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">  "db_pass": </text>
  <text x="82" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">              "s3cr3t!",</text>
  <text x="82" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">  "api_key": </text>
  <text x="82" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">              "sk-1234567890"</text>
  <text x="82" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>
  <text x="82" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 4개 필드가 하나의 JSON에 저장</text>
  <text x="82" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># jmesPath로 개별 필드 추출 가능</text>

  <!-- Arrow -->
  <line x1="392" y1="202" x2="458" y2="202" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="458,196 470,202 458,208" fill="#7ec8e3"/>
  <text x="425" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ESO</text>
  <text x="425" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">변환</text>

  <!-- Right: K8s Secret -->
  <rect x="470" y="62" width="360" height="280" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">생성된 K8s Secret</text>
  <rect x="486" y="100" width="328" height="220" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="502" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># template.data로 변환된 결과</text>
  <text x="502" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">data:</text>
  <text x="502" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  DATABASE_URL: </text>
  <text x="502" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">    "postgres://db.prod.svc:5432"</text>
  <text x="502" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  DB_PASSWORD: </text>
  <text x="502" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">    "s3cr3t!"</text>
  <text x="502" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  OPENAI_API_KEY: </text>
  <text x="502" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">    "sk-1234567890"</text>
  <text x="502" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 앱이 직접 사용하는 형식으로 변환</text>

  <!-- Bottom note -->
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">template.data에서 Go 템플릿 문법으로 값 조합 및 변환 가능</text>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">예: DATABASE_URL: "postgres://{{ .db_host }}:{{ .db_port }}/mydb"</text>
</svg>
