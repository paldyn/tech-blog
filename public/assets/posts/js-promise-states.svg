<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">Promise 상태 전이 다이어그램</text>

  <!-- Pending box -->
  <rect x="60" y="160" width="180" height="80" rx="10" fill="#1a1a2e" stroke="#4444aa" stroke-width="1.5"/>
  <text x="150" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#8888ff" text-anchor="middle">Pending</text>
  <text x="150" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">대기 중</text>
  <text x="150" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">초기 상태</text>

  <!-- Fulfilled box -->
  <rect x="560" y="100" width="200" height="80" rx="10" fill="#0d2818" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="660" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4caf7d" text-anchor="middle">Fulfilled</text>
  <text x="660" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">이행됨</text>
  <text x="660" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">resolve(value) 호출</text>

  <!-- Rejected box -->
  <rect x="560" y="240" width="200" height="80" rx="10" fill="#2a0d0d" stroke="#7a2a2a" stroke-width="1.5"/>
  <text x="660" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05252" text-anchor="middle">Rejected</text>
  <text x="660" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">거부됨</text>
  <text x="660" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">reject(reason) 호출</text>

  <!-- Arrow: Pending -> Fulfilled -->
  <line x1="240" y1="185" x2="558" y2="145" stroke="#4caf7d" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="380" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#4caf7d" text-anchor="middle">.then() 핸들러 등록</text>

  <!-- Arrow: Pending -> Rejected -->
  <line x1="240" y1="215" x2="558" y2="270" stroke="#e05252" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="380" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05252" text-anchor="middle">.catch() 핸들러 등록</text>

  <!-- Settled label -->
  <rect x="540" y="78" width="240" height="268" rx="10" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="660" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">Settled (불변)</text>

  <!-- .finally() note -->
  <rect x="300" y="330" width="280" height="52" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#aaa" text-anchor="middle">.finally()</text>
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">이행·거부 상관없이 항상 실행</text>

  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4caf7d"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05252"/>
    </marker>
  </defs>
</svg>
