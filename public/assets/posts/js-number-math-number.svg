<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Number 정적 메서드와 상수</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">안전 정수 범위 · 파싱 · 포맷팅</text>

  <!-- Left: Constants -->
  <rect x="60" y="95" width="360" height="230" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Number 상수</text>
  <rect x="72" y="126" width="336" height="187" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="88" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Number.MAX_SAFE_INTEGER</text>
  <text x="88" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 9007199254740991 (2^53 - 1)</text>
  <text x="88" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Number.MIN_SAFE_INTEGER</text>
  <text x="88" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// -9007199254740991</text>
  <text x="88" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Number.EPSILON</text>
  <text x="88" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 2.220446049250313e-16</text>
  <text x="88" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Number.MAX_VALUE</text>
  <text x="88" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 1.7976931348623157e+308</text>
  <text x="88" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Number.POSITIVE_INFINITY</text>

  <!-- Right: Methods -->
  <rect x="460" y="95" width="360" height="230" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Number 인스턴스 메서드</text>
  <rect x="472" y="126" width="336" height="187" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="488" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 소수점 자리 고정</text>
  <text x="488" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text><text x="496" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">3.14159</text><text x="556" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">).toFixed(</text><text x="634" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2</text><text x="646" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">); </text><text x="668" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// '3.14'</text>
  <text x="488" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 유효 자릿수</text>
  <text x="488" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">(</tspan><tspan fill="#b5cea8">123.456</tspan><tspan fill="#e8e8e8">).toPrecision(</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// '123.5'</tspan></text>
  <text x="488" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 지수 표기</text>
  <text x="488" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text><text x="496" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">12345</text><text x="548" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">).toExponential(</text><text x="662" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2</text><text x="674" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">); </text><text x="694" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// '1.23e+4'</text>
  <text x="488" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 진수 변환</text>
  <text x="488" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text><text x="496" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">255</text><text x="526" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">).toString(</text><text x="606" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">16</text><text x="630" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">); </text><text x="654" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 'ff'</text>
  <text x="488" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">parseInt(</tspan><tspan fill="#ce9178">'ff'</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">16</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// 255</tspan></text>

  <!-- Bottom: EPSILON usage -->
  <rect x="60" y="344" width="760" height="110" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">EPSILON으로 부동소수점 비교</text>
  <rect x="72" y="374" width="736" height="68" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="88" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="162" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> almostEqual(a, b, eps = Number.EPSILON * </text><text x="464" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">100</text><text x="494" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">) {</text>
  <text x="88" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  return</text><text x="148" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Math.abs(a - b) &lt; eps;</text>
  <text x="88" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">}</tspan><tspan fill="#e8e8e8">almostEqual(</tspan><tspan fill="#b5cea8">0.1</tspan><tspan fill="#e8e8e8"> + </tspan><tspan fill="#b5cea8">0.2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">0.3</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// true</tspan></text>
  
</svg>
