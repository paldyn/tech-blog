<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">서명된 태그 구조</text>

  <!-- Annotated tag object -->
  <rect x="60" y="75" width="420" height="290" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="270" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">tag 오브젝트 (git cat-file -p v1.0.0)</text>

  <text xml:space="preserve" x="80" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">object</text><text xml:space="preserve" x="136" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> abc123def456...  (commit SHA)</text>
  <text xml:space="preserve" x="80" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">type</text><text xml:space="preserve" x="122" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> commit</text>
  <text xml:space="preserve" x="80" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">tag</text><text xml:space="preserve" x="108" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> v1.0.0</text>
  <text xml:space="preserve" x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">tagger</text><text xml:space="preserve" x="136" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Alice &lt;a@b.com&gt; 1716868800 +0900</text>

  <!-- Signature block -->
  <rect x="72" y="196" width="396" height="100" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text xml:space="preserve" x="82" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">-----BEGIN PGP SIGNATURE-----</text>
  <text xml:space="preserve" x="82" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">iQIzBAABCAAdFiEEKVN/...</text>
  <text xml:space="preserve" x="82" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">ABCDEFGHIJKLMNopqrst...</text>
  <text xml:space="preserve" x="82" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">-----END PGP SIGNATURE-----</text>

  <text xml:space="preserve" x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">Release 1.0.0 - stable</text>
  <text xml:space="preserve" x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">Includes security fixes</text>

  <!-- Right: Commands -->
  <rect x="510" y="75" width="310" height="290" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="665" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">서명 태그 명령</text>

  <text xml:space="preserve" x="530" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 서명 annotated 태그</text>
  <text xml:space="preserve" x="530" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">git tag</text><text xml:space="preserve" x="586" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> -s v1.0.0</text>

  <text xml:space="preserve" x="530" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 메시지 직접 지정</text>
  <text xml:space="preserve" x="530" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">git tag</text><text xml:space="preserve" x="586" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> -s v1.0.0 -m</text>
  <text xml:space="preserve" x="530" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  "Release 1.0.0"</text>

  <text xml:space="preserve" x="530" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 서명 검증</text>
  <text xml:space="preserve" x="530" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">git verify-tag</text><text xml:space="preserve" x="642" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> v1.0.0</text>

  <text xml:space="preserve" x="530" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 서명 상태 목록</text>
  <text xml:space="preserve" x="530" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">git tag</text><text xml:space="preserve" x="586" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> -v v1.0.0</text>

  <text xml:space="preserve" x="530" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 자동 서명 설정</text>
  <text xml:space="preserve" x="530" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">git config</text>
  <text xml:space="preserve" x="530" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  --global tag.gpgsign true</text>

  <!-- Note -->
  <text x="440" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">서명 태그는 annotated 태그에만 적용 | lightweight 태그에는 서명 불가</text>
</svg>
