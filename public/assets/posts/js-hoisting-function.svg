<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="530" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">함수 호이스팅 — 선언식 vs 표현식</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">선언식은 통째로, 표현식은 변수만 — 결과가 전혀 다르다</text>

  <!--
    3 columns: x=60 w=240, x=320 w=240, x=580 w=240
    Gaps: 20px each
    Right edge: 580+240=820, margin=60 ✓
  -->

  <!-- Column 1: 함수 선언식 (green) -->
  <rect x="60" y="104" width="240" height="308" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="128" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">함수 선언식</text>
  <text x="180" y="146" font-size="11" fill="#4a8a5a" text-anchor="middle">전체가 호이스트됨</text>

  <rect x="78" y="158" width="204" height="190" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- y base=178, spacing=18: 178,196,214,232,250,268,286,304,322 -->
  <text x="94" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 선언 전에 호출 가능</text>
  <text x="94" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">greet(); // "Hello!" ✓</text>
  <text x="94" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">function greet() {</text>
  <text x="94" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  return "Hello!";</text>
  <text x="94" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="94" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 함수 몸체 전체 호이스트</text>
  <text x="94" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">// → 정상 동작</text>

  <text x="78" y="368" font-size="12" fill="#55c555">✓ 선언 전 어디서든 호출 가능</text>
  <text x="78" y="386" font-size="12" fill="#888">함수 전체가 스코프 최상단으로</text>

  <!-- Column 2: var 함수 표현식 (orange) -->
  <rect x="320" y="104" width="240" height="308" fill="#1a1000" rx="8" stroke="#e8a53f" stroke-width="1"/>
  <text x="440" y="128" font-size="13" font-weight="700" fill="#e8a53f" text-anchor="middle">var 함수 표현식</text>
  <text x="440" y="146" font-size="11" fill="#8a6030" text-anchor="middle">변수만 undefined로 호이스트</text>

  <rect x="338" y="158" width="204" height="190" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="354" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// TypeError 발생!</text>
  <text x="354" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">show(); // TypeError!</text>
  <text x="354" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="354" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a53f">var show = function() {</text>
  <text x="354" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  return "Hi";</text>
  <text x="354" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">};</text>
  <text x="354" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="354" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// var show → undefined</text>
  <text x="354" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a53f">// undefined() → TypeError</text>

  <text x="338" y="368" font-size="12" fill="#e8a53f">! var는 선언만 호이스트</text>
  <text x="338" y="386" font-size="12" fill="#888">함수는 아직 undefined 상태</text>

  <!-- Column 3: const 함수 표현식 (red) -->
  <rect x="580" y="104" width="240" height="308" fill="#1a0808" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="700" y="128" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">const 함수 표현식</text>
  <text x="700" y="146" font-size="11" fill="#8a3030" text-anchor="middle">TDZ — 접근 자체가 에러</text>

  <rect x="598" y="158" width="204" height="190" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="614" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// ReferenceError 발생!</text>
  <text x="614" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">display(); // ReferenceError</text>
  <text x="614" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="614" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const display = () => {</text>
  <text x="614" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  return "Hi";</text>
  <text x="614" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">};</text>
  <text x="614" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="614" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// TDZ에 갇혀 있음</text>
  <text x="614" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// → ReferenceError</text>

  <text x="598" y="368" font-size="12" fill="#e05555">✗ TDZ: 선언 전 접근 불가</text>
  <text x="598" y="386" font-size="12" fill="#888">let/const는 TDZ 진입 후 에러</text>

  <!-- Summary box -->
  <rect x="60" y="418" width="760" height="56" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="440" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">핵심 차이</text>
  <text x="440" y="460" font-size="12" fill="#888" text-anchor="middle">함수 선언식 → 전체 호이스트 (호출 가능) · var 표현식 → undefined (TypeError) · let/const 표현식 → TDZ (ReferenceError)</text>

  <!-- Footer -->
  <text x="60" y="498" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part II — 호이스팅의 본질</text>
</svg>
