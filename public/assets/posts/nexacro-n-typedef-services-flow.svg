  <text x="50" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">Service.xml에 등록된 id를 transaction() 두 번째 인자로 전달해 서버를 호출한다</text>
