<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">퀵셀렉트 (Quickselect)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">정렬 없이 k번째 작은 원소를 평균 O(N)에 탐색</text>

  <!-- Step 1: Initial array -->
  <text x="80" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Step 1: 피벗 선택 및 파티션</text>

  <!-- Array boxes - initial -->
  <!-- Elements: 3 1 4 1 5 9 2 6, k=4 (4번째 작은) -->
  <!-- Each element box: 60x40 -->
  <g id="arr1">
    <!-- Element boxes -->
    <rect x="80" y="112" width="54" height="40" rx="4" fill="#222" stroke="#444"/>
    <text x="107" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
          font-size="16" fill="#e8e8e8" text-anchor="middle">3</text>

    <rect x="138" y="112" width="54" height="40" rx="4" fill="#222" stroke="#444"/>
    <text x="165" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
          font-size="16" fill="#e8e8e8" text-anchor="middle">1</text>

    <rect x="196" y="112" width="54" height="40" rx="4" fill="#222" stroke="#444"/>
    <text x="223" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
          font-size="16" fill="#e8e8e8" text-anchor="middle">4</text>

    <rect x="254" y="112" width="54" height="40" rx="4" fill="#222" stroke="#444"/>
    <text x="281" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
          font-size="16" fill="#e8e8e8" text-anchor="middle">1</text>

    <!-- pivot = 5 (index 4) -->
    <rect x="312" y="112" width="54" height="40" rx="4" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
    <text x="339" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
          font-size="16" fill="#55c555" text-anchor="middle">5</text>

    <rect x="370" y="112" width="54" height="40" rx="4" fill="#222" stroke="#444"/>
    <text x="397" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
          font-size="16" fill="#e8e8e8" text-anchor="middle">9</text>

    <rect x="428" y="112" width="54" height="40" rx="4" fill="#222" stroke="#444"/>
    <text x="455" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
          font-size="16" fill="#e8e8e8" text-anchor="middle">2</text>

    <rect x="486" y="112" width="54" height="40" rx="4" fill="#222" stroke="#444"/>
    <text x="513" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
          font-size="16" fill="#e8e8e8" text-anchor="middle">6</text>
  </g>

  <text x="339" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">pivot=5</text>
  <text x="700" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">찾는 값: k=4번째</text>

  <!-- Arrow down -->
  <line x1="300" y1="180" x2="300" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Step 2: After partition -->
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Step 2: 파티션 결과 — pivot 위치 = 4</text>

  <!-- Left of pivot (< 5): 3,1,4,1,2 => indices 0-4 -->
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">피벗보다 작음</text>
  <rect x="80" y="264" width="54" height="40" rx="4" fill="#0d1f2e" stroke="#7ec8e3"/>
  <text x="107" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">1</text>
  <rect x="138" y="264" width="54" height="40" rx="4" fill="#0d1f2e" stroke="#7ec8e3"/>
  <text x="165" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">1</text>
  <rect x="196" y="264" width="54" height="40" rx="4" fill="#0d1f2e" stroke="#7ec8e3"/>
  <text x="223" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">2</text>
  <rect x="254" y="264" width="54" height="40" rx="4" fill="#0d1f2e" stroke="#7ec8e3"/>
  <text x="281" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">3</text>
  <rect x="312" y="264" width="54" height="40" rx="4" fill="#0d1f2e" stroke="#7ec8e3"/>
  <text x="339" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">4</text>

  <!-- Pivot -->
  <rect x="374" y="264" width="54" height="40" rx="4" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <text x="401" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">5</text>
  <text x="401" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">idx=5</text>

  <!-- Right of pivot (> 5): 6,9 -->
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">피벗보다 큼</text>
  <rect x="432" y="264" width="54" height="40" rx="4" fill="#1f0d0d" stroke="#e05555"/>
  <text x="459" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" text-anchor="middle">6</text>
  <rect x="490" y="264" width="54" height="40" rx="4" fill="#1f0d0d" stroke="#e05555"/>
  <text x="517" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" text-anchor="middle">9</text>

  <!-- Decision -->
  <rect x="600" y="255" width="240" height="60" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">k=4, pivot_idx=5</text>
  <text x="720" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">k &lt; pivot_idx</text>
  <text x="720" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">→ 왼쪽만 재귀</text>

  <!-- Arrow down -->
  <line x1="220" y1="312" x2="220" y2="350" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Step 3 result -->
  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Step 3: 왼쪽 [1,1,2,3,4] 에서 k=4번째 탐색 → 정답 4</text>

  <!-- Complexity table -->
  <rect x="60" y="400" width="760" height="80" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">시간 복잡도</text>

  <text x="160" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">평균: O(N)</text>
  <text x="160" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">랜덤 피벗 시 기댓값</text>

  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">최악: O(N²)</text>
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">피벗이 항상 최소/최대일 때</text>

  <text x="720" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">Median of Medians: O(N)</text>
  <text x="720" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">결정론적 선형 시간 보장</text>
</svg>
