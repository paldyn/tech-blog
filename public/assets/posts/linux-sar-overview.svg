<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">sar — 시스템 활동 기록과 조회</text>

  <!-- Defs -->
  <defs>
    <marker id="sarr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- sadc (collector) -->
  <rect x="340" y="72" width="200" height="52" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="94" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">sadc</text>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">데이터 수집기 (sysstat)</text>

  <!-- Arrow down to sa files -->
  <line x1="440" y1="124" x2="440" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#sarr)"/>

  <!-- /var/log/sa/ files -->
  <rect x="310" y="158" width="260" height="52" rx="8" fill="#0d1205" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="180" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">/var/log/sa/saDD</text>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일별 이진 데이터 파일</text>

  <!-- Arrow to sar command -->
  <line x1="440" y1="210" x2="440" y2="244" stroke="#7ec8e3" stroke-width="2" marker-end="url(#sarr)"/>

  <!-- sar command -->
  <rect x="340" y="244" width="200" height="52" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="266" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">sar</text>
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">히스토리 조회 / 실시간</text>

  <!-- Left: common sar options -->
  <rect x="60" y="120" width="245" height="196" rx="8" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="182" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">주요 옵션</text>
  <text x="80" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">sar -u 1 5</text>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  CPU 사용률 실시간</text>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">sar -r 1 5</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  메모리 사용률</text>
  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">sar -d 1 5</text>
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  디스크 I/O</text>
  <text x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">sar -n DEV 1 5</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  네트워크 인터페이스</text>

  <!-- Right: historical query -->
  <rect x="575" y="120" width="245" height="196" rx="8" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="697" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">히스토리 조회</text>
  <text x="595" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">sar -u -f /var/log/sa/sa18</text>
  <text x="595" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  18일 CPU 히스토리</text>
  <text x="595" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">sar -u -s 10:00 -e 12:00</text>
  <text x="595" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  시간 범위 필터</text>
  <text x="595" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">sar -A -f sa18</text>
  <text x="595" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  모든 지표 출력</text>
  <text x="595" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">sadf -d sa18 -- -u</text>
  <text x="595" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  CSV 형식 출력</text>

  <!-- Bottom note -->
  <rect x="60" y="340" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 수집 활성화 (Ubuntu): </text>
  <text x="274" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">sed -i 's/ENABLED="false"/ENABLED="true"/' /etc/default/sysstat</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">systemctl enable --now sysstat</text>
</svg>
