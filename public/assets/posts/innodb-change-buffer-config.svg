<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Change Buffer 설정과 모니터링</text>

  <!-- SQL block -->
  <rect x="60" y="70" width="500" height="210" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="96" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- 활성화 범위 설정</text>
  <text x="76" y="114" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- all: 모든 DML (기본값)</text>
  <text x="76" y="132" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- inserts, deletes, purges, changes, none</text>
  <text x="76" y="150" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">SET</text>
  <text x="110" y="150" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve"> GLOBAL innodb_change_buffering = </text>
  <text x="430" y="150" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">'all'</text>

  <text x="76" y="174" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- Buffer Pool 중 최대 비율 (기본 25%)</text>
  <text x="76" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">SET</text>
  <text x="110" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve"> GLOBAL innodb_change_buffer_max_size = </text>
  <text x="490" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" xml:space="preserve">25</text>

  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- Change Buffer 상태 통계</text>
  <text x="76" y="234" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">SHOW</text>
  <text x="118" y="234" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve"> STATUS </text>
  <text x="208" y="234" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">LIKE</text>
  <text x="250" y="234" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve"> 'Innodb_ibuf%'</text>
  <text x="76" y="252" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- ibuf_merges: 병합 횟수</text>
  <text x="76" y="270" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- ibuf_merged: 병합된 변경 수</text>

  <!-- When to tune -->
  <rect x="580" y="70" width="260" height="210" rx="6" fill="#111827" stroke="#2a2a40"/>
  <text x="710" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">조정 가이드</text>

  <text x="596" y="122" font-size="13" fill="#55c555">쓰기 집중 OLTP</text>
  <text x="596" y="140" font-size="12" fill="#888">max_size 25~50% 유지</text>

  <line x1="596" y1="152" x2="828" y2="152" stroke="#2a2a40" stroke-width="0.5"/>

  <text x="596" y="172" font-size="13" fill="#7ec8e3">읽기 위주 OLAP</text>
  <text x="596" y="190" font-size="12" fill="#888">max_size 줄이거나 none</text>

  <line x1="596" y1="202" x2="828" y2="202" stroke="#2a2a40" stroke-width="0.5"/>

  <text x="596" y="222" font-size="13" fill="#e05555">SSD 고속 스토리지</text>
  <text x="596" y="240" font-size="12" fill="#888">Change Buffer 효과 상대적 감소</text>
  <text x="596" y="256" font-size="12" fill="#888">none 고려 가능</text>
  <text x="596" y="272" font-size="12" fill="#888">(랜덤 I/O 비용 낮음)</text>

  <!-- Bottom note -->
  <rect x="60" y="300" width="760" height="44" rx="6" fill="#111520" stroke="#2a2a40"/>
  <text x="440" y="326" text-anchor="middle" font-size="13" fill="#888">Change Buffer는 ibdata1(시스템 테이블스페이스) 내에 저장됩니다. innodb_file_per_table과 별개로 ibdata1이 필요합니다.</text>
</svg>
