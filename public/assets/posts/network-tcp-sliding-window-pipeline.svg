<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="aps" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="apg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">슬라이딩 윈도우: 파이프라인 전송</text>

  <!-- Stop-and-Wait vs Sliding Window comparison -->
  <text x="220" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">Stop-and-Wait (비효율)</text>

  <text x="660" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Sliding Window (효율)</text>

  <!-- Stop-and-Wait timeline -->
  <!-- Seg 1 -->
  <line x1="80" y1="100" x2="320" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aps)"/>
  <text x="200" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">Seg 1</text>
  <!-- ACK 1 -->
  <line x1="320" y1="145" x2="80" y2="170" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#apg)"/>
  <text x="200" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">wait...</text>
  <!-- Seg 2 (only after ACK) -->
  <line x1="80" y1="180" x2="320" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aps)"/>
  <text x="200" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">Seg 2</text>
  <line x1="320" y1="225" x2="80" y2="250" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#apg)"/>
  <text x="200" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">wait...</text>
  <!-- Seg 3 -->
  <line x1="80" y1="260" x2="320" y2="290" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aps)"/>
  <text x="200" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">Seg 3</text>

  <!-- Idle time indication -->
  <rect x="60" y="132" width="60" height="46" rx="2" fill="#1a0808" stroke="#3a1a1a" stroke-width="1"/>
  <text x="90" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e05555">idle</text>
  <text x="90" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e05555">time</text>
  <rect x="60" y="212" width="60" height="46" rx="2" fill="#1a0808" stroke="#3a1a1a" stroke-width="1"/>
  <text x="90" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e05555">idle</text>
  <text x="90" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e05555">time</text>

  <!-- Divider -->
  <line x1="440" y1="70" x2="440" y2="360" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Sliding Window timeline -->
  <!-- Multiple segments in-flight -->
  <line x1="500" y1="100" x2="740" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aps)"/>
  <text x="610" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">Seg 1</text>

  <line x1="500" y1="115" x2="740" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aps)"/>
  <text x="610" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">Seg 2</text>

  <line x1="500" y1="130" x2="740" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aps)"/>
  <text x="610" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">Seg 3</text>

  <line x1="500" y1="145" x2="740" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aps)"/>
  <text x="610" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">Seg 4</text>

  <!-- ACKs coming back while sending more -->
  <line x1="740" y1="140" x2="514" y2="165" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#apg)"/>
  <text x="620" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">ACK1</text>

  <line x1="500" y1="175" x2="740" y2="198" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aps)"/>
  <text x="610" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">Seg 5 (window 슬라이드)</text>

  <line x1="740" y1="158" x2="514" y2="185" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#apg)"/>
  <text x="638" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">ACK2</text>

  <line x1="500" y1="195" x2="740" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aps)"/>
  <text x="610" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">Seg 6</text>

  <!-- No idle time -->
  <rect x="480" y="130" width="50" height="54" rx="2" fill="#0a1a0a" stroke="#1a3a1a" stroke-width="1"/>
  <text x="505" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#55c555">no</text>
  <text x="505" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#55c555">idle</text>
  <text x="505" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#55c555">time</text>

  <!-- Window visualization -->
  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">송신 윈도우 구조</text>

  <!-- Byte stream blocks -->
  <rect x="60" y="396" width="80" height="40" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="100" y="421" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">전송+ACK</text>

  <rect x="142" y="396" width="160" height="40" rx="4" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="222" y="411" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">전송됨</text>
  <text x="222" y="427" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">(ACK 대기 중)</text>

  <rect x="304" y="396" width="160" height="40" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="384" y="411" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">전송 가능</text>
  <text x="384" y="427" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">(윈도우 내)</text>

  <rect x="466" y="396" width="120" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="526" y="421" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">윈도우 밖</text>

  <!-- Window bracket -->
  <line x1="142" y1="444" x2="464" y2="444" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="142" y1="440" x2="142" y2="448" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="464" y1="440" x2="464" y2="448" stroke="#7ec8e3" stroke-width="2"/>
  <text x="303" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">송신 윈도우 = min(rwnd, cwnd)</text>

  <!-- Utilization note -->
  <rect x="600" y="396" width="220" height="80" rx="6" fill="#1a1a0a" stroke="#3a3a1a" stroke-width="1"/>
  <text x="710" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">링크 활용률</text>
  <text x="710" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Stop-and-Wait: RTT에 묶임</text>
  <text x="710" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Sliding Window:</text>
  <text x="710" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Window / RTT = 처리량</text>
</svg>
