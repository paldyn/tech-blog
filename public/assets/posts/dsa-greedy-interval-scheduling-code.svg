<svg width="880" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">구간 스케줄링 — Python 구현</text>

  <!-- Code block -->
  <text x="60" y="82" font-size="16" font-weight="600" fill="#e8e8e8">알고리즘 코드</text>
  <rect x="60" y="96" width="440" height="290" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def</text>
  <text x="114" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> interval_scheduling(intervals):</text>
  <text x="80" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">  # Sort by end time</text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  intervals.sort(</text>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    key=</text>
  <text x="130" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lambda</text>
  <text x="187" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> x: x[</text>
  <text x="233" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="241" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">])</text>
  <text x="80" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  selected = []</text>
  <text x="80" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  last_end = -</text>
  <text x="183" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="80" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  for</text>
  <text x="111" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> start, end </text>
  <text x="211" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">in</text>
  <text x="232" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> intervals:</text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    if</text>
  <text x="111" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> start &gt;= last_end:</text>
  <text x="80" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      selected.append(</text>
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        (start, end))</text>
  <text x="80" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      last_end = end</text>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text>
  <text x="138" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> selected</text>

  <!-- Right: complexity and key points -->
  <text x="540" y="82" font-size="16" font-weight="600" fill="#e8e8e8">알고리즘 분석</text>

  <!-- Complexity box -->
  <rect x="540" y="96" width="280" height="90" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="680" y="120" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">시간 / 공간 복잡도</text>
  <text x="560" y="146" font-size="13" fill="#e8e8e8">정렬: O(N log N)</text>
  <text x="560" y="166" font-size="13" fill="#e8e8e8">탐색: O(N)</text>
  <text x="560" y="178" font-size="13" fill="#888">공간: O(1) 추가 공간</text>

  <!-- Key insight box -->
  <rect x="540" y="205" width="280" height="110" rx="8" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="228" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">핵심 아이디어</text>
  <text x="560" y="252" font-size="13" fill="#e8e8e8">종료 시간이 빠를수록</text>
  <text x="560" y="272" font-size="13" fill="#e8e8e8">이후 구간에게 더 많은</text>
  <text x="560" y="292" font-size="13" fill="#e8e8e8">시간을 남겨줌 → 최적</text>
  <text x="560" y="306" font-size="12" fill="#888">탐욕 선택 속성 성립</text>

  <!-- Correctness proof box -->
  <rect x="540" y="330" width="280" height="90" rx="8" fill="#1a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="353" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">정확성 증명 (교환 논증)</text>
  <text x="560" y="376" font-size="13" fill="#e8e8e8">최적해의 첫 선택을</text>
  <text x="560" y="396" font-size="13" fill="#e8e8e8">탐욕 선택으로 교환해도</text>
  <text x="560" y="412" font-size="13" fill="#888">나머지 수 감소하지 않음</text>

  <!-- Time O(N log N) note -->
  <text x="60" y="410" font-size="13" fill="#9aa4b8">&#35; Time: O(N log N)</text>
  <text x="60" y="430" font-size="13" fill="#9aa4b8">&#35; Space: O(1)</text>
</svg>
