<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">T-SQL 주요 데이터 타입 &amp; 특수 문법</text>

  <!-- Data types section -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">T-SQL 전용 데이터 타입</text>

  <!-- uniqueidentifier -->
  <rect x="60" y="96" width="220" height="64" rx="6" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">uniqueidentifier</text>
  <text x="170" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">16바이트 GUID / UUID</text>
  <text x="170" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">NEWID() / NEWSEQUENTIALID()</text>

  <!-- datetime2 -->
  <rect x="300" y="96" width="220" height="64" rx="6" fill="#0f1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="410" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">datetime2(n)</text>
  <text x="410" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">7자리 소수 초 지원</text>
  <text x="410" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">datetime보다 정밀도 높음</text>

  <!-- nvarchar(max) -->
  <rect x="540" y="96" width="220" height="64" rx="6" fill="#0f1520" stroke="#e0a040" stroke-width="1.5"/>
  <text x="650" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a040" text-anchor="middle">nvarchar(max)</text>
  <text x="650" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">최대 2GB 유니코드</text>
  <text x="650" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TEXT/NTEXT 대체</text>

  <!-- Code block 1: schema usage -->
  <rect x="60" y="178" width="760" height="136" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 스키마, 식별자, 시스템 함수</text>
  <text xml:space="preserve" x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8">-- 식별자 구분자: 대괄호 [] 또는 쌍따옴표 ""</tspan></text>
  <text xml:space="preserve" x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> [Order ID], [From], [User Name] </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> dbo.[Orders 2024];</tspan></text>
  <text xml:space="preserve" x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 4부분 이름: server.database.schema.object</text>
  <text xml:space="preserve" x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> [LinkServer].[SalesDB].[dbo].[Customers];</tspan></text>
  <text xml:space="preserve" x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 유니코드 문자열 리터럴</text>
  <text xml:space="preserve" x="80" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">INSERT INTO</tspan><tspan fill="#ffffff"> names </tspan><tspan fill="#7ec8e3" font-weight="600">VALUES</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ce9178">N'홍길동'</tspan><tspan fill="#ffffff">);  </tspan><tspan fill="#9aa4b8">-- N 접두사 필수</tspan></text>

  <!-- Code block 2: system functions -->
  <rect x="60" y="332" width="760" height="128" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- T-SQL 유용한 시스템 함수</text>
  <text xml:space="preserve" x="80" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> @@SERVERNAME, @@VERSION, @@ROWCOUNT, @@IDENTITY;</tspan></text>
  <text xml:space="preserve" x="80" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> SCOPE_IDENTITY();   </tspan><tspan fill="#9aa4b8">-- 현재 스코프 마지막 IDENTITY 값</tspan></text>
  <text xml:space="preserve" x="80" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> DB_NAME(), SCHEMA_NAME(), USER_NAME();</tspan></text>
  <text xml:space="preserve" x="80" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> LEN(</tspan><tspan fill="#ce9178">'hello'</tspan><tspan fill="#ffffff">),  CHARINDEX(</tspan><tspan fill="#ce9178">'l'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'hello'</tspan><tspan fill="#ffffff">), SUBSTRING(</tspan><tspan fill="#ce9178">'hello'</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">);</tspan></text>
  <text xml:space="preserve" x="80" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> FORMAT(GETDATE(), </tspan><tspan fill="#ce9178">'yyyy-MM-dd HH:mm'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'ko-KR'</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">-- 로캘 포맷</tspan></text>
</svg>
