  <line x1="280" y1="155" x2="330" y2="155" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#lrArr)"/>
  <line x1="550" y1="155" x2="600" y2="155" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#lrArr)"/>

  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
