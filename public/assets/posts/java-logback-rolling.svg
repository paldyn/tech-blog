  <rect x="330" y="120" width="220" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">app-2026-06-20.0.gz</text>
  <text x="440" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
