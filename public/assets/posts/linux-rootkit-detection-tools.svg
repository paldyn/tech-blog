<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">루트킷 탐지 도구 비교</text>

  <!-- rkhunter -->
  <rect x="60" y="72" width="180" height="130" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">rkhunter</text>
  <text x="150" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 해시 기반 검사</text>
  <text x="150" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 알려진 루트킷 DB</text>
  <text x="150" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 숨김 파일/포트 검사</text>
  <text x="150" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">★ 종합 검사</text>

  <!-- chkrootkit -->
  <rect x="260" y="72" width="180" height="130" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="350" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">chkrootkit</text>
  <text x="350" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 프로세스 숨김 감지</text>
  <text x="350" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 시스템 바이너리 검사</text>
  <text x="350" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 셸 명령 위변조 탐지</text>
  <text x="350" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">★ 빠른 스캔</text>

  <!-- AIDE -->
  <rect x="460" y="72" width="180" height="130" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="550" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">AIDE</text>
  <text x="550" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 파일 무결성 모니터링</text>
  <text x="550" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• SHA 해시 DB 구축</text>
  <text x="550" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 변경 파일 추적</text>
  <text x="550" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">★ FIM 특화</text>

  <!-- Lynis -->
  <rect x="660" y="72" width="160" height="130" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Lynis</text>
  <text x="740" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 보안 감사 전반</text>
  <text x="740" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 취약점 진단</text>
  <text x="740" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 설정 검토</text>
  <text x="740" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">★ 시스템 감사</text>

  <!-- 탐지 레이어 다이어그램 -->
  <text x="440" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">루트킷 탐지 레이어</text>

  <!-- Layer 1: 파일시스템 -->
  <rect x="60" y="252" width="760" height="48" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">파일시스템 레이어</text>
  <text x="440" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">바이너리 해시 검사 · 숨김 파일 탐지 · SUID/SGID 비정상 검사 (rkhunter, AIDE)</text>

  <!-- Layer 2: 프로세스 -->
  <rect x="60" y="310" width="760" height="48" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">프로세스 레이어</text>
  <text x="440" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ps vs /proc 불일치 · 숨겨진 PID · 커널 스레드 위장 탐지 (chkrootkit)</text>

  <!-- Layer 3: 네트워크 -->
  <rect x="60" y="368" width="760" height="48" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">네트워크 레이어</text>
  <text x="440" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">숨겨진 포트 · promiscuous 모드 NIC · 비정상 연결 탐지 (rkhunter, ss/netstat)</text>

  <!-- Layer 4: 커널 -->
  <rect x="60" y="426" width="760" height="48" rx="6" fill="#0a1420" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">커널 레이어</text>
  <text x="440" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">syscall 테이블 변조 · LKM 루트킷 · /proc 가상 파일시스템 조작 (chkrootkit, 수동 lsmod)</text>
</svg>
