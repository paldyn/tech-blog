<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">첫 TypeScript 프로그램 해부</text>
  <!-- Code block -->
  <rect x="60" y="70" width="450" height="360" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="76" dy="0" fill="#9aa4b8">// index.ts</tspan>
    <tspan x="76" dy="22" fill="#7ec8e3" font-weight="600">interface</tspan><tspan fill="#ffffff"> User {</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  id: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  email: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="76" dy="20" fill="#ffffff">}</tspan>
    <tspan x="76" dy="26" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> greetUser(user: User): </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> {</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">`Hello, ${user.name}!`</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="76" dy="20" fill="#ffffff">}</tspan>
    <tspan x="76" dy="26" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> alice: User = {</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  id: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  name: </tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">,</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  email: </tspan><tspan fill="#ce9178">"alice@example.com"</tspan><tspan fill="#ffffff">,</tspan>
    <tspan x="76" dy="20" fill="#ffffff">};</tspan>
    <tspan x="76" dy="26" fill="#ffffff">console.log(greetUser(alice));</tspan>
  </text>
  <!-- Annotation callouts - right side -->
  <rect x="540" y="80" width="300" height="56" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="556" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">① interface User</text>
  <text x="556" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">객체 모양을 타입으로 정의</text>
  <text x="556" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컴파일 후 완전히 제거됨</text>
  <line x1="510" y1="108" x2="540" y2="108" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="540" y="158" width="300" height="56" rx="8" fill="#0a0a1a" stroke="#55c555" stroke-width="1"/>
  <text x="556" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">② 매개변수 타입 주석</text>
  <text x="556" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">user: User — 인자 타입 명시</text>
  <text x="556" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">반환 타입 string 명시</text>
  <line x1="510" y1="230" x2="540" y2="186" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="540" y="236" width="300" height="56" rx="8" fill="#0a0a1a" stroke="#ce9178" stroke-width="1"/>
  <text x="556" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">③ 타입 할당</text>
  <text x="556" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">변수에 타입 명시: alice: User</text>
  <text x="556" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">누락 속성 시 컴파일 오류</text>
  <line x1="510" y1="330" x2="540" y2="266" stroke="#ce9178" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="540" y="314" width="300" height="56" rx="8" fill="#0a0a1a" stroke="#f0db4f" stroke-width="1"/>
  <text x="556" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#f0db4f">④ 템플릿 리터럴</text>
  <text x="556" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JS 기능 그대로 동작</text>
  <text x="556" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 확인만 추가됨</text>
  <!-- Output box -->
  <rect x="60" y="450" width="760" height="10" rx="4" fill="#0a1a0a"/>
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">출력: "Hello, Alice!"</text>
</svg>
