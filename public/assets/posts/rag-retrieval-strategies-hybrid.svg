<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="34" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">하이브리드 검색 아키텍처</text>

  <!-- Input: 쿼리 -->
  <rect x="360" y="54" width="160" height="50" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">쿼리 입력</text>
  <text x="440" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자 자연어 질문</text>

  <!-- Split arrow left -->
  <line x1="360" y1="79" x2="240" y2="79" stroke="#555" stroke-width="2"/>
  <line x1="240" y1="79" x2="240" y2="130" stroke="#555" stroke-width="2"/>
  <polygon points="234,130 240,144 246,130" fill="#555"/>

  <!-- Split arrow right -->
  <line x1="520" y1="79" x2="640" y2="79" stroke="#555" stroke-width="2"/>
  <line x1="640" y1="79" x2="640" y2="130" stroke="#555" stroke-width="2"/>
  <polygon points="634,130 640,144 646,130" fill="#555"/>

  <!-- Left branch: BM25 -->
  <rect x="100" y="144" width="280" height="64" rx="8" fill="#111520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">BM25 검색</text>
  <text x="240" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">역색인 키워드 매칭</text>
  <text x="240" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Elasticsearch · BM25Retriever</text>

  <!-- Arrow down left -->
  <line x1="240" y1="208" x2="240" y2="240" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="234,240 240,254 246,240" fill="#7ec8e3"/>

  <!-- Sparse results -->
  <rect x="100" y="254" width="280" height="52" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">스파스 결과</text>
  <text x="240" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Top-K 문서 + BM25 점수</text>

  <!-- Right branch: 벡터 검색 -->
  <rect x="500" y="144" width="280" height="64" rx="8" fill="#111520" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">벡터 검색</text>
  <text x="640" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">임베딩 코사인 유사도</text>
  <text x="640" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">pgvector · Qdrant · Pinecone</text>

  <!-- Arrow down right -->
  <line x1="640" y1="208" x2="640" y2="240" stroke="#55c555" stroke-width="2"/>
  <polygon points="634,240 640,254 646,240" fill="#55c555"/>

  <!-- Dense results -->
  <rect x="500" y="254" width="280" height="52" rx="8" fill="#0e1a0e" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">밀집 결과</text>
  <text x="640" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Top-K 문서 + 유사도 점수</text>

  <!-- Arrows to RRF -->
  <line x1="240" y1="306" x2="240" y2="328" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="240" y1="328" x2="380" y2="328" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="380,322 394,328 380,334" fill="#7ec8e3"/>

  <line x1="640" y1="306" x2="640" y2="328" stroke="#55c555" stroke-width="2"/>
  <line x1="640" y1="328" x2="500" y2="328" stroke="#55c555" stroke-width="2"/>
  <polygon points="500,322 486,328 500,334" fill="#55c555"/>

  <!-- RRF box -->
  <rect x="310" y="310" width="260" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="333" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">RRF 융합</text>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">score = Σ 1/(k + rank_i)  · k=60</text>
</svg>
