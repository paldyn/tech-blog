<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">자주 쓰는 React 이벤트 타입</text>
  <text x="60" y="78" font-size="13" fill="#888">이벤트 종류 × 엘리먼트 타입을 제네릭으로 묶는다</text>

  <!-- row 1 -->
  <rect x="60" y="100" width="370" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" font-size="14" font-weight="600" fill="#7ec8e3">onChange</text>
  <text x="76" y="152" font-size="13" fill="#ffffff">ChangeEvent&lt;HTMLInputElement&gt;</text>
  <text x="76" y="172" font-size="13" fill="#9aa4b8">e.target.value 접근</text>

  <rect x="450" y="100" width="370" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="128" font-size="14" font-weight="600" fill="#55c555">onClick</text>
  <text x="466" y="152" font-size="13" fill="#ffffff">MouseEvent&lt;HTMLButtonElement&gt;</text>
  <text x="466" y="172" font-size="13" fill="#9aa4b8">e.clientX, e.currentTarget</text>

  <!-- row 2 -->
  <rect x="60" y="194" width="370" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="222" font-size="14" font-weight="600" fill="#e05555">onSubmit</text>
  <text x="76" y="246" font-size="13" fill="#ffffff">FormEvent&lt;HTMLFormElement&gt;</text>
  <text x="76" y="266" font-size="13" fill="#9aa4b8">e.preventDefault()</text>

  <rect x="450" y="194" width="370" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="222" font-size="14" font-weight="600" fill="#7777cc">onKeyDown</text>
  <text x="466" y="246" font-size="13" fill="#ffffff">KeyboardEvent&lt;HTMLInputElement&gt;</text>
  <text x="466" y="266" font-size="13" fill="#9aa4b8">e.key === "Enter"</text>

  <!-- row 3 -->
  <rect x="60" y="288" width="760" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="316" font-size="14" font-weight="600" fill="#55c555">핸들러 타입 별칭</text>
  <text x="76" y="340" font-size="13" fill="#ffffff">React.ChangeEventHandler&lt;HTMLInputElement&gt; — 인자 타입을 한 번에 지정</text>
  <text x="76" y="362" font-size="13" fill="#9aa4b8">변수에 핸들러를 담아 props로 넘길 때 유용</text>
</svg>
