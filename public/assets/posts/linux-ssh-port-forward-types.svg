<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="rarr" markerWidth="18" markerHeight="14" refX="16" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,18 7,0 14" fill="#7ec8e3" stroke="none"/>
    </marker>
    <marker id="larr" markerWidth="18" markerHeight="14" refX="2" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="18 0,0 7,18 14" fill="#7777cc" stroke="none"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">SSH 포트 포워딩 3가지 유형</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">-L 로컬 · -R 원격 · -D 다이나믹 (SOCKS)</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Table header -->
  <rect x="60" y="92" width="760" height="40" rx="6" fill="#12192a"/>
  <line x1="130" y1="92" x2="130" y2="132" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="200" y1="92" x2="200" y2="132" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="600" y1="92" x2="600" y2="132" stroke="#3a4a6e" stroke-width="1"/>
  <text x="95" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" xml:space="preserve">플래그</text>
  <text x="165" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" xml:space="preserve">유형</text>
  <text x="400" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" xml:space="preserve">트래픽 흐름</text>
  <text x="710" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" xml:space="preserve">전형적 사용 예</text>

  <!-- Row 1: Local -L -->
  <rect x="60" y="132" width="760" height="56" fill="#0d1520"/>
  <line x1="130" y1="132" x2="130" y2="188" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="200" y1="132" x2="200" y2="188" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="600" y1="132" x2="600" y2="188" stroke="#3a4a6e" stroke-width="1"/>
  <text x="95" y="156" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7ec8e3" xml:space="preserve">-L</text>
  <text x="165" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">로컬</text>
  <text x="165" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">포워딩</text>
  <!-- Flow diagram for -L -->
  <rect x="210" y="142" width="90" height="34" rx="4" fill="#12192a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="255" y="163" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">Local:8080</text>
  <line x1="300" y1="159" x2="420" y2="159" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#rarr)"/>
  <text x="360" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" xml:space="preserve">SSH 터널</text>
  <rect x="422" y="142" width="90" height="34" rx="4" fill="#12192a" stroke="#55c555" stroke-width="1"/>
  <text x="467" y="163" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">Remote:80</text>
  <text x="255" y="182" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-L 8080:localhost:80</text>
  <!-- Use case -->
  <text x="710" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">방화벽 뒤 DB/웹 접근</text>
  <text x="710" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">내부 리소스를 로컬에서 열람</text>

  <!-- Row 2: Remote -R -->
  <rect x="60" y="188" width="760" height="56" fill="#0a0a0a"/>
  <line x1="130" y1="188" x2="130" y2="244" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="200" y1="188" x2="200" y2="244" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="600" y1="188" x2="600" y2="244" stroke="#3a4a6e" stroke-width="1"/>
  <text x="95" y="212" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7777cc" xml:space="preserve">-R</text>
  <text x="165" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">원격</text>
  <text x="165" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">포워딩</text>
  <rect x="210" y="198" width="90" height="34" rx="4" fill="#12192a" stroke="#7777cc" stroke-width="1"/>
  <text x="255" y="219" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" xml:space="preserve">Remote:9090</text>
  <line x1="300" y1="215" x2="420" y2="215" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#larr)"/>
  <text x="360" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" xml:space="preserve">SSH 터널</text>
  <rect x="422" y="198" width="90" height="34" rx="4" fill="#12192a" stroke="#7777cc" stroke-width="1"/>
  <text x="467" y="219" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" xml:space="preserve">Local:22</text>
  <text x="255" y="238" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-R 9090:localhost:22</text>
  <text x="710" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">NAT 뒤 서버 외부 노출</text>
  <text x="710" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">퍼블릭 서버에서 내부 접근</text>

  <!-- Row 3: Dynamic -D -->
  <rect x="60" y="244" width="760" height="56" fill="#0d1520"/>
  <line x1="130" y1="244" x2="130" y2="300" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="200" y1="244" x2="200" y2="300" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="600" y1="244" x2="600" y2="300" stroke="#3a4a6e" stroke-width="1"/>
  <text x="95" y="268" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#e05555" xml:space="preserve">-D</text>
  <text x="165" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" xml:space="preserve">다이나믹</text>
  <text x="165" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">(SOCKS5)</text>
  <rect x="210" y="254" width="100" height="34" rx="4" fill="#12192a" stroke="#e05555" stroke-width="1"/>
  <text x="260" y="275" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">SOCKS:1080</text>
  <line x1="310" y1="271" x2="420" y2="271" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#rarr)"/>
  <text x="365" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" xml:space="preserve">SSH 터널</text>
  <rect x="422" y="254" width="100" height="34" rx="4" fill="#12192a" stroke="#888" stroke-width="1"/>
  <text x="472" y="275" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">인터넷 전체</text>
  <text x="260" y="294" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-D 1080</text>
  <text x="710" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">SOCKS 프록시·VPN 대체</text>
  <text x="710" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">원격 IP로 인터넷 접근</text>

  <rect x="60" y="92" width="760" height="208" rx="6" fill="none" stroke="#3a4a6e" stroke-width="1"/>

  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">-N: 포워딩만 (원격 명령 없음) | -f: 백그라운드 실행 | -C: 압축</text>
</svg>
