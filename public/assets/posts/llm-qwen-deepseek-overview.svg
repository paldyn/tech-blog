<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Qwen vs DeepSeek: 중국 오픈소스 LLM</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Alibaba Cloud vs High-Flyer Quant</text>

  <!-- Qwen side -->
  <rect x="60" y="90" width="360" height="310" rx="10" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">Qwen (通义千问)</text>
  <text x="240" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Alibaba Cloud · 2023년~</text>
  <line x1="76" y1="150" x2="404" y2="150" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• Qwen 1/1.5/2/2.5/3 시리즈</text>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 0.5B ~ 72B 다양한 크기</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 중국어·영어 이중 언어 강점</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apache-system,sans-serif" font-size="13" fill="#e8e8e8">• Qwen-VL (비전), Qwen-Audio</text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• Qwen-Coder (코딩 특화)</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">• Qwen 2.5 72B: LLaMA 3.1 405B급</text>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888">Apache 2.0 (일부 커스텀)</text>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">HuggingFace, ModelScope</text>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Alibaba Cloud API (DashScope)</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Ollama 지원: ollama run qwen2.5:7b</text>

  <!-- DeepSeek side -->
  <rect x="460" y="90" width="360" height="310" rx="10" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">DeepSeek</text>
  <text x="640" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">High-Flyer Quant · 2023년~</text>
  <line x1="476" y1="150" x2="804" y2="150" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• DeepSeek V1/V2/V3/R1</text>
  <text x="480" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• Multi-head Latent Attention(MLA)</text>
  <text x="480" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 671B MoE (실제 37B 활성)</text>
  <text x="480" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• DeepSeek-R1: 추론 특화</text>
  <text x="480" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• DeepSeek-Coder, Math</text>
  <text x="480" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">• GPT-4o 동급 성능, 1/30 비용</text>
  <text x="480" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888">MIT 라이선스</text>
  <text x="480" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">HuggingFace, 직접 API</text>
  <text x="480" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">DeepSeek Chat (chat.deepseek.com)</text>
  <text x="480" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">API: GPT-4 대비 약 1/10 비용</text>

  <!-- Bottom -->
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">2025년 초 DeepSeek-R1 공개 후 미국 AI 업계에 충격 — AI 효율성 경쟁의 새 기준</text>
</svg>
