<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Affinity / Anti-Affinity 유형 비교</text>

  <!-- nodeAffinity -->
  <rect x="40" y="72" width="380" height="190" rx="10" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="230" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">nodeAffinity</text>
  <text x="230" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Pod → Node 관계 (nodeSelector 확장판)</text>

  <rect x="60" y="130" width="160" height="110" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">required</text>
  <text x="140" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">DuringScheduling</text>
  <text x="140" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">IgnoredDuringExecution</text>
  <text x="140" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">조건 미충족 시 거부</text>
  <text x="140" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">(Hard 제약)</text>

  <rect x="240" y="130" width="160" height="110" rx="6" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="320" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">preferred</text>
  <text x="320" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">DuringScheduling</text>
  <text x="320" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">IgnoredDuringExecution</text>
  <text x="320" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">가중치(weight)로 선호</text>
  <text x="320" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">(Soft 제약)</text>

  <!-- podAffinity -->
  <rect x="460" y="72" width="380" height="190" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">podAffinity / podAntiAffinity</text>
  <text x="650" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Pod → Pod 관계 (같은/다른 노드 선호)</text>

  <rect x="480" y="130" width="160" height="110" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">podAffinity</text>
  <text x="560" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">특정 Pod가 있는</text>
  <text x="560" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">노드/토폴로지에</text>
  <text x="560" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">함께 스케줄</text>
  <text x="560" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(co-location)</text>

  <rect x="660" y="130" width="160" height="110" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">podAntiAffinity</text>
  <text x="740" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">특정 Pod가 있는</text>
  <text x="740" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">노드/토폴로지를</text>
  <text x="740" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">피해서 스케줄</text>
  <text x="740" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(분산 배치)</text>

  <!-- Use cases -->
  <rect x="40" y="290" width="800" height="180" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">주요 사용 사례</text>

  <rect x="60" y="330" width="220" height="120" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">nodeAffinity</text>
  <text x="170" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">GPU 노드 지정,</text>
  <text x="170" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">특정 AZ 선호,</text>
  <text x="170" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인스턴스 타입 제한</text>
  <text x="170" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">→ IN/NotIn/Exists 연산자 지원</text>

  <rect x="310" y="330" width="220" height="120" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="420" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">podAffinity</text>
  <text x="420" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">캐시와 앱 동일 노드,</text>
  <text x="420" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">네트워크 지연 최소화,</text>
  <text x="420" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">사이드카 co-location</text>
  <text x="420" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">→ topologyKey로 범위 지정</text>

  <rect x="560" y="330" width="260" height="120" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="690" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">podAntiAffinity</text>
  <text x="690" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레플리카 분산 배치,</text>
  <text x="690" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">노드당 1개 제한 (DaemonSet 효과),</text>
  <text x="690" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">AZ 간 균등 분배</text>
  <text x="690" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">→ HA 구성에 필수</text>
</svg>
