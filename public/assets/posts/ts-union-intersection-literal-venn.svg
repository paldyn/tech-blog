<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">유니언 vs 인터섹션 타입</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">A | B = 합집합 · A &amp; B = 교집합</text>

  <!-- Left: Union diagram -->
  <text x="195" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">유니언 (A | B)</text>

  <!-- Union Venn: two overlapping circles, both highlighted -->
  <ellipse cx="160" cy="210" rx="90" ry="80" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5" fill-opacity="0.8"/>
  <ellipse cx="240" cy="210" rx="90" ry="80" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5" fill-opacity="0.8"/>
  <!-- Highlight entire union area -->
  <ellipse cx="160" cy="210" rx="90" ry="80" fill="#7ec8e3" fill-opacity="0.15"/>
  <ellipse cx="240" cy="210" rx="90" ry="80" fill="#7ec8e3" fill-opacity="0.15"/>

  <text x="120" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Cat</text>
  <text x="120" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">name</text>
  <text x="120" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">meow()</text>

  <text x="285" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Dog</text>
  <text x="285" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">name</text>
  <text x="285" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">bark()</text>

  <text x="200" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">name</text>

  <text x="195" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Cat | Dog — Cat 또는 Dog</text>
  <text x="195" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공통 속성(name)만 안전하게 접근</text>

  <!-- Center divider -->
  <line x1="400" y1="100" x2="400" y2="380" stroke="#1e2433" stroke-width="1"/>

  <!-- Right: Intersection diagram -->
  <text x="640" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">인터섹션 (A &amp; B)</text>

  <ellipse cx="600" cy="210" rx="90" ry="80" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <ellipse cx="690" cy="210" rx="90" ry="80" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <!-- Highlight only intersection area -->
  <clipPath id="clip-left">
    <ellipse cx="600" cy="210" rx="90" ry="80"/>
  </clipPath>
  <ellipse cx="690" cy="210" rx="90" ry="80" fill="#55c555" fill-opacity="0.3" clip-path="url(#clip-left)"/>

  <text x="556" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Named</text>
  <text x="556" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">name</text>

  <text x="738" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Aged</text>
  <text x="738" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">age</text>

  <text x="645" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">name</text>
  <text x="645" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">age</text>

  <text x="640" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Named &amp; Aged — 두 타입 모두 충족</text>
  <text x="640" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 속성(name, age) 모두 접근 가능</text>

  <!-- Bottom code -->
  <rect x="60" y="360" width="760" height="56" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">type</text><text x="104" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Animal = Cat | Dog;   </text><text x="295" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// name만 안전</text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">type</text><text x="104" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Person = Named &amp; Aged; </text><text x="296" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// name과 age 모두 필수</text>
</svg>
