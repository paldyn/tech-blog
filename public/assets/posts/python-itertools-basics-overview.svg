<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">itertools 모듈 — 이터레이터 조합 도구</text>

  <!-- Category 1: 무한 이터레이터 -->
  <rect x="60" y="72" width="220" height="130" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">무한 이터레이터</text>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">count(start, step)</text>
  <text x="80" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">cycle(iterable)</text>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">repeat(elem, n)</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ islice()로 잘라서 사용</text>

  <!-- Category 2: 유한 이터레이터 -->
  <rect x="330" y="72" width="220" height="130" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">유한 이터레이터</text>
  <text x="350" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">chain(*iterables)</text>
  <text x="350" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">islice(it, stop)</text>
  <text x="350" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">takewhile(pred, it)</text>
  <text x="350" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">dropwhile(pred, it)</text>

  <!-- Category 3: 조합형 이터레이터 -->
  <rect x="600" y="72" width="220" height="130" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">조합형 이터레이터</text>
  <text x="620" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">product(*its, repeat)</text>
  <text x="620" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">permutations(it, r)</text>
  <text x="620" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">combinations(it, r)</text>
  <text x="620" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">combinations_with_rep</text>

  <!-- chain 예시 -->
  <rect x="60" y="234" width="370" height="90" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">chain() — 여러 이터러블을 하나로</text>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">list(chain([1,2], [3,4], [5]))</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">→  [1, 2, 3, 4, 5]</text>

  <!-- product 예시 -->
  <rect x="450" y="234" width="370" height="90" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="635" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">product() — 데카르트 곱</text>
  <text x="470" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">list(product('AB', repeat=2))</text>
  <text x="470" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">→  [('A','A'),('A','B'),('B','A'),('B','B')]</text>

  <!-- groupby 예시 -->
  <rect x="60" y="346" width="760" height="90" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">groupby() — 연속된 같은 키끼리 묶기 (정렬 필수)</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">data = sorted([('A',1),('B',2),('A',3)], key=lambda x: x[0])</text>
  <text x="80" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">→  A: [(A,1),(A,3)]  B: [(B,2)]</text>

  <!-- bottom hint -->
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">itertools 함수는 모두 지연 평가(lazy) — 필요할 때 값을 생성</text>
</svg>
