<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">주요 활성화 함수 비교</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">Sigmoid · Tanh · ReLU · Leaky ReLU · GELU — 형태와 특성 비교</text>

  <!-- ===== Sigmoid ===== -->
  <rect x="60" y="88" width="148" height="148" rx="6" fill="#0d1520" stroke="#2a3a4a"/>
  <text x="134" y="108" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600" xml:space="preserve">Sigmoid</text>
  <!-- Axes -->
  <line x1="76" y1="190" x2="196" y2="190" stroke="#333" stroke-width="1"/>
  <line x1="134" y1="108" x2="134" y2="228" stroke="#333" stroke-width="1"/>
  <!-- Sigmoid curve approximation via polyline -->
  <polyline points="76,225 86,224 96,222 106,218 116,211 126,200 134,190 142,180 152,170 162,163 172,159 182,157 196,156"
            fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="134" y="244" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">σ(z) = 1/(1+e⁻ᶻ)</text>
  <text x="134" y="258" text-anchor="middle" fill="#6a8aa0" font-size="10" xml:space="preserve">출력: (0, 1)</text>

  <!-- ===== Tanh ===== -->
  <rect x="228" y="88" width="148" height="148" rx="6" fill="#0d1520" stroke="#2a3a4a"/>
  <text x="302" y="108" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600" xml:space="preserve">Tanh</text>
  <!-- Axes -->
  <line x1="244" y1="162" x2="364" y2="162" stroke="#333" stroke-width="1"/>
  <line x1="302" y1="108" x2="302" y2="228" stroke="#333" stroke-width="1"/>
  <!-- Tanh curve -->
  <polyline points="244,218 254,216 264,212 274,203 284,188 294,170 302,162 310,154 320,136 330,121 340,112 350,109 364,107"
            fill="none" stroke="#7777cc" stroke-width="2.5"/>
  <text x="302" y="244" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">tanh(z) = (eᶻ−e⁻ᶻ)/(eᶻ+e⁻ᶻ)</text>
  <text x="302" y="258" text-anchor="middle" fill="#6a8aa0" font-size="10" xml:space="preserve">출력: (-1, 1)</text>

  <!-- ===== ReLU ===== -->
  <rect x="396" y="88" width="148" height="148" rx="6" fill="#0c1a0c" stroke="#1a3a1a"/>
  <text x="470" y="108" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600" xml:space="preserve">ReLU</text>
  <!-- Axes -->
  <line x1="412" y1="190" x2="532" y2="190" stroke="#333" stroke-width="1"/>
  <line x1="470" y1="108" x2="470" y2="228" stroke="#333" stroke-width="1"/>
  <!-- ReLU shape -->
  <polyline points="412,190 470,190 532,128" fill="none" stroke="#55c555" stroke-width="2.5"/>
  <text x="470" y="244" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">max(0, z)</text>
  <text x="470" y="258" text-anchor="middle" fill="#6a8aa0" font-size="10" xml:space="preserve">출력: [0, ∞)</text>

  <!-- ===== Leaky ReLU ===== -->
  <rect x="564" y="88" width="148" height="148" rx="6" fill="#1a0d0a" stroke="#3a2a1a"/>
  <text x="638" y="108" text-anchor="middle" fill="#e05555" font-size="13" font-weight="600" xml:space="preserve">Leaky ReLU</text>
  <!-- Axes -->
  <line x1="580" y1="190" x2="700" y2="190" stroke="#333" stroke-width="1"/>
  <line x1="638" y1="108" x2="638" y2="228" stroke="#333" stroke-width="1"/>
  <!-- Leaky ReLU shape -->
  <polyline points="580,200 638,190 700,128" fill="none" stroke="#e05555" stroke-width="2.5"/>
  <text x="638" y="244" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">max(αz, z), α=0.01</text>
  <text x="638" y="258" text-anchor="middle" fill="#6a8aa0" font-size="10" xml:space="preserve">Dying ReLU 완화</text>

  <!-- ===== GELU ===== -->
  <rect x="732" y="88" width="108" height="148" rx="6" fill="#0d1520" stroke="#2a3a4a"/>
  <text x="786" y="108" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600" xml:space="preserve">GELU</text>
  <!-- Axes -->
  <line x1="744" y1="190" x2="832" y2="190" stroke="#333" stroke-width="1"/>
  <line x1="786" y1="108" x2="786" y2="228" stroke="#333" stroke-width="1"/>
  <!-- GELU approximation -->
  <polyline points="744,195 754,193 764,191 774,188 780,186 786,184 792,182 800,178 810,168 820,152 832,132"
            fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="786" y="244" text-anchor="middle" fill="#888" font-size="10" xml:space="preserve">z·Φ(z)</text>
  <text x="786" y="258" text-anchor="middle" fill="#6a8aa0" font-size="10" xml:space="preserve">트랜스포머</text>

  <!-- Comparison table -->
  <rect x="60" y="280" width="760" height="180" rx="8" fill="#0d0d0d" stroke="#1e1e1e"/>
  <!-- Header -->
  <rect x="60" y="280" width="760" height="28" rx="8" fill="#151515"/>
  <text x="160" y="299" text-anchor="middle" fill="#888" font-size="12" font-weight="600" xml:space="preserve">함수</text>
  <text x="310" y="299" text-anchor="middle" fill="#888" font-size="12" font-weight="600" xml:space="preserve">출력 범위</text>
  <text x="460" y="299" text-anchor="middle" fill="#888" font-size="12" font-weight="600" xml:space="preserve">기울기 소실</text>
  <text x="610" y="299" text-anchor="middle" fill="#888" font-size="12" font-weight="600" xml:space="preserve">제로 중심</text>
  <text x="760" y="299" text-anchor="middle" fill="#888" font-size="12" font-weight="600" xml:space="preserve">주요 용도</text>
  <!-- Rows -->
  <text x="160" y="325" text-anchor="middle" fill="#7ec8e3" font-size="12" xml:space="preserve">Sigmoid</text>
  <text x="310" y="325" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">(0, 1)</text>
  <text x="460" y="325" text-anchor="middle" fill="#e05555" font-size="12" xml:space="preserve">심각</text>
  <text x="610" y="325" text-anchor="middle" fill="#e05555" font-size="12" xml:space="preserve">아니오</text>
  <text x="760" y="325" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">이진분류 출력층</text>

  <text x="160" y="349" text-anchor="middle" fill="#7777cc" font-size="12" xml:space="preserve">Tanh</text>
  <text x="310" y="349" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">(-1, 1)</text>
  <text x="460" y="349" text-anchor="middle" fill="#e05555" font-size="12" xml:space="preserve">있음</text>
  <text x="610" y="349" text-anchor="middle" fill="#55c555" font-size="12" xml:space="preserve">예</text>
  <text x="760" y="349" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">RNN 은닉층</text>

  <text x="160" y="373" text-anchor="middle" fill="#55c555" font-size="12" xml:space="preserve">ReLU</text>
  <text x="310" y="373" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">[0, ∞)</text>
  <text x="460" y="373" text-anchor="middle" fill="#55c555" font-size="12" xml:space="preserve">없음</text>
  <text x="610" y="373" text-anchor="middle" fill="#e05555" font-size="12" xml:space="preserve">아니오</text>
  <text x="760" y="373" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">CNN, MLP 은닉층</text>

  <text x="160" y="397" text-anchor="middle" fill="#e05555" font-size="12" xml:space="preserve">Leaky ReLU</text>
  <text x="310" y="397" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">(-∞, ∞)</text>
  <text x="460" y="397" text-anchor="middle" fill="#55c555" font-size="12" xml:space="preserve">없음</text>
  <text x="610" y="397" text-anchor="middle" fill="#e05555" font-size="12" xml:space="preserve">아니오</text>
  <text x="760" y="397" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">GAN, 깊은 네트워크</text>

  <text x="160" y="421" text-anchor="middle" fill="#7ec8e3" font-size="12" xml:space="preserve">GELU</text>
  <text x="310" y="421" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">(-∞, ∞)</text>
  <text x="460" y="421" text-anchor="middle" fill="#55c555" font-size="12" xml:space="preserve">없음</text>
  <text x="610" y="421" text-anchor="middle" fill="#55c555" font-size="12" xml:space="preserve">근사</text>
  <text x="760" y="421" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">BERT, GPT 트랜스포머</text>

  <!-- Footer -->
  <text x="440" y="488" text-anchor="middle" fill="#444" font-size="11" xml:space="preserve">PALDYN · AI 완전 정복 시리즈</text>
</svg>
