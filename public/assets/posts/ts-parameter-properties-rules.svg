<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파라미터 프로퍼티 규칙 정리</text>

  <!-- Row 1 -->
  <rect x="60" y="64" width="760" height="58" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">public x: number</text>
  <text x="200" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">외부 읽기/쓰기</text>
  <line x1="310" y1="93" x2="370" y2="93" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="560" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">프로퍼티 선언 + this.x = x 자동 생성</text>
  <text x="560" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">기본값 (생략 시 public)</text>

  <!-- Row 2 -->
  <rect x="60" y="130" width="760" height="58" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">private x: number</text>
  <text x="200" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">클래스 내부 전용</text>
  <line x1="310" y1="159" x2="370" y2="159" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="560" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">private 프로퍼티 선언 + this.x = x</text>
  <text x="560" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">서브클래스·외부 접근 불가</text>

  <!-- Row 3 -->
  <rect x="60" y="196" width="760" height="58" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">readonly x: number</text>
  <text x="200" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">초기화 후 변경 불가</text>
  <line x1="310" y1="225" x2="370" y2="225" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="560" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">readonly 프로퍼티 — 생성자 이후 재할당 오류</text>
  <text x="560" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">public readonly 조합 가능</text>

  <!-- Note -->
  <rect x="60" y="272" width="760" height="62" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">주의사항</text>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파라미터 프로퍼티는 TypeScript 전용 문법 — JS로 컴파일하면 일반 선언+초기화로 변환됨</text>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Babel, esbuild 등 트랜스파일러가 지원해야 함 (대부분 지원)</text>
</svg>
