<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Git Credential Helper 종류와 보안 수준</text>

  <!-- Helper 1: none -->
  <rect x="60" y="76" width="360" height="80" rx="8" fill="#1f1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">없음 (기본)</text>
  <text x="240" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">push/pull 마다 username·PAT 재입력</text>
  <text x="240" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">보안 수준: ★★★★★ / 편의성: ★☆☆☆☆</text>

  <!-- Helper 2: cache -->
  <rect x="460" y="76" width="360" height="80" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">cache</text>
  <text x="640" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메모리 캐시, 기본 15분 (재부팅 시 소멸)</text>
  <text x="640" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">보안 수준: ★★★★☆ / 편의성: ★★★☆☆</text>

  <!-- Helper 3: store -->
  <rect x="60" y="178" width="360" height="80" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">store</text>
  <text x="240" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">~/.git-credentials 파일에 평문 저장</text>
  <text x="240" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">보안 수준: ★☆☆☆☆ / 편의성: ★★★★★</text>

  <!-- Helper 4: OS Keychain -->
  <rect x="460" y="178" width="360" height="80" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">OS Keychain (권장)</text>
  <text x="640" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">macOS: osxkeychain · Win: wincred</text>
  <text x="640" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">보안 수준: ★★★★☆ / 편의성: ★★★★★</text>

  <!-- Code block -->
  <rect x="60" y="280" width="760" height="174" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># macOS Keychain 사용</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> config <tspan fill="#ce9178">--global</tspan> credential.helper osxkeychain</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Linux 메모리 캐시 (1시간)</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> config <tspan fill="#ce9178">--global</tspan> credential.helper <tspan fill="#ce9178">'cache --timeout=3600'</tspan></text>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Linux libsecret (GNOME Keyring)</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> config <tspan fill="#ce9178">--global</tspan> credential.helper /usr/lib/git-core/git-credential-libsecret</text>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 현재 설정 확인</text>
  <text x="76" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> config <tspan fill="#ce9178">--global</tspan> <tspan fill="#ce9178">--get</tspan> credential.helper</text>
</svg>
