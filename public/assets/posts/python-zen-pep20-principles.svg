<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">The Zen of Python</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">PEP 20 — Python 설계 철학 19가지</text>

  <!-- Principle 1 -->
  <rect x="60" y="88" width="360" height="66" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="112" font-size="13" font-weight="700" fill="#7ec8e3">Beautiful is better than ugly.</text>
  <text x="80" y="132" font-size="12" fill="#888">아름다움이 못생김보다 낫다</text>
  <text x="80" y="148" font-size="11" fill="#666">코드는 읽히는 예술 작품이어야 한다</text>

  <!-- Principle 2 -->
  <rect x="460" y="88" width="360" height="66" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="112" font-size="13" font-weight="700" fill="#55c555">Explicit is better than implicit.</text>
  <text x="480" y="132" font-size="12" fill="#888">명시적인 것이 암묵적인 것보다 낫다</text>
  <text x="480" y="148" font-size="11" fill="#666">의도를 드러내는 코드를 써라</text>

  <!-- Principle 3 -->
  <rect x="60" y="172" width="360" height="66" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="196" font-size="13" font-weight="700" fill="#7777cc">Simple is better than complex.</text>
  <text x="80" y="216" font-size="12" fill="#888">단순함이 복잡함보다 낫다</text>
  <text x="80" y="232" font-size="11" fill="#666">가능하면 항상 단순한 해법을 택해라</text>

  <!-- Principle 4 -->
  <rect x="460" y="172" width="360" height="66" rx="8" fill="#0f1820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="480" y="196" font-size="13" font-weight="700" fill="#ce9178">Readability counts.</text>
  <text x="480" y="216" font-size="12" fill="#888">가독성은 중요하다</text>
  <text x="480" y="232" font-size="11" fill="#666">코드는 쓰는 것보다 읽는 횟수가 많다</text>

  <!-- Principle 5 -->
  <rect x="60" y="256" width="360" height="66" rx="8" fill="#0f1820" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="278" font-size="12" font-weight="700" fill="#e05555">Errors should never pass silently.</text>
  <text x="80" y="298" font-size="12" fill="#888">오류는 결코 조용히 지나쳐선 안 된다</text>
  <text x="80" y="314" font-size="11" fill="#666">예외를 숨기면 버그가 숨어든다</text>

  <!-- Principle 6 -->
  <rect x="460" y="256" width="360" height="66" rx="8" fill="#0f1820" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="480" y="278" font-size="12" font-weight="700" fill="#b5cea8">There should be one obvious way.</text>
  <text x="480" y="298" font-size="12" fill="#888">명확한 방법이 하나 있어야 한다</text>
  <text x="480" y="314" font-size="11" fill="#666">최선의 방법이 분명해야 한다</text>

  <!-- Code to access Zen -->
  <rect x="60" y="342" width="760" height="118" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 터미널에서 Zen 전체를 보려면</text>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> this</tspan></text>
  <text x="76" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># → 19가지 격언이 출력된다</text>
  <text x="76" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># PEP 20 작성자: Tim Peters</text>
  <text x="76" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># "Easter egg" 로 Python에 내장됨</text>
</svg>
