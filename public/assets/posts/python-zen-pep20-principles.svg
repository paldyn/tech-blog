<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">The Zen of Python — 핵심 원칙</text>

  <!-- Left column -->
  <rect x="60" y="68" width="370" height="54" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="80" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Beautiful is better than ugly.</text>
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">아름다운 코드가 추한 코드보다 낫다</text>

  <rect x="60" y="132" width="370" height="54" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="80" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Explicit is better than implicit.</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">명시적인 것이 암묵적인 것보다 낫다</text>

  <rect x="60" y="196" width="370" height="54" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fbbf24">Simple is better than complex.</text>
  <text x="80" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">단순한 것이 복잡한 것보다 낫다</text>

  <rect x="60" y="260" width="370" height="54" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa">Flat is better than nested.</text>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">평평한 구조가 중첩된 것보다 낫다</text>

  <rect x="60" y="324" width="370" height="54" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f472b6">Readability counts.</text>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">가독성은 중요하다</text>

  <rect x="60" y="388" width="370" height="54" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="80" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#22d3ee">Errors should never pass silently.</text>
  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">오류는 조용히 지나가면 안 된다</text>

  <!-- Right column -->
  <rect x="450" y="68" width="370" height="54" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="470" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Special cases aren't special enough.</text>
  <text x="470" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">예외 사항도 규칙을 어길 만큼 특별하지 않다</text>

  <rect x="450" y="132" width="370" height="54" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="470" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Now is better than never.</text>
  <text x="470" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">지금 하는 것이 아예 안 하는 것보다 낫다</text>

  <rect x="450" y="196" width="370" height="54" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="470" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fbbf24">There should be one obvious way.</text>
  <text x="470" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">명확한 한 가지 방법이 있어야 한다</text>

  <rect x="450" y="260" width="370" height="54" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="470" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa">In the face of ambiguity, refuse.</text>
  <text x="470" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">모호함 앞에서는 추측하지 말 것</text>

  <rect x="450" y="324" width="370" height="54" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="470" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f472b6">Namespaces are a great idea.</text>
  <text x="470" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">네임스페이스는 훌륭한 아이디어다</text>

  <rect x="450" y="388" width="370" height="54" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="470" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#22d3ee">If the implementation is hard to explain...</text>
  <text x="470" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">...it's a bad idea. 설명하기 어려우면 나쁜 설계</text>
</svg>
