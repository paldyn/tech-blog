<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">The Zen of Python — PEP 20</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">19개 설계 격언 (Tim Peters, 1999)</text>

  <!-- Left column -->
  <rect x="60" y="90" width="360" height="390" rx="8" fill="#0f1025" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">명시성 · 단순성</text>
  <line x1="80" y1="124" x2="400" y2="124" stroke="#7777cc" stroke-width="0.5"/>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Beautiful is better than ugly.</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">아름다움이 추함보다 낫다</text>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Explicit is better than implicit.</text>
  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">명시적인 것이 암시적인 것보다 낫다</text>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Simple is better than complex.</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단순함이 복잡함보다 낫다</text>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Complex is better than complicated.</text>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">복잡해도 뒤얽히는 것보다는 낫다</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Readability counts.</text>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">가독성은 중요하다</text>
  <text x="80" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Errors should never pass silently.</text>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">오류를 조용히 넘기지 마라</text>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Now is better than never.</text>
  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">지금 하는 것이 절대 안 하는 것보다 낫다</text>

  <!-- Right column -->
  <rect x="460" y="90" width="360" height="390" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">실용성 · 일관성</text>
  <line x1="480" y1="124" x2="800" y2="124" stroke="#55c555" stroke-width="0.5"/>
  <text x="480" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Flat is better than nested.</text>
  <text x="480" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">평탄함이 중첩됨보다 낫다</text>
  <text x="480" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Sparse is better than dense.</text>
  <text x="480" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">성긴 것이 촘촘한 것보다 낫다</text>
  <text x="480" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">There should be one obvious way.</text>
  <text x="480" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">명확한 방법은 하나여야 한다</text>
  <text x="480" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Special cases aren't special enough.</text>
  <text x="480" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">특수 케이스도 규칙을 깰 만큼 특별하지 않다</text>
  <text x="480" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">In the face of ambiguity, refuse.</text>
  <text x="480" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모호한 상황에서 추측을 거부하라</text>
  <text x="480" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Namespaces are a great idea.</text>
  <text x="480" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">네임스페이스는 훌륭한 아이디어다</text>
  <text x="480" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Although practicality beats purity.</text>
  <text x="480" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실용성은 순수성을 이긴다</text>

  <text x="440" y="498" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">import this — Python 인터프리터에서 실행해 보세요</text>
</svg>
