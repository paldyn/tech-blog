<svg width="880" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ES6 클래스 해부도</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">class 키워드의 각 구성 요소</text>

  <!-- Class code block (center) -->
  <rect x="240" y="100" width="400" height="340" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Code lines -->
  <text x="256" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"><tspan fill="#7ec8e3">class</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ffffff">Animal</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="256" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  type = <tspan fill="#ce9178">'animal'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="256" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> </text>
  <text x="256" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  <tspan fill="#7ec8e3">constructor</tspan><tspan fill="#ffffff">(name) {</tspan></text>
  <text x="256" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    <tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.name = name;</tspan></text>
  <text x="256" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  }</text>
  <text x="256" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  speak() { <tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'...'</tspan><tspan fill="#ffffff">; }</tspan></text>
  <text x="256" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">}</text>

  <!-- Left annotations -->
  <!-- class keyword annotation -->
  <line x1="205" y1="126" x2="240" y2="126" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="60" y="112" width="140" height="28" rx="4" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="130" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">class 키워드</text>

  <!-- class field annotation -->
  <line x1="205" y1="162" x2="240" y2="162" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="60" y="148" width="140" height="28" rx="4" fill="#1a1a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">클래스 필드 (ES2022)</text>

  <!-- Right annotations -->
  <!-- constructor annotation -->
  <line x1="640" y1="234" x2="675" y2="234" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="675" y="220" width="145" height="28" rx="4" fill="#1a1a1a" stroke="#55c555" stroke-width="1"/>
  <text x="747" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">생성자 — new 시 호출</text>

  <!-- this.name annotation -->
  <line x1="640" y1="270" x2="675" y2="270" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="675" y="256" width="145" height="28" rx="4" fill="#1a1a1a" stroke="#ce9178" stroke-width="1"/>
  <text x="747" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" text-anchor="middle">인스턴스 프로퍼티 초기화</text>

  <!-- method annotation -->
  <line x1="640" y1="342" x2="675" y2="342" stroke="#e8e8e8" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="675" y="328" width="145" height="28" rx="4" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="747" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인스턴스 메서드</text>

  <!-- Footer -->
</svg>
