<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">useOptimistic 낙관적 업데이트</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">서버 응답 전에 UI를 먼저 업데이트</text>

  <!-- Timeline: Normal vs Optimistic -->
  <!-- Normal flow label -->
  <text x="130" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">일반 업데이트 흐름</text>

  <!-- Normal: boxes -->
  <rect x="60" y="118" width="100" height="44" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="110" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클릭</text>

  <line x1="160" y1="140" x2="190" y2="140" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="192" y="118" width="120" height="44" rx="8" fill="#2a1a0d" stroke="#e05555" stroke-width="1"/>
  <text x="252" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">서버 요청</text>
  <text x="252" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">대기 중...</text>

  <line x1="312" y1="140" x2="342" y2="140" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="344" y="118" width="120" height="44" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="404" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">응답 도착</text>
  <text x="404" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(300~2000ms)</text>

  <line x1="464" y1="140" x2="494" y2="140" stroke="#888" stroke-width="1.5" marker-end="url(#arrg)"/>

  <rect x="496" y="118" width="120" height="44" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="556" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">UI 업데이트</text>
  <text x="556" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">느린 피드백</text>

  <!-- Optimistic flow label -->
  <text x="130" y="202" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">낙관적 업데이트 흐름</text>

  <!-- Optimistic: boxes -->
  <rect x="60" y="214" width="100" height="44" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="110" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클릭</text>

  <line x1="160" y1="236" x2="190" y2="236" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <rect x="192" y="214" width="120" height="44" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="252" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">UI 즉시 업데이트</text>
  <text x="252" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">낙관적 상태</text>

  <line x1="312" y1="236" x2="342" y2="236" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="344" y="214" width="120" height="44" rx="8" fill="#2a1a0d" stroke="#e05555" stroke-width="1"/>
  <text x="404" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">서버 요청</text>
  <text x="404" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">백그라운드</text>

  <line x1="464" y1="236" x2="494" y2="236" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrg)"/>

  <rect x="496" y="214" width="120" height="44" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="556" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">확정 or 롤백</text>
  <text x="556" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">응답 후 처리</text>

  <!-- API signature -->
  <rect x="60" y="282" width="760" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="305" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> [optimisticState, addOptimistic] = useOptimistic(state, updateFn);</text>

  <!-- Code example -->
  <rect x="60" y="332" width="760" height="144" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="351" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 좋아요 버튼: 클릭 즉시 반영, 실패 시 자동 롤백</text>
  <text x="76" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> [optimisticLikes, addOptimisticLike] = useOptimistic(</text>
  <text x="76" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  likes,</text>
  <text x="76" y="405" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  (currentLikes, optimisticValue) =&gt; currentLikes + optimisticValue</text>
  <text x="76" y="423" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="441" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// action 안에서: addOptimisticLike(1); await likePost(postId);</text>
  <text x="76" y="459" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 실패 시 likes(서버 값)로 자동 복원됨</text>
</svg>
