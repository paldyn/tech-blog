<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">ROC 곡선과 AUC</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">모든 임계값에서의 TPR-FPR 트레이드오프를 하나의 곡선으로 표현한다</text>

  <!-- Chart area: x=80..480, y=80..360 -->
  <!-- Background grid -->
  <line x1="80" y1="360" x2="480" y2="360" stroke="#222" stroke-width="1"/>
  <line x1="80" y1="280" x2="480" y2="280" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="200" x2="480" y2="200" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="120" x2="480" y2="120" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80"  y1="80" x2="80"  y2="360" stroke="#222" stroke-width="1"/>
  <line x1="180" y1="80" x2="180" y2="360" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="280" y1="80" x2="280" y2="360" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="380" y1="80" x2="380" y2="360" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="480" y1="80" x2="480" y2="360" stroke="#222" stroke-width="1"/>

  <!-- Axes -->
  <line x1="80" y1="360" x2="490" y2="360" stroke="#555" stroke-width="2"/>
  <line x1="80" y1="360" x2="80"  y2="72"  stroke="#555" stroke-width="2"/>
  <polygon points="490,360 478,354 478,366" fill="#555"/>
  <polygon points="80,72 74,84 86,84" fill="#555"/>

  <!-- Axis labels -->
  <text x="285" y="392" text-anchor="middle" fill="#888" font-size="13">FPR (False Positive Rate)</text>
  <text x="40" y="222" text-anchor="middle" fill="#888" font-size="13" transform="rotate(-90, 40, 222)">TPR (True Positive Rate)</text>

  <!-- Tick labels -->
  <text x="80"  y="376" text-anchor="middle" fill="#666" font-size="11">0.0</text>
  <text x="180" y="376" text-anchor="middle" fill="#666" font-size="11">0.25</text>
  <text x="280" y="376" text-anchor="middle" fill="#666" font-size="11">0.5</text>
  <text x="380" y="376" text-anchor="middle" fill="#666" font-size="11">0.75</text>
  <text x="480" y="376" text-anchor="middle" fill="#666" font-size="11">1.0</text>
  <text x="68"  y="364" text-anchor="end" fill="#666" font-size="11">0.0</text>
  <text x="68"  y="284" text-anchor="end" fill="#666" font-size="11">0.5</text>
  <text x="68"  y="124" text-anchor="end" fill="#666" font-size="11">1.0</text>

  <!-- Diagonal (random) -->
  <line x1="80" y1="360" x2="480" y2="80" stroke="#444" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="300" y="230" fill="#555" font-size="11" transform="rotate(-35, 300, 230)">랜덤 분류기 AUC=0.5</text>

  <!-- Excellent model curve AUC≈0.97 -->
  <polyline points="80,360 90,270 100,210 120,160 150,130 200,110 280,92 380,84 480,80"
    fill="none" stroke="#55c555" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="250" y="100" fill="#55c555" font-size="12" font-weight="600">AUC = 0.97 (우수)</text>

  <!-- Good model curve AUC≈0.80 -->
  <polyline points="80,360 100,310 130,268 170,228 220,196 270,170 330,145 390,120 450,98 480,80"
    fill="none" stroke="#7ec8e3" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="400" y="115" fill="#7ec8e3" font-size="12" font-weight="600">AUC = 0.80 (양호)</text>

  <!-- Mediocre curve AUC≈0.65 -->
  <polyline points="80,360 120,335 160,308 210,280 260,252 310,220 360,188 410,155 460,118 480,80"
    fill="none" stroke="#e0a020" stroke-width="2" stroke-linejoin="round" stroke-dasharray="6,3"/>
  <text x="470" y="140" fill="#e0a020" font-size="12" font-weight="600">AUC = 0.65</text>

  <!-- Operating point -->
  <circle cx="130" cy="165" r="5" fill="#55c555"/>
  <line x1="130" y1="165" x2="150" y2="143" stroke="#666" stroke-width="1"/>
  <text x="154" y="140" fill="#888" font-size="10">운영점</text>

  <!-- RIGHT: AUC interpretation panel -->
  <rect x="540" y="80" width="300" height="260" rx="8" fill="#111827" stroke="#333" stroke-width="1.5"/>
  <text x="690" y="104" text-anchor="middle" fill="#e8e8e8" font-size="14" font-weight="600">AUC 해석 기준</text>
  <line x1="556" y1="114" x2="824" y2="114" stroke="#333" stroke-width="1"/>

  <rect x="560" y="124" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="580" y="135" fill="#55c555" font-size="12" font-weight="600">0.90 ~ 1.00</text>
  <text x="690" y="135" fill="#ccc" font-size="12">매우 우수</text>

  <rect x="560" y="148" width="12" height="12" rx="2" fill="#7ec8e3"/>
  <text x="580" y="159" fill="#7ec8e3" font-size="12" font-weight="600">0.80 ~ 0.90</text>
  <text x="690" y="159" fill="#ccc" font-size="12">우수</text>

  <rect x="560" y="172" width="12" height="12" rx="2" fill="#e0a020"/>
  <text x="580" y="183" fill="#e0a020" font-size="12" font-weight="600">0.70 ~ 0.80</text>
  <text x="690" y="183" fill="#ccc" font-size="12">양호</text>

  <rect x="560" y="196" width="12" height="12" rx="2" fill="#888"/>
  <text x="580" y="207" fill="#888" font-size="12" font-weight="600">0.60 ~ 0.70</text>
  <text x="690" y="207" fill="#ccc" font-size="12">보통</text>

  <rect x="560" y="220" width="12" height="12" rx="2" fill="#e05555"/>
  <text x="580" y="231" fill="#e05555" font-size="12" font-weight="600">0.50 ~ 0.60</text>
  <text x="690" y="231" fill="#ccc" font-size="12">불량 (랜덤 수준)</text>

  <line x1="556" y1="246" x2="824" y2="246" stroke="#333" stroke-width="1"/>
  <text x="556" y="264" fill="#888" font-size="11">AUC: 임의 양성 샘플이</text>
  <text x="556" y="280" fill="#888" font-size="11">임의 음성 샘플보다 높은</text>
  <text x="556" y="296" fill="#888" font-size="11">점수를 받을 확률</text>
  <text x="556" y="318" fill="#7ec8e3" font-size="11" font-weight="600">클래스 불균형에 강건하다</text>
  <text x="556" y="334" fill="#7ec8e3" font-size="11" font-weight="600">임계값 독립적 평가</text>

  <!-- Footer -->
  <text x="440" y="428" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
