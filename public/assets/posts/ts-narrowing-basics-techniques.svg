<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">타입 좁히기 주요 기법 4가지</text>

  <!-- Technique 1: typeof -->
  <rect x="40" y="70" width="380" height="160" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="230" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">① typeof 체크</text>
  <rect x="56" y="108" width="348" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="72" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> pad(x: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> | </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="72" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">typeof</tspan><tspan fill="#ffffff"> x === </tspan><tspan fill="#ce9178">"string"</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="72" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// x: string</tspan></text>
  <text x="72" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> x.</tspan><tspan fill="#7ec8e3" font-weight="600">padStart</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="72" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  } </tspan><tspan fill="#9aa4b8">// else: x is number</tspan></text>

  <!-- Technique 2: truthiness -->
  <rect x="460" y="70" width="380" height="160" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="650" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">② truthiness 체크</text>
  <rect x="476" y="108" width="348" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> print(s: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> | </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="492" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (s) {</tspan></text>
  <text x="492" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// s: string (null 제거됨)</tspan></text>
  <text x="492" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    console.</tspan><tspan fill="#7ec8e3" font-weight="600">log</tspan><tspan fill="#ffffff">(s.</tspan><tspan fill="#7ec8e3" font-weight="600">toUpperCase</tspan><tspan fill="#ffffff">());</tspan></text>
  <text x="492" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  }</tspan></text>

  <!-- Technique 3: equality -->
  <rect x="40" y="255" width="380" height="175" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="230" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">③ equality 체크</text>
  <rect x="56" y="293" width="348" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="72" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> f(x: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> | </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="72" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">         y: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> | </tspan><tspan fill="#7ec8e3" font-weight="600">boolean</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="72" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (x === y) {</tspan></text>
  <text x="72" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// x, y: string 교집합</tspan></text>
  <text x="72" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  }</tspan></text>

  <!-- Technique 4: type predicate -->
  <rect x="460" y="255" width="380" height="175" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="650" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">④ type predicate</text>
  <rect x="476" y="293" width="348" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> isStr(</tspan></text>
  <text x="492" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  x: </tspan><tspan fill="#7ec8e3" font-weight="600">unknown</tspan></text>
  <text x="492" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">): x </tspan><tspan fill="#7ec8e3" font-weight="600">is</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="492" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">typeof</tspan><tspan fill="#ffffff"> x === </tspan><tspan fill="#ce9178">"string"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="492" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>
</svg>
