<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">교차 테이블(Junction Table) 설계</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">N:M 관계 분해 → 1:N + N:1</text>

  <!-- STUDENT table -->
  <rect x="60" y="90" width="180" height="130" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="90" width="180" height="30" rx="4" fill="#0d1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">STUDENT</text>
  <text x="70" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PK  id</text>
  <text x="70" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    name</text>
  <text x="70" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    email</text>
  <text x="70" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    grade</text>
  <text x="70" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    dept</text>

  <!-- ENROLLMENT junction table (center) -->
  <rect x="330" y="90" width="220" height="170" rx="4" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <rect x="330" y="90" width="220" height="30" rx="4" fill="#12101a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">ENROLLMENT</text>
  <text x="340" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PK,FK  student_id</text>
  <text x="340" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PK,FK  course_id</text>
  <text x="340" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">       enrolled_at</text>
  <text x="340" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">       grade_letter</text>
  <text x="340" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">       status</text>
  <text x="340" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">  ↑ 관계 속성도 여기 저장</text>

  <!-- COURSE table -->
  <rect x="640" y="90" width="180" height="130" rx="4" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <rect x="640" y="90" width="180" height="30" rx="4" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">COURSE</text>
  <text x="650" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PK  id</text>
  <text x="650" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    title</text>
  <text x="650" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    credits</text>
  <text x="650" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    professor</text>
  <text x="650" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    max_seats</text>

  <!-- Left arrow: STUDENT → ENROLLMENT (1:N) -->
  <line x1="240" y1="155" x2="330" y2="155" stroke="#7777cc" stroke-width="1.5"/>
  <!-- 1 side at student -->
  <line x1="246" y1="149" x2="246" y2="161" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="253" y1="149" x2="253" y2="161" stroke="#7777cc" stroke-width="1.5"/>
  <!-- N side at enrollment -->
  <line x1="325" y1="155" x2="315" y2="149" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="325" y1="155" x2="313" y2="155" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="325" y1="155" x2="315" y2="161" stroke="#7777cc" stroke-width="1.5"/>
  <text x="285" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1 : N</text>

  <!-- Right arrow: ENROLLMENT → COURSE (N:1) -->
  <line x1="550" y1="155" x2="640" y2="155" stroke="#7777cc" stroke-width="1.5"/>
  <!-- N side at enrollment -->
  <line x1="555" y1="155" x2="565" y2="149" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="555" y1="155" x2="567" y2="155" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="555" y1="155" x2="565" y2="161" stroke="#7777cc" stroke-width="1.5"/>
  <!-- 1 side at course -->
  <line x1="634" y1="149" x2="634" y2="161" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="627" y1="149" x2="627" y2="161" stroke="#7777cc" stroke-width="1.5"/>
  <text x="595" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">N : 1</text>

  <!-- Original N:M label -->
  <text x="440" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">STUDENT (N) ↔ (M) COURSE</text>
  <text x="440" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">N:M는 직접 FK로 표현 불가 → 교차 테이블로 분해 필수</text>

  <!-- Key: junction table benefits -->
  <rect x="60" y="348" width="760" height="36" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">교차 테이블에 관계 속성(성적, 등록일 등) 추가 가능 · 각 행이 관계 인스턴스 1개를 표현</text>
</svg>
