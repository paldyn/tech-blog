<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">숫자 구분자 사용 규칙</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">허용되는 위치 · 허용되지 않는 위치</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#1e2433" stroke-width="1"/>

  <!-- Valid -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 허용</text>
  <rect x="60" y="126" width="340" height="190" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 10진수 — 3자리 그룹</text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#b5cea8">1_000_000</tspan>
  </text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 16진수 — 2바이트 그룹</text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#b5cea8">0xDEAD_BEEF</tspan>
  </text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 2진수 — 8비트 그룹</text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#b5cea8">0b0001_0000</tspan>
  </text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 소수점 이하</text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#b5cea8">3.141_592</tspan>
  </text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// BigInt</text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#b5cea8">1_000n</tspan>
  </text>

  <!-- Invalid -->
  <text x="480" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗ 허용 안됨</text>
  <rect x="480" y="126" width="340" height="190" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="496" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 맨 앞 또는 맨 뒤</text>
  <text x="496" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e05555">_1000</tspan><tspan fill="#6a8aa0">  // SyntaxError</tspan>
  </text>
  <text x="496" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e05555">1000_</tspan><tspan fill="#6a8aa0">  // SyntaxError</tspan>
  </text>
  <text x="496" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 연속 구분자</text>
  <text x="496" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e05555">1__000</tspan><tspan fill="#6a8aa0"> // SyntaxError</tspan>
  </text>
  <text x="496" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 소수점 앞뒤</text>
  <text x="496" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e05555">3._14</tspan><tspan fill="#6a8aa0">  // SyntaxError</tspan>
  </text>

  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
