<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pwd · cd · ls 핵심 사용법</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">파일시스템 탐색 3대 명령어</text>

  <!-- pwd block -->
  <text x="76" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">pwd — 현재 위치</text>
  <rect x="60" y="108" width="360" height="96" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ pwd</text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">/home/alice/projects</text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ pwd -P   <text fill="#6a8aa0"># 심볼릭링크 해제</text></text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">/data/real/path</text>

  <!-- cd block -->
  <text x="76" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">cd — 디렉터리 이동</text>
  <rect x="60" y="232" width="360" height="152" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ cd /etc/nginx   <text fill="#6a8aa0"># 절대 경로</text></text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ cd conf.d       <text fill="#6a8aa0"># 상대 경로</text></text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ cd ..           <text fill="#6a8aa0"># 상위 디렉터리</text></text>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ cd ~            <text fill="#6a8aa0"># 홈 디렉터리</text></text>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ cd -            <text fill="#6a8aa0"># 이전 위치 복귀</text></text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ cd ../../opt    <text fill="#6a8aa0"># 두 단계 위 → opt</text></text>

  <!-- ls block -->
  <text x="476" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c55a">ls — 목록 조회</text>
  <rect x="460" y="108" width="360" height="276" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls              <text fill="#6a8aa0"># 기본 목록</text></text>
  <text x="476" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -l           <text fill="#6a8aa0"># 상세 정보</text></text>
  <text x="476" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -la          <text fill="#6a8aa0"># 숨김 파일 포함</text></text>
  <text x="476" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -lh          <text fill="#6a8aa0"># 사람이 읽기 좋은 크기</text></text>
  <text x="476" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -lt          <text fill="#6a8aa0"># 수정 시간 정렬</text></text>
  <text x="476" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -lS          <text fill="#6a8aa0"># 크기 정렬</text></text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -R           <text fill="#6a8aa0"># 하위 재귀 출력</text></text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -d */        <text fill="#6a8aa0"># 디렉터리만</text></text>
  <text x="476" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls *.txt        <text fill="#6a8aa0"># 글로브 패턴</text></text>
  <text x="476" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -1           <text fill="#6a8aa0"># 한 줄에 하나</text></text>
  <text x="476" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls --color=auto <text fill="#6a8aa0"># 색상 출력</text></text>
  <text x="476" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 자주 쓰는 조합</text>
  <text x="476" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ls -lahtr</text>
  <text x="476" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 숨김+상세+크기+역시간순</text>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">alias ll='ls -lahtr' 로 자주 쓰는 조합을 단축키로 등록하면 편하다</text>
</svg>
