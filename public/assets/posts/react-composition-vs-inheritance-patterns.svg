<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컴포지션 핵심 패턴 3가지</text>

  <!-- Pattern 1: children -->
  <rect x="60" y="72" width="236" height="50" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="178" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">1. children prop</text>

  <rect x="60" y="136" width="236" height="250" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Card({ children }) {</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff"> className=</tspan><tspan fill="#ce9178">"card"</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">      {children}</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">    &lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">  );</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8">// 사용</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Card</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">h2</tspan><tspan fill="#ffffff">&gt;제목&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">h2</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">p</tspan><tspan fill="#ffffff">&gt;내용&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">p</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Card</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
  </text>

  <!-- Pattern 2: slot props -->
  <rect x="322" y="72" width="236" height="50" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">2. 슬롯 props</text>

  <rect x="322" y="136" width="236" height="250" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="338" y="156" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="338" dy="0"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Dialog({ header, body, footer }) {</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff"> className=</tspan><tspan fill="#ce9178">"dialog"</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">header</tspan><tspan fill="#ffffff">&gt;{header}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">header</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">main</tspan><tspan fill="#ffffff">&gt;{body}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">main</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">footer</tspan><tspan fill="#ffffff">&gt;{footer}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">footer</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#ffffff">    &lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#ffffff">  );</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="338" dy="18"> </tspan>
    <tspan x="338" dy="18"><tspan fill="#9aa4b8">// header, body, footer에</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#9aa4b8">// 각각 다른 컴포넌트 삽입 가능</tspan></tspan>
  </text>

  <!-- Pattern 3: specialization -->
  <rect x="584" y="72" width="236" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="702" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">3. 특수화</text>

  <rect x="584" y="136" width="236" height="250" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="600" y="156" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="600" dy="0"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Dialog({ title, message }) {</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">h1</tspan><tspan fill="#ffffff">&gt;{title}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">h1</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">p</tspan><tspan fill="#ffffff">&gt;{message}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">p</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">    &lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">  );</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="600" dy="18"> </tspan>
    <tspan x="600" dy="18"><tspan fill="#9aa4b8">// 특수화: 기본값 고정</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> AlertDialog(props) {</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Dialog</tspan><tspan fill="#ffffff"> title=</tspan><tspan fill="#ce9178">"경고"</tspan><tspan fill="#ffffff"> {...props} /&gt;;</tspan></tspan>
  </text>
</svg>
