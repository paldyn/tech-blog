<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">효과적인 AI 코딩 프롬프트 패턴</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Proven Prompt Templates for Code Generation</text>

  <!-- Left: implementation prompt -->
  <text x="80" y="102" font-size="13" font-weight="600" fill="#55c555">기능 구현 요청 템플릿</text>
  <rect x="60" y="114" width="370" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 기능: [기능명]</text>
  <text x="76" y="152" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">목적: 사용자 이메일 인증 구현</text>
  <text x="76" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 기술 스택</text>
  <text x="76" y="190" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- FastAPI, SQLAlchemy 2.0</text>
  <text x="76" y="208" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- Redis (이메일 토큰 TTL)</text>
  <text x="76" y="228" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 요구사항</text>
  <text x="76" y="246" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">1. POST /auth/send-verification</text>
  <text x="76" y="264" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">2. GET /auth/verify?token=xxx</text>
  <text x="76" y="282" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">3. 토큰 24시간 만료</text>
  <text x="76" y="302" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 제약사항</text>
  <text x="76" y="320" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- 타입 힌트, 한국어 주석</text>

  <!-- Right: debug prompt -->
  <text x="456" y="102" font-size="13" font-weight="600" fill="#e05555">디버깅 요청 템플릿</text>
  <rect x="440" y="114" width="380" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 에러 상황</text>
  <text x="456" y="152" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">환경: Python 3.11 + FastAPI</text>
  <text x="456" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 에러 메시지</text>
  <text x="456" y="190" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555" xml:space="preserve">sqlalchemy.exc.IntegrityError:</text>
  <text x="456" y="208" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555" xml:space="preserve">UNIQUE constraint failed: users.email</text>
  <text x="456" y="228" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 관련 코드</text>
  <text x="456" y="246" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">async def create_user(data):</text>
  <text x="456" y="264" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    user = User(**data.dict())</text>
  <text x="456" y="282" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    db.add(user)</text>
  <text x="456" y="302" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 기대 동작</text>
  <text x="456" y="320" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">중복 이메일 시 400 에러 반환</text>

  <!-- Bottom anti-patterns -->
  <text x="60" y="342" font-size="14" font-weight="600" fill="#e8e8e8">피해야 할 프롬프트 패턴</text>

  <rect x="60" y="358" width="220" height="30" rx="5" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="170" y="377" text-anchor="middle" font-size="12" fill="#e05555">❌ "코드 만들어줘" (너무 막연)</text>

  <rect x="296" y="358" width="260" height="30" rx="5" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="426" y="377" text-anchor="middle" font-size="12" fill="#e05555">❌ "전체 시스템 설계해줘" (너무 큰 단위)</text>

  <rect x="572" y="358" width="248" height="30" rx="5" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="696" y="377" text-anchor="middle" font-size="12" fill="#e05555">❌ "완벽하게 만들어줘" (불명확 기준)</text>

  <text x="60" y="396" font-size="12" fill="#555">* 좋은 프롬프트 = 목적 + 기술 스택 + 구체적 요구사항 + 제약사항 + 예시 (선택)</text>
</svg>
