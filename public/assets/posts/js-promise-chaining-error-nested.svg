<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Promise 중첩(Anti-pattern) vs 체이닝(권장)</text>

  <!-- Left: nested (bad) -->
  <rect x="50" y="68" width="370" height="290" rx="6" fill="#000000" stroke="#e05555"/>
  <text x="235" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">&#xC911;&#xCCA9; &#xD328;&#xD134; (&#xC548;&#xD2F0;&#xD328;&#xD134;)</text>

  <text x="66" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">fetch(url).then(res =&gt; {</text>
  <text x="66" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // &#xC911;&#xCCA9; .then &#xC548;&#xC5D0;</text>
  <text x="66" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  res.json().then(data =&gt; {</text>
  <text x="66" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    process(data).then(r =&gt; {</text>
  <text x="66" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      console.log(r)</text>
  <text x="66" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    })</text>
  <text x="66" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  })</text>
  <text x="66" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">})</text>

  <text x="235" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#xC5D0;&#xB7EC; &#xCC98;&#xB9AC; &#xBD88;&#xAC00;&#xB2A5;</text>
  <text x="235" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#xCF5C;&#xBC31; &#xC9C0;&#xC625;&#xACFC; &#xB3D9;&#xC77C;&#xD55C; &#xAD6C;&#xC870;</text>
  <text x="235" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#xB0B4;&#xBD80; Promise &#xBC18;&#xD658; &#xBD88;&#xAC00;</text>

  <!-- Right: flat chain (good) -->
  <rect x="460" y="68" width="370" height="290" rx="6" fill="#000000" stroke="#55c555"/>
  <text x="645" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">&#xD3C9;&#xD0C4; &#xCCB4;&#xC774;&#xB2DD; (&#xAD8C;&#xC7A5;)</text>

  <text x="476" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">fetch(url)</text>
  <text x="476" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  .then(res =&gt; res.json())</text>
  <text x="476" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  .then(data =&gt; process(data))</text>
  <text x="476" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  .then(r =&gt; console.log(r))</text>
  <text x="476" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  .catch(err =&gt; handleErr(err))</text>

  <text x="645" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#xC5D0;&#xB7EC; &#xD55C; &#xACF3;&#xC5D0;&#xC11C; &#xCD1D;&#xAD04;</text>
  <text x="645" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#xD3C9;&#xD0C4;&#xD558;&#xACE0; &#xC77D;&#xAE30; &#xC27D;&#xB2E4;</text>
  <text x="645" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">return&#xC73C;&#xB85C; &#xB2E4;&#xC74C; .then&#xC5D0; &#xC804;&#xB2EC;</text>
  <text x="645" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">.then&#xC774; Promise &#xBC18;&#xD658; &#xC2DC; &#xB3D9;&#xD654;</text>
</svg>
