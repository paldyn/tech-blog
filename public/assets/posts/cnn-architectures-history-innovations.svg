<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">아키텍처별 핵심 혁신</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">각 모델이 기여한 구조적 아이디어</text>

  <!-- AlexNet box -->
  <rect x="36"  y="95" width="185" height="160" fill="#100808" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="128"  y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">AlexNet (2012)</text>
  <text x="54"  y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• GPU 병렬 학습 도입</text>
  <text x="54"  y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• ReLU 활성화 함수</text>
  <text x="54"  y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• Dropout 정규화</text>
  <text x="54"  y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• Data Augmentation</text>
  <text x="54"  y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• Local Response Norm</text>
  <text x="54"  y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">60M 파라미터 / 8레이어</text>

  <!-- VGGNet box -->
  <rect x="240"  y="95" width="185" height="160" fill="#0f0b06" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="332"  y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">VGGNet (2014)</text>
  <text x="258"  y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 3×3 작은 커널 일관 사용</text>
  <text x="258"  y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 깊이 체계적 탐구</text>
  <text x="258"  y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 단순 · 일관된 설계</text>
  <text x="258"  y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 전이학습 기준 모델</text>
  <text x="258"  y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">3×3 두 번 = 5×5 수용야</text>
  <text x="258"  y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">138M 파라미터 / 16-19레이어</text>

  <!-- GoogLeNet box -->
  <rect x="444"  y="95" width="185" height="160" fill="#0a0a12" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="536"  y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">GoogLeNet (2014)</text>
  <text x="462"  y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• Inception 모듈</text>
  <text x="462"  y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 1×1 병목 합성곱</text>
  <text x="462"  y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• Global Average Pooling</text>
  <text x="462"  y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 보조 분류기(AuxLoss)</text>
  <text x="462"  y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다중 스케일 동시 처리</text>
  <text x="462"  y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">5M 파라미터 / 22레이어</text>

  <!-- ResNet box -->
  <rect x="648"  y="95" width="196" height="160" fill="#080f08" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="746"  y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">ResNet (2015)</text>
  <text x="666"  y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 잔차 연결 (skip)</text>
  <text x="666"  y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• Batch Normalization</text>
  <text x="666"  y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• He 초기화</text>
  <text x="666"  y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 152층 깊이 학습 가능</text>
  <text x="666"  y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기울기 소실 문제 해결</text>
  <text x="666"  y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">25M 파라미터 / 50-152레이어</text>

  <!-- 1x1 Convolution explanation -->
  <rect x="36" y="275" width="390" height="140" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <text x="231" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">1×1 합성곱의 역할</text>
  <text x="56"  y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">채널 차원 압축/확장 (채널 믹서)</text>
  <text x="56"  y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">256ch → 64ch: Conv(256,64,1×1) → 파라미터 4× 절약</text>
  <text x="56"  y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">비선형성 추가 (ReLU 후)</text>
  <text x="56"  y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">공간 정보 보존하면서 채널 조합</text>
  <text x="56"  y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">MobileNet, SqueezeNet 등에서 핵심 블록</text>

  <!-- Inception module explanation -->
  <rect x="444" y="275" width="400" height="140" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <text x="644" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">Inception 모듈 구조</text>
  <text x="464" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">입력을 4개 병렬 분기로 처리 → 채널 방향 concat</text>

  <!-- 4 branches visual -->
  <g transform="translate(464, 330)">
    <rect x="0"   y="0" width="60" height="26" fill="#1a1a2a" rx="3" stroke="#7777cc" stroke-width="1"/>
    <text x="30"  y="17" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">1×1 Conv</text>

    <rect x="70"  y="0" width="60" height="26" fill="#1a1a2a" rx="3" stroke="#7777cc" stroke-width="1"/>
    <text x="100" y="17" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">3×3 Conv</text>

    <rect x="140" y="0" width="60" height="26" fill="#1a1a2a" rx="3" stroke="#7777cc" stroke-width="1"/>
    <text x="170" y="17" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">5×5 Conv</text>

    <rect x="210" y="0" width="70" height="26" fill="#1a1a2a" rx="3" stroke="#7777cc" stroke-width="1"/>
    <text x="245" y="17" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">MaxPool</text>

    <polygon points="150,44 144,32 156,32" fill="#ce9178" stroke="#7a5530" stroke-width="1"/>
    <line x1="30"  y1="26" x2="150" y2="36" stroke="#ce9178" stroke-width="1"/>
    <line x1="100" y1="26" x2="150" y2="36" stroke="#ce9178" stroke-width="1"/>
    <line x1="170" y1="26" x2="150" y2="36" stroke="#ce9178" stroke-width="1"/>
    <line x1="245" y1="26" x2="150" y2="36" stroke="#ce9178" stroke-width="1"/>

    <rect x="110" y="44" width="80" height="24" fill="#1a0f08" rx="3" stroke="#ce9178" stroke-width="1"/>
    <text x="150" y="60" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">Concat (채널)</text>
    <text x="150" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">다중 스케일 특징 동시 포착</text>
  </g>
</svg>
