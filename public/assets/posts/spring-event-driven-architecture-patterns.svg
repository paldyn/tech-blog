<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이벤트 기반 아키텍처(EDA) 핵심 패턴</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Pub/Sub · Event Sourcing · Saga Pattern</text>

  <!-- ===== Section 1: Pub/Sub ===== -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">1. Pub/Sub 패턴</text>

  <!-- Publisher -->
  <rect x="60" y="116" width="130" height="56" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="125" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Order Service</text>
  <text x="125" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">publishes event</text>

  <!-- Arrow to broker -->
  <line x1="190" y1="144" x2="256" y2="144" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="223" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">OrderCreated</text>

  <!-- Broker/Bus -->
  <rect x="260" y="108" width="140" height="72" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="330" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Event Broker</text>
  <text x="330" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Kafka / RabbitMQ</text>
  <text x="330" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">/ Spring Events</text>

  <!-- Broker → Subscriber 1 -->
  <line x1="400" y1="130" x2="466" y2="115" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <!-- Broker → Subscriber 2 -->
  <line x1="400" y1="150" x2="466" y2="165" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Subscriber 1 -->
  <rect x="470" y="98" width="140" height="52" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="540" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Payment Service</text>
  <text x="540" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">결제 처리</text>

  <!-- Subscriber 2 -->
  <rect x="470" y="158" width="140" height="52" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="540" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Notification</text>
  <text x="540" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이메일/SMS</text>

  <!-- Benefit note -->
  <rect x="640" y="108" width="200" height="72" rx="6" fill="#131313" stroke="#555" stroke-width="1"/>
  <text x="650" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">장점</text>
  <text x="650" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 발행자-구독자 결합 없음</text>
  <text x="650" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 구독자 독립 확장</text>
  <text x="650" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 장애 격리</text>

  <!-- ===== Section 2: Event Sourcing ===== -->
  <text x="60" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e09555">2. Event Sourcing</text>

  <!-- State changes as events -->
  <rect x="60" y="256" width="740" height="86" rx="6" fill="#151510" stroke="#e09555" stroke-width="1"/>

  <rect x="80" y="270" width="100" height="58" rx="4" fill="#1a1a1a" stroke="#e09555" stroke-width="1"/>
  <text x="130" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e09555" text-anchor="middle">OrderCreated</text>
  <text x="130" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">{id:1, amt:100}</text>
  <text x="130" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">t=0</text>

  <line x1="180" y1="299" x2="210" y2="299" stroke="#e09555" stroke-width="1.5" marker-end="url(#arr3)"/>

  <rect x="214" y="270" width="100" height="58" rx="4" fill="#1a1a1a" stroke="#e09555" stroke-width="1"/>
  <text x="264" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e09555" text-anchor="middle">ItemAdded</text>
  <text x="264" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">{item:A, qty:2}</text>
  <text x="264" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">t=1</text>

  <line x1="314" y1="299" x2="344" y2="299" stroke="#e09555" stroke-width="1.5" marker-end="url(#arr3)"/>

  <rect x="348" y="270" width="100" height="58" rx="4" fill="#1a1a1a" stroke="#e09555" stroke-width="1"/>
  <text x="398" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e09555" text-anchor="middle">Paid</text>
  <text x="398" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">{txId:abc}</text>
  <text x="398" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">t=2</text>

  <line x1="448" y1="299" x2="478" y2="299" stroke="#e09555" stroke-width="1.5" marker-end="url(#arr3)"/>

  <text x="520" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#555" text-anchor="middle">→</text>

  <rect x="560" y="270" width="220" height="58" rx="4" fill="#1a201a" stroke="#55c555" stroke-width="1"/>
  <text x="670" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">현재 상태 = Replay</text>
  <text x="670" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이벤트 재생 → Aggregate 재구성</text>
  <text x="670" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전체 감사 로그 내장</text>

  <!-- ===== Section 3: Saga Pattern ===== -->
  <text x="60" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">3. Saga 패턴 (Choreography)</text>

  <!-- Saga flow -->
  <rect x="60" y="392" width="116" height="56" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="118" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Order</text>
  <text x="118" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OrderPlaced</text>
  <text x="118" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">emit ↓</text>

  <line x1="176" y1="420" x2="216" y2="420" stroke="#7777cc" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="220" y="392" width="116" height="56" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="278" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Stock</text>
  <text x="278" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">StockReserved</text>
  <text x="278" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">emit ↓</text>

  <line x1="336" y1="420" x2="376" y2="420" stroke="#7777cc" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="380" y="392" width="116" height="56" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="438" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Payment</text>
  <text x="438" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PaymentDone</text>
  <text x="438" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">emit ↓</text>

  <line x1="496" y1="420" x2="536" y2="420" stroke="#7777cc" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="540" y="392" width="116" height="56" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="598" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Shipping</text>
  <text x="598" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Shipped</text>
  <text x="598" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">완료</text>

  <!-- Compensating note -->
  <rect x="680" y="392" width="170" height="56" rx="6" fill="#1a1515" stroke="#e05555" stroke-width="1"/>
  <text x="765" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">실패 시 보상 트랜잭션</text>
  <text x="765" y="431" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">역방향 이벤트 발행</text>
  <text x="765" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">각 서비스가 롤백</text>

  <!-- Bottom key concepts -->
  <rect x="60" y="472" width="760" height="48" rx="6" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="440" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">EDA 설계 원칙</text>
  <text x="440" y="511" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이벤트는 과거형 명사 · At-Least-Once 보장 · 멱등성(Idempotency) 필수</text>
</svg>
