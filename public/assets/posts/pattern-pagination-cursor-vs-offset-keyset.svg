<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Keyset 페이지네이션 — 복합 정렬 처리</text>

  <!-- Problem: timestamp tie-breaking -->
  <rect x="60" y="66" width="360" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 문제: created_at 동일한 경우</text>
  <text x="80" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">-- WHERE created_at &lt; :cursor 만 쓰면</tspan>
  </text>
  <text x="80" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">-- 같은 시간의 행이 누락될 수 있음</tspan>
  </text>
  <text x="80" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#e05555">-- ⚠ 불안정한 커서</tspan>
  </text>
  <text x="80" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> created_at </tspan><tspan fill="#7ec8e3" font-weight="600">&lt;</tspan><tspan fill="#ffffff"> :ts</tspan>
  </text>

  <!-- Solution: composite keyset -->
  <rect x="460" y="66" width="360" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 해결: 복합 Keyset</text>
  <text x="480" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> (created_at, id)</tspan>
  </text>
  <text x="480" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  &lt;</tspan><tspan fill="#ffffff"> (:last_ts, :last_id)</tspan>
  </text>
  <text x="480" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">ORDER BY</tspan><tspan fill="#ffffff"> created_at </tspan><tspan fill="#7ec8e3" font-weight="600">DESC</tspan><tspan fill="#ffffff">, id </tspan><tspan fill="#7ec8e3" font-weight="600">DESC</tspan>
  </text>
  <text x="480" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">LIMIT</tspan><tspan fill="#ffffff"> :page_size</tspan>
  </text>

  <!-- API response example -->
  <rect x="60" y="212" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// API 응답 구조 (GraphQL Relay-style)</text>
  <text x="80" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">{</tspan>
  </text>
  <text x="80" y="276" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">"data"</tspan><tspan fill="#ffffff">: [...</tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#ffffff"> items...],</tspan>
  </text>
  <text x="80" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">"pageInfo"</tspan><tspan fill="#ffffff">: {</tspan>
  </text>
  <text x="80" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"hasNextPage"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="80" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"endCursor"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"eyJpZCI6MTAwLCJ0cyI6IjIwMjQtMDEtMDEifQ=="</tspan>
  </text>
  <text x="80" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  }</tspan><tspan fill="#9aa4b8">  // Base64(JSON) 인코딩된 커서</tspan>
  </text>
  <text x="80" y="376" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
</svg>
