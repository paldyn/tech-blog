<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CRC 계산 과정 (XOR 다항식 나눗셈)</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">송신자: 나머지(FCS) 계산 후 첨부 → 수신자: 전체 나눗셈 나머지 = 0이면 정상</text>

  <defs>
    <marker id="crc1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="60" y="90" width="340" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">① 데이터와 생성 다항식</text>
  <text x="80" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">데이터  M = 11010011101100</text>
  <text x="80" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">다항식  G = 1011  (x³+x+1)</text>
  <text x="80" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">3비트 0 추가 → M' = 11010011101100 000</text>

  <!-- Step 2 -->
  <rect x="60" y="210" width="340" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">② XOR 나눗셈 (이진 mod-2)</text>
  <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">11010011101100000</text>
  <text x="80" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">÷ 1011 (XOR 반복) = 몫 + 나머지</text>
  <text x="80" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">나머지(FCS) = 100</text>

  <!-- Arrow -->
  <line x1="400" y1="260" x2="460" y2="260" stroke="#7ec8e3" stroke-width="2" marker-end="url(#crc1)"/>

  <!-- Step 3 -->
  <rect x="460" y="90" width="360" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">③ 송신 프레임</text>
  <text x="480" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">데이터 + FCS</text>
  <text x="480" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">11010011101100 <tspan fill="#e05555">100</tspan></text>
  <text x="480" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">FCS 3비트가 끝에 붙음</text>

  <!-- Step 4 -->
  <rect x="460" y="210" width="360" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">④ 수신자 검증</text>
  <text x="480" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">수신 프레임 ÷ G</text>
  <text x="480" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">나머지 = 0  → 정상 수신</text>
  <text x="480" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">나머지 ≠ 0  → 오류 감지 → 폐기</text>

  <!-- Bottom info -->
  <rect x="60" y="330" width="760" height="80" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">실제 표준 CRC</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CRC-8 (ATM HEC)   CRC-16 (USB, Modbus)   CRC-32 (이더넷 FCS, ZIP)   CRC-32C (iSCSI, SCTP)</text>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이더넷 FCS: 32비트 CRC → 최대 32비트 연속 오류, 홀수 비트 오류 100% 감지</text>
</svg>
