<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-d" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CRC 동작 원리 — 다항식 나눗셈</text>

  <!-- Sender side -->
  <rect x="40" y="68" width="380" height="340" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">송신자 (Sender)</text>

  <!-- Step 1 -->
  <rect x="60" y="108" width="340" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">데이터 M = 1101011011</text>
  <text x="80" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">다항식 G = 10011 (CRC-4)</text>

  <line x1="230" y1="158" x2="230" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-d)"/>

  <!-- Step 2 -->
  <rect x="60" y="172" width="340" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">M' = M * 2^(n-1)</text>
  <text x="80" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">= 11010110110000</text>

  <line x1="230" y1="222" x2="230" y2="236" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-d)"/>

  <!-- Step 3 -->
  <rect x="60" y="236" width="340" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">R = M' mod G</text>
  <text x="80" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">R = 1110 (나머지)</text>

  <line x1="230" y1="286" x2="230" y2="300" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-d)"/>

  <!-- Step 4: Transmit -->
  <rect x="60" y="300" width="340" height="50" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">전송: M + R = 11010110111110</text>
  <text x="230" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">원본 + CRC 비트</text>

  <!-- Receiver side -->
  <rect x="460" y="68" width="380" height="340" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">수신자 (Receiver)</text>

  <!-- Receive -->
  <rect x="480" y="108" width="340" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" text-anchor="middle">수신: 11010110111110</text>
  <text x="650" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">같은 G로 나눗셈 수행</text>

  <line x1="650" y1="158" x2="650" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-d)"/>

  <!-- Check -->
  <rect x="480" y="172" width="340" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">T mod G = 나머지</text>

  <line x1="650" y1="222" x2="650" y2="236" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-d)"/>

  <!-- Result: OK -->
  <rect x="480" y="236" width="160" height="80" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="560" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">나머지 = 0</text>
  <text x="560" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">오류 없음</text>

  <!-- Result: Error -->
  <rect x="660" y="236" width="160" height="80" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">나머지 &#8800; 0</text>
  <text x="740" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">오류 검출!</text>

  <!-- Summary -->
  <rect x="480" y="330" width="340" height="60" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">CRC-32: 이더넷 FCS 필드</text>
  <text x="650" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">하드웨어로 고속 계산 가능</text>

  <!-- Arrow between sender and receiver -->
  <line x1="420" y1="300" x2="458" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arr-r)"/>
</svg>
