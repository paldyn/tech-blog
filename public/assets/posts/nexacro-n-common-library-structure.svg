<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">공통 라이브러리 계층 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Nexacro N 프로젝트에서 공통 라이브러리가 위치하는 계층</text>

  <!-- Layer 1: Application Forms -->
  <rect x="60" y="100" width="760" height="64" rx="8" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">업무 화면 폼 (Business Forms)</text>
  <text x="440" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">SCR001.xfdl · SCR002.xfdl · SCR003.xfdl · ...</text>

  <!-- Arrow down -->
  <line x1="440" y1="164" x2="440" y2="188" stroke="#555" stroke-width="2"/>
  <polygon points="440,196 434,184 446,184" fill="#555"/>

  <!-- Layer 2: Common Library -->
  <rect x="60" y="196" width="760" height="64" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">공통 라이브러리 (Common Library)</text>
  <text x="440" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">gfn_*.xjs · common.xjs · CommonVariables.xjs · BaseForm.xfdl</text>

  <!-- Arrow down -->
  <line x1="440" y1="260" x2="440" y2="284" stroke="#555" stroke-width="2"/>
  <polygon points="440,292 434,280 446,280" fill="#555"/>

  <!-- Layer 3: Nexacro N Runtime -->
  <rect x="60" y="292" width="760" height="64" rx="8" fill="#2a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Nexacro N 런타임 (Runtime)</text>
  <text x="440" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">nexacro.Button · nexacro.Grid · nexacro.Dataset · nexacro.Application</text>

  <!-- Common Library breakdown -->
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">공통 라이브러리 구성 요소</text>

  <!-- 4 boxes -->
  <rect x="60" y="405" width="165" height="50" rx="6" fill="#151515" stroke="#55c555" stroke-width="1"/>
  <text x="142" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">전역 함수</text>
  <text x="142" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">gfn_*.xjs</text>

  <rect x="247" y="405" width="165" height="50" rx="6" fill="#151515" stroke="#7ec8e3" stroke-width="1"/>
  <text x="329" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">공유 변수</text>
  <text x="329" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CommonVariables.xjs</text>

  <rect x="434" y="405" width="165" height="50" rx="6" fill="#151515" stroke="#e8a840" stroke-width="1"/>
  <text x="516" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a840" text-anchor="middle">공통 팝업</text>
  <text x="516" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">gfn_confirm.xfdl</text>

  <rect x="621" y="405" width="199" height="50" rx="6" fill="#151515" stroke="#7777cc" stroke-width="1"/>
  <text x="720" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">기본 폼</text>
  <text x="720" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">BaseForm.xfdl</text>
</svg>
