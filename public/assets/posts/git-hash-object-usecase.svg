<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">hash-object 실전: 수동 스테이징</text>

  <defs>
    <marker id="arrhash2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Step boxes -->
  <rect x="60" y="80" width="160" height="60" rx="8" fill="#111111" stroke="#888" stroke-width="1.5"/>
  <text x="140" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">1. blob 생성</text>
  <text x="140" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">hash-object -w</text>

  <line x1="220" y1="110" x2="280" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrhash2)"/>

  <rect x="280" y="80" width="160" height="60" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="360" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">2. index 등록</text>
  <text x="360" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">update-index --add</text>

  <line x1="440" y1="110" x2="500" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrhash2)"/>

  <rect x="500" y="80" width="160" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="580" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">3. tree 작성</text>
  <text x="580" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">write-tree</text>

  <line x1="660" y1="110" x2="720" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrhash2)"/>

  <rect x="720" y="80" width="120" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="780" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">4. 커밋</text>
  <text x="780" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">commit-tree</text>

  <!-- Full code example -->
  <rect x="60" y="170" width="760" height="170" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># git add + commit 을 plumbing 으로 직접 구현</text>
  <text xml:space="preserve" x="80" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 1) blob 저장</text>
  <text xml:space="preserve" x="80" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">SHA=$(</text><text xml:space="preserve" x="138" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git hash-object</text><text xml:space="preserve" x="276" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -w hello.txt)</text>
  <text xml:space="preserve" x="80" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 2) index 에 등록</text>
  <text xml:space="preserve" x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git update-index</text><text xml:space="preserve" x="218" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --add --cacheinfo 100644,$SHA,hello.txt</text>
  <text xml:space="preserve" x="80" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 3) tree 작성 + commit</text>
  <text xml:space="preserve" x="80" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">TREE=$(</text><text xml:space="preserve" x="144" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git write-tree</text><text xml:space="preserve" x="255" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">) &amp;&amp; </text><text xml:space="preserve" x="310" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git commit-tree</text><text xml:space="preserve" x="453" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> $TREE -m </text><text xml:space="preserve" x="545" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"init"</text>
</svg>
