<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">B 트리 삽입 — 노드 분할(Split)</text>

  <!-- Before split label -->
  <text x="200" y="75" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">삽입 전 (가득 참: 3개 키)</text>

  <!-- Full node [10 | 20 | 30] -->
  <rect x="60" y="90" width="280" height="48" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="2"/>
  <line x1="130" y1="90" x2="130" y2="138" stroke="#e05555" stroke-width="1"/>
  <line x1="200" y1="90" x2="200" y2="138" stroke="#e05555" stroke-width="1"/>
  <line x1="270" y1="90" x2="270" y2="138" stroke="#e05555" stroke-width="1"/>
  <text x="95" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">10</text>
  <text x="165" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">20</text>
  <text x="235" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">30</text>
  <text x="295" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">FULL</text>
  <text x="200" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178" text-anchor="middle">→ 25 삽입 시 분할 필요</text>

  <!-- Arrow -->
  <path d="M 380 114 L 430 114" stroke="#ce9178" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <text x="405" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">분할</text>

  <!-- After split: parent gets 20, two children [10] and [30] -->
  <text x="660" y="75" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">분할 후</text>

  <!-- Parent: [20] -->
  <rect x="580" y="90" width="160" height="48" fill="#1a2a4a" rx="8" stroke="#55c555" stroke-width="2"/>
  <line x1="660" y1="90" x2="660" y2="138" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">20</text>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ptr</text>
  <text x="660" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">중앙 키→부모 승격</text>

  <!-- Left child: [10] -->
  <rect x="500" y="188" width="120" height="44" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="560" y1="188" x2="560" y2="232" stroke="#3a4a6e" stroke-width="1"/>
  <text x="530" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">10</text>
  <text x="580" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">·</text>

  <!-- Right child: [25 | 30] -->
  <rect x="640" y="188" width="160" height="44" fill="#0d1520" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <line x1="706" y1="188" x2="706" y2="232" stroke="#3a4a6e" stroke-width="1"/>
  <text x="673" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">25</text>
  <text x="733" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">30</text>
  <text x="660" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">새 키 25 삽입됨</text>

  <!-- Edges parent → children -->
  <line x1="620" y1="138" x2="560" y2="188" stroke="#555" stroke-width="1.5"/>
  <line x1="700" y1="138" x2="720" y2="188" stroke="#555" stroke-width="1.5"/>

  <!-- Code box -->
  <rect x="50" y="278" width="780" height="105" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> split_child(parent, i, child, t):</tspan>
  </text>
  <text x="66" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    new_node = BTreeNode(t, child.is_leaf)</tspan>
  </text>
  <text x="66" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    mid = child.keys[t - </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">]         </tspan><tspan fill="#9aa4b8"># 중앙 키</tspan>
  </text>
  <text x="66" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    new_node.keys = child.keys[t:]      </tspan><tspan fill="#9aa4b8"># 오른쪽 절반</tspan>
  </text>
  <text x="66" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    child.keys = child.keys[:t - </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">]    </tspan><tspan fill="#9aa4b8"># 왼쪽 절반</tspan>
  </text>
</svg>
