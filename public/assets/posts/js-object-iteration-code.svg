<svg width="880" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">for...in vs Object.entries() 비교</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">프로토타입 체인 포함 여부가 핵심 차이</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="256" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Line 1 -->
  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> obj = { x: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, y: </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> };</tspan></text>
  <!-- Line 2 -->
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">Object.prototype.z = <tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">;</tspan></text>
  <!-- Line 3 (blank) -->
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> </text>
  <!-- Line 4 -->
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// for...in: 프로토타입도 열거</text>
  <!-- Line 5 -->
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"><tspan fill="#7ec8e3">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> k </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#ffffff"> obj) {</tspan></text>
  <!-- Line 6 -->
  <text x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  console.log(k); <tspan fill="#9aa4b8">// x, y, z !</tspan></text>
  <!-- Line 7 -->
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">}</text>
  <!-- Line 8 (blank) -->
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> </text>
  <!-- Line 9 -->
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// Object.entries: 자신 소유만</text>
  <!-- Line 10 -->
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"><tspan fill="#7ec8e3">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> [k, v] </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#ffffff"> Object.entries(obj)) {</tspan></text>
  <!-- Line 11 -->
  <text x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  console.log(k, v); <tspan fill="#9aa4b8">// x 1, y 2</tspan></text>
  <!-- Line 12 -->
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">}</text>

  <!-- Footer -->
</svg>
