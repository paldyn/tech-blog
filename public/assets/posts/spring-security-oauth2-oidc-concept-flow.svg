<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">OAuth2 Authorization Code Flow</text>

  <!-- ===== 3개 열: 브라우저(사용자), 앱(클라이언트), 인가 서버/리소스 서버 ===== -->

  <!-- 헤더 박스 -->
  <rect x="60" y="68" width="180" height="44" rx="6" fill="#1a1a2e" stroke="#555577" stroke-width="1.5"/>
  <text x="150" y="95" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">사용자 브라우저</text>

  <rect x="350" y="68" width="180" height="44" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="95" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">앱 (클라이언트)</text>

  <rect x="640" y="68" width="180" height="44" rx="6" fill="#0a1f0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="87" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555">인가 서버</text>
  <text x="730" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(Google/Kakao/Naver 등)</text>

  <!-- 수직 레인 구분선 (점선) -->
  <line x1="150" y1="112" x2="150" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="440" y1="112" x2="440" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="730" y1="112" x2="730" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- STEP 1: 사용자 → 앱 (로그인 요청) -->
  <text x="55" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">①</text>
  <line x1="163" y1="145" x2="437" y2="145"
        stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="300" y="137" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">GET /oauth2/authorization/google</text>

  <!-- STEP 2: 앱 → 인가서버 (리다이렉트) -->
  <text x="335" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">②</text>
  <line x1="453" y1="183" x2="727" y2="183"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="590" y="175" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">302 → 인가 서버 로그인 페이지</text>

  <!-- STEP 3: 사용자 인증 -->
  <text x="615" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">③</text>
  <rect x="655" y="215" width="150" height="28" rx="4" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="730" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">사용자 로그인 · 동의</text>

  <!-- STEP 4: 인가서버 → 앱 (Authorization Code) -->
  <text x="335" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">④</text>
  <line x1="717" y1="269" x2="453" y2="269"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="590" y="261" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">302 → /callback?code=AUTH_CODE</text>

  <!-- STEP 5: 앱 → 인가서버 (토큰 교환) -->
  <text x="335" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">⑤</text>
  <line x1="453" y1="311" x2="727" y2="311"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="590" y="303" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">POST /token (code + client_secret)</text>

  <!-- STEP 6: 인가서버 → 앱 (Access Token + ID Token) -->
  <text x="335" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">⑥</text>
  <line x1="717" y1="352" x2="453" y2="352"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="590" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">access_token + id_token (OIDC)</text>

  <!-- STEP 7: 앱 → 인가서버 (UserInfo) -->
  <text x="335" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">⑦</text>
  <line x1="453" y1="393" x2="727" y2="393"
        stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-b)"/>
  <text x="590" y="385" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">GET /userinfo (OIDC, 선택)</text>

  <!-- STEP 8: 앱 → 브라우저 (세션 생성) -->
  <text x="55" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">⑧</text>
  <line x1="427" y1="437" x2="163" y2="437"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="300" y="429" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">302 → /home (세션 쿠키 발급)</text>

  <!-- OAuth2 vs OIDC 주석 박스 -->
  <rect x="60" y="460" width="550" height="44" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="335" y="479" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600">OAuth2 vs OIDC</text>
  <text x="335" y="496" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">OAuth2 = 인가(Authorization) / OIDC = OAuth2 위에 인증(Authentication) 추가 — id_token(JWT) 포함</text>
</svg>
