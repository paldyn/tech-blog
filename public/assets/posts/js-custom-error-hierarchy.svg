<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">도메인 Error 클래스 계층 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">AppError를 루트로 계층적으로 설계 — instanceof로 레이어별 포착</text>

  <!-- Root: Error -->
  <rect x="350" y="90" width="180" height="46" rx="6" fill="#0a0a14" stroke="#555"/>
  <text x="440" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">Error (내장)</text>

  <!-- Arrow down -->
  <line x1="440" y1="136" x2="440" y2="164" stroke="#555" stroke-width="1.5"/>
  <polygon points="433,158 440,166 447,158" fill="#555"/>

  <!-- AppError -->
  <rect x="310" y="166" width="260" height="46" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">AppError</text>

  <!-- Branch arrows from AppError -->
  <line x1="350" y1="212" x2="170" y2="260" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="164,253 168,263 176,256" fill="#7ec8e3"/>

  <line x1="420" y1="212" x2="370" y2="260" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="363,253 367,263 375,256" fill="#7ec8e3"/>

  <line x1="460" y1="212" x2="510" y2="260" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="503,253 507,263 515,256" fill="#7ec8e3"/>

  <line x1="530" y1="212" x2="710" y2="260" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="704,253 708,263 716,256" fill="#7ec8e3"/>

  <!-- Layer 2 errors -->
  <rect x="60" y="262" width="220" height="46" rx="6" fill="#071a1a" stroke="#7ec8e3"/>
  <text x="170" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">NetworkError</text>

  <rect x="300" y="262" width="160" height="46" rx="6" fill="#1a0a1a" stroke="#7777cc"/>
  <text x="380" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">AuthError</text>

  <rect x="480" y="262" width="160" height="46" rx="6" fill="#0a1a0a" stroke="#55c555"/>
  <text x="560" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">ValidationError</text>

  <rect x="660" y="262" width="160" height="46" rx="6" fill="#1a1a0a" stroke="#888"/>
  <text x="740" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">NotFoundError</text>

  <!-- Layer 3: NetworkError children -->
  <line x1="140" y1="308" x2="100" y2="350" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="200" y1="308" x2="240" y2="350" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="60" y="352" width="120" height="40" rx="6" fill="#050e0e" stroke="#7ec8e3" stroke-dasharray="4,3"/>
  <text x="120" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">TimeoutError</text>

  <rect x="196" y="352" width="120" height="40" rx="6" fill="#050e0e" stroke="#7ec8e3" stroke-dasharray="4,3"/>
  <text x="256" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">RateLimitError</text>

  <!-- catch hierarchy note -->
  <rect x="460" y="352" width="370" height="90" rx="6" fill="#0a0a18" stroke="#7777cc"/>
  <text x="645" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">instanceof 포착 순서</text>
  <text x="476" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">구체적인 클래스를 먼저 catch</text>
  <text x="476" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">e instanceof TimeoutError   ← 먼저</text>
  <text x="476" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">e instanceof NetworkError   ← 이후</text>
</svg>
