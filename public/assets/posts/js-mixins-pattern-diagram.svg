<svg width="880" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">믹스인 패턴 — 기능 합성</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">다중 상속 없이 클래스에 여러 기능을 주입</text>

  <!-- Mixin 1: Flyable -->
  <rect x="60" y="110" width="200" height="90" rx="8" fill="#0a1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Flyable</text>
  <line x1="60" y1="144" x2="260" y2="144" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="76" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">fly()</text>
  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">takeOff()</text>
  <text x="160" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">(Base) ⇒ class extends Base</text>

  <!-- Mixin 2: Swimmable -->
  <rect x="60" y="230" width="200" height="90" rx="8" fill="#0a200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Swimmable</text>
  <line x1="60" y1="264" x2="260" y2="264" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">swim()</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">dive()</text>
  <text x="160" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">(Base) ⇒ class extends Base</text>

  <!-- Base class: Animal -->
  <rect x="340" y="230" width="180" height="80" rx="8" fill="#1a1a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="430" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Animal</text>
  <line x1="340" y1="264" x2="520" y2="264" stroke="#7777cc" stroke-width="1" stroke-opacity="0.4"/>
  <text x="356" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">name</text>
  <text x="356" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">eat()</text>

  <!-- Arrow: composition chain -->
  <line x1="260" y1="155" x2="640" y2="155" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="260" y1="275" x2="520" y2="275" stroke="#55c555" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Duck class (result) -->
  <rect x="590" y="110" width="230" height="240" rx="8" fill="#0f0f20" stroke="#ce9178" stroke-width="2"/>
  <text x="705" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#ce9178" text-anchor="middle">Duck</text>
  <line x1="590" y1="144" x2="820" y2="144" stroke="#ce9178" stroke-width="1" stroke-opacity="0.4"/>

  <text x="606" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Animal에서 상속:</text>
  <text x="606" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" xml:space="preserve">name, eat()</text>
  <text x="606" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Swimmable 믹스인:</text>
  <text x="606" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">swim(), dive()</text>
  <text x="606" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Flyable 믹스인:</text>
  <text x="606" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">fly(), takeOff()</text>
  <text x="606" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Duck 자신:</text>
  <text x="606" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">quack()</text>

  <!-- Formula -->
  <rect x="60" y="360" width="760" height="40" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="440" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">class Duck extends Flyable(Swimmable(Animal)) {}</text>

  <!-- Footer -->
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
