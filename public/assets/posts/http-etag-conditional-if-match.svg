<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">If-Match로 막는 갱신 분실 (Lost Update)</text>
    <!-- Actors -->
    <rect x="70" y="64" width="170" height="46" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="155" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">클라이언트 A</text>
    <rect x="320" y="64" width="170" height="46" rx="8" fill="#1f173a" stroke="#7777cc" stroke-width="1.5"/>
    <text x="405" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#9b8fe8">클라이언트 B</text>
    <rect x="640" y="64" width="170" height="46" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="725" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">원본 서버</text>
    <!-- Lifelines -->
    <line x1="155" y1="110" x2="155" y2="432" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="405" y1="110" x2="405" y2="432" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="725" y1="110" x2="725" y2="432" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,4"/>
    <!-- 1. A GET -->
    <text x="440" y="148" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">GET /doc/42</text>
    <line x1="155" y1="160" x2="723" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- 2. return v1 -->
    <text x="440" y="184" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">200 OK · ETag: &quot;v1&quot;</text>
    <line x1="725" y1="196" x2="157" y2="196" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrG)"/>
    <!-- 3. B GET -->
    <text x="565" y="220" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9b8fe8">GET /doc/42</text>
    <line x1="405" y1="232" x2="723" y2="232" stroke="#7777cc" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- 4. return v1 to B -->
    <text x="565" y="256" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">200 OK · ETag: &quot;v1&quot;</text>
    <line x1="725" y1="268" x2="407" y2="268" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrG)"/>
    <!-- 5. A PUT -->
    <text x="440" y="296" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">PUT /doc/42 + If-Match: &quot;v1&quot;</text>
    <line x1="155" y1="308" x2="723" y2="308" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- 6. 200 v2 -->
    <text x="440" y="332" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">200 OK · ETag: &quot;v2&quot; (저장 성공)</text>
    <line x1="725" y1="344" x2="157" y2="344" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrG)"/>
    <!-- 7. B PUT stale -->
    <text x="565" y="372" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9b8fe8">PUT /doc/42 + If-Match: &quot;v1&quot;</text>
    <line x1="405" y1="384" x2="723" y2="384" stroke="#7777cc" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- 8. 412 -->
    <text x="565" y="408" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">412 Precondition Failed</text>
    <line x1="725" y1="420" x2="407" y2="420" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrR)"/>
    <!-- Summary -->
    <text x="440" y="460" text-anchor="middle" font-size="12" fill="#888">서버의 현재 ETag는 &quot;v2&quot; — B의 If-Match: &quot;v1&quot;은 강한 비교에서 불일치 → 412 거부</text>
    <text x="440" y="478" text-anchor="middle" font-size="11" fill="#555">B는 최신 버전을 다시 GET한 뒤 변경 사항을 병합해 재시도해야 한다</text>
  </g>
</svg>
