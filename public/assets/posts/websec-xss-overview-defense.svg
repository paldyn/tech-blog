<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">XSS 방어 핵심 코드</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">출력 인코딩 · DOM 안전 API · HttpOnly 쿠키 · CSP</text>

  <rect x="60" y="94" width="760" height="326" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text xml:space="preserve" x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Python: 출력 이스케이프 (Jinja2 autoescape)</text>
  <text xml:space="preserve" x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="111" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> markupsafe </text>
  <text xml:space="preserve" x="232" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="279" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> escape</text>
  <text xml:space="preserve" x="80" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">safe = escape(user_comment)</text>
  <text xml:space="preserve" x="80" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># &lt;script&gt; → &amp;lt;script&amp;gt; — HTML로 렌더링 안 됨</text>

  <text xml:space="preserve" x="80" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// JS: DOM 안전 API 사용</text>
  <text xml:space="preserve" x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">el.innerHTML = userInput;        // 위험: XSS</text>
  <text xml:space="preserve" x="80" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">el.textContent = userInput;      // 안전: 텍스트로만</text>

  <text xml:space="preserve" x="80" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// DOMPurify로 HTML 허용이 필요한 경우</text>
  <text xml:space="preserve" x="80" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="124" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> DOMPurify </text>
  <text xml:space="preserve" x="208" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="240" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> 'dompurify';</text>
  <text xml:space="preserve" x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">el.innerHTML = DOMPurify.sanitize(userHtml);</text>

  <text xml:space="preserve" x="80" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Python: HttpOnly + Secure 쿠키</text>
  <text xml:space="preserve" x="80" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">response.set_cookie(</text>
  <text xml:space="preserve" x="80" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    </text>
  <text xml:space="preserve" x="104" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"session_id"</text>
  <text xml:space="preserve" x="192" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, token,</text>
  <text xml:space="preserve" x="80" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    httponly=</text>
  <text xml:space="preserve" x="168" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">True</text>
  <text xml:space="preserve" x="200" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, secure=</text>
  <text xml:space="preserve" x="270" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">True</text>
  <text xml:space="preserve" x="302" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, samesite=</text>
  <text xml:space="preserve" x="390" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"Strict"</text>
  <text xml:space="preserve" x="450" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
</svg>
