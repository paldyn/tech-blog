<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">inode 구조</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">파일 이름을 제외한 모든 메타데이터가 inode에 저장된다</text>

  <!-- Directory entry -->
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">디렉터리 항목</text>
  <rect x="60" y="126" width="200" height="180" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <rect x="60" y="126" width="200" height="36" fill="#1e2433" rx="8"/>
  <rect x="60" y="144" width="200" height="18" fill="#1e2433"/>
  <text x="160" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">파일명 → inode 번호</text>

  <text x="80" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">hello.txt</text>
  <text x="200" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="end">42381</text>

  <text x="80" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">data.csv</text>
  <text x="200" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="end">42382</text>

  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">link.txt</text>
  <text x="200" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="end">42381</text>

  <text x="80" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 같은 inode 번호!</text>
  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">하드 링크</text>

  <!-- Arrow from dir to inode -->
  <line x1="260" y1="216" x2="320" y2="216" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="320,210 332,216 320,222" fill="#7ec8e3"/>
  <text x="290" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">번호로</text>
  <text x="290" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">조회</text>

  <!-- inode box -->
  <text x="352" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">inode #42381</text>
  <rect x="332" y="126" width="240" height="340" fill="#0f1e0f" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="452" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">파일 유형</text>
  <text x="452" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">regular file (-)</text>
  <line x1="352" y1="186" x2="552" y2="186" stroke="#1e3a1e" stroke-width="1"/>
  <text x="452" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">권한</text>
  <text x="452" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">-rw-r--r-- (0644)</text>
  <line x1="352" y1="236" x2="552" y2="236" stroke="#1e3a1e" stroke-width="1"/>
  <text x="452" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">링크 수</text>
  <text x="452" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">2</text>
  <line x1="352" y1="286" x2="552" y2="286" stroke="#1e3a1e" stroke-width="1"/>
  <text x="452" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">소유자 UID/GID</text>
  <text x="452" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">1000 / 1000</text>
  <line x1="352" y1="336" x2="552" y2="336" stroke="#1e3a1e" stroke-width="1"/>
  <text x="452" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">크기 (bytes)</text>
  <text x="452" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">2048</text>
  <line x1="352" y1="386" x2="552" y2="386" stroke="#1e3a1e" stroke-width="1"/>
  <text x="452" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">atime / mtime / ctime</text>
  <text x="452" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">2026-05-10 …</text>
  <line x1="352" y1="436" x2="552" y2="436" stroke="#1e3a1e" stroke-width="1"/>
  <text x="452" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">데이터 블록 포인터</text>

  <!-- Arrow from inode to data blocks -->
  <line x1="572" y1="456" x2="620" y2="456" stroke="#7777cc" stroke-width="2"/>
  <polygon points="620,450 632,456 620,462" fill="#7777cc"/>

  <!-- data blocks -->
  <text x="652" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">데이터 블록</text>
  <rect x="632" y="126" width="188" height="60" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="726" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">block #1024</text>
  <text x="726" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">Hello, World!</text>

  <rect x="632" y="198" width="188" height="60" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="726" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">block #1025</text>
  <text x="726" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">…(이어지는 내용)</text>

  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">파일 이름은 inode에 없음 — 디렉터리가 이름과 inode 번호를 연결하는 테이블 역할</text>
</svg>
