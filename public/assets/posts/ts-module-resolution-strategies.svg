<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <!-- Background -->
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">moduleResolution 전략 4종 비교</text>

  <!-- Row 1: classic -->
  <rect x="60" y="76" width="200" height="60" fill="#000000" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">classic</text>
  <rect x="300" y="76" width="520" height="60" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="320" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" xml:space="preserve">TypeScript 초기의 레거시 방식 — node_modules를 모른다</text>
  <text x="320" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">하위 호환용으로만 존재. 새 프로젝트에서 사용 금지</text>

  <!-- Row 2: node10 -->
  <rect x="60" y="152" width="200" height="60" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">node10 (node)</text>
  <rect x="300" y="152" width="520" height="60" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="320" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" xml:space="preserve">CommonJS 시절 Node의 방식 — 확장자 생략·index 파일 허용</text>
  <text x="320" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">package.json의 exports 필드를 인식하지 못함</text>

  <!-- Row 3: bundler -->
  <rect x="60" y="228" width="200" height="60" fill="#000000" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">bundler</text>
  <rect x="300" y="228" width="520" height="60" fill="#111827" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="320" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" xml:space="preserve">Vite·esbuild·webpack 환경용 — exports 지원 + 확장자 생략 허용</text>
  <text x="320" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">번들러로 빌드하는 프런트엔드 프로젝트의 기본 선택</text>

  <!-- Row 4: node16/nodenext -->
  <rect x="60" y="304" width="200" height="60" fill="#000000" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">node16·nodenext</text>
  <rect x="300" y="304" width="520" height="60" fill="#111827" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="320" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" xml:space="preserve">현대 Node ESM 규칙 — 상대 경로에 확장자 필수, exports 엄격 적용</text>
  <text x="320" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">tsc 출력물을 Node로 직접 실행하는 서버·라이브러리용</text>

  <!-- Bottom note -->
  <rect x="60" y="388" width="760" height="42" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">선택 기준: 번들러가 빌드하면 bundler, Node가 직접 실행하면 nodenext</text>
</svg>
