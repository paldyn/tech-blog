<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Mocha + Chai + Sinon 스택 구조</text>

  <!-- Mocha box (center top) -->
  <rect x="290" y="78" width="300" height="72" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">Mocha</text>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테스트 러너 · describe/it · 생명주기 훅</text>

  <!-- Arrows from Mocha to three boxes -->
  <line x1="330" y1="150" x2="200" y2="210" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="150" x2="440" y2="210" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="150" x2="670" y2="210" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Chai box -->
  <rect x="60" y="212" width="280" height="72" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">Chai</text>
  <text x="200" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">어서션 라이브러리 (assert / expect / should)</text>

  <!-- Reporter box -->
  <rect x="300" y="212" width="280" height="72" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">Reporter</text>
  <text x="440" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">spec · dot · min · tap · json</text>

  <!-- Sinon box -->
  <rect x="540" y="212" width="280" height="72" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="680" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">Sinon</text>
  <text x="680" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Stub · Spy · Fake Timers · Fake XHR</text>

  <!-- Chai styles row -->
  <text x="60" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Chai 어서션 스타일</text>

  <rect x="60" y="344" width="236" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">assert (TDD 스타일)</text>
  <text x="80" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">assert.equal(a, b)</text>

  <rect x="322" y="344" width="236" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="342" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">expect (BDD 스타일)</text>
  <text x="342" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">expect(a).to.equal(b)</text>

  <rect x="584" y="344" width="236" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="604" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">should (BDD 스타일)</text>
  <text x="604" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">a.should.equal(b)</text>

  <!-- Mocha lifecycle hooks -->
  <text x="60" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">생명주기 훅 실행 순서</text>

  <rect x="60" y="450" width="760" height="20" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600">before</text>
  <text x="145" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888"> →</text>
  <text x="162" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff"> beforeEach</text>
  <text x="248" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888"> →</text>
  <text x="265" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555"> it(테스트)</text>
  <text x="346" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888"> →</text>
  <text x="363" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff"> afterEach</text>
  <text x="447" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888"> →</text>
  <text x="464" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600"> after</text>
  <text x="510" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">  (루트 훅은 전체 스위트)</text>
</svg>
