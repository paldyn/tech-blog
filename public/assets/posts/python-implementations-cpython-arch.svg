<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CPython 실행 파이프라인</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">소스 코드에서 실행까지의 단계</text>

  <!-- Steps -->
  <rect x="60" y="96" width="140" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">소스 코드</text>
  <text x="130" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.py 파일</text>

  <line x1="200" y1="126" x2="250" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="250" y="96" width="140" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="320" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">파서</text>
  <text x="320" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AST 생성</text>

  <line x1="390" y1="126" x2="440" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="440" y="96" width="140" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="510" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">컴파일러</text>
  <text x="510" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">바이트코드 생성</text>

  <line x1="580" y1="126" x2="630" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="630" y="96" width="140" height="60" rx="8" fill="#1f1a0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#f59e0b" text-anchor="middle">PVM</text>
  <text x="700" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">바이트코드 실행</text>

  <!-- .pyc file -->
  <rect x="390" y="180" width="140" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="460" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">__pycache__/</text>
  <text x="460" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.pyc 파일 캐시</text>

  <!-- PyPy comparison -->
  <rect x="60" y="260" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">CPython vs PyPy 실행 속도 (순수 Python)</text>
  <!-- Progress bars -->
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#a78bfa">CPython</text>
  <rect x="160" y="298" width="200" height="18" rx="4" fill="#7777cc"/>
  <text x="370" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888"> 1x (기준)</text>

  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">PyPy</text>
  <rect x="160" y="334" width="500" height="18" rx="4" fill="#22c55e"/>
  <text x="670" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888"> 5~10x 빠름</text>

  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">JIT(Just-In-Time) 컴파일로 핫 경로를 기계어로 직접 변환 — CPU 집약 루프에서 효과 극대화</text>
</svg>
