<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 L5,7 Z" fill="#555"/>
    </marker>
    <marker id="arrow2" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 L5,7 Z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">환경별 설정 분리 구조</text>

  <!-- Top layer: 공통 설정 -->
  <rect x="260" y="60" width="360" height="96" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">공통 설정</text>
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TypeDef_common.xml</text>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">공통 서비스 정의</text>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">공통 변수</text>

  <!-- Connector lines from top to middle -->
  <line x1="440" y1="156" x2="440" y2="174" stroke="#444" stroke-width="1.5"/>
  <line x1="160" y1="174" x2="720" y2="174" stroke="#444" stroke-width="1.5"/>
  <line x1="160" y1="174" x2="160" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="440" y1="174" x2="440" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="720" y1="174" x2="720" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Middle layer: dev -->
  <rect x="40" y="194" width="220" height="110" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">개발 (dev)</text>
  <text x="150" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TypeDef_dev.xml</text>
  <text x="150" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">로컬 서버 URL</text>
  <text x="150" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">DEBUG=true</text>

  <!-- Middle layer: stg -->
  <rect x="330" y="194" width="220" height="110" rx="8" fill="#1a1a1a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#b5cea8">스테이징 (stg)</text>
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TypeDef_stg.xml</text>
  <text x="440" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스테이징 서버 URL</text>
  <text x="440" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">LOG=INFO</text>

  <!-- Middle layer: prod -->
  <rect x="620" y="194" width="220" height="110" rx="8" fill="#1a1a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">운영 (prod)</text>
  <text x="730" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TypeDef_prod.xml</text>
  <text x="730" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">운영 서버 URL</text>
  <text x="730" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">LOG=ERROR</text>

  <!-- Connector lines from middle to bottom -->
  <line x1="150" y1="304" x2="150" y2="334" stroke="#444" stroke-width="1.5"/>
  <line x1="440" y1="304" x2="440" y2="334" stroke="#444" stroke-width="1.5"/>
  <line x1="730" y1="304" x2="730" y2="334" stroke="#444" stroke-width="1.5"/>
  <line x1="150" y1="334" x2="730" y2="334" stroke="#444" stroke-width="1.5"/>
  <line x1="440" y1="334" x2="440" y2="354" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bottom note -->
  <rect x="140" y="356" width="600" height="52" rx="8" fill="#1c1c10" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">배포 스크립트가 환경별 설정 파일을 선택해 배포</text>
  <text x="440" y="398" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#666">cp config/TypeDef_${ENV}.xml dist/TypeDef.xml</text>
</svg>
