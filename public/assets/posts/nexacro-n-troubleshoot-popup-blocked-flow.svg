<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">팝업 차단 발생 메커니즘</text>

  <!-- User action -->
  <rect x="60" y="62" width="180" height="72" rx="6" fill="#0d1e35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">사용자 버튼 클릭</text>
  <text x="150" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">onclick 이벤트</text>
  <text x="150" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 직접 액션</text>

  <!-- Arrow -->
  <line x1="240" y1="98" x2="300" y2="98" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Script runs -->
  <rect x="300" y="62" width="180" height="72" rx="6" fill="#0d2b1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">스크립트 실행</text>
  <text x="390" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동기 처리</text>
  <text x="390" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 팝업 허용 컨텍스트</text>

  <!-- Arrow -->
  <line x1="480" y1="98" x2="540" y2="98" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- openPopup -->
  <rect x="540" y="62" width="180" height="72" rx="6" fill="#0d2b1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">openPopup() 호출</text>
  <text x="630" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">window.open 내부 호출</text>
  <text x="630" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 팝업 열림</text>

  <!-- Separator label -->
  <text x="440" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">--- 비동기 처리 개입 시 ---</text>

  <!-- Async path: user click -->
  <rect x="60" y="182" width="180" height="72" rx="6" fill="#0d1e35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">사용자 버튼 클릭</text>
  <text x="150" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">onclick 이벤트</text>
  <text x="150" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 직접 액션</text>

  <!-- Arrow -->
  <line x1="240" y1="218" x2="300" y2="218" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Transaction (async) -->
  <rect x="300" y="182" width="180" height="72" rx="6" fill="#1a1435" stroke="#7777cc" stroke-width="1.5"/>
  <text x="390" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">트랜잭션 (비동기)</text>
  <text x="390" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버 호출 대기</text>
  <text x="390" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 컨텍스트 소멸</text>

  <!-- Arrow -->
  <line x1="480" y1="218" x2="540" y2="218" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <!-- openPopup in callback -->
  <rect x="540" y="182" width="180" height="72" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="630" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">콜백에서 openPopup</text>
  <text x="630" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">window.open 호출</text>
  <text x="630" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 브라우저 차단</text>

  <!-- Bottom note -->
  <rect x="60" y="278" width="760" height="60" rx="6" fill="#0d2b1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">해결: 팝업 호출을 직접 액션 컨텍스트 안으로 이동</text>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">비동기 콜백에서는 팝업 대신 전달 데이터 저장 → 별도 직접 액션으로 팝업 오픈</text>

  <text x="440" y="365" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">브라우저 팝업 정책: 사용자 직접 액션(클릭) 없이 열리는 창은 차단 대상</text>
</svg>
