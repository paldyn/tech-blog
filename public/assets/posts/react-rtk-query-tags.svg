  <rect x="325" y="250" width="230" height="70" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="440" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c800">2. нғңк·ё л¬ҙнҡЁнҷ”</text>
  <text x="440" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">'Post' мәҗмӢң stale мІҳлҰ¬</text>

  <rect x="600" y="250" width="230" height="70" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="715" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">3. мһҗлҸҷ refetch</text>
  <text x="715" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">кө¬лҸ… мӨ‘мқё мҝјлҰ¬ мһ¬мҡ”мІӯ</text>

  <line x1="280" y1="285" x2="325" y2="285" stroke="#e8c800" stroke-width="2" marker-end="url(#arrYellow)"/>
  <line x1="555" y1="285" x2="600" y2="285" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>

  <text x="440" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">лӘ©лЎқ нҷ”л©ҙмқ„ кө¬лҸ… мӨ‘мқҙлқјл©ҙ кёҖ мһ‘м„ұ м§Ғнӣ„ лӘ©лЎқмқҙ мһҗлҸҷмңјлЎң к°ұмӢ лҗңлӢӨ</text>
</svg>
