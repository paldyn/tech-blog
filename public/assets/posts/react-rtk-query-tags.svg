      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c800"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">нғңк·ё кё°л°ҳ мәҗмӢң л¬ҙнҡЁнҷ”</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">providesTagsмҷҖ invalidatesTagsмқҳ м—°кІ°</text>

  <!-- Query box -->
  <rect x="50" y="100" width="260" height="70" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="122" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">useGetPostsQuery</text>
  <text x="180" y="140" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">providesTags: ['Post']</text>
  <text x="180" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">мәҗмӢң н•ӯлӘ©м—җ нғңк·ёлҘј л¶ҷмқёлӢӨ</text>

  <!-- Tag node -->
  <rect x="390" y="112" width="100" height="46" rx="23" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="440" y="140" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8c800">'Post'</text>

  <!-- Mutation box -->
