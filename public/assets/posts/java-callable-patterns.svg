<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Callable 활용 패턴</text>

  <!-- Left: Exception propagation -->
  <rect x="60" y="62" width="380" height="312" rx="10" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="250" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">checked 예외 전파</text>

  <rect x="80" y="98" width="340" height="254" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="96" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// Callable: throws 선언 가능</text>
  <text x="96" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Callable&lt;Connection&gt; c = () -&gt; {</text>
  <text x="96" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> ds.getConnection();</text>
  <text x="96" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // SQLException (checked) OK</text>
  <text x="96" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">};</text>
  <text x="96" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="96" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Future&lt;Connection&gt; f =</text>
  <text x="96" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  executor.submit(c);</text>
  <text x="96" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">try</tspan> {</text>
  <text x="96" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  Connection conn = f.get();</text>
  <text x="96" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">} <tspan fill="#7ec8e3" font-weight="600">catch</tspan> (ExecutionException e) {</text>
  <text x="96" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // getCause() = SQLException</text>
  <text x="96" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Right: Callable composition -->
  <rect x="460" y="62" width="380" height="312" rx="10" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="650" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Callable 조합 (여러 작업 병렬)</text>

  <rect x="480" y="98" width="340" height="254" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="496" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 병렬 실행 후 결과 합산</text>
  <text x="496" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">List&lt;Callable&lt;Integer&gt;&gt; tasks =</text>
  <text x="496" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  List.of(</text>
  <text x="496" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    () -&gt; countOrders("KR"),</text>
  <text x="496" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    () -&gt; countOrders("US"),</text>
  <text x="496" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    () -&gt; countOrders("JP"));</text>
  <text x="496" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="496" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">int</tspan> total = executor</text>
  <text x="496" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  .invokeAll(tasks)</text>
  <text x="496" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  .stream()</text>
  <text x="496" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  .mapToInt(f -&gt; {</text>
  <text x="496" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">try</tspan> { <tspan fill="#7ec8e3" font-weight="600">return</tspan> f.get(); }</text>
  <text x="496" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">catch</tspan>(Exception e){<tspan fill="#7ec8e3" font-weight="600">return</tspan> 0;}})</text>
</svg>
