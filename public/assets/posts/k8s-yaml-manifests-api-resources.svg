  <text x="680" y="167" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">워크로드</text>

  <!-- Row 3 -->
  <rect x="60" y="184" width="760" height="36" rx="0" fill="#0d1f2d"/>
  <text x="200" y="207" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">apps/v1</text>
  <text x="440" y="207" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
