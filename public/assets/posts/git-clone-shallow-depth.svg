<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">전체 복제 vs 얕은 복제 (--depth)</text>

  <!-- Left: Full Clone -->
  <text x="200" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">전체 복제 (Full Clone)</text>

  <!-- Commit chain: C1 → C2 → C3 → C4 → C5 (HEAD) -->
  <!-- C1 -->
  <rect x="60" y="110" width="64" height="36" rx="6" fill="#1a2233" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="92" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">C1</text>
  <!-- C2 -->
  <rect x="156" y="110" width="64" height="36" rx="6" fill="#1a2233" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="188" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">C2</text>
  <!-- C3 -->
  <rect x="252" y="110" width="64" height="36" rx="6" fill="#1a2233" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="284" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">C3</text>
  <!-- C4 -->
  <rect x="60" y="174" width="64" height="36" rx="6" fill="#1a2233" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="92" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">C4</text>
  <!-- C5 HEAD -->
  <rect x="156" y="174" width="64" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="188" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">C5 HEAD</text>

  <!-- Arrows full clone -->
  <line x1="124" y1="128" x2="155" y2="128" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>
  <line x1="220" y1="128" x2="251" y2="128" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>
  <line x1="284" y1="146" x2="284" y2="164" stroke="#888" stroke-width="2"/>
  <line x1="284" y1="164" x2="220" y2="192" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>
  <line x1="124" y1="192" x2="155" y2="192" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- Full clone label -->
  <text x="200" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">히스토리 전체 다운로드</text>
  <text x="200" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">크기 크고 시간 오래 걸림</text>

  <!-- Divider -->
  <line x1="440" y1="90" x2="440" y2="440" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Right: Shallow Clone -->
  <text x="660" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">얕은 복제 (--depth 2)</text>

  <!-- Shallow: only C4, C5 -->
  <!-- Truncation indicator -->
  <rect x="520" y="110" width="64" height="36" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="552" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">…</text>
  <!-- C4 shallow -->
  <rect x="616" y="110" width="64" height="36" rx="6" fill="#1a2233" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="648" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">C4</text>
  <!-- C5 shallow HEAD -->
  <rect x="712" y="110" width="80" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="752" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">C5 HEAD</text>

  <!-- Arrow shallow -->
  <line x1="584" y1="128" x2="615" y2="128" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>
  <line x1="680" y1="128" x2="711" y2="128" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- Shallow boundary marker -->
  <line x1="610" y1="95" x2="610" y2="160" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="610" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">shallow boundary</text>

  <!-- Shallow benefits -->
  <text x="660" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">최근 N개 커밋만 다운로드</text>
  <text x="660" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">빠른 속도, 적은 용량</text>

  <!-- Bottom: command box -->
  <rect x="60" y="290" width="760" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">얕은 복제 핵심 옵션</text>

  <text x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 최근 1개 커밋만 복제 (CI/CD에 최적)</text>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">clone --depth 1 &lt;url&gt;</text>

  <text x="80" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 최근 3개 커밋 복제</text>
  <text x="80" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">clone --depth 3 &lt;url&gt;</text>

  <text x="80" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 나중에 히스토리 복원</text>
  <text x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">fetch --unshallow</text>
</svg>
