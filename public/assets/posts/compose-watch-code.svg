<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">compose watch 설정 예시</text>

  <!-- Node.js watch -->
  <text x="80" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Node.js 핫 리로드</text>
  <rect x="60" y="96" width="380" height="240" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">services:</text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">web</tspan>:</text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    build: .</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">develop</tspan>:</text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">watch</tspan>:</text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        - <tspan fill="#7ec8e3" font-weight="600">action</tspan>: <tspan fill="#ce9178">sync</tspan></text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          <tspan fill="#7ec8e3" font-weight="600">path</tspan>: <tspan fill="#ce9178">./src</tspan></text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          <tspan fill="#7ec8e3" font-weight="600">target</tspan>: <tspan fill="#ce9178">/app/src</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        - <tspan fill="#7ec8e3" font-weight="600">action</tspan>: <tspan fill="#ce9178">rebuild</tspan></text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          <tspan fill="#7ec8e3" font-weight="600">path</tspan>: <tspan fill="#ce9178">package.json</tspan></text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # package.json 변경 시 재빌드</text>

  <!-- Python + config watch -->
  <text x="480" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">Python + 설정 파일</text>
  <rect x="460" y="96" width="360" height="240" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">api</tspan>:</text>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    build: .</text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">develop</tspan>:</text>
  <text x="476" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">watch</tspan>:</text>
  <text x="476" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        - <tspan fill="#7ec8e3" font-weight="600">action</tspan>: <tspan fill="#ce9178">sync</tspan></text>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          <tspan fill="#7ec8e3" font-weight="600">path</tspan>: <tspan fill="#ce9178">./app</tspan></text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          <tspan fill="#7ec8e3" font-weight="600">target</tspan>: <tspan fill="#ce9178">/app</tspan></text>
  <text x="476" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          <tspan fill="#7ec8e3" font-weight="600">ignore</tspan>:</text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">            - <tspan fill="#ce9178">__pycache__</tspan></text>
  <text x="476" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        - <tspan fill="#7ec8e3" font-weight="600">action</tspan>: <tspan fill="#ce9178">sync+restart</tspan></text>
  <text x="476" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          <tspan fill="#7ec8e3" font-weight="600">path</tspan>: <tspan fill="#ce9178">./config</tspan></text>

  <!-- Divider -->
  <line x1="60" y1="354" x2="820" y2="354" stroke="#2a2a3a" stroke-width="1"/>

  <text x="60" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실행: docker compose watch  ·  또는: docker compose up --watch</text>
</svg>
