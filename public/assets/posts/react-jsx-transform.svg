<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSX 변환 과정</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">JSX는 React.createElement() 호출의 문법적 설탕(Syntactic Sugar)이다</text>

  <defs>
    <marker id="arr-w2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arr-c2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Step 1: JSX Source -->
  <rect x="55" y="100" width="240" height="150" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="175" y="124" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">① JSX 소스코드</text>
  <rect x="70" y="135" width="210" height="100" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="155" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">const</text>
  <text x="124" y="155" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> el = (</text>
  <text x="82" y="173" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;h1</text>
  <text x="116" y="173" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve"> className</text>
  <text x="195" y="173" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">="t"&gt;</text>
  <text x="82" y="191" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    Hello!</text>
  <text x="82" y="209" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;/h1&gt;</text>
  <text x="82" y="227" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">)</text>

  <!-- Arrow 1 -->
  <line x1="295" y1="175" x2="345" y2="175" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w2)"/>
  <text x="320" y="163" font-size="11" fill="#888" text-anchor="middle">Babel/</text>
  <text x="320" y="177" font-size="11" fill="#888" text-anchor="middle">SWC 변환</text>

  <!-- Step 2: createElement -->
  <rect x="345" y="100" width="250" height="150" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="124" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">② React.createElement()</text>
  <rect x="360" y="135" width="220" height="100" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="372" y="155" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">const</text>
  <text x="414" y="155" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> el =</text>
  <text x="372" y="173" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  createElement(</text>
  <text x="372" y="191" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">    'h1'</text>
  <text x="372" y="191" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">        ,</text>
  <text x="372" y="209" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    {className:</text>
  <text x="450" y="209" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve"> 't'</text>
  <text x="470" y="209" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">},</text>
  <text x="372" y="227" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">    'Hello!'</text>
  <text x="440" y="227" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">)</text>

  <!-- Arrow 2 -->
  <line x1="595" y1="175" x2="645" y2="175" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w2)"/>
  <text x="620" y="163" font-size="11" fill="#888" text-anchor="middle">React</text>
  <text x="620" y="177" font-size="11" fill="#888" text-anchor="middle">실행</text>

  <!-- Step 3: React Element Object -->
  <rect x="645" y="100" width="200" height="150" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="745" y="124" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">③ React Element</text>
  <rect x="660" y="135" width="170" height="100" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="672" y="155" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{</text>
  <text x="672" y="173" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  type</text>
  <text x="706" y="173" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">: 'h1',</text>
  <text x="672" y="191" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  props</text>
  <text x="714" y="191" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">: {</text>
  <text x="672" y="209" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    className: 't'</text>
  <text x="672" y="227" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  }</text>
  <text x="672" y="245" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>

  <!-- Bottom: React 17+ automatic JSX transform -->
  <rect x="55" y="285" width="770" height="155" rx="8" fill="#111118" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="310" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">React 17+ 자동 변환 (New JSX Transform)</text>

  <rect x="75" y="325" width="320" height="95" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="235" y="345" font-size="12" fill="#888" text-anchor="middle">React 16 이하 (수동 import 필요)</text>
  <text x="85" y="368" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">import</text>
  <text x="130" y="368" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> React </text>
  <text x="175" y="368" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">from</text>
  <text x="205" y="368" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve"> 'react'</text>
  <text x="85" y="388" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// JSX 쓰려면 필수였음</text>
  <text x="85" y="408" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// React.createElement 직접 참조</text>

  <rect x="465" y="325" width="340" height="95" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="635" y="345" font-size="12" fill="#55c555" text-anchor="middle">React 17+ (import 불필요)</text>
  <text x="475" y="368" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// import React 생략 가능</text>
  <text x="475" y="388" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 빌드 도구가 자동으로</text>
  <text x="475" y="408" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// jsx() 함수를 inject</text>
</svg>
