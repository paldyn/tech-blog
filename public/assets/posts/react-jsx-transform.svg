<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JSX &#x2192; JavaScript 변환 과정</text>

  <!-- Left: JSX -->
  <rect x="60" y="68" width="340" height="180" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">JSX (개발자가 작성)</text>
  <rect x="76" y="106" width="308" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> App() {</tspan></text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> (</tspan></text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">className</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"app"</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="92" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#55c555">h1</tspan><tspan fill="#ffffff">&gt;Hello!&lt;/</tspan><tspan fill="#55c555">h1</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="92" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    &lt;/</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="92" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  );</text>

  <!-- Arrow -->
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0c044">Babel 변환</text>
  <line x1="400" y1="158" x2="480" y2="158" stroke="#e0c044" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Right: JS output -->
  <rect x="480" y="68" width="340" height="180" rx="12" fill="#0f1825" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">JavaScript (변환 후)</text>
  <rect x="496" y="106" width="308" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="512" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> App() {</tspan></text>
  <text x="512" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> _jsx(</tspan><tspan fill="#ce9178">'div'</tspan><tspan fill="#ffffff">, {</tspan></text>
  <text x="512" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    className: </tspan><tspan fill="#ce9178">'app'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="512" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    children: _jsx(</tspan><tspan fill="#ce9178">'h1'</tspan><tspan fill="#ffffff">, {</tspan></text>
  <text x="512" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      children: </tspan><tspan fill="#ce9178">'Hello!'</tspan></text>
  <text x="512" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    })</text>

  <!-- React Element result -->
  <text x="440" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">_jsx() &#x2192; React Element (JS 객체)</text>

  <rect x="60" y="306" width="760" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// _jsx()가 반환하는 React Element의 실제 모습</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  $$typeof: </tspan><tspan fill="#b5cea8">Symbol(react.element)</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  type: </tspan><tspan fill="#ce9178">'div'</tspan><tspan fill="#ffffff">,  props: { className: </tspan><tspan fill="#ce9178">'app'</tspan><tspan fill="#ffffff">, children: [...] },</tspan></text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  key: </tspan><tspan font-weight="600" fill="#7ec8e3">null</tspan><tspan fill="#ffffff">,  ref: </tspan><tspan font-weight="600" fill="#7ec8e3">null</tspan></text>
  <text x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 이 객체를 React가 Virtual DOM 트리로 조합한다</text>
</svg>
