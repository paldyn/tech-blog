<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JSX → JavaScript 변환 과정</text>

  <!-- Step 1: JSX -->
  <rect x="60" y="64" width="340" height="120" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="230" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">① JSX 코드 (개발자 작성)</text>
  <rect x="76" y="100" width="308" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="122" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> App() {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;h1</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">className</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"title"</tspan><tspan fill="#ce9178">&gt;</tspan><tspan fill="#ffffff">Hello</tspan><tspan fill="#ce9178">&lt;/h1&gt;</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">}</tspan>
  </text>

  <!-- Arrow 1 -->
  <line x1="400" y1="124" x2="480" y2="124" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="116" text-anchor="middle" font-size="11" fill="#7777cc">Babel/SWC</text>

  <!-- Step 2: createElement -->
  <rect x="480" y="64" width="340" height="120" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="650" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">② React.createElement() 호출</text>
  <rect x="496" y="100" width="308" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="512" y="122" fill="#ffffff">React.createElement(</tspan>
    <tspan x="512" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">'h1'</tspan><tspan fill="#ffffff">,</tspan>
    <tspan x="512" dy="18" fill="#ffffff">  { className: </tspan><tspan fill="#ce9178">'title'</tspan><tspan fill="#ffffff"> },</tspan>
    <tspan x="512" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">'Hello'</tspan>
  </text>

  <!-- Arrow 2 -->
  <line x1="650" y1="184" x2="650" y2="228" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="664" y="210" font-size="11" fill="#7777cc">반환값</text>

  <!-- Step 3: React Element object -->
  <rect x="200" y="228" width="480" height="120" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="252" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">③ React Element 객체 (Plain Object)</text>
  <rect x="216" y="264" width="448" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="232" y="286" fill="#ffffff">{</tspan>
    <tspan x="232" dy="18" fill="#7ec8e3" font-weight="600">  type</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">'h1'</tspan><tspan fill="#ffffff">,  </tspan><tspan fill="#7ec8e3" font-weight="600">props</tspan><tspan fill="#ffffff">: { className: </tspan><tspan fill="#ce9178">'title'</tspan><tspan fill="#ffffff">, children: </tspan><tspan fill="#ce9178">'Hello'</tspan><tspan fill="#ffffff"> },</tspan>
    <tspan x="232" dy="18" fill="#9aa4b8">  // React가 이 객체를 보고 실제 DOM을 만든다</tspan>
  </text>

  <!-- Arrow 3 -->
  <line x1="440" y1="348" x2="440" y2="390" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Real DOM -->
  <rect x="280" y="390" width="320" height="56" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="418" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">④ 실제 DOM: &lt;h1 class="title"&gt;Hello&lt;/h1&gt;</text>
</svg>
