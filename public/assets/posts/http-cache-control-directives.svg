<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Cache-Control 지시어 분류</text>
    <!-- Request directives -->
    <rect x="60" y="65" width="375" height="250" rx="8" fill="#0f1f2a" stroke="#4a7aaa" stroke-width="1.5"/>
    <line x1="60" y1="110" x2="435" y2="110" stroke="#4a7aaa" stroke-width="1"/>
    <text x="247" y="87" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">요청 지시어 (Request)</text>
    <text x="247" y="106" text-anchor="middle" font-size="11" fill="#888">Cache-Control: [지시어] (클라이언트 → 캐시/서버)</text>
    <text x="80" y="135" font-size="12" font-weight="600" fill="#e8e8e8">no-cache</text>
    <text x="80" y="153" font-size="11" fill="#888">  캐시에서 응답 전 서버에 재검증 강제</text>
    <text x="80" y="178" font-size="12" font-weight="600" fill="#e8e8e8">no-store</text>
    <text x="80" y="196" font-size="11" fill="#888">  캐시에 저장하지 말 것</text>
    <text x="80" y="221" font-size="12" font-weight="600" fill="#e8e8e8">max-age=N</text>
    <text x="80" y="239" font-size="11" fill="#888">  N초 이내 캐시만 수락</text>
    <text x="80" y="264" font-size="12" font-weight="600" fill="#e8e8e8">max-stale[=N]</text>
    <text x="80" y="282" font-size="11" fill="#888">  N초까지 만료 캐시도 수락</text>
    <text x="80" y="300" font-size="12" fill="#e8e8e8">min-fresh=N · only-if-cached</text>
    <!-- Response directives -->
    <rect x="445" y="65" width="375" height="250" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <line x1="445" y1="110" x2="820" y2="110" stroke="#3aaa5a" stroke-width="1"/>
    <text x="632" y="87" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">응답 지시어 (Response)</text>
    <text x="632" y="106" text-anchor="middle" font-size="11" fill="#888">Cache-Control: [지시어] (서버 → 캐시/클라이언트)</text>
    <text x="465" y="135" font-size="12" font-weight="600" fill="#e8e8e8">max-age=N</text>
    <text x="465" y="153" font-size="11" fill="#888">  N초 동안 신선(fresh)으로 취급</text>
    <text x="465" y="178" font-size="12" font-weight="600" fill="#e8e8e8">s-maxage=N</text>
    <text x="465" y="196" font-size="11" fill="#888">  공유 캐시(CDN)용 max-age (우선)</text>
    <text x="465" y="221" font-size="12" font-weight="600" fill="#e8e8e8">public</text>
    <text x="465" y="239" font-size="11" fill="#888">  공유 캐시(CDN)에 저장 가능</text>
    <text x="465" y="264" font-size="12" font-weight="600" fill="#e8e8e8">private</text>
    <text x="465" y="282" font-size="11" fill="#888">  브라우저 캐시만 가능 (CDN 금지)</text>
    <text x="465" y="300" font-size="12" fill="#e8e8e8">no-cache · no-store · immutable</text>
    <!-- Code block -->
    <rect x="60" y="334" width="760" height="106" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="361" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 자주 바뀌는 HTML 페이지</text>
    <text x="76" y="381" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Cache-Control</tspan><tspan fill="#ffffff">: no-cache, no-store</tspan></text>
    <text x="76" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 정적 에셋 (콘텐츠 해시 파일명)</text>
    <text x="76" y="421" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Cache-Control</tspan><tspan fill="#ffffff">: public, max-age=31536000, immutable</tspan></text>
    <text x="440" y="462" text-anchor="middle" font-size="11" fill="#555">no-cache ≠ 캐시 안 함 — no-cache는 "재검증 필수", no-store가 "저장 금지"</text>
  </g>
</svg>
