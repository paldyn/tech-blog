<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">파일 서버 처리 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">클라이언트 → 업로드 서블릿 → 스토리지 → DB</text>

  <!-- Client -->
  <rect x="60" y="100" width="160" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Nexacro N</text>
  <text x="140" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">FileUpload</text>
  <text x="140" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">multipart/form-data</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="140" x2="270" y2="140" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="270,134 282,140 270,146" fill="#7ec8e3"/>
  <text x="251" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">POST</text>

  <!-- Upload servlet -->
  <rect x="282" y="100" width="160" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="362" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Upload Servlet</text>
  <text x="362" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">확장자 검증</text>
  <text x="362" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">바이러스 검사</text>
  <text x="362" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일명 UUID 변환</text>

  <!-- Arrow 2 -->
  <line x1="442" y1="140" x2="492" y2="140" stroke="#7777cc" stroke-width="2"/>
  <polygon points="492,134 504,140 492,146" fill="#7777cc"/>
  <text x="473" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">저장</text>

  <!-- Storage -->
  <rect x="504" y="100" width="160" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="584" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">파일 스토리지</text>
  <text x="584" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">로컬 디스크</text>
  <text x="584" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">또는</text>
  <text x="584" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">S3 / NAS / Object</text>

  <!-- Arrow 3 -->
  <line x1="664" y1="140" x2="714" y2="140" stroke="#55c555" stroke-width="2"/>
  <polygon points="714,134 726,140 714,146" fill="#55c555"/>
  <text x="695" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">메타</text>

  <!-- DB -->
  <rect x="726" y="100" width="120" height="80" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="786" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">DB</text>
  <text x="786" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">FILE_ID</text>
  <text x="786" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ORIG_NM</text>
  <text x="786" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">STORED_PATH</text>

  <!-- Return arrow -->
  <line x1="440" y1="200" x2="440" y2="230" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="280" y="230" width="320" height="60" rx="6" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="440" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">응답 JSON</text>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">{fileId, origName, storedName, size}</text>

  <!-- Security notes -->
  <rect x="60" y="320" width="760" height="110" rx="8" fill="#111827" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">서버 측 보안 체크리스트</text>
  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">① 허용 확장자만 화이트리스트 검증 (jpg/pdf/xlsx 등)</text>
  <text x="80" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">② 저장 파일명을 UUID로 교체 (원본명 그대로 저장 금지)</text>
  <text x="80" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">③ 저장 경로를 웹 루트 외부로 설정 + 직접 URL 접근 차단</text>
</svg>
