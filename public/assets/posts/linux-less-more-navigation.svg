<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">less 탐색 키 레퍼런스</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">파일을 열고 방향키 없이도 빠르게 이동하기</text>

  <!-- Navigation section -->
  <text x="80" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">이동</text>
  <rect x="60" y="106" width="360" height="200" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">Space / f      <tspan fill="#ffffff">다음 페이지</tspan></text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">b              <tspan fill="#ffffff">이전 페이지</tspan></text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">j / ↓          <tspan fill="#ffffff">한 줄 아래</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">k / ↑          <tspan fill="#ffffff">한 줄 위</tspan></text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">g / &lt;          <tspan fill="#ffffff">파일 맨 처음</tspan></text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">G / &gt;          <tspan fill="#ffffff">파일 맨 끝</tspan></text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">50g            <tspan fill="#ffffff">50번째 줄로 이동</tspan></text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">50%            <tspan fill="#ffffff">파일의 50% 위치</tspan></text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">F              <tspan fill="#ffffff">tail -f 처럼 추적</tspan></text>

  <!-- Search section -->
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">검색</text>
  <rect x="60" y="338" width="360" height="82" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/pattern       <tspan fill="#ffffff">아래 방향 검색</tspan></text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">?pattern       <tspan fill="#ffffff">위 방향 검색</tspan></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">n / N          <tspan fill="#ffffff">다음/이전 검색 결과</tspan></text>

  <!-- Mark section -->
  <text x="480" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c55a">마크·기타</text>
  <rect x="460" y="106" width="360" height="144" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a">ma             <tspan fill="#ffffff">현재 위치를 a로 마크</tspan></text>
  <text x="476" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a">'a             <tspan fill="#ffffff">마크 a로 이동</tspan></text>
  <text x="476" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a">= / Ctrl+G     <tspan fill="#ffffff">현재 위치 정보 표시</tspan></text>
  <text x="476" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a">:n / :p        <tspan fill="#ffffff">다음/이전 파일</tspan></text>
  <text x="476" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a">v              <tspan fill="#ffffff">$EDITOR 로 열기</tspan></text>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a">h              <tspan fill="#ffffff">도움말</tspan></text>
  <text x="476" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">q              <tspan fill="#ffffff">종료</tspan></text>

  <!-- less options on launch -->
  <text x="480" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">실행 시 옵션</text>
  <rect x="460" y="282" width="360" height="138" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">less -N file   <tspan fill="#9aa4b8"># 줄 번호 표시</tspan></text>
  <text x="476" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">less -i file   <tspan fill="#9aa4b8"># 대소문자 무시 검색</tspan></text>
  <text x="476" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">less -S file   <tspan fill="#9aa4b8"># 긴 줄 잘라서 표시</tspan></text>
  <text x="476" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">less +F file   <tspan fill="#9aa4b8"># tail -f 모드로 시작</tspan></text>
  <text x="476" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">less +/err file<tspan fill="#9aa4b8"># err 검색 후 시작</tspan></text>
  <text x="476" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">less -R file   <tspan fill="#9aa4b8"># ANSI 색상 렌더링</tspan></text>
</svg>
