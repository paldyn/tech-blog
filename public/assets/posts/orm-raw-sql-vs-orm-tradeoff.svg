<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Raw SQL vs ORM 트레이드오프</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">선택 기준은 "어느 것이 더 좋은가"가 아닌 "이 상황에 무엇이 맞는가"</text>

  <!-- Two columns -->
  <!-- Raw SQL column -->
  <rect x="40" y="82" width="380" height="34" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">Raw SQL</text>

  <!-- ORM column -->
  <rect x="460" y="82" width="380" height="34" rx="6" fill="#12182a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">ORM</text>

  <!-- Advantages -->
  <text x="230" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">장점</text>
  <rect x="40" y="142" width="380" height="130" rx="6" fill="#111"/>
  <text x="60" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  완전한 SQL 제어권</text>
  <text x="60" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">   윈도우·CTE·LATERAL 등 고급 기능 그대로</text>
  <text x="60" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  성능 예측 가능</text>
  <text x="60" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">   생성 SQL이 명확 → EXPLAIN 디버깅 쉬움</text>
  <text x="60" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  DB 특화 기능 활용</text>
  <text x="60" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">   RETURNING, ON CONFLICT 등 즉시 사용</text>

  <text x="650" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">장점</text>
  <rect x="460" y="142" width="380" height="130" rx="6" fill="#111"/>
  <text x="480" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  빠른 개발 속도</text>
  <text x="480" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">   CRUD 자동화, 보일러플레이트 감소</text>
  <text x="480" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  타입 안전성 (정적 언어)</text>
  <text x="480" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">   컴파일 타임 오류 감지</text>
  <text x="480" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  객체 매핑 자동화</text>
  <text x="480" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">   ResultSet → 도메인 객체 변환 코드 불필요</text>

  <!-- Disadvantages -->
  <text x="230" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">단점</text>
  <rect x="40" y="300" width="380" height="108" rx="6" fill="#111"/>
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">✗  반복 코드 많음</text>
  <text x="60" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">✗  파라미터 바인딩 직접 관리</text>
  <text x="60" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">✗  DB 교체 시 쿼리 재작성</text>
  <text x="60" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">✗  동적 조건 처리가 번거로움</text>
  <text x="60" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">✗  SQL 인젝션 직접 방어</text>

  <text x="650" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">단점</text>
  <rect x="460" y="300" width="380" height="108" rx="6" fill="#111"/>
  <text x="480" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">✗  N+1 문제 (무지성 사용 시)</text>
  <text x="480" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">✗  생성 SQL 파악 어려움</text>
  <text x="480" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">✗  복잡한 집계 쿼리 표현 한계</text>
  <text x="480" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">✗  ORM 학습 곡선</text>
  <text x="480" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">✗  ORM 버전/DB 호환 이슈</text>

  <!-- When to use -->
  <rect x="40" y="424" width="800" height="66" rx="8" fill="#0d1a10"/>
  <text x="440" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">선택 가이드</text>
  <text x="230" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Raw SQL: 복잡한 집계·보고서 쿼리, 성능 임계</text>
  <text x="650" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ORM: 도메인 CRUD, 빠른 프로토타입</text>
  <text x="440" y="483" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">실전: ORM 기본 + 복잡한 쿼리는 Raw SQL 병용 (MyBatis, jOOQ, SQLAlchemy)</text>
</svg>
