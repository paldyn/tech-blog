<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">yield from 위임 구조</text>

  <!-- Caller box -->
  <rect x="50" y="72" width="180" height="80" rx="8"
        fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">호출자</text>
  <text x="140" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">for / next()</text>

  <!-- Arrow: caller → delegating -->
  <line x1="230" y1="112" x2="288" y2="112"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="259" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">next()</text>

  <!-- Delegating generator box -->
  <rect x="290" y="60" width="210" height="106" rx="8"
        fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="395" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">위임 제너레이터</text>
  <text x="395" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">delegating generator</text>
  <text x="395" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">yield from sub()</text>
  <text x="395" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">투명한 통로 역할</text>

  <!-- Arrow: delegating → subgenerator -->
  <line x1="500" y1="112" x2="558" y2="112"
        stroke="#55c555" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="529" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">위임</text>

  <!-- Subgenerator box -->
  <rect x="560" y="60" width="210" height="106" rx="8"
        fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="665" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">서브 제너레이터</text>
  <text x="665" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">subgenerator</text>
  <text x="665" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">yield 값</text>
  <text x="665" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실제 값 생성</text>

  <!-- Return value path -->
  <path d="M 665 166 C 665 196, 395 196, 395 196"
        fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrd)"/>
  <text x="530" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">return 값 → yield from 표현식의 결과</text>

  <!-- Description boxes -->
  <rect x="50" y="220" width="760" height="100" rx="8"
        fill="#111827" stroke="#3a4a6e" stroke-width="1"/>

  <text x="440" y="245" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">yield from이 자동으로 처리하는 것</text>

  <text x="240" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">서브 제너레이터 값을 호출자에게 전달</text>
  <text x="640" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">send() / throw() / close() 투명하게 전달</text>

  <text x="440" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">StopIteration의 value를 yield from 식의 반환값으로 수집</text>
</svg>
