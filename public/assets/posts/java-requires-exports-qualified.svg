<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">exports vs 한정 exports (... to)</text>

  <defs>
    <marker id="exArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- lane 1 -->
  <rect x="60" y="90" width="380" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="124" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">exports</tspan><tspan fill="#ffffff"> com.app.api;</tspan></text>

  <rect x="540" y="90" width="300" height="56" rx="8" fill="#101a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="116" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">모든 모듈에 공개</text>
  <text x="690" y="135" font-size="12" fill="#bbb" text-anchor="middle">requires 하는 누구나 접근</text>

  <line x1="440" y1="118" x2="538" y2="118" stroke="#7ec8e3" stroke-width="2" marker-end="url(#exArr)"/>

  <!-- lane 2 -->
  <rect x="60" y="190" width="380" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="224" font-size="12.5" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">exports</tspan><tspan fill="#ffffff"> com.app.spi </tspan><tspan fill="#7ec8e3" font-weight="600">to</tspan><tspan fill="#ffffff"> friend;</tspan></text>

  <rect x="540" y="190" width="300" height="56" rx="8" fill="#1a1408" stroke="#e0a055" stroke-width="1.5"/>
  <text x="690" y="216" font-size="14" font-weight="600" fill="#e0a055" text-anchor="middle">friend 모듈에만 공개</text>
  <text x="690" y="235" font-size="12" fill="#bbb" text-anchor="middle">다른 모듈은 접근 차단 ✕</text>

  <line x1="440" y1="218" x2="538" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#exArr)"/>
</svg>
