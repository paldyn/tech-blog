<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스타 스키마 (Star Schema)</text>

  <!-- Fact table center -->
  <rect x="310" y="200" width="260" height="120" rx="8" fill="#12213a" stroke="#3a6ea8" stroke-width="2"/>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">fact_sales (팩트 테이블)</text>
  <text x="326" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• date_id (FK)</text>
  <text x="326" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• product_id (FK)</text>
  <text x="326" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• customer_id (FK)</text>
  <text x="326" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• amount, qty, discount</text>

  <!-- Dimension: Date -->
  <rect x="310" y="65" width="200" height="100" rx="8" fill="#1a1020" stroke="#5a3080" stroke-width="1.5"/>
  <text x="410" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9977cc" text-anchor="middle">dim_date</text>
  <text x="326" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• date_id (PK)</text>
  <text x="326" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• year, month, day</text>
  <text x="326" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• quarter, is_holiday</text>

  <line x1="410" y1="165" x2="410" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Dimension: Product -->
  <rect x="60" y="200" width="200" height="100" rx="8" fill="#1a1020" stroke="#5a3080" stroke-width="1.5"/>
  <text x="160" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9977cc" text-anchor="middle">dim_product</text>
  <text x="76" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• product_id (PK)</text>
  <text x="76" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• name, category</text>
  <text x="76" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• brand, price</text>

  <line x1="260" y1="250" x2="310" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Dimension: Customer -->
  <rect x="620" y="200" width="200" height="100" rx="8" fill="#1a1020" stroke="#5a3080" stroke-width="1.5"/>
  <text x="720" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9977cc" text-anchor="middle">dim_customer</text>
  <text x="636" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• customer_id (PK)</text>
  <text x="636" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• name, city</text>
  <text x="636" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• segment, region</text>

  <line x1="570" y1="250" x2="620" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Dimension: Store (bottom) -->
  <rect x="310" y="360" width="200" height="100" rx="8" fill="#1a1020" stroke="#5a3080" stroke-width="1.5"/>
  <text x="410" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9977cc" text-anchor="middle">dim_store</text>
  <text x="326" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• store_id (PK)</text>
  <text x="326" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• name, city</text>
  <text x="326" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• region, size</text>

  <line x1="410" y1="320" x2="410" y2="360" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Labels -->
  <text x="440" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">팩트 테이블 = 숫자 지표(metrics) · 디멘전 테이블 = 설명적 속성(attributes)</text>
  <text x="440" y="506" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">스타 스키마: 디멘전이 정규화되지 않음 → JOIN 단순 · 쿼리 빠름</text>
</svg>
