<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">PostgreSQL 아키텍처 개요</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">클라이언트 → Postmaster → Backend 프로세스 흐름</text>

  <!-- Client -->
  <rect x="60" y="96" width="140" height="60" rx="10" fill="#1a1208" stroke="#e0a833" stroke-width="1.5"/>
  <text x="130" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#e0a833">클라이언트</text>
  <text x="130" y="142" text-anchor="middle" font-size="11" fill="#aaaaaa">psql / JDBC / 앱</text>

  <!-- Arrow -->
  <line x1="200" y1="126" x2="268" y2="126" stroke="#e0a833" stroke-width="2"/>
  <polygon points="268,121 284,126 268,131" fill="#e0a833"/>
  <text x="234" y="114" text-anchor="middle" font-size="11" fill="#888">TCP:5432</text>

  <!-- Postmaster -->
  <rect x="284" y="96" width="180" height="60" rx="10" fill="#112236" stroke="#7ec8e3" stroke-width="2"/>
  <text x="374" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Postmaster</text>
  <text x="374" y="142" text-anchor="middle" font-size="11" fill="#aaaaaa">리스너 · 인증 · fork</text>

  <!-- Fork arrow -->
  <line x1="374" y1="156" x2="374" y2="210" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="369,210 374,226 379,210" fill="#7ec8e3"/>
  <text x="420" y="192" font-size="11" fill="#888">fork()</text>

  <!-- Backend process -->
  <rect x="284" y="226" width="180" height="60" rx="10" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="374" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Backend Process</text>
  <text x="374" y="272" text-anchor="middle" font-size="11" fill="#aaaaaa">세션 전용 서버 프로세스</text>

  <!-- Shared Memory box -->
  <rect x="540" y="96" width="300" height="200" rx="12" fill="#1a0e1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="120" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">Shared Memory</text>

  <rect x="560" y="132" width="260" height="44" rx="8" fill="#0e0a14" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">Shared Buffers</text>
  <text x="690" y="168" text-anchor="middle" font-size="11" fill="#aaaaaa">DB 페이지 캐시 (기본 128MB)</text>

  <rect x="560" y="186" width="120" height="40" rx="8" fill="#0e0a14" stroke="#7777cc" stroke-width="1"/>
  <text x="620" y="206" text-anchor="middle" font-size="12" fill="#7777cc">WAL Buffers</text>
  <text x="620" y="220" text-anchor="middle" font-size="11" fill="#aaaaaa">Redo 로그 버퍼</text>

  <rect x="700" y="186" width="120" height="40" rx="8" fill="#0e0a14" stroke="#7777cc" stroke-width="1"/>
  <text x="760" y="206" text-anchor="middle" font-size="12" fill="#7777cc">Lock Table</text>
  <text x="760" y="220" text-anchor="middle" font-size="11" fill="#aaaaaa">잠금 관리</text>

  <rect x="560" y="236" width="260" height="40" rx="8" fill="#0e0a14" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="256" text-anchor="middle" font-size="12" fill="#7777cc">Proc Array / CLOG</text>
  <text x="690" y="270" text-anchor="middle" font-size="11" fill="#aaaaaa">트랜잭션 상태 추적</text>

  <!-- Arrow Backend -> Shared Memory -->
  <line x1="464" y1="256" x2="540" y2="200" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="504" y="228" font-size="11" fill="#888">읽기/쓰기</text>

  <!-- Background processes -->
  <rect x="60" y="310" width="760" height="200" rx="12" fill="#0e1623" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="334" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">백그라운드 프로세스</text>

  <rect x="80" y="346" width="150" height="60" rx="8" fill="#112236" stroke="#7ec8e3" stroke-width="1"/>
  <text x="155" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">Checkpointer</text>
  <text x="155" y="388" text-anchor="middle" font-size="11" fill="#aaaaaa">더티 페이지 → 디스크</text>
  <text x="155" y="400" text-anchor="middle" font-size="11" fill="#aaaaaa">체크포인트 기록</text>

  <rect x="250" y="346" width="150" height="60" rx="8" fill="#112236" stroke="#7ec8e3" stroke-width="1"/>
  <text x="325" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">BGWriter</text>
  <text x="325" y="388" text-anchor="middle" font-size="11" fill="#aaaaaa">더티 페이지 선행</text>
  <text x="325" y="400" text-anchor="middle" font-size="11" fill="#aaaaaa">플러시 (주기적)</text>

  <rect x="420" y="346" width="150" height="60" rx="8" fill="#112236" stroke="#7ec8e3" stroke-width="1"/>
  <text x="495" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">WAL Writer</text>
  <text x="495" y="388" text-anchor="middle" font-size="11" fill="#aaaaaa">WAL 버퍼 → pg_wal</text>
  <text x="495" y="400" text-anchor="middle" font-size="11" fill="#aaaaaa">주기적 플러시</text>

  <rect x="590" y="346" width="150" height="60" rx="8" fill="#112236" stroke="#7ec8e3" stroke-width="1"/>
  <text x="665" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">Autovacuum</text>
  <text x="665" y="388" text-anchor="middle" font-size="11" fill="#aaaaaa">Dead Tuple 정리</text>
  <text x="665" y="400" text-anchor="middle" font-size="11" fill="#aaaaaa">통계 수집</text>

  <rect x="80" y="424" width="150" height="60" rx="8" fill="#112236" stroke="#55c555" stroke-width="1"/>
  <text x="155" y="448" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">Stats Collector</text>
  <text x="155" y="468" text-anchor="middle" font-size="11" fill="#aaaaaa">pg_stat_* 통계</text>
  <text x="155" y="480" text-anchor="middle" font-size="11" fill="#aaaaaa">활동 정보 수집</text>

  <rect x="250" y="424" width="150" height="60" rx="8" fill="#112236" stroke="#55c555" stroke-width="1"/>
  <text x="325" y="448" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">Logger</text>
  <text x="325" y="468" text-anchor="middle" font-size="11" fill="#aaaaaa">postgresql.log</text>
  <text x="325" y="480" text-anchor="middle" font-size="11" fill="#aaaaaa">서버 로그 기록</text>

  <rect x="420" y="424" width="150" height="60" rx="8" fill="#112236" stroke="#55c555" stroke-width="1"/>
  <text x="495" y="448" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">Archiver</text>
  <text x="495" y="468" text-anchor="middle" font-size="11" fill="#aaaaaa">WAL 아카이브</text>
  <text x="495" y="480" text-anchor="middle" font-size="11" fill="#aaaaaa">PITR 지원</text>
</svg>
