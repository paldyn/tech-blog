<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="270" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">작업의 상태 변화</text>

  <defs>
    <marker id="cyar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="44" y="110" width="150" height="70" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="119" y="142" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">PENDING</text>
  <text x="119" y="164" font-size="12" fill="#9aa4b8" text-anchor="middle">큐에서 대기</text>

  <line x1="194" y1="145" x2="250" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cyar)"/>

  <rect x="254" y="110" width="150" height="70" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="329" y="142" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">STARTED</text>
  <text x="329" y="164" font-size="12" fill="#9aa4b8" text-anchor="middle">워커가 실행 중</text>

  <line x1="404" y1="145" x2="460" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cyar)"/>

  <rect x="464" y="74" width="180" height="62" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="554" y="102" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">SUCCESS</text>
  <text x="554" y="124" font-size="12" fill="#9aa4b8" text-anchor="middle">결과 저장</text>

  <rect x="464" y="154" width="180" height="62" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="554" y="182" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">FAILURE / RETRY</text>
  <text x="554" y="204" font-size="12" fill="#9aa4b8" text-anchor="middle">예외 → 재시도 가능</text>

  <rect x="684" y="74" width="150" height="142" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="759" y="110" font-size="13" fill="#9aa4b8" text-anchor="middle">호출 쪽</text>
  <text x="700" y="142" font-size="12" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">res = task.delay()</text>
  <text x="700" y="170" font-size="12" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">res.status</text>
  <text x="700" y="196" font-size="12" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">res.get()</text>

  <rect x="44" y="226" width="790" height="32" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="439" y="247" font-size="13" fill="#55c555" text-anchor="middle">delay()는 AsyncResult를 돌려주고, 그것으로 진행 상태와 결과를 추적한다</text>
</svg>
