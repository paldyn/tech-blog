<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">MTU / MSS / 페이로드 관계</text>

  <!-- Ethernet Frame -->
  <rect x="60" y="68" width="760" height="60" rx="6" fill="#111820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이더넷 헤더 14B</text>

  <!-- IP Packet inside -->
  <rect x="180" y="76" width="600" height="44" rx="4" fill="#1a1828" stroke="#7777cc" stroke-width="1.5"/>
  <text x="210" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">IP 헤더 20B</text>

  <!-- TCP Segment inside -->
  <rect x="310" y="82" width="450" height="32" rx="3" fill="#1a2a3a" stroke="#55c555" stroke-width="1"/>
  <text x="338" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TCP 헤더 20B</text>

  <!-- Data inside -->
  <rect x="440" y="85" width="308" height="26" rx="2" fill="#0a3a0a" stroke="#55c555" stroke-width="1"/>
  <text x="594" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">TCP 페이로드 (MSS 크기)</text>

  <!-- Brackets -->
  <!-- MTU bracket -->
  <line x1="180" y1="150" x2="780" y2="150" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="180" y1="146" x2="180" y2="154" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="780" y1="146" x2="780" y2="154" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">MTU = 이더넷 기본 1500 bytes (IP 헤더 + IP 페이로드)</text>

  <!-- TCP segment bracket -->
  <line x1="310" y1="190" x2="780" y2="190" stroke="#55c555" stroke-width="1.5"/>
  <line x1="310" y1="186" x2="310" y2="194" stroke="#55c555" stroke-width="1.5"/>
  <line x1="780" y1="186" x2="780" y2="194" stroke="#55c555" stroke-width="1.5"/>
  <text x="545" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">TCP 세그먼트 = TCP 헤더(20) + TCP 페이로드</text>

  <!-- MSS bracket -->
  <line x1="440" y1="228" x2="780" y2="228" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="440" y1="224" x2="440" y2="232" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="780" y1="224" x2="780" y2="232" stroke="#7ec8e3" stroke-width="2"/>
  <text x="610" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">MSS = MTU - IP헤더(20) - TCP헤더(20) = 1460 bytes</text>

  <!-- Formula box -->
  <rect x="60" y="268" width="760" height="80" rx="6" fill="#111820" stroke="#2a3a4a" stroke-width="1"/>
  <text x="440" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">이더넷 기본값 계산</text>
  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">MTU 1500 − IP헤더 20 − TCP헤더 20 = MSS 1460 bytes</text>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IPv6 고정 헤더 40B: MSS = 1500 - 40 - 20 = 1440 bytes</text>

  <!-- Special MTUs -->
  <rect x="60" y="366" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 주요 인터페이스별 MTU</text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">이더넷:  <text fill="#b5cea8">1500</text> bytes  (가장 흔한 기본값)</text>
  <text x="76" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">PPPoE:   <text fill="#b5cea8">1492</text> bytes  (PPPoE 8B 오버헤드)</text>
  <text x="76" y="448" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Jumbo:   <text fill="#b5cea8">9000</text> bytes  (데이터센터 이더넷)</text>
</svg>
