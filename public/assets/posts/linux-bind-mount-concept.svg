<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Bind Mount — 같은 inode, 두 경로</text>

  <!-- VFS 다이어그램 -->
  <!-- 파일시스템 트리 왼쪽 -->
  <text x="200" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">파일시스템 뷰</text>

  <rect x="150" y="100" width="100" height="38" rx="5" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">/</text>

  <line x1="175" y1="138" x2="145" y2="166" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="225" y1="138" x2="255" y2="166" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="90" y="166" width="110" height="38" rx="5" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="145" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">/var/www/html</text>

  <rect x="210" y="166" width="90" height="38" rx="5" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="255" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">/mnt/web</text>

  <!-- inode 박스 -->
  <rect x="140" y="244" width="230" height="56" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="255" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">inode #4821</text>
  <text x="255" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실제 데이터 블록 포인터</text>

  <!-- 화살표: 두 경로 → 같은 inode -->
  <line x1="145" y1="204" x2="200" y2="244" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="255" y1="204" x2="255" y2="244" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- 오른쪽: bind mount 활용 사례 -->
  <text x="620" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Bind Mount 주요 활용</text>

  <rect x="460" y="100" width="360" height="68" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">① 컨테이너 디렉터리 공유</text>
  <text x="640" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트 /data → 컨테이너 /app/data</text>
  <text x="640" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker run -v /data:/app/data 내부 동작</text>

  <rect x="460" y="186" width="360" height="68" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">② chroot 환경 구성</text>
  <text x="640" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bind /proc → chroot-jail/proc</text>
  <text x="640" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">격리된 환경에 커널 FS 제공</text>

  <rect x="460" y="272" width="360" height="68" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">③ 읽기 전용 공유</text>
  <text x="640" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">mount --bind /etc/ssl /mnt/certs</text>
  <text x="640" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">remount,ro 로 읽기 전용 추가</text>

  <rect x="460" y="358" width="360" height="68" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">④ 웹서버 DocumentRoot 격리</text>
  <text x="640" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">/var/www/html → /var/www/vhost1</text>
  <text x="640" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">코드 공유 없이 경로 분리</text>

  <!-- 주의사항 박스 -->
  <rect x="60" y="336" width="370" height="126" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Bind Mount 주의사항</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 원본 데이터 직접 변경 — 복사본 아님</text>
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• umount 시 원본에 영향 없음</text>
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 중첩 bind mount 주의 (순환 참조 가능)</text>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• ro bind mount는 두 단계 필요</text>
  <text x="80" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  (--bind 후 remount,ro 별도 필요)</text>
</svg>
