<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git stash branch 동작 순서</text>

  <!-- Step 1: commit history -->
  <rect x="60" y="80" width="120" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">abc1234</text>
  <text x="120" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">stash 저장 시점</text>

  <line x1="180" y1="105" x2="240" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: checkout -->
  <rect x="240" y="80" width="160" height="50" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="320" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">① 브랜치 생성</text>
  <text x="320" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">abc1234에서 체크아웃</text>

  <line x1="400" y1="105" x2="460" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: apply stash -->
  <rect x="460" y="80" width="160" height="50" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">② stash 적용</text>
  <text x="540" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">--index 포함 적용</text>

  <line x1="620" y1="105" x2="680" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: drop -->
  <rect x="680" y="80" width="160" height="50" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="760" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">③ stash 삭제</text>
  <text x="760" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">자동 drop</text>

  <!-- Benefit box -->
  <rect x="60" y="166" width="760" height="68" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">충돌 없이 stash 적용 가능</text>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">stash를 저장한 커밋으로 되돌아가므로 현재 브랜치와 충돌할 여지가 없음</text>

  <!-- Code block -->
  <rect x="60" y="258" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># stash를 새 브랜치로 변환</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">branch</tspan> feature/auth-wip</text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 stash 지정</text>
  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">branch</tspan> feature/auth-wip stash@{2}</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># = checkout -b + stash apply --index + stash drop</text>
</svg>
