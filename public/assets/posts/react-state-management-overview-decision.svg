<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arry" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c800"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">상태 관리 선택 결정 트리</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">어떤 도구를 언제 쓸까?</text>

  <!-- Decision boxes -->
  <!-- Q1 -->
  <rect x="320" y="94" width="240" height="52" rx="8" fill="#111111" stroke="#888" stroke-width="1"/>
  <text x="440" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">서버에서 가져오는 데이터?</text>
  <text x="440" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">API 응답, DB 쿼리 등</text>

  <!-- Yes: Server state -->
  <line x1="440" y1="146" x2="720" y2="182" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="600" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Yes</text>

  <rect x="640" y="184" width="180" height="52" rx="8" fill="#1a0d2a" stroke="#7777cc" stroke-width="2"/>
  <text x="730" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">TanStack Query</text>
  <text x="730" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RTK Query / SWR</text>

  <!-- No: continue -->
  <line x1="440" y1="146" x2="440" y2="182" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="422" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">No</text>

  <!-- Q2 -->
  <rect x="300" y="184" width="280" height="52" rx="8" fill="#111111" stroke="#888" stroke-width="1"/>
  <text x="440" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">여러 컴포넌트가 공유?</text>
  <text x="440" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">트리의 다양한 위치에서 접근</text>

  <!-- No: local -->
  <line x1="300" y1="210" x2="180" y2="210" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="238" y="202" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">No</text>

  <rect x="60" y="184" width="120" height="52" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="120" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">useState</text>
  <text x="120" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useReducer</text>

  <!-- Yes: continue -->
  <line x1="440" y1="236" x2="440" y2="272" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="422" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Yes</text>

  <!-- Q3 -->
  <rect x="280" y="274" width="320" height="52" rx="8" fill="#111111" stroke="#888" stroke-width="1"/>
  <text x="440" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">앱 전체 / 복잡한 로직?</text>
  <text x="440" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전역 설정, 인증, 장바구니 등</text>

  <!-- No: Context -->
  <line x1="280" y1="300" x2="180" y2="300" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="228" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">No</text>

  <rect x="60" y="274" width="120" height="52" rx="8" fill="#0d1a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Context +</text>
  <text x="120" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">useReducer</text>

  <!-- Yes: continue -->
  <line x1="440" y1="326" x2="440" y2="362" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="422" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Yes</text>

  <!-- Q4 -->
  <rect x="260" y="364" width="360" height="52" rx="8" fill="#111111" stroke="#888" stroke-width="1"/>
  <text x="440" y="386" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">대규모 팀 / 엄격한 구조?</text>
  <text x="440" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Redux DevTools, 예측 가능성 중요</text>

  <!-- No: Zustand -->
  <line x1="260" y1="390" x2="180" y2="410" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="218" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">No</text>

  <rect x="60" y="400" width="120" height="52" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="120" y="426" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c800">Zustand</text>
  <text x="120" y="444" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Jotai / Recoil</text>

  <!-- Yes: Redux -->
  <line x1="620" y1="390" x2="700" y2="410" stroke="#e8c800" stroke-width="2" marker-end="url(#arry)"/>
  <text x="670" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c800">Yes</text>

  <rect x="700" y="400" width="120" height="52" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="760" y="426" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c800">Redux</text>
  <text x="760" y="444" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RTK Toolkit</text>
</svg>
