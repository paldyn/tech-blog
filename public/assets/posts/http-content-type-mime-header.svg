<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Content-Type 헤더 활용</text>
    <!-- Request side -->
    <rect x="60" y="65" width="350" height="90" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="235" y="87" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">클라이언트 (요청 본문 전송)</text>
    <text x="235" y="108" text-anchor="middle" font-size="12" fill="#888">POST 요청에 Content-Type 명시</text>
    <text x="235" y="128" text-anchor="middle" font-size="12" fill="#e8e8e8">Content-Type: application/json</text>
    <text x="235" y="145" text-anchor="middle" font-size="11" fill="#666">본문 형식 → 서버가 파싱 방법 결정</text>
    <!-- Server side -->
    <rect x="470" y="65" width="350" height="90" rx="8" fill="#2a1a0f" stroke="#aa6a3a" stroke-width="1.5"/>
    <text x="645" y="87" text-anchor="middle" font-size="13" font-weight="600" fill="#dd9955">서버 (응답 본문 전송)</text>
    <text x="645" y="108" text-anchor="middle" font-size="12" fill="#888">응답에 Content-Type 명시</text>
    <text x="645" y="128" text-anchor="middle" font-size="12" fill="#e8e8e8">Content-Type: text/html; charset=utf-8</text>
    <text x="645" y="145" text-anchor="middle" font-size="11" fill="#666">본문 형식 + 문자셋 → 클라이언트가 렌더링</text>
    <!-- Arrow -->
    <defs>
      <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
        <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
      </marker>
    </defs>
    <line x1="440" y1="110" x2="470" y2="110" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
    <!-- Code block: examples -->
    <rect x="60" y="175" width="760" height="186" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># JSON 전송</text>
    <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Type</tspan><tspan fill="#ffffff">: application/json</tspan></text>
    <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Type</tspan><tspan fill="#ffffff">: text/html; charset=utf-8</tspan></text>
    <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 파일 업로드</text>
    <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Type</tspan><tspan fill="#ffffff">: multipart/form-data; boundary=----Boundary</tspan></text>
    <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 스니핑 방지</text>
    <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">X-Content-Type-Options</tspan><tspan fill="#ffffff">: nosniff</tspan></text>
    <text x="440" y="400" text-anchor="middle" font-size="11" fill="#555">charset 생략 시 기본값: text/* → ISO-8859-1 (주의), JSON → RFC 4627: UTF-8 권장</text>
  </g>
</svg>
