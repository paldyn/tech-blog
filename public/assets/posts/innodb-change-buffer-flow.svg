<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Change Buffer — Secondary Index 쓰기 최적화</text>

  <!-- Without Change Buffer -->
  <rect x="60" y="72" width="360" height="270" rx="8" fill="#1a0f0f" stroke="#3a2020"/>
  <text x="240" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">Change Buffer 없이</text>

  <!-- INSERT event -->
  <rect x="80" y="112" width="140" height="40" rx="4" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="150" y="137" text-anchor="middle" font-size="13" fill="#7ec8e3">INSERT 발생</text>

  <line x1="150" y1="152" x2="150" y2="182" stroke="#e05555" stroke-width="2"/>
  <polygon points="144,182 150,194 156,182" fill="#e05555"/>

  <rect x="80" y="194" width="140" height="52" rx="4" fill="#2a1010" stroke="#4a2020"/>
  <text x="150" y="215" text-anchor="middle" font-size="12" fill="#e05555">Secondary Index</text>
  <text x="150" y="233" text-anchor="middle" font-size="12" fill="#e05555">페이지 즉시 로드</text>
  <text x="150" y="249" text-anchor="middle" font-size="11" fill="#888">(디스크 랜덤 I/O 발생)</text>

  <line x1="150" y1="246" x2="150" y2="268" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="144,268 150,280 156,268" fill="#e05555"/>

  <rect x="80" y="280" width="140" height="40" rx="4" fill="#1a1010" stroke="#3a1a1a"/>
  <text x="150" y="305" text-anchor="middle" font-size="13" fill="#888">인덱스 업데이트</text>

  <!-- Cost label -->
  <text x="260" y="200" font-size="13" fill="#e05555">모든 DML마다</text>
  <text x="260" y="220" font-size="13" fill="#e05555">랜덤 I/O 발생</text>
  <text x="260" y="248" font-size="13" fill="#888">→ 높은 디스크</text>
  <text x="260" y="266" font-size="13" fill="#888">   쓰기 부하</text>

  <!-- With Change Buffer -->
  <rect x="450" y="72" width="390" height="270" rx="8" fill="#0f1a10" stroke="#2a4a2a"/>
  <text x="645" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">Change Buffer 사용</text>

  <!-- INSERT event -->
  <rect x="470" y="112" width="140" height="40" rx="4" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="540" y="137" text-anchor="middle" font-size="13" fill="#7ec8e3">INSERT 발생</text>

  <line x1="540" y1="152" x2="540" y2="182" stroke="#55c555" stroke-width="2"/>
  <polygon points="534,182 540,194 546,182" fill="#55c555"/>

  <!-- Change Buffer -->
  <rect x="470" y="194" width="140" height="52" rx="4" fill="#1e3a2a" stroke="#2a5a2a"/>
  <text x="540" y="215" text-anchor="middle" font-size="12" fill="#55c555">Change Buffer</text>
  <text x="540" y="233" text-anchor="middle" font-size="12" fill="#55c555">변경 내역 저장</text>
  <text x="540" y="249" text-anchor="middle" font-size="11" fill="#888">(메모리 기록만)</text>

  <text x="540" y="265" text-anchor="middle" font-size="12" fill="#55c555">즉시 응답!</text>

  <!-- Async merge -->
  <line x1="622" y1="220" x2="680" y2="220" stroke="#888" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="680,214 692,220 680,226" fill="#888"/>

  <rect x="694" y="194" width="132" height="80" rx="4" fill="#111520" stroke="#2a2a40"/>
  <text x="760" y="216" text-anchor="middle" font-size="12" fill="#888">나중에 비동기</text>
  <text x="760" y="234" text-anchor="middle" font-size="12" fill="#888">Merge(병합)</text>
  <text x="760" y="252" text-anchor="middle" font-size="11" fill="#888">읽기 시 또는</text>
  <text x="760" y="268" text-anchor="middle" font-size="11" fill="#888">유휴 시 일괄</text>

  <text x="645" y="310" text-anchor="middle" font-size="13" fill="#55c555">랜덤 I/O를 배치로 묶어</text>
  <text x="645" y="328" text-anchor="middle" font-size="13" fill="#55c555">순차 I/O로 처리</text>

  <!-- Conditions box -->
  <rect x="60" y="365" width="760" height="96" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="440" y="388" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Change Buffer 적용 조건</text>

  <text x="200" y="414" text-anchor="middle" font-size="13" fill="#7ec8e3">Non-unique Secondary Index만</text>
  <text x="200" y="432" text-anchor="middle" font-size="12" fill="#888">Unique 인덱스는 즉시 페이지 로드가 필요</text>
  <text x="200" y="450" text-anchor="middle" font-size="12" fill="#888">(중복 여부 확인을 위해)</text>

  <line x1="400" y1="398" x2="400" y2="455" stroke="#2a2a40" stroke-width="1"/>

  <text x="580" y="414" text-anchor="middle" font-size="13" fill="#7ec8e3">인덱스 페이지가 Buffer Pool에 없을 때</text>
  <text x="580" y="432" text-anchor="middle" font-size="12" fill="#888">이미 메모리에 있으면 바로 수정</text>
  <text x="720" y="414" text-anchor="middle" font-size="13" fill="#7ec8e3">INSERT / UPDATE / DELETE</text>
</svg>
