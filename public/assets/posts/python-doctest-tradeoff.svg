<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">doctest의 자리: 문서와 테스트의 일치</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#55c555">잘 맞는 곳</text>
  <rect x="60" y="108" width="360" height="130" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="140" font-size="13" fill="#ffffff">· 문서의 예시가 항상 정확함을 보장</text>
  <text x="80" y="168" font-size="13" fill="#ffffff">· 짧고 순수한 함수의 사용법 시연</text>
  <text x="80" y="196" font-size="13" fill="#ffffff">· README·튜토리얼 코드 검증</text>
  <text x="80" y="224" font-size="13" fill="#ffffff">· 별도 설정 없이 표준 라이브러리만</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#e05555">맞지 않는 곳</text>
  <rect x="460" y="108" width="360" height="130" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="140" font-size="13" fill="#ffffff">· 복잡한 setup·mock이 필요한 경우</text>
  <text x="480" y="168" font-size="13" fill="#ffffff">· 출력이 매번 달라지는 값(시간·주소)</text>
  <text x="480" y="196" font-size="13" fill="#ffffff">· 대량의 케이스·엣지 검증</text>
  <text x="480" y="224" font-size="13" fill="#ffffff">→ pytest로 보완</text>

  <text x="60" y="276" font-size="13" fill="#888" xml:space="preserve">doctest는 본격 테스트의 대체가 아니라, 문서가 거짓말하지 않게 지키는 가벼운 보조 도구다.</text>
</svg>
