<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">고차 함수 — map · filter · sorted</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">함수를 인자로 받거나 반환하는 함수들</text>

  <!-- map -->
  <rect x="60" y="100" width="230" height="170" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="175" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">map(func, iterable)</text>
  <rect x="76" y="136" width="198" height="118" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">nums = [<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">2</tspan>, <tspan fill="#b5cea8">3</tspan>, <tspan fill="#b5cea8">4</tspan>]</text>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">doubled = <tspan fill="#7ec8e3">map</tspan>(</text>
  <text x="92" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">lambda</tspan> x: x*<tspan fill="#b5cea8">2</tspan>, nums</text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">list</tspan>(doubled)</text>
  <text x="92" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># [2, 4, 6, 8]</text>

  <!-- filter -->
  <rect x="325" y="100" width="230" height="170" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">filter(func, iterable)</text>
  <rect x="341" y="136" width="198" height="118" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="357" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">nums = [<tspan fill="#b5cea8">1</tspan>,<tspan fill="#b5cea8">2</tspan>,<tspan fill="#b5cea8">3</tspan>,<tspan fill="#b5cea8">4</tspan>,<tspan fill="#b5cea8">5</tspan>,<tspan fill="#b5cea8">6</tspan>]</text>
  <text x="357" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">evens = <tspan fill="#7ec8e3">filter</tspan>(</text>
  <text x="357" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">lambda</tspan> x: x%<tspan fill="#b5cea8">2</tspan>==<tspan fill="#b5cea8">0</tspan>,</text>
  <text x="357" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    nums</text>
  <text x="357" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="357" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># [2, 4, 6]</text>

  <!-- sorted -->
  <rect x="590" y="100" width="230" height="170" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="705" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">sorted(iterable, key=)</text>
  <rect x="606" y="136" width="198" height="118" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="622" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">words = [<tspan fill="#ce9178">"bee"</tspan>,<tspan fill="#ce9178">"ant"</tspan>,</text>
  <text x="622" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">         <tspan fill="#ce9178">"spider"</tspan>]</text>
  <text x="622" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">sorted</tspan>(words, key=len)</text>
  <text x="622" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ['bee','ant','spider']</text>
  <text x="622" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">sorted</tspan>(words)</text>
  <text x="622" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ['ant','bee','spider']</text>

  <!-- map vs list comprehension comparison -->
  <rect x="60" y="292" width="760" height="165" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">map/filter vs 리스트 컴프리헨션 비교</text>
  <rect x="76" y="328" width="728" height="112" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 동등한 표현 — 컴프리헨션이 더 파이썬스럽다</text>
  <text x="92" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">list</tspan>(<tspan fill="#7ec8e3">map</tspan>(<tspan fill="#7ec8e3">lambda</tspan> x: x**<tspan fill="#b5cea8">2</tspan>, range(<tspan fill="#b5cea8">5</tspan>)))  <tspan fill="#9aa4b8"># [0,1,4,9,16]</tspan></text>
  <text x="92" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[x**<tspan fill="#b5cea8">2</tspan> <tspan fill="#7ec8e3">for</tspan> x <tspan fill="#7ec8e3">in</tspan> range(<tspan fill="#b5cea8">5</tspan>)]               <tspan fill="#9aa4b8"># [0,1,4,9,16]</tspan></text>
  <text x="92" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># map은 기존 함수(len, str.upper 등) 전달 시 더 간결</text>
  <text x="92" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">list</tspan>(<tspan fill="#7ec8e3">map</tspan>(str.upper, [<tspan fill="#ce9178">"a"</tspan>,<tspan fill="#ce9178">"b"</tspan>,<tspan fill="#ce9178">"c"</tspan>]))  <tspan fill="#9aa4b8"># ['A','B','C']</tspan></text>
  <text x="92" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[s.upper() <tspan fill="#7ec8e3">for</tspan> s <tspan fill="#7ec8e3">in</tspan> [<tspan fill="#ce9178">"a"</tspan>,<tspan fill="#ce9178">"b"</tspan>,<tspan fill="#ce9178">"c"</tspan>]]   <tspan fill="#9aa4b8"># ['A','B','C']</tspan></text>

  <text x="440" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">map/filter는 지연 평가(lazy) — list()로 감싸야 실제 연산</text>
</svg>
