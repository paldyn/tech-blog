<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 셀 유효성 검사 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">oncelleditend에서 검사 → 통과/실패 분기</text>

  <!-- User input box -->
  <rect x="60" y="102" width="180" height="52" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">사용자 입력</text>
  <text x="150" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">셀 편집 후 포커스 이탈</text>

  <!-- Arrow -->
  <polygon points="244,128 270,122 270,125 310,125 310,122 336,128 310,134 310,131 270,131 270,134" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>

  <!-- oncelleditend box -->
  <rect x="340" y="102" width="200" height="52" fill="#1a2e1a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">oncelleditend</text>
  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">e.newvalue 검증</text>

  <!-- Arrow to decision -->
  <polygon points="544,128 570,122 570,125 600,125 600,122 626,128 600,134 600,131 570,131 570,134" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>

  <!-- Decision diamond -->
  <polygon points="700,102 770,128 700,154 630,128" fill="#1a1a1a" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="700" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">통과?</text>

  <!-- Pass path (down) -->
  <polygon points="700,159 706,159 706,200 712,200 700,218 688,200 694,200 694,159" fill="#55c555" stroke="#337733" stroke-width="1"/>
  <text x="720" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">YES</text>

  <!-- Fail path (right then down) -->
  <line x1="770" y1="128" x2="820" y2="128" stroke="#e05555" stroke-width="2"/>
  <polygon points="820,110 820,146 836,128" fill="#e05555"/>
  <text x="775" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">NO</text>
  <rect x="760" y="160" width="60" height="36" fill="#2e0d0d" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="790" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">취소</text>
  <line x1="820" y1="128" x2="820" y2="160" stroke="#e05555" stroke-width="2"/>
  <text x="836" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">e.cancel=true</text>

  <!-- Pass result -->
  <rect x="620" y="224" width="160" height="52" fill="#0d2e0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Dataset 저장</text>
  <text x="700" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">oncellchange 발생</text>

  <!-- Validation types -->
  <rect x="60" y="196" width="520" height="44" fill="#1a1a2e" rx="6"/>
  <text x="320" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">검사 유형</text>
  <text x="100" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">필수값</text>
  <text x="210" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">범위</text>
  <text x="310" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">형식(정규식)</text>
  <text x="430" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">서버 조회</text>

  <!-- Error display methods -->
  <rect x="60" y="300" width="760" height="140" fill="#111" rx="8"/>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">오류 표시 방법</text>

  <!-- Method 1 -->
  <rect x="80" y="336" width="210" height="84" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="185" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">alert / confirm</text>
  <text x="185" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">간단한 메시지 박스</text>
  <text x="185" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">블로킹 방식</text>
  <text x="185" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">alert("메시지")</text>

  <!-- Method 2 -->
  <rect x="310" y="336" width="210" height="84" fill="#1a1a0d" rx="6" stroke="#e8e8e8" stroke-width="1"/>
  <text x="415" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">셀 Background 색상</text>
  <text x="415" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">오류 셀 강조</text>
  <text x="415" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">비블로킹 방식</text>
  <text x="415" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">setCellBackgroundColor</text>

  <!-- Method 3 -->
  <rect x="540" y="336" width="260" height="84" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="670" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">커스텀 툴팁/말풍선</text>
  <text x="670" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">UX 친화적 방식</text>
  <text x="670" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Static 컴포넌트 활용</text>
  <text x="670" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">stcError.visible = true</text>
</svg>
