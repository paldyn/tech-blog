<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">stash list — 스택 구조와 인덱스</text>

  <!-- Stash stack visual -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">stash 스택</text>

  <!-- stash@{0} - top -->
  <rect x="60" y="105" width="500" height="60" rx="8" fill="#2a2a3e" stroke="#7777cc" stroke-width="2"/>
  <text x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" font-weight="600">stash@{0}</text>
  <text x="200" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: WIP on feature: abc1234 로그인 WIP</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">← pop/apply 기본 대상 (가장 최신)</text>

  <rect x="60" y="173" width="500" height="56" rx="8" fill="#1e1e2a" stroke="#555" stroke-width="1"/>
  <text x="80" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" font-weight="600">stash@{1}</text>
  <text x="200" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">: WIP on main: def5678 hotfix 시도</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">지정 시: git stash apply stash@{1}</text>

  <rect x="60" y="237" width="500" height="56" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#555" font-weight="600">stash@{2}</text>
  <text x="200" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#555">: WIP on develop: ghi9012 실험</text>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#444">가장 오래된 stash</text>

  <!-- Notes on the right -->
  <rect x="590" y="105" width="250" height="188" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="715" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">인덱스 규칙</text>
  <text x="610" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">{0} = 가장 최근 (top)</text>
  <text x="610" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">{n} = n번 전에 저장됨</text>
  <text x="610" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pop하면 재인덱싱됨</text>
  <text x="610" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">{1} → {0}으로 올라옴</text>
  <text x="610" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">이름 붙이면 식별 쉬움:</text>
  <text x="610" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">push -m "설명"</text>

  <!-- Code block -->
  <rect x="60" y="325" width="760" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 목록 보기</text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git stash </text>
  <text x="156" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">list</text>
  <text x="197" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # 모든 stash 항목 출력</text>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git stash </text>
  <text x="156" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">list</text>
  <text x="197" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> --format=</text>
  <text x="303" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"%gd: %s"</text>
  <text x="403" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # 인덱스와 메시지만</text>
</svg>
