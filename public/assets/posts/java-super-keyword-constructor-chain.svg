<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-up" viewBox="0 0 14 14" refX="7" refY="2"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 14 L 7 1 L 14 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8a040"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">생성자 체이닝 — super()로 이어지는 초기화 흐름</text>

  <!-- ===== Object (top of hierarchy) ===== -->
  <rect x="310" y="74" width="260" height="54" rx="8" fill="#2a1a3e" stroke="#9966cc" stroke-width="1.5"/>
  <text x="440" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#9966cc" text-anchor="middle">Object</text>
  <text x="440" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Object()</text>

  <!-- Object → Animal arrow -->
  <line x1="440" y1="128" x2="440" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- ===== Animal ===== -->
  <rect x="310" y="162" width="260" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Animal</text>
  <text x="440" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Animal(String name)</text>

  <!-- Animal → Dog arrow -->
  <line x1="440" y1="216" x2="440" y2="246" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- ===== Dog ===== -->
  <rect x="310" y="250" width="260" height="54" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Dog</text>
  <text x="440" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Dog(String name, String breed)</text>

  <!-- Dog → new Dog() caller arrow -->
  <line x1="440" y1="304" x2="440" y2="334" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- ===== caller ===== -->
  <rect x="310" y="338" width="260" height="40" rx="8" fill="#1e1e1e" stroke="#555" stroke-width="1"/>
  <text x="440" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">new Dog("Rex", "리트리버")</text>

  <!-- ===== LEFT: call order description ===== -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8a040">호출 순서 (위→아래)</text>
  <rect x="60" y="104" width="220" height="74" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="76" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9966cc">① Object() 실행</text>
  <text x="76" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">② Animal(name) 실행</text>
  <text x="76" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">③ Dog(name, breed) 실행</text>

  <!-- ===== LEFT: Animal code ===== -->
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Animal 생성자</text>
  <rect x="60" y="222" width="220" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">class</tspan> Animal {</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  String name;</text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  Animal(String name) {</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">this</tspan>.name = name;</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }</text>

  <!-- ===== LEFT: Dog code ===== -->
  <text x="60" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Dog 생성자</text>
  <rect x="60" y="360" width="220" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">class</tspan> Dog <tspan fill="#7ec8e3" font-weight="600">extends</tspan> Animal {</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  Dog(String n, String b) {</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">super</tspan>(n); <tspan fill="#9aa4b8">// 첫 줄</tspan></text>
  <text x="76" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">this</tspan>.breed = b;</text>
  <text x="76" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }</text>

  <!-- ===== RIGHT: notes ===== -->
  <text x="600" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">자동 삽입 vs 명시</text>
  <rect x="600" y="104" width="220" height="116" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="616" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" font-weight="600">super() 생략 시</text>
  <text x="616" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컴파일러가 no-arg super()</text>
  <text x="616" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">를 자동 삽입</text>
  <text x="616" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">부모에 no-arg 없으면</text>
  <text x="616" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">컴파일 오류 발생!</text>

  <text x="600" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8a040">초기화 완료 순서</text>
  <rect x="600" y="268" width="220" height="130" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="616" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9966cc">1. Object 인스턴스 변수</text>
  <text x="616" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">2. Animal 인스턴스 변수</text>
  <text x="616" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">3. Dog 인스턴스 변수</text>
  <text x="616" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">부모부터 먼저 완전히</text>
  <text x="616" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">초기화된 후 자식 실행</text>

  <!-- bottom info -->
  <text x="440" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">super()는 반드시 생성자 첫 번째 문장 — this()와 동시에 사용 불가</text>
</svg>
