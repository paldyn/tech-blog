<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">MySQL 서버 아키텍처</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">서버 레이어 + 스토리지 엔진 플러그인 구조</text>

  <!-- Client layer -->
  <rect x="60" y="100" width="760" height="50" fill="#111827" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">클라이언트 (MySQL Connector/J, Python mysql-connector, CLI...)</text>

  <line x1="440" y1="150" x2="440" y2="168" stroke="#888" stroke-width="1.5"/>

  <!-- Server layer -->
  <rect x="60" y="168" width="760" height="230" fill="#111827" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="155" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">MySQL 서버 레이어</text>

  <!-- Connection manager -->
  <rect x="80" y="200" width="200" height="50" fill="#0f1724" rx="6" stroke="#1e2433"/>
  <text x="180" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">커넥션 매니저</text>
  <text x="180" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인증 · 스레드 관리</text>

  <!-- Parser -->
  <rect x="300" y="200" width="160" height="50" fill="#0f1724" rx="6" stroke="#1e2433"/>
  <text x="380" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">파서 / 전처리기</text>
  <text x="380" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SQL 파싱 · 검증</text>

  <!-- Optimizer -->
  <rect x="480" y="200" width="160" height="50" fill="#0f1724" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">쿼리 옵티마이저</text>
  <text x="560" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실행 계획 선택</text>

  <!-- Execution engine -->
  <rect x="660" y="200" width="140" height="50" fill="#0f1724" rx="6" stroke="#1e2433"/>
  <text x="730" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실행 엔진</text>
  <text x="730" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">핸들러 API 호출</text>

  <!-- Caches -->
  <rect x="80" y="265" width="250" height="40" fill="#0f1724" rx="5" stroke="#1e2433"/>
  <text x="205" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dictionary Cache · Table Cache</text>

  <rect x="350" y="265" width="360" height="40" fill="#0f1724" rx="5" stroke="#1e2433"/>
  <text x="530" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Binary Log · General Log · Slow Query Log</text>

  <!-- Handler API separator -->
  <line x1="80" y1="326" x2="800" y2="326" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Handler API (스토리지 엔진 추상화 경계)</text>

  <rect x="80" y="332" width="155" height="50" fill="#0f1724" rx="5" stroke="#7ec8e3" stroke-width="1"/>
  <text x="157" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Lock Manager</text>
  <text x="157" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">테이블 레벨 락</text>

  <rect x="255" y="332" width="155" height="50" fill="#0f1724" rx="5" stroke="#7ec8e3" stroke-width="1"/>
  <text x="332" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Metadata Lock</text>
  <text x="332" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DDL 동시성</text>

  <rect x="430" y="332" width="380" height="50" fill="#0f1724" rx="5" stroke="#7ec8e3" stroke-width="1"/>
  <text x="620" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Information Schema / Performance Schema</text>

  <!-- Storage engine layer -->
  <rect x="60" y="420" width="760" height="70" fill="#111827" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="155" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">스토리지 엔진 레이어 (플러그인)</text>

  <rect x="80" y="450" width="160" height="32" fill="#0f1724" rx="5" stroke="#e8e8e8"/>
  <text x="160" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">InnoDB</text>

  <rect x="260" y="450" width="130" height="32" fill="#0f1724" rx="5" stroke="#888"/>
  <text x="325" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">MyISAM</text>

  <rect x="410" y="450" width="130" height="32" fill="#0f1724" rx="5" stroke="#888"/>
  <text x="475" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Memory</text>

  <rect x="560" y="450" width="130" height="32" fill="#0f1724" rx="5" stroke="#888"/>
  <text x="625" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Archive</text>

  <rect x="710" y="450" width="100" height="32" fill="#0f1724" rx="5" stroke="#888"/>
  <text x="760" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NDB...</text>
</svg>
