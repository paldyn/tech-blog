<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">불변식(Invariant) 보호와 계층 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">캡슐화는 객체가 항상 유효한 상태를 유지하도록 보장한다</text>

  <!-- 코드 박스 -->
  <rect x="60" y="92" width="380" height="278" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1"/>

  <!-- 코드 라인들 -->
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">public class</text>
  <text x="188" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> BankAccount {</text>

  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  private</text>
  <text x="146" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> long balance;</text>

  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  private</text>
  <text x="146" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> String owner;</text>

  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  public void</text>
  <text x="176" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> deposit(</text>
  <text x="255" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">long</text>
  <text x="285" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> amount) {</text>

  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    if</text>
  <text x="100" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> (amount &lt;= </text>
  <text x="191" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">0</text>
  <text x="200" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">)</text>

  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">      throw new</text>
  <text x="188" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Illegal...</text>

  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    balance += amount;</text>

  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }</text>

  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  public long</text>
  <text x="183" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> getBalance() {</text>

  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    return</text>
  <text x="140" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> balance;</text>

  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }</text>

  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- 오른쪽 다이어그램 -->
  <!-- 외부 호출자 박스 -->
  <rect x="510" y="92" width="310" height="60" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="665" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">외부 호출자 (Client)</text>
  <text x="665" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">acc.deposit(500)</text>

  <!-- 화살표: 외부 → 메서드 -->
  <line x1="665" y1="152" x2="665" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- 유효성 검사 박스 -->
  <rect x="510" y="188" width="310" height="58" fill="#0d1a1a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="665" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">유효성 검사</text>
  <text x="665" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">amount > 0 확인</text>

  <!-- 화살표 분기 -->
  <!-- 검사 통과 → 상태 변경 -->
  <line x1="590" y1="246" x2="590" y2="285" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="540" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">통과</text>

  <!-- 검사 실패 → 예외 -->
  <line x1="760" y1="246" x2="760" y2="285" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="764" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">실패</text>

  <!-- 상태 변경 박스 -->
  <rect x="510" y="288" width="140" height="58" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="580" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">상태 변경</text>
  <text x="580" y="333" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">balance 업데이트</text>

  <!-- 예외 박스 -->
  <rect x="680" y="288" width="140" height="58" fill="#1a0a0a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="750" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">예외 발생</text>
  <text x="750" y="333" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IllegalArgument</text>

  <!-- 불변식 유지 -->
  <rect x="510" y="368" width="310" height="58" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="665" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">불변식 항상 유지</text>
  <text x="665" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">balance ≥ 0 항상 보장</text>

  <line x1="580" y1="346" x2="580" y2="360" stroke="#55c555" stroke-width="2"/>
  <line x1="580" y1="360" x2="665" y2="360" stroke="#55c555" stroke-width="2"/>
  <line x1="665" y1="360" x2="665" y2="368" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- 하단 핵심 정리 -->
  <rect x="60" y="400" width="380" height="78" fill="#111" rx="8" stroke="#444" stroke-width="1"/>
  <text x="250" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">캡슐화의 핵심 가치</text>
  <text x="80" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="96" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내부 구현을 바꿔도 외부 코드 영향 없음</text>
  <text x="80" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="96" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">객체 상태가 항상 유효함을 보장</text>
</svg>
