<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제네릭 클래스 — Pair&lt;K, V&gt; 구조</text>

  <!-- Pair class box -->
  <rect x="290" y="68" width="300" height="138" fill="#111827" rx="10" stroke="#7777cc" stroke-width="2"/>
  <rect x="290" y="68" width="300" height="36" fill="#1e1b4b" rx="10"/>
  <rect x="290" y="96" width="300" height="8" fill="#1e1b4b"/>
  <text x="440" y="91" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#a5b4fc" text-anchor="middle">Pair&lt;K, V&gt;</text>
  <text x="306" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7777cc">- </tspan><tspan fill="#7ec8e3" font-weight="600">K</tspan><tspan fill="#888"> key</tspan></text>
  <text x="306" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7777cc">- </tspan><tspan fill="#7ec8e3" font-weight="600">V</tspan><tspan fill="#888"> value</tspan></text>
  <text x="306" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555">+ </tspan><tspan fill="#ffffff">getKey() : </tspan><tspan fill="#7ec8e3" font-weight="600">K</tspan></text>
  <text x="306" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555">+ </tspan><tspan fill="#ffffff">getValue() : </tspan><tspan fill="#7ec8e3" font-weight="600">V</tspan></text>

  <!-- Arrow down left -->
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="1" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 0 L 7 13 L 13 0 z" fill="#7777cc"/>
    </marker>
  </defs>
  <line x1="360" y1="206" x2="200" y2="270" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-down)"/>
  <line x1="520" y1="206" x2="680" y2="270" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- Instance left: Pair<String, Integer> -->
  <rect x="60" y="270" width="280" height="80" fill="#0a1628" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Pair&lt;String, Integer&gt;</text>
  <text x="200" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">key: String, value: Integer</text>
  <text x="200" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" text-anchor="middle">new Pair&lt;&gt;("age", 30)</text>

  <!-- Instance right: Pair<Long, Boolean> -->
  <rect x="540" y="270" width="280" height="80" fill="#0a1628" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="680" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Pair&lt;Long, Boolean&gt;</text>
  <text x="680" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">key: Long, value: Boolean</text>
  <text x="680" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" text-anchor="middle">new Pair&lt;&gt;(100L, true)</text>

  <!-- Labels -->
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">하나의 Pair&lt;K, V&gt; 클래스로 모든 타입 조합 생성 가능 — 코드 중복 없음</text>
</svg>
