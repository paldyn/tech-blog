<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">리눅스 주요 시그널 표</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">번호 · 이름 · 기본 동작 · 주요 용도</text>

  <!-- Table header -->
  <rect x="50" y="86" width="780" height="32" rx="6" fill="#1e2d45"/>
  <text x="80" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">번호</text>
  <text x="140" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">이름</text>
  <text x="250" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">기본 동작</text>
  <text x="400" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">무시/캐치</text>
  <text x="510" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">주요 용도</text>

  <!-- Row 1: SIGHUP -->
  <rect x="50" y="118" width="780" height="32" rx="0" fill="#0d1929"/>
  <text x="80" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text>
  <text x="140" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SIGHUP</text>
  <text x="250" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">종료</text>
  <text x="400" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능</text>
  <text x="510" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">터미널 종료, 데몬 설정 리로드</text>

  <!-- Row 2: SIGINT -->
  <rect x="50" y="150" width="780" height="32" rx="0" fill="#0a0a0a"/>
  <text x="80" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text>
  <text x="140" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SIGINT</text>
  <text x="250" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">종료</text>
  <text x="400" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능</text>
  <text x="510" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Ctrl+C — 인터럽트</text>

  <!-- Row 3: SIGQUIT -->
  <rect x="50" y="182" width="780" height="32" rx="0" fill="#0d1929"/>
  <text x="80" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">3</text>
  <text x="140" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SIGQUIT</text>
  <text x="250" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">코어덤프 + 종료</text>
  <text x="400" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능</text>
  <text x="510" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Ctrl+\ — 코어 덤프</text>

  <!-- Row 4: SIGKILL -->
  <rect x="50" y="214" width="780" height="32" rx="0" fill="#200a0a"/>
  <text x="80" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">9</text>
  <text x="140" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">SIGKILL</text>
  <text x="250" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">강제 종료</text>
  <text x="400" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">불가 (커널 강제)</text>
  <text x="510" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최후의 수단 — 정리 없이 즉사</text>

  <!-- Row 5: SIGUSR1 -->
  <rect x="50" y="246" width="780" height="32" rx="0" fill="#0d1929"/>
  <text x="80" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">10</text>
  <text x="140" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SIGUSR1</text>
  <text x="250" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">종료</text>
  <text x="400" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능</text>
  <text x="510" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">애플리케이션 정의 (로그 rotate 등)</text>

  <!-- Row 6: SIGSEGV -->
  <rect x="50" y="278" width="780" height="32" rx="0" fill="#0a0a0a"/>
  <text x="80" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">11</text>
  <text x="140" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">SIGSEGV</text>
  <text x="250" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">코어덤프 + 종료</text>
  <text x="400" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능</text>
  <text x="510" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">세그멘테이션 폴트 — 잘못된 메모리 접근</text>

  <!-- Row 7: SIGTERM -->
  <rect x="50" y="310" width="780" height="32" rx="0" fill="#0f2010"/>
  <text x="80" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">15</text>
  <text x="140" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">SIGTERM</text>
  <text x="250" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">종료</text>
  <text x="400" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능</text>
  <text x="510" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">kill 기본값 — 정상 종료 요청</text>

  <!-- Row 8: SIGSTOP -->
  <rect x="50" y="342" width="780" height="32" rx="0" fill="#0d1929"/>
  <text x="80" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">19</text>
  <text x="140" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">SIGSTOP</text>
  <text x="250" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">일시 정지</text>
  <text x="400" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">불가 (커널 강제)</text>
  <text x="510" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로세스 일시 중단</text>

  <!-- Row 9: SIGCONT -->
  <rect x="50" y="374" width="780" height="32" rx="0" fill="#0a0a0a"/>
  <text x="80" y="395" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">18</text>
  <text x="140" y="395" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">SIGCONT</text>
  <text x="250" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">재개</text>
  <text x="400" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능</text>
  <text x="510" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정지된 프로세스 재개 (fg/bg 내부)</text>

  <!-- Footer note -->
  <rect x="50" y="424" width="780" height="70" rx="6" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">SIGKILL(9) vs SIGTERM(15)</text>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SIGTERM은 프로세스가 핸들러를 등록해 정리 후 종료할 수 있습니다.</text>
  <text x="440" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SIGKILL은 커널이 강제 종료 — 프로세스에 정리 기회 없음. D 상태엔 SIGKILL도 무효.</text>
</svg>
