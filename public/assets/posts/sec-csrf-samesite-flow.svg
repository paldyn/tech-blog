<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CSRF 공격 흐름 vs SameSite 방어</text>

  <!-- 공격 흐름 (위) -->
  <text x="440" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">CSRF 공격 시나리오</text>

  <!-- 브라우저 -->
  <rect x="60" y="100" width="150" height="52" rx="8" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="135" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">피해자 브라우저</text>
  <text x="135" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">bank.com 로그인됨</text>

  <!-- 악성 사이트 -->
  <rect x="280" y="100" width="150" height="52" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="355" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">evil.com</text>
  <text x="355" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">숨겨진 폼 자동 제출</text>

  <!-- 은행 서버 -->
  <rect x="500" y="100" width="150" height="52" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="575" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">bank.com/transfer</text>
  <text x="575" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">POST 요청 수신</text>

  <line x1="210" y1="126" x2="278" y2="126" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="244" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">방문</text>

  <line x1="430" y1="126" x2="498" y2="126" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="464" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">쿠키 자동 첨부</text>

  <!-- 결과 박스 -->
  <rect x="700" y="100" width="140" height="52" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="770" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">무단 송금 완료</text>
  <text x="770" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">피해자 모름</text>
  <line x1="650" y1="126" x2="698" y2="126" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- 구분선 -->
  <line x1="60" y1="185" x2="820" y2="185" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 방어 방법들 -->
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">방어 방법</text>

  <!-- SameSite -->
  <rect x="60" y="225" width="230" height="100" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">SameSite 쿠키</text>
  <text x="175" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Strict: 크로스 사이트 전송 완전 차단</text>
  <text x="175" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Lax: GET 탑 레벨 이동만 허용</text>
  <text x="175" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Chrome 기본값: Lax</text>
  <text x="175" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Set-Cookie: sid=x; SameSite=Strict</text>

  <!-- CSRF Token -->
  <rect x="325" y="225" width="230" height="100" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">CSRF 토큰</text>
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">서버가 폼에 무작위 토큰 삽입</text>
  <text x="440" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">POST 요청 시 토큰 검증</text>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Double Submit Cookie 패턴</text>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">X-CSRF-Token: {random}</text>

  <!-- Origin Header -->
  <rect x="590" y="225" width="230" height="100" rx="8" fill="#1a1a0a" stroke="#e8e83a" stroke-width="1.5"/>
  <text x="705" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e83a" text-anchor="middle">Origin / Referer 검사</text>
  <text x="705" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">서버에서 요청 출처 검증</text>
  <text x="705" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Origin 헤더 불일치 시 거부</text>
  <text x="705" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">신뢰 origin 화이트리스트</text>
  <text x="705" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Origin: https://bank.com</text>

  <!-- SameSite 비교표 -->
  <rect x="60" y="350" width="760" height="120" rx="8" fill="#0d0d0d" stroke="#444" stroke-width="1"/>
  <text x="440" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">SameSite 옵션 비교</text>

  <text x="100" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8">Strict</text>
  <text x="280" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">크로스 사이트 요청에 쿠키 전송 안 함</text>
  <text x="650" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">CSRF 완전 차단</text>

  <text x="100" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8">Lax</text>
  <text x="280" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">외부 링크 클릭(GET)은 허용, POST·XHR 차단</text>
  <text x="650" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">대부분 차단 (기본값)</text>

  <text x="100" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8">None</text>
  <text x="280" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 크로스 사이트 요청에 쿠키 전송</text>
  <text x="650" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">CSRF 위험 (Secure 필수)</text>

  <line x1="240" y1="355" x2="240" y2="465" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="355" x2="620" y2="465" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="385" x2="820" y2="385" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="410" x2="820" y2="410" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="434" x2="820" y2="434" stroke="#333" stroke-width="1"/>
</svg>
