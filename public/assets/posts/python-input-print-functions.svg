<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">print() 와 input() 기본 사용법</text>

  <!-- print() section -->
  <rect x="50" y="72" width="370" height="200" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="235" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">print() 함수</text>

  <!-- print code block -->
  <rect x="66" y="108" width="338" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본 출력</text>
  <text x="82" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">print</text>
  <text x="118" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="124" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"Hello, World!"</text>
  <text x="228" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="82" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># sep, end 지정</text>
  <text x="82" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">print</text>
  <text x="118" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(1, 2, 3, </text>
  <text x="190" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sep=</text>
  <text x="216" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"-"</text>
  <text x="232" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="82" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 출력: 1-2-3</text>
  <text x="82" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">print</text>
  <text x="118" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="124" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"계속"</text>
  <text x="160" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, end=</text>
  <text x="196" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">" "</text>
  <text x="218" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="82" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 출력: 계속 (줄바꿈X)</text>

  <!-- print() params -->
  <rect x="50" y="284" width="370" height="80" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">매개변수</text>
  <text x="70" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">sep</text>
  <text x="100" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"> = 구분자 (기본: 공백)</text>
  <text x="70" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">end</text>
  <text x="100" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"> = 끝 문자 (기본: \n)</text>

  <!-- input() section -->
  <rect x="460" y="72" width="370" height="200" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">input() 함수</text>

  <!-- input code block -->
  <rect x="476" y="108" width="338" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 사용자 입력 받기</text>
  <text x="492" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">name = </text>
  <text x="534" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">input</text>
  <text x="570" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="576" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"이름: "</text>
  <text x="626" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="492" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 반환값은 항상 str</text>
  <text x="492" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">age = </text>
  <text x="528" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">int</text>
  <text x="548" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="554" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">input</text>
  <text x="590" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="596" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"나이: "</text>
  <text x="644" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">))</text>
  <text x="492" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">print</text>
  <text x="528" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="534" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">f"안녕 {name}, {age}살"</text>
  <text x="686" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="492" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># → 안녕 파이썬, 10살</text>

  <!-- input() note -->
  <rect x="460" y="284" width="370" height="80" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">핵심 주의</text>
  <text x="480" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">input()은 항상 문자열(str)을 반환</text>
  <text x="480" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">숫자 연산 전 int() / float() 변환 필수</text>

  <!-- Arrow between sections -->
  <line x1="420" y1="172" x2="460" y2="172" stroke="#444" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Bottom: type conversion flow -->
  <rect x="50" y="384" width="780" height="106" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">입력 → 변환 → 출력 흐름</text>

  <!-- flow boxes -->
  <rect x="80" y="416" width="120" height="40" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">input()</text>

  <polygon points="218,436 240,436 240,432 254,436 240,440 240,436" fill="#7777cc"/>

  <rect x="260" y="416" width="130" height="40" rx="6" fill="#13131f" stroke="#7777cc" stroke-width="1"/>
  <text x="325" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">str "42"</text>

  <polygon points="408,436 430,436 430,432 444,436 430,440 430,436" fill="#7ec8e3"/>

  <rect x="450" y="416" width="150" height="40" rx="6" fill="#07111a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="525" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">int("42") → 42</text>

  <polygon points="618,436 640,436 640,432 654,436 640,440 640,436" fill="#55c555"/>

  <rect x="660" y="416" width="140" height="40" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="730" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">print(42 + 1)</text>

  <!-- labels -->
  <text x="140" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사용자 입력</text>
  <text x="325" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">항상 문자열</text>
  <text x="525" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">타입 변환</text>
  <text x="730" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">결과 출력</text>
</svg>
