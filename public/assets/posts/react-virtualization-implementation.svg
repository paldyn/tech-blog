<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">react-window: FixedSizeList 사용법</text>

  <!-- Code block -->
  <rect x="60" y="74" width="500" height="340" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="98" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text x="120" y="98" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> { FixedSizeList } </text>
  <text x="275" y="98" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text x="313" y="98" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#ce9178"> 'react-window'</text>
  <text x="78" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">// 각 행을 렌더하는 컴포넌트</text>
  <text x="78" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text x="120" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> Row = ({ index, style }) =&gt; (</text>
  <text x="78" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">  &lt;div style={style}&gt;</text>
  <text x="78" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    Item {index}</text>
  <text x="78" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">  &lt;/div&gt;</text>
  <text x="78" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">);</text>
  <text x="78" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text x="140" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> BigList() {</text>
  <text x="78" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="78" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    &lt;FixedSizeList</text>
  <text x="78" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">      height={600}</text>
  <text x="78" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">      itemCount={10000}</text>
  <text x="78" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">      itemSize={48}</text>
  <text x="78" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    &gt;{Row}&lt;/FixedSizeList&gt;;</text>
  <text x="78" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">}</text>

  <!-- Right: Notes -->
  <rect x="600" y="74" width="220" height="106" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">FixedSizeList</text>
  <text x="710" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">모든 행 높이 동일</text>
  <text x="710" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">height: 컨테이너 높이(px)</text>
  <text x="710" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">itemSize: 행 높이(px)</text>
  <text x="710" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3" text-anchor="middle">⚠ style prop 필수 전달</text>

  <rect x="600" y="196" width="220" height="106" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">VariableSizeList</text>
  <text x="710" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">행마다 높이 다를 때</text>
  <text x="710" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">itemSize: (index) =&gt; height</text>
  <text x="710" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">함수로 각 행 높이 반환</text>
  <text x="710" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc" text-anchor="middle">resetAfterIndex로 리셋</text>

  <rect x="600" y="318" width="220" height="96" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">대안 라이브러리</text>
  <text x="710" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">@tanstack/virtual</text>
  <text x="710" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">react-virtuoso</text>
  <text x="710" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">더 유연, 복잡 레이아웃</text>
</svg>
