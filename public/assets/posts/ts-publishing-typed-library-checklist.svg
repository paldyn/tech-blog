<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">배포 전 점검</text>
  <text x="60" y="76" font-size="14" fill="#888">도구로 자동 검증하면 흔한 타입 배포 실수를 막는다</text>

  <!-- checklist box -->
  <rect x="60" y="100" width="400" height="250" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="84" y="134" font-size="16" font-weight="600" fill="#e8e8e8">체크리스트</text>
  <text x="84" y="168" font-size="13" fill="#55c555">✓ exports에 types 조건이 맨 앞</text>
  <text x="84" y="198" font-size="13" fill="#55c555">✓ ESM/CJS 진입점 모두 타입 제공</text>
  <text x="84" y="228" font-size="13" fill="#55c555">✓ files 또는 .npmignore로 dist만</text>
  <text x="84" y="258" font-size="13" fill="#55c555">✓ 런타임 의존성은 dependencies</text>
  <text x="84" y="288" font-size="13" fill="#55c555">✓ @types/* 는 적절한 위치에</text>
  <text x="84" y="318" font-size="13" fill="#55c555">✓ sideEffects 명시 (트리셰이킹)</text>

  <!-- tools box -->
  <rect x="500" y="100" width="320" height="250" fill="#101418" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="524" y="134" font-size="16" font-weight="600" fill="#7ec8e3">검증 도구</text>
  <text x="524" y="166" font-size="13" fill="#e8e8e8" font-weight="600">attw (Are the Types Wrong?)</text>
  <text x="524" y="186" font-size="13" fill="#888">조건별 타입 해석 오류 탐지</text>
  <text x="524" y="218" font-size="13" fill="#e8e8e8" font-weight="600">publint</text>
  <text x="524" y="238" font-size="13" fill="#888">package.json 배포 설정 린트</text>
  <rect x="524" y="258" width="272" height="74" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="540" y="284" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">npx <tspan fill="#7ec8e3" font-weight="600">@arethetypeswrong/cli</tspan></text>
  <text xml:space="preserve" x="540" y="308" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">npx <tspan fill="#7ec8e3" font-weight="600">publint</tspan></text>
</svg>
