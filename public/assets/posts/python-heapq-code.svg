<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">heapq 실전 코드 패턴</text>

  <!-- Left: basic ops -->
  <text x="70" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">기본 연산</text>
  <rect x="60" y="88" width="370" height="264" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</tspan> heapq</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heap = []</text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.heappush(heap, <tspan fill="#b5cea8">5</tspan>)</text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.heappush(heap, <tspan fill="#b5cea8">1</tspan>)</text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.heappush(heap, <tspan fill="#b5cea8">3</tspan>)</text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># heap = [1, 5, 3]</text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.heappop(heap)  <tspan fill="#6a8aa0"># → 1</tspan></text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heap[<tspan fill="#b5cea8">0</tspan>]          <tspan fill="#6a8aa0"># 최솟값 확인(팝 안함)</tspan></text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 기존 리스트 → 힙으로 변환 O(n)</text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">data = [<tspan fill="#b5cea8">3</tspan>, <tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">4</tspan>, <tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">5</tspan>]</text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.heapify(data)</text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># [1, 1, 4, 3, 5]</text>

  <!-- Right: nlargest, priority queue -->
  <text x="460" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#b5cea8">nlargest · 우선순위 큐</text>
  <rect x="450" y="88" width="370" height="264" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 상위/하위 N개 효율적 추출</text>
  <text x="466" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">nums = [<tspan fill="#b5cea8">3</tspan>,<tspan fill="#b5cea8">1</tspan>,<tspan fill="#b5cea8">4</tspan>,<tspan fill="#b5cea8">1</tspan>,<tspan fill="#b5cea8">5</tspan>,<tspan fill="#b5cea8">9</tspan>,<tspan fill="#b5cea8">2</tspan>,<tspan fill="#b5cea8">6</tspan>]</text>
  <text x="466" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.nlargest(<tspan fill="#b5cea8">3</tspan>, nums)  <tspan fill="#6a8aa0"># [9,6,5]</tspan></text>
  <text x="466" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.nsmallest(<tspan fill="#b5cea8">3</tspan>, nums) <tspan fill="#6a8aa0"># [1,1,2]</tspan></text>
  <text x="466" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="466" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 우선순위 큐: (priority, data)</text>
  <text x="466" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">pq = []</text>
  <text x="466" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.heappush(pq, (<tspan fill="#b5cea8">3</tspan>, <tspan fill="#ce9178">"low"</tspan>))</text>
  <text x="466" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.heappush(pq, (<tspan fill="#b5cea8">1</tspan>, <tspan fill="#ce9178">"urgent"</tspan>))</text>
  <text x="466" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.heappush(pq, (<tspan fill="#b5cea8">2</tspan>, <tspan fill="#ce9178">"normal"</tspan>))</text>
  <text x="466" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">heapq.heappop(pq)</text>
  <text x="466" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># (1, 'urgent') ← 가장 급한 작업</text>
  <text x="466" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="466" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 최대 힙: 부호 반전</text>

  <!-- Bottom -->
  <rect x="60" y="372" width="760" height="44" rx="6" fill="#0d1a0d" stroke="#55c555"/>
  <text x="440" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">heappush/pop: O(log n) · heapify: O(n) · nlargest/nsmallest: O(n log k)</text>
  <text x="440" y="409" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">k가 n보다 훨씬 작을 때 sorted()보다 nlargest/nsmallest가 효율적</text>
</svg>
