<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-bad" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    레이어 순서: 변경 빈도에 따른 배치
  </text>

  <!-- Bad order -->
  <text x="80" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">나쁜 순서 (캐시 매번 깨짐)</text>

  <rect x="60" y="88" width="360" height="36" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">FROM node:20-slim</text>

  <line x1="240" y1="124" x2="240" y2="136" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-bad)"/>
  <rect x="60" y="138" width="360" height="36" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">COPY . .  ← 소스 코드 먼저</text>

  <line x1="240" y1="174" x2="240" y2="186" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-bad)"/>
  <rect x="60" y="188" width="360" height="36" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">RUN npm ci  ← 의존성 설치</text>

  <rect x="60" y="238" width="360" height="36" rx="4" fill="#1a0a0a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="240" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">소스 변경 → COPY 캐시 무효 → npm ci 재실행</text>

  <!-- Good order -->
  <text x="500" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">좋은 순서 (의존성 캐시 유지)</text>

  <rect x="480" y="88" width="360" height="36" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">FROM node:20-slim</text>

  <line x1="660" y1="124" x2="660" y2="136" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="480" y="138" width="360" height="36" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">COPY package*.json ./  ← 의존성 명세만</text>

  <line x1="660" y1="174" x2="660" y2="186" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="480" y="188" width="360" height="36" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">RUN npm ci  ← 여기까지 캐시됨</text>

  <line x1="660" y1="224" x2="660" y2="236" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="480" y="238" width="360" height="36" rx="4" fill="#0a1a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="660" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">COPY . .  ← 소스는 나중에</text>

  <rect x="480" y="288" width="360" height="36" rx="4" fill="#0a1a0a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="660" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">소스 변경 → npm ci 레이어는 캐시 유지 ✓</text>

  <!-- Frequency guide -->
  <text x="60" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">레이어 변경 빈도 → 배치 순서</text>

  <rect x="60" y="372" width="760" height="108" rx="6" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Frequency levels -->
  <rect x="80" y="390" width="130" height="30" rx="4" fill="#1a1a3a" stroke="#7777cc" stroke-width="1"/>
  <text x="145" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">거의 안 변함</text>
  <text x="80" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">FROM, 시스템 패키지</text>

  <text x="225" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#3a4a6e" text-anchor="middle">→</text>

  <rect x="240" y="390" width="130" height="30" rx="4" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="305" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">가끔 변함</text>
  <text x="240" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">의존성 명세, lock 파일</text>

  <text x="385" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#3a4a6e" text-anchor="middle">→</text>

  <rect x="400" y="390" width="130" height="30" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="465" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">자주 변함</text>
  <text x="400" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">앱 설정 파일</text>

  <text x="545" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#3a4a6e" text-anchor="middle">→</text>

  <rect x="560" y="390" width="130" height="30" rx="4" fill="#1a0a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="625" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020" text-anchor="middle">매번 변함</text>
  <text x="560" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">소스 코드 (COPY . .)</text>

  <text x="705" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#3a4a6e" text-anchor="middle">→</text>

  <rect x="720" y="390" width="80" height="30" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="760" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">CMD</text>
  <text x="720" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">항상 마지막</text>
</svg>
