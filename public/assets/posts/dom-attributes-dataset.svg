<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">attributes · dataset — 속성 조작</text>

  <!-- attributes 박스 -->
  <rect x="60" y="72" width="360" height="180" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="97" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">속성(Attribute) 조작</text>

  <text x="80" y="120" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.getAttribute(name)</text>
  <text x="80" y="138" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">속성값 문자열 (없으면 null)</text>
  <text x="80" y="162" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.setAttribute(name, value)</text>
  <text x="80" y="180" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">속성 설정 (항상 문자열)</text>
  <text x="80" y="204" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.removeAttribute(name)</text>
  <text x="80" y="222" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">속성 제거 (값='' 와 다름)</text>
  <text x="80" y="240" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.hasAttribute(name)</text>

  <!-- dataset 박스 -->
  <rect x="460" y="72" width="360" height="180" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="97" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">dataset — data-* 속성</text>

  <text x="480" y="120" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">HTML: data-user-id="42"</text>
  <text x="480" y="140" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">JS: el.dataset.userId → '42'</text>
  <text x="480" y="164" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">kebab-case → camelCase 자동 변환</text>
  <text x="480" y="184" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">data-foo-bar → dataset.fooBar</text>
  <text x="480" y="208" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">설정: el.dataset.theme = 'dark'</text>
  <text x="480" y="228" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">→ 자동으로 data-theme 속성 추가</text>
  <text x="480" y="244" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">삭제: delete el.dataset.theme</text>

  <!-- 코드 블록 -->
  <rect x="60" y="276" width="760" height="140" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="302" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// HTML: &lt;div id="card" data-user-id="42" data-role="admin"&gt;</text>
  <text x="80" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> card = document.getElementById(</tspan><tspan fill="#ce9178">'card'</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="338" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">card.dataset.userId;   </text>
  <text x="270" y="338" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// '42' (항상 문자열)</text>
  <text x="80" y="356" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">card.dataset.role;     </text>
  <text x="270" y="356" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 'admin'</text>
  <text x="80" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">card.dataset.newProp = </tspan><tspan fill="#ce9178">'value'</tspan><tspan fill="#e8e8e8">;  </tspan><tspan fill="#6a8aa0">// data-new-prop 추가</tspan></text>

  <text x="80" y="392" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 모든 data-* 속성 순회</text>
  <text x="80" y="410" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">for</text>
  <text x="104" y="410" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> (const [key, value] of Object.entries(card.dataset)) { ... }</text>
</svg>
