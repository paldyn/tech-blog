<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">경사 하강법: 손실 최소화 과정 시각화</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">학습률과 배치 크기에 따른 수렴 경로 비교</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Loss Landscape (left) -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">손실 함수 지형과 수렴 경로</text>
  <rect x="60" y="115" width="380" height="260" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Landscape curves (simple illustration) -->
  <!-- Bowl shape with contour lines -->
  <ellipse cx="255" cy="245" rx="120" ry="60" fill="none" stroke="#1e3a5a" stroke-width="1" opacity="0.6"/>
  <ellipse cx="255" cy="245" rx="80" ry="40" fill="none" stroke="#1e3a5a" stroke-width="1" opacity="0.8"/>
  <ellipse cx="255" cy="245" rx="40" ry="20" fill="none" stroke="#7ec8e3" stroke-width="1" opacity="0.6"/>
  <circle cx="255" cy="245" r="6" fill="#55c555"/>
  <text x="265" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">최솟값</text>

  <!-- Good LR path -->
  <polyline points="155,160 195,185 220,210 240,232 252,242" stroke="#7ec8e3" stroke-width="2" fill="none" stroke-dasharray="none"/>
  <circle cx="155" cy="160" r="5" fill="#7ec8e3"/>
  <text x="120" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">시작점</text>
  <!-- Arrows on path -->
  <polygon points="195,181 199,192 190,189" fill="#7ec8e3"/>
  <polygon points="220,206 224,217 215,214" fill="#7ec8e3"/>
  <polygon points="240,228 244,239 235,236" fill="#7ec8e3"/>

  <!-- Too high LR path (oscillating) -->
  <polyline points="350,160 260,185 345,210 268,230 258,244" stroke="#e05555" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  <circle cx="350" cy="160" r="5" fill="#e05555"/>
  <text x="354" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">발산 위험</text>

  <!-- Legend -->
  <line x1="75" y1="355" x2="105" y2="355" stroke="#7ec8e3" stroke-width="2"/>
  <text x="112" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">적절한 학습률</text>
  <line x1="75" y1="372" x2="105" y2="372" stroke="#e05555" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="112" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">과도한 학습률 (진동)</text>
  <text x="75" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">y축: 손실값, 등고선: 같은 손실의 파라미터 집합</text>

  <!-- RIGHT: Gradient Descent Types -->
  <text x="480" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">배치 방식에 따른 경사 하강법 종류</text>

  <!-- BGD -->
  <rect x="480" y="115" width="340" height="72" rx="8" fill="#0d1520" stroke="#7777cc"/>
  <text x="500" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">배치 GD (Batch GD)</text>
  <text x="500" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">전체 데이터로 그래디언트 계산</text>
  <text x="500" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">안정적이나 대용량 데이터에서 너무 느림</text>

  <!-- SGD -->
  <rect x="480" y="198" width="340" height="72" rx="8" fill="#0d1520" stroke="#55c555"/>
  <text x="500" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">확률적 GD (SGD)</text>
  <text x="500" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1개 샘플마다 업데이트</text>
  <text x="500" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빠르나 잡음 많고 불안정한 경로</text>

  <!-- Mini-batch SGD -->
  <rect x="480" y="281" width="340" height="72" rx="8" fill="#0d1520" stroke="#7ec8e3"/>
  <text x="500" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">미니배치 SGD ★ 실제 사용</text>
  <text x="500" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">32~512개 배치로 업데이트</text>
  <text x="500" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">속도와 안정성의 균형 + GPU 병렬화 효율</text>

  <!-- Update Rule -->
  <rect x="480" y="364" width="340" height="11" rx="4" fill="#111"/>
  <rect x="480" y="366" width="340" height="9" rx="4" fill="#1e2433"/>

  <text x="480" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파라미터 업데이트 규칙</text>
  <rect x="480" y="400" width="340" height="44" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="500" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">θ ← θ − η · ∇_θ L(θ; X_batch)</text>
  <text x="500" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">η: 학습률, ∇_θ L: 그래디언트</text>

  <!-- Code box -->
  <text x="60" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">학습률 선택의 영향</text>
  <rect x="60" y="400" width="390" height="90" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 학습률이 너무 크면</text>
  <text x="76" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">lr = </text>
  <text x="112" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1.0</text>
  <text x="136" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  → 발산 (loss NaN)</text>
  <text x="76" y="458" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 너무 작으면</text>
  <text x="76" y="476" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">lr = </text>
  <text x="112" y="476" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0.000001</text>
  <text x="200" y="476" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">→ 수렴 극히 느림</text>
  <text x="76" y="483" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 적절: 0.001~0.01이 출발점</text>

  <!-- Footer -->
  <text x="440" y="526" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
