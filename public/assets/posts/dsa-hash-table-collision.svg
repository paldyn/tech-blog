<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">충돌 해결 전략 비교</text>

  <!-- ─── LEFT: Chaining ─── -->
  <text x="200" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">체이닝 (Chaining)</text>
  <text x="200" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">충돌 시 같은 버킷에 연결 리스트 연결</text>

  <!-- buckets -->
  <rect x="100" y="108" width="50" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="125" y="130" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">0</text>
  <rect x="100" y="152" width="50" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="125" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">1</text>
  <rect x="100" y="196" width="50" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="125" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">2</text>
  <rect x="100" y="240" width="50" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="125" y="262" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">3</text>

  <!-- chains -->
  <!-- bucket 1: A → B -->
  <rect x="162" y="152" width="40" height="36" rx="4" fill="#0d1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="182" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">A</text>
  <line x1="202" y1="170" x2="214" y2="170" stroke="#9aa4b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="214" y="152" width="40" height="36" rx="4" fill="#0d1020" stroke="#e05555" stroke-width="1"/>
  <text x="234" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">B</text>
  <!-- bucket 2: C -->
  <rect x="162" y="196" width="40" height="36" rx="4" fill="#0d1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="182" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">C</text>

  <!-- pros/cons -->
  <rect x="80" y="300" width="230" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">장점</text>
  <text x="96" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 로드팩터 1 이상도 허용</text>
  <text x="96" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 구현 단순</text>
  <text x="96" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">단점</text>
  <text x="96" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 포인터 추가 메모리</text>
  <text x="96" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 캐시 미스 (비연속 메모리)</text>

  <!-- ─── RIGHT: Open Addressing ─── -->
  <text x="620" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">개방 주소법 (Open Addressing)</text>
  <text x="620" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">충돌 시 다른 빈 슬롯을 탐사(probing)</text>

  <!-- Linear probing example -->
  <!-- slots 0-6 -->
  <rect x="460" y="108" width="50" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="485" y="130" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">0</text>
  <rect x="460" y="152" width="50" height="36" rx="4" fill="#0d1f0d" stroke="#1a5a1a" stroke-width="1.5"/>
  <text x="485" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">A [1]</text>
  <rect x="460" y="196" width="50" height="36" rx="4" fill="#0d1020" stroke="#e05555" stroke-width="1.5"/>
  <text x="485" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">B [2]</text>
  <rect x="460" y="240" width="50" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1"/>
  <text x="485" y="262" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">3</text>

  <!-- arrows showing probing -->
  <text x="522" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">hash(B)=1</text>
  <text x="522" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">→ 1 충돌!</text>
  <text x="522" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">→ 2에 배치</text>

  <!-- Three types of probing -->
  <rect x="440" y="296" width="360" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">선형 탐사</text>
  <text x="560" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">: (h + i) % cap</text>
  <text x="456" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">이차 탐사</text>
  <text x="560" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">: (h + i²) % cap</text>
  <text x="456" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">이중 해싱</text>
  <text x="560" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">: (h + i·h₂) % cap</text>
  <text x="456" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">장점</text>
  <text x="456" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 포인터 없음, 캐시 친화적</text>
  <text x="456" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">단점</text>
  <text x="558" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 클러스터링, α &lt; 0.7 권장</text>

  <!-- divider -->
  <line x1="430" y1="94" x2="430" y2="440" stroke="#2a2a2a" stroke-width="1"/>
</svg>
