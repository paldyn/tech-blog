<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@RequestBody 역직렬화 흐름</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">JSON → HttpMessageConverter → Java 객체 → @Valid 검증</text>

  <!-- Step 1: HTTP Request -->
  <rect x="60" y="104" width="160" height="112" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="140" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">HTTP 요청</text>
  <rect x="72" y="134" width="136" height="72" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">POST /users</text>
  <text x="80" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">Content-Type:</text>
  <text x="80" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">  application/json</text>
  <text x="80" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">{"name":"홍길동"}</text>

  <!-- Arrow 1 -->
  <polygon points="234,160 246,155 246,165" fill="#7ec8e3"/>
  <line x1="220" y1="160" x2="246" y2="160" stroke="#7ec8e3" stroke-width="2"/>
  <text x="232" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">read</text>

  <!-- Step 2: HttpMessageConverter -->
  <rect x="250" y="104" width="180" height="112" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="340" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">HttpMessage</text>
  <text x="340" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Converter</text>
  <text x="340" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MappingJackson2</text>
  <text x="340" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HttpMessageConverter</text>
  <text x="340" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Content-Type 기반 선택</text>

  <!-- Arrow 2 -->
  <polygon points="444,160 456,155 456,165" fill="#7ec8e3"/>
  <line x1="430" y1="160" x2="456" y2="160" stroke="#7ec8e3" stroke-width="2"/>
  <text x="443" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">역직렬화</text>

  <!-- Step 3: Java Object -->
  <rect x="460" y="104" width="180" height="112" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="550" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Java 객체</text>
  <rect x="472" y="134" width="156" height="72" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="480" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">class CreateUserReq {</text>
  <text x="480" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  String name;</text>
  <text x="480" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  String email;</text>
  <text x="480" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">}</text>

  <!-- Arrow 3 -->
  <polygon points="654,160 666,155 666,165" fill="#55c555"/>
  <line x1="640" y1="160" x2="666" y2="160" stroke="#55c555" stroke-width="2"/>
  <text x="653" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">@Valid</text>

  <!-- Step 4: Validation -->
  <rect x="670" y="104" width="150" height="112" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="745" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Bean Validation</text>
  <text x="745" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@NotNull</text>
  <text x="745" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Size</text>
  <text x="745" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Email</text>
  <text x="745" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실패 → 400 Bad Request</text>

  <!-- Code block: @RequestBody code example -->
  <rect x="60" y="244" width="760" height="192" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// @RequestBody + @Valid 기본 패턴</text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">@PostMapping</text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">public ResponseEntity&lt;UserDto&gt; create(</text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        @RequestBody @Valid</text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        CreateUserRequest req) {</text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">    // 검증 통과 후 서비스 호출</text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    UserDto saved = userService.create(req);</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    return ResponseEntity.created(…).body(saved);</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">}</text>
</svg>
