<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#b5cea8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Checked vs Unchecked 선택 결정 트리</text>

  <!-- Start -->
  <rect x="330" y="64" width="220" height="46" rx="22" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc" text-anchor="middle">예외 설계 시작</text>

  <line x1="440" y1="110" x2="440" y2="148" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-y)"/>

  <!-- Q1 -->
  <rect x="250" y="148" width="380" height="50" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">호출자가 이 예외를 합리적으로 복구할 수 있나?</text>
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(파일 없음, 네트워크 실패, DB 오류 등)</text>

  <!-- YES branch -->
  <line x1="295" y1="198" x2="200" y2="248" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="230" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">YES</text>

  <!-- NO branch -->
  <line x1="585" y1="198" x2="680" y2="248" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <text x="650" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">NO</text>

  <!-- Checked box -->
  <rect x="80" y="248" width="240" height="60" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Checked Exception</text>
  <text x="200" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">IOException, 커스텀 Checked</text>

  <!-- Unchecked box -->
  <rect x="560" y="248" width="240" height="60" rx="8" fill="#1a1a0d" stroke="#ce9178" stroke-width="2"/>
  <text x="680" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">Unchecked Exception</text>
  <text x="680" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">RuntimeException 확장</text>

  <!-- Practical note -->
  <rect x="60" y="334" width="760" height="88" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 실무 판단 기준</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// </tspan><tspan fill="#7ec8e3" font-weight="600">Checked</tspan><tspan fill="#ffffff">: 외부 자원(파일/DB/네트워크) — 호출자가 알아야 함</tspan></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// </tspan><tspan fill="#ce9178" font-weight="600">Unchecked</tspan><tspan fill="#ffffff">: 개발 오류(null, 범위초과) — 수정해야 할 버그</tspan></text>
  <text x="76" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// Spring / 최신 라이브러리: 대부분 Unchecked 선호</tspan></text>
</svg>
