<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL Server 테이블 힌트 — 락 관련 주요 힌트</text>

  <!-- Headers -->
  <rect x="60" y="64" width="760" height="36" rx="4" fill="#111122" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">힌트</text>
  <text x="350" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">동작</text>
  <text x="580" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">위험성</text>
  <text x="760" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">권장</text>
  <line x1="260" y1="64" x2="260" y2="100" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="460" y1="64" x2="460" y2="100" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="700" y1="64" x2="700" y2="100" stroke="#2a2a3e" stroke-width="1"/>

  <!-- NOLOCK -->
  <rect x="60" y="100" width="760" height="44" rx="0" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="160" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">NOLOCK</text>
  <text x="350" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">공유락 획득 안 함</text>
  <text x="580" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">더티 리드 · 팬텀 · 중복행</text>
  <text x="760" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">사용 지양</text>
  <line x1="260" y1="100" x2="260" y2="144" stroke="#2a1a1a" stroke-width="1"/>
  <line x1="460" y1="100" x2="460" y2="144" stroke="#2a1a1a" stroke-width="1"/>
  <line x1="700" y1="100" x2="700" y2="144" stroke="#2a1a1a" stroke-width="1"/>

  <!-- READPAST -->
  <rect x="60" y="144" width="760" height="44" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <text x="160" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">READPAST</text>
  <text x="350" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">잠긴 행 건너뜀</text>
  <text x="580" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">행 누락 발생</text>
  <text x="760" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">큐 패턴에 유용</text>
  <line x1="260" y1="144" x2="260" y2="188" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="460" y1="144" x2="460" y2="188" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="700" y1="144" x2="700" y2="188" stroke="#2a2a3e" stroke-width="1"/>

  <!-- UPDLOCK -->
  <rect x="60" y="188" width="760" height="44" rx="0" fill="#111120" stroke="#2a2a3e" stroke-width="1"/>
  <text x="160" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">UPDLOCK</text>
  <text x="350" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">읽기 시 업데이트 락 획득</text>
  <text x="580" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">다른 UPDLOCK 대기</text>
  <text x="760" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">데드락 예방에 유용</text>
  <line x1="260" y1="188" x2="260" y2="232" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="460" y1="188" x2="460" y2="232" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="700" y1="188" x2="700" y2="232" stroke="#2a2a3e" stroke-width="1"/>

  <!-- HOLDLOCK -->
  <rect x="60" y="232" width="760" height="44" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <text x="160" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">HOLDLOCK</text>
  <text x="350" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">공유락 TRAN 끝까지 유지</text>
  <text x="580" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">동시성 감소</text>
  <text x="760" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">= SERIALIZABLE</text>
  <line x1="260" y1="232" x2="260" y2="276" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="460" y1="232" x2="460" y2="276" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="700" y1="232" x2="700" y2="276" stroke="#2a2a3e" stroke-width="1"/>

  <!-- TABLOCK / TABLOCKX -->
  <rect x="60" y="276" width="760" height="44" rx="0" fill="#111120" stroke="#2a2a3e" stroke-width="1"/>
  <text x="160" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">TABLOCK / TABLOCKX</text>
  <text x="350" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">테이블 수준 공유/배타 락</text>
  <text x="580" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">전체 테이블 접근 차단</text>
  <text x="760" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">대량 로드에 유용</text>
  <line x1="260" y1="276" x2="260" y2="320" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="460" y1="276" x2="460" y2="320" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="700" y1="276" x2="700" y2="320" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Best Practice -->
  <rect x="60" y="345" width="760" height="80" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">NOLOCK 대신 사용해야 할 올바른 대안</text>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">① RCSI 활성화 (READ_COMMITTED_SNAPSHOT ON) — 락 없이 일관된 읽기</text>
  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">② SNAPSHOT 격리 — 트랜잭션 내 일관성 보장 + 락 없음</text>
</svg>
