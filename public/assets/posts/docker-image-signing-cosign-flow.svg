<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Cosign 이미지 서명 및 검증 흐름</text>

  <!-- Sign flow -->
  <text x="220" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">서명 (Sign)</text>

  <rect x="40" y="94" width="130" height="52" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="105" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">빌드/Push</text>
  <text x="105" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이미지 digest</text>

  <line x1="170" y1="120" x2="210" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="210" y="94" width="130" height="52" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="275" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">cosign sign</text>
  <text x="275" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비밀키 또는 OIDC</text>

  <line x1="340" y1="120" x2="380" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="380" y="94" width="130" height="52" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="445" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">레지스트리</text>
  <text x="445" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서명 OCI artifact</text>

  <!-- Rekor -->
  <line x1="275" y1="146" x2="275" y2="180" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="210" y="180" width="130" height="52" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="275" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Rekor</text>
  <text x="275" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">투명성 로그</text>

  <!-- Verify flow -->
  <text x="720" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">검증 (Verify)</text>

  <rect x="590" y="94" width="130" height="52" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="655" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">레지스트리</text>
  <text x="655" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서명 조회</text>

  <line x1="720" y1="120" x2="750" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="750" y="94" width="90" height="52" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="795" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">cosign</text>
  <text x="795" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">verify</text>

  <!-- OK / Fail -->
  <rect x="705" y="180" width="80" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="745" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">✓ OK</text>

  <rect x="800" y="180" width="60" height="36" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="830" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">✗ Fail</text>

  <line x1="795" y1="146" x2="745" y2="180" stroke="#55c555" stroke-width="1.5"/>
  <line x1="795" y1="146" x2="830" y2="180" stroke="#e05555" stroke-width="1.5"/>

  <!-- Separator -->
  <line x1="540" y1="68" x2="540" y2="250" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Code block: sign -->
  <rect x="40" y="260" width="380" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># 키 기반 서명</text>
  <text x="56" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">cosign <tspan fill="#7ec8e3" font-weight="600">generate-key-pair</tspan></text>
  <text x="56" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># cosign.key, cosign.pub 생성</text>
  <text x="56" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">cosign <tspan fill="#7ec8e3" font-weight="600">sign</tspan> --key cosign.key \</text>
  <text x="56" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  ghcr.io/myorg/myapp@<tspan fill="#ce9178">sha256:abc123</tspan></text>
  <text x="56" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># 검증</text>
  <text x="56" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">cosign <tspan fill="#7ec8e3" font-weight="600">verify</tspan> --key cosign.pub \</text>
  <text x="56" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  ghcr.io/myorg/myapp@<tspan fill="#ce9178">sha256:abc123</tspan></text>
  <text x="56" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># Verified OK</text>
  <text x="56" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># [{"critical":{"type":"cosign"},...}]</text>

  <!-- Code block: keyless -->
  <rect x="460" y="260" width="380" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># 키리스 서명 (OIDC, 추천)</text>
  <text x="476" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># GitHub Actions에서 자동으로 OIDC 토큰 사용</text>
  <text x="476" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">COSIGN_EXPERIMENTAL</tspan>=1 cosign sign \</text>
  <text x="476" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  ghcr.io/myorg/myapp@<tspan fill="#ce9178">sha256:abc123</tspan></text>
  <text x="476" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># OIDC token → Fulcio CA → 인증서 발급</text>
  <text x="476" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># 검증 (OIDC identity 확인)</text>
  <text x="476" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">cosign <tspan fill="#7ec8e3" font-weight="600">verify</tspan> \</text>
  <text x="476" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  --certificate-identity-regexp <tspan fill="#ce9178">"github.com/myorg"</tspan> \</text>
  <text x="476" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  --certificate-oidc-issuer <tspan fill="#ce9178">"https://token.actions.githubusercontent.com"</tspan> \</text>
  <text x="476" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  ghcr.io/myorg/myapp@<tspan fill="#ce9178">sha256:abc123</tspan></text>
</svg>
