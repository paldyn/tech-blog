<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">폼 재사용 아키텍처</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">상속 · include · 팝업 재사용의 세 가지 레이어</text>

  <defs>
    <marker id="ba1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="ba2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ba3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Base Form -->
  <rect x="300" y="100" width="280" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">BaseForm.xfdl</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">공통 변수 · 단축키 · 권한 체크 · 공통 함수</text>

  <!-- Arrow: BaseForm to children -->
  <line x1="440" y1="160" x2="440" y2="188" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="175" y1="188" x2="705" y2="188" stroke="#555" stroke-width="1.5"/>

  <!-- Inheritance targets -->
  <line x1="175" y1="188" x2="175" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ba2)"/>
  <line x1="440" y1="188" x2="440" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ba2)"/>
  <line x1="705" y1="188" x2="705" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ba2)"/>

  <text x="175" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">상속</text>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">상속</text>
  <text x="705" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">상속</text>

  <!-- Child forms -->
  <rect x="60" y="220" width="230" height="55" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">ListForm.xfdl</text>
  <text x="175" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">조회 전용 화면 베이스</text>

  <rect x="325" y="220" width="230" height="55" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">EditForm.xfdl</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">입력/수정 화면 베이스</text>

  <rect x="590" y="220" width="230" height="55" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">PopupForm.xfdl</text>
  <text x="705" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">팝업 공통 베이스</text>

  <!-- Include components -->
  <rect x="60" y="320" width="760" height="55" rx="8" fill="#0d0d1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Include 컴포넌트 (공용 UI 조각)</text>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SearchBar.xfdl · PageControl.xfdl · ButtonBar.xfdl · GridToolbar.xfdl</text>

  <!-- Arrow: children to include -->
  <line x1="175" y1="275" x2="175" y2="310" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ba2)"/>
  <line x1="440" y1="275" x2="440" y2="310" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ba2)"/>
  <line x1="705" y1="275" x2="705" y2="310" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ba2)"/>
  <text x="810" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">include</text>

  <!-- Comparison table -->
  <rect x="60" y="390" width="760" height="90" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">재사용 방식 비교</text>

  <text x="80" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 상속(Inheritance): 코드와 이벤트 재사용. 공통 로직을 override로 확장. 구조적 변경 시 영향 범위 큼</text>
  <text x="80" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• Include: UI 조각을 삽입. 독립적으로 테스트 가능. 부모-자식 통신은 이벤트로</text>
  <text x="80" y="469" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 팝업 재사용: 검색/선택 팝업을 표준화. 인자(args)와 콜백으로 데이터 교환</text>
</svg>
