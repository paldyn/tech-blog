<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker events — 주요 명령 패턴</text>

  <!-- Left column: Basic commands -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 사용법</text>

  <rect x="60" y="92" width="360" height="136" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 실시간 이벤트 스트림 (무한 대기)</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ docker events</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 마지막 1시간 이벤트 조회</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ docker events --since 1h</text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 특정 시간 범위 이벤트 조회</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ docker events --since 2h --until 1h</text>

  <!-- Left column: Filter commands -->
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">필터 옵션</text>

  <rect x="60" y="262" width="360" height="154" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># container 타입만 필터</text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker events</tspan><tspan fill="#ffffff"> --filter </tspan><tspan fill="#ce9178">'type=container'</tspan></text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># die 이벤트만 필터</text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker events</tspan><tspan fill="#ffffff"> --filter </tspan><tspan fill="#ce9178">'event=die'</tspan></text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 특정 컨테이너 + 이벤트 조합</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker events</tspan><tspan fill="#ffffff"> --filter </tspan><tspan fill="#ce9178">'container=web'</tspan><tspan fill="#ffffff"> \</tspan></text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  --filter </tspan><tspan fill="#ce9178">'event=start'</tspan></text>

  <!-- Right column: Format and output -->
  <text x="468" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">포맷 &amp; 출력 예시</text>

  <rect x="448" y="92" width="372" height="136" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="464" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Go 템플릿으로 포맷 지정</text>
  <text x="464" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker events</tspan><tspan fill="#ffffff"> --format \</tspan></text>
  <text x="464" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  '{{.Time}} {{.Type}} {{.Action}}'</tspan></text>
  <text x="464" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># JSON 출력</text>
  <text x="464" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker events</tspan><tspan fill="#ffffff"> --format </tspan><tspan fill="#ce9178">'{{json .}}'</tspan></text>
  <text x="464" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  | jq .</tspan></text>

  <!-- Right column: Script usage -->
  <text x="468" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">스크립트 활용 패턴</text>

  <rect x="448" y="262" width="372" height="154" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="464" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># die 이벤트 발생 시 슬랙 알림</text>
  <text x="464" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker events</tspan><tspan fill="#ffffff"> --filter </tspan><tspan fill="#ce9178">'event=die'</tspan><tspan fill="#ffffff"> \</tspan></text>
  <text x="464" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  --format </tspan><tspan fill="#ce9178">'{{.Actor.Attributes.name}}'</tspan><tspan fill="#ffffff"> \</tspan></text>
  <text x="464" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  | </tspan><tspan fill="#7ec8e3">while</tspan><tspan fill="#ffffff"> read name; do</tspan></text>
  <text x="464" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    notify_slack </tspan><tspan fill="#ce9178">"$name died"</tspan></text>
  <text x="464" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  done</tspan></text>

  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">--filter는 여러 번 사용 가능 (동일 key → OR, 다른 key → AND 조합)</text>
</svg>
