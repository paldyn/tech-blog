<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N — this 컨텍스트 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">Form 스크립트 내 this 가 가리키는 대상</text>

  <!-- Form Box -->
  <rect x="60" y="96" width="760" height="340" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Form (this)</text>

  <!-- this.form -->
  <rect x="100" y="136" width="200" height="56" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">this.form</text>
  <text x="200" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Form 객체 자체</text>

  <!-- this.btn_xxx -->
  <rect x="340" y="136" width="200" height="56" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">this.btn_xxx</text>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">컴포넌트 직접 접근</text>

  <!-- this.dsXxx -->
  <rect x="580" y="136" width="200" height="56" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="680" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">this.dsXxx</text>
  <text x="680" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Dataset 접근</text>

  <!-- Inner callback problem -->
  <rect x="100" y="220" width="680" height="180" rx="8" fill="#111" stroke="#e05555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">⚠ 콜백·클로저 내부의 this 주의</text>
  <line x1="120" y1="254" x2="760" y2="254" stroke="#333" stroke-width="1"/>

  <!-- Problem -->
  <rect x="120" y="264" width="280" height="120" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="136" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ 문제: this가 바뀜</text>
  <text x="136" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">setTimeout</text>
  <text x="208" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="136" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  function</text>
  <text x="196" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">() {</text>
  <text x="150" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    // this = window</text>
  <text x="150" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    this.btn_ok... </text>
  <text x="136" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }, 100);</text>

  <!-- Solution -->
  <rect x="440" y="264" width="320" height="120" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="456" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✅ 해결: var me = this</text>
  <text x="456" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">var</text>
  <text x="480" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> me = </text>
  <text x="524" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">this</text>
  <text x="552" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="456" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">setTimeout</text>
  <text x="528" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="456" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  function</text>
  <text x="516" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">() {</text>
  <text x="470" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    me.btn_ok... ✓</text>
  <text x="456" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }, 100);</text>
</svg>
