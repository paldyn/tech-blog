<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Invisible Index — 안전한 인덱스 비활성화 절차</text>

  <!-- Step 1 -->
  <rect x="60" y="80" width="180" height="72" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① 현재 상태</text>
  <text x="150" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인덱스 visible</text>
  <text x="150" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">옵티마이저 사용 중</text>

  <line x1="240" y1="116" x2="280" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Step 2 -->
  <rect x="280" y="80" width="210" height="72" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="385" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② INVISIBLE 설정</text>
  <text x="385" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ALTER TABLE ... ALTER INDEX</text>
  <text x="385" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인덱스 유지, 옵티마이저 제외</text>

  <line x1="490" y1="116" x2="530" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Step 3 -->
  <rect x="530" y="80" width="180" height="72" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="620" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">③ 성능 모니터링</text>
  <text x="620" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">쿼리 플랜 변화 확인</text>
  <text x="620" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">슬로우 쿼리 로그 관찰</text>

  <!-- Branch: OK or rollback -->
  <line x1="710" y1="116" x2="740" y2="116" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="740" y1="116" x2="740" y2="160" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="740" y1="160" x2="780" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="740" y1="160" x2="780" y2="230" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- OK path -->
  <rect x="780" y="140" width="80" height="40" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="820" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">문제 없음</text>

  <!-- Rollback path -->
  <rect x="780" y="210" width="80" height="40" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="820" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">성능 저하</text>

  <!-- DROP or VISIBLE -->
  <line x1="820" y1="180" x2="820" y2="290" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="700" y="290" width="160" height="40" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="780" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">DROP INDEX</text>

  <line x1="820" y1="250" x2="820" y2="360" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="700" y="360" width="160" height="40" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="780" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">VISIBLE 복원</text>

  <!-- Code -->
  <rect x="60" y="192" width="620" height="212" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 인덱스를 invisible로 전환</text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ALTER TABLE</text>
  <text x="186" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> orders </text>
  <text x="240" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ALTER INDEX</text>
  <text x="350" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> idx_old </text>
  <text x="418" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">INVISIBLE</text>
  <text x="518" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">;</text>

  <text x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 특정 세션에서만 invisible 인덱스 강제 사용 (테스트)</text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">SET</text>
  <text x="110" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> optimizer_switch = </text>
  <text x="276" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">'use_invisible_indexes=on'</text>
  <text x="506" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">;</text>

  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- invisible 인덱스 목록 확인</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">SELECT</text>
  <text x="130" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> index_name, is_visible </text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">FROM</text>
  <text x="122" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> information_schema.statistics</text>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">WHERE</text>
  <text x="130" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> table_name = </text>
  <text x="248" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">'orders'</text>
  <text x="318" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve"> AND</text>
  <text x="364" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> is_visible = </text>
  <text x="468" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">'NO'</text>
  <text x="510" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">;</text>

  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 복원</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- ALTER TABLE orders ALTER INDEX idx_old VISIBLE;</text>
</svg>
