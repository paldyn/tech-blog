<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">동기(Sync) vs 비동기(Async) 트랜잭션 비교</text>

  <!-- Async column -->
  <rect x="60" y="72" width="360" height="360" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">비동기 (기본값)</text>

  <!-- Timeline -->
  <line x1="140" y1="120" x2="140" y2="400" stroke="#1e2433" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="140" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라이언트</text>

  <line x1="320" y1="120" x2="320" y2="400" stroke="#1e2433" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="320" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버</text>

  <!-- Async events -->
  <rect x="80" y="132" width="120" height="28" fill="#0d1520" rx="4" stroke="#55c555"/>
  <text x="140" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">transaction() 호출</text>

  <polygon points="168,158 200,150 200,166" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="160" y1="158" x2="200" y2="158" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="80" y="178" width="120" height="28" fill="#0d1520" rx="4" stroke="#888"/>
  <text x="140" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">다음 코드 계속 실행</text>

  <rect x="80" y="218" width="120" height="28" fill="#0d1520" rx="4" stroke="#888"/>
  <text x="140" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">UI 응답 유지</text>

  <rect x="240" y="178" width="120" height="68" fill="#0d1520" rx="4" stroke="#e05555"/>
  <text x="300" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">서버 처리중</text>
  <text x="300" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DB 조회</text>
  <text x="300" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답 생성</text>

  <!-- Response arrow -->
  <polygon points="162,264 130,256 130,272" fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="130" y1="264" x2="240" y2="264" stroke="#55c555" stroke-width="1.5"/>

  <rect x="80" y="280" width="120" height="28" fill="#0d1520" rx="4" stroke="#55c555"/>
  <text x="140" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">콜백 fn_xxxCb()</text>

  <rect x="80" y="324" width="120" height="56" fill="#0d1520" rx="4" stroke="#7ec8e3"/>
  <text x="140" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">결과 처리</text>
  <text x="140" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Grid 갱신</text>
  <text x="140" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">버튼 활성화</text>

  <!-- Sync column -->
  <rect x="460" y="72" width="360" height="360" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">동기 (async=false)</text>

  <!-- Timeline -->
  <line x1="540" y1="120" x2="540" y2="400" stroke="#1e2433" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="540" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라이언트</text>

  <line x1="720" y1="120" x2="720" y2="400" stroke="#1e2433" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="720" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버</text>

  <!-- Sync events -->
  <rect x="480" y="132" width="120" height="28" fill="#0d1520" rx="4" stroke="#e05555"/>
  <text x="540" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">transaction() 호출</text>

  <polygon points="568,158 600,150 600,166" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="560" y1="158" x2="600" y2="158" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Blocked block -->
  <rect x="480" y="178" width="120" height="110" fill="#1a0808" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="540" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">UI 블록됨</text>
  <text x="540" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">사용자 입력 불가</text>
  <text x="540" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스크롤 불가</text>
  <text x="540" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">화면 응답 없음</text>
  <text x="540" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">"응답 없음" 가능성</text>

  <rect x="640" y="178" width="120" height="110" fill="#0d1520" rx="4" stroke="#e05555"/>
  <text x="700" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">서버 처리중</text>
  <text x="700" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DB 조회</text>
  <text x="700" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답 생성</text>

  <!-- Response arrow -->
  <polygon points="562,302 530,294 530,310" fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="530" y1="302" x2="640" y2="302" stroke="#55c555" stroke-width="1.5"/>

  <rect x="480" y="318" width="120" height="28" fill="#0d1520" rx="4" stroke="#55c555"/>
  <text x="540" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">응답 후 다음 줄 실행</text>

  <rect x="480" y="358" width="120" height="36" fill="#0d1520" rx="4" stroke="#7777cc"/>
  <text x="540" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">transaction() 이후</text>
  <text x="540" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">코드 바로 실행 가능</text>

  <!-- Bottom note -->
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">동기 트랜잭션은 UI 블록 위험 — 특수한 초기화 순서가 필요한 경우에만 신중하게 사용</text>
</svg>
