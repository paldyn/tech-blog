<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">알고리즘 분석의 3가지 경우</text>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Best Case -->
  <rect x="60" y="80" width="230" height="100" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">최선 경우 (Best)</text>
  <text x="175" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Ω(n) 표기</text>
  <text x="175" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">이미 정렬된 배열 → 1번 비교</text>
  <text x="175" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">하한(Lower bound) 기준</text>

  <!-- Average Case -->
  <rect x="325" y="80" width="230" height="100" rx="8" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178" text-anchor="middle">평균 경우 (Average)</text>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Θ(n) 표기</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">임의 입력의 기대 연산 횟수</text>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">확률 분포 가정 필요</text>

  <!-- Worst Case -->
  <rect x="590" y="80" width="230" height="100" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="705" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">최악 경우 (Worst)</text>
  <text x="705" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">O(n) 표기</text>
  <text x="705" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">역순 배열 → n(n-1)/2 비교</text>
  <text x="705" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">상한(Upper bound) 기준</text>

  <!-- Arrow: most important = worst case -->
  <rect x="590" y="198" width="230" height="36" rx="6" fill="#2a0808" stroke="#e05555" stroke-width="1"/>
  <text x="705" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">★ 실무에서 가장 많이 사용</text>

  <!-- Code example -->
  <rect x="60" y="250" width="760" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="275" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 선형 탐색: 3가지 경우 분석</tspan>
  </text>
  <text x="76" y="295" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> linearSearch(arr, target) {</tspan>
  </text>
  <text x="76" y="315" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">for</tspan>
    <tspan fill="#ffffff"> (</tspan>
    <tspan fill="#7ec8e3" font-weight="600">let</tspan>
    <tspan fill="#ffffff"> i = </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">; i </tspan>
    <tspan fill="#ffffff">&lt; arr.length; i++)</tspan>
  </text>
  <text x="76" y="335" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">if</tspan>
    <tspan fill="#ffffff"> (arr[i] === target) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> i;</tspan>
  </text>
  <text x="76" y="355" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> -</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="375" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="76" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// Best: Ω(1)  Average: Θ(n/2)  Worst: O(n)</tspan>
  </text>
</svg>
