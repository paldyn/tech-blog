<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <rect width="880" height="490" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">순위 함수별 동점 처리 비교</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">ROW_NUMBER · RANK · DENSE_RANK</text>

  <!-- Table outer -->
  <rect x="60" y="92" width="760" height="248" rx="6" fill="#0e1117" stroke="#1e2433"/>

  <!-- Header background -->
  <rect x="61" y="92" width="758" height="40" rx="5" fill="#161b27"/>
  <rect x="61" y="112" width="758" height="20" fill="#161b27"/>

  <!-- Column dividers -->
  <line x1="250" y1="92" x2="250" y2="340" stroke="#1e2433" stroke-width="1"/>
  <line x1="440" y1="92" x2="440" y2="340" stroke="#1e2433" stroke-width="1"/>
  <line x1="630" y1="92" x2="630" y2="340" stroke="#1e2433" stroke-width="1"/>

  <!-- Header separator -->
  <line x1="60" y1="132" x2="820" y2="132" stroke="#1e2433" stroke-width="1"/>

  <!-- Row separators -->
  <line x1="60" y1="172" x2="820" y2="172" stroke="#252b3a" stroke-width="1"/>
  <line x1="60" y1="212" x2="820" y2="212" stroke="#252b3a" stroke-width="1"/>
  <line x1="60" y1="252" x2="820" y2="252" stroke="#252b3a" stroke-width="1"/>
  <line x1="60" y1="292" x2="820" y2="292" stroke="#252b3a" stroke-width="1"/>

  <!-- Tie highlight rows 2 and 3 -->
  <rect x="61" y="172" width="758" height="80" fill="#2a2000" opacity="0.6"/>

  <!-- Header labels -->
  <text x="155" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">SCORE</text>
  <text x="345" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#aab4c8">ROW_NUMBER()</text>
  <text x="535" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">RANK()</text>
  <text x="725" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">DENSE_RANK()</text>

  <!-- Row 1: score=100, rn=1, rank=1, drank=1 -->
  <text x="155" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">100</text>
  <text x="345" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">1</text>
  <text x="535" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">1</text>
  <text x="725" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">1</text>

  <!-- Row 2: score=95 (TIE), rn=2, rank=2, drank=2 -->
  <text x="155" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8c84a">95</text>
  <text x="345" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">2</text>
  <text x="535" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8c84a">2</text>
  <text x="725" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8c84a">2</text>
  <text x="68" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c84a">동점</text>

  <!-- Row 3: score=95 (TIE), rn=3, rank=2, drank=2 -->
  <text x="155" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8c84a">95</text>
  <text x="345" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">3</text>
  <text x="535" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8c84a">2</text>
  <text x="725" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8c84a">2</text>
  <text x="68" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c84a">동점</text>

  <!-- Row 4: score=90, rn=4, rank=4(skip!), drank=3 -->
  <text x="155" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">90</text>
  <text x="345" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">4</text>
  <text x="535" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e05555">4</text>
  <text x="725" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#55c555">3</text>
  <!-- skip indicator for RANK -->
  <text x="568" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">3 건너뜀</text>

  <!-- Row 5: score=85, rn=5, rank=5, drank=4 -->
  <text x="155" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">85</text>
  <text x="345" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">5</text>
  <text x="535" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">5</text>
  <text x="725" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#e8e8e8">4</text>

  <!-- Legend boxes -->
  <!-- ROW_NUMBER -->
  <rect x="60" y="356" width="230" height="60" rx="6" fill="#111520" stroke="#1e2433"/>
  <text x="175" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#aab4c8">ROW_NUMBER()</text>
  <text x="175" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">항상 고유 번호</text>
  <text x="175" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">동점 무관 — 1,2,3,4,5</text>

  <!-- RANK -->
  <rect x="325" y="356" width="230" height="60" rx="6" fill="#111520" stroke="#1e2433"/>
  <text x="440" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">RANK()</text>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동점 동일 번호, 번호 건너뜀</text>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">1,2,2,4,5 (3 생략)</text>

  <!-- DENSE_RANK -->
  <rect x="590" y="356" width="230" height="60" rx="6" fill="#111520" stroke="#1e2433"/>
  <text x="705" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">DENSE_RANK()</text>
  <text x="705" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동점 동일 번호, 번호 연속</text>
  <text x="705" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">1,2,2,3,4 (연속)</text>

  <!-- Note -->
  <text x="440" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">ORDER BY score DESC 기준 — 동점 행(95점 2개)에서 차이 발생</text>
</svg>
