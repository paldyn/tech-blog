<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="are" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">Thread 상태 전이도 (Thread.State)</text>

  <!-- NEW -->
  <rect x="60" y="70" width="120" height="50" rx="7" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">NEW</text>

  <!-- RUNNABLE -->
  <rect x="260" y="70" width="140" height="50" rx="7" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="330" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">RUNNABLE</text>

  <!-- BLOCKED -->
  <rect x="510" y="40" width="130" height="50" rx="7" fill="#2e1a0d" stroke="#e09050" stroke-width="1.5"/>
  <text x="575" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e09050" text-anchor="middle">BLOCKED</text>

  <!-- WAITING -->
  <rect x="510" y="115" width="130" height="50" rx="7" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="575" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">WAITING</text>

  <!-- TIMED_WAITING -->
  <rect x="510" y="190" width="130" height="50" rx="7" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="575" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#b5cea8" text-anchor="middle">TIMED_WAITING</text>

  <!-- TERMINATED -->
  <rect x="700" y="115" width="140" height="50" rx="7" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="770" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">TERMINATED</text>

  <!-- Arrows -->
  <!-- NEW → RUNNABLE -->
  <line x1="180" y1="95" x2="260" y2="95" stroke="#55c555" stroke-width="2" marker-end="url(#arg)"/>
  <text x="220" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">start()</text>

  <!-- RUNNABLE → BLOCKED -->
  <line x1="380" y1="80" x2="510" y2="62" stroke="#e09050" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="450" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">synchronized 대기</text>

  <!-- BLOCKED → RUNNABLE -->
  <line x1="510" y1="73" x2="380" y2="88" stroke="#888" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="440" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">락 획득</text>

  <!-- RUNNABLE → WAITING -->
  <line x1="400" y1="105" x2="510" y2="138" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arb)"/>
  <text x="460" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">wait()/join()</text>

  <!-- WAITING → RUNNABLE -->
  <line x1="510" y1="148" x2="400" y2="115" stroke="#888" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="460" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">notify()</text>

  <!-- RUNNABLE → TIMED_WAITING -->
  <line x1="400" y1="112" x2="510" y2="213" stroke="#b5cea8" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="450" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">sleep(ms)</text>

  <!-- TIMED_WAITING → RUNNABLE -->
  <line x1="510" y1="225" x2="400" y2="120" stroke="#888" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- RUNNABLE → TERMINATED -->
  <line x1="400" y1="95" x2="700" y2="140" stroke="#e05555" stroke-width="1.5" marker-end="url(#are)"/>
  <text x="565" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">run() 완료</text>

  <!-- State descriptions -->
  <rect x="60" y="280" width="760" height="100" rx="6" fill="#111" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">상태 설명</text>

  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">NEW:</text>
  <text x="115" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 생성됨, 아직 start() 전</text>

  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">RUNNABLE:</text>
  <text x="160" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 실행 중 또는 CPU 할당 대기</text>

  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e09050">BLOCKED:</text>
  <text x="155" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> synchronized 블록 진입 대기</text>

  <text x="400" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">WAITING:</text>
  <text x="470" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> wait()/join() 무한 대기</text>

  <text x="400" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#b5cea8">TIMED_WAITING:</text>
  <text x="520" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> sleep(ms)/wait(ms) 시간 제한 대기</text>

  <text x="400" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">TERMINATED:</text>
  <text x="490" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> run() 완료, 재시작 불가</text>

  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Thread.getState()로 현재 상태 조회 가능 (디버깅, 모니터링 용도)</text>
</svg>
