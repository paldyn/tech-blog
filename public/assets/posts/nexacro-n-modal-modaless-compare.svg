<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">모달 vs 모달리스 동작 비교</text>

  <!-- Modal column -->
  <text x="220" y="85" fill="#e05555" font-size="16" font-weight="600" text-anchor="middle">Modal (bModal = true)</text>

  <!-- Main window (modal side, dimmed) -->
  <rect x="60" y="100" width="320" height="200" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <!-- Dim overlay -->
  <rect x="60" y="100" width="320" height="200" rx="8" fill="#000000" fill-opacity="0.55"/>
  <text x="220" y="210" fill="#555" font-size="13" text-anchor="middle">메인 화면 (잠김)</text>
  <text x="220" y="232" fill="#555" font-size="12" text-anchor="middle">클릭·입력 불가</text>

  <!-- Popup on top (modal) -->
  <rect x="110" y="130" width="220" height="110" rx="6" fill="#1e293b" stroke="#e05555" stroke-width="2"/>
  <text x="220" y="155" fill="#e05555" font-size="13" font-weight="600" text-anchor="middle">Modal Popup</text>
  <text x="220" y="176" fill="#e8e8e8" font-size="12" text-anchor="middle">이 팝업을 닫기 전</text>
  <text x="220" y="194" fill="#e8e8e8" font-size="12" text-anchor="middle">메인 조작 불가</text>
  <text x="220" y="218" fill="#888" font-size="11" text-anchor="middle">openPopup(..., true, ...)</text>

  <!-- Modal characteristics -->
  <rect x="60" y="316" width="320" height="124" rx="8" fill="#111827" stroke="#374151"/>
  <text x="80" y="342" fill="#e05555" font-size="13" font-weight="600">✓ 사용 권장 상황</text>
  <text x="80" y="362" fill="#e8e8e8" font-size="12">• 필수 입력 팝업 (저장 전 확인)</text>
  <text x="80" y="380" fill="#e8e8e8" font-size="12">• 중요 경고·승인 화면</text>
  <text x="80" y="398" fill="#e8e8e8" font-size="12">• 작업 완료 전 이탈 방지 필요 시</text>
  <text x="80" y="418" fill="#888" font-size="12">→ 업무 시스템 대부분 modal 사용</text>

  <!-- Separator -->
  <line x1="440" y1="85" x2="440" y2="430" stroke="#374151" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Modaless column -->
  <text x="660" y="85" fill="#55c555" font-size="16" font-weight="600" text-anchor="middle">Modaless (bModal = false)</text>

  <!-- Main window (modaless side, active) -->
  <rect x="500" y="100" width="320" height="200" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="660" y="175" fill="#e8e8e8" font-size="13" text-anchor="middle">메인 화면 (활성)</text>
  <text x="660" y="197" fill="#55c555" font-size="12" text-anchor="middle">팝업과 동시 조작 가능</text>
  <text x="660" y="218" fill="#888" font-size="11" text-anchor="middle">클릭·입력 모두 정상</text>

  <!-- Popup (modaless, floating) -->
  <rect x="610" y="120" width="200" height="80" rx="6" fill="#1e293b" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="147" fill="#55c555" font-size="13" font-weight="600" text-anchor="middle">Modaless Popup</text>
  <text x="710" y="165" fill="#e8e8e8" font-size="12" text-anchor="middle">부동(floating) 창</text>
  <text x="710" y="183" fill="#888" font-size="11" text-anchor="middle">openPopup(..., false, ...)</text>

  <!-- Modaless characteristics -->
  <rect x="500" y="316" width="320" height="124" rx="8" fill="#111827" stroke="#374151"/>
  <text x="520" y="342" fill="#55c555" font-size="13" font-weight="600">✓ 사용 권장 상황</text>
  <text x="520" y="362" fill="#e8e8e8" font-size="12">• 참조용 도움말·코드 조회 팝업</text>
  <text x="520" y="380" fill="#e8e8e8" font-size="12">• 진행 상태 표시 창</text>
  <text x="520" y="398" fill="#e8e8e8" font-size="12">• 메인과 동시 비교가 필요한 경우</text>
  <text x="520" y="418" fill="#888" font-size="12">→ 실무에서는 많지 않음, 신중 선택</text>
</svg>
