<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">MySQL InnoDB — 격리 수준과 현상</text>

  <!-- Header row -->
  <rect x="60" y="68" width="760" height="32" rx="4" fill="#16213e" stroke="#2a3a5a"/>
  <text x="200" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#888">격리 수준</text>
  <text x="370" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#888">Dirty Read</text>
  <text x="520" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#888">Non-Repeatable</text>
  <text x="680" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#888">Phantom Read</text>

  <!-- READ UNCOMMITTED -->
  <rect x="60" y="100" width="760" height="44" rx="0" fill="#1a0f0f" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="200" y="127" text-anchor="middle" font-size="13" fill="#e8e8e8">READ UNCOMMITTED</text>
  <text x="370" y="127" text-anchor="middle" font-size="13" fill="#e05555">발생</text>
  <text x="520" y="127" text-anchor="middle" font-size="13" fill="#e05555">발생</text>
  <text x="680" y="127" text-anchor="middle" font-size="13" fill="#e05555">발생</text>

  <!-- READ COMMITTED -->
  <rect x="60" y="144" width="760" height="44" rx="0" fill="#111520" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="200" y="171" text-anchor="middle" font-size="13" fill="#e8e8e8">READ COMMITTED</text>
  <text x="370" y="171" text-anchor="middle" font-size="13" fill="#55c555">없음</text>
  <text x="520" y="171" text-anchor="middle" font-size="13" fill="#e05555">발생</text>
  <text x="680" y="171" text-anchor="middle" font-size="13" fill="#e05555">발생</text>

  <!-- REPEATABLE READ (default) -->
  <rect x="60" y="188" width="760" height="56" rx="0" fill="#0f1a10" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="200" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">REPEATABLE READ</text>
  <text x="200" y="232" text-anchor="middle" font-size="11" fill="#7ec8e3">← MySQL 기본값</text>
  <text x="370" y="222" text-anchor="middle" font-size="13" fill="#55c555">없음</text>
  <text x="520" y="222" text-anchor="middle" font-size="13" fill="#55c555">없음</text>
  <text x="680" y="212" text-anchor="middle" font-size="13" fill="#e8a020">이론상 발생</text>
  <text x="680" y="232" text-anchor="middle" font-size="11" fill="#55c555">Gap Lock으로 방지</text>

  <!-- SERIALIZABLE -->
  <rect x="60" y="244" width="760" height="44" rx="0" fill="#111520" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="200" y="271" text-anchor="middle" font-size="13" fill="#e8e8e8">SERIALIZABLE</text>
  <text x="370" y="271" text-anchor="middle" font-size="13" fill="#55c555">없음</text>
  <text x="520" y="271" text-anchor="middle" font-size="13" fill="#55c555">없음</text>
  <text x="680" y="271" text-anchor="middle" font-size="13" fill="#55c555">없음</text>

  <!-- Bottom: RR vs PostgreSQL -->
  <rect x="60" y="310" width="760" height="130" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="440" y="334" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">MySQL RR vs PostgreSQL RC 기본값</text>

  <rect x="80" y="350" width="300" height="74" rx="5" fill="#1e3a2a" stroke="#2a4a2a"/>
  <text x="230" y="372" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">MySQL (RR 기본)</text>
  <text x="100" y="394" font-size="12" fill="#888">Gap Lock으로 팬텀 방지</text>
  <text x="100" y="412" font-size="12" fill="#888">MVCC + Gap Lock 조합</text>
  <text x="100" y="430" font-size="12" fill="#7ec8e3">바이너리 로그 일관성 보장</text>

  <rect x="500" y="350" width="300" height="74" rx="5" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="650" y="372" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">PostgreSQL (RC 기본)</text>
  <text x="520" y="394" font-size="12" fill="#888">SSI(직렬화 스냅샷) 별도</text>
  <text x="520" y="412" font-size="12" fill="#888">RR이 실질적으로 Snapshot</text>
  <text x="520" y="430" font-size="12" fill="#888">Gap Lock 없음</text>
</svg>
