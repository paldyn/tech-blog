<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Password vs Personal Access Token (PAT) 비교</text>

  <!-- Left header: Password -->
  <rect x="60" y="72" width="360" height="52" rx="8" fill="#1f1010" stroke="#e05555" stroke-width="2"/>
  <text x="240" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#e05555">Password (지원 종료)</text>

  <!-- Right header: PAT -->
  <rect x="460" y="72" width="360" height="52" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#55c555">Personal Access Token</text>

  <!-- Row: 스코프 -->
  <rect x="60" y="144" width="360" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">권한 범위</text>
  <text x="240" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">계정 전체 권한</text>
  <text x="240" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">유출 시 계정 완전 탈취 위험</text>

  <rect x="460" y="144" width="360" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">권한 범위</text>
  <text x="640" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">스코프 지정 (repo, read:org 등)</text>
  <text x="640" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">최소 권한 원칙 적용 가능</text>

  <!-- Row: 만료 -->
  <rect x="60" y="220" width="360" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">만료</text>
  <text x="240" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">없음 (계정 비밀번호 사용)</text>
  <text x="240" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">변경 시 모든 곳 재입력</text>

  <rect x="460" y="220" width="360" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">만료</text>
  <text x="640" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">만료일 설정 가능 (30/60/90일)</text>
  <text x="640" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">교체해도 다른 토큰에 영향 없음</text>

  <!-- Row: 취소 -->
  <rect x="60" y="296" width="360" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">즉시 취소</text>
  <text x="240" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">불가 (비밀번호 변경만 가능)</text>
  <text x="240" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">2FA 있어도 앱 재로그인 필요</text>

  <rect x="460" y="296" width="360" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">즉시 취소</text>
  <text x="640" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">토큰별 즉시 revoke</text>
  <text x="640" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">유출 시 해당 토큰만 삭제</text>

  <!-- Notice box -->
  <rect x="60" y="380" width="760" height="100" rx="8" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178">GitHub 2021.08.13부터 패스워드 인증 지원 종료</text>
  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HTTPS 방식 push 시 반드시 PAT(Classic) 또는 Fine-grained PAT 사용</text>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Settings → Developer settings → Personal access tokens</text>
  <text x="440" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Fine-grained PAT: 레포·만료·권한 세밀 제어 (2022년 도입, 현재 권장)</text>
</svg>
