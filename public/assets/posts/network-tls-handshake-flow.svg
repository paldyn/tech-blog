<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TLS 1.3 핸드셰이크 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">1-RTT: ClientHello → ServerHello → {암호화된 확장} → Finished</text>

  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrrBlue" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 13 0 L 0 7 L 13 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- 클라이언트 헤더 -->
  <rect x="60" y="90" width="160" height="44" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">클라이언트</text>

  <!-- 서버 헤더 -->
  <rect x="660" y="90" width="160" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">서버</text>

  <!-- 타임라인 수직선 -->
  <line x1="140" y1="134" x2="140" y2="480" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="740" y1="134" x2="740" y2="480" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- 1. ClientHello → -->
  <line x1="140" y1="162" x2="740" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrrBlue)"/>
  <rect x="200" y="144" width="280" height="26" rx="4" fill="#0f1520"/>
  <text x="340" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">ClientHello</text>
  <text x="340" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">TLS 버전, 랜덤값, 지원 암호 스위트, key_share</text>

  <!-- 2. ServerHello ← -->
  <line x1="740" y1="220" x2="140" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arrrBlue)"/>
  <rect x="400" y="202" width="240" height="26" rx="4" fill="#0a150a"/>
  <text x="520" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">ServerHello</text>
  <text x="520" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">선택된 암호 스위트, 서버 key_share</text>

  <!-- 여기서부터 암호화 구간 표시 -->
  <rect x="55" y="248" width="770" height="24" rx="4" fill="#1a1500" stroke="#e8c44a" stroke-width="1" opacity="0.5"/>
  <text x="440" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c44a">🔒 이후 메시지는 모두 암호화됨 (서버측 핸드셰이크 키 파생 완료)</text>

  <!-- 3. EncryptedExtensions, Certificate, CertificateVerify, Finished ← -->
  <line x1="740" y1="302" x2="140" y2="302" stroke="#55c555" stroke-width="2" marker-end="url(#arrrBlue)"/>
  <rect x="395" y="284" width="250" height="26" rx="4" fill="#0a150a"/>
  <text x="520" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">EncryptedExtensions</text>
  <text x="520" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">서버 측 확장 정보 (ALPN, SNI 등)</text>

  <line x1="740" y1="354" x2="140" y2="354" stroke="#55c555" stroke-width="2" marker-end="url(#arrrBlue)"/>
  <rect x="440" y="336" width="200" height="26" rx="4" fill="#0a150a"/>
  <text x="540" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Certificate + CertificateVerify</text>
  <text x="540" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">서버 인증서 + 서명 (신원 증명)</text>

  <line x1="740" y1="400" x2="140" y2="400" stroke="#55c555" stroke-width="2" marker-end="url(#arrrBlue)"/>
  <rect x="490" y="382" width="150" height="26" rx="4" fill="#0a150a"/>
  <text x="565" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Finished (서버)</text>
  <text x="565" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">핸드셰이크 무결성 검증 MAC</text>

  <!-- 4. Finished → -->
  <line x1="140" y1="448" x2="740" y2="448" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrrBlue)"/>
  <rect x="200" y="430" width="150" height="26" rx="4" fill="#0f1520"/>
  <text x="275" y="447" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Finished (클라이언트)</text>
  <text x="275" y="463" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">핸드셰이크 완료 → 앱 데이터 전송 시작</text>

  <!-- RTT 표시 -->
  <line x1="840" y1="162" x2="840" y2="448" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="858" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" transform="rotate(90,858,300)">1-RTT</text>
</svg>
