<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">LSTM 코드 구현 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">PyTorch nn.LSTM vs 수식 단계별 대응</text>

  <!-- Code block left -->
  <rect x="60" y="90" width="360" height="278" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># PyTorch LSTM 사용</text>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">import</text>
  <text x="130" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> torch.nn </text>
  <text x="228" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">as</text>
  <text x="244" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> nn</text>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">lstm = nn.LSTM(</text>
  <text x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">    input_size=</tspan><tspan fill="#b5cea8">128</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">    hidden_size=</tspan><tspan fill="#b5cea8">256</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    num_layers=</text>
  <text x="190" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="202" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">    batch_first=</tspan><tspan fill="#b5cea8">True</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">    dropout=</tspan><tspan fill="#b5cea8">0.2</tspan></text>
  
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">out,(h_n,c_n) = lstm(x)</text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># out: (B,T,256)</text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># h_n: 은닉, c_n: 셀 상태</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># (num_layers, B, 256)</text>

  <!-- Step-by-step right -->
  <rect x="460" y="90" width="360" height="278" rx="8" fill="#111" stroke="#333"/>
  <text x="480" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">단계별 수식</text>
  <text x="480" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">① Forget:  f_t = σ(W_f·[h,x] + b_f)</text>
  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">② Input:   i_t = σ(W_i·[h,x] + b_i)</text>
  <text x="480" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">③ Cand:    g_t = tanh(W_g·[h,x]+b_g)</text>
  <text x="480" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">④ Cell:    C_t = f_t⊙C_{t-1}+i_t⊙g_t</text>
  <text x="480" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">⑤ Output:  o_t = σ(W_o·[h,x] + b_o)</text>
  <text x="480" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">⑥ Hidden:  h_t = o_t ⊙ tanh(C_t)</text>
  <text x="480" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">σ: sigmoid ∈(0,1)</text>
  <text x="480" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">tanh ∈(-1,1)</text>
  <text x="480" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">⊙: 원소별 곱 (Hadamard)</text>

  <!-- Summary -->
  <rect x="60" y="390" width="760" height="50" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="411" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">LSTM 파라미터 수 = 4 × (input_size + hidden_size + 1) × hidden_size</text>
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">hidden=256, input=128 → 4 × (128+256+1) × 256 ≈ 393K 파라미터</text>
</svg>
