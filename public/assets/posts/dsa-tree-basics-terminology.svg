<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a4a6e"/>
    </marker>
  </defs>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">트리 용어 (Tree Terminology)</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">루트·부모·자식·형제·리프·깊이·높이의 정의</text>

    <!-- Tree nodes -->
    <!-- Level 0: root (node A) -->
    <circle cx="440" cy="120" r="26" fill="#1a2544" stroke="#7ec8e3" stroke-width="2"/>
    <text x="440" y="125" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">A</text>

    <!-- Level 1: B, C -->
    <circle cx="240" cy="220" r="26" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="240" y="225" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>
    <circle cx="640" cy="220" r="26" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="640" y="225" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">C</text>

    <!-- Level 2: D, E, F -->
    <circle cx="140" cy="320" r="26" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="140" y="325" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">D</text>
    <circle cx="340" cy="320" r="26" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="340" y="325" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">E</text>
    <circle cx="640" cy="320" r="26" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="640" y="325" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">F</text>

    <!-- Level 3: G (leaf) -->
    <circle cx="140" cy="420" r="26" fill="#1a3a1e" stroke="#55c555" stroke-width="1.5"/>
    <text x="140" y="425" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">G</text>
    <!-- E and F are leaves too -->

    <!-- Edges -->
    <!-- A → B -->
    <line x1="418" y1="140" x2="262" y2="200" stroke="#3a4a6e" stroke-width="2"/>
    <!-- A → C -->
    <line x1="462" y1="140" x2="618" y2="200" stroke="#3a4a6e" stroke-width="2"/>
    <!-- B → D -->
    <line x1="218" y1="240" x2="162" y2="300" stroke="#3a4a6e" stroke-width="2"/>
    <!-- B → E -->
    <line x1="262" y1="240" x2="318" y2="300" stroke="#3a4a6e" stroke-width="2"/>
    <!-- C → F -->
    <line x1="640" y1="246" x2="640" y2="294" stroke="#3a4a6e" stroke-width="2"/>
    <!-- D → G -->
    <line x1="140" y1="346" x2="140" y2="394" stroke="#3a4a6e" stroke-width="2"/>

    <!-- Labels (right side annotations) -->
    <!-- Root -->
    <line x1="468" y1="110" x2="540" y2="100" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="545" y="104" font-size="13" fill="#7ec8e3" font-weight="600">루트 (Root)</text>
    <text x="545" y="118" font-size="11" fill="#888">부모 없는 유일한 노드</text>

    <!-- Leaf -->
    <line x1="166" y1="432" x2="220" y2="450" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="225" y="446" font-size="13" fill="#55c555" font-weight="600">리프 (Leaf)</text>
    <text x="225" y="460" font-size="11" fill="#888">자식 없는 노드 (G, E, F)</text>

    <!-- Left side annotations -->
    <!-- Depth -->
    <!-- Level indicator lines -->
    <line x1="50" y1="120" x2="70" y2="120" stroke="#888" stroke-width="1"/>
    <text x="40" y="124" font-size="11" fill="#888" text-anchor="middle">깊이 0</text>
    <line x1="50" y1="220" x2="70" y2="220" stroke="#888" stroke-width="1"/>
    <text x="40" y="224" font-size="11" fill="#888" text-anchor="middle">깊이 1</text>
    <line x1="50" y1="320" x2="70" y2="320" stroke="#888" stroke-width="1"/>
    <text x="40" y="324" font-size="11" fill="#888" text-anchor="middle">깊이 2</text>
    <line x1="50" y1="420" x2="70" y2="420" stroke="#888" stroke-width="1"/>
    <text x="40" y="424" font-size="11" fill="#888" text-anchor="middle">깊이 3</text>

    <!-- Parent-Child annotation -->
    <text x="545" y="160" font-size="13" fill="#ce9178" font-weight="600">부모-자식 (Parent-Child)</text>
    <text x="545" y="176" font-size="11" fill="#888">A는 B, C의 부모</text>
    <text x="545" y="190" font-size="11" fill="#888">B, C는 A의 자식</text>

    <!-- Sibling -->
    <text x="545" y="230" font-size="13" fill="#7777cc" font-weight="600">형제 (Sibling)</text>
    <text x="545" y="246" font-size="11" fill="#888">B와 C: 같은 부모 A를 공유</text>
    <text x="545" y="260" font-size="11" fill="#888">D와 E: 같은 부모 B를 공유</text>

    <!-- Height annotation -->
    <text x="545" y="300" font-size="13" fill="#e8e8e8" font-weight="600">높이 (Height)</text>
    <text x="545" y="316" font-size="11" fill="#888">루트에서 최대 깊이까지</text>
    <text x="545" y="330" font-size="11" fill="#55c555">이 트리의 높이 = 3</text>

    <!-- Subtree annotation -->
    <text x="545" y="370" font-size="13" fill="#e8e8e8" font-weight="600">서브트리 (Subtree)</text>
    <text x="545" y="386" font-size="11" fill="#888">B를 루트로 하는 서브트리</text>
    <text x="545" y="400" font-size="11" fill="#888">= {B, D, E, G}</text>

    <!-- Bottom formula -->
    <rect x="60" y="462" width="760" height="42" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="440" y="488" font-size="13" fill="#888" text-anchor="middle">n개 노드의 트리: 간선 수 = n-1  |  트리는 사이클 없는 연결 그래프 (Connected Acyclic Graph)</text>
  </g>
</svg>
