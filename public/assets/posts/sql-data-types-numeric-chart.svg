<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">숫자 데이터 타입 비교</text>

  <!-- Header -->
  <rect x="60" y="65" width="760" height="34" rx="4" fill="#131320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타입</text>
  <text x="290" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">범위 / 크기</text>
  <text x="490" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">특징</text>
  <text x="710" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">적합한 용도</text>

  <!-- Rows -->
  <rect x="60" y="99" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="140" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">SMALLINT</text>
  <text x="290" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">-32768 ~ 32767 (2B)</text>
  <text x="490" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">정수, 작은 범위</text>
  <text x="710" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상태코드, 레벨</text>

  <rect x="60" y="133" width="760" height="34" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="140" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">INTEGER / INT</text>
  <text x="290" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">-2.1B ~ 2.1B (4B)</text>
  <text x="490" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">표준 정수</text>
  <text x="710" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">일반 카운터, FK</text>

  <rect x="60" y="167" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="140" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">BIGINT</text>
  <text x="290" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">-9.2E18 ~ 9.2E18 (8B)</text>
  <text x="490" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">큰 범위 정수</text>
  <text x="710" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PK(대규모), 타임스탬프(ms)</text>

  <rect x="60" y="201" width="760" height="34" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="140" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">NUMERIC(p,s)</text>
  <text x="290" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">p자리, 소수점 s자리</text>
  <text x="490" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">정확한 소수 (고정소수점)</text>
  <text x="710" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">금액, 비율 — 오차 불허</text>

  <rect x="60" y="235" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="140" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178" text-anchor="middle" font-weight="600">REAL / FLOAT4</text>
  <text x="290" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">6자리 정밀도 (4B)</text>
  <text x="490" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">부동소수점 (근삿값)</text>
  <text x="710" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ML 피처, 좌표 (오차 허용)</text>

  <rect x="60" y="269" width="760" height="34" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="140" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178" text-anchor="middle" font-weight="600">DOUBLE / FLOAT8</text>
  <text x="290" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">15자리 정밀도 (8B)</text>
  <text x="490" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">부동소수점 (근삿값)</text>
  <text x="710" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">과학 계산, 통계</text>

  <!-- Warning -->
  <rect x="60" y="318" width="760" height="46" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1"/>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">⚠ 금액에 FLOAT/DOUBLE 절대 금지</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">0.1 + 0.2 = 0.30000000000000004 (부동소수점 오차) → 금액/비율은 반드시 NUMERIC(p,s) 사용</text>

  <!-- SERIAL note -->
  <rect x="60" y="376" width="760" height="34" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자동증가 PK: PostgreSQL BIGSERIAL / GENERATED ALWAYS AS IDENTITY | MySQL AUTO_INCREMENT | SQL Server IDENTITY | Oracle SEQUENCE</text>
</svg>
