<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="elArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">이벤트 루프의 한 사이클</text>

  <!-- 4단계 순환 박스 -->
  <rect x="60" y="100" width="340" height="80" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="230" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">1. 실행 준비된 콜백 실행</text>
  <text x="230" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">ready 큐의 코루틴을 깨워 await 지점까지 실행</text>

  <rect x="480" y="100" width="340" height="80" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="650" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">2. I/O 폴링 (selector)</text>
  <text x="650" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">소켓 등이 준비됐는지 OS에 확인</text>

  <rect x="480" y="240" width="340" height="80" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="650" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">3. 만료된 타이머 처리</text>
  <text x="650" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">sleep, call_later 시간이 된 콜백 등록</text>

  <rect x="60" y="240" width="340" height="80" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="230" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">4. 완료된 코루틴을 ready로</text>
  <text x="230" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">다시 1번으로 순환 (loop)</text>

  <!-- 순환 화살표 -->
  <path d="M 400 140 L 472 140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#elArr)"/>
  <path d="M 650 180 L 650 232" stroke="#7ec8e3" stroke-width="2" marker-end="url(#elArr)"/>
  <path d="M 480 280 L 408 280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#elArr)"/>
  <path d="M 230 240 L 230 188" stroke="#7ec8e3" stroke-width="2" marker-end="url(#elArr)"/>

  <text x="60" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">이 사이클이 프로그램이 끝날 때까지 반복된다 — 단일 스레드에서.</text>
</svg>
