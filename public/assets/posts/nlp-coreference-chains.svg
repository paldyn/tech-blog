<svg width="880" height="420" viewBox="0 0 880 420"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">지시 해소(Coreference Resolution) 시각화</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">동일 개체를 가리키는 표현들을 클러스터로 연결</text>

  <!-- Sentence visualization -->
  <rect x="40" y="88" width="800" height="72" rx="8" fill="#0f0f18" stroke="#333"/>
  <text x="440" y="110" text-anchor="middle" fill="#888" font-size="12">예문</text>

  <!-- Token boxes -->
  <rect x="60" y="120" width="68" height="28" rx="4" fill="#2a1a5e" stroke="#7777cc"/>
  <text x="94" y="139" text-anchor="middle" fill="#7777cc" font-size="13">김철수</text>

  <rect x="136" y="120" width="36" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="154" y="139" text-anchor="middle" fill="#888" font-size="13">는</text>

  <rect x="180" y="120" width="36" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="198" y="139" text-anchor="middle" fill="#888" font-size="13">회사</text>

  <rect x="224" y="120" width="28" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="238" y="139" text-anchor="middle" fill="#888" font-size="13">에</text>

  <rect x="260" y="120" width="28" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="274" y="139" text-anchor="middle" fill="#888" font-size="13">서</text>

  <rect x="296" y="120" width="52" height="28" rx="4" fill="#2a1a5e" stroke="#7777cc"/>
  <text x="322" y="139" text-anchor="middle" fill="#7777cc" font-size="13">그의</text>

  <rect x="356" y="120" width="52" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="382" y="139" text-anchor="middle" fill="#888" font-size="13">동료</text>

  <rect x="416" y="120" width="28" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="430" y="139" text-anchor="middle" fill="#888" font-size="13">를</text>

  <rect x="452" y="120" width="52" height="28" rx="4" fill="#0a2a0a" stroke="#55c555"/>
  <text x="478" y="139" text-anchor="middle" fill="#55c555" font-size="13">만났다</text>

  <rect x="512" y="120" width="28" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="526" y="139" text-anchor="middle" fill="#888" font-size="13">.</text>

  <rect x="548" y="120" width="28" height="28" rx="4" fill="#2a1a5e" stroke="#7777cc"/>
  <text x="562" y="139" text-anchor="middle" fill="#7777cc" font-size="13">그</text>

  <rect x="584" y="120" width="28" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="598" y="139" text-anchor="middle" fill="#888" font-size="13">는</text>

  <rect x="620" y="120" width="52" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="646" y="139" text-anchor="middle" fill="#888" font-size="13">매우</text>

  <rect x="680" y="120" width="52" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="706" y="139" text-anchor="middle" fill="#888" font-size="13">기뻤다</text>

  <rect x="740" y="120" width="20" height="28" rx="4" fill="#0a0a14" stroke="#333"/>
  <text x="750" y="139" text-anchor="middle" fill="#888" font-size="13">.</text>

  <!-- Coreference arcs -->
  <!-- Arc from 김철수 to 그의 -->
  <path d="M 94 120 C 94 96 322 96 322 120" stroke="#7777cc" stroke-width="2" fill="none"/>
  <!-- Arc from 그의 to 그 -->
  <path d="M 322 120 C 322 88 562 88 562 120" stroke="#7777cc" stroke-width="2" fill="none"/>
  <!-- Label above arcs -->
  <text x="208" y="100" text-anchor="middle" fill="#7777cc" font-size="11">동일 지시 (김철수)</text>
  <text x="442" y="84" text-anchor="middle" fill="#7777cc" font-size="11">← 동일 개체 체인 →</text>

  <!-- Coreference chains section -->
  <text x="440" y="198" text-anchor="middle" fill="#e8e8e8" font-size="16" font-weight="600">지시 체인 (Mention Clusters)</text>

  <!-- Chain 1: 김철수 -->
  <rect x="40" y="214" width="380" height="80" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="236" text-anchor="middle" fill="#7777cc" font-size="14" font-weight="600">클러스터 1: 김철수</text>
  <text x="60" y="258" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">{"김철수", "그의", "그"}</text>
  <text x="60" y="278" fill="#888" font-size="12">→ 모두 동일 인물을 가리키는 표현(멘션)</text>

  <!-- Chain 2: 동료 -->
  <rect x="460" y="214" width="380" height="80" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="236" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">클러스터 2: 동료</text>
  <text x="480" y="258" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">{"그의 동료"}</text>
  <text x="480" y="278" fill="#888" font-size="12">→ 단일 멘션 (체인 없음)</text>

  <!-- Algorithm overview -->
  <text x="440" y="322" text-anchor="middle" fill="#e8e8e8" font-size="16" font-weight="600">주요 알고리즘 비교</text>

  <rect x="40" y="338" width="200" height="62" rx="6" fill="#0f0f18" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="358" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600">규칙 기반</text>
  <text x="140" y="374" text-anchor="middle" fill="#888" font-size="11">Hobbs 알고리즘</text>
  <text x="140" y="390" text-anchor="middle" fill="#888" font-size="11">Stanford CoreNLP</text>

  <rect x="254" y="338" width="200" height="62" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="354" y="358" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">신경망 기반</text>
  <text x="354" y="374" text-anchor="middle" fill="#888" font-size="11">SpanBERT Coref</text>
  <text x="354" y="390" text-anchor="middle" fill="#888" font-size="11">OntoNotes F1 ~82</text>

  <rect x="468" y="338" width="200" height="62" rx="6" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="568" y="358" text-anchor="middle" fill="#7ec8e3" font-size="12" font-weight="600">LLM 기반</text>
  <text x="568" y="374" text-anchor="middle" fill="#888" font-size="11">GPT-4o 프롬프팅</text>
  <text x="568" y="390" text-anchor="middle" fill="#888" font-size="11">제로샷 가능</text>

  <rect x="682" y="338" width="158" height="62" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="761" y="358" text-anchor="middle" fill="#e05555" font-size="12" font-weight="600">한국어 특화</text>
  <text x="761" y="374" text-anchor="middle" fill="#888" font-size="11">KoCoRef (ETRI)</text>
  <text x="761" y="390" text-anchor="middle" fill="#888" font-size="11">조사 처리 특화</text>
</svg>
