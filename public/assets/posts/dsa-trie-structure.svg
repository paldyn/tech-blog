<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">트라이 (Trie) — "cat", "car", "card", "care", "dog"</text>

  <!-- Root -->
  <circle cx="440" cy="90" r="22" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888" text-anchor="middle">root</text>

  <!-- Level 1: c, d -->
  <circle cx="240" cy="165" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="240" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">c</text>
  <circle cx="640" cy="165" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="640" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">d</text>

  <!-- Edge labels -->
  <text x="328" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">c</text>
  <text x="552" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">d</text>

  <line x1="422" y1="106" x2="258" y2="147" stroke="#555" stroke-width="1.5"/>
  <line x1="458" y1="106" x2="622" y2="147" stroke="#555" stroke-width="1.5"/>

  <!-- Level 2 under c: a -->
  <circle cx="240" cy="244" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="240" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">a</text>
  <text x="226" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">a</text>
  <line x1="240" y1="187" x2="240" y2="222" stroke="#555" stroke-width="1.5"/>

  <!-- Level 2 under d: o -->
  <circle cx="640" cy="244" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="640" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">o</text>
  <text x="654" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">o</text>
  <line x1="640" y1="187" x2="640" y2="222" stroke="#555" stroke-width="1.5"/>

  <!-- Level 3 under ca: t, r -->
  <circle cx="165" cy="323" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="165" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">t</text>
  <text x="186" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">t</text>
  <line x1="225" y1="260" x2="182" y2="305" stroke="#555" stroke-width="1.5"/>

  <circle cx="310" cy="323" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="310" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">r</text>
  <text x="292" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">r</text>
  <line x1="255" y1="260" x2="296" y2="305" stroke="#555" stroke-width="1.5"/>

  <!-- Level 3 under do: g (end word) -->
  <circle cx="640" cy="323" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">g</text>
  <text x="654" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">g</text>
  <line x1="640" y1="266" x2="640" y2="301" stroke="#555" stroke-width="1.5"/>
  <text x="640" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">"dog" ✓</text>

  <!-- cat end word -->
  <circle cx="165" cy="323" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="165" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">"cat" ✓</text>

  <!-- Level 4 under car: d, e -->
  <circle cx="260" cy="400" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="260" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">d</text>
  <text x="281" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">d</text>
  <line x1="297" y1="340" x2="270" y2="382" stroke="#555" stroke-width="1.5"/>
  <text x="260" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">"card" ✓</text>

  <circle cx="370" cy="400" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="370" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">e</text>
  <text x="349" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">e</text>
  <line x1="323" y1="340" x2="356" y2="382" stroke="#555" stroke-width="1.5"/>
  <text x="370" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">"care" ✓</text>

  <!-- car node also end word? NO. Just r -->
  <!-- "car" — car is not in the set, just car* prefix -->

  <!-- Legend -->
  <rect x="470" y="300" width="360" height="120" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">트라이 특성</text>
  <circle cx="495" cy="348" r="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="510" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">is_end=True (단어 끝)</text>
  <circle cx="495" cy="373" r="8" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="510" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">is_end=False (접두사)</text>
  <text x="650" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">검색: O(m) — m은 단어 길이</text>
  <text x="650" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">해시맵보다 접두사 검색 유리</text>
</svg>
