<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GitHub Flow vs Gitflow</text>

  <!-- Headers -->
  <rect x="60" y="64" width="360" height="40" rx="6" fill="#1a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">GitHub Flow</text>

  <rect x="460" y="64" width="360" height="40" rx="6" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">Gitflow</text>

  <!-- comparison rows -->
  <!-- row 1 -->
  <rect x="60" y="116" width="360" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="240" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">브랜치 2종 (main + topic)</text>
  <rect x="460" y="116" width="360" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">브랜치 5종 (main/develop/feature/release/hotfix)</text>

  <!-- row 2 -->
  <rect x="60" y="162" width="360" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="240" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">main 머지 = 즉시 배포</text>
  <rect x="460" y="162" width="360" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">release 브랜치 거쳐 main에 배포</text>

  <!-- row 3 -->
  <rect x="60" y="208" width="360" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="240" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">단일 릴리즈 버전 유지</text>
  <rect x="460" y="208" width="360" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">다중 버전 동시 유지 가능</text>

  <!-- row 4 -->
  <rect x="60" y="254" width="360" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="240" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">웹 서비스, SaaS, CI/CD 중심</text>
  <rect x="460" y="254" width="360" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">모바일 앱, 패키지 라이브러리</text>

  <!-- row 5 -->
  <rect x="60" y="300" width="360" height="40" rx="4" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">단순, 빠른 배포 주기</text>
  <rect x="460" y="300" width="360" height="40" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="640" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">복잡, 명확한 릴리즈 주기</text>

  <!-- note -->
  <rect x="60" y="354" width="760" height="30" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">GitHub 공식 권장 → GitHub Flow / 지속적 배포 불가능한 경우 → Gitflow</text>
</svg>
