<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">날짜/시간 타입 비교</text>

  <!-- Header -->
  <rect x="60" y="68" width="760" height="32" fill="#162030"/>
  <text x="130" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타입</text>
  <text x="290" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">표현 범위</text>
  <text x="490" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">시간대 포함</text>
  <text x="680" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">사용 케이스</text>

  <line x1="200" y1="68" x2="200" y2="340" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="380" y1="68" x2="380" y2="340" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="600" y1="68" x2="600" y2="340" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- DATE -->
  <rect x="60" y="100" width="760" height="36" fill="#0e1520"/>
  <text x="130" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">DATE</text>
  <text x="290" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">0001-01-01 ~</text>
  <text x="290" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">9999-12-31</text>
  <text x="490" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">없음</text>
  <text x="680" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">생년월일, 계약일</text>
  <text x="680" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">시간 불필요한 날짜</text>

  <!-- TIME -->
  <rect x="60" y="136" width="760" height="36" fill="#0a1018"/>
  <text x="130" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">TIME</text>
  <text x="290" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">00:00:00 ~</text>
  <text x="290" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">23:59:59.999999</text>
  <text x="490" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">없음</text>
  <text x="680" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">영업 시간, 알람 시간</text>
  <text x="680" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">날짜 불필요한 시간</text>

  <!-- TIMESTAMP -->
  <rect x="60" y="172" width="760" height="36" fill="#0e1520"/>
  <text x="130" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">TIMESTAMP</text>
  <text x="290" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">1970-01-01 ~</text>
  <text x="290" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">2038-01-19 (MySQL)</text>
  <text x="490" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020" text-anchor="middle">UTC 저장</text>
  <text x="680" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">생성일시, 수정일시</text>
  <text x="680" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">created_at, updated_at</text>

  <!-- TIMESTAMPTZ -->
  <rect x="60" y="208" width="760" height="36" fill="#0a1018"/>
  <text x="130" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">TIMESTAMPTZ</text>
  <text x="290" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">4713 BC ~</text>
  <text x="290" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">294276 AD (PG)</text>
  <text x="490" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">UTC 저장+TZ정보</text>
  <text x="680" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">다국가 서비스</text>
  <text x="680" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PG 권장 타입</text>

  <!-- DATETIME -->
  <rect x="60" y="244" width="760" height="36" fill="#0e1520"/>
  <text x="130" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">DATETIME</text>
  <text x="290" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">1000-01-01 ~</text>
  <text x="290" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">9999-12-31 (MySQL)</text>
  <text x="490" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">없음 (로컬)</text>
  <text x="680" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MySQL 전용, 로컬 시간</text>
  <text x="680" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Oracle: DATE 포함(시분초)</text>

  <!-- INTERVAL -->
  <rect x="60" y="280" width="760" height="36" fill="#0a1018"/>
  <text x="130" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">INTERVAL</text>
  <text x="290" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">기간 값</text>
  <text x="290" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">(예: 3 months)</text>
  <text x="490" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">해당 없음</text>
  <text x="680" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">날짜 계산, 만료일</text>
  <text x="680" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PG/Oracle 지원</text>

  <line x1="60" y1="316" x2="820" y2="316" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Warning box -->
  <rect x="60" y="330" width="760" height="114" fill="#1a1010" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">MySQL TIMESTAMP 2038년 문제</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">MySQL TIMESTAMP는 내부적으로 32비트 Unix 타임스탬프 → 2038-01-19 03:14:07 UTC 이후 오버플로우</text>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">장기간 데이터(계약 만료, 예약)는 DATETIME 또는 서버 업그레이드 계획 필요</text>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">MySQL 8.0.28+: TIMESTAMP 범위 확장됨 (하지만 DATETIME이 더 안전)</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">PostgreSQL TIMESTAMP는 8바이트 → 294276 AD까지 안전</text>
</svg>