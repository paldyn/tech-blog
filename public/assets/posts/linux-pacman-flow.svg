<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pacman — Arch Linux 패키지 관리 흐름</text>

  <!-- Official repos -->
  <rect x="60" y="72" width="200" height="100" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">공식 저장소</text>
  <text x="160" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">core, extra</text>
  <text x="160" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">community, multilib</text>
  <text x="160" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">/etc/pacman.conf</text>

  <!-- AUR -->
  <rect x="60" y="200" width="200" height="80" rx="8" fill="#1a1510" stroke="#e0a855" stroke-width="2"/>
  <text x="160" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a855" text-anchor="middle">AUR</text>
  <text x="160" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Arch User Repository</text>
  <text x="160" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a855" text-anchor="middle">커뮤니티 패키지</text>

  <!-- pacman tool -->
  <rect x="340" y="120" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc" text-anchor="middle">pacman</text>
  <text x="440" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">공식 저장소 전용</text>

  <!-- AUR helper -->
  <rect x="340" y="224" width="200" height="56" rx="8" fill="#1a1510" stroke="#e0a855" stroke-width="2"/>
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a855" text-anchor="middle">yay / paru</text>
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">AUR 헬퍼 (pacman 래퍼)</text>

  <!-- Arrows -->
  <line x1="260" y1="122" x2="338" y2="155" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="336,150 346,157 334,162" fill="#7ec8e3"/>

  <line x1="260" y1="240" x2="338" y2="250" stroke="#e0a855" stroke-width="1.5"/>
  <polygon points="336,245 348,250 336,255" fill="#e0a855"/>

  <!-- pacman to filesystem -->
  <line x1="540" y1="160" x2="620" y2="160" stroke="#55c555" stroke-width="2"/>
  <polygon points="618,155 630,160 618,165" fill="#55c555"/>

  <rect x="630" y="136" width="190" height="56" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="725" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">파일시스템 설치</text>
  <text x="725" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/var/lib/pacman/local/</text>

  <!-- Command table -->
  <rect x="60" y="312" width="760" height="148" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">핵심 명령어 (-S, -R, -Q, -U)</text>

  <!-- col1 -->
  <text x="80" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">pacman -S nginx</text>
  <text x="80" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">pacman -Syu</text>
  <text x="80" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">pacman -Ss nginx</text>
  <text x="80" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">pacman -Si nginx</text>
  <text x="80" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">pacman -R nginx</text>

  <!-- col1 descriptions -->
  <text x="250" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">설치</text>
  <text x="250" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">동기화+전체 업그레이드</text>
  <text x="250" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">저장소 검색</text>
  <text x="250" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">패키지 정보</text>
  <text x="250" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제거</text>

  <!-- col2 -->
  <text x="460" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">pacman -Rs nginx</text>
  <text x="460" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">pacman -Ql nginx</text>
  <text x="460" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">pacman -Qo /usr/bin/curl</text>
  <text x="460" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">pacman -Qdt</text>
  <text x="460" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a855">pacman -U pkg.tar.zst</text>

  <!-- col2 descriptions -->
  <text x="650" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">의존성 포함 제거</text>
  <text x="650" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파일 목록</text>
  <text x="650" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파일 소속 패키지</text>
  <text x="650" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">고아 패키지 찾기</text>
  <text x="650" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">로컬 패키지 설치</text>
</svg>
