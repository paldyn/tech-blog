<svg width="880" viewBox="0 0 880 580" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr-t" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#888" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="880" height="580" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">허프만 트리 구성 과정</text>

  <!-- Left: Build steps -->
  <text x="60" y="82" font-size="16" font-weight="600" fill="#e8e8e8">병합 단계 (최소 힙 기반)</text>

  <!-- Initial frequencies -->
  <text x="60" y="108" font-size="13" fill="#888">초기: C(1) B(2) D(3) E(4) A(5)</text>

  <!-- Step 1 -->
  <text x="60" y="135" font-size="13" fill="#7ec8e3">Step 1: C(1) + B(2) → 노드(3)</text>
  <rect x="60" y="148" width="50" height="32" rx="6" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="85" y="169" text-anchor="middle" font-size="13" fill="#7777cc">C:1</text>
  <text x="120" y="169" font-size="13" fill="#555">+</text>
  <rect x="132" y="148" width="50" height="32" rx="6" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="157" y="169" text-anchor="middle" font-size="13" fill="#7777cc">B:2</text>
  <text x="193" y="169" font-size="13" fill="#7ec8e3">→</text>
  <rect x="210" y="148" width="60" height="32" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="169" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">CB:3</text>

  <!-- Step 2 -->
  <text x="60" y="208" font-size="13" fill="#7ec8e3">Step 2: CB(3) + D(3) → 노드(6)</text>
  <rect x="60" y="220" width="60" height="32" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="241" text-anchor="middle" font-size="13" fill="#7ec8e3">CB:3</text>
  <text x="130" y="241" font-size="13" fill="#555">+</text>
  <rect x="144" y="220" width="50" height="32" rx="6" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="169" y="241" text-anchor="middle" font-size="13" fill="#7777cc">D:3</text>
  <text x="204" y="241" font-size="13" fill="#7ec8e3">→</text>
  <rect x="221" y="220" width="65" height="32" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="253" y="241" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">CBD:6</text>

  <!-- Step 3 -->
  <text x="60" y="280" font-size="13" fill="#7ec8e3">Step 3: E(4) + A(5) → 노드(9)</text>
  <rect x="60" y="292" width="50" height="32" rx="6" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="85" y="313" text-anchor="middle" font-size="13" fill="#7777cc">E:4</text>
  <text x="120" y="313" font-size="13" fill="#555">+</text>
  <rect x="134" y="292" width="50" height="32" rx="6" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="159" y="313" text-anchor="middle" font-size="13" fill="#7777cc">A:5</text>
  <text x="195" y="313" font-size="13" fill="#7ec8e3">→</text>
  <rect x="212" y="292" width="65" height="32" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="244" y="313" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">EA:9</text>

  <!-- Step 4 -->
  <text x="60" y="352" font-size="13" fill="#55c555">Step 4: CBD(6) + EA(9) → 루트(15)</text>
  <rect x="60" y="364" width="65" height="32" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="92" y="385" text-anchor="middle" font-size="13" fill="#7ec8e3">CBD:6</text>
  <text x="135" y="385" font-size="13" fill="#555">+</text>
  <rect x="149" y="364" width="60" height="32" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="179" y="385" text-anchor="middle" font-size="13" fill="#7ec8e3">EA:9</text>
  <text x="219" y="385" font-size="13" fill="#55c555">→</text>
  <rect x="236" y="364" width="75" height="32" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="2"/>
  <text x="273" y="385" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">Root:15</text>

  <!-- Divider -->
  <line x1="360" y1="68" x2="360" y2="540" stroke="#222" stroke-width="1"/>

  <!-- Right: Final Huffman tree -->
  <text x="385" y="82" font-size="16" font-weight="600" fill="#e8e8e8">최종 허프만 트리</text>

  <!-- Root -->
  <circle cx="620" cy="115" r="26" fill="#0d2b0d" stroke="#55c555" stroke-width="2"/>
  <text x="620" y="120" text-anchor="middle" font-size="12" fill="#55c555" font-weight="600">15</text>

  <!-- Level 1: CBD(6) left, EA(9) right -->
  <line x1="598" y1="134" x2="520" y2="178" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="548" y="162" text-anchor="middle" font-size="12" fill="#7ec8e3" font-weight="600">0</text>
  <line x1="642" y1="134" x2="720" y2="178" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="692" y="162" text-anchor="middle" font-size="12" fill="#7ec8e3" font-weight="600">1</text>

  <circle cx="505" cy="193" r="24" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="505" y="198" text-anchor="middle" font-size="12" fill="#7ec8e3">6</text>

  <circle cx="735" cy="193" r="24" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="735" y="198" text-anchor="middle" font-size="12" fill="#7ec8e3">9</text>

  <!-- CBD subtree: CB(3) left, D(3) right -->
  <line x1="483" y1="210" x2="440" y2="258" stroke="#888" stroke-width="1.5"/>
  <text x="451" y="242" text-anchor="middle" font-size="12" fill="#888">0</text>
  <line x1="527" y1="210" x2="565" y2="258" stroke="#888" stroke-width="1.5"/>
  <text x="557" y="242" text-anchor="middle" font-size="12" fill="#888">1</text>

  <circle cx="425" cy="273" r="24" fill="#0f1a2e" stroke="#888" stroke-width="1.5"/>
  <text x="425" y="278" text-anchor="middle" font-size="12" fill="#888">3</text>

  <!-- D leaf -->
  <circle cx="580" cy="273" r="24" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="278" text-anchor="middle" font-size="12" fill="#7777cc" font-weight="600">D</text>
  <text x="580" y="293" text-anchor="middle" font-size="10" fill="#888">3</text>

  <!-- CB → C left, B right -->
  <line x1="403" y1="290" x2="385" y2="330" stroke="#888" stroke-width="1.5"/>
  <text x="385" y="318" text-anchor="middle" font-size="12" fill="#888">0</text>
  <line x1="447" y1="290" x2="460" y2="330" stroke="#888" stroke-width="1.5"/>
  <text x="460" y="318" text-anchor="middle" font-size="12" fill="#888">1</text>

  <!-- C leaf -->
  <circle cx="378" cy="345" r="24" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="378" y="350" text-anchor="middle" font-size="12" fill="#7777cc" font-weight="600">C</text>
  <text x="378" y="365" text-anchor="middle" font-size="10" fill="#888">1</text>

  <!-- B leaf -->
  <circle cx="466" cy="345" r="24" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="466" y="350" text-anchor="middle" font-size="12" fill="#7777cc" font-weight="600">B</text>
  <text x="466" y="365" text-anchor="middle" font-size="10" fill="#888">2</text>

  <!-- EA subtree: E left, A right -->
  <line x1="713" y1="210" x2="675" y2="258" stroke="#888" stroke-width="1.5"/>
  <text x="684" y="242" text-anchor="middle" font-size="12" fill="#888">0</text>
  <line x1="757" y1="210" x2="795" y2="258" stroke="#888" stroke-width="1.5"/>
  <text x="786" y="242" text-anchor="middle" font-size="12" fill="#888">1</text>

  <!-- E leaf -->
  <circle cx="660" cy="273" r="24" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="278" text-anchor="middle" font-size="12" fill="#7777cc" font-weight="600">E</text>
  <text x="660" y="293" text-anchor="middle" font-size="10" fill="#888">4</text>

  <!-- A leaf -->
  <circle cx="808" cy="273" r="24" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="808" y="278" text-anchor="middle" font-size="12" fill="#7777cc" font-weight="600">A</text>
  <text x="808" y="293" text-anchor="middle" font-size="10" fill="#888">5</text>

  <!-- Codes summary -->
  <rect x="385" y="400" width="450" height="120" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="424" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">허프만 코드 (경로 0/1)</text>
  <text x="410" y="448" font-size="13" fill="#e8e8e8">C(1): 000</text>
  <text x="510" y="448" font-size="13" fill="#e8e8e8">B(2): 001</text>
  <text x="610" y="448" font-size="13" fill="#e8e8e8">D(3): 01</text>
  <text x="410" y="470" font-size="13" fill="#e8e8e8">E(4): 10</text>
  <text x="510" y="470" font-size="13" fill="#e8e8e8">A(5): 11</text>
  <text x="410" y="496" font-size="13" fill="#888">평균 코드 길이:</text>
  <text x="533" y="496" font-size="13" fill="#7ec8e3">(1×3+2×3+3×2+4×2+5×2)/15 = 2.33 bits</text>
  <text x="410" y="514" font-size="13" fill="#888">고정 3 bits보다 압축률 향상</text>
</svg>
