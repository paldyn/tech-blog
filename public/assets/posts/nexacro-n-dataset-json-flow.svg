<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Dataset ↔ JSON 변환 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">JSON.parse → 수동 매핑 / saveJSON · loadJSON</text>

  <!-- Left: JSON Input -->
  <rect x="60" y="92" width="340" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// REST API JSON 응답</text>
  <text x="80" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[</text>
  <text x="80" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  { </tspan><tspan fill="#ce9178">"id"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"A01"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"amt"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">5000</tspan><tspan fill="#ffffff"> },</tspan></text>
  <text x="80" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  { </tspan><tspan fill="#ce9178">"id"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"A02"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"amt"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">8000</tspan><tspan fill="#ffffff"> }</tspan></text>
  <text x="80" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]</text>
  <text x="80" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// JSON.parse + addRow 수동 매핑</text>
  <text x="80" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">var</text><text x="110" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> arr = JSON.parse(jsonStr);</text>
  <text x="80" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">arr.forEach(</tspan><tspan fill="#7ec8e3">function</tspan><tspan fill="#ffffff">(item) { ... });</tspan></text>

  <!-- Arrow -->
  <polygon points="422,172 452,164 452,180" fill="#7ec8e3"/>
  <line x1="400" y1="172" x2="452" y2="172" stroke="#7ec8e3" stroke-width="2"/>
  <text x="426" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">매핑</text>

  <!-- Right: Dataset result -->
  <rect x="452" y="92" width="368" height="160" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="636" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Dataset (dsMain)</text>
  <!-- Table header -->
  <line x1="452" y1="132" x2="820" y2="132" stroke="#222" stroke-width="1"/>
  <text x="500" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ROW</text>
  <text x="560" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ID</text>
  <text x="640" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AMT</text>
  <text x="720" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">rowType</text>
  <line x1="452" y1="156" x2="820" y2="156" stroke="#222" stroke-width="1"/>
  <text x="500" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">0</text>
  <text x="560" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">A01</text>
  <text x="640" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">5000</text>
  <text x="720" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">INSERT(2)</text>
  <text x="500" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1</text>
  <text x="560" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">A02</text>
  <text x="640" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">8000</text>
  <text x="720" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">INSERT(2)</text>
  <text x="636" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">addRow() → rowType = INSERT</text>

  <!-- saveJSON / loadJSON section -->
  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Dataset → JSON 직렬화 (saveJSON)</text>
  <rect x="60" y="308" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Dataset → JSON 문자열 (Nexacro 고유 포맷)</text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">var</tspan><tspan fill="#ffffff"> jsonStr = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.dsMain.saveJSON();</tspan></text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// JSON 문자열 → Dataset 복원</text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.dsMain.loadJSON(jsonStr);</tspan></text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ⚠ saveJSON/loadJSON 포맷은 Nexacro 전용</text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">//   외부 REST API 연동에는 수동 변환 필요</text>
</svg>
