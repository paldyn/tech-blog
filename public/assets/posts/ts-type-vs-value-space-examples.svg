<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">같은 이름이 타입과 값으로 동시 존재</text>
  <!-- Code block -->
  <rect x="60" y="68" width="480" height="350" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="94" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="76" dy="0" fill="#9aa4b8">// class는 타입 + 값 공간 동시 존재</tspan>
    <tspan x="76" dy="22" fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Dog {</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  constructor(name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">) {</tspan>
    <tspan x="76" dy="20" fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">this</tspan><tspan fill="#ffffff">.name = name;</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  }</tspan>
    <tspan x="76" dy="20" fill="#ffffff">}</tspan>
    <tspan x="76" dy="28" fill="#9aa4b8">// Dog을 타입으로 사용</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> myDog: Dog = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> Dog(</tspan><tspan fill="#ce9178">"Buddy"</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">//           ^^^  타입 공간</tspan>
    <tspan x="76" dy="28" fill="#9aa4b8">// Dog을 값으로 사용</tspan>
    <tspan x="76" dy="20" fill="#ffffff">console.log(</tspan><tspan fill="#7ec8e3" font-weight="600">typeof</tspan><tspan fill="#ffffff"> Dog); </tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">// "function" (값 공간)</tspan>
    <tspan x="76" dy="20" fill="#ffffff">Dog </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> Object;</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">// true (값 공간)</tspan>
  </text>
  <!-- Right side: explanation -->
  <rect x="570" y="68" width="250" height="100" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="695" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">타입 공간에서의 Dog</text>
  <text x="695" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인스턴스의 구조를 설명</text>
  <text x="695" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">{ name: string }</text>
  <text x="695" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컴파일 후 사라짐</text>
  <rect x="570" y="186" width="250" height="100" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="695" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">값 공간에서의 Dog</text>
  <text x="695" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">생성자 함수로 존재</text>
  <text x="695" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">typeof Dog === "function"</text>
  <text x="695" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">런타임에도 남아있음</text>
  <!-- import type note -->
  <rect x="570" y="304" width="250" height="114" rx="8" fill="#1a1a0a" stroke="#f0db4f" stroke-width="1"/>
  <text x="695" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#f0db4f">import type</text>
  <text x="695" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입만 임포트할 때 사용</text>
  <text x="695" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">런타임 번들에 포함 안 됨</text>
  <text x="590" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#f0db4f">import type { User } from './user'</text>
  <!-- Note at bottom -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">두 공간을 구분하면 "import type", "declare" 등을 올바르게 사용할 수 있습니다</text>
</svg>
