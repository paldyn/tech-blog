<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">슬라이딩 윈도우 (Sliding Window)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">부분 배열/문자열 문제를 O(N)에 — 재계산 없이 이전 결과 재활용</text>

  <!-- Fixed size window -->
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">고정 크기 윈도우 (k=3) — 최대 부분합</text>

  <!-- Array -->
  <rect x="80"  y="112" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="112" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888" text-anchor="middle">1</text>

  <rect x="148" y="112" width="64" height="44" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="180" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">4</text>

  <rect x="216" y="112" width="64" height="44" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="248" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">2</text>

  <rect x="284" y="112" width="64" height="44" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="316" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">7</text>

  <rect x="352" y="112" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="384" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888" text-anchor="middle">3</text>

  <rect x="420" y="112" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="452" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888" text-anchor="middle">9</text>

  <rect x="488" y="112" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="520" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888" text-anchor="middle">5</text>

  <!-- Window bracket -->
  <line x1="148" y1="108" x2="348" y2="108" stroke="#7777cc" stroke-width="2"/>
  <line x1="148" y1="108" x2="148" y2="100" stroke="#7777cc" stroke-width="2"/>
  <line x1="348" y1="108" x2="348" y2="100" stroke="#7777cc" stroke-width="2"/>
  <text x="248" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">window [1..3] sum=13</text>

  <!-- Slide arrow -->
  <text x="600" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">슬라이드: -arr[left] + arr[right+1]</text>
  <text x="600" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">13 - 4 + 3 = 12 (다음 윈도우)</text>

  <!-- separator -->
  <line x1="60" y1="178" x2="820" y2="178" stroke="#222" stroke-width="1"/>

  <!-- Variable window -->
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">가변 크기 윈도우 — 합이 target=7 이하인 최장 부분 배열</text>

  <!-- Array row 2 -->
  <!-- Elements: 2 3 1 5 2 4 -->
  <rect x="80"  y="216" width="64" height="44" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="2"/>
  <text x="112" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">2</text>

  <rect x="148" y="216" width="64" height="44" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="2"/>
  <text x="180" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">3</text>

  <rect x="216" y="216" width="64" height="44" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="2"/>
  <text x="248" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">1</text>

  <rect x="284" y="216" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="316" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888" text-anchor="middle">5</text>

  <rect x="352" y="216" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="384" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888" text-anchor="middle">2</text>

  <rect x="420" y="216" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="452" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888" text-anchor="middle">4</text>

  <text x="112" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">left=0</text>
  <text x="248" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">right=2</text>
  <text x="560" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">window sum = 6 ≤ 7</text>
  <text x="560" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">길이 = 3 (현재 최장)</text>

  <!-- Logic -->
  <rect x="60" y="292" width="760" height="60" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">가변 윈도우 이동 전략</text>
  <text x="220" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">조건 만족: right++, 윈도우 확장</text>
  <text x="660" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">조건 위반: left++, 윈도우 축소</text>

  <!-- Comparison table -->
  <rect x="60" y="370" width="760" height="90" rx="8" fill="#1a1a1a" stroke="#333"/>
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">슬라이딩 윈도우 vs 투 포인터</text>

  <text x="220" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">슬라이딩 윈도우</text>
  <text x="220" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">연속 부분 구간 최적화</text>
  <text x="220" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">right 항상 전진</text>

  <text x="660" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">투 포인터</text>
  <text x="660" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두 원소 관계(합/차 등)</text>
  <text x="660" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수렴 또는 같은 방향</text>
</svg>
