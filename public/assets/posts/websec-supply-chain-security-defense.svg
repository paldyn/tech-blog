<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">공급망 방어 4계층</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">의존성 도입부터 빌드까지, 단계별 방어 장치</text>

  <rect x="60" y="96" width="760" height="48" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">1. 의존성 최소화</text>
  <text x="800" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="end">꼭 필요한 패키지만 · 다운로드 수 · 관리 상태 확인 후 도입</text>

  <rect x="60" y="156" width="760" height="48" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">2. 버전 고정 + 무결성 검증</text>
  <text x="800" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="end">lockfile 커밋 · integrity 해시 · CI에서는 npm ci 사용</text>

  <rect x="60" y="216" width="760" height="48" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">3. 자동 취약점 스캔</text>
  <text x="800" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="end">Dependabot · npm audit · OSV 데이터베이스 상시 점검</text>

  <rect x="60" y="276" width="760" height="48" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">4. 빌드 격리 + 출처 증명</text>
  <text x="800" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="end">스크립트 실행 차단 · Sigstore 서명 · provenance 검증</text>

  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">CI에서 바로 적용할 수 있는 명령</text>

  <rect x="60" y="376" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 설치 스크립트(postinstall) 실행 차단</text>
  <text x="80" y="419" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">npm ci</tspan> --ignore-scripts</text>
  <text x="80" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 알려진 취약점 점검 (high 이상 실패 처리)</text>
  <text x="80" y="457" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">npm audit</tspan> --omit=dev --audit-level=high</text>
</svg>
