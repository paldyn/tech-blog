<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DDoS 완화 레이어 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">네트워크 · 전송 · 애플리케이션 레이어 방어</text>

  <!-- Attacker floods -->
  <rect x="40" y="110" width="140" height="64" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="110" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">봇넷 공격</text>
  <text x="110" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수천만 RPS</text>

  <line x1="180" y1="142" x2="218" y2="142" stroke="#e05555" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <!-- Layer 1: CDN/Anycast -->
  <rect x="220" y="90" width="130" height="104" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="285" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">1. CDN/Anycast</text>
  <text x="285" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">Cloudflare</text>
  <text x="285" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">AWS Shield</text>
  <text x="285" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">L3/L4 흡수</text>
  <text x="285" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">지리적 분산</text>

  <line x1="350" y1="142" x2="388" y2="142" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 2: WAF/Rate limit -->
  <rect x="390" y="90" width="130" height="104" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="455" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">2. WAF/Rate Limit</text>
  <text x="455" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">IP Rate Limit</text>
  <text x="455" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">Challenge/CAPTCHA</text>
  <text x="455" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">L7 필터링</text>
  <text x="455" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">봇 시그니처 탐지</text>

  <line x1="520" y1="142" x2="558" y2="142" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 3: Load Balancer -->
  <rect x="560" y="90" width="130" height="104" rx="8" fill="#0f200f" stroke="#55c555" stroke-width="1.5"/>
  <text x="625" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">3. 로드밸런서</text>
  <text x="625" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">Connection Limit</text>
  <text x="625" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">SYN Cookie</text>
  <text x="625" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">헬스체크 + 자동</text>
  <text x="625" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">스케일 아웃</text>

  <line x1="690" y1="142" x2="728" y2="142" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- App -->
  <rect x="730" y="110" width="110" height="64" rx="8" fill="#101010" stroke="#444" stroke-width="1.5"/>
  <text x="785" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#aaa" text-anchor="middle">앱 서버</text>
  <text x="785" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">정상 트래픽</text>

  <!-- DDoS types -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">DDoS 유형별 방어</text>

  <rect x="40" y="266" width="240" height="90" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">볼류메트릭 (L3/L4)</text>
  <text x="160" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">UDP Flood · SYN Flood</text>
  <text x="160" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">방어: Anycast + BGP 블랙홀</text>
  <text x="160" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Volumetric Attack</text>

  <rect x="320" y="266" width="240" height="90" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">프로토콜 (L4)</text>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">SYN Flood · Ping of Death</text>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">방어: SYN Cookie · Firewall</text>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Protocol Attack</text>

  <rect x="600" y="266" width="240" height="90" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">애플리케이션 (L7)</text>
  <text x="720" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">HTTP Flood · Slowloris</text>
  <text x="720" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">방어: WAF + Rate Limit</text>
  <text x="720" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Application Layer Attack</text>

  <!-- Bottom note -->
  <rect x="40" y="396" width="800" height="36" rx="6" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">심층 방어: 각 레이어가 독립적으로 공격을 감쇄 — 하나의 솔루션으로 모든 DDoS를 막을 수 없음</text>
</svg>
