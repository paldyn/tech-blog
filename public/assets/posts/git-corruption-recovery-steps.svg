<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">저장소 손상 복구 단계</text>

  <!-- Step boxes -->
  <rect x="60" y="68" width="160" height="80" rx="8" fill="#0e1620" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">1. 진단</text>
  <text x="140" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">git fsck --full</text>
  <text x="140" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">손상 유형 파악</text>

  <line x1="220" y1="108" x2="248" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="258" y="68" width="160" height="80" rx="8" fill="#14120a" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="338" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8c84a" text-anchor="middle">2. 원격 시도</text>
  <text x="338" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">git fetch --all</text>
  <text x="338" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격서 객체 복구</text>

  <line x1="418" y1="108" x2="446" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="456" y="68" width="160" height="80" rx="8" fill="#0e1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="536" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">3. 인덱스</text>
  <text x="536" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">rm .git/index</text>
  <text x="536" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">git checkout HEAD --</text>

  <line x1="616" y1="108" x2="644" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="654" y="68" width="166" height="80" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="737" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">4. 재클론</text>
  <text x="737" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">git clone --bare</text>
  <text x="737" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격서 재시작</text>

  <!-- Code block -->
  <rect x="60" y="170" width="760" height="202" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 단계 1: 진단</text>
  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fsck --full 2>&amp;1 | grep -E "error:|missing|corrupt"</text>

  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 단계 2: 원격에서 누락 객체 복구 (원격 있는 경우)</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fetch origin</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fetch --all --tags</text>

  <text x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 단계 3: 인덱스 손상 시 재생성</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">rm .git/index &amp;&amp; git checkout HEAD -- .</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 또는: git read-tree HEAD</text>
</svg>
