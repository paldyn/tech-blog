<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">ALTER TABLE로 제약조건 추가/제거</text>
  <rect x="60" y="54" width="760" height="228" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="76" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- NOT NULL 추가 (기존 NULL 행이 없어야 함)</text>
  <text x="76" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">ALTER TABLE</tspan> users <tspan font-weight="600" fill="#7ec8e3">ALTER COLUMN</tspan> phone <tspan font-weight="600" fill="#7ec8e3">SET NOT NULL</tspan>; <tspan fill="#9aa4b8">-- PG</tspan></text>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">ALTER TABLE</tspan> users <tspan font-weight="600" fill="#7ec8e3">MODIFY</tspan> phone <tspan fill="#b5cea8">VARCHAR</tspan>(<tspan fill="#b5cea8">20</tspan>) <tspan font-weight="600" fill="#7ec8e3">NOT NULL</tspan>; <tspan fill="#9aa4b8">-- MySQL</tspan></text>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- DEFAULT 변경</text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">ALTER TABLE</tspan> orders <tspan font-weight="600" fill="#7ec8e3">ALTER COLUMN</tspan> status <tspan font-weight="600" fill="#7ec8e3">SET DEFAULT</tspan> <tspan fill="#ce9178">'processing'</tspan>;</text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- CHECK 추가 (이름 있어야 나중에 삭제 가능)</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">ALTER TABLE</tspan> products <tspan font-weight="600" fill="#7ec8e3">ADD CONSTRAINT</tspan> chk_price <tspan font-weight="600" fill="#7ec8e3">CHECK</tspan> (price &gt;= 0);</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- CHECK 제거</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">ALTER TABLE</tspan> products <tspan font-weight="600" fill="#7ec8e3">DROP CONSTRAINT</tspan> chk_price; <tspan fill="#9aa4b8">-- PG/Oracle</tspan></text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">ALTER TABLE</tspan> products <tspan font-weight="600" fill="#7ec8e3">DROP CHECK</tspan> chk_price; <tspan fill="#9aa4b8">-- MySQL</tspan></text>
</svg>
