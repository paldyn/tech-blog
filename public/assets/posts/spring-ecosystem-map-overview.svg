  <text x="336" y="317"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Resilience4j — 서킷 브레이커</text>

  <!-- Row 2, Col 3: Ops (orange) x=580 y=214 w=240 h=130 -->
  <rect x="580" y="214" width="240" height="130" rx="6" fill="#1a120a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="700" y="238"
