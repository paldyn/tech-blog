<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580">
  <rect width="880" height="580" rx="12" fill="#0a0a0a"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring 생태계 전체 지도</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Core Framework를 중심으로 확장된 프로젝트 생태계</text>

  <!-- Core center -->
  <rect x="320" y="100" width="240" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2.5"/>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">Spring Framework (Core)</text>
  <text x="440" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">IoC, DI, AOP, MVC, WebFlux, Data</text>

  <!-- Spring Boot -->
  <rect x="60" y="100" width="200" height="70" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Spring Boot</text>
  <text x="160" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">자동 설정, 내장 서버, 스타터</text>

  <!-- Spring Data -->
  <rect x="620" y="100" width="200" height="70" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Spring Data</text>
  <text x="720" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">JPA, Redis, MongoDB, JDBC</text>

  <!-- Spring Security -->
  <rect x="60" y="220" width="200" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Spring Security</text>
  <text x="160" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">인증, 인가, OAuth2, JWT</text>

  <!-- Spring Cloud -->
  <rect x="620" y="220" width="200" height="70" rx="8" fill="#0d1520" stroke="#ce9178" stroke-width="1.5"/>
  <text x="720" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">Spring Cloud</text>
  <text x="720" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">MSA, Gateway, Config, 서킷 브레이커</text>

  <!-- Spring Batch -->
  <rect x="60" y="340" width="200" height="70" rx="8" fill="#0d1520" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="160" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b5cea8">Spring Batch</text>
  <text x="160" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">대용량 일괄 처리, Job, Step</text>

  <!-- Spring Integration -->
  <rect x="620" y="340" width="200" height="70" rx="8" fill="#0d1520" stroke="#9aa4b8" stroke-width="1.5"/>
  <text x="720" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#9aa4b8">Spring Integration</text>
  <text x="720" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">메시지 파이프라인, EIP 패턴</text>

  <!-- Spring WebFlux -->
  <rect x="320" y="230" width="240" height="60" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Spring WebFlux</text>
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">리액티브 웹 (논블로킹 I/O)</text>

  <!-- Spring AI -->
  <rect x="320" y="330" width="240" height="60" rx="8" fill="#0d1520" stroke="#e0c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0c555">Spring AI</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">LLM 통합, RAG, 벡터 스토어</text>

  <!-- Legend -->
  <rect x="60" y="440" width="760" height="110" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">시리즈에서 다루는 범위</text>
  <rect x="80" y="480" width="14" height="14" rx="2" fill="none" stroke="#55c555" stroke-width="1.5"/>
  <text x="102" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Core + Boot + Data + Security + MVC</text>
  <rect x="340" y="480" width="14" height="14" rx="2" fill="none" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="362" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">WebFlux / AI — 별도 심화 파트</text>
  <text x="80" y="520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Spring Boot = Core + 자동 설정 + 내장 서버 조합. 실무에서는 Boot 위에서 나머지 프로젝트들을 스타터로 추가.</text>
  <text x="80" y="540" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 Spring 프로젝트의 공통 기반은 Spring Framework Core — IoC 컨테이너와 DI가 전체를 연결.</text>
</svg>
