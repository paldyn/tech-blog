  <rect x="320" y="64" width="240" height="130" rx="6" fill="#0a100f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="88"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
