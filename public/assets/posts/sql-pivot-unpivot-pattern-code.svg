<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">PIVOT 구현 코드 비교</text>

  <!-- Left: Conditional aggregation (standard) -->
  <rect x="50" y="58" width="370" height="22" rx="4" fill="#111118"/>
  <text x="235" y="73" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">표준 SQL (조건부 집계)</text>

  <rect x="50" y="84" width="370" height="270" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="66" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 모든 DB에서 동작하는 방법</text>
  <text x="66" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="66" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    year,</text>
  <text x="66" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">SUM</tspan>(<tspan fill="#7ec8e3">CASE WHEN</tspan> product=<tspan fill="#ce9178">'A'</tspan></text>
  <text x="66" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">         <tspan fill="#7ec8e3">THEN</tspan> sales <tspan fill="#7ec8e3">END</tspan>) <tspan fill="#7ec8e3">AS</tspan> A,</text>
  <text x="66" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">SUM</tspan>(<tspan fill="#7ec8e3">CASE WHEN</tspan> product=<tspan fill="#ce9178">'B'</tspan></text>
  <text x="66" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">         <tspan fill="#7ec8e3">THEN</tspan> sales <tspan fill="#7ec8e3">END</tspan>) <tspan fill="#7ec8e3">AS</tspan> B</text>
  <text x="66" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM <tspan fill="#ffffff">sales_data</tspan></text>
  <text x="66" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">GROUP BY <tspan fill="#ffffff">year</tspan></text>
  <text x="66" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ORDER BY <tspan fill="#ffffff">year;</tspan></text>

  <!-- Right: SQL Server native PIVOT -->
  <rect x="460" y="58" width="370" height="22" rx="4" fill="#111118"/>
  <text x="645" y="73" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">SQL Server 전용 PIVOT 구문</text>

  <rect x="460" y="84" width="370" height="270" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- SQL Server / Oracle 전용</text>
  <text x="476" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="476" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    year, [A], [B]</text>
  <text x="476" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="476" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    sales_data</text>
  <text x="476" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    PIVOT</text>
  <text x="476" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    (<tspan fill="#7ec8e3">SUM</tspan>(sales)</text>
  <text x="476" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">     FOR<tspan fill="#ffffff"> product</tspan></text>
  <text x="476" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">     IN<tspan fill="#ffffff"> ([A],[B])) p</tspan></text>
  <text x="476" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ORDER BY <tspan fill="#ffffff">year;</tspan></text>

  <!-- Footer note -->
  <rect x="50" y="368" width="780" height="22" rx="4" fill="#111118"/>
  <text x="440" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동적 PIVOT(컬럼값 자동 생성)은 동적 SQL(EXECUTE/sp_executesql)로 구현해야 한다</text>
</svg>
