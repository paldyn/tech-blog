<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580">
  <defs>
    <marker id="arr-poly" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-call" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a055"/>
    </marker>
  </defs>

  <rect width="880" height="580" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">동적 디스패치 — 런타임 다형성의 핵심</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">오버라이딩된 메서드는 컴파일 타임이 아닌 런타임에 실제 객체 타입으로 결정된다</text>

  <!-- Code box: polymorphism example -->
  <rect x="60" y="90" width="380" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 부모 타입 참조 변수로 다형성 구현</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">Animal</text>
  <text x="134" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> a1 = </text>
  <text x="196" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">new</text>
  <text x="228" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> Dog("바둑", 3);</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">Animal</text>
  <text x="134" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> a2 = </text>
  <text x="196" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">new</text>
  <text x="228" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> Cat("나비", 2);</text>

  <text x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 같은 호출, 다른 결과</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">a1.sound(); </text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 출력: "멍멍!"</text>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">a2.sound(); </text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 출력: "야옹!"</text>

  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 리스트로 일괄 처리</text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">List</text>
  <text x="107.3" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">&lt;Animal&gt; animals =</text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">    List</text>
  <text x="138.6" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.of(a1, a2);</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">animals.forEach(</text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    Animal::sound);</text>

  <!-- Arrow from code to dispatch diagram -->
  <line x1="440" y1="230" x2="490" y2="230" stroke="#e0a055" stroke-width="2"
        marker-end="url(#arr-call)"/>
  <text x="465" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a055" text-anchor="middle">런타임</text>

  <!-- Dynamic Dispatch diagram -->
  <!-- a1.sound() dispatch -->
  <rect x="500" y="110" width="320" height="64" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="520" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">a1.sound() 호출</text>
  <text x="520" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컴파일: Animal.sound()  |  참조 타입</text>
  <text x="520" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">런타임: Dog.sound()  →  "멍멍!"</text>

  <!-- a2.sound() dispatch -->
  <rect x="500" y="194" width="320" height="64" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="520" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">a2.sound() 호출</text>
  <text x="520" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컴파일: Animal.sound()  |  참조 타입</text>
  <text x="520" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055">런타임: Cat.sound()   →  "야옹!"</text>

  <!-- JVM vtable note -->
  <rect x="500" y="278" width="320" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">JVM 가상 메서드 테이블</text>
  <text x="660" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">각 클래스는 vtable(가상 디스패치 테이블)을</text>
  <text x="660" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">갖고 있어 실제 메서드 주소를 저장한다</text>
  <text x="660" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JIT 컴파일러는 이 비용을 거의 0에 수렴시킨다</text>

  <!-- super 호출 -->
  <rect x="60" y="394" width="760" height="152" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">오버라이딩에서 super 메서드 호출</text>

  <rect x="80" y="434" width="340" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="96" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 부모 로직 유지 + 확장</text>
  <text x="96" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">@Override</text>
  <text x="96" y="496" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">public void</text>
  <text x="189" y="496" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> sound() {</text>
  <text x="96" y="514" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">  super</text>
  <text x="150.8" y="514" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.sound(); }</text>

  <text x="520" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">super.sound()</text>
  <text x="520" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">부모 Animal.sound() 먼저 실행 후</text>
  <text x="520" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">자식 로직 추가 실행</text>
  <text x="520" y="514" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">기존 동작을 완전히 교체하지 않고</text>
  <text x="520" y="530" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">부모 동작 위에 레이어 추가 패턴</text>

  <text x="440" y="566" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">동적 디스패치 덕분에 Animal 참조 하나로 수십 종류의 동물을 처리할 수 있다</text>
</svg>
