  <text x="240" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">WARNING</text>
  <rect x="520" y="166" width="240" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">WARN</text>
  <line x1="360" y1="183" x2="520" y2="183" stroke="#7ec8e3" stroke-width="2" marker-end="url(#juArr)"/>

  <rect x="120" y="212" width="240" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">INFO</text>
  <rect x="520" y="212" width="240" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
