<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">State는 스냅샷처럼 동작한다</text>

  <!-- Render 1 snapshot -->
  <rect x="60" y="64" width="230" height="200" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="175" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">렌더 1 (count=0)</text>
  <rect x="76" y="100" width="198" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="120" fill="#9aa4b8">// 이 렌더에서 count는</tspan>
    <tspan x="92" dy="16" fill="#9aa4b8">// 항상 0이다</tspan>
    <tspan x="92" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> count = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="92" dy="16" fill="#ffffff">setCount(count + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#9aa4b8">// count+1 = 0+1 = 1</tspan>
    <tspan x="92" dy="16" fill="#ffffff">setCount(count + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#9aa4b8">// 여전히 0+1 = 1</tspan>
    <tspan x="92" dy="16" fill="#9aa4b8">// 결과: count = 1</tspan>
  </text>

  <!-- Arrow -->
  <line x1="290" y1="164" x2="350" y2="164" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="320" y="156" text-anchor="middle" font-size="11" fill="#7777cc">setCount</text>

  <!-- Render 2 snapshot -->
  <rect x="350" y="64" width="230" height="200" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="465" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">렌더 2 (count=1)</text>
  <rect x="366" y="100" width="198" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="382" y="120" fill="#9aa4b8">// 이 렌더에서 count는</tspan>
    <tspan x="382" dy="16" fill="#9aa4b8">// 항상 1이다</tspan>
    <tspan x="382" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> count = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="382" dy="16" fill="#ffffff">setCount(count + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="382" dy="16" fill="#9aa4b8">// 1+1 = 2</tspan>
    <tspan x="382" dy="32" fill="#9aa4b8">// 결과: count = 2</tspan>
  </text>

  <!-- Updater function -->
  <line x1="580" y1="164" x2="640" y2="164" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="640" y="64" width="200" height="200" rx="10" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">업데이터 함수 사용</text>
  <rect x="656" y="100" width="168" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="672" y="120" fill="#9aa4b8">// ✅ 최신 state를</tspan>
    <tspan x="672" dy="16" fill="#9aa4b8">// 항상 보장</tspan>
    <tspan x="672" dy="16" fill="#ffffff">setCount(</tspan><tspan fill="#55c555">c =&gt; c+</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="672" dy="16" fill="#ffffff">setCount(</tspan><tspan fill="#55c555">c =&gt; c+</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="672" dy="16" fill="#9aa4b8">// c: 0 → 1 → 2</tspan>
    <tspan x="672" dy="16" fill="#9aa4b8">// 결과: count = 2</tspan>
    <tspan x="672" dy="16" fill="#55c555">// 올바른 결과!</tspan>
  </text>

  <!-- Conclusion -->
  <rect x="60" y="290" width="760" height="112" rx="8" fill="#0f1629" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="315" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">핵심 개념: State는 렌더링 시점의 스냅샷</text>
  <text x="440" y="341" text-anchor="middle" font-size="13" fill="#888">각 렌더링에서 state 값은 고정됩니다. 동일 렌더 안에서 setCount를 여러 번 호출해도</text>
  <text x="440" y="363" text-anchor="middle" font-size="13" fill="#888">값은 해당 렌더의 state 값을 기준으로 계산됩니다.</text>
  <text x="440" y="389" text-anchor="middle" font-size="13" fill="#7ec8e3">이전 state를 기반으로 업데이트할 때는 setCount(c =&gt; c + 1) 형태를 사용하세요.</text>
</svg>
