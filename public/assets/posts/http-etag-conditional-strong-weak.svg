<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">강한 ETag vs 약한 ETag</text>
    <!-- Strong ETag box -->
    <rect x="60" y="75" width="350" height="88" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="235" y="99" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">강한 ETag (Strong)</text>
    <text x="235" y="119" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">ETag: &quot;33a64df5454d&quot;</text>
    <text x="235" y="137" text-anchor="middle" font-size="11" fill="#888">바이트 단위로 완전히 동일함을 보장</text>
    <text x="235" y="155" text-anchor="middle" font-size="11" fill="#888">Range 이어받기 · If-Match에 사용 가능</text>
    <!-- Weak ETag box -->
    <rect x="470" y="75" width="350" height="88" rx="8" fill="#2a1f0f" stroke="#aa7a3a" stroke-width="1.5"/>
    <text x="645" y="99" text-anchor="middle" font-size="13" font-weight="600" fill="#dd9955">약한 ETag (Weak)</text>
    <text x="645" y="119" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">ETag: W/&quot;33a64df5454d&quot;</text>
    <text x="645" y="137" text-anchor="middle" font-size="11" fill="#888">의미적으로 같음만 보장 (표현 차이 허용)</text>
    <text x="645" y="155" text-anchor="middle" font-size="11" fill="#888">If-None-Match 캐시 재검증 전용</text>
    <!-- Comparison rules code box -->
    <rect x="60" y="190" width="760" height="199" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 비교 알고리즘 (RFC 9110 §8.8.3.2)</text>
    <text x="76" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">강한 비교</tspan><tspan fill="#ffffff">: 둘 다 W/ 없이 바이트 동일해야 일치</tspan></text>
    <text x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    &quot;abc&quot; vs &quot;abc&quot;     </tspan><tspan fill="#55c555">→ 일치</tspan></text>
    <text x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    W/&quot;abc&quot; vs &quot;abc&quot;   </tspan><tspan fill="#e05555">→ 불일치</tspan></text>
    <text x="76" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">약한 비교</tspan><tspan fill="#ffffff">: W/ 접두사를 무시하고 값만 비교</tspan></text>
    <text x="76" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    W/&quot;abc&quot; vs &quot;abc&quot;   </tspan><tspan fill="#55c555">→ 일치</tspan></text>
    <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># If-None-Match(캐시 검증)는 약한 비교 사용</text>
    <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># If-Match·Range 재개는 강한 비교만 허용</text>
    <!-- Summary -->
    <text x="440" y="421" text-anchor="middle" font-size="12" fill="#888">캐시 재검증에는 약한 ETag로 충분 — 동시성 제어·이어받기에는 강한 ETag 필수</text>
    <text x="440" y="439" text-anchor="middle" font-size="11" fill="#555">nginx는 gzip 동적 압축 시 강한 ETag를 약한 ETag로 강등시킨다</text>
  </g>
</svg>
