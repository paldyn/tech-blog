<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RecursiveTask vs RecursiveAction</text>

  <!-- ForkJoinTask (root) -->
  <rect x="320" y="72" width="240" height="48" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ForkJoinTask&lt;V&gt;</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">추상 기반 — fork() / join() / invoke()</text>

  <!-- RecursiveTask -->
  <rect x="100" y="180" width="280" height="160" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">RecursiveTask&lt;V&gt;</text>
  <text x="240" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">결과를 반환하는 재귀 작업</text>
  <rect x="116" y="232" width="248" height="24" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">protected V compute()</text>
  <rect x="116" y="262" width="248" height="24" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">합산, 검색, 변환 결과 반환</text>
  <rect x="116" y="292" width="248" height="24" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">join() → 결과값 V 반환</text>

  <!-- RecursiveAction -->
  <rect x="500" y="180" width="280" height="160" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">RecursiveAction</text>
  <text x="640" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">결과 없는 재귀 작업 (void)</text>
  <rect x="516" y="232" width="248" height="24" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">protected void compute()</text>
  <rect x="516" y="262" width="248" height="24" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정렬, 배열 채우기, 출력</text>
  <rect x="516" y="292" width="248" height="24" rx="4" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">join() → void (완료 대기만)</text>

  <!-- Arrows -->
  <line x1="390" y1="120" x2="278" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="490" y1="120" x2="602" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Tips -->
  <rect x="100" y="360" width="680" height="42" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공통: fork() 비동기 제출 · join() 결과 대기 · invoke() 동기 실행</text>
  <text x="440" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">compute() 내부에서만 fork/join 사용 — 외부 스레드에서는 submit()/invoke()</text>
</svg>
