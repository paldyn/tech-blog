<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">빈 커밋의 사용 사례</text>

  <!-- Use case 1 -->
  <rect x="60" y="78" width="360" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">CI 파이프라인 재실행</text>
  <text x="80" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git commit --allow-empty \</text>
  <text x="80" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  -m "ci: retry pipeline"</text>
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">코드 변경 없이 CI를 다시 트리거할 때</text>

  <!-- Use case 2 -->
  <rect x="450" y="78" width="370" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">브랜치 히스토리 마커</text>
  <text x="470" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git commit --allow-empty \</text>
  <text x="470" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  -m "chore: start sprint 42"</text>
  <text x="470" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스프린트·릴리스 시작점을 로그에 기록</text>

  <!-- Use case 3 -->
  <rect x="60" y="198" width="360" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">저장소 초기화 관례</text>
  <text x="80" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git commit --allow-empty \</text>
  <text x="80" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  -m "chore: initial commit"</text>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일 추가 전 브랜치 기반 커밋 생성</text>

  <!-- Use case 4 -->
  <rect x="450" y="198" width="370" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">배포 훅 수동 트리거</text>
  <text x="470" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git commit --allow-empty \</text>
  <text x="470" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  -m "deploy: force staging"</text>
  <text x="470" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">push 기반 배포를 코드 없이 실행</text>

  <!-- Note -->
  <rect x="60" y="316" width="760" height="44" rx="6" fill="#0a0a1a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">주의:</text>
  <text x="116" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빈 커밋은 실제 변경이 없으므로 남용하면 히스토리를 오염시킨다.</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">팀 컨벤션으로 허용 범위를 명확히 정하는 것이 좋다.</text>
</svg>
