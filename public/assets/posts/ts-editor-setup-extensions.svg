<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 개발 필수 VS Code 확장</text>
  <!-- Extension cards -->
  <!-- ESLint -->
  <rect x="60" y="70" width="370" height="76" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <rect x="78" y="90" width="40" height="40" rx="6" fill="#4b32c3"/>
  <text x="98" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#ffffff">E</text>
  <text x="136" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">ESLint</text>
  <text x="136" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드 품질 검사. @typescript-eslint 규칙 지원</text>
  <text x="136" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">저장 시 자동 수정 설정 가능</text>
  <!-- Prettier -->
  <rect x="450" y="70" width="370" height="76" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <rect x="468" y="90" width="40" height="40" rx="6" fill="#1a1a2e" stroke="#c8b9f7"/>
  <text x="488" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#c8b9f7">P</text>
  <text x="526" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Prettier</text>
  <text x="526" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자동 코드 포매터. 팀 스타일 통일</text>
  <text x="526" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">prettier-plugin-organize-imports 함께 사용</text>
  <!-- Error Lens -->
  <rect x="60" y="162" width="370" height="76" rx="8" fill="#0d0d1a" stroke="#e05555" stroke-width="1"/>
  <rect x="78" y="182" width="40" height="40" rx="6" fill="#2d0000"/>
  <text x="98" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">EL</text>
  <text x="136" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Error Lens</text>
  <text x="136" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오류·경고를 코드 줄 옆에 인라인으로 표시</text>
  <text x="136" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">물결선 위로 마우스 올리지 않아도 확인 가능</text>
  <!-- TypeScript Hero -->
  <rect x="450" y="162" width="370" height="76" rx="8" fill="#0d0d1a" stroke="#55c555" stroke-width="1"/>
  <rect x="468" y="182" width="40" height="40" rx="6" fill="#0a1a0a" stroke="#55c555"/>
  <text x="488" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">TS</text>
  <text x="526" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">TypeScript Importer</text>
  <text x="526" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">미사용 import 정리, 자동 import 최적화</text>
  <text x="526" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">대규모 프로젝트에서 import 관리 필수</text>
  <!-- Vitest / Jest Runner -->
  <rect x="60" y="254" width="370" height="76" rx="8" fill="#0d0d1a" stroke="#f0db4f" stroke-width="1"/>
  <rect x="78" y="274" width="40" height="40" rx="6" fill="#1a1500" stroke="#f0db4f"/>
  <text x="98" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#f0db4f">V</text>
  <text x="136" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#f0db4f">Vitest / Jest Runner</text>
  <text x="136" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">테스트 파일에서 바로 실행·디버깅</text>
  <text x="136" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">코드렌즈로 테스트 옆에 실행 버튼 표시</text>
  <!-- GitLens -->
  <rect x="450" y="254" width="370" height="76" rx="8" fill="#0d0d1a" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="468" y="274" width="40" height="40" rx="6" fill="#0a1a1a" stroke="#7ec8e3"/>
  <text x="488" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">G</text>
  <text x="526" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">GitLens</text>
  <text x="526" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드 변경 이력, blame 정보 인라인 표시</text>
  <text x="526" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">팀 협업 시 변경 추적에 필수</text>
  <!-- Note -->
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc">VS Code에는 TypeScript 지원이 기본 내장 — 별도 TS 확장 불필요</text>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">프로젝트 node_modules의 typescript 버전이 자동으로 사용됩니다</text>
</svg>
