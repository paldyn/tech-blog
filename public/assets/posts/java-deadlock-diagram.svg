<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arrdd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrdd2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">교착 상태 (Deadlock) 발생 원리</text>

  <!-- Lock A -->
  <rect x="180" y="100" width="140" height="60" rx="8" fill="#1f1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="250" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c44a">Lock A</text>
  <text x="250" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Thread 1이 보유</text>

  <!-- Lock B -->
  <rect x="560" y="100" width="140" height="60" rx="8" fill="#1f1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="630" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c44a">Lock B</text>
  <text x="630" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Thread 2가 보유</text>

  <!-- Thread 1 -->
  <rect x="60" y="270" width="200" height="70" rx="8" fill="#1f0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="160" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Thread 1</text>
  <text x="160" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Lock A 보유</text>
  <text x="160" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">Lock B 대기 (BLOCKED)</text>

  <!-- Thread 2 -->
  <rect x="620" y="270" width="200" height="70" rx="8" fill="#1f0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="720" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Thread 2</text>
  <text x="720" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Lock B 보유</text>
  <text x="720" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">Lock A 대기 (BLOCKED)</text>

  <!-- Thread 1 holds Lock A -->
  <line x1="160" y1="270" x2="220" y2="160" stroke="#7777cc" stroke-width="2" marker-end="url(#arrdd2)"/>
  <text x="160" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">보유</text>

  <!-- Thread 1 waits for Lock B -->
  <path d="M 260 270 Q 440 220 560 150" stroke="#e05555" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrdd)"/>
  <text x="400" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">대기</text>

  <!-- Thread 2 holds Lock B -->
  <line x1="720" y1="270" x2="660" y2="160" stroke="#7777cc" stroke-width="2" marker-end="url(#arrdd2)"/>
  <text x="700" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">보유</text>

  <!-- Thread 2 waits for Lock A -->
  <path d="M 620 270 Q 440 220 320 150" stroke="#e05555" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrdd)"/>
  <text x="480" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">대기</text>

  <!-- Deadlock label -->
  <rect x="350" y="280" width="180" height="54" rx="8" fill="#3a0000" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">DEADLOCK</text>
  <text x="440" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">영원히 진행 불가</text>

  <!-- 4 conditions -->
  <text x="80" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">교착 상태 4가지 필요 조건 (모두 성립 시 발생)</text>
  <rect x="60" y="400" width="760" height="104" rx="6" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">① 상호 배제 (Mutual Exclusion):</text>
  <text x="270" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> 자원은 한 번에 하나의 스레드만 사용</text>
  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">② 점유 대기 (Hold and Wait):</text>
  <text x="260" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> 자원 보유 중 다른 자원 대기</text>
  <text x="80" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">③ 비선점 (No Preemption):</text>
  <text x="238" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> 스레드가 자발적으로만 자원 반환</text>
  <text x="80" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">④ 순환 대기 (Circular Wait):</text>
  <text x="246" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> 스레드들이 순환 형태로 자원을 대기</text>
  <text x="80" y="498" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ 순환 대기를 제거하면 교착 방지 (락 획득 순서 고정)</text>
</svg>
