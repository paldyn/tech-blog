<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">filter-repo 실전 워크플로</text>

  <!-- Step boxes -->
  <defs>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="60" y="75" width="40" height="40" rx="20" fill="#7777cc"/>
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <rect x="120" y="75" width="700" height="40" rx="8" fill="#1a1a2e" stroke="#555"/>
  <text x="140" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">설치: pip install git-filter-repo  또는  brew install git-filter-repo</text>

  <line x1="80" y1="115" x2="80" y2="133" stroke="#7777cc" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Step 2 -->
  <rect x="60" y="135" width="40" height="40" rx="20" fill="#7777cc"/>
  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <rect x="120" y="135" width="700" height="40" rx="8" fill="#1a1a2e" stroke="#555"/>
  <text x="140" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">백업: cp -r my-repo my-repo-backup  (실수 시 복구용)</text>

  <line x1="80" y1="175" x2="80" y2="193" stroke="#7777cc" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Step 3 -->
  <rect x="60" y="195" width="40" height="40" rx="20" fill="#7777cc"/>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <rect x="120" y="195" width="700" height="40" rx="8" fill="#1a1a2e" stroke="#555"/>
  <text x="140" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">실행: git filter-repo --path secrets.env --invert-paths</text>

  <line x1="80" y1="235" x2="80" y2="253" stroke="#7777cc" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Step 4 -->
  <rect x="60" y="255" width="40" height="40" rx="20" fill="#7777cc"/>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <rect x="120" y="255" width="700" height="40" rx="8" fill="#1a1a2e" stroke="#555"/>
  <text x="140" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">원격 재설정: git remote add origin &lt;URL&gt;  (filter-repo가 remote 제거함)</text>

  <line x1="80" y1="295" x2="80" y2="313" stroke="#7777cc" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Step 5 -->
  <rect x="60" y="315" width="40" height="40" rx="20" fill="#e05555"/>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <rect x="120" y="315" width="700" height="40" rx="8" fill="#2a1a1a" stroke="#e05555"/>
  <text x="140" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">force push: git push --force-with-lease --all origin  ← 팀 공지 필수</text>

  <!-- Note -->
  <rect x="60" y="385" width="760" height="40" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">비밀 노출 후 키 자체도 즉시 교체 — 히스토리 삭제만으로는 충분하지 않다</text>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">GitHub cache, fork, clone 등 외부 복사본은 filter-repo가 건드리지 못함</text>
</svg>
