<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">트레이스백 해부도</text>

  <!-- Traceback text representation (styled as terminal output) -->
  <rect x="55" y="65" width="770" height="240" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Line 1: Traceback header -->
  <rect x="65" y="75" width="750" height="22" rx="3" fill="#1a0a0a"/>
  <text x="75" y="91" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">Traceback (most recent call last):</text>
  <text x="500" y="91" text-anchor="end" font-size="10" fill="#3a4a6e">← 트레이스백 시작 표시</text>

  <!-- Frame 1 -->
  <text x="75" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  File "app.py", line 12, in main</text>
  <text x="590" y="115" font-size="10" fill="#7ec8e3">← 파일명 · 줄번호 · 함수명</text>
  <text x="75" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">    result = process(data)</text>
  <text x="590" y="133" font-size="10" fill="#888">← 해당 줄 코드</text>

  <!-- Frame 2 -->
  <text x="75" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  File "app.py", line 25, in process</text>
  <text x="75" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">    value = int(data["key"])</text>

  <!-- Frame 3 -->
  <text x="75" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  File "app.py", line 30, in process</text>
  <text x="590" y="199" font-size="10" fill="#888">← 가장 최근 호출 (문제 발생 직전)</text>
  <text x="75" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">    raise ValueError(f"잘못된 값: {v}")</text>

  <!-- Exception line -->
  <rect x="65" y="227" width="750" height="22" rx="3" fill="#1a0a0a"/>
  <text x="75" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">ValueError: 잘못된 값: abc</text>
  <text x="570" y="243" font-size="10" fill="#e05555">← 예외 타입 + 메시지</text>
  <text x="75" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">※ "most recent call last" = 스택 바닥이 맨 위, 실제 오류 발생 위치는 마지막 줄</text>

  <!-- Annotation boxes -->
  <rect x="55" y="330" width="770" height="84" rx="8" fill="#0c1628" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="353" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">트레이스백 읽는 법</text>
  <text x="75" y="374" font-size="12" fill="#e8e8e8">① 마지막 줄부터 읽는다 — 예외 타입과 메시지가 핵심 단서</text>
  <text x="75" y="393" font-size="12" fill="#e8e8e8">② 그 위에서 한 프레임씩 거슬러 올라가며 어디서 호출되었는지 파악</text>
  <text x="75" y="408" font-size="12" fill="#888">③ 본인 코드의 프레임(app.py)을 라이브러리 프레임보다 먼저 확인</text>
</svg>
