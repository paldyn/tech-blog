<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">오케스트레이션 없는 세계의 문제들</text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">컨테이너 수가 늘어날수록 수동 운영의 한계가 드러난다</text>

  <!-- LEFT SIDE: Chaos header -->
  <rect x="60" y="96" width="360" height="40" rx="8" fill="#200d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">오케스트레이션 없음 — 혼돈</text>

  <!-- Problem 1: Manual placement -->
  <rect x="60" y="152" width="360" height="72" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="176"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">배치 문제</text>
  <text x="80" y="196"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨테이너 배포 시 서버마다 top/free 확인 후</text>
  <text x="80" y="212"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수동으로 적합한 서버 선택</text>

  <!-- Problem 2: Failure recovery -->
  <rect x="60" y="240" width="360" height="72" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="264"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">고가용성 부재</text>
  <text x="80" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">새벽 2시 장애 → 온콜 알림 → 수동 재시작</text>
  <text x="80" y="300"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">복구까지 수십 분 ~ 수 시간 소요</text>

  <!-- Problem 3: Scaling -->
  <rect x="60" y="328" width="360" height="72" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="352"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">수동 스케일링</text>
  <text x="80" y="372"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">트래픽 폭증 시 직접 계산 후 컨테이너 추가</text>
  <text x="80" y="388"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">감소 시에도 수동으로 정리 필요</text>

  <!-- Problem 4: Service discovery -->
  <rect x="60" y="416" width="360" height="72" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="440"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">서비스 연결 끊김</text>
  <text x="80" y="460"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨테이너 재시작 시 IP 변경 → 연결 오류</text>
  <text x="80" y="476"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">별도 서비스 레지스트리 직접 구축 필요</text>

  <!-- CENTER divider + arrows -->
  <line x1="440" y1="100" x2="440" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- RIGHT SIDE: K8s solution header -->
  <rect x="460" y="96" width="360" height="40" rx="8" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">K8s 오케스트레이션 — 자동화</text>

  <!-- Solution 1 -->
  <rect x="460" y="152" width="360" height="72" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="176"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Scheduler 자동 배치</text>
  <text x="480" y="196"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">노드별 CPU/메모리 자원을 계산해</text>
  <text x="480" y="212"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최적의 노드를 자동으로 선택</text>

  <!-- Solution 2 -->
  <rect x="460" y="240" width="360" height="72" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="264"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Self-healing 자동 복구</text>
  <text x="480" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">kubelet이 파드 상태 지속 감시</text>
  <text x="480" y="300"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">장애 즉시 재시작 / 다른 노드로 이동</text>

  <!-- Solution 3 -->
  <rect x="460" y="328" width="360" height="72" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="352"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">HPA 자동 스케일링</text>
  <text x="480" y="372"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU/메모리 사용률 기반 파드 수 자동 조절</text>
  <text x="480" y="388"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수십 초 안에 파드 추가 완료</text>

  <!-- Solution 4 -->
  <rect x="460" y="416" width="360" height="72" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="440"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Service + DNS 안정 연결</text>
  <text x="480" y="460"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">안정적인 DNS 이름과 가상 IP 제공</text>
  <text x="480" y="476"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파드 IP 변경에도 서비스 이름으로 접근</text>
</svg>
