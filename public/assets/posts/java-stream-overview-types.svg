<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Stream 타입 계층과 기본 타입 특화 스트림</text>

  <!-- Stream hierarchy boxes -->
  <rect x="330" y="66" width="220" height="46" fill="#1a3a5a" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">BaseStream&lt;T, S&gt;</text>

  <!-- Stream<T> -->
  <line x1="440" y1="112" x2="200" y2="150" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="100" y="154" width="200" height="46" fill="#0f1f30" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">Stream&lt;T&gt;</text>

  <!-- IntStream -->
  <line x1="440" y1="112" x2="390" y2="150" stroke="#55c555" stroke-width="1.5"/>
  <rect x="310" y="154" width="160" height="46" fill="#0f2010" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">IntStream</text>

  <!-- LongStream -->
  <line x1="440" y1="112" x2="540" y2="150" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="480" y="154" width="160" height="46" fill="#201020" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="560" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">LongStream</text>

  <!-- DoubleStream -->
  <line x1="440" y1="112" x2="700" y2="150" stroke="#e0b555" stroke-width="1.5"/>
  <rect x="640" y="154" width="180" height="46" fill="#1a1500" rx="6" stroke="#e0b555" stroke-width="1.5"/>
  <text x="730" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e0b555">DoubleStream</text>

  <!-- Descriptions -->
  <text x="200" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">객체 참조 스트림</text>
  <text x="200" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 타입 지원</text>

  <text x="390" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">int 특화, 박싱 없음</text>
  <text x="390" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">sum/avg/range 추가</text>

  <text x="560" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">long 특화, 박싱 없음</text>
  <text x="560" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">큰 범위 연산</text>

  <text x="730" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">double 특화</text>
  <text x="730" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">통계, 평균 연산</text>

  <!-- Code: primitive stream vs boxed -->
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">기본 타입 스트림과 박싱 스트림</text>
  <rect x="64" y="282" width="752" height="140" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// int[] → IntStream (박싱 없음, 성능 우수)</text>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">[] arr = {1, 2, 3, 4, 5};</tspan></text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> sum = Arrays.stream(arr).sum();       </tspan><tspan fill="#9aa4b8">// 15</tspan></text>
  <text x="80" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">double</tspan><tspan fill="#ffffff"> avg = Arrays.stream(arr).average()</tspan></text>
  <text x="80" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">                              .orElse(0.0); </text>
  <text x="80" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// IntStream.range(0, 5) → 0,1,2,3,4  IntStream.rangeClosed(1,5) → 1,2,3,4,5</text>
  <text x="80" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// mapToObj()/boxed() → Stream&lt;Integer&gt;  mapToInt() → IntStream으로 전환</text>
</svg>
