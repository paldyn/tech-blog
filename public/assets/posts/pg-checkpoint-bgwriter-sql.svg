<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Checkpoint · BGWriter 모니터링 SQL</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">pg_stat_bgwriter · CHECKPOINT 강제 · 설정 튜닝</text>

  <!-- Left -->
  <rect x="60" y="92" width="370" height="280" rx="12" fill="#0e1623" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">체크포인트 통계 모니터링</text>
  <rect x="76" y="124" width="338" height="232" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="92" y="148" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 체크포인트 &amp; BGWriter 통계</text>
  <text x="92" y="166" font-size="12" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan></text>
  <text x="92" y="184" font-size="12" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  checkpoints_timed,</text>
  <text x="92" y="202" font-size="12" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  checkpoints_req,</text>
  <text x="92" y="220" font-size="12" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  buffers_checkpoint,</text>
  <text x="92" y="238" font-size="12" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  buffers_clean,</text>
  <text x="92" y="256" font-size="12" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  maxwritten_clean,</text>
  <text x="92" y="274" font-size="12" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  buffers_alloc</text>
  <text x="92" y="292" font-size="12" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  pg_stat_bgwriter;</text>
  <text x="92" y="316" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- checkpoints_req이 많으면 I/O 폭풍</text>
  <text x="92" y="334" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- maxwritten_clean이 많으면 BGWriter</text>
  <text x="92" y="352" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 설정 부족 → bgwriter_lru_maxpages 증가</text>

  <!-- Right -->
  <rect x="450" y="92" width="370" height="280" rx="12" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">설정 튜닝 &amp; 수동 체크포인트</text>
  <rect x="466" y="124" width="338" height="232" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="482" y="148" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 수동 체크포인트 (DBA용)</text>
  <text x="482" y="166" font-size="12" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">CHECKPOINT</tspan>;</text>

  <text x="482" y="194" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- postgresql.conf 권장 설정</text>
  <text x="482" y="212" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- checkpoint_timeout = 15min</text>
  <text x="482" y="230" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- max_wal_size = 4GB</text>
  <text x="482" y="248" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- checkpoint_completion_target = 0.9</text>
  <text x="482" y="266" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- bgwriter_lru_maxpages = 200</text>

  <text x="482" y="294" font-size="12" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 현재 설정 확인</text>
  <text x="482" y="312" font-size="12" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> name, setting, unit</text>
  <text x="482" y="330" font-size="12" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  pg_settings</text>
  <text x="482" y="348" font-size="12" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">WHERE</tspan> name <tspan fill="#7ec8e3">LIKE</tspan> <tspan fill="#ce9178">'%checkpoint%'</tspan></text>
  <text x="482" y="366" font-size="12" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  <tspan fill="#7ec8e3">OR</tspan> name <tspan fill="#7ec8e3">LIKE</tspan> <tspan fill="#ce9178">'%bgwriter%'</tspan>;</text>
</svg>
