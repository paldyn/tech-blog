<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">개체명 인식(NER): BIO 태깅 시각화</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">"홍길동이 서울대학교에서 발표했다" — 토큰 단위 BIO 태깅 및 BERT 기반 아키텍처</text>

  <!-- ===== TOP: TOKEN BIO TAGGING ===== -->
  <text x="84" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">BIO 태깅 예시</text>

  <!-- Token boxes -->
  <!-- Token 1: 홍길동 → B-PER -->
  <rect x="60" y="112" width="80" height="44" fill="#1a1630" rx="6" stroke="#7777cc" stroke-width="2"/>
  <text x="100" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">홍길동</text>
  <text x="100" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">B-PER</text>

  <!-- Token 2: 이 → O -->
  <rect x="148" y="112" width="44" height="44" fill="#111827" rx="6" stroke="#333" stroke-width="1.5"/>
  <text x="170" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">이</text>
  <text x="170" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">O</text>

  <!-- Token 3: 서울 → B-ORG -->
  <rect x="200" y="112" width="60" height="44" fill="#0d1a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="230" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">서울</text>
  <text x="230" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">B-ORG</text>

  <!-- Token 4: 대학교 → I-ORG -->
  <rect x="268" y="112" width="72" height="44" fill="#0d1a1a" rx="6" stroke="#55c555" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="304" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">대학교</text>
  <text x="304" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">I-ORG</text>

  <!-- Token 5: 에서 → O -->
  <rect x="348" y="112" width="56" height="44" fill="#111827" rx="6" stroke="#333" stroke-width="1.5"/>
  <text x="376" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">에서</text>
  <text x="376" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">O</text>

  <!-- Token 6: 발표 → O -->
  <rect x="412" y="112" width="56" height="44" fill="#111827" rx="6" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">발표</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">O</text>

  <!-- Token 7: 했다 → O -->
  <rect x="476" y="112" width="56" height="44" fill="#111827" rx="6" stroke="#333" stroke-width="1.5"/>
  <text x="504" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">했다</text>
  <text x="504" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">O</text>

  <!-- Entity span brackets -->
  <!-- PER span: 홍길동 -->
  <line x1="60" y1="165" x2="140" y2="165" stroke="#7777cc" stroke-width="2"/>
  <line x1="60" y1="165" x2="60" y2="158" stroke="#7777cc" stroke-width="2"/>
  <line x1="140" y1="165" x2="140" y2="158" stroke="#7777cc" stroke-width="2"/>
  <text x="100" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">PER: 홍길동</text>

  <!-- ORG span: 서울대학교 -->
  <line x1="200" y1="165" x2="340" y2="165" stroke="#55c555" stroke-width="2"/>
  <line x1="200" y1="165" x2="200" y2="158" stroke="#55c555" stroke-width="2"/>
  <line x1="340" y1="165" x2="340" y2="158" stroke="#55c555" stroke-width="2"/>
  <text x="270" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">ORG: 서울대학교</text>

  <!-- Legend for BIO -->
  <rect x="556" y="108" width="280" height="92" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="572" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">BIO 태그 의미</text>
  <rect x="572" y="138" width="10" height="10" fill="#7777cc" rx="2"/>
  <text x="588" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">B- (Beginning): 개체명 시작</text>
  <rect x="572" y="158" width="10" height="10" fill="#7ec8e3" rx="2"/>
  <text x="588" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">I- (Inside): 개체명 내부</text>
  <rect x="572" y="178" width="10" height="10" fill="#333" rx="2"/>
  <text x="588" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">O (Outside): 개체명 아님</text>

  <!-- ===== MIDDLE: ENTITY TYPES TABLE ===== -->
  <rect x="60" y="202" width="456" height="130" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">주요 개체명 유형 (NE Types)</text>

  <!-- Type table -->
  <text x="100" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">PER</text>
  <text x="100" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">인물</text>
  <text x="100" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">홍길동, 이순신</text>

  <line x1="152" y1="236" x2="152" y2="318" stroke="#3a4a6e" stroke-width="1"/>

  <text x="196" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">ORG</text>
  <text x="196" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기관/조직</text>
  <text x="196" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">삼성, 서울대</text>

  <line x1="244" y1="236" x2="244" y2="318" stroke="#3a4a6e" stroke-width="1"/>

  <text x="284" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">LOC</text>
  <text x="284" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">장소/지명</text>
  <text x="284" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">서울, 부산</text>

  <line x1="332" y1="236" x2="332" y2="318" stroke="#3a4a6e" stroke-width="1"/>

  <text x="372" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">DATE</text>
  <text x="372" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">날짜/시간</text>
  <text x="372" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">2024년 1월</text>

  <line x1="420" y1="236" x2="420" y2="318" stroke="#3a4a6e" stroke-width="1"/>

  <text x="452" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">MISC</text>
  <text x="452" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기타</text>
  <text x="452" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">제품, 이벤트</text>

  <!-- BIOES note -->
  <rect x="60" y="300" width="456" height="30" fill="#1a1a1a" rx="4" stroke="#3a4a6e"/>
  <text x="288" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">BIOES 확장: B(시작) I(내부) O(외부) E(끝) S(단일) — BIO보다 경계 정보 풍부</text>

  <!-- ===== BOTTOM: BERT NER ARCHITECTURE ===== -->
  <rect x="60" y="352" width="756" height="136" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">BERT 기반 NER 아키텍처</text>

  <!-- Flow boxes -->
  <rect x="80" y="386" width="96" height="40" fill="#111827" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="128" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">입력 토큰</text>
  <text x="128" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">[CLS] 홍 길 동...</text>

  <polygon points="180,400 194,400 194,394 208,406 194,418 194,412 180,412" fill="#555"/>

  <rect x="212" y="386" width="96" height="40" fill="#111827" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">WordPiece</text>
  <text x="260" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">토크나이저</text>

  <polygon points="312,400 326,400 326,394 340,406 326,418 326,412 312,412" fill="#555"/>

  <rect x="344" y="386" width="96" height="40" fill="#0d1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="392" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">BERT</text>
  <text x="392" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">Encoder</text>

  <polygon points="444,400 458,400 458,394 472,406 458,418 458,412 444,412" fill="#555"/>

  <rect x="476" y="386" width="96" height="40" fill="#111827" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="524" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Linear</text>
  <text x="524" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">Classifier</text>

  <polygon points="576,400 590,400 590,394 604,406 590,418 590,412 576,412" fill="#555"/>

  <rect x="608" y="386" width="96" height="40" fill="#111827" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="656" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">BIO 태그</text>
  <text x="656" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">B-PER, I-ORG...</text>

  <!-- Evaluation metrics -->
  <rect x="80" y="440" width="624" height="36" fill="#111827" rx="4" stroke="#3a4a6e"/>
  <text x="84" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">평가 지표:</text>
  <text x="160" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Precision</text>
  <text x="240" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">= TP / (TP+FP)</text>
  <text x="360" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Recall</text>
  <text x="410" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">= TP / (TP+FN)</text>
  <text x="530" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">F1</text>
  <text x="552" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">= 2×P×R / (P+R)</text>
  <text x="84" y="471" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">※ 스팬 단위로 측정 (B-/I- 태그가 모두 맞아야 정답으로 인정)</text>
</svg>
