<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">런타임 = 엔진 + 추가 레이어</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">같은 JS 엔진, 다른 API — 런타임이 제공하는 것들</text>

  <!-- Left: Browser Runtime stack (x=60, width=340) -->
  <text x="230" y="108" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">브라우저 런타임</text>

  <!-- Layer 5 (top): Web APIs -->
  <rect x="60" y="118" width="340" height="44" fill="#0f1a2a" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="230" y="136" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Web APIs</text>
  <text x="230" y="153" font-size="11" fill="#888" text-anchor="middle">DOM · Fetch · Canvas · WebGL · Web Audio</text>

  <!-- Layer 4: Event Loop + Task Queue -->
  <rect x="60" y="170" width="340" height="44" fill="#0f1a2a" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="230" y="188" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">이벤트 루프 + 태스크 큐</text>
  <text x="230" y="205" font-size="11" fill="#888" text-anchor="middle">setTimeout · Promise microtask</text>

  <!-- Layer 3: V8 / SpiderMonkey / JSC -->
  <rect x="60" y="222" width="340" height="44" fill="#0a1520" rx="6" stroke="#3a4a6a" stroke-width="1"/>
  <text x="230" y="240" font-size="12" font-weight="600" fill="#5a7aaa" text-anchor="middle">JS 엔진</text>
  <text x="230" y="257" font-size="11" fill="#666" text-anchor="middle">V8 / SpiderMonkey / JavaScriptCore</text>

  <!-- Layer 2: C++ Bindings -->
  <rect x="60" y="274" width="340" height="36" fill="#0a1520" rx="6" stroke="#2a3a5a" stroke-width="1"/>
  <text x="230" y="297" font-size="11" fill="#555" text-anchor="middle">C++ 바인딩 (렌더러·네트워크 통합)</text>

  <!-- Layer 1 (bottom): OS -->
  <rect x="60" y="318" width="340" height="36" fill="#080e18" rx="6" stroke="#1a2a3a" stroke-width="1"/>
  <text x="230" y="341" font-size="11" fill="#444" text-anchor="middle">운영체제 (OS) · 네트워크 스택</text>

  <!-- Right: Node.js Runtime stack (x=480, width=340) -->
  <text x="650" y="108" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Node.js 런타임</text>

  <!-- Layer 5: Node.js Core APIs -->
  <rect x="480" y="118" width="340" height="44" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="136" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Node.js Core APIs</text>
  <text x="650" y="153" font-size="11" fill="#888" text-anchor="middle">fs · http · path · crypto · stream</text>

  <!-- Layer 4: libuv Event Loop -->
  <rect x="480" y="170" width="340" height="44" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="188" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">libuv — 이벤트 루프</text>
  <text x="650" y="205" font-size="11" fill="#888" text-anchor="middle">I/O · 타이머 · 스레드 풀</text>

  <!-- Layer 3: V8 -->
  <rect x="480" y="222" width="340" height="44" fill="#0a1520" rx="6" stroke="#3a4a6a" stroke-width="1"/>
  <text x="650" y="240" font-size="12" font-weight="600" fill="#5a7aaa" text-anchor="middle">V8 엔진</text>
  <text x="650" y="257" font-size="11" fill="#666" text-anchor="middle">Google V8 · JIT 컴파일</text>

  <!-- Layer 2: C++ Addons / N-API -->
  <rect x="480" y="274" width="340" height="36" fill="#0a1520" rx="6" stroke="#2a3a5a" stroke-width="1"/>
  <text x="650" y="297" font-size="11" fill="#555" text-anchor="middle">C++ Addons · N-API · native 모듈</text>

  <!-- Layer 1: OS -->
  <rect x="480" y="318" width="340" height="36" fill="#080e18" rx="6" stroke="#1a2a3a" stroke-width="1"/>
  <text x="650" y="341" font-size="11" fill="#444" text-anchor="middle">운영체제 (OS) · 파일 시스템 · 네트워크</text>

  <!-- dashed vertical line between stacks at x=440 center (drawn first) -->
  <line x1="440" y1="118" x2="440" y2="354" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Center gap labels with masking rects (drawn after the line) -->
  <rect x="416" y="222" width="48" height="16" fill="#0a0a0a"/>
  <text x="440" y="234" font-size="11" fill="#555" text-anchor="middle">엔진</text>
  <rect x="416" y="238" width="48" height="16" fill="#0a0a0a"/>
  <text x="440" y="250" font-size="11" fill="#555" text-anchor="middle">공유</text>

  <!-- Bottom key insight -->
  <rect x="60" y="374" width="760" height="62" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="396" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">핵심 인사이트</text>
  <text x="440" y="414" font-size="12" fill="#888" text-anchor="middle">런타임은 엔진에 API를 더한 것 — 엔진이 같아도 런타임이 다르면 사용 가능한 API가 다릅니다</text>
  <text x="440" y="430" font-size="12" fill="#666" text-anchor="middle">브라우저에서 fs.readFile()을 못 쓰고, Node.js에서 document.querySelector()를 못 쓰는 이유</text>

  <!-- Footer -->
  <text x="60" y="472" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part I — 런타임 환경</text>
</svg>
