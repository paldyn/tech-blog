<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#555"/>
    </marker>
    <marker id="arr-acc" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CLIP 아키텍처: 텍스트와 이미지를 같은 공간으로</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">이미지 인코더 + 텍스트 인코더 → 512차원 공유 임베딩 공간 → 대조 학습</text>

  <!-- ===== IMAGE BRANCH (top) ===== -->
  <!-- Image input -->
  <rect x="60" y="100" width="130" height="96" fill="#111827" rx="8" stroke="#1e2a3a" stroke-width="1.5"/>
  <text x="125" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">입력 이미지</text>
  <rect x="76" y="132" width="32" height="32" fill="#1e2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="80" y="136" width="10" height="10" fill="#7ec8e3" opacity="0.6" rx="1"/>
  <rect x="94" y="136" width="10" height="10" fill="#55c555" opacity="0.4" rx="1"/>
  <rect x="80" y="150" width="10" height="10" fill="#7777cc" opacity="0.4" rx="1"/>
  <rect x="94" y="150" width="10" height="10" fill="#e05555" opacity="0.3" rx="1"/>
  <rect x="114" y="132" width="32" height="32" fill="#1e2a3a" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <circle cx="130" cy="148" r="11" fill="#7ec8e3" opacity="0.25"/>
  <circle cx="130" cy="148" r="5" fill="#7ec8e3" opacity="0.5"/>
  <text x="125" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">224×224 px</text>

  <!-- Arrow image → ViT -->
  <polygon points="194,142 208,142 208,136 222,148 208,160 208,154 194,154" fill="#555"/>

  <!-- ViT Encoder -->
  <rect x="226" y="106" width="128" height="84" fill="#0d1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="290" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Image Encoder</text>
  <text x="290" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ViT</text>
  <text x="290" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">(Vision Transformer)</text>
  <text x="290" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">패치 분할 → 어텐션</text>

  <!-- Arrow ViT → Image Proj -->
  <polygon points="358,142 372,142 372,136 386,148 372,160 372,154 358,154" fill="#555"/>

  <!-- Image Projection -->
  <rect x="390" y="112" width="96" height="72" fill="#0d1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="438" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Projection</text>
  <text x="438" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Linear Layer</text>
  <text x="438" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">+ L2 정규화</text>

  <!-- Arrow Image Proj → Shared Space -->
  <line x1="486" y1="148" x2="518" y2="200" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-acc)"/>

  <!-- ===== TEXT BRANCH (bottom) ===== -->
  <!-- Text input -->
  <rect x="60" y="268" width="130" height="84" fill="#111827" rx="8" stroke="#1e2a3a" stroke-width="1.5"/>
  <text x="125" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">입력 텍스트</text>
  <rect x="72" y="300" width="106" height="22" fill="#1e2a3a" rx="3"/>
  <text x="125" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">"a cat on a mat"</text>
  <text x="125" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">토큰화 → ID 변환</text>

  <!-- Arrow text → Transformer -->
  <polygon points="194,302 208,302 208,296 222,308 208,320 208,314 194,314" fill="#555"/>

  <!-- Text Transformer Encoder -->
  <rect x="226" y="270" width="128" height="84" fill="#0d1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="290" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Text Encoder</text>
  <text x="290" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Transformer</text>
  <text x="290" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(GPT-style)</text>
  <text x="290" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">[EOS] 표현 추출</text>

  <!-- Arrow Transformer → Text Proj -->
  <polygon points="358,306 372,306 372,300 386,312 372,324 372,318 358,318" fill="#555"/>

  <!-- Text Projection -->
  <rect x="390" y="276" width="96" height="72" fill="#0d1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="438" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Projection</text>
  <text x="438" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Linear Layer</text>
  <text x="438" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">+ L2 정규화</text>

  <!-- Arrow Text Proj → Shared Space -->
  <line x1="486" y1="312" x2="518" y2="266" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-acc)"/>

  <!-- ===== SHARED EMBEDDING SPACE ===== -->
  <rect x="524" y="100" width="296" height="316" fill="#0d1a2e" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="672" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">공유 임베딩 공간 (512차원)</text>

  <!-- Similarity matrix label -->
  <text x="672" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">N×N 코사인 유사도 행렬</text>

  <!-- Matrix grid 4x4 -->
  <text x="580" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">I₁</text>
  <text x="620" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">I₂</text>
  <text x="660" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">I₃</text>
  <text x="700" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">I₄</text>

  <text x="548" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">T₁</text>
  <text x="548" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">T₂</text>
  <text x="548" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">T₃</text>
  <text x="548" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">T₄</text>

  <!-- Row 1 -->
  <rect x="560" y="181" width="36" height="24" fill="#55c555" opacity="0.85" rx="3"/>
  <text x="578" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">0.92</text>
  <rect x="600" y="181" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="618" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.12</text>
  <rect x="640" y="181" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="658" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.08</text>
  <rect x="680" y="181" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="698" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.05</text>

  <!-- Row 2 -->
  <rect x="560" y="217" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="578" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.11</text>
  <rect x="600" y="217" width="36" height="24" fill="#55c555" opacity="0.85" rx="3"/>
  <text x="618" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">0.89</text>
  <rect x="640" y="217" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="658" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.09</text>
  <rect x="680" y="217" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="698" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.07</text>

  <!-- Row 3 -->
  <rect x="560" y="253" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="578" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.06</text>
  <rect x="600" y="253" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="618" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.10</text>
  <rect x="640" y="253" width="36" height="24" fill="#55c555" opacity="0.85" rx="3"/>
  <text x="658" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">0.94</text>
  <rect x="680" y="253" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="698" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.04</text>

  <!-- Row 4 -->
  <rect x="560" y="289" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="578" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.07</text>
  <rect x="600" y="289" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="618" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.08</text>
  <rect x="640" y="289" width="36" height="24" fill="#1e2a3a" rx="3"/>
  <text x="658" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0.06</text>
  <rect x="680" y="289" width="36" height="24" fill="#55c555" opacity="0.85" rx="3"/>
  <text x="698" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">0.91</text>

  <!-- Legend -->
  <rect x="540" y="330" width="14" height="10" fill="#55c555" opacity="0.85" rx="2"/>
  <text x="558" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">매칭 쌍 (높은 유사도 → 최대화)</text>
  <rect x="540" y="350" width="14" height="10" fill="#1e2a3a" rx="2" stroke="#555"/>
  <text x="558" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비매칭 쌍 (낮은 유사도 → 최소화)</text>
  <text x="540" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Loss = -log[softmax(sim_matrix)의 대각선 평균]</text>
  <text x="540" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">이미지→텍스트 방향 + 텍스트→이미지 방향 두 손실의 평균</text>

  <!-- ===== CONTRASTIVE LOSS SECTION ===== -->
  <rect x="60" y="448" width="756" height="68" fill="#111118" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Zero-Shot 활용: 새로운 클래스도 텍스트 프롬프트만으로 분류 가능</text>
  <text x="84" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이미지 임베딩 vs "a photo of a {class}" 텍스트 임베딩 비교 → 가장 유사한 텍스트 레이블 선택</text>
  <text x="84" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">ImageBind 확장: 오디오·깊이맵·IMU·열화상 등 6가지 모달리티를 단일 임베딩 공간으로 통합</text>
</svg>
