<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">타입 단언 도구들</text>
  <text x="60" y="76" font-size="14" fill="#888">expectTypeOf 매처와 @ts-expect-error로 타입을 단언한다</text>

  <!-- expectTypeOf matchers box -->
  <rect x="60" y="100" width="360" height="290" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="84" y="134" font-size="16" font-weight="600" fill="#e8e8e8">expectTypeOf 매처</text>
  <text x="84" y="166" font-size="13" fill="#7ec8e3" font-weight="600">.toEqualTypeOf&lt;T&gt;()</text>
  <text x="84" y="186" font-size="13" fill="#888">정확히 같은 타입인가</text>
  <text x="84" y="218" font-size="13" fill="#7ec8e3" font-weight="600">.toMatchTypeOf&lt;T&gt;()</text>
  <text x="84" y="238" font-size="13" fill="#888">T에 할당 가능한가 (부분 일치)</text>
  <text x="84" y="270" font-size="13" fill="#7ec8e3" font-weight="600">.parameters / .returns</text>
  <text x="84" y="290" font-size="13" fill="#888">함수 시그니처를 분해</text>
  <text x="84" y="322" font-size="13" fill="#7ec8e3" font-weight="600">.toBeNever() / .toBeAny()</text>
  <text x="84" y="342" font-size="13" fill="#888">특수 타입을 직접 검사</text>
  <text x="84" y="372" font-size="13" fill="#9aa4b8">실패 시 컴파일이 멈춘다</text>

  <!-- @ts-expect-error box -->
  <rect x="460" y="100" width="360" height="290" fill="#101418" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="484" y="134" font-size="16" font-weight="600" fill="#e8e8e8">@ts-expect-error</text>
  <text x="484" y="158" font-size="13" fill="#888">"여기서 타입 에러가 나야 정상"</text>
  <rect x="484" y="176" width="312" height="180" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="500" y="202" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// add는 number만 받는다</text>
  <text xml:space="preserve" x="500" y="226" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// @ts-expect-error</text>
  <text xml:space="preserve" x="500" y="250" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">add(<tspan fill="#ce9178">"2"</tspan>, <tspan fill="#b5cea8">3</tspan>);</text>
  <text xml:space="preserve" x="500" y="282" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 에러가 안 나면</text>
  <text xml:space="preserve" x="500" y="306" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 오히려 컴파일 실패</text>
  <text xml:space="preserve" x="500" y="338" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">// 음수 테스트 = 통과</text>
  <text x="484" y="378" font-size="13" fill="#9aa4b8">잘못 받는 입력을 막았는지 검증</text>
</svg>
