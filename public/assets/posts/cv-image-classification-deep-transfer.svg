<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">전이학습 전략: Feature Extract vs Fine-Tuning</text>

  <!-- Left: Feature Extraction -->
  <rect x="40" y="70" width="370" height="370" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="225" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Feature Extraction</text>
  <text x="225" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(백본 가중치 동결)</text>

  <!-- Pretrained Backbone frozen -->
  <rect x="70" y="135" width="290" height="140" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="215" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888" text-anchor="middle">사전학습 백본 (동결 🔒)</text>
  <text x="215" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">Conv Layer 1</text>
  <text x="215" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">Conv Layer 2</text>
  <text x="215" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">Conv Layer 3</text>
  <text x="215" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">Global Avg Pool</text>
  <text x="215" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">Feature Vector (2048d)</text>

  <!-- Arrow -->
  <line x1="215" y1="275" x2="215" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- New Classifier -->
  <rect x="100" y="302" width="230" height="60" rx="8" fill="#0f2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="215" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">새 분류기 (학습 ✅)</text>
  <text x="215" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">FC → Softmax (N class)</text>

  <!-- Pros/Cons -->
  <text x="70" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 빠른 학습  ✓ 소량 데이터 OK</text>
  <text x="70" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗ 최고 성능 불가  ✗ 도메인 차이 민감</text>

  <!-- Right: Fine-Tuning -->
  <rect x="470" y="70" width="370" height="370" rx="10" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="655" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#ce9178" text-anchor="middle">Fine-Tuning</text>
  <text x="655" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(백본 일부/전체 재학습)</text>

  <!-- Pretrained Backbone partial unfreeze -->
  <rect x="500" y="135" width="290" height="80" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="645" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888" text-anchor="middle">초기 레이어 (동결 🔒)</text>
  <text x="645" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">저수준 엣지·텍스처 특징</text>
  <text x="645" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">Conv Layer 1, 2</text>

  <!-- Partial unfreeze -->
  <rect x="500" y="222" width="290" height="80" rx="8" fill="#1a0f0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="645" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">후기 레이어 (재학습 ✅)</text>
  <text x="645" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">고수준 의미 특징</text>
  <text x="645" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">Conv 3, 4 + GAP</text>

  <!-- Arrow -->
  <line x1="645" y1="302" x2="645" y2="316" stroke="#ce9178" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- New Classifier -->
  <rect x="530" y="318" width="230" height="60" rx="8" fill="#2a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="645" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">새 분류기 (학습 ✅)</text>
  <text x="645" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">FC → Softmax (N class)</text>

  <!-- Pros/Cons -->
  <text x="500" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 최고 성능  ✓ 도메인 적응 우수</text>
  <text x="500" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗ 많은 데이터 필요  ✗ 느린 학습</text>

  <!-- Bottom note -->
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">lr: Feature Extraction 1e-3 / Fine-Tuning 후기 1e-4, 초기 1e-5</text>
</svg>
