<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">클로저 — 자유 변수와 스코프</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">내부 함수가 외부 함수의 변수를 기억한다</text>

  <!-- Code block (left) -->
  <rect x="60" y="90" width="400" height="202" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> make_adder(n):      </tspan><tspan fill="#888"># 외부</tspan></text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    def</tspan><tspan fill="#e8e8e8"> add(x):          </tspan><tspan fill="#888"># 내부</tspan></text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">        return</tspan><tspan fill="#e8e8e8"> x + n  </tspan><tspan fill="#888"># n 캡처</tspan></text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#e8e8e8"> add</tspan></text>

  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">add5 = make_adder(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">add10 = make_adder(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">add5(</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">)    </tspan><tspan fill="#888"># 8   (n=5  기억)</tspan></text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">add10(</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">)   </tspan><tspan fill="#888"># 13  (n=10 기억)</tspan></text>

  <!-- Scope diagram (right) -->
  <rect x="500" y="90" width="320" height="360" fill="#070b14" rx="8" stroke="#1e2433"/>
  <text x="660" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">스코프 구조</text>

  <!-- Global scope box -->
  <rect x="516" y="132" width="288" height="296" fill="#0a1020" rx="6" stroke="#1e2433"/>
  <text x="660" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전역 스코프</text>

  <!-- Enclosing scope box -->
  <rect x="530" y="164" width="260" height="222" fill="#071018" rx="6" stroke="#7ec8e3"/>
  <text x="660" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">make_adder 스코프</text>
  <rect x="548" y="194" width="80" height="28" fill="#0f1825" rx="4"/>
  <text x="588" y="212" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">n = 5</text>

  <!-- Local scope box -->
  <rect x="544" y="234" width="232" height="130" fill="#060e18" rx="6" stroke="#55c555"/>
  <text x="660" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">add 스코프 (클로저)</text>
  <rect x="560" y="264" width="80" height="28" fill="#0f1825" rx="4"/>
  <text x="600" y="282" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">x = 3</text>

  <!-- Free variable arrow -->
  <line x1="640" y1="278" x2="640" y2="222" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="635,228 640,218 645,228" fill="#7ec8e3"/>
  <text x="650" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">자유 변수 n 참조</text>

  <text x="544" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">make_adder 종료 후에도 n 유지</text>
  <text x="544" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">add5.__closure__[0].cell_contents == 5</text>

  <!-- LEGB label -->
  <rect x="60" y="318" width="400" height="40" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="260" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">LEGB: Local → Enclosing → Global → Built-in</text>

  <rect x="60" y="378" width="400" height="62" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">print(add5.__closure__[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">].cell_contents)</tspan></text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 5  — 캡처된 변수 확인</text>
</svg>
