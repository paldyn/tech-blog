<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">예외 연결 구조: __cause__ vs __context__</text>

  <!-- Attr comparison table -->
  <!-- Header row -->
  <rect x="55" y="65" width="770" height="44" rx="6" fill="#0c1628" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">속성</text>
  <text x="440" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">설정 방법</text>
  <text x="700" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">트레이스백 메시지</text>
  <line x1="305" y1="65" x2="305" y2="109" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="575" y1="65" x2="575" y2="109" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1: __cause__ -->
  <rect x="55" y="109" width="770" height="54" rx="0" fill="#0c1c0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="131" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">__cause__</text>
  <text x="200" y="152" text-anchor="middle" font-size="11" fill="#888">명시적 연결</text>
  <text x="440" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">raise B() from A</text>
  <text x="700" y="131" text-anchor="middle" font-size="12" fill="#55c555">The above exception was</text>
  <text x="700" y="152" text-anchor="middle" font-size="12" fill="#55c555">the direct cause of ...</text>
  <line x1="305" y1="109" x2="305" y2="163" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="575" y1="109" x2="575" y2="163" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 2: __context__ -->
  <rect x="55" y="163" width="770" height="54" rx="0" fill="#0c1628" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">__context__</text>
  <text x="200" y="206" text-anchor="middle" font-size="11" fill="#888">암묵적 연결</text>
  <text x="440" y="194" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">except 블록 내 raise B()</text>
  <text x="700" y="185" text-anchor="middle" font-size="12" fill="#7ec8e3">During handling of the</text>
  <text x="700" y="206" text-anchor="middle" font-size="12" fill="#7ec8e3">above exception, another ...</text>
  <line x1="305" y1="163" x2="305" y2="217" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="575" y1="163" x2="575" y2="217" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 3: from None -->
  <rect x="55" y="217" width="770" height="54" rx="0" fill="#1a1000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">__suppress__</text>
  <text x="200" y="260" text-anchor="middle" font-size="11" fill="#888">연결 억제</text>
  <text x="440" y="248" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">raise B() from None</text>
  <text x="700" y="248" text-anchor="middle" font-size="12" fill="#ce9178">원인 표시 없음</text>
  <line x1="305" y1="217" x2="305" y2="271" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="575" y1="217" x2="575" y2="271" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Bottom hint -->
  <rect x="55" y="290" width="770" height="44" rx="6" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="311" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3">핵심 원칙</text>
  <text x="440" y="328" text-anchor="middle" font-size="11" fill="#888">외부 API 예외를 감싸 재발생시킬 때는 raise NewError() from original_err — 원인을 명확히 남긴다</text>
</svg>
