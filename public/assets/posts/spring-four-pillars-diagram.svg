<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="a2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="a3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
    <marker id="a4" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring 4대 핵심 특징</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">IoC / DI / AOP / PSA 관계도</text>

  <!-- Center POJO -->
  <rect x="340" y="230" width="200" height="70" rx="8" fill="#111" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">POJO</text>
  <text x="440" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비즈니스 로직의 핵심</text>

  <!-- IoC top-left -->
  <rect x="60" y="100" width="220" height="110" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">IoC (제어의 역전)</text>
  <text x="170" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ApplicationContext가</text>
  <text x="170" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">객체 생명주기 관리</text>
  <text x="170" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Hollywood Principle</text>

  <!-- DI top-right -->
  <rect x="600" y="100" width="220" height="110" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">DI (의존성 주입)</text>
  <text x="710" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">생성자/세터/필드 주입으로</text>
  <text x="710" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">의존 객체를 외부에서 공급</text>
  <text x="710" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">IoC 구현 기법</text>

  <!-- AOP bottom-left -->
  <rect x="60" y="360" width="220" height="110" rx="8" fill="#0d1520" stroke="#ce9178" stroke-width="1.5"/>
  <text x="170" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">AOP (관점 지향)</text>
  <text x="170" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Aspect로 횡단 관심사 분리</text>
  <text x="170" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">프록시 기반 동작</text>
  <text x="170" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">로깅, 트랜잭션, 보안</text>

  <!-- PSA bottom-right -->
  <rect x="600" y="360" width="220" height="110" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">PSA (서비스 추상화)</text>
  <text x="710" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">기술 구현 변경에도</text>
  <text x="710" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">동일 인터페이스 유지</text>
  <text x="710" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">JDBC, JMS, Cache, Tx</text>

  <!-- Arrows IoC -> POJO -->
  <line x1="280" y1="155" x2="338" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#a1)"/>
  <!-- Arrows DI -> POJO -->
  <line x1="600" y1="155" x2="542" y2="250" stroke="#7777cc" stroke-width="2" marker-end="url(#a2)"/>
  <!-- Arrows AOP -> POJO -->
  <line x1="280" y1="415" x2="338" y2="285" stroke="#ce9178" stroke-width="2" marker-end="url(#a3)"/>
  <!-- Arrows PSA -> POJO -->
  <line x1="600" y1="415" x2="542" y2="285" stroke="#55c555" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Bottom summary -->
  <rect x="60" y="490" width="760" height="34" rx="6" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="440" y="513" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">4대 특징은 모두 POJO를 보호하고 강화하는 방향으로 작동한다</text>
</svg>
