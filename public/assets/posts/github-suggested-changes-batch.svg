<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">제안을 모아서 한 커밋으로</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">여러 suggestion을 Batch로 묶으면 커밋 하나로 적용된다</text>

  <!-- suggestions -->
  <rect x="60" y="116" width="220" height="44" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1.3"/>
  <text x="170" y="143" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">제안 ① 변수명 수정</text>

  <rect x="60" y="176" width="220" height="44" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1.3"/>
  <text x="170" y="203" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">제안 ② 오타 수정</text>

  <rect x="60" y="236" width="220" height="44" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1.3"/>
  <text x="170" y="263" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">제안 ③ 들여쓰기 정리</text>

  <!-- batch box -->
  <rect x="360" y="170" width="180" height="56" rx="8" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="450" y="195" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">Add to batch</text>
  <text x="450" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">제안 묶기</text>

  <line x1="280" y1="138" x2="356" y2="184" stroke="#9988dd" stroke-width="2"/>
  <line x1="280" y1="198" x2="356" y2="198" stroke="#9988dd" stroke-width="2"/>
  <line x1="280" y1="258" x2="356" y2="212" stroke="#9988dd" stroke-width="2"/>

  <line x1="540" y1="198" x2="618" y2="198" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- result commit -->
  <rect x="620" y="170" width="200" height="56" rx="8" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="195" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Commit suggestions</text>
  <text x="720" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">커밋 1개로 일괄 반영</text>
</svg>
