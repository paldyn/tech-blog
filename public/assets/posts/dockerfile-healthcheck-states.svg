<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">컨테이너 헬스 상태 머신</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle" xml:space="preserve">HEALTHCHECK가 정의된 컨테이너의 생명 주기</text>

  <!-- State: starting -->
  <rect x="60" y="110" width="180" height="80" fill="#1a1a2e" rx="10" stroke="#7777cc" stroke-width="2"/>
  <text x="150" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle" xml:space="preserve">starting</text>
  <text x="150" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">컨테이너 실행 직후</text>

  <!-- Arrow: starting → healthy -->
  <line x1="240" y1="150" x2="330" y2="150" stroke="#55c555" stroke-width="2"/>
  <polygon points="330,144 342,150 330,156" fill="#55c555"/>
  <text x="285" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle" xml:space="preserve">성공(0)</text>

  <!-- State: healthy -->
  <rect x="342" y="110" width="180" height="80" fill="#0d2818" rx="10" stroke="#55c555" stroke-width="2"/>
  <text x="432" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle" xml:space="preserve">healthy</text>
  <text x="432" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">정상 동작 중</text>

  <!-- Arrow: healthy → unhealthy -->
  <line x1="522" y1="150" x2="618" y2="150" stroke="#e05555" stroke-width="2"/>
  <polygon points="618,144 630,150 618,156" fill="#e05555"/>
  <text x="570" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle" xml:space="preserve">retries 초과</text>

  <!-- Arrow: starting → unhealthy (below) -->
  <path d="M150 190 Q150 240 630 240 Q640 240 640 220" fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="634,220 640,208 646,220" fill="#e05555"/>
  <text x="370" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle" xml:space="preserve">start-period 후에도 실패 반복</text>

  <!-- State: unhealthy -->
  <rect x="630" y="110" width="190" height="80" fill="#2a0d0d" rx="10" stroke="#e05555" stroke-width="2"/>
  <text x="725" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle" xml:space="preserve">unhealthy</text>
  <text x="725" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">응답 없음 / 오류</text>

  <!-- Arrow: unhealthy → healthy (recovery) -->
  <path d="M725 110 Q725 70 432 70 Q432 90 432 110" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="426,110 432,122 438,110" fill="#55c555"/>
  <text x="570" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle" xml:space="preserve">성공(0) → 회복</text>

  <!-- Divider -->
  <line x1="60" y1="300" x2="820" y2="300" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Bottom: docker inspect output -->
  <text x="60" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" xml:space="preserve">상태 확인 — docker inspect</text>

  <rect x="60" y="344" width="360" height="90" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">"Health": {</text>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  "Status": "healthy",</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">  "FailingStreak": 0,</text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- docker ps output -->
  <rect x="460" y="344" width="360" height="90" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="476" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># docker ps 상태 컬럼</text>
  <text x="476" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">Up 5 minutes (healthy)</text>
  <text x="476" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">Up 2 minutes (unhealthy)</text>
  <text x="476" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" xml:space="preserve">Up 10 seconds (health: starting)</text>
</svg>
