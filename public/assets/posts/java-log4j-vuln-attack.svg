<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Log4Shell 공격 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">로그에 찍힌 문자열이 코드를 실행한다</text>

  <defs>
    <marker id="lvArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect x="40" y="110" width="180" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">① 공격자 입력</text>
  <text x="130" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" text-anchor="middle">${jndi:ldap://...}</text>

  <rect x="350" y="110" width="180" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">② 서버가 로깅</text>
  <text x="440" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">log.info(userAgent)</text>

  <rect x="660" y="110" width="180" height="80" rx="8" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="750" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">③ JNDI 룩업</text>
  <text x="750" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메시지 치환 평가</text>

  <line x1="220" y1="150" x2="350" y2="150" stroke="#e05555" stroke-width="2.5" marker-end="url(#lvArr)"/>
  <line x1="530" y1="150" x2="660" y2="150" stroke="#e05555" stroke-width="2.5" marker-end="url(#lvArr)"/>

  <rect x="350" y="250" width="180" height="80" rx="8" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">⑤ RCE</text>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">원격 코드 실행</text>

  <rect x="660" y="250" width="180" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="750" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">④ 악성 클래스</text>
  <text x="750" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공격자 서버에서 로드</text>

  <line x1="750" y1="190" x2="750" y2="250" stroke="#e05555" stroke-width="2.5" marker-end="url(#lvArr)"/>
  <line x1="660" y1="290" x2="530" y2="290" stroke="#e05555" stroke-width="2.5" marker-end="url(#lvArr)"/>
</svg>
