<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">원시 타입 vs 참조 타입 — 메모리 모델</text>

  <!-- Stack section -->
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">스택 (Stack)</text>
  <rect x="80" y="108" width="320" height="240" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>

  <!-- Primitive values in stack -->
  <rect x="100" y="124" width="280" height="36" rx="5" fill="#0e1a2e"/>
  <text x="140" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">a</text>
  <text x="260" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">42</text>
  <text x="360" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">number</text>

  <rect x="100" y="168" width="280" height="36" rx="5" fill="#0e1a2e"/>
  <text x="140" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">b</text>
  <text x="260" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">42</text>
  <text x="360" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">number</text>

  <text x="240" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">( a === b → true )</text>

  <rect x="100" y="240" width="280" height="36" rx="5" fill="#0e2a1e"/>
  <text x="140" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">obj1 ref</text>
  <text x="260" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">→ 0x001</text>
  <text x="360" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">object</text>

  <rect x="100" y="284" width="280" height="36" rx="5" fill="#0e2a1e"/>
  <text x="140" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">obj2 ref</text>
  <text x="260" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">→ 0x002</text>
  <text x="360" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">object</text>

  <text x="240" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">( obj1 === obj2 → false )</text>

  <!-- Heap section -->
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">힙 (Heap)</text>
  <rect x="480" y="108" width="320" height="240" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1"/>

  <rect x="500" y="150" width="140" height="70" rx="6" fill="#112210"/>
  <text x="570" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">0x001</text>
  <text x="570" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">{ x: 1 }</text>

  <rect x="660" y="190" width="120" height="70" rx="6" fill="#112210"/>
  <text x="720" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">0x002</text>
  <text x="720" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">{ x: 1 }</text>

  <!-- Arrows from stack to heap -->
  <line x1="380" y1="258" x2="498" y2="185" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="498,185 490,192 496,180" fill="#55c555"/>

  <line x1="380" y1="302" x2="658" y2="224" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="658,224 650,228 656,216" fill="#55c555"/>

  <!-- Code block -->
  <rect x="80" y="375" width="720" height="24" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="144" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> obj1 = {x:</text><text x="248" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1</text><text x="262" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}; </text><text x="304" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="352" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> obj2 = {x:</text><text x="456" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1</text><text x="470" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}; obj1 === obj2 → </text><text x="638" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">false</text><text x="674" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"> // 다른 주소</text>

  <text x="440" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
