<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">tr · fold · fmt — 문자 변환과 줄 포맷</text>

  <!-- tr section -->
  <rect x="60" y="68" width="360" height="200" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">tr (translate/delete characters)</text>

  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">표준 입력에서 문자를 1:1로 변환하거나 삭제</text>

  <rect x="80" y="132" width="80" height="26" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">-d</text>
  <text x="175" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">지정 문자 삭제 (delete)</text>

  <rect x="80" y="166" width="80" height="26" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="184" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">-s</text>
  <text x="175" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">연속 문자 압축 (squeeze)</text>

  <rect x="80" y="200" width="80" height="26" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">-c</text>
  <text x="175" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">집합 보완 (complement)</text>

  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">[:alpha:] [:digit:] [:upper:] [:lower:] [:space:]</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">POSIX 문자 클래스 — tr 전용 문법</text>

  <!-- fold & fmt section -->
  <rect x="460" y="68" width="360" height="200" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc">fold · fmt (줄 길이 제어)</text>

  <text x="480" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">긴 텍스트를 지정 폭에서 강제 줄바꿈</text>

  <rect x="480" y="132" width="60" height="26" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="510" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">fold</text>
  <text x="556" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">-w N 폭에서 강제 줄바꿈</text>

  <rect x="480" y="166" width="60" height="26" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="510" y="184" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">fmt</text>
  <text x="556" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">-w N 단어 단위 리플로우</text>

  <text x="480" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">fold -w80 -s long.txt</text>
  <text x="480" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-s: 단어 경계에서만 줄바꿈</text>
  <text x="480" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">fmt -w72 draft.txt</text>

  <!-- tr flow diagram -->
  <text x="60" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">tr 변환 예시</text>

  <rect x="60" y="324" width="180" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="344" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">입력</text>
  <text x="150" y="364" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Hello World</text>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <line x1="242" y1="349" x2="288" y2="349" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="248" y="343" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">tr A-Z a-z</text>

  <rect x="290" y="324" width="160" height="50" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="370" y="344" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">소문자 변환</text>
  <text x="370" y="364" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">hello world</text>

  <line x1="452" y1="349" x2="498" y2="349" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="456" y="343" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">tr -d ' '</text>

  <rect x="500" y="324" width="160" height="50" rx="6" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="580" y="344" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">공백 삭제</text>
  <text x="580" y="364" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">helloworld</text>

  <text x="680" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">tr -s ' '</text>
  <text x="680" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">연속 공백 압축</text>
  <text x="680" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">→ "hello world"</text>

  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">tr은 파일 인수 없음 — 반드시 표준 입력으로 ( &lt; 또는 파이프 )</text>
</svg>
