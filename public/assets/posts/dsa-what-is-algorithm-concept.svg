<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">알고리즘이란 무엇인가</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">문제를 해결하는 단계별 절차의 명확한 명세</text>

  <!-- Input box -->
  <rect x="60" y="110" width="180" height="80" rx="10" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="150" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">입력 (Input)</text>
  <text x="150" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">정렬되지 않은 숫자 배열</text>

  <!-- Arrow input → algorithm -->
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <line x1="240" y1="150" x2="300" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Algorithm box -->
  <rect x="300" y="90" width="280" height="120" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">알고리즘 (Algorithm)</text>
  <text x="440" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Step 1: 첫 번째 원소를 기준으로 선택</text>
  <text x="440" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Step 2: 더 작은 원소와 비교·교환</text>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Step 3: 다음 위치로 이동·반복</text>

  <!-- Arrow algorithm → output -->
  <line x1="580" y1="150" x2="640" y2="150" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Output box -->
  <rect x="640" y="110" width="180" height="80" rx="10" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="730" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">출력 (Output)</text>
  <text x="730" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">오름차순 정렬된 배열</text>

  <!-- Code box -->
  <rect x="60" y="240" width="760" height="190" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="265" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 알고리즘 예시: 선택 정렬 (Selection Sort)</text>
  <text x="76" y="285" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> selectionSort(arr) {</tspan></text>
  <text x="76" y="305" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> i = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">; i </tspan><tspan fill="#ffffff">&lt; arr.length; i++) {</tspan></text>
  <text x="76" y="325" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> minIdx = i;</tspan></text>
  <text x="76" y="345" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> j = i+</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">; j </tspan><tspan fill="#ffffff">&lt; arr.length; j++)</tspan></text>
  <text x="76" y="365" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">      </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (arr[j] </tspan><tspan fill="#ffffff">&lt; arr[minIdx]) minIdx = j;</tspan></text>
  <text x="76" y="385" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];</tspan></text>
  <text x="76" y="405" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  }</tspan></text>
  <text x="76" y="421" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
</svg>
