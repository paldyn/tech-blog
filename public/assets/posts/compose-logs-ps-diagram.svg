<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">compose logs / ps / top — 상태 조회</text>

  <!-- ps output mockup -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">compose ps 출력 예시</text>

  <rect x="60" y="96" width="760" height="120" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Header row -->
  <rect x="60" y="96" width="760" height="26" fill="#1a1a2e" rx="6"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">NAME              IMAGE          COMMAND         STATUS          PORTS</text>
  <!-- rows -->
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">myapp-web-1       nginx:latest   "/docker..."    Up 2 hours      0.0.0.0:80->80/tcp</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">myapp-api-1       my-api:latest  "uvicorn..."    <tspan fill="#55c555">Up (healthy)</tspan>   0.0.0.0:8080->8080/tcp</text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">myapp-db-1        postgres:16    "docker-..."    <tspan fill="#55c555">Up (healthy)</tspan></text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">myapp-migrate-1   my-api:latest  "python..."     <tspan fill="#888">Exited (0)</tspan></text>

  <!-- Divider -->
  <line x1="60" y1="238" x2="820" y2="238" stroke="#2a2a3a" stroke-width="1"/>

  <!-- logs options -->
  <text x="60" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">logs 주요 옵션</text>

  <rect x="60" y="278" width="180" height="80" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">-f / --follow</text>
  <text x="150" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">실시간 스트리밍</text>
  <text x="150" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Ctrl+C로 중단</text>

  <rect x="258" y="278" width="180" height="80" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="348" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">--tail=N</text>
  <text x="348" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">마지막 N줄만 출력</text>
  <text x="348" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">--tail=0 은 신규만</text>

  <rect x="456" y="278" width="180" height="80" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="546" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">--timestamps</text>
  <text x="546" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">타임스탬프 포함</text>
  <text x="546" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">-t 단축키</text>

  <rect x="654" y="278" width="170" height="80" fill="#1a1400" rx="8" stroke="#e0a055" stroke-width="1.5"/>
  <text x="739" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">--since</text>
  <text x="739" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">시간 이후 로그</text>
  <text x="739" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">--since=5m</text>

  <!-- Divider -->
  <line x1="60" y1="378" x2="820" y2="378" stroke="#2a2a3a" stroke-width="1"/>

  <!-- ps format options -->
  <text x="60" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">ps 옵션:  -a 종료된 컨테이너 포함  ·  --format json JSON 출력  ·  --status running 필터</text>
  <text x="60" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">top 옵션:  특정 서비스 지정 가능 (docker compose top web)  ·  PID·CPU·MEM 표시</text>
</svg>
