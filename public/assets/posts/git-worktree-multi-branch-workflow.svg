<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">멀티 브랜치 병렬 개발 워크플로</text>

  <!-- Time labels -->
  <text x="80" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">09:00</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">10:30</text>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">11:00</text>
  <text x="80" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">14:00</text>

  <!-- Step 1 -->
  <rect x="140" y="66" width="700" height="100" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">① feature/login 개발 시작</text>
  <rect x="160" y="100" width="660" height="52" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="176" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># ~/projects/myapp/ (main worktree)</text>
  <text x="176" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git switch -c feature/login &amp;&amp; vim src/auth.js</text>

  <!-- Arrow -->
  <line x1="440" y1="174" x2="440" y2="192" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="140" y="196" width="700" height="100" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">② 긴급 핫픽스 요청 → stash 없이 전환</text>
  <rect x="160" y="230" width="660" height="52" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="176" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># feature/login 작업 그대로 둔 채로</text>
  <text x="176" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git worktree add -b hotfix/payment ../myapp-fix main</text>

  <!-- Arrow -->
  <line x1="440" y1="304" x2="440" y2="312" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="140" y="316" width="700" height="100" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">③ 핫픽스 완료 후 정리</text>
  <rect x="160" y="350" width="660" height="52" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="176" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># ../myapp-fix 에서 작업 완료 후</text>
  <text x="176" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git push &amp;&amp; cd ../myapp &amp;&amp; git worktree remove ../myapp-fix</text>

  <!-- Arrow -->
  <line x1="440" y1="424" x2="440" y2="432" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Step 4 -->
  <rect x="140" y="436" width="700" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">④ feature/login 작업 그대로 재개 (stash pop 불필요)</text>
  <text x="440" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">~/projects/myapp/ 의 작업 상태가 그대로 보존됨</text>
</svg>
