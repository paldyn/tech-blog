<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">히스토리 재작성의 위험과 영향 범위</text>

  <!-- Risk items -->
  <rect x="60" y="75" width="760" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" font-weight="700">⚠ SHA가 바뀐다</text>
  <text x="80" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">rebase, amend, filter-repo 등 모든 재작성 도구는 커밋 SHA를 새로 계산한다. 이미 clone/pull한 팀원의 로컬과 달라진다.</text>

  <!-- Impact diagram -->
  <text x="60" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">공유 브랜치에서 재작성 시 발생하는 문제</text>

  <!-- Your repo -->
  <rect x="60" y="205" width="180" height="80" rx="8" fill="#1a2a1e" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">내 저장소</text>
  <text x="150" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">A → B → C'</text>
  <text x="150" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(rebase 후)</text>

  <line x1="240" y1="245" x2="298" y2="245" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="310" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="24" fill="#e05555" text-anchor="middle">⚡</text>
  <text x="310" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">충돌</text>

  <!-- Remote -->
  <rect x="340" y="205" width="180" height="80" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="430" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">원격 저장소</text>
  <text x="430" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">A → B → C</text>
  <text x="430" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(기존)</text>

  <line x1="520" y1="245" x2="578" y2="245" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="590" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="24" fill="#e05555" text-anchor="middle">⚡</text>
  <text x="590" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">충돌</text>

  <!-- Teammate -->
  <rect x="620" y="205" width="200" height="80" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="720" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">팀원 저장소</text>
  <text x="720" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">A → B → C → D</text>
  <text x="720" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(C 기반 작업)</text>

  <!-- Safe vs Unsafe -->
  <rect x="60" y="320" width="370" height="110" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="245" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle" font-weight="600">안전한 경우</text>
  <text x="245" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">✓ 본인만 사용하는 feature 브랜치</text>
  <text x="245" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">✓ 아직 push하지 않은 로컬 커밋</text>
  <text x="245" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">✓ 팀과 충분히 조율한 경우</text>

  <rect x="460" y="320" width="370" height="110" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="645" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" text-anchor="middle" font-weight="600">위험한 경우</text>
  <text x="645" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">✗ main, develop 등 공유 브랜치</text>
  <text x="645" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">✗ 팀원이 기반으로 작업 중인 브랜치</text>
  <text x="645" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">✗ 공지 없는 force push</text>
</svg>
