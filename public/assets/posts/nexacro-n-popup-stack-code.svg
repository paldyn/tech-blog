<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">팝업 스택 관리 패턴</text>

  <!-- Left: getAllPopup / 팝업 목록 조회 -->
  <text x="230" y="82" fill="#888" font-size="13" text-anchor="middle">열린 팝업 목록 조회</text>
  <rect x="60" y="92" width="360" height="196" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 현재 열린 팝업 수 확인</text>
  <text x="76" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">var <tspan fill="#e8e8e8">nCount</tspan> = this.getPopupCount();</text>
  <text x="76" y="150" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">var <tspan fill="#e8e8e8">oTop</ttml></tspan> = this.getTopPopup();</text>
  <text x="76" y="168" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 팝업 ID로 찾기</text>
  <text x="76" y="186" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">var <tspan fill="#e8e8e8">oPopup</ttml></tspan> = application</text>
  <text x="76" y="204" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  .getPopupByID(<tspan fill="#ce9178">"detailPopup"</ttml></tspan>);</text>
  <text x="76" y="222" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 전체 닫기</text>
  <text x="76" y="240" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_closeAll</ttml></tspan>() {</text>
  <text x="76" y="258" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  application.closeAllPopup();</text>
  <text x="76" y="276" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Right: 중첩 팝업 콜백 패턴 -->
  <text x="650" y="82" fill="#888" font-size="13" text-anchor="middle">중첩 팝업 콜백 체인</text>
  <rect x="460" y="92" width="360" height="304" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="114" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// ListPopup → DetailPopup 열기</text>
  <text x="476" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_openDetail</ttml></tspan>(obj, e) {</text>
  <text x="476" y="150" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var sKey = this.ds_list</text>
  <text x="476" y="168" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    .getColumn(nRow, <tspan fill="#ce9178">"key"</ttml></tspan>);</text>
  <text x="476" y="186" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.openPopup(</text>
  <text x="476" y="204" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "popup/Detail",</text>
  <text x="476" y="222" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    <tspan fill="#b5cea8">0</ttml></tspan>, <tspan fill="#ce9178">"fn_detailCb"</ttml></tspan>,</text>
  <text x="476" y="240" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    <tspan fill="#7ec8e3">null</ttml></tspan>, <tspan fill="#7ec8e3">true</ttml></tspan>, { key: sKey });</text>
  <text x="476" y="258" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="476" y="286" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Detail 닫힐 때 콜백</text>
  <text x="476" y="304" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_detailCb</ttml></tspan>(objPopup, nRet) {</text>
  <text x="476" y="322" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  if <tspan fill="#e8e8e8">(nRet == </ttml></tspan><tspan fill="#b5cea8">1</ttml></tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="476" y="340" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    this.fn_search();</text>
  <text x="476" y="358" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Bottom warning -->
  <rect x="60" y="308" width="360" height="96" rx="6" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="330" fill="#e05555" font-size="13" font-weight="600">주의: 팝업 내에서 Opener 직접 참조</text>
  <text x="80" y="350" fill="#e8e8e8" font-size="12">this.opener → 직전 팝업(또는 Main)</text>
  <text x="80" y="370" fill="#e8e8e8" font-size="12">this.opener.opener → 2단계 위</text>
  <text x="80" y="390" fill="#888" font-size="12">직접 참조 남용 시 팝업 스택 꼬임 주의</text>
</svg>
