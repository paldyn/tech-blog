<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540">
  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring Cron 표현식 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">6자리(초·분·시·일·월·요일) 구조 — Unix 5자리와 다름에 주의</text>

  <!-- Cron expression visual breakdown -->
  <!-- Expression display -->
  <rect x="60" y="88" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">
    <tspan fill="#e05555">0</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#55c555">30</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3">9</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#b5cea8">*</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">*</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">MON-FRI</tspan>
  </text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">평일 오전 9시 30분 0초에 실행</text>

  <!-- Field labels with arrows -->
  <!-- Second -->
  <line x1="193" y1="148" x2="193" y2="168" stroke="#e05555" stroke-width="1.5"/>
  <rect x="140" y="170" width="106" height="50" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="193" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">초 (Second)</text>
  <text x="193" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">0 ~ 59</text>

  <!-- Minute -->
  <line x1="264" y1="148" x2="264" y2="168" stroke="#55c555" stroke-width="1.5"/>
  <rect x="210" y="170" width="106" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="263" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">분 (Minute)</text>
  <text x="263" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">0 ~ 59</text>

  <!-- Hour -->
  <line x1="340" y1="148" x2="340" y2="240" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="286" y="242" width="106" height="50" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="339" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">시 (Hour)</text>
  <text x="339" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">0 ~ 23</text>

  <!-- Day -->
  <line x1="440" y1="148" x2="440" y2="168" stroke="#b5cea8" stroke-width="1.5"/>
  <rect x="386" y="170" width="106" height="50" rx="6" fill="#1a1a1a" stroke="#b5cea8" stroke-width="1"/>
  <text x="439" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">일 (Day)</text>
  <text x="439" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1 ~ 31</text>

  <!-- Month -->
  <line x1="540" y1="148" x2="540" y2="240" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="486" y="242" width="106" height="50" rx="6" fill="#1a1a1a" stroke="#ce9178" stroke-width="1"/>
  <text x="539" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">월 (Month)</text>
  <text x="539" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1 ~ 12 / JAN-DEC</text>

  <!-- DayOfWeek -->
  <line x1="660" y1="148" x2="660" y2="168" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="590" y="170" width="140" height="50" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="660" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">요일 (DayOfWeek)</text>
  <text x="660" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">0(일)~6(토) / SUN-SAT</text>

  <!-- Special characters table -->
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">특수 문자 의미</text>

  <!-- Row headers -->
  <rect x="60" y="332" width="760" height="36" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="126" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">문자</text>
  <text x="440" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">의미</text>
  <text x="730" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">예시</text>

  <rect x="60" y="368" width="760" height="32" rx="0" fill="#111" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="126" y="389" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">*</text>
  <text x="440" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">모든 값</text>
  <text x="730" y="389" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">* (매분, 매시간…)</text>

  <rect x="60" y="400" width="760" height="32" rx="0" fill="#111" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="126" y="421" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">/</text>
  <text x="440" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">간격 (step)</text>
  <text x="730" y="421" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">*/5 (5분마다)</text>

  <rect x="60" y="432" width="760" height="32" rx="0" fill="#111" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="126" y="453" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#b5cea8" text-anchor="middle">,</text>
  <text x="440" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">목록 (list)</text>
  <text x="730" y="453" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">1,15,30 (1·15·30분)</text>

  <rect x="60" y="464" width="760" height="32" rx="0" fill="#111" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="126" y="485" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">-</text>
  <text x="440" y="485" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">범위 (range)</text>
  <text x="730" y="485" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">MON-FRI (평일)</text>

  <rect x="60" y="496" width="760" height="32" rx="0" fill="#111" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="126" y="517" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">?</text>
  <text x="440" y="517" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">지정 안 함 (일·요일 중 하나만 지정 시)</text>
  <text x="730" y="517" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">0 0 9 15 * ?</text>
</svg>
