<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">JWT의 3부분 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">점(.)으로 구분된 Base64URL 문자열 세 조각</text>

  <!-- token line -->
  <rect x="60" y="94" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="119" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">eyJhbGc...</tspan><tspan fill="#888">.</tspan><tspan fill="#55c555">eyJzdWI...</tspan><tspan fill="#888">.</tspan><tspan fill="#e0b055">SflKxwRJ...</tspan></text>

  <!-- Header -->
  <rect x="60" y="160" width="240" height="230" rx="10" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">헤더</text>
  <text x="180" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Header</text>
  <rect x="80" y="228" width="200" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">{</text>
  <text x="94" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9cdcfe">  "alg"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"HS256"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="94" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9cdcfe">  "typ"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"JWT"</tspan></text>
  <text x="94" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">}</text>
  <text x="180" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">서명 알고리즘·타입</text>

  <!-- Payload -->
  <rect x="320" y="160" width="240" height="230" rx="10" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">페이로드</text>
  <text x="440" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Payload · Claims</text>
  <rect x="340" y="228" width="200" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="354" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">{</text>
  <text x="354" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9cdcfe">  "sub"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"u42"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="354" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9cdcfe">  "exp"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">1720...</tspan></text>
  <text x="354" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">}</text>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">암호화 아님 — 누구나 디코딩 가능</text>

  <!-- Signature -->
  <rect x="580" y="160" width="240" height="230" rx="10" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="700" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e0b055">서명</text>
  <text x="700" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Signature</text>
  <rect x="600" y="228" width="200" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="614" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#9aa4b8">HMACSHA256(</text>
  <text x="614" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ffffff">  header+payload,</text>
  <text x="614" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ce9178">  secret)</text>
  <text x="700" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">위·변조 탐지의 핵심</text>

  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">페이로드는 서명으로 무결성만 보장 — 민감 정보를 넣지 말 것</text>
</svg>
