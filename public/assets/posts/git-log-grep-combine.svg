<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 280">
  <rect width="880" height="280" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">여러 --grep을 결합하는 논리</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">기본은 OR, --all-match를 붙이면 AND가 된다</text>

  <rect x="60" y="100" width="360" height="150" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">기본 (OR)</text>
  <text x="240" y="160" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">--grep A --grep B</text>
  <text x="240" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">A 또는 B 포함</text>
  <text x="240" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">결과가 넓다</text>

  <rect x="460" y="100" width="360" height="150" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="16" font-weight="600" fill="#55c555">--all-match (AND)</text>
  <text x="640" y="160" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">--all-match --grep A --grep B</text>
  <text x="640" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">A 그리고 B 모두 포함</text>
  <text x="640" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">결과가 좁다</text>
</svg>
