<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">try-with-resources — 자원 자동 해제</text>

  <!-- Before (old style) -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">Before (Java 6 이하)</text>
  <rect x="60" y="94" width="380" height="200" rx="8" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">BufferedReader</tspan><tspan fill="#ffffff"> br = </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    br = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> BufferedReader(</tspan></text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> FileReader(path));</tspan></text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> br.readLine();</tspan></text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">} </tspan><tspan fill="#7ec8e3" font-weight="600">finally</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    if</tspan><tspan fill="#ffffff"> (br != </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">) br.close();</tspan></text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">} </tspan><tspan fill="#9aa4b8">// close 예외가 묻힘</tspan></text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">// 장황하고 실수하기 쉬움</text>

  <!-- After (try-with-resources) -->
  <text x="470" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">After (Java 7+)</text>
  <rect x="470" y="94" width="360" height="200" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="486" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// AutoCloseable 자동 close()</text>
  <text x="486" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> br = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> BufferedReader(</tspan></text>
  <text x="486" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">            </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> FileReader(path))) {</tspan></text>
  <text x="486" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> br.readLine();</tspan></text>
  <text x="486" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">} </tspan><tspan fill="#9aa4b8">// 블록 종료 시 자동 close</tspan></text>
  <text x="486" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 여러 자원 — 역순으로 닫힘</text>
  <text x="486" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff"> (var a = openA(); var b = openB()) {</tspan></text>
  <text x="486" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// b.close() 먼저, 그 다음 a.close()</tspan></text>
  <text x="486" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">} </tspan><tspan fill="#9aa4b8">// suppressed exception 자동 관리</tspan></text>

  <!-- Pitfall box -->
  <rect x="60" y="318" width="760" height="122" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// finally 주의사항: return은 예외를 삼킨다</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    throw new</tspan><tspan fill="#ffffff"> RuntimeException(</tspan><tspan fill="#ce9178">"원래 오류"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">} </tspan><tspan fill="#7ec8e3" font-weight="600">finally</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"finally return"</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// 예외가 사라짐! 절대 금지</tspan></text>
  <text x="76" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
</svg>
