<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">숫자 타입 선택 가이드</text>

  <!-- Integer types -->
  <rect x="60" y="56" width="760" height="32" rx="4" fill="#1a2a3a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="77" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타입</text>
  <text x="310" y="77" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">크기</text>
  <text x="480" y="77" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">범위</text>
  <text x="700" y="77" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">용도</text>

  <rect x="60" y="88" width="760" height="28" fill="#0f1a24" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">TINYINT</text>
  <text x="310" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">1 byte</text>
  <text x="480" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">-128 ~ 127</text>
  <text x="700" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상태 코드, 소형 enum</text>

  <rect x="60" y="116" width="760" height="28" fill="#0a1219" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">SMALLINT</text>
  <text x="310" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">2 byte</text>
  <text x="480" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">-32,768 ~ 32,767</text>
  <text x="700" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">연도, 소규모 코드</text>

  <rect x="60" y="144" width="760" height="28" fill="#0f1a24" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">INT / INTEGER</text>
  <text x="310" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">4 byte</text>
  <text x="480" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">-2.1억 ~ 2.1억</text>
  <text x="700" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">일반 PK, 수량</text>

  <rect x="60" y="172" width="760" height="28" fill="#0a1219" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">BIGINT</text>
  <text x="310" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">8 byte</text>
  <text x="480" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">-9.2경 ~ 9.2경</text>
  <text x="700" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">고트래픽 PK, 타임스탬프 ms</text>

  <rect x="60" y="200" width="760" height="28" fill="#0f1a24" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">DECIMAL(p,s)</text>
  <text x="310" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">가변</text>
  <text x="480" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">p자리, 소수점 s자리</text>
  <text x="700" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">금액, 정밀 계산 (오차 없음)</text>

  <rect x="60" y="228" width="760" height="28" fill="#0a1219" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">FLOAT / DOUBLE</text>
  <text x="310" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">4/8 byte</text>
  <text x="480" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">부동소수점 근사값</text>
  <text x="700" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">과학 계산만. 금액 절대 금지</text>

  <!-- String section -->
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">문자열 타입 비교</text>

  <rect x="60" y="302" width="360" height="60" rx="8" fill="#111822" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">CHAR(n) — 고정 길이</text>
  <text x="240" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">항상 n바이트 차지. 짧으면 공백 패딩</text>
  <text x="240" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">코드, 해시값 등 고정 길이 데이터에 적합</text>

  <rect x="460" y="302" width="360" height="60" rx="8" fill="#111822" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">VARCHAR(n) — 가변 길이</text>
  <text x="640" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실제 길이만큼만 저장. n은 최대 길이</text>
  <text x="640" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이름, 이메일 등 가변 길이 데이터에 적합</text>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TEXT / CLOB: 대용량 문자 · BOOLEAN: TRUE/FALSE/UNKNOWN(NULL) · BIT: 0/1</text>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Oracle: VARCHAR2(n BYTE|CHAR) / SQL Server: NVARCHAR(n) — UTF-16 유니코드</text>
</svg>
