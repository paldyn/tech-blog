<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SQL 데이터 타입 — 숫자 · 문자열 · 불리언</text>

  <!-- Numeric types -->
  <rect x="60" y="66" width="760" height="130" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="60" y="66" width="760" height="26" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">숫자 타입</text>

  <line x1="60" y1="92" x2="820" y2="92" stroke="#2a3a5a" stroke-width="1"/>

  <!-- integer types row -->
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SMALLINT</text>
  <text x="170" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">2바이트 정수 -32,768~32,767</text>
  <text x="390" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">INTEGER / INT</text>
  <text x="510" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">4바이트 정수 -2.1억~2.1억</text>
  <text x="700" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">BIGINT</text>
  <text x="752" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">8바이트</text>

  <line x1="60" y1="118" x2="820" y2="118" stroke="#1e1e3e" stroke-width="1"/>

  <!-- decimal types row -->
  <text x="80" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">NUMERIC(p,s)</text>
  <text x="200" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정확한 소수 — 화폐·금액에 필수 (p=전체자리, s=소수자리)</text>
  <text x="640" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">FLOAT/REAL</text>
  <text x="720" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">부동소수, 오차 발생</text>

  <line x1="60" y1="144" x2="820" y2="144" stroke="#1e1e3e" stroke-width="1"/>

  <text x="440" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">⚠ 금액/환율은 반드시 NUMERIC(또는 DECIMAL) — FLOAT 오차는 재무 계산에 치명적</text>

  <line x1="60" y1="170" x2="820" y2="170" stroke="#1e1e3e" stroke-width="1"/>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">NUMERIC(12,2): 최대 12자리, 소수점 2자리 → -9,999,999,999.99 ~ 9,999,999,999.99</text>

  <!-- String types -->
  <rect x="60" y="216" width="760" height="148" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <rect x="60" y="216" width="760" height="26" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">문자열 타입</text>

  <line x1="60" y1="242" x2="820" y2="242" stroke="#2a5a2a" stroke-width="1"/>

  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">CHAR(n)</text>
  <text x="160" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">고정 길이 n바이트. 짧으면 공백 패딩. 코드, 상태값처럼 길이가 일정한 값에 사용</text>

  <line x1="60" y1="268" x2="820" y2="268" stroke="#1e1e3e" stroke-width="1"/>

  <text x="80" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">VARCHAR(n)</text>
  <text x="180" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">가변 길이, 최대 n바이트. 실제 입력 길이만 저장. 이름·주소·이메일에 적합</text>

  <line x1="60" y1="294" x2="820" y2="294" stroke="#1e1e3e" stroke-width="1"/>

  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">TEXT</text>
  <text x="140" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">길이 제한 없는 문자열. 본문·JSON 등 대형 텍스트. 인덱스 제한 있음 (MySQL: 앞 767바이트)</text>

  <line x1="60" y1="320" x2="820" y2="320" stroke="#1e1e3e" stroke-width="1"/>

  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">CHAR vs VARCHAR: CHAR(10)에 'Hi' 저장 → 'Hi        ' (공백 8개). 비교 시 공백 무시 여부 DBMS마다 다름</text>

  <line x1="60" y1="346" x2="820" y2="346" stroke="#1e1e3e" stroke-width="1"/>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">한글 UTF-8: 한 글자 = 3바이트. VARCHAR(50)은 한글 16자 + 영문 2자 혼용 가능 (50바이트 내)</text>

  <!-- Boolean -->
  <rect x="60" y="384" width="760" height="96" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <rect x="60" y="384" width="760" height="26" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">불리언(BOOLEAN) 타입</text>

  <line x1="60" y1="410" x2="820" y2="410" stroke="#2a2a5a" stroke-width="1"/>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">표준 SQL: BOOLEAN (TRUE / FALSE / NULL). PostgreSQL 완전 지원</text>
  <text x="80" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MySQL: TINYINT(1) 내부 저장, TRUE=1 / FALSE=0. Oracle: NUMBER(1) 또는 CHAR('Y'/'N')</text>
  <text x="80" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">⚠ DBMS마다 구현이 다름 — 이식 필요 시 TINYINT(1) 또는 CHAR(1) 고려</text>
</svg>
