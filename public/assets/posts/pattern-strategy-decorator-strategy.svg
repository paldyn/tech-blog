<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">전략 패턴 — 알고리즘 교체 가능하게</text>

  <!-- Context -->
  <rect x="60" y="68" width="180" height="168" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Context</text>
  <text x="150" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Sorter</text>
  <line x1="90" y1="132" x2="230" y2="132" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">strategy</text>
  <text x="150" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">setStrategy()</text>
  <text x="150" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">sort(data)</text>
  <text x="150" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">전략을 위임</text>

  <!-- Arrows to strategies -->
  <line x1="240" y1="152" x2="338" y2="108" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="240" y1="152" x2="338" y2="152" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="240" y1="152" x2="338" y2="196" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Strategy boxes -->
  <rect x="340" y="82" width="160" height="44" rx="6" fill="#001a0a" stroke="#55c555" stroke-width="1"/>
  <text x="420" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">BubbleSort</text>
  <text x="420" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">sort(arr): T[]</text>

  <rect x="340" y="130" width="160" height="44" rx="6" fill="#001a0a" stroke="#55c555" stroke-width="1"/>
  <text x="420" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">QuickSort</text>
  <text x="420" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">sort(arr): T[]</text>

  <rect x="340" y="178" width="160" height="44" rx="6" fill="#001a0a" stroke="#55c555" stroke-width="1"/>
  <text x="420" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">MergeSort</text>
  <text x="420" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">sort(arr): T[]</text>

  <!-- JS implementation -->
  <rect x="60" y="262" width="760" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// JavaScript: 함수가 전략 — 고차 함수로 구현</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text x="120" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> sortStrategies = {</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  asc:    (a, b) => a - b,</text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  desc:   (a, b) => b - a,</text>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  byName: (a, b) => a.name.localeCompare(b.name),</text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  byAge:  (a, b) => a.age - b.age,</text>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">};</text>
  <text x="76" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">users.sort(sortStrategies.byName);  </text>
  <text x="382" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 전략 교체</text>
</svg>
