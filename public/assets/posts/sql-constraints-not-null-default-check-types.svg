<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NOT NULL · DEFAULT · CHECK 제약조건</text>

  <!-- NOT NULL -->
  <rect x="60" y="72" width="240" height="260" fill="#111827" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="72" width="240" height="38" fill="#2a1010" rx="10"/>
  <rect x="60" y="98" width="240" height="12" fill="#2a1010"/>
  <text x="180" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">NOT NULL</text>

  <text x="78" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NULL 값 저장 금지</text>
  <text x="78" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">INSERT/UPDATE 시 값이</text>
  <text x="78" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반드시 있어야 함</text>

  <line x1="78" y1="182" x2="282" y2="182" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" font-weight="600">효과</text>
  <text x="78" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인덱스 효율 향상</text>
  <text x="78" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">IS NULL 체크 코드 불필요</text>
  <text x="78" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">의미적 명확성</text>

  <line x1="78" y1="270" x2="282" y2="270" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" font-weight="600">사용 예</text>
  <text x="78" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">name VARCHAR(100) NOT NULL</text>

  <!-- DEFAULT -->
  <rect x="330" y="72" width="220" height="260" fill="#111827" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <rect x="330" y="72" width="220" height="38" fill="#0d1a0d" rx="10"/>
  <rect x="330" y="98" width="220" height="12" fill="#0d1a0d"/>
  <text x="440" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">DEFAULT</text>

  <text x="348" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">INSERT 시 값 생략 시</text>
  <text x="348" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자동으로 채워지는 값</text>

  <line x1="348" y1="162" x2="532" y2="162" stroke="#3a4a6e" stroke-width="1"/>
  <text x="348" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" font-weight="600">허용 값</text>
  <text x="348" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">리터럴: 0, 'active', FALSE</text>
  <text x="348" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">함수: now(), gen_random_uuid()</text>
  <text x="348" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">표현식: price * 0.9 (일부 DBMS)</text>

  <line x1="348" y1="250" x2="532" y2="250" stroke="#3a4a6e" stroke-width="1"/>
  <text x="348" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" font-weight="600">사용 예</text>
  <text x="348" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">stock INT DEFAULT 0</text>
  <text x="348" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">created_at TIMESTAMPTZ DEFAULT now()</text>

  <!-- CHECK -->
  <rect x="580" y="72" width="240" height="260" fill="#111827" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="580" y="72" width="240" height="38" fill="#0d0d1a" rx="10"/>
  <rect x="580" y="98" width="240" height="12" fill="#0d0d1a"/>
  <text x="700" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">CHECK</text>

  <text x="598" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">지정한 조건식이 TRUE이어야</text>
  <text x="598" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">INSERT/UPDATE 허용</text>

  <line x1="598" y1="162" x2="802" y2="162" stroke="#3a4a6e" stroke-width="1"/>
  <text x="598" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" font-weight="600">조건 예시</text>
  <text x="598" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">price &gt;= 0</text>
  <text x="598" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">status IN ('active','inactive')</text>
  <text x="598" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">end_date &gt;= start_date</text>

  <line x1="598" y1="250" x2="802" y2="250" stroke="#3a4a6e" stroke-width="1"/>
  <text x="598" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" font-weight="600">주의</text>
  <text x="598" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">NULL 값은 CHECK 통과 (NOT NULL 별도)</text>
  <text x="598" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">조건 결과가 FALSE일 때만 거부</text>

  <!-- Evaluation logic bottom -->
  <rect x="60" y="360" width="760" height="90" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- 세 제약조건 동시 적용</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">age  </text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">SMALLINT</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">         NOT NULL</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">                   DEFAULT</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#b5cea8">                           0</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">                             CHECK</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">                                   (age</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">       BETWEEN</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#b5cea8">              0</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">               AND</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#b5cea8">                   150</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">                      )</text>
</svg>
