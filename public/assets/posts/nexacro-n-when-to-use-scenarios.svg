<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <text x="440" y="52" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Nexacro N 핵심 도입 시나리오</text>
  <text x="440" y="76" text-anchor="middle" fill="#888" font-size="13">실제 현장에서 N이 선택되는 대표적인 4가지 맥락</text>

  <!-- Card 1: 금융 -->
  <rect x="60" y="100" width="360" height="170" rx="10" fill="#0e1a26" stroke="#1e3a5a" stroke-width="1.5"/>
  <rect x="60" y="100" width="360" height="4" rx="2" fill="#7ec8e3"/>
  <text x="240" y="130" text-anchor="middle" fill="#7ec8e3" font-size="15" font-weight="700">금융·보험 ERP</text>
  <text x="240" y="152" text-anchor="middle" fill="#e8e8e8" font-size="13">수백 개 업무 화면 + 복합 그리드</text>
  <text x="240" y="172" text-anchor="middle" fill="#888" font-size="12">• 계정계·공통계 화면 수백 개 일괄 관리</text>
  <text x="240" y="192" text-anchor="middle" fill="#888" font-size="12">• 실시간 계좌 조회 그리드 (10만 행↑)</text>
  <text x="240" y="212" text-anchor="middle" fill="#888" font-size="12">• Platform 레거시 마이그레이션 경로 확보</text>
  <text x="240" y="254" text-anchor="middle" fill="#55c555" font-size="12">✓ 라이선스 TCO 절감 + 모던 브라우저 지원</text>

  <!-- Card 2: 공공 -->
  <rect x="460" y="100" width="360" height="170" rx="10" fill="#0e1a0e" stroke="#1e4a1e" stroke-width="1.5"/>
  <rect x="460" y="100" width="360" height="4" rx="2" fill="#55c555"/>
  <text x="640" y="130" text-anchor="middle" fill="#55c555" font-size="15" font-weight="700">공공·행정 시스템</text>
  <text x="640" y="152" text-anchor="middle" fill="#e8e8e8" font-size="13">전자정부 프레임워크 + Nexacro N</text>
  <text x="640" y="172" text-anchor="middle" fill="#888" font-size="12">• 부서별 대시보드·통계 그리드 대량 운영</text>
  <text x="640" y="192" text-anchor="middle" fill="#888" font-size="12">• 결재·워크플로우 화면 일관성 필요</text>
  <text x="640" y="212" text-anchor="middle" fill="#888" font-size="12">• 조달청 납품·GS 인증 제품 요구 충족</text>
  <text x="640" y="254" text-anchor="middle" fill="#55c555" font-size="12">✓ 전자정부 가이드라인 준수 + 벤더 지원</text>

  <!-- Card 3: 제조 -->
  <rect x="60" y="300" width="360" height="170" rx="10" fill="#1a140e" stroke="#3a2e1e" stroke-width="1.5"/>
  <rect x="60" y="300" width="360" height="4" rx="2" fill="#e0a040"/>
  <text x="240" y="330" text-anchor="middle" fill="#e0a040" font-size="15" font-weight="700">제조 MES / SCM</text>
  <text x="240" y="352" text-anchor="middle" fill="#e8e8e8" font-size="13">실시간 생산 데이터 + 다중 그리드</text>
  <text x="240" y="372" text-anchor="middle" fill="#888" font-size="12">• 설비 현황·공정 모니터링 실시간 갱신</text>
  <text x="240" y="392" text-anchor="middle" fill="#888" font-size="12">• 자재·재고·BOM 다단계 그리드 연동</text>
  <text x="240" y="412" text-anchor="middle" fill="#888" font-size="12">• 폐쇄망 공장 내 독립 배포 구조 적합</text>
  <text x="240" y="454" text-anchor="middle" fill="#55c555" font-size="12">✓ 인트라넷 독립 실행 + 오프라인 내구성</text>

  <!-- Card 4: 플랫폼 이관 -->
  <rect x="460" y="300" width="360" height="170" rx="10" fill="#1a0e1a" stroke="#3a1e3a" stroke-width="1.5"/>
  <rect x="460" y="300" width="360" height="4" rx="2" fill="#7777cc"/>
  <text x="640" y="330" text-anchor="middle" fill="#7777cc" font-size="15" font-weight="700">Platform → N 단계적 이관</text>
  <text x="640" y="352" text-anchor="middle" fill="#e8e8e8" font-size="13">기존 자산 재사용 + 현대화</text>
  <text x="640" y="372" text-anchor="middle" fill="#888" font-size="12">• 기존 .xfdl 화면 대부분 재사용 가능</text>
  <text x="640" y="392" text-anchor="middle" fill="#888" font-size="12">• IE 의존 코드만 선별 수정</text>
  <text x="640" y="412" text-anchor="middle" fill="#888" font-size="12">• Nexacro Studio N에서 직접 열어 검증</text>
  <text x="640" y="454" text-anchor="middle" fill="#55c555" font-size="12">✓ 재개발 비용 최소화 + 점진적 전환</text>

  <text x="440" y="510" text-anchor="middle" fill="#444" font-size="11">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
