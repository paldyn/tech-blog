<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Fetch API 요청·응답 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Request · Response · Headers 인터페이스</text>

  <!-- Left: Request -->
  <rect x="60" y="90" width="340" height="330" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Request</text>

  <rect x="78" y="126" width="304" height="276" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="94" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">fetch</text><text x="134" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">(url, {</text>
  <text x="94" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  method: <text fill="#ce9178">'POST'</text>,</text>
  <text x="94" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  headers: {</text>
  <text x="94" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    <text fill="#ce9178">'Content-Type'</text>:</text>
  <text x="94" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">      'application/json'</text><text x="94" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text>
  <text x="94" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    <text fill="#ce9178">'Authorization'</text>:</text>
  <text x="94" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">      `Bearer ${token}`</text>
  <text x="94" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  },</text>
  <text x="94" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  body: JSON.stringify(data),</text>
  <text x="94" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  mode: <text fill="#ce9178">'cors'</text>,</text>
  <text x="94" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  credentials: <text fill="#ce9178">'include'</text>,</text>
  <text x="94" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  cache: <text fill="#ce9178">'no-store'</text>,</text>
  <text x="94" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  redirect: <text fill="#ce9178">'follow'</text></text>
  <text x="94" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">});</text>

  <!-- Right: Response -->
  <rect x="480" y="90" width="340" height="330" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Response</text>

  <!-- Properties list -->
  <rect x="498" y="126" width="304" height="276" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="514" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 프로퍼티</text>
  <text x="514" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">res.status    <text fill="#b5cea8">// 200, 404...</text></text>
  <text x="514" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">res.statusText <text fill="#888">// "OK"</text></text>
  <text x="514" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">res.ok        <text fill="#b5cea8">// 200–299</text></text>
  <text x="514" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">res.headers   <text fill="#888">// Headers 객체</text></text>
  <text x="514" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">res.url       <text fill="#888">// 최종 URL</text></text>
  <text x="514" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">res.redirected <text fill="#888">// bool</text></text>
  <text x="514" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// body 소비 메서드 (1회)</text>
  <text x="514" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">await</text><text x="562" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> res.json()</text>
  <text x="514" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">await</text><text x="562" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> res.text()</text>
  <text x="514" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">await</text><text x="562" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> res.blob()</text>
  <text x="514" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">await</text><text x="562" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> res.arrayBuffer()</text>
  <text x="514" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">res.body      <text fill="#888">// ReadableStream</text></text>
  <text x="514" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">res.clone()   <text fill="#888">// 복사본</text></text>

  <!-- Bottom -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">fetch는 네트워크 오류만 reject — HTTP 4xx/5xx는 then으로 흐름 (res.ok 확인 필수)</text>
</svg>
