<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arro" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrob" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NOLOCK — 더티 리드 발생 시나리오</text>

  <!-- Timeline axis -->
  <line x1="80" y1="400" x2="800" y2="400" stroke="#333" stroke-width="1"/>
  <text x="80" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">T=0</text>
  <text x="250" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">T=1</text>
  <text x="450" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">T=2</text>
  <text x="650" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">T=3</text>
  <text x="800" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">T=4</text>

  <!-- T1 Writer row -->
  <text x="40" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle" transform="rotate(-90,40,130)">T1 (Writer)</text>

  <!-- T1 timeline -->
  <line x1="80" y1="130" x2="650" y2="130" stroke="#7777cc" stroke-width="2"/>
  <!-- T1 BEGIN -->
  <rect x="70" y="108" width="70" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="105" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">BEGIN</text>
  <text x="105" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TRAN</text>
  <!-- T1 UPDATE -->
  <rect x="220" y="108" width="90" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="265" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">UPDATE</text>
  <text x="265" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">amt=200</text>
  <!-- T1 ROLLBACK -->
  <rect x="590" y="108" width="80" height="44" rx="6" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="630" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">ROLLBACK</text>
  <text x="630" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">amt=100</text>

  <!-- T2 Reader row (NOLOCK) -->
  <text x="40" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle" transform="rotate(-90,40,270)">T2 (NOLOCK)</text>

  <!-- T2 timeline -->
  <line x1="80" y1="270" x2="800" y2="270" stroke="#e05555" stroke-width="2"/>
  <!-- T2 SELECT with NOLOCK -->
  <rect x="380" y="248" width="130" height="44" rx="6" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="445" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">SELECT (NOLOCK)</text>
  <text x="445" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">→ amt = 200 ⚠</text>

  <!-- Dirty read arrow -->
  <line x1="445" y1="248" x2="280" y2="152" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#arro)"/>
  <text x="340" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">더티 리드!</text>
  <text x="340" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">커밋 안 된 값을 읽음</text>

  <!-- Rollback consequence -->
  <text x="650" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">T1 롤백 →</text>
  <text x="650" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">실제값은 100</text>
  <text x="650" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T2가 읽은 200은</text>
  <text x="650" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">존재하지 않는 값!</text>

  <!-- Bottom note -->
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">WITH (NOLOCK) = SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED 과 동일 — 더티 리드 외 팬텀 리드, 중복 행, 누락 행도 발생 가능</text>
</svg>
