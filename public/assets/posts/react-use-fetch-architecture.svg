<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useFetch 내부 구조</text>

  <!-- useReducer state machine -->
  <rect x="60" y="72" width="360" height="220" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">상태 머신 (useReducer)</text>

  <rect x="80" y="108" width="100" height="44" rx="6" fill="#0a1a20" stroke="#7ec8e3"/>
  <text x="130" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">idle</text>
  <text x="130" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">초기</text>

  <rect x="220" y="108" width="100" height="44" rx="6" fill="#1a100a" stroke="#ce9178"/>
  <text x="270" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle" font-weight="600">loading</text>
  <text x="270" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">요청 중</text>

  <line x1="180" y1="130" x2="219" y2="130" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="80" y="184" width="100" height="44" rx="6" fill="#0a200a" stroke="#55c555"/>
  <text x="130" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">success</text>
  <text x="130" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">data 반환</text>

  <rect x="220" y="184" width="100" height="44" rx="6" fill="#200a0a" stroke="#e05555"/>
  <text x="270" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">error</text>
  <text x="270" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">에러 반환</text>

  <line x1="270" y1="152" x2="270" y2="183" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="284" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">성공</text>
  <line x1="250" y1="152" x2="140" y2="183" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="190" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">실패</text>

  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dispatch: FETCH / SUCCESS / ERROR / RESET</text>
  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">각 액션이 상태 전이를 명확히 표현</text>

  <!-- Right: Features -->
  <rect x="460" y="72" width="360" height="220" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">포함된 기능</text>
  <text x="476" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  AbortController — 컴포넌트 언마운트 시 취소</text>
  <text x="476" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  경쟁 조건 방지 — 오래된 응답 무시</text>
  <text x="476" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  useReducer — 상태 전이 추적 가능</text>
  <text x="476" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  null URL 지원 — 조건부 요청</text>
  <text x="476" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  HTTP 에러 처리 — 4xx/5xx</text>
  <text x="476" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">○  캐싱 없음 — SWR/TanStack Query 고려</text>
  <text x="476" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">○  재시도 없음 — 직접 구현 필요</text>
  <text x="476" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">○  mutations 없음 — 별도 구현</text>

  <!-- Usage code -->
  <rect x="60" y="314" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 기본 사용</text>
  <text x="76" y="355" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> { data, isLoading, error } = </tspan><tspan fill="#7ec8e3" font-weight="600">useFetch</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">`/api/users/${userId}`</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 조건부 요청 — isLoggedIn이 false면 요청 안 함</text>
  <text x="76" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> { data } = </tspan><tspan fill="#7ec8e3" font-weight="600">useFetch</tspan><tspan fill="#ffffff">(isLoggedIn ? </tspan><tspan fill="#ce9178">'/api/me'</tspan><tspan fill="#ffffff"> : </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 수동 재요청 (refetch)</text>
  <text x="76" y="431" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> { data, refetch } = </tspan><tspan fill="#7ec8e3" font-weight="600">useFetch</tspan><tspan fill="#ffffff">(url);</tspan></text>
</svg>
