<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">태그 vs Digest — 가변성 비교</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">태그는 바뀔 수 있다 / Digest는 절대 변하지 않는다</text>

  <!-- Left: Tag (mutable) -->
  <rect x="60" y="104" width="360" height="332" fill="#0d1117" rx="10" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">태그 (Mutable)</text>

  <!-- Day 1 -->
  <text x="240" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Day 1</text>
  <rect x="84" y="172" width="312" height="52" fill="#180e0e" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">nginx:latest</text>
  <text x="240" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">→ IMAGE ID: aaa111bbb222</text>

  <text x="240" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">↓ 새 버전 배포 (재빌드)</text>

  <!-- Day 2 -->
  <text x="240" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Day 2</text>
  <rect x="84" y="280" width="312" height="52" fill="#180e0e" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="301" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">nginx:latest</text>
  <text x="240" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle">→ IMAGE ID: ccc333ddd444</text>

  <rect x="84" y="350" width="312" height="64" fill="#111820" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">같은 태그명이지만</text>
  <text x="240" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">가리키는 이미지가 달라졌다!</text>
  <text x="240" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">재현성 보장 불가</text>

  <!-- Right: Digest (immutable) -->
  <rect x="460" y="104" width="360" height="332" fill="#0d1117" rx="10" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Digest (Immutable)</text>

  <!-- Digest is content hash -->
  <text x="640" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">콘텐츠 기반 SHA256 해시</text>
  <rect x="484" y="172" width="312" height="52" fill="#0f1a0f" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" text-anchor="middle">nginx@sha256:abc1234...</text>
  <text x="640" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">항상 같은 이미지 보장</text>

  <text x="640" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">↓ 이미지 변경 시</text>

  <!-- New digest -->
  <text x="640" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">새로운 이미지 = 새로운 Digest</text>
  <rect x="484" y="280" width="312" height="52" fill="#0f1a0f" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="301" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" text-anchor="middle">nginx@sha256:def5678...</text>
  <text x="640" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">완전히 다른 Digest</text>

  <rect x="484" y="350" width="312" height="64" fill="#111820" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Digest로 pull하면</text>
  <text x="640" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">항상 동일한 이미지 획득</text>
  <text x="640" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">재현 가능한 배포 보장</text>
</svg>
