<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">contextlib 유틸리티: suppress / redirect</text>

  <!-- Left: suppress -->
  <rect x="60" y="66" width="360" height="50" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">contextlib.suppress</text>
  <text x="240" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">지정 예외를 조용히 억제</text>

  <!-- suppress description boxes -->
  <rect x="60" y="134" width="360" height="60" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="240" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">try/except pass 를 한 줄로</text>
  <text x="240" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">여러 예외 타입 동시 지정 가능</text>
  <text x="240" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">FileNotFoundError, KeyError, ...</text>

  <rect x="60" y="210" width="360" height="50" rx="6" fill="#0d2b1a" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">with suppress(FileNotFoundError):</text>
  <text x="240" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">    os.remove("temp.txt")  # 없어도 OK</text>

  <rect x="60" y="276" width="360" height="40" rx="6" fill="#2b0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">주의: 예외 억제 남용 금지</text>
  <text x="240" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">의도치 않은 버그를 숨길 수 있음</text>

  <!-- Right: redirect -->
  <rect x="460" y="66" width="360" height="50" rx="8" fill="#1a0d2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">contextlib.redirect_stdout</text>
  <text x="640" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">표준 출력을 파일/버퍼로 리다이렉트</text>

  <rect x="460" y="134" width="360" height="60" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="640" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">print() 출력 캡처 / 리다이렉트</text>
  <text x="640" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">redirect_stderr 도 동일한 방식</text>
  <text x="640" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">io.StringIO 로 메모리 캡처 가능</text>

  <rect x="460" y="210" width="360" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">with redirect_stdout(buf):</text>
  <text x="640" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">    print("captured")  # buf 에 저장</text>

  <rect x="460" y="276" width="360" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">테스트 / 서드파티 출력 캡처에 유용</text>
  <text x="640" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스레드 안전하지 않음 — 전역 sys.stdout 변경</text>

  <!-- Bottom: nullcontext -->
  <rect x="160" y="336" width="560" height="96" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">contextlib.nullcontext</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">아무것도 하지 않는 컨텍스트 매니저 — 조건부 with 문에서 자리표시자로 활용</text>
  <text x="440" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">ctx = lock if threaded else nullcontext()</text>
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">with ctx:  ...</text>
</svg>
