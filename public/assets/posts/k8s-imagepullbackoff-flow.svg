<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrD" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrDr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">이미지를 가져오는 흐름과 실패 지점</text>
  <text x="50" y="80" font-size="14" fill="#888">kubelet이 레지스트리에서 이미지를 못 받으면 ErrImagePull → ImagePullBackOff</text>

  <rect x="50" y="130" width="200" height="80" rx="10" fill="#16181d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="165" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">kubelet</text>
  <text x="150" y="188" font-size="12" fill="#9aa4b8" text-anchor="middle">노드에서 이미지 요청</text>

  <rect x="340" y="130" width="200" height="80" rx="10" fill="#16181d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="165" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">레지스트리</text>
  <text x="440" y="188" font-size="12" fill="#9aa4b8" text-anchor="middle">Docker Hub · ECR · GHCR</text>

  <rect x="630" y="130" width="200" height="80" rx="10" fill="#16181d" stroke="#e05555" stroke-width="1.5"/>
  <text x="730" y="165" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">ImagePullBackOff</text>
  <text x="730" y="188" font-size="12" fill="#9aa4b8" text-anchor="middle">재시도 간격을 늘리며 대기</text>

  <line x1="250" y1="160" x2="338" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrD)"/>
  <text x="294" y="148" font-size="12" fill="#888" text-anchor="middle">pull</text>

  <path d="M 440 210 C 440 250, 730 250, 730 212" fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrDr)"/>
  <text x="585" y="278" font-size="12" fill="#e05555" text-anchor="middle">실패 시 ErrImagePull → 백오프 재시도</text>

  <text x="50" y="318" font-size="13" fill="#888">CrashLoop과 달리 컨테이너는 한 번도 실행되지 않는다 — 문제는 이미지를 받는 단계에 있다.</text>
</svg>
