<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">iftop — 네트워크 대역폭 실시간 모니터링</text>

  <!-- iftop terminal mockup -->
  <rect x="60" y="68" width="760" height="220" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="60" y="68" width="760" height="26" rx="8" fill="#111111"/>
  <rect x="60" y="80" width="760" height="14" fill="#111111"/>
  <text x="440" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">iftop -i eth0</text>

  <!-- Scale bar -->
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">                         1Mb        10Mb       100Mb       1000Mb</text>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">──────────────────────────┼──────────┼───────────┼───────────┼</text>

  <!-- Connections -->
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">192.168.1.10:443   =&gt;   203.0.113.5:49234     <tspan fill="#55c555">45.2Mb</tspan>  <tspan fill="#55c555">42.1Mb</tspan>  <tspan fill="#55c555">38.5Mb</tspan></text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">                   &lt;=                           1.2Mb   1.1Mb   0.9Mb</text>

  <text x="76" y="175" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">192.168.1.10:22    =&gt;   10.0.0.55:51200         <tspan fill="#7ec8e3">8.3Mb</tspan>   <tspan fill="#7ec8e3">7.9Mb</tspan>   <tspan fill="#7ec8e3">6.8Mb</tspan></text>
  <text x="76" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">                   &lt;=                           4.1Mb   3.8Mb   3.2Mb</text>

  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">─────────────────────────────────────────────────────────────────────</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">TX:  cum:  312MB  peak:  58.2Mb   rates:  <tspan fill="#e05555">53.5Mb</tspan>  49.9Mb  45.3Mb</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">RX:  cum:   47MB  peak:   6.1Mb   rates:   5.3Mb   4.9Mb   4.1Mb</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">TOTAL:      359MB          64Mb           58.8Mb  54.8Mb  49.4Mb</text>

  <!-- Explanation -->
  <rect x="60" y="308" width="760" height="90" rx="8" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">컬럼 해석: 2s / 10s / 40s 이동 평균</text>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• <tspan fill="#7ec8e3" font-weight="600">=>  &lt;=</tspan> 방향 — 송신(outbound) / 수신(inbound)</text>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• <tspan fill="#7ec8e3" font-weight="600">-i eth0</tspan> 인터페이스 지정  •  <tspan fill="#7ec8e3" font-weight="600">-n</tspan> DNS 역조회 끄기  •  <tspan fill="#7ec8e3" font-weight="600">-P</tspan> 포트 표시</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• <tspan fill="#7ec8e3" font-weight="600">-f "dst host 8.8.8.8"</tspan> BPF 필터로 특정 흐름만 표시</text>
</svg>
