<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">단일 연결 리스트 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">각 노드가 데이터와 다음 노드의 포인터를 가진다</text>

  <defs>
    <marker id="sll-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- HEAD label -->
  <text x="100" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">head</text>
  <line x1="100" y1="118" x2="100" y2="140" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Node 1 -->
  <rect x="60" y="140" width="80" height="50" rx="6" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <line x1="100" y1="140" x2="100" y2="190" stroke="#3a6ea8" stroke-width="1"/>
  <text x="100" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">10</text>
  <rect x="140" y="140" width="50" height="50" rx="0" fill="#0a1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="165" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">next</text>
  <line x1="190" y1="165" x2="220" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#sll-arr)"/>
  <text x="100" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">data</text>
  <text x="165" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">pointer</text>

  <!-- Node 2 -->
  <rect x="220" y="140" width="80" height="50" rx="6" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <line x1="260" y1="140" x2="260" y2="190" stroke="#3a6ea8" stroke-width="1"/>
  <text x="260" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">25</text>
  <rect x="300" y="140" width="50" height="50" rx="0" fill="#0a1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="325" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">next</text>
  <line x1="350" y1="165" x2="380" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#sll-arr)"/>

  <!-- Node 3 -->
  <rect x="380" y="140" width="80" height="50" rx="6" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <line x1="420" y1="140" x2="420" y2="190" stroke="#3a6ea8" stroke-width="1"/>
  <text x="420" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">37</text>
  <rect x="460" y="140" width="50" height="50" rx="0" fill="#0a1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="485" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">next</text>
  <line x1="510" y1="165" x2="540" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#sll-arr)"/>

  <!-- Node 4 -->
  <rect x="540" y="140" width="80" height="50" rx="6" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <line x1="580" y1="140" x2="580" y2="190" stroke="#3a6ea8" stroke-width="1"/>
  <text x="580" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">42</text>
  <rect x="620" y="140" width="50" height="50" rx="0" fill="#0a1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="645" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">next</text>
  <line x1="670" y1="165" x2="700" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#sll-arr)"/>

  <!-- NULL -->
  <rect x="700" y="148" width="60" height="34" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <text x="730" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#444" text-anchor="middle">NULL</text>

  <!-- TAIL label -->
  <text x="580" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">tail</text>
  <line x1="580" y1="118" x2="580" y2="140" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Node structure zoom -->
  <rect x="60" y="230" width="280" height="100" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="200" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">노드 구조</text>
  <text x="80" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan>
    <tspan fill="#ffffff"> Node:</tspan>
  </text>
  <text x="80" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  def</tspan>
    <tspan fill="#ffffff"> __init__(self, data):</tspan>
  </text>
  <text x="80" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    self.data = data; self.next = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">None</tspan>
  </text>

  <!-- Complexity table -->
  <rect x="360" y="230" width="460" height="100" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="590" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">단일 연결 리스트 복잡도</text>
  <text x="380" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">앞 삽입/삭제: O(1)</text>
  <text x="380" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">뒤 삽입: O(1) (tail 유지 시)</text>
  <text x="380" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">뒤 삭제: O(n) (prev 없음)</text>
  <text x="600" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">탐색: O(n)</text>
  <text x="600" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인덱스 접근: O(n)</text>
  <text x="600" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공간: O(n) + 포인터</text>

  <!-- vs Array note -->
  <rect x="60" y="346" width="760" height="56" rx="6" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">배열 vs 연결 리스트 핵심 차이</text>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">배열: O(1) 접근, O(n) 중간 삽입 | 연결리스트: O(n) 접근, O(1) 앞 삽입 (위치 알 때)</text>
</svg>
