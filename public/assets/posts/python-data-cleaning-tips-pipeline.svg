<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="270" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">정제는 단계의 연속이다</text>

  <defs>
    <marker id="dcar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">살펴보기</text>
  <text x="135" y="150" font-size="12" fill="#9aa4b8" text-anchor="middle">info / isna</text>

  <line x1="210" y1="132" x2="246" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dcar)"/>

  <rect x="250" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="325" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">결측치 처리</text>
  <text x="325" y="150" font-size="12" fill="#9aa4b8" text-anchor="middle">dropna / fillna</text>

  <line x1="400" y1="132" x2="436" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dcar)"/>

  <rect x="440" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="515" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">타입·중복</text>
  <text x="515" y="150" font-size="12" fill="#9aa4b8" text-anchor="middle">astype / dup</text>

  <line x1="590" y1="132" x2="626" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dcar)"/>

  <rect x="630" y="100" width="190" height="64" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="725" y="128" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">이상치·검증</text>
  <text x="725" y="150" font-size="12" fill="#9aa4b8" text-anchor="middle">범위·일관성 확인</text>

  <rect x="60" y="196" width="760" height="44" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="224" font-size="14" fill="#55c555" text-anchor="middle">원본은 건드리지 말고, 각 단계를 새 변수로 받으며 진행한다</text>
</svg>
