<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">브랜치 복구 추가 방법</text>

  <!-- Method 1: branch reflog -->
  <rect x="60" y="70" width="360" height="110" rx="8" fill="#0d1224" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">브랜치 전용 reflog</text>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">브랜치가 존재했을 때 reflog 파일이</text>
  <text x="240" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">.git/logs/refs/heads/에 남아 있을 수 있음</text>
  <text x="240" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        text-anchor="middle" font-size="12" fill="#55c555">git reflog show feature/auth</text>

  <!-- Method 2: fsck -->
  <rect x="460" y="70" width="360" height="110" rx="8" fill="#0d1224" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">git fsck</text>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">reflog가 없을 때 unreachable commit 조회</text>
  <text x="640" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커밋 메시지로 대상 특정</text>
  <text x="640" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        text-anchor="middle" font-size="12" fill="#55c555">git fsck --unreachable</text>

  <!-- Code block -->
  <rect x="60" y="210" width="760" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># fsck로 dangling commit 찾기</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">fsck</tspan> --unreachable 2&gt;/dev/null | <tspan fill="#7ec8e3" font-weight="600">grep</tspan> commit</text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 각 SHA의 커밋 메시지 확인</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">show</tspan> --oneline --no-patch &lt;SHA&gt;</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">checkout</tspan> -b feature/auth &lt;SHA&gt;</text>
</svg>
