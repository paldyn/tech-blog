<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">KeyStore vs TrustStore</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">둘 다 키 저장소지만 담는 것과 역할이 정반대다</text>

  <!-- KeyStore -->
  <rect x="70" y="104" width="340" height="240" rx="10" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#55c555">KeyStore</text>
  <line x1="94" y1="156" x2="386" y2="156" stroke="#254025" stroke-width="1"/>
  <text x="94" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">담는 것: 내 개인키 + 인증서</text>
  <text x="94" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">"나는 누구인가"를 증명</text>
  <text x="94" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">서버가 자신을 인증할 때 사용</text>
  <text x="94" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">개인키 포함 → 절대 유출 금지</text>
  <text x="94" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">javax.net.ssl.keyStore</text>

  <!-- TrustStore -->
  <rect x="470" y="104" width="340" height="240" rx="10" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#7ec8e3">TrustStore</text>
  <line x1="494" y1="156" x2="786" y2="156" stroke="#2a3550" stroke-width="1"/>
  <text x="494" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">담는 것: 신뢰하는 CA 인증서</text>
  <text x="494" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">"누구를 믿는가"를 판단</text>
  <text x="494" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">상대 인증서 검증에 사용</text>
  <text x="494" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">공개키만 → 유출돼도 덜 치명적</text>
  <text x="494" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">javax.net.ssl.trustStore</text>

  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">JVM은 기본 TrustStore(cacerts)에 주요 CA를 이미 담고 있다</text>
</svg>
