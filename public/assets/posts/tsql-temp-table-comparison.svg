<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">임시 테이블 vs 테이블 변수 — 특성 비교</text>

  <!-- Headers -->
  <rect x="60" y="68" width="240" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="180" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">#임시 테이블</text>

  <rect x="320" y="68" width="240" height="44" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">@테이블 변수</text>

  <rect x="580" y="68" width="240" height="44" rx="6" fill="#2a1a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="700" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">##전역 임시 테이블</text>

  <!-- Row: 저장 위치 -->
  <rect x="60" y="128" width="760" height="40" rx="0" fill="#111120" stroke="#2a2a3e" stroke-width="1"/>
  <text x="180" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">tempdb (디스크/메모리)</text>
  <text x="440" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">메모리 우선 (8행↑ tempdb)</text>
  <text x="700" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">tempdb (세션 공유)</text>
  <line x1="300" y1="128" x2="300" y2="168" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="560" y1="128" x2="560" y2="168" stroke="#2a2a3e" stroke-width="1"/>
  <text x="30" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle" transform="rotate(-90,30,152)">저장</text>

  <!-- Row: 범위 -->
  <rect x="60" y="168" width="760" height="40" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <text x="180" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">로컬 세션 전체</text>
  <text x="440" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">배치/프로시저 블록</text>
  <text x="700" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">모든 세션 (전역)</text>
  <line x1="300" y1="168" x2="300" y2="208" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="560" y1="168" x2="560" y2="208" stroke="#2a2a3e" stroke-width="1"/>
  <text x="30" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle" transform="rotate(-90,30,192)">범위</text>

  <!-- Row: 인덱스 -->
  <rect x="60" y="208" width="760" height="40" rx="0" fill="#111120" stroke="#2a2a3e" stroke-width="1"/>
  <text x="180" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 가능 (클러스터/비클러스터)</text>
  <text x="440" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">인라인 인덱스만 (제한적)</text>
  <text x="700" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 가능</text>
  <line x1="300" y1="208" x2="300" y2="248" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="560" y1="208" x2="560" y2="248" stroke="#2a2a3e" stroke-width="1"/>
  <text x="30" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle" transform="rotate(-90,30,232)">인덱스</text>

  <!-- Row: 통계 -->
  <rect x="60" y="248" width="760" height="40" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <text x="180" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 자동 통계 수집</text>
  <text x="440" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">통계 없음 (항상 1행 추정)</text>
  <text x="700" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 자동 통계 수집</text>
  <line x1="300" y1="248" x2="300" y2="288" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="560" y1="248" x2="560" y2="288" stroke="#2a2a3e" stroke-width="1"/>
  <text x="30" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle" transform="rotate(-90,30,272)">통계</text>

  <!-- Row: 트랜잭션 -->
  <rect x="60" y="288" width="760" height="40" rx="0" fill="#111120" stroke="#2a2a3e" stroke-width="1"/>
  <text x="180" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ ROLLBACK 대상</text>
  <text x="440" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">ROLLBACK 영향 없음</text>
  <text x="700" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ ROLLBACK 대상</text>
  <line x1="300" y1="288" x2="300" y2="328" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="560" y1="288" x2="560" y2="328" stroke="#2a2a3e" stroke-width="1"/>
  <text x="30" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle" transform="rotate(-90,30,312)">트랜잭션</text>

  <!-- Row: 적합 상황 -->
  <rect x="60" y="328" width="760" height="52" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <text x="180" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">대용량 · 인덱스 필요</text>
  <text x="180" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">복잡 조인 포함 중간 결과</text>
  <text x="440" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">소량 (&lt;100행) 임시 저장</text>
  <text x="440" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">파라미터 전달, 간단 루프</text>
  <text x="700" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">세션 간 데이터 공유</text>
  <text x="700" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(드물게 사용)</text>
  <line x1="300" y1="328" x2="300" y2="380" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="560" y1="328" x2="560" y2="380" stroke="#2a2a3e" stroke-width="1"/>
  <text x="30" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle" transform="rotate(-90,30,358)">적합</text>

  <!-- Bottom note -->
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">테이블 변수의 통계 없음 문제 → SQL Server 2019+에서 OPTIMIZE FOR UNKNOWN / Interleaved Exec로 개선</text>
  <text x="440" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">기본 원칙: 10행 이하 → @테이블 변수 · 100행 이상 → #임시 테이블</text>
</svg>
