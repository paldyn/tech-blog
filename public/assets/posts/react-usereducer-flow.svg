<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr-r1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useReducer 데이터 흐름</text>

  <!-- State box (center top) -->
  <rect x="310" y="80" width="260" height="60" rx="8" fill="#0a0a1e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">State</text>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">{ count: 0, status: 'idle' }</text>

  <!-- Arrow: state to component -->
  <line x1="440" y1="142" x2="440" y2="174" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-r3)"/>

  <!-- Component box (center) -->
  <rect x="310" y="178" width="260" height="60" rx="8" fill="#1a0a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">컴포넌트</text>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">dispatch({ type: 'increment' })</text>

  <!-- Arrow: component dispatches action -->
  <path d="M 310 208 C 200 208 120 270 120 302" stroke="#7ec8e3" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arr-r1)"/>
  <text x="165" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">dispatch(action)</text>

  <!-- Action box (left) -->
  <rect x="60" y="292" width="220" height="60" rx="8" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Action</text>
  <text x="170" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">{ type: 'increment' }</text>

  <!-- Arrow: action to reducer -->
  <line x1="282" y1="322" x2="360" y2="322" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-r1)"/>

  <!-- Reducer box (center bottom) -->
  <rect x="360" y="292" width="260" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Reducer 함수</text>
  <text x="490" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(state, action) =&gt; newState</text>

  <!-- Arrow: reducer to new state -->
  <path d="M 620 322 C 750 322 760 200 570 142" stroke="#55c555" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arr-r2)"/>
  <text x="730" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">새 state 반환</text>
</svg>
