<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr-d" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-u" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">분할 정복 패러다임 - Merge Sort</text>

  <!-- Phase labels (left side) -->
  <rect x="60" y="68" width="90" height="120" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="105" y="108" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle" transform="rotate(-90,105,128)">DIVIDE</text>
  <text x="105" y="182" font-size="12" fill="#888" text-anchor="middle">분할</text>

  <rect x="60" y="198" width="90" height="120" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="105" y="238" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle" transform="rotate(-90,105,258)">CONQUER</text>
  <text x="105" y="312" font-size="12" fill="#888" text-anchor="middle">정복</text>

  <rect x="60" y="328" width="90" height="120" rx="6" fill="#1a1a3a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="105" y="368" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle" transform="rotate(-90,105,388)">COMBINE</text>
  <text x="105" y="442" font-size="12" fill="#888" text-anchor="middle">결합</text>

  <!-- Level 0: Full array -->
  <rect x="280" y="72" width="540" height="40" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="550" y="97" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">[8, 3, 1, 5, 2, 7, 4, 6]</text>

  <!-- Split arrow -->
  <line x1="440" y1="112" x2="380" y2="152" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="660" y1="112" x2="720" y2="152" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <!-- Level 1: Two halves -->
  <rect x="170" y="156" width="240" height="36" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="290" y="179" font-size="13" fill="#7ec8e3" text-anchor="middle">[8, 3, 1, 5]</text>

  <rect x="470" y="156" width="240" height="36" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="590" y="179" font-size="13" fill="#7ec8e3" text-anchor="middle">[2, 7, 4, 6]</text>

  <!-- Split arrows level 1 -->
  <line x1="230" y1="192" x2="185" y2="212" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="350" y1="192" x2="395" y2="212" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="530" y1="192" x2="485" y2="212" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="650" y1="192" x2="695" y2="212" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <!-- Level 2: pairs -->
  <rect x="155" y="216" width="90" height="32" rx="5" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="237" font-size="12" fill="#7ec8e3" text-anchor="middle">[8, 3]</text>

  <rect x="265" y="216" width="90" height="32" rx="5" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="310" y="237" font-size="12" fill="#7ec8e3" text-anchor="middle">[1, 5]</text>

  <rect x="455" y="216" width="90" height="32" rx="5" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="500" y="237" font-size="12" fill="#7ec8e3" text-anchor="middle">[2, 7]</text>

  <rect x="565" y="216" width="90" height="32" rx="5" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="610" y="237" font-size="12" fill="#7ec8e3" text-anchor="middle">[4, 6]</text>

  <!-- Split to singles -->
  <line x1="180" y1="248" x2="160" y2="264" stroke="#7ec8e3" stroke-width="1" marker-end="url(#arr-d)"/>
  <line x1="220" y1="248" x2="240" y2="264" stroke="#7ec8e3" stroke-width="1" marker-end="url(#arr-d)"/>
  <line x1="290" y1="248" x2="270" y2="264" stroke="#7ec8e3" stroke-width="1" marker-end="url(#arr-d)"/>
  <line x1="330" y1="248" x2="350" y2="264" stroke="#7ec8e3" stroke-width="1" marker-end="url(#arr-d)"/>
  <line x1="480" y1="248" x2="460" y2="264" stroke="#7ec8e3" stroke-width="1" marker-end="url(#arr-d)"/>
  <line x1="520" y1="248" x2="540" y2="264" stroke="#7ec8e3" stroke-width="1" marker-end="url(#arr-d)"/>
  <line x1="590" y1="248" x2="570" y2="264" stroke="#7ec8e3" stroke-width="1" marker-end="url(#arr-d)"/>
  <line x1="630" y1="248" x2="650" y2="264" stroke="#7ec8e3" stroke-width="1" marker-end="url(#arr-d)"/>

  <!-- Level 3: singles (CONQUER) -->
  <rect x="140" y="268" width="36" height="28" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="158" y="287" font-size="12" fill="#55c555" text-anchor="middle">8</text>
  <rect x="222" y="268" width="36" height="28" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="287" font-size="12" fill="#55c555" text-anchor="middle">3</text>
  <rect x="252" y="268" width="36" height="28" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="270" y="287" font-size="12" fill="#55c555" text-anchor="middle">1</text>
  <rect x="334" y="268" width="36" height="28" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="352" y="287" font-size="12" fill="#55c555" text-anchor="middle">5</text>
  <rect x="440" y="268" width="36" height="28" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="458" y="287" font-size="12" fill="#55c555" text-anchor="middle">2</text>
  <rect x="522" y="268" width="36" height="28" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="287" font-size="12" fill="#55c555" text-anchor="middle">7</text>
  <rect x="552" y="268" width="36" height="28" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="287" font-size="12" fill="#55c555" text-anchor="middle">4</text>
  <rect x="634" y="268" width="36" height="28" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="652" y="287" font-size="12" fill="#55c555" text-anchor="middle">6</text>

  <!-- COMBINE phase: merging up -->
  <!-- Merge arrows -->
  <line x1="160" y1="296" x2="195" y2="330" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="240" y1="296" x2="225" y2="330" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="270" y1="296" x2="305" y2="330" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="352" y1="296" x2="345" y2="330" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="458" y1="296" x2="493" y2="330" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="540" y1="296" x2="525" y2="330" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="570" y1="296" x2="605" y2="330" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="652" y1="296" x2="645" y2="330" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>

  <!-- Level 2 merged -->
  <rect x="155" y="332" width="90" height="32" rx="5" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="353" font-size="12" fill="#55c555" text-anchor="middle">[3, 8]</text>

  <rect x="265" y="332" width="90" height="32" rx="5" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="310" y="353" font-size="12" fill="#55c555" text-anchor="middle">[1, 5]</text>

  <rect x="455" y="332" width="90" height="32" rx="5" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="500" y="353" font-size="12" fill="#55c555" text-anchor="middle">[2, 7]</text>

  <rect x="565" y="332" width="90" height="32" rx="5" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="353" font-size="12" fill="#55c555" text-anchor="middle">[4, 6]</text>

  <!-- Merge up again -->
  <line x1="200" y1="364" x2="275" y2="396" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="310" y1="364" x2="305" y2="396" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="500" y1="364" x2="555" y2="396" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="610" y1="364" x2="585" y2="396" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>

  <!-- Level 1 merged -->
  <rect x="170" y="398" width="240" height="36" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="290" y="421" font-size="13" fill="#55c555" text-anchor="middle">[1, 3, 5, 8]</text>

  <rect x="470" y="398" width="240" height="36" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="590" y="421" font-size="13" fill="#55c555" text-anchor="middle">[2, 4, 6, 7]</text>

  <!-- Final merge -->
  <line x1="290" y1="434" x2="400" y2="462" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-u)"/>
  <line x1="590" y1="434" x2="480" y2="462" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-u)"/>

  <!-- Final sorted array -->
  <rect x="230" y="466" width="420" height="40" rx="6" fill="#1a1a3a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="491" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">[1, 2, 3, 4, 5, 6, 7, 8]  &#10003; 정렬 완료</text>
</svg>
