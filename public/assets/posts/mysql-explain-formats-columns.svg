  <rect x="420" y="434" width="420" height="60" fill="#0e1420" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="630" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">filtered가 낮으면 → 인덱스 선택성 낮음</text>
  <text x="630" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">→ 복합 인덱스 또는 WHERE 조건 개선 필요</text>

  <!-- select_type -->
  <text x="40" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">select_type 주요 값:</text>
  <text x="200" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">SIMPLE</text>
  <text x="260" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 단순 SELECT  </text>
  <text x="390" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">PRIMARY</text>
  <text x="460" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 최외부 서브쿼리  </text>
  <text x="610" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">DERIVED</text>
  <text x="675" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> FROM 서브쿼리</text>

  <text x="40" y="555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">SUBQUERY</text>
  <text x="200" y="555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">SUBQUERY</text>
  <text x="270" y="555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> SELECT 비상관 서브쿼리  </text>
  <text x="470" y="555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">DEPENDENT SUBQUERY</text>
  <text x="650" y="555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 상관 서브쿼리</text>
