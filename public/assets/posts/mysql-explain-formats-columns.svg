  <text x="40" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">rows × filtered → 실제 처리 행 수 추정</text>

  <rect x="40" y="434" width="360" height="60" fill="#0e1420" rx="6" stroke="#2a3a5e" stroke-width="1"/>
