<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">선언형(Declarative) vs 명령형(Imperative)</text>

  <!-- Left: Imperative -->
  <rect x="60" y="68" width="370" height="316" rx="10" fill="#0a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="68" width="370" height="40" rx="10" fill="#2d0d0d"/>
  <text x="245" y="93" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">명령형 (Imperative)</text>

  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">어떻게(How) 수행할지 지시</text>
  <text x="80" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">kubectl create, run, expose ...</text>
  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">상태 추적 어려움 (히스토리 없음)</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">반복 실행 시 에러 발생 가능</text>
  <text x="80" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">빠른 one-shot 작업에 적합</text>

  <!-- Code block in left -->
  <rect x="76" y="246" width="338" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 명령형</text>
  <text x="92" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">kubectl</text>
  <text x="150" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> create deployment nginx \</text>
  <text x="92" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  --image=nginx:1.27 \</text>
  <text x="92" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  --replicas=3</text>
  <text x="92" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 다시 실행 → AlreadyExists 에러</text>

  <!-- Right: Declarative -->
  <rect x="450" y="68" width="370" height="316" rx="10" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <rect x="450" y="68" width="370" height="40" rx="10" fill="#0d2d0d"/>
  <text x="635" y="93" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">선언형 (Declarative)</text>

  <text x="470" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">무엇을(What) 원하는지 선언</text>
  <text x="470" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">kubectl apply -f manifest.yaml</text>
  <text x="470" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Git에 YAML 저장 → 히스토리 추적</text>
  <text x="470" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">멱등(idempotent): 반복 실행 안전</text>
  <text x="470" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">GitOps, CI/CD 파이프라인에 적합</text>

  <!-- Code block in right -->
  <rect x="466" y="246" width="338" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 선언형</text>
  <text x="482" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">kubectl</text>
  <text x="540" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> apply -f nginx.yaml</text>
  <text x="482" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 없으면 생성, 있으면 업데이트</text>
  <text x="482" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 다시 실행 → 변경 없으면 no-op</text>
  <text x="482" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600"># unchanged ✓</text>

  <!-- Bottom recommendation -->
  <rect x="60" y="398" width="760" height="2" rx="0" fill="#1e1e1e"/>
</svg>
