<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">파드 생명주기 훅 타이밍</text>

  <!-- Timeline bar background -->
  <rect x="60" y="80" width="760" height="40" rx="4" fill="#1a1a1a"/>

  <!-- Container lifecycle bar -->
  <rect x="160" y="84" width="560" height="32" rx="4" fill="#0d2d0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="104" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">컨테이너 실행 기간</text>

  <!-- Timeline labels -->
  <text x="160" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">컨테이너 시작</text>
  <text x="720" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">컨테이너 종료</text>

  <!-- PostStart hook -->
  <rect x="100" y="160" width="220" height="80" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">PostStart</text>
  <text x="210" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨테이너 시작 직후 실행</text>
  <text x="210" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(ENTRYPOINT와 병렬)</text>

  <!-- Arrow: container start → PostStart -->
  <line x1="160" y1="120" x2="160" y2="160" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="160" y1="160" x2="100" y2="160" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- PreStop hook -->
  <rect x="560" y="160" width="220" height="80" rx="8" fill="#2d1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="670" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178">PreStop</text>
  <text x="670" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SIGTERM 전 실행</text>
  <text x="670" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(완료 후 SIGTERM 전송)</text>

  <!-- Arrow: container end → PreStop -->
  <line x1="720" y1="120" x2="720" y2="160" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="720" y1="160" x2="780" y2="160" stroke="#ce9178" stroke-width="1.5"/>

  <!-- Termination timeline -->
  <rect x="60" y="280" width="760" height="60" rx="4" fill="#1a1a1a"/>
  <text x="100" y="300"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">종료 흐름:</text>

  <!-- Step sequence in termination -->
  <rect x="100" y="308" width="100" height="24" rx="4" fill="#2d1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="150" y="324" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">PreStop 실행</text>

  <text x="210" y="322" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">→</text>

  <rect x="220" y="308" width="100" height="24" rx="4" fill="#1e1e1e" stroke="#888" stroke-width="1"/>
  <text x="270" y="324" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SIGTERM</text>

  <text x="330" y="322" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">→</text>

  <rect x="340" y="308" width="160" height="24" rx="4" fill="#1e1e1e" stroke="#888" stroke-width="1"/>
  <text x="420" y="324" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">grace period (기본 30s)</text>

  <text x="510" y="322" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">→</text>

  <rect x="520" y="308" width="100" height="24" rx="4" fill="#2d0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="570" y="324" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">SIGKILL</text>

  <text x="630" y="322" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">→</text>

  <rect x="640" y="308" width="140" height="24" rx="4" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="710" y="324" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컨테이너 제거</text>

  <!-- Warning note -->
  <rect x="60" y="368" width="760" height="52" rx="6" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="440" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">⚠ PostStart와 ENTRYPOINT는 병렬 실행 — 순서 보장 없음</text>
  <text x="440" y="408" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PreStop 완료 후 SIGTERM 전송. terminationGracePeriodSeconds 내 응답 필요</text>
</svg>
