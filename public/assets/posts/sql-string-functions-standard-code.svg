<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="350" viewBox="0 0 880 350">
  <rect width="880" height="350" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">문자열 함수 실전 조합</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">이메일 정규화 · 이름 마스킹 · 구분자 분할</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="216" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 이메일 도메인 추출</tspan></text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#55c555">SUBSTRING</tspan>(email,</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#55c555">POSITION</tspan>(<tspan fill="#ce9178">'@'</tspan> <tspan fill="#7ec8e3">IN</tspan> email) + <tspan fill="#b5cea8">1</tspan>)</text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 이름 마스킹: 첫 글자만 표시</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#55c555">LEFT</tspan>(name, <tspan fill="#b5cea8">1</tspan>) ||</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#55c555">REPEAT</tspan>(<tspan fill="#ce9178">'*'</tspan>, <tspan fill="#55c555">CHAR_LENGTH</tspan>(name)-<tspan fill="#b5cea8">1</tspan>)</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 전화번호 포맷: 010-1234-5678</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#55c555">LEFT</tspan>(phone,<tspan fill="#b5cea8">3</tspan>)||<tspan fill="#ce9178">'-'</tspan>||<tspan fill="#55c555">SUBSTRING</tspan>(phone,<tspan fill="#b5cea8">4</tspan>,<tspan fill="#b5cea8">4</tspan>)</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  ||<tspan fill="#ce9178">'-'</tspan>||<tspan fill="#55c555">RIGHT</tspan>(phone,<tspan fill="#b5cea8">4</tspan>)</text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 그룹별 이름 목록 합치기</tspan></text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">STRING_AGG</tspan>(name, <tspan fill="#ce9178">', '</tspan> <tspan fill="#7ec8e3">ORDER BY</tspan> name)</text>

  <!-- Note -->
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">|| 는 SQL 표준 연결 연산자 — MySQL에서는 CONCAT() 필요 (|| 는 OR)</text>
</svg>
