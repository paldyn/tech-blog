<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">교차 검증 종류 비교</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">상황에 맞는 CV 방식을 선택해야 신뢰할 수 있는 성능 추정이 가능하다</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="316" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>

  <!-- Line 1 -->
  <text x="76" y="110" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># ① K-Fold: 기본형, 분류 · 회귀</text>
  <text x="76" y="128" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">from</text>
  <text x="110" y="128" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> sklearn.model_selection </text>
  <text x="76" y="146" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    import</text>
  <text x="131" y="146" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> KFold, StratifiedKFold</text>
  <text x="76" y="164" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">scores = cross_val_score(model, X, y,</text>
  <text x="76" y="182" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    cv=</text>
  <text x="117" y="182" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">5</text>
  <text x="124" y="182" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">, scoring=</text>
  <text x="200" y="182" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">'accuracy'</text>
  <text x="264" y="182" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">)</text>
  <text x="76" y="200" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># → [0.842, 0.857, 0.831, 0.863, 0.848]</text>

  <!-- Divider -->
  <line x1="76" y1="214" x2="804" y2="214" stroke="#1e2433" stroke-width="1"/>

  <!-- Stratified -->
  <text x="76" y="232" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># ② StratifiedKFold: 불균형 클래스</text>
  <text x="76" y="250" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">skf = StratifiedKFold(n_splits=</text>
  <text x="301" y="250" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">5</text>
  <text x="308" y="250" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">, shuffle=</text>
  <text x="373" y="250" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">True</text>
  <text x="401" y="250" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">)</text>
  <text x="76" y="268" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># 각 fold의 클래스 비율을 원본과 동일 유지</text>

  <!-- Divider -->
  <line x1="76" y1="282" x2="804" y2="282" stroke="#1e2433" stroke-width="1"/>

  <!-- TimeSeriesSplit -->
  <text x="76" y="300" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># ③ TimeSeriesSplit: 시계열</text>
  <text x="76" y="318" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">from</text>
  <text x="110" y="318" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> sklearn.model_selection </text>
  <text x="76" y="336" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    import</text>
  <text x="131" y="336" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> TimeSeriesSplit</text>
  <text x="76" y="354" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">tscv = TimeSeriesSplit(n_splits=</text>
  <text x="297" y="354" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">5</text>
  <text x="304" y="354" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">)</text>
  <text x="76" y="372" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># 검증은 항상 훈련보다 미래 시점</text>
  <text x="76" y="390" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># 미래 정보 누수 원천 차단</text>

  <!-- Footer -->
  <text x="440" y="448" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
