<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Ephemeral Volume 생명주기</text>

  <!-- Timeline header -->
  <text x="60" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">수명 범위</text>
  <text x="200" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">생성 시점</text>
  <text x="420" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">삭제 시점</text>
  <text x="640" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">주요 용도</text>

  <!-- Divider -->
  <line x1="60" y1="96" x2="820" y2="96" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 1: emptyDir (Pod-scoped) -->
  <rect x="60" y="108" width="120" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Pod 수명</text>

  <text x="200" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Pod 스케줄링 시</text>
  <text x="420" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">Pod 삭제 시</text>
  <text x="640" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">컨테이너 간 공유</text>

  <!-- Row label -->
  <text x="60" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">emptyDir</text>

  <!-- Divider -->
  <line x1="60" y1="168" x2="820" y2="168" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Row 2: configMap/secret -->
  <rect x="60" y="178" width="120" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Pod 수명</text>

  <text x="200" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Pod 스케줄링 시</text>
  <text x="420" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">Pod 삭제 시</text>
  <text x="640" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">설정·비밀값 주입</text>

  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">configMap / secret</text>

  <!-- Divider -->
  <line x1="60" y1="236" x2="820" y2="236" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Row 3: projected -->
  <rect x="60" y="248" width="120" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Pod 수명</text>

  <text x="200" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Pod 스케줄링 시</text>
  <text x="420" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">Pod 삭제 시</text>
  <text x="640" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">SA 토큰 + CM + Secret 통합</text>

  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">projected</text>

  <!-- Divider -->
  <line x1="60" y1="306" x2="820" y2="306" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Row 4: Generic Ephemeral -->
  <rect x="60" y="318" width="120" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Pod 수명</text>

  <text x="200" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Pod 생성 후 PVC 바인딩</text>
  <text x="420" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">Pod 삭제 → PVC 자동 삭제</text>
  <text x="640" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">StorageClass 기반 임시 스토리지</text>

  <text x="60" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Generic Ephemeral Volume</text>

  <!-- Divider -->
  <line x1="60" y1="376" x2="820" y2="376" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Note box: container restart vs pod deletion -->
  <rect x="60" y="392" width="760" height="78" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">핵심 구분: 컨테이너 재시작 vs Pod 삭제</text>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">emptyDir 데이터는 컨테이너가 재시작해도 유지됩니다 — 동일 Pod 내 컨테이너끼리 공유되기 때문입니다.</text>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">Pod 자체가 종료(삭제·이동·노드 장애)되면 모든 Ephemeral Volume이 함께 사라집니다.</text>
</svg>
