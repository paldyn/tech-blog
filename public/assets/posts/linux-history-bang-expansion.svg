<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">! Bang 히스토리 확장</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">이전 명령을 재사용하는 핵심 패턴</text>

  <!-- left: designators -->
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">이벤트 지시자</text>
  <rect x="60" y="120" width="370" height="300" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ git commit -m "fix bug"  <tspan fill="#9aa4b8"># 방금 실행</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !!          <tspan fill="#9aa4b8"># 마지막 명령 전체 재실행</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git commit -m "fix bug"</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ sudo !!     <tspan fill="#9aa4b8"># 권한 필요 시 자주 쓰는 패턴</tspan></text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !git        <tspan fill="#9aa4b8"># 'git'으로 시작한 마지막 명령</tspan></text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git commit -m "fix bug"</text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !-2         <tspan fill="#9aa4b8"># 2번 전 명령</tspan></text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !42         <tspan fill="#9aa4b8"># history 번호 42번 명령</tspan></text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !?nginx     <tspan fill="#9aa4b8"># 'nginx'를 포함한 마지막 명령</tspan></text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !#          <tspan fill="#9aa4b8"># 현재 줄까지 입력한 내용</tspan></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">$ !git:p      <tspan fill="#9aa4b8"># :p = 실행 없이 출력만 (미리보기)</tspan></text>

  <!-- right: word designators -->
  <text x="480" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">단어 지시자</text>
  <rect x="460" y="120" width="360" height="300" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># cp /long/src/path /dest</text>
  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !!:0        <tspan fill="#9aa4b8"># 명령어만 (cp)</tspan></text>
  <text x="476" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !!:1        <tspan fill="#9aa4b8"># 첫 번째 인자</tspan></text>
  <text x="476" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !!:$  또는  !$   <tspan fill="#9aa4b8"># 마지막 인자</tspan></text>
  <text x="476" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/dest</text>
  <text x="476" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !!:*  또는  !*   <tspan fill="#9aa4b8"># 모든 인자</tspan></text>
  <text x="476" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/long/src/path /dest</text>
  <text x="476" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ !!:1-2      <tspan fill="#9aa4b8"># 1~2번 인자 범위</tspan></text>
  <text x="476" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">$ ^old^new    <tspan fill="#9aa4b8"># 마지막 명령 단어 치환</tspan></text>
  <text x="476" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># git statsu → git status</text>
  <text x="476" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">$ ^statsu^status</text>

  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">확장 전 내용을 확인하려면 끝에 :p 를 붙이거나 shopt -s histverify 설정</text>
</svg>
