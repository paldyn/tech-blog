<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">다중 Format — 조회/편집 화면 전환</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Format[view] / Format[edit] 전환으로 읽기·쓰기 모드 분리</text>

  <!-- Code block -->
  <rect x="60" y="92" width="760" height="310" fill="#000000" rx="6" stroke="#3a4a6e"/>

  <text x="80" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// XML: 두 개 Format 정의</text>
  <text x="80" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3">Formats</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <text x="80" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  &lt;!-- 조회 전용 Format --&gt;</text>
  <text x="80" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3">Format</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"view"</tspan><tspan fill="#ffffff">&gt; … &lt;/</tspan><tspan fill="#7ec8e3">Format</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <text x="80" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  &lt;!-- 편집 허용 Format --&gt;</text>
  <text x="80" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3">Format</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"edit"</tspan><tspan fill="#ffffff">&gt; … &lt;/</tspan><tspan fill="#7ec8e3">Format</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <text x="80" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">&lt;/</tspan><tspan fill="#7ec8e3">Formats</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <text x="80" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 스크립트: Format 전환</text>
  <text x="80" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text>
  <text x="151" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> fn_setGridMode(mode) {</text>
  <text x="80" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // "view" 또는 "edit"</text>
  <text x="80" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  this.grd_emp.set_formatid(mode);</text>
  <text x="80" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <text x="80" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 버튼 클릭으로 편집 모드 전환</text>
  <text x="80" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">fn_setGridMode(</tspan><tspan fill="#ce9178">"edit"</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="80" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 저장 완료 후 조회 모드 복귀</text>
</svg>
