<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">배낭 문제 변형 비교</text>

  <!-- 0/1 Knapsack -->
  <rect x="50" y="62" width="370" height="196" fill="#111" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">0/1 배낭 문제</text>
  <text x="235" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">각 물품: 0개 또는 1개</text>
  <text x="70" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">핵심: 역순 순회로 중복 방지</text>
  <text x="70" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">시간: O(nW)   공간: O(W)</text>
  <rect x="70" y="162" width="330" height="82" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="86" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">for w in range(W, wi-1, -1):</text>
  <text x="86" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp[w]=max(dp[w],dp[w-wi]+vi)</text>
  <text x="86" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 역순: 중복 선택 방지</text>
  <text x="86" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># (이전 행 값 유지)</text>

  <!-- Unbounded Knapsack -->
  <rect x="460" y="62" width="370" height="196" fill="#111" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">무한 배낭 문제 (Unbounded)</text>
  <text x="645" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">각 물품: 제한 없이 여러 번 가능</text>
  <text x="480" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">핵심: 정순 순회로 반복 허용</text>
  <text x="480" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">시간: O(nW)   공간: O(W)</text>
  <rect x="480" y="162" width="330" height="82" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">for w in range(wi, W+1):  # 정순!</text>
  <text x="496" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp[w]=max(dp[w],dp[w-wi]+vi)</text>
  <text x="496" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 정순: 같은 물품 재사용 가능</text>
  <text x="496" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># (현재 행 값 참조)</text>

  <!-- Bounded Knapsack -->
  <rect x="50" y="276" width="370" height="196" fill="#111" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">유계 배낭 문제 (Bounded)</text>
  <text x="235" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">물품 i: 최대 c[i]개 선택 가능</text>
  <text x="70" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">핵심: 이진 분할(Binary Grouping)로 O(n log c · W)</text>
  <rect x="70" y="356" width="330" height="100" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="86" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># c[i]개를 1,2,4,...로 분할</text>
  <text x="86" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">k = 1</text>
  <text x="86" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">while k &lt;= cnt:</text>
  <text x="86" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    items.append((k*w, k*v))</text>
  <text x="86" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    cnt -= k; k *= 2</text>

  <!-- Fractional Knapsack -->
  <rect x="460" y="276" width="370" height="196" fill="#111" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="645" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">분할 가능 배낭 (Fractional)</text>
  <text x="645" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">물품 일부만 자를 수 있음 (그리디 해결)</text>
  <text x="480" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">핵심: 단위 가치(v/w) 내림차순 탐욕</text>
  <text x="480" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">시간: O(n log n)   공간: O(1)</text>
  <rect x="480" y="376" width="330" height="82" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 단위 가치 기준 정렬</text>
  <text x="496" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">items.sort(key=lambda x: x[1]/x[0],</text>
  <text x="496" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">             reverse=True)</text>
  <text x="496" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># DP 불필요, O(n log n)</text>
</svg>
