<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">AT TIME ZONE 변환 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">PostgreSQL · Oracle · SQL Server 비교</text>

  <!-- Left: PostgreSQL -->
  <rect x="50" y="88" width="370" height="22" rx="4" fill="#161b2e"/>
  <text x="235" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">PostgreSQL</text>

  <rect x="50" y="114" width="370" height="168" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="66" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- UTC 현재 시각 → KST 변환</text>
  <text x="66" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="66" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    now() <tspan fill="#7ec8e3">AT TIME ZONE</tspan> <tspan fill="#ce9178">'UTC'</tspan></text>
  <text x="66" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">        <tspan fill="#7ec8e3">AT TIME ZONE</tspan> <tspan fill="#ce9178">'Asia/Seoul'</tspan>;</text>
  <text x="66" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 세션 타임존 설정</text>
  <text x="66" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SET</text>
  <text x="66" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    timezone = <tspan fill="#ce9178">'Asia/Seoul'</tspan>;</text>
  <text x="66" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">SELECT</tspan> now(); <tspan fill="#6a8aa0">-- KST로 표시</tspan></text>

  <!-- Right: Oracle &amp; MSSQL -->
  <rect x="460" y="88" width="370" height="22" rx="4" fill="#161b2e"/>
  <text x="645" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Oracle / SQL Server</text>

  <rect x="460" y="114" width="370" height="168" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- Oracle: FROM_TZ + AT TIME ZONE</text>
  <text x="476" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="476" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  FROM_TZ(CAST(SYSDATE <tspan fill="#7ec8e3">AS</tspan></text>
  <text x="476" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    TIMESTAMP), <tspan fill="#ce9178">'UTC'</tspan>)</text>
  <text x="476" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">AT TIME ZONE</tspan> <tspan fill="#ce9178">'Asia/Seoul'</tspan></text>
  <text x="476" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM DUAL;</text>
  <text x="476" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- SQL Server: AT TIME ZONE (2016+)</text>
  <text x="476" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>

  <!-- Warning box -->
  <rect x="50" y="300" width="780" height="70" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">주의: TIMESTAMP vs TIMESTAMPTZ</text>
  <text x="440" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">TZ 정보 없는 TIMESTAMP에 AT TIME ZONE 적용 시 → 현재 세션 TZ를 기준으로 해석 (의도치 않은 결과 가능)</text>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">항상 TIMESTAMPTZ(PostgreSQL) 또는 TIMESTAMP WITH TIME ZONE(Oracle) 타입을 기본으로 사용할 것</text>

  <text x="440" y="405" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">두 번 AT TIME ZONE: 첫 번째는 해석(TIMESTAMP→TIMESTAMPTZ), 두 번째는 변환(다른 TZ로)</text>
</svg>
