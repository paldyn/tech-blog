<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-m" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-u" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
    <marker id="arr-aug" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">이분 매칭 — 증가 경로(Augmenting Path)</text>

  <!-- Labels -->
  <text x="220" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">좌측 (작업)</text>
  <text x="660" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">우측 (담당자)</text>

  <!-- Left nodes -->
  <circle cx="220" cy="120" r="28" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="220" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">T1</text>

  <circle cx="220" cy="220" r="28" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="220" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">T2</text>

  <circle cx="220" cy="320" r="28" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="220" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">T3</text>

  <circle cx="220" cy="420" r="28" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="220" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">T4</text>

  <!-- Right nodes -->
  <circle cx="660" cy="160" r="28" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="660" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">P1</text>

  <circle cx="660" cy="270" r="28" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="660" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">P2</text>

  <circle cx="660" cy="380" r="28" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="660" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">P3</text>

  <!-- Unmatched edges (gray) -->
  <line x1="248" y1="130" x2="630" y2="155" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="248" y1="120" x2="630" y2="262" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="248" y1="230" x2="630" y2="265" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="248" y1="310" x2="630" y2="272" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="248" y1="320" x2="630" y2="372" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="248" y1="412" x2="630" y2="375" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Matched edges (green bold) -->
  <line x1="248" y1="116" x2="630" y2="153" stroke="#55c555" stroke-width="3"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">매칭</text>
  <line x1="248" y1="224" x2="630" y2="268" stroke="#55c555" stroke-width="3"/>
  <text x="440" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">매칭</text>

  <!-- T4 unmatched indicator -->
  <text x="180" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">미매칭</text>

  <!-- Augmenting path: T4 -> P3 (직접) -->
  <line x1="248" y1="420" x2="630" y2="382" stroke="#e05555" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="440" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">증가 경로</text>

  <!-- Legend -->
  <rect x="60" y="456" width="760" height="32" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <line x1="90" y1="472" x2="130" y2="472" stroke="#55c555" stroke-width="3"/>
  <text x="140" y="477" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">현재 매칭</text>
  <line x1="260" y1="472" x2="300" y2="472" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="310" y="477" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비매칭 가능 간선</text>
  <line x1="490" y1="472" x2="530" y2="472" stroke="#e05555" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="540" y="477" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">증가 경로 (매칭 +1)</text>
</svg>
