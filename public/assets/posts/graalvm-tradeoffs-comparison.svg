<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <!-- Background -->
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Native Image vs JIT — 트레이드오프 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">어떤 상황에서 어떤 실행 모드가 유리한가</text>

  <!-- Column Headers -->
  <rect x="60" y="88" width="360" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Native Image (AOT)</text>

  <rect x="460" y="88" width="360" height="44" rx="6" fill="#0a1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">JIT / HotSpot (기존 JVM)</text>

  <!-- VS divider -->
  <line x1="440" y1="88" x2="440" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555">vs</text>

  <!-- Row 1: Startup -->
  <rect x="60" y="148" width="360" height="52" rx="6" fill="#0d1a0d" stroke="#2a3a2a" stroke-width="1"/>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기동 시간</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">수 ms — 즉시 응답 (서버리스·CLI 최적)</text>

  <rect x="460" y="148" width="360" height="52" rx="6" fill="#0d1828" stroke="#1a2a3a" stroke-width="1"/>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기동 시간</text>
  <text x="480" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">수백 ms ~ 수 초 (워밍업 필요)</text>

  <!-- Row 2: Peak Throughput -->
  <rect x="60" y="212" width="360" height="52" rx="6" fill="#0d1a0d" stroke="#2a3a2a" stroke-width="1"/>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최고 처리량</text>
  <text x="80" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">보수적 AOT 최적화 — JIT 대비 낮음</text>

  <rect x="460" y="212" width="360" height="52" rx="6" fill="#0d1828" stroke="#1a2a3a" stroke-width="1"/>
  <text x="480" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최고 처리량</text>
  <text x="480" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">프로파일 기반 적응형 최적화 — 최상위</text>

  <!-- Row 3: Memory -->
  <rect x="60" y="276" width="360" height="52" rx="6" fill="#0d1a0d" stroke="#2a3a2a" stroke-width="1"/>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메모리(RSS)</text>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">낮음 — JVM 메타데이터 없음</text>

  <rect x="460" y="276" width="360" height="52" rx="6" fill="#0d1828" stroke="#1a2a3a" stroke-width="1"/>
  <text x="480" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메모리(RSS)</text>
  <text x="480" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">높음 — JIT 코드 캐시 + 메타스페이스</text>

  <!-- Row 4: Reflection / Dynamic -->
  <rect x="60" y="340" width="360" height="52" rx="6" fill="#0d1a0d" stroke="#2a3a2a" stroke-width="1"/>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리플렉션·동적 기능</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">메타데이터 사전 등록 필수 (closed-world)</text>

  <rect x="460" y="340" width="360" height="52" rx="6" fill="#0d1828" stroke="#1a2a3a" stroke-width="1"/>
  <text x="480" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리플렉션·동적 기능</text>
  <text x="480" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">완전 지원 — 런타임 클래스 로딩 가능</text>

  <!-- Row 5: Build -->
  <rect x="60" y="404" width="360" height="52" rx="6" fill="#0d1a0d" stroke="#2a3a2a" stroke-width="1"/>
  <text x="80" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 시간</text>
  <text x="80" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">수 분 (대형 앱은 10분+)</text>

  <rect x="460" y="404" width="360" height="52" rx="6" fill="#0d1828" stroke="#1a2a3a" stroke-width="1"/>
  <text x="480" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 시간</text>
  <text x="480" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">빠름 — javac + 패키징만</text>

  <!-- Legend -->
  <rect x="60" y="472" width="16" height="12" rx="2" fill="#55c555"/>
  <text x="82" y="483" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">유리</text>
  <rect x="130" y="472" width="16" height="12" rx="2" fill="#e05555"/>
  <text x="152" y="483" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">불리</text>
  <text x="440" y="510" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">※ 둘 중 무엇이 더 낫다는 절대 답은 없음 — 워크로드 특성에 따라 선택</text>
</svg>
