<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">TC39 제안 프로세스 — Stage 0 → Stage 4</text>

  <!-- Stage boxes (5 stages) -->
  <!-- Stage 0 -->
  <rect x="60" y="72" width="130" height="100" rx="8" fill="#0d1117" stroke="#555" stroke-width="1.5"/>
  <text x="125" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#888">Stage 0</text>
  <text x="125" y="116" text-anchor="middle" font-size="12" fill="#888">Strawperson</text>
  <text x="125" y="136" text-anchor="middle" font-size="11" fill="#555">아이디어 제안</text>
  <text x="125" y="154" text-anchor="middle" font-size="11" fill="#555">TC39 멤버만 가능</text>

  <!-- Arrow 0→1 -->
  <polygon points="196,122 220,112 220,118 230,118 230,126 220,126 220,132" fill="#444" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Stage 1 -->
  <rect x="232" y="72" width="130" height="100" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="297" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">Stage 1</text>
  <text x="297" y="116" text-anchor="middle" font-size="12" fill="#7ec8e3">Proposal</text>
  <text x="297" y="136" text-anchor="middle" font-size="11" fill="#888">챔피언 지정</text>
  <text x="297" y="154" text-anchor="middle" font-size="11" fill="#888">문제·해법 기술</text>

  <!-- Arrow 1→2 -->
  <polygon points="368,122 392,112 392,118 402,118 402,126 392,126 392,132" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Stage 2 -->
  <rect x="404" y="72" width="130" height="100" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="469" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">Stage 2</text>
  <text x="469" y="116" text-anchor="middle" font-size="12" fill="#7777cc">Draft</text>
  <text x="469" y="136" text-anchor="middle" font-size="11" fill="#888">정식 명세 초안</text>
  <text x="469" y="154" text-anchor="middle" font-size="11" fill="#888">폴리필 실험 시작</text>

  <!-- Arrow 2→3 -->
  <polygon points="540,122 564,112 564,118 574,118 574,126 564,126 564,132" fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Stage 3 -->
  <rect x="576" y="72" width="130" height="100" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="641" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#ce9178">Stage 3</text>
  <text x="641" y="116" text-anchor="middle" font-size="12" fill="#ce9178">Candidate</text>
  <text x="641" y="136" text-anchor="middle" font-size="11" fill="#888">명세 확정</text>
  <text x="641" y="154" text-anchor="middle" font-size="11" fill="#888">엔진 구현 시작</text>

  <!-- Arrow 3→4 -->
  <polygon points="712,122 736,112 736,118 746,118 746,126 736,126 736,132" fill="#ce9178" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Stage 4 -->
  <rect x="748" y="72" width="112" height="100" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="804" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">Stage 4</text>
  <text x="804" y="116" text-anchor="middle" font-size="12" fill="#55c555">Finished</text>
  <text x="804" y="136" text-anchor="middle" font-size="11" fill="#e8e8e8">다음 ES에 포함</text>
  <text x="804" y="154" text-anchor="middle" font-size="11" fill="#888">2개 이상 구현 필요</text>

  <!-- Examples section -->
  <text x="60" y="212" font-size="16" font-weight="600" fill="#e8e8e8">실제 제안 사례</text>

  <!-- Example table -->
  <rect x="60" y="224" width="760" height="44" rx="6" fill="#0d1117" stroke="#333"/>
  <text x="80" y="250" font-size="13" font-weight="600" fill="#7ec8e3">기능</text>
  <text x="280" y="250" font-size="13" font-weight="600" fill="#7ec8e3">도입 버전</text>
  <text x="460" y="250" font-size="13" font-weight="600" fill="#7ec8e3">Stage 4 연도</text>
  <text x="640" y="250" font-size="13" font-weight="600" fill="#7ec8e3">현재 상태</text>

  <line x1="60" y1="268" x2="820" y2="268" stroke="#222" stroke-width="1"/>

  <rect x="60" y="268" width="760" height="36" rx="0" fill="#111"/>
  <text x="80" y="291" font-size="12" fill="#e8e8e8">Optional chaining (?.)</text>
  <text x="280" y="291" font-size="12" fill="#55c555">ES2020</text>
  <text x="460" y="291" font-size="12" fill="#e8e8e8">2019</text>
  <text x="640" y="291" font-size="12" fill="#55c555">모든 엔진 지원</text>

  <rect x="60" y="304" width="760" height="36" rx="0" fill="#0d1117"/>
  <text x="80" y="327" font-size="12" fill="#e8e8e8">Array groupBy (Object.groupBy)</text>
  <text x="280" y="327" font-size="12" fill="#55c555">ES2024</text>
  <text x="460" y="327" font-size="12" fill="#e8e8e8">2023</text>
  <text x="640" y="327" font-size="12" fill="#55c555">모든 엔진 지원</text>

  <rect x="60" y="340" width="760" height="36" rx="0" fill="#111"/>
  <text x="80" y="363" font-size="12" fill="#e8e8e8">Decorators</text>
  <text x="280" y="363" font-size="12" fill="#ce9178">미정</text>
  <text x="460" y="363" font-size="12" fill="#e8e8e8">진행 중</text>
  <text x="640" y="363" font-size="12" fill="#ce9178">Stage 3 (2024)</text>

  <!-- Version name mapping -->
  <text x="60" y="406" font-size="14" font-weight="600" fill="#e8e8e8">버전명 매핑 (자주 혼용되는 표기)</text>
  <rect x="60" y="416" width="760" height="28" rx="6" fill="#0d1117" stroke="#333"/>
  <text x="80" y="435" font-size="13" fill="#f7df1e">ES6 = ES2015</text>
  <text x="240" y="435" font-size="13" fill="#888">·</text>
  <text x="260" y="435" font-size="13" fill="#7777cc">ES7 = ES2016</text>
  <text x="420" y="435" font-size="13" fill="#888">·</text>
  <text x="440" y="435" font-size="13" fill="#7ec8e3">ES8 = ES2017</text>
  <text x="600" y="435" font-size="13" fill="#888">·</text>
  <text x="620" y="435" font-size="13" fill="#55c555">ES2015부터 연도 표기 공식화</text>

  <!-- Footer -->
  <text x="440" y="454" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #2</text>
</svg>
