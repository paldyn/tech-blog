<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 470"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">TC39 제안 프로세스 — Stage 0 → Stage 4</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">새 기능이 ECMAScript 표준에 포함되기까지</text>

  <!--
    5 boxes × 120px = 600px, 4 arrows × 40px = 160px
    Total content = 760px. Left margin=60, right margin=60. 60+760+60=880 ✓
    Box x positions: 60,220,380,540,700  (each width=120)
    Arrow gaps: 180-220 → x=182→218, 340→380 → 342→378, 500→540 → 502→538, 660→700 → 662→698
    Box height=200, y=110→310. Center y=210.
    Arrow center y=210, shaft y=204-216, arrowhead y=198-222.
  -->

  <!-- Stage 0 -->
  <rect x="60" y="110" width="120" height="200" fill="#111520" rx="8" stroke="#2a2a3a" stroke-width="1"/>
  <text x="120" y="134" font-size="13" font-weight="700" fill="#666" text-anchor="middle">Stage 0</text>
  <text x="120" y="152" font-size="11" fill="#555" text-anchor="middle">Strawperson</text>
  <text x="120" y="190" font-size="11" fill="#666" text-anchor="middle">아이디어 단계</text>
  <text x="120" y="208" font-size="11" fill="#555" text-anchor="middle">TC39 멤버</text>
  <text x="120" y="226" font-size="11" fill="#555" text-anchor="middle">누구나 제안</text>

  <!-- Arrow 0→1 -->
  <polygon points="182,216 182,204 206,204 206,198 218,210 206,222 206,216"
           fill="#555" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>

  <!-- Stage 1 -->
  <rect x="220" y="110" width="120" height="200" fill="#0f1a20" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="280" y="134" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Stage 1</text>
  <text x="280" y="152" font-size="11" fill="#5a8a9a" text-anchor="middle">Proposal</text>
  <text x="280" y="190" font-size="11" fill="#888" text-anchor="middle">공식 제안</text>
  <text x="280" y="208" font-size="11" fill="#777" text-anchor="middle">Champion 지정</text>
  <text x="280" y="226" font-size="11" fill="#777" text-anchor="middle">사례·API 초안</text>
  <text x="280" y="244" font-size="11" fill="#777" text-anchor="middle">명세 문서 작성</text>

  <!-- Arrow 1→2 -->
  <polygon points="342,216 342,204 366,204 366,198 378,210 366,222 366,216"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>

  <!-- Stage 2 -->
  <rect x="380" y="110" width="120" height="200" fill="#0f1a14" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="134" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Stage 2</text>
  <text x="440" y="152" font-size="11" fill="#4a8a5a" text-anchor="middle">Draft</text>
  <text x="440" y="190" font-size="11" fill="#888" text-anchor="middle">초안 완성</text>
  <text x="440" y="208" font-size="11" fill="#777" text-anchor="middle">명세 언어로</text>
  <text x="440" y="226" font-size="11" fill="#777" text-anchor="middle">기술</text>
  <text x="440" y="244" font-size="11" fill="#777" text-anchor="middle">실험 구현 가능</text>

  <!-- Arrow 2→3 -->
  <polygon points="502,216 502,204 526,204 526,198 538,210 526,222 526,216"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>

  <!-- Stage 3 -->
  <rect x="540" y="110" width="120" height="200" fill="#1a1508" rx="8" stroke="#e8a53f" stroke-width="1"/>
  <text x="600" y="134" font-size="13" font-weight="700" fill="#e8a53f" text-anchor="middle">Stage 3</text>
  <text x="600" y="152" font-size="11" fill="#8a7030" text-anchor="middle">Candidate</text>
  <text x="600" y="190" font-size="11" fill="#888" text-anchor="middle">후보 단계</text>
  <text x="600" y="208" font-size="11" fill="#777" text-anchor="middle">엔진에 구현</text>
  <text x="600" y="226" font-size="11" fill="#777" text-anchor="middle">리뷰어 서명</text>
  <text x="600" y="244" font-size="11" fill="#777" text-anchor="middle">필요</text>

  <!-- Arrow 3→4 -->
  <polygon points="662,216 662,204 686,204 686,198 698,210 686,222 686,216"
           fill="#e8a53f" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>

  <!-- Stage 4 -->
  <rect x="700" y="110" width="120" height="200" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="760" y="134" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Stage 4</text>
  <text x="760" y="152" font-size="11" fill="#4a8a5a" text-anchor="middle">Finished</text>
  <text x="760" y="190" font-size="11" fill="#888" text-anchor="middle">표준 채택</text>
  <text x="760" y="208" font-size="11" fill="#777" text-anchor="middle">Test262 통과</text>
  <text x="760" y="226" font-size="11" fill="#777" text-anchor="middle">2개+ 엔진 구현</text>
  <text x="760" y="244" font-size="11" fill="#55c555" text-anchor="middle">✓ 명세 포함</text>

  <!-- Bottom note -->
  <text x="440" y="346" font-size="12" fill="#666" text-anchor="middle">proposals.tc39.es 에서 모든 제안의 Stage를 확인할 수 있습니다</text>

  <!-- Footer -->
  <text x="60" y="428" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part I — ECMAScript 표준과 버전 이름</text>
</svg>
