<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">TC39 제안 프로세스 — Stage 0 → Stage 4</text>

  <!-- Stage flow boxes -->
  <!-- Stage 0 -->
  <rect x="60" y="70" width="130" height="100" rx="8" fill="#0d1117" stroke="#444" stroke-width="1.5"/>
  <text x="125" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#888">Stage 0</text>
  <text x="125" y="114" text-anchor="middle" font-size="12" fill="#666">Strawperson</text>
  <line x1="70" y1="124" x2="180" y2="124" stroke="#2a2a2a" stroke-width="1"/>
  <text x="125" y="142" text-anchor="middle" font-size="11" fill="#666">아이디어 제안</text>
  <text x="125" y="158" text-anchor="middle" font-size="11" fill="#666">TC39 멤버</text>

  <!-- Arrow 0→1 -->
  <polygon points="198,113 198,127 224,120" fill="#444"/>

  <!-- Stage 1 -->
  <rect x="226" y="70" width="130" height="100" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="291" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">Stage 1</text>
  <text x="291" y="114" text-anchor="middle" font-size="12" fill="#7777cc">Proposal</text>
  <line x1="236" y1="124" x2="346" y2="124" stroke="#2a2a2a" stroke-width="1"/>
  <text x="291" y="142" text-anchor="middle" font-size="11" fill="#888">문제 정의</text>
  <text x="291" y="158" text-anchor="middle" font-size="11" fill="#888">API 스케치</text>

  <!-- Arrow 1→2 -->
  <polygon points="364,113 364,127 390,120" fill="#444"/>

  <!-- Stage 2 -->
  <rect x="392" y="70" width="130" height="100" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="457" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">Stage 2</text>
  <text x="457" y="114" text-anchor="middle" font-size="12" fill="#7ec8e3">Draft</text>
  <line x1="402" y1="124" x2="512" y2="124" stroke="#2a2a2a" stroke-width="1"/>
  <text x="457" y="142" text-anchor="middle" font-size="11" fill="#888">공식 명세 초안</text>
  <text x="457" y="158" text-anchor="middle" font-size="11" fill="#888">문법·의미론 정의</text>

  <!-- Arrow 2→3 -->
  <polygon points="530,113 530,127 556,120" fill="#444"/>

  <!-- Stage 3 -->
  <rect x="558" y="70" width="130" height="100" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="623" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Stage 3</text>
  <text x="623" y="114" text-anchor="middle" font-size="12" fill="#55c555">Candidate</text>
  <line x1="568" y1="124" x2="678" y2="124" stroke="#2a2a2a" stroke-width="1"/>
  <text x="623" y="142" text-anchor="middle" font-size="11" fill="#888">브라우저 구현</text>
  <text x="623" y="158" text-anchor="middle" font-size="11" fill="#888">실사용 피드백</text>

  <!-- Arrow 3→4 -->
  <polygon points="696,113 696,127 722,120" fill="#55c555"/>

  <!-- Stage 4 -->
  <rect x="724" y="70" width="130" height="100" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <text x="789" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Stage 4</text>
  <text x="789" y="114" text-anchor="middle" font-size="12" fill="#55c555">Finished</text>
  <line x1="734" y1="124" x2="844" y2="124" stroke="#2a4a2a" stroke-width="1"/>
  <text x="789" y="142" text-anchor="middle" font-size="11" fill="#55c555">다음 ES에 포함</text>
  <text x="789" y="158" text-anchor="middle" font-size="11" fill="#55c555">2개 이상 구현체</text>

  <!-- Examples per stage -->
  <text x="440" y="210" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">실제 제안 사례</text>

  <!-- Stage examples -->
  <rect x="60" y="226" width="760" height="50" rx="6" fill="#0d1117" stroke="#2a2a2a"/>
  <text x="80" y="247" font-size="12" font-weight="600" fill="#7777cc">Stage 1</text>
  <text x="150" y="247" font-size="12" fill="#888">Iterator helpers, Decorators (초기), Pattern Matching</text>
  <text x="80" y="266" font-size="12" font-weight="600" fill="#7ec8e3">Stage 3</text>
  <text x="150" y="266" font-size="12" fill="#888">Temporal (Date 대체), Decorators (최종), Import Attributes</text>

  <!-- Naming convention -->
  <text x="440" y="316" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">이름 혼용 정리: ES6 = ES2015 = ECMAScript 6</text>

  <!-- Naming table -->
  <rect x="60" y="330" width="360" height="120" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">ES6 이전 — 번호 기반</text>
  <line x1="70" y1="362" x2="410" y2="362" stroke="#2a2a2a" stroke-width="1"/>
  <text x="80" y="382" font-size="12" fill="#888">ES1 (1997)  ES2 (1998)  ES3 (1999)</text>
  <text x="80" y="402" font-size="12" fill="#888">ES5 (2009)  ES5.1 (2011)</text>
  <text x="80" y="422" font-size="12" fill="#666">※ ES4는 복잡성 논쟁으로 폐기됨</text>
  <text x="80" y="442" font-size="12" fill="#666">※ ES6 = ES2015 병용 (둘 다 맞음)</text>

  <rect x="460" y="330" width="360" height="120" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">ES2015 이후 — 연도 기반</text>
  <line x1="470" y1="362" x2="810" y2="362" stroke="#2a2a2a" stroke-width="1"/>
  <text x="480" y="382" font-size="12" fill="#888">ES2015  ES2016  ES2017  ES2018</text>
  <text x="480" y="402" font-size="12" fill="#888">ES2019  ES2020  ES2021  ES2022</text>
  <text x="480" y="422" font-size="12" fill="#888">ES2023  ES2024  ...</text>
  <text x="480" y="442" font-size="12" fill="#666">매년 6월 정식 출시</text>

  <!-- Footer -->
  <text x="440" y="492" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
