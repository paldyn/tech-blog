<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
  style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">TC39 제안 프로세스 — Stage 0 → Stage 4</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">ECMAScript 신규 기능이 표준이 되는 5단계 여정</text>

  <!-- Stage boxes with flow -->

  <!-- Stage 0 -->
  <rect x="60" y="100" width="130" height="110" rx="8" fill="#111" stroke="#444"/>
  <text x="125" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#666">Stage 0</text>
  <text x="125" y="145" text-anchor="middle" font-size="12" fill="#555">Strawperson</text>
  <text x="125" y="168" text-anchor="middle" font-size="11" fill="#555">비공식 아이디어</text>
  <text x="125" y="184" text-anchor="middle" font-size="11" fill="#555">TC39 멤버라면</text>
  <text x="125" y="200" text-anchor="middle" font-size="11" fill="#555">누구나 제출 가능</text>

  <!-- Arrow 0→1 -->
  <polygon points="196,153 226,153 226,149 238,155 226,161 226,157 196,157" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Stage 1 -->
  <rect x="244" y="100" width="130" height="110" rx="8" fill="#12122a" stroke="#7777cc"/>
  <text x="309" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#9999dd">Stage 1</text>
  <text x="309" y="145" text-anchor="middle" font-size="12" fill="#9999dd">Proposal</text>
  <text x="309" y="168" text-anchor="middle" font-size="11" fill="#888">공식 제안</text>
  <text x="309" y="184" text-anchor="middle" font-size="11" fill="#888">챔피언 지정</text>
  <text x="309" y="200" text-anchor="middle" font-size="11" fill="#888">문제·해결책 정의</text>

  <!-- Arrow 1→2 -->
  <polygon points="380,153 410,153 410,149 422,155 410,161 410,157 380,157" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Stage 2 -->
  <rect x="428" y="100" width="130" height="110" rx="8" fill="#0d1928" stroke="#7ec8e3"/>
  <text x="493" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">Stage 2</text>
  <text x="493" y="145" text-anchor="middle" font-size="12" fill="#7ec8e3">Draft</text>
  <text x="493" y="168" text-anchor="middle" font-size="11" fill="#888">명세 초안 작성</text>
  <text x="493" y="184" text-anchor="middle" font-size="11" fill="#888">구문·의미론 확정</text>
  <text x="493" y="200" text-anchor="middle" font-size="11" fill="#888">실험적 구현 시작</text>

  <!-- Arrow 2→3 -->
  <polygon points="564,153 594,153 594,149 606,155 594,161 594,157 564,157" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Stage 3 -->
  <rect x="612" y="100" width="130" height="110" rx="8" fill="#0d1f0d" stroke="#55c555"/>
  <text x="677" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Stage 3</text>
  <text x="677" y="145" text-anchor="middle" font-size="12" fill="#55c555">Candidate</text>
  <text x="677" y="168" text-anchor="middle" font-size="11" fill="#888">명세 완성</text>
  <text x="677" y="184" text-anchor="middle" font-size="11" fill="#888">여러 엔진 구현</text>
  <text x="677" y="200" text-anchor="middle" font-size="11" fill="#888">피드백 수집</text>

  <!-- Arrow 3→4 -->
  <polygon points="748,153 778,153 778,149 790,155 778,161 778,157 748,157" fill="#55c555" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Stage 4 -->
  <rect x="796" y="100" width="66" height="110" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="829" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Stage 4</text>
  <text x="829" y="150" text-anchor="middle" font-size="11" fill="#55c555">Finished</text>
  <text x="829" y="168" text-anchor="middle" font-size="11" fill="#aaa">표준</text>
  <text x="829" y="184" text-anchor="middle" font-size="11" fill="#aaa">편입</text>
  <text x="829" y="200" text-anchor="middle" font-size="11" fill="#aaa">완료</text>

  <!-- Divider -->
  <line x1="60" y1="245" x2="820" y2="245" stroke="#1e2433" stroke-width="1"/>

  <!-- Examples section -->
  <text x="440" y="275" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">실제 제안 사례</text>

  <!-- Example 1 -->
  <rect x="60" y="295" width="230" height="90" rx="7" fill="#111827" stroke="#1e2433"/>
  <text x="175" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Optional Chaining (?.)</text>
  <text x="175" y="338" text-anchor="middle" font-size="12" fill="#888">Stage 1: 2017</text>
  <text x="175" y="356" text-anchor="middle" font-size="12" fill="#888">Stage 4: 2020</text>
  <text x="175" y="374" text-anchor="middle" font-size="12" fill="#55c555">ES2020 표준 편입</text>

  <!-- Example 2 -->
  <rect x="325" y="295" width="230" height="90" rx="7" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Array Grouping</text>
  <text x="440" y="338" text-anchor="middle" font-size="12" fill="#888">Object.groupBy()</text>
  <text x="440" y="356" text-anchor="middle" font-size="12" fill="#888">Stage 3: 2022</text>
  <text x="440" y="374" text-anchor="middle" font-size="12" fill="#55c555">ES2024 표준 편입</text>

  <!-- Example 3 -->
  <rect x="590" y="295" width="230" height="90" rx="7" fill="#12122a" stroke="#7777cc"/>
  <text x="705" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#9999dd">Decorator (데코레이터)</text>
  <text x="705" y="338" text-anchor="middle" font-size="12" fill="#888">Stage 2: 2014~</text>
  <text x="705" y="356" text-anchor="middle" font-size="12" fill="#888">Stage 3: 2022</text>
  <text x="705" y="374" text-anchor="middle" font-size="12" fill="#ce9178">아직 Stage 3 진행 중</text>

  <!-- Key note -->
  <rect x="60" y="408" width="760" height="48" rx="7" fill="#111" stroke="#333"/>
  <text x="440" y="430" text-anchor="middle" font-size="13" fill="#888">TC39 = Technical Committee 39 · ECMA International 산하 JavaScript 표준화 위원회</text>
  <text x="440" y="448" text-anchor="middle" font-size="12" fill="#666">Mozilla · Google · Apple · Microsoft · Meta · Bloomberg 등 참여 · 매 2개월 회의</text>

  <!-- Footer -->
  <text x="440" y="482" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 · Part I</text>
</svg>
