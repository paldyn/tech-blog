<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TC39 제안 프로세스 — Stage 0 → Stage 4</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">새로운 기능이 ECMAScript 표준이 되기까지</text>

  <!-- Stage boxes -->
  <!-- Stage 0 -->
  <rect x="60" y="100" width="130" height="80" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <text x="125" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">Stage 0</text>
  <text x="125" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#666" text-anchor="middle">Strawperson</text>
  <text x="125" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">아이디어 단계</text>

  <!-- Arrow 0→1 -->
  <line x1="190" y1="140" x2="218" y2="140" stroke="#444" stroke-width="1.5"/>
  <polygon points="228,140 218,135 218,145" fill="#444"/>

  <!-- Stage 1 -->
  <rect x="228" y="100" width="130" height="80" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="293" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Stage 1</text>
  <text x="293" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Proposal</text>
  <text x="293" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">챔피언 + 문제 정의</text>

  <!-- Arrow 1→2 -->
  <line x1="358" y1="140" x2="386" y2="140" stroke="#444" stroke-width="1.5"/>
  <polygon points="396,140 386,135 386,145" fill="#444"/>

  <!-- Stage 2 -->
  <rect x="396" y="100" width="130" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="461" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Stage 2</text>
  <text x="461" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Draft</text>
  <text x="461" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">공식 스펙 초안</text>

  <!-- Arrow 2→3 -->
  <line x1="526" y1="140" x2="554" y2="140" stroke="#444" stroke-width="1.5"/>
  <polygon points="564,140 554,135 554,145" fill="#444"/>

  <!-- Stage 3 -->
  <rect x="564" y="100" width="130" height="80" rx="8" fill="#2e1a1a" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="629" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8c55a" text-anchor="middle">Stage 3</text>
  <text x="629" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c55a" text-anchor="middle">Candidate</text>
  <text x="629" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">구현 + 피드백</text>

  <!-- Arrow 3→4 -->
  <line x1="694" y1="140" x2="722" y2="140" stroke="#444" stroke-width="1.5"/>
  <polygon points="732,140 722,135 722,145" fill="#444"/>

  <!-- Stage 4 -->
  <rect x="732" y="100" width="110" height="80" rx="8" fill="#1a2e20" stroke="#55c555" stroke-width="2"/>
  <text x="787" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Stage 4</text>
  <text x="787" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Finished</text>
  <text x="787" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#88cc88" text-anchor="middle">표준 채택!</text>

  <!-- ECMAScript versions timeline -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">주요 ECMAScript 버전</text>

  <rect x="60" y="244" width="760" height="118" rx="8" fill="#0d0d0d" stroke="#222"/>

  <!-- Version entries -->
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">ES5 (2009)</text>
  <text x="200" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">strict mode, JSON, Array 고차 메서드, Object.create</text>

  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">ES2015 (ES6)</text>
  <text x="200" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">let/const, 화살표 함수, 클래스, 모듈, 프로미스, 심볼, 이터레이터</text>

  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">ES2017</text>
  <text x="200" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">async/await, Object.values/entries, 공유 메모리(SharedArrayBuffer)</text>

  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8c55a">ES2020</text>
  <text x="200" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BigInt, 옵셔널 체이닝(?.), nullish 병합(??), globalThis</text>

  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">ES2022+</text>
  <text x="200" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클래스 private 필드, Array.at(), Object.hasOwn(), top-level await</text>

  <!-- Code block -->
  <rect x="60" y="380" width="760" height="80" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// Stage 4 → 표준 채택 예시: Optional Chaining (ES2020)</text>
  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const</text><text x="132" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> city = user?.address?.city; </text><text x="542" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 에러 없이 undefined</text>
  <text x="76" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const</text><text x="132" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> label = value ?? </text><text x="304" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'기본값'</text><text x="388" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">;</text><text x="400" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">     // null/undefined일 때만</text>

  <!-- Footer -->
  <text x="440" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
