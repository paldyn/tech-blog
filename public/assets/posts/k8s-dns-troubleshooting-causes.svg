<svg xmlns="http://www.w3.org/2000/svg" width="880" height="378" viewBox="0 0 880 378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="378" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">DNS 실패 단골 원인</text>
  <text x="50" y="80" font-size="14" fill="#888">먼저 "DNS 자체"인지 "그 이름만"인지부터 가른다</text>

  <rect x="50" y="105" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="130" font-size="13" font-weight="600" fill="#ffffff">CoreDNS Pod 다운·과부하 — 모든 질의 실패</text>
  <text x="66" y="151" font-size="12" fill="#9aa4b8">kube-system의 coredns Pod 상태·로그·리소스 확인</text>

  <rect x="50" y="173" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="198" font-size="13" font-weight="600" fill="#ffffff">잘못된 FQDN·네임스페이스 — 특정 이름만 실패</text>
  <text x="66" y="219" font-size="12" fill="#9aa4b8">다른 NS의 서비스는 &lt;svc&gt;.&lt;ns&gt; 로 정확히 지정</text>

  <rect x="50" y="241" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="266" font-size="13" font-weight="600" fill="#ffffff">NetworkPolicy가 53/UDP 차단 — DNS만 막힘</text>
  <text x="66" y="287" font-size="12" fill="#9aa4b8">egress 정책에 kube-system DNS 허용 규칙 추가</text>

  <rect x="50" y="309" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="334" font-size="13" font-weight="600" fill="#ffffff">ndots:5 로 외부 도메인 질의 지연 — 느린 해석</text>
  <text x="66" y="355" font-size="12" fill="#9aa4b8">외부 도메인은 끝에 점(FQDN) 붙이거나 dnsConfig 조정</text>
</svg>
