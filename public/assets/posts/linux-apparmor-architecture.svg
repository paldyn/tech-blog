<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AppArmor 프로파일 적용 구조</text>

  <!-- App 1 (confined) -->
  <rect x="60" y="72" width="200" height="60" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">nginx (confined)</text>
  <text x="160" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프로파일 적용됨</text>
  <text x="160" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">/usr/sbin/nginx</text>

  <!-- Profile box -->
  <rect x="60" y="148" width="200" height="120" rx="6" fill="#0d102e" stroke="#4a5a8e" stroke-width="1.5"/>
  <text x="160" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">AppArmor 프로파일</text>
  <text x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">/var/www/** r,</text>
  <text x="80" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">/run/nginx.pid rw,</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">network tcp,</text>
  <text x="80" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">deny /etc/shadow r,</text>
  <text x="80" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">deny /home/** rw,</text>

  <!-- App 2 (unconfined) -->
  <rect x="320" y="72" width="200" height="60" rx="8" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="420" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">bash (unconfined)</text>
  <text x="420" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">프로파일 없음 — 제한 없음</text>

  <!-- Kernel -->
  <rect x="580" y="72" width="240" height="196" rx="10" fill="#0d102e" stroke="#4a5e9e" stroke-width="2"/>
  <text x="700" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Linux 커널</text>

  <rect x="600" y="108" width="200" height="50" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="700" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">AppArmor LSM</text>
  <text x="700" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Linux Security Module</text>

  <rect x="600" y="166" width="200" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="700" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">경로 기반 정책</text>
  <text x="700" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">/etc/apparmor.d/ 로드</text>

  <rect x="600" y="214" width="200" height="40" rx="4" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="700" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">enforce / complain</text>
  <text x="700" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모드별 동작</text>

  <!-- Arrows -->
  <line x1="260" y1="102" x2="580" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="420" y1="132" x2="580" y2="132" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Filesystem -->
  <rect x="580" y="284" width="240" height="100" rx="8" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="700" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">파일시스템 / 네트워크</text>
  <text x="700" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">/var/www → 허용</text>
  <text x="700" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">/etc/shadow → 거부</text>
  <text x="700" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">/home/** → 거부</text>

  <line x1="700" y1="268" x2="700" y2="284" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Code -->
  <rect x="60" y="296" width="500" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 상태 확인</text>
  <text x="80" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">aa-status</text>
  <text x="80" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># enforce → complain 전환 (학습 모드)</text>
  <text x="80" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">aa-complain</text>
  <text x="178" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> /usr/sbin/nginx</text>
  <text x="80" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># complain → enforce 전환</text>
  <text x="80" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">aa-enforce</text>
  <text x="170" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> /usr/sbin/nginx</text>
  <text x="80" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 로그 기반 프로파일 자동 생성</text>
  <text x="80" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">aa-genprof</text>
  <text x="170" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> /usr/local/bin/myapp</text>
  <text x="80" y="460" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 로그로 프로파일 업데이트</text>
</svg>
