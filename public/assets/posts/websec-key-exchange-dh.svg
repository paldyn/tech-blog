<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Diffie-Hellman 키 교환 프로토콜</text>

  <!-- Public params -->
  <rect x="280" y="62" width="320" height="42" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="79" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">공개 파라미터 (도청자도 알 수 있음)</text>
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">g = 공개 생성원,  p = 큰 소수 (공개)</text>

  <!-- Alice -->
  <rect x="60" y="130" width="200" height="54" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Alice</text>
  <text x="160" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비밀값 a (랜덤, 비공개)</text>

  <!-- Bob -->
  <rect x="620" y="130" width="200" height="54" rx="8" fill="#111a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Bob</text>
  <text x="720" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비밀값 b (랜덤, 비공개)</text>

  <!-- Alice computes A -->
  <rect x="60" y="216" width="200" height="44" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">공개값 A 계산</text>
  <text x="160" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">A = gᵃ mod p</text>

  <!-- Bob computes B -->
  <rect x="620" y="216" width="200" height="44" rx="8" fill="#0d200d" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">공개값 B 계산</text>
  <text x="720" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">B = gᵇ mod p</text>

  <!-- Exchange arrows -->
  <line x1="262" y1="290" x2="618" y2="290" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">A 전송 →</text>

  <line x1="618" y1="310" x2="262" y2="310" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">← B 전송</text>

  <!-- Eavesdropper -->
  <rect x="360" y="264" width="160" height="50" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">도청자 Eve</text>
  <text x="440" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">A, B, g, p 알아도</text>
  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">공유 비밀 계산 불가</text>

  <!-- Shared secret computation -->
  <rect x="60" y="356" width="200" height="54" rx="8" fill="#111a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">공유 비밀 계산</text>
  <text x="160" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">S = Bᵃ mod p</text>

  <rect x="620" y="356" width="200" height="54" rx="8" fill="#111a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">공유 비밀 계산</text>
  <text x="720" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">S = Aᵇ mod p</text>

  <!-- Equal result -->
  <rect x="300" y="356" width="280" height="54" rx="8" fill="#112211" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">같은 공유 비밀 S 도달</text>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Bᵃ = (gᵇ)ᵃ = gᵃᵇ = (gᵃ)ᵇ = Aᵇ (mod p)</text>

  <!-- Arrows to shared secret -->
  <line x1="160" y1="412" x2="300" y2="412" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="720" y1="412" x2="582" y2="412" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Bottom caption -->
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">S를 KDF로 처리해 실제 세션 키(AES 키 등)로 변환 — 공유 비밀 S를 그대로 키로 사용하지 않음</text>
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">ECDH는 동일 원리에 타원곡선 점 연산 적용 — 훨씬 짧은 키로 동등한 보안</text>
</svg>
