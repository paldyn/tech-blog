<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grafana 대시보드 아키텍처</text>

  <!-- Data sources (left column) -->
  <text x="145" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">데이터 소스</text>

  <rect x="60" y="100" width="170" height="60" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="145" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Prometheus</text>
  <text x="145" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메트릭 (PromQL)</text>

  <rect x="60" y="180" width="170" height="60" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="145" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Loki</text>
  <text x="145" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로그 (LogQL)</text>

  <rect x="60" y="260" width="170" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="145" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Tempo</text>
  <text x="145" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">트레이스</text>

  <!-- arrows to Grafana -->
  <line x1="230" y1="130" x2="300" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="230" y1="210" x2="300" y2="210" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="230" y1="290" x2="300" y2="240" stroke="#7777cc" stroke-width="2" marker-end="url(#arrp)"/>

  <!-- Grafana core -->
  <rect x="300" y="100" width="240" height="220" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="420" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Grafana</text>

  <rect x="318" y="146" width="204" height="34" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="420" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">데이터 소스 플러그인</text>

  <rect x="318" y="188" width="204" height="34" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="420" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">쿼리 → 패널 렌더링</text>

  <rect x="318" y="230" width="204" height="34" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="420" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">변수 · 템플릿</text>

  <rect x="318" y="272" width="204" height="34" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="420" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">통합 알림 (Alerting)</text>

  <!-- arrow Grafana -> Dashboard -->
  <line x1="540" y1="210" x2="610" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Dashboard -->
  <rect x="610" y="100" width="210" height="220" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="715" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">대시보드</text>

  <rect x="628" y="146" width="83" height="60" rx="4" fill="#1a2a3a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="669" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Time series</text>

  <rect x="719" y="146" width="83" height="60" rx="4" fill="#1a3020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="760" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Gauge</text>

  <rect x="628" y="214" width="83" height="60" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="669" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">Stat</text>

  <rect x="719" y="214" width="83" height="60" rx="4" fill="#201a10" stroke="#3a4a6e" stroke-width="1"/>
  <text x="760" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">Table</text>

  <text x="715" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JSON 모델로 정의</text>

  <!-- Provisioning (bottom) -->
  <rect x="180" y="390" width="480" height="64" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="420" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">프로비저닝 (Provisioning)</text>
  <text x="420" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터 소스 · 대시보드를 YAML / ConfigMap으로 코드 관리</text>

  <path d="M 420 390 L 420 320" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrp)"/>
</svg>
