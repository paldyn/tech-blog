<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09040"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">레이스 컨디션: 중복 할인 쿠폰 사용 예시</text>

  <!-- Timeline header -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">시간 →</text>
  <line x1="120" y1="76" x2="820" y2="76" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Thread labels -->
  <text x="60" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">요청 A</text>
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e09040">요청 B</text>

  <!-- Request A timeline -->
  <!-- Step 1: Check coupon -->
  <rect x="140" y="90" width="140" height="44" rx="6" fill="#0a1020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="210" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">쿠폰 조회</text>
  <text x="210" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">used=false 확인</text>

  <!-- Step 2: Apply discount -->
  <rect x="370" y="90" width="140" height="44" rx="6" fill="#0a1020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">할인 적용</text>
  <text x="440" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">price -= discount</text>

  <!-- Step 3: Mark used -->
  <rect x="600" y="90" width="140" height="44" rx="6" fill="#0a1020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="670" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">쿠폰 사용 처리</text>
  <text x="670" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">used=true 저장</text>

  <!-- Request B timeline -->
  <rect x="250" y="180" width="140" height="44" rx="6" fill="#1a1000" stroke="#e09040" stroke-width="1"/>
  <text x="320" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e09040">쿠폰 조회</text>
  <text x="320" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">used=false 확인 !</text>

  <rect x="480" y="180" width="140" height="44" rx="6" fill="#1a1000" stroke="#e09040" stroke-width="1"/>
  <text x="550" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e09040">할인 적용</text>
  <text x="550" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">price -= discount</text>

  <rect x="700" y="180" width="120" height="44" rx="6" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="760" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">중복 할인!</text>
  <text x="760" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">쿠폰 2회 사용</text>

  <!-- Arrows connecting steps -->
  <line x1="280" y1="112" x2="368" y2="112" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="510" y1="112" x2="598" y2="112" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="390" y1="202" x2="478" y2="202" stroke="#e09040" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="620" y1="202" x2="698" y2="202" stroke="#e09040" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Overlap annotation -->
  <rect x="235" y="140" width="280" height="26" rx="4" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="375" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">⚠ B가 A의 used=true 저장 전에 조회 → 둘 다 used=false 읽음</text>

  <!-- Database state -->
  <text x="60" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">데이터베이스 상태 변화</text>

  <rect x="60" y="288" width="760" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">-- 초기: coupon.used = false, balance = 10000</text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">SELECT used FROM coupons WHERE id=1  -- A: false</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e09040" xml:space="preserve">SELECT used FROM coupons WHERE id=1  -- B: false (아직 A가 갱신 전)</text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">→ A: balance=8000, used=true  /  B: balance=8000, used=true  → 중복!</text>

  <!-- Attack scenarios -->
  <text x="60" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">다른 레이스 컨디션 시나리오</text>

  <rect x="60" y="424" width="228" height="68" rx="6" fill="#0a0a18" stroke="#7777cc" stroke-width="1"/>
  <text x="174" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">포인트 중복 지급</text>
  <text x="174" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">잔액 확인 후 동시 출금</text>
  <text x="174" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 음수 잔액 발생</text>

  <rect x="328" y="424" width="224" height="68" rx="6" fill="#0a0a18" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">파일 업로드 검증 우회</text>
  <text x="440" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">검증 후 이동 사이에</text>
  <text x="440" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">악성 파일로 교체</text>

  <rect x="592" y="424" width="228" height="68" rx="6" fill="#0a0a18" stroke="#7777cc" stroke-width="1"/>
  <text x="706" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">계정 일시 정지 우회</text>
  <text x="706" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정지 처리 중</text>
  <text x="706" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동시 요청 통과</text>
</svg>
