<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0955e"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#9988dd"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GitLab Flow — 환경 브랜치 전략</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">업스트림 방향으로만 머지 (feature → main → staging → production)</text>

  <!-- Branch label boxes (left) -->
  <rect x="18" y="110" width="120" height="34" rx="6" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="78" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">feature/*</text>

  <rect x="18" y="210" width="120" height="34" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="78" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">main</text>

  <rect x="18" y="310" width="120" height="34" rx="6" fill="#1a150a" stroke="#e0955e" stroke-width="1.5"/>
  <text x="78" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0955e">staging</text>

  <rect x="18" y="410" width="120" height="34" rx="6" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="78" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">production</text>

  <!-- Horizontal track lines -->
  <line x1="152" y1="227" x2="840" y2="227" stroke="#7ec8e3" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="152" y1="327" x2="840" y2="327" stroke="#e0955e" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="152" y1="427" x2="840" y2="427" stroke="#55c555" stroke-width="2" stroke-opacity="0.35"/>

  <!-- Feature branch 1: branch off main at x=200, merge at x=390 -->
  <line x1="200" y1="227" x2="225" y2="127" stroke="#9988dd" stroke-width="2"/>
  <line x1="225" y1="127" x2="365" y2="127" stroke="#9988dd" stroke-width="2"/>
  <line x1="365" y1="127" x2="390" y2="220" stroke="#9988dd" stroke-width="2" marker-end="url(#arr-purple)"/>
  <circle cx="270" cy="127" r="6" fill="#9988dd"/>
  <circle cx="330" cy="127" r="6" fill="#9988dd"/>

  <!-- Feature branch 2: branch off main at x=500, merge at x=680 -->
  <line x1="500" y1="227" x2="525" y2="127" stroke="#9988dd" stroke-width="2"/>
  <line x1="525" y1="127" x2="655" y2="127" stroke="#9988dd" stroke-width="2"/>
  <line x1="655" y1="127" x2="680" y2="220" stroke="#9988dd" stroke-width="2" marker-end="url(#arr-purple)"/>
  <circle cx="570" cy="127" r="6" fill="#9988dd"/>
  <circle cx="630" cy="127" r="6" fill="#9988dd"/>

  <!-- Main commits -->
  <circle cx="200" cy="227" r="6" fill="#7ec8e3"/>
  <circle cx="390" cy="227" r="6" fill="#7ec8e3"/>
  <circle cx="500" cy="227" r="6" fill="#7ec8e3"/>
  <circle cx="680" cy="227" r="6" fill="#7ec8e3"/>
  <circle cx="780" cy="227" r="6" fill="#7ec8e3"/>

  <!-- PR merge labels -->
  <rect x="258" y="92" width="64" height="22" rx="4" fill="#16122a" stroke="#9988dd" stroke-width="1"/>
  <text x="290" y="107" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9988dd">PR 머지</text>

  <rect x="560" y="92" width="64" height="22" rx="4" fill="#16122a" stroke="#9988dd" stroke-width="1"/>
  <text x="592" y="107" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9988dd">PR 머지</text>

  <!-- main → staging arrows (dashed) -->
  <line x1="390" y1="234" x2="430" y2="320" stroke="#e0955e" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-orange)"/>
  <circle cx="430" cy="327" r="6" fill="#e0955e"/>

  <line x1="680" y1="234" x2="720" y2="320" stroke="#e0955e" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-orange)"/>
  <circle cx="720" cy="327" r="6" fill="#e0955e"/>

  <text x="340" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0955e">② staging 배포</text>

  <!-- staging → production arrows (dashed) -->
  <line x1="430" y1="334" x2="470" y2="420" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <circle cx="470" cy="427" r="6" fill="#55c555"/>

  <line x1="720" y1="334" x2="760" y2="420" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <circle cx="760" cy="427" r="6" fill="#55c555"/>

  <text x="540" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">③ production 승격</text>

  <!-- Step 1 label -->
  <text x="295" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">① 기능 개발</text>

  <!-- Footer note -->
  <text x="440" y="490" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">다운스트림(production → staging)으로 직접 머지하면 다른 변경이 누락될 위험 — 항상 업스트림 순서 준수</text>
</svg>
