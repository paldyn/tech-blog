<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">백업 검증 및 복원 테스트 패턴</text>

  <!-- RESTORE VERIFYONLY -->
  <rect x="60" y="76" width="360" height="100" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">백업 파일 무결성 검증</text>
  <rect x="76" y="108" width="328" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">RESTORE VERIFYONLY</text>
  <text x="92" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  FROM DISK = 'D:\Backup\full.bak'</text>
  <text x="92" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  WITH CHECKSUM;</text>

  <!-- RESTORE HEADERONLY -->
  <rect x="460" y="76" width="360" height="100" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">백업 헤더 정보 조회</text>
  <rect x="476" y="108" width="328" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">RESTORE HEADERONLY</text>
  <text x="492" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  FROM DISK = 'D:\Backup\full.bak';</text>
  <text x="492" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  -- LSN, 백업 날짜, 복구 모델 확인</text>

  <!-- Full restore to test -->
  <rect x="60" y="196" width="760" height="168" rx="8" fill="#0a1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">테스트 서버 복원 (정기 검증 자동화)</text>

  <rect x="76" y="228" width="720" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 다른 이름으로 복원 (프로덕션 영향 없음)</text>
  <text x="92" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">RESTORE DATABASE AdventureWorks_Test</text>
  <text x="92" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  FROM DISK = 'D:\Backup\full.bak'</text>
  <text x="92" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  WITH MOVE 'AdventureWorks_Data' TO 'D:\Test\aw_data.mdf',</text>
  <text x="92" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">       MOVE 'AdventureWorks_Log'  TO 'D:\Test\aw_log.ldf',</text>
  <text x="92" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">       REPLACE, STATS = 10;</text>

  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">월 1회 이상 복원 테스트 → 실제 장애 시 RTO 정확히 파악</text>
</svg>
