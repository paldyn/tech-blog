<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Session: 변경을 모았다가 한 번에</text>

  <defs>
    <marker id="ssar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="100" width="200" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="134" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">session.add(obj)</text>
  <text x="160" y="160" font-size="12" fill="#9aa4b8" text-anchor="middle">변경을 세션에</text>
  <text x="160" y="180" font-size="12" fill="#9aa4b8" text-anchor="middle">담아 둠 (아직 DB X)</text>

  <line x1="260" y1="145" x2="326" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ssar)"/>

  <rect x="330" y="100" width="200" height="90" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="430" y="134" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">변경 추적</text>
  <text x="430" y="160" font-size="12" fill="#9aa4b8" text-anchor="middle">추가·수정·삭제를</text>
  <text x="430" y="180" font-size="12" fill="#9aa4b8" text-anchor="middle">모아 둠 (unit of work)</text>

  <line x1="530" y1="145" x2="596" y2="145" stroke="#55c555" stroke-width="2" marker-end="url(#ssar)"/>
  <text x="563" y="128" font-size="11" fill="#9aa4b8" text-anchor="middle">commit()</text>

  <rect x="600" y="100" width="220" height="90" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="134" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">한 트랜잭션으로</text>
  <text x="710" y="160" font-size="12" fill="#9aa4b8" text-anchor="middle">SQL 실행 · 영속화</text>
  <text x="710" y="180" font-size="12" fill="#9aa4b8" text-anchor="middle">실패 시 rollback</text>

  <rect x="60" y="214" width="760" height="46" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="242" font-size="13" fill="#55c555" text-anchor="middle">add로 모으고 commit으로 한 번에 — 모두 성공하거나 모두 되돌린다</text>
</svg>
