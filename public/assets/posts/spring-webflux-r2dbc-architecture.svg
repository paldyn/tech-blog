<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-gr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">JDBC vs R2DBC 아키텍처 비교</text>

  <!-- LEFT: JDBC Stack -->
  <rect x="60" y="68" width="340" height="390" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">JDBC (블로킹)</text>
  <line x1="70" y1="106" x2="390" y2="106" stroke="#e05555" stroke-width="1" stroke-opacity="0.4"/>

  <!-- JDBC layers -->
  <rect x="78" y="116" width="304" height="42" rx="7" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">Spring MVC Controller</text>
  <text x="230" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Thread: 요청 스레드 점유</text>

  <line x1="230" y1="158" x2="230" y2="178" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="78" y="180" width="304" height="42" rx="7" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">Service Layer (동기)</text>
  <text x="230" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Transactional (블로킹)</text>

  <line x1="230" y1="222" x2="230" y2="242" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="78" y="244" width="304" height="42" rx="7" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">JPA / JdbcTemplate</text>
  <text x="230" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동기 JDBC API</text>

  <line x1="230" y1="286" x2="230" y2="306" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="78" y="308" width="304" height="42" rx="7" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">Connection Pool</text>
  <text x="230" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HikariCP (고정 스레드 풀)</text>

  <line x1="230" y1="350" x2="230" y2="370" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="78" y="372" width="304" height="56" rx="7" fill="#200808" stroke="#e05555" stroke-width="2"/>
  <text x="230" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">Database</text>
  <text x="230" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답 대기 중 스레드 블로킹</text>
  <text x="230" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">⚠ N 동시 요청 = N 스레드 필요</text>

  <!-- VS -->
  <circle cx="440" cy="260" r="22" fill="#1a1a1a" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="440" y="265" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">VS</text>

  <!-- RIGHT: R2DBC Stack -->
  <rect x="480" y="68" width="340" height="390" rx="10" fill="#091a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">R2DBC (논블로킹)</text>
  <line x1="490" y1="106" x2="810" y2="106" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>

  <!-- R2DBC layers -->
  <rect x="498" y="116" width="304" height="42" rx="7" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">WebFlux Controller</text>
  <text x="650" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Thread: 이벤트 루프 (비점유)</text>

  <line x1="650" y1="158" x2="650" y2="178" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gr)"/>

  <rect x="498" y="180" width="304" height="42" rx="7" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">Service Layer (Mono/Flux)</text>
  <text x="650" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Transactional (리액티브)</text>

  <line x1="650" y1="222" x2="650" y2="242" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gr)"/>

  <rect x="498" y="244" width="304" height="42" rx="7" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">Spring Data R2DBC Repository</text>
  <text x="650" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">R2DBC API (논블로킹)</text>

  <line x1="650" y1="286" x2="650" y2="306" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gr)"/>

  <rect x="498" y="308" width="304" height="42" rx="7" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">R2DBC Connection Pool</text>
  <text x="650" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">io.r2dbc:r2dbc-pool</text>

  <line x1="650" y1="350" x2="650" y2="370" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gr)"/>

  <rect x="498" y="372" width="304" height="56" rx="7" fill="#082010" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">Database</text>
  <text x="650" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답 대기 중 스레드 해방</text>
  <text x="650" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">✓ N 동시 요청 = 소수 스레드로 처리</text>
</svg>
